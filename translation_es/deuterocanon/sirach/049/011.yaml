translation:
  language: es
  text: ¿Cómo alabaremos a Zorobabel? Él fue como un anillo de sello[a] en la mano derecha[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como un sello». El hebreo puede referirse a un sello o a un anillo de sello; aquí «anillo de sello» expresa mejor la imagen de un objeto llevado en la mano.
    reason: lexical_alternative
  - marker: b
    text: La imagen probablemente evoca honor y valor especial; compárese el uso profético de esta figura en Hageo 2:23.
    reason: cross_reference
lexical_decisions:
- source_word: מה נהללה
  english_pob_choice: How shall we praise
  chosen_spanish: ¿Cómo alabaremos
  alternatives_spanish:
  - ¿Cómo magnificaremos
  - ¿Cómo exaltaremos
  lexicon: HALOT
  rationale: El hebreo expresa una pregunta retórica de admiración; en español, «alabar» comunica bien esa respuesta de honra y elogio sin sonar tan forzado como «magnificar». El paralelo griego con μεγαλύνωμεν mantiene la idea de exaltar, pero el hebreo apoya con fuerza el campo de la alabanza.
- source_word: זרבבל
  english_pob_choice: Zerubbabel
  chosen_spanish: Zorobabel
  alternatives_spanish:
  - Zerubbabel
  lexicon: convención onomástica bíblica
  rationale: En español bíblico es más natural y reconocido «Zorobabel» que la transliteración más cercana al inglés. Se conserva el nombre propio sin añadir explicación.
- source_word: על יד ימין
  english_pob_choice: on the right hand
  chosen_spanish: en la mano derecha
  alternatives_spanish:
  - a la derecha
  - en la diestra
  lexicon: HALOT
  rationale: El hebreo y el griego describen literalmente la mano derecha. En español, «en la mano derecha» mantiene la imagen concreta y evita convertirla prematuramente en una noción abstracta de posición o favor.
- source_word: כחותם
  english_pob_choice: like a signet ring
  chosen_spanish: como un sello
  alternatives_spanish:
  - como un anillo de sello
  - como un signet
  lexicon: HALOT
  rationale: חותם puede significar sello o signet; el audit trail inglés eligió «signet ring» para sugerir un objeto valioso asociado a la mano. En español, «sello» es más natural y conserva la metáfora, aunque pierde la especificidad del anillo; por eso se anota la alternativa.
theological_decisions:
- issue: Imagen de honor y valor en la metáfora del sello/signet
  english_pob_reading: Retain the metaphor directly without explicating its honor/covenantal implications in the main text.
  chosen_spanish_reading: Mantener la metáfora sin explicitar en el cuerpo del texto el valor honorífico o pactal.
  alternative_spanish_readings:
  - Él fue como un anillo de sello en la mano derecha
  - Él fue como un sello real en la mano derecha
  rationale: El verso solo presenta la comparación. La versión española conserva la tensión poética y no agrega interpretaciones sobre dignidad, elección o simbolismo profético más allá de lo que el texto dice explícitamente.
  doctrine_reference: Preservar la imagen y no sobreinterpretar; cf. la nota profética asociada en Hageo 2:23, sin convertirla en glosa dentro del versículo.
translation_notes:
  revision_awareness: El borrador sigue de cerca el control hebreo de Kahana y confirma la imagen con el paralelo griego de Swete. Se mantiene la pregunta retórica y la metáfora de la mano derecha sin expandirla teológicamente. No se registraron revisiones posteriores en el audit trail.
  spanish_consistency_notes:
  - Se usa «Zorobabel» por convención bíblica en español.
  - Se prefiere «alabar» para la pregunta retórica, con nota que preserva la alternativa «magnificar».
  - «Sello» se usa como equivalente más idiomático en español, dejando explícita en nota la alternativa «anillo de sello».
  - La puntuación refleja una sola pregunta seguida de dos oraciones breves, en estilo bíblico moderno y claro.
