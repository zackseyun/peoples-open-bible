theological_decisions:
- issue: Whether to make God's object of contention or retention explicit
  chosen_reading: Leave the object implicit, as in the Hebrew.
  alternative_readings:
  - He will not accuse forever, nor keep his anger forever.
  - He will not always chide, nor will he keep [his anger] forever.
  rationale: The Hebrew does not explicitly state 'anger' in this verse, though the broader context suggests divine displeasure. Preserving the implicit object avoids importing more than the text says while retaining the poetic terseness.
  doctrine_reference: Translation philosophy items 1 and 3
