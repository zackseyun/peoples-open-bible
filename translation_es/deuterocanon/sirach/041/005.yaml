translation:
  language: es
  text: Los hijos del despreciado son cosa mala[a], y los descendientes de un necio viven en terror ante los malvados[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo de la primera línea es difícil; el paralelo griego se acerca más a «Hijos abominables son los hijos de pecadores».
    reason: alternative_reading
  - marker: b
    text: 'El paralelo griego difiere con más fuerza en la segunda línea, leyendo aproximadamente: «y conviven en las moradas de los impíos».'
    reason: alternative_reading
  - marker: c
    text: El testimonio más antiguo de Masada para esta sección es fragmentario; el hebreo de la geniza de El Cairo ofrece aquí la redacción principal legible.
    reason: textual_variant
lexical_decisions:
- source_word: נין
  english_pob_choice: Children
  chosen_spanish: hijos
  alternatives_spanish:
  - descendencia
  - offspring
  lexicon: HALOT
  rationale: En español, «hijos» es la forma más natural y transparente para el paralelismo sapiencial, y conserva la referencia a la posteridad sin sonar técnica o rígida.
- source_word: נמאס
  english_pob_choice: of the despised
  chosen_spanish: de los despreciados
  alternatives_spanish:
  - de los rechazados
  - de los aborrecidos
  lexicon: HALOT
  rationale: «Despreciados» mantiene el valor pasivo/adjetival del hebreo y corresponde bien al tono negativo confirmado por el paralelo griego.
- source_word: דבר רעים
  english_pob_choice: are an evil thing
  chosen_spanish: son cosa mala
  alternatives_spanish:
  - son una mala cosa
  - son un mal asunto
  lexicon: HALOT
  rationale: El hebreo es difícil; «cosa mala» preserva la evaluación negativa general sin pretender resolver más de lo que el texto permite. Evita una paráfrasis excesiva y mantiene la ambigüedad documentada.
- source_word: נכד
  english_pob_choice: the offspring
  chosen_spanish: la descendencia
  alternatives_spanish:
  - la posteridad
  - los descendientes
  lexicon: HALOT
  rationale: «Descendencia» comunica posteridad de manera amplia, sin restringir indebidamente el sentido a «nieto» en un contexto poético de paralelismo con נין.
- source_word: אויל
  english_pob_choice: of a fool
  chosen_spanish: de un necio
  alternatives_spanish:
  - de un necio insensato
  - de un tonto
  lexicon: HALOT
  rationale: «Necio» es el término sapiencial tradicional y conserva mejor la categoría moral del hebreo que una mera etiqueta intelectual.
- source_word: במגור
  english_pob_choice: in the terror
  chosen_spanish: está en el terror
  alternatives_spanish:
  - vive en el terror
  - está bajo el terror
  lexicon: HALOT
  rationale: El sustantivo expresa miedo/dread/terror. «Está en el terror» sigue de cerca la construcción preposicional y evita añadir un verbo interpretativo no presente en el hebreo.
- source_word: רשע
  english_pob_choice: of the wicked
  chosen_spanish: de los malvados
  alternatives_spanish:
  - de los impíos
  - de los perversos
  lexicon: HALOT
  rationale: «Malvados» conserva el campo moral y funciona con naturalidad en español moderno; además, el plural colectivo refleja el uso genérico del hebreo.
theological_decisions:
- issue: Primacía del hebreo de Sirácides con control del paralelo griego, especialmente en una línea hebrea difícil
  english_pob_reading: Translate primarily from the Hebrew, with the Greek used as a control confirming the verse's strongly negative judgment on the offspring of the ungodly/foolish.
  chosen_spanish_reading: Traducir principalmente del hebreo conservado, dejando que el griego confirme el juicio negativo general, pero sin sustituir el hebreo en la redacción base.
  alternative_spanish_readings:
  - 'Una versión guiada por el griego: «Los hijos abominables son hijos de pecadores, y se asocian en las moradas de los impíos».'
  - 'Una versión más conjetural del hebreo: «Los hijos de los despreciados son una cosa detestable».'
  rationale: La política del proyecto da primacía al hebreo cuando está preservado. Aquí la línea hebrea presenta dificultad léxica, pero no está ausente; por eso conviene mantener la base hebrea y usar el griego como control de tono y sentido general, sin borrar la tensión textual.
  doctrine_reference: 'PHILOSOPHY.md: traducir Sirácides desde el hebreo donde se conserva; usar el paralelo griego como apoyo real sin desplazar la primacía hebrea.'
translation_notes:
  revision_awareness: La redacción española sigue la última revisión del inglés POB en la preferencia por una formulación más literal en la segunda cola («está en») y conserva la tensión textual señalada por las notas de variante y por la divergencia con el griego.
  spanish_consistency_notes:
  - Se mantuvo «despreciados» para נמאס y «malvados» para רשע, coherentes con el campo moral del pasaje.
  - «Necio» se usó como término sapiencial estable, no como insulto coloquial.
  - No se introdujo «Cristo», «SEÑOR» ni otra terminología ajena al verso.
  - La frase final conserva la rareza sintáctica del hebreo en vez de normalizarla por completo, para no borrar la dificultad documentada.
