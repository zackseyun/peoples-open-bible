base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/006/011.yaml
  text: So we questioned them in order to make it known to you and to write to you the names of the men who were leading them[b][a], and we asked them for the list of names of those who were at their head.
  footnotes:
  - marker: a
    text: Or, 'the men who were leading them'; the Greek participle translated 'who were speaking as leaders' is somewhat difficult and may emphasize either leadership or those giving the formal account.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'the list of names of those who were at their head' refers to an official register of the leaders overseeing the work.
    reason: cultural_note
