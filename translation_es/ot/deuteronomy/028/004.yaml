translation:
  language: es
  text: 'Bendito será el fruto de tu vientre[a], el fruto de tu tierra, el fruto de tu ganado: las crías de tus rebaños de ganado mayor y las crías de tus rebaños.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el aumento de tu ganado y las crías de tu rebaño'. Las expresiones hebreas שְׁגַר אֲלָפֶיךָ y עַשְׁתְּרֹת צֹאנֶךָ son términos tradicionales para el aumento reproductivo del ganado.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּרוּךְ
  english_pob_choice: Blessed shall be
  chosen_spanish: Bendito será
  alternatives_spanish:
  - Bendito es
  - Será bendito
  lexicon: HALOT
  rationale: Mantiene el tono formular de bendición del hebreo y el matiz prospectivo/resultativo que la POB inglesa conserva con 'shall be'.
- source_word: פְּרִי
  english_pob_choice: fruit
  chosen_spanish: fruto
  alternatives_spanish:
  - producción
  - prole
  lexicon: HALOT
  rationale: Se repite tres veces y conviene conservar la paralelidad con un término único y natural en español, como en la POB inglesa con 'fruit'.
- source_word: בִטְנְךָ
  english_pob_choice: your womb
  chosen_spanish: tu vientre
  alternatives_spanish:
  - tu seno
  - tu matriz
  lexicon: HALOT
  rationale: En español, 'vientre' comunica de forma idiomática y reverente la imagen corporal de donde procede la descendencia; 'matriz' es más técnico y 'seno' menos preciso aquí.
- source_word: אַדְמָתְךָ
  english_pob_choice: your ground
  chosen_spanish: tu tierra
  alternatives_spanish:
  - tu suelo
  - tu campo
  lexicon: HALOT
  rationale: Aunque la POB inglesa opta por 'ground' para el campo cultivado, en español 'tierra' resulta natural y conserva el ámbito agrícola sin restringirlo demasiado.
- source_word: בְהֶמְתֶּךָ
  english_pob_choice: your livestock
  chosen_spanish: tu ganado
  alternatives_spanish:
  - tus animales domésticos
  - tus reses
  lexicon: HALOT
  rationale: '''Ganado'' es el equivalente natural y amplio para animales domesticados en contexto agrícola, y mantiene la serie paralela con tierra y descendencia.'
- source_word: שְׁגַר
  english_pob_choice: offspring
  chosen_spanish: el parto
  alternatives_spanish:
  - la cría
  - la descendencia
  lexicon: HALOT
  rationale: En la expresión con el ganado, el término apunta al acto/resultado de parir; 'parto' refleja ese matiz reproductivo que la POB inglesa explica como 'offspring of your herds'.
- source_word: אֲלָפֶיךָ
  english_pob_choice: your herds
  chosen_spanish: de tus vacas
  alternatives_spanish:
  - de tus reses
  - de tus hatos
  lexicon: HALOT
  rationale: El hebreo puede referirse al ganado mayor en conjunto; aquí se concreta de modo legible en 'vacas' por el paralelismo con el ganado mayor y para evitar una frase extraña en español, aunque la POB inglesa deja 'herds' como término colectivo.
- source_word: עַשְׁתְּרֹת
  english_pob_choice: the young
  chosen_spanish: las crías
  alternatives_spanish:
  - la cría
  - el aumento
  lexicon: HALOT
  rationale: En la expresión fija con el rebaño, el sentido es el de las crías o aumento de la descendencia; 'crías' suena natural en español y preserva la referencia reproductiva.
- source_word: צֹאנְךָ
  english_pob_choice: your flocks
  chosen_spanish: tus ovejas
  alternatives_spanish:
  - tu rebaño
  - tus rebaños
  lexicon: HALOT
  rationale: El término colectivo abarca ovejas y cabras; 'ovejas' es una concreción legible en español, aunque algo más específica que el colectivo hebreo/inglés.
translation_notes:
  revision_awareness: 'Se siguió el sentido estable del borrador inglés de la POB y se adaptó a una sintaxis española publicable, conservando la progresión paralela: vientre, tierra, ganado, parto/crías. No se introdujeron cambios doctrinales ni variantes textuales.'
  spanish_consistency_notes:
  - Se mantuvo 'fruto' como equivalente unificado de פְּרִי para conservar el paralelismo.
  - '''Vientre'' traduce la imagen de בטן sin volverla técnica ni vulgar.'
  - Se prefirió 'tierra' frente a 'suelo' por naturalidad bíblica en español.
  - '''Ganado'' funciona como colectivo amplio y evita la ambigüedad de ''animales''.'
  - La nota al pie recoge la alternativa tradicional de aumento reproductivo del ganado, como en la POB inglesa.
