  to: Y nadie entre en la casa de Yahvé[a], sino los sacerdotes y los levitas que ministran; ellos podrán entrar, porque son santos. Y todo el pueblo cumplirá el encargo de Yahvé[b].
  rationale: La revisión corrige la expresión final para reflejar mejor el sentido de deber/encargo sagrado de מִשְׁמֶרֶת, evita el falso amigo «carga», y restituye una nota léxica alineada con el audit trail inglés. Se mantiene el resto del versículo, que es generalmente fiel y natural en español.
