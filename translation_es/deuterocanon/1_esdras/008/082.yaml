review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego en la estructura principal: prohibición de tomar hijas para los hijos, prohibición de buscar paz con ellos, y propósito de fortalecerse para comer los bienes de la tierra y heredarla. También conserva correctamente en nota la ampliación posible del paralelo hebreo sobre ‘paz/prosperidad’. Sin embargo, ‘durante todo el tiempo’ no refleja tan bien el valor contextual de τὸν ἅπαντα χρόνον como una formulación más idiomática y precisa en español como ‘todos vuestros días’ o mejor, en registro neutral, ‘todos sus días’/‘todos los días de vuestra vida’.'
  spanish_quality_summary: La redacción es mayormente clara, pero mezcla un voseo/plural peninsular (‘toméis’, ‘vuestros’, ‘busquéis’, ‘habiéndoos’) con el objetivo de español neutral latinoamericano. Además, ‘habiéndoos fortalecido’ suena algo forzado; ‘habiéndose fortalecido’ o una reestructuración impersonal mejora la naturalidad, pero dado el contexto exhortativo de segunda persona plural, conviene mantener esa persona con formas de ‘ustedes’.
  glossary_alignment: 'No hay términos del glosario mayor comprometidos aquí. La decisión sobre ‘paz con ellos’ está alineada con la auditoría inglesa y la nota conserva la alternativa ‘paz/prosperidad’. La principal desviación es de estilo objetivo del proyecto: evitar formas marcadamente peninsulares cuando no son necesarias.'
  issues:
  - severity: medium
    issue: Registro pronominal peninsular en vez de español neutral
    rationale: El borrador usa ‘toméis’, ‘vuestros’, ‘busquéis’, ‘habiéndoos’, lo que choca con la meta de español neutral latinoamericano/broadly church-readable. Debe pasarse a formas de ‘ustedes’ o a una redacción no marcada.
  - severity: medium
    issue: ‘durante todo el tiempo’ suena poco idiomático y menos preciso contextualmente
    rationale: Aunque posible, no expresa tan naturalmente el matiz exhortativo de duración continua de τὸν ἅπαντα χρόνον. La auditoría inglesa revisó a ‘all your days’; en español, ‘todos sus días’ preserva mejor ese valor.
  - severity: low
    issue: La nota pierde ‘forever’/‘para siempre’ del inglés auditado
    rationale: 'La nota inglesa dice ‘do not seek their peace or prosperity forever’. En español conviene conservar ese matiz temporal: ‘no busquen su paz ni su prosperidad para siempre’ o equivalente.'
  revised_spanish_text: y no tomen sus hijas para sus hijos[a], y no busquen paz con ellos todos sus días, para que, habiéndose fortalecido, coman los bienes de la tierra y la hereden.
