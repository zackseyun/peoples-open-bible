translation:
  language: es
  text: Porque ¿qué saca el hombre de todo su trabajo y del afán[a] de su corazón con que se afana bajo el sol?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la inquietud de su corazón', o 'la preocupación/ocupación de su corazón'. El término hebreo רַעְיוֹן puede llevar matices de esfuerzo interior, búsqueda mental o preocupación inquieta en Eclesiastés.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce una explicación o motivo, y «Porque» conserva con naturalidad ese valor causal/explanatorio en español.
- source_word: מֶה
  english_pob_choice: what
  chosen_spanish: qué
  alternatives_spanish:
  - qué cosa
  - qué es lo que
  lexicon: HALOT
  rationale: Es la forma interrogativa natural en español para una pregunta retórica directa.
- source_word: הֹוֶה
  english_pob_choice: does ... gain
  chosen_spanish: tiene ganancia
  alternatives_spanish:
  - gana
  - obtiene
  - saca provecho
  lexicon: HALOT
  rationale: En este dicho, el sentido idiomático no es simplemente «llegar a ser», sino preguntar qué provecho resulta del trabajo; «tiene ganancia» conserva esa idea sin alejarse del hebreo.
- source_word: לָאָדָם
  english_pob_choice: a man
  chosen_spanish: el hombre
  alternatives_spanish:
  - una persona
  - el ser humano
  lexicon: HALOT
  rationale: El hebreo usa singular masculino representativo; «el hombre» mantiene el marco retórico singular en español sin forzar una abstracción impersonal.
- source_word: בְּכָל עֲמָלוֹ
  english_pob_choice: from all his labor
  chosen_spanish: de todo su trabajo
  alternatives_spanish:
  - de todo su labor
  - de toda su fatiga
  - de toda su faena
  lexicon: HALOT
  rationale: «עָמָל» aquí apunta al esfuerzo o trabajo fatigoso; «trabajo» es natural en español, y «de» expresa el ámbito o fuente desde el cual vendría la ganancia.
- source_word: וּבְרַעְיוֹן לִבּוֹ
  english_pob_choice: and from the striving of his heart
  chosen_spanish: y del afán de su corazón
  alternatives_spanish:
  - y de la angustia de su corazón
  - y de la inquietud de su corazón
  - y del pensamiento de su corazón
  lexicon: HALOT
  rationale: «רַעְיוֹן» admite matices de esfuerzo interior, ocupación mental o inquietud; «afán» conserva el tono de actividad interna y demanda sin fijar indebidamente una sola de las alternativas posibles.
- source_word: לִבּוֹ
  english_pob_choice: his heart
  chosen_spanish: su corazón
  alternatives_spanish:
  - su mente
  lexicon: HALOT
  rationale: Se mantiene «corazón» para respetar la antropología bíblica y la imagen hebrea, donde el corazón incluye pensamiento, voluntad e interioridad.
- source_word: שֶׁהוּא עָמֵל
  english_pob_choice: with which he toils
  chosen_spanish: con que se afana
  alternatives_spanish:
  - con que trabaja
  - con que labora
  - en lo cual se esfuerza
  lexicon: HALOT
  rationale: La cláusula relativa enlaza el afán interior con la actividad continua del hombre; «se afana» reproduce el tono de esfuerzo fatigoso y funciona bien con el sintagma anterior.
- source_word: תַּחַת הַשָּׁמֶשׁ
  english_pob_choice: under the sun
  chosen_spanish: debajo del sol
  alternatives_spanish:
  - bajo el sol
  lexicon: HALOT
  rationale: Es la fórmula recurrente de Eclesiastés para la vida en la esfera terrenal. «Debajo del sol» es plenamente entendible y mantiene el eco literario de la expresión.
translation_notes:
  revision_awareness: Se corrigió el problema de validación eliminando el marcador de nota no anclado. La versión española mantiene el sentido de la pregunta retórica y el campo semántico del término רַעְיוֹן sin depender de una nota al pie.
  spanish_consistency_notes:
  - Se conservó el singular representativo «el hombre» para alinearlo con el hebreo אָדָם en este contexto.
  - Se evitó «SEÑOR» o terminología litúrgica no presente, ya que el versículo no contiene el nombre divino.
  - «Corazón» se mantuvo de forma consistente con la antropología hebrea y con el uso frecuente en Eclesiastés.
  - La preposición «de» en ambas frases reproduce adecuadamente la idea de beneficio derivado de la labor y del afán interior.
