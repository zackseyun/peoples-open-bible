translation:
  language: es
  text: y el resto del pueblo—los sacerdotes, los levitas, los porteros, los cantores, los servidores del templo[a], y todos los que se habían apartado de los pueblos de las tierras a la ley de Dios—sus esposas, sus hijos y sus hijas[b], todo el que sabía y entendía—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “los netinim”, transliteración tradicional para una clase de servidores del templo.
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo usa formas masculinas singulares con fuerza colectiva: “todo el que se había apartado … todo el que sabía y entendía”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּשְׁאָר הָעָם
  english_pob_choice: and the rest of the people
  chosen_spanish: y el resto del pueblo
  alternatives_spanish:
  - y el remanente del pueblo
  - y el resto de la nación
  lexicon: HALOT
  rationale: שְׁאָר expresa la idea de resto o remanente; en este contexto de comunidad del pacto, 'pueblo' corresponde mejor a עָם que 'nación' y suena natural en español.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los presbíteros
  lexicon: HALOT
  rationale: Es el equivalente habitual y preciso de כֹּהֲנִים; 'presbíteros' introduciría un matiz eclesiástico ajeno al texto.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levíticos
  lexicon: HALOT
  rationale: Designa la clase levítica; 'levitas' es la forma normal y clara en español.
- source_word: הַשּׁוֹעֲרִים
  english_pob_choice: the gatekeepers
  chosen_spanish: los porteros
  alternatives_spanish:
  - los guardias de las puertas
  - los guardianes de las puertas
  lexicon: HALOT
  rationale: Aunque 'gatekeepers' puede traducirse literalmente como 'guardianes de las puertas', 'porteros' es la equivalencia tradicional y comprensible para el personal del templo.
- source_word: הַמְשֹׁרְרִים
  english_pob_choice: the singers
  chosen_spanish: los cantores
  alternatives_spanish:
  - los cantantes
  - los músicos
  lexicon: HALOT
  rationale: El participio de שׁיר apunta específicamente a quienes cantan; 'cantores' preserva esa precisión mejor que 'músicos'.
- source_word: הַנְּתִינִים
  english_pob_choice: the temple servants
  chosen_spanish: los servidores del templo
  alternatives_spanish:
  - los netinim
  - los sirvientes del templo
  lexicon: HALOT
  rationale: Se traduce el título por función, como en el POB inglés, para evitar una transliteración opaca sin base necesaria en el español.
- source_word: וְכָל הַנִּבְדָּל
  english_pob_choice: and all who had separated themselves
  chosen_spanish: y todos los que se habían apartado
  alternatives_spanish:
  - y todos los separados
  - y todos los que se separaron
  lexicon: HALOT
  rationale: El participio pasivo-reflexivo colectivo pide una forma plural natural en español; 'se habían apartado' conserva el sentido de separación voluntaria del resto de los pueblos.
- source_word: מֵעַמֵּי הָאֲרָצוֹת
  english_pob_choice: from the peoples of the lands
  chosen_spanish: de los pueblos de las tierras
  alternatives_spanish:
  - de los pueblos de las provincias
  - de los pueblos de las regiones
  lexicon: HALOT
  rationale: Se mantiene el plural 'pueblos' y 'tierras' para reflejar la referencia a múltiples poblaciones circundantes, sin simplificar indebidamente el hebreo.
- source_word: אֶל תּוֹרַת הָאֱלֹהִים
  english_pob_choice: to the law of God
  chosen_spanish: para la ley de Dios
  alternatives_spanish:
  - a la ley de Dios
  - en dirección a la ley de Dios
  lexicon: HALOT
  rationale: La preposición אֶל tras 'apartarse' expresa orientación/adhesión; 'para la ley de Dios' comunica mejor en español esa finalidad o alineación que un calco más rígido.
- source_word: נְשֵׁיהֶם בְּנֵיהֶם וּבְנוֹתֵיהֶם
  english_pob_choice: their wives, their sons, and their daughters
  chosen_spanish: sus mujeres, sus hijos y sus hijas
  alternatives_spanish:
  - sus esposas, sus hijos y sus hijas
  - sus mujeres, sus descendientes
  lexicon: HALOT
  rationale: El hebreo enumera explícitamente esposa, hijos y hijas; 'mujeres' conserva el término del texto, aunque en español puede leerse como 'esposas'. Se evita resumirlo como 'familias'.
- source_word: כֹּל יוֹדֵעַ מֵבִין
  english_pob_choice: everyone who knew and understood
  chosen_spanish: todo el que sabía y entendía
  alternatives_spanish:
  - todos los que sabían y entendían
  - cada uno que conocía y comprendía
  lexicon: HALOT
  rationale: Los participios expresan capacidad de discernimiento; 'sabía y entendía' es natural en español y mantiene el paralelo verbal del hebreo.
theological_decisions:
- issue: Forma colectiva con participios singulares/plurales y sujetos mixtos
  english_pob_reading: Use 'all who had separated themselves' and 'everyone who knew and understood' in the main text, while retaining explicit mention of wives, sons, and daughters.
  chosen_spanish_reading: y todos los que se habían apartado ... sus mujeres, sus hijos y sus hijas, todo el que sabía y entendía
  alternative_spanish_readings:
  - y todos los que se habían apartado ... todo el que sabía y entendía
  - y todos los que se habían apartado ... todos los que sabían y entendían
  rationale: El hebreo combina formas con fuerza colectiva y un complemento familiar explícito. En español, la coordinación plural seguida de un singular distributivo reproduce bien el efecto sin borrar la precisión gramatical del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Traducción de הַנְּתִינִים
  english_pob_reading: Translate as 'temple servants' rather than transliterate 'Nethinim.'
  chosen_spanish_reading: los servidores del templo
  alternative_spanish_readings:
  - los netinim
  - los Nethinim
  rationale: Como clase de personal del templo, el valor funcional es más transparente para el lector español y no añade contenido doctrinal nuevo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 6
translation_notes:
  revision_awareness: La revisión inglesa más reciente suavizó la coordinación a 'all' y ajustó la forma verbal para concordar con el sujeto plural. La versión española sigue esa decisión con 'todos los que se habían apartado', manteniendo luego el distributivo singular 'todo el que sabía y entendía' para reflejar el hebreo con naturalidad.
  spanish_consistency_notes:
  - Se mantiene 'ley de Dios' para תּוֹרַת הָאֱלֹהִים, coherente con el POB inglés y sin introducir 'Torá' como tecnicismo innecesario.
  - '''Porteros'' y ''cantores'' conservan un registro bíblico claro y aceptable para lectores de iglesia.'
  - '''Se habían apartado'' expresa el valor reflexivo/colectivo del participio hebreo sin forzar una forma masculina singular en español.'
