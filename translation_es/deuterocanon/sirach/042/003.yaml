translation:
  language: es
  text: acerca de la cuenta del arrendatario[a], del señor y del huésped[b], y acerca de la división de una herencia y de bienes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo griego dice: «acerca de la cuenta de un compañero y de viajeros, acerca de la entrega de la herencia de asociados», lo que refleja un texto subyacente distinto en varios puntos. La traducción principal sigue el hebreo conservado.'
    reason: alternative_reading
  - marker: b
    text: La palabra hebrea final es breve y algo incierta en este contexto; se traduce como «bienes» por el marco legal y económico del versículo.
    reason: lexical_alternative
lexical_decisions:
- source_word: על / περὶ
  english_pob_choice: about
  chosen_spanish: acerca de
  alternatives_spanish:
  - sobre
  - respecto de
  lexicon: HALOT; BDAG
  rationale: La preposición repetida introduce los temas de una lista temática. «Acerca de» conserva ese valor tópico en un español natural y suficientemente formal.
- source_word: חשבון / λόγου
  english_pob_choice: account
  chosen_spanish: cuenta
  alternatives_spanish:
  - cálculo
  - rendición de cuentas
  lexicon: HALOT; Louw-Nida
  rationale: En este contexto comercial-jurídico, «cuenta» transmite la idea de balance o ajuste económico. También dialoga bien con el griego λόγου en sentido de asunto de cuenta.
- source_word: חוכר
  english_pob_choice: tenant
  chosen_spanish: arrendatario
  alternatives_spanish:
  - inquilino
  - arrendador
  lexicon: HALOT
  rationale: «Arrendatario» expresa con precisión la relación de arriendo/tenencia que el hebreo denota. Es más técnico que «inquilino» y evita una asociación demasiado doméstica.
- source_word: אדון
  english_pob_choice: master
  chosen_spanish: amo
  alternatives_spanish:
  - señor
  - dueño
  lexicon: HALOT
  rationale: En este marco socioeconómico, «amo» mantiene la relación de autoridad o dominio personal que el hebreo comunica. «Señor» podría sonar demasiado honorífico; «dueño» estrecha el sentido hacia propiedad.
- source_word: אורח
  english_pob_choice: guest
  chosen_spanish: huésped
  alternatives_spanish:
  - viajero
  - forastero
  lexicon: HALOT
  rationale: El hebreo puede referirse a un invitado o visitante. «Huésped» conserva esa ambivalencia de invitado/viajero mejor que una opción más estrecha, y sigue siendo claro en español.
- source_word: מחלקות
  english_pob_choice: division
  chosen_spanish: división
  alternatives_spanish:
  - distribución
  - partición
  lexicon: HALOT
  rationale: El sustantivo apunta al acto de dividir o asignar partes. «División» reproduce bien la forma breve de la lista y encaja con el lenguaje de herencia.
- source_word: נחלה
  english_pob_choice: inheritance
  chosen_spanish: herencia
  alternatives_spanish:
  - patrimonio
  - heredad
  lexicon: HALOT
  rationale: «Herencia» es el equivalente legal-familiar más transparente en español. Preserva la referencia a bienes recibidos por sucesión.
- source_word: ויש
  english_pob_choice: and property
  chosen_spanish: y bienes
  alternatives_spanish:
  - y propiedad
  - y posesiones
  lexicon: HALOT
  rationale: El hebreo es breve y algo incierto; en contexto legal-económico apunta a bienes o propiedad. «Bienes» suena natural en español y mantiene la amplitud del término sin forzar una precisión mayor de la que permite el texto.
theological_decisions:
- issue: Texto hebreo frente al paralelo griego en una lista sapiencial/legal
  english_pob_reading: The main translation follows the surviving Hebrew witness while footnoting the Greek parallel's different wording.
  chosen_spanish_reading: La traducción principal sigue el testimonio hebreo conservado y anota en nota la variante griega.
  alternative_spanish_readings:
  - 'Seguir más de cerca el griego: «acerca de la palabra del compañero y de los caminantes, acerca del dar la herencia de los asociados»'
  - Ofrecer un texto mixto entre hebreo y griego
  rationale: La evidencia principal es el hebreo de Kahana, pero el paralelo griego muestra diferencias relevantes en varios puntos. En español se conserva la lectura hebrea como texto base y se documenta la variante para no borrar la tensión textual.
  doctrine_reference: Principios de crítica textual y transparencia de fuente
- issue: Término final hebreo equívoco (ויש)
  english_pob_reading: Rendered 'property' in keeping with the verse's legal-economic context.
  chosen_spanish_reading: Se traduce como «bienes», con nota sobre la posible alternativa semántica.
  alternative_spanish_readings:
  - propiedad
  - posesiones
  rationale: El hebreo final es breve y algo incierto. «Bienes» mantiene el sentido económico-jurídico sin imponer una precisión que el testigo no garantiza; además es natural en español bíblico contemporáneo.
  doctrine_reference: Lexicografía contextual y cautela textual
translation_notes:
  revision_awareness: El borrador sigue el pasaje hebreo conservado de Kahana, en acuerdo alto con la evaluación de revisión, y registra la divergencia significativa del paralelo griego sin intentar armonizar ambos testimonios en el texto principal.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - 'Se mantiene un registro legal-económico uniforme: cuenta, arrendatario, amo, huésped, herencia, bienes.'
  - Se evita «señor» para אדון, porque en este contexto podría sonar más honorífico que relacional o económico.
  - Se prefiere «huésped» para conservar la amplitud semántica de אורח sin reducirlo solo a «viajero».
