  to: Yo también podría hablar como ustedes[a], si su vida[b] estuviera en lugar de mi vida; podría amontonar palabras contra ustedes y menear la cabeza ante ustedes[c].
  rationale: Se mantiene la base del borrador, pero se corrige la frase final a un español más natural y fiel al modismo hebreo, y se añade la nota cultural presente en la auditoría inglesa para conservar el matiz de escarnio del gesto.
