translation:
  language: es
  text: Y su mercancía y sus salarios serán santas para Yahvé[a]; no serán almacenados ni acaparados, porque su mercancía será para los que habitan delante de Yahvé, para comer hasta saciarse y para ropa duradera[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'su paga'. El término puede denotar pago o remuneración y puede evocar la imaginería del capítulo sobre Tiro como prostituta.
    reason: lexical_alternative
  - marker: b
    text: O 'vestido duradero', 'vestido de gala' o 'amplia cobertura'. La frase final es difícil, especialmente el adjetivo 'duradero/escogido/antiguo'.
    reason: lexical_alternative
lexical_decisions:
- source_word: סַחְרָהּ
  english_pob_choice: her merchandise
  chosen_spanish: sus mercancías
  alternatives_spanish:
  - su comercio
  - sus bienes comerciales
  - su mercancía
  lexicon: HALOT
  rationale: El sustantivo alude al comercio o a las mercancías de Tiro. 'Mercancías' conserva el sentido comercial concreto y suena natural en español bíblico contemporáneo.
- source_word: אֶתְנַנָּהּ
  english_pob_choice: her wages
  chosen_spanish: sus ganancias
  alternatives_spanish:
  - su salario
  - su pago
  - su jornal
  lexicon: HALOT
  rationale: El término puede significar pago, salario o ganancia obtenida. 'Ganancias' mantiene la idea de ingresos procedentes de su actividad y evita reducir el matiz a un salario laboral literal.
- source_word: קֹדֶשׁ לַיהוָה
  english_pob_choice: holy to Yahweh
  chosen_spanish: cosa santa para Yahvé
  alternatives_spanish:
  - santa para Yahvé
  - consagrada a Yahvé
  - apartada para Yahvé
  lexicon: HALOT
  rationale: '''Cosa santa'' reproduce con claridad el valor de קֹדֶשׁ como algo dedicado a Dios. Se conserva ''Yahvé'' por la convención del proyecto para el Tetragrámaton.'
- source_word: יֵאָצֵר
  english_pob_choice: be stored up
  chosen_spanish: serán guardadas
  alternatives_spanish:
  - serán almacenadas
  - serán acumuladas
  - serán atesoradas
  lexicon: HALOT
  rationale: El nifal de אצר expresa ser guardado o almacenado. 'Serán guardadas' funciona bien con el paralelismo y evita un tecnicismo innecesario.
- source_word: יֵחָסֵן
  english_pob_choice: be hoarded
  chosen_spanish: acaparadas
  alternatives_spanish:
  - reservadas
  - guardadas en reserva
  - atesoradas
  lexicon: HALOT
  rationale: '''Acaparadas'' distingue este verbo del anterior y conserva la idea de acumular con retención impropia, en paralelo con ''guardadas''.'
- source_word: לַיֹּשְׁבִים לִפְנֵי יְהוָה
  english_pob_choice: for those who dwell before Yahweh
  chosen_spanish: para los que habitan delante de Yahvé
  alternatives_spanish:
  - para los que viven delante de Yahvé
  - para los que moran en presencia de Yahvé
  lexicon: HALOT
  rationale: '''Habitan delante de Yahvé'' preserva el participio con sentido de vivir/dwelling y la expresión relacional ''delante de Yahvé'' sin sobreexplicar.'
- source_word: לֶאֱכֹל לְשָׂבְעָה
  english_pob_choice: for eating to satisfaction
  chosen_spanish: para comer hasta saciarse
  alternatives_spanish:
  - para comer a satisfacción
  - para comer hasta quedar satisfechos
  - para comer en abundancia
  lexicon: HALOT
  rationale: La frase hebrea expresa comer hasta la plenitud o saciedad. 'Hasta saciarse' es natural, fiel y conserva la meta de satisfacción.
- source_word: לִמְכַסֶּה עָתִיק
  english_pob_choice: for durable clothing
  chosen_spanish: para cobertura durable
  alternatives_spanish:
  - para vestido durable
  - para cobertura perdurable
  - para abrigo durable
  lexicon: HALOT
  rationale: מכסה significa cobertura o prenda de cobertura, y עָתִיק sugiere algo duradero o de larga duración. 'Cobertura durable' mantiene la ambigüedad útil del hebreo y la tensión lexical documentada por el original.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El proyecto pide 'Yahvé' como forma principal en español para יהוה. Se preserva así el nombre del pacto en lugar de una sustitución reverencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Santidad de los ingresos de Tiro
  english_pob_reading: holy to Yahweh
  chosen_spanish_reading: cosa santa para Yahvé
  alternative_spanish_readings:
  - consagrado a Yahvé
  - apartado para Yahvé
  rationale: El texto declara explícitamente קדש, por lo que la traducción debe mantener la dedicación sagrada y no reducirla a una mera destinación económica.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
- issue: Ambigüedad final de la provisión
  english_pob_reading: for durable clothing
  chosen_spanish_reading: para cobertura durable
  alternative_spanish_readings:
  - para vestido durable
  - para abrigo durable
  - para cobertura perdurable
  rationale: La combinación de מכסה con עתיק es difícil y admite varias soluciones. 'Cobertura durable' conserva la ambigüedad entre prenda, abrigo o cobertura, sin cerrar indebidamente el sentido.
  doctrine_reference: 'DOCTRINE.md: preserve documented lexical tension'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión reciente del inglés POB que prefirió 'durable clothing' frente a 'lasting clothing'. En español se reflejó esa decisión con 'cobertura durable', manteniendo la fuerza de provisión duradera y la ambigüedad del hebreo final.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יהוה.
  - Se mantiene un registro formal, bíblico y publicable sin arcaísmos innecesarios.
  - Se preserva la tensión léxica de אֶתְנַנָּהּ y de לִמְכַסֶּה עָתִיק mediante alternativas en nota.
  - La cláusula final evita especificar 'ropa' de forma demasiado cerrada, porque el hebreo admite 'cobertura' o prenda duradera.
