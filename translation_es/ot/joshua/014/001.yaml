base_translation:
  language: en
  yaml_path: translation/ot/joshua/014/001.yaml
  text: Now these are the inheritances that the sons of Israel received in the land of Canaan[a], which Eleazar the priest, Joshua son of Nun[c][b], and the heads of the fathers’ houses of the tribes of the sons of Israel apportioned to them.
  footnotes:
  - marker: a
    text: Or 'the Israelites' for 'the sons of Israel.' The Hebrew literally uses the familial expression 'sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'which Eleazar the priest, Joshua son of Nun, and the heads of the ancestral houses of the tribes gave them as an inheritance.' The Hebrew repeats the inheritance root in both clauses.
    reason: lexical_alternative
  - marker: c
    text: '''Fathers’ houses'' refers to ancestral family groupings within the tribes.'
    reason: cultural_note
