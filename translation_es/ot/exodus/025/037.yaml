translation:
  language: es
  text: Harás sus siete lámparas[a][b], y las pondrán de modo que alumbren hacia su frente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las encenderán», o «las alzarán»; el verbo hebreo puede referirse tanto a ponerlas en su lugar como a proceder a su encendido, según el contexto ritual.
    reason: lexical_alternative
  - marker: b
    text: El verbo está en tercera persona singular en hebreo y probablemente se refiere al sacerdote que atiende el candelabro, aunque el sujeto no se nombra explícitamente en este versículo.
    reason: cultural_note
lexical_decisions:
- source_word: וְעָשִׂיתָ
  english_pob_choice: You shall make
  chosen_spanish: Harás
  alternatives_spanish:
  - Y harás
  - Harás para ella
  lexicon: HALOT
  rationale: El imperfecto con waw en contexto instructivo funciona como mandato. En español, «Harás» mantiene la fuerza directiva con fluidez; no se añadió «Y» porque el enlace ya queda implícito en la serie de instrucciones.
- source_word: נֵרֹתֶיהָ
  english_pob_choice: its lamps
  chosen_spanish: sus lámparas
  alternatives_spanish:
  - sus lámparas de aceite
  - sus luces
  lexicon: HALOT
  rationale: נֵר se refiere de manera natural a una lámpara; en el contexto del candelabro, «lámparas» es claro y adecuado. Se conserva el sufijo femenino singular como «sus» referido al candelabro.
- source_word: שִׁבְעָה
  english_pob_choice: seven
  chosen_spanish: siete
  alternatives_spanish:
  - siete en número
  lexicon: HALOT
  rationale: Número cardinal directo, sin necesidad de ampliar.
- source_word: וְהֶעֱלָה
  english_pob_choice: they shall set up
  chosen_spanish: las pondrán
  alternatives_spanish:
  - las colocarán
  - las alzarán
  - las encenderán
  lexicon: HALOT
  rationale: El hiphil de עלה puede implicar hacer subir, levantar o disponer. Dado el contexto cultual y la nota inglesa de que la acción puede ser colocar/encender, «las pondrán» evita decidir indebidamente entre montaje e ignición y conserva el valor funcional de preparación.
- source_word: וְהֵאִיר
  english_pob_choice: so that they give light
  chosen_spanish: de modo que alumbren
  alternatives_spanish:
  - para que den luz
  - y alumbren
  - para alumbrar
  lexicon: HALOT
  rationale: 'El hiphil de אור expresa el efecto buscado: producir luz. «De modo que alumbren» comunica bien el propósito/resultante sin forzar una construcción demasiado literal.'
- source_word: עַל עֵבֶר פָּנֶיהָ
  english_pob_choice: toward the front of it
  chosen_spanish: hacia el frente de ella
  alternatives_spanish:
  - hacia su frente
  - frente a ella
  - hacia delante de ella
  lexicon: HALOT
  rationale: La expresión indica dirección respecto del candelabro. «Hacia el frente de ella» refleja el movimiento direccional y mantiene el referente femenino del objeto en español.
theological_decisions:
- issue: Valor del verbo הֶעֱלָה en el contexto del candelabro
  english_pob_reading: The Hebrew verb can denote causing the lamps to go up, which in context may imply lighting as well as setting them in place.
  chosen_spanish_reading: «las pondrán» mantiene abierta la posibilidad de colocarlas o prepararlas para encenderse, sin reducir el hebreo solo a «encenderán».
  alternative_spanish_readings:
  - las encenderán
  - las alzarán
  - las instalarán
  rationale: El hebreo permite una tensión lexical real entre elevar/poner en orden/encender. La redacción española conserva esa amplitud y evita cerrar prematuramente el sentido.
  doctrine_reference: Principio de equivalencia óptima y respeto al rango semántico del verbo hebreo en contexto ritual.
- issue: Sujeto implícito en la segunda cláusula
  english_pob_reading: The third-person singular ('he shall set up') likely refers to the priest who tends the lampstand, though the subject is not explicitly named in this verse.
  chosen_spanish_reading: Se usó una forma plural impersonal, «las pondrán», que deja sin explicitación al agente singular y se ajusta al sentido contextual sin introducir un sujeto no dicho.
  alternative_spanish_readings:
  - las pondrá
  - las pondrá el sacerdote
  - se pondrán
  rationale: El hebreo no nombra al sujeto aquí; la versión española evita suplirlo de forma interpretativa y conserva la ambigüedad funcional del texto.
  doctrine_reference: Respeto a la indeterminación sintáctica del original.
translation_notes:
  revision_awareness: El borrador sigue la revisión inglesa más reciente al evitar un sujeto singular explícito en la segunda cláusula y al mantener una formulación direccional precisa para la frase final. También toma en cuenta la nota de auditoría sobre la amplitud semántica de הֶעֱלָה en contexto cultual, preservando esa tensión en español sin resolverla de manera demasiado estrecha.
  spanish_consistency_notes:
  - Se usó «lámparas» para נֵרֹת, coherente con el lenguaje del tabernáculo y con el valor léxico estándar en español bíblico moderno.
  - Se evitó «SEÑOR» u otra sustitución por el nombre divino porque este versículo no contiene el Tetragrámaton.
  - Se mantuvo un español sobrio y culto, sin arcaísmos innecesarios, pero conservando la precisión ritual del pasaje.
  - La referencia femenina en «de ella» sigue el género gramatical del sustantivo implícito en español para el candelabro, sin añadir contenido doctrinal.
