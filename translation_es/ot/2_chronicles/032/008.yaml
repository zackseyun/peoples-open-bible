translation:
  language: es
  text: Con él hay un brazo de carne[a], pero con nosotros está Yahvé nuestro Dios, para ayudarnos y pelear nuestras batallas. Y el pueblo confió en las palabras de Ezequías, rey de Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fuerza humana» para «brazo de carne»; el hebreo conserva la metáfora de poder meramente humano en contraste con la ayuda de Yahvé.
    reason: lexical_alternative
lexical_decisions:
- source_word: עִמּוֹ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - está con él
  - a su lado
  lexicon: HALOT
  rationale: La preposición con pronombre expresa compañía o apoyo. «Con él» conserva la relación paralela con «con nosotros» y suena natural en español.
- source_word: זְרוֹעַ בָּשָׂר
  english_pob_choice: an arm of flesh
  chosen_spanish: un brazo de carne
  alternatives_spanish:
  - un brazo carnal
  - fuerza humana
  lexicon: HALOT
  rationale: Mantiene la metáfora hebrea de poder meramente humano frente al auxilio divino. «Brazo de carne» es fiel a la imagen y suficientemente inteligible; «fuerza humana» explicita el sentido pero pierde la figura.
- source_word: וְעִמָּנוּ
  english_pob_choice: but with us
  chosen_spanish: pero con nosotros
  alternatives_spanish:
  - y con nosotros
  lexicon: HALOT
  rationale: El contexto exige un contraste fuerte entre el poder humano y la ayuda de Yahvé. «Pero» expresa mejor esa oposición que una simple coordinación.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: transliteración del nombre divino en lugar de una sustitución por título.'
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  lexicon: HALOT
  rationale: Es la expresión de pacto estándar y se vierte de manera directa y natural en español.
- source_word: לְעָזְרֵנוּ
  english_pob_choice: to help us
  chosen_spanish: para ayudarnos
  alternatives_spanish:
  - a ayudarnos
  - para socorrernos
  lexicon: HALOT
  rationale: El infinitivo con ל expresa propósito. «Para ayudarnos» conserva el valor verbal y la intención del hebreo.
- source_word: וּלְהִלָּחֵם מִלְחֲמֹתֵינוּ
  english_pob_choice: to fight our battles
  chosen_spanish: para pelear nuestras batallas
  alternatives_spanish:
  - para luchar nuestras guerras
  - para combatir por nosotros
  lexicon: HALOT
  rationale: «Pelear nuestras batallas» reproduce bien el sentido bélico y la construcción hebrea con acusativo cognado sin volver la frase innecesariamente rígida.
- source_word: וַיִּסָּמְכ֣וּ
  english_pob_choice: relied on
  chosen_spanish: se apoyó
  alternatives_spanish:
  - confió en
  - descansó sobre
  lexicon: HALOT
  rationale: El verbo conserva la imagen de apoyarse/recargarse y, en contexto, equivale a confiar. «Se apoyó» mantiene esa base metafórica; el singular colectivo español funciona con «el pueblo».
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  lexicon: HALOT
  rationale: El colectivo hebreo se vierte naturalmente como «el pueblo» en español.
- source_word: עַל דִּבְרֵי
  english_pob_choice: on the words of
  chosen_spanish: en las palabras de
  alternatives_spanish:
  - sobre las palabras de
  - a causa de las palabras de
  lexicon: HALOT
  rationale: Con «apoyarse» la preposición en español más natural es «en». Se conserva el foco en las palabras pronunciadas por Ezequías.
- source_word: יְחִזְקִיָּהוּ
  english_pob_choice: Hezekiah
  chosen_spanish: Ezequías
  alternatives_spanish:
  - Hizquías
  lexicon: HALOT
  rationale: Se usa la forma española estándar del nombre real, ampliamente reconocible y fiel al referente bíblico.
- source_word: מֶלֶךְ יְהוּדָה
  english_pob_choice: king of Judah
  chosen_spanish: rey de Judá
  lexicon: HALOT
  rationale: La cadena constructa se traduce de manera directa y formal, manteniendo el título y el reino sin expansión interpretativa.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. El proyecto pide transliterarlo, y en español la forma más estable y readable es «Yahvé»; evita la sustitución litúrgica por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Contraste entre poder humano y ayuda divina
  english_pob_reading: Explicit adversative 'but with us is the LORD our God'
  chosen_spanish_reading: Contraste explícito con «pero con nosotros»
  alternative_spanish_readings:
  - Coordinación simple con «y con nosotros»
  rationale: La retórica del verso opone el brazo humano a la ayuda de Dios. «Pero» comunica esa oposición sin añadir contenido doctrinal fuera del texto.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'El texto coincide con el audit trail inglés vigente: se mantiene la metáfora de «brazo de carne», el contraste adversativo, el nombre divino transliterado y la clausula final sobre la respuesta del pueblo sin ajustes textuales relevantes.'
  spanish_consistency_notes:
  - Se conserva el paralelismo con «con nosotros» para reflejar la estructura del hebreo.
  - «Yahvé» sigue la terminología del proyecto y evita la sustitución por «SEÑOR».
  - La frase final usa singular colectivo («el pueblo se apoyó») de forma idiomática en español.
  - Se eligió «pelear nuestras batallas» para preservar el tono bélico y la relación con el objeto interno del hebreo.
