translation:
  language: es
  text: Y Yahvé nuestro Dios también entregó en nuestra mano a Og, rey de Basán[a], y a todo su pueblo, y lo abatimos hasta no dejarle ningún sobreviviente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, 'hasta que no le quedó ningún sobreviviente'.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio en forma transliterada, conforme al criterio del POB para יְהוָה. 'Yahvé' es la forma asentada en español para el Tetragrama y evita la sustitución por un título.
- source_word: וַיִּתֵּן
  english_pob_choice: gave
  chosen_spanish: entregó
  alternatives_spanish:
  - dio
  - puso
  lexicon: HALOT
  rationale: En el contexto militar, 'entregó' comunica la idea de que Dios puso al enemigo bajo control de Israel, manteniendo la fuerza del hebreo sin perder naturalidad en español.
- source_word: בְּיָדֵנוּ
  english_pob_choice: into our hand
  chosen_spanish: en nuestra mano
  alternatives_spanish:
  - en nuestras manos
  - en nuestro poder
  lexicon: HALOT
  rationale: Se preserva la imagen idiomática singular de 'mano' del hebreo. 'En nuestra mano' refleja mejor la forma fuente que la pluralización idiomática castellana.
- source_word: גַּם
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - incluso
  - además
  lexicon: HALOT
  rationale: '''También'' conserva el valor aditivo de גַּם y enlaza este episodio con la victoria previa mencionada en el contexto.'
- source_word: עוֹג מֶלֶךְ הַבָּשָׁן
  english_pob_choice: Og king of Bashan
  chosen_spanish: Og, rey de Basán
  alternatives_spanish:
  - Og, el rey de Basán
  - Og, rey de la tierra de Basán
  lexicon: HALOT
  rationale: Se mantiene el nombre propio y el título real de forma directa y clara. 'Basán' sigue la forma española estándar del topónimo.
- source_word: כָּל עַמּוֹ
  english_pob_choice: all his people
  chosen_spanish: todo su pueblo
  alternatives_spanish:
  - toda su gente
  - todo su pueblo, toda su gente
  lexicon: HALOT
  rationale: '''Pueblo'' reproduce con fidelidad עַם y es más amplio que ''ejército'', como en la decisión inglesa. El posesivo singular ''su'' conserva la referencia a Og.'
- source_word: וַנַּכֵּהוּ
  english_pob_choice: we struck him down
  chosen_spanish: lo derrotamos
  alternatives_spanish:
  - lo golpeamos
  - lo abatimos
  lexicon: HALOT
  rationale: Aunque el hebreo es literalmente 'golpeamos', en el contexto bélico la noción resultante es derrota total. 'Lo derrotamos' comunica el hecho con claridad en español, sin añadir una imagen corporal que puede sonar forzada.
- source_word: עַד בִּלְתִּי הִשְׁאִיר לוֹ שָׂרִיד
  english_pob_choice: until he had no survivor left
  chosen_spanish: hasta no dejarle sobreviviente
  alternatives_spanish:
  - hasta no dejarle ningún sobreviviente
  - hasta que no le quedó sobreviviente
  lexicon: HALOT
  rationale: Se conserva la idea de ausencia total de sobrevivientes. La construcción española evita una literalidad dura y poco natural, pero mantiene la relación con el dativo 'le' y el sustantivo 'sobreviviente'.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: 'Se sigue la política del proyecto para el Tetragrama: preservar el nombre personal de Dios en lugar de sustituirlo por un título. ''Yahvé'' es la forma española usada de manera transparente y auditable.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Intensidad del lenguaje de derrota total
  english_pob_reading: until he had no survivor left
  chosen_spanish_reading: hasta no dejarle sobreviviente
  alternative_spanish_readings:
  - hasta no dejarle ningún sobreviviente
  - hasta que no le quedó sobreviviente
  rationale: La frase mantiene la severidad del texto sin ampliar el alcance más allá del hebreo. No se introduce comentario teológico adicional ni se suaviza la destrucción total.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El pasaje coincide con el texto base y con la auditoría inglesa; no se registran revisiones aplicadas en el expediente, y la lectura española mantiene esa estabilidad sin introducir cambios interpretativos.
  spanish_consistency_notes:
  - Se conserva el nombre divino 'Yahvé' de manera consistente con el resto del proyecto.
  - Se mantiene la imagen idiomática de 'mano' para בְּיָדֵנוּ.
  - '''Sobreviviente'' se usa para reproducir la idea de remanente total, en línea con el audit trail inglés.'
  - La puntuación española sigue una estructura natural de enumeración y cláusula consecutiva, sin alterar el orden lógico del hebreo.
