translation:
  language: es
  text: Y me dejaré hallar por ustedes —declara Yahvé—, y restauraré su fortuna[a] y los reuniré de entre todas las naciones y de todos los lugares adonde los he expulsado, declara Yahvé, y los haré volver al lugar de donde los envié al exilio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «restauraré su cautiverio» o «traeré de vuelta a sus cautivos». La expresión hebrea es un modismo para revertir una condición de exilio y aflicción.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנִמְצֵאתִי לָכֶם
  english_pob_choice: I will let myself be found by you
  chosen_spanish: Y me dejaré hallar por ustedes
  alternatives_spanish:
  - y seré hallado por ustedes
  - y me haré encontrar por ustedes
  lexicon: HALOT
  rationale: El nifal de מצא conserva la idea de ser hallado, con iniciativa divina. En español, «me dejaré hallar» comunica bien esa pasividad aparente con sujeto agente implícito, sin volverlo demasiado interpretativo.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: —declara Yahvé—
  alternatives_spanish:
  - —dice Yahvé—
  - —oráculo de Yahvé—
  lexicon: HALOT
  rationale: La fórmula profética necesita un registro solemne y natural en español. «Declara Yahvé» mantiene el tono declarativo y la referencia directa al nombre divino sin sustituirlo por un título.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: transliteración del nombre divino como «Yahvé», no la sustitución por «SEÑOR».'
- source_word: וְשַׁבְתִּי אֶת שביתכם
  english_pob_choice: I will restore your fortunes
  chosen_spanish: restauraré su fortuna
  alternatives_spanish:
  - restauraré su cautiverio
  - traeré de vuelta a sus cautivos
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y, en este contexto de exilio, apunta a la reversión de una condición de despojo. «Restauraré su fortuna» conserva el valor idiomático reconocido y evita una traducción demasiado literal que sonaría extraña en español.
- source_word: וְקִבַּצְתִּי אֶתְכֶם
  english_pob_choice: and gather you
  chosen_spanish: y los reuniré
  alternatives_spanish:
  - y los juntaré
  - y los congregaré
  lexicon: HALOT
  rationale: קבץ en contextos de restauración expresa reunir a los dispersos. «Reunir» es claro, natural y fiel al movimiento de recopilación del texto.
- source_word: מִכָּל הַגּוֹיִם
  english_pob_choice: from all the nations
  chosen_spanish: de entre todas las naciones
  alternatives_spanish:
  - de todas las naciones
  - de entre todos los pueblos
  lexicon: HALOT
  rationale: «De entre» ayuda a expresar que la recolección ocurre desde el medio de las naciones, no meramente desde un conjunto abstracto. «Naciones» mantiene la referencia directa a גּוֹיִם.
- source_word: וּמִכָּל הַמְּקוֹמוֹת
  english_pob_choice: and from all the places
  chosen_spanish: y de todos los lugares
  alternatives_spanish:
  - y de cada lugar
  - y de todos los sitios
  lexicon: HALOT
  rationale: La pareja paralela amplía el alcance del exilio más allá de las naciones. «Lugares» es el equivalente más directo y sobrio en español.
- source_word: אֲשֶׁר הִדַּחְתִּי אֶתְכֶם שָׁם
  english_pob_choice: where I have driven you
  chosen_spanish: adonde los he arrojado
  alternatives_spanish:
  - donde los he desterrado
  - donde los he expulsado
  lexicon: HALOT
  rationale: הִדַּחְתִּי expresa expulsión o alejamiento por juicio. «Arrojado» conserva la fuerza de un desplazamiento violento; en español suena más fuerte que «dispersado» y mantiene el matiz de juicio divino.
- source_word: וַהֲשִׁבֹתִי אֶתְכֶם
  english_pob_choice: and I will bring you back
  chosen_spanish: y los haré volver
  alternatives_spanish:
  - y los traeré de vuelta
  - y los devolveré
  lexicon: HALOT
  rationale: La causatividad del hifil de שוב queda bien expresada con «hacer volver». Es idiomático en español y conserva el movimiento de retorno sin sobrecargar el verso.
- source_word: אֶל הַמָּקוֹם
  english_pob_choice: to the place
  chosen_spanish: al lugar
  alternatives_spanish:
  - al sitio
  - a la tierra
  lexicon: HALOT
  rationale: מָקוֹם es simplemente «lugar»; no hace falta especificar más. «Al lugar» mantiene la referencia geográfica abierta del hebreo.
- source_word: אֲשֶׁר הִגְלֵיתִי אֶתְכֶם מִשָּׁם
  english_pob_choice: from which I sent you into exile
  chosen_spanish: de donde los hice ir al exilio
  alternatives_spanish:
  - de donde los exilié
  - de donde los desterré
  lexicon: HALOT
  rationale: גלה en hifil implica llevar al exilio/desterrar. «Hice ir al exilio» mantiene la causatividad y evita una formulación demasiado técnica o forzada en español.
theological_decisions:
- issue: Idiomatismo de שׁוּב אֶת־שְׁבוּת/שְׁבִית
  english_pob_reading: I will restore your fortunes
  chosen_spanish_reading: restauraré su fortuna
  alternative_spanish_readings:
  - restauraré su cautiverio
  - traeré de vuelta a sus cautivos
  rationale: El hebreo usa una expresión idiomática para revertir una condición de exilio y ruina. En este versículo, el paralelismo con «reuniré» y «los haré volver» ya explicita el sentido exílico, por lo que la versión idiomática en español es la más fluida y fiel al efecto global del texto.
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: El texto sigue de cerca el audit trail inglés sin copiar mecánicamente su sintaxis. Se conserva la decisión central sobre el modismo de restauración, el nombre divino Yahvé y la fuerza de la acción de exilio/retorno, ajustando el orden y la puntuación para que el verso sea natural y publicable en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה de manera consistente con el proyecto.
  - Se usa una voz verbal directa y solemne compatible con el estilo profético.
  - «Naciones», «lugares» y «exilio» conservan el campo semántico de dispersión y retorno sin introducir interpretaciones ajenas al hebreo.
