  yaml_path: translation/deuterocanon/wisdom_of_solomon/001/006.yaml
  text: For wisdom is a spirit that loves humanity[a], and it will not acquit a blasphemer for the words of his lips; for God is witness of his inner being[b], and a true observer of his heart and a hearer of his tongue.
  footnotes:
