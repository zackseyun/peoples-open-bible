    text: O «se regocijen sobre mí» o «exulten sobre mí». El hebreo expresa gozo hostil o júbilo burlón ante la caída del salmista.
    reason: lexical_alternative
  revision_rationale: La revisión fortalece la fidelidad al expediente POB y mejora la naturalidad del español. «Sea avergonzado» refleja mejor la deshonra pública contextual sin eliminar la alternativa más interna en nota. «Triunfen sobre mí» evita un calco poco idiomático y mantiene en nota el matiz de exultación hostil preservado por el inglés. Se elimina la nota innecesaria sobre «Dios mío» porque no añade una alternativa relevante.
