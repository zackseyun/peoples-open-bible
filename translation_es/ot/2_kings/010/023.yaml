base_translation:
  language: en
  yaml_path: translation/ot/2_kings/010/023.yaml
  text: Then Jehu and Jehonadab son of Rechab entered the house of Baal[a], and he said to the servants of Baal, “Search and see that there is no servant of Yahweh here among you, but only servants of Baal.”
