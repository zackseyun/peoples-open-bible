    issue: «Engrandézcanlo muchísimo» suena coloquial y poco litúrgico
    rationale: Aunque comunica intensidad, «muchísimo» reduce la dignidad del tono himnico. Una formulación como «exáltenlo en gran manera» preserva mejor la fuerza de ὑπερυψοῦτε en español bíblico natural.
