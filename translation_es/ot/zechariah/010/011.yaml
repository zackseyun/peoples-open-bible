base_translation:
  language: en
  yaml_path: translation/ot/zechariah/010/011.yaml
  text: He will pass through the sea of distress and strike the waves of the sea[a], and all the depths of the Nile will dry up. The pride of Assyria will be brought down[c][b], and the scepter of Egypt will depart.
  footnotes:
  - marker: a
    text: Or 'through a sea of distress' or 'through the troubled sea.' The Hebrew phrase is compact and may evoke exodus imagery rather than identify a literal body of water only.
    reason: lexical_alternative
  - marker: b
    text: Hebrew יְאֹר can mean 'river,' but in an Egyptian setting it commonly refers to the Nile.
    reason: lexical_alternative
  - marker: c
    text: Or 'the rod of Egypt.' 'Scepter' brings out the likely sense of ruling power.
    reason: lexical_alternative
