translation:
  language: es
  text: El fuego consumió a sus jóvenes varones,[a] y sus vírgenes no fueron celebradas en canto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sus doncellas»; el sentido probablemente alude a la ausencia de cantos de boda para las jóvenes a causa de la devastación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּחוּרָיו
  english_pob_choice: his young men
  chosen_spanish: sus jóvenes
  alternatives_spanish:
  - sus muchachos
  - sus jóvenes varones
  - sus hombres jóvenes
  lexicon: HALOT
  rationale: בָּחוּר designa a un hombre joven, a menudo en edad de fuerza o de matrimonio; en español, «jóvenes» transmite naturalmente esa idea sin añadir un matiz demasiado técnico. Mantiene el paralelismo con «vírgenes» y evita forzar «escogidos», que aquí es menos probable.
- source_word: אָכְלָה אֵשׁ
  english_pob_choice: Fire consumed
  chosen_spanish: El fuego consumió
  alternatives_spanish:
  - El fuego devoró
  - Un fuego consumió
  lexicon: HALOT
  rationale: Con fuego como sujeto, אָכַל funciona idiomáticamente como «consumir/devorar». «Consumió» conserva la imagen destructiva del hebreo y suena natural en español bíblico moderno.
- source_word: וּבְתוּלֹתָיו
  english_pob_choice: and his virgins
  chosen_spanish: sus vírgenes
  alternatives_spanish:
  - sus doncellas
  - sus jóvenes mujeres
  lexicon: HALOT
  rationale: בְּתוּלָה lleva el sentido explícito de virginidad; por eso «vírgenes» es la opción más fiel y mantiene la correspondencia con «jóvenes». En español, «doncellas» sería más tradicional pero menos transparente.
- source_word: לֹא הוּלָּלוּ
  english_pob_choice: were not praised in song
  chosen_spanish: no fueron cantadas
  alternatives_spanish:
  - no fueron celebradas en canto
  - no recibieron cantos nupciales
  lexicon: HALOT
  rationale: El Pual de הלל aquí apunta a ser celebrado o alabado, probablemente en cantos asociados al matrimonio. «No fueron cantadas» preserva la idea de celebración poética sin especificar demasiado en el texto principal; la alusión cultural queda implícita, como en la auditoría inglesa.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo y la auditoría inglesa: mantiene el paralelismo «jóvenes / vírgenes», conserva la metáfora del fuego que consume y deja implícita la posible referencia cultural a cantos de boda sin introducirla en el cuerpo del versículo.'
  spanish_consistency_notes:
  - Se prefirió «vírgenes» frente a «doncellas» para conservar la fuerza léxica de בְּתוּלָה.
  - «No fueron cantadas» intenta reproducir el valor pasivo de הוּלָּלוּ sin sobreespecificar el tipo de canto en el texto principal.
  - Se evitó «SEÑOR» u այլ terminología no pertinente, pues este versículo no contiene el nombre divino.
