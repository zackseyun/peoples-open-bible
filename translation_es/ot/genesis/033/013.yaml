revisions:
- from: 'Pero él le dijo[a]: «Mi señor sabe que los niños son frágiles, y que los rebaños y los vacunos que crían están a mi cargo. Si los fuerzan por un solo día, morirán todos los rebaños».'
  to: 'Pero él le dijo[a]: «Mi señor sabe que los niños son frágiles, y que los rebaños y los vacunos que crían están a mi cargo. Si los hacen avanzar demasiado por un solo día, morirá todo el rebaño».'
  rationale: 'Se conserva la redacción general del borrador, pero se corrigen dos puntos para ajustarlo mejor al hebreo y al rastro de decisiones del POB inglés: se hace explícito el sentido de apremiar el ganado en exceso («los hacen avanzar demasiado») y se restaura la recapitulación colectiva singular de הַצֹּאן («morirá todo el rebaño»).'
