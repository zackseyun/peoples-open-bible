translation:
  text: '1[13:4]. And now, my children, I command you: fear the Lord your God with all your heart, and walk in sincerity according to all his law. 2. And you also, teach your children letters, so that they may have understanding throughout all their life, reading the law of God without ceasing. 3. For everyone who comes to know the law of the Lord will be honored, and he will not be a stranger wherever he goes. 4[13:5]. Indeed, he will gain many friends more than parents, and many among men will desire to serve him and to hear the law from his mouth. 5. Therefore do righteousness, my children, upon the earth, so that you may find it in the heavens. 6. And sow good things in your souls, and you will find them in your life. But if you sow evil things, you will reap every turmoil and affliction. 7. Acquire wisdom in the fear of God, because if captivity comes, and cities and lands are destroyed, and gold and silver and every possession perishes, no one can take away the wise man''s wisdom, except the blindness of ungodliness and the hardening of sin. 8. For if anyone keeps himself from these evil works, then wisdom will become for him splendid even among enemies, and in a foreign land a homeland, and in the midst of foes he will be found a friend. 9. Everyone who teaches good things and does them will share the throne of kings[13:8], just as Joseph my brother also did.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '13:4'
    text: The phrase 'many friends more than parents' is difficult. It likely means that the learned person gains many friends beyond the circle of family, or more than one ordinarily receives from parental standing alone.
    reason: lexical_alternative
  - marker: '13:5'
    text: Greek literally, 'do righteousness ... that you may find [it] in the heavens.' The object after 'find' is implicit.
    reason: alternative_reading
  - marker: '13:8'
    text: 'The Greek is highly compressed: wisdom becomes ''splendid among enemies,'' and a person finds ''homeland'' even in foreign territory.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἁπλότης
  chosen: simplicity
  alternatives:
  - integrity
  - single-heartedness
  lexicon: LSJ
  rationale: Preserves the ethical theme of undivided, straightforward conduct without over-interpreting it as merely intellectual simplicity. 'Simplicity' also fits testamentary paraenesis.
- source_word: γράμματα
  chosen: letters
  alternatives:
  - literacy
  - learning
  - writings
  lexicon: LSJ
  rationale: The Greek most directly refers to letters/basic learning. 'Teach your children letters' preserves the concrete emphasis on literacy as the means to continual reading of the law.
- source_word: σύνεσις
  chosen: understanding
  alternatives:
  - insight
  - discernment
  lexicon: LSJ
  rationale: A broad moral-intellectual term here; 'understanding' is natural English and suits the educational context.
- source_word: ξένος
  chosen: stranger
  alternatives:
  - foreigner
  - outsider
  lexicon: LSJ
  rationale: Retains the social sense that one instructed in the law will find honor and belonging wherever he goes.
- source_word: δουλεῦσαι
  chosen: serve
  alternatives:
  - be enslaved to
  - attend
  lexicon: LSJ
  rationale: Although the verb can denote slavery, here the sense is voluntary attendance upon a wise teacher; 'serve' best fits the social-honor context.
- source_word: δικαιοσύνη
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: In this paraenetic setting the term denotes upright conduct before God. 'Righteousness' preserves the moral-religious force, while 'justice' remains a viable alternative.
- source_word: ψυχαῖς
  chosen: souls
  alternatives:
  - lives
  - inner selves
  lexicon: LSJ
  rationale: Keeps the anthropological texture of the Greek and the metaphor of sowing within the inner person.
- source_word: ταραχή
  chosen: turmoil
  alternatives:
  - trouble
  - disturbance
  lexicon: LSJ
  rationale: '''Turmoil'' captures the broad inner and outward unrest implied by the term and pairs well with ''affliction.'''
- source_word: κτήσασθε
  chosen: acquire
  alternatives:
  - gain
  - obtain
  lexicon: LSJ
  rationale: A strong imperative of obtaining wisdom as a prized possession; 'acquire' preserves that nuance.
- source_word: φόβῳ Θεοῦ
  chosen: the fear of God
  alternatives:
  - reverence for God
  lexicon: LSJ
  rationale: Maintains the traditional biblical idiom and its covenantal-moral weight.
- source_word: πώρωσις
  chosen: hardening
  alternatives:
  - callousness
  - obduracy
  lexicon: BDAG
  rationale: '''Hardening'' is biblically resonant and pairs naturally with ''blindness'' as a moral-spiritual incapacity.'
- source_word: παρὰ τοῖς πολεμίοις λαμπρά
  chosen: splendid even among enemies
  alternatives:
  - glorious before enemies
  - conspicuous among foes
  lexicon: LSJ
  rationale: The phrase is compressed in Greek; this rendering preserves the sense that wisdom remains radiant and honored even in hostile settings.
- source_word: πατρίς
  chosen: homeland
  alternatives:
  - fatherland
  - native land
  lexicon: LSJ
  rationale: In the paradox 'in a foreign land a homeland,' 'homeland' is idiomatic and preserves the existential sense of belonging.
- source_word: σύνθρονος ἔσται βασιλέων
  chosen: will sit on thrones with kings
  alternatives:
  - will share the throne of kings
  - will be enthroned with kings
  lexicon: LSJ
  rationale: Makes explicit the throne-sharing image inherent in σύνθρονος while remaining readable English.
