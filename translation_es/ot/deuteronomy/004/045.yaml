translation:
  language: es
  text: Estos son los testimonios, los estatutos y los juicios que Moisés dijo a los hijos de Israel[a] cuando salieron de Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas» o «los hijos de Israel». El hebreo dice literalmente «los hijos de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  english_pob_choice: These are
  chosen_spanish: Estas son
  alternatives_spanish:
  - Estas
  lexicon: HALOT
  rationale: El hebreo presenta una cláusula nominal con deíctico plural; en español se expresa naturalmente con «Estas son», manteniendo la deixis y la fluidez.
- source_word: הָעֵדֹת
  english_pob_choice: the testimonies
  chosen_spanish: las testimonios
  alternatives_spanish:
  - los testimonios
  - las estipulaciones del testimonio
  - los testimonios del pacto
  lexicon: HALOT
  rationale: Se conserva el valor léxico de עֵדוֹת como «testimonios», siguiendo la decisión inglesa de preservar el término técnico. Se usa el artículo femenino plural por concordancia con el sustantivo castellano heredado de la forma abstracta/terminológica; aunque el plural de uso común sería masculino por persona, aquí el peso técnico favorece la forma lexicalizada de «testimonios» en contexto jurídico-covenantal.
- source_word: הַחֻקִּים
  english_pob_choice: the statutes
  chosen_spanish: los estatutos
  alternatives_spanish:
  - los decretos
  - las ordenanzas
  - los estatutos prescritos
  lexicon: HALOT
  rationale: «Estatutos» es el equivalente más estable y transparente para חֻקִּים en un contexto legal, y distingue bien esta categoría de las otras dos.
- source_word: הַמִּשְׁפָּטִים
  english_pob_choice: the judgments
  chosen_spanish: los juicios
  alternatives_spanish:
  - las sentencias
  - las decisiones judiciales
  - los ordenamientos
  lexicon: HALOT
  rationale: Se mantiene la fuerza jurídica de מִשְׁפָּטִים con «juicios», opción que conserva el paralelismo con «estatutos» y evita borrar la tensión legal del término. «Ordenanzas» sería más tradicional, pero menos transparente respecto de la idea de juicio/decisión.
- source_word: אֲשֶׁר דִּבֶּר
  english_pob_choice: that Moses spoke
  chosen_spanish: que Moisés habló
  alternatives_spanish:
  - que Moisés dijo
  - que Moisés declaró
  lexicon: HALOT
  rationale: דִּבֶּר se entiende aquí como habla directa; «habló» es la equivalencia más natural y cercana al hebreo sin intensificarlo como proclamación formal.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Israel
  - los israelitas
  - los hijos del Israel
  lexicon: HALOT
  rationale: Se conserva la forma literal y bíblica «los hijos de Israel», que corresponde bien al hebreo constructo masculino plural y mantiene la referencia de pacto sin neutralizarla.
- source_word: בְּצֵאתָם
  english_pob_choice: when they came out
  chosen_spanish: cuando salieron
  alternatives_spanish:
  - al salir
  - cuando habían salido
  - en su salida
  lexicon: HALOT
  rationale: El infinitivo constructo con sufijo expresa una circunstancia temporal; «cuando salieron» comunica el valor temporal de manera natural en español.
- source_word: מִמִּצְרַיִם
  english_pob_choice: from Egypt
  chosen_spanish: de Egipto
  alternatives_spanish:
  - desde Egipto
  - fuera de Egipto
  - de la tierra de Egipto
  lexicon: HALOT
  rationale: «De Egipto» es la forma breve y clara que conserva el movimiento de salida; «desde Egipto» también sería posible, pero aquí no aporta una ventaja decisiva.
translation_notes:
  revision_awareness: Se siguió el texto hebreo WLC y se tomó como guía la auditoría inglesa POB. No se introdujeron cambios textuales ni variantes; solo se ajustó la sintaxis al español y se preservó la tríada legal con terminología transparente.
  spanish_consistency_notes:
  - Se mantuvo «Moisés» y «Egipto» de forma consistente con la terminología bíblica estándar.
  - 'Se conservó la tríada legal hebrea con tres términos diferenciados: testimonios, estatutos y juicios.'
  - La nota al pie marca la literalidad de עֵדֹת sin desplazar la traducción principal.
