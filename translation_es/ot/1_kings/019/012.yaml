- from: Y después del terremoto, un fuego; Yahvé no estaba en el fuego. Y después del fuego, una voz[a] de quietud delicada.
  to: Y después del terremoto[a], un fuego; Yahvé no estaba en el fuego. Y después del fuego, un sonido de tenue quietud.
  rationale: 'Se revisa la frase final para reflejar mejor las decisiones auditadas: «sonido» conserva la ambigüedad de קוֹל sin sugerir una voz personal, y «tenue» representa mejor דַקָּה que «delicada». Se mantiene la rareza poética de la construcción hebrea en un español claro y digno. Se añade la nota al primer fenómeno siguiendo el precedente del expediente inglés, preservando alternativas tradicionales y la literalidad difícil del hebreo.'
