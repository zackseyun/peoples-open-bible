translation:
  language: es
  text: Tú ensanchas mis pasos debajo de mí[a], y mis tobillos no han resbalado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «Tú ensanchas mis pasos debajo de mí». Este modismo hebreo expresa dar apoyo firme o espacio amplio para pisar con seguridad.
    reason: lexical_alternative
  - marker: b
    text: 'O: «mis tobillos no han cedido» o «mis tobillos no han dado traspié».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּרְחִיב
  english_pob_choice: You widen
  chosen_spanish: Tú ensanchas
  alternatives_spanish:
  - Tú haces anchos
  - Tú amplías
  lexicon: HALOT
  rationale: El hifil de רחב expresa hacer ancho o espacioso. «Ensanchas» conserva bien el valor causativo y suena natural en español poético y bíblico.
- source_word: צַעֲדַי
  english_pob_choice: my steps
  chosen_spanish: mis pasos
  alternatives_spanish:
  - mis pasos
  - mi andar
  - mi marcha
  lexicon: HALOT
  rationale: El sustantivo se refiere a «pasos» o «zancadas». Se evita una paráfrasis más interpretativa para mantener la imagen concreta del movimiento seguro.
- source_word: תַּחְתֵּנִי
  english_pob_choice: beneath me
  chosen_spanish: debajo de mí
  alternatives_spanish:
  - bajo mí
  - debajo de mí
  lexicon: HALOT
  rationale: La preposición indica ubicación bajo. «Debajo de mí» comunica la relación espacial con claridad y sin forzar el español.
- source_word: מָעֲדוּ
  english_pob_choice: have not given way
  chosen_spanish: no han resbalado
  alternatives_spanish:
  - no han dado traspié
  - no han vacilado
  - no se han desviado
  lexicon: HALOT
  rationale: Con tobillos como sujeto, el verbo puede expresar resbalar o ceder. «No han resbalado» preserva la imagen corporal y el sentido de estabilidad. La alternativa «han dado traspié» también es posible, pero suena menos directa aquí.
- source_word: קַרְסֻלַּי
  english_pob_choice: my ankles
  chosen_spanish: mis tobillos
  alternatives_spanish:
  - mis tobillos
  - mis articulaciones del tobillo
  lexicon: HALOT
  rationale: El término designa específicamente la zona del tobillo. «Tobillos» es preciso y entendible en español moderno; «pies» sería demasiado general.
translation_notes:
  revision_awareness: El texto hebreo describe a Yahvé como quien ensancha el camino/pasos del hablante, en paralelo con la imagen de tobillos firmes. La revisión inglesa reciente movió la primera cláusula de «the ground» a «my steps» para reflejar mejor el hebreo; el español sigue esa corrección sin convertirla en una paráfrasis explicativa.
  spanish_consistency_notes:
  - 'Se mantiene el paralelismo corporal de la línea: pasos/tobillos.'
  - No se introduce 'SEÑOR'; el verso no contiene el nombre divino explícito en la forma hebrea dada, pero el sujeto implícito es Dios por el contexto poético de la perícopa.
  - Se usa español bíblico moderno sin arcaísmos innecesarios ni tecnicismos excesivos.
