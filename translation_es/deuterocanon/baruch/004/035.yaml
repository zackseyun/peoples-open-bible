translation:
  language: es
  text: Porque fuego vendrá sobre ella del Eterno[a] por muchos días, y será habitada por demonios por muchísimo tiempo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del Perdurable». El griego tiene un adjetivo sustantivado, literalmente «del perdurable [uno]», usado aquí como título divino.
    reason: lexical_alternative
lexical_decisions:
- source_word: πῦρ
  english_pob_choice: fire
  chosen_spanish: fuego
  alternatives_spanish:
  - un fuego
  lexicon: BDAG
  rationale: El sustantivo es directo y la imagen de juicio se conserva mejor con «fuego» sin añadir determinación innecesaria.
- source_word: ἐπελεύσεται
  english_pob_choice: will come upon
  chosen_spanish: vendrá sobre
  alternatives_spanish:
  - vendrá
  - sobrevendrá
  - caerá sobre
  lexicon: BDAG
  rationale: La idea es de un acontecimiento que irrumpe sobre la ciudad en juicio; «vendrá sobre» mantiene esa fuerza sin sonar forzado en español.
- source_word: αὐτῇ
  english_pob_choice: her
  chosen_spanish: ella
  alternatives_spanish:
  - ello
  - esa ciudad
  lexicon: BDAG
  rationale: La ciudad está personificada y es femenina en el contexto; «ella» preserva esa personificación, como hace el inglés POB con «her».
- source_word: παρὰ τοῦ αἰωνίου
  english_pob_choice: from the Everlasting One
  chosen_spanish: de parte del Eterno
  alternatives_spanish:
  - del Eterno
  - de parte del Eterno[a]
  - del Dios Eterno
  lexicon: BDAG
  rationale: El griego usa un adjetivo sustantivado como título divino. «El Eterno» conserva ese valor titular y evita introducir «Dios» donde el griego no lo expresa de forma explícita.
- source_word: εἰς ἡμέρας μακράς
  english_pob_choice: for many days
  chosen_spanish: por muchos días
  alternatives_spanish:
  - por largos días
  - por muchos días y
  - durante muchos días
  lexicon: BDAG
  rationale: La expresión indica duración prolongada; «por muchos días» reproduce el sentido de manera natural y cercana al griego.
- source_word: κατοικηθήσεται
  english_pob_choice: will be inhabited
  chosen_spanish: será habitada
  alternatives_spanish:
  - será poblada
  - será habitada por
  - será ocupada
  lexicon: BDAG
  rationale: La pasiva futura comunica que el lugar será objeto de habitación; «será habitada» es claro y fiel al valor verbal.
- source_word: δαιμονίων
  english_pob_choice: demons
  chosen_spanish: demonios
  alternatives_spanish:
  - espíritus malignos
  - demonios
  lexicon: BDAG
  rationale: En este contexto judío-griego de juicio, el término apunta a seres espirituales hostiles. «Demonios» es el equivalente más preciso y reconocible.
- source_word: τὸν πλεῖονα χρόνον
  english_pob_choice: for a very long time
  chosen_spanish: por muchísimo tiempo
  alternatives_spanish:
  - por mucho tiempo
  - por un tiempo muy largo
  - por la mayor parte del tiempo
  lexicon: BDAG
  rationale: La frase idiomática señala una prolongación intensa; «por muchísimo tiempo» conserva el énfasis del inglés POB sin volverlo pedestre.
theological_decisions:
- issue: Título divino en τοῦ αἰωνίου
  english_pob_reading: the Everlasting One
  chosen_spanish_reading: el Eterno
  alternative_spanish_readings:
  - el Eterno One
  - el Eterno Dios
  - el Eterno
  rationale: El texto griego presenta un adjetivo sustantivado con referencia divina. «El Eterno» mantiene el carácter titular y la ambigüedad respetuosa del original, sin convertirlo en una paráfrasis más explícita que el griego.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable modern Spanish, not archaic masking conventions.'
- issue: Duración doble del castigo
  english_pob_reading: for many days ... for a very long time
  chosen_spanish_reading: por muchos días ... por muchísimo tiempo
  alternative_spanish_readings:
  - por muchos días ... por largo tiempo
  - por muchos días ... por un tiempo muy largo
  rationale: 'El griego repite dos expresiones temporales con matiz distinto: una duración prolongada y luego una prolongación aún más marcada. El español conserva ambas sin fusionarlas.'
  doctrine_reference: Consistency with source structure and preservation of rhetorical emphasis.
- issue: Presencia de demonios en un oráculo de ruina
  english_pob_reading: she will be inhabited by demons
  chosen_spanish_reading: será habitada por demonios
  alternative_spanish_readings:
  - será habitada por espíritus malignos
  - habitarán demonios en ella
  rationale: La construcción pasiva y el léxico mantienen el juicio sobre la ciudad arruinada. «Demonios» conserva la carga teológica del contexto judío-griego sin suavizarla.
  doctrine_reference: Lexical consistency for δαιμόνια in hostile-spiritual contexts.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente, que reubicó la frase temporal final para reflejar mejor el griego. En español se respetó esa misma estructura: primero «por muchos días» y luego «por muchísimo tiempo», sin invertir el orden ni fusionar los matices temporales.'
  spanish_consistency_notes:
  - Se mantuvo «demonios» para δαιμόνια, en paralelo con la decisión inglesa documentada.
  - Se usó «El Eterno» como equivalente de un título divino sustantivado, evitando «SEÑOR» como convención de máscara.
  - La personificación de la ciudad se conservó con el pronombre femenino «ella».
  - La preposición «de parte del» expresa bien el matiz de origen/judicial de παρὰ en este contexto.
