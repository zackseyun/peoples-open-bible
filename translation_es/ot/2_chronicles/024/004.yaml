translation:
  language: es
  text: Después de esto, estuvo en el corazón de Joás[a] renovar la casa de Yahvé[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «estuvo en el corazón de Joás»; es decir, surgió en él la intención o el propósito de hacerlo.'
    reason: lexical_alternative
  - marker: b
    text: Lit. «la casa de Yahvé»; es decir, el templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי אַחֲרֵי כֵן
  english_pob_choice: After this
  chosen_spanish: Después de esto
  alternatives_spanish:
  - Más tarde
  - Y aconteció después de esto
  lexicon: HALOT
  rationale: La secuencia marca un nuevo momento narrativo. «Después de esto» conserva el valor temporal de transición sin la rigidez de un calco como «y aconteció».
- source_word: הָיָה עִם לֵב יוֹאָשׁ
  english_pob_choice: it was in the heart of Joash
  chosen_spanish: fue el propósito del corazón de Joás
  alternatives_spanish:
  - estuvo en el corazón de Joás
  - Joás lo tuvo en mente
  - Joás dispuso su corazón
  lexicon: HALOT
  rationale: El hebreo expresa una intención interior asociada al «corazón». En español, «el propósito del corazón» comunica esa resolución interna con naturalidad, sin perder la imagen del centro volitivo/afectivo. «Dispuso su corazón» suena más interpretativo; «lo tuvo en mente» reduce demasiado la fuerza idiomática.
- source_word: לְחַדֵּשׁ
  english_pob_choice: to restore
  chosen_spanish: renovar
  alternatives_spanish:
  - restaurar
  - reparar
  lexicon: HALOT
  rationale: El verbo puede significar renovar, restaurar o reparar. Dado que se trata de la casa del Yahvé en contexto de reforma/rehabilitación, «renovar» mantiene el sentido de hacer nuevo otra vez y es más amplio que «reparar». «Restaurar» es viable, pero en español suele sonar más enfocado a devolver a un estado previo que a la acción de renovación en sí.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa del SEÑOR
  lexicon: HALOT
  rationale: Se conserva la expresión literal «casa de Yahvé», coherente con la política del proyecto de no sustituir el nombre divino por un título. «Templo de Yahvé» es una glosa contextual válida, pero menos cercana al hebreo. «Casa del SEÑOR» no se adopta porque ocultaría el nombre propio.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se traduce el Tetragrámaton con «Yahvé» según la norma del proyecto, preservando el nombre personal del Dios del pacto en lugar de un sustituto reverencial.
theological_decisions:
- issue: Nombre divino יְהוָה en una fórmula de templo
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La lectura adoptada mantiene el nombre personal divino sin mascarlo como título. En un contexto de templo, esto preserva la referencia al pacto y evita perder la fuerza teológica del texto hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Imagen idiomática del corazón como sede de intención
  english_pob_reading: it was in the heart of Joash
  chosen_spanish_reading: fue el propósito del corazón de Joás
  alternative_spanish_readings:
  - Joás decidió
  - Joás se propuso
  rationale: La versión española conserva la interioridad del hebreo sin reducirla a una mera decisión intelectual. «Propósito del corazón» refleja la combinación de intención, resolución y afecto inherente al uso semítico de «corazón».
  doctrine_reference: Lexical theology of לֵב / heart as center of intention
- issue: Verbo de rehabilitación del santuario
  english_pob_reading: to restore
  chosen_spanish_reading: renovar
  alternative_spanish_readings:
  - restaurar
  - reparar
  rationale: 'No hay una tensión doctrinal, pero sí una decisión semántica: el texto habla de renovar la casa de Yahvé, no simplemente de arreglarla. «Renovar» sostiene mejor el alcance del verbo hebreo en este contexto.'
  doctrine_reference: HALOT on לְחַדֵּשׁ
translation_notes:
  revision_awareness: 'Se siguió el último pase revisado sin cambios sustanciales (status: high_agreement; unchanged: true). La redacción española mantiene la secuencia narrativa, la metáfora del corazón y la referencia explícita al nombre divino conforme al audit trail en inglés.'
  spanish_consistency_notes:
  - Se emplea «Yahvé» de manera consistente para יְהוָה.
  - Se conserva «casa de Yahvé» en el texto principal y «templo» solo en nota explicativa.
  - La metáfora del «corazón» se mantiene en nota, aunque el texto principal la naturaliza como «propósito del corazón».
  - La puntuación y el uso de comas siguen la sintaxis natural del español moderno.
