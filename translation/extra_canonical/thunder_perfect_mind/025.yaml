translation:
  text: 'The shame and the boldness[a].

    I am shameless; I am ashamed.

    I am hard, and I am trembling.

    I am the war and the peace; within me they are.

    I am she[g][f][e][d][c][b]; heed me.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ⲡⲁⲣⲣⲏⲥⲓⲁ can be glossed as ‘frank speech’ or ‘outspokenness.’ I chose ‘boldness’
      for cadence while keeping the core sense.
    reason: lexical_alternative
  - marker: b
    text: The reading of ϫⲓⲡⲏⲧ is uncertain; ‘openness’ is tentative. An alternative
      could be ‘opening’ or another term paired with ‘silence.’
    reason: alignment_note
  - marker: c
    text: The imperative sense ‘heed me’ for ⲧⲣⲁⲉⲓⲏⲟⲩ is provisional, fitting Thunder’s
      recurring summons; confirmation against a reliable transcription is recommended.
    reason: alignment_note
  - marker: d
    text: Or 'The silence'.
    reason: previous_rendering
  - marker: e
    text: Or 'I am a silence'.
    reason: previous_rendering
  - marker: f
