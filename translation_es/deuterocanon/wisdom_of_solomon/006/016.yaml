review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la personificación femenina de la Sabiduría y la mayoría de las unidades semánticas del griego. Sin embargo, dos elecciones debilitan la fidelidad: «rodea buscando» no expresa naturalmente περιέρχεται ζητοῦσα (‘va de un lado a otro / anda buscando’), y «los encuentra» reduce la iniciativa de ὑπαντᾷ αὐτοῖς, que es más bien ‘sale a su encuentro’ o ‘les sale al encuentro’. Además, el borrador omite explícitamente el pronombre dativo en la segunda cláusula; en español conviene decir «se les aparece».'
  spanish_quality_summary: 'El español es generalmente claro, pero «rodea buscando» suena poco natural y puede sugerir ‘cercar’ más que ‘ir de un lado a otro’. «Se aparece con benevolencia en los senderos» también mejora al añadir el complemento indirecto: «se les aparece favorablemente en los senderos». La frase final suena más idiomática y fiel con «les sale al encuentro en todo propósito».'
  glossary_alignment: No hay términos del glosario mayor en juego salvo la personificación femenina, que está bien conservada. La revisión propuesta mantiene un español eclesial moderno y digno, sin calcos innecesarios.
  issues:
  - severity: medium
    issue: «rodea buscando» para περιέρχεται ζητοῦσα
    rationale: Aunque intenta reflejar movimiento, en español «rodear» suele significar cercar o estar alrededor de algo/alguien, no ‘ir de un lado a otro’. El sentido griego es de desplazamiento activo mientras busca.
  - severity: medium
    issue: «los encuentra» para ὑπαντᾷ αὐτοῖς
    rationale: El verbo griego implica salir al encuentro, no solo hallar. La formulación actual pierde la iniciativa activa de la Sabiduría que el texto resalta.
  - severity: low
    issue: Falta de objeto indirecto explícito en «se aparece con benevolencia»
    rationale: El griego tiene αὐτοῖς (‘a ellos’). En español, «se les aparece» hace la referencia más clara y completa.
  revised_spanish_text: Porque ella va buscando a los que son dignos de ella, y se les aparece favorablemente en los senderos, y les sale al encuentro en todo propósito.[a]
  revised_footnotes:
  - marker: a
    text: O «en todo plan» o «en toda intención». El griego puede referirse tanto al pensamiento en general como a un propósito o intención ya formada.
    reason: lexical_alternative
  revision_rationale: Se reemplazó «rodea buscando» por «va buscando» para expresar de manera natural el movimiento activo de περιέρχεται ζητοῦσα; se añadió «les» en la segunda cláusula para reflejar αὐτοῖς; y se cambió «los encuentra» por «les sale al encuentro» para conservar mejor la fuerza de ὑπαντᾷ como iniciativa de encuentro. Se mantuvo «en todo propósito» con nota alternativa, en línea con la revisión inglesa adjudicada.
