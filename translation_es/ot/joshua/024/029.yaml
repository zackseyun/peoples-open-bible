translation:
  language: es
  text: Y sucedió después de estas cosas[a] que Josué hijo de Nun, el siervo de Yahvé[b], murió, siendo de ciento diez años.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «después de estos acontecimientos».'
    reason: lexical_alternative
  - marker: b
    text: Hebreo «siervo de Yahvé»; «esclavo de Yahvé» es posible léxicamente, pero aquí el título subraya servicio honroso más que condición de servidumbre.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y sucedió
  alternatives_spanish:
  - Y aconteció
  - Y ocurrió
  - Y pasó
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea introduce una nueva secuencia de acontecimientos; «sucedió» conserva ese valor discursivo de manera natural en español sin volverse demasiado literal o arcaica.
- source_word: אַחֲרֵי הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: after these things
  chosen_spanish: después de estas cosas
  alternatives_spanish:
  - después de estos acontecimientos
  - después de estos hechos
  - después de estas palabras
  lexicon: HALOT
  rationale: «דְּבָרִים» aquí funciona como referencia temporal general; «cosas» refleja bien el hebreo y mantiene la misma amplitud que la opción inglesa auditada.
- source_word: וַיָּמָת
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  - pasó al morir
  lexicon: HALOT
  rationale: El verbo מות significa simplemente morir. «Murió» es directo y no atenúa la afirmación, a diferencia de eufemismos menos ajustados al texto.
- source_word: יְהוֹשֻׁעַ
  english_pob_choice: Joshua
  chosen_spanish: Josué
  alternatives_spanish:
  - Joshua
  lexicon: Nombre propio bíblico de uso corriente en español
  rationale: La forma española establecida y reconocible para este nombre es «Josué».
- source_word: בִּן נוּן
  english_pob_choice: son of Nun
  chosen_spanish: hijo de Nun
  alternatives_spanish:
  - descendiente de Nun
  lexicon: HALOT
  rationale: La construcción filial es literal y funciona bien en español; mantiene la identificación genealógica del personaje.
- source_word: עֶבֶד יְהוָה
  english_pob_choice: the servant of Yahweh
  chosen_spanish: el siervo de Yahvé
  alternatives_spanish:
  - el esclavo de Yahvé
  - el servidor de Yahvé
  lexicon: HALOT
  rationale: Aunque עֶבֶד puede significar «esclavo», aquí el título honra la lealtad y el servicio pactal de Josué. En español, «siervo» comunica mejor ese valor honorífico sin borrar la posible tensión lexical, que se explica en la nota.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: DOCTRINE.md / nombre divino
  rationale: Se mantiene el nombre propio divino en español según la norma del proyecto, en lugar de sustituirlo por una forma reverencial como «Señor».
- source_word: בֶּן מֵאָה וָעֶשֶׂר שָׁנִים
  english_pob_choice: being one hundred and ten years old
  chosen_spanish: teniendo ciento diez años
  alternatives_spanish:
  - de edad de ciento diez años
  - con ciento diez años
  lexicon: HALOT
  rationale: La expresión hebrea marca edad. «Teniendo ciento diez años» comunica el dato de edad de forma natural y suficientemente cercana al giro original.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: El texto hebreo usa el Tetragrámaton directamente. En español, la convención del proyecto es «Yahvé», conservando el nombre personal del Dios de Israel sin sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de עֶבֶד en la frase «עֶבֶד יְהוָה»
  english_pob_reading: the servant of Yahweh
  chosen_spanish_reading: el siervo de Yahvé
  alternative_spanish_readings:
  - el esclavo de Yahvé
  - el servidor de Yahvé
  rationale: La frase funciona aquí como título de honor y fidelidad del líder de Israel. «Siervo» conserva el sentido relacional y reverente; «esclavo» sería lexicamente posible, pero en este contexto español podría oscurecer el matiz honorífico que la POB inglesa explicitó.
  doctrine_reference: 'DOCTRINE.md: contested lexical force — עֶבֶד'
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión auditada del inglés, manteniendo la secuencia narrativa, la identificación genealógica, el nombre divino en forma transliterada y la cláusula final de edad. Se evitó una paráfrasis libre y se conservaron las tensiones léxicas documentadas, especialmente en עֶבֶד.
  spanish_consistency_notes:
  - Se usó «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se prefirió «siervo» por el matiz honorífico de עֶבֶד en este contexto, con nota explicativa sobre la alternativa «esclavo».
  - La edad se expresó con una construcción natural en español que refleja el valor del hebreo sin introducir explicación extra.
  - Los marcadores de nota [a] y [b] aparecen exactamente en el texto principal y corresponden a las notas incluidas.
