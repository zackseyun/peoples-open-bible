id: TIT.2.8
reference: Titus 2:8
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: λόγον ὑγιῆ ἀκατάγνωστον, ἵνα ὁ ἐξ ἐναντίας ἐντραπῇ μηδὲν ἔχων ⸂λέγειν περὶ ἡμῶν⸃ φαῦλον.
base_translation:
  language: en
  yaml_path: translation/nt/titus/002/008.yaml
  text: sound speech that cannot be condemned[a], so that the one who opposes us may be put to shame[c][b], having nothing evil to say about us.
  footnotes:
  - marker: a
    text: Or 'sound word' or 'sound message.'
    reason: lexical_alternative
  - marker: b
    text: Or 'beyond reproach' or 'not open to censure.'
    reason: lexical_alternative
  - marker: c
    text: Greek 'the one from the opposing side,' that is, an opponent.
    reason: lexical_alternative
translation:
  language: ko
  text: 그리고 정죄받을 수 없는 건전한 말[a][b]을 보여 주십시오. 그리하여 반대편에 선 자[c]가 우리에 대해 나쁘게 말할 것이 하나도 없어서 부끄러움을 당하게 하려는 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「건전한 말씀」, 「건전한 메시지」.
    reason: lexical_alternative
  - marker: b
    text: 또는 「책망받지 않는」, 「비난의 여지가 없는」.
    reason: lexical_alternative
  - marker: c
    text: 헬라어 「반대 진영에서 온 자」 — 곧 적대자.
    reason: lexical_alternative
lexical_decisions:
- source_word: λόγον ὑγιῆ ἀκατάγνωστον
  english_pob_choice: sound speech that cannot be condemned
  chosen_korean: 정죄받을 수 없는 건전한 말
  alternatives_korean:
  - 책망의 여지가 없는 건전한 말씀
  - 비난할 수 없는 건전한 말
  lexicon: BDAG
  rationale: ἀκατάγνωστος는 「정죄받지 않는」. 한국어로 「정죄받을 수 없는」이 강도를 살린다. ὑγιής는 1:9 이래의 「건전한」 흐름과 일관.
- source_word: ὁ ἐξ ἐναντίας
  english_pob_choice: the one who opposes us
  chosen_korean: 반대편에 선 자
  alternatives_korean:
  - 적대자
  - 반대하는 사람
  lexicon: BDAG
  rationale: 헬라어가 문자적으로 「반대편에서 온 자」이므로 「반대편에 선 자」가 그 비유적 입체성을 살린다.
- source_word: ἐντραπῇ
  english_pob_choice: be put to shame
  chosen_korean: 부끄러움을 당하게
  alternatives_korean:
  - 수치를 당하게
  - 부끄러워하게
  lexicon: BDAG
  rationale: ἐντρέπω의 수동은 「부끄러워하다·수치를 당하다」. 자연스러운 한국어.
- source_word: μηδὲν ἔχων ... φαῦλον
  english_pob_choice: having nothing evil
  chosen_korean: 나쁘게 말할 것이 하나도 없어서
  alternatives_korean:
  - 어떤 악한 것도 말할 수 없어서
  - 험담할 거리가 없어서
  lexicon: BDAG
  rationale: φαῦλος는 「쓸모없는·나쁜·비루한」. 본문 흐름에서는 「나쁜·험담거리」가 자연스럽다.
