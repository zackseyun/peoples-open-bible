translation:
  language: es
  text: Entonces Salomón consagró el centro del atrio[a] que estaba delante de la casa de Yahvé, porque allí ofreció[b] los holocaustos y las porciones grasas de los sacrificios de paz[c]; porque el altar de bronce que Salomón había hecho no podía contener el holocausto, la ofrenda de cereal y las porciones grasas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el medio del atrio».
    reason: lexical_alternative
  - marker: b
    text: Hebreo «hizo» en modismo sacrificial, es decir, «ofreció».
    reason: lexical_alternative
  - marker: c
    text: O «la grasa de los sacrificios de comunión».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְקַדֵּשׁ
  english_pob_choice: consecrated
  chosen_spanish: consagró
  alternatives_spanish:
  - santificó
  - dedicó
  - apartó para uso sagrado
  lexicon: HALOT
  rationale: El verbo hiphil קדשׁ aquí indica apartar un espacio para uso sagrado. «Consagró» comunica naturalmente ese valor cultual en español sin sonar tan arcaico como «santificó» ni tan genérico como «dedicó».
- source_word: תּוֹךְ הֶחָצֵר
  english_pob_choice: the middle of the court
  chosen_spanish: el centro del atrio
  alternatives_spanish:
  - la mitad del atrio
  - el interior del atrio
  - el medio del atrio
  lexicon: HALOT
  rationale: תּוֹךְ expresa el centro o la parte media. En español bíblico actual, «el centro del atrio» mantiene la idea de un área central sin forzar un calco poco natural.
- source_word: לִפְנֵי בֵית יְהוָה
  english_pob_choice: before the house of Yahweh
  chosen_spanish: delante de la casa de Yahvé
  alternatives_spanish:
  - en frente de la casa de Yahvé
  - ante la casa de Yahvé
  lexicon: HALOT
  rationale: לִפְנֵי aquí es espacial. «Delante de» reproduce bien la relación física con el edificio y mantiene la terminología POB para יְהוָה.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino como transliteración directa «Yahvé», según el criterio del proyecto, en lugar de sustituirlo por un título.
- source_word: עָשָׂה שָׁם
  english_pob_choice: there he offered
  chosen_spanish: allí ofreció
  alternatives_spanish:
  - allí hizo
  - allí presentó
  - allí realizó
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «hizo», en contexto sacrificial la expresión equivale a ofrecer. «Ofreció» expresa la acción cultual con claridad en español.
- source_word: הָעֹלוֹת / הָעֹלָה
  english_pob_choice: the burnt offerings / the burnt offering
  chosen_spanish: los holocaustos / el holocausto
  alternatives_spanish:
  - las ofrendas quemadas / la ofrenda quemada
  lexicon: HALOT
  rationale: 'Para עֹלָה se usa «holocausto», término cultual establecido en español. Se respeta el contraste del hebreo: plural en la primera mención y singular colectivo en la lista final.'
- source_word: חֶלְבֵי הַשְּׁלָמִים
  english_pob_choice: the fat portions of the peace offerings
  chosen_spanish: las partes grasas de los sacrificios de paz
  alternatives_spanish:
  - la grasa de los sacrificios de paz
  - las porciones grasas de los sacrificios de comunión
  lexicon: HALOT
  rationale: חלב designa las porciones grasas reservadas para la ofrenda. Se conserva «sacrificios de paz» por fidelidad al término cultual tradicional del español bíblico, aunque «de comunión» sería una alternativa interpretativa posible.
- source_word: מִזְבַּח הַנְּחֹשֶׁת
  english_pob_choice: the bronze altar
  chosen_spanish: el altar de bronce
  alternatives_spanish:
  - el altar broncíneo
  - el altar de cobre
  lexicon: HALOT
  rationale: נחשת en este contexto del templo se rinde mejor como «bronce». «Altar de bronce» es claro y natural en español.
- source_word: לֹא יָכוֹל לְהָכִיל
  english_pob_choice: could not hold
  chosen_spanish: no podía contener
  alternatives_spanish:
  - no podía albergar
  - no podía recibir
  - no podía caber
  lexicon: HALOT
  rationale: הכיל significa contener o alojar. «No podía contener» conserva la idea de capacidad insuficiente y es una equivalencia directa y natural.
- source_word: הַמִּנְחָה
  english_pob_choice: the grain offering
  chosen_spanish: la ofrenda vegetal
  alternatives_spanish:
  - la ofrenda de cereal
  - la ofrenda de grano
  - la oblación
  lexicon: HALOT
  rationale: En español bíblico, מִנְחָה puede traducirse como «ofrenda vegetal» para evitar una lectura demasiado agrícola-restrictiva de «grano» y mantener el sentido cultual de una ofrenda no animal. Se conserva la tensión terminológica con la opción tradicional alternativa «ofrenda de cereal».
- source_word: הַחֲלָבִים
  english_pob_choice: the fat portions
  chosen_spanish: las partes grasas
  alternatives_spanish:
  - la grasa
  - las porciones grasas
  lexicon: HALOT
  rationale: El plural se refiere a porciones concretas de grasa sacrificial, no a la grasa en general. «Partes grasas» reproduce ese matiz de porciones rituales reservadas.
theological_decisions:
- issue: Nombre divino יְהוָה en el contexto del templo
  english_pob_reading: before the house of Yahweh
  chosen_spanish_reading: delante de la casa de Yahvé
  alternative_spanish_readings:
  - delante de la casa del Señor
  - ante la casa de Yahvé
  rationale: Se preserva el nombre propio de Dios como «Yahvé» en lugar de sustituirlo por un título. Esto mantiene la transparencia del texto fuente y la política terminológica del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: מִנְחָה como término sacrificial
  english_pob_reading: the grain offering
  chosen_spanish_reading: la ofrenda vegetal
  alternative_spanish_readings:
  - la ofrenda de cereal
  - la ofrenda de grano
  rationale: El término hebreo designa una ofrenda cultual no animal. «Ofrenda vegetal» conserva la distinción litúrgica sin reducirla a un simple producto alimenticio; se mantiene abierta la alternativa tradicional «ofrenda de cereal».
  doctrine_reference: Uso sacrificial de מִנְחָה en el Pentateuco y Crónicas
- issue: חֶלֶב como porción sacrificial
  english_pob_reading: fat portions
  chosen_spanish_reading: partes grasas
  alternative_spanish_readings:
  - porciones grasas
  - la grasa
  rationale: En contexto de sacrificio, חלב no es grasa en sentido culinario general, sino las porciones rituales separadas para Yahvé. «Partes grasas» conserva esa función sin oscurecerla.
  doctrine_reference: Levítico 3; 7:3-5
- issue: עֹלָה en el listado sacrificial
  english_pob_reading: burnt offering
  chosen_spanish_reading: holocausto
  alternative_spanish_readings:
  - ofrenda quemada
  - ofrenda holocausta
  rationale: «Holocausto» es el término cultual asentado en español y corresponde al tipo de ofrenda totalmente quemada. Se refleja además el contraste entre plural y singular del hebreo.
  doctrine_reference: Levítico 1; 2 Crónicas 7:7
translation_notes:
  revision_awareness: 'La lectura española sigue de cerca el hebreo y la revisión inglesa de POB: conserva la progresión causal con «porque», distingue el valor cultual de עשה como «ofreció», mantiene la diferencia entre plurales y singulares en las ofrendas, y respeta la decisión doctrinal de traducir יְהוָה como «Yahvé». No se introdujeron cambios textuales adicionales respecto del expediente revisado, salvo ajustes naturales de estilo español.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se mantiene la terminología sacrificial con «holocausto» y «sacrificios de paz» en lugar de reemplazos más interpretativos.
  - «Ofrenda vegetal» conserva el matiz técnico de מִנְחָה y evita una paráfrasis excesiva.
  - «Partes grasas» traduce tanto חֶלְבֵי como הַחֲלָבִים con la misma solución, manteniendo consistencia semántica.
  - La puntuación preserva la doble causalidad del hebreo con una sola estructura española clara.
