translation:
  language: es
  text: Carbón para las brasas, y madera para el fuego, y un hombre pendenciero[b] para encender[a] la contienda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «para avivar la contienda» o «para inflamar un pleito». El verbo hebreo expresa hacer que el conflicto se encienda o se reavive; el texto principal conserva la metáfora del fuego con «encender».'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «un hombre de contiendas».
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶּחָם
  english_pob_choice: charcoal
  chosen_spanish: carbón
  alternatives_spanish:
  - carbón vegetal
  - brasas
  lexicon: HALOT
  rationale: פֶּחָם designa combustible carbonizado, no simplemente coals encendidos. En español, «carbón» conserva la idea de combustible que alimenta el calor; «carbón vegetal» sería más preciso pero más técnico, y «brasas» confundiría este término con גֶחָלִים.
- source_word: גֶחָלִים
  english_pob_choice: embers
  chosen_spanish: brasas
  alternatives_spanish:
  - ascuas
  - carbones encendidos
  lexicon: HALOT
  rationale: El plural alude a brasas o carbones ardientes. «Brasas» es natural en español y distingue este término de פֶּחָם dentro del paralelismo.
- source_word: עֵצִים
  english_pob_choice: wood
  chosen_spanish: madera
  alternatives_spanish:
  - leña
  - madera para fuego
  lexicon: HALOT
  rationale: עֵצִים es un sustantivo colectivo para madera. «Madera» sigue de cerca el hebreo; «leña» explicita mejor el uso combustible, pero añade una interpretación que el texto no impone.
- source_word: אֵשׁ
  english_pob_choice: fire
  chosen_spanish: fuego
  alternatives_spanish:
  - llama
  - incendio
  lexicon: HALOT
  rationale: Correspondencia directa y natural de אֵשׁ. «Fuego» mantiene el paralelismo y el campo semántico del proverbio.
- source_word: אִישׁ
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - persona
  - individuo
  lexicon: HALOT
  rationale: El hebreo usa masculino singular representativo. «Hombre» respeta esa forma proverbial y su fuerza estilística.
- source_word: מדונים
  english_pob_choice: quarrelsome
  chosen_spanish: pendenciero
  alternatives_spanish:
  - contencioso
  - amante de pleitos
  - dado a la riña
  lexicon: HALOT
  rationale: 'La expresión funciona atributivamente: literalmente, «un hombre de contiendas/pleitos». «Pendenciero» comunica en español la cualidad habitual de provocar disputas sin perder el tono proverbial.'
- source_word: לְ/חַרְחַר
  english_pob_choice: kindling
  chosen_spanish: encender
  alternatives_spanish:
  - avivar
  - inflamar
  - provocar
  lexicon: HALOT
  rationale: El verbo expresa causar que algo arda o se reavive. «Encender» conserva la metáfora del fuego y en español puede aplicarse también a la contienda.
- source_word: רִיב
  english_pob_choice: strife
  chosen_spanish: contienda
  alternatives_spanish:
  - pleito
  - disputa
  - riña
  lexicon: HALOT
  rationale: רִיב es un término amplio para pleito o contienda. «Contienda» funciona bien en estilo sapiencial y preserva el valor conflictivo sin reducirlo a una sola modalidad legal o doméstica.
translation_notes:
  revision_awareness: El texto sigue el estado revisado de alta concordancia del expediente inglés; no se documentaron cambios posteriores que requirieran ajuste adicional. Se conservó la metáfora de combustión y la estructura de paralelismo triple del hebreo.
  spanish_consistency_notes:
  - Se usó «carbón» para פֶּחָם y «brasas» para גֶחָלִים para mantener la distinción léxica del paralelismo.
  - Se prefirió «madera» en el cuerpo principal, con nota literal, porque el hebreo dice פשוטamente עֵצִים y no exige «leña» en el texto principal.
  - «Contienda» traduce רִיב de forma amplia y adecuada al registro sapiencial.
  - No se introdujo terminología eclesiástica ni una lectura moralizante más allá de lo que el proverbio dice.
