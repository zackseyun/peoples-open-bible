translation:
  language: es
  text: 'Pero él la tomó de la mano y llamó[a], diciendo: «Niña, levántate».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Niño». El griego παῖς puede significar «niño» o, en este contexto, «niña».
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτὸς δὲ
  english_pob_choice: But he
  chosen_spanish: Pero él
  alternatives_spanish:
  - Y él
  - Pero él mismo
  lexicon: BDAG
  rationale: δέ aquí introduce un giro narrativo leve; «Pero» conserva ese contraste/continuidad. αὐτός se expresa naturalmente con el pronombre explícito «él» en español para mantener la referencia enfática sin forzar «él mismo».
- source_word: κρατήσας τῆς χειρὸς αὐτῆς
  english_pob_choice: took her by the hand
  chosen_spanish: la tomó de la mano
  alternatives_spanish:
  - tomó su mano
  - la sostuvo de la mano
  lexicon: BDAG
  rationale: κρατέω con genitivo puede expresar tomar/sujetar. La construcción española más natural y fiel es «tomó de la mano», que reproduce el contacto físico sin introducir dureza ni una precisión innecesaria como «sostuvo».
- source_word: ἐφώνησεν
  english_pob_choice: called out
  chosen_spanish: llamó
  alternatives_spanish:
  - clamó
  - llamó en voz alta
  lexicon: BDAG
  rationale: El verbo señala una alocución audible. «Llamó» es suficiente en español y evita sobreactuar la fuerza vocal que «clamó» podría sugerir; el contexto ya deja claro que se trata de un llamado dirigido a la niña.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: BDAG
  rationale: El participio introduce el discurso directo. «Diciendo» conserva la relación sintáctica griega de modo transparente; «y dijo» sería igualmente posible, pero menos cercano a la estructura del texto fuente.
- source_word: Ἡ παῖς
  english_pob_choice: Child
  chosen_spanish: Niña
  alternatives_spanish:
  - Niño
  - Hija
  - Pequeña
  lexicon: BDAG
  rationale: παῖς es semánticamente amplio, pero aquí el contexto identifica a la hija de Jairo. En español, «Niña» comunica con claridad el sentido contextual y la ternura del vocativo, sin forzar «hija» ni un diminutivo que el griego no exige.
- source_word: ἔγειρε
  english_pob_choice: arise
  chosen_spanish: levántate
  alternatives_spanish:
  - despierta
  - arrebate
  - resucita
  lexicon: BDAG
  rationale: El imperativo de ἐγείρω expresa levantarse/ponerse de pie, y en este contexto de restauración de vida «levántate» es el equivalente natural y reverente en español. Se evita «resucita» porque añadiría una especificación interpretativa que el mandato griego no formula explícitamente.
theological_decisions:
- issue: Vocativo para παῖς en la orden de Jesús
  english_pob_reading: Child
  chosen_spanish_reading: Niña
  alternative_spanish_readings:
  - Niño
  - Hija
  - Pequeña
  rationale: No hay una disputa doctrinal, sino una decisión contextual. Como el relato refiere a la hija de Jairo, «Niña» comunica el vocativo con naturalidad en español y evita la ambigüedad que tendría «hija» fuera del contexto familiar inmediato.
  doctrine_reference: Translation philosophy §1, §5
- issue: Tono del mandato milagroso
  english_pob_reading: arise
  chosen_spanish_reading: levántate
  alternative_spanish_readings:
  - arise
  - despierta
  - resucita
  rationale: El mandato debe sonar directo y digno, sin arcaísmo innecesario. «Levántate» conserva el impulso del imperativo de ἐγείρω y no convierte la orden en una explicación teológica del milagro.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: 'La redacción sigue el acuerdo elevado del análisis auditado: mantiene la acción física con una construcción española natural («la tomó de la mano»), conserva el llamado audible con un verbo simple («llamó») y prefiere un imperativo claro y moderno («levántate») para ἔγειρε. La nota se conserva para reflejar la alternativa léxica documentada en el griego.'
  spanish_consistency_notes:
  - Se usa «Niña» como vocativo contextual, alineado con el valor de παῖς sin importar una harmonización explícita con otros evangelios.
  - Se evita «SEÑOR» o terminología no presente en el versículo; el texto es narrativo y directo.
  - «Tomó de la mano» mantiene la concreción física de κρατέω con genitivo y suena natural en español.
  - El tono del imperativo se mantiene sobrio y cercano, apropiado para una traducción de equivalencia óptima.
