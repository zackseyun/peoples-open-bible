translation:
  language: es
  text: 'Así dice Yahvé de los ejércitos: Si es maravilloso[a] a los ojos del remanente de este pueblo en aquellos días, ¿también será maravilloso a mis ojos? declara Yahvé de los ejércitos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «demasiado difícil» o «imposible». El verbo hebreo puede describir algo extraordinario o algo que supera la capacidad humana.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así ha dicho
  - Esto dice
  lexicon: HALOT
  rationale: Fórmula profética estable. «Así dice» conserva el tono solemne y directo sin volverse arcaico en exceso.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino según el criterio del proyecto, en vez de ocultarlo con un sustituto.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de huestes
  lexicon: HALOT
  rationale: «Ejércitos» comunica el título divino de manera clara en español y conserva el campo semántico de fuerzas organizadas.
- source_word: יִפָּלֵא
  english_pob_choice: is marvelous
  chosen_spanish: maravilloso
  alternatives_spanish:
  - demasiado difícil
  - extraordinario
  - imposible
  lexicon: HALOT
  rationale: El verbo hebreo puede expresar lo extraordinario o lo que supera la capacidad humana. «Maravilloso» preserva esa amplitud sin cerrar la tensión semántica.
- source_word: בְּעֵינֵי
  english_pob_choice: in the eyes of
  chosen_spanish: en los ojos de
  alternatives_spanish:
  - a juicio de
  - ante
  lexicon: HALOT
  rationale: Se conserva el modismo hebreo con paralelismo claro respecto de «en mis ojos».
- source_word: שְׁאֵרִית
  english_pob_choice: the remnant
  chosen_spanish: el remanente
  alternatives_spanish:
  - el resto
  - los sobrevivientes
  lexicon: HALOT
  rationale: «Remanente» es un término profético técnico en español y mantiene la carga teológica del hebreo.
- source_word: בַּיָּמִים הָהֵם
  english_pob_choice: in those days
  chosen_spanish: en aquellos días
  alternatives_spanish:
  - en esos días
  - en ese tiempo
  lexicon: HALOT
  rationale: La expresión profética tradicional en español conserva el matiz temporal y escatológico/restaurador.
- source_word: גַּם
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - hasta
  - incluso
  lexicon: HALOT
  rationale: Marca la comparación entre la percepción del pueblo y la de Dios de forma natural en español.
- source_word: בְּעֵינַי
  english_pob_choice: in my eyes
  chosen_spanish: en mis ojos
  alternatives_spanish:
  - a mi juicio
  - para mí
  lexicon: HALOT
  rationale: Se mantiene la simetría con «en los ojos de» para no perder el paralelismo retórico del versículo.
- source_word: נְאֻם יְהוָה צְבָאוֹת
  english_pob_choice: declares Yahweh of hosts
  chosen_spanish: declara Yahvé de los ejércitos
  alternatives_spanish:
  - dice Yahvé de los ejércitos
  - oráculo de Yahvé de los ejércitos
  lexicon: HALOT
  rationale: «Declara» reproduce la fórmula oracular de cierre de manera digna y contemporánea, evitando una paráfrasis excesiva.
theological_decisions:
- issue: Fuerza de יִפָּלֵא en ambos miembros de la comparación
  english_pob_reading: The verse contrasts human perception with God's perspective in order to deny that the promised restoration is impossible for him.
  chosen_spanish_reading: El versículo contrapone la percepción humana con la de Dios para afirmar que la restauración prometida no queda fuera de su alcance ni de su obrar.
  alternative_spanish_readings:
  - ¿también será demasiado difícil para mí?
  - ¿será imposible para mí?
  rationale: Se preserva la tensión del hebreo entre lo admirable y lo imposible, sin resolverla en una sola acepción. Así se evita borrar el matiz que el POB inglés dejó abierto con su nota léxica.
  doctrine_reference: No forzar una limitación en Dios; mantener la ambigüedad léxica del verbo פלא según el contexto.
translation_notes:
  revision_awareness: Alineado con la revisión reciente del POB inglés que prefirió una formulación más directa de יִפָּלֵא como «is marvelous» en lugar de «seems too marvelous», evitando añadir matices no explícitos. En español, «maravilloso» conserva esa actualización y permite mantener la amplitud semántica del hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al criterio del proyecto.
  - Se prefiere «remanente» por coherencia con el lenguaje profético.
  - Se conserva el paralelismo «en los ojos de / en mis ojos» para reflejar el hebreo.
  - La nota [a] acompaña el primer uso de «maravilloso» para registrar la alternativa léxica sin romper el flujo del texto.
