translation:
  language: es
  text: '¿No han visto una visión falsa[a] y han proclamado una adivinación falsa, cuando dicen: «Oráculo de Yahvé», aunque yo no he hablado?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una visión vana» y «una adivinación falsa». Los términos hebreos enfatizan la vaciedad y la falsedad de las revelaciones que los profetas afirmaban haber recibido.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹוא
  english_pob_choice: Have you not
  chosen_spanish: ¿No han... ?
  alternatives_spanish:
  - ¿Acaso no han... ?
  - ¿No es verdad que han... ?
  lexicon: HALOT
  rationale: La forma hebrea introduce una pregunta retórica que espera respuesta afirmativa. El español natural conserva esa fuerza con «¿No han... ?» sin añadir elementos interpretativos.
- source_word: מַחֲזֵה שָׁוְא
  english_pob_choice: a false vision
  chosen_spanish: una visión falsa
  alternatives_spanish:
  - una visión vana
  - una visión vacía
  lexicon: HALOT
  rationale: מַחֲזֶה es «visión» y שָׁוְא comunica falsedad, vacío o vanidad. «Visión falsa» conserva la censura profética y suena natural en español.
- source_word: חֲזִיתֶם
  english_pob_choice: seen
  chosen_spanish: han visto
  alternatives_spanish:
  - han contemplado
  - han tenido
  lexicon: HALOT
  rationale: El perfecto 2mp se expresa de modo directo con «han visto», enlazando con «visión» sin forzar un calco.
- source_word: וּמִקְסַם כָּזָב
  english_pob_choice: and spoken a lying divination
  chosen_spanish: una adivinación mentirosa
  alternatives_spanish:
  - una adivinación falsa
  - una falsa adivinación
  lexicon: HALOT
  rationale: מִקְסָם refiere adivinación u oráculo, y כָּזָב añade mentira/falsedad. En español, «adivinación mentirosa» conserva el paralelo con «visión falsa» y evita perder el sustantivo técnico.
- source_word: אֲמַרְתֶּם
  english_pob_choice: spoken
  chosen_spanish: han pronunciado
  alternatives_spanish:
  - han dicho
  - han declarado
  lexicon: HALOT
  rationale: El verbo aquí acompaña la expresión anterior de adivinación; «han pronunciado» mantiene el matiz de enunciado profético/oracular mejor que un simple «han dicho».
- source_word: וְאֹמְרִים
  english_pob_choice: when you say
  chosen_spanish: cuando dicen
  alternatives_spanish:
  - mientras dicen
  - al decir
  lexicon: HALOT
  rationale: El participio marca acción concomitante o repetida. «Cuando dicen» es una solución idiomática clara en español y conserva el encuadre de la cita.
- source_word: נְאֻם יְהוָה
  english_pob_choice: Declares Yahweh
  chosen_spanish: Declara Yahvé
  alternatives_spanish:
  - Oráculo de Yahvé
  - Dice Yahvé
  lexicon: HALOT
  rationale: La fórmula profética se traduce de forma directa con el nombre divino según el estándar del proyecto. «Declara Yahvé» preserva la fuerza de pronunciamiento y la referencia al nombre propio.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el equivalente español del nombre divino establecido por el proyecto, manteniendo el valor del Tetragrámaton sin ocultarlo bajo una máscara titulada.
- source_word: וַאֲנִי לֹא דִבַּרְתִּי
  english_pob_choice: though I have not spoken
  chosen_spanish: aunque yo no he hablado
  alternatives_spanish:
  - pero yo no he hablado
  - y yo no he hablado
  lexicon: HALOT
  rationale: 'La oposición final es tajante: ellos atribuyen a Yahvé un mensaje que él niega haber dicho. «Aunque yo no he hablado» reproduce el contraste de manera natural; el pronombre explícito conserva el énfasis hebreo.'
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El hebreo usa el Tetragrámaton directamente. En español, el estándar del proyecto es «Yahvé», que preserva el nombre propio y evita la sustitución por un título impersonal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fórmula profética נְאֻם יְהוָה
  english_pob_reading: Declares Yahweh
  chosen_spanish_reading: Declara Yahvé
  alternative_spanish_readings:
  - Oráculo de Yahvé
  - Dice Yahvé
  rationale: La fórmula funciona como proclamación oracular. «Declara Yahvé» mantiene el tono declarativo y no disuelve la estructura del original en una simple cita narrativa.
  doctrine_reference: Profetic speech formulas in POB Spanish style guide
translation_notes:
  revision_awareness: El texto hebreo y la auditoría inglesa coinciden en una lectura altamente estable. Se ha conservado la pregunta retórica, el paralelismo entre visión/adivinación y la oposición final entre el dicho profético atribuido a Yahvé y la negación divina de haber hablado. No se aplicaron revisiones sustantivas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se conserva la distinción léxica entre «visión» y «adivinación», reflejando el paralelismo hebreo.
  - «Adivinación mentirosa» busca mantener el tono fuerte del original sin suavizar la acusación.
  - La puntuación reproduce la estructura retórica del versículo con una cita interna clara.
