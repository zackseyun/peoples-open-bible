    rationale: Aunque literalmente posible, en español actual sugiere blandura física o afectividad más que inexperiencia. El contexto y la decisión inglesa favorecen «inexperto» como sentido principal.
  - severity: medium
    issue: «debe engrandecerse mucho» para לְהַגְדִּיל לְמַעְלָה
    rationale: La construcción reflexiva suena poco natural y cambia el énfasis. El hebreo expresa que la casa debe ser extraordinariamente grande, no que deba ‘engrandecerse’.
  - severity: low
