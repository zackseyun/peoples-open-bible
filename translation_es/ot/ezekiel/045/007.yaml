base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/045/007.yaml
  text: And for the prince there shall be land on both sides of the holy district and the property of the city[a], adjoining the holy district and adjoining the property of the city, from the west side westward and from the east side eastward; and in length corresponding to one of the tribal portions[b], from the western border to the eastern border.
  footnotes:
  - marker: a
    text: Hebrew 'holy contribution' or 'sacred allotment'; here it refers to the set-apart tract of land, so 'holy district' is used.
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally 'from the sea side' and 'to the border eastward'; in Ezekiel's territorial descriptions, 'sea' functions as 'west.'
    reason: cultural_note
