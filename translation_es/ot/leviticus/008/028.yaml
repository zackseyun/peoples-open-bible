translation:
  language: es
  text: Entonces Moisés los tomó de sus palmas[a] y los quemó sobre el altar, encima del holocausto. Eran una ofrenda de investidura[b] para aroma agradable, una ofrenda por fuego[c] para Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de sus manos». El hebreo dice más precisamente «de sus palmas», imagen que el texto principal conserva.
    reason: lexical_alternative
  - marker: b
    text: O «ofrenda de consagración». Hebreo מִלֻּאִים es un término técnico para la ofrenda usada en el rito de instalación de los sacerdotes.
    reason: lexical_alternative
  - marker: c
    text: O «ofrenda que se quema». El hebreo אִשֶּׁה designa una ofrenda presentada por fuego en el altar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - recibió
  lexicon: HALOT
  rationale: El verbo hebreo de acción narrativa se expresa de forma directa con «tomó», que en español es natural y conserva la secuencia ritual concreta.
- source_word: אֹתָם
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  lexicon: HALOT
  rationale: El pronombre retoma las porciones colocadas en las manos de Aarón y sus hijos en el versículo anterior; en español basta el clítico «los».
- source_word: מֵעַל כַּפֵּיהֶם
  english_pob_choice: from their palms
  chosen_spanish: de sus palmas
  alternatives_spanish:
  - de sus manos
  lexicon: HALOT
  rationale: «Palmas» refleja con más precisión כַּפֵּי/הֶם y evita perder el detalle anatómico que el audit trail inglés decidió preservar.
- source_word: וַיַּקְטֵר
  english_pob_choice: burned
  chosen_spanish: los hizo arder
  alternatives_spanish:
  - los quemó
  - los ofreció en humo
  lexicon: HALOT
  rationale: En contexto sacrificial, קטר indica hacer subir en humo una ofrenda sobre el altar. «Los hizo arder» comunica el acto cultual sin sonar excesivamente técnico o torpe en español.
- source_word: הַמִּזְבֵּחָה
  english_pob_choice: on the altar
  chosen_spanish: sobre el altar
  alternatives_spanish:
  - en el altar
  lexicon: HALOT
  rationale: El sufijo direccional y el contexto ritual se expresan con «sobre el altar», que mantiene la localización física del acto.
- source_word: עַל הָעֹלָה
  english_pob_choice: on top of the burnt offering
  chosen_spanish: encima del holocausto
  alternatives_spanish:
  - sobre el holocausto
  - encima de la ofrenda quemada
  lexicon: HALOT
  rationale: «Holocausto» es el término español bíblico establecido para עֹלָה. «Encima de» conserva la relación espacial marcada por עַל.
- source_word: מִלֻּאִים
  english_pob_choice: ordination offering
  chosen_spanish: ofrenda de investidura
  alternatives_spanish:
  - ofrenda de ordenación
  - ofrenda de consagración
  lexicon: HALOT
  rationale: El término técnico alude al rito de instalación sacerdotal. «Investidura» comunica la idea de entronización/instalación ceremonial sin importar una estructura eclesial moderna.
- source_word: לְרֵיחַ נִיחֹחַ
  english_pob_choice: for a pleasing aroma
  chosen_spanish: como aroma agradable
  alternatives_spanish:
  - para un aroma agradable
  - como olor agradable
  lexicon: HALOT
  rationale: La expresión sacrificial fija se vuelve más idiomática en español con «como aroma agradable», que evita una literalidad extraña y conserva la aceptación cultual.
- source_word: אִשֶּׁה
  english_pob_choice: a food offering
  chosen_spanish: una ofrenda que se quema
  alternatives_spanish:
  - una ofrenda por fuego
  - una ofrenda de fuego
  lexicon: HALOT
  rationale: 'Para preservar la fuerza sacrificial de אִשֶּׁה sin introducir la fórmula moderna «ofrenda vegetal» ni la inglesa «food offering», se usa una paráfrasis controlada y transparente: la ofrenda se consume por el fuego.'
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  lexicon: Proyecto POB default
  rationale: 'Se sigue el default del proyecto para יהוה: «Yahvé». La preposición «para» expresa mejor la dirección/ofrecimiento cultual que un simple dativo en español.'
theological_decisions:
- issue: Terminología del rito sacerdotal de מִלֻּאִים
  english_pob_reading: ordination offering
  chosen_spanish_reading: ofrenda de investidura
  alternative_spanish_readings:
  - ofrenda de ordenación
  - ofrenda de consagración
  rationale: El contexto es la instalación de Aarón y sus hijos en el sacerdocio. «Investidura» transmite el acto ceremonial de ser instalado en un cargo sagrado, sin reemplazar el sentido ritual por lenguaje de otra tradición eclesial.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: Valor sacrificial de אִשֶּׁה
  english_pob_reading: a food offering
  chosen_spanish_reading: una ofrenda que se quema
  alternative_spanish_readings:
  - una ofrenda por fuego
  - una ofrenda de fuego
  rationale: El hebreo técnico resalta la ofrenda consumida por el fuego del altar. En español, una formulación explicativa mantiene la fuerza cultual y evita un calco poco natural o equívoco.
  doctrine_reference: Translation philosophy §6 (readable modern Spanish, not archaic or academic)
- issue: Título divino de יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  rationale: Se sigue el estándar del proyecto para preservar el nombre divino en español y no ocultarlo tras una convención tipográfica. Esto mantiene la transparencia respecto del texto fuente.
  doctrine_reference: Project-level Spanish terminology defaults
translation_notes:
  revision_awareness: El texto inglés auditado pasó de «their hands» a «their palms» para reflejar con más precisión el hebreo, sin otros cambios sustanciales. La versión española sigue esa corrección incorporando «palmas» y conserva el resto de las decisiones léxicas del registro sacrificial.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para יהוה.
  - Se mantiene «holocausto» para עֹלָה, término bíblico asentado en español.
  - «Ofrenda de investidura» evita depender de la fórmula eclesial «ordenación» sin perder el contexto sacerdotal.
  - La paráfrasis de אִשֶּׁה es deliberadamente explicativa para no introducir una expresión poco natural ni borrar la referencia al fuego del altar.
  - Los marcadores de nota aparecen solo en el texto donde hay alternativas útiles para auditoría.
