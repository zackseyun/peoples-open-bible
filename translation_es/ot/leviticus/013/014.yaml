- from: Pero en el día en que aparezca en él carne viva, quedará impuro[a].
  to: Pero el día en que aparezca en él carne viva[a], será impuro.
  rationale: Se ajusta la redacción para un español más natural ('el día en que') y se reemplaza 'quedará impuro' por 'será impuro' para reflejar mejor el dictamen legal sin añadir un matiz de proceso. Se conserva 'carne viva' con nota alternativa, y se corrige el formato de la nota. También se ancla la nota en 'carne viva[a]' para cumplir la disciplina de marcadores en el texto.
