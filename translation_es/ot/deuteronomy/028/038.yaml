    issue: «mucho grano» para זֶרַע רַב
    rationale: זֶרַע normalmente significa «semilla» o «semilla para sembrar». «Grano» puede sonar más a producto cosechado que a semilla llevada al campo para siembra, y debilita la imagen concreta que el POB inglés quiso conservar.
  - severity: low
    issue: Nota al pie con comillas y redacción algo torpes
    rationale: La nota comunica bien la alternativa, pero puede pulirse para un español más natural y una puntuación más limpia sin cambiar el contenido.
