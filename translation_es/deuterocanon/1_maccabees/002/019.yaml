translation:
  language: es
  text: 'Y Matatías respondió y dijo a gran voz[a]: «Aun si todas las naciones[b] que están en el reino del rey lo escuchan, apartándose cada uno del culto de sus padres, y han escogido sus mandamientos»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en voz alta». La frase griega significa literalmente «con voz grande/fuerte».
    reason: lexical_alternative
  - marker: b
    text: O «pueblos». El griego usa ἔθνη, que aquí puede referirse a los pueblos sometidos al rey.
    reason: lexical_alternative
lexical_decisions:
- source_word: φωνῇ μεγάλῃ
  english_pob_choice: with a loud voice
  chosen_spanish: con voz fuerte
  alternatives_spanish:
  - en voz alta
  - con voz alta
  lexicon: LSJ
  rationale: Preserva la fuerza narrativa de la expresión griega sin sonar forzado en español. 'Con voz fuerte' comunica el énfasis audible mejor que un adverbio más neutro.
- source_word: ἔθνη
  english_pob_choice: nations
  chosen_spanish: naciones
  alternatives_spanish:
  - gentes
  - pueblos
  lexicon: LSJ
  rationale: Aquí el término se refiere a los pueblos sometidos al poder real; 'naciones' reproduce bien el alcance colectivo y coincide con la decisión inglesa sin cargar el texto con una lectura étnica más específica.
- source_word: οἴκῳ τῆς βασιλείας τοῦ βασιλέως
  english_pob_choice: the kingdom of the king
  chosen_spanish: el reino del rey
  alternatives_spanish:
  - la casa del reino del rey
  - el dominio del rey
  - la corte del rey
  lexicon: LSJ
  rationale: La revisión inglesa optó por una forma más natural y contextual que conserva el sentido real/político sin reproducir la sintaxis extraña del griego. 'Reino del rey' es transparente y fiel al valor contextual.
- source_word: ἀκούουσιν αὐτοῦ
  english_pob_choice: listen to him
  chosen_spanish: lo escuchan
  alternatives_spanish:
  - le obedecen
  - lo oyen
  lexicon: LSJ
  rationale: '''Escuchar'' mantiene el sentido léxico básico de oír/listen, mientras que ''obedecer'' sería una interpretación más explícita que el verbo griego por sí solo no exige. El pronombre ''lo'' evita ambigüedad y conserva la referencia al rey.'
- source_word: ἀποστῆναι
  english_pob_choice: turning away
  chosen_spanish: apartándose
  alternatives_spanish:
  - alejándose
  - desviándose
  - rebelándose
  lexicon: LSJ
  rationale: El infinitivo participial expresa separación/abandono. 'Apartándose' comunica la defección de manera natural en español sin imponer el matiz técnico de 'apostasía'.
- source_word: λατρίας πατέρων αὐτοῦ
  english_pob_choice: the worship of his fathers
  chosen_spanish: la adoración de sus padres
  alternatives_spanish:
  - el culto de sus padres
  - el servicio religioso de sus padres
  - la religión de sus padres
  lexicon: LSJ
  rationale: '''λατρεία'' es servicio/culto religioso; ''adoración'' es una opción natural y digna en español, y mantiene la referencia a la práctica ancestral. Se evita ''culto'' por sonar más técnico o eclesiástico.'
- source_word: ᾑρετίσαντο
  english_pob_choice: have chosen
  chosen_spanish: han escogido
  alternatives_spanish:
  - han elegido
  - han preferido
  lexicon: LSJ
  rationale: '''Escoger'' es un equivalente claro y directo de la idea de elegir/preferir. La forma compuesta refleja bien el resultado ya asentado en el contexto narrativo.'
- source_word: ἐν ταῖς ἐντολαῖς αὐτοῦ
  english_pob_choice: his commandments
  chosen_spanish: sus mandamientos
  alternatives_spanish:
  - sus órdenes
  - sus preceptos
  lexicon: LSJ
  rationale: '''Mandamientos'' conserva el tono formal y autoritativo del término griego, especialmente adecuado para decretos reales o instrucciones obligatorias.'
theological_decisions:
- issue: Cómo reflejar la relación entre escuchar y obedecer en ἀκούουσιν αὐτοῦ
  english_pob_reading: listen to him
  chosen_spanish_reading: lo escuchan
  alternative_spanish_readings:
  - le obedecen
  - lo oyen
  rationale: El contexto sugiere obediencia, pero el verbo griego dice literalmente oír/escuchar. La traducción conserva esa base léxica y deja la implicación contextual sin convertirla en una equivalencia interpretativa más fuerte.
  doctrine_reference: Translation philosophy §1, §5
- issue: Cómo tratar la frase irregular οἴκῳ τῆς βασιλείας τοῦ βασιλέως
  english_pob_reading: the kingdom of the king
  chosen_spanish_reading: el reino del rey
  alternative_spanish_readings:
  - el dominio del rey
  - la corte del rey
  rationale: La expresión griega es inusual, pero la revisión inglesa ya privilegió una forma contextual más natural. En español, 'el reino del rey' preserva esa decisión sin introducir una metáfora diferente ni oscurecer el referente político.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La versión inglesa revisada corrigió la frase espacialmente extraña 'in the house of the king’s kingdom' a 'in the kingdom of the king'. La draft española sigue esa revisión y evita una literalidad artificial. También conserva la estructura participial del griego ('apartándose... y han escogido') sin convertirla en una paráfrasis. Se añadieron marcas de nota solo donde aparecen ancladas en el texto, para mantener la validación y la trazabilidad.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo requiera explícitamente; no aplica en este versículo.
  - '''Mandamientos'' se mantiene para ἐντολαί por consistencia con el registro jurídico/real del pasaje.'
  - '''Escuchar'' se conserva frente a ''obedecer'' para respetar la base verbal griega.'
  - La puntuación respeta el español moderno y la cadencia narrativa del discurso directo.
