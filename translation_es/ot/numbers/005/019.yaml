translation:
  language: es
  text: 'Entonces el sacerdote la hará jurar y le dirá a la mujer: «Si ningún hombre ha yacido contigo, y si no te has desviado en impureza[a] bajo tu marido[b], queda libre[c] de estas aguas amargas que traen maldición[d]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «en impureza»; conserva el lenguaje ritual sin especificar más de lo que dice el texto.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «bajo tu marido», un modismo que alude al estado y vínculo matrimonial de la mujer.'
    reason: cultural_note
  - marker: c
    text: 'O: «sé inocente de estas aguas amargas que traen la maldición».'
    reason: lexical_alternative
  - marker: d
    text: 'Literalmente: «las aguas amargas, las que traen maldición».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִשְׁבִּיעַ
  english_pob_choice: shall make her swear
  chosen_spanish: la hará jurar
  alternatives_spanish:
  - la pondrá bajo juramento
  - la conjurará
  lexicon: HALOT
  rationale: El hiphil de שבע expresa causar que alguien jure o ponerlo bajo juramento. «La hará jurar» conserva la fuerza causativa y suena natural en español jurídico-bíblico.
- source_word: וְאָמַר
  english_pob_choice: shall say
  chosen_spanish: le dirá
  alternatives_spanish:
  - y dirá
  - dirá
  lexicon: HALOT
  rationale: La secuencia narrativa legal queda bien con futuro simple. «Le dirá» mantiene la referencia explícita a la mujer sin forzar el orden del hebreo.
- source_word: אִם לֹא שָׁכַב אִישׁ אֹתָךְ
  english_pob_choice: If no man has lain with you
  chosen_spanish: Si ningún hombre ha yacido contigo
  alternatives_spanish:
  - Si un hombre no ha yacido contigo
  - Si nadie se ha acostado contigo
  lexicon: HALOT
  rationale: שׁכב funciona como eufemismo sexual. «Ha yacido contigo» preserva el giro idiomático y «ningún hombre» refleja el indefinido איש en este contexto legal.
- source_word: שָׂטִית
  english_pob_choice: have gone astray
  chosen_spanish: te has desviado
  alternatives_spanish:
  - has andado errante
  - te has apartado
  lexicon: HALOT
  rationale: El verbo expresa apartarse o desviarse; «te has desviado» conserva la imagen y evita especificar más de lo que el hebreo dice.
- source_word: טֻמְאָה
  english_pob_choice: in uncleanness
  chosen_spanish: en impureza
  alternatives_spanish:
  - en inmundicia
  - en impureza ritual
  lexicon: HALOT
  rationale: «Impureza» expresa el campo semántico ritual/moral sin reducirlo a una sola categoría. Se prefirió a «inmundicia» por ser más técnico y transparente en español actual.
- source_word: תַּחַת אִישֵׁךְ
  english_pob_choice: under your husband
  chosen_spanish: bajo tu marido
  alternatives_spanish:
  - bajo tu esposo
  - dentro de tu matrimonio
  lexicon: HALOT
  rationale: La traducción conserva la imagen idiomática de תחת. «Marido» mantiene el registro bíblico y la relación matrimonial implicada por el contexto.
- source_word: הִנָּקִי
  english_pob_choice: be free from
  chosen_spanish: quedas libre de
  alternatives_spanish:
  - sé libre de
  - quede libre de
  lexicon: HALOT
  rationale: El valor resultante del imperativo/passive nuance de נקה aquí es quedar exenta del efecto de la prueba. «Quedas libre de» comunica con claridad esa exención en español.
- source_word: מִמֵּי הַמָּרִים
  english_pob_choice: these bitter waters
  chosen_spanish: estas aguas amargas
  alternatives_spanish:
  - estas aguas amargas
  - estas aguas de amargura
  lexicon: HALOT
  rationale: Se conserva el plural «aguas» y el adjetivo literal «amargas». La opción refleja el texto hebreo sin sobreexplicar el simbolismo.
- source_word: הַֽמְאָרֲרִים
  english_pob_choice: that bring a curse
  chosen_spanish: que traen maldición
  alternatives_spanish:
  - que acarrean maldición
  - maldición-traedoras
  lexicon: HALOT
  rationale: El participio de ארר describe las aguas como agentes de maldición. «Traen maldición» es natural en español y preserva la causalidad del hebreo.
theological_decisions:
- issue: Naturaleza del presunto pecado de la mujer
  english_pob_reading: Render the text in terms of sexual unfaithfulness/impurity without importing later doctrinal or moral categories beyond the Hebrew wording.
  chosen_spanish_reading: Se mantiene el lenguaje de yacer, desviarse e impureza, sin traducirlo explícitamente como adulterio.
  alternative_spanish_readings:
  - Traducirlo como adulterio
  - Expresarlo solo como defilement/contaminación
  rationale: 'El hebreo formula la sospecha con eufemismo jurídico-ritual. La versión española conserva esa tensión: sugiere infidelidad sexual, pero no añade una categoría legal que el verso no usa.'
  doctrine_reference: Números 5:19; filosofía de traducción POB optimal-equivalence
- issue: Sentido de las aguas en el rito
  english_pob_reading: Translate the waters as 'bring a curse' rather than specifying the exact mechanism in the main text.
  chosen_spanish_reading: Las aguas se presentan como portadoras de maldición, sin detallar en el cuerpo del versículo el mecanismo exacto del rito.
  alternative_spanish_readings:
  - aguas amargas que traen la maldición
  - aguas de amargura, las que maldicen
  rationale: El participio hebreo marca el efecto de maldición. «Traen maldición» conserva la gravedad ritual y deja abierta la forma precisa del efecto, tal como hace el hebreo.
  doctrine_reference: Números 5:19; decisión teológica sobre el rito de celos
- issue: Traducción de תחת אִישֵׁךְ
  english_pob_reading: Hebrew 'under your husband,' an idiom referring to the woman's married status and obligation within the marriage bond.
  chosen_spanish_reading: «Bajo tu marido» se mantiene como giro idiomático que alude a la relación y obligación matrimonial.
  alternative_spanish_readings:
  - en tu condición de casada
  - bajo la autoridad de tu marido
  rationale: El hebreo usa una expresión idiomática que no debe aplanarse en una paráfrasis. La frase española conserva el valor formal y permite una nota explicativa si se requiere.
  doctrine_reference: Números 5:19; nota cultural del texto
translation_notes:
  revision_awareness: Se tomó en cuenta la última revisión del contexto inglés, que cambió 'into uncleanness' por 'in uncleanness' para reflejar mejor la naturalidad del hebreo. En español se optó por «en impureza», manteniendo ese ajuste y evitando una construcción más forzada. También se preservó la lectura moderada del efecto de las aguas como portadoras de maldición, sin sobredeterminar el mecanismo ritual.
  spanish_consistency_notes:
  - Se mantiene Yahvé en todo el proyecto para el nombre divino cuando aparezca; este versículo no lo contiene.
  - Se usa «marido» en lugar de «esposo» para sostener el registro bíblico y la correspondencia con la nota cultural de תחת.
  - «Impureza» se eligió por consistencia con el campo ritual de טֻמְאָה; no se convirtió en 'contaminación' ni en 'inmundicia'.
  - «Aguas amargas» conserva el plural hebreo y la imagen ritual; no se singularizó.
  - La puntuación y las comillas siguen el español editorial contemporáneo.
