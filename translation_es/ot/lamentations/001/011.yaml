review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del hebreo: gemidos del pueblo, búsqueda de pan, entrega de bienes valiosos a cambio de comida, súplica a Yahvé y estado de humillación. Sin embargo, hay desajustes formales en las notas: la nota [a] está anclada en ‘gime’ pero en realidad corresponde a מחמודיהם (‘sus cosas preciosas’), y la nota [c] está anclada en ‘contempla’ aunque el contenido de la nota corresponde a זוֹלֵלָה (‘despreciada/vil’). Además, la nota [b] dice literalmente ‘para restaurar la vida’, que repite la traducción principal; sería más fiel indicar la literalidad ‘para restaurar el alma/la vida’ y explicar el sentido contextual.'
  spanish_quality_summary: El español es claro, digno y natural. ‘Todo su pueblo gime, buscando pan’ y ‘han dado sus cosas preciosas por alimento’ son legibles. ‘Mira, Yahvé, y contempla’ funciona bien, aunque ‘mira … y ve’ sería más cercano al paralelismo léxico; no es necesario cambiarlo. ‘He llegado a ser despreciada’ es idiomático y adecuado para la personificación femenina de Jerusalén. La revisión necesaria es principalmente de aparato de notas y anclaje.
  glossary_alignment: Se respeta correctamente la política del proyecto con ‘Yahvé’ para יְהוָה. No hay conflicto con otros términos clave. La elección ‘despreciada’ para זוֹלֵלָה concuerda con la racionalidad documentada. ‘Pan’, ‘vida’ y ‘cosas preciosas’ siguen bien las decisiones del POB.
  issues:
  - severity: medium
    issue: La nota [a] está colocada en ‘gime’ pero su contenido explica מחמודיהם.
    rationale: La alternativa ‘sus tesoros / sus cosas deseables’ corresponde a ‘sus cosas preciosas’, no al verbo ‘gime’. Así, el lector recibe una nota en el lugar equivocado y se distorsiona la trazabilidad léxica.
  - severity: medium
    issue: La nota [c] está colocada en ‘contempla’ pero su contenido explica זוֹלֵלָה.
    rationale: La nota ofrece alternativas como ‘vil’ / ‘contemptible’, que pertenecen a ‘despreciada’, no al segundo imperativo. Debe moverse al término final pertinente.
  - severity: low
    issue: La nota [b] formula la literalidad de modo impreciso.
    rationale: Decir ‘Literalmente, “para restaurar la vida”’ no añade información porque esa es ya la traducción principal. Dado que el trasfondo es נֶפֶשׁ, conviene reflejar ‘alma/vida’ en la nota para conservar la alternativa documentada.
