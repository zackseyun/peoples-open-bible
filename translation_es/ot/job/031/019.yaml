translation:
  language: es
  text: si he visto a alguien perecer por falta de ropa[a], o al necesitado[b] sin abrigo—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sin ropa» para «por falta de ropa».
    reason: lexical_alternative
  - marker: b
    text: O «el pobre» en lugar de «el necesitado».
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - cuando
  lexicon: HALOT
  rationale: Introduce la protasis condicional del juramento de Job; «si» preserva con claridad la estructura condicional del hebreo.
- source_word: אֶרְאֶה
  english_pob_choice: I have seen
  chosen_spanish: he visto
  alternatives_spanish:
  - vi
  - veo
  lexicon: HALOT
  rationale: En este contexto de juramento retrospectivo, el perfecto español expresa naturalmente la acción vista por Job y mantiene el matiz de revisión de la propia conducta.
- source_word: אֹבֵד
  english_pob_choice: anyone perishing
  chosen_spanish: a alguien que perece
  alternatives_spanish:
  - a alguien que se pierde
  - a alguien arruinado
  lexicon: HALOT
  rationale: El participio indica una persona en estado de perecer o estar arruinada; «perece» conserva ese sentido durativo y evita suavizar el término.
- source_word: מִבְּלִי לְבוּשׁ
  english_pob_choice: for lack of clothing
  chosen_spanish: por falta de ropa
  alternatives_spanish:
  - sin ropa
  - por carecer de vestido
  lexicon: HALOT
  rationale: La frase expresa carencia o privación; «por falta de ropa» comunica bien la causa sin perder la idea de ausencia material de vestido.
- source_word: וְאֵין
  english_pob_choice: and ... without
  chosen_spanish: o ... sin
  alternatives_spanish:
  - y ... sin
  - o no había
  lexicon: HALOT
  rationale: El hebreo une dos miembros paralelos con una coordinación que en español queda mejor como alternativa inclusiva; «o» refleja la revisión del audit trail en inglés y mantiene el paralelismo poético.
- source_word: כְּסוּת
  english_pob_choice: covering
  chosen_spanish: cobertura
  alternatives_spanish:
  - cobijo
  - cobertura para cubrirse
  lexicon: HALOT
  rationale: El término puede significar cobertura o prenda que cubre; «cobertura» conserva la distinción respecto de לְבוּשׁ y el matiz de protección/abrigo.
- source_word: לָאֶבְיוֹן
  english_pob_choice: the needy
  chosen_spanish: al necesitado
  alternatives_spanish:
  - al pobre
  - al menesteroso
  lexicon: HALOT
  rationale: אֶבְיוֹן denota una persona pobre o necesitada; «al necesitado» es claro y conserva la referencia a la indigencia material.
translation_notes:
  revision_awareness: El audit trail en inglés revisó la coordinación de and a or para reflejar mejor el hebreo; en español se siguió esa decisión con «o». También se mantuvo la equivalencia retrospectiva de «I have seen» con «he visto», y se preservó la distinción léxica entre לְבוּשׁ («ropa») y כְּסוּת («cobertura»).
  spanish_consistency_notes:
  - Se evitó «SEÑOR» y otras sustituciones no pertinentes porque el verso no contiene el nombre divino.
  - Se mantuvo un registro poético sobrio, con léxico común pero digno, adecuado para Job.
  - 'Los dos calificativos de necesidad se conservaron diferenciados: «alguien que perece» y «al necesitado».'
