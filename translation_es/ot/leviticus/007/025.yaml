  text: כִּ֚י כָּל אֹכֵ֣ל חֵ֔לֶב מִן הַ֨/בְּהֵמָ֔ה אֲשֶׁ֨ר יַקְרִ֥יב מִמֶּ֛/נָּה אִשֶּׁ֖ה לַ/יהוָ֑ה וְ/נִכְרְתָ֛ה הַ/נֶּ֥פֶשׁ הָ/אֹכֶ֖לֶת מֵֽ/עַמֶּֽי/הָ־־׃
base_translation:
  language: en
  yaml_path: translation/ot/leviticus/007/025.yaml
  text: For anyone who eats fat from an animal from which an offering made by fire is presented to Yahweh[b][a], the person who eats it shall be cut off from his people.
  footnotes:
  - marker: a
    text: Or 'a food offering' for 'an offering made by fire.' The Hebrew term refers to an offering consumed by fire on the altar.
    reason: lexical_alternative
  - marker: b
    text: '''Shall be cut off'' preserves the Hebrew legal formula. The precise penalty is debated; it may imply expulsion, death, or divine judgment.'
    reason: alternative_reading
