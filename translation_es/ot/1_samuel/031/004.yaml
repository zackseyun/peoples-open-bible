translation:
  language: es
  text: 'Entonces Saúl dijo a su escudero[a]: «Saca tu espada y traspásame con ella, no sea que estos incircuncisos[b] vengan y me traspasen y me maltraten[c]». Pero su escudero no quiso, porque tenía mucho miedo. Entonces Saúl tomó la espada y cayó sobre ella.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su portador de armas».
    reason: lexical_alternative
  - marker: b
    text: 'Término de desprecio con sentido de pacto: los no circuncidados.'
    reason: theological_note
  - marker: c
    text: O «se burlen de mí», «me humillen» o «me traten con desprecio».
    reason: lexical_alternative
lexical_decisions:
- source_word: נֹשֵׂא כֵלָיו
  english_pob_choice: his armor-bearer
  chosen_spanish: su escudero
  alternatives_spanish:
  - su portador de armas
  - su portaarmas
  lexicon: HALOT
  rationale: El hebreo designa al asistente militar que llevaba el equipo del guerrero. En español, «escudero» comunica con naturalidad esa función de acompañante armado y conserva el matiz militar sin volver la frase torpe o demasiado técnica.
- source_word: שְׁלֹף
  english_pob_choice: Draw
  chosen_spanish: Saca
  alternatives_spanish:
  - Desenvaina
  - Saca tu espada
  lexicon: HALOT
  rationale: El imperativo pide extraer la espada. «Saca» es breve, idiomático y fiel al acto concreto; «desenvaina» también sería posible, pero «saca» mantiene el tono directo del mandato.
- source_word: וְדָקְרֵנִי בָהּ
  english_pob_choice: and thrust me through with it
  chosen_spanish: y traspásame con ella
  alternatives_spanish:
  - y atácame con ella
  - y pásame a través con ella
  lexicon: HALOT
  rationale: דקר expresa herir o atravesar con un arma. «Traspásame» comunica con fuerza la intención letal y preserva mejor la imagen de atravesar que un verbo más débil como «herir».
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - a fin de que no
  lexicon: HALOT
  rationale: La construcción preventiva del hebreo se vierte naturalmente con «no sea que» en español, que conserva el sentido de temor ante un posible resultado.
- source_word: הָעֲרֵלִים הָאֵלֶּה
  english_pob_choice: these uncircumcised men
  chosen_spanish: estos incircuncisos
  alternatives_spanish:
  - estos hombres incircuncisos
  - estos incircuncisos hombres
  lexicon: HALOT
  rationale: Se conserva el valor insultante y pactal del hebreo sin añadir «filisteos», que sería una precisión contextual no explícita en la frase. En español, el sustantivo elíptico funciona bien y mantiene la dureza del apelativo.
- source_word: וּדְקָרֻנִי
  english_pob_choice: and thrust me through
  chosen_spanish: y me traspasen
  alternatives_spanish:
  - y me atraviesen
  - y me hieran
  lexicon: HALOT
  rationale: Se mantiene la repetición del mismo verbo de la petición inicial para conservar el eco retórico del hebreo. «Traspasen» repite con naturalidad la imagen de atravesar con arma blanca.
- source_word: וְהִתְעַלְּלוּ בִי
  english_pob_choice: and mistreat me
  chosen_spanish: y me maltraten
  alternatives_spanish:
  - y se burlen de mí
  - y me humillen
  - y me traten con desprecio
  lexicon: HALOT
  rationale: El verbo hebreo admite la idea de tratar abusiva o humillantemente a alguien, sin precisar exactamente de qué forma. «Maltraten» conserva esa amplitud y sigue la decisión del POB inglés de no sobreespecificar la escena.
- source_word: וְלֹא אָבָה
  english_pob_choice: was not willing
  chosen_spanish: no quiso
  alternatives_spanish:
  - no estuvo dispuesto
  - rehusó
  lexicon: HALOT
  rationale: Aquí el sentido es de negativa voluntaria. «No quiso» es natural en español y expresa bien la reticencia del escudero.
- source_word: כִּי יָרֵא מְאֹד
  english_pob_choice: because he was very afraid
  chosen_spanish: porque tenía mucho miedo
  alternatives_spanish:
  - porque estaba muy atemorizado
  - porque temía muchísimo
  lexicon: HALOT
  rationale: La causal se conserva claramente y el intensificador מְאֹד queda bien reflejado con «mucho». «Tenía mucho miedo» es más idiomático en español que una traducción más literal.
- source_word: וַיִּפֹּל עָלֶיהָ
  english_pob_choice: and fell on it
  chosen_spanish: se echó sobre ella
  alternatives_spanish:
  - cayó sobre ella
  - se dejó caer sobre ella
  lexicon: HALOT
  rationale: El hebreo dice literalmente que cayó sobre la espada. En español, para este modo de muerte, «se echó sobre ella» suena natural y conserva la idea sin convertir la frase en una descripción mecánica.
theological_decisions:
- issue: Gravedad e indeterminación del maltrato temido por Saúl
  english_pob_reading: Rendered וְהִתְעַלְּלוּ בִי as 'mistreat me' without specifying torture, mockery, or sexual violation.
  chosen_spanish_reading: y me maltraten
  alternative_spanish_readings:
  - y se burlen de mí
  - y me humillen
  - y me hagan burla
  rationale: El hebreo expresa trato abusivo o humillante, pero no define la forma exacta. La traducción española conserva esa tensión y evita añadir un contenido más específico que el texto no exige.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Sigo la revisión más reciente del POB inglés, que prefirió «mistreat me» para no sobreespecificar el tipo de humillación. En español, «maltraten» refleja esa misma amplitud semántica y evita introducir una escena no explicitada por el hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se usa «traspasar» de forma consistente para דקר, conservando la repetición verbal del original.
  - Se evita «SEÑOR» y «Cristo», que no corresponden a este texto.
  - «Escudero» funciona como equivalente idiomático de la figura militar, sin perder el valor de asistente armado.
  - Las notas al pie preservan alternativas relevantes sin sobrecargar el texto principal.
