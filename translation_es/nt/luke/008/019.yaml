review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego: llegada de la madre y los hermanos de Jesús, imposibilidad de llegar hasta él por la multitud. Sin embargo, los marcadores de notas al pie están invertidos respecto de su contenido. En el texto, [a] está anclado en «hermanos», pero la nota a dice «O “acercarse a él” o “llegar hasta él”», que corresponde a συντυχεῖν αὐτῷ. Y [b] está anclado en «acercarse a él», pero la nota b trata sobre «hermanos». Eso requiere corrección para mantener fidelidad al aparato auditado y a la disciplina de anclaje.'
  spanish_quality_summary: 'La redacción principal es natural, clara y digna: «Entonces llegaron a él su madre y sus hermanos, pero no podían acercarse a él a causa de la multitud». El español es fluido y bien ajustado al aspecto imperfectivo con «no podían». Solo hace falta reparar el sistema de notas.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «hermanos» preserva correctamente ἀδελφοί según la decisión teológica documentada; «multitud» para ὄχλος y «a causa de» para διὰ son adecuados. «acercarse a él» es una opción aceptable para συντυχεῖν αὐτῷ, con alternativas preservadas en nota.
  issues:
  - severity: medium
    issue: Los marcadores de notas al pie están asignados al término equivocado.
    rationale: La nota sobre el sentido alternativo de συντυχεῖν αὐτῷ debe anclarse en «acercarse a él», mientras que la nota sobre el griego «hermanos» debe anclarse en «hermanos». Tal como está, el lector recibe información incorrectamente vinculada.
  revised_spanish_text: Entonces llegaron a él su madre y sus hermanos[a], pero no podían acercarse a él[b] a causa de la multitud.
  revised_footnotes:
  - marker: a
    text: Griego «hermanos»; algunos lo interpretan más ampliamente como «parientes» o «familiares», pero el texto dice «hermanos».
    reason: alternative_reading
  - marker: b
    text: O «encontrarse con él» o «llegar hasta él».
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel y natural, pero se corrigen los anclajes de las notas para que cada una corresponda a la palabra o frase adecuada en español y al razonamiento lexical/teológico del expediente inglés.
