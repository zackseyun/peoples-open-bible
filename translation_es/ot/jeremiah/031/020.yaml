  to: ¿Es para mí Efraín un hijo precioso[a], un hijo de mis delicias? Pues cada vez que hablo de él, de veras sigo acordándome de él. Por eso mis entrañas se conmueven por él[b]; ciertamente tendré compasión de él, declara Yahvé.
  rationale: 'Se aplican reparaciones menores para mejorar la naturalidad y la fidelidad expresiva del español sin apartarse del hebreo ni del rastro auditado del POB: (1) se sustituye ''me acuerdo de él con certeza'' por ''de veras sigo acordándome de él'' para reflejar mejor la intensificación verbal y la persistencia de עוֹד; (2) se ajusta ''hijo de deleite'' a ''hijo de mis delicias'' para un español más natural que conserva el matiz afectivo; (3) se mantiene ''Yahvé'' y el hebraísmo de las entrañas con nota explicativa.'
