translation:
  language: es
  text: Ella solía sentarse debajo de la palmera de Débora, entre Ramá y Betel, en la región montañosa de Efraín, y los hijos de Israel subían adonde ella estaba para juicio[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para justicia» o «para una decisión legal». El hebreo puede referirse a la adjudicación judicial o a la administración de justicia.
    reason: lexical_alternative
lexical_decisions:
- source_word: יוֹשֶׁבֶת
  english_pob_choice: used to sit
  chosen_spanish: solía sentarse
  alternatives_spanish:
  - estaba sentada
  - se sentaba
  lexicon: HALOT
  rationale: El participio con valor habitual en contexto describe una acción repetida o acostumbrada. «Solía sentarse» comunica bien la habitualidad pasada en español sin volverla demasiado estática.
- source_word: תַּֽחַת
  english_pob_choice: under
  chosen_spanish: debajo de
  alternatives_spanish:
  - bajo
  - bajo de
  lexicon: HALOT
  rationale: La preposición indica ubicación inferior respecto al árbol. «Debajo de» suena natural y conserva la relación espacial de manera clara.
- source_word: תֹּ֜מֶר דְּבוֹרָ֗ה
  english_pob_choice: the palm of Deborah
  chosen_spanish: la palmera de Débora
  alternatives_spanish:
  - la palmera de Débora
  - la palmera llamada Débora
  - la palmera de Débora
  lexicon: HALOT
  rationale: En español, «palmera» comunica mejor el referente botánico y evita el tono de nombre formal. El genitivo se mantiene como posesión o asociación con Débora, tal como en el texto fuente y en la revisión inglesa.
- source_word: בֵּ֧ין הָ/רָמָ֛ה וּ/בֵ֥ין בֵּֽית אֵ֖ל
  english_pob_choice: between Ramah and Bethel
  chosen_spanish: entre Ramá y Betel
  alternatives_spanish:
  - entre la Ramá y Betel
  lexicon: HALOT
  rationale: Son topónimos establecidos; se conservan transliterados de forma usual en español bíblico. Se omite el artículo porque los nombres propios lo rechazan en este uso.
- source_word: בְּ/הַ֣ר אֶפְרָ֑יִם
  english_pob_choice: in the hill country of Ephraim
  chosen_spanish: en la región montañosa de Efraín
  alternatives_spanish:
  - en la serranía de Efraín
  - en el monte de Efraín
  lexicon: HALOT
  rationale: El singular con este sustantivo apunta al territorio montañoso, no a un solo monte. «Región montañosa» preserva el sentido geográfico de forma natural en español.
- source_word: וַ/יַּעֲל֥וּ אֵלֶ֛י/הָ
  english_pob_choice: went up to her
  chosen_spanish: subían a ella
  alternatives_spanish:
  - subían hasta ella
  - iban a ella
  lexicon: HALOT
  rationale: «Subían» conserva la imagen topográfica de עלה hacia el lugar elevado donde ella estaba. El complemento «a ella» mantiene el referente pronominal femenino del hebreo.
- source_word: בְּנֵ֥י יִשְׂרָאֵ֖ל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: Se preserva la expresión formal del hebreo, coherente con la política de precisión morfológica del proyecto. «Los israelitas» sería más idiomático, pero neutraliza la forma original.
- source_word: לַ/מִּשְׁפָּֽט
  english_pob_choice: for judgment
  chosen_spanish: para juicio
  alternatives_spanish:
  - para justicia
  - para decidir casos
  lexicon: HALOT
  rationale: El término puede referirse al acto judicial o al dictamen legal. «Para juicio» mantiene la concisión y la ambigüedad controlada del hebreo sin ampliarlo a una paráfrasis.
theological_decisions:
- issue: Expresión corporativa masculina בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Israel
  rationale: Se conserva la forma masculina plural del hebreo para no borrar la señal lingüística del original. Aunque designa al pueblo en conjunto, la traducción mantiene la huella morfológica que el texto presenta.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que bajó «Palm» a minúscula por tratarse de la palmera de Débora y no de un título formal. También respeta la lectura auditada de monte/territorio montañoso, el movimiento ascendente hacia ella y la expresión judicial final.
  spanish_consistency_notes:
  - Se mantiene «Débora» con acento según uso español.
  - «Juicio» se conserva como término jurídico breve; no se amplía a «justicia» para no borrar la posible referencia a decisión legal.
  - La frase «los hijos de Israel» sigue la política de fidelidad formal del proyecto.
  - «Subían a ella» conserva la dirección ascendente implícita en el hebreo.
