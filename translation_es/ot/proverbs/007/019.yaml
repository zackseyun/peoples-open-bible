- from: Porque el hombre no está en su casa[a]; se ha ido por un largo viaje.
  to: Porque el hombre no está en casa[a]; se ha ido de viaje lejos.
  rationale: Se ajusta «en su casa» a «en casa» para un español más natural y acorde con la equivalencia idiomática auditada. Se reemplaza «se ha ido por un largo viaje» por «se ha ido de viaje lejos» para corregir la sintaxis española y recuperar de forma más explícita el matiz de distancia de מֵרָחוֹק, sin borrar la naturalidad del conjunto.
