    reason: lexical_alternative
  - marker: b
    text: O «entre los lugares estrechos»; la expresión hebrea también puede insinuar aflicción o encierro, no solo un lugar físicamente estrecho.
    reason: lexical_alternative
  revision_rationale: 'Se hicieron ajustes menores para mejorar fidelidad léxica y naturalidad del español: se omitió «ella» por ser innecesario; se cambió «sus perseguidores» por «todos los que la persiguen» para reflejar mejor la imagen de רֹדְפֶיהָ; se sustituyó «entre los lugares estrechos» por «entre las angosturas», una formulación más idiomática y poética en español, manteniendo la alternativa en nota; y se afinó «la alcanzaron» a «la han alcanzado» para alinearlo mejor con el aspecto resultativo de la línea auditada inglesa.'
