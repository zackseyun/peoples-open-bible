  yaml_path: translation/ot/judges/012/006.yaml
  text: Then they said to him[a], “Please say ‘Shibboleth.’” But he said, “Sibboleth,” because he could not say it that way. So they seized him and slaughtered him at the fords of the Jordan. At that time forty-two thousand from Ephraim fell.
  footnotes:
