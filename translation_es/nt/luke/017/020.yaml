translation:
  language: es
  text: 'Ahora bien, cuando los fariseos le preguntaron cuándo venía el reino de Dios, les respondió y dijo: «El reino de Dios no viene con señales visibles»[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con observación», «de manera observable» o «con un atento vigilar».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐπερωτηθεὶς
  english_pob_choice: when he was asked
  chosen_spanish: cuando los fariseos le preguntaron
  alternatives_spanish:
  - cuando fue preguntado
  - habiendo sido preguntado
  lexicon: BDAG
  rationale: El participio aoristo pasivo introduce la circunstancia de la pregunta previa a la respuesta de Jesús. En español, una subordinada temporal con 'cuando' y verbo activo reproduce con naturalidad la escena sin perder el valor circunstancial ni forzar una pasiva poco idiomática.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora bien
  alternatives_spanish:
  - Entonces
  - Y
  lexicon: BDAG
  rationale: δέ marca una transición discursiva suave. 'Ahora bien' conserva ese giro narrativo sin exagerar la secuencia ni sonar demasiado rígido.
- source_word: ὑπὸ τῶν Φαρισαίων
  english_pob_choice: by the Pharisees
  chosen_spanish: los fariseos
  alternatives_spanish:
  - por los fariseos
  lexicon: BDAG
  rationale: La agencia ya queda clara en la estructura española con 'le preguntaron'; por eso se omite la pasiva analítica y se expresa el sujeto agente de forma directa y natural.
- source_word: πότε
  english_pob_choice: when
  chosen_spanish: cuándo
  alternatives_spanish:
  - a qué hora
  - en qué momento
  lexicon: BDAG
  rationale: Es una pregunta temporal directa; 'cuándo' es el equivalente natural y preciso en español.
- source_word: ἔρχεται
  english_pob_choice: was coming
  chosen_spanish: venía
  alternatives_spanish:
  - viene
  - había de venir
  lexicon: BDAG
  rationale: El contexto narrativo de pregunta indirecta en pasado pide un tiempo pasado en español. 'Venía' mantiene la idea de llegada/proceso de venir sin adelantar una formulación más interpretativa.
- source_word: ἡ βασιλεία τοῦ θεοῦ
  english_pob_choice: the kingdom of God
  chosen_spanish: el reino de Dios
  alternatives_spanish:
  - el reinado de Dios
  - el reino de Dios
  lexicon: BDAG
  rationale: '''Reino de Dios'' es la forma transparente y estable para βασιλεία τοῦ θεοῦ. ''Reinado de Dios'' puede ser una posibilidad contextual, pero aquí el término tradicional y directo comunica bien la referencia.'
- source_word: ἀπεκρίθη αὐτοῖς καὶ εἶπεν
  english_pob_choice: he answered them and said
  chosen_spanish: les respondió y dijo
  alternatives_spanish:
  - les respondió
  - contestó y dijo
  lexicon: BDAG
  rationale: Se conserva la duplicación verbal del griego en una forma natural en español. 'Les respondió y dijo' refleja ambas acciones sin sonar artificial.
- source_word: Οὐκ ἔρχεται
  english_pob_choice: does not come
  chosen_spanish: no viene
  alternatives_spanish:
  - no llega
  - no se presenta
  lexicon: BDAG
  rationale: Para expresar la llegada del reino, 'no viene' es la opción más directa y fiel al verbo de movimiento. Además, conserva el matiz de proceso/arribo presente en el griego.
- source_word: μετὰ παρατηρήσεως
  english_pob_choice: with observable signs
  chosen_spanish: con señales visibles[a]
  alternatives_spanish:
  - con observación
  - de manera observable
  - con un atento vigilar
  lexicon: BDAG
  rationale: παρατήρησις admite 'observación', 'vigilancia' o 'scrutiny', pero en contexto Jesús niega que el reino llegue de un modo detectable por señales externas. 'Señales visibles' comunica esa idea con claridad en español y evita la ambigüedad de una traducción demasiado literal.
theological_decisions:
- issue: Sentido de la negación sobre la venida del reino
  english_pob_reading: Jesus denies that the kingdom of God comes in a manner marked by outwardly observable signs that can be tracked.
  chosen_spanish_reading: Jesús niega que el reino de Dios llegue acompañado de señales externas observables como criterio de detección.
  alternative_spanish_readings:
  - Jesús niega toda observación humana del reino
  - Jesús niega cualquier señal escatológica
  rationale: 'La frase μετὰ παρατηρήσεως no obliga a negar toda percepción posible ni a resolver la cuestión escatológica completa. ''Señales visibles'' mantiene la tensión del pasaje: el reino no se presenta como algo que pueda verificarse mediante vigilancia de signos externos.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB que ajustó la pregunta a pasado ('was coming') para armonizarla con el marco narrativo. En español se reflejó con 'venía' y se mantuvo la decisión revisada de expresar μετὰ παρατηρήσεως como una referencia a señales observables.
  spanish_consistency_notes:
  - Se conserva 'reino de Dios' como terminología estable para βασιλεία τοῦ θεοῦ.
  - '''Ahora bien'' reproduce el matiz discursivo de δέ sin sobrecargar la secuencia narrativa.'
  - La nota [a] se ancla en 'señales visibles' para preservar la alternativa léxica sobre παρατήρησις.
  - Se evita 'SEÑOR' porque el texto griego aquí usa θεοῦ, no κύριος.
