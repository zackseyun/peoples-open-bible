review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del griego: olvido de Dios, luego aflicción causada a Jerusalén personificada. Sin embargo, introduce «Yahvé» donde la fuente griega dice simplemente θεὸν αἰώνιον. Según las instrucciones del proyecto, «Yahvé» se usa para יהוה o cuando κύριος cite/aluda claramente al nombre divino; aquí la evidencia fuente presentada no justifica explicitar el nombre. También conviene ajustar el número a plural para corresponder a ὑμᾶς y los verbos griegos en 2ª plural.'
  spanish_quality_summary: El español es claro y digno. No obstante, «Olvidaste / te alimentó / entristeciste / te crió» pasa innecesariamente al singular, mientras que el original está en plural («ustedes/vosotros»). Una formulación en plural con «los» mejora la fidelidad y la legibilidad eclesial neutral. «Entristecieron» funciona, pero «afligieron» o «causaron dolor a» expresa un poco mejor el peso de ἐλυπήσατε; aun así, «entristecieron» sigue siendo aceptable.
  glossary_alignment: 'Debe corregirse la decisión sobre el nombre divino: aquí corresponde «al Dios eterno», no «a Yahvé, el Dios eterno». «Jerusalén» está bien. La personificación maternal de Jerusalén se preserva adecuadamente con «que los crió».'
  issues:
  - severity: high
    issue: Se añadió «Yahvé» sin apoyo directo en la fuente griega.
    rationale: El texto fuente dice θεὸν αἰώνιον, no יהוה ni κύριος. La política terminológica no autoriza insertar el nombre divino por inferencia general en este caso.
  - severity: high
    issue: Cambio indebido de plural a singular en toda la oración.
    rationale: 'ὑμᾶς aparece dos veces y los verbos ἐπελάθεσθε / ἐλυπήσατε están en 2ª plural. El español debe reflejarlo: «olvidaron… los alimentó… afligieron/entristecieron… los crió».'
  - severity: medium
    issue: La justificación teológica sobre «Yahvé» contradice la evidencia fuente disponible.
    rationale: La nota interna afirma una remisión contextual al nombre divino, pero el paquete canónico y la traducción inglesa auditada no documentan tal paso interpretativo.
  revised_spanish_text: Olvidaron al Dios eterno, que los alimentó; también afligieron a Jerusalén, que los crió.
  revision_rationale: Se elimina «Yahvé» para ceñirse a θεὸν αἰώνιον, y se corrige toda la frase al plural para concordar con el griego. Se mantiene la personificación de Jerusalén y se usa «afligieron» para reflejar con sobriedad el peso de ἐλυπήσατε.
