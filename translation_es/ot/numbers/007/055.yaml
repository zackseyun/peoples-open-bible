  language: en
  yaml_path: translation/ot/numbers/007/055.yaml
  text: His offering was one silver plate[a], its weight one hundred thirty shekels, one silver basin of seventy shekels, according to the shekel of the sanctuary[c][b]; both of them were full of fine flour mixed with oil for a grain offering.
  footnotes:
