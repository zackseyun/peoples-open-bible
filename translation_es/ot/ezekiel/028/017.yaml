translation:
  language: es
  text: Tu corazón se enalteció[a] a causa de tu hermosura; corrompiste tu sabiduría por causa de tu esplendor. Te arrojé[b] a la tierra; te puse delante de reyes[c], para que te contemplaran.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Tu corazón se volvió orgulloso a causa de tu hermosura; arruinaste tu sabiduría por causa de tu resplandor».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Te arrojé a la tierra».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «te hice un espectáculo delante de reyes».'
    reason: alternative_reading
lexical_decisions:
- source_word: גָּבַהּ לִבְּךָ
  english_pob_choice: Your heart was lifted up
  chosen_spanish: Tu corazón se enalteció
  alternatives_spanish:
  - Tu corazón se elevó
  - Tu corazón se volvió orgulloso
  - Tu corazón fue levantado
  lexicon: HALOT
  rationale: El hebreo expresa literalmente que el corazón ‘se hizo alto’. ‘Se enalteció’ conserva la metáfora de elevación y comunica con naturalidad el sentido moral de orgullo sin desdibujar la imagen del texto.
- source_word: בְּיָפְיֶךָ
  english_pob_choice: because of your beauty
  chosen_spanish: a causa de tu hermosura
  alternatives_spanish:
  - por tu hermosura
  - a causa de tu belleza
  - debido a tu hermosura
  lexicon: HALOT
  rationale: La preposición ב aquí es causal en contexto. ‘A causa de’ refleja mejor la relación causal que una simple preposición locativa, y ‘hermosura’ mantiene un registro más bíblico y natural que ‘belleza’ sin perder el sentido.
- source_word: שִׁחַתָּ
  english_pob_choice: you corrupted
  chosen_spanish: corrompiste
  alternatives_spanish:
  - arruinaste
  - destruiste
  - pervertiste
  lexicon: HALOT
  rationale: El verbo indica deteriorar o echar a perder. ‘Corrompiste’ funciona bien con ‘sabiduría’ y conserva la fuerza moral del texto. ‘Pervertiste’ es posible, pero en español puede sonar más estrechamente ético que intelectual.
- source_word: חָכְמָתְךָ
  english_pob_choice: your wisdom
  chosen_spanish: tu sabiduría
  alternatives_spanish:
  - tu conocimiento
  - tu habilidad
  - tu prudencia
  lexicon: HALOT
  rationale: En este lamento profético, חכמה abarca capacidad práctica y discernimiento; ‘sabiduría’ es el equivalente más amplio y fiel en español. ‘Habilidad’ estrecha demasiado el campo semántico.
- source_word: עַל יִפְעָתֶךָ
  english_pob_choice: because of your splendor
  chosen_spanish: por causa de tu esplendor
  alternatives_spanish:
  - a causa de tu resplandor
  - debido a tu radiancia
  - por tu brillo
  lexicon: HALOT
  rationale: יִפְעָה denota resplandor, brillo o esplendor. ‘Esplendor’ mantiene la relación con ‘hermosura’ y preserva el paralelismo poético; ‘resplandor’ sería también válido, pero suena un poco más físico.
- source_word: עַל אֶרֶץ
  english_pob_choice: to the earth
  chosen_spanish: a la tierra
  alternatives_spanish:
  - a la tierra
  - al suelo
  - a la tierra firme
  lexicon: HALOT
  rationale: Aunque ‘tierra’ puede tener matiz amplio, aquí reproduce con fidelidad el valor de אֶרֶץ y coincide con la revisión inglesa que prefirió ‘earth’ sobre ‘ground’. ‘Suelo’ sería más idiomático, pero menos cercano al hebreo.
- source_word: הִשְׁלַכְתִּיךָ
  english_pob_choice: I cast you
  chosen_spanish: te arrojé
  alternatives_spanish:
  - te lancé
  - te eché
  - te tiré
  lexicon: HALOT
  rationale: El hifil de שלך expresa un acto fuerte de echar o lanzar. ‘Arrojé’ conserva la violencia del juicio y suena natural en español bíblico contemporáneo. ‘Eché’ sería más suave y menos preciso aquí.
- source_word: לִפְנֵי מְלָכִים נְתַתִּיךָ
  english_pob_choice: I set you before kings
  chosen_spanish: te puse delante de reyes
  alternatives_spanish:
  - te coloqué delante de reyes
  - te presenté delante de reyes
  - te puse ante reyes
  lexicon: HALOT
  rationale: ‘Poner delante de’ conserva la relación espacial y formal del hebreo. ‘Ante reyes’ es posible, pero ‘delante de reyes’ resulta más claro y mantiene el contraste escénico del texto.
- source_word: לְרַאֲוָה בָךְ
  english_pob_choice: for them to look at you
  chosen_spanish: para que te miraran
  alternatives_spanish:
  - para contemplarte
  - para verte
  - como espectáculo para ellos
  lexicon: HALOT
  rationale: 'La expresión final comunica propósito: ser visto. ‘Para que te miraran’ es una forma natural que preserva la finalidad sin forzar una paráfrasis más interpretativa. ‘Como espectáculo’ es viable, pero introduce con más fuerza la interpretación que la imagen misma.'
theological_decisions:
- issue: Identificación del destinatario de la burla profética
  english_pob_reading: The verse addresses the king/ruler of Tyre in prophetic taunt language, without resolving in translation whether the imagery also alludes typologically to a supernatural being.
  chosen_spanish_reading: El versículo se dirige al rey o gobernante de Tiro en lenguaje profético de burla, sin resolver en la traducción si la imagen también alude tipológicamente a un ser sobrenatural.
  alternative_spanish_readings:
  - Se refiere solo a un gobernante humano de Tiro.
  - Alude directamente a un ser celestial caído.
  rationale: El hebreo presenta un ‘tú’ singular en un oráculo de juicio y humillación. La traducción debe conservar esa fuerza retórica sin decidir por adelantado una identificación teológica que el versículo no explicita por sí mismo.
  doctrine_reference: Preservar la tensión teológica sin resolverla de antemano.
translation_notes:
  revision_awareness: La redacción sigue de cerca el último estado auditado en inglés, especialmente la revisión que prefirió ‘earth’ para אֶרֶץ. En español se mantuvo ‘tierra’ por ajuste natural y correspondencia léxica directa, sin perder el valor de humillación del juicio. También se conservó la equivalencia causal de las dos preposiciones ב y עַל, y la clausula final se resolvió como propósito (‘para que te miraran’) en línea con el POB inglés, dejando una nota alternativa para la lectura ‘espectáculo’.
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ por norma general cuando el texto no exige aquí la presencia explícita del nombre divino.
  - Se eligió ‘tierra’ para אֶרֶץ en un sentido de descenso/juzgamiento; no se optó por ‘suelo’ para no estrechar indebidamente el campo semántico.
  - Se mantuvo la metáfora del corazón ‘enaltecido’ para no diluir la imagen de elevación asociada al orgullo.
  - ‘Esplendor’ se coordinó con ‘hermosura’ para preservar el paralelismo poético del hebreo.
  - La nota alternativa sobre ‘espectáculo’ se dejó solo como opción interpretativa, no como texto principal, para respetar la ambigüedad del hebreo y del audit trail inglés.
