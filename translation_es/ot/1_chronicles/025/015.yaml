translation:
  language: es
  text: el octavo[a], Jeshaías, sus hijos y sus hermanos, doce.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la octava división: Jeshaías, sus hijos y sus hermanos, doce». La palabra «división» se añade por el contexto de la lista del capítulo, no aparece explícitamente en este versículo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשְּׁמִינִי
  english_pob_choice: the eighth
  chosen_spanish: el octavo
  alternatives_spanish:
  - la octava división
  - el octavo sorteo
  lexicon: HALOT
  rationale: El hebreo usa un ordinal con artículo dentro de una lista de turnos; en español, "el octavo" conserva la brevedad y deja implícito, como en el inglés POB, que el contexto del capítulo aporta la idea de reparto por turnos o sorteos sin añadir una palabra no expresada aquí.
- source_word: יְשַׁעְיָהוּ
  english_pob_choice: Jeshaiah
  chosen_spanish: Jeshaías
  alternatives_spanish:
  - Jeshaiahu
  lexicon: Nombre propio
  rationale: Se translitera el nombre propio al español. "Jeshaías" es una forma natural y reconocible en español bíblico, manteniendo el valor onomástico sin traducir.
- source_word: בָּנָיו
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus descendientes
  lexicon: HALOT
  rationale: El hebreo dice literalmente "sus hijos". En español, "hijos" comunica el parentesco sin forzar una precisión masculina adicional que ya está implícita en el contexto genealógico; se evita "hijos varones" por añadir énfasis no expresado explícitamente en la línea.
- source_word: וְאֶחָיו
  english_pob_choice: and his brothers
  chosen_spanish: y sus hermanos
  alternatives_spanish:
  - y sus parientes
  - y sus hermanos de clan
  lexicon: HALOT
  rationale: '"Hermanos" es la correspondencia directa y conserva la relación familiar del hebreo. Aunque en algunos contextos puede ampliarse a parientes, aquí la formulación simple es la más fiel al texto.'
- source_word: שְׁנֵים עָשָׂר
  english_pob_choice: twelve
  chosen_spanish: doce
  alternatives_spanish:
  - eran doce
  lexicon: HALOT
  rationale: El hebreo cierra con un numeral sin verbo expreso. El español también puede mantener la tersura con solo "doce", sin introducir "eran".
translation_notes:
  revision_awareness: El contexto de 1 Crónicas 25 enumera turnos o asignaciones; la traducción principal conserva la sobriedad del hebreo y la nota registra la alternativa contextual que el inglés POB también documenta.
  spanish_consistency_notes:
  - 'Se mantiene el orden breve del hebreo: ordinal, nombre, descendencia, hermanos y total final.'
  - Se evitó introducir un verbo copulativo en el cuerpo principal para respetar la elipsis hebrea.
  - Se usa "Jeshaías" como transliteración española estable y de lectura natural.
  - La nota al pie preserva la tensión entre el texto estrictamente explícito y la inferencia contextual de la lista.
