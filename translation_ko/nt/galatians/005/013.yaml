  lexicon: BDAG
  rationale: 「~을 위하여」가 ἐπί의 목적적 의미를 자연스럽게.
- source_word: ἀφορμὴν τῇ σαρκί
  english_pob_choice: an opportunity for the flesh
  chosen_korean: 육체를 위한 빌미
  alternatives_korean:
