review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura causal y comparativa del hebreo, y conserva la brusquedad del doble imperativo final. Sin embargo, introduce una inconsistencia léxica importante al mezclar «aborreció/aborrecido» con «odio», cuando el hebreo repite la misma raíz שׂנא / שׂנאה y el inglés auditado preserva explícitamente esa repetición con «hated / hatred».
  spanish_quality_summary: El español es claro y natural, pero «aborreció» suena más literario y menos directo que «odió», y combinado con «odio» rompe la cohesión interna de la frase. Además, «vete» es defendible, pero el inglés POB prefirió la mayor literalidad de «go» y explicó en nota las expansiones interpretativas; en español, «ve» preserva mejor la sequedad de dos palabras, mientras la nota puede aclarar el matiz de rechazo.
  glossary_alignment: No hay términos teológicos de glosario mayor en juego. La principal cuestión léxica es preservar en español la familia verbal de «odiar/odio» más estrechamente, en línea con la decisión documentada del POB de mantener la intensificación y repetición del hebreo.
  issues:
  - severity: medium
    issue: Inconsistencia en la familia léxica de שׂנא / שׂנאה
    rationale: El texto usa «aborreció ... odio ... había aborrecido», pero el hebreo y el English POB enfatizan la repetición de la misma raíz. «Odió ... odio ... había odiado» preserva mejor ese efecto auditado.
  - severity: low
    issue: La nota [a] explica una repetición que la traducción no mantiene plenamente
    rationale: La nota afirma que se mantiene la repetición con «aborreció / odio», pero eso solo la conserva parcialmente y de modo desigual.
  - severity: low
    issue: «Vete» añade un matiz interpretativo mayor que «ve»
    rationale: Aunque es idiomático y brusco, «vete» se acerca a una expansión interpretativa. Dado que la nota ya explica el carácter despectivo, «ve» representa más de cerca el hebreo לֵכִי y la filosofía de brevedad del POB.
  revised_spanish_text: 'Entonces Amnón la odió con un odio muy grande,[a] porque el odio con que la había odiado era mayor que el amor con que la había amado. Y Amnón le dijo: «Levántate, ve».[b]'
  revised_footnotes:
