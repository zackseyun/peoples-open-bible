    text: O «después de haberlo llevado alrededor». El hebreo describe el traslado repetido o el movimiento del arca de un lugar a otro.
    reason: lexical_alternative
  - marker: b
    text: O «se llenaron de tumores». La expresión hebrea describe la aparición o erupción de hinchazones corporales.
    reason: lexical_alternative
