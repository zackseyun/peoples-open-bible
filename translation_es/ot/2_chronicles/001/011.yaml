source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֱלֹהִ֣ים לִ/שְׁלֹמֹ֡ה יַ֣עַן אֲשֶׁר֩ הָיְתָ֨ה זֹ֜את עִם לְבָבֶ֗/ךָ וְ/לֹֽא שָׁ֠אַלְתָּ עֹ֣שֶׁר נְכָסִ֤ים וְ/כָבוֹד֙ וְ/אֵת֙ נֶ֣פֶשׁ שֹׂנְאֶ֔י/ךָ וְ/גַם יָמִ֥ים רַבִּ֖ים לֹ֣א שָׁאָ֑לְתָּ וַ/תִּֽשְׁאַל לְ/ךָ֙ חָכְמָ֣ה וּ/מַדָּ֔ע אֲשֶׁ֤ר תִּשְׁפּוֹט֙ אֶת עַמִּ֔/י אֲשֶׁ֥ר הִמְלַכְתִּ֖י/ךָ עָלָֽי/ו־׀־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/001/011.yaml
  text: And God said to Solomon[a], “Because this was in your heart, and you did not ask for wealth, possessions, or honor, or for the life of those who hate you, nor did you ask for many days, but asked for wisdom and knowledge for yourself[b], that you might judge my people over whom I have made you king,”
  footnotes:
  - marker: a
    text: Or 'long life' for 'many days.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the lives of your enemies'; literally 'the life of those who hate you.'
    reason: lexical_alternative
