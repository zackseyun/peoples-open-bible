translation:
  language: es
  text: Mira[a], me iría muy lejos, vagando; me alojaría en la soledad[b]. Selah[c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «me iría muy lejos huyendo» o «huiría muy lejos». El hebreo combina un verbo de alejamiento con una forma de una raíz que puede sugerir tanto vagar como huir.
    reason: lexical_alternative
  - marker: b
    text: O «pasaría la noche en la soledad». El verbo también puede significar «pernoctar».
    reason: lexical_alternative
  - marker: c
    text: «Selah» se deja sin traducir tradicionalmente; su sentido preciso es incierto, posiblemente una indicación musical o litúrgica.
    reason: cultural_note
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira aquí
  - Mira bien
  - He aquí
  lexicon: HALOT
  rationale: La forma introductoria llama la atención del oyente con inmediatez. «Mira» conserva esa fuerza natural en español moderno mejor que un calco solemne como «He aquí».
- source_word: אַרְחִיק
  english_pob_choice: I would wander far away
  chosen_spanish: yo me alejaría errante
  alternatives_spanish:
  - me alejaría muy lejos
  - yo iría lejos
  - yo me apartaría lejos
  lexicon: HALOT
  rationale: El verbo en hifil expresa causar distancia o ir lejos; en este contexto, unido a נְדֹד, sugiere un alejamiento activo y fugitivo. «Me alejaría errante» intenta reflejar tanto la distancia como el movimiento inquieto.
- source_word: נְדֹד
  english_pob_choice: wander
  chosen_spanish: errante
  alternatives_spanish:
  - fugitivo
  - vagando
  - de un lado a otro
  lexicon: HALOT
  rationale: La raíz aporta la idea de vagar o huir con inquietud. En español, el adjetivo/adverbio «errante» transmite bien ese matiz de movimiento sin fijar excesivamente la imagen en una sola modalidad de fuga.
- source_word: אָלִין
  english_pob_choice: I would lodge
  chosen_spanish: pasaría la noche
  alternatives_spanish:
  - me alojaría
  - me quedaría a pasar la noche
  - pernoctaría
  lexicon: HALOT
  rationale: El verbo alude a alojarse o pasar la noche. «Pasaría la noche» es claro y natural en español, y conserva la concreción de la acción sin endurecer el verso con un tecnicismo.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto solitario
  - en la estepa
  - en el yermo
  lexicon: HALOT
  rationale: Aunque מִדְבָּר puede abarcar más que un desierto arenoso, en español «desierto» comunica bien el lugar deshabitado y apartado. Se prefirió por claridad poética y uso bíblico reconocible.
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  alternatives_spanish:
  - —
  lexicon: HALOT
  rationale: Se conserva la transliteración porque el término no tiene un equivalente seguro; probablemente sea una indicación musical o litúrgica.
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con el texto hebreo y con la auditoría inglesa; no se observan revisiones sustanciales aplicadas en el paso más reciente.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando el texto fuente lo requiera; aquí no aparece.
  - Se preservó el término técnico/litúrgico «Selah» sin normalizarlo.
  - Se evitó «SEÑOR» o «behold» calcos; la apertura se tradujo con un imperativo natural y directo.
  - Se mantuvo la tensión semántica entre distancia y fuga en «me alejaría errante».
