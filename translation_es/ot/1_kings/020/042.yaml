    rationale: El texto no traduce 'bajo', así que una nota sobre una supuesta literalidad 'tu pueblo bajo su pueblo' no ayuda al lector. El sentido sustitutivo ya está bien expresado por 'por'.
  revised_spanish_text: 'Y le dijo: «Así dice Yahvé: Por cuanto has dejado escapar de tu mano al hombre[a] que yo había destinado a destrucción, tu vida será por su vida, y tu pueblo por su pueblo».

    '
