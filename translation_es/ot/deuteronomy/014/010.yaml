    rationale: El hebreo solo tiene 'no comerán' en plural prohibitivo; el pronombre 'la' añade un objeto singular femenino no expresado y hace más torpe la regla general.
  - severity: low
    issue: '''cualquier cosa'' es menos preciso que ''todo lo que'''
    rationale: Aunque no es incorrecto, el hebreo כֹל אֲשֶׁר se refleja mejor en español bíblico natural como 'todo lo que' en una clasificación legal.
  - severity: low
    issue: Concordancia estilística de 'inmunda'
    rationale: Al revisar el inicio a 'todo lo que', la forma más natural es 'inmundo'; además evita depender del referente implícito femenino creado por 'cosa'.
  revised_spanish_text: Pero todo lo que no tenga aletas y escamas no comerán; es inmundo para ustedes.
