    text: 'Hebreo: «sus hijas», un modismo para asentamientos menores dependientes de una ciudad principal.'
    reason: cultural_note
  - marker: b
    text: O «¿por qué no las libraron?» o «¿por qué no las salvaron?». En este contexto, el sentido es reclamar esas ciudades o territorio.
    reason: lexical_alternative
  revision_rationale: Se corrige la persona verbal de singular a plural para reflejar fielmente el hebreo 2mp. También se ajusta la expresión temporal a «durante trescientos años» y «durante ese tiempo» para mantener el valor durativo destacado en el expediente inglés y sonar más natural en español.
