base_translation:
  language: en
  yaml_path: translation/ot/2_kings/010/011.yaml
  text: So Jehu struck down all who remained of the house of Ahab in Jezreel[a], and all his great men, his close associates, and his priests[c][b], until he left him no survivor.
  footnotes:
