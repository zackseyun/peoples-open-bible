translation:
  language: es
  text: 'Y así ha sido desde aquel día en adelante: lo estableció como un estatuto y una ordenanza para Israel hasta el día de hoy[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo estableció como un estatuto y un juicio para Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it has been so
  chosen_spanish: Y así ha sido
  alternatives_spanish:
  - Y así fue
  - Y sucedió así
  lexicon: HALOT
  rationale: El hebreo introduce una situación que permanece en vigor; «ha sido» conserva el valor resultativo y continuado mejor que un simple pasado narrativo.
- source_word: מֵהַיּוֹם הַהוּא וָמָעְלָה
  english_pob_choice: from that day forward
  chosen_spanish: desde aquel día en adelante
  alternatives_spanish:
  - desde aquel día y más arriba
  - desde aquel día hacia adelante
  lexicon: HALOT
  rationale: La locución temporal hebrea expresa continuidad desde un punto determinado hacia el futuro. «En adelante» transmite ese sentido en español natural y formal.
- source_word: וַיְשִׂמֶהָ
  english_pob_choice: he made it
  chosen_spanish: lo estableció
  alternatives_spanish:
  - lo hizo
  - lo puso
  lexicon: HALOT
  rationale: El verbo שׂים puede significar «poner, hacer, establecer». En este contexto jurídico-normativo, «estableció» refleja mejor la fuerza de fijar una práctica como norma.
- source_word: לְחֹק
  english_pob_choice: a statute
  chosen_spanish: un estatuto
  alternatives_spanish:
  - un decreto
  - una norma fija
  lexicon: HALOT
  rationale: חֹק denota algo prescrito o establecido. «Estatuto» conserva el matiz formal y normativo sin perder claridad en español.
- source_word: וּלְמִשְׁפָּט
  english_pob_choice: and an ordinance
  chosen_spanish: y una ordenanza
  alternatives_spanish:
  - y un juicio
  - y un reglamento
  lexicon: HALOT
  rationale: מִשְׁפָּט aquí funciona en paralelo con חֹק como norma vinculante. «Ordenanza» mantiene el paralelismo jurídico; «juicio» sería más literal pero menos natural en español en este contexto.
- source_word: לְיִשְׂרָאֵל
  english_pob_choice: for Israel
  chosen_spanish: para Israel
  alternatives_spanish:
  - para los israelitas
  - en Israel
  lexicon: HALOT
  rationale: La preposición ל indica destinatario o ámbito de aplicación. «Para Israel» expresa con precisión que la norma quedó vigente para el pueblo.
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: to this day
  chosen_spanish: hasta este día
  alternatives_spanish:
  - hasta el día de hoy
  - hasta hoy
  lexicon: HALOT
  rationale: Es el equivalente idiomático habitual en español para indicar vigencia hasta el tiempo del narrador.
theological_decisions:
- issue: Naturaleza normativa de חֹק y מִשְׁפָּט
  english_pob_reading: he made it a statute and an ordinance for Israel
  chosen_spanish_reading: lo estableció como un estatuto y una ordenanza para Israel
  alternative_spanish_readings:
  - lo estableció como una ley y un juicio para Israel
  - lo hizo norma y juicio para Israel
  rationale: 'No hay una cuestión doctrinal disputada, pero sí una tensión léxica: ambos sustantivos expresan la fijación de una práctica con fuerza normativa. «Estatuto» y «ordenanza» preservan mejor la formalidad legal del hebreo que opciones más interpretativas.'
  doctrine_reference: Uso bíblico de la ley/prescripción en narrativas históricas; cf. vocabulario legal del AT.
translation_notes:
  revision_awareness: La revisión inglesa ajustó «was so» a «has been so» para subrayar continuidad hasta «this day», y cambió «onward» por «forward». La redacción española refleja esa continuidad con «ha sido» y «en adelante», manteniendo el carácter durativo del hebreo y del POB revisado.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque el texto no contiene el nombre divino.
  - «Estatuto» y «ordenanza» se conservaron como pareja jurídica formal para reflejar el paralelismo del hebreo.
  - Se evitó «señor» o fórmulas eclesiásticas no presentes en el original.
  - El perfecto compuesto «ha sido» expresa mejor la vigencia continuada que un pretérito simple.
