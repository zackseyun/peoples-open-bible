translation:
  language: es
  text: ¡Sean destrozados[a], pueblos, y sean quebrantados; escuchen, todos los rincones lejanos de la tierra. Cíñanse para la batalla, y sean quebrantados; cíñanse para la batalla[b], y sean quebrantados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo inicial es difícil. También podría rendirse como «¡Levanten un grito de guerra, pueblos!» o «¡Únanse, pueblos!».
    reason: alternative_reading
  - marker: b
    text: O «cíñanse»; el hebreo se refiere a prepararse, probablemente para el conflicto.
    reason: lexical_alternative
lexical_decisions:
- source_word: רֹעוּ
  english_pob_choice: Be shattered
  chosen_spanish: ¡Sean destrozados[a]!
  alternatives_spanish:
  - ¡Levanten un grito de guerra!
  - ¡Únanse!
  - ¡Sean malvados!
  lexicon: HALOT
  rationale: El hebreo inicial es difícil y admite lecturas alternativas. Dado el paralelismo con «y sean quebrantados» y el tono de juicio contra pueblos hostiles, elegí una forma de ruina/derrumbe que conserve la ironía profética. «Destrozados» comunica mejor esa fuerza que un giro más neutro.
- source_word: עַמִּים
  english_pob_choice: peoples
  chosen_spanish: pueblos
  alternatives_spanish:
  - naciones
  lexicon: HALOT
  rationale: «Pueblos» refleja mejor el plural directo del hebreo y su tono poético; «naciones» también sería posible, pero suena menos cercano al sustantivo del original.
- source_word: וָחֹתּוּ
  english_pob_choice: and be broken
  chosen_spanish: y sean quebrantados
  alternatives_spanish:
  - y sean destrozados
  - y sean desalentados
  lexicon: HALOT
  rationale: El verbo חתת puede expresar quebranto, derrumbe o desánimo. «Quebrantados» conserva bien el sentido de derrota y colapso, y además armoniza con la repetición del verso.
- source_word: וְהַאֲזִינוּ
  english_pob_choice: listen
  chosen_spanish: escuchen
  alternatives_spanish:
  - presten oído
  - oigan
  lexicon: HALOT
  rationale: El imperativo hifil de האזין pide escuchar con atención. «Escuchen» es natural en español moderno y mantiene el llamado solemne.
- source_word: כֹּל מֶרְחַקֵּי אָרֶץ
  english_pob_choice: all distant parts of the earth
  chosen_spanish: todos los confines lejanos de la tierra
  alternatives_spanish:
  - todas las regiones lejanas de la tierra
  - todos los rincones distantes de la tierra
  lexicon: HALOT
  rationale: La frase amplía el alcance del llamado a quienes están lejos geográficamente. «Con fines lejanos» preserva el carácter expansivo y poético del hebreo sin volverlo torpe.
- source_word: הִתְאַזְּרוּ
  english_pob_choice: Strap yourselves on for battle
  chosen_spanish: Ciñanse para la batalla[b]
  alternatives_spanish:
  - Ciñanse
  - Armaos
  lexicon: HALOT
  rationale: El hitpael de אזר significa ceñirse o prepararse, a menudo para conflicto. «Ciñanse para la batalla» hace explícito el matiz militar que el contexto exige, sin abandonar el valor básico del verbo.
theological_decisions:
- issue: Cómo reflejar la fuerza del primer imperativo oscuro, רֹעוּ
  english_pob_reading: 'A taunting/judgment summons to the nations: ''Be shattered'''
  chosen_spanish_reading: 'Una convocatoria de juicio y burla a los pueblos: «¡Sean destrozados!»'
  alternative_spanish_readings:
  - ¡Levanten un grito de guerra!
  - ¡Únanse, pueblos!
  rationale: 'El hebreo es debatido, pero el contexto inmediato repite el resultado de ruina. La opción elegida mantiene la tensión documentada en el audit trail: no se homogeneiza el verso como si el sentido fuera seguro, pero sí se privilegia la lectura que mejor encaja con la secuencia de quebranto.'
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Cómo expresar el valor de הִתְאַזְּרוּ en el marco de conflicto implícito
  english_pob_reading: prepare yourselves, likely for conflict
  chosen_spanish_reading: ceñirse como preparación para la batalla
  alternative_spanish_readings:
  - ceñirse
  - armarse
  rationale: En español, «ceñirse» solo puede sonar general si no se completa el contexto. Como el audit trail indica preparación para conflicto, añadí «para la batalla» para hacer explícito ese matiz sin cambiar el núcleo léxico del hebreo.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: Se siguió el audit trail inglés sin cambios sustanciales adicionales; el dictamen final en inglés quedó estable y no hubo revisiones aplicadas. La versión española conserva la ambigüedad documentada en el primer imperativo mediante nota, y explicita el valor militar de los imperativos repetidos de «ceñirse».
  spanish_consistency_notes:
  - Se mantuvo «pueblos» para עַמִּים y no «naciones», en coherencia con el valor plural directo del hebreo.
  - Se prefirió «quebrantados» para חתת por consistencia con la repetición del verso y porque el español admite bien el matiz de derrumbe/derrota.
  - Se usó «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó «Cristo/Mesías» porque no aparece en el texto.
  - La puntuación y el imperativo plural siguen un estilo bíblico moderno, pero legible en español litúrgico.
