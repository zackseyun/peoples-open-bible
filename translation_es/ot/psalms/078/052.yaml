  to: Entonces sacó a su pueblo como ovejas, y los guió como un rebaño en el desierto.
  rationale: Se elimina el clítico incorrecto «los» antes de «a su pueblo» para restaurar una sintaxis española natural y fiel al hebreo, manteniendo intactos el sentido causativo de וַיַּסַּע, el paralelismo poético y la imaginería pastoral.
