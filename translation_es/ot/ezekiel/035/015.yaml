    text: 'Or ''you will be desolate.'' The Hebrew more literally uses the noun ''desolation'': ''you will become a desolation.'''
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'and all Edom, all of it,' an emphatic way of saying the whole of Edom.
    reason: lexical_alternative
