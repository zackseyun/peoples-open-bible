translation:
  language: es
  text: ¿Por qué[a], Yahvé, nos haces errar de tus caminos y endureces nuestro corazón[b], apartándolo de temerte? Vuelve[c], por amor de tus siervos, las tribus de tu heredad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «nos llevas extraviados» o «nos dejas errar». El verbo hebreo es causativo: expresa que el extravío es provocado; la oración conserva así la tensión de atribuir a Yahvé la soberanía sobre el desvío de Israel.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «nuestro corazón», singular colectivo para el pueblo como una sola comunidad.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «Vuélvete». La súplica pide que Dios vuelva a mirar a su pueblo con favor de pacto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָמָּה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Por qué razón
  - ¿Por qué motivo
  lexicon: HALOT
  rationale: La pregunta abre un lamento directo; en español, «¿Por qué» reproduce la fuerza interrogativa sin añadir énfasis ajeno al hebreo.
- source_word: תַתְעֵנוּ
  english_pob_choice: do you make us wander
  chosen_spanish: nos haces errar
  alternatives_spanish:
  - nos haces vagar
  - nos llevas extraviados
  lexicon: HALOT
  rationale: El verbo causativo expresa que Yahvé causa el extravío. «Haces errar» conserva esa fuerza y suena natural en español bíblico contemporáneo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino propio, conforme al criterio del proyecto, en vez de sustituirlo por un título.
- source_word: מִדְּרָכֶיךָ
  english_pob_choice: from your ways
  chosen_spanish: de tus caminos
  alternatives_spanish:
  - apartándonos de tus caminos
  - lejos de tus caminos
  lexicon: HALOT
  rationale: La preposición de separación queda bien reflejada con «de tus caminos»; el matiz de alejamiento ya está contenido en «haces errar».
- source_word: תַּקְשִׁיחַ
  english_pob_choice: harden
  chosen_spanish: endureces
  alternatives_spanish:
  - haces duro
  - vuelves duro
  lexicon: HALOT
  rationale: «Endureces» es el equivalente natural y teológicamente claro para el endurecimiento del corazón.
- source_word: לִבֵּנוּ
  english_pob_choice: our hearts
  chosen_spanish: nuestro corazón
  alternatives_spanish:
  - nuestros corazones
  lexicon: HALOT
  rationale: Aunque la revisión inglesa pasó a plural, el hebreo conserva un singular colectivo. En español se preserva esa tensión con «nuestro corazón», que refleja mejor la forma fuente y la voz corporativa.
- source_word: מִיִּרְאָתֶךָ
  english_pob_choice: from fearing you
  chosen_spanish: para no temerte
  alternatives_spanish:
  - alejándolo de temerte
  - de manera que no te temamos
  lexicon: HALOT
  rationale: El giro preposicional expresa separación respecto del temor reverente a Dios. En español, «para no temerte» comunica con claridad el efecto del endurecimiento sin volverlo torpe.
- source_word: שׁוּב
  english_pob_choice: Return
  chosen_spanish: Vuelve
  alternatives_spanish:
  - Vuélvete
  - Retorna
  lexicon: HALOT
  rationale: En una oración dirigida a Dios, «Vuelve» reproduce la súplica de que Dios se vuelva nuevamente hacia su pueblo.
- source_word: לְמַעַן
  english_pob_choice: for the sake of
  chosen_spanish: por amor de
  alternatives_spanish:
  - por causa de
  - en favor de
  lexicon: HALOT
  rationale: «Por amor de» transmite bien la apelación intercesora motivada por la relación de Dios con su pueblo, y suena natural en español bíblico.
- source_word: עֲבָדֶיךָ
  english_pob_choice: your servants
  chosen_spanish: tus siervos
  alternatives_spanish:
  - tus esclavos
  lexicon: HALOT
  rationale: Aquí el contexto es devocional y de pacto; «siervos» evita una dureza innecesaria que no es el foco del pasaje.
- source_word: שִׁבְטֵי
  english_pob_choice: the tribes of
  chosen_spanish: las tribus de
  alternatives_spanish:
  - los bastones de
  - los cetros de
  lexicon: HALOT
  rationale: El contexto con «tu heredad» exige el sentido tribal de Israel, no el de vara o cetro.
- source_word: נַחֲלָתֶךָ
  english_pob_choice: your inheritance
  chosen_spanish: tu heredad
  alternatives_spanish:
  - tu herencia
  - tu posesión
  lexicon: HALOT
  rationale: «Heredad» preserva mejor el matiz pactal y territorial del término en lenguaje bíblico español, sin perder inteligibilidad.
theological_decisions:
- issue: Atribución directa de causación a Yahvé en el lamento
  english_pob_reading: Retain the direct attribution to the LORD in the main text
  chosen_spanish_reading: 'Mantener la atribución directa a Yahvé: «nos haces errar» y «endureces nuestro corazón»'
  alternative_spanish_readings:
  - suavizar a «nos dejas errar»
  - suavizar a «permites que se endurezca nuestro corazón»
  rationale: El hebreo usa verbos causativos directos dirigidos a Yahvé. La traducción conserva la tensión teológica del lamento en lugar de resolverla.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
- issue: Singular colectivo en לִבֵּנוּ
  english_pob_reading: Use singular 'our heart'
  chosen_spanish_reading: 'Conservar el singular colectivo: «nuestro corazón»'
  alternative_spanish_readings:
  - «nuestros corazones»
  rationale: Aunque el idioma meta permite pluralizar, la forma singular refleja mejor la unidad corporativa del pueblo en el hebreo.
  doctrine_reference: Hebrew collective singular usage; POB lexical note on corporate expression
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «our heart» a «our hearts» en una revisión posterior; aquí se opta deliberadamente por el singular colectivo del hebreo para preservar la forma fuente y la voz corporativa del lamento.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma estándar para יהוה, conforme al criterio del proyecto.
  - Se evitó «SEÑOR» para no ocultar el nombre divino.
  - Se conservó la tensión teológica del texto sin suavizar los verbos causativos.
  - «Heredad» se emplea para conservar el registro pactal de נַחֲלָה.
  - El orden y la puntuación siguen la cadencia poética del hebreo sin añadir contenido interpretativo.
