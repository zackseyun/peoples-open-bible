revisions:
- from: 'Ha venido la calamidad[a] sobre ti, oh habitante de la tierra. Ha llegado el tiempo; el día está cerca: pánico[b], y no alboroto en los montes.'
  to: 'Ha venido la calamidad[a] sobre ti, oh habitante del país. Ha llegado el tiempo; el día está cerca: pánico[b], y no gritos de júbilo en los montes.'
  rationale: Se revisa 'habitante de la tierra' a 'habitante del país' para reflejar mejor el vocativo contextual dirigido a los habitantes de la tierra/país de Israel, en línea con la justificación del POB inglés. Se cambia 'alboroto en los montes' por 'gritos de júbilo en los montes' porque el rastro léxico inglés entiende un contraste entre el pánico del juicio y el clamor festivo normalmente asociado con los montes; esta oposición se pierde con 'alboroto'. Se conservan las notas alternativas para respetar la dificultad del hebreo.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:42:00Z'
