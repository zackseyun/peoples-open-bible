translation:
  language: es
  text: Si te debilitas en el día de la angustia[a], tu fuerza es poca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «si te muestras débil en el día de la angustia, tu fuerza es limitada».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִתְרַפִּיתָ
  english_pob_choice: you falter
  chosen_spanish: te debilitas
  alternatives_spanish:
  - flaqueas
  - te muestras débil
  - te desalientas
  - te relajas
  lexicon: HALOT
  rationale: El hitpael de רפה expresa aflojarse, debilitarse o perder firmeza. "Te debilitas" conserva la idea de volverse débil o falto de resolución y suena natural en español proverbial sin añadir un matiz más interpretativo que el hebreo.
- source_word: בְּיוֹם
  english_pob_choice: in a day of
  chosen_spanish: en el día de
  alternatives_spanish:
  - cuando
  - el día de
  lexicon: HALOT
  rationale: La preposición ב con "día" funciona temporalmente. En español, "en el día de" reproduce con claridad el marco temporal y mantiene el tono breve del proverbio.
- source_word: צָרָה
  english_pob_choice: distress
  chosen_spanish: angustia
  alternatives_spanish:
  - aflicción
  - tribulación
  - dificultad
  - angustia
  lexicon: HALOT
  rationale: צָרָה designa apuro, estrechez, trouble/distress/adversity. "Angustia" comunica bien la presión existencial y la estrechez de la situación en un registro bíblico actual; "tribulación" sería más tradicional, pero menos directo.
- source_word: צַר
  english_pob_choice: is small
  chosen_spanish: es poca
  alternatives_spanish:
  - es pequeña
  - es limitada
  - es escasa
  - es estrecha
  lexicon: HALOT
  rationale: El adjetivo literalmente significa "estrecho / apretado" y, en sentido idiomático, insuficiente. Con "fuerza" como sujeto, "es poca" transmite naturalidad y la idea de insuficiencia sin perder la imagen de limitación.
- source_word: כֹּחֶךָ
  english_pob_choice: your strength
  chosen_spanish: tu fuerza
  alternatives_spanish:
  - tu poder
  - tu capacidad
  - tu vigor
  lexicon: HALOT
  rationale: כֹּחַ suele significar fuerza, poder o capacidad. "Tu fuerza" es la correspondencia más directa y comprensible en español para la sabiduría proverbial.
translation_notes:
  revision_awareness: La revisión auditada del inglés no introdujo cambios respecto del borrador anterior; el texto español mantiene la misma solución semántica con ajuste natural al español.
  spanish_consistency_notes:
  - Se evitó "SEÑOR" porque no aparece ningún tetragrámaton ni cita del nombre divino en este versículo.
  - Se prefirió "fuerza" para כֹּחַ por ser el equivalente más directo en contexto sapiencial.
  - '"Angustia" mantiene el campo semántico de distress/trouble sin sobrecargar el verso con una abstracción más larga.'
