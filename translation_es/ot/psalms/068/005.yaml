  glossary_alignment: 'Alineación buena con el glosario del proyecto: «Dios» para אֱלֹהִים y «Yah» para יָהּ respetan la documentación. No hay conflicto con «Yahvé», porque aquí el hebreo no usa el tetragrama completo sino la forma corta. No surgen otros términos sensibles del glosario.'
