source:
  edition: SBLGNT
  text: ἀνθρώπινον λέγω διὰ τὴν ἀσθένειαν τῆς σαρκὸς ὑμῶν· ὥσπερ γὰρ παρεστήσατε τὰ μέλη ὑμῶν δοῦλα τῇ ἀκαθαρσίᾳ καὶ τῇ ἀνομίᾳ εἰς τὴν ἀνομίαν, οὕτως νῦν παραστήσατε τὰ μέλη ὑμῶν δοῦλα τῇ δικαιοσύνῃ εἰς ἁγιασμόν.
base_translation:
  language: en
  yaml_path: translation/nt/romans/006/019.yaml
  text: I am speaking in human terms because of the weakness of your flesh[a]. For just as you presented your members as slaves to impurity and to lawlessness, leading to lawlessness, so now present your members as slaves to righteousness[b], leading to sanctification.
translation:
  language: ko
  text: 나는 여러분의 육체의 연약함 때문에 사람의 방식으로 말합니다. 여러분이 전에 여러분의 지체를 부정함과 불법에 노예로 내어주어 불법에 이르게 한 것처럼, 이제는 여러분의 지체를 의에게 노예로 내어주어 거룩함에 이르게 하십시오.
  philosophy: optimal-equivalence
