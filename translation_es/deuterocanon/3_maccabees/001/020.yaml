translation:
  language: es
  text: Y las madres y las nodrizas además de estas[a], dejando a los recién nacidos, unas en sus casas y otras en las calles, se iban reuniendo hacia el santuario supremamente exaltado[b] sin volver atrás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «amas de cría» para τιθηνοί; el término griego puede referirse específicamente a mujeres que amamantan a los lactantes.
    reason: lexical_alternative
  - marker: b
    text: O «el templo altísimo» / «el santuario supremo» para «el santuario supremamente exaltado».
    reason: lexical_alternative
lexical_decisions:
- source_word: νεογνά
  english_pob_choice: newborn children
  chosen_spanish: recién nacidos
  alternatives_spanish:
  - niños recién nacidos
  - infantes
  lexicon: LSJ
  rationale: El término designa niños muy pequeños, recién nacidos. «Recién nacidos» es natural en español y conserva la carga emotiva de la escena.
- source_word: τιθηνοί
  english_pob_choice: nurses
  chosen_spanish: nodrizas
  alternatives_spanish:
  - niñeras
  - enfermeras
  lexicon: LSJ
  rationale: El griego puede referirse específicamente a mujeres que amamantan o cuidan infantes. «Nodrizas» preserva mejor esa posible especificidad que «nurses»/«cuidadoras».
- source_word: παραλείπουσαι
  english_pob_choice: leaving behind
  chosen_spanish: dejando
  alternatives_spanish:
  - abandonando
  - dejando atrás
  lexicon: LSJ
  rationale: El participio describe el acto de dejar algo atrás mientras se desplazan; «dejando» es breve y fiel, sin añadir un juicio moral más fuerte de lo que exige el griego.
- source_word: ἄλλως καὶ ἄλλως
  english_pob_choice: some ... and others ...
  chosen_spanish: unas ... y otras ...
  alternatives_spanish:
  - de una manera y de otra
  - unas de una forma y otras de otra
  lexicon: LSJ
  rationale: La expresión se desarrolla distributivamente en las cláusulas siguientes. «Unas ... y otras ...» reproduce con naturalidad esa distribución.
- source_word: ἀγυιαί
  english_pob_choice: streets
  chosen_spanish: las calles
  alternatives_spanish:
  - las calles públicas
  - las vías
  lexicon: LSJ
  rationale: Se refiere a calles o vías de la ciudad. «Calles» es el equivalente más claro y idiomático para el español moderno.
- source_word: ἀνεπιστρέπτως
  english_pob_choice: without turning back
  chosen_spanish: sin volver atrás
  alternatives_spanish:
  - sin mirar atrás
  - sin detenerse a volver
  lexicon: LSJ
  rationale: La revisión inglesa prefirió una formulación más natural para el sentido de no volverse. En español, «sin volver atrás» conserva la idea de movimiento resuelto hacia el templo/santuario.
- source_word: πανυπέρτατον
  english_pob_choice: all-supreme
  chosen_spanish: supremo
  alternatives_spanish:
  - all-supreme
  - altísimo
  - supremamente exaltado
  lexicon: LSJ
  rationale: El compuesto es intensivo; en español, «supremo» comunica la elevación sin sonar forzado. Se evita convertirlo en título divino fijo, ya que el griego aquí describe el santuario.
- source_word: ἱερόν
  english_pob_choice: sanctuary
  chosen_spanish: santuario
  alternatives_spanish:
  - templo
  - lugar santo
  lexicon: LSJ
  rationale: Puede referirse al recinto sagrado o al templo. «Santuario» preserva el valor cultual sin precisar arquitectónicamente más de lo que el texto dice.
- source_word: ἠθροίζοντο
  english_pob_choice: kept gathering
  chosen_spanish: se iban reuniendo
  alternatives_spanish:
  - se reunían
  - seguían reuniéndose
  lexicon: LSJ
  rationale: El imperfecto expresa acción continua. «Se iban reuniendo» transmite bien la progresión y el carácter repetido/continuado del movimiento.
theological_decisions:
- issue: Valor de πανυπέρτατον ἱερόν
  english_pob_reading: the all-supreme sanctuary
  chosen_spanish_reading: el santuario supremo
  alternative_spanish_readings:
  - el templo supremo
  - el santuario altísimo
  rationale: El texto usa lenguaje cultual exaltado, pero no un título doctrinal fijo. «Santuario supremo» conserva la intensidad sin importar una lectura más teológica de la necesaria.
  doctrine_reference: Principio de primacía del original; evitar sobrerinterpretación teológica
- issue: Posible especificidad de τιθηνοί
  english_pob_reading: nurses / wet nurses
  chosen_spanish_reading: nodrizas
  alternative_spanish_readings:
  - nurses
  - cuidadoras de infantes
  rationale: El español «nodrizas» expresa con precisión la posible referencia a mujeres que amamantan y cuidan infantes, manteniendo la tensión léxica señalada en la nota inglesa.
  doctrine_reference: Léxico histórico y precisión semántica
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió «without turning back» sobre «without turning aside» para ἀνεπιστρέπτως; por eso el español usa «sin volver atrás», que refleja mejor ese matiz de avance resuelto hacia el santuario. También se mantuvo la distribución «unas... y otras...» para ἄλλως καὶ ἄλλως, conforme al contexto inmediato.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» como norma general, pero este versículo no contiene el nombre divino.
  - Se eligió «santuario» en vez de «templo» para no fijar con exceso el alcance arquitectónico del ἱερόν.
  - Se mantuvo «nodrizas» para conservar la posible especificidad del griego sin perder legibilidad.
  - Se evitó «Cristo» y cualquier terminología cristológica, ya que el pasaje es narrativo y no contiene esas expresiones.
