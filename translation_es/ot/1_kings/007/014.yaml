  text: בֶּן אִשָּׁה֩ אַלְמָנָ֨ה ה֜וּא מִ/מַּטֵּ֣ה נַפְתָּלִ֗י וְ/אָבִ֣י/ו אִישׁ צֹרִי֮ חֹרֵ֣שׁ נְחֹשֶׁת֒ וַ֠/יִּמָּלֵא אֶת הַ/חָכְמָ֤ה וְ/אֶת הַ/תְּבוּנָה֙ וְ/אֶת הַ/דַּ֔עַת לַ/עֲשׂ֥וֹת כָּל מְלָאכָ֖ה בַּ/נְּחֹ֑שֶׁת וַ/יָּבוֹא֙ אֶל הַ/מֶּ֣לֶךְ שְׁלֹמֹ֔ה וַ/יַּ֖עַשׂ אֶת כָּל מְלַאכְתּֽ/וֹ־־־־־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/1_kings/007/014.yaml
  text: He was the son of a widow from the tribe of Naphtali[a], and his father was a man of Tyre, a worker in bronze. He was filled with wisdom, understanding, and knowledge to do every kind of work in bronze[b]. So he came to King Solomon and did all his work.
  footnotes:
  - marker: a
    text: Or 'a Tyrian man' for 'a man of Tyre.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew neḥoshet can denote copper or bronze; 'bronze' fits the temple-furnishings context here.
    reason: lexical_alternative
