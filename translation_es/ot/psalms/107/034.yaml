translation:
  language: es
  text: una tierra fructífera en un salitral[a], por causa de la maldad de los que habitan en ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en salinidad» / «en una tierra salada»; la imagen hebrea probablemente implica una región estéril e improductiva.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶרֶץ
  english_pob_choice: land
  chosen_spanish: tierra
  alternatives_spanish:
  - país
  - región
  - landa
  lexicon: HALOT
  rationale: En este contexto poético de transformación del terreno, «tierra» comunica bien una porción habitada o cultivable del territorio. «Región» también sería posible, pero «tierra» conserva mejor la imagen bíblica natural.
- source_word: פְּרִי
  english_pob_choice: fruitful
  chosen_spanish: fructífera
  alternatives_spanish:
  - fecunda
  - productiva
  - llena de fruto
  lexicon: HALOT
  rationale: El hebreo usa una expresión adjetival ligada al fruto de la tierra. «Fructífera» preserva el campo semántico agrícola y suena natural en español bíblico contemporáneo.
- source_word: לִמְלֵחָה
  english_pob_choice: into a salt waste
  chosen_spanish: en salina
  alternatives_spanish:
  - en salinidad
  - en un salitral
  - en tierra salada
  lexicon: HALOT
  rationale: La preposición de resultado se refleja con «en». «Salina» mantiene la imagen de un terreno salado/estéril sin explicar demasiado el efecto. En español, «salina» puede referirse a una extensión impregnada de sal, que encaja con la metáfora de desolación.
- source_word: מֵרָעַת
  english_pob_choice: because of the evil of
  chosen_spanish: por causa de la maldad de
  alternatives_spanish:
  - a causa de la maldad de
  - por la perversidad de
  - debido a la maldad de
  lexicon: HALOT
  rationale: La preposición מ expresa causa; «por causa de» la reproduce de forma clara. «Maldad» conserva el valor moral de רָעָה sin suavizarlo.
- source_word: יֹשְׁבֵי בָהּ
  english_pob_choice: those who dwell in it
  chosen_spanish: los que habitan en ella
  alternatives_spanish:
  - sus habitantes
  - los que viven en ella
  lexicon: HALOT
  rationale: El participio de ישב conserva el sentido de habitar/residir. «Los que habitan en ella» mantiene la relación entre el pueblo y la tierra, y suena natural en español.
theological_decisions:
- issue: Causa moral de la desolación
  english_pob_reading: The land is turned into a salt waste because of the evil of its inhabitants.
  chosen_spanish_reading: La tierra fértil se convierte en salina por causa de la maldad de los que habitan en ella.
  alternative_spanish_readings:
  - La tierra fértil se vuelve estéril sin especificar causa moral.
  - La tierra fértil se convierte en salina por razones históricas o ambientales.
  rationale: El hebreo vincula explícitamente la reversión de la fertilidad con la maldad de los habitantes. La traducción debe conservar esa relación causal y moral, sin atenuarla ni volverla meramente descriptiva.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el audit trail inglés: se mantiene la oposición entre tierra fértil y resultado salado, y se conserva la causalidad moral explícita. No se documentaron revisiones posteriores que alteren la solución.'
  spanish_consistency_notes:
  - Se prefirió «tierra» para אֶרֶץ por consistencia con un campo semántico territorial y agrícola.
  - «Salina» conserva la metáfora de sal sin convertirla directamente en una paráfrasis de «esterilidad», aunque la nota explicita la implicación.
  - 'La causalidad de מֵרָעַת se expresa con una construcción transparente y bíblicamente sobria: «por causa de».'
  - Se evitó «SEÑOR» y otras convenciones no presentes en este verso; no aplica terminología del Nombre divino ni del Mesías.
