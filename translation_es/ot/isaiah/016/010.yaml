  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías, δοῦλος, etc. Las decisiones léxicas principales están bien alineadas: ''campo fértil'', ''viñas'', ''lagares'', ''grito de vendimia''.'
