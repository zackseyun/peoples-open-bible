  text: II. Ὁμολογῶ τοίνυν¹ τὴν ἁμαρτίαν μου, τέκνα², ὅτι πλειστάκις ἤθελον³ ἀνελεῖν αὐτόν, *ἐπειδὴ ἐμίσουν αὐτὸν ἐκ ψυχῆς⁴. 2. Καίγε διὰ τὰ ἐνύπνια⁵ *προσεθέμην αὐτῷ τὸ μῖσος⁶, καὶ ἤθελον αὐτὸν⁷ ἐκλεῖξαι⁸ *ἐκ γῆς⁹ ⌈ζώντων⌉¹⁰, ὃν τρόπον¹¹ ἐκλείχει¹² ὁ μόσχος τὰ χλωρὰ *τοῦ πεδίου¹³. [α-text] 3. Καὶ κρυφῆ πράσας αὐτὸν Ἰούδας τοῖς Ἰσμαιλίταις. [β, Α, S¹] 3. Διὸ¹⁵ ἐγὼ καὶ Συμεὼν¹⁶ πεπράκαμεν αὐτὸν τοῖς Ἰσμαηλίταις [*τριάκοντα χρυσίων¹⁷, καὶ τὰ δέκα ἀποκρύψαντες τὰ εἴκοσι ἐδείξαμεν τοῖς ἀδελφοῖς ἡμῶν¹⁸]. [α-text] 5. Οὕτως¹⁴ ὁ Θεὸς τῶν πατέρων ἡμῶν ἐρρύσατο αὐτὸν ἐκ τῶν χειρῶν ἡμῶν, ἵνα μὴ ποιήσωμεν ἐν τῷ Ἰσραὴλ ἀνομίαν μεγάλην. [β, Α, S¹] 4. Καὶ οὕτως τῇ πλεονεξίᾳ ἐπληροφορήθημεν¹⁹ τῆς ἀναιρέσεως αὐτοῦ. [β, Α, S¹] 5. Καὶ ὁ Θεὸς τῶν πατέρων μου²⁰ ἐρρύσατο αὐτὸν ἐκ τῶν χειρῶν μου, ἵνα μὴ²¹ ποιήσω ἀνόμημα²² ἐν Ἰσραήλ.
