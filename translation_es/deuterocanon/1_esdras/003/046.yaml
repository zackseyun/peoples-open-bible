revisions:
- from: Y un hombre toma su espada y sale para hacer campaña[a], para saquear y para robar, y para navegar por el mar y los ríos,
  to: Y un hombre toma su espada y sale para ir de campaña[a], saquear y hurtar, y para navegar por el mar y ríos,
  rationale: Se ajusta ἐξοδεύειν a «ir de campaña» para evitar la ambigüedad moderna de «hacer campaña» y mantener el matiz militar/expedicionario. Se cambia κλέπτειν de «robar» a «hurtar» para distinguirlo mejor de λῃστεύειν («saquear»). También se aligera la coordinación en español con una sintaxis más natural y «ríos» sin artículo.
