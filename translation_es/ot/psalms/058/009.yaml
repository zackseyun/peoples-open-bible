  to: Como un caracol que se derrite al avanzar, como un hijo nacido muerto[a] que no ha visto el sol.
  rationale: Se reemplaza «un aborto de mujer» por «un hijo nacido muerto» para preservar el sentido documentado en la auditoría inglesa, evitar una ambigüedad grave en español y mantener una formulación natural y eclesialmente legible. Se conserva una nota que registra la literalidad más áspera del hebreo. También se corrige la ubicación del marcador de nota para que ancle solo el segmento relevante.
