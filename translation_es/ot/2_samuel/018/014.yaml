translation:
  language: es
  text: 'Joab dijo: «No; no me quedaré así delante de ti». Entonces tomó en su mano tres dardos[a] y los clavó en el corazón de Absalón, mientras aún estaba vivo, en el corazón del terebinto[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «varas» o «bastones»; el término hebreo puede denotar vara, bastón o cetro, pero aquí probablemente se refiere a armas usadas para herir o clavar.
    reason: lexical_alternative
  - marker: b
    text: O «encina». El hebreo אֵלָה suele referirse a un terebinto; algunas versiones lo traducen más generalmente como «encina» o «roble».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר יוֹאָב
  english_pob_choice: Joab said
  chosen_spanish: Joab dijo
  alternatives_spanish:
  - y Joab dijo
  - Joab respondió
  lexicon: WLC / HALOT
  rationale: El hebreo presenta una narración consecutiva simple; en español, «dijo» comunica con naturalidad el acto de hablar sin añadir matices no sustentados.
- source_word: לֹא כֵן אֹחִילָה לְפָנֶיךָ
  english_pob_choice: I will not linger like this before you
  chosen_spanish: No así; no me detendré delante de ti
  alternatives_spanish:
  - No, de ninguna manera; no tardaré delante de ti
  - No así; no me quedaré esperando delante de ti
  lexicon: HALOT
  rationale: La construcción negada expresa rechazo de demorar/esperar en presencia del otro. «No me detendré» mantiene la idea de demora sin sonar arcaico; «delante de ti» preserva el idiomatismo de לְפָנֶיךָ.
- source_word: שְׁבָטִים
  english_pob_choice: darts
  chosen_spanish: dardos
  alternatives_spanish:
  - varas
  - bastones
  - lanzas
  lexicon: HALOT
  rationale: El término hebreo puede designar vara, bastón o cetro, pero aquí el contexto militar y el verbo de arremeter favorecen un arma arrojadiza o punzante. «Dardos» conserva la ambigüedad funcional mejor que «lanzas» y suena natural en español.
- source_word: וַיִּתְקָעֵם
  english_pob_choice: thrust them into
  chosen_spanish: los clavó
  alternatives_spanish:
  - los hundió
  - los hincó
  - los atravesó con
  lexicon: HALOT
  rationale: El verbo indica un empuje violento e inserción forzada. «Clavó» transmite bien la acción física y el impacto, sin sobreespecificar la forma exacta del arma.
- source_word: בְּלֵב אַבְשָׁלוֹם
  english_pob_choice: into the heart of Absalom
  chosen_spanish: en el corazón de Absalón
  alternatives_spanish:
  - en el corazón de Absalón
  - en el pecho de Absalón
  lexicon: HALOT
  rationale: Se conserva «corazón» porque el hebreo lo dice explícitamente y porque la imagen se repite en el verso; no se suaviza a «pecho».
- source_word: עוֹדֶנּוּ חַי
  english_pob_choice: while he was still alive
  chosen_spanish: mientras aún estaba vivo
  alternatives_spanish:
  - cuando aún estaba vivo
  - mientras todavía vivía
  lexicon: HALOT
  rationale: La frase subraya que Absalón no había muerto todavía cuando fue herido. «Mientras aún estaba vivo» es claro, sobrio y fiel.
- source_word: בְּלֵב הָאֵלָה
  english_pob_choice: in the heart of the terebinth
  chosen_spanish: en el corazón de la encina
  alternatives_spanish:
  - en el corazón de la terebinta
  - en medio de la encina
  - en el corazón del terebinto
  lexicon: HALOT
  rationale: אֵלָה puede referirse a una encina u otra gran árbol de hoja perenne según el uso regional y traductor; aquí se prefiere «encina» como equivalente español natural y tradicional. Se conserva «corazón» para reflejar el idiomatismo del hebreo y el paralelismo con el corazón de Absalón.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente, que ajustó la frase a «linger like this» y cambió el arma a «darts». En español se optó por una solución equivalente: «no me detendré delante de ti» para la demora, y «dardos» para reflejar el campo semántico del hebreo sin forzar «lanzas» o «varas». También se conservó la duplicación de «corazón» para Absalón y para el árbol, ya que el texto hebreo repite deliberadamente la misma imagen.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto no porque aparezca aquí, sino para consistencia editorial del POB español.
  - Se evitó traducir mecánicamente por «SEÑOR» o por un lenguaje eclesiástico que no pertenece al hebreo de este versículo.
  - Se preservó el paralelismo «corazón de Absalón / corazón de la encina» para no borrar la tensión o imagen retórica del original.
  - Se eligió un registro bíblico moderno y digno, evitando arcaísmos innecesarios como «tardar» o «detenerse» en formulación rígida.
