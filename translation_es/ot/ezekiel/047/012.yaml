  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Santuario', 'alimento' y 'curación' son adecuados. No aparece vocabulario sensible como Yahvé/Mesías. La decisión 'fruto fresco' es aceptable porque sigue la revisión inglesa auditada, aunque el matiz de primera maduración se preserva bien en nota.
