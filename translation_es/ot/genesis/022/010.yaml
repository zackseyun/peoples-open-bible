translation:
  language: es
  text: Entonces Abraham extendió su mano y tomó el cuchillo para degollar a su hijo[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «alargó su mano».
    reason: lexical_alternative
  - marker: b
    text: El verbo hebreo de «degollar» es más específico que un verbo general para «matar» y puede llevar un matiz sacrificial.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: reached out
  chosen_spanish: extendió
  alternatives_spanish:
  - alargó
  - tendió
  lexicon: HALOT
  rationale: El hebreo describe aquí el gesto de extender la mano en la acción narrativa. «Extendió su mano» es natural en español y conserva la imagen concreta sin introducir una interpretación ajena.
- source_word: יָדוֹ
  english_pob_choice: his hand
  chosen_spanish: su mano
  alternatives_spanish:
  - la mano de él
  lexicon: HALOT
  rationale: Corresponde de manera literal al sustantivo con sufijo pronominal y fluye con naturalidad en español.
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - agarró
  - recogió
  lexicon: HALOT
  rationale: «Tomó» refleja el verbo común de la secuencia narrativa sin exagerar la manera de la acción.
- source_word: הַמַּאֲכֶלֶת
  english_pob_choice: the knife
  chosen_spanish: el cuchillo
  alternatives_spanish:
  - la cuchilla
  - el cuchillo de degollar
  lexicon: HALOT
  rationale: El término hebreo designa un instrumento cortante para inmolar o degollar. «Cuchillo» es el equivalente más claro y natural; en esta frase evita sobrecargar el texto, aunque el contexto siga evocando un instrumento de sacrificio.
- source_word: לִשְׁחֹט
  english_pob_choice: to slaughter
  chosen_spanish: para sacrificar
  alternatives_spanish:
  - para degollar
  - para inmolar
  lexicon: HALOT
  rationale: El verbo hebreo es más específico que «matar» y suele usarse en contextos sacrificiales. En español, «sacrificar» preserva ese peso ritual y la carga del relato de Abraham, sin perder inteligibilidad. «Degollar» o «inmolar» son posibles, pero menos neutrales o menos naturales para lectura pública.
- source_word: בְּנוֹ
  english_pob_choice: his son
  chosen_spanish: a su hijo
  alternatives_spanish:
  - a su hijo
  lexicon: HALOT
  rationale: Se mantiene el valor directo del sustantivo con sufijo pronominal; la preposición «a» refleja el complemento de objeto directo humano en español.
theological_decisions:
- issue: Cómo reflejar el matiz sacrificial de לִשְׁחֹט sin convertir el acto en una afirmación doctrinal adicional
  english_pob_reading: to slaughter, with sacrificial overtones
  chosen_spanish_reading: para sacrificar
  alternative_spanish_readings:
  - para matar
  - para degollar
  - para inmolar
  rationale: El contexto de la Akedá y el valor específico del verbo piden conservar la gravedad ritual del acto. «Para sacrificar» comunica ese matiz mejor que «matar», sin forzar una conclusión doctrinal distinta del texto. «Degollar» o «inmolar» serían más técnicos, pero menos transparentes para el lector general.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo masorético y el audit trail inglés: mantiene la secuencia narrativa simple («then… and… and…»), conserva el gesto concreto de la mano y preserva el peso sacrificial del verbo לִשְׁחֹט. No se introdujeron cambios textuales ni ajustes por variantes.'
  spanish_consistency_notes:
  - Se usó «Yahvé» en conformidad con la política general del proyecto, pero este versículo no contiene el nombre divino.
  - «Sacrificar» se eligió aquí como equivalente funcional de לִשְׁחֹט por su valor ritual, aunque en otros contextos el proyecto puede preferir «degollar» o «inmolar» si el matiz exige mayor precisión.
  - La puntuación y el orden siguen una cadencia natural en español sin añadir explicaciones interpretativas al cuerpo del versículo.
