translation:
  language: es
  text: Mira[a], las naciones son como una gota que cae de un cubo, y son tenidas por polvo en la balanza; mira[b], las costas lejanas las levanta como polvo fino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como una gota en un cubo». El hebreo dice más literalmente «de un cubo».
    reason: lexical_alternative
  - marker: b
    text: O «las islas». El término hebreo puede designar islas, costas o tierras marítimas lejanas.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira
  - Mira, pues
  - He aquí
  lexicon: HALOT
  rationale: La partícula deíctica introduce atención inmediata. «Mira» conserva el impulso retórico en español actual mejor que «He aquí», que suena más arcaico.
- source_word: גּוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - las naciones
  - los pueblos
  lexicon: HALOT
  rationale: En este contexto contrasta a los pueblos del mundo con Yahvé. «Las naciones» reproduce bien el sentido colectivo y bíblico.
- source_word: כְּמַר מִדְּלִי
  english_pob_choice: like a drop from a bucket
  chosen_spanish: como una gota de un cubo
  alternatives_spanish:
  - como una gota de un cubo
  - como una gota en un cubo
  - como una gota que cae de un cubo
  lexicon: HALOT
  rationale: Se conserva la relación de origen expresada por מִן con דְּלִי. «De un cubo» refleja mejor el hebreo que la locución española más idiomática «en un cubo».
- source_word: וּכְשַׁחַק מֹאזְנַיִם
  english_pob_choice: and are regarded as dust on the scales
  chosen_spanish: y son consideradas polvo sobre la balanza
  alternatives_spanish:
  - y son consideradas polvo sobre la balanza
  - y como polvo sobre la balanza
  - y se las considera polvo sobre la balanza
  lexicon: HALOT
  rationale: «Polvo sobre la balanza» mantiene la imagen de insignificancia del polvo fino en la báscula. Se eligió una forma pasiva para corresponder al valor de נֶחְשָׁבוּ.
- source_word: נֶחְשָׁבוּ
  english_pob_choice: are regarded
  chosen_spanish: son consideradas
  alternatives_spanish:
  - son consideradas
  - son contadas
  - son estimadas
  lexicon: HALOT
  rationale: El verbo expresa evaluación/estimación. «Son consideradas» es natural y conserva el matiz de valoración dada por otro.
- source_word: אִיִּים
  english_pob_choice: the coastlands
  chosen_spanish: las costas
  alternatives_spanish:
  - las costas
  - las islas
  - las tierras costeras
  lexicon: HALOT
  rationale: En Isaías, el término puede abarcar tierras marítimas lejanas. Se eligió «las costas» como opción amplia y comprensible en español, sin reducirlo sólo a islas.
- source_word: כַּדַּק
  english_pob_choice: like fine dust
  chosen_spanish: como polvo fino
  alternatives_spanish:
  - como polvo fino
  - como polvo tenue
  - como una partícula fina
  lexicon: HALOT
  rationale: דַּק señala algo fino, pequeño o menudísimo. «Polvo fino» transmite bien la idea de insustancialidad y pequeñas dimensiones.
- source_word: יִטּוֹל
  english_pob_choice: he lifts
  chosen_spanish: él las levanta
  alternatives_spanish:
  - él las levanta
  - las levanta
  - él las toma
  lexicon: HALOT
  rationale: El verbo admite la idea de levantar o tomar. En español se explicita el sujeto implícito por claridad, conservando que el sujeto está determinado por el contexto. El clítico «las» retoma las costas.
theological_decisions:
- issue: Sujeto implícito de יִטּוֹל
  english_pob_reading: The subject is left as the English pronoun 'he,' referring contextually to God without adding the divine name into the verse.
  chosen_spanish_reading: Se deja un sujeto implícito contextual en el último miembro, entendido de Yahvé por el contexto inmediato; en español se hace explícito con «él» para evitar ambigüedad.
  alternative_spanish_readings:
  - las levanta
  - el las levanta
  - Yahvé las levanta
  rationale: El hebreo no nombra al sujeto en esta cláusula, aunque el contexto lo identifica claramente con Dios. El español requiere mayor claridad sintáctica; por eso se usa «él» sin añadir el nombre divino, preservando la economía del original.
  doctrine_reference: Translation philosophy §1, §3
- issue: Valor de אִיִּים
  english_pob_reading: the coastlands
  chosen_spanish_reading: las costas
  alternative_spanish_readings:
  - las islas
  - las tierras costeras
  - las regiones marítimas
  rationale: El término puede abarcar islas, costas o tierras lejanas junto al mar. «Las costas» conserva la amplitud geográfica y evita restringir el sentido a islas solamente.
  doctrine_reference: HALOT; context of Isaiah
- issue: Imagen de מִדְּלִי
  english_pob_reading: from a bucket
  chosen_spanish_reading: de un cubo
  alternative_spanish_readings:
  - de un balde
  - de una cubeta
  - en un cubo
  rationale: Se mantiene la relación preposicional de origen presente en el hebreo. «Cubo» es comprensible y evita introducir una frase hecha que no refleja con precisión el texto fuente.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: 'Se siguió el estado revisado más reciente del inglés POB, que ajustó la última cláusula para reflejar mejor el orden hebreo: «the coastlands he lifts like fine dust». La versión española conserva ese orden relativo con «las costas él las levanta como polvo fino», manteniendo la prominencia de las costas y el verbo final de elevación.'
  spanish_consistency_notes:
  - Se usó «Yahvé» en las decisiones teológicas como referente contextual, pero no se añadió en el texto principal para respetar la economía del verso.
  - «Mira» se prefirió por su naturalidad moderna y su fuerza deíctica.
  - Se evitó «SEÑOR» y «Cristo», no pertinentes al versículo.
  - Se mantuvo la imagen física de polvo/balanza sin reinterpretarla como mera metáfora abstracta.
