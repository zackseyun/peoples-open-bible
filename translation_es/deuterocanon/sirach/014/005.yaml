revisions:
- from: Si alguien es malo para consigo mismo[a], ¿para quién será bueno? No se alegrará en sus bienes.
  to: Si alguien es malo consigo mismo, ¿a quién hará bien? No disfrutará de sus propios bienes[a].
  rationale: Se ajusta יֵיטִיב a su fuerza verbal («hará bien»), se mejora la naturalidad de לְנַפְשׁוֹ («consigo mismo») y se expresa con claridad moderna el sentido idiomático de וְלֹא יִרְאֶה בְּטוֹבָתוֹ, manteniendo en nota el literal hebreo y la aclaración del griego paralelo.
