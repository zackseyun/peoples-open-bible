translation:
  language: es
  text: Yahvé alejará a la gente[a] muy lejos, y serán muchos los lugares abandonados[b] en medio de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la humanidad»; el hebreo אָדָם es un singular colectivo que se refiere a la población humana.
    reason: lexical_alternative
  - marker: b
    text: O «el abandono será grande» o «la desolación será grande» en medio de la tierra; el hebreo permite una lectura abstracta además de la concreta.
    reason: alternative_reading
lexical_decisions:
- source_word: וְרִחַק
  english_pob_choice: will remove far away
  chosen_spanish: alejará... muy lejos
  alternatives_spanish:
  - apartará... lejos
  - removerá... muy lejos
  lexicon: HALOT
  rationale: El verbo hebreo expresa causar distancia; en español, «alejará» reproduce bien ese sentido dinámico sin perder la idea de remoción. «Muy lejos» conserva el valor adverbial de distancia del contexto profético.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino con la forma terminológica del proyecto en español. «Yahvé» evita la sustitución por título y corresponde al Tetragrama.
- source_word: הָאָדָם
  english_pob_choice: people
  chosen_spanish: el hombre
  alternatives_spanish:
  - la humanidad
  - la gente
  - los hombres
  lexicon: HALOT
  rationale: אָדָם es un singular colectivo que refiere a la población humana; «el hombre» mantiene esa forma singular colectiva. En nota se aclara que también puede entenderse como «humanidad» o «gente», pero se evita diluir la imagen del hebreo.
- source_word: וְרַבָּה
  english_pob_choice: will be many
  chosen_spanish: serán muchas
  alternatives_spanish:
  - se multiplicarán
  - aumentarán
  lexicon: HALOT
  rationale: La forma femenina singular concuerda con הָעֲזוּבָה, y en contexto predica abundancia. «Serán muchas» es natural en español y conserva la relación con el sustantivo implícito.
- source_word: הָעֲזוּבָה
  english_pob_choice: the forsaken places
  chosen_spanish: las desolaciones
  alternatives_spanish:
  - los lugares abandonados
  - el abandono
  - la desolación
  lexicon: HALOT
  rationale: El hebreo puede leerse como lo abandonado/desolado o como la condición de abandono. En español, «las desolaciones» conserva la ambigüedad entre estado y resultado, y funciona bien con el predicado de abundancia.
- source_word: בְּקֶרֶב הָאָרֶץ
  english_pob_choice: in the midst of the land
  chosen_spanish: en medio de la tierra
  alternatives_spanish:
  - dentro de la tierra
  - en el corazón de la tierra
  lexicon: HALOT
  rationale: La preposición y el sustantivo expresan una ubicación central dentro del territorio. «En medio de la tierra» sigue de cerca el hebreo y es natural en español bíblico contemporáneo.
theological_decisions:
- issue: Alcance de אָדָם como colectivo humano
  english_pob_reading: people
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - la humanidad
  - la gente
  rationale: El texto profético habla de la población humana en juicio. Mantener el singular colectivo «el hombre» preserva la fuerza del hebreo sin implicar varones exclusivamente; la nota ofrece la alternativa interpretativa amplia.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; preserve collective singulars where warranted'
- issue: Naturaleza de הָעֲזוּבָה
  english_pob_reading: the forsaken places
  chosen_spanish_reading: las desolaciones
  alternative_spanish_readings:
  - los lugares abandonados
  - el abandono
  - la desolación
  rationale: El hebreo admite una lectura concreta o abstracta. «Las desolaciones» conserva ambas posibilidades y evita cerrar prematuramente el sentido, manteniendo el énfasis en el juicio sobre la tierra.
  doctrine_reference: 'DOCTRINE.md: optimal equivalence; preserve source sense without paraphrase'
translation_notes:
  revision_awareness: El texto inglés revisado pasó de «man» a «people» para reflejar mejor el carácter colectivo de אָדָם. La versión española conserva el singular colectivo («el hombre») por fidelidad estructural al hebreo, pero documenta la alternativa interpretativa amplia en nota para no ocultar la tensión lexical.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para el Tetragrama.
  - Se evita «SEÑOR» como sustituto, por fidelidad al nombre divino.
  - «En medio de la tierra» mantiene la imagen espacial del hebreo.
  - Se conserva la ambigüedad de הָעֲזוּבָה sin forzar una sola solución léxica.
  - El singular colectivo «el hombre» se mantiene aunque el inglés POB optó por «people», porque el hebreo lo permite y el español lo expresa con naturalidad.
