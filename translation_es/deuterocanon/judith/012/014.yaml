translation:
  language: es
  text: 'Y Judit le dijo: «¿Y quién soy yo para hablar contra[a] mi señor? Todo lo que sea agradable a sus ojos, me apresuraré a hacerlo, y esto será para mí regocijo hasta el día de mi muerte»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «oponerme a mi señor» o «replicar a mi señor».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀντειποῦσα
  english_pob_choice: to speak against / to speak back
  chosen_spanish: hablar contra
  alternatives_spanish:
  - responder contra
  - replicar
  - hablar en contra
  lexicon: BDAG
  rationale: El participio expresa una respuesta en oposición o contradicción. «Hablar contra» conserva la relación de contraste sin volverlo demasiado técnico ni intensificarlo a «oponerse» cuando el contexto es una confesión deferente.
- source_word: τῷ κυρίῳ μου
  english_pob_choice: my lord
  chosen_spanish: mi señor
  alternatives_spanish:
  - mi amo
  - mi dueño
  lexicon: BDAG
  rationale: Aquí κύριος funciona como tratamiento respetuoso a un superior humano, no como título divino. «Mi señor» mantiene el registro cortés y la ambigüedad social del griego mejor que opciones más duras como «amo».
- source_word: πᾶν ὃ ἔσται ἐν τοῖς ὀφθαλμοῖς αὐτοῦ ἀρεστόν
  english_pob_choice: Whatever is pleasing in his eyes
  chosen_spanish: Todo lo que sea agradable a sus ojos
  alternatives_spanish:
  - Todo lo que le parezca bueno
  - Todo lo que sea de su agrado
  - Todo lo que encuentre agradable a sus ojos
  lexicon: BDAG
  rationale: Se conserva la imagen idiomática de «sus ojos» y se traduce ἀρεστόν con «agradable» para mantener la idea de lo que le resulta aceptable o deleitable a Holofernes sin perder la metáfora.
- source_word: σπεύσασα
  english_pob_choice: to hasten / quickly
  chosen_spanish: apresuradamente
  alternatives_spanish:
  - con prisa
  - de inmediato
  - rápidamente
  lexicon: BDAG
  rationale: El participio indica prisa o diligencia acompañando la acción. «Apresuradamente» reproduce la rapidez con un adverbio formal y adecuado al tono narrativo.
- source_word: ἀγαλλίαμα
  english_pob_choice: rejoicing
  chosen_spanish: motivo de regocijo
  alternatives_spanish:
  - gozo
  - alegría
  - regocijo
  lexicon: BDAG
  rationale: El sustantivo denota un gozo intenso, cercano a exultación o regocijo. «Motivo de regocijo» preserva la fuerza léxica y sugiere el valor duradero de esa alegría para Judit.
- source_word: ἕως ἡμέρας θανάτου μου
  english_pob_choice: until the day of my death
  chosen_spanish: hasta el día de mi muerte
  alternatives_spanish:
  - hasta el día en que muera
  - hasta mi día de muerte
  lexicon: BDAG
  rationale: Se mantiene la expresión temporal directa y solemne del griego, sin volverla idiomática en exceso, para conservar el peso retórico de la frase.
theological_decisions:
- issue: κύριος como título humano de respeto y no como título divino
  english_pob_reading: my lord
  chosen_spanish_reading: mi señor
  alternative_spanish_readings:
  - mi amo
  rationale: El contexto muestra una dirección deferente a Holofernes. Traducirlo como «mi señor» mantiene el honorífico sin introducir connotaciones teológicas indevidas ni reemplazar el matiz de jerarquía social.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (κύριος → Lord) with context-sensitive application'
translation_notes:
  revision_awareness: 'La redacción sigue el tramo revisado del audit trail inglés: se prefirió un equivalente más fuerte para ἀντειποῦσα («hablar contra») en vez de una mera respuesta; σπεύσασα se vertió con un adverbio de rapidez formal («apresuradamente») acorde con el registro; y ἀγαλλίαμα se trasladó con una expresión que conserva la intensidad de «rejoicing» sin reducirlo a una simple «alegría».'
  spanish_consistency_notes:
  - Se usa «Judit» como forma española del nombre en todo el registro.
  - Se mantiene la imagen corporal «a sus ojos» para preservar la metáfora del texto fuente.
  - El tono general busca ser bíblico pero no arcaizante, con puntuación y comillas propias del español actual.
  - La nota al pie se ancla en «hablar contra» porque allí reside la alternativa lexical principal documentada por el audit trail.
