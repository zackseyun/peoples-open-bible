translation:
  language: es
  text: 'Y Raguel les preguntó: «¿De dónde son ustedes, hermanos?». Y ellos le respondieron: «Somos de los hijos de Neftalí[a], los cautivos[b] de Nínive».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de los descendientes de Neftalí» o «de la tribu de Neftalí». El griego dice literalmente «de los hijos de Neftalí».
    reason: lexical_alternative
  - marker: b
    text: O «los exiliados». El griego dice «los cautivos», destacando su condición de deportados.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠρώτησεν
  english_pob_choice: asked
  chosen_spanish: preguntó
  alternatives_spanish:
  - les hizo una pregunta
  - inquirió
  lexicon: BDAG
  rationale: «Preguntó» es el equivalente narrativo natural en español y conserva el valor simple del verbo griego sin sobreformalizarlo.
- source_word: Πόθεν ἐστέ
  english_pob_choice: Where are you from
  chosen_spanish: ¿De dónde son ustedes?
  alternatives_spanish:
  - ¿De dónde vienen?
  - ¿De dónde proceden?
  lexicon: BDAG
  rationale: La pregunta griega pide origen o procedencia. «¿De dónde son ustedes?» suena natural en español y mantiene el sentido de procedencia.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - amigos
  - parientes
  lexicon: BDAG
  rationale: El griego dice literalmente «hermanos». Se conserva esa forma de tratamiento masculina y fraterna, que en este contexto funciona como saludo respetuoso.
- source_word: Ἐκ τῶν υἱῶν Νεφθαλεὶ
  english_pob_choice: from the sons of Naphtali
  chosen_spanish: de los hijos de Neftalí
  alternatives_spanish:
  - de los descendientes de Neftalí
  - de la tribu de Neftalí
  lexicon: BDAG
  rationale: «Hijos de Neftalí» sigue de cerca el griego y preserva el matiz genealógico/tribal que el POB inglés decidió mantener en forma literal.
- source_word: τῶν αἰχμαλώτων
  english_pob_choice: the captives
  chosen_spanish: los cautivos
  alternatives_spanish:
  - los exiliados
  - los que fueron llevados cautivos
  lexicon: BDAG
  rationale: «Cautivos» reproduce con fuerza directa el sustantivo griego y evita suavizar el hecho de la deportación.
- source_word: ἐκ Νινευή
  english_pob_choice: from Nineveh
  chosen_spanish: de Nínive
  alternatives_spanish:
  - desde Nínive
  - en Nínive
  lexicon: BDAG
  rationale: El griego usa ἐκ con sentido de procedencia. En español, «de Nínive» comunica mejor esa relación que una localización estática.
translation_notes:
  revision_awareness: Se siguió el anclaje principal del griego de Swete (1909), con el apoyo del audit trail inglés. Se mantuvo la estructura dialogal simple, se conservó el término de parentesco/tribu «hijos de Neftalí», y se tradujo ἐκ Νινευή como procedencia («de Nínive») conforme a la revisión inglesa que prefirió «from Nineveh» sobre «in Nineveh».
  spanish_consistency_notes:
  - Se usó «Neftalí» para el nombre propio de la tribu, conforme a la forma española habitual.
  - Se evitó «SEÑOR» u otra terminología no presente en el versículo.
  - La puntuación de diálogo sigue normas españolas con comillas angulares y dos puntos.
  - «Cautivos» se mantuvo como término fuerte y no se suavizó a «exiliados» en el texto principal.
