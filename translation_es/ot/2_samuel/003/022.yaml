base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/003/022.yaml
  text: And behold[a], David’s servants and Joab came in from a raid and brought much plunder with them. But Abner was not with David in Hebron, because he had sent him away[b], and he had gone in peace.
  footnotes:
  - marker: a
    text: Or 'from the raiding party.' The Hebrew גְּדוּד can refer to a troop or band; here 'raid' is chosen because the next clause mentions plunder.
    reason: lexical_alternative
  - marker: b
    text: Literally 'went in peace,' an idiom meaning he departed safely and on good terms.
    reason: lexical_alternative
