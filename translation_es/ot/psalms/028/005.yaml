revisions:
- from: Porque no entienden las obras de Yahvé[a] ni la obra de sus manos, él los derribará y no los edificará.
  to: Porque no entienden[a] las obras de Yahvé ni la obra de sus manos, él los derribará y no los edificará.
  rationale: Se mantiene el texto principal, que es fiel y natural, pero se corrige la nota al pie para que refleje la alternativa léxica documentada en el POB inglés («regard/pay attention to») en vez de introducir una falsa alternativa entre dos complementos nominales. También se reubica el marcador a «no entienden» para anclar la variante donde realmente recae la diferencia.
