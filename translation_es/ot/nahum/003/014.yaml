translation:
  language: es
  text: Saca agua para ti para el sitio; refuerza tus fortalezas. Entra en el barro y pisa el mortero; toma el molde de ladrillo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘el horno de ladrillos’. El término hebreo מַלְבֵּן es raro y puede referirse tanto a un molde o forma de ladrillo como a un horno de ladrillos; el contexto inmediato de barro y mortero favorece ‘molde de ladrillo’.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵי מָצוֹר
  english_pob_choice: water for the siege
  chosen_spanish: agua para el sitio
  alternatives_spanish:
  - agua del sitio
  - agua para el asedio
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente ‘aguas de sitio’ y se refiere al aprovisionamiento de agua en vista de un asedio. ‘Agua para el sitio’ conserva la referencia militar y suena natural en español; ‘asedio’ sería también posible, pero ‘sitio’ mantiene mejor la economía del original y su tono estratégico.
- source_word: שַׁאֲבִי לָךְ
  english_pob_choice: Draw ... for yourself
  chosen_spanish: Saca ... para ti
  alternatives_spanish:
  - Saca agua para ti
  - Extrae ... para ti
  lexicon: HALOT
  rationale: El imperativo femenino singular y el לך reflexivo/dativo se reflejan con ‘para ti’. ‘Saca’ es más idiomático en español que ‘saca agua’/‘extrae’, y comunica bien la acción de obtener o sacar agua sin perder el matiz directo de la orden.
- source_word: חַזְּקִי
  english_pob_choice: strengthen
  chosen_spanish: refuerza
  alternatives_spanish:
  - fortalece
  - fortifica
  lexicon: HALOT
  rationale: En contexto militar y con ‘fortalezas’ como objeto, ‘refuerza’ transmite el mandato de dar mayor defensa. ‘Fortalece’ es viable, pero ‘refuerza’ evita una repetición demasiado cercana con ‘fortalezas’ y conserva el sentido de fortificar.
- source_word: מִבְצָרָיִךְ
  english_pob_choice: your fortresses
  chosen_spanish: tus fortalezas
  alternatives_spanish:
  - tus fortificaciones
  - tus plazas fuertes
  lexicon: HALOT
  rationale: El plural se refiere a lugares fortificados. ‘Fortalezas’ es claro y natural en español bíblico contemporáneo; ‘fortificaciones’ suena más técnico y ‘plazas fuertes’ es menos universal.
- source_word: בֹּאִי בַטִּיט
  english_pob_choice: Go into the clay
  chosen_spanish: Entra en el barro
  alternatives_spanish:
  - Entra en la arcilla
  - Ve al barro
  lexicon: HALOT
  rationale: Aunque טיט puede ser ‘arcilla’ o ‘barro’, el paralelismo con el trabajo manual siguiente favorece una imagen práctica y visible. ‘Barro’ es comprensible y mantiene la escena de preparación material; ‘arcilla’ sería más técnica y menos vívida para el lector general.
- source_word: וְרִמְסִי בַחֹמֶר
  english_pob_choice: and tread the mortar
  chosen_spanish: y pisa el mortero
  alternatives_spanish:
  - y tritura el barro
  - y pisa la argamasa
  lexicon: HALOT
  rationale: רמס es ‘pisar/trampear’, y חֹמֶר puede ser ‘mortar/argamasa’ o ‘barro’. ‘Mortero’ conserva el carácter de material de construcción que exige el contexto de fabricación de ladrillos, sin exceder la evidencia hacia una paráfrasis más amplia.
- source_word: הַחֲזִיקִי
  english_pob_choice: take hold of
  chosen_spanish: toma
  alternatives_spanish:
  - agarra
  - sujeta
  lexicon: HALOT
  rationale: 'El hiphil aquí gobierna el objeto siguiente y funciona como una orden práctica: tomar o agarrar el instrumento. ‘Toma’ es la opción más clara y natural en español para introducir el complemento ‘el molde de ladrillo’.'
- source_word: מַלְבֵּן
  english_pob_choice: the brick mold
  chosen_spanish: el molde de ladrillo
  alternatives_spanish:
  - el molde para ladrillos
  - el horno de ladrillos
  lexicon: HALOT
  rationale: Siguiendo la lectura contextual preferida por la POB inglesa, ‘molde de ladrillo’ mantiene el sentido de un instrumento de fabricación y deja abierta la alternativa textual/lexical tradicional de ‘horno de ladrillos’ sin imponerla en el cuerpo del texto.
theological_decisions:
- issue: Tratamiento del nombre divino en este versículo
  english_pob_reading: No appears; the verse is an oracle of judgment without a divine-name term in the line itself.
  chosen_spanish_reading: No se introduce ningún equivalente de nombre divino en el texto.
  alternative_spanish_readings:
  - SEÑOR
  - Yahvé
  rationale: El hebreo de este versículo no contiene יהוה ni una cita directa que obligue a suplirlo. Por eso el texto español se mantiene sin añadir un nombre divino ajeno al versículo.
  doctrine_reference: Criterio de fidelidad textual; no hay inserción de léxico teológico ausente del original.
translation_notes:
  revision_awareness: La versión inglesa POB más reciente mantiene su lectura de ‘brick mold’ y conserva la nota alternativa ‘brick kiln’. No se registran revisiones aplicadas ni cambios posteriores; el borrador español sigue esa decisión léxica y la expresa con un equivalente natural en español.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma del proyecto, pero aquí no aparece porque el versículo no lo contiene.
  - Se eligieron verbos imperativos naturales en español (‘saca’, ‘refuerza’, ‘entra’, ‘pisa’, ‘toma’) para conservar el tono exhortativo del hebreo.
  - ‘Barro’ y ‘mortero’ reproducen la secuencia material de la escena sin forzar una lectura técnica excesiva.
