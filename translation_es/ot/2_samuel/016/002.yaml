translation:
  language: es
  text: 'Entonces el rey dijo a Ziba[a]: «¿Para qué son estas cosas?». Y Ziba dijo: «Los asnos son para la casa real, para montar en ellos; el pan y la fruta de verano[b] son para que los jóvenes[c] coman; y el vino es para que el que esté cansado en el desierto beba».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Qué significan estas cosas para ti?». El hebreo expresa literalmente: «¿Qué son estas para ti?», una pregunta idiomática sobre propósito o sentido.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «productos de verano» o «fruto(s) de verano». El hebreo puede referirse de manera amplia a la cosecha estacional.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «los servidores» o «los asistentes». El término hebreo admite más de una identificación contextual.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מָה אֵלֶּה לָּךְ
  english_pob_choice: What are these for?
  chosen_spanish: ¿Para qué son estas cosas?
  alternatives_spanish:
  - ¿Qué son estas para ti?
  - ¿Qué quieres decir con estas cosas?
  lexicon: HALOT
  rationale: El hebreo usa una pregunta idiomática de finalidad o referencia. En español, «¿Para qué son estas cosas?» conserva el sentido natural de propósito sin volverla rígidamente literal ni perder la fuerza interrogativa.
- source_word: הַחֲמוֹרִים
  english_pob_choice: the donkeys
  chosen_spanish: los asnos
  alternatives_spanish:
  - los burros
  - los pollinos
  lexicon: HALOT
  rationale: «Asnos» refleja el animal con tono bíblico claro y evita una elección demasiado coloquial; mantiene la referencia léxica sin suavizarla.
- source_word: לְבֵית הַמֶּלֶךְ
  english_pob_choice: for the king’s household
  chosen_spanish: para la casa del rey
  alternatives_spanish:
  - para la familia del rey
  - para el séquito del rey
  lexicon: HALOT
  rationale: Aquí בית puede referirse a la casa/entorno real. En español, «casa del rey» preserva la metáfora y el vínculo institucional sin imponer «familia» o «séquito» donde el hebreo es más amplio.
- source_word: לִרְכֹּב
  english_pob_choice: to ride on
  chosen_spanish: para montar
  alternatives_spanish:
  - para cabalgar
  - para ir montados
  lexicon: HALOT
  rationale: Como infinitivo de propósito unido a «los asnos», «para montar» expresa de forma breve y natural la finalidad del transporte. El contexto ya hace evidente el complemento implícito.
- source_word: וְהַלֶּחֶם
  english_pob_choice: the bread
  chosen_spanish: el pan
  alternatives_spanish:
  - el alimento
  - el pan y otros víveres
  lexicon: HALOT
  rationale: El sustantivo básico es «pan»; en español bíblico moderno sigue siendo claro y adecuado. No se generaliza a «alimento» porque el verso enumera además otros comestibles.
- source_word: הַקַּיִץ
  english_pob_choice: summer fruit / summer produce
  chosen_spanish: la fruta de verano
  alternatives_spanish:
  - el fruto de verano
  - los productos de verano
  lexicon: HALOT
  rationale: El término puede abarcar fruto o produce estacional. «Fruta de verano» conserva la amplitud de la expresión sin especificar indebidamente una especie concreta.
- source_word: הַנְּעָרִים
  english_pob_choice: the young men
  chosen_spanish: los jóvenes
  alternatives_spanish:
  - los muchachos
  - los servidores
  lexicon: HALOT
  rationale: El hebreo puede referirse a jóvenes o servidores. Aquí se retiene el valor más directo y amplio con «los jóvenes», dejando abierta la posibilidad de que sean miembros jóvenes del grupo sin forzar la relación social.
- source_word: הַיָּעֵף
  english_pob_choice: the weary
  chosen_spanish: los cansados
  alternatives_spanish:
  - el cansado
  - los fatigados
  lexicon: HALOT
  rationale: La forma singular hebrea funciona de modo colectivo o genérico. En español, el plural sustantivado «los cansados» transmite ese valor distributivo con concisión y sin necesidad de una perífrasis.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto estéril
  - en la soledad del desierto
  lexicon: HALOT
  rationale: Aunque מִדְבָּר puede incluir matiz de estepa o zona semidesértica, en este contexto narrativo «desierto» es plenamente natural en español y comunica bien el lugar de la huida y el agotamiento.
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa al preferir una forma concisa para el singular colectivo hebreo de «the weary», sin desarrollar una perífrasis innecesaria. También conserva la amplitud semántica de «summer produce» mediante «fruta de verano», evitando especificar el fruto.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se evitó «SEÑOR» como sustituto, ya que no corresponde aquí.
  - «Casa del rey» conserva el valor institucional de בית sin forzar «palacio» o «familia».
  - Se conservaron las notas alternativas donde el hebreo admite más de una lectura contextual.
  - El registro es bíblico contemporáneo, no arcaizante, y procura claridad pública sin alejarse del texto fuente.
