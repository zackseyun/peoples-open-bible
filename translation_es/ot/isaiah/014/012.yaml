translation:
  language: es
  text: ¡Cómo has caído del cielo, resplandeciente[a], hijo del alba! Has sido abatido a la tierra, tú que sometías a las naciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo הֵילֵל se ha traducido tradicionalmente como «Lucifer» en algunas versiones antiguas; literalmente alude a una figura celestial resplandeciente, a menudo entendida como «lucero» o «estrella de la mañana».
    reason: alternative_reading
lexical_decisions:
- source_word: אֵיךְ
  english_pob_choice: How
  chosen_spanish: ¡Cómo
  alternatives_spanish:
  - ¡Ah, cómo
  - ¡Cuán
  lexicon: HALOT
  rationale: La partícula introduce una exclamación de asombro y lamento; «Cómo» conserva el golpe retórico sin añadir interpretación ajena.
- source_word: נָפַ֥לְתָּ
  english_pob_choice: you have fallen
  chosen_spanish: has caído
  alternatives_spanish:
  - caíste
  - has caído
  lexicon: HALOT
  rationale: El perfecto hebreo en este contexto taunt/lamento se vuelve naturalmente un perfecto español con fuerza de resultado presente.
- source_word: מִ/שָּׁמַ֖יִם
  english_pob_choice: from heaven
  chosen_spanish: del cielo
  alternatives_spanish:
  - de los cielos
  - del cielo
  lexicon: HALOT
  rationale: «Cielo» comunica bien el contraste alto/bajo del poema y suena natural en español; conserva el registro elevado sin forzar el plural.
- source_word: הֵילֵ֣ל
  english_pob_choice: shining one
  chosen_spanish: resplandeciente
  alternatives_spanish:
  - lucero
  - estrella de la mañana
  - Lucifer
  lexicon: HALOT
  rationale: La palabra parece designar una figura celeste brillante; «resplandeciente» retiene el valor descriptivo sin convertirlo en nombre propio. Se evita importar la tradición latina como si fuera el sentido primario.
- source_word: בֶּן שָׁ֑חַר
  english_pob_choice: son of dawn
  chosen_spanish: hijo del alba
  alternatives_spanish:
  - hijo de la aurora
  - hijo del amanecer
  lexicon: HALOT
  rationale: «Hijo del alba» mantiene la imagen poética y el paralelismo celestial del hebreo, con una formulación natural en español.
- source_word: נִגְדַּ֣עְתָּ
  english_pob_choice: you have been cut down
  chosen_spanish: has sido derribado
  alternatives_spanish:
  - has sido cortado
  - has sido abatido
  lexicon: HALOT
  rationale: El pasivo comunica la caída violenta y humillante; «derribado» es idiomático en español y conserva la fuerza del descenso.
- source_word: לָ/אָ֔רֶץ
  english_pob_choice: to the earth
  chosen_spanish: a la tierra
  alternatives_spanish:
  - a la tierra
  - al suelo
  lexicon: HALOT
  rationale: «Tierra» mantiene el contraste cielo/tierra del versículo mejor que «suelo».
- source_word: חוֹלֵ֖שׁ עַל גּוֹיִֽם
  english_pob_choice: you who subdued the nations
  chosen_spanish: tú que sometías a las naciones
  alternatives_spanish:
  - tú que dominabas a las naciones
  - tú que subyugabas a las naciones
  lexicon: HALOT
  rationale: El participio describe una acción característica y durativa; el imperfecto español («sometías») conserva esa fuerza habitual/continua. «Someter» expresa bien el poder sobre las naciones sin suavizarlo.
theological_decisions:
- issue: Cómo traducir הֵילֵל sin resolverlo en un nombre propio tradicional
  english_pob_reading: Render descriptively as 'shining one' in the main text; keep 'Lucifer' and astronomical equivalents in a note
  chosen_spanish_reading: Traducirlo descriptivamente como «resplandeciente» en el texto principal
  alternative_spanish_readings:
  - Lucifer
  - lucero
  - estrella de la mañana
  rationale: El hebreo funciona como designación poética de una figura celeste brillante, no como nombre propio inequívoco. La traducción descriptiva preserva la tensión original y evita imponer la tradición latina como lectura principal.
  doctrine_reference: Translation philosophy §1 (primacía del idioma original); §3 (preservar tensiones teológicas/lexicales)
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail en el segundo hemistiquio, usando «tú que sometías a las naciones» para reflejar con más precisión el participio de חוֹלֵשׁ, mientras mantiene el tono formal y poético del versículo.
  spanish_consistency_notes:
  - Se conserva el contraste cielo/tierra con «del cielo» / «a la tierra» para seguir la imaginería hebrea.
  - Se evita «Cristo» o terminología confesional ajena al texto; el versículo se mantiene en su registro poético y taunt oracular.
  - «Resplandeciente» funciona como equivalente descriptivo y no como nombre propio, de acuerdo con la primacía del hebreo.
