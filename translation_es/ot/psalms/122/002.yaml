review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien el sujeto explícito 'nuestros pies' y el estado presente/resultante de עֹמְדוֹת הָיוּ con 'están'. Sin embargo, 'en tus puertas' no preserva tan bien como debería el valor espacial de בִּשְׁעָרַיִךְ en este contexto de llegada/presencia dentro del acceso urbano; en español suena más a 'sobre/en las hojas de la puerta' o 'a la entrada' que a hallarse ya dentro del ámbito de las puertas de la ciudad. La nota alternativa sobre el pasado es adecuada y corresponde al rastro inglés.
  spanish_quality_summary: El español es claro, pero 'puertas' queda algo débil para puertas de ciudad y la expresión 'en tus puertas' suena menos idiomática y menos precisa que 'dentro de tus puertas'. 'Oh Jerusalén' es aceptable en registro bíblico; la puntuación general es correcta.
  glossary_alignment: No hay conflictos con la terminología troncal del proyecto. El nombre 'Jerusalén' está bien. La principal corrección es de precisión espacial/idiomática, no de glosario.
  issues:
  - severity: medium
