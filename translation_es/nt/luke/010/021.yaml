  text: Ἐν αὐτῇ τῇ ὥρᾳ ἠγαλλιάσατο ⸀τῷ πνεύματι ⸂τῷ ἁγίῳ⸃ καὶ εἶπεν· Ἐξομολογοῦμαί σοι, πάτερ κύριε τοῦ οὐρανοῦ καὶ τῆς γῆς, ὅτι ἀπέκρυψας ταῦτα ἀπὸ σοφῶν καὶ συνετῶν, καὶ ἀπεκάλυψας αὐτὰ νηπίοις· ναί, ὁ πατήρ, ὅτι οὕτως ⸂εὐδοκία ἐγένετο⸃ ἔμπροσθέν σου.
base_translation:
  language: en
  yaml_path: translation/nt/luke/010/021.yaml
  text: In that same hour he rejoiced in the Holy Spirit and said[a], “I praise you, Father, Lord of heaven and earth, because you hid these things from the wise and understanding, and revealed them to little children. Yes, Father[c][b], because this was well-pleasing in your sight.”
  footnotes:
  - marker: a
    text: Or 'I thank you.' The Greek verb can express thanksgiving as well as praise in prayer.
    reason: lexical_alternative
  - marker: b
    text: Or 'infants.' The expression is likely metaphorical for those who are humble or socially insignificant rather than literally only young children.
    reason: lexical_alternative
  - marker: c
    text: Or 'because such was your gracious will' or 'because this was your good pleasure.'
    reason: alternative_reading
