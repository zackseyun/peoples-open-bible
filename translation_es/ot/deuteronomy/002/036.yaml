base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/002/036.yaml
  text: From Aroer[a], which is on the edge of the Arnon Valley, and from the city that is in the valley, as far as Gilead, there was no town too high for us; Yahweh our God gave all of them before us.
  footnotes:
  - marker: a
    text: Or 'no town was too strong for us' or 'no town was inaccessible to us.' The Hebrew says literally that no town 'was too high from us,' using height as a metaphor for defensive strength or inaccessibility.
    reason: lexical_alternative
