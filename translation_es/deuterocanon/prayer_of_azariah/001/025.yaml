translation:
  language: es
  text: y atravesó y consumió a aquellos caldeos que halló alrededor del horno[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pasó por y prendió fuego». Los verbos griegos pueden verterse de forma más formal, pero el texto principal refleja la fuerza destructiva de la escena.
    reason: lexical_alternative
lexical_decisions:
- source_word: διώδευσεν
  english_pob_choice: swept through
  chosen_spanish: pasó a través
  alternatives_spanish:
  - atravesó
  - cruzó
  - pasó por
  lexicon: LSJ
  rationale: El verbo griego expresa atravesar una zona; en español, «pasó a través» conserva ese movimiento sin añadir más interpretación de la que exige el texto. «Atravesó» sería también posible, pero «pasó a través» mantiene con claridad la trayectoria verbal del original y deja a la segunda cláusula la fuerza destructiva.
- source_word: ἐνεπύρισεν
  english_pob_choice: burned up
  chosen_spanish: quemó
  alternatives_spanish:
  - incendió
  - prendió fuego a
  - abrasó
  lexicon: LSJ
  rationale: En el contexto, el verbo indica el efecto destructivo del fuego sobre los Chaldeos. «Quemó» comunica la acción de manera natural en español y evita sobrecargar el texto con una perífrasis que no aporta más precisión que el griego en este pasaje.
- source_word: οὓς εὗρεν
  english_pob_choice: those ... whom it found
  chosen_spanish: a los ... que halló
  alternatives_spanish:
  - a quienes encontró
  - a los que encontró
  - a quienes halló
  lexicon: LSJ
  rationale: El relativo es indefinido y abarca a cualquiera que estuviera allí. «Halló» refleja bien εὗρεν y suena sobrio en español bíblico; la estructura «a los ... que halló» conserva el valor acusativo del objeto afectado sin forzar una paráfrasis.
- source_word: περὶ τὴν κάμινον
  english_pob_choice: around the furnace
  chosen_spanish: alrededor del horno
  alternatives_spanish:
  - en torno al horno
  - cerca del horno
  - alrededor del horno de fundición
  lexicon: LSJ
  rationale: περί con acusativo indica localización espacial. «Alrededor del horno» es la equivalencia más clara y natural. «Horno» traduce κάμινος de forma sencilla; aunque puede referirse a un horno o a un horno/furnace, en español «horno» es suficientemente preciso en este contexto narrativo.
- source_word: τῶν Χαλδαίων
  english_pob_choice: the Chaldeans
  chosen_spanish: los Chaldeos
  alternatives_spanish:
  - los caldeos
  - los Babilonios
  lexicon: LSJ
  rationale: Se conserva el etnónimo literal del griego. La forma «Chaldeos» mantiene la correspondencia directa con Χαλδαίων y evita sustituirla por una designación más interpretativa como «Babilonios».
translation_notes:
  revision_awareness: 'La versión española sigue de cerca la última forma inglesa revisada, pero vuelve al griego para conservar la secuencia verbal y el carácter narrativo directo: movimiento a través del área, luego acción consumidora sobre quienes estaban cerca del horno. No se introduce una expansión interpretativa; se preserva la referencia étnica «Chaldeos» y la localización espacial «alrededor del horno».'
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque no hay aquí un nombre divino ni un κύριος en juego.
  - Se mantiene «Chaldeos» como transliteración consistente del etnónimo griego, en vez de «caldeos», para alinearlo con la forma auditada del inglés POB y con el término específico del texto fuente.
  - El texto usa una construcción natural con objeto directo animado («a los ... que halló») para reflejar οὓς εὗρεν sin añadir contenido.
  - No hay decisiones doctrinales especiales en este versículo; la traducción es puramente narrativa y descriptiva.
