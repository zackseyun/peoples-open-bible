base_translation:
  language: en
  yaml_path: translation/ot/exodus/020/018.yaml
  text: Now all the people were seeing the thunder and the flashes of fire[a], and the sound of the trumpet, and the mountain smoking; and when the people saw it[c][b], they trembled and stood at a distance.
  footnotes:
  - marker: a
    text: Hebrew literally 'the sounds' or 'the voices'; in context this likely refers to thunder.
    reason: lexical_alternative
  - marker: b
    text: Or 'torches'; in this context the term likely refers to lightning-like flashes of fire.
    reason: lexical_alternative
  - marker: c
    text: Hebrew says the people were 'seeing' phenomena that include sound, preserving the overwhelming sensory character of the scene.
    reason: lexical_alternative
