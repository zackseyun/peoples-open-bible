revisions:
- from: 'Con esto Aarón entrará en el Lugar Santo: con un toro de la vacada para expiación[a], y un carnero para holocausto.'
  to: 'Con esto Aarón entrará en el Lugar Santo: con un toro del ganado para ofrenda por el pecado[a][b], y un carnero para holocausto.'
  rationale: Se revisa «de la vacada» a «del ganado» para lograr un español más natural y fiel al idiomatismo hebreo בֶּן בָּקָר. Se reemplaza «para expiación» por «para ofrenda por el pecado» porque חַטָּאת nombra una categoría sacrificial concreta; la alternativa de purificación se conserva en nota, conforme a la auditoría inglesa y a la tensión léxica documentada.
