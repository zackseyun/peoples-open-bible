review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo: cuatrocientos elementos ornamentales, dos estructuras reticuladas, dos hileras por cada una, con finalidad de cubrir los remates redondeados de los capiteles sobre los pilares. Sin embargo, «granados» no preserva el sentido léxico de רִמּוֹנִים aquí; se trata de «granadas» (frutos ornamentales), no de árboles. Además, la nota [b] fue desplazada: en el POB inglés la nota b documenta la imagen de «los dos cuencos de los capiteles», no el valor distributivo de «para cada celosía».'
  spanish_quality_summary: El español es claro y digno, y «celosías», «hileras» y «capiteles» funcionan bien. No obstante, «cazoletas de los capiteles» suena algo reducido o diminutivo para la imagen arquitectónica; una formulación como «capiteles en forma de cuenco» es más natural y se alinea mejor con la decisión auditada. También conviene corregir las comillas y estilo de la nota [b] para mantener claridad editorial.
  glossary_alignment: No hay términos teológicos de proyecto en juego. Léxicamente, la principal desalineación es רִמּוֹנִים > «granados», que debe ser «granadas». «Celosías» como equivalente principal de שְּׂבָכוֹת es aceptable, con «redes» como alternativa en nota. «Capiteles» está bien para כֹּתָרוֹת.
  issues:
  - severity: high
    issue: «granados» traduce incorrectamente רִמּוֹנִים
    rationale: El hebreo y el POB inglés se refieren a granadas/pomegranates ornamentales, no a árboles de granado. La forma actual altera el referente material del inventario del templo.
  - severity: medium
    issue: La nota [b] documenta un punto distinto del auditado
    rationale: El POB inglés usa la nota b para explicar la imagen literal de «los dos cuencos de los capiteles». En español, la nota [b] se aplicó al distributivo de «para cada celosía», con lo que se pierde una justificación léxica importante del pasaje.
  - severity: medium
    issue: «cazoletas de los capiteles» es menos natural y menos fiel a la relación sintáctica que la solución auditada
    rationale: El hebreo habla de las dos formas redondeadas/bowls asociadas con los capiteles. En español, «los dos capiteles en forma de cuenco» comunica mejor la imagen arquitectónica sin introducir un diminutivo dudoso.
  revised_spanish_text: y las cuatrocientas granadas para las dos celosías[a], dos hileras de granadas para cada celosía, para cubrir los dos capiteles en forma de cuenco[b] que estaban sobre los pilares.
  revised_footnotes:
  - marker: a
    text: «Celosías» también puede traducirse como «redes». El término hebreo se refiere al trabajo ornamental reticulado de los capiteles.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «los dos cuencos de los capiteles». El hebreo usa esta imagen para las partes superiores redondeadas de los capiteles.
    reason: lexical_alternative
  revision_rationale: 'Se corrige el error léxico principal («granados» > «granadas»), se reubican las notas para reflejar el audit trail inglés y se mejora la expresión de גֻּלּוֹת con una formulación más natural y fiel en español: «capiteles en forma de cuenco».'
