translation:
  language: es
  text: Cuando los habitantes de Jabes de Galaad oyeron lo que los filisteos habían hecho a Saúl,
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: וַיִּשְׁמְעוּ
  english_pob_choice: heard
  chosen_spanish: oyeron
  alternatives_spanish:
  - escucharon
  - llegaron a oír
  lexicon: HALOT
  rationale: El verbo hebreo שׁמע en esta secuencia narrativa indica recepción de noticia; en español, «oyeron» comunica de manera natural que llegaron a conocer la información.
- source_word: אֵלָיו
  english_pob_choice: about
  chosen_spanish: —
  alternatives_spanish:
  - de ello
  - acerca de ello
  - sobre ello
  lexicon: HALOT
  rationale: La frase preposicional es idiomática tras שׁמע y en esta lectura funciona como marca del contenido oído, no como complemento personal literal. Por eso no se vierte de forma independiente en el texto principal; el contenido se expresa con la cláusula siguiente.
- source_word: יֹשְׁבֵי
  english_pob_choice: the inhabitants of
  chosen_spanish: los habitantes de
  alternatives_spanish:
  - los que habitaban en
  - los residentes de
  lexicon: HALOT
  rationale: El participio sustantivado de ישׁב designa a quienes viven en un lugar; «los habitantes de» preserva el sentido colectivo y es idiomático en español.
- source_word: יָבֵישׁ גִּלְעָד
  english_pob_choice: Jabesh-gilead
  chosen_spanish: Jabes de Galaad
  alternatives_spanish:
  - Jabes-Galaad
  - Jabes-galaad
  lexicon: HALOT
  rationale: Se conserva el topónimo compuesto con una forma española clara y ampliamente inteligible. «Galaad» refleja el nombre bíblico tradicional del territorio, y «de» ayuda a transparentar la composición del nombre.
- source_word: אֵת אֲשֶׁר
  english_pob_choice: what
  chosen_spanish: lo que
  alternatives_spanish:
  - aquello que
  - la cosa que
  lexicon: HALOT
  rationale: La combinación introduce el contenido de la noticia; «lo que» es la equivalencia natural en español sin añadir matices ajenos.
- source_word: עָשׂוּ
  english_pob_choice: had done
  chosen_spanish: habían hecho
  alternatives_spanish:
  - hicieron
  - habían realizado
  lexicon: HALOT
  rationale: El pluscuamperfecto en español expresa con claridad que la acción de los filisteos es anterior al oír de los habitantes.
- source_word: פְלִשְׁתִּים
  english_pob_choice: the Philistines
  chosen_spanish: los filisteos
  alternatives_spanish:
  - los filisteos
  lexicon: HALOT
  rationale: Se mantiene la designación étnica/nacional estándar.
- source_word: לְשָׁאוּל
  english_pob_choice: to Saul
  chosen_spanish: a Saúl
  alternatives_spanish:
  - contra Saúl
  - para Saúl
  lexicon: HALOT
  rationale: El valor del ל en este contexto marca al afectado por la acción; en español, «a Saúl» reproduce de modo directo esa relación sin sobreinterpretarla.
translation_notes:
  revision_awareness: La redacción sigue de cerca la relación sintáctica del hebreo y la decisión revisada en el POB inglés de traducir directamente el contenido oído sin insertar un equivalente de «about». Se preserva el pluscuamperfecto para el evento anterior al acto de oír, y se evita una paráfrasis que diluya la referencia al daño hecho a Saúl.
  spanish_consistency_notes:
  - Se mantiene el estilo bíblico contemporáneo, formal y legible.
  - No se usa «SEÑOR» ni terminología teológica no presente en el versículo.
  - La puntuación final queda abierta porque el versículo continúa en la narración siguiente.
