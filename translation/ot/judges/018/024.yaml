theological_decisions:
- issue: Rendering of אֱלֹהַי in a context of household cult objects
  chosen_reading: my gods
  alternative_readings:
  - my god(s)
  - my idols
  rationale: The term is lexically 'god/gods,' and the context identifies physical cult objects. 'My gods' preserves the Hebrew wording and the narrative irony without importing interpretive flattening to 'idols' in the main text. Because the objects are man-made, the wording also highlights the polemical tension already present in the text itself.
  doctrine_reference: Translation philosophy §§1, 3, 5
