revisions:
- from: Ahora, todos los pozos que habían cavado los siervos de su padre en los días de Abraham, su padre, los filisteos los taparon y los llenaron de tierra[a][b][c].
  to: Ahora, todos los pozos que habían cavado los siervos de su padre en los días de Abraham su padre[a][b], los filisteos los taparon y los llenaron de tierra.
  rationale: 'Se ajusta la puntuación para un español más natural sin perder la repetición filial del hebreo, y se sustituyen las notas por alternativas léxicas realmente respaldadas por el audit trail inglés: «siervos/esclavos» y «tierra/polvo». Se eliminan notas innecesarias sobre estructura interna y sobre un verbo ya bien resuelto en el texto principal.'
