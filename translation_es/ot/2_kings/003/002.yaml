translation:
  language: es
  text: Hizo lo malo ante los ojos de Yahvé, aunque no como su padre y su madre[a], pues quitó el pilar[b] de Baal que su padre había hecho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «solo, no como su padre y su madre». La partícula hebrea introduce una calificación: hizo lo malo, pero no en la misma medida que sus padres.'
    reason: lexical_alternative
  - marker: b
    text: O «el pilar sagrado de Baal» o «la piedra erguida de Baal». El hebreo se refiere a un objeto de culto asociado con la adoración de Baal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲשֶׂה הָרַע
  english_pob_choice: He did what was evil
  chosen_spanish: Hizo lo malo
  alternatives_spanish:
  - Hizo el mal
  - Hizo lo que era malo
  lexicon: HALOT
  rationale: El hebreo expresa un juicio evaluativo con עשה + הרע. En español, «hizo lo malo» conserva la valoración moral sin sonar tan pesado como una perífrasis más larga.
- source_word: בְּעֵינֵי יְהוָה
  english_pob_choice: in the eyes of Yahweh
  chosen_spanish: ante los ojos de Yahvé
  alternatives_spanish:
  - a los ojos de Yahvé
  - delante de Yahvé
  lexicon: HALOT
  rationale: La imagen idiomática se mantiene en español con una fórmula natural. «Ante los ojos de Yahvé» preserva el valor evaluativo del hebreo y el nombre divino según la norma del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: El proyecto pide «Yahvé» como forma española del Tetragrámaton. Se evita la sustitución por un título y se conserva el nombre propio del pacto.
- source_word: רַק לֹא כְאָבִיו וּכְאִמּוֹ
  english_pob_choice: though not like his father and his mother
  chosen_spanish: aunque no como su padre y su madre
  alternatives_spanish:
  - solo que no como su padre y su madre
  - aunque no igual que su padre y su madre
  lexicon: HALOT
  rationale: 'רַק introduce una restricción o matiz concesivo. «Aunque» comunica bien esa relación sin forzar un calco de «solo», y mantiene la tensión: fue malo, pero no del mismo modo que sus padres.'
- source_word: וַיָּסַר
  english_pob_choice: for he removed
  chosen_spanish: pues quitó
  alternatives_spanish:
  - y quitó
  - porque removió
  - pues removió
  lexicon: HALOT
  rationale: El verbo significa retirar/quitar. «Pues» refleja la relación explicativa del contexto, y «quitó» es claro y fiel en español moderno.
- source_word: מַצְּבַת הַבַּעַל
  english_pob_choice: the pillar of Baal
  chosen_spanish: el pilar de Baal
  alternatives_spanish:
  - la estela de Baal
  - la piedra erguida de Baal
  - el pilar sagrado de Baal
  lexicon: HALOT
  rationale: מַצֵּבָה designa una piedra erigida o pilar cultual. «Pilar» es la forma más directa y sobria; «de Baal» conserva la asociación idolátrica del objeto.
- source_word: אֲשֶׁר עָשָׂה אָבִיו
  english_pob_choice: that his father had made
  chosen_spanish: que su padre había hecho
  alternatives_spanish:
  - que había hecho su padre
  - que su padre hizo
  lexicon: HALOT
  rationale: El pluscuamperfecto español comunica adecuadamente la relación temporal con la acción principal. «Hecho» conserva el carácter concreto del objeto fabricado.
theological_decisions:
- issue: Nombre divino יהוה en una frase evaluativa
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: 'La decisión del proyecto para יהוה es transliterar el nombre divino, no ocultarlo tras un título. En esta frase se conserva el nombre propio con la forma española establecida: «Yahvé».'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: 'Concesión en רַק: calificación del mal del rey'
  english_pob_reading: though not like his father and his mother
  chosen_spanish_reading: aunque no como su padre y su madre
  alternative_spanish_readings:
  - solo que no como su padre y su madre
  - aunque no igual que sus padres
  rationale: 'La lectura inglesa preserva la tensión: el rey hizo el mal, pero no al mismo nivel que sus padres. En español, «aunque» mantiene esa concesión sin convertirla en una simple oposición moral.'
  doctrine_reference: Nota de lectura contextual basada en la función de רַק en el versículo
translation_notes:
  revision_awareness: 'Coincide con el último repaso del expediente: no se requieren cambios sustantivos. Se mantiene el nombre divino como Yahvé, la concesión de רַק y el sustantivo cultual מַצֵּבָה como «pilar».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - Se usa una construcción verbal directa («Hizo lo malo») para conservar el juicio moral hebreo sin añadir explicación innecesaria.
  - «Pilar de Baal» conserva el referente cultual sin suavizarlo con terminología eclesiástica posterior.
  - La relación temporal de la última cláusula se expresa con pluscuamperfecto («había hecho») para reflejar bien la narración hebrea.
