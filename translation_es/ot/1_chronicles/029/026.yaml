translation:
  language: es
  text: Y David, hijo de Isaí, reinó sobre todo Israel.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְ/דָוִיד
  english_pob_choice: And David
  chosen_spanish: Y David
  alternatives_spanish:
  - Ahora David
  - David
  lexicon: HALOT
  rationale: La וְ inicial funciona como enlace narrativo simple; en español, «Y» conserva la continuidad del relato sin añadir matiz temporal que no está explicitado en el hebreo.
- source_word: בֶּן יִשָׁי
  english_pob_choice: son of Jesse
  chosen_spanish: hijo de Isaí
  alternatives_spanish:
  - el hijo de Isaí
  - descendiente de Isaí
  lexicon: HALOT
  rationale: La construcción constructa significa literalmente «hijo de Isaí». En español, «hijo de Isaí» es natural, preciso y mantiene la identificación genealógica.
- source_word: מָלַךְ
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - fue rey
  - llegó a ser rey
  lexicon: HALOT
  rationale: El qal perfecto expresa el ejercicio de la realeza; «reinó» conserva ese valor verbal mejor que una perífrasis nominal.
- source_word: עַל
  english_pob_choice: over
  chosen_spanish: sobre
  alternatives_spanish:
  - sobre
  - sobre el
  lexicon: HALOT
  rationale: Con מָלַךְ, עַל introduce el ámbito o pueblo sobre el que se ejerce el reinado. «Sobre» reproduce bien esa relación en español.
- source_word: כָּל יִשְׂרָאֵל
  english_pob_choice: all Israel
  chosen_spanish: todo Israel
  alternatives_spanish:
  - todo el Israel
  - la totalidad de Israel
  lexicon: HALOT
  rationale: «Todo Israel» es la forma más natural en español para expresar la totalidad nacional. Mantiene el alcance absoluto del original sin sobrecargar la frase.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el texto hebreo de 1 Crónicas 29:26 y es plenamente concordante con el inglés auditado: no hay variantes textuales ni revisiones aplicadas que requieran nota.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque el versículo no contiene el nombre divino ni un sustituto reverencial.
  - Se usa «Isaí» como forma española estándar del nombre propio.
  - «Todo Israel» conserva la amplitud colectiva del hebreo sin añadir especificación interpretativa.
