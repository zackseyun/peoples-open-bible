translation:
  language: es
  text: quien[a], aun si no muriera, enterraría a uno de mis seis hijos. Pero con este lamento la madre santa y temerosa de Dios no lloró a ninguno de ellos,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego cambia bruscamente a primera persona singular («aun si no muriera»). Se conserva esa forma porque el texto fuente y la POB inglesa la mantienen, aunque algunos traductores la suavizan a tercera persona.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἣ
  english_pob_choice: who
  chosen_spanish: quien
  alternatives_spanish:
  - la cual
  - ella, que
  lexicon: LSJ
  rationale: El relativo griego remite a la madre del contexto anterior. «Quien» conserva la referencia sin recargar la frase, y funciona bien en español para un antecedente personal.
- source_word: οὐδʼ ἂν ἀποθάνω
  english_pob_choice: even if I were not to die
  chosen_spanish: aun si no muriera
  alternatives_spanish:
  - aunque no muriera
  - aun cuando no muriera
  lexicon: LSJ
  rationale: El griego presenta una condición hipotética con ἄν y primera persona singular. En español, la forma condicional/subjuntiva «aun si no muriera» transmite esa hipoteticidad sin suavizar el dato de primera persona.
- source_word: θάπτοντα
  english_pob_choice: would bury
  chosen_spanish: enterraría
  alternatives_spanish:
  - sepultaría
  - daría sepultura a
  lexicon: LSJ
  rationale: El participio se vuelve un verbo finito para una lectura natural en español. «Enterraría» conserva el valor de acción resultante y es idiomático; «sepultaría» sería más formal, pero menos inmediato.
- source_word: τῶν υἱῶν ἕξω τινά
  english_pob_choice: one of my six sons
  chosen_spanish: a uno de mis seis hijos
  alternatives_spanish:
  - a uno de mis seis hijos varones
  - a uno de mis seis hijos
  lexicon: LSJ
  rationale: El audit trail inglés ya resolvió ἕξω τινά como «one ... six», entendiendo ἕξω como «seis». En español, «uno de mis seis hijos» reproduce el valor numérico y el contexto materno. «Hijos» es natural y abarca el sentido filial; el contexto de varones ya está claro por υἱῶν.
- source_word: ἀλλὰ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Sin embargo
  lexicon: LSJ
  rationale: Marca contraste fuerte con lo esperado. «Pero» es la opción más directa y clara en español contemporáneo.
- source_word: τούτῳ τῷ θρήνῳ
  english_pob_choice: with this lament
  chosen_spanish: con este lamento
  alternatives_spanish:
  - con este duelo
  - con este llanto
  lexicon: LSJ
  rationale: θρῆνος es «lamentación» o «lamento». «Lamento» conserva solemnidad y no añade matices excesivos.
- source_word: οὐδένα ὀλοφύρετο
  english_pob_choice: bewailed none of them
  chosen_spanish: no se lamentó por ninguno de ellos
  alternatives_spanish:
  - no los deploró
  - no los lloró
  lexicon: LSJ
  rationale: ὀλοφύρομαι implica lamento intenso, casi un gemido o clamor fúnebre. «No se lamentó por ninguno de ellos» mantiene el sentido sin forzar un arcaísmo; «lloró» sería más débil y menos preciso.
- source_word: ἡ ἱερὰ καὶ θεοσεβὴς μήτηρ
  english_pob_choice: the holy and God-fearing mother
  chosen_spanish: la santa y temerosa de Dios madre
  alternatives_spanish:
  - la santa y piadosa madre
  - la sagrada y devota madre
  lexicon: LSJ
  rationale: ἱερά se rinde como «santa» en sentido moral/religioso. θεοσεβής se traduce mejor con «temerosa de Dios» para conservar la fuerza teocéntrica que el audit trail inglés marca como importante, en lugar de diluirla en «devota» o «piadosa».
theological_decisions:
- issue: Conservación de la primera persona en la cláusula hipotética
  english_pob_reading: even if I were not to die
  chosen_spanish_reading: aun si no muriera
  alternative_spanish_readings:
  - aun si ella no muriera
  - aunque no muriera
  rationale: El griego dado usa ἀποθάνω en primera persona singular, y la POB inglesa preserva esa abrupta primera persona en vez de suavizarla. El español mantiene esa señal textual sin resolverla narrativamente.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
- issue: Valor teocéntrico de θεοσεβής
  english_pob_reading: God-fearing
  chosen_spanish_reading: temerosa de Dios
  alternative_spanish_readings:
  - piadosa
  - devota
  rationale: La idea no es mera religiosidad, sino reverencia concreta a Dios. «Temerosa de Dios» preserva ese contenido explícito y la tensión de piedad reverente del contexto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que precisó «one of my six sons» a partir de τῶν υἱῶν ἕξω τινά. También se atendió a la observación crítica de que la cláusula inicial conserva una primera persona abrupta en el griego, por lo que el español no la normaliza a tercera persona.
  spanish_consistency_notes:
  - Se usa «Dios» para θεοσεβής según la preferencia POB de mantener el contenido teocéntrico explícito.
  - Se evita «SEÑOR» porque aquí no aparece el Tetragrámaton ni κύριος como máscara del nombre divino.
  - «Hijos» traduce υἱῶν de forma natural en español, mientras «seis» refleja la resolución adoptada por la POB inglesa para ἕξω en este contexto.
  - El tono es solemne y eclesial sin recurrir a arcaísmos innecesarios.
