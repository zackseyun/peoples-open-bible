review_pass:
  verdict: revise
  source_alignment_summary: El borrador español refleja bien la estructura imperativa, el sentido militar de לָהּ como ‘contra ella’, el valor de מִקֵּץ como ‘desde el extremo’, y conserva adecuadamente el matiz técnico de וְהַחֲרִימוּהָ con ‘dedíquenla a la destrucción’. Sin embargo, סָלּוּהָ no significa ‘arrójenla’ sino ‘amontónenla/apílenla’, por lo que el verbo principal de esa cláusula necesita corrección para ajustarse al hebreo y al POB inglés.
  spanish_quality_summary: El español es generalmente claro y digno, pero ‘arrójenla como montones’ suena poco natural y además no reproduce la imagen hebrea de amontonar. ‘Bodegas’ es posible, aunque ‘almacenes’ o ‘graneros’ serían algo más transparentes en muchos contextos; no obstante, puede mantenerse con nota. ‘Que no le quede remanente’ es comprensible y adecuado.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. La decisión ‘dedíquenla a la destrucción’ está alineada con la rationale teológica de חרם. No aparecen términos del glosario mayor que requieran ajuste.
  issues:
  - severity: high
    issue: סָלּוּהָ fue traducido como ‘arrójenla’
    rationale: El verbo hebreo, en contexto con ‘como montones’, expresa amontonar/apilar, no arrojar. La traducción actual altera la imagen central del verso y se aparta del inglés auditado ‘pile her up’.
  - severity: medium
    issue: La cláusula ‘arrójenla como montones’ resulta poco idiomática en español
    rationale: Además del problema léxico, la combinación no suena natural. ‘Amontónenla como montones’ o mejor ‘amontónenla en montones’/‘apílenla como montones’ transmite mejor el sentido.
  - severity: low
    issue: La nota b ofrece ‘almacenes’ como alternativa mientras el texto usa ‘bodegas’
    rationale: No es incorrecto, pero la relación entre texto y alternativas podría afinarse. Aun así, no exige cambio si se conserva la explicación metonímica del término.
  revised_spanish_text: Vengan contra ella desde el extremo[a]; abran sus bodegas[b]; amontónenla como montones, y dedíquenla a la destrucción[c]; que no le quede remanente.
  revised_footnotes:
