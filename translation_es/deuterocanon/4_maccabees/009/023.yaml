review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido general del griego: exhortación a imitar al mártir en el tormento, no desertar de la lucha, no repudiar la hermandad valiente y sostener una empresa militar-sacra por la εὐσέβεια. Sin embargo, hay problemas de alineación entre texto y notas, y una decisión léxica principal que conviene ajustar para reflejar mejor el inglés auditado y el valor semántico de εὐσέβεια.'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero las notas están desancladas y cruzadas: [a] aparece en «Imítenme» aunque explica «bajo tortura»; [b] aparece en «potro» aunque explica «deserten»; [c] aparece en «deserten» aunque explica «piedad»; [d] duplica/confunde el tratamiento de εὐσέβεια. Además, «hermandad de la valentía» suena algo forzado; «hermandad del valor» o «de la valentía» serían posibles, pero el borrador sigue siendo inteligible. «Emprendan la campaña» atenúa algo el doblete militar griego; «Libren» o «Lleven adelante» sería más marcial.'
  glossary_alignment: 'No hay conflicto con los términos troncales del proyecto como Yahvé/Mesías. Sí conviene ajustar εὐσέβεια: el rastro inglés eligió «godliness» con nota alternativa «piety». En español, «piedad» es posible, pero puede sonar demasiado devocional; «devoción a Dios» expresa mejor la fidelidad reverente del libro y evita depender de una nota teológica duplicada. También deben preservarse exactamente las alternativas auditadas mediante notas bien ancladas.'
  issues:
  - severity: high
    issue: Las notas al pie están mal ancladas y desordenadas.
    rationale: 'Los marcadores no corresponden a las palabras explicadas: [a] debería ir con «en el potro», [b] con «deserten», y la nota sobre εὐσέβεια con la frase final. Esto incumple la disciplina requerida de notas y puede confundir al lector.'
  - severity: medium
    issue: Tratamiento inconsistente y duplicado de εὐσέβεια.
    rationale: El texto principal usa «piedad», una nota [c] también ofrece «piedad» como alternativa, y otra [d] añade «santidad»/«devoción a Dios», creando confusión. Conviene una sola nota clara, con una decisión principal más precisa.
  - severity: medium
    issue: «Emprendan la campaña» atenúa la metáfora militar cognada στρατείαν στρατεύσασθε.
    rationale: El griego intensifica la imaginería militar. «Libran» no funciona aquí, pero «lleven adelante» o «sostengan» o «libren la campaña» preservan mejor la fuerza marcial que «emprendan», que suena más administrativo o inicial.
  - severity: low
    issue: «Hermandad de la valentía» suena algo menos idiomático.
    rationale: Es comprensible y fiel, pero «hermandad del valor» fluye mejor en español general. No obstante, no es un error grave y puede mantenerse si se prioriza cercanía formal.
