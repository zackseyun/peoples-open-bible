translation:
  language: es
  text: 'Entonces Dalila dijo a Sansón[a]: «Por favor, dime en qué consiste tu gran fuerza y cómo podrías ser atado para afligirte».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y por qué medio podrías ser atado para subyugare». El verbo hebreo puede significar «afligir», «humillar» o, en este contexto, «subyugar/derrotar».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: La waw consecutiva marca avance narrativo. «Entonces» conserva la secuencia de la acción con fluidez natural en español.
- source_word: דְּלִילָה
  english_pob_choice: Delilah
  chosen_spanish: Dalila
  alternatives_spanish:
  - Dalila
  lexicon: nombre propio tradicional
  rationale: Nombre propio en forma española habitual y reconocible, sin alterar la referencia.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  - hacia
  lexicon: HALOT
  rationale: Introducción normal del discurso directo en español con el objeto indirecto/persona hablada.
- source_word: שִׁמְשׁוֹן
  english_pob_choice: Samson
  chosen_spanish: Sansón
  alternatives_spanish:
  - Sansón
  lexicon: nombre propio tradicional
  rationale: Forma española estándar del nombre propio.
- source_word: הַגִּידָה נָּא לִי
  english_pob_choice: Please tell me
  chosen_spanish: Por favor, dime
  alternatives_spanish:
  - Te ruego que me digas
  - Dime, por favor
  lexicon: HALOT
  rationale: הגיד expresa pedir que se comunique algo; נָּא añade súplica/cortesía. «Por favor, dime» reproduce el tono de ruego de manera natural.
- source_word: בַּמֶּה כֹּחֲךָ גָדוֹל
  english_pob_choice: where your great strength lies
  chosen_spanish: en qué consiste tu gran fuerza
  alternatives_spanish:
  - dónde está tu gran fuerza
  - en qué está tu gran fuerza
  lexicon: HALOT
  rationale: El hebreo pregunta literalmente «en qué»; la formulación española «en qué consiste» evita un calco y expresa la idea de base o fundamento de la fuerza, manteniendo la naturalidad sin perder el contenido interrogativo.
- source_word: וּבַמֶּה תֵאָסֵר
  english_pob_choice: and how you could be bound
  chosen_spanish: y cómo podrías ser atado
  alternatives_spanish:
  - y por qué medio podrías ser atado
  - y en qué podrías ser atado
  lexicon: HALOT
  rationale: El niphal de אסר significa ser atado/bound. «Podrías ser atado» conserva posibilidad o medio sin sobreinterpretar.
- source_word: לְעַנּוֹתֶךָ
  english_pob_choice: to afflict you
  chosen_spanish: para afligirte
  alternatives_spanish:
  - para humillarte
  - para oprimirte
  - para subyugare
  lexicon: HALOT
  rationale: ענה en este contexto puede significar afligir, humillar u oprimir/subyugar. «Afligirte» sigue de cerca la elección inglesa y mantiene la ambigüedad lexical documentada.
theological_decisions:
- issue: 'Sentido de לְעַנּוֹתֶךָ: afligir, humillar u oprimir/subyugar'
  english_pob_reading: The Hebrew verb can mean 'afflict,' 'humble,' or in context 'subdue/overpower.'
  chosen_spanish_reading: afligirte
  alternative_spanish_readings:
  - humillarte
  - subyugarte
  - oprimirte
  rationale: No se debe cerrar la tensión semántica del verbo. «Afligirte» es suficientemente amplio para abarcar el daño o vejación buscados, sin imponer una interpretación más específica que el texto no obliga.
  doctrine_reference: Lexical semantics of ענה (Piel) in context
translation_notes:
  revision_awareness: 'La revisión en inglés cambió la frase de referencia a una formulación más natural: «where your great strength lies». La versión española sigue ese ajuste con «en qué consiste tu gran fuerza», evitando un calco de «dónde» y manteniendo la precisión del hebreo. También conserva la alternativa semántica del final mediante nota, como en el aparato inglés.'
  spanish_consistency_notes:
  - 'Se mantiene la terminología bíblica española estándar para nombres propios: Dalila y Sansón.'
  - Se preserva la ambigüedad lexical de ענה en la nota, sin forzar una sola lectura interpretativa.
  - La puntuación de diálogo usa comillas angulares según convención editorial en español.
  - La nota al pie está anclada correctamente en el texto con [a].
