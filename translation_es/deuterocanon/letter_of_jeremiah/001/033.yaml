translation:
  language: es
  text: Ya sea que sufran algún mal de alguien, o que reciban algún bien, no podrán retribuirlo[a]; no pueden establecer un rey ni quitarlo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no podrán devolverlo»; el verbo griego puede referirse a dar en retorno tanto por un mal como por un bien.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «establecer un rey o quitarlo».
    reason: lexical_alternative
lexical_decisions:
- source_word: οὔτε ἐὰν ... οὔτε ἐὰν
  english_pob_choice: Whether ... or
  chosen_spanish: Ya sea que ... o que ...
  alternatives_spanish:
  - Ni si ... ni si ...
  - Ya sea ... o ...
  lexicon: LSJ
  rationale: La construcción griega presenta dos condiciones alternativas paralelas. En español, «Ya sea que ... o que ...» conserva esa alternancia con un registro natural y claro, sin calcado rígido.
- source_word: κακόν τι
  english_pob_choice: some harm
  chosen_spanish: algún mal
  alternatives_spanish:
  - algún daño
  - alguna desgracia
  lexicon: LSJ
  rationale: Aquí κακόν se refiere a perjuicio o trato adverso, no a mal moral abstracto. «Algún mal» mantiene esa amplitud y encaja con el paralelismo con «algún bien».
- source_word: πάθωσιν
  english_pob_choice: they suffer
  chosen_spanish: sufran
  alternatives_spanish:
  - experimenten
  - padezcan
  lexicon: LSJ
  rationale: πάσχω expresa padecer o sufrir algo. «Sufran» conserva bien la pasividad de sufrir una acción o consecuencia.
- source_word: ὑπό τινος
  english_pob_choice: from anyone
  chosen_spanish: de alguien
  alternatives_spanish:
  - por alguien
  - de cualquiera
  lexicon: LSJ
  rationale: La frase indica un agente indefinido. «De alguien» es natural en español y mantiene la generalidad del griego.
- source_word: ἀγαθόν
  english_pob_choice: some good
  chosen_spanish: algún bien
  alternatives_spanish:
  - algún favor
  - algún beneficio
  lexicon: LSJ
  rationale: La contraparte de κακόν τι pide un paralelismo directo. «Algún bien» conserva la simetría y no especifica más de lo que el griego dice.
- source_word: δυνήσονται ἀνταποδοῦναι
  english_pob_choice: they will not be able to repay it
  chosen_spanish: no podrán retribuirlo
  alternatives_spanish:
  - no podrán pagarlo
  - no podrán devolverlo
  - no podrán recompensarlo
  lexicon: LSJ
  rationale: ἀνταποδοῦναι expresa dar en retorno, ya sea por mal o por bien. «Retribuirlo» recoge ese valor recíproco mejor que «pagarlo», y la forma pronominal permite referir la respuesta al daño o al bien sin añadir un objeto explícito que el griego no desarrolla.
- source_word: καταστῆσαι βασιλέα
  english_pob_choice: set up a king
  chosen_spanish: establecer un rey
  alternatives_spanish:
  - instalar a un rey
  - poner un rey
  - nombrar un rey
  lexicon: LSJ
  rationale: καθίστημι en infinitivo aoristo puede significar establecer, instalar o nombrar. «Establecer un rey» conserva el sentido político de constituir autoridad sin sonar demasiado coloquial.
- source_word: ἀφελέσθαι
  english_pob_choice: remove one
  chosen_spanish: quitarlo
  alternatives_spanish:
  - removerlo
  - deponerlo
  - retirarlo
  lexicon: LSJ
  rationale: El verbo significa quitar, retirar o tomar away. En contexto, el complemento implícito es el rey; «quitarlo» fluye en español y preserva la brevedad del original.
theological_decisions:
- issue: Alcance de la impotencia de los ídolos
  english_pob_reading: The verse states that idols cannot respond either to harm or to benefit done to them, and cannot install or remove kings.
  chosen_spanish_reading: El versículo afirma que los ídolos no pueden responder ni al mal ni al bien que se les haga, y tampoco pueden establecer ni quitar reyes.
  alternative_spanish_readings:
  - Los ídolos no pueden devolver ni mal ni bien, ni tampoco poner o quitar reyes.
  - No tienen capacidad para retribuir lo recibido ni para intervenir en la realeza.
  rationale: La frase griega es una denuncia amplia de la incapacidad de los ídolos en el plano de la reciprocidad y del poder político. La redacción española conserva esa amplitud sin intensificar ni suavizar el argumento.
  doctrine_reference: 'Principio de traducción: mantener el sentido llano del texto fuente sin introducir afirmaciones doctrinales adicionales.'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se registran cambios sustantivos respecto del borrador auditado en inglés. Se ha mantenido la simetría entre «mal» y «bien», y la cláusula política conserva el paralelismo de instalar/quitar un rey.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiere; este versículo no contiene el nombre divino.
  - Se mantiene «rey» en lugar de una paráfrasis como «gobernante» porque el griego dice βασιλέα.
  - La opción «retribuirlo» preserva la ambigüedad de respuesta recíproca sin restringirla a pago monetario.
