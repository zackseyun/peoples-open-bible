revision_risk_note: 'Please check: (1) rendering ‘ⲡⲙⲛⲧⲣⲣⲟ’ as ‘kingship’ versus ‘kingdom’;
  (2) the nuance of ⲡⲛⲟϭ (‘the great one’)—whether to retain ‘great’ or use ‘largest’;
  (3) the unusual numeral ⲡⲥⲧⲉⲯⲓⲧ as ‘ninety‑nine’; and (4) the verb ⲟⲩⲟϣⲕ as ‘love’
  versus ‘prefer’. The temporal chain ‘searched … until he found it. After he had
  toiled, he said…’ also invites scrutiny for best English flow without smoothing
  the Coptic structure.'
