theological_decisions:
- issue: Distinguishing θυμός and ὀργή in the same verse
  chosen_reading: Render θυμός as 'wrath' and ὀργή as 'anger'
  alternative_readings:
  - Render both as 'wrath'
  - Render θυμός as 'fury' and ὀργή as 'wrath'
  rationale: The Greek uses two related but distinct judgment terms in close proximity. Preserving some distinction reflects the source text's rhetorical force and avoids collapsing the imagery into a single repeated English word.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: Force of τοῦ κεκερασμένου ἀκράτου
  chosen_reading: Express the idiom as 'poured full strength'
  alternative_readings:
  - '''mixed undiluted'' in the main text'
  rationale: Ancient wine was commonly mixed, so the phrase conveys wine prepared in the cup yet undiluted, emphasizing the unmitigated nature of divine judgment. The chosen rendering communicates the sense in readable modern English without paraphrasing away the metaphor.
  doctrine_reference: Translation philosophy §6 (readable modern English, not archaic or academic)
