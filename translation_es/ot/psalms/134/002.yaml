translation:
  language: es
  text: Levanten sus manos al lugar santo[a] y bendigan a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hacia el santuario», «en el santuario» o «en santidad». El hebreo קֹדֶשׁ puede referirse tanto a santidad como a un lugar santo.
    reason: alternative_reading
lexical_decisions:
- source_word: שְׂאוּ
  english_pob_choice: Lift up
  chosen_spanish: Alzad
  alternatives_spanish:
  - Levantad
  - Alzad en alto
  lexicon: HALOT
  rationale: El imperativo plural de נשׂא pide una acción física concreta. En español, «alzad» conserva la imagen corporal y el tono exhortativo sin sonar pesado.
- source_word: יְדֵיכֶם
  english_pob_choice: your hands
  chosen_spanish: vuestras manos
  alternatives_spanish:
  - sus manos
  - las manos de ustedes
  lexicon: HALOT
  rationale: Es el objeto directo del mandato y el plural es literal. «Vuestras» mantiene la concordancia y la cercanía del llamado litúrgico.
- source_word: קֹדֶשׁ
  english_pob_choice: in the holy place
  chosen_spanish: el lugar santo
  alternatives_spanish:
  - la santidad
  - el santuario
  - en santidad
  lexicon: HALOT
  rationale: El contexto cultual permite una referencia espacial; en español, «el lugar santo» comunica con naturalidad la lectura local sin perder el vínculo con lo sagrado. La tensión entre sentido locativo y cualitativo se conserva en nota.
- source_word: וּבָרֲכוּ
  english_pob_choice: and bless
  chosen_spanish: y bendecid
  alternatives_spanish:
  - y alabad
  - y bendigan
  lexicon: HALOT
  rationale: En una doxología dirigida a Dios, «bendecid» reproduce el valor reverente de ברך mejor que «alabad», que estrecha el matiz. Se mantiene el paralelismo imperativo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino con la forma de proyecto «Yahvé», conforme a la terminología base del POB en español, evitando la sustitución por un título.
theological_decisions:
- issue: Sentido de קֹדֶשׁ en la expresión del versículo
  english_pob_reading: The Hebrew can mean either holiness or a holy place; the English main text moved from 'in holiness' to 'to the holy place' to preserve the likely cultic sense while retaining tension in the note.
  chosen_spanish_reading: «el lugar santo» en el texto principal, con reconocimiento de la posible lectura cualitativa/locativa en nota.
  alternative_spanish_readings:
  - «en santidad»
  - «hacia el santuario»
  - «en el santuario»
  rationale: La frase hebrea sin preposición admite más de una relación sintáctica. Dado el marco litúrgico, la lectura espacial es plausible y idiomática en español; sin embargo, no se elimina la posibilidad de una comprensión de cualidad sagrada, que sigue siendo real en el trasfondo del término.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El texto español sigue la última revisión del audit trail al preferir una lectura locativa de קֹדֶשׁ, pero mantiene abierta la tensión semántica con una nota que conserva las alternativas principales. Se ha evitado traducir mecánicamente desde el inglés: «alzad» y «bendecid» reflejan directamente el hebreo imperativo plural y ברך, mientras que «Yahvé» preserva el nombre divino conforme al proyecto.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה, conforme a la terminología base del POB en español.
  - Se usa «bendecid» para ברך en contexto doxológico, no «alabad», para no estrechar el matiz.
  - «Lugar santo» se emplea como solución española natural para la lectura locativa de קֹדֶשׁ, pero la nota preserva las demás posibilidades.
  - El tono es bíblico y litúrgico, pero con español moderno y comprensible.
