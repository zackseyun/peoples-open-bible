    rationale: Aunque comprensible, suena calcado y menos natural que «dijo lo mismo», que transmite fielmente la repetición de contenido de כַּדָּבָר הַזֶּה.
  - severity: medium
    issue: El marcador de nota está anclado en un lugar inadecuado
    rationale: La nota explica la expresión final «una palabra como la primera palabra», no la frase «dijo la misma cosa». Debe anclarse en «como antes[a]» o equivalente.
