    reason: lexical_alternative
  - marker: b
    text: Or 'its leaders' for 'its heads.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew says 'before God'; this may imply appearing at a sanctuary or covenantal sacred site.
    reason: alternative_reading
