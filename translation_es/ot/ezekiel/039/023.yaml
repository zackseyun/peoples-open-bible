review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien la secuencia causal del hebreo: las naciones reconocerán que el exilio de la casa de Israel se debió a su iniquidad y a su infidelidad contra Dios, seguida por el ocultamiento del rostro divino, la entrega al poder hostil y la caída a espada. Sin embargo, hay dos desajustes con el rastro inglés y con el hebreo: גָּלוּ se documentó como ‘went into exile’, pero el español dice ‘fue llevada al exilio’, que introduce una pasividad más fuerte que la elegida por POB; y וָאַסְתִּר פָּנַי מֵהֶם se expresó con ‘de ellos’, menos natural y menos fiel al giro establecido que ‘de/ante ellos’ o mejor ‘les escondí/oculté mi rostro’.'
  spanish_quality_summary: 'El español es en general claro y digno, pero contiene giros algo poco naturales: ‘oculté mi rostro de ellos’ y ‘en mano de sus adversarios’. En registro bíblico español suenan mejor ‘escondí mi rostro de ellos’ o ‘les oculté mi rostro’, y ‘en manos de sus adversarios’. También conviene alinear mejor con la decisión lexical inglesa sobre el exilio evitando ‘fue llevada’.'
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. ‘La casa de Israel’, ‘iniquidad’ y ‘adversarios’ están bien. No aparece el nombre divino en el versículo. La decisión sobre מעל se conserva bien con ‘actuaron con infidelidad contra mí’.
  issues:
  - severity: medium
    issue: ‘fue llevada al exilio’ introduce una pasividad no escogida por el POB auditado
    rationale: El hebreo גָּלוּ y la decisión inglesa ‘went into exile’ evitan enfatizar el pasivo. ‘Fue llevada al exilio’ suena más interpretativo que ‘fue al exilio’ o ‘entró en exilio’, y se aparta de la rationale documentada.
  - severity: medium
    issue: ‘oculté mi rostro de ellos’ es poco natural en español bíblico actual
    rationale: Aunque preserva el modismo, la preposición ‘de’ con ‘ocultar mi rostro’ suena forzada. Una forma más natural y fiel al sentido es ‘escondí mi rostro de ellos’ o ‘les oculté mi rostro’.
  - severity: low
    issue: ‘en mano de sus adversarios’ debería ir en plural idiomático
    rationale: La nota inglesa explica el hebraísmo singular ‘into the hand of’, pero en español la expresión natural es ‘en manos de sus adversarios’, manteniendo el sentido idiomático sin rigidez excesiva.
  revised_spanish_text: Y las naciones sabrán que la casa de Israel fue al exilio[a] por su iniquidad, porque actuaron con infidelidad contra mí; por eso escondí mi rostro de ellos y los entregué en manos de sus adversarios[b], y todos cayeron a espada.
  revised_footnotes:
