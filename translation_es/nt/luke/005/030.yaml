translation:
  language: es
  text: 'Y los fariseos y sus escribas murmuraban[a] a sus discípulos, diciendo: «¿Por qué ustedes comen y beben con los recaudadores de impuestos y los pecadores?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «murmuraban en voz baja». El verbo griego puede indicar una queja murmurada, no solo una objeción formal.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγόγγυζον
  english_pob_choice: were grumbling
  chosen_spanish: murmuraban
  alternatives_spanish:
  - se quejaban
  - murmuraban en contra
  lexicon: BDAG
  rationale: γογγύζω expresa una queja baja, de murmullo o murmuración. «Murmuraban» conserva mejor ese matiz que «se quejaban», y la forma imperfecta se refleja de manera natural en español con el pretérito imperfecto.
- source_word: γραμματεῖς
  english_pob_choice: scribes
  chosen_spanish: escribas
  alternatives_spanish:
  - maestros de la ley
  - expertos de la Ley
  lexicon: BDAG
  rationale: «Escribas» es el equivalente léxico directo y mantiene el grupo histórico del texto. Las alternativas explican función, pero no traducen tan directamente el término.
- source_word: αὐτῶν
  english_pob_choice: their
  chosen_spanish: sus
  alternatives_spanish:
  - de ellos
  lexicon: BDAG
  rationale: 'El genitivo pronominal modifica naturalmente a «escribas»: «sus escribas». En español es la solución más fluida y fiel a la sintaxis griega.'
- source_word: πρὸς τοὺς μαθητὰς αὐτοῦ
  english_pob_choice: to his disciples
  chosen_spanish: contra sus discípulos
  alternatives_spanish:
  - a sus discípulos
  - dirigiéndose a sus discípulos
  lexicon: BDAG
  rationale: En este contexto πρός + acusativo puede marcar dirección del habla, pero el contenido hostil del murmullo hace que «contra» sea una forma española que conserva el matiz polémico que el inglés POB también deja abierto. La referencia sigue siendo a los discípulos de Jesús.
- source_word: Διὰ τί
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Para qué motivo
  - ¿Con qué motivo
  lexicon: BDAG
  rationale: Equivalente interrogativo idiomático y natural en español; no requiere una versión más literal.
- source_word: τελωνῶν
  english_pob_choice: tax collectors
  chosen_spanish: recaudadores de impuestos
  alternatives_spanish:
  - publicanos
  - cobradores de impuestos
  lexicon: BDAG
  rationale: «Recaudadores de impuestos» comunica con claridad el oficio y evita un latinismo menos transparente. «Publicanos» es tradicional, pero más opaco para el lector general.
- source_word: ἁμαρτωλῶν
  english_pob_choice: sinners
  chosen_spanish: pecadores
  alternatives_spanish:
  - gente pecadora
  lexicon: BDAG
  rationale: «Pecadores» es la correspondencia directa y preserva la categoría social/moral usada por los hablantes, sin suavizarla.
- source_word: ἐσθίετε καὶ πίνετε
  english_pob_choice: eat and drink
  chosen_spanish: comen y beben
  alternatives_spanish:
  - están comiendo y bebiendo
  - comparten comida y bebida
  lexicon: BDAG
  rationale: Aunque el griego usa segunda persona plural, en español la pregunta se expresa de manera más natural con tercera persona plural en dependencia de «sus discípulos»; el sentido de la acusación se mantiene. «Comer y beber» conserva la concreción de la escena de mesa sin expandirla interpretativamente.
theological_decisions:
- issue: Tensión sobre la mesa compartida con recaudadores de impuestos y pecadores
  english_pob_reading: Retain the concrete accusation without explanatory expansion
  chosen_spanish_reading: Mantener la acusación concreta sin explicarla ni suavizarla
  alternative_spanish_readings:
  - Explicar el trasfondo ritual o moral
  - Suavizar la crítica a una simple discrepancia social
  rationale: El versículo presenta la objeción de los fariseos en sus propios términos. La traducción conserva la tensión histórica y teológica de la mesa compartida sin resolverla ni añadir explicación ajena al texto.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'Coincide con la última revisión del inglés POB: no se registran cambios posteriores; el acuerdo de revisión fue alto y sin observaciones.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera; este versículo no lo contiene.
  - «Escribas» se usa de modo consistente como término histórico directo.
  - Se conserva el contraste social de «recaudadores de impuestos y pecadores» sin reinterpretarlo.
  - La nota de pie de página conserva la alternativa léxica documentada por el auditorio inglés para γογγύζω.
