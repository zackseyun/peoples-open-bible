  - severity: low
    issue: Inconsistencia entre «refaítas» en el texto y «Refaím» en la nota
    rationale: La nota puede conservar el hebreo, pero conviene formularla de modo que no parezca cambiar de referente o terminología sin explicación. Una redacción más simple evita fricción para el lector.
