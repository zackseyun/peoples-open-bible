translation:
  language: es
  text: Y cuando les llegó la carta, tomaron a los hijos del rey, y degollaron a setenta hombres, y pusieron sus cabezas en canastos[a] y se las enviaron a él en Jezreel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en ollas» o «en vasijas»; el término hebreo designa recipientes y no se limita con certeza a canastos tejidos.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַסֵּפֶר
  english_pob_choice: the letter
  chosen_spanish: la carta
  alternatives_spanish:
  - el documento
  - el mensaje
  lexicon: HALOT
  rationale: En este contexto narrativo, סֵפֶר se refiere a una comunicación escrita concreta enviada previamente; «carta» es la opción española natural y específica, y conserva el sentido de escrito comunicado sin forzar una ampliación semántica.
- source_word: בְּנֵי הַמֶּלֶךְ
  english_pob_choice: the king’s sons
  chosen_spanish: los hijos del rey
  alternatives_spanish:
  - los hijos reales
  - los descendientes del rey
  lexicon: HALOT
  rationale: La expresión señala a los hijos varones del rey. «Hijos del rey» es idiomático en español y mantiene el sentido dinástico y familiar de manera directa.
- source_word: וַיִּשְׁחֲטוּ
  english_pob_choice: slaughtered
  chosen_spanish: mataron
  alternatives_spanish:
  - degollaron
  - sacrificaron
  lexicon: HALOT
  rationale: El verbo hebreo tiene una fuerza violenta ligada al degüello o matanza. En español, «mataron» es la forma más publicable y clara aquí, aunque «degollaron» podría sonar más cercano al matiz físico; no se eligió porque el objeto ya comunica la brutalidad del acto y «degollar» podría sonar demasiado técnico o redundante.
- source_word: שִׁבְעִים אִישׁ
  english_pob_choice: seventy men
  chosen_spanish: setenta hombres
  alternatives_spanish:
  - setenta personas
  lexicon: HALOT
  rationale: אִישׁ cuenta individuos varones; «hombres» preserva el valor de género y el carácter concreto del conteo mejor que «personas».
- source_word: רָאשֵׁיהֶם
  english_pob_choice: their heads
  chosen_spanish: sus cabezas
  lexicon: HALOT
  rationale: Se conserva el sentido literal, sin eufemismo, porque el contexto exige la crudeza de la escena.
- source_word: בַּדּוּדִים
  english_pob_choice: in baskets
  chosen_spanish: en canastos
  alternatives_spanish:
  - en cestos
  - en ollas
  - en vasijas
  lexicon: HALOT
  rationale: דּוּד puede referirse a un recipiente amplio, no necesariamente tejido. «Canastos» comunica bien en español la idea de recipientes transportables y deja abierta la amplitud del término hebreo, como la POB inglesa con «baskets», pero evitando una restricción excesiva a objetos de mimbre.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - le
  lexicon: HALOT
  rationale: El pronombre apunta a Jehú por el contexto inmediato. «A él» conserva la referencia pronominal del hebreo y evita sustituirla por el nombre propio.
- source_word: יִזְרְעֶאלָה
  english_pob_choice: at Jezreel
  chosen_spanish: en Jezreel
  alternatives_spanish:
  - a Jezreel
  - para Jezreel
  lexicon: HALOT
  rationale: La he direccional expresa movimiento hacia Jezreel, pero en español el verbo «enviaron» ya incorpora la idea de traslado. «En Jezreel» funciona de manera natural para indicar el lugar donde él estaba, manteniendo el valor locativo del contexto sin forzar una construcción menos idiomática.
translation_notes:
  revision_awareness: El texto inglés auditado opta por «the letter», «slaughtered» y «baskets», con una nota de pie sobre la amplitud de דּוּד. La versión española sigue esas decisiones de sentido, pero ajusta «the letter» a «la carta» por naturalidad y conserva la nota sobre la ambigüedad del recipiente con equivalentes españoles adecuados.
  spanish_consistency_notes:
  - Se mantuvo un estilo sobrio y bíblico contemporáneo, sin arcaísmos innecesarios.
  - Se preservó la referencia pronominal «a él» para reflejar el hebreo y el inglés auditado.
  - No se añadió ningún término eclesiástico tradicional ajeno al texto fuente.
  - La nota de pie se ancla en «canastos» porque ahí se concentra la ambigüedad lexical del hebreo.
