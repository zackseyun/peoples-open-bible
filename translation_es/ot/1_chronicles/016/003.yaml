translation:
  language: es
  text: Repartió a cada persona de Israel, de hombre a mujer, a cada uno un pan, una porción de carne[a] y una torta de pasas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «una porción» u otro alimento; la palabra hebrea אֶשְׁפָּר es rara y su sentido preciso es incierto. Muchos la entienden aquí como una porción de carne.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְחַלֵּק
  english_pob_choice: He distributed
  chosen_spanish: Lo distribuyó
  alternatives_spanish:
  - Lo repartió
  - Lo asignó
  lexicon: HALOT
  rationale: El piel wayyiqtol de חלק expresa la acción concreta de repartir o distribuir porciones. «Distribuyó» conserva ese matiz de dar a cada uno una parte y suena natural en español actual.
- source_word: לְכָל אִישׁ יִשְׂרָאֵל
  english_pob_choice: to every person of Israel
  chosen_spanish: a cada persona de Israel
  alternatives_spanish:
  - a cada hombre de Israel
  - a todo Israel
  lexicon: HALOT
  rationale: La revisión inglesa prefirió una forma inclusiva porque el versículo sigue con «de hombre a mujer». En español, «persona» transmite mejor esa inclusión que «hombre», sin perder el alcance distributivo.
- source_word: מֵאִישׁ וְעַד אִשָּׁה
  english_pob_choice: from man to woman
  chosen_spanish: de hombre a mujer
  alternatives_spanish:
  - desde varón hasta mujer
  - de varón a mujer
  lexicon: HALOT
  rationale: La expresión hebrea marca el rango completo de destinatarios por sexo. «De hombre a mujer» reproduce de cerca el giro idiomático y evita aplanarlo en una formulación más abstracta.
- source_word: לְאִישׁ
  english_pob_choice: to each one
  chosen_spanish: a cada uno
  alternatives_spanish:
  - a cada persona
  - a cada hombre
  lexicon: HALOT
  rationale: Aquí אִישׁ vuelve a funcionar distributivamente. «A cada uno» conserva esa repetición sin introducir una referencia masculina exclusiva, ya aclarada por la frase anterior.
- source_word: כִּכַּר לֶחֶם
  english_pob_choice: a loaf of bread
  chosen_spanish: un pan
  alternatives_spanish:
  - un pan redondo
  - una torta de pan
  lexicon: HALOT
  rationale: כִּכַּר puede referirse a una pieza redonda o en forma de torta. «Un pan» es la opción más natural en español y conserva el objeto alimenticio sin añadir una precisión no explícita en el hebreo.
- source_word: וְאֶשְׁפָּר
  english_pob_choice: a portion of meat
  chosen_spanish: una porción de carne
  alternatives_spanish:
  - una porción
  - una ración de carne
  - una pieza de carne
  lexicon: HALOT
  rationale: El término es raro y su sentido exacto es incierto. Siguiendo la lectura contextual de la POB inglesa, «una porción de carne» mantiene la concreción alimentaria y deja visible la traducción interpretativa.
- source_word: וַאֲשִׁישָׁה
  english_pob_choice: a raisin cake
  chosen_spanish: una torta de pasas
  alternatives_spanish:
  - una torta de uvas pasas
  - un pastel de pasas
  - una torta de uvas secas
  lexicon: HALOT
  rationale: El sustantivo suele entenderse como una torta prensada, a menudo de pasas. «Torta de pasas» comunica bien el alimento y conserva el carácter de pieza compacta.
theological_decisions:
- issue: Alcance inclusivo de los destinatarios
  english_pob_reading: to every person of Israel, from man to woman
  chosen_spanish_reading: a cada persona de Israel, de hombre a mujer
  alternative_spanish_readings:
  - a cada hombre de Israel, de hombre a mujer
  - a todo Israel
  rationale: El texto hebreo y la revisión inglesa muestran que la frase distributiva inicial no debe limitarse a varones; la cláusula siguiente explicita el alcance por sexo. La traducción española refleja esa inclusividad sin borrar la forma original.
  doctrine_reference: Ninguna; decisión de alcance semántico del texto.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa que cambió «every man of Israel» por «every person of Israel» para reflejar mejor el alcance inclusivo del hebreo, dado que la propia frase siguiente dice «from man to woman». La solución española sigue esa revisión y mantiene el valor distributivo de לְאִישׁ con «a cada uno».
  spanish_consistency_notes:
  - Se preserva «persona» para el alcance inclusivo de לְכָל אִישׁ יִשְׂרָאֵל, evitando que el español suene más restringido que el hebreo.
  - «De hombre a mujer» se conserva como giro idiomático paralelo al hebreo, en vez de reemplazarlo por una paráfrasis más abstracta.
  - «Una porción de carne» se deja en el texto porque la ambigüedad léxica de אֶשְׁפָּר merece visibilidad en nota.
  - «Torta de pasas» armoniza con el sustantivo hebreo de alimento prensado y mantiene un registro bíblico claro sin arcaísmos innecesarios.
