translation:
  language: es
  text: Esto también será mi salvación[a], porque ningún impío[b] podrá presentarse delante de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Salvación» también puede entenderse como «liberación» o «vindicación».
    reason: lexical_alternative
  - marker: b
    text: «Impío» también puede traducirse como «hipócrita» o «hombre impío»; el hebreo se refiere a alguien irreverente delante de Dios, no simplemente a alguien insincero.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - incluso
  - además
  lexicon: HALOT
  rationale: Preserva el valor aditivo/enfático de la partícula sin recargar el tono del versículo.
- source_word: הוּא
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - ello
  - eso
  lexicon: HALOT
  rationale: En este giro, el demostrativo apunta a la situación o realidad mencionada; «esto» reproduce mejor ese alcance que un pronombre personal.
- source_word: לִי
  english_pob_choice: my
  chosen_spanish: mi
  alternatives_spanish:
  - para mí
  - de mí
  lexicon: HALOT
  rationale: Con לִישׁוּעָה, el hebreo expresa pertenencia/beneficio; «mi salvación» conserva la construcción idiomática en español.
- source_word: לִישׁוּעָה
  english_pob_choice: salvation
  chosen_spanish: salvación
  alternatives_spanish:
  - liberación
  - vindicación
  lexicon: HALOT
  rationale: «Salvación» mantiene el registro solemne y la amplitud semántica del término, incluyendo el posible matiz de liberación o vindicación en Job.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la afirmación anterior; «porque» expresa con naturalidad esa relación explicativa en español.
- source_word: לֹא
  english_pob_choice: 'no'
  chosen_spanish: ningún
  alternatives_spanish:
  - 'no'
  - ningún hombre
  lexicon: HALOT
  rationale: 'En combinación con la frase siguiente, el español gana fluidez con una negación de cuantificador: «ningún impío podrá…».'
- source_word: לְפָנָיו
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - en su presencia
  - ante él
  lexicon: HALOT
  rationale: Conserva el sentido idiomático de comparecer ante una presencia superior; «delante de él» es claro y bíblico sin ser arcaizante.
- source_word: חָנֵף
  english_pob_choice: godless man
  chosen_spanish: impío
  alternatives_spanish:
  - hipócrita
  - irreverente
  - profano
  lexicon: HALOT
  rationale: El término hebreo apunta ante todo a alguien irreverente o sin piedad delante de Dios. «Impío» recoge bien ese valor religioso; las alternativas se mantienen porque el término también puede tocar la idea de hipocresía o profanidad.
- source_word: יָבֹוא
  english_pob_choice: may come
  chosen_spanish: podrá presentarse
  alternatives_spanish:
  - vendrá
  - puede venir
  - entrará
  lexicon: HALOT
  rationale: El verbo en este contexto habla de ser admitido a la presencia divina; «podrá presentarse» expresa la idea de acceso permitido mejor que un simple «venir».
theological_decisions:
- issue: Referente de «él» en «delante de él»
  english_pob_reading: him, referring to God
  chosen_spanish_reading: él, referido a Dios
  alternative_spanish_readings:
  - él, referido a la persona mencionada previamente de modo más general
  rationale: En el contexto de Job, la comparecencia se entiende ante Dios; mantener el pronombre sin explicitarlo conserva la referencia teológica y la sobriedad del hebreo.
  doctrine_reference: Lectura contextual del discurso de Job sin forzar una explicitación que el texto no da.
- issue: Sentido de לִישׁוּעָה en la confesión de Job
  english_pob_reading: salvation in the sense of deliverance/vindication
  chosen_spanish_reading: salvación con posible matiz de liberación o vindicación
  alternative_spanish_readings:
  - liberación
  - vindicación
  rationale: La línea afirma la confianza de Job en un desenlace favorable ante Dios; «salvación» preserva el término de base, y el contexto admite el trasfondo forense de vindicación.
  doctrine_reference: Mantener la tensión léxica entre salvación, liberación y vindicación en Job.
translation_notes:
  revision_awareness: Se siguió el acuerdo alto del control cruzado y se mantuvo la solución estable de la revisión más reciente, sin cambios sustantivos respecto del sentido del hebreo ni del auditorio inglés POB.
  spanish_consistency_notes:
  - Se emplea «Yahvé» solo cuando el texto lo requiera explícitamente; aquí el referente es Dios implícito por el pronombre final.
  - Se mantiene «salvación» como término principal por coherencia con el registro del POB, con nota para sus alternativas semánticas.
  - Se eligió «impío» en vez de «hipócrita» como opción principal, dejando la ambigüedad lexical documentada en la nota.
  - La formulación «podrá presentarse» evita una traducción excesivamente literal de «venir» y transmite mejor la admisión a la presencia divina.
