translation:
  language: es
  text: 'El perezoso dice: «¡Hay un león afuera[a]! ¡Me matarán[b] en las calles!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fuera»; el hebreo se refiere al espacio exterior a la casa, es decir, al aire libre o en la calle.
    reason: lexical_alternative
  - marker: b
    text: O «seré asesinado» o «seré muerto»; el verbo hebreo puede expresar una muerte violenta, pero «me matarán» se escogió por ser más natural en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָצֵל
  english_pob_choice: sluggard
  chosen_spanish: el perezoso
  alternatives_spanish:
  - el holgazán
  - el perezoso habitual
  lexicon: HALOT
  rationale: El término hebreo nombra a una persona caracterizada por la pereza. En español, «el perezoso» conserva el valor proverbial y general de la figura tipo, sin introducir una formulación demasiado coloquial.
- source_word: אָמַר עָצֵל
  english_pob_choice: The sluggard says
  chosen_spanish: El perezoso dice
  alternatives_spanish:
  - Dice el perezoso
  - Un perezoso dice
  lexicon: HALOT
  rationale: Se conserva el sujeto proverbial como tipo representativo. «El perezoso» funciona de manera natural en español para este uso gnómico.
- source_word: אֲרִי
  english_pob_choice: lion
  chosen_spanish: león
  alternatives_spanish:
  - leona
  lexicon: HALOT
  rationale: El hebreo denota un león de forma directa; no hay indicio de metáfora en el contexto inmediato.
- source_word: בַחוּץ
  english_pob_choice: outside
  chosen_spanish: afuera
  alternatives_spanish:
  - fuera
  - en el exterior
  lexicon: HALOT
  rationale: «Afuera» comunica de modo natural la oposición con el interior de la casa y mantiene la fuerza inmediata del temor expresado.
- source_word: בְּתוֹךְ רְחֹבוֹת
  english_pob_choice: in the streets
  chosen_spanish: en las calles
  alternatives_spanish:
  - en las plazas
  - en los espacios públicos
  lexicon: HALOT
  rationale: Aunque רְחֹבוֹת puede abarcar espacios amplios como plazas o explanadas, el español «calles» es suficientemente amplio y natural en el contexto, sin añadir una precisión no requerida por el hebreo.
- source_word: אֵרָצֵחַ
  english_pob_choice: I will be killed
  chosen_spanish: Seré muerto
  alternatives_spanish:
  - Seré asesinado
  - Me matarán
  lexicon: HALOT
  rationale: El nifal de רצח expresa muerte violenta en voz pasiva/reflexiva. «Seré muerto» conserva esa pasividad y la fuerza verbal del hebreo, aunque resulte más formal que una paráfrasis dinámica.
translation_notes:
  revision_awareness: 'El texto hebreo presenta dos paralelismos: el temor exagerado del perezoso ante un león “afuera” y su afirmación de que morirá violentamente “en las calles”. La versión española mantiene ambos elementos y evita suavizar el verbo final, preservando la tensión lexical del nifal de רצח.'
  spanish_consistency_notes:
  - Se mantiene «perezoso» para el tipo proverbial, en línea con la tradición de sabiduría y con la decisión inglesa «sluggard».
  - «Calles» se usa como equivalente funcional de רְחֹבוֹת sin forzar la imagen a «plazas» o «plazas públicas» en el texto principal.
  - Se conserva la pasividad de «Seré muerto» para no perder la fuerza verbal del hebreo.
  - Los marcadores de nota [a] y [b] aparecen exactamente en el texto, y cada uno corresponde a una nota distinta.
