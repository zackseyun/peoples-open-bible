translation:
  language: es
  text: Los labios[a] de los que se levantan contra mí, y el murmullo[b] de ellos contra mí todo el día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "el habla de" o "las palabras de" los que se levantan contra mí. En hebreo, "labios" es una expresión concreta para el habla.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "su meditación" o "su susurro". El término hebreo puede referirse a reflexión interior o a una emisión baja de voz; aquí el contexto hostil favorece "murmullo".'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׂפְתֵי
  english_pob_choice: the lips of
  chosen_spanish: los labios de
  alternatives_spanish:
  - el habla de
  - las palabras de
  lexicon: HALOT
  rationale: Conservo la imagen concreta de 'labios', que en hebreo funciona metonímicamente por el habla. En español, 'los labios de' mantiene esa concreción y encaja con el paralelismo del verso.
- source_word: קָמַי
  english_pob_choice: those who rise against me
  chosen_spanish: de los que se levantan contra mí
  alternatives_spanish:
  - de mis adversarios
  - de los que me atacan
  - de los que me oponen
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente 'mis que se levantan'. 'Se levantan contra mí' conserva la fuerza verbal y el sentido hostil sugerido por el contexto y por עָלַי.
- source_word: הֶגְיוֹנָם
  english_pob_choice: their muttering
  chosen_spanish: su murmullo
  alternatives_spanish:
  - su meditación
  - su susurro
  - su murmuración
  lexicon: HALOT
  rationale: El término puede abarcar meditación, murmurar o utterance bajo. Aquí el contexto hostil favorece un matiz de habla baja y continua; 'murmullo' mantiene esa ambigüedad sin convertirlo en 'conspiración'.
- source_word: עָלַי
  english_pob_choice: against me
  chosen_spanish: contra mí
  alternatives_spanish:
  - sobre mí
  - acerca de mí
  lexicon: HALOT
  rationale: Aunque la preposición es literalmente 'sobre', en contexto de habla hostil el español natural es 'contra mí'. Se mantiene en ambos miembros del verso.
- source_word: כָּל הַיּוֹם
  english_pob_choice: all day long
  chosen_spanish: todo el día
  alternatives_spanish:
  - todo el día largo
  - durante todo el día
  lexicon: HALOT
  rationale: Es la equivalencia idiomática más natural en español y conserva la idea de duración continua.
translation_notes:
  revision_awareness: 'Se corrigió el fallo anterior asegurando que cada marcador de nota aparezca exactamente en el texto español: [a] en ''labios'' y [b] en ''murmullo''. No se añadieron notas sin anclaje en el texto.'
  spanish_consistency_notes:
  - Se evita 'SEÑOR' o 'Cristo' porque el versículo no contiene esos términos.
  - Se mantiene 'contra mí' para reflejar el valor contextual de עָלַי.
  - '''Murmullo'' preserva la ambigüedad del hebreo sin imponer una lectura más fuerte que la del audito en inglés.'
