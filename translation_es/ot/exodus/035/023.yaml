translation:
  language: es
  text: Y todo hombre con quien se halló azul, púrpura, escarlata, lino fino, pelo de cabra, pieles de carneros teñidas de rojo y pieles de tahash[a], los trajeron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo tahash. El animal o material designado por tahash es incierto; las propuestas incluyen “cuero fino”, “pieles de marsopa” y “pieles de dugongo”.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכָל אִישׁ
  english_pob_choice: And every man
  chosen_spanish: Y todo hombre
  alternatives_spanish:
  - Y toda persona
  - Y cada hombre
  lexicon: HALOT
  rationale: אִישׁ es masculino singular con valor distributivo junto con כָל. En este contexto de ofrendas para el tabernáculo, 'todo hombre' conserva la forma y el valor distributivo del hebreo sin neutralizar el género gramatical del original.
- source_word: אֲשֶׁר נִמְצָא אִתּוֹ
  english_pob_choice: with whom ... were found
  chosen_spanish: con quien se hallaran
  alternatives_spanish:
  - que tenía
  - en cuya posesión se hallaran
  lexicon: HALOT
  rationale: 'El nifal de מצא expresa pasividad: ''ser hallado con''. ''Con quien se hallaran'' reproduce esa construcción de manera natural en español y mantiene el matiz de posesión/tenencia implícito sin volverlo demasiado explicativo.'
- source_word: תְּכֵלֶת
  english_pob_choice: blue yarn
  chosen_spanish: azul
  alternatives_spanish:
  - hilo azul
  - lana azul
  - tela azul
  lexicon: HALOT
  rationale: En esta lista de materiales, el término apunta al material teñido de azul usado en el tabernáculo. En español, 'azul' es suficiente y evita introducir un sustantivo no explicitado por el hebreo, manteniendo la brevedad del inventario.
- source_word: אַרְגָּמָן
  english_pob_choice: purple yarn
  chosen_spanish: púrpura
  alternatives_spanish:
  - hilo púrpura
  - tela púrpura
  lexicon: HALOT
  rationale: El término denota material teñido de púrpura. Igual que con תְּכֵלֶת, el español puede omitir el sustantivo 'hilo' para no sobreespecificar; 'púrpura' conserva la categoría cromática/material.
- source_word: תוֹלַעַת שָׁנִי
  english_pob_choice: scarlet yarn
  chosen_spanish: escarlata
  alternatives_spanish:
  - hilo escarlata
  - carmesí
  lexicon: HALOT
  rationale: La expresión designa material teñido de escarlata/carmesí. 'Escarlata' funciona como equivalente directo y natural; el sustantivo 'hilo' no está en el hebreo y no es necesario en español para la claridad del listado.
- source_word: שֵׁשׁ
  english_pob_choice: fine linen
  chosen_spanish: lino fino
  alternatives_spanish:
  - lino
  - lino de calidad
  lexicon: HALOT
  rationale: שֵׁשׁ suele referirse al lino de alta calidad en contextos sacerdotales y del tabernáculo. 'Lino fino' comunica bien esa cualidad sin perder la transparencia del término base.
- source_word: וְעִזִּים
  english_pob_choice: goats’ hair
  chosen_spanish: pelo de cabras
  alternatives_spanish:
  - lana de cabra
  - pelo de cabra
  lexicon: HALOT
  rationale: Aunque literalmente dice 'cabras', el contexto de materiales del tabernáculo indica el producto textil. 'Pelo de cabras' preserva la literalidad más cercana y deja claro que se trata de material, no de animales vivos.
- source_word: עֹרֹת אֵילִם מְאָדָּמִים
  english_pob_choice: ram skins dyed red
  chosen_spanish: pieles de carneros teñidas de rojo
  alternatives_spanish:
  - pieles de carneros rojas
  - pieles de carneros teñidas de escarlata
  lexicon: HALOT
  rationale: La frase describe pieles de carnero tratadas o coloreadas de rojo. 'Teñidas de rojo' sigue de cerca el participio y evita ambigüedad sobre si el color es natural o añadido.
- source_word: עֹרֹת תְּחָשִׁים
  english_pob_choice: tahash skins
  chosen_spanish: pieles de tahash
  alternatives_spanish:
  - cuero de tahash
  - pieles de animales marinos
  lexicon: HALOT
  rationale: תְּחָשׁ es un término de identificación incierta. La transliteración 'tahash' mantiene la audibilidad del problema léxico y evita fijar una identificación especulativa que el hebreo no garantiza.
- source_word: הֵבִיאוּ
  english_pob_choice: brought them
  chosen_spanish: los trajo
  alternatives_spanish:
  - los llevaron
  - los presentaron
  lexicon: HALOT
  rationale: El verbo plural resume la acción de llevar los materiales. En español, 'los trajo' es natural y permite recuperar el objeto implícito, manteniendo la economía del original.
translation_notes:
  revision_awareness: La versión inglesa auditada se mantiene en acuerdo alto con revisiones menores no aplicadas; no hay cambios sustanciales que alteren la correspondencia léxica de este versículo.
  spanish_consistency_notes:
  - Se conserva Yahvé solo cuando el texto fuente lo exige explícitamente; este versículo no contiene el nombre divino.
  - Se evita añadir 'hilo' en los colores para no sobretraducir un inventario nominal escueto; la nota a explica la decisión.
  - Se translitera tahash para preservar la incertidumbre léxica documentada en la auditoría inglesa.
  - '''Pieles de carneros'' sigue el valor zoológico del hebreo אֵילִם como carneros, no ovejas genéricas.'
