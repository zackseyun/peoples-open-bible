review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: Timoteo, al enterarse del avance de Judas, envía por delante a las mujeres y el resto de las pertenencias a Carnión porque el lugar era tácticamente difícil de sitiar y de alcanzar. Sin embargo, hay dos puntos mejorables: «difícil de aproximarse» no es español natural para δυσπρόσιτον, y «un lugar llamado Carnión» debilita ligeramente el artículo definido de τὸ λεγόμενον Κάρνιον, mejor representado como «el lugar llamado Carnión».'
  spanish_quality_summary: 'El texto es mayormente claro y digno, pero contiene una formulación poco idiomática: «difícil de aproximarse». En español bíblico natural y moderno conviene «difícil de alcanzar» o «de difícil acceso». Además, «bagaje» funciona, pero «equipaje» sería más común; no obstante, «bagaje» sigue siendo aceptable por su matiz de impedimenta. La nota al pie es útil y puede conservarse con leve pulido.'
  glossary_alignment: 'No hay términos teológicos de proyecto en juego. Las decisiones léxicas principales están bien alineadas con el rastro POB: ἔφοδον -> «avance», μεταλαβών -> «supo de», προεξαπέστειλεν -> «envió por delante», ἀποσκευήν -> «bagaje». Se recomienda ajustar δυσπρόσιτον a una expresión española más idiomática y τὸ λεγόμενον Κάρνιον a «el lugar llamado Carnión».'
  issues:
  - severity: medium
    issue: «difícil de aproximarse» suena antinatural en español
    rationale: Aunque intenta conservar la fuerza espacial de δυσπρόσιτον, en español esa construcción reflexiva no es idiomática para un lugar. «Difícil de alcanzar» mantiene el sentido concreto y lee con naturalidad.
  - severity: low
    issue: «un lugar llamado Carnión» debilita el definido del griego
    rationale: τὸ λεγόμενον Κάρνιον corresponde más directamente a «el lugar llamado Carnión». No cambia drásticamente el sentido, pero mejora la precisión.
  - severity: low
    issue: Redacción de la nota al pie puede pulirse ligeramente
    rationale: La nota actual es fiel, pero «sitio» encaja mejor que repetir «lugares» y «pasos o accesos angostos» puede simplificarse a «accesos estrechos».
