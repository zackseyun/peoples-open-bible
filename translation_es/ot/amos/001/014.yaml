translation:
  language: es
  text: Yo encenderé un fuego en el muro de Rabá[a], y consumirá sus ciudadelas, con grito de guerra[b] en el día de guerra[c], con tormenta en el día de tempestad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘sus palacios’ o ‘sus fortalezas’ para ‘sus ciudadelas’.
    reason: lexical_alternative
  - marker: b
    text: ‘Grito de guerra’ traduce un término hebreo que también puede significar un fuerte grito de alarma, a veces asociado con un toque de trompeta.
    reason: lexical_alternative
  - marker: c
    text: La imaginería de la tormenta puede evocar el juicio de Yahvé como guerrero divino, aunque también encaja en la imagen inmediata de destrucción en tiempo de guerra.
    reason: cross_reference
lexical_decisions:
- source_word: וְהִצַּתִּי
  english_pob_choice: I will kindle
  chosen_spanish: Yo encenderé
  alternatives_spanish:
  - Yo prenderé
  - Yo encenderé un fuego
  lexicon: HALOT
  rationale: El perfecto profético con valor futuro expresa una acción de juicio que en español se comunica con futuro simple. 'Encenderé' conserva la idea causativa de iniciar el fuego y suena natural y solemne en español bíblico actual.
- source_word: אֵשׁ
  english_pob_choice: a fire
  chosen_spanish: un fuego
  alternatives_spanish:
  - fuego
  lexicon: HALOT
  rationale: En español, con 'encenderé', el artículo indefinido hace explícito el objeto sin recargar la frase. Mantiene el sentido literal del fuego como instrumento de juicio.
- source_word: בְּחוֹמַת
  english_pob_choice: in the wall of
  chosen_spanish: en el muro de
  alternatives_spanish:
  - contra el muro de
  - sobre el muro de
  lexicon: HALOT
  rationale: '''Muro'' comunica bien la fortificación urbana y es más natural que una traducción demasiado técnica. ''En'' reproduce el valor básico de ב sin añadir un matiz interpretativo excesivo.'
- source_word: רַבָּה
  english_pob_choice: Rabbah
  chosen_spanish: Rabá
  alternatives_spanish:
  - Rabbá
  lexicon: nombre propio
  rationale: Se translitera el topónimo al español como 'Rabá', forma clara y convencional para lectores bíblicos en español.
- source_word: וְאָכְלָה
  english_pob_choice: and it will consume
  chosen_spanish: y consumirá
  alternatives_spanish:
  - y devorará
  lexicon: HALOT
  rationale: El sujeto implícito es 'fuego' y el verbo comunica destrucción total. 'Consumirá' preserva la imagen sin sonar más áspero de lo necesario en español.
- source_word: אַרְמְנוֹתֶיהָ
  english_pob_choice: her citadels
  chosen_spanish: sus ciudadelas
  alternatives_spanish:
  - sus palacios
  - sus fortalezas
  lexicon: HALOT
  rationale: '''ארמון'' puede abarcar palacio o estructura fortificada. En este contexto de asedio, ''ciudadelas'' conserva el componente defensivo y no limita el sentido a residencias reales. Se evita ''sus'' en lugar de ''sus'' con valor posesivo porque el español no conserva de forma natural el género personificado del hebreo en el pronombre sin pérdida de fluidez.'
- source_word: בִּתְרוּעָה
  english_pob_choice: with a battle cry
  chosen_spanish: con grito de guerra
  alternatives_spanish:
  - con clamor de guerra
  - con alarido de guerra
  - con toque de alarma
  lexicon: HALOT
  rationale: '''תרועה'' puede ser grito, clamor de alarma o incluso toque de trompeta. ''Grito de guerra'' mantiene el campo semántico militar y deja abierta la posible asociación con alarma sonora, como en la nota inglesa.'
- source_word: בְּיוֹם מִלְחָמָה
  english_pob_choice: on the day of war
  chosen_spanish: en el día de batalla
  alternatives_spanish:
  - en el día de guerra
  - el día de la batalla
  lexicon: HALOT
  rationale: '''Batalla'' es más idiomático que ''guerra'' en este paralelo español, sin perder el marco bélico. ''En el día de'' conserva la construcción temporal del hebreo.'
- source_word: בְּסַעַר
  english_pob_choice: with a storm
  chosen_spanish: con tormenta
  alternatives_spanish:
  - en tormenta
  - con tempestad
  lexicon: HALOT
  rationale: '''סער'' denota tormenta, vendaval o tempestad. ''Con tormenta'' sigue el paralelismo instrumental del verso y suena natural en español.'
- source_word: בְּיוֹם סוּפָה
  english_pob_choice: on the day of tempest
  chosen_spanish: en el día de tempestad
  alternatives_spanish:
  - en el día de tormenta
  - en el día de vendaval
  lexicon: HALOT
  rationale: '''סופה'' tiene el valor de tempestad/tormenta violenta. ''Tempestad'' conserva la intensificación poética y distingue este miembro del anterior sin borrarlo.'
theological_decisions:
- issue: Imaginería de juicio y guerra
  english_pob_reading: The verse describes literal military devastation using fire and storm imagery, without requiring the storm language to be read exclusively as a direct theophany.
  chosen_spanish_reading: El versículo describe una devastación militar real con imágenes de fuego y tormenta, sin obligar a leer la tormenta exclusivamente como una teofanía directa.
  alternative_spanish_readings:
  - La tormenta alude principalmente a la presencia guerrera de Yahvé.
  - La imagen de la tormenta es sólo figurada y no tiene carga teológica adicional.
  rationale: La traducción conserva ambas imágenes y no resuelve la tensión entre lenguaje bélico e imaginería de tormenta. Así se mantiene la ambigüedad documentada por el texto fuente y por la nota inglesa.
  doctrine_reference: Translation philosophy §3
- issue: Referencia del sufijo femenino en אַרְמְנוֹתֶיהָ
  english_pob_reading: The suffix is represented as 'her,' referring to the city Rabbah.
  chosen_spanish_reading: El posesivo se expresa como 'sus', refiriéndose a Rabá como ciudad personificada en femenino.
  alternative_spanish_readings:
  - su
  - sus ciudadelas de ella
  rationale: En español, 'sus' es la forma natural para reflejar la posesión sin forzar una personificación explícita en cada frase. La referencia sigue siendo la ciudad de Rabá, coherente con el hebreo y con la nota inglesa sobre el femenino.
  doctrine_reference: Translation philosophy §5
translation_notes:
  revision_awareness: La revisión más reciente mantiene el texto sin cambios; el consenso de auditoría es alto y no se registran ajustes pendientes. La versión española sigue de cerca el hebreo y la línea de traducción óptima del POB inglés, preservando las alternativas léxicas relevantes sin sobreexplicar.
  spanish_consistency_notes:
  - Se usa 'Yahvé' cuando corresponda en el corpus, pero este versículo no contiene el nombre divino.
  - '''Rabá'' mantiene la transliteración del topónimo en vez de traducirlo.'
  - '''ciudadelas'' conserva la fuerza fortificada de אַרְמְנוֹתֶיהָ sin cerrar el sentido sólo a ''palacios''.'
  - Se evita armonizar 'tormenta' y 'tempestad' en una sola palabra para respetar el paralelismo poético del hebreo.
