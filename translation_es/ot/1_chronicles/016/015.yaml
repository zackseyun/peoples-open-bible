review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: imperativo plural («Recuerden»), duración continua («para siempre»), «su pacto», y la tensión léxica de דָּבָר como «palabra» con nota alternativa. Sin embargo, la nota al pie no preserva toda la alternativa documentada en el POB inglés, que incluye también la frase completa «que él mandó para mil generaciones».'
  spanish_quality_summary: El español es claro y natural. No obstante, en registro bíblico ampliamente legible, «su pacto» puede sonar algo menos idiomático que «su pacto»/«su alianza» según contexto; aquí no es un error. La reparación necesaria es principalmente de la nota al pie, para que refleje fielmente la alternativa inglesa completa y no solo «la promesa».
  glossary_alignment: No hay conflicto con los términos por defecto del proyecto. «Pacto» para בְּרִית es defendible en este contexto. «Palabra» para דָּבָר sigue correctamente la decisión principal del POB, y «mandó» preserva bien צִוָּה.
  issues:
  - severity: medium
    issue: La nota al pie está incompleta frente al audit trail inglés.
    rationale: 'La nota inglesa dice: «Or ''the promise he commanded for a thousand generations.''» La nota española «O «la promesa».» reduce indebidamente la alternativa y ya no representa la misma unidad sintáctica ni el mismo alcance semántico.'
  revised_spanish_text: Recuerden para siempre[a] su pacto, la palabra que él mandó para mil generaciones.
  revised_footnotes:
  - marker: a
    text: O «la promesa que él mandó para mil generaciones».
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel y natural. Se corrige únicamente la nota para preservar la alternativa léxica documentada en el POB inglés sin truncarla.
