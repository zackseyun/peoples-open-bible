translation:
  language: es
  text: Pero lo entregó todo en sus manos[a]. Y, después de tomar todos los vasos sagrados de Yahvé, los grandes y los pequeños, y las tesorerías de Yahvé y los almacenes reales[b], los llevaron a Babilonia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego omite el sujeto explícito del verbo. En contexto, puede entenderse que el agente último es Yahvé, pero el verso no lo nombra de manera directa.
    reason: alternative_reading
  - marker: b
    text: O «los tesoros reales». El término griego puede designar depósitos o lugares de almacenaje; «almacenes» sigue más de cerca el sentido directo.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρέδωκεν
  english_pob_choice: handed ... over
  chosen_spanish: lo entregó
  alternatives_spanish:
  - lo puso en manos de ellos
  - lo entregó en sus manos
  lexicon: BDAG
  rationale: El verbo expresa entrega o transferencia de control. «Lo entregó» conserva esa fuerza sin sonar forzado en español; el complemento «en sus manos» mantiene el matiz idiomático del griego.
- source_word: εἰς τὰς χεῖρας αὐτῶν
  english_pob_choice: into their hands
  chosen_spanish: en sus manos
  alternatives_spanish:
  - en poder de ellos
  - a ellos
  lexicon: BDAG
  rationale: La imagen concreta de manos es natural en español y preserva la idea de dominio o control recibido por los captores.
- source_word: ἱερὰ σκεύη
  english_pob_choice: holy vessels
  chosen_spanish: vasos sagrados
  alternatives_spanish:
  - vasijas sagradas
  - utensilios sagrados
  lexicon: BDAG
  rationale: «Σκεύη» puede abarcar objetos o utensilios cultuales; «vasos sagrados» conserva el carácter consagrado y es una expresión bíblica clara en español, sin reducir indebidamente el conjunto a recipientes comunes.
- source_word: τοῦ κυρίου
  english_pob_choice: of the Lord
  chosen_spanish: de Yahvé
  alternatives_spanish:
  - del Señor
  - pertenecientes a Yahvé
  lexicon: BDAG
  rationale: Siguiendo la convención del proyecto, se usa «Yahvé» para el nombre divino cuando el griego κύριος remite a la realidad del nombre sagrado en el trasfondo. Aquí no se enmascara con «SEÑOR».
- source_word: τὰ μεγάλα καὶ τὰ μικρά
  english_pob_choice: the great and the small
  chosen_spanish: los grandes y los pequeños
  alternatives_spanish:
  - los grandes y los chicos
  - los grandes y los menores
  lexicon: BDAG
  rationale: La pareja inclusiva se traduce de forma literal y natural para expresar que se tomaron objetos de toda clase y tamaño.
- source_word: κιβωτούς
  english_pob_choice: chests / treasuries
  chosen_spanish: los tesoros
  alternatives_spanish:
  - los cofres
  - los almacenes
  - las arcas
  lexicon: LSJ
  rationale: En este contexto, y siguiendo la revisión del POB inglés, el término se entiende mejor como depósito o conjunto de objetos valiosos; «tesoros» comunica la función referencial sin sugerir erróneamente el arca del pacto.
- source_word: βασιλικὰς ἀποθήκας
  english_pob_choice: royal storehouses
  chosen_spanish: los almacenes reales
  alternatives_spanish:
  - las bodegas reales
  - los depósitos reales
  - las treasurías reales
  lexicon: LSJ
  rationale: «ἀποθήκας» denota lugares de almacenaje o depósito; «almacenes reales» es directo, comprensible y cercano al sentido básico del término.
- source_word: ἀναλαβόντες
  english_pob_choice: after taking
  chosen_spanish: después de tomar
  alternatives_spanish:
  - habiendo tomado
  - tras tomar
  lexicon: BDAG
  rationale: El participio antecede a la acción principal; «después de tomar» explicita la secuencia en español sin añadir contenido no presente en el texto.
- source_word: ἀπήνεγκαν
  english_pob_choice: they carried them away
  chosen_spanish: los llevaron
  alternatives_spanish:
  - los transportaron
  - los llevaron consigo
  lexicon: BDAG
  rationale: El verbo expresa traslado fuera del lugar de origen. «Los llevaron» es natural y suficiente; el contexto ya indica el movimiento de exilio hacia Babilonia.
- source_word: εἰς Βαβυλῶνα
  english_pob_choice: to Babylon
  chosen_spanish: a Babilonia
  alternatives_spanish:
  - hasta Babilonia
  - hacia Babilonia
  lexicon: BDAG
  rationale: Preposición de destino simple y idiomática en español.
theological_decisions:
- issue: Sujeto implícito de «él lo entregó todo»
  english_pob_reading: Retain the singular 'he' without specifying the antecedent in the translation.
  chosen_spanish_reading: 'Conservar un sujeto implícito/no explicitado por el griego: «él lo entregó todo».'
  alternative_spanish_readings:
  - «Yahvé lo entregó todo»
  - «el rey lo entregó todo»
  rationale: El griego presenta un verbo singular sin sujeto explícito en la cláusula. La traducción mantiene esa indeterminación textual en vez de resolverla interpretativamente, aunque el contexto amplio pueda sugerir a Yahvé como agente último.
  doctrine_reference: Preservar la tensión teológica y textual sin decidir más de lo que el verso afirma.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en inglés, que corrigió la lectura de κιβωτούς de «chests» a «treasuries» para mayor precisión léxica. También conserva la observación sobre el sujeto implícito del primer verbo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al criterio del proyecto para el nombre divino.
  - Se usa «almacenes reales» para ἀποθήκας, mientras que «tesoros» queda reservado como alternativa anotada para κιβωτούς.
  - «Vasos sagrados» conserva el registro cultual y evita bajar el tono a objetos meramente domésticos.
  - Se evita resolver el sujeto implícito en el texto principal, siguiendo la cautela del POB inglés.
