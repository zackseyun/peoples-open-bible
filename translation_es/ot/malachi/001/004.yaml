translation:
  language: es
  text: 'Aunque Edom dice[a]: «Hemos sido devastados, pero volveremos y reconstruiremos las ruinas», así dice Yahvé de los Ejércitos[b]: «Podrán edificar, pero yo derribaré; y serán llamados territorio de maldad[c], el pueblo contra quien Yahvé está indignado para siempre[d]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque Edom dirá». El hebreo admite una lectura situacional o predictiva; aquí el contexto resalta el contraste con la respuesta de Yahvé.'
    reason: alternative_reading
  - marker: b
    text: 'Traducción tradicional: «Yahvé/SEÑOR de los ejércitos» o «de las huestes». Aquí «de los Ejércitos» transparenta צְבָאוֹת.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «frontera de maldad». גְּבוּל puede denotar territorio o zona fronteriza; aquí se ha optado por «territorio».'
    reason: lexical_alternative
  - marker: d
    text: 'O: «el pueblo con quien Yahvé está indignado para siempre». El hebreo puede expresarse en español con un giro más relacional o más directo contra el objeto de la indignación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱדוֹם
  english_pob_choice: Edom
  chosen_spanish: Edom
  alternatives_spanish:
  - Edom
  lexicon: HALOT
  rationale: Nombre propio de la nación; se conserva por transliteración, como en la base inglesa y según el uso bíblico estándar.
- source_word: רֻשַּׁשְׁנוּ
  english_pob_choice: We are shattered
  chosen_spanish: Somos aplastados
  alternatives_spanish:
  - Estamos quebrantados
  - Estamos devastados
  - Somos destruidos
  lexicon: HALOT
  rationale: El verbo pasivo expresa ruina o derribo nacional. «Aplastados» comunica bien la idea de ser abatidos o arruinados sin restringirlo solo a pobreza material.
- source_word: וְנָשׁוּב
  english_pob_choice: we will return
  chosen_spanish: volveremos
  alternatives_spanish:
  - regresaremos
  - volveremos otra vez
  lexicon: HALOT
  rationale: El sentido básico es «volver/retornar». En contexto, se refiere a volver para reconstruir; «volveremos» es natural y fiel.
- source_word: וְנִבְנֶה חֳרָבוֹת
  english_pob_choice: and rebuild the ruins
  chosen_spanish: reconstruiremos las ruinas
  alternatives_spanish:
  - edificaremos las ruinas
  - reconstruiremos los lugares devastados
  - reconstruiremos los escombros
  lexicon: HALOT
  rationale: «Reconstruiremos» conserva el prefijo de restauración implícito en el contexto, y «las ruinas» representa adecuadamente חֳרָבוֹת en español idiomático.
- source_word: יְהוָה צְבָא֔וֹת
  english_pob_choice: Yahweh of Armies
  chosen_spanish: Yahvé de los Ejércitos
  alternatives_spanish:
  - Yahvé de los ejércitos
  - Yahvé de las huestes
  lexicon: HALOT
  rationale: Se mantiene «Yahvé» por la convención del proyecto para יהוה. צְבָאוֹת se traduce con el plural «de los Ejércitos» para reflejar el sentido marcial y el título divino.
- source_word: הֵ֥מָּה יִבְנ֖וּ
  english_pob_choice: They may build
  chosen_spanish: Ellos edificarán
  alternatives_spanish:
  - Ellos podrían edificar
  - Aunque edifiquen
  - Sí, edificarán
  lexicon: HALOT
  rationale: El hebreo admite lectura predictiva; el texto inglés preserva la tensión entre su intento y la respuesta divina. En español, «edificarán» mantiene esa posibilidad sin forzar una modalidad que el original no exige de manera exclusiva.
- source_word: וַאֲנִ֣י אֶהֱר֑וֹס
  english_pob_choice: but I will tear down
  chosen_spanish: pero yo derribaré
  alternatives_spanish:
  - y yo derribaré
  - pero yo destruiré
  - y yo destruiré
  lexicon: HALOT
  rationale: «Derribaré» corresponde bien al contraste con «edificarán» y preserva el verbo de demolición. «Pero» expresa la oposición enfática del pronombre independiente y la contraposición contextual.
- source_word: וְקָרְא֤וּ לָ/הֶם֙
  english_pob_choice: and they will be called
  chosen_spanish: y los llamarán
  alternatives_spanish:
  - y serán llamados
  - y se les llamará
  lexicon: HALOT
  rationale: El hebreo usa una construcción impersonal. En español, «los llamarán» conserva bien la lectura general e impersonal sin sonar forzado.
- source_word: גְּב֣וּל רִשְׁעָ֔ה
  english_pob_choice: the territory of wickedness
  chosen_spanish: territorio de maldad
  alternatives_spanish:
  - límite de maldad
  - frontera de maldad
  - territorio de impiedad
  lexicon: HALOT
  rationale: «גבול» puede ser territorio o frontera. Se opta por «territorio» para transmitir una designación territorial; «maldad» mantiene la valoración moral de רִשְׁעָה con naturalidad en español.
- source_word: וְ/הָ/עָ֛ם אֲשֶׁר זָעַ֥ם יְהוָ֖ה
  english_pob_choice: the people with whom Yahweh is indignant
  chosen_spanish: el pueblo contra quien Yahvé está indignado
  alternatives_spanish:
  - el pueblo con quien Yahvé está indignado
  - el pueblo sobre quien Yahvé está indignado
  - el pueblo al que Yahvé tiene indignación
  lexicon: HALOT
  rationale: זעם expresa indignación/ira. «Contra quien» refleja mejor el blanco relacional de esa indignación que una simple relación neutral con «con quien».
- source_word: עַד עוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - para toda la eternidad
  - por siempre
  - eternamente
  lexicon: HALOT
  rationale: «Para siempre» es la equivalencia natural en español y conserva la duración indefinida del juicio/divina indignación.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El proyecto indica Yahvé para יהוה en español. Se evita la convención de ocultarlo con «SEÑOR» para mantener transparencia y coherencia con la base source-grounded.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Traducción de צְבָאוֹת en el título divino
  english_pob_reading: of Armies
  chosen_spanish_reading: de los Ejércitos
  alternative_spanish_readings:
  - de los ejércitos
  - de las huestes
  rationale: Se traduce el título para conservar su sentido semántico y su fuerza bélica/celestial. «De los Ejércitos» mantiene dignidad bíblica y transparencia semántica.
  doctrine_reference: Translation philosophy §§2, 6
- issue: Valor de הֵמָּה יִבְנ֖וּ וַאֲנִי אֶהֱר֑וֹס
  english_pob_reading: 'concessive-adversative: ''They may build, but I will tear down'''
  chosen_spanish_reading: 'predictivo-adversativa: «Ellos edificarán, pero yo derribaré»'
  alternative_spanish_readings:
  - 'concesiva: «Aunque edifiquen, yo derribaré»'
  - «Podrán edificar, pero yo derribaré»
  rationale: El hebreo permite lectura predictiva y el contexto resalta la inutilidad de la reconstrucción frente al decreto divino. En español, la forma futura simple preserva la tensión sin introducir una modalidad explícita que no está obligada por el texto.
  doctrine_reference: Apoyo en el audit trail inglés y la morfología hebrea
translation_notes:
  revision_awareness: Se ha seguido el audit trail inglés, incluyendo la revisión que prefirió «indignant forever» frente a «angry forever» para זָעַם. También se tuvo en cuenta la lectura concesiva/predictiva del primer hemistiquio y la elección de un título divino traducido. La redacción española conserva la tensión entre la autoafirmación de Edom, la respuesta soberana de Yahvé y la denominación duradera de esa región/pueblo.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יהוה.
  - Se traduce צְבָאוֹת como «de los Ejércitos» siguiendo el criterio del proyecto y la audibilidad semántica.
  - Se mantiene «territorio de maldad» sin suavizar רִשְׁעָה a un término menos fuerte.
  - Se conserva el contraste enfático con «pero yo derribaré».
  - 'La puntuación reproduce el flujo profético: afirmación de Edom, oráculo divino y denominación final.'
