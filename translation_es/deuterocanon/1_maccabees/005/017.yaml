translation:
  language: es
  text: 'Y Judas dijo a Simón, su hermano: «Elige para ti hombres, y ve y rescata a tus hermanos en Galilea; pero Jonatán, mi hermano, y yo iremos a Gileaditis[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a Galaad». El griego nombra la región como «Gileaditis», una forma regional más específica.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐπίλεξον
  english_pob_choice: Choose
  chosen_spanish: Elige
  alternatives_spanish:
  - Escoge
  - Selecciona
  lexicon: LSJ
  rationale: El imperativo aoristo pide una acción directa y puntual. «Elige» transmite la orden con naturalidad en español y conserva el tono exhortativo sin endurecer el estilo.
- source_word: σεαυτῷ
  english_pob_choice: for yourself
  chosen_spanish: para ti
  alternatives_spanish:
  - para ti mismo
  - para tu propia misión
  lexicon: LSJ
  rationale: El dativo reflexivo indica asignación personal de la tarea. «Para ti» mantiene esa referencia sin sobrecargar la frase.
- source_word: ἄνδρας
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - soldados
  - combatientes
  lexicon: LSJ
  rationale: El griego dice literalmente «hombres». Aunque el contexto es militar, no añade aquí el término «soldados»; por eso se conserva la forma directa.
- source_word: πορεύου
  english_pob_choice: go
  chosen_spanish: ve
  alternatives_spanish:
  - anda
  - parte
  lexicon: LSJ
  rationale: El imperativo de πορεύομαι pide ir o ponerse en camino. «Ve» es breve, natural y fiel al mandato.
- source_word: ῥῦσαι
  english_pob_choice: rescue
  chosen_spanish: rescata
  alternatives_spanish:
  - libra
  - sálvalos
  lexicon: LSJ
  rationale: En este contexto de peligro militar, «rescata» expresa una liberación activa y concreta, como el inglés POB «rescue».
- source_word: τοὺς ἀδελφούς σου
  english_pob_choice: your brothers
  chosen_spanish: a tus hermanos
  alternatives_spanish:
  - a tus hermanos de sangre
  - a tus parientes
  lexicon: LSJ
  rationale: Se conserva el lenguaje de parentesco del griego. En 1 Macabeos puede abarcar a los compatriotas, pero el texto usa directamente «hermanos».
- source_word: ἐν τῇ Γαλιλαίᾳ
  english_pob_choice: in Galilee
  chosen_spanish: en Galilea
  alternatives_spanish:
  - en la Galilea
  - en esa región de Galilea
  lexicon: LSJ
  rationale: La frase locativa se traduce de forma simple y natural con el nombre geográfico habitual en español.
- source_word: ἐγὼ δὲ καὶ Ἰωναθὰν ὁ ἀδελφός μου
  english_pob_choice: but I and Jonathan my brother
  chosen_spanish: pero yo y Jonatán, mi hermano
  alternatives_spanish:
  - y yo con Jonatán, mi hermano
  - pero Jonatán, mi hermano, y yo
  lexicon: LSJ
  rationale: Se conserva el contraste de δέ con «pero» y la coordinación del griego sin reordenarla excesivamente, manteniendo la división de tareas entre los hermanos.
- source_word: πορευσόμεθα
  english_pob_choice: will go
  chosen_spanish: iremos
  alternatives_spanish:
  - nos pondremos en camino
  - partiremos
  lexicon: LSJ
  rationale: El futuro medio de πορεύομαι se vierte de forma natural con «iremos», que comunica intención futura sin perder el sentido de desplazamiento.
- source_word: εἰς τὴν Γαλααδῖτιν
  english_pob_choice: into Gileaditis
  chosen_spanish: a la Gileaditis
  alternatives_spanish:
  - a Gileaditis
  - a la región de Gilead
  lexicon: LSJ
  rationale: Se conserva la forma regional específica del griego, como hace el POB inglés con «Gileaditis», en vez de nivelarla a «Galaad».
translation_notes:
  revision_awareness: 'El pasaje coincide con la revisión más reciente: no se requieren cambios respecto del contexto auditado en inglés; se mantiene la distinción geográfica entre Galilea y Gileaditis/Galaad.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «hermanos» para reproducir el parentesco literal del griego, siguiendo el criterio del POB inglés.
  - Se conserva la distinción topográfica entre «Galilea» y «Gileaditis», con nota alternativa para «Galaad».
