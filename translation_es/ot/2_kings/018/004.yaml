base_translation:
  language: en
  yaml_path: translation/ot/2_kings/018/004.yaml
  text: He removed the high places[a], shattered the pillars, cut down the Asherah, and crushed to pieces the bronze serpent that Moses had made, because until those days the sons of Israel had been burning incense to it[c][b]; and it was called Nehushtan.
  footnotes:
  - marker: a
    text: Or 'cut down the Asherah pole' or 'cut down the sacred pole.'
    reason: lexical_alternative
  - marker: b
    text: Nehushtan is likely a wordplay on 'bronze' and may mean something like 'a mere piece of bronze.'
    reason: cultural_note
  - marker: c
    text: Or 'he called it Nehushtan.' The Hebrew does not make the subject explicit in a way that must be carried over into English.
    reason: alternative_reading
