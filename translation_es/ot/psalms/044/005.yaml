lexical_decisions:
- source_word: אַתָּה הוּא
  english_pob_choice: You are
  chosen_spanish: Tú eres
  alternatives_spanish:
  - Tú mismo eres
  - Eres tú quien eres
  lexicon: HALOT
  rationale: El hebreo usa pronombre explícito más pronombre independiente para dar énfasis. En español, «Tú eres» comunica con naturalidad ese énfasis sin recargar la línea.
- source_word: מַלְכִּי
  english_pob_choice: my King
  chosen_spanish: mi Rey
  alternatives_spanish:
  - mi rey
  lexicon: HALOT
  rationale: 'El sufijo de primera persona expresa posesión: «mi Rey». La mayúscula mantiene el valor titular cuando se dirige a Dios, siguiendo el sentido del inglés POB sin imponer formulación litúrgica adicional.'
- source_word: אֱלֹהִים
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  lexicon: HALOT
  rationale: Aquí funciona como vocativo. «Oh Dios» reproduce la dirección orante y mantiene la fuerza poética del hebreo.
- source_word: צַוֵּה
  english_pob_choice: command
  chosen_spanish: ordena
  alternatives_spanish:
  - comanda
  - decreta
  - dispón
  lexicon: HALOT
  rationale: El imperativo de piel de צוה significa ordenar o mandar. «Ordena» es claro, directo y natural en español; evita la posible dureza de «comanda» y la mayor interpretatividad de «decreta».
- source_word: יְשׁוּעוֹת
  english_pob_choice: victories
  chosen_spanish: victorias
  alternatives_spanish:
  - salvaciones
  - liberaciones
  - victorias de rescate
  lexicon: HALOT
  rationale: El plural puede referirse a actos de salvación o liberación. En este salmo de conflicto nacional, «victorias» expresa el resultado concreto de esos actos sin perder del todo el campo semántico de rescate.
- source_word: יַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Israel
  lexicon: HALOT
  rationale: El texto hebreo dice «Jacob» y conviene conservar ese nombre poético-covenantal en lugar de sustituirlo por la equivalencia interpretativa «Israel».
theological_decisions:
- issue: Sentido de יְשׁוּעוֹת en un salmo militar
  english_pob_reading: Rendered as 'victories' to reflect concrete military deliverance.
  chosen_spanish_reading: «victorias» para reflejar liberación concreta en contexto de guerra
  alternative_spanish_readings:
  - salvaciones
  - liberaciones
  rationale: El contexto del salmo apunta a enemigos y conflicto. Por eso, la idea no es una salvación abstracta, sino actos históricos de rescate y triunfo. «Victorias» comunica ese matiz sin negar la base de liberación.
  doctrine_reference: Translation philosophy §1, §5
- issue: Estructura vocativa con אֱלֹהִים
  english_pob_reading: 'Treated אֱלֹהִים as vocative: ''O God.'''
  chosen_spanish_reading: 'Tratado como vocativo: «oh Dios»'
  alternative_spanish_readings:
  - mi Rey Dios
  - mi Rey es Dios
  rationale: 'La sintaxis más natural es una oración directa a Dios: «Tú eres mi Rey, oh Dios». Esto conserva el tono devocional y evita una lectura menos fluida o más explicativa de la línea.'
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo masorético y el audit trail inglés: conserva el vocativo a Dios, mantiene «Jacob» como nombre poético del pueblo y resuelve יְשׁוּעוֹת con una opción contextual («victorias») ya defendida en el registro inglés.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים en vocativo, no «Señor», porque el hebreo no usa el tetragrámaton aquí.
  - «Mi Rey» con mayúscula conserva el valor titular aplicado a Dios sin añadir terminología eclesiástica ajena al texto.
  - 'La puntuación sigue la estructura poética: afirmación, vocativo y mandato en una sola línea breve.'
