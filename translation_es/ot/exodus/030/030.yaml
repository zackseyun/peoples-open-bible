translation:
  language: es
  text: Y ungirás a Aarón y a sus hijos, y los consagrarás para servirme como sacerdotes.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: תִּמְשָׁח
  english_pob_choice: you shall anoint
  chosen_spanish: ungirás
  alternatives_spanish:
  - deberás ungir
  - has de ungir
  lexicon: HALOT
  rationale: El verbo משׁח designa la unción ritual con aceite para comisión sagrada. «Ungirás» conserva el acto ritual y la fuerza cultual del hebreo sin añadir paráfrasis.
- source_word: וְקִדַּשְׁתָּ
  english_pob_choice: and you shall consecrate
  chosen_spanish: y los consagrarás
  alternatives_spanish:
  - y los santificarás
  - y los apartarás como santos
  lexicon: HALOT
  rationale: קדשׁ en pi‘el aquí expresa poner aparte para un oficio santo. «Consagrarás» es natural en español para la instalación sacerdotal y mantiene el sentido de separación para uso sagrado.
- source_word: לְכַהֵן
  english_pob_choice: to serve as priests
  chosen_spanish: para que ejerzan el sacerdocio
  alternatives_spanish:
  - para ministrar como sacerdotes
  - para oficiar como sacerdotes
  lexicon: HALOT
  rationale: כהן como verbo señala la función sacerdotal. «Ejerzan el sacerdocio» comunica la actividad y el cargo sin crear un giro poco natural como «sacerdotear».
- source_word: לִי
  english_pob_choice: to me
  chosen_spanish: para mí
  alternatives_spanish:
  - a mí
  - en mi servicio
  lexicon: HALOT
  rationale: La preposición con sufijo de primera persona marca dirección del servicio hacia Yahvé. «Para mí» refleja bien esa orientación en español y encaja con la fórmula cultual.
- source_word: בָּנָיו
  english_pob_choice: his sons
  chosen_spanish: a sus hijos
  alternatives_spanish:
  - a sus hijos varones
  - a sus descendientes
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «sus hijos», el contexto sacerdotal especifica la línea masculina. En español «hijos» es el equivalente más directo y natural aquí; «hijos varones» añadiría explicitación no presente en la forma nominal.
- source_word: וְאֶת ... וְאֶת
  english_pob_choice: Aaron and his sons
  chosen_spanish: a Aarón y a sus hijos
  alternatives_spanish:
  - a Aarón y a sus hijos también
  lexicon: HALOT
  rationale: Los marcadores de objeto directo repetidos señalan ambos complementos coordinados. En español se expresa con la preposición «a» ante personas, manteniendo la coordinación simple y fiel.
theological_decisions:
- issue: Lenguaje de instalación sacerdotal en קדשׁ + כהן
  english_pob_reading: 'Render the verse in priestly-installation language: ''consecrate'' and ''serve as priests.'''
  chosen_spanish_reading: «consagrarás» y «para que ejerzan el sacerdocio»
  alternative_spanish_readings:
  - «santificarás» y «para que ministren como sacerdotes»
  - «los harás santos» y «para que oficien como sacerdotes»
  rationale: El texto trata de apartar a Aarón y a sus hijos para un oficio sagrado. La combinación elegida conserva el registro cultual sin introducir lenguaje eclesiástico ajeno al hebreo.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Línea masculina de Aarón en בָּנָיו
  english_pob_reading: '''his sons'''
  chosen_spanish_reading: «sus hijos»
  alternative_spanish_readings:
  - «sus hijos varones»
  - «sus descendientes»
  rationale: El hebreo es masculino y el contexto sacerdotal apunta a los varones de la familia de Aarón. «Sus hijos» mantiene fidelidad literal y deja que el contexto determine el alcance.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: La revisión más reciente indicó alto acuerdo y sin cambios necesarios; esta propuesta sigue ese consenso y mantiene la equivalencia óptima del POB en un español público, claro y reverente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» según la convención del proyecto cuando el texto contextual remite al nombre divino, aunque en este versículo no aparece explícitamente en la superficie hebrea.
  - Se evita «señor» o «sacerdotes» como sustitutos no motivados; «sacerdocio» conserva el matiz institucional del verbo כהן.
  - La coordinación con «a» en español refleja los dos objetos directos del hebreo sin duplicación innecesaria.
