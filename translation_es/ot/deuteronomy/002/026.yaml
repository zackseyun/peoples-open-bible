translation:
  language: es
  text: 'Entonces envié mensajeros desde el desierto de Quedemot a Sehón, rey de Hesbón, con palabras de paz[a], diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con términos de paz». El hebreo dice literalmente «palabras de paz», una expresión idiomática para una propuesta diplomática pacífica.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶשְׁלַח
  english_pob_choice: So I sent
  chosen_spanish: Así que envié
  alternatives_spanish:
  - Entonces envié
  - Y envié
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutiva expresa secuencia en primera persona; «Así que» reproduce el avance discursivo natural en español sin perder el valor consecutivo.
- source_word: מַלְאָכִים
  english_pob_choice: messengers
  chosen_spanish: mensajeros
  alternatives_spanish:
  - enviados
  - embajadores
  lexicon: HALOT
  rationale: El contexto es diplomático y humano; «mensajeros» conserva el sentido básico sin introducir un título político más técnico que el hebreo no exige aquí.
- source_word: מִמִּדְבַּר קְדֵמוֹת
  english_pob_choice: from the wilderness of Kedemoth
  chosen_spanish: desde el desierto de Quedemot
  alternatives_spanish:
  - desde el desierto de Kedemot
  - desde el desierto de Kedemot
  lexicon: HALOT
  rationale: «מִדְבָּר» puede ser «desierto» o «estepa/wilderness»; en español bíblico «desierto» es claro y natural. El topónimo se translitera como Quedemot para mantener la forma nominal propia del lugar.
- source_word: סִיחוֹן מֶלֶךְ חֶשְׁבּוֹן
  english_pob_choice: to Sihon king of Heshbon
  chosen_spanish: a Sehón, rey de Hesbón
  alternatives_spanish:
  - a Sehón, el rey de Hesbón
  - a Sijón, rey de Hesbón
  lexicon: HALOT
  rationale: 'Los nombres propios se adaptan a la tradición hispana habitual: Sehón y Hesbón. El appositive real se mantiene directo, sin añadir artículo innecesario.'
- source_word: דִּבְרֵי שָׁלוֹם
  english_pob_choice: with words of peace
  chosen_spanish: con palabras de paz
  alternatives_spanish:
  - con términos de paz
  - con mensajes de paz
  lexicon: HALOT
  rationale: La expresión literal «palabras de paz» se conserva porque el hebreo usa un giro idiomático de iniciativa diplomática pacífica. «Palabras» mantiene la imagen verbal y el sustantivo de base.
- source_word: לֵאמֹר
  english_pob_choice: saying,
  chosen_spanish: 'diciendo:'
  alternatives_spanish:
  - 'para decir:'
  - 'y dijo:'
  lexicon: HALOT
  rationale: Es la fórmula introductoria de discurso directo; «diciendo:» es la solución española más natural y marca la continuación de la cita.
translation_notes:
  revision_awareness: 'El texto hebreo y el audit trail inglés coinciden estrechamente: acción narrativa en primera persona, envío de mensajeros humanos, procedencia geográfica, destinatario identificado por nombre propio y título real, y la expresión idiomática דִּבְרֵי שָׁלוֹם. No se registran revisiones aplicadas; se mantiene la lectura equivalente de alta concordancia.'
  spanish_consistency_notes:
  - Se mantiene el uso de topónimos y nombres propios en forma española tradicional cuando es estable (Sehón, Hesbón) y transliteración adaptada para el topónimo menos asentado (Quedemot).
  - «Mensajeros» se conserva para el contexto humano-diplomático, evitando «ángeles».
  - «Palabras de paz» se traduce de modo literal con nota, para no perder la idiomaticidad hebrea documentada por el POB inglés.
