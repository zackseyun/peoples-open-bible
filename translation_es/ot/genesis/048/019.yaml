revisions:
- from: 'Pero su padre se negó y dijo: «Yo sé, hijo mío, yo sé. También él llegará a ser un pueblo, y también él será grande. Sin embargo, su hermano menor será más grande que él, y su descendencia será la plenitud[a] de las naciones».'
  to: 'Pero su padre se negó y dijo: «Yo sé, hijo mío, yo sé. También él llegará a ser un pueblo, y también él llegará a ser grande. Sin embargo, su hermano menor llegará a ser más grande que él, y su descendencia será la plenitud[a] de naciones».'
  rationale: Se ajustan los verbos relacionados con גדל para conservar el matiz de devenir documentado en el POB inglés, y se suaviza la expresión final a un español más natural y mejor alineado con la nota léxica, sin perder la literalidad deseada de מְלֹא.
