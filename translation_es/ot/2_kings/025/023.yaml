  text: 'When all the commanders of the forces[a], they and their men, heard that the king of Babylon had appointed Gedaliah, they came to Gedaliah at Mizpah: Ishmael son of Nethaniah, and Johanan son of Kareah, and Seraiah son of Tanhumeth the Netophathite, and Jaazaniah son of the Maacathite, they and their men.'
  footnotes:
