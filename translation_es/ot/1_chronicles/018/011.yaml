revisions:
- from: 'El rey David también dedicó[a] esto a Yahvé, junto con la plata y el oro que había tomado de todas las naciones: de Edom, de Moab, de los amonitas[b], de los filisteos y de Amalec.'
  to: 'El rey David también dedicó estas cosas[a] a Yahvé, junto con la plata y el oro que había tomado[b] de todas las naciones: de Edom, de Moab, de los amonitas[c], de los filisteos y de Amalec.'
  rationale: Se corrige «esto» a «estas cosas» para reflejar mejor el plural anafórico de אֹתָם y armonizar con el referente del versículo anterior. Se añade la nota léxica sobre «había tomado» para conservar la decisión documentada sobre נָשָׂא. El resto del texto se mantiene por ser fiel, claro y bien alineado con la terminología del proyecto.
