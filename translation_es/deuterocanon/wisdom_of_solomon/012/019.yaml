review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del griego: enseñanza por medio de tales obras, necesidad moral para «el justo», esperanza dada a «tus hijos» y la iniciativa divina en conceder arrepentimiento por los pecados. Sin embargo, dos elecciones no preservan bien el sentido lexical documentado: «humano» para φιλάνθρωπον suena demasiado amplio/antropológico en español y no comunica claramente benevolencia hacia otros; y la nota [b] altera el tipo de alternativa preservada en la auditoría inglesa, que era sobre «sons/children», no sobre «full of good hope».'
  spanish_quality_summary: El texto es en general legible y digno, pero «el justo debe ser humano» resulta poco natural y semánticamente débil en español bíblico; puede sugerir simplemente «ser humano» en contraste con divino o cruel, en vez de «benévolo con las personas». «Llenaste de buena esperanza a tus hijos» sí es claro y natural. La frase final mejora con «concedes arrepentimiento» frente a «das arrepentimiento», que es comprensible pero menos idiomática en español formal.
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. «Arrepentimiento» para μετάνοια concuerda con la pauta contextual. «Hijos» puede mantenerse en el texto principal, ya que el griego dice υἱούς, pero debe explicarse en nota la posible lectura representativa «hijos/children», no reemplazarse por una nota sobre εὐέλπιδας.
  issues:
  - severity: high
    issue: «humano» para φιλάνθρωπον
    rationale: Aunque calca superficialmente «humane», en español «humano» no expresa de manera fiable la idea de benevolencia hacia las personas; el griego apunta a ser bondadoso/benévolo con los demás.
  - severity: medium
    issue: La nota [b] no corresponde a la evidencia auditada
    rationale: La auditoría inglesa conserva una nota sobre «your sons» como posible referencia representativa a los hijos/pueblo de Dios. El borrador en cambio pone una nota sobre «llenos de buena esperanza», que no es la alternativa documentada que requiere preservación.
  - severity: low
    issue: «das arrepentimiento» es menos idiomático que «concedes» u «otorgas»
    rationale: El sentido fuente es correcto, pero en español eclesial y natural suena más fluido «concedes arrepentimiento por los pecados», manteniendo igual la iniciativa divina.
  revised_spanish_text: Pero por tales obras enseñaste a tu pueblo que el justo debe ser benévolo con las personas[a], y llenaste de buena esperanza a tus hijos[b], porque concedes arrepentimiento por los pecados.
  revised_footnotes:
  - marker: a
    text: 'O: «el justo debe ser humano».'
    reason: lexical_alternative
  - marker: b
    text: «Tus hijos» puede entenderse de manera representativa como los hijos o el pueblo de Dios, pero el griego dice específicamente «hijos».
    reason: lexical_alternative
  revision_rationale: Se sustituyó «humano» por «benévolo con las personas» para comunicar con claridad el valor de φιλάνθρωπον en español. Se mantuvo «tus hijos» en el texto principal por fidelidad a υἱούς y se corrigió la nota para reflejar la alternativa representativa documentada en la auditoría inglesa. Se ajustó «das arrepentimiento» a «concedes arrepentimiento» por mayor naturalidad sin cambiar el sentido teológico.
