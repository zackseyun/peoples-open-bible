translation:
  language: es
  text: Ungirás la fuente y su soporte[a], y la consagrarás[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «base».
    reason: lexical_alternative
  - marker: b
    text: O «la harás santa» / «la santificarás».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמָשַׁחְתָּ
  english_pob_choice: you shall anoint
  chosen_spanish: Ungirás
  alternatives_spanish:
  - y ungirás
  - deberás ungir
  lexicon: HALOT
  rationale: משׁח en contexto ritual se refiere a ungir con aceite para apartar un objeto al servicio sagrado. En español, «ungir» conserva ese sentido técnico y es transparente para una audiencia eclesial amplia.
- source_word: הַכִּיֹּר
  english_pob_choice: the basin
  chosen_spanish: la fuente
  alternatives_spanish:
  - el lavatorio
  - la pileta
  lexicon: HALOT
  rationale: כִּיּוֹר designa el recipiente de lavado del tabernáculo. En español bíblico-litúrgico, «fuente» comunica bien la pieza de mobiliario sin sonar tan técnico como «laver»; evita además una palabra demasiado moderna o doméstica.
- source_word: כַנּוֹ
  english_pob_choice: its stand
  chosen_spanish: su base
  alternatives_spanish:
  - su soporte
  - su pedestal
  lexicon: HALOT
  rationale: כֵּן aquí indica la parte inferior de apoyo de la fuente. «Base» mantiene la relación estructural y corresponde a la alternativa inglesa documentada.
- source_word: וְקִדַּשְׁתָּ אֹתוֹ
  english_pob_choice: and consecrate it
  chosen_spanish: la consagrarás
  alternatives_spanish:
  - la santificarás
  - la harás santa
  lexicon: HALOT
  rationale: קדשׁ en este contexto cultual significa apartar algo para uso sagrado. «Consagrar» reproduce bien ese valor ritual en español y evita una lectura moralizante.
theological_decisions:
- issue: Traducción de קדשׁ en contexto cultual del tabernáculo
  english_pob_reading: and consecrate it / make it holy / sanctify it
  chosen_spanish_reading: y la consagrarás
  alternative_spanish_readings:
  - y la santificarás
  - y la harás santa
  rationale: 'La acción es ceremonial: dejar el objeto apartado para Yahvé. «Consagrar» preserva el matiz de dedicación sagrada sin importar una transformación ética del objeto.'
  doctrine_reference: Éxodo 40:11; uso cultual de קדשׁ
translation_notes:
  revision_awareness: 'El inglés POB final eliminó la repetición de «you shall» antes de «consecrate». En español, la elipsis verbal natural se conserva con una sola forma futura coordinada: «Ungirás... y la consagrarás». También se preservó la relación objeto-pronombre en singular, entendiendo la fuente y su base como una unidad funcional.'
  spanish_consistency_notes:
  - Se prefirió «Yahvé» implícitamente en el contexto del libro, pero este versículo no contiene el nombre divino.
  - «Fuente» se usa aquí para el כִּיּוֹר ritual; en otros contextos podría variar según la pieza de mobiliario.
  - Se mantuvo el singular pronominal «la» para reflejar la unidad ritual del conjunto fuente-base.
