translation:
  language: es
  text: Y daré paz en la tierra, y ustedes se acostarán sin que nadie los haga temer. Y quitaré de la tierra las bestias dañinas[a], y la espada[b] no pasará por su tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘bestias salvajes’. La expresión hebrea se refiere a animales peligrosos en la tierra; ‘bestias dañinas’ hace explícito el sentido amenazante del adjetivo.
    reason: lexical_alternative
  - marker: b
    text: ‘La espada’ es una figura hebrea para la guerra o la invasión armada.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי
  english_pob_choice: And I will give
  chosen_spanish: Y daré
  alternatives_spanish:
  - Y concederé
  - Y pondré
  lexicon: HALOT
  rationale: נתן normalmente significa ‘dar’. En este contexto de bendición de pacto, ‘daré’ expresa de manera directa y natural la acción de Yahvé al otorgar paz.
- source_word: שָׁלוֹם
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - bienestar
  - plenitud
  lexicon: HALOT
  rationale: שָׁלוֹם abarca paz, bienestar y seguridad. Aquí ‘paz’ comunica bien la estabilidad y seguridad del pacto, y permite incluir el sentido más amplio por implicación.
- source_word: בָּאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - en la región
  lexicon: HALOT
  rationale: אֶרֶץ se refiere a la tierra del pacto. ‘En la tierra’ conserva ese sentido territorial concreto y es natural en español bíblico actual.
- source_word: וּשְׁכַבְתֶּם
  english_pob_choice: and you will lie down
  chosen_spanish: y ustedes se acostarán
  alternatives_spanish:
  - y ustedes se tenderán
  - y ustedes dormirán
  lexicon: HALOT
  rationale: שׁכב significa literalmente ‘acostarse / echarse’. ‘Se acostarán’ conserva la imagen de reposo seguro sin convertirla prematuramente en ‘dormirán’.
- source_word: וְאֵין מַחֲרִיד
  english_pob_choice: with no one making you afraid
  chosen_spanish: sin que nadie los espante
  alternatives_spanish:
  - sin que nadie les cause temor
  - sin que haya quien los haga temer
  lexicon: HALOT
  rationale: מַחֲרִיד designa a quien causa terror o miedo. ‘Sin que nadie los espante’ reproduce bien la fuerza causativa en un español natural, sin debilitar el sentido de seguridad.
- source_word: וְהִשְׁבַּתִּי
  english_pob_choice: And I will remove
  chosen_spanish: Y eliminaré
  alternatives_spanish:
  - Y haré cesar
  - Y pondré fin a
  lexicon: HALOT
  rationale: 'El hiphil de שׁבת es ‘hacer cesar’. ‘Eliminaré’ comunica el resultado en contexto: las bestias peligrosas dejarán de estar presentes en la tierra.'
- source_word: חַיָּה רָעָה
  english_pob_choice: harmful beasts
  chosen_spanish: las bestias dañinas
  alternatives_spanish:
  - las bestias peligrosas
  - las fieras dañinas
  - las fieras salvajes
  lexicon: HALOT
  rationale: חַיָּה es ‘bestia / animal’, y רָעָה aquí califica el peligro causado, no una maldad moral. ‘Bestias dañinas’ mantiene esa fuerza amenazante sin moralizar el adjetivo.
- source_word: מִן הָאָרֶץ
  english_pob_choice: from the land
  chosen_spanish: de la tierra
  alternatives_spanish:
  - fuera de la tierra
  - de en medio de la tierra
  lexicon: HALOT
  rationale: La preposición מִן se rinde de forma sencilla con ‘de’. ‘De la tierra’ conserva el foco territorial del versículo.
- source_word: וְחֶרֶב
  english_pob_choice: and the sword
  chosen_spanish: y la espada
  alternatives_spanish:
  - y la guerra
  - y un arma
  lexicon: HALOT
  rationale: חֶרֶב significa literalmente ‘espada’ y suele funcionar como figura para guerra o invasión armada. Mantener ‘la espada’ preserva la imagen hebrea.
- source_word: לֹא תַעֲבֹר
  english_pob_choice: will not pass through
  chosen_spanish: no pasará
  alternatives_spanish:
  - no atravesará
  - no cruzará
  lexicon: HALOT
  rationale: עבר significa ‘pasar / atravesar’. ‘No pasará’ es la formulación más natural en español y transmite la idea de una incursión hostil impedida.
- source_word: בְּאַרְצְכֶם
  english_pob_choice: your land
  chosen_spanish: por su tierra
  alternatives_spanish:
  - por su país
  - por la tierra de ustedes
  lexicon: HALOT
  rationale: El sufijo posesivo se refiere al pueblo del pacto. ‘Su tierra’ en contexto plural de segunda persona mantiene la posesión colectiva y fluye mejor en español que una repetición explícita de ‘de ustedes’.
theological_decisions:
- issue: Alcance de la paz prometida
  english_pob_reading: The verse promises covenantal security in Israel's land, including freedom from fear, dangerous animals, and military invasion.
  chosen_spanish_reading: El versículo promete seguridad de pacto en la tierra, con ausencia de miedo, de bestias dañinas y de invasión armada.
  alternative_spanish_readings:
  - Una paz solo interior o espiritual
  - Una paz exclusivamente política
  rationale: Las referencias concretas a acostarse con seguridad, a la remoción de bestias dañinas y al paso de la espada muestran que la promesa es integral y materialmente anclada, no reducible a una paz meramente interior ni solo política.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La redacción sigue el texto hebreo y el cierre de revisión del POB inglés, que ajustó la segunda cláusula a una formulación más natural sin cambiar el sentido; en español se reflejó ese mismo equilibrio entre literalidad y naturalidad.
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ implícito en la primera persona divina sin añadirlo al texto porque el hebreo usa la forma verbal en primera persona.
  - Se conservó la imagen de ‘la espada’ como figura metonímica de guerra o invasión armada, en línea con el audit trail inglés.
  - Se eligió ‘tierra’ para אֶרֶץ por su valor de tierra del pacto, evitando ‘país’ por ser menos preciso en este contexto bíblico.
