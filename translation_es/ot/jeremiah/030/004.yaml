translation:
  language: es
  text: Y estas son las palabras que Yahvé habló a Israel y a Judá[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre Israel y Judá». La preposición hebrea puede traducirse más literalmente «a Israel y a Judá», pero aquí también puede introducir palabras acerca de ambos pueblos.
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/אֵלֶּה
  english_pob_choice: And these
  chosen_spanish: Y estas
  alternatives_spanish:
  - Y estas son
  - Estas
  lexicon: HALOT
  rationale: Se conserva la conexión discursiva del וְ con «Y», y el demostrativo plural se expresa naturalmente como «estas». En español, la cópula puede omitirse o explicitarse; aquí se incluye implícitamente en la frase nominal para mantener fluidez sin perder la estructura introductoria.
- source_word: הַ/דְּבָרִים
  english_pob_choice: the words
  chosen_spanish: las palabras
  alternatives_spanish:
  - las palabras
  - los dichos
  - los asuntos
  lexicon: HALOT
  rationale: דְּבָרִים puede significar «palabras» o «asuntos», pero en una fórmula profética introductoria el sentido de discurso comunicado es primario. «Palabras» comunica bien la referencia a lo dicho por Yahvé y es plenamente natural en español.
- source_word: דִּבֶּר
  english_pob_choice: spoke to
  chosen_spanish: habló
  alternatives_spanish:
  - habló a
  - dijo
  lexicon: HALOT
  rationale: El verbo דִּבֶּר se rinde de forma simple por «habló» para mantener la fuerza verbal directa. En español, el complemento preposicional se expresa con «a» después del verbo, lo que da la lectura natural «habló a Israel y a Judá».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: Nombre divino (Tetragrámaton)
  rationale: 'Se sigue la norma del proyecto para יְהוָה: «Yahvé». Esta forma preserva el nombre propio divino sin sustituirlo por un título, y es una opción estable y reconocible en español bíblico contemporáneo.'
- source_word: אֶל יִשְׂרָאֵל וְ/אֶל יְהוּדָה
  english_pob_choice: to Israel and Judah
  chosen_spanish: a Israel y a Judá
  alternatives_spanish:
  - a Israel y a Judá
  - para Israel y para Judá
  lexicon: HALOT
  rationale: La preposición אֶל se refleja con «a», la opción más directa y fiel en español. Aunque en este tipo de encabezado profético puede percibirse una referencia al contenido «sobre» Israel y Judá, el hebreo aquí marca recepción/destino del habla con אֶל; por eso se mantiene la dirección del discurso y se evita suavizarla con «concerning/sobre».
theological_decisions:
- issue: Uso del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: La lectura española sigue la decisión doctrinal y editorial del proyecto de transliterar el Tetragrámaton con un nombre propio del Dios del pacto. Se evita la sustitución por título, porque el texto hebreo contiene explícitamente el nombre divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de אֶל con Israel y Judá en una fórmula profética
  english_pob_reading: to Israel and Judah
  chosen_spanish_reading: a Israel y a Judá
  alternative_spanish_readings:
  - sobre Israel y Judá
  - para Israel y para Judá
  rationale: Se conserva la dirección sintáctica básica del hebreo. En este versículo, la frase funciona como encabezado de palabras dirigidas a los destinatarios nombrados; por ello se evita reinterpretar la preposición como «sobre» en el texto principal.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy over tradition'
translation_notes:
  revision_awareness: El texto sigue de cerca el último estado del audit trail inglés, pero mantiene la preposición direccional «a» en español como la opción más fiel al hebreo אֶל. Se conserva la nota alternativa para reflejar la tensión documentada entre una lectura más literal y una lectura de encabezado profético.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - Se usa «Judá» con ortografía española estándar para el nombre propio.
  - Se mantiene la estructura breve y formularia del hebreo sin añadir contenido interpretativo no documentado.
  - La nota al pie marca la alternativa literal de la preposición y su posible función contextual en el encabezado profético.
