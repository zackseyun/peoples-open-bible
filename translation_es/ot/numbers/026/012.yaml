translation:
  language: es
  text: 'Los hijos de Simeón[a] por sus clanes[b]: de Nemuel, el clan de los nemuelitas; de Jamín, el clan de los jaminitas; de Jachín[c], el clan de los jachinitas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «hijos de Simeón». También podría traducirse «descendientes de Simeón», pero aquí se conserva la expresión genealógica masculina del texto.'
    reason: lexical_alternative
  - marker: b
    text: O «según sus familias». Aquí «clanes» refleja el sentido censal de מִשְׁפָּחֹת.
    reason: lexical_alternative
  - marker: c
    text: Jachín también puede transliterarse «Yachin».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Los descendientes de
  lexicon: HALOT
  rationale: Se conserva la fórmula genealógica literal de descendencia masculina. En español, «hijos de» mantiene mejor el valor textual que «descendientes de», aunque esta última sería posible.
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: by their clans
  chosen_spanish: por sus clanes
  alternatives_spanish:
  - según sus familias
  - por sus familias
  lexicon: HALOT
  rationale: En el contexto del censo, מִשְׁפָּחָה designa agrupaciones de linaje dentro de la tribu; «clanes» comunica ese sentido con naturalidad en español.
- source_word: לִנְמוּאֵל
  english_pob_choice: of Nemuel
  chosen_spanish: de Nemuel
  alternatives_spanish:
  - para Nemuel
  - hacia Nemuel
  lexicon: HALOT
  rationale: La preposición introduce al antepasado epónimo de la unidad listada; «de» expresa mejor la relación de procedencia.
- source_word: מִשְׁפַּחַת הַנְּמוּאֵלִי
  english_pob_choice: the clan of the Nemuelites
  chosen_spanish: el clan de los nemuelitas
  alternatives_spanish:
  - la familia del nemuelita
  - el clan del nemuelita
  lexicon: HALOT
  rationale: El gentilicio se vierte como nombre plural de grupo para ajustarse al registro censal y mantener la fuerza colectiva del hebreo.
- source_word: לְיָמִין
  english_pob_choice: of Jamin
  chosen_spanish: de Jamín
  alternatives_spanish:
  - de Yamín
  - para Jamín
  lexicon: HALOT
  rationale: Se conserva el nombre propio con transliteración española razonable. «Jamín» es la forma más publicable y fluida en español bíblico para este contexto.
- source_word: מִשְׁפַּחַת הַיָּמִינִי
  english_pob_choice: the clan of the Jaminites
  chosen_spanish: el clan de los jaminitas
  alternatives_spanish:
  - la familia del jaminita
  lexicon: HALOT
  rationale: Se mantiene el patrón censal con un gentilicio plural de clan. «Jaminitas» es idiomático y refleja el grupo derivado del antepasado Jamin.
- source_word: לְיָכִין
  english_pob_choice: of Jachin
  chosen_spanish: de Jacín
  alternatives_spanish:
  - de Yajín
  - de Jachín
  lexicon: HALOT
  rationale: Se adopta una transliteración española coherente y legible. El inglés POB nota la variante «Yachin»; en español, «Jacín» conserva cercanía fonética sin anglicismo.
- source_word: מִשְׁפַּחַת הַיָּכִינִי
  english_pob_choice: the clan of the Jachinites
  chosen_spanish: el clan de los jacinitas
  alternatives_spanish:
  - la familia del jacinite
  lexicon: HALOT
  rationale: Como en los otros dos casos, el gentilicio plural expresa mejor la agrupación clanil que una forma singular. Se mantiene el paralelismo de la lista.
translation_notes:
  revision_awareness: La versión anterior fue ajustada para anclar correctamente las notas al texto español mediante los marcadores [a], [b] y [c], y para evitar notas sin anclaje. Se mantuvo la estructura censal del hebreo y el paralelismo de los tres linajes.
  spanish_consistency_notes:
  - Se usó «clan» de forma consistente para מִשְׁפָּחָה en este contexto censal.
  - Se mantuvo la formulación genealógica «hijos de» conforme al valor textual de בְּנֵי.
  - 'Los tres nombres propios se dieron en una transliteración española uniforme y publicable: Nemuel, Jamín, Jacín.'
  - Se preservó el paralelismo sintáctico de la lista con dos puntos y punto y coma.
