translation:
  language: es
  text: Pero cuando los de la casa oyeron el grito en el jardín[a], se lanzaron por la puerta lateral para ver lo que le había sucedido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por la puerta lateral»; el griego πλαγία θύρα puede referirse a una entrada lateral o a una puerta de costado, y el sentido arquitectónico exacto no está explicitado.
    reason: lexical_alternative
lexical_decisions:
- source_word: κραυγή
  english_pob_choice: outcry
  chosen_spanish: grito
  alternatives_spanish:
  - clamor
  - grito de alarma
  lexicon: BDAG
  rationale: κραυγή señala un grito fuerte y audible. En español, «grito» comunica bien la alarma inmediata sin añadir matices que el contexto no exige. «Clamor» sería posible, pero aquí suena un poco más elevado y menos directo.
- source_word: παράδεισος
  english_pob_choice: garden
  chosen_spanish: jardín
  alternatives_spanish:
  - huerto
  - parque
  - paraíso
  lexicon: LSJ
  rationale: En Susana, παράδεισος se refiere al espacio físico junto a la casa, no al sentido escatológico de «paraíso». «Jardín» es la equivalencia natural y clara en español.
- source_word: οἱ ἐκ τῆς οἰκίας
  english_pob_choice: those from the house
  chosen_spanish: los de la casa
  alternatives_spanish:
  - los de la familia
  - los domésticos
  - los que salieron de la casa
  lexicon: LSJ
  rationale: La expresión identifica a los que pertenecen a la casa o proceden de ella, sin precisar su condición. «Los de la casa» conserva esa amplitud mejor que opciones más específicas.
- source_word: εἰσεπήδησαν
  english_pob_choice: rushed in
  chosen_spanish: se lanzaron
  alternatives_spanish:
  - entraron apresuradamente
  - irrumpieron
  - saltaron dentro
  lexicon: LSJ
  rationale: El verbo implica entrada súbita y enérgica. «Se lanzaron» reproduce bien la rapidez y el impulso, sin sonar demasiado literal o forzado en español.
- source_word: διὰ τῆς πλαγίας θύρας
  english_pob_choice: through the side door
  chosen_spanish: por la puerta lateral
  alternatives_spanish:
  - por la puerta de lado
  - por la puerta de acceso lateral
  - por la puerta del costado
  lexicon: LSJ
  rationale: θύρα puede ser «puerta» o «entrada», y πλαγία indica lateralidad. «Puerta lateral» mantiene la ambigüedad arquitectónica del griego mejor que «puerta trasera» o «portillo».
- source_word: τὸ συμβεβηκὸς αὐτῇ
  english_pob_choice: what had happened to her
  chosen_spanish: lo que le había sucedido
  alternatives_spanish:
  - lo que le había ocurrido
  - lo que le había pasado
  - lo que le había acontecido
  lexicon: BDAG
  rationale: El participio perfecto de συμβαίνω apunta al suceso ya ocurrido. «Le había sucedido» conserva el sentido de evento consumado y el referente personal de αὐτῇ con naturalidad en español.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alta concordancia; no se registran revisiones sustantivas aplicadas. La traducción española sigue de cerca las decisiones léxicas auditadas, manteniendo la ambigüedad de πλαγία θύρα con una nota alternativa.
  spanish_consistency_notes:
  - Se evitó «paraíso» para παράδεισος, porque aquí el contexto narrativo exige un espacio físico.
  - «Los de la casa» conserva la amplitud social del griego sin especificar si eran sirvientes o familia.
  - La nota de pie de página refleja la misma ambigüedad que la edición inglesa preserva entre «side door» y «side gate», adaptada al español como «puerta lateral».
