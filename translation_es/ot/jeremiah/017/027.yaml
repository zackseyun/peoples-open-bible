    text: Or 'carry a burden.' The Hebrew expression literally refers to lifting or bearing a load.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'in her gates'; the city Jerusalem is grammatically feminine.
    reason: lexical_alternative
