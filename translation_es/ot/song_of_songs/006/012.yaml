translation:
  language: es
  text: Antes de darme cuenta[a][b], mi alma me puso entre los carros de mi pueblo noble.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mi alma me puso entre los carros de mi pueblo princely / principesco». El hebreo es difícil, y también son posibles «mi ser», «yo misma» o «mi corazón» para נַפְשִׁי.'
    reason: lexical_alternative
  - marker: b
    text: La frase final también puede entenderse como «los carros de Ammi-nadib», tomando las palabras como un nombre propio y no como «mi pueblo noble».
    reason: alternative_reading
lexical_decisions:
- source_word: לֹא יָדַעְתִּי
  english_pob_choice: Before I knew it
  chosen_spanish: Antes de darme cuenta
  alternatives_spanish:
  - No supe
  - No sabía
  lexicon: HALOT
  rationale: El hebreo dice literalmente «no supe / no conocí», pero en contexto expresa súbito irreflexivo o falta de conciencia del proceso. «Antes de darme cuenta» comunica esa repentina sorpresa en un español natural sin perder el matiz idiomático.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - mi ser
  - yo misma
  - mi corazón
  lexicon: HALOT
  rationale: La POB inglesa optó por «my soul» tras revisar la ambigüedad de נֶפֶשׁ. En español, «alma» conserva la carga poética y formal de la frase, aunque también puede sugerir el interior o la persona misma; se mantiene la tensión semántica sin fijar una sola paráfrasis interpretativa.
- source_word: שָׂמַתְנִי
  english_pob_choice: set me among
  chosen_spanish: me puso entre
  alternatives_spanish:
  - me colocó entre
  - me puso en medio de
  lexicon: HALOT
  rationale: El verbo שׂוּם significa poner/colocar/poner entre. «Me puso entre» reproduce la imagen locativa de forma directa y fluida en español.
- source_word: מַרְכְּבֹות
  english_pob_choice: the chariots
  chosen_spanish: los carros
  alternatives_spanish:
  - los carros de guerra
  - los carros
  lexicon: HALOT
  rationale: Aunque el término hebreo es «chariots», en español bíblico «carros» evita una repetición dura y sigue siendo fiel al referente. No se añadió «de guerra» porque el texto no lo explicita.
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mi gente
  - mi pueblo
  lexicon: HALOT
  rationale: עַם significa pueblo/gente. «Mi pueblo» es la correspondencia más directa y suele sonar más natural que «mi gente» en este registro poético.
- source_word: נָדִיב
  english_pob_choice: noble
  chosen_spanish: noble
  alternatives_spanish:
  - príncipe
  - princely
  - generoso
  lexicon: HALOT
  rationale: נָדִיב puede significar noble, princely o generoso. Aquí se conserva «noble» para reflejar la lectura principal de la POB inglesa y mantener abierta la dificultad sintáctica del final de la línea.
theological_decisions:
- issue: 'Final del verso: lectura como sintagma descriptivo o como nombre propio'
  english_pob_reading: '''the chariots of Ammi-nadib,'' taking the words as a proper name rather than ''my noble people.'''
  chosen_spanish_reading: «los carros de mi pueblo noble» en el texto principal, con la posibilidad de leer el conjunto como nombre propio preservada en nota.
  alternative_spanish_readings:
  - «los carros de Ammi-nadib»
  - «los carros de mi pueblo, [el] noble»
  rationale: El hebreo permite ambas lecturas y la POB inglesa documenta esa tensión. El texto principal conserva la lectura descriptiva más inmediata, pero la nota mantiene la opción onomástica sin resolverla artificialmente.
  doctrine_reference: No aplica; se trata de una decisión filológica y poética, no doctrinal.
translation_notes:
  revision_awareness: La versión inglesa más reciente sustituyó «my desire» por «my soul» para reflejar con mayor precisión נַפְשִׁי; la presente versión española sigue esa revisión con «mi alma», manteniendo la dificultad poética del hebreo y la ambigüedad final documentada en la POB.
  spanish_consistency_notes:
  - Se evitó traducir mecánicamente desde la redacción inglesa si el español podía reproducir mejor la imagen original hebrea.
  - Se mantuvo el registro poético y la ambigüedad del verso, sin normalizar la sintaxis difícil.
  - Se prefirió «carros» por naturalidad bíblica en español, sin añadir elementos no presentes en el hebreo.
  - Los marcadores [a] y [b] aparecen en el texto exactamente donde corresponden a las notas.
