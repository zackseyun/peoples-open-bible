translation:
  language: es
  text: Aarón llevará los nombres de los hijos de Israel en el pectoral del juicio sobre su corazón, cuando entre en el Lugar Santo, como memorial[a] delante de Yahvé continuamente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para memorial».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָשָׂא
  english_pob_choice: shall carry
  chosen_spanish: llevará
  alternatives_spanish:
  - cargará
  - portará
  - llevará sobre sí
  lexicon: HALOT
  rationale: נָשָׂא puede significar ‘llevar’ o ‘cargar’. En español, «llevará» conserva la imagen concreta y es natural en un contexto sacerdotal, sin perder la idea de portar algo sobre la persona.
- source_word: שְׁמוֹת
  english_pob_choice: the names
  chosen_spanish: los nombres
  alternatives_spanish:
  - los nombres propios
  - los nombres inscritos
  lexicon: HALOT
  rationale: Se mantiene el sustantivo plural de manera directa; el contexto de la vestidura sacerdotal muestra que son los nombres tribales portados en el pectoral.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos varones de Israel
  - los israelitas
  lexicon: HALOT
  rationale: «Hijos de Israel» reproduce la expresión genealógica hebrea sin neutralizarla. En español es idiomático y conserva la referencia corporativa a las tribus descendientes de Israel.
- source_word: בְּחֹשֶׁן הַמִּשְׁפָּט
  english_pob_choice: in the breastpiece of judgment
  chosen_spanish: en el pectoral del juicio
  alternatives_spanish:
  - en el pectoral de decisión
  - en el pectoral de justicia
  lexicon: HALOT
  rationale: «Pectoral» comunica el objeto sacerdotal con naturalidad en español. «Del juicio» mantiene la forma tradicional y la ambigüedad cultual de מִשְׁפָּט, sin resolverla de manera reductiva.
- source_word: עַל לִבּוֹ
  english_pob_choice: over his heart
  chosen_spanish: sobre su corazón
  alternatives_spanish:
  - sobre su pecho
  - encima de su corazón
  lexicon: HALOT
  rationale: La expresión espacial y simbólica se conserva literalmente en un español claro. «Corazón» mantiene la imagen de representación interior/personal ante Dios.
- source_word: בְּבֹאוֹ אֶל הַקֹּדֶשׁ
  english_pob_choice: when he goes into the Holy Place
  chosen_spanish: cuando entre en el Lugar Santo
  alternatives_spanish:
  - cuando entre en el santuario
  - cuando vaya al Lugar Santo
  lexicon: HALOT
  rationale: El contexto tabernacular favorece una referencia al recinto sagrado. «Lugar Santo» es una forma cultual inteligible en español y refleja el valor local del término.
- source_word: לְזִכָּרוֹן
  english_pob_choice: for a memorial
  chosen_spanish: para memorial
  alternatives_spanish:
  - como memorial
  - para recuerdo
  lexicon: HALOT
  rationale: Se preserva el sustantivo de función cultual. «Memorial» comunica mejor el uso litúrgico que «recuerdo», y sigue de cerca la decisión inglesa de mantener el matiz ritual.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: Se adopta la terminología del proyecto para el nombre divino. «Delante de» reproduce bien el hebreo idiomático de estar ante la presencia de Yahvé.
- source_word: תָּמִיד
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - siempre
  - de continuo
  lexicon: HALOT
  rationale: «Continuamente» expresa continuidad ritual sostenida y es natural en español moderno, preservando el sentido de permanencia cultual.
theological_decisions:
- issue: Título cultual חֹשֶׁן הַמִּשְׁפָּט
  english_pob_reading: the breastpiece of judgment
  chosen_spanish_reading: el pectoral del juicio
  alternative_spanish_readings:
  - el pectoral de decisión
  - el pectoral de justicia
  rationale: Se conserva la designación formal del objeto sacerdotal sin imponer una interpretación única de מִשְׁפָּט. Esto mantiene la tensión ritual/jurídica del término, como en el texto fuente y en la auditoría inglesa.
  doctrine_reference: Translation philosophy §3, §5
- issue: Expresión genealógica בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Jacob
  rationale: La forma masculina y genealógica se preserva en vez de neutralizarla. En este contexto, el lector entiende la referencia corporativa a las tribus descendientes de Israel.
  doctrine_reference: Translation philosophy §4
- issue: Uso de יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se sigue el estándar del proyecto para el nombre divino. En este versículo no hay un motivo para ocultarlo mediante mayúsculas ni para sustituirlo por una convención tradicional distinta.
  doctrine_reference: Translation philosophy §2, §7
- issue: Función de לְזִכָּרוֹן
  english_pob_reading: for a memorial
  chosen_spanish_reading: para memorial
  alternative_spanish_readings:
  - como memorial
  - para recuerdo
  rationale: '«Memorial» conserva el valor litúrgico y representacional del término: el pectoral y los nombres funcionan ante Yahvé como acto conmemorativo ritual, no solo como memoria mental.'
  doctrine_reference: Translation philosophy §5
translation_notes:
  revision_awareness: La redacción inglesa revisada pasó de «for remembrance» a «for a memorial», reforzando un sustantivo cultual. La versión española sigue esa revisión con «para memorial», manteniendo el matiz litúrgico y evitando una banalización a «recuerdo».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme a la terminología base del proyecto.
  - «Lugar Santo» se usa como equivalente cultual claro de הַקֹּדֶשׁ en este contexto tabernacular.
  - «Pectoral del juicio» conserva la fórmula tradicional y la ambigüedad interpretativa del hebreo.
  - Se prefirió «hijos de Israel» por fidelidad genealógica y consistencia con la política de lenguaje del proyecto.
  - El marcador de nota [a] aparece en el texto justo donde se ofrece la alternativa de traducción.
