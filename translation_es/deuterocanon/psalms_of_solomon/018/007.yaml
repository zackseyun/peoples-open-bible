translation:
  language: es
  text: Bienaventurados los que lleguen a existir en aquellos días[a], para ver las cosas buenas[b] de Yahvé, que él hará para la generación venidera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los que existan en aquellos días»; es decir, posiblemente «los que entonces vivan» o «los que entonces nazcan».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «las bendiciones de Yahvé».'
    reason: lexical_alternative
lexical_decisions:
- source_word: μακάριοι
  english_pob_choice: Blessed
  chosen_spanish: Bienaventurados
  alternatives_spanish:
  - Dichosos
  - Felices
  lexicon: BDAG
  rationale: Mantiene el tono de bienaventuranza bíblica y el registro elevado que el inglés POB preserva con 'Blessed'.
- source_word: οἱ γενόμενοι
  english_pob_choice: those who come to be
  chosen_spanish: los que llegan a estar
  alternatives_spanish:
  - los que vienen a ser
  - los que nacen
  - los que viven
  lexicon: BDAG
  rationale: γενόμενοι es más amplio que 'nacidos'; 'llegan a estar' conserva la idea de entrar a la existencia o encontrarse presentes en esos días sin restringirla a nacimiento biológico.
- source_word: ἐν ἡμέραις ἐκείναις
  english_pob_choice: in those days
  chosen_spanish: en aquellos días
  alternatives_spanish:
  - durante aquellos días
  lexicon: BDAG
  rationale: Expresión temporal directa y natural en español, fiel al valor deíctico del griego.
- source_word: ἰδεῖν
  english_pob_choice: to see
  chosen_spanish: para ver
  alternatives_spanish:
  - para contemplar
  - para observar
  lexicon: BDAG
  rationale: Infinitivo final claro y sobrio; 'ver' transmite el sentido sin añadir matiz innecesario.
- source_word: τὰ ἀγαθὰ
  english_pob_choice: the good things
  chosen_spanish: los bienes
  alternatives_spanish:
  - las cosas buenas
  - los buenos dones
  - las bendiciones
  lexicon: BDAG
  rationale: '''Bienes'' mantiene amplitud semántica y evita estrechar el griego a ''bendiciones'' solamente. En contexto suena natural en español y preserva la posibilidad de un sentido material o general de bondad.'
- source_word: Κυρίου
  english_pob_choice: the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - de Yahvé
  lexicon: BDAG
  rationale: El texto griego dice Κυρίου; en este verso la designación funciona como título reverencial. 'Señor' conserva la referencia habitual en español a Kyrios en este tipo de construcción y suena idiomático en la frase fija 'los bienes del Señor'.
- source_word: ἃ ποιήσει
  english_pob_choice: that he will do
  chosen_spanish: que él hará
  alternatives_spanish:
  - que él realizará
  - que él obrará
  lexicon: BDAG
  rationale: Traducción directa y natural que conserva la agencia divina sin forzar una interpretación más específica del verbo.
- source_word: γενεᾷ τῇ ἐρχομένῃ
  english_pob_choice: the generation to come
  chosen_spanish: para la generación venidera
  alternatives_spanish:
  - para la generación que viene
  - para la generación futura
  lexicon: BDAG
  rationale: '''Venidera'' reproduce el valor futuro del participio con un giro bíblico claro y fluido en español.'
theological_decisions:
- issue: Cómo verter μακάριοι en un contexto de beatitud
  english_pob_reading: Blessed
  chosen_spanish_reading: Bienaventurados
  alternative_spanish_readings:
  - Dichosos
  - Felices
  rationale: La forma 'Bienaventurados' conserva la resonancia bíblica y el carácter declarativo de dicha concedida, sin trivializarla como 'felices'.
  doctrine_reference: Beatitudes; lenguaje de bendición divina
translation_notes:
  revision_awareness: La redacción sigue de cerca el último estado revisado del inglés POB, que sustituyó 'those born' por una fórmula más amplia ('those who come to be') para reflejar mejor γενόμενοι. En español se evitó restringirla a 'nacidos' y se escogió una equivalencia amplia y natural. También se mantuvo la amplitud semántica de τὰ ἀγαθὰ mediante 'los bienes', dejando explícita la alternativa interpretativa tradicional en nota.
  spanish_consistency_notes:
  - Se mantiene 'Señor' para Κυρίου en coherencia con el valor reverencial del título en esta construcción; no se introduce 'Yahvé' porque el griego aquí no contiene el nombre divino explícito.
  - '''Bienaventurados'' se usa como término estable para fórmulas de beatitud.'
  - Las notas usan marcadores únicos y aparecen ancladas en el texto donde corresponde.
