translation:
  language: es
  text: Y algunos de los que tienen entendimiento tropezarán[a], para refinarlos, purificarlos y hacerlos blancos[c], hasta el tiempo del fin; porque aún es para el tiempo señalado[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'caerán'. El verbo hebreo conserva la imagen de tropezar y puede aludir a caída o derribo por persecución o prueba.
    reason: lexical_alternative
  - marker: c
    text: O 'blanquearlos'. 'Hacerlos blancos' es una traducción literal de la imagen hebrea, que expresa limpieza o purificación.
    reason: lexical_alternative
  - marker: d
    text: O 'porque el tiempo señalado aún no ha llegado'.
    reason: alternative_reading
lexical_decisions:
- source_word: וּמִן הַמַּשְׂכִּילִים
  english_pob_choice: And some of those who have insight
  chosen_spanish: Y algunos de los que tienen entendimiento
  alternatives_spanish:
  - Y algunos de los entendidos
  - Y algunos de los que son sabios
  lexicon: HALOT
  rationale: מִן es partitivo aquí; por eso 'algunos de'. מַשְׂכִּילִים designa a personas con discernimiento/entendimiento en sentido sapiencial y de fidelidad del pacto. 'Los que tienen entendimiento' suena natural en español y conserva el matiz participial.
- source_word: יִכָּשְׁלוּ
  english_pob_choice: will stumble
  chosen_spanish: tropezarán
  alternatives_spanish:
  - caerán
  - serán derribados
  lexicon: HALOT
  rationale: El nifal de כשל puede significar 'tropezar' o 'caer'. 'Tropezarán' mantiene la imagen literal del tropiezo y evita decidir de antemano si la referencia es moral, social o física.
- source_word: לִצְרוֹף
  english_pob_choice: so that they may be refined
  chosen_spanish: para ser refinados
  alternatives_spanish:
  - para refinarlos
  - para fundirlos
  lexicon: HALOT
  rationale: צָרַף es un término metalúrgico de refinación/ fundición. El infinitivo final se expresa bien en español con 'para ser refinados', conservando la idea de proceso purificador.
- source_word: בָּהֶם
  english_pob_choice: among them
  chosen_spanish: —
  alternatives_spanish:
  - entre ellos
  - por medio de ellos
  lexicon: HALOT
  rationale: A la luz de la revisión del POB inglés, no se introduce una expresión equivalente en la línea principal. El hebreo permite una relación concisa con el grupo, pero la cadena de infinitivos queda más fiel y clara sin añadir una preposición interpretativa aquí.
- source_word: וּלְבָרֵר
  english_pob_choice: purified
  chosen_spanish: purificados
  alternatives_spanish:
  - para purificarlos
  - depurados
  lexicon: HALOT
  rationale: ברר connota separar, depurar o purificar por selección. Como parte de la secuencia de infinitivos, 'purificados' funciona como resultado en español y preserva el paralelismo con los verbos siguientes.
- source_word: וְלַלְבֵּן
  english_pob_choice: made white
  chosen_spanish: emblanquecidos
  alternatives_spanish:
  - blanqueados
  - hechos blancos
  lexicon: HALOT
  rationale: לבן en hifil literalmente es 'hacer blanco'. 'Emblanquecidos' conserva el valor literal e imagístico del hebreo mejor que una paráfrasis más abstracta como 'hechos puros'.
- source_word: עַד עֵת קֵץ
  english_pob_choice: until the time of the end
  chosen_spanish: hasta el tiempo del fin
  alternatives_spanish:
  - hasta el tiempo del final
  - hasta el fin de los tiempos
  lexicon: HALOT
  rationale: La expresión daniélica es técnica. 'Hasta el tiempo del fin' es formalmente cercana y natural en español, y conserva la idea de un momento escatológico determinado.
- source_word: כִּי עוֹד לַמּוֹעֵד
  english_pob_choice: for it is still for the appointed time
  chosen_spanish: porque aún es para el tiempo señalado
  alternatives_spanish:
  - porque todavía es para el tiempo appointed
  - pues todavía es para el tiempo designado
  lexicon: HALOT
  rationale: מוֹעֵד es 'tiempo señalado/appointed time'. 'Tiempo señalado' comunica bien la idea de un momento fijado por Dios y evita una formulación demasiado literal pero oscura en español.
theological_decisions:
- issue: Finalidad del tropiezo de los entendidos
  english_pob_reading: The stumbling is presented as serving a refining, purifying purpose without specifying a full doctrine of suffering.
  chosen_spanish_reading: El tropiezo se presenta con finalidad de refinamiento, purificación y blanqueamiento, sin ampliar el versículo a una doctrina completa del sufrimiento.
  alternative_spanish_readings:
  - El tropiezo es solo predictivo, no finalista
  - El versículo enseña una teología exhaustiva de la santificación por persecución
  rationale: La cadena de infinitivos tras יכשלו expresa con naturalidad finalidad o resultado. La traducción conserva esa función ordenada por Dios, sin cargar el texto con conclusiones teológicas que el hebreo no formula explícitamente.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del POB inglés al reflejar más directamente la cadena de infinitivos ('para ser refinados, purificados y emblanquecidos') y al no explicitar 'entre ellos' en la línea principal. También se mantiene la imagen verbal de 'tropezarán' para כשל y la expresión técnica 'tiempo señalado' para מוֹעֵד.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera; en este versículo no aparece.
  - '''Entendimiento'' conserva el campo semántico de מַשְׂכִּילִים sin forzar ''sabios'' como término técnico.'
  - '''Tiempo del fin'' se mantiene como fórmula escatológica estable.'
  - Se evita 'purificados' como adjetivo absoluto en favor de la secuencia verbal para reproducir el efecto del hebreo.
  - Las notas al pie conservan las alternativas documentadas por el POB inglés sin añadir glosas doctrinales ajenas al verso.
