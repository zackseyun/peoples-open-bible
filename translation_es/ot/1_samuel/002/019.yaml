review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la acción habitual pasada, el modismo temporal anual y el contexto cultual de subir al santuario. Sin embargo, מְעִיל se alinea mejor con «manto» o «túnica exterior/vestido exterior» que con «túnica» sola, porque el rastro POB inglés documenta específicamente una prenda exterior y ofrece «cloak/mantle» como alternativas; en español «túnica» puede sugerir prenda básica más que sobreprenda. También conviene hacer más explícito el matiz de «llevar arriba» ya presente en עלה.
  spanish_quality_summary: El español es claro y natural. La frase fluye bien y es ampliamente legible. No obstante, «túnica pequeña» suena algo menos precisa para una prenda exterior, y «se la llevaba» pierde un poco del matiz direccional de ascenso. «Le hacía un manto pequeño y se lo llevaba cuando subía...» mantiene mejor el sentido y sigue siendo idiomático.
  glossary_alignment: 'No hay conflictos con la terminología teológica global. La principal cuestión léxica es מְעִיל: la documentación inglesa favorece «robe» con alternativas «cloak/mantle» por el entorno de santuario; en español «manto» encaja mejor con esa rationale que «túnica». El resto («de año en año», «subía», «su marido», «sacrificio anual») está bien alineado.'
  issues:
  - severity: medium
    issue: «túnica» para מְעִיל puede desdibujar la idea de prenda exterior
    rationale: El audit trail inglés explica que מְעִיל es una prenda exterior y que «robe» se escogió por el contexto cultual. En español, «túnica» puede entenderse como vestidura básica, mientras que «manto» preserva mejor el valor de sobreprenda y coincide con las alternativas documentadas.
  - severity: low
    issue: «se la llevaba» atenúa el matiz de ascenso implícito en וְהַעַלְתָה לּוֹ
    rationale: Aunque «cuando subía» conserva la peregrinación, el verbo anterior también pertenece a עלה. No es necesario forzar una repetición dura, pero una formulación como «se lo llevaba» con «manto» y el contexto inmediato mejora la correspondencia; la pérdida no es grave, pero merece ajuste menor.
  - severity: low
    issue: La nota de alternativa para מְעִיל debería priorizar equivalentes españoles más exactos
    rationale: Si el texto principal usa «manto», las alternativas pueden incluir «túnica exterior» o «capa», en vez de justificar «túnica» como si fuera la mejor representación de una prenda exterior.
  revised_spanish_text: Y su madre le hacía un manto pequeño[a] y se lo llevaba de año en año[b], cuando subía con su marido para ofrecer el sacrificio anual.
