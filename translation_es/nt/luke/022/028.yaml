review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido griego: Ὑμεῖς δέ se capta con «Pero ustedes», οἱ διαμεμενηκότες con «los que han permanecido», y μετ’ ἐμοῦ con «conmigo». También mantiene correctamente el matiz contextual de πειρασμοῖς como las pruebas/ordalías de Jesús, con nota de alternativa.'
  spanish_quality_summary: 'El texto principal es natural, claro y fiel. La única reparación necesaria está en la nota: «ensayos» no es una alternativa adecuada en este contexto bíblico para πειρασμός; suena impropia y no corresponde bien al inglés auditado «testings». «Pruebas» ya está en el texto principal, así que la alternativa debe distinguirse mejor como «pruebas»/«tentaciones» o mejor «situaciones de prueba».'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Pruebas» es una buena elección contextual para πειρασμοῖς, y la estructura enfática «ustedes son los que…» preserva bien el énfasis del griego.
  issues:
  - severity: medium
    issue: La nota al pie usa «ensayos» como alternativa para πειρασμοῖς.
    rationale: «Ensayos» en español moderno sugiere rehearsal, attempt o trial run, no la idea bíblica de prueba/test/ordeal. Esto debilita la fidelidad léxica y la legibilidad eclesial. Conviene reemplazarlo por una alternativa española natural como «situaciones de prueba» o simplemente mantener «pruebas»/«tentaciones».
  revised_spanish_text: Pero ustedes son los que han permanecido conmigo en mis pruebas[a].
  revised_footnotes:
  - marker: a
    text: O «tentaciones» o «situaciones de prueba». La palabra griega puede referirse a tentación o prueba; aquí probablemente apunta a las duras experiencias y oposiciones que Jesús soportó.
    reason: lexical_alternative
  revision_rationale: El texto principal puede mantenerse tal como está. Se corrige únicamente la nota léxica para reemplazar «ensayos», que no comunica bien el campo semántico de πειρασμός en español bíblico y eclesial.
