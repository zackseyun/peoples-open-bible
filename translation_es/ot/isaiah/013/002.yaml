    text: Or 'banner' or 'standard' for 'signal.' The Hebrew נֵס often denotes a raised military sign or rallying marker.
    reason: lexical_alternative
  - marker: b
    text: Or 'beckon with the hand.' The gesture likely functions as a summons to the attacking force.
    reason: lexical_alternative
  - marker: c
    text: Or 'the gates of the princes.' The Hebrew נְדִיבִים can denote nobles, princes, or other prominent leaders.
    reason: lexical_alternative
