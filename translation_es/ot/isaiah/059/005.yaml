translation:
  language: es
  text: Eclosionan huevos de víbora[a] y tejen telas de araña; el que come de sus huevos muere, y lo que es aplastado[b] se abre y sale una víbora.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «huevos de áspid»; ambos términos apuntan a una serpiente venenosa.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo literalmente: «se rompe» o «se abre». La imagen es que, al aplastarse un huevo, sale una serpiente venenosa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּיצֵי צִפְעוֹנִי
  english_pob_choice: vipers' eggs
  chosen_spanish: huevos de víbora
  alternatives_spanish:
  - huevos de serpiente venenosa
  - huevos de áspid
  lexicon: HALOT
  rationale: La frase hebrea describe huevos pertenecientes a una serpiente venenosa. En español, "víbora" comunica con claridad la peligrosidad y conserva una equivalencia natural con el inglés POB "viper". Evito "áspid" por ser más especializado y menos transparente para lectores amplios.
- source_word: בִּקֵּעוּ
  english_pob_choice: they hatch
  chosen_spanish: hacen eclosionar
  alternatives_spanish:
  - eclosionan
  - abren
  - rompen
  lexicon: HALOT
  rationale: El verbo hebreo significa literalmente partir o abrir. Con huevos, el sentido natural es la eclosión; "hacen eclosionar" mantiene la imagen de salida del huevo sin sonar mecánico ni perder la fuerza del acto.
- source_word: קוּרֵי עַכָּבִישׁ
  english_pob_choice: spiders' webs
  chosen_spanish: telas de araña
  alternatives_spanish:
  - redes de araña
  - tejidos de araña
  - cobwebs
  lexicon: HALOT
  rationale: La expresión hebrea apunta al entramado que teje la araña. "Telas de araña" es la forma natural en español y conserva la idea de un tejido frágil e insidioso. "Redes" podría sonar menos preciso en este contexto.
- source_word: יֶאֱרֹגוּ
  english_pob_choice: weave
  chosen_spanish: tejen
  alternatives_spanish:
  - hilan
  - trenzan
  lexicon: HALOT
  rationale: El verbo hebreo corresponde a tejer. En español, "tejen" reproduce bien la imagen de actividad fabricadora y mantiene el paralelismo con el fraude o la maldad representada por la metáfora.
- source_word: הָאֹכֵל מִבֵּיצֵיהֶם
  english_pob_choice: whoever eats from their eggs
  chosen_spanish: el que come de sus huevos
  alternatives_spanish:
  - quien come de sus huevos
  - el que come de esos huevos
  lexicon: HALOT
  rationale: La construcción participial hebrea funciona de manera genérica. "El que" es una forma sobria y bíblica en buen español; conserva el tono proverbial del aviso sin volverlo abstracto.
- source_word: יָמוּת
  english_pob_choice: dies
  chosen_spanish: muere
  alternatives_spanish:
  - morirá
  lexicon: HALOT
  rationale: En el contexto proverbial, el presente gnómico en español expresa mejor la certeza de la consecuencia que un futuro literal. "Muere" reproduce la fuerza sentenciosa del hebreo y del inglés POB.
- source_word: וְהַזּוּרֶה
  english_pob_choice: what is crushed
  chosen_spanish: el que es aplastado
  alternatives_spanish:
  - lo aplastado
  - lo que es triturado
  - lo que es aplastado
  lexicon: HALOT
  rationale: La expresión es difícil en hebreo. Sigo de cerca el valor de algo sometido a presión o aplastamiento, en paralelo con el contexto de huevos. En español, "el que es aplastado" deja abierta la referencia al objeto o a lo tratado de forma ruin, sin forzar una paráfrasis excesiva.
- source_word: תִּבָּקַע
  english_pob_choice: breaks open
  chosen_spanish: se abre
  alternatives_spanish:
  - se quiebra
  - se parte
  - revienta
  lexicon: HALOT
  rationale: El verbo pasivo-reflexivo expresa que algo se abre o se rompe. "Se abre" es breve y natural en español, y permite mantener la idea de que de esa abertura sale una víbora.
- source_word: אֶפְעֶה
  english_pob_choice: a viper
  chosen_spanish: una víbora
  alternatives_spanish:
  - un áspid
  - una serpiente venenosa
  lexicon: HALOT
  rationale: El término designa una serpiente venenosa. "Víbora" es el equivalente español más claro y conserva la coherencia léxica con "huevos de víbora" al inicio del versículo.
translation_notes:
  revision_awareness: La redacción sigue el texto hebreo masorético de Isaías 59:5 y el audit trail inglés revisado, especialmente la lectura plural de "vipers' eggs" y "spiders' webs". Se preserva la imagen poética de huevos peligrosos, telarañas y la consecuencia fatal del contacto con ellos, sin suavizar la tensión léxica del hebreo.
  spanish_consistency_notes:
  - Se usa "víbora" de manera uniforme para צפעוני y אֶפְעֶה, como en la línea inglesa revisada con "viper".
  - '"Telas de araña" se eligió por naturalidad en español frente a un calco más rígido.'
  - No se introduce "SEÑOR" ni terminología teológica no presente en el versículo.
  - El presente gnómico "muere" mantiene el carácter proverbial del hebreo y del inglés POB.
