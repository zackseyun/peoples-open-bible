translation:
  language: es
  text: Amasías, hijo de Joás[a], rey de Judá, vivió quince años después de la muerte de Jehoás, hijo de Joacaz, rey de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Se distingue Joás, padre de Amasías y rey de Judá, de Jehoás, rey de Israel, siguiendo la diferencia de nombres que el hebreo marca en este versículo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְחִי
  english_pob_choice: lived
  chosen_spanish: vivió
  alternatives_spanish:
  - siguió con vida
  - permaneció vivo
  lexicon: HALOT
  rationale: El verbo hebreo presenta una nota cronológica de continuidad de vida después de otro acontecimiento. «Vivió» conserva esa función narrativa de modo natural en español, sin introducir una paráfrasis excesiva.
- source_word: אֲמַצְיָהוּ
  english_pob_choice: Amaziah
  chosen_spanish: Amasías
  alternatives_spanish:
  - Amazías
  lexicon: transliteración tradicional castellana
  rationale: Se adopta la forma española ampliamente reconocible del nombre propio. Mantiene la identificación del rey de Judá sin depender de la grafía inglesa.
- source_word: בֶן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - hijo
  lexicon: HALOT
  rationale: La relación filial es literal y directa en la fórmula real de identificación.
- source_word: יוֹאָשׁ
  english_pob_choice: Joash
  chosen_spanish: Joás
  alternatives_spanish:
  - Joás de Judá
  lexicon: transliteración tradicional castellana
  rationale: Aquí el hebreo nombra al padre de Amasías, rey de Judá. «Joás» es la forma española usual y ayuda a distinguirlo del rey de Israel nombrado más adelante.
- source_word: מֶלֶךְ יְהוּדָה
  english_pob_choice: king of Judah
  chosen_spanish: rey de Judá
  alternatives_spanish:
  - monarca de Judá
  lexicon: HALOT
  rationale: La cadena constructa identifica el cargo y el reino; «rey de Judá» es la traducción directa y adecuada.
- source_word: אַחֲרֵי מוֹת
  english_pob_choice: after the death of
  chosen_spanish: después de la muerte de
  alternatives_spanish:
  - tras la muerte de
  - después de que murió
  lexicon: HALOT
  rationale: Se conserva la expresión nominal del hebreo. «Después de la muerte de» refleja con precisión la relación temporal marcada por el texto.
- source_word: יְהוֹאָשׁ
  english_pob_choice: Jehoash
  chosen_spanish: Jehoás
  alternatives_spanish:
  - Joás
  lexicon: transliteración tradicional castellana
  rationale: La forma española «Jehoás» mantiene la distinción histórica con el Joás de Judá, tal como la auditoría inglesa la preserva con dos formas distintas.
- source_word: יְהוֹאָחָז
  english_pob_choice: Jehoahaz
  chosen_spanish: Joacaz
  alternatives_spanish:
  - Jehoacaz
  lexicon: transliteración tradicional castellana
  rationale: «Joacaz» es la forma castellana establecida y comprensible; conserva el nombre propio del rey de Israel mencionado como padre de Jehoás.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: king of Israel
  chosen_spanish: rey de Israel
  alternatives_spanish:
  - monarca de Israel
  lexicon: HALOT
  rationale: Traducción directa de la identificación regia del reino del norte.
- source_word: חֲמֵשׁ עֶשְׂרֵה שָׁנָה
  english_pob_choice: fifteen years
  chosen_spanish: quince años
  alternatives_spanish:
  - 15 años
  lexicon: HALOT
  rationale: La duración temporal se expresa de forma literal y natural en español.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios y la concordancia general con el texto fuente es alta; por eso se mantuvo una solución literal y clara, sin introducir ajustes interpretativos adicionales.
  spanish_consistency_notes:
  - Se mantuvo la fórmula regia completa para conservar la estructura de identificación del hebreo.
  - 'Se distinguieron consistentemente los dos nombres emparentados: Joás/Jehoás, para evitar confusión entre el rey de Judá y el rey de Israel.'
  - No se añadieron glosas doctrinales porque el versículo es un notice cronológico-histórico sin carga teológica explícita.
