translation:
  language: es
  text: Las aguas cubrieron a sus adversarios[a][b]; no quedó ninguno de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus enemigos».
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «uno de ellos no fue dejado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְכַסּוּ
  english_pob_choice: covered
  chosen_spanish: cubrieron
  alternatives_spanish:
  - cubrieron por completo
  - taparon
  lexicon: HALOT
  rationale: כסה expresa ‘cubrir’; en este contexto narrativo, «cubrieron» conserva la imagen directa del agua que se alza sobre los enemigos sin añadir interpretación.
- source_word: מַיִם
  english_pob_choice: the waters
  chosen_spanish: las aguas
  alternatives_spanish:
  - aguas
  - el agua
  lexicon: HALOT
  rationale: El plural hebreo se refleja mejor con «las aguas», que en español suena natural y mantiene el matiz colectivo y específico del episodio.
- source_word: צָרֵיהֶם
  english_pob_choice: their adversaries
  chosen_spanish: sus adversarios
  alternatives_spanish:
  - sus enemigos
  - sus foes
  lexicon: HALOT
  rationale: צָרָה/צרר designa hostilidad y oposición. «Adversarios» preserva ese valor sin estrecharlo de más; «enemigos» también es posible y se deja como alternativa.
- source_word: אֶחָד מֵהֶם
  english_pob_choice: not one of them
  chosen_spanish: ninguno de ellos
  alternatives_spanish:
  - ni uno de ellos
  - no quedó uno de ellos
  lexicon: HALOT
  rationale: La expresión literal «uno de ellos» bajo negación se vuelve en español «ninguno de ellos», que comunica con claridad la totalidad de la destrucción.
- source_word: לֹא נוֹתָר
  english_pob_choice: remained
  chosen_spanish: quedó
  alternatives_spanish:
  - permaneció
  - sobrevivió
  lexicon: HALOT
  rationale: נותר en nifal significa ‘quedar, permanecer’. «Quedó» es la forma más idiomática y fiel en español; «sobrevivió» introduciría una lectura más interpretativa.
translation_notes:
  revision_awareness: El inglés POB mantuvo una decisión léxica estable en la revisión más reciente (sin cambios). La presente propuesta conserva la misma imagen y sentido, ajustando solo la sintaxis para que suene natural en español sin perder el paralelismo hebreo.
  spanish_consistency_notes:
  - Se mantiene «aguas» en plural para el hebreo colectivo.
  - Se evita «SEÑOR» u otras sustituciones teológicas porque el versículo no contiene el nombre divino.
  - «Adversarios» conserva una opción más amplia que «enemigos», siguiendo la nota lexical del POB inglés.
  - La negación total se expresa con «ninguno de ellos» para reflejar la fuerza de אֶחָד מֵהֶם לֹא נוֹתָר.
