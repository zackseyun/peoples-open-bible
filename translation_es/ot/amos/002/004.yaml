translation:
  language: es
  text: 'Así dice Yahvé: «Por tres transgresiones de Judá[a], y por cuatro, no lo haré volver atrás, porque han rechazado la ley de Yahvé y no han guardado sus estatutos; y sus mentiras los han extraviado[c][b], tras las cuales anduvieron sus padres».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no lo revocaré», es decir, el juicio o castigo anunciado.'
    reason: lexical_alternative
  - marker: b
    text: «La ley de Yahvé» también puede traducirse «la instrucción de Yahvé».
    reason: lexical_alternative
  - marker: c
    text: «Sus mentiras» puede referirse más específicamente a falsos dioses o ídolos, objetos engañosos de adoración seguidos por sus antepasados.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del Tetragrámaton, como en el POB inglés, usando la forma española establecida 'Yahvé' en lugar de sustituirlo por un título como 'Señor'.
- source_word: פִּשְׁעֵי
  english_pob_choice: transgressions
  chosen_spanish: transgresiones
  alternatives_spanish:
  - rebeldías
  - crímenes
  lexicon: HALOT
  rationale: '''Transgresiones'' comunica bien la fuerza pactual y moral del sustantivo, sin cargarlo con un matiz político más específico que el hebreo no exige aquí.'
- source_word: לֹא אֲשִׁיבֶנּוּ
  english_pob_choice: I will not turn it back
  chosen_spanish: no lo volveré atrás
  alternatives_spanish:
  - no lo revocaré
  - no me retractaré
  - no apartaré su castigo
  lexicon: HALOT
  rationale: La frase española intenta conservar la imagen idiomática y la ambigüedad del hebreo, sin especificar indebidamente si el objeto es el juicio, la sentencia o el castigo.
- source_word: מָאֳסָם
  english_pob_choice: they have rejected
  chosen_spanish: han rechazado
  alternatives_spanish:
  - han despreciado
  - han desechado
  lexicon: HALOT
  rationale: '''Han rechazado'' es natural en español moderno y refleja adecuadamente la repulsa pactual implícita en el verbo.'
- source_word: תּוֹרַת יְהוָה
  english_pob_choice: the law of the LORD
  chosen_spanish: la ley de Yahvé
  alternatives_spanish:
  - la instrucción de Yahvé
  - la Torá de Yahvé
  lexicon: HALOT
  rationale: En este contexto profético y legal, 'ley' es la opción más clara y fiel al uso idiomático; 'instrucción' queda como alternativa léxica válida.
- source_word: חֻקָּיו
  english_pob_choice: his statutes
  chosen_spanish: sus estatutos
  alternatives_spanish:
  - sus decretos
  - sus ordenanzas
  lexicon: HALOT
  rationale: '''Estatutos'' mantiene el registro formal y el sentido normativo del término en contextos de pacto y obediencia.'
- source_word: שָׁמָרוּ
  english_pob_choice: have not kept
  chosen_spanish: no han guardado
  alternatives_spanish:
  - no han observado
  - no han custodiado
  lexicon: HALOT
  rationale: '''Guardar'' es el equivalente español más idiomático para la obediencia fiel a mandamientos y normas.'
- source_word: וַיַּתְעוּם
  english_pob_choice: have led them astray
  chosen_spanish: los han extraviado
  alternatives_spanish:
  - los han desviado
  - los han hecho errar
  lexicon: HALOT
  rationale: '''Extraviado'' conserva la idea de desvío moral/religioso de manera natural en español y se ajusta al valor causativo del verbo.'
- source_word: כִּזְבֵיהֶם
  english_pob_choice: their lies
  chosen_spanish: sus mentiras
  alternatives_spanish:
  - sus falsedades
  - sus ídolos
  lexicon: HALOT
  rationale: Se mantiene el sentido literal del sustantivo como 'mentiras/falsedades'. La posible referencia metonímica a ídolos no se impone en el texto principal.
- source_word: אֲשֶׁר הָלְכ֥וּ אֲבוֹתָ֖/ם אַחֲרֵי/הֶם
  english_pob_choice: after which their fathers walked
  chosen_spanish: tras las cuales anduvieron sus padres
  alternatives_spanish:
  - que siguieron sus padres
  - detrás de las cuales anduvieron sus padres
  lexicon: HALOT
  rationale: '''Anduvieron tras'' o ''anduvieron'' preserva el modismo hebreo de seguir una senda o culto; ''tras las cuales'' mantiene la relación relativa con ''sus mentiras''.'
theological_decisions:
- issue: Valor de לֹא אֲשִׁיבֶנּוּ en la fórmula de juicio
  english_pob_reading: Retain the idiomatic ambiguity as 'I will not turn it back' rather than specifying 'punishment' or 'wrath.'
  chosen_spanish_reading: Mantener 'no lo volveré atrás' sin explicitar el objeto.
  alternative_spanish_readings:
  - no revocaré el castigo
  - no me retractaré
  - no apartaré su juicio
  rationale: La expresión hebrea es breve y deliberadamente ambigua en la fórmula repetida de Amós. La traducción española conserva esa tensión y evita resolver lo que el texto deja implícito.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather than resolve it.'
- issue: Referente de כִּזְבֵיהֶם
  english_pob_reading: Render literally as 'their lies' in the main text.
  chosen_spanish_reading: Traducir literalmente como 'sus mentiras' en el texto principal.
  alternative_spanish_readings:
  - sus ídolos
  - sus falsos dioses
  - sus falsedades
  rationale: Aunque el contexto profético puede aludir a la idolatría, el hebreo no dice explícitamente 'ídolos'. La versión literal conserva la fuerza retórica y deja abierta la implicación cultual.
  doctrine_reference: 'Translation philosophy §1 y §3: primacía del original; preservar ambigüedad genuina.'
translation_notes:
  revision_awareness: Revisión consciente del pasaje de Amós 2:4 a la luz del texto hebreo masorético, la tabla morfológica y el audit trail inglés del POB. No se detectaron revisiones aplicadas en la fuente inglesa; se conservó la lectura de alta concordancia y se mantuvo la ambigüedad sintáctica y teológica donde el hebreo la presenta.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה.
  - Se prefirió 'ley' en el cuerpo principal y se dejó 'instrucción' como alternativa documentada.
  - '''Transgresiones'' mantiene el tono profético-covenantal sin exagerar hacia ''crímenes''.'
  - La secuencia final conserva la imagen de caminar tras algo, sin convertirla en una explicación interpretativa más amplia.
