  text: 'Y se reunieron todos los amigos de Judas y dijeron a Jonathan:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἠθροίσθησαν
  english_pob_choice: gathered together
  chosen_spanish: se reunieron
  alternatives_spanish:
  - se juntaron
  - se congregaron
  - fueron reunidos
  lexicon: LSJ
  rationale: El griego aoristo pasivo funciona aquí con sentido intransitivo de reunión. En español, «se reunieron» comunica de forma natural la acción colectiva sin añadir pasividad forzada ni un matiz eclesiástico ajeno al contexto.
- source_word: πάντες
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - cada uno de ellos
  - la totalidad de
  lexicon: LSJ
  rationale: «Todos» reproduce con claridad el valor colectivo/distributivo de πάντες y mantiene la concisión del griego.
- source_word: οἱ φίλοι
  english_pob_choice: the friends
  chosen_spanish: los amigos
  alternatives_spanish:
  - los compañeros
  - los aliados
  - los partidarios
  lexicon: LSJ
  rationale: La POB inglesa opta por el sentido literal «friends». En español, «amigos» conserva esa decisión sin expandirla hacia una lectura política que el texto griego no explicita en este versículo.
- source_word: Ἰούδου
  english_pob_choice: of Judas
  chosen_spanish: de Judas
  alternatives_spanish:
  - pertenecientes a Judas
  lexicon: LSJ
  rationale: Genitivo posesivo/asociativo normal; «de Judas» es la construcción española más directa y fiel.
- source_word: εἶπον
  english_pob_choice: said
  chosen_spanish: dijeron
  alternatives_spanish:
  - hablaron
  - les dijeron
  lexicon: LSJ
  rationale: El plural aoristo de λέγω se vierte naturalmente con «dijeron», que corresponde al habla introducida por el verbo narrativo sin sobrecarga estilística.
- source_word: τῷ Ἰωναθάν
  english_pob_choice: to Jonathan
  chosen_spanish: a Jonathan
  alternatives_spanish:
  - para Jonathan
  lexicon: LSJ
  rationale: La dative indirect object se expresa de modo estándar con «a Jonathan» en español.
translation_notes:
