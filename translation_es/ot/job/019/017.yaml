    reason: alternative_reading
  - marker: b
    text: 'Hebreo, literalmente: «a los hijos de mi cuerpo». La expresión puede referirse a los propios hijos de Job o, de manera más general, a sus parientes consanguíneos cercanos.'
    reason: cultural_note
