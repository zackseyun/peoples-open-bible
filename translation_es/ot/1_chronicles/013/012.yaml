translation:
  language: es
  text: 'Y David temió a Dios aquel día[a], diciendo: «¿Cómo puedo traer a mí el arca de Dios?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tuvo miedo de Dios»; el verbo hebreo puede expresar temor, pavor o reverencia según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּירָא
  english_pob_choice: feared
  chosen_spanish: temió
  alternatives_spanish:
  - tuvo miedo de
  - reverenció
  lexicon: HALOT
  rationale: יַרֵא en este contexto narra una reacción real de temor ante el juicio divino, no solo respeto religioso. «Temió» conserva la fuerza emocional y deja abierta la tensión reverente sin suavizarla.
- source_word: אֶת הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a Dios, el Dios
  - al Dios
  lexicon: HALOT
  rationale: En español, con «temer», el objeto directo se expresa naturalmente con «a Dios». Mantiene la referencia al Dios verdadero sin forzar una construcción poco idiomática.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: that day
  chosen_spanish: aquel día
  alternatives_spanish:
  - ese día
  - en aquel día
  lexicon: HALOT
  rationale: «Aquel día» reproduce bien la referencia temporal definida y suena natural en español bíblico contemporáneo.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: El infinitivo de խոս speech act se refleja con «diciendo», que mantiene la función introductoria del discurso directo sin expandir el texto.
- source_word: הֵיךְ
  english_pob_choice: How can
  chosen_spanish: ¿Cómo
  alternatives_spanish:
  - ¿De qué manera
  - ¿Cómo podré
  lexicon: HALOT
  rationale: La partícula interrogativa abre una pregunta de posibilidad/procedencia; en español basta «¿Cómo» y el sentido modal queda claro por el verbo siguiente.
- source_word: אָבִיא
  english_pob_choice: I bring
  chosen_spanish: traeré
  alternatives_spanish:
  - llevaré
  - haré venir
  lexicon: HALOT
  rationale: El hiphil de בוא comunica acción causativa de traer. «Traeré» es más natural en español que una traducción más analítica, y conserva la dinámica del movimiento del arca.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - para mí
  - hacia mí
  lexicon: HALOT
  rationale: El pronombre con preposición se expresa con «a mí» para mantener la dirección personal del movimiento sin añadir interpretación sobre el destino final.
- source_word: אֲרוֹן הָאֱלֹהִים
  english_pob_choice: the ark of God
  chosen_spanish: el arca de Dios
  alternatives_spanish:
  - el arca divina
  - el arca del Dios
  lexicon: HALOT
  rationale: La construcción en estado constructo se rinde de forma transparente como «el arca de Dios». Conserva el peso formal de la expresión y evita la generalización de «arca» sin especificación.
theological_decisions:
- issue: La reacción de David ante Dios tras la muerte de Uzá
  english_pob_reading: Render ירא as 'feared' to preserve genuine dread before God rather than softening to mere reverence.
  chosen_spanish_reading: «Temió» conserva el temor real ante Dios sin reducirlo a simple reverencia.
  alternative_spanish_readings:
  - «Tuvo miedo de Dios»
  - «Reverenció a Dios»
  rationale: 'El contexto inmediato es el juicio sobre Uzá; por eso conviene preservar la intensidad del temor. «Temió» mantiene la tensión teológica: David responde con temor santo, no con una explicación doctrinal ya resuelta.'
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla
- issue: Expresión del objeto divino con el verbo temer
  english_pob_reading: '''feared God'' is idiomatic and natural.'
  chosen_spanish_reading: «Temió a Dios» es idiomático y fiel al hebreo.
  alternative_spanish_readings:
  - «Tuvo temor de Dios»
  - «Sintió temor ante Dios»
  rationale: En español, el verbo «temer» pide normalmente complemento con «a». Esta elección mantiene la fuerza del original y suena natural para lectura pública.
  doctrine_reference: Fidelidad semántica e idiomaticidad
- issue: Dirección del arca hacia David
  english_pob_reading: '''to me'' leaves implicit whether the destination is David personally or his city/household, as in the Hebrew.'
  chosen_spanish_reading: «a mí» conserva la misma ambigüedad referencial que el hebreo.
  alternative_spanish_readings:
  - «a mi casa»
  - «a mi ciudad»
  rationale: El texto hebreo solo dice «a mí», y no conviene especificar el destino más allá de lo dado. La traducción debe dejar abierta la referencia personal de David.
  doctrine_reference: No añadir precisión no presente en el hebreo
translation_notes:
  revision_awareness: 'Coincide con el sentido confirmado por el contexto narrativo y el audit trail inglés: se mantiene el temor real ante Dios, la temporalidad puntual de «aquel día» y la pregunta directa sobre traer el arca.'
  spanish_consistency_notes:
  - Se conserva «Dios» como equivalente de אֱלֹהִים, sin introducir «SEÑOR» ni otras sustituciones.
  - «Arca de Dios» mantiene la transparencia del constructo y la terminología bíblica consistente.
  - La puntuación respeta el discurso directo y la pregunta retórica del hebreo.
  - Se evita ampliar la frase con explicaciones sobre la causa del temor, preservando la tensión del relato.
