translation:
  language: es
  text: 'Entonces Baruc les dijo[a]: «Él me recitaba todas estas palabras con su boca, y yo las escribía en el rollo con tinta».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Él me leía todas estas palabras de su boca, y yo las escribía en el rollo con tinta». El verbo hebreo suele significar «leer», pero aquí el contexto favorece el sentido de dictado oral.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutivo avanza la acción; «Entonces» reproduce bien la secuencia en español sin perder naturalidad.
- source_word: בָּרוּךְ
  english_pob_choice: Baruch
  chosen_spanish: Baruc
  alternatives_spanish:
  - Baruch
  lexicon: Transliteración propia
  rationale: Se conserva el nombre propio con la forma habitual en español bíblico, «Baruc», plenamente identificable y legible.
- source_word: מִפִּיו
  english_pob_choice: with his mouth
  chosen_spanish: con su boca
  alternatives_spanish:
  - de su boca
  - de su boca, oralmente
  lexicon: HALOT
  rationale: La imagen concreta del hebreo se conserva en español con «con su boca», que suena natural y mantiene el matiz corporal de la expresión.
- source_word: יִקְרָא
  english_pob_choice: would recite
  chosen_spanish: recitaba
  alternatives_spanish:
  - leía
  - proclamaba
  - dictaba
  lexicon: HALOT
  rationale: Aunque קרא suele significar «leer», el contexto favorece una recitación oral previa a la escritura. «Recitaba» preserva esa función sin imponer «dictaba», que sería más interpretativo.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: HALOT
  rationale: 'El pronombre dativo queda integrado de forma natural en español: «me recitaba».'
- source_word: אֵת כָּל הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: all these words
  chosen_spanish: todas estas palabras
  alternatives_spanish:
  - todas estas cosas
  lexicon: HALOT
  rationale: «דְּבָרִים» en este contexto se refiere a palabras pronunciadas y luego escritas; «palabras» es preciso y reproduce bien el paralelismo oral/escrito.
- source_word: וַאֲנִי כֹּתֵב
  english_pob_choice: and I was writing
  chosen_spanish: y yo las escribía
  alternatives_spanish:
  - y escribía
  - y estaba escribiéndolas
  lexicon: HALOT
  rationale: El imperfecto español comunica la acción continua/concurrente del relato. Se explicita el objeto con pronombre átono para evitar ambigüedad.
- source_word: עַל הַסֵּפֶר
  english_pob_choice: on the scroll
  chosen_spanish: en el rollo
  alternatives_spanish:
  - sobre el rollo
  - en el libro
  lexicon: HALOT
  rationale: En Jeremías 36, סֵפֶר designa un rollo de escritura, no un libro moderno; «rollo» mantiene la referencia material e histórica.
- source_word: בַּדְּיוֹ
  english_pob_choice: with ink
  chosen_spanish: con tinta
  alternatives_spanish:
  - en tinta
  lexicon: HALOT
  rationale: La preposición instrumental se vierte naturalmente como «con tinta», equivalente claro y fiel en español.
translation_notes:
  revision_awareness: Se tuvo en cuenta el cambio del borrador inglés desde «dictate» a «recite» por mayor ajuste léxico al hebreo. Por eso se evitó «dictaba» en español y se eligió «recitaba», conservando el sentido oral y la relación con la escritura simultánea.
  spanish_consistency_notes:
  - Se mantuvo «Baruc» como forma española del nombre propio.
  - 'Se preservó el contraste oral/escrito: «recitaba» / «escribía».'
  - Se usó «rollo» en lugar de «libro» por la referencia material de Jeremías 36.
  - No se introdujo terminología eclesiástica ajena al contexto.
