translation:
  language: es
  text: 'Y de los levitas: Semaías hijo de Hasub, hijo de Azricam, hijo de Hasabías, de los hijos de Merari[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de los descendientes de Merari». La expresión hebrea «hijos de» puede indicar una pertenencia clánica más amplia, aunque se conserva «hijos de Merari» en el texto principal por transparencia formal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מִן
  english_pob_choice: And from
  chosen_spanish: Y de
  alternatives_spanish:
  - De
  - Y entre
  lexicon: HALOT
  rationale: La conjunción inicial mantiene la continuidad con la lista anterior, y «de» expresa el origen o pertenencia indicado por מִן en un registro genealógico. «Y de» resulta natural en español y conserva la fuerza aditiva del hebreo.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levitas de la tribu de Leví
  - los levíticos
  lexicon: HALOT
  rationale: «Levitas» es la forma establecida y clara en español para el grupo tribal/clánico. Mantiene la referencia al cuerpo levítico sin añadir expansión interpretativa.
- source_word: שְׁמַעְיָה
  english_pob_choice: Shemaiah
  chosen_spanish: Semaías
  alternatives_spanish:
  - Shemaías
  - Semaia
  lexicon: Transliteration convention
  rationale: Se usa la forma hispana convencional del nombre propio, coherente con la tradición bíblica en español y legible para lectores de iglesia.
- source_word: בֶן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: En una cadena genealógica, «hijo de» reproduce con transparencia la relación expresada por בן. «Descendiente de» sería posible, pero aquí la secuencia nominal favorece la filiación inmediata en la forma del registro.
- source_word: חַשּׁוּב
  english_pob_choice: Hasshub
  chosen_spanish: Hasub
  alternatives_spanish:
  - Jasub
  - Hasub
  lexicon: Transliteration convention
  rationale: El hebreo muestra consonante geminada, pero en español se prefiere la transliteración convencional breve y fluida. Se conserva el nombre propio sin forzar una duplicación gráfica poco natural.
- source_word: עַזְרִיקָם
  english_pob_choice: Azrikam
  chosen_spanish: Azricam
  alternatives_spanish:
  - Asricam
  - Azrikán
  lexicon: Transliteration convention
  rationale: Se adapta al español con la vocalización y ortografía habituales para nombres bíblicos, manteniendo la forma reconocible del antropónimo.
- source_word: חֲשַׁבְיָה
  english_pob_choice: Hashabiah
  chosen_spanish: Hasabías
  alternatives_spanish:
  - Jasabías
  - Hasabia
  lexicon: Transliteration convention
  rationale: Se emplea la forma castellana tradicional del nombre, consistente con la pronunciación hispana y la práctica bíblica en español.
- source_word: מִן בְּנֵי מְרָרִי
  english_pob_choice: from the sons of Merari
  chosen_spanish: de los hijos de Merari
  alternatives_spanish:
  - de los descendientes de Merari
  - de la casa de Merari
  lexicon: HALOT
  rationale: La expresión hebrea puede señalar filiación amplia de clan. «Hijos» conserva la literalidad del texto y, en español, puede abarcar pertenencia genealógica/clánica sin perder la transparencia formal.
theological_decisions:
- issue: Alcance genealógico de «hijos de Merari»
  english_pob_reading: from the sons of Merari, with footnote allowing broader clan lineage
  chosen_spanish_reading: de los hijos de Merari, con posibilidad implícita de linaje clánico más amplio
  alternative_spanish_readings:
  - de los descendientes de Merari
  - de la casa de Merari
  rationale: El hebreo בן / בני puede referirse a filiación inmediata o a pertenencia de clan. El texto principal conserva la fórmula literal, y la ambigüedad queda disponible para lectura contextual, sin borrar la tensión documental señalada por el audit trail inglés.
  doctrine_reference: Genealogía/clan en textos históricos del AT; cf. uso amplio de בן en contextos de linaje.
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia entre el texto fuente y la versión inglesa final, sin revisiones aplicadas ni cambios pendientes. La traducción española sigue esa lectura estable y preserva la nota de ambigüedad genealógica donde el hebreo lo permite.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se usa «hijo de» de manera uniforme para la cadena genealógica, reservando «descendiente de» para la nota alternativa.
  - Los nombres propios se hispanizan de forma convencional para legibilidad eclesial, sin alterar la identidad referencial.
  - Se preserva la estructura enumerativa del hebreo sin introducir conectores interpretativos adicionales.
