translation:
  language: es
  text: Forraje y vara y cargas para un asno[a]; pan y disciplina y trabajo para un esclavo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un sirviente de la casa». El griego οἰκέτῃ designa a una persona del ámbito doméstico en condición servil; aquí «esclavo» preserva ese sentido ligado.
    reason: lexical_alternative
lexical_decisions:
- source_word: χορτάσματα
  english_pob_choice: fodder
  chosen_spanish: forraje
  alternatives_spanish:
  - pasto
  - pienso
  lexicon: LSJ
  rationale: El plural griego se refiere a comida para animales, no a alimento humano. «Forraje» conserva esa concreción en español y suena natural en este contraste proverbiale.
- source_word: ῥάβδος
  english_pob_choice: rod
  chosen_spanish: vara
  alternatives_spanish:
  - cetro
  - bastón
  - palo
  lexicon: LSJ
  rationale: «Vara» reproduce la imagen concreta de una vara para corrección o control, sin añadir más interpretación que el griego y con buen uso en español.
- source_word: φορτία
  english_pob_choice: loads
  chosen_spanish: cargas
  alternatives_spanish:
  - pesos
  - bultos
  lexicon: LSJ
  rationale: El plural designa lo que lleva un asno. «Cargas» es la equivalencia más directa y mantiene la fuerza concreta del sustantivo griego.
- source_word: ὄνῳ
  english_pob_choice: a donkey
  chosen_spanish: un asno
  alternatives_spanish:
  - un burro
  - el asno
  lexicon: LSJ
  rationale: «Asno» corresponde bien al animal del proverbio y evita el matiz más coloquial de «burro». El artículo indefinido refleja el griego anartro.
- source_word: ἄρτος
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - alimento
  - comida
  lexicon: LSJ
  rationale: El griego dice literalmente «pan». Mantener «pan» conserva el paralelismo concreto con los otros elementos de la línea.
- source_word: παιδεία
  english_pob_choice: discipline
  chosen_spanish: disciplina
  alternatives_spanish:
  - instrucción
  - corrección
  - formación
  lexicon: LSJ
  rationale: En este contexto sapiencial, junto con pan y trabajo, la palabra incluye corrección formativa. «Disciplina» preserva esa amplitud mejor que una mera «instrucción».
- source_word: ἔργον
  english_pob_choice: work
  chosen_spanish: trabajo
  alternatives_spanish:
  - labor
  - tarea
  lexicon: LSJ
  rationale: «Trabajo» es el equivalente más claro y natural para esta obligación doméstica.
- source_word: οἰκέτῃ
  english_pob_choice: a slave
  chosen_spanish: un esclavo
  alternatives_spanish:
  - un siervo
  - un sirviente de la casa
  - un criado
  lexicon: LSJ
  rationale: El audit trail inglés opta por «slave» para preservar el estatus ligado de οἰκέτης. En español, «esclavo» mantiene ese sentido de subordinación vinculada al hogar mejor que «siervo» o «sirviente».
theological_decisions:
- issue: Sentido social de οἰκέτῃ en un proverbio doméstico
  english_pob_reading: a slave
  chosen_spanish_reading: un esclavo
  alternative_spanish_readings:
  - un siervo
  - un sirviente de la casa
  rationale: La frase describe la organización jerárquica del hogar antiguo. «Esclavo» conserva la realidad social dura que el proyecto evita suavizar cuando el vínculo servil es relevante.
  doctrine_reference: 'DOCTRINE.md: términos controvertidos sobre el lenguaje servil en contextos de dependencia doméstica'
translation_notes:
  revision_awareness: No se registran revisiones aplicadas; el pasaje llega con acuerdo alto (0.95) y sin cambios en el último pase.
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo concreto de la línea griega: dos tríadas nominales separadas por punto y coma.'
  - Se evitó «SEÑOR» u otras sustituciones no pertinentes; no hay aquí el tetragrámaton ni κύριος en el texto base.
  - Se prefirió vocabulario sobrio y actual («forraje», «cargas», «disciplina») sin diluir la fuerza proverbial del original.
