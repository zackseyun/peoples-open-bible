translation:
  language: es
  text: A Aarón le nacieron Nadab y Abiú[a], Eleazar e Itamar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «A Aarón nació Nadab y Abiú, Eleazar e Itamar», con un verbo singular y una lista compuesta en una fórmula genealógica.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּוָּלֵד
  english_pob_choice: were born
  chosen_spanish: le nacieron
  alternatives_spanish:
  - nacieron
  - fueron nacidos
  lexicon: HALOT
  rationale: El hebreo usa un nifal con sentido pasivo/resultativo dentro de una fórmula genealógica. En español, «le nacieron» conserva la relación de filiación expresada por לְאַהֲרֹן y evita una pasiva forzada. «Nacieron» sería más simple, pero perdería el dativo relacional; «fueron nacidos» suena antinatural.
- source_word: לְאַהֲרֹן
  english_pob_choice: to Aaron
  chosen_spanish: A Aarón
  alternatives_spanish:
  - para Aarón
  - de Aarón
  lexicon: HALOT
  rationale: La preposición ל en este uso genealógico marca la persona a la que pertenecen los hijos en la formulación idiomática. «A Aarón» reproduce de manera natural esa relación en español; «para Aarón» o «de Aarón» introducirían matices menos precisos o menos idiomáticos.
- source_word: נָדָב
  english_pob_choice: Nadab
  chosen_spanish: Nadab
  lexicon: transliteración estándar de nombre propio
  rationale: Se conserva el nombre propio como transliteración estable, sin traducción semántica.
- source_word: אֲבִיהוּא
  english_pob_choice: Abihu
  chosen_spanish: Abiú
  alternatives_spanish:
  - Abihú
  lexicon: transliteración estándar de nombre propio
  rationale: Se usa la forma castellana más reconocible y bíblica en español, «Abiú», manteniendo el nombre propio sin trasladarlo a una forma interpretativa. «Abihú» es una alternativa viable pero menos asentada.
- source_word: אֶלְעָזָר
  english_pob_choice: Eleazar
  chosen_spanish: Eleazar
  lexicon: transliteración estándar de nombre propio
  rationale: Nombre propio conservado por transliteración.
- source_word: אִיתָמָר
  english_pob_choice: Ithamar
  chosen_spanish: Itamar
  alternatives_spanish:
  - Ithamar
  lexicon: transliteración estándar de nombre propio
  rationale: Se conserva el nombre propio con la forma española usual «Itamar», más natural para lectura bíblica en español que la transliteración inglesa «Ithamar».
theological_decisions:
- issue: Fórmula genealógica con verbo singular y lista plural
  english_pob_reading: Hebrew literally, 'To Aaron was born Nadab and Abihu, Eleazar and Ithamar,' using a singular verb with a compound list in a genealogical formula.
  chosen_spanish_reading: 'La frase se vierte con una estructura natural en español, pero manteniendo el sentido genealógico singular del hebreo: «A Aarón le nacieron…».'
  alternative_spanish_readings:
  - A Aarón nació Nadab y Abiú, Eleazar e Itamar.
  - A Aarón fueron nacidos Nadab y Abiú, Eleazar e Itamar.
  rationale: El hebreo presenta una construcción idiomática donde un verbo singular introduce una lista de hijos. En español, la forma más clara y fiel es conservar la relación de dativo y el sentido genealógico con «le nacieron», sin convertirlo en una activa de paternidad ni en una pasiva artificiosa.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El texto base en inglés usa «were born» para resolver idiomáticamente el hebreo singular con lista plural. La versión española sigue esa misma decisión de equivalencia óptima, pero ajusta la sintaxis para que el dativo genealógico suene natural en español («le nacieron»). No se detectan revisiones posteriores ni cambios pendientes en el paquete fuente.
  spanish_consistency_notes:
  - Se mantiene la transliteración de nombres propios de manera consistente con el resto del proyecto.
  - No se usa «SEÑOR» ni terminología teológica ajena al versículo, porque el texto no incluye el nombre divino.
  - Se conserva el valor genealógico del hebreo sin sobreexplicar ni añadir relaciones no presentes en el original.
