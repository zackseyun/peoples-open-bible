review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: informe a David, repetición de «bajar a su/tu casa», y la doble pregunta de David. También conserva adecuadamente el sentido idiomático de מִדֶּרֶךְ como «de un viaje». Sin embargo, hay ajustes necesarios de fidelidad verbal y naturalidad temporal.'
  spanish_quality_summary: 'El español es claro y digno, pero presenta dos problemas principales: «Les informaron a David» es gramaticalmente incorrecto o al menos torpe en este contexto, porque el hebreo no tiene objeto indirecto plural; debe ser «Le informaron a David» o mejor «Le dijeron a David». Además, la secuencia verbal «no había bajado… ¿No vienes…? ¿Por qué no has bajado…?» mezcla tiempos de manera poco natural para la escena narrativa. Conviene unificar con pretérito simple en el reporte y perfecto compuesto en la pregunta, o usar perfecto en ambas preguntas; la opción más natural y fiel aquí es «no bajó… ¿No has venido…? ¿Por qué no bajaste…?»'
  glossary_alignment: No hay términos del glosario teológico principal en juego. Se preserva correctamente «casa» para בַּיִת y «bajar» para ירד, en línea con la política del proyecto de mantener el idiomatismo visible. La nota sobre «del camino» / «de un viaje» está bien orientada.
  issues:
  - severity: high
    issue: «Les informaron a David» usa un clítico plural no respaldado por el hebreo y suena incorrecto en español estándar.
    rationale: וַיַּגִּדוּ לְדָוִד significa «le dijeron/informaron a David», con David como destinatario singular. «Les informaron a David» introduce un plural ajeno al texto y degrada la calidad del español.
  - severity: medium
    issue: El pluscuamperfecto «no había bajado» no es la mejor representación del perfecto narrativo hebreo aquí.
    rationale: לֹא יָרַד reporta sencillamente el hecho narrado; en español bíblico-natural, «no bajó» transmite mejor la noticia reportada sin añadir anterioridad innecesaria.
  - severity: medium
    issue: «¿No vienes de un viaje?» suena menos natural que «¿No has venido de un viaje?» en este contexto inmediato.
    rationale: בָא en esta pregunta mira a la llegada reciente de Urías. El perfecto compuesto español expresa mejor esa venida recién realizada que el presente simple.
  - severity: medium
    issue: «¿Por qué no has bajado a tu casa?» puede sonar menos idiomático que «¿Por qué no bajaste a tu casa?» tras una llegada ya completada.
    rationale: El hebreo usa perfecto 2ms en una pregunta sobre una acción no realizada tras haber llegado. El pretérito simple español encaja mejor en la narración y evita una mezcla temporal innecesaria.
  revised_spanish_text: 'Le informaron a David[a], diciendo: «Urías no bajó a su casa». Entonces David le dijo a Urías[b]: «¿No has venido de un viaje? ¿Por qué no bajaste a tu casa?»'
