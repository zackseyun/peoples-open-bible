translation:
  language: es
  text: Partieron del monte Shefer[a] y acamparon en Haradá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Shapher», como variante posible del nombre de lugar שָׁפֶר.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְעוּ
  english_pob_choice: They set out
  chosen_spanish: Partieron
  alternatives_spanish:
  - Se pusieron en marcha
  - Salieron
  - Journaron
  lexicon: HALOT
  rationale: En la fórmula de itinerario del desierto, נסע expresa el desplazamiento de un campamento a otro. «Partieron» comunica el movimiento de salida de forma natural en español y conserva el valor narrativo del hebreo sin sobrecargarlo con un calco.
- source_word: מֵהַר
  english_pob_choice: from Mount
  chosen_spanish: de el monte
  alternatives_spanish:
  - desde el monte
  - del monte
  - de la montaña
  lexicon: HALOT
  rationale: El hebreo usa מן + הַר, una construcción de procedencia. En español, «de el monte» conserva con claridad el sustantivo geográfico del hebreo; la forma contracta «del» sería idiomática, pero aquí se mantiene la segmentación para reflejar el encabezamiento topográfico del texto fuente.
- source_word: שָׁפֶר
  english_pob_choice: Shepher
  chosen_spanish: Shéfer
  alternatives_spanish:
  - Shefer
  - Shapher
  lexicon: HALOT
  rationale: Es un nombre de lugar y debe transliterarse. «Shéfer» sigue de cerca la vocalización hebrea y mantiene la distinción frente a la variante inglesa «Shapher», que se preserva como alternativa de lectura/transliteración.
- source_word: וַיַּחֲנוּ
  english_pob_choice: and camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - y acamparon
  - y plantaron el campamento
  - y acamparon allí
  lexicon: HALOT
  rationale: חנה en estos itinerarios designa establecer el campamento. «Acamparon» es una equivalencia clara y actual en español; evita el arcaísmo de «acamparon» con enlace redundante y conserva el sentido de instalación temporal.
- source_word: בַּחֲרָדָה
  english_pob_choice: at Haradah
  chosen_spanish: en Haradá
  alternatives_spanish:
  - en Haradah
  - a Haradá
  - en la Haradá
  lexicon: HALOT
  rationale: La preposición ב con un topónimo en un registro de viaje se rinde naturalmente como «en» o «a». «En Haradá» funciona bien en español para el lugar de parada y preserva el nombre propio como topónimo transliterado.
translation_notes:
  revision_awareness: El texto inglés POB y el audit trail no introducen cambios textuales ni revisiones aplicadas para este versículo; la concordancia general es alta y no hay variantes teológicas pendientes. La versión española sigue ese mismo estado estable, limitándose a decisiones léxicas y de transliteración.
  spanish_consistency_notes:
  - Se mantiene una traducción sobria y de registro bíblico moderno, sin recurrir a «SEÑOR» ni a formulaciones interpretativas no presentes en el hebreo.
  - Los nombres propios se transliteran de manera consistente como topónimos; la nota de variante se deja únicamente para el posible caso de lectura «Shapher».
  - 'Se conserva la estructura narrativa de dos movimientos consecutivos: salida y acampada.'
