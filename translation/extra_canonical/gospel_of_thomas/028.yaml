greek_overlap_decision:
  witness: POxy 1 (Sayings 26–33)
  agreement: aligned
  chosen_basis: coptic
  rationale: 'The Oxyrhynchus fragment preserves the opening sequence closely: standing
    in the midst, appearing in flesh, finding all drunk, and finding not one thirsting;
    and the grief over the sons of men because they are blind in heart and do not
    see. It breaks off thereafter. Our translation follows the complete Coptic text;
    where the Coptic’s ‘not one thirsting’ clause is syntactically compressed, the
    Greek supports this reading.'
synoptic_parallel_check:
  handling: context_only
  rationale: No direct Synoptic parallel; imagery of thirst and blindness recalls
    broader biblical themes (e.g., ‘hunger and thirst for righteousness’), but Thomas’s
    sequence and punchline about casting off wine to repent are distinct.
