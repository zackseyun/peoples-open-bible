base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_maccabees/004/030.yaml
  text: And when he saw that the camp was strong[a], he prayed and said, “Blessed are you, O Savior of Israel, who crushed the assault of the mighty one by the hand of your slave David[b], and gave the camp of the foreigners into the hands of Jonathan son of Saul and of the one who carried his armor.”
  footnotes:
  - marker: a
    text: Or 'your servant David.' The Greek word is δοῦλος, which can mean either 'slave' or 'servant' depending on context.
    reason: lexical_alternative
  - marker: b
    text: The prayer alludes to the story of David and Goliath, and to Jonathan with his armor-bearer in battle; the Greek here says 'the mighty man' and 'the foreigners' rather than naming them explicitly.
    reason: cross_reference
