translation:
  language: es
  text: Y las demás cosas que nos pertenecen de ahora en adelante—los diezmos y los impuestos que nos pertenecen, y las lagunas de sal[a], y las coronas que nos pertenecen[b]—se las concederemos todas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las salinas» o «las explotaciones de sal»; el griego dice literalmente «las lagunas de sal», probablemente refiriéndose a recursos de producción de sal o a sus ingresos.
    reason: lexical_alternative
  - marker: b
    text: Literalmente «coronas». En este contexto fiscal puede referirse a un tributo o pago honorífico acostumbrado debido al rey.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ ἄλλα
  english_pob_choice: the other things
  chosen_spanish: las demás cosas
  alternatives_spanish:
  - las otras cosas
  - el resto de las cosas
  - las cosas restantes
  lexicon: LSJ
  rationale: La frase abre una lista administrativa amplia y no precisa. «Las demás cosas» conserva el sentido abierto y natural en español, sin sobreespecificar.
- source_word: ἀνήκοντα ἡμῖν / τῶν ἀνηκόντων ἡμῖν / τοὺς ἀνήκοντας ἡμῖν
  english_pob_choice: belonging to us
  chosen_spanish: que nos pertenecen
  alternatives_spanish:
  - que nos corresponden
  - que son nuestros
  - debidos a nosotros
  lexicon: LSJ
  rationale: El participio repetido marca derechos o ingresos reales. «Que nos pertenecen» mantiene la fuerza posesiva y jurídica de forma clara en español.
- source_word: ἀπὸ τοῦ νῦν
  english_pob_choice: from now on
  chosen_spanish: desde ahora
  alternatives_spanish:
  - de ahora en adelante
  - desde este momento
  - en adelante
  lexicon: LSJ
  rationale: Expresa el inicio inmediato del decreto con una fórmula natural y solemne en español.
- source_word: δεκατῶν
  english_pob_choice: tithes
  chosen_spanish: los diezmos
  alternatives_spanish:
  - las décimas
  - los diezmos tributarios
  lexicon: LSJ
  rationale: «Diezmos» es el equivalente normal y conserva el matiz fiscal-religioso del término sin perder inteligibilidad.
- source_word: τελῶν
  english_pob_choice: taxes
  chosen_spanish: los impuestos
  alternatives_spanish:
  - los tributos
  - los derechos
  - las tasas
  lexicon: LSJ
  rationale: Aquí el término cubre gravámenes o rentas de tipo fiscal; «impuestos» es el término español más amplio y transparente.
- source_word: τὰς τῶν ἁλῶν λίμνας
  english_pob_choice: the salt lakes
  chosen_spanish: las lagunas de sal
  alternatives_spanish:
  - los lagos de sal
  - las salinas
  - las lagunas saladas
  lexicon: LSJ
  rationale: La expresión griega es literal, pero en español «lagunas de sal» resulta más natural que un calco rígido, manteniendo la imagen de recursos salinos. La ambigüedad comercial/fiscal queda preservada en la nota.
- source_word: στεφάνους
  english_pob_choice: crowns
  chosen_spanish: las coronas
  alternatives_spanish:
  - los coronas
  - el tributo de corona
  - la corona-tributo
  lexicon: LSJ
  rationale: Se conserva el sentido literal de «coronas» para transparencia textual, ya que el contexto administrativo puede implicar una forma de tributo o pago honorífico.
- source_word: πάντα ἐπαρκέσομεν αὐτοῖς
  english_pob_choice: we will grant all these to them
  chosen_spanish: se las concederemos todas a ellos
  alternatives_spanish:
  - se las entregaremos todas
  - se las remitiremos todas
  - se las otorgaremos todas
  lexicon: LSJ
  rationale: «Conceder» refleja el acto de transferencia o remisión de derechos/recaudos en un contexto real. La duplicación «todas» preserva el alcance total del griego.
translation_notes:
  revision_awareness: 'La redacción española sigue el estado revisado del inglés auditado: mantiene la enumeración completa, conserva la repetición de «que nos pertenecen» para reflejar el participio griego reiterado, y vierte el cierre administrativo con «se las concederemos todas a ellos», en línea con la decisión inglesa de «grant all these to them».'
  spanish_consistency_notes:
  - Se usa «diezmos» y «impuestos» como equivalentes fiscales generales, coherentes con la convención POB para este pasaje.
  - Se mantiene «lagunas de sal» con nota alternativa porque el griego es literal y puede aludir a salinas o a derechos sobre producción de sal.
  - Se conserva «coronas» en el texto principal para no borrar la tensión entre literalidad y posible sentido tributario.
  - La expresión «desde ahora» funciona como equivalente natural de ἀπὸ τοῦ νῦν sin introducir matices no presentes en el griego.
