revisions:
- from: Entonces el rey Roboam envió a Hadoram[a], que estaba encargado de la leva[b], pero los hijos de Israel lo apedrearon, y murió. Y el rey Roboam se apresuró[c] a subir al carro para huir a Jerusalén.
  to: Entonces el rey Roboam envió a Hadoram[a], que estaba encargado del trabajo forzado[c], pero los hijos de Israel[b] lo apedrearon, y murió. Y el rey Roboam se apresuró[d] a subir al carro para huir a Jerusalén.
  rationale: Se reemplaza «la leva» por «el trabajo forzado» para comunicar con claridad el sentido de מַס en español moderno y evitar la ambigüedad con reclutamiento militar. Se añade la nota [b] para preservar la alternativa documentada de «los israelitas». También se rehace la nota [d] para reflejar mejor la relación entre la traducción contextual «se apresuró» y la expresión hebrea más literal.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:09:59Z'
