revisions:
- from: 'Entonces Saúl envió a los mensajeros para ver a David[a], diciendo: «Subidlo hacia mí en la cama, para que yo lo mate».'
  to: 'Entonces Saúl envió a los mensajeros para ver a David[a], diciendo: «Tráiganmelo en la cama, para que yo le dé muerte».'
  rationale: Se reemplaza «Subidlo hacia mí» por «Tráiganmelo» para producir un español natural y neutral, sin perder el sentido de traslado hacia la presencia de Saúl. Se mantiene «en la cama» con la nota léxica ya documentada. Se ajusta «para que yo lo mate» a «para que yo le dé muerte» para reflejar mejor el tono formal y grave del mandato real, en línea con la decisión inglesa auditada.
