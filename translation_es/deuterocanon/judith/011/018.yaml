translation:
  language: es
  text: Y cuando yo venga[a], te abriré el camino delante de ti, y saldrás con toda tu fuerza, y no hay nadie entre ellos que pueda resistirte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «te abriré por adelantado». El verbo griego puede significar abrir de antemano; «el camino» se sobreentiende por el contexto más que por una palabra explícita.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλθοῦσα
  english_pob_choice: when I come
  chosen_spanish: cuando yo venga
  alternatives_spanish:
  - al venir yo
  - cuando haya venido
  lexicon: LSJ
  rationale: El participio aoristo femenino singular se refiere a Judit. En español, una cláusula temporal futura natural conserva la secuencia del griego sin volver la frase pesada.
- source_word: προανοίσω
  english_pob_choice: I will open the way before you
  chosen_spanish: te abriré el paso delante de ti
  alternatives_spanish:
  - te abriré antes
  - te abriré el camino delante de ti
  lexicon: LSJ
  rationale: El verbo compuesto indica abrir de antemano o por delante. En español, 'abrir el paso' expresa la idea militar y contextual de facilitar el avance sin forzar un objeto explícito que el griego no nombra.
- source_word: ἐξελεύσῃ
  english_pob_choice: you will go out
  chosen_spanish: saldrás
  alternatives_spanish:
  - irás afuera
  - saldrás marchando
  lexicon: LSJ
  rationale: El futuro medio de ἐξέρχομαι se rinde con el verbo básico 'salir', claro y fiel. No se añade 'marchando' porque el griego permite una formulación más amplia.
- source_word: σὺν πάσῃ τῇ δυνάμει σου
  english_pob_choice: with all your force
  chosen_spanish: con toda tu fuerza
  alternatives_spanish:
  - con todo tu ejército
  - con todo tu poder
  lexicon: LSJ
  rationale: δύναμις aquí puede abarcar fuerza, poder o capacidad militar. 'Fuerza' conserva la amplitud semántica y suena natural en español; 'ejército' estrecharía demasiado el término.
- source_word: οὐκ ἔστιν ὃς ἀντιστήσεταί σοι
  english_pob_choice: there is none ... who will stand against you
  chosen_spanish: no hay nadie ... que pueda resistirte
  alternatives_spanish:
  - nadie ... se te opondrá
  - no habrá quien se te enfrente
  lexicon: LSJ
  rationale: ἀνθίστημι significa 'ponerse en contra', 'resistir', 'oponerse'. En español, 'resistirte' comunica bien la oposición hostil y mantiene el tono militar; se evita una paráfrasis excesiva.
- source_word: ἐξ αὐτῶν
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - de entre ellos
  - de ellos
  lexicon: LSJ
  rationale: El valor partitivo se expresa de manera natural con 'entre ellos', que reproduce la idea de nadie dentro del grupo enemigo sin añadir matices ajenos al texto.
translation_notes:
  revision_awareness: El texto griego y el aparato inglés coinciden de forma sustancial. Se preservó la ambigüedad útil de προανοίσω con una formulación española idiomática, sin introducir un objeto demasiado específico que no esté en el griego. No se requieren revisiones textuales adicionales.
  spanish_consistency_notes:
  - Se mantuvo 'fuerza' para δύναμις, coherente con una escena militar y con el alcance semántico del término.
  - Se tradujo ἀντιστήσεταί con 'resistirte' para conservar la idea de oposición activa sin sobreinterpretar con un verbo más técnico.
  - Se evitó 'SEÑOR' u otras sustituciones teológicas porque el versículo no contiene el nombre divino ni una cita del tetragrama.
