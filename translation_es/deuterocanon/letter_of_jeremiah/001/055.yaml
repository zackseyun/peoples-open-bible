translation:
  language: es
  text: Pero ciertamente no resistirán a reyes o enemigos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Βασιλεῖ
  english_pob_choice: kings
  chosen_spanish: un rey
  alternatives_spanish:
  - reyes
  - el rey
  - un gobernante
  lexicon: LSJ
  rationale: El dativo singular griego puede funcionar de modo genérico o distributivo; en español, «un rey» conserva bien el valor no específico y evita imponer plural donde el griego no lo exige de forma estricta. Dado el paralelismo con «enemigos», la construcción con artículo indefinido resulta natural y fiel.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: LSJ
  rationale: Marca contraste suave con la afirmación anterior sobre la impotencia de los ídolos. «Pero» expresa la oposición de manera directa y natural en español.
- source_word: καὶ πολεμίοις
  english_pob_choice: or enemies
  chosen_spanish: ni a enemigos
  alternatives_spanish:
  - y a enemigos
  - o a enemigos
  - ni a sus enemigos
  lexicon: LSJ
  rationale: 'Aunque καί coordina en griego, el contexto de negación enfática con οὐ μή en español se vuelve más idiomático con una coordinación negativa: «ni... ni...». Se conserva el segundo término como plural genérico, sin añadir posesivo ni especificación no presente en el original.'
- source_word: οὐ μὴ
  english_pob_choice: will certainly not
  chosen_spanish: ciertamente no
  alternatives_spanish:
  - de ningún modo
  - nunca
  lexicon: BDAG
  rationale: La negación enfática se refleja con «ciertamente no», que comunica fuerza y claridad sin sonar arcaica.
- source_word: ἀντιστῶσιν
  english_pob_choice: withstand
  chosen_spanish: resistirán
  alternatives_spanish:
  - se opondrán
  - harán frente
  lexicon: BDAG
  rationale: «Resistir» transmite bien la idea de hacer frente u oponerse a una autoridad o fuerza superior. En español suena más natural que una repetición literal de «estar en contra» y conserva la incapacidad de oposición implicada por ἀντιστῆναι.
theological_decisions:
- issue: Alcance concreto de la impotencia de los ídolos
  english_pob_reading: A straightforward assertion that idols cannot resist human political or military powers.
  chosen_spanish_reading: Una afirmación directa de que los ídolos no pueden resistir a poderes humanos concretos, como un rey o enemigos.
  alternative_spanish_readings:
  - Una declaración general sobre la impotencia total ante cualquier amenaza
  - Una imagen más amplia de la incapacidad de los ídolos frente al poder
  rationale: El griego nombra agentes concretos. Por fidelidad al texto fuente y al trazado auditado en inglés, no se amplía el sentido a una paráfrasis generalizante. La formulación española mantiene el referente político-militar inmediato.
  doctrine_reference: Principio de primacía del texto original; no paraprasear más allá de lo que el fuente evidencia.
translation_notes:
  revision_awareness: El texto inglés auditado pasó de «a king» a «kings» para reflejar el valor genérico/distributivo del dativo singular griego junto con el plural «enemies». En español se opta por «un rey» porque el indefinido conserva naturalmente ese valor genérico sin forzar el plural, y la coordinación negativa con «ni a enemigos» mantiene el paralelismo y la fuerza de la negación enfática.
  spanish_consistency_notes:
  - Se mantiene «Pero» para δὲ en contraste suave.
  - Se evita «SEÑOR» o equivalentes litúrgicos porque no aparecen en este versículo.
  - La negación enfática se expresa con una construcción natural en español y no con un calco rígido.
  - «Resistir» se usa como equivalente estable de ἀντιστῆναι en este contexto de oposición a autoridad y amenaza.
