revisions:
- from: Si has corrido con los de a pie y te han cansado[a], ¿cómo competirás con los caballos? Y si en tierra de paz estás seguro, ¿qué harás en la espesura del Jordán?[b]
  to: Si has corrido con hombres de a pie y te han cansado, ¿cómo competirás con los caballos? Y si en tierra de paz estás seguro, ¿qué harás en la espesura del Jordán?[a]
  rationale: Se reemplaza «los de a pie» por «hombres de a pie» para un registro más digno y claro. Se elimina la nota sobre «te han cansado» porque no responde a una ambigüedad que el expediente inglés haya decidido preservar; se mantiene únicamente la nota necesaria sobre la expresión debatida «la espesura del Jordán».
