base_translation:
  language: en
  yaml_path: translation/ot/genesis/047/009.yaml
  text: And Jacob said to Pharaoh[a], “The days of the years of my sojourning are one hundred thirty years. Few and evil have been the days of the years of my life[b], and they have not attained to the days of the years of the lives of my fathers in the days of their sojourning.”
  footnotes:
  - marker: a
    text: Or “my pilgrimage … their pilgrimage.” The Hebrew term refers to living as a temporary resident or foreigner.
    reason: lexical_alternative
  - marker: b
    text: Or 'The days of the years of my life have been few and hard'.
    reason: previous_rendering
