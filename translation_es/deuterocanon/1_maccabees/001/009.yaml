revisions:
- from: Y todos se pusieron[a] coronas después de su muerte, y sus hijos después de ellos durante muchos años; y multiplicaron los males en la tierra.
  to: Y todos se pusieron[a] coronas después de su muerte, y sus hijos después de ellos durante muchos años; y multiplicaron los males[b] en el país.
  rationale: Se añade la nota b para preservar la amplitud semántica documentada en el POB inglés para κακὰ/ἐπλήθυναν, y se ajusta 'en la tierra' a 'en el país' para reflejar mejor el sentido histórico-político de ἐν τῇ γῇ en 1 Macabeos y sonar más natural en español contemporáneo legible en iglesia.
