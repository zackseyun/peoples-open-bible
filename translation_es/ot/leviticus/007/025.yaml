revisions:
- from: Porque cualquiera que coma grasa de un animal, de aquel del cual se presenta una ofrenda encendida[a] a Yahvé, esa persona[b] que la come será cortada de entre su pueblo.
  to: Porque cualquiera que coma grasa de un animal del cual se presenta una ofrenda hecha por fuego[a] a Yahvé, la persona[b] que la coma será cortada de entre su pueblo.
  rationale: Se corrige una construcción poco natural ('de aquel del cual') para reflejar con mayor fidelidad y claridad el relativo hebreo. También se ajusta אִשֶּׁה a 'ofrenda hecha por fuego', en línea con la justificación lexical documentada en el POB en inglés. Por último, se elimina el deíctico innecesario de 'esa persona' para mantener un tono legal más neutro y natural en español.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:27:04Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido general del hebreo: causalidad inicial, prohibición de comer la grasa, referencia a un animal del que se presenta una ofrenda a Yahvé, y la fórmula penal ''será cortada de entre su pueblo''. También respeta la decisión del proyecto de usar ''Yahvé''. Sin embargo, una frase central queda poco fiel y poco natural: ''de aquel del cual se presenta'' introduce un demostrativo innecesario y una construcción enrevesada no motivada por el hebreo. Además, ''ofrenda encendida'' no comunica con suficiente claridad el valor de אִשֶּׁה comparado con la documentación inglesa; ''ofrenda hecha por fuego'' o similar preserva mejor la idea.'
  spanish_quality_summary: El español es en general comprensible y digno, pero hay dos tropiezos importantes de estilo y claridad. 'De aquel del cual se presenta' suena forzado y poco idiomático. 'Esa persona' es entendible, pero añade énfasis deíctico no presente en el original; 'la persona que la coma' o 'la persona que la come' es más limpio. El resto del versículo fluye bien.
  glossary_alignment: Alineación buena con los términos del proyecto en 'Yahvé', 'grasa' y la preservación de 'será cortada'. No hay conflicto terminológico mayor. La principal mejora es ajustar אִשֶּׁה a 'ofrenda hecha por fuego' para reflejar mejor la justificación lexical documentada en el audit trail.
  issues:
  - severity: medium
    issue: Construcción 'de aquel del cual se presenta'
    rationale: El hebreo מִן הַבְּהֵמָה אֲשֶׁר יַקְרִיב מִמֶּנָּה significa 'de un animal del cual/de que se presenta/ofrece ...', sin el demostrativo 'aquel'. La forma actual suena antinatural y complica innecesariamente la lectura.
  - severity: medium
    issue: '''Ofrenda encendida'' para אִשֶּׁה'
    rationale: Aunque intenta conservar la relación con el fuego, en español moderno bíblico 'ofrenda encendida' no es la formulación más clara ni la mejor apoyada por la nota inglesa. 'Ofrenda hecha por fuego' refleja mejor la documentación y sigue siendo inteligible.
  - severity: low
    issue: '''esa persona'' añade un matiz deíctico'
    rationale: הַנֶּפֶשׁ הָאֹכֶלֶת identifica al infractor legalmente, pero no señala 'esa' persona en contraste con otra. 'La persona que la coma' mantiene mejor el tono jurídico neutral.
  revised_spanish_text: Porque cualquiera que coma grasa de un animal del cual se presenta una ofrenda hecha por fuego[a] a Yahvé, la persona[b] que la coma será cortada de entre su pueblo.
  revised_footnotes:
  - marker: a
    text: O «una ofrenda de alimento» para «una ofrenda hecha por fuego». El término hebreo se refiere a una ofrenda consumida por fuego sobre el altar.
    reason: lexical_alternative
  - marker: b
    text: «Será cortada» preserva la fórmula legal hebrea. El castigo exacto es debatido; puede implicar expulsión, muerte o juicio divino.
    reason: alternative_reading
  revision_rationale: Se corrige una construcción poco natural ('de aquel del cual') para reflejar con mayor fidelidad y claridad el relativo hebreo. También se ajusta אִשֶּׁה a 'ofrenda hecha por fuego', en línea con la justificación lexical documentada en el POB en inglés. Por último, se elimina el deíctico innecesario de 'esa persona' para mantener un tono legal más neutro y natural en español.
