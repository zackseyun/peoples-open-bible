source:
  edition: SBLGNT
  text: πολλή μοι παρρησία πρὸς ὑμᾶς, πολλή μοι καύχησις ὑπὲρ ὑμῶν· πεπλήρωμαι τῇ παρακλήσει, ὑπερπερισσεύομαι τῇ χαρᾷ ἐπὶ πάσῃ τῇ θλίψει ἡμῶν.
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/007/004.yaml
  text: I have great boldness toward you, and great boasting on your behalf. I am filled with encouragement; I overflow with joy in all our affliction.
  footnotes:
  - marker: a
    text: Or 'confidence' for 'boldness.' The Greek παρρησία can also carry the sense of frank openness in speech.
    reason: lexical_alternative
  - marker: b
    text: Or 'comfort' for 'encouragement.' The Greek παράκλησις includes both strengthening and consolation.
    reason: lexical_alternative
  - marker: c
    text: Or 'despite all our affliction.' The Greek can be understood as joy overflowing amid ongoing distress.
    reason: lexical_alternative
translation:
  language: ko
  text: 내가 여러분을 향하여 큰 담대함을 가지고 있고, 여러분에 대하여 큰 자랑을 가지고 있습니다. 나는 위로로 가득 차 있으며, 우리의 모든 환난 가운데서도 기쁨이 넘쳐흐릅니다.
  philosophy: optimal-equivalence
