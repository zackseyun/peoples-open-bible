revisions:
- from: Y todo lo que hizo en Jerusalén fue así como las naciones hacen a sus dioses en sus ciudades[a][b].
  to: Y todo lo que hizo en Jerusalén fue igual a lo que hacen las naciones con sus dioses en sus ciudades[a][b].
  rationale: Se revisa la cláusula comparativa para lograr un español natural y claro, manteniendo el sentido del griego y trasladando a la nota la forma más literal/elíptica que el POB inglés también preserva como alternativa. Así se conserva tanto la fidelidad semántica como la legibilidad en español.
