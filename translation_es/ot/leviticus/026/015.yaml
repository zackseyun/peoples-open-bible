translation:
  language: es
  text: Y si rechazan mis estatutos[a], y si su alma[b] aborrece mis juicios[c], para no hacer todos mis mandamientos, quebrantando así mi pacto[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mis decretos» o «mis ordenanzas».
    reason: lexical_alternative
  - marker: b
    text: 'O «todo su ser aborrece mis juicios». Hebreo: «su alma aborrece».'
    reason: lexical_alternative
  - marker: c
    text: «Mis juicios» también puede traducirse «mis reglas» o «mis ordenanzas».
    reason: lexical_alternative
  - marker: d
    text: O «violando así mi pacto».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּחֻקֹּתַי
  english_pob_choice: my statutes
  chosen_spanish: mis estatutos
  alternatives_spanish:
  - mis decretos
  - mis ordenanzas
  lexicon: HALOT
  rationale: חֻקִּים se refiere a disposiciones prescritas; «estatutos» conserva el registro jurídico-covenantal y distingue este término de מִשְׁפָּטִים en la siguiente cláusula.
- source_word: תִּמְאָסוּ
  english_pob_choice: you reject
  chosen_spanish: rechazan
  alternatives_spanish:
  - desprecian
  - repudian
  - desdeñan
  lexicon: HALOT
  rationale: מאס expresa rechazo con tono de desprecio. «Rechazan» es claro en español actual y mantiene el sentido de rechazo del pacto sin exagerar el matiz.
- source_word: מִשְׁפָּטַי
  english_pob_choice: my judgments
  chosen_spanish: mis juicios
  alternatives_spanish:
  - mis reglas
  - mis ordenanzas
  - mis decretos
  lexicon: HALOT
  rationale: מִשְׁפָּטִים son decisiones o determinaciones legales. «Juicios» conserva la formalidad jurídica en español y mantiene la distinción con «estatutos».
- source_word: תִּגְעַל נַפְשְׁכֶם
  english_pob_choice: your soul abhors
  chosen_spanish: su alma aborrece
  alternatives_spanish:
  - ustedes aborrecen
  - su ser interior aborrece
  - su propia vida aborrece
  lexicon: HALOT
  rationale: El hebreo pone como sujeto a נֶפֶשׁ. «Su alma aborrece» preserva esa antropología expresiva y el tono intenso, sin borrar la imagen hebrea.
- source_word: לְבִלְתִּי עֲשׂוֹת
  english_pob_choice: so that you do not do
  chosen_spanish: para no hacer
  alternatives_spanish:
  - de modo que no hagan
  - a fin de no hacer
  - para que no hagan
  lexicon: HALOT
  rationale: La construcción expresa resultado o propósito. «Para no hacer» es natural en español y conserva la conexión entre el aborrecimiento y la desobediencia.
- source_word: כָּל מִצְוֺתַי
  english_pob_choice: all my commandments
  chosen_spanish: todos mis mandamientos
  alternatives_spanish:
  - todas mis órdenes
  - todos mis preceptos
  lexicon: HALOT
  rationale: מִצְוֹת son mandamientos u órdenes. «Mandamientos» mantiene el tono pactal y legal del pasaje.
- source_word: לְהַפְרְכֶם
  english_pob_choice: thereby breaking
  chosen_spanish: quebrantando así
  alternatives_spanish:
  - violando así
  - anulando así
  - rompiendo así
  lexicon: HALOT
  rationale: El hifil de פרר aquí indica quebrantar o anular el pacto. «Quebrantando así» conserva la fuerza causal y el vínculo con la transgresión del pacto.
- source_word: בְּרִיתִי
  english_pob_choice: my covenant
  chosen_spanish: mi pacto
  alternatives_spanish:
  - mi alianza
  - mi convenio
  lexicon: HALOT
  rationale: בְּרִית es el término estándar para covenant. «Pacto» es el equivalente bíblico tradicional y preciso en español, manteniendo el registro teológico-jurídico.
theological_decisions:
- issue: Retención del lenguaje antropológico de נֶפֶשׁ
  english_pob_reading: your soul abhors
  chosen_spanish_reading: su alma aborrece
  alternative_spanish_readings:
  - ustedes aborrecen
  - su ser interior aborrece
  rationale: El hebreo usa explícitamente נֶפֶשׁ como sujeto. Traducirlo como «alma» preserva la imagen del texto y su intensidad afectiva sin añadir una antropología técnica ajena al versículo.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Distinción entre términos legales y pactales
  english_pob_reading: statutes / judgments / commandments / covenant
  chosen_spanish_reading: estatutos / juicios / mandamientos / pacto
  alternative_spanish_readings:
  - decretos / reglas / órdenes / alianza
  - ordenanzas / decretos / preceptos / convenio
  rationale: El versículo acumula términos distintos de la esfera legal y pactal. Mantenerlos diferenciados en español refleja la textura del hebreo y evita nivelar matices semánticos importantes.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: El borrador sigue de cerca la revisión más reciente del POB en inglés, que se mantuvo sin cambios tras la última pasada editorial, y preserva sus decisiones léxicas y su distinción de términos del pacto con adaptación natural al español.
  spanish_consistency_notes:
  - Se mantiene «estatutos / juicios / mandamientos / pacto» para reflejar la diferenciación del hebreo.
  - «Alma» conserva el valor de נֶפֶשׁ sin convertirlo en una glosa doctrinal.
  - «Quebrantando así» reproduce el valor consecutivo de לְהַפְרְכֶם sin suavizar la ruptura del pacto.
