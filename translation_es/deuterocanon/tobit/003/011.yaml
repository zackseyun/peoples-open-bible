translation:
  language: es
  text: 'Y oró junto a la ventana y dijo[a]: «Bendito eres tú, Señor, mi Dios, y bendito sea tu santo y honrado nombre por los siglos; que todas tus obras te bendigan por siempre».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “que todas tus obras te alaben por siempre”. El griego repite el mismo grupo verbal de bendición usado antes en el versículo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδεήθη
  english_pob_choice: prayed
  chosen_spanish: oró
  alternatives_spanish:
  - rogó
  - hizo oración
  - suplicó
  lexicon: BDAG
  rationale: En este contexto de súplica dirigida a Dios, «oró» comunica de forma natural y reverente la acción de dirigirse a Dios en plegaria. «Rogó» o «suplicó» intensifican demasiado el matiz; «hizo oración» suena más forzado en español actual.
- source_word: πρὸς τῇ θυρίδι
  english_pob_choice: by the window
  chosen_spanish: junto a la ventana
  alternatives_spanish:
  - junto a la abertura
  - al lado de la ventana
  - ante la ventana
  lexicon: LSJ
  rationale: «θυρίς» es una ventana o abertura; con πρός + dativo, la proximidad o ubicación contigua es el sentido más natural. «Junto a la ventana» mantiene la escena sin añadir dirección que el griego no exige.
- source_word: Εὐλογητὸς
  english_pob_choice: Blessed
  chosen_spanish: Bendito
  alternatives_spanish:
  - Alabado
  - Digno de bendición
  lexicon: BDAG
  rationale: En doxología dirigida a Dios, «Bendito» es el equivalente bíblico más natural y fiel. Conserva el registro litúrgico sin caer en una calca rígida.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: Como vocativo dirigido a Dios, «Señor» es la correspondencia estable de κύριος y funciona bien en español devocional. «Dueño» o «Maestro» no convienen aquí.
- source_word: ὁ θεός μου
  english_pob_choice: my God
  chosen_spanish: mi Dios
  alternatives_spanish:
  - el Dios mío
  - el Dios de mí
  lexicon: BDAG
  rationale: «Mi Dios» expresa con naturalidad la posesión relacional del vocativo y evita una construcción artificial en español.
- source_word: τὸ ὄνομά σου τὸ ἅγιον καὶ ἔντιμον
  english_pob_choice: your holy and honored name
  chosen_spanish: tu santo y honrado nombre
  alternatives_spanish:
  - tu santo y precioso nombre
  - tu santo y glorioso nombre
  - tu nombre santo y digno de honor
  lexicon: LSJ
  rationale: «ἔντιμος» significa honorable, estimado o digno de honor. «Honrado» conserva ese valor de dignidad/reverencia y mantiene la coordinación con «santo» sin introducir un matiz no atestiguado como «glorioso».
- source_word: εἰς τοὺς αἰῶνας
  english_pob_choice: forever
  chosen_spanish: por los siglos
  alternatives_spanish:
  - para siempre
  - por los siglos de los siglos
  - por las edades
  lexicon: BDAG
  rationale: La expresión idiomática denota duración perpetua. «Por los siglos» preserva el tono bíblico y la pluralidad del griego; en la clausura, «por siempre» refuerza la idea de perpetuidad con español natural.
- source_word: εὐλογησάτωσάν σε
  english_pob_choice: let all your works bless you
  chosen_spanish: que todas tus obras te bendigan
  alternatives_spanish:
  - que todas tus obras te alaben
  - que todas tus obras te bendigan y alaben
  lexicon: BDAG
  rationale: El griego repite la familia verbal de «bendecir», por lo que «bendigan» preserva la conexión léxica con «Bendito». «Alaben» es una glosa interpretativa posible, pero desvía la repetición del original.
- source_word: πάντα τὰ ἔργα σου
  english_pob_choice: all your works
  chosen_spanish: todas tus obras
  alternatives_spanish:
  - todas tus acciones
  - todo lo que has hecho
  - todas tus criaturas
  lexicon: BDAG
  rationale: «ἔργα» puede abarcar obras, acciones o incluso lo creado. «Todas tus obras» mantiene la amplitud semántica y la cercanía formal del griego sin restringir indebidamente el referente.
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: forever
  chosen_spanish: por siempre
  alternatives_spanish:
  - para siempre
  - por toda la eternidad
  lexicon: BDAG
  rationale: La fórmula final enfatiza permanencia continua. «Por siempre» suena natural en español y conserva el paralelismo doxológico con la frase anterior.
theological_decisions:
- issue: Mantenimiento del vocativo divino κύριος
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Dueño
  - Maestro
  rationale: La oración se dirige directamente a Dios; por tanto, el vocativo debe conservar el tratamiento reverente y establecido de κύριος como «Señor». Las alternativas serían semánticamente posibles en otros contextos, pero no aquí.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Verbo de bendición aplicado a las obras de Dios
  english_pob_reading: let all your works bless you
  chosen_spanish_reading: que todas tus obras te bendigan
  alternative_spanish_readings:
  - que todas tus obras te alaben
  rationale: El griego usa el mismo campo léxico de bendecir tanto para Dios como para sus obras. Mantener «bendigan» conserva esa cohesión verbal y evita desdibujar una repetición significativa. «Alaben» es una interpretación aceptable, pero menos fiel al enlace léxico del texto.
  doctrine_reference: DOCTRINE.md §5 Consistency of key terms, or documented exception
translation_notes:
  revision_awareness: El pasaje fue verificado con alta concordancia frente al paquete fuente griego de Swete 1909 y el aparato de auditoría inglés; no se registraron revisiones aplicadas en la última pasada, por lo que la presente redacción sigue de cerca las decisiones ya confirmadas.
  spanish_consistency_notes:
  - Se conserva la repetición de la raíz de «bendecir» en todo el versículo para reflejar la cohesión léxica del griego.
  - Se usa «Yahvé» como norma del proyecto solo cuando aparece el nombre divino explícito; aquí el texto griego tiene κύριος en vocativo, por eso se traduce «Señor».
  - El cierre doxológico mantiene un español bíblico natural sin recurrir a fórmulas eclesiásticas más tradicionales que el texto no exige.
