translation:
  language: es
  text: 'Y les dijo: «Quédense aquí esta noche, y les traeré respuesta[a] conforme a lo que Yahvé me diga». Así, los príncipes de Moab[b] se quedaron con Balaam.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «les responderé» o «les traeré un mensaje».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «los oficiales de Moab» o «los jefes de Moab».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִינוּ
  english_pob_choice: Lodge here tonight
  chosen_spanish: Permanezcan aquí esta noche
  alternatives_spanish:
  - Alójense aquí esta noche
  - Pasen aquí la noche
  lexicon: HALOT
  rationale: El imperativo plural pide que se queden a pasar la noche. En español, «permanezcan aquí esta noche» conserva la invitación a quedarse sin introducir un matiz demasiado formal o arcaico.
- source_word: פֹה הַלַּיְלָה
  english_pob_choice: here tonight
  chosen_spanish: aquí esta noche
  alternatives_spanish:
  - aquí esta noche
  - aquí por la noche
  lexicon: HALOT
  rationale: La combinación de lugar y tiempo se conserva de forma natural en español con «aquí esta noche».
- source_word: וַהֲשִׁבֹתִי אֶתְכֶם דָּבָר
  english_pob_choice: I will bring back word to you
  chosen_spanish: les devolveré palabra
  alternatives_spanish:
  - les responderé
  - les traeré una respuesta
  - les devolveré un mensaje
  lexicon: HALOT
  rationale: La construcción hebrea expresa la idea de volver con una palabra o respuesta. «Les devolveré palabra» mantiene esa imagen verbal y la posibilidad de una respuesta oracular, mientras que «responderé» sería más idiomático pero menos transparente al hebreo.
- source_word: כַּאֲשֶׁר יְדַבֵּר יְהוָה אֵלַי
  english_pob_choice: according to what Yahweh speaks to me
  chosen_spanish: conforme a lo que Yahvé me diga
  alternatives_spanish:
  - según lo que Yahvé me hable
  - de acuerdo con lo que Yahvé me diga
  lexicon: HALOT
  rationale: כַּאֲשֶׁר marca correspondencia. En español, «conforme a lo que Yahvé me diga» conserva la relación de medida/ajuste y traduce el futuro hebreo de modo natural.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como «Yahvé», conforme al criterio del proyecto para el Tetragrámaton, en vez de sustituirlo por un título.
- source_word: וַיֵּשְׁבוּ
  english_pob_choice: stayed
  chosen_spanish: se quedaron
  alternatives_spanish:
  - permanecieron
  - se alojaron
  lexicon: HALOT
  rationale: El verbo en contexto narrativo indica que permanecieron allí después de la invitación. «Se quedaron» es natural y fiel al sentido contextual.
- source_word: שָׂרֵי מוֹאָב
  english_pob_choice: the princes of Moab
  chosen_spanish: los príncipes de Moab
  alternatives_spanish:
  - los oficiales de Moab
  - los jefes de Moab
  lexicon: HALOT
  rationale: שָׂרִים puede referirse a príncipes, oficiales o jefes. «Príncipes» conserva el rango elevado sugerido por el contexto diplomático y corresponde al uso elegido en inglés.
- source_word: בִּלְעָם
  english_pob_choice: Balaam
  chosen_spanish: Balaam
  lexicon: Standard transliteration
  rationale: Se conserva la transliteración habitual del nombre propio.
theological_decisions:
- issue: Uso del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton. La traducción española mantiene el nombre propio «Yahvé» para no ocultar la forma del original ni sustituirla por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del inglés POB: «lodge here tonight» se refleja como una invitación a permanecer esa noche; «bring back word to you» se conserva con una imagen verbal equivalente sin volverla demasiado explicativa. El nombre divino se mantiene como «Yahvé» conforme al marco doctrinal del proyecto.'
  spanish_consistency_notes:
  - He usado «Yahvé» de manera consistente para יְהוָה.
  - «Príncipes de Moab» mantiene el rango oficial del grupo y evita diluir el matiz social del hebreo.
  - 'La cláusula final conserva la acción narrativa completa: ellos se quedaron con Balaam.'
