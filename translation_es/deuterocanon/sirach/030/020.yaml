translation:
  language: es
  text: Así es con quien tiene riqueza y no la disfruta[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo griego amplía la imagen con una escena vívida: «mirando con los ojos y suspirando, como un eunuco que abraza a una virgen y suspira». Esto confirma que el sentido es poseer riqueza sin poder disfrutarla.'
    reason: alternative_reading
lexical_decisions:
- source_word: כן
  english_pob_choice: So it is with
  chosen_spanish: Así es con
  alternatives_spanish:
  - De este modo es con
  - Así sucede con
  lexicon: HALOT
  rationale: El hebreo introduce una comparación proverbial; «Así es con» conserva el valor comparativo sin sonar forzado en español.
- source_word: מי
  english_pob_choice: one who
  chosen_spanish: quien
  alternatives_spanish:
  - el que
  - una persona que
  lexicon: HALOT
  rationale: «Quien» mantiene la referencia indefinida y general del hebreo sin marcar género de manera innecesaria.
- source_word: יש לו
  english_pob_choice: has
  chosen_spanish: tiene
  alternatives_spanish:
  - posee
  - cuenta con
  lexicon: HALOT
  rationale: El idioma hebreo expresa posesión; «tiene» es la equivalencia natural y directa en español.
- source_word: עושר
  english_pob_choice: wealth
  chosen_spanish: riqueza
  alternatives_spanish:
  - riquezas
  - bienes
  lexicon: HALOT
  rationale: «Riqueza» comunica el contenido material del término y suena natural en español contemporáneo; conserva el sentido concreto de prosperidad material.
- source_word: ואין נהנה ממנו
  english_pob_choice: and does not enjoy it
  chosen_spanish: y no la disfruta
  alternatives_spanish:
  - y no obtiene beneficio de ella
  - y no saca provecho de ella
  lexicon: HALOT
  rationale: «נהנה» apunta a experimentar gozo o beneficio. En español, «disfruta» recoge ese matiz experiencial mejor que una formulación más económica. El pronombre femenino concuerda con «riqueza».
theological_decisions:
- issue: Imagen proverbial de posesión sin gozo
  english_pob_reading: wealth and does not enjoy it
  chosen_spanish_reading: riqueza y no la disfruta
  alternative_spanish_readings:
  - riqueza y no obtiene beneficio de ella
  - riqueza y no saca provecho de ella
  rationale: No hay una cuestión doctrinal directa; la decisión mantiene la tensión del proverbio entre posesión real y falta de disfrute real, sin suavizarla.
  doctrine_reference: Sabiduría proverbial; no aplica una referencia doctrinal específica
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto mantiene el acuerdo alto entre el hebreo base y el paralelo griego, que se usa solo como apoyo imagético para el matiz de ‘no disfrutar’.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en otros contextos del proyecto cuando corresponda; este versículo no lo contiene.
  - Se prefirió «riqueza» y «disfruta» por claridad y naturalidad, sin abandonar el sentido de posesión material y falta de gozo.
  - La nota reproduce el valor del paralelo griego sin desplazar la base hebrea del versículo.
