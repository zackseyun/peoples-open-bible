  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo y del POB inglés: movimiento descendente desde la zona alta, sujetos colectivos amalecitas/cananeos, doble acción militar y límite espacial hasta Horma. Sin embargo, «en aquel monte» reduce indebidamente הָר al singular topográfico cuando el contexto y la auditoría inglesa favorecen «región montañosa/zonas montañosas». Además, «los atacaron» debilita demasiado וַיַּכּוּם frente a la secuencia hebrea de golpear + abatir/aplastar.'
  spanish_quality_summary: El español es claro y legible, pero puede ajustarse para mayor fidelidad y naturalidad bíblica. «Descendieron» funciona bien. «Horma» y la nota están bien. La frase mejora si se cambia «aquel monte» por «aquella región montañosa» y si se refuerza el primer verbo militar para conservar mejor la gradación del original.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. Los etnónimos en plural colectivo son adecuados. El topónimo «Horma» está bien conservado con nota semántica. No hay términos teológicos sensibles aquí.
  issues:
  - severity: medium
    issue: «en aquel monte» para הַיֹּשֵׁב בָּהָר הַהוּא
    rationale: El hebreo הָר en este contexto militar-geográfico se refiere mejor a la región montañosa o zona alta desde la cual descienden. «Monte» en singular suena demasiado puntual y no refleja bien el valor regional que el POB inglés documenta como 'hill country'.
  - severity: medium
    issue: «los atacaron» para וַיַּכּוּם
    rationale: Aunque posible en contexto bélico, «atacaron» deja fuera el matiz de golpe/derrota inicial de נכה y hace que el paralelismo con «los derribaron» pierda fuerza. Una opción como «los derrotaron» o «los golpearon» preserva mejor la progresión con el siguiente verbo.
  - severity: low
    issue: Gradación verbal algo plana entre «atacaron» y «derribaron»
    rationale: El hebreo presenta dos verbos consecutivos con intensificación. Conviene que el primer verbo ya exprese impacto real y el segundo la acción más devastadora o humillante.
  revised_spanish_text: Entonces descendieron los amalecitas y los cananeos que habitaban en aquella región montañosa, y los derrotaron y los abatieron hasta Horma[a].
  revised_footnotes:
  - marker: a
    text: Horma es un nombre de lugar; el nombre hebreo está relacionado con una palabra que significa «destrucción» o «consagración a la destrucción».
    reason: cultural_note
  revision_rationale: Se revisa «aquel monte» a «aquella región montañosa» para reflejar mejor el valor geográfico de הָר en contexto militar y seguir la justificación documentada del POB inglés. Se cambia «los atacaron» por «los derrotaron» para conservar mejor la fuerza de נכה, y «los derribaron» por «los abatieron» para mantener una secuencia militar natural y más fiel al matiz intensificador del segundo verbo. La nota sobre Horma se conserva sin cambios sustanciales.
