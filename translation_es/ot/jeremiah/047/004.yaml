translation:
  language: es
  text: a causa del día que viene para devastar a todos los filisteos, para cortar de Tiro y Sidón a todo sobreviviente que preste ayuda. Porque Yahvé está devastando a los filisteos, el remanente[a] de la isla de Caftor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los filisteos, el remanente de la isla de Caftor».
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל הַיּוֹם הַבָּא
  english_pob_choice: because of the day that is coming
  chosen_spanish: porque del día que viene
  alternatives_spanish:
  - a causa del día que viene
  - por el día que viene
  lexicon: HALOT
  rationale: עַל introduce aquí una relación causal en el contexto del anuncio de juicio. En español, «porque del día que viene» conserva esa causalidad y el valor progresivo de הַבָּא sin sonar forzado.
- source_word: לִשְׁדֹד
  english_pob_choice: to devastate
  chosen_spanish: devastar
  alternatives_spanish:
  - saquear
  - destruir
  lexicon: HALOT
  rationale: שׁדד expresa despojo violento y devastación. «Devastar» reproduce bien el alcance de juicio nacional sin reducirlo al mero saqueo ni llevarlo más allá de lo que dice el verbo.
- source_word: אֶת כָּל פְּלִשְׁתִּים
  english_pob_choice: all the Philistines
  chosen_spanish: a todos los filisteos
  alternatives_spanish:
  - a toda Filistea
  - al pueblo filisteo
  lexicon: HALOT
  rationale: El hebreo presenta al pueblo en plural, no al territorio. En español, «a todos los filisteos» es directo y conserva el objeto humano del juicio.
- source_word: לְהַכְרִית
  english_pob_choice: to cut off
  chosen_spanish: para cortar
  alternatives_spanish:
  - para destruir
  - para exterminar
  lexicon: HALOT
  rationale: הכרית tiene fuerza de «cortar/arrancar», con resonancia judicial y pactal. «Para cortar» preserva esa imagen sin reemplazarla por un verbo más interpretativo.
- source_word: לְצֹר וּלְצִידוֹן
  english_pob_choice: from Tyre and Sidon
  chosen_spanish: de Tiro y de Sidón
  alternatives_spanish:
  - para Tiro y Sidón
  - a Tiro y a Sidón
  lexicon: HALOT
  rationale: Aunque el lamed con לְהַכְרִית puede implicar separación o fuente, en español la construcción más natural para expresar la exclusión de ayuda es «de Tiro y de Sidón». Mantiene la relación de procedencia implícita en el contexto.
- source_word: כֹּל שָׂרִיד עֹזֵר
  english_pob_choice: every surviving helper
  chosen_spanish: todo sobreviviente que ayuda
  alternatives_spanish:
  - todo aliado sobreviviente
  - todo ayudante que queda
  lexicon: HALOT
  rationale: שָׂרִיד es «sobreviviente» o «remanente»; עֹזֵר es «ayudante». La frase hebrea describe a cualquiera que aún pueda prestar ayuda. «Todo sobreviviente que ayuda» conserva la doble idea sin introducir «aliado», que sería más interpretativo.
- source_word: כִּי שֹׁדֵד יְהוָה
  english_pob_choice: For Yahweh is devastating
  chosen_spanish: Porque Yahvé está devastando
  alternatives_spanish:
  - Pues Yahvé devasta
  - Porque Yahvé devastará
  lexicon: HALOT
  rationale: El participio שֹׁדֵד presenta la acción como activa y en curso/certidumbre. «Está devastando» refleja bien esa vividez. Y יְהוָה se traduce «Yahvé» conforme al estándar del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: La norma del proyecto pide traducir el Tetragrámaton como «Yahvé». Se evita la sustitución por un título y se preserva el nombre divino revelado en el hebreo.
- source_word: שְׁאֵרִית אִי כַפְתּוֹר
  english_pob_choice: the remnant of the island of Caphtor
  chosen_spanish: el remanente de la isla de Caftor
  alternatives_spanish:
  - el remanente de la costa de Caftor
  - el remanente de la tierra de Caftor
  lexicon: HALOT
  rationale: שְׁאֵרִית es «remanente». אִי admite «isla» o «costa/coastland»; en este contexto, «isla» es la opción más directa y la que el audit trail inglés fijó en la revisión más reciente. «Caftor» mantiene la transliteración habitual del topónimo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La línea doctrinal del proyecto exige transliterar el nombre divino en vez de sustituirlo por un título. «Yahvé» es la forma española estándar dentro de este marco y mantiene la distinción entre nombre y título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de אִי en אִי כַפְתּוֹר
  english_pob_reading: island
  chosen_spanish_reading: isla
  alternative_spanish_readings:
  - costa
  - costa marítima
  - coastland
  rationale: El audit trail inglés revisó este punto de «coastland» a «island». En español, «isla» comunica de forma natural la misma opción semántica y conserva la tensión geográfica del hebreo sin resolverla artificialmente.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it (applied analogically to genuine lexical ambiguity)
translation_notes:
  revision_awareness: 'El borrador sigue la última revisión inglesa que prefirió «island» para אִי, manteniendo al mismo tiempo el resto de las decisiones léxicas del audit trail: devastar לשׁדד, cortar להכרית, y el nombre divino como Yahvé. También se preserva la estructura causal del primer hemistiquio y la imagen de juicio activa del participio final.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera uniforme para יְהוָה.
  - Se usa «Caftor» como transliteración española estable del topónimo.
  - «Filisteos» permanece en plural humano, no como nombre territorial.
  - «Devastar» y «cortar» conservan la fuerza judicial del hebreo sin sobreparafrasear.
  - La nota a pie de página marca la alternativa geográfica para אִי, como en el audit trail inglés.
