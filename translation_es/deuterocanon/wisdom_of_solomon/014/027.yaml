translation:
  language: es
  text: Porque el culto a ídolos sin nombre[a] es el principio, la causa y el fin de todo mal[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ídolos sin un nombre». El adjetivo griego puede subrayar que estos ídolos carecen de un nombre verdadero o digno.
    reason: lexical_alternative
  - marker: b
    text: La secuencia «principio, causa y fin» también puede entenderse como «origen, causa y culminación».
    reason: lexical_alternative
lexical_decisions:
- source_word: θρησκεία
  english_pob_choice: worship
  chosen_spanish: veneración
  alternatives_spanish:
  - culto
  - adoración
  lexicon: BDAG / uso contextual en español
  rationale: En este contexto la palabra no describe religión en general, sino la práctica rendida a ídolos. «Veneración» comunica el acto de rendir honor religioso sin forzar una equivalencia demasiado técnica con «religión».
- source_word: ἀνωνύμων
  english_pob_choice: nameless
  chosen_spanish: sin nombre
  alternatives_spanish:
  - anónimos
  - sin un nombre
  lexicon: LSJ
  rationale: 'El adjetivo significa literalmente «sin nombre» o «innombrado». En español, «sin nombre» conserva la fuerza retórica y permite la misma ambigüedad que la nota inglesa: pueden carecer de nombre verdadero o digno.'
- source_word: εἰδώλων
  english_pob_choice: idols
  chosen_spanish: ídolos
  alternatives_spanish:
  - imágenes
  - falsos dioses
  lexicon: LSJ
  rationale: «Ídolos» es la opción natural y polémicamente precisa en este pasaje. Mantiene el sentido religioso de objetos o representaciones de falsa adoración.
- source_word: ἀρχὴ
  english_pob_choice: beginning
  chosen_spanish: principio
  alternatives_spanish:
  - comienzo
  - origen
  lexicon: LSJ
  rationale: «Principio» reproduce la triple secuencia del griego de modo claro y solemne, y puede abarcar tanto inicio como fundamento sin añadir explicación interpretativa.
- source_word: αἰτία
  english_pob_choice: cause
  chosen_spanish: causa
  alternatives_spanish:
  - motivo
  - fuente
  lexicon: LSJ
  rationale: «Causa» conserva el valor causal directo del término y mantiene la triada compacta del original.
- source_word: πέρας
  english_pob_choice: end
  chosen_spanish: fin
  alternatives_spanish:
  - término
  - culminación
  - resultado
  lexicon: LSJ
  rationale: «Fin» es la forma más natural y breve en español para cerrar la serie «principio, causa y fin», sin perder la dureza del juicio del texto.
- source_word: παντὸς κακοῦ
  english_pob_choice: every evil
  chosen_spanish: todo mal
  alternatives_spanish:
  - todo el mal
  - toda maldad
  lexicon: LSJ
  rationale: La construcción griega es global y comprehensiva. «Todo mal» reproduce esa amplitud en español de manera idiomática y sin sobrecargar el sustantivo.
theological_decisions:
- issue: Triada retórica ἀρχὴ ... καὶ αἰτία καὶ πέρας
  english_pob_reading: the beginning and cause and end of every evil
  chosen_spanish_reading: el principio, la causa y el fin de todo mal
  alternative_spanish_readings:
  - el origen, la causa y la culminación de todo mal
  - el comienzo, la fuente y el resultado de todo mal
  rationale: El griego presenta una afirmación concentrada y enfática. La versión española conserva la estructura triádica sin suavizarla ni convertirla en paráfrasis explicativa.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Alcance de ἀνωνύμων ('nameless') aplicado a los ídolos
  english_pob_reading: nameless idols
  chosen_spanish_reading: ídolos sin nombre
  alternative_spanish_readings:
  - ídolos anónimos
  - ídolos sin un nombre
  rationale: 'La traducción preserva la tensión del original: el texto no aclara si la ausencia de nombre implica falta de identidad verdadera, de legitimidad o de dignidad para ser nombrados. «Sin nombre» mantiene esa ambigüedad.'
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El texto griego y el contexto de auditoría inglesa muestran consenso alto; no se requieren revisiones textuales. La traducción sigue la lectura establecida y conserva las alternativas semánticas señaladas en la nota inglesa sin resolverlas interpretativamente.
  spanish_consistency_notes:
  - Se mantuvo «Dios»/«Yahvé» sin necesidad de intervención en este versículo.
  - Se prefirió «ídolos» por ser el término técnico y polémico más natural en español para εἰδώλων.
  - La frase nominal conserva la cadencia del griego con puntuación española estándar.
  - Las notas a y b se anclan en los elementos léxicos donde existe alternativa significativa en español.
