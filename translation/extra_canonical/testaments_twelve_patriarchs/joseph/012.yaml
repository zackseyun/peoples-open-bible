translation:
  text: '3[a]. And the chief of them said to me, “You are not a slave, for your appearance also makes it plain.” But I told them plainly that I was their slave. 4. And when we had come into Egypt, they disputed concerning me, as to who would deceive the merchant and receive money for me. 5. So it seemed good to all of them to leave me in Egypt with the merchant of their trade until they should return bringing merchandise[b]. 6. But the Lord gave me favor in the eyes of the merchant, and he entrusted his house to me. 7. And God blessed him in my hands, and increased him on my account in gold and silver and work. 8. And I was with him three months.


    1. Now at that time the wife of Pentephri came down to Memphis with great display, because she had heard about me from her eunuchs. 2. And she said to her husband, “The merchant has grown rich by the hands of a certain young Hebrew; and they say that he was stolen away by theft from the land of Canaan. 3. Now therefore execute judgment concerning him, and take the young man into our house, and the God of the Hebrews will bless you[c], because grace from heaven is upon him.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek text is textually rough in this section; 'they disputed concerning me, as to who would deceive the merchant and receive money for me' may reflect a corrupt or compressed account of the brothers' sale of Joseph.
    reason: textual_variant
  - marker: b
    text: Or 'and increased him on my account in gold and silver and produce/business.' The final term is difficult in the witness used here.
    reason: lexical_alternative
  - marker: c
    text: Pentephri is the Greek form of the Egyptian name often associated with Potiphar/Potiphar's household in Genesis traditions.
    reason: cross_reference
lexical_decisions:
- source_word: δοῦλος
  chosen: slave
  alternatives:
  - servant
  - bondservant
  lexicon: LSJ
  rationale: The context is Joseph's sale and bonded status under ownership; 'slave' preserves the social reality better than the softer 'servant,' in line with project policy where bonded nature is salient.
- source_word: ἡ ὄψις σου δηλοῖ
  chosen: your appearance also makes it plain
  alternatives:
  - your face shows it
  - your look reveals it
  lexicon: LSJ
  rationale: δηλόω here means to make evident or reveal. 'Appearance' fits ὄψις naturally and preserves the inference drawn from Joseph's bearing.
- source_word: μετάβολος
  chosen: merchant
  alternatives:
  - trader
  - dealer
  lexicon: LSJ
  rationale: In this narrative context the word refers to a commercial trader handling persons and goods. 'Merchant' is idiomatic and suitably elevated.
- source_word: ἐπίστευσέ μοι τὸν οἶκον αὐτοῦ
  chosen: he entrusted his house to me
  alternatives:
  - he put his household in my charge
  - he trusted me with his house
  lexicon: LSJ
  rationale: The idiom conveys delegated oversight of the household. 'Entrusted his house to me' is concise and preserves the stewardship sense.
- source_word: ἐν χειρί μου
  chosen: in my hands
  alternatives:
  - through me
  - under my hand
  lexicon: LSJ
  rationale: The phrase is retained somewhat formally because it is a recurring biblical idiom for agency and administration; it also suits testamentary style.
- source_word: ἔργῳ
  chosen: work
  alternatives:
  - produce
  - business
  - property
  lexicon: LSJ
  rationale: The OCR text is difficult here, but ἔργῳ likely broadens the list beyond precious metals to productive enterprise or estate activity. 'Work' keeps the Greek's breadth without over-specifying.
- source_word: μετὰ δόξης πολλῆς
  chosen: with great display
  alternatives:
  - with much splendor
  - with great pomp
  lexicon: LSJ
  rationale: δόξα in this setting points to outward magnificence or pomp rather than abstract glory. 'Great display' is readable and socially pointed.
- source_word: εὐνοῦχοι
  chosen: eunuchs
  alternatives:
  - court officials
  - chamberlains
  lexicon: LSJ
  rationale: The Greek term literally denotes eunuchs, though it can extend to court officials. Since the household-court setting supports the literal or conventional court sense, 'eunuchs' keeps the source term visible.
- source_word: κρίσιν
  chosen: execute judgment
  alternatives:
  - hold an inquiry
  - bring him to trial
  lexicon: LSJ
  rationale: The wife's request is for formal adjudication or legal action regarding Joseph's status. 'Execute judgment' preserves the judicial force and elevated register.
- source_word: χάρις ἐκ τοῦ οὐρανοῦ ἐστι πρὸς αὐτόν
  chosen: grace from heaven is upon him
  alternatives:
  - favor from heaven is with him
  - he has grace from heaven
  lexicon: LSJ
  rationale: χάρις here denotes divine favor. 'Upon him' reflects the directional force of πρὸς in idiomatic English and preserves the sense of heavenly favor resting on Joseph.
