id: 1TI.6.17
reference: 1 Timothy 6:17
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Τοῖς πλουσίοις ἐν τῷ νῦν αἰῶνι παράγγελλε μὴ ὑψηλοφρονεῖν μηδὲ ἠλπικέναι ἐπὶ πλούτου ἀδηλότητι, ἀλλ’ ⸀ἐπὶ ⸀θεῷ τῷ παρέχοντι ἡμῖν πάντα πλουσίως εἰς ἀπόλαυσιν,
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/006/017.yaml
  text: Command those who are rich in the present age not to be arrogant[a], nor to set their hope on the uncertainty of riches, but on God[b], who richly provides us with everything for enjoyment.
  footnotes:
  - marker: a
    text: Or 'in this present world.' The Greek word can mean 'age' or, by extension, the present world-order; 'age' better preserves Paul's temporal contrast.
    reason: lexical_alternative
  - marker: b
    text: Or 'on uncertain riches.'
    reason: lexical_alternative
translation:
  language: ko
  text: 이 시대[a]에 부유한 자들에게 명하여, 교만하지 말고 불확실한 재물[b]에 소망을 두지도 말며, 도리어 우리에게 누리도록 모든 것을 풍성히 주시는 하나님께 소망을 두게 하십시오.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「이 세상」. 헬라어 αἰών은 「시대」 또는 「현 세상」을 가리킬 수 있다. 「시대」가 바울의 시간적 대비를 더 잘 보존한다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「불확실한 부에」.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τοῖς πλουσίοις ἐν τῷ νῦν αἰῶνι
  english_pob_choice: those who are rich in the present age
  chosen_korean: 이 시대에 부유한 자들
  alternatives_korean:
  - 현세에 부유한 자들
  - 지금 이 세상에서 부자인 자들
  lexicon: BDAG
  rationale: αἰών의 시간적 어감 「시대」를 보존(영원한 다음 시대와의 대비).
- source_word: μὴ ὑψηλοφρονεῖν
  english_pob_choice: not to be arrogant
  chosen_korean: 교만하지 말고
  alternatives_korean:
  - 거만하지 말고
  - 마음을 높이지 말고
  lexicon: BDAG
  rationale: 합성어 「높은 마음을 가지다」의 자연스러운 한국어.
- source_word: πλούτου ἀδηλότητι
  english_pob_choice: the uncertainty of riches
  chosen_korean: 불확실한 재물
  alternatives_korean:
  - 재물의 불확실성에
  lexicon: BDAG
  rationale: ἀδηλότης의 「불확실성」.
- source_word: τῷ παρέχοντι ἡμῖν πάντα πλουσίως εἰς ἀπόλαυσιν
  english_pob_choice: who richly provides us with everything for enjoyment
  chosen_korean: 우리에게 누리도록 모든 것을 풍성히 주시는
  alternatives_korean:
  - 우리에게 즐기도록 모든 것을 후히 주시는
  lexicon: BDAG
  rationale: ἀπόλαυσις의 「누림」.
