translation:
  language: ko
  text: 그러나 성령의 열매는 사랑, 기쁨, 평강, 오래 참음, 친절, 선함, 신실함,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καρπὸς τοῦ πνεύματός
  english_pob_choice: the fruit of the Spirit
  chosen_korean: 성령의 열매
  alternatives_korean: []
  lexicon: BDAG
  rationale: 한국 성경의 정형 표현. 「열매」는 단수로 보존하여 통일된 열매 개념을 살린다.
- source_word: ἀγάπη, χαρά, εἰρήνη
  english_pob_choice: love, joy, peace
  chosen_korean: 사랑, 기쁨, 평강
  alternatives_korean:
  - 사랑, 기쁨, 평화
  lexicon: BDAG
  rationale: 한국 성경 전통의 「평강」을 따른다.
- source_word: μακροθυμία, χρηστότης, ἀγαθωσύνη
  english_pob_choice: patience, kindness, goodness
  chosen_korean: 오래 참음, 친절, 선함
  alternatives_korean:
  - 인내, 자비, 양선
  lexicon: BDAG
  rationale: 현대 합쇼체 어휘로 자연스럽게. 「자비」는 ἔλεος에 보류.
- source_word: πίστις
  english_pob_choice: faithfulness
  chosen_korean: 신실함
  alternatives_korean:
  - 믿음
  lexicon: BDAG
  rationale: 덕목 목록의 문맥상 「신실함(=신뢰할 수 있음)」이 본 의미. 글로사리에 따른 카브-아웃.
theological_decisions:
- issue: 성령의 열매 목록 (5:22-23)의 평행 리듬과 πίστις 해석
  chosen_reading: 신실함 (덕목 목록 문맥에서 πίστις)
  alternative_readings:
  - 믿음
  rationale: 덕목 목록에서 πίστις는 「믿을 만함·신실함」을 가리키며, 신학적 「믿음」과 구분된다. 글로사리는 이런 카브-아웃을 명시한다. 또한 9개의 덕목을 한국어 2-3음절 단위로 균형 있게 옮겨 평행 리듬을 보존했다.
  doctrine_reference: KOREAN_PIPELINE.md glossary πίστις
