translation:
  language: es
  text: El conocimiento de un hombre sabio[a] aumentará como una inundación, y su consejo es como una fuente de vida[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "el conocimiento de los sabios aumentará como una inundación"; el griego σοφοῦ está en singular, pero algunas traducciones lo generalizan al plural.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "un manantial de vida".'
    reason: lexical_alternative
lexical_decisions:
- source_word: γνῶσις
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - entendimiento
  - discernimiento
  lexicon: LSJ
  rationale: γνῶσις designa de manera directa conocimiento; en español, 'conocimiento' conserva ese sentido básico y se une bien a la imagen de crecimiento e incremento.
- source_word: σοφοῦ
  english_pob_choice: of a wise man
  chosen_spanish: de un hombre sabio
  alternatives_spanish:
  - de los sabios
  - de una persona sabia
  lexicon: LSJ
  rationale: El genitivo singular σοφοῦ se refleja mejor con un singular representativo masculino, como en el audit trail inglés. 'Un hombre sabio' mantiene la forma singular y la política de no neutralizar sin razón textual.
- source_word: ὡς κατακλυσμός
  english_pob_choice: like a flood
  chosen_spanish: como un diluvio
  alternatives_spanish:
  - como una inundación
  - como un torrente
  lexicon: LSJ
  rationale: κατακλυσμός alude a una crecida devastadora o inundación; 'diluvio' preserva con dignidad el valor de abundancia desbordante y funciona bien en español bíblico.
- source_word: πληθυνθήσεται
  english_pob_choice: will increase
  chosen_spanish: aumentará
  alternatives_spanish:
  - se multiplicará
  - abundará
  lexicon: LSJ
  rationale: El futuro pasivo/medio expresa crecimiento en cantidad; 'aumentará' comunica ese incremento de forma natural en español sin perder la idea de expansión.
- source_word: βουλή
  english_pob_choice: counsel
  chosen_spanish: consejo
  alternatives_spanish:
  - counsel
  - orientación
  - prudencia
  lexicon: LSJ
  rationale: En contexto sapiencial, βουλή se refiere al consejo prudente que guía a otros; 'consejo' es la opción más clara y idiomática en español.
- source_word: πηγή ζωῆς
  english_pob_choice: a spring of life
  chosen_spanish: una fuente de vida
  alternatives_spanish:
  - un manantial de vida
  - una fuente vivificante
  lexicon: LSJ
  rationale: πηγή puede ser 'spring' o 'fountain'; en español, 'fuente de vida' reproduce la imagen con naturalidad y mantiene abierta la resonancia tradicional del sintagma.
theological_decisions:
- issue: Tratamiento de σοφοῦ como singular masculino representativo
  english_pob_reading: of a wise man
  chosen_spanish_reading: de un hombre sabio
  alternative_spanish_readings:
  - de los sabios
  - de una persona sabia
  rationale: Se conserva el singular masculino gramatical del griego, siguiendo el criterio del audit trail inglés y evitando generalizar a plural o neutral abstracto sin base textual.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
translation_notes:
  revision_awareness: El texto griego y el auditoría inglesa concuerdan de forma alta; no se registraron revisiones aplicadas en la versión base, y esta propuesta sigue ese consenso sin introducir ampliaciones interpretativas.
  spanish_consistency_notes:
  - Se mantuvo 'conocimiento' para γνῶσις y 'consejo' para βουλή, en línea con el valor sapiencial del pasaje.
  - Se evitó 'Cristo' u otra terminología no pertinente; el pasaje no contiene léxico cristológico.
  - '''Fuente de vida'' conserva la metáfora de πηγή ζωῆς y es compatible con el uso bíblico español.'
