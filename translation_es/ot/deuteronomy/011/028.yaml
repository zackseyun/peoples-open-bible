review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido del hebreo: condición de maldición, no escuchar los mandamientos de Yahvé, apartarse del camino mandado hoy, e ir tras otros dioses no conocidos. Sin embargo, hay un desajuste sintáctico importante en español: «si no escuchan los mandamientos» suena incompleto o poco idiomático para תִשְׁמְעוּ אֶל מִצְוֺת, que requiere «escuchan/oyen a» o mejor «escuchan lo que mandan»; en español bíblico natural, aquí conviene «si no escuchan[a] los mandamientos...» con nota que explicite «obedecen», pero la frase mejora mucho añadiendo «a» solo si el complemento fuera personal, lo cual no ocurre. Además, «que yo les mando hoy» atenúa ligeramente el participio hebreo y resulta menos natural que «que yo les estoy mandando hoy» o «que yo les ordeno hoy».'
  spanish_quality_summary: La redacción es generalmente clara y digna, con buen registro bíblico y buen uso de «Yahvé». No obstante, «escuchan los mandamientos» es poco natural en español general; suena a oír mandamientos, no a prestar atención obediente a ellos. También «que yo les mando hoy» puede leerse como ‘encargo’ más que ‘ordeno/mandamiento’. Una leve revisión mejora fidelidad y legibilidad sin parafrasear.
  glossary_alignment: Alinea correctamente «Yahvé», «mandamientos», «camino» y «otros dioses». La nota léxica sobre שׁמע está bien orientada. No hay conflicto doctrinal serio; el ajuste es principalmente estilístico-lexical para que el español preserve mejor la fuerza del original y del audit trail inglés.
  issues:
  - severity: medium
    issue: «si no escuchan los mandamientos» es poco idiomático en español
    rationale: Aunque reproduce de cerca el léxico de שׁמע, en español esa construcción suena extraña con un objeto no personal. Conviene mantener «escuchan» por fidelidad, pero con una formulación más natural en el resto del verso y con la nota léxica; alternativamente, «obedecen» sería más natural pero menos literal.
  - severity: low
    issue: «que yo les mando hoy» puede sonar débil o ambiguo
    rationale: En español, «mandar» puede significar enviar o encargar. «Les ordeno hoy» o «les estoy mandando hoy» refleja mejor מְצַוֶּה y el contexto de mandamientos.
  revised_spanish_text: y la maldición[a], si no escuchan los mandamientos de Yahvé su Dios, y se apartan del camino que yo les ordeno hoy, para ir tras otros dioses que no han conocido.
  revised_footnotes:
  - marker: a
    text: O «obedecen los mandamientos de Yahvé su Dios». El verbo hebreo para «escuchar» suele incluir la idea de obediencia en contextos de pacto.
    reason: lexical_alternative
  revision_rationale: Se conserva la decisión principal «escuchan» con su nota léxica, pero se ajusta «les mando hoy» a «les ordeno hoy» para representar mejor el participio hebreo y evitar ambigüedad en español. El resto del verso está bien alineado con el hebreo y la terminología del proyecto.
