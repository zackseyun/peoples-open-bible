translation:
  language: es
  text: Su ira me ha desgarrado y me ha odiado[a]; rechina los dientes contra mí; mi adversario aguza sus ojos contra mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi enemigo aguza sus ojos contra mí». La imagen hebrea es literalmente «aguza» o «afila sus ojos», una metáfora de mirar con intención hostil.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַפּוֹ
  english_pob_choice: His anger
  chosen_spanish: su ira
  alternatives_spanish:
  - su enojo
  - su furor
  - su cólera
  lexicon: HALOT
  rationale: אַף literalmente es «nariz» y por extensión «ira/enojo». En este contexto poético la referencia idiomática es a la emoción hostil, no al rasgo corporal. «Ira» conserva la fuerza del hebreo con naturalidad en español.
- source_word: טָרַף
  english_pob_choice: has torn
  chosen_spanish: ha desgarrado
  alternatives_spanish:
  - ha arrancado
  - ha despedazado
  - me ha roto
  lexicon: HALOT
  rationale: El verbo expresa la acción de rasgar o destrozar como una fiera. «Ha desgarrado» mantiene la imagen violenta y el resultado presente de la lamentación.
- source_word: וַיִּשְׂטְמֵנִי
  english_pob_choice: and hated me
  chosen_spanish: y me ha odiado
  alternatives_spanish:
  - y me odió
  - y me ha sido hostil
  - y me ha mostrado odio
  lexicon: HALOT
  rationale: שׂטם denota odio/enemistad. «Me ha odiado» es directo y no añade matices ajenos como ataque físico o hostilidad legal.
- source_word: חָרַק
  english_pob_choice: he gnashes
  chosen_spanish: rechina
  alternatives_spanish:
  - chasquea
  - aprieta
  - gruñe
  lexicon: HALOT
  rationale: El verbo se usa de dientes que crujen o rechinan en rabia. «Rechina» transmite la imagen sonora y agresiva con claridad en español.
- source_word: בְּשִׁנָּיו
  english_pob_choice: his teeth
  chosen_spanish: sus dientes
  alternatives_spanish:
  - con sus dientes
  lexicon: HALOT
  rationale: En español, con «rechina» el complemento directo «sus dientes» ya deja implícita la relación instrumental; añadir «con» sería más pesado sin aportar claridad real.
- source_word: צָרִי
  english_pob_choice: my adversary
  chosen_spanish: mi adversario
  alternatives_spanish:
  - mi enemigo
  - mi adversario/mi enemigo
  - mi opresor
  lexicon: HALOT
  rationale: צָרִי designa a un opositor hostil. «Adversario» preserva la oposición personal sin decidir indebidamente si el foco es militar, legal o más amplio.
- source_word: יִלְטוֹשׁ
  english_pob_choice: sharpens
  chosen_spanish: aguza
  alternatives_spanish:
  - afila
  - agudiza
  - afina
  lexicon: HALOT
  rationale: El verbo significa literalmente afilar/afilar con piedra. Aplicado a los ojos, «aguza» conserva el valor metafórico e intenso mejor que suavizarlo a «mira fijamente».
- source_word: עֵינָיו לִי
  english_pob_choice: his eyes against me
  chosen_spanish: sus ojos contra mí
  alternatives_spanish:
  - sus ojos hacia mí
  - su mirada contra mí
  - sus ojos sobre mí
  lexicon: HALOT
  rationale: La preposición לִי en este contexto expresa dirección hostil. «Contra mí» conserva esa oposición y el carácter agresivo de la imagen; «mirada» sería una paráfrasis no garantizada por el hebreo.
theological_decisions:
- issue: Referente del sujeto hostil en la queja de Job
  english_pob_reading: Retain the masculine singular references without identifying the referent beyond the text.
  chosen_spanish_reading: Mantener las referencias masculinas singulares sin identificar más allá del texto quién es el sujeto hostil.
  alternative_spanish_readings:
  - Dios como referente inmediato
  - un enemigo humano
  - una representación poética de Dios actuando como enemigo
  rationale: El verso forma parte de la lamentación y el hebreo no fuerza una identificación explícita en cada miembro de la frase. La traducción conserva la tensión teológica sin resolverla ni estrecharla indebidamente.
  doctrine_reference: Preservar la tensión teológica en Job sin armonizarla artificialmente.
translation_notes:
  revision_awareness: 'Coincide con la última pasada revisada: no se registraron cambios necesarios y la lectura permanece estable respecto del control de revisión.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como convención del proyecto cuando corresponda, pero en este versículo no aparece el nombre divino explícito.
  - Se prefirió «adversario» para mantener la ambigüedad del sujeto hostil, en línea con la auditoría inglesa.
  - Se conservó la metáfora ocular («aguza sus ojos») en lugar de suavizarla a «mira fijamente», para respetar el hebreo y la nota lexical.
  - La puntuación refleja dos cola poéticos con un punto y coma para facilitar la lectura sin alterar la sintaxis hebrea.
