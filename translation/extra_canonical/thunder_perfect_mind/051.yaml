translation:
  text: 'And I am she whose festivals are many[a]. I, I am a godless one,

    and I am she whose God is great.

    I am the one you have pondered,

    and you have scorned me.

    I am an unlearned one[f][e][d][c][b],

    and they learn.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Coptic phrase “I am the maiden—her God” is syntactically elliptical
      and is often taken as a relative construction, ‘I am the one whose God …,’ with
      some witnesses supplying ‘is great.’ The present text does not securely show
      an adjective.
    reason: alignment_note
  - marker: b
    text: ϫⲓⲥⲃⲱ ⲉⲃⲟⲗ literally ‘take-teaching out,’ an idiom for ‘learn’; the particle
      ⲉⲃⲟⲗ can intensify or mark completion and is not directly carried over into
      English here.
    reason: lexical_alternative
  - marker: c
    text: Or 'And I—I am a godless one,'.
    reason: previous_rendering
  - marker: d
    text: Or 'and I am the maiden—her God.'.
    reason: previous_rendering
  - marker: e
    text: Or 'and you were not ashamed.'.
    reason: previous_rendering
  - marker: f
    text: Or 'the one you have pondered about me,'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲟⲩⲁⲧⲛⲟⲩⲧⲉ
  chosen: a godless one
  alternatives:
  - one without God
  - an atheist
  lexicon: Crum, Coptic Dictionary
  rationale: ⲁⲧ- is privative and ⲛⲟⲩⲧⲉ is “god”; rendering as “godless” keeps the
    paradox with the following clause and is idiomatic without importing modern connotations
    of “atheist.”
- source_word: ⲧⲉⲛϣⲉ
  chosen: the maiden
  alternatives:
  - the girl
  - the young woman
  lexicon: Crum, Coptic Dictionary
  rationale: Standard Sahidic for a young woman/maiden; fits Thunder’s feminine voice
    and stock self-identifications.
- source_word: ⲡⲉⲥⲛⲟⲩⲧⲉ
  chosen: her God
  alternatives:
  - her god
  lexicon: Crum, Coptic Dictionary
  rationale: Possessive construction (ⲡⲉⲥ- ‘her’ + ⲛⲟⲩⲧⲉ ‘god’). Capitalized to reflect
    deity in context, while retaining the paradox with “godless.”
- source_word: ⲙⲉⲉⲩⲉ ⲉⲣⲟⲓ
  chosen: pondered about me
  alternatives:
  - thought about me
  - considered me
  lexicon: Crum, Coptic Dictionary
  rationale: ⲙⲉⲉⲩⲉ ‘to think/consider’; “ponder” preserves the deliberative tone typical
    of the discourse.
- source_word: ϣⲟⲥⲧ
  chosen: were not ashamed
  alternatives:
  - did not feel shame
  - were not disgraced
  lexicon: Crum, Coptic Dictionary
  rationale: Negative aorist with prefixed ⲁⲧ- in the text; “be ashamed” is the usual
    English equivalent.
- source_word: ⲁⲧⲥⲃⲱ
  chosen: unlearned
  alternatives:
  - untaught
  - ignorant
  lexicon: Crum, Coptic Dictionary
  rationale: Privative ⲁⲧ- + ⲥⲃⲱ ‘teach’; “unlearned” pairs directly with the following
    “they learn.”
- source_word: ϫⲓⲥⲃⲱ
  chosen: learn
  alternatives:
  - be taught
  - receive instruction
  lexicon: Crum, Coptic Dictionary
  rationale: 'ϫⲓ- ‘take’ + ⲥⲃⲱ ‘teaching’: idiomatically ‘to learn.’'
- source_word: ⲉⲃⲟⲗ (with ϫⲓⲥⲃⲱ)
  chosen: '[not overtly rendered]'
  alternatives:
  - out
  - forth
  lexicon: Crum, Coptic Dictionary
  rationale: Directional particle often functions as an aspectual/intensive; omitted
    in English for readability, with the sense carried by simple ‘learn.’
parallelism_check: 'The block preserves two paradoxical pairings: (1) “I, I am a godless
  one” // “I am the maiden—her God,” echoing the self-contradictory identity typical
  of Thunder; (2) “I am an unlearned one” // “and they learn,” keeping the antithetical
  force. The repeated “I am” and the emphatic duplication “I—I” are retained to mirror
  the Coptic anok anok cadence.'
voice_check: First-person feminine divine voice is maintained with explicit “I am”
  statements. The doubling “I—I” reflects ⲁⲛⲟⲕ ⲁⲛⲟⲕ, and the authoritative, paradox-stating
  tone is preserved without smoothing.
alignment_risk_note: 'Overall alignment is medium. Several elements are secure: ⲟⲩⲁⲧⲛⲟⲩⲧⲉ
  → ‘a godless one’; ⲁⲧⲥⲃⲱ/ϫⲓⲥⲃⲱ → ‘unlearned / they learn’; ⲙⲉⲉⲩⲉ ⲉⲣⲟⲓ and ⲁⲧⲉⲧⲛϣⲟⲥⲧ
  are standard. The most uncertain is the phrase ⲁⲛⲟⲕ ⲧⲉ ⲧⲉⲛϣⲉ ⲡⲉⲥⲛⲟⲩⲧⲉ, which is
  syntactically elliptical; we render it as “I am the maiden—her God,” recognizing
  that many editors take this as a relative construction (“the one whose God … [is
  great]”). The very first line’s OCR cluster ⲧⲉⲛϣⲉⲛⲉⲥⲱⲥ may reflect spacing/segmentation
  issues; our rendering folds it into the clearer adjacent clause rather than force
  a speculative gloss.'
