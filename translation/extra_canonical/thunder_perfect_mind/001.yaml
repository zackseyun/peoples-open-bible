translation:
  text: 'Thunder, Perfect Mind.


    I was sent forth from the Power[a],

    and I have come[b] to those who meditate on me,

    and I was found[c] among those who seek me.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: “Power” likely renders Greek δύναμις (loanword in Coptic). The article is
      not visible in this OCR slice; “from the Power” is inferred from standard witnesses.
    reason: alignment_note
  - marker: b
    text: OCR shows ⲛⲧⲁⲓⲥⲱⲧⲙ (“I was heard”). Many editions read ⲛⲧⲁⲓⲉⲓ (“I came”).
      If ⲥⲱⲧⲙ is confirmed, this line could read “and I was heard by those who meditate
      on me.”
    reason: alternative_reading
  - marker: c
    text: The Coptic ⲁⲓϭⲓⲛⲉ ⲙⲙⲟⲓ can be construed as “I found myself,” “I was found,”
      or “they found me.” We choose “was found” for cadence and symmetry.
    reason: alternative_reading
lexical_decisions:
- source_word: ⲧⲃⲣⲟⲛⲧⲏ
  chosen: Thunder
  alternatives:
  - The Thunder
  lexicon: Crum, Coptic Dictionary; Greek loan from βροντή
  rationale: Title element; βροντή means thunder. Omitted the English article for
    concision in a title; sense unchanged.
- source_word: ⲛⲟⲩⲥ
  chosen: Mind
  alternatives:
  - Intellect
  lexicon: Greek νοῦς
  rationale: In title position functions as an epithet. "Mind" is the standard, preserving
    strangeness and brevity.
- source_word: ⲛⲧⲉⲗⲉⲓⲟⲥ
  chosen: Perfect
  alternatives:
  - Complete
  - Whole
  lexicon: Greek τέλειος
  rationale: As an epithet in the title, "Perfect" is the conventional and most literal
    choice.
- source_word: ⲧⲁⲛⲧⲁⲟⲩⲟⲉⲓ ... ⲉⲃⲟⲗ
  chosen: I was sent forth
  alternatives:
  - I was sent out
  - I went forth
  lexicon: Layton, Coptic Grammar; Crum s.v. ⲟⲩⲟⲉⲓ/ⲧⲁⲟⲩⲟⲉⲓ; ⲉⲃⲟⲗ = out, forth
  rationale: Standard opening of the work; passive sense with ⲉⲃⲟⲗ conveys motion
    outward initiated by another (sending).
- source_word: (implied) ⲛⲧⲉ ⲧⲉ ⲇⲩⲛⲁⲙⲓⲥ
  chosen: from the Power
  alternatives:
  - out of Power
  lexicon: Greek δύναμις (loanword in Coptic)
  rationale: 'Common reading in editions: "from the Power"; capitalization signals
    titular force; article presence not visible in excerpt, noted in footnote.'
- source_word: ⲙⲉⲉⲩⲉ ⲉⲣⲟⲓ
  chosen: meditate on me
  alternatives:
  - ponder me
  - think about me
  - reflect on me
  lexicon: Crum s.v. ⲙⲉⲉⲩⲉ
  rationale: ⲙⲉⲉⲩⲉ has a deliberative/reflective nuance; "meditate" preserves contemplative
    tone.
- source_word: ⲛⲧⲁⲓⲥⲱⲧⲙ (OCR) / ⲛⲧⲁⲓⲉⲓ (expected)
  chosen: I have come
  alternatives:
  - I was heard
  lexicon: Crum s.v. ⲉⲓ (come), ⲥⲱⲧⲙ (hear)
  rationale: Most editions read "I came" here; the OCR shows ⲥⲱⲧⲙ, likely misread.
    We render "have come" but footnote the alternative if ⲥⲱⲧⲙ were intended.
- source_word: ⲁⲓϭⲓⲛⲉ ⲙⲙⲟⲓ ϩⲛ ⲛⲉⲧϣⲓⲛⲉ ⲛⲥⲱⲓ
  chosen: I was found among those who seek me
  alternatives:
  - I found myself among those who seek me
  - I was discovered among those who search for me
  - They found me among those who seek me
  lexicon: Crum s.v. ϭⲓⲛⲉ (find), ϣⲓⲛⲉ (seek)
  rationale: The passive-like English best matches the idiomatic sense in context
    and balances the parallel clauses; subject voice is debated and noted.
parallelism_check: Three coordinated first-person perfective claims (was sent forth
  / have come / was found) maintain the rhetorical cadence of the proem. Repetition
  of "and I" is preserved to carry the incremental parallelism.
voice_check: 'Direct first-person divine voice is kept: assertive "I" statements without
  smoothing or dilution. The tone remains oracular and immediate.'
alignment_risk_note: Alignment confidence is medium. The title line order in Coptic
  reads literally "Thunder Mind Perfect"; we render the conventional "Thunder, Perfect
  Mind" while preserving all three nouns. The phrase "from the Power" is not visible
  in the truncated OCR but is expected from standard witnesses; we mark this as inferred.
  The second clause shows ⲛⲧⲁⲓⲥⲱⲧⲙ (hear) in the OCR where editions read ⲛⲧⲁⲓⲉⲓ (come);
  we translate "have come" but flag the alternative. The form ⲁⲓϭⲓⲛⲉ ⲙⲙⲟⲓ allows multiple
  analyses (I found myself / I was found / they found me); we choose a passive rendering
  for balance. The final OCR line ("ⲧⲉⲧⲛⲉⲣⲟⲉⲓⲥ …") likely belongs to the next unit
  and is excluded here.
