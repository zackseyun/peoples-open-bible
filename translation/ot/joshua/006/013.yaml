id: JOS.6.13
reference: Joshua 6:13
source:
  edition: WLC
  text: וְ/שִׁבְעָ֣ה הַ/כֹּהֲנִ֡ים נֹשְׂאִים֩ שִׁבְעָ֨ה שׁוֹפְר֜וֹת הַ/יֹּבְלִ֗ים לִ/פְנֵי֙ אֲר֣וֹן יְהוָ֔ה הֹלְכִ֣ים הָל֔וֹךְ וְ/תָקְע֖וּ בַּ/שּׁוֹפָר֑וֹת וְ/הֶ/חָלוּץ֙ הֹלֵ֣ךְ לִ/פְנֵי/הֶ֔ם וְ/הַֽ/מְאַסֵּ֗ף הֹלֵךְ֙ אַֽחֲרֵי֙ אֲר֣וֹן יְהוָ֔ה הולך וְ/תָק֥וֹעַ בַּ/שּׁוֹפָרֽוֹת׃
translation:
  text: And the seven priests[a], carrying seven ram’s-horn trumpets before the ark of Yahweh, were walking on and blowing the trumpets, and the armed men were going before them, and the rear guard was going behind the ark of Yahweh, while they went on blowing the trumpets.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'seven jubilee trumpets' or 'seven rams’ horns.' The Hebrew expression refers to shofars made from or associated with rams’ horns.
    reason: lexical_alternative
lexical_decisions:
- source_word: שׁוֹפְרוֹת הַיֹּבְלִים
  chosen: ram’s-horn trumpets
  alternatives:
  - jubilee trumpets
  - rams’ horns
  lexicon: HALOT
  rationale: שׁוֹפָר denotes a horn/trumpet, and הַיֹּבְלִים specifies ram-related horns rather than a generic metal instrument. 'Ram’s-horn trumpets' preserves both the material/source and the instrument function in readable English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הֹלְכִים הָלוֹךְ
  chosen: were walking on
  alternatives:
  - went continually
  - kept walking
  lexicon: HALOT
  rationale: The finite verb plus infinitive absolute intensifies or gives durative force. 'Were walking on' captures the ongoing procession without sounding wooden.
- source_word: וְתָקְעוּ בַּשּׁוֹפָרוֹת
  chosen: and blowing the trumpets
  alternatives:
  - and they blew the trumpets
  - and sounding the trumpets
  lexicon: HALOT
  rationale: In sequence with the participial procession, English participial style best reflects the ongoing action. 'Blowing' is the natural idiom for תקע with שׁוֹפָר.
- source_word: הֶחָלוּץ
  chosen: the armed men
  alternatives:
  - the vanguard
  - the armed force
  lexicon: HALOT
  rationale: The term refers to those equipped for battle who go ahead of the procession. 'The armed men' is clear and fits the military context.
- source_word: לִפְנֵיהֶם
  chosen: before them
  alternatives:
  - ahead of them
  lexicon: HALOT
  rationale: A straightforward spatial rendering; 'them' most naturally refers to the priests just mentioned.
- source_word: הַמְאַסֵּף
  chosen: the rear guard
  alternatives:
  - the rearward
  - the one gathering up the rear
  lexicon: HALOT
  rationale: In military/processional context the participle denotes the body bringing up the rear. 'Rear guard' is idiomatic and precise.
- source_word: אַחֲרֵי אֲרוֹן יְהוָה
  chosen: behind the ark of the LORD
  alternatives:
  - after the ark of the LORD
  lexicon: HALOT
  rationale: Spatial 'behind' is clearer in English than the more literal 'after' in this procession scene.
- source_word: הוֹלֵךְ וְתָקוֹעַ
  chosen: going on and blowing the trumpets
  alternatives:
  - continually going and blowing
  - walking along and blowing
  lexicon: HALOT
  rationale: This final clause resumes the durative sense of the procession. 'Going on and blowing' preserves the repetitive, ongoing action.
