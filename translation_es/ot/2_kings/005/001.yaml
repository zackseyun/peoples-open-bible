translation:
  language: es
  text: Ahora Naamán, comandante del ejército del rey de Aram, era un gran hombre ante su señor y muy estimado, porque por medio de él Yahvé había dado victoria[a] a Aram. El hombre era un gran guerrero, pero estaba leproso[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «liberación» o «salvación»; el término hebreo puede tener un sentido más amplio, pero aquí se refiere al éxito militar.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «leproso». El término alude a una afección cutánea grave en el contexto antiguo y no necesariamente coincide con la lepra clínica moderna.
    reason: cultural_note
lexical_decisions:
- source_word: וְנַעֲמָן
  english_pob_choice: Now Naaman
  chosen_spanish: Ahora Naamán
  alternatives_spanish:
  - Y Naamán
  - Ahora bien, Naamán
  lexicon: HALOT
  rationale: El waw narrativo introduce una nueva escena; en español, «Ahora» transmite con naturalidad el arranque discursivo sin perder el valor de transición narrativa. Se conserva la transliteración del nombre propio.
- source_word: שַׂר צְבָא
  english_pob_choice: commander of the army
  chosen_spanish: comandante del ejército
  alternatives_spanish:
  - capitán del ejército
  - jefe del ejército
  lexicon: HALOT
  rationale: שַׂר denota un oficial o comandante, y צְבָא aquí es la fuerza militar. «Comandante del ejército» comunica con claridad el cargo y mantiene el sentido militar del hebreo.
- source_word: מֶלֶךְ אֲרָם
  english_pob_choice: of the king of Aram
  chosen_spanish: del rey de Aram
  alternatives_spanish:
  - del rey de Siria
  lexicon: HALOT
  rationale: Se conserva «Aram» porque el hebreo nombra el reino arameo específico. La tradición «Siria» se deja como alternativa, pero no se adopta como texto principal por la primacía del original.
- source_word: הָיָה אִישׁ גָּדוֹל
  english_pob_choice: was a great man
  chosen_spanish: era un hombre grande
  alternatives_spanish:
  - era un hombre importante
  - era un gran hombre
  lexicon: HALOT
  rationale: El hebreo usa un giro idiomático de estatura social y relevancia. «Era un hombre grande» mantiene de manera más directa la forma del original; en español puede sonar menos idiomático, pero conserva la tensión léxica mejor que una paráfrasis como «importante».
- source_word: לִפְנֵי אֲדֹנָיו
  english_pob_choice: before his master
  chosen_spanish: delante de su señor
  alternatives_spanish:
  - en presencia de su señor
  - ante su señor
  lexicon: HALOT
  rationale: לִפְנֵי expresa estar «delante de» o «en presencia de». «Señor» refleja el sentido de אֲדֹנָיו como superior humano, no como título divino, y evita una lectura demasiado modernizada de «amo» si el contexto cortesano se quiere mantener.
- source_word: וּנְשֻׂא פָנִים
  english_pob_choice: highly esteemed
  chosen_spanish: muy estimado
  alternatives_spanish:
  - honrado
  - tenido en honor
  - favorecido
  lexicon: HALOT
  rationale: El modismo hebreo alude literalmente a «ser levantado de rostro», es decir, ser honrado o gozar de favor. «Muy estimado» traslada el valor idiomático de forma natural en español.
- source_word: כִּי בּוֹ נָתַן יְהוָה תְּשׁוּעָה לַאֲרָם
  english_pob_choice: because through him Yahweh had given victory to Aram
  chosen_spanish: porque por medio de él Yahvé había dado victoria a Aram
  alternatives_spanish:
  - porque por medio de él Yahvé había dado liberación a Aram
  - porque por él Yahvé había dado salvación a Aram
  lexicon: HALOT
  rationale: תְּשׁוּעָה puede significar liberación, salvación o victoria; aquí el contexto militar favorece «victoria». בּוֹ expresa mediación/instrumentalidad, por lo que «por medio de él» conserva bien la relación causal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue la convención POB de traducir el Tetragrama como «Yahvé», preservando el nombre propio del Dios de Israel en vez de sustituirlo por un título.
- source_word: וְהָאִישׁ
  english_pob_choice: The man
  chosen_spanish: El hombre
  alternatives_spanish:
  - Y el hombre
  - Ahora el hombre
  lexicon: HALOT
  rationale: La repetición retoma a Naamán como sujeto focal. «El hombre» mantiene el artículo hebreo y la reanudación enfática del referente.
- source_word: גִּבּוֹר חַיִל
  english_pob_choice: a mighty warrior
  chosen_spanish: un guerrero valiente
  alternatives_spanish:
  - un guerrero poderoso
  - un hombre valeroso
  lexicon: HALOT
  rationale: La expresión denota capacidad militar y valor probado. «Guerrero valiente» conserva el sentido bélico y la fuerza cualitativa sin sonar forzado en español.
- source_word: מְצֹרָע
  english_pob_choice: leprous
  chosen_spanish: leproso
  alternatives_spanish:
  - afligido de lepra
  - con enfermedad de la piel
  lexicon: HALOT
  rationale: Se conserva el vínculo léxico tradicional con la forma participial hebrea. Como en el texto fuente, el término no se moderniza hacia un diagnóstico clínico preciso; la ambigüedad histórica se mantiene.
theological_decisions:
- issue: Traducción del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el Señor
  rationale: El hebreo emplea el Tetragrama de forma directa. Se traduce como «Yahvé» para preservar el nombre propio revelado, en continuidad con la convención del proyecto y sin ocultarlo tras un título funcional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Atribuir a Yahvé la victoria otorgada a Aram
  english_pob_reading: because through him Yahweh had given victory to Aram
  chosen_spanish_reading: porque por medio de él Yahvé había dado victoria a Aram
  alternative_spanish_readings:
  - porque por medio de él Yahvé había dado liberación a Aram
  - porque por medio de él Yahvé había dado salvación a Aram
  rationale: El hebreo atribuye explícitamente a Yahvé el éxito militar de una nación extranjera. La traducción preserva esa afirmación sin suavizarla, manteniendo la soberanía divina sobre Aram y la tensión teológica del pasaje.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La versión inglesa más reciente no introdujo cambios; el presente borrador sigue de cerca el pasaje fuente y conserva las decisiones auditadas sobre Aram, Yahvé, תְּשׁוּעָה y מְצֹרָע.
  spanish_consistency_notes:
  - Se mantiene «Aram» en lugar de «Siria» por coherencia con la primacía del hebreo.
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - «Leproso» conserva el término tradicional y la advertencia contextual sobre su alcance antiguo.
  - La puntuación y el orden de las cláusulas siguen de cerca la sintaxis hebrea sin sonar mecánicos en español.
