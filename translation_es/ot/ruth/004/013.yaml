translation:
  language: es
  text: Así que Booz tomó a Rut, y ella llegó a ser su esposa. Él se llegó a ella, y Yahvé le concedió la concepción[a], y ella dio a luz un hijo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Yahvé le dio la concepción» o «Yahvé le permitió concebir».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - se casó con
  - recibió a
  lexicon: HALOT
  rationale: לקח significa literalmente 'tomar'. En este contexto matrimonial, el POB conserva ese verbo porque la frase siguiente ya aclara el estado conyugal; en español, 'tomó a Rut' mantiene esa cercanía al hebreo sin redundancia excesiva.
- source_word: וַתְּהִי לוֹ לְאִשָּׁה
  english_pob_choice: she became his wife
  chosen_spanish: ella llegó a ser su esposa
  alternatives_spanish:
  - ella fue su esposa
  - ella se hizo su mujer
  lexicon: HALOT
  rationale: La expresión marca el paso a un estado matrimonial formal. 'Llegó a ser su esposa' conserva el sentido de cambio de estatus y suena natural en español; 'mujer' sería posible, pero aquí 'esposa' comunica mejor la relación jurídica y social.
- source_word: וַיָּבֹא אֵלֶיהָ
  english_pob_choice: He went in to her
  chosen_spanish: Él se llegó a ella
  alternatives_spanish:
  - él entró a ella
  - él tuvo relaciones con ella
  lexicon: HALOT
  rationale: Es un eufemismo hebreo para la unión sexual. En español, 'se llegó a ella' preserva mejor ese registro velado y la dirección del movimiento que una paráfrasis explícita; evita también un calco demasiado duro de 'went in to her'.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Siguiendo la norma del proyecto, el Tetragrámaton se rinde como 'Yahvé', preservando el nombre propio divino en vez de sustituirlo por un título. En español, 'Yahvé' es la forma establecida para este registro.
- source_word: וַיִּתֵּן יְהוָה לָהּ הֵרָיוֹן
  english_pob_choice: the LORD granted her conception
  chosen_spanish: Yahvé le concedió concepción
  alternatives_spanish:
  - Yahvé le dio concepción
  - Yahvé le permitió concebir
  lexicon: HALOT
  rationale: הֵרָיוֹן apunta a la concepción/embarazo como resultado otorgado. 'Le concedió concepción' conserva la agencia divina explícita del hebreo y la opción del POB, aunque en español suena algo más nominal; por eso se mantiene para no diluir el énfasis en el don de Yahvé.
- source_word: וַתֵּלֶד בֵּן
  english_pob_choice: she bore a son
  chosen_spanish: dio a luz un hijo
  alternatives_spanish:
  - parió un hijo
  - tuvo un hijo
  lexicon: HALOT
  rationale: ילד + בן se expresa de forma natural como 'dar a luz un hijo' en español bíblico contemporáneo. Es claro, digno y conserva el registro narrativo sin perder el sentido de nacimiento.
theological_decisions:
- issue: Nombre divino יְהוָה en la narración
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La lectura española sigue la decisión doctrinal del proyecto de transliterar el nombre divino, evitando la sustitución por un título. Esto preserva la identificación del Dios del pacto en el relato.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Agencia divina en la concepción de Rut
  english_pob_reading: the LORD granted her conception
  chosen_spanish_reading: Yahvé le concedió concepción
  alternative_spanish_readings:
  - Yahvé le permitió concebir
  - Yahvé le dio la capacidad de concebir
  rationale: El hebreo presenta la concepción como algo dado por Yahvé, no como un mero hecho biológico. La traducción conserva esa agencia divina sin añadir explicación interpretativa.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
translation_notes:
  revision_awareness: El paquete fuente y la auditoría inglesa muestran acuerdo alto y sin revisiones aplicadas; por tanto, el borrador español sigue de cerca las decisiones consolidadas, ajustándolas únicamente para idiomaticidad natural en español.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente para יְהוָה.
  - '''Dar a luz'' conserva el tono narrativo de ''bore'' sin sobreexplicar.'
  - 'La secuencia verbal reproduce el avance narrativo del hebreo: tomó → llegó a ser esposa → se llegó a ella → concedió concepción → dio a luz.'
