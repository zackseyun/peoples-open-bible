translation:
  language: es
  text: 'Los hijos de Shobal: Alian[a], Manahat, Ebal, Shefi e Onam[b]. Y los hijos de Zibeón: Aía y Anah.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Alian»; la genealogía paralela en Génesis 36:23 lee «Alván».'
    reason: alternative_reading
  - marker: b
    text: Crónicas lee «Shefi»; el paralelo en Génesis 36:23 lee «Shefo».
    reason: alternative_reading
lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Los descendientes de
  lexicon: HALOT
  rationale: En una genealogía, בְּנֵי conserva de forma natural la relación filial concreta; en español, «los hijos de» reproduce bien la estructura genealógica sin perder precisión. «Los descendientes de» sería posible, pero diluye más la forma directa del hebreo y no es necesario aquí.
- source_word: שׁוֹבָל
  english_pob_choice: Shobal
  chosen_spanish: Shobal
  alternatives_spanish:
  - Sobal
  lexicon: Nombre propio; transliteración estándar
  rationale: Nombre propio hebreo. Se conserva la transliteración tradicional al español para mantener reconocibilidad bíblica y coherencia con el resto de la genealogía.
- source_word: עַלְיָן
  english_pob_choice: Alian
  chosen_spanish: Alian
  alternatives_spanish:
  - Alván
  lexicon: Nombre propio; tradición paralela en Gn 36:23
  rationale: La forma consonántica de Crónicas apoya «Alian» como reflejo directo de este versículo. Se preserva la tensión con la tradición paralela de Génesis 36:23, que presenta «Alván».
- source_word: מָנַחַת
  english_pob_choice: Manahath
  chosen_spanish: Manahat
  alternatives_spanish:
  - Manahat
  lexicon: Nombre propio; transliteración directa
  rationale: Se translitera el nombre propio desde el hebreo. En español se prefiere una forma simple y legible, sin forzar terminaciones inglesas cuando no son necesarias.
- source_word: עֵיבָל
  english_pob_choice: Ebal
  chosen_spanish: Ebal
  alternatives_spanish:
  - Obal
  lexicon: Nombre propio; tradición paralela en Gn 36:23
  rationale: Se sigue la forma del hebreo de Crónicas. Aunque hay variación paralela en Génesis, la lectura de este versículo respalda «Ebal» como renderización directa.
- source_word: שְׁפִי
  english_pob_choice: Shephi
  chosen_spanish: Shefi
  alternatives_spanish:
  - Shefo
  lexicon: Nombre propio; tradición paralela en Gn 36:23
  rationale: Se conserva la forma de Crónicas. La variación paralela con Génesis se reconoce, pero no se uniformiza artificialmente la tradición textual.
- source_word: אוֹנָם
  english_pob_choice: Onam
  chosen_spanish: Onam
  alternatives_spanish:
  - Onán
  lexicon: Nombre propio; transliteración directa
  rationale: Nombre propio transliterado directamente del hebreo. Se evita añadir acentuación o adaptación no sustentada por el texto.
- source_word: צִבְעוֹן
  english_pob_choice: Zibeon
  chosen_spanish: Zibeón
  alternatives_spanish:
  - Zibeon
  lexicon: Nombre propio; transliteración estándar
  rationale: Se adapta al español bíblico con acento gráfico para lectura natural, manteniendo la identidad del nombre hebreo.
- source_word: אַיָּה
  english_pob_choice: Aiah
  chosen_spanish: Aía
  alternatives_spanish:
  - Ajah
  lexicon: Nombre propio; transliteración estándar
  rationale: Se conserva una transliteración cercana al hebreo y más transparente para el lector hispanohablante. La forma «Ajah» es posible, pero «Aía» refleja mejor la vocalización y mantiene la unicidad del nombre.
- source_word: עֲנָה
  english_pob_choice: Anah
  chosen_spanish: Anah
  alternatives_spanish:
  - Aná
  lexicon: Nombre propio; transliteración directa
  rationale: Nombre propio conservado en transliteración simple, como en la tradición bíblica en español.
- source_word: וְ / וּ / וַ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: HALOT
  rationale: La conjunción coordinante en esta lista genealógica se rinde naturalmente como «y». «E» no es necesaria salvo ante sonido inicial i-; aquí no aplica de forma consistente para los nombres.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo de 1 Crónicas 1:40 y conserva las variantes genealógicas documentadas en el aparato inglés: Alian/Alván y Shefi/Shefo. No se requieren revisiones textuales adicionales respecto del tramo auditado.'
  spanish_consistency_notes:
  - Se usa «hijos de» para mantener la estructura genealógica directa del hebreo.
  - Se conserva «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Los nombres propios se transliteran con adaptación mínima al español para legibilidad, sin armonizar indebidamente variantes paralelas.
  - Las notas al pie señalan solo las variantes documentadas en el audit trail inglés y se anclan en el texto donde corresponde.
