translation:
  language: es
  text: Pero la tierra pertenecía al hombre fuerte[a], y el hombre favorecido[b] habitaba en ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «hombre de brazo», un modismo para un hombre poderoso o fuerte.
    reason: lexical_alternative
  - marker: b
    text: O «el hombre honrado», «el que recibe favor» o «el tratado con parcialidad» para «el hombre favorecido».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִישׁ
  english_pob_choice: But the ... man
  chosen_spanish: Pero ... el hombre
  alternatives_spanish:
  - Y ... el hombre
  - As de ... el hombre
  lexicon: HALOT
  rationale: El prefijo conjuntivo puede leerse en contexto con valor adversativo, como en el inglés POB. En español, «Pero» comunica mejor el contraste implícito con el contexto inmediato que un simple «Y».
- source_word: זְרוֹעַ
  english_pob_choice: strong
  chosen_spanish: fuerte
  alternatives_spanish:
  - de brazo
  - poderoso
  - valiente
  lexicon: HALOT
  rationale: La expresión literal «hombre de brazo» es idiomática; en español, «hombre fuerte» transmite el sentido de poder o fuerza física/social sin perder naturalidad. Se conserva la referencia al tipo de persona descrita, no solo una cualidad abstracta.
- source_word: לוֹ הָאָרֶץ
  english_pob_choice: the land belonged to
  chosen_spanish: la tierra pertenecía a
  alternatives_spanish:
  - la tierra era de
  - él tenía la tierra
  - la tierra era suya
  lexicon: HALOT
  rationale: El dativo posesivo expresa tenencia o control. «Pertenecía a» comunica bien la posesión implícita y mantiene el matiz relacional sin volverlo demasiado coloquial.
- source_word: וּנְשׂוּא פָנִים
  english_pob_choice: the favored man
  chosen_spanish: el hombre favorecido
  alternatives_spanish:
  - el hombre honrado
  - el hombre tenido en honor
  - el hombre de rostro levantado
  lexicon: HALOT
  rationale: La locución es idiomática y puede implicar favor, honor o parcialidad. «Hombre favorecido» conserva la amplitud semántica del inglés POB y evita decidir de antemano entre honor legítimo y favoritismo injusto.
- source_word: יֵשֶׁב בָּהּ
  english_pob_choice: lived in it
  chosen_spanish: habitaba en ella
  alternatives_spanish:
  - vivía en ella
  - moraba en ella
  - se establecía en ella
  lexicon: HALOT
  rationale: «Habitar» mantiene un registro sobrio y bíblico sin sonar arcaico; además, refleja el sentido de residir/ocupar la tierra con continuidad.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo masorético y reproduce la misma lectura que el POB inglés auditado, sin cambios revisionales reportados en el expediente; se conservan las dos ambigüedades idiomáticas principales mediante notas.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque el verso no contiene el tetragrámaton ni una cita del nombre divino.
  - Se eligió «tierra» para הָאָרֶץ porque el contexto habla de posesión/ocupación territorial, no de «país» en sentido moderno.
  - «Hombre favorecido» mantiene la ambigüedad entre honor y parcialidad presente en el hebreo y reconocida por el POB inglés.
  - La puntuación refleja una sola oración coordinada, natural en español y fiel al paralelismo hebreo.
