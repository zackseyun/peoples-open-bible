translation:
  language: es
  text: Estoy desfallecido[a] y completamente aplastado[b]; gimo[c] por el tumulto de mi corazón[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Estoy débil»; el hebreo sugiere desvanecimiento, agotamiento o pérdida de fuerzas.
    reason: lexical_alternative
  - marker: b
    text: O «y quebrantado del todo»; el intensificador עַד מְאֹד también puede expresarse con mayor énfasis.
    reason: lexical_alternative
  - marker: c
    text: O «rugí» o «gemí fuertemente»; el verbo hebreo es más intenso y más parecido a un rugido que un verbo normal de habla o llanto.
    reason: lexical_alternative
  - marker: d
    text: O «por el gemido de mi corazón» o «a causa del gemido de mi corazón». El hebreo permite un matiz de causa o de origen/fuente.
    reason: lexical_alternative
lexical_decisions:
- source_word: נְפוּגוֹתִי
  english_pob_choice: I am faint
  chosen_spanish: Estoy desfallecido
  alternatives_spanish:
  - Estoy débil
  - Estoy exhausto
  - Estoy sin fuerzas
  lexicon: HALOT
  rationale: El hebreo expresa debilidad, desvanecimiento o agotamiento interior/físico. «Desfallecido» conserva esa sensación de pérdida de fuerza en un español natural y digno, cercano a «faint» sin volverlo demasiado clínico.
- source_word: וְנִדְכֵּיתִי
  english_pob_choice: and utterly crushed
  chosen_spanish: y completamente aplastado
  alternatives_spanish:
  - y aplastado
  - y totalmente quebrantado
  - y totalmente molido
  lexicon: HALOT
  rationale: El nifal de דכה indica ser aplastado o abatido por una fuerza externa o pasiva. «Aplastado» mantiene la imagen de presión destructiva; «completamente» comunica el intensificador עַד מְאֹד sin volver la línea forzada.
- source_word: עַד מְאֹד
  english_pob_choice: utterly
  chosen_spanish: completamente
  alternatives_spanish:
  - sumamente
  - en gran manera
  - del todo
  lexicon: HALOT
  rationale: La combinación intensifica el estado previo. «Completamente» funciona como adverbio natural en español y refleja el grado total del abatimiento.
- source_word: שָׁאַגְתִּי
  english_pob_choice: I groan
  chosen_spanish: gimo
  alternatives_spanish:
  - rujo
  - clamo
  - gimo fuertemente
  lexicon: HALOT
  rationale: Aunque el verbo hebreo puede significar «rugir» en un registro animal, el contexto de lamentación llevó a la revisión inglesa a «groan». En español, «gimo» preserva el carácter de lamento intenso sin perder la tensión original del verbo hebreo; evita suavizarlo a simple queja.
- source_word: מִנַּהֲמַת
  english_pob_choice: from the groaning of / because of the groaning of / from the turmoil of
  chosen_spanish: por el tumulto de
  alternatives_spanish:
  - a causa del tumulto de
  - por el gemido de
  - a causa del gemido de
  lexicon: HALOT
  rationale: El sustantivo נהמה puede abarcar gemido, rumor, bramido o tumulto sonoro. Dado el pasaje y la revisión inglesa más reciente, «tumulto» comunica la agitación interior del corazón sin forzar una repetición de «gimo/gemido». La preposición «por» conserva la relación causal/expresiva del מקור en español.
- source_word: לִבִּי
  english_pob_choice: my heart
  chosen_spanish: mi corazón
  alternatives_spanish:
  - mi interior
  - mi ser
  - mi ánimo
  lexicon: HALOT
  rationale: «Corazón» es el equivalente estándar para el hebreo לב, que incluye la vida interior, emociones y voluntad. Mantenerlo preserva la antropología bíblica del texto.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que ajustó el segundo hemistiquio de «roar» a «groan» y de «groaning» a «turmoil» para una mejor adecuación al contexto de lamentación. La versión española sigue esa línea, evitando el exceso de literalidad animal de «rugir» y evitando una repetición dura de «gemido/gimido» que empobreciera el paralelismo.
  spanish_consistency_notes:
  - Se preserva el paralelismo de dos hemistiquios con intensificación en el primero y causa/expresión interna en el segundo.
  - Se mantiene «corazón» como término antropológico bíblico, sin expandirlo a explicaciones interpretativas dentro del texto.
  - La opción «desfallecido» conserva un registro bíblico claro y actual, compatible con un salmo de lamentación.
  - No se introdujo «Señor» ni «Cristo», ya que no aparecen en el versículo fuente.
