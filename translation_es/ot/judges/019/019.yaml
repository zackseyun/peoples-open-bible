translation:
  language: es
  text: Además hay paja y forraje para nuestros asnos[a], y hay pan y vino para mí, para tu sierva[b] y para el joven con tus siervos; no falta nada[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y además hay paja y forraje para nuestros asnos, y además hay pan y vino para mí...». El hebreo repite «también/además» para dar énfasis.'
    reason: lexical_alternative
  - marker: b
    text: «Sierva» es una fórmula deferente de autodescripción para la mujer que viaja con él.
    reason: cultural_note
  - marker: c
    text: 'O: «no nos falta nada». El hebreo también puede entenderse de forma inclusiva.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  english_pob_choice: Yet
  chosen_spanish: Además
  alternatives_spanish:
  - Y también
  - Y además
  - Sin embargo
  lexicon: HALOT
  rationale: El hebreo repite la idea aditiva con fuerza enfática. «Además» conserva el valor acumulativo sin volverse demasiado pesado en español; «sin embargo» introduciría una oposición más fuerte de la que el hebreo exige.
- source_word: תֶּבֶן
  english_pob_choice: straw
  chosen_spanish: paja
  alternatives_spanish:
  - rastrojo
  lexicon: HALOT
  rationale: Designa material vegetal usado para cama o alimento animal. «Paja» es natural y fiel en español; «rastrojo» sería más específico y menos directo aquí.
- source_word: מִסְפּוֹא
  english_pob_choice: fodder
  chosen_spanish: forraje
  alternatives_spanish:
  - alimento para los animales
  - pienso
  lexicon: HALOT
  rationale: Se refiere al alimento para animales. «Forraje» distingue bien este término del pan y el vino mencionados después y resulta idiomático en español bíblico.
- source_word: לַחֲמוֹרֵינוּ
  english_pob_choice: for our donkeys
  chosen_spanish: para nuestros asnos
  alternatives_spanish:
  - para nuestros burros
  - para nuestras mulas
  lexicon: HALOT
  rationale: «Asnos» mantiene un registro digno y tradicional sin perder claridad. «Burros» sería más coloquial; «mulas» no corresponde al léxico hebreo.
- source_word: לֶחֶם
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - alimento
  - comida
  lexicon: HALOT
  rationale: Aunque puede abarcar comida en general, aquí el paralelo con vino favorece la concreción «pan». Mantiene la provisión básica nombrada en el texto.
- source_word: וָיַיִן
  english_pob_choice: and wine
  chosen_spanish: y vino
  lexicon: HALOT
  rationale: Correspondencia directa y transparente con el hebreo.
- source_word: יֶשׁ לִי
  english_pob_choice: there is ... for me
  chosen_spanish: hay ... para mí
  alternatives_spanish:
  - tengo ...
  - hay ... conmigo
  lexicon: HALOT
  rationale: Se conserva la construcción existencial del hebreo, como en el audit trail inglés. «Hay ... para mí» suena natural y no borra el matiz de disponibilidad.
- source_word: אֲמָתֶךָ
  english_pob_choice: your female servant
  chosen_spanish: tu sierva
  alternatives_spanish:
  - tu criada
  - tu esclava
  lexicon: HALOT
  rationale: La mujer se presenta con una fórmula deferente y autodegradante respecto al anfitrión. «Sierva» reproduce mejor ese registro que «criada»; «esclava» sería demasiado fuerte en español para este contexto y no es la elección de la POB inglesa.
- source_word: לַנַּעַר
  english_pob_choice: the young man
  chosen_spanish: el joven
  alternatives_spanish:
  - el muchacho
  - el sirviente joven
  lexicon: HALOT
  rationale: נַעַר puede ser «joven» o «muchacho» según el contexto. Aquí «el joven» conserva amplitud semántica y fluidez.
- source_word: עִם עֲבָדֶיךָ
  english_pob_choice: with your servants
  chosen_spanish: que está con tus siervos
  alternatives_spanish:
  - con tus siervos
  - entre tus siervos
  lexicon: HALOT
  rationale: La frase probablemente califica al joven como asociado al grupo de los sirvientes. «Que está con tus siervos» preserva esa relación sin decidir demasiado entre «entre» o «con».
- source_word: אֵין מַחְסוֹר כָּל דָּבָר
  english_pob_choice: there is no lack of anything
  chosen_spanish: no falta nada
  alternatives_spanish:
  - no tenemos falta de nada
  - nada nos falta
  lexicon: HALOT
  rationale: El modismo expresa suficiencia total. «No falta nada» es breve, natural y fiel; las alternativas hacen explícito el sujeto implícito pero no son necesarias.
theological_decisions:
- issue: Valor del nombre divino y cristología
  english_pob_reading: No aplica explícitamente en este versículo.
  chosen_spanish_reading: No aplica explícitamente en este versículo.
  rationale: El versículo no contiene término divino ni mesiánico; por tanto no se introduce terminología teológica ajena al texto.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La redacción sigue de cerca el giro existencial del hebreo, alineado con la revisión inglesa que prefirió «there is both» frente a una forma posesiva. También respeta la repetición enfática de וְגַם sin sobrecargarla con una oposición mayor a la presente en el original.
  spanish_consistency_notes:
  - Se mantiene «sierva» para אֲמָתֶךָ en consonancia con el valor deferente documentado por la POB inglesa.
  - Se usa «asnos» y no «burros» para un registro bíblico más sobrio y consistente.
  - «No falta nada» conserva el sentido de suficiencia total de אֵין מַחְסוֹר כָּל דָּבָר sin añadir elementos doctrinales o interpretativos.
