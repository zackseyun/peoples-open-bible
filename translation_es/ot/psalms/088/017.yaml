revisions:
- from: Tu ira ardiente pasó sobre mí[a][b]; tus terrores me destruyeron[c].
  to: Los ardores de tu ira pasaron sobre mí[a][b]; tus terrores me destruyeron[c].
  rationale: 'Se ajusta la primera cláusula para reflejar mejor el plural intensivo hebreo con un español natural y poético: ''Los ardores de tu ira pasaron sobre mí''. También se afinan las notas para alinearlas más estrechamente con la auditoría inglesa y evitar formulaciones demasiado coloquiales o imprecisas.'
