revisions:
- from: Su cadáver no permanecerá toda la noche sobre el árbol[a], sino que ciertamente lo enterrarás ese mismo día, porque el colgado es maldito de Dios; y no contaminarás tu tierra, que Yahvé tu Dios te da como herencia.
  to: Su cadáver no permanecerá toda la noche sobre el árbol[a], sino que ciertamente lo enterrarás ese mismo día, porque el colgado está bajo maldición de Dios; y no contaminarás tu tierra, que Yahvé tu Dios te da como herencia.
  rationale: Se hizo una reparación menor para mejorar la naturalidad y fidelidad funcional del español en la cláusula teológicamente densa קִלְלַת אֱלֹהִים תָּלוּי. 'Está bajo maldición de Dios' preserva la lectura principal auditada —que el colgado lleva la señal de la maldición divina— sin introducir una paráfrasis amplia. La nota mantiene las alternativas interpretativas documentadas por el POB inglés.
