  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 288-308, Benjamin source-fix v2)
  text: Καὶ ἔστω ἡ διάνοια ὑμῶν *εἰς τὸ ἀγαθόν⁶, ὡς κἀμὲ οἴδατε⁷. Ὅτι⁸ ὁ ἔχων τὴν⁹ διάνοιαν ὀρθὴν¹⁰ πάντα βλέπει ὀρθῶς¹¹.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/benjamin/003/002.yaml
  text: And let your mind be set on what is good, as you know mine is. For the one who has a right mind sees everything rightly.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:05Z'
    unchanged: false
    changes_summary: Adjusted the first clause from 'has been' to 'is' to better reflect the present sense of κἀμὲ οἴδατε ('as you know me/mine'). Kept the rest unchanged as accurate and natural.
translation:
  language: es
  text: Y que su mente[a] esté puesta en el bien, como me conocen. Porque el que tiene la mente recta[b] todo lo ve rectamente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Gr. διάνοια (dianoia): la facultad de pensar, el entendimiento o la mente discursiva. El término aparece dos veces en el versículo (su mente … la mente recta), creando una estructura de énfasis intencional en el original.'
    reason: lexical_alternative
  - marker: b
    text: 'El griego emplea la misma raíz en ambas posiciones: ὀρθήν (recta, adj.) y ὀρθῶς (rectamente, adv.), una paronomasia deliberada que el español preserva con ''recta/rectamente'': la rectitud interior produce una percepción exterior correcta.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διάνοια
  english_pob_choice: mind
  chosen_spanish: mente
  alternatives_spanish:
  - entendimiento
  - pensamiento
  - comprensión
  - intención
  lexicon: 'LSJ s.v. διάνοια: faculty of discursive thinking, understanding, thought, purpose. BDAG s.v. διάνοια: capacity to think, understanding, mind, thought.'
  rationale: διάνοια denotes the faculty of mind/thinking rather than a single thought or act. 'Mente' is the most natural and unambiguous modern neutral-Spanish equivalent for this faculty term, matching the English POB 'mind.' 'Entendimiento' is viable but carries an archaic Reina-Valera flavor. 'Pensamiento' (thought, a single mental act) is too narrow for the faculty sense. The word appears twice in the verse (διάνοια ὑμῶν … τὴν διάνοιαν ὀρθήν), and repeating 'mente' in both instances preserves the structural parallelism.
- source_word: εἰς τὸ ἀγαθόν
  english_pob_choice: set on what is good
  chosen_spanish: puesta en el bien
  alternatives_spanish:
  - orientada hacia lo bueno
  - dirigida al bien
  - en lo bueno
  - hacia el bien
  lexicon: 'LSJ s.v. ἀγαθός: good (morally and in quality); articular τὸ ἀγαθόν = ''the good'' as abstract concept. εἰς + accusative: directionality, purpose, goal.'
  rationale: τὸ ἀγαθόν uses the substantivized adjective to denote 'the good' as a moral concept or goal. 'El bien' renders this natural Spanish substantive (moral good as an entity), preserving the philosophical weight appropriate to paraenetic wisdom literature. The εἰς conveys direction/orientation; 'puesta en' (set on/fixed on) captures both the directional force and the English POB rendering 'set on.' 'Lo bueno' is also defensible but 'el bien' carries slightly stronger moral-conceptual resonance.
- source_word: κἀμέ (κἀμὲ οἴδατε)
  english_pob_choice: as you know mine is
  chosen_spanish: como me conocen
  alternatives_spanish:
  - según me conocen a mí
  - tal como me conocen
  - como me conocen a mí
  lexicon: 'κἀμέ = crasis of καί + ἐμέ (and me, also me). οἴδατε = 2pl perfect of οἶδα with present sense: ''you know.'' The clause is elliptical: ''as you know [my mind to be].'''
  rationale: The Greek ellipsis κἀμὲ οἴδατε ('as you know me/mine') implies 'as you know [me/my mind] to be [oriented toward the good].' The English POB revision (from 'has been' to 'is') correctly captures the present sense of οἴδατε. Spanish 'como me conocen' expresses the same present-tense knowing and preserves the implied reference to Benjamin's own disposition. Latin American neutral 'me conocen' (ustedes) is preferred over Castilian 'me conocéis.' The 'a mí' object is contextually recoverable without being explicit.
- source_word: ὀρθήν / ὀρθῶς
  english_pob_choice: right / rightly
  chosen_spanish: recta / rectamente
  alternatives_spanish:
  - íntegra/íntegramente
  - correcta/correctamente
  - justa/justamente
  lexicon: 'LSJ s.v. ὀρθός: straight, upright, right, correct. ὀρθῶς (adverb): rightly, correctly, properly. The two forms share the same ὀρθ- root, creating deliberate paronomasia.'
  rationale: The Greek uses ὀρθήν (adjective, 'right mind') and ὀρθῶς (adverb, 'sees rightly') from the same root — a deliberate word-play emphasizing that interior rectitude produces exterior correct perception. Spanish 'recta/rectamente' preserves this paronomasia from the shared Latin root 'rect-.' 'Correcta/correctamente' would also preserve a stem repetition but sounds more pedestrian and loses the moral-upright connotation of ὀρθός. 'Íntegra' loses the repetition entirely. The paronomasia is meaningful to the verse's argument and should be carried over.
theological_decisions:
- issue: Elliptical comparison κἀμὲ οἴδατε and its present vs. past sense
  english_pob_reading: as you know mine is
  chosen_spanish_reading: como me conocen
  alternative_spanish_readings:
  - como me han conocido
  - según han visto en mí
  rationale: 'The English POB revision pass (azure-gpt-5.4, 2026-04-23) corrected ''has been'' to ''is'' to honor the present force of οἴδατε (perfect with present meaning: ''you know,'' not ''you have known [in the past only]''). The Spanish present indicative ''como me conocen'' likewise reflects this present-tense knowing — Benjamin presents his own orientation toward the good as a current, ongoing reality that his children can observe, not merely a past record. A past tense (''como me han conocido'') would re-introduce the error the revision corrected.'
  doctrine_reference: 'Revision rationale: ''Adjusted the first clause from has been to is to better reflect the present sense of κἀμὲ οἴδατε.'' (2026-04-23 revision pass)'
translation_notes:
  revision_awareness: La revisión del 23 de abril de 2026 (azure-gpt-5.4) corrigió el primer miembro de «has been» a «is» para reflejar el sentido presente de οἴδατε. El español «como me conocen» adopta igualmente el presente de indicativo, preservando la corrección del revisor y evitando que se reintroduzca una lectura de pasado («como me han conocido») que el proceso de auditoría descartó explícitamente.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo si aparece el tetragramaton; este versículo no lo contiene.
  - 'Neutral latinoamericano: ''ustedes/me conocen'' en lugar de ''vosotros/os conocéis''.'
  - Se mantiene 'mente' para διάνοια en ambas ocurrencias dentro del versículo a fin de preservar la repetición estructural del original griego.
  - No aparecen términos cristológicos, pneumatológicos ni soteriológicos que requieran decisiones de terminología de proyecto en este versículo.
