base_translation:
  language: en
  yaml_path: translation/deuterocanon/2_maccabees/009/002.yaml
  text: For he had entered the so-called Persepolis and attempted to plunder the temple and take control of the city[a]; therefore, when the crowds rushed forth, they turned to the defense of arms, and it happened that Antiochus, put to flight by the local inhabitants[b], made a shameful retreat.
  footnotes:
  - marker: a
    text: Or 'attempted sacrilegious plunder of the temple.' The Greek verb ἱεροσυλεῖν specifically refers to robbing a sacred place.
    reason: lexical_alternative
  - marker: b
    text: Literally 'to the help of weapons,' that is, they resorted to armed defense.
    reason: lexical_alternative
