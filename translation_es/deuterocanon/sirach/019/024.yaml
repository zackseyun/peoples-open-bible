translation:
  language: es
  text: Y si por falta de fuerza[a] se le impide pecar, cuando encuentra una oportunidad[b], hará el mal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘por debilidad’ para ‘por falta de fuerza’. La frase griega puede indicar carencia de poder o incapacidad en sentido más general.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, ‘cuando encuentra un tiempo’; aquí ‘tiempo’ significa una ocasión propicia.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Pero
  - Entonces
  lexicon: BDAG
  rationale: Se mantiene la simple continuidad del griego con una conjunción básica en español, sin forzar contraste ni inferencia adicional.
- source_word: ἐὰν
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - aun si
  - cuando
  lexicon: BDAG
  rationale: La condición simple del griego queda bien expresada con 'si' en español.
- source_word: ὑπὸ ἐλαττώματος ἰσχύος
  english_pob_choice: by lack of strength
  chosen_spanish: por falta de fuerza
  alternatives_spanish:
  - por debilidad
  - a causa de insuficiencia de fuerza
  lexicon: LSJ
  rationale: '''Falta de fuerza'' conserva la idea de carencia/insuficiencia del grupo nominal griego y su valor causal, con un español natural y auditable.'
- source_word: κωλυθῇ
  english_pob_choice: is prevented
  chosen_spanish: se le impide
  alternatives_spanish:
  - es impedido
  - se ve impedido
  lexicon: BDAG
  rationale: El pasivo del griego se expresa de manera natural con 'se le impide', que transmite obstáculo externo o circunstancial sin suavizar la fuerza de la forma.
- source_word: ἁμαρτεῖν
  english_pob_choice: from sinning
  chosen_spanish: pecar
  alternatives_spanish:
  - de pecar
  - para no pecar
  lexicon: BDAG
  rationale: En español, tras 'se le impide' el infinitivo simple comunica la acción restringida sin necesidad de una preposición explícita.
- source_word: εὕρῃ καιρόν
  english_pob_choice: finds an opportunity
  chosen_spanish: encuentra una oportunidad
  alternatives_spanish:
  - encuentra un momento oportuno
  - halla ocasión
  lexicon: BDAG
  rationale: '''Oportunidad'' preserva el valor de καιρός como ocasión propicia, no mero tiempo cronológico.'
- source_word: κακοποιήσει
  english_pob_choice: he will do evil
  chosen_spanish: hará el mal
  alternatives_spanish:
  - actuará mal
  - cometerá maldad
  lexicon: BDAG
  rationale: '''Hará el mal'' reproduce la amplitud moral de κακοποιέω y suena natural en español bíblico actual.'
theological_decisions:
- issue: La limitación para no pecar
  english_pob_reading: The verse describes someone who does not sin only because he lacks the power or ability, not because of genuine righteousness.
  chosen_spanish_reading: El versículo describe a alguien que se abstiene de pecar solo por falta de fuerza, no por verdadera rectitud.
  alternative_spanish_readings:
  - por debilidad moral
  - por incapacidad física
  rationale: La traducción conserva la tensión del griego entre imposibilidad/circunstancia y conducta moral, sin resolverla ni moralizarla.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto se mantiene alineado con la lectura inglesa auditada y con el griego de Swete.
  spanish_consistency_notes:
  - Se mantiene 'fuerza' para reflejar ἰσχύος y evitar desplazar el matiz hacia mera 'debilidad' psicológica.
  - '''Oportunidad'' se usa de manera consistente para καιρός cuando el contexto indica ocasión propicia.'
  - '''Hará el mal'' conserva la amplitud ética del futuro griego sin especificar una clase particular de maldad.'
