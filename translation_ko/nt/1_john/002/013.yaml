base_translation:
  language: en
  yaml_path: translation/nt/1_john/002/013.yaml
  text: I write to you[a], fathers, because you have known him who is from the beginning; I write to you, young men, because you have overcome the evil one.
  footnotes:
  - marker: a
    text: Or 'the one from the beginning'; the phrase likely refers to the Son, though some take it more broadly as a reference to God.
    reason: alternative_reading
translation:
  language: ko
  text: 아버지들이여, 내가 여러분에게 씁니다. 여러분이 태초부터 계신 분을 알게 되었기 때문입니다. 청년들이여, 내가 여러분에게 씁니다. 여러분이 악한 자를 이겼기 때문입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τὸν ἀπ’ ἀρχῆς
  english_pob_choice: him who is from the beginning
  chosen_korean: 태초부터 계신 분
  alternatives_korean:
  - 처음부터 계신 분
  - 시작부터 계신 분
  lexicon: BDAG
  rationale: 1:1과 같은 표현 — 아들의 영원한 선재성을 가리킨다. 「태초부터 계신 분」으로 신적 무게를 살린다.
- source_word: τὸν πονηρόν
  english_pob_choice: the evil one
  chosen_korean: 악한 자
  alternatives_korean:
  - 악마
  - 사탄
  lexicon: BDAG
  rationale: ὁ πονηρός는 1 요한서에서 사탄을 가리키는 고정된 칭호. 「악한 자」로 직역하여 본문의 어조를 살린다.
