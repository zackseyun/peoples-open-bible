translation:
  language: es
  text: 'Y toda la asamblea hizo un pacto[a] en la casa[b] de Dios con el rey, y él les dijo: «He aquí, el hijo del rey reinará, tal como Yahvé habló acerca de los hijos de David[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «cortó un pacto». El hebreo usa el verbo «cortar» con «pacto».
    reason: lexical_alternative
  - marker: b
    text: O, «en el templo de Dios». Literalmente, «en la casa de Dios».
    reason: lexical_alternative
  - marker: c
    text: O, «la casa de David» o «la dinastía de David». El hebreo dice «los hijos de David».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּכְרֹת ... בְּרִית
  english_pob_choice: made a covenant
  chosen_spanish: hizo un pacto
  alternatives_spanish:
  - cortó un pacto
  - entró en pacto
  lexicon: HALOT
  rationale: El hebreo usa el modismo כרת ברית, literalmente «cortar un pacto». En español, «hizo un pacto» comunica con claridad el acto pactal sin sonar forzado; conserva la fuerza jurídica y relacional del hebreo.
- source_word: כָּל הַקָּהָל
  english_pob_choice: all the assembly
  chosen_spanish: toda la asamblea
  alternatives_spanish:
  - toda la congregación
  - todo el pueblo reunido
  lexicon: HALOT
  rationale: קהל designa al grupo reunido públicamente. «Asamblea» es natural y mantiene el carácter corporativo sin cargar el término con un matiz eclesial más específico de lo que el hebreo exige.
- source_word: בְּבֵית הָאֱלֹהִים
  english_pob_choice: in the house of God
  chosen_spanish: en la casa de Dios
  alternatives_spanish:
  - en el templo de Dios
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «casa de Dios». «Casa de Dios» es más transparente y fiel al texto base; «templo» es contextual pero menos directo.
- source_word: עִם הַמֶּלֶךְ
  english_pob_choice: with the king
  chosen_spanish: con el rey
  alternatives_spanish:
  - para el rey
  lexicon: HALOT
  rationale: עִם normalmente significa «con». La relación del pacto incluye al rey como parte de la acción narrada, no solo como beneficiario indirecto.
- source_word: וַיֹּאמֶר לָהֶם
  english_pob_choice: and he said to them
  chosen_spanish: y él les dijo
  alternatives_spanish:
  - entonces les dijo
  - y dijo a ellos
  lexicon: HALOT
  rationale: La referencia singular vuelve al sacerdote Joiadá en el contexto narrativo. «Les dijo» suena natural en español y preserva la continuidad del relato.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: Miren
  alternatives_spanish:
  - Vean
  - He aquí
  lexicon: HALOT
  rationale: הִנֵּה introduce una llamada de atención. «Miren» comunica esa fuerza deíctica en español moderno; se conserva la solemnidad sin recurrir a una fórmula arcaica que sería menos natural.
- source_word: בֶן הַמֶּלֶךְ
  english_pob_choice: the king’s son
  chosen_spanish: el hijo del rey
  alternatives_spanish:
  - el hijo real
  - el hijo del monarca
  lexicon: HALOT
  rationale: El constructo hebreo se vierte de manera directa y natural como «el hijo del rey». Mantiene la referencia dinástica concreta del texto.
- source_word: יִמְלֹךְ
  english_pob_choice: will reign
  chosen_spanish: reinará
  alternatives_spanish:
  - será rey
  - tomará el reino
  lexicon: HALOT
  rationale: מלך en este verbo significa «reinar/ser rey». «Reinará» conserva el valor verbal y evita añadir matices no presentes en el hebreo.
- source_word: כַּאֲשֶׁר דִּבֶּר
  english_pob_choice: just as ... spoke
  chosen_spanish: tal como ... habló
  alternatives_spanish:
  - como ... dijo
  - según ... habló
  lexicon: HALOT
  rationale: דבר significa «hablar/decir». «Tal como ... habló» reproduce la comparación del hebreo sin introducir interpretaciones como «prometió» en el texto principal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: «Yahvé». Esto preserva el nombre divino en lugar de sustituirlo por un título.'
- source_word: עַל בְּנֵי דָוִיד
  english_pob_choice: concerning the sons of David
  chosen_spanish: acerca de los hijos de David
  alternatives_spanish:
  - acerca de la casa de David
  - acerca de la dinastía de David
  lexicon: HALOT
  rationale: El hebreo dice explícitamente «hijos de David» en plural. «Acerca de los hijos de David» conserva esa forma verbal y deja que la implicación dinástica emerja del contexto.
theological_decisions:
- issue: Forma de rendir el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el Señor
  rationale: El proyecto indica traducir יְהוָה como «Yahvé» en el texto principal. Esto preserva el nombre propio divino y evita el reemplazo honorífico que oculta la forma hebrea.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH → Yahvé'
- issue: Mantener el plural literal «hijos de David» frente a una lectura dinástica interpretativa
  english_pob_reading: the sons of David
  chosen_spanish_reading: los hijos de David
  alternative_spanish_readings:
  - la casa de David
  - la dinastía de David
  rationale: Aunque la referencia teológica apunta a la continuidad davídica, el hebreo usa un plural filial concreto. Se conserva esa forma para no borrar la tensión entre la literalidad y la implicación dinástica.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it'
- issue: Valor de הִנֵּה como exhortación de atención
  english_pob_reading: Behold
  chosen_spanish_reading: Miren
  alternative_spanish_readings:
  - He aquí
  - Vean
  rationale: «Miren» expresa la atención inmediata que pide el hebreo sin depender de una fórmula bíblica arcaizante; mantiene el registro reverente y comprensible.
  doctrine_reference: 'DOCTRINE.md: Clarity and auditability in target-language rendering'
translation_notes:
  revision_awareness: Se revisó el registro hacia un español más formal y público, manteniendo la transparencia del hebreo. Frente a una posible traducción más interpretativa de «los hijos de David», se conservó la forma plural literal y se añadió nota alternativa. También se prefirió «Yahvé» conforme al estándar del proyecto, y «Miren» para reproducir la fuerza de הִנֵּה con naturalidad en español.
  spanish_consistency_notes:
  - Se mantiene «casa de Dios» de forma literal y consistente con el audit trail en inglés.
  - Se usa «asamblea» para קהל, evitando la carga eclesiástica más específica de «congregación» salvo contexto que lo requiera.
  - «Pacto» conserva la categoría jurídica/covenantal sin sustituirla por una paráfrasis.
  - «Yahvé» se aplica de acuerdo con el estándar del proyecto para יְהוָה.
  - La referencia a «los hijos de David» permanece explícita para no resolver prematuramente la implicación dinástica.
