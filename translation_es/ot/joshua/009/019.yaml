translation:
  language: es
  text: 'Pero todos los líderes dijeron a toda la congregación: «Les hemos jurado por Yahvé, el Dios de Israel, y ahora no podemos tocarlos[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hacerles daño» o «golpearlos»; literalmente «tocarlos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  english_pob_choice: But ... said
  chosen_spanish: Pero ... dijeron
  alternatives_spanish:
  - Y ... dijeron
  lexicon: HALOT
  rationale: La forma narrativa con waw avanza la respuesta en contraste con la queja del pueblo. En español, "Pero" conserva mejor ese valor discursivo que un simple "Y".
- source_word: הַנְּשִׂיאִים
  english_pob_choice: the leaders
  chosen_spanish: los líderes
  alternatives_spanish:
  - los príncipes
  - los jefes
  - los gobernantes
  lexicon: HALOT
  rationale: נָשִׂיא puede referirse a jefes o representantes de autoridad. "Líderes" es claro y natural en español moderno, y mantiene la función representativa del grupo.
- source_word: הָעֵדָה
  english_pob_choice: the congregation
  chosen_spanish: la congregación
  alternatives_spanish:
  - la asamblea
  - la comunidad
  lexicon: HALOT
  rationale: '"Congregación" conserva el sentido corporativo del pueblo reunido y corresponde al uso narrativo de עֵדָה sin volverlo excesivamente técnico.'
- source_word: נִשְׁבַּעְנוּ לָהֶם
  english_pob_choice: We have sworn to them
  chosen_spanish: Nos hemos jurado a ellos
  alternatives_spanish:
  - les hemos jurado
  - hemos hecho juramento a ellos
  lexicon: HALOT
  rationale: El hebreo expresa el hecho de haber quedado ligados por juramento. En español, "nos hemos jurado a ellos" transmite esa obligación recíproca y formal; se mantiene la dirección del juramento sin suavizarla a una mera promesa.
- source_word: בַּיהוָה
  english_pob_choice: by Yahweh
  chosen_spanish: por Yahvé
  alternatives_spanish:
  - en Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: Con שׁבע, la preposición marca la base o autoridad del juramento. Se conserva el nombre divino como "Yahvé" según la norma del proyecto.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: La cadena constructa se rinde de forma directa y natural en español, manteniendo la identificación pactual del Dios de Israel.
- source_word: וְעַתָּה
  english_pob_choice: and now
  chosen_spanish: y ahora
  alternatives_spanish:
  - ahora
  lexicon: HALOT
  rationale: La partícula conectiva conserva el paso lógico desde el juramento hasta la consecuencia presente.
- source_word: לֹא נוּכַל
  english_pob_choice: we cannot
  chosen_spanish: no podemos
  alternatives_spanish:
  - no somos capaces de
  - no nos es posible
  lexicon: HALOT
  rationale: יכל expresa imposibilidad práctica y jurídica; "no podemos" es la forma más natural y fiel en este contexto.
- source_word: לִנְגֹּעַ בָּהֶם
  english_pob_choice: touch them
  chosen_spanish: tocarlos
  alternatives_spanish:
  - hacerles daño
  - golpearles
  - tocarlos con violencia
  lexicon: HALOT
  rationale: La raíz נגע es literal "tocar", pero aquí el contexto indica una acción prohibida contra ellos. El texto principal mantiene la literalidad con un pronombre átono; la nota preserva las opciones idiomáticas de daño o golpe.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrama directamente. Conforme a la política del proyecto, se translitera como "Yahvé" en el cuerpo principal para no ocultar el nombre pactual.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: Se siguió el consenso del audit trail en English POB, pero se adaptó el sujeto verbal y la forma pronominal para que el español sea natural sin perder la fuerza legal del juramento ni la literalidad de נגע.
  spanish_consistency_notes:
  - Se mantuvo "Yahvé" como forma estándar para יהוה.
  - Se prefirió "líderes" sobre "príncipes" por claridad contemporánea, sin perder la referencia a autoridad representativa.
  - '"tocarlos" conserva la literalidad de נגע; la nota explica el posible sentido de daño o agresión.'
  - La puntuación y las comillas siguen normas editoriales españolas, con aclamación narrativa introducida por dos puntos.
