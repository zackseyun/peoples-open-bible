translation:
  language: es
  text: Se ha acabado tu castigo[a], hija de Sión; ya no te enviará al exilio. Ha castigado tu iniquidad, hija de Edom; ha descubierto tus pecados[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Se ha acabado tu iniquidad» o «Se ha acabado tu culpa». El hebreo puede referirse a iniquidad, culpa o al castigo resultante de la culpa.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «ha expuesto tus pecados» o «ha revelado tus pecados».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּם
  english_pob_choice: is finished
  chosen_spanish: Se ha acabado
  alternatives_spanish:
  - ha terminado
  - está terminado
  lexicon: HALOT
  rationale: El perfecto qal de תַּם expresa cumplimiento o término. En español, «se ha acabado» comunica con naturalidad que el castigo ha llegado a su fin, manteniendo la idea de завершamiento sin sonar rígido.
- source_word: עֲוֺנֵךְ
  english_pob_choice: your punishment
  chosen_spanish: tu castigo
  alternatives_spanish:
  - tu iniquidad
  - tu culpa
  lexicon: HALOT
  rationale: En la primera cláusula, el contexto del destierro que termina favorece el sentido de la consecuencia del pecado, no solo el acto culpable. «Castigo» preserva esa lectura contextual, como en el POB inglés.
- source_word: בַּת צִיּוֹן
  english_pob_choice: daughter Zion
  chosen_spanish: hija de Sión
  alternatives_spanish:
  - hija Sión
  - Daughter Zion
  lexicon: HALOT
  rationale: La personificación poética se conserva mejor con «hija de Sión». «Hija» mantiene el vocativo figurado del hebreo sin convertirlo en una frase explicativa.
- source_word: לֹא יוֹסִיף לְהַגְלוֹתֵךְ
  english_pob_choice: he will not exile you again
  chosen_spanish: no te desterrará otra vez
  alternatives_spanish:
  - no volverá a desterrarte
  - no te enviará otra vez al exilio
  lexicon: HALOT
  rationale: יָסַף + infinitivo expresa la idea de no continuar ni repetir la acción. «No te desterrará otra vez» reproduce de forma natural esa fuerza idiomática en español.
- source_word: פָּקַד
  english_pob_choice: has punished
  chosen_spanish: Ha castigado
  alternatives_spanish:
  - ha visitado
  - ha llamado a cuentas
  - ha tomado en cuenta
  lexicon: HALOT
  rationale: En contexto judicial, פקד puede significar castigar o llamar a cuentas. «Ha castigado» comunica claramente el sentido de juicio sin perder el trasfondo forense.
- source_word: עֲוֺנֵךְ
  english_pob_choice: your iniquity
  chosen_spanish: tu iniquidad
  alternatives_spanish:
  - tu culpa
  - tu maldad
  lexicon: HALOT
  rationale: 'En la segunda cláusula conviene mantener el valor léxico más cercano al hebreo: la responsabilidad moral de Edom. «Iniquidad» preserva el paralelo con «pecados» al final del verso.'
- source_word: בַּת אֱדוֹם
  english_pob_choice: daughter Edom
  chosen_spanish: hija de Edom
  alternatives_spanish:
  - hija Edom
  - Edom
  lexicon: HALOT
  rationale: Como con Sión, la fórmula personifica a la nación. «Hija de Edom» conserva la figura retórica y la simetría del verso.
- source_word: גִּלָּה עַל חַטֹּאתָיִךְ
  english_pob_choice: he has uncovered your sins
  chosen_spanish: ha descubierto tus pecados
  alternatives_spanish:
  - ha revelado tus pecados
  - ha expuesto tus pecados
  lexicon: HALOT
  rationale: גלה en piel suele significar descubrir o revelar. «Ha descubierto» mantiene la metáfora de sacar a la luz lo oculto; el complemento «tus pecados» expresa con claridad el objeto del descubrimiento.
- source_word: חַטֹּאתָיִךְ
  english_pob_choice: your sins
  chosen_spanish: tus pecados
  alternatives_spanish:
  - tus culpas
  - tus faltas
  lexicon: HALOT
  rationale: «Pecados» es la equivalencia más clara y directa para el plural de חטאת en este contexto de acusación y juicio.
theological_decisions:
- issue: Sentido de עָוֹן en la primera cláusula
  english_pob_reading: Rendered as 'Your punishment is finished'
  chosen_spanish_reading: «Se ha acabado tu castigo»
  alternative_spanish_readings:
  - «Se ha acabado tu iniquidad»
  - «Se ha acabado tu culpa»
  rationale: El contexto inmediato habla del fin del destierro; por eso conviene reflejar el resultado judicial del pecado. Esta opción conserva la tensión lexical sin borrar que עָוֹן puede significar iniquidad, culpa o castigo.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: Sujeto implícito de los verbos
  english_pob_reading: Rendered with 'he' rather than specifying 'the LORD'
  chosen_spanish_reading: Se mantiene el sujeto implícito con formas verbales en tercera persona
  alternative_spanish_readings:
  - Yahvé no te desterrará otra vez; ha castigado...
  - El Señor no te desterrará otra vez; ha castigado...
  rationale: El hebreo no nombra explícitamente al sujeto de los verbos. Mantener la referencia implícita evita añadir un sustantivo que el texto no expresa, aunque el referente divino sea claro por el contexto.
  doctrine_reference: Translation philosophy §1 (original-language primacy over translation tradition)
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el estado final del POB inglés revisado, que fue aprobado sin cambios en el último pase y con alta coincidencia entre revisor y texto. Se conservan las decisiones clave: el valor contextual de עֲוֹן como castigo en la primera cláusula, la personificación poética de Sión y Edom, el sujeto implícito, y el paralelo judicial de la segunda mitad del verso.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en lugar de «SEÑOR» solo cuando el texto lo requiera explícitamente; aquí el sujeto queda implícito por fidelidad al hebreo.
  - Se mantiene «Sión» y «Edom» con el vocativo figurado «hija de...», siguiendo la personificación del original.
  - «Castigo» e «iniquidad» se distribuyen según el contexto de cada cláusula para no aplanar el rango semántico de עָוֹן.
  - «Pecados» traduce el plural hebreo final de forma transparente y natural en español.
