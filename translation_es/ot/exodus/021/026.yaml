translation:
  language: es
  text: Y si un hombre golpea el ojo de su esclavo o el ojo de su esclava[a] y lo destruye[b], lo dejará ir libre en compensación por su ojo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «su esclavo ... su esclava». La ley concede libertad como compensación por una lesión permanente infligida por el amo.'
    reason: cultural_note
  - marker: b
    text: 'O: «y lo ciega». El verbo hebreo puede denotar arruinar o destruir el ojo, implicando una lesión permanente.'
    reason: lexical_alternative
  - marker: c
    text: 'O simplemente: «por su ojo». La frase significa liberación en compensación por la lesión del ojo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  english_pob_choice: And if
  chosen_spanish: Y si
  alternatives_spanish:
  - Si
  - Ahora bien, si
  lexicon: HALOT
  rationale: Introduce una cláusula casuística. En español legal y bíblico, «Y si» conserva la conexión del hebreo וְכִי sin sonar pesado.
- source_word: יַכֶּה
  english_pob_choice: strikes
  chosen_spanish: golpea
  alternatives_spanish:
  - hiere
  - pega
  lexicon: HALOT
  rationale: נכה puede abarcar golpear o herir. «Golpea» mantiene el sentido base de impacto físico sin añadir todavía una intención o gravedad no explicitada por el verbo mismo.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: HALOT
  rationale: El hebreo usa אִישׁ, forma masculina singular, y el contexto legal casuístico normalmente la presenta así. «Un hombre» es la correspondencia más directa y transparente.
- source_word: עַבְדּוֹ
  english_pob_choice: his male slave
  chosen_spanish: su esclavo
  alternatives_spanish:
  - su siervo
  - su esclavo varón
  lexicon: HALOT
  rationale: En este contexto legal עבד señala condición de esclavitud, no el sentido suave de «siervo». En español, «su esclavo» comunica mejor la realidad jurídica; el género masculino queda implícito por el posesivo y el paralelismo con «su esclava».
- source_word: אֲמָתוֹ
  english_pob_choice: his female slave
  chosen_spanish: su esclava
  alternatives_spanish:
  - su sierva
  - su muchacha esclava
  lexicon: HALOT
  rationale: אמה es esclava femenina. «Su esclava» conserva el paralelismo jurídico y evita suavizar el término.
- source_word: וְשִׁחֲתָהּ
  english_pob_choice: and destroys it
  chosen_spanish: y lo destruye
  alternatives_spanish:
  - y lo arruina
  - y lo deja ciego
  lexicon: HALOT
  rationale: שחת aquí indica daño permanente al ojo. «Lo destruye» reproduce la amplitud semántica y evita estrechar el verbo a «cegar», que podría ser más específico de lo que el hebreo exige.
- source_word: לַחָפְשִׁי
  english_pob_choice: free
  chosen_spanish: libre
  alternatives_spanish:
  - en libertad
  - como libre
  lexicon: HALOT
  rationale: La expresión señala liberación. «Libre» es la forma más natural en español dentro de la construcción «dejar ir libre».
- source_word: יְשַׁלְּחֶנּוּ
  english_pob_choice: he shall let him go
  chosen_spanish: lo dejará ir
  alternatives_spanish:
  - lo despedirá
  - lo soltará
  lexicon: HALOT
  rationale: En un contexto legal, שלח significa liberar o dejar ir. «Lo dejará ir» preserva la fuerza normativa y se combina naturalmente con «libre».
- source_word: תַּחַת עֵינוֹ
  english_pob_choice: in compensation for his eye
  chosen_spanish: en compensación por su ojo
  alternatives_spanish:
  - por su ojo
  - en lugar de su ojo
  lexicon: HALOT
  rationale: תחת en contextos legales expresa sustitución o retribución. «En compensación por» explicita el sentido jurídico de resarcimiento que el hebreo transmite.
theological_decisions:
- issue: Terminología de esclavitud en la ley casuística
  english_pob_reading: male slave / female slave
  chosen_spanish_reading: esclavo / esclava
  alternative_spanish_readings:
  - siervo / sierva
  - criado / criada
  rationale: Siguiendo el audit trail, el contexto legal trata de una relación de propiedad y liberación, no de mera asistencia doméstica. «Esclavo / esclava» preserva esa realidad social y jurídica.
  doctrine_reference: 'Translation philosophy: lexical transparency for bonded-status terms; contested bonded-status terminology by analogy'
- issue: Sujeto legal masculino en אִישׁ
  english_pob_reading: a man
  chosen_spanish_reading: un hombre
  alternative_spanish_readings:
  - una persona
  - alguien
  rationale: El hebreo es masculino singular y el proyecto evita neutralizar sin base textual. Mantener «un hombre» respeta la forma del caso legal.
  doctrine_reference: 'Translation philosophy §4: gender-accurate rendering'
translation_notes:
  revision_awareness: 'La revisión más reciente no cambió el contenido: se mantuvo la lectura con alta coincidencia y solo observaciones menores. La redacción española conserva la tensión léxica principal del hebreo: daño permanente al ojo, liberación como resarcimiento y terminología jurídica de esclavitud.'
  spanish_consistency_notes:
  - Se mantuvo «esclavo / esclava» para conservar el valor jurídico del hebreo en ley casuística.
  - «En compensación por» explicita תחת sin borrar la posibilidad de sentido de sustitución/retribución.
  - Se evitó «siervo» para no suavizar la realidad social del texto.
  - El pronombre «lo» en «lo destruye» y «lo dejará ir» sigue el uso español natural aunque el antecedente sea «ojo» en la primera cláusula y la persona esclavizada en la segunda; el contexto hace clara la referencia en cada caso.
