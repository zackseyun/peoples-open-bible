  rationale: The prepositional form most naturally marks temporal priority here. Given the fragmentary witness, a simple temporal
    'before' is the least interpretively loaded rendering.
- source_word: እሉ
  chosen: these things
  alternatives:
  - these
  - those things
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The demonstrative can stand substantivally. 'These things' gives idiomatic English while preserving the likely
    referential force better than a bare 'these'.
- source_word: ነገረ
  chosen: he spoke
  alternatives:
  - he said
  - he told
  - he declared
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb commonly denotes speaking or saying. 'He spoke' preserves a slightly elevated narrative register and
    avoids over-specifying an object not explicit in the surviving text.
