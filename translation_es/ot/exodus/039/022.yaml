translation:
  language: es
  text: Y hizo la túnica del efod, obra de un tejedor, toda de azul.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: And he made
  chosen_spanish: Y hizo
  alternatives_spanish:
  - Y fabricó
  - Y confeccionó
  lexicon: HALOT
  rationale: El hebreo narra una acción secuencial פשוטa con עשה; en español, «hizo» reproduce con naturalidad la acción y la conexión narrativa del waw consecutivo sin añadir matices no presentes.
- source_word: מְעִיל
  english_pob_choice: robe
  chosen_spanish: túnica
  alternatives_spanish:
  - manto
  - ropa exterior
  lexicon: HALOT
  rationale: En contexto sacerdotal, מְעִיל designa una prenda exterior. «Túnica» funciona en español bíblico amplio y es más natural que «robe»; se evita «manto» porque puede sonar demasiado genérico o no reflejar bien una vestidura confeccionada específica.
- source_word: הָאֵפֹד
  english_pob_choice: the ephod
  chosen_spanish: del efod
  alternatives_spanish:
  - del pectoral del efod
  - del efod sacerdotal
  lexicon: HALOT
  rationale: «Efod» conserva el término técnico del vestuario sacerdotal, ya que no existe un equivalente simple en español que preserve su función ritual. Se mantiene la relación genitiva «del efod» conforme al hebreo.
- source_word: מַעֲשֵׂה אֹרֵג
  english_pob_choice: the work of a weaver
  chosen_spanish: obra de tejedor
  alternatives_spanish:
  - trabajo de tejedor
  - obra tejida
  - hechura de tejedor
  lexicon: HALOT
  rationale: La expresión hebrea literalmente indica «obra/trabajo de tejedor». «Obra de tejedor» conserva el sustantivo de oficio y el carácter artesanal sin sobreexplicar ni introducir una cualificación ausente en el texto.
- source_word: כְּלִיל תְּכֵלֶת
  english_pob_choice: all of blue
  chosen_spanish: toda de azul
  alternatives_spanish:
  - completamente azul
  - enteramente azul
  lexicon: HALOT
  rationale: כְּלִיל expresa totalidad/completitud. Dado que la revisión inglesa decidió no añadir «yarn», el español también refleja el color total de la prenda con «toda de azul», que comunica bien que toda la vestidura era de color azul.
translation_notes:
  revision_awareness: El texto inglés revisado pasó de «all of blue yarn» a «all of blue» para ajustarse más de cerca al hebreo. La traducción española sigue esa revisión y evita añadir explícitamente material textil donde el hebreo solo enfatiza la totalidad del color.
  spanish_consistency_notes:
  - Se mantiene la terminología técnica «efod» para el vestuario sacerdotal, en consonancia con el uso bíblico y la tradición del proyecto.
  - Se usa «azul» sin especificar material, siguiendo el hebreo y la revisión inglesa más reciente.
  - El verbo en pasado simple («hizo») conserva la secuencia narrativa breve del hebreo.
