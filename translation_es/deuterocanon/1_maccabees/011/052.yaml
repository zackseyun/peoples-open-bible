translation:
  language: es
  text: Y el rey Demetrio se sentó en el trono de su reino, y el país quedó en calma ante él.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐκάθισεν
  english_pob_choice: sat
  chosen_spanish: se sentó
  alternatives_spanish:
  - tomó asiento
  - se sentó en su trono
  lexicon: LSJ
  rationale: El aoristo de καθίζω en este contexto denota entronización o toma de asiento real. «Se sentó» conserva la imagen formal sin sobreinterpretar el verbo. «Tomó asiento» es posible, pero suena menos natural en este marco regio; «se sentó en su trono» añade una especificación que ya queda expresada por el complemento siguiente.
- source_word: θρόνου τῆς βασιλείας αὐτοῦ
  english_pob_choice: the throne of his kingdom
  chosen_spanish: el trono de su reino
  alternatives_spanish:
  - su trono real
  - el trono de su realeza
  lexicon: LSJ
  rationale: Se mantiene la construcción explícita del genitivo con «el trono de su reino», que reproduce bien la relación entre trono y reino. «Su trono real» es más fluido, pero comprime el valor de βασιλείας; «el trono de su realeza» suena artificial en español.
- source_word: ἡσύχασεν
  english_pob_choice: was quiet
  chosen_spanish: estuvo quieta
  alternatives_spanish:
  - estuvo en paz
  - estuvo calma
  - descansó
  lexicon: LSJ
  rationale: El verbo indica quedar o volverse quieto, sin forzar una paz plena. «Estuvo quieta» preserva el matiz político de tranquilidad/ausencia de disturbio. «Estuvo en paz» puede sugerir demasiado; «descansó» desplaza el sentido hacia reposo.
- source_word: ἡ γῆ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - el territorio
  - la región
  lexicon: LSJ
  rationale: Aunque el inglés usa «the land», en español «la tierra» es una correspondencia natural y bíblica para el territorio bajo gobierno. «El país» moderniza demasiado; «el territorio» es preciso pero más técnico.
- source_word: ἐνώπιον αὐτοῦ
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - en su presencia
  - ante él
  lexicon: LSJ
  rationale: La expresión literalmente significa «antes/delante de él». «Delante de él» conserva la relación espacial y de presencia sin añadir solemnidad. «Ante él» también es válida, pero algo más formal; «en su presencia» interpreta más explícitamente la situación.
- source_word: ὁ βασιλεὺς Δημήτριος
  english_pob_choice: King Demetrius
  chosen_spanish: el rey Demetrio
  alternatives_spanish:
  - rey Demetrio
  - Demetrio, el rey
  lexicon: LSJ
  rationale: 'En español es natural anteponer el título con artículo: «el rey Demetrio». Esto mantiene la referencia y el énfasis real de forma clara.'
translation_notes:
  revision_awareness: El texto griego y el auditorio inglés coinciden ampliamente; no se requieren notas textuales ni revisiones adicionales. Se conservó el tono histórico sobrio y la sintaxis paralela del original.
  spanish_consistency_notes:
  - Se mantuvo «rey» para βασιλεὺς y «reino» para βασιλείας en todo el registro.
  - Se evitó traducir ἡσύχασεν como «estuvo en paz» para no intensificar indebidamente el estado descrito.
  - No se introdujeron términos devocionales o eclesiales ajenos al contexto histórico.
