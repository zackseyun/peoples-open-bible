review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura poética y la personificación de las armas, y traduce con fidelidad la mayor parte de las unidades léxicas. Sin embargo, «Desde la sangre de… desde la grasa de…» no suena natural en español para expresar el מִן de separación/procedencia en este contexto; «Ante…» o «lejos de» serían más idiomáticos, y aquí conviene una solución poética que preserve que el arco no se volvió atrás frente a sangre y grasa. Además, el juego de notas está desanclado respecto al inglés: la nota [a] del POB inglés pertenece al verbo «did not turn back / did not draw back», mientras que en el borrador español [a] se puso sobre «caídos»; la nota sobre «grasa» sí corresponde al segundo punto lexical. También «los valientes» es aceptable, pero «los poderosos» o «los héroes» preserva mejor el matiz elevado de גִּבּוֹרִים en paralelo con el inglés «the mighty».'
  spanish_quality_summary: El texto es legible y digno, pero «Desde la sangre… desde la grasa…» resulta poco idiomático y algo calcado. «No volvió vacía» funciona bien. «El arco de Jonatán no retrocedió» es natural, aunque conviene anclar ahí la nota alternativa «no se volvió atrás / no retrocedió». La revisión propuesta mejora la naturalidad poética sin apartarse del hebreo.
  glossary_alignment: No hay términos del glosario mayor en juego como Yahvé/Mesías. Las decisiones léxicas principales son en general consistentes con el POB, salvo la colocación incorrecta de la nota [a] y el uso de «desde» para מִן, que no refleja bien el valor contextual en español. «Jonatán» y «Saúl» están bien; «grasa» preserva correctamente חֵלֶב.
  issues:
  - severity: high
    issue: Uso poco natural de «Desde la sangre… desde la grasa…»
    rationale: Aunque intenta reflejar מִן, en español esta formulación suena espacial y torpe. En este contexto bélico-poético la idea es que las armas no se echaron atrás ante sangre y grasa; conviene una formulación más idiomática como «Ante la sangre… ante la grasa…».
  - severity: high
    issue: La nota [a] está anclada al sustantivo equivocado
    rationale: En el POB inglés, la primera nota documenta la alternativa del verbo «did not turn back / did not draw back», no una alternativa para «the slain». En español debe ir sobre «no retrocedió» o equivalente.
  - severity: medium
    issue: «los valientes» atenúa el matiz de גִּבּוֹרִים
    rationale: Es aceptable, pero «los poderosos» o «los héroes» refleja mejor el registro elevado de «the mighty» y mantiene el paralelismo poético con más fuerza.
  - severity: low
    issue: La nota sobre חֲלָלִים no es necesaria aquí
    rationale: «Los caídos» comunica bien el sentido de muertos en combate; añadir una nota nueva no responde a una ambigüedad preservada por el inglés y desplaza indebidamente la nota realmente relevante sobre el verbo.
  revised_spanish_text: Ante la sangre de los caídos, ante la grasa de los poderosos[a], el arco de Jonatán no retrocedió[b], y la espada de Saúl no volvió vacía.
  revised_footnotes:
  - marker: a
    text: O «la parte más rica» o «lo mejor». «Grasa» mantiene la imagen hebrea; el verso usa lenguaje poético para intensificar el éxito en batalla.
    reason: lexical_alternative
  - marker: b
    text: O «no se volvió atrás». El verbo hebreo puede transmitir la idea de retirarse o volverse atrás.
    reason: lexical_alternative
  revision_rationale: 'Se reemplazó «desde» por «ante» para expresar de forma idiomática y poética el sentido contextual del hebreo sin perder la imagen de que las armas no se echaron atrás frente a la carnicería de la batalla. Se corrigió la ubicación de las notas para que coincidan con el audit trail inglés: la alternativa verbal va en «no retrocedió», y la nota sobre «grasa» permanece en ese término. También se ajustó «los valientes» a «los poderosos» para acercarse mejor al registro de גִּבּוֹרִים / «the mighty».'
