translation:
  language: es
  text: Recuerden las cosas primeras[a] de tiempos antiguos, porque yo soy Dios, y no hay otro; yo soy Dios, y no hay ninguno como yo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las cosas anteriores». La expresión hebrea puede aludir a los hechos anteriores; «de tiempos antiguos» traduce la referencia al pasado distante, no necesariamente a la eternidad en sentido abstracto.
    reason: lexical_alternative
lexical_decisions:
- source_word: זִכְרוּ
  english_pob_choice: Remember
  chosen_spanish: Recuerden
  alternatives_spanish:
  - Recuerden
  - Acuérdense de
  - Traigan a la memoria
  lexicon: HALOT
  rationale: Imperativo plural dirigido al pueblo. «Recuerden» mantiene la fuerza directa y natural de la orden sin volverse explicativo.
- source_word: רִאשֹׁנוֹת
  english_pob_choice: the former things
  chosen_spanish: las cosas de antaño
  alternatives_spanish:
  - las cosas anteriores
  - las cosas de antes
  - las cosas de antaño
  lexicon: HALOT
  rationale: El sustantivo plural femenino funciona sustantivado y alude a realidades pasadas. «Las cosas de antaño» conserva la referencia temporal remota y suena idiomático en español.
- source_word: מֵעוֹלָם
  english_pob_choice: of old
  chosen_spanish: de antaño
  alternatives_spanish:
  - de antiguo
  - de tiempos antiguos
  - desde la antigüedad
  lexicon: HALOT
  rationale: Aquí עוֹלָם apunta al pasado distante, no a la eternidad abstracta. «De antaño» refleja ese valor temporal, como la nota inglesa que evita leer eternidad donde el contexto no la exige.
- source_word: אָנֹכִי אֵל
  english_pob_choice: I am God
  chosen_spanish: yo soy Dios
  alternatives_spanish:
  - yo soy Dios
  - yo soy El
  - yo soy el Dios
  lexicon: HALOT
  rationale: אֵל es aquí un título común, no un nombre propio. «Yo soy Dios» reproduce la afirmación directa y evita introducir una transliteración innecesaria.
- source_word: וְאֵין עוֹד
  english_pob_choice: and there is no other
  chosen_spanish: y no hay otro
  alternatives_spanish:
  - y no hay otro
  - y no existe otro
  - y no hay nadie más
  lexicon: HALOT
  rationale: La expresión hebrea marca exclusividad. «No hay otro» conserva la concisión y el sentido monoteísta del texto.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios
  - dios
  lexicon: HALOT
  rationale: Aunque morfológicamente plural, el contexto se refiere al único Dios verdadero. En español, la mayúscula conserva la referencia singular y solemne.
- source_word: וְאֶפֶס כָּמוֹנִי
  english_pob_choice: and there is none like me
  chosen_spanish: y no hay nadie como yo
  alternatives_spanish:
  - y no hay nadie como yo
  - y no hay ninguno semejante a mí
  - y no existe nadie comparable conmigo
  lexicon: HALOT
  rationale: אֶפֶס con כָּמוֹנִי expresa inexistencia de un igual. «No hay nadie como yo» es idiomático y mantiene la fuerza de incomparabilidad.
theological_decisions:
- issue: Repetición enfática de la autoidentificación divina
  english_pob_reading: Render both אֵל and אֱלֹהִים as 'God' and preserve the repeated assertion of uniqueness in full.
  chosen_spanish_reading: Repetir «yo soy Dios» en ambos miembros para conservar la autoafirmación y la estructura paralela.
  alternative_spanish_readings:
  - Reducir la segunda cláusula a «y no hay otro» sin repetir «yo soy Dios»
  - Traducir una vez como «yo soy Dios Todopoderoso»
  rationale: El hebreo presenta dos cláusulas paralelas con la misma afirmación divina, lo que intensifica la exclusividad de Yahvé. Repetirla en español preserva el énfasis sin añadir contenido doctrinal ajeno al versículo.
  doctrine_reference: Monoteísmo bíblico; afirmación de unicidad divina en Isaías
translation_notes:
  revision_awareness: 'La base inglesa revisó «from long ago» a «of old» para acercarse más a מֵעוֹלָם y mantener un registro formal. La redacción española sigue esa misma decisión: usa «de antaño» para conservar el matiz temporal remoto sin convertirlo en una referencia filosófica a la eternidad.'
  spanish_consistency_notes:
  - Se mantuvo «Dios» con mayúscula para reflejar la referencia singular al único Dios verdadero.
  - Se evitó «SEÑOR» porque el hebreo aquí no usa el tetragrámaton, sino אֵל / אֱלֹהִים.
  - La repetición de «yo soy Dios» conserva el paralelismo y la fuerza retórica del hebreo.
  - «De antaño» se emplea como equivalente natural de un pasado lejano, coherente con la nota de alternativa lexical.
