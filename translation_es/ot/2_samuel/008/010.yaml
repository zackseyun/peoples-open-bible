translation:
  language: es
  text: Entonces Toí envió a Joram, su hijo, al rey David para preguntarle por su bienestar y bendecirlo, porque había peleado contra Hadadézer y lo había derrotado[a]; pues Hadadézer había estado en guerra con Toí, y en su mano había artículos de plata, artículos de oro y artículos de bronce[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «porque había peleado contra Hadadézer y lo había derribado»; más fluidamente, la cláusula siguiente puede entenderse como «pues Hadadézer había estado en guerra con Toí».
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «en su mano había»; es decir, los llevaba consigo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: Then ... sent
  chosen_spanish: Entonces ... envió
  alternatives_spanish:
  - Y ... envió
  - Así ... envió
  lexicon: HALOT
  rationale: La forma narrativa hebrea avanza la acción; «Entonces» reproduce bien el valor secuencial en español sin perder naturalidad.
- source_word: תֹּעִי
  english_pob_choice: Toi
  chosen_spanish: Toí
  alternatives_spanish:
  - Toi
  - Tou
  lexicon: HALOT
  rationale: Se translitera el nombre propio de manera consistente en español; «Toí» mantiene una forma breve y legible, cercana al hebreo de Samuel.
- source_word: יֽוֹרָם בְּנוֹ
  english_pob_choice: Joram his son
  chosen_spanish: Joram, su hijo
  alternatives_spanish:
  - su hijo Joram
  - Joram su hijo
  lexicon: HALOT
  rationale: Se conserva la relación filial explícita y se ajusta el orden para una lectura natural en español, sin perder la cercanía al hebreo.
- source_word: לִשְׁאָל לוֹ לְשָׁלוֹם
  english_pob_choice: to ask about his welfare
  chosen_spanish: para preguntarle por su bienestar
  alternatives_spanish:
  - para preguntarle por la paz
  - para informarse de su bienestar
  - para saludarlo
  lexicon: HALOT
  rationale: El modismo hebreo expresa una consulta sobre la paz/bienestar de alguien; «bienestar» comunica el sentido idiomático de forma clara en español.
- source_word: וּלְבָרֲכוֹ
  english_pob_choice: and to bless him
  chosen_spanish: y bendecirlo
  alternatives_spanish:
  - y bendecirlo con palabras de bendición
  - y saludarlo con bendición
  - y felicitarlo
  lexicon: HALOT
  rationale: El verbo ברך se traduce con su sentido básico, «bendecir», porque el contexto diplomático no elimina el valor lexical de bendición.
- source_word: עַל אֲשֶׁר נִלְחַם בַּהֲדַדְעֶזֶר וַיַּכֵּהוּ
  english_pob_choice: because he had fought against Hadadezer and struck him down
  chosen_spanish: porque había peleado contra Hadadézer y lo había derrotado
  alternatives_spanish:
  - porque había combatido contra Hadadézer y lo había derribado
  - porque había luchado contra Hadadézer y lo había vencido
  lexicon: HALOT
  rationale: Se mantiene la causalidad y el valor militar del hebreo. «Derrotado» expresa el resultado bélico sin sobrecargar el texto, y «contra» refleja la oposición implícita en ב.
- source_word: כִּי אִישׁ מִלְחֲמוֹת תֹּעִי הָיָה הֲדַדְעָזֶר
  english_pob_choice: for Hadadezer had been at war with Toi
  chosen_spanish: pues Hadadézer había estado en guerra con Toí
  alternatives_spanish:
  - porque Hadadézer había sido enemigo de Toí
  - ya que Hadadézer había estado guerreando con Toí
  lexicon: HALOT
  rationale: La revisión inglesa prefirió la lectura más natural y precisa. En español, «había estado en guerra con» preserva el sentido relacional y evita una paráfrasis excesiva.
- source_word: וּבְיָדוֹ הָיוּ
  english_pob_choice: and in his hand were
  chosen_spanish: Y en su mano había
  alternatives_spanish:
  - y llevaba
  - y traía consigo
  - y en su mano estaban
  lexicon: HALOT
  rationale: Se conserva la literalidad auditada de la imagen hebrea («en su mano»), que puede implicar que los llevaba consigo; el español permite esa lectura sin explicitarla en exceso.
- source_word: כְּלֵי כֶסֶף וּכְלֵי זָהָב וּכְלֵי נְחֹשֶׁת
  english_pob_choice: articles of silver, articles of gold, and articles of bronze
  chosen_spanish: artículos de plata, artículos de oro y artículos de bronce
  alternatives_spanish:
  - vasos de plata, vasos de oro y vasos de bronce
  - objetos de plata, oro y bronce
  lexicon: HALOT
  rationale: «Artículos» conserva la amplitud semántica de כְּלִי sin limitarlo a recipientes. «Bronce» sigue la preferencia del proyecto para נְחֹשֶׁת.
theological_decisions:
- issue: El sentido diplomático de «bendecir» en un envío de homenaje o cortesía
  english_pob_reading: and to bless him
  chosen_spanish_reading: y bendecirlo
  alternative_spanish_readings:
  - y saludarlo con bendición
  - y felicitarlo
  rationale: Aunque el contexto sugiere cortesía diplomática, el verbo hebreo sigue siendo «bendecir». Se mantiene la tensión entre el valor lexical y el uso social sin sustituirlo por un verbo más débil.
  doctrine_reference: Uso léxico del AT; bendición/cortesía en contexto narrativo
- issue: La expresión militar «Hadadezer had been at war with Toi»
  english_pob_reading: for Hadadezer had been at war with Toi
  chosen_spanish_reading: pues Hadadézer había estado en guerra con Toí
  alternative_spanish_readings:
  - porque Hadadézer había sido enemigo de Toí
  - ya que Hadadézer había estado guerreando con Toí
  rationale: Se conserva la relación hostil sin convertirla en una reinterpretación moral o política. La frase mantiene la referencia histórica del conflicto entre ambos reyes.
  doctrine_reference: Narrativa histórica del AT
translation_notes:
  revision_awareness: La revisión inglesa corrigió la cláusula final de «a man of wars with Toi» a la lectura más natural y exacta «at war with Toi». La versión española sigue esa corrección con «había estado en guerra con Toí», evitando una calca menos clara y manteniendo la base hebrea. También se preserva la imagen literal de «en su mano había», con nota explicativa sobre el sentido de llevar los objetos consigo.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca; aquí no se requiere.
  - Se mantiene «Hadadézer» con acentuación española coherente para el nombre propio.
  - Se usa «artículos» para כְּלִי según el criterio POB ya auditado.
  - Se conserva el paralelismo narrativo sin añadir información ajena al texto.
