  yaml_path: translation/ot/2_samuel/015/023.yaml
  text: And all the land was weeping with a loud voice[a], and all the people were crossing over. The king also crossed over the Kidron Valley[b], and all the people were crossing over on the road toward the wilderness.
  footnotes:
