    issue: «despidió» para שִׁלַּח
    rationale: Aunque contextualiza correctamente la salida de los hombres, el rastro auditado inglés documenta una preferencia por el sentido básico «he sent». En español, «envió» conserva mejor la cercanía al hebreo sin perder el contexto.
  - severity: medium
    issue: «debajo de él» en referencia topográfica
    rationale: Es una reproducción demasiado literal de לוֹ + מִתַּחַת y suena poco natural en español. «Más abajo que él» o «por debajo de él» comunica mejor la relación de elevación entre Gedeón y el campamento.
