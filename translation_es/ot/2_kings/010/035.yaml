translation:
  language: es
  text: Y Jehú se acostó con sus padres, y lo sepultaron en Samaria. Joacaz, su hijo, llegó a ser rey en su lugar.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  english_pob_choice: lay down
  chosen_spanish: se acostó
  alternatives_spanish:
  - murió
  - se durmió
  lexicon: HALOT
  rationale: En los avisos regios de muerte, שׁכב funciona como fórmula idiomática. «Se acostó» conserva la imagen hebrea sin forzar «murió» ni usar «se durmió», que puede sonar más ambiguo en español.
- source_word: עִם אֲבֹתָיו
  english_pob_choice: with his fathers
  chosen_spanish: con sus padres
  alternatives_spanish:
  - con sus antepasados
  lexicon: HALOT
  rationale: La POB inglesa mantiene la fórmula tradicional «with his fathers». En español, «con sus padres» conserva la fórmula heredada y la relación dinástica/ancestral, aunque «antepasados» explicita más el sentido, pero se aleja de la forma del hebreo.
- source_word: וַיִּקְבְּרוּ אֹתוֹ
  english_pob_choice: they buried him
  chosen_spanish: lo sepultaron
  alternatives_spanish:
  - lo enterraron
  - fue sepultado
  lexicon: HALOT
  rationale: El hebreo usa verbo activo en tercera persona plural con sujeto no especificado. «Lo sepultaron» preserva el carácter activo y suena natural; «fue sepultado» suaviza la agencia y «enterraron» es posible, pero «sepultar» refleja mejor el registro bíblico.
- source_word: בְּשֹׁמְרוֹן
  english_pob_choice: in Samaria
  chosen_spanish: en Samaria
  alternatives_spanish:
  - en la ciudad de Samaria
  lexicon: HALOT
  rationale: La preposición locativa בְּ pide un valor locativo simple. «En Samaria» es directo y fiel; añadir «la ciudad de» explicita sin necesidad lo que el texto no dice.
- source_word: וַיִּמְלֹךְ
  english_pob_choice: became king
  chosen_spanish: reinó
  alternatives_spanish:
  - comenzó a reinar
  - llegó a ser rey
  lexicon: HALOT
  rationale: Aunque el inglés POB opta por la idea de acceso al trono, en español «reinó» encaja naturalmente en fórmulas de sucesión y evita una perífrasis menos idiomática. Aquí el contexto sucesorio ya hace claro el cambio de reinado.
- source_word: בְּנ֖וֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - el hijo de él
  lexicon: HALOT
  rationale: Pronombre posesivo de relación familiar directo y natural en español, sin perder la referencia anafórica a Jehú.
- source_word: תַּחְתָּיו
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en vez de él
  - después de él
  lexicon: HALOT
  rationale: La locución señala sucesión en el oficio real. «En su lugar» transmite con claridad la sustitución y es la correspondencia más natural en español.
- source_word: יֵהוּא
  english_pob_choice: Jehu
  chosen_spanish: Jehú
  alternatives_spanish:
  - Jehu
  lexicon: transliteración estándar
  rationale: Se sigue la forma habitual en español bíblico «Jehú», que respeta la pronunciación y la convención ortográfica del idioma.
- source_word: יְהוֹאָחָז
  english_pob_choice: Jehoahaz
  chosen_spanish: Joacaz
  alternatives_spanish:
  - Jehoacaz
  lexicon: transliteración estándar
  rationale: La forma española tradicional y más reconocible es «Joacaz», adecuada para un texto bíblico en español y fiel a la transliteración convencional del nombre.
theological_decisions:
- issue: 'Fórmula regia de muerte: “lay down with his fathers”'
  english_pob_reading: Preserves the Hebrew idiom as a royal death notice without flattening it into plain 'died.'
  chosen_spanish_reading: «Se acostó con sus padres» conserva la fórmula idiomática y su tono sepulcral-regio sin interpretarla de más.
  alternative_spanish_readings:
  - «Murió»
  - «Descansó con sus padres»
  rationale: El texto hebreo usa una fórmula estable en los resúmenes reales. La opción escogida mantiene la tensión entre el modismo y el hecho de la muerte, evitando tanto la reducción interpretativa como un eufemismo no presente en el hebreo.
  doctrine_reference: 2 Reyes 10:35; fórmula regia de los libros de Reyes
- issue: 'Acceso al trono: וַיִּמְלֹךְ / תַּחְתָּיו'
  english_pob_reading: '''Became king in his place'' marks accession, not merely duration of rule.'
  chosen_spanish_reading: «reinó en su lugar» comunica la sucesión dinástica y el reemplazo real en un español natural.
  alternative_spanish_readings:
  - «comenzó a reinar en su lugar»
  - «llegó a ser rey en su lugar»
  rationale: La idea teológica e histórica del texto es la continuidad dinástica bajo la providencia de Yahvé, expresada como sucesión al trono. «Reinó en su lugar» no borra esa transición y resulta más idiomático que una traducción demasiado analítica.
  doctrine_reference: 2 Reyes 10:35; 1 Reyes 1–2; 2 Reyes 15
translation_notes:
  revision_awareness: 'El pasaje presenta alta concordancia con el audit trail inglés: se conservan la fórmula de muerte real, el sepultamiento en Samaria y la sucesión de Joacaz en lugar de Jehú. No hay revisiones aplicadas en el expediente inglés, y la traducción española sigue esa lectura sin introducir variantes textuales.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma de nombre divino en la serie, aunque este versículo no lo menciona explícitamente.
  - Se usa «Jehú» y «Joacaz» como formas españolas estándar y consistentes con la tradición bíblica en español.
  - «Se acostó» conserva la imagen hebrea; no se normaliza a «murió» para no perder la fórmula regia.
  - «En su lugar» se reserva para sucesión de oficio, alineado con el valor de תַּחְתָּיו.
