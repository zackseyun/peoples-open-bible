  text: I winnowed them with a winnowing fork at the gates of the land[a]; I bereaved, I destroyed my people[b]; they did not turn back from their ways.
  footnotes:
  - marker: a
    text: Or 'they did not repent of their ways.' The Hebrew says 'turn back/return,' which can carry the sense of repentance in prophetic contexts.
    reason: lexical_alternative
  - marker: b
    text: Or 'at the gates of the earth.' The Hebrew word can mean either 'land' or 'earth'; here 'land' fits the immediate context of judgment on Judah.
    reason: lexical_alternative
