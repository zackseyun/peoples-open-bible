theological_decisions:
- issue: Use of 'wife' versus 'woman' in a misogynistic-sounding wisdom saying
  chosen_reading: wife
  alternative_readings:
  - woman
  rationale: The verse belongs to household-management instruction, and both Hebrew אשה and Greek γυνή can mean either 'woman' or 'wife.' 'Wife' better fits the domestic and possessive imagery of the line without broadening the statement into a universal claim about women in general. The translation preserves the text's difficult tone without intensifying it beyond the source.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; preserve the source''s intent without importing claims the text does not make.'
