translation:
  language: es
  text: Por su conocimiento los abismos[a] fueron abiertos, y las nubes destilan rocío[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las profundidades» o «las aguas profundas».
    reason: lexical_alternative
  - marker: b
    text: O «los cielos destilan rocío».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּדַעְתּוֹ
  english_pob_choice: By his knowledge
  chosen_spanish: Por su conocimiento
  alternatives_spanish:
  - Por su saber
  - Mediante su conocimiento
  - Con su conocimiento
  lexicon: HALOT
  rationale: El ב instrumental se expresa naturalmente en español con «por» o «mediante». «Por su conocimiento» conserva el valor de medio/agente sin volver la frase pesada, y mantiene «conocimiento» como equivalente directo de דַעַת. «Saber» sería posible, pero aquí «conocimiento» sigue mejor la decisión inglesa y el registro sapiencial.
- source_word: תְּהוֹמוֹת
  english_pob_choice: the depths
  chosen_spanish: los abismos
  alternatives_spanish:
  - las profundidades
  - las honduras
  - las profundidades marinas
  lexicon: HALOT
  rationale: En este contexto cósmico, תְּהוֹמוֹת no se refiere solo a «profundidades» genéricas, sino a las aguas primordiales o abismales. «Abismos» comunica mejor esa resonancia de caos primordial que la English POB preserva con «the depths», aunque en español «las profundidades» sigue siendo una alternativa válida.
- source_word: נִבְקָעוּ
  english_pob_choice: were split open
  chosen_spanish: fueron partidos
  alternatives_spanish:
  - fueron abiertos
  - se hendieron
  - estallaron
  lexicon: HALOT
  rationale: El nifal transmite una acción pasiva de abrirse o partirse. «Fueron partidos» conserva la imagen de ruptura física con un español natural y sobrio. «Se hendieron» sería más literario, pero menos transparente para lectura pública.
- source_word: וּשְׁחָקִים
  english_pob_choice: the clouds
  chosen_spanish: las nubes
  alternatives_spanish:
  - los cielos
  - los firmamentos
  - las alturas
  lexicon: HALOT
  rationale: Aunque שְׁחָקִים puede significar «cielos» o la región superior, el paralelismo con el rocío inclina a una imagen meteorológica. «Las nubes» sigue la decisión inglesa y resulta más natural en español que «los cielos» aquí.
- source_word: יִרְעֲפוּ
  english_pob_choice: drip
  chosen_spanish: destilan
  alternatives_spanish:
  - gotean
  - vierten gota a gota
  - dejan caer
  lexicon: HALOT
  rationale: El verbo expresa una caída lenta y continua; en español bíblico y moderno «destilan» comunica bien ese goteo delicado del rocío. «Gotean» es claro, pero algo más coloquial; «destilan» mantiene la precisión poética.
- source_word: טָל
  english_pob_choice: dew
  chosen_spanish: rocío
  alternatives_spanish:
  - rocío de la mañana
  - escarcha líquida
  lexicon: HALOT
  rationale: טָל se traduce de forma estándar como «rocío». En este contexto la palabra conserva su valor meteorológico y poético sin necesidad de ampliar la imagen.
theological_decisions:
- issue: Imaginería cósmica de creación/providencia
  english_pob_reading: The verse describes God's wisdom/knowledge as the means by which the world was ordered, using imagery of the deep waters and the dew-bearing clouds.
  chosen_spanish_reading: El versículo describe el conocimiento de Dios como medio por el cual se ordenó el mundo, mediante la imagen de los abismos y las nubes que destilan rocío.
  alternative_spanish_readings:
  - Referencia solo a la creación primordial, sin matiz de providencia continua
  - Referencia principal al orden providencial del clima, más que a la creación
  rationale: El contexto de Proverbios 3:19–20 apunta a la sabiduría como fundamento del orden creado. La traducción española conserva la imagen cósmica sin cerrar la tensión entre creación primordial y providencia continua, tal como exige la filosofía de traducción del proyecto.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en vez de resolverla.'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios; este borrador sigue de cerca el texto hebreo y el audit trail inglés, sin introducir ajustes doctrinales ni textuales adicionales.
  spanish_consistency_notes:
  - Se mantuvo «Dios» implícito en el posesivo «su», conforme al referente del contexto inmediato.
  - «Abismos» se eligió para conservar el peso cósmico de תְּהוֹמוֹת sin volver la línea demasiado técnica.
  - Se preservó el paralelismo meteorológico con «nubes» y «rocío», siguiendo la lectura inglesa auditada.
