translation:
  language: es
  text: Ustedes han enviado a Juan[a], y él ha dado testimonio de la verdad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ha testificado de la verdad».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑμεῖς
  english_pob_choice: You
  chosen_spanish: Ustedes
  alternatives_spanish:
  - Tú
  - Ustedes mismos
  lexicon: BDAG
  rationale: El pronombre explícito agrega énfasis, pero en español conviene un plural natural y respetuoso. 'Ustedes' comunica el segundo plural sin sobrecargar el énfasis; 'ustedes mismos' sería excesivo aquí.
- source_word: ἀπεστάλκατε
  english_pob_choice: have sent
  chosen_spanish: han enviado
  alternatives_spanish:
  - han mandado
  - enviaron
  lexicon: BDAG
  rationale: El perfecto griego se refleja mejor con el perfecto compuesto en español, manteniendo la acción pasada con relevancia vigente. 'Han enviado' es más natural y conserva la fuerza aspectual mejor que un simple pretérito.
- source_word: πρὸς Ἰωάννην
  english_pob_choice: to John
  chosen_spanish: a Juan
  alternatives_spanish:
  - hacia Juan
  - para Juan
  - a Juan el Bautista
  lexicon: BDAG
  rationale: πρός con objeto personal expresa dirección hacia una persona; en español 'a Juan' es la forma más directa y sobria. Se evita añadir 'el Bautista' porque el griego nombra solo 'Juan'.
- source_word: μεμαρτύρηκε
  english_pob_choice: has testified
  chosen_spanish: ha dado testimonio
  alternatives_spanish:
  - ha testificado
  - ha sido testigo
  lexicon: BDAG
  rationale: El perfecto expresa un testimonio ocurrido antes con vigencia presente. 'Ha dado testimonio' conserva el matiz forense y suena natural en español contemporáneo; 'ha testificado' es posible, pero menos idiomático.
- source_word: τῇ ἀληθείᾳ
  english_pob_choice: to the truth
  chosen_spanish: de la verdad
  alternatives_spanish:
  - a la verdad
  - con respecto a la verdad
  lexicon: BDAG
  rationale: Aunque el griego usa dativo con μαρτυρέω, en español la construcción más natural es 'dar testimonio de'. Se mantiene 'la verdad' con artículo para preservar la posible resonancia joánica y no reducirlo a una verdad abstracta.
theological_decisions:
- issue: Valor teológico del artículo en 'la verdad'
  english_pob_reading: the truth
  chosen_spanish_reading: la verdad
  alternative_spanish_readings:
  - verdad
  rationale: Se conserva el artículo porque puede tener peso joánico y no solo cualidad abstracta. 'La verdad' mantiene la tensión textual sin imponer una interpretación doctrinal más específica.
  doctrine_reference: Preservar la tensión teológica donde el texto la permite.
translation_notes:
  revision_awareness: El audit trail inglés pasó de 'sent' a 'have sent' para reflejar mejor el perfecto griego ἀπεστάλκατε; la versión española sigue esa revisión con 'han enviado'. También se conservó el valor perfectivo de μεμαρτύρηκε con una forma compuesta en español.
  spanish_consistency_notes:
  - Se mantiene el registro digno y claro, apto para lectura eclesial amplia.
  - Se evita 'Cristo' o terminología cristológica no presente en el versículo.
  - La nota de pie conserva una alternativa lexical equivalente sin alterar el texto principal.
