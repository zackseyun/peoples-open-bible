translation:
  language: es
  text: Sus príncipes[a] eran más puros que la nieve, más blancos que la leche; sus cuerpos[b] eran más rojizos que los corales[c], su forma era como zafiro[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘sus nazareos’ o ‘sus consagrados’. El término hebreo puede referirse a los que están apartados por voto, pero aquí quizá designa a la nobleza distinguida de Jerusalén.
    reason: alternative_reading
  - marker: b
    text: La palabra hebrea traducida ‘cuerpos’ normalmente significa ‘huesos’; en poesía puede designar el cuerpo o el armazón físico. Aquí se ha preferido un sentido corporal general por el paralelismo del verso.
    reason: lexical_alternative
  - marker: c
    text: El término antiguo traducido ‘corales’ es incierto; también puede referirse a rubíes, perlas u otra gema preciosa roja.
    reason: lexical_alternative
  - marker: d
    text: El término antiguo traducido ‘zafiro’ puede referirse al lapislázuli más que al zafiro moderno.
    reason: cultural_note
lexical_decisions:
- source_word: נְזִירֶיהָ
  english_pob_choice: her princes
  chosen_spanish: sus príncipes
  alternatives_spanish:
  - sus nazireos
  - sus consagrados
  - sus separados
  lexicon: HALOT
  rationale: Sigo la decisión inglesa de entender aquí no necesariamente a los nazareos en sentido técnico, sino a la élite distinguida de Jerusalén; por eso 'príncipes' comunica mejor el probable sentido contextual. Mantengo la alternativa tradicional en nota porque el hebreo permite también la lectura de 'nazareos/consagrados'.
- source_word: זַכּוּ
  english_pob_choice: were purer
  chosen_spanish: eran más puros
  alternatives_spanish:
  - eran puros
  - eran más limpios
  lexicon: HALOT
  rationale: El verbo expresa limpieza/pureza. 'Más puros' conserva el comparativo poético del hebreo y sigue de cerca la opción inglesa sin sonar artificial en español.
- source_word: צַחוּ
  english_pob_choice: whiter
  chosen_spanish: más blancos
  alternatives_spanish:
  - más brillantes
  - más resplandecientes
  lexicon: HALOT
  rationale: El sentido es de blancura/brillo. En español, 'más blancos' reproduce de forma natural el paralelismo con 'la leche'.
- source_word: אָדְמוּ
  english_pob_choice: were more ruddy
  chosen_spanish: eran más rojizos
  alternatives_spanish:
  - eran más rojos
  - ruborizaban más
  - ardían más en rojo
  lexicon: HALOT
  rationale: '''Rojizos'' transmite mejor un color encarnado o saludable que un mero ''rojos'', y conserva el registro poético de ''more ruddy''.'
- source_word: עֶצֶם
  english_pob_choice: their bodies
  chosen_spanish: sus cuerpos
  alternatives_spanish:
  - sus huesos
  - su cuerpo
  - su figura
  lexicon: HALOT
  rationale: Aunque el sustantivo suele significar 'hueso', aquí el paralelismo poético pide el aspecto corporal externo. 'Cuerpos' evita una lectura demasiado anatómica y mantiene la imagen de apariencia física.
- source_word: פְּנִינִים
  english_pob_choice: corals
  chosen_spanish: los corales
  alternatives_spanish:
  - rubíes
  - perlas
  - gemas rojas
  lexicon: HALOT
  rationale: Sigo la elección inglesa, pero en español conviene el artículo definido plural 'los corales' para el símil comparativo. La incertidumbre léxica se preserva en nota porque el término antiguo puede referirse a otras gemas o sustancias preciosas.
- source_word: גִּזְרָתָם
  english_pob_choice: their form
  chosen_spanish: su forma
  alternatives_spanish:
  - su figura
  - su apariencia
  - su talle
  lexicon: HALOT
  rationale: '''Forma'' reproduce bien el sustantivo de figura/contorno y conserva el paralelo final con ''como zafiro''.'
- source_word: סַפִּיר
  english_pob_choice: sapphire
  chosen_spanish: zafiro
  alternatives_spanish:
  - lapislázuli
  lexicon: HALOT
  rationale: Mantengo 'zafiro' como equivalente tradicional y comprensible en español, dejando en nota la posible referencia antigua al lapislázuli.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios sustanciales y el cotejo general mostró alta concordancia. La versión española sigue esa lectura estable, conservando las incertidumbres léxicas señaladas en el aparato crítico y evitando suavizar el contraste poético del hebreo.
  spanish_consistency_notes:
  - Se mantiene 'zafiro' en vez de una equivalencia interpretativa más libre, porque el paralelo poético del texto y el audit trail inglés preservan el término tradicional.
  - '''Príncipes'' responde al mismo juicio contextual que el inglés, sin borrar la alternativa de lectura técnico-ritual del hebreo.'
  - Se conserva el paralelismo adjetival comparativo ('más... que...') para reflejar la estructura poética del versículo.
  - No se usa 'SEÑOR' ni referencias teológicas ajenas al verso, porque el texto no contiene el nombre divino ni un título cristológico.
