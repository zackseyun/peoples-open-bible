translation:
  language: es
  text: Mira con favor[a] al linaje de Abraham, a los hijos de Jacob santificado, tu pueblo, tu porción santificada, pereciendo injustamente como extranjeros en tierra extranjera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a los hijos de Jacob santificados». La frase griega es comprimida, y el participio «santificado» puede referirse a Jacob o a los hijos.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἔπιδε
  english_pob_choice: Look upon
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira atentamente
  - Fíjate en
  - Considera
  lexicon: LSJ
  rationale: En una súplica dirigida a Dios, el imperativo pide que él vuelva su atención al pueblo. «Mira» conserva la apelación directa y es natural en español bíblico sin volverse rígido.
- source_word: σπέρμα
  english_pob_choice: offspring
  chosen_spanish: linaje
  alternatives_spanish:
  - descendencia
  - prole
  - semilla
  lexicon: LSJ
  rationale: «Linaje» transmite bien el sentido colectivo de descendencia de Abraham en español bíblico y evita el literalismo potencialmente chocante de «semilla».
- source_word: ἡγιασμένου
  english_pob_choice: sanctified / who has been sanctified
  chosen_spanish: santificado
  alternatives_spanish:
  - consagrado
  - hecho santo
  lexicon: LSJ
  rationale: El participio pasivo expresa una condición resultante. «Santificado» preserva la misma familia léxica que el resto del versículo y permite mantener la ambigüedad sintáctica del griego.
- source_word: τέκνα Ἰακώβ
  english_pob_choice: the children of sanctified Jacob / the sanctified children of Jacob
  chosen_spanish: los hijos de Jacob santificado
  alternatives_spanish:
  - los hijos de Jacob, que ha sido santificado
  - los hijos santificados de Jacob
  lexicon: LSJ
  rationale: La construcción griega es comprimida y permite dos enlaces. En español, «Jacob santificado» conserva la proximidad del participio al nombre propio, dejando abierta la lectura alternativa sin forzar una resolución.
- source_word: μερίδος
  english_pob_choice: portion / allotted
  chosen_spanish: porción
  alternatives_spanish:
  - parte
  - heredad
  - porción asignada
  lexicon: LSJ
  rationale: «Porción» es la equivalencia más natural para la idea de pertenencia y posesión del pueblo como parte de Dios; además preserva la repetición conceptual del texto.
- source_word: ἡγιασμένης σου
  english_pob_choice: your sanctified
  chosen_spanish: tu porción santificada
  alternatives_spanish:
  - tu porción consagrada
  - tu porción santa
  lexicon: LSJ
  rationale: «Santificada» mantiene el mismo campo semántico que ἡγιασμένου y refleja el vínculo posesivo («tu»). Se evita «santa» para no diluir la marca verbal del participio.
- source_word: λαὸν
  english_pob_choice: people
  chosen_spanish: pueblo
  alternatives_spanish:
  - gente
  - nación
  lexicon: LSJ
  rationale: «Pueblo» es el equivalente covenantal estándar y encaja con la sintaxis appositiva del versículo.
- source_word: ἐν ξένῃ γῇ
  english_pob_choice: in a foreign land
  chosen_spanish: en tierra ajena
  alternatives_spanish:
  - en tierra extranjera
  - en tierra extraña
  lexicon: LSJ
  rationale: «Tierra ajena» suena natural y conserva la condición de exilio/extrañeza mejor que una forma más técnica o más arcaica.
- source_word: ξένως
  english_pob_choice: as strangers
  chosen_spanish: como extranjeros
  alternatives_spanish:
  - como forasteros
  - en condición de extranjeros
  lexicon: LSJ
  rationale: Aunque el adverbio griego es más literalmente «como extraños», «como extranjeros» comunica de forma más clara su situación social y geográfica en español.
- source_word: ἀδίκως
  english_pob_choice: unjustly
  chosen_spanish: injustamente
  alternatives_spanish:
  - sin justicia
  - de manera injusta
  lexicon: LSJ
  rationale: «Injustamente» reproduce de forma directa la carga moral del adverbio sin ampliar el sentido.
- source_word: ἀπολλύμενον
  english_pob_choice: perishing
  chosen_spanish: que perece
  alternatives_spanish:
  - que está pereciendo
  - que se destruye
  lexicon: LSJ
  rationale: El participio presente expresa acción en curso; «que perece» es sobrio, natural y mantiene el tono de lamento de la oración.
theological_decisions:
- issue: Ambigüedad sintáctica de ἐφ’ ἡγιασμένου τέκνα Ἰακώβ
  english_pob_reading: The Greek phrase is compressed; the participle may qualify Jacob or the children.
  chosen_spanish_reading: «los hijos de Jacob santificado» preserva la ambigüedad entre Jacob santificado y los hijos santificados de Jacob.
  alternative_spanish_readings:
  - los hijos de Jacob, santificado
  - los hijos santificados de Jacob
  - los hijos de Jacob, que ha sido santificado
  rationale: El griego permite más de una relación sintáctica. La redacción española evita resolverla de modo definitivo y conserva la tensión textual documentada en el aparato inglés.
  doctrine_reference: Preservar la ambigüedad textual y no cerrar una lectura cuando el original no la cierra.
- issue: Repetición de lenguaje de santificación en el versículo
  english_pob_reading: your sanctified portion; children of sanctified Jacob
  chosen_spanish_reading: Mantener «santificado/santificada» en ambas expresiones.
  alternative_spanish_readings:
  - santo/sa
  - consagrado/da
  rationale: La repetición subraya la pertenencia especial del pueblo a Dios. «Santificado» reproduce la red de términos del original y evita reemplazarla por un sinónimo que borre la correspondencia léxica.
  doctrine_reference: Conservar la repetición léxica y su peso teológico en el texto fuente.
translation_notes:
  revision_awareness: El inglés POB revisó la cláusula central para reflejar mejor la compresión del griego y reordenó la secuencia «tu pueblo, tu porción santificada». La versión española sigue esa revisión, pero mantiene una formulación más compacta para conservar la ambigüedad sintáctica del original sin explicitarla en exceso.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exige; aquí no aparece el nombre divino explícito, por lo que no se introduce.
  - Se mantiene «santificado/santificada» para conservar la red léxica del participio griego.
  - Se evita «Cristo» u otras equivalencias no pertinentes.
  - «Tierra ajena» y «como extranjeros» preservan el doble matiz de extrañeza y extranjería sin sobretraducir el adverbio ξένως.
