translation:
  language: es
  text: Bela murió, y Jobab hijo de Zerah, de Bozra[a], reinó en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de Bosra». La preposición hebrea puede indicar procedencia o asociación con la ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - y murió
  lexicon: HALOT
  rationale: El wayyiqtol narra el siguiente evento en secuencia; en español, "murió" reproduce de forma natural el hecho narrativo sin añadir sujeto explícito innecesario, ya que el nombre propio lo identifica en el contexto.
- source_word: בָּלַע
  english_pob_choice: Bela
  chosen_spanish: Bela
  alternatives_spanish:
  - Belá
  lexicon: nombre propio
  rationale: Se conserva el nombre propio en transliteración estándar. La forma española "Bela" coincide con el uso más común y con la tradición de nombres bíblicos en español.
- source_word: וַיִּמְלֹךְ
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - comenzó a reinar
  - se hizo rey
  lexicon: HALOT
  rationale: En esta fórmula de sucesión real, "reinó" es el equivalente natural y fiel al valor de מלך en contexto dinástico.
- source_word: תַּחְתָּיו
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en vez de él
  - después de él
  lexicon: HALOT
  rationale: La construcción con תחת + sufijo expresa sucesión en el cargo o la posición. "En su lugar" mantiene la idea de reemplazo en español de manera idiomática.
- source_word: יוֹבָב
  english_pob_choice: Jobab
  chosen_spanish: Jobab
  alternatives_spanish:
  - Yobab
  lexicon: nombre propio
  rationale: Se mantiene la transliteración bíblica habitual en español como nombre propio.
- source_word: בֶּן זֶרַח
  english_pob_choice: son of Zerah
  chosen_spanish: hijo de Zérah
  alternatives_spanish:
  - hijo de Zara
  - hijo de Zéraj
  lexicon: HALOT
  rationale: La cadena constructa se traduce de forma directa. Se conserva el nombre propio con una grafía que facilite la lectura en español sin perder la identificación del personaje.
- source_word: מִבָּצְרָה
  english_pob_choice: from Bozrah
  chosen_spanish: de Bosra
  alternatives_spanish:
  - de Bozra
  - de Bosrá
  lexicon: HALOT
  rationale: El prefijo מִן puede señalar procedencia o asociación. En español, "de Bosra" comunica de manera natural esa relación local; el matiz de origen o pertenencia queda abierto, como en el audit trail inglés.
theological_decisions:
- issue: 'El valor de מִן en una lista real: procedencia u asociación con la ciudad'
  english_pob_reading: from Bozrah; 'of Bozrah' as an alternative because the Hebrew preposition can mark origin or association with the city.
  chosen_spanish_reading: de Bosra
  alternative_spanish_readings:
  - desde Bosra
  - de Bozra
  rationale: No hay carga doctrinal, pero sí una ambigüedad semántica relevante. "De Bosra" conserva esa apertura entre origen y pertenencia, sin obligar a una sola interpretación.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo masorético y concuerda con el auditor inglés de POB en los cuatro elementos clave de la fórmula de sucesión: muerte, reinado, reemplazo y procedencia local. No se identificaron revisiones aplicadas ni discrepancias textuales relevantes.'
  spanish_consistency_notes:
  - Se usa una sintaxis breve y narrativa, propia de genealogías y listas reales.
  - Se mantiene la transliteración consistente de nombres propios bíblicos.
  - '"Bosra" se emplea como forma española natural, con nota que preserva la alternativa semántica del hebreo.'
