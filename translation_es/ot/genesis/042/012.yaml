base_translation:
  language: en
  yaml_path: translation/ot/genesis/042/012.yaml
  text: But he said to them[a], “No[b], but you have come to see the nakedness of the land.”
  footnotes:
  - marker: a
    text: Or 'the exposed/undefended parts of the land.' The Hebrew literally says 'the nakedness of the land,' a metaphor for vulnerable areas that could be exploited by invaders or spies.
    reason: lexical_alternative
  - marker: b
    text: Or 'to spy out.' The Hebrew verb is literally 'to see,' but in context Joseph is accusing them of reconnaissance.
    reason: lexical_alternative
