translation:
  language: es
  text: Todo lo dedicado irrevocablemente[a] en Israel será tuyo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todo lo puesto bajo anatema en Israel»; חֵרֶם se refiere a algo irrevocablemente dedicado a Dios y, en algunos contextos, dedicado a la destrucción.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  english_pob_choice: Every
  chosen_spanish: Todo
  alternatives_spanish:
  - Cada
  - Todo lo
  lexicon: HALOT
  rationale: El cuantificador hebreo introduce la totalidad de la categoría. En español, "Todo" funciona con naturalidad en esta construcción legal y conserva el alcance colectivo sin forzar una singularización artificial.
- source_word: חֵרֶם
  english_pob_choice: devoted thing
  chosen_spanish: consagrado
  alternatives_spanish:
  - consagrado para destrucción
  - anatema
  - bajo el anatema
  lexicon: HALOT
  rationale: En este contexto sacerdotal, el término técnico designa algo irrevocablemente apartado para Dios. "Consagrado" preserva la idea de dedicación irrevocable sin introducir en el texto principal la noción de destrucción, que el contexto no explicita aquí.
- source_word: בְּיִשְׂרָאֵל
  english_pob_choice: in Israel
  chosen_spanish: en Israel
  alternatives_spanish:
  - entre Israel
  - dentro de Israel
  lexicon: HALOT
  rationale: La preposición expresa esfera o ubicación. "En Israel" es la forma más directa y natural en español para este marco legal.
- source_word: לְךָ
  english_pob_choice: yours
  chosen_spanish: tuyo
  alternatives_spanish:
  - para ti
  - te pertenecerá
  lexicon: HALOT
  rationale: El sufijo pronominal indica asignación o posesión legal. "Tuyo" comunica de manera breve y clara que se trata de un derecho asignado a Aarón.
- source_word: יִהְיֶה
  english_pob_choice: shall be
  chosen_spanish: será
  alternatives_spanish:
  - será tuyo
  - te pertenecerá
  lexicon: HALOT
  rationale: El imperfecto hebreo en este contexto legal expresa disposición futura/normativa. "Será" mantiene el tono prescriptivo y funciona de forma idiomática en español.
theological_decisions:
- issue: Cómo rendir חֵרֶם sin resolver la tensión entre consagración y destrucción
  english_pob_reading: 'devoted thing; footnote: ''Or “everything under the ban in Israel”; חֵרֶם refers to something irrevocably devoted to God, in some contexts devoted to destruction.'''
  chosen_spanish_reading: 'consagrado; nota: «O “todo lo bajo anatema en Israel”; חֵרֶם se refiere a algo irrevocablemente dedicado a Dios, y en algunos contextos dedicado a la destrucción.»'
  alternative_spanish_readings:
  - anatema
  - bajo el anatema
  - consagrado para destrucción
  rationale: La POB inglesa mantiene la tensión semántica de חֵרֶם en una nota en lugar de fijar un único matiz. En español, "consagrado" conserva la dedicación irrevocable, mientras la nota preserva la alternativa más fuerte de "anatema"/destrucción sin imponerla al texto principal.
  doctrine_reference: Preservar tensión lexical y teológica documentada; no estrechar el término más allá de lo que el versículo afirma.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios respecto del estado auditado; la redacción española sigue el sentido legal y técnico del hebreo sin añadir interpretación ajena.'
  spanish_consistency_notes:
  - Se usó «Yahvé» no aplica aquí porque el versículo no contiene el tetragrámaton.
  - Se mantuvo un registro técnico y jurídico con «consagrado» para חֵרֶם, evitando sustituirlo por vocabulario eclesiástico más interpretativo.
  - La construcción «será tuyo» refleja asignación legal y conserva la simplicidad del hebreo.
  - La nota al pie reproduce la tensión semántica documentada en la POB inglesa, con una alternativa española equivalente.
