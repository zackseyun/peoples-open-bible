    text: También puede entenderse como 'ofrenda de grano'.
    reason: lexical_alternative
  - marker: b
    text: O 'hecho en una sartén honda o sobre una plancha plana'. Los dos términos hebreos para utensilios probablemente se refieren a implementos de cocción distintos.
    reason: lexical_alternative
  revision_rationale: 'Se conserva el texto base casi intacto, pero se corrige la relación entre notas y anclajes: la alternativa de מִנְחָה queda en [a], y la explicación sobre la distinción entre los dos utensilios hebreos pasa a [b] junto a la frase pertinente. También se mejora levemente la naturalidad con ''sobre una plancha''.'
