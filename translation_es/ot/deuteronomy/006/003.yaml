translation:
  language: es
  text: Así que oye[a], Israel, y cuida de hacerlo, para que te vaya bien y te multipliques muchísimo, tal como Yahvé, el Dios de tus padres, te ha hablado[b], en una tierra que mana leche y miel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «escucha». El hebreo שׁמע puede expresar oír, escuchar o atender con obediencia; aquí se mantiene un verbo breve que deja esa fuerza amplia al contexto.
    reason: lexical_alternative
  - marker: b
    text: O, «como Yahvé, el Dios de tus padres, te ha prometido, en una tierra que mana leche y miel». El hebreo es compacto y permite entender la última frase en conexión con lo que Yahvé ha dicho acerca de esa tierra.
    reason: alternative_reading
lexical_decisions:
- source_word: וְשָׁמַעְתָּ
  english_pob_choice: hear
  chosen_spanish: oye
  alternatives_spanish:
  - escucha
  - oye y obedece
  lexicon: HALOT
  rationale: שׁמע puede significar oír, escuchar u obedecer según el contexto. Aquí, como en el inglés POB, conviene conservar el imperativo básico de audición/atención y dejar que la siguiente cláusula exprese la respuesta obediente.
- source_word: וְשָׁמַרְתָּ לַעֲשׂוֹת
  english_pob_choice: be careful to do it
  chosen_spanish: esfuérzate por hacerlo
  alternatives_spanish:
  - guárdalo para hacerlo
  - obsérvalo para hacerlo
  - cuida de hacerlo
  lexicon: HALOT
  rationale: שׁמר con infinitivo de עשה expresa guardar/observar con atención para pasar a la acción. 'Esfuérzate por hacerlo' comunica la diligencia requerida en español sin perder la idea de cuidado y obediencia práctica.
- source_word: אֲשֶׁר יִיטַב לְךָ
  english_pob_choice: that it may go well with you
  chosen_spanish: para que te vaya bien
  alternatives_spanish:
  - para que sea bueno para ti
  - para que te sea bien
  lexicon: HALOT
  rationale: Es un giro deuteronómico fijo. 'Te vaya bien' es natural en español y mantiene el sentido benefactivo de bienestar y prosperidad relacional.
- source_word: וַאֲשֶׁר תִּרְבּוּן מְאֹד
  english_pob_choice: and that you may multiply greatly
  chosen_spanish: y te multipliques muchísimo
  alternatives_spanish:
  - y aumentes grandemente
  - y llegues a ser muy numeroso
  lexicon: HALOT
  rationale: רבה aquí apunta a aumento numérico/covenantal. 'Multipliques' conserva esa fuerza; 'muchísimo' refleja el intensificador מְאֹד con buena naturalidad en español.
- source_word: כַּאֲשֶׁר דִּבֶּר
  english_pob_choice: just as ... has spoken
  chosen_spanish: tal como ... te ha hablado
  alternatives_spanish:
  - así como ... ha hablado
  - tal como ... habló
  lexicon: HALOT
  rationale: דבר puede traducirse como 'hablar' o 'decir'. En español, 'te ha hablado' conserva el carácter de palabra pronunciada por Yahvé hacia el destinatario y evita sobrerrepresentar la idea de promesa explícita.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: ''Yahvé'' reproduce el nombre divino en lugar de sustituirlo por un título.'
- source_word: אֱלֹהֵי אֲבֹתֶיךָ
  english_pob_choice: the God of your fathers
  chosen_spanish: el Dios de tus padres
  alternatives_spanish:
  - el Dios de tus antepasados
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'padres', y el texto base en inglés conservó esa forma. En español, 'padres' es fiel y natural; 'antepasados' neutraliza el parentesco masculino explícito.
- source_word: לָךְ
  english_pob_choice: to you
  chosen_spanish: te
  alternatives_spanish:
  - para ti
  - a ti
  lexicon: HALOT
  rationale: Aunque la forma morfológica es femenina singular en la tabla, el contexto sintáctico la trata como dativo de segunda persona. En español, 'te' integra bien el régimen verbal de 'hablar'.
- source_word: אֶרֶץ זָבַת חָלָב וּדְבָשׁ
  english_pob_choice: a land flowing with milk and honey
  chosen_spanish: en una tierra que fluye leche y miel
  alternatives_spanish:
  - en una tierra que mana leche y miel
  - en una tierra fluyendo leche y miel
  lexicon: HALOT
  rationale: La imagen fija del hebreo se conserva con 'fluye'. La preposición 'en' sigue la revisión inglesa que conectó naturalmente la cláusula con el lugar donde se desarrolla la bendición.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. La política del proyecto pide transliterarlo como 'Yahvé' para preservar el nombre de pacto, no ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: La frase compacta sobre la tierra prometida
  english_pob_reading: in a land flowing with milk and honey
  chosen_spanish_reading: en una tierra que fluye leche y miel
  alternative_spanish_readings:
  - en una tierra que mana leche y miel
  - una tierra que fluye leche y miel
  rationale: La sintaxis hebrea es compacta y puede leerse en aposición al conjunto de lo dicho por Yahvé. Se conserva la conexión con 'en' para reflejar el ajuste revisionado del POB en inglés y no aislar indebidamente la descripción de la tierra.
  doctrine_reference: English POB revision awareness; Deut 6:3 source syntax
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente que sustituyó la construcción con guion y 'of a land' por 'in a land', para conectar de manera más natural la bendición con el lugar. En español se reflejó con 'en una tierra' y se evitó una construcción posesiva artificial. También se respetó la lectura auditada de 'Yahvé' y la referencia masculina explícita a 'tus padres'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el Tetragrámaton según el estándar del proyecto.
  - Se evita 'SEÑOR' como sustituto del nombre divino.
  - '''Padres'' conserva el matiz genealógico masculino del hebreo.'
  - La imagen de abundancia se traduce de forma idiomática pero sin suavizarse a simple prosperidad genérica.
  - Las notas al pie marcan alternativas de lectura solo donde el hebreo o la revisión inglesa lo justifican.
