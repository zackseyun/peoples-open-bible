translation:
  language: es
  text: Y todo lo demás que pueda surgir como necesidad para el templo de tu Dios[a], lo darás del tesoro real.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para la casa de tu Dios» o «para el santuario de tu Dios». El griego dice «el lugar sagrado/templo», mientras que el testigo semítico paralelo apoya «casa de tu Dios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ λοιπὰ
  english_pob_choice: whatever else
  chosen_spanish: todo lo demás
  alternatives_spanish:
  - el resto
  - las demás cosas
  - lo restante
  lexicon: LSJ
  rationale: La expresión abarca elementos adicionales o gastos suplementarios, no solo un remanente estático. En español, 'todo lo demás' conserva esa amplitud sin sonar forzado.
- source_word: ὅσα ἂν ὑποπίπτῃ σοι
  english_pob_choice: may come up / may arise
  chosen_spanish: que pueda surgir
  alternatives_spanish:
  - que pueda presentarse
  - que pueda ocurrir
  - que te venga
  lexicon: LSJ
  rationale: El giro expresa algo que se presenta de manera contingente como necesidad. 'Que pueda surgir' reproduce bien esa idea en un español natural y formal.
- source_word: εἰς τὴν χρείαν
  english_pob_choice: as a need
  chosen_spanish: como necesidad
  alternatives_spanish:
  - para la necesidad
  - para lo necesario
  - para cubrir una necesidad
  lexicon: LSJ
  rationale: χρεία denota necesidad o requerimiento práctico. 'Como necesidad' mantiene el matiz funcional del texto sin añadir interpretación.
- source_word: τοῦ ἱεροῦ τοῦ θεοῦ σου
  english_pob_choice: for the temple of your God
  chosen_spanish: para el templo de tu Dios
  alternatives_spanish:
  - para la casa de tu Dios
  - para el santuario de tu Dios
  lexicon: LSJ
  rationale: El griego ἱερόν apunta al recinto/templo; el paralelo semítico sugiere 'casa de tu Dios'. En español, 'templo' preserva el valor del griego y sigue siendo compatible con ese paralelo.
- source_word: δώσεις
  english_pob_choice: you shall give
  chosen_spanish: lo darás
  alternatives_spanish:
  - darás
  - deberás dar
  - has de dar
  lexicon: LSJ
  rationale: En un decreto real, el futuro funciona con fuerza directiva. 'Lo darás' conserva ese tono mandativo y suena más fluido en español que una perífrasis más pesada.
- source_word: ἐκ τοῦ βασιλικοῦ γαζοφυλακίου
  english_pob_choice: from the royal treasury
  chosen_spanish: del tesoro real
  alternatives_spanish:
  - del tesoro del rey
  - de la tesorería real
  - del almacén real
  lexicon: LSJ
  rationale: γαζοφυλάκιον designa un tesoro o arca de fondos; 'tesoro real' es breve, claro y acorde con el contexto administrativo.
theological_decisions:
- issue: Relación entre ἱερόν y el paralelo semítico בית אלהך
  english_pob_reading: for the temple of your God
  chosen_spanish_reading: para el templo de tu Dios
  alternative_spanish_readings:
  - para la casa de tu Dios
  - para el santuario de tu Dios
  rationale: La traducción española sigue el griego principal con 'templo', mientras reconoce en nota que el paralelo semítico favorece 'casa'. Así se conserva la tensión textual sin ocultarla.
  doctrine_reference: Primacía del texto fuente griego con uso informativo de los paralelos semíticos; no hay carga doctrinal especial más allá de la precisión textual.
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del audit trail al preferir 'templo' para ἱεροῦ y una fórmula formal para la obligación del decreto, manteniendo la referencia al tesoro real y la amplitud de 'todo lo demás'.
  spanish_consistency_notes:
  - Se usa 'Dios' para θεοῦ, conforme al estándar del proyecto.
  - Se conserva 'templo' para ἱερόν por la decisión de la revisión más reciente y por la naturalidad del español en contexto cultual.
  - La nota [a] está anclada en el texto para evitar desajustes de validación.
