translation:
  language: es
  text: Nombrará para sí comandantes de mil y comandantes de cincuenta[a], y a algunos para que aren su tierra y sieguen su cosecha[b], y para que hagan sus armas de guerra y el equipo de sus carros[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «capitanes de mil y capitanes de cincuenta».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo literalmente: «arar su arada y segar su cosecha», una construcción que enfatiza el trabajo hecho para el rey.'
    reason: lexical_alternative
  - marker: c
    text: O «hacer su equipo militar y el equipo de sus carros».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָשׂוּם לוֹ
  english_pob_choice: He will appoint for himself
  chosen_spanish: Nombrará para sí
  alternatives_spanish:
  - y nombrará para sí
  - y dispondrá para sí
  lexicon: HALOT
  rationale: El infinitivo constructo continúa la descripción de lo que hará el rey; en español conviene un verbo finito natural. "Nombrará para sí" conserva la idea de establecer o designar para su propio beneficio.
- source_word: שָׂרֵי אֲלָפִים
  english_pob_choice: commanders of thousands
  chosen_spanish: capitanes de mil
  alternatives_spanish:
  - comandantes de mil
  - jefes de mil
  lexicon: HALOT
  rationale: שַׂר designa un oficial o líder. "Capitanes" comunica bien el rango militar en español sin sonar excesivamente técnico. "De mil" conserva la unidad administrativa/militar del hebreo.
- source_word: וְשָׂרֵי חֲמִשִּׁים
  english_pob_choice: and commanders of fifties
  chosen_spanish: capitanes de cincuenta
  alternatives_spanish:
  - y comandantes de cincuenta
  - y jefes de cincuenta
  lexicon: HALOT
  rationale: Mantiene el paralelismo con la expresión anterior y la organización militar-administrativa por grupos de cincuenta.
- source_word: וְלַחֲרֹשׁ חֲרִישׁוֹ
  english_pob_choice: and some to plow his ground
  chosen_spanish: y a algunos para que aren su tierra
  alternatives_spanish:
  - y para arar su arada
  - y a algunos para arar su campo
  lexicon: HALOT
  rationale: La construcción cognada hebrea es literalmente "arar su arado/arada". En español, "aren su tierra" comunica con naturalidad el trabajo forzado para el rey sin perder el sentido agrícola. Se conserva la nota de labor exigida para él.
- source_word: וְלִקְצֹר קְצִירוֹ
  english_pob_choice: and reap his harvest
  chosen_spanish: y sieguen su cosecha
  alternatives_spanish:
  - y recojan su cosecha
  - y sieguen su siega
  lexicon: HALOT
  rationale: '"Sieguen" corresponde bien a la cosecha cerealera implícita en el paralelismo con el arado. "Cosecha" hace natural el español y preserva la idea de recolección para el rey.'
- source_word: וְלַעֲשׂוֹת כְּלֵי מִלְחַמְתּוֹ
  english_pob_choice: and to make his weapons of war
  chosen_spanish: y para que hagan sus armas de guerra
  alternatives_spanish:
  - y para hacer sus armas de guerra
  - y para que hagan su armamento de guerra
  lexicon: HALOT
  rationale: כְּלִי puede abarcar utensilios, armas o equipo; aquí el contexto militar favorece "armas de guerra" para preservar la fuerza bélica del texto.
- source_word: וּכְלֵי רִכְבּוֹ
  english_pob_choice: and the equipment of his chariots
  chosen_spanish: y el equipo de sus carros
  alternatives_spanish:
  - y el equipo de sus carros de guerra
  - y los implementos de sus carros
  lexicon: HALOT
  rationale: רֶכֶב se refiere a carros de guerra o carros. "Carros" es suficiente en español y evita sobreespecificar más allá del hebreo; "equipo" conserva el valor amplio de כְּלֵי.
translation_notes:
  revision_awareness: La versión inglesa revisada mantuvo la estructura y afinó «equipment of his chariots» para acercarse más al genitivo hebreo. La redacción española sigue esa cercanía semántica sin sonar forzada, conservando el paralelismo militar-agropecuario del verso.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como norma de proyecto cuando corresponda; este versículo no lo contiene.
  - Se prefiere "capitanes" aquí por naturalidad y rango militar claro en español, aunque "comandantes" también sería viable; se documenta la alternativa en nota.
  - Se preserva la secuencia verbal y el paralelismo del hebreo, evitando simplificar los infinitivos de propósito en una sola cláusula libre.
