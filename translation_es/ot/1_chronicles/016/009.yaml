  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Hechos maravillosos' es una opción válida para נִפְלְאֹתָיו, aunque 'maravillas' también sería posible. La decisión principal a corregir es idiomática, no glosarial.
