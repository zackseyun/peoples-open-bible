translation:
  language: es
  text: 'Entonces le pregunté[a], diciendo: «¿De quién eres hija?» Y ella respondió: «Soy hija de Betuel, hijo de Nacor, a quien Milca dio a luz para él». Entonces puse el anillo[b] en su nariz y los brazaletes en sus manos[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La construcción hebrea dice literalmente «pregunté... y dije»; en español puede verterse con naturalidad como «pregunté, diciendo» o simplemente «pregunté».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo נזם: puede designar un anillo en sentido general; la frase «en su nariz» especifica aquí que se trata de un adorno nasal.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «sobre sus manos»; en este contexto también puede entenderse más específicamente como «muñecas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶשְׁאַל אֹתָהּ וָאֹמַר
  english_pob_choice: Then I asked her, saying
  chosen_spanish: Entonces le pregunté, diciendo
  alternatives_spanish:
  - Y le pregunté, diciendo
  - Entonces le pregunté
  lexicon: HALOT
  rationale: La secuencia con waw consecutiva avanza la narración; en español, «Entonces» conserva el enlace temporal. Mantengo la duplicación hebrea de preguntar + decir por fidelidad al giro idiomático, aunque «le pregunté» por sí solo podría ser suficiente.
- source_word: בַּת מִי אַתְּ
  english_pob_choice: Whose daughter are you?
  chosen_spanish: ¿De quién eres hija?
  alternatives_spanish:
  - ¿Hija de quién eres?
  - ¿De quién eres la hija?
  lexicon: HALOT
  rationale: Es la equivalencia idiomática natural en español del hebreo kinship question, preservando la filiación interrogativa sin volverla artificial.
- source_word: בַּת בְּתוּאֵל בֶּן נָחוֹר
  english_pob_choice: The daughter of Bethuel son of Nahor
  chosen_spanish: Soy hija de Betuel, hijo de Nacor
  alternatives_spanish:
  - Soy la hija de Betuel, hijo de Nacor
  - Soy hija de Betuel, el hijo de Nacor
  lexicon: HALOT
  rationale: Conservo la estructura genealógica en aposición. «Hijo de Nacor» refleja directamente בֶּן נָחוֹר sin introducir glosas innecesarias.
- source_word: אֲשֶׁר יָלְדָה לּוֹ מִלְכָּה
  english_pob_choice: whom Milcah bore to him
  chosen_spanish: a quien Milca le dio a luz
  alternatives_spanish:
  - que Milca le dio a luz
  - a quien Milca había dado a luz
  lexicon: HALOT
  rationale: «Dar a luz» conserva el verbo de nacimiento con naturalidad en español. Mantengo el referente explícito «le» para reflejar לּוֹ, que vincula el nacimiento con Nacor. No suavizo la tensión genealógica del texto.
- source_word: הַנֶּזֶם
  english_pob_choice: the ring
  chosen_spanish: el anillo
  alternatives_spanish:
  - el aro
  - el aro para la nariz
  lexicon: HALOT
  rationale: Como el contexto inmediato ya especifica «en su nariz», «anillo» funciona en español como término general y no obliga a repetir «de la nariz». La lectura sigue el valor amplio de נזם en el audit trail inglés.
- source_word: עַל אַפָּהּ
  english_pob_choice: on her nose
  chosen_spanish: en su nariz
  alternatives_spanish:
  - sobre su nariz
  - sobre la nariz de ella
  lexicon: HALOT
  rationale: El hebreo ubica el adorno en la nariz; «en su nariz» es la manera más directa y transparente en español, sin eufemizar el lugar.
- source_word: וְהַצְּמִידִים
  english_pob_choice: and the bracelets
  chosen_spanish: y los brazaletes
  alternatives_spanish:
  - y las pulseras
  - y las ajorcas
  lexicon: HALOT
  rationale: «Brazaletes» preserva mejor que «pulseras» la fuerza de צמידים como adorno de brazo/mano y mantiene el tono más digno del pasaje.
- source_word: עַל יָדֶיהָ
  english_pob_choice: on her hands
  chosen_spanish: en sus manos
  alternatives_spanish:
  - en sus muñecas
  - en sus brazos
  lexicon: HALOT
  rationale: El hebreo usa יָד, que puede abarcar mano/brazo/muñeca según contexto. Sigo el audit trail inglés con «manos», dejando abierta la amplitud semántica sin forzar una precisión no explicitada por el texto.
theological_decisions:
- issue: Identidad genealógica y relación causal de nacimiento
  english_pob_reading: The daughter of Bethuel son of Nahor, whom Milcah bore to him
  chosen_spanish_reading: hija de Betuel, hijo de Nacor, a quien Milca le dio a luz
  alternative_spanish_readings:
  - hija de Betuel, hijo de Nacor, que Milca le dio a luz
  - hija de Betuel, hijo de Nacor, nacido de Milca
  rationale: El español debe conservar la cadena genealógica y la relación de nacimiento sin neutralizarla. «A quien Milca le dio a luz» mantiene la referencia a Nacor y evita una paráfrasis que diluya la formulación del texto hebreo.
  doctrine_reference: Génesis 24:24, 47; genealogía patriarcal
- issue: Término del adorno nasal
  english_pob_reading: the ring on her nose
  chosen_spanish_reading: el anillo en su nariz
  alternative_spanish_readings:
  - el anillo de la nariz
  - el aro para la nariz
  rationale: No escondo el detalle corporal del texto. El hebreo especifica el lugar del adorno, y la traducción debe hacerlo visible en español sin convertirlo en una glosa culturalmente suavizada.
  doctrine_reference: Génesis 24:22, 47; fidelidad descriptiva al relato
- issue: Extensión semántica de יָד
  english_pob_reading: on her hands
  chosen_spanish_reading: en sus manos
  alternative_spanish_readings:
  - en sus muñecas
  - en sus brazos
  rationale: La traducción conserva la ambigüedad controlada del hebreo. No se decide más de lo que el texto dice; se mantiene el vínculo con el gesto narrativo de colocar brazaletes.
  doctrine_reference: Génesis 24:22, 47; semántica contextual
translation_notes:
  revision_awareness: 'El audit trail inglés muestra dos ajustes menores: primero se prefirió una construcción más natural para el hebreo idiomático «asked... saying», y luego se corrigió la puntuación eliminando una coma extra. El español sigue esa misma solución narrativa natural y mantiene la puntuación limpia, sin introducir cambios interpretativos adicionales.'
  spanish_consistency_notes:
  - Uso «Nacor» y «Milca» de forma consistente con los nombres bíblicos en español.
  - Conservo «hija de» en vez de reordenar a una formulación más libre para respetar la estructura genealógica.
  - Mantengo el adorno nasal explícito y los brazaletes en las manos para no borrar detalles descriptivos del relato.
  - No empleo «Señor» ni otras sustituciones teológicas porque este versículo no contiene el Tetragrámaton ni una cita divina directa.
