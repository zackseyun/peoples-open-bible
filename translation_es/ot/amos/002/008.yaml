revisions:
- from: Y sobre vestidos tomados en prenda se echan [a] junto a cada altar, y en la casa de su Dios beben el vino de los multados [b][c].
  to: Y sobre prendas tomadas en prenda se recuestan[a] junto a cada altar, y en la casa de sus dioses beben el vino de los multados[b].
  rationale: Se corrige el sintagma final a 'sus dioses' para reflejar la morfología plural hebrea y la decisión léxica/theológica documentada. Se mejora בְּגָדִים con 'prendas' por amplitud semántica, y יַטּוּ con 'se recuestan' para conservar mejor la imagen de tenderse indulgentemente. Se elimina la nota sobre la oscilación del audit trail porque no debe gobernar el texto español principal.
