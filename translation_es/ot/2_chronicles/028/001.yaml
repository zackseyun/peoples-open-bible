translation:
  language: es
  text: Acaz tenía veinte años cuando comenzó a reinar, y reinó dieciséis años en Jerusalén. No hizo lo que era recto a los ojos de Yahvé, como había hecho David, su padre[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «David, su padre»; aquí «padre» significa antepasado real, no padre inmediato.'
    reason: cultural_note
lexical_decisions:
- source_word: בֶּן עֶשְׂרִים שָׁנָה
  english_pob_choice: was twenty years old
  chosen_spanish: tenía veinte años
  alternatives_spanish:
  - era de veinte años
  - tenía veinte años de edad
  lexicon: HALOT
  rationale: La fórmula hebrea de edad se expresa de manera natural en español como una edad cumplida. 'Tenía veinte años' conserva el sentido sin calco innecesario.
- source_word: בְּמָלְכוֹ
  english_pob_choice: when he became king
  chosen_spanish: cuando comenzó a reinar
  alternatives_spanish:
  - cuando llegó a ser rey
  - al reinar
  lexicon: HALOT
  rationale: El sustantivo verbal con preposición marca el momento de acceso al trono. 'Comenzó a reinar' comunica bien el inicio del reinado en español y mantiene el valor temporal.
- source_word: מָלַךְ
  english_pob_choice: he reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - fue rey
  - gobernó
  lexicon: HALOT
  rationale: El verbo denota el ejercicio efectivo del reinado. 'Reinó' es la correspondencia precisa y estándar en este tipo de registro real.
- source_word: בִּירוּשָׁלִָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la ciudad de Jerusalén
  lexicon: HALOT
  rationale: Es una indicación locativa directa; 'en Jerusalén' es claro y fiel.
- source_word: לֹא עָשָׂה הַיָּשָׁר
  english_pob_choice: did not do what was right
  chosen_spanish: No hizo lo recto
  alternatives_spanish:
  - No hizo lo que era recto
  - No hizo lo correcto
  lexicon: HALOT
  rationale: La fórmula evaluativa de Crónicas admite 'lo recto' como equivalente sobrio de 'what was right'. 'Lo recto' conserva el matiz de rectitud moral sin perder naturalidad.
- source_word: בְּעֵינֵי יְהוָה
  english_pob_choice: in the eyes of Yahweh
  chosen_spanish: ante los ojos de Yahvé
  alternatives_spanish:
  - a los ojos de Yahvé
  - en los ojos de Yahvé
  lexicon: HALOT
  rationale: '''Ante los ojos de'' es una construcción idiomática natural en español para expresar evaluación divina. Se mantiene el nombre divino ''Yahvé'' según el criterio del proyecto.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se preserva la transliteración española establecida por el proyecto para el Tetragrama, en lugar de sustituirlo por un título como 'Señor'.
- source_word: כְּדָוִיד אָבִיו
  english_pob_choice: as David his father had done
  chosen_spanish: como había hecho David, su padre
  alternatives_spanish:
  - como David, su padre, había hecho
  - como había hecho David, su antepasado
  lexicon: HALOT
  rationale: '''Padre'' se conserva porque el hebreo usa la relación genealógica/real, no solo un padre inmediato. En español, la coma ayuda a leer ''David'' como antecedente dinástico y mantiene la comparación con la acción previa del rey.'
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa explícitamente el Tetragrama, y la política del proyecto exige transliterarlo como 'Yahvé'. Se evita la sustitución tradicional por 'SEÑOR' para preservar la forma del nombre propio.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Relación de 'David, su padre'
  english_pob_reading: Hebrew 'David his father'; 'father' here means royal ancestor, not immediate parent.
  chosen_spanish_reading: David, su padre, como antepasado real
  alternative_spanish_readings:
  - David, su padre
  - David, su antepasado
  rationale: El texto hebreo emplea 'padre' en sentido dinástico. En español conviene conservar 'su padre' en el cuerpo del verso y explicitar en nota que se trata del antepasado real David, no del padre inmediato de Ahasía.
  doctrine_reference: Apoyo lexical y cultural del registro genealógico/real del Antiguo Testamento
translation_notes:
  revision_awareness: 'Se siguió el registro auditado en inglés: equivalencia idiomática para la fórmula de edad y de acceso al trono, conservación del juicio evaluativo de Crónicas, y transliteración de YHWH como Yahvé. No se introdujeron lecturas textuales alternativas ni revisiones adicionales.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma consistente para יְהוָה.
  - '''Reinó'' se usa para מָלַךְ, reservando otras formas solo si el contexto exigiera una matización distinta.'
  - La nota sobre 'su padre' protege la lectura dinástica sin alterar el flujo del verso.
  - '''Lo recto'' conserva el paralelismo moral de la fórmula cronística.'
