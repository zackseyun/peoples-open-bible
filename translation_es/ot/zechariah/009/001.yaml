translation:
  language: es
  text: 'Un oráculo: la palabra de Yahvé es contra la tierra de Hadrac[a], y Damasco es su lugar de reposo[d][b]; porque hacia Yahvé están vueltos el ojo del hombre[c] y el de todas las tribus de Israel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «concerniente a la tierra de Hadrac». El hebreo usa literalmente la preposición «en», pero en encabezamientos proféticos puede funcionar idiomáticamente para señalar el objeto del oráculo.
    reason: alternative_reading
  - marker: b
    text: O «Damasco es su lugar de reposo». El sufijo hebreo en «su» es ambiguo.
    reason: lexical_alternative
  - marker: c
    text: O «el ojo de la humanidad y el de todas las tribus de Israel están vueltos hacia Yahvé». El hebreo אָדָם aquí probablemente tiene sentido genérico.
    reason: lexical_alternative
  - marker: d
    text: Algunos entienden la cláusula como «porque Yahvé tiene su ojo en el hombre y en todas las tribus de Israel», pero el hebreo es muy comprimido y admite más de una construcción.
    reason: alternative_reading
lexical_decisions:
- source_word: מַשָּׂא
  english_pob_choice: oracle
  chosen_spanish: oráculo
  alternatives_spanish:
  - carga
  - pronunciamiento
  lexicon: HALOT
  rationale: En encabezamientos proféticos, מַשָּׂא introduce una declaración profética. «Oráculo» conserva ese tono formal en español y es más natural que «carga», que aquí sería opaco.
- source_word: דְבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - la palabra de Yahvé
  - la palabra de Yahweh
  lexicon: HALOT
  rationale: Se mantiene el sustantivo «palabra» y el nombre divino en forma transparente, siguiendo la política del proyecto para יְהוָה.
- source_word: בְּאֶרֶץ חַדְרָךְ
  english_pob_choice: against the land of Hadrach
  chosen_spanish: contra la tierra de Hadrac
  alternatives_spanish:
  - sobre la tierra de Hadrac
  - con respecto a la tierra de Hadrac
  lexicon: HALOT
  rationale: El hebreo lleva literalmente «en la tierra de Hadrach», pero en este contexto de juicio profético la preposición funciona de manera idiomática como dirección del oráculo. «Contra» reproduce esa fuerza de manera natural en español.
- source_word: חַדְרָךְ
  english_pob_choice: Hadrach
  chosen_spanish: Hadrac
  alternatives_spanish:
  - Hadrac
  - Hadrach
  lexicon: HALOT
  rationale: Se translitera el topónimo con adaptación ortográfica mínima al español, conservando su forma propia sin añadir explicación interpretativa.
- source_word: וְדַמֶּשֶׂק
  english_pob_choice: and Damascus
  chosen_spanish: y Damasco
  alternatives_spanish:
  - y Damasco
  lexicon: HALOT
  rationale: Nombre propio geográfico transmitido en forma estándar en español.
- source_word: מְנֻחָתוֹ
  english_pob_choice: is its resting place
  chosen_spanish: es su lugar de reposo
  alternatives_spanish:
  - es su descanso
  - es el lugar donde reposa
  lexicon: HALOT
  rationale: «Lugar de reposo» expresa el sustantivo hebreo con claridad y mantiene la ambigüedad del sufijo, sin forzar si se refiere al oráculo, a Yahvé o a Damasco.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la relación explicativa o causal del segundo hemistiquio; «porque» es natural y conserva el enlace lógico.
- source_word: לַיהוָה עֵין אָדָם
  english_pob_choice: the eye of man is toward Yahweh
  chosen_spanish: el ojo del hombre está vuelto hacia Yahvé
  alternatives_spanish:
  - el ojo del hombre está hacia Yahvé
  - la mirada del hombre está puesta en Yahvé
  lexicon: HALOT
  rationale: «Está vuelto hacia» recoge la imagen direccional del hebreo sin convertirla en una afirmación distinta («Dios vigila al hombre»). «Ojo» se mantiene por fidelidad a la metáfora bíblica.
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la humanidad
  - la gente
  lexicon: HALOT
  rationale: Se conserva el singular genérico del hebreo. En español «el hombre» puede sonar genérico y mantiene la concisión del original; la alternativa inclusiva se preserva implícitamente en el sentido colectivo.
- source_word: וְכֹל שִׁבְטֵי יִשְׂרָאֵל
  english_pob_choice: and of all the tribes of Israel
  chosen_spanish: y de todas las tribus de Israel
  alternatives_spanish:
  - y todas las tribus de Israel
  - e incluso todas las tribus de Israel
  lexicon: HALOT
  rationale: Se conserva la expansión del alcance desde «el hombre» hasta «todas las tribus de Israel». El español necesita repetir la preposición para que la dependencia sintáctica resulte clara.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrama. Conforme a la norma del proyecto, se vierte como «Yahvé» en el texto principal, evitando la sustitución por un título impersonal.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido genérico de אָדָם
  english_pob_reading: man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - la humanidad
  - la gente
  rationale: Se conserva la forma singular genérica del hebreo. Aunque «el hombre» puede leerse en clave masculina, aquí reproduce con más fidelidad la economía del original que una abstracción más explicativa.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4; Contested terms: אָדָם'
- issue: Construción comprimida de לַיהוָה עֵין אָדָם
  english_pob_reading: the eye of man is toward Yahweh
  chosen_spanish_reading: el ojo del hombre está vuelto hacia Yahvé
  alternative_spanish_readings:
  - el ojo del hombre está hacia Yahvé
  - Yahvé tiene el ojo puesto en el hombre
  rationale: La hebra permite más de una lectura, pero la decisión principal evita introducir la idea de vigilancia divina que no es la opción principal del audit trail. Se mantiene la dirección de la mirada como imagen textual.
  doctrine_reference: DOCTRINE.md Translation philosophy §2; contested syntactic ambiguity in Zechariah 9:1
translation_notes:
  revision_awareness: La revisión más reciente indicó alto acuerdo y no introdujo cambios; se ha conservado la estructura del texto principal y solo se han adaptado las decisiones al español, manteniendo la ambigüedad señalada por el audit trail inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se conserva «oráculo» para מַשָּׂא y no se reemplaza por «carga».
  - La forma «el ojo del hombre» mantiene la metáfora del hebreo; se ofrece en nota la alternativa inclusiva.
  - «Hadrac» se adapta como topónimo en ortografía española, pero se deja una nota que conserva la posibilidad de otra transliteración.
  - No se resuelve la ambigüedad de מְנֻחָתוֹ en el cuerpo principal; se documenta en nota.
