    issue: La expresión 'sean echados atrás' es poco natural y no representa con precisión óptima וְיִסֹּגוּ אָחוֹר.
    rationale: El hebreo apunta a 'retroceder', 'volver atrás' o 'ser vueltos atrás'; 'echar atrás' en español puede sonar torpe o demasiado físico/externo. 'Retrocedan' comunica mejor el movimiento adverso implícito y es más idiomático.
  - severity: low
    issue: La nota al pie repite la formulación menos natural del texto principal.
    rationale: Si se revisa el verbo principal, la alternativa futura debe armonizarse con la nueva redacción para mantener consistencia entre texto y nota.
