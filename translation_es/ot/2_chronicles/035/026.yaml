lexical_decisions:
- source_word: וְיֶתֶר
  english_pob_choice: Now the rest of
  chosen_spanish: Ahora, el resto de
  alternatives_spanish:
  - Y el resto de
  - El resto de
  lexicon: HALOT
  rationale: יֶתֶר introduce el material restante sobre Josías. En español, 'Ahora' da un flujo discursivo natural para una fórmula de cierre histórica, sin perder el valor conjuntivo del hebreo.
- source_word: דִּבְרֵי
  english_pob_choice: the acts of
  chosen_spanish: los hechos de
  alternatives_spanish:
  - las palabras de
  - los asuntos de
  - las acciones de
  lexicon: HALOT
  rationale: En fórmulas historiográficas regias, דִּבְרֵי puede referirse a hechos o acontecimientos. 'Hechos' conserva ese valor narrativo mejor que una traducción literal como 'palabras'.
- source_word: יֹאשִׁיָּהוּ
  english_pob_choice: Josiah
  chosen_spanish: Josías
  lexicon: Onomastics standard
  rationale: Nombre propio en su forma española usual.
- source_word: וַחֲסָדָיו
  english_pob_choice: his deeds of faithful love
  chosen_spanish: sus actos de amor fiel
  alternatives_spanish:
  - sus hechos de fidelidad
  - sus actos de lealtad
  - sus bondades
  lexicon: HALOT
  rationale: חֶסֶד puede abarcar bondad, lealtad y fidelidad de pacto. 'Amor fiel' preserva la carga relacional y pactal del término, y 'actos' mantiene el matiz de acciones concretas sin diluirlo en una abstracción moral.
- source_word: כַּכָּתוּב
  english_pob_choice: as written
  chosen_spanish: según está escrito
  alternatives_spanish:
  - como está escrito
  - de acuerdo con lo escrito
  lexicon: HALOT
  rationale: La construcción comparativa con כַּ + participio pide una equivalencia natural en español. 'Según está escrito' es idiomático y conserva la referencia a un texto normativo.
- source_word: בְּתוֹרַת
  english_pob_choice: in the Law of
  chosen_spanish: en la Ley de
  alternatives_spanish:
  - en la instrucción de
  - en la Torá de
  lexicon: HALOT
  rationale: En este contexto histórico-jurídico, תּוֹרָה se refiere a la ley normativa dada por Dios. 'Ley' es la forma más clara y fiel en español para este uso.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se mantiene la convención del proyecto para el Tetragrámaton, usando la forma española 'Yahvé' en lugar de un sustituto como 'SEÑOR'.
theological_decisions:
- issue: Sentido de חֲסָדָיו en la valoración de Josías
  english_pob_reading: his deeds of faithful love
  chosen_spanish_reading: sus actos de amor fiel
  alternative_spanish_readings:
  - sus actos de fidelidad
  - sus actos de lealtad
  - sus bondades
  rationale: El término no se reduce a 'bondad' genérica; en este contexto realza acciones que reflejan lealtad y amor de pacto. 'Amor fiel' mantiene esa densidad teológica sin sobrecargar la frase.
  doctrine_reference: 'Translation philosophy: preserve theological weight; consistency of key terms, or documented exception.'
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton, preservando el nombre propio divino en vez de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La redacción inglesa auditada pasó de 'deeds of covenant faithfulness' a 'deeds of faithful love' para hacer más directo חֲסָדָיו. En español se eligió 'actos de amor fiel' para conservar esa actualización, manteniendo a la vez el peso de pacto y la naturalidad estilística.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה según el estándar del proyecto.
  - '''Ley'' se usa para תּוֹרָה en contexto histórico-normativo.'
  - '''amor fiel'' se eligió para reflejar חֶסֶד con su espesor de lealtad de pacto, sin reducirlo a mera amabilidad.'
