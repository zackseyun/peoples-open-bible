base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/022/005.yaml
  text: And David said[a], “My son Solomon is young and inexperienced, and the house to be built for Yahweh must be exceedingly great, for fame and for splendor in all lands[c][b]. I will now make preparation for it.” So David made abundant preparations before his death.
  footnotes:
  - marker: a
    text: Or 'young and tender.' The Hebrew adjective can denote softness or delicacy; here it likely refers to Solomon's immaturity or inexperience.
    reason: lexical_alternative
  - marker: b
    text: 'Or ''the temple.'' Hebrew: ''the house.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'for renown and beauty' / 'for a name and for glory.'
    reason: lexical_alternative
