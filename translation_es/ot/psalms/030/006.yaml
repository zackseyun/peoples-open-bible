- from: Porque su enojo es por un momento[a]; la vida está en su favor. El llanto puede quedarse durante la noche[b], pero por la mañana llega el regocijo.
  to: Porque su enojo es por un momento; la vida está en su favor. El llanto puede quedarse durante la noche[a], pero por la mañana llega el júbilo[b].
