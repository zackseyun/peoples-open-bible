  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura distributiva de וְלַאֲשֶׁר como «y a los de», que refleja naturalmente la lista de destinatarios por localidad. Sin embargo, presenta un problema importante de alineación onomástica: la nota [a] está anclada en «Horma» cuando en la auditoría inglesa corresponde a Bor-ashan, y además las formas «Bor-asan» y «Atac» se apartan innecesariamente de las transliteraciones auditadas del topónimo hebreo.'
  spanish_quality_summary: «Y a los de …» es español natural y claro para esta lista. No obstante, la colocación de la nota es incorrecta, y las grafías «Bor-asan» y especialmente «Atac» pueden dificultar la correspondencia con los topónimos reconocibles de referencia. Una forma más fiel y legible es mantener «Bor-asán» y «Atac[a]» o mejor aún «Atac» solo si hubiera justificación fuerte; aquí conviene seguir más de cerca la forma auditada «Athach» adaptada prudentemente al español como «Atac», pero el principal problema sigue siendo la nota mal ubicada. También conviene acentuar «asán» para lectura española si se usa adaptación.
  glossary_alignment: No hay términos teológicos del glosario principal en juego. En nombres de lugar, el proyecto favorece transliterar antes que traducir; por eso debe preservarse el carácter toponímico de Bor-ashan y evitar traducirlo en el texto principal. La nota debe explicar ese punto exactamente en el topónimo correspondiente.
  issues:
  - severity: high
    issue: La nota [a] está anclada en «Horma» en vez de en «Bor-asan».
    rationale: La auditoría inglesa asigna la nota léxica al topónimo Bor-ashan, no a Hormah. El anclaje actual induce al lector a pensar que la explicación etimológica corresponde a Horma.
  - severity: medium
    issue: La forma «Bor-asan» debería reflejar mejor el topónimo auditado Bor-ashan.
    rationale: El hebreo בור עשן corresponde al topónimo Bor-ashan. En español puede adaptarse levemente, pero conviene mantener la estructura reconocible del nombre propio; «Bor-asán» ayuda a la pronunciación sin perder identificación.
  - severity: medium
    issue: La transliteración «Atac» es posible pero poco justificada frente a la forma auditada «Athach».
    rationale: Dado que el proyecto prioriza fidelidad onomástica, una adaptación española demasiado libre puede debilitar la correspondencia con el topónimo fuente. Aun así, no es un error doctrinal; es una mejora de consistencia.
  revised_spanish_text: y a los de Horma, y a los de Bor-asán[a], y a los de Atac.
