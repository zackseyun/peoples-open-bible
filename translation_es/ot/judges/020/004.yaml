revisions:
- from: 'Entonces respondió el levita[a], el esposo de la mujer que había sido asesinada, y dijo: «Yo llegué a Gabaa, que pertenece a Benjamín, yo y mi concubina, para pasar la noche.»'
  to: 'Entonces respondió el levita[a], el esposo de la mujer que había sido asesinada, y dijo: «Yo llegué a Gabaa, que pertenece a Benjamín, con mi concubina, para pasar la noche.»'
