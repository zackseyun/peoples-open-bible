translation:
  language: es
  text: Hijo de hombre[a], he aquí, voy a quitarte el deleite de tus ojos con un golpe[b], y no harás duelo ni llorarás, ni correrán tus lágrimas[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el deseo de tus ojos'. La expresión se refiere a lo que más le era precioso a Ezequiel; en el contexto, es su esposa.
    reason: lexical_alternative
  - marker: b
    text: O 'con una plaga' o 'con un azote'. El término hebreo puede denotar un golpe que hiere o una aflicción tipo plaga.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, 'tu lágrima no vendrá'.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  english_pob_choice: Son of man
  chosen_spanish: Hijo de hombre
  alternatives_spanish:
  - Ser humano
  - Mortal
  lexicon: HALOT
  rationale: Mantiene el apelativo fijo dirigido a Ezequiel y preserva la idiomática semítica sin suavizarla. 'Hijo de hombre' es la forma española tradicional y transparente para este vocativo profético.
- source_word: הִנְנִי
  english_pob_choice: behold
  chosen_spanish: mira
  alternatives_spanish:
  - he aquí
  - mira bien
  - ya
  lexicon: HALOT
  rationale: Introduce la declaración con atención inmediata y un tono profético natural en español. 'He aquí' sería más tradicional, pero 'mira' comunica mejor la función discursiva sin perder solemnidad.
- source_word: לֹקֵחַ
  english_pob_choice: I am taking
  chosen_spanish: estoy tomando
  alternatives_spanish:
  - tomo
  - estoy por tomar
  lexicon: HALOT
  rationale: El participio con הִנְנִי indica acción inminente y vivida; 'estoy tomando' conserva esa inmediatez. 'Tomo' puede sonar demasiado gnómico, y 'estoy por tomar' añade más interpretación de la necesaria.
- source_word: מַחְמַד עֵינֶיךָ
  english_pob_choice: the delight of your eyes
  chosen_spanish: el deleite de tus ojos
  alternatives_spanish:
  - el deseo de tus ojos
  - lo precioso para tus ojos
  lexicon: HALOT
  rationale: La frase idiomática señala lo más querido o preciado. 'Deleite de tus ojos' conserva el giro hebreo y su carga afectiva; 'lo precioso para tus ojos' explica más, pero pierde la forma compacta del hebreo.
- source_word: בְּמַגֵּפָה
  english_pob_choice: with a blow
  chosen_spanish: con un golpe
  alternatives_spanish:
  - con una plaga
  - con una herida
  - con un azote
  lexicon: HALOT
  rationale: En este contexto personal y narrativo, 'golpe' transmite el acto súbito de herir o abatir sin forzar una lectura epidémica. 'Plaga' es posible, pero aquí sería más específica de lo que exige el verso.
- source_word: תִסְפֹּד
  english_pob_choice: mourn
  chosen_spanish: lamentarás
  alternatives_spanish:
  - harás duelo
  - harás lamentación
  - llorarás por ella
  lexicon: HALOT
  rationale: El verbo hebreo puede referirse al lamento funerario o a la expresión ritual del duelo. 'Lamentarás' conserva el acto verbal de duelo; 'harás duelo' es claro, pero menos cercano a la forma verbal del hebreo.
- source_word: תִבְכֶּה
  english_pob_choice: weep
  chosen_spanish: llorarás
  alternatives_spanish:
  - llorarás amargamente
  - sollozarás
  lexicon: HALOT
  rationale: Distingue el llanto de la acción más formal de lamentar. 'Llorarás' es la equivalencia directa y natural en español.
- source_word: דִּמְעָתֶךָ
  english_pob_choice: your tears shall not come
  chosen_spanish: tus lágrimas no vendrán
  alternatives_spanish:
  - no vendrá tu lágrima
  - no derramarás lágrimas
  lexicon: HALOT
  rationale: El hebreo dice literalmente que 'tu lágrima' no vendrá; el español plural 'tus lágrimas' suena natural y conserva la imagen. 'No derramarás lágrimas' sería más idiomático, pero menos transparente al giro original.
theological_decisions:
- issue: Si explicitar o no el referente de 'el deleite de tus ojos'
  english_pob_reading: Keep the idiom in the main text without naming the wife
  chosen_spanish_reading: Conservar el modismo en el texto principal sin nombrar a la esposa
  alternative_spanish_readings:
  - el deleite de tus ojos, tu esposa
  - tu esposa querida
  - la esposa que deleita tus ojos
  rationale: El contexto cercano identifica a la esposa, pero el versículo mismo usa un modismo. Mantenerlo evita añadir contenido que el hebreo no expresa en la línea y preserva la tensión literaria del pasaje.
  doctrine_reference: 'Principio de transparencia textual: no paraprasear más allá de lo que el texto fuente autoriza.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión final del POB en inglés que ajustó la cláusula final a una formulación más natural ('nor shall your tears come'). En español se optó por una construcción igualmente natural ('tus lágrimas no vendrán') sin perder la imagen hebrea de la lágrima que 'viene'.
  spanish_consistency_notes:
  - Se conserva el vocativo profético fijo 'Hijo de hombre' para mantener coherencia con Ezequiel.
  - Se prefirió 'Yahvé' solo cuando corresponda; este versículo no lo contiene.
  - '''Lamentarás'' y ''llorarás'' distinguen duelo formal y llanto emotivo, respetando la doble negación hebrea.'
  - La nota sobre 'deleite de tus ojos' mantiene la ambigüedad textual sin explicitar innecesariamente el referente en el cuerpo del verso.
