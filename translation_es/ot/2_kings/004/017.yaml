translation:
  language: es
  text: La mujer concibió y dio a luz un hijo en aquel tiempo señalado[a], por esta misma época el año siguiente, tal como Eliseo le había dicho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «en este tiempo señalado, en el tiempo de vida»; un modismo que significa aproximadamente la misma estación del año siguiente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּהַר
  english_pob_choice: conceived
  chosen_spanish: concibió
  alternatives_spanish:
  - quedó encinta
  - se embarazó
  lexicon: HALOT
  rationale: הרה en este contexto narrativo expresa quedar embarazada. «Concibió» es breve, natural y mantiene el tono de cumplimiento profético sin añadir una paráfrasis innecesaria.
- source_word: הָאִשָּׁה
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la esposa
  lexicon: HALOT
  rationale: Aunque אִשָּׁה puede significar «mujer» o «esposa», aquí el referente discursivo sigue siendo la mujer sunamita ya identificada; «la mujer» preserva mejor la referencia narrativa.
- source_word: וַתֵּלֶד בֵּן
  english_pob_choice: bore a son
  chosen_spanish: dio a luz un hijo
  alternatives_spanish:
  - parió un hijo
  - tuvo un hijo
  lexicon: HALOT
  rationale: ילד + בן es el giro normal para el nacimiento de un hijo. «Dio a luz un hijo» es idiomático en español, claro y fiel al evento de nacimiento.
- source_word: לַמּוֹעֵד הַזֶּה
  english_pob_choice: at that appointed time
  chosen_spanish: en aquel tiempo señalado
  alternatives_spanish:
  - en este tiempo señalado
  - en el tiempo fijado
  lexicon: HALOT
  rationale: מוֹעֵד expresa un tiempo fijado o señalado. «Tiempo señalado» conserva el matiz de designación. «Aquel» refleja la referencia retrospectiva a un momento prometido previamente, como en el inglés auditado.
- source_word: כָּעֵת חַיָּה
  english_pob_choice: about this time next year
  chosen_spanish: por este tiempo de vida
  alternatives_spanish:
  - por esta misma época del año
  - aproximadamente por este tiempo el año próximo
  lexicon: HALOT
  rationale: El hebreo contiene el modismo literal «tiempo de vida», que en este contexto apunta a la misma estación/época del año siguiente. Se conserva la tensión idiomática en español con una forma más literal, y el sentido se aclara en la nota.
- source_word: אֲשֶׁר דִּבֶּר אֵלֶיהָ
  english_pob_choice: just as Elisha had spoken to her
  chosen_spanish: tal como Eliseo le había dicho
  alternatives_spanish:
  - como Eliseo le había hablado
  - según lo que Eliseo le había dicho
  lexicon: HALOT
  rationale: La cláusula relativa marca cumplimiento de la palabra previa de Eliseo. «Tal como» expresa correspondencia; el pluscuamperfecto «había dicho» refleja anterioridad respecto del nacimiento. Se usa «le» para el dativo femenino del hebreo.
- source_word: אֱלִישָׁע
  english_pob_choice: Elisha
  chosen_spanish: Eliseo
  alternatives_spanish:
  - Elisha
  lexicon: Conventional transliteration
  rationale: Nombre propio estándar en español bíblico, ampliamente reconocible y fiel al referente hebreo.
theological_decisions:
- issue: Valor del modismo temporal כָּעֵת חַיָּה
  english_pob_reading: about this time next year
  chosen_spanish_reading: por este tiempo de vida
  alternative_spanish_readings:
  - por esta misma época del año
  - aproximadamente por este tiempo el año próximo
  rationale: El POB inglés prioriza el sentido idiomático y lo explica en nota. En español se conserva la literalidad del modismo para no borrar su forma hebrea, mientras la nota aclara que significa aproximadamente la misma estación del año siguiente.
  doctrine_reference: N/A (lexical/idiomatic fulfillment language)
- issue: Matiz de cumplimiento profético
  english_pob_reading: just as Elisha had spoken to her
  chosen_spanish_reading: tal como Eliseo le había dicho
  alternative_spanish_readings:
  - como Eliseo le había hablado
  - según lo que Eliseo le había dicho
  rationale: La frase marca que el nacimiento cumple exactamente la palabra profética previa. «Tal como» preserva la correspondencia; no se añade interpretación teológica más allá del cumplimiento narrativo evidente.
  doctrine_reference: N/A (narrative fulfillment)
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin depender mecánicamente de él: se preservó la referencia al modismo hebreo כָּעֵת חַיָּה en una nota, mientras que la línea principal mantiene español idiomático y publicación-readable. No hubo revisiones posteriores que alteraran la lectura base.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma por defecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - «Eliseo» se usa consistentemente para el profeta.
  - La nota a aclara el modismo temporal sin duplicar innecesariamente el sentido en el cuerpo del texto.
