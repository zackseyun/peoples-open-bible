base_translation:
  language: en
  yaml_path: translation/ot/numbers/028/009.yaml
  text: 'And on the Sabbath day: two male lambs a year old[a], without blemish, and two-tenths of an ephah of fine flour as a grain offering, mixed with oil[b], and its drink offering.'
