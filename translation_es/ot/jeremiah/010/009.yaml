  text: כֶּ֣סֶף מְרֻקָּ֞ע מִ/תַּרְשִׁ֣ישׁ יוּבָ֗א וְ/זָהָב֙ מֵֽ/אוּפָ֔ז מַעֲשֵׂ֥ה חָרָ֖שׁ וִ/ידֵ֣י צוֹרֵ֑ף תְּכֵ֤לֶת וְ/אַרְגָּמָן֙ לְבוּשָׁ֔/ם מַעֲשֵׂ֥ה חֲכָמִ֖ים כֻּלָּֽ/ם׃
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/010/009.yaml
  text: Beaten silver is brought from Tarshish[a], and gold from Uphaz, the work of a craftsman and of the hands of a goldsmith. Blue and purple are their clothing; all of them are the work of skilled men.
