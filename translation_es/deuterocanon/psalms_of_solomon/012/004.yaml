  to: Que Dios arroje las casas[a] de los inicuos al tumulto en la guerra por labios susurrantes[b]; que Dios aparte de los inocentes los labios de los inicuos en angustia[c], y sean esparcidos los huesos de los susurradores, de entre los que temen al Señor.
  rationale: Se corrigieron los anclajes de notas para que correspondan exactamente a las palabras explicadas por cada nota. También se suavizó la última cláusula con «sean esparcidos» y «de entre los que temen al Señor», que refleja mejor la separación implícita por ἀπό en español natural. Se mantuvieron las decisiones principales del borrador —«casas», «inicuos», «labios susurrantes», «inocentes»— porque son fieles al griego y al expediente inglés.
