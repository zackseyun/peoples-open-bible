  yaml_path: translation/nt/revelation/002/023.yaml
  text: 'And I will kill her children with death[a], and all the churches will know that I am the one who searches hearts and minds[b], and I will give to each of you according to your works.'
  footnotes:
  - marker: a
    text: Or 'with pestilence'; the Greek literally says 'with death,' an idiom that may intensify the judgment or echo Old Testament judgment language.
    reason: lexical_alternative
  - marker: b
    text: Literally 'kidneys and hearts,' a biblical idiom for the inner person, including motives, thoughts, and desires.
    reason: cultural_note
