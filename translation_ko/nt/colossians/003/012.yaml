source:
  edition: SBLGNT
  text: Ἐνδύσασθε οὖν ὡς ἐκλεκτοὶ τοῦ θεοῦ, ἅγιοι καὶ ἠγαπημένοι, σπλάγχνα οἰκτιρμοῦ, χρηστότητα, ταπεινοφροσύνην, πραΰτητα, μακροθυμίαν,
base_translation:
  language: en
  yaml_path: translation/nt/colossians/003/012.yaml
  text: Put on, then, as God’s chosen ones, holy and beloved, compassion, kindness, humility, gentleness, and patience,
translation:
  language: ko
  text: 그러므로 하나님께서 택하신 자들, 곧 거룩하고 사랑받는 자들로서, 긍휼의 마음[a]과 친절과 겸손과 온유와 오래 참음을 입으십시오.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 직역하면 「긍휼의 내장」(σπλάγχνα οἰκτιρμοῦ). 깊은 측은히 여김을 가리키는 셈어적 신체 비유.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐνδύσασθε οὖν
  english_pob_choice: Put on, then
  chosen_korean: 그러므로 ... 입으십시오
  alternatives_korean:
  - 그러므로 옷 입듯이 입으십시오
  lexicon: BDAG
  rationale: ἐνδύω의 의복 비유와 명령 형식 보존.
- source_word: ὡς ἐκλεκτοὶ τοῦ θεοῦ
  english_pob_choice: as God's chosen ones
  chosen_korean: 하나님께서 택하신 자들로서
  alternatives_korean:
  - 하나님의 택함받은 자들로서
  - 하나님의 선택받은 자들로서
  lexicon: BDAG
  rationale: ἐκλεκτοί를 「택하신 자들」로 옮긴다. 「택자」는 함축이 강해 피한다.
- source_word: ἅγιοι καὶ ἠγαπημένοι
  english_pob_choice: holy and beloved
  chosen_korean: 곧 거룩하고 사랑받는 자들
  alternatives_korean:
  - 거룩하고 사랑받는
  - 성도이며 사랑받는
  lexicon: BDAG
  rationale: 「곧」으로 동격을 명시. ἠγαπημένοι 완료 수동을 「사랑받는」으로 옮긴다.
- source_word: σπλάγχνα οἰκτιρμοῦ
  english_pob_choice: compassion
  chosen_korean: 긍휼의 마음
  alternatives_korean:
  - 자비의 심정
  - 측은한 마음
  lexicon: BDAG
  rationale: 「긍휼의 마음」은 한국 교회의 정립된 표현. σπλάγχνα의 신체 비유는 각주로 보존.
- source_word: χρηστότητα
  english_pob_choice: kindness
  chosen_korean: 친절
  alternatives_korean:
  - 인자
  - 선함
  lexicon: BDAG
  rationale: 표준 등가어.
- source_word: ταπεινοφροσύνην
  english_pob_choice: humility
  chosen_korean: 겸손
  alternatives_korean: []
  lexicon: BDAG
  rationale: 표준 등가어.
- source_word: πραΰτητα
  english_pob_choice: gentleness
  chosen_korean: 온유
  alternatives_korean:
  - 부드러움
  lexicon: BDAG
  rationale: 「온유」는 한국 교회의 정립된 표현으로 πραΰτης의 통제된 강함을 잘 담는다.
- source_word: μακροθυμίαν
  english_pob_choice: patience
  chosen_korean: 오래 참음
  alternatives_korean:
  - 인내
  - 관용
  lexicon: BDAG
  rationale: 1:11과 어휘적 일관성. 사람에 대한 「오래 참음」.
