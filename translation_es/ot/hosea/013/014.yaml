translation:
  language: es
  text: De la mano de Sheol[a] los rescataré; de la muerte los redimiré. ¿Dónde están tus plagas, oh Muerte? ¿Dónde está tu destrucción, oh Sheol[c][b]? La compasión se ocultará de mis ojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «¿Acaso los rescataré de la mano de Sheol? ¿Acaso los redimiré de la muerte?», tomando las líneas iniciales como preguntas retóricas de juicio y no como promesas de liberación.'
    reason: alternative_reading
  - marker: b
    text: 'El hebreo אֱהִי también puede entenderse como «seré» o «que sea»: «Seré tus plagas, oh Muerte; seré tu destrucción, oh Sheol».'
    reason: alternative_reading
  - marker: c
    text: 'Traducción tradicional influida por la tradición griega: «¿Dónde está tu aguijón, oh Muerte? ¿Dónde está tu victoria/aguijón, oh Sheol?»; compárese 1 Corintios 15:55.'
    reason: cross_reference
lexical_decisions:
- source_word: מִיַּד
  english_pob_choice: from the hand of
  chosen_spanish: de la mano de
  alternatives_spanish:
  - del poder de
  - de la mano
  lexicon: HALOT
  rationale: La imagen concreta de “mano” conserva el hebreo literal y, en español, comunica bien la idea de dominio o alcance sin perder la metáfora original.
- source_word: שְׁאוֹל
  english_pob_choice: Sheol
  chosen_spanish: Sheol
  alternatives_spanish:
  - el sepulcro
  - el reino de los muertos
  lexicon: HALOT
  rationale: Se mantiene la transliteración para no reducir el concepto hebreo a “sepulcro” ni diluir su ámbito como reino de los muertos. Así se preserva el mundo conceptual del texto fuente.
- source_word: אֶפְדֵּם
  english_pob_choice: I will ransom them
  chosen_spanish: los rescataré
  alternatives_spanish:
  - los redimiré
  - los compraré de nuevo
  lexicon: HALOT
  rationale: ‘Rescatar’ transmite la idea de sacar a alguien de peligro o cautiverio y distingue bien esta acción de גאל en la cláusula siguiente. ‘Redimiré’ se reserva allí para preservar la distinción léxica.
- source_word: מִמָּוֶת
  english_pob_choice: from death
  chosen_spanish: de la muerte
  alternatives_spanish:
  - desde la muerte
  - fuera de la muerte
  lexicon: HALOT
  rationale: Es una equivalencia natural en español y mantiene el paralelismo con ‘de la mano de Sheol’.
- source_word: אֶגְאָלֵם
  english_pob_choice: I will redeem them
  chosen_spanish: los redimiré
  alternatives_spanish:
  - los reclamaré
  - actuaré como su redentor
  lexicon: HALOT
  rationale: ‘Redimir’ es el equivalente más directo y conserva la fuerza de גאל, distinta de פדה. Mantiene también el matiz de liberación con resonancias de rescate redentor.
- source_word: אֱהִי
  english_pob_choice: where are
  chosen_spanish: ¿Dónde están?
  alternatives_spanish:
  - seré
  - que sea
  lexicon: HALOT
  rationale: El contexto poético de desafío a Muerte y Sheol favorece el valor interrogativo. Se preserva, sin embargo, la ambigüedad del hebreo en una nota, porque la forma consonántica admite también un matiz volitivo o futuro.
- source_word: דְבָרֶיךָ
  english_pob_choice: your plagues
  chosen_spanish: tus plagas
  alternatives_spanish:
  - tus palabras
  - tus pestilencias
  - tus aguijones
  lexicon: HALOT
  rationale: ‘Plagas’ refleja bien el valor contextual frente a la personificación de la Muerte. ‘Aguijones’ queda registrado como alternativa tradicional, pero no como la primera opción literal del hebreo.
- source_word: קָטָבְךָ
  english_pob_choice: your destruction
  chosen_spanish: tu destrucción
  alternatives_spanish:
  - tu aguijón
  - tu devastación
  lexicon: HALOT
  rationale: ‘Destrucción’ es una rendición clara y directa de קטב y mantiene el paralelismo con ‘plagas’.
- source_word: נֹחַם
  english_pob_choice: Compassion
  chosen_spanish: la compasión
  alternatives_spanish:
  - el arrepentimiento
  - el reliento
  - la piedad
  lexicon: HALOT
  rationale: El sustantivo puede abarcar compasión, relento o arrepentimiento, pero aquí la idea es que no habrá intervención compasiva que frene el juicio. ‘Compasión’ comunica ese valor con claridad en español.
- source_word: יִסָּתֵר מֵעֵינָי
  english_pob_choice: will be hidden from my eyes
  chosen_spanish: se ocultará de mis ojos
  alternatives_spanish:
  - será escondida de mis ojos
  - quedará oculta a mis ojos
  lexicon: HALOT
  rationale: La pasiva/reflexiva española expresa bien el Niphal futuro. ‘Mis ojos’ conserva la perspectiva divina y el carácter figurado del hebreo.
theological_decisions:
- issue: Si las primeras cláusulas son promesas de liberación o preguntas retóricas de juicio
  english_pob_reading: Promesas de deliverance followed by a taunt over Death and Sheol
  chosen_spanish_reading: Promesa de rescate y redención seguida de un desafío/taunt a la Muerte y a Sheol
  alternative_spanish_readings:
  - ¿Acaso los rescataré...? ¿Acaso los redimiré...? como preguntas de juicio que implican negativa
  - lectura exclusivamente escatológica o victoriosa sin ambigüedad
  rationale: El hebreo permite ambas direcciones; la versión principal conserva la lectura afirmativa del POB en inglés y, al mismo tiempo, la formulación interrogativa de la segunda mitad mantiene el tono de desafío. La ambigüedad inicial queda documentada en nota para no borrar la tensión textual.
  doctrine_reference: Mantener la tensión interpretativa del hebreo y su recepción canónica, sin resolverla artificialmente.
- issue: Cómo reflejar la tradición de 1 Corintios 15:55 sin imponerla sobre el hebreo
  english_pob_reading: 'Traditional rendering influenced by the Greek tradition: ''Where, O Death, is your sting? Where, O Sheol, is your victory/sting?'''
  chosen_spanish_reading: Conservar la traducción tradicional solo como alternativa documentada, no como texto principal
  alternative_spanish_readings:
  - ¿Dónde está tu aguijón, oh Muerte? ¿Dónde está tu aguijón, oh Sheol?
  - ¿Dónde está tu victoria, oh Sheol?
  rationale: La tradición griega y paulina es importante, pero el hebreo de base habla más directamente de ‘plagas’ y ‘destrucción’. Por eso la lectura principal no sustituye el léxico hebreo por una formulación tradicional sin base suficiente, aunque la nota conserva la conexión intertextual.
  doctrine_reference: Relación entre el texto hebreo de Oseas y la cita/relectura de 1 Corintios 15:55.
translation_notes:
  revision_awareness: La redacción sigue de cerca el estado revisado más reciente del POB inglés, que no requirió cambios adicionales y mantiene el acuerdo alto del control cruzado. Se conserva la tensión entre la lectura afirmativa de rescate/redención y la posibilidad de preguntas retóricas de juicio, tal como documenta el aparato inglés.
  spanish_consistency_notes:
  - Se mantuvo ‘Sheol’ transliterado de forma consistente para preservar el término técnico hebreo.
  - Se distinguió ‘rescatar’ de ‘redimir’ para reflejar la diferencia léxica entre פדה y גאל.
  - Se usó ‘Muerte’ y ‘Sheol’ con mayúscula como personificaciones poéticas en la segunda mitad del verso.
  - Las alternativas tradicionales con ‘aguijón’ se reservaron para la nota, evitando desplazar el sentido hebreo principal.
  - La puntuación española reproduce el paralelismo y el tono de desafío del texto poético.
