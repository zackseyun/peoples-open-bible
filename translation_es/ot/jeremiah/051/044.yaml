    text: Or 'nations will no longer flow to him.' The Hebrew verb pictures peoples moving like a stream.
    reason: lexical_alternative
  - marker: b
    text: Or 'the wall of Babylon will fall.' Hebrew may use the perfect here prophetically, describing a future event as certain.
    reason: alternative_reading
