translation:
  language: es
  text: Entonces Saúl arrojó la lanza[a] contra él para herirlo, y Jonatán supo que su padre había resuelto[b] matar a David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la jabalina». El hebreo designa una lanza arrojadiza o arma semejante; el contexto de Saúl favorece un arma de lanzamiento.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «había decidido» / «estaba resuelto». El hebreo usa un modismo que expresa una decisión fija y ya cerrada por parte de Saúl.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּטֶל
  english_pob_choice: hurled
  chosen_spanish: arrojó
  alternatives_spanish:
  - lanzó
  - tiró
  - arrojó violentamente
  lexicon: HALOT
  rationale: El verbo expresa un lanzamiento violento; «arrojó» comunica bien la fuerza hostil sin sonar artificioso en español. «Lanzó» es posible, pero algo más neutral.
- source_word: הַחֲנִית
  english_pob_choice: the spear
  chosen_spanish: la lanza
  alternatives_spanish:
  - la jabalina
  - el venablo
  - la espada
  lexicon: HALOT
  rationale: La imagen del relato de Saúl funciona naturalmente en español con «lanza». «Jabalina» es posible, pero puede sonar más técnica o demasiado específica para el lector general.
- source_word: עָלָיו
  english_pob_choice: at him
  chosen_spanish: contra él
  alternatives_spanish:
  - hacia él
  - sobre él
  - a él
  lexicon: HALOT
  rationale: Con un verbo de arrojar, «contra él» expresa mejor la hostilidad implícita del hebreo y del contexto narrativo.
- source_word: לְהַכֹּתוֹ
  english_pob_choice: to strike him
  chosen_spanish: para herirlo
  alternatives_spanish:
  - para golpearlo
  - para pegarle
  - para darle muerte
  lexicon: HALOT
  rationale: El infinitivo indica propósito. «Herirlo» conserva la intención violenta sin necesidad de un calco rígido; «golpearlo» es más débil en registro, y «darle muerte» adelanta demasiado el resultado.
- source_word: וַיֵּדַע
  english_pob_choice: knew
  chosen_spanish: supo
  alternatives_spanish:
  - conoció
  - entendió
  - se dio cuenta
  lexicon: HALOT
  rationale: En español, «supo» suena natural para el descubrimiento de Jonatán. Mantiene el valor cognitivo simple del verbo.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Aquí introduce el contenido de lo sabido, no una causa independiente; por eso «que» es la mejor equivalencia.
- source_word: כָלָה הִיא מֵעִם אָבִיו
  english_pob_choice: his father was determined
  chosen_spanish: su padre había resuelto
  alternatives_spanish:
  - su padre estaba decidido
  - su padre había tomado la decisión
  - su padre ya lo tenía decidido
  lexicon: HALOT
  rationale: La idiomática hebrea expresa una decisión firme y concluida del lado de Saúl. «Había resuelto» conserva el matiz de decisión terminada y deliberada mejor que una formulación más suelta.
- source_word: לְהָמִית אֶת דָּוִד
  english_pob_choice: to put David to death
  chosen_spanish: matar a David
  alternatives_spanish:
  - dar muerte a David
  - quitarle la vida a David
  - hacer morir a David
  lexicon: HALOT
  rationale: En español, «matar a David» comunica directamente la intención homicida sin perder precisión. «Dar muerte» es más formal, pero menos natural aquí.
translation_notes:
  revision_awareness: 'Se mantuvo alta concordancia con el audit trail en inglés: verbo violento de lanzamiento, arma como «spear/lanza», y el modismo hebreo final como decisión firme y concluida de Saúl. No se introdujeron cambios textuales respecto del sentido base del original.'
  spanish_consistency_notes:
  - Se prefirió «lanza» como término amplio y natural; la nota preserva la alternativa «jabalina» por la posible especificidad del arma en el relato de Saúl.
  - Se evitó la calca «para herirlo» como simple copia mecánica del inglés; «herirlo» mantiene el propósito violento sin sobrerregularizar el español.
  - «Había resuelto» conserva la tensión del hebreo entre decisión y estado concluido, sin rebajarla a un simple «quería» o «estaba pensando en».
