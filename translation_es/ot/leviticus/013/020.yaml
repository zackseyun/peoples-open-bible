translation:
  language: es
  text: Y el sacerdote lo examinará, y he aquí que su apariencia está más hundida que la piel, y su pelo se ha vuelto blanco; entonces el sacerdote lo declarará impuro. Es un brote de lepra[a]; ha brotado en el forúnculo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo צָרַעַת, tradicionalmente «lepra»; en Levítico este término probablemente abarca más que la lepra moderna (enfermedad de Hansen) y se refiere a un conjunto más amplio de afecciones cutáneas graves.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָאָה
  english_pob_choice: shall examine
  chosen_spanish: lo examinará
  alternatives_spanish:
  - lo verá
  - lo inspeccionará
  lexicon: HALOT
  rationale: En contexto sacerdotal y diagnóstico ritual, ראה no es solo ver, sino revisar con atención. «Examinará» conserva la función evaluativa del sacerdote.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí que
  alternatives_spanish:
  - y he aquí
  - y mira
  lexicon: HALOT
  rationale: La expresión introduce la observación de una señal llamativa. «Y he aquí que» preserva ese valor discursivo con un tono digno y natural en español.
- source_word: מַרְאֶהָ שָׁפָל מִן הָעוֹר
  english_pob_choice: its appearance is deeper than the skin
  chosen_spanish: su apariencia está más hundida que la piel
  alternatives_spanish:
  - su apariencia está más baja que la piel
  - parece hundida debajo de la piel
  lexicon: HALOT
  rationale: El hebreo describe una lesión deprimida respecto de la piel circundante. «Más hundida» conserva la imagen espacial sin introducir una explicación médica ajena al texto.
- source_word: וּשְׂעָרָהּ הָפַךְ לָבָן
  english_pob_choice: its hair has turned white
  chosen_spanish: su cabello se ha vuelto blanco
  alternatives_spanish:
  - el cabello allí se ha vuelto blanco
  - sus pelos se han vuelto blancos
  lexicon: HALOT
  rationale: La referencia es al pelo asociado con la lesión; en español, «cabello» suena más natural y reverente que una traducción demasiado técnica, sin perder el sentido de cambio de color.
- source_word: וְטִמְּאוֹ
  english_pob_choice: shall pronounce him unclean
  chosen_spanish: lo declarará impuro
  alternatives_spanish:
  - lo pronunciará impuro
  - lo declarará inmundo
  lexicon: HALOT
  rationale: El sacerdote no causa la impureza; emite una declaración ritual/autoritativa. «Declarará impuro» expresa mejor esa función que «hará impuro».
- source_word: נֶגַע צָרַעַת
  english_pob_choice: an outbreak of leprosy
  chosen_spanish: una llaga de lepra
  alternatives_spanish:
  - un brote de lepra
  - una lesión de lepra
  lexicon: HALOT
  rationale: POB revisó hacia «leprosy» en inglés para reflejar más directamente צָרַעַת. En español, «lepra» mantiene esa correspondencia tradicional y auditada; «llaga» ayuda a naturalizar נגע como lesión/llaga visible sin convertir el pasaje en una categoría médica moderna.
- source_word: בַּשְּׁחִין
  english_pob_choice: in the boil
  chosen_spanish: en el divieso
  alternatives_spanish:
  - en el hervor
  - en la hinchazón
  lexicon: HALOT
  rationale: שְׁחִין designa un forúnculo, llaga inflamada o divieso. «Divieso» es un equivalente español preciso y suficientemente claro en registro bíblico.
- source_word: פָּרָחָה
  english_pob_choice: it has broken out
  chosen_spanish: ha brotado
  alternatives_spanish:
  - se ha extendido
  - ha eruptado
  lexicon: HALOT
  rationale: El verbo comunica la aparición súbita de la lesión en el divieso. «Ha brotado» reproduce bien la imagen de surgimiento sin exagerar el alcance de la expansión.
theological_decisions:
- issue: Traducción de צָרַעַת en la legislación de pureza
  english_pob_reading: leprosy
  chosen_spanish_reading: lepra
  alternative_spanish_readings:
  - enfermedad de la piel
  - afectación cutánea
  rationale: El inglés POB decidió volver a «leprosy» tras revisión, manteniendo el término tradicional pero con nota aclaratoria sobre su alcance. En español, «lepra» conserva la correspondencia textual directa; la nota evita que el lector la identifique sin más con la lepra moderna.
  doctrine_reference: Principio de primacía del texto original con claridad pastoral; distinción entre categoría ritual bíblica y diagnóstico médico moderno.
- issue: Función jurídica-ritual del sacerdote
  english_pob_reading: shall pronounce him unclean
  chosen_spanish_reading: lo declarará impuro
  alternative_spanish_readings:
  - lo pronunciará impuro
  - lo hará impuro
  rationale: La declaración sacerdotal en Levítico es una evaluación ritual autorizada, no una acción causal. «Declarará impuro» preserva esa tensión y evita una lectura causativa indebida.
  doctrine_reference: Lectura ceremonial de la impureza en Levítico; precisión exegética frente a simplificación causal.
translation_notes:
  revision_awareness: La base inglesa fue revisada desde «a skin disease» a «leprosy» para reflejar con más directa consistencia צָרַעַת; la versión española sigue esa revisión y mantiene la aclaración necesaria en nota para evitar anacronismo médico.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como terminología por defecto solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se prefirió «declarará impuro» para reflejar la función diagnóstica sacerdotal sin causalidad.
  - «Divieso» se usa para שְׁחִין por su claridad y adecuación al registro bíblico; no se sustituyó por un término más clínico que distorsione el contexto.
  - Se conservó la tensión léxica de צָרַעַת mediante «lepra» en el texto principal y una nota aclaratoria sobre su alcance semántico.
