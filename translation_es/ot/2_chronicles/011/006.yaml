    issue: Marcador de nota al pie colocado en «Belén» en vez de «Tecoa».
    rationale: La alternativa lexical documentada es para תְּקוֹעַ («Tekoa / Tekoah»), no para בֵּית לֶחֶם. El anclaje actual induce a pensar erróneamente que la nota trata sobre «Belén».
  - severity: low
    issue: Redacción de la nota al pie demasiado metalingüística.
    rationale: «También puede escribirse… en transliteración más directa» es entendible, pero más explicativo de lo necesario. Una nota breve con la variante basta y se ajusta mejor al patrón del expediente inglés.
