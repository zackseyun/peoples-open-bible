translation:
  language: es
  text: 'Entonces Ocozías cayó a través de la celosía de su sala alta, que estaba en Samaria, y resultó herido. Entonces envió mensajeros y les dijo: «Vayan, consulten a Baal-zebub[a], el dios de Ecrón, para ver si me recuperaré de esta enfermedad».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Baal-zebub» es la forma hebrea del nombre; «Beelzebub» aparece después en griego y en parte de la tradición inglesa.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּפֹּל
  english_pob_choice: fell
  chosen_spanish: cayó
  alternatives_spanish:
  - cayó de
  - se precipitó
  lexicon: HALOT
  rationale: El verbo narrativo simple pide un equivalente directo. «Cayó» mantiene la acción básica sin añadir matices no sustentados por el texto.
- source_word: בְּעַד הַשְּׂבָכָה
  english_pob_choice: through the lattice
  chosen_spanish: a través de la celosía
  alternatives_spanish:
  - por la celosía
  - a través de la reja
  lexicon: HALOT
  rationale: «Celosía» comunica bien la abertura enrejada y conserva la imagen concreta. «A través de» refleja el valor de בְּעַד como paso por medio de la abertura.
- source_word: עֲלִיָּתוֹ
  english_pob_choice: his upper room
  chosen_spanish: su sala alta
  alternatives_spanish:
  - su aposento alto
  - su cuarto alto
  lexicon: HALOT
  rationale: «Sala alta» es una solución natural en español para עֲלִיָּה y mantiene la idea de una estancia elevada. «Aposento alto» sería más tradicional, pero menos transparente en español moderno.
- source_word: וַיָּחַל
  english_pob_choice: was injured
  chosen_spanish: resultó herido
  alternatives_spanish:
  - quedó herido
  - cayó enfermo
  - se enfermó
  lexicon: HALOT
  rationale: El contexto inmediato es la caída; por eso en español conviene expresar lesión física. «Resultó herido» preserva la conexión causal sin forzar un sentido puramente médico.
- source_word: מַלְאָכִים
  english_pob_choice: messengers
  chosen_spanish: mensajeros
  alternatives_spanish:
  - enviados
  - embajadores
  lexicon: HALOT
  rationale: En el contexto narrativo se trata de agentes humanos enviados por el rey, por lo que «mensajeros» es exacto y natural. No se usa «ángeles», porque el contexto no lo permite.
- source_word: דִרְשׁוּ
  english_pob_choice: inquire of
  chosen_spanish: consulten
  alternatives_spanish:
  - pregunten a
  - inquieran de
  lexicon: HALOT
  rationale: En contexto cultual, דרשׁ implica acudir a un oráculo o deidad. «Consulten» expresa bien esa consulta religiosa en español, con menos aspereza que «inquiran de».
- source_word: בַּעַל זְבוּב
  english_pob_choice: Baal-zebub
  chosen_spanish: Baal-zebub
  alternatives_spanish:
  - Baal Zebub
  - Beelzebub
  lexicon: HALOT
  rationale: Se conserva la forma hebrea transliterada como nombre propio, siguiendo la primacía del texto original. «Beelzebub» queda como forma tradicional posterior, pero no reemplaza al nombre hebreo en el texto principal.
- source_word: אֱלֹהֵי עֶקְרוֹן
  english_pob_choice: the god of Ekron
  chosen_spanish: el dios de Ecrón
  alternatives_spanish:
  - el dios de Ekron
  - la deidad de Ecrón
  lexicon: HALOT
  rationale: «Dios» reproduce el sustantivo genérico del constructo y «Ecrón» es la forma castellana común del topónimo. Se evita suavizar la referencia a una deidad pagana.
- source_word: אִם אֶחְיֶה מֵחֳלִי זֶה
  english_pob_choice: whether I will recover from this sickness
  chosen_spanish: para ver si me recuperaré de esta enfermedad
  alternatives_spanish:
  - para saber si viviré de esta enfermedad
  - para ver si sanaré de esta enfermedad
  lexicon: HALOT
  rationale: El hebreo literalmente habla de vivir/sobrevivir a la enfermedad, pero el sentido idiomático en español es recuperación. «Para ver si me recuperaré» conserva la incertidumbre y el matiz de salida de la enfermedad sin exagerar.
- source_word: שֹׁמְרוֹן
  english_pob_choice: Samaria
  chosen_spanish: Samaria
  lexicon: HALOT
  rationale: Nombre geográfico estándar en español, sin necesidad de adaptación adicional.
theological_decisions:
- issue: Nombre del dios pagano y tradición posterior
  english_pob_reading: Baal-zebub in the main text, with Beelzebub in a note as a later form
  chosen_spanish_reading: Baal-zebub en el texto principal; «Beelzebub» como forma tradicional posterior en nota
  alternative_spanish_readings:
  - Beelzebub en el texto principal
  - Baal Zebub sin guion
  rationale: El hebreo lee בַּעַל זְבוּב. Para respetar la prioridad del original, el texto principal mantiene esa transliteración. La forma posterior y más conocida en la tradición grecorromana se preserva como posibilidad secundaria, no como sustituto.
  doctrine_reference: 'Translation philosophy: primacía del texto original y respeto por las formas históricas documentadas'
translation_notes:
  revision_awareness: 'El texto sigue de cerca la decisión inglesa aprobada: lectura principal con «fell through the lattice / upper room / was injured / inquire of / Baal-zebub». No se aplicaron revisiones posteriores en el paquete fuente, y la versión española conserva esa línea interpretativa sin introducir cambios no respaldados.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «Ecrón» en conformidad con la forma española del topónimo en lugar de un calco inglés.
  - Se evita «ángeles» para מַלְאָכִים porque el contexto exige mensajeros humanos.
  - La voz de consulta cultual se expresa con «consulten», no con un término eclesiástico más cargado.
  - «Sala alta» busca naturalidad en español sin perder la referencia a una estancia elevada.
