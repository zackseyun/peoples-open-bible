review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego: καὶ εὐόδα ἐγίνετο se refleja adecuadamente con ''prosperaban'', τὰ ἱερὰ ἔργα con una expresión equivalente, y el genitivo absoluto προφητευόντων ... τῶν προφητῶν se conserva correctamente con una cláusula temporal simultánea. Los nombres Hageo y Zacarías están bien. La nota también mantiene la alternativa léxica inglesa.'
  spanish_quality_summary: La frase es clara y natural, pero 'obras santas' suena algo forzada en español eclesial general; 'obras sagradas' es más idiomático y ya está reconocido como alternativa válida en la auditoría inglesa. Además, la puntuación con comas alrededor de 'los profetas' es aceptable, pero sin la segunda coma la apposición fluye mejor en este contexto. El resto es plenamente legible.
  glossary_alignment: No hay términos del glosario mayor en juego salvo nombres propios. La decisión de no explicitar 'templo' en el texto principal está bien alineada con la filosofía del proyecto. Se preserva correctamente 'profetas'.
  issues:
  - severity: medium
    issue: '''las obras santas'' suena poco natural en español'
    rationale: Aunque es formalmente cercano a 'holy works', en español bíblico y general 'obras sagradas' transmite mejor ἱερὰ ἔργα sin perder fidelidad. 'Santas' aplicado a 'obras' resulta más marcado y menos idiomático.
  - severity: low
    issue: Puntuación de la apposición
    rationale: '''Hageo y Zacarías los profetas'' o ''Hageo y Zacarías, los profetas'' son opciones válidas; la doble coma del borrador no es incorrecta, pero una sola coma antes de la apposición suena más fluida en una oración breve.'
  revised_spanish_text: Y las obras sagradas prosperaban[a], mientras Hageo y Zacarías, los profetas, profetizaban.
  revised_footnotes:
  - marker: a
    text: O 'las obras santas', es decir, la obra del templo.
    reason: lexical_alternative
