translation:
  language: es
  text: Y Moab será destruido como nación[a], porque se engrandeció contra Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porque se hizo grande contra Yahvé», es decir, se exaltó con arrogancia contra él.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנִשְׁמַד
  english_pob_choice: will be destroyed
  chosen_spanish: será destruido
  alternatives_spanish:
  - será aniquilado
  - perecerá
  - será arrasado
  lexicon: HALOT
  rationale: El nifal de שׁמד en lenguaje profético expresa destrucción futura o resultativa. «Será destruido» mantiene la pasiva y suena natural en español, sin intensificar indebidamente hasta una aniquilación absoluta.
- source_word: מוֹאָב
  english_pob_choice: Moab
  chosen_spanish: Moab
  alternatives_spanish:
  - Moabita
  lexicon: Nombre propio bíblico
  rationale: Se conserva la transliteración estándar del nombre de la nación.
- source_word: מֵעָם
  english_pob_choice: as a people
  chosen_spanish: como pueblo
  alternatives_spanish:
  - deja de ser pueblo
  - de entre los pueblos
  - como una nación
  lexicon: HALOT
  rationale: La preposición con עַם expresa que Moab queda removido de su condición de pueblo. «Como pueblo» comunica en español que deja de existir como entidad nacional distinta.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  lexicon: HALOT
  rationale: Introduce la causa del juicio; «porque» es la opción clara y directa en español actual.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: Tetragrámaton
  rationale: 'Se sigue el criterio del proyecto para יְהוָה: usar «Yahvé» en el texto principal, preservando el nombre divino en lugar de sustituirlo por un título.'
- source_word: הִגְדִּיל
  english_pob_choice: magnified himself
  chosen_spanish: se engrandeció
  alternatives_spanish:
  - se hizo grande
  - se jactó
  - actuó con arrogancia
  lexicon: HALOT
  rationale: El hifil de גדל aquí expresa autoexaltación arrogante. «Se engrandeció» conserva el giro hebreo y en español transmite la idea de exaltarse contra Yahvé sin añadir interpretación excesiva.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El versículo usa el Tetragrámaton directamente. Conforme al criterio del proyecto, se mantiene el nombre personal de Dios en español como «Yahvé», en vez de reemplazarlo por «el SEÑOR» o un equivalente funcional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Matiz de הִגְדִּיל עַל־יְהוָה
  english_pob_reading: he magnified himself against Yahweh
  chosen_spanish_reading: se engrandeció contra Yahvé
  alternative_spanish_readings:
  - se exaltó contra Yahvé
  - se hizo grande contra Yahvé
  - se volvió arrogante contra Yahvé
  rationale: La construcción hebrea puede implicar autoexaltación arrogante. «Se engrandeció contra Yahvé» conserva la metáfora verbal del original y deja visible la tensión entre grandeza y arrogancia sin resolverla mediante una paráfrasis más interpretativa.
  doctrine_reference: HALOT; contexto profético de juicio contra Moab
translation_notes:
  revision_awareness: El texto sigue de cerca la lectura final del audit trail en inglés, sin introducir cambios doctrinales ni suavizar el lenguaje de juicio. La única nota conserva la alternativa lexical documentada para הִגְדִּיל, respetando la tensión entre «engrandecerse» y la connotación de arrogancia.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para el Tetragrámaton.
  - «Como pueblo» busca reproducir el valor de מֵעָם sin convertirlo en una paráfrasis nacionalista más amplia.
  - Se mantiene el verbo en futuro («será destruido») para reflejar el sentido profético del hebreo.
  - No se sustituye la autoexaltación por un término más fuerte en el texto principal; esa intensificación queda sólo en la nota.
  - El inicio con «Y» reproduce la coordinación narrativa del hebreo y del inglés auditado.
