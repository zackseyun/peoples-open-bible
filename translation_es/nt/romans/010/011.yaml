translation:
  language: es
  text: 'Porque la Escritura dice[a]: «Todo el que cree en él no será avergonzado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Quien cree en él no se avergonzará».'
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - está diciendo
  - habla
  lexicon: BDAG
  rationale: En fórmulas de cita bíblica, el presente de λέγει funciona de manera natural y viva; en español, «dice» conserva ese valor sin sonar forzado.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: γάρ introduce fundamento o explicación del argumento anterior. «Porque» mantiene bien esa relación causal-explicativa en español bíblico contemporáneo.
- source_word: ἡ γραφή
  english_pob_choice: the Scripture
  chosen_spanish: la Escritura
  alternatives_spanish:
  - la Escritura santa
  - las Escrituras
  lexicon: BDAG
  rationale: En este contexto paulino, γραφή se refiere a la Escritura como autoridad escrita; «la Escritura» es la forma más directa y reconocible en español.
- source_word: Πᾶς ὁ πιστεύων
  english_pob_choice: Everyone who believes
  chosen_spanish: Todo el que cree
  alternatives_spanish:
  - Quien cree
  - Todos los que creen
  lexicon: BDAG
  rationale: La construcción sustantivada tiene alcance general. «Todo el que cree» expresa el valor universal sin introducir género masculino específico ni un participio extraño al español.
- source_word: πιστεύων
  english_pob_choice: believes
  chosen_spanish: cree
  alternatives_spanish:
  - tiene fe
  - confía
  lexicon: BDAG
  rationale: Aquí πιστεύω se expresa naturalmente como «cree» en español. En una cita directa, esta forma es clara y fiel al verbo griego.
- source_word: ἐπ’ αὐτῷ
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - sobre él
  - en él mismo
  lexicon: BDAG
  rationale: Con πιστεύω, ἐπί + dativo comunica la dirección de la confianza. En español, «creer en él» es la equivalencia idiomática más natural y precisa.
- source_word: καταισχυνθήσεται
  english_pob_choice: will not be put to shame
  chosen_spanish: no será avergonzado
  alternatives_spanish:
  - no será puesto en vergüenza
  - no quedará avergonzado
  lexicon: BDAG
  rationale: El futuro pasivo apunta a quedar expuesto a vergüenza o deshonra. «No será avergonzado» conserva el valor pasivo de manera idiomática en español; la alternativa «no será puesto en vergüenza» suena más pesada.
theological_decisions:
- issue: Valor del pasivo en καταισχυνθήσεται
  english_pob_reading: will not be put to shame
  chosen_spanish_reading: no será avergonzado
  alternative_spanish_readings:
  - no será puesto en vergüenza
  - no quedará avergonzado
  rationale: La cita profética subraya la vindicación del que cree. En español, «no será avergonzado» conserva la idea de no sufrir deshonra y evita perder naturalidad; sigue siendo compatible con el matiz pasivo señalado por el inglés POB.
  doctrine_reference: DOCTRINE.md § Translation philosophy, points 1 and 3
- issue: Alcance genérico de Πᾶς ὁ πιστεύων
  english_pob_reading: Everyone who believes
  chosen_spanish_reading: Todo el que cree
  alternative_spanish_readings:
  - Quien cree
  - Cada uno que cree
  rationale: El griego usa un singular genérico, no un masculino específico. «Todo el que cree» comunica ese alcance universal de forma natural y fiel.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
- issue: Referente implícito de αὐτῷ
  english_pob_reading: him
  chosen_spanish_reading: él
  alternative_spanish_readings:
  - en él
  - en él, el Mesías
  rationale: El pronombre conserva la forma breve de la cita y deja que el contexto de Romanos determine el referente, como hace el inglés POB. No se expande innecesariamente dentro del versículo.
  doctrine_reference: DOCTRINE.md § Translation philosophy, points 1 and 3
translation_notes:
  revision_awareness: El inglés POB mantiene una equivalencia óptima establecida y sin revisiones recientes; esta versión española sigue el mismo marco auditado, conservando la fórmula de cita, el fundamento causal de γάρ, el alcance genérico de Πᾶς ὁ πιστεύων y el pasivo de καταισχυνθήσεται.
  spanish_consistency_notes:
  - Se mantiene «la Escritura» para ἡ γραφή, en paralelo con el uso habitual del proyecto en fórmulas de cita bíblica.
  - «Creer en él» evita una calca como «creer sobre él» y conserva el sentido relacional del verbo con ἐπί + dativo.
  - Se conserva una voz pasiva en español mediante «no será avergonzado», que refleja bien el griego sin sonar artificial.
  - El pronombre «él» sigue la forma breve de la cita; el referente se interpreta por el contexto inmediato de Romanos.
