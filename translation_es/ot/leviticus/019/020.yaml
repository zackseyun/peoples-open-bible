translation:
  language: es
  text: Si un hombre se acuesta con una mujer y tiene emisión de semen, y ella es una mujer esclava[a] asignada a un hombre, pero no ha sido redimida ni se le ha dado libertad, habrá una averiguación[b]; no serán condenados a muerte, porque ella no había sido liberada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'prometida a un hombre' o 'destinada a un hombre'. El hebreo probablemente indica que la esclava está asignada o prometida a un hombre, aunque su estado legal no es el de una esposa libre plenamente desposada.
    reason: lexical_alternative
  - marker: b
    text: El término hebreo traducido 'averiguación' es raro e incierto; también puede significar 'castigo' o 'compensación'.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - alguien
  lexicon: HALOT
  rationale: En el estilo casuístico legal, el hebreo usa un singular masculino humano específico; en español, 'un hombre' reproduce de manera natural y precisa ese valor sin perder la referencia genérica individual.
- source_word: יִשְׁכַּב אֶת אִשָּׁה שִׁכְבַת זֶרַע
  english_pob_choice: lies with a woman and has an emission of semen
  chosen_spanish: se acuesta con una mujer y tiene emisión de semen
  alternatives_spanish:
  - se acuesta sexualmente con una mujer
  - tiene relaciones sexuales con una mujer
  lexicon: HALOT
  rationale: La expresión hebrea combina el acto sexual con el matiz explícito de 'semen'. El español conserva ambos elementos de forma clara y legalmente concreta, evitando una paráfrasis que borre el componente de 'emisión'.
- source_word: שִׁפְחָה
  english_pob_choice: slave woman
  chosen_spanish: una esclava mujer
  alternatives_spanish:
  - una sierva
  - una esclava
  - una muchacha esclava
  lexicon: HALOT
  rationale: El texto subraya la condición de servidumbre ligada a la ley. 'Esclava mujer' conserva esa fuerza léxica en español sin sustituirla por 'sierva', que suavizaría el término. Se mantiene el sustantivo compuesto para reflejar el hebreo con la menor pérdida posible.
- source_word: נֶחֱרֶפֶת לְאִישׁ
  english_pob_choice: designated for a man
  chosen_spanish: destinada para un hombre
  alternatives_spanish:
  - desposada con un hombre
  - prometida para un hombre
  lexicon: HALOT
  rationale: El hebreo es difícil y no implica necesariamente el estado legal pleno de una esposa desposada libre. 'Destinada para un hombre' conserva la relación asignada o comprometida sin convertirla en una betrothal completa.
- source_word: וְהָפְדֵּה לֹא נִפְדָּתָה
  english_pob_choice: she has not been redeemed
  chosen_spanish: no ha sido redimida
  alternatives_spanish:
  - no ha sido rescatada
  - no ha sido ransomed
  lexicon: HALOT
  rationale: '''Redimida'' es el término español más natural y exacto en este contexto jurídico-económico, y reproduce bien el campo semántico de פדה.'
- source_word: חֻפְשָׁה לֹא נִתַּן לָהּ
  english_pob_choice: given her freedom
  chosen_spanish: se le ha dado libertad
  alternatives_spanish:
  - se le ha concedido libertad
  - se le ha otorgado la libertad
  - no le ha sido dada libertad
  lexicon: HALOT
  rationale: La cláusula señala la liberación de la esclavitud. 'Se le ha dado libertad' mantiene la pasiva impersonal del hebreo y expresa con claridad la concesión legal de manumisión.
- source_word: בִּקֹּרֶת
  english_pob_choice: an inquiry
  chosen_spanish: habrá una averiguación
  alternatives_spanish:
  - habrá una investigación
  - habrá una inspección
  - habrá una compensación
  lexicon: HALOT
  rationale: El sustantivo es raro y su sentido preciso es incierto. 'Averiguación' conserva la idea de revisión oficial sin fijar indebidamente el tipo de sanción. Se mantiene la ambigüedad documentada por el POB inglés.
- source_word: לֹא יוּמְת֖וּ
  english_pob_choice: they shall not be put to death
  chosen_spanish: no serán condenados a muerte
  alternatives_spanish:
  - no serán ejecutados
  - no morirán
  lexicon: HALOT
  rationale: En contexto legal, la pasiva causativa pide una formulación judicial. 'Condenados a muerte' comunica el resultado penal con naturalidad en español y evita la literalidad dura de 'puestos a muerte'.
- source_word: כִּי לֹא חֻפָּשָׁה
  english_pob_choice: because she had not been freed
  chosen_spanish: porque ella no había sido liberada
  alternatives_spanish:
  - porque no había sido puesta en libertad
  - porque no era libre
  lexicon: HALOT
  rationale: La última cláusula explica la atenuación penal por su estado aún servil. 'Liberada' conecta bien con 'libertad' y conserva el nexo semántico con la cláusula anterior.
theological_decisions:
- issue: Estado legal de נֶחֱרֶפֶת לְאִישׁ
  english_pob_reading: designated for a man
  chosen_spanish_reading: destinada para un hombre
  alternative_spanish_readings:
  - desposada con un hombre
  - prometida para un hombre
  rationale: La ley distingue este caso del de adulterio con una mujer libre ya plenamente comprometida. Traducirlo como desposorio completo podría borrar esa distinción legal; 'destinada para un hombre' conserva la relación sin sobredefinirla.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Sentido de בִּקֹּרֶת
  english_pob_reading: there shall be an inquiry
  chosen_spanish_reading: habrá una averiguación
  alternative_spanish_readings:
  - habrá una investigación
  - habrá una compensación
  - habrá un castigo
  rationale: Como el término es raro y de sentido disputado, se preserva la indeterminación en lugar de escoger una pena específica que el hebreo no exige con claridad.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La redacción sigue el pasaje hebreo y el expediente auditado en inglés; no se registraron revisiones posteriores con cambios sustantivos, y el último pase indicó que el texto podía permanecer sin modificaciones.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma general del proyecto solo cuando aparezca el tetragrámaton; en este versículo no aparece.
  - Se preservó 'redimida/libertad/liberada' como red de términos jurídicos coherentes para פדה y חופש.
  - Se evitó 'siervo/a' para no suavizar la fuerza léxica de שִׁפְחָה en este contexto legal.
  - Se eligió una formulación española natural para la pasiva legal ('no serán condenados a muerte') sin perder el sentido judicial del hebreo.
