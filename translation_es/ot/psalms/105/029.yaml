lexical_decisions:
- source_word: הָפַךְ
  english_pob_choice: turned
  chosen_spanish: convirtió
  alternatives_spanish:
  - volteó
  - cambió
  - transformó
  lexicon: HALOT
  rationale: El verbo hebreo puede expresar ‘dar vuelta’, ‘invertir’ o ‘cambiar’. En este contexto de plaga, ‘convirtió’ comunica bien el cambio de estado hacia sangre sin sonar forzado en español, y conserva la idea de transformación del texto base.
- source_word: מֵימֵיהֶם
  english_pob_choice: their waters
  chosen_spanish: sus aguas
  alternatives_spanish:
  - el agua de ellos
  - sus aguas
  lexicon: HALOT
  rationale: El plural hebreo se refiere colectivamente a las aguas de ellos. ‘Sus aguas’ mantiene ese plural colectivo natural en español y sigue de cerca la forma del original.
- source_word: לְדָם
  english_pob_choice: to blood
  chosen_spanish: en sangre
  alternatives_spanish:
  - en sangre
  - en sangre derramada
  lexicon: HALOT
  rationale: La preposición ל marca el estado resultante. En español, ‘en sangre’ comunica con naturalidad ese resultado y evita un calco duro como ‘a sangre’.
- source_word: וַיָּמֶת
  english_pob_choice: caused ... to die
  chosen_spanish: causó que ... murieran
  alternatives_spanish:
  - hizo morir a
  - mató a
  lexicon: HALOT
  rationale: El verbo en forma causativa exige reflejar que no solo ocurrieron muertes, sino que hubo causalidad. ‘Causó que ... murieran’ preserva esa fuerza sin añadir interpretación extra.
- source_word: דְּגָתָם
  english_pob_choice: their fish
  chosen_spanish: sus peces
  alternatives_spanish:
  - los peces de ellos
  - su pescado
  lexicon: HALOT
  rationale: El sustantivo es colectivo y se refiere a los peces de esas aguas. ‘Sus peces’ es la equivalencia natural en español y conserva el referente colectivo del hebreo.
translation_notes:
  revision_awareness: 'Coincide con el audit trail inglés en sentido, estructura y decisión léxica principal: הָפַךְ como cambio de estado, מֵימֵיהֶם como plural colectivo, לְדָם como resultado, y וַיָּמֶת como causativo. Se mantiene la variante alternativa breve para reflejar la ambigüedad legítima del resultado expresado por לְדָם.'
  spanish_consistency_notes:
  - Se conserva un registro formal pero natural en español.
  - No se introduce vocabulario eclesiástico ajeno al hebreo.
  - La nota al pie mantiene una alternativa válida sin desplazar el sentido principal.
