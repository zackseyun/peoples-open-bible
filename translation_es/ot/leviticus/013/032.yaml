review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia y el sentido del hebreo: inspección sacerdotal en el séptimo día, ausencia de propagación del נתק, ausencia de cabello amarillo, y evaluación de que su apariencia no es más profunda que la piel. Sin embargo, hay dos ajustes necesarios: el marcador de nota está anclado en «zona afectada» cuando la nota explica נתק, no נגע; y «no está más profunda que la piel» suena poco natural porque «apariencia» no suele ''estar profunda'' en español.'
  spanish_quality_summary: El español es generalmente claro y digno, pero presenta una incongruencia de anclaje de nota y una leve aspereza estilística. «Y he aquí» es aceptable en registro bíblico; «afección escamosa» funciona bien. Conviene mejorar la última cláusula a una formulación más natural y exacta en español.
  glossary_alignment: 'No hay términos del glosario principal en juego como Yahvé/Mesías/Cristo/etc. Las decisiones léxicas centrales están bien encaminadas: «sacerdote», «zona afectada» para נגע, y «afección escamosa» para נתק. La nota alternativa debe quedar anclada en «afección escamosa», que es donde aparece נתק.'
  issues:
  - severity: medium
    issue: La nota [a] está colocada sobre «zona afectada» en vez de sobre «afección escamosa».
    rationale: La nota explica el hebreo נתק, pero «zona afectada» traduce הַנֶּגַע. El anclaje actual induce a confusión léxica y documental.
  - severity: medium
    issue: «La apariencia de la afección escamosa no está más profunda que la piel» es poco natural en español.
    rationale: En español, 'apariencia' no suele combinarse con 'estar más profunda'. Una formulación como «el aspecto ... no es más profundo que la piel» o «no parece más profunda que la piel» preserva mejor el criterio visual del hebreo.
  - severity: low
    issue: La nota usa «el scall» como préstamo inglés no adaptado.
    rationale: Aunque refleja la nota inglesa, en español conviene señalar que es un término arcaico inglés o mantener solo las alternativas comprensibles en español. No es un error grave, pero sí una leve aspereza editorial.
