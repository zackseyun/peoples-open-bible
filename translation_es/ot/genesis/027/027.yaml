translation:
  language: es
  text: 'Así que se acercó y lo besó; y olió la fragancia[a] de sus vestidos y lo bendijo, y dijo: «Mira[b], el olor de mi hijo es como el olor de un campo que Yahvé ha bendecido».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «olió el olor de sus vestidos». El hebreo repite el mismo sustantivo a lo largo del versículo con efecto retórico.
    reason: lexical_alternative
  - marker: b
    text: O «Ve». El imperativo funciona como llamada de atención.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגַּשׁ
  english_pob_choice: So he came near
  chosen_spanish: Así que se acercó
  alternatives_spanish:
  - Entonces se acercó
  - Y se acercó
  lexicon: HALOT
  rationale: El wayyiqtol narrativo expresa avance en la escena; «se acercó» conserva el movimiento sin forzar un calco. «Así que» mantiene la secuencia narrativa natural en español.
- source_word: וַיִּשַּׁק לוֹ
  english_pob_choice: and kissed him
  chosen_spanish: y lo besó
  alternatives_spanish:
  - y le dio un beso
  - y lo besó afectuosamente
  lexicon: HALOT
  rationale: נשׁק con sufijo pronominal se traduce de forma directa como «besó». «Lo besó» es natural y no añade matices no explicitados por el hebreo.
- source_word: וַיָּרַח אֶת רֵיחַ בְּגָדָיו
  english_pob_choice: and he smelled the smell of his garments
  chosen_spanish: y percibió el olor de sus vestidos
  alternatives_spanish:
  - y olió el olor de sus vestidos
  - y captó el aroma de sus vestidos
  lexicon: HALOT
  rationale: El hebreo usa una construcción cognada repetida con רֵיחַ para énfasis retórico. En español, «percibió el olor» evita la tautología de «olió el olor» sin borrar la repetición semántica del pasaje. «Vestidos» conserva el plural concreto de בְּגָדָיו.
- source_word: בְּגָדָיו
  english_pob_choice: his garments
  chosen_spanish: sus vestidos
  alternatives_spanish:
  - sus ropas
  - sus prendas
  lexicon: HALOT
  rationale: «Vestidos» comunica el plural concreto y mantiene un registro digno. Es suficientemente cercano a «garments» sin sonar demasiado arcaico para el español contemporáneo.
- source_word: וַיְבָרֲכֵהוּ
  english_pob_choice: and blessed him
  chosen_spanish: y lo bendijo
  alternatives_spanish:
  - y le dio su bendición
  - y lo bendijo con palabras de bendición
  lexicon: HALOT
  rationale: ברך en esta forma narrativa se expresa de manera directa con «bendijo». No hay indicio suficiente para expandir la acción más allá del verbo bíblico.
- source_word: רְאֵה
  english_pob_choice: See
  chosen_spanish: Mira
  alternatives_spanish:
  - Ve
  - Miren
  lexicon: HALOT
  rationale: El imperativo funciona como llamado de atención. «Mira» es natural en español moderno y conserva la fuerza exhortativa sin el tono más arcaico de «He aquí».
- source_word: רֵיחַ בְּנִי
  english_pob_choice: the smell of my son
  chosen_spanish: el olor de mi hijo
  alternatives_spanish:
  - el aroma de mi hijo
  - el perfume de mi hijo
  lexicon: HALOT
  rationale: Se conserva la repetición léxica de רֵיחַ mediante «olor». Esta elección mantiene la conexión con el «olor» previo y no suaviza el efecto retórico del hebreo.
- source_word: כְּרֵיחַ שָׂדֶה
  english_pob_choice: is like the smell of a field
  chosen_spanish: es como el olor de un campo
  alternatives_spanish:
  - es como el aroma de un campo
  - es como el olor del campo
  lexicon: HALOT
  rationale: 'La comparación marcada por כ pide una equivalencia sencilla: «como». «Campo» sigue el sentido básico de שָׂדֶה y evita la paráfrasis de «campo abierto» u otras ampliaciones.'
- source_word: אֲשֶׁר בֵּרֲכ֖וֹ יְהוָה
  english_pob_choice: that Yahweh has blessed
  chosen_spanish: que Yahvé ha bendecido
  alternatives_spanish:
  - que Yahvé bendijo
  - que ha bendecido Yahvé
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como «Yahvé» según la terminología del proyecto. El perfecto en contexto se comunica bien con «ha bendecido», que expresa el estado resultante de la bendición divina.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: 'Se sigue el criterio del POB para el nombre divino: «Yahvé». Esta forma preserva el nombre personal del pacto sin sustituirlo por un título.'
theological_decisions:
- issue: Renderización del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - Jehová
  rationale: El texto hebreo contiene explícitamente el nombre del pacto. En español se conserva como «Yahvé» para no ocultar la presencia del nombre divino y mantener coherencia con la política del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Repetición retórica de רֵיחַ («smell/scent/odor»)
  english_pob_reading: the smell ... the smell ... the smell
  chosen_spanish_reading: el olor ... el olor ... el olor
  alternative_spanish_readings:
  - el aroma ... el aroma ... el aroma
  - el olor ... el aroma ... el olor
  rationale: El hebreo repite la misma raíz para producir énfasis. En español se preserva la repetición con «olor» en lugar de variar innecesariamente a sinónimos, para no borrar el recurso literario.
  doctrine_reference: POB lexical policy on rhetorical repetition and source transparency
translation_notes:
  revision_awareness: 'El audit trail inglés pasó por una revisión que prefirió mantener la literalidad de «smelled the smell of» para conservar la repetición de רֵיחַ. En español se decidió una solución equivalente de alta transparencia: conservar la repetición semántica con «olor», pero evitar una construcción demasiado torpe como «olió el olor». También se respetó la decisión estable de renderizar יְהוָה como «Yahvé».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se conserva la repetición de «olor» para reflejar la insistencia lexical del hebreo.
  - «Vestidos» se usa como equivalente formal de בְּגָדָיו sin cambiar el sentido.
  - La puntuación y comillas siguen el uso editorial habitual del español bíblico moderno.
