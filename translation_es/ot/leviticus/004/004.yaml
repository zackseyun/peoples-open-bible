translation:
  language: es
  text: Lo llevará a la entrada[a] de la tienda de reunión, delante de Yahvé[b], y pondrá su mano sobre la cabeza del toro y degollará el toro delante de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a la puerta de la tienda de reunión».
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice «delante de Yahvé», una expresión cultual que significa en la presencia de Yahvé.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵבִיא
  english_pob_choice: He shall bring
  chosen_spanish: Lo llevará
  alternatives_spanish:
  - Y lo llevará
  - Y lo traerá
  lexicon: HALOT
  rationale: El hebreo expresa la acción requerida en un contexto ritual prescriptivo. En español, «lo llevará» conserva el sentido de llevar el animal al lugar indicado con naturalidad; «lo traerá» también es posible, pero aquí «llevar» encaja mejor con el destino señalado en la cláusula.
- source_word: הַפָּר
  english_pob_choice: the bull
  chosen_spanish: el toro
  alternatives_spanish:
  - el bull
  - el novillo
  lexicon: HALOT
  rationale: פָּר designa un toro/buey para sacrificio. «Toro» es un equivalente claro y digno en español. No se añade «joven» porque el texto de este versículo no lo explicita.
- source_word: פֶּתַח אֹהֶל מוֹעֵד
  english_pob_choice: the entrance of the tent of meeting
  chosen_spanish: la entrada de la tienda de reunión
  alternatives_spanish:
  - la puerta de la tienda de reunión
  - el umbral de la tienda de reunión
  lexicon: HALOT
  rationale: פֶּתַח es «entrada» o «apertura». «Tienda de reunión» mantiene la designación cultual estándar de אֹהֶל מוֹעֵד. «Tienda» suena más natural en español bíblico que «tabernáculo», sin perder el referente.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: לִפְנֵי puede ser «delante de», «ante» o «en presencia de». Se conserva la fórmula cultual con «delante de Yahvé», siguiendo el criterio del proyecto de traducir יְהוָה como «Yahvé».
- source_word: וְסָמַךְ אֶת יָדוֹ עַל רֹאשׁ הַפָּר
  english_pob_choice: he shall lay his hand on the head of the bull
  chosen_spanish: pondrá su mano sobre la cabeza del toro
  alternatives_spanish:
  - apoyará su mano sobre la cabeza del toro
  - impondrá su mano sobre la cabeza del toro
  lexicon: HALOT
  rationale: סמך aquí describe el acto ritual de colocar la mano sobre el animal. «Pondrá su mano» es claro y no interpreta el gesto más allá de lo que el hebreo dice. «Impondrá» es posible, pero en español puede sonar más técnico e introducir una lectura litúrgica más específica.
- source_word: וְשָׁחַט
  english_pob_choice: and slaughter
  chosen_spanish: degollará
  alternatives_spanish:
  - sacrificará
  - matará
  lexicon: HALOT
  rationale: שׁחט es el verbo técnico para la matanza ritual de un animal. «Degollar» preserva el acto físico de sacrificar sin convertirlo en el más genérico «matar». «Sacrificará» interpreta más de lo que el verbo por sí solo expresa.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. Conforme al criterio del proyecto, se translitera como «Yahvé» para conservar el nombre propio divino en lugar de reemplazarlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido del gesto de poner la mano sobre la cabeza del animal
  english_pob_reading: Translate the physical action without importing a specific doctrinal explanation
  chosen_spanish_reading: Traducir solo el acto ritual, sin explicarlo como identificación o transferencia de culpa
  alternative_spanish_readings:
  - indicar identificación
  - indicar transferencia de culpa
  rationale: El versículo describe el gesto, pero no lo explica. Para preservar la tensión teológica y no añadir una interpretación no explicitada aquí, la traducción se limita a la acción ritual concreta.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'El contexto inglés mantiene una equivalencia óptima con dos notas: una alternativa léxica para פֶּתַח («entrance/doorway») y otra para לִפְנֵי יְהוָה que preserva el valor cultual de la fórmula. La versión española conserva ambas decisiones, con «delante de Yahvé» y una nota para la alternativa espacial de פֶּתַח.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como traducción estable de יְהוָה.
  - «Tienda de reunión» conserva el término cultual estándar para אֹהֶל מוֹעֵד.
  - Se evita «SEÑOR» por coherencia con la política del proyecto.
  - Se usa «toro» para פָּר y «degollará» para שָׁחַט, manteniendo el registro sacrificial.
