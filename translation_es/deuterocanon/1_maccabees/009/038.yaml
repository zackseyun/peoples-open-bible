    text: También podría traducirse «bajo la cobertura» o «bajo el amparo»; el griego σκέπη puede significar cobertura, refugio o protección.
    reason: lexical_alternative
  revision_rationale: Se eliminó la nota innecesaria sobre «Juan» y se sustituyó «cobertura» por «cobijo» para lograr un español más natural y literario, manteniendo el campo semántico de σκέπη y la fidelidad al sentido de resguardo/cubierta del original griego.
