base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/002/024.yaml
  text: After Hezron died in Caleb-ephrathah[a], Hezron’s wife Abijah bore to him Ashhur[b], the father of Tekoa.
  footnotes:
  - marker: a
    text: Or 'the founder of Tekoa.' In genealogies, 'father of' can denote the founder or leading ancestor of a settlement or clan, not only an immediate biological father.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew phrase 'in Caleb-ephrathah' is difficult. It may refer to a place or clan designation, traditionally rendered 'Caleb-ephrathah' or 'Caleb Ephrathah.'
    reason: alternative_reading
