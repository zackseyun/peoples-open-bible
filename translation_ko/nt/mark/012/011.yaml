theological_decisions:
- issue: 12:11의 παρὰ κυρίου에서 κύριος = LXX 시편 118:23의 יהוה
  chosen_reading: 야훼
  alternative_readings:
  - 주
  - 주님
  rationale: 시편 118:23의 LXX 인용에서 κύριος는 직접 יהוה를 번역한다. 한국 성경 전통은 「주」로 가리어 왔으나, 본 프로젝트는 OT 인용 문맥에서 κύριος = YHWH를 「야훼」로 드러낸다. 글로벌 정책에 따라 일관성 유지.
  doctrine_reference: 'DOCTRINE.md: Glossary — κύριος (= YHWH) → 야훼'
