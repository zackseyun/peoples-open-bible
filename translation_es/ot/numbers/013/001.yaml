review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente el hebreo: וַיְדַבֵּר = «habló», אֶל־מֹשֶׁה = «a Moisés», y לֵאמֹר = «diciendo». También conserva la política doctrinal de verter יְהוָה como «Yahvé». La única desalineación significativa está en la nota: presenta «Yahvé» como transliteración alternativa de YHWH, cuando en realidad «Yahvé» es la forma elegida en el texto español y la alternativa documentada en el expediente inglés es «Yahweh»/«Jehová», no al revés.'
  spanish_quality_summary: 'El español principal es natural, claro y digno: «Yahvé habló a Moisés, diciendo,». No obstante, la nota actual resulta confusa y poco útil para el lector porque duplica la forma principal en vez de señalar una alternativa real. Conviene ajustar solo la nota, manteniendo el texto principal intacto.'
  glossary_alignment: 'Alineado con el glosario del proyecto en los puntos clave: יְהוָה → «Yahvé»; משה → «Moisés». No hay otros términos sensibles en el versículo. Se debe corregir la nota para que no contradiga ni oscurezca la decisión terminológica del nombre divino.'
  issues:
  - severity: medium
    issue: La nota al pie sobre YHWH está invertida/confusa.
    rationale: El texto español ya usa «Yahvé», de modo que decir «también puede transliterarse “Yahvé”» no añade información y no refleja bien la alternativa documentada. La nota debe explicar que el hebreo dice «YHWH» y, si se conserva una alternativa, esta debe ser una forma distinta como «Yahweh» o «Jehová».
  revised_spanish_text: Yahvé habló a Moisés[a], diciendo,
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; también puede transliterarse «Yahweh».'
    reason: alternative_reading
  revision_rationale: El texto principal está bien y no requiere cambios. Se revisa únicamente la nota al pie para que preserve con precisión el dato fuente («YHWH») y ofrezca una alternativa real a «Yahvé», en vez de repetir la forma ya usada en el texto español.
