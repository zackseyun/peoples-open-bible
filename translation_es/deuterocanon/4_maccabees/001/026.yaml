translation:
  language: es
  text: 'Contra el alma: arrogancia, amor al dinero, amor al honor, contenciosidad y envidia[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el mal de ojo» para βασκανία, término que también puede sugerir envidia o mala voluntad dañina.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατὰ
  english_pob_choice: Against
  chosen_spanish: Contra
  alternatives_spanish:
  - en contra de
  - frente a
  - contra de
  lexicon: LSJ
  rationale: En esta lista de vicios, κατά con genitivo expresa oposición o dirección adversa. «Contra» conserva de forma natural la fuerza adversativa del griego y funciona bien al abrir la enumeración en español.
- source_word: ψυχῆς
  english_pob_choice: the soul
  chosen_spanish: el alma
  alternatives_spanish:
  - la vida
  - el interior
  - el ser interior
  lexicon: LSJ
  rationale: ψυχή aquí designa la realidad interior de la persona afectada por estas pasiones. «Alma» mantiene ese sentido antropológico y es el equivalente español más directo y readable para el contexto.
- source_word: ἀλαζονία
  english_pob_choice: arrogance
  chosen_spanish: arrogancia
  alternatives_spanish:
  - jactancia
  - presunción
  - vanagloria
  lexicon: LSJ
  rationale: El término apunta a una autosuficiencia ostentosa o presuntuosa. «Arrogancia» es la opción natural en español y comunica bien el vicio sin estrecharlo demasiado.
- source_word: φιλαργυρία
  english_pob_choice: love of money
  chosen_spanish: amor al dinero
  alternatives_spanish:
  - codicia
  - avaricia
  lexicon: LSJ
  rationale: La forma compuesta literalmente expresa amor por la plata/dinero. «Amor al dinero» preserva mejor la estructura léxica y el énfasis moral que una abstracción como «codicia».
- source_word: φιλοδοξία
  english_pob_choice: love of honor
  chosen_spanish: amor al honor
  alternatives_spanish:
  - ambición
  - amor a la gloria
  lexicon: LSJ
  rationale: Literalmente, el término significa amor por el honor/reputación. «Amor al honor» reproduce la construcción y mantiene visible el paralelismo con los demás compuestos con φιλο-.
- source_word: φιλονεικία
  english_pob_choice: contentiousness
  chosen_spanish: espíritu contencioso
  alternatives_spanish:
  - contienda
  - pendenciosidad
  - quebradizo afán de disputa
  lexicon: LSJ
  rationale: El vocablo indica inclinación a la disputa o a la contienda. «Espíritu contencioso» transmite esa disposición moral en un español claro y no excesivamente técnico.
- source_word: βασκανία
  english_pob_choice: envy
  chosen_spanish: envidia
  alternatives_spanish:
  - malicia
  - el mal de ojo
  lexicon: LSJ
  rationale: En la lista de vicios, el sentido principal es la envidia. «Envidia» es la traducción más transparente; la posibilidad cultural de «el mal de ojo» queda recogida en nota como alternativa semántica.
translation_notes:
  revision_awareness: 'Se siguió el sentido del texto griego de Swete (1909) y el audit trail inglés, sin cambios relevantes respecto de la última revisión: la lista de vicios se mantiene y βασκανία conserva su alternativa semántica en nota.'
  spanish_consistency_notes:
  - Se mantiene el registro de lista moral breve, con sintagmas nominales paralelos.
  - Se evita «SEÑOR» u այլ terminología no pertinente; no hay vocabulario cristológico o divino en este versículo.
  - «Alma» y no «vida» conserva la antropología del contexto de 4 Macabeos.
  - La nota al pie preserva la tensión lexical de βασκανία sin introducir una paráfrasis doctrinal.
