translation:
  language: es
  text: Y sucederá que el que escape de la espada de Hazael, Jehú lo pondrá a muerte; y el que escape de la espada de Jehú, Eliseo lo pondrá a muerte[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Eliseo matará». El verbo hebreo es causativo («hacer morir», «poner a muerte»). En contexto, la acción de Eliseo puede entenderse de modo directo o a través del juicio realizado por su ministerio profético.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And it shall be
  chosen_spanish: Y sucederá que
  alternatives_spanish:
  - Y será que
  - Y acontecerá que
  lexicon: HALOT
  rationale: La fórmula hebrea introduce un futuro narrativo o profético; «sucederá que» conserva ese valor idiomático sin sonar rígido en español.
- source_word: הַנִּמְלָט
  english_pob_choice: whoever escapes
  chosen_spanish: el que escape
  alternatives_spanish:
  - quien escape
  - el que se escape
  lexicon: HALOT
  rationale: El participio con artículo funciona de manera sustantiva y genérica; «el que escape» transmite bien la referencia indefinida en español bíblico contemporáneo.
- source_word: מֵחֶרֶב
  english_pob_choice: from the sword of
  chosen_spanish: de la espada de
  alternatives_spanish:
  - de la espada
  - de la violencia de
  lexicon: HALOT
  rationale: «Espada» mantiene el valor literal de חֶרֶב como instrumento de muerte/jucio; en español la construcción «espada de» suena natural y preserva la imagen.
- source_word: חֲזָאֵל
  english_pob_choice: Hazael
  chosen_spanish: Hazael
  alternatives_spanish:
  - Hazael
  lexicon: nombre propio
  rationale: Nombre propio transliterado de forma estándar.
- source_word: יָמִית
  english_pob_choice: shall put to death
  chosen_spanish: lo matará
  alternatives_spanish:
  - lo pondrá a muerte
  - lo hará morir
  lexicon: HALOT
  rationale: El causativo hebreo expresa dar muerte; en español «lo matará» es natural y comunica la fuerza agentiva sin añadir perífrasis innecesaria.
- source_word: יֵהוּא
  english_pob_choice: Jehu
  chosen_spanish: Jehú
  alternatives_spanish:
  - Jehu
  lexicon: nombre propio
  rationale: Se adapta al uso habitual en español bíblico, con tilde por acentuación gráfica.
- source_word: אֱלִישָׁע
  english_pob_choice: Elisha
  chosen_spanish: Eliseo
  alternatives_spanish:
  - Elisha
  lexicon: nombre propio
  rationale: Forma tradicional y reconocible en español para este nombre profético.
theological_decisions:
- issue: Agencia de Eliseo en la frase final
  english_pob_reading: Retain the direct wording that Elisha shall put to death those escaping Jehu.
  chosen_spanish_reading: 'Mantener la redacción directa: «el que escape de la espada de Jehú, lo matará Eliseo».'
  alternative_spanish_readings:
  - «… Eliseo hará morir»
  - «… Eliseo ejecutará el juicio»
  - «… la palabra de Eliseo traerá muerte»
  rationale: El hebreo presenta a Eliseo como agente paralelo a Hazael y Jehú; no conviene suavizar esa tensión en el cuerpo principal. La posible mediación profética o judicial puede reconocerse en una nota, pero la traducción debe respetar el paralelismo y la fuerza del verbo causativo.
  doctrine_reference: Preservar la tensión teológica sin resolverla interpretativamente en el texto principal.
translation_notes:
  revision_awareness: El contexto muestra alta concordancia entre las revisiones y no requiere cambios adicionales; se mantiene la lectura directa del paralelo hebreo y la nota conserva la alternativa interpretativa ya documentada en el expediente inglés.
  spanish_consistency_notes:
  - Se mantiene el paralelismo de los dos miembros con «el que escape… lo matará…» para reflejar la repetición hebrea.
  - Se usa «Jehú» y «Eliseo» conforme a la convención española bíblica, sin alterar el contenido lexical auditado.
  - La nota [a] preserva la alternativa verbal del causativo hebreo sin debilitar la traducción principal.
