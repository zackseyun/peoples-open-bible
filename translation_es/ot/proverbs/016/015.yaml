review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: la luz del rostro favorable del rey trae vida, y su favor se compara con una nube de lluvia tardía/de primavera. Conserva la imaginería concreta de «rostro» y «favor». Sin embargo, omite la nota cultural presente en el POB inglés sobre la expresión favorable del rey y la bendición agrícola, y en español «como nube de» suena incompleto sin artículo.'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero requiere un ajuste de naturalidad: «es como nube de lluvia tardía» suena forzado; «es como una nube de lluvia tardía» lee mejor sin perder concisión. También conviene pulir la redacción de la nota al pie para quitar comillas innecesarias y mejorar el español. Puede añadirse la nota cultural del inglés para preservar plenamente la explicación auditada.'
  glossary_alignment: No hay términos del glosario general en disputa aquí. «Rey», «rostro», «vida» y «favor» están bien alineados con las decisiones léxicas documentadas. «Lluvia tardía» es aceptable como equivalente de מַלְקוֹשׁ, con la alternativa formal documentada en nota.
  issues:
  - severity: medium
    issue: La frase «como nube de lluvia tardía» es poco natural en español.
    rationale: Aunque calca de cerca la estructura hebrea/inglesa, en español común y literario la comparación requiere mejor «como una nube de lluvia tardía» para sonar idiomática y clara.
  - severity: medium
    issue: Falta la nota cultural del POB inglés.
    rationale: El POB inglés conserva una nota explicativa importante sobre la imagen del rostro favorable del rey y la lluvia benéfica para los cultivos. Omitirla pierde parte del rastro auditado y del sentido contextual preservado.
  - severity: low
    issue: La nota existente está redactada de manera poco natural.
    rationale: «O, más formalmente...» con comillas simples y dos puntos internos suena torpe. Debe normalizarse a un español editorial más limpio.
  revised_spanish_text: En la luz del rostro del rey hay vida[b], y su favor es como una nube de lluvia tardía[a].
