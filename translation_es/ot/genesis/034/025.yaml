  text: וַ/יְהִי֩ בַ/יּ֨וֹם הַ/שְּׁלִישִׁ֜י בִּֽ/הְיוֹתָ֣/ם כֹּֽאֲבִ֗ים וַ/יִּקְח֣וּ שְׁנֵֽי בְנֵי יַ֠עֲקֹב שִׁמְע֨וֹן וְ/לֵוִ֜י אֲחֵ֤י דִינָה֙ אִ֣ישׁ חַרְבּ֔/וֹ וַ/יָּבֹ֥אוּ עַל הָ/עִ֖יר בֶּ֑טַח וַ/יַּֽהַרְג֖וּ כָּל זָכָֽר־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/genesis/034/025.yaml
  text: On the third day[a], while they were in pain, two of Jacob’s sons, Simeon and Levi, Dinah’s brothers, each took his sword, came upon the city unsuspecting[b], and killed every male.
  footnotes:
  - marker: a
    text: Or 'came against the city confidently/securely'; the Hebrew בֶּטַח can modify either the attackers' manner or the city's unsuspecting state. The main text takes it as describing the city as secure and off guard in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'And it happened on the third day, when they were in pain, that'.
    reason: previous_rendering
