    issue: La forma principal 'Nefisim' no sigue la decisión lexical documentada del POB inglés para נפיסים.
    rationale: La auditoría inglesa fijó 'Nephisim' como forma principal y reservó 'Nefusim' como alternativa. El español cambió el lema principal a 'Nefisim' sin justificar una excepción de proyecto suficientemente fuerte.
  - severity: high
    issue: Los marcadores de notas están anclados al nombre equivocado.
    rationale: La nota [a] explica la alternativa de Meunim/Maonim pero está colocada después de Asnah; la nota [b] explica Nefisim/Nefusim pero está colocada después de Meunim. Esto rompe la trazabilidad de las alternativas.
  - severity: medium
    issue: La redacción de las notas puede ser más precisa respecto al nombre principal al que ofrecen alternativa.
    rationale: Decir simplemente 'También puede transliterarse…' es comprensible, pero es mejor indicar explícitamente 'Meunim también puede…' y 'Nefisim también puede…' para evitar ambigüedad.
