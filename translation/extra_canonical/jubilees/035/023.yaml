  category: mistranslation
  tier: 2
  from: Only hide me, so that
  to: Trust me that
  rationale: The Ge'ez word here is `ta'amananni` (from `’amana`), which means 'believe
    me' or 'trust me', not 'hide me'. Consequently, the conjunction `kama` introduces
    the content of the trust ('that'), rather than a purpose clause ('so that').
- timestamp: '2026-04-28T06:42:07Z'
  adjudicator: auto_apply_tier2_source_grounded
  reviewer_model: gemini-3.1-pro-preview
  source_review: state/reviews/gemini/vertex_gap_closure_2026_04/extra_canonical/jubilees/035/023.job-75561.json
  category: mistranslation
  tier: 2
  from: nothing may come before us except love
  to: I will not be first in anything except in love
  rationale: The Ge'ez phrase `wa-'ikawwen qadāmiya ba-kwellu za-'enbala ba-feqr`
    translates to 'and I will not be first in anything except in love.' The draft
    misconstrues the first-person verb `’ikawwen` (I will not be) and `qadāmiya` (first).
