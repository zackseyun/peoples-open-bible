  to: Y los hijos de Judá capturaron vivos a diez mil, los llevaron a la cima de la peña[a], y los arrojaron desde la cima de la peña, y todos ellos quedaron destrozados[b].
  rationale: Se conserva el texto principal casi intacto, pero se corrige el anclaje de la nota sobre נִבְקָעוּ para que aparezca en «destrozados», se precisa su redacción literal, y se suaviza la puntuación para reflejar mejor la coordinación hebrea.
