translation:
  language: es
  text: Y habrá un gran clamor[a] por toda la tierra de Egipto, cual no lo ha habido antes ni lo habrá de nuevo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un gran grito» o «un gran llanto». El hebreo צְעָקָה puede denotar un fuerte clamor de angustia.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיְתָה
  english_pob_choice: And there will be
  chosen_spanish: Y habrá
  alternatives_spanish:
  - Y será
  - Y sucederá que habrá
  lexicon: HALOT
  rationale: El hebreo usa un perfecto con valor futuro en un anuncio profético. En español, «habrá» conserva el valor predictivo con naturalidad y sin añadir explicaciones innecesarias.
- source_word: צְעָקָה
  english_pob_choice: cry
  chosen_spanish: clamor
  alternatives_spanish:
  - grito
  - alarido
  - llanto
  lexicon: HALOT
  rationale: La palabra hebrea puede denotar un grito fuerte de angustia. «Clamor» comunica bien el sentido de voz intensa y de aflicción; además deja abierta la alternativa de «outcry / wailing» documentada en el texto inglés.
- source_word: גְדֹלָה
  english_pob_choice: great
  chosen_spanish: gran
  alternatives_spanish:
  - grande
  - fuerte
  - mighty
  lexicon: HALOT
  rationale: «Gran» reproduce de manera idiomática el intensificador hebreo y mantiene el paralelismo con la expresión siguiente.
- source_word: בְּכָל אֶרֶץ מִצְרַיִם
  english_pob_choice: throughout all the land of Egypt
  chosen_spanish: por toda la tierra de Egipto
  alternatives_spanish:
  - en toda la tierra de Egipto
  - a través de toda la tierra de Egipto
  lexicon: HALOT
  rationale: La preposición con «todo» expresa extensión total. «Por toda la tierra de Egipto» es natural en español y preserva el alcance geográfico completo.
- source_word: אֲשֶׁר כָּמֹהוּ לֹא נִהְיָתָה
  english_pob_choice: such as has never been before
  chosen_spanish: como no lo ha habido antes
  alternatives_spanish:
  - tal como nunca ha existido
  - como nunca antes ha sido
  lexicon: HALOT
  rationale: El hebreo usa el verbo «ser/llegar a ser» con una comparación absoluta. «No lo ha habido antes» conserva el sentido de existencia previa sin forzar una paráfrasis más interpretativa.
- source_word: וְכָמֹהוּ לֹא תֹסִף
  english_pob_choice: nor will ever be again
  chosen_spanish: ni lo habrá jamás
  alternatives_spanish:
  - ni volverá a haber algo semejante
  - ni se añadirá otra igual
  lexicon: HALOT
  rationale: El hiphil negado de יסף transmite la idea de no repetirse. «Ni lo habrá jamás» refleja esa fuerza absoluta en español y mantiene la comparación final.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión inglesa más reciente, que ajustó la comparación final para alinearla más estrechamente con el verbo hebreo «ser/llegar a ser». Por eso se prefirió una forma española igualmente directa y absoluta: «como no lo ha habido antes ni lo habrá jamás».'
  spanish_consistency_notes:
  - Se mantuvo «tierra de Egipto» para reflejar el alcance territorial completo del hebreo.
  - Se evitó «SEÑOR» u otras sustituciones, porque este versículo no contiene el nombre divino.
  - Se preservó el contraste absoluto de la última cláusula con una estructura breve y solemnemente enfática.
