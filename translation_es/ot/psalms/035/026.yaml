translation:
  language: es
  text: Que sean avergonzados y humillados juntos los que se alegran de mi desgracia; que se vistan de vergüenza y deshonra los que se engrandecen[a] contra mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los que se exaltan contra mí» o «los que se jactan contra mí». El hebreo literalmente habla de hacerse grande sobre o contra alguien.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵבֹשׁוּ
  english_pob_choice: let ... be put to shame
  chosen_spanish: que sean avergonzados
  alternatives_spanish:
  - que sean puestos en vergüenza
  - que se avergüencen
  lexicon: HALOT
  rationale: En un contexto imprecatorio, el verbo pide una pasiva/resultativa. «Avergonzados» mantiene el campo semántico de shame sin sonar tan forzado como una construcción pasiva plena en español.
- source_word: וְיַחְפְּרוּ
  english_pob_choice: and humiliated
  chosen_spanish: y humillados
  alternatives_spanish:
  - y confundidos
  - y abochornados
  lexicon: HALOT
  rationale: El verbo expresa deshonra/intensa vergüenza; «humillados» conserva el segundo predicado sin repetir mecánicamente «avergonzados» y refleja bien la intensificación hebrea.
- source_word: יַחְדָּו
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - todos juntos
  - a la vez
  lexicon: HALOT
  rationale: Adverbio de simultaneidad y destino compartido. «Juntos» es natural en español y conserva la idea de un mismo juicio para el grupo.
- source_word: שְׂמֵחֵי רָעָתִי
  english_pob_choice: those who rejoice at my harm
  chosen_spanish: los que se alegran de mi mal
  alternatives_spanish:
  - los que se alegran de mi desgracia
  - los que se alegran de mi calamidad
  lexicon: HALOT
  rationale: «Mi mal» sigue de cerca el valor de רָעָה en este contexto, sin sugerir que el salmista hable de su propia maldad moral. «Alegrarse de» transmite con naturalidad la actitud hostil.
- source_word: יִלְבְּשׁוּ
  english_pob_choice: let ... be clothed with
  chosen_spanish: que se vistan de
  alternatives_spanish:
  - que sean vestidos de
  - que se revistan de
  lexicon: HALOT
  rationale: La metáfora hebrea de vestirse con un estado se conserva en español con una construcción idiomática y clara. «Vestirse de» comunica bien la imagen sin perder la figuración.
- source_word: בֹשֶׁת
  english_pob_choice: shame
  chosen_spanish: vergüenza
  alternatives_spanish:
  - vergüenza
  - deshonra
  lexicon: HALOT
  rationale: En la frase fija «vergüenza y deshonra», «vergüenza» es el equivalente más natural y reconoce la carga de oprobio del sustantivo.
- source_word: וּכְלִמָּה
  english_pob_choice: and disgrace
  chosen_spanish: y deshonra
  alternatives_spanish:
  - y afrenta
  - y humillación
  lexicon: HALOT
  rationale: Como par intensificado con בֹשֶׁת, «deshonra» funciona bien en español bíblico contemporáneo y preserva el segundo término sin fusionarlo con el primero.
- source_word: הַמַּגְדִּילִים עָלַי
  english_pob_choice: those who magnify themselves against me
  chosen_spanish: los que se engrandecen contra mí
  alternatives_spanish:
  - los que se exaltan contra mí
  - los que se hacen grandes contra mí
  - los que se jactan contra mí
  lexicon: HALOT
  rationale: El verbo causativo con עַל expresa hacerse grande sobre/contra otro. «Engrandecerse contra mí» conserva el movimiento verbal y la hostilidad, evitando reducirlo solo a jactancia verbal.
theological_decisions:
- issue: Imprecación y maldición judicial
  english_pob_reading: The verse is rendered as a prayer that hostile people receive shame and disgrace.
  chosen_spanish_reading: 'Se mantiene como ruego imprecatorio: «Que sean avergonzados...», sin suavizar el juicio pedido.'
  alternative_spanish_readings:
  - Que queden avergonzados...
  - Ojalá sean avergonzados...
  rationale: El hebreo usa formas jussivas/imprecativas. La traducción debe conservar el tono de petición judicial, no convertirlo en simple descripción.
  doctrine_reference: Salmos imprecatorios; justicia retributiva en la oración bíblica
translation_notes:
  revision_awareness: Alineado con la revisión más reciente indicada como sin cambios y con el juicio de alta concordancia; no se introducen revisiones textuales nuevas.
  spanish_consistency_notes:
  - 'Se conserva el paralelismo binario con dos pares de términos de vergüenza: «avergonzados y humillados» / «vergüenza y deshonra».'
  - Se evita «Cristo» u otras terminologías no presentes en el versículo.
  - «Mi mal» se usa para reflejar רָעָה en este contexto hostil, sin moralizar el término.
  - La puntuación con punto y coma ayuda a reflejar la división del verso hebreo y del inglés POB.
