translation:
  language: es
  text: Entonces hizo acercar[a] la tribu de Benjamín por sus clanes, y fue tomado[b] el clan de los matritas. Entonces fue tomado[b] Saúl hijo de Cis, pero cuando lo buscaron, no fue hallado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «según sus familias». El hebreo puede designar familias extensas o clanes dentro de una tribu.'
    reason: lexical_alternative
  - marker: b
    text: «Fue tomado» se refiere a ser señalado o escogido por sorteo, no a una captura militar.
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּקְרֵב
  english_pob_choice: brought ... near
  chosen_spanish: hizo pasar
  alternatives_spanish:
  - presentó
  - hizo acercar
  lexicon: HALOT
  rationale: En este contexto de sorteo y selección por eliminación, el verbo no describe movimiento físico libre sino el acto procedimental de ir pasando grupos hacia delante. «Hizo pasar» comunica bien esa secuencia ritual/procesal en español sin perder la idea de acercar o presentar.
- source_word: שֵׁבֶט בִּנְיָמִן
  english_pob_choice: the tribe of Benjamin
  chosen_spanish: la tribu de Benjamín
  alternatives_spanish:
  - la tribu de Benjamin
  lexicon: HALOT
  rationale: «Tribu» es la equivalencia natural y estable de שֵׁבֶט en contextos de organización tribal. Se usa el nombre propio en forma española «Benjamín», que es la forma más readable y reconocible en español bíblico.
- source_word: לְמִשְׁפְּחֹתָיו
  english_pob_choice: by its clans
  chosen_spanish: por sus clanes
  alternatives_spanish:
  - según sus familias
  - por sus familias
  lexicon: HALOT
  rationale: מִשְׁפָּחָה puede ser «familia» o «clan». Aquí la secuencia descendente tribu → clan → individuo favorece «clanes» para reflejar el nivel social intermedio. «Por» conserva el valor distributivo del hebreo en este paso del procedimiento.
- source_word: וַתִּלָּכֵד
  english_pob_choice: was taken
  chosen_spanish: fue tomada
  alternatives_spanish:
  - fue seleccionada
  - fue sorteada
  lexicon: HALOT
  rationale: El nifal de לכד aquí expresa quedar señalado por sorteo, no captura militar. «Fue tomada» mantiene la forma pasiva y la ambigüedad controlada del original, como en la POB inglesa.
- source_word: מִשְׁפַּחַת הַמַּטְרִי
  english_pob_choice: the clan of the Matrites
  chosen_spanish: la familia de los matritas
  alternatives_spanish:
  - el clan de los matritas
  - la familia matrita
  lexicon: HALOT
  rationale: Se conserva el grupo gentilicio como plural colectivo «matritas». Aunque «clan» sería consistente con la línea anterior, «familia» sigue siendo un valor posible de מִשְׁפָּחָה; se mantiene así la tensión léxica sin forzar una normalización total.
- source_word: וַיִּלָּכֵד שָׁאוּל בֶּן־קִישׁ
  english_pob_choice: Then Saul son of Kish was taken
  chosen_spanish: Entonces fue tomado Saúl hijo de Cis
  alternatives_spanish:
  - Entonces Saúl hijo de Cis fue tomado
  - Entonces Saúl hijo de Cis fue sorteado
  lexicon: HALOT
  rationale: Se conserva la misma opción pasiva para coherencia con la frase anterior. «Hijo de Cis» reproduce el patronímico de modo natural en español; «Cis» es la forma tradicional española del nombre hebreo קִישׁ.
- source_word: וַיְבַקְשֻׁהוּ
  english_pob_choice: when they sought him
  chosen_spanish: cuando lo buscaron
  alternatives_spanish:
  - cuando lo buscaron afanosamente
  - cuando lo buscaron
  lexicon: HALOT
  rationale: בקשׁ se traduce aquí con el verbo común «buscar», que en español expresa bien la acción concreta de intentar hallarlo. Se evita sobredeterminar intensidad o matiz devocional; el contexto narrativo ya marca que se trataba de una búsqueda efectiva.
- source_word: וְלֹא נִמְצָא
  english_pob_choice: he could not be found
  chosen_spanish: no fue hallado
  alternatives_spanish:
  - no pudieron hallarlo
  - no se encontró
  lexicon: HALOT
  rationale: El nifal de מצא se vierte con la pasiva impersonal «fue hallado», que es sobria y fiel. Se omite una paráfrasis de posibilidad («no pudo») porque el hebreo enfatiza el resultado negativo de la búsqueda.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios y el cotejo cruzado mostró alta coincidencia con el texto fuente y la POB inglesa; esta versión sigue esa lectura sin introducir reinterpretaciones.
  spanish_consistency_notes:
  - Se mantiene la distinción entre «tribu» y «clanes» para reflejar la progresión hebrea de unidad tribal a subgrupos familiares.
  - Se conserva «fue tomado/fue tomada» para el lenguaje del sorteo, evitando «elegido» o «seleccionado» como texto principal porque suavizarían el valor formal del pasivo hebreo.
  - Se usa «Cis» como forma española tradicional del nombre hebreo קִישׁ.
  - Se usa «Benjamín» con tilde según la ortografía española habitual.
