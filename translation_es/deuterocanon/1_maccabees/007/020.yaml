translation:
  language: es
  text: Y estableció la región[a] para Alcimo, y dejó con él una fuerza para ayudarle[b]; y Bacquides se fue al rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Región» traduce χώρα en sentido administrativo-territorial; evita sugerir una entidad política moderna que el texto no presupone.
    reason: lexical_alternative
  - marker: b
    text: «Ayudarle» conserva el propósito de la fuerza dejada con él; también podría entenderse «socorrerle» o «asistirle», pero «ayudarle» es la opción más directa.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατέστησεν
  english_pob_choice: appointed over
  chosen_spanish: estableció ... para
  alternatives_spanish:
  - nombró ... sobre
  - puso ... bajo la autoridad de
  lexicon: BDAG
  rationale: El verbo expresa aquí la colocación de una jurisdicción o administración en manos de Alcimo. En español, «estableció ... para» conserva la idea de asignación oficial sin forzar una estructura demasiado literal; «nombró ... sobre» suena natural, pero puede enfatizar más el cargo que el acto de poner el territorio bajo su control.
- source_word: τὴν χώραν
  english_pob_choice: the country
  chosen_spanish: la región
  alternatives_spanish:
  - el país
  - la tierra
  - el territorio
  lexicon: BDAG
  rationale: χώρα puede significar país, tierra, región o territorio. En este contexto de control político-militar, «región» evita una lectura moderna de nación-estado que sería anacrónica, y mantiene la referencia geográfica-administrativa.
- source_word: ἀφῆκεν
  english_pob_choice: left
  chosen_spanish: dejó
  alternatives_spanish:
  - dejó allí
  - retuvo
  - despachó
  lexicon: BDAG
  rationale: Con μετ’ αὐτοῦ δύναμιν, el sentido es que Bacquides dejó una fuerza junto a Alcimo. «Dejó» reproduce de forma natural la acción de dejar tropas a su lado.
- source_word: δύναμιν
  english_pob_choice: a force
  chosen_spanish: una fuerza
  alternatives_spanish:
  - tropas
  - un destacamento
  - un ejército
  lexicon: BDAG
  rationale: En contexto militar, δύναμις designa una fuerza armada. «Una fuerza» conserva la amplitud del término sin precisar más de lo que el griego dice.
- source_word: τοῦ βοηθεῖν αὐτῷ
  english_pob_choice: to help him
  chosen_spanish: para ayudarle
  alternatives_spanish:
  - para socorrerle
  - para asistirle
  - para venir en su ayuda
  lexicon: BDAG
  rationale: El infinitivo articular expresa propósito. «Para ayudarle» es claro y fiel; en español peninsular sería igualmente posible «ayudarlo», pero se prefiere «ayudarle» por registro neutro y eufónico.
- source_word: ἀπῆλθεν
  english_pob_choice: went away
  chosen_spanish: se fue
  alternatives_spanish:
  - partió
  - se marchó
  - se retiró
  lexicon: BDAG
  rationale: El verbo marca la partida de Bacquides. «Se fue» es idiomático y conserva el simple movimiento de salida sin añadir matices no presentes en el griego.
- source_word: πρὸς τὸν βασιλέα
  english_pob_choice: to the king
  chosen_spanish: al rey
  alternatives_spanish:
  - ante el rey
  - hacia el rey
  - a la corte del rey
  lexicon: BDAG
  rationale: La preposición indica movimiento hacia el rey. «Al rey» es la forma española más directa y natural; el texto griego no explicita «de vuelta», por lo que no se añade.
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego de Swete (1909) y tiene en cuenta el ajuste reciente de la POB inglesa desde una formulación más interpretativa hacia «appointed Alcimus over the country». En español se preserva ese valor administrativo sin introducir una paráfrasis excesiva.
  spanish_consistency_notes:
  - Se mantiene «Bacquides» como transliteración habitual del nombre propio griego.
  - No se usa «Mesías», «Cristo», ni terminología teológica que no aparece en el pasaje.
  - Se evita traducir χώρα como «país» para no anacronizar el contexto helenístico.
  - El pronombre enclítico «ayudarle» mantiene un registro bíblico claro y contemporáneo.
