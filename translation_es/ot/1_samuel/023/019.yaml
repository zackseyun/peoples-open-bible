    rationale: La nota explica la alternativa de בחרשה («en Horesh» vs. «en la zona boscosa»). El marcador debe aparecer en la frase correspondiente; tal como está, induce al lector a pensar que la variante afecta a Guibeá.
  - severity: medium
    issue: «Refugios» debilita el valor léxico de בַמְּצָדוֹת.
    rationale: Aunque comunica la idea de escondite, מְצָדוֹת denota fortalezas/posiciones defensivas. «Fortalezas» preserva mejor el contexto davídico de lugares fortificados sin sonar antinatural.
  - severity: low
    issue: «Monte de Haquilá» es menos preciso que «colina de Haquilá».
    rationale: גִּבְעָה normalmente es ‘colina’ o ‘altura’, no ‘monte’. «Colina» conserva mejor la imagen topográfica del original.
