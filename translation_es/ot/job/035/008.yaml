translation:
  language: es
  text: Tu maldad afecta a un hombre como tú[a], y tu justicia a un ser humano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como tú mismo». Al final del versículo, el hebreo dice literalmente «un hijo de hombre», modismo común aquí para una persona mortal, no un título mesiánico.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְאִישׁ
  english_pob_choice: affects a man
  chosen_spanish: afecta a un hombre
  alternatives_spanish:
  - es para un hombre
  - concierne a un hombre
  lexicon: HALOT
  rationale: La preposición לְ con אִישׁ expresa aquí el ámbito o receptor del efecto en el paralelismo del versículo. En español, hace falta un verbo implícito; «afecta» transmite que la conducta humana tiene efecto sobre otros humanos, no sobre Dios directamente.
- source_word: כָּמוֹךָ
  english_pob_choice: like yourself
  chosen_spanish: como tú
  alternatives_spanish:
  - igual que tú
  - como usted mismo
  lexicon: HALOT
  rationale: El hebreo compara explícitamente al hombre del primer hemistiquio con Job. «Como tú» conserva la comparación directa y natural en español.
- source_word: רִשְׁעֶךָ
  english_pob_choice: your wickedness
  chosen_spanish: tu maldad
  alternatives_spanish:
  - tu perversidad
  - tu maldad moral
  - tu mal
  lexicon: HALOT
  rationale: רֶשַׁע expresa maldad o culpa moral. «Maldad» es claro y fiel al registro ético del verso; «wickedness» no requiere en español un calco más técnico para comunicar el contraste.
- source_word: וּלְבֶן אָדָם
  english_pob_choice: and ... a son of man
  chosen_spanish: y ... un hijo de hombre
  alternatives_spanish:
  - y ... un ser humano
  - y ... un humano
  - y ... un hijo de Adán
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea «hijo de hombre» porque en Job es un modismo para un ser humano mortal, no un título mesiánico. El español permite mantener la expresión sin perder inteligibilidad.
- source_word: צִדְקָתֶךָ
  english_pob_choice: your righteousness
  chosen_spanish: tu justicia
  alternatives_spanish:
  - tu rectitud
  - tu justicia moral
  - tu conducta justa
  lexicon: HALOT
  rationale: El sustantivo puede denotar justicia o rectitud. Aquí el paralelo con «tu maldad» favorece «justicia» como contraparte ética directa y naturalmente comprensible en español.
theological_decisions:
- issue: Sentido de בֶּן אָדָם en contexto
  english_pob_reading: generic human being, rendered formally as 'a son of man'
  chosen_spanish_reading: sentido genérico de ser humano, conservado formalmente como «un hijo de hombre»
  alternative_spanish_readings:
  - un ser humano
  - un hombre mortal
  - el Hijo del Hombre
  rationale: En Job la expresión es poética y genérica, paralela a «un hombre como tú». No debe leerse como título mesiánico. La traducción principal conserva la forma hebrea para no borrar la imagen, mientras que el sentido genérico queda explícito en la nota.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'Coincide con la última revisión del paquete fuente: no se registran cambios respecto del pasaje base, y la propuesta mantiene el sentido, la imagen hebrea y la distinción poética entre «hombre» y «hijo de hombre».'
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque aquí no aparece el nombre divino ni un reemplazo convencional del tetragrámaton.
  - Se conserva la tensión entre la imagen hebrea «hijo de hombre» y su sentido genérico, en vez de neutralizarla completamente.
  - «Maldad» y «justicia» mantienen el paralelismo moral del hebreo con registro natural en español.
  - La puntuación reproduce la unidad poética breve del versículo y el marcador de nota se coloca solo donde hay alternativa lexical explícita.
