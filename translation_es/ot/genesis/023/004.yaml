revisions:
- from: Soy forastero[a] y residente temporal entre ustedes. Denme una posesión funeraria[b] entre ustedes, para que pueda sepultar a mi muerto[c] de delante de mí[d].
  to: Soy forastero y residente temporal[a] entre ustedes. Denme un sitio de sepultura[b] entre ustedes, para que pueda sepultar a mi muerto[c] fuera de mi vista[d].
  rationale: Se revisa para mejorar la naturalidad del español sin perder el matiz del hebreo ni el razonamiento documentado en el audit trail. 'Sitio de sepultura' funciona mejor en el texto principal y la nota preserva el matiz de propiedad de אֲחֻזַּת קֶבֶר. 'Fuera de mi vista' expresa de manera idiomática el sentido contextual de מִלְּפָנַי, mientras la nota conserva la literalidad. También se reubica la nota del primer sintagma para que abarque correctamente el par 'forastero y residente temporal'.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:22:53Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura y la mayor parte del sentido del hebreo: Abraham se presenta como alguien sin estatus pleno de pertenencia y pide un lugar/tenencia para sepultura entre los hititas, con el propósito de enterrar a su difunta. Sin embargo, dos decisiones no reflejan óptimamente ni el audit trail ni el español natural: ''posesión funeraria'' suena poco idiomático para אֲחֻזַּת קֶבֶר, y ''de delante de mí'' mantiene la literalidad pero no la mejor equivalencia funcional documentada para מִלְּפָנַי. También la nota [a] está mal anclada, porque comenta el par גֵּר וְתוֹשָׁב pero solo aparece sobre ''forastero''.'
  spanish_quality_summary: El texto es comprensible, pero tiene giros algo rígidos o poco naturales en español eclesial general. 'Residente temporal' funciona, aunque es algo administrativo. 'Posesión funeraria' no suena idiomático; 'sitio de sepultura' en el texto con nota sobre la tenencia conserva mejor la legibilidad. 'De delante de mí' es demasiado calcado; 'de mi vista' o 'de delante de mi vista' serían más naturales, y 'fuera de mi vista' comunica bien el sentido contextual. También conviene recolocar la nota del primer sintagma para no crear una explicación desalineada.
  glossary_alignment: 'No hay términos teológicos del glosario principal en juego. Las decisiones léxicas relevantes están mayormente alineadas con el expediente inglés: גֵּר/תוֹשָׁב como ''forastero y residente temporal'' es aceptable; עִמָּכֶם -> ''entre ustedes'' está bien; תְּנוּ לִי -> ''Denme'' está bien; מֵתִי -> ''mi muerto'' preserva el modismo. La principal desviación es אֲחֻזַּת קֶבֶר, donde el matiz de propiedad debe conservarse preferiblemente en nota, no forzando un sintagma español poco natural en el texto principal.'
  issues:
  - severity: medium
    issue: '''posesión funeraria'' es poco idiomático para אֲחֻזַּת קֶבֶר'
    rationale: Aunque intenta preservar el matiz de propiedad/tenencia, en español suena artificial y menos claro que 'sitio de sepultura' con nota explicativa sobre la dimensión posesoria.
  - severity: medium
    issue: '''de delante de mí'' es demasiado literal y no refleja bien la equivalencia contextual documentada'
    rationale: El audit trail inglés explica que מִלְּפָנַי significa literalmente 'from before me' pero contextualmente 'out of my sight'. En español conviene una formulación natural como 'fuera de mi vista' y dejar la literalidad en nota.
  - severity: low
    issue: La nota [a] está mal ubicada
    rationale: La nota explica el par גֵּר y תוֹשָׁב, pero el marcador aparece solo tras 'forastero', lo que puede inducir a pensar que solo comenta esa palabra.
  revised_spanish_text: Soy forastero y residente temporal[a] entre ustedes. Denme un sitio de sepultura[b] entre ustedes, para que pueda sepultar a mi muerto[c] fuera de mi vista[d].
  revised_footnotes:
