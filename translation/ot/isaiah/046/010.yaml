id: ISA.46.10
reference: Isaiah 46:10
source:
  edition: WLC
  text: מַגִּ֤יד מֵֽ/רֵאשִׁית֙ אַחֲרִ֔ית וּ/מִ/קֶּ֖דֶם אֲשֶׁ֣ר לֹא נַעֲשׂ֑וּ אֹמֵר֙ עֲצָתִ֣/י תָק֔וּם וְ/כָל חֶפְצִ֖/י אֶעֱשֶֽׂה־־׃
translation:
  text: declaring the end from the beginning[a], and from ancient times things that have not been done, saying, ‘My purpose shall stand[c][b], and I will accomplish all my good pleasure.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'things not yet accomplished' / 'what has not yet happened.' The Hebrew is literally 'things that have not been done.'
    reason: lexical_alternative
  - marker: b
    text: Or 'My counsel shall stand.'
    reason: lexical_alternative
  - marker: c
    text: Or 'I will do all my will' / 'all that I desire.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַגִּיד
  chosen: declaring
  alternatives:
  - making known
  - telling
  lexicon: HALOT
  rationale: Hiphil participle of נגד conveys making something known or declaring it. 'Declaring' fits the elevated prophetic style and pairs naturally with the following temporal phrases.
- source_word: מֵרֵאשִׁית
  chosen: from the beginning
  alternatives:
  - from first things
  - from the outset
  lexicon: HALOT
  rationale: רֵאשִׁית commonly denotes beginning or first part. 'From the beginning' is idiomatic and preserves the temporal contrast with 'the end.'
- source_word: אַחֲרִית
  chosen: the end
  alternatives:
  - the outcome
  - the latter end
  lexicon: HALOT
  rationale: אַחֲרִית can mean end, latter end, or outcome. Here the temporal contrast with רֵאשִׁית favors the straightforward 'the end.'
- source_word: וּמִקֶּדֶם
  chosen: and from ancient times
  alternatives:
  - and from long ago
  - and beforehand
  lexicon: HALOT
  rationale: קֶדֶם in temporal usage refers to ancient time or long ago. 'From ancient times' best matches the parallelism with 'from the beginning' while avoiding redundancy.
- source_word: אֲשֶׁר לֹא נַעֲשׂוּ
  chosen: things that have not been done
  alternatives:
  - what has not yet happened
  - things not yet accomplished
  lexicon: HALOT
  rationale: The Niphal of עשה is literally 'have not been done/made.' In context it refers to future events not yet brought about. The chosen rendering stays close to the Hebrew while remaining natural English.
- source_word: אֹמֵר
  chosen: saying
  alternatives:
  - who says
  lexicon: HALOT
  rationale: The participle continues the self-description of God. 'Saying' preserves the participial flow from 'declaring.'
- source_word: עֲצָתִי
  chosen: My purpose
  alternatives:
  - My counsel
  - My plan
  lexicon: HALOT
  rationale: עֵצָה can mean counsel, plan, or purpose. In this context of divine intention and sovereign execution, 'purpose' communicates intended meaning in clear modern English without the possible ambiguity of 'counsel' as advice.
- source_word: תָקוּם
  chosen: shall stand
  alternatives:
  - will be established
  - will arise
  lexicon: HALOT
  rationale: קום here expresses enduring validity or establishment. 'Shall stand' is both idiomatic and faithful to the metaphor of firmness.
- source_word: וְכָל חֶפְצִי
  chosen: all my pleasure
  alternatives:
  - all that I desire
  - all my will
  - all my delight
  lexicon: HALOT
  rationale: חֵפֶץ denotes delight, desire, or pleasure. In this collocation with divine action, it refers to what God wills or takes pleasure in. 'All my pleasure' preserves the lexical sense more directly than the more interpretive 'all my will.'
- source_word: אֶעֱשֶׂה
  chosen: I will accomplish
  alternatives:
  - I will do
  - I will bring about
  lexicon: HALOT
  rationale: עשה is broadly 'do/make,' but in context of bringing divine purpose to realization, 'accomplish' expresses the result implied by the clause while remaining within the semantic range.
