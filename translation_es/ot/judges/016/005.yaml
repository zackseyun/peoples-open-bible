review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia y el sentido general del hebreo: los dirigentes filisteos se acercan a Dalila, le piden que sonsaque a Sansón, averigüe la fuente de su fuerza, descubra cómo prevalecer contra él, para atarlo y afligirlo, y prometen pagarle cada uno mil cien piezas de plata. Sin embargo, «subieron a ella» suena poco natural en español para וַיַּעֲלוּ אֵלֶיהָ; conviene una formulación idiomática como «fueron a verla» o «se acercaron a ella». Además, פַּתִּי se representa mejor con «sedúcelo» o «persuádelo/sonsácalo» que con «engáñalo», porque el verbo apunta a atraer o inducir para obtener información, no simplemente a engañar en abstracto.'
  spanish_quality_summary: 'El texto es claro y mayormente natural, pero tiene dos puntos de mejora: «subieron a ella» es un calco duro del hebreo, y la nota anclada en «le dijeron[a]» no corresponde al lugar semántico relevante, pues la nota explica la expresión monetaria final. El resto fluye bien y mantiene un registro bíblico moderno y digno.'
  glossary_alignment: 'No hay conflictos con la terminología de proyecto. «Los señores de los filisteos» encaja con סַרְנֵי פְלִשְׁתִּים. «Prevalecer contra él», «atar» y «afligir» siguen adecuadamente el rastro auditado en inglés. La principal decisión léxica a corregir es פַּתִּי: «engáñalo» es posible por contexto, pero no preserva tan bien el matiz de atraer/inducir mediante halago o seducción; «sedúcelo» es más preciso aquí dado el contexto narrativo y sigue evitando una paráfrasis amplia.'
  issues:
  - severity: medium
    issue: «subieron a ella» es poco idiomático en español
    rationale: Aunque עלה con אל puede significar «subir/acercarse a», en español bíblico actual «subieron a ella» suena forzado y ambiguo. Una opción como «fueron a verla» o «se acercaron a ella» preserva el movimiento hacia ella sin calco extraño.
  - severity: medium
    issue: פַּתִּי está mejor traducido que «engáñalo»
    rationale: El hebreo pide que Dalila lo atraiga o sonsaque para que revele su secreto. «Engáñalo» expresa el resultado manipulador, pero pierde el modo de inducirlo. «Sedúcelo» encaja mejor en este contexto narrativo y con la decisión inglesa «Entice».
  - severity: low
    issue: La nota [a] está anclada en un lugar incorrecto
    rationale: La nota explica «mil cien plata», pero el marcador aparece después de «le dijeron». Debe colocarse junto a «mil cien piezas de plata[a]» para que el lector relacione correctamente la aclaración con la expresión monetaria.
  revised_spanish_text: 'Entonces los señores de los filisteos fueron a verla y le dijeron: «Sedúcelo, y mira en qué consiste su gran fuerza, y por qué medio podremos prevalecer contra él, para que lo atemos y lo aflijamos; y cada uno de nosotros te dará mil cien piezas de plata[a]».'
  revised_footnotes:
