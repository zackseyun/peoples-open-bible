base_translation:
  language: en
  yaml_path: translation/deuterocanon/sirach/047/023.yaml
  text: And he gave a remnant to Jacob[a], and to the house of David a root from him. And Solomon lay down with his fathers[c][b], and left behind him one of his offspring.
  footnotes:
  - marker: a
    text: Hebrew 'a root from him'; that is, a continuing line from David through Solomon. The image may also be rendered 'a descendant from him.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew word after 'Solomon lay down' is uncertain in this witness. The Greek parallel reads 'with his fathers,' which is followed here.
    reason: textual_variant
  - marker: c
    text: Or 'an heir' or 'a descendant.' The Hebrew term is rare/uncertain, but the sense is that Solomon left a successor from his own line.
    reason: alternative_reading
