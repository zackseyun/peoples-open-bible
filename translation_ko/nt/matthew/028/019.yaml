id: MAT.28.19
reference: Matthew 28:19
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: πορευθέντες ⸀οὖν μαθητεύσατε πάντα τὰ ἔθνη, ⸀βαπτίζοντες αὐτοὺς εἰς τὸ ὄνομα τοῦ πατρὸς καὶ τοῦ υἱοῦ καὶ τοῦ ἁγίου πνεύματος,
base_translation:
  language: en
  yaml_path: translation/nt/matthew/028/019.yaml
  text: Therefore[a], go and make disciples of all the nations, baptizing them into the name of the Father and of the Son and of the Holy Spirit,
  footnotes:
  - marker: a
    text: Or 'in the name.' The Greek reads 'into the name,' which may emphasize entry into relation or identification.
    reason: alternative_reading
translation:
  language: ko
  text: 「그러므로 너희는 가서 모든 민족을 제자로 삼아, 아버지와 아들과 성령의 이름으로 그들에게 세례를 베풀고,」
  philosophy: optimal-equivalence
theological_decisions:
- issue: 28:19 삼위일체적 세례 정형구 보존
  chosen_reading: 「아버지와 아들과 성령의 이름으로」 — εἰς τὸ ὄνομα를 단수 ʻ이름ʼ으로 보존
  alternative_readings:
  - 「아버지와 아들과 성령의 이름들로」 (복수화)
  - 각각 별도의 이름으로 분리
  rationale: 본 정형구는 헬라어 본문에서 ὄνομα가 단수로, 세 위격이 한 ʻ이름ʼ 아래 묶여 있다. 이 단수 ʻ이름ʼ은 본 정형구를 초기 교회의 세례 의식 본문으로 형성한 핵심 요소이며, 한국어로 옮길 때에도 단수 「이름」으로 보존한다. 또한 βαπτίζοντες를 「세례를 베풀고」로 옮겨, 본 행위가 단회적인 입회 의식임을 분명히 한다.
  doctrine_reference: 'DOCTRINE.md §1, §5: render the source''s strongest plain meaning'
- issue: βαπτίζω의 한국어 등가
  chosen_reading: 「세례」
  alternative_readings:
  - 「침례」
  rationale: 프로젝트 glossary에 따라 βαπτίζω의 기본 한국어 등가는 「세례」이다. 「침례」는 특정 교단(침례교)의 의식 형태(침수)를 전제하는 어휘이므로, 본 번역은 형식 중립적인 「세례」로 옮긴다.
  doctrine_reference: 'Project glossary: βαπτίζω→세례'
