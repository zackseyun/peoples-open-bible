translation:
  language: es
  text: Abner vino[a] a David en Hebrón, y con él había veinte hombres. Y David hizo un banquete para Abner y para los hombres que estaban con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «llegó» o «arribó». El verbo hebreo puede traducirse según el enfoque narrativo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - fue
  lexicon: HALOT
  rationale: El verbo בוא permite traducir según el punto de vista del relato. Aquí el movimiento se orienta hacia David en Hebrón; en español, «vino» conserva naturalmente esa dirección sin forzar un calco.
- source_word: אֶל דָּוִד חֶבְרוֹן
  english_pob_choice: to David at Hebron
  chosen_spanish: a David en Hebrón
  alternatives_spanish:
  - a David, en Hebrón
  - ante David en Hebrón
  lexicon: HALOT
  rationale: El hebreo une la persona y el lugar sin una preposición explícita antes del topónimo; en español, «a David en Hebrón» expresa de manera natural que Hebrón es el lugar donde estaba David.
- source_word: וְאִתּוֹ עֶשְׂרִים אֲנָשִׁים
  english_pob_choice: and twenty men were with him
  chosen_spanish: y con él venían veinte hombres
  alternatives_spanish:
  - y veinte hombres estaban con él
  - y con él había veinte hombres
  lexicon: HALOT
  rationale: La construcción hebrea es sin verbo explícito; en español, un verbo de acompañamiento como «venían» mantiene la relación de compañía y suena más natural que una simple inserción copulativa.
- source_word: וַיַּעַשׂ ... מִשְׁתֶּה
  english_pob_choice: made a feast
  chosen_spanish: hizo un banquete
  alternatives_spanish:
  - hizo una fiesta
  - preparó un banquete
  lexicon: HALOT
  rationale: El hebreo עשה + משתה se refleja bien con «hacer un banquete». «Banquete» conserva el matiz de comida solemne o festiva, y evita reducirlo a una simple comida.
- source_word: מִשְׁתֶּה
  english_pob_choice: feast
  chosen_spanish: banquete
  alternatives_spanish:
  - festín
  - fiesta
  lexicon: HALOT
  rationale: מִשְׁתֶּה designa una comida festiva; «banquete» es una opción clara y digna en español. «Festín» puede sonar más literario o excesivo, y «fiesta» es demasiado general.
- source_word: לְאַבְנֵר וְלָאֲנָשִׁים אֲשֶׁר אִתּוֹ
  english_pob_choice: for Abner and for the men who were with him
  chosen_spanish: para Abner y para los hombres que estaban con él
  alternatives_spanish:
  - para Abner y para los hombres que con él estaban
  - para Abner y sus hombres
  lexicon: HALOT
  rationale: Se conserva la repetición de ל con «para ... y para ...», tal como la POB inglesa preserva la estructura. «Los hombres que estaban con él» mantiene la explicitud del hebreo frente a una simplificación como «sus hombres».
translation_notes:
  revision_awareness: 'Se siguió el pasaje base hebreo WLC y se tuvo en cuenta la decisión auditada de la POB inglesa: traducir בוא según el punto de vista del relato, preservar la estructura de compañía con veinte hombres y mantener la repetición de ל en la frase final. No hubo revisiones aplicadas en el contexto inglés; la redacción española adopta equivalentes naturales sin perder las tensiones léxicas documentadas.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque el versículo no contiene el Tetragrámaton ni una cita directa de Yahvé.
  - Se eligió «banquete» como término principal para מִשְׁתֶּה, manteniendo un registro digno y bíblicamente reconocible.
  - Se conservó «hombres» para אֲנָשִׁים, porque el contexto refiere a acompañantes masculinos concretos.
