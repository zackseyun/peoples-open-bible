translation:
  language: es
  text: 'Pero no puso a muerte a sus hijos[a], porque está escrito en la Ley, en el Libro de Moisés, donde Yahvé mandó, diciendo: «Los padres no serán puestos a muerte por los hijos, y los hijos no serán puestos a muerte por los padres; sino que cada hombre morirá por su propio pecado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «los padres no morirán por los hijos, y los hijos no morirán por los padres». El modismo legal hebreo se traduce en el texto principal como «ser puestos a muerte» para dejar claro el sentido judicial.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֶת בְּנֵי/הֶם
  english_pob_choice: But ... their sons
  chosen_spanish: Pero ... a sus hijos
  alternatives_spanish:
  - Y ... a sus hijos
  - Pero ... a sus hijos varones
  lexicon: HALOT
  rationale: El contraste discursivo de וְ aquí sigue la acción anterior, por eso «Pero» conserva la oposición. בְּנֵיהֶם es literalmente «sus hijos»; en español, «a sus hijos» fluye de forma natural con el verbo causativo, sin necesidad de forzar una calca con «hijos varones».
- source_word: לֹא הֵמִית
  english_pob_choice: he did not put to death
  chosen_spanish: no hizo morir
  alternatives_spanish:
  - no mató
  - no ejecutó
  lexicon: HALOT
  rationale: El hebreo usa el Hifil de מות, con sentido causativo. «Hizo morir» conserva mejor el valor causativo que «mató», y en español sigue siendo claro que se trata de una acción judicial de quitar la vida.
- source_word: כִּי כַכָּתוּב
  english_pob_choice: because it is written
  chosen_spanish: porque está escrito
  alternatives_spanish:
  - pues está escrito
  - porque, como está escrito
  lexicon: HALOT
  rationale: La fórmula causal introducida por כִּי se expresa de manera natural con «porque». «Está escrito» conserva la apelación a la autoridad textual sin añadir interpretación.
- source_word: בַּתּוֹרָה בְּסֵפֶר מֹשֶׁה
  english_pob_choice: in the Law, in the Book of Moses
  chosen_spanish: en la Ley, en el Libro de Moisés
  alternatives_spanish:
  - en la Torá, en el Libro de Moisés
  - en la Ley de Moisés
  lexicon: HALOT
  rationale: En esta cita legal, תּוֹרָה se rinde mejor como «Ley» en español bíblico transparente. «Libro de Moisés» se conserva de forma formal y reconocible, sin sustituirlo por una paráfrasis más amplia.
- source_word: אֲשֶׁר צִוָּה יְהוָה
  english_pob_choice: where Yahweh commanded
  chosen_spanish: donde Yahvé mandó
  alternatives_spanish:
  - que Yahvé mandó
  - según mandó Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como «Yahvé» conforme al criterio del proyecto. «Mandó» comunica el mandato divino de forma directa y bíblica; «donde» reproduce la función relativa de אֲשֶׁר en la cadena de cita.
- source_word: לֵ/אמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - 'así:'
  lexicon: HALOT
  rationale: Es la fórmula introductoria estándar de cita. «Diciendo» preserva la continuidad sintáctica del hebreo sin sobrecargar la frase.
- source_word: לֹא יָמ֨וּתוּ אָב֤וֹת עַל בָּנִים
  english_pob_choice: Fathers shall not be put to death for sons
  chosen_spanish: Los padres no morirán por los hijos
  alternatives_spanish:
  - Los padres no serán muertos por los hijos
  - Los padres no serán puestos a muerte por los hijos
  lexicon: HALOT
  rationale: El hebreo tiene una formulación legal pasiva/jussiva. En español, «no morirán por» es una manera fiel y natural de reproducir el principio jurídico, sin introducir un giro demasiado técnico que entorpezca la lectura.
- source_word: וּ/בָנִים֙ לֹא יָמ֣וּתוּ עַל אָב֔וֹת
  english_pob_choice: and sons shall not be put to death for fathers
  chosen_spanish: y los hijos no morirán por los padres
  alternatives_spanish:
  - y los hijos no serán muertos por los padres
  - y los hijos no serán puestos a muerte por los padres
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con la primera cláusula y la misma solución para el idiomatismo legal. «Hijos» reproduce בָּנִים de forma directa y comprensible.
- source_word: כִּ֛י אִ֥ישׁ בְּ/חֶטְא֖/וֹ יָמֽוּתוּ
  english_pob_choice: but each man shall die for his own sin
  chosen_spanish: sino que cada hombre morirá por su propio pecado
  alternatives_spanish:
  - sino que cada uno morirá por su propio pecado
  - porque cada hombre morirá por su pecado
  lexicon: HALOT
  rationale: כִּי aquí introduce la razón o fundamento de la norma; en español, «sino que» expresa bien el contraste normativo con las cláusulas anteriores. אִישׁ se traduce como «cada hombre» para mantener el singular distributivo, y בְּחֶטְאוֹ como «por su propio pecado» para hacer explícita la responsabilidad individual.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Siguiendo la convención del proyecto, se conserva el nombre propio divino en español como «Yahvé» en vez de ocultarlo tras un título funcional.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Principio legal de responsabilidad penal individual
  english_pob_reading: each man shall die for his own sin
  chosen_spanish_reading: cada hombre morirá por su propio pecado
  alternative_spanish_readings:
  - cada uno morirá por su propio pecado
  - cada hombre será castigado por su propio pecado
  rationale: La cláusula final formula una máxima legal de responsabilidad personal. Se evita suavizarla en exceso con vocabulario más general como «castigado», porque el hebreo mantiene el verbo de morir dentro del marco jurídico.
  doctrine_reference: 'Cross-reference: Deuteronomio 24:16; Ezequiel 18:20'
translation_notes:
  revision_awareness: Se mantuvo la lectura auditada del inglés POB respecto al valor jurídico de מות, pero en español se prefirió una solución natural («no morirán por») para evitar un calco rígido. No se añadieron notas porque la tensión lexical principal quedó resuelta en el cuerpo del texto sin perder el sentido legal.
  spanish_consistency_notes:
  - Se usó «Yahvé» como forma estándar del Tetragrámaton.
  - Se tradujo תּוֹרָה como «Ley» en un contexto jurídico-citacional.
  - Se mantuvo la estructura paralela de las dos cláusulas prohibitiva-negativas.
  - Se conservó «cada hombre» para reflejar el singular distributivo de אִישׁ.
