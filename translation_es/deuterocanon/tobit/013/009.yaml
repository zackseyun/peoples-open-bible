translation:
  language: es
  text: 'Jerusalén[a], ciudad del Santo: te azotará por las obras de tus hijos e hijas[b], y de nuevo tendrá misericordia de los hijos e hijas[b] de los justos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ciudad de un santo»; el genitivo griego puede entenderse de manera más general, aunque en contexto lo más probable es que se refiera a Dios.
    reason: lexical_alternative
  - marker: b
    text: El griego dice «hijos» en ambas frases; aquí se traduce «hijos e hijas» porque el sentido es colectivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἱεροσόλυμα
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalem
  lexicon: LSJ
  rationale: Es el nombre propio de la ciudad; en español bíblico y moderno, «Jerusalén» es la forma natural y reconocible.
- source_word: πόλις
  english_pob_choice: city
  chosen_spanish: ciudad
  alternatives_spanish:
  - población
  - villa
  lexicon: LSJ
  rationale: El sustantivo apposicional identifica a Jerusalén como ciudad; «ciudad» reproduce con claridad la relación explicativa del griego.
- source_word: ἁγίου
  english_pob_choice: the Holy One
  chosen_spanish: del Santo
  alternatives_spanish:
  - del Santo Uno
  - de un santo
  - de la ciudad santa
  lexicon: LSJ
  rationale: El genitivo singular en contexto probablemente alude a Dios, pero el griego admite cierta amplitud. «Del Santo» conserva la ambigüedad reverente sin forzar una paráfrasis excesiva; el sentido divino queda explicado en la nota.
- source_word: μαστιγώσει
  english_pob_choice: will scourge
  chosen_spanish: te azotará
  alternatives_spanish:
  - te castigará
  - te flagelará
  - te afligirá
  lexicon: LSJ
  rationale: El verbo tiene fuerza corporal de azotar/flagelar y también puede usarse metafóricamente para castigo severo. «Azotará» conserva esa viveza disciplinaria en español.
- source_word: ἐπὶ τὰ ἔργα
  english_pob_choice: for the works
  chosen_spanish: por las obras
  alternatives_spanish:
  - a causa de las obras
  - por razón de las obras
  - debido a las obras
  lexicon: LSJ
  rationale: La preposición con acusativo expresa base o causa. «Por» es natural en español y mantiene la relación causal sin sobrecargar la frase.
- source_word: τῶν υἱῶν σου
  english_pob_choice: your children
  chosen_spanish: tus hijos
  alternatives_spanish:
  - tus hijos e hijas
  - tus descendientes
  lexicon: LSJ
  rationale: Aunque el griego usa literalmente «hijos/sons», el contexto colectivo y poético permite una referencia amplia. Aquí se conserva la forma masculina del original, coherente con el tenor de la fuente.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: de nuevo
  alternatives_spanish:
  - otra vez
  - nuevamente
  lexicon: LSJ
  rationale: Marca la reversión tras el juicio; «de nuevo» es fluido y exacto en español.
- source_word: ἐλεήσει
  english_pob_choice: will show mercy
  chosen_spanish: tendrá misericordia
  alternatives_spanish:
  - mostrará misericordia
  - será misericordioso con
  lexicon: LSJ
  rationale: El verbo expresa misericordia activa. «Tendrá misericordia» es una fórmula española tradicional y fiel al valor verbal; «mostrará» se evita para no endurecer la construcción.
- source_word: τοὺς υἱοὺς τῶν δικαίων
  english_pob_choice: the children of the righteous
  chosen_spanish: los hijos de los justos
  alternatives_spanish:
  - los hijos de los rectos
  - los descendientes de los justos
  lexicon: LSJ
  rationale: Se mantiene la estructura del griego y la categoría moral de «los justos»; en español, la literalidad aquí es clara y natural.
theological_decisions:
- issue: Sujeto implícito de los verbos futuros
  english_pob_reading: God is the implied subject throughout the verse.
  chosen_spanish_reading: Dios es el sujeto implícito tanto de «azotará» como de «tendrá misericordia».
  alternative_spanish_readings:
  - Jerusalén como foco gramatical sin sujeto explícito
  - una lectura impersonal de los verbos
  rationale: El texto dirige la voz a Jerusalén, pero la acción de juicio y misericordia pertenece al ámbito divino. El español requiere un sujeto expreso en este tipo de formulación; la traducción lo deja implícito, como en el griego, y la nota aclara el referente reverente del genitivo «del Santo».
  doctrine_reference: Mantener la tensión fuente-sentido sin imponer una explicitación innecesaria; coherente con la lectura teológica del contexto.
- issue: Lenguaje filial masculino en plural
  english_pob_reading: children for both occurrences of υἱοί
  chosen_spanish_reading: «hijos» en ambas ocurrencias
  alternative_spanish_readings:
  - «niños»
  - «descendientes»
  - «hijos e hijas»
  rationale: El griego usa υἱοί, y aquí la referencia es colectiva. En español, «hijos» conserva mejor la correspondencia lexical con el original que una neutralización más amplia; el contexto poético permite ese uso genérico.
  doctrine_reference: Fidelidad lexical con sensibilidad de uso colectivo, sin borrar la forma masculina del texto fuente.
translation_notes:
  revision_awareness: 'Revisado con el paquete fuente griego de Swete (1909) y el audit trail inglés. No se introdujeron cambios respecto del sentido confirmado por el rastreo: se preservó el sujeto implícito divino, la fuerza disciplinaria de μαστιγώσει y el paralelismo entre «hijos de tus hijos» y «hijos de los justos» en una forma española publicable.'
  spanish_consistency_notes:
  - Se usa «Jerusalén» como nombre propio estándar y no una transliteración extraña.
  - «Del Santo» conserva la posible referencia divina sin resolverla prematuramente en el cuerpo del texto.
  - Se mantuvo la reiteración de «hijos» para reflejar el paralelismo del griego; la nota explica la forma masculina.
  - «Tendrá misericordia» equilibra naturalidad española y cercanía al verbo ἐλεήσει.
  - La puntuación con dos puntos reproduce bien la pausa fuerte del griego entre invocación y predicación.
