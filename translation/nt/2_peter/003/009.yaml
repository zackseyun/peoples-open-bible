id: 2PE.3.9
reference: 2 Peter 3:9
source:
  edition: SBLGNT
  text: οὐ βραδύνει ⸀κύριος τῆς ἐπαγγελίας, ὥς τινες βραδύτητα ἡγοῦνται, ἀλλὰ μακροθυμεῖ εἰς ⸀ὑμᾶς, μὴ βουλόμενός τινας ἀπολέσθαι ἀλλὰ πάντας εἰς μετάνοιαν χωρῆσαι.
translation:
  text: The Lord is not slow concerning the promise[a], as some consider slowness, but is patient toward you[c][b], not wanting any to perish but all to come to repentance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as some count it slowness.'
    reason: lexical_alternative
  - marker: b
    text: Or 'is patient with you.'
    reason: lexical_alternative
  - marker: c
    text: The scope of 'any' and 'all' is left as stated in the Greek; interpreters differ on whether Peter refers specifically to his readers or more broadly to humanity.
    reason: alternative_reading
lexical_decisions:
- source_word: κύριος
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Follows the project's default rendering for κύριος as a title. The article is supplied naturally in English. Capitalized as a divine/christological title in context.
- source_word: βραδύνει
  chosen: is not slow
  alternatives:
  - does not delay
  - is not tardy
  lexicon: BDAG
  rationale: The verb denotes slowness/delay. 'Is not slow' preserves the lexical link with βραδύτητα later in the verse better than 'does not delay,' allowing the rhetorical repetition to remain visible in English.
- source_word: τῆς ἐπαγγελίας
  chosen: about the promise
  alternatives:
  - concerning the promise
  - with respect to the promise
  - in fulfilling the promise
  lexicon: BDAG
  rationale: The genitive after βραδύνω is idiomatically rendered in English with 'about/concerning.' 'About the promise' is concise and natural while avoiding the interpretive expansion 'in fulfilling,' which is implied but not explicit.
- source_word: ὥς τινες βραδύτητα ἡγοῦνται
  chosen: as some consider slowness
  alternatives:
  - as some count it slowness
  - as some think of it as delay
  lexicon: BDAG
  rationale: ἡγέομαι here means 'consider/regard.' 'Consider slowness' is clear modern English and keeps the noun βραδύτης explicit. Traditional 'count ... slackness' is less accessible and 'slackness' is archaic.
- source_word: μακροθυμεῖ
  chosen: is patient
  alternatives:
  - is longsuffering
  - shows forbearance
  lexicon: BDAG
  rationale: The verb conveys patient restraint over time. 'Is patient' is readable modern English; 'longsuffering' is accurate but archaic, and 'forbearance' is more abstract.
- source_word: εἰς ὑμᾶς
  chosen: toward you
  alternatives:
  - with you
  - for your sake
  lexicon: BDAG
  rationale: εἰς with persons here indicates direction of attitude/action. 'Toward you' is a close and natural rendering. 'With you' is possible but slightly more idiomatic than literal; 'for your sake' overinterprets purpose.
- source_word: μὴ βουλόμενός
  chosen: not wanting
  alternatives:
  - not wishing
  - not intending
  lexicon: BDAG
  rationale: βούλομαι expresses will/desire/intention. 'Not wanting' is natural and preserves the volitional sense without importing stronger decretive language than the participle itself requires.
- source_word: τινας ἀπολέσθαι
  chosen: any to perish
  alternatives:
  - anyone to perish
  - any to be destroyed
  lexicon: BDAG
  rationale: ἀπόλλυμι in the middle/intransitive infinitive here means 'perish/be lost.' 'Perish' is the established and suitably weighty English equivalent. 'Be destroyed' is possible but can sound more externally causative than the Greek infinitive here.
- source_word: πάντας
  chosen: all
  alternatives:
  - everyone
  - all people
  lexicon: BDAG
  rationale: The adjective is broad and parallel to 'any.' 'All' preserves the concise antithesis of the Greek. More explicit expansions like 'all people' are interpretive.
- source_word: εἰς μετάνοιαν χωρῆσαι
  chosen: to come to a change of mind
  alternatives:
  - to reach repentance
  - to make room for repentance
  lexicon: BDAG
  rationale: χωρέω here idiomatically means to move into/reach a state. 'Come to repentance' is clear idiomatic English and accurately conveys entry into repentance. 'Reach repentance' is more wooden; the literal spatial nuance is not primary in English.
