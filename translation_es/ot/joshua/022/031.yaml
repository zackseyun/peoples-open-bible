translation:
  language: es
  text: 'Y Finés, hijo de Eleazar el sacerdote, dijo a los hijos de Rubén[a], y a los hijos de Gad, y a los hijos de Manasés: «Hoy sabemos que Yahvé está entre nosotros, porque ustedes no han actuado infielmente contra Yahvé en este asunto[b]. Entonces han librado a los hijos de Israel de la mano de Yahvé[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en medio de nosotros».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «no han actuado infielmente contra Yahvé con esta infidelidad»; el giro apunta a una traición o ruptura de fidelidad pactal.'
    reason: lexical_alternative
  - marker: c
    text: «De la mano de Yahvé» es un hebraísmo para ser librados de su poder o juicio.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y ... dijo
  alternatives_spanish:
  - Entonces ... dijo
  lexicon: HALOT
  rationale: La narración hebrea con waw consecutiva se refleja de forma natural y transparente con «Y ... dijo», conservando el flujo narrativo sin forzar una relación temporal más fuerte de la que exige el texto.
- source_word: פִּינְחָס בֶּן אֶלְעָזָר הַכֹּהֵן
  english_pob_choice: Phinehas son of Eleazar the priest
  chosen_spanish: Finés, hijo de Eleazar el sacerdote
  alternatives_spanish:
  - Finees, hijo de Eleazar, el sacerdote
  - Pinjás, hijo de Eleazar el sacerdote
  lexicon: HALOT
  rationale: Se mantiene la fórmula identificadora con mínima adaptación al español. «Finés» sigue una forma castellana reconocible del nombre, y «el sacerdote» conserva la apposición simple del hebreo.
- source_word: אֶל בְּנֵי רְאוּבֵן וְאֶל בְּנֵי גָד וְאֶל בְּנֵי מְנַשֶּׁה
  english_pob_choice: to the sons of Reuben, and to the sons of Gad, and to the sons of Manasseh
  chosen_spanish: a los hijos de Rubén, y a los hijos de Gad, y a los hijos de Manasés
  alternatives_spanish:
  - a los rubenitas, y a los gaditas, y a los manasitas
  - a los descendientes de Rubén ...
  lexicon: HALOT
  rationale: Se conserva la repetición de la preposición y de «hijos de» para reflejar con transparencia la forma hebrea, como hace el POB inglés. «Hijos de» es más cercano al texto fuente que gentilicios tribales.
- source_word: הַיּוֹם
  english_pob_choice: Today
  chosen_spanish: Hoy
  alternatives_spanish:
  - Este día
  - Ahora
  lexicon: HALOT
  rationale: «Hoy» es la equivalencia natural y directa del adverbio temporal, manteniendo la inmediatez de la afirmación.
- source_word: יָדַעְנוּ
  english_pob_choice: we know
  chosen_spanish: sabemos
  alternatives_spanish:
  - hemos sabido
  - ahora sabemos
  lexicon: HALOT
  rationale: El perfecto hebreo tiene fuerza presente en este contexto; «sabemos» comunica certeza actual de manera idiomática en español.
- source_word: בְּתוֹכֵנוּ
  english_pob_choice: among us
  chosen_spanish: entre nosotros
  alternatives_spanish:
  - en medio de nosotros
  - en nuestro interior
  lexicon: HALOT
  rationale: «Entre nosotros» expresa la presencia divina en el grupo de forma natural en español y evita una calca innecesaria, sin perder el valor comunitario de la frase.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se sigue el default del proyecto para el nombre divino. «Yahvé» es el equivalente español establecido por la política del POB.
- source_word: מְעַלְתֶּם ... הַמַּעַל הַזֶּה
  english_pob_choice: you have not acted unfaithfully ... in this matter
  chosen_spanish: no han sido infieles ... en este asunto
  alternatives_spanish:
  - no han obrado con traición ... en esta traición
  - no han cometido esta infidelidad ...
  lexicon: HALOT
  rationale: La raíz מעל expresa ruptura de fidelidad/covenantal. «No han sido infieles» conserva esa carga moral sin recurrir a un término arcaico o demasiado técnico. «En este asunto» recoge el valor demostrativo de הַזֶּה y evita una repetición extraña en español.
- source_word: בַּֽ/יהוָה
  english_pob_choice: against Yahweh
  chosen_spanish: contra Yahvé
  alternatives_spanish:
  - respecto de Yahvé
  - frente a Yahvé
  lexicon: HALOT
  rationale: Con מעל, la preposición indica la dirección de la falta hacia la deidad; «contra Yahvé» comunica claramente la relación de culpa y preserve la fuerza ética del hebreo.
- source_word: הִצַּלְתֶּם
  english_pob_choice: you have delivered
  chosen_spanish: han librado
  alternatives_spanish:
  - han rescatado
  - han salvado
  lexicon: HALOT
  rationale: נצל en causativo puede ser «librar» o «rescatar». «Han librado» suena natural y solemne en español, y encaja con la formulación de la liberación respecto del juicio divino.
- source_word: מִיַּד יְהוָה
  english_pob_choice: from the hand of Yahweh
  chosen_spanish: de la mano de Yahvé
  alternatives_spanish:
  - del poder de Yahvé
  - de la mano de Dios
  lexicon: HALOT
  rationale: Se conserva el hebraísmo de «mano» porque el POB inglés también lo retiene y porque en español es comprensible como idiomático de poder/jucio divino. Mantenerlo evita suavizar una expresión cargada de solemnidad.
theological_decisions:
- issue: Presencia divina expresada por בְּתוֹכֵנוּ
  english_pob_reading: the LORD is among us
  chosen_spanish_reading: Yahvé está entre nosotros
  alternative_spanish_readings:
  - Yahvé está en medio de nosotros
  - Yahvé está en nuestro interior
  rationale: La frase afirma la presencia pactal de Yahvé con Israel en contraste con la sospecha de infidelidad. «Entre nosotros» mantiene la idea comunitaria sin añadir categorías teológicas ajenas al pasaje.
  doctrine_reference: Translation philosophy §3, §6
- issue: Sentido moral-covenantal de מעל
  english_pob_reading: acted unfaithfully against the LORD
  chosen_spanish_reading: no han sido infieles contra Yahvé
  alternative_spanish_readings:
  - no han cometido traición contra Yahvé
  - no han faltado a la fidelidad debida a Yahvé
  rationale: El texto no describe un simple error ritual, sino una ruptura de fidelidad de carácter pactual. «Ser infiel» comunica bien esa gravedad en español y preserva la tensión moral del hebreo.
  doctrine_reference: Translation philosophy §5, §6
- issue: Idiomatismo de 'from the hand of Yahweh'
  english_pob_reading: from the hand of the LORD
  chosen_spanish_reading: de la mano de Yahvé
  alternative_spanish_readings:
  - del poder de Yahvé
  - del juicio de Yahvé
  rationale: Se retiene la imagen para no sobreexplicar el alcance de la expresión. El contexto ya deja ver que se trata de haber sido librados de la posible acción judicial de Yahvé, y la imagen bíblica conserva esa solemnidad.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: No hubo cambios aplicados en la última revisión en inglés; el pasaje fue considerado de alta concordancia con solo observaciones menores, así que la redacción española se mantiene cercana al texto fuente y al audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en todo el versículo, conforme al estándar del proyecto.
  - Se conserva la repetición estructural de «a los hijos de ...» para reflejar el hebreo y el audit trail inglés.
  - «Entre nosotros» y la nota alternativa preservan la tensión entre literalidad e idiomatismo sin borrar la posibilidad de «en medio de nosotros».
  - «No han sido infieles» y «de la mano de Yahvé» mantienen la carga moral y el hebraísmo respetados por el POB inglés.
