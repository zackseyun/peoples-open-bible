    reason: alternative_reading
  - marker: b
    text: O «la realeza» o «el reinado». El sustantivo hebreo puede denotar «reino», «realeza» o «reinado».
    reason: lexical_alternative
  revision_rationale: Se ajusta «entre las naciones» a «sobre las naciones» para reflejar con mayor precisión el sentido de gobierno/dominio del hebreo y del expediente inglés. También se añade la nota léxica sobre הַמְּלוּכָה para preservar las alternativas significativas documentadas.
