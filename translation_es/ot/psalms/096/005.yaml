translation:
  language: es
  text: Porque todos los dioses de los pueblos son ídolos[a][b], pero Yahvé[c] hizo los cielos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «los pueblos»; también puede traducirse «las naciones».
    reason: lexical_alternative
  - marker: b
    text: 'O: «ídolos inútiles». El término hebreo puede tener un matiz polémico de vacuidad o inutilidad.'
    reason: lexical_alternative
  - marker: c
    text: Hebreo YHWH; tradicionalmente, «el SEÑOR».
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque
  lexicon: HALOT
  rationale: El hebreo introduce la razón de la afirmación anterior. En español, «Porque» expresa con naturalidad esa relación causal sin perder el tono poético del verso.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todos
  - cada uno de
  lexicon: HALOT
  rationale: La fuerza distributiva/colectiva se conserva de forma natural con «todos».
- source_word: אֱלֹהֵי
  english_pob_choice: gods
  chosen_spanish: dioses
  alternatives_spanish:
  - dioses
  - deidades
  lexicon: HALOT
  rationale: En este contexto se trata de las divinidades veneradas por las naciones. «Dioses» es directo y mantiene el contraste con Yahvé.
- source_word: הָעַמִּים
  english_pob_choice: the peoples
  chosen_spanish: los pueblos
  alternatives_spanish:
  - los pueblos
  - las naciones
  lexicon: HALOT
  rationale: «Pueblos» refleja bien el hebreo עַמִּים y conserva el matiz étnico-poético del original; «naciones» sería una alternativa contextual válida.
- source_word: אֱלִילִים
  english_pob_choice: idols
  chosen_spanish: ídolos
  alternatives_spanish:
  - ídolos
  - ídolos inútiles
  - nadas
  lexicon: HALOT
  rationale: El término designa ídolos y también lleva una carga polémica de vacuidad o nulidad. En el texto principal, «ídolos» es la opción más fiel y sobria; la connotación despectiva queda disponible en nota.
- source_word: וַיהוָה
  english_pob_choice: but the LORD
  chosen_spanish: pero Yahvé
  alternatives_spanish:
  - pero Yahvé
  - y Yahvé
  lexicon: HALOT
  rationale: El hebreo marca un contraste fuerte entre los dioses falsos y el único Creador. Se mantiene ese valor adversativo con «pero» y se sigue el criterio del proyecto de traducir YHWH como «Yahvé».
- source_word: שָׁמַיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - los cielos
  - el cielo
  - los cielos y la tierra
  lexicon: HALOT
  rationale: El plural hebreo se conserva con «los cielos», forma natural en español bíblico para este contexto de creación.
- source_word: עָשָׂה
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - hizo
  - creó
  - formó
  lexicon: HALOT
  rationale: El verbo עָשָׂה significa ampliamente «hacer». «Hizo» reproduce con más exactitud el valor verbal sin introducir la especificidad teológica de «creó» que no está en el hebreo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה / YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  rationale: El audit trail inglés preserva el nombre divino como «Yahweh» en vez de ocultarlo bajo un título. En español se sigue el equivalente del proyecto, «Yahvé», para mantener la transparencia del nombre de pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh/Yahvé'
- issue: Tensión léxica de אֱלִילִים entre ‘ídolos’ y ‘ídolos inútiles / nadas’
  english_pob_reading: idols
  chosen_spanish_reading: ídolos
  alternative_spanish_readings:
  - ídolos inútiles
  - nadas
  - ídolos vacíos
  rationale: El inglés principal opta por «idols» y reserva la valoración polemizante en nota. En español se conserva la misma base léxica para no sobrecargar el texto, dejando abierta la fuerza despectiva del término hebreo.
  doctrine_reference: HALOT; criterio POB de preservar tensiones léxicas documentadas
translation_notes:
  revision_awareness: 'Se siguió el estado más reciente del expediente: la revisión final indica que no se requieren cambios y el control cruzado reporta alto acuerdo. La redacción española conserva la estructura semántica del hebreo y la decisión inglesa auditada: contraste fuerte con «pero», nombre divino transliterado como forma de pacto, y nota explicativa para el matiz de אֱלִילִים.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para YHWH, conforme al estándar del proyecto.
  - Se usó «pueblos» para הָעַמִּים, con nota de alternativa «naciones».
  - Se preservó «ídolos» como núcleo léxico principal, sin expandirlo en el texto principal.
  - Se eligió «hizo» para עָשָׂה, evitando introducir «creó» como especificación no explícita en el hebreo.
  - La puntuación refleja el paralelismo poético y el contraste adversativo del verso.
