translation:
  text: '1[a]. And it came to pass, when the children of men began to multiply on the face of the earth, and daughters were born to them, that in a certain year of this jubilee the angels of God saw them, that they were beautiful to look upon; and they took wives for themselves from all whom they chose, and they bore children for them, and these were the giants.

    2. And lawlessness increased on the earth, and all flesh corrupted its way, from men to cattle, and to beasts, and to birds, and to everything that moves on the earth. All of them corrupted their ways and their ordinances, and they began to devour one another; and lawlessness increased on the earth[b], and every imagination of the thoughts of all the children of men was thus evil all the days.

    3. And the Lord saw the earth, and behold, it was ruined, and all flesh had corrupted its order, and all who were on the earth had done evil before his eyes.

    4. And he said, “I shall destroy man and all flesh from upon the face of the earth, which I created.”

    5. But Noah alone found favor before the eyes of the Lord.

    6. And against his angels whom he had sent to the earth he was exceedingly angry, to uproot them from all their dominion; and he told us to bind them in the depths of the earth, and behold, they are bound in their midst and are kept separate.

    7. And concerning their sons, a word went out from before his face that they should be struck with the sword and removed from under heaven.

    8. And he said, “My spirit shall not abide upon man forever, for they too are flesh; and their days shall be one hundred and twenty years.”

    9. And he sent his sword among them so that each might kill his fellow, and they began to kill one another until they all fell by the sword and were wiped out from the earth.

    10. And their fathers were watching, and afterward they were bound in the depths of the earth forever, until the day of the great judgment, for the judgment of all who corrupted their ways and their deeds before the Lord.

    11. And he destroyed all from their places, and not one of them remained whom he did not judge according to all their wickedness.

    12. And he made for all his works a new and righteous nature, so that they should not sin in all their whole nature forever, but should all be righteous, each according to its kind, all the days.

    13. And all this was ordained and written on the heavenly tablets, and there is no injustice for all who depart from the path that was appointed for them to walk in.

    14. And if they do not walk in it, judgment is written down for every creature and for every kind. And there is nothing in heaven or on earth, or in light or in darkness, or in Sheol or in the deep or in the place of gloom—everything is ordained and written and engraved.

    15. Concerning all, he will judge the great according to his greatness, and the small according to his smallness, and each one according to his way.

    16. And he is not one who shows partiality, nor one who receives gifts, if he says that he will execute judgment on each. Even if one gave everything that is on the earth, he would not show partiality or receive it, nor would he be swayed from his hand, for he is a righteous judge.

    17. And concerning the children of Israel it has been written and ordained: if they turn to him in righteousness, he will forgive all their transgressions and pardon all their sins.

    18. It has been written and ordained that he will show mercy to all who turn from all their error, once each year.

    19. But for all those who corrupted their ways and their plans before the Flood, no partiality was shown, except to Noah alone; for partiality was shown to him on account of his sons, whom he saved from the waters of the Flood because of him, since his heart was righteous in all his ways, according to what had been commanded concerning him, and he did not deviate from anything that had been appointed for him.

    20. And the Lord said, “Let everything that is on the dry land be destroyed: from man to cattle, and to beasts, and to the birds of heaven, and to whatever moves on the earth.”

    21. And he commanded Noah to make for himself an ark, so that he might be saved from the waters of the Flood.

    22. And Noah made the ark in every respect as he had been commanded, in the twenty-seventh jubilee of years, in the fifth week, in the fifth year.

    23. And he entered it in the sixth year thereof, in the second month, on the new moon of the second month, until the sixteenth; and he entered, he and all that we brought to him, into the ark, and the Lord shut it from outside on the seventeenth evening.

    24. And the Lord opened seven floodgates of heaven, and the mouths of the fountains of the great deep, seven mouths in number, and the floodgates poured down water from heaven forty days and forty nights.

    25. And the fountains of the deep also sent up waters until the whole world was full of water.

    26. And the waters rose upon the earth fifteen cubits; the waters rose high above all the high mountains, and the ark was lifted up from the earth and floated on the surface of the waters.

    27. And the waters stood upon the surface of the earth five months, one hundred and fifty days.

    28. And the ark went and came to rest on the summit of Lubar, one of the mountains of Ararat.

    29. And in the fourth month the fountains of the great deep were closed, and the floodgates of heaven were restrained; and on the new moon of the seventh month all the mouths of the depths of the earth were opened, and the waters began to descend into the lower deep.

    30. And on the new moon of the tenth month the tops of the mountains appeared, and on the new moon of the first month the earth appeared.

    31. And the waters disappeared from above the earth in the fifth week, in the seventh year thereof; and on the seventeenth day in the second month the earth was dry.

    32[c][d][e][f][g][h]. And in the twenty-seventh thereof he opened the ark and sent out from it beasts and cattle and birds and everything that moves.'
