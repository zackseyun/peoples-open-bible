- from: El hombre malvado se muestra atrevido[a], pero el justo hace firme su camino.
  to: El hombre malvado pone un rostro atrevido[a], pero el recto hace firme su camino.
  rationale: La revisión restaura en el texto principal la imagen del rostro presente en הֵעֵז בְּפָנָיו, en línea con la decisión inglesa «puts on a bold face», y sustituye «justo» por «recto» para reflejar mejor יָשָׁר en el contexto sapiencial. Se conserva «hace firme su camino» porque representa adecuadamente יכין דרכיו y sigue siendo claro en español.
