theological_decisions:
- issue: '13:18의 수 표기와 사본 이형(616) 처리'
  chosen_reading: 육백육십육 (666)
  alternative_readings:
  - 육백십육 (616)
  rationale: 'SBLGNT는 ἑξακόσιοι ἑξήκοντα ἕξ(666)을 본문으로 채택한다. 그러나 가장 이른 그리스어 증인 중 하나인 P115와 일부 사본 전통은 616(ἑξακόσιοι δέκα ἕξ)을 보존하며, 이는 「네론 카이사르」를 히브리어 자모수로 환산할 때(NRWN QSR vs NRW QSR) 두 형태가 모두 가능함을 반영한다. 본문은 666을 채택하되 각주로 변형을 보존하여 독자가 사본 증거에 접근할 수 있게 한다.'
  doctrine_reference: 'DOCTRINE.md: Preserve significant textual variants in footnotes'
