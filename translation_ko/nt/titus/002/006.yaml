id: TIT.2.6
reference: Titus 2:6
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Τοὺς νεωτέρους ὡσαύτως παρακάλει σωφρονεῖν·
base_translation:
  language: en
  yaml_path: translation/nt/titus/002/006.yaml
  text: Likewise[b][a], urge the younger men to be self-controlled.
  footnotes:
  - marker: a
    text: Or 'young men.' The Greek specifically refers to younger males, not to young people in general.
    reason: lexical_alternative
  - marker: b
    text: Or 'to be sensible' or 'to be sober-minded.' The Greek emphasizes sound judgment and disciplined self-restraint.
    reason: lexical_alternative
translation:
  language: ko
  text: 마찬가지로 젊은 남자들[a]에게 신중하게[b] 처신하도록 권하십시오.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「젊은 사람들」. 헬라어는 구체적으로 젊은 남성을 가리키며, 일반적인 청년이 아니다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「분별 있게」, 「정신을 차리고」. 헬라어는 건전한 판단과 절제된 자제의 어감을 강조한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τοὺς νεωτέρους
  english_pob_choice: the younger men
  chosen_korean: 젊은 남자들
  alternatives_korean:
  - 청년들
  - 더 어린 남자들
  lexicon: BDAG
  rationale: 남성 단수 비교급. 2:4의 「젊은 여자들」과 짝지어 일관되게 「젊은 남자들」.
- source_word: παρακάλει
  english_pob_choice: urge
  chosen_korean: 권하십시오
  alternatives_korean:
  - 권면하십시오
  - 격려하십시오
  lexicon: BDAG
  rationale: παρακαλέω의 현재 명령. 1:9와 일관되게 「권면」 계열로 옮긴다. 명령문이므로 「권하십시오」.
- source_word: σωφρονεῖν
  english_pob_choice: to be self-controlled
  chosen_korean: 신중하게 처신하도록
  alternatives_korean:
  - 분별 있게 행하도록
  - 절제하도록
  lexicon: BDAG
  rationale: σωφρονέω는 동사형으로 「신중하게 행동하다」. 「처신」을 더해 행위의 영역을 명확히 한다.
