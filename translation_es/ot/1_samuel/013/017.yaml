    rationale: El hebreo דֶּרֶךְ עָפְרָה y la auditoría inglesa apuntan a dirección/destino («road to Ophrah»), no simplemente a un camino asociado con Ofra. En español, «camino a Ofra» o «camino hacia Ofra» preserva mejor el sentido.
  - severity: low
