translation:
  language: es
  text: Ellos fueron y llegaron a Moisés, a Aarón y a toda la congregación de los hijos de Israel[a], en el desierto de Parán, en Cades. Les dieron noticias a ellos y a toda la congregación, y les mostraron el fruto de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la congregación de los israelitas». El hebreo dice literalmente «la congregación de los hijos de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלְכוּ וַיָּבֹאוּ
  english_pob_choice: They went and came
  chosen_spanish: fueron y llegaron
  alternatives_spanish:
  - fueron y vinieron
  - partieron y llegaron
  lexicon: HALOT
  rationale: Conserva la secuencia narrativa de dos verbos coordinados sin reducirla a un solo movimiento. En español, 'fueron y llegaron' comunica de manera natural el desplazamiento y la llegada, manteniendo la cadencia del hebreo.
- source_word: עֲדַת בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the congregation of the sons of Israel
  chosen_spanish: toda la congregación de los hijos de Israel
  alternatives_spanish:
  - toda la congregación de los israelitas
  - toda la asamblea de los hijos de Israel
  lexicon: HALOT
  rationale: Se mantiene 'congregación' para עֲדָה y 'hijos de Israel' para conservar la forma constructa del hebreo, en línea con la decisión auditada de no neutralizar el término en una paráfrasis más general.
- source_word: מִדְבַּר פָּארָן
  english_pob_choice: the wilderness of Paran
  chosen_spanish: el desierto de Parán
  alternatives_spanish:
  - el desierto del Parán
  - la tierra despoblada de Parán
  lexicon: HALOT
  rationale: '''Desierto'' es natural en español bíblico y transmite bien מִדְבָּר en este contexto de peregrinación; ''Parán'' se conserva como topónimo.'
- source_word: קָדֵשָׁה
  english_pob_choice: at Kadesh
  chosen_spanish: en Cades
  alternatives_spanish:
  - a Cades
  - junto a Cades
  lexicon: HALOT
  rationale: El valor locativo queda bien expresado con 'en'. Se adopta 'Cades' como forma española usual del topónimo, con lectura de destino/arribo sin forzar el matiz direccional del hebreo.
- source_word: וַיָּשִׁיבוּ אוֹתָם דָּבָר
  english_pob_choice: They brought back word to them
  chosen_spanish: les dieron palabra
  alternatives_spanish:
  - les llevaron palabra
  - les dieron un informe
  lexicon: HALOT
  rationale: Se preserva el giro idiomático de דָּבָר como 'palabra/recado' y no como 'informe', siguiendo la revisión inglesa que prefirió 'word' para reflejar más directamente el hebreo. 'Les dieron palabra' suena formal pero es idiomático y fiel.
- source_word: וְאֶת כָּל הָעֵדָה
  english_pob_choice: and to all the congregation
  chosen_spanish: y a toda la congregación
  alternatives_spanish:
  - y a toda la asamblea
  - y a toda la comunidad
  lexicon: HALOT
  rationale: Se mantiene la misma traducción de עֵדָה para consistencia interna con 'congregación' y se suple la preposición implícita en español, como hace el texto inglés auditado.
- source_word: וַיַּרְאוּם
  english_pob_choice: showed them
  chosen_spanish: les mostraron
  alternatives_spanish:
  - hicieron ver a ellos
  - les enseñaron
  lexicon: HALOT
  rationale: El causativo de ראה aquí implica mostrar. 'Les mostraron' es el equivalente español más claro y directo, sin diluir la acción visual.
- source_word: פְּרִי הָאָרֶץ
  english_pob_choice: the fruit of the land
  chosen_spanish: el fruto de la tierra
  alternatives_spanish:
  - el fruto de la tierra prometida
  - el producto de la tierra
  lexicon: HALOT
  rationale: '''Fruto de la tierra'' reproduce de forma transparente la imagen del hebreo y conserva la concreción agrícola de la escena. ''Tierra'' es un equivalente español natural y bíblicamente comprensible.'
theological_decisions:
- issue: 'Topónimo con valor locativo: קָדֵשָׁה'
  english_pob_reading: at Kadesh
  chosen_spanish_reading: en Cades
  alternative_spanish_readings:
  - a Cades
  - en Cadesa
  rationale: No hay implicación doctrinal especial; la decisión es principalmente estilística y toponímica. Se opta por una forma española reconocible y breve, evitando sobrerrepresentar el sufijo locativo hebreo en la superficie del español.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se incorporó la revisión inglesa que cambió 'a report' por 'word' para reflejar más directamente דָּבָר. Por eso el español usa 'les dieron palabra' en vez de 'les dieron un informe'. También se preservó la estructura de movimiento doble ('fueron y llegaron') y la terminología consistente de עֵדָה como 'congregación'.
  spanish_consistency_notes:
  - Se mantuvo 'congregación' para עֵדָה a lo largo del versículo por consistencia.
  - Se usó 'hijos de Israel' para reflejar la forma constructa hebrea documentada en el audit trail.
  - '''Les dieron palabra'' conserva el valor idiomático de דָּבָר sin introducir un matiz burocrático no presente en el hebreo.'
  - 'Los nombres propios se adaptaron a formas españolas usuales: Moisés, Aarón, Parán y Cades.'
