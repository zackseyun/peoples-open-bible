translation:
  language: es
  text: 'Y tú también sabes lo que Joab hijo de Sarvia me hizo: lo que hizo a los dos jefes de los ejércitos de Israel, a Abner hijo de Ner y a Amasa hijo de Jéter; los mató y puso la sangre de guerra en paz[a], y puso la sangre de guerra en el cinturón que llevaba alrededor de su cintura y en las sandalias que estaban en sus pies[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «y puso la sangre de guerra en paz»; el hebreo expresa que Joab derramó sangre de guerra en condiciones de paz.'
    reason: lexical_alternative
  - marker: b
    text: La imagen de sangre en el cinturón y las sandalias probablemente señala culpa de sangre visible adherida a Joab por estos asesinatos.
    reason: cultural_note
lexical_decisions:
- source_word: וְגַם אַתָּה
  english_pob_choice: And you also
  chosen_spanish: Y tú también
  alternatives_spanish:
  - Y también tú
  - Tú también
  lexicon: HALOT
  rationale: Conserva el añadido enfático de la partícula y el vocativo directo sin volver la frase rígida en español.
- source_word: יָדַעְתָּ
  english_pob_choice: know
  chosen_spanish: sabes
  alternatives_spanish:
  - has sabido
  - conoces
  lexicon: HALOT
  rationale: En contexto epistolar/discursivo, el presente español expresa conocimiento compartido vigente con naturalidad.
- source_word: אֵת אֲשֶׁר עָשָׂה לִי
  english_pob_choice: what ... did to me
  chosen_spanish: lo que ... me hizo
  alternatives_spanish:
  - lo que ... hizo a mí
  - aquello que ... hizo contra mí
  lexicon: HALOT
  rationale: El לִי tiene fuerza de desventaja/afectación; 'me hizo' comunica la relación sin forzar un calco.
- source_word: יוֹאָב בֶּן צְרוּיָה
  english_pob_choice: Joab son of Zeruiah
  chosen_spanish: Joab hijo de Sarvia
  alternatives_spanish:
  - Joab, hijo de Sarvia
  - Joab, hijo de Zeruía
  lexicon: HALOT
  rationale: '''Hijo de'' reproduce bien el constructo; ''Sarvia'' sigue el nombre tradicional español más claro que una transliteración estricta.'
- source_word: לִשְׁנֵי שָׂרֵי צִבְאוֹת יִשְׂרָאֵל
  english_pob_choice: to the two commanders of the armies of Israel
  chosen_spanish: a los dos jefes de los ejércitos de Israel
  alternatives_spanish:
  - a los dos comandantes de los ejércitos de Israel
  - a los dos jefes militares de Israel
  lexicon: HALOT
  rationale: '''Jefes'' comunica bien שָׂרֵי sin perder el tono de autoridad; ''ejércitos'' refleja el plural de צִבְאוֹת y mantiene el paralelismo bíblico.'
- source_word: לְאַבְנֵר בֶּן נֵר וְלַעֲמָשָׂא בֶן יֶתֶר
  english_pob_choice: to Abner son of Ner and to Amasa son of Jether
  chosen_spanish: a Abner hijo de Ner y a Amasa hijo de Jéter
  alternatives_spanish:
  - a Abner, hijo de Ner, y a Amasa, hijo de Jéter
  - a Abner hijo de Ner y a Amasa hijo de Yéter
  lexicon: HALOT
  rationale: Se mantiene la repetición de los dos nombres con sus patronímicos; 'Jéter' sigue la forma española habitual y clara.
- source_word: וַיַּהַרְגֵם
  english_pob_choice: he killed them
  chosen_spanish: los mató
  alternatives_spanish:
  - los قتلó
  - los asesinó
  lexicon: HALOT
  rationale: '''Matar'' es la equivalencia directa y sobria para el verbo narrativo, sin intensificar más allá del texto.'
- source_word: וַיָּשֶׂם דְּמֵי מִלְחָמָה בְּשָׁלֹם
  english_pob_choice: and put the blood of war in peace
  chosen_spanish: puso la sangre de guerra en paz
  alternatives_spanish:
  - colocó la sangre de guerra en paz
  - puso la sangre de guerra durante la paz
  lexicon: HALOT
  rationale: Se conserva deliberadamente la rareza idiomática del hebreo, porque el POB inglés también preserva la imagen y la tensión entre guerra y paz.
- source_word: דְּמֵי מִלְחָמָה
  english_pob_choice: the blood of war
  chosen_spanish: la sangre de guerra
  alternatives_spanish:
  - la sangre guerrera
  - la sangre derramada en guerra
  lexicon: HALOT
  rationale: La expresión mantiene el sustantivo concreto 'sangre' y el genitivo figurado del hebreo, evitando una paráfrasis explicativa en el texto principal.
- source_word: בַּחֲגֹרָתוֹ
  english_pob_choice: on the belt that was around his waist
  chosen_spanish: en el cinturón que estaba sobre su cintura
  alternatives_spanish:
  - en el cinturón que llevaba en la cintura
  - en su cinturón
  lexicon: HALOT
  rationale: '''Cinturón'' es más natural que ''faja'' o ''ceñidor'' para el lector moderno, y la relativa conserva la imagen concreta del objeto.'
- source_word: וּבְנַעֲלוֹ
  english_pob_choice: and on the sandals that were on his feet
  chosen_spanish: y en las sandalias que estaban en sus pies
  alternatives_spanish:
  - y en sus sandalias
  - y en el calzado que llevaba
  lexicon: HALOT
  rationale: '''Sandalias'' sigue de cerca el texto y conserva la imagen corporal final del versículo.'
theological_decisions:
- issue: La frase idiomática 'poner la sangre de guerra en paz'
  english_pob_reading: literally, 'and set the blood of war in peace'; the Hebrew idiom means that Joab committed wartime bloodshed under peaceful conditions.
  chosen_spanish_reading: '''puso la sangre de guerra en paz'' en el texto, con una nota explicativa sobre el sentido idiomático.'
  alternative_spanish_readings:
  - '''derramó sangre en tiempo de paz'''
  - '''cometió sangre de guerra en tiempos de paz'''
  rationale: El hebreo es deliberadamente chocante. Seguir la imagen en el texto y explicarla en nota preserva la tensión semántica y la acusación de David sin suavizarla.
  doctrine_reference: No doctrinal; atestiguación del sentido idiomático del hebreo y del juicio moral del pasaje.
- issue: La imagen de sangre en el cinturón y las sandalias
  english_pob_reading: The imagery of blood on Joab's belt and sandals likely signifies bloodguilt visibly clinging to him because of these killings.
  chosen_spanish_reading: Mantener la imagen concreta sin explicarla en el cuerpo, con nota cultural sobre la sangre como señal visible de culpa.
  alternative_spanish_readings:
  - '''que mostraba su culpa de sangre'''
  - '''que evidenciaba su responsabilidad por la sangre derramada'''
  rationale: La metáfora visual forma parte del reproche; explicarla solo en nota evita borrar la fuerza poética del hebreo.
  doctrine_reference: No doctrinal; observación retórica y cultural del pasaje.
translation_notes:
  revision_awareness: La redacción sigue el último estado del audit trail inglés, que reemplazó 'shed' por 'put' para reflejar con mayor cercanía el verbo hebreo repetido y preservar la imaginería del versículo. Por eso el español también conserva 'puso' en ambos miembros y evita sustituirlo por un verbo más interpretativo en el cuerpo del texto.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma estándar del proyecto solo cuando aparece el nombre divino; aquí no aparece.
  - Se mantiene 'sangre de guerra' de forma consistente para דְּמֵי מִלְחָמָה, evitando alternar con 'sangre derramada' en el texto principal.
  - '''Joab hijo de Sarvia'' y ''Abner hijo de Ner'' siguen formas españolas claras y tradicionales, sin perder la estructura patronímica.'
  - La puntuación con dos puntos y punto y coma reproduce la progresión argumentativa del hebreo y del POB inglés.
