translation:
  language: es
  text: Pero si está entre los animales impuros[a], entonces lo redimirá según tu valuación, y añadirá una quinta parte[b] a su valor; y si no es redimido, entonces será vendido según tu valuación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de entre el ganado impuro». El hebreo se refiere a un animal perteneciente a la categoría de animales ritualmente impuros.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «y añadirá su quinta parte sobre ello»; es decir, añadirá un veinte por ciento al valor tasado.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּבְּהֵמָה הַטְּמֵאָה
  english_pob_choice: among the unclean animals
  chosen_spanish: entre los animales impuros
  alternatives_spanish:
  - de entre los animales impuros
  - entre el ganado impuro
  lexicon: HALOT
  rationale: בְּהֵמָה puede significar animal, bestia o ganado. En este contexto legal de Levítico, «animales impuros» comunica con claridad la clase ritual sin imponer «ganado» como si el hebreo fuera más restringido de lo que permite el texto.
- source_word: וּפָדָה
  english_pob_choice: he shall redeem it
  chosen_spanish: será redimido
  alternatives_spanish:
  - lo redimirá
  - podrá redimirlo
  lexicon: HALOT
  rationale: El verbo פדה expresa redimir/rescatar/comprar de vuelta. Como el hebreo presenta la acción en forma legal y pasiva/reflexiva, «será redimido» conserva bien la forma y evita añadir indebidamente un sujeto explícito.
- source_word: בְעֶרְכֶּךָ
  english_pob_choice: at your valuation
  chosen_spanish: según tu valuación
  alternatives_spanish:
  - conforme a tu valuación
  - a tu valuación
  lexicon: HALOT
  rationale: עֵרֶךְ en Levítico 27 es la valuación tasada en un marco cultual/legal. «Según tu valuación» mantiene la referencia a la tasación determinada en el contexto y suena natural en español.
- source_word: וְיָסַף חֲמִשִׁתוֹ עָלָיו
  english_pob_choice: and add a fifth of it to it
  chosen_spanish: y añadirá una quinta parte sobre ella
  alternatives_spanish:
  - y añadirá su quinta parte sobre ello
  - y añadirá un quinto sobre ella
  lexicon: HALOT
  rationale: La expresión idiomática hebrea significa añadir veinte por ciento a la valuación. «Una quinta parte sobre ella» conserva la relación aditiva y el referente de la cantidad tasada, sin perder el valor técnico del texto.
- source_word: וְאִם לֹא יִגָּאֵל
  english_pob_choice: and if it is not redeemed
  chosen_spanish: y si no es redimido
  alternatives_spanish:
  - y si no se redime
  - y si no es rescatado
  lexicon: HALOT
  rationale: El nifal de גאל aquí es pasivo/reflexivo y el agente queda implícito. «No es redimido» reproduce esa apertura sintáctica sin especificar un sujeto que el hebreo no nombra.
- source_word: וְנִמְכַּר
  english_pob_choice: then it shall be sold
  chosen_spanish: entonces será vendido
  alternatives_spanish:
  - entonces se venderá
  - entonces se pondrá a la venta
  lexicon: HALOT
  rationale: El nifal funciona como pasivo legal. «Será vendido» es una traducción clara y adecuada al registro normativo del pasaje.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo de Levítico 27:27 y el audit trail inglés. Se adoptó el pasivo legal para וּפָדָה y וְנִמְכַּר, y se mantuvo la cuantificación idiomática de חֲמִשִׁתוֹ como una quinta parte añadida al valor tasado. Se prefirió «animales impuros» por claridad semántica y porque el hebreo admite más que «ganado» en español.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino solo cuando aparece en el texto fuente; en este versículo no aparece.
  - Se mantiene «redimido» para פדה de manera consistente con el léxico jurídico-cultual de Levítico.
  - «Valuación» se conserva para עֵרֶךְ, en coherencia con Levítico 27 y con el uso técnico del pasaje.
  - Se evita «SEÑOR» o «comprado de vuelta» para no borrar el matiz legal de redención.
