translation:
  language: es
  text: Y sucedió en el año veintisiete, en el primer mes, el primer día del mes[a], que la palabra de Yahvé vino a mí, diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: «el primero del mes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y sucedió
  alternatives_spanish:
  - Y aconteció
  - Y fue
  lexicon: HALOT
  rationale: La forma narrativa וַיְהִי introduce un aviso profético fechado. “Y sucedió” conserva el valor de secuencia narrativa sin sonar arcaico en español.
- source_word: בְּעֶשְׂרִים וָשֶׁבַע שָׁנָה
  english_pob_choice: in the twenty-seventh year
  chosen_spanish: en el año veintisiete
  alternatives_spanish:
  - en el vigésimo séptimo año
  lexicon: HALOT
  rationale: El hebreo presenta una fórmula cronológica. En español, la forma ordinal o la cardinal con sustantivo “año” son ambas naturales; se eligió la cardinal porque fluye mejor y sigue fielmente el dato cronológico.
- source_word: בָּרִאשׁוֹן
  english_pob_choice: in the first month
  chosen_spanish: en el primer mes
  alternatives_spanish:
  - en el mes primero
  lexicon: HALOT
  rationale: Aunque בָּרִאשׁוֹן literalmente es “en el primero”, dentro de la fórmula de fechado se entiende como “en el primer mes”. La traducción explicita el mes para claridad, como en la decisión inglesa.
- source_word: בְּאֶחָד לַחֹדֶשׁ
  english_pob_choice: on the first day of the month
  chosen_spanish: el día primero del mes
  alternatives_spanish:
  - el primero del mes
  - el primer día del mes
  lexicon: HALOT
  rationale: La expresión hebrea idiomática significa el primer día del mes. “El día primero del mes” es natural y exacto; mantiene la concreción calendárica sin alejarse del hebreo.
- source_word: הָיָה דְבַר יְהוָה אֵלַי
  english_pob_choice: the word of Yahweh came to me
  chosen_spanish: la palabra de Yahvé vino a mí
  alternatives_spanish:
  - la palabra de Yahvé llegó a mí
  - vino a mí la palabra de Yahvé
  lexicon: HALOT
  rationale: Se conserva la fórmula profética estándar. “Vino a mí” reproduce el movimiento idiomático de revelación, y “la palabra de Yahvé” mantiene el nombre divino según la convención POB.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: “Yahvé”, transliteración del nombre divino, en lugar de una sustitución como “SEÑOR”.'
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - para decir
  lexicon: HALOT
  rationale: Es la introducción habitual al discurso directo. “Diciendo” es la equivalencia española más directa y pública, y señala que la palabra continúa en el versículo siguiente.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. La lectura en español debe preservar el nombre personal divino, no sustituirlo por un título. “Yahvé” sigue la política del proyecto y evita ocultar el dato del original.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador [a] aparezca exactamente en el texto español, anclado en la fecha del versículo. No se añadieron notas sin ancla.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» de manera consistente para יְהוָה, conforme al criterio del proyecto.
  - Se prefirió un español natural pero sobrio, evitando arcaísmos innecesarios.
  - La fórmula profética «la palabra de Yahvé vino a mí» se conserva sin suavizar su fuerza idiomática.
