theological_decisions:
- issue: Nature of the 'fast' God chooses
  chosen_reading: Rendered as concrete acts of liberation and justice rather than merely inward piety.
  alternative_readings:
  - A primarily metaphorical fast of general kindness
  - A cultic fast with secondary ethical implications
  rationale: The Hebrew infinitives specify tangible actions that dismantle oppression. The translation preserves these as concrete social acts without reducing them to abstract spirituality or importing later doctrinal categories.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Rendering of oppression imagery
  chosen_reading: Maintained the repeated 'yoke' imagery literally.
  alternative_readings:
  - Replace with abstract terms like 'burden' or 'oppression' throughout
  rationale: The source text uses physical restraint imagery to describe injustice. Preserving 'yoke' keeps the theological and prophetic force of liberation language without over-paraphrase.
  doctrine_reference: Translation philosophy §§1, 5
