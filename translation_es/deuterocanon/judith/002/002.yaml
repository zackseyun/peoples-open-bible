  text: And he summoned all his attendants and all his nobles[a], and he set before them the secret of his plan[b], and from his own mouth he declared all the evil of the land.
  footnotes:
  - marker: a
    text: Or 'he disclosed to them the mystery of his counsel.' Here μυστήριον likely means a secret matter or confidential plan, not a technical theological 'mystery.'
    reason: lexical_alternative
  - marker: b
    text: The clause 'he declared all the wickedness of the land' is difficult. The Greek may mean that he fully set forth the evil concerning the land, rather than that the land itself was wicked.
    reason: alternative_reading
