translation:
  language: es
  text: Y se le informó a Salomón que Simei había ido de Jerusalén a Gat y había regresado.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֻּגַּד
  english_pob_choice: it was reported
  chosen_spanish: Y fue informado
  alternatives_spanish:
  - Y se le dijo
  - Y se le comunicó
  - Y llegó la noticia
  lexicon: HALOT
  rationale: 'El hebreo presenta una pasiva narrativa de נגד: la información llega a Salomón sin especificar mensajero. En español, «fue informado» conserva bien esa pasividad y el sentido de noticia recibida sin añadir agente.'
- source_word: לִשְׁלֹמֹה
  english_pob_choice: to Solomon
  chosen_spanish: a Salomón
  alternatives_spanish:
  - para Salomón
  lexicon: HALOT
  rationale: La preposición ל marca al destinatario del informe. «A Salomón» es la forma natural en español para ese objeto indirecto.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - como
  lexicon: HALOT
  rationale: Introduce el contenido del informe en discurso indirecto. «Que» es el complemento más directo y fiel en español.
- source_word: הָלַךְ
  english_pob_choice: had gone
  chosen_spanish: había ido
  alternatives_spanish:
  - fue
  - había viajado
  lexicon: HALOT
  rationale: הלך expresa ir/recorrer. «Había ido» reproduce el valor perfectivo dentro del informe indirecto y mantiene la secuencia temporal con «había regresado».
- source_word: שִׁמְעִי
  english_pob_choice: Shimei
  chosen_spanish: Simi
  alternatives_spanish:
  - Simei
  - Shimei
  lexicon: transliteration
  rationale: Se vierte el nombre propio de manera consistente al español bíblico. «Simi» evita una grafía híbrida y sigue la transliteración fonética común en español.
- source_word: מִירוּשָׁלִַם
  english_pob_choice: from Jerusalem
  chosen_spanish: de Jerusalén
  alternatives_spanish:
  - desde Jerusalén
  lexicon: HALOT
  rationale: La preposición מ indica movimiento desde Jerusalén. «De Jerusalén» es correcta y sobria; «desde Jerusalén» también sería posible, pero aquí la forma breve suena más natural.
- source_word: גַּת
  english_pob_choice: to Gath
  chosen_spanish: a Gat
  alternatives_spanish:
  - hasta Gat
  lexicon: HALOT
  rationale: Aunque no aparece preposición explícita antes de גַּת, la ciudad funciona como destino del verbo «ir». «A Gat» expresa ese destino con naturalidad y sin sobreinterpretar.
- source_word: וַיָּשֹׁב
  english_pob_choice: and had returned
  chosen_spanish: y había regresado
  alternatives_spanish:
  - y regresó
  - y había vuelto
  lexicon: HALOT
  rationale: שׁוב significa volver/regresar. «Había regresado» mantiene el paralelo aspectual con «había ido» y conserva la culminación de la acción en el reporte.
theological_decisions:
- issue: Tratamiento narrativo de la noticia sin agente explícito
  english_pob_reading: it was reported
  chosen_spanish_reading: Y fue informado
  alternative_spanish_readings:
  - Y se informó
  - Y le comunicaron
  rationale: El hebreo usa una pasiva impersonal/narrativa. La traducción no debe introducir un sujeto no expresado. «Fue informado» preserva la falta de agente y el tono de informe oficial.
  doctrine_reference: Principio de transparencia textual; evitar suplir información ausente en el original.
translation_notes:
  revision_awareness: El texto sigue de cerca el acuerdo alto del borrador inglés y no requiere notas variantes; se ha ajustado solo la formulación española para naturalidad y fidelidad aspectual.
  spanish_consistency_notes:
  - Se mantiene el nombre propio como «Simi» para una transliteración uniforme en español.
  - Se usa «había ido / había regresado» para reflejar el perfecto anterior del relato indirecto.
  - No se emplea «SEÑOR» ni vocabulario cultual, porque el versículo no contiene el Tetragrámaton ni terminología teológica adicional.
