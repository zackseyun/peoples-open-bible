    text: 'Hebreo: «Yahvé ha engrandecido para hacer con estos», un giro idiomático que significa «Yahvé ha hecho grandes cosas por ellos».'
    reason: lexical_alternative
  revision_rationale: Se corrigió el verbo a «dijeron» para reflejar el 3mp activo del hebreo y el valor retrospectivo del contexto. Se movió la nota [a] al sintagma que realmente comenta, «nuestra lengua de gritos de alegría». Se ajustó «con ellos» a «por ellos» para expresar mejor en español el sentido idiomático benefactivo explicado en la auditoría inglesa, manteniendo la nota literal en [b].
