translation:
  language: es
  text: Y edificó Bet-horón de arriba y Bet-horón de abajo, ciudades fortificadas[a], con muros, puertas[b] y barras[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'ciudades fortaleza'.
    reason: lexical_alternative
  - marker: b
    text: Hebreo 'puertas'; probablemente se refiere a las puertas de acceso de esas ciudades fortificadas.
    reason: lexical_alternative
  - marker: c
    text: O 'cerrojos'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבֶן
  english_pob_choice: And he built
  chosen_spanish: Y edificó
  alternatives_spanish:
  - Y construyó
  - Y levantó
  lexicon: HALOT
  rationale: El hebreo בנה marca una acción narrativa de construir; en español, "edificó" conserva el valor formal y digno sin introducir la idea de reconstrucción. "Construyó" sería válido, pero "edificó" mantiene mejor el tono bíblico.
- source_word: בֵּית חוֹרוֹן הָעֶלְיוֹן
  english_pob_choice: Upper Beth-horon
  chosen_spanish: Bet-horón la de arriba
  alternatives_spanish:
  - Bet-horón superior
  - Bet-horón la alta
  lexicon: HALOT
  rationale: Se preserva el topónimo en forma transliterada y se vierte el adjetivo geográfico de modo natural en español. "La de arriba" refleja con claridad la distinción espacial del par de lugares sin forzar un calco pesado.
- source_word: בֵּית חוֹרוֹן הַתַּחְתּוֹן
  english_pob_choice: Lower Beth-horon
  chosen_spanish: Bet-horón la de abajo
  alternatives_spanish:
  - Bet-horón inferior
  - Bet-horón la baja
  lexicon: HALOT
  rationale: Paralelo al primer topónimo, conserva la correspondencia entre ambos lugares. "La de abajo" comunica el contraste direccional/topográfico con naturalidad en español.
- source_word: עָרֵי מָצוֹר
  english_pob_choice: fortified cities
  chosen_spanish: ciudades fortificadas
  alternatives_spanish:
  - ciudades de fortaleza
  - ciudades fortaleza
  - ciudades-fortaleza
  lexicon: HALOT
  rationale: La expresión constructa denota ciudades caracterizadas por defensa. "Fortificadas" reproduce el sentido militar de manera clara y actual, sin sobrecargar el español con una estructura demasiado literal.
- source_word: חוֹמוֹת
  english_pob_choice: with walls
  chosen_spanish: con muros
  alternatives_spanish:
  - con murallas
  - con paredes
  lexicon: HALOT
  rationale: En contexto defensivo, "muros" es un equivalente sobrio y amplio; "murallas" también sería posible, pero "muros" evita restringir innecesariamente el matiz arquitectónico.
- source_word: דְּלָתַיִם
  english_pob_choice: doors
  chosen_spanish: puertas
  alternatives_spanish:
  - portones
  - hojas de puerta
  lexicon: HALOT
  rationale: El hebreo dice literalmente "puertas" o "dobles puertas"; aunque el contexto es urbano y defensivo, no conviene sustituirlo por "portones" sin necesidad. "Puertas" mantiene la relación con el texto fuente.
- source_word: וּבְרִיחַ
  english_pob_choice: and bars
  chosen_spanish: cerrojos
  alternatives_spanish:
  - barras
  - trancas
  - pasadores
  lexicon: HALOT
  rationale: El término alude al mecanismo que asegura puertas o portones. "Cerrojos" comunica bien la función en español y es un equivalente natural de defensa; mantiene la idea de cierre más que la forma física exacta.
translation_notes:
  revision_awareness: La revisión más reciente indica acuerdo alto y sin cambios; esta propuesta sigue de cerca el texto hebreo y el audit trail inglés, manteniendo la secuencia narrativa, el paralelismo de los dos topónimos y la tríada defensiva final sin introducir reinterpretaciones.
  spanish_consistency_notes:
  - Se usa "Bet-horón" de forma uniforme para mantener el topónimo transliterado.
  - 'Se conserva la distinción entre elementos defensivos: "muros", "puertas" y "cerrojos", evitando fusionarlos en una sola idea.'
  - No se introduce "SEÑOR" ni terminología no presente en el versículo.
  - El registro es bíblico pero en español moderno, con sintaxis fluida y sin arcaísmos innecesarios.
