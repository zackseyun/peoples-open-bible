    rationale: La auditoría inglesa preserva la alternativa singular/plural por la personificación de las ciudades; la nota española actual añade una explicación más libre sobre «clamor o grito más general», que no es el punto principal de la nota fuente.
  revised_spanish_text: Hesbón y Elealé gritan[a]; su voz se oye hasta Yahaz. Por eso los hombres armados de Moab gritan[b]; su alma tiembla dentro de él.
  revised_footnotes:
