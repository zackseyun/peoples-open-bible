    issue: 'Expresión española poco natural: ''cuya mano ha sido llena'''
    rationale: Aunque reproduce la imagen hebrea, en español esta construcción suena rígida y algo antinatural. 'Cuya mano fue llenada' preserva mejor la literalidad formal con una sintaxis más idiomática y auditable.
  - severity: low
    issue: Redacción mejorable de la nota al pie
    rationale: La nota actual contiene comillas y puntuación algo pesadas. Una formulación más limpia mejora la legibilidad sin cambiar el contenido lexical documentado.
