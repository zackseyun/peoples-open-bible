translation:
  language: es
  text: 'Así David volvió a consultar[a] a Dios, y Dios le dijo: «No subirás tras ellos. Rodéalos por detrás de ellos, y vendrás contra ellos frente a los árboles de bálsamo[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «consultó a Dios»; el matiz puede expresarse también como «inquirió de Dios».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «los baca»; la especie exacta es incierta. Versiones tradicionales a menudo leen «moreras».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁאַל ... בֵּאלֹהִים
  english_pob_choice: inquired of God
  chosen_spanish: consultar a Dios
  alternatives_spanish:
  - preguntar a Dios
  - inquirir de Dios
  lexicon: HALOT
  rationale: שׁאל con ב expresa pedir guía o consultar; en español, «consultar a Dios» conserva mejor el matiz de búsqueda de dirección divina que un simple «preguntar».
- source_word: עוֹד
  english_pob_choice: again
  chosen_spanish: volvió a
  alternatives_spanish:
  - de nuevo
  - otra vez
  lexicon: HALOT
  rationale: En este contexto narrativo, «volvió a» comunica de forma natural la repetición de la consulta sin perder el valor de reiteración de עוֹד.
- source_word: וַיֹּאמֶר ל/וֹ הָאֱלֹהִים
  english_pob_choice: and God said to him
  chosen_spanish: Dios le dijo
  alternatives_spanish:
  - y Dios dijo a él
  - y Dios habló con él
  lexicon: HALOT
  rationale: La fórmula hebrea es la ordinaria de habla divina; «le dijo» es natural en español y mantiene la relación directa entre Dios y David.
- source_word: לֹא תַעֲלֶה אַחֲרֵיהֶם
  english_pob_choice: You shall not go up after them
  chosen_spanish: No subirás tras ellos
  alternatives_spanish:
  - No irás tras ellos
  - No atacarás por detrás a ellos
  lexicon: HALOT
  rationale: עלה conserva su fuerza literal de «subir»; «tras ellos» reproduce la relación espacial/seguimiento sin convertirla en una paráfrasis militar más explícita de lo que el hebreo dice.
- source_word: הָסֵב
  english_pob_choice: Circle around
  chosen_spanish: Da la vuelta por detrás de ellos
  alternatives_spanish:
  - Rodea por detrás de ellos
  - Haz un rodeo por detrás de ellos
  lexicon: HALOT
  rationale: El imperativo sugiere cambiar de dirección para hacer un rodeo táctico. Se conserva la idea de circular, y la revisión inglesa «from behind them» apoya incorporar ese matiz en español.
- source_word: מֵעֲלֵיהֶם
  english_pob_choice: from behind them
  chosen_spanish: por detrás de ellos
  alternatives_spanish:
  - desde sobre ellos
  - desde detrás de ellos
  lexicon: HALOT
  rationale: La expresión indica apartarse de una aproximación frontal y situarse en la parte trasera; «por detrás de ellos» es idiomático y fiel al sentido revisado del POB inglés.
- source_word: וּבָאתָ לָהֶם
  english_pob_choice: and come against them
  chosen_spanish: vendrás contra ellos
  alternatives_spanish:
  - irás hacia ellos
  - te acercarás a ellos
  lexicon: HALOT
  rationale: En contexto militar, בוא + ל implica venir contra un enemigo; «vendrás contra ellos» mantiene el valor hostil sin sobretraducirlo con un verbo ajeno al hebreo.
- source_word: מִמּוּל
  english_pob_choice: opposite
  chosen_spanish: frente a
  alternatives_spanish:
  - enfrente de
  - en oposición a
  lexicon: HALOT
  rationale: «Frente a» expresa la posición de cara a algo en español corriente y mantiene la idea espacial de מִמּוּל.
- source_word: הַבְּכָאִים
  english_pob_choice: the balsam trees
  chosen_spanish: los árboles de bálsamo
  alternatives_spanish:
  - los baca
  - los árboles de baca
  lexicon: HALOT
  rationale: El término vegetal es incierto; se evita la identificación tradicional con «morera». «Árboles de bálsamo» conserva un referente botánico concreto y permite anotar la incertidumbre textual/lexical.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB inglés, que afinó el movimiento táctico de «away from them» a «from behind them»; por eso el español evita una lectura meramente lateral y expresa explícitamente «por detrás de ellos».
  spanish_consistency_notes:
  - Se usó «Dios» para el término hebreo אֱלֹהִים, conforme al contexto narrativo.
  - Se mantuvo «subir» para עלה, porque el hebreo conserva su literalidad aun en contexto militar.
  - Se evitó «morera» porque la nota inglesa documenta la incertidumbre botánica y advierte contra la tradición heredada sin base segura.
  - La puntuación con comillas angulares sigue el uso editorial en español bíblico moderno.
