translation:
  language: es
  text: 'Entonces Elías le dijo: «Por favor, quédate aquí, porque Yahvé me ha enviado al Jordán[a]». Pero él respondió: «Tan cierto como que Yahvé vive, y como que tú mismo vives[b], no te dejaré». Así que los dos siguieron adelante.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al río Jordán».
    reason: lexical_alternative
  - marker: b
    text: 'Fórmula juratoria hebrea: «Vive Yahvé, y vive tu vida; si te dejo...», con el sentido de «ciertamente no te dejaré».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שֵׁב נָא
  english_pob_choice: Please stay
  chosen_spanish: Por favor, quédate
  alternatives_spanish:
  - Por favor, permanece
  - Por favor, siéntate
  lexicon: HALOT
  rationale: שֵׁב puede significar ‘sentarse’, ‘quedarse’ o ‘permanecer’ según el contexto. Aquí Elías pide a Eliseo que se detenga y permanezca en ese lugar; ‘quédate’ comunica con naturalidad esa idea. נָא aporta cortesía o súplica, rendida con ‘Por favor’.
- source_word: פֹה
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - en este lugar
  lexicon: HALOT
  rationale: Es un adverbio locativo simple. ‘Aquí’ es la equivalencia natural en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino y no la sustitución por un título. El texto hebreo usa el Tetragrámaton, y la forma de esta serie en español es ‘Yahvé’.
- source_word: שְׁלָחַנִי
  english_pob_choice: has sent me
  chosen_spanish: me ha enviado
  alternatives_spanish:
  - me envió
  - me ha mandado
  lexicon: HALOT
  rationale: El perfecto narrativo expresa una comisión ya dada con relevancia presente. ‘Me ha enviado’ suena natural en español y preserva esa fuerza.
- source_word: הַיַּרְדֵּנָה
  english_pob_choice: to the Jordan
  chosen_spanish: al Jordán
  alternatives_spanish:
  - al río Jordán
  - al Jordán Río
  lexicon: HALOT
  rationale: La he direccional indica movimiento hacia el Jordán. ‘Al Jordán’ es conciso y suficiente en contexto; ‘río’ puede añadirse como alternativa aclaratoria.
- source_word: חַי יְהוָה
  english_pob_choice: As the LORD lives
  chosen_spanish: ¡Vive Yahvé!
  alternatives_spanish:
  - ¡Por la vida de Yahvé!
  - ¡Tan ciertamente como vive Yahvé!
  lexicon: HALOT
  rationale: Es una fórmula juratoria fija. En español, una equivalencia breve y solemne como ‘¡Vive Yahvé!’ conserva la invocación de la vida de Dios en tono de juramento.
- source_word: וְחֵי נַפְשְׁךָ
  english_pob_choice: and as you yourself live
  chosen_spanish: y vive tu propia vida
  alternatives_spanish:
  - y vive tu vida
  - y como vive tu alma
  lexicon: HALOT
  rationale: La frase hebrea forma parte de la fórmula de juramento e invoca la vida del interlocutor. ‘Tu propia vida’ evita una lectura dualista de ‘alma’ y mantiene el paralelismo solemne del hebreo.
- source_word: אִם אֶעֶזְבֶךָּ
  english_pob_choice: I will not leave you
  chosen_spanish: que no te dejaré
  alternatives_spanish:
  - que no te abandonaré
  - si te dejo
  lexicon: HALOT
  rationale: 'En esta construcción juratoria, אִם introduce una negación elíptica: el sentido es una negativa enfática. ‘Que no te dejaré’ transmite la promesa/solemnidad sin volver la cláusula ambigua en español.'
- source_word: וַיֵּלְכוּ שְׁנֵיהֶם
  english_pob_choice: So the two of them went on
  chosen_spanish: Y siguieron caminando los dos
  alternatives_spanish:
  - Y fueron los dos
  - Así que ambos siguieron
  lexicon: HALOT
  rationale: La frase subraya que Elías y Eliseo continuaron juntos. ‘Siguieron caminando los dos’ preserva el énfasis dual y la progresión del viaje.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: Se mantiene el nombre propio de Dios revelado en el texto hebreo, evitando la sustitución por un título. En español de esta obra, la forma establecida es ‘Yahvé’ como equivalente de יְהוָה.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fórmula juratoria con חַי יְהוָה וְחֵי נַפְשְׁךָ
  english_pob_reading: 'Hebrew oath formula: “As the LORD lives, and as your life lives, if I leave you …,” meaning “I will certainly not leave you.”'
  chosen_spanish_reading: ¡Vive Yahvé, y vive tu propia vida, que no te dejaré!
  alternative_spanish_readings:
  - ¡Tan ciertamente como vive Yahvé, y como vive tu vida, no te dejaré!
  - ¡Por la vida de Yahvé y por tu vida, no te dejaré!
  rationale: La frase hebrea es una fórmula juratoria elíptica. Se conserva el tono solemne y la negación enfática, sin deshacer del todo la estructura del juramento ni introducir una lectura extraña de ‘alma’.
  doctrine_reference: Hebrew oath formula in 2 Kings 2:6; consistent with POB handling of idiomatic negatives
translation_notes:
  revision_awareness: 'Revisión concordante con el último pase: no se detectaron cambios necesarios respecto del testimonio hebreo y del trazado auditado en inglés. Se conservan el nombre divino, la fórmula juratoria y el énfasis en que ambos continuaron juntos.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ para יְהוָה conforme al estándar del proyecto en español.
  - Se eligió ‘quédate’ por naturalidad contextual, sin perder el valor de permanecer en el lugar.
  - ‘Jordán’ se usa como topónimo direccional; la nota permite ‘río Jordán’ como alternativa.
  - Se evita ‘alma’ en la fórmula juratoria para no imponer una carga teológica ajena al hebreo y mantener el paralelismo idiomático.
  - ‘Los dos’ preserva el énfasis dual del hebreo שְׁנֵיהֶם.
