translation:
  language: es
  text: Y vosotros mismos habíais vuelto hoy y habíais hecho lo recto ante mis ojos, proclamando libertad, cada hombre a su prójimo; y habíais cortado un pacto[a] delante de mí en la casa que es llamada por mi nombre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'habíais hecho un pacto'. Hebreo literalmente, 'habíais cortado un pacto'.
    reason: lexical_alternative
  - marker: b
    text: Es decir, el templo en Jerusalén.
    reason: cultural_note
lexical_decisions:
- source_word: וַתָּשֻׁבוּ
  english_pob_choice: had turned back
  chosen_spanish: os habíais vuelto
  alternatives_spanish:
  - os habíais regresado
  - os habíais tornado
  lexicon: HALOT
  rationale: שׁוּב expresa volver/retroceder; aquí el contexto habla de un retorno práctico a la obediencia, no necesariamente de arrepentimiento interior pleno. El pluscuamperfecto español comunica bien la secuencia temporal del hebreo frente al verso siguiente.
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - en este día
  lexicon: HALOT
  rationale: Adverbio temporal directo; 'hoy' es natural en español y conserva la inmediatez del hebreo.
- source_word: הַיָּשָׁר בְּעֵינַי
  english_pob_choice: what was right in my eyes
  chosen_spanish: lo recto
  alternatives_spanish:
  - lo que era recto a mis ojos
  - lo que estaba bien ante mis ojos
  lexicon: HALOT
  rationale: La idiomática hebrea expresa evaluación moral divina. En español, 'lo recto' mantiene la idea normativa sin sonar forzado, y el complemento 'ante mis ojos' conserva la imagen del original.
- source_word: לִקְרֹא דְרוֹר
  english_pob_choice: by proclaiming liberty
  chosen_spanish: proclamando libertad
  alternatives_spanish:
  - proclamando liberación
  - proclamando emancipación
  lexicon: HALOT
  rationale: דְרוֹר se refiere a liberación/emancipación pública, especialmente en contextos de manumisión. 'Libertad' funciona bien en español bíblico contemporáneo y mantiene el acto formal de proclamación.
- source_word: אִישׁ לְרֵעֵהוּ
  english_pob_choice: each man to his neighbor
  chosen_spanish: cada hombre a su prójimo
  alternatives_spanish:
  - cada uno a su prójimo
  - cada hombre a su compañero
  lexicon: HALOT
  rationale: Se conserva el distributivo masculino del hebreo y el valor relacional de רֵעַ. 'Prójimo' es una opción natural y bíblicamente reconocible en español; 'cada hombre' conserva el matiz de género del texto fuente.
- source_word: וַתִּכְרְתוּ בְרִית
  english_pob_choice: you had cut a covenant
  chosen_spanish: habíais cortado un pacto
  alternatives_spanish:
  - habíais hecho un pacto
  - habíais concertado un pacto
  lexicon: HALOT
  rationale: כרת ברית es literalmente 'cortar un pacto'. En español, 'cortar' suena menos idiomático pero preserva la imagen ritual y jurídica; 'pacto' es la opción más clara y transparente en español. Se mantiene la tensión lexical sin ocultarla.
- source_word: לְפָנַי
  english_pob_choice: before me
  chosen_spanish: delante de mí
  alternatives_spanish:
  - ante mí
  - en mi presencia
  lexicon: HALOT
  rationale: La expresión conserva el lenguaje de presencia pactal. 'Delante de mí' suena natural en español y refleja bien el hebreo.
- source_word: בַּבַּיִת אֲשֶׁר נִקְרָא שְׁמִי עָלָיו
  english_pob_choice: in the house that is called by my name
  chosen_spanish: en la casa que es llamada por mi nombre
  alternatives_spanish:
  - en la casa que lleva mi nombre
  - en el templo que es llamado por mi nombre
  lexicon: HALOT
  rationale: Se conserva la forma pasiva del hebreo ('ser llamada por mi nombre') para no borrar la expresión de pertenencia/identificación divina. 'Casa' se mantiene por transparencia; el sentido apunta al templo, pero el término del original no se sustituye en el texto principal.
theological_decisions:
- issue: Covenant idiom כרת ברית
  english_pob_reading: you had cut a covenant
  chosen_spanish_reading: habíais cortado un pacto
  alternative_spanish_readings:
  - habíais hecho un pacto
  - habíais concertado un pacto
  rationale: La traducción conserva la imagen ritual y solemne del hebreo. Aunque 'hacer un pacto' sería más idiomático, 'cortar' mantiene la metáfora original y su peso teológico en Jeremías 34.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave o excepción documentada)
- issue: Distributive masculine אִישׁ לְרֵעֵהוּ
  english_pob_reading: each man to his neighbor
  chosen_spanish_reading: cada hombre a su prójimo
  alternative_spanish_readings:
  - cada uno a su prójimo
  - cada hombre a su vecino
  rationale: Se conserva el masculino distributivo por fidelidad al hebreo y por la política del proyecto de priorizar precisión de género cuando el original la presenta. 'Prójimo' mantiene el carácter relacional del término sin neutralizarlo.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
- issue: Expresión de pertenencia divina en la casa
  english_pob_reading: the house that is called by my name
  chosen_spanish_reading: la casa que es llamada por mi nombre
  alternative_spanish_readings:
  - la casa que lleva mi nombre
  - la casa sobre la cual es invocado mi nombre
  rationale: La pasiva conserva la fórmula bíblica de identificación y pertenencia sin diluirla. Aunque 'lleva mi nombre' sería más fluido, la forma elegida respeta mejor la construcción del original y su resonancia cultual.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave o excepción documentada)
translation_notes:
  revision_awareness: Concordancia alta con el análisis fuente y con la auditoría inglesa; se mantiene la tensión lexical de כרת ברית y la forma pasiva de 'llamada por mi nombre', sin cambios respecto al último pase de revisión.
  spanish_consistency_notes:
  - Se usó 'Y' inicial para reflejar el comienzo conjuntivo del hebreo en un registro bíblico natural.
  - '''Pacto'' se prefirió a ''alianza'' para mantener la terminología habitual del pasaje sin borrar la metáfora de cortar.'
  - '''Casa'' se conservó en el texto principal; el sentido de templo queda implícito y no se sobreexplica en el cuerpo del versículo.'
  - El pluscuamperfecto ('habíais') ayuda a mantener la relación temporal con el contexto narrativo inmediato.
