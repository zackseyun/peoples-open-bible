translation:
  language: es
  text: No deben construir una casa, ni sembrar semilla, ni plantar una viña, ni tener una; sino que habitarán en tiendas todos sus días, para que vivan muchos días sobre la faz de la tierra donde ustedes residen como forasteros[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "donde ustedes habitan temporalmente". El verbo hebreo expresa la idea de vivir como residente no permanente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבַיִת
  english_pob_choice: a house
  chosen_spanish: una casa
  alternatives_spanish:
  - un hogar
  - una vivienda
  lexicon: HALOT
  rationale: En este contexto la prohibición contrasta con vivir en tiendas, así que 'casa' conserva la referencia concreta a una construcción habitable. 'Hogar' sería más abstracto y 'vivienda' más técnico.
- source_word: תִבְנוּ
  english_pob_choice: you must not build
  chosen_spanish: no deben construir
  alternatives_spanish:
  - no construirán
  - no deben edificar
  lexicon: HALOT
  rationale: El imperfecto con לֹא funciona como prohibición. 'No deben construir' comunica la fuerza normativa en español moderno y mantiene el tono instruccional.
- source_word: וְזֶרַע
  english_pob_choice: seed
  chosen_spanish: semilla
  alternatives_spanish:
  - sembrado
  - cosecha
  lexicon: HALOT
  rationale: '''Semilla'' conserva el valor concreto de זֶרַע sin especificar cultivos. ''Sembrado'' o ''cosecha'' ya interpretan más de lo que exige el texto.'
- source_word: תִזְרָעוּ
  english_pob_choice: you must not sow
  chosen_spanish: ni sembrar
  alternatives_spanish:
  - ni siembran
  - ni deben sembrar
  lexicon: HALOT
  rationale: '''Sembrar'' es el equivalente natural del verbo agrícola. Se mantiene la coordinación negativa del hebreo dentro de la serie de prohibiciones.'
- source_word: וְכֶרֶם
  english_pob_choice: a vineyard
  chosen_spanish: una viña
  alternatives_spanish:
  - un viñedo
  - un viñal
  lexicon: HALOT
  rationale: '''Viña'' es el equivalente tradicional y claro para כֶּרֶם. ''Viñedo'' puede sonar más técnico o moderno; ''viñal'' es menos común.'
- source_word: תִטָּעוּ
  english_pob_choice: you must not plant
  chosen_spanish: ni plantar
  alternatives_spanish:
  - ni deben plantar
  - ni establecer
  lexicon: HALOT
  rationale: '''Plantar'' refleja de manera directa נטע en contexto agrícola. Se enlaza naturalmente con ''viña''.'
- source_word: וְלֹא יִהְיֶה לָכֶם
  english_pob_choice: nor shall you have one
  chosen_spanish: ni tener una
  alternatives_spanish:
  - ni la tendrán
  - ni habrá una para ustedes
  - ni poseerán una
  lexicon: HALOT
  rationale: El verbo singular con el dativo plural resume la prohibición de poseer una viña. 'Tener una' es idiomático en español y conserva el sentido de posesión sin forzar la sintaxis.
- source_word: בָּאֳהָלִים
  english_pob_choice: in tents
  chosen_spanish: en tiendas
  alternatives_spanish:
  - en tiendas de campaña
  - en carpas
  lexicon: HALOT
  rationale: '''Tiendas'' es la traducción bíblica natural y digna para אֹהָלִים. ''Tiendas de campaña'' introduce una imagen demasiado moderna; ''carpas'' es menos bíblico en registro.'
- source_word: תֵּשְׁבוּ
  english_pob_choice: you shall dwell
  chosen_spanish: habitarán
  alternatives_spanish:
  - vivirán
  - morarán
  lexicon: HALOT
  rationale: ישב en contexto de residencia expresa 'habitar/dwell'. 'Habitarán' mantiene el tono formal y la idea de residencia continuada.
- source_word: כָּל יְמֵיכֶם
  english_pob_choice: all your days
  chosen_spanish: todos sus días
  alternatives_spanish:
  - todos los días de su vida
  - todo el tiempo
  lexicon: HALOT
  rationale: La expresión temporal hebrea se rinde de forma natural como 'todos sus días'. Se conserva el carácter totalizador de la frase.
- source_word: לְמַעַן תִּחְיוּ
  english_pob_choice: so that you may live
  chosen_spanish: para que vivan
  alternatives_spanish:
  - a fin de que vivan
  - para vivir
  lexicon: HALOT
  rationale: לְמַעַן marca propósito. 'Para que vivan' expresa el fin de la orden sin añadir la noción de mera supervivencia.
- source_word: יָמִים רַבִּים
  english_pob_choice: many days
  chosen_spanish: muchos días
  alternatives_spanish:
  - largos días
  - un largo tiempo
  lexicon: HALOT
  rationale: '''Muchos días'' sigue de cerca la idiomática hebrea y evita suavizarla a ''un largo tiempo'', que es más interpretativo.'
- source_word: עַל פְּנֵי הָאֲדָמָה
  english_pob_choice: on the face of the land
  chosen_spanish: sobre la faz de la tierra
  alternatives_spanish:
  - sobre la tierra
  - en la tierra
  lexicon: HALOT
  rationale: La expresión se conserva de manera bastante literal porque el hebreo usa un giro idiomático marcado. 'Tierra' aquí comunica mejor el territorio habitado que 'suelo' o 'terreno'.
- source_word: אֲשֶׁר אַתֶּם גָּרִים שָׁם
  english_pob_choice: where you sojourn
  chosen_spanish: donde ustedes sojournan
  alternatives_spanish:
  - donde ustedes residen como extranjeros
  - donde ustedes habitan temporalmente
  lexicon: HALOT
  rationale: El verbo גור expresa residencia como forasteros o residentes temporales. Se eligió 'sojournan' para conservar esa tensión semántica, que el español común puede perder si se usa solo 'residen' o 'viven'.
theological_decisions:
- issue: Tensión entre residencia estable y residencia temporal en גור
  english_pob_reading: where you sojourn
  chosen_spanish_reading: donde ustedes sojournan
  alternative_spanish_readings:
  - donde ustedes residen como extranjeros
  - donde ustedes habitan temporalmente
  rationale: El texto no describe mera ubicación geográfica, sino una manera particular de vivir en la tierra sin apropiársela de forma estable. Mantener el préstamo 'sojournan' preserva la tensión conceptual del verbo hebreo, aunque sea menos usual, y por eso conviene explicarlo en nota.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el cierre revisado del POB en inglés: se mantuvo el paralelismo prohibitivo, se optó por un registro más formal con ''habitarán en tiendas'', y se preservó la tensión de גור mediante una nota léxica sobre la residencia temporal. También se evitó una paráfrasis más libre de ''many days'' y ''on the face of the land'' para conservar la textura semítica del versículo.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando el texto lo exija explícitamente; este versículo no contiene el nombre divino.
  - Se conservó el paralelismo de prohibiciones con 'no deben... ni... ni...', siguiendo la forma injuntiva del hebreo.
  - '''Casa'', ''semilla'', ''viña'' y ''tiendas'' mantienen el campo semántico concreto del texto.'
  - La nota[a] se ancla en 'sojournan' para reflejar el matiz de גור sin recargar el cuerpo principal con una perífrasis larga.
