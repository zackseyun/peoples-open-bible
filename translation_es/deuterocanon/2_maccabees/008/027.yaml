  - severity: low
    issue: «habiéndoles asignado un comienzo de misericordia» suena administrativo
    rationale: Aunque «asignado» puede reflejar τάξαντος, en contexto devocional español suena forzado. «habiéndoles señalado/concedido un comienzo de misericordia» comunica mejor sin perder la apertura teológica.
  revised_spanish_text: Después de haber recogido sus armas y recogido el botín de los enemigos, se dedicaron al sábado[a], bendiciendo abundantemente y dando gracias al Señor, que los había preservado hasta este día, habiéndoles señalado un comienzo de misericordia[b].
