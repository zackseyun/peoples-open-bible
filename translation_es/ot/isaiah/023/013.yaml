  text: הֵ֣ן אֶ֣רֶץ כַּשְׂדִּ֗ים זֶ֤ה הָ/עָם֙ לֹ֣א הָיָ֔ה אַשּׁ֖וּר יְסָדָ֣/הּ לְ/צִיִּ֑ים הֵקִ֣ימוּ בחיני/ו עֹרְרוּ֙ אַרְמְנוֹתֶ֔י/הָ שָׂמָ֖/הּ לְ/מַפֵּלָֽה׀׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/023/013.yaml
  text: Look at the land of the Chaldeans—this is the people that was not[a]; Assyria appointed it for desert creatures. They set up their siege towers, they stripped her palaces bare[d][c][b], they made her a ruin.
  footnotes:
  - marker: a
    text: Or, 'this people did not exist,' or 'this people was of no account.' The Hebrew clause is terse and difficult.
    reason: alternative_reading
  - marker: b
    text: Or, 'Asshur founded her for desert dwellers.' The phrase may refer either to wild desert creatures or to inhabitants of the desert.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew term behind 'siege towers' is uncertain; some render it 'watchtowers' or 'fortresses.'
    reason: textual_variant
  - marker: d
    text: Or, 'laid bare her palaces.'
    reason: lexical_alternative
