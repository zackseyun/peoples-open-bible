translation:
  language: es
  text: el altar del holocausto, y el enrejado de bronce[a] que le pertenece, sus varas y todos sus utensilios, la fuente y su pedestal[b]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la rejilla de bronce'.
    reason: lexical_alternative
  - marker: b
    text: Tradicionalmente, 'la fuente y su base'.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִזְבַּח הָעֹלָה
  english_pob_choice: the altar of burnt offering
  chosen_spanish: el altar del holocausto
  alternatives_spanish:
  - el altar del sacrificio quemado
  - el altar del holocausto ofrecido
  lexicon: HALOT
  rationale: La expresión nombra el altar asociado con el holocausto, y en español bíblico 'holocausto' comunica con precisión ese tipo de ofrenda sin convertir la frase en una paráfrasis más larga. Se conserva la relación posesiva implícita del constructo hebreo.
- source_word: מִכְבַּר הַנְּחֹשֶׁת
  english_pob_choice: the bronze grating
  chosen_spanish: el enrejado de bronce
  alternatives_spanish:
  - la rejilla de bronce
  - el enrejado broncíneo
  lexicon: HALOT
  rationale: מִכְבַּר denota una pieza de malla, rejilla o enrejado; 'enrejado' es natural y suficientemente técnico en español. 'De bronce' conserva el material sin introducir una interpretación adicional sobre la forma exacta.
- source_word: אֲשֶׁר לוֹ
  english_pob_choice: that belongs to it
  chosen_spanish: que le pertenece
  alternatives_spanish:
  - que es para él
  - que está unido a él
  lexicon: HALOT
  rationale: La relación es de pertenencia o adscripción al altar, no necesariamente de ubicación física. 'Le pertenece' reproduce bien esa asociación sin especificarla más de lo que el hebreo dice.
- source_word: בַּדָּיו
  english_pob_choice: its poles
  chosen_spanish: sus varas
  alternatives_spanish:
  - sus postes
  - sus barras de transporte
  lexicon: HALOT
  rationale: En el mobiliario del tabernáculo, בַּדִּים son las varas para cargar. 'Varas' es el término tradicional y exacto en español bíblico, y evita añadir 'de transporte' al texto principal.
- source_word: כָּל כֵּלָיו
  english_pob_choice: all its utensils
  chosen_spanish: todos sus utensilios
  alternatives_spanish:
  - todos sus instrumentos
  - todo su equipo
  lexicon: HALOT
  rationale: כֵּלִים abarca las piezas u objetos de servicio del altar. 'Utensilios' es amplio, claro y mantiene el sentido cultual sin sonar demasiado coloquial.
- source_word: הַכִּיֹּר
  english_pob_choice: the basin
  chosen_spanish: la fuente
  alternatives_spanish:
  - el lavatorio
  - la pila
  lexicon: HALOT
  rationale: En contexto tabernacular, el término corresponde al recipiente para lavar; 'fuente' es la forma española tradicional más natural y comprensible aquí. Se evita 'laver' por su arcaísmo y 'basin' por su posible ambigüedad en español.
- source_word: כַּנּוֹ
  english_pob_choice: its stand
  chosen_spanish: su pedestal
  alternatives_spanish:
  - su base
  - su soporte
  lexicon: HALOT
  rationale: El término designa el apoyo de la fuente. 'Pedestal' comunica bien la función de soporte en español culto y mantiene una distinción clara respecto a la fuente misma.
theological_decisions:
- issue: Nombre del objeto sacrificial del altar
  english_pob_reading: altar of burnt offering
  chosen_spanish_reading: altar del holocausto
  alternative_spanish_readings:
  - altar del sacrificio quemado
  - altar del holocausto ofrecido
  rationale: No hay necesidad de suavizar el sentido sacrificial; 'holocausto' preserva la referencia cultual concreta del hebreo עֹלָה. Esta elección mantiene la tensión ritual del pasaje en vez de generalizarla.
  doctrine_reference: Levítico 1; Éxodo 27:1-8
- issue: Distinción entre el término técnico del recipiente de lavado y su soporte
  english_pob_reading: the basin and its stand
  chosen_spanish_reading: la fuente y su pedestal
  alternative_spanish_readings:
  - la pila y su base
  - el lavatorio y su soporte
  rationale: El hebreo distingue claramente ambos objetos, y la traducción debe mantener esa separación. 'Fuente' y 'pedestal' ofrecen una diferencia visible en español sin perder la función de lavado ritual.
  doctrine_reference: Éxodo 30:18-21; Éxodo 38:8
translation_notes:
  revision_awareness: Se revisó el pasaje contra el hebreo consonántico y la nota auditada en inglés. No se requieren ajustes por variantes textuales; la traducción sigue de cerca la lista nominal del original y conserva las alternativas léxicas documentadas en el expediente inglés.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' solo cuando corresponde al nombre divino; este versículo no lo contiene.
  - Se prefirió terminología cultual precisa ('holocausto', 'varas', 'utensilios', 'fuente') coherente con el resto del proyecto.
  - La coordinación nominal conserva el orden acumulativo del hebreo sin introducir verbos no presentes en el texto.
