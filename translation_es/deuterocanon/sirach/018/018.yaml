translation:
  language: es
  text: El necio ingrato reprocha, y el don de un hombre envidioso[a] desgasta los ojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de un hombre de mal de ojo»; el griego βασκάνος puede sugerir envidia y la idea del «mal de ojo», es decir, una dádiva mezquina o renuente.
    reason: lexical_alternative
lexical_decisions:
- source_word: μωρὸς
  english_pob_choice: foolish
  chosen_spanish: necio
  alternatives_spanish:
  - tonto
  - insensato
  lexicon: LSJ
  rationale: El griego describe al tipo de persona con tono proverbial. «Necio» conserva ese registro sapiencial mejor que «tonto» y es más natural en español bíblico que una paráfrasis.
- source_word: ἀχάριστος
  english_pob_choice: ingrate
  chosen_spanish: ingrato
  alternatives_spanish:
  - desagradecido
  - ingrato
  lexicon: LSJ
  rationale: La idea central es falta de gratitud. «Ingrato» reproduce bien la fuerza moral del término y mantiene la concisión del proverbio.
- source_word: ὀνειδιεῖ
  english_pob_choice: reproaches
  chosen_spanish: reprende
  alternatives_spanish:
  - reprocha
  - vitupera
  - insulta
  lexicon: LSJ
  rationale: El verbo implica cargar de reproche o censura. «Reprende» comunica la acción con claridad y un tono elevado; «reprocha» también era viable, pero suena ligeramente más pesado en esta construcción.
- source_word: δόσις
  english_pob_choice: gift
  chosen_spanish: don
  alternatives_spanish:
  - regalo
  - ofrenda
  - dar
  lexicon: LSJ
  rationale: Aquí el sustantivo nombra la cosa dada. «Don» conserva la relación con el acto de dar y mantiene el paralelismo proverbial, sin introducir una connotación litúrgica que el contexto no exige.
- source_word: βασκάνου
  english_pob_choice: of an envious man
  chosen_spanish: de un hombre envidioso
  alternatives_spanish:
  - de un hombre de mal de ojo
  - de un hombre avaro
  - de un hombre mezquino
  lexicon: LSJ
  rationale: El término puede abarcar envidia y la idea idiomática del «mal de ojo». En el cuerpo principal se preserva la lectura directa «envidioso», y se deja constancia de la alternativa idiomática porque el griego admite esa tensión semántica.
- source_word: ἐκτήκει
  english_pob_choice: wears out
  chosen_spanish: consume
  alternatives_spanish:
  - desgasta
  - marchita
  - derrite
  lexicon: LSJ
  rationale: El verbo expresa la acción de consumir o agotar. «Consume» mantiene la imagen de desgaste progresivo sin sonar forzado con «los ojos».
- source_word: ὀφθαλμούς
  english_pob_choice: the eyes
  chosen_spanish: los ojos
  alternatives_spanish:
  - la vista
  - el mirar
  lexicon: LSJ
  rationale: Se conserva la imagen literal del griego. En español, «los ojos» permite mantener visible la metáfora de desgaste causada por una dádiva mezquina o envidiosa.
theological_decisions:
- issue: βασκάνος y la posible lectura del «mal de ojo» en un dicho sapiencial
  english_pob_reading: The Greek βασκάνος can evoke envy and the idiom of the 'evil eye.'
  chosen_spanish_reading: Se mantiene «hombre envidioso» en el texto, con la tensión semántica hacia el «mal de ojo» preservada como alternativa interpretativa.
  alternative_spanish_readings:
  - hombre de mal de ojo
  - hombre avaro
  - hombre mezquino
  rationale: No hay un conflicto doctrinal, pero sí una carga cultural y lexical importante. La traducción principal evita una expresión demasiado folklórica en el texto base, mientras reconoce que el griego puede aludir al imaginario del mal de ojo y a la generosidad renuente.
  doctrine_reference: Sabiduría bíblica; lexical/semantic note, not doctrinal
- issue: Función proverbial de la frase sobre la ingratitud y la dádiva torcida
  english_pob_reading: A foolish ingrate reproaches, and the gift of an envious man wears out the eyes.
  chosen_spanish_reading: Se conserva el paralelismo proverbial entre el necio ingrato y el don envidioso que consume los ojos.
  alternative_spanish_readings:
  - El necio desagradecido reprende, y el regalo de un hombre envidioso desgasta los ojos.
  - Un necio ingrato reprocha, y el don de un hombre de mal ojo consume la vista.
  rationale: La prioridad es mantener la sentencia breve y sentenciosa. La versión española conserva el contraste moral y la imagen corporal sin suavizar la aspereza del original.
  doctrine_reference: Literatura sapiencial; no doctrinal
translation_notes:
  revision_awareness: 'Se revisó el pasaje a la luz del texto griego de Swete y del audit trail inglés. La decisión principal fue conservar la tensión semántica de βασκάνος sin mecanizar el inglés: el texto base usa una interpretación directa («envidioso»), mientras que la nota deja visible la alternativa idiomática del «mal de ojo». No se requirieron cambios por revisiones previas.'
  spanish_consistency_notes:
  - Se usa «necio» para μωρὸς en registro sapiencial.
  - Se usa «ingrato» para ἀχάριστος, manteniendo la fuerza moral.
  - Se usa «reprende» para ὀνειδιεῖ para conservar tono bíblico sin arcaísmo excesivo.
  - Se evita «SEÑOR» u այլ terminología teológica ajena al pasaje; no aplica aquí.
  - Se mantiene «los ojos» literal para ὀφθαλμούς, preservando la imagen del griego.
