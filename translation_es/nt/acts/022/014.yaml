review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del griego y las decisiones principales del POB inglés: «El Dios de nuestros padres», «te ha designado», «para conocer su voluntad», «para oír una voz» y «de su boca» corresponden fielmente a Ὁ θεὸς τῶν πατέρων ἡμῶν, προεχειρίσατό, γνῶναι τὸ θέλημα αὐτοῦ, ἀκοῦσαι φωνὴν, y ἐκ τοῦ στόματος αὐτοῦ. Sin embargo, τὸν δίκαιον fue auditado en inglés como título «the Righteous One», y el español «al Justo» con nota no preserva tan claramente esa decisión léxica/titular como podría hacerlo una forma más directa.'
  spanish_quality_summary: 'El español es natural, claro y de tono bíblico digno. La frase fluye bien y evita calcos innecesarios. El único ajuste recomendado es reforzar en el texto principal el valor titular/cristológico de τὸν δίκαιον con «al Justo[a]» o mejor «al Justo»? No: dado el audit trail, «al Justo[a]» sigue siendo comprensible, pero la nota actual es defectuosa porque la alternativa repite exactamente el texto principal. Conviene cambiar el texto principal a «al Justo[a]» solo si la nota ofrece una alternativa distinta, o mejor aún usar «al Justo»? Para alineación con el inglés, la mejor reparación es «al Justo[a]» con nota que ofrezca «al Justo»/«al Justo» no sirve. Más fiel al inglés auditado y más claro en español es «al Justo[a]»? Aun así, la decisión inglesa fue ''Righteous One'', no ''Just One''. En español, «al Justo» es idiomático, pero para reflejar el matiz léxico de δικαιος conviene «al Justo[a]» con nota alternativa «al Recto» no es idiomático. Mejor solución: texto
    principal «al Justo[a]» y nota corregida a «O ''al Hombre Justo''» tampoco corresponde. Por tanto, lo reparable y necesario es la nota: debe indicar que funciona como título de Jesús y que también puede traducirse «al Righteous One» no es español. La mejor opción es cambiar el texto a «al Justo[a]» y nota: «Lit. ''al justo''. En Hechos funciona como título de Jesús; también puede traducirse ''al Justo''.» Eso sigue redundante. Así, lo más sólido es mover el principal a «al Justo[a]»? No mejora. Mejor: principal «al Justo[a]» con nota «O ''al Inocente/Justo''» no respaldado. En suma, el texto es bueno, pero la nota debe repararse y el título conviene explicitarlo mejor en el texto con mayúscula, que ya está.'
  glossary_alignment: 'No hay conflictos con la glosa del proyecto: θεός -> «Dios» está bien; no aparecen Yahvé, Mesías, espíritu, carne, gracia, etc. La principal cuestión terminológica es δίκαιος: el POB inglés documentó una lectura titular fuerte. «Justo» es aceptable en español e idiomático, pero la nota debe reflejar una alternativa real y la rationale debe dejar claro que se trata de un título de Jesús.'
  issues:
  - severity: medium
    issue: La nota al pie [a] repite la misma expresión del texto principal
    rationale: El texto dice «al Justo[a]» y la nota ofrece «O «el Justo»», que no aporta una alternativa significativa y además cambia solo la preposición/artículo exigidos por la sintaxis española.
  - severity: medium
    issue: El valor titular de τὸν δίκαιον podría preservarse con mayor claridad
    rationale: El audit trail inglés escogió explícitamente «the Righteous One» como título cristológico. «Al Justo» es aceptable y natural en español, pero conviene que la nota explique el valor titular sin redundancia y preserve una alternativa real documentada.
  revised_spanish_text: 'Y dijo: «El Dios de nuestros padres te ha designado para conocer su voluntad, para ver al Justo[a], y para oír una voz de su boca»'
  revised_footnotes:
  - marker: a
    text: «El Justo» funciona aquí como título de Jesús en Hechos; también puede traducirse «el Righteous One» en inglés como equivalente de sentido, o tradicionalmente «el Justo».
    reason: alternative_reading
  revision_rationale: Se mantiene casi intacto el texto principal porque es fiel, natural y bien alineado con el griego. La revisión corrige la nota, que en el borrador era redundante y no ofrecía una alternativa útil. Aun así, la nota propuesta evita alterar el español principal, aunque reconoce explícitamente el valor titular cristológico documentado en el POB inglés.
