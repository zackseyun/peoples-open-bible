review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: acercarse a Moisés, proponer enviar hombres por delante, explorar la tierra, traer un informe, indicar la ruta y las ciudades de destino. También conserva adecuadamente «subir» para עָלָה. Sin embargo, hay dos ajustes de fidelidad/claridad: «por nosotros» con «exploren la tierra» suena menos natural en español que «para nosotros», y «habremos de llegar» debilita el matiz de entrada/presentación hacia las ciudades expresado por נָבֹא אֲלֵיהֶן; «a las que iremos» o «a las cuales entraremos/llegaremos» depende del registro, pero conviene una formulación más directa y natural.'
  spanish_quality_summary: 'El español es claro y digno, pero presenta leves giros poco naturales: «exploren la tierra por nosotros» y «a las cuales habremos de llegar». «Nos traigan noticia» es comprensible, pero «nos traigan informe» o «nos traigan noticias» sonaría más idiomático; aun así, no es un error grave si se explica. La frase puede pulirse para mayor naturalidad sin perder cercanía al original.'
  glossary_alignment: No hay conflictos con la terminología de proyecto. «Hombres» está bien justificado para אֲנָשִׁים. «Subir» preserva correctamente el idiomatismo hebreo. No aparecen términos teológicos sensibles del glosario principal.
  issues:
  - severity: medium
    issue: «para que exploren la tierra por nosotros»
    rationale: Aunque comprensible, «por nosotros» con «explorar» suena menos natural en español para לָנוּ en este contexto. «Para nosotros» expresa mejor el beneficio o encargo sin cambiar el sentido.
  - severity: medium
    issue: «de las ciudades a las cuales habremos de llegar»
    rationale: La formulación es pesada y menos natural. Además, «habremos de llegar» desplaza ligeramente la idea de las ciudades como destinos a los que irán/entrarán. Una opción como «de las ciudades a las que iremos» mantiene el sentido prospectivo con mejor legibilidad.
  - severity: low
    issue: Nota b y elección «noticia»
    rationale: «Noticia» puede funcionar, pero en español bíblico/neutral «informe» encaja mejor con דָּבָר como reporte traído de vuelta. La nota actual lo defiende, pero el texto gana claridad con «informe».
