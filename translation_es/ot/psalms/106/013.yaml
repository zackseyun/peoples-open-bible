lexical_decisions:
- source_word: מִהֲרוּ
  english_pob_choice: quickly
  chosen_spanish: se apresuraron
  alternatives_spanish:
  - rápidamente
  - con prisa
  - se dieron prisa
  lexicon: HALOT
  rationale: El hebreo expresa prisa/rapidez. En español, el verbo pronominal mantiene el matiz de acción apresurada de forma natural en poesía bíblica.
- source_word: שָׁכְחוּ
  english_pob_choice: forgot
  chosen_spanish: olvidaron
  alternatives_spanish:
  - se olvidaron
  - olvidaron por completo
  lexicon: HALOT
  rationale: El qal perfecto פשוט comunica olvido real; 'olvidaron' es claro y sobrio. En español, el sentido no requiere intensificador adicional.
- source_word: מַעֲשָׂיו
  english_pob_choice: his works
  chosen_spanish: sus obras
  alternatives_spanish:
  - sus hechos
  - lo que había hecho
  lexicon: HALOT
  rationale: '''מַעֲשֶׂה'' abarca obras/hechos. ''Obras'' preserva la brevedad y el registro bíblico, y en español resulta natural para las acciones poderosas de Dios.'
- source_word: חִכּוּ
  english_pob_choice: wait
  chosen_spanish: esperaron
  alternatives_spanish:
  - aguardaron
  - se quedaron esperando
  - tardaron en
  lexicon: HALOT
  rationale: '''חכה'' es ''esperar''. ''Esperaron'' reproduce el sentido básico en español sin añadir matices de demora no presentes en el hebreo.'
- source_word: לַעֲצָתוֹ
  english_pob_choice: for his counsel
  chosen_spanish: su consejo
  alternatives_spanish:
  - su consejo deliberado
  - su plan
  - su propósito
  lexicon: HALOT
  rationale: '''עֵצָה'' puede ser consejo, plan o propósito. ''Consejo'' conserva la amplitud relacional y directiva de la palabra, evitando estrecharla a decreto o a mera opinión.'
theological_decisions:
- issue: Sentido de la 'עֵצָה' de Dios
  english_pob_reading: his counsel
  chosen_spanish_reading: su consejo
  alternative_spanish_readings:
  - su plan
  - su propósito
  rationale: 'El versículo reprende a Israel por no esperar la dirección deliberativa de Dios después de ver sus obras. ''Consejo'' conserva esa tensión: orientación sabia y voluntad directiva, sin resolverla en un concepto doctrinal más estrecho.'
  doctrine_reference: Preservar la tensión teológica del texto sin sobreespecificar el concepto.
translation_notes:
  revision_awareness: El texto inglés auditado permanece sin cambios en la revisión más reciente; no se documentan revisiones aplicadas. La versión española sigue esa lectura estable y mantiene la equivalencia óptima con el hebreo y el audit trail inglés.
  spanish_consistency_notes:
  - Se usa 'obras' para מַעֲשָׂיו, en continuidad con el registro bíblico y con la decisión inglesa 'works'.
  - Se usa 'consejo' para עֲצָתוֹ, manteniendo la amplitud semántica que el audit trail protege frente a 'plan' o 'propósito'.
  - Se evita 'SEÑOR' porque el texto hebreo no contiene el Tetragrámaton en este versículo; los posesivos se mantienen con referencia implícita a Dios por contexto.
