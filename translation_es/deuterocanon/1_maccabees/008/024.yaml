translation:
  language: es
  text: Pero si primero estalla guerra contra Roma[a], o contra cualquiera de sus aliados, en cualquier lugar dentro de su dominio,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «si la guerra surge primero para Roma, o para todos sus aliados, en todo su dominio». La redacción griega es condensada y de tono pacticio; «cualquiera de sus aliados» expresa mejor el sentido distributivo probable.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν ... ἐνστῇ
  english_pob_choice: if ... comes
  chosen_spanish: si ... se presenta
  alternatives_spanish:
  - si ... surge
  - si ... estalla
  - si ... llega
  lexicon: BDAG / LSJ
  rationale: ἐνίστημι con πόλεμος expresa la irrupción o aparición de la guerra. «Se presenta» mantiene el sentido de inicio de una situación de guerra sin añadir matices violentos no explícitos en el griego y suena natural en español jurídico.
- source_word: πόλεμος
  english_pob_choice: war
  chosen_spanish: guerra
  alternatives_spanish:
  - conflicto
  - batalla
  lexicon: BDAG
  rationale: El término normal y preciso en este contexto es «guerra»; «batalla» sería demasiado estrecho y «conflicto» demasiado general.
- source_word: Ῥώμῃ
  english_pob_choice: to Rome
  chosen_spanish: a Roma
  alternatives_spanish:
  - contra Roma
  - para Roma
  lexicon: LSJ
  rationale: El dativo con ἐνστῇ puede señalar a la parte afectada por el surgimiento de la guerra. «A Roma» conserva la relación griega sin forzar explícitamente la dirección de la agresión.
- source_word: προτέρα
  english_pob_choice: first
  chosen_spanish: primero
  alternatives_spanish:
  - antes
  - previamente
  lexicon: LSJ
  rationale: Aquí λειτουργa adverbialmente como prioridad temporal. «Primero» refleja esa secuencia de modo breve y claro.
- source_word: πᾶσι τοῖς συμμάχοις αὐτῶν
  english_pob_choice: any of their allies
  chosen_spanish: cualquiera de sus aliados
  alternatives_spanish:
  - todos sus aliados
  - cualquiera de los aliados de ellos
  - alguno de sus aliados
  lexicon: BDAG
  rationale: Aunque πᾶσι es formalmente «todos», el contexto pacticio y distributivo sugiere que la cláusula aplica si la guerra llega a Roma o a cualquiera de sus aliados. «Cualquiera de sus aliados» preserva ese valor distributivo.
- source_word: ἐν πάσῃ κυρίᾳ αὐτῶν
  english_pob_choice: anywhere within their dominion
  chosen_spanish: en todo su dominio
  alternatives_spanish:
  - en toda su jurisdicción
  - en toda su soberanía
  - en todo su territorio
  lexicon: LSJ
  rationale: κυρία denota esfera de autoridad, dominio o jurisdicción. «Dominio» expresa bien la extensión territorial bajo autoridad romana y mantiene el tono jurídico del pasaje.
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de 'comes first to' a 'first comes upon' y mantuvo la lectura distributiva de πᾶσι τοῖς συμμάχοις como 'any of their allies'. El español sigue esa decisión, evitando leer 'todos' de manera colectiva y optando por una formulación natural que conserva el carácter jurídico del griego.
  spanish_consistency_notes:
  - Se usó «guerra» para πόλεμος por precisión contextual.
  - Se evitó «SEÑOR» o terminología no pertinente; el versículo no contiene lenguaje divino.
  - «Dominio» traduce κυρία con un matiz jurídico-territorial coherente con el pacto.
  - La nota a pie preserva la alternativa formal y el valor distributivo documentado en el audit trail.
