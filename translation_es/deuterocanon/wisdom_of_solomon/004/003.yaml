translation:
  language: es
  text: Pero la numerosa descendencia de los impíos no servirá de nada, y de retoños ilegítimos[a] no echarán raíces en lo profundo[b], ni establecerán una base firme.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «brotes espurios» o «injertos espurios». El griego usa un término severo dentro de una metáfora hortícola.'
    reason: lexical_alternative
  - marker: b
    text: Lit. «no darán raíz hacia la profundidad»; es decir, no echarán raíces profundas.
    reason: lexical_alternative
lexical_decisions:
- source_word: πολύγονον δὲ ἀσεβῶν πλῆθος
  english_pob_choice: the numerous offspring of the ungodly
  chosen_spanish: la numerosa descendencia de los impíos
  alternatives_spanish:
  - la numerosa prole de los impíos
  - los muchos hijos de los impíos
  lexicon: LSJ
  rationale: πολύγονον + πλῆθος comunica abundancia de descendencia o prole; en español, 'numerosa descendencia' conserva el sentido colectivo y el registro sobrio. 'Impíos' mantiene la dimensión religiosa de ἀσεβῶν mejor que 'malvados'.
- source_word: οὐ χρησιμεύσει
  english_pob_choice: will be of no use
  chosen_spanish: no servirá de nada
  alternatives_spanish:
  - no será útil
  - no aprovechará
  lexicon: LSJ
  rationale: El verbo expresa utilidad o servicio. 'No servirá de nada' suena natural en español y conserva la idea de inutilidad futura sin añadir matices ajenos.
- source_word: ἐκ νόθων μοσχευμάτων
  english_pob_choice: from illegitimate shoots
  chosen_spanish: de injertos espurios
  alternatives_spanish:
  - de retoños ilegítimos
  - de brotes bastardos
  lexicon: LSJ
  rationale: νόθος tiene un valor descalificador fuerte y μοσχεύματα pertenece al campo hortícola. 'Injertos espurios' preserva el tono severo y el marco botánico, pero evita una dureza social que en español podría sonar artificial o distraer; 'espurios' mantiene la idea de falsedad/no legitimidad.
- source_word: οὐ δώσει ῥίζαν εἰς βάθος
  english_pob_choice: they will not put down a root into the depths
  chosen_spanish: no echará raíz en lo profundo
  alternatives_spanish:
  - no echará una raíz profunda
  - no hundirá raíz en las profundidades
  lexicon: LSJ
  rationale: La imagen literal de 'dar una raíz hacia profundidad' se expresa de manera idiomática con 'echar raíz'. 'En lo profundo' conserva la dirección y la idea de profundidad sin perder fluidez castellana.
- source_word: οὐδὲ ἀσφαλῆ βάσιν ἐδράσει
  english_pob_choice: nor establish a firm foundation
  chosen_spanish: ni establecerá una base firme
  alternatives_spanish:
  - ni asentará un cimiento seguro
  - ni formará un fundamento sólido
  lexicon: LSJ
  rationale: ἀσφαλής/βάσις/ἐδράζω conservan la metáfora de estabilidad y establecimiento. 'Base firme' es claro y fiel; 'establecerá' reproduce el aspecto futuro y la noción de fijación estable.
theological_decisions:
- issue: Caracterización moral-religiosa de ἀσεβῶν
  english_pob_reading: ungodly
  chosen_spanish_reading: impíos
  alternative_spanish_readings:
  - malvados
  - irreverentes
  rationale: '''Impíos'' mantiene la relación explícita con Dios que implica ἀσεβής y evita reducir el término a mera maldad ética general. En un texto sapiencial, esa carga religiosa es importante.'
  doctrine_reference: Translation philosophy §1, §6
- issue: Fuerza despectiva de νόθων en la metáfora vegetal
  english_pob_reading: illegitimate shoots
  chosen_spanish_reading: injertos espurios
  alternative_spanish_readings:
  - retoños ilegítimos
  - brotes espurios
  rationale: El griego usa un adjetivo socialmente duro dentro de una metáfora de horticultura. 'Espurios' preserva la idea de falsedad o no autenticidad sin obligar al español a un insulto que suene forzado; al mismo tiempo, mantiene la tensión lexical que el texto carga.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'La revisión inglesa reciente prefirió un registro más fluido y formal: ''numerous'' por ''many'', ''illegitimate'' por ''bastard'', y ''put down a root into the depths'' por una formulación más natural. Esta versión española sigue esa orientación, manteniendo la severidad de νόθων sin calcar una expresión demasiado cruda, y preservando la metáfora de raíz/profundidad con un español idiomático.'
  spanish_consistency_notes:
  - Se usa 'impíos' para ἀσεβῶν, coherente con el valor Godward del término y con el estándar POB de no neutralizarlo en simple 'malvados'.
  - Se evita 'SEÑOR' porque este versículo no contiene el nombre divino ni una cita directa de κύριος; la cuestión no aplica aquí.
  - '''Echar raíz'' se mantiene como equivalencia española estable para la metáfora agrícola de establecer raíces profundas.'
  - '''Base firme'' conserva la imagen de estabilidad de βάσις/ἐδράζω sin introducir un cimiento arquitectónico más fuerte de lo que el griego exige.'
