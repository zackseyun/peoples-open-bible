translation:
  language: es
  text: 'Mira: los cielos y los cielos más altos[a], el abismo[b] y la tierra; cuando él desciende sobre ellos, quedan inmóviles[c]; en su visitación, tiemblan.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los cielos y los cielos de los cielos». Se vierte de forma idiomática como «los cielos más altos» para expresar el superlativo semítico con español natural.'
    reason: lexical_alternative
  - marker: b
    text: Hebreo תְּהוֹם, «el profundo / la profundidad»; el paralelo griego tiene ἄβυσσος, «abismo». Se usa «abismo» en español por su fuerza cósmica y por el apoyo del griego.
    reason: lexical_alternative
  - marker: c
    text: La cláusula hebrea «cuando desciende sobre ellos, quedan inmóviles» es difícil en este texto hebreo compuesto; el paralelo griego enfatiza sobre todo el temblor cósmico en su visitación. Se conserva aquí la cláusula hebrea, pero con cautela textual.
    reason: textual_variant
lexical_decisions:
- source_word: הֵן
  english_pob_choice: Look
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - ¡Mira aquí!
  - ¡Mira, pues!
  - ¡He aquí!
  lexicon: HALOT
  rationale: La interjección hebrea introduce una afirmación enfática y deíctica. «¡Mira!» conserva el impulso exclamativo en español moderno sin perder solemnidad.
- source_word: הַשָּׁמַיִם וּשְׁמֵי הַשָּׁמַיִם
  english_pob_choice: the heavens and the highest heavens
  chosen_spanish: los cielos y los cielos de los cielos
  alternatives_spanish:
  - los cielos y los cielos altísimos
  - los cielos y el cielo de los cielos
  lexicon: HALOT
  rationale: Se conserva la expresión superlativa semítica de modo transparente. «Los cielos de los cielos» refleja mejor la construcción original que una simple equivalencia interpretativa como «cielos altísimos».
- source_word: תְהוֹם / ἄβυσσος
  english_pob_choice: the deep
  chosen_spanish: el abismo
  alternatives_spanish:
  - la profundidad
  - el océano primigenio
  lexicon: HALOT
  rationale: Aunque el inglés POB prefirió «the deep» desde el hebreo, el paralelo griego ἄβυσσος inclina el campo semántico hacia «abismo» en español. Así se mantiene la tensión entre el hebreo y el griego sin aplanarla.
- source_word: בְּרִדְתּוֹ עֲלֵיהֶם
  english_pob_choice: when he descends upon them
  chosen_spanish: cuando él desciende sobre ellos
  alternatives_spanish:
  - cuando baja sobre ellos
  - al descender sobre ellos
  lexicon: HALOT
  rationale: La cláusula hebrea se entiende de manera natural como descenso divino sobre la creación. «Desciende sobre ellos» sigue de cerca el valor verbal y preserva el tono teológico del texto.
- source_word: עוֹמְדִים
  english_pob_choice: they stand still
  chosen_spanish: se quedan en pie
  alternatives_spanish:
  - permanecen firmes
  - se mantienen inmóviles
  lexicon: HALOT
  rationale: La forma hebrea comunica permanecer o estar de pie. «Se quedan en pie» es idiomático en español y conserva la imagen de inmovilidad/estabilidad ante la presencia divina.
- source_word: בְּפָקְדוֹ
  english_pob_choice: at his visitation
  chosen_spanish: al visitarlos
  alternatives_spanish:
  - en su visitación
  - cuando los visita
  lexicon: HALOT; BDAG
  rationale: La raíz פקד, confirmada por el griego ἐπισκοπή, expresa visita/intervención divina. «Al visitarlos» suena natural en español y retiene el acto soberano de inspección o intervención sin reducirlo a mera observación.
- source_word: יִרְגְּשׁוּ
  english_pob_choice: they quake
  chosen_spanish: tiemblan
  alternatives_spanish:
  - se estremecen
  - se sacuden
  lexicon: HALOT
  rationale: El verbo denota agitación o sacudida. «Tiemblan» es una equivalencia clara y sobria; el contexto cósmico permite la intensificación implícita.
theological_decisions:
- issue: Visita divina e imagen de descenso
  english_pob_reading: when he descends upon them, they stand still; at his visitation they quake
  chosen_spanish_reading: cuando él desciende sobre ellos, se quedan en pie; al visitarlos, tiemblan
  alternative_spanish_readings:
  - cuando baja sobre ellos, permanecen firmes; en su visitación, se estremecen
  - al descender sobre ellos, quedan inmóviles; cuando los visita, tiemblan
  rationale: 'Se mantiene la doble secuencia del hebreo respaldada por el paralelo griego: primero el descenso de Dios y luego su intervención/visita que provoca temblor cósmico. No se elimina la tensión entre la imagen antropomórfica de descenso y el lenguaje más formal de visita/intervención.'
  doctrine_reference: Preservar la tensión textual y teológica; primacía de la evidencia original con apoyo del paralelo griego.
- issue: Abismo versus profundidad
  english_pob_reading: the deep
  chosen_spanish_reading: el abismo
  alternative_spanish_readings:
  - la profundidad
  - el mar profundo
  rationale: El hebreo תְהוֹם puede significar «profundidad» o «abismo», y el griego ἄβυσσος favorece la segunda opción. En español, «abismo» conserva mejor la resonancia cósmica y la amplitud semántica del texto.
  doctrine_reference: Mantener el campo semántico abierto entre hebreo y griego sin ocultar la fuerza del vocabulario original.
translation_notes:
  revision_awareness: La versión inglesa auditada pasó por una revisión que añadió explícitamente la cláusula de descenso («when he descends upon them, they stand still») para reflejar la secuencia hebrea completa. La redacción española incorpora esa cláusula y evita depender solo de la frase de visita/intervención. También se tuvo en cuenta que el hebreo de Kahana presenta una leve desarmonía textual; por eso se preserva el sentido cósmico seguro del hebreo con apoyo del griego ἐν τῇ ἐπισκοπῇ αὐτοῦ.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; aquí el referente es «él» sin sustitución nominal.
  - Se mantiene «abismo» en vez de «profundidad» por coherencia con el paralelo griego y para conservar el registro cósmico.
  - Se prefiere «tiemblan» frente a «se estremecen» para mantener concisión y continuidad con el paralelismo del verso.
  - Se conserva la estructura semítica de dos miembros principales para no borrar la tensión entre el hebreo y el griego.
