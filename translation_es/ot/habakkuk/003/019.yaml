translation:
  language: es
  text: 'Yahvé, mi Señor, es mi fuerza[a]; él hace mis pies como los de la cierva[b], y me hace andar sobre mis alturas[c].


    Para el director del coro: con mis instrumentos de cuerda[d].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, tradicionalmente, «El Señor DIOS es mi fuerza». El hebreo tiene más literalmente dos títulos: «YHWH, mi Señor».'
    reason: alternative_reading
  - marker: b
    text: Literalmente, «como ciervas». La imagen subraya agilidad y firmeza al andar en terreno escarpado.
    reason: lexical_alternative
  - marker: c
    text: O «mis lugares altos». La frase puede referirse a alturas físicas o, figuradamente, a lugares de seguridad o triunfo.
    reason: lexical_alternative
  - marker: d
    text: 'Esta línea final funciona como suscripción musical: «Para el director del coro; con mis instrumentos de cuerda».'
    reason: cultural_note
lexical_decisions:
- source_word: יְהוִה + אֲדֹנָי
  english_pob_choice: The LORD God / Yahweh God
  chosen_spanish: Yahvé Dios
  alternatives_spanish:
  - Yahvé, mi Señor
  - Yahvé, mi Señor Dios
  - El Señor Dios
  lexicon: HALOT
  rationale: El hebreo combina el nombre divino YHWH con אֲדֹנָי, y el audit trail inglés optó por conservar la distinción titulatoria sin colapsarla. En español, "Yahvé Dios" comunica de forma natural el nombre de pacto seguido del título divino, preservando el énfasis hebreo sin recurrir al ocultamiento tradicional de "SEÑOR".
- source_word: חֵילִי
  english_pob_choice: my strength
  chosen_spanish: mi fuerza
  alternatives_spanish:
  - mi fortaleza
  - mi poder
  - mi vigor
  lexicon: HALOT
  rationale: חֵיל puede abarcar fuerza, poder o capacidad. "Mi fuerza" es la opción más directa y natural en español para una confesión poética de dependencia de Dios como fuente de capacidad y sostén.
- source_word: וַיָּשֶׂם רַגְלַי כָּאַיָּלוֹת
  english_pob_choice: he makes my feet like the deer’s
  chosen_spanish: él hace mis pies como los de la cierva
  alternatives_spanish:
  - él pone mis pies como los de la cierva
  - él hace mis pies como los de la gacela
  - él hace mis pies como los de la cierva
  lexicon: HALOT
  rationale: La imagen compara la agilidad y seguridad del andar con la de un animal veloz y seguro en terreno difícil. "Cierva" conserva el rasgo femenino del plural hebreo אַיָּלוֹת y suena natural en español; "deer" en inglés se convirtió en una metáfora idiomática, pero en español conviene explicitar el femenino para mantener la precisión léxica.
- source_word: יַדְרִכֵנִי
  english_pob_choice: he causes me to tread
  chosen_spanish: me hace caminar
  alternatives_spanish:
  - me hace andar
  - me hace pisar
  - me conduce
  lexicon: HALOT
  rationale: El hifil de דרך expresa causar a dar pasos / a pisar. En español, "me hace caminar" conserva la idea causativa con buena fluidez poética; "me conduce" suaviza demasiado la fuerza del verbo original, y "me hace pisar" suena más áspero.
- source_word: בָּמוֹתַי
  english_pob_choice: my heights
  chosen_spanish: mis alturas
  alternatives_spanish:
  - mis alturas altas
  - mis lugares altos
  - mis alturas / mis lugares altos
  lexicon: HALOT
  rationale: בָּמוֹת puede referirse a alturas físicas o, figuradamente, a lugares de victoria/seguridad. "Mis alturas" mantiene el paralelismo y la ambigüedad útil del hebreo; en español es más natural que "mis lugares altos" y preserva la tensión lexical sin resolverla en exceso.
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choir director
  chosen_spanish: Para el director del coro
  alternatives_spanish:
  - Al director del coro
  - Para el maestro de coro
  - Para el director musical
  lexicon: HALOT
  rationale: El término funciona como suscripción musical. "Director del coro" comunica la función con claridad contemporánea en español y mantiene la nota litúrgico-musical sin imponer una terminología eclesiástica más tradicional de lo que el hebreo exige.
- source_word: בִּנְגִינוֹתָי
  english_pob_choice: with my stringed instruments
  chosen_spanish: con mis instrumentos de cuerda
  alternatives_spanish:
  - con mi música de cuerda
  - con mis cuerdas
  - con mis instrumentos
  lexicon: HALOT
  rationale: נְגִינוֹת alude a música/instrumentos de cuerda. "Instrumentos de cuerda" es concreto y legible en español, y el sufijo posesivo se conserva con "mis".
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh / The LORD God
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - el Señor
  - Jehová
  rationale: Siguiendo la decisión doctrinal del proyecto, el Tetragrámaton se vierte como "Yahvé" en el texto principal, no como una máscara de título. Aquí además el hebreo une YHWH con אֲדֹנָי, por lo que la traducción conserva ambas capas como "Yahvé Dios" para reflejar el doble énfasis sin perder legibilidad.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Ambigüedad de בָּמוֹתַי entre alturas físicas y lugares de triunfo/seguridad
  english_pob_reading: my heights / my high places
  chosen_spanish_reading: mis alturas
  alternative_spanish_readings:
  - mis lugares altos
  - mis cumbres
  - mis altos
  rationale: El audit trail inglés preserva la ambigüedad entre terreno elevado y sentido figurado. "Mis alturas" mantiene esa tensión en español y evita decidir prematuramente por una sola lectura interpretativa.
  doctrine_reference: Principio de preservación de ambigüedad poética del POB
translation_notes:
  revision_awareness: 'El texto inglés más reciente revisó "The LORD, my Lord" a "The LORD God" para reflejar con mayor naturalidad la combinación hebrea. La versión española sigue esa decisión revisada, pero usando la política del proyecto para el nombre divino: "Yahvé Dios". Se conservaron las demás decisiones léxicas estables del audit trail, incluyendo la imagen de la cierva, la ambigüedad de "mis alturas" y la suscripción musical final.'
  spanish_consistency_notes:
  - Se usa "Yahvé" de forma consistente para YHWH, evitando la máscara "SEÑOR".
  - '"cierva" refleja el femenino plural hebreo y suena natural en español bíblico contemporáneo.'
  - '"mis alturas" conserva la ambigüedad poética del hebreo y armoniza con el paralelismo del versículo.'
  - La suscripción final se traduce con registro claro y sobrio, sin convertirla en una fórmula litúrgica más técnica de lo que exige el texto.
