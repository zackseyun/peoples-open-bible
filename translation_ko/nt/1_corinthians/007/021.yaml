id: 1CO.7.21
reference: '1 Corinthians 7:21'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Δοῦλος ἐκλήθης; μή σοι μελέτω· ἀλλ’ εἰ καὶ δύνασαι ἐλεύθερος γενέσθαι, μᾶλλον χρῆσαι.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/007/021.yaml
  text: Were you called as a slave? Do not let it trouble you. But if indeed you are able to become free[a], rather make use of it.
  footnotes:
  - marker: a
    text: 'Or, ''rather make use of your present condition,'' that is, remain as you are. The Greek ''rather make use'' leaves the object unstated and has been understood in both ways.'
    reason: alternative_reading
translation:
  language: ko
  text: 그대가 노예로 부르심을 받았습니까? 그것을 마음에 두지 마십시오. 그러나 만일 그대가 자유롭게 될 수 있다 하더라도, 차라리 [지금 처지를] 그대로 사용하십시오.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「차라리 그것을(=자유를) 활용하라」. 헬라어 「μᾶλλον χρῆσαι」의 목적어가 본문에서 명시되지 않아, (1) 현재 노예 처지를 그대로 활용하라 — 종말이 가깝다는 23·29절 흐름에 맞춤 — 와 (2) 가능하다면 자유를 활용하라 두 읽기가 모두 가능하다.
    reason: alternative_reading
lexical_decisions:
- source_word: Δοῦλος
  english_pob_choice: a slave
  chosen_korean: 노예
  alternatives_korean:
  - 종
  lexicon: BDAG
  rationale: 'DOCTRINE.md와 글로사리에 따라 본 절(7:21–23)의 δοῦλος는 매임의 무게를 살려 「노예」로 옮긴다.'
- source_word: μᾶλλον χρῆσαι
  english_pob_choice: rather make use of it
  chosen_korean: 차라리 [지금 처지를] 그대로 사용하십시오
  alternatives_korean:
  - 오히려 자유를 누리십시오
  lexicon: BDAG
  rationale: 부정사 χρῆσαι(부정과거 명령)의 목적어가 본문에서 생략되어 「현 노예 신분을 활용하라」 또는 「얻게 된 자유를 활용하라」 두 해석이 모두 가능. 본 POB는 「현 처지를 활용하라」 읽기를 택하되 각주로 양 해석을 명시(글로사리 정책).
theological_decisions:
- issue: '7:21 μᾶλλον χρῆσαι의 양가성과 노예 신분에 대한 바울의 권면'
  chosen_reading: '바울은 노예에게 「부르심의 자리에 머물라」(7:20·24)는 흐름에 따라 우선 현 신분에 매이지 말되, 자유의 기회가 와도 그것을 신분 변경의 절대 목표로 삼지 말라고 권한다. 차라리 현 처지를 활용해 주를 섬기라'
  alternative_readings:
  - 자유의 기회가 오면 그것을 활용하라 (현대 다수 주석)
  - 현 노예 신분을 그대로 사용하라 (Origen, Chrysostom 등 고대 다수)
  rationale: '바울의 시간적 절박감(7:29·31)과 17·20·24절의 반복적 「부르심의 자리에 머물라」 권면, 22절의 「노예는 주의 자유인, 자유인은 메시아의 노예」 역설을 종합할 때, 신분 자체보다 부르심의 위치에서 주를 섬김이 중심이다. 「현 처지를 활용하라」 읽기가 17–24절 흐름에 부합하나, 양 해석은 모두 합법적이므로 각주로 명시한다. 23절의 「값으로 사신 바」(6:20과 어휘 호응)는 인간 노예제 자체를 폐기하지는 않으나, 노예와 자유인을 동일한 메시아의 노예로 평준화하여 신분 위계의 절대성을 해체한다.'
  doctrine_reference: 'DOCTRINE.md §1·§5: 매임 어휘의 무게(δοῦλος) 보존; 본문의 강한 의미를 약화시키지 않는다'
