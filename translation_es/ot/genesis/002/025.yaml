translation:
  language: es
  text: Y el hombre y su esposa estaban ambos desnudos[a], y no se avergonzaban.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los dos de ellos ... desnudos»; la formulación subraya que ambos miembros de la pareja estaban sin ropa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּהְיוּ
  english_pob_choice: were
  chosen_spanish: estaban
  alternatives_spanish:
  - eran
  - fueron
  lexicon: HALOT
  rationale: El waw consecutivo introduce la acción narrativa, pero el predicado es adjetival/estativo; en español, 'estaban' expresa mejor el estado continuo que 'fueron'.
- source_word: שְׁנֵיהֶם
  english_pob_choice: both
  chosen_spanish: ambos
  alternatives_spanish:
  - los dos
  - los dos juntos
  lexicon: HALOT
  rationale: La forma dual resalta a la pareja como conjunto; 'ambos' es natural en español y conserva ese énfasis.
- source_word: עֲרוּמִּים
  english_pob_choice: naked
  chosen_spanish: desnudos
  alternatives_spanish:
  - naked
  - sin ropa
  lexicon: HALOT
  rationale: '''Desnudos'' es el equivalente español directo y transparente de ''naked'', sin perder el valor léxico ni la conexión literaria con el juego de palabras del versículo siguiente.'
- source_word: הָאָדָם
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el humano
  - el ser humano
  lexicon: HALOT
  rationale: En este contexto inmediato, el referente es el varón en relación con 'su esposa'; 'el hombre' refleja con precisión esa especificidad contextual.
- source_word: וְאִשְׁתּוֹ
  english_pob_choice: and his wife
  chosen_spanish: y su esposa
  alternatives_spanish:
  - y su mujer
  - y la mujer
  lexicon: HALOT
  rationale: El sustantivo con sufijo posesivo de 3ms indica relación conyugal; 'esposa' comunica de forma clara y fiel esa relación en español.
- source_word: לֹא
  english_pob_choice: not
  chosen_spanish: 'no'
  alternatives_spanish:
  - 'no'
  lexicon: HALOT
  rationale: Negación estándar.
- source_word: יִתְבֹּשָׁשׁוּ
  english_pob_choice: were ashamed
  chosen_spanish: se avergonzaban
  alternatives_spanish:
  - estaban avergonzados
  - sentían vergüenza
  lexicon: HALOT
  rationale: El verbo expresa experimentar vergüenza; en español, la construcción pronominal 'se avergonzaban' es natural y conserva el sentido de estado/experiencia, no solo de 'embarazo' social.
theological_decisions:
- issue: Alcance de אָדָם en el contexto inmediato
  english_pob_reading: the man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - el ser humano
  - la humanidad
  rationale: La cláusula paralela con 'su esposa' delimita el referente como el varón individual, no la humanidad en general. Se preserva así la especificidad narrativa sin neutralizar el género donde el contexto lo determina.
  doctrine_reference: 'DOCTRINE.md: gender-accurate over gender-neutral; אָדָם según contexto'
translation_notes:
  revision_awareness: 'El audit trail inglés se mantuvo sin revisiones sustantivas: la lectura concordó con el texto hebreo y con el revisor. La traducción española sigue la misma interpretación: estado continuo (''estaban''), énfasis dual (''ambos'') y vergüenza experiencial (''se avergonzaban'').'
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' o terminología cultual ajena, porque el versículo no contiene el Tetragrámaton ni lenguaje divino.
  - '''Esposa'' se eligió por claridad relacional; ''mujer'' habría sido posible, pero menos preciso frente al sufijo posesivo conyugal.'
  - La nota al pie conserva el matiz dual del hebreo sin sobrerinterpretar el sentido.
