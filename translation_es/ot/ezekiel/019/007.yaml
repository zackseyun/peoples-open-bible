translation:
  language: es
  text: Él conoció[a] sus viudas, y asoló sus ciudades; la tierra y cuanto la llenaba fue desolada por el sonido de su rugido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «conoció sus/sus viudas», es decir, puede entenderse como «sus viudas» (de ellos) o «sus viudas» (de él). El verbo «conocer» puede llevar aquí un matiz hostil o sexual en contexto; algunos entienden la línea más concretamente como abuso de mujeres. Otros, siguiendo una lectura alternativa, traducen «destruyó sus palacios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּדַע
  english_pob_choice: he knew
  chosen_spanish: conoció
  alternatives_spanish:
  - supo
  - conoció con intimidad
  - violó
  lexicon: HALOT
  rationale: El hebreo ידע normalmente significa ‘conocer’, pero en este contexto metafórico puede insinuar una acción hostil o sexual. En español, ‘conoció’ conserva la forma básica del verbo y deja visible la tensión semántica sin fijar de entrada una interpretación más concreta.
- source_word: אַלְמְנוֹתָיו
  english_pob_choice: their widows
  chosen_spanish: a sus viudas
  alternatives_spanish:
  - a sus viudas/his widows
  - a sus palacios
  lexicon: HALOT
  rationale: La POB inglesa siguió el sentido masorético de ‘viudas’ y mantuvo la dificultad textual. En español, ‘a sus viudas’ respeta esa lectura y conserva la ambigüedad del pronombre posesivo en el contexto poético.
- source_word: וְעָרֵיהֶם הֶחֱרִיב
  english_pob_choice: and he laid waste their cities
  chosen_spanish: y asoló sus ciudades
  alternatives_spanish:
  - y devastó sus ciudades
  - y arrasó sus ciudades
  lexicon: HALOT
  rationale: החריב expresa devastar o dejar en ruina. ‘Asoló’ es natural en español bíblico actual y mantiene el valor de destrucción total sugerido por el hebreo.
- source_word: וַתֵּשַׁם
  english_pob_choice: was desolated
  chosen_spanish: fue desolada
  alternatives_spanish:
  - quedó desolada
  - se desoló
  lexicon: HALOT
  rationale: שמם denota volverse desolado o quedar en ruina. ‘Fue desolada’ preserva el valor resultativo/pasivo que la POB inglesa marcó como singular colectivo.
- source_word: אֶרֶץ וּמְלֹאָהּ
  english_pob_choice: the land and its fullness
  chosen_spanish: la tierra y cuanto la llenaba
  alternatives_spanish:
  - la tierra y su plenitud
  - la tierra y todo lo que había en ella
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y abarca la tierra con todo lo que contiene. ‘Cuanto la llenaba’ evita un calco rígido y mantiene la amplitud del conjunto sin perder la referencia al contenido de la tierra.
- source_word: מִקּוֹל שַׁאֲגָתוֹ
  english_pob_choice: by the sound of his roaring
  chosen_spanish: por el sonido de su rugido
  alternatives_spanish:
  - al sonido de su rugido
  - a causa del sonido de su rugido
  lexicon: HALOT
  rationale: מן aquí introduce causa o fuente. ‘Por el sonido de su rugido’ comunica el efecto devastador del rugido del león metafórico de manera clara y fiel al hebreo.
theological_decisions:
- issue: Tratamiento de אַלְמְנוֹתָיו en un oráculo metafórico de juicio
  english_pob_reading: Retain a translation tied to the MT sense of 'widows' while preserving ambiguity and noting the alternative 'palaces.'
  chosen_spanish_reading: Mantener ‘viudas’ en el texto principal y dejar visible la ambigüedad léxica sin cerrar la interpretación.
  alternative_spanish_readings:
  - ‘palacios’
  - ‘sus viudas’
  rationale: No se trata de una disputa doctrinal, sino de una dificultad lexical/textual. La versión española sigue de cerca el hebreo masorético como la POB inglesa, sin sustituirlo por una conjetura más fluida que borraría la tensión documentada.
  doctrine_reference: 'Principios de traducción POB: primacía del texto fuente, transparencia y preservación de ambigüedades relevantes'
translation_notes:
  revision_awareness: La redacción española sigue la última revisión inglesa, que ajustó el verbo a singular colectivo en ‘the land and its fullness was desolated’. También conserva la decisión de mantener la dificultad de ‘he knew their widows’ en vez de reemplazarla por una paráfrasis interpretativa.
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ solo donde el texto no lo requiere; en este versículo no aparece el nombre divino.
  - Se evitó ‘SEÑOR’ como sustituto enmascarador porque el versículo no contiene יהוה.
  - ‘Asoló’ y ‘desolada’ preservan la imagen de ruina total sin introducir vocabulario eclesiástico tradicional innecesario.
  - ‘Viudas’ mantiene la tensión del hebreo y la nota explica la alternativa textual sin resolverla artificialmente.
