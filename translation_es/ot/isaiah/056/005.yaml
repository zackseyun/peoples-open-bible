translation:
  language: es
  text: Y les daré[a], en mi casa y dentro de mis muros, un monumento y un nombre mejor que hijos e hijas; le daré[b] un nombre perpetuo, que no será cortado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un memorial y un nombre»; el hebreo dice literalmente «una mano y un nombre».
    reason: lexical_alternative
  - marker: b
    text: El hebreo cambia de «ellos» a «él», probablemente para individualizar la promesa dentro del grupo.
    reason: alternative_reading
lexical_decisions:
- source_word: וְנָתַתִּי
  english_pob_choice: And I will give
  chosen_spanish: Y les daré
  alternatives_spanish:
  - Y les concederé
  - Y les otorgaré
  lexicon: HALOT
  rationale: נתן se expresa de manera natural con «dar». Mantiene además el énfasis verbal repetido del versículo.
- source_word: לָהֶם
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - les daré a ellos
  lexicon: HALOT
  rationale: El pronombre es plural y debe conservarse como destinatario colectivo en la primera cláusula.
- source_word: בְּבֵיתִי
  english_pob_choice: in my house
  chosen_spanish: en mi casa
  alternatives_spanish:
  - dentro de mi casa
  - en mi templo
  lexicon: HALOT
  rationale: בית puede aludir al recinto de Yahvé; «casa» conserva la formulación amplia sin restringirla más de lo que exige el texto.
- source_word: וּבְחֹמֹתַי
  english_pob_choice: within my walls
  chosen_spanish: dentro de mis muros
  alternatives_spanish:
  - y dentro de mis muros
  - en mis muros
  lexicon: HALOT
  rationale: חומות son «muros». «Dentro de» refleja bien la preposición y la ubicación interna del espacio sagrado.
- source_word: יָד
  english_pob_choice: a monument
  chosen_spanish: un memorial
  alternatives_spanish:
  - un monumento
  - una mano
  lexicon: HALOT
  rationale: Aunque el sentido literal es «mano», en esta expresión idiomática el valor es conmemorativo. «Memorial» comunica la idea de recuerdo duradero sin perder la fuerza del símbolo.
- source_word: וָשֵׁם
  english_pob_choice: and a name
  chosen_spanish: y un nombre
  alternatives_spanish:
  - y reputación
  - y fama
  lexicon: HALOT
  rationale: שֵׁם se mantiene literalmente como «nombre», porque el hebreo lo usa en paralelo con el memorial y en sentido de honra y recuerdo.
- source_word: טוֹב מִבָּנִים וּמִבָּנוֹת
  english_pob_choice: better than sons and daughters
  chosen_spanish: mejor que hijos e hijas
  alternatives_spanish:
  - mejor que hijos o hijas
  - mejor que descendencia
  lexicon: HALOT
  rationale: «Hijos e hijas» reproduce fielmente la pareja hebrea y evita aplanar el matiz de la descendencia biológica.
- source_word: שֵׁם עוֹלָם
  english_pob_choice: an everlasting name
  chosen_spanish: un nombre perpetuo
  alternatives_spanish:
  - un nombre eterno
  - un nombre para siempre
  lexicon: HALOT
  rationale: עוֹלָם expresa duración indefinida/perpetua. «Perpetuo» suena solemne en español y conserva la idea de permanencia duradera.
- source_word: אֶתֶּן ל֔/וֹ
  english_pob_choice: I will give him
  chosen_spanish: les daré
  alternatives_spanish:
  - le daré
  - les otorgaré
  lexicon: HALOT
  rationale: El texto masorético pasa a singular; sin embargo, el contexto mantiene un referente colectivo, y la revisión del POB inglés optó por conservar el plural para no desatender el grupo aludido. En español se mantiene la referencia plural por consistencia con el flujo del versículo y la revisión auditada.
- source_word: אֲשֶׁר לֹא יִכָּרֵת
  english_pob_choice: that will not be cut off
  chosen_spanish: que no será cortado
  alternatives_spanish:
  - que no será eliminado
  - que nunca desaparecerá
  lexicon: HALOT
  rationale: כרת en pasiva conserva la imagen de ser «cortado». Aunque suene fuerte, es la forma más cercana y mantiene la resonancia con la posible extinción de la memoria o del linaje.
theological_decisions:
- issue: Imagen idiomática de יָד וָשֵׁם
  english_pob_reading: a monument and a name
  chosen_spanish_reading: un memorial y un nombre
  alternative_spanish_readings:
  - un monumento y un nombre
  - una mano y un nombre
  rationale: El hebreo usa una expresión idiomática para un recordatorio permanente y una honra perdurable. «Memorial» comunica mejor la función conmemorativa para el lector español; se evita «mano» porque oscurecería el sentido.
  doctrine_reference: 'Translation philosophy: optimal equivalence; respeto a la imagen original con inteligibilidad pública.'
- issue: Conservación del plural frente al singular en el cierre del versículo
  english_pob_reading: I will give them an everlasting name that will not be cut off
  chosen_spanish_reading: les daré un nombre perpetuo, que no será cortado
  alternative_spanish_readings:
  - le daré un nombre perpetuo, que no será cortado
  - les daré un nombre eterno, que no será cortado
  rationale: Aunque el hebreo cambia a singular, la tradición auditada del POB inglés decidió no forzar ese singular en la última cláusula para no desarmonizar el referente colectivo del pasaje. En español se conserva el plural por la misma razón de lectura contextual y revisión crítica.
  doctrine_reference: 'Translation philosophy: preservar el flujo del texto fuente sin suavizar una tensión textual real; evitar armonización artificial.'
translation_notes:
  revision_awareness: La redacción sigue el texto hebreo directamente y toma en cuenta la revisión auditada del POB inglés, que mantuvo la imagen idiomática «monument and a name» y finalmente armonizó el cierre al plural. En español se conserva esa lectura revisada, pero se explicita en nota la tensión del singular hebreo final para no ocultar la forma del original.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino en todo el proyecto, pero en este versículo el hebreo no lo escribe explícitamente.
  - «Memorial» se emplea como equivalente de valor idiomático para יָד; no se usa «mano» en el texto principal porque sería opaco.
  - Se mantiene el paralelismo poético con «hijos e hijas» y «nombre perpetuo».
  - El cierre en plural sigue la revisión auditada del POB inglés; la nota registra la lectura hebrea singular para transparencia textual.
