source:
  edition: SBLGNT
  text: καὶ ἐστὲ ἐν αὐτῷ πεπληρωμένοι, ὅς ἐστιν ἡ κεφαλὴ πάσης ἀρχῆς καὶ ἐξουσίας,
base_translation:
  language: en
  yaml_path: translation/nt/colossians/002/010.yaml
  text: and in him you have been made full, who is the head of every ruler and authority.
translation:
  language: ko
  text: 또한 여러분은 모든 통치자와 권세의 머리이신 그분 안에서 충만하게 된 자들입니다.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ἐστὲ ... πεπληρωμένοι
  english_pob_choice: you have been made full
  chosen_korean: 충만하게 된 자들입니다
  alternatives_korean:
  - 충만함을 입은 자들입니다
  - 가득 채워진 자들입니다
  lexicon: BDAG
  rationale: 완료 수동 분사 + εἰμί 합성. 완료된 행위의 결과적 상태를 「~된 자들입니다」로 옮긴다. 9절 「충만」과 어휘적 일관성.
- source_word: ἐν αὐτῷ
  english_pob_choice: in him
  chosen_korean: 그분 안에서
  alternatives_korean:
  - 그분 안에
  lexicon: BDAG
  rationale: 연합의 ἐν.
- source_word: ὅς ἐστιν ἡ κεφαλὴ
  english_pob_choice: who is the head
  chosen_korean: 머리이신 그분
  alternatives_korean:
  - 머리가 되시는 분
  lexicon: BDAG
  rationale: 관계대명사를 관형절로 자연스럽게 옮긴다. 1:18과 어휘적 일관성(「머리」 은유 보존).
- source_word: πάσης ἀρχῆς καὶ ἐξουσίας
  english_pob_choice: every ruler and authority
  chosen_korean: 모든 통치자와 권세
  alternatives_korean:
  - 모든 정사와 권세
  - 모든 우두머리와 권한
  lexicon: BDAG
  rationale: ἀρχή는 「통치자」(인격적 권세), ἐξουσία는 「권세」. 1:16과 어휘적 일관성을 살린다.
theological_decisions:
- issue: 그리스도가 모든 권세의 머리이심
  chosen_reading: 「모든 통치자와 권세의 머리」(주권·우위)
  alternative_readings:
  - 「모든 통치자와 권세의 근원」(기원)
  rationale: 골로새서의 즉각적 우주적 권세 문맥은 주권·우위를 우선시한다. 본문은 「머리」 은유 그대로 보존하고 해석은 본 절이 자체적으로 드러내도록 둔다.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension'
