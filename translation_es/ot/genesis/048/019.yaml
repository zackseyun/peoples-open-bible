translation:
  language: es
  text: 'Pero su padre se negó y dijo: «Yo sé, hijo mío, yo sé. También él llegará a ser un pueblo, y también él llegará a ser grande. Sin embargo, su hermano menor llegará a ser más grande que él, y su descendencia será la plenitud[a] de naciones».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «multitud de naciones». El hebreo, más literalmente, dice «plenitud de naciones».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְמָאֵן
  english_pob_choice: refused
  chosen_spanish: se negó
  alternatives_spanish:
  - se rehusó
  - se negó rotundamente
  lexicon: HALOT
  rationale: מאן expresa rechazo deliberado, no simple vacilación. «Se negó» comunica bien esa decisión en español natural y corresponde al valor de refusal del inglés POB.
- source_word: אָבִיו
  english_pob_choice: his father
  chosen_spanish: su padre
  alternatives_spanish:
  - el padre de él
  - su progenitor
  lexicon: HALOT
  rationale: El sufijo posesivo de tercera persona se vierte de forma directa como «su padre», manteniendo la referencia a Jacob sin recargar el texto.
- source_word: יָדַעְתִּי ... יָדַעְתִּי
  english_pob_choice: I know, my son, I know
  chosen_spanish: Yo sé, hijo mío, yo sé
  alternatives_spanish:
  - Sé, hijo mío, sé
  - Yo lo sé, hijo mío, yo lo sé
  lexicon: HALOT
  rationale: La repetición enfática debe conservarse. En español, «yo sé ... yo sé» reproduce la insistencia del hebreo sin añadir un objeto explícito que el texto no expresa.
- source_word: בְנִי
  english_pob_choice: my son
  chosen_spanish: hijo mío
  alternatives_spanish:
  - mi hijo
  lexicon: HALOT
  rationale: «Hijo mío» es una fórmula directa y digna de apelación afectiva en español bíblico contemporáneo.
- source_word: גַּם הוּא יִהְיֶה לְעָם
  english_pob_choice: He too will become a people
  chosen_spanish: También él llegará a ser un pueblo
  alternatives_spanish:
  - Él también será un pueblo
  - También él será un pueblo
  lexicon: HALOT
  rationale: עָם se rinde mejor aquí como «pueblo», preservando el sentido colectivo. «Llegará a ser» refleja היטב el futuro de devenir de יהיה.
- source_word: וְגַם הוּא יִגְדָּל
  english_pob_choice: and he too will become great
  chosen_spanish: y también él será grande
  alternatives_spanish:
  - y también él llegará a ser grande
  - y él también será grande
  lexicon: HALOT
  rationale: גדל aquí expresa grandeza/prominencia. En español, «será grande» suena natural y fiel; «llegará a ser» sería posible pero algo más pesado.
- source_word: וְאוּלָם
  english_pob_choice: Nevertheless
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - No obstante
  - Pero
  lexicon: HALOT
  rationale: Introduce un contraste fuerte entre las dos ramas. «Sin embargo» conserva la relación adversativa sin sonar demasiado coloquial.
- source_word: אָחִיו הַקָּטֹן
  english_pob_choice: his younger brother
  chosen_spanish: su hermano menor
  alternatives_spanish:
  - su hermano pequeño
  - su hermano menor de edad
  lexicon: HALOT
  rationale: הַקָּטֹן es comparativo de orden familiar, por lo que «menor» expresa mejor la prioridad de nacimiento que «pequeño».
- source_word: יִגְדַּל מִמֶּנּוּ
  english_pob_choice: will become greater than he
  chosen_spanish: será más grande que él
  alternatives_spanish:
  - llegará a ser más grande que él
  - será mayor que él
  lexicon: HALOT
  rationale: El comparativo מן se vierte naturalmente como «más grande que él». En español, esta forma comunica la superioridad de forma clara y directa.
- source_word: וְזַרְעוֹ
  english_pob_choice: and his offspring
  chosen_spanish: y su descendencia
  alternatives_spanish:
  - y sus descendientes
  - y su simiente
  lexicon: HALOT
  rationale: זֶרַע en contextos genealógicos suele ser colectivo. «Descendencia» preserva el sentido colectivo singular mejor que «descendientes».
- source_word: יִהְיֶה מְלֹא הַגּוֹיִם
  english_pob_choice: will become the fullness of nations
  chosen_spanish: será la plenitud de las naciones
  alternatives_spanish:
  - será la plenitud entre las naciones
  - será una plenitud de naciones
  - será una multitud de naciones
  lexicon: HALOT
  rationale: «Plenitud» refleja de modo más literal מְלֹא que «multitud». Se mantiene la tensión semántica sin resolverla hacia una paráfrasis tradicional más interpretativa.
theological_decisions:
- issue: 'מְלֹא הַגּוֹיִם: literalidad vs. tradición interpretativa'
  english_pob_reading: the fullness of nations
  chosen_spanish_reading: la plenitud de las naciones
  alternative_spanish_readings:
  - la multitud de las naciones
  - una multitud de naciones
  - la plenitud entre las naciones
  rationale: La frase hebrea admite resonancias interpretativas, pero el POB inglés ya decidió conservar «fullness». En español, «plenitud» mantiene esa elección y evita sustituirla por una interpretación tradicional más interpretativa como «multitud».
  doctrine_reference: Primacía del texto original; preservar tensión léxica donde el hebreo es idiomático o potencialmente denso.
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió «a fullness of nations» por «the fullness of nations» para reflejar con mayor precisión la frase hebrea. La versión española sigue esa decisión con «la plenitud de las naciones», manteniendo el artículo definido y la literalidad de מְלֹא sin adoptar la lectura más interpretativa «multitud».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponda, pero este versículo no contiene el tetragrámaton.
  - «Pueblo» se usa para עָם conforme al valor colectivo básico del hebreo.
  - «Descendencia» conserva el singular colectivo de זרע.
  - El estilo general busca ser digno y publicable en español, sin copiar de manera mecánica el orden sintáctico del inglés.
