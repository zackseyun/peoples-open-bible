    issue: «Y haré que muchachos sean sus príncipes» es gramatical, pero menos idiomático y menos directo que el hebreo en contexto de nombramiento.
    rationale: וְנָתַתִּי con complemento de cargo se expresa mejor en español bíblico natural como «pondré a ... por ...» o «haré ... sus príncipes». La forma actual suena algo traducida del inglés.
  - severity: low
    issue: «gobernarán sobre ellos» es comprensible, pero estilísticamente pesado.
    rationale: משל ב puede verterse de manera más fluida en español como «dominarán sobre ellos» o «los gobernarán». Dado que la POB inglesa retiene «rule over them», una formulación fuerte y clara encaja mejor.
  - severity: low
    issue: La documentación interna contiene alternativas corruptas/no españolas («नियुक्तaré», «պաշտոն»).
    rationale: No afecta directamente el texto bíblico final, pero sí la calidad editorial del registro y conviene señalarlo para limpieza del expediente.
