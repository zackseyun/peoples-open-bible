  rationale: Maintains the christological title and parallelism with “Father.”
- source_word: ⲟⲩⲁⲧⲛⲁⲩ
  chosen: invisible
  alternatives:
  - unseeable
  - not-to-be-seen
  lexicon: Crum Sahidic Coptic
  rationale: Privative ⲁⲧ- with ⲛⲁⲩ (‘see’) regularly denotes “invisible.”
- source_word: ⲙⲛⲧⲧⲁⲉⲓⲣⲉⲛ
  chosen: naming
  alternatives:
