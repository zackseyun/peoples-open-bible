base_translation:
  language: en
  yaml_path: translation/ot/ecclesiastes/010/001.yaml
  text: Dead flies make a perfumer’s oil stink and bubble up[b][a]; so a little folly outweighs wisdom and honor.
  footnotes:
  - marker: a
    text: Or 'ferment,' 'give off bubbles,' or more generally 'spoil.' The Hebrew verb suggests an active emission or bubbling from the ruined oil.
    reason: lexical_alternative
  - marker: b
    text: 'Or ''is more precious than.'' The Hebrew can be read as a comparison of value: ''a little folly is weightier/more significant than wisdom and honor.'''
    reason: lexical_alternative
