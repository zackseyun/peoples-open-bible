translation:
  language: es
  text: ¿Puedes poner una cuerda[a] por su nariz, o perforar su quijada[b] con un gancho?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse «un junco» o «una caña»; el hebreo אַגְמוֹן se refiere literalmente a un junco o planta semejante, pero aquí probablemente alude a una cuerda hecha de juncos.
    reason: lexical_alternative
  - marker: b
    text: O «su mejilla».
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲתָשִׂים
  english_pob_choice: Can you put
  chosen_spanish: ¿Puedes poner
  alternatives_spanish:
  - ¿Quieres poner
  - ¿Podrás poner
  - ¿Puedes colocar
  lexicon: HALOT
  rationale: La partícula interrogativa הֲ con שׂים introduce una pregunta retórica. En español, «¿Puedes poner» conserva el desafío implícito y suena natural sin perder la fuerza modal del hebreo.
- source_word: אַגְמוֹן
  english_pob_choice: a rope
  chosen_spanish: una cuerda
  alternatives_spanish:
  - una caña
  - un junco
  - una cuerda hecha de juncos
  lexicon: HALOT
  rationale: El hebreo puede referirse literalmente a una caña/junco, pero en este contexto la imagen funcional es la de un instrumento para sujetar por la nariz. «Una cuerda» comunica mejor ese sentido en español y sigue la decisión funcional del POB inglés.
- source_word: בְּאַפּוֹ
  english_pob_choice: through his nose
  chosen_spanish: por su nariz
  alternatives_spanish:
  - en su nariz
  - por su hocico
  - por su ollar
  lexicon: HALOT
  rationale: אַף significa nariz/ hocico según contexto. «Por su nariz» conserva la imagen de pasar un instrumento a través de ella sin caer en una formulación demasiado técnica o arcaica.
- source_word: וּבְחוֹחַ
  english_pob_choice: with a hook
  chosen_spanish: con un garfio
  alternatives_spanish:
  - con un gancho
  - con un anzuelo
  - con una espina
  lexicon: HALOT
  rationale: חוֹחַ puede ser espina o gancho. Dado el paralelismo con la sujeción violenta del animal, «garfio» comunica con fuerza el instrumento de captura mejor que una traducción botánica.
- source_word: תִּקּוֹב
  english_pob_choice: pierce
  chosen_spanish: perforarle
  alternatives_spanish:
  - horadarle
  - atravesarle
  - perforar
  lexicon: HALOT
  rationale: El verbo expresa perforar/horadar. «Perforarle» mantiene el sentido físico y el objeto directo implícito, y funciona bien en español con el dativo de interés.
- source_word: לֶחֱיוֹ
  english_pob_choice: his jaw
  chosen_spanish: la quijada
  alternatives_spanish:
  - la mejilla
  - la mandíbula
  - el carrillo
  lexicon: HALOT
  rationale: לֶחִי puede ser mejilla o mandíbula/quijada. En un contexto de control con garfio, «quijada» es más concreto y enérgico, y mantiene la imagen de sometimiento corporal.
translation_notes:
  revision_awareness: 'El texto en inglés del POB ya había resuelto las tensiones principales: אַגְמוֹן como instrumento de sujeción y לֶחִי como «jaw». Esta versión española conserva esas decisiones funcionales, pero emplea un vocabulario más natural para el castellano bíblico contemporáneo. No se incorporaron cambios textuales ni doctrinales; la revisión reciente indica que no había ajustes pendientes.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u otras sustituciones, porque no hay aquí el Tetragrámaton ni una decisión teológica asociada.
  - «Cuerda» mantiene el valor funcional de control decidido por el POB inglés, mientras la nota preserva la alternativa literal de caña/junco.
  - «Quijada» se eligió como equivalente idiomático de «jaw» en contexto de perforación y sujeción, sin ocultar que el hebreo podría leerse como «mejilla».
