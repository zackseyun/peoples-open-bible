    text: 'Hebrew: ''before my face,'' an idiom meaning ''before me'' or ''in my presence.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'And none shall appear before me empty-handed.' The Hebrew shifts from second-person singular address to a third-person plural verb in this clause.
    reason: alternative_reading
