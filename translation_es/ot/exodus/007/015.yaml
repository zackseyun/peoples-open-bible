base_translation:
  language: en
  yaml_path: translation/ot/exodus/007/015.yaml
  text: Go to Pharaoh in the morning[a]. Look, he is going out to the water, and you shall stand to meet him on the bank of the Nile[b], and you shall take in your hand the staff that was turned into a serpent.
  footnotes:
  - marker: a
    text: Or 'the river.' The Hebrew יְאֹר in Exodus commonly refers specifically to the Nile.
    reason: lexical_alternative
  - marker: b
    text: Or 'serpent.' The Hebrew נָחָשׁ can be rendered 'snake' or 'serpent'; 'snake' is used here for natural modern English.
    reason: lexical_alternative
