translation:
  language: es
  text: Cuando vinieron los jóvenes de David, le hablaron a Nabal todas estas palabras en nombre de David, y luego descansaron[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'se detuvieron' o 'hicieron una pausa'. El verbo hebreo puede significar 'descansaron', pero en este contexto quizá indica que los hombres de David terminaron de hablar y quedaron a la espera de la respuesta de Nabal.
    reason: lexical_alternative
lexical_decisions:
- source_word: נַעֲרֵי
  english_pob_choice: young men
  chosen_spanish: jóvenes
  alternatives_spanish:
  - siervos
  - hombres jóvenes
  lexicon: HALOT
  rationale: נַעַר puede referirse a joven, servidor o asistente según el contexto. Aquí el grupo son mensajeros de David; 'jóvenes' conserva la referencia humana sin convertirlos en 'siervos', que sería más interpretativo.
- source_word: וַיָּבֹאוּ
  english_pob_choice: came
  chosen_spanish: vinieron
  alternatives_spanish:
  - llegaron
  lexicon: HALOT
  rationale: El verbo בוא es el movimiento básico 'venir/entrar'. 'Vinieron' mantiene el flujo narrativo directo y la naturalidad en español.
- source_word: וַיְדַבְּרוּ אֶל
  english_pob_choice: spoke to
  chosen_spanish: hablaron a
  alternatives_spanish:
  - hablaron con
  - se dirigieron a
  lexicon: HALOT
  rationale: דבר con אֶל expresa hablar dirigido hacia alguien. 'Hablaron a' conserva la dirección del hebreo sin añadir matices relacionales que no están explicitados.
- source_word: כְּכָל הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: all these words
  chosen_spanish: todas estas palabras
  alternatives_spanish:
  - todas estas cosas
  - según todas estas palabras
  lexicon: HALOT
  rationale: La frase hebrea es literalmente 'según todas estas palabras'. En español, 'todas estas palabras' conserva la concreción verbal de דְּבָרִים y evita diluirlo en 'cosas'.
- source_word: בְּשֵׁם דָּוִד
  english_pob_choice: in David’s name
  chosen_spanish: en nombre de David
  alternatives_spanish:
  - en el nombre de David
  - por David
  lexicon: HALOT
  rationale: בְּשֵׁם indica representación o autorización. 'En nombre de David' es la forma natural en español y retiene el valor representativo del hebreo.
- source_word: וַיָּנוּחוּ
  english_pob_choice: they rested
  chosen_spanish: descansaron
  alternatives_spanish:
  - se detuvieron
  - pausaron
  - esperaron
  lexicon: HALOT
  rationale: El verbo נוח puede significar descansar, asentarse o hacer pausa. Dado el contexto narrativo tras pronunciar el mensaje, 'descansaron' sigue de cerca la lectura del texto base y deja abierta la posible transición a estar en reposo/pausa sin forzar una interpretación secundaria.
translation_notes:
  revision_awareness: La revisión inglesa reciente prefirió 'rested' frente a 'waited' para reflejar más directamente el verbo hebreo נוח. La redacción española sigue esa decisión con 'descansaron', manteniendo abierta, en la nota, la posibilidad contextual de pausa o espera.
  spanish_consistency_notes:
  - Se conservó 'David' como nombre propio sin adaptación.
  - Se evitó 'siervos' para נַעֲרֵי porque el contexto sugiere emisarios adultos, no una categoría servil estricta.
  - '''En nombre de David'' se mantiene como fórmula representativa equivalente a la del texto fuente.'
