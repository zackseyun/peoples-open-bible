translation:
  language: es
  text: y fue llevado[a] por Sesbasar[b], junto con los del cautiverio, de Babilonia a Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El sujeto no se expresa de nuevo en el griego; probablemente se trata de un objeto o recipiente del templo mencionado en el contexto previo.
    reason: cross_reference
  - marker: b
    text: 'Griego: «por Samanasar». Aquí se identifica con el funcionario conocido en el paralelo de Esdras como Sesbasar/Sheshbazzar.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀνηνέχθη
  english_pob_choice: was brought up
  chosen_spanish: fue traído
  alternatives_spanish:
  - fue llevado
  - fue transportado
  - fue subido
  lexicon: BDAG
  rationale: El griego es un aoristo pasivo de ἀναφέρω. En español, «fue traído» conserva el pasivo y funciona con naturalidad en un contexto de traslado hacia Jerusalén. Mantiene la idea direccional sin forzar un calco pesado como «fue subido», aunque esa imagen también está implícita en el movimiento hacia Jerusalén.
- source_word: ὑπὸ Σαμανασσάρου
  english_pob_choice: by Sheshbazzar
  chosen_spanish: por Sesbasar
  alternatives_spanish:
  - por Sheshbazzar
  - por Samanassar
  lexicon: Lexham Analytical Lexicon of the Septuagint
  rationale: Se conserva la identidad del personaje con la forma española habitual «Sesbasar», que refleja el referente del paralelo hebreo/Esdras. No se sigue mecánicamente la transliteración griega «Samanassar» porque el material de auditoría indica que el nombre apunta al mismo funcionario conocido en el contexto de Esdras.
- source_word: ἅμα τοῖς ἐκ τῆς αἰχμαλωσίας
  english_pob_choice: together with those from the captivity
  chosen_spanish: junto con los que venían del cautiverio
  alternatives_spanish:
  - junto con los de la cautividad
  - junto con los exiliados
  lexicon: BDAG
  rationale: ἅμα con dativo expresa compañía, y αἰχμαλωσία puede rendirse como «cautiverio» o «cautividad». «Los que venían del cautiverio» comunica la procedencia y el sentido de retorno sin perder la relación con el estado de exilio/cautividad.
- source_word: ἐκ Βαβυλῶνος
  english_pob_choice: from Babylon
  chosen_spanish: desde Babilonia
  alternatives_spanish:
  - de Babilonia
  lexicon: BDAG
  rationale: «Desde Babilonia» expresa con claridad el punto de partida y encaja mejor con el movimiento del verbo pasivo en español que un simple «de». Mantiene la referencia geográfica sin añadir explicación.
- source_word: εἰς Ἱερουσαλήμ
  english_pob_choice: to Jerusalem
  chosen_spanish: hasta Jerusalén
  alternatives_spanish:
  - a Jerusalén
  - hacia Jerusalén
  lexicon: BDAG
  rationale: «Hasta Jerusalén» conserva el trayecto completo y suena más idiomático en español que una simple preposición de dirección. El valor de meta del griego queda plenamente representado.
theological_decisions:
- issue: Identificación del nombre Σαμανασσάρου con el paralelo de Esdras
  english_pob_reading: Render the name as 'Sheshbazzar' in English
  chosen_spanish_reading: Sesbasar
  alternative_spanish_readings:
  - Samanassar
  - Sheshbazzar
  rationale: No es una decisión doctrinal sino de alineación textual. Dado que el paralelo hebreo y el contexto de Esdras identifican al mismo funcionario, la forma española tradicional «Sesbasar» comunica mejor el referente que una transliteración estrictamente griega.
  doctrine_reference: 'PHILOSOPHY.md: los paralelos hebreos/MT de 1 Esdras se usan como apoyo de traducción junto con el griego.'
- issue: Sujeto implícito del pasivo ἀνηνέχθη
  english_pob_reading: The implied subject is singular ('it was brought up'), likely referring to a temple vessel or item from the preceding context; the Greek does not repeat the noun here.
  chosen_spanish_reading: Sujeto implícito singular («fue traído»), probablemente un objeto o recipiente del templo del contexto anterior.
  alternative_spanish_readings:
  - fueron traídos
  - se trajo
  rationale: El griego no repite el sustantivo, así que el español tampoco debe inventarlo. Se conserva la ambigüedad controlada del original y se deja abierta la referencia al objeto mencionado antes.
  doctrine_reference: 'PHILOSOPHY.md: preservar ambigüedades textuales documentadas cuando el original no explicita el referente.'
translation_notes:
  revision_awareness: Se ha revisado el pasaje a la luz del paralelismo hebreo/Esdras y del informe de auditoría inglesa. La versión española evita una transliteración rígida del nombre propio, pero conserva la ambigüedad del sujeto implícito y el movimiento de retorno desde Babilonia a Jerusalén.
  spanish_consistency_notes:
  - Se usa «Babilonia» como topónimo y «Jerusalén» como destino final, manteniendo un registro bíblico claro y natural.
  - Se evita «SEÑOR» porque no hay referencia al nombre divino en este versículo.
  - Se mantiene el pasivo impersonal/sujeto implícito sin añadir un sustantivo no atestiguado en el texto griego.
