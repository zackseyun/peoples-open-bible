translation:
  language: es
  text: Yo soy una de los pacíficos y fieles en Israel. Tú buscas destruir una ciudad[a] y una madre en Israel. ¿Por qué habrías de tragar la heredad de Yahvé?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "una ciudad que es madre en Israel", probablemente una ciudad destacada o protectora dentro de Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁלֻמֵי
  english_pob_choice: one of the peaceable
  chosen_spanish: de los pacíficos
  alternatives_spanish:
  - de los que están en paz
  - de los pacíficos de Israel
  lexicon: HALOT
  rationale: El hebreo usa un plural en constructo de שָׁלוֹם con matiz colectivo. En español, 'de los pacíficos' conserva la pertenencia al grupo y suena natural, sin perder la idea de una clase de personas caracterizadas por la paz.
- source_word: אֱמוּנֵי
  english_pob_choice: faithful
  chosen_spanish: fieles
  alternatives_spanish:
  - fidedignos
  - fiables
  lexicon: HALOT
  rationale: La forma plural derivada de אמן comunica lealtad/confiabilidad. 'Fieles' refleja bien la fidelidad relacional y covenantal que el contexto sugiere, y encaja de forma natural con 'los pacíficos'.
- source_word: מְבַקֵּשׁ לְהָמִית
  english_pob_choice: are seeking to destroy
  chosen_spanish: buscas destruir
  alternatives_spanish:
  - buscas matar
  - estás tratando de destruir
  lexicon: HALOT
  rationale: Aunque לְהָמִית es literalmente 'dar muerte', el objeto inmediato es una ciudad; por eso, como en la revisión inglesa, 'destruir' comunica mejor el efecto del ataque sin perder la violencia del verbo en contexto militar.
- source_word: עִיר וְאֵם בְּיִשְׂרָאֵל
  english_pob_choice: a city, and a mother in Israel
  chosen_spanish: una ciudad[a], y una madre en Israel
  alternatives_spanish:
  - una ciudad y una madre en Israel
  - una ciudad que es madre en Israel
  - una ciudad madre en Israel
  lexicon: HALOT
  rationale: Se preserva la imagen hebrea de 'madre' sin resolverla en paráfrasis. El sustantivo apposicional puede describir una ciudad prominente o protectora; el español mantiene la tensión literaria y deja la aclaración para la nota.
- source_word: תְבַלַּע
  english_pob_choice: would you swallow up
  chosen_spanish: habrías de tragar
  alternatives_spanish:
  - tragarías
  - habrías de devorar
  - habrías de consumir
  lexicon: HALOT
  rationale: '''Tragar'' conserva la metáfora concreta de בלע. Se eligió la perífrasis interrogativa ''¿Por qué habrías de...?'' para reflejar el valor retórico del hebreo y el matiz de reproche.'
- source_word: נַחֲלַת יְהוָה
  english_pob_choice: the inheritance of Yahweh
  chosen_spanish: la heredad de Yahvé
  alternatives_spanish:
  - la herencia de Yahvé
  - la heredad del Yahvé
  lexicon: HALOT
  rationale: '''Heredad'' mantiene el campo semántico patrimonial/covenantal de נַחֲלָה y evita banalizarlo como mera posesión. ''Yahvé'' sigue el estándar del proyecto para el nombre divino.'
theological_decisions:
- issue: Metáfora de 'madre en Israel'
  english_pob_reading: Retain the metaphor in the main text rather than resolving it into an explanatory paraphrase.
  chosen_spanish_reading: Mantener 'una madre en Israel' en el texto principal.
  alternative_spanish_readings:
  - una ciudad madre en Israel
  - una ciudad prominente en Israel
  - una ciudad que nutre a Israel
  rationale: La imagen tiene fuerza retórica y forma parte del argumento del hablante. Traducirla literalmente preserva la tensión; la nota puede orientar al lector sin borrar la metáfora.
  doctrine_reference: Translation philosophy §3, §5
- issue: Nombre divino en נַחֲלַת יְהוָה
  english_pob_reading: the inheritance of Yahweh
  chosen_spanish_reading: la heredad de Yahvé
  alternative_spanish_readings:
  - la herencia del Señor
  - la heredad del Señor
  rationale: 'Se aplica el criterio del proyecto para יהוה: ''Yahvé'' en el texto principal. Esto mantiene la transparencia frente al hebreo y evita el reemplazo litúrgico de ''SEÑOR'' sin base textual.'
  doctrine_reference: Project terminology defaults for יהוה
translation_notes:
  revision_awareness: 'La redacción sigue la revisión inglesa más reciente: se optó por ''destruir'' para el verbo en contexto de asedio, en lugar de una traducción más literal pero menos idiomática de ''matar''. También se conservó la metáfora ''madre en Israel'' como en el último estado auditado.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' de manera consistente con el estándar del proyecto para יהוה.
  - '''Heredad'' mantiene un registro bíblico claro y un matiz covenantal que coincide con נַחֲלָה.'
  - La puntuación respeta el paralelismo hebreo con coma antes de 'y una madre en Israel'.
  - El tratamiento verbal en segunda persona singular mantiene el tono directo y retórico del hebreo.
