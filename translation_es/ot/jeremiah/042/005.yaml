translation:
  language: es
  text: 'Y ellos dijeron a Jeremías: «Yahvé sea contra nosotros un testigo[a] verdadero y fiel, si no hacemos conforme a toda la palabra que Yahvé tu Dios nos envíe por medio de ti[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Yahvé sea entre nosotros un testigo verdadero y fiel». La expresión hebrea puede entenderse más literalmente como «en/entre nosotros», pero en este contexto de juramento probablemente tiene fuerza judicial: que Yahvé testifique contra los hablantes si desobedecen.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «que Yahvé tu Dios te envíe a nosotros». El español principal explicita el sentido de mensaje mediado por Jeremías que el hebreo deja implícito.'
    reason: source_note
lexical_decisions:
- source_word: יְהִי
  english_pob_choice: May ... be
  chosen_spanish: sea
  alternatives_spanish:
  - que sea
  - sea, pues
  lexicon: HALOT
  rationale: El jussivo expresa un ruego o invocación; en español, «sea» comunica de forma natural ese valor optativo en una fórmula de juramento.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio según la política del proyecto, evitando la sustitución por un título y manteniendo la transparencia respecto del Tetragrámaton.
- source_word: בָּנוּ
  english_pob_choice: against us
  chosen_spanish: para nosotros
  alternatives_spanish:
  - contra nosotros
  - entre nosotros
  lexicon: HALOT
  rationale: La expresión hebrea con לְעֵד en este juramento admite el matiz de presencia/testimonio; en el español principal se mantiene una formulación natural y se explicita la lectura jurídica en la nota, siguiendo el contexto del juramento.
- source_word: לְעֵד
  english_pob_choice: a witness
  chosen_spanish: un testigo
  alternatives_spanish:
  - como testigo
  - por testigo
  lexicon: HALOT
  rationale: «Testigo» conserva el valor legal/declarativo de עֵד y funciona bien en una fórmula solemne de juramento.
- source_word: אֱמֶת וְנֶאֱמָן
  english_pob_choice: true and faithful
  chosen_spanish: verdadero y fiel
  alternatives_spanish:
  - verdadero y confiable
  - verdadero y leal
  lexicon: HALOT
  rationale: La pareja semántica destaca la confiabilidad del testigo invocado; «verdadero y fiel» es natural en español bíblico y preserva ambos rasgos sin suavizarlos.
- source_word: אִם לֹא
  english_pob_choice: if we do not
  chosen_spanish: si no
  alternatives_spanish:
  - a menos que
  - si llegamos a no
  lexicon: HALOT
  rationale: En esta construcción de juramento, la condición introduce el caso de desobediencia; «si no» comunica con claridad la estructura del hebreo y el valor del compromiso.
- source_word: כְּכָל הַדָּבָר
  english_pob_choice: according to all the word
  chosen_spanish: conforme a toda la palabra
  alternatives_spanish:
  - según toda la palabra
  - de acuerdo con toda la palabra
  lexicon: HALOT
  rationale: Se mantiene el singular de דָּבָר con una formulación formal y bíblica. «Palabra» refleja el contenido comunicado por Yahvé, tal como en el inglés auditado.
- source_word: יִשְׁלָחֲךָ
  english_pob_choice: sends to us through you
  chosen_spanish: nos envíe por medio de ti
  alternatives_spanish:
  - nos envíe a través de ti
  - te envíe a nosotros
  lexicon: HALOT
  rationale: El hebreo dice literalmente «te envíe a nosotros» con el mensaje implícito; en español se explicita el valor mediador de Jeremías con «por medio de ti», sin añadir contenido ajeno.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - el Dios tuyo
  - nuestro Dios
  lexicon: HALOT
  rationale: Se preserva el posesivo de segunda persona singular, manteniendo la dirección del discurso hacia Jeremías y la distancia relacional del texto hebreo.
- source_word: כֵּן נַעֲשֶׂה
  english_pob_choice: we do
  chosen_spanish: hacemos
  alternatives_spanish:
  - haremos así
  - actuaremos así
  lexicon: HALOT
  rationale: El verbo expresa el cumplimiento práctico de lo escuchado; en la oración condicional española, «hacemos» conserva la relación directa con «si no» y suena natural en una promesa jurada.
theological_decisions:
- issue: Invocación juramentaria con posible sentido de testimonio adverso
  english_pob_reading: May Yahweh be a true and faithful witness against us
  chosen_spanish_reading: Yahvé sea para nosotros un testigo verdadero y fiel
  alternative_spanish_readings:
  - Yahvé sea contra nosotros un testigo verdadero y fiel
  - Yahvé sea entre nosotros un testigo verdadero y fiel
  rationale: El hebreo permite una lectura más literal de presencia («en/entre nosotros»), pero en el contexto de juramento la función es testimonial y judicial. El cuerpo principal usa una forma más natural en español y la nota preserva la alternativa y el matiz forense.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy — preserve source tension; contested terms — divine name'
translation_notes:
  revision_awareness: 'Se siguió la revisión auditada del inglés POB que afinó la relación entre la palabra singular דָּבָר y la naturalidad idiomática, así como la explicitación del envío mediado «por medio de ti». La traducción española mantiene esa precisión: singular en «toda la palabra», mediación explícita en «por medio de ti», y el nombre divino como Yahvé.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se conserva «tu Dios» para אֱלֹהֶיךָ, sin harmonizar a «nuestro Dios».
  - «Testigo» se usa en sentido jurídico, no devocional.
  - La construcción condicional en español reproduce la lógica juramentaria del hebreo sin forzar un calco mecánico.
