translation:
  language: es
  text: 'Ve y dile a Jeroboam: «Así dice Yahvé, el Dios de Israel: “Porque yo te levanté[a] de entre el pueblo y te puse como gobernante[b] sobre mi pueblo Israel,”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “yo te exalté” para “yo te levanté”.
    reason: lexical_alternative
  - marker: b
    text: O “te nombré gobernante” para “te puse como gobernante”. El hebreo literalmente dice “te di como gobernante”.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְכִי
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Anda
  lexicon: HALOT
  rationale: El imperativo femenino singular pide una orden natural y directa en español; “Ve” conserva el tono de envío profético sin sonar artificial.
- source_word: אִמְרִי
  english_pob_choice: say
  chosen_spanish: dile
  alternatives_spanish:
  - di
  lexicon: HALOT
  rationale: En español, con complemento indirecto explícito, “dile” comunica con naturalidad la fórmula de mensaje profético dirigida a Jeroboam.
- source_word: לְיָרָבְעָם
  english_pob_choice: to Jeroboam
  chosen_spanish: a Jeroboam
  alternatives_spanish:
  - para Jeroboam
  lexicon: HALOT
  rationale: La preposición ל marca destinatario del mensaje; “a Jeroboam” es la realización española normal del dativo de dirección/speech.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Esto dice
  lexicon: HALOT
  rationale: La fórmula profética se conserva con una equivalencia formal reconocible en español. “Así dice” mantiene el registro solemne del mensajero divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrama: transliteración del nombre divino. En español, “Yahvé” es la forma idiomática y reverente más establecida en este contexto.'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: La construcción en español reproduce el genitivo relacional sin añadir matices no presentes en el hebreo.
- source_word: יַעַן אֲשֶׁר
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Ya que
  - Puesto que
  lexicon: HALOT
  rationale: Introduce la base causal del juicio o del reproche divino con una causalidad clara y natural en español.
- source_word: הֲרִימֹתִיךָ
  english_pob_choice: I raised you up
  chosen_spanish: yo te levanté
  alternatives_spanish:
  - yo te exalté
  - yo te alcé
  lexicon: HALOT
  rationale: El verbo hebreo puede expresar elevación de estado o puesto. “Levanté” conserva la metáfora básica de elevación y permite el sentido de promoción política sin exagerar con terminología interpretativa.
- source_word: מִתּוֹךְ הָעָם
  english_pob_choice: from among the people
  chosen_spanish: de entre el pueblo
  alternatives_spanish:
  - de en medio del pueblo
  - de entre la gente
  lexicon: HALOT
  rationale: “De entre” reproduce bien la idea de extracción/selección desde el conjunto del pueblo, manteniendo la imagen inclusiva del hebreo.
- source_word: וָאֶתֶּנְךָ
  english_pob_choice: and made you
  chosen_spanish: y te puse
  alternatives_spanish:
  - y te hice
  - y te nombré
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente “y te di”, la construcción con נָגִיד expresa instalación en un cargo. “Te puse” es breve, natural y no borra la idea de nombramiento/establecimiento.
- source_word: נָגִיד
  english_pob_choice: ruler
  chosen_spanish: jefe
  alternatives_spanish:
  - gobernante
  - líder
  - príncipe
  lexicon: HALOT
  rationale: En este contexto histórico, el término denota una autoridad puesta por Dios. “Jefe” conserva la noción de cargo/encargo sin cargar de anacronismos monárquicos; se mantiene la tensión del original entre designación y gobierno.
- source_word: עַל עַמִּי יִשְׂרָאֵל
  english_pob_choice: over my people Israel
  chosen_spanish: sobre mi pueblo Israel
  alternatives_spanish:
  - sobre Israel, mi pueblo
  lexicon: HALOT
  rationale: Conserva el posesivo divino “mi pueblo” y la relación de autoridad “sobre” sin alterar el orden de sentido.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: Se mantiene la decisión doctrinal de no ocultar el nombre propio divino mediante una sustitución como “SEÑOR”. En español, “Yahvé” es la transliteración más reconocible y reverente para este registro.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de נָגִיד en un contexto político-royal
  english_pob_reading: ruler
  chosen_spanish_reading: jefe
  alternative_spanish_readings:
  - gobernante
  - líder
  - príncipe
  rationale: La palabra hebrea designa una persona puesta en autoridad. “Jefe” evita imponer un título monárquico más fuerte de lo que el texto exige y conserva la tensión entre cargo otorgado y mando efectivo.
  doctrine_reference: DOCTRINE.md Translation philosophy §5 y §6 (consistencia terminológica y español claro, sin sobreinterpretar)
translation_notes:
  revision_awareness: 'Alineado con el último pase de revisión, sin cambios sustantivos respecto al sentido base: se conservan la fórmula profética, el nombre divino transliterado y el matiz de nombramiento implícito en נָגִיד. La principal adaptación es idiomática en español para que la cita sea publicable y auditables las decisiones léxicas.'
  spanish_consistency_notes:
  - Se usa “Yahvé” conforme al estándar del proyecto para יהוה.
  - Se evita “SEÑOR” como sustituto del nombre divino.
  - Se mantiene un registro solemne y bíblico sin imitar mecánicamente el castellano tradicional.
  - La construcción “te puse como jefe” intenta preservar el valor de instalación en cargo de וָאֶתֶּנְךָ + נָגִיד.
  - La clausula final conserva “mi pueblo Israel” para reflejar el posesivo hebreo.
