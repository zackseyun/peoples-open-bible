translation:
  language: es
  text: y un macho cabrío[a] como ofrenda por el pecado, además de la ofrenda por el pecado de expiación, y del holocausto regular[b], con su ofrenda de grano y sus libaciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'ofrenda de purificación' en ambas apariciones de 'ofrenda por el pecado'.
    reason: lexical_alternative
  - marker: b
    text: O 'el holocausto continuo'.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂעִיר עִזִּים
  english_pob_choice: male goat
  chosen_spanish: macho cabrío
  alternatives_spanish:
  - chivo
  - cabro
  - macho de las cabras
  lexicon: HALOT
  rationale: El hebreo designa un macho de la especie caprina para sacrificio. 'Macho cabrío' conserva el sexo del animal y suena natural en español bíblico actual; evita la ambigüedad de 'chivo', que puede sonar demasiado coloquial en algunos registros.
- source_word: אֶחָד
  english_pob_choice: one
  chosen_spanish: un
  alternatives_spanish:
  - uno
  lexicon: HALOT
  rationale: Se mantiene el numeral singular implícito en el sustantivo español para una lectura fluida y fiel al conteo explícito.
- source_word: חַטָּאת
  english_pob_choice: sin offering
  chosen_spanish: ofrenda por el pecado
  alternatives_spanish:
  - sacrificio por el pecado
  - ofrenda de purificación
  lexicon: HALOT
  rationale: En listas sacrificiales, 'ofrenda por el pecado' comunica el uso cultual del término sin depender de una paraphrase interpretativa más amplia. 'Ofrenda de purificación' es posible, pero aquí el lenguaje cultual tradicional sigue siendo claro y auditable.
- source_word: מִלְּבַד
  english_pob_choice: besides
  chosen_spanish: además de
  alternatives_spanish:
  - aparte de
  - fuera de
  lexicon: HALOT
  rationale: La frase indica adición respecto de las otras ofrendas nombradas. 'Además de' es natural en español y preserva el valor aditivo sin sobrecargar el ritmo.
- source_word: חַטַּאת הַכִּפֻּרִים
  english_pob_choice: the sin offering of atonement
  chosen_spanish: la ofrenda por el pecado de expiación
  alternatives_spanish:
  - la ofrenda por el pecado de la expiación
  - la ofrenda de purificación de expiación
  lexicon: HALOT
  rationale: Se conserva la relación entre la ofrenda y el rito de expiación sin añadir una identificación doctrinal más específica de la que el hebreo exige. 'Expiación' refleja היטב el valor ritual de כפר en este contexto.
- source_word: עֹלַת הַתָּמִיד
  english_pob_choice: the regular burnt offering
  chosen_spanish: el holocausto regular
  alternatives_spanish:
  - el holocausto continuo
  - el holocausto diario
  lexicon: HALOT
  rationale: '''Holocausto'' corresponde a עֹלָה en el lenguaje sacrificial tradicional y comunica la ofrenda quemada íntegramente. ''Regular'' traduce תָּמִיד como recurrencia estable, sin imponer ''diario'' más de lo que el hebreo dice.'
- source_word: וּ/מִנְחָתָהּ
  english_pob_choice: with its grain offering
  chosen_spanish: con su ofrenda vegetal
  alternatives_spanish:
  - con su ofrenda de cereal
  - con su oblación
  lexicon: HALOT
  rationale: '''מִנְחָה'' en contexto sacrificial designa la ofrenda acompañante de grano/cereal. ''Ofrenda vegetal'' mantiene la referencia a un aporte no animal y evita que ''vegetal'' se entienda botánicamente en un sentido estrecho; en español bíblico, puede funcionar como término de tradición revisada. La relación posesiva ''su'' se refiere al holocausto.'
- source_word: וְ/נִסְכֵּי/הֶם
  english_pob_choice: their drink offerings
  chosen_spanish: sus libaciones
  alternatives_spanish:
  - sus ofrendas de bebida
  - sus derramamientos
  lexicon: HALOT
  rationale: '''Libaciones'' es el equivalente cultual preciso para נֶסֶךְ y es plenamente comprensible en español religioso. El posesivo plural se conserva con ''sus'', concordando con el grupo de ofrendas mencionadas.'
theological_decisions:
- issue: Valor de חַטָּאת en contexto sacrificial
  english_pob_reading: Rendered as 'sin offering' in both occurrences
  chosen_spanish_reading: ofrenda por el pecado en ambos casos
  alternative_spanish_readings:
  - ofrenda de purificación
  - sacrificio por el pecado
  rationale: Aunque el término puede destacar la función purificadora del rito, el versículo enumera ofrendas dentro de un calendario cultual. 'Ofrenda por el pecado' mantiene la identificación estable y transparente sin forzar una lectura doctrinal adicional. Se preserva así la tensión lexical entre pecado y purificación mediante una nota alternativa.
  doctrine_reference: Levítico 4; Números 28–29; Hebreos 9:13-14 (función purificadora del sacrificio)
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo y el audit trail en inglés, conservando la secuencia de ofrendas y el valor aditivo de מִלְּבַד. Se ha preferido un español culto y natural, evitando calcos innecesarios; no se introdujeron cambios textuales respecto del testimonio base, y se mantuvo la distinción ritual entre la ofrenda por el pecado, la expiación, el holocausto regular, la ofrenda acompañante y las libaciones.
  spanish_consistency_notes:
  - Se usa 'Yahvé' en este proyecto solo cuando el texto fuente lo requiera explícitamente; este versículo no contiene el nombre divino.
  - '''Holocausto'' se reserva para עֹלָה en contextos sacrificiales.'
  - '''Libaciones'' traduce consistentemente נְסָכִים/נֶסֶךְ en el registro cultual.'
  - La posesión en 'su ofrenda vegetal' y 'sus libaciones' refleja los referentes del conjunto sacrificial, no un sujeto humano explícito.
