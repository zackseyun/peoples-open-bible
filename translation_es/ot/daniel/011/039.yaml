translation:
  language: es
  text: Y actuará contra las fortalezas más poderosas[a] con un dios extranjero[b]. A quienes él reconozca[c], les aumentará el honor, y los hará gobernar sobre muchos, y repartirá tierra por precio[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «contra fortalezas fortificadas» o «para las fortalezas de fortalezas»; la frase hebrea es compacta y puede entenderse de manera algo distinta.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «por medio de un dios extranjero». La preposición puede expresar compañía o instrumento.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «a quienes lo reconocen». El hebreo también podría entenderse de otro modo, aunque la forma verbal encaja mejor con «a quienes él reconoce».'
    reason: alternative_reading
  - marker: d
    text: 'O: «repartirá tierra por pago» o «como recompensa». La expresión indica una distribución transaccional de la tierra.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשָׂה
  english_pob_choice: And he will act
  chosen_spanish: Y actuará
  alternatives_spanish:
  - Y hará
  - Y procederá
  lexicon: HALOT
  rationale: עשה es amplio ('hacer', 'actuar'). En este contexto político-militar, 'actuará' suena natural en español y mantiene la idea de una acción concreta sin añadir especificaciones que el hebreo no exige.
- source_word: לְמִבְצְרֵי מָעֻזִּים
  english_pob_choice: against the strongest fortresses
  chosen_spanish: contra las fortalezas más fuertes
  alternatives_spanish:
  - contra fortalezas fortificadas
  - contra las fortalezas de las fortalezas
  lexicon: HALOT
  rationale: La combinación es comprimida y puede leerse de más de una manera. 'Fortalezas más fuertes' intenta reflejar el efecto intensivo/superlativo de מָעֻזִּים y el valor direccional/adversativo de לְ con un verbo de acción.
- source_word: עִם אֱלֹוּהַ נֵכָר
  english_pob_choice: with a foreign god
  chosen_spanish: con un dios extranjero
  alternatives_spanish:
  - por medio de un dios extranjero
  - junto con un dios extranjero
  lexicon: HALOT
  rationale: עִם puede expresar compañía o instrumento. 'Con' preserva esa ambigüedad sin decidir prematuramente entre acompañamiento e instrumentación.
- source_word: אֲשֶׁר הִכִּיר
  english_pob_choice: Those whom he acknowledges
  chosen_spanish: A quienes él reconozca
  alternatives_spanish:
  - A quienes él reconozca como suyos
  - Los que lo reconocen
  lexicon: HALOT
  rationale: El verbo hifil de נכר admite 'reconocer/acknowledge'. La forma verbal favorece entender que él reconoce a ciertas personas; en español, 'A quienes él reconozca' conserva esa relación sin forzar una lectura más específica.
- source_word: יַרְבֶּה כָבוֹד
  english_pob_choice: he will increase with honor
  chosen_spanish: les aumentará el honor
  alternatives_spanish:
  - multiplicará el honor para ellos
  - les concederá gran honor
  lexicon: HALOT
  rationale: El hebreo es compacto y expresa aumento/abundancia de honor. 'Les aumentará el honor' conserva el valor causativo y el destinatario plural con fluidez natural en español.
- source_word: וְהִמְשִׁילָם בָּרַבִּים
  english_pob_choice: he will make them rule over many
  chosen_spanish: y los hará gobernar sobre muchos
  alternatives_spanish:
  - y los pondrá sobre muchos
  - y les dará autoridad sobre muchos
  lexicon: HALOT
  rationale: El hifil de משל significa 'hacer reinar/gobernar'. 'Los hará gobernar sobre muchos' preserva la causalidad y el sentido político del texto.
- source_word: וַאֲדָמָה יְחַלֵּק בִּמְחִיר
  english_pob_choice: and he will divide land for a price
  chosen_spanish: y repartirá tierra por precio
  alternatives_spanish:
  - y repartirá la tierra por pago
  - y distribuirá tierra como recompensa
  lexicon: HALOT
  rationale: אֲדָמָה es 'tierra/terreno'. מְחִיר es 'precio/pago'. 'Por precio' mantiene el sentido transaccional y no precisa indebidamente si se trata de dinero, soborno o compensación política.
theological_decisions:
- issue: Referente de los que son reconocidos en la segunda cola
  english_pob_reading: The king acknowledges certain supporters and rewards them with honor and authority.
  chosen_spanish_reading: El rey reconoce a ciertos partidarios y los recompensa con honor y autoridad.
  alternative_spanish_readings:
  - Los que reconocen al dios extranjero son recompensados.
  - Los que reconocen al rey son recompensados.
  rationale: La sintaxis hebrea favorece tomar הִכִּיר como verbo en 3ms con el rey como sujeto. En español conviene mantener esa ambigüedad controlada, sin convertir el verso en una afirmación más definida sobre adoración o lealtad religiosa de lo que el texto obliga.
  doctrine_reference: Preservar la tensión teológica sin resolverla de manera prematura.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios textuales; el presente borrador sigue de cerca el consenso alto del control cruzado, conservando las ambigüedades señaladas por el aparato inglés.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando el texto lo requiera explícitamente; aquí no aparece el nombre divino.
  - '''Dios'' se traduce como ''dios'' en minúscula porque el hebreo dice אֱלֹוּהַ נֵכָר, un ''dios extranjero'', no el Dios de Israel.'
  - Se eligió 'tierra' en el cuerpo principal para reflejar אֲדָמָה con naturalidad en español bíblico; 'tierra' aquí puede abarcar terreno/territorio según contexto.
  - Se mantuvo 'honor' para כָבוֹד por ser el equivalente más directo y transparente en este contexto de patronazgo político.
