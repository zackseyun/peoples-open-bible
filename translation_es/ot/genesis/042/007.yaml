translation:
  language: es
  text: 'Cuando José vio a sus hermanos[a], los reconoció, pero se hizo pasar por un extraño ante ellos y les habló con dureza. Les dijo: «¿De dónde han venido?». Ellos respondieron: «De la tierra de Canaán[b], para comprar alimento».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «se hizo desconocido para ellos». El hebreo puede expresar presentarse ante ellos como extranjero o desconocido.
    reason: lexical_alternative
  - marker: b
    text: O, «para comprar grano». En este contexto de hambruna, el verbo hebreo suele referirse específicamente a la compra de grano, aunque el sustantivo aquí es el más amplio «alimento».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  english_pob_choice: When ... saw
  chosen_spanish: Cuando ... vio
  alternatives_spanish:
  - Y ... vio
  - Entonces ... vio
  lexicon: HALOT
  rationale: El waw consecutivo marca avance narrativo; en español, «Cuando» introduce con naturalidad la acción previa sin perder la secuencia temporal.
- source_word: אֶת אֶחָיו
  english_pob_choice: his brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - a sus hermanos
  - a sus hermanos varones
  lexicon: HALOT
  rationale: «Hermanos» expresa correctamente a los varones emparentados en contexto. El complemento directo queda claro por el verbo de percepción en español.
- source_word: וַיַּכִּרֵם
  english_pob_choice: he recognized them
  chosen_spanish: los reconoció
  alternatives_spanish:
  - los identificó
  - los conoció
  lexicon: HALOT
  rationale: El hifil de נכר aquí indica reconocer/identificar. «Los reconoció» es la equivalencia más natural y precisa.
- source_word: וַיִּתְנַכֵּר אֲלֵיהֶם
  english_pob_choice: he disguised himself to them
  chosen_spanish: se mostró extraño para con ellos
  alternatives_spanish:
  - se disfrazó ante ellos
  - se hizo desconocido para ellos
  - actuó como extraño con ellos
  lexicon: HALOT
  rationale: El hitpael de נכר comunica hacerse extraño o desconocido en relación con ellos. «Se mostró extraño para con ellos» conserva la relación de extrañeza sin afirmar más de lo que el hebreo exige sobre un disfraz físico.
- source_word: וַיְדַבֵּר אִתָּם קָשׁוֹת
  english_pob_choice: and spoke harshly to them
  chosen_spanish: y les habló con dureza
  alternatives_spanish:
  - y les habló duramente
  - y les habló con severidad
  - y les habló con aspereza
  lexicon: HALOT
  rationale: קָשׁוֹת funciona adverbialmente; «con dureza» transmite bien la severidad del trato y resulta idiomático en español bíblico moderno.
- source_word: מֵאַיִן בָּאתֶם
  english_pob_choice: Where have you come from?
  chosen_spanish: ¿De dónde han venido?
  alternatives_spanish:
  - ¿De dónde vienen?
  - ¿De dónde han llegado?
  lexicon: HALOT
  rationale: La pregunta indaga procedencia/origen. En español, el perfecto compuesto mantiene adecuadamente el matiz de procedencia y el tono directo.
- source_word: מֵאֶרֶץ כְּנַעַן
  english_pob_choice: From the land of Canaan
  chosen_spanish: De la tierra de Canaán
  alternatives_spanish:
  - Desde la tierra de Canaán
  - De Canaán
  lexicon: HALOT
  rationale: Se conserva la expresión formal de la frase hebrea con «tierra de Canaán», que refleja el constructo geográfico sin necesidad de simplificarlo.
- source_word: לִשְׁבָּר אֹכֶל
  english_pob_choice: to buy food
  chosen_spanish: para comprar alimento
  alternatives_spanish:
  - para comprar comida
  - para comprar grano
  lexicon: HALOT
  rationale: El infinitivo de שבר en este contexto puede referir compra de provisiones, especialmente grano, pero אֹכֶל es más amplio que «grano». «Alimento» preserva esa amplitud y evita restringir indebidamente el sentido.
translation_notes:
  revision_awareness: La redacción sigue el último pasaje revisado del POB en inglés, que volvió a «disguised himself to them» y mantuvo «spoke harshly to them». La versión española evita sobrerregularizar ese giro con una sola imagen física y conserva la ambigüedad relacional del hitpael de נכר, mientras refleja la dureza del habla y la amplitud de אֹכֶל frente a una restricción exclusiva a «grano».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general, pero este versículo no contiene el tetragrámaton.
  - Se prefirió «alimento» frente a «grano» en el texto principal por fidelidad al campo semántico más amplio de אֹכֶל, dejando la alternativa en nota.
  - «Se mostró extraño para con ellos» evita introducir una interpretación más específica que el hebreo no obliga a fijar.
  - Se conservó un registro bíblico claro y sobrio, sin calcos innecesarios del inglés.
