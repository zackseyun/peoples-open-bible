  language: en
  yaml_path: translation/ot/2_samuel/020/018.yaml
  text: Then she said[a], “They used to say in former times[b], ‘Let them surely ask at Abel,’ and so they ended the matter.”
  footnotes:
  - marker: a
    text: Or “They would surely say in former times, ‘Let them surely inquire in Abel,’ and thus they would bring it to an end.’” The Hebrew contains emphatic infinitive-absolute constructions in both clauses, and the final verb may be rendered more literally as “bring it to an end” or “finish.”
    reason: lexical_alternative
  - marker: b
    text: “Abel” is the shortened form of Abel-beth-maacah, the city under siege in this context.
    reason: cultural_note
