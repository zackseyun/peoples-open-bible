translation:
  language: es
  text: Y pusieron una guarnición en ellos para hostilizar a Israel[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para actuar hostilmente contra Israel». El infinitivo griego articular τοῦ ἐχθραίνειν expresa el propósito para el cual fue puesta la guarnición.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔθεντο
  english_pob_choice: they stationed
  chosen_spanish: pusieron
  alternatives_spanish:
  - apostaron
  - establecieron
  lexicon: LSJ
  rationale: El verbo τίθημι aquí tiene sentido militar de colocar o asignar tropas; en español, «pusieron» mantiene la acción de colocar una fuerza sin sonar artificial, y el contexto de guarnición ya aporta el matiz militar.
- source_word: φρουρὰν
  english_pob_choice: a garrison
  chosen_spanish: una guarnición
  alternatives_spanish:
  - una guardia
  - una tropa de vigilancia
  lexicon: LSJ
  rationale: φρουρά designa una fuerza militar apostada; «guarnición» es el equivalente español más preciso y natural en registro bíblico-formal.
- source_word: ἐν αὐτοῖς
  english_pob_choice: in them
  chosen_spanish: en ellos
  alternatives_spanish:
  - entre ellos
  - en aquellos lugares
  lexicon: LSJ
  rationale: El pronombre se refiere a los lugares mencionados antes; «en ellos» conserva la referencia abierta del griego sin introducir una aclaración no presente en el verso.
- source_word: τοῦ ἐχθραίνειν
  english_pob_choice: to be hostile toward
  chosen_spanish: para ser hostiles
  alternatives_spanish:
  - para hostilizar
  - para hacer guerra contra
  lexicon: LSJ
  rationale: El infinitivo articular expresa finalidad; «para ser hostiles» reproduce el valor de propósito y la hostilidad continua sin convertirla innecesariamente en guerra abierta.
- source_word: τῷ Ἰσραήλ
  english_pob_choice: toward Israel
  chosen_spanish: contra Israel
  alternatives_spanish:
  - hacia Israel
  - para con Israel
  lexicon: LSJ
  rationale: El dativo con ἐχθραίνειν señala el objeto de la hostilidad. En español, «contra Israel» comunica con claridad la dirección adversativa del texto y conserva la fuerza del original.
translation_notes:
  revision_awareness: El inglés POB revisó «to keep acting hostile toward» a «to be hostile toward» para hacer más directo τοῦ ἐχθραίνειν. La versión española sigue esa decisión, usando una construcción final simple («para ser hostiles») y manteniendo la función de finalidad del infinitivo articular.
  spanish_consistency_notes:
  - Se mantiene «Israel» como nombre propio sin artículo, conforme al uso bíblico español.
  - «Guarnición» preserva el matiz militar del sustantivo griego y evita el término más general «guardia».
  - La nota al pie recoge la alternativa «contra Israel», útil porque el español permite ambas preposiciones según el matiz de hostilidad.
