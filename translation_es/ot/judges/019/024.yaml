translation:
  language: es
  text: Miren, aquí están mi hija virgen y su concubina. Permítanme sacarlas, por favor. Viólenlas[a] y hagan con ellas lo que les parezca bien[b]. Pero a este hombre no le hagan este acto vergonzoso[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «abusen de ellas». El verbo hebreo puede denotar violación sexual y humillación en este contexto.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «lo que es bueno en sus ojos», un modismo que significa lo que les parece bien o agradable.'
    reason: cultural_note
  - marker: c
    text: O «esta acción vil» o «esta cosa ultrajante».
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Miren
  alternatives_spanish:
  - Miren aquí
  - Vean
  lexicon: HALOT
  rationale: La partícula introduce una atención urgente; «Miren» transmite la apelación directa en español moderno sin perder el tono de urgencia.
- source_word: בִתִּי הַבְּתוּלָה
  english_pob_choice: my virgin daughter
  chosen_spanish: mi hija virgen
  alternatives_spanish:
  - mi hija, virgen
  - mi hija doncella
  lexicon: HALOT
  rationale: «Virgen» conserva el rasgo léxico de בְּתוּלָה. «Hija virgen» es más natural en español que una calca más rígida y no atenúa el contenido sexual del término.
- source_word: וּפִילַגְשֵׁהוּ
  english_pob_choice: his concubine
  chosen_spanish: su concubina
  alternatives_spanish:
  - la concubina de él
  - su esposa secundaria
  lexicon: HALOT
  rationale: «Concubina» es el equivalente léxico estándar y preciso; mantiene la tensión cultural del término mejor que una explicación más interpretativa.
- source_word: אוֹצִיאָה נָּא
  english_pob_choice: Please let me bring ... out
  chosen_spanish: Les ruego que las saque yo
  alternatives_spanish:
  - Permítanme sacarlas
  - Permítanme traerlas afuera
  lexicon: HALOT
  rationale: La forma cohortativa con נָא expresa ruego. En español, «Les ruego que...» reproduce esa petición respetuosa y urgente; «saque yo» conserva el valor de la acción volitiva del hablante.
- source_word: וְעַנּוּ אוֹתָם
  english_pob_choice: and violate them
  chosen_spanish: Violen[c]las
  alternatives_spanish:
  - Viólenlas
  - Humíllenlas
  - Abusen de ellas
  lexicon: HALOT
  rationale: En este contexto, ענה en piel apunta a violencia sexual y humillación. «Violenlas» comunica con claridad el daño sexual sin sobreespecificar más allá del verbo hebreo.
- source_word: וַעֲשׂוּ לָהֶם הַטּוֹב בְּעֵינֵיכֶם
  english_pob_choice: and do to them what is good in your eyes
  chosen_spanish: hagan con ellas lo que les parezca bueno
  alternatives_spanish:
  - hagan con ellas lo que vean bien
  - trátenlas como les parezca
  lexicon: HALOT
  rationale: 'Se conserva el idiomático «lo que es bueno en sus ojos» con un equivalente natural en español: «lo que les parezca bueno». Mantiene la referencia al juicio subjetivo de los oyentes.'
- source_word: וְלָאִישׁ הַזֶּה
  english_pob_choice: But to this man
  chosen_spanish: Pero a este hombre
  alternatives_spanish:
  - Pero contra este hombre
  - Pero a ese hombre
  lexicon: HALOT
  rationale: La preposición marca contraste; «a este hombre» preserva la estructura y el contraste retórico con las mujeres ofrecidas.
- source_word: לֹא תַעֲשׂוּ
  english_pob_choice: do not do
  chosen_spanish: no le hagan
  alternatives_spanish:
  - no hagan
  - no le hagan eso
  lexicon: HALOT
  rationale: La prohibición plural queda naturalizada en español con «no le hagan», manteniendo la referencia directa al hombre sin añadir contenido no presente.
- source_word: דְּבַר הַנְּבָלָה הַזֹּאת
  english_pob_choice: this outrageous thing
  chosen_spanish: esta cosa vergonzosa
  alternatives_spanish:
  - este acto vergonzoso
  - esta acción vil
  - este ultraje
  lexicon: HALOT
  rationale: נְבָלָה denota una acción moralmente infame y vergonzosa. «Cosa vergonzosa» conserva el reproche moral de forma clara y publicable en español, aunque admite una gama de matices semejantes.
theological_decisions:
- issue: Cómo expresar la violencia sexual implícita sin suavizarla ni exceder el verbo hebreo
  english_pob_reading: Use 'violate them' for וְעַנּוּ אוֹתָם
  chosen_spanish_reading: «Violenlas»
  alternative_spanish_readings:
  - «Violen a las dos»
  - «Abusen de ellas»
  - «Humíllenlas»
  rationale: El contexto exige una lectura de violencia sexual y humillación. «Violenlas» conserva esa fuerza de manera directa; evita el eufemismo y también evita ampliar indebidamente el campo semántico hacia abusos no específicamente sexuales.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Cómo traducir נְבָלָה sin banalizar el juicio moral
  english_pob_reading: Render as 'outrageous thing'
  chosen_spanish_reading: «esta cosa vergonzosa»
  alternative_spanish_readings:
  - «este acto vil»
  - «esta acción vergonzosa»
  - «este ultraje»
  rationale: La expresión hebrea marca una transgresión gravemente deshonrosa. «Cosa vergonzosa» conserva la censura moral en un español claro y sobrio; no convierte el término en simple insolencia ni en mera fealdad retórica.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: El borrador sigue la revisión inglesa que eliminó «to you» por no estar en el hebreo y dividió la cláusula antes de «violen». En español, se mantuvo esa división mediante oraciones breves para evitar una acumulación sintáctica y preservar la secuencia de ruego, propuesta violenta y prohibición.
  spanish_consistency_notes:
  - Se conservó «concubina» como término técnico coherente con el POB inglés.
  - Se eligió «Yahvé» solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - Se prefirió una formulación directa para la violencia sexual, acorde con el tratamiento lexical documentado en el inglés POB.
  - Se evitó «SEÑOR» como sustituto no solicitado, y no se introdujo lenguaje eclesiástico ajeno al registro del pasaje.
