translation:
  language: es
  text: Ahora bien, cuando el muro había sido edificado[b] y yo había colocado las puertas, los porteros, los cantores y los levitas fueron designados[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fueron asignados» o «fueron inscritos»; el verbo hebreo puede abarcar un sentido administrativo más amplio que la sola idea de nombramiento formal.
    reason: lexical_alternative
  - marker: b
    text: «Había sido edificado» también puede verterse «fue edificado». El pluscuamperfecto refleja la secuencia dentro del relato.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כַּאֲשֶׁר
  english_pob_choice: Now when
  chosen_spanish: Ahora bien, cuando
  alternatives_spanish:
  - Y aconteció cuando
  - Cuando
  lexicon: WLC / HALOT
  rationale: La combinación narrativa וַיְהִי כַּאֲשֶׁר introduce una nueva circunstancia en el relato. «Ahora bien, cuando» conserva ese giro discursivo de apertura con un español natural y digno.
- source_word: נִבְנְתָה
  english_pob_choice: had been built
  chosen_spanish: había sido construido
  alternatives_spanish:
  - fue construido
  - había sido reconstruido
  lexicon: WLC / HALOT
  rationale: El nifal perfecto de בנה es pasivo. «Había sido construido» refleja con fidelidad la pasividad y la secuencia temporal del relato. «Reconstruido» es posible por contexto en Nehemías, pero no está explícito en el verbo.
- source_word: הַחוֹמָה
  english_pob_choice: the wall
  chosen_spanish: el muro
  alternatives_spanish:
  - la muralla
  - el muro de la ciudad
  lexicon: WLC / HALOT
  rationale: חוֹמָה designa una pared defensiva; en español, «muro» es claro y sobrio. «Muralla» también sería posible, pero «muro» evita cargar el texto con un matiz más específico de lo que el hebreo expresa de forma explícita.
- source_word: וָאַעֲמִיד
  english_pob_choice: I had set up
  chosen_spanish: había colocado
  alternatives_spanish:
  - puse
  - había instalado
  - había puesto
  lexicon: WLC / HALOT
  rationale: El hiphil de עמד aquí tiene el sentido de hacer que algo quede en su lugar. Con «las puertas», «había colocado» comunica bien la acción de ponerlas en su sitio, sin forzar una imagen técnica que el hebreo no exige.
- source_word: הַדְּלָתוֹת
  english_pob_choice: the doors
  chosen_spanish: las puertas
  alternatives_spanish:
  - las hojas de las puertas
  - los portones
  lexicon: WLC / HALOT
  rationale: דְּלָתוֹת son literalmente puertas/hojas de puerta; dado el contexto de la muralla y de los porteros, «las puertas» es la forma más natural en español. Se evita «portones» porque añade una especificidad no requerida por el hebreo.
- source_word: וַיִּפָּקְדוּ
  english_pob_choice: were appointed
  chosen_spanish: fueron designados
  alternatives_spanish:
  - fueron asignados
  - fueron inscritos
  - fueron nombrados
  lexicon: WLC / HALOT
  rationale: פקד en nifal puede abarcar nombrar, asignar o registrar administrativamente. «Fueron designados» conserva el sentido administrativo amplio que el POB inglés documenta, sin reducirlo a una sola faceta.
- source_word: הַשּׁוֹעֲרִים
  english_pob_choice: the gatekeepers
  chosen_spanish: los porteros
  alternatives_spanish:
  - los guardas de las puertas
  - los guardianes de la puerta
  lexicon: WLC / HALOT
  rationale: En este contexto, el oficio se refiere a quienes custodiaban/atendían las puertas. «Porteros» es un equivalente español tradicional y claro, aunque algo más general que «gatekeepers»; el contexto de la muralla sostiene el sentido.
- source_word: הַמְשֹׁרְרִים
  english_pob_choice: the singers
  chosen_spanish: los cantores
  alternatives_spanish:
  - los cantantes
  - los músicos
  lexicon: WLC / HALOT
  rationale: מְשֹׁרְרִים son cantores, a menudo en función litúrgica. «Cantores» preserva el matiz más formal y eclesial sin sustituirlo por «músicos», que sería más amplio de lo que el hebreo dice.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levitas
  lexicon: WLC / HALOT
  rationale: Se mantiene el nombre etnorreligioso tradicional «levitas», que es el equivalente natural en español y no requiere transliteración adicional.
theological_decisions:
- issue: Sentido administrativo de וַיִּפָּקְדוּ
  english_pob_reading: were appointed
  chosen_spanish_reading: fueron designados
  alternative_spanish_readings:
  - fueron asignados
  - fueron inscritos
  - fueron nombrados
  rationale: 'El verbo puede implicar más que una sola designación formal: también asignación o registro administrativo. «Fueron designados» conserva esa amplitud sin estrechar indebidamente el texto.'
  doctrine_reference: Nehemías 7:1; uso administrativo de פקד en el AT
- issue: Orden temporal de las acciones
  english_pob_reading: Now when the wall had been built and I had set up the doors
  chosen_spanish_reading: Ahora bien, cuando el muro había sido construido y yo había colocado las puertas
  alternative_spanish_readings:
  - Cuando el muro fue construido y yo puse las puertas
  - Entonces, cuando el muro ya estaba construido y yo había colocado las puertas
  rationale: El español mantiene la anterioridad relativa con pluscuamperfecto para reflejar la secuencia narrativa que el inglés POB señaló. No se convierte en pretérito simple para no perder el valor de trasfondo ya completado.
  doctrine_reference: Aspecto verbal y secuencia narrativa en prosa hebrea
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto hebreo consonante y la evaluación auditada del POB inglés. Se mantuvieron las decisiones confirmadas por el control cruzado de alta concordancia, sin introducir reconstrucciones no apoyadas ni suavizar el matiz administrativo de פקד.
  spanish_consistency_notes:
  - Se preservó el tiempo narrativo con pluscuamperfecto en español para reproducir la relación temporal indicada por el inglés auditado.
  - Se eligió «muro» y «puertas» en un registro bíblico claro y natural, sin sustituirlos por términos más interpretativos.
  - Se mantuvo «levitas» como nombre propio de grupo y «porteros» como equivalente funcional de gatekeepers dentro del contexto de Jerusalén restaurada.
