    text: 'Hebrew: ''the Valley of Shaveh''; that is, ''the King''s Valley.'''
    reason: cultural_note
  - marker: b
    text: Traditional English often has 'Chedorlaomer'; the Hebrew name is rendered here more directly as 'Kedorlaomer.'
    reason: lexical_alternative
