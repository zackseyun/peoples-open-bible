translation:
  language: es
  text: Y bajo su mando estaba Jehohanán el comandante[a], y con él estaban doscientos ochenta mil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «bajo su autoridad estaba Jehohanán el comandante». El hebreo dice literalmente: «sobre su mano».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל יָדוֹ
  english_pob_choice: under his command
  chosen_spanish: bajo su autoridad
  alternatives_spanish:
  - bajo su mando
  - a su lado
  - en su mano
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y no debe leerse de modo literal en español. En este contexto administrativo-militar, 'bajo su autoridad' conserva la relación de subordinación indicada por el inglés POB y evita una calca extraña como 'en su mano'.
- source_word: יְהוֹחָנָן
  english_pob_choice: Jehohanan
  chosen_spanish: Jehohanán
  alternatives_spanish:
  - Johanan
  lexicon: Transliteración del nombre propio hebreo
  rationale: Se conserva el nombre propio en forma transliterada, adaptado a la ortografía acentual del español para lectura natural. 'Jehohanán' refleja de cerca la forma hebrea de Crónicas.
- source_word: הַשָּׂר
  english_pob_choice: the commander
  chosen_spanish: el comandante
  alternatives_spanish:
  - el oficial
  - el capitán
  - el príncipe
  lexicon: HALOT
  rationale: שַׂר es un término amplio para líder o funcionario; aquí, por el contexto de organización militar, 'comandante' comunica mejor la función que 'príncipe' u otros términos más ambiguos.
- source_word: וְעִמּוֹ
  english_pob_choice: and with him were
  chosen_spanish: y con él había
  alternatives_spanish:
  - y con él estaban
  - y con él
  lexicon: HALOT
  rationale: El hebreo introduce el grupo asociado a Jehohanán. En español conviene explicitar el verbo de existencia para que la frase sea fluida y clara sin añadir contenido ajeno.
- source_word: מָאתַיִם וּשְׁמוֹנִים אָלֶף
  english_pob_choice: two hundred and eighty thousand
  chosen_spanish: doscientos ochenta mil
  alternatives_spanish:
  - doscientos y ochenta mil
  lexicon: HALOT
  rationale: Se mantiene el número exacto con la forma cardinal normal en español moderno. La cifra es directa y no presenta tensión interpretativa.
translation_notes:
  revision_awareness: Se sigue el sentido idiomático ya reconocido en el auditoría inglesa ('under his command'), pero se ajusta la formulación al español natural sin perder la relación de subordinación. La lista numérica se mantiene literal y sin expansión.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino cuando aparezca; en este versículo no aparece.
  - Se conserva 'comandante' para שַׂר por coherencia con el contexto militar y con la decisión inglesa.
  - La transliteración 'Jehohanán' mantiene la forma hebrea del nombre y evita una asimilación no sustentada por el texto.
