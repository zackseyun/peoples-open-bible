  glossary_alignment: 'Alinea bien con la terminología del proyecto: יְהוָה → «Yahvé»; אֱלֹהֵי יִשְׂרָאֵל → «el Dios de Israel»; בֵּית יְהוָה → «la casa de Yahvé»; repetición de «casa» preservada; sin sustitución por «SEÑOR». No hay conflicto teológico significativo.'
