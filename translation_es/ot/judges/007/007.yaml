translation:
  language: es
  text: 'Y Yahvé dijo a Gedeón[a]: «Con los trescientos hombres que lamieron, los salvaré y entregaré a Madián en tu mano. Y que todo el pueblo se vaya, cada hombre a su lugar».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Con los trescientos hombres que lamieron, los libraré»'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el nombre propio del pacto con la forma española estándar del proyecto, preservando el Tetragrámaton en vez de ocultarlo bajo un título genérico.
- source_word: בִּשְׁלֹשׁ מֵאוֹת הָאִישׁ
  english_pob_choice: With the three hundred men
  chosen_spanish: Con los trescientos hombres
  alternatives_spanish:
  - Por los trescientos hombres
  - Mediante los trescientos hombres
  lexicon: HALOT
  rationale: El ב aquí es instrumental; en español, 'con' conserva bien la idea de medio sin sonar forzado.
- source_word: הַמֲלַקְקִים
  english_pob_choice: who lapped
  chosen_spanish: que lamieron
  alternatives_spanish:
  - que estaban lamiendo
  - los que lamieron
  lexicon: HALOT
  rationale: Se mantiene el rasgo identificador concreto del participio; 'lamieron' reproduce la acción de forma directa y natural en español.
- source_word: אוֹשִׁיעַ אֶתְכֶם
  english_pob_choice: I will save you
  chosen_spanish: yo los salvaré
  alternatives_spanish:
  - yo los libraré
  - yo los rescataré
  lexicon: HALOT
  rationale: El verbo hiphil de ישׁע admite 'salvar/librar'; aquí 'salvaré' conserva la fuerza verbal y el eco teológico del término, con referencia plural contextual al pueblo.
- source_word: וְנָתַתִּי אֶת מִדְיָן בְּיָדֶךָ
  english_pob_choice: and give Midian into your hand
  chosen_spanish: pondré a Madián en tu mano
  alternatives_spanish:
  - entregaré a Madián en tu mano
  - daré a Madián en tu mano
  lexicon: HALOT
  rationale: Se conserva el modismo hebreo de dominio/victoria con una formulación española clara. 'Pondré' refleja bien el valor idiomático de 'dar en la mano' sin perder la imagen.
- source_word: וְכָל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - toda la gente
  - todo el pueblo de guerra
  lexicon: HALOT
  rationale: '''Pueblo'' respeta mejor el sustantivo hebreo que ''gente'' y mantiene el carácter colectivo del grupo convocado.'
- source_word: יֵלְכוּ
  english_pob_choice: let ... go
  chosen_spanish: se vaya
  alternatives_spanish:
  - vayan
  - puedan irse
  lexicon: HALOT
  rationale: El imperfecto tiene valor jussivo; 'que ... se vaya' expresa permiso/mandato natural en español.
- source_word: אִישׁ לִמְקֹמוֹ
  english_pob_choice: each man to his place
  chosen_spanish: cada hombre a su lugar
  alternatives_spanish:
  - cada uno a su lugar
  - cada hombre a su sitio
  lexicon: HALOT
  rationale: Se preserva el distributivo singular con 'cada hombre'; 'lugar' reproduce el sentido espacial del sustantivo sin sobreinterpretar como 'casa' o 'hogar'.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa directamente el nombre divino. La elección 'Yahvé' mantiene visible el Nombre del pacto y evita la sustitución tradicional por un título en mayúsculas.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Strength of the salvation verb in a military-deliverance context
  english_pob_reading: I will save you
  chosen_spanish_reading: yo los salvaré
  alternative_spanish_readings:
  - yo los libraré
  - yo los rescataré
  rationale: En este contexto bélico, 'salvar' conserva tanto la victoria militar como el sentido de rescate divino; no se atenúa a una mera ayuda humana.
  doctrine_reference: HALOT ישׁע; contexto narrativo de Jueces 7
translation_notes:
  revision_awareness: 'Se respetó la lectura del auditor inglés: el ב es instrumental, el participio identifica al grupo por la acción de lamer, y el jussivo de יֵלְכוּ se expresa con valor exhortativo en español. No se añadió material ajeno al hebreo; se mantuvo el modismo de ''mano'' para בְּיָדֶךָ y el distributivo singular de אִישׁ.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' de manera consistente con el estándar del proyecto para יְהוָה.
  - '''Madián'' conserva la transliteración habitual del nombre propio del pueblo/enemigo en español bíblico.'
  - La puntuación mantiene el discurso directo con comillas angulares españolas y el cierre exhortativo correspondiente.
  - La referencia plural de 'los salvaré' se entiende por el destinatario colectivo del versículo, aunque la forma verbal hebrea lo dirija a Gedeón como representante del pueblo.
