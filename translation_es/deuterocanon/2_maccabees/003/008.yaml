translation:
  language: es
  text: Entonces Heliodoro emprendió de inmediato el viaje, en apariencia para visitar las ciudades de Celesiria y Fenicia, pero en realidad para llevar a cabo el plan del rey.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El texto fuente incluye una "A" anómala antes de "rey" (βασιλέως), probablemente un artefacto de edición o transcripción. La traducción sigue el sentido claro: "el plan del rey".'
    reason: textual_variant
lexical_decisions:
- source_word: εὐθέως
  english_pob_choice: immediately
  chosen_spanish: de inmediato
  alternatives_spanish:
  - enseguida
  - inmediatamente
  lexicon: LSJ
  rationale: Expresa prontitud sin caer en un tono arcaizante; conserva la fuerza adverbial del griego.
- source_word: ἐποιεῖτο τὴν πορίαν
  english_pob_choice: set out on the journey
  chosen_spanish: emprendió el viaje
  alternatives_spanish:
  - se puso en camino
  - inició el viaje
  lexicon: LSJ
  rationale: La construcción idiomática sugiere comenzar un desplazamiento; 'emprendió' comunica bien la acción iniciada de forma natural en español.
- source_word: τῇ μὲν ἐμφάσει
  english_pob_choice: ostensibly
  chosen_spanish: ostensiblemente
  alternatives_spanish:
  - en apariencia
  - con el pretexto
  lexicon: LSJ
  rationale: Mantiene la oposición apariencia/realidad sin intensificar innecesariamente el grado de engaño que el griego, por sí solo, no explicita.
- source_word: ὡς ... ἐφοδεῦσαι
  english_pob_choice: to visit
  chosen_spanish: para visitar
  alternatives_spanish:
  - para inspeccionar
  - como para visitar
  lexicon: LSJ
  rationale: ἐφοδεῦσαι puede implicar recorrer o inspeccionar; en español 'visitar' aquí es natural y preserva la finalidad aparente, sin sobrerretraducir a inspección.
- source_word: τὰς κατὰ Κοίλην Συρίαν καὶ Φοινίκην πόλεις
  english_pob_choice: the cities of Coele-Syria and Phoenicia
  chosen_spanish: las ciudades de Celesiria y Fenicia
  alternatives_spanish:
  - las ciudades de Coele-Siria y Fenicia
  - las ciudades en Celesiria y Fenicia
  lexicon: LSJ
  rationale: Se conserva el nombre geográfico histórico en transliteración castellana usual ('Celesiria') y el paralelo con Fenicia.
- source_word: τῷ πράγματι δέ
  english_pob_choice: but in reality
  chosen_spanish: pero en realidad
  alternatives_spanish:
  - pero de hecho
  - pero realmente
  lexicon: LSJ
  rationale: La contraposición con la cláusula anterior exige una fórmula clara y directa que preserve el contraste apariencia/realidad.
- source_word: τὴν ... πρόθεσιν ἐπιτελεῖν
  english_pob_choice: to carry out ... plan
  chosen_spanish: llevar a cabo el plan
  alternatives_spanish:
  - cumplir el plan
  - realizar el propósito
  lexicon: LSJ
  rationale: '''Πρόθεσις'' aquí refiere a propósito o plan; ''plan'' sigue la revisión inglesa y suena natural en español. ''Llevar a cabo'' conserva la idea de ejecución efectiva.'
- source_word: τοῦ A βασιλέως
  english_pob_choice: the king’s
  chosen_spanish: del rey
  alternatives_spanish:
  - del rey A
  - del rey
  lexicon: LSJ
  rationale: El 'A' del testimonio parece un artefacto textual ajeno al sentido; por eso se traduce el valor inteligible del sintagma como 'del rey' y se nota la variante textual.
theological_decisions:
- issue: Contraste entre apariencia e intención real
  english_pob_reading: ostensibly ... but in reality
  chosen_spanish_reading: ostensiblemente ... pero en realidad
  alternative_spanish_readings:
  - en apariencia ... pero en realidad
  - con el pretexto de ... pero en realidad
  rationale: Se preserva la tensión textual entre la intención declarada y la verdadera finalidad, sin cargar más allá de lo que el griego dice.
  doctrine_reference: Narrative ethics / literary irony
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que favoreció una formulación más natural para τῇ μὲν ἐμφάσει ... ἐφοδεῦσαι ('ostensibly to visit') y sustituyó 'purpose' por 'plan' para πρόθεσιν. La versión española refleja esas decisiones revisadas, manteniendo el contraste con 'pero en realidad' y el tratamiento del 'A' como variante textual.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - '''Mesías'', ''Cristo'', ''esclavo'' y otros términos de norma no aparecen aquí; no aplica ajuste terminológico.'
  - Se conserva el registro bíblico moderno y legible, evitando calcos rígidos donde el español pide una solución idiomática.
