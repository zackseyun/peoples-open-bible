review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: futuro profético para בלע/מחה/יסיר, imagen concreta de ''tragar'' la muerte, ''enjugar'' las lágrimas, alcance universal de ''toda la tierra'', y cierre solemne ''porque Yahvé ha hablado''. Sin embargo, el compuesto אֲדֹנָי יְהוִה queda mejor como ''el Señor Dios[a]'' o similar en español natural, con nota que explique el literal ''Señor Yahvé'', porque ''el Señor Yahvé'' suena forzado y menos idiomático en lectura eclesial. También conviene alinear las notas con la evidencia inglesa: conservar la alternativa del perfecto profético y una nota para el título divino compuesto; y mantener una sola alternativa léxica principal para חֶרְפַּת (''afrenta'' o ''desgracia''), evitando duplicar notas innecesarias.'
  spanish_quality_summary: El español es mayormente claro y digno. 'Él tragará a la muerte' es entendible, pero sin énfasis contrastivo el pronombre 'Él' es prescindible. 'Enjugará las lágrimas de todo rostro' suena bien. 'Quitará de sobre toda la tierra el oprobio de su pueblo' es fiel pero algo rígido; 'quitará de toda la tierra' lee mejor sin pérdida sustancial. El principal problema de naturalidad es 'el Señor Yahvé', que se percibe como calco semítico más que español bíblico fluido.
  glossary_alignment: 'Se respeta bien Yahvé para יהוה en la cláusula final. En el título אֲדֹנָי יְהוִה, por la política del proyecto debe explicarse la presencia de YHWH, pero en el texto principal español es preferible ''el Señor Dios[a]'' con nota ''Hebreo: Señor Yahvé, literalmente Señor YHWH'', para preservar tanto legibilidad como la racionalidad documentada. ''Oprobio'' es aceptable para חֶרְפָּה, aunque las notas deben simplificarse y ordenarse.'
  issues:
  - severity: medium
    issue: '''el Señor Yahvé'' suena poco natural en español'
    rationale: Aunque refleja directamente אֲדֹנָי יְהוִה y no oculta el nombre divino, en español de lectura pública resulta forzado. Una forma más idiomática como 'el Señor Dios' con nota explicativa preserva el compuesto y la evidencia fuente.
  - severity: low
    issue: Pronombre explícito 'Él' innecesario
    rationale: El hebreo no exige énfasis pronominal aquí; en español fluye mejor 'Tragará a la muerte...'.
  - severity: low
    issue: Demasiadas notas alternativas para חֶרְפַּת
    rationale: El inglés auditado conserva una sola alternativa principal ('disgrace'); el español no necesita duplicar 'reproche' y 'afrenta' a la vez.
  - severity: low
    issue: '''de sobre toda la tierra'' es rígido'
    rationale: Aunque formalmente cercano a מֵעַל, en español natural 'de toda la tierra' comunica bien el sentido sin sonar calcado.
  revised_spanish_text: Tragará a la muerte para siempre[b], y el Señor Dios[a] enjugará las lágrimas de todo rostro, y quitará de toda la tierra el oprobio de su pueblo[c], porque Yahvé ha hablado.
  revised_footnotes:
