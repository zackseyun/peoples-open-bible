translation:
  language: es
  text: Y lo que quede del aceite que está sobre la palma[a] del sacerdote, lo pondrá sobre la cabeza del que está siendo purificado, y el sacerdote hará expiación por él delante de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo que reste del aceite que está sobre la palma del sacerdote».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַנּוֹתָר
  english_pob_choice: And what remains
  chosen_spanish: Y lo que quede
  alternatives_spanish:
  - Y lo que permanece
  - Y el resto
  lexicon: HALOT
  rationale: El participio substantivado expresa lo que queda sobrante; «lo que quede» conserva bien ese valor y suena natural en español.
- source_word: בַּשֶּׁמֶן
  english_pob_choice: of the oil
  chosen_spanish: del aceite
  alternatives_spanish:
  - del aceite
  - del aceite restante
  lexicon: HALOT
  rationale: El contexto partitivo pide en español «del aceite»; «aceite» es el término normal y claro para שמן en esta consigna de ritual.
- source_word: כַּף הַכֹּהֵן
  english_pob_choice: the priest’s palm
  chosen_spanish: la palma del sacerdote
  alternatives_spanish:
  - la palma del sacerdote
  - la mano del sacerdote
  lexicon: HALOT
  rationale: כַּף se refiere de manera específica a la palma de la mano; «palma» evita ampliar indebidamente a «mano».
- source_word: יִתֵּן
  english_pob_choice: he shall put
  chosen_spanish: lo pondrá
  alternatives_spanish:
  - lo colocará
  - lo dará
  lexicon: HALOT
  rationale: En el gesto ritual de aplicación, «poner» reproduce bien el valor de נתן sin sonar forzado en español.
- source_word: הַמִּטַּהֵר
  english_pob_choice: the one being cleansed
  chosen_spanish: el que se está purificando
  alternatives_spanish:
  - el que está siendo limpiado
  - la persona que se está purificando
  lexicon: HALOT
  rationale: El hitpael participial expresa a la persona en proceso de purificación ritual; «se está purificando» preserva ese matiz continuo.
- source_word: וְכִפֶּר עָלָיו
  english_pob_choice: and the priest shall make atonement for him
  chosen_spanish: y el sacerdote hará expiación por él
  alternatives_spanish:
  - y el sacerdote hará propiciación por él
  - y el sacerdote hará expiación en favor de él
  lexicon: HALOT
  rationale: כפר en contexto levítico ritual se rinde de forma estable como «hacer expiación»; conserva el sentido técnico sin sustituirlo por una paráfrasis doctrinal.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: La consigna del proyecto pide «Yahvé» para יְהוָה; «delante de» expresa bien לִפְנֵי en estilo bíblico natural.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: before Yahweh
  chosen_spanish_reading: delante de Yahvé
  alternative_spanish_readings:
  - delante del SEÑOR
  - ante el SEÑOR
  rationale: Se sigue la norma del proyecto para renderizar explícitamente el Nombre del pacto como «Yahvé», sin enmascararlo con un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: כפר en contexto levítico ritual
  english_pob_reading: make atonement
  chosen_spanish_reading: hacer expiación
  alternative_spanish_readings:
  - hacer atonamiento
  - purificar
  rationale: En Levítico, כפר tiene un valor técnico ritual. «Hacer expiación» preserva ese contenido sin imponer una explicación sistemática adicional.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó «in the priest’s palm» a «on the priest’s palm» para reflejar con más precisión עַל כַּף הַכֹּהֵן. La versión española mantiene ese ajuste con «sobre la palma del sacerdote».
  spanish_consistency_notes:
  - Se mantiene el registro culto y litúrgico, pero con sintaxis española natural.
  - «Expiación» se usa como término técnico coherente con el léxico levítico.
  - El Nombre divino aparece como «Yahvé» conforme al marco terminológico del proyecto.
  - La nota [a] está anclada en el texto y ofrece la alternativa lexical documentada sin alterar el sentido principal.
