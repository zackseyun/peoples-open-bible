translation:
  language: es
  text: Efraín me ha rodeado[a] con mentiras, y la casa de Israel con engaño[b]; pero Judá todavía anda con Dios[c] y es fiel con el Santo[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «me ha cercado» o «me ha envuelto». El verbo hebreo expresa rodear o cercar, con imagen de encierro por medio de la mentira.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «con falsedad» o «con traición». El hebreo puede abarcar engaño, falsedad o fraude; aquí se eligió «engaño» para distinguirlo de «mentiras».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «Judá todavía es rebelde contra Dios, contra el Santo que es fiel». El hebreo de esta cláusula es difícil, especialmente el verbo traducido aquí «anda».'
    reason: alternative_reading
  - marker: d
    text: 'Hebreo: «con los santos»; también puede entenderse «con el Santo», en referencia a Dios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: סְבָבֻנִי
  english_pob_choice: has surrounded me
  chosen_spanish: me ha rodeado
  alternatives_spanish:
  - me ha cercado
  - me ha envuelto
  lexicon: HALOT
  rationale: El verbo expresa rodear o cercar a alguien. «Me ha rodeado» es natural en español y conserva la imagen de ser cercado por falsedad.
- source_word: בְּכַחַשׁ
  english_pob_choice: with lies
  chosen_spanish: con mentiras
  alternatives_spanish:
  - con falsedad
  - con negación
  lexicon: HALOT
  rationale: כחש puede denotar mentira, falsedad o negación. En este contexto profético de infidelidad, «mentiras» es claro y conserva la fuerza acusatoria.
- source_word: אֶפְרַיִם
  english_pob_choice: Ephraim
  chosen_spanish: Efraín
  alternatives_spanish:
  - Efraím
  lexicon: HALOT
  rationale: Se mantiene el nombre propio transliterado. En Oseas suele representar metonímicamente al reino del norte, pero no se interpreta fuera del texto.
- source_word: וּבְמִרְמָה
  english_pob_choice: with deceit
  chosen_spanish: con engaño
  alternatives_spanish:
  - con deceit
  - con fraude
  - con traición
  lexicon: HALOT
  rationale: מרמה apunta a engaño o traición. «Con engaño» distingue bien este término de «mentiras» y suena natural en español.
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: the house of Israel
  chosen_spanish: la casa de Israel
  alternatives_spanish:
  - Israel
  lexicon: HALOT
  rationale: Se conserva la forma constructa hebrea para reflejar el estilo profético y la formulación original.
- source_word: וִיהוּדָה
  english_pob_choice: but Judah
  chosen_spanish: pero Judá
  alternatives_spanish:
  - y Judá
  - mientras Judá
  lexicon: HALOT
  rationale: Aunque la conjunción básica es «y», el contraste del contexto favorece «pero» en español para reflejar la oposición entre Efraín/Israel y Judá.
- source_word: עֹד
  english_pob_choice: still
  chosen_spanish: todavía
  alternatives_spanish:
  - aún
  - todavía ahora
  lexicon: HALOT
  rationale: Marca continuidad. «Todavía» es conciso y mantiene el valor aspectual de persistencia.
- source_word: רָד עִם אֵל
  english_pob_choice: roams with God
  chosen_spanish: anda errante con Dios
  alternatives_spanish:
  - anda con Dios
  - ronda con Dios
  - está inquieto con Dios
  lexicon: HALOT
  rationale: La forma verbal es difícil. Se conserva una lectura positiva y relacional, como en el texto base inglés, usando «anda errante» para reflejar mejor el matiz inusual de רד sin eliminar la tensión interpretativa.
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - El
  lexicon: HALOT
  rationale: Aunque el hebreo dice אֵל, en este contexto funciona como título divino común; «Dios» es el equivalente normal y claro en español.
- source_word: וְעִם קְדוֹשִׁים
  english_pob_choice: with the Holy One
  chosen_spanish: con el Santo
  alternatives_spanish:
  - con los santos
  - con los santos de Dios
  - con el Santo One
  lexicon: HALOT
  rationale: Aunque el plural hebreo permite la lectura «santos», el audit trail inglés preserva la posibilidad de entenderlo como referencia a Dios. «El Santo» mantiene esa opción sin borrar la tensión textual.
- source_word: נֶאֱמָן
  english_pob_choice: is faithful
  chosen_spanish: es fiel
  alternatives_spanish:
  - es confiable
  - es leal
  - permanece fiel
  lexicon: HALOT
  rationale: El participio nifal expresa fidelidad o fiabilidad. «Es fiel» es la forma más directa y teológicamente transparente en español.
theological_decisions:
- issue: Lectura de la cláusula de Judá en un hebreo difícil
  english_pob_reading: 'A positive contrast: Judah still roams with God and is faithful with the Holy One.'
  chosen_spanish_reading: 'Una lectura positiva y contrastiva: Judá todavía anda errante con Dios y es fiel con el Santo.'
  alternative_spanish_readings:
  - Judá todavía es rebelde contra Dios y contra el Santo, que es fiel.
  - Judá todavía ronda/anda con Dios en sentido político o incierto.
  rationale: El texto masorético es difícil, sobre todo en el verbo y en la expresión final. Dado que «es fiel» encaja naturalmente como predicado y que la cláusula puede leerse en contraste con la mentira de Efraín e Israel, se mantiene la lectura positiva sin borrar la ambigüedad real.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El auditable inglés revisó la cláusula de Judá desde «walks» a «roams» para acercarse más al verbo hebreo. En español se reflejó esa revisión con «anda errante», manteniendo la lectura favorable de la cláusula y la tensión interpretativa documentada en la nota crítica.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando el hebreo expresa el nombre divino, pero aquí el texto usa אֵל/קְדוֹשִׁים; por eso se tradujo como «Dios» y «el Santo».
  - Se prefirió «fiel» para נֶאֱמָן por su transparencia bíblica y por su correspondencia natural con el contraste del versículo.
  - Se conservó el paralelismo entre «mentiras» y «engaño» para reflejar dos términos hebreos relacionados pero no idénticos.
