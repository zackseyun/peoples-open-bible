translation:
  language: es
  text: Y así hizo para todas sus esposas extranjeras[a], las cuales quemaban incienso y ofrecían sacrificios a sus dioses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y de igual manera hizo para todas sus esposas extranjeras». El hebreo deja implícita la acción concreta y remite al versículo anterior.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכֵן
  english_pob_choice: And so
  chosen_spanish: Y así
  alternatives_spanish:
  - Y de igual manera
  - Y asimismo
  lexicon: HALOT
  rationale: La expresión introduce una continuación de la acción previa; «Y así» conserva el enlace discursivo sin sonar rígido en español.
- source_word: עָשָׂה
  english_pob_choice: he did
  chosen_spanish: hizo
  alternatives_spanish:
  - actuó
  - procedió
  lexicon: HALOT
  rationale: El hebreo usa un verbo amplio y el contexto completa el contenido implícito. «Hizo» mantiene la elipsis sin añadir más de lo que el versículo dice.
- source_word: לְכָל
  english_pob_choice: for all
  chosen_spanish: para todas
  alternatives_spanish:
  - con todas
  - para cada una de
  lexicon: HALOT
  rationale: Aquí la preposición expresa provisión o disposición hecha en favor de cada una; «para todas» comunica ese alcance natural en español.
- source_word: נָשָׁיו
  english_pob_choice: his wives
  chosen_spanish: sus esposas
  alternatives_spanish:
  - sus mujeres
  lexicon: HALOT
  rationale: En contexto, el sustantivo se refiere claramente a esposas; «esposas» es más directo y natural que «mujeres».
- source_word: הַנָּכְרִיּוֹת
  english_pob_choice: foreign
  chosen_spanish: extranjeras
  alternatives_spanish:
  - de otros pueblos
  - forasteras
  lexicon: HALOT
  rationale: El término señala mujeres de fuera de Israel. «Extranjeras» es claro, actual y evita el matiz anticuado de otras opciones.
- source_word: מַקְטִירוֹת
  english_pob_choice: burned incense
  chosen_spanish: quemaban incienso
  alternatives_spanish:
  - ofrecían incienso
  - hacían humo
  lexicon: HALOT
  rationale: El participio hifil de קטר en este marco cultual se expresa con naturalidad como «quemaban incienso», que conserva el acto ritual concreto.
- source_word: וּמְזַבְּחוֹת
  english_pob_choice: and sacrificing
  chosen_spanish: y ofrecían sacrificios
  alternatives_spanish:
  - y sacrificaban
  - y hacían sacrificios
  lexicon: HALOT
  rationale: El participio de זבח denota acto sacrificial. «Ofrecían sacrificios» es idiomático en español y mantiene el sentido cultual sin perder precisión.
- source_word: לֵאלֹהֵיהֶן
  english_pob_choice: to their gods
  chosen_spanish: a sus dioses
  alternatives_spanish:
  - a sus deidades
  - a sus dioses propios
  lexicon: HALOT
  rationale: El plural con sufijo femenino apunta a las deidades de ellas. «Dioses» conserva el plural del hebreo y evita confundirlo con el Dios de Israel.
theological_decisions:
- issue: Quién realiza las acciones cultuales expresadas por los participios
  english_pob_reading: The foreign wives are the ones burning incense and sacrificing.
  chosen_spanish_reading: Las esposas extranjeras son quienes quemaban incienso y ofrecían sacrificios.
  alternative_spanish_readings:
  - Solamente se describe la práctica asociada a los altares que él les había hecho
  - Los altares quemaban incienso y ofrecían sacrificios
  rationale: Los participios femeninos plurales concuerdan de manera directa con «sus esposas extranjeras». La traducción conserva esa concordancia y no traslada la acción a Salomón ni a los altares.
  doctrine_reference: Translation philosophy §1, §3
- issue: Contenido elíptico de «hizo»
  english_pob_reading: The translation leaves the object implicit ('he did') and lets the previous verse supply the content.
  chosen_spanish_reading: La traducción mantiene implícito el objeto de «hizo» y deja que el versículo anterior complete la referencia.
  alternative_spanish_readings:
  - Él hizo lo mismo
  - Él construyó lugares altos para todas sus esposas extranjeras
  rationale: El hebreo omite el objeto del verbo y depende del contexto inmediato. En español, «hizo» preserva esa elipsis sin sobreespecificar el contenido.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: La redacción sigue de cerca la última revisión inglesa, que prefirió verbos en pasado simple («burned incense and sacrificed») en lugar de perífrasis progresivas. En español se reflejó esa naturalidad con imperfectos narrativos («quemaban», «ofrecían») dentro de una escena descriptiva, manteniendo el paralelismo y la elipsis del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» cuando el contexto requiera el nombre divino, pero este versículo no lo contiene.
  - «Esposas extranjeras» conserva el matiz relacional del hebreo sin usar términos arcaicos.
  - «Quemaban incienso» y «ofrecían sacrificios» preservan el lenguaje cultual con registro bíblico claro.
  - Se respetó el plural de «dioses» para reflejar el hebreo לֵאלֹהֵיהֶן.
