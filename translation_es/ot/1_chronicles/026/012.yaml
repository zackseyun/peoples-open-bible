translation:
  language: es
  text: 'Estas eran las divisiones de los guardianes de las puertas, para los jefes de los hombres: funciones[a] correspondientes a las de sus hermanos, para ministrar en la casa de Yahvé.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «turnos» o «guardias». El hebreo מִשְׁמָרוֹת es compacto y puede referirse a funciones de servicio, guardias o asignaciones de turno.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְאֵלֶּה
  english_pob_choice: These were
  chosen_spanish: Estas eran
  alternatives_spanish:
  - Para estos eran
  - Estas son
  lexicon: HALOT
  rationale: El prefijo ל aquí introduce o retoma la disposición descrita; en español, una apertura copulativa natural como «Estas eran» transmite el valor resumidor sin forzar una preposición antinatural.
- source_word: מַחְלְקוֹת
  english_pob_choice: divisions
  chosen_spanish: divisiones
  alternatives_spanish:
  - turnos
  - cursos
  - departamentos
  lexicon: HALOT
  rationale: El término denota unidades organizadas de servicio. «Divisiones» conserva bien la estructura administrativa y es claro en español moderno.
- source_word: הַשֹּׁעֲרִים
  english_pob_choice: the gatekeepers
  chosen_spanish: los porteros
  alternatives_spanish:
  - los guardias de la puerta
  - los guardianes de la puerta
  lexicon: HALOT
  rationale: «Porteros» es un equivalente bíblico tradicional y comprensible en español para quienes custodiaban y atendían las puertas del templo; evita una expresión demasiado larga y mantiene la función. Aunque «gatekeepers» puede verterse como «guardianes de la puerta», aquí «porteros» resulta más natural en español eclesiástico.
- source_word: לְרָאשֵׁי הַגְּבָרִים
  english_pob_choice: for the heads of the men
  chosen_spanish: para los jefes de los hombres
  alternatives_spanish:
  - para los principales hombres
  - para los cabezas de los hombres
  - para los jefes guerreros
  lexicon: HALOT
  rationale: La frase hebrea es compacta. «Jefes de los hombres» conserva de forma más literal la estructura del original y evita introducir la connotación militar de «guerreros», que no está exigida por el contexto.
- source_word: מִשְׁמָרוֹת
  english_pob_choice: duties
  chosen_spanish: funciones
  alternatives_spanish:
  - turnos
  - guardias
  - servicios asignados
  lexicon: HALOT
  rationale: El sustantivo puede significar turnos, guardias o deberes de servicio. Dado el paralelismo con el servicio en el templo, «funciones» comunica la idea de asignación de servicio sin añadir un verbo no sustentado por el hebreo; la nota preserva la alternativa de «turnos»/«guardias».
- source_word: לְעֻמַּת
  english_pob_choice: corresponding to
  chosen_spanish: correspondientes a
  alternatives_spanish:
  - en relación con
  - al lado de
  - en paralelo con
  lexicon: HALOT
  rationale: La preposición indica correspondencia o paralelismo. «Correspondientes a» expresa bien la relación entre las tareas de unos y otros.
- source_word: אֲחֵיהֶם
  english_pob_choice: their brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus parientes
  - sus hermanos de tribu
  - sus compañeros
  lexicon: HALOT
  rationale: Se conserva el parentesco literal. En este contexto levítico, el término apunta a miembros de su misma comunidad de servicio, pero en el texto principal conviene mantener «sus hermanos».
- source_word: לְשָׁרֵת
  english_pob_choice: to minister
  chosen_spanish: para ministrar
  alternatives_spanish:
  - para servir
  - para ejercer su ministerio
  lexicon: HALOT
  rationale: En contexto cultual, שׁרת tiene sentido de ministerio sagrado. «Ministrar» mantiene esa connotación mejor que el más general «servir».
- source_word: בְּבֵית יְהוָה
  english_pob_choice: in the house of Yahweh
  chosen_spanish: en la casa de Yahvé
  alternatives_spanish:
  - en la casa de Yahweh
  - en el templo de Yahvé
  lexicon: HALOT
  rationale: Se conserva la expresión literal «casa de Yahvé», fiel al hebreo בֵּית יְהוָה y conforme al criterio del proyecto de usar «Yahvé» para el Tetragrámaton.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
  rationale: Se sigue el estándar del proyecto para el nombre divino. «Yahvé» preserva el nombre del pacto y evita la convención de sustitución por «SEÑOR».
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El hebreo usa directamente el Tetragrámaton. El proyecto pide reproducirlo como «Yahvé» en el texto principal, manteniendo la transparencia del nombre revelado y no ocultándolo tras una sustitución funcional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de מִשְׁמָרוֹת en este contexto
  english_pob_reading: duties / watches / service assignments
  chosen_spanish_reading: funciones
  alternative_spanish_readings:
  - turnos
  - guardias
  - asignaciones de servicio
  rationale: El hebreo es elíptico y permite varios matices. «Funciones» conserva la idea de servicio asignado sin introducir una explicación demasiado interpretativa en el cuerpo del texto; la ambigüedad se reconoce en la nota.
  doctrine_reference: Principio de preservación de tensiones léxicas del POB
- issue: Alcance de גְּבָרִים
  english_pob_reading: men
  chosen_spanish_reading: hombres
  alternative_spanish_readings:
  - varones
  - hombres principales
  - guerreros
  rationale: En este pasaje histórico el sustantivo masculino plural se refiere a los varones que ejercían servicio en el templo. Se mantiene «hombres» para conservar la referencia masculina sin cargar el texto con una interpretación militar que el hebreo no exige.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste más reciente del audit trail en inglés, que eliminó un verbo no sustentado y dejó una estructura más cercana al hebreo: divisiones de los porteros, jefes de los hombres, funciones correspondientes a las de sus hermanos, para ministrar en la casa de Yahvé. La versión española procura mantener esa misma economía sintáctica sin añadir elementos explicativos no presentes en el original.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, en línea con el estándar del proyecto.
  - «Porteros» se emplea como equivalente natural y eclesiásticamente comprensible de הַשֹּׁעֲרִים.
  - «Ministrar» preserva el matiz cultual de לְשָׁרֵת sin reducirlo a servicio genérico.
  - La nota de pie conserva la ambigüedad de מִשְׁמָרוֹת sin resolverla de manera excesiva en el texto principal.
