review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: Yahvé escoge al levita/sacerdote de entre las tribus para estar de pie y ministrar en el nombre de Yahvé, él y sus hijos, con duración continua. Conserva correctamente Yahvé, la selección de entre las tribus, la postura concreta de לַעֲמֹד y el lenguaje masculino de הוּא וּבָנָיו. Sin embargo, añade notas innecesarias y mal orientadas: la nota [a] no ofrece una alternativa real, y la nota [b] duplica sin necesidad el texto principal en vez de aclarar una ambigüedad o preservar una alternativa significativa. Además, la nota inglesa auditada se relaciona con כָּל הַיָּמִים, no con ‘Yahvé’ ni con ‘sus hijos’.'
  spanish_quality_summary: El español es claro y digno. ‘Porque Yahvé tu Dios lo ha escogido de entre todas tus tribus’ suena natural. ‘Para que esté de pie y ministre’ es fiel, aunque algo rígido; sigue siendo aceptable en registro bíblico. El principal problema de calidad está en el aparato de notas, no en la redacción principal. Conviene anclar la única nota en ‘todos los días’ para reflejar el matiz de duración continua documentado por el POB inglés.
  glossary_alignment: 'La terminología del proyecto está bien aplicada: יְהוָה → ‘Yahvé’; בָּנָיו no se neutraliza; לְשָׁרֵת se vierte adecuadamente con ‘ministre’. No hay conflicto doctrinal serio. La corrección necesaria es alinear las notas con la evidencia auditada y evitar notas redundantes o circulares.'
  issues:
  - severity: medium
    issue: Las notas al pie no corresponden al audit trail inglés ni a necesidades reales del español.
    rationale: La nota preservada en el POB inglés trata sobre כָּל הַיָּמִים (‘all the days’), pero el borrador coloca notas sobre ‘Yahvé’ y ‘sus hijos’, sin ofrecer alternativas sustantivas ni resolver una ambigüedad nueva del español.
  - severity: low
    issue: La nota [a] es circular y no aporta una alternativa léxica real.
    rationale: 'Dice ‘O: en el nombre de Yahvé’ sobre una frase que ya está exactamente así en el texto principal.'
  - severity: low
    issue: La nota [b] es innecesaria.
    rationale: ‘Sus hijos’ ya está en el texto principal y es suficientemente claro; la sucesión sacerdotal masculina ya se preserva en la redacción sin requerir nota adicional.
  revised_spanish_text: Porque Yahvé tu Dios lo ha escogido de entre todas tus tribus para que esté de pie y ministre en el nombre de Yahvé, él y sus hijos todos los días[a].
  revised_footnotes:
  - marker: a
    text: 'O: «todos los días». La expresión hebrea puede traducirse de manera más literal, pero aquí se refiere al servicio sacerdotal continuo y duradero.'
    reason: lexical_alternative
  revision_rationale: 'Se conserva el texto principal casi intacto porque es fiel y legible. Se corrige el aparato de notas para alinearlo con la evidencia fuente y el audit trail inglés: se eliminan dos notas impropias y se añade una única nota en ‘todos los días’, que es donde el POB documenta la alternativa/matiz léxico relevante.'
