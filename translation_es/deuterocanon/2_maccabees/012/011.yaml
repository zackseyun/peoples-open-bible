translation:
  language: es
  text: Y cuando se entabló una batalla recia, y los que estaban con Judas prevalecieron por la ayuda de Dios, los nómadas, debilitados, pedían a Judas que les diera su mano derecha[a], prometiendo también proveer pastos y serles útiles en el futuro[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «dar la mano derecha», un modismo para hacer las paces o sellar una alianza.
    reason: cultural_note
  - marker: b
    text: La expresión griega final es algo comprimida; el sentido es que prometieron apoyo de pastoreo y ayuda futura.
    reason: textual_variant
lexical_decisions:
- source_word: καρτερᾶς μάχης
  english_pob_choice: a fierce battle
  chosen_spanish: una batalla recia
  alternatives_spanish:
  - una batalla feroz
  - una batalla dura
  lexicon: LSJ
  rationale: καρτερός expresa fuerza, intensidad o severidad; en contexto bélico, «recia» comunica bien una lucha intensa sin sonar rebuscado. Evita el calco y conserva la fuerza del original.
- source_word: τῶν περὶ τὸν Ἰούδαν
  english_pob_choice: those with Judas
  chosen_spanish: los que estaban con Judas
  alternatives_spanish:
  - Judas y sus hombres
  - los de alrededor de Judas
  lexicon: LSJ
  rationale: La expresión griega señala al grupo asociado con Judas. En español, «los que estaban con Judas» es natural y mantiene la relación grupal sin añadir estructura militar no explícita.
- source_word: διὰ τὴν παρὰ τοῦ θεοῦ βοήθειαν
  english_pob_choice: because of the help from God
  chosen_spanish: por la ayuda de Dios
  alternatives_spanish:
  - a causa de la ayuda de Dios
  - por el auxilio de Dios
  lexicon: LSJ
  rationale: El texto atribuye el éxito a la ayuda procedente de Dios. «Por la ayuda de Dios» conserva la causalidad y la agencia divina con una formulación clara y fiel.
- source_word: εὐημερησάντων
  english_pob_choice: had prevailed
  chosen_spanish: prevalecieron
  alternatives_spanish:
  - tuvieron éxito
  - prosperaron
  lexicon: LSJ
  rationale: En contexto de combate, el verbo se refiere al resultado favorable de la batalla. «Prevalecieron» reproduce ese matiz militar mejor que un éxito genérico.
- source_word: ἐλαττωθέντες
  english_pob_choice: having been weakened
  chosen_spanish: debilitados
  alternatives_spanish:
  - habiendo sido disminuidos
  - derrotados
  lexicon: LSJ
  rationale: El participio indica disminución o debilitamiento; no exige que se diga derrota total. «Debilitados» mantiene la fuerza del término sin exagerar el alcance.
- source_word: οἱ νομάδες
  english_pob_choice: the nomads
  chosen_spanish: los nómadas
  alternatives_spanish:
  - los nomadas
  - los pueblos nómadas
  lexicon: LSJ
  rationale: El sustantivo designa pueblos nómadas. En español, «los nómadas» funciona como designación social/étnica y sigue de cerca el griego.
- source_word: ἠξίουν δοῦναι τὸν Ἰούδαν δεξιὰν αὐτοῖς
  english_pob_choice: asked Judas to give them his right hand
  chosen_spanish: pedían a Judas que les diera su mano derecha
  alternatives_spanish:
  - solicitaban de Judas su mano derecha
  - pedían a Judas un pacto de amistad
  lexicon: LSJ
  rationale: La idiomática «dar la mano derecha» se conserva en español para no borrar la imagen textual. El sentido de pacto o reconciliación queda implícito y se aclara en la nota.
- source_word: ὑπισχνούμενοι
  english_pob_choice: promising
  chosen_spanish: prometiendo
  alternatives_spanish:
  - comprometiéndose
  - ofreciendo
  lexicon: LSJ
  rationale: El participio introduce las condiciones que añaden. «Prometiendo» es directo, natural y suficientemente preciso.
- source_word: βοσκήματα δώσειν
  english_pob_choice: to provide pasture
  chosen_spanish: proveer pastos
  alternatives_spanish:
  - dar pastos
  - suministrar forraje
  lexicon: LSJ
  rationale: βοσκήματα alude a recursos de pastoreo o alimentación para ganado. «Proveer pastos» conserva la referencia pastoral sin estrecharla innecesariamente a una sola forma de ayuda.
- source_word: ἐν τοῖς λοιποῖς
  english_pob_choice: in the future
  chosen_spanish: en el futuro
  alternatives_spanish:
  - en lo demás
  - después
  lexicon: LSJ
  rationale: La expresión apunta a actuaciones posteriores. «En el futuro» expresa naturalmente el valor temporal del griego.
- source_word: ὠφέλησεν αὐτούς
  english_pob_choice: to be useful to them
  chosen_spanish: serles útiles
  alternatives_spanish:
  - beneficiarlos
  - ayudarles
  lexicon: LSJ
  rationale: El cierre griego es comprimido y apunta a beneficio futuro. «Serles útiles» conserva el sentido amplio de provecho sin imponer una precisión mayor que la del texto.
theological_decisions:
- issue: Atribución divina del resultado militar
  english_pob_reading: the victory/success is rendered as occurring because of help from God
  chosen_spanish_reading: la prevalencia de Judas y su grupo se presenta como resultado de la ayuda de Dios
  alternative_spanish_readings:
  - presentar solo el resultado militar sin causa divina
  - suavizar la referencia a la ayuda de Dios
  rationale: El griego dice explícitamente διὰ τὴν παρὰ τοῦ θεοῦ βοήθειαν. La traducción mantiene esa afirmación teológica sin atenuarla ni convertirla en mera circunstancia.
  doctrine_reference: Translation philosophy §1, §3
- issue: La «mano derecha» como gesto de paz o alianza
  english_pob_reading: Literally, 'to give them the right hand,' an idiom for making peace or pledging alliance.
  chosen_spanish_reading: «darles su mano derecha» se entiende como gesto de paz o alianza
  alternative_spanish_readings:
  - traducir directamente «hacer la paz»
  - traducir «sellar una alianza»
  rationale: Se preserva la imagen verbal del original y, al mismo tiempo, se reconoce su valor idiomático. Así no se borra la tensión entre literalidad y sentido histórico.
  doctrine_reference: Translation philosophy §2, §4
translation_notes:
  revision_awareness: La lectura inglesa más reciente cambió «had succeeded» por «had prevailed» y ajustó «to be of use» a «to be useful». Esta versión española sigue esa revisión con «prevalecieron» y «serles útiles». También conserva el valor idiomático de «dar la mano derecha» y refleja la referencia a βοσκήματα con «proveer pastos».
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός, conforme al estándar del proyecto.
  - «Nómadas» se usa en minúscula como designación descriptiva, no como nombre propio.
  - Se preserva la relación causal teológica con «por la ayuda de Dios».
  - La frase final busca reproducir la compresión del griego sin sobreexplicar el contenido.
