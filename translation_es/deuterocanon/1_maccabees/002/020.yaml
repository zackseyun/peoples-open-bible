translation:
  language: es
  text: Pero yo, mis hijos y mis hermanos andaremos[a] en el pacto de nuestros padres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «andaremos en el pacto de nuestros padres». El griego usa una expresión idiomática que probablemente significa vivir con fidelidad al pacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: κἀγώ
  english_pob_choice: But I
  chosen_spanish: Pero yo
  alternatives_spanish:
  - Y yo
  - Yo también
  lexicon: LSJ
  rationale: El crasis καί + ἐγώ puede reflejarse con un conector adversativo o continuativo según el contexto. Aquí, como en el inglés POB, la contraposición implícita frente a la conformidad ajena se expresa con «Pero yo», que suena natural en español y conserva el énfasis de resolución personal.
- source_word: οἱ υἱοί μου
  english_pob_choice: my sons
  chosen_spanish: mis hijos
  alternatives_spanish:
  - mis hijos varones
  - mis hijos
  lexicon: LSJ
  rationale: Aunque υἱοί significa literalmente «hijos varones»/«hijos», en español «mis hijos» puede ser masculino colectivo y resulta idiomático sin perder la referencia familiar. Se evita una formulación más forzada, manteniendo el dato de filiación masculina en el contexto narrativo.
- source_word: οἱ ἀδελφοί μου
  english_pob_choice: my brothers
  chosen_spanish: mis hermanos
  alternatives_spanish:
  - mis hermanos de sangre
  - mis parientes
  lexicon: LSJ
  rationale: ἀδελφοί se traduce de forma directa como «hermanos». No hay presión contextual suficiente para ampliar a «parientes», y la opción simple conserva la fuerza lexical del griego.
- source_word: πορευσόμεθα
  english_pob_choice: will walk
  chosen_spanish: andaremos
  alternatives_spanish:
  - iremos
  - caminaremos
  - viviremos
  lexicon: LSJ
  rationale: El griego puede significar literalmente «iremos», pero en combinación con ἐν διαθήκῃ expresa conducta o modo de vida. En español, «andaremos» mantiene la imagen bíblica de caminar/andar en fidelidad y suena más natural que un calco rígido.
- source_word: ἐν διαθήκῃ
  english_pob_choice: in the covenant
  chosen_spanish: en el pacto
  alternatives_spanish:
  - en la alianza
  - según el pacto
  lexicon: LSJ
  rationale: διαθήκη se vierte aquí como «pacto», que comunica bien la relación establecida y evita una terminología excesivamente litúrgica. «Pacto» conserva la preposición y el sentido de pertenencia al marco pactal.
- source_word: πατέρων ἡμῶν
  english_pob_choice: of our fathers
  chosen_spanish: de nuestros padres
  alternatives_spanish:
  - de nuestros antepasados
  - de nuestros padres
  lexicon: LSJ
  rationale: πατέρων significa literalmente «padres». En español bíblico, «nuestros padres» preserva el lenguaje tradicional de herencia y fidelidad de los antepasados, sin desplazar el valor familiar y covenantal del término.
theological_decisions:
- issue: La expresión idiomática πορευσόμεθα ἐν διαθήκῃ
  english_pob_reading: will walk in the covenant of our fathers
  chosen_spanish_reading: andaremos en el pacto de nuestros padres
  alternative_spanish_readings:
  - iremos en el pacto de nuestros padres
  - viviremos según el pacto de nuestros padres
  rationale: La frase no describe simple movimiento físico; señala una vida regida por fidelidad pactal. «Andaremos» conserva la metáfora bíblica de conducta continuada, mientras «en el pacto» mantiene la construcción del griego sin explicitar en exceso la interpretación.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5, 6
- issue: Terminología de parentesco masculina
  english_pob_reading: my sons ... my brothers ... our fathers
  chosen_spanish_reading: mis hijos ... mis hermanos ... nuestros padres
  alternative_spanish_readings:
  - mis hijos varones ... mis hermanos ... nuestros padres
  - mis hijos ... mis parientes ... nuestros antepasados
  rationale: El griego emplea términos masculinos específicos. Se evita neutralizar innecesariamente la referencia, pero también se busca una español natural y legible. «Padres» mantiene la resonancia pactal heredada en la tradición bíblica.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: 'No se requieren revisiones respecto del texto inglés auditado: la lectura de alta concordancia se refleja en una traducción española que conserva el contraste inicial, los términos de parentesco masculinos y la metáfora pactal de πορευσόμεθα ἐν διαθήκῃ.'
  spanish_consistency_notes:
  - Se usa «pacto» para διαθήκη, coherente con una traducción bíblica directa y comprensible en español.
  - Se preserva el valor metafórico de «andar» con una forma verbal natural en español.
  - Se mantiene el plural masculino específico en el ámbito familiar sin neutralización innecesaria.
  - El apóstrofe adversativo inicial se expresa con «Pero yo» para reflejar el giro discursivo del griego y del inglés auditado.
