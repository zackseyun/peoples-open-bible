translation:
  language: es
  text: 'Pero tú mismo me dijiste, Señor Yahvé: «Compra para ti el campo con plata y llama testigos», aunque[a] la ciudad ha sido entregada en manos de los caldeos.[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mientras la ciudad ha sido entregada en manos de los caldeos». La conjunción hebrea puede leerse más simplemente como «y/mientras»; aquí se expresa el matiz concesivo del lamento de Jeremías.'
    reason: alternative_reading
  - marker: b
    text: «Caldeos» se refiere al poder babilónico.
    reason: cultural_note
lexical_decisions:
- source_word: וְאַתָּה
  english_pob_choice: Yet you yourself
  chosen_spanish: Pero tú mismo
  alternatives_spanish:
  - Y tú mismo
  - Sin embargo, tú mismo
  lexicon: HALOT
  rationale: La conjunción con el pronombre independiente expresa contraste y énfasis; «pero» y «tú mismo» conservan esa fuerza sin sonar forzado en español.
- source_word: אָמַרְתָּ אֵלַי
  english_pob_choice: said to me
  chosen_spanish: me dijiste
  alternatives_spanish:
  - me has dicho
  - me hablaste
  lexicon: HALOT
  rationale: El pasado simple es natural en este lamento orante y mantiene la relación directa con el hablante.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: Lord Yahweh
  chosen_spanish: Señor Yahvé
  alternatives_spanish:
  - Señor Yahweh
  - Señor, Yahvé
  lexicon: HALOT
  rationale: Se conserva el valor de título de אֲדֹנָי como «Señor» y el nombre divino יְהוִה como «Yahvé», conforme al criterio del proyecto para el Tetragrámaton.
- source_word: קְנֵה לְךָ הַשָּׂדֶה
  english_pob_choice: Buy the field for yourself
  chosen_spanish: Compra para ti el campo
  alternatives_spanish:
  - Compra el campo para ti
  - Adquiere para ti el campo
  lexicon: HALOT
  rationale: «Comprar» reproduce el valor básico de קנה en este contexto; «para ti» refleja לְךָ y preserva la implicación personal.
- source_word: בַּכֶּסֶף
  english_pob_choice: with silver
  chosen_spanish: con plata
  alternatives_spanish:
  - con dinero
  - con la plata
  lexicon: HALOT
  rationale: «Plata» conserva el sustantivo concreto del hebreo, que aquí funciona metonímicamente por dinero de transacción.
- source_word: וְהָעֵד עֵדִים
  english_pob_choice: and call witnesses
  chosen_spanish: y llama testigos
  alternatives_spanish:
  - y convoca testigos
  - y toma testigos
  lexicon: HALOT
  rationale: El Hiphil de עוד con עדים expresa hacer comparecer o asegurar testigos; «llama testigos» es idiomático y fiel al sentido legal.
- source_word: וְהָעִיר
  english_pob_choice: though the city
  chosen_spanish: aunque la ciudad
  alternatives_spanish:
  - y la ciudad
  - mientras la ciudad
  lexicon: HALOT
  rationale: La concesión queda mejor explicitada en español con «aunque», siguiendo la lectura contextual ya documentada en la POB inglesa.
- source_word: נִתְּנָה
  english_pob_choice: has been given
  chosen_spanish: ha sido entregada
  alternatives_spanish:
  - fue entregada
  - está entregada
  lexicon: HALOT
  rationale: El pasivo perfecto hebreo comunica un estado resultante; «ha sido entregada» mantiene esa condición presente.
- source_word: בְּיַד
  english_pob_choice: into the hand of
  chosen_spanish: en mano de
  alternatives_spanish:
  - en poder de
  - en manos de
  lexicon: HALOT
  rationale: «En mano de» conserva la imagen idiomática hebrea sin perder inteligibilidad; se evita una paráfrasis más explicativa que el texto no exige.
- source_word: הַכַּשְׂדִּים
  english_pob_choice: the Chaldeans
  chosen_spanish: los caldeos
  alternatives_spanish:
  - los babilonios
  lexicon: HALOT
  rationale: Se sigue el término más directo del hebreo, «caldeos», manteniendo la referencia histórica del texto.
theological_decisions:
- issue: Renderización del nombre divino en אֲדֹנָי יְהוִה
  english_pob_reading: Lord Yahweh
  chosen_spanish_reading: Señor Yahvé
  alternative_spanish_readings:
  - Señor Yahweh
  - Señor, Yahvé
  rationale: El contexto contiene el nombre divino explícito. En español se preserva como «Yahvé» según la norma del proyecto, mientras אֲדֹנָי se traduce «Señor» como título reverencial.
  doctrine_reference: 'DOCTRINE.md: Tetragrámaton / contested terms; translation philosophy for direct rendering of the divine name'
translation_notes:
  revision_awareness: 'Se corrigió el fallo de validación anterior asegurando que cada marcador de nota aparezca explícitamente en el texto español: [a] y [b]. Se mantuvo la lectura concesiva ya documentada en el audit trail inglés y se actualizó el nombre divino a «Yahvé».'
  spanish_consistency_notes:
  - Se mantiene la distinción entre «Señor» como título y «Yahvé» como nombre divino.
  - «Plata» conserva el concreto hebreo כֶּסֶף sin perder el sentido monetario.
  - «En mano de» reproduce la idiomaticidad hebrea de בְּיַד, con opción alternativa explicada en nota.
  - «Caldeos» se conserva por fidelidad léxica al hebreo; la nota aclara el referente histórico.
