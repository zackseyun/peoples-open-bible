translation:
  language: es
  text: Y no cortarás tu amor fiel[a] de mi casa para siempre, ni siquiera cuando Yahvé corte de la faz de la tierra a los enemigos de David, a cada uno de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'tu amor constante' / 'tu lealtad de pacto' / 'tu amor leal'. חֶסֶד suele expresar amor fiel dentro de una relación de pacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַכְרִת / בְּהַכְרִת (כרת)
  english_pob_choice: cut off
  chosen_spanish: cortar
  alternatives_spanish:
  - quitar
  - eliminar
  - hacer desaparecer
  lexicon: HALOT
  rationale: כרת conserva en ambos miembros del verso la idea de una acción decisiva de separación o supresión. En español, 'cortar' mantiene el paralelismo verbal con claridad y permite oír el juego retórico entre no 'cortar' la fidelidad de Jonathan y Yahvé 'cortando' a los enemigos de David.
- source_word: חַסְדְּךָ
  english_pob_choice: your steadfast love
  chosen_spanish: tu fidelidad leal
  alternatives_spanish:
  - tu amor constante
  - tu lealtad de pacto
  - tu amor leal
  lexicon: HALOT
  rationale: חֶסֶד en este contexto de pacto no es solo afecto ni mera bondad; incluye lealtad concreta y compromiso fiel. 'Fidelidad leal' intenta conservar esa tensión sin reducir el término a un tecnicismo, y evita la frialdad de una fórmula demasiado jurídica.
- source_word: מֵעִם בֵּיתִי
  english_pob_choice: from my house
  chosen_spanish: de mi casa
  alternatives_spanish:
  - de mi familia
  - de mi linaje
  - de mi casa real
  lexicon: HALOT
  rationale: '''Casa'' reproduce la compacta expresión hebrea בֵּיתִי y puede abarcar la dimensión familiar y dinástica. ''Familia'' explicita el sentido, pero pierde la resonancia de pacto y descendencia asociada a ''casa''.'
- source_word: עַד עוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  - para toda la vida
  lexicon: HALOT
  rationale: '''Para siempre'' es la equivalencia natural en español para una duración indefinida y solemne. Mantiene la fuerza del hebreo sin sonar rebuscado.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino con la forma preferida del POB en español, en lugar de sustituirlo por un título. Esto respeta la transparencia del texto fuente y su carácter propio dentro del pacto.
- source_word: אֹיְבֵי דָוִד
  english_pob_choice: David’s enemies
  chosen_spanish: los enemigos de David
  alternatives_spanish:
  - los adversarios de David
  - los que se oponen a David
  lexicon: HALOT
  rationale: La construcción posesiva del hebreo se refleja de modo directo y natural en español. 'Enemigos' preserva la oposición personal y narrativa en torno a David.
- source_word: אִישׁ
  english_pob_choice: every one of them
  chosen_spanish: a cada uno de ellos
  alternatives_spanish:
  - cada uno
  - uno por uno
  - todos individualmente
  lexicon: HALOT
  rationale: El singular distributivo requiere marcar la individualidad de la eliminación. 'A cada uno de ellos' reproduce la distribución sin hacerla sonar artificial en español.
- source_word: מֵעַל פְּנֵי הָאֲדָמָה
  english_pob_choice: from the face of the earth
  chosen_spanish: de sobre la faz de la tierra
  alternatives_spanish:
  - de sobre la superficie de la tierra
  - de la faz de la tierra
  - de la tierra
  lexicon: HALOT
  rationale: La fórmula idiomática se conserva casi por completo porque tiene peso bíblico y semántico. 'De sobre la faz de la tierra' comunica el matiz de expulsión o remoción total con dignidad literaria.
theological_decisions:
- issue: Sentido de חֶסֶד en contexto de pacto
  english_pob_reading: Render as 'steadfast love' with covenantal overtones, without narrowing it to a technical treaty term in the main text.
  chosen_spanish_reading: Traducirlo como 'fidelidad leal', conservando la mezcla de amor comprometido y lealtad de pacto, sin convertirlo en un tecnicismo jurídico.
  alternative_spanish_readings:
  - amor constante
  - lealtad de pacto
  - amor leal
  rationale: El pacto entre David y la casa de Jonathan da a חֶסֶד un peso relacional y fiel. En español, 'fidelidad leal' comunica esa obligación afectiva y pactal mejor que una sola palabra como 'bondad' o 'amabilidad', sin cerrar el rango semántico.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Relación sintáctica y teológica de la cláusula sobre Yahvé
  english_pob_reading: Jonathan asks that David's loyal love not be cut off from Jonathan's house even when the LORD eliminates David's enemies.
  chosen_spanish_reading: Jonathan pide que no se corte esa fidelidad de su casa para siempre, incluso cuando Yahvé elimine a los enemigos de David.
  alternative_spanish_readings:
  - una simple observación sobre la futura derrota de los enemigos
  - un paréntesis sin conexión fuerte con la petición
  rationale: 'La segunda cláusula intensifica la petición y no funciona bien como comentario aislado. La traducción mantiene la tensión: la fidelidad de David hacia la casa de Jonathan debe persistir aun en el momento de la victoria de David.'
  doctrine_reference: Translation philosophy §3
- issue: Valor distributivo de אִישׁ
  english_pob_reading: Use 'every one of them' rather than a gender-neutral collective.
  chosen_spanish_reading: Usar 'a cada uno de ellos' para reflejar el singular distributivo masculino sin perder naturalidad.
  alternative_spanish_readings:
  - cada uno
  - todos por igual
  - uno a uno
  rationale: El hebreo singular אחרי plural marca eliminación individual. La forma elegida conserva esa individualidad y evita diluir la referencia a los enemigos como miembros separados del grupo.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: La redacción sigue de cerca el equivalente inglés revisado que unificó la cláusula distributiva como 'every one of them' y mantiene el vínculo sintáctico entre ambas mitades del versículo. También conserva la decisión del POB de usar Yahweh/Yahvé para el nombre divino, y de reflejar כרת con un mismo verbo en ambas ocurrencias para preservar el juego verbal del hebreo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma regular para יהוה, según la terminología del proyecto.
  - '''Casa'' se usa para בֵּיתִי por su valor dinástico y familiar.'
  - La frase final conserva la imagen hebrea 'faz de la tierra' en un registro bíblico natural.
  - Se evita sustituir 'cortar' por 'eliminar' para no perder el paralelismo verbal con la primera cláusula.
  - La nota sobre חֶסֶד ofrece alternativas españolas reales porque el término abre una ambigüedad semántica y teológica significativa.
