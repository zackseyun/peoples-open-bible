lexical_decisions:
- source_word: וַיְחִי
  english_pob_choice: lived
  chosen_spanish: vivió
  alternatives_spanish:
  - vivió
  - estuvo vivo
  lexicon: HALOT
  rationale: En las fórmulas genealógicas, חיה expresa la duración de la vida antes del siguiente acontecimiento. «Vivió» conserva ese valor idiomático en español con naturalidad.
- source_word: מַהֲלַלְאֵל
  english_pob_choice: Mahalalel
  chosen_spanish: Mahalalel
  alternatives_spanish:
  - Mahalaleel
  lexicon: convención onomástica
  rationale: Los nombres propios se transliteran. «Mahalalel» es una forma estándar y clara en español.
- source_word: חָמֵשׁ שָׁנִים וְשִׁשִּׁים שָׁנָה
  english_pob_choice: sixty-five years
  chosen_spanish: sesenta y cinco años
  alternatives_spanish:
  - cinco años y sesenta años
  lexicon: HALOT
  rationale: El hebreo expresa el número de manera aditiva; en español, la forma idiomática es «sesenta y cinco años», sin alterar el valor numérico.
- source_word: וַיּוֹלֶד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - engendró
  - fue padre de
  - procreó
  lexicon: HALOT
  rationale: En genealogías, ילד señala la acción de engendrar o ser padre de. «Engendró» conserva el sentido genealógico y la fuerza verbal del hebreo con un registro bíblico natural.
- source_word: אֶת יָרֶד
  english_pob_choice: Jared
  chosen_spanish: Jared
  alternatives_spanish:
  - Yered
  lexicon: convención onomástica
  rationale: El marcador de objeto directo אֶת no se traduce. El nombre propio se mantiene como «Jared» por convención española ampliamente reconocible.
translation_notes:
