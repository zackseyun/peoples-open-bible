translation:
  language: es
  text: El sacerdote los mecerá como ofrenda mecida delante de Yahvé. Es cosa sagrada para el sacerdote, además del pecho de la ofrenda mecida y del muslo de la ofrenda de contribución[a]. Después, el nazareo podrá beber vino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «el muslo de la ofrenda alzada». El hebreo תְּרוּמָה se ha traducido tradicionalmente como «ofrenda alzada»; aquí se prefiere «ofrenda de contribución» porque comunica con más claridad en español contemporáneo la idea de una porción apartada y presentada.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵנִיף
  english_pob_choice: shall wave
  chosen_spanish: mecerá
  alternatives_spanish:
  - los ofrecerá meciéndolos
  - los alzará
  lexicon: HALOT
  rationale: En contextos sacrificiales, נוף describe el gesto ritual de mover/presentar la ofrenda. En español, «mecerá» conserva la imagen cultual y evita una paráfrasis más larga; «alzará» es posible, pero menos transparente para el rito aquí.
- source_word: אוֹתָם
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - estos
  - aquellos
  lexicon: HALOT
  rationale: El pronombre retoma las porciones del versículo anterior. «Los» es la referencia anafórica natural en español y mantiene la conexión textual.
- source_word: תְּנוּפָה
  english_pob_choice: as a wave offering
  chosen_spanish: como ofrenda mecida
  alternatives_spanish:
  - como ofrenda movida
  - como ofrenda de mecimiento
  lexicon: HALOT
  rationale: El sustantivo técnico תְּנוּפָה se expresa con un equivalente cultual claro. «Ofrenda mecida» conserva el valor ritual sin introducir el término tradicional opaco «ofrenda mecida» como mero calco; aquí funciona como nombre técnico legible.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé» según la terminología POB. «Delante de» reproduce la fórmula cultual con naturalidad en español.
- source_word: קֹדֶשׁ הוּא לַכֹּהֵן
  english_pob_choice: It is holy for the priest
  chosen_spanish: Es cosa sagrada para el sacerdote
  alternatives_spanish:
  - Es santo para el sacerdote
  - Pertenece como porción sagrada al sacerdote
  lexicon: HALOT
  rationale: El hebreo usa una construcción nominal singular. «Cosa sagrada» refleja el valor consagrado del don sin forzar una lectura personal; «santo» sería posible, pero menos idiomático en esta formulación distributiva.
- source_word: עַל
  english_pob_choice: besides
  chosen_spanish: además de
  alternatives_spanish:
  - aparte de
  - junto con
  lexicon: HALOT
  rationale: En esta fórmula legal, עַל expresa adición a las porciones ya asignadas. «Además de» comunica ese sentido con precisión y conserva el valor aditivo que el inglés POB resolvió como «besides».
- source_word: חֲזֵה הַתְּנוּפָה
  english_pob_choice: the breast of the wave offering
  chosen_spanish: el pecho de la ofrenda mecida
  alternatives_spanish:
  - el pecho de la ofrenda movida
  - el pecho mecido
  lexicon: HALOT
  rationale: חֲזֶה designa la porción anatómica del pecho, y la construcción con תְּנוּפָה mantiene el nombre técnico de la ofrenda. «Pecho» es claro en español bíblico contemporáneo.
- source_word: שׁוֹק הַתְּרוּמָה
  english_pob_choice: the thigh of the contribution offering
  chosen_spanish: la pierna de la ofrenda alzada
  alternatives_spanish:
  - la pierna de la ofrenda de contribución
  - el muslo de la ofrenda alzada
  lexicon: HALOT
  rationale: שׁוֹק puede referir la parte inferior de la pata o pierna; en español, «pierna» resulta más claro y no pierde el carácter de porción sacrificial. תְּרוּמָה se traduce con «ofrenda alzada» para conservar el paralelo técnico con la terminología cultual del hebreo, sin depender del término tradicional «ofrenda movida/heave offering».
- source_word: וְאַחַר
  english_pob_choice: Afterward
  chosen_spanish: Después
  alternatives_spanish:
  - Y después
  - Más tarde
  lexicon: HALOT
  rationale: Marca secuencia temporal inmediata. «Después» es breve, natural y fiel al valor del conector.
- source_word: יִשְׁתֶּה
  english_pob_choice: may drink
  chosen_spanish: podrá beber
  alternatives_spanish:
  - podrá tomar
  - beberá
  lexicon: HALOT
  rationale: El contexto no manda beber, sino restablece la अनुमति/permiso tras concluir el voto nazareo. «Podrá beber» expresa permiso, como en el inglés POB «may drink».
- source_word: הַנָּזִיר
  english_pob_choice: the Nazirite
  chosen_spanish: el nazareo
  alternatives_spanish:
  - el nazareo consagrado
  - el nazareo del voto
  lexicon: HALOT
  rationale: «Nazareo» es el equivalente bíblico habitual en español para נָזִיר y evita una dependencia innecesaria del inglés. Mantiene el término técnico del voto.
- source_word: יַיִן
  english_pob_choice: wine
  chosen_spanish: vino
  alternatives_spanish:
  - vino fermentado
  lexicon: HALOT
  rationale: Equivalente léxico directo y transparente.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  rationale: La política española del proyecto establece «Yahvé» para יהוה. Se evita la sustitución devocional por «SEÑOR» para preservar el nombre del pacto y la trazabilidad textual.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
- issue: Sentido legal de יִשְׁתֶּה en el cierre
  english_pob_reading: may drink wine
  chosen_spanish_reading: podrá beber vino
  alternative_spanish_readings:
  - beberá vino
  - puede beber vino
  rationale: El contexto de Números 6 trata la conclusión del voto nazareo y la restitución de derechos. «Podrá beber» comunica permiso, no obligación, y conserva la fuerza jurídica del hebreo.
  doctrine_reference: Numbers 6 Nazirite vow legislation
translation_notes:
  revision_awareness: El audio de revisión inglés corrigió la fórmula de עַל de «in addition to» a «besides» por naturalidad. En español se reflejó con «además de», que preserva el sentido aditivo legal sin cargarlo con una lectura espacial. También se mantuvo la decisión revisada de expresar el último verbo como permiso (podrá beber), no como mandato.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה conforme al estándar del proyecto.
  - 'Se usa terminología cultual consistente: «ofrenda mecida» para תְּנוּפָה y «ofrenda alzada» para תְּרוּמָה.'
  - «Nazareo» se emplea de forma uniforme para נָזִיר en lenguaje bíblico español.
  - El tono es formal y publicable, sin recurrir a giros arcaizantes innecesarios.
