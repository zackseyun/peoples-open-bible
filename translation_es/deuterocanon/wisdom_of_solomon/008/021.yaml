translation:
  language: es
  text: 'Pero, sabiendo que de otra manera no tendría dominio propio[a] si Dios no me lo diera, y que también esto era discernimiento[b]: conocer de quién era el don[c], recurrí al Señor y le supliqué, y dije con todo mi corazón:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sería dueño de sí». El griego ἐγκρατής puede expresar autocontrol, dominio de sí o continencia; aquí se ha optado por «dominio propio» por su claridad y fuerza ética en español.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «entendimiento» o «prudencia». El griego φρόνησις abarca discernimiento, entendimiento práctico y prudencia.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «de quién era la gracia». El griego χάρις puede significar «gracia», «favor» o «don»; aquí se refiere a la fuente divina del dominio propio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: γνοὺς
  english_pob_choice: knowing
  chosen_spanish: sabiendo
  alternatives_spanish:
  - habiendo sabido
  - reconociendo
  lexicon: BDAG
  rationale: El participio aoristo introduce la toma de conciencia del hablante. «Sabiendo» conserva el valor cognitivo y suena natural en español.
- source_word: οὐκ ἄλλως
  english_pob_choice: not otherwise
  chosen_spanish: de otra manera
  alternatives_spanish:
  - en ninguna otra forma
  - de otro modo
  lexicon: BDAG
  rationale: La frase marca exclusividad causal; «de otra manera» transmite bien que la autocontención no ocurriría por otra vía.
- source_word: ἔσομαι ἐγκρατής
  english_pob_choice: I would be self-controlled
  chosen_spanish: sería dueño de mí mismo
  alternatives_spanish:
  - sería autocontrolado
  - tendría dominio propio
  lexicon: BDAG
  rationale: ἐγκρατής expresa dominio de sí. «Dueño de mí mismo» comunica la fuerza idiomática en español sin perder el sentido ético de autocontrol.
- source_word: ἐὰν μὴ ὁ θεὸς δῷ
  english_pob_choice: unless God gave it
  chosen_spanish: si no me lo diera Dios
  alternatives_spanish:
  - a menos que Dios lo diera
  - si Dios no me lo concediera
  lexicon: BDAG
  rationale: El contexto implica un objeto directo tácito para el don de autocontrol. «Me lo diera Dios» hace explícita esa idea sin añadir contenido ajeno.
- source_word: καὶ τοῦτο δὲ ἦν φρονήσεως
  english_pob_choice: and that this also was insight
  chosen_spanish: y que también esto era prudencia
  alternatives_spanish:
  - y que también esto era discernimiento
  - y que también esto era entendimiento
  lexicon: BDAG
  rationale: φρόνησις puede abarcar prudencia, discernimiento o sabiduría práctica. Aquí «prudencia» conserva el valor de juicio recto y práctico; la nota explica la amplitud semántica.
- source_word: τὸ εἰδέναι τίνος ἡ χάρις
  english_pob_choice: to know whose gift it was
  chosen_spanish: conocer de quién era el don
  alternatives_spanish:
  - saber de quién era la gracia
  - saber de quién procedía el favor
  lexicon: BDAG
  rationale: χάρις en este contexto apunta al beneficio concedido por Dios; «don» preserva el origen divino concreto sin cargar de antemano un sentido técnico de «gracia».
- source_word: ἐνέτυχον τῷ κυρίῳ
  english_pob_choice: I appealed to the Lord
  chosen_spanish: me dirigí al Señor
  alternatives_spanish:
  - recurrí al Señor
  - intercedí ante el Señor
  lexicon: BDAG
  rationale: ἐντυγχάνω en contexto de oración expresa acercarse con petición. «Me dirigí al Señor» es sobrio y natural; «Señor» sigue el equivalente establecido para κύριος.
- source_word: ἐδεήθην αὐτοῦ
  english_pob_choice: implored him
  chosen_spanish: le supliqué
  alternatives_spanish:
  - le rogué
  - le imploré
  lexicon: BDAG
  rationale: δέομαι denota súplica intensa. «Le supliqué» preserva la intensidad con un verbo idiomático y reverente en español.
- source_word: ἐξ ὅλης τῆς καρδίας μου
  english_pob_choice: with my whole heart
  chosen_spanish: con todo mi corazón
  alternatives_spanish:
  - desde todo mi corazón
  - con mi corazón entero
  lexicon: BDAG
  rationale: Expresión bíblica estable de sinceridad total. «Con todo mi corazón» es la forma más natural y fiel en español.
theological_decisions:
- issue: Cómo rendir χάρις en un contexto de virtud concedida por Dios
  english_pob_reading: gift
  chosen_spanish_reading: don
  alternative_spanish_readings:
  - gracia
  - favor
  rationale: Aquí el punto no es una categoría doctrinal abstracta sino el origen divino de la virtud. «Don» comunica con claridad que la autocontención es algo concedido; se evita diluir el matiz concreto o cargar el término con un uso técnico posterior.
  doctrine_reference: Wisdom literature context; lexical/theological tension around χάρις as bestowed benefit
- issue: Cómo expresar ἐγκρατής sin perder fuerza semántica
  english_pob_reading: self-controlled
  chosen_spanish_reading: dueño de mí mismo
  alternative_spanish_readings:
  - con dominio propio
  - autocontrolado
  rationale: El griego habla de dominio sobre los deseos. La opción elegida suena idiomática en español y conserva la idea de gobierno interior, sin reducirla a una mera cualidad psicológica.
  doctrine_reference: BDAG, ἐγκρατής; ethical virtue language in Wisdom
- issue: Cómo traducir κύριος en la oración del texto
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Dueño
  - Maestro
  rationale: El contexto de súplica exige la forma reverente habitual. No se usa «Yahvé» aquí porque el texto griego presenta κύριος en una fórmula de oración, y el equivalente español auditado del proyecto para κύριος en este tipo de contexto es «Señor».
  doctrine_reference: DOCTRINE.md contested terms table; prayer-context κύριος
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca explícitamente en el texto de traducción. No se añadieron notas sin anclaje; el texto mantiene la decisión léxica central sobre ἐγκρατής y la glosa alternativa queda vinculada al mismo marcador.
  spanish_consistency_notes:
  - «Señor» se mantiene para κύριος, conforme al contexto de oración y al auditable default del proyecto.
  - «Don» en vez de «gracia» refleja la lectura contextual de χάρις como beneficio concedido, sin negar la posible amplitud semántica.
  - La puntuación con dos puntos al final prepara la continuación del discurso, siguiendo el ritmo del original griego.
