    issue: «forasteros» para παρῴκησαν
    rationale: Aunque comunica extrañeza, «forastero» en español puede sugerir simplemente alguien de fuera, no necesariamente residente extranjero/temporal. «Extranjeros» o «residentes extranjeros» representa mejor el matiz del verbo griego y la auditoría inglesa.
  - severity: low
    issue: Nota [a] usa «sojornaron»
    rationale: Es un préstamo poco natural en español general y no mejora la inteligibilidad. La nota puede expresar la alternativa sin recurrir a una forma rara.
  - severity: low
    issue: «caldeos» en minúscula
    rationale: En español bíblico y general es preferible «Caldeos» como etnónimo/topónimo derivado en este contexto.
  - severity: low
    issue: Tono de la nota [b]
    rationale: La frase «con menos naturalidad» introduce una valoración innecesaria; basta presentar las alternativas interpretativas documentadas.
  revised_spanish_text: Y antiguamente vivieron como extranjeros[a] en Mesopotamia, porque no quisieron seguir a los dioses de sus padres[b], que estaban en la tierra de los Caldeos.
