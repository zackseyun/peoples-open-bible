translation:
  language: es
  text: Entonces él regresó y caminó por la casa[a], una vez por aquí y una vez por allá; luego subió y se tendió sobre él[b], y el muchacho estornudó siete veces, y el muchacho abrió los ojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de aquí para allá» / «de un lado a otro». El hebreo dice literalmente «una vez aquí y una vez allá».
    reason: lexical_alternative
  - marker: b
    text: O «se inclinó sobre él». El verbo hebreo puede denotar doblarse o inclinarse sobre alguien.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב
  english_pob_choice: Then he returned
  chosen_spanish: Entonces él regresó
  alternatives_spanish:
  - Y regresó
  - Luego volvió
  lexicon: HALOT
  rationale: שׁוּב en esta secuencia narrativa expresa el retorno de una acción anterior. «Regresó» conserva el avance temporal del wayyiqtol en un español natural, con «Entonces» para reflejar la continuidad narrativa.
- source_word: וַיֵּלֶךְ בַּבַּיִת
  english_pob_choice: walked in the house
  chosen_spanish: caminó por la casa
  alternatives_spanish:
  - anduvo por la casa
  - fue de un lado a otro en la casa
  lexicon: HALOT
  rationale: הלך con complemento locativo indica movimiento dentro del espacio. «Caminó por la casa» es claro y no fuerza una interpretación más específica como «paseó» o «anduvo de un lado a otro».
- source_word: אַחַת הֵנָּה וְאַחַת הֵנָּה
  english_pob_choice: once here and once there
  chosen_spanish: una vez por aquí y una vez por allá
  alternatives_spanish:
  - de aquí para allá
  - de un lado a otro
  lexicon: HALOT
  rationale: La expresión hebrea conserva la repetición espacial concreta. «Una vez por aquí y una vez por allá» mantiene el paralelismo y la imaginería del original mejor que una simplificación idiomática.
- source_word: וַיַּעַל
  english_pob_choice: then he went up
  chosen_spanish: luego subió
  alternatives_spanish:
  - y subió
  - entonces subió
  lexicon: HALOT
  rationale: עלה probablemente alude a subir al aposento alto o al lugar donde estaba el niño. «Subió» preserva el sentido espacial sin añadir detalles no explícitos.
- source_word: וַיִּגְהַר עָלָיו
  english_pob_choice: stretched himself over him
  chosen_spanish: se tendió sobre él
  alternatives_spanish:
  - se inclinó sobre él
  - se echó sobre él
  lexicon: HALOT
  rationale: גהר puede denotar inclinarse o doblarse sobre alguien. «Se tendió sobre él» refleja la acción corporal de manera natural en español y evita cargar el gesto con una interpretación mecánica o ritual.
- source_word: וַיְזוֹרֵר
  english_pob_choice: sneezed
  chosen_spanish: estornudó
  alternatives_spanish:
  - dio un estornudo
  lexicon: HALOT
  rationale: El verbo raro se entiende lexicalmente como «estornudar». «Estornudó» es el equivalente directo y natural en español.
- source_word: הַנַּעַר
  english_pob_choice: the boy
  chosen_spanish: el muchacho
  alternatives_spanish:
  - el niño
  - el joven
  lexicon: HALOT
  rationale: נַעַר puede ser niño, muchacho o joven según el contexto. Aquí refiere al hijo de la sunamita; «muchacho» suena natural y conserva la referencia juvenil sin exagerar la edad.
- source_word: עַד שֶׁבַע פְּעָמִים
  english_pob_choice: seven times
  chosen_spanish: siete veces
  alternatives_spanish:
  - hasta siete veces
  lexicon: HALOT
  rationale: En esta construcción con número de ocurrencias, עַד expresa el total alcanzado. «Siete veces» comunica adecuadamente el resultado completo.
- source_word: וַיִּפְקַח ... אֶת עֵינָיו
  english_pob_choice: opened his eyes
  chosen_spanish: abrió los ojos
  alternatives_spanish:
  - abrió sus ojos
  lexicon: HALOT
  rationale: פקח עיניים es el giro habitual para «abrir los ojos». El español simple es idiomático y fiel al hebreo.
theological_decisions:
- issue: Descripción de la acción física de Eliseo sobre el niño
  english_pob_reading: Render the physical action descriptively without implying a sacramental or magical mechanism.
  chosen_spanish_reading: Describir la acción corporal sin sugerir un mecanismo sacramental o mágico.
  alternative_spanish_readings:
  - Se inclinó sobre él
  - Se echó sobre él
  rationale: El hebreo narra el gesto de Eliseo como parte del milagro, pero no explica cómo opera. «Se tendió sobre él» conserva la tensión narrativa y evita resolver interpretativamente el medio del prodigio.
  doctrine_reference: Preservar la tensión teológica del relato sin añadir explicaciones ajenas al texto.
translation_notes:
  revision_awareness: 'El texto sigue el estado auditado de la fuente inglesa: no hubo revisiones posteriores que alteraran la decisión sobre el movimiento en la casa, la acción corporal de Eliseo ni el verbo raro para «estornudó».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el pasaje lo requiera; aquí no aparece el nombre divino.
  - Se usa «muchacho» para נַעַר siguiendo el contexto narrativo del hijo de la sunamita.
  - Se evita «Cristo», «siervo» o terminología tradicional no motivada por el hebreo de este versículo.
  - La nota a conserva la alternativa espacial preservada en el audit trail inglés; la nota b preserva la ambigüedad corporal de גהר.
