id: LAM.2.2
reference: Lamentations 2:2
source:
  edition: WLC
  text: בִּלַּ֨ע אֲדֹנָ֜/י לא חָמַ֗ל אֵ֚ת כָּל נְא֣וֹת יַעֲקֹ֔ב הָרַ֧ס בְּ/עֶבְרָת֛/וֹ מִבְצְרֵ֥י בַת יְהוּדָ֖ה הִגִּ֣יעַ לָ/אָ֑רֶץ חִלֵּ֥ל מַמְלָכָ֖ה וְ/שָׂרֶֽי/הָ־־׃ס
translation:
  text: The Lord has swallowed up[a], without pity, all the pastures of Jacob; in his wrath he has torn down the strongholds of daughter Judah; he has brought them down to the ground[c][b]; he has defiled the kingdom and its princes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the dwellings of Jacob' or 'the habitations of Jacob.' The Hebrew term can refer to pastures or dwelling places.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'daughter Judah,' a poetic personification of Judah.
    reason: cultural_note
  - marker: c
    text: Or 'has profaned the kingdom and its princes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּלַּע
  chosen: has swallowed up
  alternatives:
  - has engulfed
  - has consumed
  lexicon: HALOT
  rationale: The verb literally denotes swallowing/devouring. 'Has swallowed up' preserves the vivid metaphor and matches the lament's force better than a flatter 'destroyed.' Perfect aspect is rendered idiomatically in English with present perfect in this poetic context.
- source_word: אֲדֹנָי
  chosen: The Lord
  alternatives:
  - Lord
  lexicon: HALOT
  rationale: This is the divine title Adonai, not the Tetragrammaton. Per doctrine, titles are translated; 'The Lord' is the natural English rendering here.
- source_word: לֹא חָמַל
  chosen: without pity
  alternatives:
  - did not spare
  - had no compassion
  lexicon: HALOT
  rationale: The idiom expresses lack of compassion or sparing. 'Without pity' is concise, natural in English poetry, and preserves the emotional severity.
- source_word: נְאוֹת יַעֲקֹב
  chosen: the pastures of Jacob
  alternatives:
  - the habitations of Jacob
  - the dwellings of Jacob
  lexicon: HALOT
  rationale: נְאוֹת can denote pastures, grazing places, or pleasant dwelling places. In Lamentations' poetic register, 'pastures' preserves the concrete imagery and vulnerability of Jacob's settled places. Because 'habitations/dwellings' is also plausible, the alternative is preserved in a footnote.
- source_word: הָרַס
  chosen: has torn down
  alternatives:
  - has destroyed
  - has broken down
  lexicon: HALOT
  rationale: The verb means to tear down/demolish. 'Has torn down' keeps the image of dismantling fortifications more vividly than the generic 'destroyed.'
- source_word: בְּעֶבְרָתוֹ
  chosen: in his wrath
  alternatives:
  - in his fury
  - in his overflowing anger
  lexicon: HALOT
  rationale: עֶבְרָה denotes wrath/fury, often intense anger. 'In his wrath' is idiomatic, weighty, and readable.
- source_word: מִבְצְרֵי
  chosen: the strongholds
  alternatives:
  - the fortresses
  - the fortified places
  lexicon: HALOT
  rationale: The noun refers to fortified places. 'Strongholds' is concise and natural in English biblical style while preserving military sense.
- source_word: בַת יְהוּדָה
  chosen: daughter Judah
  alternatives:
  - the daughter of Judah
  lexicon: HALOT
  rationale: The construct phrase is a poetic personification of the people/city. 'Daughter Judah' preserves the Hebrew poetic form more directly than the more interpretive 'the daughter of Judah.'
- source_word: הִגִּיעַ לָאָרֶץ
  chosen: has brought them down to the ground
  alternatives:
  - has cast them to the ground
  - has made them reach the earth
  lexicon: HALOT
  rationale: The causative verb with 'to the earth/ground' conveys bringing the strongholds down to the ground. English requires an object; 'them' refers back to the strongholds. 'To the ground' is more idiomatic than 'to the earth' in this demolition context.
- source_word: חִלֵּל
  chosen: has defiled
  alternatives:
  - has profaned
  - has dishonored
  lexicon: HALOT
  rationale: The piel of חלל commonly means to profane/defile. 'Defiled' communicates desecration in accessible modern English; 'profaned' remains a viable alternative with slightly more cultic nuance.
- source_word: מַמְלָכָה
  chosen: the kingdom
  alternatives:
  - royalty
  - the kingship
  lexicon: HALOT
  rationale: The noun most naturally denotes the kingdom or realm here, not merely the abstract institution of kingship. The parallel with 'its princes' supports a political entity.
- source_word: וְשָׂרֶיהָ
  chosen: and its princes
  alternatives:
  - and its rulers
  - and its officials
  lexicon: HALOT
  rationale: שׂרים are princes, rulers, or officials. 'Princes' preserves the elevated political register and traditional sense in a monarchical context.
