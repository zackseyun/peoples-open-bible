translation:
  language: es
  text: Y Judá fue derrotado ante Israel, y cada hombre huyó a su tienda[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «cada hombre a su tienda»; modismo que indica dispersión y retirada a la propia morada o campamento.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּנָּגֶף
  english_pob_choice: was defeated
  chosen_spanish: fue derrotado
  alternatives_spanish:
  - fue abatido
  - fue vencido
  - fue golpeado
  lexicon: HALOT
  rationale: El nifal de נָגַף en este contexto bélico expresa que Judá sufrió derrota militar. «Fue derrotado» comunica con claridad la pérdida en combate y conserva la fuerza pasiva/resultativa del hebreo.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judah
  lexicon: nombre propio bíblico
  rationale: Es el nombre propio del reino del sur; en español bíblico estándar se usa «Judá».
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: HALOT
  rationale: «Delante de» conserva la imagen espacial del hebreo y funciona de manera natural en español para indicar derrota ante un enemigo.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - Israel
  lexicon: nombre propio bíblico
  rationale: Nombre propio del reino del norte; se mantiene sin cambio.
- source_word: וַיָּנֻסוּ
  english_pob_choice: fled
  chosen_spanish: huyó
  alternatives_spanish:
  - fueron huyendo
  - escapó
  lexicon: HALOT
  rationale: El verbo נוּס significa huir. En español, el singular distributivo del contexto se expresa naturalmente con «cada hombre huyó».
- source_word: אִישׁ
  english_pob_choice: each man
  chosen_spanish: cada hombre
  alternatives_spanish:
  - cada uno
  - cada persona
  lexicon: HALOT
  rationale: La construcción distributiva pide un equivalente que mantenga el matiz individual y masculino del contexto militar. «Cada hombre» es directo y fiel.
- source_word: לְאֹהָלָיו
  english_pob_choice: to his tent
  chosen_spanish: a su tienda
  alternatives_spanish:
  - a su propia tienda
  - a su casa
  lexicon: HALOT
  rationale: El hebreo usa un modismo de dispersión, literalmente «a sus tiendas». En español, «a su tienda» conserva la imagen idiomática sin sonar forzado.
translation_notes:
  revision_awareness: Se siguió el texto hebreo WLC y el audit trail inglés sin cambios sustantivos. La única decisión relevante de estilo fue mantener el modismo de «la tienda» en una forma española natural, conservando la imagen hebrea y el sentido de dispersión militar.
  spanish_consistency_notes:
  - Se mantuvo «Judá» e «Israel» como nombres propios bíblicos estándar.
  - Se tradujo el verbo de derrota con un pasivo claro en español («fue derrotado») para reflejar el nifal hebreo.
  - Se preservó el modismo de dispersión en la nota para no perder la imagen de «cada hombre a su tienda».
