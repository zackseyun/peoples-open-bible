translation:
  language: es
  text: Construyó Tadmor en el desierto[a], y todas las ciudades de depósitos que construyó en Hamat.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Tadmor se identifica tradicionalmente con Palmira.
    reason: cross_reference
lexical_decisions:
- source_word: וַיִּבֶן
  english_pob_choice: He built
  chosen_spanish: Construyó
  alternatives_spanish:
  - Entonces construyó
  - Y construyó
  lexicon: HALOT
  rationale: El wayyiqtol de בנה expresa una acción pasada en secuencia. En español, el pretérito simple «construyó» fluye con naturalidad y conserva el valor narrativo sin añadir una conjunción innecesaria en el cuerpo principal.
- source_word: תַּדְמֹר
  english_pob_choice: Tadmor
  chosen_spanish: Tadmor
  alternatives_spanish:
  - Palmira
  lexicon: HALOT
  rationale: Es un nombre propio de lugar; por fidelidad al texto fuente y al criterio de transliteración, se mantiene «Tadmor». «Palmira» es una forma histórica posterior y no sustituye el nombre del texto.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto salvaje
  - en la estepa
  lexicon: HALOT
  rationale: En español bíblico moderno, «desierto» comunica bien el terreno árido. Aunque «wilderness» puede abarcar más que un desierto arenoso, aquí «en el desierto» conserva la referencia geográfica de modo claro y natural.
- source_word: כָּל עָרֵי הַמִּסְכְּנוֹת
  english_pob_choice: all the storage cities
  chosen_spanish: todas las ciudades de almacenamiento
  alternatives_spanish:
  - todas las ciudades de depósitos
  - todas las ciudades de provisiones
  - todas las ciudades del tesoro
  lexicon: HALOT
  rationale: La expresión denota ciudades destinadas al almacenamiento o aprovisionamiento. «Ciudades de almacenamiento» preserva esa función administrativa sin cargar el término con el matiz más específico de «tesoro», que no está exigido por el hebreo.
- source_word: אֲשֶׁר בָּנָה
  english_pob_choice: that he built
  chosen_spanish: que construyó
  alternatives_spanish:
  - que él construyó
  - las cuales construyó
  lexicon: HALOT
  rationale: La cláusula relativa retoma «las ciudades de almacenamiento» y en español puede expresarse de forma directa con «que construyó». Mantiene la relación sintáctica sin sobreexplicitar el sujeto.
- source_word: בַּחֲמָת
  english_pob_choice: in Hamath
  chosen_spanish: en Hamat
  alternatives_spanish:
  - en Jamat
  - en la región de Hamat
  lexicon: HALOT
  rationale: Se conserva el topónimo en transliteración española «Hamat», alineado con la práctica de nombres propios. La preposición «en» refleja adecuadamente el valor locativo del hebreo ב en este contexto.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el acuerdo alto del texto inglés auditado y conserva la misma estructura informativa: la acción de construir, el topónimo Tadmor, la localización en el desierto y la mención de las ciudades de almacenamiento en Hamat. No se detectan revisiones textuales posteriores que alteren el contenido base.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» u otros sustitutos porque no hay aquí un nombre divino.
  - «Hamat» se mantiene como topónimo transliterado de forma consistente con «Tadmor».
  - «Ciudades de almacenamiento» refleja el valor funcional del constructo hebreo sin introducir una interpretación más estrecha que «tesoro».
  - La nota al pie conserva la identificación tradicional de Tadmor con Palmira, como en el audit trail inglés.
