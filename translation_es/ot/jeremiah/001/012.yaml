translation:
  language: es
  text: 'Entonces Yahvé me dijo[a]: «Has visto bien[b], porque yo estoy vigilando mi palabra para cumplirla[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo hace un juego de palabras entre la rama de almendro del versículo anterior (שָׁקֵד, shaqed) y ‘vigilando’ aquí (שֹׁקֵד, shoqed).
    reason: lexical_alternative
  - marker: b
    text: 'O: «Has visto correctamente» o «Has visto con acierto».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «para realizarla» o «para llevarla a cabo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: El hebreo usa el Tetragrámaton directamente. En español se sigue el criterio del proyecto de conservar el nombre divino en forma transliterada; ‘Yahvé’ es el equivalente establecido para preservar el nombre personal de Dios, no sustituirlo por un título.
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Y dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración. ‘Entonces’ comunica con naturalidad esa secuencia en español y conserva el valor narrativo del hebreo.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  - para mí
  lexicon: HALOT
  rationale: En español, con ‘dijo’ el complemento indirecto se expresa de manera natural como ‘me’. Mantiene el mismo sentido relacional del hebreo sin recargar la frase.
- source_word: הֵיטַבְתָּ לִרְאוֹת
  english_pob_choice: You have seen well
  chosen_spanish: Bien has visto
  alternatives_spanish:
  - Has visto bien
  - Has visto correctamente
  - Has visto rectamente
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y conserva la relación verbal ‘hacer bien + ver’. ‘Bien has visto’ retiene mejor la forma y deja abierta la resonancia con el juego de palabras del contexto inmediato.
- source_word: שֹׁקֵד
  english_pob_choice: watching over
  chosen_spanish: vigilando
  alternatives_spanish:
  - velando sobre
  - estando alerta sobre
  - vigilante sobre
  lexicon: HALOT
  rationale: El participio comunica vigilancia despierta. ‘Vigilando’ es un equivalente natural y digno en español; conserva la idea de atención activa sin convertirla en una paráfrasis como ‘cumplir mi promesa’.
- source_word: דְּבָרִי
  english_pob_choice: my word
  chosen_spanish: mi palabra
  alternatives_spanish:
  - mi palabra dada
  - mi mensaje
  - mi promesa
  lexicon: HALOT
  rationale: El singular con sufijo exige ‘mi palabra’. Se mantiene el alcance amplio de dābār en contexto profético, sin reducirlo prematuramente a ‘promesa’.
- source_word: לַעֲשֹׂתוֹ
  english_pob_choice: to perform it
  chosen_spanish: para cumplirla
  alternatives_spanish:
  - para realizarla
  - para llevarla a cabo
  - para ejecutarla
  lexicon: HALOT
  rationale: 'La forma infinitiva expresa finalidad: Yahvé vigila su palabra para llevarla a efecto. En español, ‘cumplirla’ comunica bien la ejecución de lo dicho y suena natural en registro bíblico contemporáneo. El femenino concuerda con ‘palabra’.'
theological_decisions:
- issue: Cómo renderizar el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se mantiene el principio doctrinal del proyecto de no ocultar el nombre del pacto. ‘Yahvé’ es la forma española estándar para el Tetragrámaton en este marco, evitando la sustitución litúrgica por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de דָּבָר en el contexto profético
  english_pob_reading: my word
  chosen_spanish_reading: mi palabra
  alternative_spanish_readings:
  - mi promesa
  - mi mensaje
  rationale: ‘Palabra’ conserva la amplitud semántica del hebreo y no fuerza la frase a significar exclusivamente ‘promesa’. Esto respeta la tensión interpretativa documentada en el audit trail.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
- issue: Relación entre ‘vigilar’ y ‘cumplir’
  english_pob_reading: I am watching over my word to perform it
  chosen_spanish_reading: estoy vigilando mi palabra para cumplirla
  alternative_spanish_readings:
  - estoy velando por mi palabra para realizarla
  - estoy atento a mi palabra para llevarla a cabo
  rationale: 'La traducción mantiene la doble idea: vigilancia activa y ejecución efectiva. ‘Vigilando’ refleja שֹׁקֵד; ‘cumplirla’ comunica el resultado final sin desdibujar la imagen verbal del hebreo.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'El texto español sigue el estado revisado más reciente del audit trail: se mantiene la lectura final centrada en ‘watching over ... to perform it’, pero se adapta al español con ‘vigilando ... para cumplirla’, conservando la vigilia activa y la finalidad efectiva. La nota del juego de palabras se preserva porque el inglés POB la documenta explícitamente y el hebreo la sustenta.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de forma consistente con el criterio del proyecto para יְהוָה.
  - Se mantiene ‘mi palabra’ en singular, concordando con el sufijo y con la decisión auditada de no estrechar el sentido a ‘promesa’.
  - ‘Cumplirla’ se eligió por naturalidad y fuerza final; la nota conserva las alternativas ‘realizarla’ y ‘llevarla a cabo’.
  - El femenino de ‘la’ en ‘cumplirla’ concuerda con ‘palabra’.
  - La puntuación reproduce el discurso directo con comillas españolas y dos puntos, en estilo publicable.
