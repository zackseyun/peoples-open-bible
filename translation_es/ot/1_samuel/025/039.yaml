base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/025/039.yaml
  text: When David heard that Nabal was dead[a], he said, “Blessed be Yahweh, who has pleaded the case of my reproach from the hand of Nabal, and has kept his servant back from evil. Yahweh has returned Nabal’s evil on his own head.” Then David sent and spoke to Abigail[e][d][c][b], to take her as his wife.
  footnotes:
  - marker: a
    text: 'Or “has avenged my insult” or “has contended for the cause of my disgrace.” The Hebrew uses legal-contest language: “has pleaded the case of my reproach.”'
    reason: lexical_alternative
  - marker: b
    text: Or “has restrained his servant from doing harm.”
    reason: lexical_alternative
  - marker: c
    text: Hebrew “has returned Nabal’s evil on his head,” an idiom for recompense falling back on the wrongdoer.
    reason: cultural_note
  - marker: d
    text: Or “to take her for himself as a wife”; that is, to marry her.
    reason: lexical_alternative
  - marker: e
    text: Or 'sent word and spoke to Abigail'.
    reason: previous_rendering
