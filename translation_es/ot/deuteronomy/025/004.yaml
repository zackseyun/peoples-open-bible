translation:
  language: es
  text: No le pondrás bozal[a] a un buey mientras trilla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “cuando trilla el grano”. El hebreo dice más literalmente: “en su trilla”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא
  english_pob_choice: not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No pondrás
  - No deberás poner
  lexicon: HALOT
  rationale: La partícula de negación introduce una prohibición; en español legal/mandato, 'No pondrás' comunica bien el valor jussivo sin perder claridad.
- source_word: תַחְסֹ֥ם
  english_pob_choice: you shall muzzle
  chosen_spanish: pondrás bozal
  alternatives_spanish:
  - embozarás
  - cerrarás el hocico de
  lexicon: HALOT
  rationale: El verbo hebreo significa poner un bozal o cerrar la boca del animal. 'Pondrás bozal' es natural en español y conserva la imagen concreta de impedir al animal comer mientras trabaja.
- source_word: שׁ֖וֹר
  english_pob_choice: ox
  chosen_spanish: buey
  alternatives_spanish:
  - ox
  - novillo
  - ganado
  lexicon: HALOT
  rationale: En contexto agrícola, 'buey' comunica de forma idiomática en español el animal de tiro usado para trillar. Mantiene la referencia a un bovino de labor, equivalente funcional de 'ox'.
- source_word: בְּדִישׁוֹ
  english_pob_choice: while it is threshing
  chosen_spanish: mientras trilla
  alternatives_spanish:
  - en su trilla
  - cuando trilla el grano
  - mientras pisa el grano
  lexicon: HALOT
  rationale: La expresión hebrea literalmente dice 'en su trillar'. 'Mientras trilla' preserva el sentido temporal y el acto de trillar sin introducir una paráfrasis más específica que el hebreo.
translation_notes:
  revision_awareness: 'El texto inglés POB traduce el hebreo de forma óptima-equivalente: ''You shall not muzzle an ox while it is threshing[a].'' La nota alternativa preserva la literalidad subyacente (''in its threshing'') y la posible especificación interpretativa (''when it treads out grain''). La versión española sigue el mismo equilibrio: mantiene la prohibición directa y la escena agrícola, con una nota que conserva la alternativa literal del hebreo sin desplazar el sentido principal.'
  spanish_consistency_notes:
  - Se usó 'buey' para un español bíblico claro y natural en el contexto de trabajo agrícola; corresponde al valor contextual de שׁוֹר.
  - Se prefirió 'pondrás bozal' para mantener la fuerza concreta de חסם sin volver la frase pesada.
  - Se evitó 'SEÑOR' u otra terminología no pertinente, porque no aparece un tetragrámaton ni un nombre divino en este versículo.
  - La estructura 'mientras trilla' refleja el valor temporal del hebreo y la solución inglesa auditada, sin añadir 'grano' en el texto principal.
