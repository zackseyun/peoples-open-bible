translation:
  language: es
  text: entonces yo mismo pondré mi rostro contra ese hombre y contra su familia, y lo cortaré a él y a todos los que se prostituyen tras él[a], prostituyéndose tras Moloc, de entre su gente[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'se prostituyen en pos de él'. El hebreo usa el verbo de infidelidad sexual de manera metafórica para la apostasía idolátrica.
    reason: lexical_alternative
  - marker: b
    text: '''Cortar'' o ''extirpar'' es una expresión de juicio de pacto; el texto no especifica aquí si esta remoción ocurre por muerte, expulsión u otra forma de acción divina.'
    reason: theological_note
lexical_decisions:
- source_word: וְשַׂמְתִּי אֲנִי אֶת־פָּנַי
  english_pob_choice: then I myself will set my face
  chosen_spanish: entonces yo mismo pondré mi rostro
  alternatives_spanish:
  - entonces pondré mi rostro
  - yo mismo dirigiré mi rostro
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y en contexto jurídico expresa oposición decidida. 'Pondré mi rostro' conserva la imagen verbal; 'yo mismo' reproduce el énfasis de אֲנִי.
- source_word: בָּאִישׁ הַהוּא
  english_pob_choice: against that man
  chosen_spanish: contra ese hombre
  alternatives_spanish:
  - contra ese varón
  - contra esa persona
  lexicon: HALOT
  rationale: אִישׁ es masculino singular y aquí designa al individuo culpable. 'Hombre' mantiene el referente masculino del hebreo sin neutralizarlo innecesariamente.
- source_word: וּבְמִשְׁפַּחְתּוֹ
  english_pob_choice: and against his family
  chosen_spanish: y contra su familia
  alternatives_spanish:
  - y contra su clan
  - y contra su casa
  lexicon: HALOT
  rationale: מִשְׁפָּחָה puede abarcar familia extensa o grupo doméstico. 'Familia' es la opción española más natural y suficientemente amplia en este contexto.
- source_word: וְהִכְרַתִּי אֹתוֹ
  english_pob_choice: and I will cut off him
  chosen_spanish: y yo lo cortaré a él
  alternatives_spanish:
  - y yo lo cortaré
  - y yo lo eliminaré
  lexicon: HALOT
  rationale: Se conserva el modismo 'cortar' porque el texto usa כרת como fórmula de juicio de pacto. El objeto duplicado en español ('lo... a él') refuerza el valor enfático del hebreo y evita una lectura mecánica.
- source_word: וְאֵת כָּל הַזֹּנִים אַחֲרָיו
  english_pob_choice: and all who prostitute themselves after him
  chosen_spanish: y a todos los que se prostituyen tras él
  alternatives_spanish:
  - y a todos los que se prostituyen después de él
  - y a todos los que le siguen en prostitución
  lexicon: HALOT
  rationale: זנה mantiene su metáfora sexual en sentido idolátrico; 'se prostituyen' preserva esa fuerza. 'Tras él' traduce el valor direccional de אַחֲרָיו y respeta la imagen de seguir al culpable.
- source_word: לִזְנוֹת אַחֲרֵי הַמֹּלֶךְ
  english_pob_choice: by prostituting themselves after Molech
  chosen_spanish: prostituyéndose tras Moloc
  alternatives_spanish:
  - al prostituirse tras Moloc
  - por prostituirse tras Moloc
  lexicon: HALOT
  rationale: El infinitivo se vierte con gerundio para conservar la relación de modo/medio. Se mantiene la metáfora de infidelidad sexual aplicada a la idolatría, y 'Moloc' translitera el nombre propio tradicionalmente entendido en este pasaje.
- source_word: הַמֹּלֶךְ
  english_pob_choice: Molech
  chosen_spanish: Moloc
  alternatives_spanish:
  - Mólec
  - Molec
  lexicon: HALOT
  rationale: Se usa 'Moloc' como forma española asentada y fácilmente reconocible para el nombre de la deidad, manteniendo la transliteración del nombre propio.
- source_word: מִקֶּרֶב עַמָּם
  english_pob_choice: from among their people
  chosen_spanish: de en medio de su pueblo
  alternatives_spanish:
  - de entre su pueblo
  - de en medio del pueblo
  lexicon: HALOT
  rationale: La expresión idiomática hebrea de remoción comunitaria se conserva con 'de en medio de', que refleja bien מִקֶּרֶב. Se usa 'su pueblo' para corresponder al sufijo plural del hebreo auditado en el conjunto de la cláusula.
theological_decisions:
- issue: Metáfora sexual de infidelidad aplicada a la idolatría
  english_pob_reading: Render זנה with 'prostitute themselves' rather than flattening to 'are unfaithful' or 'commit idolatry.'
  chosen_spanish_reading: Traducir זנה como 'se prostituyen' / 'prostituyéndose' en vez de suavizarlo a 'son infieles' o 'practican idolatría'.
  alternative_spanish_readings:
  - son infieles
  - practican idolatría
  rationale: El hebreo usa deliberadamente lenguaje sexual cargado para describir la apostasía idolátrica. Mantenerlo en español conserva la fuerza retórica y teológica del original sin explicarlo en exceso en el texto principal.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Sentido judicial de 'cortar'
  english_pob_reading: Preserve 'cut off' as the main text without specifying the mechanism of punishment.
  chosen_spanish_reading: Preservar 'cortar' como fórmula de juicio, sin precisar en el texto el mecanismo exacto de la sanción.
  alternative_spanish_readings:
  - eliminar
  - excluir
  - destruir
  rationale: כרת funciona como expresión técnica de juicio de pacto y el pasaje no determina aquí si la ejecución es muerte, expulsión u otra forma de remoción divina. 'Cortar' mantiene esa tensión interpretativa.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El borrador sigue de cerca el audit trail inglés y el hebreo, manteniendo la metáfora sexual de זנה y la fórmula de juicio כרת sin resolver sus ambigüedades. No se observaron revisiones aplicadas en el estado fuente, por lo que no hay ajustes editoriales adicionales que reflejar.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma por defecto, pero este versículo no contiene el Tetragrámaton.
  - '''Moloc'' se conserva como nombre propio transliterado y no se sustituye por una glosa interpretativa.'
  - '''de en medio de'' conserva el valor idiomático de מִקֶּרֶב y evita una paráfrasis excesiva.'
  - El sufijo plural de עַמָּם se refleja con 'su pueblo' por concordancia natural en español dentro de la cláusula compuesta.
