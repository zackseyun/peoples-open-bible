translation:
  language: es
  text: 'Entonces Judá dijo a Onán[a]: «Únete a la esposa de tu hermano y cumple con ella tu deber de cuñado,[b] y levanta descendencia para tu hermano».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «llegarte a». El hebreo usa un eufemismo para la unión sexual en contexto matrimonial.
    reason: lexical_alternative
  - marker: b
    text: O, más técnicamente, «cumple con ella el deber levirático».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  lexicon: WLC / HALOT
  rationale: El waw consecutivo avanza la narración; «Entonces» conserva la secuencia narrativa en español con naturalidad, de modo semejante a «Then» en la POB inglesa.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judah
  lexicon: Nombre propio bíblico
  rationale: En español bíblico estándar, el nombre se escribe «Judá». Mantiene la forma tradicional y reconocible en el ámbito eclesial sin afectar el referente.
- source_word: בֹּא אֶל
  english_pob_choice: Go in to
  chosen_spanish: Entra donde
  alternatives_spanish:
  - Ve a
  - Ten relaciones con
  lexicon: HALOT
  rationale: La expresión hebrea es un eufemismo sexual en contexto matrimonial. «Entra donde» conserva el sentido idiomático con dignidad y evita tanto la literalidad forzada como una paráfrasis excesiva.
- source_word: אֵשֶׁת אָחִיךָ
  english_pob_choice: your brother’s wife
  chosen_spanish: la mujer de tu hermano
  alternatives_spanish:
  - la esposa de tu hermano
  lexicon: HALOT
  rationale: «Mujer» refleja bien el hebreo אֵשֶׁת y mantiene la relación familiar. «Esposa» es posible, pero «mujer de tu hermano» sigue más de cerca la construcción del original.
- source_word: וְיַבֵּם אֹתָהּ
  english_pob_choice: perform the duty of a brother-in-law to her
  chosen_spanish: cumple con ella el deber de cuñado
  alternatives_spanish:
  - haz con ella el deber de levirato
  - realiza con ella la obligación de cuñado
  lexicon: HALOT
  rationale: יַבֵּם es un término técnico de la obligación levirática. En español, «cumple con ella el deber de cuñado» comunica la función legal-familiar sin introducir un tecnicismo poco transparente; «cuñado» conserva la relación obligatoria del pariente afín.
- source_word: וְהָקֵם
  english_pob_choice: raise up
  chosen_spanish: levanta
  alternatives_spanish:
  - establece
  - haz surgir
  lexicon: HALOT
  rationale: En la fórmula fija con זֶרַע, el verbo expresa la instauración de una línea de descendencia. «Levanta» mantiene la imagen idiomática de la POB inglesa y el impulso causal del hebreo.
- source_word: זֶרַע
  english_pob_choice: offspring
  chosen_spanish: descendencia
  alternatives_spanish:
  - prole
  - hijos
  lexicon: HALOT
  rationale: Aquí זֶרַע no se limita a un hijo biológico aislado, sino a la continuidad de linaje para el hermano muerto. «Descendencia» comunica esa idea con claridad y sin perder el valor colectivo.
- source_word: לְאָחִיךָ
  english_pob_choice: for your brother
  chosen_spanish: para tu hermano
  alternatives_spanish:
  - en favor de tu hermano
  lexicon: WLC / HALOT
  rationale: 'La preposición ל expresa finalidad y beneficio: la descendencia se cuenta a favor del hermano fallecido. «Para tu hermano» es breve, natural y fiel al sentido funcional del hebreo.'
theological_decisions:
- issue: Terminología levirática sin sobrecargar el texto con lenguaje académico
  english_pob_reading: perform the duty of a brother-in-law to her
  chosen_spanish_reading: cumple con ella el deber de cuñado
  alternative_spanish_readings:
  - haz con ella el deber de levirato
  - realiza con ella la obligación de cuñado
  rationale: La POB inglesa evita reducir el mandato a mera relación sexual o a un tecnicismo cerrado. En español, «deber de cuñado» conserva la obligación familiar y legal del pasaje con suficiente claridad para lectores generales, sin imponer un vocabulario técnico ajeno al texto.
  doctrine_reference: Ética y ley familiar en Génesis; traducción con equivalencia óptima, sin doctrinarizar el término
- issue: Registro del imperativo sexual en un contexto familiar
  english_pob_reading: Go in to your brother’s wife
  chosen_spanish_reading: Entra donde la mujer de tu hermano
  alternative_spanish_readings:
  - Ve a la mujer de tu hermano
  - Ten relaciones con la mujer de tu hermano
  rationale: El hebreo usa un eufemismo que en contexto implica unión sexual. La formulación elegida conserva el eufemismo y el tono reverente del original, sin borrar la carga concreta del mandato.
  doctrine_reference: Decoro bíblico y precisión semántica del eufemismo hebreo
translation_notes:
  revision_awareness: El contexto inglés fue revisado y quedó sin cambios; la decisión española sigue ese mismo perfil estable y no introduce novedades doctrinales o textuales.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino solo cuando aparece el Tetragrámaton; en este versículo no aparece.
  - Se mantiene «Judá» como forma estándar del nombre propio en español bíblico.
  - «Cuñado» se usa aquí en sentido funcional/levirático, no como simple parentesco social.
  - «Descendencia» preserva el valor colectivo de זֶרַע mejor que un singular como «hijo».
  - La nota al pie marca la alternativa técnica levirática sin reemplazar el texto principal, para no perder transparencia ni legibilidad.
