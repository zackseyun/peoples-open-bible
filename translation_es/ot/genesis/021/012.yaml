    reason: lexical_alternative
  - marker: c
    text: Lit., «escucha su voz»; es decir, atiende lo que Sara dice.
    reason: lexical_alternative
  - marker: d
    text: O «por medio de Isaac tu descendencia será llamada»; la idea es que la línea de promesa se identifica mediante Isaac.
    reason: alternative_reading
  revision_rationale: 'La revisión corrige tres problemas principales: elimina la redundancia antinatural de «a tus ojos» del texto principal y la conserva en nota; mantiene «tu esclava» y «escucha su voz» conforme al audit trail y a la filosofía del proyecto; y reemplaza la sintaxis forzada «será llamada para ti la descendencia» por «en Isaac tu descendencia será llamada», que sigue de cerca el hebreo y el POB inglés revisado, pero en español claro y digno. También se simplifican las notas para evitar redundancia y anclajes innecesarios.'
