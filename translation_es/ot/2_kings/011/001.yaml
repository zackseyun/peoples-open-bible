translation:
  language: es
  text: Y Atalía[a], la madre de Ocozías, vio que su hijo había muerto, así que se levantó y destruyó a toda la descendencia real.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «toda la semilla del reino», es decir, el linaje o los descendientes reales.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַעֲתַלְיָה
  english_pob_choice: Now Athaliah
  chosen_spanish: Entonces Atalía
  alternatives_spanish:
  - Y Atalía
  - Ahora Atalía
  lexicon: HALOT
  rationale: El waw narrativo al inicio de una nueva unidad se vierte de manera natural en español con ‘Entonces’ para marcar transición y continuidad narrativa sin sonar forzado. El nombre propio se adapta a la forma española usual ‘Atalía’.
- source_word: אֵם אֲחַזְיָהוּ
  english_pob_choice: the mother of Ahaziah
  chosen_spanish: la madre de Ocozías
  alternatives_spanish:
  - madre de Ocozías
  - la madre de Ahazías
  lexicon: HALOT
  rationale: La cadena constructa identifica a Atalía por relación familiar; ‘la madre de Ocozías’ mantiene la identificación apposicional clara y formal. ‘Ocozías’ sigue la forma española bíblica más extendida para este rey.
- source_word: וַתָּרְאֶה כִּי מֵת בְּנָהּ
  english_pob_choice: saw that her son was dead
  chosen_spanish: vio que su hijo había muerto
  alternatives_spanish:
  - vio que su hijo estaba muerto
  - vio que su hijo murió
  lexicon: HALOT
  rationale: ראתה + כי introduce la percepción de un hecho; el perfecto compuesto ‘había muerto’ transmite bien el estado resultante del verbo מת y suena natural en español. ‘Su hijo’ refleja el sufijo posesivo del hebreo.
- source_word: וַתָּקָם
  english_pob_choice: so she arose
  chosen_spanish: y se levantó
  alternatives_spanish:
  - entonces se levantó
  - y se puso de pie
  lexicon: HALOT
  rationale: קום en narrativa expresa acción decidida; ‘se levantó’ conserva esa fuerza sin necesidad de una paráfrasis más interpretativa. Se mantiene la coordinación simple del hebreo.
- source_word: וַתְּאַבֵּד
  english_pob_choice: destroyed
  chosen_spanish: destruyó
  alternatives_spanish:
  - hizo perecer
  - aniquiló
  - acabó con
  lexicon: HALOT
  rationale: אבד en piel aquí denota causar destrucción. ‘Destruyó’ es suficientemente amplio para no especificar el modo de eliminación, pero conserva la fuerza causal del verbo.
- source_word: אֵת כָּל זֶרַע הַמַּמְלָכָה
  english_pob_choice: all the royal offspring
  chosen_spanish: a toda la descendencia real
  alternatives_spanish:
  - a toda la simiente real
  - a todos los descendientes reales
  - a todo el linaje real
  lexicon: HALOT
  rationale: זֶרַע literalmente es ‘semilla’, pero en este contexto dinástico se refiere a descendencia/linaje. ‘Descendencia real’ comunica el sentido de manera natural en español y conserva la referencia a la línea dinástica del reino.
translation_notes:
  revision_awareness: El texto base y la evaluación de revisión muestran alta concordancia; no se requirieron cambios de contenido respecto del sentido del hebreo y de la solución inglesa auditada. Se mantuvo la decisión léxica sobre זֶרַע con una nota para preservar la alternativa literal documentada.
  spanish_consistency_notes:
  - Se usó ‘Atalía’ como forma española del nombre propio y ‘Ocozías’ para el rey, siguiendo el uso bíblico en español.
  - Se evitó ‘SEÑOR’ u otras sustituciones irrelevantes; no hay lenguaje divino en el versículo.
  - ‘Descendencia real’ conserva la tensión entre la literalidad de ‘semilla’ y el sentido dinástico contextual del hebreo.
