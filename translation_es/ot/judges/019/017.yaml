translation:
  language: es
  text: 'Alzó los ojos y vio al viajero[a] en la plaza pública[b] de la ciudad, y el anciano dijo: «¿Adónde vas, y de dónde vienes?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el caminante» o «el huésped». El término hebreo se refiere a alguien que está de viaje y, por extensión en contextos de hospitalidad, a un huésped.
    reason: lexical_alternative
  - marker: b
    text: O «en la calle de la ciudad». El hebreo denota más específicamente un lugar público amplio o plaza.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשָּׂא עֵינָיו
  english_pob_choice: He looked up
  chosen_spanish: Alzó los ojos
  alternatives_spanish:
  - Levantó los ojos
  - Alzó la vista
  lexicon: HALOT
  rationale: El hebreo expresa el giro idiomático de dirigir la mirada hacia arriba. «Alzó los ojos» conserva esa imagen sin sonar rígido en español.
- source_word: וַיַּרְא
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - notó
  - percibió
  lexicon: HALOT
  rationale: Aquí se trata de percepción visual directa; «vio» es la equivalencia más natural y exacta.
- source_word: הָאִישׁ הָאֹרֵחַ
  english_pob_choice: the traveler
  chosen_spanish: el viajero
  alternatives_spanish:
  - el caminante
  - el huésped
  lexicon: HALOT
  rationale: אֹרֵחַ denota a alguien que va de paso, un viajero o forastero. «Viajero» comunica bien el movimiento y evita restringir indebidamente el sentido a «huésped».
- source_word: בִּרְחֹב הָעִיר
  english_pob_choice: in the open square of the city
  chosen_spanish: en la plaza abierta de la ciudad
  alternatives_spanish:
  - en la calle de la ciudad
  - en la plaza de la ciudad
  lexicon: HALOT
  rationale: רְחוֹב puede referirse a un espacio público amplio. «Plaza abierta» conserva mejor esa amplitud que «calle».
- source_word: הָאִישׁ הַזָּקֵן
  english_pob_choice: the old man
  chosen_spanish: el hombre anciano
  alternatives_spanish:
  - el viejo
  - el hombre mayor
  lexicon: HALOT
  rationale: «Hombre anciano» mantiene el valor descriptivo de edad sin la posible aspereza de «el viejo».
- source_word: אָנָה
  english_pob_choice: Where
  chosen_spanish: ¿Adónde
  alternatives_spanish:
  - ¿A dónde
  - ¿Dónde
  lexicon: HALOT
  rationale: La pregunta hebrea lleva orientación direccional hacia destino; «¿Adónde?» reproduce esa fuerza mejor que un simple «¿Dónde?».
- source_word: תֵלֵךְ
  english_pob_choice: are you going
  chosen_spanish: vas
  alternatives_spanish:
  - irás
  - te diriges
  lexicon: HALOT
  rationale: En una conversación inmediata, el presente «vas» es la forma más natural en español para esta pregunta de destino.
- source_word: וּמֵאַיִן
  english_pob_choice: and where ... from
  chosen_spanish: y de dónde
  alternatives_spanish:
  - y de qué lugar
  - y desde dónde
  lexicon: HALOT
  rationale: La construcción pregunta origen. «Y de dónde» es la formulación idiomática en español y conserva el contraste con «¿Adónde?».
- source_word: תָּבֹוא
  english_pob_choice: do you come
  chosen_spanish: vienes
  alternatives_spanish:
  - provienes
  - has venido
  lexicon: HALOT
  rationale: El verbo aquí interroga procedencia; «vienes» naturaliza la pregunta sin perder el sentido de origen.
translation_notes:
  revision_awareness: 'Se mantuvo la lectura del texto hebreo: el gesto idiomático de levantar la mirada, la referencia a un espacio público amplio, y las dos preguntas de destino y procedencia. No hubo cambios revisionales en el precedente inglés auditado.'
  spanish_consistency_notes:
  - Se preservó la distinción entre destino («¿Adónde vas?») y origen («¿de dónde vienes?»).
  - «Viajero» refleja el valor de אֹרֵחַ como persona en tránsito, sin imponer «huésped» como sentido principal.
  - «Plaza abierta» sigue la decisión inglesa de evitar «calle» por ser menos precisa para רְחוֹב.
