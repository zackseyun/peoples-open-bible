translation:
  language: es
  text: 'Y cayó sobre todo el pueblo el temor y el pavor, porque dijeron: «No hay en ellos verdad ni justicia, pues han violado el pacto[a] y el juramento que juraron».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «acuerdo» o «compromiso formal»; el griego puede referirse a un arreglo solemne, y el contexto se refuerza con el juramento que lo acompaña.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπέπεσεν
  english_pob_choice: fell upon
  chosen_spanish: cayó sobre
  alternatives_spanish:
  - vino sobre
  - se abatió sobre
  lexicon: LSJ
  rationale: El griego expresa una irrupción repentina que recae sobre el grupo; «cayó sobre» conserva esa imagen natural en español y sigue de cerca la fuerza del original.
- source_word: ὁ φόβος
  english_pob_choice: fear
  chosen_spanish: temor
  alternatives_spanish:
  - miedo
  - pavor
  lexicon: LSJ
  rationale: φόβος es el término amplio para el temor. En español, «temor» mantiene ese rango y deja que el siguiente término intensifique sin duplicar exactamente la misma idea.
- source_word: ὁ τρόμος
  english_pob_choice: dread
  chosen_spanish: pavor
  alternatives_spanish:
  - temblor
  - terror
  lexicon: LSJ
  rationale: τρόμος puede implicar estremecimiento o pavor. Aquí, junto con φόβος, «pavor» comunica una intensificación distinta y evita una repetición plana de sinónimos.
- source_word: εἰς πάντα τὸν λαόν
  english_pob_choice: upon all the people
  chosen_spanish: sobre todo el pueblo
  alternatives_spanish:
  - sobre todo el pueblo entero
  - sobre toda la gente
  lexicon: LSJ
  rationale: La construcción con εἰς, unida al verbo de caída, expresa extensión sobre el conjunto. «Sobre todo el pueblo» reproduce bien esa cobertura distributiva en español.
- source_word: ἀλήθεια
  english_pob_choice: truth
  chosen_spanish: verdad
  alternatives_spanish:
  - fidelidad
  - lealtad
  lexicon: LSJ
  rationale: El término apunta a integridad real y confiabilidad moral. «Verdad» es la equivalencia más directa y mantiene el paralelismo con «justicia».
- source_word: κρίσις
  english_pob_choice: justice
  chosen_spanish: justicia
  alternatives_spanish:
  - juicio
  - rectitud
  lexicon: LSJ
  rationale: Aquí κρίσις no se refiere al acto de juzgar sino a una conducta justa. «Justicia» expresa mejor la acusación ética del pasaje.
- source_word: παρῆρσαν
  english_pob_choice: have violated
  chosen_spanish: han violado
  alternatives_spanish:
  - han quebrantado
  - han transgredido
  lexicon: LSJ
  rationale: En contexto, el verbo indica infringir una obligación asumida. «Han violado» mantiene el registro formal y la fuerza de la ruptura del compromiso.
- source_word: τὴν στάσιν
  english_pob_choice: the covenant
  chosen_spanish: el pacto
  alternatives_spanish:
  - el convenio
  - el acuerdo
  lexicon: LSJ
  rationale: Aunque la nota inglesa abre la posibilidad de «agreement/compact/covenant», el contexto con el juramento favorece una formulación solemne. «Pacto» comunica mejor el vínculo formal sin sobrerregularlo.
- source_word: τὸν ὅρκον ὃν ὤμοσαν
  english_pob_choice: the oath that they swore
  chosen_spanish: el juramento que juraron
  alternatives_spanish:
  - el juramento que habían hecho
  - el voto que juraron
  lexicon: LSJ
  rationale: La repetición verbo-sustantivo del griego se conserva de modo directo en español. «Juramento que juraron» refleja fielmente el énfasis del original.
theological_decisions:
- issue: Si στάσις debe leerse con la fuerza de un pacto formal más que de un simple acuerdo
  english_pob_reading: covenant
  chosen_spanish_reading: pacto
  alternative_spanish_readings:
  - acuerdo
  - convenio
  rationale: El inglés revisado opta por «covenant» para reflejar la seriedad del compromiso. En español, «pacto» conserva esa solemnidad y evita debilitar el alcance jurídico-relacional del pasaje.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión del audit trail que sustituyó «agreement» por «covenant» para reforzar el matiz formal de στάσις; en español se optó por «pacto» como equivalente natural y solemne. También se preservó la repetición enfática de «juramento que juraron», siguiendo el énfasis del griego y del texto auditado en inglés.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» por norma del proyecto solo cuando corresponda; este versículo no contiene el nombre divino.
  - Se eligió «pacto» en vez de «acuerdo» para reflejar la decisión revisada del expediente y su tono formal.
  - Se conservó la distinción entre dos términos de temor con una nota al pie, porque el español puede nivelarlos demasiado si se usa solo un sinónimo.
