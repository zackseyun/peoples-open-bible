translation:
  language: es
  text: Y todos juntos bendijeron al Dios misericordioso, y cobraron ánimo[a], estando listos no solo para herir a los hombres, sino también a las fieras más salvajes y a las murallas de hierro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fueron fortalecidos en sus almas». El griego habla de fortalecimiento interior o de valor.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁμοῦ δὲ πάντες
  english_pob_choice: all together
  chosen_spanish: todos juntos
  alternatives_spanish:
  - juntos
  - todos al mismo tiempo
  lexicon: LSJ
  rationale: La combinación expresa acción unánime y simultánea; «todos juntos» conserva bien ese matiz colectivo sin sonar forzado en español.
- source_word: εὐλόγησαν
  english_pob_choice: blessed
  chosen_spanish: bendijeron
  alternatives_spanish:
  - alabaron
  - dijeron bien de
  lexicon: LSJ
  rationale: En español bíblico, «bendecir» a Dios comunica la acción doxológica de hablar bien de él con naturalidad y sin perder el tono religioso del verbo griego.
- source_word: τὸν ἐλεήμονα θεόν
  english_pob_choice: the merciful God
  chosen_spanish: al Dios misericordioso
  alternatives_spanish:
  - al Dios compasivo
  - al Dios que es misericordioso
  lexicon: LSJ
  rationale: «Misericordioso» reproduce el adjetivo atributivo ἐλεήμονα con precisión y en un orden natural en español.
- source_word: ἐπερρώσθησαν ταῖς ψυχαῖς
  english_pob_choice: were strengthened in spirit
  chosen_spanish: fueron fortalecidos en el espíritu
  alternatives_spanish:
  - fueron fortalecidos en sus almas
  - fueron animados interiormente
  lexicon: LSJ
  rationale: El griego describe fortaleza interior o valor. «En el espíritu» mantiene la idea de vigor interno, y evita estrechar innecesariamente el sentido a una antropología técnica.
- source_word: τιτρώσκειν
  english_pob_choice: to wound
  chosen_spanish: herir
  alternatives_spanish:
  - dañar
  - lastimar
  - lanzar heridas a
  lexicon: LSJ
  rationale: «Herir» es la forma más directa y natural en este contexto militar, y permite incluir tanto a hombres como, por extensión hiperbólica, a las murallas de hierro.
- source_word: ἀνθρώπους
  english_pob_choice: men
  chosen_spanish: a los hombres
  alternatives_spanish:
  - a las personas
  - a los seres humanos
  lexicon: LSJ
  rationale: La oposición con las fieras pide conservar el contraste masculino/plural del griego; «hombres» refleja mejor el registro bélico del pasaje.
- source_word: θῆρας τοὺς ἀγριωτάτους
  english_pob_choice: the fiercest wild beasts
  chosen_spanish: las fieras más salvajes
  alternatives_spanish:
  - las bestias más fieras
  - los animales más salvajes
  lexicon: LSJ
  rationale: «Fieras» corresponde bien a θῆρας y «más salvajes» transmite el superlativo ἀγριωτάτους con fuerza idiomática.
- source_word: σιδηρᾶ τείχη
  english_pob_choice: iron walls
  chosen_spanish: los muros de hierro
  alternatives_spanish:
  - las murallas de hierro
  - muros de hierro
  lexicon: LSJ
  rationale: «Muros de hierro» conserva la imagen literal; «muros» resulta más amplio y natural en español moderno, aunque «murallas» también sería posible si se quisiera un matiz más militar.
- source_word: ὄντες ἕτοιμοι
  english_pob_choice: being ready
  chosen_spanish: estando listos
  alternatives_spanish:
  - preparados
  - dispuestos
  lexicon: LSJ
  rationale: El participio expresa estado preparado para la acción; «estando listos» reproduce esa disposición inmediata sin añadir explicación no contenida en el griego.
theological_decisions:
- issue: ψυχαῖς como referencia a fortaleza interior sin fijar una antropología técnica
  english_pob_reading: were strengthened in spirit
  chosen_spanish_reading: fueron fortalecidos en el espíritu
  alternative_spanish_readings:
  - fueron fortalecidos en sus almas
  - fueron fortalecidos interiormente
  rationale: El contexto es de valentía y disposición para la batalla. «En el espíritu» conserva la fuerza interna del griego sin convertir ψυχαῖς en una afirmación doctrinal específica sobre el alma.
  doctrine_reference: Translation philosophy §6; mantener legibilidad sin aplanar el sentido
- issue: εὐλόγησαν aplicado a Dios en un contexto de alabanza colectiva
  english_pob_reading: they blessed the merciful God
  chosen_spanish_reading: bendijeron al Dios misericordioso
  alternative_spanish_readings:
  - alabaron al Dios misericordioso
  - bendecían al Dios misericordioso
  rationale: En español eclesial, «bendecir a Dios» expresa adecuadamente la doxología del texto. Evita reducir εὐλόγησαν a una simple alabanza genérica y mantiene el valor reverente del verbo.
  doctrine_reference: Uso bíblico de bendecir a Dios; fidelidad semántica al griego
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios sustanciales; el pasaje mantiene alta concordancia con el griego, con una única nota léxica sobre ταῖς ψυχαῖς / «en espíritu».
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός según el estándar del proyecto.
  - Se evita «SEÑOR» porque el texto griego no contiene κύριος aquí.
  - «Fieras» y «muros de hierro» conservan la imaginería bélica sin reinterpretación.
  - La nota a cubre la alternativa legítima «almas», preservando la tensión semántica del original.
