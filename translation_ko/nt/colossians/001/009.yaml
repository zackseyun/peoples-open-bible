id: COL.1.9
reference: Colossians 1:9
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Διὰ τοῦτο καὶ ἡμεῖς, ἀφ’ ἧς ἡμέρας ἠκούσαμεν, οὐ παυόμεθα ὑπὲρ ὑμῶν προσευχόμενοι καὶ αἰτούμενοι ἵνα πληρωθῆτε τὴν ἐπίγνωσιν τοῦ θελήματος αὐτοῦ ἐν πάσῃ σοφίᾳ καὶ συνέσει πνευματικῇ,
base_translation:
  language: en
  yaml_path: translation/nt/colossians/001/009.yaml
  text: For this reason, we also, from the day we heard, have not ceased praying for you and asking that you may be filled with the knowledge of his will in all spiritual wisdom and understanding,
translation:
  language: ko
  text: 이러한 까닭에 우리 또한, 들은 그 날부터 여러분을 위하여 기도하기를 그치지 않으며, 여러분이 모든 영적[b] 지혜와 깨달음으로 그분의 뜻을 아는 지식[a]에 충만하게 되기를 간구합니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「온전한 앎」. 헬라어 ἐπίγνωσις는 깊고 충만한 인식의 어감을 담을 수 있다.
    reason: lexical_alternative
  - marker: b
    text: 「영적」은 성령께 속한 것을 가리킬 수도, 영적 성격을 띤 것을 가리킬 수도 있다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Διὰ τοῦτο
  english_pob_choice: For this reason
  chosen_korean: 이러한 까닭에
  alternatives_korean:
  - 그러므로
  - 이로 인하여
  lexicon: BDAG
  rationale: 앞의 보고에 대한 원인·근거를 가리키는 인과 표지. 「이러한 까닭에」가 합쇼체 산문에서 자연스럽다.
- source_word: καὶ ἡμεῖς
  english_pob_choice: we also
  chosen_korean: 우리 또한
  alternatives_korean:
  - 우리도
  lexicon: BDAG
  rationale: 1인칭 화자의 포함적 강조를 「우리 또한」으로 표현한다.
- source_word: ἀφ’ ἧς ἡμέρας ἠκούσαμεν
  english_pob_choice: from the day we heard
  chosen_korean: 들은 그 날부터
  alternatives_korean:
  - 우리가 들은 날부터
  lexicon: BDAG
  rationale: 시점적 기점 표현을 간결한 한국어 종속절로 옮긴다.
- source_word: οὐ παυόμεθα ... προσευχόμενοι καὶ αἰτούμενοι
  english_pob_choice: have not ceased praying ... and asking
  chosen_korean: 기도하기를 그치지 않으며 ... 간구합니다
  alternatives_korean:
  - 기도와 간구를 쉬지 않으며
  - 끊임없이 기도하고 청합니다
  lexicon: BDAG
  rationale: 두 분사(προσεύχομαι 일반적 기도, αἰτέω 청원)를 「기도하기를 그치지 않으며 ... 간구합니다」로 풀어 두 행위의 구분과 지속성을 함께 살린다.
- source_word: ἵνα πληρωθῆτε
  english_pob_choice: that you may be filled
  chosen_korean: 충만하게 되기를
  alternatives_korean:
  - 충만함을 입기를
  - 가득 차게 되기를
  lexicon: BDAG
  rationale: 부정과거 수동 가정법. 「충만하게 되기를」로 수동의 함의(하나님의 행위)를 자연스럽게 보존한다.
- source_word: τὴν ἐπίγνωσιν τοῦ θελήματος αὐτοῦ
  english_pob_choice: with the knowledge of his will
  chosen_korean: 그분의 뜻을 아는 지식
  alternatives_korean:
  - 그분의 뜻에 대한 온전한 앎
  - 그분의 뜻을 깊이 아는 것
  lexicon: BDAG
  rationale: ἐπίγνωσις의 깊은 앎의 어감을 「~을 아는 지식」으로 살리되, 본문 가독성을 위해 「온전한」을 추가하지 않고 각주로 보존한다.
- source_word: ἐν πάσῃ σοφίᾳ καὶ συνέσει πνευματικῇ
  english_pob_choice: in all spiritual wisdom and understanding
  chosen_korean: 모든 영적 지혜와 깨달음으로
  alternatives_korean:
  - 모든 영적 지혜와 분별로
  - 영적인 모든 지혜와 통찰력으로
  lexicon: BDAG
  rationale: πνευματικῇ는 σοφίᾳ와 συνέσει를 함께 수식하는 것으로 본다. 「깨달음」은 σύνεσις의 「이해·파악」 어감을 자연스럽게 살린다.
theological_decisions:
- issue: ἐπίγνωσις의 강도
  chosen_reading: 지식
  alternative_readings:
  - 온전한 앎
  - 깊은 앎
  rationale: ἐπίγνωσις는 흔히 「온전한·깊은 앎」으로 강화될 수 있으나, 본문 모든 곳에서 그렇게 강화하면 가독성을 해친다. 본문은 「지식」을 유지하고 강화된 어감은 각주로 보존한다.
  doctrine_reference: 'DOCTRINE.md: Contested terms table; Preserve theological tension'
- issue: πνευματικῇ의 지시
  chosen_reading: 영적
  alternative_readings:
  - 성령께서 주신
  - 영에 속한
  rationale: 헬라어 형용사 πνευματικός는 성령과의 관련을 함의할 수 있으나, 본문 구조는 그것을 명시적 속격으로 표현하지 않는다. 본문은 「영적」으로 보존하고 성령 관련 가능성은 각주로 둔다.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension'
