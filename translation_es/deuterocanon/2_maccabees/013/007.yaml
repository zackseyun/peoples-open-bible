translation:
  language: es
  text: Por tal destino Menelao, el sin ley, vino a morir[a], sin siquiera obtener sepultura en la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «sin siquiera obtener la tierra»; el sentido es que Menelao no recibió ni siquiera sepultura.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τοιούτῳ μόρῳ
  english_pob_choice: by such a fate
  chosen_spanish: por tal destino
  alternatives_spanish:
  - con tal suerte
  - por semejante destino
  lexicon: LSJ
  rationale: μόρος puede expresar destino, suerte o muerte con un tono solemne. «Por tal destino» conserva el valor instrumental y el eco fatal del griego sin sonar artificial en español.
- source_word: τὸν παράνομον
  english_pob_choice: the lawless
  chosen_spanish: el impío
  alternatives_spanish:
  - el transgresor
  - el sin ley
  lexicon: LSJ
  rationale: παράνομος significa literalmente «contra la ley» o «sin ley». En español, «impío» comunica la censura moral en un registro bíblico natural, aunque pierde parte de la precisión legal; se mantiene esta opción porque el contexto acusa a Menelao como culpable y detestable. Se conserva la tensión entre lo legal y lo moral en la nota textual.
- source_word: συνέβη θανεῖν
  english_pob_choice: happened to die
  chosen_spanish: llegó a morir
  alternatives_spanish:
  - le aconteció morir
  - ocurrió que murió
  lexicon: LSJ
  rationale: συμβαίνω con infinitivo indica que algo le sucedió a alguien. «Llegó a morir» reproduce el carácter de acontecimiento y la fluidez del giro griego sin forzar una perífrasis demasiado pesada.
- source_word: μηδὲ τῆς γῆς τυγχάνοντα
  english_pob_choice: not even obtaining burial in the earth
  chosen_spanish: sin siquiera obtener sepultura en la tierra
  alternatives_spanish:
  - sin siquiera recibir la tierra
  - sin siquiera alcanzar la tierra
  lexicon: LSJ
  rationale: τυγχάνω con genitivo puede significar obtener o recibir. El contexto sugiere la privación de sepultura, así que «sepultura en la tierra» explicita el sentido idiomático de modo fiel y comprensible. Se evita traducir mecánicamente «la tierra» sin aclaración.
- source_word: Μενέλαον
  english_pob_choice: Menelaus
  chosen_spanish: Menelao
  lexicon: Onomastics
  rationale: Transliteración normal al español del nombre propio Μενέλαος.
theological_decisions:
- issue: Caracterización moral de Menelao mediante παράνομος
  english_pob_reading: the lawless Menelaus
  chosen_spanish_reading: el impío Menelao
  alternative_spanish_readings:
  - el sin ley Menelao
  - el transgresor Menelao
  rationale: El texto no solo informa del hecho de su muerte, sino que lo presenta bajo juicio moral. «Impío» transmite condena ética en un español bíblico natural, aunque no reproduce literalmente la raíz legal de παράνομος. La nota lexical conserva esa tensión semántica.
  doctrine_reference: Translation philosophy §1, §5
- issue: Sentido de la privación final de sepultura
  english_pob_reading: not even obtaining burial in the earth
  chosen_spanish_reading: sin siquiera obtener sepultura en la tierra
  alternative_spanish_readings:
  - sin siquiera recibir la tierra
  - sin siquiera alcanzar la tierra
  rationale: La frase griega apunta a la humillación de morir sin sepultura. La elección española hace explícito ese sentido sin añadir un dato ajeno al texto.
  doctrine_reference: Translation philosophy §2, §6
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB inglés, que reordenó la frase para reflejar mejor τοιούτῳ μόρῳ / συνέβη θανεῖν, manteniendo el carácter solemne de la sentencia y aclarando que Menelao es el sujeto de la muerte sin sepultura. La versión española conserva ese orden naturalizado: primero el destino, luego la identidad moral del personaje, y por último la privación de sepultura.'
  spanish_consistency_notes:
  - Se usa «Menelao» como forma española estable del nombre propio.
  - Se eligió «impío» para mantener un registro bíblico legible, pero la nota lexical preserva la fuerza de παράνομος como «sin ley»/«contra la ley».
  - «Sepultura en la tierra» evita la literalidad opaca de «obtener la tierra» y deja claro el sentido funerario indicado por el audit trail inglés.
  - Se mantiene un tono sobrio y sentencioso acorde con el pasaje narrativo-jurídico.
