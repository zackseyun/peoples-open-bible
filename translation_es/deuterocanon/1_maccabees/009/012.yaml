translation:
  language: es
  text: Pero Báquides estaba en el ala derecha[a], y la falange se acercó desde ambos lados, y tocaron las trompetas[b], y los que estaban con Judas también tocaron las trompetas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego literalmente: «en el cuerno derecho»; aquí se trata de un giro militar que significa «ala derecha» o «flanco derecho».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la falange se acercó desde los dos lados».'
    reason: alternative_reading
lexical_decisions:
- source_word: Βακχίδης
  english_pob_choice: Bacchides
  chosen_spanish: Bacchides
  alternatives_spanish:
  - Báquides
  lexicon: convención onomástica histórica
  rationale: Se conserva el nombre propio con la forma tradicional más reconocible en español bíblico y académico; no se traduce ni se adapta fonéticamente de manera innecesaria.
- source_word: ἐν τῷ δεξιᾷ κέρατι
  english_pob_choice: on the right wing
  chosen_spanish: en el ala derecha
  alternatives_spanish:
  - en el cuerno derecho
  - en el flanco derecho
  lexicon: LSJ
  rationale: κέρας significa literalmente «cuerno», pero en contexto militar designa el ala o flanco de una formación. «Ala derecha» mantiene el sentido táctico y suena natural en español.
- source_word: ἤγγισεν
  english_pob_choice: drew near
  chosen_spanish: se acercó
  alternatives_spanish:
  - se aproximó
  - drew near
  lexicon: LSJ
  rationale: El aoristo de ἐγγίζω expresa acercamiento. «Se acercó» comunica el movimiento de manera clara y formal en español.
- source_word: ἡ φάλαγξ
  english_pob_choice: the phalanx
  chosen_spanish: la falange
  alternatives_spanish:
  - la formación
  - la línea de batalla
  lexicon: LSJ
  rationale: Se retiene el término técnico militar «falange», que corresponde directamente al griego y preserva el carácter marcial del pasaje.
- source_word: ἐκ τῶν δύο μερῶν
  english_pob_choice: from both sides
  chosen_spanish: desde ambos lados
  alternatives_spanish:
  - de los dos lados
  - de las dos partes
  lexicon: LSJ
  rationale: La expresión indica avance o aproximación bilateral. «Desde ambos lados» transmite el valor táctico de la frase sin sobrecargarla.
- source_word: ἐφώνουν ταῖς σάλπιγξιν
  english_pob_choice: they sounded the trumpets
  chosen_spanish: tocaron las trompetas
  alternatives_spanish:
  - sonaron las trompetas
  - hicieron sonar las trompetas
  lexicon: LSJ
  rationale: Aunque el griego usa un verbo de «hacer sonar / llamar», en contexto de guerra la equivalencia natural en español es «tocar las trompetas». Evita una construcción demasiado literal y conserva el sentido de señal militar.
- source_word: οἱ παρὰ Ἰούδαν
  english_pob_choice: those with Judas
  chosen_spanish: los que estaban con Judas
  alternatives_spanish:
  - los de Judas
  - los que estaban junto a Judas
  lexicon: LSJ
  rationale: La frase señala al grupo acompañado de Judas. «Los que estaban con Judas» es fiel, natural y no añade especificaciones ausentes del griego.
- source_word: ἐσάλπισαν
  english_pob_choice: sounded the trumpets
  chosen_spanish: tocaron las trompetas
  alternatives_spanish:
  - sonaron las trompetas
  - dieron toque de trompeta
  lexicon: LSJ
  rationale: Se conserva la repetición del acto de tocar las trompetas como respuesta militar. La repetición ayuda a reflejar el paralelismo del griego.
- source_word: καὶ αὐτοὶ
  english_pob_choice: they too
  chosen_spanish: también
  alternatives_spanish:
  - ellos también
  - ellos mismos también
  lexicon: LSJ
  rationale: El griego añade énfasis a la respuesta del lado de Judas. En español, «también» basta para mantener la correspondencia sin redundancia excesiva.
translation_notes:
  revision_awareness: 'El texto español sigue la revisión final del inglés auditado: mantiene el movimiento narrativo simple, conserva el paralelismo de los dos toques de trompeta y refleja la lectura militar de κέρας sin convertirla en un literalismo extraño para el español.'
  spanish_consistency_notes:
  - Se emplea «Bacchides» como nombre propio transliterado, en continuidad con el expediente inglés.
  - Se evita «SEÑOR» o vocabulario cultual ajeno; el pasaje es militar y narrativo.
  - «Falange» y «ala derecha» mantienen el registro técnico sin perder legibilidad.
  - La repetición de «tocaron las trompetas» conserva el énfasis responsivo del griego.
