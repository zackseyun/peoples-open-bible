  to: No entregarás a su amo[a] a un esclavo que haya escapado de su amo hacia ti.
  rationale: Se reemplaza «y se haya refugiado contigo» por «haya escapado de su amo hacia ti» para conservar el sentido direccional de אֵלֶיךָ sin añadir la noción interpretativa de refugio. También se ajusta el orden con «a un esclavo» para que la frase suene más natural en español formal y siga de cerca la sintaxis y énfasis del original.
