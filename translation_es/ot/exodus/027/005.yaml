revisions:
- from: Y pondrás[ a] [b] debajo del borde del altar, por la parte de abajo, y la red llegará hasta la mitad del altar.
  to: Y la pondrás debajo del borde[a] del altar, por debajo, y la red se extenderá hasta la mitad del altar.[b]
  rationale: Se corrige el español para incluir el pronombre objeto explícito («la»), se eliminan los marcadores defectuosos y se restauran correctamente las notas necesarias. Se ajusta «por la parte de abajo» a «por debajo» para mayor naturalidad y se cambia «llegará» por «se extenderá» para reflejar mejor la extensión física de la red. Se mantienen «borde» y «mitad del altar» como redacción principal, con notas que preservan las alternativas y la literalidad auditadas.
