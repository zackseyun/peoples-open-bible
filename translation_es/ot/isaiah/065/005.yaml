    text: 'O: «porque soy demasiado santo para ti», o «porque me he mantenido santo de ti». La cláusula hebrea es difícil y expresa una pretensión de superioridad ritual o moral.'
    reason: alternative_reading
  revision_rationale: 'Se hace una sola corrección menor: cambiar ‘humo en mi nariz’ por ‘humo en mis narices’ para reflejar mejor la imagen concreta preservada por el hebreo y por la decisión lexical del POB en inglés. El resto del borrador es fiel, claro y adecuado.'
