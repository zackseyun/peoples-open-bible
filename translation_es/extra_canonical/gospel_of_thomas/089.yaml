translation:
  language: es
  text: 'Jesús dijo: «¿Por qué lavan el exterior[a] de la copa? ¿No saben[b] que el que hizo[c] el interior es también el que hizo[c] el exterior?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «el lado de afuera de la copa» (ⲡⲥⲁ ⲛⲃⲟⲗ ⲛⲡⲡⲟⲧⲏⲣⲓⲟⲛ). Hay una frase paralela para «el interior» (ⲡⲥⲁ ⲛϩⲟⲩⲛ).
    reason: dialect_note
  - marker: b
    text: El copto ⲛⲟⲉⲓ también puede significar «entender» o «darse cuenta». Se mantiene «saben» para conservar el sentido cognitivo directo.
    reason: lexical_alternative
  - marker: c
    text: El copto ⲧⲁⲙⲓⲟ en la cláusula relativa significa «hacer, formar»; también podría traducirse «formó». No repite el verbo anterior para «lavar», y así preserva el contraste entre lavar y hacer.
    reason: lexical_alternative
lexical_decisions:
- source_word: ϫⲉⲉⲧⲃⲉⲟⲩ
  english_pob_choice: why
  chosen_spanish: ¿Por qué…?
  alternatives_spanish:
  - ¿A causa de qué…?
  - ¿Por qué razón…?
  lexicon: Layton, Coptic Grammar; Crum s.v. ⲉⲧⲃⲉ
  rationale: La partícula interrogativa pide una pregunta directa y breve; «¿Por qué…?» conserva el tono terso del dicho y su fuerza retórica.
- source_word: ⲉⲓⲱⲉ
  english_pob_choice: wash
  chosen_spanish: lavan
  alternatives_spanish:
  - limpian
  - lavan y limpian
  lexicon: Crum s.v. ⲉⲓⲱⲉ; Lambdin, Introduction to Sahidic Coptic
  rationale: En el contexto de un vaso o cáliz, el verbo concreto «lavar» es el equivalente natural y mantiene el contraste con «hacer» en la segunda mitad del dicho.
- source_word: ⲡⲥⲁ ⲛⲃⲟⲗ
  english_pob_choice: the outside
  chosen_spanish: el lado de afuera
  alternatives_spanish:
  - el exterior
  - la parte exterior
  lexicon: Crum s.v. ⲥⲁ; Layton, Coptic Grammar (directionals ⲛⲃⲟⲗ/ⲛϩⲟⲩⲛ)
  rationale: El coptico dice literalmente «el lado afuera»; «el lado de afuera» preserva la imagen espacial y refleja la observación auditada de la versión inglesa sin volverla demasiado técnica.
- source_word: ⲡⲡⲟⲧⲏⲣⲓⲟⲛ
  english_pob_choice: cup
  chosen_spanish: cáliz
  alternatives_spanish:
  - copa
  - vaso
  lexicon: Crum s.v. (Greek loanwords); Layton, NHS 20 notes
  rationale: Aunque el término básico es «cup», en español bíblico «cáliz» comunica con naturalidad el objeto de mesa y es plenamente comprensible; se evita «copa» por posible ambigüedad ceremonial y «vaso» por sonar menos preciso.
- source_word: ⲛⲧⲱⲧⲛ ⲣ̄ⲛⲟⲉⲓ
  english_pob_choice: do you not know
  chosen_spanish: ¿No saben…?
  alternatives_spanish:
  - ¿No entienden…?
  - ¿No se dan cuenta…?
  lexicon: Crum s.v. ⲛⲟⲉⲓ; Lambdin
  rationale: La decisión inglesa mantiene el sentido cognitivo simple; en español «¿No saben…?» conserva esa neutralidad mejor que explicitar «entender» o «darse cuenta».
- source_word: ⲡⲉⲧⲉⲣⲉⲁⲛⲧⲟϥⲧⲁⲙⲓⲟ
  english_pob_choice: the one who made
  chosen_spanish: el que hizo
  alternatives_spanish:
  - el que formó
  - el hacedor de
  lexicon: Crum s.v. ⲧⲁⲙⲓ/ⲧⲁⲙⲉ ‘to make, fashion’; Layton, Coptic Grammar (relative ⲡⲉⲧⲉⲣⲉ + infinitive)
  rationale: El relativo nombra a quien realizó la acción; «hizo» es la forma más directa y no introduce un matiz más elaborado que el coptico no exige.
- source_word: ⲟⲛ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - además
  - igualmente
  lexicon: Crum s.v. ⲟⲛ
  rationale: «También» reproduce la adición inclusiva y encaja naturalmente en la segunda cláusula paralela.
theological_decisions:
- issue: Relación entre el interior y el exterior como una sola procedencia del creador
  english_pob_reading: the one who made the inside is also the one who made the outside
  chosen_spanish_reading: el que hizo el lado de adentro es también el que hizo el lado de afuera
  alternative_spanish_readings:
  - el que formó lo de dentro es también el que formó lo de fuera
  - el creador del interior es también el creador del exterior
  rationale: La traducción conserva la paridad semántica entre interior/exterior y evita trasladar el dicho a un lenguaje más doctrinal de «creador» que el coptico no usa explícitamente. Mantiene la tensión entre la imagen doméstica y la implicación moral implícita en el dicho.
  doctrine_reference: Sin referencia doctrinal específica; se preserva la imagen y su paralelismo retórico.
translation_notes:
  revision_awareness: 'Coincide con el control más reciente: no se registraron revisiones sustantivas y el juicio de alta concordancia se mantiene. La redacción española sigue de cerca el texto coptico y el audit trail inglés, sin introducir ampliaciones doctrinales.'
  spanish_consistency_notes:
  - Se mantiene la segunda persona plural para reflejar ⲛⲧⲱⲧⲛ.
  - Se conserva el paralelismo «lado de adentro / lado de afuera» para reproducir la antítesis espacial.
  - Se usa «hizo» en ambas cláusulas para reflejar el mismo verbo coptico ⲧⲁⲙⲓⲟ.
  - No se introduce terminología eclesiástica adicional fuera de «cáliz», elegida por naturalidad en español bíblico.
