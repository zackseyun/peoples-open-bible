revisions:
- from: Porque nuestra esclavitud[a] no se convertirá en favor, sino que el Señor nuestro Dios la convertirá en deshonra.
  to: Porque nuestra esclavitud[a] no resultará en favor, sino que Yahvé nuestro Dios la hará una deshonra.
  rationale: Se ajustó el verbo para expresar resultado más que transformación ('no resultará en favor'), se tradujo θήσει αὐτήν de manera más directa y natural en español ('la hará una deshonra'), y se alineó la designación divina con la convención principal del proyecto usando 'Yahvé'. La nota alternativa conserva la opción documentada de 'no terminará en favor' y una alternativa contextual para ἀτιμίαν.
