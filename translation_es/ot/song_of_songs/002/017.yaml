base_translation:
  language: en
  yaml_path: translation/ot/song_of_songs/002/017.yaml
  text: Until the day breathes and the shadows flee[a], turn[b], my beloved—be like a gazelle or a young stag on the mountains of Bether.
  footnotes:
  - marker: a
    text: Or 'Until the day cools and the shadows flee.' The Hebrew literally speaks of the day 'breathing' or 'blowing,' a poetic expression often understood as the coming of the evening breeze or the freshening of dawn.
    reason: lexical_alternative
  - marker: b
    text: '''Bether'' may be a place name. Alternatively, the phrase may mean ''mountains of separation'' or, less likely, ''rugged/jagged mountains.'''
    reason: alternative_reading
