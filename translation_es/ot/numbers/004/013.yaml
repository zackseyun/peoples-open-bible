translation:
  language: es
  text: Entonces quitarán las cenizas del altar y extenderán sobre él un paño púrpura[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "limpiarán el altar" / "retirarán del altar las cenizas grasosas". El verbo hebreo se refiere específicamente a retirar el residuo de ceniza del altar en un contexto sacrificial.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְדִשְּׁנוּ
  english_pob_choice: they shall remove the ashes
  chosen_spanish: quitarán las cenizas
  alternatives_spanish:
  - limpiarán
  - retirarán las cenizas
  - quitarán el residuo graso
  lexicon: HALOT
  rationale: En este contexto cultual, el verbo no significa simplemente “embellecer” ni un “limpiar” general, sino retirar el residuo de cenizas del altar. “Quitar las cenizas” conserva la imagen concreta y resulta natural en español.
- source_word: הַמִּזְבֵּחַ
  english_pob_choice: the altar
  chosen_spanish: el altar
  alternatives_spanish:
  - el ara
  lexicon: HALOT
  rationale: מִזְבֵּחַ es el altar sacrificial del tabernáculo; “altar” es el equivalente estándar, claro y fiel en español.
- source_word: וּפָרְשׂוּ
  english_pob_choice: and spread
  chosen_spanish: extenderán
  alternatives_spanish:
  - esparcirán
  - pondrán extendida
  lexicon: HALOT
  rationale: El verbo indica desplegar o extender sobre algo. En español, “extenderán” comunica bien la acción de cubrir con una tela sin sonar forzado.
- source_word: עָלָיו
  english_pob_choice: over it
  chosen_spanish: sobre él
  alternatives_spanish:
  - encima de él
  - sobre eso
  lexicon: HALOT
  rationale: La referencia retoma el altar; “sobre él” mantiene la relación espacial directa y evita una perífrasis innecesaria.
- source_word: בֶּגֶד
  english_pob_choice: cloth
  chosen_spanish: tela
  alternatives_spanish:
  - paño
  - manto
  - vestidura
  lexicon: HALOT
  rationale: Aquí no se trata de una prenda personal, sino de un textil para cubrir un objeto sagrado. “Tela” expresa mejor la función que “vestidura” o “manto”.
- source_word: אַרְגָּמָן
  english_pob_choice: purple
  chosen_spanish: púrpura
  alternatives_spanish:
  - morada
  - morada púrpura
  - púrpura teñida
  lexicon: HALOT
  rationale: אַרְגָּמָן denota material teñido de púrpura. “Púrpura” es el color/tejido tradicional y adecuado en español bíblico; “morado” sería posible, pero menos preciso como término cultual.
translation_notes:
  revision_awareness: La revisión inglesa más reciente mantiene sin cambios la decisión principal (“remove the ashes”) y confirma una alta concordancia entre las evaluaciones, por lo que la redacción española sigue de cerca esa lectura cultual concreta sin ampliar el sentido del verbo.
  spanish_consistency_notes:
  - Se mantiene “altar” para מִזְבֵּחַ en contexto tabernáculo sacrificial.
  - Se conserva “púrpura” para אַרְגָּמָן como término cultual y cromático preciso.
  - Se eligió una formulación verbal natural en español (“quitarán las cenizas”) que preserva la fuerza concreta del hebreo sin volverlo interpretativamente más amplio.
  - La nota al pie recoge la tensión léxica documentada entre “limpiar” y “retirar las cenizas”, sin ocultar la especificidad ritual del verbo.
