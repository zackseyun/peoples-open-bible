  glossary_alignment: No hay conflictos con la terminología teológica del proyecto. Las decisiones sobre «buen» y «selectos» siguen adecuadamente la revisión inglesa que evitó un superlativo excesivo. La metáfora concreta de carne y huesos se preserva sin suavizarse.
