    rationale: Aunque אֶל puede ser simplemente direccional, el contexto y la auditoría inglesa eligieron «into the ark». En español, «al arca» puede sonar como mera aproximación; «en el arca» comunica mejor el ingreso efectivo sin forzar una paráfrasis extensa.
  - severity: low
    issue: La secuencia «Vinieron a Noé al arca» es algo torpe en español
    rationale: Dos complementos seguidos con «a/al» generan una cadencia menos natural y una leve ambigüedad sintáctica. Ajustar el segundo complemento mejora la lectura e inteligibilidad.
