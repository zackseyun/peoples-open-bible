translation:
  language: es
  text: Aunque[a] su raíz envejece en la tierra, y su tocón[b] muere en el polvo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Si». La partícula hebrea puede leerse de modo condicional, pero aquí probablemente tiene sentido concesivo en el desarrollo de la metáfora del árbol.
    reason: alternative_reading
  - marker: b
    text: O «cepa». El hebreo se refiere a la base o tocón de un árbol cortado.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: Though
  chosen_spanish: Aunque
  alternatives_spanish:
  - Si
  - Aun si
  lexicon: HALOT
  rationale: En este contexto poético, la partícula introduce una idea concesiva en la metáfora del árbol, no una condición simple. «Aunque» reproduce bien ese valor concesivo en español y mantiene el flujo del argumento.
- source_word: יַזְקִין
  english_pob_choice: grows old
  chosen_spanish: envejece
  alternatives_spanish:
  - se hace viejo
  - llega a viejo
  lexicon: HALOT
  rationale: El hifil de זקן expresa el llegar a la vejez o volverse viejo. «Envejece» es natural en español y conserva el proceso de deterioro temporal.
- source_word: בָּאָרֶץ
  english_pob_choice: in the earth
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el suelo
  - en la tierra
  lexicon: HALOT
  rationale: «Tierra» conserva el registro poético de «earth» y funciona bien en paralelo con «polvo». «Suelo» sería más prosaico.
- source_word: שָׁרְשׁוֹ
  english_pob_choice: its root
  chosen_spanish: su raíz
  alternatives_spanish:
  - sus raíces
  lexicon: HALOT
  rationale: Aunque el hebreo usa singular con sufijo, el singular colectivo en español («raíz») transmite adecuadamente el sistema radical del árbol sin forzar pluralidad.
- source_word: וּבֶעָפָר
  english_pob_choice: and in the dust
  chosen_spanish: y ... en el polvo
  alternatives_spanish:
  - y en el polvo
  - y en el suelo
  lexicon: HALOT
  rationale: «Polvo» preserva la resonancia hebrea de עָפָר y su vínculo con fragilidad/mortalidad. La elipsis en español evita repetir innecesariamente la preposición y suena más natural en poesía.
- source_word: יָמוּת
  english_pob_choice: dies
  chosen_spanish: muere
  alternatives_spanish:
  - perece
  - se muere
  lexicon: HALOT
  rationale: El verbo común «muere» refleja con precisión el valor básico de מות sin añadir matices de decaimiento que no están explícitos en el hebreo.
- source_word: גִּזְעוֹ
  english_pob_choice: its stump
  chosen_spanish: su tronco[b]
  alternatives_spanish:
  - su tocón
  - su tronco
  lexicon: HALOT
  rationale: גֵּזַע puede referirse al tocón o al stock/stump de un árbol cortado. En español, «tronco» es una opción natural y comprensible; sin embargo, puede sugerir el cuerpo principal del árbol más que la base cortada, por eso se marca la alternativa lexical en nota. Si se prioriza la precisión botánica del contexto, «tocón» es viable.
theological_decisions:
- issue: Valor concesivo de אִם en la metáfora del árbol
  english_pob_reading: Though its root grows old in the earth...
  chosen_spanish_reading: Aunque su raíz envejece en la tierra...
  alternative_spanish_readings:
  - Si su raíz envejece en la tierra...
  - Aun si su raíz envejece en la tierra...
  rationale: La POB inglesa leyó אִם como concesivo por el flujo poético del pasaje. «Aunque» conserva esa lectura sin borrar la alternativa condicional, que permanece documentada en nota.
  doctrine_reference: Poética sapiencial; semántica de partículas hebreas, no doctrina específica
- issue: Imagen arbórea de muerte aparente
  english_pob_reading: '...and its stump dies in the dust.'
  chosen_spanish_reading: '...y su tronco muere en el polvo.'
  alternative_spanish_readings:
  - '...y su tocón muere en el polvo.'
  - '...y su stock muere en el polvo.'
  rationale: La imagen presenta un árbol que parece muerto por completo, pero el contexto inmediato anuncia posibilidad de renovación. Mantener un término arbóreo concreto preserva la tensión literaria y la continuidad con el versículo siguiente.
  doctrine_reference: Contexto literario de Job 14:9-10
translation_notes:
  revision_awareness: Se mantuvo la lectura concesiva destacada por la POB inglesa y su nota textual. No se añadieron cambios de sentido más allá de ajustar la dicción al español natural y de aclarar la posible ambigüedad de גִּזְעוֹ con una nota léxica.
  spanish_consistency_notes:
  - Se usó «Yahvé» como terminología general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó «SEÑOR» porque el texto no lo requiere.
  - «Polvo» se mantuvo para conservar el paralelismo con el hebreo עָפָר y la imaginería de fragilidad.
  - La puntuación reproduce la concesión inicial y el paralelismo poético de dos miembros coordinados.
