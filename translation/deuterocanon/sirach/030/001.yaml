translation:
  text: He who loves his son will continue the lash for him[b][a], so that he may rejoice in his final days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will be diligent with scourgings for him.' The Greek verb suggests persistent or assiduous action, and the noun can mean 'whips,' 'lashes,' or 'scourgings.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'upon/at his last things.' The phrase may refer to his later outcome, latter years, or final end.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὁ ἀγαπῶν
  chosen: He who loves
  alternatives:
  - Whoever loves
  lexicon: LSJ
  rationale: The articular participle functions generically. 'He who loves' preserves the masculine singular form and proverbial style of the Greek, in line with the project's gender-accurate policy.
- source_word: τὸν υἱὸν αὐτοῦ
  chosen: his son
  alternatives:
  - his child
  lexicon: LSJ
  rationale: υἱός specifically means 'son,' not the gender-neutral 'child.' The verse speaks in masculine familial terms, so the translation keeps that specificity.
- source_word: ἐνδελεχήσει
  chosen: will keep ... ready
  alternatives:
  - will persist in
  - will apply continually
  - will be diligent with
  lexicon: LSJ
  rationale: The verb conveys persistence or assiduous continuance. In this disciplinary context, 'will keep the whip ready' captures ongoing readiness/use without overtranslating into a more explicit action than the Greek states.
- source_word: μάστιγας
  chosen: the whip
  alternatives:
  - scourges
  - lashes
  - whippings
  lexicon: LSJ
  rationale: Although plural in Greek ('whips/scourgings'), idiomatic English in this proverb works better with the collective singular 'the whip.' This preserves the disciplinary image while remaining readable. 'Scourges' is too archaic; 'whippings' shifts from instrument to act.
- source_word: αὐτῷ
  chosen: for him
  alternatives:
  - on him
  - to him
  lexicon: LSJ
  rationale: 'The dative here is naturally rendered in English as reference/advantage: the disciplinary instrument is kept ready ''for him,'' i.e., with respect to the son. Rendering it ''on him'' would make the action more explicit than the Greek wording requires.'
- source_word: ἵνα εὐφρανθῇ
  chosen: so that he may rejoice
  alternatives:
  - so that he may be gladdened
  - so that he may delight
  lexicon: LSJ
  rationale: The clause expresses intended result/purpose. 'Rejoice' is natural modern English and preserves the emotional force of εὐφραίνω.
- source_word: ἐπʼ ἐσχάτων αὐτοῦ
  chosen: in his latter end
  alternatives:
  - at his end
  - in his later years
  - in the end concerning him
  lexicon: LSJ
  rationale: The phrase is somewhat idiomatic and can refer to one's later outcome or final stage. 'In his latter end' preserves the proverbial gravity and leaves the Greek's breadth intact, rather than narrowing it to either death or merely old age.
