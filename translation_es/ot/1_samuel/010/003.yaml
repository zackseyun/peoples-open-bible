translation:
  language: es
  text: 'Entonces pasarás de allí y seguirás adelante; llegarás a la encina[a] de Tabor. Allí te saldrán al encuentro tres hombres que suben a Dios en Betel[b]: uno lleva tres cabritos, otro lleva tres panes, y otro lleva un odre[c] de vino.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el terebinto de Tabor». El término hebreo puede referirse a un árbol grande como una encina o un terebinto.
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «que suben a Dios en Betel»; probablemente se refiere a un viaje a un lugar de culto en Betel.'
    reason: cultural_note
  - marker: c
    text: O «un odre de vino».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְחָלַפְתָּ
  english_pob_choice: you will pass on
  chosen_spanish: pasarás de allí
  alternatives_spanish:
  - seguirás
  - irás pasando
  lexicon: HALOT
  rationale: חָלַף expresa el paso o tránsito desde un lugar. «Pasarás de allí» conserva el movimiento secuencial sin sobretraducirlo como una acción distinta.
- source_word: וָהָלְאָה
  english_pob_choice: go farther
  chosen_spanish: seguirás adelante
  alternatives_spanish:
  - irás más allá
  - continuarás
  lexicon: HALOT
  rationale: El adverbio intensifica la idea de continuar el desplazamiento. «Seguirás adelante» reproduce esa progresión en un español natural.
- source_word: אֵלוֹן תָּבוֹר
  english_pob_choice: the oak of Tabor
  chosen_spanish: el encinar de Tabor
  alternatives_spanish:
  - la encina de Tabor
  - el terebinto de Tabor
  lexicon: HALOT
  rationale: אֵלוֹן puede referirse a un árbol grande, como encina o terebinto. «Encinar» mantiene la referencia al árbol grande y evita decidir de forma demasiado rígida por una especie botánica única.
- source_word: וּמְצָאוּךָ
  english_pob_choice: will meet you
  chosen_spanish: te encontrarán
  alternatives_spanish:
  - te saldrán al encuentro
  - te hallarán
  lexicon: HALOT
  rationale: Aunque literalmente significa «encontrar», en este contexto de encuentro anunciado «te encontrarán» comunica de modo natural la intersección prevista.
- source_word: עֹלִים אֶל הָאֱלֹהִים בֵּית אֵל
  english_pob_choice: going up to God at Bethel
  chosen_spanish: que suben a Dios en Betel
  alternatives_spanish:
  - que van a Betel para adorar a Dios
  - que suben a la casa de Dios en Betel
  lexicon: HALOT
  rationale: La frase hebrea conserva la orientación religiosa sin explicitar el acto litúrgico. «Suben a Dios en Betel» mantiene esa tensión y sigue de cerca el sentido del original sin añadir «adorar».
- source_word: גְדָיִים
  english_pob_choice: young goats
  chosen_spanish: cabritos
  alternatives_spanish:
  - cabras pequeñas
  - crías de cabra
  lexicon: HALOT
  rationale: גְדָיִים son cabritos, es decir, crías de cabra. «Cabritos» es preciso y natural en español.
- source_word: כִּכְּרוֹת לֶחֶם
  english_pob_choice: loaves of bread
  chosen_spanish: panes
  alternatives_spanish:
  - hogazas de pan
  - tortas de pan
  lexicon: HALOT
  rationale: El plural sugiere unidades de pan, probablemente panes redondos. «Panes» es suficiente en español y evita precisar más de lo que el hebreo exige.
- source_word: נֵבֶל יָיִן
  english_pob_choice: a wineskin
  chosen_spanish: un odre de vino
  alternatives_spanish:
  - un cuero de vino
  - un pellejo de vino
  lexicon: HALOT
  rationale: נֵבֶל designa un recipiente flexible para líquido. En español bíblico y comprensible, «odre» comunica bien el objeto sin perder la imagen material.
theological_decisions:
- issue: Sentido de «suben a Dios en Betel»
  english_pob_reading: A pilgrimage or approach to a worship site at Bethel is described, without specifying more than the Hebrew states.
  chosen_spanish_reading: Se conserva la idea de subida religiosa hacia Dios en Betel sin añadir explícitamente el verbo «adorar».
  alternative_spanish_readings:
  - que van a Betel para adorar a Dios
  - que suben a la casa de Dios en Betel
  rationale: El hebreo describe la dirección y el contexto sagrado, pero no explicita el acto litúrgico concreto. La redacción española mantiene esa sobriedad y evita añadir contenido no garantizado por el texto.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La redacción sigue el estado revisado más reciente del POB inglés, que prefirió «wineskin» frente a «skin of wine» por mayor naturalidad y precisión. En español se refleja con «odre de vino», evitando una perífrasis más pesada y manteniendo la equivalencia léxica del recipiente.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo expresa el nombre divino; aquí el texto dice אֱלֹהִים, por lo que se mantiene «Dios».
  - Se conserva «cabritos» para גְדָיִים por precisión léxica y registro bíblico claro.
  - «Betel» se translitera de forma estable como topónimo bíblico.
  - «Odre» se prefiere como equivalente natural de נֵבֶל en este contexto, en línea con la revisión inglesa que optó por un recipiente simple y preciso.
