  - 수치를 당하게 하고
  lexicon: BDAG
  rationale: δειγματίζω는 공개적 망신·전시의 함의가 강하다. 한국어 「공개적으로 망신 주고」가 그 사회적 폭력의 무게를 그대로 담는다.
- source_word: λάθρᾳ ἀπολῦσαι
  english_pob_choice: divorce her quietly
  chosen_korean: 조용히 이혼하려고
  alternatives_korean:
