translation:
  language: es
  text: Y sobre la mesa de la Presencia[a] extenderán un paño azul, y pondrán sobre ella los platos, las copas, los tazones y las jarras para la libación; y el pan continuo[b] estará sobre ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, tradicionalmente, ‘la mesa de la proposición’. El hebreo es más literalmente ‘la mesa de la Presencia’.
    reason: alternative_reading
  - marker: b
    text: O, ‘el pan regular’. Esto se refiere al pan que se mantenía regularmente delante de Yahvé sobre la mesa.
    reason: lexical_alternative
lexical_decisions:
- source_word: שֻׁלְחַן הַפָּנִים
  english_pob_choice: the table of the Presence
  chosen_spanish: la mesa de la Presencia
  alternatives_spanish:
  - la mesa de la presencia
  - la mesa de los panes de la Presencia
  - la mesa de la proposición
  lexicon: HALOT
  rationale: Se conserva el sentido literal de ‘Presencia’ como traducción del hebreo idiomático ‘la cara/presencia’, manteniendo el matiz cultual y evitando la tradicional ‘proposición’, que en español es menos transparente.
- source_word: יִפְרְשׂוּ
  english_pob_choice: they shall spread
  chosen_spanish: extenderán
  alternatives_spanish:
  - se extenderán
  - cubrirán
  - pondrán extendido
  lexicon: HALOT
  rationale: ‘Extenderán’ comunica con naturalidad la acción de desplegar una tela sobre la mesa sin añadir la idea de cubrir más de lo que el verbo exige.
- source_word: בֶּגֶד תְּכֵלֶת
  english_pob_choice: a blue cloth
  chosen_spanish: un paño de color azul
  alternatives_spanish:
  - un paño azul
  - una tela azul
  - un lienzo azul
  lexicon: HALOT
  rationale: ‘Paño de color azul’ evita una calca rígida y expresa bien la tela ritual de tono azul; ‘azul’ es suficiente en español sin precisar más el matiz cromático.
- source_word: הַקְּעָרֹת
  english_pob_choice: the plates
  chosen_spanish: los platos
  alternatives_spanish:
  - las bandejas
  - los platos hondos
  - las fuentes
  lexicon: HALOT
  rationale: En el contexto de utensilios de mesa del santuario, ‘platos’ es el equivalente más claro y natural en español.
- source_word: הַכַּפֹּת
  english_pob_choice: the cups
  chosen_spanish: las copas
  alternatives_spanish:
  - los tazones pequeños
  - los cuencos
  - las cucharas
  lexicon: HALOT
  rationale: Aunque el término puede abarcar recipientes de distinto tipo, ‘copas’ funciona bien en la serie de utensilios de mesa y mantiene una forma natural en español.
- source_word: הַמְּנַקִּיֹּת
  english_pob_choice: the bowls
  chosen_spanish: los tazones
  alternatives_spanish:
  - los cuencos
  - los recipientes
  - las jarras
  lexicon: HALOT
  rationale: ‘Tazones’ refleja un recipiente hondo y distingue este elemento de las copas anteriores, sin imponer una precisión innecesaria sobre la forma exacta.
- source_word: קְשׂוֹת הַנָּסֶךְ
  english_pob_choice: the pitchers for the drink offering
  chosen_spanish: las jarras para la libación
  alternatives_spanish:
  - las jarras para el derramamiento
  - los recipientes de la libación
  - las vasijas para la ofrenda líquida
  lexicon: HALOT
  rationale: ‘Libación’ expresa el sentido sacrificial de נֶסֶךְ de manera más precisa que ‘ofrenda líquida’, y ‘jarras’ resulta natural para los recipientes destinados a verter.
- source_word: לֶחֶם הַתָּמִיד
  english_pob_choice: the regular bread
  chosen_spanish: el pan regular
  alternatives_spanish:
  - el pan continuo
  - el pan perpetuo
  - el pan de la ofrenda continua
  lexicon: HALOT
  rationale: Se conserva la idea de regularidad/prescripción continua que tiene el inglés POB. ‘Pan regular’ es más transparente para el lector español que ‘pan continuo’, aunque ambas opciones son posibles.
- source_word: עָלָיו יִהְיֶה
  english_pob_choice: shall be on it
  chosen_spanish: estará sobre ella
  alternatives_spanish:
  - permanecerá sobre ella
  - deberá estar sobre ella
  - se hallará sobre ella
  lexicon: HALOT
  rationale: El verbo hebreo expresa simplemente que el pan está allí; ‘estará’ reproduce bien ese estado sin añadir una permanencia explícita que el texto no formule de modo directo.
theological_decisions:
- issue: Nombre del objeto cultual y su carga tradicional
  english_pob_reading: the table of the Presence
  chosen_spanish_reading: la mesa de la Presencia
  alternative_spanish_readings:
  - la mesa de la proposición
  - la mesa de los panes de la Presencia
  rationale: Se sigue la decisión POB de transparentar el hebreo literal ‘Presencia’ y no ocultarlo tras la fórmula tradicional. Esto preserva la tensión entre la designación idiomática y la función del objeto en el santuario.
  doctrine_reference: Éxodo 25:30; Levítico 24:5-9
translation_notes:
  revision_awareness: Se incorporó la revisión inglesa más reciente sobre el utensilio de la libación, usando ‘jarras’/‘libación’ en una formulación española natural; también se evitó la traducción tradicional opaca de ‘showbread’ para mantener la transparencia auditada del POB.
  spanish_consistency_notes:
  - Se mantuvo ‘Presencia’ con mayúscula para reflejar el sustantivo cultual del sintagma hebreo y armonizar con el estilo POB.
  - Se usaron nombres de recipientes en serie natural para español moderno, sin intentar reconstruir con exceso de precisión las formas exactas de cada vasija.
  - ‘Pan regular’ conserva la regularidad cultual destacada por el POB inglés y no introduce ‘continua’ en el texto principal.
