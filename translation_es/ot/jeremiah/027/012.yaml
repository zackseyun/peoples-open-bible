base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/027/012.yaml
  text: And to Zedekiah king of Judah I spoke all these words[a], saying, “Bring your necks under the yoke of the king of Babylon, and serve him and his people[b], and live.”
  footnotes:
