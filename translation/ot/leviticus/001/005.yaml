id: LEV.1.5
reference: Leviticus 1:5
source:
  edition: WLC
  text: וְ/שָׁחַ֛ט אֶת בֶּ֥ן הַ/בָּקָ֖ר לִ/פְנֵ֣י יְהוָ֑ה וְ֠/הִקְרִיבוּ בְּנֵ֨י אַהֲרֹ֤ן הַֽ/כֹּֽהֲנִים֙ אֶת הַ/דָּ֔ם וְ/זָרְק֨וּ אֶת הַ/דָּ֤ם עַל הַ/מִּזְבֵּ֨חַ֙ סָבִ֔יב אֲשֶׁר פֶּ֖תַח אֹ֥הֶל מוֹעֵֽד־־־־־׃
translation:
  text: And he shall slaughter the young bull before Yahweh[a], and Aaron’s sons, the priests, shall present the blood and throw the blood against the altar all around[b], which is at the entrance of the tent of meeting.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dash the blood' or, more traditionally, 'sprinkle the blood.' The Hebrew verb denotes throwing/tossing the blood in ritual application.
    reason: lexical_alternative
  - marker: b
    text: Literally 'son of the herd,' an idiom for a bovine animal; here rendered 'young bull.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁחַט
  chosen: he shall slaughter
  alternatives:
  - he slaughtered
  - he shall kill
  lexicon: HALOT
  rationale: The qatal form in this procedural sacrificial context functions instructionally/future-like in English. 'Slaughter' is more precise than 'kill' for ritual animal killing.
- source_word: בֶּן הַבָּקָר
  chosen: the young bull
  alternatives:
  - the bull from the herd
  - the head of cattle
  lexicon: HALOT
  rationale: The construct literally means 'son of the herd/cattle,' an idiom for a bovine animal, here naturally rendered 'young bull' in sacrificial context. This is clearer and more idiomatic than a wooden literalism.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: Standard covenantal spatial language. Per doctrine, יְהוָה is rendered 'the LORD.' 'Before' preserves the ritual setting succinctly.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Required by the doctrine's contested-terms table for the divine name.
- source_word: וְהִקְרִיבוּ
  chosen: shall present
  alternatives:
  - shall bring near
  - shall offer
  lexicon: HALOT
  rationale: The hiphil of קרב means to bring near/present. 'Present' fits the immediate object 'the blood' better than 'offer,' which can sound overly technical or imply the whole sacrifice rather than this priestly handling of the blood.
- source_word: בְּנֵי אַהֲרֹן הַכֹּהֲנִים
  chosen: Aaron’s sons, the priests
  alternatives:
  - the sons of Aaron, the priests
  - Aaron's priestly sons
  lexicon: HALOT
  rationale: This preserves both the familial designation and the appositional priestly role. The apposition is important because the priests, not the offerer, handle the blood at this stage.
- source_word: הַדָּם
  chosen: the blood
  lexicon: HALOT
  rationale: Definite article retained. The blood is the specific blood of the slaughtered animal and is central to the ritual action.
- source_word: וְזָרְקוּ
  chosen: shall throw
  alternatives:
  - shall sprinkle
  - shall dash
  lexicon: HALOT
  rationale: זרק commonly denotes throwing/tossing the blood, stronger than the English cultic term 'sprinkle.' 'Throw' best reflects the physical action while remaining readable. 'Dash' is possible but slightly more interpretive in tone.
- source_word: עַל הַמִּזְבֵּחַ סָבִיב
  chosen: against the altar all around
  alternatives:
  - on the altar all around
  - around the altar
  lexicon: HALOT
  rationale: With blood manipulation, English 'against the altar' better conveys application to the sides/surface than a simple 'on.' 'All around' renders סָבִיב naturally.
- source_word: אֲשֶׁר פֶּתַח אֹהֶל מוֹעֵד
  chosen: which is at the entrance of the tent of meeting
  alternatives:
  - that is by the doorway of the tent of meeting
  - which is before the entrance to the tent of meeting
  lexicon: HALOT
  rationale: This relative clause identifies the altar's location. 'Tent of meeting' is the standard transparent rendering of אֹהֶל מוֹעֵד.
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the meeting tent
  - the tabernacle
  lexicon: HALOT
  rationale: A direct and established rendering of the Hebrew phrase. 'Tabernacle' is less literal and can import later architectural associations.
