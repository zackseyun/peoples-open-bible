translation:
  language: es
  text: Entonces el rey cruzó a Gilgal[a], y Kimham cruzó con él. Y todo el pueblo de Judá acompañó al rey a cruzar[b], y también la mitad del pueblo de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hacia Gilgal». El nombre hebreo lleva una terminación direccional que indica movimiento hacia Gilgal.
    reason: lexical_alternative
  - marker: b
    text: O «hizo pasar al rey» / «llevó al rey al otro lado». El verbo hebreo puede llevar aquí un matiz causativo con objeto directo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲבֹר
  english_pob_choice: crossed over
  chosen_spanish: pasó
  alternatives_spanish:
  - cruzó
  - pasó al otro lado
  lexicon: HALOT
  rationale: En este contexto narrativo, עבר expresa el paso por un cruce, probablemente del Jordán. «Pasó» es natural en español y conserva el movimiento sin volverlo más técnico de lo necesario.
- source_word: הַגִּלְגָּלָה
  english_pob_choice: to Gilgal
  chosen_spanish: a Gilgal
  alternatives_spanish:
  - hacia Gilgal
  - hasta Gilgal
  lexicon: HALOT
  rationale: El sufijo direccional indica movimiento hacia el lugar. «A Gilgal» transmite bien la dirección en español.
- source_word: וְכִמְהָן
  english_pob_choice: and Kimham
  chosen_spanish: Kimham
  alternatives_spanish:
  - y Kimham
  lexicon: Transliteración propia
  rationale: El nombre propio se translitera. En español, puede omitirse la repetición de «y» si la coordinación ya queda clara en la frase anterior; aquí se mantiene el nombre sin alterar su forma.
- source_word: עָבַר עִמּוֹ
  english_pob_choice: crossed over with him
  chosen_spanish: pasó con él
  alternatives_spanish:
  - cruzó con él
  - pasó junto con él
  lexicon: HALOT
  rationale: Se conserva el mismo verbo de movimiento para Kimham y se añade la compañía con «con él», que es fiel y natural.
- source_word: וְכָל עַם יְהוּדָה
  english_pob_choice: all the people of Judah
  chosen_spanish: todo el pueblo de Judá
  alternatives_spanish:
  - todo el pueblo de Judá
  - todos los hombres de Judá
  lexicon: HALOT
  rationale: «Pueblo» reproduce bien עַם y evita restringir innecesariamente a varones. «De Judá» mantiene la referencia territorial/política.
- source_word: וַיַּעַבְרוּ אֶת־הַמֶּלֶךְ
  english_pob_choice: escorted the king across
  chosen_spanish: escoltó al rey al cruzar
  alternatives_spanish:
  - brought the king across
  - causó que el rey cruzara
  lexicon: HALOT
  rationale: El hebreo puede tener fuerza causativa o de acompañamiento con objeto directo. «Escoltó al rey al cruzar» preserva la acción de acompañar al rey en el cruce sin forzar una traducción mecánica.
- source_word: וְגַם
  english_pob_choice: and also
  chosen_spanish: y también
  alternatives_spanish:
  - también
  - e incluso
  lexicon: HALOT
  rationale: La partícula añade otro grupo participante. «Y también» conserva el valor aditivo de manera clara.
- source_word: חֲצִי עַם יִשְׂרָאֵל
  english_pob_choice: half the people of Israel
  chosen_spanish: la mitad del pueblo de Israel
  alternatives_spanish:
  - la mitad del pueblo de Israel
  - la mitad de la gente de Israel
  lexicon: HALOT
  rationale: La frase es cuantitativa y contrasta con Judá. «La mitad del pueblo de Israel» mantiene la división política y el sentido numérico con naturalidad.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el audit trail inglés y el hebreo: mantiene el verbo de cruce para ambos usos de עבר, respeta el valor direccional de la forma con sufijo en «Gilgal», y conserva la posible ambigüedad causativa/acompañante en la acción de Judá mediante una nota alternativa.'
  spanish_consistency_notes:
  - Se usa «pasó» como equivalente principal de עבר para una lectura fluida y sobria en español.
  - Se evita «SEÑOR» porque no hay aquí sustitución del nombre divino.
  - «Pueblo» se mantiene para עַם tanto en Judá como en Israel, preservando el paralelismo cuantitativo.
  - La nota [a] se ancla en «al cruzar» porque ahí reside la alternativa semántica documentada por el audit trail.
