review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del griego: Judith pide que se reciban sus palabras, solicita hablar en presencia del superior y afirma que no dirá mentira esa noche. También conserva la distinción entre δοῦλη y παιδίσκη, y traduce adecuadamente κύριος humano como «mi señor». Sin embargo, la omisión de «a él» debilita levemente εἶπεν πρὸς αὐτόν, y «y no diré mentira» suena menos natural e idiomático en español que «y no diré una mentira» o mejor «y no mentiré».'
  spanish_quality_summary: El texto es mayormente claro y digno, pero hay una aspereza de estilo en «Y Judith le dijo» al faltar el complemento «a él» presente en la fuente, y sobre todo en «no diré mentira», giro comprensible pero poco natural en español bíblico moderno. «Que tu sirvienta hable delante de ti» funciona, aunque «ante ti» eleva ligeramente el registro sin perder naturalidad.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: δοῦλη -> «esclava» está bien y además se documenta con nota; κύριος humano -> «mi señor» es correcto. La diferenciación de παιδίσκη respecto de δοῦλη también está bien conservada. No hay conflicto con Yahvé/Mesías u otros términos de glosario mayor.'
  issues:
  - severity: medium
    issue: «no diré mentira» es poco idiomático en español
    rationale: Aunque comunica el sentido de ψεῦδος, en español natural y digno suena mejor «no diré una mentira» o, más elegantemente, «no mentiré». La revisión mejora legibilidad sin perder el contenido.
  - severity: low
    issue: Falta el referente explícito de πρὸς αὐτόν
    rationale: El griego dice que Judith habló «a él». «Y Judith dijo» sería admisible por contexto, pero «Y Judith le dijo a él» o al menos «Y Judith le dijo» preserva mejor la dirección del habla. El borrador ya tiene «le dijo», así que el punto es menor; se puede reforzar con coma y fluidez general.
  - severity: low
    issue: «delante de ti» podría afinarse a «ante ti»
    rationale: Ambas opciones son fieles a κατὰ πρόσωπόν σου. «Ante ti» mantiene mejor el tono formal y evita una espacialidad demasiado física, aunque no es un error grave.
