translation:
  language: es
  text: 'Pero David dijo[a]: «No hagan así, hermanos míos, con lo que Yahvé nos ha dado. Él nos ha guardado[b] y ha dado en nuestra mano[c] la banda invasora que vino contra nosotros»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «respecto de lo que Yahvé nos ha dado». La construcción hebrea es algo comprimida y presenta el asunto de la discusión.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «nos ha preservado» o «nos ha protegido».'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «en nuestra mano», un modismo para dar algo bajo el poder o control de alguien.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא תַעֲשׂוּ כֵן
  english_pob_choice: You must not do so
  chosen_spanish: No hagan así
  alternatives_spanish:
  - No deben hacer así
  - No hagan eso
  lexicon: HALOT
  rationale: La prohibición en plural se expresa con naturalidad en español con una negativa directa e imperativa. «No hagan así» conserva el tono de reprensión sin añadir más fuerza modal de la que exige el hebreo.
- source_word: אֶחָי
  english_pob_choice: my brothers
  chosen_spanish: hermanos míos
  alternatives_spanish:
  - mis hermanos
  - mis hermanos y compañeros
  lexicon: HALOT
  rationale: El vocativo fraterno se mantiene de forma literal y comunicativa. «Hermanos míos» reproduce el matiz relacional del hebreo sin neutralizar el término.
- source_word: אֵת אֲשֶׁר נָתַן יְהוָה לָנוּ
  english_pob_choice: with what Yahweh has given us
  chosen_spanish: con lo que Yahvé nos ha dado
  alternatives_spanish:
  - respecto de lo que Yahvé nos ha dado
  - acerca de lo que Yahvé nos ha dado
  lexicon: HALOT
  rationale: La construcción hebrea es comprimida y funciona como introducción del asunto en discusión. En español, «con lo que…» sigue de cerca la fuerza relacional del pasaje y se ajusta al contexto del reparto del botín.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Yahveh
  lexicon: HALOT
  rationale: Se conserva el nombre divino personal con la forma de uso establecida en el proyecto en español. «Yahvé» evita la sustitución por un título y refleja la decisión auditada del texto fuente.
- source_word: וַיִּשְׁמֹר אֹתָנוּ
  english_pob_choice: He has preserved us
  chosen_spanish: nos ha guardado
  alternatives_spanish:
  - nos ha preservado
  - nos ha protegido
  lexicon: HALOT
  rationale: שׁמר aquí comunica la idea de guardar/proteger en el contexto bélico. «Nos ha guardado» es natural en español y conserva el sentido de protección divina sin sobreinterpretarlo.
- source_word: וַיִּתֵּן
  english_pob_choice: has given
  chosen_spanish: ha dado
  alternatives_spanish:
  - dio
  - nos entregó
  lexicon: HALOT
  rationale: Se mantiene el perfecto compuesto, coherente con la voz directa en el discurso. «Ha dado» refleja el acto de conceder sin forzar una lectura distinta.
- source_word: הַגְּדוּד
  english_pob_choice: the raiding band
  chosen_spanish: la banda de merodeadores
  alternatives_spanish:
  - el grupo de saqueadores
  - la tropa
  lexicon: HALOT
  rationale: El sustantivo designa a la fuerza hostil de incursión; «banda de merodeadores» conserva su matiz agresivo y concreto mejor que un término militar neutro.
- source_word: הַבָּא עָלֵינוּ
  english_pob_choice: that came against us
  chosen_spanish: que vino contra nosotros
  alternatives_spanish:
  - que cayó sobre nosotros
  - que se vino contra nosotros
  lexicon: HALOT
  rationale: La participial hebrea indica la aproximación hostil del enemigo. «Que vino contra nosotros» preserva la dirección adversarial con un español claro y sobrio.
- source_word: בְּיָדֵנוּ
  english_pob_choice: into our hand
  chosen_spanish: en nuestra mano
  alternatives_spanish:
  - en nuestro poder
  - en nuestras manos
  lexicon: HALOT
  rationale: Se conserva el singular idiomático de «mano» como figura de poder/control. «En nuestra mano» mantiene el valor bíblico de la expresión; el contexto ya deja claro que se trata de dominio sobre el botín.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahveh
  rationale: El texto hebreo usa el Tetragrama directamente, y el proyecto en español mantiene el nombre divino en forma explícita. «Yahvé» conserva la decisión teológica y filológica de no sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'La versión inglesa auditada permanece en acuerdo alto y no registra revisiones aplicadas. La presente redacción sigue esa línea, ajustando solamente la formulación española para que sea natural, precisa y fiel al hebreo, manteniendo las tres decisiones auditadas: la construcción comprimida de אֵת אֲשֶׁר, el valor de שׁמר y el modismo de בְּיָדֵנוּ.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma coherente con la política del proyecto para יְהוָה.
  - Se preserva el lenguaje fraterno («hermanos míos») como equivalente directo de אֶחָי.
  - «En nuestra mano» se conserva como modismo bíblico, y la nota aclara su sentido sin sustituirlo por una paráfrasis excesiva.
  - El tono general busca ser publicable y digno, sin caer en calco rígido ni en lenguaje eclesiástico tradicional no justificado por el texto.
