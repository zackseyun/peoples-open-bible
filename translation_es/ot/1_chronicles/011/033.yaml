lexical_decisions:
- source_word: עַזְמָוֶת
  english_pob_choice: Azmaveth
  chosen_spanish: Azmavet
  alternatives_spanish:
  - Azmaveth
  lexicon: Nombre propio hebreo (HNp)
  rationale: Se translitera el nombre propio; en español se prefiere una forma que conserve la vocalización y se adapte mejor a la ortografía habitual, manteniendo la referencia al mismo antropónimo del hebreo.
- source_word: הַבַּחֲרוּמִי
  english_pob_choice: the Baharumite
  chosen_spanish: el baharumita
  alternatives_spanish:
  - el bahurimita
  - el hombre de Bahurim
  lexicon: Gentilicio hebreo (HALOT)
  rationale: Se conserva el valor gentilicio con artículo. 'Baharumita' sigue de cerca la forma masorética; 'bahurimita' sería una asociación interpretativa con Bahurim, pero el texto base en esta forma apunta primero a la vocalización presente.
- source_word: אֶלְיַחְבָּא
  english_pob_choice: Eliyahba
  chosen_spanish: Eliyaba
  alternatives_spanish:
  - Eliyahba
  - Eliahba
  lexicon: Nombre propio hebreo (HNp)
  rationale: Se translitera el nombre propio. En español, 'Eliyaba' fluye mejor fonéticamente y conserva el elemento teofórico visible en la forma hebrea, sin añadir interpretación.
- source_word: הַשַּׁעַלְבֹנִי
  english_pob_choice: the Shaalbonite
  chosen_spanish: el saalbonita
  alternatives_spanish:
  - el shaalbonita
  - el hombre de Saalbón
  lexicon: Gentilicio hebreo (HALOT)
  rationale: Se mantiene el gentilicio en forma breve y lista-genealógica. 'Saalbonita' refleja la forma hebrea de modo directo; 'Shaalbonita' reproduce más literalmente la secuencia consonántica, pero resulta menos natural en español.
translation_notes:
  revision_awareness: El pasaje no presenta revisiones textuales o cambios de sentido relevantes en el audit trail; la redacción española sigue de cerca la lista nominal del hebreo y preserva las dos asociaciones gentilicias documentadas por el POB inglés.
  spanish_consistency_notes:
  - Se mantiene el estilo de lista genealógica con nombres propios transliterados y gentilicios breves.
  - No se traduce el artículo gentilicio como parte del nombre; se conserva la estructura descriptiva del hebreo.
  - La nota al pie marca la única ambigüedad lexical documentada en el inglés POB para el primer gentilicio.
