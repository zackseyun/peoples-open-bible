theological_decisions:
- issue: Rendering of נַחֲלָתִי with covenantal force
  chosen_reading: my inheritance
  alternative_readings:
  - my heritage
  - my possession
  rationale: The noun נַחֲלָה carries covenantal and territorial overtones. 'My inheritance' preserves the biblical-theological weight of Israel as belonging to the LORD, while remaining understandable in modern English.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: Force of עַל in the judgment clause
  chosen_reading: on behalf of my people and my inheritance, Israel
  alternative_readings:
  - because of my people and my inheritance, Israel
  - concerning my people and my inheritance, Israel
  rationale: The preposition can mark cause, concern, or basis. 'On behalf of' best captures the sense that the LORD is judicially acting for his people because of the nations' mistreatment of them, without over-paraphrasing.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
