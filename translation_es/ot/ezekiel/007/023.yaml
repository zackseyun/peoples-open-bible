translation:
  language: es
  text: Haz la cadena[a], porque la tierra está llena de crímenes sangrientos[b], y la ciudad está llena de violencia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «grillete» o «atadura». El término hebreo probablemente evoca restricción, prisión o cautiverio bajo juicio.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «juicio de sangres». La frase probablemente se refiere a culpa de sangre, injusticia homicida o crímenes que merecen juicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲשֵׂה
  english_pob_choice: Make
  chosen_spanish: Haz
  alternatives_spanish:
  - Hazla
  - Prepara
  - Forja
  lexicon: HALOT
  rationale: El imperativo qal masculino singular de עשה pide un mandato directo; en español, «haz» comunica con naturalidad la orden y preserva la inmediatez profética.
- source_word: הָרַתּוֹק
  english_pob_choice: the chain
  chosen_spanish: la cadena
  alternatives_spanish:
  - el grillete
  - el cepo
  - la atadura
  lexicon: HALOT
  rationale: El POB inglés opta por «chain» para mantener la imagen concreta de sujeción/judgment. «Cadena» es el equivalente español más natural y digno, sin diluir la fuerza de restricción, cautiverio o confinamiento.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón del mandato. En español, «porque» expresa con claridad la relación causal explicada por el texto.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la tierra del país
  lexicon: HALOT
  rationale: En el contexto de juicio de Ezequiel, el referente territorial se entiende mejor como la tierra del pueblo; «tierra» mantiene el alcance bíblico sin forzar una explicación geográfica moderna.
- source_word: מָלְאָה
  english_pob_choice: is full of
  chosen_spanish: está llena de
  alternatives_spanish:
  - se ha llenado de
  - está colmada de
  lexicon: HALOT
  rationale: El perfecto hebreo tiene valor resultativo; «está llena de» comunica de manera idiomática el estado resultante y conserva la idea de saturación.
- source_word: מִשְׁפַּט דָּמִים
  english_pob_choice: bloody crimes
  chosen_spanish: juicio de sangre
  alternatives_spanish:
  - juicio sangriento
  - crímenes de sangre
  - culpa de sangre
  lexicon: HALOT
  rationale: He preservado la tensión literal del hebreo («juicio de sangres») en una forma española auditable. «Juicio de sangre» retiene el matiz forense y violento que el POB inglés explica como sangre culpable o injusticia homicida, sin convertirlo prematuramente en una paráfrasis interpretativa.
- source_word: וְהָעִיר
  english_pob_choice: and the city
  chosen_spanish: y la ciudad
  alternatives_spanish:
  - y la urbe
  lexicon: HALOT
  rationale: La coordinación simple se traduce directamente. «La ciudad» mantiene el referente concreto, probablemente Jerusalén, sin añadir explicitación no presente en el versículo.
- source_word: חָמָס
  english_pob_choice: violence
  chosen_spanish: violencia
  alternatives_spanish:
  - opresión
  - injusticia
  - agravio
  lexicon: HALOT
  rationale: «Violencia» es el equivalente español estándar para חמס en textos proféticos de juicio, y conserva el sentido de brutalidad e injusticia social que el POB inglés destaca.
theological_decisions:
- issue: Interpretación de הָרַתּוֹק como imagen de juicio y cautiverio
  english_pob_reading: A literal or symbolic chain/fetter associated with coming judgment and captivity
  chosen_spanish_reading: Una cadena literal o simbólica asociada con el juicio venidero y el cautiverio
  alternative_spanish_readings:
  - Un grillete de juicio
  - Una atadura sin referencia explícita al cautiverio
  - Una preparación para el sitio
  rationale: La imagen profética apunta a restricción, captura o encierro bajo juicio. Traducir «cadena» conserva el símbolo concreto sin decidir en exceso el mecanismo exacto, en línea con la lectura auditada del POB inglés.
  doctrine_reference: Ezequiel 7:23; contexto inmediato de juicio en Ezequiel 7
- issue: Valor de מִשְׁפַּט דָּמִים como fórmula forense saturada de sangre
  english_pob_reading: Literally, 'judgment of bloods.' The phrase likely refers to bloodguilt, murderous injustice, or crimes deserving judgment.
  chosen_spanish_reading: Una expresión forense de sangre culpable, homicida o digna de juicio
  alternative_spanish_readings:
  - Crímenes sangrientos
  - Culpa de sangre
  - Juicio por derramamiento de sangre
  rationale: 'He mantenido la ambigüedad documentada: el hebreo puede leerse como sangre culpable, injusticia homicida o crímenes que merecen sentencia. «Juicio de sangre» deja visible la tensión entre literalidad y sentido contextual, en vez de resolverla demasiado pronto.'
  doctrine_reference: Ezequiel 7:23; cf. lenguaje profético de sangre culpable en el AT
translation_notes:
  revision_awareness: La versión inglesa auditada no presentó cambios en la revisión más reciente; por eso esta propuesta sigue de cerca sus decisiones léxicas y su lectura teológica, adaptándolas al español con el mismo nivel de cautela interpretativa.
  spanish_consistency_notes:
  - He evitado «SEÑOR» para el nombre divino porque este versículo no contiene el tetragrámaton.
  - He mantenido «cadena» como imagen concreta, coherente con la preferencia inglesa por un sustantivo físico y no abstracto.
  - «Juicio de sangre» conserva la tensión semántica del hebreo y permite que la nota aclare el matiz sin borrar la ambigüedad.
  - «Violencia» traduce חָמָס de forma estable y comprensible en español bíblico moderno.
