translation:
  language: es
  text: a causa de su maldad que hicieron, hasta provocarme a ira, yendo a quemar incienso y a servir a otros dioses[a], a quienes ni ellos, ni ustedes ni sus padres habían conocido[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'adorar a otros dioses'. El hebreo עבד puede denotar servicio religioso o adoración.
    reason: lexical_alternative
  - marker: b
    text: 'O ''a quienes no habían conocido ni ellos, ni ustedes ni sus padres''. El hebreo termina con una enumeración enfática: ''ellos, ustedes y sus padres''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִפְּנֵי
  english_pob_choice: because of
  chosen_spanish: a causa de
  alternatives_spanish:
  - por
  - debido a
  lexicon: HALOT
  rationale: La preposición introduce la causa; «a causa de» expresa de manera natural y fiel la relación causal sin perder el valor explicativo del hebreo.
- source_word: רָעָתָם
  english_pob_choice: their evil
  chosen_spanish: su maldad
  alternatives_spanish:
  - su mal
  - su perversidad
  lexicon: HALOT
  rationale: Aquí רָעָה tiene sentido moral, no de calamidad. «Maldad» conserva ese peso ético en español y funciona bien con el plural posesivo del texto.
- source_word: לְהַכְעִסֵנִי
  english_pob_choice: to provoke me to anger
  chosen_spanish: para provocarme a ira
  alternatives_spanish:
  - para enojarme
  - para provocarme
  lexicon: HALOT
  rationale: El hifil de כעס expresa causar ira; «provocarme a ira» mantiene la fuerza causativa y la reacción divina, con una formulación bíblica clara en español.
- source_word: לָלֶכֶת
  english_pob_choice: going
  chosen_spanish: yendo
  alternatives_spanish:
  - al ir
  - para ir
  lexicon: HALOT
  rationale: El infinitivo funciona como medio o manera. «Yendo» refleja esa relación sin añadir una preposición interpretativa más fuerte que el hebreo.
- source_word: לְקַטֵּר
  english_pob_choice: to burn incense
  chosen_spanish: a quemar incienso
  alternatives_spanish:
  - a ofrecer incienso
  - a incensar
  lexicon: HALOT
  rationale: En contexto idolátrico, קטר se refiere a quemar incienso. «Quemar incienso» es transparente y fiel, y evita un tecnicismo menos natural en español.
- source_word: לַעֲבֹד
  english_pob_choice: to serve
  chosen_spanish: a servir
  alternatives_spanish:
  - a adorar
  - a rendir culto
  lexicon: HALOT
  rationale: Se conserva «servir» porque la raíz עבד tiene un alcance más amplio que «adorar» y mantiene la idea de devoción/servicio religioso.
- source_word: לֵאלֹהִים אֲחֵרִים
  english_pob_choice: other gods
  chosen_spanish: a otros dioses
  alternatives_spanish:
  - a dioses ajenos
  - a dioses extraños
  lexicon: HALOT
  rationale: «Otros dioses» es la equivalencia más directa para el contraste de exclusividad con Yahvé, y mantiene la forma habitual del hebreo bíblico.
- source_word: אֲשֶׁר לֹא יְדָעוּם
  english_pob_choice: whom neither they nor you nor your fathers had known
  chosen_spanish: a quienes no conocieron ni ellos, ni ustedes, ni sus padres
  alternatives_spanish:
  - a quienes no habían conocido ellos, ni ustedes, ni sus padres
  - a quienes ni ellos, ni ustedes, ni sus padres conocían
  lexicon: HALOT
  rationale: «Conocer» preserva el valor relacional/covenantal de ידע. La cláusula se vuelve natural en español manteniendo el orden enfático del cierre hebreo mediante la tríada de sujetos.
theological_decisions:
- issue: ¿«servir» o «adorar» para עבד con otros dioses?
  english_pob_reading: to serve other gods
  chosen_spanish_reading: a servir a otros dioses
  alternative_spanish_readings:
  - a adorar a otros dioses
  - a rendir culto a otros dioses
  rationale: El texto subraya servicio/devoción prestada a deidades ajenas, no solo un acto litúrgico puntual. «Servir» conserva mejor la amplitud del verbo y la lógica de lealtad religiosa.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: Cómo reflejar la lista enfática final con la negación implícita
  english_pob_reading: whom neither they nor you nor your fathers had known
  chosen_spanish_reading: a quienes no conocieron ni ellos, ni ustedes, ni sus padres
  alternative_spanish_readings:
  - a quienes ni ellos, ni ustedes, ni sus padres conocieron
  - a quienes no habían conocido ellos, ni ustedes, ni sus padres
  rationale: El hebreo cierra con una lista enfática de sujetos. En español, colocar «no» antes del verbo y repetir la serie de sujetos conserva la fuerza de la negación total sin forzar una construcción poco natural.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
- issue: Tratamiento de וַאֲבֹתֵיכֶם
  english_pob_reading: your fathers
  chosen_spanish_reading: sus padres
  alternative_spanish_readings:
  - sus padres varones
  - sus antepasados
  rationale: El hebreo es masculino plural y apunta a los padres/fundadores del linaje. «Sus padres» reproduce el valor de parentesco masculino con naturalidad en español.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: 'Se tomó como base el cierre revisado del audit trail inglés: se evitó una equivalencia con «por» que sonara demasiado analítica y se mantuvo la estructura final con la tríada enfática. La redacción española intenta ser fiel al hebreo y a la decisión revisada de expresar la cláusula final de forma directa y natural.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo requiere explícitamente; en este versículo no aparece el Tetragrámaton, por lo que no se introdujo.
  - Se mantuvo «otros dioses» como fórmula bíblica estable, coherente con el audit trail en inglés.
  - Se preservó «servir» para עבד, con nota de alternativa «adorar» por la tensión lexical documentada.
  - La cláusula final conserva la enumeración de sujetos y la negación, evitando diluir el énfasis del hebreo.
