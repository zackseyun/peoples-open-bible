translation:
  language: es
  text: Me postraré hacia tu templo santo y daré gracias a tu nombre por tu amor constante y tu fidelidad, porque has engrandecido tu palabra sobre todo tu nombre[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porque has engrandecido tu promesa sobre todo»; el hebreo de la cláusula final es difícil, y algunos lo entienden como «has engrandecido tu nombre y tu palabra sobre todas las cosas».'
    reason: alternative_reading
lexical_decisions:
- source_word: אֶשְׁתַּחֲוֶה
  english_pob_choice: I bow down
  chosen_spanish: Me postraré
  alternatives_spanish:
  - Me inclinaré
  - Me pondré de rodillas
  - Adoraré
  lexicon: HALOT
  rationale: El verbo hebreo expresa un gesto corporal de postración o reverencia. En español, «me postraré» conserva esa acción física con naturalidad y un registro bíblico digno; «adoraré» sería más interpretativo y menos concreto.
- source_word: אֶל
  english_pob_choice: toward
  chosen_spanish: hacia
  alternatives_spanish:
  - a
  - delante de
  - ante
  lexicon: HALOT
  rationale: La preposición marca orientación espacial. «Hacia» mantiene la dirección sin sugerir necesariamente entrada en el santuario.
- source_word: הֵיכַל קָדְשְׁךָ
  english_pob_choice: your holy temple
  chosen_spanish: tu templo santo
  alternatives_spanish:
  - tu santo templo
  - tu santuario santo
  - tu palacio santo
  lexicon: HALOT
  rationale: En este contexto de adoración, «templo» es la opción más natural para הֵיכָל. El adjetivo pospuesto «santo» refleja קָדְשְׁךָ y suena idiomático en español.
- source_word: וְא֘וֹדֶה אֶת שְׁמֶךָ
  english_pob_choice: and give thanks to your name
  chosen_spanish: daré gracias a tu nombre
  alternatives_spanish:
  - te daré gracias
  - alabaré tu nombre
  - daré gracias a tu nombre
  lexicon: HALOT
  rationale: El verbo ידה puede expresar dar gracias o alabar. Como los complementos causales explican el motivo del agradecimiento, «daré gracias» es el ajuste más preciso; «a tu nombre» preserva el giro hebreo sobre la reputación revelada de Dios.
- source_word: עַל חַסְדְּךָ
  english_pob_choice: for your steadfast love
  chosen_spanish: por tu gran amor
  alternatives_spanish:
  - por tu amor constante
  - por tu misericordia fiel
  - por tu amor leal
  lexicon: HALOT
  rationale: חֶסֶד es un término de lealtad pactal difícil de verter con una sola palabra. «Gran amor» mantiene la calidez y la fuerza relacional del término en un español claro, sin perder la idea de amor fiel; se evita un calco rígido que sonaría poco natural.
- source_word: וְעַל אֲמִתֶּךָ
  english_pob_choice: and your faithfulness
  chosen_spanish: y tu fidelidad
  alternatives_spanish:
  - y tu verdad
  - y tu firmeza
  - y tu fiabilidad
  lexicon: HALOT
  rationale: אֲמִתֶּךָ puede significar verdad, firmeza o fidelidad. En paralelo con חֶסֶד, «fidelidad» comunica mejor el carácter confiable de Dios en este contexto de acción de gracias.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque
  lexicon: HALOT
  rationale: Introduce la razón de la acción anterior. «Porque» es claro y fluido en español moderno.
- source_word: הִגְדַּלְתָּ
  english_pob_choice: you have exalted
  chosen_spanish: has engrandecido
  alternatives_spanish:
  - has exaltado
  - has hecho grande
  - has magnificado
  lexicon: HALOT
  rationale: El hifil de גדל significa hacer grande o engrandecer. «Has engrandecido» reproduce con más cercanía la idea verbal básica que «exaltado», sin perder el matiz de elevación.
- source_word: עַל כָּל שִׁמְךָ אִמְרָתֶךָ
  english_pob_choice: above all your name / your word
  chosen_spanish: sobre todo tu nombre, tu palabra
  alternatives_spanish:
  - sobre todo tu nombre, tu promesa
  - por encima de todo tu nombre, tu palabra
  - sobre todo tu nombre y tu palabra
  lexicon: HALOT
  rationale: 'La cláusula final es sintácticamente difícil en hebreo. La lectura principal conserva el orden del texto: Dios ha engrandecido su palabra en relación con su nombre. En español se mantiene la tensión sin resolverla del todo; «tu palabra» traduce אִמְרָתֶךָ con el alcance de palabra/promesa.'
theological_decisions:
- issue: 'Cláusula difícil final: כִּי הִגְדַּלְתָּ עַל כָּל שִׁמְךָ אִמְרָתֶךָ'
  english_pob_reading: for you have exalted your word above all your name
  chosen_spanish_reading: porque has engrandecido tu palabra sobre todo tu nombre
  alternative_spanish_readings:
  - porque has engrandecido tu promesa sobre todo
  - porque has engrandecido tu nombre y tu palabra sobre todas las cosas
  rationale: Se preserva la dificultad del hebreo sin convertirla en paráfrasis interpretativa. La lectura principal sigue de cerca la secuencia del texto masorético y presenta la relación entre el nombre revelado de Dios y su palabra como un énfasis en la supremacía y fiabilidad de lo que Dios dice. Las lecturas suavizadas se conservan como alternativas, no como sustitutos del texto.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: 'Sin cambios respecto al control más reciente: el texto base mantiene el acuerdo alto y no requiere revisión adicional; se conserva la tensión exegética de la cláusula final en lugar de resolverla de forma expansiva.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto fuente lo exige explícitamente; aquí no aparece el Tetragrámaton, por lo que se traduce «Dios» implícitamente mediante «tu nombre».
  - Se usa «nombre» como equivalente de שֵׁם en sentido de reputación/revelación, manteniendo el valor bíblico del giro hebreo.
  - Se evita «SEÑOR» porque no hay un κύριος griego ni una convención de sustitución que obligue aquí a ocultar el nombre divino.
  - «Tu palabra» conserva la ambigüedad de אִמְרָה entre palabra, dicho y promesa; la nota explica la lectura promesal sin imponerla en el cuerpo del texto.
