  text: Καὶ ἀπὸ²⁴ ἐπιβουλῆς ἀνθρώπων ἢ θηρίων οὐ δύναται κυριευθῆναι²⁸, βοηθούμενος *†ζῆν ἀπ᾽ αὐτῆς† ὑπὸ τῆς ἀγάπης²⁹ ἧς³⁰ ἔχει πρὸς τὸν πλησίον.
