translation:
  language: es
  text: de Ashriel[a], el clan de los ashrielitas; y de Siquem, el clan de los siquemitas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Las versiones tradicionales suelen escribir el nombre «Asriel» y el clan «asrielitas». El hebreo de este versículo apoya mejor «Ashriel» / «ashrielitas».
    reason: lexical_alternative
lexical_decisions:
- source_word: אַשְׂרִיאֵל
  english_pob_choice: Ashriel
  chosen_spanish: Ashriel
  alternatives_spanish:
  - Asriel
  lexicon: Nombre propio (transliteración)
  rationale: Conservo la forma hebrea reflejada por el inglés POB, con ‘sh’ para reproducir mejor la consonancia del nombre. ‘Asriel’ es una forma tradicional en español/inglés, pero queda menos cercana a la grafía hebrea del texto base.
- source_word: מִשְׁפַּחַת
  english_pob_choice: the clan of
  chosen_spanish: el clan de
  alternatives_spanish:
  - la familia de
  - el linaje de
  lexicon: HALOT
  rationale: En listas censales y genealógicas, el término designa una subdivisión de parentesco; ‘clan’ mantiene mejor ese valor social que ‘familia’ en español. El constructo se vierte naturalmente como ‘el clan de’.
- source_word: הָאַשְׂרִיאֵלִי
  english_pob_choice: the Ashrielites
  chosen_spanish: los ashrielitas
  alternatives_spanish:
  - el clan ashrielita
  - los asrielitas
  lexicon: HALOT
  rationale: El gentilicio colectivo se expresa de forma idiomática en español como ‘ashrielitas’. El artículo hebreo se integra en el plural natural español ‘los’.
- source_word: שֶׁכֶם
  english_pob_choice: Shechem
  chosen_spanish: Shequem
  alternatives_spanish:
  - Siquem
  lexicon: Nombre propio (transliteración)
  rationale: Sigo la transliteración directa del hebreo que el POB inglés privilegia. ‘Siquem’ es la forma tradicional española, pero ‘Shequem’ preserva mejor la correspondencia con la forma מקורית y evita un traslado puramente tradicional.
- source_word: הַשִּׁכְמִי
  english_pob_choice: the Shechemites
  chosen_spanish: los shequemitas
  alternatives_spanish:
  - el clan shequemita
  - los siquemitas
  lexicon: HALOT
  rationale: El gentilicio del ancestro Shequem se traduce con el colectivo español ‘shequemitas’. Mantiene la relación morfológica con el nombre propio elegido y reproduce el valor de grupo descendiente.
translation_notes:
  revision_awareness: El contexto de revisión en inglés no introdujo cambios textuales; esta propuesta sigue la lectura estable del POB y adapta sus decisiones léxicas al español con la misma base hebrea.
  spanish_consistency_notes:
  - 'He mantenido transliteraciones consistentes entre nombre propio y gentilicio: Ashriel/ashrielitas y Shequem/shequemitas.'
  - He evitado sustituir los gentilicios por términos más interpretativos como ‘familia’ o ‘linaje’, porque el contexto censal favorece ‘clan’.
  - No hay contenido teológico explícito en este versículo; la redacción se limita a la lista genealógica sin expansión explicativa.
