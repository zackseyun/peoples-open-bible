translation:
  language: es
  text: Y contrataron consejeros contra ellos para frustrar su plan[a] todo el tiempo de Ciro rey de Persia, hasta el reinado de Darío rey de Persia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para desbaratar su consejo». El hebreo עֲצָה puede significar «consejo», «plan» o «propósito».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְסֹכְרִים
  english_pob_choice: they hired
  chosen_spanish: Y contrataron
  alternatives_spanish:
  - Y pagaron
  - Y tomaron
  lexicon: HALOT
  rationale: El participio de שׂכר en este contexto indica pagar por servicios. «Contrataron» expresa con naturalidad la acción de emplear a los consejeros y conserva el matiz de relación remunerada sin añadir la especificidad de «sobornaron».
- source_word: עֲלֵיהֶם
  english_pob_choice: against them
  chosen_spanish: contra ellos
  alternatives_spanish:
  - sobre ellos
  - acerca de ellos
  lexicon: HALOT
  rationale: El contexto es hostil y la intención es impedir la obra; por eso la fuerza adversativa de עַל se traduce mejor como «contra».
- source_word: יוֹעֲצִים
  english_pob_choice: counselors
  chosen_spanish: consejeros
  alternatives_spanish:
  - asesores
  - aconsejadores
  lexicon: HALOT
  rationale: «Consejeros» conserva el sentido formal de personas que dan consejo y encaja con el trasfondo administrativo-político del pasaje.
- source_word: לְהָפֵר
  english_pob_choice: to frustrate
  chosen_spanish: para frustrar
  alternatives_spanish:
  - para quebrantar
  - para anular
  - para desbaratar
  lexicon: HALOT
  rationale: הפר puede significar quebrantar, anular o frustrar. Aquí el objeto es su plan, así que «frustrar» comunica bien la acción de impedirlo en español actual sin perder el sentido.
- source_word: עֲצָתָם
  english_pob_choice: their plan
  chosen_spanish: su plan
  alternatives_spanish:
  - su consejo
  - su propósito
  lexicon: HALOT
  rationale: עֵצָה puede significar consejo, plan o propósito. En este contexto de oposición a la reconstrucción, «plan» es claro y fiel, y refleja la opción de la POB inglesa.
- source_word: כָּל יְמֵי
  english_pob_choice: all the days of
  chosen_spanish: todos los días de
  alternatives_spanish:
  - durante todos los días de
  - a lo largo de los días de
  lexicon: HALOT
  rationale: Es una expresión temporal estándar. «Todos los días de» es la forma más directa y transparente en español.
- source_word: כּוֹרֶשׁ מֶלֶךְ פָּרַס
  english_pob_choice: Cyrus king of Persia
  chosen_spanish: Ciro rey de Persia
  alternatives_spanish:
  - Ciro, rey de Persia
  lexicon: HALOT
  rationale: El nombre propio se translitera como «Ciro» y el título real se traduce literalmente. Esta construcción es natural en español bíblico contemporáneo.
- source_word: וְעַד
  english_pob_choice: even until
  chosen_spanish: y aun hasta
  alternatives_spanish:
  - y hasta
  - hasta
  lexicon: HALOT
  rationale: La secuencia marca continuidad temporal desde los días de Ciro hasta el reinado de Darío. «Y aun hasta» conserva el alcance del hebreo y reproduce la expansión temporal que la POB inglesa explicita con «even until».
- source_word: מַלְכוּת
  english_pob_choice: the reign
  chosen_spanish: el reinado
  alternatives_spanish:
  - el reino
  - la realeza
  lexicon: HALOT
  rationale: En esta construcción temporal, מַלְכוּת se refiere al período de gobierno, no al territorio. «Reinado» es el equivalente idiomático más preciso.
- source_word: דָּרְיָוֶשׁ מֶלֶךְ פָּרָס
  english_pob_choice: Darius king of Persia
  chosen_spanish: Darío rey de Persia
  alternatives_spanish:
  - Darío, rey de Persia
  lexicon: HALOT
  rationale: Como con Ciro, el nombre propio se translitera y el título se traduce directamente.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y coincide sustancialmente con la opción inglesa de la POB: contratación de consejeros hostiles, finalidad de frustrar su plan y marco temporal desde Ciro hasta Darío. No se registran revisiones recientes que alteren la decisión léxica principal.'
  spanish_consistency_notes:
  - Se mantiene «Persia» para פָּרַס en concordancia con la práctica del proyecto.
  - Se usa «Ciro» y «Darío» como transliteraciones regulares de los nombres propios.
  - Se conserva «reinado» para מַלְכוּת por su valor temporal, no territorial.
  - La nota de pie de página preserva la alternativa semántica de עֲצָה documentada en la POB inglesa.
