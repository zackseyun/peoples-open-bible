  language: en
  yaml_path: translation/ot/genesis/037/025.yaml
  text: Then they sat down to eat bread[a], and they lifted up their eyes and looked, and behold, a caravan of Ishmaelites was coming from Gilead, with their camels carrying gum, balm, and ladanum[c][b], going to take it down to Egypt.
