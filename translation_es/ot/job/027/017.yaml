translation:
  language: es
  text: Él puede prepararlo[a], pero el justo lo llevará puesto[b], y el inocente dividirá la plata.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Él prepara, pero el justo lo llevará puesto». El imperfecto hebreo puede traducirse sin el matiz concesivo; el contexto del versículo anterior favorece aquí el sentido de «puede prepararlo».'
    reason: alternative_reading
  - marker: b
    text: 'Los objetos implícitos se toman del versículo anterior: la prenda para «lo llevará puesto» y la riqueza acumulada para «la plata».'
    reason: cross_reference
lexical_decisions:
- source_word: יָכִין
  english_pob_choice: He may prepare it
  chosen_spanish: Él puede prepararlo
  alternatives_spanish:
  - Él prepara
  - Él lo preparará
  - Él puede amontonarlo
  lexicon: HALOT
  rationale: El verbo הֵכִין (hifil de כון) expresa 'preparar, disponer, dejar listo'. En contexto, el objeto queda implícito por el versículo anterior; en español se mantiene ese objeto con 'lo'. 'Puede' conserva la posibilidad/concesión que el audit trail inglés señala como más natural a partir del contexto.
- source_word: צַדִּיק
  english_pob_choice: the righteous
  chosen_spanish: el justo
  alternatives_spanish:
  - los justos
  - el hombre justo
  - el righteous
  lexicon: HALOT
  rationale: El adjetivo funciona sustantivamente. 'El justo' preserva el singular representativo sin añadir 'hombre', conforme a la revisión inglesa que prefirió una formulación más natural y fiel a la forma hebrea.
- source_word: יִלְבָּשׁ
  english_pob_choice: will wear it
  chosen_spanish: lo vestirá
  alternatives_spanish:
  - lo llevará puesto
  - se vestirá con ello
  - lo pondrá
  lexicon: HALOT
  rationale: לבש significa 'vestir/ponerse/llevar puesto'. Dado que el objeto es implícito y proviene del contexto previo, 'lo vestirá' es una forma breve y clara en español, cercana al inglés POB pero más idiomática que un calco rígido.
- source_word: כֶסֶף
  english_pob_choice: the silver
  chosen_spanish: la plata
  alternatives_spanish:
  - la plata acumulada
  - la plata/moneda
  - el dinero
  lexicon: HALOT
  rationale: כֶסֶף puede referir a plata o dinero. Aquí el paralelismo con las prendas del versículo anterior y el verbo 'dividir' favorece entender un bien material concreto. En español 'la plata' conserva la concreción del sustantivo y es comprensible en registro bíblico.
- source_word: נָקִי
  english_pob_choice: the innocent
  chosen_spanish: el inocente
  alternatives_spanish:
  - el limpio
  - el sin culpa
  - el íntegro
  lexicon: HALOT
  rationale: El adjetivo usado sustantivamente denota quien está libre de culpa o mancha. 'El inocente' es la equivalencia natural en español y mantiene el contraste moral con 'el justo' en el hemistiquio anterior.
- source_word: יַחֲלֹק
  english_pob_choice: will divide
  chosen_spanish: dividirá
  alternatives_spanish:
  - repartirá
  - distribuirá
  - tomará su parte de
  lexicon: HALOT
  rationale: El qal de חלק significa 'dividir, repartir, asignar por partes'. 'Dividirá' reproduce el valor básico del verbo y deja abierta la idea de repartición de bienes que el contexto sugiere.
theological_decisions:
- issue: Objeto implícito de 'preparar' y 'vestir' procedente del contexto inmediato
  english_pob_reading: 'The implied objects are supplied from the previous verse: clothing for ''will wear it'' and accumulated wealth for ''the silver.'''
  chosen_spanish_reading: 'Se mantienen los objetos implícitos con pronombres en español: ''prepararlo'' y ''lo vestirá''.'
  alternative_spanish_readings:
  - Él puede preparar, pero el justo vestirá, y el inocente dividirá la plata.
  - Él puede prepararlo, pero el justo lo llevará puesto, y el inocente dividirá la plata.
  rationale: 'La decisión sigue el audit trail inglés: el sentido depende del versículo previo. En español conviene explicitar el objeto para evitar ambigüedad, sin introducir contenido nuevo. ''Vestirá'' con objeto directo pronominal conserva esa dependencia textual.'
  doctrine_reference: Job 27:16-17 / contexto inmediato del sufrimiento del impío y la reversión de sus bienes
- issue: Sentido de כֶסֶף como plata concreta más que dinero genérico
  english_pob_reading: the silver
  chosen_spanish_reading: la plata
  alternative_spanish_readings:
  - el dinero
  - la plata acumulada
  rationale: El contexto inmediato habla de acumular bienes y prendas; el hebreo permite plata literal o riqueza monetaria. 'La plata' preserva la concreción material del término y evita generalizar sin necesidad.
  doctrine_reference: HALOT כסף; contexto sapiencial-poético de Job
- issue: Sustantivación de los adjetivos 'justo' e 'inocente'
  english_pob_reading: the righteous / the innocent
  chosen_spanish_reading: el justo / el inocente
  alternative_spanish_readings:
  - los justos / los inocentes
  - el hombre justo / el inocente
  rationale: El hebreo usa adjetivos con valor sustantivo. El singular en español conserva la fuerza representativa del proverbio poético y se alinea con la revisión inglesa que evitó añadir 'man'.
  doctrine_reference: Uso adjetival sustantivado en poesía hebrea
translation_notes:
  revision_awareness: El borrador inglés más reciente eliminó 'man' después de 'righteous' por ser menos natural y menos fiel al sustantivo hebreo. Esta versión española sigue esa revisión con 'el justo' y mantiene la estructura concesiva y los objetos implícitos según el audit trail, sin añadir interpretación doctrinal nueva.
  spanish_consistency_notes:
  - Se usa 'justo' para צַדִּיק y 'inocente' para נָקִי, conservando la distinción léxica.
  - Se mantiene 'plata' para כֶסֶף por concreción material y coherencia con el contexto.
  - Se prefieren verbos simples ('preparar', 'vestir', 'dividir') que reflejan el paralelismo hebreo sin sobreparafrasear.
  - La puntuación en español conserva el paralelismo con dos comas coordinando las dos cláusulas finales.
