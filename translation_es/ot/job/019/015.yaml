translation:
  language: es
  text: Los que residen en mi casa[a] y mis siervas[b] me tienen por un extraño[c]; he llegado a ser un extranjero a sus ojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Los moradores temporales de mi casa» o «Los residentes dependientes de mi casa». El hebreo puede referirse a personas que viven temporalmente o en condición dependiente dentro del hogar.
    reason: lexical_alternative
  - marker: b
    text: «Siervas» también puede traducirse «sirvientas». El hebreo se refiere a mujeres en un rol servil doméstico.
    reason: lexical_alternative
  - marker: c
    text: El hebreo usa en la segunda cláusula un término distinto, más fuerte, donde aquí se traduce «extranjero» en vez de «extraño», preservando el paralelismo con variación léxica.
    reason: lexical_alternative
lexical_decisions:
- source_word: גָּרֵי
  english_pob_choice: sojourners
  chosen_spanish: forasteros
  alternatives_spanish:
  - moradores temporales
  - residentes temporales
  - estantes
  lexicon: HALOT
  rationale: גָּרֵי procede de גֵּר, con la idea de personas que residen en condición no plenamente propia o dependiente. En español, «forasteros» comunica mejor la extrañeza social del pasaje que un calco como «sojourners», sin perder que no son familia del hogar.
- source_word: בֵיתִי
  english_pob_choice: in my house
  chosen_spanish: de mi casa
  alternatives_spanish:
  - en mi casa
  - de mi hogar
  - en mi hogar
  lexicon: HALOT
  rationale: La construcción hebrea es una relación de pertenencia con la casa. «De mi casa» conserva bien el vínculo doméstico del sintagma y suena natural en español con «forasteros».
- source_word: אַמְהֹתַי
  english_pob_choice: my female servants
  chosen_spanish: mis siervas
  alternatives_spanish:
  - mis sirvientas
  - mis criadas
  - mis esclavas
  lexicon: HALOT
  rationale: אָמָה designa una mujer en rol servil doméstico. «Siervas» mantiene la relación de servidumbre sin forzar el matiz moderno de empleo doméstico, y evita una precisión social que el hebreo no explicita aquí.
- source_word: לְזָר
  english_pob_choice: as a stranger
  chosen_spanish: por un extraño
  alternatives_spanish:
  - como un extraño
  - por un forastero
  - como un forastero
  lexicon: HALOT
  rationale: Con חשב, el sentido es de considerar o tener por alguien. «Por un extraño» expresa bien ese juicio evaluativo en español y conserva la fuerza predicativa del hebreo.
- source_word: תַּחְשְׁבֻנִי
  english_pob_choice: count me
  chosen_spanish: me tienen
  alternatives_spanish:
  - me consideran
  - me cuentan
  - me estiman
  lexicon: HALOT
  rationale: Aunque el verbo literalmente es «considerar/contar», en español la combinación con la frase predicativa queda más natural como «me tienen por». Esa fórmula preserva el valor de חשב sin sonar mecánica.
- source_word: נָכְרִי
  english_pob_choice: foreigner
  chosen_spanish: extranjero
  alternatives_spanish:
  - forastero
  - foráneo
  - ajeno
  lexicon: HALOT
  rationale: נָכְרִי intensifica la idea de alguien de fuera, no perteneciente al grupo. «Extranjero» reproduce bien esa intensificación y mantiene la near-parallel con «extraño» sin repetir exactamente la misma palabra.
- source_word: הָיִיתִי
  english_pob_choice: I have become
  chosen_spanish: he llegado a ser
  alternatives_spanish:
  - he pasado a ser
  - me he vuelto
  - soy
  lexicon: HALOT
  rationale: El perfecto comunica un estado resultante. «He llegado a ser» conserva esa culminación y la vigencia presente de la situación de Job.
- source_word: בְעֵינֵיהֶם
  english_pob_choice: in their eyes
  chosen_spanish: en sus ojos
  alternatives_spanish:
  - a su vista
  - a sus ojos
  - ante ellos
  lexicon: HALOT
  rationale: La imagen hebrea de evaluación o percepción se preserva mejor con «en sus ojos». Aunque algo más literal que «a su vista», mantiene la metáfora sin perder claridad.
translation_notes:
  revision_awareness: El texto inglés POB fue revisado de «guests» a «sojourners» para ajustar גָּרֵי con mayor precisión léxica. La versión española sigue esa revisión al evitar «huéspedes» y escoger un término de extranjería/condición no propia del hogar. También conserva la diferencia entre las dos cláusulas con vocabulario no idéntico, conforme al audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo un registro neutral y bíblicamente digno, apto para lectura eclesial amplia.
  - Se preservó la distinción léxica entre לְזָר y נָכְרִי mediante «extraño» / «extranjero».
  - Se evitó «esclavas» porque el contexto doméstico no obliga a especificar esclavitud; «siervas» cubre el rol servil de manera fiel.
  - La metáfora perceptiva de בְעֵינֵיהֶם se mantuvo con «en sus ojos» para conservar el paralelismo del hebreo.
