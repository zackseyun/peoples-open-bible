translation:
  language: es
  text: Una esposa celosa es angustia del corazón y tristeza cuando se enfrenta a otra mujer[a], y un azote de la lengua que alcanza a todos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «una esposa rival ... sobre otra esposa». El griego ἀντίζηλος con ἐπὶ γυναικί puede apuntar a rivalidad con otra mujer, quizá otra esposa; la expresión es condensada y también puede leerse más generalmente como celos dirigidos contra otra mujer.'
    reason: lexical_alternative
  - marker: b
    text: El último miembro es difícil. El griego dice literalmente «un azote de la lengua, comunicándose/siendo común con todos», lo que puede sugerir habla que hiere indiscriminadamente a todos.
    reason: alternative_reading
lexical_decisions:
- source_word: ἄλγος καρδίας
  english_pob_choice: heartache
  chosen_spanish: dolor del corazón
  alternatives_spanish:
  - angustia del corazón
  - pena del corazón
  - dolor del alma
  lexicon: LSJ
  rationale: La expresión griega es idiomática y señala dolor interior, no un órgano literal. En español, «dolor del corazón» mantiene la imagen y la fuerza emocional sin sonar demasiado moderno o abstracto.
- source_word: πένθος
  english_pob_choice: grief
  chosen_spanish: tristeza
  alternatives_spanish:
  - luto
  - pena
  - dolor
  lexicon: LSJ
  rationale: En este paralelismo, el término expresa aflicción o pesar. «Tristeza» es natural en español, pero no elimina el tono de duelo o aflicción que puede tener el griego en contexto.
- source_word: γυνὴ ἀντίζηλος
  english_pob_choice: a jealous wife
  chosen_spanish: una mujer celosa
  alternatives_spanish:
  - una esposa celosa
  - una esposa rival
  - una mujer en rivalidad
  lexicon: LSJ
  rationale: ἀντίζηλος puede incluir rivalidad además de celos. Opto por «mujer celosa» porque el griego no obliga a una situación técnica de poliginia; además, «esposa» haría más específica la escena de lo que el texto griego exige.
- source_word: ἐπὶ γυναικί
  english_pob_choice: when set against another woman
  chosen_spanish: cuando rivaliza con otra mujer
  alternatives_spanish:
  - contra otra mujer
  - frente a otra mujer
  - al ponerse contra otra mujer
  lexicon: LSJ
  rationale: La frase es condensada y relacional. «Cuando rivaliza con otra mujer» conserva la idea de oposición o competencia, y evita fijar una lectura más estrecha que el griego no impone.
- source_word: μάστιξ γλώσσης
  english_pob_choice: a scourge of the tongue
  chosen_spanish: un azote de la lengua
  alternatives_spanish:
  - un látigo de la lengua
  - un flagelo de la lengua
  - una lengua que azota
  lexicon: LSJ
  rationale: La metáfora debe conservarse. «Azote de la lengua» reproduce el golpe verbal del griego y sugiere habla dañina o castigadora sin suavizar la imagen.
- source_word: πᾶσιν ἐπικοινωνοῦσα
  english_pob_choice: that associates with everyone
  chosen_spanish: que se asocia con todos
  alternatives_spanish:
  - que se relaciona con todos
  - que anda con todos
  - que comunica con todos
  lexicon: LSJ
  rationale: 'El participio es difícil. La traducción española sigue la revisión inglesa más reciente y conserva la ambigüedad: puede referirse a una lengua que anda entre todos o que afecta a todos. «Se asocia con todos» mantiene la literalidad relacional del verbo sin cerrar indebidamente el sentido.'
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del inglés al reflejar ἐπικοινωνοῦσα con una formulación relacional («se asocia con todos») en lugar de una equivalencia más libre como «compartida con todos». También conserva la tensión lexical de ἀντίζηλος y ἐπὶ γυναικί mediante una nota alternativa, sin forzar «esposa» como lectura obligatoria.
  spanish_consistency_notes:
  - Se emplea «Yahvé» como norma del proyecto solo cuando corresponda; este versículo no contiene el nombre divino.
  - Se mantiene «mujer» en el texto principal porque el griego usa γυνή/γυναικί y el contexto no obliga a «esposa», aunque la nota contempla esa posibilidad.
  - «Azote de la lengua» preserva la imagen metafórica sin convertirla en una paráfrasis explicativa.
  - La cláusula final conserva la dificultad sintáctica del griego y no la resuelve del todo en el cuerpo del texto, siguiendo la prudencia del audit trail inglés.
