translation:
  language: es
  text: Pero yo, por la abundancia de tu amor leal[a], entraré en tu casa; me inclinaré hacia tu santo templo, en temor de ti[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en la abundancia de tu fidelidad de pacto».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «con reverencia por ti» o «con asombro ante ti».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  english_pob_choice: But as for me
  chosen_spanish: Pero yo
  alternatives_spanish:
  - Y yo
  - Mas yo
  lexicon: HALOT
  rationale: El hebreo es claramente contrastivo frente a los impíos del contexto previo. En español, «Pero yo» comunica esa oposición de manera natural y directa; se evita «Y yo», que debilita el contraste, y «Mas yo», que suena más literario/arcaizante.
- source_word: בְּרֹב
  english_pob_choice: by the abundance of
  chosen_spanish: por la abundancia de
  alternatives_spanish:
  - en la abundancia de
  - a causa de la abundancia de
  lexicon: HALOT
  rationale: La preposición ב aquí expresa base o circunstancia. «Por la abundancia de» mantiene esa idea causal/fundante con español natural; «en la abundancia de» podría sonar más estático, y «a causa de» interpreta demasiado explícitamente la relación.
- source_word: חַסְדְּךָ
  english_pob_choice: your steadfast love
  chosen_spanish: tu amor leal
  alternatives_spanish:
  - tu amor constante
  - tu fidelidad leal del pacto
  - tu misericordia
  lexicon: HALOT
  rationale: חֶסֶד contiene la idea de amor leal y de compromiso duradero, no solo afecto. «Amor leal» conserva esa fuerza relacional sin volverse una fórmula rígida; «misericordia» estrecha demasiado el sentido, y «fidelidad leal del pacto» explicita en exceso lo que el hebreo deja implícito.
- source_word: אָבוֹא
  english_pob_choice: I will enter
  chosen_spanish: entraré
  alternatives_spanish:
  - iré
  - vendré
  lexicon: HALOT
  rationale: El verbo en español debe expresar el movimiento hacia dentro de la casa de Dios. «Entraré» es más idiomático que «vendré» y evita la ambigüedad de «iré».
- source_word: בֵיתֶךָ
  english_pob_choice: your house
  chosen_spanish: tu casa
  alternatives_spanish:
  - tu casa / tu morada
  - tu templo
  lexicon: HALOT
  rationale: Se conserva «casa» porque el hebreo dice literalmente «casa» y el contexto cultual lo aclara; no se sustituye directamente por «templo» para no resolver de antemano la distinción que el siguiente hemistiquio mantiene con הֵיכַל.
- source_word: אֶשְׁתַּחֲוֶה
  english_pob_choice: I will bow down
  chosen_spanish: me inclinaré
  alternatives_spanish:
  - me postraré
  - adoraré
  lexicon: HALOT
  rationale: La raíz denota un acto corporal de inclinación/prostración. «Me inclinaré» conserva la imagen física; «adoraré» sería interpretativo y perdería el gesto concreto, mientras que «me postraré» es posible pero más fuerte de lo que exige el contexto inmediato.
- source_word: אֶל
  english_pob_choice: toward
  chosen_spanish: hacia
  alternatives_spanish:
  - ante
  - delante de
  lexicon: HALOT
  rationale: Con el verbo de postrarse, la preposición apunta direccionalmente al lugar sagrado. «Hacia» refleja bien la orientación sin sugerir necesariamente contacto o entrada.
- source_word: הֵיכַל קָדְשְׁךָ
  english_pob_choice: your holy temple
  chosen_spanish: tu santo templo
  alternatives_spanish:
  - tu templo santo
  - tu palacio santo
  lexicon: HALOT
  rationale: הֵיכַל puede significar palacio o templo; aquí, por el contexto de culto, «templo» es la equivalencia natural. «Santo» traduce קָדְשְׁךָ con el orden más fluido en español; «palacio» sería menos probable en este marco.
- source_word: בְּיִרְאָתֶךָ
  english_pob_choice: in fear of you
  chosen_spanish: con temor de ti
  alternatives_spanish:
  - con reverencia por ti
  - con asombro de ti
  lexicon: HALOT
  rationale: יִרְאָה incluye temor, reverencia y sobrecogimiento ante Dios. «Con temor de ti» conserva la tensión reverente y seria del hebreo; «reverencia» o «asombro» suavizan demasiado el componente de temor.
theological_decisions:
- issue: Base de acceso a la presencia de Dios en חֶסֶד
  english_pob_reading: The psalmist approaches God’s house on the basis of his steadfast love
  chosen_spanish_reading: El salmista se acerca a la casa de Dios sobre la base de su amor leal
  alternative_spanish_readings:
  - por su fidelidad de pacto
  - por su misericordia
  rationale: La traducción conserva que el acceso no descansa en mérito humano sino en el favor leal de Dios. «Amor leal» mantiene abierta la riqueza del término sin reducirlo solo a compasión o a una fórmula técnica de pacto.
  doctrine_reference: Translation philosophy §1, §6
- issue: Tensión reverente de יִרְאָה ante Dios
  english_pob_reading: fear of you
  chosen_spanish_reading: con temor de ti
  alternative_spanish_readings:
  - con reverencia por ti
  - con asombro de ti
  rationale: El verso une aproximación al santuario con una actitud de temor reverente. La formulación elegida evita tanto el terror servil como una familiaridad banal, preservando la solemnidad del culto.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'Coincide con el estado de revisión más reciente: no hubo cambios aplicados y la revisión quedó marcada como sin modificaciones; el borrador español sigue de cerca el hebreo y la lectura inglesa auditada, manteniendo las tensiones léxicas de חֶסֶד y יִרְאָה.'
  spanish_consistency_notes:
  - Se mantiene «Dios» implícito por el contexto de segunda persona divina, sin introducir «SEÑOR» ni «Yahvé» porque el versículo en sí no contiene el Tetragrámaton.
  - «Amor leal» se usa para חֶסֶד de forma consistente con un valor de lealtad de pacto, pero sin forzar una glosa técnica en el texto principal.
  - «Templo» se reserva para הֵיכַל, mientras que בֵיתֶךָ se traduce como «tu casa» para conservar la distinción del hebreo.
  - La preposición «con» en «con temor de ti» preserva mejor la actitud acompañante del adorador que una simple paráfrasis de reverencia.
