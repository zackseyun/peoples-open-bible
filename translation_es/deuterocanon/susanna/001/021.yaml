translation:
  language: es
  text: Y sucedió que, cuando las criadas[a] habían salido, los dos ancianos se levantaron y se lanzaron sobre ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las muchachas» o «las sirvientas» para τὰ κοράσια. El término griego puede designar jóvenes femeninas en general; el contexto doméstico sugiere asistentes del hogar.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  english_pob_choice: it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y pasó
  lexicon: BDAG
  rationale: La fórmula narrativa griega pide una transición de relato. «Aconteció» conserva el tono bíblico sin sonar mecánico ni excesivamente arcaico.
- source_word: ὡς
  english_pob_choice: when
  chosen_spanish: que, cuando
  alternatives_spanish:
  - cuando
  - al
  lexicon: BDAG
  rationale: En esta cláusula introduce el momento de la acción principal. En español, «que, cuando» mantiene la subordinación narrativa natural.
- source_word: ἐξήλθοσαν
  english_pob_choice: had gone out
  chosen_spanish: habían salido
  alternatives_spanish:
  - salieron
  - se habían ido
  lexicon: BDAG
  rationale: El pluscuamperfecto español refleja bien la anterioridad temporal respecto de la acción de los ancianos.
- source_word: τὰ κοράσια
  english_pob_choice: the maids
  chosen_spanish: las doncellas
  alternatives_spanish:
  - las muchachas
  - las sirvientas
  - las niñas
  lexicon: LSJ
  rationale: κοράσια puede ser «muchachas» o «jóvenes». En el contexto doméstico de Susana, «doncellas» preserva la referencia a jóvenes femeninas del entorno sin imponer con demasiada fuerza una categoría social específica.
- source_word: ἀνέστησαν
  english_pob_choice: rose up
  chosen_spanish: se levantaron
  alternatives_spanish:
  - se alzaron
  - se pusieron de pie
  lexicon: BDAG
  rationale: El verbo marca un movimiento repentino y decidido. «Se levantaron» es natural en español y conserva ese arranque de acción.
- source_word: οἱ δύο πρεσβῦται
  english_pob_choice: the two elders
  chosen_spanish: los dos ancianos
  alternatives_spanish:
  - los dos presbíteros
  - los dos mayores
  lexicon: BDAG
  rationale: En la narrativa, πρεσβῦται alude a hombres mayores con autoridad; «ancianos» mantiene el sentido social y narrativo, aunque el término también puede sugerir rango comunitario.
- source_word: ἐπέδραμον
  english_pob_choice: rushed at
  chosen_spanish: corrieron hacia
  alternatives_spanish:
  - se lanzaron contra
  - arremetieron contra
  - corrieron sobre
  lexicon: LSJ
  rationale: El verbo expresa un avance súbito y agresivo. «Corrieron hacia» conserva la inmediatez sin añadir explícitamente una violencia que el griego aquí aún deja implícita; la tensión se mantiene por el contexto.
- source_word: αὐτῇ
  english_pob_choice: her
  chosen_spanish: ella
  alternatives_spanish:
  - a ella
  - contra ella
  lexicon: BDAG
  rationale: El dativo se expresa con naturalidad en español como complemento del movimiento. «Ella» evita sobrecargar la frase con preposiciones innecesarias.
translation_notes:
  revision_awareness: 'Se revisó el flujo narrativo para reflejar la secuencia temporal del griego: salida de las muchachas, levantarse de los ancianos y su avance súbito hacia Susana. La redacción española evita calcos duros y conserva la tensión narrativa documentada en el audit trail inglés.'
  spanish_consistency_notes:
  - Se mantuvo una equivalencia consistente para ἐγένετο como fórmula narrativa de enlace.
  - 'Se prefirió vocabulario sobrio y bíblico-inteligible: «aconteció», «doncellas», «ancianos».'
  - 'No se tradujo de manera mecánica desde el inglés: el orden y la puntuación se ajustaron a la sintaxis natural del español.'
