    text: O «serás demasiado angosta por causa de los habitantes». La expresión hebrea es compacta y puede traducirse de forma más formal.
    reason: lexical_alternative
  - marker: b
    text: O «los que te han tragado». El hebreo conserva la imagen vívida de tragar o devorar, en lugar de usar un término más general para destruir.
    reason: lexical_alternative
  revision_rationale: 'Se corrige el valor de מְבַלְּעָיִךְ para evitar un imperfecto pasado español no justificado (''devoraban'') y se restauran las notas léxicas alineadas con el expediente inglés: una sobre la cláusula de estrechez por habitantes y otra sobre la imaginería de ''tragar/devorar''. El resto del texto puede mantenerse.'
