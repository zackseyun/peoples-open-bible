translation:
  language: es
  text: El rey de Babilonia masacró a los hijos de Sedequías en Ribla, delante de sus ojos, y el rey de Babilonia masacró a todos los nobles de Judá[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «oficiales de Judá» para «nobles de Judá».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁחַט / שָׁחַט
  english_pob_choice: slaughtered
  chosen_spanish: degolló
  alternatives_spanish:
  - mató
  - sacrificó
  - dio muerte a
  lexicon: HALOT
  rationale: שָׁחַט expresa una muerte violenta con fuerza de degüello o degollamiento; «degolló» conserva mejor la crudeza del acto que un simple «mató» y evita un registro más arcaico o menos preciso.
- source_word: מֶלֶךְ בָּבֶל
  english_pob_choice: the king of Babylon
  chosen_spanish: el rey de Babilonia
  alternatives_spanish:
  - Babilonia, el rey
  - el rey babilónico
  lexicon: HALOT
  rationale: La construcción posesiva se expresa de forma natural en español como «el rey de Babilonia», manteniendo la repetición del sintagma en ambas mitades del versículo.
- source_word: בְּנֵי צִדְקִיָּהוּ
  english_pob_choice: the sons of Zedekiah
  chosen_spanish: los hijos de Sedequías
  alternatives_spanish:
  - los hijos varones de Sedequías
  - los hijos de Zedequías
  lexicon: HALOT
  rationale: «Hijos» reproduce con fidelidad בְּנֵי y conserva el referente masculino específico; se usa la forma habitual española «Sedequías» para el nombre propio.
- source_word: בְּרִבְלָה
  english_pob_choice: at Riblah
  chosen_spanish: en Ribla
  alternatives_spanish:
  - en Riblah
  - a Ribla
  lexicon: HALOT
  rationale: Para un topónimo, el hebreo con בְּ admite en español la locución locativa simple «en». «Ribla» es la forma castellana más directa del nombre del lugar.
- source_word: לְעֵינָיו
  english_pob_choice: before his eyes
  chosen_spanish: delante de sus ojos
  alternatives_spanish:
  - ante sus ojos
  - en su presencia
  - a la vista de él
  lexicon: HALOT
  rationale: El modismo comunica que Sedequías presenció la ejecución. «Delante de sus ojos» conserva el impacto visual y el paralelismo idiomático del hebreo/inglés.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - cada uno de
  - la totalidad de
  lexicon: HALOT
  rationale: «Todos» mantiene el valor colectivo del hebreo y funciona de manera natural con el sustantivo plural «nobles».
- source_word: חֹרֵי יְהוּדָה
  english_pob_choice: the nobles of Judah
  chosen_spanish: los nobles de Judá
  alternatives_spanish:
  - los oficiales de Judá
  - los magnates de Judá
  lexicon: HALOT
  rationale: En este contexto político-social, חֹרִים se refiere a los altos personajes de la corte o del país; «nobles» reproduce bien la fuerza social marcada por el inglés POB.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judah
  lexicon: HALOT
  rationale: Se emplea la forma castellana bíblica estándar «Judá» para el territorio/pueblo.
translation_notes:
  revision_awareness: El pasaje coincide plenamente con la auditoría inglesa disponible; no hay revisiones aplicadas en el registro fuente y la redacción española sigue la misma lectura, manteniendo la repetición de «el rey de Babilonia» y el énfasis visual de «delante de sus ojos».
  spanish_consistency_notes:
  - Se mantiene la elección verbal de fuerza violenta («degolló») para reflejar שָׁחַט.
  - Se conserva la repetición del sujeto para respetar el hebreo y el audit trail inglés.
  - Se usa «Judá» y «Ribla» como formas castellanas bíblicas estables.
  - La nota[a] se ancla en «nobles» porque ese es el punto de ambigüedad léxica documentado en el inglés POB.
