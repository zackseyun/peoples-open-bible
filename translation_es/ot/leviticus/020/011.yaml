translation:
  language: es
  text: Si un hombre se acuesta con la esposa de su padre[a], ha descubierto la desnudez de su padre; ambos ciertamente serán condenados a muerte; su sangre está sobre ellos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más interpretativa, «ha deshonrado sexualmente a su padre». El hebreo dice literalmente: «ha descubierto la desnudez de su padre», un modismo fijo en Levítico para una violación sexual prohibida.'
    reason: lexical_alternative
  - marker: b
    text: 'Fórmula jurídica hebrea: «su sangre está sobre ellos», es decir, la responsabilidad por su muerte recae en ellos mismos.'
    reason: cultural_note
lexical_decisions:
- source_word: וְאִישׁ / אֲשֶׁר
  english_pob_choice: If a man
  chosen_spanish: Si un hombre
  alternatives_spanish:
  - Y un hombre
  - Un hombre
  lexicon: HALOT
  rationale: En este caso jurídico casuístico, el hebreo introduce una condición. En español, 'Si un hombre' comunica con naturalidad la formulación legal sin perder el sujeto masculino singular del texto.
- source_word: יִשְׁכַּב אֶת
  english_pob_choice: lies with
  chosen_spanish: se acuesta con
  alternatives_spanish:
  - tiene relaciones sexuales con
  - duerme con
  lexicon: HALOT
  rationale: La expresión hebrea es un eufemismo sexual de valor legal. 'Se acuesta con' mantiene el registro bíblico y la referencia a relación sexual ilícita sin volverla demasiado técnica ni suavizarla en exceso.
- source_word: אֵשֶׁת אָבִיו
  english_pob_choice: his father's wife
  chosen_spanish: la esposa de su padre
  alternatives_spanish:
  - la mujer de su padre
  - su madrastra
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'la esposa de su padre'. Se conserva esa relación genealógica y legal; 'madrastra' sería más interpretativo y estrecho de lo que el texto afirma.
- source_word: עֶרְוַת אָבִיו גִּלָּה
  english_pob_choice: he has uncovered his father's nakedness
  chosen_spanish: ha descubierto la desnudez de su padre
  alternatives_spanish:
  - ha expuesto la desnudez de su padre
  - ha deshonrado sexualmente a su padre
  lexicon: HALOT
  rationale: Se conserva el idiomatismo levítico 'descubrir la desnudez', importante para los vínculos internos con Levítico 18 y 20. 'Desnudez' refleja la fórmula fija sin reinterpretarla como mera metáfora moral.
- source_word: מוֹת יוּמְתוּ
  english_pob_choice: shall surely be put to death
  chosen_spanish: serán sin falta muertos
  alternatives_spanish:
  - deberán ser muertos
  - ciertamente morirán
  lexicon: HALOT
  rationale: La construcción intensiva hebrea exige fuerza de obligación/certeza. 'Serán sin falta muertos' conserva el énfasis legal y el resultado judicial sin especificar un método no indicado por el texto.
- source_word: שְׁנֵיהֶם
  english_pob_choice: both of them
  chosen_spanish: ambos
  alternatives_spanish:
  - los dos
  - ambos de ellos
  lexicon: HALOT
  rationale: '''Ambos'' transmite la inclusión explícita de las dos partes implicadas, de forma natural en español y sin redundancia innecesaria.'
- source_word: דְּמֵיהֶם בָּם
  english_pob_choice: their blood is on them
  chosen_spanish: su sangre cae sobre ellos
  alternatives_spanish:
  - su sangre está sobre ellos
  - la culpa de su sangre está sobre ellos
  lexicon: HALOT
  rationale: Se preserva la fórmula legal de responsabilidad sobre los propios culpables. 'Cae sobre ellos' hace inteligible en español la imagen de carga/culpa sanguínea, manteniendo el sentido jurídico del hebreo.
theological_decisions:
- issue: Mantener el idiomatismo sexual levítico sin diluir su fuerza normativa
  english_pob_reading: he has uncovered his father's nakedness
  chosen_spanish_reading: ha descubierto la desnudez de su padre
  alternative_spanish_readings:
  - ha deshonrado sexualmente a su padre
  rationale: La traducción conserva la frase fija del código de santidad, que funciona como término técnico para una violación sexual prohibida. Esto preserva la red intertextual y evita reemplazarla por una paráfrasis menos precisa.
  doctrine_reference: Levítico 18–20; filosofía de traducción §§1, 3, 5
- issue: Asignación de responsabilidad legal a los culpables
  english_pob_reading: their blood is on them
  chosen_spanish_reading: su sangre cae sobre ellos
  alternative_spanish_readings:
  - su sangre está sobre ellos
  - la culpa de su sangre está sobre ellos
  rationale: La fórmula expresa que la responsabilidad por la pena recae en los propios transgresores. La versión española mantiene ese peso jurídico y evita suavizar el alcance punitivo del pasaje.
  doctrine_reference: Fórmulas legales del Pentateuco; filosofía de traducción §5
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el análisis auditado en inglés. Se conserva la fórmula levítica 'descubrir la desnudez' y la estructura legal de castigo, con una adaptación española natural para lectura pública.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto hebreo contiene el nombre divino; este versículo no lo contiene.
  - Se mantiene 'desnudez' como término técnico del código de santidad, en vez de sustituirlo por una paráfrasis moral.
  - '''Serán sin falta muertos'' busca reflejar la intensidad del hebreo מוֹת יוּמְתּוּ sin introducir detalles no presentes en el verso.'
