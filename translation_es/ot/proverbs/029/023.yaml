review_pass:
  verdict: revise
  source_alignment_summary: 'La primera cola del versículo está bien encaminada: גַּאֲוַת אָדָם = «la soberbia del hombre» y תַּשְׁפִּילֶנּוּ = «lo humilla / lo rebaja» preservan el sentido causativo de ser abatido. La segunda cola, sin embargo, no refleja adecuadamente la decisión auditada del POB para יִתְמֹךְ. El inglés base escogió «will obtain honor» y dejó «hold fast to honor / attain honor» solo en nota. El borrador español puso «retiene el honor» como lectura principal, desplazando indebidamente el sentido principal hacia conservación más que obtención/alcanza.'
  spanish_quality_summary: El español es generalmente legible y digno, pero «pero el de espíritu humilde» suena algo elíptico. «Pero el humilde de espíritu» o «pero el de espíritu humilde» ambos son comprensibles; el primero se ajusta mejor al giro sapiencial y evita la sensación de frase truncada. También conviene simplificar las notas para que sigan de cerca la evidencia léxica sin sobrecargar con una opción principal menos probable.
  glossary_alignment: 'No hay conflictos con la terminología de proyecto. «Soberbia», «hombre» y «honor» son adecuados. La principal desalineación es léxica con יִתְמֹךְ: debe reflejarse como «obtiene / alcanza» en el texto principal, dejando «retiene / asirá / mantendrá» como alternativas en nota, en consonancia con la auditoría inglesa.'
  issues:
  - severity: high
    issue: La lectura principal de יִתְמֹךְ como «retiene» no sigue la decisión principal del POB auditado.
    rationale: El expediente inglés eligió «will obtain» como sentido principal y reservó «hold fast to / attain» para nota. «Retiene» cambia el resultado del proverbio de recibir honor a conservar honor.
  - severity: medium
    issue: La nota [b] mezcla demasiadas opciones y prioriza implícitamente una semántica distinta de la principal.
    rationale: La nota debe apoyar la lectura principal y mencionar alternativas reales del verbo, no invertir la jerarquía establecida por la auditoría.
  - severity: low
    issue: «El de espíritu humilde» es entendible pero algo elíptico.
    rationale: «El humilde de espíritu» suena más natural y conserva bien la metáfora interior del hebreo.
  revised_spanish_text: La soberbia[a] del hombre lo humilla, pero el humilde de espíritu obtiene[b] honor.
  revised_footnotes:
  - marker: a
    text: O «lo abate» o «lo rebaja». El hebreo puede significar hacer bajar, humillar o abatir.
    reason: lexical_alternative
  - marker: b
    text: O «retendrá el honor» o «alcanzará honor». El verbo hebreo puede implicar asir, sostener o obtener.
    reason: lexical_alternative
  revision_rationale: Se ajusta יִתְמֹךְ a la lectura principal documentada por el POB («obtiene») y se trasladan los matices de sostener/alcanzar a nota. Además, se mejora la naturalidad de la segunda cola con «el humilde de espíritu» y se simplifica la redacción para un español más claro y fiel al paralelismo sapiencial.
