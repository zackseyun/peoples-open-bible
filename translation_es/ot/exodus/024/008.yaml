base_translation:
  language: en
  yaml_path: translation/ot/exodus/024/008.yaml
  text: Then Moses took the blood and threw it on the people[a], and said, “Behold[b], the blood of the covenant that Yahweh has made with you concerning all these words.”
  footnotes:
  - marker: a
    text: Or “sprinkled it on the people.” The Hebrew verb more literally means “threw” or “cast,” but in sacrificial contexts it can describe ritual application of blood.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “has cut with you,” an idiom meaning “has made a covenant with you.”
    reason: lexical_alternative
