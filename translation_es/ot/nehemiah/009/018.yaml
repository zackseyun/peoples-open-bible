translation:
  language: es
  text: 'Aun cuando se hicieron para sí un becerro de metal fundido y dijeron[a]: «Este es tu dios, que te sacó de Egipto», y cometieron grandes blasfemias[b],'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un becerro fundido».
    reason: lexical_alternative
  - marker: b
    text: O «grandes provocaciones» o «grandes actos de desprecio».
    reason: lexical_alternative
lexical_decisions:
- source_word: אַף כִּי
  english_pob_choice: Even when
  chosen_spanish: Hasta
  alternatives_spanish:
  - Aun cuando
  - Aunque
  lexicon: HALOT
  rationale: La fuerza concesiva se conserva con una fórmula natural en español. «Hasta» aquí introduce una sorpresa enfática dentro del repaso del pecado de Israel, sin volver la frase pesada ni demasiado literal.
- source_word: עָשׂוּ לָהֶם
  english_pob_choice: they made for themselves
  chosen_spanish: se hicieron para sí
  alternatives_spanish:
  - se hicieron
  - hicieron para sí
  lexicon: HALOT
  rationale: El matiz reflexivo de לָהֶם se expresa con «para sí», que comunica que el ídolo fue hecho para su propio uso y adoración.
- source_word: עֵגֶל מַסֵּכָה
  english_pob_choice: a cast metal calf
  chosen_spanish: un becerro de metal fundido
  alternatives_spanish:
  - un becerro fundido
  - un becerro de metal vaciado
  - un ídolo en forma de becerro
  lexicon: HALOT
  rationale: «Metal fundido» mantiene el carácter de imagen fabricada/cast in metal y, a la vez, suena más natural que un calco rígido. «Becerro» conserva la forma del objeto idolátrico.
- source_word: זֶה אֱלֹהֶיךָ
  english_pob_choice: This is your god
  chosen_spanish: Este es tu dios
  alternatives_spanish:
  - Este es tu Dios
  - Estos son tus dioses
  lexicon: HALOT
  rationale: El hebreo es singular, y el contexto es idolátrico; por eso «dios» va en minúscula. Se conserva el singular demostrativo y la carga polémica del discurso del becerro.
- source_word: אֲשֶׁר הֶעֶלְךָ מִמִּצְרַיִם
  english_pob_choice: who brought you up out of Egypt
  chosen_spanish: que te sacó de Egipto
  alternatives_spanish:
  - que te hizo subir de Egipto
  - que te sacó fuera de Egipto
  lexicon: HALOT
  rationale: En español, «sacar de Egipto» comunica de modo idiomático la fórmula del éxodo y mantiene la referencia al acto salvador recordado por el texto.
- source_word: וַיַּעֲשׂוּ
  english_pob_choice: and committed
  chosen_spanish: y cometieron
  alternatives_spanish:
  - y hicieron
  - y realizaron
  lexicon: HALOT
  rationale: Con el sustantivo siguiente, el verbo español natural es «cometer», que expresa con claridad la gravedad del acto sin diluirlo en un «hacer» demasiado general.
- source_word: נֶאָצ֖וֹת גְּדֹלֽוֹת
  english_pob_choice: great blasphemies
  chosen_spanish: grandes blasfemias
  alternatives_spanish:
  - grandes provocaciones
  - grandes desprecios
  - grandes actos de desprecio
  lexicon: HALOT
  rationale: «Blasfemias» refleja bien el ofensa dirigida contra Dios en este contexto de idolatría. Se conserva el peso teológico fuerte que la POB inglesa también destacó, con una opción clara y reverente en español.
theological_decisions:
- issue: Referencia singular de «tu dios» en el becerro de oro
  english_pob_reading: your god
  chosen_spanish_reading: tu dios
  alternative_spanish_readings:
  - tu Dios
  - tus dioses
  rationale: El texto hebreo usa singular, y la escena alude al ídolo presentado como deidad. La minúscula evita confundirlo con Yahvé y mantiene la ironía narrativa.
  doctrine_reference: Nehemías 9:18; Éxodo 32:4
- issue: Fuerza de נֶאָצוֹת como afrenta contra Dios
  english_pob_reading: blasphemies
  chosen_spanish_reading: blasfemias
  alternative_spanish_readings:
  - provocaciones
  - actos de desprecio
  rationale: 'En el contexto del becerro de oro, la culpa no es solo moral sino también teológica: se trata de una ofensa grave contra Dios. «Blasfemias» preserva esa dirección vertical sin suavizar el juicio del texto.'
  doctrine_reference: Tradición exegética del pecado del becerro de oro; cf. Nehemías 9:18
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo y toma en cuenta el audit trail inglés: mantiene el matiz concesivo de אַף כִּי, el reflexivo de לָהֶם, la singularidad de אֱלֹהֶיךָ y la fuerza ofensiva de נֶאָצוֹת. No se detectaron revisiones aplicadas en el registro inglés, así que la propuesta se alinea con la última lectura aprobada.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general del proyecto, pero aquí no aparece el tetragrámaton en el versículo.
  - Se mantiene «dios» en minúscula por tratarse de una pretensión idolátrica, no del Dios verdadero.
  - «Blasfemias» conserva la gravedad religiosa del cierre y evita neutralizar el término con un equivalente demasiado general.
