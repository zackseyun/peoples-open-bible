    reason: lexical_alternative
  revision_rationale: Se ajusta el verbo principal a una formulación española más idiomática y fiel al sentido narrativo («había llevado»), se mejora la expresión del modismo «pitch a tent» con «había armado una tienda para ella», y se corrige la nota para reflejar con mayor precisión la alternativa lexical documentada en la auditoría inglesa. No se requiere adjudicación adicional.
