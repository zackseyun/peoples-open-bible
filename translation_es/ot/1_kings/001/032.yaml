translation:
  language: es
  text: 'Entonces el rey David dijo: «Háganme venir a Sadoc el sacerdote, a Natán el profeta y a Benaía hijo de Joiadá». Y se presentaron ante el rey.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Así que ... dijo
  lexicon: HALOT
  rationale: La forma narrativa con waw-consecutiva avanza la acción en secuencia. «Entonces» conserva ese avance de manera natural en español sin perder el valor narrativo.
- source_word: הַמֶּלֶךְ דָּוִד
  english_pob_choice: King David
  chosen_spanish: el rey David
  alternatives_spanish:
  - David, el rey
  - el rey, David
  lexicon: HALOT
  rationale: Es una construcción appositiva que identifica a David por su título real. «El rey David» suena natural en español y mantiene la identificación directa.
- source_word: קִרְאוּ לִי
  english_pob_choice: Call ... to me
  chosen_spanish: Llamen a mí
  alternatives_spanish:
  - Traigan a mí
  - Hagan venir a mí
  lexicon: HALOT
  rationale: El imperativo plural con לִי expresa que se haga venir a estas personas a la presencia del hablante. «Llamen a mí» sigue de cerca la fuerza del hebreo, aunque en español suena mejor como una orden de convocación.
- source_word: לְצָדוֹק
  english_pob_choice: Zadok
  chosen_spanish: Sadoc
  alternatives_spanish:
  - Zadoc
  - Zadok
  lexicon: HALOT
  rationale: Se translitera el nombre propio con la forma española más reconocible en el ámbito bíblico hispanohablante, sin alterar la identidad del personaje.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el presbítero
  - el ministro cultual
  lexicon: HALOT
  rationale: כֹּהֵן designa el oficio sacerdotal; «sacerdote» es el equivalente directo y claro en español.
- source_word: וּלְנָתָן הַנָּבִיא
  english_pob_choice: Nathan the prophet
  chosen_spanish: a Natán el profeta
  alternatives_spanish:
  - a Natán, el profeta
  - a Natán, el vidente
  lexicon: HALOT
  rationale: Nombre propio más título definido. «Profeta» traduce נָבִיא con precisión y mantiene la función oficial del personaje.
- source_word: וְלִבְנָיָהוּ בֶּן יְהוֹיָדָע
  english_pob_choice: and Benaiah son of Jehoiada
  chosen_spanish: y a Benaía hijo de Joiadá
  alternatives_spanish:
  - y a Benaía, hijo de Joiadá
  - y a Benaías hijo de Joiadá
  lexicon: HALOT
  rationale: «Hijo de» es la equivalencia normal de בֶּן en identificación genealógica. Se usa Benaía/Joiadá como formas españolas usuales de los nombres.
- source_word: וַיָּבֹאוּ
  english_pob_choice: And they came
  chosen_spanish: Y ellos vinieron
  alternatives_spanish:
  - Y llegaron
  - Entonces vinieron
  lexicon: HALOT
  rationale: El verbo de movimiento plural expresa que acudieron a la presencia del rey. «Vinieron» conserva el movimiento sin forzar una interpretación más específica.
- source_word: לִפְנֵי הַמֶּלֶךְ
  english_pob_choice: before the king
  chosen_spanish: delante del rey
  alternatives_spanish:
  - ante el rey
  - en presencia del rey
  lexicon: HALOT
  rationale: לִפְנֵי indica posición ante alguien. «Delante del rey» es claro y natural en español; «ante» o «en presencia de» serían alternativas válidas.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca la lectura hebrea y coincide sustancialmente con la solución auditada en inglés: convocatoria de tres figuras específicas y su comparecencia ante el rey. No hay variantes textuales relevantes en este versículo que requieran nota.'
  spanish_consistency_notes:
  - Se mantiene la forma «el rey David» para la apposición del hebreo.
  - Se usa «sacerdote» para כֹּהֵן y «profeta» para נָבִיא, sin ampliaciones interpretativas.
  - 'Los nombres propios se adaptan a formas españolas habituales: Sadoc, Natán, Benaía, Joiadá.'
  - «Delante del rey» conserva la relación espacial/personal de לִפְנֵי sin sobretraducción.
