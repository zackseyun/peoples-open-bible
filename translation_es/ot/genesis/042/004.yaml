translation:
  language: es
  text: 'Pero Jacob no envió a Benjamín[a], hermano de José, con sus hermanos, porque dijo: «No sea que le ocurra algún daño».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no sea que le sobrevenga un desastre».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֶת
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Mas
  lexicon: HALOT
  rationale: 'La conjunción enlaza con la escena previa, pero aquí el contraste narrativo en español se expresa mejor con «Pero», porque introduce la excepción: los otros hijos fueron, Benjamín no.'
- source_word: בִּנְיָמִין
  english_pob_choice: Benjamin
  chosen_spanish: Benjamín
  alternatives_spanish:
  - Benjamin
  lexicon: HALOT
  rationale: Se usa la forma española habitual del nombre propio, con acentuación normativa en español.
- source_word: אֲחִי יוֹסֵף
  english_pob_choice: Joseph’s brother
  chosen_spanish: hermano de José
  alternatives_spanish:
  - el hermano de José
  lexicon: HALOT
  rationale: La relación en constructo se vierte de modo natural en español como «hermano de José», conservando la identificación de Benjamín dentro de la familia de José sin introducir un giro posesivo forzado.
- source_word: לֹא שָׁלַח
  english_pob_choice: did not send
  chosen_spanish: no envió
  alternatives_spanish:
  - no mandó
  - no despachó
  lexicon: HALOT
  rationale: שׁלח en narración se entiende como «enviar»; «envió» comunica el acto sin carga interpretativa adicional. En español, el auxiliar del inglés no es necesario.
- source_word: אֶת אֶחָיו
  english_pob_choice: with his brothers
  chosen_spanish: con sus hermanos
  alternatives_spanish:
  - junto con sus hermanos
  - con los otros hermanos
  lexicon: HALOT
  rationale: El sentido contextual es que Benjamín no fue enviado en compañía de sus hermanos. «Con sus hermanos» preserva esa relación de compañía de manera natural en español.
- source_word: כִּי אָמַר
  english_pob_choice: for he said
  chosen_spanish: porque dijo
  alternatives_spanish:
  - pues dijo
  - ya que dijo
  lexicon: HALOT
  rationale: כִּי introduce la razón explicativa; «porque» es la forma más clara y directa en español, y «dijo» mantiene el verbo explícito del hebreo sin convertirlo en mera inferencia.
- source_word: פֶּן
  english_pob_choice: Lest
  chosen_spanish: No sea que
  alternatives_spanish:
  - para que no
  - por si
  lexicon: HALOT
  rationale: פֶּן expresa temor ante una posibilidad. En español, «No sea que» reproduce bien esa advertencia preventiva con un registro digno y natural.
- source_word: יִקְרָאֶנּוּ
  english_pob_choice: happen to him
  chosen_spanish: le ocurra
  alternatives_spanish:
  - le suceda
  - le acontezca
  lexicon: HALOT
  rationale: El verbo de encuentro/acaecimiento se vierte idiomáticamente como «ocurra», que en español transmite que algo le sucede a él, sin precisar más de lo que el hebreo dice.
- source_word: אָסוֹן
  english_pob_choice: harm
  chosen_spanish: algún daño
  alternatives_spanish:
  - daño
  - desgracia
  - desastre
  lexicon: HALOT
  rationale: אָסוֹן denota un mal serio, daño o desgracia. «Algún daño» conserva la amplitud semántica y el temor paternal sin volver el texto demasiado abstracto o demasiado fuerte.
theological_decisions:
- issue: Alcance de אָסוֹן en la advertencia de Jacob
  english_pob_reading: Or “lest disaster befall him.”
  chosen_spanish_reading: «No sea que le ocurra algún daño»
  alternative_spanish_readings:
  - «No sea que le sobrevenga un desastre»
  - «No sea que le acontezca una desgracia»
  rationale: El hebreo permite un rango entre daño, desgracia y desastre. En español, «algún daño» mantiene el nivel de gravedad sin fijarlo innecesariamente en «desastre», que puede sonar más fuerte de lo que exige el contexto inmediato.
  doctrine_reference: Precisión semántica del texto narrativo; no implica una enseñanza doctrinal específica.
translation_notes:
  revision_awareness: El texto inglés auditado quedó sin cambios en su última revisión. La versión española sigue esa lectura estable, manteniendo la misma decisión principal sobre אָסוֹן y la estructura causal de la frase.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en otros contextos del proyecto, pero este versículo no lo contiene.
  - Se conserva la distinción narrativa entre «envió» y la relación de compañía expresada por «con sus hermanos».
  - Se evita el calco de «lest»; se usa una construcción española natural que preserva el temor preventivo.
