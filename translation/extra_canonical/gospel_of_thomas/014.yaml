translation:
  text: Jesus said to them[1], "If you fast, you will acquire a sin for yourselves;
    and if you pray, you will be condemned; and if you give alms, you will do evil
    to your spirits. And if you go into any land and walk in the regions, if they
    receive you, eat what they set before you, and heal the sick among them. For what
    goes into your mouth will not defile you, but what comes out of your mouth[3][2],
    that is what will defile you."
  philosophy: optimal-equivalence
  drafter_model: gemini-3.1-pro-preview
  drafter_label: gemini_3_1_pro_thomas_redraft
  drafted_at: '2026-04-22T09:52:37Z'
  footnotes:
  - marker: '1'
    text: Lit. 'they will condemn you', a common Coptic idiom for the passive voice.
    reason: register_note
  - marker: '2'
    text: The Coptic verb ϫⲡⲟ can mean 'acquire' or 'beget'.
    reason: lexical_alternative
  - marker: '3'
    text: 'The Coptic uses left-dislocation for emphasis: ''what they will set before
      you, eat it; the sick among them, heal them.'''
    reason: register_note
lexical_decisions:
- source_word: ϫⲡⲟ
  chosen: acquire
  rationale: The verb ϫⲡⲟ means 'to beget, acquire, get'. In the context of 'a sin'
    (ⲟⲩⲛⲟⲃⲉ), 'acquire' captures the sense of bringing something upon oneself, though
    'beget' would also be a striking, literal Thomasine choice.
  lexicon: Crum 778a
  alternatives:
  - beget
  - bring upon
- source_word: ⲕⲁⲧⲁⲕⲣⲓⲛⲉ
  chosen: condemned
  rationale: The Coptic uses the active third-person plural ⲥⲉⲛⲁⲣ̄ⲕⲁⲧⲁⲕⲣⲓⲛⲉ ('they
    will condemn you') as a standard idiom for the passive voice ('you will be condemned').
  lexicon: Greek loanword (κατακρίνω)
  alternatives:
  - they will condemn you
- source_word: ⲕⲱ ϩⲁ-
  chosen: set before
  rationale: The idiom ⲕⲱ ϩⲁ- literally means 'to place under', but in the context
    of food and hospitality, it means 'to set before' someone.
  lexicon: Crum 95b
  alternatives:
  - place before
- source_word: ϫⲱϩⲙ̄
  chosen: defile
  rationale: Standard term for ritual or moral pollution.
  lexicon: Crum 798a
  alternatives:
  - pollute
theological_decisions:
- issue: Rejection of traditional piety
  chosen_reading: acquire a sin for yourselves / do evil to your spirits
  rationale: The text is deliberately provocative, overturning standard religious
    practices. The translation resists any temptation to soften 'acquire a sin' or
    'do evil' into less jarring English.
  alternatives_noted:
  - bring sin upon yourselves
  - cause harm to your spirits
drafter_notes: This saying explicitly rejects traditional Jewish and early Christian
  piety (fasting, praying, almsgiving) as spiritually harmful, a core Thomasine theme
  (cf. Saying 6, 104). The translation preserves the starkness of 'acquire a sin'
  and 'do evil to your spirits' without softening it. The second half parallels Luke
  10:8-9 and Matthew 15:11, but the English strictly follows the Coptic syntax and
  vocabulary rather than harmonizing with the canonical versions.
