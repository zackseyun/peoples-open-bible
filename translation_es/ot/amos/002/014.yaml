    issue: «el valiente» para גִּבּוֹר
    rationale: גִּבּוֹר aquí se justifica en la auditoría inglesa como término militar («warrior»). «Valiente» describe una cualidad, pero no necesariamente a un combatiente; «guerrero» preserva mejor el sentido contextual.
  - severity: low
    issue: «perecerá del veloz» suena poco natural
    rationale: Aunque reproduce formalmente la separación de מִן, en español «la huida perecerá para el veloz» comunica con mayor claridad que al veloz se le quitará la posibilidad de huir.
  - severity: low
