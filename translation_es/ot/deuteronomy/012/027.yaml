- from: Y harás tus holocaustos[a], la carne y la sangre, sobre el altar de Yahvé tu Dios; y la sangre de tus sacrificios será derramada sobre el altar de Yahvé tu Dios, y comerás la carne.
  to: Y ofrecerás tus holocaustos[a], la carne y la sangre, sobre el altar de Yahvé tu Dios; y la sangre de tus sacrificios será derramada sobre el altar de Yahvé tu Dios, y comerás la carne.
  rationale: Se reemplaza «harás» por «ofrecerás» para reflejar el sentido idiomático sacrificial de וְעָשִׂיתָ con עֹלֹתֶיךָ y mejorar la naturalidad en español. Se conserva una nota para la literalidad hebrea «harás». No se requieren otros cambios.
