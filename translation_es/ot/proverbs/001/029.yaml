translation:
  language: es
  text: Porque aborrecieron el conocimiento y no escogieron el temor de Yahvé[a][b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or «el temor de Yahvé». El hebreo usa el nombre divino יְהוָה.
    reason: alternative_reading
  - marker: b
    text: «El temor de Yahvé» es una expresión sapiencial clave que incluye asombro reverente, no mero terror.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּ֭חַת כִּי
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Puesto que
  - Ya que
  - Pues
  lexicon: HALOT
  rationale: La construcción introduce la causa de la afirmación precedente. «Porque» comunica de forma natural y fiel esa relación causal en español, sin añadir matices que el hebreo no exige.
- source_word: שָׂ֣נְאוּ
  english_pob_choice: they hated
  chosen_spanish: aborrecieron
  alternatives_spanish:
  - odiaron
  - rechazaron
  - despreciaron
  lexicon: HALOT
  rationale: El verbo hebreo expresa una aversión intensa. En español, «aborrecer» conserva mejor esa fuerza moral que «rechazar» o «despreciar», y evita una posible asociación puramente emocional de «odiar».
- source_word: דָ֑עַת
  english_pob_choice: knowledge
  chosen_spanish: el conocimiento
  alternatives_spanish:
  - la sabiduría
  - el entendimiento
  - el discernimiento
  lexicon: HALOT
  rationale: En Proverbios, דָעַת pertenece al campo sapiencial del conocimiento moral y formativo. «El conocimiento» es la correspondencia más directa y mantiene la amplitud del término.
- source_word: יִרְאַת יְהוָה
  english_pob_choice: the fear of Yahweh
  chosen_spanish: el temor de Yahvé
  alternatives_spanish:
  - el temor de Yahweh
  - la reverencia por Yahvé
  - el temor del SEÑOR
  lexicon: HALOT
  rationale: Se preserva la expresión sapiencial fija con «temor», porque «reverencia» suaviza la tensión semántica del hebreo. «Yahvé» traduce el nombre divino según la norma del proyecto y evita la sustitución por un título.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como «Yahvé» conforme a la terminología del proyecto en español, preservando el nombre propio divino en lugar de reemplazarlo por una fórmula titulada.
- source_word: לֹ֣א בָחָֽרוּ
  english_pob_choice: did not choose
  chosen_spanish: no escogieron
  alternatives_spanish:
  - no eligieron
  - no optaron por
  - no prefirieron
  lexicon: HALOT
  rationale: «Escogieron» reproduce con naturalidad el verbo elegir/escoger y conserva la idea volitiva del hebreo sin añadir la intensidad interpretativa de «rechazaron».
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  - el SEÑOR
  rationale: La lectura española sigue la convención del proyecto para el Nombre divino, manteniendo su carácter propio y evitando la sustitución por un título. Esto conserva la transparencia frente al hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Expresión sapiencial יִרְאַת יְהוָה
  english_pob_reading: the fear of Yahweh
  chosen_spanish_reading: el temor de Yahvé
  alternative_spanish_readings:
  - la reverencia por Yahvé
  - el respeto por Yahvé
  rationale: «Temor» preserva la carga teológica y sapiencial del hebreo, que incluye asombro reverente y seriedad moral. «Reverencia» o «respeto» reducirían el alcance del término.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §5
translation_notes:
  revision_awareness: 'El texto griego/inglés de apoyo coincide sustancialmente con el hebreo: la causalidad de תַּחַת כִּי, el valor fuerte de שָׂנְאוּ, el sustantivo sapiencial דָעַת, la expresión fija יִרְאַת יְהוָה y el verbo volitivo בָחָרוּ. No se requirieron correcciones de revisión; se mantuvo la decisión del audit trail de conservar el peso semántico de «fear» y la mención explícita del Nombre divino, trasladadas al español con «temor» y «Yahvé».'
  spanish_consistency_notes:
  - Se mantiene el paralelismo sintáctico con la línea hebrea y con la versión auditada en inglés.
  - Se usa «Yahvé» de forma consistente con la norma terminológica del proyecto en español.
  - «Aborrecieron» y «no escogieron» conservan el tono moral fuerte del proverbio sin añadir explicaciones.
  - Las notas al pie distinguen la alternativa de lectura y la nota lexical sobre la expresión sapiencial.
