translation:
  language: es
  text: Y aunque quede en ella una décima parte, volverá a ser para el fuego, como un terebinto o como un roble, cuyo tocón queda cuando es talado[a]. La semilla santa es su tocón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'al caer las hojas' / 'cuando caen sus hojas'. El término hebreo בְּשַׁלֶּכֶת es difícil; el texto principal sigue el sentido que mejor encaja con la imagen del tocón de un árbol después de ser cortado.
    reason: lexical_alternative
lexical_decisions:
- source_word: ע֥וֹד
  english_pob_choice: though ... remains
  chosen_spanish: y aunque quede
  alternatives_spanish:
  - todavía
  - aún
  - y si bien queda
  lexicon: HALOT
  rationale: 'עוֹד aquí introduce una concesión: aun si queda algo, el juicio sigue. ''Y aunque quede'' conserva esa fuerza concesiva en español sin volverla explicativa o temporal.'
- source_word: עֲשִׂרִיָּה
  english_pob_choice: a tenth
  chosen_spanish: una décima parte
  alternatives_spanish:
  - un diezmo
  - un décimo
  - la décima parte
  lexicon: HALOT
  rationale: La referencia es cuantitativa, a una porción de diez. 'Una décima parte' es natural en español y evita la posible carga cultual de 'diezmo'.
- source_word: וְשָׁבָה
  english_pob_choice: will again
  chosen_spanish: volverá
  alternatives_spanish:
  - regresará
  - volverá otra vez
  lexicon: HALOT
  rationale: En este contexto שוב expresa recurrencia del juicio, no movimiento físico. 'Volverá' comunica bien esa repetición; el adverbio 'otra vez' no es necesario porque el contexto ya lo marca.
- source_word: וְהָיְתָה לְבָעֵר
  english_pob_choice: it will again be for burning
  chosen_spanish: será para el fuego
  alternatives_spanish:
  - será para quemarse
  - será destinada a ser quemada
  - servirá de combustible
  lexicon: HALOT
  rationale: לְבָעֵר indica finalidad de quemado/consumo. 'Para el fuego' mantiene la imagen abierta y sigue de cerca la formulación del POB inglés sin precisar demasiado el modo de destrucción.
- source_word: כָּאֵלָה
  english_pob_choice: like a terebinth
  chosen_spanish: como una encina
  alternatives_spanish:
  - como un terebinto
  - como un terebinto/encina
  - como un árbol grande
  lexicon: HALOT
  rationale: El término hebreo designa un árbol específico, tradicionalmente identificado como terebinto. En español, 'encina' es una equivalencia botánica cercana y más transparente para lectores generales; se conserva la comparación arbórea concreta.
- source_word: וְכָאַלּוֹן
  english_pob_choice: or like an oak
  chosen_spanish: o como un roble
  alternatives_spanish:
  - y como un roble
  - o como una encina
  - o como un árbol
  lexicon: HALOT
  rationale: אַלּוֹן es 'oak'; 'roble' es el equivalente español más directo y natural. Se mantiene la coordinación comparativa del hebreo como alternativa paralela en la imagen.
- source_word: בְּשַׁלֶּכֶת
  english_pob_choice: when it is felled
  chosen_spanish: cuando es talado
  alternatives_spanish:
  - al caer las hojas
  - cuando pierde las hojas
  - en la tala
  lexicon: HALOT
  rationale: El término es difícil. El POB inglés sigue la imagen del árbol cortado para ajustarse al contexto del tocón. 'Cuando es talado' conserva esa lectura; la alternativa literal relacionada con la caída de hojas queda para nota.
- source_word: מַצֶּבֶת בָּם
  english_pob_choice: whose stump remains
  chosen_spanish: cuyo tocón queda
  alternatives_spanish:
  - cuyo tronco queda
  - en quienes queda un tocón
  - cuyo tocón permanece
  lexicon: HALOT
  rationale: En el contexto arbóreo, מַצֶּבֶת apunta al resto firme que queda tras el corte. 'Tocón' expresa de manera clara la imagen del residuo del árbol y corresponde al 'stump' del POB inglés.
- source_word: זֶרַע קֹדֶשׁ
  english_pob_choice: The holy seed
  chosen_spanish: La semilla santa
  alternatives_spanish:
  - un linaje santo
  - la descendencia santa
  - la simiente santa
  lexicon: HALOT
  rationale: Se conserva la metáfora agrícola/genealógica literal. 'Semilla santa' sigue la elección del POB y mantiene la tensión teológica sin explicitar si se trata de remanente, linaje o continuidad futura.
- source_word: מַצַּבְתָּהּ
  english_pob_choice: is its stump
  chosen_spanish: es su tocón
  alternatives_spanish:
  - es su estirpe
  - es su tronco
  - es su tocón o cepa
  lexicon: HALOT
  rationale: El mismo campo semántico del versículo vincula esta cláusula con el resto del árbol. 'Tocón' mantiene la coherencia con la imagen previa y funciona de forma natural en español.
theological_decisions:
- issue: Identidad de la 'semilla santa'
  english_pob_reading: Rendered as 'The holy seed is its stump' without specifying whether this refers to a faithful remnant, Israel's future continuation, or a messianic line.
  chosen_spanish_reading: La semilla santa es su tocón.
  alternative_spanish_readings:
  - el remanente fiel es su tocón
  - la descendencia del pacto es su tocón
  - una línea mesiánica es su tocón
  rationale: El hebreo concluye con una metáfora condensada y no define explícitamente el referente más allá de una continuidad consagrada tras el juicio. La traducción conserva la literalidad para no resolver la tensión interpretativa que el texto deja abierta.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del POB inglés, que prefirió 'for burning' frente a una formulación más interpretativa. En español se refleja con 'será para el fuego', evitando precisar más allá del valor causal/final de לְבָעֵר y conservando la imagen del tocón y la semilla santa. También se mantuvo la alternativa semántica de בְּשַׁלֶּכֶת en nota, por la misma razón de transparencia auditiva.
  spanish_consistency_notes:
  - Se mantiene la misma imagen arbórea con 'tocón' en ambas cláusulas para reflejar מַצֶּבֶת / מַצַּבְתָּהּ de manera coherente.
  - Se usa 'semilla santa' de forma literal y consistente con el POB inglés, sin sustituirla por un término explicativo como 'remanente'.
  - Se evita 'SEÑOR' u otras sustituciones en mayúsculas porque el versículo no contiene el Tetragrámaton.
  - 'La puntuación conserva la estructura comparativa del hebreo: concesión inicial, juicio repetido, dos comparaciones arbóreas, y conclusión nominal.'
