review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura comparativa del hebreo y preserva los elementos clave: «cielos nuevos y tierra nueva», la acción divina en presente («yo hago»), la permanencia/continuidad de עמד, y el nombre divino «Yahvé». También mantiene la nota léxica pertinente sobre עמד. Sin embargo, cambia innecesariamente la segunda persona plural del hebreo («vuestro») a tercera persona formal («su»), lo que debilita la referencia directa al destinatario del texto. Además, «también» no corresponde a un elemento explícito en el hebreo.'
  spanish_quality_summary: El español es claro y digno, pero conviene ajustar la concordancia pronominal para mantener una línea de tratamiento coherente dentro del versículo. «Su descendencia y su nombre» suena posible en español general, pero aquí introduce distancia y pierde la fuerza del original. «Vuestra descendencia y vuestro nombre» es fiel y plenamente inteligible en registro bíblico moderno. El resto del verso lee con naturalidad.
  glossary_alignment: 'Alineado con la terminología del proyecto: «Yahvé» para יהוה, «descendencia» como equivalente válido de זרע en sentido colectivo, y «permanecer» para עמד en contexto de duración. No hay conflicto doctrinal relevante. La única desviación notable es pronominal/estilística, no de glosario.'
  issues:
  - severity: medium
    issue: Cambio de segunda persona plural a tercera persona formal en «su descendencia y su nombre»
    rationale: El hebreo tiene sufijos de 2mp en זַרְעֲכֶם y שִׁמְכֶם, y el inglés POB también conserva «your ... your». En español, pasar a «su» introduce ambigüedad y altera la apelación directa del texto.
  - severity: low
    issue: Adición de «también» en la cláusula final
    rationale: כֵּן marca la correlación «así... así», pero no exige «también». No es una gran distorsión, pero es mejor omitirlo para una correspondencia más exacta y una cadencia más limpia.
  - severity: low
    issue: La justificación léxica de «su nombre» menciona una nota textual que no existe
    rationale: La explicación dice que una nota preserva la literalidad de «nombre», pero no hay tal nota específica; además, el problema real no es «nombre» sino el cambio de persona gramatical.
  revised_spanish_text: Porque, así como los cielos nuevos y la tierra nueva que yo hago permanecerán delante de mí[a], declara Yahvé, así permanecerán vuestra descendencia y vuestro nombre.
  revised_footnotes:
  - marker: a
    text: O «estarán en pie» / «subsistirán» para ambos verbos עמד («estar en pie, permanecer»).
    reason: lexical_alternative
  revision_rationale: Se corrige la persona gramatical para reflejar fielmente los sufijos hebreos de segunda persona plural y la apelación directa del versículo. También se elimina «también», que no es necesario para representar la correlación hebrea. Se mantiene el resto de la redacción, que es fiel al sentido fuente y natural en español.
