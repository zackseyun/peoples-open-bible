- from: Hace la paz tu frontera; te sacia con lo mejor del trigo[a].
  to: Pone paz en tus fronteras; te sacia con lo mejor del trigo[a].
  rationale: Se revisa la primera cláusula para preservar el sentido de establecer שָׁלוֹם en el borde/territorio de Sion con una sintaxis española natural y clara. «Pone paz en tus fronteras» mantiene la imagen fuente mejor que la formulación previa, que sonaba forzada. Se conserva la segunda cláusula y la nota léxica porque son fieles y bien formuladas.
