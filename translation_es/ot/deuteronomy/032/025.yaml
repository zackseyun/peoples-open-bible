    rationale: La nota a explica וּמֵחֲדָרִים / «y desde las cámaras», no «Fuera»; la nota b explica בְּתוּלָה, por lo que debe ir en «virgen», no en «terror». Esto incumple la disciplina requerida de marcadores exactos en el texto.
  - severity: medium
