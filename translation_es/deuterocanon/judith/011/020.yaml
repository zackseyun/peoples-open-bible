translation:
  language: es
  text: Y sus palabras agradaron a Holofernes y a todos sus servidores, y se maravillaron de su sabiduría y dijeron,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἤρεσαν
  english_pob_choice: pleased
  chosen_spanish: agrandaron
  alternatives_spanish:
  - fueron agradables
  - les agradaron
  lexicon: BDAG
  rationale: ἀρέσκω expresa aceptación o agrado. En español, «agradar» comunica de forma natural que las palabras de Judit encontraron favor sin intensificar indebidamente el matiz.
- source_word: οἱ λόγοι αὐτῆς
  english_pob_choice: her words
  chosen_spanish: sus palabras
  alternatives_spanish:
  - lo que dijo
  - su խոսa
  lexicon: BDAG
  rationale: λόγοι puede referirse a palabras o discurso. «Sus palabras» conserva la cercanía al griego y funciona bien en español bíblico actual.
- source_word: ἐναντίον Ὀλοφέρνου καὶ ἐναντίον πάντων τῶν θεραπόντων αὐτοῦ
  english_pob_choice: Holofernes and all his attendants
  chosen_spanish: a Holofernes y a todos sus asistentes
  alternatives_spanish:
  - en presencia de Holofernes y de todos sus servidores
  - ante Holofernes y todos sus servidores
  lexicon: BDAG; LSJ
  rationale: ἐναντίον marca la esfera de presencia ante la cual se dijeron las palabras. Como el inglés POB ya interpretó el efecto como agrado de esas personas, el español puede nombrarlas directamente. «Asistentes» conserva el matiz cortesano/militar de θεράποντες mejor que «siervos».
- source_word: θεραπόντων
  english_pob_choice: attendants
  chosen_spanish: asistentes
  alternatives_spanish:
  - sirvientes
  - servidores
  - retenedores
  lexicon: LSJ
  rationale: θεράπων suele designar un asistente o acompañante de rango cortesano o militar. «Asistentes» es idiomático y evita la carga de esclavitud que no corresponde aquí.
- source_word: ἐθαύμασαν
  english_pob_choice: marveled
  chosen_spanish: se maravillaron
  alternatives_spanish:
  - se asombraron
  - quedaron admirados
  lexicon: BDAG
  rationale: El verbo expresa admiración asombrada. «Se maravillaron» mantiene el tono elevado y la respuesta positiva del texto.
- source_word: ἐπὶ τῇ σοφίᾳ αὐτῆς
  english_pob_choice: at her wisdom
  chosen_spanish: de su sabiduría
  alternatives_spanish:
  - por su sabiduría
  - a causa de su sabiduría
  lexicon: BDAG
  rationale: La construcción con ἐπί + dativo señala la base o motivo del asombro. En español, «se maravillaron de» reproduce bien ese valor sin sonar rígido.
- source_word: καὶ εἶπαν
  english_pob_choice: and said,
  chosen_spanish: y dijeron,
  alternatives_spanish:
  - y dijeron
  - e hicieron decir
  lexicon: BDAG
  rationale: El griego introduce el discurso directo que continúa en el versículo siguiente. La coma final conserva la apertura sintáctica.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alta concordancia y no requieren revisión textual ni doctrinal; se preservó la continuidad sintáctica abierta de καὶ εἶπαν con coma final.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u այլ terminología no pertinente, pues el versículo no contiene nombres divinos.
  - «Sabiduría» se mantuvo como sustantivo abstracto neutro, en línea con σοφίᾳ.
  - Se eligió un registro bíblico moderno y claro, sin arcaísmos innecesarios.
