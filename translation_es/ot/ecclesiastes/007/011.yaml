translation:
  language: es
  text: La sabiduría es buena con una herencia[a], y una ventaja para los que ven el sol[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La sabiduría es tan buena como una herencia». La construcción hebrea puede comparar la sabiduría con la herencia, o bien afirmar la sabiduría junto con la herencia.'
    reason: alternative_reading
  - marker: b
    text: «Los que ven el sol» es un modismo para los vivos, los que están con vida en este mundo.
    reason: cultural_note
lexical_decisions:
- source_word: טוֹבָה
  english_pob_choice: is good
  chosen_spanish: es buena
  alternatives_spanish:
  - es mejor
  - es agradable
  lexicon: HALOT
  rationale: El hebreo presenta un predicado adjetival sin verbo explícito; en español se suministra «es» de forma natural. «Buena» conserva el valor básico de טוֹבָה sin introducir una comparación que el hebreo no expresa de manera directa.
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: la sabiduría
  alternatives_spanish:
  - la prudencia
  - el saber práctico
  lexicon: HALOT
  rationale: «Sabiduría» es el equivalente estable en Qohelet. Mantiene el sentido de discernimiento práctico más que conocimiento abstracto, como en la POB inglesa.
- source_word: עִם
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - junto con
  - al lado de
  lexicon: HALOT
  rationale: «Con» expresa la asociación o acompañamiento de manera natural y fiel al hebreo, sin forzar la relación como una comparación absoluta.
- source_word: נַחֲלָה
  english_pob_choice: an inheritance
  chosen_spanish: una herencia
  alternatives_spanish:
  - una posesión heredada
  - un patrimonio
  - un patrimonio heredado
  lexicon: HALOT
  rationale: «Herencia» conserva el sentido de posesión recibida por asignación hereditaria. En español fluye mejor que una traducción más técnica, y mantiene la tensión posible entre acompañamiento y comparación.
- source_word: וְיֹתֵר
  english_pob_choice: and an advantage
  chosen_spanish: y una ventaja
  alternatives_spanish:
  - y más aún
  - y provecho
  - y beneficio
  lexicon: HALOT
  rationale: El valor de יֹתֵר aquí es de excedente/ganancia/provecho. «Ventaja» comunica bien esa idea en un registro claro y sobrio, y preserva la lectura nominal de la POB inglesa.
- source_word: לְרֹאֵי
  english_pob_choice: to those who see
  chosen_spanish: para los que ven
  alternatives_spanish:
  - a los que ven
  - para los vivos que ven
  lexicon: HALOT
  rationale: «Para» expresa naturalmente la referencia de beneficio ligada a יֹתֵר. «Los que ven» conserva el participio de רֹאֵי sin explicar todavía el modismo en la línea principal.
- source_word: הַשָּׁמֶשׁ
  english_pob_choice: the sun
  chosen_spanish: el sol
  alternatives_spanish:
  - el sol de este mundo
  lexicon: HALOT
  rationale: Se mantiene la imagen literal de «el sol», como en la POB inglesa. Esto preserva el modismo de Eclesiastés sin paraphrasearlo en el texto principal.
theological_decisions:
- issue: El modismo «los que ven el sol» como referencia a los vivos
  english_pob_reading: Those who see the sun is an idiom for the living, those who are alive in this world.
  chosen_spanish_reading: «Los que ven el sol» se conserva literalmente en el texto, con la aclaración de que alude a los vivos.
  alternative_spanish_readings:
  - los vivos
  - los que están vivos en este mundo
  - los que viven bajo el sol
  rationale: 'La frase hebrea es idiomática y la POB inglesa la conserva en la traducción principal, explicándola en nota. En español conviene hacer lo mismo: mantener la imagen de Qohelet y explicar su alcance sin sustituirla por una paráfrasis que borre el color del original.'
  doctrine_reference: Ecclesiastes 7:11; idiomática de Qohelet sobre la vida humana en el mundo visible
translation_notes:
  revision_awareness: 'Se siguió el estado revisado más reciente del audito inglés, que no introdujo cambios adicionales y confirmó el acuerdo alto con el hebreo. La versión española conserva la misma tensión interpretativa indicada por la POB: puede leerse como comparación («tan buena como») o como acompañamiento («con una herencia»), sin resolverla de manera exclusiva en el texto principal.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni un equivalente directo.
  - Se evitó «SEÑOR» y otras sustituciones no presentes en el versículo.
  - «Sabiduría», «herencia» y «ventaja» siguen la terminología estable del proyecto y el audit trail inglés.
  - La nota a preserva la tensión lexical/comparativa; la nota b preserva el modismo cultural sin convertirlo en paráfrasis del texto principal.
