translation:
  language: es
  text: Porque si de veras se vuelven atrás y se apegan al resto de estas naciones[a], estas que quedan con ustedes, y se emparentan con ellas, y se mezclan con ellas[b], y ellas con ustedes,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También podría rendirse «el remanente de estas naciones»; aquí «resto» mantiene el valor descriptivo sin dar a la palabra un matiz técnico.
    reason: lexical_alternative
  - marker: b
    text: 'La expresión hebrea es idiomática y puede también traducirse «entran a ellas»; puede implicar más que movimiento físico: trato, mezcla o asociación estrecha.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  english_pob_choice: For if
  chosen_spanish: Porque si
  alternatives_spanish:
  - Pero si
  - Pues si
  lexicon: HALOT
  rationale: En este contexto de advertencia, la construcción introduce una condición vinculada al discurso previo. ‘Porque si’ conserva la conexión discursiva y suena natural en español sin debilitar el valor condicional.
- source_word: שׁוֹב תָּשׁוּבוּ
  english_pob_choice: you indeed turn back
  chosen_spanish: os volvéis atrás
  alternatives_spanish:
  - os volvéis de nuevo
  - ciertamente volvéis atrás
  - os apartáis otra vez
  lexicon: HALOT
  rationale: La combinación de infinitivo absoluto y verbo finito intensifica la acción. ‘Os volvéis atrás’ expresa el giro de infidelidad o retroceso covenantal; ‘de veras’ en el texto refuerza esa intensidad sin resultar forzado.
- source_word: וּדְבַקְתֶּם
  english_pob_choice: cling to
  chosen_spanish: os apegáis a
  alternatives_spanish:
  - os aferráis a
  - os adherís a
  - os mantenéis unidos a
  lexicon: HALOT
  rationale: דבק implica adhesión estrecha. ‘Apegarse’ comunica vínculo fuerte y relacional en español actual; evita una traducción excesivamente literal que sonaría rígida.
- source_word: בְּיֶתֶר הַגּוֹיִם הָאֵלֶּה
  english_pob_choice: the remnant of these nations
  chosen_spanish: el resto de estas naciones
  alternatives_spanish:
  - el remanente de estas naciones
  - lo que queda de estas naciones
  - el resto que queda de estas naciones
  lexicon: HALOT
  rationale: יֶתֶר denota lo que queda. ‘El resto’ es natural en español y evita cargar ‘remanente’ con una resonancia técnica no necesaria en este versículo.
- source_word: הַנִּשְׁאָרִים הָאֵלֶּה אִתְּכֶם
  english_pob_choice: these that remain with you
  chosen_spanish: estas que quedan con vosotros
  alternatives_spanish:
  - estas que permanecen con vosotros
  - las que quedan entre vosotros
  - estas restantes con vosotros
  lexicon: HALOT
  rationale: El participio describe a las naciones que continúan presentes junto a Israel. ‘Que quedan con vosotros’ conserva la repetición demostrativa y la cercanía espacial/social del hebreo.
- source_word: וְהִתְחַתַּנְתֶּם בָּהֶם
  english_pob_choice: and intermarry with them
  chosen_spanish: y os emparentáis con ellas
  alternatives_spanish:
  - y os casáis con ellas
  - y contraéis matrimonio con ellas
  - y os mezcláis por matrimonio con ellas
  lexicon: HALOT
  rationale: El hitpael de חתן alude a entrar en alianzas matrimoniales. ‘Emparentarse’ comunica el establecimiento de parentesco por matrimonio sin sonar demasiado técnico; evita reducir el sentido a una mera boda aislada.
- source_word: וּבָאתֶם בָּהֶם
  english_pob_choice: and go in to them
  chosen_spanish: y entráis en ellas
  alternatives_spanish:
  - y os metéis en ellas
  - y os involucráis con ellas
  - y tenéis trato con ellas
  lexicon: HALOT
  rationale: El hebreo es un modismo amplio. ‘Entráis en ellas’ mantiene la imagen verbal y puede abarcar tanto acercamiento relacional como la idea sexual implícita en el giro, sin explicitar más de lo que el texto dice.
- source_word: וְהֵם בָּכֶם
  english_pob_choice: and they to you
  chosen_spanish: y ellas en vosotros
  alternatives_spanish:
  - y ellas con vosotros
  - y ellas hacia vosotros
  - y ellas entre vosotros
  lexicon: HALOT
  rationale: La cláusula final es recíproca y elíptica. ‘Ellas en vosotros’ preserva la concisión del hebreo y sugiere reciprocidad mutua; aunque suena denso, refleja mejor la simetría del original.
theological_decisions:
- issue: Advertencia de infidelidad covenantal en שׁוֹב תָּשׁוּבוּ
  english_pob_reading: turn back
  chosen_spanish_reading: os volvéis atrás
  alternative_spanish_readings:
  - os apartáis
  - os devolvéis
  - regresáis
  rationale: El contexto no es un retorno neutral, sino un retroceso respecto de la fidelidad al pacto. ‘Volverse atrás’ mantiene ese matiz de apostasía o deslealtad sin añadir una interpretación doctrinal extra.
  doctrine_reference: Translation philosophy §1, §3
- issue: Posible carga teológica de ‘resto’/‘remanente’
  english_pob_reading: remnant
  chosen_spanish_reading: resto
  alternative_spanish_readings:
  - remanente
  - lo que queda
  rationale: En español ‘remanente’ puede sonar más técnico o teológico de lo que exige el versículo. ‘Resto’ conserva el valor descriptivo del hebreo sin importar una lectura redentivo-histórica que aquí no está en juego.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El auditorio en inglés primero pasó de ‘associate with them’ a ‘go in to them’ para acercarse mejor al modismo hebreo וּבָאתֶם בָּהֶם. La versión española sigue ese ajuste y evita una paráfrasis social demasiado amplia. También se decidió no cargar ‘remanente’ con matiz técnico; en español se prefirió ‘resto’ por claridad, manteniendo la advertencia del contexto.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ para el nombre divino en el conjunto del proyecto, aunque este versículo no lo contiene.
  - ‘Vosotros/vosotros’ se mantiene por coherencia con una segunda persona plural bíblica; en esta línea se usa ‘vosotros’ en el anclaje final de forma consistente con el tono bíblico general del registro.
  - Se conservó la simetría final del hebreo con una construcción breve y recíproca, sin expandirla a una explicación interpretativa.
