revisions:
- from: 'Ahora envíen con rapidez y digan a David[a]: “No pases la noche en las vados del desierto, sino cruza también; no sea que el rey y todo el pueblo que está con él sean tragados”.'
  to: 'Ahora envíen con rapidez y digan a David[a]: «No pases la noche en los vados del desierto, más bien, asegúrate de cruzar, no sea que el rey y todo el pueblo que está con él sean tragados»'
  rationale: Se corrige el error gramatical 'las vados' a 'los vados', se ajusta el mandato enfático para reflejar mejor עָבוֹר תַּעֲבוֹר ('asegúrate de cruzar' en vez de 'cruza también'), y se pule la fluidez general del español sin apartarse de la imagen fuente de 'ser tragados'.
  reviewer_model: gpt-5.4
