translation:
  language: es
  text: 'Los siervos del rey dijeron al rey[a]: «Todo lo que elija mi señor el rey, aquí estamos, tus siervos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Según todo lo que elija mi señor el rey, he aquí tus siervos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  english_pob_choice: said
  chosen_spanish: dijeron
  alternatives_spanish:
  - hablaron
  - respondieron
  lexicon: HALOT
  rationale: El wayyiqtol de אמר introduce discurso directo; «dijeron» es la forma narrativa natural en español y conserva el valor básico del verbo sin añadir matices no presentes.
- source_word: עַבְדֵי הַמֶּלֶךְ
  english_pob_choice: the king’s servants
  chosen_spanish: los siervos del rey
  alternatives_spanish:
  - los servidores del rey
  - los esclavos del rey
  lexicon: HALOT
  rationale: עבד puede abarcar siervo, servidor o esclavo. En este contexto cortesano, «siervos» mantiene la dependencia y la lealtad sin forzar la idea de esclavitud chattel, mientras que «servidores» suena algo más administrativo.
- source_word: אֶל הַמֶּלֶךְ
  english_pob_choice: to the king
  chosen_spanish: al rey
  alternatives_spanish:
  - hacia el rey
  - ante el rey
  lexicon: HALOT
  rationale: La preposición direccional con objeto de habla se expresa de forma natural en español como «al rey».
- source_word: כְּכֹל אֲשֶׁר יִבְחַר
  english_pob_choice: Whatever ... chooses
  chosen_spanish: Todo lo que elija
  alternatives_spanish:
  - Conforme a todo lo que escoja
  - Según todo lo que elija
  lexicon: HALOT
  rationale: El hebreo dice literalmente «según todo lo que...». En español, «Todo lo que elija» comunica con claridad la disposición total a cumplir lo que el rey determine, sin perder el sentido de completitud.
- source_word: יִבְחַר
  english_pob_choice: chooses
  chosen_spanish: elija
  alternatives_spanish:
  - escoja
  - decida
  lexicon: HALOT
  rationale: בחר significa «elegir/escoger». El subjuntivo «elija» encaja con la subordinada relativa indefinida y preserva el acto de elección como tal.
- source_word: אֲדֹנִי הַמֶּלֶךְ
  english_pob_choice: my lord the king
  chosen_spanish: mi señor el rey
  alternatives_spanish:
  - mi soberano el rey
  - mi amo el rey
  lexicon: HALOT
  rationale: La fórmula cortesana pide un tratamiento reverente. «Mi señor el rey» reproduce de cerca el valor honorífico de אֲדֹנִי sin introducir «amo», que en español puede sonar más duro o servil de lo que aquí conviene.
- source_word: הִנֵּה
  english_pob_choice: here are
  chosen_spanish: aquí están
  alternatives_spanish:
  - he aquí
  - mira
  lexicon: HALOT
  rationale: הִנֵּה presenta disponibilidad inmediata. «Aquí están» comunica esa presencia/ofrecimiento de manera natural en español contemporáneo; «he aquí» sería más arcaizante.
- source_word: עֲבָדֶיךָ
  english_pob_choice: your servants
  chosen_spanish: tus siervos
  alternatives_spanish:
  - tus servidores
  - tus esclavos
  lexicon: HALOT
  rationale: El pronombre posesivo devuelve la referencia al rey en discurso directo. «Tus siervos» conserva la relación de servicio y la repetición del campo léxico de עבד.
theological_decisions:
- issue: Término de dependencia social/cortesana en עבד
  english_pob_reading: servants
  chosen_spanish_reading: siervos
  alternative_spanish_readings:
  - servidores
  - esclavos
  rationale: No hay intención doctrinal explícita en el verso, pero sí una tensión léxica entre dependencia y esclavitud. «Siervos» equilibra fidelidad al término hebreo con la escena cortesana; «esclavos» sería demasiado fuerte para el contexto, y «servidores» puede suavizar en exceso la relación de subordinación.
  doctrine_reference: Lexical semantics; court narrative context
translation_notes:
  revision_awareness: El contexto auditado del POB inglés mantiene una lectura sobria y directa, con una alternativa más formal para la primera cláusula. El español sigue esa misma línea sin ampliar el contenido, y conserva la relación cortesana y la disponibilidad total expresadas en el hebreo.
  spanish_consistency_notes:
  - Se mantiene «rey» de manera consistente para הַמֶּלֶךְ.
  - Se usa «siervos» para עבד en ambos puntos del verso para conservar el juego léxico.
  - Se preserva el registro reverente con «mi señor el rey» y el trato de segunda persona en «tus siervos».
  - No se introdujo nota al pie porque la alternativa formal del inglés puede integrarse sin ambigüedad en la redacción española.
