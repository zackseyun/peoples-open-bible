id: 3MA.5.12
reference: 3 Maccabees 5:12
source:
  edition: lxx-swete-1909
  text: καὶ ἥδιστῳ καὶ βαθεῖ κατεσχέθη τῇ ἐνεργείᾳ τοῦ δεσπότου, τῆς ἀθέσμου μὲν προθέσεως πολὺ διεσφαλμένος, τοῦ δὲ ἀμεταθέτου λογισμοῦ μεγάλως διεψευσμένος.
  language: Greek
  pages:
  - 742
  confidence: high
  validation: agree
translation:
  text: And by the action of the Sovereign he was overcome with a most pleasant and deep stupor[b][a], having been greatly frustrated in his lawless purpose and utterly disappointed in his unchangeable resolve.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was overcome by the most sweet and deep working of the Master.' The Greek imagery is unusual and metaphorical, combining pleasantness and depth with divine restraint.
    reason: lexical_alternative
  - marker: b
    text: '''The Sovereign'' renders Greek despotes, a title emphasizing absolute authority; alternatively, ''the Master.'''
    reason: alternative_reading
lexical_decisions:
- source_word: ἥδιστῳ
  chosen: most sweet
  alternatives:
  - most pleasant
  - very delightful
  lexicon: LSJ
  rationale: Superlative of ἡδύς. The wording is unusual in context, paired with βαθεῖ and governed by κατεσχέθη; retaining 'sweet' preserves the striking metaphor rather than flattening it to a generic emotional state.
- source_word: βαθεῖ
  chosen: deep
  alternatives:
  - profound
  - intense
  lexicon: LSJ
  rationale: Basic sense is 'deep.' Kept literal to preserve the metaphorical description of the overpowering effect.
- source_word: κατεσχέθη
  chosen: was seized with ... constraint
  alternatives:
  - was overcome by
  - was held fast by
  - was restrained by
  lexicon: LSJ
  rationale: Passive of κατέχω can mean to seize, hold fast, restrain. Here the following dative phrase and context of divine intervention suggest he was gripped/checked by the Lord's power. 'Seized with ... constraint' preserves both force and restraint.
- source_word: ἐνεργείᾳ
  chosen: action
  alternatives:
  - working
  - operative power
  - activity
  lexicon: LSJ
  rationale: The noun denotes effective working or operation. 'Action' is idiomatic modern English and avoids overly technical wording while preserving divine efficacy.
- source_word: δεσπότου
  chosen: the Sovereign
  alternatives:
  - the Master
  - the Lord
  lexicon: LSJ
  rationale: δεσπότης here refers to God as the absolute ruler. 'Sovereign' conveys authority without confusion with the more standard κύριος/'Lord'; 'Master' is possible but sounds less fitting in this prayer-narrative context.
- source_word: ἀθέσμου
  chosen: lawless
  alternatives:
  - unlawful
  - impious
  lexicon: LSJ
  rationale: ἀθέσμος denotes what is contrary to law/custom, often morally outrageous. 'Lawless' captures both illegitimacy and moral disorder.
- source_word: προθέσεως
  chosen: purpose
  alternatives:
  - plan
  - intention
  lexicon: LSJ
  rationale: Refers to what he had set before himself. 'Purpose' fits the hostile intent in context.
- source_word: πολὺ διεσφαλμένος
  chosen: greatly thwarted
  alternatives:
  - much frustrated
  - badly mistaken
  - thrown far off course
  lexicon: LSJ
  rationale: The participle from διασφάλλω conveys being caused to fail or being tripped up. In context it describes the collapse of his intended course, so 'greatly thwarted' is clearer than a more wooden 'caused to stumble.'
- source_word: ἀμεταθέτου
  chosen: unchangeable
  alternatives:
  - unalterable
  - fixed
  lexicon: LSJ
  rationale: The adjective means not to be changed or shifted. 'Unchangeable' preserves the force of his stubborn determination.
- source_word: λογισμοῦ
  chosen: resolve
  alternatives:
  - plan
  - design
  - calculation
  lexicon: LSJ
  rationale: Though often 'reasoning' or 'thought,' here it refers to his settled intention. 'Resolve' best fits the parallel with πρόθεσις.
- source_word: μεγάλως διεψευσμένος
  chosen: utterly disappointed
  alternatives:
  - greatly confounded
  - thoroughly frustrated
  - proved completely false
  lexicon: LSJ
  rationale: The participle from διαψεύδω in passive can mean to be deceived or disappointed in expectation. Here his fixed resolve is shown false by events; 'utterly disappointed' communicates that outcome naturally in English.
