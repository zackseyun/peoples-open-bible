  text: רָאִ֨יתִי אֶת אֲדֹנָ֜/י נִצָּ֣ב עַֽל הַ/מִּזְבֵּ֗חַ וַ/יֹּאמֶר֩ הַ֨ךְ הַ/כַּפְתּ֜וֹר וְ/יִרְעֲשׁ֣וּ הַ/סִּפִּ֗ים וּ/בְצַ֨עַ/ם֙ בְּ/רֹ֣אשׁ כֻּלָּ֔/ם וְ/אַחֲרִיתָ֖/ם בַּ/חֶ֣רֶב אֶהֱרֹ֑ג לֹֽא יָנ֤וּס לָ/הֶם֙ נָ֔ס וְ/לֹֽא יִמָּלֵ֥ט לָ/הֶ֖ם פָּלִֽיט־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/amos/009/001.yaml
  text: 'I saw the Lord standing beside the altar[a], and he said: Strike the capital, so that the thresholds may shake; shatter them on the heads of all of them. And I will kill their survivors with the sword; not one who flees among them will get away[d][c][b], and not one who escapes among them will be delivered.'
  footnotes:
  - marker: a
    text: Or 'standing on the altar.' The Hebrew preposition can be rendered 'on' or 'upon,' but the scene may also imply standing at or beside the altar in readiness to judge.
    reason: lexical_alternative
  - marker: b
    text: Or 'the pillar-cap' or 'the knob/capital.' The Hebrew term refers to the top architectural feature of the structure.
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew is difficult: ''and cut/break them on the head of all of them.'' The sense is that the shattered structure falls on everyone present.'
    reason: lexical_alternative
  - marker: d
    text: Or 'their remnant.' Here the context favors those left alive after the initial destruction rather than a hopeful remnant.
    reason: alternative_reading
