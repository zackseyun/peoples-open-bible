translation:
  language: es
  text: 'Entonces Hageo[a][b], el mensajero de Yahvé, habló al pueblo con el mensaje de Yahvé, diciendo: «Yo estoy con ustedes», declara Yahvé.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por la comisión de Yahvé» o «como mensajero de Yahvé». La frase hebrea puede señalar la capacidad o comisión en la que Hageo hablaba.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «mensajero de Yahvé». Aquí se refiere a Hageo como enviado de Yahvé, no a un ser angelical.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... spoke
  chosen_spanish: Entonces ... habló
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: El hebreo introduce una acción narrativa en secuencia; en español, «entonces» + «habló» conserva el avance del relato y funciona naturalmente con la cita directa posterior.
- source_word: מַלְאַךְ יְהוָה
  english_pob_choice: the messenger of Yahweh
  chosen_spanish: el mensajero de Yahvé
  alternatives_spanish:
  - el ángel de Yahvé
  lexicon: HALOT
  rationale: Como Hageo está nombrado explícitamente y el contexto lo identifica como portavoz humano, «mensajero» evita importar la lectura de un ser angelical y mantiene la función de enviado.
- source_word: בְּמַלְאֲכוּת יְהוָה
  english_pob_choice: with Yahweh’s message
  chosen_spanish: con el mensaje de Yahvé
  alternatives_spanish:
  - por la comisión de Yahvé
  - en la comisión de Yahvé
  - como mensajero de Yahvé
  lexicon: HALOT
  rationale: La expresión puede abarcar comisión, función o contenido del encargo. En este contexto, «con el mensaje de Yahvé» comunica de forma clara que su habla viene autorizada y cargada con la palabra divina.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se translitera como «Yahvé» en el texto principal, preservando el nombre personal divino en lugar de sustituirlo por un título.
- source_word: לָעָם
  english_pob_choice: to the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - a la gente
  - a la nación
  lexicon: HALOT
  rationale: En el contexto profético se trata de la comunidad del pacto; «pueblo» es natural en español y suficientemente específico sin añadir matices no presentes en el hebreo.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: El infinitivo quotativo se reproduce de manera directa con «diciendo», manteniendo la estructura de introducción del discurso.
- source_word: אֲנִי אִתְּכֶם
  english_pob_choice: I am with you
  chosen_spanish: Yo estoy con ustedes
  alternatives_spanish:
  - Estoy con ustedes
  - Yo estoy con vosotros
  lexicon: HALOT
  rationale: La frase covenantal se traduce de forma simple y directa. «Ustedes» expresa con naturalidad el plural del hebreo en español latinoamericano.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: La fórmula profética se mantiene como declaración de autoridad divina. «Declara» conserva el valor formular y solemne sin recurrir a una versión más arcaica.
theological_decisions:
- issue: Hageo identificado como מַלְאַךְ יְהוָה
  english_pob_reading: human 'messenger' rather than 'angel'
  chosen_spanish_reading: mensajero humano de Yahvé, no ángel celestial
  alternative_spanish_readings:
  - ángel de Yahvé
  - mensajero de Yahvé
  rationale: El nombre propio Hageo en aposición aclara que se trata del profeta desempeñando la función de enviado. Traducir «ángel» sugeriría una entidad celestial no indicada por la sintaxis ni por el contexto inmediato.
  doctrine_reference: Translation philosophy §1 (primacía del texto original) y §3 (preservar la tensión sin importar afirmaciones ajenas al texto)
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo emplea directamente el Tetragrámaton. La forma «Yahvé» preserva el nombre propio del Dios de Israel y evita ocultarlo tras un título genérico.
  doctrine_reference: 'DOCTRINE.md: Términos controvertidos — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el pasaje quedó confirmado como de alta concordancia y sin modificaciones necesarias.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrámaton en todo el versículo.
  - Se usa «mensajero» para מַלְאַךְ en coherencia con el análisis del contexto inmediato.
  - Se conserva un registro formal pero claro, apto para lectura pública en español latinoamericano.
  - La cita directa se cierra con la fórmula profética integrada en el habla, evitando separar artificialmente el clímax del versículo.
