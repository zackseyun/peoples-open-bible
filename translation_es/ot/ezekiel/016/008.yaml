base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/016/008.yaml
  text: When I passed by you and saw you[a], behold, your time was the time for love. So I spread the edge of my garment over you and covered your nakedness. I swore to you and entered into a covenant with you, declares the Lord GOD[b], and you became mine.
  footnotes:
  - marker: a
    text: Or, more literally, 'I spread my wing over you.' The Hebrew idiom can refer to the edge of a garment and evokes marital protection or claim.
    reason: lexical_alternative
  - marker: b
    text: '''The time for love'' may also be rendered ''the time for caresses'' or ''the time for lovemaking''; the Hebrew carries romantic and erotic overtones within the marriage metaphor.'
    reason: lexical_alternative
