translation:
  language: es
  text: Así que pusieron las manos sobre ella[a], y ella entró a la entrada de la Puerta de los Caballos, en la casa del rey[b], y allí le dieron muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «le echaron mano»; literalmente, «pusieron las manos sobre ella».
    reason: lexical_alternative
  - marker: b
    text: O «en el palacio real».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשִׂימוּ לָהּ יָדַיִם
  english_pob_choice: they laid hands on her
  chosen_spanish: le echaron mano[a]
  alternatives_spanish:
  - la sujetaron
  - la agarraron
  - le pusieron las manos encima
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y, en este contexto de arresto y ejecución, pide una formulación natural en español que conserve la idea de tomarla por la fuerza. 'Le echaron mano' transmite bien el acto sin volverlo demasiado interpretativo. Se mantiene la tensión entre el sentido literal y el idiomático mediante la nota.
- source_word: מְבוֹא
  english_pob_choice: entrance
  chosen_spanish: entrada
  alternatives_spanish:
  - acceso
  - portal
  - umbral
  lexicon: HALOT
  rationale: El sustantivo designa un lugar de entrada. 'Entrada' es claro, actual y fiel al valor espacial del término.
- source_word: שַׁעַר הַסּוּסִים
  english_pob_choice: the Horse Gate
  chosen_spanish: la Puerta de los Caballos
  alternatives_spanish:
  - la Puerta del Caballo
  - la Puerta de los Caballos
  lexicon: HALOT
  rationale: Al tratarse de un nombre propio de lugar, en español conviene conservarlo como designación fija. 'Puerta de los Caballos' es transparente y sigue de cerca la forma hebrea.
- source_word: בֵּית הַמֶּלֶךְ
  english_pob_choice: at the king’s house
  chosen_spanish: en la casa del rey[b]
  alternatives_spanish:
  - en el palacio real
  - junto a la casa del rey
  lexicon: HALOT
  rationale: Se preserva la formulación cercana al hebreo, que puede referirse al complejo real o al palacio. La nota permite mantener la alternativa interpretativa documentada por el POB inglés sin forzar una simplificación.
- source_word: וַיְמִיתוּהָ
  english_pob_choice: they put her to death
  chosen_spanish: la mataron
  alternatives_spanish:
  - la hicieron morir
  - la ejecutaron
  - la dieron muerte
  lexicon: HALOT
  rationale: El causativo de מות expresa causar la muerte. En español, 'la mataron' es la forma más natural y directa; 'la ejecutaron' sería más específica de una muerte legal o sancionada, algo que el hebreo no explicita por sí solo.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - allí mismo
  lexicon: HALOT
  rationale: Adverbio locativo simple. 'Allí' funciona con naturalidad y conserva la referencia espacial exacta.
theological_decisions:
- issue: Violencia sancionada en contexto cultual-político
  english_pob_reading: they put her to death there
  chosen_spanish_reading: la mataron allí
  alternative_spanish_readings:
  - la ejecutaron allí
  - la dieron muerte allí
  rationale: El hebreo describe el hecho de la muerte sin añadir una categoría jurídica explícita. 'La mataron' mantiene la sobriedad del relato; se evita 'ejecutaron' como sobre-interpretación, aunque el contexto histórico sugiere una acción oficial.
  doctrine_reference: Narrativa histórica; no hay afirmación doctrinal directa.
translation_notes:
  revision_awareness: La versión inglesa más reciente volvió de 'seized her' a 'laid hands on her' para acercarse más al hebreo. La redacción española sigue esa preferencia con una expresión idiomática igualmente cercana, sin desplazar el valor de arresto implícito en el contexto.
  spanish_consistency_notes:
  - Se mantiene Yahvé como forma predeterminada para el nombre divino, aunque este versículo no lo contiene.
  - Se conserva 'Puerta de los Caballos' como nombre propio de lugar.
  - Se usa un español sobrio y formal, sin sobreexplicar la escena.
  - La nota b preserva la alternativa 'palacio real' porque la frase hebrea puede abarcar la residencia o complejo real.
