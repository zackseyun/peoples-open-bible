base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/040/001.yaml
  text: In the twenty-fifth year of our exile[a], at the beginning of the year, on the tenth day of the month, in the fourteenth year after the city had been struck down, on that very day the hand of Yahweh was upon me[b], and he brought me there.
  footnotes:
  - marker: a
    text: 'Hebrew: ''at the head of the year''; this may refer to the New Year observance, but the phrase is rendered more transparently here as ''at the beginning of the year.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'after the city had fallen' / 'after the city had been captured.' The Hebrew more literally says 'after the city had been struck down.'
    reason: lexical_alternative
