translation:
  language: es
  text: Dichoso el hombre a quien Yahvé recordó con reprensión[a], y que fue apartado[b] de un mal camino con un azote[c], para ser limpiado de pecado[d], para que el pecado no aumente[e].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse ‘con reproche’.
    reason: lexical_alternative
  - marker: b
    text: El griego literalmente sugiere una acción de ‘rodear’; el sentido aquí es que fue apartado o desviado de un mal camino.
    reason: lexical_alternative
  - marker: c
    text: 'También: ‘con un látigo’ o ‘mediante un azote’.'
    reason: lexical_alternative
  - marker: d
    text: O ‘para ser purificado de pecado’.
    reason: lexical_alternative
  - marker: e
    text: La última cláusula también puede entenderse de forma más elíptica como ‘para que no aumente’ o ‘para que él no lo multiplique’.
    reason: alternative_reading
lexical_decisions:
- source_word: Μακάριος
  english_pob_choice: Blessed
  chosen_spanish: Dichoso
  alternatives_spanish:
  - Bienaventurado
  - Bendito
  lexicon: LSJ
  rationale: ‘Μακάριος’ expresa estado favorecido/beatitud; ‘dichoso’ conserva el tono de felicitación solemne sin cargarlo innecesariamente con vocabulario litúrgico más fijo como ‘bienaventurado’.
- source_word: ἀνὴρ
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  - el varón
  lexicon: LSJ
  rationale: El griego usa masculino singular; ‘el hombre’ preserva la referencia gramatical y el paralelismo con el inglés auditado.
- source_word: ἐμνήσθη
  english_pob_choice: remembered
  chosen_spanish: recordó
  alternatives_spanish:
  - se acordó de
  - tuvo presente a
  lexicon: LSJ
  rationale: El verbo puede traducirse literalmente como ‘recordó’; en español, ‘recordó’ mantiene la idea de atención activa de Yahvé hacia el hombre en disciplina, sin diluirla en una frase más interpretativa.
- source_word: ἐν ἐλεγμῷ
  english_pob_choice: with rebuke
  chosen_spanish: con reprensión
  alternatives_spanish:
  - con reprobación
  - con reprensión correctiva
  lexicon: LSJ
  rationale: La alternativa inglesa anotada (‘reproof’) muestra una leve tensión léxica; en español ‘reprensión’ abarca bien el sentido disciplinario y conserva la seriedad del acto correctivo.
- source_word: ἐκυκλώθη
  english_pob_choice: was turned away from
  chosen_spanish: fue apartado
  alternatives_spanish:
  - fue desviado
  - fue cercado
  lexicon: LSJ
  rationale: El audit trail revisa la decisión inglesa desde ‘hemmed in’ a ‘turned away from’ por un trasfondo semítico. En español, ‘fue apartado’ evita la imagen poco natural de ‘cercado’ y expresa el resultado de ser desviado/retirado de un mal camino.
- source_word: ὁδοῦ πονηρᾶς
  english_pob_choice: an evil way
  chosen_spanish: de un camino malo
  alternatives_spanish:
  - de un camino perverso
  - de una senda mala
  lexicon: LSJ
  rationale: Conserva la metáfora moral de ‘camino/way’ y un adjetivo directo y comprensible. ‘Malo’ es más natural en español contemporáneo que ‘malvado’ aquí.
- source_word: ἐν μάστιγι
  english_pob_choice: by a scourge
  chosen_spanish: por medio de un látigo
  alternatives_spanish:
  - con un látigo
  - mediante un azote
  lexicon: LSJ
  rationale: El informe de revisión privilegia la consistencia con el verso siguiente, donde la misma raíz se vierte con imagen de azote/látigo. ‘Látigo’ es concreto y mantiene el instrumento disciplinario; ‘por medio de’ preserva el valor instrumental.
- source_word: καθαρισθῆναι
  english_pob_choice: to be cleansed
  chosen_spanish: para ser limpiado
  alternatives_spanish:
  - para ser purificado
  - para quedar limpio
  lexicon: LSJ
  rationale: ‘Limpiado’ comunica el pasivo y el sentido moral de limpieza de manera accesible. ‘Purificado’ sería más eclesiástico y menos inmediato en español.
- source_word: ἁμαρτίας
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - pecados
  - culpa
  lexicon: LSJ
  rationale: Aunque el griego está en singular, el español ‘pecado’ funciona naturalmente como categoría moral colectiva y evita forzar el plural; sigue la decisión inglesa de mantener un singular genérico.
- source_word: τοῦ μὴ πληθῦναι
  english_pob_choice: so that it might not increase
  chosen_spanish: para que no aumente
  alternatives_spanish:
  - para que no se multiplique
  - a fin de que no crezca
  lexicon: LSJ
  rationale: La revisión inglesa cambió ‘multiply’ por ‘increase’ para ajustarse mejor al singular ‘sin’. ‘Aumente’ transmite ese valor de crecimiento de manera natural en español y conserva la ambigüedad sobre si el sujeto implícito es el pecado o su proliferación.
theological_decisions:
- issue: La referencia divina expresa el nombre de Yahvé y no un título enmascarado
  english_pob_reading: The Lord remembered
  chosen_spanish_reading: Yahvé recordó
  alternative_spanish_readings:
  - el Señor recordó
  - el Señor se acordó
  rationale: El marco del proyecto exige ‘Yahvé’ para יהוה. Aunque el inglés dice ‘Lord’, aquí la decisión no es una simple traducción del título sino la recuperación del nombre divino subyacente en la fuente griega y su trasfondo textual.
  doctrine_reference: Uso del nombre divino en la traducción POB
- issue: La disciplina divina es correctiva, no meramente punitiva
  english_pob_reading: with rebuke / by a scourge
  chosen_spanish_reading: con reprensión ... por medio de un látigo
  alternative_spanish_readings:
  - con reproche ... con un azote
  - con corrección ... mediante castigo
  rationale: La fuente presenta una acción disciplinaria de Yahvé que conduce a limpieza y alejamiento del mal. ‘Reprensión’ y ‘látigo’ preservan el carácter concreto y correctivo sin suavizarlo ni convertirlo en mera metáfora moral.
  doctrine_reference: Disciplina divina y santificación
- issue: El final puede leerse como crecimiento del pecado o como impedir su crecimiento
  english_pob_reading: so that it might not increase
  chosen_spanish_reading: para que no aumente
  alternative_spanish_readings:
  - para que no se incremente
  - para que no aumente el pecado
  rationale: La sintaxis griega es abreviada y ambigua, y el audit trail inglés conserva esa tensión. El español mantiene la ambigüedad con ‘no aumente’, sin añadir un objeto explícito que resuelva indebidamente el referente.
  doctrine_reference: Ambigüedad sintáctica y prudencia exegética
translation_notes:
  revision_awareness: 'La versión inglesa más reciente ajustó ‘was hemmed in from’ a ‘was turned away from’ por el trasfondo semítico de κυκλόω/סבב, y cambió ‘whip’ a ‘scourge’/‘increase’ por consistencia y naturalidad. La presente propuesta sigue esas revisiones: evita una imagen española demasiado literal de ‘cercado’, conserva el valor disciplinario con ‘látigo’ y traduce el cierre con una forma natural (‘no aumente’) sin resolver la ambigüedad griega.'
  spanish_consistency_notes:
  - Se preserva el nombre divino ‘Yahvé’ conforme al estándar del proyecto.
  - ‘Látigo’ mantiene la coherencia con el campo semántico de disciplina física observado en el audit trail.
  - Se evita ‘Cristo’, ‘SEÑOR’ y ‘bienaventurado’ por no ser necesarios aquí y por el mandato terminológico del proyecto.
  - La ambigüedad del cierre queda abierta deliberadamente en español, como en el griego y en el inglés auditado.
