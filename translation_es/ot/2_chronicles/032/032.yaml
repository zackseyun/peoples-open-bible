    reason: lexical_alternative
  - marker: b
    text: O «sus actos de fidelidad al pacto» o «sus actos leales». El hebreo puede llevar el sentido de lealtad, fidelidad o bondad comprometida.
    reason: lexical_alternative
  revision_rationale: Se conserva la redacción principal porque es fiel y natural, pero se corrigen los anclajes de las notas al pie para que cada marcador corresponda al término fuente que explica. No se requiere una reescritura mayor.
