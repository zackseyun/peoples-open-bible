translation:
  language: es
  text: las aves de los cielos, y los peces del mar, todo lo que pasa por las sendas de los mares[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todo el que pasa por las sendas del mar». El participio hebreo es singular, pero probablemente tiene sentido colectivo, resumiendo más ampliamente la vida del mar.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «las sendas de los mares»; algunas versiones suavizan esto a «las sendas del mar».'
    reason: lexical_alternative
lexical_decisions:
- source_word: צִפּ֣וֹר
  english_pob_choice: birds
  chosen_spanish: aves
  alternatives_spanish:
  - pájaros
  - aves del cielo
  lexicon: HALOT
  rationale: Aunque el hebreo está en singular, funciona de manera colectiva en la serie de criaturas bajo dominio humano. En español, "aves" transmite mejor ese valor colectivo y conserva un registro digno y natural. "Pájaros" suena más coloquial; "aves del cielo" duplicaría la idea ya expresada por "de los cielos".
- source_word: שָׁ֭מַיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - el cielo
  - los cielos
  lexicon: HALOT
  rationale: El plural hebreo שָׁמַיִם pide una forma plural en español. "Los cielos" mantiene el matiz poético y evita reducir la imagen a un solo cielo físico.
- source_word: וּ/דְגֵ֣י הַ/יָּ֑ם
  english_pob_choice: the fish of the sea
  chosen_spanish: los peces del mar
  alternatives_spanish:
  - los peces de los mares
  - las criaturas del mar
  lexicon: HALOT
  rationale: El constructo expresa de forma directa la categoría de los peces asociados al mar. En español, "peces del mar" es claro y fiel; "de los mares" enfatizaría más el plural del hebreo, pero suena menos natural en esta enumeración.
- source_word: עֹ֝בֵ֗ר
  english_pob_choice: whatever passes along
  chosen_spanish: todo lo que pasa
  alternatives_spanish:
  - todo lo que pasa por
  - lo que pasa
  lexicon: HALOT
  rationale: El participio singular hebreo tiene valor colectivo y resumidor. "Todo lo que pasa" reproduce esa amplitud sin forzar un singular extraña en español. Se evita una paráfrasis más extensa para no perder la concisión poética.
- source_word: אָרְח֥וֹת
  english_pob_choice: the paths
  chosen_spanish: las sendas
  alternatives_spanish:
  - los caminos
  - las rutas
  lexicon: HALOT
  rationale: אָרְחוֹת puede referirse a caminos o rutas; en este contexto marítimo, "sendas" preserva la imagen poética de rutas trazadas sobre el mar. "Caminos" sería más general; "rutas" más moderno pero menos poético.
- source_word: יַמִּֽים
  english_pob_choice: the seas
  chosen_spanish: los mares
  alternatives_spanish:
  - el mar
  - los mares
  lexicon: HALOT
  rationale: El plural hebreo se conserva con "mares". Esto mantiene la amplitud poética del verso y evita aplanar la imagen en un singular.
theological_decisions:
- issue: Si traducir צִפּוֹר y דְגֵי como singulares o plurales colectivos en español
  english_pob_reading: English POB renders them collectively as 'birds' and 'fish' because the nouns function as category terms within a creation/dominion list.
  chosen_spanish_reading: 'Usar plurales colectivos naturales: ''aves'' y ''peces''.'
  alternative_spanish_readings:
  - '''ave'' y ''pez'' en singular genérico'
  - '''pajarillos'' y ''peces'''
  rationale: La serie del versículo enumera clases de criaturas, no individuos aislados. El español expresa mejor esa función colectiva con plurales; así se conserva el alcance representativo del texto sin añadir explicación no presente en el hebreo.
  doctrine_reference: Salmo 8; Génesis 1:26-28
- issue: Cómo reflejar el plural hebreo de שָׁמַיִם y יַמִּים sin oscurecer el estilo
  english_pob_reading: English POB keeps 'the heavens' and 'the seas' to preserve poetic breadth.
  chosen_spanish_reading: 'Mantener plurales: ''los cielos'' y ''los mares''.'
  alternative_spanish_readings:
  - '''el cielo'' y ''el mar'''
  rationale: El plural hebreo no es accidental; aporta amplitud poética y cósmica. En español, el plural mantiene esa resonancia y evita reducir el cuadro a un espacio único.
  doctrine_reference: Salmo 8; creación como ámbito de dominio humano
- issue: Cómo entender עֹבֵר con valor singular pero colectivo
  english_pob_reading: English POB uses 'whatever passes along' and notes the participle is singular but likely collective.
  chosen_spanish_reading: '''todo lo que pasa'''
  alternative_spanish_readings:
  - '''el que pasa'''
  - '''todo lo que pasa por'''
  rationale: La forma singular participial en hebreo puede resumir la totalidad de lo que cruza las rutas del mar. En español, 'todo lo que pasa' conserva ese resumen colectivo y evita convertirlo en una persona o entidad singular específica.
  doctrine_reference: Salmo 8:8-9
translation_notes:
  revision_awareness: El inglés POB mantiene una lectura poética y de dominio sobre la creación, con tratamiento colectivo de צִפּוֹר y דְגֵי, y conserva el plural de שָׁמַיִם, אָרְחוֹת y יַמִּים. No hubo revisiones aplicadas; el borrador español sigue esa misma línea con ajustes naturales de estilo en español y sin perder las tensiones colectivas/plurales documentadas.
  spanish_consistency_notes:
  - Se mantiene 'los cielos' y 'los mares' para reflejar los plurales hebreos.
  - Se usa 'aves' y 'peces' como colectivos naturales en español, en paralelo con el inglés POB.
  - '''Sendas'' conserva mejor la imagen poética de rutas marítimas que ''caminos'' en este contexto.'
  - Las notas preservan la alternativa 'por las sendas de los mares' sin introducir una paráfrasis más amplia.
