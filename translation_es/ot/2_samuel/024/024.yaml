base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/024/024.yaml
  text: But the king said to Araunah[a], “No, but I will surely buy it from you for a price[c][b]. I will not offer to Yahweh my God burnt offerings that cost me nothing.” So David bought the threshing floor and the cattle for fifty shekels of silver.
  footnotes:
  - marker: a
    text: Or, more literally, “burnt offerings for nothing” or “free of charge.”
    reason: lexical_alternative
  - marker: b
    text: In 1 Chronicles 21:25, David pays six hundred shekels of gold for the site; this verse specifies fifty shekels of silver for the threshing floor and the cattle.
    reason: cross_reference
  - marker: c
    text: Or “the oxen.” The Hebrew term can refer collectively to cattle or more specifically to bovines used for labor/sacrifice.
    reason: lexical_alternative
