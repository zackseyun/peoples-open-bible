    issue: «Restauraré la fortuna» no suena del todo natural ni preciso en español bíblico general.
    rationale: Aunque intenta reflejar «restore the fortunes», en español «la fortuna» puede sugerir riqueza material o suerte individual. «La prosperidad» comunica mejor la reversión integral de la aflicción en este contexto de reconstrucción y fecundidad.
  - severity: low
