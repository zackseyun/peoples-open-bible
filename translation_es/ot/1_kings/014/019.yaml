translation:
  language: es
  text: Ahora el resto de los hechos de Jeroboam[a], cómo peleó y cómo reinó, he aquí[b] que están escritos en el libro de las Crónicas[c] de los reyes de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «el resto de los asuntos de Jeroboam». En esta fórmula regia, «hechos» expresa los actos o asuntos consignados.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «he aquí»; es una expresión presentativa que llama la atención sobre el registro escrito.'
    reason: lexical_alternative
  - marker: c
    text: Es decir, un anuario real o archivo histórico oficial, no el libro bíblico de 1–2 Crónicas.
    reason: cross_reference
lexical_decisions:
- source_word: וְיֶתֶר
  english_pob_choice: Now the rest of
  chosen_spanish: Ahora el resto de
  alternatives_spanish:
  - Y el resto de
  - El resto de
  lexicon: HALOT
  rationale: יֶתֶר introduce lo que queda o lo demás de un conjunto; en una fórmula regia, «el resto de» conserva ese valor de remanente. «Ahora» reproduce de manera natural la función discursiva de וְ al enlazar con la conclusión del relato.
- source_word: דִּבְרֵי
  english_pob_choice: acts
  chosen_spanish: hechos
  alternatives_spanish:
  - hechos y asuntos
  - asuntos
  - palabras
  - acciones
  lexicon: HALOT
  rationale: Aunque el sentido literal es «palabras/asuntos», en esta fórmula regia se refiere a lo registrado sobre el rey. «Hechos» comunica bien los actos o eventos históricamente consignados sin forzar el español.
- source_word: אֲשֶׁר נִלְחַם
  english_pob_choice: how he fought
  chosen_spanish: cómo peleó
  alternatives_spanish:
  - cómo guerreó
  - que peleó
  - cómo hizo guerra
  lexicon: HALOT
  rationale: נלחם significa luchar o hacer guerra. «Cómo peleó» mantiene el valor verbal y la presentación resumida de la actividad militar, en paralelo con la cláusula siguiente.
- source_word: וַאֲשֶׁר מָלָךְ
  english_pob_choice: and how he reigned
  chosen_spanish: y cómo reinó
  alternatives_spanish:
  - y que reinó
  - y cómo llegó a reinar
  - y reinó
  lexicon: HALOT
  rationale: מלך en qal es «reinar». «Y cómo reinó» conserva la estructura paralela de la frase anterior y el sentido de la acción/reinado como parte del registro histórico.
- source_word: הִנָּם
  english_pob_choice: behold, they are
  chosen_spanish: he aquí
  alternatives_spanish:
  - he aquí que
  - miren
  - vean
  lexicon: HALOT
  rationale: הִנָּם es una forma presentativa que llama la atención sobre lo que sigue. En español, «he aquí» preserva ese valor sin sobrecargar la frase con un pronombre innecesario en el cuerpo principal.
- source_word: הִנָּם ... כְּתוּבִים
  english_pob_choice: behold, they are written
  chosen_spanish: he aquí, están escritos
  alternatives_spanish:
  - he aquí, se hallan escritos
  - están escritos
  lexicon: HALOT
  rationale: El participio pasivo plural כְּתוּבִים se expresa naturalmente con «están escritos». Se mantiene el carácter presentativo de הִנָּם mediante «he aquí».
- source_word: סֵפֶר דִּבְרֵי הַיָּמִים לְמַלְכֵי יִשְׂרָאֵל
  english_pob_choice: the Book of the Chronicles of the Kings of Israel
  chosen_spanish: el libro de las Crónicas de los reyes de Israel
  alternatives_spanish:
  - el libro de los Anales de los reyes de Israel
  - el libro de las crónicas reales de Israel
  - el libro de los hechos de los reyes de Israel
  lexicon: HALOT
  rationale: La expresión es un título fijo de registro real, no el libro bíblico de Crónicas. «Crónicas» reproduce el valor annalístico de דִּבְרֵי הַיָּמִים, y «de los reyes de Israel» sigue la función titular del sintagma.
theological_decisions:
- issue: Referencia a un registro histórico oficial, no al libro bíblico de Crónicas
  english_pob_reading: That is, an official royal annal or historical record, not the biblical book of 1–2 Chronicles.
  chosen_spanish_reading: el libro de las Crónicas de los reyes de Israel como archivo/registo real oficial
  alternative_spanish_readings:
  - el libro bíblico de Crónicas
  - el libro de los Anales de los reyes de Israel
  rationale: El contexto regnal y la nota inglesa indican que se trata de un registro real oficial. En español, mantener «Crónicas» en mayúscula como título conserva la forma tradicional del nombre del registro, sin confundirlo con el libro canónico de 1–2 Crónicas.
  doctrine_reference: Hermenéutica histórica y uso contextual de títulos de archivo real en fórmulas regias
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés al preferir comas en lugar de guiones largos y al mantener la estructura formal de la fórmula regia. No se introdujeron cambios doctrinales; solo se ajustó el español para sonar natural y fiel al hebreo y al aparato inglés.
  spanish_consistency_notes:
  - Se mantiene «he aquí» como equivalente de הִנָּם para conservar el tono presentativo.
  - Se usa «Crónicas» en el título del registro real, con nota aclaratoria para evitar confusión con el libro canónico.
  - «Hechos» traduce el valor resumido de דִּבְרֵי en esta fórmula, sin perder el sentido de asuntos/actos registrados.
  - La puntuación con comas refleja la revisión inglesa reciente y favorece una lectura fluida en español.
