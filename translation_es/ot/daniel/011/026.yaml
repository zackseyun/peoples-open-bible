revisions:
- from: Los que comen su pan[a] lo quebrantarán[b], y su ejército será arrasado[c], y caerán muchos muertos.
  to: Los que comen su comida[a] lo quebrantarán[b], y su ejército será barrido[c], y caerán muchos muertos.
  rationale: 'La revisión hace dos ajustes menores para reflejar mejor la evidencia fuente y el audit trail del POB: «su comida» expresa con más naturalidad el modismo hebreo de provisión de mesa, y «será barrido» conserva mejor la imagen de inundación/arrastre de יִשְׁטוֹף que «será arrasado». Se mantienen la estructura y el sentido general del borrador.'
