translation:
  language: es
  text: ¿A quién has reprochado y blasfemado? ¿Contra quién has alzado tu voz y has levantado tus ojos en alto? Contra el Santo de Israel[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vituperado».
    reason: lexical_alternative
  - marker: b
    text: Lit. «has levantado tus ojos a la altura», un modismo que expresa altivez.
    reason: cultural_note
lexical_decisions:
- source_word: חֵרַפְתָּ
  english_pob_choice: reproached
  chosen_spanish: reprochado
  alternatives_spanish:
  - insultado
  - vituperado
  - afrentado
  lexicon: HALOT
  rationale: En este contexto, חֵרַפְתָּ expresa un reproche injurioso dirigido contra Dios. «Reprochado» conserva la carga de afrenta verbal sin volverlo demasiado coloquial; además sigue de cerca la revisión inglesa más reciente del POB, que afinó el valor léxico hacia 'reproached'.
- source_word: גִדַּפְתָּ
  english_pob_choice: blasphemed
  chosen_spanish: blasfemado
  alternatives_spanish:
  - vituperado
  - maledicido
  - ultrajado
  lexicon: HALOT
  rationale: גדף suele implicar habla injuriosa, especialmente contra Dios; «blasfemado» mantiene con claridad la gravedad teológica. «Vituperado» podría funcionar, pero no explicita tanto la ofensa contra Dios como en el contexto.
- source_word: הֲרִימֹתָה קּוֹל
  english_pob_choice: raised your voice
  chosen_spanish: has alzado tu voz
  alternatives_spanish:
  - has levantado tu voz
  - has elevado tu voz
  lexicon: HALOT
  rationale: La expresión idiomática se traduce de manera directa y natural en español. «Alzar la voz» comunica tanto el acto de hablar en voz alta como el tono de desafío presente en el contexto.
- source_word: וַתִּשָּׂא מָרוֹם עֵינֶיךָ
  english_pob_choice: lifted your eyes on high
  chosen_spanish: elevado tus ojos en lo alto
  alternatives_spanish:
  - levantado tus ojos hacia lo alto
  - alzando tus ojos a lo alto
  lexicon: HALOT
  rationale: La imagen hebrea conserva la idea de ojos elevados hacia la altura, con un matiz de arrogancia. «Elevado tus ojos en lo alto» mantiene la metáfora de forma transparente en español sin introducir una interpretación excesiva.
- source_word: אֶל
  english_pob_choice: Against
  chosen_spanish: Contra
  alternatives_spanish:
  - A
  - Hacia
  lexicon: HALOT
  rationale: Aunque אֶל suele ser «a/hacia», aquí el paralelismo retórico y el contexto hostil justifican «contra», que reproduce bien la fuerza adversativa ya presente en la pregunta anterior.
- source_word: קְדוֹשׁ יִשְׂרָאֵל
  english_pob_choice: the Holy One of Israel
  chosen_spanish: el Santo de Israel
  alternatives_spanish:
  - el Santo de Israel
  - el Santo de Israel
  lexicon: HALOT
  rationale: Es un título isaiano fijo y debe mantenerse con consistencia como «el Santo de Israel», respetando su valor teológico y su forma tradicional y transparente en español.
theological_decisions:
- issue: Intensificación retórica en los dos verbos de afrenta verbal
  english_pob_reading: Differentiate the verbs as 'reproached and blasphemed'
  chosen_spanish_reading: Distinguirlos como «reprochado y blasfemado»
  alternative_spanish_readings:
  - reprochado y vituperado
  - insultado y blasfemado
  rationale: La duplicación no es redundante sino acumulativa; conviene conservar dos verbos distintos en español para no aplanar la acusación. «Blasfemado» preserva explícitamente el carácter teológico de la ofensa.
  doctrine_reference: 'Principio de equivalencia óptima: mantener distinciones léxicas con peso doctrinal cuando el contexto las intensifica.'
translation_notes:
  revision_awareness: Esta redacción sigue la revisión inglesa más reciente al preferir «reprochado» para חֵרַפְתָּ, pero conserva la diferenciación teológica entre el primer verbo y גִדַּפְתָּ mediante «blasfemado».
  spanish_consistency_notes:
  - Se mantiene «el Santo de Israel» como título fijo isaiano.
  - Se traduce el movimiento idiomático de los ojos con una nota para conservar la imagen hebrea y su matiz de altivez.
  - Se usa «Contra» en el segundo colon para reflejar la fuerza hostil del contexto y el paralelismo con la primera pregunta.
