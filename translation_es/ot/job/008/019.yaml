translation:
  language: es
  text: ¡Mira! Esto es el gozo de su camino[a], y desde el polvo brotarán otros[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «él es el gozo de su camino». El pronombre hebreo puede leerse de manera más personal, pero el contexto favorece una afirmación resumidora sobre el destino de la planta, no una declaración directa acerca de una persona.'
    reason: alternative_reading
  - marker: b
    text: 'O: «otro brotará desde el polvo». אַחֵר puede ser singular, pero el verbo plural favorece la traducción «otros brotarán».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶן
  english_pob_choice: Behold
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - He aquí
  - Mira
  lexicon: HALOT
  rationale: La partícula introduce una observación enfática. En español, «¡Mira!» conserva bien el impulso de atención y funciona de manera natural en poesía sin sonar arcaica como una mera calca de «He aquí».
- source_word: הוּא
  english_pob_choice: this
  chosen_spanish: Esto
  alternatives_spanish:
  - él
  - ello
  lexicon: HALOT
  rationale: El pronombre apunta de manera deíctica al cuadro completo del destino descrito, no necesariamente a una persona individual. «Esto» reproduce mejor ese valor resumidor en español que «él», que personalizaría demasiado el enunciado.
- source_word: מְשׂוֹשׂ
  english_pob_choice: the joy
  chosen_spanish: el gozo
  alternatives_spanish:
  - la alegría
  - el regocijo
  lexicon: HALOT
  rationale: El sustantivo expresa gozo/alegría. «Gozo» mantiene un registro bíblico claro y suena natural en la frase nominal «el gozo de su camino».
- source_word: דַּרְכּוֹ
  english_pob_choice: his way
  chosen_spanish: su camino
  alternatives_spanish:
  - su senda
  - su ruta
  lexicon: HALOT
  rationale: דרך puede ser camino, senda o curso de vida. «Camino» conserva el valor literal y figurado a la vez, y encaja bien con la imagen poética.
- source_word: וּמֵעָפָר
  english_pob_choice: and out of the dust
  chosen_spanish: y del polvo
  alternatives_spanish:
  - y de la tierra
  - y del polvo de la tierra
  lexicon: HALOT
  rationale: La preposición con עפר indica origen. «Del polvo» preserva la imaginería bíblica y la concisión del hebreo; «de la tierra» diluye esa resonancia.
- source_word: אַחֵר
  english_pob_choice: others
  chosen_spanish: otros
  alternatives_spanish:
  - otro
  - otros más
  lexicon: HALOT
  rationale: Aunque אַחֵר puede ser singular, el verbo plural siguiente favorece un sujeto plural en español. «Otros» refleja mejor la concordancia y la idea de reemplazos que brotan en lugar del anterior.
- source_word: יִצְמָחוּ
  english_pob_choice: will sprout
  chosen_spanish: brotarán
  alternatives_spanish:
  - crecerán
  - saldrán
  lexicon: HALOT
  rationale: צמח tiene un fuerte matiz vegetal de brotar/crecer. «Brotarán» conserva esa metáfora de vegetación que nace de nuevo desde el polvo.
translation_notes:
  revision_awareness: El texto coincide sustancialmente con la última revisión auditada, que no introdujo cambios. Se mantuvo la decisión de leer הוּא de forma deíctica y אַחֵר en plural, conforme al contexto y al verbo plural.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se evitó «SEÑOR» como sustituto innecesario porque aquí no aparece una cita directa del nombre divino.
  - Se conservó el registro poético y conciso del hebreo sin expandir el sentido más allá de la evidencia textual.
