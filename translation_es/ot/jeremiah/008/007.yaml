revisions:
- from: Aun la cigüeña en los cielos conoce sus tiempos señalados[a], y la tórtola, la golondrina y la grulla guardan el tiempo de su venida[b]; pero mi pueblo no conoce el juicio de Yahvé.
  to: Aun la cigüeña en los cielos conoce sus tiempos señalados, y la tórtola, la golondrina[a] y la grulla observan el tiempo de su llegada; pero mi pueblo no conoce el juicio de Yahvé[b].
  rationale: 'Se conservaron las decisiones léxicas principales del borrador, pero se corrigieron las notas para que reflejen las alternativas realmente documentadas en el audit trail inglés: la incertidumbre de סוס y las posibilidades semánticas de מִשְׁפַּט יְהוָה. Además, se mejoró levemente la naturalidad de ''guardan el tiempo de su venida'' a ''observan el tiempo de su llegada''.'
