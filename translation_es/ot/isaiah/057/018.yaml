translation:
  language: es
  text: He visto sus caminos[a], y lo sanaré; lo guiaré y le restauraré consuelos, a él y a sus dolientes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus conductas»; el plural hebreo puede referirse al modo de vida o al proceder de la persona.
    reason: lexical_alternative
lexical_decisions:
- source_word: דְּרָכָיו
  english_pob_choice: his ways
  chosen_spanish: sus caminos
  alternatives_spanish:
  - su conducta
  - su proceder
  lexicon: HALOT
  rationale: דֶּרֶךְ en plural puede referirse al modo de vivir o al proceder de una persona. «Sus caminos» conserva el giro hebreo y la amplitud moral sin forzar una paráfrasis.
- source_word: רָאִיתִי
  english_pob_choice: I have seen
  chosen_spanish: he visto
  alternatives_spanish:
  - vi
  - he observado
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una acción vista como válida para el presente; en español, el pretérito perfecto compuesto («he visto») comunica bien esa relevancia actual y mantiene el fundamento de las promesas siguientes.
- source_word: וְאֶרְפָּאֵהוּ
  english_pob_choice: and I will heal him
  chosen_spanish: y lo sanaré
  alternatives_spanish:
  - y lo curaré
  - y lo restauraré
  lexicon: HALOT
  rationale: רפא significa normalmente «sanar»/«curar». «Sanar» preserva el sentido de restauración divina sin convertirlo en una interpretación más amplia que el verbo no exige por sí mismo.
- source_word: וְאַנְחֵהוּ
  english_pob_choice: I will lead him
  chosen_spanish: lo guiaré
  alternatives_spanish:
  - lo conduciré
  - lo llevaré
  lexicon: HALOT
  rationale: נחה en hifil implica conducir o guiar. «Guiar» es natural en español y conserva la imagen de dirección personal de parte de Dios.
- source_word: וַאֲשַׁלֵּם
  english_pob_choice: and restore
  chosen_spanish: restauraré
  alternatives_spanish:
  - recompensaré
  - pagaré
  lexicon: HALOT
  rationale: En este contexto, שׁלם se orienta a devolver bienestar o plenitud. «Restauraré» capta esa idea mejor que «pagaré» y evita un matiz meramente retributivo.
- source_word: נִחֻמִים
  english_pob_choice: comfort
  chosen_spanish: consuelos
  alternatives_spanish:
  - consuelo
  - consolaciones
  lexicon: HALOT
  rationale: El sustantivo está en plural; por eso se elige «consuelos» para reflejar con más cercanía la forma hebrea, siguiendo la revisión inglesa que corrigió de singular a plural.
- source_word: לּוֹ
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - para él
  - para él
  lexicon: HALOT
  rationale: La preposición ל marca aquí el destinatario de lo restaurado. «A él» es directo y claro en español.
- source_word: וְלַאֲבֵלָיו
  english_pob_choice: and to his mourners
  chosen_spanish: y a sus dolientes
  alternatives_spanish:
  - y a los que lo lloran
  - y a sus enlutados
  lexicon: HALOT
  rationale: אֲבֵלִים designa personas en duelo o que están llorando. «Dolientes» conserva el sustantivo relacional y su tono sobrio.
theological_decisions:
- issue: El alcance de «sus caminos» en un contexto de restauración divina
  english_pob_reading: The verse states that God has seen the person's conduct and nevertheless promises healing and guidance.
  chosen_spanish_reading: El versículo afirma que Dios ha visto el proceder de la persona y, aun así, promete sanarla, guiarla y restaurarle consuelos.
  alternative_spanish_readings:
  - El versículo puede suavizarse hacia una lectura más neutral de «su camino».
  - También podría explicitarse como arrepentimiento, pero el hebreo no lo dice aquí de forma explícita.
  rationale: 'El hebreo nombra los «caminos» de la persona sin añadir la idea de arrepentimiento en este versículo. La traducción mantiene esa tensión: Dios ve plenamente el proceder y, pese a ello, actúa con restauración.'
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de resolverla interpretativamente.'
translation_notes:
  revision_awareness: La versión española sigue la revisión inglesa más reciente al reflejar el plural de נִחֻמִים con «consuelos». También mantiene la estructura de promesa divina en serie, sin expandir el versículo a una explicación de arrepentimiento que el hebreo no formula.
  spanish_consistency_notes:
  - Se usa «Yahvé» no aplica aquí porque el tetragrámaton no aparece en este versículo.
  - Se prefirió «sanar» y «guiar» como equivalentes sobrios y transparentes de רפא y נחה.
  - «Consuelos» se eligió para conservar el plural hebreo y evitar neutralizarlo con un singular genérico.
  - La frase final conserva el paralelismo entre el individuo y sus dolientes con una formulación natural en español.
