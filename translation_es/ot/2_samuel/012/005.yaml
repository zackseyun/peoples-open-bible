  rationale: Se revisa la frase para que מְאֹד quede expresado con naturalidad en español mediante «muchísimo», evitando el giro torpe «mucho» al final. También se restituye «hijo de muerte» en el texto principal para alinearse con la decisión léxica auditada del POB, conservando en nota su sentido idiomático jurídico. Se simplifican las notas a la única que aporta una alternativa significativa para el lector.
