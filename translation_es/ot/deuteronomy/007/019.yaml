revisions:
- from: las grandes pruebas[a] que tus ojos vieron, y las señales, y las maravillas, y la mano poderosa, y el brazo extendido por medio del cual Yahvé tu Dios te sacó; así hará Yahvé tu Dios con todos los pueblos[b] de los que tú tienes miedo.
  to: las grandes pruebas[a] que tus ojos vieron, y las señales, y las maravillas, y la mano poderosa, y el brazo extendido por medio del cual Yahvé tu Dios te sacó; así hará Yahvé tu Dios a todos los pueblos[b] de los que tienes miedo.
  rationale: Se reemplaza 'con todos los pueblos' por 'a todos los pueblos' para reflejar mejor el objeto de la acción en el hebreo y en el audit trail inglés. Se suaviza 'de los que tú tienes miedo' a 'de los que tienes miedo' para un español más natural y digno. Se mejora la nota lexical [a] eliminando la expresión torpe 'pruebas de examen'.
