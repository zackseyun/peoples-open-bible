base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/003/013.yaml
  text: Only acknowledge your guilt[a], that you have rebelled against Yahweh your God and scattered your ways among strangers under every green tree, and you have not obeyed my voice[b], declares Yahweh.
  footnotes:
  - marker: a
    text: Or 'spread your ways to strange gods.' The Hebrew says 'to strangers,' likely within the metaphor of adultery and idolatry, but does not explicitly supply 'gods.'
    reason: alternative_reading
  - marker: b
    text: '''Under every green tree'' is a recurring expression for places of illicit worship.'
    reason: cultural_note
