translation:
  language: es
  text: 'Por tanto[a], así dice Yahvé, el Dios de los ejércitos, el Dios de Israel: «He aquí, voy a traer sobre Judá y sobre todos los habitantes de Jerusalén toda la calamidad que he anunciado contra ellos, porque les hablé y no escucharon, y los llamé y no respondieron».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desastre». El hebreo puede traducirse también «mal» en otros contextos, pero aquí se refiere al juicio anunciado que vendrá sobre Judá y Jerusalén.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Expresa la conclusión inferida del contraste previo con la obediencia de los recabitas; mantiene la relación lógica del hebreo sin volverla artificial en español.
- source_word: כֹּה אָמַר
  english_pob_choice: thus says
  chosen_spanish: así dice
  alternatives_spanish:
  - así ha dicho
  - de esta manera dice
  lexicon: HALOT
  rationale: Fórmula profética estándar; en español, «así dice» conserva la solemnidad y la cadencia del mensaje divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - SEÑOR
  lexicon: HALOT
  rationale: Se sigue el default del proyecto para el Nombre divino, preservándolo explícitamente en vez de ocultarlo con un sustituto tipográfico.
- source_word: אֱלֹהֵי צְבָאוֹת
  english_pob_choice: the God of hosts
  chosen_spanish: el Dios de los ejércitos
  alternatives_spanish:
  - el Dios de los ejércitos celestiales
  - el Dios de las huestes
  lexicon: HALOT
  rationale: «Ejércitos» reproduce el valor amplio de צְבָאוֹת sin restringirlo solo a lo celestial; mantiene la relación constructa con «Dios».
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israelita
  lexicon: HALOT
  rationale: Título pactal directo y transparente; la forma española coincide con el uso bíblico natural y fiel.
- source_word: הִנְנִי
  english_pob_choice: Behold, I am
  chosen_spanish: Miren, estoy
  alternatives_spanish:
  - He aquí, estoy
  - He aquí que estoy
  lexicon: HALOT
  rationale: En español, «Miren» conserva la fuerza de deíxis/atención de הִנְנִי sin sonar arcaico; «estoy» refleja la inminencia de la acción divina.
- source_word: מֵבִיא
  english_pob_choice: bringing on
  chosen_spanish: trayendo sobre
  alternatives_spanish:
  - trayendo
  - haciendo venir sobre
  lexicon: HALOT
  rationale: Con un contexto de juicio, «sobre» comunica la carga adversativa de אֶל en español mejor que un «a» neutral.
- source_word: אֶל יְהוּדָה וְאֶל כָּל יֹשְׁבֵי יְרוּשָׁלִַם
  english_pob_choice: on Judah and on all the inhabitants of Jerusalem
  chosen_spanish: sobre Judá y sobre todos los habitantes de Jerusalén
  alternatives_spanish:
  - contra Judá y contra todos los habitantes de Jerusalén
  - a Judá y a todos los habitantes de Jerusalén
  lexicon: HALOT
  rationale: «Sobre» mantiene la imagen de un mal que cae o se impone; preserva el matiz de juicio que el inglés POB expresó con «on».
- source_word: כָּל הָרָעָה
  english_pob_choice: all the disaster
  chosen_spanish: todo el desastre
  alternatives_spanish:
  - toda la calamidad
  - todo el mal
  lexicon: HALOT
  rationale: En este contexto profético, רָעָה apunta a calamidad/jucio anunciado, no a mal moral; «desastre» evita atribuir a Dios maldad ética.
- source_word: אֲשֶׁר דִּבַּרְתִּי עֲלֵיהֶם
  english_pob_choice: that I have spoken against them
  chosen_spanish: que he hablado contra ellos
  alternatives_spanish:
  - que he pronunciado contra ellos
  - que he dicho acerca de ellos
  lexicon: HALOT
  rationale: «Contra ellos» conserva la fuerza adversativa de דִּבַּר־עַל en oráculos de juicio y evita diluir el tono judicial.
- source_word: יַעַן
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - puesto que
  lexicon: HALOT
  rationale: Introduce de forma natural la causa del juicio; «porque» es la equivalencia española más directa y clara.
- source_word: דִּבַּרְתִּי אֲלֵיהֶם
  english_pob_choice: I spoke to them
  chosen_spanish: les hablé
  alternatives_spanish:
  - les hablé a ellos
  - les hablé directamente
  lexicon: HALOT
  rationale: Con pronombre clítico, el español queda más fluido y natural sin perder la referencia a la iniciativa divina.
- source_word: וְלֹא שָׁמֵעוּ
  english_pob_choice: and they did not listen
  chosen_spanish: y no escucharon
  alternatives_spanish:
  - y no oyeron
  - y no obedecieron
  lexicon: HALOT
  rationale: «Escuchar» conserva la metáfora auditiva del hebreo y en español puede implicar desatención obediencial en este contexto.
- source_word: וָאֶקְרָא לָהֶם
  english_pob_choice: and I called to them
  chosen_spanish: y les llamé
  alternatives_spanish:
  - y clamé a ellos
  - y los llamé
  lexicon: HALOT
  rationale: Mantiene la iniciativa divina repetida; la forma con clítico expresa bien el llamado personal y directo.
- source_word: וְלֹא עָנוּ
  english_pob_choice: and they did not answer
  chosen_spanish: y no respondieron
  alternatives_spanish:
  - y no contestaron
  - y no dieron respuesta
  lexicon: HALOT
  rationale: «Responder» preserva la relación dialogal del hebreo y funciona bien como paralelo a «les hablé» y «les llamé».
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton; el proyecto pide mantener el Nombre divino en la traducción principal. «Yahvé» es la forma española establecida para ese objetivo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Semantic force of הָרָעָה in a judgment oracle
  english_pob_reading: disaster
  chosen_spanish_reading: desastre
  alternative_spanish_readings:
  - calamidad
  - mal
  rationale: En este contexto, la referencia es al juicio anunciado sobre Judá y Jerusalén. «Desastre» conserva el sentido de calamidad histórica sin sugerir que Dios cause mal moral.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
translation_notes:
  revision_awareness: El texto sigue de cerca el informe inglés auditado, sin cambios sustantivos respecto del último pase; se conserva la decisión de leer הָרָעָה como calamidad/desastre en un oráculo de juicio y de mantener el Nombre divino de forma explícita. La adaptación al español privilegia fluidez natural sin perder las correspondencias semánticas claves del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma regular para יְהוָה.
  - Se conserva «Dios de los ejércitos» para אֱלֹהֵי צְבָאוֹת, evitando sustituciones litúrgicas no pedidas por el texto.
  - El verbo de percepción se rinde como «escucharon/escuchar» para reflejar la mezcla hebrea de oír y obedecer.
  - 'La secuencia verbal conserva paralelismo: «les hablé… no escucharon / les llamé… no respondieron».'
