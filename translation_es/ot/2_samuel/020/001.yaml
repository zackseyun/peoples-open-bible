base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/020/001.yaml
  text: Now there happened to be there a worthless man[a], whose name was Sheba son of Bichri, a Benjaminite. He blew the trumpet and said, “We have no share in David, and no inheritance in the son of Jesse. Every man to his tents[d][c][b], O Israel!”
  footnotes:
  - marker: a
    text: Or 'a wicked man,' 'a scoundrel,' or more literally 'a man of Belial.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew shofar, a horn used as a public signal; traditionally understood as a ram's horn.
    reason: cultural_note
  - marker: c
    text: Or 'We have no portion in David.'
    reason: lexical_alternative
  - marker: d
    text: The Hebrew says 'Every man to his tents,' a distributive idiom meaning each person should depart to his own home or camp.
    reason: lexical_alternative
