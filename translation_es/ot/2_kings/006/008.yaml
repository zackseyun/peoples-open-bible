  - severity: low
    issue: '''Estaba haciendo guerra'' suena poco natural en español bíblico moderno.'
    rationale: Aunque comunica el aspecto durativo, la expresión resulta algo forzada. 'Estaba guerreando' preserva mejor la idea de acción bélica continua sin sonar como calco del inglés.
