translation:
  language: es
  text: 'los que dicen a los videntes: «No vean», y a los visionarios: «No nos presenten[a] lo recto; háblennos cosas halagüeñas; vean ilusiones[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'cosas rectas', 'lo que es directo' o 'cosas verdaderas'. El término hebreo se refiere a lo que es recto, íntegro o correcto.
    reason: lexical_alternative
  - marker: b
    text: O 'engaños' o 'delirios'.
    reason: lexical_alternative
lexical_decisions:
- source_word: רֹאִים
  english_pob_choice: seers
  chosen_spanish: videntes
  alternatives_spanish:
  - los que ven
  - profetas
  lexicon: HALOT
  rationale: El participio sustantivado de ראה funciona como designación profética. 'Videntes' conserva el matiz de personas con capacidad de ver y distingue bien este término de חֹזִים.
- source_word: תִרְאוּ
  english_pob_choice: see
  chosen_spanish: vean
  alternatives_spanish:
  - miren
  - tengan visiones
  lexicon: HALOT
  rationale: La prohibición usa el verbo ordinario 'ver'; 'vean' preserva el paralelismo con רֹאִים y mantiene la fuerza directa del mandato.
- source_word: חֹזִים
  english_pob_choice: visionaries
  chosen_spanish: visionarios
  alternatives_spanish:
  - videntes
  - profetas
  lexicon: HALOT
  rationale: Derivado de חזה, este término apunta a una clase de visionarios proféticos distinta de ראה. 'Visionarios' conserva la diferencia léxica del hebreo.
- source_word: תֶחֱזוּ
  english_pob_choice: envision
  chosen_spanish: tengan visiones
  alternatives_spanish:
  - vean
  - imaginen
  lexicon: HALOT
  rationale: El verbo comparte raíz con חֹזִים; 'tengan visiones' mantiene la conexión cognada y evita borrar la distinción con el primer 'ver'.
- source_word: נְכֹחוֹת
  english_pob_choice: what is right
  chosen_spanish: cosas rectas
  alternatives_spanish:
  - lo recto
  - cosas justas
  - cosas verdaderas
  lexicon: HALOT
  rationale: El término remite a lo recto, correcto, íntegro u upright. 'Cosas rectas' conserva el sentido literal y la tensión ética de la petición, sin reducirla solo a 'verdades'.
- source_word: דַּבְּרוּ
  english_pob_choice: speak
  chosen_spanish: hablen
  alternatives_spanish:
  - digan
  - pronuncien
  lexicon: HALOT
  rationale: Imperativo plural simple; 'hablen' es natural en español y adecuado al tono de la orden dirigida a los profetas.
- source_word: חֲלָקוֹת
  english_pob_choice: smooth things
  chosen_spanish: cosas suaves
  alternatives_spanish:
  - cosas lisonjeras
  - cosas agradables
  - cosas blandas
  lexicon: HALOT
  rationale: La imagen hebrea es literalmente 'cosas suaves/lisas', con connotación de discurso halagador o apaciguador. 'Cosas suaves' conserva la metáfora sin forzar una interpretación más amplia.
- source_word: מַהֲתַלּוֹת
  english_pob_choice: illusions
  chosen_spanish: ilusiones
  alternatives_spanish:
  - engaños
  - delirios
  - delusiones
  lexicon: HALOT
  rationale: El sustantivo expresa cosas engañosas o falsas. 'Ilusiones' encaja con el campo semántico de visiones y mantiene el matiz de algo irreal o engañoso.
- source_word: אֲשֶׁר אָמְרוּ
  english_pob_choice: who say
  chosen_spanish: los que dicen
  alternatives_spanish:
  - los que dijeron
  - quienes dicen
  lexicon: HALOT
  rationale: La cláusula relativa caracteriza al grupo en su actitud habitual. 'Los que dicen' refleja mejor esa caracterización presente que un pasado puntual.
theological_decisions:
- issue: Cómo rendir נְכֹחוֹת en un contexto de rechazo a la palabra profética
  english_pob_reading: '''what is right'' rather than a narrower ''truths'' or more literal ''straight things'''
  chosen_spanish_reading: '''cosas rectas'''
  alternative_spanish_readings:
  - lo recto
  - cosas verdaderas
  - cosas justas
  rationale: La frase no solo apunta a veracidad intelectual, sino a discurso recto, correcto e íntegro. 'Cosas rectas' preserva esa amplitud moral y mantiene el eco semítico del hebreo.
  doctrine_reference: Translation philosophy §1, §3
- issue: Conservar la distinción entre רֹאִים y חֹזִים
  english_pob_reading: Differentiate 'seers' and 'visionaries'
  chosen_spanish_reading: '''videntes'' y ''visionarios'''
  alternative_spanish_readings:
  - ambos como 'videntes'
  - ambos como 'profetas'
  rationale: El hebreo usa dos términos relacionados pero no idénticos. Mantener dos soluciones distintas evita borrar la variación léxica y hace auditable la relación entre ambos verbos y sustantivos.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el texto hebreo y el criterio auditado del POB inglés: conserva el paralelismo entre ver/visionar, mantiene la metáfora de ''cosas suaves'' y ''ilusiones'', y evita homogeneizar dos términos proféticos distintos. No se reportan revisiones posteriores que alteren el sentido base.'
  spanish_consistency_notes:
  - Se preserva 'Yahvé' como término del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se mantiene un registro bíblico moderno y digno, evitando tanto arcaísmo excesivo como paráfrasis interpretativa.
  - Las comillas españolas se usan para reproducir el discurso directo con claridad editorial.
