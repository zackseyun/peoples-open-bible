  - severity: medium
    issue: «No faltará para ti un hombre» es una formulación poco idiomática
    rationale: El hebreo admite la equivalencia idiomática documentada por el POB. En español, «No te faltará un hombre» transmite el mismo sentido de continuidad dinástica con naturalidad y claridad.
