review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente el sentido básico del griego: Marta habla a Jesús, expresa certeza, y afirma una resurrección futura en el contexto escatológico del último día. Sin embargo, la nota alternativa española no preserva bien la alternativa inglesa, porque repite prácticamente la misma redacción en vez de reflejar el contraste preposicional entre «en» y «en/al momento de».'
  spanish_quality_summary: 'El texto principal es claro, natural y digno en español. «Marta le dijo» y «Sé que él resucitará» son buenas elecciones. La coma antes de «en el último día» es aceptable, pero el problema principal está en la nota: su formulación no aporta una alternativa real y suena mecánica. Conviene ajustar la nota a un español natural que preserve la distinción documentada.'
  glossary_alignment: No hay términos del glosario principal en disputa aquí. «Resucitará» preserva bien ἀναστήσεται, y «resurrección» / «último día» mantienen la referencia escatológica. No se detectan conflictos con Yahvé, Mesías/Cristo, Espíritu, esclavo, etc.
  issues:
  - severity: medium
    issue: La nota al pie no refleja la alternativa léxica del inglés POB.
    rationale: 'La nota inglesa contrasta «in the resurrection» con «at the resurrection on the last day». La nota española propuesta («O: “en la resurrección, en el último día”») no cambia sustancialmente el sentido ni la preposición, por lo que no conserva la alternativa documentada.'
  - severity: low
    issue: La puntuación del texto principal puede simplificarse ligeramente.
    rationale: «En la resurrección, en el último día» es entendible, pero en español también fluye bien sin que la nota reproduzca la misma estructura. No es un error grave; el ajuste principal sigue siendo la nota.
  revised_spanish_text: 'Marta le dijo[a]: «Sé que él resucitará en la resurrección, en el último día».'
  revised_footnotes:
  - marker: a
    text: 'O: «en la resurrección del último día».'
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal, que es fiel y natural. Se corrige la nota para que exprese una alternativa española real y útil, equivalente a la opción inglesa «at the resurrection on the last day», evitando una repetición vacía de la redacción principal.
