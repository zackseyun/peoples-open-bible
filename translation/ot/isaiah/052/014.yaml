theological_decisions:
- issue: Shift in grammatical person within the verse
  chosen_reading: Retain the Masoretic shift from second person ('you') to third person ('his').
  alternative_readings:
  - Harmonize the whole verse to third person for smoother English
  rationale: The Hebrew text directly addresses the servant ('at you') and then speaks of 'his appearance' and 'his form.' This abrupt shift is part of the received text and should be preserved rather than smoothed away, even if many interpreters understand the referent throughout as the servant.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Rendering of human-reference language
  chosen_reading: Use 'man' and 'sons of man' rather than fully gender-neutral substitutes.
  alternative_readings:
  - humanity
  - human beings
  rationale: The Hebrew uses אִישׁ and בְּנֵי אָדָם. Per the project's gender-accurate policy, the translation should reflect the source's masculine representative language while allowing readers to understand its generic force.
  doctrine_reference: 'Translation philosophy §4; Contested terms: אָדָם'
