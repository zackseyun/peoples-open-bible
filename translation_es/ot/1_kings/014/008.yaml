translation:
  language: es
  text: y arranqué el reino de la casa de David y te lo di. Pero no has sido como mi siervo David, que guardó mis mandamientos y que anduvo tras de mí[a] con todo su corazón, para hacer solo lo recto ante mis ojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «me siguió». El hebreo dice literalmente «anduvo tras de mí».
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶקְרַע
  english_pob_choice: I tore ... away
  chosen_spanish: rasgué
  alternatives_spanish:
  - arranqué
  - desgarré
  - rasgué ... de
  lexicon: HALOT
  rationale: El verbo hebreo expresa ruptura violenta o desgarro. En español, «rasgué» conserva la imagen fuerte sin forzar un calco poco natural; el complemento «de la casa de David» comunica la separación resultante.
- source_word: הַמַּמְלָכָה
  english_pob_choice: the kingdom
  chosen_spanish: el reino
  alternatives_spanish:
  - la realeza
  - el reinado
  lexicon: HALOT
  rationale: מַמְלָכָה se refiere aquí al ámbito político del gobierno. «Reino» es la correspondencia más natural y clara en español.
- source_word: מִבֵּית דָּוִד
  english_pob_choice: from the house of David
  chosen_spanish: de la casa de David
  alternatives_spanish:
  - de la dinastía de David
  - de la casa real de David
  lexicon: HALOT
  rationale: «Casa de David» conserva el idiomatismo dinástico de בַּיִת y sigue siendo comprensible en español bíblico contemporáneo.
- source_word: וָאֶתְּנֶהָ לָךְ
  english_pob_choice: gave it to you
  chosen_spanish: te lo di a ti
  alternatives_spanish:
  - te lo he dado
  - te lo entregué
  lexicon: HALOT
  rationale: La secuencia wayyiqtol narra una acción pasada; «te lo di a ti» refleja con claridad la concesión del reino, y el pronombre neutro «lo» retoma «el reino».
- source_word: כְּעַבְדִּי דָוִד
  english_pob_choice: my servant David
  chosen_spanish: mi esclavo David
  alternatives_spanish:
  - mi siervo David
  - mi servidor David
  lexicon: HALOT
  rationale: El proyecto POB prioriza «esclavo» para עֶבֶד cuando la fuerza léxica debe mantenerse. Aquí se conserva esa tensión, aunque suene menos usual, porque el contraste con Jeroboam depende del término fuerte.
- source_word: שָׁמַר מִצְוֺתַי
  english_pob_choice: kept my commandments
  chosen_spanish: guardó mis mandamientos
  alternatives_spanish:
  - observó mis mandamientos
  - cumplió mis mandamientos
  lexicon: HALOT
  rationale: שׁמר admite «guardar» y «observar»; «guardó» mantiene el lenguaje de fidelidad obediente y suena natural en español bíblico.
- source_word: הָלַךְ אַחֲרַי
  english_pob_choice: walked after me
  chosen_spanish: anduvo tras de mí
  alternatives_spanish:
  - caminó tras de mí
  - me siguió
  lexicon: HALOT
  rationale: La imagen hebrea de seguimiento se conserva mejor con «anduvo tras de mí», una fórmula bíblica clara en español que reproduce el valor idiomático sin explicitarlo demasiado.
- source_word: בְּכָל לְבָבוֹ
  english_pob_choice: with all his heart
  chosen_spanish: con todo su corazón
  alternatives_spanish:
  - con todo su ser
  - de todo corazón
  lexicon: HALOT
  rationale: Es un modismo hebreo de entrega interior completa; «con todo su corazón» es la equivalencia más estable y transparente en español.
- source_word: לַעֲשׂוֹת רַק הַיָּשָׁר בְּעֵינַי
  english_pob_choice: to do only what was right in my eyes
  chosen_spanish: para hacer solo lo recto ante mis ojos
  alternatives_spanish:
  - para hacer únicamente lo justo a mis ojos
  - para hacer solo lo que era recto a mis ojos
  lexicon: HALOT
  rationale: El infinitivo final expresa propósito; «para hacer» lo refleja con naturalidad. «Lo recto» preserva la evaluación moral del hebreo, y «ante mis ojos» mantiene el idiomatismo de בְּעֵינַי sin volverlo opaco.
theological_decisions:
- issue: David as covenantal exemplar despite known sins elsewhere
  english_pob_reading: Retain the verse's own covenantal evaluation without importing qualifications into the main text.
  chosen_spanish_reading: Mantener la valoración del versículo tal como está, sin añadir atenuantes como «generalmente» o «en conjunto».
  alternative_spanish_readings:
  - No has sido como mi esclavo David, que en general guardó mis mandamientos
  - No has sido como mi esclavo David, quien por lo común anduvo tras de mí
  rationale: El contraste retórico con Jeroboam requiere dejar intacta la afirmación del texto. El pasaje no busca matizar aquí la figura de David, sino presentarlo como parámetro de fidelidad frente al rey receptor del reproche.
  doctrine_reference: Preservar la tensión teológica del texto sin armonización intratextual forzada.
translation_notes:
  revision_awareness: 'La base inglesa revisada aclaró la construcción final como infinitivo de propósito: «to do only what was right in my eyes». En el español se reflejó con «para hacer solo lo recto ante mis ojos», manteniendo la relación de finalidad sin convertirla en participio explicativo. También se conservó la imagen verbal fuerte del desgarro del reino y la tensión léxica de עֶבֶד mediante «esclavo».'
  spanish_consistency_notes:
  - Se mantiene «casa de David» como expresión dinástica estable.
  - Se usa «mandamientos» para מִצְוֺתַי, coherente con el registro bíblico clásico.
  - «Ante mis ojos» conserva el valor idiomático de בְּעֵינַי sin sustituirlo por una paráfrasis doctrinal.
  - La nota a pie de página se ancla en «tras de mí» para conservar la alternativa literal del hebreo.
