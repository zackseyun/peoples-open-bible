translation:
  language: es
  text: 'Y vino la palabra de Yahvé a mí, diciendo:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ... came
  chosen_spanish: Y vino
  alternatives_spanish:
  - Y sucedió
  - Y aconteció
  lexicon: HALOT
  rationale: El hebreo introduce una fórmula narrativa/secuencial. En español, 'Y vino' conserva el movimiento de llegada del evento sin volverlo pesado o arcaizante; mantiene el arranque formal del discurso profético.
- source_word: דְבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - el asunto
  lexicon: HALOT
  rationale: En fórmulas proféticas, דָּבָר se refiere a la palabra divina. 'La palabra' conserva el idiomatismo bíblico y el registro formal del texto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se preserva el nombre propio divino revelado por el Tetragrámaton. 'Yahvé' sigue el criterio del proyecto en español y evita la sustitución por un título.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - para mí
  lexicon: HALOT
  rationale: La preposición con sufijo indica dirección hacia el profeta. 'A mí' es la equivalencia natural y precisa en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: 'diciendo:'
  alternatives_spanish:
  - 'y dijo:'
  - 'con estas palabras:'
  lexicon: HALOT
  rationale: El infinitivo constructo introduce el discurso siguiente. 'Diciendo:' es la fórmula española estándar y mantiene la continuidad sintáctica del hebreo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. Se traduce con el nombre propio 'Yahvé' para preservar la identidad del Dios del pacto y evitar una sustitución reverencial por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'La versión inglesa mantiene una fórmula profética breve y literal-optativa: ''And the word of Yahweh came to me, saying,''. La propuesta española sigue el mismo valor discursivo, con adaptación idiomática natural y sin añadir contenido no presente en el hebreo.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma estándar para יְהוָה.
  - '''La palabra'' conserva la fórmula profética estable.'
  - No se introduce puntuación o léxico explicativo fuera del alcance del verso.
