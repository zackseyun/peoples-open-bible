  rationale: 'La revisión hace un ajuste pequeño pero importante: expresa la relación temporal de «al verla/cuando la vean» mejor documentada en la auditoría inglesa, y pule las notas para que describan con más precisión el referente de צִיצִת y las alternativas de תָתֻרוּ y זֹנִים. Se conserva el nombre divino «Yahvé», la fuerza legal de «mandamientos», y la metáfora sexual fuerte de «se prostituyen».'
