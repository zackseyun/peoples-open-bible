review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: el gemido, la respuesta motivada por la noticia/reporte venidero, y la cadena de colapso emocional y físico están bien preservados. También mantiene acertadamente la imagen de «todo corazón», «todas las manos», «todo espíritu» y «todas las rodillas». Sin embargo, falta una nota léxica para la alternativa de שְׁמוּעָה («noticia/reporte»), que el rastro auditado en inglés preservó explícitamente. Además, la nota al pie está anclada en un lugar inadecuado: el marcador [a] aparece en «Y será[a]», pero la nota explica el modismo de «las rodillas correrán con agua», por lo que debe moverse a esa frase.'
  spanish_quality_summary: El español es claro, natural y digno. «Gimiendo», «la noticia», «desfallecerá todo espíritu» y «Mira, viene y sucederá» son legibles y fieles. La principal mejora necesaria es de aparato crítico y anclaje de nota; el texto principal solo requiere ese ajuste menor para que la nota cultural quede vinculada a la expresión que explica. También conviene añadir la nota alternativa sobre «noticia/reporte».
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה se preserva como «Yahvé» en «el Señor Yahvé», lo cual respeta la política doctrinal para el nombre divino dentro de אֲדֹנָי יְהוִה. רוּחַ se vierte como «espíritu» con el matiz interior correcto. No hay conflictos relevantes de glosario; la única carencia es conservar en nota la alternativa léxica de שְׁמוּעָה.'
  issues:
  - severity: medium
    issue: El marcador de la nota cultural está anclado en «Y será[a]» en vez de en «todas las rodillas correrán con agua».
    rationale: La nota explica el modismo hebreo de las rodillas y debe aparecer exactamente en la frase pertinente según las instrucciones del proyecto.
  - severity: medium
    issue: Falta una nota al pie para la alternativa léxica de שְׁמוּעָה.
    rationale: El audit trail inglés preservó explícitamente la alternativa «report»; en español debe conservarse una alternativa equivalente como «informe» o «reporte» para no perder la decisión léxica documentada.
  - severity: low
    issue: La forma «Y será» suena un poco rígida en español, aunque es aceptable.
    rationale: No es un error de fidelidad; puede mantenerse. La revisión propuesta solo mueve las notas y añade la alternativa documentada sin necesidad de reformular más.
