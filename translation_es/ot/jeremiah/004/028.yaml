translation:
  language: es
  text: Por causa de esto la tierra[a] estará de duelo, y los cielos en lo alto se oscurecerán, porque he hablado, he determinado[b], no he cedido[c], ni volveré atrás de ello.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el país estará de duelo». El hebreo אֶרֶץ puede significar «tierra», «país» o «tierra» en sentido más amplio; aquí el paralelismo con «los cielos en lo alto» favorece el sentido más amplio.
    reason: lexical_alternative
  - marker: b
    text: O «he planeado» / «he resuelto».
    reason: lexical_alternative
  - marker: c
    text: O «no he cambiado de parecer».
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל זֹאת
  english_pob_choice: Because of this
  chosen_spanish: Por causa de esto
  alternatives_spanish:
  - A causa de esto
  - Por esto
  - Por esta razón
  lexicon: HALOT
  rationale: La construcción introduce la razón del luto cósmico. «Por causa de esto» conserva claramente la fuerza causal y suena natural en español bíblico actual.
- source_word: תֶּאֱבַל
  english_pob_choice: will mourn
  chosen_spanish: hará duelo
  alternatives_spanish:
  - mourirá
  - lamentará
  - estará de duelo
  lexicon: HALOT
  rationale: אבל expresa duelo/luto. «Hará duelo» comunica el personificar la tierra sin introducir una imagen ajena ni sonar demasiado literal en español.
- source_word: הָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra habitada
  - el mundo
  - la tierra/país
  lexicon: HALOT
  rationale: Aunque el inglés eligió «the earth» para conservar el paralelismo cósmico con «the heavens above», en español «la tierra» mantiene esa amplitud y evita una repetición artificial con «el mundo».
- source_word: וְקָדְרוּ
  english_pob_choice: will grow dark
  chosen_spanish: se oscurecerán
  alternatives_spanish:
  - se volverán oscuros
  - se entristecerán
  - quedarán oscuros
  lexicon: HALOT
  rationale: קדר aquí expresa oscurecimiento/gloom. «Se oscurecerán» comunica bien el cambio de estado y conserva la imagen poética.
- source_word: הַשָּׁמַיִם מִמָּעַל
  english_pob_choice: the heavens above
  chosen_spanish: los cielos de arriba
  alternatives_spanish:
  - los cielos arriba
  - los cielos desde arriba
  - el cielo de arriba
  lexicon: HALOT
  rationale: «Los cielos» reproduce el plural hebreo y «de arriba» mantiene el complemento espacial. La opción conserva el registro elevado sin sonar arcaizante.
- source_word: דִבַּרְתִּי
  english_pob_choice: I have spoken
  chosen_spanish: yo he hablado
  alternatives_spanish:
  - yo he dicho
  - yo he declarado
  lexicon: HALOT
  rationale: La forma perfecta en español transmite un acto verbal ya emitido y solemne. «He hablado» sigue de cerca el peso profético del hebreo.
- source_word: זַמֹּתִי
  english_pob_choice: I have purposed
  chosen_spanish: yo he dispuesto
  alternatives_spanish:
  - yo he planeado
  - yo he resuelto
  - yo he determinado
  lexicon: HALOT
  rationale: זמם aquí señala intención deliberada. «He dispuesto» conserva la idea de decisión firme y evita limitarla a un simple «plan».
- source_word: נִחַמְתִּי
  english_pob_choice: I have not relented
  chosen_spanish: no me he arrepentido
  alternatives_spanish:
  - no he cedido
  - no me he desdicho
  - no he cambiado de parecer
  lexicon: HALOT
  rationale: El hebreo נחם en este contexto trata del no ceder respecto del juicio anunciado. En español, «no me he arrepentido» refleja esa estabilización de voluntad, y se evita una lectura de culpa moral; el sentido de «ceder/relentarse» queda disponible en la nota.
- source_word: וְלֹא אָשׁוּב מִמֶּנָּה
  english_pob_choice: nor will I turn back from it
  chosen_spanish: ni me volveré atrás de ello
  alternatives_spanish:
  - ni retrocederé de ello
  - ni me apartaré de ello
  - ni retiraré eso
  lexicon: HALOT
  rationale: שׁוב con מן expresa retirarse o volver atrás de un curso de acción. «Me volveré atrás» preserva la metáfora direccional y suena natural en español.
theological_decisions:
- issue: Cómo traducir נחם en referencia a Dios
  english_pob_reading: I have not relented
  chosen_spanish_reading: no me he arrepentido
  alternative_spanish_readings:
  - no he cedido
  - no me he desdicho
  - no he cambiado de parecer
  rationale: El pasaje afirma la firmeza de Yahvé respecto del juicio ya declarado. En español, «no me he arrepentido» puede sonar más cercano al valor relacional de נחם que un simple «no he cedido», pero se mantiene la tensión interpretativa en nota para evitar sugerir pecado o error moral en Dios.
  doctrine_reference: Translation philosophy §1, §3
- issue: Alcance de הָאָרֶץ frente a «los cielos»
  english_pob_reading: the earth
  chosen_spanish_reading: la tierra
  alternative_spanish_readings:
  - el país
  - la tierra/país
  - el mundo
  rationale: La poesía contrasta la creación inferior con los cielos, pero el contexto histórico sigue apuntando a Judá. «La tierra» conserva la amplitud poética sin forzar una lectura exclusivamente cósmica o meramente territorial.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado y quedó sin cambios en el pase más reciente; el acuerdo del revisor fue alto y no se reportaron problemas. La versión española mantiene ese perfil de estabilidad, conservando la tensión semántica de נחם y el paralelismo poético entre tierra y cielos.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como forma estándar del proyecto cuando el contexto lo requiera, pero en este versículo el sujeto explícito es la primera persona divina.
  - Se evita «SEÑOR» como sustituto de YHWH y no aparece aquí por no ser necesario.
  - Se mantiene un registro bíblico contemporáneo, claro y digno, sin arcaísmos innecesarios.
  - «La tierra» refleja mejor la amplitud poética que una restricción inmediata a «el país», aunque ambas sigan siendo posibles en nota.
