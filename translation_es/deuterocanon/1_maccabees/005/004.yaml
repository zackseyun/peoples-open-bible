revisions:
- from: Y recordó la maldad de los hijos de Baian[a], que eran para el pueblo una trampa y un tropiezo, acechándolos en los caminos.
  to: Y recordó la maldad de los hijos de Baian[a], que eran para el pueblo un lazo y un tropiezo, tendiéndoles emboscadas en los caminos.
  rationale: Se ajusta «trampa» a «lazo» para reflejar mejor la imagen figurada de παγίδα, y «acechándolos» a «tendiéndoles emboscadas» para expresar con precisión ἐνεδρεύειν. Se conserva la estructura, el sentido narrativo y la nota de transliteración ya documentada. No se requiere adjudicación adicional.
