    reason: lexical_alternative
  - marker: b
    text: O «sus vengadores» o «sus redentores»; el término hebreo se refiere a un pariente con obligaciones familiares.
    reason: lexical_alternative
  revision_rationale: Se ajusta la expresión temporal para reflejar la inmediatez del hebreo, se reemplaza «golpeó» por «derribó» para comunicar mejor la acción letal en contexto, se corrige el anglicismo de la nota, y se añade la nota faltante para גֹאֲלָיו conforme al expediente POB.
