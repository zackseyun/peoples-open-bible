translation:
  language: es
  text: Y cuando el asunto[a] llegó a ser conocido por ellos, enviaron contra ellos a un solo general, y pelearon contra ellos, y muchos de ellos cayeron heridos, y tomaron cautivos a sus mujeres y a sus hijos, y los despojaron, y tomaron control de su tierra, y derribaron sus fortalezas, y los despojaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Asunto’ traduce aquí el sentido de λόγος como asunto o reporte conocido, no ‘palabra’ en sentido literal.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγνώσθη ὁ λόγος
  english_pob_choice: the matter became known
  chosen_spanish: la noticia[a] llegó a ellos
  alternatives_spanish:
  - el asunto llegó a ser conocido por ellos
  - la materia se hizo conocida para ellos
  - la noticia se les dio a conocer
  lexicon: LSJ
  rationale: λόγος aquí funciona como ‘asunto / noticia / reporte’, no como ‘palabra’ en sentido aislado. En español, ‘la noticia llegó a ellos’ comunica de forma natural que el contenido fue conocido por los destinatarios, manteniendo el pasivo sin forzar una estructura artificial.
- source_word: ἀπέστειλαν ἐπʼ αὐτοὺς στρατηγὸν ἕνα
  english_pob_choice: they sent one general against them
  chosen_spanish: enviaron contra ellos a un solo general
  alternatives_spanish:
  - enviaron contra ellos a un general
  - despacharon a un solo comandante contra ellos
  - mandaron contra ellos a un general
  lexicon: LSJ
  rationale: στρατηγός se rinde aquí como ‘general’ por el contexto militar. ‘Un solo’ conserva ἕνα y su énfasis en la singularidad del enviado, sin perder fluidez en español.
- source_word: ἐπολέμησαν πρὸς αὐτούς
  english_pob_choice: they fought against them
  chosen_spanish: pelearon contra ellos
  alternatives_spanish:
  - lucharon contra ellos
  - hicieron guerra contra ellos
  - pelearon con ellos
  lexicon: LSJ
  rationale: El verbo expresa enfrentamiento bélico directo. ‘Pelearon contra ellos’ es claro y reproduce bien el valor adversativo de πρὸς.
- source_word: ἔπεσαν ἐξ αὐτῶν τραυματίαι πολλοί
  english_pob_choice: many of them fell wounded
  chosen_spanish: cayeron muchos de ellos heridos
  alternatives_spanish:
  - muchos de ellos cayeron heridos
  - muchos fueron heridos y cayeron
  - cayeron como heridos muchos de ellos
  lexicon: LSJ
  rationale: ‘Cayeron... heridos’ conserva el giro militar de ‘caer’ y el sentido de τραυματίαι como hombres heridos o bajas heridas, sin añadir información sobre muerte que el griego no especifica.
- source_word: ᾐχμαλώτισαν
  english_pob_choice: they took ... captive
  chosen_spanish: tomaron cautivas a sus mujeres y a sus hijos
  alternatives_spanish:
  - llevaron cautivas a sus mujeres y a sus hijos
  - capturaron a sus mujeres y a sus hijos
  - hicieron cautivas a sus mujeres y a sus hijos
  lexicon: LSJ
  rationale: El verbo denota toma de personas como cautivos de guerra. ‘Tomaron cautivas’ preserva ese valor y suena natural en español bíblico contemporáneo.
- source_word: ἐπρονόμευσαν αὐτούς
  english_pob_choice: plundered them
  chosen_spanish: los despojaron
  alternatives_spanish:
  - los saquearon
  - los desvalijaron
  - los depredaron
  lexicon: LSJ
  rationale: El verbo significa saquear o despojar tras la victoria. ‘Despojaron’ es una equivalencia bíblica clara y relativamente sobria; se evita ‘saquearon’ para no repetir un término demasiado coloquial junto con la segunda ocurrencia del mismo verbo.
- source_word: κατεκράτησαν τῆς γῆς αὐτῶν
  english_pob_choice: gained control of their land
  chosen_spanish: tomaron control de su tierra
  alternatives_spanish:
  - tomaron posesión de su tierra
  - se adueñaron de su tierra
  - dominaron su tierra
  lexicon: LSJ
  rationale: κατακρατέω expresa dominación o control efectivo. ‘Tomaron control de’ conserva ese matiz sin introducir una noción legal más fuerte que la del griego.
- source_word: καθεῖλον τὰ ὀχυρώματα αὐτῶν
  english_pob_choice: pulled down their strongholds
  chosen_spanish: derribaron sus fortalezas
  alternatives_spanish:
  - demolieron sus fortalezas
  - derribaron sus fortificaciones
  - tiraron abajo sus fortalezas
  lexicon: LSJ
  rationale: ὀχυρώματα son fortificaciones o posiciones fuertes. ‘Fortalezas’ comunica bien el sentido para lectores actuales; ‘derribaron’ refleja καθεῖλον con sencillez y precisión.
- source_word: ἐπρονόμευσαν αὐτούς
  english_pob_choice: plundered them
  chosen_spanish: los despojaron
  alternatives_spanish:
  - los saquearon
  - los volvieron a despojar
  - los devastaron
  lexicon: LSJ
  rationale: Se conserva la repetición final del verbo, como en el texto griego y en el audit trail inglés. ‘Los despojaron’ mantiene la transparencia y evita suavizar la reiteración.
theological_decisions:
- issue: Repetición final de ‘plundered them’ / ἐπρονόμευσαν αὐτούς
  english_pob_reading: The Greek repeats 'and plundered them' at the end of the verse. The repetition is retained in the main text because it is present in the source, though it may reflect either deliberate emphasis or a transmissional duplication.
  chosen_spanish_reading: Se conserva la repetición ‘y los despojaron’ al final del verso.
  alternative_spanish_readings:
  - suprimir la repetición final por estilo
  - reformular la segunda ocurrencia como ‘y los arrasaron’
  rationale: La duplicación está atestiguada en el griego y fue retenida por la POB inglesa. En español también debe preservarse para no ocultar una posible énfasis textual ni una duplicación de transmisión.
  doctrine_reference: Transmisión textual; principio de transparencia del texto base
- issue: λόγος como ‘matter/report/news’
  english_pob_reading: the matter became known
  chosen_spanish_reading: la noticia llegó a ellos
  alternative_spanish_readings:
  - el asunto llegó a ellos
  - el reporte llegó a ellos
  - la palabra llegó a ellos
  rationale: No se debe traducir λόγος mecánicamente como ‘palabra’ aquí, porque el contexto es un aviso o información conocida por los destinatarios. ‘Noticia’ expresa bien el contenido comunicado sin oscurecer la referencia del griego.
  doctrine_reference: Semántica léxica; fidelidad contextual al sentido de λόγος
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente cambió ‘report’ por ‘matter’ para un valor más neutral de λόγος, pero mantuvo la repetición final de ‘and plundered them’ por fidelidad al griego. La versión española sigue esa misma orientación: usa una solución contextual para λόγος y conserva la duplicación final sin atenuarla.'
  spanish_consistency_notes:
  - Se mantuvo un tono bíblico claro y contemporáneo, evitando arcaísmos innecesarios.
  - ‘General’ se conserva para στρατηγός por coherencia con el audit trail inglés y el contexto militar.
  - Se eligió ‘despojaron’ para ἐπρονόμευσαν a fin de mantener la fuerza semántica sin introducir un registro excesivamente coloquial.
  - La segunda ocurrencia de ἐπρονόμευσαν se tradujo de manera idéntica para reflejar la repetición del original.
  - No se introdujeron términos eclesiásticos tradicionales que no estén sustentados por el griego.
