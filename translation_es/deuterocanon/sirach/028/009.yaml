translation:
  language: es
  text: Porque el hombre iracundo enciende la disputa[a], y el hombre pecador perturba a los amigos, y entre los que hacen la paz arroja calumnia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘de temperamento rápido’. θυμώδης describe a quien se caracteriza por la ira o por un genio pronto.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, ‘arroja calumnia’ entre los que hacen la paz; la imagen es la de introducir habla difamatoria en medio de una reconciliación.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄνθρωπος γὰρ θυμώδης
  english_pob_choice: For an angry man
  chosen_spanish: Porque el hombre airado
  alternatives_spanish:
  - Porque el hombre enojado
  - Porque el hombre de genio fuerte
  - Porque el hombre iracundo
  lexicon: LSJ
  rationale: Se conserva el sustantivo genérico 'el hombre' para reflejar la formulación proverbial masculina del griego. 'Airado' comunica el estado de ira sin volverlo demasiado psicológico; mantiene la naturalidad del español y el valor adjetival de θυμώδης.
- source_word: ἐκκαύσει μάχην
  english_pob_choice: kindles strife
  chosen_spanish: enciende la disputa
  alternatives_spanish:
  - prende la contienda
  - aviva la riña
  - enciende la riña
  lexicon: LSJ
  rationale: La imagen de ἐκκαύσει es claramente de fuego/encendido. 'Enciende' conserva ese valor metafórico. 'Disputa' es una opción algo más amplia y publicable en español para μάχη en contexto sapiencial, sin reducirlo a una pelea física.
- source_word: ἀνὴρ ἁμαρτωλός
  english_pob_choice: a sinful man
  chosen_spanish: el hombre pecador
  alternatives_spanish:
  - el hombre siniestro
  - el pecador
  - el hombre malvado
  lexicon: LSJ
  rationale: '''Pecador'' reproduce el adjetivo sustantivable ἁμαρτωλός como descripción de carácter, en paralelo con ''hombre airado''. Se evita ''el pecador'' por sonar más a etiqueta religiosa cerrada que a rasgo descriptivo en el proverbio.'
- source_word: ταράξει φίλους
  english_pob_choice: stirs up friends
  chosen_spanish: perturba a los amigos
  alternatives_spanish:
  - alborota a los amigos
  - inquieta a los amigos
  - desordena a los amigos
  lexicon: LSJ
  rationale: El griego puede implicar trastornar o agitar. 'Perturba' es fiel al campo semántico y no fuerza una lectura de amigos enfrentados más allá de lo que el texto dice. Se mantiene 'a los amigos' siguiendo el orden y la relación directa del original.
- source_word: ἀνὰ μέσον εἰρηνευόντων
  english_pob_choice: among those making peace
  chosen_spanish: entre los que hacen la paz
  alternatives_spanish:
  - entre los pacificadores
  - entre los que reconcilian
  - en medio de los que buscan la paz
  lexicon: LSJ
  rationale: '''Los que hacen la paz'' conserva el participio activo εἰρηνευόντων y evita cerrar el sentido solo a una función institucional. ''Entre'' expresa bien la inserción intrusiva del hablante en un grupo de reconciliación.'
- source_word: ἐκβάλλει διαβολήν
  english_pob_choice: casts slander
  chosen_spanish: arroja calumnia
  alternatives_spanish:
  - lanza calumnia
  - siembra calumnia
  - arroja difamación
  lexicon: LSJ
  rationale: '''Arroja'' mantiene la imagen literal de ἐκβάλλει, y ''calumnia'' comunica διαβολή como speech-act dañino. Se prefirió ''arroja'' sobre ''siembra'' para no desplazar el verbo griego de expulsar/arrojar por una metáfora distinta.'
theological_decisions:
- issue: Lenguaje masculino representativo en un proverbio sapiencial
  english_pob_reading: Retain 'man' in both cola
  chosen_spanish_reading: Mantener 'el hombre' en ambos miembros
  alternative_spanish_readings:
  - la persona
  - uno
  - alguien
  rationale: El griego emplea ἄνθρωπος y ἀνήρ en paralelo proverbial. Traducir con 'el hombre' preserva la forma representativa masculina del texto fuente y su cadencia sapiencial, sin impedir la lectura universal del dicho.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: La relación entre 'amigos' y el daño causado
  english_pob_reading: stirs up friends
  chosen_spanish_reading: perturba a los amigos
  alternative_spanish_readings:
  - separa a los amigos
  - alborota a los amigos
  - enfrenta a los amigos
  rationale: La traducción evita explicitar una separación que el griego no dice de manera directa. 'Perturba' conserva la amplitud de ταράσσω y deja abierta la tensión social implícita del proverbio.
  doctrine_reference: Lexical audit for ταράσσω / φίλους
translation_notes:
  revision_awareness: 'Se revisó el pasaje frente al texto griego de Swete (1909) y el audit trail inglés. No hubo revisiones textuales aplicadas; la versión española sigue la lectura estable del original y conserva las dos imágenes principales: fuego para μάχη y arrojar para διαβολή.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' en lugar de SEÑOR cuando no aplica aquí, y no se introdujo terminología divina ajena al versículo.
  - '''Pecador'' se usó como adjetivo sustantivable para conservar el paralelismo con ''airado''.'
  - Se prefirió 'disputa' y 'calumnia' por claridad pública en español, sin perder el tono sapiencial del griego.
  - La puntuación reproduce el encadenamiento coordinado del original con tres miembros paralelos.
