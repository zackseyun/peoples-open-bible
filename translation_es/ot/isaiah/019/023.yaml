base_translation:
  language: en
  yaml_path: translation/ot/isaiah/019/023.yaml
  text: In that day there will be a highway from Egypt to Assyria[a], and Assyria will come into Egypt, and Egypt into Assyria[b]; and Egypt will serve with Assyria.
  footnotes:
  - marker: a
    text: Or, more literally, 'and Egypt will serve Assyria.' The Hebrew syntax can be read this way, though the broader context favors the sense that Egypt joins Assyria in worship/service of God.
    reason: alternative_reading
  - marker: b
    text: 'Hebrew is elliptical in the second half of the line: ''and Egypt into Assyria,'' that is, ''and Egypt will come into Assyria.'''
    reason: lexical_alternative
