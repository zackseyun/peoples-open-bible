revisions:
- from: Entonces el sacerdote mojará su dedo en la sangre y rociará parte de la sangre siete veces delante de Yahvé[a], en frente del velo[b].
  to: Entonces el sacerdote mojará su dedo en la sangre y rociará parte de la sangre siete veces delante de Yahvé[a], delante de la cortina[b].
  rationale: Se ajustó la expresión espacial a un español más natural («delante de») y se alineó la lectura principal de פָּרֹכֶת con la decisión documentada del POB inglés («curtain»), usando «cortina» en el texto principal y preservando «velo» como alternativa en nota.
