translation:
  language: es
  text: Y Josafat, hijo de Asa, llegó a ser rey sobre Judá en el cuarto año de Ahab, rey de Israel.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וִ/יהֽוֹשָׁפָט
  english_pob_choice: And Jehoshaphat
  chosen_spanish: Y Josafat
  alternatives_spanish:
  - Ahora Josafat
  - Josafat
  lexicon: HALOT
  rationale: La conjunción ו enlaza este versículo con el contexto anterior; por eso se conserva con «Y». El nombre propio se translitera como «Josafat», forma natural y reconocible en español bíblico sin forzar una traducción.
- source_word: בֶּן אָסָא
  english_pob_choice: son of Asa
  chosen_spanish: hijo de Asa
  alternatives_spanish:
  - el hijo de Asa
  lexicon: HALOT
  rationale: La relación de parentesco se expresa de manera directa y natural en español con «hijo de». Mantiene la identificación genealógica sin expansión interpretativa.
- source_word: מָלַךְ
  english_pob_choice: became king
  chosen_spanish: comenzó a reinar
  alternatives_spanish:
  - llegó a ser rey
  - reinó
  lexicon: HALOT
  rationale: El verbo qal perfecto señala aquí la entrada al oficio real. «Comenzó a reinar» preserva el valor ingresivo mejor que «reinó», que podría sonar más durativo.
- source_word: עַל יְהוּדָה
  english_pob_choice: over Judah
  chosen_spanish: sobre Judá
  alternatives_spanish:
  - en Judá
  lexicon: HALOT
  rationale: La preposición עַל con מלך indica dominio o autoridad sobre un territorio/pueblo. «Sobre Judá» reproduce bien esa fuerza regia en español.
- source_word: בִּ/שְׁנַת אַרְבַּע
  english_pob_choice: in the fourth year
  chosen_spanish: en el cuarto año
  alternatives_spanish:
  - en año cuatro
  - en el cuarto año de su reinado
  lexicon: HALOT
  rationale: 'La fórmula de datación regnal se expresa con el ordinal normal en español: «en el cuarto año». No se añade «regnal» porque el contexto ya lo establece.'
- source_word: לְ/אַחְאָב
  english_pob_choice: of Ahab
  chosen_spanish: de Ahab
  alternatives_spanish:
  - del reinado de Ahab
  lexicon: HALOT
  rationale: La preposición ל en esta fórmula de datación remite al año de reinado de Ahab. En español, «de Ahab» comunica de forma natural esa referencia cronológica sin sobredetallar.
- source_word: מֶ֥לֶךְ יִשְׂרָאֵֽל
  english_pob_choice: king of Israel
  chosen_spanish: rey de Israel
  alternatives_spanish:
  - el rey de Israel
  lexicon: HALOT
  rationale: El título apposicional identifica a Ahab. Se traduce de manera directa y sobria como «rey de Israel», que en español suena idiomático y fiel al hebreo.
translation_notes:
  revision_awareness: El texto fuente y el control auditado en inglés muestran una traducción estable y sin notas previas; por tanto, no se introducen variantes textuales ni aclaraciones doctrinales adicionales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se usa «Josafat» como transliteración estable del nombre propio, y «Ahab» se conserva como nombre histórico ampliamente reconocido en español bíblico.
  - La formulación «comenzó a reinar» conserva el matiz ingresivo de מלך y evita una lectura meramente durativa.
