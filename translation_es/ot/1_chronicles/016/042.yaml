  yaml_path: translation/ot/1_chronicles/016/042.yaml
  text: And with them were Heman and Jeduthun with trumpets and cymbals for sounding aloud[a], and instruments for the songs of God; and the sons of Jeduthun were at the gate.
  footnotes:
