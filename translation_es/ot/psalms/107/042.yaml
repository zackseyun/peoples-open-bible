review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo: mantiene el valor gnómico de los imperfectos, traduce יְשָׁרִים como grupo ético y conserva la personificación de עַוְלָה como sujeto abstracto que cierra su boca. Sin embargo, la nota al pie no refleja fielmente la alternativa documentada en inglés (''all unrighteousness shuts her mouth''), sino que cambia a ''cierra la boca'', perdiendo el posesivo/personificación explícita.'
  spanish_quality_summary: El español es claro y natural. 'Los rectos' y 'se alegran' son legibles, aunque 'los íntegros' o 'los rectos' ambos sirven; no hace falta cambiarlo. La única reparación necesaria es la nota al pie, que hoy está mal formulada y con comillas/puntuación poco naturales.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Injusticia' refleja bien עַוְלָה. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc.
  issues:
  - severity: medium
    issue: La nota al pie no preserva la alternativa auditada en inglés.
    rationale: La nota inglesa contrasta 'its mouth' con la alternativa 'her mouth' para señalar el femenino singular personificado. La nota española propuesta ('toda injusticia cierra la boca') elimina el posesivo y no comunica adecuadamente la diferencia relevante.
  - severity: low
    issue: Redacción poco natural de la nota al pie.
    rationale: 'La apertura con comilla y ''O:'' está mal formada (''O: «...''). Conviene normalizarla a ''O «... »'' y explicar de manera más directa el femenino singular/personificación.'
  revised_spanish_text: Los rectos ven y se alegran[a], y toda injusticia cierra su boca.
  revised_footnotes:
  - marker: a
    text: O «toda injusticia cierra su boca». El hebreo usa un sustantivo femenino singular («injusticia» o «maldad») con sufijo femenino, personificando el mal como silenciado.
    reason: lexical_alternative
  revision_rationale: Se mantiene intacto el texto principal porque es fiel y natural. Solo se corrige la nota para que preserve la alternativa/personificación documentada por el POB inglés y su explicación gramatical.
