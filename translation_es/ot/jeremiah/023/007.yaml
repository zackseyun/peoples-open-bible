review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el hebreo y el rastro POB en la mayoría de los puntos: לָכֵן = «Por tanto», הִנֵּה = «he aquí», «declara Yahvé», el nombre divino «Yahvé», «los hijos de Israel» y «de la tierra de Egipto» están bien conservados. Sin embargo, hay dos desajustes importantes: el marcador [a] está anclado a «Por tanto» pero la nota habla de «los días se acercan», y la fórmula de juramento חַי יְהוָה se vierte mejor como «Vive Yahvé» sin signos de exclamación para reflejar una fórmula citada, no una interjección emotiva.'
  spanish_quality_summary: El español es claro y de registro bíblico digno. «Vienen días» y «declara Yahvé» funcionan bien. «Ya no dirán más» suena algo redundante; «ya no dirán» es más limpio, aunque no imprescindible. La puntuación de la cita mejora si se evita la exclamación dentro de la fórmula de juramento.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יְהוָה → «Yahvé» correctamente; בְּנֵי יִשְׂרָאֵל → «los hijos de Israel» preserva la política de género-precisión; no hay conflictos léxicos mayores. La única falla de documentación es la nota al pie [a], que no corresponde al segmento marcado ni al precedente inglés.'
  issues:
  - severity: high
    issue: La nota [a] está mal anclada y no corresponde al texto marcado.
    rationale: El marcador aparece en «Por tanto[a]», pero la nota ofrece una alternativa para «vienen días» («los días se acercan»). Esto rompe la trazabilidad exigida entre texto y nota, y además el inglés POB no tenía esa nota como alternativa a «Therefore».
  - severity: medium
    issue: La fórmula «¡Vive Yahvé!» usa exclamación innecesaria.
    rationale: חַי יְהוָה es una fórmula fija de juramento citada dentro del discurso. En español bíblico es más fiel y sobrio «Vive Yahvé» o «Como vive Yahvé» que una exclamación enfática.
  - severity: low
    issue: «ya no dirán más» es algo redundante en español.
    rationale: Aunque transmite bien וְלֹא יֹאמְרוּ עוֹד, «ya no dirán» expresa la cesación con mayor naturalidad y sin pérdida de sentido.
  revised_spanish_text: 'Por tanto, he aquí, vienen días, declara Yahvé, en que ya no dirán: «Vive Yahvé, que hizo subir a los hijos de Israel[a] de la tierra de Egipto»'
  revised_footnotes:
  - marker: a
    text: O, de manera más idiomática, «los israelitas».
    reason: lexical_alternative
  revision_rationale: Se elimina la nota [a] defectuosa porque no corresponde al segmento marcado ni al precedente auditado; se conserva únicamente la nota válida sobre «los hijos de Israel». También se ajusta la fórmula de juramento a «Vive Yahvé» sin exclamación y se simplifica «ya no dirán más» a «ya no dirán» para mayor naturalidad sin alterar el sentido.
