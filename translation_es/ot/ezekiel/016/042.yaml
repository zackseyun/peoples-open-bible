base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/016/042.yaml
  text: So I will satisfy my wrath against you[a], and my jealousy will turn away from you[b]; then I will be quiet and no longer be angry.
  footnotes:
  - marker: a
    text: Or 'my zeal will depart from you.' The Hebrew קִנְאָה can mean either 'jealousy' or 'zeal'; 'jealousy' fits the marital-covenant imagery of this chapter best.
    reason: lexical_alternative
  - marker: b
    text: Literally 'I will cause my wrath to rest in you.' The translation 'I will satisfy my wrath against you' expresses the sense that the wrath is spent or settled.
    reason: lexical_alternative
