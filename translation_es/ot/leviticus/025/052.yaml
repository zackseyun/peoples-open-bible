revisions:
- from: Pero si quedan pocos años hasta el Año del Jubileo[a], entonces hará cuentas con él; conforme a sus años, devolverá el monto de su rescate.
  to: Pero si quedan pocos años hasta el Año del Jubileo[a], entonces hará cuentas con él; conforme a sus años, devolverá el monto de su redención.
  rationale: Se mantiene la estructura y fluidez del borrador, pero se reemplaza 'rescate' por 'redención' para reflejar mejor גְּאֻלָּה en el contexto jurídico-pactal de Levítico 25 y para alinearse mejor con la rationale lexical del English POB. La nota al pie se ajusta en consecuencia.
