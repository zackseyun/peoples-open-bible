revisions:
- from: Y los que queden[a] oirán y temerán, y no volverán a hacer[b] cosa mala[c] como esta en medio de ti[d].
  to: Y los que queden[a] oirán y temerán, y no volverán a hacer una cosa mala como esta[b] en medio de ti[c].
  rationale: Se simplifica el aparato de notas para alinearlo con el audit trail inglés y se mejora la naturalidad de la frase comparativa sin perder fidelidad al hebreo. Se conserva el singular corporativo «ti» por la decisión teológica/documental ya establecida.
