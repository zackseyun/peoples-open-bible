translation:
  language: es
  text: 'Y dirás al bosque del Négueb[a]: «Oye la palabra de Yahvé. Así dice el Señor Yahvé: He aquí, estoy encendiendo en ti un fuego, y consumirá en ti todo árbol verde y todo árbol seco. La llama abrasadora[b] no se apagará, y por ella será abrasado todo rostro, desde el sur hasta el norte».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bosque de la tierra del sur». El hebreo נֶגֶב puede significar «sur» o «tierra del sur», o referirse más específicamente a la región del Négueb.
    reason: lexical_alternative
  - marker: b
    text: Lit. «la llama de llama»; la duplicación hebrea intensifica la imagen.
    reason: source_note
lexical_decisions:
- source_word: לְיַעַר הַנֶּגֶב
  english_pob_choice: the forest of the Negev
  chosen_spanish: el bosque del Négueb
  alternatives_spanish:
  - el bosque del sur
  - el bosque de la tierra del sur
  lexicon: HALOT
  rationale: יַעַר es «bosque» o «arboleda». הַנֶּגֶב puede referirse al Négueb como región o, más ampliamente, al sur/surland. En español, «Négueb» conserva mejor el valor geográfico concreto que «sur», y «bosque» mantiene la imagen literal del texto.
- source_word: שְׁמַע דְּבַר יְהוָה
  english_pob_choice: Hear the word of Yahweh
  chosen_spanish: Oye la palabra de Yahvé
  alternatives_spanish:
  - Escucha la palabra de Yahvé
  - Oye la palabra del Señor
  lexicon: HALOT
  rationale: El imperativo profético pide una fórmula breve y solemne. «Oye» conserva la fuerza del hebreo שְׁמַע y evita un tono demasiado interpretativo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Yahveh
  lexicon: HALOT
  rationale: El tetragrámaton se rinde por el nombre divino, no por una sustitución titular. «Yahvé» es la forma establecida en este proyecto para preservar el nombre personal de Dios.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Soberano Yahvé
  lexicon: HALOT
  rationale: La expresión combina el título אֲדֹנָי con el nombre divino. En español, «el Señor Yahvé» conserva ambos elementos sin recurrir a mayúsculas tipográficas inglesas.
- source_word: הִנְנִי
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - Mira, yo
  lexicon: HALOT
  rationale: La partícula introductoria solemne se refleja bien con «He aquí», una fórmula profética natural en español que preserva el carácter de anuncio divino.
- source_word: מַצִּית
  english_pob_choice: I am kindling
  chosen_spanish: estoy encendiendo
  alternatives_spanish:
  - estoy prendiendo
  - estoy prendiendo fuego
  lexicon: HALOT
  rationale: El causativo expresa iniciar el fuego. «Encendiendo» comunica con claridad la acción progresiva y suena natural en español.
- source_word: אֵשׁ
  english_pob_choice: a fire
  chosen_spanish: un fuego
  alternatives_spanish:
  - fuego
  lexicon: HALOT
  rationale: El sustantivo es concreto y debe mantenerse como imagen material de juicio.
- source_word: וְאָכְלָה
  english_pob_choice: and it will consume
  chosen_spanish: y consumirá
  alternatives_spanish:
  - y devorará
  - y comerá
  lexicon: HALOT
  rationale: El verbo expresa el efecto del fuego sobre todo lo que encuentra. «Consumirá» preserva el sentido destructivo sin sonar coloquial.
- source_word: כָל עֵץ לַח וְכָל עֵץ יָבֵשׁ
  english_pob_choice: every green tree and every dry tree
  chosen_spanish: todo árbol verde y todo árbol seco
  alternatives_spanish:
  - todo árbol fresco y todo árbol seco
  - todo árbol húmedo y todo árbol seco
  lexicon: HALOT
  rationale: לַח refiere a lo fresco/húmedo; en castellano bíblico actual «verde» expresa mejor la oposición con «seco» y conserva la imagen natural de árboles como combustible.
- source_word: לֹא תִכְבֶּה
  english_pob_choice: will not be quenched
  chosen_spanish: no se apagará
  alternatives_spanish:
  - no será apagada
  - no se extinguirá
  lexicon: HALOT
  rationale: Aunque «apagar» es más natural que «apagar/quenching» en español, mantiene correctamente la imagen de fuego que no termina.
- source_word: לַהֶבֶת שַׁלְהֶבֶת
  english_pob_choice: the blazing flame
  chosen_spanish: la llama ardiente
  alternatives_spanish:
  - la llama flamígera
  - la llama abrasadora
  lexicon: HALOT
  rationale: La duplicación intensifica la imagen. «Llama ardiente» conserva el énfasis sin sobrecargar el verso con un giro demasiado artificioso.
- source_word: וְנִצְרְבוּ בָהּ
  english_pob_choice: and by it ... will be scorched
  chosen_spanish: y por ella serán quemados
  alternatives_spanish:
  - y por ella serán abrasados
  - y por ella serán chamuscados
  lexicon: HALOT
  rationale: El verbo describe daño por calor intenso. «Serán quemados» es claro y suficientemente directo; «por ella» conserva la referencia al fuego/llama.
- source_word: כָל פָּנִים
  english_pob_choice: every face
  chosen_spanish: todos los rostros
  alternatives_spanish:
  - cada rostro
  - todas las caras
  lexicon: HALOT
  rationale: «Rostros» reproduce la imagen corporal del hebreo y sugiere la exposición de toda persona al juicio.
- source_word: מִנֶּגֶב צָפוֹנָה
  english_pob_choice: from south to north
  chosen_spanish: desde el sur hasta el norte
  alternatives_spanish:
  - del Négueb al norte
  - desde el mediodía hasta el norte
  lexicon: HALOT
  rationale: La expresión marca una extensión geográfica total. «Desde el sur hasta el norte» comunica con naturalidad el alcance completo del juicio.
theological_decisions:
- issue: Rendition of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahveh
  rationale: El texto hebreo usa el Tetragrámaton y el proyecto pide no enmascararlo. «Yahvé» preserva el nombre personal de Dios y sigue la convención establecida para esta traducción.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Preserving the prophetic fire metaphor
  english_pob_reading: Retain the concrete fire/forest imagery in the main text
  chosen_spanish_reading: Mantener la imagen concreta de fuego y bosque
  alternative_spanish_readings:
  - explicar que se trata de Judá dentro del texto
  - traducir de forma más interpretativa
  rationale: La metáfora pertenece al versículo y su interpretación corresponde al contexto inmediato. La traducción debe conservar la imagen, no resolverla anticipadamente.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy; preserve what the text says without importing doctrinal claims'
translation_notes:
  revision_awareness: Se siguió el estado de revisión más reciente, que no introdujo cambios. La versión española mantiene el acuerdo alto del análisis previo y conserva la metáfora profética, el nombre divino y la imagen corporal del texto hebreo.
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente para יְהוָה.
  - Se distinguió «el Señor Yahvé» para אֲדֹנָי יְהוִה sin sustituirlo por una forma litúrgica opaca.
  - Se mantuvo el contraste «verde / seco» para לַח / יָבֵשׁ.
  - Se preservó la imagen de juicio por fuego sin reinterpretar el bosque dentro del texto principal.
  - Las notas al pie se limitaron a alternativas lexicales y a la intensificación hebrea de la expresión de la llama.
