translation:
  language: es
  text: 'Cuando yo diga[a]: «Mi cama me consolará[b]; mi lecho soportará mi queja»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Porque yo dije» o «Si yo dijera». El hebreo כִּי admite más de una lectura aquí; «Cuando yo diga» sigue de cerca la lectura contextual que mejor encaja con el movimiento hacia el versículo siguiente.
    reason: lexical_alternative
  - marker: b
    text: O «mi meditación» o «mi reflexión» para «mi queja». El hebreo שִׂיחַ puede referirse tanto a meditar como a expresar queja o lamento; en el contexto de Job, «queja» parece la opción más probable.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Porque
  - Si
  lexicon: HALOT
  rationale: Aquí כִּי introduce la circunstancia temporal o el contenido de lo dicho, no una causalidad fuerte. «Cuando» reproduce mejor la fluidez del contexto y el avance hacia el verso siguiente.
- source_word: אָמַרְתִּי
  english_pob_choice: I say
  chosen_spanish: yo diga
  alternatives_spanish:
  - yo dije
  - digo
  lexicon: HALOT
  rationale: Aunque la forma hebrea es perfecta, el valor en contexto puede funcionar como habla interior o situación hipotética inmediata. En español, «yo diga» conserva ese tono enmarcado por la cita y armoniza con la lectura contextual de כִּי.
- source_word: תְּנַחֲמֵנִי
  english_pob_choice: will comfort me
  chosen_spanish: me consolará
  alternatives_spanish:
  - me confortará
  - me aliviará
  lexicon: HALOT
  rationale: El Piel de נחם expresa consolar/comfortar. «Consolará» es la equivalencia natural y digna en español, sin perder la esperanza de alivio corporal y emocional.
- source_word: עַרְשִׂי
  english_pob_choice: my bed
  chosen_spanish: mi cama
  alternatives_spanish:
  - mi lecho
  - mi cama de reposo
  lexicon: HALOT
  rationale: עֶרֶשׂ puede ser cama o lecho. «Mi cama» es claro y natural en español; se mantiene la imagen concreta del lugar de descanso.
- source_word: יִשָּׂא
  english_pob_choice: will bear
  chosen_spanish: soportará
  alternatives_spanish:
  - llevará
  - cargará con
  - sostendrá
  lexicon: HALOT
  rationale: נשא en este contexto metafórico expresa cargar con o sostener una carga verbal/emocional. «Soportará» conserva la idea de llevar el peso de la queja sin sonar demasiado literal o mecánico.
- source_word: בְשִׂיחִי
  english_pob_choice: my complaint
  chosen_spanish: mi queja
  alternatives_spanish:
  - mi meditación
  - mi reflexión
  - mi lamento
  lexicon: HALOT
  rationale: שִׂיחַ puede significar meditación, murmullo o queja/lamento. En el contexto de Job, «mi queja» recoge mejor el tono de dolor expresado, sin borrar la ambigüedad reflexiva del término.
- source_word: מִשְׁכָּבִי
  english_pob_choice: my couch
  chosen_spanish: mi lecho
  alternatives_spanish:
  - mi cama
  - mi descanso
  lexicon: HALOT
  rationale: מִשְׁכָּב suele referir al lugar donde uno se acuesta o duerme. «Mi lecho» preserva la paralela poética con «mi cama» y suena más solemne en español bíblico.
translation_notes:
  revision_awareness: 'Se siguió el auditorio en inglés: se mantuvo la lectura contextual de כִּי como temporal/circunstancial y de שִׂיחַ como queja en el marco del sufrimiento de Job. No hubo revisiones posteriores que alteraran el sentido base.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» y otras sustituciones no requeridas; este versículo no contiene el tetragrámaton.
  - Se preservó el paralelismo poético con dos sustantivos de descanso («cama» / «lecho») y dos verbos de soporte/consuelo.
  - El tono es bíblico contemporáneo, sin arcaísmos innecesarios ni calcos rígidos del inglés.
