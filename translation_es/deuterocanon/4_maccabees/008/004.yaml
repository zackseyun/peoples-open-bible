translation:
  language: es
  text: 'Cuando el tirano los vio rodeando a su madre en el centro, como en un coro[a], quedó impresionado por ellos[b] y, asombrado por su buena presencia y noble linaje, les sonrió; y, haciéndolos acercarse, dijo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como en una danza/coro», conservando la imagen de un grupo coordinado alrededor de su madre.
    reason: lexical_alternative
  - marker: b
    text: La expresión también podría entenderse en un sentido más suave como «se fijó en ellos» o «tomó nota de ellos», pero la mención inmediata de su asombro favorece una reacción más fuerte.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ τύραννος
  english_pob_choice: the tyrant
  chosen_spanish: el tirano
  alternatives_spanish:
  - el rey
  - el gobernante
  lexicon: LSJ
  rationale: τύραννος aquí es un título evaluativo y peyorativo para el perseguidor, no una designación neutral de realeza. 'Tirano' preserva esa carga moral en español.
- source_word: καθάπερ ἐν χορῷ
  english_pob_choice: as if in a chorus
  chosen_spanish: como en un coro
  alternatives_spanish:
  - como en una danza
  - como en un círculo
  lexicon: LSJ
  rationale: χορός puede evocar un coro o un círculo danzante. 'Como en un coro' mantiene la imagen coordinada y simétrica sin reducirla solo a 'danza'.
- source_word: περιέχοντας μέσην τὴν μητέρα
  english_pob_choice: surrounding their mother in the middle
  chosen_spanish: rodeando a su madre en el centro
  alternatives_spanish:
  - circundando a su madre en medio
  - teniendo a su madre en medio
  lexicon: BDAG
  rationale: La construcción expresa a los hermanos alrededor de la madre, con μέσην indicando su posición central. 'En el centro' suena natural en español y conserva la imagen espacial.
- source_word: ᾔσθετο ἐπʼ αὐτοῖς
  english_pob_choice: he was impressed by them
  chosen_spanish: se impresionó por ellos
  alternatives_spanish:
  - quedó impresionado por ellos
  - se dio cuenta de ellos
  lexicon: LSJ
  rationale: El giro puede significar notar o sentir un efecto fuerte. Dado el contexto inmediato de asombro, 'se impresionó por ellos' refleja mejor la fuerza del impacto sin forzar una interpretación excesiva.
- source_word: τῆς εὐπρεπείας
  english_pob_choice: their good bearing
  chosen_spanish: su buena presencia
  alternatives_spanish:
  - su buen porte
  - su dignidad
  lexicon: LSJ
  rationale: εὐπρέπεια abarca apariencia y porte conveniente. 'Buena presencia' comunica ambas dimensiones de manera natural y digna en español.
- source_word: τῆς εὐγενίας
  english_pob_choice: noble birth
  chosen_spanish: noble linaje
  alternatives_spanish:
  - noble nacimiento
  - nobleza de nacimiento
  lexicon: LSJ
  rationale: εὐγένεια suele referirse a nobleza de sangre o ascendencia. 'Noble linaje' es claro, elegante y fiel al sentido genealógico.
- source_word: ἐκπλαγεὶς
  english_pob_choice: astonished
  chosen_spanish: asombrado
  alternatives_spanish:
  - atónito
  - pasmado
  lexicon: BDAG
  rationale: El participio intensifica la reacción del tirano. 'Asombrado' es natural y suficientemente fuerte en español, en paralelo con el verbo anterior.
- source_word: προσεμειδίασεν αὐτοῖς
  english_pob_choice: he smiled at them
  chosen_spanish: les sonrió
  alternatives_spanish:
  - les sonrió con benevolencia
  - sonrió hacia ellos
  lexicon: LSJ
  rationale: El verbo significa sonreír a alguien. 'Les sonrió' es la forma más directa e idiomática en español.
- source_word: πλησίον καλέσας
  english_pob_choice: calling them near
  chosen_spanish: llamándolos cerca
  alternatives_spanish:
  - llamándolos a sí
  - haciéndolos acercarse
  lexicon: BDAG
  rationale: La frase introduce la acción previa al discurso. 'Llamándolos cerca' mantiene concisión y cercanía al griego; 'cerca' evita añadir una idea más fuerte de convocatoria que el texto no exige.
- source_word: ἔφη
  english_pob_choice: he said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  - declaró
  lexicon: BDAG
  rationale: Verbo narrativo estándar; 'dijo' es suficiente, natural y no añade matices no presentes en el griego.
