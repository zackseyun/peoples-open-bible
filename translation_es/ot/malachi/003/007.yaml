translation:
  language: es
  text: 'Desde los días de sus padres se han apartado de mis estatutos y no los han guardado. Vuelvan a mí[a], y yo volveré a ustedes, dice Yahvé de los ejércitos. Pero ustedes dicen: “¿Cómo volveremos?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “sus antepasados”. El hebreo dice literalmente “sus padres”.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמִימֵי
  english_pob_choice: From the days of
  chosen_spanish: Desde los días de
  alternatives_spanish:
  - A partir de los días de
  - Desde la época de
  lexicon: HALOT
  rationale: La expresión marca un punto temporal inicial en el pasado. “Desde los días de” conserva el valor idiomático hebreo sin volverlo rígido ni expandirlo innecesariamente.
- source_word: אֲבֹתֵיכֶם
  english_pob_choice: your fathers
  chosen_spanish: sus padres
  alternatives_spanish:
  - sus antepasados
  - vuestros padres
  lexicon: HALOT
  rationale: El hebreo dice literalmente “sus padres”. En español, el posesivo de segunda persona de plural se expresa naturalmente como “sus” en un registro neutro de reverencia o distancia; “antepasados” sería más dinámico pero perdería la forma literal documentada.
- source_word: סַרְתֶּם
  english_pob_choice: you have turned aside
  chosen_spanish: se han apartado
  alternatives_spanish:
  - han desviado
  - se han desviado
  lexicon: HALOT
  rationale: סור comunica apartarse o desviarse de un camino o norma. “Se han apartado” conserva esa imagen de desviación sin sonar forzado en español.
- source_word: מֵחֻקַּי
  english_pob_choice: from my statutes
  chosen_spanish: de mis estatutos
  alternatives_spanish:
  - de mis decretos
  - de mis ordenanzas
  lexicon: HALOT
  rationale: חֹק / חֻקִּים se refiere a disposiciones prescritas. “Estatutos” mantiene el término legal/covenantal reconocido y fiel al campo semántico.
- source_word: וְלֹא שְׁמַרְתֶּם
  english_pob_choice: and have not kept them
  chosen_spanish: y no los han guardado
  alternatives_spanish:
  - y no los han observado
  - y no los obedecieron
  lexicon: HALOT
  rationale: שׁמר en contexto de pacto implica guardar u observar. “Guardado” reproduce el vínculo entre norma y obediencia y permite retener el pronombre objeto implícito (“los”) referido a los estatutos.
- source_word: שׁוּבוּ אֵלַי
  english_pob_choice: Return to me
  chosen_spanish: Vuélvanse a mí
  alternatives_spanish:
  - Vuélvanse hacia mí
  - Regresen a mí
  lexicon: HALOT
  rationale: שׁוב en profecía suele incluir la noción de retorno con arrepentimiento/restauración. “Vuélvanse a mí” conserva el mandato imperativo y el matiz relacional sin sonar arcaico.
- source_word: וְאָשׁוּבָה אֲלֵיכֶם
  english_pob_choice: and I will return to you
  chosen_spanish: y yo me volveré a ustedes
  alternatives_spanish:
  - y yo volveré a ustedes
  - y yo me regresaré a ustedes
  lexicon: HALOT
  rationale: Conviene reflejar la reciprocidad del mismo verbo hebreo con “volver/se volver”. “Me volveré a ustedes” mantiene la correspondencia retórica con el imperativo anterior.
- source_word: אָמַר יְהוָה צְבָאוֹת
  english_pob_choice: says Yahweh of hosts
  chosen_spanish: dice Yahvé de los ejércitos
  alternatives_spanish:
  - dice Yahvé de las huestes
  - dice Yahvé de los ejércitos celestiales
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para יְהוָה como “Yahvé”. צְבָאוֹת se traduce de modo transparente como “de los ejércitos”, conservando la imagen militar/celestial sin reemplazarla por una paráfrasis interpretativa.
- source_word: בַּמֶּה
  english_pob_choice: How
  chosen_spanish: ¿Cómo
  alternatives_spanish:
  - ¿De qué manera?
  - ¿Por qué medio?
  lexicon: HALOT
  rationale: La pregunta busca manera o medio. “¿Cómo?” es la forma natural en español y reproduce el tono escéptico del diálogo.
- source_word: נָשׁוּב
  english_pob_choice: shall we return
  chosen_spanish: nos volveremos
  alternatives_spanish:
  - volveremos
  - regresaremos
  lexicon: HALOT
  rationale: El imperfecto interrogativo pide una traducción deliberativa o prospectiva. “Nos volveremos” conserva el verbo de retorno y la forma reflexiva que encaja con el hebreo y con el paralelo anterior.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrama directamente. Conforme al criterio de terminología del proyecto, se mantiene el nombre divino en forma audible “Yahvé” en el texto principal, en lugar de ocultarlo con “SEÑOR”.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'Coincide con la última revisión auditada: no hubo cambios necesarios y el nivel de acuerdo del cotejo fue alto. La redacción española mantiene el paralelismo verbal de שׁוּב / אָשׁוּבָה mediante “volver(se)”, y conserva el nombre divino según la pauta del proyecto.'
  spanish_consistency_notes:
  - 'Se preserva el tono profético directo y la secuencia argumentativa del hebreo: acusación, llamado al retorno y réplica del pueblo.'
  - Se mantiene el plural de segunda persona en un registro reverente y comprensible para lectura eclesial.
  - “Estatutos” y “guardar” se usan de forma consistente con el lenguaje de pacto del Antiguo Testamento.
