review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el hebreo y el rastro de auditoría inglés en la mayoría de los puntos: mantiene la inferencia de לָכֵן, la metáfora de דֶּרֶךְ, el plural de ''lugares resbaladizos'', el contexto de oscuridad, el sentido judicial de רָעָה como calamidad y el nombre divino ''Yahvé''. También conserva la nota alternativa para שְׁנַת פְּקֻדָּתָם. Sin embargo, hay dos desajustes importantes: la nota [a] está anclada a ''arrastrados'' cuando en realidad corresponde a ''en el año de su castigo'', y ''caerán en él'' no concuerda con el antecedente femenino בָּהּ / ''oscuridad'' o con la construcción española más natural.'
  spanish_quality_summary: El español es claro y digno, pero requiere una corrección de concordancia y de ubicación de nota. 'Serán arrastrados' es aceptable, aunque 'serán empujados' o 'serán lanzados' también serían posibles; no exige cambio obligatorio. 'Dice Yahvé' es comprensible, pero 'declara Yahvé' se alinea mejor con נְאֻם y con el registro profético solemne.
  glossary_alignment: Cumple con la política del proyecto al usar 'Yahvé' para יְהוָה. 'Calamidad' para רָעָה es fiel al contexto. 'Castigo' para פְּקֻדָּה está bien como elección principal, siempre que la nota alternativa quede anclada al sintagma temporal correspondiente.
  issues:
  - severity: high
    issue: La nota al pie [a] está colocada sobre 'arrastrados' en vez de sobre 'en el año de su castigo'.
    rationale: La nota explica la alternativa de שְׁנַת פְּקֻדָּתָם ('en el año de su visitación'), no una variante de יִדַּחוּ. El anclaje actual induce a error textual y exegético.
  - severity: medium
    issue: '''Caerán en él'' usa pronombre masculino donde el hebreo tiene sufijo femenino בָּהּ y el antecedente español inmediato ''la oscuridad'' es femenino.'
    rationale: Aunque el hebreo puede referirse al ámbito previo de manera algo flexible, en español 'en ella' preserva mejor la concordancia y evita ruido innecesario.
  - severity: low
    issue: '''Dice Yahvé'' es menos preciso que ''declara Yahvé'' para נְאֻם יְהוָה.'
    rationale: No es infiel, pero 'declara' refleja mejor la fórmula profética solemne y se alinea con el audit trail inglés.
  revised_spanish_text: Por tanto, su camino les será como lugares resbaladizos en la oscuridad; serán arrastrados y caerán en ella, porque yo traeré sobre ellos calamidad en el año de su castigo[a], declara Yahvé.
  revised_footnotes:
  - marker: a
    text: O 'en el año de su visitación'. La expresión hebrea puede referirse al tiempo en que Dios los visita para juicio o rendición de cuentas.
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota para que corresponda a שְׁנַת פְּקֻדָּתָם, se ajusta la concordancia pronominal a 'en ella' y se afina la fórmula profética a 'declara Yahvé'. No se requieren cambios doctrinales ni una adjudicación más alta.
