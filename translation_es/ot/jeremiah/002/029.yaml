    issue: 'Mezcla de persona verbal: «contendéis» con «ustedes»'
    rationale: «Contendéis» es segunda persona plural de uso peninsular, mientras que «ustedes» exige «contienden» en español neutro latinoamericano. La mezcla suena poco natural y contradice el estilo meta.
  - severity: medium
    issue: Notas al pie ancladas en orden poco claro
    rationale: En el texto español, [a][b] aparece tras «mí», pero la nota a trata «han transgredido» y la b trata «¿por qué disputan conmigo?». Conviene anclar cada nota en la palabra o frase pertinente para evitar ambigüedad y reflejar mejor las decisiones léxicas.
  - severity: low
