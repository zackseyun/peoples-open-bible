lexical_decisions:
- source_word: διόπερ
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: LSJ
  rationale: La partícula inferencial introduce la conclusión de lo anterior; «Por eso» mantiene el valor causal-consecutivo en un español natural y formal.
- source_word: ἔπεμψεν
  english_pob_choice: he sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: LSJ
  rationale: El aoristo de πέμπω se expresa de manera directa con «envió», que es claro, formal y fiel al acto de enviar.
- source_word: Ποσίδωνιον καὶ Θεόδοτον καὶ Ματταθίαν
  english_pob_choice: Posidonius and Theodotus and Mattathias
  chosen_spanish: Posidonio, Teodoto y Matatías
  alternatives_spanish:
  - Posidónio, Teódoto y Matatías
  lexicon: transliteración tradicional de nombres propios
  rationale: Se conservan los nombres propios con transliteración habitual en español bíblico; se omite la repetición de «y» antes de cada nombre porque en español suena menos natural que en griego.
- source_word: δοῦναι καὶ λαβεῖν
  english_pob_choice: to give and receive
  chosen_spanish: dar y recibir
  alternatives_spanish:
  - entregar y aceptar
  - intercambiar
  lexicon: LSJ
  rationale: La construcción infinitiva se mantiene literal para preservar la imagen concreta del acto recíproco; «dar y recibir» es transparente y no oculta el giro idiomático.
- source_word: δεξιάς
  english_pob_choice: pledges
  chosen_spanish: prendas
  alternatives_spanish:
  - promesas
  - garantías
  - derechas
  lexicon: LSJ
  rationale: Aunque literalmente significa «manos derechas», el contexto indica el gesto convencional de pactar o dar seguridad de buena fe. «Prendas» comunica esa función pactal sin perder el matiz de intercambio ritual; la nota aclara el gesto concreto.
translation_notes:
  revision_awareness: El texto griego habla de enviar a tres hombres «para dar y recibir δεξιάς»; el audit trail inglés pasó de «right hands» a «pledges» para expresar la idiomaticidad. La versión española conserva la concreción del gesto mediante «prendas» y la explica en nota, evitando tanto la literalidad opaca como una paráfrasis excesiva.
  spanish_consistency_notes:
  - Se mantiene el nombre divino ausente en este versículo; no aplica la convención Yahvé.
  - «Matatías» sigue la forma española usual del nombre propio.
  - La coordinación española evita calcar la polisíndeton griega cuando no aporta claridad.
  - La nota a conserva la tensión entre el sentido literal de δεξιάς y su valor idiomático de pacto.
