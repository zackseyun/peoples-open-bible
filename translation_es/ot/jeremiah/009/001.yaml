revisions:
- from: ¡Oh[a], si tuviera en el desierto un lugar de hospedaje de viajeros, para poder dejar a mi pueblo e irme lejos de ellos! Porque todos ellos son adúlteros[b], una asamblea[c] de traidores.
  to: ¡Oh[a], si tuviera un lugar de hospedaje para viajeros[d] en el desierto, para poder dejar a mi pueblo e irme de ellos! Porque todos ellos son adúlteros[b], una asamblea[c] de traidores.
  rationale: 'Se hicieron ajustes menores para mejorar la naturalidad del español y la fidelidad precisa al hebreo y al rastro del POB: se cambió «de viajeros» por «para viajeros», se eliminó «lejos» por añadir énfasis no explícito, y se añadió la nota de redacción alternativa documentada en el audit trail inglés.'
