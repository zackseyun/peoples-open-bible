base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/020/019.yaml
  text: Then the Levites[a], from the sons of the Kohathites and from the sons of the Korahites, stood up to praise Yahweh, the God of Israel, with a very loud voice.
  footnotes:
