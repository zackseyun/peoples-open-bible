translation:
  language: es
  text: 'Entonces yo fui a la casa de Semaías hijo de Delaías, hijo de Mehetabel, quien estaba confinado, y dijo: «Reunámonos en la casa de Dios, dentro del templo[a], y cerremos las puertas del templo, porque vienen para matarte; sí, de noche vienen para matarte».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dentro del santuario». El hebreo heikhal puede referirse específicamente al edificio del templo o al santuario, no solo a los atrios del templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  english_pob_choice: Then I
  chosen_spanish: Entonces yo
  alternatives_spanish:
  - Y yo
  - Ahora bien, yo
  lexicon: HALOT
  rationale: La partícula narrativa con pronombre marca continuidad y énfasis leve en el sujeto. «Entonces yo» conserva la secuencia narrativa en español sin forzar un calco.
- source_word: בָאתִי
  english_pob_choice: went
  chosen_spanish: fui
  alternatives_spanish:
  - vine
  - entré
  lexicon: HALOT
  rationale: Desde la perspectiva narrativa de Nehemías, «fui» expresa bien el desplazamiento hacia la casa sin sobreespecificar el modo del movimiento.
- source_word: בֵּית
  english_pob_choice: the house of
  chosen_spanish: la casa de
  alternatives_spanish:
  - el hogar de
  lexicon: HALOT
  rationale: La construcción en español más natural para el hebreo constructo con un nombre propio es «la casa de», manteniendo el valor relacional del hebreo.
- source_word: שְׁמַעְיָה ... דְּלָיָה ... מְהֵיטַבְאֵל
  english_pob_choice: Shemaiah son of Delaiah, son of Mehetabel
  chosen_spanish: Semaías hijo de Delaías, hijo de Mehetabel
  alternatives_spanish:
  - Shemaya hijo de Delaya, hijo de Mehetabel
  lexicon: Transliteración estándar del proyecto
  rationale: Se transliteran los nombres propios de forma consistente y legible en español, conservando la genealogía explícita del hebreo.
- source_word: וְהוּא עָצוּר
  english_pob_choice: who was confined
  chosen_spanish: quien estaba confinado
  alternatives_spanish:
  - quien estaba encerrado
  - quien estaba restringido
  lexicon: HALOT
  rationale: '«Confinado» preserva la ambigüedad del hebreo: puede sugerir reclusión, restricción o aislamiento, sin decidir indebidamente la causa.'
- source_word: נִוָּעֵד
  english_pob_choice: Let us meet
  chosen_spanish: Reunámonos
  alternatives_spanish:
  - Acordemos vernos
  - Juntémonos
  lexicon: HALOT
  rationale: El valor exhortativo/cohortativo se expresa de manera natural en español con «Reunámonos», que mantiene la invitación al encuentro.
- source_word: בֵּית הָאֱלֹהִים
  english_pob_choice: the house of God
  chosen_spanish: la casa de Dios
  alternatives_spanish:
  - la casa de Yahvé
  - la casa de Dios
  lexicon: HALOT
  rationale: La expresión fija se traduce de manera directa. Aquí el hebreo dice אֱלֹהִים, por lo que corresponde «Dios» en el texto principal.
- source_word: אֶל תּוֹךְ הַהֵיכָל
  english_pob_choice: inside the temple
  chosen_spanish: dentro del templo
  alternatives_spanish:
  - dentro del santuario
  - en el interior del templo
  lexicon: HALOT
  rationale: «Dentro del templo» comunica bien la idea de acceso al espacio sagrado. La formulación conserva la tensión interpretativa entre templo como edificio y santuario como espacio restringido.
- source_word: וְנִסְגְּרָה דַּלְתוֹת הַהֵיכָל
  english_pob_choice: and let us shut the doors of the temple
  chosen_spanish: y cerremos las puertas del templo
  alternatives_spanish:
  - y cerremos las puertas del santuario
  - y cerremos las puertas del templo
  lexicon: HALOT
  rationale: El hebreo mantiene el mismo impulso cohortativo. «Cerremos» expresa la acción propuesta, y «puertas» es la traducción natural de דַּלְתוֹת.
- source_word: כִּי בָּאִים לְהָרְגֶךָ
  english_pob_choice: for they are coming to kill you
  chosen_spanish: porque vienen para matarte
  alternatives_spanish:
  - porque están viniendo a matarte
  - porque vienen a matarte
  lexicon: HALOT
  rationale: La forma participial plural expresa inminencia y acción en curso. «Vienen para matarte» conserva la urgencia sin añadir temporalidad más fuerte que la del hebreo.
- source_word: וְלַיְלָה
  english_pob_choice: yes, at night
  chosen_spanish: sí, de noche
  alternatives_spanish:
  - y de noche
  - sí, por la noche
  lexicon: HALOT
  rationale: La conjunción con valor enfático se rinde con «sí» para conservar la intensificación retórica observada en la traducción inglesa auditable. «De noche» refleja el sentido temporal sin implicar necesariamente «esta misma noche».
- source_word: בָּאִים לְהָרְגֶךָ
  english_pob_choice: they are coming to kill you
  chosen_spanish: vienen para matarte
  alternatives_spanish:
  - vendrán para matarte
  - vienen a matarte
  lexicon: HALOT
  rationale: La repetición del verbo se mantiene en español para reproducir la insistencia amenazante del hebreo.
theological_decisions:
- issue: Sentido de הֵיכָל en un contexto de espacio sagrado restringido
  english_pob_reading: temple, with a note that Hebrew heikhal can also mean sanctuary
  chosen_spanish_reading: templo, con nota que admite «santuario»
  alternative_spanish_readings:
  - santuario
  - santuario interior
  rationale: El texto hebreo puede referirse al edificio del templo o al espacio sagrado más restringido. Se prefiere «templo» en el cuerpo por claridad, pero se preserva la alternativa «santuario» en nota para no resolver la tensión semántica.
  doctrine_reference: Conservar la tensión lexical sin eliminar la posibilidad cultual; equivalencia óptima
- issue: Designación divina en בֵּית הָאֱלֹהִים
  english_pob_reading: house of God
  chosen_spanish_reading: casa de Dios
  alternative_spanish_readings:
  - casa de Yahvé
  rationale: En este versículo la forma hebrea usa אֱלֹהִים, no el Tetragrámaton. Por eso el texto principal mantiene «Dios»; no se introduce «Yahvé» sin base en el hebreo inmediato.
  doctrine_reference: Fidelidad al lexema divino del pasaje
- issue: Valor de עָצוּר
  english_pob_reading: confined
  chosen_spanish_reading: confinado
  alternative_spanish_readings:
  - encerrado
  - recluido
  - restringido
  rationale: 'El participio permite varias lecturas: detenido, recluido o apartado. «Confinado» preserva esa ambigüedad y evita precisar una situación no explicitada por el hebreo.'
  doctrine_reference: Preservar ambigüedad lexical relevante
translation_notes:
  revision_awareness: La versión en inglés auditada permanece sin cambios en la última revisión; se mantuvo la misma decisión de equivalencia óptima y la nota léxica sobre הֵיכָל. No se detectaron revisiones aplicadas que obligaran a ajustar el español.
  spanish_consistency_notes:
  - Se mantiene «casa de Dios» para בֵּית הָאֱלֹהִים y «templo» para הֵיכָל, distinguiendo la fórmula general del espacio sagrado específico.
  - Se conserva la repetición de «vienen para matarte» para reflejar la urgencia retórica del hebreo.
  - Se usa transliteración uniforme de nombres propios y patronímicos, sin adaptar a formas eclesiásticas tradicionales.
