translation:
  language: es
  text: 'Por tanto, así dice Yahvé: He aquí[a], voy a castigar a Semaías el Nehelamita y a su descendencia. No tendrá un hombre que habite[b] entre este pueblo, ni verá el bien que yo hago por mi pueblo, declara Yahvé, porque habló en rebelión[c] contra Yahvé.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Posiblemente 'Semaías el soñador'; el epíteto הַנֶּחֱלָמִי puede estar relacionado con soñar, pero su fuerza exacta aquí es incierta, por lo que el texto principal conserva la designación propia.
    reason: lexical_alternative
  - marker: b
    text: O 'permanezca'; el hebreo literalmente dice 'un hombre que habite', conservando la idea de continuidad estable entre el pueblo.
    reason: lexical_alternative
  - marker: c
    text: O 'apostasía' o 'revuelta' contra Yahvé.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Marca con claridad la conclusión inferida del oráculo anterior, con un español natural y solemne.
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: thus says the LORD
  chosen_spanish: así dice Yahvé
  alternatives_spanish:
  - esto dice Yahvé
  - así ha dicho Yahvé
  lexicon: HALOT
  rationale: Conserva la fórmula profética directa y el nombre divino en su forma POB 'Yahvé', conforme al criterio del proyecto.
- source_word: הִנְנִי פֹקֵד עַל
  english_pob_choice: Behold, I am about to punish
  chosen_spanish: He aquí, voy a castigar
  alternatives_spanish:
  - Mira, voy a castigar
  - He aquí, estoy para castigar
  lexicon: HALOT
  rationale: פָקַד sobre en contexto judicial expresa intervención punitiva o de cuenta; 'voy a castigar' comunica bien la acción judicial inminente sin perder la fuerza de הִנְנִי.
- source_word: שְׁמַעְיָה
  english_pob_choice: Shemaiah
  chosen_spanish: Semaías
  alternatives_spanish:
  - Shemaías
  - Shemayá
  lexicon: HALOT
  rationale: Se translitera al español bíblico estándar como nombre propio reconocible y publicable.
- source_word: הַנֶּחֱלָמִי
  english_pob_choice: the Nehelamite
  chosen_spanish: el Nehelamita
  alternatives_spanish:
  - el soñador
  - el de Nehelam
  lexicon: HALOT
  rationale: El texto inglés conserva el epíteto como designación propia; en español, 'Nehelamita' mantiene esa misma cautela. La posible relación con 'soñar' queda abierta sin imponerse en el cuerpo.
- source_word: וְעַל זַרְעוֹ
  english_pob_choice: and his offspring
  chosen_spanish: y a su descendencia
  alternatives_spanish:
  - y a sus hijos
  - y a su linaje
  lexicon: HALOT
  rationale: זֶרַע aquí es posteridad colectiva; 'descendencia' es natural en español y conserva el sentido familiar-genealógico.
- source_word: לֹא יִהְיֶה לוֹ אִישׁ יוֹשֵׁב
  english_pob_choice: He will not have a man dwelling
  chosen_spanish: No tendrá un hombre que habite
  alternatives_spanish:
  - No tendrá quien habite
  - No le quedará un hombre habitante
  lexicon: HALOT
  rationale: La construcción hebrea conserva un singular masculino que señala la extinción de representante masculino/linaje sobreviviente; se refleja con 'un hombre que habite' para no suavizar el valor formal del texto.
- source_word: בְּתוֹךְ הָעָם הַזֶּה
  english_pob_choice: among this people
  chosen_spanish: entre este pueblo
  alternatives_spanish:
  - en medio de este pueblo
  - dentro de este pueblo
  lexicon: HALOT
  rationale: Reproduce la inclusión social dentro de la comunidad con un giro fluido en español.
- source_word: וְלֹא יִרְאֶה בַטּוֹב
  english_pob_choice: nor will he see the good
  chosen_spanish: ni verá el bien
  alternatives_spanish:
  - ni verá el bien prosperar
  - ni disfrutará del bien
  lexicon: HALOT
  rationale: Mantiene la imagen hebrea de 'ver el bien' sin sobreinterpretarla, aunque en español puede implicar experimentar el bienestar.
- source_word: אֲשֶׁר אֲנִי עֹשֶׂה לְעַמִּי
  english_pob_choice: that I am doing for my people
  chosen_spanish: que yo hago por mi pueblo
  alternatives_spanish:
  - que estoy haciendo por mi pueblo
  - que yo haré por mi pueblo
  lexicon: HALOT
  rationale: El participio puede expresar acción presente o inminente; 'hago' funciona bien en español profético y conserva la cercanía verbal del hebreo.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - oráculo de Yahvé
  - dice Yahvé
  lexicon: HALOT
  rationale: Fórmula profética de cierre, adaptada a la terminología POB en español.
- source_word: כִּי סָרָה דִבֶּר עַל יְהוָה
  english_pob_choice: because he has spoken rebellion against Yahweh
  chosen_spanish: porque habló rebelión contra Yahvé
  alternatives_spanish:
  - porque habló apostasía contra Yahvé
  - porque habló rebelde contra Yahvé
  lexicon: HALOT
  rationale: '''סָרָה'' conserva el campo de rebeldía/apostasía; ''rebelión'' es una equivalencia clara y sobria. La construcción mantiene la preposición ''contra'' para reproducir el valor adversativo del hebreo.'
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: El texto hebreo usa el Tetragrámaton directamente. Siguiendo el estándar del proyecto en español, se preserva como 'Yahvé' para no ocultar el nombre del pacto y mantener coherencia con el texto fuente.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de סָרָה en la cláusula final
  english_pob_reading: spoken rebellion / apostasy / revolt
  chosen_spanish_reading: habló rebelión
  alternative_spanish_readings:
  - habló apostasía
  - habló rebelión o apostasía
  rationale: La frase hebrea permite un campo semántico de rebelión, desvío o apostasía. 'Rebelión' conserva la tensión sin precisar indebidamente si se trata de acto, mensaje o actitud.
  doctrine_reference: Jeremiah usage of covenantal defection language
translation_notes:
  revision_awareness: 'Se siguió el alto nivel de concordancia del control comparativo: no se introdujeron cambios sustanciales respecto al sentido del hebreo ni a las decisiones auditadas en inglés; se ajustó la redacción para fluidez natural en español y se mantuvo la cautela sobre הַנֶּחֱלָמִי y סָרָה.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente para יְהוָה.
  - Se conserva la fórmula profética 'declara Yahvé' sin sustituirla por 'el SEÑOR' o 'el Señor'.
  - '''Descendencia'' se usa para זַרְעוֹ en sentido colectivo, no como plural distributivo.'
  - Se retiene la tensión lexicológica de הַנֶּחֱלָמִי mediante nota, sin decidir en el cuerpo por 'soñador'.
  - La frase 'ver el bien' permanece literal para preservar la imagen hebrea y la posibilidad de experiencia, no solo percepción visual.
