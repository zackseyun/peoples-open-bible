  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ πάλιν· Αἰνεῖτε, ⸂πάντα τὰ ἔθνη, τὸν κύριον⸃, καὶ ⸀ἐπαινεσάτωσαν αὐτὸν πάντες οἱ λαοί.
base_translation:
  language: en
  yaml_path: translation/nt/romans/015/011.yaml
  text: 'And again: "Praise the Lord, all the nations, and let all the peoples praise him."'
translation:
  language: ko
  text: '또 이렇게 말씀하십니다. 「모든 이방인들아, 주를 찬양하라. 모든 민족들아, 그를 찬송하라.」'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Αἰνεῖτε
  english_pob_choice: Praise
  chosen_korean: 찬양하다
  lexicon: BDAG
  rationale: 시편 117:1 인용.
- source_word: πάντα τὰ ἔθνη
  english_pob_choice: all the nations
  chosen_korean: 모든 이방인들
  alternatives_korean:
  - 모든 열방
  - 모든 민족들
  lexicon: BDAG
  rationale: 15:9-10의 「이방인들」과 일관 보존. 인용에서도 같은 어휘 유지.
- source_word: τὸν κύριον
  english_pob_choice: the Lord
  chosen_korean: 주
  lexicon: BDAG
  rationale: 시편 인용에서 κύριος. 정책에 따라 「주」.
- source_word: ἐπαινεσάτωσαν
  english_pob_choice: let ... praise
  chosen_korean: 찬송하라
  alternatives_korean:
  - 찬미하라
  lexicon: BDAG
  rationale: 3인칭 명령형. Αἰνεῖτε(찬양)와 어휘 변주.
- source_word: πάντες οἱ λαοί
  english_pob_choice: all the peoples
  chosen_korean: 모든 민족들
  alternatives_korean:
  - 모든 백성들
  lexicon: BDAG
  rationale: λαός는 본래 「백성」이나, 시편 평행 인용에서 「민족들」이 자연스럽다.
