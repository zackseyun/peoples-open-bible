base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/025/012.yaml
  text: And when seventy years are completed[a], I will punish the king of Babylon and that nation—oracle of Yahweh—for their iniquity, and the land of the Chaldeans[b], and I will make it an everlasting desolation.
  footnotes:
