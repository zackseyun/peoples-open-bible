review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del hebreo: נֶפֶשׁ como «una persona», מִנְחָה como ofrenda de cereal, סֹלֶת como harina fina/flor de harina, y la secuencia ritual de echar aceite y añadir לבנה. También preserva correctamente Yahvé para יהוה. Sin embargo, «incienso» para לְבֹנָה es demasiado general; el término específico es «franquincienso» (o menos preferiblemente «olíbano»), y el inglés auditado preserva esa especificidad con frankincense.'
  spanish_quality_summary: El español es claro y digno. «Flor de harina» es aceptable y bíblicamente natural. No obstante, la nota [a] introduce «ofrenda vegetal», que en español puede ampliar indebidamente el referente más allá de cereal/grano. Además, la coordinación con punto y coma antes de «y derramará» es algo pesada; puede suavizarse sin perder formalidad.
  glossary_alignment: 'Alineación general buena con la terminología del proyecto: «Yahvé» correcto; «ofrenda» para קָרְבַּן correcto; «ofrenda de cereal» adecuado para מִנְחָה. La desviación principal es לְבֹנָה, que debe conservarse con mayor precisión como «franquincienso», no el genérico «incienso».'
  issues:
  - severity: medium
    issue: «incienso» no traduce con suficiente precisión לְבֹנָה
    rationale: לְבֹנָה designa específicamente frankincense. «Incienso» en español puede referirse a sustancias aromáticas en general, perdiendo la precisión cultual del término fuente y del English POB.
  - severity: low
    issue: La nota [a] ofrece «ofrenda vegetal» como alternativa
    rationale: Aunque a veces se usa en tradición bíblica, en español contemporáneo puede sonar más amplia o menos precisa que el enfoque cereal/grano documentado en la auditoría inglesa.
  - severity: low
    issue: Puntuación algo rígida con punto y coma antes de la segunda cláusula
    rationale: Una coma fluye mejor en español moderno y mantiene el tono normativo del texto sin afectar fidelidad.
  revised_spanish_text: Cuando una persona presente una ofrenda de cereal[a] a Yahvé, su ofrenda será de flor de harina[b], y derramará sobre ella aceite y pondrá sobre ella franquincienso.
