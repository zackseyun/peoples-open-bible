revisions:
- from: Deja a tus hijos sin padre[a]; yo les daré vida. Y tus viudas confiarán en mí.
  to: Deja a tus hijos sin padre[a]; yo los mantendré con vida. Y que tus viudas confíen en mí.
  rationale: Se ajusta אֲחַיֶּה a «los mantendré con vida» para conservar el matiz de preservación vital del piʿel, en línea con el inglés auditado «will keep them alive». Se cambia la segunda cláusula a «Y que tus viudas confíen en mí» para reflejar mejor el valor yusivo/exhortativo de תִּבְטָחוּ. Se simplifica la nota para preservar la alternativa léxica documentada sin sobrecargarla, manteniendo el anclaje exacto en el texto.
