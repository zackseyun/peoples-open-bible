translation:
  language: es
  text: Y no hay quien invoque tu nombre, quien se despierte para aferrarse a ti; porque has escondido tu rostro de nosotros y nos has entregado[a] en mano de nuestra iniquidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, ‘y nos has derretido en mano de nuestra iniquidad’. El verbo hebreo lleva la imagen de disolverse o consumirse.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵין
  english_pob_choice: And there is no one
  chosen_spanish: Y no hay quien
  alternatives_spanish:
  - y no existe quien
  - y no hay nadie que
  lexicon: HALOT
  rationale: La negación existencial hebrea se mantiene con naturalidad en español. ‘No hay quien’ conserva el valor absoluto de ausencia sin sonar forzado.
- source_word: קוֹרֵא בְּשִׁמְךָ
  english_pob_choice: who calls on your name
  chosen_spanish: quien invoque tu nombre
  alternatives_spanish:
  - quien llame tu nombre
  - quien te invoque
  lexicon: HALOT
  rationale: En lenguaje bíblico, ‘invocar tu nombre’ comunica mejor el uso cultual y orante del hebreo que una simple traducción literal de ‘llamar’. Se mantiene la imagen del nombre como medio de invocación.
- source_word: מִתְעוֹרֵר
  english_pob_choice: who stirs himself up
  chosen_spanish: quien se despierte
  alternatives_spanish:
  - quien se despierte a sí mismo
  - quien se espabile
  lexicon: HALOT
  rationale: 'El hitpael expresa iniciativa reflexiva: no solo ‘estar despierto’, sino ponerse en movimiento interiormente. ‘Despertarse’ conserva bien ese impulso, aunque el matiz de autoexhortación queda reforzado por el contexto.'
- source_word: לְהַחֲזִיק בָּךְ
  english_pob_choice: to take hold of you
  chosen_spanish: para aferrarse a ti
  alternatives_spanish:
  - para asirse de ti
  - para tomarte firmemente
  lexicon: HALOT
  rationale: חזק con ב comunica sujetar con fuerza, aferrarse, mantenerse firme. ‘Aferrarse a ti’ preserva la fuerza de la imagen y su tono de dependencia insistente.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: La cláusula introduce la razón causal inmediata. ‘Porque’ es la forma más clara y natural en español para este vínculo explicativo.
- source_word: הִסְתַּרְתָּ פָנֶיךָ
  english_pob_choice: you have hidden your face
  chosen_spanish: has escondido tu rostro
  alternatives_spanish:
  - has ocultado tu rostro
  - has apartado tu rostro
  lexicon: HALOT
  rationale: Se conserva la imagen del ‘rostro’ como hebraísmo teológico. ‘Escondido’ reproduce bien el valor de retirarse/velar el favor divino sin perder inteligibilidad.
- source_word: מִמֶּנּוּ
  english_pob_choice: from us
  chosen_spanish: de nosotros
  alternatives_spanish:
  - alejado de nosotros
  - apartado de nosotros
  lexicon: HALOT
  rationale: El sufijo de primera plural se expresa directamente. ‘De nosotros’ mantiene la relación de separación sin añadir una paráfrasis interpretativa.
- source_word: וַתְּמוּגֵנוּ
  english_pob_choice: have given us over
  chosen_spanish: nos has entregado
  alternatives_spanish:
  - nos has hecho desfallecer
  - nos has derretido
  lexicon: HALOT
  rationale: El inglés POB opta por una equivalencia contextual, pero el hebreo conserva una imagen de disolución. En español, ‘nos has entregado’ sigue la línea de abandono judicial del contexto y deja espacio para la nota sobre el sentido más literal de ‘derretir’ o ‘desvanecer’.
- source_word: בְּיַד
  english_pob_choice: into the hand of
  chosen_spanish: en manos de
  alternatives_spanish:
  - en la mano de
  - bajo el poder de
  lexicon: HALOT
  rationale: La expresión idiomática se naturaliza con ‘en manos de’, que mantiene la imagen de control o dominio sin sonar arcaica.
- source_word: עֲוֺנֵנוּ
  english_pob_choice: our iniquity
  chosen_spanish: nuestra iniquidad
  alternatives_spanish:
  - nuestro pecado
  - nuestra culpa
  lexicon: HALOT
  rationale: ‘Iniquidad’ preserva la carga moral fuerte del término y coincide con la elección del inglés POB. Aunque ‘culpa’ o ‘pecado’ son posibles, suavizan o desplazan el peso del hebreo.
theological_decisions:
- issue: Relación entre el ocultamiento del rostro divino y la entrega al poder del pecado
  english_pob_reading: God is described as giving the people over into the power of their own iniquity, without specifying a deterministic metaphysical mechanism.
  chosen_spanish_reading: Dios los ha entregado en manos de su propia iniquidad, sin precisar el mecanismo metafísico de esa acción judicial.
  alternative_spanish_readings:
  - Dios los hizo desfallecer por sus pecados
  - Dios los abandonó a las consecuencias de su culpa
  rationale: La cláusula final se conserva como acto de juicio y abandono bajo el pecado, pero sin resolver la tensión entre agencia divina y responsabilidad humana. La redacción española sigue el sentido contextual del hebreo y del POB inglés, evitando explicaciones doctrinales no exigidas por el texto.
  doctrine_reference: Preservar la tensión teológica sin resolverla de modo sistemático.
translation_notes:
  revision_awareness: 'Se siguió el pasaje hebreo con apoyo del auditor inglés: se mantuvo la estructura retórica de ausencia, búsqueda de Dios, ocultamiento del rostro y la clausura final de entrega/consunción. No hubo revisiones aplicadas en el pase más reciente; el acuerdo de auditoría fue alto y solo señalaba un matiz menor en la última cláusula.'
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ solo cuando el texto fuente lo exige; aquí no aparece el tetragrámaton, por lo que se conservó el lenguaje del pasaje sin introducirlo.
  - Se mantuvo la imagen de ‘rostro’ y ‘manos’ por su valor bíblico y teológico.
  - ‘Iniquidad’ se conservó de forma consistente para עון, en línea con el POB inglés.
  - La nota al pie marca la alternativa más literal de ‘derretir/consumir’, manteniendo visible la tensión léxica del hebreo.
