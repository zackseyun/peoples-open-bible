translation:
  language: es
  text: Hay quien se enriquece por su cuidado y su mezquindad,[a] y esta es la parte de su recompensa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La línea hebrea del Cairo Geniza provista para esta zona contiene un dicho distinto: «La sabiduría y el entendimiento y el discernir un asunto son de Yahvé; el pecado y los caminos rectos son de Yahvé». Como no coincide con la redacción griega de Sirácida 11:18, el texto principal aquí sigue el paralelo griego.'
    reason: variante_textual
lexical_decisions:
- source_word: ἔστιν πλουτῶν
  english_pob_choice: There is one who grows rich
  chosen_spanish: Hay quien se enriquece
  alternatives_spanish:
  - Hay uno que se hace rico
  - Hay quien llega a ser rico
  lexicon: BDAG
  rationale: ἔστιν πλουτῶν presenta una observación general sobre una persona que llega a la riqueza; en español, 'Hay quien se enriquece' conserva el valor proverbial y evita forzar una referencia singular concreta.
- source_word: ἀπὸ προσοχῆς
  english_pob_choice: by care
  chosen_spanish: por su atención
  alternatives_spanish:
  - por su cuidado
  - por su diligencia
  - por su observación
  lexicon: BDAG
  rationale: προσοχή puede expresar atención, cuidado o cautela. 'Atención' conserva el matiz de vigilancia/cuidado sin añadir una valoración demasiado positiva o demasiado técnica; el posesivo 'su' hace natural la relación causal en español.
- source_word: καὶ σφιγγίας αὐτοῦ
  english_pob_choice: and stinginess
  chosen_spanish: y su mezquindad
  alternatives_spanish:
  - y su tacañería
  - y su avaricia
  - y su miseria
  lexicon: LSJ
  rationale: σφιγγία connota apretamiento, parsimonia o tacañería. 'Mezquindad' comunica bien el tono negativo y moral de la sentencia en español contemporáneo, sin sonar tan coloquial como 'tacañería'.
- source_word: καὶ αὕτη ἡ μερὶς
  english_pob_choice: and this is the share
  chosen_spanish: y esta es la parte
  alternatives_spanish:
  - y esta es la porción
  - y este es el lote
  lexicon: BDAG
  rationale: μερὶς significa porción, parte o cuota asignada. 'Parte' es la opción más natural y mantiene la imagen de lo que le corresponde como resultado.
- source_word: τοῦ μισθοῦ αὐτοῦ
  english_pob_choice: of his reward
  chosen_spanish: de su recompensa
  alternatives_spanish:
  - de su salario
  - de su paga
  - de su retribución
  lexicon: BDAG
  rationale: μισθός puede significar salario/paga, pero aquí el contexto sapiencial apunta a retribución o recompensa. 'Recompensa' preserva el sentido del resultado obtenido sin introducir una escena laboral literal.
theological_decisions:
- issue: Base textual de la frase en esta unidad
  english_pob_reading: The English POB follows the Greek parallel for Sirach 11:18 and documents the divergent Hebrew line in a footnote.
  chosen_spanish_reading: Seguir el sentido del griego para esta unidad, sin incorporar la línea hebrea divergente como texto principal.
  alternative_spanish_readings:
  - 'Traducir la línea hebrea como un dicho distinto: ''La sabiduría y el entendimiento y el discernir un asunto son de Yahvé; el pecado y los caminos rectos son de Yahvé.'''
  rationale: El griego ofrece una sentencia coherente sobre riqueza, atención y mezquindad, mientras que el hebreo suministrado refleja otra formulación. Para no mezclar dos dichos distintos en una sola línea, el texto español sigue el griego y deja constancia de la divergencia textual en la nota.
  doctrine_reference: 'PHILOSOPHY.md: traducir a partir del testimonio original más pertinente y preservar honestamente la incertidumbre textual.'
translation_notes:
  revision_awareness: El borrador anterior fue corregido para evitar la nota sin anclaje y para alinear el texto español con el paralelo griego de Sirach 11:18, manteniendo una formulación idiomática y sobria en español.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' porque el texto base de esta unidad no contiene el tetragrámaton en el griego paralelo citado; la unidad se traduce desde el griego sapiencial sobre riqueza.
  - '''Recompensa'' se usa como equivalente general de μισθός en este contexto, no como salario laboral estricto.'
  - El tono general mantiene una sentencia proverbial breve y clara, adecuada para lectura bíblica pública.
