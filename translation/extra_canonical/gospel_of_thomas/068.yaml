translation:
  text: Jesus said, “Blessed are you when they hate you and persecute you; and they
    will find no place in the place where they persecuted you.”
  philosophy: formal
  drafter_model: gemini-3.1-pro-preview
  drafter_label: gemini_3_1_pro_thomas_redraft
  drafted_at: '2026-04-22T10:57:09Z'
  footnotes:
  - marker: they hate you
    text: 'The Coptic uses the third-person plural for all the verbs in this sequence
      (hate, persecute, find, persecuted). Because this is the standard Coptic idiom
      for the passive voice, the saying is often translated: ''Blessed are you when
      you are hated and persecuted; and no place will be found in the place where
      you were persecuted.'' Translating it actively, however, preserves the sharp
      contrast between the persecutors'' actions and their failure to find a ''place''.'
    reason: textual_variant
  - marker: no place in the place
    text: 'The Coptic uses two different words for ''place'' here: the Greek loanword
      ⲧⲟⲡⲟⲥ (topos, often carrying theological weight in Thomas as a place of spiritual
      rest or standing) and the native Coptic word ⲙⲁ (ma, a physical location or
      spot). The persecutors will find no spiritual standing in the physical location
      of their persecution.'
    reason: lexical_alternative
  - marker: persecuted you
    text: Unlike the Synoptic parallels (Matthew 5:11, Luke 6:22), Thomas lacks a
      Christological motivation for the persecution (e.g., 'because of me' or 'on
      account of the Son of Man').
    reason: cross_reference
lexical_decisions:
- source_word: ⲙⲁⲕⲁⲣⲓⲟⲥ
  chosen: blessed
  rationale: Greek loanword (μακάριος) used for beatitudes.
  lexicon: BDAG
- source_word: ⲙⲉⲥⲧⲉ-
  chosen: hate
  rationale: Standard Coptic verb for 'to hate'.
  lexicon: Crum
  entry: 186a
- source_word: ⲇⲓⲱⲕⲉ
  chosen: persecute
  rationale: Greek loanword (διώκω) meaning to pursue or persecute.
  lexicon: BDAG
- source_word: ϩⲉ ⲉ-
  chosen: find
  rationale: The verb ϩⲉ with the preposition ⲉ- means 'to fall upon' or 'to find'.
  lexicon: Crum
  entry: 657a
- source_word: ⲧⲟⲡⲟⲥ
  chosen: place
  rationale: Greek loanword (τόπος). In Thomas, it frequently carries theological
    weight as a spiritual dwelling or standing.
  lexicon: BDAG
- source_word: ⲙⲁ
  chosen: place
  rationale: Native Coptic word for a physical location or spot.
  lexicon: Crum
  entry: 152a
theological_decisions:
- issue: Active vs. passive rendering of the third-person plural
  chosen_reading: Active ('they hate you... they will find no place')
  rationale: 'While the Coptic third-person plural frequently functions as a passive
    (''you are hated... no place will be found''), rendering it actively preserves
    the grammatical subject across the clauses and highlights the irony: those who
    actively persecute will actively fail to find a spiritual ''place''.'
  alternatives_noted:
  - Blessed are you when you are hated and persecuted; and no place will be found
    in the place where you were persecuted.
drafter_notes: The translation preserves the active voice of the Coptic third-person
  plural verbs, which maintains the rhetorical contrast between the persecutors' actions
  and their ultimate lack of a 'place' (ⲧⲟⲡⲟⲥ). The distinction between the Greek
  loanword ⲧⲟⲡⲟⲥ and the Coptic ⲙⲁ is noted, as it likely reflects a deliberate theological
  nuance.
