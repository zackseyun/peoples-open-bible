translation:
  language: es
  text: Mi espíritu está quebrantado[a]; mis días están apagados[b]; los sepulcros me aguardan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mi aliento». El hebreo רוּחַ puede significar «espíritu» o «aliento».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «mis días se han extinguido». El verbo probablemente evoca la imagen de algo que se apaga o se extingue.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רוּחִי
  english_pob_choice: my spirit
  chosen_spanish: mi espíritu
  alternatives_spanish:
  - mi aliento
  - mi breath
  lexicon: HALOT
  rationale: רוּחַ puede significar espíritu, aliento o viento. En este lamento, "mi espíritu" conserva la referencia a la vida interior de Job y coincide con la elección auditada del POB en inglés. "Mi aliento" sigue siendo una alternativa posible y se mantiene como matiz semántico, pero en español "espíritu" comunica mejor el peso existencial del verso.
- source_word: חֻבָּלָה
  english_pob_choice: is broken
  chosen_spanish: está quebrantado
  alternatives_spanish:
  - está roto
  - está arruinado
  - está destruido
  lexicon: HALOT
  rationale: La forma pasiva expresa daño sufrido por el espíritu. "Quebrantado" es natural en español bíblico y conserva la idea de quebradura o ruina sin sonar mecánico. Es la opción más cercana al tono de lamento del texto.
- source_word: יָמַי
  english_pob_choice: my days
  chosen_spanish: mis días
  lexicon: HALOT
  rationale: La posesión plural se conserva de manera directa. En contexto, refiere al resto de la vida de Job o al curso de sus días.
- source_word: נִזְעָכוּ
  english_pob_choice: are extinguished
  chosen_spanish: están apagados
  alternatives_spanish:
  - están extinguidos
  - se han apagado
  - están snuffed out
  lexicon: HALOT
  rationale: El verbo transmite la imagen de algo apagado o extinguido, como una luz. "Están apagados" reproduce bien la metáfora en español y evita una expresión demasiado técnica o poco natural. "Están extinguidos" también sería posible, pero suena más abstracto.
- source_word: קְבָרִים
  english_pob_choice: graves
  chosen_spanish: los sepulcros
  alternatives_spanish:
  - las tumbas
  - las sepulturas
  - las fosas
  lexicon: HALOT
  rationale: El plural hebreo se mantiene. "Sepulcros" es solemne y adecuado al registro del poema; además, preserva la pluralidad más claramente que un singular colectivo.
- source_word: לִי
  english_pob_choice: await me
  chosen_spanish: me aguardan
  alternatives_spanish:
  - están para mí
  - son para mí
  - me esperan
  lexicon: HALOT
  rationale: El hebreo dice literalmente "para mí" o "a mí", pero en el contexto la idea es que las tumbas están delante de Job como destino inminente. "Me aguardan" expresa esa fuerza sin perder la sobriedad del hebreo.
translation_notes:
  revision_awareness: Se siguió el texto hebreo de WLC y el audit trail inglés del POB. No se requirieron cambios de revisión adicionales; la decisión clave fue mantener la metáfora de quebranto/apagamiento y conservar el plural de קְבָרִים en español.
  spanish_consistency_notes:
  - Se usó «espíritu» para רוּחַ conforme al patrón POB, con nota sobre «aliento» por la ambigüedad léxica documentada.
  - Se evitó «SEÑOR» o fórmulas devocionales ajenas; no hay Tetragrámaton en este verso.
  - «Sepulcros» mantiene el plural hebreo y el tono poético; no se colapsó a un singular colectivo.
  - «Me aguardan» traduce el sentido contextual de לִי sin añadir información doctrinal o interpretativa.
