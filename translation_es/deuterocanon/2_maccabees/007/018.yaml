translation:
  language: es
  text: 'Después de él trajeron al sexto, y, cuando estaba a punto de morir, dijo: «No te dejes engañar[a]; porque padecemos estas cosas por causa de nosotros mismos, habiendo pecado contra nuestro propio Dios. Cosas asombrosas han sucedido[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «No te extravíes más», o «No te dejes llevar más lejos». La expresión griega es comprimida, y πλανῶ puede implicar ser engañado, desviado o errar.
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «cosas dignas de asombro han sucedido».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετὰ δὲ τοῦτον ἤγον τὸν ἕκτον
  english_pob_choice: After him they brought the sixth
  chosen_spanish: Después de él trajeron al sexto
  alternatives_spanish:
  - Después de éste llevaron al sexto
  - Después de él iban trayendo al sexto
  lexicon: LSJ
  rationale: Μετὰ δὲ τοῦτον expresa secuencia; en español natural, «Después de él» conserva la referencia al hermano previo sin añadir información. ἤγον está en imperfecto, pero en narrativa española un pretérito simple fluye mejor. «Al sexto» preserva la referencia al sexto hermano sin explicitar más de lo que el griego dice.
- source_word: μέλλον ἀποθνήσκειν
  english_pob_choice: as he was about to die
  chosen_spanish: estando para morir
  alternatives_spanish:
  - cuando estaba a punto de morir
  - a punto de morir
  lexicon: BDAG
  rationale: μέλλω con infinitivo expresa inminencia. «Estando para morir» mantiene esa cercanía temporal con un giro español sobrio y fiel.
- source_word: Μὴ πλανῶ μάλλον
  english_pob_choice: Do not be deceived
  chosen_spanish: No te dejes engañar
  alternatives_spanish:
  - No te engañes más
  - No te extravíes más
  - No seas del todo engañado
  lexicon: LSJ
  rationale: πλανάω puede abarcar ser engañado, extraviarse o ir errando. Dado el contexto de corrección al persecutor, «No te dejes engañar» comunica bien la advertencia. «Más» se omite en el texto principal porque en español su colocación resulta menos natural y la fuerza intensiva ya queda sugerida por el contexto; se conserva la posibilidad en nota.
- source_word: ἡμεῖς γὰρ διʼ ἑαυτοὺς ταῦτα πάσχομεν
  english_pob_choice: for we are suffering these things because of ourselves
  chosen_spanish: porque padecemos estas cosas por causa de nosotros mismos
  alternatives_spanish:
  - porque sufrimos estas cosas por nuestra propia causa
  - porque padecemos estas cosas a causa de nosotros mismos
  lexicon: BDAG
  rationale: διʼ ἑαυτούς indica la causa arraigada en ellos mismos. «Por causa de nosotros mismos» conserva esa causalidad y el matiz de responsabilidad personal sin suavizarlo.
- source_word: ἁμαρτόντες εἰς τὸν ἑαυτῶν θεόν
  english_pob_choice: having sinned against our own God
  chosen_spanish: habiendo pecado contra nuestro propio Dios
  alternatives_spanish:
  - por haber pecado contra nuestro Dios
  - habiendo pecado respecto de nuestro propio Dios
  lexicon: BDAG
  rationale: El participio expresa la razón de su padecimiento. «Pecado contra» es la forma española más clara para εἰς con ἁμαρτάνω en este contexto, y «nuestro propio Dios» conserva ἑαυτῶν sin borrar la relación posesiva.
- source_word: ἄξια θαυμασμοῦ γέγονε
  english_pob_choice: Astonishing things have happened
  chosen_spanish: Cosas asombrosas han sucedido
  alternatives_spanish:
  - Han ocurrido cosas dignas de asombro
  - Han pasado cosas maravillosas
  lexicon: LSJ
  rationale: La frase significa literalmente «cosas dignas de asombro han ocurrido». «Cosas asombrosas han sucedido» mantiene el valor evaluativo y suena natural en español sin introducir una causalidad no explícita.
theological_decisions:
- issue: Causa del sufrimiento y juicio divino
  english_pob_reading: The speaker attributes their suffering to their own sin against God.
  chosen_spanish_reading: El hablante atribuye su sufrimiento a su propio pecado contra Dios.
  alternative_spanish_readings:
  - El hablante presenta el sufrimiento como consecuencia de su propia culpa
  - El hablante lo formula de manera general como padecer por su propia causa
  rationale: El griego enlaza claramente πάσχομεν con ἁμαρτόντες; por eso conviene mantener la responsabilidad moral y la dimensión de juicio sin atenuarlas. La traducción no debe convertirlo en mera circunstancia impersonal.
  doctrine_reference: Mantener la tensión teológica del texto; primacía del original sobre una suavización traductiva.
translation_notes:
  revision_awareness: 'El inglés POB pasó por una revisión que ajustó la primera mitad a una advertencia más natural («Do not be deceived») y eliminó «Therefore» del final por no haber un conector explícito. Esta versión española sigue esa última lectura: evita un equivalente causal añadido y conserva la clausula final como afirmación concisa.'
  spanish_consistency_notes:
  - Se usa «Dios» para θεός, en coherencia con el estándar del proyecto.
  - Se mantiene «pecado contra» para expresar la dirección de ἁμαρτάνω con εἰς.
  - Se evita «Señor» como sustituto automático; aquí el texto habla de «nuestro propio Dios».
  - El adverbio de intensidad de μάλλον se integra en la advertencia general y se documenta como alternativa, para no forzar una construcción poco natural en español.
