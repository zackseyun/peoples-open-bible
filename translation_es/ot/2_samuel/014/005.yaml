translation:
  language: es
  text: 'El rey le dijo: «¿Qué te pasa?[a]» Ella respondió: «En verdad,[b] soy viuda, y mi esposo está muerto[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Qué te sucede?»'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Ay, soy viuda».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «mi esposo ha muerto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה לָּךְ
  english_pob_choice: What is the matter?
  chosen_spanish: ¿Qué te pasa?
  alternatives_spanish:
  - ¿Qué te sucede?
  - ¿Qué te ocurre?
  - ¿Qué tienes?
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y pregunta por la condición o problema de la persona. En español, «¿Qué te pasa?» comunica de manera natural esa inquietud del rey sin volverla demasiado mecánica.
- source_word: הַמֶּלֶךְ
  english_pob_choice: The king
  chosen_spanish: El rey
  alternatives_spanish:
  - El monarca
  lexicon: HALOT
  rationale: Se conserva el sujeto definido de forma directa y natural en español.
- source_word: אֲבָל
  english_pob_choice: Indeed
  chosen_spanish: Sí
  alternatives_spanish:
  - En verdad
  - Ciertamente
  - Pero
  lexicon: HALOT
  rationale: Aquí la partícula introduce una afirmación enfática de la mujer. «Sí» mantiene esa fuerza discursiva en español, aunque de forma breve. No se traduce como «pero», porque el valor principal no es adversativo.
- source_word: אִשָּׁה אַלְמָנָה
  english_pob_choice: a widow
  chosen_spanish: viuda
  alternatives_spanish:
  - mujer viuda
  - una mujer viuda
  lexicon: HALOT
  rationale: El hebreo combina «mujer» + «viuda», pero en español el sustantivo «viuda» expresa el sentido con naturalidad y fidelidad semántica.
- source_word: וַיָּמָת אִישִׁי
  english_pob_choice: my husband is dead
  chosen_spanish: mi marido ha muerto
  alternatives_spanish:
  - mi marido murió
  - mi esposo ha muerto
  - mi hombre ha muerto
  lexicon: HALOT
  rationale: אִישׁ con sufijo posesivo aquí significa «mi esposo / marido». Se elige «marido» por ser claro y común en español bíblico actual. Se usa perfecto compuesto para reflejar el estado resultante de la muerte, mientras que «ha muerto» suena más natural que una fórmula más rígida.
translation_notes:
  revision_awareness: 'La versión inglesa revisada prefirió una formulación más literal para la pregunta y mantuvo el estado resultante con «is dead». Esta versión española sigue esa misma línea: conserva la pregunta idiomática con un equivalente natural y refleja la muerte del marido como un estado presente con «ha muerto», sin añadir explicaciones ajenas al hebreo.'
  spanish_consistency_notes:
  - Se mantiene «rey» para הַמֶּלֶךְ como forma directa y uniforme.
  - «Viuda» se usa como equivalente idiomático de אִשָּׁה אַלְמָנָה, siguiendo el sentido léxico sin calco innecesario.
  - El discurso directo conserva dos enunciados breves y marcados por comillas españolas, con puntuación natural en español.
  - No se introduce «Cristo», «Señor» ni terminología teológica no presente en el versículo.
