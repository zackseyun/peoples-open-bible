  rationale: Se corrigió «Mof» a «Menfis» para reflejar el topónimo históricamente identificado, en línea con la auditoría inglesa y la legibilidad natural en español. También se eliminó «lejos» porque no está en la fuente hebrea y sobreinterpreta el movimiento. Se mantuvo el resto, ya que es fiel y readable.
