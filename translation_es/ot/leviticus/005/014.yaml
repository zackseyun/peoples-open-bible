lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: El verbo de habla en la fórmula narrativa introduce un acto nuevo de comunicación divina. En español, «habló» suena natural y solemne en este contexto; «dijo» también sería posible, pero aquí «habló» conserva mejor la cadencia formal de la introducción al discurso directo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del Tetragrámaton como «Yahvé», siguiendo la decisión doctrinal del proyecto y evitando la sustitución por un título. «Jehová» y «el SEÑOR» quedan descartados por no reflejar esa política de transliteración del nombre.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: La preposición marca el destinatario del habla. En español, «a» es la equivalencia más natural y precisa para introducir el complemento indirecto.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moishe
  lexicon: HALOT
  rationale: Nombre propio estándar en español bíblico; «Moisés» mantiene reconocimiento inmediato y fidelidad a la forma tradicional del nombre.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  lexicon: HALOT
  rationale: La construcción funciona como fórmula introductoria del discurso citado. «Diciendo» preserva el enlace con la cita siguiente y reproduce de manera natural el valor infinitivo de la forma hebrea.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La decisión del POB en inglés es transliterar el nombre divino, no ocultarlo detrás de un título. En español, «Yahvé» es la forma más extendida y digna para esa transliteración en este proyecto, manteniendo la identidad personal del nombre de pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El pasaje concuerda plenamente con la auditoría inglesa y no requiere ajustes textuales adicionales; se mantiene la estructura breve de introducción al discurso, con el nombre divino transliterado según la política del proyecto.
  spanish_consistency_notes:
  - 'Se mantiene la distinción entre nombre divino y título: «Yahvé» en lugar de «SEÑOR».'
  - Se usa «Moisés» como nombre propio convencional en español bíblico.
  - La fórmula final «diciendo» queda abierta para la continuación del discurso en el versículo siguiente.
  - El tono es formal y publicable, sin calcos innecesarios ni ampliaciones interpretativas.
