translation:
  language: es
  text: La contribución que ustedes apartarán para Yahvé tendrá veinticinco mil de largo y diez mil de ancho[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “ofrenda” o “porción apartada”. El término hebreo se refiere a algo levantado o designado como contribución, y aquí denota la franja sagrada separada de la tierra.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַתְּרוּמָה
  english_pob_choice: the contribution
  chosen_spanish: la contribución
  alternatives_spanish:
  - la ofrenda
  - la porción apartada
  lexicon: HALOT
  rationale: תְּרוּמָה nombra algo “levantado” o puesto aparte como contribución. En este contexto de una franja territorial consagrada, “contribución” conserva la idea de porción designada sin reducirla a una ofrenda sacrificial.
- source_word: אֲשֶׁר תָּרִימוּ
  english_pob_choice: that you shall set apart
  chosen_spanish: que ustedes apartarán
  alternatives_spanish:
  - que ustedes ofrecerán
  - que ustedes levantarán
  lexicon: HALOT
  rationale: El verbo hifil de רוּם comunica la acción de separar o dedicar. “Apartarán” es natural en español y mantiene la fuerza de designación del terreno, evitando una lectura demasiado cultual de “ofrecerán” o demasiado literal de “levantarán”.
- source_word: לַיהוָה
  english_pob_choice: for the LORD
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - para el SEÑOR
  - a Yahvé
  lexicon: DOCTRINE.md
  rationale: El nombre divino YHWH se rinde como “Yahvé” según el estándar del proyecto. “Para” expresa aquí dedicación/destino, y se ajusta al sentido de una porción consagrada a Dios.
- source_word: אֹרֶךְ
  english_pob_choice: in length
  chosen_spanish: de largo
  alternatives_spanish:
  - en longitud
  - en cuanto al largo
  lexicon: HALOT
  rationale: El sustantivo introduce la primera dimensión. “De largo” es idiomático en español y conserva la medida dimensional del hebreo.
- source_word: חֲמִשָּׁה וְעֶשְׂרִים אֶלֶף
  english_pob_choice: twenty-five thousand
  chosen_spanish: veinticinco mil
  alternatives_spanish:
  - veinticinco mil unidades
  - veinticinco mil medidas
  lexicon: HALOT
  rationale: La cifra es directa. Como el hebreo no explicita la unidad en este versículo, no se añade ninguna en el texto principal.
- source_word: וְרֹחַב
  english_pob_choice: and ten thousand in width
  chosen_spanish: y de diez mil de ancho
  alternatives_spanish:
  - y diez mil de ancho
  - y en anchura, diez mil
  lexicon: HALOT
  rationale: רֹחַב significa anchura/ancho. “De ancho” paraleliza “de largo” y suena natural en español, manteniendo el patrón dimensional del original.
- source_word: עֲשֶׂרֶת אֲלָפִים
  english_pob_choice: ten thousand
  chosen_spanish: diez mil
  alternatives_spanish:
  - diez mil unidades
  - diez mil medidas
  lexicon: HALOT
  rationale: La cifra se traduce literalmente. Igual que en la primera medida, la unidad queda implícita porque así aparece en hebreo.
theological_decisions:
- issue: Cómo rendir יהוה / YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: El proyecto español establece “Yahvé” como forma principal para el nombre del pacto. Se evita el reemplazo por “SEÑOR” para no ocultar el nombre divino presente en el hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Naturaleza de la acción verbal con רוּם en hifil
  english_pob_reading: set apart
  chosen_spanish_reading: apartarán
  alternative_spanish_readings:
  - ofrecerán
  - levantarán
  rationale: En el contexto de Ezequiel 45–48, la acción no describe principalmente una ofrenda sacrificatoria sino la delimitación de una porción sagrada del territorio. “Apartarán” preserva esa tensión sin forzar un sentido exclusivamente cultual.
  doctrine_reference: 'DOCTRINE.md: Land allotment and sacred portion terminology'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y la línea de decisión auditada en inglés, pero adapta la sintaxis para que el español sea publicable y natural. No se añadieron unidades de medida porque el hebreo las deja implícitas. La nota conserva la alternativa léxica documentada para תְּרוּמָה.
  spanish_consistency_notes:
  - Se mantiene “Yahvé” de forma consistente con la terminología del proyecto.
  - Se usa “apartarán” para reflejar la dedicación/separación del terreno, en armonía con el contexto de Ezequiel 45–48.
  - Las medidas quedan sin unidad explícita, como en el hebreo.
  - El marcador [a] está anclado en “contribución” para reflejar la alternativa léxica documentada.
