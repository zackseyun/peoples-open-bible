review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y la auditoría inglesa en casi todo: «se enojó», «contendió con Labán», «respondió y dijo», y la pareja «transgresión / pecado» preservan el sentido y el paralelismo. También respeta la revisión inglesa al no añadir «ardientemente» a דָלַקְתָּ אַחֲרַי. Sin embargo, la nota al pie actual no presenta una alternativa léxica preservada, sino una explicación editorial de la revisión inglesa, y por eso no cumple bien la función requerida de nota textual útil al lector.'
  spanish_quality_summary: 'El español es claro, natural y digno. Hay un ajuste menor de estilo y utilidad: la nota debería informar la alternativa semántica del verbo hebreo (la imagen de persecución ardiente) en lugar de comentar el proceso de revisión inglesa. El texto principal puede mantenerse igual.'
  glossary_alignment: No hay términos del glosario principal en disputa. «Transgresión», «pecado» y «perseguido» están bien alineados con las decisiones léxicas documentadas. «Labán» y «Jacob» son correctos y la sintaxis es legible en español eclesial neutro.
  issues:
  - severity: medium
    issue: La nota al pie actual comenta la revisión inglesa en vez de ofrecer una alternativa léxica o aclaración útil derivada del hebreo.
    rationale: 'Las notas deben preservar alternativas significativas o aclarar una posible ambigüedad del original para el lector español. La nota presente habla del proceso editorial (''sigue la revisión inglesa'') y no refleja la razón léxica principal documentada: el verbo puede evocar una persecución ardiente o intensa.'
  revised_spanish_text: 'Entonces Jacob se enojó y contendió con Labán. Jacob respondió y dijo a Labán[a]: «¿Cuál es mi transgresión? ¿Cuál es mi pecado, que me has perseguido?»'
  revised_footnotes:
  - marker: a
    text: O «me has perseguido con ardor». El verbo hebreo puede evocar la imagen de una persecución ardiente o intensa.
    reason: lexical_alternative
  revision_rationale: Se conserva intacto el texto principal porque es fiel, claro y natural. Solo se reemplaza la nota por una alternativa léxica centrada en la evidencia hebrea, en lugar de una explicación del historial de revisión en inglés.
