translation:
  language: es
  text: Y vino la palabra de Yahvé[a] a mí, diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Yahvé»; tradicionalmente se vierte «el SEÑOR» en traducciones españolas.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ... came
  chosen_spanish: Y fue
  alternatives_spanish:
  - Y aconteció
  - Y sucedió
  - Y fue que
  lexicon: HALOT
  rationale: La forma narrativa hebrea introduce la secuencia del discurso profético. En español, «Y fue» conserva la apertura formular sin forzar una paráfrasis más explicativa de lo que permite el texto.
- source_word: דְבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - un mensaje
  - la palabra
  lexicon: HALOT
  rationale: En la fórmula profética דְבַר יְהוָה, «la palabra» reproduce el valor técnico y recurrente de la expresión, manteniendo el carácter revelatorio del habla divina.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se preserva el nombre divino como nombre propio en español, siguiendo la directriz del proyecto para יהוה. «Yahvé» mantiene la referencia personal del Tetragrámaton sin sustituirlo por un título.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - para mí
  - hacia mí
  lexicon: HALOT
  rationale: La preposición con sufijo de primera persona expresa dirección hacia el profeta. «A mí» es la forma natural y exacta en español para esta relación.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - al decir
  - y dijo
  lexicon: HALOT
  rationale: «Diciendo» reproduce el marcador discursivo hebreo que introduce el contenido siguiente, sin anticiparlo ni convertirlo en una traducción interpretativa.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton, por lo que en español se conserva el nombre divino como «Yahvé». Esto evita la sustitución por un título y mantiene la lectura confesional y auditables del nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El contexto auditado en inglés no presenta revisiones pendientes; la lectura aprobada mantiene la fórmula profética breve y el nombre divino transliterado. La versión española sigue esa misma decisión, ajustando solo la naturalidad sintáctica del español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente con la política del proyecto para יהוה.
  - La fórmula profética queda breve y sobria, sin añadir contenido inexistente en el hebreo.
  - «Diciendo» conserva la función de enlace al discurso siguiente, útil en un contexto versicular.
