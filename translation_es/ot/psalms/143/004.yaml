translation:
  language: es
  text: Y mi espíritu[a] desfallece dentro de mí; mi corazón está consternado dentro de mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y mi espíritu está abrumado dentro de mí; mi corazón queda desolado dentro de mí».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּתְעַטֵּף
  english_pob_choice: grows faint
  chosen_spanish: desfallece
  alternatives_spanish:
  - se debilita
  - se desvanece
  - queda abrumado
  lexicon: HALOT
  rationale: El hitpael de עטף en contexto de lamento expresa debilitamiento interior, abatimiento o desfallecimiento. «Desfallece» comunica bien ese proceso en español actual sin perder la fuerza poética.
- source_word: עָלַי
  english_pob_choice: within me
  chosen_spanish: dentro de mí
  alternatives_spanish:
  - sobre mí
  - en mí
  lexicon: HALOT
  rationale: Aunque la preposición base es «sobre/contra», en este paralelismo interior el sentido idiomático es de interioridad. «Dentro de mí» conserva la imagen de un estado que recae sobre la persona desde dentro.
- source_word: רוּחִי
  english_pob_choice: my spirit
  chosen_spanish: mi espíritu
  alternatives_spanish:
  - mi aliento
  - mi ser interior
  lexicon: HALOT
  rationale: Aquí רוּחַ nombra la vida interior o ánimo personal, no el Espíritu Santo. «Mi espíritu» preserva la correspondencia antropológica con «mi corazón».
- source_word: בְּתוֹכִי
  english_pob_choice: within me
  chosen_spanish: dentro de mí
  alternatives_spanish:
  - en mi interior
  - en mí
  lexicon: HALOT
  rationale: La expresión señala interioridad. Repetir «dentro de mí» mantiene el paralelismo y la claridad en español.
- source_word: יִשְׁתּוֹמֵם
  english_pob_choice: is appalled
  chosen_spanish: queda desolado
  alternatives_spanish:
  - se queda atónito
  - se horroriza
  - queda devastado
  lexicon: HALOT
  rationale: El verbo de שמם puede implicar desolación, estupefacción o espanto. En este contexto poético, «queda desolado» conserva la tensión entre ruina interior y shock emocional, y dialoga bien con la nota inglesa «desolate» como alternativa.
- source_word: לִבִּי
  english_pob_choice: my heart
  chosen_spanish: mi corazón
  alternatives_spanish:
  - mi mente
  - mi ser interior
  lexicon: HALOT
  rationale: «Corazón» es el equivalente natural y bíblico en español para לֵב, con el sentido de centro de pensamiento y emoción. Mantiene el paralelo con «mi espíritu».
translation_notes:
  revision_awareness: La versión española sigue el último ajuste del POB inglés, que cambió «So» por «And» para reflejar más directamente la conjunción hebrea ו. Por eso se usa «Y» al inicio. También se preserva la tensión lexical de עטף y שמם mediante una traducción poética que deja abierta la posibilidad de «abrumado»/«desolado» en nota.
  spanish_consistency_notes:
  - Se usa «dentro de mí» de manera uniforme para ambos miembros del paralelismo, como en el inglés POB.
  - Se mantiene «mi espíritu» y «mi corazón» para conservar el paralelismo antropológico.
  - La nota al pie ofrece una alternativa realista sin deshacer la línea principal.
  - No se introduce terminología eclesiástica tradicional que diluya la fuerza léxica del hebreo.
