revisions:
- from: Del aliento de Dios se da [a] el hielo, y la amplia extensión de las aguas queda congelada en sólido.[b]
  to: Del aliento de Dios se forma[a] el hielo, y la amplia extensión de las aguas queda congelada por completo.[b]
  rationale: Se revisa la redacción para conservar el sentido del hebreo y del POB auditado, pero en un español más natural. «Se forma el hielo» comunica la aparición del hielo por agencia divina sin el tropiezo estilístico de «se da el hielo». «Queda congelada por completo» expresa de manera idiomática la idea contextual de בְּמוּצָק como solidificación de las aguas, manteniendo la nota que preserva alternativas más literales como «queda firme».
