translation:
  language: es
  text: 'Entonces el ángel de Yahvé se le apareció y le dijo[a]: «Yahvé está contigo[b], valiente guerrero».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el mensajero de Yahvé». El término hebreo puede significar tanto «mensajero» como «ángel», aunque «ángel» encaja mejor en esta escena de aparición.
    reason: lexical_alternative
  - marker: b
    text: 'Lectura tradicional: «hombre poderoso de valor».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרָא
  english_pob_choice: appeared
  chosen_spanish: se le apareció
  alternatives_spanish:
  - se mostró
  - fue visto
  lexicon: HALOT
  rationale: El nifal de ראה en este contexto narrativo expresa una manifestación visible; en español, «se le apareció» comunica de forma natural la irrupción de una aparición divina o angélica.
- source_word: מַלְּאַךְ יְהוָה
  english_pob_choice: the angel of Yahweh
  chosen_spanish: el ángel de Yahvé
  alternatives_spanish:
  - el mensajero de Yahvé
  lexicon: HALOT
  rationale: «מַלְאָךְ» puede significar «mensajero» o «ángel», pero en una escena de aparición visible la traducción más natural y fiel es «ángel». Se conserva «Yahvé» para el nombre divino según el criterio del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene la transliteración del nombre divino en español como «Yahvé», evitando la sustitución por un título y conservando el nombre personal del pacto.
- source_word: וַיֹּאמֶר אֵלָיו
  english_pob_choice: and said to him
  chosen_spanish: y le dijo
  alternatives_spanish:
  - y le habló
  - y dijo a él
  lexicon: HALOT
  rationale: El hebreo solo dice «a él»; «le dijo» reproduce con naturalidad el dativo pronominal sin añadir el nombre de Gedeón.
- source_word: יְהוָה עִמְּךָ
  english_pob_choice: The LORD is with you
  chosen_spanish: Yahvé está contigo
  alternatives_spanish:
  - Yahvé sea contigo
  - Yahvé es contigo
  lexicon: HALOT
  rationale: La cláusula sin verbo se entiende mejor en español como una afirmación presente. «Está contigo» conserva el valor declarativo y evita leerla como saludo optativo.
- source_word: גִּבּוֹר הֶחָיִל
  english_pob_choice: mighty warrior
  chosen_spanish: guerrero poderoso
  alternatives_spanish:
  - hombre valiente
  - valeroso guerrero
  - mighty man of valor
  lexicon: HALOT
  rationale: La frase denota fuerza y aptitud militar. «Guerrero poderoso» conserva el matiz bélico y resulta idiomático en español moderno; se evita la fórmula tradicional más arcaica.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se sigue la decisión doctrinal del proyecto de representar el Tetragrámaton con el nombre propio divino, no con una sustitución tipográfica de título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: מַלְאַךְ יְהוָה
  english_pob_reading: the angel of Yahweh
  chosen_spanish_reading: el ángel de Yahvé
  alternative_spanish_readings:
  - el mensajero de Yahvé
  rationale: La redacción principal conserva la tensión interpretativa del hebreo sin resolverla doctrinalmente en el cuerpo del texto; no se incorpora una identificación teológica más fuerte que la que el pasaje expresa de forma explícita.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'El pasaje coincide con la última revisión inglesa: no se registran cambios posteriores que afecten la decisión léxica o teológica. La versión española sigue el texto hebreo directamente y mantiene las mismas opciones clave del audit trail inglés.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - Se conserva el artículo definido en «el ángel de Yahvé», sin suavizarlo a una perífrasis interpretativa.
  - La frase final se vierte como vocativo descriptivo («guerrero poderoso») y no como exhortación ni saludo.
