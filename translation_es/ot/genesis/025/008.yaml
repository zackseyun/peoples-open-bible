base_translation:
  language: en
  yaml_path: translation/ot/genesis/025/008.yaml
  text: And Abraham breathed his last and died in a good old age[a], old and full[b], and he was gathered to his people.
  footnotes:
  - marker: a
    text: Or 'satisfied' or simply 'full'; the Hebrew says 'old and full,' with 'of days' supplied in English to express the idiom clearly.
    reason: lexical_alternative
  - marker: b
    text: '''Was gathered to his people'' is a traditional Hebrew death formula. It may imply reunion with one''s kin in death, but the wording itself does not specify the exact manner.'
    reason: cultural_note
