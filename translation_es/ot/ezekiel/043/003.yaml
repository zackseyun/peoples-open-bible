base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/043/003.yaml
  text: And the appearance of what I saw was like the appearance that I had seen when I came to destroy the city[a], and the visions were like the appearance that I had seen by the Kebar Canal[b]; and I fell on my face.
  footnotes:
