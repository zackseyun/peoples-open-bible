translation:
  language: es
  text: Sus hijos buscarán el favor de los pobres[a], y sus propias manos devolverán su riqueza[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «aplacarán a los pobres»; el verbo hebreo puede incluir la idea de buscar su favor o de apaciguar a quienes fueron agraviados.'
    reason: lexical_alternative
  - marker: b
    text: 'O «sus manos devolverán sus bienes» o «su vigor»; el sustantivo hebreo puede referirse a riqueza, posesiones o fuerza, aunque aquí «riqueza» encaja mejor en el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּנָיו
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus muchachos
  lexicon: HALOT
  rationale: El hebreo es masculino plural con sufijo de 3ms. En español, "hijos" conserva la relación filial natural y puede abarcar hijos varones sin añadir una restricción innecesaria; evita una literalidad pesada como "sus hijos varones" si el contexto ya no exige marcar el sexo explícitamente.
- source_word: יְרַצּוּ
  english_pob_choice: will seek the favor of
  chosen_spanish: buscarán el favor de
  alternatives_spanish:
  - aplacarán a
  - tratarán de agradar a
  - suplicarán el favor de
  lexicon: HALOT
  rationale: El POB inglés opta por una expresión relacional que cubre el matiz de placar/ganar aceptación. "Buscarán el favor de" transmite ese sentido de procurar benevolencia o reconciliación sin reducir el verbo a un mero "complacer".
- source_word: דַלִּים
  english_pob_choice: the poor
  chosen_spanish: los pobres
  alternatives_spanish:
  - los necesitados
  - los débiles
  lexicon: HALOT
  rationale: דלים designa a los pobres o socialmente débiles. "Los pobres" es la equivalencia más directa y bíblicamente transparente en español.
- source_word: יָדָיו
  english_pob_choice: his own hands
  chosen_spanish: sus propias manos
  alternatives_spanish:
  - sus manos
  - sus mismas manos
  lexicon: HALOT
  rationale: Se conserva el plural literal y el énfasis del posesivo. "Sus propias manos" reproduce bien el matiz enfático del inglés y aclara que la restitución procede de él mismo.
- source_word: תָּשֵׁבְנָה
  english_pob_choice: will give back
  chosen_spanish: devolverán
  alternatives_spanish:
  - restaurarán
  - harán volver
  lexicon: HALOT
  rationale: El hiphil de שוב expresa causar el retorno de algo. "Devolverán" es una forma natural en español que mantiene la idea de restitución sin volverse arcaica.
- source_word: אוֹנוֹ
  english_pob_choice: his wealth
  chosen_spanish: su riqueza
  alternatives_spanish:
  - sus bienes
  - su sustancia
  - su vigor
  lexicon: HALOT
  rationale: En este contexto de restitución, el campo semántico material encaja mejor que "vigor". "Riqueza" mantiene abierta la noción de bienes/recursos sin forzar una lectura exclusivamente monetaria.
translation_notes:
  revision_awareness: El texto inglés auditado permanece sin cambios en la última revisión (high agreement; sin revisiones aplicadas). La versión española sigue de cerca las decisiones léxicas documentadas, conservando la ambigüedad semántica relevante en una nota para אוֹן.
  spanish_consistency_notes:
  - Se emplea «Dios/Yahvé» solo cuando el hebreo lo exige; este versículo no contiene referencia divina.
  - Se mantiene un español moderno y sobrio, sin calcos excesivos.
  - Se preserva la tensión semántica de יְרַצּוּ y אוֹן mediante notas en lugar de resolverla de forma simplista.
