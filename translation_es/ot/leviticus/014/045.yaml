translation:
  language: es
  text: Entonces derribará la casa —sus piedras, sus maderas y todo el revoque[a] de la casa—, y los sacará fuera de la ciudad, a un lugar inmundo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todo el polvo de la casa», lit. El hebreo dice literalmente «polvo», pero en este contexto de construcción probablemente se refiere al material raspado de las paredes, es decir, al revoque, mortero o enlucido de la casa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַץ
  english_pob_choice: Then he shall tear down
  chosen_spanish: Entonces derribará
  alternatives_spanish:
  - y derribará
  - entonces demolerá
  - entonces destruirá
  lexicon: HALOT
  rationale: נתץ aquí describe la demolición física de la casa contaminada. «Derribar» comunica bien la acción en español actual y conserva la fuerza concreta del verbo sin sobrecargarlo con un matiz más técnico que el hebreo exige.
- source_word: הַבַּיִת
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - la vivienda
  - el edificio
  lexicon: HALOT
  rationale: El contexto es la estructura inspeccionada por contaminación ritual; «casa» es el equivalente natural y preciso en español.
- source_word: אֲבָנָיו
  english_pob_choice: its stones
  chosen_spanish: sus piedras
  alternatives_spanish:
  - sus piedras de construcción
  - su mampostería
  lexicon: HALOT
  rationale: El hebreo dice literalmente «sus piedras». «Piedras» conserva la imagen concreta del derribo y es idiomático en español.
- source_word: עֵצָיו
  english_pob_choice: its timbers
  chosen_spanish: sus maderas
  alternatives_spanish:
  - sus vigas
  - su madera
  lexicon: HALOT
  rationale: El término se refiere al material estructural de la casa. «Maderas» mantiene la literalidad básica; «vigas» sería más específico pero añade precisión no explicitada por el hebreo.
- source_word: כָּל עֲפַר הַבָּיִת
  english_pob_choice: all the plaster of the house
  chosen_spanish: todo el polvo de la casa
  alternatives_spanish:
  - todo el yeso de la casa
  - todo el revoque de la casa
  - todo el polvo/la mezcla raspada de la casa
  lexicon: HALOT
  rationale: עפר significa literalmente «polvo/tierra fina», y el audit trail inglés opta por «plaster» por el contexto constructivo. En español, «polvo» conserva la literalidad hebrea y deja visible la tensión interpretativa; no se reemplaza por un término técnico sin plena certeza, porque el texto fuente mantiene la ambigüedad entre polvo, mortero y revoque raspado.
- source_word: וְהוֹצִיא
  english_pob_choice: and carry them out
  chosen_spanish: y los sacará
  alternatives_spanish:
  - y los llevará fuera
  - y los sacará afuera
  - y los retirará
  lexicon: HALOT
  rationale: El verbo indica sacar/hacer salir los materiales. «Los sacará» es natural y suficientemente concreto en español; el complemento siguiente explicita el destino.
- source_word: אֶל מִחוּץ לָעִיר
  english_pob_choice: outside the city
  chosen_spanish: fuera de la ciudad
  alternatives_spanish:
  - afuera de la ciudad
  - al exterior de la ciudad
  lexicon: HALOT
  rationale: La frase locativa se expresa de forma idiomática con «fuera de la ciudad», que corresponde bien a la idea de sacar los materiales más allá del área habitada.
- source_word: אֶל מָקוֹם טָמֵא
  english_pob_choice: to an unclean place
  chosen_spanish: a un lugar inmundo
  alternatives_spanish:
  - a un lugar impuro
  - a un lugar ritualmente impuro
  lexicon: HALOT
  rationale: En Levítico, טמא pertenece al campo ritual de pureza/impureza. «Inmundo» preserva mejor ese valor cultual tradicional en español que «impuro», sin perder claridad.
theological_decisions:
- issue: Terminología de pureza ritual para טמא
  english_pob_reading: unclean
  chosen_spanish_reading: inmundo
  alternative_spanish_readings:
  - impuro
  - ritualmente impuro
  rationale: La ley de Levítico funciona dentro de un marco de pureza ritual, no de suciedad moral general. «Inmundo» mantiene el valor cultual del término y evita suavizarlo. La elección conserva la tensión léxica del hebreo y es coherente con la decisión inglesa de usar «unclean».
  doctrine_reference: Translation philosophy §5; principio de consistencia para términos cultuales
- issue: Rango de עפר en contexto constructivo
  english_pob_reading: all the plaster of the house
  chosen_spanish_reading: todo el polvo de la casa
  alternative_spanish_readings:
  - todo el yeso de la casa
  - todo el revoque de la casa
  - todo el mortero de la casa
  rationale: El hebreo es literalmente «todo el polvo de la casa», pero el contexto sugiere material raspado de la estructura. En español se conserva la literalidad visible y la ambigüedad interpretativa, en vez de fijar una solución técnica que el hebreo no obliga de manera absoluta.
  doctrine_reference: Principio de transparencia textual; tratamiento de ambigüedades léxicas
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo de WLC y mantiene la tensión interpretativa documentada en el audit trail inglés para עפר. No se han aplicado revisiones posteriores; el pasaje coincide con el estado de alta concordancia del contexto fuente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - «Inmundo» se usa para טמא en coherencia con el marco ritual de Levítico.
  - Se conserva una estructura coordinada simple para reflejar la secuencia de acciones sin añadir explicación interpretativa.
