  to: todo el reino de Og en Basán[a], que reinó en Ashtarot y en Edrei—él había quedado del remanente de los refaítas. Moisés los derrotó y los desposeyó.
  rationale: 'Se conserva el contenido y las decisiones léxicas centrales del borrador, pero se hacen reparaciones menores para mayor fidelidad y naturalidad: ''había quedado'' mejora la fluidez de הוּא נִשְׁאַר מִיֶּתֶר sin añadir ''solo'', y ''los derrotó'' refleja mejor la fuerza militar de וַיַּכֵּם que ''los hirió''. La nota se alisa a un español más idiomático sin cambiar su función.'
