translation:
  language: es
  text: Porque la disciplina de los justos por ignorancia[a] no es como la destrucción del pecador[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «en ignorancia».'
    reason: lexical_alternative
  - marker: b
    text: Algunas variantes textuales leen «de los pecadores» en lugar de «de los justos».
    reason: textual_variant
  - marker: c
    text: También puede entenderse como «por lo hecho en ignorancia».
    reason: alternative_reading
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: LSJ
  rationale: Introduce la razón del contraste con naturalidad en español y conserva el valor causal-explicativo del griego.
- source_word: οὐχ ὁμοία
  english_pob_choice: is not like
  chosen_spanish: no es igual
  alternatives_spanish:
  - no es como
  - no se asemeja a
  lexicon: LSJ
  rationale: En español, 'no es igual' expresa bien el contraste de especie o calidad entre dos realidades, sin sonar mecánico. Mantiene la comparación negativa del griego.
- source_word: ἡ παιδεία
  english_pob_choice: the discipline
  chosen_spanish: la disciplina
  alternatives_spanish:
  - la corrección
  - el castigo disciplinario
  - el adiestramiento
  lexicon: LSJ
  rationale: '''Disciplina'' reproduce el campo de corrección formativa/correctiva que el POB inglés preserva, y encaja con el contraste posterior con ''destrucción''.'
- source_word: τῶν δικαίων
  english_pob_choice: of the righteous
  chosen_spanish: de los justos
  alternatives_spanish:
  - de los rectos
  - de los justos y rectos
  lexicon: LSJ
  rationale: '''Justos'' es el equivalente más natural y fiel en español bíblico para el grupo de personas en vista.'
- source_word: ἐν ἀγνοίᾳ
  english_pob_choice: in ignorance
  chosen_spanish: en ignorancia
  alternatives_spanish:
  - por ignorancia
  - sin saberlo
  - en desconocimiento
  lexicon: LSJ
  rationale: Se mantiene la formulación breve y literal del griego, como lo hace la revisión inglesa final, sin añadir explícitamente 'pecados' que no aparecen en el texto fuente.
- source_word: καταστροφή
  english_pob_choice: destruction
  chosen_spanish: destrucción
  alternatives_spanish:
  - ruina
  - derrocamiento
  lexicon: LSJ
  rationale: '''Destrucción'' es el equivalente más directo y fuerte para el sustantivo, y preserva el contraste severo del verso.'
- source_word: τοῦ ἁμαρτωλοῦ
  english_pob_choice: of the sinner
  chosen_spanish: del pecador
  alternatives_spanish:
  - del pecador culpable
  - del hombre pecador
  lexicon: LSJ
  rationale: El singular sustantivado se refleja bien con 'pecador', que mantiene el tono moral del griego y la lectura inglesa consolidada.
theological_decisions:
- issue: Alcance de ἐν ἀγνοίᾳ
  english_pob_reading: The righteous person's discipline is in ignorance, contrasted with the sinner's destruction.
  chosen_spanish_reading: La disciplina de los justos acontece en ignorancia, sin convertir la frase en una explicación explícita de 'pecados de ignorancia'.
  alternative_spanish_readings:
  - la disciplina de los justos por ignorancia
  - la disciplina de los justos para faltas de ignorancia
  - la disciplina de los justos en pecados de ignorancia
  rationale: El griego dice solo 'en ignorancia'. La versión española conserva esa tensión y evita añadir 'pecados' o una explicitación interpretativa que no está en el texto. La nota permite recordar la posible lectura idiomática sin imponerla en el cuerpo del verso.
  doctrine_reference: Preservar la tensión semántica del original; no resolverla con una expansión interpretativa.
- issue: Contraste entre disciplina y destrucción
  english_pob_reading: The verse contrasts corrective discipline of the righteous with the destructive judgment of the sinner.
  chosen_spanish_reading: El verso contrapone la corrección disciplinaria de los justos con la destrucción del pecador.
  alternative_spanish_readings:
  - El verso contrapone el trato correctivo de los justos con la ruina del pecador.
  - El verso contrapone la disciplina de los justos con el derribo del pecador.
  rationale: El contraste es estructural en el griego y debe quedar visible en español. 'Disciplina' frente a 'destrucción' preserva la asimetría entre corrección y ruina que la audición inglesa destaca.
  doctrine_reference: Mantener el contraste moral y judicial del pasaje sin suavizarlo.
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente eliminó la expansión ''for sins of'' y volvió a la formulación más estricta ''in ignorance''. Esta versión española sigue esa decisión: conserva ''en ignorancia'' en el cuerpo principal y no añade ''pecados'' al texto. También mantiene el contraste formal entre ''disciplina'' y ''destrucción'', y deja constancia de la variante textual sobre ''los justos/los pecadores'' en nota.'
  spanish_consistency_notes:
  - Se usa 'justos' para δικαίων, en línea con la terminología bíblica estándar y con el inglés POB.
  - Se usa 'pecador' para ἁμαρτωλοῦ, manteniendo el singular sustantivado.
  - Se conserva 'en ignorancia' para ἐν ἀγνοίᾳ, siguiendo la revisión inglesa final y evitando una expansión no textual.
  - Se mantiene 'destrucción' para καταστροφή por ser el equivalente más directo y fuerte en español.
  - Se introduce 'Porque' para ὅτι con valor causal-explicativo natural en español.
