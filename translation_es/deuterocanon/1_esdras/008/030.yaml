translation:
  language: es
  text: 'De los hijos de Fares: Zacarías[a], y con él, según el registro[b], ciento cincuenta hombres.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La forma griega Φαρές corresponde aquí al testimonio de 1 Esdras; el paralelo hebreo presenta otra forma de nombre propio. Se mantiene la lectura griega en el texto principal.
    reason: textual_variant
  - marker: b
    text: Lit. «desde el registro» o «por escrito»; el contexto apunta a una inscripción o lista de empadronamiento/genealogía.
    reason: lexical_alternative
lexical_decisions:
- source_word: Φαρές
  english_pob_choice: Pharez
  chosen_spanish: Fares
  alternatives_spanish:
  - Phares
  - Parosh
  lexicon: LSJ
  rationale: Se conserva la transliteración del nombre propio griego Φαρές. En español, "Fares" mantiene la cercanía fonética y sigue el testimonio griego como texto base de 1 Esdras; la forma hebrea paralela es distinta, pero no sustituye la lectura principal.
- source_word: Ζαχαρίας
  english_pob_choice: Zechariah
  chosen_spanish: Zacarías
  alternatives_spanish:
  - Zacarías
  - Zacarías
  lexicon: LSJ
  rationale: Nombre propio trasladado al uso normal del español bíblico, acorde con el griego Ζαχαρίας y con el paralelo hebreo זְכַרְיָה.
- source_word: μετʼ αὐτοῦ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - y con él
  lexicon: LSJ
  rationale: La expresión de acompañamiento se rinde de forma natural en español como "con él". Se conserva la coordinación del miembro de la frase mediante la conjunción inicial del segmento.
- source_word: ἀπὸ γραφῆς
  english_pob_choice: according to the record
  chosen_spanish: según el registro
  alternatives_spanish:
  - según el libro
  - por escrito
  - de acuerdo con el registro
  lexicon: LSJ
  rationale: La base literal es "desde/es a partir de la escritura/registro", pero en este contexto censal y genealógico la idea es la de una inscripción o lista documentada. "Registro" evita sobredeterminarla como pura genealogía y sigue el matiz auditado de la revisión inglesa.
- source_word: ἄνδρες
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - varones
  lexicon: LSJ
  rationale: El griego especifica varones adultos; "hombres" conserva esa fuerza de manera clara y natural en español, sin neutralizar el dato de sexo.
- source_word: ἑκατὸν πεντήκοντα
  english_pob_choice: one hundred fifty
  chosen_spanish: ciento cincuenta
  alternatives_spanish:
  - ciento y cincuenta
  lexicon: LSJ
  rationale: Se vierte el número cardinal de forma estándar y fluida en español moderno.
translation_notes:
  revision_awareness: El borrador español sigue el texto griego de Swete como ancla primaria y toma en cuenta el paralelo hebreo solo como control de nombres y sentido. También incorpora la revisión inglesa reciente que prefirió "record" frente a una especificación más fuerte como "genealogy" para ἀπὸ γραφῆς.
  spanish_consistency_notes:
  - Se usa "Fares" para Φαρές y "Zacarías" para Ζαχαρίας, siguiendo transliteración bíblica estándar en español.
  - '"Registro" evita introducir una lectura más estrecha que la apoyada por el griego.'
  - La sintaxis reproduce con naturalidad la estructura del versículo sin añadir palabras no requeridas por el texto fuente.
