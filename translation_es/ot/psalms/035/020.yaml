translation:
  language: es
  text: Porque no hablan paz[a], sino que contra los tranquilos de la tierra traman palabras engañosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los pacíficos de la tierra» o «los que viven en calma en la tierra». La frase hebrea probablemente se refiere a personas que viven tranquila y pacíficamente en la tierra.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Puesto que
  lexicon: HALOT
  rationale: Introduce la razón de la súplica o denuncia anterior; en español, «Porque» conserva la relación causal/discursiva de forma natural y solemne.
- source_word: לֹא שָׁלוֹם יְדַבֵּרוּ
  english_pob_choice: they do not speak peace
  chosen_spanish: no hablan paz
  alternatives_spanish:
  - no hablan de paz
  - no hablan pacíficamente
  lexicon: HALOT
  rationale: Se conserva el sustantivo «paz» como objeto de «hablar», siguiendo la fuerza lexical del hebreo y la decisión del POB de no volverlo adverbial.
- source_word: שָׁלוֹם
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - bienestar
  - shalom
  lexicon: HALOT
  rationale: «Paz» es el equivalente normal y suficiente en español; mantiene el campo semántico básico sin perder la referencia relacional del término hebreo.
- source_word: וְעַל
  english_pob_choice: but against
  chosen_spanish: sino que contra
  alternatives_spanish:
  - y contra
  - pero contra
  lexicon: HALOT
  rationale: El valor adversativo se explicita en español con «sino que», que conserva el contraste entre lo que no dicen y lo que sí hacen.
- source_word: רִגְעֵי אֶרֶץ
  english_pob_choice: the quiet ones of the land
  chosen_spanish: los tranquilos de la tierra
  alternatives_spanish:
  - los pacíficos de la tierra
  - los quietos de la tierra
  - los que viven en calma en la tierra
  lexicon: HALOT
  rationale: Se mantiene el matiz nominal-adjetival de la expresión y la posible referencia a personas que viven en calma; «tranquilos» evita que suene a mera descripción del terreno.
- source_word: דִּבְרֵי מִרְמוֹת
  english_pob_choice: deceitful words
  chosen_spanish: palabras engañosas
  alternatives_spanish:
  - palabras de engaño
  - palabras fraudulentas
  - palabras traicioneras
  lexicon: HALOT
  rationale: La construcción hebrea puede darse como adjetival o constructa; en español «palabras engañosas» suena natural y preserva el carácter moralmente perverso del discurso.
- source_word: יַחֲשֹׁבוּן
  english_pob_choice: they devise
  chosen_spanish: piensan
  alternatives_spanish:
  - maquinan
  - planean
  - traman
  lexicon: HALOT
  rationale: Aunque el POB inglés usa «devise», el verbo hebreo admite la idea de idear/maquinar. «Piensan» conserva el valor de «concebir» sin sobrecargar el texto; el objeto «palabras engañosas» sostiene el matiz de intención hostil.
theological_decisions:
- issue: Relación entre la negación de paz y la acción hostil
  english_pob_reading: they do not speak peace, but against the quiet ones of the land they devise deceitful words
  chosen_spanish_reading: no hablan paz, sino que contra los tranquilos de la tierra piensan palabras engañosas
  alternative_spanish_readings:
  - no hablan de paz, sino que contra los tranquilos de la tierra maquinan palabras engañosas
  - no hablan paz, sino que contra los pacíficos de la tierra traman palabras engañosas
  rationale: La línea contrapone una disposición de paz ausente con un ataque verbal dirigido. La traducción española mantiene ese contraste sin suavizar la denuncia ni sustituir el objeto concreto «paz».
  doctrine_reference: Ética bíblica de la paz y la malicia verbal; cf. Sal 34:14; 120:2-7
translation_notes:
  revision_awareness: La redacción sigue el audit trail inglés, pero ajusta la sintaxis al español natural. Se corrige el problema de validación anterior asegurando que solo exista la nota [a] y que su marcador aparezca exactamente en el texto principal.
  spanish_consistency_notes:
  - 'Se preserva el paralelo negativo/adversativo: «no hablan paz» / «sino que contra…».'
  - «Tranquilos de la tierra» conserva el sentido nominal de רִגְעֵי אֶרֶץ sin convertirlo en una simple descripción geográfica.
  - Se evita «SEÑOR» y no hay términos de nombre divino en el versículo.
  - No se introduce vocabulario litúrgico no motivado por el hebreo.
