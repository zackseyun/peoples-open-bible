    reason: lexical_alternative
lexical_decisions:
- source_word: καταδυναστεύσωμεν
  english_pob_choice: let us oppress
  chosen_spanish: Oprimamos
  alternatives_spanish:
  - Aprovechemos de
  - Tiranicemos sobre
  lexicon: BDAG
  rationale: El verbo griego expresa ejercer dominio con dureza y opresión. «Oprimamos» conserva esa fuerza coercitiva de manera natural en español y evita suavizar el abuso.
- source_word: πένητα
  english_pob_choice: poor man
  chosen_spanish: pobre
  alternatives_spanish:
  - necesitado
  - miserable
  lexicon: LSJ
  rationale: πένης denota a una persona pobre o necesitada. En español, «pobre» comunica bien la condición social y funciona con el sustantivo implícito en la frase.
- source_word: δίκαιον
  english_pob_choice: righteous
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  - righteous
  lexicon: LSJ
  rationale: Aquí δίκαιος puede entenderse como «righteous» o «just». En español, «justo» mantiene la ambigüedad entre lo moral y lo judicial, y refleja la pareja adjetival del griego con πένητα.
- source_word: μὴ φεισώμεθα
  english_pob_choice: let us not spare
  chosen_spanish: no perdonemos
  alternatives_spanish:
  - no tengamos compasión de
  - no nos abstengamos de herir a
  lexicon: BDAG
  rationale: La idea es no ahorrar daño ni mostrar clemencia. «No perdonemos» transmite la falta de misericordia de forma idiomática en español, sin añadir un objeto ausente del griego.
- source_word: χήρας
  english_pob_choice: the widow
  chosen_spanish: a la viuda
  alternatives_spanish:
  - a la viuda indefinida
  - a la viuda como clase vulnerable
  lexicon: LSJ
  rationale: Aunque el griego no lleva artículo, el castellano necesita marcar el destinatario con naturalidad. «A la viuda» conserva el valor representativo de una clase vulnerable.
- source_word: μηδὲ ... ἐντραπῶμεν
  english_pob_choice: nor show regard for
  chosen_spanish: ni respetemos
  alternatives_spanish:
  - ni mostremos consideración por
  - ni nos avergoncemos ante
  lexicon: BDAG
  rationale: En este contexto, ἐντρέπομαι no expresa vergüenza interior sino deferencia o consideración. «Respetemos» reproduce esa idea de manera breve y clara.
- source_word: πρεσβύτου
  english_pob_choice: an old man
  chosen_spanish: un anciano
  alternatives_spanish:
  - un viejo
  - un hombre viejo
  lexicon: LSJ
  rationale: El término se refiere a la edad, no al oficio. «Anciano» es más digno y preciso que «viejo» en español contemporáneo.
- source_word: πολιάς
  english_pob_choice: the gray hairs
  chosen_spanish: las canas
  alternatives_spanish:
  - las canas grises
  - la cabeza cana
  lexicon: LSJ
  rationale: El sustantivo alude concretamente al cabello canoso como señal de vejez. «Las canas» es la forma natural en español para conservar esa imagen.
- source_word: πολυχρονίους
  english_pob_choice: advanced in years
  chosen_spanish: cargado de años
  alternatives_spanish:
  - de muchos años
  - longevo
  lexicon: LSJ
  rationale: El adjetivo intensifica la vejez del hombre. «Cargado de años» expresa bien la idea de larga vida con un tono digno y bíblico sin sonar arcaico en exceso.
theological_decisions:
- issue: δίκαιος como rasgo moral del vulnerable
  english_pob_reading: righteous
  chosen_spanish_reading: justo
  alternative_spanish_readings:
  - recto
  - piadoso
  rationale: La escena no presenta solo pobreza material sino también oposición al inocente o moralmente recto. «Justo» mantiene esa tensión ética sin cerrar del todo el campo semántico de δίκαιος.
  doctrine_reference: 'DOCTRINE.md: consistency of key terms; δικαιοσύνη family often overlaps with righteousness/justice and requires contextual documentation.'
translation_notes:
  revision_awareness: La versión española sigue de cerca el griego de Swete 1909 y la auditoría inglesa POB. Se conserva la serie de imperativos cohortativos en primera persona plural, la oposición social/moral del pobre justo, y la imagen concreta de las canas y la edad avanzada. No se detectaron cambios de revisión en el pass más reciente.
  spanish_consistency_notes:
  - Se emplea «Yahvé» por defecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se prefirió «justo» para δίκαιος en coherencia con el valor moral documentado en la auditoría.
  - «Anciano» y «las canas» mantienen el registro bíblico sin recurrir a eufemismos modernos que diluyan la imagen.
  - La construcción con «a la viuda» es una adaptación gramatical normal del español, sin añadir contenido interpretativo.
