translation:
  language: es
  text: Entonces Yahvé oyó mi voz[a] y escuchó mis súplicas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «mi voz»; también puede entenderse idiomáticamente como «mi clamor».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: HALOT
  rationale: Marca la transición temporal desde el voto de alabanza y oración hacia la respuesta divina; «Entonces» es natural en español y conserva la secuencia lógica.
- source_word: שָׁמַע
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - escuchó
  - escuchó la voz de
  lexicon: HALOT
  rationale: El hebreo dice que Yahvé oyó la voz del hablante; «oyó» mantiene la fuerza simple de oír y evita confundirlo con la atención más marcada del verbo siguiente.
- source_word: קוֹלִי
  english_pob_choice: my voice
  chosen_spanish: mi voz
  alternatives_spanish:
  - mi clamor
  - mi grito
  lexicon: HALOT
  rationale: La fuente hebrea dice literalmente «mi voz». La alternativa idiomática «mi clamor» es posible en contexto de oración, pero el texto no la exige.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como «Yahvé», conforme al criterio del proyecto, en lugar de sustituirlo por un título.
- source_word: וַיַּאֲזִין
  english_pob_choice: listened to
  chosen_spanish: escuchó
  alternatives_spanish:
  - prestó oído a
  - atendió a
  lexicon: HALOT
  rationale: Este verbo añade una atención activa. En español, «escuchó» comunica mejor esa atención que un simple segundo «oyó», sin perder la progresión del hebreo.
- source_word: תַּחֲנוּנָי
  english_pob_choice: my supplications
  chosen_spanish: mis súplicas
  alternatives_spanish:
  - mis ruegos
  - mis peticiones
  lexicon: HALOT
  rationale: El término denota peticiones fervientes y de ruego; «súplicas» preserva el registro orante y solemne sin volverse demasiado arcaico.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El versículo emplea el Tetragrámaton; se conserva el nombre propio divino en español como «Yahvé» para mantener la referencia personal y pactal, no una sustitución titulada.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa que eliminó el pronombre innecesario en la segunda cláusula; por eso la cláusula española evita cualquier sujeto explícito redundante y mantiene un paralelismo conciso: «oyó mi voz y escuchó mis súplicas».'
  spanish_consistency_notes:
  - Se conservó la distinción entre «oyó» y «escuchó» para reflejar la progresión hebrea entre oír y atender.
  - Se usó «Yahvé» según la terminología del proyecto para יְהוָה.
  - «Súplicas» preserva un registro de oración formal y evita un giro demasiado coloquial.
