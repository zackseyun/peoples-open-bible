base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/032/039.yaml
  text: See now that I[a], even I, am he, and there is no god beside me. I put to death and I make alive; I have wounded, and I will heal[e][d][c][b]; and there is no one who can deliver from my hand.
  footnotes:
  - marker: a
    text: Or 'there is no God with me.' The Hebrew preposition can be rendered more literally as 'with,' but here likely carries the sense 'beside' or 'alongside' in a statement of exclusive deity.
    reason: lexical_alternative
  - marker: b
    text: Or 'I kill and I make alive.'
    reason: lexical_alternative
  - marker: c
    text: Or 'I have shattered, and I will heal.' The verb rendered 'have wounded' can carry a stronger sense of crushing or shattering.
    reason: lexical_alternative
  - marker: d
    text: Hebrew 'from my hand,' an idiom for escaping someone's power or control.
    reason: cultural_note
  - marker: e
    text: Or 'I, I am he'.
    reason: previous_rendering
