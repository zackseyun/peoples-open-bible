translation:
  language: es
  text: Labán entró en la tienda de Jacob[a], y en la tienda de Lea, y en la tienda de las dos sirvientas, pero no las encontró. Luego salió de la tienda de Lea y entró en la tienda de Raquel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «no encontró»; el objeto está omitido en este versículo, pero por el contexto se refiere a los ídolos domésticos que Labán buscaba.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא ... בְּאֹהֶל
  english_pob_choice: went into
  chosen_spanish: entró en
  alternatives_spanish:
  - fue a
  - ingresó en
  lexicon: HALOT
  rationale: El hebreo con בְּ marca movimiento hacia el interior de un lugar. En español, «entró en» conserva bien ese valor direccional y suena natural en narrativa bíblica.
- source_word: אֹהֶל
  english_pob_choice: tent
  chosen_spanish: tienda
  alternatives_spanish:
  - carpa
  - tabernáculo
  lexicon: HALOT
  rationale: El sentido concreto es una estructura portátil de habitación. «Tienda» es claro y tradicional en español bíblico; «carpa» es posible, pero menos solemne en este contexto patriarcal.
- source_word: שְׁתֵּי הָאֲמָהֹת
  english_pob_choice: the two female servants
  chosen_spanish: las dos siervas
  alternatives_spanish:
  - las dos sirvientas
  - las dos esclavas
  lexicon: HALOT
  rationale: אָמָה puede referirse a sierva o esclava mujer. Dado que el texto español puede reflejar la relación doméstica sin decidir más de lo que exige esta línea, «siervas» mantiene la función del término; «esclavas» sería una opción más fuerte lexicalmente, pero no es necesaria aquí.
- source_word: וְלֹא מָצָא
  english_pob_choice: but he did not find them
  chosen_spanish: pero no las encontró
  alternatives_spanish:
  - y no las encontró
  - pero no encontró nada
  lexicon: HALOT
  rationale: El objeto está implícito en hebreo y, por el contexto, se refiere a lo que Labán buscaba. En español conviene explicitarlo con «las» para conservar la fluidez y la referencia contextual. «Pero» reproduce el giro adversativo del contexto de búsqueda.
- source_word: וַיֵּצֵא מֵאֹהֶל לֵאָה
  english_pob_choice: Then he came out of Leah’s tent
  chosen_spanish: Entonces salió de la tienda de Lea
  alternatives_spanish:
  - y salió de la tienda de Lea
  - entonces se retiró de la tienda de Lea
  lexicon: HALOT
  rationale: יצא expresa salir; «salió de» es la forma más natural y precisa en español. «Entonces» ayuda a marcar la secuencia narrativa del hebreo.
- source_word: וַיָּבֹא בְּאֹהֶל רָחֵל
  english_pob_choice: and went into Rachel’s tent
  chosen_spanish: entró en la tienda de Raquel
  alternatives_spanish:
  - y fue a la tienda de Raquel
  - y se metió en la tienda de Raquel
  lexicon: HALOT
  rationale: Se conserva la repetición del movimiento al interior de otra tienda. «Entró en» mantiene la simetría con la primera acción y evita una paráfrasis innecesaria.
theological_decisions:
- issue: Objeto implícito de «no encontró»
  english_pob_reading: the object is unstated in this verse but refers from context to the household gods Laban was seeking
  chosen_spanish_reading: «no las encontró» deja implícito el referente, aunque el contexto inmediato apunta a los ídolos domésticos que Labán buscaba
  alternative_spanish_readings:
  - «no encontró nada»
  - «no encontró los ídolos»
  rationale: El hebreo no expresa el objeto. En español, la forma más fiel al verso aislado es conservar la elipsis, pero usando un pronombre femenino plural que sigue el referente contextual conocido por la escena. Esto evita introducir explícitamente una interpretación que el verso por sí solo no dice.
  doctrine_reference: Contexto narrativo de Génesis 31:19–35; consistencia con la elipsis hebrea
- issue: Terminología para אֲמָהֹת
  english_pob_reading: female servants
  chosen_spanish_reading: siervas
  alternative_spanish_readings:
  - sirvientas
  - esclavas
  rationale: La palabra hebrea puede abarcar una condición servil más fuerte que el español común «sirvienta». «Siervas» conserva la amplitud semántica y permanece sobrio en un texto narrativo antiguo, sin forzar una formulación más técnica que el verso no exige.
  doctrine_reference: Léxico hebreo de אָמָה en uso narrativo patriarcal
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin cambios textuales relevantes: se mantuvo la secuencia repetida de entradas a las tiendas, la elipsis de «no encontró» se resolvió en español de forma contextual, y no hubo revisiones posteriores en el registro fuente.'
  spanish_consistency_notes:
  - Se usó «Yahvé» según la convención del proyecto, pero este versículo no contiene el Tetragrámaton.
  - 'Se mantuvo una correspondencia verbal simple: entró/salió, sin ampliar el relato.'
  - «Tienda» se conservó de manera uniforme para אֹהֶל en todo el versículo.
  - La nota al pie se ancló solo en «no las encontró», donde el español necesita apoyar la elipsis contextual.
