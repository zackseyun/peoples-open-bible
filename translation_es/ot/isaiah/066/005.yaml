translation:
  language: es
  text: 'Oigan la palabra de Yahvé, ustedes que tiemblan ante su palabra[a]: Sus hermanos, los que los odian y los echan fuera por causa de mi nombre, han dicho: «Sea glorificado Yahvé, para que veamos su alegría»[b]; pero ellos quedarán avergonzados.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «ustedes que se estremecen ante su palabra».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «Sea glorificado Yahvé, para que veamos su alegría». La frase puede leerse como burla de los perseguidores; alternativamente: «Sea honrado Yahvé, y veamos su alegría».'
    reason: alternative_reading
lexical_decisions:
- source_word: שִׁמְעוּ
  english_pob_choice: Hear
  chosen_spanish: Oigan
  alternatives_spanish:
  - Escuchen
  - Oigan atentamente
  lexicon: HALOT
  rationale: El imperativo plural pide una exhortación directa y profética. «Oigan» conserva la fuerza apelativa sin sonar arcaico en español actual.
- source_word: דְּבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mensaje de Yahvé
  - la voz de Yahvé
  lexicon: HALOT
  rationale: «Palabra» mantiene el giro profético estable y no diluye el peso de la comunicación divina. Se conserva «Yahvé» según la norma del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte con el nombre propio «Yahvé», no con una sustitución litúrgica.
- source_word: הַחֲרֵדִים אֶל דְּבָרוֹ
  english_pob_choice: you who tremble at his word
  chosen_spanish: ustedes que tiemblan ante su palabra
  alternatives_spanish:
  - ustedes que reverencian su palabra
  - ustedes que se estremecen ante su palabra
  lexicon: HALOT
  rationale: «Tiemblan» conserva la imagen de חרד y deja la tensión entre temor reverente y estremecimiento real. «Ante su palabra» expresa bien אֶל sin forzar un calco rígido.
- source_word: אָמְרוּ
  english_pob_choice: have said
  chosen_spanish: han dicho
  alternatives_spanish:
  - dijeron
  - dicen
  lexicon: HALOT
  rationale: El perfecto español introduce naturalmente la cita de los hostiles sin perder el matiz de palabra ya pronunciada y vigente.
- source_word: אֲחֵיכֶם
  english_pob_choice: Your brothers
  chosen_spanish: Sus hermanos
  alternatives_spanish:
  - sus hermanos de ustedes
  - sus parientes
  lexicon: HALOT
  rationale: Se conserva el término de parentesco como en el hebreo, ya que refuerza la ironía y el carácter doloso del rechazo.
- source_word: שֹׂנְאֵיכֶם
  english_pob_choice: who hate you
  chosen_spanish: los que los odian
  alternatives_spanish:
  - los que los detestan
  lexicon: HALOT
  rationale: El participio atributivo se vuelve con una relativa clara. «Odiar» mantiene la fuerza directa del hebreo.
- source_word: מְנַדֵּיכֶם
  english_pob_choice: who cast you out
  chosen_spanish: los echan fuera
  alternatives_spanish:
  - los expulsan
  - los excluyen
  - los destierran
  lexicon: HALOT
  rationale: La idea central es expulsión/exclusión social o religiosa. «Echar fuera» preserva la energía del verbo y sigue la opción auditada de exclusión/expulsión.
- source_word: לְמַעַן שְׁמִי
  english_pob_choice: for my name’s sake
  chosen_spanish: por causa de mi nombre
  alternatives_spanish:
  - a causa de mi nombre
  - por mi nombre
  lexicon: HALOT
  rationale: La construcción expresa motivo o pretexto ligado al nombre divino. «Por causa de mi nombre» es idiomático en español y conserva el peso teológico del «nombre».
- source_word: יִכְבַּד יְהוָה
  english_pob_choice: Let Yahweh be glorified
  chosen_spanish: Sea glorificado Yahvé
  alternatives_spanish:
  - Sea honrado Yahvé
  - Que Yahvé sea glorificado
  lexicon: HALOT
  rationale: El imperfecto funciona con valor jussivo en el discurso citado. «Sea glorificado» reproduce el tono de la fórmula y permite la lectura irónica o autojustificadora reconocida en el audit trail.
- source_word: וְנִרְאֶה בְשִׂמְחַתְכֶם
  english_pob_choice: that we may see your joy
  chosen_spanish: para que veamos su alegría
  alternatives_spanish:
  - y veamos su alegría
  - para ver su alegría
  lexicon: HALOT
  rationale: La forma verbal de 1cp favorece «veamos». Se mantiene el sujeto plural implícito del hebreo y se traduce בְשִׂמְחַתְכֶם como la esfera visible de la alegría, coherente con la lectura auditada.
- source_word: יֵבֹשׁוּ
  english_pob_choice: they will be put to shame
  chosen_spanish: quedarán avergonzados
  alternatives_spanish:
  - serán avergonzados
  - serán puestos en vergüenza
  - serán confundidos
  lexicon: HALOT
  rationale: בוש denota vergüenza/deshonra. «Quedarán avergonzados» transmite bien el resultado final de la profecía en español natural.
theological_decisions:
- issue: Nombre divino en el texto y en la cita indirecta
  english_pob_reading: Yahweh is rendered directly; the taunt quotes divine speech without masking the name.
  chosen_spanish_reading: Yahvé aparece directamente en la exhortación y en la cita, sin sustituirlo por «SEÑOR».
  alternative_spanish_readings:
  - SEÑOR
  - el Señor
  rationale: El hebreo contiene יְהוָה dos veces. Mantener el nombre propio evita una neutralización que el proyecto rechaza y conserva la identificación del Dios del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Tono de la cita hostil
  english_pob_reading: 'The hostile brothers likely speak mockingly: ''Let Yahweh be glorified, that we may see your joy.'''
  chosen_spanish_reading: La cita se conserva con un tono que puede leerse como burla o desafío, no como piedad sincera.
  alternative_spanish_readings:
  - Puede leerse como una afirmación piadosa sin ironía
  - Pueden verse como palabras de honrada expectativa
  rationale: El contexto inmediato contrasta a los fieles temblorosos con hermanos que odian y expulsan. La cláusula final sobre la vergüenza de ellos apoya la lectura irónica o taunt, que el español mantiene sin explicitar demasiado.
  doctrine_reference: Contextual reading of quoted speech in Isaiah 66:5
translation_notes:
  revision_awareness: Se revisó el paralelismo del hebreo y el audit trail inglés. No se siguió mecánicamente la sintaxis inglesa; se preservó la tensión entre temor reverente y estremecimiento en חרד, la fuerza de la expulsión en נדה, y la ambigüedad/ironía de la cita final conforme al consenso alto del control cruzado.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se mantiene «palabra» para דְּבַר cuando se trata de revelación profética.
  - «Quedarán avergonzados» conserva la idea de vergüenza pública y deshonra.
  - La primera cita divina usa segunda persona plural de trato respetuoso y contemporáneo («ustedes»), coherente con un registro bíblico moderno en español latinoamericano.
