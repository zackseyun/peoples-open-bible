translation:
  language: es
  text: Pero yo estableceré mi pacto con Isaac[a], a quien Sara te dará un hijo por este tiempo el año que viene.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y estableceré mi pacto con Isaac». La conjunción hebrea también puede traducirse simplemente como «y», pero el contexto favorece un contraste con la promesa respecto de Ismael en el versículo anterior.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֶת
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Mas
  lexicon: HALOT
  rationale: La conjunción waw aquí se entiende discursivamente en contraste con la promesa anterior sobre Ismael; en español, «Pero» reproduce mejor ese giro que un simple «Y».
- source_word: בְּרִיתִי
  english_pob_choice: my covenant
  chosen_spanish: mi pacto
  alternatives_spanish:
  - mi alianza
  - mi convenio
  lexicon: HALOT
  rationale: «Pacto» comunica bien el sentido bíblico-covenantal en español contemporáneo y mantiene la relación formal del término hebreo con claridad y dignidad.
- source_word: אָקִים
  english_pob_choice: I will establish
  chosen_spanish: estableceré
  alternatives_spanish:
  - confirmaré
  - sostendré
  lexicon: HALOT
  rationale: El verbo en hifil expresa fijar o establecer firmemente; «estableceré» es natural en español y conserva el sentido covenantal formal.
- source_word: אֶת יִצְחָק
  english_pob_choice: with Isaac
  chosen_spanish: con Isaac
  alternatives_spanish:
  - para Isaac
  lexicon: HALOT
  rationale: Aunque el hebreo usa el marcador de objeto directo, en español la relación pactal se expresa de modo natural con «con», como parte con quien se establece el pacto.
- source_word: יִצְחָק
  english_pob_choice: Isaac
  chosen_spanish: Isaac
  alternatives_spanish:
  - —
  lexicon: N/A
  rationale: Nombre propio estándar en español.
- source_word: אֲשֶׁר תֵּלֵד לְךָ שָׂרָה
  english_pob_choice: whom Sarah will bear to you
  chosen_spanish: a quien Sara te dará a luz
  alternatives_spanish:
  - a quien Sara te parirá
  - a quien Sara te tendrá
  lexicon: HALOT
  rationale: «Dar a luz» es la expresión española natural para el acto de alumbrar, y conserva el sujeto Sarah y el dativo «te» sin añadir interpretación.
- source_word: לַ/מּוֹעֵד הַ/זֶּה
  english_pob_choice: at this time
  chosen_spanish: a esta misma época
  alternatives_spanish:
  - a este tiempo
  - en este momento
  lexicon: HALOT
  rationale: מוֹעֵד puede ser «tiempo señalado» o «época fijada»; aquí la fórmula temporal queda bien en «a esta misma época», que expresa referencia temporal concreta sin forzar una terminología litúrgica.
- source_word: בַּ/שָּׁנָה הָ/אַחֶֽרֶת
  english_pob_choice: next year
  chosen_spanish: el año que viene
  alternatives_spanish:
  - el próximo año
  - en el siguiente año
  lexicon: HALOT
  rationale: La expresión idiomática española más natural es «el año que viene»; mantiene la referencia al año posterior sin sobrecargar la frase.
theological_decisions:
- issue: Relación pactal exclusiva con Isaac frente a Ismael
  english_pob_reading: The verse states that God will establish his covenant with Isaac.
  chosen_spanish_reading: Dios establecerá su pacto con Isaac.
  alternative_spanish_readings:
  - Dios confirmará su pacto con Isaac.
  - Dios sellará su pacto con Isaac.
  rationale: Se conserva la exclusividad del anuncio sin ampliar el alcance más allá del texto; «con Isaac» mantiene la lectura relacional y pactal documentada por el inglés POB.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El texto español sigue la última revisión auditada del inglés POB al preferir una equivalencia temporal más directa para לַמּוֹעֵד הַזֶּה («at this time») y conserva el valor contrastivo de la conjunción inicial. Se mantuvo la afirmación pactal centrada en Isaac sin añadir inferencias doctrinales extras.
  spanish_consistency_notes:
  - Se usó «pacto» para בְּרִית en consonancia con el uso bíblico-covenantal en español.
  - Se prefirió «estableceré» para אָקִים por su claridad formal y su relación con el lenguaje de pacto.
  - «Sara» conserva la forma castellana usual del nombre propio.
  - La frase temporal se formuló de modo idiomático y preciso, sin introducir una connotación litúrgica que no está en el hebreo.
