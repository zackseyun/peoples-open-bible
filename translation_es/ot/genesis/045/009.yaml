  text: מַהֲרוּ֮ וַ/עֲל֣וּ אֶל אָבִ/י֒ וַ/אֲמַרְתֶּ֣ם אֵלָ֗י/ו כֹּ֤ה אָמַר֙ בִּנְ/ךָ֣ יוֹסֵ֔ף שָׂמַ֧/נִי אֱלֹהִ֛ים לְ/אָד֖וֹן לְ/כָל מִצְרָ֑יִם רְדָ֥/ה אֵלַ֖/י אַֽל תַּעֲמֹֽד־־־׃
