translation:
  language: es
  text: Por tanto[a], si alguno de ustedes es de su pueblo, que su Señor esté con él[b][c], y que suba a Jerusalén, que está en Judea, y que edifiquen la casa del Señor de Israel; este es el Señor que habita en Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego cambia del singular («si alguno de ustedes… que su Señor esté con él») al plural («que edifiquen»). Esta traducción conserva ese cambio de número en lugar de suavizarlo.
    reason: textual_variant
  - marker: b
    text: 'El paralelo hebreo en Esdras difiere notablemente en este punto: habla más bien de apoyo con plata, oro, bienes y animales, junto con una ofrenda voluntaria para la casa de Dios en Jerusalén. Aquí 1 Esdras sigue una forma griega distinta de la tradición.'
    reason: alternative_reading
  - marker: c
    text: 'O: «que hizo su morada en Jerusalén».'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἴ τις ἐστὶν οὖν ὑμῶν
  english_pob_choice: Therefore, if any of you is
  chosen_spanish: Por tanto, si alguno de ustedes es
  alternatives_spanish:
  - Ahora bien, si alguno de ustedes es
  - Si, pues, alguno de ustedes es
  lexicon: LSJ
  rationale: οὖν expresa consecuencia; «Por tanto» conserva ese valor inferencial con español natural. εἴ τις ἐστὶν ὑμῶν se vierte como una condición general idiomática sin sobrecargarla.
- source_word: ἐκ τοῦ ἔθνους αὐτοῦ
  english_pob_choice: from his people
  chosen_spanish: de su pueblo
  alternatives_spanish:
  - de su nación
  - pertenece a su pueblo
  lexicon: LSJ
  rationale: ἔθνος puede ser «nación» o «pueblo». Aquí, por el contexto de retorno y pertenencia, «pueblo» conserva mejor el sentido étnico-comunitario sin introducir una idea moderna de estado-nación.
- source_word: ἔστω ὁ κύριος αὐτοῦ μετʼ αὐτοῦ
  english_pob_choice: may his Lord be with him
  chosen_spanish: que su Señor esté con él
  alternatives_spanish:
  - que su Señor sea con él
  - que el Señor suyo esté con él
  lexicon: LSJ
  rationale: κύριος se mantiene como «Señor» según el valor dado por el texto griego. El jussivo ἔστω se expresa naturalmente con «que ... esté». No se añade «Dios» porque el griego no lo dice.
- source_word: ἀναβὰς εἰς τὴν Ἰερουσαλὴμ τὴν ἐν τῇ Ἰουδαίᾳ
  english_pob_choice: go up to Jerusalem in Judea
  chosen_spanish: suba a Jerusalén, la cual está en Judea
  alternatives_spanish:
  - suba a Jerusalén en Judea
  - suba a Jerusalén, que está en Judea
  lexicon: LSJ
  rationale: ἀναβαίνω se traduce con «suba» para conservar el movimiento ascendente ligado a Jerusalén. La cláusula relativa explicita el apuntamiento geográfico del griego de modo claro en español.
- source_word: οἰκοδομείτωσαν
  english_pob_choice: let them build
  chosen_spanish: que edifiquen
  alternatives_spanish:
  - que construyan
  - que levanten
  lexicon: LSJ
  rationale: El plural imperativo del griego se conserva con «que edifiquen». «Edificar» mantiene el tono bíblico y el sentido de construir una casa/templo.
- source_word: τὸν οἶκον τοῦ κυρίου τοῦ Ἰσραήλ
  english_pob_choice: the house of the Lord of Israel
  chosen_spanish: la casa del Señor de Israel
  alternatives_spanish:
  - la casa del Señor, del Israel
  - la casa del Señor para Israel
  lexicon: LSJ
  rationale: 'Se mantiene la formulación algo inusual del griego: no se armoniza a «Dios de Israel» porque el texto dice literalmente «Señor de Israel». «Casa» traduce οἶκος de manera adecuada para el santuario/templo.'
- source_word: οὗτος ὁ κύριος ὁ κατασκηνώσας ἐν Ἰερουσαλήμ
  english_pob_choice: he is the Lord who dwells in Jerusalem
  chosen_spanish: éste es el Señor que habita en Jerusalén
  alternatives_spanish:
  - éste es el Señor que ha habitado en Jerusalén
  - éste es el Señor, el que se ha establecido en Jerusalén
  lexicon: LSJ
  rationale: κατασκηνόω tiene la idea de habitar/establecerse. «Habita» comunica bien esa permanencia sin forzar la imagen de ‘tabernacular’ en español contemporáneo.
theological_decisions:
- issue: Cómo rendir κύριος en un contexto de LXX/deuterocanónico
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - SEÑOR
  - Maestro
  rationale: Se sigue el valor de κύριος como título divino en el griego, pero en español se traduce como «Señor» en vez de la convención gráfica «SEÑOR», porque aquí el texto fuente es griego y la forma auditiva/lecturable corresponde a un título, no a una máscara tipográfica del tetragrámaton.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Si armonizar la última cláusula con el paralelismo hebreo/Esdras
  english_pob_reading: Retain the Greek wording 'he is the Lord who dwells in Jerusalem'
  chosen_spanish_reading: Conservar «éste es el Señor que habita en Jerusalén»
  alternative_spanish_readings:
  - éste es Dios, que está en Jerusalén
  - éste es el Señor, que está en Jerusalén
  rationale: La fidelidad auditiva exige seguir el griego de 1 Esdras, que identifica al Señor como el que habita en Jerusalén. No se sustituye por la forma más conocida de Esdras/MT, porque eso borraría una tensión textual documentada.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, original-language primacy over translation tradition/source harmonization
translation_notes:
  revision_awareness: La revisión inglesa más reciente regularizó el sujeto verbal al singular y prefirió «dwells»; en español se ha reflejado esa regularidad con verbos singulares («suba», «edifique») y un presente natural («habita»), manteniendo el contraste con el plural del griego en la forma de mandato distribuido sin suavizar el contenido textual.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος de modo uniforme.
  - Se conserva «Jerusalén» y «Judea» con grafía española estándar.
  - No se introdujo «Dios» en el cuerpo del texto porque el griego no lo contiene.
  - La formulación de «la casa» sigue el valor de οἶκος como templo/santuario sin explicitar «templo» para no añadir contenido no presente.
