translation:
  language: es
  text: Porque yo sé que sus rebeliones son muchas y que sus pecados son grandes—los que oprimen al justo, los que aceptan soborno[a], y los que privan de justicia a los necesitados en la puerta[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Soborno» traduce כֹפֶר en su sentido judicial más probable aquí; el hebreo también puede referirse a pago de rescate en otros contextos.
    reason: lexical_alternative
  - marker: b
    text: '«En la puerta» alude a la puerta de la ciudad, donde se atendían casos legales y decisiones públicas. También puede entenderse: «desvían a los necesitados de la justicia en la puerta».'
    reason: cultural_note
lexical_decisions:
- source_word: פִּשְׁעֵיכֶם / transgressions
  english_pob_choice: your transgressions are many
  chosen_spanish: sus rebeliones son muchas
  alternatives_spanish:
  - sus transgresiones son muchas
  - sus pecados son muchos
  lexicon: HALOT
  rationale: פֶּשַׁע expresa ruptura culpable, rebeldía o transgresión deliberada. En español, «rebeliones» conserva mejor esa carga de desafío voluntario que «pecados»; se mantiene la pluralidad y el predicado adjetival del hebreo.
- source_word: חַטֹּאתֵיכֶם / sins
  english_pob_choice: your sins are great
  chosen_spanish: sus pecados son grandes
  alternatives_spanish:
  - sus faltas son grandes
  - sus culpas son grandes
  lexicon: HALOT
  rationale: חַטָּאת apunta aquí al ámbito moral general de pecado. «Pecados» es el equivalente más claro y eclesialmente legible; «grandes» refleja la magnitud/intensidad del hebreo, no solo la cantidad.
- source_word: צֹרְרֵי צַדִּיק / oppressors of the righteous
  english_pob_choice: those who oppress the righteous
  chosen_spanish: los que oprimen al justo
  alternatives_spanish:
  - los que afligen al justo
  - los que hostigan al justo
  lexicon: HALOT
  rationale: El participio de צרר denota hostilidad/opresión activa. «Oprimen» comunica bien esa acción en español. Aunque el inglés POB usa «the righteous» como colectivo moral, el singular genérico «al justo» es una forma natural y fiel en español para ese valor colectivo.
- source_word: לֹקְחֵי כֹפֶר / takers of a bribe
  english_pob_choice: who take a bribe
  chosen_spanish: los que toman soborno
  alternatives_spanish:
  - los que reciben soborno
  - los que aceptan soborno
  lexicon: HALOT
  rationale: כֹּפֶר puede abarcar rescate/pago, pero en este contexto judicial la lectura de soborno es la más probable y la seguida por el POB inglés. «Tomar soborno» mantiene la concisión del participio y la fuerza de corrupción legal.
- source_word: וְאֶבְיוֹנִים / the needy
  english_pob_choice: the needy
  chosen_spanish: a los necesitados
  alternatives_spanish:
  - a los pobres
  - a los indigentes
  lexicon: HALOT
  rationale: אֶבְיוֹן describe a personas vulnerables y desamparadas. «Necesitados» es claro, natural y conserva el matiz social de dependencia y debilidad.
- source_word: בַּשַּׁעַר / in the gate
  english_pob_choice: in the gate
  chosen_spanish: en la puerta
  alternatives_spanish:
  - en la puerta de la ciudad
  - en la puerta de la ciudad
  lexicon: HALOT
  rationale: Aunque el hebreo usa el término idiomático «puerta» para el lugar de juicio público, en español «puerta» puede sonar más natural que una transliteración del idiomático «gate». Se conserva la expresión breve y se aclara el sentido cultural en nota.
- source_word: הִטּוּ / turn aside
  english_pob_choice: turn aside
  chosen_spanish: desvían
  alternatives_spanish:
  - apartan
  - tuercen
  lexicon: HALOT
  rationale: El hiphil de נטה en este contexto legal expresa desviar del curso debido o impedir justicia. «Desvían» conserva ese movimiento de apartar del camino correcto y funciona bien con el complemento personal.
theological_decisions:
- issue: Alcance moral y legal de צַדִּיק
  english_pob_reading: the righteous
  chosen_spanish_reading: al justo
  alternative_spanish_readings:
  - al inocente
  - al justo y recto
  rationale: El término puede referirse al justo en sentido moral y también al inocente en un contexto judicial. «Al justo» conserva amplitud semántica sin restringir indebidamente el texto solo al proceso forense.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: Sentido de כֹפֶר en contexto de corrupción judicial
  english_pob_reading: a bribe
  chosen_spanish_reading: soborno
  alternative_spanish_readings:
  - cohecho
  - rescate
  rationale: En este pasaje el contexto legal inclina claramente hacia soborno, no hacia rescate. «Soborno» evita un tecnicismo innecesario y preserva la denuncia profética de corrupción.
  doctrine_reference: Translation philosophy §5 (context-driven lexical differentiation)
- issue: Lugar de juicio público expresado por בַּשַּׁעַר
  english_pob_reading: in the gate
  chosen_spanish_reading: en la puerta
  alternative_spanish_readings:
  - en la puerta de la ciudad
  - en el portón
  rationale: La «puerta» de la ciudad era el sitio de decisiones legales y públicas. Mantener «puerta» conserva la imagen bíblica, mientras la nota explica el valor cultural-jurídico.
  doctrine_reference: Translation philosophy §5 (cultural-historical clarity)
translation_notes:
  revision_awareness: 'He seguido la revisión inglesa más reciente: mantuve el paralelismo de participios con oraciones relativas («los que...») y conservé la doble acusación de rebeliones/pecados como dos rasgos complementarios. En español, ajusté «gate» a «puerta» por naturalidad idiomática, con nota explicativa para el trasfondo jurídico.'
  spanish_consistency_notes:
  - He mantenido la distinción entre «rebeliones» (פֶּשַׁע) y «pecados» (חַטָּאת), evitando colapsarlas en un solo término.
  - «Al justo» preserva el valor colectivo-genericamente moral de צַדִּיק sin obligar al lector a una sola lectura forense.
  - La estructura con tres relativas («los que...») refleja el paralelismo del hebreo y la revisión inglesa auditada.
  - «Soborno» se usa por el contexto de corrupción judicial; no se ha optado por «rescate» porque sería semánticamente menos preciso aquí.
