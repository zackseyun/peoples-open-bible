translation:
  language: es
  text: e hizo salir a Israel de en medio de ellos[a], porque su amor fiel permanece para siempre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "de entre ellos"; el hebreo también puede expresar "de su medio".'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: "su amor fiel"; también puede verterse "su amor leal" o, tradicionalmente, "su misericordia".'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹצֵא
  english_pob_choice: and brought ... out
  chosen_spanish: e hizo salir
  alternatives_spanish:
  - y sacó
  - y condujo fuera
  lexicon: HALOT
  rationale: El hifil de יצא es causativo; en español, "hizo salir" conserva bien esa causatividad sin volver la frase pesada. "Sacó" también sería posible, pero "hizo salir" refleja mejor la acción de hacer salir a Israel.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  lexicon: HALOT
  rationale: Nombre propio del pueblo; se mantiene sin transliteración adicional ni sustitución.
- source_word: מִתּוֹכָם
  english_pob_choice: from among them
  chosen_spanish: de en medio de ellos
  alternatives_spanish:
  - de entre ellos
  - del medio de ellos
  lexicon: HALOT
  rationale: La expresión indica salida desde el interior o centro de un grupo. "De en medio de ellos" conserva esa fuerza relacional y funciona de manera natural en español.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: En este contexto el hebreo introduce la razón o fundamento del refrán. "Porque" expresa con claridad ese valor causal en español.
- source_word: לְעוֹלָם
  english_pob_choice: endures forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: El hebreo presenta una cláusula nominal de permanencia. En español, la idea queda de forma natural con "para siempre"; el verbo de duración se sobreentiende por el paralelismo del refrán.
- source_word: חַסְדּוֹ
  english_pob_choice: his steadfast love
  chosen_spanish: su amor fiel
  alternatives_spanish:
  - su amor constante
  - su misericordia
  - su lealtad amorosa
  lexicon: HALOT
  rationale: חסד combina lealtad, bondad y fidelidad pactal. "Amor fiel" comunica bien esa mezcla en español, evitando reducir el término a mera emoción o solo a "misericordia".
theological_decisions:
- issue: Cómo rendir el refrán de חסד en el Salmo 136
  english_pob_reading: his steadfast love endures forever
  chosen_spanish_reading: porque para siempre es su amor fiel
  alternative_spanish_readings:
  - porque su amor fiel permanece para siempre
  - porque para siempre dura su amor fiel
  - porque su misericordia es para siempre
  rationale: El énfasis teológico del refrán está en la permanencia del חסד divino, entendido como amor leal y duradero. "Amor fiel" conserva esa carga pactal y relacional sin limitarla a una sola faceta como "misericordia".
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave, o excepción documentada)
translation_notes:
  revision_awareness: El inglés POB mantiene la lectura causativa de וַיּוֹצֵא y la ambigüedad de מִתּוֹכָם con nota alternativa; también opta por "steadfast love" para חסד. No se registran revisiones posteriores que alteren esa decisión, y el control de concordancia reporta alta coincidencia sin cambios.
  spanish_consistency_notes:
  - Se evita "SEÑOR" porque el versículo no contiene el Tetragrámaton; no hay necesidad de máscara divina en este tramo.
  - '"Amor fiel" mantiene la terminología de חסד en un registro bíblico comprensible y consistente con el valor pactal del término.'
  - La cláusula final se formula como refrán poético natural en español, sin añadir contenido doctrinal ajeno al hebreo.
