revisions:
- from: ¿Acaso corren los caballos sobre la peña? ¿Acaso se ara allí con bueyes? Pero ustedes han convertido la justicia en veneno[a][b][c], y el fruto de la justicia en ajenjo.
  to: ¿Acaso corren los caballos sobre la peña? ¿Acaso se ara con bueyes? Pero ustedes han convertido la justicia en veneno[a], y el fruto de la rectitud[c] en ajenjo[b].
  rationale: La revisión elimina una sobreexplicación no presente en el hebreo («allí»), restituye la distinción principal entre מִשְׁפָּט y צְדָקָה con «justicia» / «rectitud», reubica las notas en sus palabras correspondientes y corrige el anglicismo «gall». Así se conserva mejor el sentido fuente, el criterio léxico del POB y la naturalidad del español.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:40:54Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura retórica y el sentido general del hebreo: dos preguntas proverbiales imposibles seguidas de la acusación de haber pervertido la justicia y el fruto de la rectitud. Sin embargo, hay dos desajustes con el rastro auditado y con el hebreo: (1) la segunda pregunta añade «allí», que sobreexplicita un objeto locativo implícito; y (2) la traducción repite «justicia» para צְדָקָה, borrando en el texto principal la distinción léxica que el POB inglés preservó entre מִשְׁפָּט y צְדָקָה.'
  spanish_quality_summary: 'El español es claro y digno. «¿Acaso corren...?» y «peña» son naturales. «Ajenjo» funciona bien. Pero el anclaje de notas está mal ordenado semánticamente: la nota cultural sobre «ajenjo» no debe colgar de «veneno». Además, repetir «justicia» en ambos miembros reduce precisión y calidad estilística. «¿Acaso se ara con bueyes?» suena más limpio que «¿Acaso se ara allí con bueyes?»'
  glossary_alignment: No hay conflicto con terminología de proyecto mayor. La cuestión principal es la distinción contextual entre מִשְׁפָּט = «justicia» y צְדָקָה = «rectitud» (o alternativamente «justicia» en nota). Conviene preservar en español la diferenciación documentada por el POB en el texto principal y dejar «justicia» como alternativa en nota para צְדָקָה.
  issues:
  - severity: medium
    issue: Se añade «allí» en la segunda pregunta.
    rationale: El hebreo no explicita ese adverbio; el inglés auditado evitó sobreespecificar el objeto/lugar implícito. En español la pregunta funciona naturalmente sin «allí».
  - severity: high
    issue: Se traduce צְדָקָה también como «justicia» en el texto principal.
    rationale: Esto borra la distinción léxica y conceptual que el POB inglés mantuvo entre «justice» y «righteousness», conservando solo la alternativa en nota. En español «rectitud» preserva mejor el contraste sin sonar ininteligible.
  - severity: medium
    issue: Las notas [a][b][c] están ancladas en «veneno», incluyendo la nota cultural sobre «ajenjo».
    rationale: Cada nota debe anclarse en la palabra o frase pertinente. La nota sobre «ajenjo» debe marcarse junto a «ajenjo», y la alternativa sobre «rectitud/justicia» junto a esa frase.
  - severity: low
    issue: La nota a incluye «gall», anglicismo no natural en español.
    rationale: Debe decir «hiel» o, si se quiere conservar tradición, «veneno»/«amargura»; «gall» no es forma española.
  revised_spanish_text: ¿Acaso corren los caballos sobre la peña? ¿Acaso se ara con bueyes? Pero ustedes han convertido la justicia en veneno[a], y el fruto de la rectitud[c] en ajenjo[b].
  revised_footnotes:
  - marker: a
    text: O «en hiel» para «en veneno»; el hebreo רֹאשׁ puede designar una sustancia o planta amarga o venenosa.
    reason: lexical_alternative
  - marker: b
    text: «Ajenjo» nombra una planta muy amarga usada metafóricamente para corrupción moral y amarga consecuencia.
    reason: cultural_note
  - marker: c
    text: O «el fruto de la justicia» para «el fruto de la rectitud»; el hebreo צְדָקָה puede llevar matiz moral o jurídico según el contexto.
    reason: lexical_alternative
  revision_rationale: La revisión elimina una sobreexplicación no presente en el hebreo («allí»), restituye la distinción principal entre מִשְׁפָּט y צְדָקָה con «justicia» / «rectitud», reubica las notas en sus palabras correspondientes y corrige el anglicismo «gall». Así se conserva mejor el sentido fuente, el criterio léxico del POB y la naturalidad del español.
