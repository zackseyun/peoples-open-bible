translation:
  language: es
  text: Pero en cuanto a sus posesiones y a su matrimonio y a sus hijos[a], mientras ora no se avergüenza de dirigirse a la cosa sin vida[b]; y en cuanto a la salud, invoca lo que es débil[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'asuntos matrimoniales'. El griego tiene el plural 'matrimonios'.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'la cosa sin vida'; el autor evita nombrar directamente al ídolo y lo describe como carente de vida.
    reason: lexical_alternative
  - marker: c
    text: O 'lo débil' / 'la cosa débil'. La frase se refiere despectivamente al ídolo impotente.
    reason: lexical_alternative
lexical_decisions:
- source_word: κτημάτων
  english_pob_choice: possessions
  chosen_spanish: posesiones
  alternatives_spanish:
  - bienes
  - propiedades
  lexicon: LSJ
  rationale: κτημάτων abarca bienes o propiedades poseídas. 'Posesiones' es natural en español y conserva el alcance material general sin restringirlo a tierra u objetos específicos.
- source_word: γάμων
  english_pob_choice: marriage
  chosen_spanish: matrimonio
  alternatives_spanish:
  - bodas
  - asuntos matrimoniales
  lexicon: LSJ
  rationale: Aunque el griego plural puede sugerir 'matrimonios' o 'asuntos matrimoniales', el antecedente auditado del inglés revisó a singular por sentido más natural. En español, 'matrimonio' comunica mejor el ámbito de la relación conyugal sin forzar una pluralidad extraña.
- source_word: τέκνων
  english_pob_choice: children
  chosen_spanish: hijos
  alternatives_spanish:
  - niños
  - descendencia
  lexicon: LSJ
  rationale: τέκνων significa hijos/descendencia. 'Hijos' es la opción más directa y sobria en español, y funciona bien junto a 'posesiones' y 'matrimonio'.
- source_word: προσευχόμενος
  english_pob_choice: while praying
  chosen_spanish: mientras ora
  alternatives_spanish:
  - mientras está orando
  - orando
  lexicon: LSJ
  rationale: El participio se vierte adverbialmente para enlazar la oración con la acción de hablar al objeto sin vida. 'Mientras ora' es claro y fluido en español.
- source_word: οὐκ αἰσχύνεται
  english_pob_choice: he is not ashamed
  chosen_spanish: no se avergüenza
  alternatives_spanish:
  - no siente vergüenza
  - no le da vergüenza
  lexicon: LSJ
  rationale: 'La expresión preserva el tono moral de la frase: una falta de vergüenza al dirigirse a un ídolo. ''No se avergüenza'' sigue de cerca el griego y su fuerza polémica.'
- source_word: τῷ ἀψύχῳ
  english_pob_choice: the lifeless thing
  chosen_spanish: la cosa sin vida
  alternatives_spanish:
  - el ser sin vida
  - la cosa inanimada
  - la cosa muerta
  lexicon: LSJ
  rationale: ἀψύχῳ significa sin vida, sin aliento. 'La cosa sin vida' conserva el matiz despectivo del griego y evita introducir explícitamente 'ídolo' en el texto principal, como hace el inglés POB.
- source_word: προσλαλῶν
  english_pob_choice: to address
  chosen_spanish: hablarle a
  alternatives_spanish:
  - dirigirse a
  - hablar con
  lexicon: LSJ
  rationale: El verbo indica hablar a alguien o algo. En español, 'hablarle a' es natural y mantiene la idea de dirigirse al objeto de la oración sin sobrerinterpretar con 'invocar' o 'suplicar'.
- source_word: ὑγείας
  english_pob_choice: health
  chosen_spanish: la salud
  alternatives_spanish:
  - sanidad
  - bienestar
  lexicon: LSJ
  rationale: ὑγείας significa salud. 'La salud' es la correspondencia más directa y común en español.
- source_word: τὸ ἀσθενές
  english_pob_choice: what is weak
  chosen_spanish: lo débil
  alternatives_spanish:
  - la cosa débil
  - lo endeble
  - lo impotente
  lexicon: LSJ
  rationale: El neutro sustantivado presenta al objeto con desprecio como algo débil. 'Lo débil' mantiene la abstracción y la descalificación sin añadir sustantivos interpretativos.
- source_word: ἐπικαλεῖται
  english_pob_choice: he calls on
  chosen_spanish: invoca
  alternatives_spanish:
  - invoca a
  - clama a
  - llama a
  lexicon: LSJ
  rationale: En contexto de oración, ἐπικαλεῖται es 'invocar' o 'llamar sobre'. 'Invoca' mantiene el registro religioso y la fuerza cultual del verbo, coherente con el contexto.
theological_decisions:
- issue: Descripción polémica del ídolo como sin vida / débil
  english_pob_reading: Render both expressions in a way that emphasizes the idol's lack of life and power without adding interpretive nouns like 'idol' into the main text.
  chosen_spanish_reading: 'Mantener expresiones descriptivas: ''la cosa sin vida'' y ''lo débil'', sin introducir ''ídolo'' en el cuerpo principal.'
  alternative_spanish_readings:
  - el ídolo sin vida
  - el objeto impotente
  - la cosa muerta
  rationale: El griego usa sintagmas neutros descriptivos y no repite un sustantivo explícito equivalente a 'ídolo'. La traducción española conserva esa ironía polemizante sin cerrar el matiz del original.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Plural griego γάμων y su sentido en español
  english_pob_reading: Changed 'marriages' to 'marriage' for more natural and likely intended sense of γάμων here.
  chosen_spanish_reading: Usar 'matrimonio' en singular en el texto principal.
  alternative_spanish_readings:
  - matrimonios
  - asuntos matrimoniales
  rationale: Aunque el plural griego es real y merece atención, el propio audit trail indica que una lectura singular es más natural y probablemente correcta. En español, 'matrimonio' evita una pluralidad artificial y sigue la revisión asentada.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: 'El texto español sigue el pasaje auditado con la revisión más reciente del inglés: se adopta el sentido singular de γάμων como ''matrimonio'', y se mantiene la retórica despectiva de ''sin vida'' y ''lo débil'' para τῷ ἀψύχῳ y τὸ ἀσθενές.'
  spanish_consistency_notes:
  - Se conserva 'Dios' y no aparece lenguaje teológico no presente en el versículo.
  - '''Ora'' y ''invoca'' distinguen bien el acto de oración general y la invocación concreta al objeto sin vida.'
  - Se evita 'Señor' u այլ títulos no motivados por el texto griego.
  - El orden sintáctico español sigue de cerca el original sin sonar forzado.
