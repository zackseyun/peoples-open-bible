revisions:
- from: Entonces el rey Roboam envió a Adoram[a], que estaba sobre el trabajo forzado, y todo Israel lo apedreó con piedras, y murió[b]. Y el rey Roboam se apresuró a subir al carro para huir a Jerusalén[c].
  to: Entonces el rey Roboam envió a Adoram[a], que estaba a cargo del trabajo forzado, y todo Israel lo apedreó con piedras[b], y murió. Y el rey Roboam se apresuró[c] a subir al carro para huir a Jerusalén.
  rationale: Se corrige la frase administrativa calcada por una formulación natural en español ('a cargo de'). Se reubica la nota b al lugar donde comenta la expresión hebrea explícita sobre la lapidación y se arregla su redacción. Se reancla la nota c a 'se apresuró'. El resto del contenido se mantiene porque refleja bien el sentido del hebreo y la auditoría inglesa.
