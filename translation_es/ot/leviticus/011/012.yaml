review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del hebreo: universalidad de כֹּל, condición negativa de posesión, los términos zoológicos «aletas» y «escamas», y el predicado fuerte de שֶׁקֶץ. También preserva adecuadamente la nota de alternativa léxica. Sin embargo, «está en el agua» añade una matización existencial/locativa menos directa que el original clasificatorio «en el agua», y «para ustedes» es menos preciso que «para/a ustedes» frente a לָכֶם y al rastro inglés «to you».'
  spanish_quality_summary: El español es claro y natural, pero puede mejorarse para sonar más directo y fiel al estilo legal clasificatorio de Levítico. «Todo lo que está en el agua» es comprensible, aunque «Todo lo que hay en el agua» o mejor «Todo lo que en el agua no tiene...» evitaría introducir «está». La forma más natural y exacta aquí es «Todo lo que en el agua no tiene aletas ni escamas es detestable para ustedes».
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Detestable» sigue correctamente la decisión para שֶׁקֶץ, con «abominable» conservado como alternativa en nota. No aparecen términos sensibles como Yahvé, Mesías, etc. La única corrección recomendada es ajustar la preposición final para reflejar mejor לָכֶם.
  issues:
  - severity: medium
    issue: «está en el agua» añade un matiz no necesario
    rationale: El hebreo בַּמָּיִם funciona como localización dentro de una descripción clasificatoria; «está en el agua» suena más circunstancial o existencial que el original. «en el agua» integrado en la cláusula conserva mejor la forma y el sentido.
  - severity: low
    issue: «para ustedes» es menos directo que el valor de destinatario de לָכֶם
    rationale: Aunque no es incorrecto, el hebreo y el POB inglés apuntan más directamente a «a ustedes» o, si se mantiene la construcción predicativa española, «para ustedes» puede sonar ligeramente más aplicativo que destinatario. En este caso sigue siendo aceptable; la revisión la conserva por naturalidad con «es detestable para ustedes».
  revised_spanish_text: Todo lo que en el agua no tiene aletas ni escamas es detestable para ustedes[a].
