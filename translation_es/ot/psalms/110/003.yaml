translation:
  language: es
  text: Tu pueblo se ofrecerá voluntariamente en el día de tu poder[a], en santo esplendor[b]; desde el seno de la aurora[c], tuyo es el rocío de tu juventud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Tu pueblo será ofrenda voluntaria en el día de tu fuerza/ejército». El hebreo usa el sustantivo «ofrendas voluntarias» de manera poética para expresar una entrega voluntaria.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en santo arreglo», «en los esplendores de la santidad» o posiblemente «en vestiduras santas».'
    reason: lexical_alternative
  - marker: c
    text: La línea final es difícil. Puede significar «tus jóvenes son para ti como rocío del seno de la aurora» o hablar de la frescura de tu juventud.
    reason: alternative_reading
lexical_decisions:
- source_word: עַמְּךָ
  english_pob_choice: your people
  chosen_spanish: tu pueblo
  alternatives_spanish:
  - tu gente
  - tu ejército
  - tus tropas
  lexicon: HALOT
  rationale: עַם denota normalmente 'pueblo' más que una fuerza militar. En español, 'tu pueblo' conserva el sentido básico y permite que el trasfondo real y guerrero del salmo venga del contexto, no de una restricción léxica no necesaria.
- source_word: נְדָבֹת
  english_pob_choice: will offer themselves freely
  chosen_spanish: se ofrecerá voluntariamente
  alternatives_spanish:
  - serán ofrendas voluntarias
  - se presentará voluntariamente
  - se ofrecerán como ofrenda voluntaria
  lexicon: HALOT
  rationale: El sustantivo plural funciona de modo predicativo con 'tu pueblo' y expresa voluntariedad. En español, una forma verbal comunica mejor la idea de auto-presentación libre sin perder la fuerza de 'ofrenda voluntaria' implícita en el hebreo.
- source_word: בְּיוֹם
  english_pob_choice: on the day of
  chosen_spanish: en el día de
  alternatives_spanish:
  - el día de
  - para el día de
  lexicon: HALOT
  rationale: La construcción temporal con ב + יום se expresa de modo natural en español como 'en el día de'. Mantiene el valor temporal sin forzar un giro más interpretativo.
- source_word: חֵילֶךָ
  english_pob_choice: your power
  chosen_spanish: tu poder
  alternatives_spanish:
  - tu ejército
  - tu fuerza
  - tu hueste
  lexicon: HALOT
  rationale: חיל puede significar poder, fuerza, riqueza o ejército. Dado que la POB en inglés preserva el sentido amplio 'power', 'tu poder' evita concretar demasiado en 'ejército' y conserva el trasfondo de manifestación de fuerza regia.
- source_word: בְּהַדְרֵי קֹדֶשׁ
  english_pob_choice: in holy splendor
  chosen_spanish: en esplendor santo
  alternatives_spanish:
  - en vestiduras santas
  - en esplendor de santidad
  - en arreglo santo
  lexicon: HALOT
  rationale: La frase puede aludir a adorno/vestiduras sagradas o al resplandor caracterizado por la santidad. 'Esplendor santo' conserva la ambigüedad poética del inglés POB y suena natural en español.
- source_word: מֵרֶחֶם מִשְׁחָר
  english_pob_choice: from the womb of the dawn
  chosen_spanish: desde el seno de la aurora
  alternatives_spanish:
  - desde el vientre de la aurora
  - desde el seno del alba
  - desde el vientre del amanecer
  lexicon: HALOT
  rationale: '''Seno'' reproduce bien la metáfora de origen del hebreo רֶחֶם sin sonar biológicamente rígido; ''aurora'' comunica el campo semántico de dawn/morning twilight y mantiene el tono poético.'
- source_word: לְךָ
  english_pob_choice: to you belongs
  chosen_spanish: tuyo es
  alternatives_spanish:
  - a ti pertenece
  - para ti es
  - te pertenece
  lexicon: HALOT
  rationale: El ל hebreo es muy breve y poético. En español, 'tuyo es' expresa con concisión la relación de pertenencia implícita sin añadir una explicación más larga que debilite el paralelismo.
- source_word: טַל
  english_pob_choice: the dew
  chosen_spanish: el rocío
  alternatives_spanish:
  - el rocío matinal
  - la escarcha
  - el relente
  lexicon: HALOT
  rationale: '''Rocío'' es el equivalente natural en español para טַל y preserva la imagen de frescura y abundancia asociada con el verso.'
- source_word: יַלְדֻתֶיךָ
  english_pob_choice: your youth
  chosen_spanish: tu juventud
  alternatives_spanish:
  - tus jóvenes
  - tu vigor juvenil
  - tus años mozos
  lexicon: HALOT
  rationale: El término admite varias lecturas, desde juventud como cualidad hasta jóvenes como compañía. Siguiendo el inglés POB, 'tu juventud' conserva la ambigüedad entre vigor juvenil y jóvenes como imagen colectiva, sin resolver de forma prematura la tensión poética.
theological_decisions:
- issue: 'Sentido del último hemistiquio: ''tuyo es el rocío de tu juventud'''
  english_pob_reading: A poetic statement about the king's youthful freshness/vigor or the freshness of his following, not an explicit statement of eternal generation.
  chosen_spanish_reading: Una imagen poética sobre la frescura juvenil del rey o de su séquito, no una afirmación explícita de generación eterna.
  alternative_spanish_readings:
  - Los jóvenes del rey son como rocío
  - Una referencia cristológica a engendramiento eterno
  - La vitalidad juvenil del mesías
  rationale: El hebreo es difícil y comprimido. La traducción española conserva la imagen sin imponer una conclusión doctrinal posterior. Así se mantiene la tensión interpretativa documentada por la POB inglesa y se evita cerrar el texto en un sentido que el hebreo no exige.
  doctrine_reference: Translation philosophy §3
- issue: Valor de חֵילֶךָ en el marco real-escatológico del salmo
  english_pob_reading: your power
  chosen_spanish_reading: tu poder
  alternative_spanish_readings:
  - tu ejército
  - tu hueste
  - tu fuerza
  rationale: Aunque el contexto admite resonancias militares, el término hebreo es más amplio. 'Tu poder' permite que la dimensión bélica emerja del conjunto del salmo sin estrechar indebidamente el alcance lexical.
  doctrine_reference: Lexical transparency principle
translation_notes:
  revision_awareness: 'Se mantuvo la lectura de alta concordancia del último repaso: no hubo cambios sustantivos en el sentido general. La redacción española sigue la auditoría inglesa y conserva las ambigüedades señaladas en el texto fuente.'
  spanish_consistency_notes:
  - Se usó 'tu'/'tuyo' de forma uniforme para el sufijo de segunda persona masculina singular.
  - Se preservó la ambigüedad poética del final sin convertirla en una formulación doctrinal.
  - '''Aurora'' se emplea para reflejar el campo semántico de dawn/morning twilight, manteniendo registro bíblico pero con español moderno.'
  - '''Esplendor santo'' evita el giro más eclesiástico ''vestiduras'' en el texto principal, reservando esa posibilidad para la nota.'
  - No se usó 'SEÑOR' para el nombre divino porque este versículo no contiene יהוה explícito.
