revisions:
- from: Para que tu confianza esté en Yahvé, te lo he dado[a] a conocer hoy, sí, a ti mismo.
  to: Para que tu confianza esté en Yahvé, te he hecho saber[a] hoy, aun a ti.
  rationale: Se quita «lo» para respetar la ausencia de objeto expreso en הוֹדַעְתִּיךָ, en línea con la auditoría inglesa revisada. Se sustituye «sí, a ti mismo» por «aun a ti» para reflejar con más fidelidad y naturalidad el énfasis de אַף אָתָּה. «Te he hecho saber» preserva bien el causativo de ידע y suena más natural que «te lo he dado a conocer» en esta construcción elíptica.
  reviewer_model: gpt-5.4
