base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/004/047.yaml
  text: Then King Darius stood up and kissed him[a], and wrote letters for him to all the stewards and regional governors and generals and satraps[b], that they should escort him and all those with him who were going up to build Jerusalem.
  footnotes:
  - marker: a
    text: Or 'send him on his way with support'; the Greek verb can include the idea of providing assistance for a journey, not only personal escort.
    reason: lexical_alternative
  - marker: b
    text: Some translators render 'to rebuild Jerusalem' from the broader context, but the Greek verb here is simply 'to build.'
    reason: lexical_alternative
