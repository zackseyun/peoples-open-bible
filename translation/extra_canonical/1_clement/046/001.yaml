  text: Τοιούτοις οὖν ὑποδείγμασιν κολληθῆναι καὶ ἡμᾶς δεῖ, ἀδελφοί. 2. γέγραπται γάρ· Κολλᾶσθε τοῖς ἁγίοις, ὅτι οἱ κολλώμενοι αὐτοῖς ἁγιασθήσονται. 3. καὶ πάλιν ἐν ἑτέρῳ τόπῳ λέγει· Μετὰ ἀνδρὸς ἀθῴου ἀθῷος ἔσῃ καὶ μετὰ ἐκλεκτοῦ ἐκλεκτὸς ἔσῃ, καὶ μετὰ στρεβλοῦ διαστρέψεις. 4. κολληθῶμεν οὖν τοῖς ἀθῴοις καὶ δικαίοις· εἰσὶν δὲ οὗτοι ἐκλεκτοὶ τοῦ θεοῦ. . ἱνατί ἔρεις καὶ θυμοὶ καὶ διχοστασίαι καὶ σχίσματα πόλεμός τε ἐν ὑμῖν; 6. ἢ οὐχὶ ἕνα θεὸν ἔχομεν καὶ ἕνα Χριστὸν καὶ ἓν πνεῦμα τῆς χάριτος τὸ ἐκχυθὲν ἐφ’ ἡμᾶς, καὶ μία κλῆσις ἐν Χριστῷ; . ἱνατί διέλκωμεν καὶ διασπῶμεν τὰ μέλη τοῦ Χριστοῦ καὶ στασιάζομεν πρὸς τὸ σῶμα τὸ ἴδιον, καὶ εἰς τοσαύτην ἀπόνοιαν ἐρχόμεθα, ὥστε ἐπιλαθέσθαι ἡμᾶς, ὅτι μέλη ἐσμὲν ἀλλήλων; μνήσθητε τῶν λόγων Ἰησοῦ τοῦ κυρίου ἡμῶν. 8. εἶπεν γάρ· Οὐαὶ τῷ ἀνθρώπῳ ἐκείνῳ· καλὸν ἦν αὐτῷ, εἰ οὐκ ἐγεννήθη, ἢ ἕνα τῶν ἐκλεκτῶν μου σκανδαλίσαι· κρεῖττον ἦν αὐτῷ περιτεθῆναι μύλον καὶ καταποντισθῆναι εἰς τὴν θάλασσαν, ἢ ἕνα τῶν ἐκλεκτῶν μου διαστρέψαι. 9. τὸ σχίσμα ὑμῶν πολλοὺς διέστρεψεν, πολλοὺς εἰς ἀθυμίαν ἔβαλεν, πολλοὺς εἰς δισταγμόν, τοὺς πάντας ἡμᾶς εἰς λύπην· καὶ ἐπίμονος ὑμῶν ἐστὶν ἡ στάσις.
