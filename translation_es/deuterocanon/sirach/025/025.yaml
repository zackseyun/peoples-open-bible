base_translation:
  language: en
  yaml_path: translation/deuterocanon/sirach/025/025.yaml
  text: A bad wife is leprosy to her husband[a]; let him drive her out of his house[c][b], and he will be healed of his leprosy.
  footnotes:
  - marker: a
    text: Hebrew צָרַעַת, traditionally 'leprosy,' refers broadly to a serious skin affliction in biblical usage, not necessarily modern leprosy.
    reason: cultural_note
  - marker: b
    text: Or 'he should divorce her'; the Hebrew more literally says 'drive her out of his house,' which may imply separation without specifying the legal form.
    reason: alternative_reading
  - marker: c
    text: 'The Greek parallel reads quite differently: ''Do not give water an outlet, nor authority to a wicked wife.'' The English here follows the extant Hebrew witness as the primary source for this verse.'
    reason: textual_variant
