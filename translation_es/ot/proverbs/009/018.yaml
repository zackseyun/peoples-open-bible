    issue: La nota al pie alternativa está formulada como «las sombras están allí»
    rationale: 'El texto principal ancla la nota en «muertos[a]», por lo que la alternativa debe corresponder léxicamente a ese elemento: «O “las sombras”». La redacción actual mezcla el sustantivo alternativo con el adverbio «allí», lo que no refleja limpiamente la alternativa preservada en inglés.'
  revised_spanish_text: Pero él no sabe que allí están los muertos[a], que sus invitados están en lo profundo de Sheol.
  revised_footnotes:
  - marker: a
    text: O «las sombras». El hebreo רְפָאִים se refiere a los muertos, los difuntos en Sheol.
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel y natural; solo se corrige la nota al pie para que la alternativa léxica corresponda exactamente al término marcado y no a toda la cláusula.
