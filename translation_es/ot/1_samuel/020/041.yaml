translation:
  language: es
  text: Cuando llegó el muchacho[a], David se levantó de junto al sur y cayó con el rostro en tierra, y se inclinó tres veces. Entonces se besaron el uno al otro y lloraron juntos[b], hasta que David lloró más.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente «desde junto al Neguev / sur». La expresión es difícil, y muchos la entienden como referencia al montículo o piedra cerca del escondite de David en el contexto inmediato.
    reason: alternative_reading
  - marker: b
    text: 'O: «hasta que David lloró más», es decir, su llanto superó al de Jonatán o se volvió más intenso.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנַּעַר בָּא
  english_pob_choice: When the boy had come
  chosen_spanish: Cuando llegó el muchacho
  alternatives_spanish:
  - Cuando vino el muchacho
  - Cuando el joven llegó
  - Después de que llegó el muchacho
  lexicon: HALOT
  rationale: נַעַר puede significar muchacho, joven o criado según el contexto. Aquí se refiere al asistente que acaba de entrar en la escena previa, por lo que «muchacho» conserva la referencia concreta y naturalidad narrativa. «Llegó» expresa bien el valor temporal del verbo en español.
- source_word: מֵאֵצֶל הַנֶּגֶב
  english_pob_choice: from beside the south side
  chosen_spanish: de junto al lado sur
  alternatives_spanish:
  - de junto al Neguev
  - de junto al lado del sur
  - desde el lado sur
  lexicon: HALOT
  rationale: La expresión hebrea es difícil. El audit trail inglés opta por una solución espacial concreta, pero reconoce la dificultad del sintagma. En español, «de junto al lado sur» mantiene la referencia espacial sin imponer una paráfrasis excesiva ni borrar la ambigüedad del hebreo.
- source_word: וַיִּפֹּל לְאַפָּיו אַרְצָה
  english_pob_choice: fell with his face to the ground
  chosen_spanish: cayó rostro en tierra
  alternatives_spanish:
  - cayó con el rostro en tierra
  - se postró con el rostro en tierra
  - cayó de cara al suelo
  lexicon: HALOT
  rationale: La frase hebrea describe la postura corporal literalmente. «Cayó rostro en tierra» es una fórmula bíblica clara en español y conserva el sentido de postración sin suavizarlo.
- source_word: וַיִּשְׁתַּחוּ שָׁלֹשׁ פְּעָמִים
  english_pob_choice: and bowed three times
  chosen_spanish: y se inclinó tres veces
  alternatives_spanish:
  - y se postró tres veces
  - y rindió homenaje tres veces
  - y se inclinó tres veces ante él
  lexicon: HALOT
  rationale: El verbo שׁחה aquí expresa inclinación/prostración; el inglés POB prefiere «bowed» para evitar sobreinterpretar. En español, «se inclinó» conserva la acción visible y deja abierto el matiz social de reverencia sin añadir vocabulario eclesiástico.
- source_word: וַיִּשְּׁקוּ אִישׁ אֶת רֵעֵהוּ
  english_pob_choice: Then they kissed one another
  chosen_spanish: Entonces se besaron el uno al otro
  alternatives_spanish:
  - Entonces se besaron mutuamente
  - Entonces se besó cada uno con su amigo
  - Entonces se dieron un beso el uno al otro
  lexicon: HALOT
  rationale: La construcción recíproca se expresa naturalmente en español con «se besaron el uno al otro», manteniendo el gesto de despedida/afecto sin eufemismo.
- source_word: וַיִּבְכּוּ אִישׁ אֶת רֵעֵהוּ
  english_pob_choice: and wept with one another
  chosen_spanish: y lloraron el uno con el otro
  alternatives_spanish:
  - y lloraron juntos
  - y lloró cada uno con su amigo
  - y se lamentaron el uno con el otro
  lexicon: HALOT
  rationale: El paralelismo recíproco del hebreo merece conservarse. «Lloraron el uno con el otro» comunica la mutua participación emocional mejor que una simplificación como «lloraron juntos».
- source_word: עַד דָּוִד הִגְדִּיל
  english_pob_choice: until David wept the more
  chosen_spanish: hasta que David lloró más
  alternatives_spanish:
  - hasta que David lloró más intensamente
  - hasta que David lloró en mayor medida
  - hasta que David se hizo más grande
  lexicon: HALOT
  rationale: 'El verbo גדל aquí funciona idiomáticamente en el contexto del llanto: indica que David lloró con mayor intensidad o en mayor grado. «Lloró más» conserva la comparación sin introducir un objeto que el hebreo no da.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió una lectura espacial concreta de מֵאֵצֶל הַנֶּגֶב. En español se evitó «mound» y se siguió esa decisión como un equivalente espacial sobrio, sin ocultar la dificultad del hebreo mediante nota.
  spanish_consistency_notes:
  - Se mantuvo «muchacho» para נַעַר, en coherencia con el uso contextual del asistente juvenil en la escena.
  - Se preservó la reciprocidad del hebreo con construcciones dobles «el uno al otro», tanto en besarse como en llorar.
  - Se evitó «postrarse» para וַיִּשְׁתַּחוּ para no cargar el gesto con un matiz más fuerte del que exige el contexto inmediato, aunque «se inclinó» sigue siendo reverencial.
  - «Yahvé» no aparece en este versículo; no se requiere decisión sobre el nombre divino.
