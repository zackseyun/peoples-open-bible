translation:
  language: es
  text: 'Y vino a mí la palabra de Yahvé[a], diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo YHWH; tradicionalmente se traduce «el SEÑOR»; alternativamente, se translitera «Yahvé».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ... came
  chosen_spanish: Y vino
  alternatives_spanish:
  - Y aconteció
  - Y sucedió
  lexicon: HALOT
  rationale: El hebreo usa la forma narrativa típica que introduce una acción secuencial. En español, «vino» reproduce con naturalidad la fórmula profética «vino la palabra» sin añadir arcaísmo innecesario.
- source_word: דְבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - una palabra
  lexicon: HALOT
  rationale: En la fórmula profética דְבַר יְהוָה, «la palabra» conserva la concreción y la forma estable del hebreo. «Mensaje» suaviza demasiado la expresión.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino en transliteración hispana, conforme al criterio del proyecto para יְהוָה. «SEÑOR» ocultaría el nombre propio; «Yahweh» es comprensible, pero «Yahvé» es la forma española más natural y reconocible.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - hacia mí
  - para mí
  lexicon: HALOT
  rationale: La preposición con sufijo expresa dirección hacia el profeta. «A mí» es la equivalencia directa y natural en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - con estas palabras
  lexicon: HALOT
  rationale: El infinitivo constructo introduce la cita directa. «Diciendo» conserva la fórmula hebrea de manera compacta y fiel.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo contiene el Tetragrámaton, no un título sustitutivo. «Yahvé» preserva el nombre propio del pacto y evita la sustitución tradicional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador de nota [a] aparezca explícitamente en el texto español, anclado en el nombre divino.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente con el criterio del proyecto para el Tetragrámaton.
  - La frase sigue la fórmula profética breve y no introduce información adicional.
  - «Diciendo» mantiene el valor introductorio de לֵאמֹר sin convertirlo en un verbo narrativo independiente.
