revisions:
- from: Y si Senaquerib el rey mató a alguno[a] cuando vino huyendo de Judea, yo los sepulté a escondidas; porque en su ira mató a muchos, y los cuerpos fueron buscados por el rey, pero no fueron hallados.
  to: Y si Senaquerib el rey[a] mataba a alguno cuando vino huyendo de Judea, yo los sepulté a escondidas; porque en su ira mató a muchos, y los cuerpos fueron buscados por el rey, pero no fueron hallados.
  rationale: Se ajustó la primera cláusula para evitar la incongruencia española entre singular y plural y para expresar mejor el matiz general/habitual del griego. Se mantuvo intacta la decisión textual sobre «Senaquerib» con la nota de variante griega.
