revisions:
- from: Muramos fraternalmente, hermanos, por causa de la ley; imitemos a los tres jóvenes de Siria[a], que despreciaron el horno de igual tormento[b].
  to: Muramos como hermanos, hermanos, por causa de la ley; imitemos a los tres jóvenes de Siria[a], que despreciaron el horno de igual tormento[b].
  rationale: Se reemplaza «fraternalmente» por «como hermanos» y se restaura la repetición «hermanos» para reflejar con mayor fidelidad la doble énfasis del griego y la decisión documentada en el POB inglés. Se conservan «Siria» y «horno de igual tormento», junto con sus notas, porque representan adecuadamente el texto fuente y su incertidumbre léxica.
