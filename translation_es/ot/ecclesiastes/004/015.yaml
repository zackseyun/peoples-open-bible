- from: Vi a todos los vivientes[a], a los que andan bajo el sol, con el segundo joven[b], que se pondría en su lugar.
  to: Vi a todos los vivientes, a los que andan bajo el sol, con el segundo joven[a], que estaría en su lugar.
  rationale: Se ajusta «que se pondría» a «que estaría» para representar mejor אֲשֶׁר יַעֲמֹד en un español más natural y fiel al contexto de sucesión. Se conserva «el segundo joven» en el texto principal por su equilibrio entre literalidad y contexto, y se concentra la alternativa léxica relevante en una sola nota al pie anclada donde corresponde.
