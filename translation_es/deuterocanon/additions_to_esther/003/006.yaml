lexical_decisions:
- source_word: ἠδυνάμην
  english_pob_choice: I could have
  chosen_spanish: podría haber
  alternatives_spanish:
  - habría podido
  - podía haber
  lexicon: BDAG
  rationale: El imperfecto de δύναμαι aquí expresa capacidad en un marco pasado hipotético. En español, «podría haber» reproduce bien esa posibilidad no realizada sin convertirla en una acción efectivamente cumplida.
- source_word: φιλεῖν
  english_pob_choice: kissed
  chosen_spanish: besado
  alternatives_spanish:
  - amado
  - mostrado afecto a
  lexicon: BDAG
  rationale: Con un objeto corporal concreto («las plantas de sus pies»), φιλέω apunta naturalmente al gesto físico de besar. «Besado» conserva la imagen de homenaje o sumisión y evita suavizarla como mera afección.
- source_word: πέλματα ποδῶν
  english_pob_choice: the soles of his feet
  chosen_spanish: las plantas de sus pies
  alternatives_spanish:
  - las suelas de sus pies
  - sus pies, por debajo
  lexicon: LSJ
  rationale: πέλμα es la planta o parte inferior del pie. «Las plantas de sus pies» es una expresión natural en español y conserva la corporalidad y el énfasis del original.
- source_word: πρὸς σωτηρίαν Ἰσραήλ
  english_pob_choice: for the salvation of Israel
  chosen_spanish: para la salvación de Israel
  alternatives_spanish:
  - para la liberación de Israel
  - hacia la salvación de Israel
  lexicon: BDAG
  rationale: σωτηρία puede significar «salvación» o «liberación». Se conserva «salvación» como equivalente léxico principal, y «para» expresa finalidad. En este contexto, la frase apunta al rescate de Israel.
theological_decisions:
- issue: Sentido de la frase sobre el homenaje al rey
  english_pob_reading: A hypothetical statement of willingness to perform an act of extreme homage for Israel's rescue
  chosen_spanish_reading: Una afirmación hipotética de que habría podido realizar un gesto extremo de homenaje por la salvación de Israel
  alternative_spanish_readings:
  - Un relato literal de una acción ya realizada
  - Una expresión general de afecto u honra hacia él
  rationale: El griego y el audit trail inglés favorecen una lectura hipotética, no la narración de un acto efectivamente cumplido. La imagen concreta de besar las plantas de los pies mantiene el carácter extremo del homenaje sin diluirlo en una formulación general.
  doctrine_reference: N/A
