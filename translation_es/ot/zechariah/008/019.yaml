translation:
  language: es
  text: 'Así ha dicho Yahvé de los ejércitos: el ayuno del cuarto mes[a], y el ayuno del quinto mes, y el ayuno del séptimo mes, y el ayuno del décimo mes, llegará a ser[b] para la casa de Judá gozo y alegría, y buenas fiestas establecidas[c]. Por tanto, amen la verdad y la paz.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el cuarto ayuno, el quinto ayuno, el séptimo ayuno y el décimo ayuno». El hebreo nombra los ayunos por número ordinal, probablemente aludiendo a los meses.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «será para la casa de Judá». El verbo hebreo simplemente dice «será»; «llegará a ser» hace explícito el sentido contextual de transformación de ayuno a celebración.'
    reason: lexical_alternative
  - marker: c
    text: «Fiestas establecidas» traduce un término que suele referirse a tiempos fijados o festividades establecidas, especialmente observancias sagradas.
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino personal del Tetragrámaton, siguiendo la política del proyecto. 'Yahvé' es la forma normal en español para ese nombre y evita la sustitución por un título.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los hosts
  - de las huestes
  lexicon: HALOT
  rationale: '''Ejércitos'' comunica de manera natural en español la idea del título divino y evita un calco menos transparente. ''Huestes'' es posible, pero menos claro para lectura general.'
- source_word: צ֣וֹם הָרְבִיעִי / הַחֲמִישִׁי / הַשְּׁבִיעִי / הָעֲשִׂירִי
  english_pob_choice: The fast of the fourth month, and the fast of the fifth, and the fast of the seventh, and the fast of the tenth
  chosen_spanish: el ayuno del cuarto mes, y el ayuno del quinto, y el ayuno del séptimo, y el ayuno del décimo
  alternatives_spanish:
  - el cuarto ayuno, el quinto ayuno, el séptimo ayuno y el décimo ayuno
  lexicon: HALOT
  rationale: El hebreo repite 'ayuno' con cada ordinal; en español, 'ayuno del cuarto mes' conserva esa estructura y hace explícita la referencia probable a los meses sin perder el valor lexical del sustantivo.
- source_word: יִהְיֶה
  english_pob_choice: shall become
  chosen_spanish: será
  alternatives_spanish:
  - llegará a ser
  - se convertirá en
  - será para
  lexicon: HALOT
  rationale: Aunque el inglés POB explicita 'shall become' para destacar la transformación, en español 'será' permite el mismo sentido en contexto sin sobrecargar la frase. La idea transformativa queda clara por el contraste entre ayuno y gozo/alegría/fiestas.
- source_word: לְבֵית יְהוּדָה
  english_pob_choice: for the house of Judah
  chosen_spanish: para la casa de Judá
  alternatives_spanish:
  - para Judá
  - a la casa de Judá
  lexicon: HALOT
  rationale: '''Casa de Judá'' conserva el sentido corporativo y dinástico del hebreo. ''Para'' reproduce adecuadamente el matiz beneficiario del ל en este contexto.'
- source_word: לְשָׂשׂוֹן
  english_pob_choice: joy
  chosen_spanish: gozo
  alternatives_spanish:
  - alegría
  - regocijo
  lexicon: HALOT
  rationale: '''Gozo'' ofrece una correspondencia natural y digna en español bíblico para שָׂשׂוֹן, y mantiene una leve distinción frente a ''alegría'' en el segundo miembro del doblete.'
- source_word: וּלְשִׂמְחָה
  english_pob_choice: gladness
  chosen_spanish: alegría
  alternatives_spanish:
  - gozo
  - regocijo
  lexicon: HALOT
  rationale: 'Se preserva el paralelismo del hebreo con dos términos cercanos pero no idénticos: ''gozo'' / ''alegría''. ''Alegría'' es claro y natural en español contemporáneo.'
- source_word: וּלְמֹעֲדִים טוֹבִים
  english_pob_choice: and good appointed feasts
  chosen_spanish: y buenas fiestas señaladas
  alternatives_spanish:
  - y buenos tiempos señalados
  - y buenas celebraciones señaladas
  - y buenas fiestas appointed
  lexicon: HALOT
  rationale: '''מוֹעֲדִים'' puede referirse a tiempos fijados o fiestas señaladas. En español, ''fiestas señaladas'' comunica el carácter de celebración con cita o fecha establecida; ''buenas'' traduce טוֹבִים sin desatender el valor apreciativo.'
- source_word: וְהָאֱמֶת
  english_pob_choice: truth
  chosen_spanish: la verdad
  alternatives_spanish:
  - verdad
  - la fidelidad
  lexicon: HALOT
  rationale: En una exhortación ética, 'la verdad' es la traducción más directa. 'Fidelidad' es posible, pero desplaza el énfasis hacia lealtad más que hacia veracidad/verdad.
- source_word: וְהַשָּׁלוֹם
  english_pob_choice: peace
  chosen_spanish: la paz
  alternatives_spanish:
  - paz
  - el bienestar
  lexicon: HALOT
  rationale: '''Paz'' es la forma más natural y estable para שָׁלוֹם en esta exhortación ética. Mantiene el paralelismo con ''la verdad'' sin introducir una glosa interpretativa innecesaria.'
- source_word: אֱהָבוּ
  english_pob_choice: Therefore love
  chosen_spanish: amen
  alternatives_spanish:
  - amen por tanto
  - por tanto, amen
  - y amen
  lexicon: HALOT
  rationale: El hebreo da un imperativo plural claro. En español, 'amen' conserva la fuerza directiva; 'Por tanto' expresa la transición discursiva que la versión inglesa aclaraba con 'Therefore'.
theological_decisions:
- issue: Cómo reflejar la relación entre el ayuno y la celebración futura
  english_pob_reading: The fasts are presented as becoming occasions of covenantal celebration for Judah, without specifying the historical mechanism in the translation.
  chosen_spanish_reading: Los ayunos aparecen como destinados a ser para la casa de Judá motivo de gozo, alegría y fiestas señaladas, sin precisar en la traducción el mecanismo histórico de ese cambio.
  alternative_spanish_readings:
  - Los ayunos simplemente serán gozo y alegría
  - Los ayunos serán abolidos y reemplazados por fiestas
  rationale: El hebreo afirma el cambio de función de los ayunos; 'será' en español permite esa transformación en contexto sin ir más allá del texto hacia una afirmación de abolición total o de un mecanismo específico.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Valor de la exhortación final
  english_pob_reading: 'The exhortation is rendered as a direct ethical command: ''Therefore love truth and peace.'''
  chosen_spanish_reading: 'La frase final se entiende como una exhortación ética directa: ''Por tanto, amen la verdad y la paz.'''
  alternative_spanish_readings:
  - Y amen la verdad y la paz
  - Pero amen la verdad y la paz
  rationale: El hebreo concluye con un imperativo; 'Por tanto' hace explícita la relación discursiva con lo anterior sin alterar el mandato. 'La verdad y la paz' se conservan como valores éticos concretos.
  doctrine_reference: Translation philosophy §§5, 6
translation_notes:
  revision_awareness: Se revisó la lectura y el pasaje mantiene alto acuerdo con el audit trail inglés; no se requieren cambios mayores. La versión española conserva la estructura enumerativa, el nombre divino, el doblete de alegría y el cierre exhortativo, ajustando solo el nivel de naturalidad propio del español.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el Nombre divino, coherente con el estándar del proyecto.
  - '''Casa de Judá'' preserva el sentido corporativo del hebreo y coincide con el tratamiento habitual de בית + nombre nacional.'
  - Se evita 'SEÑOR' como sustitución del Tetragrámaton.
  - '''Gozo'' y ''alegría'' reproducen el doblete semántico sin colapsarlo en un solo término.'
  - '''Fiestas señaladas'' conserva el matiz de מועדים como tiempos establecidos, no solo emociones festivas.'
