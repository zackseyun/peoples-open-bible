translation:
  language: es
  text: Mis labios[a] gritarán de alegría cuando te cante alabanzas, y mi alma[b], que tú has redimido[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cantarán de alegría»; el verbo hebreo puede expresar tanto un canto jubiloso como un grito de gozo.
    reason: lexical_alternative
  - marker: b
    text: O «mi vida» o «mi ser»; נֶפֶשׁ puede referirse al interior de la persona, a la vida o a la persona misma.
    reason: lexical_alternative
  - marker: c
    text: O «has rescatado» o «has librado».
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּרַנֵּנָּה
  english_pob_choice: will shout for joy
  chosen_spanish: gritarán de alegría
  alternatives_spanish:
  - cantarán de alegría
  - exclamarán de gozo
  lexicon: HALOT
  rationale: El verbo hebreo en piel expresa un clamor jubiloso o canto gozoso. En español, «gritarán de alegría» conserva la intensidad vocal sin obligar a entender un canto propiamente melódico.
- source_word: שְׂפָתַי
  english_pob_choice: my lips
  chosen_spanish: mis labios
  alternatives_spanish:
  - mi boca
  - mi hablar
  lexicon: HALOT
  rationale: Se mantiene la imagen poética concreta de los labios como órgano de la alabanza.
- source_word: כִּי
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Aquí introduce la circunstancia en que los labios estallan en júbilo; «cuando» suena natural en español y refleja la relación temporal/ocasional del hebreo en este contexto.
- source_word: אֲזַמְּרָה
  english_pob_choice: I sing praise
  chosen_spanish: te cante alabanzas
  alternatives_spanish:
  - cante para ti
  - haga música de alabanza
  lexicon: HALOT
  rationale: זמר en piel apunta a cantar en alabanza. La expresión española «te cante alabanzas» conserva el destinatario y el sentido cultual, sin reducirlo a mera música.
- source_word: לָּךְ
  english_pob_choice: to you
  chosen_spanish: te
  alternatives_spanish:
  - a ti
  - para ti
  lexicon: HALOT
  rationale: El dativo de dirección se expresa de forma natural en español con el clítico «te» dentro de la construcción verbal.
- source_word: וְנַפְשִׁי
  english_pob_choice: my soul also
  chosen_spanish: y mi alma
  alternatives_spanish:
  - y mi vida
  - y mi ser
  lexicon: HALOT
  rationale: נפשׁ puede referirse al alma, la vida o el ser. Aquí «mi alma» mantiene la dimensión interior y la paralela poética con «mis labios», evitando una simplificación excesivamente física o abstracta.
- source_word: אֲשֶׁר
  english_pob_choice: which
  chosen_spanish: que
  alternatives_spanish:
  - la cual
  lexicon: HALOT
  rationale: Pronombre relativo simple y natural para enlazar con el verbo siguiente.
- source_word: פָּדִיתָ
  english_pob_choice: you have redeemed
  chosen_spanish: has redimido
  alternatives_spanish:
  - has rescatado
  - has librado
  lexicon: HALOT
  rationale: פדה suele expresar redención mediante rescate o liberación. «Has redimido» conserva el peso teológico y el registro bíblico sin cerrar el matiz a una sola imagen de rescate.
theological_decisions:
- issue: Rendering of פדה in a praise setting
  english_pob_reading: redeemed
  chosen_spanish_reading: redimido
  alternative_spanish_readings:
  - rescatado
  - librado
  rationale: La base del versículo es la alabanza motivada por la acción salvadora de Dios. «Redimido» preserva el peso covenantal y litúrgico del término, mientras que «rescatado» o «librado» aclaran matices posibles pero reducen su densidad teológica.
  doctrine_reference: Translation philosophy §1, §3
- issue: Spanish handling of נפשׁ
  english_pob_reading: my soul / my life / my self
  chosen_spanish_reading: mi alma
  alternative_spanish_readings:
  - mi vida
  - mi ser
  rationale: El poema contrapone labios y alma, de modo que «alma» comunica bien la interioridad personal. Se conserva la tensión semántica de נפשׁ sin imponer una antropología técnica.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del POB inglés: se conservó la coordinación explícita entre «mis labios» y «mi alma», y se reflejó el valor conjuntivo de וְ con «y». También se mantuvo la relación causal/ocasional de כִּי con «cuando», en línea con la decisión auditada.'
  spanish_consistency_notes:
  - Se usa «redimido» para פדה, coherente con la terminología POB cuando el contexto es salvación y alabanza.
  - Se preserva la imagen corporal-poética de «labios» en lugar de generalizar a «boca» o «habla».
  - Se emplea español moderno y eclesialmente legible, evitando calcos rígidos pero sin paraphrasear el paralelismo hebreo.
