translation:
  language: es
  text: 'Por tanto, declara Yahvé, el Dios de Israel: yo ciertamente dije que tu casa y la casa de tu padre andarían delante de mí para siempre. Pero ahora, declara Yahvé: ¡lejos esté de mí! Porque a los que me honran, yo honraré; pero los que me desprecian serán tenidos en poco[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «serán deshonrados» o «serán tratados como insignificantes». El verbo hebreo comunica la idea de hacerse liviano, de poco peso o de poca estima, en contraste con «yo honraré».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Marca la conclusión inferencial del juicio divino. 'Por tanto' es natural en español bíblico actual y conserva la relación lógica sin añadir explicaciones.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Conserva la fórmula profética de proclamación. Se usa 'Yahvé' según la convención POB para el nombre divino, y 'declara' mantiene el registro solemne y auditivo del original.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israelita
  - el Dios de Israel, su pueblo
  lexicon: HALOT
  rationale: La cadena constructa es directa y covenantal; 'Dios de Israel' reproduce el vínculo identitario sin sobreinterpretación.
- source_word: אָמֹר אָמַרְתִּי
  english_pob_choice: I indeed said
  chosen_spanish: yo ciertamente dije
  alternatives_spanish:
  - yo de veras dije
  - yo dije en verdad
  lexicon: HALOT
  rationale: El infinitivo absoluto con verbo finito intensifica la afirmación. 'Ciertamente' conserva el énfasis sin sonar arcaico ni excesivamente literal.
- source_word: בֵּיתְךָ וּבֵית אָבִיךָ
  english_pob_choice: your house and your father’s house
  chosen_spanish: tu casa y la casa de tu padre
  alternatives_spanish:
  - tu casa y la casa de tu padre
  - tu familia y la casa de tu padre
  lexicon: HALOT
  rationale: '''Casa'' mantiene el sentido familiar/dinástico del hebreo y la repetición semítica. Se evita ''familia'' para no perder el eco de institución/linaje.'
- source_word: יִתְהַלְּכוּ לְפָנַי
  english_pob_choice: would walk before me
  chosen_spanish: andarían delante de mí
  alternatives_spanish:
  - caminarían delante de mí
  - servirían delante de mí
  lexicon: HALOT
  rationale: '''Andar delante de mí'' preserva el modismo hebreo y su valor de conducta sostenida en la presencia de Dios. ''Caminar'' es posible, pero ''andar'' suena más fluido en español bíblico actual.'
- source_word: עַד עוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por תמיד
  - perpetuamente
  lexicon: HALOT
  rationale: Equivale de forma natural a la duración durativa/covenantal del hebreo. 'Para siempre' es claro y mantiene la fuerza del anuncio original.
- source_word: וְעַתָּה
  english_pob_choice: But now
  chosen_spanish: Pero ahora
  alternatives_spanish:
  - Y ahora
  - Ahora pues
  lexicon: HALOT
  rationale: El contraste con la afirmación previa es fuerte; 'Pero ahora' hace explícita la reversión sin perder la transición discursiva.
- source_word: חָלִילָה לִּי
  english_pob_choice: far be it from me!
  chosen_spanish: ¡lejos de mí!
  alternatives_spanish:
  - ¡de ningún modo!
  - ¡no lo permitiré!
  lexicon: HALOT
  rationale: Es una fórmula hebrea de rechazo vehemente. 'Lejos de mí' transmite la repulsión/repudio con sobriedad; el sentido implícito de rechazo queda claro por el contexto.
- source_word: מְכַבְּדַי אֲכַבֵּד
  english_pob_choice: those who honor me I will honor
  chosen_spanish: a los que me honran, yo honraré
  alternatives_spanish:
  - a los que me glorifican, yo glorificaré
  - a los que me respetan, yo respetaré
  lexicon: HALOT
  rationale: Se conserva el juego léxico de כבד con 'honrar / honran / honraré'. En español, 'honrar' reproduce mejor la reciprocidad formal que 'glorificar' o 'respetar'.
- source_word: וּבֹזַי
  english_pob_choice: those who despise me
  chosen_spanish: los que me desprecian
  alternatives_spanish:
  - los que me desoyen
  - los que me tienen en poco
  lexicon: HALOT
  rationale: בזה expresa desprecio o desdén; 'desprecian' es el equivalente más directo y fuerte en español.
- source_word: יֵקָלּוּ
  english_pob_choice: will be lightly esteemed
  chosen_spanish: serán tenidos en poco
  alternatives_spanish:
  - serán despreciados
  - serán considerados insignificantes
  lexicon: HALOT
  rationale: El verbo comunica hacerse liviano, sin peso, de poco valor. 'Serán tenidos en poco' conserva esa idea de escasa consideración y refleja mejor el contraste con 'honrar' que repetir 'despreciar'.
theological_decisions:
- issue: La tensión entre la promesa previa y la revocación actual
  english_pob_reading: Render the earlier statement as a real prior divine declaration ('I indeed said ... would walk before me forever') followed by a present revocation in light of covenantal unfaithfulness.
  chosen_spanish_reading: 'Traducir la afirmación anterior como una declaración divina real y vigente en su momento, seguida por una revocación presente: ''Pero ahora ...'''
  alternative_spanish_readings:
  - Suavizar 'para siempre' como hipérbole desde el inicio
  - Convertir la revocación en simple limitación de privilegio
  rationale: El versículo contrapone explícitamente una promesa previa con una negativa actual. La traducción conserva la tensión teológica sin resolverla artificialmente, dejando que el texto muestre el cambio de trato divino por la deshonra de los sacerdotes.
  doctrine_reference: Preservar la tensión teológica sin resolverla
- issue: El alcance de חָלִילָה לִּי
  english_pob_reading: far be it from me!
  chosen_spanish_reading: ¡lejos de mí!
  alternative_spanish_readings:
  - ¡de ningún modo!
  - ¡eso no será!
  rationale: En este contexto, la fórmula expresa un rechazo enérgico del supuesto derecho de la casa de Eli. 'Lejos de mí' mantiene la fuerza idiomática sin introducir un sujeto ajeno al hebreo.
  doctrine_reference: Fórmula hebrea de repudio/divina negativa
- issue: El valor relacional y retributivo de כבד / בזה
  english_pob_reading: those who honor me I will honor, but those who despise me will be lightly esteemed.
  chosen_spanish_reading: a los que me honran, yo honraré; pero los que me desprecian serán tenidos en poco
  alternative_spanish_readings:
  - a los que me glorifican, yo glorificaré
  - los que me tratan con desprecio serán despreciados
  rationale: Se preserva el paralelismo y el juego de palabras entre 'honrar' y 'ser tenidos en poco'. La alternativa 'despreciados' es válida, pero 'ser tenidos en poco' refleja mejor la imagen de hacerse ligero/poco estimable que el hebreo sugiere.
  doctrine_reference: Juego léxico y principio retributivo
- issue: Tratamiento del nombre divino
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue la terminología POB para el Tetragrámaton y se evita el sustituto litúrgico 'SEÑOR', manteniendo la trazabilidad al texto hebreo.
  doctrine_reference: Convención POB para el nombre divino
translation_notes:
  revision_awareness: 'Se revisó la consistencia con la edición inglesa auditada y no se detectaron cambios posteriores: latest_revision_pass indica unchanged=true y cross_check_summary muestra high_agreement. La traducción española sigue esa base estable sin introducir ajustes no atestiguados.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino conforme al estándar del proyecto.
  - Se conserva 'honran / honraré' para reproducir el juego léxico de כבד.
  - Se evita 'SEÑOR' como sustitución convencional, ya que el texto fuente nombra explícitamente a Yahvé.
  - '''Serán tenidos en poco'' preserva mejor el contraste semántico con ''honrar'' que una simple repetición de ''despreciar''.'
