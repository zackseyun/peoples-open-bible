revisions:
- from: En ti descubren la desnudez de un padre[a][b]; en ti humillan a una mujer en su impureza menstrual[c].
  to: En ti descubren la desnudez de un padre[a][b]; en ti violan a una mujer en su impureza menstrual[c].
  rationale: Se conserva el idiomatismo legal hebreo de la primera cláusula y la personificación de Jerusalén con «en ti». Se corrige únicamente el verbo final para reflejar el valor sexual-abusivo de עִנּוּ en este contexto, en línea con la evidencia fuente y la auditoría inglesa. «Violan» expresa mejor la gravedad del acto que «humillan».
