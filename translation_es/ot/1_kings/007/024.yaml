translation:
  language: es
  text: Había calabazas[a] debajo de su borde, alrededor, rodeándolo; diez por codo, rodeando el Mar por todos lados. Las calabazas estaban en dos hileras, fundidas en una sola pieza con este.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «brotes» o «nudos»; el término hebreo se refiere a formas ornamentales parecidas a calabazas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפְקָעִים
  english_pob_choice: gourds
  chosen_spanish: calabazas
  alternatives_spanish:
  - gorduras
  - bultos
  - nudos ornamentales
  lexicon: HALOT
  rationale: El término hebreo designa formas ornamentales parecidas a calabazas/gourds. En español, «calabazas» comunica la forma concreta y decorativa sin forzar una identificación botánica exacta. Mantiene la tensión lexical del original y la decisión del POB inglés.
- source_word: מִתַּחַת לִשְׂפָתוֹ
  english_pob_choice: under its rim
  chosen_spanish: debajo de su borde
  alternatives_spanish:
  - bajo su labio
  - debajo de su orilla
  lexicon: HALOT
  rationale: שָׂפָה es literalmente «labio/borde». Para un gran recipiente en español, «borde» suena natural y fiel; «debajo de su borde» conserva la ubicación sin introducir una imagen extraña.
- source_word: סָבִיב סֹבְבִים אֹתוֹ
  english_pob_choice: all around, encircling it
  chosen_spanish: alrededor, rodeándolo
  alternatives_spanish:
  - en derredor, circundándolo
  - todo alrededor, rodeándolo
  lexicon: HALOT
  rationale: La repetición hebrea de la raíz expresa énfasis. En español se reproduce con «alrededor» y «rodeándolo», conservando el efecto sin sonar rígido.
- source_word: עֶשֶׂר בָּאַמָּה
  english_pob_choice: ten to the cubit
  chosen_spanish: diez por codo
  alternatives_spanish:
  - diez al codo
  - diez en cada codo
  lexicon: HALOT
  rationale: «Por codo» transmite la densidad o distribución por unidad de medida de forma breve y natural. Evita sobreexplicar el patrón exacto, como hace el inglés POB.
- source_word: מַקִּפִים אֶת הַיָּם סָבִיב
  english_pob_choice: surrounding the Sea all around
  chosen_spanish: circundando el Mar alrededor
  alternatives_spanish:
  - rodeando el Mar por todas partes
  - encerrando el Mar alrededor
  lexicon: HALOT
  rationale: Se conserva «Mar» con mayúscula como nombre técnico del gran estanque. «Circundando» mantiene el participio de acción continua y el complemento repetitivo refuerza el énfasis espacial del hebreo.
- source_word: שְׁנֵי טוּרִים
  english_pob_choice: in two rows
  chosen_spanish: en dos hileras
  alternatives_spanish:
  - en dos filas
  - en doble hilera
  lexicon: HALOT
  rationale: «טוּרִים» son filas/hileras. «Hileras» suena natural en español y preserva la idea de ordenamiento lineal sin alterar la imagen.
- source_word: יְצֻקִים בִּיצֻקָתוֹ
  english_pob_choice: cast in one piece with it
  chosen_spanish: fundidas en una sola pieza con él
  alternatives_spanish:
  - fundidas con él en su vaciado
  - coladas como parte de su fundición
  lexicon: HALOT
  rationale: El hebreo indica que los adornos no fueron añadidos después, sino integrados en la fundición. «Fundidas en una sola pieza con él» expresa con precisión ese detalle manufacturero en español bíblico claro.
translation_notes:
  revision_awareness: El texto inglés POB fue revisado y quedó sin cambios según el último pase; esta propuesta sigue esa lectura estable y la adapta al español con equivalentes naturales, conservando la repetición enfática, el término técnico «Mar» y la indicación de fundición integrada.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo remite al nombre divino; este versículo no contiene el Tetragrámaton ni κύριος.
  - Se conserva «Mar» con mayúscula para el recipiente ritual, siguiendo la convención técnica del POB inglés.
  - «Calabazas» se adopta como equivalente principal de פְקָעִים, con nota de alternativas para preservar la ambigüedad lexical documentada.
  - La construcción «fundidas en una sola pieza con él» evita la lectura de piezas añadidas posteriormente y refleja el valor pasivo-integral de la fundición.
