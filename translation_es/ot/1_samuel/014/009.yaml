translation:
  language: es
  text: 'Si ellos nos dicen así: «Quédense ahí[a] hasta que lleguemos a ustedes», entonces nos quedaremos en nuestro lugar[b] y no subiremos hacia ellos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Quédense ahí» recoge el posible sentido de «permanezcan quietos», «estén quietos» o «esperen» que puede tener el imperativo hebreo; también puede implicar silencio.
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «estaremos debajo de nosotros»; es un modismo que significa permanecer en nuestro lugar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Si es que
  - En caso de que
  lexicon: HALOT
  rationale: La partícula condicional introduce la señal propuesta por Jonatán; «Si» es la equivalencia más natural y fiel en español.
- source_word: כֹּה
  english_pob_choice: like this
  chosen_spanish: así
  alternatives_spanish:
  - de esta manera
  - de este modo
  lexicon: HALOT
  rationale: El demostrativo apunta a la forma exacta del mensaje citado; «así» conserva esa fuerza con naturalidad en español.
- source_word: יֹאמְרוּ אֵלֵינוּ
  english_pob_choice: they say to us
  chosen_spanish: nos dicen
  alternatives_spanish:
  - nos hablen
  - nos digan
  lexicon: HALOT
  rationale: En español, la construcción directa «nos dicen» mantiene la relación de destinatario sin sonar forzada en el marco de la cita condicional.
- source_word: דֹּמּוּ
  english_pob_choice: Stay there
  chosen_spanish: Deténganse
  alternatives_spanish:
  - Quédense quietos
  - Permanezcan
  lexicon: HALOT
  rationale: El imperativo puede implicar callar, quedar inmóvil o permanecer en lugar; en este contexto militar, «Deténganse» comunica la idea de no avanzar ni moverse de modo claro y digno. La alternativa española de «quedarse en silencio» no encajaba tan bien aquí.
- source_word: עַד הַגִּיעֵנוּ אֲלֵיכֶם
  english_pob_choice: until we come to you
  chosen_spanish: hasta que lleguemos a ustedes
  alternatives_spanish:
  - hasta que lleguemos adonde están
  - hasta alcanzarlos
  lexicon: HALOT
  rationale: La cláusula expresa el movimiento de los filisteos hacia Jonatán y su escudero; «lleguemos a ustedes» conserva el valor relacional y evita sobreinterpretar el matiz de «alcanzar».
- source_word: וְעָמַדְנוּ
  english_pob_choice: then we will stand
  chosen_spanish: entonces nos quedaremos
  alternatives_spanish:
  - entonces estaremos
  - entonces nos detendremos
  lexicon: HALOT
  rationale: El hebreo secuencial expresa la respuesta resultante. En español, «nos quedaremos» transmite el permanecer en la posición sin sonar rígidamente literal.
- source_word: תַחְתֵּינוּ
  english_pob_choice: where we are
  chosen_spanish: en nuestro lugar
  alternatives_spanish:
  - donde estamos
  - quietos en nuestro sitio
  lexicon: HALOT
  rationale: El hebreo es idiomático y no debe leerse de manera espacialmente literal. «En nuestro lugar» preserva el sentido de permanecer donde están.
- source_word: וְלֹא נַעֲלֶה אֲלֵיהֶם
  english_pob_choice: and will not go up to them
  chosen_spanish: y no subiremos hacia ellos
  alternatives_spanish:
  - y no iremos hacia ellos
  - y no iremos a su encuentro
  lexicon: HALOT
  rationale: Se conserva el verbo de movimiento ascendente, importante para el lenguaje topográfico y militar del texto. «Hacia ellos» evita convertirlo de antemano en un ataque explícito.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo masorético y coincide sustancialmente con la lectura inglesa auditada. Se preserva el valor idiomático de דֹּמּוּ y de תַחְתֵּינוּ sin sobreliteralizarlos, y se mantiene el movimiento ascendente de נַעֲלֶה con una formulación española natural.
  spanish_consistency_notes:
  - Se usa «Dios»/«Yahvé» según el contexto general del proyecto, pero este versículo no contiene esos términos.
  - Se mantiene un registro bíblico sobrio y moderno, evitando arcaísmos innecesarios.
  - Se conserva la tensión entre inmovilidad, silencio y permanencia en lugar en las notas, porque el hebreo admite más de una matización léxica.
