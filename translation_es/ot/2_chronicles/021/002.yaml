review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue en general la estructura y el sentido del hebreo: posesión idiomática («tenía»), identificación de los hermanos como hijos de Josafat, lista de nombres y cierre con «rey de Israel», que debe conservarse según la fuente. Sin embargo, hay errores concretos que impiden aprobarlo tal como está: un intruso en árabe («هؤلاء») en el texto español, una inconsistencia entre el ancla [a] y su ubicación/tema, y una nota [b] que dice «El segundo nombre» cuando se trata del cuarto nombre de la lista y de la segunda forma de Azarías. Además, la forma «Azaríasu» resulta poco natural; «Azariahu» preserva mejor la distinción documentada sin forzar una adaptación española extraña.'
  spanish_quality_summary: La redacción es mayormente legible y digna, pero necesita reparación menor para ser español limpio y eclesialmente legible. «Todos هؤلاء eran» es claramente un error de copia. «Y tenía hermanos» suena algo abrupto al inicio de oración; «Y él tenía hermanos» fluye mejor en español manteniendo el enlace narrativo. «Micael» puede aceptarse como transliteración, pero «Miguel» sería más tradicional; no obstante, dado el énfasis del expediente en transliterar nombres, no es necesario forzar cambio. «Azariahu» es preferible a «Azaríasu» por claridad y fidelidad a la distinción hebrea.
  glossary_alignment: No hay términos del glosario mayor en juego salvo la necesidad de mantener «rey de Israel» y no armonizar a «Judá», lo cual el borrador sí hace correctamente. La distinción entre עֲזַרְיָה y עֲזַרְיָהוּ debe mantenerse; en español conviene «Azarías» / «Azariahu».
  issues:
  - severity: high
    issue: 'Texto contaminado con palabra árabe: «Todos هؤلاء eran»'
    rationale: Es un error material evidente y rompe por completo la legibilidad del español. Debe corregirse a una frase española normal como «Todos estos eran».
  - severity: medium
    issue: La nota [a] está anclada en «hermanos» pero comenta «rey de Israel»
    rationale: Según la disciplina del proyecto, el marcador debe aparecer en la palabra o frase relevante. La nota debe moverse a «rey de Israel[a]».
  - severity: medium
    issue: La nota [b] describe incorrectamente la posición del nombre
    rationale: Dice «El segundo nombre», pero la observación se refiere al cuarto nombre listado, distinto del primer Azarías. Debe corregirse para evitar confusión.
  - severity: medium
    issue: «Azaríasu» es una solución poco natural para distinguir עֲזַרְיָהוּ de עֲזַרְיָה
    rationale: La auditoría inglesa preserva la diferencia con «Azariahu». En español, «Azariahu» mantiene claramente la distinción sin crear una forma extraña o difícil de reconocer.
  revised_spanish_text: 'Y él tenía hermanos, los hijos de Josafat: Azarías, Jehiel, Zacarías, Azariahu[b], Micael y Sefatías. Todos estos eran los hijos de Josafat, rey de Israel[a].'
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «rey de Israel». Josafat es más comúnmente identificado históricamente como rey de Judá; Crónicas usa aquí «Israel», probablemente en un sentido de pacto más amplio.'
    reason: alternative_reading
  - marker: b
    text: 'El cuarto nombre se escribe de modo diferente en hebreo del primer Azarías; por eso se mantiene aquí una forma diferenciada: «Azariahu».'
    reason: lexical_alternative
  revision_rationale: Se corrige un error material grave de idioma, se reubica la nota sobre «rey de Israel» al lugar pertinente, se corrige la redacción de la nota del nombre diferenciado, y se ajusta «Azaríasu» a «Azariahu» para preservar de forma más fiel y natural en español la distinción entre las dos grafías hebreas.
