  glossary_alignment: No hay términos del glosario teológico principal en juego. Las decisiones léxicas concuerdan con el rastro auditado en inglés. «Documento» y «palabra» respetan las revisiones POB; las notas conservan alternativas significativas para τὸ γράμμα y ὁ λόγος αὐτοῦ σοφώτερος.
