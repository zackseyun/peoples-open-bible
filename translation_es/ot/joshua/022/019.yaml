translation:
  language: es
  text: Pero si la tierra de su posesión es impura[a], crucen ustedes a la tierra de la posesión de Yahvé, donde está el tabernáculo de Yahvé[b], y establezcan su posesión entre nosotros[c]. Solo no se rebelen contra Yahvé, ni contra nosotros, al construir para ustedes un altar, aparte del altar de Yahvé nuestro Dios[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la tierra de su heredad» / «la tierra de su herencia». El término hebreo para «posesión» puede denotar una tenencia hereditaria.
    reason: lexical_alternative
  - marker: b
    text: O «donde habita el tabernáculo de Yahvé». El hebreo dice literalmente que allí habitó/habita el tabernáculo de Yahvé.
    reason: lexical_alternative
  - marker: c
    text: O «y tomen posesión entre nosotros». El verbo hebreo puede expresar obtener una tenencia o establecerse en un lugar.
    reason: lexical_alternative
  - marker: d
    text: O «además de» o «fuera de» el altar de Yahvé nuestro Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַךְ / אִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Sin embargo, si
  - Y si
  - Mas si
  lexicon: HALOT
  rationale: La combinación introduce una condición con matiz adversativo. «Pero si» comunica bien la transición fuerte sin sonar artificial en español.
- source_word: טְמֵאָה
  english_pob_choice: unclean
  chosen_spanish: impura
  alternatives_spanish:
  - inmunda
  - contaminada
  - ritualmente impura
  lexicon: HALOT
  rationale: En español, «impura» conserva el valor cultual/general del hebreo sin la carga demasiado técnica de «inmunda». Como el texto no especifica el tipo de impureza, se mantiene amplia la ambigüedad.
- source_word: אֶרֶץ אֲחֻזַּתְכֶם
  english_pob_choice: the land of your possession
  chosen_spanish: la tierra de su posesión
  alternatives_spanish:
  - la tierra de su heredad
  - la tierra de su herencia
  lexicon: HALOT
  rationale: «Posesión» reproduce el sustantivo אֲחֻזָּה y mantiene el paralelismo con «la posesión de Yahvé». «Heredad» sería posible, pero desplaza el énfasis lexical del pasaje.
- source_word: עִבְרוּ לָכֶם
  english_pob_choice: cross over for yourselves
  chosen_spanish: crucen para ustedes
  alternatives_spanish:
  - pasen para ustedes
  - crucen
  lexicon: HALOT
  rationale: El verbo exige la idea de cruzar, probablemente el Jordán, y לָכֶם añade un matiz benefactivo/reflexivo. «Para ustedes» lo conserva mejor que omitirlo.
- source_word: אֶל אֶרֶץ אֲחֻזַּת יְהוָה
  english_pob_choice: into the land of Yahweh’s possession
  chosen_spanish: a la tierra de la posesión de Yahvé
  alternatives_spanish:
  - a la tierra perteneciente a Yahvé
  - a la tierra de la herencia de Yahvé
  lexicon: HALOT
  rationale: Se preserva el paralelo intencional con «la tierra de su posesión» y el nombre divino «Yahvé», conforme al estándar del proyecto.
- source_word: אֲשֶׁר שָׁכַן שָׁם מִשְׁכַּן יְהוָה
  english_pob_choice: where Yahweh’s tabernacle dwells
  chosen_spanish: donde habitaba el tabernáculo de Yahvé
  alternatives_spanish:
  - donde reside el tabernáculo de Yahvé
  - donde está el tabernáculo de Yahvé
  lexicon: HALOT
  rationale: «Había/habitaba» expresa de modo natural la cláusula relativa y conserva el sentido de morada/tabernáculo. «Tabernáculo» es la equivalencia estable para מִשְׁכָּן en este contexto cultual.
- source_word: וְהֵאָחֲזוּ בְּתוֹכֵנוּ
  english_pob_choice: and take possession among us
  chosen_spanish: y tomen posesión entre nosotros
  alternatives_spanish:
  - y establezcan su posesión entre nosotros
  - y habiten entre nosotros
  lexicon: HALOT
  rationale: El hebreo mantiene la idea de obtener/establecer una posesión; «tomen posesión» preserva la fuerza lexical mejor que «settle». «Entre nosotros» refleja בְּתוֹכֵנוּ.
- source_word: וּבַיהוָה אַל תִּמְרֹדוּ
  english_pob_choice: Only do not rebel against Yahweh
  chosen_spanish: Solo no se rebelen contra Yahvé
  alternatives_spanish:
  - Solo no se subleven contra Yahvé
  - No se rebelen contra Yahvé
  lexicon: HALOT
  rationale: «Rebelarse» es el equivalente natural de תמרד con el objeto explícito de Yahvé. «Solo» conserva el matiz restrictivo/emphático de וּ.
- source_word: וְאֹתָנוּ אַל תִּמְרֹדוּ
  english_pob_choice: or against us
  chosen_spanish: ni contra nosotros
  alternatives_spanish:
  - o contra nosotros
  - y contra nosotros
  lexicon: HALOT
  rationale: La revisión inglesa suprimió el verbo repetido; en español también se evita la repetición, pero se conserva la coordinación con «ni» para reflejar la advertencia paralela y el hebreo elíptico.
- source_word: בִּבְנֹתְכֶם לָכֶם מִזְבֵּחַ
  english_pob_choice: by building for yourselves an altar
  chosen_spanish: al construir para ustedes un altar
  alternatives_spanish:
  - mediante la construcción de un altar para ustedes
  - cuando construyan para ustedes un altar
  lexicon: HALOT
  rationale: La construcción con ב expresa medio o circunstancia; «al construir» suena natural y preserva el valor instrumental/circunstancial.
- source_word: מִבַּלְעֲדֵי מִזְבַּח יְהוָה אֱלֹהֵינוּ
  english_pob_choice: besides the altar of Yahweh our God
  chosen_spanish: aparte del altar de Yahvé nuestro Dios
  alternatives_spanish:
  - además del altar de Yahvé nuestro Dios
  - fuera del altar de Yahvé nuestro Dios
  lexicon: HALOT
  rationale: «Aparte de» comunica exclusión o adición fuera del altar legítimo. Se mantiene la tensión entre un altar alterno y la centralidad del altar de Yahvé sin resolverla interpretativamente.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto de transliterar el Tetragrámaton como «Yahvé» para preservar el nombre divino personal, en vez de sustituirlo por un título.
theological_decisions:
- issue: Naturaleza de la impureza de la tierra
  english_pob_reading: Render the statement straightforwardly as 'if the land of your possession is unclean' without specifying whether the uncleanness is cultic, geographic, or rhetorical.
  chosen_spanish_reading: 'Traducir de manera directa: «si la tierra de su posesión es impura», sin precisar si la impureza es cultual, territorial o retórica.'
  alternative_spanish_readings:
  - si la tierra de su posesión está contaminada ritualmente
  - si su tierra es considerada inapropiada por estar al otro lado
  rationale: El hebreo no explica el mecanismo exacto de la impureza. La traducción conserva esa ambigüedad en vez de resolverla con una explicación interpretativa.
  doctrine_reference: Preservar la tensión teológica del texto fuente.
- issue: Alcance de la prohibición sobre el altar adicional
  english_pob_reading: Translate the warning as a prohibition against building an altar besides the LORD’s altar, implying a rival or unauthorized altar without expanding the claim.
  chosen_spanish_reading: Traducir la advertencia como prohibición de construir un altar aparte del altar de Yahvé, sugiriendo un altar rival o no autorizado sin ampliar la afirmación.
  alternative_spanish_readings:
  - la prohibición se refiere a cualquier segundo altar
  - la preocupación es un altar sacrificial en competencia con el santuario central
  rationale: El pasaje se opone claramente a un altar ‘aparte de’ el altar de Yahvé, pero no desarrolla aquí la teoría completa de la centralización cultual. La traducción mantiene el alcance del texto.
  doctrine_reference: Primacía del original sobre la tradición de traducción; preservar la tensión teológica.
translation_notes:
  revision_awareness: La redacción española toma en cuenta la revisión inglesa más reciente, que suprimió la repetición del verbo en la segunda prohibición («or against us»). Por eso la versión española usa «ni contra nosotros» con elipsis verbal, manteniendo la coordinación paralela y evitando añadir un verbo que el hebreo no repite. También conserva el paralelo léxico entre «posesión» y «posesión de Yahvé», y no especifica el tipo de impureza ni el alcance exacto del altar adicional.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se conserva «posesión» para אֲחֻזָּה a fin de reflejar el paralelismo interno.
  - «Impura» mantiene la ambigüedad cultual del hebreo sin explicar de más.
  - «Rebelarse contra» reproduce bien תמרד en un contexto de alianza y lealtad.
  - La elipsis en «ni contra nosotros» sigue la revisión auditada y evita una duplicación innecesaria.
