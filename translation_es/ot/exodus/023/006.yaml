translation:
  language: es
  text: No tuerzas el derecho de tu pobre en su litigio[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No niegues la justicia a tu pobre en su pleito»'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא / לא
  english_pob_choice: not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No has de
  - No debes
  lexicon: HALOT
  rationale: La negación funciona aquí como prohibición legal; en español, el imperativo negativo con 'No' expresa con naturalidad el mandato jurisprudencial sin añadir mayor paráfrasis.
- source_word: תַטֶּה
  english_pob_choice: pervert
  chosen_spanish: tuerzas
  alternatives_spanish:
  - desvíes
  - perviertas
  - inclines
  lexicon: HALOT
  rationale: El Hiphil de נטה expresa desviar o torcer en sentido jurídico. 'Tuerzas' comunica la idea de inclinar indebidamente el derecho con un verbo natural en español, sin suavizar la fuerza de la prohibición.
- source_word: מִשְׁפַּט
  english_pob_choice: the justice due to
  chosen_spanish: el derecho
  alternatives_spanish:
  - la justicia
  - el juicio
  - el fallo justo
  lexicon: HALOT
  rationale: En este contexto legal, מִשְׁפָּט puede referirse al derecho o decisión judicial debida. 'El derecho' conserva el alcance jurídico de la expresión sin forzar una perífrasis pesada; la alternativa 'la justicia' queda implícita en el contexto de la cláusula.
- source_word: אֶבְיֹנְךָ
  english_pob_choice: your poor person
  chosen_spanish: tu pobre persona
  alternatives_spanish:
  - tu pobre
  - tu persona pobre
  - tu necesitado
  lexicon: HALOT
  rationale: El sustantivo אֶבְיוֹן denota a una persona pobre o necesitada. 'Tu pobre persona' refleja el sufijo de segunda persona singular y evita introducir género no explícito en el hebreo, en línea con la revisión auditada del inglés POB.
- source_word: בְּרִיבוֹ
  english_pob_choice: in his dispute
  chosen_spanish: en su litigio
  alternatives_spanish:
  - en su disputa
  - en su pleito
  - en su causa
  lexicon: HALOT
  rationale: רִיב puede significar disputa, litigio o caso legal. 'Litigio' mantiene el contexto forense del pasaje y preserva la referencia a una controversia judicial concreta.
theological_decisions:
- issue: 'Alcance del mandato: parcialidad contra el pobre o denegación de justicia'
  english_pob_reading: The prohibition is against depriving a poor man of his rightful justice in court.
  chosen_spanish_reading: La prohibición se entiende como negar o torcer el derecho que corresponde al pobre en un proceso judicial.
  alternative_spanish_readings:
  - No favorecer al pobre de manera indebida
  - No negarle justicia al pobre
  rationale: El hebreo presenta como objeto el 'derecho' o 'juicio' que no debe ser torcido, no un lema social general. La versión española conserva el foco jurídico y la tensión semántica entre 'derecho' y 'justicia' sin disolverla.
  doctrine_reference: Translation philosophy §1, §3, §4, §6
translation_notes:
  revision_awareness: La redacción sigue la revisión auditada del inglés POB que eliminó el masculino explícito ('poor man') en favor de una forma no marcada por género ('poor person'). También conserva el énfasis jurídico del hebreo y evita traducir mecánicamente por 'justicia' donde el campo semántico de מִשְׁפָּט admite 'derecho' o 'fallo'.
  spanish_consistency_notes:
  - Se preserva 'Yahvé' como terminología POB para el Tetragrámaton en toda la serie, aunque este versículo no lo contenga.
  - Se mantiene un registro legal sobrio y contemporáneo, acorde con las leyes del pacto en Éxodo.
  - '''Tu'' y ''su'' reflejan los sufijos personales del hebreo y conservan la relación directa entre el oyente/juez y la persona pobre en litigio.'
