translation:
  language: es
  text: Y después de estas palabras, Nicanor subió al monte Sión, y algunos de los sacerdotes salieron del lugar santo[a], y algunos de los ancianos del pueblo[b], para saludarlo en paz y mostrarle el holocausto que se ofrecía por el rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del santuario». La expresión griega ἐκ τῶν ἁγίων puede referirse al lugar santo o al recinto sagrado más específicamente.
    reason: lexical_alternative
  - marker: b
    text: 'La repetición de «de» sugiere un valor partitivo: salieron representantes de entre los sacerdotes y de entre los ancianos, no necesariamente todos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνέβη
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - fue hacia arriba
  - ascendió
  lexicon: LSJ
  rationale: «Subió» reproduce de manera natural el movimiento ascendente y el desplazamiento hacia Sión sin introducir solemnidad excesiva. Mantiene la idiomaticidad española y la dirección del original.
- source_word: τὸ ὄρος Σιών
  english_pob_choice: Mount Zion
  chosen_spanish: el monte Sión
  alternatives_spanish:
  - el monte de Sión
  - el monte Zion
  lexicon: LSJ
  rationale: «Monte Sión» es la forma más transparente y natural en español bíblico contemporáneo. Conserva el nombre propio y la referencia geográfica sin añadir matices no presentes en el griego.
- source_word: ἐξῆλθαν
  english_pob_choice: came out
  chosen_spanish: salieron
  alternatives_spanish:
  - salieron fuera
  - vinieron hacia afuera
  lexicon: LSJ
  rationale: «Salieron» es el equivalente directo y claro en español; preserva el movimiento de salida desde el espacio sagrado sin sobreespecificar dirección.
- source_word: ἀπὸ τῶν ἱερέων ... καὶ ἀπὸ τῶν πρεσβυτέρων τοῦ λαοῦ
  english_pob_choice: some of the priests ... and some of the elders of the people
  chosen_spanish: algunos de los sacerdotes ... y algunos de los ancianos del pueblo
  alternatives_spanish:
  - de entre los sacerdotes ... y de entre los ancianos del pueblo
  - unos sacerdotes ... y unos ancianos del pueblo
  lexicon: LSJ
  rationale: El griego repite ἀπό con probable sentido partitivo. «Algunos de» comunica que salieron representantes, no necesariamente todos, y conserva la cautela interpretativa del POB inglés.
- source_word: ἐκ τῶν ἁγίων
  english_pob_choice: from the holy place
  chosen_spanish: del lugar santo
  alternatives_spanish:
  - del santuario
  - de las cosas santas
  lexicon: LSJ
  rationale: «Lugar santo» refleja con precisión ἐκ τῶν ἁγίων en este contexto cultual. Es más literal que «santuario» y menos ambiguo que «las cosas santas».
- source_word: ἀσπάσασθαι αὐτὸν εἰρηνικῶς
  english_pob_choice: to greet him peaceably
  chosen_spanish: para saludarlo en paz
  alternatives_spanish:
  - para saludarlo pacíficamente
  - para recibirlo en paz
  lexicon: LSJ
  rationale: «Saludarlo en paz» preserva tanto la acción de ἀσπάζομαι como el adverbio εἰρηνικῶς, con un español natural. «Recibirlo» sería posible, pero desplaza el foco desde el saludo al acto de acogida.
- source_word: δεῖξαι αὐτῷ
  english_pob_choice: to show him
  chosen_spanish: mostrarle
  alternatives_spanish:
  - enseñarle
  - mostrar a él
  lexicon: LSJ
  rationale: «Mostrarle» es la forma más directa y fluida del infinitivo de propósito, manteniendo la relación de beneficio/destino expresada por el dativo.
- source_word: τὴν ὁλοκαύτωσιν
  english_pob_choice: the burnt offering
  chosen_spanish: el holocausto
  alternatives_spanish:
  - la ofrenda quemada
  - el sacrificio totalmente quemado
  lexicon: LSJ
  rationale: En español bíblico, «holocausto» es el término técnico que corresponde a ὁλοκαύτωσις y preserva el carácter sacrificial completo del término. Aunque «ofrenda quemada» sería más explicativo, resulta menos preciso como denominación cultual.
- source_word: τὴν προσφερομένην
  english_pob_choice: that was being offered
  chosen_spanish: que se ofrecía
  alternatives_spanish:
  - que estaba siendo ofrecido
  - que se estaba ofreciendo
  lexicon: LSJ
  rationale: El participio presente pasivo se rinde con una forma progresiva natural en español. «Que se ofrecía» comunica continuidad sin recargar la frase.
- source_word: ὑπὲρ τοῦ βασιλέως
  english_pob_choice: for the king
  chosen_spanish: por el rey
  alternatives_spanish:
  - en favor del rey
  - en nombre del rey
  lexicon: LSJ
  rationale: «Por el rey» refleja la relación de beneficio/intercesión que expresa ὑπέρ y conserva la concisión del texto. Las alternativas explicitan más, pero añaden interpretación.
theological_decisions:
- issue: Relación del sacrificio con el rey
  english_pob_reading: the burnt offering that was being offered for the king
  chosen_spanish_reading: el holocausto que se ofrecía por el rey
  alternative_spanish_readings:
  - el holocausto ofrecido en favor del rey
  - el holocausto que se ofrecía para el rey
  rationale: El griego ὑπὲρ τοῦ βασιλέως indica beneficio o referencia a favor del rey, no necesariamente sustitución sacrificial. «Por el rey» conserva esa apertura y evita precisar más de lo que el texto afirma.
  doctrine_reference: uso de ὑπέρ en contexto intercesorio/benefactivo; lectura histórica del culto en 1 Macabeos
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió 'from the sanctuary' a 'from the holy place' para reflejar más directamente ἐκ τῶν ἁγίων. La redacción española sigue esa decisión con «del lugar santo» y conserva el matiz partitivo de ἀπό mediante «algunos de».
  spanish_consistency_notes:
  - Se mantiene «Sión» con grafía española estándar y nombre propio sin artículo adicional.
  - «Holocausto» se usa como término técnico cultual, coherente con el POB inglés y el griego ὁλοκαύτωσις.
  - No se introduce mayúscula en «lugar santo» porque aquí funciona como designación del espacio sagrado, no como nombre propio.
  - «Por el rey» se conserva deliberadamente para no estrechar ὑπέρ a una sola lectura interpretativa.
