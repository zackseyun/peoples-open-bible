lexical_decisions:
- source_word: וְאֵלֶּה
  english_pob_choice: And these were
  chosen_spanish: Y estos fueron
  alternatives_spanish:
  - Y estos eran
  - Y estos son
  lexicon: HALOT
  rationale: La forma hebrea introduce a los participantes dentro del relato pasado; en español, el pretérito 'fueron' mantiene esa identificación narrativa con naturalidad.
- source_word: הַמִּתְקַשְּׁרִים
  english_pob_choice: the men who conspired
  chosen_spanish: los que conspiraron
  alternatives_spanish:
  - los conspiradores
  - los que se aliaron
  lexicon: HALOT
  rationale: El hitpael de קשר en este contexto expresa conspiración/colusión. 'Los que conspiraron' conserva la acción sin forzar una nominalización excesiva.
- source_word: עָלָיו
  english_pob_choice: against him
  chosen_spanish: contra él
  alternatives_spanish:
  - en su contra
  - sobre él
  lexicon: HALOT
  rationale: Con קשר, על marca el blanco de la conspiración; 'contra él' es la equivalencia idiomática clara en español.
- source_word: זָבָד
  english_pob_choice: Zabad
  chosen_spanish: Zabad
  alternatives_spanish:
  - Zabad
  lexicon: Transliteración estándar
  rationale: Nombre propio conservado mediante transliteración.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - el hijo de
  lexicon: HALOT
  rationale: Fórmula genealógica estándar en español bíblico contemporáneo.
- source_word: שִׁמְעָת
  english_pob_choice: Shimeath
  chosen_spanish: Simeat
  alternatives_spanish:
  - Shimeat
  lexicon: Transliteración estándar
  rationale: Se adapta la transliteración al uso español, manteniendo la forma del nombre sin añadir interpretación.
- source_word: הָעַמּוֹנִית
  english_pob_choice: the Ammonite woman
  chosen_spanish: la mujer amonita
  alternatives_spanish:
  - la amonita
  - la mujer de Amón
  lexicon: HALOT
  rationale: El hebreo está en femenino singular; 'la mujer amonita' conserva la marca de género y evita formas arcaicas como 'amonitisa' o 'amonitess'.
- source_word: וִיהוֹזָבָד
  english_pob_choice: and Jehozabad
  chosen_spanish: y Jehozabad
  alternatives_spanish:
  - y Yehozabad
  lexicon: Transliteración estándar
  rationale: Nombre propio conservado; se mantiene la conjunción para reflejar la coordinación del hebreo.
- source_word: שִׁמְרִית
  english_pob_choice: Shimrith
  chosen_spanish: Shimrit
  alternatives_spanish:
  - Shimirit
  - Shimrith
  lexicon: Transliteración estándar
  rationale: Transliteración al español con grafía fluida y reconocible, sin modificar el valor del nombre.
- source_word: הַמּוֹאָבִית
  english_pob_choice: the Moabite woman
  chosen_spanish: la mujer moabita
  alternatives_spanish:
  - la moabita
  - la mujer de Moab
  lexicon: HALOT
  rationale: Como en el caso anterior, el femenino singular se preserva explícitamente en español.
theological_decisions:
- issue: Designación étnico-genealógica de las madres
  english_pob_reading: the Ammonite woman / the Moabite woman
  chosen_spanish_reading: la mujer amonita / la mujer moabita
  alternative_spanish_readings:
  - la amonita / la moabita
  - la amonitisa / la moabitisa
  rationale: 'No hay tensión doctrinal, pero sí una decisión de claridad: el hebreo usa adjetivos femeninos para identificar a las madres. Se conserva esa marca sin arcaísmos ni neutralización del género.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El texto base inglés no requirió revisiones; la concordancia general con el hebreo es alta. La versión española sigue la misma lectura, preservando el participio de conspiración y la identificación femenina de las dos madres por medio de adjetivos étnicos en femenino.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' por norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se evita 'amonitisa' y 'moabitisa' por ser formas poco naturales o arcaizantes en español bíblico moderno.
  - Los nombres propios se transliteran de forma consistente y legible para lectores hispanohablantes.
