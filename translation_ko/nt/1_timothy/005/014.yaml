id: 1TI.5.14
reference: 1 Timothy 5:14
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: βούλομαι οὖν νεωτέρας γαμεῖν, τεκνογονεῖν, οἰκοδεσποτεῖν, μηδεμίαν ἀφορμὴν διδόναι τῷ ἀντικειμένῳ λοιδορίας χάριν·
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/005/014.yaml
  text: Therefore I want younger widows to marry[a], to bear children, to manage their households[b], and to give the opponent no opportunity for slander.
  footnotes:
  - marker: a
    text: Or 'the adversary,' possibly referring to Satan.
    reason: alternative_reading
  - marker: b
    text: The Greek says simply 'to marry'; since the context is younger widows, remarriage is implied.
    reason: lexical_alternative
translation:
  language: ko
  text: 그러므로 나는 젊은 [과부]들이 시집가서[b] 자녀를 낳고 집안을 다스리며, 대적하는 자[a]에게 비방의 빌미를 조금도 주지 않기를 원합니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「원수」. 사탄을 가리킬 수도 있다.
    reason: alternative_reading
  - marker: b
    text: 헬라어는 단순히 「시집가는 것」이라 하지만, 본 문맥이 젊은 과부들이므로 재혼을 함의한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: βούλομαι
  english_pob_choice: I want
  chosen_korean: 나는 ~ 원합니다
  alternatives_korean:
  - 나는 바랍니다
  lexicon: BDAG
  rationale: 2:8과 일관.
- source_word: νεωτέρας γαμεῖν
  english_pob_choice: younger widows to marry
  chosen_korean: 젊은 [과부]들이 시집가서
  alternatives_korean:
  - 젊은 여자들이 결혼하여
  lexicon: BDAG
  rationale: 11절 「젊은 과부들」을 이어받는다. 본문 자체는 「과부」를 다시 명시하지 않으나 한국어로 자연스럽게 이어받기 위해 [과부]를 부가.
- source_word: τεκνογονεῖν
  english_pob_choice: bear children
  chosen_korean: 자녀를 낳고
  alternatives_korean:
  - 아이를 낳고
  lexicon: BDAG
  rationale: 2:15 τεκνογονία와 동족 어휘.
- source_word: οἰκοδεσποτεῖν
  english_pob_choice: manage their households
  chosen_korean: 집안을 다스리며
  alternatives_korean:
  - 가정을 이끌며
  lexicon: BDAG
  rationale: 「집의 주인 노릇 하다」를 「집안을 다스리다」로.
- source_word: τῷ ἀντικειμένῳ
  english_pob_choice: the opponent
  chosen_korean: 대적하는 자
  alternatives_korean:
  - 원수
  - 적
  lexicon: BDAG
  rationale: 글로서리 「ἀντικείμενος → 대적하는 자」. 사탄 해석은 각주.
- source_word: λοιδορίας χάριν
  english_pob_choice: opportunity for slander
  chosen_korean: 비방의 빌미를
  alternatives_korean:
  - 모욕의 기회를
  - 비난거리를
  lexicon: BDAG
  rationale: λοιδορία의 「모욕·비방」을 「비방」으로.
