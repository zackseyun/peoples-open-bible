revisions:
- from: Y se sentó el rey Demetrio en el trono de su reino, y la tierra estuvo quieta delante de él.
  to: Y el rey Demetrio se sentó en el trono de su reino, y el país quedó en calma ante él.
  rationale: Se ajusta «la tierra estuvo quieta» a «el país quedó en calma» para reflejar mejor el sentido contextual de ἡ γῆ como territorio gobernado y de ἡσύχασεν como tranquilidad política sin exagerarla como paz plena. También se cambia «delante de él» por «ante él» por mayor naturalidad y dignidad estilística, sin perder fidelidad.
