translation:
  language: es
  text: Pero, después de dominar la trama[a], decidió visitar las ciudades vecinas y animarlas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «después de imponerse sobre la trama» o «después de sofocar el complot». El participio griego κατακρατήσας puede sugerir haber obtenido ventaja sobre un designio hostil.
    reason: lexical_alternative
  - marker: b
    text: O «exhortarlas» o «apelar a ellas». El verbo παρακαλέσαι puede significar «animar», «exhortar» o «apelar a».
    reason: lexical_alternative
lexical_decisions:
- source_word: κατακρατήσας
  english_pob_choice: after gaining control of
  chosen_spanish: después de dominar
  alternatives_spanish:
  - después de ganar control de
  - después de prevalecer sobre
  - después de someter
  lexicon: LSJ
  rationale: El participio aoristo expresa haber obtenido la superioridad sobre la trama. "Dominar" conserva la idea de tomar la ventaja sobre un plan hostil sin hacer explícito un medio no indicado por el griego.
- source_word: τῆς ἐπιβουλῆς
  english_pob_choice: the plot
  chosen_spanish: la conspiración
  alternatives_spanish:
  - la trama
  - el plan hostil
  - la conjura
  lexicon: LSJ
  rationale: ἐπιβουλή puede significar trama, designio hostil o conspiración. Aquí "conspiración" comunica el sentido adversativo con claridad en español, aunque es algo más fuerte que "trama"; por eso se mantiene la ambigüedad en las alternativas.
- source_word: ἔκρινεν
  english_pob_choice: he decided
  chosen_spanish: decidió
  alternatives_spanish:
  - juzgó
  - resolvió
  - determinó
  lexicon: LSJ
  rationale: Con infinitivo, κρίνω aquí expresa resolución deliberada, no juicio forense. "Decidió" es la opción natural y fiel al valor decisorio del verbo.
- source_word: τὰς πλησίον πόλεις
  english_pob_choice: the neighboring cities
  chosen_spanish: las ciudades vecinas
  alternatives_spanish:
  - las ciudades cercanas
  - las ciudades de alrededor
  lexicon: LSJ
  rationale: πλησίον funciona adjetivalmente con πόλεις y señala proximidad espacial. "Vecinas" es idiomático en español y conserva la relación de cercanía.
- source_word: ἐπελθὼν
  english_pob_choice: to visit
  chosen_spanish: visitar
  alternatives_spanish:
  - ir a
  - acercarse a
  - pasar a
  lexicon: LSJ
  rationale: El participio indica movimiento hacia las ciudades con valor de acción concomitante. "Visitar" reproduce de manera natural el ir hacia ellas sin añadir una intención oficial que el griego no exige.
- source_word: παρακαλέσαι
  english_pob_choice: encourage them
  chosen_spanish: exhortarlas
  alternatives_spanish:
  - animarlas
  - apelar a ellas
  - invitarlas
  lexicon: LSJ
  rationale: παρακαλέω abarca exhortar, animar y apelar. En este contexto, dirigido a ciudades en un marco político, "exhortarlas" refleja mejor la fuerza exhortativa que "animarlas"; el pronombre femenino plural concuerda con "ciudades".
translation_notes:
  revision_awareness: Se siguió el valor del participio de acción previa en κατακρατήσας y del infinitivo final/complementario en παρακαλέσαι; se evitó depender mecánicamente de la redacción inglesa, pero se respetaron sus decisiones léxicas auditadas como contexto.
  spanish_consistency_notes:
  - Se mantuvo el registro sobrio y bíblico, sin recurrir a vocabulario eclesiástico más tradicional de lo que el griego requiere.
  - La forma verbal en plural femenino ('las exhortó') se evitó; en su lugar, 'exhortarlas' conserva la referencia colectiva a 'ciudades'.
  - No se introdujo 'Señor' ni terminología teológica ausente del verso.
