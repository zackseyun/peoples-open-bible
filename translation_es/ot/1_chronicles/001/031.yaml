lexical_decisions:
- source_word: יְטוּר
  english_pob_choice: Jetur
  chosen_spanish: Yetur
  alternatives_spanish:
  - Jetur
  lexicon: HALOT
  rationale: Nombre propio; en español bíblico es natural conservar la transliteración, ajustándola a una grafía que refleje mejor la consonante inicial hebrea y evitando imponer una forma inglesa como base obligatoria.
- source_word: נָפִישׁ
  english_pob_choice: Naphish
  chosen_spanish: Nafis
  alternatives_spanish:
  - Nafish
  lexicon: HALOT
  rationale: Nombre propio; se translitera de manera transparente al español. La forma con -is- evita una terminación inglesa innecesaria y mantiene la pronunciación aproximada.
- source_word: וָ/קֵדְמָה
  english_pob_choice: and Kedemah
  chosen_spanish: y Kedemá
  alternatives_spanish:
  - y Qedemá
  lexicon: HALOT
  rationale: La conjunción ו se rinde como 'y'. El nombre propio קֵדְמָה se translitera con acento gráfico en español para marcar la pronunciación final y conservar la forma nominal del hebreo.
- source_word: אֵלֶּה
  english_pob_choice: These
  chosen_spanish: Estos
  alternatives_spanish:
  - Éstos
  lexicon: HALOT
  rationale: El demostrativo introduce una cláusula identificativa. 'Estos' es natural y fiel en español contemporáneo.
- source_word: הֵם
  english_pob_choice: were
  chosen_spanish: fueron
  alternatives_spanish:
  - eran
  - son
  lexicon: HALOT
  rationale: 'En la cláusula identificativa del contexto genealógico, el español idiomático pide un verbo copulativo en pasado: ''Estos fueron...''.'
- source_word: בְּנֵי
  english_pob_choice: sons of
  chosen_spanish: hijos de
  alternatives_spanish:
  - descendientes de
  - hijos
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'hijos de', en español genealógico 'hijos de' reproduce bien la relación filial y suena natural.
- source_word: יִשְׁמָעֵאל
  english_pob_choice: Ishmael
  chosen_spanish: Ismael
  alternatives_spanish:
  - Yismael
  lexicon: HALOT
  rationale: Nombre propio bíblico con forma española establecida.
translation_notes:
  revision_awareness: Se corrigió la validación anterior añadiendo el marcador [a] directamente en el texto principal junto a Kedemá, para que toda nota quede anclada en la traducción.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo genealógico breve y nominal del hebreo.
  - Se evitó 'SEÑOR' u otras sustituciones porque el versículo no contiene el nombre divino.
  - La puntuación sigue el estilo español con coma serial omitida por la concisión del listado propio de genealogías.
