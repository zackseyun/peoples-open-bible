translation:
  language: es
  text: Yahvé abre los ojos de los ciegos[a]; Yahvé levanta a los encorvados; Yahvé ama a los justos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «da vista a los ciegos». El hebreo literalmente habla de abrir a los ciegos, es decir, abrirles los ojos.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El hebreo usa el nombre propio del pacto, no un título genérico. En español, «Yahvé» preserva el Tetragrámaton como nombre divino auditable, en consonancia con la política del proyecto y sin sustituirlo por una convención litúrgica.
- source_word: פֹּקֵחַ
  english_pob_choice: opens the eyes of
  chosen_spanish: abre los ojos de
  alternatives_spanish:
  - da vista a
  - da vista a los
  lexicon: HALOT
  rationale: El verbo con «ciegos» mantiene la imagen concreta de abrir los ojos, que en contexto implica ver. «Abre los ojos de» reproduce mejor la metáfora hebrea que una paráfrasis más interpretativa como «da vista a».
- source_word: עִוְרִים
  english_pob_choice: the blind
  chosen_spanish: los ciegos
  alternatives_spanish:
  - los que no ven
  - ciegos
  lexicon: HALOT
  rationale: El adjetivo funciona sustantivado. «Los ciegos» es natural en español y conserva la referencia a una clase de personas sin añadir explicaciones no presentes en el hebreo.
- source_word: זֹקֵף
  english_pob_choice: raises up
  chosen_spanish: levanta
  alternatives_spanish:
  - alza
  - endereza
  lexicon: HALOT
  rationale: El verbo puede expresar levantar o enderezar. «Levanta» es breve, fiel y compatible con el paralelismo con «encorvados», sin perder la idea de restauración.
- source_word: כְּפוּפִים
  english_pob_choice: those who are bowed down
  chosen_spanish: los encorvados
  alternatives_spanish:
  - los abatidos
  - los doblados
  lexicon: HALOT
  rationale: La imagen corporal de estar doblados o encorvados es central. «Los encorvados» conserva esa metáfora de manera clara en español y deja abierto el matiz físico y figurado de aflicción.
- source_word: אֹהֵב
  english_pob_choice: loves
  chosen_spanish: ama
  alternatives_spanish:
  - ama a
  - tiene amor por
  lexicon: HALOT
  rationale: El participio expresa una acción estable y actual. «Ama» comunica de forma directa la relación afectiva y pactal del sujeto con los justos.
- source_word: צַדִּיקִים
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los justos y rectos
  lexicon: HALOT
  rationale: «Justos» es la forma más transparente en español para el sustantivo/adjetivo hebreo en este contexto. Puede incluir la idea de rectitud de vida sin estrecharla a un matiz meramente judicial.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El versículo repite el nombre divino tres veces. Mantener «Yahvé» preserva la audibilidad del Nombre y evita la sustitución por un título, conforme a la doctrina editorial indicada en el POB en inglés.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Alcance de «abre los ojos de los ciegos»
  english_pob_reading: opens the eyes of the blind
  chosen_spanish_reading: abre los ojos de los ciegos
  alternative_spanish_readings:
  - da vista a los ciegos
  - da vista a los ciegos
  rationale: Se conserva la metáfora hebrea literal que, en contexto, describe el acto de restaurar la visión. No se suaviza a una formulación más interpretativa, para no borrar la tensión entre imagen corporal y sentido funcional.
  doctrine_reference: Salmo 146:8; nota lexical sobre פֹּקֵחַ
- issue: Valor de «encorvados»
  english_pob_reading: those who are bowed down
  chosen_spanish_reading: los encorvados
  alternative_spanish_readings:
  - los abatidos
  - los que están doblados
  rationale: «Encorvados» retiene la imagen física y el posible valor social de humillación o aflicción. Se evita reducirlo solo a un estado emocional, porque el hebreo permite ambas capas.
  doctrine_reference: Salmo 146:8; nota lexical sobre כְּפוּפִים
translation_notes:
  revision_awareness: Se consultó el texto hebreo (WLC), la morfología y el auditable inglés POB. La versión española sigue la filosofía de equivalencia óptima y conserva el paralelismo del verso sin ampliar el contenido. Se mantuvo el nombre divino como «Yahvé» de manera consistente con el estándar del proyecto y con la lectura inglesa ya documentada.
  spanish_consistency_notes:
  - Se usó «Yahvé» en las tres repeticiones del nombre divino para mantener consistencia interna y reflejar el hebreo directo.
  - 'Se prefirió una traducción uniforme de los sustantivos con valor colectivo: «los ciegos», «los encorvados», «los justos».'
  - La nota al pie se ancla solo en «los ciegos», donde existe la alternativa lexical documentada en el inglés POB.
