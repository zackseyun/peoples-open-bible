translation:
  language: es
  text: Pero Yahvé no les ha dado[a] un corazón para conocer, ni ojos para ver, ni oídos para oír, hasta este día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'un corazón para conocer, ni ojos para ver, ni oídos para oír, hasta este día'.
    reason: alternative_reading
lexical_decisions:
- source_word: וְלֹא
  english_pob_choice: But ... not
  chosen_spanish: Pero ... no
  alternatives_spanish:
  - Y ... no
  - Y tampoco
  lexicon: HALOT
  rationale: La partícula introduce contraste con lo anterior; en español, 'Pero' expresa mejor ese matiz adversativo que un simple 'Y', manteniendo la continuidad discursiva sin perder la oposición implícita.
- source_word: נָתַן
  english_pob_choice: has not given
  chosen_spanish: no les ha dado
  alternatives_spanish:
  - no les dio
  - no les daba
  lexicon: HALOT
  rationale: El perfecto hebreo presenta una realidad completada con vigencia hasta el presente narrativo; el pretérito perfecto compuesto español comunica bien esa permanencia, además del límite temporal 'hasta este día'.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino, siguiendo la política de la POB de no sustituir יהוה por un título. 'Yahvé' es la forma española estable y legible para el Tetragrámaton.
- source_word: לֵב לָדַעַת
  english_pob_choice: a heart to know
  chosen_spanish: un corazón para conocer
  alternatives_spanish:
  - un corazón para saber
  - una mente para entender
  lexicon: HALOT
  rationale: Se mantiene 'corazón' para respetar la antropología hebrea, que incluye centro interior, entendimiento y voluntad. 'Conocer' traduce mejor el valor relacional y cognitivo de ידע que un mero 'saber' en este contexto.
- source_word: וְעֵינַיִם לִרְאוֹת
  english_pob_choice: or eyes to see
  chosen_spanish: ni ojos para ver
  alternatives_spanish:
  - y ojos para ver
  - o ojos para ver
  lexicon: HALOT
  rationale: 'El español requiere ajustar la coordinación para que la serie negativa resulte natural: después de ''no les ha dado'' y de la primera especificación, ''ni'' reproduce la enumeración negativa sin introducir una disyunción extraña al castellano.'
- source_word: וְאָזְנַיִם לִשְׁמֹעַ
  english_pob_choice: or ears to hear
  chosen_spanish: ni oídos para oír
  alternatives_spanish:
  - y oídos para oír
  - oídos para escuchar
  lexicon: HALOT
  rationale: Se conserva el paralelismo hebreo con la misma coordinación negativa. 'Oídos para oír' mantiene la fuerza idiomática del texto; 'escuchar' suavizaría la correspondencia lexical.
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: to this day
  chosen_spanish: hasta este día
  alternatives_spanish:
  - hasta hoy
  - hasta el día de hoy
  lexicon: HALOT
  rationale: '''Hasta este día'' refleja de manera directa la fórmula temporal hebrea y conserva el tono narrativo bíblico sin sonar arcaico.'
theological_decisions:
- issue: Agencia divina en la falta de percepción de Israel
  english_pob_reading: The verse states directly that Yahweh has not given Israel the inward capacity to truly know, see, and hear up to that day.
  chosen_spanish_reading: El versículo dice de forma directa que Yahvé no les ha dado la capacidad interior de conocer, ver y oír hasta ese día.
  alternative_spanish_readings:
  - Yahvé no permitió que lo entendieran
  - Yahvé no les concedió discernimiento
  rationale: La traducción conserva la atribución explícita al sujeto divino y no la atenúa con una explicación más débil o meramente permisiva. A la vez, 'corazón', 'ojos' y 'oídos' se mantienen como imágenes concretas de percepción espiritual e intelectual, preservando la tensión teológica del pasaje sin resolverla artificialmente.
  doctrine_reference: Preservar la tensión teológica entre soberanía divina y responsabilidad humana.
translation_notes:
  revision_awareness: 'Coincide con la lectura inglesa auditada en el punto principal: contraste inicial, negación persistente y serie de imágenes corporales. No se aplicaron revisiones posteriores; se mantuvo la equivalencia óptima con ajuste natural del español en la coordinación negativa.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יהוה.
  - Se conserva 'corazón' en lugar de 'mente' para respetar la antropología hebrea.
  - La serie negativa 'no ... ni ... ni ...' es idiomática en español y refleja la enumeración hebrea sin introducir una lectura doctrinal adicional.
