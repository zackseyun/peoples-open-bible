translation:
  language: es
  text: 'Y ella les dijo en voz alta: «Alaben a Dios, alábenlo; alaben a Dios, que no apartó su misericordia de la casa de Israel, sino que destrozó a nuestros enemigos por mi mano esta noche».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: φωνῇ μεγάλῃ
  english_pob_choice: with a loud voice
  chosen_spanish: con voz fuerte
  alternatives_spanish:
  - en voz alta
  - con gran voz
  lexicon: LSJ
  rationale: La frase griega describe una proclamación audible y pública. En español, 'con voz fuerte' conserva ese carácter concreto sin sonar demasiado literal ni rebuscado; 'en voz alta' también sería posible, pero 'con voz fuerte' mantiene mejor la fuerza expresiva del original.
- source_word: Αἰνεῖτε
  english_pob_choice: Praise
  chosen_spanish: Alaben
  alternatives_spanish:
  - Den alabanza a
  - Exalten
  lexicon: LSJ
  rationale: El imperativo plural exhorta directamente a la alabanza. 'Alaben' es natural, bíblico y fiel al mandato repetido; evita una paráfrasis más larga y conserva la fuerza exhortativa.
- source_word: τὸν θεόν
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - al Dios
  - a Dios mismo
  lexicon: LSJ
  rationale: En español, con el verbo de exhortación 'alaben' se exige la preposición 'a'. Aunque el griego tiene artículo, 'Dios' es la forma idiomática y reverente en español. No se traduce 'el Dios' porque sonaría poco natural aquí.
- source_word: οὐκ ἀπέστησεν
  english_pob_choice: has not withdrawn
  chosen_spanish: no apartó
  alternatives_spanish:
  - no retiró
  - no retiró de sí
  - no alejó
  lexicon: LSJ
  rationale: El verbo expresa hacer que algo se aparte o se retire. 'No apartó' comunica bien la idea de que Dios no retiró su misericordia del pueblo, preservando el sentido de continuidad covenantal sin sobrecargar la frase.
- source_word: τὸ ἔλεος αὐτοῦ
  english_pob_choice: his mercy
  chosen_spanish: su misericordia
  alternatives_spanish:
  - su compasión
  - su misericordia fiel
  lexicon: LSJ
  rationale: '''Misericordia'' es la equivalencia más directa y sobria. Mantiene el tono religioso del pasaje y evita una glosa interpretativa más fuerte como ''amor constante'', que no está exigida por el griego.'
- source_word: ἀπὸ τοῦ οἴκου Ἰσραήλ
  english_pob_choice: from the house of Israel
  chosen_spanish: de la casa de Israel
  alternatives_spanish:
  - de Israel
  - de la familia de Israel
  lexicon: LSJ
  rationale: '''Casa de Israel'' conserva la expresión bíblica corporativa y formal. Es la mejor correspondencia para el giro griego, y evita diluir el eco escriturario.'
- source_word: ἔθραυσε
  english_pob_choice: has shattered
  chosen_spanish: quebró
  alternatives_spanish:
  - destrozó
  - trituró
  - rompió
  lexicon: LSJ
  rationale: El verbo es enérgico y denota derrota violenta. 'Quebró' mantiene la contundencia sin volverse demasiado idiomático en español moderno; 'destrozó' sería más fuerte, pero puede exceder la sobriedad del contexto.
- source_word: διὰ χειρός μου
  english_pob_choice: by my hand
  chosen_spanish: por mi mano
  alternatives_spanish:
  - mediante mi mano
  - a través de mi mano
  - por medio de mí
  lexicon: LSJ
  rationale: 'Se conserva el idiomático ''por mi mano'', que en español bíblico expresa agencia instrumental. Mantiene la tensión teológica: Dios es el agente principal, y Judith su instrumento.'
- source_word: ἐν τῇ νυκτὶ ταύτῃ
  english_pob_choice: this night
  chosen_spanish: en esta noche
  alternatives_spanish:
  - esta noche
  - durante esta noche
  - en la noche de hoy
  lexicon: LSJ
  rationale: La preposición y el demostrativo se traducen de forma directa y solemne. 'En esta noche' preserva el tono elevado del original y el carácter inmediato del acontecimiento.
theological_decisions:
- issue: Agencia divina y agencia humana en la victoria
  english_pob_reading: God is presented as the one who shattered the enemies, acting by Judith's hand.
  chosen_spanish_reading: Dios aparece como quien quebró a los enemigos, actuando por la mano de Judith.
  alternative_spanish_readings:
  - Judit quebró a los enemigos con ayuda de Dios
  - Dios ayudó a Judit a quebrar a los enemigos
  rationale: La sintaxis griega hace a Dios sujeto de la acción decisiva, mientras que 'por mi mano' indica instrumento humano. La traducción española conserva esa tensión teológica sin resolverla hacia una lectura más antropocéntrica.
  doctrine_reference: 'DOCTRINE.md: Preservar la tensión teológica en lugar de resolverla; prioridad del idioma original sobre la tradición de traducción.'
- issue: Repetición exhortativa de la alabanza
  english_pob_reading: Praise God, praise him; praise God
  chosen_spanish_reading: Alaben a Dios, alábenlo; alaben a Dios
  alternative_spanish_readings:
  - Den alabanza a Dios, denle alabanza; den alabanza a Dios
  - Alaben a Dios, alábenle; alaben a Dios
  rationale: La triple repetición debe mantenerse para reflejar el énfasis retórico del griego. Usar el pronombre enclítico 'alábenlo' evita repetir innecesariamente 'Dios' y reproduce bien la cadencia exhortativa.
  doctrine_reference: 'DOCTRINE.md: Mantener repeticiones significativas del original y no suavizar el énfasis retórico.'
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado ligeramente para ajustar 'this night' sin cambiar el sentido; la versión española sigue de cerca el griego y conserva esa misma referencia temporal con una formulación natural y solemne. No se requieren notas textuales adicionales porque el paquete fuente y el audit trail están de acuerdo en el contenido principal.
  spanish_consistency_notes:
  - Se mantiene 'Dios' en lugar de 'SEÑOR' porque el griego dice θεόν y no κύριος.
  - Se usa 'misericordia' como equivalente estable de ἔλεος, sin glosas interpretativas.
  - Se conserva la imagen instrumental 'por mi mano' para no borrar la mediación humana.
  - El registro es bíblico y formal, pero con sintaxis española natural.
  - No se introducen notas al pie porque no hay variantes textuales ni alternativas doctrinales que requieran marcaje en el texto principal.
