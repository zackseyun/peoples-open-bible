revisions:
- from: Y multiplicaré el fruto del árbol y la producción del campo[a], para que ya no sufran el oprobio del hambre entre las naciones.
  to: Y multiplicaré el fruto del árbol y el producto del campo,[a] para que ya no carguen con el oprobio del hambre entre las naciones.
  rationale: Se ajusta el verbo principal de la cláusula final para reflejar mejor el idiomatismo hebreo de llevar/cargar una afrenta, y se reemplaza 'producción' por 'producto' para una lectura más natural y bíblica en español sin alterar el sentido. La nota alternativa puede mantenerse tal como está, porque preserva una opción española válida para el matiz de חֶרְפָּה.
