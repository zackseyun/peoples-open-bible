lexical_decisions:
- source_word: הָרַבִּית
  english_pob_choice: Rabbith
  chosen_spanish: Rabit
  alternatives_spanish:
  - Harabit
  lexicon: HALOT
  rationale: Es un topónimo en una lista de límites; se translitera, no se traduce. En español, una forma breve y natural como «Rabit» conserva la referencia propia. La opción más mecánica «Harabit» refleja mejor la consonante inicial hebrea, pero suena más pesada en español.
- source_word: קִשְׁיוֹן
  english_pob_choice: Kishion
  chosen_spanish: Quisión
  alternatives_spanish:
  - Kishión
  - Kisión
  lexicon: HALOT
  rationale: Nombre propio de lugar. La forma «Quisión» adapta la secuencia hebrea al español con una ortografía legible y pronunciable. «Kishión» mantiene más de cerca la grafía transliterada inglesa, pero resulta menos natural para lectura en español.
- source_word: אָבֶץ
  english_pob_choice: Ebez
  chosen_spanish: Ebez
  alternatives_spanish:
  - Abez
  lexicon: HALOT
  rationale: Nombre propio de lugar; se conserva la transliteración convencional que ya coincide con la forma inglesa POB. «Abez» es una posible representación más cercana a la vocal inicial, pero no es la forma preferida aquí.
- source_word: וְ
  english_pob_choice: and
  chosen_spanish: y
  lexicon: Conjunction
  rationale: La conjunción coordinante se vierte normalmente como «y» en español para reproducir la enumeración hebrea.
- source_word: וָ
  english_pob_choice: and
  chosen_spanish: y
  lexicon: Conjunction
  rationale: La forma con cambio vocálico sigue cumpliendo la función de simple coordinación; por eso se traduce igual que la otra conjunción como «y».
translation_notes:
  revision_awareness: El texto fuente hebreo y la auditoría inglesa coinciden plenamente en que se trata de una lista de topónimos con conjunción repetida; no hubo revisiones aplicadas ni cambios textuales relevantes. Se mantiene la misma estructura enumerativa en español.
  spanish_consistency_notes:
  - Se conservó el polisíndeton con «y» antes de cada topónimo, siguiendo el hebreo y la traducción inglesa auditada.
  - Se optó por transliterar los nombres propios en lugar de traducirlos, porque son topónimos de una lista territorial.
  - La ortografía española de los nombres busca equilibrio entre fidelidad al original y legibilidad pública.
