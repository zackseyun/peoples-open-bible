review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: gobierno continuo de Dios, vigilancia sobre las naciones, y prohibición dirigida a los rebeldes. Conserva correctamente la imagen antropomórfica de «sus ojos» y mantiene «Selah». Sin embargo, la nota al pie no corresponde al punto léxico preservado por la auditoría inglesa: el pie inglés documenta alternativas para אַל יָרִימוּ לָמוֹ («lift themselves up / rise up»), no para «watch the nations».'
  spanish_quality_summary: 'El español es claro y digno. «Él gobierna para siempre con su poder; sus ojos vigilan a las naciones» suena natural. «No se enaltezcan los rebeldes» es comprensible, pero en español bíblico moderno suena más natural y directo con subjuntivo exhortativo inicial: «Que no se enaltezcan los rebeldes».'
  glossary_alignment: No hay términos del glosario mayor en disputa aquí. Se respeta «Selah». Las decisiones léxicas principales son coherentes con la justificación inglesa, salvo que la nota al pie debe trasladarse desde «naciones» a la cláusula sobre los rebeldes para reflejar la alternativa documentada de ירימו.
  issues:
  - severity: medium
    issue: La nota al pie está anclada en «naciones» y explica alternativas de «vigilan», pero la auditoría inglesa preserva la nota léxica para אַל יָרִימוּ לָמוֹ.
    rationale: Esto desaline­a el aparato crítico respecto de la evidencia fuente y omite precisamente la ambigüedad semántica documentada para «levantar(se)/alzarse/enaltecerse».
  - severity: low
    issue: La formulación «No se enaltezcan los rebeldes» es aceptable, pero menos idiomática que «Que no se enaltezcan los rebeldes» en este tipo de prohibición/jusivo poético.
    rationale: El hebreo usa אַל con imperfecto de valor prohibitvo/jusivo; en español una construcción con «que no» reproduce bien el tono exhortativo sin cambiar el sentido.
  revised_spanish_text: Él gobierna para siempre con su poder; sus ojos vigilan a las naciones. Que no se enaltezcan[a] los rebeldes. Selah
  revised_footnotes:
  - marker: a
    text: 'O: «se levanten» o «se alcen». El verbo hebreo puede denotar levantar(se), alzarse o enaltecerse.'
    reason: lexical_alternative
  revision_rationale: Se corrige la nota al pie para que documente la alternativa léxica real del hebreo en la cláusula final, conforme a la auditoría inglesa. Además, se ajusta levemente la prohibición a una forma más natural en español («Que no se enaltezcan») sin alterar el sentido de autoexaltación.
