  revised_footnotes:
  - marker: a
    text: O «el decreto se alejará mucho». El hebreo puede significar «frontera/límite» o «decreto/estatuto».
    reason: lexical_alternative
  revision_rationale: Se conserva la estructura y la interpretación contextual del original, pero se reemplaza «el límite será alejado» por una formulación idiomática en español que comunica mejor el sentido de distancia/remoción de יִרְחַק. También se alinea la nota con las alternativas léxicas documentadas en la auditoría inglesa, eliminando «medida».
