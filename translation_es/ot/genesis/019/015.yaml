review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del hebreo: amanecer en progreso, urgencia de los ángeles, doble imperativo, identificación de la esposa y las dos hijas presentes, y la advertencia de no perecer con la ciudad. Sin embargo, la decisión principal sobre בַּעֲוֺן הָעִיר no sigue fielmente la elección auditada del POB inglés, que privilegia ‘castigo/punishment’ en el texto principal y deja ‘iniquidad/culpa’ como alternativas en nota. Además, «junto con la culpa de la ciudad» suena menos natural y puede sugerir participación moral en la culpa, precisamente lo que la nota inglesa busca evitar.'
  spanish_quality_summary: El español es generalmente claro y digno. «El alba estaba despuntando», «apremiaron», «Levántate; toma» y «que están aquí» son naturales y fieles. La principal dificultad estilística está en «seas arrastrado junto con la culpa de la ciudad», que resulta semánticamente extraña en español y menos idiomática que una formulación con «castigo». También conviene alinear la nota con el texto principal revisado.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto en este versículo. La cuestión relevante es léxico-teológica: עָוֹן en contexto de juicio. Aquí debe mantenerse en el texto principal una opción como «castigo» o «castigo de la ciudad», con alternativas «iniquidad/culpa» en nota, conforme al rastro de auditoría inglés.'
  issues:
  - severity: high
    issue: El texto principal traduce בַּעֲוֺן הָעִיר como «junto con la culpa de la ciudad».
    rationale: El POB inglés documenta y escoge «in the punishment of the city» como lectura principal por contexto de juicio. La versión española invierte esa decisión y pone «culpa» en el texto, lo que además puede implicar erróneamente que Lot perecería en la culpa moral misma de la ciudad.
  - severity: medium
    issue: La expresión «junto con la culpa de la ciudad» es poco idiomática en español.
    rationale: En español, uno puede ser arrastrado o perecer en el castigo/destrucción de una ciudad, pero no suena natural ser arrastrado «junto con la culpa» de una ciudad. «Castigo» comunica mejor el sentido contextual y la advertencia.
  - severity: low
    issue: La nota al pie necesita reordenarse para presentar como alternativas las lecturas no escogidas en el texto principal.
    rationale: Si el texto principal se corrige a «castigo», la nota debe conservar «iniquidad» y «culpa» como alternativas, siguiendo el modelo auditado.
  revised_spanish_text: 'Y cuando el alba estaba despuntando, los ángeles apremiaron a Lot, diciendo: «Levántate; toma a tu mujer y a tus dos hijas que están aquí, para que no seas arrastrado en el castigo[a] de la ciudad».'
  revised_footnotes:
  - marker: a
    text: O «en la iniquidad de la ciudad» o «por la culpa de la ciudad». El hebreo de עָוֹן puede referirse a iniquidad, culpa o al castigo que resulta de esa culpa.
    reason: lexical_alternative
  revision_rationale: 'Se revisa únicamente la cláusula final para ajustarla al hebreo en contexto y a la decisión léxico-teológica ya documentada por el POB inglés: עָוֹן aquí se expresa mejor en el texto principal como «castigo» de la ciudad, mientras que «iniquidad» y «culpa» quedan preservadas en nota. Esto mejora tanto la fidelidad auditada como la naturalidad del español.'
