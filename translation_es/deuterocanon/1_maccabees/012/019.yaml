translation:
  language: es
  text: Por tanto, no quisimos molestarlos a ustedes y al resto de nuestros aliados y amigos en estas guerras[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «incomodarlos ... en estos conflictos». El verbo griego puede significar molestar, inquietar o imponer una carga; aquí el sentido parece ser diplomático o militar, más que de irritación personal.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ ἠβουλόμεθα
  english_pob_choice: we did not wish
  chosen_spanish: no quisimos
  alternatives_spanish:
  - no quisimos hacerlo
  - no estábamos dispuestos a
  lexicon: LSJ
  rationale: El imperfecto medio de βούλομαι expresa voluntad o intención pasada. En español, «no quisimos» transmite una decisión deliberada y suena natural sin perder el matiz volitivo.
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Entonces
  lexicon: LSJ
  rationale: Conserva el valor inferencial del contexto previo con una transición formal y clara en español.
- source_word: παρενοχλεῖν
  english_pob_choice: to trouble
  chosen_spanish: molestar
  alternatives_spanish:
  - incomodar
  - estorbar
  - causarles molestias
  lexicon: LSJ
  rationale: El verbo puede abarcar perturbación, molestia o imposición. «Molestar» es un equivalente natural en español y puede incluir la carga diplomática o militar del contexto sin exagerar a «hostigar».
- source_word: ὑμῖν
  english_pob_choice: you
  chosen_spanish: a ustedes
  alternatives_spanish:
  - los
  - a vosotros
  lexicon: LSJ
  rationale: Mantiene el plural de segunda persona de forma neutral para el español latinoamericano.
- source_word: τοὺς λοιποὺς
  english_pob_choice: the rest
  chosen_spanish: el resto
  alternatives_spanish:
  - los demás
  - los restantes
  lexicon: LSJ
  rationale: «El resto» reproduce la distinción entre los destinatarios y los demás aliados mencionados de manera natural y concisa.
- source_word: συμμάχους
  english_pob_choice: allies
  chosen_spanish: aliados
  alternatives_spanish:
  - confederados
  - aliados militares
  lexicon: LSJ
  rationale: Es el equivalente político-militar directo y más claro en español.
- source_word: φίλους
  english_pob_choice: friends
  chosen_spanish: amigos
  alternatives_spanish:
  - amigos cercanos
  - aliados amistosos
  lexicon: LSJ
  rationale: En el estilo diplomático helenístico φίλοι puede tener matiz político, pero «amigos» mantiene el término directo y el contexto ya aporta la carga relacional.
- source_word: ἐν τοῖς πολέμοις τούτοις
  english_pob_choice: in these wars
  chosen_spanish: en estas guerras
  alternatives_spanish:
  - en estos conflictos
  - durante estas guerras
  lexicon: LSJ
  rationale: Preserva el plural de πολέμοις y la localización circunstancial indicada por ἐν.
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego y el audit trail inglés. Se conserva la relación inferencial de οὖν, el valor volitivo de βούλομαι y el matiz amplio de παρενοχλεῖν, sin forzar una traducción más dura como «hostigar».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» fuera de este versículo porque el texto no contiene el nombre divino.
  - Se usa el trato plural «ustedes» para ὑμῖν, conforme al español neutral latinoamericano.
  - «Guerras» conserva el plural de πολέμοις y evita reducir el campo semántico a un conflicto único.
