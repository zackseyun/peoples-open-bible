    text: O, «en la bolsa de cuero». El término hebreo es amplio y aquí se refiere al contenedor de las piedras de David.
    reason: lexical_alternative
  - marker: b
    text: O, «La piedra se incrustó en su frente».
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «cayó sobre su rostro al suelo».
    reason: lexical_alternative
  revision_rationale: 'Se revisa para alinear mejor el español con el sentido contextual del hebreo y con las decisiones del POB inglés: «bolsa» reemplaza el demasiado genérico «recipiente»; «la lanzó con la honda» expresa correctamente el acto de usar la honda; y la cláusula final se rehace para un español más natural manteniendo la cercanía formal al hebreo auditado. También se corrige la colocación del marcador de nota.'
