translation:
  language: es
  text: Y cuando Yahvé te introduzca en la tierra de los cananeos[a], como juró a ti y a tus padres, y te la dé[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo dice literalmente: «Y sucederá que cuando». Aquí se traduce de forma más natural como «Y cuando», conservando el sentido temporal y prospectivo.'
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse «a tus antepasados»; el hebreo dice literalmente «a tus padres».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה כִּי
  english_pob_choice: And when
  chosen_spanish: Y sucederá que cuando
  alternatives_spanish:
  - Y cuando
  - Y será que cuando
  lexicon: HALOT
  rationale: La construcción hebrea introduce una circunstancia futura; en español, «Y sucederá que cuando» conserva el valor prospectivo de וְהָיָה כִּי sin sonar tan rígido como una calca literal. Mantiene también el inicio coordinado del hebreo.
- source_word: יְבִיאֲךָ
  english_pob_choice: brings you
  chosen_spanish: te introduzca
  alternatives_spanish:
  - te traiga
  - te lleve
  lexicon: HALOT
  rationale: El causativo de בוא expresa «hacer entrar / introducir». «Te introduzca» refleja mejor el movimiento hacia el interior de la tierra que un simple «te traiga», y se ajusta al complemento «en la tierra».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: La política española del proyecto pide «Yahvé» como forma principal del nombre divino. Conserva el nombre propio del pacto en vez de sustituirlo por un título.
- source_word: אֶל אֶרֶץ הַכְּנַעֲנִי
  english_pob_choice: into the land of the Canaanites
  chosen_spanish: en la tierra de los cananeos
  alternatives_spanish:
  - a la tierra de los cananeos
  - en la tierra de Canaán
  lexicon: HALOT
  rationale: Aunque אֶל suele marcar dirección, en español el verbo «introduzca» ya contiene la idea de ingreso; por eso «en la tierra» resulta natural y fiel. «De los cananeos» sigue de cerca el gentilicio hebreo sin reducirlo a un simple topónimo.
- source_word: כַּאֲשֶׁר
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - tal como
  - así como
  lexicon: HALOT
  rationale: En este contexto comparativo, «como» es el equivalente más directo y claro en español. Preserva la relación con el juramento previo.
- source_word: נִשְׁבַּע
  english_pob_choice: he swore
  chosen_spanish: juró
  alternatives_spanish:
  - hizo juramento
  - prestó juramento
  lexicon: HALOT
  rationale: El verbo español «jurar» transmite bien el acto de tomar juramento en forma verbal y es natural en registro bíblico contemporáneo. Mantiene el valor solemnemente pactal del hebreo.
- source_word: לְךָ וְלַאֲבֹתֶיךָ
  english_pob_choice: to you and to your fathers
  chosen_spanish: a ti y a tus padres
  alternatives_spanish:
  - a ti y a tus padres
  - a ti y a tus antepasados
  lexicon: HALOT
  rationale: Se conserva la referencia paternal concreta del hebreo («padres») en vez de generalizarla a «antepasados». «A ti y a tus padres» respeta el paralelismo del texto fuente y es idiomático en español.
- source_word: וּנְתָנָהּ לָךְ
  english_pob_choice: and gives it to you
  chosen_spanish: y te la dé
  alternatives_spanish:
  - y te la entregue
  - y te la conceda
  lexicon: HALOT
  rationale: La forma verbal futura/subjuntiva sigue la secuencia de la cláusula temporal. «Te la dé» mantiene la referencia femenina al sustantivo «tierra» y expresa con naturalidad la concesión divina.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa el Tetragrama directamente; el proyecto español lo vierte como «Yahvé» para preservar el nombre revelado de Dios sin la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Referencia a «tus padres»
  english_pob_reading: to your fathers
  chosen_spanish_reading: a tus padres
  alternative_spanish_readings:
  - a tus antepasados
  - a tus mayores
  rationale: La elección mantiene la forma concreta y genealógica del hebreo. No se generaliza a «antepasados» porque el texto original dice literalmente «padres».
  doctrine_reference: HALOT / fidelidad al sustantivo hebreo אָבוֹת en el contexto del juramento patriarcal
translation_notes:
  revision_awareness: La versión inglesa auditada quedó sin cambios tras la última revisión, con alto grado de acuerdo en la verificación cruzada; la presente redacción española sigue ese estado estable sin introducir variantes textuales nuevas.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al estándar español del proyecto para el Tetragrama.
  - Se preservó el paralelismo de la cláusula temporal con «Y sucederá que cuando».
  - Se eligió «te la dé» para concordar con «la tierra» y respetar el referente femenino.
  - Se conservó «padres» como traducción literal del hebreo, dejando la alternativa semántica en nota.
  - No se empleó «SEÑOR» ni «Cristo», ya que no corresponden al texto hebreo de este versículo.
