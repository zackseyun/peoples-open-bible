translation:
  language: es
  text: 'Y esta será su impureza en su flujo: ya sea que su cuerpo[a] corra con su flujo, o que su cuerpo esté obstruido de su flujo, esa es su impureza.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ‘su carne corre con su flujo ... su carne está obstruida de su flujo’. El hebreo usa ‘carne’, pero aquí se refiere a la condición corporal implicada en el flujo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: טֻמְאָתוֹ
  english_pob_choice: his uncleanness
  chosen_spanish: su impureza
  alternatives_spanish:
  - su inmundicia ritual
  - su uncleza
  lexicon: HALOT
  rationale: En Levítico la categoría es ritual/cultual; en español moderno ‘impureza’ comunica mejor el estado ritual sin introducir una connotación moral ajena. ‘Inmundicia ritual’ es posible, pero más explicativa y menos directa.
- source_word: זוֹב
  english_pob_choice: discharge
  chosen_spanish: flujo
  alternatives_spanish:
  - secreción
  - descarga
  lexicon: HALOT
  rationale: ‘Flujo’ mantiene el sentido de emisión corporal anormal y suena natural en español bíblico contemporáneo. ‘Secreción’ es más clínico, y ‘descarga’ suena más técnico o eléctrico.
- source_word: רָר
  english_pob_choice: runs with
  chosen_spanish: corra con
  alternatives_spanish:
  - fluya con
  - manara con
  lexicon: HALOT
  rationale: El verbo expresa que la carne/bajo carne ‘corre/fluye’ con el flujo. ‘Corra con’ conserva la imagen verbal de movimiento líquido sin volverla excesivamente mecánica.
- source_word: בְּשָׂרוֹ
  english_pob_choice: his body
  chosen_spanish: su carne
  alternatives_spanish:
  - su cuerpo
  - su cuerpo carnal
  lexicon: HALOT
  rationale: El hebreo dice literalmente ‘su carne’. Aunque el inglés POB optó por ‘his body’ por claridad, en español ‘su carne’ preserva mejor el dato léxico y la tensión cultual, con la nota aclaratoria para evitar una lectura extraña.
- source_word: הֶחְתִּים
  english_pob_choice: is stopped up
  chosen_spanish: esté obstruida
  alternatives_spanish:
  - esté cerrada
  - esté detenida
  lexicon: HALOT
  rationale: El sentido es de cierre/obstrucción. ‘Obstruida’ comunica bien la idea de bloqueo físico y funciona de manera natural en español.
- source_word: מִזּוֹבוֹ
  english_pob_choice: from his discharge
  chosen_spanish: por causa de su flujo
  alternatives_spanish:
  - de su flujo
  - a causa de su flujo
  lexicon: HALOT
  rationale: La preposición marca separación/origen. En español, ‘por causa de’ hace explícita la relación causal/condicionante que resulta de la obstrucción respecto del flujo, sin perder la referencia original al flujo.
- source_word: וְזֹאת תִּהְיֶה
  english_pob_choice: And this shall be
  chosen_spanish: Y esto será
  alternatives_spanish:
  - Y esto consistirá en
  - Y así será
  lexicon: HALOT
  rationale: Fórmula legal simple y fiel. ‘Y esto será’ conserva el inicio conjuntivo y el futuro normativo del hebreo.
- source_word: אוֹ
  english_pob_choice: whether ... or
  chosen_spanish: ya sea que ... o que
  alternatives_spanish:
  - sea ... o
  - o bien ... o
  lexicon: HALOT
  rationale: La construcción disyuntiva introduce dos condiciones alternativas bajo la misma norma. ‘Ya sea que ... o que’ hace explícita la lógica legal en español.
theological_decisions:
- issue: ‘carne’ en un contexto de pureza ritual
  english_pob_reading: The Hebrew uses 'flesh,' but here it refers to the bodily condition involved in the discharge.
  chosen_spanish_reading: Se mantiene ‘carne’ con una nota explicativa para no borrar el término hebreo, pero sin sugerir una antropología teológica ajena al contexto.
  alternative_spanish_readings:
  - su cuerpo
  - su parte corporal
  rationale: 'Aquí la tensión es lexical: el hebreo dice ‘carne’, pero el referente es el órgano o condición corporal implicada en el flujo. La nota preserva la literalidad y al mismo tiempo aclara el sentido.'
  doctrine_reference: Pureza ritual levítica; conservación de la forma léxica sin doctrinalizar el término
- issue: ‘impureza’ como categoría cultual
  english_pob_reading: his uncleanness
  chosen_spanish_reading: su impureza
  alternative_spanish_readings:
  - su inmundicia
  - su contaminación ritual
  rationale: No se trata de pecado moral sino de estado ritual. ‘Impureza’ mantiene la categoría cultual de Levítico y evita trasladarla a una mera suciedad física.
  doctrine_reference: Levítico 15; distinción entre pureza ritual y culpa moral
translation_notes:
  revision_awareness: El texto base en inglés ya estaba revisado y acordado sin cambios sustantivos; esta versión española sigue esa misma lectura, preservando la distinción entre ‘discharge/flujo’ y la literalidad de ‘carne’ con aclaración.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando el texto lo exija; este versículo no lo contiene.
  - Se mantiene ‘flujo’ para זוֹב en coherencia con el léxico español del proyecto.
  - Se conserva el registro legal y ritual, sin suavizar la impureza a una mera metáfora.
  - La nota de pie de página reproduce la alternativa literal para respetar la tensión del hebreo.
