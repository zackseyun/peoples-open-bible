translation:
  language: es
  text: el que forma los corazones de todos[a], el que comprende todas sus obras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el que forma sus corazones juntos». El hebreo יחד también puede entenderse como «juntos»; aquí se ha escogido una formulación que expresa mejor que él forma los corazones de todos en común.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַיֹּצֵר
  english_pob_choice: the one who forms
  chosen_spanish: el que forma
  alternatives_spanish:
  - el que moldea
  - el formador
  lexicon: HALOT
  rationale: El participio con artículo funciona de modo sustantivo; en español, «el que forma» conserva el valor caracterizador y evita un sustantivo más abstracto. «Moldea» sería posible, pero «forma» es más directo y cubre bien el sentido de dar forma.
- source_word: יַחַד
  english_pob_choice: alike
  chosen_spanish: de todos ellos
  alternatives_spanish:
  - todos juntos
  - por igual
  - al mismo tiempo
  lexicon: HALOT
  rationale: En este contexto, יחד no describe simultaneidad sino que apunta a que Dios forma cada corazón dentro del conjunto humano. La revisión inglesa optó por «the hearts of them all»; en español, «de todos ellos» preserva esa amplitud sin imponer una lectura de fusión colectiva. No se añade «por igual» porque podría sonar más interpretativo que el hebreo aquí.
- source_word: לִבָּם
  english_pob_choice: their hearts
  chosen_spanish: los corazones de todos ellos
  alternatives_spanish:
  - su corazón
  - sus corazones
  lexicon: HALOT
  rationale: Aunque el hebreo usa singular con sufijo plural, el referente es distributivo. «Los corazones de todos ellos» refleja con claridad el alcance plural y mantiene la concreción antropológica del texto.
- source_word: הַמֵּבִין
  english_pob_choice: who understands
  chosen_spanish: el que entiende
  alternatives_spanish:
  - el que discierne
  - el que comprende
  lexicon: HALOT
  rationale: El Hifil de בין expresa comprender/discernir. «Entiende» es natural en español y mantiene el paralelismo con «forma» sin cargar el verso con un matiz demasiado técnico.
- source_word: אֶל כָּל מַעֲשֵׂיהֶם
  english_pob_choice: all their deeds
  chosen_spanish: todos sus hechos
  alternatives_spanish:
  - todas sus obras
  - todo lo que hacen
  lexicon: HALOT
  rationale: «מַעֲשִׂים» alude a acciones concretas; «hechos» conserva bien el sentido moral y observable. «Obras» también sería válido, pero en español puede sonar más religioso o más amplio de lo necesario.
theological_decisions:
- issue: Alcance del sujeto humano del versículo
  english_pob_reading: The verse speaks of God as the one who forms every human heart and understands every human deed.
  chosen_spanish_reading: El versículo presenta a Dios como el que forma los corazones de todos y entiende todos sus hechos.
  alternative_spanish_readings:
  - Puede referirse más estrechamente a los corazones de reyes o naciones en el contexto inmediato.
  - Puede leerse como una observación general sobre la humanidad sin enfatizar el alcance universal.
  rationale: El contexto inmediato amplía el horizonte desde «todos los habitantes de la tierra»; por eso la traducción conserva un alcance general y no lo restringe artificialmente. A la vez, «de todos ellos» deja abierta la referencia contextual sin resolverla más allá del texto.
  doctrine_reference: Preservar la tensión contextual sin reducir el alcance universal del enunciado.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que corrigió una formulación tipo 'their hearts alike' para expresar mejor 'the hearts of them all'. En español se reflejó ese ajuste con 'los corazones de todos ellos', manteniendo la amplitud distributiva sin introducir una idea de simultaneidad o uniformidad que el hebreo no exige.
  spanish_consistency_notes:
  - Se usa «forma» para יצר en sentido participial, en armonía con el estilo POB y con el valor verbal continuo.
  - Se usa «entiende» para בין como equivalente claro de comprensión/discernimiento.
  - Se prefirió «hechos» para מַעֲשִׂים por su concreción y porque evita una lectura excesivamente cultual de «obras».
  - No se tradujo YHWH porque este versículo no contiene el Tetragrámaton.
