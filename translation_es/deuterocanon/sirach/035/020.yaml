translation:
  language: es
  text: El paladar prueba los sabores de la comida[a][b], y el corazón comprende los sabores de la falsedad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El paladar prueba el sabor del discurso, y un corazón discernidor el sabor de las mentiras». El hebreo repite la metáfora del sabor en ambos miembros del verso.'
    reason: lexical_alternative
  - marker: b
    text: El paralelo griego en Swete difiere sustancialmente aquí («No vayas por un camino de tropiezo...»), lo que indica una gran divergencia textual; la traducción sigue el testimonio hebreo conservado como fuente principal de este versículo.
    reason: textual_variant
lexical_decisions:
- source_word: חך
  english_pob_choice: the palate
  chosen_spanish: el paladar
  alternatives_spanish:
  - la boca
  - la lengua
  - el gusto
  lexicon: HALOT
  rationale: «חך» nombra propiamente el órgano del gusto; «paladar» conserva la imagen sensorial con precisión y es natural en español.
- source_word: בוחן
  english_pob_choice: tests
  chosen_spanish: prueba
  alternatives_spanish:
  - examina
  - discierne
  - pone a prueba
  lexicon: HALOT
  rationale: «Prueba» comunica bien la función de comprobar discerniendo, y encaja con la metáfora del gusto sin sonar demasiado técnico.
- source_word: מטעמי
  english_pob_choice: the flavors of
  chosen_spanish: los sabores de
  alternatives_spanish:
  - los gustos de
  - el sabor de
  - las cualidades de
  lexicon: HALOT
  rationale: La forma plural concreta «sabores» preserva la imagen gustativa que el hebreo repite en ambos miembros del paralelismo.
- source_word: דבר
  english_pob_choice: speech
  chosen_spanish: la comida
  alternatives_spanish:
  - el habla
  - la palabra
  - el discurso
  lexicon: HALOT
  rationale: 'Sigo la corrección revisada del POB inglés: en este versículo, מטעמי se refiere a sabores reales en el primer miembro. Por eso, para mantener la lectura fuente-centrada, «de la comida» expresa mejor el dominio semántico del paladar y evita arrastrar una lectura de «speech» que el propio auditor revisó como incorrecta.'
- source_word: לב מבין
  english_pob_choice: the heart understands
  chosen_spanish: el corazón comprende
  alternatives_spanish:
  - un corazón entendido
  - un corazón discernidor
  - el corazón discierne
  lexicon: HALOT
  rationale: 'La construcción verbal hebrea se rinde de forma más natural con un verbo explícito: «el corazón comprende». Mantiene la antropología bíblica del corazón como sede del entendimiento.'
- source_word: כזב
  english_pob_choice: falsehood
  chosen_spanish: la falsedad
  alternatives_spanish:
  - las mentiras
  - el engaño
  - lo falso
  lexicon: HALOT
  rationale: «Falsedad» conserva el valor abstracto y amplio de כזב, sin limitarlo solo a mentiras puntuales.
translation_notes:
  revision_awareness: La versión española sigue el texto hebreo de Ben Sira como fuente primaria y toma la lectura griega como divergente en este versículo. El audit trail inglés corrigió una formulación anterior («speech») a «food» para el primer miembro; por eso la redacción española refleja la escena gustativa concreta y no una referencia al habla.
  spanish_consistency_notes:
  - Se mantiene «paladar» como término anatómico y metafórico coherente con la elección POB de «the palate».
  - Se evita importar terminología eclesiástica tradicional ajena al hebreo.
  - «Falsedad» conserva el tono abstracto de כזב, paralelo a «sabores» en ambos cola.
  - La puntuación y el paralelismo buscan una cadencia bíblica clara en español sin arcaísmo excesivo.
