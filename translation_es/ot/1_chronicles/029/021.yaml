base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/029/021.yaml
  text: 'They sacrificed sacrifices to Yahweh and offered up burnt offerings to Yahweh on the next day after that day: one thousand bulls[a], one thousand rams, one thousand lambs, and their drink offerings[c][b], and sacrifices in abundance for all Israel.'
  footnotes:
  - marker: a
    text: Or more smoothly, 'on the following day.' The Hebrew is literally 'on the next day after that day.'
    reason: lexical_alternative
  - marker: b
    text: '''Drink offerings'' refers to liquid offerings poured out with the animal sacrifices; alternatively, ''libations.'''
    reason: cultural_note
  - marker: c
    text: Or 'on behalf of all Israel.'
    reason: alternative_reading
