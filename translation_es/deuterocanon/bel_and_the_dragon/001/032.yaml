translation:
  language: es
  text: Ahora bien, había siete leones en el foso[a], y cada día se les daba dos cuerpos y dos ovejas; pero entonces no se les dio nada, para que devoraran a Daniel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dos cadáveres» o «dos cuerpos muertos» para «dos cuerpos»; el griego dice «cuerpos» (σώματα), y el contexto sugiere alimento para los leones.
    reason: lexical_alternative
lexical_decisions:
- source_word: λάκκῳ
  english_pob_choice: pit
  chosen_spanish: foso
  alternatives_spanish:
  - pozo
  - hoya
  lexicon: LSJ
  rationale: λάκκος designa un hoyo, foso o cisterna. En español, «foso» conserva la imagen de encierro para los leones y resulta natural en este contexto narrativo; «pozo» sugeriría más fácilmente un hueco vertical para agua.
- source_word: ἑπτὰ λέοντες
  english_pob_choice: seven lions
  chosen_spanish: siete leones
  lexicon: LSJ
  rationale: Coincidencia directa de número y sustantivo; no requiere expansión ni glosa.
- source_word: ἐδίδοτο
  english_pob_choice: they were given
  chosen_spanish: se les daba
  alternatives_spanish:
  - les daban
  lexicon: LSJ
  rationale: El imperfecto pasivo/impersonal expresa una provisión habitual. «Se les daba» preserva el valor iterativo y evita introducir un sujeto explícito.
- source_word: τὴν ἡμέραν
  english_pob_choice: each day
  chosen_spanish: cada día
  alternatives_spanish:
  - diariamente
  lexicon: LSJ
  rationale: La acusativa temporal indica provisión regular; «cada día» es idiomático y conserva la frecuencia habitual.
- source_word: δύο σώματα
  english_pob_choice: two bodies
  chosen_spanish: dos cuerpos
  alternatives_spanish:
  - dos cadáveres
  - dos cuerpos muertos
  lexicon: LSJ
  rationale: σώματα significa literalmente «cuerpos». Aunque el contexto sugiere víctimas humanas para alimentar a los leones, el griego no usa un término más específico como «cadáveres»; por eso se mantiene «cuerpos» para respetar la formulación del texto.
- source_word: δύο πρόβατα
  english_pob_choice: two sheep
  chosen_spanish: dos ovejas
  alternatives_spanish:
  - dos corderos
  lexicon: LSJ
  rationale: πρόβατα corresponde de manera estándar a ovejas; «corderos» precisaría demasiado sin apoyo del griego.
- source_word: οὐκ ἐδόθη αὐτοῖς
  english_pob_choice: nothing was given to them
  chosen_spanish: no se les dio nada
  alternatives_spanish:
  - no les fue dado nada
  - se les dio nada
  lexicon: LSJ
  rationale: El negativo pasivo se vierte naturalmente con «no se les dio nada», que conserva la ausencia total de alimento en ese día.
- source_word: ἵνα καταφάγωσιν
  english_pob_choice: so that they might devour
  chosen_spanish: para que devoraran
  alternatives_spanish:
  - a fin de que devoraran
  - para que se comieran
  lexicon: LSJ
  rationale: καταφαγεῖν intensifica la acción de comer hasta consumir. «Devoraran» reproduce esa fuerza predatoria mejor que un simple «comieran».
- source_word: τὸν Δανιήλ
  english_pob_choice: Daniel
  chosen_spanish: a Daniel
  alternatives_spanish:
  - Daniel
  lexicon: LSJ
  rationale: El acusativo con objeto directo en español requiere la preposición «a» ante persona definida.
translation_notes:
  revision_awareness: 'Se mantiene el sentido del griego de Swete sin depender mecánicamente de la redacción inglesa: se conserva la literalidad de σώματα, se expresa el imperfecto habitual con valor iterativo en español y se usa un verbo fuerte («devoraran») para καταφάγωσιν. No se documentaron cambios textuales o revisiones relevantes en el audit trail inglés.'
  spanish_consistency_notes:
  - Se preservó «Dios/Yahvé» sin uso aquí, por no aparecer en el versículo.
  - Se eligió «foso» en lugar de «pozo» para no suavizar el encierro de los leones.
  - La nota al pie se ancla en «foso» porque la única ambigüedad relevante del record está en el sustantivo griego σώματα, no en el lugar.
