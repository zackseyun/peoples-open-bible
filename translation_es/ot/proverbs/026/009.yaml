    rationale: 'El inglés preserva una nota importante: el verbo literalmente significa ''sube/asciende'' y puede sugerir que la espina es alzada, blandida o se mete en la mano de manera peligrosa e incontrolada. Esa información debe conservarse.'
  - severity: low
    issue: La nota existente está incompleta respecto al expediente inglés y puede ordenarse mejor.
    rationale: La nota sobre חוֹחַ es válida, pero debe convivir con la nota verbal y mantener marcadores únicos en orden.
  revised_spanish_text: Como una espina que sube a la mano de un borracho[b][a], así es un proverbio en la boca de los necios.
