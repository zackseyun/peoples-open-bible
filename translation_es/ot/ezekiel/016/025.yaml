- from: En cada encrucijada de camino edificaste tu altura[a], y hiciste detestable tu belleza[b]. Abriste tus piernas para todo transeúnte y multiplicaste tu prostitución.
  to: En cada cruce de caminos edificaste tu lugar alto[a], e hiciste detestable tu belleza. Abriste tus piernas a todo transeúnte y multiplicaste tu prostitución[b].
