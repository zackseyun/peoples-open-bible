translation:
  language: es
  text: Pero si el hombre no tiene pariente redentor[a] a quien devolver la restitución por la culpa, la restitución por la culpa que se devuelve a Yahvé pertenece al sacerdote[b], además del carnero de expiación, por medio del cual se hace expiación por él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'redentor' o 'pariente más cercano'. El hebreo גֹּאֵל designa a un miembro de la familia con responsabilidad legal en asuntos de redención o restitución.
    reason: lexical_alternative
  - marker: b
    text: El hebreo אָשָׁם aquí se refiere a la restitución o compensación por la culpa, no al carnero mismo; el carnero se menciona aparte después.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָאִישׁ / הָאִישׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  lexicon: HALOT
  rationale: El hebreo es masculino singular, y el audit trail inglés también preserva esa forma. En español, 'el hombre' comunica de manera natural la referencia gramatical sin borrar el género marcado por el texto.
- source_word: גֹּאֵל
  english_pob_choice: kinsman-redeemer
  chosen_spanish: pariente redentor
  alternatives_spanish:
  - redentor
  - pariente
  - pariente cercano
  lexicon: HALOT
  rationale: '''Pariente redentor'' conserva en español el doble valor familiar y jurídico del término. ''Redentor'' solo sería demasiado general, y ''pariente cercano'' perdería la función legal destacada por el POB inglés.'
- source_word: הָאָשָׁם
  english_pob_choice: restitution for the guilt
  chosen_spanish: restitución por la culpa
  alternatives_spanish:
  - compensación por la culpa
  - reparación por la culpa
  - ofrenda por la culpa
  lexicon: HALOT
  rationale: Aquí el término no designa el animal sacrificial sino la compensación debida por la falta. 'Restitución por la culpa' mantiene la conexión con la culpa y distingue claramente la suma/restauración del carnero mencionado después.
- source_word: הָאָשָׁם הַמּוּשָׁב
  english_pob_choice: the restitution for the guilt that is returned
  chosen_spanish: la restitución por la culpa que se devuelve
  alternatives_spanish:
  - la compensación por la culpa que se repone
  - la restitución por la culpa que se restituye
  lexicon: HALOT
  rationale: El participio pasivo de שוב subraya la acción de devolver/restaurar. El español 'que se devuelve' transmite esa idea legal y restitutiva sin añadir un sujeto explícito no dicho por el hebreo.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - a Yahveh
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para יהוה: ''Yahvé'' en el texto principal. La preposición ''a'' conserva el valor direccional de la restitución hacia Yahvé.'
- source_word: לַכֹּהֵן
  english_pob_choice: belongs to the priest
  chosen_spanish: pertenece al sacerdote
  alternatives_spanish:
  - es del sacerdote
  - corresponde al sacerdote
  lexicon: HALOT
  rationale: El hebreo presenta una atribución/destino legal; 'pertenece al sacerdote' expresa con claridad ese resultado jurídico en español, como en la solución inglesa 'belongs to the priest'.
- source_word: מִלְּבַד
  english_pob_choice: besides
  chosen_spanish: además de
  alternatives_spanish:
  - aparte de
  - fuera de
  lexicon: HALOT
  rationale: Indica suma, no identificación, entre la restitución y el carnero. 'Además de' es la forma española más natural y clara para esa relación aditiva.
- source_word: אֵיל הַכִּפֻּרִים
  english_pob_choice: the ram of atonement
  chosen_spanish: el carnero de expiación
  alternatives_spanish:
  - el carnero para la expiación
  - el carnero de reconciliación
  lexicon: HALOT
  rationale: '''Expiación'' es el término más fiel y reconocido para el campo sacrificial de כפר en este contexto. ''Carnero de expiación'' preserva la función cultual sin convertirla en una paráfrasis más amplia.'
- source_word: יְכַפֶּר בּוֹ עָלָיו
  english_pob_choice: by which atonement is made for him
  chosen_spanish: por medio del cual se hace expiación por él
  alternatives_spanish:
  - con el cual se hace expiación por él
  - por el cual se expía por él
  lexicon: HALOT
  rationale: El hebreo presenta el carnero como medio instrumental de expiación. 'Por medio del cual se hace expiación por él' conserva esa pasiva cultual sin forzar un sujeto humano explícito.
theological_decisions:
- issue: Distinción entre restitución civil y expiación sacrificial
  english_pob_reading: The verse distinguishes the monetary restitution from the sacrificial ram; both are required when no kinsman-redeemer exists.
  chosen_spanish_reading: El versículo distingue la restitución debida de la expiación sacrificial; ambas son necesarias cuando no hay pariente redentor.
  alternative_spanish_readings:
  - La restitución misma podría entenderse como la ofrenda
  - La restitución y el carnero podrían leerse como un solo acto cultual
  rationale: La estructura del hebreo, reforzada por 'además de', separa claramente la restitución que se devuelve de el carnero de expiación. La traducción española mantiene esa tensión y evita confundir compensación legal con sacrificio.
  doctrine_reference: Translation philosophy §1, §5
- issue: Renderización del nombre divino יהוה
  english_pob_reading: the LORD
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El proyecto exige 'Yahvé' en el texto principal para יהוה. Aquí no se sustituye por 'SEÑOR', y la frase conserva el valor de pertenencia/destino del pago hacia Dios.
  doctrine_reference: 'Contested terms: יהוה YHWH'
translation_notes:
  revision_awareness: Se ha seguido el estado de revisión más reciente con alta concordancia y sin cambios pendientes; la redacción española mantiene la distinción léxica entre גֹּאֵל, אָשָׁם y אֵיל הַכִּפֻּרִים, y conserva la relación aditiva marcada por מִלְּבַד.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יהוה según la norma del proyecto.
  - Se mantiene 'expiación' para כפר en el lenguaje sacrificial, y 'restitución por la culpa' para אָשָׁם cuando refiere compensación.
  - Se conserva la pasiva impersonal 'se hace expiación' para evitar introducir un sujeto no explícito en el hebreo.
  - Las notas a pie de página se anclan solo en los puntos donde el español crea o necesita aclarar una alternativa léxica real.
