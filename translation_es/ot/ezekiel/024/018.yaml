translation:
  language: es
  text: Entonces hablé al pueblo por la mañana[a], y mi esposa murió al atardecer. Luego, por la mañana, hice como me había sido mandado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y hablé al pueblo por la mañana ... y por la mañana hice como me había sido mandado». El hebreo usa verbos enlazados con waw consecutivo; la traducción los hace más fluidos en español sin perder la secuencia narrativa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֲדַבֵּר
  english_pob_choice: So I spoke
  chosen_spanish: Así hablé
  alternatives_spanish:
  - Y hablé
  - Entonces hablé
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «Así hablé» conserva la secuencia/resultatividad sin sonar rígido en español. «Hablé» por sí solo perdería algo del enlace narrativo.
- source_word: אֶל הָעָם
  english_pob_choice: to the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - al pueblo
  - a la gente
  lexicon: HALOT
  rationale: «עָם» aquí designa al conjunto del pueblo; «pueblo» conserva el matiz colectivo y suena más preciso que «gente» en este contexto profético.
- source_word: בַּבֹּקֶר
  english_pob_choice: in the morning
  chosen_spanish: por la mañana
  alternatives_spanish:
  - en la mañana
  - esa mañana
  lexicon: HALOT
  rationale: La frase temporal indica el momento de hablar. «Por la mañana» es natural en español y mantiene el valor temporal sin forzar la preposición hebrea.
- source_word: וַתָּמָת
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  - pasó a mejor vida
  lexicon: HALOT
  rationale: מות es el verbo común «morir». «Murió» reproduce la franqueza del hebreo sin suavizarla.
- source_word: אִשְׁתִּי
  english_pob_choice: my wife
  chosen_spanish: mi esposa
  alternatives_spanish:
  - mi mujer
  lexicon: HALOT
  rationale: El sufijo posesivo con אִשָּׁה en contexto marital significa «esposa». «Esposa» es claro y digno en español bíblico actual.
- source_word: בָּעָרֶב
  english_pob_choice: in the evening
  chosen_spanish: en la tarde
  alternatives_spanish:
  - por la noche
  - al anochecer
  lexicon: HALOT
  rationale: En español latinoamericano, «en la tarde» puede corresponder mejor al tramo vespertino temprano que el hebreo בערב puede abarcar en este contexto narrativo. Se evita precisar demasiado «noche».
- source_word: וָאַעַשׂ
  english_pob_choice: Then ... I did
  chosen_spanish: Luego, ... hice
  alternatives_spanish:
  - Y hice
  - Entonces hice
  lexicon: HALOT
  rationale: «עשה» aquí remite a cumplir la acción mandada. «Hice» conserva el sentido general y «Luego» refleja el avance narrativo del waw consecutivo.
- source_word: כַּאֲשֶׁר
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - tal como
  - según
  lexicon: HALOT
  rationale: Introduce conformidad con el mandato. «Como» es la opción más natural y fiel en español.
- source_word: צֻוֵּיתִי
  english_pob_choice: I had been commanded
  chosen_spanish: me había sido mandado
  alternatives_spanish:
  - me habían mandado
  - se me había ordenado
  lexicon: HALOT
  rationale: El pasivo marca a Ezequiel como receptor de una orden. «Me había sido mandado» mantiene esa pasividad y el orden temporal anterior a la acción.
translation_notes:
  revision_awareness: 'El texto coincide con el sentido del hebreo masorético y con el audit trail inglés: habla matinal a la gente, muerte vespertina de la esposa, y obediencia ejecutada a la mañana siguiente. No se requirieron revisiones adicionales respecto del consenso de la fuente.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exija explícitamente; este versículo no lo contiene.
  - Se mantiene «pueblo» para עָם por tratarse de un colectivo identificado, no de una multitud indefinida.
  - «Esposa» evita ambigüedad y conserva el valor marital de אִשְׁתִּי.
