translation:
  language: es
  text: hasta que la tierra hubiera disfrutado de sus descansos sabáticos; todo el tiempo de su desolación guardó descanso sabático[a], para completar setenta años.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «hasta que la tierra hubiera estado complacida con sus sábados». El griego personifica la tierra; «hubiera disfrutado de sus descansos sabáticos» expresa el sentido de manera natural en español.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἕως τοῦ εὐδοκῆσαι
  english_pob_choice: until ... had enjoyed
  chosen_spanish: hasta que ... hubiera disfrutado
  alternatives_spanish:
  - hasta que ... estuviera complacida
  - hasta que ... tomara deleite
  lexicon: LSJ
  rationale: La construcción temporal indica duración hasta una meta. εὐδοκέω, en relación con la tierra y sus sábados, expresa una idea de agrado o deleite; en español, "hubiera disfrutado" comunica de forma natural que la tierra recibió sus reposos sabáticos pendientes, sin imponer una personificación demasiado extraña.
- source_word: τὴν γῆν
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - el suelo
  lexicon: LSJ
  rationale: En este contexto de exilio, γῆ se refiere a la tierra de Judá y no al mundo entero. "La tierra" conserva el valor geográfico y teológico del pasaje.
- source_word: τὰ σάββατα αὐτῆς
  english_pob_choice: its Sabbaths
  chosen_spanish: sus sábados
  alternatives_spanish:
  - sus reposos sabáticos
  - sus sábados sabáticos
  lexicon: LSJ
  rationale: Se conserva el plural y la raíz léxica de sábado para reflejar el énfasis intertextual en el descanso sabático de la tierra. "Sus sábados" es fiel y comprensible en español.
- source_word: πάντα τὸν χρόνον τῆς ἐρημώσεως αὐτῆς
  english_pob_choice: all the time of its desolation
  chosen_spanish: todo el tiempo de su desolación
  alternatives_spanish:
  - durante todo el tiempo de su desolación
  - por todo el tiempo de su devastación
  lexicon: LSJ
  rationale: La frase expresa la duración completa del estado arruinado de la tierra. "Desolación" preserva el registro solemne y encaja bien con el contexto del destierro.
- source_word: σαββατιεῖ
  english_pob_choice: it kept Sabbath
  chosen_spanish: guardó sábado
  alternatives_spanish:
  - observó sábado
  - reposó en sábado
  lexicon: LSJ
  rationale: El verbo está emparentado con sábado y comunica específicamente observancia de descanso sabático. "Guardó sábado" mantiene esa conexión léxica en español de forma natural y respetuosa del alcance del original.
- source_word: εἰς συμπλήρωσιν
  english_pob_choice: to complete
  chosen_spanish: para completar
  alternatives_spanish:
  - hasta completar
  - con el fin de completar
  lexicon: LSJ
  rationale: 'La preposición y el sustantivo expresan finalidad o resultado: el guardar sábado de la tierra contribuye a completar el periodo señalado. "Para completar" es conciso y claro.'
- source_word: ἐτῶν ἑβδομήκοντα
  english_pob_choice: seventy years
  chosen_spanish: setenta años
  alternatives_spanish:
  - setenta años completos
  lexicon: LSJ
  rationale: Es una expresión numérica directa; se traduce literalmente por su peso histórico y teológico en las tradiciones del exilio.
theological_decisions:
- issue: Lenguaje sabático aplicado a la tierra durante el exilio
  english_pob_reading: Retain explicit Sabbath terminology ('its Sabbaths,' 'it kept Sabbath') rather than flattening to generic rest.
  chosen_spanish_reading: Mantener el lenguaje sabático explícito ('sus sábados', 'guardó sábado') en vez de reducirlo a un reposo genérico.
  alternative_spanish_readings:
  - sus reposos ... reposó
  - sus descansos sabáticos ... descansó
  rationale: El griego repite conscientemente el campo léxico de sábado para evocar la teología de que la tierra recibe sus descansos sabáticos omitidos durante la desolación. Conservar esa repetición hace visible la carga intertextual y teológica del verso.
  doctrine_reference: 'DOCTRINE.md: Consistency of key terms, or documented exception.'
translation_notes:
  revision_awareness: Se tomó como ancla principal el griego de Swete; el testimonio paralelo hebreo funciona solo como control de contexto para el tema del juicio sobre la tierra y la destrucción de Jerusalén, no como base primaria de la redacción.
  spanish_consistency_notes:
  - Se mantuvo «sábado/sábados» para preservar la repetición léxica del original.
  - Se prefirió «la tierra» por el valor contextual de γῆ en el exilio.
  - Se evitó «SEÑOR» o cualquier máscara por no haber aquí el Tetragrámaton en el texto base.
  - La nota a pie de página conserva la tensión entre traducción natural y personificación literal del griego.
