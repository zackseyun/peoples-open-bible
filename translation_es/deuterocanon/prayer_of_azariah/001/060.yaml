translation:
  language: es
  text: Bendigan al Señor[a], Israel; cántenle alabanzas y exáltenlo en gran manera para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Alaben al Señor, Israel». El griego εὐλογεῖτε también puede verterse «alaben» en este contexto de adoración.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογεῖτε
  english_pob_choice: Bless
  chosen_spanish: Bendigan
  alternatives_spanish:
  - Alaben
  - Bendigan
  lexicon: BDAG
  rationale: En un contexto litúrgico, εὐλογεῖτε puede expresar bendecir o alabar. «Bendigan» conserva el giro bíblico de dirigir bendición/alabanza a Dios y mantiene el imperativo plural.
- source_word: Ἰσραήλ
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - Oh, Israel
  - Israel
  lexicon: LSJ
  rationale: Aquí funciona como vocativo. En español, el vocativo se expresa con la entonación y la coma, por lo que «Israel» basta sin añadir una partícula innecesaria.
- source_word: τὸν κύριον
  english_pob_choice: the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - al Señor
  - al Maestro
  lexicon: BDAG
  rationale: κύριον se refiere a Dios en este himno. «Señor» sigue la decisión doctrinal del proyecto para κύριος y, con la preposición «a», refleja el objeto directo animado del español.
- source_word: ὑμνεῖτε
  english_pob_choice: sing praise
  chosen_spanish: canten alabanzas
  alternatives_spanish:
  - canten himnos
  - alaben con canto
  lexicon: BDAG
  rationale: ὑμνεῖτε implica cantar alabanzas o himnos. «Canten alabanzas» conserva el matiz musical y es natural en español litúrgico.
- source_word: ὑπερυψοῦτε
  english_pob_choice: highly exalt
  chosen_spanish: ensálcenlo altamente
  alternatives_spanish:
  - ensálcenlo sobremanera
  - exáltenlo grandemente
  lexicon: BDAG
  rationale: El verbo compuesto intensifica la acción de exaltar. «Ensálcenlo altamente» reproduce esa intensificación sin perder claridad.
- source_word: εἰς τοὺς αἰῶνας
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por los siglos
  - para siempre
  lexicon: BDAG
  rationale: En esta doxología, la idea es duración perpetua. «Para siempre» comunica de forma natural el sentido idiomático del griego.
theological_decisions:
- issue: Tratamiento de κύριος en un himno dirigido a Dios
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el SEÑOR
  rationale: El griego usa κύριον, no el Tetragrama directamente. Siguiendo la norma del proyecto, se traduce como «Señor»; no se usa mayúscula plena como convención de sustitución.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, κύριος → Lord'
translation_notes:
  revision_awareness: 'Se corrigió el problema anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español, anclado en «Señor[a]». Se mantuvo la lectura del audit trail inglés: εὐλογεῖτε admite «bendigan» o «alaben», κύριος se vierte como «Señor», ὑμνεῖτε como alabanza cantada, ὑπερυψοῦτε con intensificación y εἰς τοὺς αἰῶνας como perpetuidad idiomática.'
  spanish_consistency_notes:
  - Se mantuvo el registro litúrgico y solemne sin caer en calcos rígidos.
  - «Señor» se usa como equivalente de κύριος según la norma del proyecto.
  - La coma tras «Israel» marca el vocativo en español sin añadir partículas ajenas al texto.
  - «Para siempre» conserva la naturalidad idiomática del refrán doxológico.
