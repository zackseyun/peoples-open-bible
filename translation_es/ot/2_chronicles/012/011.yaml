translation:
  language: es
  text: Y sucedía que, cada vez que el rey entraba en la casa de Yahvé, venían los guardias[a] y los llevaban[b], y luego los devolvían al aposento[c] de los guardias.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los corredores», es decir, la guardia real.
    reason: lexical_alternative
  - marker: b
    text: Se refiere a los escudos de bronce mencionados en el versículo anterior.
    reason: cross_reference
  - marker: c
    text: O «cuarto de guardia».
    reason: lexical_alternative
lexical_decisions:
- source_word: מִדֵּי בּוֹא
  english_pob_choice: whenever ... entered
  chosen_spanish: cada vez que ... entraba
  alternatives_spanish:
  - cuando ... entraba
  - así que, cada vez que ... entraba
  lexicon: HALOT
  rationale: La construcción expresa repetición habitual, no un solo hecho. «Cada vez que» comunica bien el valor iterativo en español y mantiene el sentido de ocurrencia repetida.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa de Yahvé, el templo
  lexicon: HALOT
  rationale: Conservo la expresión hebrea «casa» como en el texto fuente; en español es natural y suficientemente clara para referirse al lugar de culto. Uso «Yahvé» por la norma del proyecto para el Tetragrámaton.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el Nombre divino. «Yahvé» preserva la referencia explícita al Tetragrámaton y evita la sustitución por un título genérico.
- source_word: הָרָצִים
  english_pob_choice: the guards
  chosen_spanish: los guardias
  alternatives_spanish:
  - los corredores
  - los correos
  lexicon: HALOT
  rationale: Aunque literalmente significa «los corredores», en el contexto real y militar designa a la guardia real. «Guardias» comunica la función contextual sin perder la identidad del grupo.
- source_word: וּנְשָׂאוּם
  english_pob_choice: carry them
  chosen_spanish: los llevaban
  alternatives_spanish:
  - los cargaban
  - los transportaban
  lexicon: HALOT
  rationale: El verbo indica tomar y trasladar los objetos mencionados en el versículo anterior. «Los llevaban» resulta natural en español para el traslado de objetos ceremoniales.
- source_word: וֶהֱשִׁבוּם
  english_pob_choice: return them
  chosen_spanish: los devolvían
  alternatives_spanish:
  - los llevaban de vuelta
  - los regresaban
  lexicon: HALOT
  rationale: El hiphil de שוב expresa hacer volver los objetos a su lugar. «Los devolvían» conserva esa idea de regreso al sitio de almacenamiento.
- source_word: תָּא
  english_pob_choice: chamber
  chosen_spanish: aposento
  alternatives_spanish:
  - cámara
  - cuarto
  - guardería
  lexicon: HALOT
  rationale: «Aposento» transmite una habitación o estancia cerrada sin sonar excesivamente moderno ni técnico. En contexto, el aposento pertenece a los guardias, por eso añado la especificación.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el Tetragrámaton directamente. Mantengo una forma audible del Nombre, según la política del proyecto, en vez de ocultarlo bajo un título. «Yahvé» es la forma establecida para el texto español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Identidad de הָרָצִים en contexto real
  english_pob_reading: the guards
  chosen_spanish_reading: los guardias
  alternative_spanish_readings:
  - los corredores
  - la guardia real
  rationale: Aunque el término hebreo es literalmente «corredores», en el pasaje describe una función cortesana de custodia y traslado. «Guardias» evita un falso literalismo y preserva la lectura contextual reflejada en el POB inglés.
  doctrine_reference: HALOT; contexto inmediato de 2 Crónicas 12:10–11
- issue: Objeto implícito de los verbos 'carry/return'
  english_pob_reading: them
  chosen_spanish_reading: los
  alternative_spanish_readings:
  - las
  - los escudos
  rationale: El pronombre retoma los escudos de bronce mencionados en el versículo anterior. En español, mantener el pronombre reproduce la elipsis del hebreo y conserva la relación textual sin sobrecargar el versículo.
  doctrine_reference: Referencia cruzada a 2 Crónicas 12:10
translation_notes:
  revision_awareness: 'Coincido con el control de revisión en que no hacía falta cambiar la solución: el hebreo es claro en su valor iterativo, en la referencia al Tetragrámaton y en la función contextual de הָרָצִים. La redacción española mantiene esas decisiones y solo ajusta la fluidez para lectura pública.'
  spanish_consistency_notes:
  - Uso «Yahvé» de forma consistente para יְהוָה.
  - Mantengo «casa» en «casa de Yahvé» para reflejar בית sin reemplazarlo automáticamente por «templo».
  - Conservo el pronombre «los» para el objeto implícito, siguiendo la referencia al versículo previo.
  - «Guardias» expresa la función contextual de הָרָצִים en esta escena real.
  - «Aposento» preserva el matiz de habitación o cámara pequeña para תָּא.
