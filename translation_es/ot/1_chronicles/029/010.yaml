revisions:
- from: 'Entonces David bendijo a Yahvé[a] delante de todo el asamblea, y David dijo: “Bendito eres tú, Yahvé, el Dios de Israel, nuestro padre[b], desde la eternidad y hasta la eternidad”.'
  to: 'Entonces David bendijo a Yahvé delante de toda la asamblea, y David dijo: «Bendito eres tú, Yahvé, el Dios de Israel nuestro padre[a], desde la eternidad y hasta la eternidad».'
  rationale: 'Se corrigió la concordancia gramatical (''toda la asamblea''), se movió la nota al sintagma realmente afectado por la variante interpretativa (''nuestro padre''), y se simplificó la puntuación para reflejar mejor la lectura principal documentada en el audit trail: ''Israel nuestro padre'' como designación patriarcal, no vocativo directo a Dios. No se requiere adjudicación adicional porque son ajustes claros de gramática y anclaje de nota, no un caso fuente incierto.'
