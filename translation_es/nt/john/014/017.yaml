    issue: La nota [a] formula de manera poco natural la alternativa griega
    rationale: '«O: “el cual el mundo no puede recibir...”» no es español idiomático. La nota debe expresar la alternativa impersonal/neutra de forma natural, por ejemplo «lo cual» o una reformulación explícita con pronombres neutros/impersonales.'
  - severity: medium
