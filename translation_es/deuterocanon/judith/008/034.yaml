review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego: prohibición de indagar, negativa a comunicar información y límite temporal hasta la culminación de lo que Judith hace. Sin embargo, «no les diré nada» añade «nada», que no está explícito en οὐ γὰρ ἐρῶ ὑμῖν; en este contexto es mejor «no les diré» o «no se lo diré». Además, «mi acción» es formalmente cercano al inglés auditado, pero en español suena algo rígido; «mi proceder» preserva el sustantivo de πρᾶξις con mejor naturalidad.'
  spanish_quality_summary: 'El español es claro, pero «investigar mi acción» y especialmente «no les diré nada» resultan menos idiomáticos o más expansivos de lo necesario. Una leve revisión mejora fluidez y precisión: «no deben indagar en mi proceder, porque no les diré…».'
  glossary_alignment: No hay términos del glosario teológico principal en juego. La revisión propuesta respeta la decisión auditada de mantener un sustantivo en la primera cláusula para τὴν πρᾶξίν μου, pero lo adapta a un español más natural con «proceder».
  issues:
  - severity: medium
    issue: «no les diré nada» añade un elemento no explícito en el griego
    rationale: οὐ γὰρ ἐρῶ ὑμῖν significa sencillamente «pues no les diré / no se lo diré». «Nada» explicita de más la negación de contenido.
  - severity: medium
    issue: «mi acción» suena poco natural en español en este contexto
    rationale: Aunque formalmente cercano a πρᾶξις y a la revisión inglesa, en español bíblico-natural «mi proceder» comunica mejor el sustantivo sin rigidez ni ambigüedad innecesaria.
  - severity: low
    issue: «investigar mi acción» suena algo forzado
    rationale: Con «mi proceder», el verbo «indagar en» encaja mejor que «investigar», manteniendo la idea de pesquisa o sondeo minucioso de ἐξερευνήσετε.
  revised_spanish_text: Pero ustedes no deben indagar en mi proceder, porque no les diré hasta que se haya cumplido lo que yo estoy haciendo.
  revision_rationale: 'Se ajusta el español para reflejar con mayor fidelidad y naturalidad el griego: se evita añadir «nada», se conserva el sustantivo de πρᾶξις mediante «proceder», y se usa «indagar en» como equivalente natural de ἐξερευνήσετε en esta construcción.'
