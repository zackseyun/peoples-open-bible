translation:
  language: es
  text: Los príncipes contuvieron sus palabras[a], y pusieron la mano sobre la boca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nobles contuvieron su habla».
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂרִים
  english_pob_choice: Princes
  chosen_spanish: príncipes
  alternatives_spanish:
  - nobles
  - jefes
  - gobernantes
  lexicon: HALOT
  rationale: שָׂרִים designa personas de alto rango o autoridad. "Príncipes" en español conserva ese nivel social elevado y mantiene el paralelismo con la deferencia pública descrita en Job 29. "Nobles" también es posible, pero "príncipes" resulta más cercano al registro y a la elección inglesa auditada.
- source_word: עָצְרוּ
  english_pob_choice: held back
  chosen_spanish: contenían
  alternatives_spanish:
  - retenían
  - reprimían
  - detenían
  lexicon: HALOT
  rationale: El verbo expresa aquí la idea de restringir o contener el habla. "Contenían" es natural en español y conserva la noción de freno interior o externo, sin perder la imagen de autocontrol de la línea.
- source_word: בְמִלִּים
  english_pob_choice: their words
  chosen_spanish: sus palabras
  alternatives_spanish:
  - su habla
  - su discurso
  - al hablar
  lexicon: HALOT
  rationale: Aunque literalmente dice algo como "en/con palabras", el contexto con עצר pide entender que contenían lo que iban a decir. "Sus palabras" hace explícito el referente de manera idiomática en español, igual que la versión inglesa auditada.
- source_word: וְכַף
  english_pob_choice: their hand
  chosen_spanish: su mano
  alternatives_spanish:
  - la palma
  - la mano
  lexicon: HALOT
  rationale: כַּף puede referirse a la palma o a la mano. En el gesto de guardar silencio, "su mano" es la forma más natural y transparente en español, y conserva el valor corporal del hebreo.
- source_word: יָשִׂימוּ
  english_pob_choice: put
  chosen_spanish: ponían
  alternatives_spanish:
  - colocaban
  - puestas
  - elevaban
  lexicon: HALOT
  rationale: El verbo es un poner/colocar general. "Ponían" reproduce bien la acción física repetida o típica del cuadro, y funciona con naturalidad en el gesto de cubrir la boca.
- source_word: לְפִיהֶם
  english_pob_choice: over their mouth
  chosen_spanish: sobre su boca
  alternatives_spanish:
  - sobre su boca
  - en su boca
  - contra su boca
  lexicon: HALOT
  rationale: La preposición hebrea puede expresar dirección hacia la boca, pero el gesto idiomático es cubrirla. "Sobre su boca" transmite de modo directo y fiel la acción de silenciarse, preservando la imagen corporal.
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español, anclado a la frase correspondiente.
  spanish_consistency_notes:
  - Se mantiene el plural de respeto social con «príncipes», coherente con la elección inglesa auditada.
  - Se preserva la imagen física del gesto de cubrir la boca sin sustituirla por una paráfrasis abstracta.
  - El registro es sobrio y bíblico, pero en español natural y publicable.
