id: GEN.35.1
reference: Genesis 35:1
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר אֱלֹהִים֙ אֶֽל יַעֲקֹ֔ב ק֛וּם עֲלֵ֥ה בֵֽית אֵ֖ל וְ/שֶׁב שָׁ֑ם וַ/עֲשֵׂה שָׁ֣ם מִזְבֵּ֔חַ לָ/אֵל֙ הַ/נִּרְאֶ֣ה אֵלֶ֔י/ךָ בְּ/בָרְחֲ/ךָ֔ מִ/פְּנֵ֖י עֵשָׂ֥ו אָחִֽי/ךָ־־־־׃
translation:
  text: Then God said to Jacob[a], “Arise, go up to Bethel and dwell there, and make there an altar to the God who appeared to you when you fled from the presence of Esau your brother.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more idiomatically, “when you fled from Esau your brother.” The Hebrew reads literally, “from the face of Esau your brother.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural modern English while preserving sequential force better than a bare 'and' in this context.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Although morphologically plural, with singular verbal agreement here it refers to the one God and is idiomatically rendered 'God.'
- source_word: קוּם
  chosen: Arise
  alternatives:
  - Get up
  - Rise
  lexicon: HALOT
  rationale: Imperative of standing/getting up. 'Arise' preserves the elevated but still readable tone of divine command; 'get up' is possible but less fitting in register.
- source_word: עֲלֵה
  chosen: go up
  alternatives:
  - ascend
  lexicon: HALOT
  rationale: The verb literally means 'go up/ascend.' 'Go up' is the most natural English equivalent and preserves the directional nuance, likely geographical/elevational toward Bethel.
- source_word: בֵּית אֵל
  chosen: Bethel
  alternatives:
  - Beth-el
  lexicon: HALOT
  rationale: As a place name, it is transliterated per translation philosophy rather than translated as 'house of God' in the main text.
- source_word: וְשֶׁב שָׁם
  chosen: and dwell there
  alternatives:
  - and live there
  - and stay there
  lexicon: HALOT
  rationale: ישב commonly means 'sit, remain, dwell.' 'Dwell there' fits the command to reside at Bethel and matches the solemn tone.
- source_word: וַעֲשֵׂה שָׁם מִזְבֵּחַ
  chosen: and make there an altar
  alternatives:
  - and build there an altar
  lexicon: HALOT
  rationale: עשה is broadly 'make/do.' With 'altar,' English often uses 'build,' but 'make' stays closer to the Hebrew while remaining natural.
- source_word: לָאֵל
  chosen: to the God
  alternatives:
  - for God
  - to God
  lexicon: HALOT
  rationale: The preposition ל here marks dedication/direction of the altar. 'To the God' best reflects the Hebrew construction and the following relative clause identifying him.
- source_word: הַנִּרְאֶה אֵלֶיךָ
  chosen: who appeared to you
  alternatives:
  - who was seen by you
  - who revealed himself to you
  lexicon: HALOT
  rationale: 'The Niphal participle of ראה here is passive/reflexive in sense: ''appeared.'' This is the standard and clearest English rendering in theophany contexts.'
- source_word: בְּבָרְחֲךָ
  chosen: when you fled
  alternatives:
  - in your fleeing
  - as you fled
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ב conveys temporal circumstance. 'When you fled' is idiomatic and precise.
- source_word: מִפְּנֵי
  chosen: from the face of
  alternatives:
  - from
  - away from the presence of
  lexicon: HALOT
  rationale: Literally 'from the face/presence of.' The main text keeps 'from the face of' to preserve the Hebrew idiom transparently; a smoother alternative is noted in a footnote.
- source_word: עֵשָׂו אָחִיךָ
  chosen: Esau your brother
  alternatives:
  - your brother Esau
  lexicon: HALOT
  rationale: Both English orders are possible. 'Esau your brother' follows the Hebrew sequence more closely while remaining natural.
