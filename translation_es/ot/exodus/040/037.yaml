revisions:
- from: Pero si la nube no se levantaba[a], no partían hasta el día en que se levantaba.
  to: Pero si la nube no se levantó[a], no partieron hasta el día en que se levantó.
  rationale: Se ajustaron los verbos al pretérito para representar mejor el valor narrativo puntual del hebreo en español natural y alinearse con la traducción inglesa auditada («did not rise ... did not set out ... it rose»). Se conservó la alternativa literal en nota, con puntuación más natural.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:27:28Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura condicional y el sentido básico del hebreo: si la nube no subía, el pueblo no salía hasta el día de su subida. Sin embargo, el uso del imperfecto español repetido («se levantaba», «partían», «se levantaba») suena más habitual/iterativo que narrativo en este contexto. Para preservar mejor la referencia temporal puntual del hebreo narrativo y la decisión inglesa auditada, conviene usar pasado simple.'
  spanish_quality_summary: 'El español es claro y natural, pero puede mejorarse con tiempos verbales más idiomáticos para narrativa bíblica en español moderno. «No se levantó ... no partieron» lee con mayor claridad que el imperfecto. También es preferible simplificar la nota: «de su subida» o «de su levantarse»; la redacción actual es entendible, aunque algo torpe por la nominalización pronominal.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «La nube» y «partieron» son adecuados. «Se levantó» conserva bien עלה en contexto; no hace falta introducir «subió» ni «fue alzada».
  issues:
  - severity: medium
    issue: Uso de imperfectos españoles en una cláusula narrativa puntual
    rationale: '«No se levantaba ... no partían ... se levantaba» puede sugerir acción habitual o repetida. El hebreo aquí, en secuencia narrativa condicional, se expresa mejor en español con pretérito: «no se levantó ... no partieron ... se levantó».'
  - severity: low
    issue: Nota al pie con formulación algo poco natural
    rationale: «de su levantarse» es aceptable como literalización, pero suena algo forzada. Puede mantenerse por fidelidad, aunque una forma como «de su subida» o una puntuación más limpia mejora la legibilidad sin perder el valor lexical alternativo.
  revised_spanish_text: Pero si la nube no se levantó[a], no partieron hasta el día en que se levantó.
  revised_footnotes:
  - marker: a
    text: 'O, más literalmente: «hasta el día de su levantarse».'
    reason: lexical_alternative
  revision_rationale: Se ajustaron los verbos al pretérito para representar mejor el valor narrativo puntual del hebreo en español natural y alinearse con la traducción inglesa auditada («did not rise ... did not set out ... it rose»). Se conservó la alternativa literal en nota, con puntuación más natural.
