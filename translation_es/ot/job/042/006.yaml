translation:
  language: es
  text: Por tanto, me desprecio[a], y me arrepiento en polvo y ceniza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Por tanto, me retracto, y cedo acerca de polvo y ceniza». El hebreo es conciso y debatido, sobre todo en cuanto al objeto implícito de «desprecio/rechazo» y al matiz de «me arrepiento / cedo / me consuelo».'
    reason: alternative_reading
lexical_decisions:
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por esta razón
  - Entonces
  lexicon: HALOT
  rationale: La frase introduce una conclusión inferida del discurso previo de Yahvé y de la respuesta de Job. «Por tanto» conserva la fuerza conclusiva sin sonar artificial en español.
- source_word: אֶמְאַס
  english_pob_choice: I despise myself
  chosen_spanish: me desprecio a mí mismo
  alternatives_spanish:
  - me rechazo
  - me repudio
  - desprecio mi caso
  lexicon: HALOT
  rationale: El hebreo tiene un verbo de rechazo/desprecio con objeto implícito. En español, para evitar borrar la referencia personal que adopta la traducción inglesa POB, se explicita reflexivamente «me desprecio a mí mismo». Se mantiene la tensión de que el objeto no está expresado de forma directa en el hebreo.
- source_word: וְנִחַמְתִּי
  english_pob_choice: and I repent
  chosen_spanish: y me arrepiento
  alternatives_spanish:
  - y me retracto
  - y me rindo
  - y me consuelo
  lexicon: HALOT
  rationale: En nifal, נחם puede expresar arrepentirse, relentirse, sentirse apenado o ser consolado. Dado el contexto de humillación ante Dios, «me arrepiento» comunica bien la respuesta penitencial, aunque se preserva la amplitud semántica en las alternativas.
- source_word: עַל
  english_pob_choice: in
  chosen_spanish: en
  alternatives_spanish:
  - sobre
  - en medio de
  - con respecto a
  lexicon: HALOT
  rationale: Aunque la preposición puede significar literalmente «sobre/upon», en la expresión con «polvo y ceniza» el español natural pide «en», que transmite estado o postura sin forzar la sintaxis.
- source_word: עָפָר וָאֵפֶר
  english_pob_choice: dust and ashes
  chosen_spanish: polvo y ceniza
  alternatives_spanish:
  - tierra y ceniza
  - polvo y cenizas
  lexicon: HALOT
  rationale: La pareja hebrea es una fórmula de humillación, mortalidad y duelo. «Polvo y ceniza» reproduce de manera transparente el binomio y su peso simbólico.
theological_decisions:
- issue: 'Sentido final de la respuesta de Job: abajamiento personal y arrepentimiento frente a recantación de sus palabras.'
  english_pob_reading: 'Job expresses personal self-abasement and repentance: ''I despise myself, and I repent in dust and ashes.'''
  chosen_spanish_reading: 'Job expresa abajamiento personal y arrepentimiento: «me desprecio a mí mismo, y me arrepiento en polvo y ceniza».'
  alternative_spanish_readings:
  - 'Job se retracta: «Por tanto, me retracto, y me rindo con respecto a polvo y ceniza».'
  - Job rechaza su queja anterior sin referencia explícita a sí mismo.
  rationale: El hebreo es breve y discutido, especialmente por el objeto implícito de אמאס y el matiz de נחמתי. El contexto inmediato favorece una respuesta de humillación ante Dios; por eso se conserva el lenguaje de arrepentimiento y auto-desprecio. A la vez, se mantienen las lecturas alternativas porque el texto permite una lectura de retractación o renuncia de su caso.
  doctrine_reference: 'Principio de traducción POB: preservar la tensión exegética en lugar de resolverla de forma prematura.'
translation_notes:
  revision_awareness: El cotejo más reciente indica alta concordancia y no registra cambios aplicados; por eso este borrador sigue la lectura principal ya aprobada y conserva la nota alternativa donde el hebreo sigue siendo debatido.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino según el criterio del proyecto, aunque este versículo no lo contiene explícitamente.
  - Se usa «polvo y ceniza» como equivalente idiomático estable de עָפָר וָאֵפֶר.
  - La nota [a] preserva la alternativa de retractación sin imponerla como lectura principal.
