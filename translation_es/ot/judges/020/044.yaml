translation:
  language: es
  text: Y de Benjamín cayeron dieciocho mil hombres[a]; todos estos eran guerreros valientes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «todos estos eran hombres de valor».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפְּלוּ
  english_pob_choice: fell
  chosen_spanish: cayeron
  alternatives_spanish:
  - fueron derribados
  - murieron
  lexicon: HALOT
  rationale: En contexto de batalla, נפל conserva el valor idiomático de caer en combate. «Cayeron» mantiene esa imagen sin añadir una explicación interpretativa excesiva.
- source_word: מִבִּנְיָמִן
  english_pob_choice: from Benjamin
  chosen_spanish: de Benjamín
  alternatives_spanish:
  - de entre Benjamín
  - entre Benjamín
  lexicon: HALOT
  rationale: El מִן marca procedencia o pertenencia tribal. «De Benjamín» es natural en español y conserva la identificación tribal de forma directa.
- source_word: שְׁמֹנָה עָשָׂר אֶלֶף אִישׁ
  english_pob_choice: eighteen thousand men
  chosen_spanish: dieciocho mil hombres
  alternatives_spanish:
  - dieciocho mil
  - dieciocho mil soldados
  lexicon: HALOT
  rationale: El hebreo incluye explícitamente אִישׁ, por lo que conviene reflejarlo con «hombres». «Soldados» sería más interpretativo.
- source_word: אֶת כָּל אֵלֶּה
  english_pob_choice: all these
  chosen_spanish: todos estos
  alternatives_spanish:
  - todos ellos
  - todos estos hombres
  lexicon: HALOT
  rationale: La construcción suma de forma apposicional al grupo caído. «Todos estos» reproduce esa referencia acumulativa sin añadir elementos ausentes del hebreo.
- source_word: אַנְשֵׁי חָיִל
  english_pob_choice: valiant warriors
  chosen_spanish: guerreros valientes
  alternatives_spanish:
  - hombres de valor
  - hombres valerosos
  - hombres poderosos
  lexicon: HALOT
  rationale: La expresión denota hombres de capacidad y valentía en un contexto militar. «Guerreros valientes» conserva el sentido bélico y comunica la cualidad de חָיִל en español moderno sin forzar un giro tradicional fijo.
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo y el auditable inglés POB. Se ajustó la puntuación para reflejar la cláusula final apposicional con punto y coma, y se ancló la nota lexical al sintagma final para evitar una nota suelta.
  spanish_consistency_notes:
  - Se mantuvo «Benjamín» como nombre tribal propio, con la preposición simple «de» para naturalidad y fidelidad.
  - Se prefirió «cayeron» frente a una paráfrasis como «fueron derribados» para conservar el idiomatismo militar del hebreo.
  - Se tradujo חָיִל con una equivalencia de cualidad marcial, evitando «mighty men» o fórmulas arcaicas que en español sonarían menos transparentes.
  - La nota alternativa se vinculó directamente a «guerreros valientes» para corresponder al matiz del inglés auditado «valiant warriors / men of valor».
