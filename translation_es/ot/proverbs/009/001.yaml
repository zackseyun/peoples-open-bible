translation:
  language: es
  text: La Sabiduría[a] ha edificado su casa; ha tallado sus siete pilares.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo חָכְמוֹת tiene forma plural, pero aquí funciona como singular personificado con verbos femeninos singulares: «Sabiduría».'
    reason: lexical_alternative
lexical_decisions:
- source_word: חָכְמוֹת
  english_pob_choice: Wisdom
  chosen_spanish: la Sabiduría
  alternatives_spanish:
  - la sabidurías
  - la Mujer Sabiduría
  lexicon: HALOT
  rationale: El hebreo tiene forma plural, pero funciona aquí como singular personificado con verbos y sufijos femeninos singulares. En español, «la Sabiduría» conserva esa personificación sin añadir un título interpretativo extra como «Mujer Sabiduría».
- source_word: בָּנְתָה
  english_pob_choice: has built
  chosen_spanish: ha edificado
  alternatives_spanish:
  - ha construido
  - edificó
  lexicon: HALOT
  rationale: El perfecto expresa una acción completa. «Ha edificado» suena natural en español bíblico y mantiene la imagen arquitectónica más solemne que «ha construido».
- source_word: בֵיתָהּ
  english_pob_choice: her house
  chosen_spanish: su casa
  alternatives_spanish:
  - su hogar
  - su familia
  lexicon: HALOT
  rationale: La imagen inmediata es material y arquitectónica, reforzada por «columnas». «Casa» preserva mejor ese campo semántico que «hogar» o «familia».
- source_word: חָצְבָה
  english_pob_choice: has hewn out
  chosen_spanish: ha labrado
  alternatives_spanish:
  - ha tallado
  - ha cortado
  lexicon: HALOT
  rationale: El verbo evoca trabajo de cantera o talla en piedra. «Ha labrado» comunica ese esfuerzo concreto y mantiene un registro digno en español.
- source_word: עַמּוּדֶיהָ
  english_pob_choice: her pillars
  chosen_spanish: sus siete columnas
  alternatives_spanish:
  - sus siete pilares
  - sus columnas
  lexicon: HALOT
  rationale: «Columnas» es el término arquitectónico natural en español y conserva la solidez del cuadro. Se incorpora el numeral con el sustantivo según el orden del hebreo y del inglés POB.
- source_word: שִׁבְעָה
  english_pob_choice: seven
  chosen_spanish: siete
  alternatives_spanish:
  - siete en número
  lexicon: HALOT
  rationale: Se vierte el numeral de manera directa. No se traslada en el texto principal una interpretación simbólica de plenitud, pues el sentido literal basta en este versículo.
theological_decisions:
- issue: Personificación de la sabiduría
  english_pob_reading: Render חָכְמוֹת as the personified singular 'Wisdom' with feminine pronouns.
  chosen_spanish_reading: Traducir como «la Sabiduría» en singular personificado, con referencia femenina implícita.
  alternative_spanish_readings:
  - «la Sabiduría» con nota explícita de personificación
  - «la Mujer Sabiduría»
  rationale: El hebreo presenta a la sabiduría como figura personificada femenina y usa verbos singulares; el español puede reflejarlo de forma natural con el artículo femenino y el sustantivo en singular. No se añade «Mujer» porque sería más interpretativo que el texto mismo.
  doctrine_reference: Principio de equivalencia óptima; conservar el sentido llano del personaje literario sin ampliación doctrinal.
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado y quedó sin cambios; la versión española sigue la misma lectura base, manteniendo la personificación singular de חָכְמוֹת y la imagen arquitectónica de casa y columnas.
  spanish_consistency_notes:
  - Se mantiene «Sabiduría» con artículo femenino singular para reflejar la personificación hebrea.
  - Se conserva el campo arquitectónico con «casa» y «columnas», evitando términos como «hogar» o «familia» que alterarían la imagen.
  - El numeral «siete» permanece literal, sin cargarlo en el texto principal con simbolismo interpretativo.
