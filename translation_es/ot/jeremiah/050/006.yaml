source:
  edition: WLC
  text: צֹ֤אן אֹֽבְדוֹת֙ היה עַמִּ֔/י רֹעֵי/הֶ֣ם הִתְע֔וּ/ם הָרִ֖ים שובבים מֵ/הַ֤ר אֶל גִּבְעָה֙ הָלָ֔כוּ שָׁכְח֖וּ רִבְצָֽ/ם־׃
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/050/006.yaml
  text: My people have been lost sheep[a]; their shepherds have led them astray, turning them away on the mountains. They have gone from mountain to hill[b]; they have forgotten their resting place.
  footnotes:
  - marker: a
    text: Or, more formally, 'their shepherds led them astray; the mountains made them wayward,' reflecting the difficult Hebrew word translated 'have made them wander.'
    reason: lexical_alternative
  - marker: b
    text: '''From mountain to hill'' may also echo Israel''s movement among the high places, a common image of apostasy in Jeremiah.'
    reason: cross_reference
