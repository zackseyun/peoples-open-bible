translation:
  language: es
  text: Y el sacerdote los quemará sobre el altar, como alimento[a], ofrenda hecha por fuego, para un aroma agradable[b]. Todo el sebo[c] pertenece a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''ofrenda de alimento''; literalmente, ''pan/alimento de una ofrenda hecha por fuego''.'
    reason: lexical_alternative
  - marker: b
    text: 'O: ''para un aroma apacible'' o ''para un aroma dulce''.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: ''Todo el sebo es para Yahvé''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְטִירָם
  english_pob_choice: And the priest shall burn them
  chosen_spanish: Y el sacerdote los quemará
  alternatives_spanish:
  - y el sacerdote los hará subir en humo
  - y el sacerdote los ofrecerá haciéndolos humear
  lexicon: HALOT
  rationale: En contexto sacrificial, el hifil de קטר se refiere a quemar la ofrenda de modo que ascienda en humo. 'Quemará' es natural y fiel; se conserva el sujeto explícito 'el sacerdote' y el objeto pronominal 'los'.
- source_word: הַמִּזְבֵּחָה
  english_pob_choice: on the altar
  chosen_spanish: sobre el altar
  alternatives_spanish:
  - en el altar
  - junto al altar
  lexicon: HALOT
  rationale: '''Sobre'' expresa bien la localización ritual en español y evita una lectura demasiado abstracta de la terminación direccional.'
- source_word: לֶחֶם אִשֶּׁה
  english_pob_choice: as food, an offering made by fire
  chosen_spanish: como alimento, ofrenda hecha por fuego
  alternatives_spanish:
  - como ofrenda de comida
  - como pan de ofrenda por fuego
  - como alimento de una ofrenda hecha por fuego
  lexicon: HALOT
  rationale: לֶחֶם puede abarcar 'alimento' y no solo 'pan', que sería engañoso aquí. אִשֶּׁה se conserva como 'ofrenda hecha por fuego' para mantener el giro sacrificial sin volverlo técnico en exceso. En el texto principal se omite el artículo antes de 'ofrenda' por fluidez española.
- source_word: לְרֵיחַ נִיחֹחַ
  english_pob_choice: for a pleasing aroma
  chosen_spanish: para aroma agradable
  alternatives_spanish:
  - para un aroma agradable
  - para un aroma apacible
  - para un olor agradable
  lexicon: HALOT
  rationale: Se mantiene la fórmula cultual sin añadir interpretación. 'Aroma agradable' es idiomático en español y conserva el sentido de aceptación, no una descripción literal de placer olfativo.
- source_word: כָּל חֵלֶב
  english_pob_choice: All the fat
  chosen_spanish: Todo el sebo
  alternatives_spanish:
  - Toda la grasa
  - Todo el sebo sacrificial
  - Toda la porción de grasa
  lexicon: HALOT
  rationale: '''חֵלֶב'' en este contexto sacrificial designa el sebo/fat reservado para Yahvé; ''sebo'' preserva mejor la referencia cultual específica que ''grasa'', que es más general. ''Todo'' mantiene el valor totalizante de כָּל.'
- source_word: לַיהוָה
  english_pob_choice: belongs to Yahweh
  chosen_spanish: pertenece a Yahvé
  alternatives_spanish:
  - es de Yahvé
  - está dedicado a Yahvé
  lexicon: HALOT
  rationale: La lamed de pertenencia/dedicación se expresa de forma natural con 'pertenece a'. Se mantiene 'Yahvé' conforme al criterio confesional y textual del proyecto, en lugar de un reemplazo por 'Señor'.
theological_decisions:
- issue: Fórmula sacrificial לְרֵיחַ נִיחֹחַ
  english_pob_reading: for a pleasing aroma
  chosen_spanish_reading: para aroma agradable
  alternative_spanish_readings:
  - para un aroma agradable
  - para aroma de grato olor
  - para un aroma apacible
  rationale: Se conserva la metáfora cultual como fórmula de aceptación ante Dios, sin explicar de más ni rebajarla a simple efecto sensorial. La elección evita calcos innecesarios y sigue siendo transparente para el lector español.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 Preserve theological tension rather than resolve it
- issue: Divina dedicación del sebo/fat a Yahvé
  english_pob_reading: All the fat belongs to Yahweh
  chosen_spanish_reading: Todo el sebo pertenece a Yahvé
  alternative_spanish_readings:
  - Todo el sebo es de Yahvé
  - Toda la grasa pertenece a Yahvé
  rationale: Se preserva la idea de dedicación exclusiva del elemento sacrificial a Yahvé. 'Pertenece' transmite mejor la fuerza posesiva/dedicativa de לַיהוָה que una simple equivalencia nominal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Se revisó la frase sacrificial principal para mantener la equivalencia óptima del audit trail inglés, pero con terminología española más natural: ''alimento'' en lugar de ''pan'' para לֶחֶם, ''ofrenda hecha por fuego'' para אִשֶּׁה, y ''sebo'' para חֵלֶב. La cláusula final se ajustó a una posesión/dedicación explícita (''pertenece a Yahvé''). No se detectaron cambios necesarios adicionales en la revisión más reciente.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' en toda la línea, conforme al proyecto.
  - '''Sebo'' se usa con valor técnico sacrificial; no se sustituye por ''grasa'' en el texto principal.'
  - La puntuación sigue el orden cultual del hebreo y el flujo natural del español.
  - Las notas conservan alternativas léxicas pertinentes sin resolver artificialmente la tensión de la fórmula cultual.
