translation:
  language: es
  text: 'y de la tribu de Benjamín: Gabaón con sus tierras de pastoreo[a], y Geba con sus tierras de pastoreo;'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'terrenos comunes' o 'terreno abierto' para la franja de tierra alrededor de cada ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מִ/מַּטֵּה
  english_pob_choice: and from the tribe of
  chosen_spanish: y de la tribu de
  alternatives_spanish:
  - y de la vara de
  - y de la rama de
  lexicon: HALOT
  rationale: En contexto de repartos tribales, מַטֶּה significa 'tribu'. En español, 'de la tribu de' expresa con naturalidad la relación de pertenencia y mantiene el enlace con la lista anterior.
- source_word: בִנְיָמִן
  english_pob_choice: Benjamin
  chosen_spanish: Benjamín
  alternatives_spanish:
  - Benjamin
  lexicon: HALOT
  rationale: Nombre propio tribal; se usa la forma española asentada con acento gráfico.
- source_word: גִּבְעוֹן
  english_pob_choice: Gibeon
  chosen_spanish: Gabaón
  alternatives_spanish:
  - Gibeón
  lexicon: HALOT
  rationale: Topónimo bíblico; se adopta la forma española tradicional y reconocible. La decisión no altera el referente geográfico del texto fuente.
- source_word: מִגְרָשֶׁהָ
  english_pob_choice: its pasturelands
  chosen_spanish: sus tierras de pastoreo
  alternatives_spanish:
  - su terreno común
  - sus tierras abiertas
  - sus tierras comunales
  lexicon: HALOT
  rationale: מִגְרָשׁ designa el terreno abierto alrededor de la ciudad, usado aquí como espacio de pastoreo. 'Tierras de pastoreo' preserva la función territorial sin reducirlo a una metáfora genérica; el posesivo español plural concuerda naturalmente con las dos ciudades mencionadas.
- source_word: גֶּבַע
  english_pob_choice: Geba
  chosen_spanish: Gueba
  alternatives_spanish:
  - Geba
  lexicon: HALOT
  rationale: Topónimo bíblico; se emplea una forma española coherente con la transliteración tradicional hispana. Se mantiene el mismo nombre de lugar distinguible en el inventario territorial.
- source_word: וְ/אֶת
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: HALOT
  rationale: La conjunción coordina los elementos de la enumeración. En español, 'y' es la opción neutra y fiel al encadenamiento del hebreo.
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia entre el texto hebreo y el audit trail inglés. No se requieren correcciones de contenido; la principal adaptación fue escoger equivalentes españoles naturales para los topónimos y para מִגְרָשׁ, sin suavizar el sentido territorial del hebreo.
  spanish_consistency_notes:
  - 'Se mantiene la estructura enumerativa del original: procedencia tribal + dos ciudades + sus tierras asociadas.'
  - Se usó 'Benjamín' con acento y topónimos españoles tradicionales para facilitar lectura eclesial sin perder referencia textual.
  - '''Tierras de pastoreo'' conserva el valor espacial de מִגְרָשׁ en este contexto de ciudades levíticas, en línea con la nota alternativa del POB inglés.'
