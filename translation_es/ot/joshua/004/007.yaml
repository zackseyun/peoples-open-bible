revisions:
- from: 'Entonces les diréis: «Las aguas del Jordán fueron cortadas[a] delante del arca del pacto de Yahvé. Cuando ella cruzó[b] el Jordán, las aguas del Jordán fueron cortadas». Y estas piedras serán un memorial[c] para los hijos de Israel para siempre.'
  to: 'Entonces les diréis: «Las aguas del Jordán fueron cortadas[a] delante del arca del pacto de Yahvé. Cuando cruzó[b] el Jordán, las aguas del Jordán fueron cortadas». Y estas piedras serán un memorial[c] para los hijos de Israel para siempre.'
  rationale: Se elimina el pronombre expreso «ella» para lograr un español más natural sin perder el referente del hebreo; la nota correspondiente se ajusta para explicar directamente el giro verbal hebreo. Se conservan las demás decisiones léxicas centrales del proyecto.
