revisions:
- from: 'Según sus hechos[a], así él pagará: furor a sus adversarios, retribución a sus enemigos; a las costas les pagará lo debido.'
  to: 'Según sus hechos, así él retribuirá: ira a sus adversarios, retribución a sus enemigos; a las regiones costeras[a] retribuirá lo debido.'
  rationale: La revisión corrige un punto importante de precisión semántica en לָאִיִּים, evitando que 'costas' se entienda como accidente geográfico en vez de pueblos o territorios distantes. Además, refuerza el tono judicial del verso con 'retribuirá' y usa 'ira' como opción más natural y clara en español bíblico moderno.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:24:34Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido básico del hebreo y del POB inglés: proporcionalidad de la retribución, sujeto implícito en tercera persona, y distinción entre adversarios/enemigos/coastlands. Sin embargo, en español ''a las costas les pagará'' suena impreciso, porque el referente en Isaías no son las costas físicas sino las regiones o pueblos costeros/distantes. También conviene ajustar ''pagará'' a ''retribuirá'' para reflejar mejor el tono judicial de יְשַׁלֵּם y la red léxica con גמול.'
  spanish_quality_summary: El texto es legible y digno, pero 'a las costas' resulta poco natural y potencialmente engañoso en español eclesial general. 'Furor' es posible, aunque 'ira' comunica mejor la fuerza judicial de חֵמָה en español bíblico contemporáneo. La revisión propuesta mejora naturalidad, precisión semántica y cohesión léxica sin alejarse del original.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. Las decisiones clave quedan bien alineadas: ''según'' para כְּעַל, ''hechos'' para גְּמֻלוֹת, ''adversarios'' y ''enemigos'' preservados. Se recomienda ''regiones costeras[a]'' en lugar de ''costas'' para לָאִיִּים, manteniendo la nota alternativa ''islas''. También se prefiere ''retribuirá'' y ''retribución'' para conservar el campo semántico judicial del hebreo.'
  issues:
  - severity: medium
    issue: '''a las costas'' para לָאִיִּים'
    rationale: En Isaías, אִיִּים suele referirse a tierras, regiones o naciones marítimas lejanas, no meramente a líneas costeras físicas. 'Costas' en español puede sonar geográfico-material más que etnogeográfico.
  - severity: medium
    issue: '''pagará'' debilita el matiz judicial de יְשַׁלֵּם'
    rationale: Aunque no es incorrecto, 'pagará' puede sonar demasiado económico o cotidiano. 'Retribuirá' encaja mejor con el contexto de juicio y con el sustantivo 'retribución'.
  - severity: low
    issue: '''furor'' como equivalente de חֵמָה'
    rationale: Es defendible, pero 'ira' suele sonar más natural y bíblicamente idiomático en español actual sin perder solemnidad.
  revised_spanish_text: 'Según sus hechos, así él retribuirá: ira a sus adversarios, retribución a sus enemigos; a las regiones costeras[a] retribuirá lo debido.'
  revised_footnotes:
  - marker: a
    text: O «a las islas». El término hebreo puede designar islas o regiones marítimas lejanas; en Isaías a menudo se refiere en general a naciones distantes junto al mar.
    reason: lexical_alternative
  revision_rationale: La revisión corrige un punto importante de precisión semántica en לָאִיִּים, evitando que 'costas' se entienda como accidente geográfico en vez de pueblos o territorios distantes. Además, refuerza el tono judicial del verso con 'retribuirá' y usa 'ira' como opción más natural y clara en español bíblico moderno.
