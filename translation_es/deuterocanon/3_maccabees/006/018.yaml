    reason: lexical_alternative
  revision_rationale: 'Se hizo una reparación menor para mejorar la naturalidad y reflejar más de cerca la serie adjetival griega: «grandemente glorioso, todopoderoso y verdadero». También se normalizó la mayúscula de «todopoderoso» y se suavizó la puntuación alrededor de «de aspecto temible» para una lectura más fluida en español, sin alterar el sentido fuente ni las decisiones teológicas documentadas.'
