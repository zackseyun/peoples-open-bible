translation:
  language: es
  text: Entonces designé a mi hermano Hanani y a Hananías[a], comandante de la fortaleza, sobre Jerusalén[b], porque era un hombre fiel y temía a Dios más que muchos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "un hombre de verdad" o "un hombre digno de confianza".'
    reason: lexical_alternative
  - marker: b
    text: El singular de la cláusula de elogio se entiende más naturalmente de Hananías, aunque algunos toman el elogio como apoyo más general al nombramiento.
    reason: alternative_reading
lexical_decisions:
- source_word: וָאֲצַוֶּה
  english_pob_choice: appointed
  chosen_spanish: designé
  alternatives_spanish:
  - nombré
  - appointé
  lexicon: HALOT
  rationale: En este contexto administrativo, צוה no expresa solo ‘mandar’, sino asignar o encargar una responsabilidad. ‘Designé’ comunica una acción formal de nombramiento sin perder el sentido de comisión/encargo.
- source_word: חֲנָנִי אָחִי
  english_pob_choice: my brother Hanani
  chosen_spanish: mi hermano Hanani
  alternatives_spanish:
  - Hanani, mi hermano
  - mi hermano Hanani
  lexicon: HALOT
  rationale: El sufijo posesivo de primera persona identifica a Hanani como hermano de Nehemías. ‘Mi hermano Hanani’ es la forma natural en español y conserva la relación familiar explícita.
- source_word: חֲנַנְיָה
  english_pob_choice: Hananiah
  chosen_spanish: Hananías
  alternatives_spanish:
  - Hanania
  - Ananías
  lexicon: HALOT
  rationale: Nombre propio transliterado al español de manera estándar y reconocible. Se mantiene la forma bíblica Hananías para evitar confusión con otros nombres cercanos.
- source_word: שַׂר הַבִּירָה
  english_pob_choice: the commander of the fortress
  chosen_spanish: comandante de la fortaleza
  alternatives_spanish:
  - gobernador de la ciudadela
  - oficial de la fortaleza
  lexicon: HALOT
  rationale: שַׂר denota un jefe o responsable con autoridad; ‘comandante’ transmite bien el matiz de cargo. בִּירָה se refiere a una fortaleza o complejo fortificado; ‘fortaleza’ es más claro en español que ‘ciudadela’.
- source_word: עַל יְרוּשָׁלִָם
  english_pob_choice: over Jerusalem
  chosen_spanish: sobre Jerusalén
  alternatives_spanish:
  - en Jerusalén
  - a cargo de Jerusalén
  lexicon: HALOT
  rationale: La preposición עַל en un contexto de nombramiento expresa autoridad o responsabilidad. ‘Sobre Jerusalén’ conserva la construcción hebrea; el añadido del cargo ya quedó aclarado en la primera mitad del versículo.
- source_word: כִּי הוּא
  english_pob_choice: because he was
  chosen_spanish: porque era
  alternatives_spanish:
  - pues era
  - ya que era
  lexicon: HALOT
  rationale: כִּי introduce la razón del nombramiento. ‘Porque era’ es una equivalencia natural y directa en español.
- source_word: כְּאִישׁ אֱמֶת
  english_pob_choice: a faithful man
  chosen_spanish: un hombre de verdad
  alternatives_spanish:
  - un hombre fiel
  - un hombre digno de confianza
  lexicon: HALOT
  rationale: Se conserva la expresión más cercana al hebreo para no borrar la tensión léxica de אֱמֶת, que puede abarcar verdad, fidelidad y confiabilidad. ‘Un hombre de verdad’ deja abierta esa gama, mientras el contexto administrativo permite oír también fiabilidad.
- source_word: וְיָרֵא אֶת־הָאֱלֹהִים
  english_pob_choice: and feared God
  chosen_spanish: y temía a Dios
  alternatives_spanish:
  - y era temeroso de Dios
  - y reverenciaba a Dios
  lexicon: HALOT
  rationale: El participio describe una disposición habitual de reverencia. ‘Temía a Dios’ reproduce la formulación bíblica directa y mantiene el valor de respeto piadoso sin suavizarlo.
- source_word: מֵרַבִּים
  english_pob_choice: more than many
  chosen_spanish: más que muchos
  alternatives_spanish:
  - más que la mayoría
  - más que muchos otros
  lexicon: HALOT
  rationale: La comparación con מן + רבים se expresa de forma sencilla y fiel como ‘más que muchos’. Se evita ‘más que la mayoría’ porque intensifica indebidamente la comparación.
theological_decisions:
- issue: Referente del singular en la cláusula de elogio
  english_pob_reading: The singular 'he' most naturally refers to Hananiah, though some understand the commendation to support the appointment more generally.
  chosen_spanish_reading: El singular de la cláusula se entiende primariamente de Hananías, sin resolver del todo la posible amplitud del elogio hacia el contexto de ambos nombramientos.
  alternative_spanish_readings:
  - El elogio puede abarcar a ambos hombres de manera colectiva.
  - La frase podría funcionar como apoyo general al nombramiento, no solo a Hananías.
  rationale: El hebreo presenta un singular con antecedente cercano singular, por lo que conviene mantener la referencia primaria a Hananías. A la vez, la traducción no elimina la posibilidad contextual de un elogio con alcance más amplio, preservando la tensión observada en la POB inglesa.
  doctrine_reference: Preservar la tensión del texto fuente sin resolverla artificialmente.
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa, que prefirió 'appointed ... over' por ser más natural y formalmente precisa. En español se reflejó ese ajuste con 'designé ... sobre Jerusalén', manteniendo la idea de nombramiento oficial y la preposición de autoridad. También se conservó la lectura singular del elogio, en línea con la nota auditada de la POB inglesa.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo usa אֱלֹהִים, por lo que se traduce 'Dios'.
  - 'Se usa una transliteración consistente para el nombre Hananiah: ''Hananías''.'
  - '''Comandante'' se emplea para שַׂר por su matiz de cargo dirigente con autoridad.'
  - Se preserva 'sobre Jerusalén' para reflejar la preposición de responsabilidad עַל sin borrar la relación de gobierno.
