translation:
  language: es
  text: 'Y los hijos de Zilpa, sierva[a] de Lea: Gad y Aser[b]. Estos son los hijos de Jacob que le nacieron en Padán-aram.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo puede entenderse también como 'esclava' o 'criada', según cómo se quiera representar el estatus social de שִׁפְחָה.
    reason: lexical_alternative
  - marker: b
    text: Aunque el versículo dice que estos hijos nacieron a Jacob 'en Padán-aram', Benjamín nació después en Canaán (vv. 16–18). La frase resume a los hijos vinculados con el período arameo de Jacob y no pretende incluir a Benjamín en esta referencia de lugar.
    reason: cross_reference
lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: And the sons of
  chosen_spanish: Y los hijos de
  alternatives_spanish:
  - Y los hijos de
  - Y los descendientes de
  lexicon: HALOT
  rationale: En un listado genealógico, בְּנֵי se refiere de manera directa a los varones descendientes; 'hijos' es el equivalente natural en español y conserva el valor genealógico de 'sons' sin ampliar indebidamente a 'descendientes'.
- source_word: זִלְפָּה
  english_pob_choice: Zilpah
  chosen_spanish: Zilpa
  alternatives_spanish:
  - Zilpá
  lexicon: Transliteración estándar del nombre propio
  rationale: Se translitera el nombre propio al español como Zilpa, forma clara y de lectura natural en español bíblico.
- source_word: שִׁפְחַת
  english_pob_choice: Leah’s servant
  chosen_spanish: sierva de Lea
  alternatives_spanish:
  - servidora de Lea
  - criada de Lea
  - esclava de Lea
  lexicon: HALOT
  rationale: שִׁפְחָה denota una mujer en condición de servicio doméstico con posible trasfondo servil; 'sierva' mantiene dignidad textual y sigue el ajuste del POB inglés a un registro más natural, sin borrar la posible tensión social del término.
- source_word: לֵאָה
  english_pob_choice: Leah’s
  chosen_spanish: de Lea
  alternatives_spanish:
  - de Labán
  lexicon: Relación de constructo
  rationale: 'El hebreo marca posesión relacional: ''sierva de Lea''. El español conserva esa relación de pertenencia con una construcción posesiva simple y directa.'
- source_word: גָּד
  english_pob_choice: Gad
  chosen_spanish: Gad
  alternatives_spanish:
  - Gád
  lexicon: Nombre propio transliterado
  rationale: Se conserva el nombre propio sin traducir, conforme al uso bíblico estándar.
- source_word: וְאָשֵׁר
  english_pob_choice: and Asher
  chosen_spanish: y Aser
  alternatives_spanish:
  - y Asher
  lexicon: Nombre propio transliterado
  rationale: Se translitera el nombre como Aser, forma habitual en español bíblico, manteniendo la identidad del nombre propio.
- source_word: אֵלֶּה
  english_pob_choice: These
  chosen_spanish: Estos
  alternatives_spanish:
  - Éstos
  lexicon: HALOT
  rationale: El demostrativo introduce una cláusula sumaria. 'Estos' resulta natural en español moderno y conserva la función de recapitulación.
- source_word: בְּנֵי יַעֲקֹב
  english_pob_choice: the sons of Jacob
  chosen_spanish: los hijos de Jacob
  alternatives_spanish:
  - los descendientes de Jacob
  lexicon: HALOT
  rationale: Se mantiene 'hijos' por la precisión genealógica del hebreo, ya que la lista resume los varones mencionados en el contexto inmediato.
- source_word: אֲשֶׁר יֻלַּד ל֖וֹ
  english_pob_choice: who were born to him
  chosen_spanish: que le nacieron
  alternatives_spanish:
  - que le fueron nacidos
  - que fueron engendrados para él
  lexicon: HALOT
  rationale: El pasivo hebreo con לּוֹ se expresa de forma natural en español con 'le nacieron'. Esta formulación conserva la perspectiva de recepción del nacimiento sin añadir sujeto explícito inexistente en la cláusula.
- source_word: בְּפַדַּן אֲרָם
  english_pob_choice: in Paddan-aram
  chosen_spanish: en Paddán-aram
  alternatives_spanish:
  - en Paddan-aram
  - en la región de Aram
  lexicon: HALOT
  rationale: Se conserva el topónimo transliterado. La acentuación española 'Paddán-aram' facilita lectura y pronunciación sin alterar el nombre propio.
theological_decisions:
- issue: Alcance de 'hijos' en una lista genealógica
  english_pob_reading: The verse says these are the sons of Jacob, summarizing the offspring associated with the household period in Paddan-aram and excluding Benjamin from this location note.
  chosen_spanish_reading: El versículo resume a los hijos varones de Jacob asociados con ese período en Paddán-aram, sin forzar una ampliación del término.
  alternative_spanish_readings:
  - los descendientes de Jacob
  - la familia de Jacob
  rationale: La forma hebrea es específica y el contexto es genealógico; en español conviene conservar esa especificidad para no diluir la estructura del texto.
  doctrine_reference: Génesis 35:16–18; 35:26
- issue: Rendición de שִׁפְחָה sin neutralizar su posible carga social
  english_pob_reading: female servant could also be rendered maidservant or slave woman/slave-girl, depending on how one chooses to represent the social status denoted by שִׁפְחָה.
  chosen_spanish_reading: sierva de Lea
  alternative_spanish_readings:
  - criada de Lea
  - esclava de Lea
  - sirvienta de Lea
  rationale: '''Sierva'' permite una lectura digna y suficientemente amplia para reflejar la situación de servicio sin imponer una equivalencia más dura de ''esclava'' donde el contexto inmediato no lo exige; aun así, la nota lexical preserva la alternativa.'
  doctrine_reference: Éxodo 21:7–11; Génesis 16:1–6
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del POB inglés que sustituyó 'female servant' por 'servant' por un registro más natural. En español, 'sierva' conserva esa naturalidad y al mismo tiempo permite documentar en nota la posible fuerza social de שִׁפְחָה.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se eligió 'Aser' para el nombre propio conforme al uso bíblico español más extendido.
  - Se conservó la sintaxis genealógica breve para no introducir explicación interpretativa dentro del texto principal.
