  language: en
  yaml_path: translation/ot/joshua/007/013.yaml
  text: 'Get up[a], consecrate the people, and say, ‘Consecrate yourselves for tomorrow, for thus says Yahweh, the God of Israel: There is something devoted to destruction in your midst, Israel. You cannot stand before your enemies until you remove the thing devoted to destruction from your midst.’'
  footnotes:
