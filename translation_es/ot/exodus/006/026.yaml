translation:
  language: es
  text: 'Eran Aarón y Moisés[a], a quienes Yahvé dijo: «Saquen a los hijos de Israel[b] de la tierra de Egipto, por sus huestes[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Estos eran Aarón y Moisés».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «los hijos de Israel»; una traducción más idiomática podría ser «los israelitas».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «con sus compañías»; el hebreo puede denotar grupos organizados, incluso con disposición militar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הוּא
  english_pob_choice: It was
  chosen_spanish: Era
  alternatives_spanish:
  - Estos eran
  - Fue
  lexicon: HALOT
  rationale: El pronombre independiente introduce una identificación enfática de los ya mencionados Aarón y Moisés. En español, una construcción copulativa breve como «Era» conserva esa función identificadora sin forzar una paráfrasis más pesada.
- source_word: אַהֲרֹן וּמֹשֶׁה
  english_pob_choice: Aaron and Moses
  chosen_spanish: Aarón y Moisés
  alternatives_spanish:
  - Aarón y Moshe
  lexicon: Convención onomástica estándar
  rationale: Se usan las formas españolas consagradas de los nombres propios bíblicos para máxima legibilidad, manteniendo la identidad del texto fuente.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT / convención editorial POB
  rationale: El texto hebreo presenta el nombre divino explícito. Se conserva en español como «Yahvé», siguiendo la norma del proyecto de no ocultar el Tetragrámaton tras un título.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos varones de Israel
  - los israelitas
  lexicon: HALOT
  rationale: La expresión hebrea es formalmente masculina plural. «Hijos de Israel» reproduce de manera directa la forma del original y mantiene la terminología bíblica establecida en español.
- source_word: מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: out from the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - fuera de la tierra de Egipto
  - de Egipto
  lexicon: HALOT
  rationale: La frase marca procedencia y también conserva «tierra». En español, «de la tierra de Egipto» es natural y suficientemente fiel al movimiento de salida implícito en el mandato.
- source_word: עַל צִבְאֹתָם
  english_pob_choice: by their hosts
  chosen_spanish: por sus escuadrones
  alternatives_spanish:
  - por sus huestes
  - según sus divisiones
  - con sus compañías
  lexicon: HALOT
  rationale: צִבְאוֹתָם puede referirse a formaciones ordenadas y con tinte militar. «Escuadrones» preserva ese matiz organizado/militar sin reducirlo a una mera idea abstracta de división. Se evita suavizarlo demasiado con una paráfrasis menos concreta.
theological_decisions:
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El verso usa יְהוָה directamente. La lectura española mantiene el nombre propio del pacto y evita la sustitución litúrgica por un título impersonal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH'
- issue: Expresión masculina plural בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos varones de Israel
  rationale: La forma hebrea es masculina plural y el proyecto prioriza la correspondencia formal cuando no se pierde inteligibilidad. «Los hijos de Israel» conserva la estructura del original.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #4'
- issue: Sentido de עַל צִבְאֹתָם
  english_pob_reading: by their hosts
  chosen_spanish_reading: por sus escuadrones
  alternative_spanish_readings:
  - por sus huestes
  - según sus divisiones
  - con sus compañías
  rationale: La expresión puede evocar grupos organizados, incluso con resonancia militar. «Escuadrones» retiene esa fuerza organizativa y el posible matiz marcial sin exagerarlo ni neutralizarlo.
  doctrine_reference: Exégesis contextual de Éxodo 6:26 / HALOT
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del auditor inglés, que prefirió mantener la fuerza organizativa/militar de עַל צִבְאֹתָם frente a una paráfrasis como «según sus divisiones». Por eso la versión española evita una neutralización excesiva y conserva una imagen concreta («escuadrones»).
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar para יְהוָה conforme a la norma del proyecto.
  - «Hijos de Israel» reproduce la forma hebrea masculina plural sin reemplazarla por una neutralización genérica.
  - La puntuación de cita introduce el mandato directo y el discurso mantiene un registro bíblico sobrio y publicable.
  - Se evita «SEÑOR» para no ocultar el nombre propio divino.
  - «Escuadrones» se eligió por su capacidad de conservar el carácter organizado del término hebreo sin añadir explicación intrusiva al cuerpo del verso.
