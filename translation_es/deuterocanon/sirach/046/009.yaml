translation:
  language: es
  text: Y él le dio a Caleb fuerza[a], y permaneció con él hasta la vejez.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «y dio a Caleb fuerza, y hasta la vejez estuvo con él». La cláusula siguiente sobre subir a las alturas de la tierra y que su descendencia recibiera una herencia se conserva en el testigo griego, que preserva un sentido más completo del versículo.'
    reason: textual_variant
lexical_decisions:
- source_word: ויתן / καὶ ἔδωκεν ὁ κύριος
  english_pob_choice: he gave / the Lord gave
  chosen_spanish: Y Yahvé le dio
  alternatives_spanish:
  - Y él le dio
  - Y el Señor le dio
  lexicon: HALOT; BDAG
  rationale: El hebreo transmitido omite el sujeto explícito, pero el contexto inmediato y el paralelo griego identifican a Dios como el dador. En español, «Yahvé» preserva la decisión POB de no enmascarar el nombre divino y evita la sustitución tradicional por «el Señor».
- source_word: לכלב / τῷ Χαλέβ
  english_pob_choice: Caleb
  chosen_spanish: Caleb
  alternatives_spanish:
  - Caleb
  lexicon: Nombre propio
  rationale: Se conserva la forma habitual en español bíblico y es plenamente transparente para el lector.
- source_word: עצמה / ἰσχύν
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - fortaleza
  - poder
  lexicon: HALOT; BDAG
  rationale: «Fuerza» expresa con naturalidad el valor léxico de עצמה e ἰσχύς en español contemporáneo. «Fortaleza» podría sonar más abstracto y «poder» desplaza el matiz hacia capacidad o autoridad.
- source_word: ועד שיבה / ἕως γήρους
  english_pob_choice: until old age
  chosen_spanish: hasta la vejez
  alternatives_spanish:
  - hasta la edad avanzada
  - hasta las canas
  lexicon: HALOT; BDAG
  rationale: El hebreo alude literalmente a la canicie, pero el sentido idiomático es la vejez. «Hasta la vejez» comunica el valor semántico de forma natural y digna en español.
- source_word: עמדה עמו / διέμεινεν αὐτῷ
  english_pob_choice: it remained with him
  chosen_spanish: permaneció con él
  alternatives_spanish:
  - se mantuvo con él
  - quedó con él
  lexicon: HALOT; BDAG
  rationale: El verbo femenino concuerda con «fuerza» en hebreo, así que la fuerza es el sujeto implícito. «Permaneció con él» conserva la idea durativa sin forzar una repetición pesada en español.
theological_decisions:
- issue: Nombre divino explícito frente a la traducción tradicional encubridora
  english_pob_reading: The Lord gave Caleb strength, while the Hebrew omits the explicit subject in the clause and the Greek makes it explicit as κύριος.
  chosen_spanish_reading: Yahvé le dio a Caleb fuerza
  alternative_spanish_readings:
  - El Señor le dio a Caleb fuerza
  - Dios le dio a Caleb fuerza
  rationale: La política terminológica del proyecto exige «Yahvé» para יהוה. Aquí el griego κύριος funciona como equivalente de ese nombre divino en el paralelo, así que la elección española debe mantener la referencia explícita sin volver a la máscara litúrgica «Señor».
  doctrine_reference: Terminología POB sobre יהוה / YHWH; primacía del texto fuente sobre la convención eclesial
- issue: Cláusula final del hebreo y alcance textual de la versión
  english_pob_reading: The English POB footnote notes that the Hebrew witness attests only the first two clauses and that the fuller continuation is supplied by the Greek witness in the earlier draft, but the latest revision removed that material.
  chosen_spanish_reading: 'Se traduce solo lo que el hebreo aquí transmitido y el paralelismo inmediato sostienen con seguridad: la concesión de fuerza y su permanencia hasta la vejez.'
  alternative_spanish_readings:
  - Incluir la subida a las alturas de la tierra y la posesión de la herencia
  - Repetir el complemento griego en nota dentro del texto principal
  rationale: El contexto de revisión indica que la lectura final depurada no debe reintroducir cláusulas no presentes en el hebreo disponible. Por eso el texto español se limita a las dos proposiciones atestiguadas, sin borrar la tensión textual entre hebreo y griego.
  doctrine_reference: Criterio POB de primacía de la evidencia textual y respeto por variantes documentadas
translation_notes:
  revision_awareness: La revisión más reciente eliminó las cláusulas que antes se suplían desde el griego («subir a las alturas de la tierra» y «su descendencia obtuvo una herencia»). Este borrador español sigue esa decisión y conserva únicamente el contenido atestiguado por el hebreo disponible, mientras refleja el apoyo del paralelo griego en las notas de decisión.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de manera consistente con la política POB para יהוה.
  - Se evita «Cristo» y otras terminologías ajenas al versículo.
  - «Fuerza» y «permaneció con él» conservan el tono sobrio del hebreo y del griego sin añadir interpretación.
  - La nota al pie marca la variante textual hebrea de forma explícita y no introduce material ausente en el texto principal.
