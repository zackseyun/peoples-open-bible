lexical_decisions:
- source_word: ⲕⲣⲓⲛⲉ
  chosen: judge
  alternatives:
  - condemn
  - decide
  lexicon: Greek loan κρίνω in Sahidic; cf. Crum, Layton
  rationale: Primary judicial/ethical sense fits the context and the relative clause
    structure.
- source_word: ϩⲁ
  chosen: at
  alternatives:
  - according to
  - by
  lexicon: Standard Sahidic preposition ϩⲁ
  rationale: Temporal sense with τέλος is the most plausible here.
- source_word: 'ⲧⲉⲗⲟⲥ (OCR: ⲛⲉⲗⲟⲥ)'
  chosen: end
  alternatives:
  - goal
  - completion
  lexicon: Greek τέλος commonly appears in Coptic texts
  rationale: Judgment + ‘end’ is a well-formed collocation; initial tau likely lost
    in OCR.
- source_word: ϣⲟⲟⲡ
  chosen: are
  alternatives:
  - are found
  - exist
  lexicon: Sahidic ϣⲟⲟⲡ ‘be present, exist’
  rationale: Copular ‘are’ keeps the list brisk and idiomatic while preserving presence-in
    phrase.
- source_word: ⲛⲟⲃⲉ
  chosen: sins
  alternatives:
  - faults
  - crimes
  lexicon: Sahidic ⲛⲟⲃⲉ ‘sin’
  rationale: Moral/ethical domain; ‘sins’ is the conventional and clearest gloss.
- source_word: ⲙⲛⲧⲁⲧⲁⲙⲁϩⲧⲉ
  chosen: ignorances
  alternatives:
  - lack of knowledge
  - unknowing
  lexicon: ⲙⲛⲧ- nominalizer + ⲁⲧ- negator + ⲁⲙⲁϩⲧⲉ ‘knowledge’
  rationale: Plural abstract preserved to match Coptic morphology and list parallelism.
- source_word: ⲡⲁⲑⲟⲥ
  chosen: passions
  alternatives:
  - sufferings
  - afflictions
  lexicon: Greek πάθος in Coptic ethical lists
  rationale: In vice catalogues of Gnostic/Sethian texts, ‘passions’ (pathē) is standard.
- source_word: ⲉⲧϣⲁⲉⲓⲏⲧ
  chosen: that increase
  alternatives:
  - that are excessive
  - that swell
  lexicon: Uncertain; likely from Coptic root ‘ϣⲁⲉⲓⲧ’ (grow/increase)
  rationale: Amplificatory nuance fits with ‘passions’ as escalating impulses; flagged
    as tentative.
- source_word: ⲏⲇⲟⲛⲏ
  chosen: pleasures
  alternatives:
  - delights
  lexicon: Greek ἡδονή
  rationale: Standard ethical term; keeps parallel with ‘passions.’
- source_word: ⲡⲣⲟⲥ
  chosen: as well
  alternatives:
  - toward
  - with respect to
  lexicon: Greek πρός used prepositionally in Coptic
  rationale: The fragment ‘ⲡⲣⲟⲥ ⲡⲉ’ is incomplete; rendering as additive keeps cadence
    without over-specifying direction; noted as uncertain.
parallelism_check: 'The line preserves a four-part catalogue: sins // ignorances //
  passions (qualified) // pleasures. Repetition of ‘in’ before each maintains the
  Coptic prepositional parallelism and list cadence.'
voice_check: Maintains first-person anchor (‘me’) with an impersonal relative clause
  (‘the one who will judge me’), matching Thunder’s authoritative, admonitory voice
  without smoothing into second-person exhortation.
