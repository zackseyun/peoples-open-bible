translation:
  language: es
  text: Todos ellos fueron inscritos por genealogía[a] en los días de Jotam, rey de Judá, y en los días de Jeroboam, rey de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «fueron registrados por genealogías» o «fueron computados por genealogía». El verbo hebreo se refiere a quedar inscrito en un registro genealógico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֻלָּם
  english_pob_choice: All of them
  chosen_spanish: Todos ellos
  alternatives_spanish:
  - Todos
  - Ellos todos
  lexicon: HALOT
  rationale: El hebreo expresa totalidad con sufijo pronominal de 3.ª persona plural; «Todos ellos» conserva ese valor explícito de manera natural en español.
- source_word: הִתְיַחְשׂוּ
  english_pob_choice: were enrolled by genealogy
  chosen_spanish: fueron inscritos por genealogía
  alternatives_spanish:
  - fueron registrados por genealogías
  - fueron computados por genealogía
  - fueron asentados en el registro genealógico
  lexicon: HALOT
  rationale: En Crónicas, este verbo hitpael alude a quedar incluido en un registro genealógico. «Fueron inscritos por genealogía» mantiene la idea administrativa y genealógica sin sobreexplicar el texto.
- source_word: בִּימֵי
  english_pob_choice: in the days of
  chosen_spanish: en los días de
  alternatives_spanish:
  - durante el reinado de
  - en tiempos de
  lexicon: HALOT
  rationale: La expresión hebrea temporal se conserva de forma directa, y en español resulta comprensible y fiel al giro original.
- source_word: יוֹתָם
  english_pob_choice: Jotham
  chosen_spanish: Jotam
  alternatives_spanish:
  - Yotam
  lexicon: uso onomástico estándar
  rationale: Se adopta la forma castellana más común y reconocible del nombre propio.
- source_word: מֶלֶךְ יְהוּדָה
  english_pob_choice: king of Judah
  chosen_spanish: rey de Judá
  alternatives_spanish:
  - monarca de Judá
  lexicon: HALOT
  rationale: La construcción nominal se traduce de forma directa y sobria, conservando el título real sin adornos.
- source_word: יָרָבְעָם
  english_pob_choice: Jeroboam
  chosen_spanish: Jeroboam
  alternatives_spanish:
  - Yeroboam
  lexicon: uso onomástico estándar
  rationale: Se mantiene la transliteración tradicional en español para este nombre propio ampliamente establecido.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: king of Israel
  chosen_spanish: rey de Israel
  alternatives_spanish:
  - monarca de Israel
  lexicon: HALOT
  rationale: La frase es una construcción posesiva simple y se vierte de manera literal y clara.
translation_notes:
  revision_awareness: El pasaje coincide estrechamente con el texto hebreo masorético y con el audit trail inglés; no se detectan revisiones aplicadas en el expediente inglés más allá de la confirmación de alta concordancia.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque aquí no aparece el nombre divino.
  - Se conserva el paralelismo temporal de «en los días de... y en los días de...» para reflejar la sintaxis hebrea.
  - «Inscritos por genealogía» mantiene la fuerza técnica del verbo sin introducir una paráfrasis interpretativa.
