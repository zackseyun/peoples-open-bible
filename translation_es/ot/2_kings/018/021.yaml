base_translation:
  language: en
  yaml_path: translation/ot/2_kings/018/021.yaml
  text: Now look[a], you are trusting in Egypt, that broken reed of a staff, which, if a man leans on it, will go into his hand and pierce it[b]. So is Pharaoh king of Egypt to all who trust in him.
  footnotes:
  - marker: a
    text: Or 'that crushed reed of a staff.' The Hebrew adjective can denote something crushed, bruised, or broken; 'broken' best fits the image of a support that splinters and injures the hand.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'if a man leans on it.' The singular masculine is used generically here.
    reason: lexical_alternative
