source:
  edition: SBLGNT
  text: οὗτοί εἰσιν οἳ μετὰ γυναικῶν οὐκ ἐμολύνθησαν, παρθένοι γάρ εἰσιν· ⸀οὗτοι οἱ ἀκολουθοῦντες τῷ ἀρνίῳ ὅπου ἂν ⸀ὑπάγῃ· ⸁οὗτοι ἠγοράσθησαν ἀπὸ τῶν ἀνθρώπων ἀπαρχὴ τῷ θεῷ καὶ τῷ ἀρνίῳ,
base_translation:
  language: en
  yaml_path: translation/nt/revelation/014/004.yaml
  text: These are the ones who have not defiled themselves with women[a], for they are virgins. These are the ones who follow the Lamb wherever he goes. These were purchased from among mankind as firstfruits to God and to the Lamb[b],
  footnotes:
  - marker: a
    text: Or possibly, this imagery signifies spiritual purity or freedom from idolatrous defilement rather than making only a literal statement about sexual abstinence.
    reason: alternative_reading
  - marker: b
    text: Or 'from among humanity' or 'from among people.' The Greek refers to human beings generally, not specifically males.
    reason: lexical_alternative
translation:
  language: ko
  text: 이들은 여자들과 더불어 자신을 더럽히지 않은 자들이니, 곧 순결한 자들[a]입니다. 이들은 어린 양이 어디로 가시든지 따라가는 자들입니다. 이들은 사람들 가운데서 값을 치르고 사신 자들로, 하나님과 어린 양께 드리는 첫 열매입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '헬라어 παρθένοι는 본래 「처녀들」이지만, 14장에서는 우상숭배의 영적 음행(13장)과 대비되는 제의적 정결 은유로 기능한다.'
    reason: lexical_alternative
