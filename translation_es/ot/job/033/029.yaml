  to: Mira, Dios hace todas estas cosas dos o tres veces con un hombre[a].
  rationale: Se conserva el sentido del hebreo y la elección principal 'un hombre', pero se corrige la nota al pie para reflejar la alternativa significativa documentada para גָּבֶר y se suaviza la apertura a un español más natural y digno.
