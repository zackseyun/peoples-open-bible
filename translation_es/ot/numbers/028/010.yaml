translation:
  language: es
  text: La ofrenda quemada de cada sábado es para[cada sábado][a], además de la ofrenda quemada regular y su ofrenda de libación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Lit. «en su sábado». La expresión hebrea tiene fuerza distributiva: corresponde a cada sábado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹלַת
  english_pob_choice: burnt offering
  chosen_spanish: ofrenda quemada
  alternatives_spanish:
  - holocausto
  - ofrenda totalmente quemada
  lexicon: HALOT
  rationale: עֹלָה designa la ofrenda sacrificial completamente consumida por el fuego. En español, «ofrenda quemada» comunica el valor léxico sin depender del uso litúrgico más tradicional de «holocausto», que puede sonar histórico o ambiguo en lectura bíblica moderna.
- source_word: שַׁבַּת
  english_pob_choice: Sabbath
  chosen_spanish: sábado
  alternatives_spanish:
  - Sabbat
  - reposo
  lexicon: HALOT
  rationale: En este contexto calendárico-sacrificial, el referente es el día de sábado. «Sábado» es claro y natural en español; «reposo» sería demasiado interpretativo y «Sabbat» menos transparente para la lectura general.
- source_word: בְּשַׁבַּתּוֹ
  english_pob_choice: on its Sabbath
  chosen_spanish: en su sábado
  alternatives_spanish:
  - en cada sábado
  - en su día de sábado
  lexicon: HALOT
  rationale: El sufijo 3ms marca una relación distributiva con el sábado correspondiente. «En su sábado» conserva esa forma y deja visible la referencia pronominal que el hebreo expresa, sin perder inteligibilidad en español.
- source_word: עַל
  english_pob_choice: in addition to
  chosen_spanish: además de
  alternatives_spanish:
  - aparte de
  - además del
  lexicon: HALOT
  rationale: En instrucciones sacrificiales, עַל señala adición o acompañamiento respecto de otra ofrenda. «Además de» reproduce bien la relación procedural y evita una lectura espacial de «sobre».
- source_word: הַתָּמִיד
  english_pob_choice: the regular
  chosen_spanish: regular
  alternatives_spanish:
  - continua
  - perpetua
  - diaria
  lexicon: HALOT
  rationale: תָּמִיד expresa continuidad prescrita. «Regular» funciona como equivalente natural en español para una ofrenda establecida de manera recurrente, sin imponer el matiz de «diaria» que aquí no está explicitado por el hebreo.
- source_word: וְנִסְכָּהּ
  english_pob_choice: and its drink offering
  chosen_spanish: y su ofrenda de libación
  alternatives_spanish:
  - y su libación
  - y su ofrenda líquida
  lexicon: HALOT
  rationale: נֶסֶךְ es la ofrenda derramada, asociada con vino u otro líquido. «Ofrenda de libación» mantiene el término cultual y la relación con la ofrenda principal, mientras que «libación» sola podría sonar menos explícita como objeto sacrificial.
theological_decisions:
- issue: Relación entre la ofrenda sabática y la ofrenda regular
  english_pob_reading: in addition to the regular burnt offering and its drink offering
  chosen_spanish_reading: además de la ofrenda quemada regular y su ofrenda de libación
  alternative_spanish_readings:
  - aparte de la ofrenda quemada regular y su ofrenda de libación
  - sobre la ofrenda quemada regular y su ofrenda de libación
  rationale: El hebreo marca una ofrenda adicional, no una sustitución. «Además de» preserva la dependencia ritual respecto de la ofrenda continua, evitando una lectura de superposición física o jerárquica que «sobre» podría sugerir.
  doctrine_reference: Números 28:10
- issue: Valor cultual de עֹלָה
  english_pob_reading: burnt offering
  chosen_spanish_reading: ofrenda quemada
  alternative_spanish_readings:
  - holocausto
  - ofrenda totalmente quemada
  rationale: No se trata de un sacrificio genérico, sino de una categoría técnica del sistema levítico. «Ofrenda quemada» mantiene la fuerza sacrificial sin introducir connotaciones extra bíblicas de «holocausto».
  doctrine_reference: Levítico 1; Números 28
- issue: Sufijo pronominal en בְּשַׁבַּתּוֹ
  english_pob_reading: on its Sabbath
  chosen_spanish_reading: en su sábado
  alternative_spanish_readings:
  - en cada sábado
  - en su día de sábado
  rationale: La forma posesiva del hebreo no es meramente redundante; sugiere la ocurrencia asignada del sábado. «En su sábado» conserva esa textura y permite que el lector perciba la correspondencia gramatical con el original.
  doctrine_reference: Números 28:10
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo, pero adopta equivalencias españolas naturales cuando el calco resultaría torpe. Se conservó la relación distributiva de בְּשַׁבַּתּוֹ con una forma posesiva visible, y se mantuvo el carácter técnico de עֹלָה y נֶסֶךְ con terminología cultual clara para el lector español.
  spanish_consistency_notes:
  - Se usó «Yahvé» no porque aparezca explícitamente en este versículo, sino conforme al estándar del proyecto cuando el tetragrámaton esté presente en el contexto canónico general.
  - Se prefirió «ofrenda quemada» a «holocausto» por claridad moderna y por consistencia con un registro bíblico transparente.
  - «Sábado» se mantiene como traducción directa de שַׁבָּת en este contexto ritual, sin expandirlo a «reposo» ni «semana».
