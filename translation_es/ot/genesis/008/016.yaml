translation:
  language: es
  text: Sal del arca, tú, tu esposa, tus hijos y las esposas de tus hijos contigo.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «las mujeres de tus hijos»; también, «tus nueras».
    reason: lexical_alternative
lexical_decisions:
- source_word: צֵא
  english_pob_choice: Come out
  chosen_spanish: Sal
  alternatives_spanish:
  - Sal fuera
  - Sal de
  lexicon: HALOT
  rationale: El imperativo de יצא pide una salida desde un lugar cerrado. En español, 'sal' comunica de manera natural y directa el mandato de abandonar el arca.
- source_word: מִן הַתֵּבָה
  english_pob_choice: of the ark
  chosen_spanish: del arca
  alternatives_spanish:
  - de el arca
  - fuera del arca
  lexicon: HALOT
  rationale: La preposición מן indica movimiento desde el interior o desde la superficie de la arca; 'del arca' es la forma española natural para expresar la salida desde ese lugar.
- source_word: וְאִשְׁתְּךָ
  english_pob_choice: and your wife
  chosen_spanish: y tu esposa
  alternatives_spanish:
  - y tu mujer
  lexicon: HALOT
  rationale: En este contexto posesivo y familiar, el hebreo señala claramente la esposa de Noé. 'Esposa' es más preciso y claro en español bíblico actual que 'mujer'.
- source_word: וּבָנֶיךָ
  english_pob_choice: and your sons
  chosen_spanish: y tus hijos
  alternatives_spanish:
  - y tus varones
  - y tus hijos varones
  lexicon: HALOT
  rationale: Aunque בנים puede ser específicamente 'hijos varones', en español 'hijos' mantiene el sentido familiar del grupo ya nombrado y evita una reiteración pesada; el paralelismo con las esposas de los hijos ya delimita a los varones.
- source_word: וּנְשֵׁי בָנֶיךָ
  english_pob_choice: and your sons' wives
  chosen_spanish: y las esposas de tus hijos
  alternatives_spanish:
  - y las mujeres de tus hijos
  - y tus nueras
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente 'las esposas de tus hijos'. 'Esposas de tus hijos' conserva la forma fuente de manera transparente; 'nueras' sería válido pero menos explícito respecto al sintagma hebreo.
- source_word: אִתָּךְ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - con usted
  - con ti
  lexicon: HALOT
  rationale: '''Contigo'' expresa la compañía de manera idiomática y compacta en español. La forma consonántica del texto apunta a la compañía de Noé y su grupo, sin necesidad de marcar el detalle morfológico problemático en la traducción principal.'
theological_decisions:
- issue: Referencia al arca como el vehículo de salvación preservada
  english_pob_reading: Come out of the ark
  chosen_spanish_reading: Sal del arca
  alternative_spanish_readings:
  - Sal del barco
  - Sal del navío
  rationale: El término tradicional y textual para תבה en el relato de Noé es 'arca'; mantenerlo preserva la continuidad bíblica y la identificación teológica del objeto como instrumento de preservación divina.
  doctrine_reference: Génesis 6–8; Hebreos 11:7
- issue: Tratamiento del grupo familiar de Noé
  english_pob_reading: you and your wife, and your sons and your sons' wives with you
  chosen_spanish_reading: tú, y tu esposa, y tus hijos, y las esposas de tus hijos contigo
  alternative_spanish_readings:
  - tú y tu mujer, y tus hijos y tus nueras contigo
  rationale: La secuencia mantiene la estructura familiar del mandato sin introducir términos menos transparentes. 'Esposas de tus hijos' conserva la relación explícita del hebreo y evita ocultar el vínculo familiar.
  doctrine_reference: Génesis 7:7; 8:16
translation_notes:
  revision_awareness: 'El contexto de auditoría en inglés no presenta revisiones aplicadas ni cambios de última pasada; por tanto, este borrador sigue de cerca la lectura estable: mandato de salir del arca y mención explícita de la esposa, los hijos y las nueras de Noé.'
  spanish_consistency_notes:
  - Se mantiene 'arca' para תבה, conforme al uso bíblico establecido.
  - Se evita 'SEÑOR' porque este versículo no contiene el nombre divino.
  - Se traduce el grupo familiar con términos transparentes y paralelos al hebreo, sin sustituir 'esposas de tus hijos' por 'nueras' en el texto principal.
