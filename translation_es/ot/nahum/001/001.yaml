translation:
  language: es
  text: Oráculo acerca de Nínive[a]. Libro de la visión de Nahúm el Elcoshita.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «carga de Nínive» o «pronunciamiento acerca de Nínive».
    reason: lexical_alternative
lexical_decisions:
- source_word: מַשָּׂא
  english_pob_choice: oracle
  chosen_spanish: oráculo
  alternatives_spanish:
  - carga
  - pronunciamiento
  lexicon: HALOT, BDB
  rationale: En encabezamientos proféticos, מַשָּׂא designa una declaración o mensaje profético solemne, no una carga literal. «Oráculo» conserva ese valor técnico en español y evita el calco de «carga», que sería opaco en este contexto.
- source_word: נִינְוֵה
  english_pob_choice: Nineveh
  chosen_spanish: Nínive
  lexicon: HALOT, BDB
  rationale: Nombre propio de lugar; se translitera según el uso normal del español bíblico.
- source_word: סֵפֶר
  english_pob_choice: book
  chosen_spanish: libro
  alternatives_spanish:
  - registro
  - rollo
  lexicon: HALOT, BDB
  rationale: סֵפֶר denota un escrito, documento o libro. «Libro» es la equivalencia natural en español y mantiene la estructura nominal del encabezamiento.
- source_word: חֲזֹון
  english_pob_choice: vision
  chosen_spanish: visión
  alternatives_spanish:
  - revelación
  lexicon: HALOT, BDB
  rationale: El término profético estándar se conserva con «visión», que mantiene el vínculo léxico con la revelación profética sin añadir matices no exigidos por el hebreo.
- source_word: נַחוּם
  english_pob_choice: Nahum
  chosen_spanish: Nahúm
  lexicon: HALOT, BDB
  rationale: Nombre propio personal; se adapta a la ortografía usual del español.
- source_word: הָאֶלְקֹשִׁי
  english_pob_choice: the Elkoshite
  chosen_spanish: el elkosita
  alternatives_spanish:
  - el hombre de Elcós
  lexicon: HALOT, BDB
  rationale: El gentilicio con artículo identifica a Nahúm por procedencia o asociación con Elcós. «Elkosita» sigue de cerca la forma del hebreo y resulta más directo que expandirlo a una paráfrasis geográfica.
theological_decisions:
- issue: Estructura de las dos cláusulas nominales del superscrito
  english_pob_reading: 'Two short heading statements: ''An oracle concerning Nineveh. The book of the vision of Nahum the Elkoshite.'''
  chosen_spanish_reading: 'Dos enunciados breves de encabezamiento: «Oráculo acerca de Nínive. Libro de la visión de Nahúm el elkosita.»'
  alternative_spanish_readings:
  - 'Una sola línea: «El oráculo de Nínive, el libro de la visión de Nahúm el elkosita.»'
  - «Carga de Nínive» como título único formal.
  rationale: El hebreo presenta dos elementos de encabezamiento, y separarlos en dos frases breves preserva la estructura superscripcional sin sugerir que Nínive sea la autora del mensaje. «Acerca de» expresa con claridad el objeto del oráculo en español.
  doctrine_reference: Superscription/heading structure in prophetic literature; lexical heading sense of מַשָּׂא
translation_notes:
  revision_awareness: La revisión más reciente indicó sin cambios necesarios; por eso se mantiene la solución ya acordada entre el texto hebreo, la traducción inglesa auditada y la lectura de encabezamiento en dos miembros.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se traduce מַשָּׂא con «oráculo» para conservar el valor técnico profético, no con «carga», salvo en una nota alternativa.
  - Se conserva la articulación en dos frases breves, coherente con el análisis del hebreo como doble encabezamiento.
