review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: siete días de presentar la ofrenda, convocatoria sagrada en el octavo día, segunda presentación de la ofrenda, identificación como asamblea solemne y prohibición de trabajo ordinario. También conserva correctamente «Yahvé» para יהוה y «asamblea solemne» para עֲצֶרֶת. Sin embargo, «ofrenda encendida» para אִשֶּׁה no sigue bien la decisión auditada del POB inglés («food offering») ni resulta la opción más clara en español; sugiere que la ofrenda está ardiendo más que la categoría cultual. Además, la nota actual («ofrenda por fuego») suena menos natural que «ofrenda quemada por fuego» o una explicación más directa del término técnico.'
  spanish_quality_summary: El español es generalmente claro y digno. «Santa convocación» funciona, aunque «convocación sagrada» también sería posible; no requiere cambio. «Por siete días» es entendible, pero «Durante siete días» suena más natural en español bíblico contemporáneo. «Será una asamblea solemne» es aceptable, pero el hebreo dice más literalmente «Es una asamblea solemne», sin que eso obligue a cambio. La principal debilidad de legibilidad y precisión es «ofrenda encendida».
  glossary_alignment: 'Alineación parcial con la terminología del proyecto: se usa correctamente «Yahvé». No hay conflicto con Mesías/Cristo ni otros términos base. La divergencia importante es léxica y auditada: אִשֶּׁה fue documentado en inglés como «food offering» con alternativa «offering by fire». En español, una correspondencia más fiel y clara es «ofrenda de alimento» con nota alternativa «ofrenda por fuego», preservando la rationale documentada sin calco torpe.'
