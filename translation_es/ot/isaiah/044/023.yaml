translation:
  language: es
  text: ¡Canten con júbilo, cielos, porque Yahvé lo ha hecho[a]; den un grito de alegría, profundidades de la tierra[b]. Estallen en canto, montes, oh bosque, y todo árbol que hay en él; porque Yahvé ha redimido a Jacob, y en Israel muestra su gloria[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porque Yahvé ha actuado» o «porque Yahvé ha hecho esto». El hebreo deja sin expresar el objeto del verbo «hacer».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «las partes más profundas de la tierra».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «y en Israel se glorifica» o «y en Israel se muestra glorioso».'
    reason: alternative_reading
lexical_decisions:
- source_word: רָנּוּ
  english_pob_choice: Sing for joy
  chosen_spanish: ¡Canten con júbilo
  alternatives_spanish:
  - Canten de alegría
  - Griten de gozo
  lexicon: HALOT
  rationale: El imperativo plural expresa alabanza jubilosa; «canten con júbilo» conserva el matiz de canto gozoso y el tono poético exhortativo.
- source_word: שָׁמַיִם
  english_pob_choice: O heavens
  chosen_spanish: cielos
  alternatives_spanish:
  - oh cielos
  - cielos
  lexicon: HALOT
  rationale: Es una invocación poética a los cielos; en español el vocativo puede quedar implícito por el contexto y la puntuación exclamativa sin perder claridad.
- source_word: כִּי עָשָׂה יְהוָה
  english_pob_choice: for Yahweh has done it
  chosen_spanish: porque Yahvé ha hecho esto
  alternatives_spanish:
  - porque Yahvé lo ha hecho
  - porque Yahvé ha obrado
  lexicon: HALOT
  rationale: «עָשָׂה» es amplio («hacer, actuar»). La versión española mantiene la objetividad indefinida del hebreo con «esto», como en la decisión inglesa de no especificar el objeto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el nombre divino, evitando la sustitución litúrgica por «SEÑOR».
- source_word: הָרִיעוּ
  english_pob_choice: shout aloud
  chosen_spanish: den un grito de alegría
  alternatives_spanish:
  - griten con fuerza
  - den un clamor
  lexicon: HALOT
  rationale: El hiphil de רוע expresa un clamor jubiloso; «den un grito de alegría» comunica bien la aclamación sin sonar mecánico.
- source_word: תַּחְתִּיּוֹת אָרֶץ
  english_pob_choice: depths of the earth
  chosen_spanish: profundidades de la tierra
  alternatives_spanish:
  - partes más hondas de la tierra
  - lo más profundo de la tierra
  lexicon: HALOT
  rationale: La expresión poética designa las regiones inferiores de la tierra; «profundidades de la tierra» es natural y fiel.
- source_word: פִּצְחוּ
  english_pob_choice: Break forth
  chosen_spanish: Estallen
  alternatives_spanish:
  - Estallen en
  - Prorrumpan
  lexicon: HALOT
  rationale: El verbo comunica una irrupción súbita y exuberante; «estallen» conserva esa energía poética.
- source_word: רִנָּה
  english_pob_choice: into singing
  chosen_spanish: en canto
  alternatives_spanish:
  - en canto de júbilo
  - en canto gozoso
  lexicon: HALOT
  rationale: El sustantivo indica canto o grito de júbilo; «en canto» es breve y natural en la secuencia imperativa.
- source_word: הָרִים
  english_pob_choice: O mountains
  chosen_spanish: montes
  alternatives_spanish:
  - montañas
  - oh montes
  lexicon: HALOT
  rationale: «Montes» conserva bien el registro poético y puede funcionar como vocativo en español.
- source_word: יַעַר וְכָל עֵץ בּוֹ
  english_pob_choice: O forest, and every tree in it
  chosen_spanish: oh bosque y todo árbol que hay en él
  alternatives_spanish:
  - bosque y cada árbol que hay en él
  - oh bosque, y todo árbol en él
  lexicon: HALOT
  rationale: Se mantiene el paralelo con la serie vocativa y la relación locativa del hebreo con una formulación natural en español.
- source_word: גָאַל
  english_pob_choice: has redeemed
  chosen_spanish: ha redimido
  alternatives_spanish:
  - ha rescatado
  - ha rescatado como redentor
  lexicon: HALOT
  rationale: «Redimir» preserva la fuerza covenantal/redentora del verbo en un registro bíblico claro.
- source_word: יַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Jacob
  lexicon: HALOT
  rationale: Se conserva el nombre propio como metonimia del pueblo del pacto, igual que en la línea inglesa.
- source_word: וּבְיִשְׂרָאֵל יִתְפָּאָר
  english_pob_choice: and in Israel he displays his glory
  chosen_spanish: y en Israel muestra su gloria
  alternatives_spanish:
  - y en Israel se glorifica
  - y en Israel se muestra glorioso
  lexicon: HALOT
  rationale: El hitpael de פאר admite un sentido reflexivo («glorificarse/mostrarse glorioso»), pero el español claro y fiel puede expresarlo como manifestación de su gloria, sin forzar una lectura más interpretativa.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se preserva el nombre del pacto según el estándar del proyecto, en lugar de ocultarlo tras una sustitución convencional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de יִתְפָּאָר al final del versículo
  english_pob_reading: he displays his glory
  chosen_spanish_reading: muestra su gloria
  alternative_spanish_readings:
  - se glorifica
  - se muestra glorioso
  rationale: La forma verbal puede entenderse de modo reflexivo, pero el hebreo aquí destaca la manifestación de la gloria de Dios en Israel; «muestra su gloria» conserva esa relación sin resolver en exceso la tensión gramatical.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: La versión inglesa revisada añadió «O» antes de «forest» para mantener la serie vocativa. La redacción española ya lo refleja con «oh bosque», conservando la estructura acumulativa y el paralelismo del poema.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino, conforme al criterio general del proyecto.
  - Se evita «SEÑOR» como sustituto del Tetragrámaton.
  - «Redimido» conserva el valor redentor del verbo גאל.
  - La clausula final se vierte de modo que no se pierda la posible resonancia reflexiva de יִתְפָּאָר.
