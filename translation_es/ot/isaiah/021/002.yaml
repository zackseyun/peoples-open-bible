translation:
  language: es
  text: 'Una visión dura me ha sido declarada: el que traiciona, traiciona[a], y el destructor destruye. Sube, Elam; pon sitio, Media. He puesto fin a todo su gemido[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el traicionero actúa con traición, y el que despoja despoja».
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice literalmente «todo su gemido»; el referente femenino no se identifica explícitamente en este versículo.
    reason: alternative_reading
lexical_decisions:
- source_word: חָזוּת
  english_pob_choice: vision
  chosen_spanish: visión
  alternatives_spanish:
  - revelación
  - oráculo
  lexicon: HALOT
  rationale: חָזוּת designa una visión o percepción profética. «Visión» es el equivalente más natural en español y conserva el carácter revelatorio sin añadir una interpretación más específica.
- source_word: קָשָׁה
  english_pob_choice: harsh
  chosen_spanish: dura
  alternatives_spanish:
  - severa
  - áspera
  - grave
  lexicon: HALOT
  rationale: El adjetivo expresa severidad o dureza. «Dura» mantiene el tono sobrio y directo del anuncio profético en español.
- source_word: הֻגַּד לִי
  english_pob_choice: has been declared to me
  chosen_spanish: me ha sido declarada
  alternatives_spanish:
  - me fue dicha
  - me ha sido comunicada
  - me ha sido anunciada
  lexicon: HALOT
  rationale: La pasiva de נגד con לי indica que el mensaje fue hecho saber al profeta. La pasiva perifrástica española conserva el registro formal y la orientación receptiva del texto.
- source_word: הַבּוֹגֵד בּוֹגֵד
  english_pob_choice: the betrayer betrays
  chosen_spanish: el traidor traiciona
  alternatives_spanish:
  - el infiel actúa con infidelidad
  - el traidor hace traición
  - el que traiciona, traiciona
  lexicon: HALOT
  rationale: La repetición participio-verbo intensifica el rasgo de la persona y la acción. «Traidor traiciona» reproduce de forma breve la fuerza retórica de la raíz repetida, aunque el español también admite «traiciona» con nota explicativa.
- source_word: וְהַשּׁוֹדֵד שׁוֹדֵד
  english_pob_choice: and the destroyer destroys
  chosen_spanish: y el destructor destruye
  alternatives_spanish:
  - y el saqueador saquea
  - y el devastador devasta
  - y el despojador despoja
  lexicon: HALOT
  rationale: שׁדד puede implicar devastar, saquear o arrasar. «Destructor destruye» preserva la amplitud del daño violento y el paralelismo con la cláusula anterior.
- source_word: עֲלִי
  english_pob_choice: Go up
  chosen_spanish: Sube
  alternatives_spanish:
  - Súbete
  - Avanza
  - Ven arriba
  lexicon: HALOT
  rationale: Imperativo femenino singular de עלה usado como llamada militar. «Sube» es natural en español y reproduce el idiomatismo direccional del hebreo.
- source_word: עֵילָם
  english_pob_choice: Elam
  chosen_spanish: Elam
  alternatives_spanish:
  - Elán
  lexicon: HALOT
  rationale: Nombre propio; se conserva la forma habitual en español bíblico.
- source_word: צוּרִי
  english_pob_choice: lay siege
  chosen_spanish: pon sitio
  alternatives_spanish:
  - asedia
  - sitiad
  - establece sitio
  lexicon: HALOT
  rationale: Imperativo femenino singular de צור en sentido de asedio. «Pon sitio» es claro, idiomático y mantiene el campo militar sin sonar arcaico.
- source_word: מָדַי
  english_pob_choice: Media
  chosen_spanish: Media
  alternatives_spanish:
  - los medos
  lexicon: HALOT
  rationale: Nombre propio geográfico/étnico; se usa la forma convencional española «Media» en paralelo con Elam.
- source_word: כָּל אַנְחָתָהּ
  english_pob_choice: all her groaning
  chosen_spanish: todo su gemir
  alternatives_spanish:
  - todo su gemido
  - todo su lamento
  - todo su suspirar
  lexicon: HALOT
  rationale: אַנְחָה expresa gemido, lamento o suspiro. «Gemir» mantiene la idea de dolor sostenido y permite conservar en español la ambigüedad del referente femenino implícito.
- source_word: הִשְׁבַּתִּי
  english_pob_choice: I have put an end to
  chosen_spanish: he puesto fin a
  alternatives_spanish:
  - he hecho cesar
  - he detenido
  - he silenciado
  lexicon: HALOT
  rationale: El causativo de שבת significa hacer cesar. «He puesto fin a» es idiomático en español y conserva la fuerza causativa sin perder claridad.
theological_decisions:
- issue: Referente del sufijo femenino en «todo su gemir»
  english_pob_reading: Left implicit as 'her,' without specifying the city or nation in the main text.
  chosen_spanish_reading: Se mantiene implícito como «su», sin identificar en el texto principal la ciudad o nación a la que se refiere.
  alternative_spanish_readings:
  - el gemir de Babilonia
  - el gemir de la tierra
  - el gemir causado por ella
  rationale: El sufijo femenino singular no identifica explícitamente su antecedente en este versículo. Conservar «su» preserva la ambigüedad del hebreo y evita resolver interpretativamente lo que el texto no explicita.
  doctrine_reference: Preservar la tensión textual donde el antecedente no está explicitado.
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión más reciente del audit trail: se prefirió una formulación que mantuviera la repetición verbal del hebreo para הַבּוֹגֵד בּוֹגֵד, y se preservó la ambigüedad del sufijo femenino en אַנְחָתָהּ sin resolverla en el texto principal.'
  spanish_consistency_notes:
  - Se usa «Yahvé» cuando aparezca el Tetragrámaton; en este versículo no aparece.
  - Se conserva la repetición retórica del hebreo con «el traidor traiciona» y «el destructor destruye».
  - Se mantiene un registro profético moderno y digno, evitando un calco rígido pero sin expandir el sentido más allá del original.
  - La ambigüedad del posesivo femenino en «su gemir» queda marcada por nota, no por aclaración interpretativa en el cuerpo del texto.
