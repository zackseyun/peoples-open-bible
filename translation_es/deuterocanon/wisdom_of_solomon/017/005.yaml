translation:
  language: es
  text: Y ningún poder del fuego prevaleció para dar luz, ni las brillantes llamas de las estrellas pudieron alumbrar aquella noche terrible[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «noche sombría» o «noche aborrecible». El adjetivo griego expresa una carga fuerte de algo odioso, terrible o detestable.
    reason: lexical_alternative
lexical_decisions:
- source_word: πυρὸς
  english_pob_choice: of fire
  chosen_spanish: del fuego
  alternatives_spanish:
  - de fuego
  lexicon: LSJ
  rationale: Conserva la relación genitiva del griego con βία y mantiene la imagen concreta sin suavizarla.
- source_word: βία
  english_pob_choice: force
  chosen_spanish: poder
  alternatives_spanish:
  - fuerza
  - violencia
  lexicon: LSJ
  rationale: En español, 'poder' comunica eficazmente la capacidad activa de producir el efecto buscado; 'violencia' sonaría demasiado moral o física en un sentido no requerido por el contexto. 'Fuerza' es posible, pero 'poder' fluye mejor con 'prevaleció'.
- source_word: κατίσχυεν
  english_pob_choice: prevailed
  chosen_spanish: prevaleció
  alternatives_spanish:
  - bastó
  - pudo imponerse
  - fue suficiente
  lexicon: LSJ
  rationale: '''Prevaleció'' reproduce bien la idea de no lograr eficacia suficiente para el infinitivo φωτίζειν, y conserva el matiz de tentativa frustrada del imperfecto.'
- source_word: φωτίζειν
  english_pob_choice: to give light
  chosen_spanish: dar luz
  alternatives_spanish:
  - iluminar
  - brillar
  lexicon: LSJ
  rationale: '''Dar luz'' expresa el valor causativo de φωτίζω de modo natural en español y evita reducirlo a un simple ''brillar''.'
- source_word: ἄστρων
  english_pob_choice: of the stars
  chosen_spanish: de las estrellas
  alternatives_spanish:
  - estelares
  - de los astros
  lexicon: LSJ
  rationale: Traducción directa y clara del genitivo plural, manteniendo la imagen cósmica.
- source_word: ἔκλαμπροι φλόγες
  english_pob_choice: the brilliant flames
  chosen_spanish: las brillantes llamas
  alternatives_spanish:
  - las llamas resplandecientes
  - las llamas fulgurantes
  lexicon: LSJ
  rationale: '''Brillantes llamas'' conserva la vividez poética del griego sin sobrecargar el verso con una formulación demasiado técnica.'
- source_word: καταυγάζειν
  english_pob_choice: to illumine
  chosen_spanish: alumbrar
  alternatives_spanish:
  - iluminar
  - dar luz
  lexicon: LSJ
  rationale: '''Alumbrar'' transmite el acto de arrojar luz sobre algo y funciona bien con el paralelismo del verso. Es una opción natural en español para el efecto de καταυγάζειν.'
- source_word: ὑπέμενον
  english_pob_choice: did endure
  chosen_spanish: pudieron
  alternatives_spanish:
  - lograron
  - aguantaron
  - persistieron en
  lexicon: LSJ
  rationale: En este contexto el verbo expresa incapacidad para mantenerse efectivo; 'pudieron' con negación implícita ('ni... pudieron alumbrar') comunica la falla de resistencia/continuidad sin forzar una perífrasis pesada.
- source_word: στυγνὴν
  english_pob_choice: dreadful
  chosen_spanish: terrible
  alternatives_spanish:
  - dreadful
  - horrible
  - sombría
  lexicon: LSJ
  rationale: '''Terrible'' es una forma digna y natural que preserva la carga fuerte del adjetivo sin introducir una tonalidad excesivamente literaria o extraña para el español actual.'
- source_word: νύκτα
  english_pob_choice: night
  chosen_spanish: noche
  alternatives_spanish:
  - noche oscura
  lexicon: LSJ
  rationale: Correspondencia directa y necesaria del sustantivo, manteniendo el cierre del paralelismo.
theological_decisions:
- issue: Oscuridad cósmica extraordinaria en el contexto narrativo
  english_pob_reading: Retain the verse's hyperbolic-cosmic imagery without reducing it to a mere weather description.
  chosen_spanish_reading: 'Conservar la imagen cósmica hiperbólica: ni el fuego ni las estrellas logran dar luz a esa noche terrible.'
  alternative_spanish_readings:
  - Reducirlo a una oscuridad ordinaria donde ni la luz del fuego bastaba
  - Interpretarlo principalmente como terror psicológico
  rationale: El griego presenta una imposibilidad de iluminación que abarca tanto fuego como estrellas; la traducción debe preservar ese efecto sin atenuarlo ni explicar más de lo que el texto dice.
  doctrine_reference: Preservar la tensión literaria y teológica del pasaje sin resolverla.
translation_notes:
  revision_awareness: La redacción sigue la revisión final del POB inglés, que afinó καταυγάζειν hacia 'illumine' y στυγνήν hacia 'dreadful'. En español se optó por 'alumbrar' y 'terrible' por naturalidad formal, manteniendo el mismo rango semántico fuerte y evitando suavizar la expresión.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto solo cuando aparezca el nombre divino; aquí no hay referencia directa.
  - Se conserva un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - No se introduce 'Mesías', 'Cristo' ni terminología doctrinal ajena al versículo.
  - La nota de pie respeta la tensión lexical de στυγνήν sin fijar una sola equivalencia exclusiva.
