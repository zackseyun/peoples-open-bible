    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: ''según lo que alcance la mano del que hace el voto''. Es un modismo hebreo para la capacidad económica o los medios disponibles.'
    reason: lexical_alternative
  revision_rationale: Se reemplazó 'valuación' por 'tasación' para mayor naturalidad y precisión técnica en el contexto legal de Levítico 27. También se naturalizó el modismo hebreo de capacidad económica en el texto principal ('lo que pueda pagar'), preservando la literalidad en la nota, en línea con el audit trail inglés. Se mantuvo la estructura jurídica del versículo y la coherencia verbal con 'tasará'.
