translation:
  language: es
  text: Salmo de los hijos de Coré[a]; cántico[b]. Su fundamento[c] está en los montes santos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para los hijos de Coré», indicando asociación más que autoría directa.
    reason: lexical_alternative
  - marker: b
    text: O «Salmo de los hijos de Coré. Cántico».
    reason: previous_rendering
  - marker: c
    text: O «Su fundamento está en los montes santos», entendiendo que el referente implícito es Sion o Jerusalén.
    reason: alternative_reading
lexical_decisions:
- source_word: לִבְנֵי קֹרַח
  english_pob_choice: of the sons of Korah
  chosen_spanish: de los hijos de Coré
  alternatives_spanish:
  - para los hijos de Coré
  - perteneciente a los hijos de Coré
  lexicon: HALOT
  rationale: El ל prefijado en los encabezados de salmos puede indicar atribución, pertenencia o asociación. En español, «de los hijos de Coré» reproduce esa relación de modo idiomático y mantiene abierta la ambigüedad entre autoría y asociación, como en el inglés POB.
- source_word: מִזְמוֹר
  english_pob_choice: psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - canto
  - pieza musical
  lexicon: HALOT
  rationale: Es el término genérico y establecido para el género del Salterio. «Salmo» es preciso, reconocible y conserva la función de rótulo literario.
- source_word: שִׁיר
  english_pob_choice: song
  chosen_spanish: cántico
  alternatives_spanish:
  - canto
  - canción
  lexicon: HALOT
  rationale: «Cántico» transmite el valor de שִׁיר como forma cantada y suena más digno en un encabezado bíblico que «canción». También permite distinguirlo de «Salmo» sin fusionar los dos términos.
- source_word: יְסוּדָתוֹ
  english_pob_choice: His foundation
  chosen_spanish: Su fundamento
  alternatives_spanish:
  - Su base
  - Su cimiento
  - Su fundamento; su base
  lexicon: HALOT
  rationale: El sustantivo de יסד significa «fundamento/cimiento». El sufijo masculino singular puede entenderse como «su»; como el referente no está explícito, «Su fundamento» conserva la ambigüedad del original y no fuerza un antecedente en español.
- source_word: בְּהַרְרֵי
  english_pob_choice: in the mountains
  chosen_spanish: en los montes
  alternatives_spanish:
  - sobre los montes
  - entre los montes
  lexicon: HALOT
  rationale: La preposición ב admite «en/sobre». «En los montes» es natural en español y mantiene el marco locativo sin añadir matices topográficos innecesarios.
- source_word: קֹדֶשׁ
  english_pob_choice: holy
  chosen_spanish: santos
  alternatives_spanish:
  - sagrados
  - consagrados
  lexicon: HALOT
  rationale: Como adjetivo atributivo, קֹדֶשׁ califica a los montes. «Santos» es la equivalencia directa y bíblicamente asentada, más natural en plural concordando con «montes».
theological_decisions:
- issue: Referente del sufijo pronominal en יְסוּדָתוֹ
  english_pob_reading: Retain the ambiguity with 'His foundation,' allowing the implied referent to remain unstated in the main text.
  chosen_spanish_reading: Mantener la ambigüedad con «Su fundamento», dejando sin explicitar el referente implícito.
  alternative_spanish_readings:
  - «Su fundamento» entendido como el de Sion/Jerusalén
  - «Él ha establecido su fundamento»
  rationale: El hebreo presenta un sufijo de tercera persona masculina singular, pero no nombra su antecedente en este versículo. Dado que la línea es genuinamente ambigua, la traducción conserva la tensión y evita resolverla con una paráfrasis interpretativa.
  doctrine_reference: 'POB: preservar tensiones teológicas y textuales donde el hebreo no las resuelve explícitamente.'
translation_notes:
  revision_awareness: Se revisó la puntuación del encabezado para unir ambos rótulos de género de manera natural en español, evitando fragmentar «cántico» y conservando la relación del hebreo entre מִזְמוֹר y שִׁיר. La redacción final sigue la decisión auditada del POB inglés de mantener la ambigüedad del sufijo en יְסוּדָתוֹ.
  spanish_consistency_notes:
  - Se mantiene «Coré» como forma española estándar del nombre propio.
  - Se usa «Salmo» con mayúscula inicial por tratarse de un encabezado de libro/versículo.
  - «Santos» concuerda con «montes» y conserva el sentido cultual/religioso del hebreo sin sustituirlo por una paráfrasis.
  - No se introduce «SEÑOR» ni otras máscaras del nombre divino porque el versículo no contiene el Tetragrámaton explícito.
