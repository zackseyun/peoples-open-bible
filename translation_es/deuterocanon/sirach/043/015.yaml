translation:
  language: es
  text: Por su poder da fuerza a la nube[a][b], para arrojar granizo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice 'la nube' en singular; el paralelo griego tiene 'las nubes' en plural. Aquí se sigue al hebreo como testigo primario.
    reason: alternative_reading
  - marker: b
    text: Masada conserva solo el comienzo del versículo ('Y por su poder la nube es fuerte'), mientras que el hebreo de la Guenizá de El Cairo continúa con la cláusula del granizo; la traducción completa sigue esa línea hebrea conservada, con apoyo del paralelo griego para la imagen del granizo.
    reason: textual_variant
lexical_decisions:
- source_word: בכחו / ἐν μεγαλείῳ αὐτοῦ
  english_pob_choice: By his power
  chosen_spanish: Por su poder
  alternatives_spanish:
  - Con su poder
  - Por su fuerza
  lexicon: HALOT; LXX μεγαλείῳ
  rationale: La preposición con valor instrumental se expresa de manera natural en español con 'por'. 'Poder' conserva la idea de capacidad eficaz, y corresponde bien al hebreo בכחו y al matiz griego de μεγαλείῳ αὐτοῦ en este contexto.
- source_word: יתן / ἴσχυσεν
  english_pob_choice: he gives strength
  chosen_spanish: da fuerza
  alternatives_spanish:
  - da vigor
  - fortalece
  lexicon: HALOT; LXX ἰσχύω
  rationale: '''Dar fuerza'' sigue de cerca la imagen hebrea de impartir fuerza a las nubes. Mantiene la relación semántica con el griego ἴσχυσεν (''se hizo fuerte / mostró fuerza'') sin imponer una paráfrasis más interpretativa.'
- source_word: לענן / νεφέλας
  english_pob_choice: the clouds
  chosen_spanish: las nubes
  alternatives_spanish:
  - la nube
  - las nubes de lluvia
  lexicon: HALOT; LXX νεφέλας
  rationale: El plural español corresponde al plural del griego y suena más natural en un contexto meteorológico. Aunque el hebreo puede leerse en singular según la tradición auditada, el plural no rompe el sentido colectivo y mantiene la imagen poética.
- source_word: עז
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - fortaleza
  - poder
  lexicon: HALOT
  rationale: '''Fuerza'' reproduce bien עז y encaja de forma fluida con el verbo ''dar''. ''Poder'' ya queda expresado en la primera cola del verso, por lo que aquí ''fuerza'' evita repetición innecesaria.'
- source_word: להשליך / διεθρύβησαν
  english_pob_choice: to cast down
  chosen_spanish: para arrojar
  alternatives_spanish:
  - para lanzar
  - para derribar
  lexicon: HALOT; LXX διεθρύβησαν
  rationale: La finalidad verbal se expresa con 'para'. 'Arrojar' conserva la energía del hebreo y del trasfondo griego sin sonar rígido. No se añade un sujeto explícito porque el verso ya presupone el agente divino.
- source_word: אבני אלגביש / λίθοι χαλάζης
  english_pob_choice: hailstones
  chosen_spanish: piedras de granizo
  alternatives_spanish:
  - granizos
  - piedras de hielo
  lexicon: HALOT; LXX λίθοι χαλάζης
  rationale: '''Piedras de granizo'' retiene la concreción literal de ''stones of hail'' y hace visible la imagen poética. En español, ''granizo'' solo podría perder el sustantivo ''piedras'', así que esta opción preserva mejor la tensión entre literalidad y claridad.'
translation_notes:
  revision_awareness: 'El borrador sigue la línea de la revisión más reciente del audit trail: se mantiene la idea de ''dar fuerza'' a las nubes y se conserva el fin de arrojar granizo. A la vez, se ajusta el español para que suene natural y refleje el paralelo hebreo-griego sin depender mecánicamente de una sola forma inglesa.'
  spanish_consistency_notes:
  - Se evita 'SEÑOR' porque aquí no aparece el Tetragrámaton ni una cita directa que lo requiera.
  - Se conserva la imaginería meteorológica concreta ('nubes', 'piedras de granizo') sin convertirla en una abstracción.
  - El verso funciona bien en registro bíblico moderno y evita arcaísmos innecesarios.
