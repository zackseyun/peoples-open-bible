translation:
  language: es
  text: Y Jeremías permaneció en el patio de la guardia hasta el día en que Jerusalén fue capturada[b]. Y sucedió cuando Jerusalén fue capturada[a]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo termina abruptamente: «Y sucedió cuando Jerusalén fue capturada—». Esto probablemente funciona como una transición al material siguiente, más que como una oración completa por sí sola.'
    reason: textual_variant
  - marker: b
    text: O «fue tomada» en lugar de «fue capturada».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּשֶׁב
  english_pob_choice: remained
  chosen_spanish: permaneció
  alternatives_spanish:
  - se quedó
  - habitó
  - se sentó
  lexicon: HALOT
  rationale: ישב puede significar sentarse, habitar o permanecer; en este contexto de custodia, ‘permaneció’ comunica mejor la continuidad de la estancia sin sugerir una residencia voluntaria.
- source_word: בַּחֲצַר הַמַּטָּרָה
  english_pob_choice: in the court of the guard
  chosen_spanish: en el patio de la guardia
  alternatives_spanish:
  - en el patio del guardia
  - en el patio de la cárcel
  - en el recinto de la guardia
  lexicon: HALOT
  rationale: חָצֵר es ‘patio/recinto’; מַטָּרָה aquí apunta a la guardia o puesto de custodia. ‘Patio de la guardia’ mantiene el sentido institucional y suena natural en español bíblico moderno.
- source_word: עַד יוֹם אֲשֶׁר
  english_pob_choice: until the day ... was captured
  chosen_spanish: hasta el día en que ... fue capturada
  alternatives_spanish:
  - hasta el día cuando ... fue capturada
  - hasta que ... fue capturada
  lexicon: HALOT
  rationale: La construcción marca el límite temporal de la detención. ‘Hasta el día en que’ reproduce con claridad el valor temporal del hebreo.
- source_word: נִלְכְּדָה
  english_pob_choice: was captured
  chosen_spanish: fue capturada
  alternatives_spanish:
  - fue tomada
  - cayó
  lexicon: HALOT
  rationale: El nifal de לכד significa ‘ser capturado/tomado’; ‘fue capturada’ es la forma más directa y conserva el matiz militar del contexto.
- source_word: יְרוּשָׁלִָם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  lexicon: HALOT
  rationale: Nombre propio estándar en español.
- source_word: וְהָיָה
  english_pob_choice: And it happened
  chosen_spanish: Y sucedió
  alternatives_spanish:
  - Y aconteció
  - Y ocurrió
  lexicon: HALOT
  rationale: La cláusula es transicional y queda abierta hacia el material siguiente. ‘Y sucedió’ conserva ese enlace narrativo sin arcaísmo.
- source_word: כַּאֲשֶׁר
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - as
  - just as
  lexicon: HALOT
  rationale: En esta construcción temporal, ‘cuando’ es la equivalencia española más natural y clara.
translation_notes:
  revision_awareness: 'La versión inglesa auditada mantiene una lectura fluida y conservadora del hebreo, con una nota de transición al final por la frase abrupta. La presente redacción española sigue esa misma evaluación: conserva la temporalidad, el tono narrativo y el final abierto, sin añadir contenido interpretativo.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando aparezca el nombre divino explícito; aquí no aplica.
  - ‘Jerusalén’ se mantiene como nombre propio estándar español.
  - ‘Patio de la guardia’ preserva el marco custodial sin convertirlo en un término eclesial o interpretativo.
