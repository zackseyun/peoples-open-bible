    changes_summary: Removed 'against me' because the Hebrew says God will quiet the complaints from upon himself, not that the complaints are explicitly 'against me' in that clause; retained the final clause 'which they are grumbling against you' to represent the direct object of their grumbling.
translation:
  language: es
  text: Y sucederá que la vara del hombre a quien yo escoja florecerá, y pondré fin a las quejas de los hijos de Israel, que ellos murmuran contra ustedes.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And it shall be
  chosen_spanish: Y sucederá que
  alternatives_spanish:
  - Y será que
  - Y acontecerá que
  lexicon: HALOT
  rationale: Captura la fórmula futura introductoria con naturalidad en español bíblico contemporáneo sin perder el valor prospectivo del hebreo.
- source_word: הָאִישׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  - el varón
  lexicon: HALOT
  rationale: Mantiene el valor masculino singular del hebreo y su referencia al jefe representativo de cada tribu; 'hombre' es claro y fiel en este contexto.
- source_word: אֲשֶׁר אֶבְחַר בּוֹ
  english_pob_choice: whom I choose
  chosen_spanish: que yo escoja
  alternatives_spanish:
  - a quien yo escoja
  - a quien yo elegiré
  lexicon: HALOT
  rationale: '''Escoja'' comunica la elección divina de forma natural en español. Se evita forzar una construcción relativa demasiado literal que oscurezca la relación entre el hombre y la vara.'
- source_word: מַטֵּהוּ
  english_pob_choice: the staff
  chosen_spanish: la vara
  alternatives_spanish:
  - el bastón
  - el cetro
  lexicon: HALOT
  rationale: En español, 'vara' es una forma natural para el objeto ritual de este pasaje y permite conectar con la señal de florecimiento; 'cetro' sugeriría realeza y no conviene aquí.
- source_word: יִפְרָח
  english_pob_choice: will bud
  chosen_spanish: florecerá
  alternatives_spanish:
  - brotará
  - echará brotes
  lexicon: HALOT
  rationale: El hebreo expresa brotar/florecer. En español, 'florecerá' conserva la imagen viva y se ajusta al signo que culmina en la siguiente cláusula del relato.
- source_word: וַהֲשִׁכֹּתִי
  english_pob_choice: I will put an end to
  chosen_spanish: pondré fin a
  alternatives_spanish:
  - haré cesar
  - acabaré con
  lexicon: HALOT
  rationale: El hiphil de שׁכך indica hacer cesar o apaciguar; 'pondré fin a' transmite una cesación decidida y elegante en español.
- source_word: תְּלֻנּוֹת
  english_pob_choice: complaints
  chosen_spanish: las quejas
  alternatives_spanish:
  - las murmuraciones
  - los murmullos
  lexicon: HALOT
  rationale: '''Quejas'' es claro y comunicativo en español, aunque no agota la fuerza de murmuración del contexto; el término siguiente preserva mejor ese matiz.'
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión formal y transparente del hebreo, con la misma tensión de lenguaje familiar/corporativo que el POB inglés decidió mantener.
- source_word: מַלִּינִם
  english_pob_choice: are grumbling
  chosen_spanish: murmuran
  alternatives_spanish:
  - están murmurando
  - se quejan
  lexicon: HALOT
  rationale: El participio hifil de לון/לין denota una queja persistente y negativa. 'Murmuran' reproduce bien esa carga y evita suavizarla demasiado.
- source_word: עֲלֵיכֶם
  english_pob_choice: against you
  chosen_spanish: contra ustedes
  alternatives_spanish:
  - sobre ustedes
  - acerca de ustedes
  lexicon: HALOT
  rationale: La preposición עַל tiene aquí valor hostil/directivo; 'contra ustedes' expresa mejor el sentido adversativo dirigido a Moisés y Aarón.
theological_decisions:
- issue: Mantenimiento de la fórmula corporativa 'los hijos de Israel'
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: Se conserva la formulación genealógica/covenantal del hebreo sin neutralizarla. En este contexto describe a Israel como colectividad, pero el texto fuente habla literalmente de 'hijos'.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
translation_notes:
  revision_awareness: 'El inglés POB fue revisado para eliminar ''against me'' en la primera cláusula y dejar la oposición en la cláusula final. La traducción española sigue esa revisión: no introduce una idea explícita de ''contra mí'' en la primera parte, y reserva el valor adversativo para ''contra ustedes'' en la última cláusula.'
  spanish_consistency_notes:
  - Se mantiene el registro bíblico moderno y digno, sin formas arcaizantes innecesarias.
  - '''Vara'' y ''florecerá'' preservan la imaginería del signo milagroso sin añadir detalles ajenos al hebreo.'
  - '''Los hijos de Israel'' se conserva por transparencia al original y por coherencia con la decisión inglesa auditada.'
