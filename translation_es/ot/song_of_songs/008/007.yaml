revisions:
- from: Muchas aguas no pueden apagar el amor[a], ni lo arrastran los ríos. Si un hombre diera toda la riqueza de su casa por amor, sería despreciado por completo.
  to: Muchas aguas no pueden apagar el amor, ni los ríos pueden arrastrarlo. Si un hombre diera toda la riqueza de su casa por amor, sería despreciado por completo[a].
  rationale: Se corrige la segunda línea para reflejar mejor el paralelismo y la modalidad del hebreo, y se mueve la nota al pie a la cláusula final, que es donde realmente aplica la alternativa léxica documentada por el POB inglés. También se pule levemente la redacción de la nota para que suene más natural en español.
