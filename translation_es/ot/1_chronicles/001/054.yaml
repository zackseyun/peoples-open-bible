translation:
  language: es
  text: Caudillo Magdiel[a], caudillo Iram. Estos fueron los caudillos de Edom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «jefes de clan de Edom». El término hebreo puede denotar líderes tribales o de clan; versiones antiguas suelen traducirlo como «duques».
    reason: lexical_alternative
lexical_decisions:
- source_word: אַלּוּף
  english_pob_choice: chief
  chosen_spanish: jefe
  alternatives_spanish:
  - jefe de clan
  - caudillo
  - líder
  lexicon: HALOT
  rationale: En esta lista edomita, אַלּוּף designa un jefe tribal o clan. 'Jefe' comunica bien la función de liderazgo en español moderno y evita el tono arcaico de 'duque'. 'Jefe de clan' es más explicativo pero menos ágil en una enumeración genealógica.
- source_word: מַגְדִּיאֵל
  english_pob_choice: Magdiel
  chosen_spanish: Magdiel
  lexicon: nombre propio
  rationale: Nombre propio transliterado; no hay base para traducir su posible sentido etimológico en el texto.
- source_word: עִירָם
  english_pob_choice: Iram
  chosen_spanish: Iram
  alternatives_spanish:
  - Irán
  lexicon: nombre propio
  rationale: Nombre propio transliterado según la forma habitual en español bíblico. Se evita adaptar la acentuación porque el hebreo no exige marcarla en español.
- source_word: אֵלֶּה
  english_pob_choice: These were
  chosen_spanish: Estos fueron
  alternatives_spanish:
  - Estos son
  - Estos
  lexicon: HALOT
  rationale: El hebreo usa una cláusula nominal resumitiva. 'Estos fueron' reproduce el valor retrospectivo y suena natural en español en una conclusión genealógica.
- source_word: אַלּוּפֵי אֱדֹם
  english_pob_choice: the chiefs of Edom
  chosen_spanish: los jefes de Edom
  alternatives_spanish:
  - los jefes de clan de Edom
  - los líderes de Edom
  lexicon: HALOT
  rationale: Se mantiene la correspondencia con אַלּוּף como término de liderazgo edomita. 'Jefes de Edom' es breve, claro y consistente con el primer miembro del versículo.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y el estado de acuerdo es alto; por eso se conserva la solución breve y consistente para אַלּוּף como 'jefe'.
  spanish_consistency_notes:
  - 'Se conserva un mismo equivalente para אַלּוּף en toda la línea: ''jefe''.'
  - El cierre plural 'los jefes de Edom' armoniza con el resumen del hebreo y evita introducir una relación más interpretativa que la del texto.
  - Se mantiene la transliteración de los nombres propios sin intentar verter su etimología.
