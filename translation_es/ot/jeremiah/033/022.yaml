translation:
  language: es
  text: Como no se pueden contar las huestes[a] del cielo ni medir la arena del mar[b], así multiplicaré la descendencia[c] de David, mi siervo, y a los levitas que me sirven[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Las huestes del cielo» reproduce un modismo hebreo para la multitud celestial, a menudo incluyendo las estrellas.
    reason: cultural_note
  - marker: b
    text: 'O: «no se puede medir»; es una expresión hebrea estándar de cantidad incontable.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «la simiente de David» o «los descendientes de David»; זֶרַע es un singular colectivo.'
    reason: lexical_alternative
  - marker: d
    text: 'O: «que ministran delante de mí» o «que me ministran»; el hebreo puede denotar servicio cultual continuo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: צְבָא הַשָּׁמַיִם
  english_pob_choice: the host of heaven
  chosen_spanish: el ejército de los cielos
  alternatives_spanish:
  - el host de los cielos
  - la multitud de los cielos
  - las huestes celestiales
  lexicon: HALOT
  rationale: צָבָא puede significar ejército o hueste; en esta expresión el sentido idiomático apunta a la multitud celeste. «Ejército de los cielos» conserva la imagen hebrea y su fuerza colectiva en español sin introducir una especificación no explícita.
- source_word: יִסָּפֵר
  english_pob_choice: cannot be counted
  chosen_spanish: no se puede contar
  alternatives_spanish:
  - no se puede numerar
  - no puede ser contado
  lexicon: HALOT
  rationale: El nifal de ספר aquí expresa la imposibilidad de ser contado. «No se puede contar» es natural en español y mantiene el paralelismo con «medir».
- source_word: חוֹל הַיָּם
  english_pob_choice: the sand of the sea
  chosen_spanish: la arena del mar
  alternatives_spanish:
  - la arena junto al mar
  - la arena de la orilla del mar
  lexicon: HALOT
  rationale: La expresión hebrea es un giro fijo de cantidad innumerable. «La arena del mar» reproduce la imagen de forma directa y reconocible en español.
- source_word: יִמַּד
  english_pob_choice: cannot be measured
  chosen_spanish: no se puede medir
  alternatives_spanish:
  - no se puede medir del todo
  - no se puede calcular
  lexicon: HALOT
  rationale: El nifal de מדד indica ser medido. «No se puede medir» conserva la simetría con «no se puede contar» y la idea de abundancia inconmensurable.
- source_word: כֵּן אַרְבֶּה
  english_pob_choice: so I will multiply
  chosen_spanish: así multiplicaré
  alternatives_spanish:
  - así aumentaré
  - de ese modo haré numerosa
  lexicon: HALOT
  rationale: כֵּן enlaza la comparación con la promesa divina, y רבה en hifil tiene la idea de hacer muchos o multiplicar. «Así multiplicaré» es fiel, claro y mantiene el eco del hebreo.
- source_word: זֶרַע דָּוִד
  english_pob_choice: the offspring of David
  chosen_spanish: la descendencia de David
  alternatives_spanish:
  - la simiente de David
  - los descendientes de David
  lexicon: HALOT
  rationale: זֶרַע puede referirse a semilla, descendencia u offspring. «Descendencia» conserva el valor colectivo y resulta más natural en español que «simiente» o «semilla».
- source_word: עַבְדִּי
  english_pob_choice: my servant
  chosen_spanish: mi siervo
  alternatives_spanish:
  - mi esclavo
  lexicon: HALOT
  rationale: Aunque עֶבֶד puede significar esclavo, en el marco real y pactual de David el énfasis es su condición de servidor escogido por Yahvé. «Mi siervo» comunica bien ese sentido en español eclesial y bíblico.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levíes
  lexicon: HALOT
  rationale: Es la designación tribal estándar; «levitas» es la forma usual y clara en español bíblico.
- source_word: מְשָׁרְתֵי אֹתִי
  english_pob_choice: who minister to me
  chosen_spanish: que ministran a mí
  alternatives_spanish:
  - que me sirven
  - que prestan servicio a mí
  lexicon: HALOT
  rationale: 'El participio expresa servicio cultual continuo. «Ministran» conserva la dimensión litúrgica/templaria mejor que el genérico «sirven»; la preposición final mantiene la referencia directa del hebreo. '
theological_decisions:
- issue: Alcance de la promesa a la descendencia davídica y a los levitas
  english_pob_reading: The verse promises a vast multiplication of both the Davidic line and the Levites who serve YHWH, without resolving broader theological questions about how this promise unfolds.
  chosen_spanish_reading: El versículo promete la multiplicación amplia tanto de la descendencia davídica como de los levitas que ministran a Yahvé, sin resolver cómo se concreta teológicamente esa promesa.
  alternative_spanish_readings:
  - Puede leerse de manera más estrecha como referencia a ministros levíticos en el horizonte histórico de Jeremías
  - Puede leerse canónicamente en relación con un cumplimiento mesiánico posterior, aunque el versículo no lo explicita
  rationale: 'El hebreo coordina dos objetos directos bajo «multiplicaré»: la descendencia de David y los levitas. La traducción conserva ese paralelismo y evita imponer un marco doctrinal posterior que el texto no formula explícitamente.'
  doctrine_reference: Preservar la tensión teológica sin resolverla en el texto principal.
translation_notes:
  revision_awareness: 'Revisado a la luz del paquete hebreo WLC, la morfología y el audit trail inglés: se mantuvieron los paralelismos contar/medir y multiplicar, así como la coordinación entre la descendencia de David y los levitas. Se evitó resolver en la traducción principal la cuestión canónica/mesiánica no explicitada en el versículo.'
  spanish_consistency_notes:
  - Se usó «Yahvé» en las decisiones teológicas cuando el referente es el nombre divino implícito en el contexto, pero el versículo español no lo nombra explícitamente.
  - «Ministran» se eligió para conservar el matiz cultual de מְשָׁרְתֵי sin perder inteligibilidad.
  - «Descendencia» mantiene el valor colectivo de זֶרַע y evita una lectura demasiado biológica o individualizada.
