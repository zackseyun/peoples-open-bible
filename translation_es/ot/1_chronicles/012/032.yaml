translation:
  language: es
  text: Y de la media tribu de Manasés, dieciocho mil, que fueron designados por sus nombres[a], vinieron para hacer a David rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que fueron nombrados por nombre», es decir, identificados individualmente o enumerados expresamente.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מֵ/חֲצִי
  english_pob_choice: And from the half-
  chosen_spanish: Y de la media
  alternatives_spanish:
  - Y de la mitad de la
  - Y de media
  lexicon: HALOT
  rationale: En este contexto tribal, חֲצִי introduce la mitad de una tribu; en español, «la media tribu» es la forma natural y fiel para expresar la división tribal sin añadir material ajeno.
- source_word: מַטֵּה מְנַשֶּׁה
  english_pob_choice: tribe of Manasseh
  chosen_spanish: tribu de Manasés
  alternatives_spanish:
  - vara de Manasés
  - rama de Manasés
  lexicon: HALOT
  rationale: מַטֶּה en contextos censales o militares significa «tribu». «Manasés» es la forma española usual del nombre propio y comunica claramente el referente tribal.
- source_word: שְׁמוֹנָה עָשָׂר אָלֶף
  english_pob_choice: eighteen thousand
  chosen_spanish: dieciocho mil
  alternatives_spanish:
  - dieciocho millares
  lexicon: HALOT
  rationale: La construcción numeral es directa y se expresa de modo idiomático en español como «dieciocho mil».
- source_word: נִקְּבוּ
  english_pob_choice: were designated
  chosen_spanish: fueron designados
  alternatives_spanish:
  - fueron nombrados
  - fueron especificados
  - fueron enrolados
  lexicon: HALOT
  rationale: El nifal de נקב aquí indica ser señalados o identificados explícitamente. «Fueron designados» conserva la pasiva y la fuerza administrativa/identificadora sin reducirlo a un simple «nombrados».
- source_word: בְּשֵׁמוֹת
  english_pob_choice: by name
  chosen_spanish: por nombre
  alternatives_spanish:
  - por nombres
  - nombre por nombre
  lexicon: HALOT
  rationale: La expresión idiomática comunica que fueron identificados individualmente. En español, «por nombre» reproduce bien esa identificación nominal; la nota explica la posible lectura alternativa de enumeración expresa.
- source_word: לָבוֹא
  english_pob_choice: came
  chosen_spanish: vinieron
  alternatives_spanish:
  - vinieron a
  - vinieron para venir
  lexicon: HALOT
  rationale: Aunque formalmente es un infinitivo de finalidad, el contexto de lista militar favorece una verbalización natural en español. «Vinieron» conserva el movimiento y deja clara la finalidad del verso.
- source_word: לְהַמְלִיךְ
  english_pob_choice: to make ... king
  chosen_spanish: para hacer rey a
  alternatives_spanish:
  - para coronar a
  - para entronizar a
  - para constituir rey a
  lexicon: HALOT
  rationale: El hifil de מלך significa hacer rey o instalar como rey. «Hacer rey» es la correspondencia más directa y evita restringir el sentido a un rito de coronación.
- source_word: אֶת דָּוִיד
  english_pob_choice: David
  chosen_spanish: a David
  alternatives_spanish:
  - David
  lexicon: HALOT
  rationale: Se mantiene el objeto directo personal con la preposición española «a», necesaria y natural en español.
theological_decisions:
- issue: 'La meta de la acción: instalar a David como rey'
  english_pob_reading: came to make David king.
  chosen_spanish_reading: vinieron para hacer rey a David.
  alternative_spanish_readings:
  - vinieron para coronar a David
  - vinieron para entronizar a David
  rationale: El hebreo expresa finalidad de investidura real sin especificar el rito. «Hacer rey» conserva la amplitud semántica del hifil mejor que «coronar», que sería más estrecho.
  doctrine_reference: Monarquía davídica; 1 Samuel 16; 2 Samuel 5
- issue: Designación nominal de los hombres
  english_pob_reading: who were designated by name
  chosen_spanish_reading: que fueron designados por nombre[a]
  alternative_spanish_readings:
  - que fueron nombrados por nombre
  - que fueron identificados individualmente
  rationale: La expresión hebrea puede indicar ser nombrados, enumerados o identificados expresamente. Se conserva la lectura principal de designación, y la nota ofrece la alternativa idiomática y explicativa.
  doctrine_reference: Nomenclatura/censo militar; uso administrativo del lenguaje nominal
translation_notes:
  revision_awareness: Se corrigió la anomalía de validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español donde corresponde, y se mantuvo la elección léxica principal del audit trail inglés sin depender de una traducción mecánica.
  spanish_consistency_notes:
  - Se usa «Manasés» de forma consistente para el nombre tribal.
  - Se conserva «hacer rey» para reflejar con precisión el hifil de מלך.
  - Se mantiene el orden y la función de lista militar/censal del versículo sin expandir el contenido.
  - La nota [a] está anclada en el segmento «por nombre[a]» para cumplir con la validación y aclarar la alternativa interpretativa.
