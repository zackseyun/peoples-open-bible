- from: Así también Yehoshúa hijo de Jehozadac[a], quienes en sus días edificaron una casa, y levantaron un pueblo santo para Yahvé, preparado para gloria eterna.
  to: Así también Yehoshúa hijo de Jehozadac[a], que en la angustia levantó un altar; y levantaron un templo santo, establecido para gloria eterna.
