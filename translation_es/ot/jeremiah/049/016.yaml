    reason: cultural_note
  revision_rationale: Se hizo una reparación menor en la cláusula comparativa del nido para que el español suene natural y conserve con más precisión la imagen hebrea de elevación semejante a la del águila. No se alteró el contenido semántico principal ni las notas ya bien alineadas con la auditoría inglesa.
