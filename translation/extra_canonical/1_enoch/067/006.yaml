theological_decisions:
- issue: Identity of the punished angels
  chosen_reading: the angels who led astray
  alternative_readings:
  - the angels who were led astray
  - the angels of deception
  rationale: The active relative verb most naturally describes angels as agents of deception, fitting the Enochic theme of rebellious heavenly beings corrupting others.
  doctrine_reference: Preserve local Enochic wording and do not harmonize with later demonological formulas.
