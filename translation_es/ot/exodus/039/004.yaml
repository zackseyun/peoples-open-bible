review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido hebreo general: hicieron las piezas de hombro del efod, estaban unidas, y la prenda estaba unida en sus dos extremos. También conserva la repetición léxica de חבר mediante «unidas / unido». Sin embargo, hay dos ajustes necesarios para fidelidad y español natural: «a él» suena impropio para el referente inanimado «efod», y «fue unido» resulta menos idiomático que una pasiva/resultativa natural en este contexto.'
  spanish_quality_summary: '«Hombreras» es una buena opción en español eclesial moderno, con nota alternativa adecuada. La sintaxis del segundo miembro necesita pulirse para sonar natural y clara: «unidas a este» o reestructuración equivalente evita el masculino personal «él» para una prenda, y «quedó unido» lee mejor que «fue unido».'
  glossary_alignment: No hay términos teológicos de proyecto implicados. La decisión léxica principal «כְּתֵפֹת -> hombreras» concuerda con la documentación inglesa («shoulder pieces» con alternativa «shoulder straps»). La nota «tirantes» preserva la alternativa relevante. Se mantiene correctamente el referente del pronombre como el efod.
  issues:
  - severity: medium
    issue: Uso de «a él» para referirse al efod
    rationale: Aunque formalmente posible, en español bíblico claro y natural para un objeto inanimado resulta mejor evitar «él» y usar una formulación como «unidas al efod» o «unidas a este».
  - severity: medium
    issue: «Fue unido» suena poco idiomático en español
    rationale: El pasivo literal preserva el hebreo, pero en español de buena lectura «quedó unido» comunica mejor el resultado de ensamblaje sin perder el sentido pasivo/resultativo.
  - severity: low
    issue: Ligera rigidez sintáctica en la secuencia
    rationale: La combinación «Le hicieron..., unidas a él» puede afinarse para fluir mejor como descripción de confección de vestiduras.
  revised_spanish_text: Le hicieron hombreras[a], unidas al efod; en sus dos extremos quedó unido.
  revised_footnotes:
  - marker: a
    text: O «tirantes». El hebreo se refiere a las partes del efod que descansaban sobre los hombros y unían sus secciones.
    reason: lexical_alternative
