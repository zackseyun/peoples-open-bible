translation:
  language: es
  text: Y si presentas a Yahvé una ofrenda de primicias[a], presentarás tu ofrenda de primicias como grano fresco tostado al fuego, granos triturados del grano fresco.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «espigas verdes tostadas al fuego, grano quebrado de la cosecha nueva».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִנְחַת
  english_pob_choice: offering
  chosen_spanish: ofrenda
  alternatives_spanish:
  - ofrenda de cereal
  - ofrenda de grano
  - ofrenda
  lexicon: HALOT
  rationale: מִנְחָה es un término técnico de ofrenda; en Levítico 2 el contexto cultual lo especializa hacia una ofrenda vegetal o de grano. En español, 'ofrenda' comunica el acto cultual de modo natural, y la especificación material queda aportada por los demás elementos de la cláusula.
- source_word: בִּכּוּרִים / בִּכּוּרֶיךָ
  english_pob_choice: firstfruits
  chosen_spanish: primicias
  alternatives_spanish:
  - primeros frutos
  - primicias de la cosecha
  - primer fruto
  lexicon: HALOT
  rationale: El sentido cultual establecido es la primera producción ofrecida a Dios. 'Primicias' es el equivalente bíblico-natural en español y conserva el valor sacrificial sin explicarlo en exceso.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahvé
  - al SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino directamente como 'Yahvé', conforme a la norma del proyecto, evitando la convención de ocultarlo con 'SEÑOR'.
- source_word: אָבִיב
  english_pob_choice: fresh grain
  chosen_spanish: grano fresco
  alternatives_spanish:
  - grano tierno
  - espigas frescas
  - grano nuevo
  lexicon: HALOT
  rationale: אָבִיב designa el cereal en estado temprano/fresco. 'Grano fresco' comunica bien ese valor en español sin caer en un calco como 'espigas verdes', que sería demasiado específico o menos natural.
- source_word: קָלוּי בָּאֵשׁ
  english_pob_choice: roasted in the fire
  chosen_spanish: tostado al fuego
  alternatives_spanish:
  - tostado en el fuego
  - asado al fuego
  - rociado por el fuego
  lexicon: HALOT
  rationale: La forma describe el grano sometido al fuego. 'Tostado al fuego' es natural en español y preserva el método de preparación sin añadir matices ajenos.
- source_word: גֶּרֶשׂ
  english_pob_choice: crushed kernels
  chosen_spanish: granos triturados
  alternatives_spanish:
  - grano machacado
  - grano quebrantado
  - granos molidos groseramente
  lexicon: HALOT
  rationale: גֶּרֶשׂ refiere al grano quebrado o triturado. 'Granos triturados' es claro y conserva la idea material de una molienda o quebrantamiento grueso.
- source_word: כַּרְמֶל
  english_pob_choice: from the fresh grain
  chosen_spanish: de la cosecha fresca
  alternatives_spanish:
  - del grano fresco
  - de la cosecha nueva
  - del cereal fresco
  lexicon: HALOT
  rationale: En este contexto כַּרְמֶל no es topónimo sino produce/cereal fresco. 'De la cosecha fresca' refleja ese trasfondo agrícola y permite que la frase final funcione con naturalidad en español.
- source_word: תַּקְרִיב ... תַּקְרִיב
  english_pob_choice: present ... you shall present
  chosen_spanish: presentas ... presentarás
  alternatives_spanish:
  - ofreces ... ofrecerás
  - traes ... traerás
  - presentas ... presentarás
  lexicon: HALOT
  rationale: El hifil de קרב expresa 'acercar/presentar' una ofrenda. En español, 'presentar' mantiene la acción ritual con dignidad y evita reducirla a una mera entrega física.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - al SEÑOR
  - Jehová
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton. El español del proyecto usa 'Yahvé' como forma pública y audit-able del nombre divino, preservando la referencia covenantal sin sustituirla por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de 'fresh heads of grain' a 'fresh grain' para ajustarse mejor a אָבִיב / כַּרְמֶל. La redacción española sigue esa revisión y evita especificar 'espigas', optando por 'grano fresco' y 'cosecha fresca' para conservar la precisión lexical.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' según la terminología base del proyecto.
  - '''Primicias'' se conserva como término cultual establecido y no como simple ''primeros frutos''.'
  - Se evitó 'SEÑOR' para no enmascarar el nombre divino.
  - '''Tostado al fuego'' y ''granos triturados'' reflejan la preparación material sin sobreinterpretación.'
