greek_overlap_decision:
  witness: POxy 654
  agreement: substantive_divergence
  chosen_basis: coptic
  rationale: POxy 654 aligns in the sky/sea motifs and 'inside/outside you' but is
    fragmentary in key spots. It likely had an additional maxim ('Whoever knows himself
    will find it') absent in Coptic, reads 'sons' (plural) where Coptic has singular
    'child', and may read 'kingdom of God' where Coptic has simply 'kingdom'. Given
    the completeness and coherence of the Coptic and the bracketed, reconstructed
    nature of the Greek, the draft follows the Coptic while noting the Greek variants.
synoptic_parallel_check:
  parallels:
  - Luke 17:20–21
  handling: context_only
  rationale: Luke’s 'the kingdom of God is among/within you' provides background but
    Thomas diverges by adding 'outside you' and by making self-knowledge and identity
    ('you are the child of the living Father') central.
revision_risk_note: 'Highest-risk choices to scrutinize: (1) retaining the singular
  ''the child'' with plural ''you'' (deliberate Thomasine oddity); (2) rendering the
  impersonal 3pl ''then you will be known'' as a passive; (3) neutral translation
  of ⲥⲱⲕ as ''lead'' rather than ''lead astray''; (4) ''sky'' vs ''heaven'' and ''inside/outside''
  vs ''within/without''. Also confirm that ignoring the Greek clause ''Whoever knows
  himself will find it'' is correct for a Coptic-based draft.'
