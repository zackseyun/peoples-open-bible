translation:
  language: es
  text: Pero todo lo que él haya decidido que debe ser presentado al rey, envíen de inmediato a alguien para examinar estos asuntos, para que podamos actuar como nos corresponde[a]; porque vamos rumbo a Antioquía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para que podamos manejar estos asuntos como es apropiado para nosotros». El griego dice literalmente: «para que tengamos [esto] como nos corresponde», un giro idiomático que probablemente alude a ordenar o resolver los asuntos de manera adecuada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἃ δὲ
  english_pob_choice: But whatever
  chosen_spanish: Pero cualquier cosa que
  alternatives_spanish:
  - Y cualquier cosa que
  - Ahora bien, cualquier cosa que
  lexicon: LSJ
  rationale: δέ introduce una transición leve con matiz adversativo; 'Pero' mantiene el enlace discursivo. ἃ funciona como relativo indefinido, mejor expresado en español con 'cualquier cosa que' que con una fórmula más rígida.
- source_word: ἔκρινεν
  english_pob_choice: he has decided
  chosen_spanish: él haya decidido
  alternatives_spanish:
  - él decidió
  - él haya juzgado
  lexicon: BDAG
  rationale: κρίνω aquí denota una determinación o decisión oficial. El subjuntivo perfecto en español en la cláusula relativa refleja bien una decisión ya tomada con relevancia actual, sin forzar un tono judicial que el contexto no exige.
- source_word: προσανενεχθῆναι τῷ Βασιλεῖ
  english_pob_choice: should be presented to the king
  chosen_spanish: debe ser presentada al rey
  alternatives_spanish:
  - debe ser llevada ante el rey
  - debe ser sometida al rey
  lexicon: LSJ
  rationale: El infinitivo pasivo en contexto administrativo sugiere presentación formal. 'Presentada al rey' conserva el matiz oficial de manera natural en español y evita especificar un procedimiento que el griego no explicita.
- source_word: πέμψατέ τινα
  english_pob_choice: send someone
  chosen_spanish: envíen de inmediato a alguien
  alternatives_spanish:
  - manden a alguien
  - despachen a alguien
  lexicon: BDAG
  rationale: El imperativo plural pide una acción directa. 'Alguien' reproduce la indefinición de τις sin añadir un género no marcado en el griego.
- source_word: παραχρῆμα
  english_pob_choice: at once
  chosen_spanish: de inmediato
  alternatives_spanish:
  - enseguida
  - al instante
  lexicon: BDAG
  rationale: El adverbio expresa prontitud. 'De inmediato' es claro, digno y plenamente idiomático en español moderno.
- source_word: ἐπισκεψόμενον περὶ τούτων
  english_pob_choice: to examine these matters
  chosen_spanish: para examinar estos asuntos
  alternatives_spanish:
  - para investigar estas cosas
  - para revisar estos asuntos
  lexicon: BDAG
  rationale: 'El participio expresa el propósito del envío: alguien debe revisar o investigar el asunto. ''Examinar'' mantiene el registro formal y la amplitud semántica adecuada.'
- source_word: ἵνʼ ἔχωμεν
  english_pob_choice: so that we may act
  chosen_spanish: para que podamos actuar
  alternatives_spanish:
  - para que podamos tenerlos
  - para que podamos disponer de ellos
  lexicon: LSJ
  rationale: Aunque literalmente ἔχω significa 'tener', aquí el contexto administrativo apunta a 'proceder/actuar' de forma adecuada. 'Actuar' sigue la revisión del POB en inglés y evita una paráfrasis más fuerte como 'resolverlos', que añadiría precisión no explícita.
- source_word: ὡς καθήκει ἡμῖν
  english_pob_choice: as is fitting for us
  chosen_spanish: como nos corresponde
  alternatives_spanish:
  - como es propio de nosotros
  - como nos conviene
  lexicon: LSJ
  rationale: καθήκω expresa lo que corresponde o es apropiado. 'Como nos corresponde' suena natural en español y conserva el registro formal de deber o conveniencia apropiada.
- source_word: ἡμεῖς γὰρ προσάγομεν πρὸς Ἀντιοχίαν
  english_pob_choice: for we are going on to Antioch
  chosen_spanish: porque vamos rumbo a Antioquía
  alternatives_spanish:
  - porque nos dirigimos a Antioquía
  - porque seguimos hacia Antioquía
  lexicon: LSJ
  rationale: El verbo con complemento direccional indica movimiento hacia un destino. 'Vamos rumbo a Antioquía' reproduce el sentido de desplazamiento con español natural y sobrio.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del POB en inglés que ajustó 'settle them' a 'act' para reflejar más de cerca ἔχωμεν sin añadir especificidad interpretativa. La versión española sigue esa revisión con 'podamos actuar'.
  spanish_consistency_notes:
  - Se mantuvo 'rey' en minúscula por estilo español, ya que no se trata de un título divino ni de una convención de reverencia obligatoria.
  - '''Antioquía'' conserva la forma geográfica estándar en español.'
  - Se prefirió 'asuntos' para περὶ τούτων porque la referencia administrativa es más natural que 'cosas' en español publicado.
