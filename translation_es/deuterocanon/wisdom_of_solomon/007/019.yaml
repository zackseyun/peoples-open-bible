lexical_decisions:
- source_word: ἐνιαυτῶν
  english_pob_choice: of the years
  chosen_spanish: de los años
  alternatives_spanish:
  - de los años
  - anuales
  lexicon: LSJ
  rationale: ἐνιαυτῶν es genitivo plural de ἐνιαυτός, 'año'. En español, 'de los años' preserva la relación genitiva con κύκλους sin añadir matices innecesarios.
- source_word: κύκλους
  english_pob_choice: cycles
  chosen_spanish: ciclos
  alternatives_spanish:
  - circuitos
  - vueltas
  - cursos
  lexicon: LSJ
  rationale: κύκλους puede significar círculo, ciclo o circuito. 'Ciclos' comunica con naturalidad la idea de repetición periódica en un contexto sapiencial sobre el orden cósmico.
- source_word: ἀστέρων
  english_pob_choice: of the stars
  chosen_spanish: de las estrellas
  alternatives_spanish:
  - de las estrellas
  - de los astros
  lexicon: LSJ
  rationale: ἀστέρων es genitivo plural de ἀστήρ, 'estrella'. 'De las estrellas' conserva el sentido directo del griego y la construcción posesiva con θέσεις.
- source_word: θέσεις
  english_pob_choice: positions
  chosen_spanish: posiciones
  alternatives_spanish:
  - ubicaciones
  - estaciones
  - colocaciones
  lexicon: LSJ
  rationale: θέσις designa colocación o posición. 'Posiciones' es natural en español y refleja el sentido astronómico de la ubicación de las estrellas.
translation_notes:
  revision_awareness: El texto griego transmitido es breve y coincide con la lectura auditada del POB inglés; la diferencia principal es léxica en español para κύκλους/θέσεις, manteniendo el mismo contenido y la misma apertura a la alternativa ‘circuitos/estaciones’ que preservó la edición inglesa.
  spanish_consistency_notes:
  - Se mantiene el registro sobrio y bíblico en español moderno, evitando arcaísmos innecesarios.
  - No se introduce terminología teológica adicional, porque el versículo es una enumeración cosmológica breve sin referencias explícitas a nombres divinos o doctrinales.
  - La nota al pie conserva la alternativa léxica documentada en el POB inglés, adaptada al español con 'estaciones' para θέσεις.
