revisions:
- from: Y oyó las palabras malas del pueblo contra el gobernante[a], porque habían perdido el ánimo a causa de la escasez de agua; y oyó todas las palabras que Judit les había dicho Ozías, quien les había jurado entregar la ciudad a los asirios después de cinco días.
  to: Y oyó las malas palabras del pueblo contra el gobernante, porque habían perdido el ánimo a causa de la escasez de agua; y oyó todas las palabras que Ozías les había dicho, que les había jurado entregar[a] la ciudad a los asirios después de cinco días.
  rationale: Se corrige la sintaxis para que Ozías, no Judit, sea quien habló a ellos, conforme al griego y al audit trail inglés. También se sustituye «palabras malas» por «malas palabras» para mejorar la naturalidad del español sin perder el matiz negativo. Se conserva la nota léxica sobre «entregar/rendir».
