translation:
  language: es
  text: La riqueza añade muchos amigos, pero el pobre queda separado[a] de su amigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «es abandonado por su amigo». El verbo hebreo puede expresar separación sin precisar si el pobre se aparta o si es abandonado; el contexto sugiere fuertemente abandono social.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹן
  english_pob_choice: wealth
  chosen_spanish: riqueza
  alternatives_spanish:
  - bienes
  - riquezas
  - patrimonio
  lexicon: HALOT
  rationale: הוֹן designa posesiones o bienes materiales, no solo dinero en efectivo. «Riqueza» conserva esa amplitud y suena natural en español bíblico contemporáneo.
- source_word: יֹסִיף
  english_pob_choice: adds
  chosen_spanish: añade
  alternatives_spanish:
  - incrementa
  - agrega
  - aumenta
  lexicon: HALOT
  rationale: El hiphil de יסף expresa añadir o aumentar. «Añade» reproduce bien la imagen de que la riqueza atrae o incrementa el número de amigos.
- source_word: רֵעִים רַבִּים
  english_pob_choice: many friends
  chosen_spanish: muchos amigos
  alternatives_spanish:
  - muchos compañeros
  - muchos allegados
  lexicon: HALOT
  rationale: רֵעִים puede significar amigos o compañeros; en este proverbio el matiz relacional es central. «Amigos» comunica de forma directa esa relación, y «muchos» refleja רַבִּים.
- source_word: דָל
  english_pob_choice: a poor man
  chosen_spanish: el pobre
  alternatives_spanish:
  - un pobre
  - una persona pobre
  - el hombre pobre
  lexicon: HALOT
  rationale: דָל describe al pobre, débil o de bajo estatus. En español, «el pobre» conserva el tono proverbial y la oposición con «la riqueza» sin recargar la frase.
- source_word: מֵרֵעֵהוּ
  english_pob_choice: from his friend
  chosen_spanish: de su amigo
  alternatives_spanish:
  - de su compañero
  - por su amigo
  lexicon: HALOT
  rationale: La construcción con מִן más רֵעַ y sufijo indica separación respecto de su amigo/compañero. «De su amigo» mantiene la relación personal y la direccionalidad implícita.
- source_word: יִפָּרֵד
  english_pob_choice: is separated
  chosen_spanish: se separa
  alternatives_spanish:
  - es separado
  - se aparta
  - queda separado
  lexicon: HALOT
  rationale: El nifal de פרד puede ser intransitivo o pasivo y deja abierta la ambigüedad entre apartarse y ser abandonado. «Se separa» conserva esa ambigüedad sin forzar quién inicia la ruptura.
translation_notes:
  revision_awareness: El contexto fuente y el audit trail inglés presentan alto acuerdo y no requieren revisión adicional; la versión española sigue esa lectura sin añadir interpretaciones no atestiguadas.
  spanish_consistency_notes:
  - Se usó «amigos» para רֵעִים y «amigo» para רֵעֵהוּ, manteniendo la relación léxica entre plural y singular.
  - Se evitó traducir דָל con una perífrasis explicativa para conservar el estilo proverbial breve.
  - La ambigüedad de יִפָּרֵד quedó preservada con una voz media/reflexiva en español, coherente con el nifal hebreo.
