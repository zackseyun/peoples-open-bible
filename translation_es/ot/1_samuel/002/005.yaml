translation:
  language: es
  text: Los que estaban saciados se han vendido por pan[a], pero los que tenían hambre han cesado. Aun la mujer estéril ha dado a luz siete[b], pero la que tenía muchos hijos varones[c] ha languidecido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «han cesado»; el hebreo deja implícito el objeto, y el sentido es que los hambrientos ya no tienen hambre o ya no carecen.
    reason: lexical_alternative
  - marker: b
    text: «Siete» puede funcionar como número literal o como número poético de plenitud o totalidad.
    reason: cultural_note
  - marker: c
    text: 'Hebreo: «hijos/varones»; algunas traducciones generalizan como «hijos» o «niños».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂבֵעִים
  english_pob_choice: those who were full
  chosen_spanish: los que estaban saciados
  alternatives_spanish:
  - los satisfechos
  - los bien alimentados
  lexicon: HALOT
  rationale: El participio sustantivado describe personas que estaban en abundancia. «Saciados» conserva la idea de plenitud y funciona de modo natural en español sin perder el contraste poético.
- source_word: בַּלֶּחֶם
  english_pob_choice: for bread
  chosen_spanish: por pan
  alternatives_spanish:
  - por comida
  - a cambio de pan
  lexicon: HALOT
  rationale: «Pan» conserva la imagen concreta de necesidad económica del hebreo, y «por» reproduce la idea de intercambio laboral con suficiente naturalidad en español.
- source_word: נִשְׂכָּרוּ
  english_pob_choice: have hired themselves out
  chosen_spanish: se han alquilado
  alternatives_spanish:
  - se han puesto a jornal
  - han entrado en servicio pagado
  lexicon: HALOT
  rationale: El nifal de שׂכר expresa entrar en trabajo asalariado. «Se han alquilado» mantiene la fuerza reflexiva/pasiva y el giro de reversión social, aunque suene más duro; eso preserva mejor el peso lexical que suavizarlo a «trabajaron por jornal».
- source_word: וּרְעֵבִים
  english_pob_choice: those who were hungry
  chosen_spanish: los que tenían hambre
  alternatives_spanish:
  - los hambrientos
  lexicon: HALOT
  rationale: La construcción substantivada se refleja con una relativa simple en español. «Tenían hambre» evita una nominalización demasiado rígida y mantiene el paralelismo con «estaban saciados».
- source_word: חָדֵלּוּ
  english_pob_choice: have ceased
  chosen_spanish: han cesado
  alternatives_spanish:
  - han dejado de falta
  - ya no carecen
  lexicon: HALOT
  rationale: El verbo significa «cesar»; el hebreo deja implícito el objeto, y la versión española sigue esa misma sobriedad sin añadir «de tener hambre», que sería una expansión interpretativa.
- source_word: עַד
  english_pob_choice: even
  chosen_spanish: aun
  alternatives_spanish:
  - hasta
  - incluso
  lexicon: HALOT
  rationale: Aquí introduce el alcance sorprendente de la inversión. «Aun» comunica mejor que «hasta» el valor de énfasis en español bíblico contemporáneo.
- source_word: עֲקָרָה
  english_pob_choice: the barren woman
  chosen_spanish: la mujer estéril
  alternatives_spanish:
  - la estéril
  - la mujer barrena
  lexicon: HALOT
  rationale: «Estéril» es el equivalente natural y claro en español. Se conserva el sustantivo femenino por la función poética y contrastiva del hebreo.
- source_word: יָלְדָה שִׁבְעָה
  english_pob_choice: has borne seven
  chosen_spanish: ha dado a luz siete
  alternatives_spanish:
  - ha tenido siete
  - ha parido siete
  lexicon: HALOT
  rationale: «Ha dado a luz» es idiomático y digno en español. Se mantiene «siete» sin explicitar «hijos» para respetar la concisión del hebreo y su posible doble resonancia literal/simbólica.
- source_word: וְרַבַּת בָּנִים
  english_pob_choice: she who had many sons
  chosen_spanish: la que tenía muchos hijos
  alternatives_spanish:
  - la que tenía muchos hijos varones
  - la madre de muchos hijos
  lexicon: HALOT
  rationale: El hebreo dice literalmente «muchos hijos/varones». En español, «hijos» comunica de manera natural la abundancia de descendencia y evita una repetición áspera de «muchos hijos varones» en poesía, sin cambiar el sentido de contraste.
- source_word: אֻמְלָלָה
  english_pob_choice: has withered away
  chosen_spanish: ha languidecido
  alternatives_spanish:
  - se ha marchitado
  - ha decaído
  lexicon: HALOT
  rationale: El verbo expresa debilitamiento, miseria o agotamiento. «Ha languidecido» conserva la metáfora de desgaste y queda más digna y poética que una solución excesivamente botánica como «se ha marchitado».
theological_decisions:
- issue: Si שִׁבְעָה debe leerse literalmente o como número de plenitud
  english_pob_reading: Retain 'seven' in the main text without interpretation
  chosen_spanish_reading: Conservar «siete» en el texto principal sin explicarlo
  alternative_spanish_readings:
  - «siete» como número simbólico de plenitud
  - «siete hijos» para volver explícita la descendencia
  rationale: El hebreo presenta el número de manera directa, y la poesía permite tanto lectura literal como resonancia simbólica. La traducción no resuelve esa tensión; la deja abierta, como en el audit trail inglés.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Si בָּנִים debe generalizarse como inclusión neutral
  english_pob_reading: Render as 'sons'
  chosen_spanish_reading: Mantener un referente masculino explícito en la idea de descendencia, pero naturalizado como «hijos» en español
  alternative_spanish_readings:
  - «hijos varones»
  - «hijos» como generalización natural
  rationale: El término hebreo es masculino plural y el contraste poético depende de esa referencia. En español, «hijos» conserva la idea de descendencia masculina de modo comprensible y menos áspero que la repetición explícita de «varones», sin borrar el dato de género del original.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: La redacción española sigue la última revisión del audit trail inglés al dejar «han cesado» sin ampliar a «de tener hambre». También conserva el paralelo poético y la tensión abierta sobre «siete», sin añadir elementos no sustentados por el hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del proyecto cuando corresponda, pero este versículo no contiene el nombre divino.
  - Se conserva el registro poético y conciso del hebreo, evitando expandir los miembros paralelos.
  - Se eligió «estéril» para עֲקָרָה por claridad contemporánea y fidelidad idiomática.
  - Se tradujo el giro laboral con un verbo fuerte («se han alquilado») para reflejar el carácter social de la reversión.
  - La línea final mantiene un matiz de debilitamiento con «ha languidecido» en lugar de una paráfrasis explicativa.
