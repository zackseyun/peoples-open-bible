review_pass:
  verdict: revise
  source_alignment_summary: El borrador español refleja bien la estructura condicional del hebreo y conserva la dificultad textual de בִי con una nota adecuada. También mantiene correctamente la primera persona plural en «perseguiremos» y la metáfora «raíz del asunto». Sin embargo, la segunda cláusula en español usa «si la raíz...», lo que introduce una condición adicional no presente en la función explicativa del hebreo/POB inglés («since the root...»).
  spanish_quality_summary: El texto es claro y legible, pero «si la raíz del asunto se halla en mí» suena menos natural y menos fiel que una formulación causal como «puesto que» o «ya que». Además, «decís» introduce voseo/vosotros peninsular; para español neutral latinoamericano y eclesial amplio conviene «dicen» o «dirán».
  glossary_alignment: No hay términos teológicos de proyecto en juego. La elección «asunto», «se halla», «en mí» y «perseguir» está dentro de lo aceptable. La principal corrección es de sintaxis y registro panhispánico, no de glosario doctrinal.
  issues:
  - severity: medium
    issue: «decís» no es neutral latinoamericano
    rationale: El objetivo del proyecto pide español neutral latinoamericano / ampliamente legible en iglesia. «Decís» marca registro peninsular de vosotros; «dicen» encaja mejor con el 2mp genérico en traducción bíblica neutral.
  - severity: high
    issue: La segunda cláusula usa «si» en vez de un nexo explicativo
    rationale: El hebreo con וְשֹׁרֶשׁ, según la decisión auditada en inglés, da la base de la persecución propuesta («since the root...»), no una nueva condición. «Si la raíz...» altera la relación lógica.
  - severity: low
    issue: La nota con «perseguir con hostilidad» puede simplificarse
    rationale: Es comprensible, pero el inglés distingue entre el verbo básico «pursue» y el sentido más fuerte «persecute». En español, la alternativa más directa es «acosar» o «perseguir» en sentido más fuerte; no es un problema grave.
  revised_spanish_text: 'Si dicen[a]: «¿Cómo lo perseguiremos, puesto que la raíz del asunto se halla en mí?»'
  revised_footnotes:
  - marker: a
    text: El hebreo es difícil. La cláusula final también puede entenderse como «la raíz del asunto se halla en él», según cómo se ponderen el texto consonántico y las versiones antiguas; algunos intérpretes también entienden «perseguiremos» en el sentido más fuerte de «acosaremos» o «perseguiremos» con hostilidad.
    reason: alternative_reading
  revision_rationale: Se cambió «decís» por «dicen» para mantener un español neutral y ampliamente legible. Se reemplazó el segundo «si» por «puesto que» para reflejar la fuerza explicativa documentada en la POB inglesa y evitar introducir una condición no presente en el sentido buscado. La nota se mantuvo sustancialmente igual, con leve ajuste estilístico para expresar mejor la alternativa semántica de רדף en español.
