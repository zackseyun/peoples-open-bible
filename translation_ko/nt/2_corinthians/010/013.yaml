  text: But we will not boast beyond measure[a], but according to the measure of the sphere that God assigned to us—a measure that reaches even to you—
translation:
  language: ko
  text: 그러나 우리는 분수 이상으로 자랑하지 않고, 하나님이 우리에게 나누어 주신 사역 영역의 분수를 따라 자랑할 것입니다. 그 분수는 여러분에게까지 미칩니다—
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εἰς τὰ ἄμετρα
  english_pob_choice: beyond measure
  chosen_korean: 분수 이상으로
  lexicon: BDAG
  rationale: 「측정할 수 없는 영역으로」. 「분수 이상으로」가 의미를 분명히 전달한다.
  alternatives_korean:
  - 측량 없이
- source_word: κανών
  english_pob_choice: sphere
  chosen_korean: 사역 영역
  lexicon: BDAG
  rationale: 본래 「측량 자」. 여기서는 하나님이 사도에게 할당하신 사역 영역. 「사역 영역」으로 의미를 살린다.
  alternatives_korean:
  - 영역
  - 구역
- source_word: μέτρον
  english_pob_choice: measure
  chosen_korean: 분수
  lexicon: BDAG
  rationale: 한국어 「분수」가 측량·할당의 함의를 자연스럽게 담는다.
  alternatives_korean:
  - 측정
  - 한계
