base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/008/024.yaml
  text: And all who transgress both the law of your God and the king’s law shall be diligently punished[a], whether by death or by punishment[c][b], by a fine of silver or by confiscation.
  footnotes:
  - marker: a
    text: The Greek source here differs materially from the supplied MT parallel, which corresponds to a different context; this translation therefore follows the Greek as the primary witness.
    reason: textual_variant
  - marker: b
    text: Or 'strictly punished'; the adverb may emphasize diligent enforcement rather than mere careful procedure.
    reason: lexical_alternative
  - marker: c
    text: Or 'banishment' for 'confiscation'; the Greek term can denote removal, but in this legal list it is best understood as seizure of property.
    reason: alternative_reading
