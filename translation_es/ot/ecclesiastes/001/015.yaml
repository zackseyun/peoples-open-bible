translation:
  language: es
  text: Lo torcido no puede ser enderezado[a], y lo que falta no puede contarse[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «lo torcido no puede enderezarse».'
    reason: lexical_alternative
  - marker: b
    text: 'También: «lo que falta no puede numerarse».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְעֻוָּת
  english_pob_choice: what is crooked
  chosen_spanish: lo torcido
  alternatives_spanish:
  - lo retorcido
  - lo torcido, lo que está torcido
  lexicon: HALOT
  rationale: El participio pasivo describe algo deformado o torcido. «Lo torcido» conserva el valor proverbial y abstracto del hebreo mejor que una referencia concreta a «la cosa torcida».
- source_word: לִתְקֹן
  english_pob_choice: made straight
  chosen_spanish: enderezarse
  alternatives_spanish:
  - ser enderezado
  - ser puesto derecho
  - rectificarse
  lexicon: HALOT
  rationale: El verbo en español debe mantener la imagen física de hacer recto lo torcido. «Enderezarse» funciona naturalmente en español y conserva la metáfora de rectitud/torcedura.
- source_word: וְחֶסְרוֹן
  english_pob_choice: what is lacking
  chosen_spanish: lo que falta
  alternatives_spanish:
  - lo que carece
  - deficiencia
  - la falta
  lexicon: HALOT
  rationale: El sustantivo expresa carencia o deficiencia. «Lo que falta» reproduce el paralelismo abstracto con «lo torcido» y suena idiomático en español.
- source_word: לְהִמָּנוֹת
  english_pob_choice: be counted
  chosen_spanish: contarse
  alternatives_spanish:
  - ser contado
  - ser numerado
  - ser reckoned
  lexicon: HALOT
  rationale: El nifal infinitivo expresa la acción pasiva de ser contado o numerado. «Contarse» conserva la idea de conteo sin volver la línea pesada o arcaica.
translation_notes:
  revision_awareness: 'El hebreo presenta dos miembros paralelos con negación de posibilidad: algo torcido no puede ser hecho recto, y una carencia no puede ser contada. La versión española mantiene ese paralelismo y conserva la metáfora física sin suavizarla.'
  spanish_consistency_notes:
  - Se preserva «lo torcido» para מְעֻוָּת, en línea con la opción inglesa «what is crooked».
  - Se mantiene un paralelismo sintáctico breve y proverbial, adecuado al tono sapiencial de Eclesiastés.
  - Se evitó «SEÑOR» u otras sustituciones no pertinentes, dado que no hay Tetragrámaton ni término divino en este versículo.
