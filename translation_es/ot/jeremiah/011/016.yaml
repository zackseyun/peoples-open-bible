review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: Yahvé nombra a Judá/Israel como un olivo vigoroso y luego describe el juicio mediante fuego y la ruina de sus ramas. Conserva adecuadamente «Yahvé», «olivo», «fruto y forma», «tumulto» y la imagen de las ramas arruinadas. Sin embargo, hay dos ajustes importantes: «llamó tu nombre» suena poco natural en español publicable, y «al sonido de un gran tumulto» es demasiado calcado; conviene una formulación más idiomática sin perder la base léxica.'
  spanish_quality_summary: El español es mayormente claro y digno, pero contiene calcos innecesarios del inglés/hebreo. «Yahvé llamó tu nombre» no es idiomático en español general; «Yahvé te dio el nombre» o «Yahvé te llamó» serían mejores, y dado que sigue una designación explícita, «te dio el nombre» comunica bien el valor de קרא ... שם. También «al sonido de un gran tumulto» resulta rígido; «al estruendo de un gran tumulto» mantiene el doble campo semántico de קול + המולה y lee mejor. «Quedan arruinadas» es aceptable y fiel.
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יְהוָה -> «Yahvé» se conserva correctamente; la metáfora del olivo se mantiene; no hay conflictos con términos doctrinales mayores. La excepción necesaria es estilística: para קָרָא ... שֵׁם no debe forzarse el calco «llamó tu nombre» cuando el español natural exige otra formulación fiel.'
  issues:
  - severity: medium
    issue: «Yahvé llamó tu nombre» es un calco poco natural en español.
    rationale: Aunque refleja de cerca el hebreo, no suena publicable ni claramente inteligible en español moderno. El sentido idiomático es designar o dar nombre; «Yahvé te dio el nombre» preserva el significado sin paráfrasis excesiva.
  - severity: low
    issue: «Al sonido de un gran tumulto» suena rígido.
    rationale: La combinación reproduce demasiado literalmente el inglés. «Al estruendo de un gran tumulto» o «al sonido de una gran conmoción» comunica mejor la acumulación semántica de קול + המולה en español.
  revised_spanish_text: 'Yahvé te dio el nombre[a]: «Un olivo verde, hermoso en fruto y forma». Al estruendo de un gran tumulto[b] le prendió fuego, y sus ramas[c] quedan arruinadas.'
