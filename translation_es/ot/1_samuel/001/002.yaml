revisions:
- from: Tenía dos mujeres. El nombre de una era Ana[a], y el nombre de la segunda era Peniná. Peniná tenía hijos, pero Ana no tenía hijos.
  to: Tenía dos esposas. El nombre de una era Ana[a], y el nombre de la segunda era Penina. Penina tenía hijos, pero Ana no tenía hijos.
  rationale: Se revisa 'mujeres' a 'esposas' para preservar explícitamente el sentido marital de נָשִׁים en contexto. Se cambia 'Peniná' por 'Penina' por legibilidad y uso español más natural. Se corrige la nota al pie para eliminar una construcción agramatical y reflejar una alternativa formal comprensible. Se mantiene 'Ana' como forma española tradicional y 'hijos' como equivalente narrativo natural de יְלָדִים en este contexto.
