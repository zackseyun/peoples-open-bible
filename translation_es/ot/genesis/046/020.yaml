translation:
  language: es
  text: A José le nacieron en la tierra de Egipto Manasés y Efraín[a], que Asenat, hija de Potifera, sacerdote de On, le dio[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: On es la ciudad egipcia conocida después en griego como Heliópolis.
    reason: cultural_note
  - marker: b
    text: 'O: «A José le nacieron en la tierra de Egipto Manasés y Efraín». Lit.: «que Asenat ... le dio a luz».'
    reason: translation_note
lexical_decisions:
- source_word: וַיִּוָּלֵד
  english_pob_choice: were born
  chosen_spanish: le nacieron
  alternatives_spanish:
  - nacieron
  - fueron nacidos
  lexicon: HALOT
  rationale: El verbo niphal de ילד expresa nacimiento en pasiva. En español, «le nacieron» conserva la relación dativa de לְיוֹסֵף y suena natural; evita una pasiva más pesada sin perder el sentido de que los hijos nacen para José.
- source_word: לְיוֹסֵף
  english_pob_choice: to Joseph
  chosen_spanish: a José
  alternatives_spanish:
  - para José
  lexicon: HALOT
  rationale: La preposición marca relación con el sujeto pasivo. «A José» reproduce la datividad normal del español; «para José» sería posible, pero sugiere más beneficio que simple relación de nacimiento.
- source_word: בְּאֶרֶץ מִצְרַיִם
  english_pob_choice: in the land of Egypt
  chosen_spanish: en la tierra de Egipto
  alternatives_spanish:
  - en Egipto
  lexicon: HALOT
  rationale: Se conserva «tierra» para reflejar explícitamente אֶרֶץ, como en el inglés POB. «En Egipto» sería idiomático, pero pierde esa capa léxica de fuente.
- source_word: אֲשֶׁר יָלְדָה לּוֹ
  english_pob_choice: whom ... bore to him
  chosen_spanish: a quienes ... le dio a luz
  alternatives_spanish:
  - a quienes ... lo dio a luz
  - que ... le dio a luz
  lexicon: HALOT
  rationale: El relativo se refiere a los dos hijos, por eso el español plural «a quienes». «Dar a luz» expresa correctamente el acto maternal de יָלַד en un registro claro y bíblico; se mantiene la relación «le» para לּוֹ.
- source_word: אָסְנַת
  english_pob_choice: Asenath
  chosen_spanish: Asenat
  alternatives_spanish:
  - Asenath
  lexicon: HALOT
  rationale: Se translitera el nombre al uso hispano bíblico habitual «Asenat», más natural en español que la forma inglesa con th final, sin alterar la identidad del nombre.
- source_word: בַּת פּוֹטִי פֶרַע
  english_pob_choice: daughter of Potiphera
  chosen_spanish: hija de Potifera
  alternatives_spanish:
  - hija de Potífera
  - hija de Potiphera
  lexicon: HALOT
  rationale: Se conserva el nombre propio en forma española asentada «Potifera», evitando una calca excesivamente anglicada. La estructura de parentesco queda transparente y fiel al hebreo.
- source_word: כֹּהֵן אֹן
  english_pob_choice: priest of On
  chosen_spanish: sacerdote de On
  alternatives_spanish:
  - priest of On
  - sacerdote de Heliopolis
  lexicon: HALOT
  rationale: כֹּהֵן es «sacerdote». Aunque el inglés POB conserva «On» y aclara en nota su identificación con Heliópolis, el texto principal en español mantiene el nombre breve «On» y reserva la equivalencia histórica para la nota.
- source_word: אֶת מְנַשֶּׁה וְאֶת אֶפְרָיִם
  english_pob_choice: Manasseh and Ephraim
  chosen_spanish: Manasés y Efraín
  alternatives_spanish:
  - Manasés, y Efraín
  - Manasé y Efraím
  lexicon: HALOT
  rationale: Los nombres se dan en su forma bíblica española estándar. Se omite el marcador de objeto directo, como corresponde en español.
theological_decisions:
- issue: Orden sintáctico del pasivo de nacimiento y focalización inicial
  english_pob_reading: To Joseph were born in the land of Egypt Manasseh and Ephraim...
  chosen_spanish_reading: A José le nacieron en la tierra de Egipto Manasés y Efraín...
  alternative_spanish_readings:
  - A José nacieron en la tierra de Egipto Manasés y Efraín...
  - A José fueron nacidos en la tierra de Egipto Manasés y Efraín...
  rationale: No hay diferencia doctrinal, pero sí una tensión estilística entre pasiva y naturalidad. «Le nacieron» conserva el sentido pasivo-relacional del hebreo y del inglés POB sin hacer la frase rígida o antinatural en español.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La base inglesa más reciente mantiene «in the land of Egypt» antes de los nombres para reflejar mejor el orden del hebreo y evitar ambigüedad. El español sigue esa disposición al colocar «en la tierra de Egipto» antes de los nombres de los hijos. También se preserva la nota cultural sobre On/Heliópolis y la alternativa de lectura del pasivo de nacimiento.
  spanish_consistency_notes:
  - Se usó «Yahvé» no aplica aquí porque el versículo no contiene el tetragrámaton.
  - 'Se mantuvo la transliteración hispana tradicional de nombres propios bíblicos: José, Asenat, Potifera, Manasés, Efraín.'
  - «Sacerdote» se prefirió a «sacerdote de culto» u otras ampliaciones, porque כֹּהֵן es directo y el contexto no exige glosa adicional.
  - No se añadió nota teológica porque el versículo es narrativo y no presenta una discusión doctrinal explícita.
