translation:
  language: es
  text: 'Pero la ganancia de la tierra en todo sentido es esta: un rey servido por el campo[a][b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Pero una tierra con un rey, para un campo cultivado, es una ganancia en todo sentido». El hebreo de este versículo es notablemente difícil, y la relación entre «ganancia/ventaja», «tierra» y «rey» se entiende de varias maneras.'
    reason: alternative_reading
  - marker: b
    text: «Servido» puede reflejar también la idea de «trabajado» o, en contexto agrícola, «cultivado». El texto hebreo deja abierta la relación exacta entre el rey y el campo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיִתְרוֹן
  english_pob_choice: But the profit
  chosen_spanish: Pero la ganancia
  alternatives_spanish:
  - Y la ganancia
  - Pero el provecho
  - Pero el beneficio
  lexicon: HALOT
  rationale: יִתְרוֹן en Eclesiastés expresa la idea de ganancia, provecho o ventaja. «Ganancia» conserva bien el tema recurrente del libro y funciona con naturalidad en español. Se prefirió «Pero» por el matiz discursivo que el POB inglés revisó en su última pass.
- source_word: אֶרֶץ
  english_pob_choice: of the land
  chosen_spanish: de la tierra
  alternatives_spanish:
  - de la tierra
  - de la región
  - del país
  lexicon: HALOT
  rationale: Aquí אֶרֶץ puede referirse a tierra/terreno. Dado el contexto agrícola de «campo», «tierra» es la opción más directa y comprensible en español.
- source_word: בַּכֹּל
  english_pob_choice: in every way
  chosen_spanish: en todo sentido
  alternatives_spanish:
  - en todo
  - de todas maneras
  - en todos los aspectos
  lexicon: HALOT
  rationale: La expresión es difícil e idiomática. «En todo sentido» conserva la amplitud comprensiva del hebreo sin decidir demasiado en favor de una sola relación sintáctica.
- source_word: היא
  english_pob_choice: is this
  chosen_spanish: es esta
  alternatives_spanish:
  - es esto
  - esto es
  - es así
  lexicon: HALOT
  rationale: El pronombre femenino probablemente retoma la frase femenina precedente y funciona copulativamente. «Es esta» mantiene la referencia anafórica y la estructura compacta del hebreo.
- source_word: מֶלֶךְ
  english_pob_choice: a king
  chosen_spanish: un rey
  alternatives_spanish:
  - el rey
  - un soberano
  lexicon: HALOT
  rationale: El hebreo no lleva artículo, por lo que «un rey» es la forma más transparente. Se mantiene la indefinición del original y la brevedad del sintagma.
- source_word: לְשָׂדֶה
  english_pob_choice: by the field
  chosen_spanish: por el campo
  alternatives_spanish:
  - para el campo
  - del campo
  - sobre el campo
  lexicon: HALOT
  rationale: La preposición לְ admite varias relaciones. Dado el sentido revisado del POB inglés («served by the field») y la dificultad del versículo, «por el campo» permite expresar la relación instrumental o de servicio sin forzar demasiado la sintaxis.
- source_word: נֶעֱבָד
  english_pob_choice: served
  chosen_spanish: servido
  alternatives_spanish:
  - cultivado
  - trabajado
  - labrado
  lexicon: HALOT
  rationale: Aunque la raíz עבד puede tener un sentido agrícola de «trabajar/cultivar», el POB inglés final optó por «served» para reflejar con mayor literalidad la forma hebrea y la ambigüedad del versículo. En español, «servido» conserva ese valor de pasivo/participio y la tensión entre servicio y labor.
translation_notes:
  revision_awareness: Seguí el pasaje hebreo directo y el último pass de revisión inglesa, que cambió el inglés de una formulación más interpretativa a «served by the field». Para el español, elegí una redacción sobria que conserve la dificultad sintáctica del original y no la resuelva en exceso.
  spanish_consistency_notes:
  - Usé «Yahvé» solo cuando el texto lo requiere; este versículo no lo contiene.
  - Mantengo «ganancia» para יִתְרוֹן, en línea con la terminología recurrente de Eclesiastés.
  - Conservé la ambigüedad del cierre con una nota, evitando armonizarlo con una lectura agrícola única.
  - No usé «siervo» porque aquí no aparece δοῦλος ni un contexto equivalente que lo exigiera.
