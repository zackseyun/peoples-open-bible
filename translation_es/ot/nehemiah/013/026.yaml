translation:
  language: es
  text: ¿No fue por estas cosas que Salomón, rey de Israel, pecó? Pero entre las muchas naciones no hubo rey como él; y fue amado por su Dios, y Dios lo puso por rey sobre todo Israel. Aun a él las mujeres extranjeras[a] lo hicieron pecar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las esposas extranjeras». El hebreo dice «las mujeres extranjeras»; «esposas» es una inferencia contextual tomada de la historia de Salomón, pero no está expresada en este verso.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  english_pob_choice: Was it not
  chosen_spanish: ¿No fue
  alternatives_spanish:
  - ¿Acaso no fue
  - ¿No fue acaso
  lexicon: HALOT
  rationale: La pregunta es retórica y espera una respuesta afirmativa. En español, «¿No fue…?» conserva bien ese valor interrogativo-argumentativo sin sonar forzado.
- source_word: עַל אֵלֶּה
  english_pob_choice: because of these things
  chosen_spanish: por estas cosas
  alternatives_spanish:
  - a causa de estas cosas
  - por causa de estas cosas
  lexicon: HALOT
  rationale: La preposición עַל aquí expresa causa u ocasión. «Por estas cosas» es natural en español y mantiene el vínculo causal con el pecado de Salomón.
- source_word: חָטָא
  english_pob_choice: sinned
  chosen_spanish: pecó
  alternatives_spanish:
  - cometió pecado
  - hizo lo malo
  lexicon: HALOT
  rationale: En contexto moral-religioso, el verbo español «pecar» reproduce de forma directa el sentido de חטא.
- source_word: שְׁלֹמֹה
  english_pob_choice: Solomon
  chosen_spanish: Salomón
  alternatives_spanish:
  - Salmón
  lexicon: nombre propio
  rationale: Es la forma española estándar del nombre propio.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: king of Israel
  chosen_spanish: rey de Israel
  alternatives_spanish:
  - rey sobre Israel
  lexicon: HALOT
  rationale: Se conserva el título en forma sobria y directa, sin añadir matices no presentes en el hebreo.
- source_word: וּבַגּוֹיִם הָרַבִּים
  english_pob_choice: Yet among the many nations
  chosen_spanish: Pero entre las muchas naciones
  alternatives_spanish:
  - Y entre las muchas naciones
  - Sin embargo, entre las muchas naciones
  lexicon: HALOT
  rationale: El hebreo introduce contraste con lo anterior; «Pero» comunica mejor esa oposición en español que un simple «Y».
- source_word: לֹא הָיָה מֶלֶךְ כָּמֹהוּ
  english_pob_choice: there was no king like him
  chosen_spanish: no hubo rey como él
  alternatives_spanish:
  - no existió rey como él
  - no había rey como él
  lexicon: HALOT
  rationale: La construcción existencial/comparativa se expresa de manera natural con «no hubo rey como él», manteniendo el sentido de singularidad.
- source_word: וְאָהוּב לֵאלֹהָיו הָיָה
  english_pob_choice: and he was loved by his God
  chosen_spanish: y fue amado por su Dios
  alternatives_spanish:
  - y era amado por su Dios
  - y fue querido por su Dios
  lexicon: HALOT
  rationale: «Amado» reproduce bien el valor pasivo/adjetival de אָהוּב. «Su Dios» conserva el sufijo posesivo sin introducir el Nombre divino.
- source_word: וַיִּתְּנֵהוּ אֱלֹהִים מֶלֶךְ
  english_pob_choice: and God made him king
  chosen_spanish: y Dios lo puso por rey
  alternatives_spanish:
  - y Dios lo hizo rey
  - y Dios lo nombró rey
  lexicon: HALOT
  rationale: נָתַן con objeto y predicado acusativo expresa instalación en el cargo. «Lo puso por rey» conserva esa idea de designación/colocación en el oficio con buena naturalidad en español.
- source_word: עַל כָּל יִשְׂרָאֵל
  english_pob_choice: over all Israel
  chosen_spanish: sobre todo Israel
  alternatives_spanish:
  - sobre todo el Israel
  - sobre el conjunto de Israel
  lexicon: HALOT
  rationale: Se mantiene el dominio o gobierno sobre la nación en una fórmula breve y clara.
- source_word: גַּם אוֹת֣/וֹ
  english_pob_choice: Even him
  chosen_spanish: Aun a él
  alternatives_spanish:
  - Incluso a él
  - Hasta a él
  lexicon: HALOT
  rationale: El objeto anticipado da énfasis. «Aun a él» preserva ese golpe retórico, destacando que ni siquiera Salomón quedó a salvo.
- source_word: הֶחֱטִיאוּ
  english_pob_choice: caused to sin
  chosen_spanish: lo hicieron pecar
  alternatives_spanish:
  - lo indujeron a pecar
  - lo llevaron a pecar
  lexicon: HALOT
  rationale: El hiphil es causativo. «Lo hicieron pecar» es una equivalencia directa, clara y suficientemente fuerte en español.
- source_word: הַנָּשִׁים הַנָּכְרִיּוֹת
  english_pob_choice: the foreign women
  chosen_spanish: las mujeres extranjeras
  alternatives_spanish:
  - las mujeres forasteras
  - las extranjeras
  lexicon: HALOT
  rationale: Se traduce el hebreo con fidelidad léxica. «Extranjeras» sigue de cerca נָכְרִיּוֹת y evita añadir «esposas», que no aparece explícitamente en el verso.
theological_decisions:
- issue: El alcance del pecado atribuido a Salomón
  english_pob_reading: The verse states that foreign women caused Solomon to sin, without expanding the mechanism beyond the text.
  chosen_spanish_reading: El verso afirma que las mujeres extranjeras hicieron pecar a Salomón, sin ampliar el mecanismo más allá de lo que dice el hebreo.
  alternative_spanish_readings:
  - Las mujeres lo tentaron
  - Sus matrimonios lo desviaron de la fidelidad al pacto
  rationale: La traducción conserva la atribución causal del texto y no importa explicaciones procedentes de otros pasajes. Así se mantiene el peso acusatorio del verso sin sobreinterpretarlo.
  doctrine_reference: Translation philosophy §§1, 3
- issue: El valor de אֱלֹהִים en la segunda mitad del verso
  english_pob_reading: and God made him king
  chosen_spanish_reading: y Dios lo puso por rey
  alternative_spanish_readings:
  - y el Señor lo puso por rey
  - y Dios lo nombró rey
  rationale: No aparece el Nombre divino, así que no corresponde introducir «Yahvé» ni un sustituto. «Dios» conserva la referencia al sujeto gramatical hebreo y al mismo tiempo suena natural en español.
  doctrine_reference: 'Contested terms: יְהוָה YHWH → Yahvé (not applicable here)'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión inglesa más reciente: se evita añadir «esposas» en el cuerpo principal, se conserva el énfasis de «aun a él», y se refleja la fuerza causativa de הֶחֱטִיאוּ con una construcción española directa.'
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהִים y no «Yahvé», porque el verso no contiene el Nombre divino.
  - Se mantiene «mujeres extranjeras» en el texto principal para seguir el hebreo de forma transparente.
  - «Puso por rey» traduce el valor de designación de וַיִּתְּנֵהוּ sin expandirlo a una formulación más interpretativa.
  - 'La puntuación conserva el contraste del verso: afirmación de singularidad, luego caída de Salomón.'
