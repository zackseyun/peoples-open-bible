  language: en
  yaml_path: translation/ot/joshua/008/014.yaml
  text: And it happened[a], when the king of Ai saw it, that they hurried and rose early, and the men of the city went out to meet Israel for battle, he and all his people, at the appointed place before the Arabah. But he did not know that an ambush was against him behind the city.
  footnotes:
  - marker: a
    text: Or 'before the plain.' The Hebrew term can denote the Arabah region or, more generally, a desert plain/steppe.
    reason: lexical_alternative
