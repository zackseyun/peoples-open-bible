translation:
  language: es
  text: 'Moisés dijo a la congregación[a]: «Esto es lo que Yahvé ha mandado que se haga».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Esto es lo que Yahvé ha mandado hacer», con el infinitivo hebreo expresado de manera más literal; en español, «que se haga» comunica mejor el sentido impersonal del contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: dijo
  alternatives_spanish:
  - entonces dijo
  - y dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; en español, el verbo simple 'dijo' fluye con naturalidad y mantiene el progreso narrativo sin sobrecargar la frase.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: Nombre propio bíblico estándar
  rationale: Se conserva el nombre propio en su forma usual y plenamente reconocible en español.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: La preposición direccional se expresa de forma natural en español con 'a'.
- source_word: הָעֵדָה
  english_pob_choice: the congregation
  chosen_spanish: la congregación
  alternatives_spanish:
  - la asamblea
  - la comunidad
  lexicon: HALOT
  rationale: '''Congregación'' preserva el sentido formal y cultual del grupo reunido de Israel, en paralelo con la decisión auditada en inglés.'
- source_word: זֶה הַדָּבָר
  english_pob_choice: This is the thing
  chosen_spanish: Esto es lo que
  alternatives_spanish:
  - Ésta es la cosa
  - Éste es el asunto
  - Ésta es la cosa que
  lexicon: HALOT
  rationale: En español, la construcción natural para reproducir la relación demostrativa y relativa es 'Esto es lo que', que transmite el valor formal del hebreo sin sonar mecánico.
- source_word: אֲשֶׁר
  english_pob_choice: that
  chosen_spanish: lo que
  alternatives_spanish:
  - que
  lexicon: HALOT
  rationale: '''Lo que'' integra bien el demonstrativo hebreo con el sustantivo ''דָּבָר'' y evita una fórmula rígida o ambigua en español.'
- source_word: צִוָּה
  english_pob_choice: has commanded
  chosen_spanish: ha mandado
  alternatives_spanish:
  - ha ordenado
  - ha comandado
  lexicon: HALOT
  rationale: '''Mandar'' reproduce bien el valor de una orden dada con vigencia para la acción presente. ''Ordenado'' es posible, pero ''mandado'' resulta más transparente y bíblico en español contemporáneo.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: 'Se sigue la terminología POB para el Tetragrama: ''Yahvé'' en español, preservando el nombre divino en lugar de sustituirlo por un título.'
- source_word: לַעֲשׂוֹת
  english_pob_choice: to be done
  chosen_spanish: hacer
  alternatives_spanish:
  - ser hecho
  - ser cumplido
  - ejecutar
  lexicon: HALOT
  rationale: El infinitivo hebreo puede expresarse de modo impersonal en español como 'hacer' dentro de la cláusula 'ha mandado hacer'. Esta opción conserva la idea de acción a realizar sin forzar un pasivo poco natural.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: La lectura auditada del POB evita la sustitución por 'el SEÑOR' y mantiene el nombre propio divino. En español, 'Yahvé' es la forma preferida del proyecto para conservar esa decisión de forma legible y reverente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor impersonal del infinitivo לַעֲשׂוֹת
  english_pob_reading: to be done
  chosen_spanish_reading: hacer
  alternative_spanish_readings:
  - ser hecho
  - ser cumplido
  rationale: El inglés POB explicó que el hebreo admite una lectura impersonal. En español, la formulación 'ha mandado hacer' comunica esa impersonalidad de manera idiomática, sin convertir el mandato en una acción de un sujeto explícito que el hebreo no da.
  doctrine_reference: Decisión sintáctico-semántica basada en la construcción hebrea לַעֲשׂוֹת
translation_notes:
  revision_awareness: El contexto inglés auditado no muestra revisiones aplicadas y fue marcado como de alta conformidad; por ello, la versión española sigue de cerca la decisión principal del POB, adaptándola a una sintaxis natural en español y manteniendo las tensiones semánticas relevantes del infinitivo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma estándar del nombre divino en el texto principal.
  - Se usa 'congregación' para הָעֵדָה por coherencia con la terminología cultual del POB.
  - Se conserva una construcción breve y directa, adecuada para un registro bíblico público.
  - La nota al pie ofrece la alternativa impersonal explícita sin duplicar innecesariamente el sentido del texto principal.
