    reason: lexical_alternative
  - marker: c
    text: La segunda «rectitud» también puede entenderse como «vindicación» en este contexto.
    reason: lexical_alternative
  revision_rationale: Se revisa «justicia» a «rectitud» en ambas apariciones para seguir más de cerca la decisión léxica y teológica auditada del English POB, preservando la repetición hebrea sin estrechar el sentido hacia lo meramente jurídico. Se añaden notas para mantener las alternativas significativas documentadas para צְדָקָה y חֶסֶד. El resto del texto se conserva por su buena calidad y fidelidad.
