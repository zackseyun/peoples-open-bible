review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: אֳנִיּוֹת תַּרְשִׁישׁ = ''barcos/naves de Tarsis'', el sentido comercial de מַעֲרָבֵךְ, y la secuencia ''te llenaste... te volviste muy pesada'' para וַתִּמָּלְאִי וַתִּכְבְּדִי. También preserva correctamente el modismo poético ''en el corazón de los mares''. Sin embargo, ''tus transportadores de mercancías'' suena poco idiomático y además desplaza la relación sintáctica: el hebreo/POB expresa que las naves eran las que te transportaban tus mercancías o servían como tus portadoras para tu comercio, no que fueran ''transportadores de mercancías'' como etiqueta nominal torpe. Conviene una reparación menor para fidelidad expresiva en español.'
  spanish_quality_summary: La redacción es en general clara, pero 'fueron tus transportadores de mercancías' resulta dura y poco natural en español bíblico contemporáneo. 'Las naves de Tarsis eran tus portadoras[a][b]' mantiene la función comercial y mejora mucho la legibilidad. También 'naves' encaja mejor con el registro elevado del lamento que 'barcos', aunque 'barcos' no sería incorrecto. Las notas están invertidas respecto al orden de anclaje semántico del inglés y la nota [a] actual no corresponde bien a la frase principal revisada.
  glossary_alignment: No hay términos del glosario mayor en juego como Yahvé/Mesías. La decisión comercial debe alinearse con el audit trail inglés revisado 'carriers', que en español se expresa mejor como 'portadoras' o 'transportadoras'; 'portadoras' aquí suena más natural y conserva la metáfora de servicio. Se mantiene 'Tarsis' como forma española tradicional y 'corazón de los mares' como preservación deliberada del modismo hebreo.
  issues:
  - severity: medium
    issue: 'Expresión poco idiomática: ''tus transportadores de mercancías'''
    rationale: Aunque intenta seguir 'your carriers for your merchandise', en español suena mecánico y semánticamente torpe. 'Portadoras de tus mercancías' o simplemente 'tus portadoras' comunica mejor la función de las naves.
  - severity: low
    issue: La nota léxica alternativa no encaja bien con la frase española elegida
    rationale: 'La nota actual ''O: «de tus mercaderías»'' deja aislado un complemento y no presenta una alternativa completa y clara para el lector.'
  - severity: low
    issue: Registro estilístico mejorable con 'barcos'
    rationale: '''Barcos'' no es infiel, pero ''naves'' armoniza mejor con el tono poético-comercial del capítulo y con la dignidad del español bíblico buscado.'
  revised_spanish_text: Las naves de Tarsis eran tus portadoras[a][b], y te llenaste y te volviste muy pesada en el corazón de los mares.
  revised_footnotes:
  - marker: a
    text: 'O: «Las naves de Tarsis eran portadoras de tus mercancías»; también, «... de tus mercaderías».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «en el corazón de los mares», un giro idiomático que significa en medio o en lo profundo del mar.'
    reason: cultural_note
  revision_rationale: Se ajusta una frase española poco natural para expresar mejor la función comercial de שָׁרוֹתַיִךְ según el POB inglés revisado ('carriers'). 'Las naves de Tarsis eran tus portadoras' conserva el sentido de servicio/traslado sin el calco duro 'transportadores de mercancías'. Se mantiene intacta la imagen de llenura, peso y el modismo 'corazón de los mares'.
