translation:
  language: es
  text: El nombre de su primogénito era Joel, y el nombre de su segundo era Abías; eran jueces en Beerseba.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: was
  chosen_spanish: era
  alternatives_spanish:
  - fue
  - llegó a ser
  lexicon: HALOT
  rationale: En esta fórmula nominal, el hebreo funciona como una presentación copulativa/existencial. En español, «era» reproduce mejor ese valor que una secuencia narrativa como «fue» o «llegó a ser».
- source_word: שֵׁם
  english_pob_choice: name
  chosen_spanish: nombre
  alternatives_spanish:
  - nomb​re
  - llamado
  lexicon: HALOT
  rationale: 'Se conserva el sustantivo repetido en la estructura hebrea de nombramiento: «el nombre ... era ...».'
- source_word: בְּנוֹ
  english_pob_choice: his ... son
  chosen_spanish: su primogénito / su segundo
  alternatives_spanish:
  - su hijo primogénito / su segundo hijo
  - su hijo
  lexicon: HALOT
  rationale: El contexto de la secuencia personal y familiar permite expresar la relación posesiva sin repetir «hijo» en el primer miembro, manteniendo naturalidad y cercanía al ajuste revisado del inglés POB, que omitió «son» tras «firstborn».
- source_word: הַבְּכוֹר
  english_pob_choice: firstborn
  chosen_spanish: primogénito
  alternatives_spanish:
  - primero nacido
  - mayor
  lexicon: HALOT
  rationale: «Primogénito» es el equivalente lexical preciso y más natural en español bíblico para el hijo que nació primero.
- source_word: יוֹאֵל
  english_pob_choice: Joel
  chosen_spanish: Joel
  alternatives_spanish:
  - Yoel
  lexicon: transliteración del nombre propio
  rationale: Se conserva la forma castellana tradicional y reconocible del nombre propio.
- source_word: מִשְׁנֵהוּ
  english_pob_choice: his second
  chosen_spanish: su segundo
  alternatives_spanish:
  - el segundo
  - su segundo hijo
  lexicon: HALOT
  rationale: El término señala el orden de nacimiento sin añadir información explícita que el hebreo no formula en esta frase. «Su segundo» preserva la concisión y la relación posesiva implícita.
- source_word: אֲבִיָּה
  english_pob_choice: Abijah
  chosen_spanish: Abías
  alternatives_spanish:
  - Abías
  - Abía
  lexicon: transliteración del nombre propio
  rationale: Se usa la forma española establecida «Abías» para el nombre propio.
- source_word: שֹׁפְטִים
  english_pob_choice: they were judges
  chosen_spanish: eran jueces
  alternatives_spanish:
  - juzgaban
  - servían como jueces
  lexicon: HALOT
  rationale: El participio plural describe una función continua u oficio; «eran jueces» comunica ese sentido de manera idiomática y fiel, sin sobrecargar la frase con una perífrasis innecesaria.
- source_word: בִּבְאֵר שָׁבַע
  english_pob_choice: in Beersheba
  chosen_spanish: en Beerseba
  alternatives_spanish:
  - en Beerseba
  - en Beerseba
  lexicon: HALOT
  rationale: Se mantiene el nombre geográfico en su forma española habitual y se expresa la localización con la preposición natural «en».
theological_decisions:
- issue: Función de «jueces» como cargo/actividad de los hijos de Samuel
  english_pob_reading: they were judges in Beersheba
  chosen_spanish_reading: eran jueces en Beerseba
  alternative_spanish_readings:
  - juzgaban en Beerseba
  - servían como jueces en Beerseba
  rationale: El hebreo presenta un participio que indica la función ejercida por ambos. La traducción evita restringirlo indebidamente a una acción puntual y conserva la posibilidad de oficio o actividad habitual.
  doctrine_reference: No aplica; decisión semántica y de aspecto verbal.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión del inglés POB que eliminó «son» después de «firstborn» para ajustarse más al hebreo. En español, esa misma reducción se refleja al usar «su primogénito» sin añadir «hijo», mientras que «su segundo» conserva la concisión del segundo miembro.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo exija; este versículo no contiene el nombre divino.
  - Se usa «primogénito» para הַבְּכוֹר y «su segundo» para מִשְׁנֵהוּ, respetando la simetría del hebreo.
  - 'Se conserva la forma española habitual de los nombres propios: Joel, Abías, Beerseba.'
  - «Eran jueces» refleja la función continua sin introducir matices no presentes en el hebreo.
