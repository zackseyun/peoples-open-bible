translation:
  language: es
  text: Los centinelas que recorrían la ciudad me encontraron[a]; me golpearon, me hirieron; los guardianes de las murallas me quitaron el manto[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "que patrullaban la ciudad". El participio hebreo sugiere ir de un lado a otro o dar vueltas; en este contexto probablemente alude a rondas de vigilancia urbana.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "me quitaron el velo" o "me quitaron el chal de encima". El hebreo רְדִיד se refiere a una prenda exterior de cobertura.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְצָאֻנִי
  english_pob_choice: found me
  chosen_spanish: me encontraron
  alternatives_spanish:
  - me hallaron
  - me dieron con
  lexicon: HALOT
  rationale: מצא expresa aquí 'encontrar' de manera directa. 'Me encontraron' comunica con naturalidad el hallazgo de la mujer en la ciudad y conserva la acción sin sobretraducción.
- source_word: הַשֹּׁמְרִים
  english_pob_choice: the watchmen
  chosen_spanish: los centinelas
  alternatives_spanish:
  - los vigilantes
  - los guardias
  lexicon: HALOT
  rationale: שמר designa a quienes vigilan. 'Centinelas' funciona bien en español para un grupo de vigilancia urbana y evita una repetición demasiado mecánica de 'guardianes' en la línea final.
- source_word: הַסֹּבְבִים בָּעִיר
  english_pob_choice: who go about the city
  chosen_spanish: que recorrían la ciudad
  alternatives_spanish:
  - que patrullaban la ciudad
  - que andaban por la ciudad
  lexicon: HALOT
  rationale: סבב implica 'dar vueltas' o 'ir alrededor'. 'Que recorrían la ciudad' mantiene la idea de ir de un lado a otro sin imponer demasiado un matiz técnico de patrulla.
- source_word: הִכּוּנִי
  english_pob_choice: they struck me
  chosen_spanish: me golpearon
  alternatives_spanish:
  - me pegaron
  - me hirieron
  lexicon: HALOT
  rationale: נכה puede ser 'golpear' o 'herir'. 'Me golpearon' preserva la fuerza física del verbo y deja que la cláusula siguiente intensifique el daño.
- source_word: פְצָעוּנִי
  english_pob_choice: they wounded me
  chosen_spanish: me hirieron
  alternatives_spanish:
  - me lastimaron
  - me causaron heridas
  lexicon: HALOT
  rationale: פצע expresa una herida real, no solo un golpe. 'Me hirieron' conserva esa intensificación y distingue el segundo verbo del primero.
- source_word: נָשְׂא֤וּ אֶת רְדִידִ/י מֵֽעָלַ֔י
  english_pob_choice: took my cloak from me
  chosen_spanish: me quitaron mi manto
  alternatives_spanish:
  - me quitaron mi velo
  - me arrebataron mi chal
  lexicon: HALOT
  rationale: נשא עם מֵעָלַי aquí indica retirar algo de encima de ella. רדיד denota un envoltorio exterior; 'manto' ofrece un equivalente español amplio y digno, sin fijar indebidamente que se trate de un velo facial.
- source_word: שֹׁמְרֵי הַחֹמוֹת
  english_pob_choice: the keepers of the walls
  chosen_spanish: los guardianes de las murallas
  alternatives_spanish:
  - los vigilantes de las murallas
  - los cuidadores de las murallas
  lexicon: HALOT
  rationale: La construcción expresa a quienes custodian las murallas. 'Guardianes de las murallas' mantiene la relación con 'centinelas' y suena natural en español.
translation_notes:
  revision_awareness: El inglés POB mantiene una traducción dinámica pero auditada; el español conserva esa línea, ajustando el léxico para que el paralelismo y la progresión verbal del hebreo queden claros. Se preserva la tensión lexical de רְדִיד como prenda exterior, sin cerrarla a una identificación más específica que la fuente no obliga a hacer.
  spanish_consistency_notes:
  - Se tradujo הַשֹּׁמְרִים y שֹׁמְרֵי הַחֹמוֹת con dos términos relacionados ('centinelas' / 'guardianes') para evitar monotonía y reflejar la misma esfera semántica de vigilancia.
  - '''Murallas'' se prefirió a ''muros'' para un registro bíblico más natural en español y para corresponder mejor a la imagen urbana del texto.'
  - Se evitó 'SEÑOR' u otra terminología teológica no presente en el versículo; el pasaje es narrativo y descriptivo.
