review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: la herencia se asignó por sorteo, conforme al mandato de Yahvé mediado por Moisés, para nueve tribus y media. Sin embargo, la nota al pie está anclada en ''sorteo'' cuando en realidad comenta la expresión בְּיַד מֹשֶׁה (''por la mano de Moisés'' / ''por medio de Moisés'').'
  spanish_quality_summary: El español es generalmente claro y digno, pero 'La herencia de ellos' suena poco natural frente a 'Su herencia'. Además, la ubicación de la nota produce confusión, y 'la media tribu' es comprensible pero más idiomático en contexto bíblico es 'la media tribu'. No requiere cambio. El resto fluye bien.
  glossary_alignment: Se mantiene correctamente 'Yahvé' para יְהוָה. Las demás decisiones terminológicas concuerdan con el expediente inglés y con el hebreo. La mediación de בְּיַד se expresa bien con 'por medio de Moisés', pero la nota alternativa debe ir allí, no en 'por sorteo'.
  issues:
  - severity: medium
    issue: Anclaje incorrecto de la nota al pie
    rationale: La nota 'O “por la mano de Moisés”' explica בְּיַד מֹשֶׁה, no בְּגוֹרָל. Debe marcarse junto a 'por medio de Moisés', no junto a 'sorteo'.
  - severity: low
    issue: Posesivo poco natural en español
    rationale: '''La herencia de ellos'' es gramatical, pero suena más rígido y menos idiomático que ''Su herencia'', sin pérdida de sentido.'
  revised_spanish_text: Su herencia fue por sorteo, como Yahvé había mandado por medio de Moisés[a], para las nueve tribus y la media tribu.
  revised_footnotes:
  - marker: a
    text: O 'por la mano de Moisés', un hebraísmo que indica mediación o agencia.
    reason: lexical_alternative
