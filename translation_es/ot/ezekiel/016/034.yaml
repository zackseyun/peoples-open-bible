  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: mantiene la metáfora de prostitución, la inversión repetida por הֵפֶךְ, la cláusula idiomática sobre no ser buscada por clientes, y el contraste entre dar pago y no recibirlo. Sin embargo, «el reverso de las mujeres» suena poco natural y semánticamente impreciso en español para הֵפֶךְ en este contexto; conviene una formulación más idiomática que preserve la repetición.'
  spanish_quality_summary: El texto es claro, pero «fuiste el reverso de las mujeres» y «llegaste a ser el reverso» resultan extraños en español e introducen una imagen física ('reverso' de una superficie) menos adecuada que «lo contrario» o «lo opuesto». Además, «nadie te solicitó» es entendible, pero en español bíblico general «nadie te buscó» suena más natural y evita el matiz administrativo/comercial moderno de «solicitó».
  glossary_alignment: No hay conflicto con la terminología de proyecto. «Prostitución» preserva correctamente תַזְנוּתַיִךְ. «Pago» para אֶתְנָן es aceptable y consistente. No intervienen términos sensibles del glosario principal como Yahvé, Mesías, esclavo, etc.
  issues:
  - severity: medium
    issue: «el reverso» para הֵפֶךְ
    rationale: Aunque intenta reflejar inversión/reversión, «reverso» no es la opción más natural en español para describir una conducta como opuesta a la de otras mujeres. «Lo contrario» conserva mejor el sentido contextual y la repetición retórica del hebreo.
  - severity: low
    issue: «nadie te solicitó» suena poco idiomático
    rationale: Capta el sentido contextual, pero «solicitar» en español actual puede sonar burocrático o demasiado técnico. «Nadie te buscó» comunica con más naturalidad que no fue requerida por clientes, especialmente con nota literal aclaratoria.
  revised_spanish_text: 'Y en tu prostitución fuiste lo contrario[a] de las demás mujeres: nadie te buscó[b], pero tú diste pago, y no se te dio pago; así llegaste a ser lo contrario.'
