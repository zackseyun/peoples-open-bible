    issue: «salvación» en el texto principal para σωτηρία
    rationale: El expediente POB decidió «deliverance» para evitar importar asociaciones doctrinales posteriores en un contexto de rescate histórico. En español, «salvación» tiende aún más que en inglés a leerse teológicamente; «liberación» preserva mejor el sentido narrativo inmediato.
  - severity: low
