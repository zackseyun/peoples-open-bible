translation:
  language: es
  text: Encontraremos toda riqueza preciosa[a]; llenaremos nuestras casas de botín[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «riqueza valiosa» o «riquezas costosas».
    reason: lexical_alternative
  - marker: b
    text: O «despojo»; el hebreo שָׁלָל se refiere a bienes tomados como botín.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: toda
  alternatives_spanish:
  - toda la
  - toda clase de
  lexicon: HALOT
  rationale: La cuantificación total se conserva con «toda», que en español suena natural y reproduce el alcance global del hebreo sin volverlo distributivo.
- source_word: הוֹן
  english_pob_choice: wealth
  chosen_spanish: riqueza
  alternatives_spanish:
  - bienes
  - riquezas
  - caudal
  lexicon: HALOT
  rationale: «Riqueza» comunica bien el valor material acumulable del término y funciona con fluidez en español contemporáneo.
- source_word: יָקָר
  english_pob_choice: precious
  chosen_spanish: preciosa
  alternatives_spanish:
  - valiosa
  - costosa
  lexicon: HALOT
  rationale: Se mantiene la idea de alto valor con un adjetivo directo y natural. «Preciosa» preserva el matiz de estimación valiosa sin perder claridad.
- source_word: נִמְצָא
  english_pob_choice: we will find
  chosen_spanish: Encontraremos
  alternatives_spanish:
  - hallaremos
  - obtendremos
  - toparemos con
  lexicon: HALOT
  rationale: El sentido de «hallar/encontrar» sigue el verbo hebreo מצא, y el futuro encaja con la confianza jactanciosa de la voz hablante.
- source_word: נְמַלֵּא
  english_pob_choice: we will fill
  chosen_spanish: llenaremos
  alternatives_spanish:
  - colmararemos
  - llenaremos por completo
  lexicon: HALOT
  rationale: «Llenaremos» conserva la imagen concreta de abarcar las casas con lo obtenido y reproduce el paralelismo verbal del hebreo.
- source_word: בָתֵּינוּ
  english_pob_choice: our houses
  chosen_spanish: nuestras casas
  alternatives_spanish:
  - nuestros hogares
  lexicon: HALOT
  rationale: «Casas» es más literal que «hogares» y mantiene la concreción espacial de guardar botín en la vivienda.
- source_word: שָׁלָל
  english_pob_choice: plunder
  chosen_spanish: botín
  alternatives_spanish:
  - saqueo
  - presa
  - despojo
  lexicon: HALOT
  rationale: «Botín» es un equivalente natural y exacto para bienes tomados por violencia, y preserva el matiz de saqueo del término hebreo.
translation_notes:
  revision_awareness: El hebreo presenta una línea compacta y proverbial, y la versión inglesa POB también la trata como una afirmación de acumulación material con nota léxica sobre la amplitud de הוֹן y la ambigüedad de שָׁלָל. La redacción española conserva ese mismo perfil sin suavizar el carácter de jactancia criminal.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque este versículo no contiene el nombre divino.
  - Se usa «botín» para שָׁלָל siguiendo el valor semántico de bienes tomados por fuerza.
  - Se mantiene el futuro simple para reflejar la secuencia de promesas confiadas del discurso.
  - Las notas señalan alternativas léxicas sin introducir una lectura doctrinal ajena al texto.
