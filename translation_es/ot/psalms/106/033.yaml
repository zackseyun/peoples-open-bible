translation:
  language: es
  text: Porque amargaron su espíritu[b][a], y habló impulsivamente con sus labios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «provocaron su espíritu»; el verbo hebreo puede expresar causar amargura o provocar.
    reason: lexical_alternative
  - marker: b
    text: Es decir, Moisés habló impulsivamente en Meriba; compárese Números 20:10.
    reason: cross_reference
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: La conjunción introduce la razón de la afirmación anterior; «Porque» conserva la relación explicativa de manera natural en español.
- source_word: הִמְרוּ
  english_pob_choice: embittered
  chosen_spanish: embriagaron
  alternatives_spanish:
  - amargaron
  - provocaron
  - rebelaron contra
  lexicon: HALOT
  rationale: 'El hebreo puede expresar causar amargura o provocar. En español, «embriagaron» no sería correcto aquí; por eso se evita. Mejor se mantiene la idea de causar amargura/provocación con «amargaron» o «provocaron». Sin embargo, para no perder la fuerza afectiva del verbo y por fidelidad al sentido causativo, la forma elegida debe reflejar daño interior. [Nota: see theological decision for the sense of provocation.]'
- source_word: אֶת רוּחוֹ
  english_pob_choice: his spirit
  chosen_spanish: su espíritu
  alternatives_spanish:
  - su ánimo
  - su interior
  - su temperamento
  lexicon: HALOT
  rationale: רוּחַ aquí designa la disposición interior de Moisés, no el Espíritu Santo. «Su espíritu» preserva el término antropológico hebreo sin explicarlo excesivamente.
- source_word: וַיְבַטֵּא
  english_pob_choice: he spoke rashly
  chosen_spanish: habló precipitadamente
  alternatives_spanish:
  - habló sin pensar
  - pronunció palabras imprudentes
  - habló impulsivamente
  lexicon: HALOT
  rationale: El verbo expresa hablar o pronunciar, y el contexto le da un matiz negativo. «Habló precipitadamente» comunica bien esa imprudencia en español actual.
- source_word: בִּשְׂפָתָיו
  english_pob_choice: with his lips
  chosen_spanish: con sus labios
  alternatives_spanish:
  - con su boca
  - por sus labios
  lexicon: HALOT
  rationale: Se conserva la imagen corporal concreta del hebreo. «Con sus labios» es una equivalencia directa, clara y natural en español.
theological_decisions:
- issue: Sentido de הִמְרוּ con su objeto רוּחוֹ
  english_pob_reading: they embittered his spirit; Moses is the referent
  chosen_spanish_reading: le causaron amargura en su espíritu; el referente es Moisés
  alternative_spanish_readings:
  - lo provocaron
  - se rebelaron contra él
  - amargaron su espíritu
  rationale: El contexto de Meriba y la frase final sobre sus labios apuntan a Moisés. El verbo admite el matiz de provocar/amargar; en español conviene dejar esa tensión en notas o en la formulación elegida sin convertirla en una lectura más débil o más interpretativa de lo que permite el hebreo.
  doctrine_reference: Números 20:10-12; Salmo 106:32-33
- issue: Pronombre posesivo en «su espíritu» y «sus labios»
  english_pob_reading: The pronouns refer to Moses.
  chosen_spanish_reading: Los pronombres se refieren a Moisés.
  alternative_spanish_readings:
  - podrían referirse al pueblo
  - podrían leerse de otro antecedente
  rationale: La referencia a Moisés está firmemente apoyada por el paralelo de Meriba y por la explicación narrativa del pecado de hablar precipitadamente. No se introduce una referencia al Espíritu Santo, ajena al contexto.
  doctrine_reference: Números 20:10; Salmo 106:32-33
translation_notes:
  revision_awareness: La revisión más reciente del registro inglés no introdujo cambios; el consenso auditado mantiene la lectura de embittered/provoked para הִמְרוּ, con referencia a Moisés y con paralelismo narrativo con Números 20.
  spanish_consistency_notes:
  - Se usa «espíritu» para רוּחַ en sentido antropológico, no pneumatológico.
  - Se evita «SEÑOR» o equivalentes en esta unidad porque no aparece el nombre divino en el versículo.
  - La imagen de «labios» se mantiene literal por fidelidad al hebreo.
  - La lectura de la acción verbal conserva el matiz negativo de imprudencia sin añadir contenido doctrinal.
