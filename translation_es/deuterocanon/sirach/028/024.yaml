  source_alignment_summary: 'El borrador español sigue bien el griego y el rastro de auditoría inglés en casi todo: conserva el imperativo de atención, la imagen concreta de cercar con espinos, y la mención específica de plata y oro. Sin embargo, «ata tu plata y tu oro» suena algo rígido y menos idiomático en español para valuables; el matiz de κατάδησον es ‘atar/asegurar firmemente’, por lo que conviene explicitar mejor ese valor sin perder la imagen concreta.'
