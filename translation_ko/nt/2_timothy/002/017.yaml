  rationale: γάγγραινα는 의학적 「괴저」를 가리키는 정확한 어휘. 한국어 「괴저」가 그 의학적 무게를 보존한다. 통상적 「독한 창질」 등의 풀이보다 의학적 정확성을 우선한다.
