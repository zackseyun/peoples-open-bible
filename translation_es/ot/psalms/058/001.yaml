translation:
  language: es
  text: 'Para el director del coro: «No destruyas». De David[a]. Un miktam[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente: «según “No destruyas”», si la frase especifica más directamente la melodía o el arreglo musical.'
    reason: alternative_reading
  - marker: b
    text: Miktam es un término hebreo de significado incierto; puede designar un tipo de composición o un arreglo musical.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Para el director del coro
  alternatives_spanish:
  - Para el maestro de coro
  - Para el director de música
  - Al director del coro
  lexicon: HALOT
  rationale: La fórmula de encabezado en los salmos apunta al المسؤول/guía musical. «Director del coro» conserva bien la función litúrgica y es natural en español; «maestro de coro» o «director de música» son posibles, pero menos precisos o menos idiomáticos en este contexto.
- source_word: אַל־תַּשְׁחֵת
  english_pob_choice: “Do Not Destroy”
  chosen_spanish: «No destruyas»
  alternatives_spanish:
  - «No destruyas» como título
  - «No destruyas» (posible indicación musical)
  - «No destruyas», o quizá «según “No destruyas”»
  lexicon: HALOT
  rationale: En el encabezado de un salmo, la frase probablemente funciona como nombre de una melodía o indicación musical. En español, la cita como título se mantiene con comillas; «No destruyas» refleja literalmente la forma verbal y deja visible la ambigüedad sin imponer una paráfrasis explicativa.
- source_word: לְדָוִד
  english_pob_choice: Of David
  chosen_spanish: De David
  alternatives_spanish:
  - Para David
  - Por David
  - Perteneciente a David
  lexicon: HALOT
  rationale: El lamed del encabezado puede señalar asociación, dedicación o autoría. «De David» conserva esa ambigüedad mejor que «Por David», que afirmaría autoría de manera más fuerte, o «Para David», que suena menos natural aquí.
- source_word: מִכְתָּם
  english_pob_choice: A miktam
  chosen_spanish: Un miktam
  alternatives_spanish:
  - Un Miktam
  - Un salmo de oro
  - Una inscripción
  lexicon: HALOT
  rationale: El término es oscuro y funciona como etiqueta literaria o musical. La transliteración mantiene la incertidumbre del hebreo sin forzar un significado especulativo. El artículo indefinido ayuda a que el español fluya con naturalidad.
theological_decisions:
- issue: Naturaleza del encabezado del salmo
  english_pob_reading: Treat the line as canonical superscription metadata within the verse and render the musical/literary labels transparently.
  chosen_spanish_reading: Tratar la línea como encabezado canónico del salmo y expresar con transparencia sus rótulos musicales/literarios.
  alternative_spanish_readings:
  - Tomar «No destruyas» como un imperativo dirigido al lector
  - 'Convertir «De David» en una afirmación explícita de autoría: «Por David»'
  rationale: No hay una cuestión doctrinal central, pero sí una decisión de fidelidad textual. La traducción conserva la ambigüedad propia del hebreo y evita sobreafirmar si se trata de una indicación musical, una referencia de tono, o una atribución de autoría.
  doctrine_reference: Principios de traducción 1, 3 y 5
translation_notes:
  revision_awareness: 'El control de revisión más reciente indica que no hubo cambios necesarios y que el acuerdo con la revisión independiente fue alto (veredicto: acuerdo). Por eso se mantiene la solución alineada con el audit trail en inglés, sin introducir expansiones interpretativas.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero aquí no aparece el Tetragrámaton ni un equivalente directo.
  - «Mesías/Cristo» no interviene en este versículo.
  - Se conserva la ambigüedad de las fórmulas del encabezado, especialmente en אַל־תַּשְׁחֵת y לְדָוִד.
  - La transliteración «miktam» se deja sin traducir por la incertidumbre léxica documentada.
