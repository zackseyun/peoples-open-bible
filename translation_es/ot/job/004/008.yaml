translation:
  language: es
  text: Como he visto[a][b], los que aran iniquidad y siembran aflicción la cosechan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Iniquidad» puede entenderse también como «maldad»; el término hebreo puede denotar mal moral y, en algunos contextos, el daño que resulta de él.
    reason: lexical_alternative
  - marker: b
    text: «Aflicción» también puede traducirse como «miseria» o «daño».
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּאֲשֶׁר
  english_pob_choice: As
  chosen_spanish: Como
  alternatives_spanish:
  - Así como
  - Tal como
  lexicon: HALOT
  rationale: La comparación introducida por כַּאֲשֶׁר funciona aquí de manera experiencial. «Como he visto» suena natural en español y conserva el sentido de observación tomada de la experiencia de Elifaz.
- source_word: רָאִיתִי
  english_pob_choice: I have seen
  chosen_spanish: he visto
  alternatives_spanish:
  - vi
  - he observado
  lexicon: HALOT
  rationale: El perfecto español transmite bien la observación personal con fuerza de experiencia acumulada, acorde con el valor perfectivo/experiencial del hebreo y con la decisión inglesa.
- source_word: חֹרְשֵׁי
  english_pob_choice: those who plow
  chosen_spanish: los que aran
  alternatives_spanish:
  - los labradores de
  - los que trabajan la tierra
  lexicon: HALOT
  rationale: Se conserva el participio sustantivado y la metáfora agrícola. «Aran» es el equivalente más directo y natural en español.
- source_word: אָוֶן
  english_pob_choice: iniquity
  chosen_spanish: iniquidad
  alternatives_spanish:
  - maldad
  - mal
  - perversidad
  lexicon: HALOT
  rationale: «Iniquidad» mantiene el peso moral del término y coincide con la decisión inglesa de no diluirlo en un sentido meramente general de «trouble».
- source_word: וְזֹרְעֵי
  english_pob_choice: and sow
  chosen_spanish: y siembran
  alternatives_spanish:
  - y los que siembran
  - y sembradores de
  lexicon: HALOT
  rationale: El participio coordinado continúa la imagen de siembra y cosecha; «siembran» preserva el paralelismo sin añadir elementos innecesarios.
- source_word: עָמָל
  english_pob_choice: trouble
  chosen_spanish: angustia
  alternatives_spanish:
  - aflicción
  - pena
  - miseria
  lexicon: HALOT
  rationale: Aquí se eligió «angustia» como equivalente español natural para el campo semántico de daño, aflicción o miseria que expresa עָמָל en este proverbio; mantiene la pareja conceptual con «iniquidad» y el contraste con la cosecha resultante.
- source_word: יִקְצְרֻהוּ
  english_pob_choice: reap it
  chosen_spanish: eso mismo cosechan
  alternatives_spanish:
  - lo cosechan
  - recogen eso
  - cosechan lo mismo
  lexicon: HALOT
  rationale: La forma verbal con sufijo retoma de manera resumida lo sembrado. «Eso mismo cosechan» preserva la metáfora de recolección y la idea de retribución correspondiente, en un español fluido.
theological_decisions:
- issue: Causalidad moral en la afirmación de Elifaz
  english_pob_reading: Render the proverb straightforwardly as Eliphaz's observed principle without endorsing it as the book's final theological verdict.
  chosen_spanish_reading: Traducir el proverbio con toda su fuerza como una observación de Elifaz, sin convertirla en una conclusión doctrinal absoluta del libro.
  alternative_spanish_readings:
  - Suavizarlo hasta volverlo solo una tendencia general
  - Endurecerlo como ley universal de retribución
  rationale: El hebreo presenta la observación como proverbio y experiencia de Elifaz. La traducción debe respetar esa fuerza retórica sin resolver la tensión teológica del libro de Job.
  doctrine_reference: Preservar la tensión teológica en Job sin imponer una síntesis interpretativa.
translation_notes:
  revision_awareness: El estado de revisión indica que no hubo cambios en la última pasada y que el texto inglés final fue verificado con alto grado de acuerdo; por eso esta propuesta sigue de cerca la solución auditada, manteniendo la metáfora agrícola y la tensión moral del proverbio.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se conserva el lenguaje agrícola con «aran / siembran / cosechan» para mantener la estructura paralela del hebreo.
  - «Iniquidad» se usa por su fuerza moral, no como simple sinónimo de problema.
  - «Angustia» evita banalizar עָמָל y permite el matiz de aflicción o daño sin perder la naturalidad española.
