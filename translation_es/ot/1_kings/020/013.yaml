translation:
  language: es
  text: 'Y he aquí, cierto profeta se acercó a Ahab, rey de Israel, y dijo: «Así dice Yahvé: ¿Has visto toda esta gran multitud[a]? He aquí, yo la entrego hoy en tu mano, y sabrás que yo soy Yahvé».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todo este gran ejército» o «toda esta gran muchedumbre»; la palabra hebrea puede denotar una gran masa o multitud, y aquí se refiere a las fuerzas enemigas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mira
  - Ahora he aquí
  lexicon: HALOT
  rationale: La partícula conserva fuerza discursiva y sorpresa narrativa. «Y he aquí» mantiene el valor enfático de introducción sin volver la frase rígida en español.
- source_word: נָבִיא אֶחָד
  english_pob_choice: a certain prophet
  chosen_spanish: un profeta
  alternatives_spanish:
  - un cierto profeta
  - un profeta en particular
  lexicon: HALOT
  rationale: El hebreo introduce a un individuo no identificado; en español, el indefinido simple comunica esa falta de especificación con naturalidad. «Un cierto profeta» suena más marcado de lo necesario.
- source_word: נִגַּשׁ אֶל
  english_pob_choice: came near to
  chosen_spanish: se acercó a
  alternatives_spanish:
  - se aproximó a
  - vino a
  lexicon: HALOT
  rationale: El verbo expresa aproximación física o narrativa. «Se acercó a» es la forma natural y fiel en español.
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Así ha dicho Yahvé
  - Esto dice Yahvé
  lexicon: HALOT
  rationale: Se conserva la fórmula profética directa. «Dice» reproduce bien el presente formular y «Yahvé» sigue el estándar del proyecto para el nombre divino.
- source_word: הְרָאִיתָ
  english_pob_choice: Have you seen
  chosen_spanish: ¿Has visto
  alternatives_spanish:
  - ¿Has contemplado
  - ¿Has mirado
  lexicon: HALOT
  rationale: El perfecto interrogativo se expresa de manera natural con pretérito perfecto compuesto en español, manteniendo el valor de pregunta retórica.
- source_word: כָּל הֶהָמוֹן הַגָּדוֹל הַזֶּה
  english_pob_choice: all this great multitude
  chosen_spanish: toda esta gran multitud
  alternatives_spanish:
  - todo este gran ejército
  - toda esta gran muchedumbre
  lexicon: HALOT
  rationale: «הָמוֹן» designa una masa numerosa o gran hoste. «Multitud» preserva la amplitud semántica sin forzar un término militar más específico que el hebreo no exige.
- source_word: הִנְנִי
  english_pob_choice: Behold, I am
  chosen_spanish: He aquí, yo
  alternatives_spanish:
  - Mira, yo
  - Yo mismo
  lexicon: HALOT
  rationale: La construcción enfatiza la inmediatez de la acción divina. En español, «He aquí, yo» mantiene el énfasis sin perder claridad sintáctica.
- source_word: נֹתְנוֹ
  english_pob_choice: I am giving it
  chosen_spanish: la entrego
  alternatives_spanish:
  - la doy
  - la pongo en tus manos
  lexicon: HALOT
  rationale: El participio expresa acción segura e inminente; «entrego» comunica bien la idea de poner algo bajo dominio ajeno y conserva la fuerza del hebreo.
- source_word: בְיָדְךָ
  english_pob_choice: into your hand
  chosen_spanish: en tu mano
  alternatives_spanish:
  - en tus manos
  - bajo tu poder
  lexicon: HALOT
  rationale: Se mantiene el modismo hebreo de manera transparente. «En tu mano» es idiomático en español bíblico y conserva el color del original.
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  - en este día
  lexicon: HALOT
  rationale: Adverbio temporal directo y natural.
- source_word: וְיָדַעְתָּ כִּי אֲנִי יְהוָה
  english_pob_choice: and you shall know that I am Yahweh
  chosen_spanish: y sabrás que yo soy Yahvé
  alternatives_spanish:
  - y reconocerás que yo soy Yahvé
  - y conocerás que yo soy Yahvé
  lexicon: HALOT
  rationale: La fórmula de reconocimiento conserva su peso teológico. «Sabrás» reproduce bien el resultado cierto; «yo soy Yahvé» mantiene la identidad divina explícita.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa el Tetragrama; el proyecto pide verterlo como «Yahvé» en español. Se evita la sustitución por «SEÑOR» para no ocultar el nombre propio revelado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fórmula de reconocimiento final «y sabrás que yo soy Yahvé»
  english_pob_reading: a statement that Ahab will recognize YHWH through divine deliverance
  chosen_spanish_reading: una afirmación de reconocimiento personal y teológico mediante la liberación divina
  alternative_spanish_readings:
  - un conocimiento meramente informativo
  - un reconocimiento experiencial de la soberanía de Yahvé
  rationale: 'La frase puede implicar más que información: un reconocimiento nacido del acto salvador. Se deja esa tensión sin reducirla a una sola explicación.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Corregido para anclar la nota [a] directamente en la traducción con «Y he aquí[a]», de modo que el marcador aparezca exactamente en el texto español. Se mantuvo la terminología del proyecto y se evitó una traducción mecánica del inglés, priorizando el hebreo y el audit trail.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - «Multitud» preserva el rango semántico de הָמוֹן sin especificar indebidamente el referente militar.
  - Se conserva el modismo «en tu mano» por su transparencia bíblica y fidelidad al hebreo.
  - La sintaxis española mantiene la secuencia narrativa y la fórmula profética sin añadir contenido interpretativo.
