translation:
  language: es
  text: 'Como te juré por Yahvé[a], el Dios de Israel, diciendo: ‘Ciertamente Salomón, tu hijo, reinará después de mí, y él se sentará en mi trono en mi lugar[b]’, así lo haré hoy mismo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: בַּיהוָה, ''por Yahvé''. Se mantiene el nombre divino del texto fuente en lugar de enmascararlo como ''SEÑOR''.'
    reason: lexical_alternative
  - marker: b
    text: 'O: ''en vez de mí''. El hebreo expresa aquí sustitución o sucesión real inmediata.'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי כַּאֲשֶׁר
  english_pob_choice: As
  chosen_spanish: Como
  alternatives_spanish:
  - Así como
  - Tal como
  lexicon: HALOT
  rationale: 'La combinación abre la comparación juramentada: ''como... así...''. En español, ''Como'' introduce de manera natural la base de la promesa y mantiene la correlación con ''así haré'' al final.'
- source_word: נִשְׁבַּעְתִּי לָךְ
  english_pob_choice: I swore to you
  chosen_spanish: te juré
  alternatives_spanish:
  - te he jurado
  - te hice juramento
  lexicon: HALOT
  rationale: El perfecto hebreo refiere a un juramento ya pronunciado; en narración española, el pretérito simple es natural. 'Juré' conserva el acto solemne del juramento sin sobrecargar el estilo.
- source_word: בַּיהוָה
  english_pob_choice: by Yahweh
  chosen_spanish: por Yahvé
  alternatives_spanish:
  - por el SEÑOR
  - por Yahvé Dios
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para יהוה: ''Yahvé''. La preposición en contexto juramental se expresa con ''por'', que en español comunica adecuadamente el respaldo o fundamento del juramento.'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel como pacto
  - el Dios de Israel
  lexicon: HALOT
  rationale: Construcción directa y transparente del constructo hebreo, sin añadir matices no explícitos en el texto.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - al decir
  lexicon: HALOT
  rationale: Funciona como introducción del contenido del juramento; 'diciendo' conserva la dependencia sintáctica del original.
- source_word: כִּי
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - Sin duda
  - En verdad
  lexicon: HALOT
  rationale: Aquí introduce con énfasis la cláusula del juramento. 'Ciertamente' transmite solemnidad y seguridad sin volver la frase artificiosa en español.
- source_word: שְׁלֹמֹה בְנֵךְ
  english_pob_choice: Solomon your son
  chosen_spanish: Salomón, tu hijo
  alternatives_spanish:
  - tu hijo Salomón
  - Salomón, hijo tuyo
  lexicon: HALOT
  rationale: Nombre propio más aposición natural en español. La coma ayuda a reflejar la relación constructa sin forzar el orden del hebreo.
- source_word: יִמְלֹךְ אַחֲרַי
  english_pob_choice: will reign after me
  chosen_spanish: reinará después de mí
  alternatives_spanish:
  - será rey después de mí
  - reinará en sucesión a mí
  lexicon: HALOT
  rationale: '''Reinará'' mantiene el valor verbal de מלך. ''Después de mí'' conserva la sucesión temporal y dinástica del hebreo sin añadir una formulación más interpretativa.'
- source_word: וְהוּא יֵשֵׁב עַל כִּסְאִי תַּחְתָּי
  english_pob_choice: and he will sit on my throne in my place
  chosen_spanish: y él se sentará en mi trono en mi lugar
  alternatives_spanish:
  - y se sentará sobre mi trono en mi lugar
  - y ocupará mi trono en mi lugar
  lexicon: HALOT
  rationale: Se mantiene el lenguaje real de entronización. 'En mi lugar' preserva la idea de sustitución/sucesión que el inglés audit trail explicó con 'in my place'.
- source_word: כִּי כֵן אֶעֱשֶׂה
  english_pob_choice: so I will do this
  chosen_spanish: así haré
  alternatives_spanish:
  - así lo haré
  - de este modo haré
  lexicon: HALOT
  rationale: La respuesta correlativa al 'como...' inicial se expresa naturalmente con 'así haré'. El objeto está implícito en el contexto; añadir 'lo' sería posible, pero no es necesario para la claridad.
- source_word: הַיּוֹם הַזֶּה
  english_pob_choice: today
  chosen_spanish: hoy mismo
  alternatives_spanish:
  - hoy
  - en este mismo día
  lexicon: HALOT
  rationale: '''Hoy mismo'' comunica la inmediatez enfática del deíctico hebreo y su carga pragmática: la acción se realizará sin demora.'
theological_decisions:
- issue: Rendering the divine name יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se conserva el nombre propio del pacto según el estándar del proyecto en español. No se enmascara con un título, porque el texto fuente presenta el Tetragrámaton de forma directa.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Royal succession formula 'sit on my throne in my place'
  english_pob_reading: in my place
  chosen_spanish_reading: en mi lugar
  alternative_spanish_readings:
  - en lugar de mí
  - en mi puesto
  rationale: La expresión transmite sucesión/substitución real sin perder la concreción del trono. 'En mi lugar' es el equivalente más idiomático y menos interpretativo en español.
  doctrine_reference: OT narrative royal succession idiom; no special doctrinal article
translation_notes:
  revision_awareness: El audit trail inglés está en alta concordancia con el texto hebreo. No se requirieron cambios de fondo; la principal decisión española fue conservar Yahvé para יהוה y expresar la fórmula real con español natural sin diluir la sucesión dinástica.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para el Tetragrámaton, conforme al estándar del proyecto.
  - '''Dios de Israel'' sigue la construcción hebrea sin expansión interpretativa.'
  - '''Reinará'' conserva el valor verbal de מלך mejor que ''será rey'' en este contexto narrativo.'
  - '''En mi lugar'' refleja la sustitución/sucesión del hebreo תַּחְתָּי sin perder claridad.'
  - La puntuación con comillas simples internas conserva el discurso directo dentro del juramento.
