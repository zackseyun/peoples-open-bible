translation:
  language: es
  text: Y Jonatán vino a Jerusalén, y leyó las cartas a oídos de todo el pueblo y de los que estaban en la Acra[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más específicamente, «los que estaban en la ciudadela», es decir, la Acra, la fortaleza de Jerusalén.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦλθεν
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - vino a
  lexicon: LSJ
  rationale: El aoristo de ἔρχομαι se expresa de forma natural en español con 'vino' en narración. 'Llegó' también es posible, pero 'vino a Jerusalén' conserva bien el movimiento sin sonar forzado.
- source_word: ἀνέγνω
  english_pob_choice: read
  chosen_spanish: leyó
  alternatives_spanish:
  - leyó en voz alta
  - leyó públicamente
  lexicon: LSJ
  rationale: ἀναγινώσκω significa 'leer'. En español, el contexto público queda ya indicado por la frase siguiente, por lo que 'leyó' basta sin sobrecargar el texto.
- source_word: τὰς ἐπιστολὰς
  english_pob_choice: the letters
  chosen_spanish: las cartas
  alternatives_spanish:
  - los documentos
  - los mensajes
  lexicon: LSJ
  rationale: ἐπιστολή suele significar 'carta' o 'escrito/mensaje'. 'Cartas' es la equivalencia más directa y natural para un escrito enviado.
- source_word: εἰς τὰ ὦτα
  english_pob_choice: in the hearing of
  chosen_spanish: en oídos de
  alternatives_spanish:
  - a oídos de
  - en presencia de
  lexicon: LSJ
  rationale: La imagen idiomática griega se conserva más de cerca con 'en oídos de', que suena bíblico pero sigue siendo comprensible en español. También mantiene la fuerza de lectura pública sin añadir elementos ajenos al texto.
- source_word: παντὸς τοῦ λαοῦ
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - toda la gente
  - la totalidad del pueblo
  lexicon: LSJ
  rationale: '''Todo el pueblo'' reproduce de modo idiomático y fiel la amplitud colectiva del griego.'
- source_word: τῶν ἐκ τῆς ἄκρας
  english_pob_choice: those in the citadel
  chosen_spanish: los que estaban en la Acra
  alternatives_spanish:
  - los de la Acra
  - los que estaban en la ciudadela
  lexicon: LSJ
  rationale: El griego puede referirse a la fortaleza específica conocida como la Acra en Jerusalén. Mantener 'Acra' preserva esa referencia histórica; 'los que estaban en' refleja mejor el sentido contextual que un castellano literal 'de la Acra'.
translation_notes:
  revision_awareness: El testimonio griego de Swete coincide de manera alta con el texto inglés auditado. La revisión inglesa más reciente ajustó la frase de 'from the citadel' a 'in the citadel'; por eso la versión española adopta una formulación locativa natural ('los que estaban en la Acra') y conserva el nombre técnico en nota.
  spanish_consistency_notes:
  - Se usa 'Jonatán' para Ἰωναθὰν como forma española estándar del nombre.
  - Se conserva 'Acra' como nombre propio histórico, con nota explicativa, en vez de sustituirlo por una glosa general en el texto principal.
  - La construcción 'en oídos de' mantiene el matiz semíticamente influido del giro griego sin volverse opaca en español.
