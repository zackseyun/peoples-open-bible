  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: πεποίθαμεν δὲ ἐν κυρίῳ ἐφ’ ὑμᾶς, ὅτι ἃ ⸀παραγγέλλομεν καὶ ποιεῖτε καὶ ποιήσετε.
base_translation:
  language: en
  yaml_path: translation/nt/2_thessalonians/003/004.yaml
  text: 'And we have confidence in the Lord about you, that you are doing and will do what we command.'
translation:
  language: ko
  text: 또한 우리는 여러분에 대해 주 안에서 확신합니다. 곧 우리가 명한 것을 여러분이 행하고 있고 앞으로도 행하리라는 것입니다.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: πεποίθαμεν
  english_pob_choice: we have confidence
  chosen_korean: 확신합니다
  alternatives_korean:
  - 확신을 가집니다
  - 신뢰합니다
  lexicon: BDAG
  rationale: 완료형의 확정된 현재 상태(신뢰가 자리 잡음)를 「확신합니다」로 옮긴다.
- source_word: ἐν κυρίῳ
  english_pob_choice: in the Lord
  chosen_korean: 주 안에서
  alternatives_korean:
  - 주를 의지하여
  - 주께
  lexicon: BDAG
  rationale: 바울의 「주 안에서」 정형 표현을 그대로 보존.
- source_word: ἐφ’ ὑμᾶς
  english_pob_choice: about you
  chosen_korean: 여러분에 대해
  alternatives_korean:
  - 여러분에 관하여
  - 여러분에게
  lexicon: BDAG
  rationale: ἐπί + 대격의 신뢰 대상.
- source_word: ἃ παραγγέλλομεν
  english_pob_choice: what we command
  chosen_korean: 우리가 명한 것을
  alternatives_korean:
  - 우리가 명하는 것을
  - 우리가 지시한 것을
  lexicon: BDAG
  rationale: παραγγέλλω의 권위적 명령을 「명하다」로 옮긴다.
- source_word: ποιεῖτε καὶ ποιήσετε
  english_pob_choice: are doing and will do
  chosen_korean: 행하고 있고 앞으로도 행하리라는 것입니다
  alternatives_korean:
  - 행하고 있으며 행하게 되리라는 것입니다
  - 지금도 행하고 앞으로도 행할 것입니다
  lexicon: BDAG
  rationale: 현재형 + 미래형의 현재적·지속적 신뢰를 자연스럽게 표현한다.
