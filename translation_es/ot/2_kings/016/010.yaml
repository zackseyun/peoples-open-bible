translation:
  language: es
  text: Entonces el rey Acaz fue a encontrarse con Tiglat-pileser, rey de Asiria, en Damasco, y vio el altar que estaba en Damasco. Y el rey Acaz envió al sacerdote Urías la semejanza[a] del altar y su diseño, con todos sus detalles de construcción[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la semejanza del altar y su diseño». El hebreo usa dos sustantivos cercanos, דְּמוּת y תַּבְנִית, para una representación y su forma estructural.'
    reason: alternative_reading
  - marker: b
    text: La frase hebrea indica correspondencia con la construcción completa del altar, es decir, todos sus detalles de hechura.
    reason: source_note
lexical_decisions:
- source_word: לִקְרַאת
  english_pob_choice: to meet
  chosen_spanish: fue a encontrarse con
  alternatives_spanish:
  - fue a ver
  - fue a recibir
  lexicon: HALOT
  rationale: El hebreo expresa un movimiento para salir al encuentro de alguien; en español, «fue a encontrarse con» comunica con naturalidad ese valor de encuentro sin añadir una relación diplomática más fuerte de la que el texto da.
- source_word: דּוּמֶּשֶׂק / בְּדַמָּשֶׂק
  english_pob_choice: at Damascus
  chosen_spanish: en Damasco
  alternatives_spanish:
  - a Damasco
  - junto a Damasco
  lexicon: HALOT
  rationale: El hebreo usa primero un topónimo en aposición y luego la preposición בְּ. «En Damasco» conserva la localización del encuentro y de la observación del altar en un español directo y preciso.
- source_word: הַמִּזְבֵּחַ
  english_pob_choice: the altar
  chosen_spanish: el altar
  alternatives_spanish:
  - el altar sagrado
  - el altar
  lexicon: HALOT
  rationale: מִזְבֵּחַ significa simplemente «altar». Mantener «el altar» respeta la referencia concreta al altar extranjero visto por Acaz.
- source_word: דְּמוּת
  english_pob_choice: the likeness
  chosen_spanish: la semejanza
  alternatives_spanish:
  - la copia
  - la representación
  lexicon: HALOT
  rationale: La revisión inglesa prefirió «the likeness» para reflejar mejor דְּמוּת. En español, «la semejanza» conserva esa relación de correspondencia formal sin forzar la idea de una reproducción técnica completa.
- source_word: תַּבְנִיתוֹ
  english_pob_choice: its pattern
  chosen_spanish: su diseño
  alternatives_spanish:
  - su patrón
  - su forma
  lexicon: HALOT
  rationale: תַּבְנִית denota forma, patrón o diseño estructural. «Su diseño» es idiomático en español y mantiene el segundo sustantivo como complemento distinto de «semejanza».
- source_word: לְכָל מַעֲשֵׂהוּ
  english_pob_choice: according to all its workmanship
  chosen_spanish: según toda su hechura
  alternatives_spanish:
  - según toda su obra
  - con todos sus detalles de construcción
  lexicon: HALOT
  rationale: La expresión alude a todos los detalles de construcción y ejecución. «Según toda su hechura» preserva el sentido global de conformidad con el modo en que fue hecho, sin perder la densidad del hebreo.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote
  - el ministro
  lexicon: HALOT
  rationale: El título hebreo es claramente «sacerdote». «El sacerdote Urías» mantiene el orden nominal natural en español y no introduce un matiz eclesiástico ajeno.
translation_notes:
  revision_awareness: La redacción española sigue la revisión inglesa más reciente, que sustituyó «a model» por «the likeness» para reflejar con mayor precisión דְּמוּת. Por eso la versión española usa «la semejanza» y conserva la segunda pareja nominal «su diseño», además de mantener la frase final «según toda su hechura» como equivalente auditado de לְכָל מַעֲשֵׂהוּ.
  spanish_consistency_notes:
  - Se usa «Acaz», «Tiglat-pileser», «Asiria», «Damasco» y «Urúias» con grafía castellana habitual y consistencia en nombres propios.
  - Se evita «SEÑOR» o terminología de tradición litúrgica no presente en el versículo.
  - «Semejanza» y «diseño» se mantienen como dos términos distintos para no colapsar דְּמוּת y תַּבְנִית.
  - «Hechura» conserva el peso técnico de la construcción en la frase final.
