base_translation:
  language: en
  yaml_path: translation/ot/numbers/023/007.yaml
  text: 'Then he took up his discourse and said: “From Aram Balak king of Moab has led me[a], from the mountains of the east: ‘Come, curse Jacob for me; yes, come[c][b], denounce Israel.’”'
  footnotes:
  - marker: a
    text: Or “oracle” for “discourse”; the Hebrew idiom is literally “he took up his mashal,” a formal poetic utterance.
    reason: lexical_alternative
  - marker: b
    text: Or “from the eastern mountains”; “the mountains of the east” renders a Hebrew expression that likely refers geographically to the region eastward from Moab.
    reason: lexical_alternative
  - marker: c
    text: The second verb differs from “curse.” It can also be rendered “execrate,” but “denounce” is used here for readable modern English while preserving the distinction.
    reason: lexical_alternative
