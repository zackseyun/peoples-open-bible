base_translation:
  language: en
  yaml_path: translation/ot/judges/003/007.yaml
  text: And the sons of Israel did what was evil in the eyes of Yahweh[c][b][a], and they forgot Yahweh their God and served the Baals and the Asherahs.
  footnotes:
  - marker: a
    text: Or 'the Israelites.' The Hebrew reads 'the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'evil in the eyes of the LORD,' a standard expression for what the LORD judged to be evil.
    reason: lexical_alternative
  - marker: c
    text: Or 'the Asherah poles.' The Hebrew may refer either to cultic objects associated with Asherah or, more broadly, to Asherah worship.
    reason: alternative_reading
