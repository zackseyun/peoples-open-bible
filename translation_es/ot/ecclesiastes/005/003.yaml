translation:
  language: es
  text: Cuando hagas un voto a Dios[a], no tardes en cumplirlo, porque Dios no se complace en los necios[b]. Cumple lo que prometes en tu voto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no demores en cumplirlo». El verbo hebreo puede denotar pagar, completar o cumplir lo que se prometió en el voto.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «porque no hay complacencia en necios», con el sujeto implícito; el sentido es que Dios no se complace en los necios.'
    reason: alternative_reading
lexical_decisions:
- source_word: כַּאֲשֶׁר
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Siempre que
  - Si
  lexicon: HALOT
  rationale: La forma introduce una circunstancia temporal normal, no una condición hipotética fuerte. «Cuando» mantiene la naturalidad del español y conserva el valor de ocasión del hebreo.
- source_word: תִּדֹּר נֶדֶר
  english_pob_choice: you make a vow
  chosen_spanish: hagas un voto
  alternatives_spanish:
  - hagas una promesa solemne
  - votas un voto
  lexicon: HALOT
  rationale: El hebreo usa la construcción cognada «voto un voto». En español, «hacer un voto» comunica el acto formal sin calco torpe. Se prefiere «voto» por su uso bíblico y ritual más preciso que «promesa».
- source_word: לֵאלֹהִים
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a Dios/gods
  lexicon: HALOT
  rationale: En este contexto sapiencial y cultual se refiere al Dios de Israel. «A Dios» expresa el destinatario del voto con claridad y sin añadir masking litúrgico.
- source_word: אַל תְּאַחֵר
  english_pob_choice: do not delay
  chosen_spanish: no tardes
  alternatives_spanish:
  - no demores
  - no postergues
  lexicon: HALOT
  rationale: El mandato prohíbe aplazar el cumplimiento. «No tardes» es la forma más directa y natural en español, aunque «postergues» también captaría la idea de aplazamiento.
- source_word: לְשַׁלְּמוֹ
  english_pob_choice: in paying it
  chosen_spanish: en cumplirlo
  alternatives_spanish:
  - en pagarlo
  - en realizarlo
  lexicon: HALOT
  rationale: El verbo שׁלם puede abarcar pagar, completar o cumplir lo prometido. En español, «cumplirlo» preserva esa amplitud y evita que «pagarlo» suene demasiado restrictivo fuera del ámbito monetario.
- source_word: כִּי אֵין חֵפֶץ
  english_pob_choice: for he takes no pleasure
  chosen_spanish: porque no se complace
  alternatives_spanish:
  - porque no tiene placer
  - porque no se deleita
  lexicon: HALOT
  rationale: La cláusula hebrea es elíptica. Se explicita el sujeto implícito por el contexto inmediato del voto a Dios, como hace el texto inglés POB. «No se complace» conserva el valor afectivo/judicial de חֵפֶץ sin sobretraducir.
- source_word: בַּכְּסִילִים
  english_pob_choice: in fools
  chosen_spanish: en los necios
  alternatives_spanish:
  - en los insensatos
  - en los torpes
  lexicon: HALOT
  rationale: כְּסִילִים en literatura sapiencial es una categoría moral y espiritual, no solo intelectual. «Necios» mantiene esa carga bíblica y es más sobrio que alternativas coloquiales.
- source_word: אֵת אֲשֶׁר תִּדֹּר
  english_pob_choice: What you vow
  chosen_spanish: lo que votes
  alternatives_spanish:
  - aquello que votes
  - lo que hayas votado
  lexicon: HALOT
  rationale: El hebreo coloca el objeto antes del imperativo final. «Lo que votes» conserva la estructura de objeto relativo y funciona con buena fluidez en español.
- source_word: שַׁלֵּם
  english_pob_choice: Pay
  chosen_spanish: Cumple
  alternatives_spanish:
  - Paga
  - Realiza
  lexicon: HALOT
  rationale: El cierre repite la idea de completar/cumplir el voto. Aunque «paga» es posible, «cumple» recoge mejor la amplitud semántica del verbo en este contexto y evita una restricción monetaria.
theological_decisions:
- issue: Sujeto implícito de «no se complace en los necios»
  english_pob_reading: 'Render the implied subject as God: ''for he takes no pleasure in fools.'''
  chosen_spanish_reading: 'Explicitar el sujeto como Dios: «porque no se complace» (Dios) «en los necios».'
  alternative_spanish_readings:
  - porque no hay complacencia en los necios
  - porque no se complace en los necios
  rationale: El contexto inmediato habla de un voto hecho a Dios, por lo que el sujeto implícito es Dios. En español se puede omitir el sujeto por economía, pero la formulación verbal mantiene la referencia contextual sin introducir un sujeto no textual en la línea principal.
  doctrine_reference: Translation philosophy §1, §6
- issue: Valor sapiencial de כְּסִילִים
  english_pob_reading: Use 'fools' in the wisdom-literature sense.
  chosen_spanish_reading: Usar «necios» como categoría sapiencial moral y espiritual.
  alternative_spanish_readings:
  - insensatos
  - tontos
  rationale: «Necios» conserva la fuerza ética del término hebreo y evita rebajar la admonición a simple falta de inteligencia. En Proverbios/Eclesiastés el término señala una postura ante Dios y la sabiduría.
  doctrine_reference: Translation philosophy §6
- issue: Alcance de לְשַׁלְּמוֹ / שַׁלֵּם
  english_pob_reading: The Hebrew can denote paying, completing, or fulfilling what was vowed.
  chosen_spanish_reading: Traducirlo con «cumplirlo / cumple» para abarcar pagar, completar y ejecutar el voto.
  alternative_spanish_readings:
  - pagarlo
  - consumarlo
  - efectuarlo
  rationale: La POB inglesa documenta la amplitud semántica del verbo. En español, «cumplir» preserva esa amplitud mejor que un verbo estrictamente monetario y mantiene la tensión entre lo prometido y su ejecución.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: 'Se siguió el último ajuste del inglés POB al cierre: «Pay what you vow»; en español se reflejó con «Cumple lo que votes», manteniendo la clausura imperativa y la amplitud semántica de שׁלם. También se tomó en cuenta la aclaración sobre el sujeto implícito de la segunda cláusula y la preferencia revisada por una formulación más natural y formal.'
  spanish_consistency_notes:
  - Se mantuvo «Dios» como referente explícito del voto, conforme al contexto de Eclesiastés.
  - Se eligió «voto» en lugar de «promesa» para conservar el registro cultual y bíblico.
  - «Necios» se usó como equivalente de כְּסִילִים por consistencia con el léxico sapiencial.
  - La primera y la última cláusula conservan la repetición semántica del hebreo entre hacer el voto y cumplirlo.
  - La puntuación reproduce una lectura fluida en español sin debilitar la secuencia admonitoria.
