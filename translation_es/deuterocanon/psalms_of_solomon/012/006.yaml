revisions:
- from: Que Yahvé proteja un alma tranquila que odia a los injustos, y que Yahvé[a] guíe a un hombre que hace paz en la casa[b].
  to: Que Yahvé proteja un alma tranquila que odia a los injustos, y que Yahvé guíe a un hombre que procura la paz en la casa[a].
  rationale: Se elimina la nota innecesaria sobre 'Yahvé', se mejora la naturalidad de ποιοῦντα εἰρήνην con 'procura la paz', y se depura la nota léxica final para que quede plenamente en español y refleje mejor las alternativas documentadas.
