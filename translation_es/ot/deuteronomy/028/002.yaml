translation:
  language: es
  text: Y vendrán sobre ti todas estas bendiciones y te alcanzarán[a], si obedeces la voz de Yahvé tu Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y te darán alcance». El hebreo expresa con viveza que las bendiciones no solo llegan, sino que alcanzan al destinatario.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָאוּ
  english_pob_choice: will come
  chosen_spanish: vendrán
  alternatives_spanish:
  - vendrán sobre ti
  - llegarán
  lexicon: HALOT
  rationale: El perfecto con waw consecutivo en este contexto de promesa se vierte naturalmente como futuro en español. "Vendrán" mantiene el valor de acontecimiento cierto y fluido.
- source_word: עָלֶיךָ
  english_pob_choice: upon you
  chosen_spanish: sobre ti
  alternatives_spanish:
  - sobre ti
  - encima de ti
  lexicon: HALOT
  rationale: La preposición עַל con sufijo indica que las bendiciones recaen sobre la persona. "Sobre ti" conserva esa imagen sin sonar forzado en español.
- source_word: כָּל הַבְּרָכוֹת הָאֵלֶּה
  english_pob_choice: all these blessings
  chosen_spanish: todas estas bendiciones
  alternatives_spanish:
  - todas estas bendiciones
  - cada una de estas bendiciones
  lexicon: HALOT
  rationale: La frase cuantificada se expresa de manera directa en español. "Bendiciones" corresponde bien al marco de pacto del pasaje.
- source_word: וְהִשִּׂיגֻךָ
  english_pob_choice: and overtake you
  chosen_spanish: y te alcanzarán
  alternatives_spanish:
  - y te alcanzarán
  - y te sobrepasarán
  - y te darán alcance
  lexicon: HALOT
  rationale: El verbo en hifil de נשׂג expresa alcanzar/overtake. "Te alcanzarán" reproduce la imagen dinámica del hebreo con un verbo natural en español.
- source_word: כִּי
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - si
  - porque
  - cuando
  lexicon: HALOT
  rationale: En este entorno condicional, "si" comunica mejor la relación de condición con la promesa de bendición.
- source_word: תִשְׁמַע
  english_pob_choice: you obey
  chosen_spanish: obedeces
  alternatives_spanish:
  - obedeces
  - escuchas
  - oyes
  lexicon: HALOT
  rationale: שׁמע con בְּקוֹל es un hebraísmo de escucha obediente. En español, "obedeces" comunica la fuerza relacional y covenantal que el inglés POB también preserva.
- source_word: בְּקוֹל
  english_pob_choice: the voice of
  chosen_spanish: la voz de
  alternatives_spanish:
  - la voz de
  - el sonido de
  lexicon: HALOT
  rationale: Se conserva el sustantivo "voz" para reflejar el hebraísmo literal, sin reducirlo a "mandato"; el verbo ya lleva la idea de respuesta obediente.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el Nombre divino, usando "Yahvé" en el texto principal en lugar de una sustitución como "SEÑOR".
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios
  lexicon: HALOT
  rationale: La forma con sufijo posesivo se traduce de modo directo como "tu Dios", manteniendo la relación de pacto en segunda persona singular.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  rationale: El texto hebreo usa el Tetragrama directamente. En español POB se usa "Yahvé" como forma publicada y reconocible del Nombre, evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de שׁמע בְּקוֹל en contexto de pacto
  english_pob_reading: if you obey the voice of Yahweh your God
  chosen_spanish_reading: si obedeces la voz de Yahvé tu Dios
  alternative_spanish_readings:
  - si escuchas la voz de Yahvé tu Dios
  - si oyes la voz de Yahvé tu Dios
  rationale: La expresión hebrea implica obediencia, no mera percepción auditiva. "Obedeces" preserva esa carga teológica y pactal, mientras "la voz de" mantiene visible el hebraísmo.
  doctrine_reference: 'DOCTRINE.md: Idioms and covenant obedience'
- issue: Imagen de las bendiciones que alcanzan al oyente
  english_pob_reading: will come upon you and overtake you
  chosen_spanish_reading: vendrán sobre ti y te alcanzarán
  alternative_spanish_readings:
  - vendrán sobre ti y te alcanzarán
  - vendrán sobre ti y te darán alcance
  rationale: 'La doble imagen del hebreo se conserva: las bendiciones vienen ''sobre'' la persona y luego la ''alcanzan''. No se diluye la fuerza dinámica del verbo.'
  doctrine_reference: 'DOCTRINE.md: Preserve Hebrew imagery when intelligible in target language'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente del inglés POB: no se documentaron cambios posteriores al texto auditado, y el consenso de revisión fue de alto acuerdo.'
  spanish_consistency_notes:
  - 'Se mantiene la terminología del proyecto para el Nombre divino: Yahvé.'
  - 'Se conserva el paralelismo hebreo con dos verbos: vendrán / te alcanzarán.'
  - Se usa «obedeces» para reflejar el hebraísmo שׁמע בְּקוֹל sin perder naturalidad en español.
  - La puntuación y el orden sintáctico buscan ser publicables y fieles al original, sin calco rígido.
