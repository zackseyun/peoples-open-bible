    issue: «en nuestras narices» es poco natural para ἐν ῥισὶν ἡμῶν
    rationale: Aunque literalmente posible, en español bíblico legible la imagen fisiológica elevada se expresa mejor como «en nuestras fosas nasales» o «en nuestras narices» solo en registro más brusco. Dado el tono del versículo, «fosas nasales» preserva la concreción sin aspereza innecesaria.
  - severity: medium
    issue: «la palabra» no refleja tan bien como «el habla» la decisión auditada de λόγος
    rationale: La adjudicación inglesa cambió de «reason» a «speech» para reflejar mejor el contexto. En español, «la palabra» suele entenderse como palabra individual o concepto abstracto; «el habla» representa mejor el acto de hablar, manteniendo la amplitud contextual de λόγος.
  - severity: low
    issue: La nota b puede afinarse tras cambiar «la palabra» a «el habla»
    rationale: Conviene que la nota explique alternativas como «palabra» o «discurso» de forma coherente con la nueva elección principal.
