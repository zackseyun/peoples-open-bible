review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo y la enumeración de las tres puertas del lado norte. También preserva la alternativa léxica documentada para עַל שְׁמוֹת. Sin embargo, dos elecciones suenan poco naturales en español y debilitan la fidelidad idiomática: «serán nombradas según los nombres de» es innecesariamente rígido, y «al lado norte» no es la forma más clara para צָפוֹנָה en una descripción arquitectónica.'
  spanish_quality_summary: El texto es mayormente claro, pero requiere pulido para lograr un español natural y digno. «Serán llamadas por los nombres de» o «llevarán los nombres de» expresa mejor la designación nominal. «En el lado norte» es más idiomático que «al lado norte». También conviene usar raya sin espacio previo en el inciso.
  glossary_alignment: No hay términos de glosario mayor en juego como Yahvé o Mesías. Los nombres tribales Rubén, Judá y Leví están bien conservados. «Puertas» es adecuado para שַׁעַר/שְׁעָרִים. La nota léxica alternativa debe mantenerse.
  issues:
  - severity: medium
    issue: «serán nombradas según los nombres de las tribus de Israel»
    rationale: Aunque refleja de cerca la relación con «nombres», en español suena forzado. El hebreo indica correspondencia de nombre/designación; «serán llamadas por los nombres de las tribus de Israel» o «llevarán los nombres...» comunica mejor ese sentido sin perder fidelidad.
  - severity: medium
    issue: «al lado norte»
    rationale: Esta expresión no es idiomática en español general. Para צָפוֹנָה en este contexto de distribución urbana, «en el lado norte» o «al norte» es más natural y claro.
  - severity: low
    issue: Espaciado con la raya
    rationale: 'En español se prefiere no dejar espacio antes de la raya introductoria del inciso: «norte[a]—una puerta...».'
  revised_spanish_text: 'Y las puertas de la ciudad serán llamadas por los nombres de las tribus de Israel[a]: tres puertas en el lado norte—una puerta de Rubén, una puerta de Judá, una puerta de Leví.'
  revised_footnotes:
  - marker: a
    text: 'O: «llevarán los nombres de las tribus de Israel».'
    reason: lexical_alternative
  revision_rationale: Se ajusta la frase de designación para un español más natural y fiel al sentido de correspondencia nominal de עַל שְׁמוֹת. Se cambia «al lado norte» por «en el lado norte» para reflejar mejor la ubicación arquitectónica. Se conserva la nota de alternativa léxica ya documentada en el POB inglés.
