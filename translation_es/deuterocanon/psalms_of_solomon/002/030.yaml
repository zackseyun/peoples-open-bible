base_translation:
  language: en
  yaml_path: translation/deuterocanon/psalms_of_solomon/002/030.yaml
  text: And I did not delay until God showed me his insolence[a], pierced through on the mountains of Egypt[d][c][b], utterly despised on land and sea.
  footnotes:
  - marker: a
    text: Or 'his insolence' or 'his outrage' for 'his arrogance' (τὴν ὕβριν αὐτοῦ).
    reason: lexical_alternative
  - marker: b
    text: Literally 'pierced through on the mountains of Egypt'; the line vividly depicts the oppressor's violent downfall.
    reason: lexical_alternative
  - marker: c
    text: 'The Greek is compressed: ''made more despised than the least on land and sea.'' ''Person'' is supplied in English for clarity.'
    reason: lexical_alternative
  - marker: d
    text: Or 'And I did not have to wait long until God showed me his arrogance, pierced through on the mountains of Egypt, made more despised than the least person on land and sea.'.
    reason: previous_rendering
