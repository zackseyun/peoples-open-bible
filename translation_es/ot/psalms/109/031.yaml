revisions:
- from: Porque él se pone[a] a la diestra del pobre[b], para salvarlo de quienes juzgan su alma.
  to: Porque él está a la derecha del pobre, para salvarlo de quienes juzgan su alma[a].
  rationale: Se cambia «se pone» por «está» para reflejar mejor יַעֲמֹד como postura firme de apoyo. Se simplifica «a la diestra» a «a la derecha» por mayor naturalidad en español contemporáneo sin perder el matiz. Se elimina la nota innecesaria sobre «el pobre» y se añade la nota necesaria sobre «su alma» para preservar la amplitud semántica de נֶפֶשׁ, en línea con la auditoría inglesa.
