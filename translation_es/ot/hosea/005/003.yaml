translation:
  language: es
  text: Yo conozco a Efraín, e Israel no me está oculto; pues ahora, Efraín, te has prostituido[a]; Israel está impuro[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «has hecho de prostituta». El hebreo usa la imagen de prostitución para la infidelidad al pacto.'
    reason: lexical_alternative
  - marker: b
    text: 'O también: «Israel se ha vuelto impuro».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָדַעְתִּי
  english_pob_choice: I know
  chosen_spanish: Yo conozco
  alternatives_spanish:
  - Yo he conocido
  - Yo conocí
  lexicon: HALOT
  rationale: El perfecto hebreo expresa aquí conocimiento vigente y asentado de Yahvé, no solo un acto pasado. «Yo conozco» comunica mejor esa fuerza presente en español natural y mantiene el tono profético.
- source_word: נִכְחַד מִמֶּנִּי
  english_pob_choice: is not hidden from me
  chosen_spanish: no me está oculto
  alternatives_spanish:
  - no está oculto para mí
  - no puede ocultárseme
  lexicon: HALOT
  rationale: La forma pasiva de כחד señala ocultamiento o quedar escondido. «No me está oculto» conserva esa idea sin volverla forzosamente modal y suena idiomático en español.
- source_word: כִּי עַתָּה
  english_pob_choice: for now
  chosen_spanish: porque ahora
  alternatives_spanish:
  - pues ahora
  - porque en este momento
  lexicon: HALOT
  rationale: «Porque» mantiene el valor explicativo de כִּי, y «ahora» preserva el énfasis temporal. En español, la secuencia más natural y fiel es «porque ahora».
- source_word: הִזְנֵיתָ
  english_pob_choice: you have played the prostitute
  chosen_spanish: te has prostituido
  alternatives_spanish:
  - has jugado a la prostituta
  - has sido infiel
  lexicon: HALOT
  rationale: El verbo de זנה en Oseas carga la metáfora sexual de infidelidad pactual. «Te has prostituido» conserva la fuerza léxica y teológica del hebreo mejor que una paráfrasis atenuada.
- source_word: נִטְמָא
  english_pob_choice: is defiled
  chosen_spanish: está contaminado
  alternatives_spanish:
  - está impuro
  - se ha contaminado
  lexicon: HALOT
  rationale: El nifal de טמא describe un estado resultante de impureza/contaminación. «Está contaminado» es claro para lectores actuales y mantiene el registro moral-cultual del pasaje.
- source_word: אֶפְרַיִם / יִשְׂרָאֵל
  english_pob_choice: Ephraim / Israel
  chosen_spanish: Efraín / Israel
  alternatives_spanish:
  - Efraín / Jacob
  lexicon: HALOT
  rationale: Se conservan los nombres propios transliterados como en el original. En Oseas, Efraín funciona frecuentemente como representación del reino del norte, y mantener ambos términos preserva el paralelismo poético.
theological_decisions:
- issue: Metáfora sexual de la infidelidad pactal
  english_pob_reading: Retain explicit prostitution imagery in the main text
  chosen_spanish_reading: Conservar la imagen explícita de prostitución en el texto principal
  alternative_spanish_readings:
  - expresar solo «has sido infiel»
  - suavizar a «te has desviado»
  rationale: Oseas usa intencionalmente un lenguaje corporal y sexual para describir la infidelidad a Yahvé. Suavizarlo debilitaría el peso profético y borraría una tensión documentalmente presente en el hebreo y en la POB inglesa.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Conocimiento divino continuo
  english_pob_reading: Use present 'I know' rather than past 'I knew'
  chosen_spanish_reading: 'Usar presente: «Yo conozco»'
  alternative_spanish_readings:
  - «Yo he conocido»
  - «Yo sabía»
  rationale: La declaración subraya la vigencia del conocimiento de Yahvé y la imposibilidad de ocultamiento para Israel. El presente español conserva mejor esa dimensión teológica que un pasado simple.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'La versión española sigue el estado revisado del POB inglés: se preservó la lectura presente de conocimiento divino, la metáfora explícita de prostitución para הִזְנֵיתָ y la idea de defilement/uncleanness para נִטְמָא, evitando una domesticación que borre la fuerza profética.'
  spanish_consistency_notes:
  - Se mantuvo «Efraín» e «Israel» como nombres propios transliterados de forma uniforme.
  - Se prefirió «prostituido» sobre fórmulas más suaves para conservar la metáfora pactual.
  - «Contaminado» se usó en sentido moral-cultual, coherente con el registro bíblico del texto.
  - La puntuación refleja dos miembros paralelos principales con una cláusula explicativa introducida por «porque».
