translation:
  language: es
  text: 'Por tanto, he aquí, vienen días, declara Yahvé, en que ya no dirán: «Vive Yahvé, que hizo subir a los hijos de Israel[a] de la tierra de Egipto»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más idiomática, «los israelitas».
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Expresa con naturalidad la conclusión inferida del contexto anterior, conservando el valor argumentativo de la partícula.
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - mirad
  lexicon: HALOT
  rationale: Mantiene el matiz de presentación solemne y deíctica del hebreo profético, con una fórmula aceptable en español bíblico actual.
- source_word: יָמִים בָּאִים
  english_pob_choice: days are coming
  chosen_spanish: vienen días
  alternatives_spanish:
  - los días vienen
  - están por venir días
  lexicon: HALOT
  rationale: Reproduce el modismo profético de futuro inminente sin forzar una estructura demasiado literal en español.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: 'Conserva la fórmula profética de declaración y aplica el criterio del proyecto para el Tetragrámaton: Yahvé.'
- source_word: וְלֹא יֹאמְרוּ עוֹד
  english_pob_choice: they will no longer say
  chosen_spanish: ya no dirán más
  alternatives_spanish:
  - no dirán más
  - no volverán a decir
  lexicon: HALOT
  rationale: Expresa la cesación futura de manera idiomática en español; 'ya' y 'más' juntos refuerzan el valor de 'עוֹד' como continuidad terminada.
- source_word: חַי יְהוָה
  english_pob_choice: As Yahweh lives
  chosen_spanish: ¡Vive Yahvé!
  alternatives_spanish:
  - ¡Por la vida de Yahvé!
  - ¡Tan cierto como que Yahvé vive!
  lexicon: HALOT
  rationale: En una fórmula de juramento, el español puede usar una exclamación más natural sin perder el contenido del juramento vivo por la vida de Yahvé.
- source_word: אֲשֶׁר הֶעֱלָה
  english_pob_choice: who brought up
  chosen_spanish: que hizo subir
  alternatives_spanish:
  - que sacó
  - que hizo salir
  lexicon: HALOT
  rationale: Preserva el verbo causativo de עלה con una construcción española natural que sigue el valor del hebreo en contextos de éxodo.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Jacob
  - los israelitas
  lexicon: HALOT
  rationale: Se mantiene la referencia formal del hebreo con una expresión transparente y reconocible en español bíblico; 'hijos de Israel' evita el cambio de registro que produciría 'israelitas' en esta fórmula.
- source_word: מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: from the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - de Egipto
  - de la tierra egipcia
  lexicon: HALOT
  rationale: Conserva la resonancia histórica y pactal de la expresión hebrea completa, en paralelo con el estilo del original.
theological_decisions:
- issue: Nombre divino YHWH / יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Siguiendo el criterio del proyecto, se translitera el nombre divino como Yahvé, no como un título sustitutivo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh / Yahvé'
- issue: Fórmula de juramento חַי יְהוָה
  english_pob_reading: As Yahweh lives
  chosen_spanish_reading: ¡Vive Yahvé!
  alternative_spanish_readings:
  - Como vive Yahvé
  - ¡Tan cierto como que Yahvé vive!
  rationale: La expresión es una fórmula fija de juramento. En español, una exclamación breve transmite mejor su fuerza solemne sin perder la referencia a la vida de Yahvé.
  doctrine_reference: HALOT; fórmula de juramento veterotestamentaria
- issue: בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: Se preserva la forma masculina plural del hebreo en el texto principal, evitando neutralizar la expresión. La opción idiomática 'israelitas' se deja como alternativa interpretativa.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; esta versión sigue de cerca el texto hebreo y armoniza con la auditoría inglesa, manteniendo el nombre divino, la fórmula profética y la expresión genealógica sin suavizarlas.
  spanish_consistency_notes:
  - Se usa Yahvé de forma consistente para יְהוָה, conforme al criterio del proyecto.
  - Se conserva 'hijos de Israel' en la línea principal y se aclara la opción idiomática 'israelitas' en nota.
  - La exclamación del juramento mantiene el valor solemne del hebreo sin introducir una paráfrasis doctrinal.
  - El registro es bíblico contemporáneo, no arcaizante, y evita el sustituto tradicional 'SEÑOR'.
