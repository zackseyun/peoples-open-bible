translation:
  language: es
  text: Porque diez yuntas de viña producirán un bato[b][a], y un hómer de semilla producirá un efa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «diez yugadas de viña». El hebreo probablemente se refiere a la extensión de tierra trabajada por diez yuntas, no necesariamente a animales literales dentro de la viña.
    reason: lexical_alternative
  - marker: b
    text: 'El bato era una medida líquida; el efa, una medida seca. La idea es una escasez agrícola severa: una gran viña produce muy poco, y una gran cantidad de semilla rinde apenas una cosecha pequeña.'
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce una explicación o resultado del juicio previo; «Porque» conserva la fuerza causal/explanatoria con naturalidad en español.
- source_word: עֲשֶׂרֶת צִמְדֵּי כֶרֶם
  english_pob_choice: ten yoke-pairs of vineyard
  chosen_spanish: diez yuntas de viña
  alternatives_spanish:
  - diez pares de yunta de viña
  - diez yuntas de viñedo
  lexicon: HALOT
  rationale: צֶמֶד puede referirse a una yunta/par de animales y, por extensión, al terreno que puede ararse con ella. «Yuntas de viña» conserva la imagen agrícola y evita convertirla en una medida moderna; «viña» reproduce el sustantivo colectivo/genitivo del hebreo.
- source_word: יַעֲשׂוּ
  english_pob_choice: will yield
  chosen_spanish: producirán
  alternatives_spanish:
  - darán
  - rendirán
  lexicon: HALOT
  rationale: En contexto agrícola, עשה funciona idiomáticamente como «producir/rendir». «Producirán» es claro y natural en español, sin perder el sentido de rendimiento de cosecha.
- source_word: בַּת אֶחָת
  english_pob_choice: one bath
  chosen_spanish: un bato
  alternatives_spanish:
  - una medida de bato
  - un bat
  lexicon: HALOT
  rationale: Se conserva la unidad antigua mediante transliteración. «Bato» es una adaptación española transparente de bath y mantiene la especificidad del texto fuente.
- source_word: וְזֶרַע חֹמֶר
  english_pob_choice: and a homer of seed
  chosen_spanish: una carga de semilla
  alternatives_spanish:
  - un homer de semilla
  - una medida de homer de semilla
  lexicon: HALOT
  rationale: חֹמֶר es una medida antigua; en español, «carga» comunica la cuantía sin introducir un tecnicismo menos comprensible, mientras preserva el carácter de cantidad de semilla. Se evita borrar la desproporción agrícola del verso.
- source_word: יַעֲשֶׂה
  english_pob_choice: will yield
  chosen_spanish: producirá
  alternatives_spanish:
  - dará
  - rendiría
  lexicon: HALOT
  rationale: 'Repite el valor agrícola de עשה con el mismo verbo natural en español para mantener coherencia semántica: una cantidad de semilla no «hace» algo abstracto, sino que produce rendimiento escaso.'
- source_word: אֵיפָה
  english_pob_choice: an ephah
  chosen_spanish: un efa
  alternatives_spanish:
  - una efa
  - un ephah
  lexicon: HALOT
  rationale: Se mantiene la medida seca antigua con transliteración española. «Efa» es la forma ya usable en español bíblico y conserva la transparencia del original.
theological_decisions:
- issue: Escasez agrícola como imagen de juicio
  english_pob_reading: 'The point is severe agricultural scarcity: a large vineyard yields very little wine, and a large amount of seed yields only a small harvest.'
  chosen_spanish_reading: 'El verso comunica una escasez extrema: una gran extensión de viña produce apenas una medida mínima, y una gran cantidad de semilla produce solo una medida pequeña.'
  alternative_spanish_readings:
  - El verso expresa una producción muy pobre
  - La imagen señala una cosecha desastrosa
  rationale: No hay un contenido doctrinal explícito, pero sí una carga profética de juicio por esterilidad. La redacción española conserva esa tensión de desproporción sin suavizarla ni explicarla de más.
  doctrine_reference: Isaías 5:10; juicio profético y esterilidad como señal de desobediencia
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés están en alto acuerdo; no se requieren revisiones sustantivas. Se conservó el paralelismo de medidas antiguas y el matiz agrícola de עשה como «producir».
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se prefirió «viña» frente a «viñedo» para mantener el término colectivo y la imagen poética del hebreo.
  - Se mantuvo la distinción entre medidas líquidas y secas mediante «bato» y «efa».
  - Se evitó traducir mecánicamente la construcción constructa; el español fluye con la imagen agrícola sin borrar la transparencia al original.
