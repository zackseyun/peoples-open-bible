translation:
  language: es
  text: No darás falso testimonio[a] contra tu prójimo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ‘No testificarás falsamente contra tu prójimo.’'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא
  english_pob_choice: not
  chosen_spanish: 'no'
  alternatives_spanish:
  - no has de
  - no deberás
  lexicon: HALOT
  rationale: La negación es directa en una prohibición. En español, ‘no’ conserva la fuerza normativa sin añadir matices innecesarios.
- source_word: תַעֲנֶה
  english_pob_choice: bear
  chosen_spanish: darás testimonio
  alternatives_spanish:
  - testificarás
  - responderás
  lexicon: HALOT
  rationale: En el contexto legal de עֵד, el verbo apunta a prestar testimonio. ‘Dar testimonio’ expresa bien la acción jurídica sin forzar el calco de ‘bear’.
- source_word: בְרֵעֲךָ
  english_pob_choice: against your neighbor
  chosen_spanish: contra tu prójimo
  alternatives_spanish:
  - contra tu vecino
  - acerca de tu prójimo
  lexicon: HALOT
  rationale: La preposición con un verbo de testimonio se entiende naturalmente como oposición o perjuicio en español jurídico. ‘Prójimo’ mantiene el valor de ‘fellow/neighbor’ con tono bíblico sobrio.
- source_word: עֵד
  english_pob_choice: witness
  chosen_spanish: testimonio
  alternatives_spanish:
  - testigo
  - testimonio como testigo
  lexicon: HALOT
  rationale: En esta construcción, el sustantivo se integra con el verbo para formar la expresión legal. ‘Dar falso testimonio’ es la forma española estable y transparente del giro, sin perder el sentido judicial.
- source_word: שָׁוְא
  english_pob_choice: 'false'
  chosen_spanish: falso
  alternatives_spanish:
  - mentiroso
  - vano
  - engañoso
  lexicon: HALOT
  rationale: En contexto de tribunal, ‘falso’ es la equivalencia más precisa e idiomática. ‘Vano’ o ‘vacío’ podrían reflejar otros sentidos de שָׁוְא, pero aquí el valor legal de falsedad domina.
translation_notes:
  revision_awareness: 'El texto hebreo y el audit trail inglés coinciden en un mandato legal breve: prohibición de testimonio falso contra el prójimo. La revisión más reciente no introdujo cambios; se mantiene la lectura estable. En español, se opta por la fórmula jurídica natural ‘dar falso testimonio’, que corresponde al sentido del conjunto ענה + עֵד + שָׁוְא.'
  spanish_consistency_notes:
  - Se preserva el tono normativo directo del original mediante la prohibición en segunda persona singular.
  - ‘Prójimo’ traduce el valor relacional de רֵעַ sin reducirlo a una noción meramente geográfica de ‘vecino’.
  - La nota alternativa mantiene visible la posibilidad documental de ‘testificar falsamente’, que refleja de forma más literal el verbo hebreo ענה.
