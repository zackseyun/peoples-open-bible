revisions:
- from: 'y dirás[a]: «Subiré contra una tierra de aldeas sin murallas; vendré[b] contra los que están en reposo, los que habitan con seguridad, todos ellos habitando sin muro, y sin bar[c] ni puertas».'
  to: 'y dirás: «Subiré contra una tierra de aldeas sin murallas[a]; iré contra los que están en reposo, los que habitan seguros. Todos ellos habitan sin muro y no tienen cerrojo[b] ni puertas[c]».'
  rationale: Se corrige «bar» por «cerrojo», que es español natural y fiel al sentido defensivo de וּבְרִיחַ; se reubica la nota léxica principal en «aldeas sin murallas» para reflejar la alternativa documentada para אֶרֶץ פְּרָזוֹת; se mejora la fluidez con «iré contra» y se separa la última cláusula para un español más claro sin perder el énfasis del hebreo.
