- from: Y pusieron los dos cordones de oro sobre los dos anillos, en los extremos del pectoral[a].
  to: Y pusieron los dos cordones de oro en los dos anillos en los extremos del pectoral[a].
  rationale: Se cambia «sobre» por «en» para un español más natural en contexto de fijación a anillos, y se elimina la coma para mantener un sintagma locativo fluido. Se conserva «cordones» como decisión principal y la nota alternativa sobre «cadenas».
