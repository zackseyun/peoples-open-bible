translation:
  language: es
  text: '«Y tú, hijo de hombre, así dice el Señor Yahvé: Di a toda ave de toda ala[a] y a toda bestia del campo: “Juntaos y venid; congregaos de todas partes para mi sacrificio[b] que estoy sacrificando para vosotros, un gran sacrificio sobre los montes de Israel, y comeréis carne y beberéis sangre”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «a toda ave de toda ala», un hebraísmo que expresa a todas las aves.'
    reason: lexical_alternative
  - marker: b
    text: O «mi banquete sacrificial que estoy preparando para vosotros»; el hebreo usa el sustantivo «sacrificio» con un verbo cognado, destacando la escena sacrificial.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶן אָדָם
  english_pob_choice: son of man
  chosen_spanish: hijo de hombre
  alternatives_spanish:
  - ser humano
  - mortal
  lexicon: HALOT
  rationale: Mantiene el título profético fijo de Ezequiel sin volverlo una paráfrasis interpretativa. En español, «hijo de hombre» es transparente y reproduce la forma tradicional de la expresión.
- source_word: אֲדֹנָי יְהֹוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor Yahvé
  - el Señor DIOS
  lexicon: HALOT
  rationale: La línea base del proyecto pide renderizar יְהוָה como «Yahvé». Aquí el hebreo combina אֲדֹנָי con el nombre divino; en español, para evitar la duplicación artificial de «Señor Señor» y porque el texto subraya el habla divina, se emplea directamente «Yahvé» en el discurso introducido.
- source_word: צִפּוֹר כָּל כָּנָף
  english_pob_choice: every bird of every wing
  chosen_spanish: toda ave de toda ala
  alternatives_spanish:
  - cada ave de cada ala
  - toda ave alada
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea literal y el valor distributivo total. «Ave de toda ala» refleja el hebraísmo sin suavizarlo en exceso; «todo» se mantiene para el alcance universal del llamado.
- source_word: חַיַּת הַשָּׂדֶה
  english_pob_choice: every beast of the field
  chosen_spanish: toda bestia del campo
  alternatives_spanish:
  - todo animal del campo
  - toda fiera del campo
  lexicon: HALOT
  rationale: «Bestia del campo» conserva el registro bíblico y la fuerza zoológica del término. «Animal» sería más neutro, pero perdería algo del paralelismo con el hebreo y con el juicio oracular.
- source_word: הִקָּבְצוּ ... וָבֹאוּ ... הֵאָסְפוּ
  english_pob_choice: Gather yourselves and come; assemble
  chosen_spanish: Juntaos y venid; congregaos
  alternatives_spanish:
  - Reuníos y venid; asambleaos
  - Juntaos y acudid; reunios
  lexicon: HALOT
  rationale: Se preserva la triple secuencia imperativa y su intensificación retórica mediante tres verbos distintos. «Congregaos» comunica el matiz de reunir para un propósito común, en correspondencia con el contexto del banquete de juicio.
- source_word: מִסָּבִיב
  english_pob_choice: from all around
  chosen_spanish: de todas partes
  alternatives_spanish:
  - de alrededor
  - de todos lados
  lexicon: HALOT
  rationale: Expresa de manera natural en español la totalidad direccional del hebreo. «De todas partes» mantiene el sentido inclusivo de procedencia sin volver la frase pesada.
- source_word: עַל זִבְחִי אֲשֶׁר אֲנִי זֹבֵחַ לָכֶם
  english_pob_choice: to my sacrifice that I am sacrificing for you
  chosen_spanish: para mi sacrificio que estoy sacrificando para vosotros
  alternatives_spanish:
  - a mi sacrificio que estoy sacrificando por vosotros
  - para mi sacrificio que preparo para vosotros
  lexicon: HALOT
  rationale: Se conserva la repetición de sustantivo y verbo de la raíz זבח, porque el hebreo la usa de forma intencional. «Para vosotros» reproduce el dativo de beneficio/destino; «sacrificando» mantiene la acción cultual en curso.
- source_word: זֶבַח גָּדֹול
  english_pob_choice: a great sacrifice
  chosen_spanish: un gran sacrificio
  alternatives_spanish:
  - un sacrificio grande
  - un gran banquete sacrificial
  lexicon: HALOT
  rationale: «Sacrificio» mantiene el núcleo cultual y, junto con lo que sigue, permite que el aspecto de banquete quede implícito sin sustituir el término hebreo por una explicación interpretativa. «Gran» conserva el énfasis del adjetivo.
- source_word: הָרֵי יִשְׂרָאֵל
  english_pob_choice: the mountains of Israel
  chosen_spanish: los montes de Israel
  alternatives_spanish:
  - las montañas de Israel
  - los cerros de Israel
  lexicon: HALOT
  rationale: «Montes» es una buena equivalencia bíblica en español y mantiene el tono profético. «Montañas» sería posible, pero «montes» suena más natural en el registro escritural y conserva mejor la fórmula del libro.
- source_word: בָּשָׂר
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - carne humana
  - carne
  lexicon: HALOT
  rationale: En este contexto de juicio, «carne» conserva la crudeza del hebreo y evita la suavización de «carne» como simple alimento cotidiano. No se añade «humana» porque el verso se dirige a aves y bestias, no a personas.
- source_word: דָּם
  english_pob_choice: blood
  chosen_spanish: sangre
  alternatives_spanish:
  - sangre
  lexicon: HALOT
  rationale: Equivalente directo y claro en español. No requiere matiz adicional, porque el contexto de juicio hace patente la imagen.
theological_decisions:
- issue: Tratamiento del nombre divino YHWH en un oráculo con אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor Yahvé
  - el Señor DIOS
  rationale: La pauta del proyecto establece «Yahvé» para יְהוָה. En español, la combinación con אֲדֹנָי no exige duplicar títulos si ello oscurece la fluidez; el discurso profético queda claro como palabra de Dios, y el nombre propio preserva la referencia del original.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: 'Imágenes de banquete de juicio: comer carne y beber sangre'
  english_pob_reading: and you shall eat flesh and drink blood
  chosen_spanish_reading: y comeréis carne y beberéis sangre
  alternative_spanish_readings:
  - y comerán carne y beberán sangre
  - y comeréis carne y beberéis sangre
  rationale: Se conserva la segunda persona plural dirigida a las aves y bestias, coherente con el plural hebreo. La crudeza de la imagen se mantiene sin atenuación, porque forma parte del juicio profético y no debe espiritualizarse.
  doctrine_reference: N/A
- issue: Redundancia deliberada de verbos sacrificiales (זבח / זבח)
  english_pob_reading: my sacrifice that I am sacrificing for you
  chosen_spanish_reading: mi sacrificio que estoy sacrificando para vosotros
  alternative_spanish_readings:
  - mi sacrificio que sacrifico para vosotros
  - mi ofrenda que estoy ofreciendo para vosotros
  rationale: Se preserva la repetición léxica como recurso retórico del hebreo. Cambiar a «ofrenda» o «banquete» diluiría la insistencia cultual del texto.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El texto español sigue la revisión más reciente del audit trail al conservar la formulación plenamente literal de la convocatoria a las aves («ave de toda ala») y la secuencia intensiva de imperativos. También refleja la tensión léxica entre «sacrificio» y la posible lectura de «banquete sacrificial», sin resolverla por paráfrasis.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה de acuerdo con la norma del proyecto.
  - Se preserva el tono profético formal y la segunda persona plural donde el hebreo la exige.
  - Se evita introducir «Cristo», «SEÑOR» o vocabulario eclesiástico no presente en el hebreo.
  - Las imágenes de juicio se mantienen corporales y directas, sin suavización interpretativa.
