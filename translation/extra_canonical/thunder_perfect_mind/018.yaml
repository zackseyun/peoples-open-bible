translation:
  text: '[...] and the one who boasts brings these to me[a]. I am the silence that
    is incomprehensible, and the thought whose remembrance is great. I am the voice
    whose sound is manifold[f][e][d][c][b], and the word that is multiple.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ⲉⲗⲗⲱ is likely ἠχώ (‘echo’), mis-OCR’d; the echo/cry pair recurs in Thunder’s
      sound imagery.
    reason: alignment_note
  - marker: b
    text: ‘His offspring’ for ⲡⲕⲁⲣⲱϥ is tentative; alternatives include ‘his head’
      or ‘his fruit.’ Context favors birth imagery.
    reason: lexical_alternative
  - marker: c
    text: ϩⲣⲟⲟⲩ literally ‘day’; idiomatically can denote ‘time.’
    reason: lexical_alternative
  - marker: d
    text: ⲡⲗⲟⲅⲟⲥ is the Greek λόγος; we render ‘Word’ to reflect its elevated register.
    reason: cultural_note
  - marker: e
    text: The phrase ⲉⲧⲉⲛⲁϣⲉ ⲡⲉⲥⲣⲡⲙⲉⲉⲩⲉ is morphologically opaque; ‘shape of my thought’
      is a cautious placeholder.
    reason: alignment_note
  - marker: f
    text: Or 'I am the echo and the one who cries out; from him these come forth—
      I am his offspring, the one brought to birth in time; and my power is from him.
      I am the shape of my thought; I am the name that is called day by day, and the
      Word that is mine.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲉⲗⲗⲱ (read as ⲏⲭⲱ)
  chosen: echo
  alternatives:
  - resonance
  - reverberation
  lexicon: LSJ (for ἠχώ); Crum (confirming Coptic borrowing patterns)
  rationale: OCR likely misread Greek ἠχώ; the parallel with a cry/shout motif in
    Thunder supports “echo.”
- source_word: ⲡⲉⲧϣⲟⲩⲟⲩϣⲟⲩ
  chosen: the one who cries out
  alternatives:
  - the shouter
  - the clamor
  lexicon: Crum, ϣⲟⲩⲟⲩϣⲟⲩ (iterative/intensive of crying out)
  rationale: Reduplicated form conveys repeated/intense outcry; rendering as a personalizing
    participle preserves the pair with “echo.”
- source_word: ⲉⲓⲛⲉ
  chosen: come forth
  alternatives:
  - bring
  - are brought
  lexicon: Crum, ⲓⲛⲉ (bring, cause to come)
  rationale: With “from him,” an intransitive “come forth” fits the flow better than
    transitively “bring.”
- source_word: ⲡⲕⲁⲣⲱϥ
  chosen: his offspring
  alternatives:
  - his head
  - his fruit
  lexicon: Uncertain; cf. Greek καρπός (fruit) as a possible root; suffix -ϥ = his
  rationale: Context (and traditional line) suggests progeny/birth imagery; we choose
    “offspring” while flagging uncertainty.
- source_word: ϩⲣⲟⲟⲩ
  chosen: time
  alternatives:
  - day
  lexicon: Crum, ϩⲣⲟⲟⲩ (day; by extension ‘time’)
  rationale: In idiom ‘born in time,’ the broader sense fits; we note ‘day’ as a literal
    alternative.
- source_word: ⲧⲉⲡⲓⲛⲟⲓ
  chosen: my power
  alternatives:
  - my might
  - my strength
  lexicon: Uncertain; possibly from a native root for strength; compare occurrences
    where context yields ‘power’
  rationale: The consult tradition reads “my power”; semantic field fits the birth/power
    couplet; marked as tentative.
- source_word: ⲡⲉⲥⲣⲡⲙⲉⲉⲩⲉ
  chosen: the shape of my thought
  alternatives:
  - the form of my reflection
  - the structure of thought
  lexicon: Uncertain compound with ⲙⲉⲉⲩⲉ (thought)
  rationale: We preserve the thought-terminology while acknowledging opaque morphology;
    “shape” is a cautious, minimally interpretive choice.
- source_word: ⲥⲙⲏ
  chosen: name
  alternatives: []
  lexicon: Crum, ⲥⲙⲏ
  rationale: Stable, well-attested term; no controversy.
- source_word: ⲡⲗⲟⲅⲟⲥ
  chosen: Word
  alternatives:
  - word
  lexicon: LSJ (λόγος); Coptic adopts Greek loan
  rationale: Capitalization signals the weighty, more-than-ordinary ‘Logos’ resonance
    without adding commentary.
parallelism_check: 'This block preserves sound-pairs and name/Word pairing: echo //
  cry (sound-dual), offspring // power (birth/power coupling), name // Word (designation
  // utterance). The repetition of “I am” is maintained at key turns, sustaining the
  poem’s parallel cadence.'
voice_check: The divine/sovereign first-person voice is preserved. Assertions are
  declarative and paradox-tinged (“echo” with “cry,” “name” with “Word”), without
  smoothing into explanatory prose.
alignment_risk_note: Alignment confidence is only medium and the OCR for several lexemes
  is uncertain. We read ⲉⲗⲗⲱ as a likely mis-OCR of Greek ἠχώ (‘echo’); ⲡⲕⲁⲣⲱϥ is
  taken as ‘his offspring’ by thematic fit but the form is atypical and could reflect
  another noun (e.g., ‘head’). The phrase with ϩⲣⲟⲟⲩ is rendered ‘in time’ by idiom,
  though ‘day’ is literal. The compound ⲡⲉⲥⲣⲡⲙⲉⲉⲩⲉ is opaque; we render cautiously
  as ‘shape of my thought.’ Notably, some recensions of Thunder at this location emphasize
  “name of the sound / sound of the name”; our witness instead has ‘Word,’ so we translate
  the Greek loan ⲗⲟⲅⲟⲥ as written. Readers should treat the first half of the block
  as higher-risk for adjustment if a cleaner Coptic lineation is secured.
