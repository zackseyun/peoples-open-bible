translation:
  language: es
  text: Y si se halla que la construcción de la casa de Yahvé en Jerusalén fue hecha con la aprobación de Ciro el rey[a], y si parece bien a nuestro señor el rey, que nos haga saber sobre estos asuntos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego dice literalmente: «la construcción del Señor en Jerusalén»; aquí se entiende, por el contexto, «la casa de Yahvé en Jerusalén».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν εὑρίσκηται
  english_pob_choice: if it is found
  chosen_spanish: si se halla
  alternatives_spanish:
  - si se encuentra
  - si se descubre
  - si se determina
  lexicon: BDAG
  rationale: Conserva el valor pasivo-condicional de una averiguación oficial. 'Se halla' es natural en español y mantiene el matiz de constatación documental o judicial.
- source_word: μετὰ τῆς γνώμης
  english_pob_choice: with the approval of
  chosen_spanish: con la aprobación de
  alternatives_spanish:
  - con el consentimiento de
  - según la decisión de
  - por la autorización de
  lexicon: LSJ
  rationale: En este contexto administrativo, γνώμη expresa autorización o aquiescencia oficial. 'Aprobación' comunica bien la autorización real de Ciro sin reducirlo a mera opinión.
- source_word: γενομένην
  english_pob_choice: was done
  chosen_spanish: fue hecha
  alternatives_spanish:
  - se realizó
  - se llevó a cabo
  - se hizo
  lexicon: BDAG
  rationale: El participio indica la realización efectiva de la obra. 'Fue hecha' conserva una forma relativamente formal y cercana al pasivo del griego.
- source_word: τὴν οἰκοδομὴν
  english_pob_choice: the building
  chosen_spanish: la construcción
  alternatives_spanish:
  - la edificación
  - la obra de edificación
  - el edificio
  lexicon: LSJ
  rationale: El sustantivo puede referirse al acto o proyecto de construir. 'La construcción' suena natural y mantiene el carácter de obra en curso o completada.
- source_word: τοῦ κυρίου τοῦ ἐν Ἰερουσαλήμ
  english_pob_choice: the house of the Lord in Jerusalem
  chosen_spanish: la casa de Yahvé en Jerusalén
  alternatives_spanish:
  - el templo de Yahvé en Jerusalén
  - la casa del Señor en Jerusalén
  lexicon: LSJ
  rationale: La nota inglesa indica que el sentido contextual es el santuario/casa de Dios en Jerusalén. Se usa 'Yahvé' conforme al estándar español del proyecto, evitando ocultar el nombre divino detrás de una máscara reverencial.
- source_word: κρίνηται
  english_pob_choice: it seems good
  chosen_spanish: parece bien
  alternatives_spanish:
  - le parece oportuno
  - se juzga bien
  - es juzgado adecuado
  lexicon: BDAG
  rationale: En estilo cortesano y epistolar, el verbo expresa lo que resulta conveniente o aceptable. 'Parece bien' es la equivalencia española más natural y deferente.
- source_word: τῷ κυρίῳ βασιλεῖ ἡμῶν
  english_pob_choice: to our lord the king
  chosen_spanish: a nuestro señor el rey
  alternatives_spanish:
  - a nuestro señor, el rey
  - a nuestro soberano rey
  - a nuestro amo el rey
  lexicon: LSJ
  rationale: κύριος aquí es un título cortesano para el rey persa, no el título divino. 'Señor' reproduce el honorífico sin confundirse con Yahvé, y 'rey' mantiene la relación cortesana.
- source_word: προσφωνησάτω ἡμῖν
  english_pob_choice: let him send us word
  chosen_spanish: que nos envíe respuesta
  alternatives_spanish:
  - que nos informe
  - que nos haga saber
  - que nos responda
  lexicon: LSJ
  rationale: El verbo implica dirigirse a alguien o comunicarse con él; en este contexto, pide una contestación oficial. 'Respuesta' conserva el sentido de réplica formal mejor que una simple 'palabra'.
- source_word: περὶ τούτων
  english_pob_choice: about these matters
  chosen_spanish: sobre estos asuntos
  alternatives_spanish:
  - acerca de estas cosas
  - sobre esto
  - en cuanto a esto
  lexicon: BDAG
  rationale: El plural remite a los puntos bajo examen. 'Asuntos' da un registro administrativo adecuado y evita una literalidad poco natural.
theological_decisions:
- issue: Distinción entre κύριος referido a Dios y κύριος como título real
  english_pob_reading: '''Lord'' for God and ''lord'' for the king, with capitalization distinguishing the divine title from the royal honorific'
  chosen_spanish_reading: '''Yahvé'' para el referente divino y ''señor'' para el título cortesano del rey'
  alternative_spanish_readings:
  - '''Señor'' para ambos casos'
  - '''Señor'' para Dios y ''majestad'' para el rey'
  rationale: 'El texto griego usa κύριος en dos referentes distintos: el Dios de Jerusalén y el rey persa como honorífico. En español del proyecto, Yahvé nombra directamente al referente divino; para el rey, ''señor'' conserva el valor cortesano sin confundirlo con el nombre divino.'
  doctrine_reference: 'DOCTRINE.md: κύριος → Yahvé / señor según referente'
translation_notes:
  revision_awareness: 'El borrador sigue la lectura aprobada en el audit trail inglés y la mantiene con ajuste terminológico al español del proyecto: se conserva la estructura condicional, la referencia administrativa a Ciro y la distinción entre el referente divino y el honorífico real. No se introducen cambios textuales sustantivos respecto del anclaje griego.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el referente divino, conforme al estándar del proyecto.
  - '''Señor'' se reserva para el título cortesano del rey persa, sin mayúscula reverencial para evitar ambigüedad.'
  - '''Respuesta sobre estos asuntos'' sigue el registro administrativo del verso y la decisión inglesa de ''send us word about these matters''.'
