  text: '빌라델비아에 있는 회중의 천사에게 써라. 「거룩하신 분, 참되신 분, 다윗의 열쇠를 가지신 분, 여시면 아무도 닫지 못하고 닫으시면 아무도 열지 못하시는 분[a]께서 이같이 말씀하신다.'
