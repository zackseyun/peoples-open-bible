    issue: «sus hijos» no preserva la especificidad masculina de בָּנָיו
    rationale: El expediente inglés documenta expresamente que el hebreo significa «his sons», no un término neutro. En español, «hijos» puede incluir hijos e hijas; «hijos varones» conserva el contenido semántico sin gran torpeza.
  - severity: low
    issue: Redacción mejorable de la nota al pie
    rationale: 'La formulación «''O: …''» y «marca de asignación» suena poco natural en español bíblico editorial. Conviene normalizar a «O bien: …» y «como indicación de asignación».'
