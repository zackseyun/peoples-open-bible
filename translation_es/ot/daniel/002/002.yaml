    reason: lexical_alternative
  revision_rationale: Se conserva la fidelidad al hebreo y a las decisiones del POB, pero se añade la nota necesaria sobre «caldeos» para preservar la ambigüedad documentada, y se mejora la naturalidad del español cambiando «declararan» por «contarle» y «se pusieron delante» por «estuvieron delante».
