    issue: Calco poco natural en 'daréis redención'
    rationale: Aunque נתן es literalmente 'dar', en español esta combinación no suena idiomática en un contexto legal. 'Concederéis redención' preserva mejor el sentido normativo de proveer/otorgar el derecho o posibilidad de redimir.
  - severity: low
    issue: Ubicación de notas al pie menos precisa
    rationale: La nota sobre 'posesión' debe anclarse en 'posesión', no al final de 'tierra'; y la nota lexical sobre la cláusula verbal conviene anclarla en 'concederéis redención'.
