translation:
  language: es
  text: Si apartas tu pie del sábado, de procurar tu propio placer[c] en mi día santo, y llamas al sábado una delicia, la cosa santa de Yahvé honorable, y lo honras[a] al no seguir tus propios caminos, ni buscar tu propio placer, ni hablar palabra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y lo honras a él», tomando el pronombre como referido a Yahvé más que al sábado.
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «ni hablar palabra»; puede significar abstenerse de habla ordinaria, autocentrada o inútil.'
    reason: lexical_alternative
  - marker: c
    text: «Tu propio placer» también puede significar «tu propio deseo» o, en contexto, «tu propio negocio».
    reason: lexical_alternative
lexical_decisions:
- source_word: תָּשִׁיב
  english_pob_choice: turn back
  chosen_spanish: apartar
  alternatives_spanish:
  - volver atrás
  - hacer retirar
  lexicon: HALOT
  rationale: El hifil de שוב expresa hacer que el pie se retire o vuelva atrás. En español, «apartar tu pie» conserva la imagen concreta sin sonar forzado, y mantiene la idea de abstenerse de pisar o violar el sábado.
- source_word: מִשַּׁבָּת רַגְלֶךָ
  english_pob_choice: your foot from the Sabbath
  chosen_spanish: tu pie del sábado
  alternatives_spanish:
  - tu pie en sábado
  - tu pie del día de reposo
  lexicon: HALOT
  rationale: Se conserva la metáfora del pie y del sábado como objeto de restricción. No se abstrae a una simple conducta general, porque el texto hebreo mantiene la imagen corporal.
- source_word: עֲשׂוֹת חֲפָצֶיךָ
  english_pob_choice: from doing your own pleasure
  chosen_spanish: de hacer tu propio placer
  alternatives_spanish:
  - de hacer lo que te agrada
  - de ocuparte en tus propios asuntos
  lexicon: HALOT
  rationale: חפץ puede significar placer, deseo o asunto según el contexto. Aquí se conserva «placer» para mantener la conexión léxica con el final del versículo y la tensión interpretativa que el contexto permite.
- source_word: בְּיוֹם קָדְשִׁי
  english_pob_choice: on my holy day
  chosen_spanish: en mi día santo
  alternatives_spanish:
  - en el día santo para mí
  - en mi día consagrado
  lexicon: HALOT
  rationale: La construcción posesiva se vierte de manera natural en español como «mi día santo», preservando que el día pertenece a Yahvé.
- source_word: וְקָרָאתָ לַשַּׁבָּת עֹנֶג
  english_pob_choice: call the Sabbath a delight
  chosen_spanish: llamas al sábado delicia
  alternatives_spanish:
  - proclamas al sábado como delicia
  - llamas al sábado una delicia
  lexicon: HALOT
  rationale: La estructura «llamar X Y» se expresa de forma natural con un predicativo sin artículo o con artículo según estilo; «delicia» conserva el valor de עֹנֶג.
- source_word: לִקְדוֹשׁ יְהוָה מְכֻבָּד
  english_pob_choice: the holy thing of Yahweh honorable
  chosen_spanish: al santo de Yahvé honorable
  alternatives_spanish:
  - al santo de Yahvé digno de honra
  - al consagrado de Yahvé honorable
  lexicon: HALOT
  rationale: 'Se preserva el giro condensado del hebreo: «el santo de Yahvé» puede referirse al sábado como cosa/sagrado perteneciente a Yahvé. «Honorable» reproduce מְכֻבָּד sin sustituirlo por un verbo interpretativo.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto para el Tetragrámaton. Esto mantiene el nombre divino explícito y evita la sustitución por un título.
- source_word: וְכִבַּדְתּוֹ
  english_pob_choice: and honor it
  chosen_spanish: y lo honras
  alternatives_spanish:
  - y lo honrarás
  - y le das honra
  lexicon: HALOT
  rationale: El sufijo de 3ms permite referirlo al sábado o al santo/día santo. Se conserva «lo» para mantener la lectura principal del POB de que el antecedente inmediato es el sábado, sin cerrar la alternativa de que el honor recae en Yahvé como referente último.
- source_word: מֵעֲשׂוֹת דְּרָכֶיךָ
  english_pob_choice: by not going your own ways
  chosen_spanish: al no seguir tus propios caminos
  alternatives_spanish:
  - al no andar en tus propios caminos
  - al no hacer tus propios caminos
  lexicon: HALOT
  rationale: «Caminos» en hebreo suele denotar conducta o curso habitual. «Seguir tus propios caminos» suena natural en español y conserva el valor idiomático.
- source_word: מִמְּצוֹא חֶפְצְךָ
  english_pob_choice: nor seeking your own pleasure
  chosen_spanish: ni buscar tu propio placer
  alternatives_spanish:
  - ni buscar tu propio deseo
  - ni atender a tu propio negocio
  lexicon: HALOT
  rationale: מצא con חפץ tiene el matiz de buscar o perseguir lo deseado. Se mantiene «placer» para enlazar con la primera mitad del versículo, dejando abierta la posible lectura de «deseo» o «asuntos».
- source_word: וְדַבֵּר דָּבָר
  english_pob_choice: nor speaking a word
  chosen_spanish: ni hablar palabra
  alternatives_spanish:
  - ni decir palabra
  - ni hablar ninguna palabra
  lexicon: HALOT
  rationale: La frase hebrea es breve y puede indicar abstenerse de habla ordinaria, autocentrada o banal. «Hablar palabra» conserva la concisión literal y la posible carga de limitación del habla sin añadir explicaciones al texto principal.
theological_decisions:
- issue: Referente de וְכִבַּדְתּוֹ
  english_pob_reading: The pronoun refers to the Sabbath/holy day, yielding 'honor it.'
  chosen_spanish_reading: El pronombre se mantiene como «lo», con antecedente principal el sábado / el santo de Yahvé.
  alternative_spanish_readings:
  - honrarlo como referencia al día santo
  - honrar a Yahvé como referente del pronombre
  rationale: 'El flujo inmediato del versículo se concentra en el sábado: apartar el pie del sábado, llamarlo delicia, considerarlo honorable y luego honrarlo. Por eso la lectura principal en español conserva el referente cercano sin eliminar la posibilidad gramatical de que el honor termine dirigido a Yahvé.'
  doctrine_reference: Preservar la tensión textual donde la sintaxis permite más de una referencia.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB inglés que cambió «the holy day of the LORD honorable» a «the holy thing of Yahweh honorable» para reflejar con más precisión לִקְדוֹשׁ יְהוָה. La versión española conserva esa estructura condensada con «al santo de Yahvé honorable», sin reducirla a una paráfrasis explicativa.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se preservó «sábado» en lugar de «día de reposo» para coherencia con el contexto del POB en español y con la imagen concreta del texto.
  - Se conservó la tensión entre la referencia al sábado y la posible referencia última a Yahvé en el pronombre final.
  - Se evitó cambiar עֹנֶג y חֶפֶץ a formulaciones abstractas, para mantener la relación interna entre «delicia/placer/deseo».
