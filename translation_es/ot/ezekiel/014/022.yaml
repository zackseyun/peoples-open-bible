base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/014/022.yaml
  text: Yet behold[a], a remnant will be left in it—those brought out, sons and daughters. Behold, they are coming out to you, and you will see their way and their deeds; and you will be comforted concerning the disaster that I brought upon Jerusalem[c][b], all that I brought upon it.
  footnotes:
