- from: He aquí[a], yo estoy edificando una casa para el nombre de Yahvé mi Dios, para consagrarla a él, para quemar incienso aromático delante de él, y para poner el arreglo continuo, y holocaustos por la mañana y por la tarde, en los sábados, en las lunas nuevas[b], y en las fiestas señaladas de Yahvé nuestro Dios[c]. Esto es para siempre sobre Israel.
  to: He aquí, yo construyo una casa[a] para el nombre de Yahvé mi Dios, para consagrarla a él, para quemar incienso aromático delante de él, y para poner la disposición continua[b], y holocaustos por la mañana y por la tarde, en los sábados, en las lunas nuevas, y en las fiestas señaladas de Yahvé nuestro Dios. Esto es para siempre para Israel[c].
