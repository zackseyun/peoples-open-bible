translation:
  language: es
  text: Sin embargo[a], no habrá entre ti ningún pobre, porque Yahvé ciertamente te bendecirá en la tierra que Yahvé tu Dios te da como herencia para poseerla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «No obstante» o «Excepto que» al comienzo del versículo; אֶפֶס introduce una cualificación respecto de la instrucción precedente.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶפֶס
  english_pob_choice: However
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - No obstante
  - Pero
  - Con todo
  lexicon: HALOT
  rationale: אֶפֶס introduce una restricción o transición respecto de la instrucción anterior. «Sin embargo» comunica bien esa función discursiva en español natural, sin volverlo una oposición más fuerte de la que el hebreo exige.
- source_word: אֶבְיוֹן
  english_pob_choice: poor
  chosen_spanish: pobre
  alternatives_spanish:
  - necesitado
  - menesteroso
  - desvalido
  lexicon: HALOT
  rationale: El término señala a alguien en pobreza o necesidad económica. «Pobre» es la equivalencia más natural y amplia en español actual.
- source_word: בָרֵךְ יְבָרֶכְךָ
  english_pob_choice: will surely bless you
  chosen_spanish: ciertamente los bendecirá
  alternatives_spanish:
  - sin duda los bendecirá
  - los bendecirá de veras
  - los bendecirá ciertamente
  lexicon: HALOT
  rationale: La combinación infinitivo absoluto + verbo finito intensifica la acción. «Ciertamente» conserva ese énfasis sin añadir una matización interpretativa excesiva.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se traduce en español con la forma adoptada por defecto del proyecto, «Yahvé», para preservar el nombre divino y no sustituirlo por un título.
- source_word: נֹתֵן
  english_pob_choice: is giving
  chosen_spanish: les da
  alternatives_spanish:
  - está dando
  - les está dando
  - les entrega
  lexicon: HALOT
  rationale: El participio expresa una acción característica o en curso. En este contexto jurídico-promisorio, «les da» suena natural en español y mantiene la idea de concesión actual/presente del don de la tierra.
- source_word: נַחֲלָה
  english_pob_choice: inheritance
  chosen_spanish: en heredad
  alternatives_spanish:
  - como herencia
  - como posesión heredada
  - como patrimonio
  lexicon: HALOT
  rationale: נַחֲלָה es un término de asignación territorial-covenantal. «En heredad» conserva el valor técnico y bíblico de herencia de tierra; en español puede sonar más tradicional, pero aquí comunica con precisión el matiz legal-teológico.
- source_word: לְרִשְׁתָּהּ
  english_pob_choice: to possess
  chosen_spanish: para poseerla
  alternatives_spanish:
  - para tomar posesión de ella
  - para heredarla
  - para ocuparla
  lexicon: HALOT
  rationale: ירשׁ denota entrar en posesión de la tierra. «Para poseerla» refleja el verbo con concisión; mantiene la relación con «heredad» y evita sobreexplicar.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa directamente el nombre propio divino. La política del proyecto es no ocultarlo tras «SEÑOR», por lo que se preserva como «Yahvé» en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Relación entre la bendición divina y la ausencia de pobreza
  english_pob_reading: there should be no poor among you, because Yahweh will surely bless you
  chosen_spanish_reading: no habrá entre ustedes ningún pobre, porque Yahvé ciertamente los bendecirá
  alternative_spanish_readings:
  - no habrá ningún pobre en medio de ustedes, porque Yahvé los bendecirá con seguridad
  - no se hallará entre ustedes ningún pobre, porque Yahvé los bendecirá de seguro
  rationale: El hebreo vincula la ausencia de pobres con la bendición concedida por Yahvé. Mantener la causalidad explícita con «porque» preserva la lógica del versículo sin suavizarla ni moralizarla.
  doctrine_reference: N/A
