- from: Así, los hijos de Israel quitaron los Baales y las Astartes[a], y sirvieron a Yahvé solo.
  to: Así, los hijos de Israel quitaron los Baales y las Astarot[a], y sirvieron solamente a Yahvé.
  rationale: Se cambia «Astartes» por «Astarot» para seguir más fielmente la decisión documentada de conservar el nombre cultual específico en su forma plural hebrea. También se ajusta «sirvieron a Yahvé solo» a «sirvieron solamente a Yahvé» para una expresión más natural y claramente exclusiva en español, sin alterar el sentido. La nota se mantiene, adaptada a la redacción revisada.
