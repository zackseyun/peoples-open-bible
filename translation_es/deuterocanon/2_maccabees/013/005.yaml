translation:
  language: es
  text: Ahora bien, en aquel lugar había una torre de cincuenta codos de altura[a], llena de cenizas, y tenía por todo su alrededor un ingenio circular que descendía abruptamente hacia dentro de las cenizas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un dispositivo circular» o «un mecanismo redondo». El término griego para el aparato es inespecífico, y el adjetivo puede destacar más su forma redonda que su movimiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: πύργος
  english_pob_choice: tower
  chosen_spanish: torre
  alternatives_spanish:
  - torrecilla
  lexicon: LSJ
  rationale: πύργος denota de manera ordinaria una torre o estructura tipo torre. «Torre» es el equivalente natural en español y conserva el sentido descriptivo del contexto.
- source_word: πεντήκοντα πήχεων
  english_pob_choice: fifty cubits high
  chosen_spanish: de cincuenta codos de altura
  alternatives_spanish:
  - de cincuenta codos
  lexicon: LSJ
  rationale: πήχυς corresponde al codo como unidad antigua de longitud. En español, añadir «de altura» hace explícita la medida dimensional del torreón y suena natural sin alterar el contenido.
- source_word: πλήρης σποδοῦ
  english_pob_choice: full of ashes
  chosen_spanish: llena de ceniza
  alternatives_spanish:
  - llena de cenizas
  - repleta de ceniza
  lexicon: LSJ
  rationale: σποδός es ceniza. El singular colectivo «ceniza» funciona bien en español para una masa de residuo; se conserva la imagen de llenura sin forzar pluralización.
- source_word: ὄργανον
  english_pob_choice: contrivance
  chosen_spanish: ingenio
  alternatives_spanish:
  - dispositivo
  - mecanismo
  - artefacto
  lexicon: LSJ
  rationale: ὄργανον es amplio y no especifica con precisión el aparato. «Ingenio» mantiene la idea de un aparato construido o mecanismo sin definirlo en exceso, de modo similar a la cautela del texto inglés.
- source_word: περιφερές
  english_pob_choice: circular
  chosen_spanish: circular
  alternatives_spanish:
  - redondo
  - de forma circular
  lexicon: LSJ
  rationale: El adjetivo describe la forma del aparato. «Circular» es exacto, claro y idiomático en español.
- source_word: πάντοθεν
  english_pob_choice: all around it
  chosen_spanish: alrededor
  alternatives_spanish:
  - por todos lados
  - todo alrededor de él
  lexicon: LSJ
  rationale: El adverbio indica una disposición envolvente. «Alrededor» expresa bien esa relación espacial en español, y el pronombre ya queda implícito por el contexto.
- source_word: ἀπόκρημνον
  english_pob_choice: sloping steeply down
  chosen_spanish: que descendía abruptamente
  alternatives_spanish:
  - empinado
  - de caída abrupta
  - que bajaba escarpadamente
  lexicon: LSJ
  rationale: El término comunica una caída pronunciada o abrupta. En español, «que descendía abruptamente» transmite el efecto físico con claridad y evita una traducción demasiado técnica o dura.
- source_word: εἰς τὴν σποδόν
  english_pob_choice: into the ashes
  chosen_spanish: hacia la ceniza
  alternatives_spanish:
  - en la ceniza
  - hasta la ceniza
  lexicon: LSJ
  rationale: εἰς normalmente indica movimiento hacia o dentro de. Aquí, «hacia la ceniza» preserva el movimiento descendente descrito por el griego y armoniza con el verbo anterior; el contexto permite entender la dirección culminando en la ceniza.
theological_decisions:
- issue: No hay un término teológico directo; se trata de una descripción material de un aparato de ejecución.
  english_pob_reading: The English POB renders the apparatus cautiously as a 'contrivance,' noting lexical uncertainty rather than overdefining the device.
  chosen_spanish_reading: Se mantiene la cautela con «ingenio» para no imponer una identificación técnica que el griego no especifica.
  alternative_spanish_readings:
  - dispositivo
  - mecanismo
  - artefacto
  rationale: La fidelidad aquí consiste en preservar la indeterminación del instrumento. No se introduce vocabulario interpretativo que vaya más allá del texto fuente.
  doctrine_reference: Principio de sobriedad descriptiva; no aplica una doctrina específica.
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requirieron cambios y que el texto base quedó sin modificaciones; por eso la propuesta española sigue de cerca la cautela léxica del audit trail inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» no aplica aquí, pues el versículo no contiene el nombre divino.
  - Se conservó la unidad antigua «codos» para πήχεων por transparencia y correspondencia histórica.
  - «Ceniza» se dejó en singular colectivo para sonar natural en español sin perder el sentido del genitivo griego.
  - Se eligió «ingenio» como equivalente funcionalmente prudente de ὄργανον, manteniendo la ambigüedad documentada.
