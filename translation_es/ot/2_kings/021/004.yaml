translation:
  language: es
  text: 'Él edificó altares en la casa de Yahvé[a], de la cual Yahvé había dicho[b]: «En Jerusalén pondré mi nombre».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en el templo de Yahvé». Literalmente, «en la casa de Yahvé».'
    reason: lexical_alternative
  - marker: b
    text: La frase «pondré mi nombre» es lenguaje de pacto y templo para el lugar que Yahvé elige asociar con su nombre y su presencia.
    reason: theological_note
lexical_decisions:
- source_word: וּ/בָנָה
  english_pob_choice: He built
  chosen_spanish: Él edificó
  alternatives_spanish:
  - Y edificó
  - Él construyó
  lexicon: HALOT
  rationale: El wayyiqtol narra acción consecutiva; en español, 'edificó' comunica con naturalidad el acto de levantar estructuras cultuales y mantiene un registro digno. Se evita añadir la conjunción inicial para no volver la frase mecánica.
- source_word: מִזְבְּחֹת
  english_pob_choice: altars
  chosen_spanish: altares
  alternatives_spanish:
  - altare[s]
  - altar(es)
  lexicon: HALOT
  rationale: Es el plural directo y normal de מִזְבֵּחַ. 'Altares' conserva el sentido sacrificial sin necesidad de explicación adicional.
- source_word: בְּ/בֵית יְהוָה
  english_pob_choice: in the house of Yahweh
  chosen_spanish: en la casa de Yahvé
  alternatives_spanish:
  - en el templo de Yahvé
  - en la casa del SEÑOR
  lexicon: HALOT
  rationale: Se mantiene la imagen hebrea de 'casa' en vez de sustituirla por 'templo', porque el texto fuente dice literalmente 'casa de YHWH'. 'Yahvé' preserva el nombre divino según la norma del proyecto.
- source_word: אֲשֶׁר אָמַר יְהוָה
  english_pob_choice: of which Yahweh had said
  chosen_spanish: de la cual Yahvé había dicho
  alternatives_spanish:
  - de la que Yahvé había dicho
  - acerca de la cual Yahvé había dicho
  lexicon: HALOT
  rationale: La relativa modifica 'la casa de Yahvé'; 'de la cual' es idiomático en español y conserva la relación referencial. El pluscuamperfecto refleja una palabra previa de Yahvé anterior a la acción narrada.
- source_word: בִּ/ירוּשָׁלַם
  english_pob_choice: In Jerusalem
  chosen_spanish: En Jerusalén
  alternatives_spanish:
  - En la ciudad de Jerusalén
  lexicon: HALOT
  rationale: La preposición local se expresa de forma directa y natural. Se conserva el topónimo sin expansión interpretativa.
- source_word: אָשִׂים אֶת שְׁמִי
  english_pob_choice: I will put my name
  chosen_spanish: pondré mi nombre
  alternatives_spanish:
  - colocaré mi nombre
  - estableceré mi nombre
  lexicon: HALOT
  rationale: '''Poner mi nombre'' reproduce con fidelidad la idiomática hebrea de presencia/pacto sin paraphrasearla. En español, ''pondré mi nombre'' es claro y conserva la tensión teológica del dicho divino.'
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: Se sigue la norma del proyecto de transliterar el Tetragrámaton como 'Yahvé', preservando el nombre personal del Dios de Israel y evitando la sustitución litúrgica por 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Idioma del templo y la frase 'poner mi nombre'
  english_pob_reading: Retain the idiom 'put my name' without interpretive expansion
  chosen_spanish_reading: Mantener 'pondré mi nombre' sin expansión interpretativa
  alternative_spanish_readings:
  - haré habitar mi presencia
  - estableceré mi presencia allí
  rationale: La frase es lenguaje de pacto y templo, pero el hebreo usa una formulación sobria. Se conserva la expresión literal para no diluir ni resolver la tensión teológica en una paráfrasis explicativa.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requirieron cambios; este borrador sigue de cerca el texto hebreo y el audit trail inglés, manteniendo las decisiones ya validadas sobre casa/templo, el nombre divino y la expresión 'poner mi nombre'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera uniforme para יהוה.
  - Se conserva 'casa' en lugar de 'templo' en el cuerpo principal, con nota alternativa.
  - Se mantiene el paralelismo narrativo y el pluscuamperfecto para la acción previa.
  - La puntuación española usa comillas angulares para el discurso directo.
