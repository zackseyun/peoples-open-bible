  rationale: Se corrige el español para hacerlo más natural («dispérsalos»), se reubica la nota al verbo final, y se ajusta la alternativa léxica para reflejar fielmente el valor de המם documentado en el POB inglés. También se mejora la formulación inicial para expresar con naturalidad el imperativo verbal hebreo con su objeto explícito en español.
