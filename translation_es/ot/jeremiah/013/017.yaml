  text: וְ/אִם֙ לֹ֣א תִשְׁמָע֔וּ/הָ בְּ/מִסְתָּרִ֥ים תִּבְכֶּֽה נַפְשִׁ֖/י מִ/פְּנֵ֣י גֵוָ֑ה וְ/דָמֹ֨עַ תִּדְמַ֜ע וְ/תֵרַ֤ד עֵינִ/י֙ דִּמְעָ֔ה כִּ֥י נִשְׁבָּ֖ה עֵ֥דֶר יְהוָֽה־׃ס
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/013/017.yaml
  text: But if you will not listen[a], my soul will weep in secret because of pride; my eyes will weep bitterly and run down with tears[e][d][c][b], because the flock of Yahweh has been taken captive.
  footnotes:
  - marker: a
    text: Or 'hear it' or 'obey it'; the Hebrew verb can carry both the sense of hearing and heeding.
    reason: lexical_alternative
  - marker: b
