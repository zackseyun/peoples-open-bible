review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido básico del hebreo: fórmula profética, rechazo de ''esta palabra'', confianza en medios injustos y apoyo en ese objeto singular. Sin embargo, la nota [b] no preserva fielmente las alternativas auditadas en inglés: repite ''perversidad'' como si fuera alternativa, introduce ''deviousidad'', que no es español natural, y pierde la correspondencia con ''crookedness/deviousness''.'
  spanish_quality_summary: El texto principal es claro y digno. 'Por tanto', 'así dice', 'el Santo de Israel', 'han rechazado', y 'se han apoyado en ello' son lecturas naturales y fieles. La única reparación necesaria está en la redacción de la nota [b], para mejorar español y precisión léxica.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'el Santo de Israel' y 'opresión' son apropiados; aquí no intervienen Yahvé/Mesías/Espíritu ni otros términos sensibles del glosario. 'Perversidad' es aceptable para נָלוֹז en esta revisión.
  issues:
  - severity: medium
    issue: La nota [b] contiene una alternativa española no natural ('deviousidad') y una formulación internamente inconsistente.
    rationale: La auditoría inglesa ofrece alternativas como 'extortion' y 'deviousness'/'crookedness'. En español, 'deviousidad' no es forma estándar, y la nota actual dice 'perversidad o deviousidad para lo torcido', repitiendo el término principal como si fuera alternativa y debilitando el valor explicativo.
  revised_spanish_text: 'Por tanto, así dice el Santo de Israel: Porque ustedes han rechazado esta palabra[a], y han confiado en opresión y perversidad[b], y se han apoyado en ello.'
  revised_footnotes:
  - marker: a
    text: O 'este mensaje' o 'este asunto'.
    reason: lexical_alternative
  - marker: b
    text: O 'extorsión' para 'opresión', y 'deviousidad' no; mejor 'torcedura', 'desviación' o 'lo torcido' para el segundo término.
    reason: lexical_alternative
  revision_rationale: Se conserva intacto el texto principal, pero se corrige la nota [b] porque su español actual no es natural ni fiel a las alternativas auditadas. La revisión elimina la alternativa defectuosa y ofrece opciones comprensibles que preservan el campo semántico de נָלוֹז.
