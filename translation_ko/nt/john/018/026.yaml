  text: '대제사장의 종들 가운데 한 사람, 곧 베드로가 귀를 자른 자의 친척인 사람이 말하였습니다. 「내가 동산에서 그와 함께 있는 당신을 보지 않았소?」'
  philosophy: optimal-equivalence
  footnotes:
