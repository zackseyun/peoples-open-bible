base_translation:
  language: en
  yaml_path: translation/ot/joshua/016/001.yaml
  text: And the lot came out for the sons of Joseph from the Jordan at Jericho[a], to the waters of Jericho on the east, through the wilderness[b], going up from Jericho into the hill country of Bethel.
  footnotes:
  - marker: a
    text: Or 'the lot fell for the sons of Joseph.' The Hebrew verb is literally 'came out,' but in allotment contexts English often uses 'fell.'
    reason: lexical_alternative
  - marker: b
    text: '''The waters of Jericho'' may refer specifically to Jericho''s spring or water source.'
    reason: cultural_note
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
