review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el contraste del hebreo: «Pero él» capta el adversativo de וְהוּא, «no piensa así» y «su corazón no…» preservan el paralelismo, y «no pocas naciones» mantiene correctamente la litotes de לֹא מְעָט. Sin embargo, dos giros no son del todo fieles al valor del texto: «su corazón no lo considera así» introduce un objeto «lo» que no está explícito en hebreo y suena algo forzado; y «cortar de raíz» intensifica e interpreta לְהַכְרִית más allá del más sobrio «cortar»/«eliminar»/«extirpar», cuando la línea inglesa documenta «cut off» precisamente para no sobreespecificar el modo.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «su corazón no lo considera así» resulta menos natural que «su corazón no piensa así» o «no lo calcula así», y «está destruir» es gramaticalmente poco idiomático; conviene «su corazón está puesto en destruir» o más literalmente «en su corazón está destruir». La revisión propuesta mejora naturalidad y precisión sin alejarse del hebreo.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Corazón» preserva adecuadamente לֵבָב. «Naciones» corresponde bien a גּוֹיִם. La nota sobre «no intenta así» está bien justificada. La nota [b] debe anclarse a «no pocas», no a «destruir», porque explica la litotes hebrea לֹא מְעָט.
  issues:
  - severity: medium
    issue: La nota [b] está anclada en «destruir» pero explica «no pocas».
    rationale: Los marcadores deben aparecer en la palabra o frase relevante. Aquí la nota trata la litotes de לֹא מְעָט, por lo que debe ir junto a «no pocas».
  - severity: medium
    issue: «cortar de raíz» sobretraduce לְהַכְרִית.
    rationale: El hebreo/POB busca conservar «cut off» sin especificar de más el modo o grado. «Cortar de raíz» añade una imagen interpretativa no explicitada en el texto.
  - severity: low
    issue: «su corazón no lo considera así» es algo forzado y añade un objeto no explícito.
    rationale: Aunque comprensible, el giro suena menos natural en español y menos ceñido al paralelismo del hebreo que una formulación como «su corazón no piensa así».
  - severity: low
    issue: «porque en su corazón está destruir» no es idiomático en español.
    rationale: Se entiende la intención de calcar la construcción hebrea, pero en español requiere ajuste para legibilidad, por ejemplo «su corazón está puesto en destruir».
  revised_spanish_text: Pero él no piensa así[a], y su corazón no piensa así; porque su corazón está puesto en destruir, y en eliminar a no pocas[b] naciones.
  revised_footnotes:
  - marker: a
    text: O «no intenta así»; el verbo hebreo puede expresar concebir o proponerse algo.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «no pocas», litotes que significa una gran cantidad.
    reason: lexical_alternative
  revision_rationale: 'Se corrigen cuatro puntos menores pero importantes: se hace más natural el segundo miembro paralelo, se reemplaza el giro poco idiomático «está destruir», se evita la sobreinterpretación de «cortar de raíz» con «eliminar», y se mueve la nota de litotes a la frase correcta «no pocas».'
