  text: וַ/יֹּאמְר֣וּ אֵלָ֡י/ו הִנֵּה נָ֣א יֵֽשׁ אֶת עֲבָדֶי/ךָ֩ חֲמִשִּׁ֨ים אֲנָשִׁ֜ים בְּנֵֽי חַ֗יִל יֵ֣לְכוּ נָא֮ וִ/יבַקְשׁ֣וּ אֶת אֲדֹנֶי/ךָ֒ פֶּן נְשָׂא/וֹ֙ ר֣וּחַ יְהוָ֔ה וַ/יַּשְׁלִכֵ֨/הוּ֙ בְּ/אַחַ֣ד הֶ/הָרִ֔ים א֖וֹ בְּ/אַחַ֣ת ה/גיאות וַ/יֹּ֖אמֶר לֹ֥א תִשְׁלָֽחוּ־־־־־־׃
