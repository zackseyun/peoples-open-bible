translation:
  language: es
  text: Él derrama desprecio sobre los nobles, y afloja[a] el cinturón de los fuertes[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'afloja el cinturón'; la imagen sugiere quitar firmeza, preparación o autoridad.
    reason: cultural_note
  - marker: b
    text: O 'los poderosos' o 'los valientes' para 'los fuertes'.
    reason: lexical_alternative
lexical_decisions:
- source_word: שׁוֹפֵךְ
  english_pob_choice: pours
  chosen_spanish: derrama
  alternatives_spanish:
  - vierte
  - pone por tierra
  lexicon: HALOT
  rationale: El participio expresa una acción vívida de derramar o verter. En español, "derrama" conserva la imagen concreta y suena natural con "desprecio" como objeto.
- source_word: בּוּז
  english_pob_choice: contempt
  chosen_spanish: desprecio
  alternatives_spanish:
  - contempto
  - desdén
  lexicon: HALOT
  rationale: בּוּז denota desprecio o desdén. "Desprecio" es claro en español bíblico moderno y mantiene la fuerza de humillación pública.
- source_word: נְדִיבִים
  english_pob_choice: nobles
  chosen_spanish: los nobles
  alternatives_spanish:
  - los príncipes
  - los poderosos
  lexicon: HALOT
  rationale: En este contexto de inversión social, el término apunta a personas de alto rango. "Los nobles" conserva la amplitud y evita restringir innecesariamente a una monarquía.
- source_word: מְזִיחַ
  english_pob_choice: belt
  chosen_spanish: cinturón
  alternatives_spanish:
  - ceñidor
  - faja
  lexicon: HALOT
  rationale: El sustantivo se entiende tradicionalmente como cinturón o banda ceñidora. "Cinturón" es comprensible para lectores modernos y preserva la imagen corporal concreta.
- source_word: אֲפִיקִים
  english_pob_choice: the strong
  chosen_spanish: los fuertes
  alternatives_spanish:
  - los poderosos
  - los valientes
  lexicon: HALOT
  rationale: Aquí el término funciona metafóricamente para personas con poder o vigor. "Los fuertes" sigue de cerca la lectura inglesa y mantiene el paralelismo con "los nobles".
- source_word: רִפָּה
  english_pob_choice: loosens
  chosen_spanish: afloja
  alternatives_spanish:
  - suelta
  - relaja
  lexicon: HALOT
  rationale: רפה expresa aflojar o dejar flojo. "Afloja" reproduce bien la imagen de quitar firmeza o preparación mediante el cinturón.
theological_decisions:
- issue: Imagen metafórica de humillación y despojamiento de poder
  english_pob_reading: Preserve the concrete image of loosening the belt of the strong rather than explaining it as 'disarms the mighty' in the main text.
  chosen_spanish_reading: Preservar la imagen concreta de aflojar el cinturón de los fuertes en vez de explicarla como 'desarma a los poderosos' en el texto principal.
  alternative_spanish_readings:
  - desarma a los poderosos
  - les quita la fuerza
  rationale: El verso usa lenguaje poético concreto para describir la reversión de estatus y poder. Mantener la metáfora evita añadir una interpretación más estrecha y conserva la fuerza literaria del pasaje.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: El texto sigue la revisión más reciente sin cambios sustantivos; se mantiene la concordancia alta con el control cruzado y se ajusta la anotación para anclar cada nota al término correspondiente en español.
  spanish_consistency_notes:
  - Se usa 'Yahvé' por norma del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se conserva 'los nobles' y 'los fuertes' para mantener el paralelismo y la restricción semántica del hebreo.
  - Las notas están ancladas en el texto con [a] y [b] para cumplir la validación y evitar notas sueltas.
