translation:
  language: es
  text: 'Y él dijo a los hombres de Sucot: «Por favor, den hogazas de pan al pueblo que está conmigo[a], porque están fatigados, y yo voy persiguiendo a Zébah y Zalmuná, los reyes de Madián.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «el pueblo que está a mis pies», un modismo para los que lo acompañan o siguen.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְאַנְשֵׁי סֻכּוֹת
  english_pob_choice: to the men of Succoth
  chosen_spanish: a los hombres de Sucot
  alternatives_spanish:
  - a los varones de Sucot
  - a la gente de Sucot
  lexicon: HALOT
  rationale: אַנְשֵׁי marca un plural masculino concreto; "hombres" conserva ese valor mejor que una opción genérica. Se mantiene el topónimo Sucot transliterado en forma española breve.
- source_word: תְּנוּ נָא
  english_pob_choice: Please give
  chosen_spanish: Por favor, den
  alternatives_spanish:
  - Den, por favor
  - Les ruego que den
  lexicon: HALOT
  rationale: La partícula נָא añade ruego o insistencia; "por favor" transmite bien esa petición sin volverla demasiado formal o arcaica.
- source_word: כִּכְּר֣וֹת לֶ֔חֶם
  english_pob_choice: loaves of bread
  chosen_spanish: panes de pan
  alternatives_spanish:
  - hogazas de pan
  - tortas de pan
  lexicon: HALOT
  rationale: כִּכָּר alude a una pieza redonda o torta de pan. En español, "panes de pan" es menos elegante pero refleja con claridad la unidad alimenticia pedida; se evita añadir un matiz no documentado como "hogazas" si pudiera sugerir un formato más específico.
- source_word: לָעָם אֲשֶׁר בְּרַגְלָי
  english_pob_choice: to the people who are with me
  chosen_spanish: al pueblo que está conmigo
  alternatives_spanish:
  - al pueblo que va conmigo
  - al pueblo que sigue conmigo
  lexicon: HALOT
  rationale: El hebreo usa un giro idiomático que literalmente dice "a mis pies", pero el audit trail inglés ya lo aclaró como "who are with me". En español se conserva el sentido idiomático de acompañamiento con una formulación natural y fiel.
- source_word: עֲיֵפִים
  english_pob_choice: weary
  chosen_spanish: fatigados
  alternatives_spanish:
  - cansados
  - agotados
  lexicon: HALOT
  rationale: El término expresa cansancio por esfuerzo. "Fatigados" suena digno y preciso; "agotados" podría intensificar más de lo que exige el contexto.
- source_word: רֹדֵף אַחֲרֵי
  english_pob_choice: am pursuing
  chosen_spanish: yo sigo tras
  alternatives_spanish:
  - yo persigo
  - voy persiguiendo
  lexicon: HALOT
  rationale: El participio indica acción en curso. "Sigo tras" conserva la idea dinámica de persecución y suena natural en español narrativo sin perder fuerza.
- source_word: זֶבַח וְצַלְמֻנָּע
  english_pob_choice: Zebah and Zalmunna
  chosen_spanish: Zébah y Zalmuná
  alternatives_spanish:
  - Zebah y Zalmunna
  - Zebá y Zalmuná
  lexicon: HALOT
  rationale: Se transliteran los nombres propios al español. Se adapta la acentuación gráfica para lectura natural; no se intenta traducir ni normalizar más allá de lo necesario.
- source_word: מַלְכֵ֥י מִדְיָֽן
  english_pob_choice: the kings of Midian
  chosen_spanish: los reyes de Madián
  alternatives_spanish:
  - los reyes de Midian
  - los reyes midianitas
  lexicon: HALOT
  rationale: La construcción hebrea se vierte de manera directa como "los reyes de Madián". Se prefiere el topónimo españolizado Madián en continuidad bíblica y por claridad eclesial.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada del inglés POB que prefirió "who are with me" sobre la traducción más literal "who are at my feet" por naturalidad y precisión contextual. La versión española refleja esa decisión sin perder la base idiomática hebrea documentada.
  spanish_consistency_notes:
  - Se mantuvo Sucot con forma breve y Madián como topónimo españolizado coherente con uso bíblico.
  - Se evitó "SEÑOR" porque el versículo no contiene el nombre divino ni una cita directa del tetragrámaton.
  - La nota al pie preserva la imagen literal del hebreo sin introducirla innecesariamente en el flujo principal.
  - Los nombres propios se presentaron en forma española consistente y reconocible para lectores bíblicos en español.
