revisions:
- from: Cuando los que estaban del lado del rey[a] hablaban insultantemente[b], salió tu ángel y abatió a ciento ochenta y cinco mil de entre ellos.
  to: Cuando los que venían de parte del rey[a] proferían insultos[b], salió tu ángel y abatió a ciento ochenta y cinco mil de entre ellos.[c]
  rationale: Se ajusta la referencia a los agentes del rey para evitar la sobreinterpretación de «del lado del rey», y se sustituye una expresión española poco natural por otra más idiomática que conserva la amplitud semántica del griego. También se restaura la nota de alusión histórica presente en la POB inglesa.
