translation:
  language: es
  text: Mi amado ha descendido a su huerto, a los canteros de especias, para pastar[a] en los jardines y para recoger lirios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «apacentar» o «alimentarse». El verbo hebreo puede expresar pastar, apacentar o alimentar, y quizá conserva deliberadamente esa ambigüedad pastoral.
    reason: lexical_alternative
  - marker: b
    text: La flor exacta a la que se refiere el hebreo puede ser incierta; tradicionalmente, «lirios».
    reason: lexical_alternative
lexical_decisions:
- source_word: דּוֹדִי
  english_pob_choice: My beloved
  chosen_spanish: Mi amado
  alternatives_spanish:
  - Mi amado
  - Mi amado mío
  - Mi amante
  lexicon: HALOT
  rationale: דּוֹד en Cantar de los Cantares designa al amado de la mujer. «Mi amado» conserva la relación afectiva sin introducir en español la ambigüedad moderna de «amante», y sigue de cerca la solución auditada del POB en inglés.
- source_word: יָרַד
  english_pob_choice: has gone down
  chosen_spanish: ha descendido
  alternatives_spanish:
  - ha bajado
  - descendió
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una acción completada. «Ha descendido» mantiene el matiz direccional de ירד y resulta natural en español literario; «ha bajado» sería también posible, pero algo menos solemne.
- source_word: לְגַנּוֹ
  english_pob_choice: to his garden
  chosen_spanish: a su huerto
  alternatives_spanish:
  - a su jardín
  - a su huerto
  lexicon: HALOT
  rationale: Aunque el inglés POB usa «garden», en español «huerto» puede reflejar mejor el espacio cultivado y productivo sugerido por el contexto agrícola-poético, sin perder el sentido de propiedad indicado por el sufijo posesivo. «Jardín» es una alternativa legítima, pero aquí «huerto» evita una resonancia demasiado ornamental.
- source_word: לַעֲרוּגוֹת הַבֹּשֶׂם
  english_pob_choice: to the beds of spices
  chosen_spanish: a los parterres de especias
  alternatives_spanish:
  - a los canteros de especias
  - a los parterres de aromas
  lexicon: HALOT
  rationale: עֲרוּגוֹת denota camas o franjas cultivadas; en español, «parterres» comunica bien la idea de áreas dispuestas para cultivo ornamental o aromático. «Especias» mantiene el valor de בֹּשֶׂם como sustancia fragante; «aromas» suaviza demasiado el sustantivo y pierde concreción.
- source_word: לִרְעוֹת
  english_pob_choice: to graze
  chosen_spanish: para pastar
  alternatives_spanish:
  - para apacentar
  - para alimentar(se)
  lexicon: HALOT
  rationale: רעה puede significar pastar, apacentar o alimentar. «Para pastar» preserva la ambigüedad pastoral del hebreo y sigue el criterio del POB de no decidir excesivamente entre ‘alimentar’ y ‘apacentar’.
- source_word: בַּגַּנִּים
  english_pob_choice: in the gardens
  chosen_spanish: en los jardines
  alternatives_spanish:
  - en los jardines
  - entre los jardines
  lexicon: HALOT
  rationale: El plural se conserva en español para reflejar la variación poética del hebreo. «En los jardines» es la correspondencia más directa y natural para בַּגַּנִּים.
- source_word: וְלִלְקֹט
  english_pob_choice: and to gather
  chosen_spanish: y para recoger
  alternatives_spanish:
  - y para juntar
  - y para coger
  lexicon: HALOT
  rationale: לקט significa recoger o reunir. «Para recoger» suena natural en español y funciona bien con objetos florales; además mantiene el paralelo con la acción anterior sin volverla demasiado técnica.
- source_word: שׁוֹשַׁנִּים
  english_pob_choice: lilies
  chosen_spanish: lirios
  alternatives_spanish:
  - lirios
  - azucenas
  lexicon: HALOT
  rationale: La identificación exacta de שׁוֹשַׁנִּים es incierta, pero la traducción tradicional y más amplia en español es «lirios». Se evita «azucenas» por ser más restrictivo y estilísticamente marcado.
theological_decisions:
- issue: Metáfora pastoral de רעה aplicada al amado
  english_pob_reading: The Hebrew verb can denote grazing or feeding and may intentionally preserve pastoral ambiguity.
  chosen_spanish_reading: «Para pastar» conserva la ambigüedad pastoral sin precisar si el amado se alimenta, apacienta o actúa simbólicamente entre los jardines.
  alternative_spanish_readings:
  - para apacentar
  - para alimentar(se)
  rationale: En poesía del Cantar conviene no cerrar el campo semántico del verbo. La ambigüedad es parte del efecto literario y no debe resolverse artificialmente en una sola dirección.
  doctrine_reference: Cantar de los Cantares 6:2; principio de conservación de ambigüedad poética
- issue: Referencia de los «jardines» y los «parterres de especias»
  english_pob_reading: The English preserves both singular and plural garden imagery.
  chosen_spanish_reading: 'Se mantiene la progresión de singular posesivo a plural: «su huerto» / «los jardines».'
  alternative_spanish_readings:
  - su jardín / los jardines
  - su huerto / entre los jardines
  rationale: La alternancia singular/plural parece deliberada en el hebreo y en el POB inglés; no debe armonizarse. En español, esta variación se conserva para respetar la textura poética del verso.
  doctrine_reference: Cantar de los Cantares 6:2; principio de consistencia literaria
translation_notes:
  revision_awareness: El análisis auditado en inglés se mantiene en alto acuerdo y no requirió cambios sustantivos; esta propuesta conserva la ambigüedad de רעה, la variación singular/plural de «garden/gardens» y la incertidumbre léxica de שׁוֹשַׁנִּים, adaptándolas a un español natural y publicable.
  spanish_consistency_notes:
  - Se usa «Mi amado» como término relacional estándar en el Cantar, coherente con el POB inglés.
  - Se prefirió «huerto» en el primer hemistiquio para reflejar un espacio cultivado; la nota permite la alternativa «jardín» si se busca una lectura más literal.
  - «Lirios» se mantiene por tradición y claridad, sin afirmar una identificación botánica cerrada.
  - No se introdujo capitalización teológica innecesaria, porque el verso no contiene referencias directas al nombre divino.
