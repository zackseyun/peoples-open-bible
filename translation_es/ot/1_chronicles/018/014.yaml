  glossary_alignment: No hay conflictos con la terminología del proyecto. «Justicia y rectitud» sigue la decisión auditada de preservar dos términos distintos para מִשְׁפָּט וּצְדָקָה. No aparecen términos sensibles del glosario mayor como Yahvé, Mesías o esclavo.
