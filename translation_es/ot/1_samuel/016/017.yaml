translation:
  language: es
  text: 'Entonces Saúl dijo a sus siervos[a]: «Por favor, busquen para mí un hombre que sepa tocar bien, y tráiganmelo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «un hombre que está haciendo bien al tocar»; es decir, un hombre hábil para tocar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Así que ... dijo
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración; «Entonces» comunica bien la secuencia en español sin volver mecánica la coordinación.
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus siervos
  alternatives_spanish:
  - sus servidores
  - sus criados
  lexicon: HALOT
  rationale: «Siervos» conserva cercanía con el hebreo עֶבֶד y funciona en un contexto de corte real sin desplazar el sentido hacia un vocabulario demasiado doméstico.
- source_word: רְאוּ נָא
  english_pob_choice: Please find
  chosen_spanish: Por favor, busquen
  alternatives_spanish:
  - Vean ahora
  - Por favor, vean
  lexicon: HALOT
  rationale: El imperativo plural con נָא es una petición cortés. En español, el valor idiomático se expresa naturalmente con «Por favor, busquen»; «ver» aquí tiene sentido de buscar/identificar.
- source_word: לִי
  english_pob_choice: for me
  chosen_spanish: para mí
  alternatives_spanish:
  - a mí
  lexicon: HALOT
  rationale: 'La preposición marca beneficio o interés personal: Saúl pide que lo consigan para su uso, no meramente que le informen.'
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: HALOT
  rationale: El hebreo es masculino singular y el contexto mantiene esa referencia; «un hombre» preserva la precisión léxica que el POB inglés también conservó.
- source_word: מֵיטִיב לְנַגֵּן
  english_pob_choice: who can play well
  chosen_spanish: que sepa tocar bien
  alternatives_spanish:
  - que toque bien
  - que sea hábil para tocar
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «hace bien al tocar» y describe competencia musical. «Que sepa tocar bien» transmite la capacidad/habilidad implícita con naturalidad en español sin especificar instrumento.
- source_word: וַהֲבִיאוֹתֶם אֵלַי
  english_pob_choice: and bring him to me
  chosen_spanish: y tráiganmelo
  alternatives_spanish:
  - y llévenlo a mí
  - y tráiganlo a mí
  lexicon: HALOT
  rationale: El plural imperativo dirige la orden a varios destinatarios; «tráiganmelo» suena natural en español y conserva el destinatario indirecto «a mí» dentro del pronombre enclítico.
translation_notes:
  revision_awareness: Se siguió el pasaje hebreo de 1 Samuel 16:17 junto con el audit trail en inglés. La revisión inglesa más reciente ajustó «who plays well» a «who can play well» para reflejar con más naturalidad el infinitivo hebreo de לְנַגֵּן; en español se reflejó esa misma idea con «que sepa tocar bien», manteniendo el sentido de habilidad sin añadir contenido ajeno al texto.
  spanish_consistency_notes:
  - Se usó «Yahvé» no porque aparezca en este versículo, sino como criterio general del proyecto cuando el texto lo requiera; aquí no fue necesario.
  - Se evitó «señor» para עֶבֶד/עֲבָדָיו, porque el hebreo apunta a siervos de corte y el contexto no exige una traducción honorífica.
  - La orden plural se mantuvo con «busquen» y «tráiganmelo», coherente con el hebreo plural y con el inglés POB.
