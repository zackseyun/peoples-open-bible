translation:
  language: es
  text: Una cosa vil[a] se derrama sobre él; y ahora que yace, no volverá a levantarse.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Una cosa malvada se fija en él», o «Se ha puesto sobre él una acusación malvada». La expresión hebrea es difícil y puede referirse tanto a una aflicción maligna como a una acusación destructiva.'
    reason: alternative_reading
lexical_decisions:
- source_word: דְּבַר
  english_pob_choice: thing
  chosen_spanish: cosa
  alternatives_spanish:
  - cosa
  - asunto
  - materia
  lexicon: HALOT
  rationale: La combinación con בְּלִיַּעַל forma una expresión compacta y difícil. «Cosa» conserva la generalidad del inglés POB «thing» sin forzar el sentido hacia «palabra», que aquí sería menos natural y podría estrechar indebidamente el hebreo.
- source_word: בְּלִיַּעַל
  english_pob_choice: wicked
  chosen_spanish: malvada
  alternatives_spanish:
  - malvada
  - perversa
  - vil
  - maligna
  lexicon: HALOT
  rationale: En este contexto no parece funcionar como nombre propio, sino como cualidad moral o destructiva. «Malvada» mantiene el valor ético fuerte del término y es natural en español bíblico moderno.
- source_word: דְּבַר בְּלִיַּעַל
  english_pob_choice: a wicked thing
  chosen_spanish: una cosa malvada
  alternatives_spanish:
  - una cosa vil
  - una materia malvada
  - un asunto perverso
  - una acusación malvada
  lexicon: HALOT
  rationale: La frase es deliberadamente ambigua en hebreo y puede aludir tanto a una condición destructiva como a una acusación ruin. «Una cosa malvada» preserva esa amplitud sin decidir prematuramente entre enfermedad, calamidad o denuncia.
- source_word: יָצוּק
  english_pob_choice: is poured out
  chosen_spanish: se derrama
  alternatives_spanish:
  - se vierte
  - es derramado
  - se echa
  lexicon: HALOT
  rationale: El pasivo comunica bien la imagen de algo que cae o se descarga sobre alguien. «Se derrama» conserva la metáfora de descenso/vertido con naturalidad en español.
- source_word: בּוֹ
  english_pob_choice: upon him
  chosen_spanish: sobre él
  alternatives_spanish:
  - encima de él
  - sobre él
  - en él
  lexicon: HALOT
  rationale: Con el verbo pasivo, el español idiomático prefiere una preposición de carga o incidencia. «Sobre él» reproduce el golpe de la imagen sin introducir una localización interna indebida.
- source_word: וַאֲשֶׁר
  english_pob_choice: now that
  chosen_spanish: y al
  alternatives_spanish:
  - y cuando
  - y el que
  - y ahora que
  lexicon: HALOT
  rationale: La construcción introduce la situación consecuente del verso. «Y al» conecta de manera fluida con el infinitivo español y mantiene el valor temporal de la cláusula sin sobre-explicarla.
- source_word: שָׁכַב
  english_pob_choice: he lies down
  chosen_spanish: al acostarse
  alternatives_spanish:
  - cuando se acuesta
  - al yacer
  - cuando yace
  lexicon: HALOT
  rationale: El verbo significa literalmente «acostarse / yacer». Aquí se mantiene la imagen física de quedar tendido sin decidir si se trata de postración, enfermedad o muerte.
- source_word: לֹא יוֹסִיף לָקוּם
  english_pob_choice: he will rise no more
  chosen_spanish: no volverá a levantarse
  alternatives_spanish:
  - no se levantará más
  - no volverá a levantarse
  - no se alzará de nuevo
  lexicon: HALOT
  rationale: La expresión idiomática apunta a incapacidad para recuperarse o levantarse de nuevo. «No volverá a levantarse» suena grave y natural en español, preservando la fuerza del hebreo.
theological_decisions:
- issue: Ambigüedad entre acusación ruin y aflicción devastadora
  english_pob_reading: The line is rendered to preserve ambiguity between a malicious accusation/curse and a debilitating affliction pronounced upon the sufferer.
  chosen_spanish_reading: La línea se traduce de modo que permanezca la ambigüedad entre una acusación ruin/dañina y una aflicción devastadora impuesta sobre el sujeto.
  alternative_spanish_readings:
  - Una enfermedad maligna se derrama sobre él
  - Una acusación perversa ha sido puesta sobre él
  rationale: El hebreo es comprimido y debatido, y el audit trail inglés evita resolver la imagen en una sola dirección. La redacción española conserva esa tensión interpretativa sin imponer una lectura doctrinal o narrativa que el texto no exige.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: 'El rastreo de revisión indica que no hubo cambios posteriores: la última pasada de revisión quedó sin modificaciones y con alto acuerdo entre revisores. Por eso la redacción española sigue de cerca la decisión inglesa de mantener la ambigüedad léxica y teológica.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque este verso no contiene el tetragrámaton ni una cita directa del nombre divino.
  - Se usa «Yahvé» solo cuando el hebreo lo exige; aquí no aparece.
  - Se evita «Cristo» porque no hay lenguaje mesiánico en este versículo.
  - Se mantiene la ambigüedad de דְּבַר בְּלִיַּעַל en vez de resolverla como enfermedad o como acusación exclusivamente.
  - «Levantarse» conserva mejor el valor idiomático de קוּם que una paráfrasis como «recuperarse», aunque esta última sea una posible implicación contextual.
