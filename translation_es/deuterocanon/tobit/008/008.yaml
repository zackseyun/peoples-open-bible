lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y entonces
  - Entonces
  lexicon: BDAG
  rationale: La conjunción simplemente conecta la acción con el contexto inmediato; en español, «Y» conserva esa continuidad narrativa sin añadir matiz no presente en el griego.
- source_word: εἶπεν
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  lexicon: BDAG
  rationale: El aoristo de λέγω se vierte con el pasado simple natural «dijo», que expresa de forma directa la acción de hablar en narración.
- source_word: μετʼ αὐτοῦ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto con él
  - en unión con él
  lexicon: BDAG
  rationale: La preposición μετά con genitivo expresa acompañamiento o asociación; «con él» comunica de manera breve y fiel que ella se unió a la respuesta.
- source_word: Ἀμήν
  english_pob_choice: Amen
  chosen_spanish: Amén
  alternatives_spanish:
  - Amén
  lexicon: BDAG
  rationale: Se conserva la forma litúrgica transliterada, ya asentada en español bíblico, porque funciona como aclamación fija y no como un lexema ordinario.
translation_notes:
  revision_awareness: 'El texto griego es breve y el expediente inglés muestra acuerdo alto sin cambios. Se mantuvo la misma decisión básica del audit trail: traducir μετʼ αὐτοῦ con valor de acompañamiento y conservar «Amén» como fórmula fija.'
  spanish_consistency_notes:
  - Se usó «Amén» en transliteración, no «así sea», por coherencia con el valor litúrgico fijo del término.
  - Se evitó «señor» u otra adaptación innecesaria porque el versículo no contiene términos teológicos de ese tipo.
  - La estructura breve del español sigue la concisión del original griego.
