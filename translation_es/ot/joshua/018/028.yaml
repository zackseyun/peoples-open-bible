    reason: textual_variant
  revision_rationale: 'La revisión hace ajustes menores para alinear mejor el español con el audit trail del POB y mejorar la consistencia editorial: se restituye ''Haeleph'', se afina la puntuación de la lista y se mantiene de forma uniforme la nota sobre ''Kiriat''. El resto del borrador conserva adecuadamente el sentido del hebreo y las decisiones léxicas documentadas.'
