translation:
  language: es
  text: En sus días, Hiel de Betel reconstruyó Jericó[a]. A costa de Abiram, su primogénito, puso sus cimientos, y a costa de Segub, su hijo menor, erigió sus puertas[b], conforme a la palabra de Yahvé que había hablado por medio de Josué hijo de Nun.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «construyó Jericó». «Reconstruyó» refleja que Jericó había sido destruida previamente.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «en/con Abiram, su primogénito... y en/con Segub, su hijo menor». El sentido es que la obra se llevó a cabo a costa de Abiram y Segub, en cumplimiento de Josué 6:26.
    reason: alternative_reading
lexical_decisions:
- source_word: בְּיָמָיו
  english_pob_choice: In his days
  chosen_spanish: En sus días
  alternatives_spanish:
  - En su tiempo
  - Durante su reinado
  lexicon: HALOT
  rationale: La expresión hebrea es una fórmula temporal idiomática. «En sus días» conserva la cadencia del original y su sentido de período de gobierno, sin volverla más explicativa de lo que exige el texto.
- source_word: בָּנָה
  english_pob_choice: rebuilt
  chosen_spanish: reedificó
  alternatives_spanish:
  - construyó
  - reconstruyó
  lexicon: HALOT
  rationale: El verbo básico significa «construir», pero el contexto de Jericó implica una restauración de una ciudad previamente destruida. «Reedificó» comunica ese matiz sin alejarse del hebreo.
- source_word: חִיאֵל בֵּית הָאֱלִי
  english_pob_choice: Hiel of Bethel
  chosen_spanish: Hiel de Betel
  alternatives_spanish:
  - Hiel el betelita
  - Hiel, de Betel
  lexicon: HALOT
  rationale: La construcción gentilicia indica procedencia o asociación con Betel. «De Betel» es claro y natural en español, y mantiene la misma relación de origen que el inglés POB.
- source_word: בַּאֲבִירָם בְּכֹרוֹ
  english_pob_choice: At the cost of Abiram his firstborn
  chosen_spanish: A costa de Abiram, su primogénito
  alternatives_spanish:
  - Con Abiram, su primogénito
  - En Abiram, su primogénito
  lexicon: HALOT
  rationale: La preposición hebrea tiene un valor instrumental/circunstancial en la fórmula de maldición cumplida. «A costa de» expresa el costo humano implicado en la obra y evita la literalidad opaca de «con» o «en».
- source_word: יִסְּדָהּ
  english_pob_choice: he laid its foundation
  chosen_spanish: puso sus cimientos
  alternatives_spanish:
  - echó sus cimientos
  - fundó la ciudad
  lexicon: HALOT
  rationale: El verbo יסד, en lenguaje de edificación, apunta a poner los fundamentos. «Puso sus cimientos» es natural en español y conserva la imagen arquitectónica.
- source_word: וּבִשְׂגוּב צְעִירוֹ
  english_pob_choice: and at the cost of Segub his youngest
  chosen_spanish: y a costa de Segub, su hijo menor
  alternatives_spanish:
  - y con Segub, su hijo menor
  - y en Segub, su hijo menor
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con la frase anterior. «Hijo menor» recoge el valor familiar de צעיר y «a costa de» expresa el mismo sentido de pérdida que en la primera hemistiquio.
- source_word: הִצִּיב דְּלָתֶיהָ
  english_pob_choice: he set up its gates
  chosen_spanish: levantó sus puertas
  alternatives_spanish:
  - colocó sus puertas
  - instaló sus portones
  lexicon: HALOT
  rationale: En contexto de ciudad, דלת puede referirse a puertas o portones. «Levantó sus puertas» suena natural en español y conserva la imagen de completar la obra urbana; evita una traducción demasiado técnica o extraña.
- source_word: כִּדְבַר יְהוָה
  english_pob_choice: according to the word of Yahweh
  chosen_spanish: conforme a la palabra de Yahvé
  alternatives_spanish:
  - según la palabra de Yahvé
  - de acuerdo con la palabra de Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino «Yahvé» conforme a la política del proyecto, sin masking por «SEÑOR». «Conforme a» refleja bien la fórmula normativa del hebreo.
- source_word: אֲשֶׁר דִּבֶּר בְּיַד
  english_pob_choice: that he had spoken through
  chosen_spanish: que había hablado por medio de
  alternatives_spanish:
  - que había hablado por
  - que había dicho por medio de
  lexicon: HALOT
  rationale: La expresión ביד es una fórmula de mediación profética. «Por medio de» es la forma española más clara para expresar agencia sin añadir interpretación extra.
- source_word: יְהוֹשֻׁעַ בִּן נוּן
  english_pob_choice: Joshua son of Nun
  chosen_spanish: Josué hijo de Nun
  alternatives_spanish:
  - Josué, hijo de Nun
  - Josué, el hijo de Nun
  lexicon: HALOT
  rationale: Es la forma española estándar del patronímico, directa y plenamente inteligible.
theological_decisions:
- issue: Sentido de la construcción «a costa de» en el cumplimiento de la palabra de Yahvé
  english_pob_reading: The verse states that Hiel rebuilt Jericho with the loss of his firstborn and youngest sons, fulfilling the LORD's word spoken through Joshua.
  chosen_spanish_reading: El versículo presenta la reedificación de Jericó como realizada al precio de la pérdida de sus dos hijos, en cumplimiento de la palabra de Yahvé pronunciada por Josué.
  alternative_spanish_readings:
  - El versículo podría leerse de modo más literal como que Hiel construyó Jericó mientras Abiram y Segub estaban vivos.
  - 'Podría traducirse de manera más mecánica: «con Abiram... y con Segub...», sin explicitar el costo humano.'
  rationale: La formulación hebrea y el eco de Josué 6:26 favorecen entender una maldición cumplida por la muerte de los hijos. «A costa de» comunica esa relación sin introducir detalles no dichos explícitamente por el versículo.
  doctrine_reference: Preservar la tensión narrativa y la intertextualidad con Josué 6:26; no suavizar el juicio divino implícito.
translation_notes:
  revision_awareness: 'La versión inglesa auditada mantiene la lectura de equivalencia óptima y no registró revisiones posteriores: el sentido de ''rebuilt'', la procedencia ''of Bethel'' y la fórmula de costo en la maldición se conservaron sin cambios relevantes.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יהוה.
  - Se mantiene «Josué hijo de Nun» como forma estándar y natural en español.
  - «Reedificó» y «levantó» conservan la imaginería de construcción sin volver el texto rígido.
  - La construcción «a costa de» se usa de forma paralela en ambos hemistiquios para reflejar el paralelismo hebreo.
