translation:
  language: es
  text: Y haré de la coja[a] un remanente, y de la desterrada[b] una nación fuerte; Yahvé reinará sobre ellos en el monte Sion, desde ahora y para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘la lisiada’. El hebreo puede referirse a una persona impedida para andar; se conserva el singular personificado para reflejar la imagen profética del pueblo afligido.
    reason: lexical_alternative
  - marker: b
    text: O ‘la expulsada’ o ‘la arrojada fuera’. El término hebreo puede indicar a quien ha sido removida o apartada; ‘desterrada’ resalta mejor el trasfondo de exilio.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׂמְתִּי
  english_pob_choice: And I will make
  chosen_spanish: Y haré
  alternatives_spanish:
  - Y pondré
  - Y estableceré
  lexicon: HALOT
  rationale: 'En esta construcción con לְ, el verbo expresa un cambio de estado: no solo ‘poner’, sino ‘hacer de’ algo. ‘Haré’ comunica bien la fuerza resultativa en español sin volverlo mecánico.'
- source_word: הַצֹּלֵעָה
  english_pob_choice: the lame
  chosen_spanish: la coja
  alternatives_spanish:
  - la que cojea
  - la lisiada
  lexicon: HALOT
  rationale: El hebreo usa una forma femenina singular que personifica al pueblo afligido. ‘La coja’ conserva esa forma singular y el campo semántico de cojear/lisiarse sin ampliar indebidamente el sentido.
- source_word: לִשְׁאֵרִית
  english_pob_choice: a remnant
  chosen_spanish: un remanente
  alternatives_spanish:
  - un resto
  - un remanente del pueblo
  lexicon: HALOT
  rationale: ‘Remanente’ es el término profético más preciso y transparente en español para שְׁאֵרִית. Mantiene el valor técnico de ‘lo que queda’ después del juicio.
- source_word: הַנַּהֲלָאָה
  english_pob_choice: the outcast
  chosen_spanish: la expulsada
  alternatives_spanish:
  - la desterrada
  - la alejada
  lexicon: HALOT
  rationale: La POB inglesa decidió preservar la idea de alguien apartado o arrojado fuera, en vez de suavizarla. ‘Expulsada’ conserva esa fuerza de exclusión/exilio y evita connotaciones eclesiásticas de ‘marginada’.
- source_word: לְגוֹי עָצוּם
  english_pob_choice: a strong nation
  chosen_spanish: una nación fuerte
  alternatives_spanish:
  - una nación poderosa
  - un pueblo fuerte
  lexicon: HALOT
  rationale: ‘Nación’ refleja גּוֹי en su sentido corporativo-político. ‘Fuerte’ comunica עָצוּם de manera natural en español y mantiene la imagen de vigor colectivo.
- source_word: וּמָלַךְ יְהוָה
  english_pob_choice: and Yahweh will reign
  chosen_spanish: Yahvé reinará
  alternatives_spanish:
  - Yahvé será rey
  - Yahvé gobernará como rey
  lexicon: HALOT
  rationale: El verbo מלך expresa reinar/ser rey. ‘Reinará’ es la forma más directa y digna en español. Se mantiene ‘Yahvé’ conforme a la terminología POB para el Tetragrama.
- source_word: עֲלֵיהֶם
  english_pob_choice: over them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - sobre ellos mismos
  - sobre su pueblo
  lexicon: HALOT
  rationale: Con מלך, עַל indica dominio regio. ‘Sobre ellos’ reproduce esa relación de gobierno sin sobreexplicar el sujeto colectivo.
- source_word: בְּהַר צִיּוֹן
  english_pob_choice: on Mount Zion
  chosen_spanish: en el monte Sion
  alternatives_spanish:
  - sobre el monte Sion
  - en el monte de Sion
  lexicon: HALOT
  rationale: ‘En el monte Sion’ es una forma natural y reverente en español, fiel al sentido locativo del hebreo. ‘Sion’ sigue la forma castellana habitual del nombre propio.
- source_word: מֵעַתָּה וְעַד עוֹלָם
  english_pob_choice: from now on and forever
  chosen_spanish: desde ahora y para siempre
  alternatives_spanish:
  - desde este momento y para siempre
  - desde ahora y hasta la eternidad
  lexicon: HALOT
  rationale: La fórmula expresa duración futura sin límite. ‘Desde ahora y para siempre’ es idiomática en español y conserva la doble idea de inicio inmediato y permanencia perpetua.
theological_decisions:
- issue: Mantener la personificación singular de los restaurados
  english_pob_reading: Retain singular expressions ('the lame,' 'the outcast') while allowing them to represent the restored community.
  chosen_spanish_reading: Mantener singulares personificados ('la coja,' 'la expulsada') como figura del pueblo restaurado.
  alternative_spanish_readings:
  - 'Convertir a plurales: ''las cojas ... las expulsadas'''
  - 'Explicitar colectivamente: ''el pueblo lisiado ... el pueblo expulsado'''
  rationale: El hebreo usa singular femenino; no conviene borrar esa tensión poética y profética. El singular conserva mejor la imagen de una comunidad tratada como una sola figura representativa, sin impedir que se entienda colectivamente.
  doctrine_reference: Optimal equivalence; preservar la tensión literaria y teológica del texto.
- issue: Nombre divino en el texto principal
  english_pob_reading: Yahweh will reign
  chosen_spanish_reading: Yahvé reinará
  alternative_spanish_readings:
  - el SEÑOR reinará
  - el Señor reinará
  rationale: La línea editorial POB para el Tetragrama es transliterar el nombre divino. ‘Yahvé’ evita la sustitución por un título y mantiene la referencia directa al nombre revelado.
  doctrine_reference: Doctrina POB sobre el Tetragrama; fidelidad onomástica.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el paquete fuente hebreo y la línea auditada en inglés: conserva la personificación singular, traduce el Tetragrama como ‘Yahvé’, y refleja la revisión inglesa que prefirió un término más natural para la idea de exclusión/exilio. También ajusta la fórmula temporal a un español más fluido (''desde ahora y para siempre'') sin perder la duración indefinida del hebreo.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ para יְהוָה, conforme al estándar POB en español.
  - Se mantiene ‘remanente’ como término profético estable.
  - ‘Monte Sion’ sigue la forma natural y ampliamente entendible en español bíblico.
  - No se neutralizó la fuerza de exclusión de הַנַּהֲלָאָה; se la dejó como ‘expulsada’ por fidelidad semántica.
  - Las notas a y b reflejan alternativas verdaderas del hebreo, no glosas devocionales.
