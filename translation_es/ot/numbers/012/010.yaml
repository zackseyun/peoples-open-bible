translation:
  language: es
  text: Y la nube se apartó de sobre la tienda[a], y he aquí que Miriam estaba leprosa, como la nieve. Entonces Aarón se volvió hacia Miriam, y he aquí que estaba leprosa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El término hebreo traducido aquí como 'leprosa' puede referirse de manera más amplia a una grave afección de la piel o impureza ritual, no necesariamente a la lepra entendida en la medicina moderna (enfermedad de Hansen).
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶעָנָן
  english_pob_choice: the cloud
  chosen_spanish: la nube
  alternatives_spanish:
  - la nube de la presencia
  - la nube divina
  lexicon: HALOT
  rationale: El sustantivo con artículo se refiere a la nube visible asociada a la presencia de Yahvé. 'La nube' es la forma natural y fiel en español; las ampliaciones explicativas quedan para nota si fueran necesarias.
- source_word: סָר
  english_pob_choice: departed
  chosen_spanish: se apartó
  alternatives_spanish:
  - departió
  - se retiró
  - se alejó
  lexicon: HALOT
  rationale: El verbo expresa que la nube se movió desde su posición sobre la tienda. 'Se apartó' comunica bien la retirada física sin sonar forzado en español.
- source_word: מֵעַל הָאֹהֶל
  english_pob_choice: from over the tent
  chosen_spanish: de sobre la tienda
  alternatives_spanish:
  - de encima de la tienda
  - de sobre el tabernáculo
  - de encima del tabernáculo
  lexicon: HALOT
  rationale: מֵעַל indica alejamiento desde una posición superior. 'Tienda' mantiene el hebreo inmediato; 'tabernáculo' sería más interpretativo que el dato textual inmediato.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y he aquí
  lexicon: HALOT
  rationale: La partícula introduce una escena vívida y sorpresiva. 'Y he aquí' preserva mejor ese valor enfático en un registro bíblico claro para español.
- source_word: מְצֹרַעַת
  english_pob_choice: leprous
  chosen_spanish: leprosa
  alternatives_spanish:
  - afectada por una afección cutánea
  - afligida por una enfermedad de la piel
  - leprosa
  lexicon: HALOT
  rationale: La traducción tradicional breve conserva el paralelismo narrativo. El término hebreo puede abarcar una afección cutánea más amplia que la lepra médica moderna; esa amplitud se explica en nota sin debilitar el texto principal.
- source_word: כַּשָּׁלֶג
  english_pob_choice: like snow
  chosen_spanish: como la nieve
  alternatives_spanish:
  - como nieve
  - blanca como la nieve
  lexicon: HALOT
  rationale: La comparación literal es con 'la nieve'. En español, 'como la nieve' suena natural y mantiene la imagen de blancura sin añadir un matiz no explicitado por el hebreo.
- source_word: וַיִּפֶן
  english_pob_choice: turned toward
  chosen_spanish: se volvió hacia
  alternatives_spanish:
  - giró hacia
  - se volvió a
  lexicon: HALOT
  rationale: El verbo expresa un giro corporal o una orientación de la mirada. 'Se volvió hacia' reproduce ese movimiento con claridad y sin sobreinterpretarlo.
- source_word: אֶל מִרְיָם
  english_pob_choice: toward Miriam
  chosen_spanish: hacia Miriam
  alternatives_spanish:
  - a Miriam
  - para Miriam
  lexicon: HALOT
  rationale: La preposición marca dirección. 'Hacia Miriam' conserva el valor direccional antes de constatar su condición.
- source_word: וְהִנֵּה מְצֹרָעַת
  english_pob_choice: and behold, she was leprous
  chosen_spanish: y he aquí que estaba leprosa
  alternatives_spanish:
  - y he aquí que Miriam estaba leprosa
  - y he aquí, leprosa
  lexicon: HALOT
  rationale: La repetición del estado enfatiza la gravedad de la condición. El hebreo omite el nombre en la segunda mención; en español el pronombre 'estaba' sostiene la referencia previa sin perder la fuerza de la repetición.
theological_decisions:
- issue: ¿'nube' o una referencia explícita a la presencia de Yahvé?
  english_pob_reading: the cloud departed from over the tent
  chosen_spanish_reading: la nube se apartó de sobre la tienda
  alternative_spanish_readings:
  - la nube de la presencia se apartó de sobre la tienda
  - la nube de Yahvé se apartó de sobre la tienda
  rationale: El texto hebreo solo menciona 'la nube'. Aunque el contexto narrativo apunta a la presencia divina, la traducción principal no debe expandir el referente más allá de lo que el verso afirma de manera explícita.
  doctrine_reference: Éxodo 40; Números 9
- issue: ¿Cómo traducir מְצֹרַעַת sin reducirlo a lepra médica moderna?
  english_pob_reading: leprous
  chosen_spanish_reading: leprosa
  alternative_spanish_readings:
  - afectada por una afección cutánea
  - con una impureza de la piel
  - contagiada de lepra
  rationale: Se conserva el término tradicional breve por fidelidad narrativa y porque el auditorio bíblico reconoce esa designación. La nota explica que el hebreo puede abarcar una afección ritual o cutánea más amplia que la lepra moderna.
  doctrine_reference: Levítico 13–14
translation_notes:
  revision_awareness: 'Se mantuvo la estructura narrativa del texto fuente y el paralelismo de la doble aparición de וְהִנֵּה / ''y he aquí''. La redacción española sigue de cerca la lectura inglesa auditada, pero prioriza el hebreo en los puntos léxicos decisivos: nube, retirada, direccionalidad de פנה, y el alcance semántico de מְצֹרַעַת. No se detectaron revisiones previas que obligaran a cambiar la solución.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' según la norma del proyecto, pero este versículo no contiene el nombre divino explícito; por eso no aparece en el texto principal.
  - Se mantiene 'tienda' para reflejar אֹהֶל sin ampliar a 'tabernáculo', ya que el contexto inmediato basta para la identificación.
  - Se conserva 'leprosa' como término narrativo tradicional con nota explicativa para respetar la tensión lexical del hebreo.
  - La partícula enfática se vierte de manera uniforme como 'y he aquí' en ambas apariciones.
