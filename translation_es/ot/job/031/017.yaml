translation:
  language: es
  text: si comí mi bocado yo solo, y el huérfano[a] no comió de este—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el que no tiene padre». El hebreo literalmente se refiere a alguien sin padre.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֹכַל
  english_pob_choice: if I ate
  chosen_spanish: si yo comía
  alternatives_spanish:
  - si comía
  - y comía
  - cuando comía
  lexicon: HALOT
  rationale: El hebreo encabeza una cláusula de juramento condicional. En español, 'si yo comía' comunica esa prótasis de manera natural y conserva el valor aspectual del imperfectivo sin forzar un pretérito puntual.
- source_word: פִּתִּי
  english_pob_choice: my morsel
  chosen_spanish: mi bocado
  alternatives_spanish:
  - mi pedazo de pan
  - mi comida
  lexicon: HALOT
  rationale: '''Bocado'' preserva la idea concreta de una porción pequeña de alimento, cercana a ''morsel'', sin especificar ''pan'' cuando el hebreo no lo hace.'
- source_word: לְבַדִּי
  english_pob_choice: by myself
  chosen_spanish: solo
  alternatives_spanish:
  - por mí mismo
  - a solas
  lexicon: HALOT
  rationale: '''Solo'' es la forma más natural en español con el verbo comer y conserva la idea de consumo aislado.'
- source_word: וְלֹא
  english_pob_choice: and ... did not
  chosen_spanish: y ... no
  alternatives_spanish:
  - ni ...
  - y no ...
  lexicon: HALOT
  rationale: La coordinación negativa del hebreo se refleja con 'y ... no' en una oración condicional en español, manteniendo la estructura paralela del verso.
- source_word: אָכַל
  english_pob_choice: did not eat
  chosen_spanish: comía
  alternatives_spanish:
  - comió
  - ha comido
  lexicon: HALOT
  rationale: Dentro de la fórmula de juramento, el imperfectivo español funciona mejor que un pretérito cerrado; así se mantiene la generalidad de la cláusula sin endurecerla temporalmente.
- source_word: יָתוֹם
  english_pob_choice: the fatherless
  chosen_spanish: el huérfano
  alternatives_spanish:
  - el desamparado sin padre
  - el padreless
  lexicon: HALOT
  rationale: Aunque el hebreo significa literalmente 'el privado de padre', en español 'huérfano' es la equivalencia más clara y sobria. La alternativa 'el padreless' no es idiomática; 'desamparado sin padre' sería explicativa en exceso.
- source_word: מִמֶּנָּה
  english_pob_choice: from it
  chosen_spanish: de él
  alternatives_spanish:
  - de eso
  - de ella
  lexicon: HALOT
  rationale: El sufijo femenino remite al bocado, pero en español 'él' puede concordar con 'bocado' si se entiende de forma implícita; aun así, en registro natural resulta preferible 'de él' para enlazar con el sustantivo implícito del alimento. Si se quisiera mayor literalidad morfológica, 'de ella' sería posible pero menos idiomático.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el audit trail inglés: mantiene la forma condicional de juramento, conserva el sentido concreto de פִּתִּי como porción pequeña de alimento y refleja יָתוֹם con un equivalente natural en español. Se evita traducir mecánicamente el sufijo de מִמֶּנָּה; en lugar de eso, se opta por una referencia fluida al alimento ya mencionado.'
  spanish_consistency_notes:
  - Se usa 'huérfano' como equivalente idiomático de יָתוֹם, sin perder la referencia al hijo privado de padre.
  - Se mantiene el guion largo final para corresponder al cierre incompleto del verso en el hebreo y en el inglés auditado.
  - La nota al pie ofrece alternativas léxicas sin contradecir la lectura principal.
