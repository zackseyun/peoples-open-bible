  source_alignment_summary: 'El borrador sigue de cerca el griego extante y respeta la incompletud final sin suplir material ausente. Conserva bien la secuencia: clamor, impulso hacia las armas, disposición a morir por la ley ancestral, tumulto resultante y cláusula final truncada. Sin embargo, hay dos ajustes importantes de fidelidad y legibilidad: el anclaje de la nota textual está puesto en «armas» cuando la nota trata de la ruptura de toda la oración al final del versículo, y «presbíteros» para πρεσβυτέρων introduce una connotación eclesiástica demasiado específica para un contexto judío helenístico donde el sentido documentado es «dirigentes mayores / ancianos» más que un oficio cristiano.'
