translation:
  language: es
  text: 'Entonces Josué hijo de Nun envió de Sitim a dos hombres como espías, secretamente, diciendo: «Vayan, vean la tierra y Jericó».[a] Y fueron y entraron en la casa de una prostituta[b], cuyo nombre era Rahab[c], y se acostaron allí[d].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la tierra y Jericó». El hebreo puede leerse como nombrando tanto la tierra en general como Jericó en particular.
    reason: lexical_alternative
  - marker: b
    text: O «la casa de una posadera». Algunos han propuesto esta lectura por el contexto o por tradición posterior, pero el hebreo normalmente significa «prostituta».
    reason: alternative_reading
  - marker: c
    text: O «y su nombre era Rahab».
    reason: lexical_alternative
  - marker: d
    text: O «se alojaron allí». El hebreo literalmente dice «se acostaron allí».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: HALOT
  rationale: שלח en narración expresa el acto de enviar. «Envió» es natural en español y conserva el valor básico sin añadir matiz de autoridad o urgencia que no esté explícito.
- source_word: מִן הַשִּׁטִּים
  english_pob_choice: from Shittim
  chosen_spanish: desde Sitim
  alternatives_spanish:
  - de Sitim
  - desde el Sitim
  lexicon: HALOT
  rationale: Se conserva el nombre propio por transliteración. «Desde» reproduce el movimiento de origen del hebreo מִן con fluidez en español.
- source_word: שְׁנַיִם אֲנָשִׁים
  english_pob_choice: two men
  chosen_spanish: a dos hombres
  alternatives_spanish:
  - dos varones
  - dos personas
  lexicon: HALOT
  rationale: El hebreo es masculino plural y designa agentes masculinos. «Hombres» mantiene esa precisión.
- source_word: מְרַגְּלִים
  english_pob_choice: as spies
  chosen_spanish: como espías
  alternatives_spanish:
  - para espiar
  - en calidad de espías
  lexicon: HALOT
  rationale: El participio describe su función. «Como espías» conserva el valor funcional sin forzar un infinitivo o una explicación adicional.
- source_word: חֶרֶשׁ
  english_pob_choice: secretly
  chosen_spanish: secretamente
  alternatives_spanish:
  - en secreto
  - sigilosamente
  lexicon: HALOT
  rationale: El adverbio indica acción oculta. «Secretamente» es claro y digno en español, y mantiene la idea de clandestinidad del hebreo.
- source_word: לְכוּ רְאוּ
  english_pob_choice: Go, see
  chosen_spanish: Vayan, vean
  alternatives_spanish:
  - Vayan, miren
  - Vayan, observen
  lexicon: HALOT
  rationale: Se conserva la secuencia imperativa. «Vean» es un equivalente natural de רְאוּ y evita ampliar a «inspeccionen», que sería más interpretativo.
- source_word: אֶת הָאָרֶץ וְאֶת יְרִיחוֹ
  english_pob_choice: the land and Jericho
  chosen_spanish: la tierra y Jericó
  alternatives_spanish:
  - la tierra, es decir, Jericó
  - la tierra, y Jericó
  lexicon: HALOT
  rationale: Se mantiene la coordinación tal como está en el hebreo, sin explicar la relación como si Jericó fuera una glosa. Esto preserva la ambigüedad/énfasis textual reconocida en el audit trail inglés.
- source_word: בֵּית אִשָּׁה זוֹנָה
  english_pob_choice: the house of a prostitute
  chosen_spanish: la casa de una mujer prostituta
  alternatives_spanish:
  - la casa de una prostituta
  - la casa de una ramera
  lexicon: HALOT
  rationale: זוֹנָה denota ordinariamente prostituta. Se eligió «mujer prostituta» para sonar natural en español y conservar con transparencia la referencia ocupacional sin recurrir a un término demasiado arcaico.
- source_word: וּשְׁמָהּ רָחָב
  english_pob_choice: whose name was Rahab
  chosen_spanish: cuyo nombre era Rahab
  alternatives_spanish:
  - y su nombre era Rahab
  - de nombre Rahab
  lexicon: HALOT
  rationale: La relativa española integra la identificación de forma fluida. «Cuyo nombre era» conserva el enlace del hebreo sin sobrecargar la sintaxis.
- source_word: וַיִּשְׁכְּבוּ שָׁמָּה
  english_pob_choice: they lay down there
  chosen_spanish: se acostaron allí
  alternatives_spanish:
  - se recostaron allí
  - durmieron allí
  lexicon: HALOT
  rationale: El verbo literalmente significa «tumbarse / acostarse». «Se acostaron allí» preserva la literalidad narrativa y evita imponer de antemano la idea de hospedaje formal o de una acción sexual.
theological_decisions:
- issue: Sentido de זוֹנָה respecto de Rahab
  english_pob_reading: prostitute
  chosen_spanish_reading: mujer prostituta
  alternative_spanish_readings:
  - prostituta
  - ramera
  - posadera
  rationale: Se mantiene el sentido léxico ordinario señalado por el audit trail inglés. No se adopta «posadera» o «mesonera» porque suaviza sin base suficiente el término hebreo; «mujer prostituta» conserva la tensión moral y narrativa del texto.
  doctrine_reference: Translation philosophy §1, §5
- issue: Valor de וַיִּשְׁכְּבוּ שָׁמָּה
  english_pob_reading: they lay down there
  chosen_spanish_reading: se acostaron allí
  alternative_spanish_readings:
  - se alojaron allí
  - pasaron la noche allí
  rationale: La redacción evita sugerir más de lo que dice el hebreo. Tampoco se sustituye por «se alojaron», porque eso importaría una forma de hospedaje no explícita; «se acostaron allí» mantiene la ambigüedad narrativa documentada.
  doctrine_reference: Translation philosophy §3
- issue: Relación entre «la tierra» y «Jericó»
  english_pob_reading: the land and Jericho
  chosen_spanish_reading: la tierra y Jericó
  alternative_spanish_readings:
  - la tierra, especialmente Jericó
  - la tierra, es decir, Jericó
  rationale: Se evita convertir la coordinación en explicación interpretativa. El hebreo une ambos objetos con וְאֶת; la traducción conserva esa relación sin resolverla más allá de lo que el texto permite.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: Se siguió el último estado revisado del inglés POB, que prefirió «the land and Jericho» frente a una expansión interpretativa como «especially Jericho». Por eso el español mantiene la coordinación simple «la tierra y Jericó» sin glosa explicativa. También se preservó la lectura literal de la acción final con un equivalente español que no sobreinterpreta el hospedaje.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma por defecto solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se mantiene la transliteración «Sitim» y «Jericó» para los topónimos.
  - «Espías» se reserva para מְרַגְּלִים, sin sustituirlo por términos más generales como «exploradores».
  - Se conserva la ambigüedad narrativa del cierre, evitando cualquier implicación sexual o de hospedaje formal no expresada por el hebreo.
