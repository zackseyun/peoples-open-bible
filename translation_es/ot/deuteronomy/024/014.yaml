review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: prohibición de oprimir/explotar a un trabajador asalariado vulnerable, ya sea de entre los ''hermanos'' o de entre los residentes foráneos, y conserva el modismo final con nota explicativa. Sin embargo, ''forasteros'' no preserva bien la categoría legal-covenantal de גֵּר, que en el expediente inglés se fijó como ''sojourners'' precisamente para evitar un término demasiado genérico o transitorio. En español, ''forastero'' suele sugerir alguien de fuera o de paso, no necesariamente un residente protegido dentro de la comunidad.'
  spanish_quality_summary: El español es claro y legible, con buen tono bíblico moderno. 'No oprimirás al jornalero pobre y necesitado' suena natural. 'Dentro de tus puertas' es aceptable si se mantiene la nota. La principal debilidad de calidad/precisión está en 'uno de tus forasteros', que suena menos jurídico-bíblico y menos asentado que una opción como 'uno de los inmigrantes residentes entre ustedes' o 'uno de tus residentes forasteros'; pero la primera introduce lenguaje moderno ajeno al proyecto y la segunda es menos fluida. La mejor reparación breve y fiel es 'uno de tus residentes forasteros', que explicita residencia y conserva inteligibilidad.
  glossary_alignment: 'Buena alineación con las decisiones de תַעֲשֹׁק = ''oprimir'', שָׂכִיר = ''jornalero'', עָנִי וְאֶבְיוֹן = ''pobre y necesitado'', y אַחֶיךָ = ''tus hermanos''. La desviación relevante es גֵּר: el proyecto documentó un valor técnico semejante a ''sojourner'', y ''forastero'' por sí solo no retiene suficientemente esa categoría protegida de residente no nativo.'
  issues:
  - severity: medium
    issue: '''forasteros'' no representa con suficiente precisión גֵּר'
    rationale: גֵּר en este contexto legal no es simplemente alguien de fuera, sino un no nativo que reside dentro de la tierra y bajo jurisdicción/comunidad. 'Forastero' en español puede sugerir un visitante o extraño externo, debilitando el matiz legal-covenantal que el expediente inglés quiso preservar con 'sojourner'.
  - severity: low
    issue: Ligera tensión estilística entre singular distributivo y fluidez
    rationale: '''sea uno de tus hermanos o uno de tus residentes forasteros que está en tu tierra'' es fiel pero algo pesado. Aun así, es preferible conservar la estructura singular por cercanía al hebreo y al POB inglés auditado.'
  revised_spanish_text: No oprimirás al jornalero pobre y necesitado[a], sea uno de tus hermanos o uno de tus residentes forasteros que está en tu tierra, dentro de tus puertas[b].
  revised_footnotes:
  - marker: a
    text: O «defraudar» o «explotar» a un jornalero; el verbo hebreo incluye opresión económica.
    reason: lexical_alternative
  - marker: b
    text: «Dentro de tus puertas» es un modismo hebreo para la vida dentro de tus ciudades o del ámbito de tu jurisdicción.
    reason: cultural_note
  revision_rationale: Se reemplaza 'forasteros' por 'residentes forasteros' para reflejar mejor la categoría de גֵּר como no nativo que reside dentro de la comunidad y está bajo su protección legal, en línea con la justificación léxica y teológica del POB inglés. También se ancla explícitamente la nota [b] en 'dentro de tus puertas', ya que la nota cultural debe aparecer en el texto donde corresponde.
