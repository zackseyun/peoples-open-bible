translation:
  language: es
  text: Y Efraín, su padre, estuvo de duelo por muchos días, y sus hermanos vinieron a consolarlo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a darle consuelo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְאַבֵּל
  english_pob_choice: mourned
  chosen_spanish: se lamentó
  alternatives_spanish:
  - guardó duelo
  - estuvo de duelo
  - lloró
  lexicon: HALOT
  rationale: El hitpael de אבל expresa entrar en duelo o lamentación. En español, "se lamentó" comunica bien el estado de duelo sin sonar demasiado rígido; "guardó duelo" también sería posible, pero suena más formal y menos natural en este contexto narrativo.
- source_word: אֶפְרַיִם
  english_pob_choice: Ephraim
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Efraín
  lexicon: WLC context + preceding verse
  rationale: En el hebreo de este versículo, el sujeto inmediato es "Efraín". Sin embargo, el contexto literario mostrado por la versión auditada en inglés entiende la cláusula como referida al padre mencionado en el versículo anterior, y por eso la lectura española debe seguir esa identificación textual. El nombre propio del sujeto se conserva como Efraín en la tradición del texto, pero en esta línea se ha incorporado la forma del sujeto implícito conforme al sentido narrativo heredado por la POB inglesa.
- source_word: אֲבִיהֶם
  english_pob_choice: their father
  chosen_spanish: su padre
  alternatives_spanish:
  - el padre de ellos
  - el padre de sus hijos
  lexicon: HALOT
  rationale: 'La construcción con sufijo de 3.ª plural indica referencia posesiva: "su padre". En español, esa forma es más natural que el calco "el padre de ellos" y conserva la relación familiar inmediata.'
- source_word: יָמִים רַבִּים
  english_pob_choice: for many days
  chosen_spanish: por muchos días
  alternatives_spanish:
  - muchos días
  - durante muchos días
  lexicon: HALOT
  rationale: La expresión hebrea es un idiomatismo de duración. "Por muchos días" reproduce bien ese valor temporal y sigue de cerca la solución auditada en inglés, manteniendo naturalidad en español.
- source_word: וַיָּבֹאוּ
  english_pob_choice: came
  chosen_spanish: vinieron
  alternatives_spanish:
  - llegaron
  - se acercaron
  lexicon: HALOT
  rationale: El verbo בוא en narración puede ser "venir" o "llegar". "Vinieron" conserva el movimiento hacia el doliente y encaja con la escena de visita de consuelo; "llegaron" también sería viable, pero es menos relacional.
- source_word: אֶחָיו
  english_pob_choice: his brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus hermanos varones
  - sus parientes
  lexicon: HALOT
  rationale: El sustantivo significa de manera ordinaria "hermanos". En español, "sus hermanos" es la correspondencia más directa y evita debilitar el vínculo familiar sin justificación.
- source_word: לְנַחֲמוֹ
  english_pob_choice: to comfort him
  chosen_spanish: para consolarlo
  alternatives_spanish:
  - para confortarlo
  - para aliviarlo
  lexicon: HALOT
  rationale: El infinitivo de נחם en este contexto expresa consuelo a un doliente. "Consolar" es la traducción española natural y precisa; "confortar" sería posible pero menos usual. La forma pronominal "-lo" mantiene el objeto directo masculino singular.
theological_decisions:
- issue: Identidad del sujeto principal en una cláusula con nombre propio y sufijo posesivo
  english_pob_reading: The English POB reads the clause as 'Ephraim their father mourned,' interpreting the syntax in light of the preceding narrative to refer to the bereaved father figure.
  chosen_spanish_reading: 'Se sigue la misma lectura narrativa: el doliente es el padre al que se alude por el contexto, no una simple repetición mecánica del nombre propio como sujeto literal de la línea.'
  alternative_spanish_readings:
  - Efraín, su padre, se lamentó por muchos días
  - Efraín, su padre, estuvo de duelo por muchos días
  rationale: El hebreo transmitido en la línea presenta una tensión sintáctica con el nombre propio "Efraín" y el referente paternal del contexto inmediato. La POB inglesa ya documenta una lectura interpretativa; por coherencia auditada, la española la sigue sin ocultar que hay una decisión contextual en juego.
  doctrine_reference: Principio de lectura contextual del texto narrativo; coherencia sintáctico-semántica dentro de 1 Crónicas 7:21–22
translation_notes:
  revision_awareness: El pasaje auditado en inglés no requirió revisiones en su última pasada y mostró alto acuerdo entre evaluaciones. La versión española conserva esa línea interpretativa, pero explicita en notas la alternativa léxica de נחם y respeta la tensión narrativa del sujeto según el contexto inmediato.
  spanish_consistency_notes:
  - Se usa "Yahvé" según la convención del proyecto para el nombre divino cuando la línea y el contexto narrativo lo requieren.
  - Se mantiene un estilo bíblico moderno y digno, evitando el calco excesivo.
  - '"Consolar" se conserva como verbo principal por su naturalidad en español; la nota preserva la alternativa "consolar"/"consolar" en el sentido de consolar o confortar, tal como la auditoría inglesa lo señaló.'
