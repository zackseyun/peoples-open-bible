source:
  edition: WLC
  text: לָ/מָּה לִּ֤/י רֹב זִבְחֵי/כֶם֙ יֹאמַ֣ר יְהוָ֔ה שָׂבַ֛עְתִּי עֹל֥וֹת אֵילִ֖ים וְ/חֵ֣לֶב מְרִיאִ֑ים וְ/דַ֨ם פָּרִ֧ים וּ/כְבָשִׂ֛ים וְ/עַתּוּדִ֖ים לֹ֥א חָפָֽצְתִּי־־׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/001/011.yaml
  text: Why are your many sacrifices to me? says Yahweh[a]. I have had enough of burnt offerings of rams and the fat of fattened animals[b]; and in the blood of bulls and lambs and goats I do not delight.
  footnotes:
  - marker: a
    text: Or, 'What use are your many sacrifices to me?' The Hebrew idiom is literally, 'Why to me the multitude of your sacrifices?'
    reason: lexical_alternative
  - marker: b
    text: '''Goats'' translates a term more specifically meaning ''male goats'' or ''he-goats.'''
    reason: lexical_alternative
  ai_draft:
