revisions:
- from: ¡Cómo ha sido derribado y quebrado el martillo de toda la tierra! ¡Cómo Babilonia ha llegado a ser una desolación[a] entre las naciones[b]!
  to: ¡Cómo ha sido derribado y quebrado el martillo de toda la tierra! ¡Cómo Babilonia se ha convertido en una desolación[a][b] entre las naciones!
  rationale: La revisión conserva todas las decisiones léxicas principales, pero corrige el anclaje de la nota alternativa para que recaiga sobre «desolación», que es donde realmente está la variación semántica de לְשַׁמָּה. También mejora la naturalidad del español con «se ha convertido en», manteniendo el mismo sentido resultativo del hebreo y de la POB inglesa.
