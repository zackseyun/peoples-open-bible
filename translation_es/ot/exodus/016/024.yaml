- from: Así que lo dejaron hasta la mañana[a], tal como Moisés había mandado, y no se pudrió, ni hubo gusanos en él.
  to: Así que lo dejaron hasta la mañana[a], tal como Moisés había mandado, y no hedió, ni hubo gusanos en él.
  rationale: Se ajusta הִבְאִישׁ a «no hedió» para reflejar con mayor precisión el sentido de mal olor presente en el hebreo y en la auditoría inglesa. También se corrige la nota al pie para ofrecer una alternativa léxica en español en vez de conservar el término inglés.
