id: LEV.5.4
reference: Leviticus 5:4
source:
  edition: WLC
  text: א֣וֹ נֶ֡פֶשׁ כִּ֣י תִשָּׁבַע֩ לְ/בַטֵּ֨א בִ/שְׂפָתַ֜יִם לְ/הָרַ֣ע א֣וֹ לְ/הֵיטִ֗יב לְ֠/כֹל אֲשֶׁ֨ר יְבַטֵּ֧א הָ/אָדָ֛ם בִּ/שְׁבֻעָ֖ה וְ/נֶעְלַ֣ם מִמֶּ֑/נּוּ וְ/הוּא יָדַ֥ע וְ/אָשֵׁ֖ם לְ/אַחַ֥ת מֵ/אֵֽלֶּה׀־׃
translation:
  text: Or if a person swears rashly with his lips to do evil or to do good—whatever a man may utter in an oath—and it is hidden from him[a], and then he comes to know it and becomes guilty in one of these matters[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'whatever a man may utter in an oath'; 'man' here is a representative singular for any person.
    reason: lexical_alternative
  - marker: b
    text: Or 'utters with his lips'; the Hebrew expression can emphasize verbal utterance itself, though the context suggests a rash or thoughtless oath.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶפֶשׁ
  chosen: person
  alternatives:
  - soul
  lexicon: HALOT
  rationale: In legal material נֶפֶשׁ commonly refers to a person/individual rather than the immaterial soul. 'Person' is natural English and fits the casuistic formula.
- source_word: תִשָּׁבַע
  chosen: swears
  alternatives:
  - takes an oath
  lexicon: HALOT
  rationale: The Niphal of שׁבע here denotes swearing/oath-taking. 'Swears' is concise and idiomatic, while the following noun שְׁבֻעָה makes the oath context explicit.
- source_word: לְבַטֵּא בִשְׂפָתַיִם
  chosen: rashly with his lips
  alternatives:
  - clearly with his lips
  - thoughtlessly with his lips
  - utters with his lips
  lexicon: HALOT
  rationale: בטא can mean to speak/utter distinctly, but in this legal context the sense is of a careless verbal outburst in an oath. 'Rashly' captures the culpable impulsiveness reflected in traditional and contextual readings, while 'with his lips' preserves the Hebrew expression.
- source_word: לְהָרַע אוֹ לְהֵיטִיב
  chosen: to do evil or to do good
  alternatives:
  - for harm or for benefit
  - to harm or to help
  lexicon: HALOT
  rationale: The infinitives mark the content of the oath in broad polarity. 'To do evil or to do good' stays close to the Hebrew and preserves the merism-like range.
- source_word: לְכֹל אֲשֶׁר יְבַטֵּא הָאָדָם בִּשְׁבֻעָה
  chosen: whatever a man may utter in an oath
  alternatives:
  - anything a person may utter in an oath
  - whatever someone may declare by oath
  lexicon: HALOT
  rationale: This generalizes the case beyond the specific examples. הָאָדָם is rendered 'a man' in keeping with the gender-accurate policy for representative/generic masculine, while still functioning generically in context.
- source_word: הָאָדָם
  chosen: a man
  alternatives:
  - a person
  - someone
  - humankind
  lexicon: HALOT
  rationale: Per doctrine, אָדָם defaults to 'man / humankind' depending on context. Here it is a generic singular representative human, so 'a man' preserves the source form; inclusivity can be clarified in a footnote.
- source_word: וְנֶעְלַם מִמֶּנּוּ
  chosen: it is hidden from him
  alternatives:
  - he is unaware of it
  - it escapes his notice
  lexicon: HALOT
  rationale: The passive wording is preserved rather than flattened. It indicates that the oath's implications or the fact of violation escaped his awareness.
- source_word: וְהוּא יָדַע
  chosen: then he comes to know it
  alternatives:
  - and he knows it
  - when he realizes it
  lexicon: HALOT
  rationale: The sequence implies later realization after prior unawareness. 'Comes to know' makes the temporal development clear in English.
- source_word: וְאָשֵׁם
  chosen: becomes guilty
  alternatives:
  - is guilty
  - incurs guilt
  lexicon: HALOT
  rationale: The verb marks liability/guilt resulting from the realized offense. 'Becomes guilty' reflects the transition into recognized culpability.
- source_word: לְאַחַת מֵאֵלֶּה
  chosen: in one of these matters
  alternatives:
  - in one of these things
  - for one of these
  lexicon: HALOT
  rationale: This points back to the preceding cases in the section. 'Matters' is idiomatic and suitably legal in tone.
