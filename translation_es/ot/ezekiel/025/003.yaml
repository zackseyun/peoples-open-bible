review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue en gran parte el sentido del hebreo y preserva bien varios elementos clave: «hijos de Amón», «mi santuario», «la casa de Judá» y el valor adversativo de אֶל como «contra». También mantiene correctamente el nombre divino «Yahvé». Sin embargo, hay varios desajustes con la evidencia fuente y con la auditoría inglesa: el compuesto אֲדֹנָי יְהוִה se expresa de forma más natural y fiel como «el Señor Yahvé» que «Yahvé, el Señor»; la nota [a] está mal anclada porque corresponde a la interjección «¡Ahá!», no a «Amón»; «fue hecha desolación» no es español natural para נָשַׁמָּה; y הָלְכוּ בַּגּוֹלָה debe seguir el sentido principal auditado como «fueron al exilio» o «entraron en el exilio», no «fueron al cautiverio» en el texto principal.'
  spanish_quality_summary: 'El texto es generalmente legible, pero tiene dos problemas de naturalidad importantes: «fue hecha desolación» suena forzado y no es una formulación idiomática en español bíblico moderno; «Yahvé, el Señor» en fórmula profética suena menos natural que «el Señor Yahvé». Además, la puntuación y el anclaje de notas necesitan corrección para que las notas expliquen la palabra correcta.'
  glossary_alignment: Hay buena alineación con el glosario del proyecto en «Yahvé», «santuario» y «casa de Judá». No obstante, en el compuesto אֲדֹנָי יְהוִה conviene reflejar explícitamente ambos elementos como «el Señor Yahvé», una solución mejor adaptada al español y coherente con la política de no ocultar YHWH. También debe preferirse «exilio» en el cuerpo principal para גּוֹלָה, dejando «cautiverio» como alternativa de nota.
  issues:
  - severity: high
    issue: La nota [a] está anclada en «Amón» pero explica la interjección הֶאָח.
    rationale: La disciplina requerida exige que cada marcador aparezca exactamente en la palabra o frase relevante. Aquí la nota léxica corresponde a «¡Ahá!»/«¡Ah!», no al etnónimo «Amón».
  - severity: high
    issue: «fue hecha desolación» es una formulación antinatural para נָשַׁמָּה.
    rationale: Aunque intenta calcar la pasiva hebrea, en español moderno digno la mejor equivalencia es «quedó desolada» o «fue devastada». La actual redacción suena poco idiomática y entorpece la lectura.
  - severity: medium
    issue: «fueron al cautiverio» no sigue el sentido principal auditado para הָלְכוּ בַּגּוֹלָה.
    rationale: La auditoría inglesa eligió «went into exile» y reservó «captivity» como alternativa. En español, «exilio» es la opción principal más fiel al uso profético de גּוֹלָה.
  - severity: medium
    issue: «Yahvé, el Señor» para אֲדֹנָי יְהוִה es menos natural que «el Señor Yahvé».
    rationale: Ambas preservan los dos elementos, pero «el Señor Yahvé» refleja mejor el orden semántico del compuesto y suena más natural en español bíblico, evitando una aposición algo rígida.
  - severity: low
    issue: La nota textual sobre נִחָל contiene «desecrado», forma incorrecta en español.
    rationale: Debe corregirse a «desecrado» → «profanado» o preferiblemente «desecrado» no existe; la forma correcta es «desecrado»? En español la opción natural es «profanado» o «desacralizado», pero como alternativa del inglés corresponde «desecrated» = «profanado» / «desacralizado». Conviene evitar un castellanismo incorrecto.
