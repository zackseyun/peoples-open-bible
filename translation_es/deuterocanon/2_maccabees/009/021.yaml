base_translation:
  language: en
  yaml_path: translation/deuterocanon/2_maccabees/009/021.yaml
  text: I remembered your honor and goodwill with affection[a]; after returning from the regions of Persia and falling into a grievous illness, I considered it necessary to take thought for the common safety of all of you[c][b];
  footnotes:
  - marker: a
    text: Or 'your honor and favor.' The Greek εὔνοια can mean 'goodwill' or 'favor.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'falling into an illness having δυσχερία.' The expression indicates a sickness in a serious or hard-to-bear condition.
    reason: lexical_alternative
  - marker: c
    text: Or 'the public security of all of you.'
    reason: lexical_alternative
