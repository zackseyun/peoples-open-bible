translation:
  language: es
  text: 'Entonces Samuel dijo a Saúl[a]: «¡Detente, y te diré lo que Yahvé me dijo anoche!». Y él le dijo: «Habla».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La forma hebrea escrita dice literalmente «y ellos le dijeron», pero el contexto exige un singular: «y él le dijo».'
    reason: textual_variant
lexical_decisions:
- source_word: הֶרֶף
  english_pob_choice: Stop
  chosen_spanish: ¡Detente!
  alternatives_spanish:
  - ¡Basta!
  - ¡Para!
  - ¡Espera!
  lexicon: HALOT
  rationale: El imperativo de רפה aquí funciona como una orden enérgica de cesar o desistir. En español, «¡Detente!» conserva la fuerza breve y exhortativa, sin sonar tan cortante como una traducción demasiado literal ni tan débil como «espera».
- source_word: וְאַגִּידָה לְּךָ
  english_pob_choice: and I will tell you
  chosen_spanish: y te diré
  alternatives_spanish:
  - y te voy a decir
  - y permíteme decirte
  - y te contaré
  lexicon: HALOT
  rationale: El hitpael/hiphil de נגד expresa declarar o contar. «Y te diré» comunica la intención de Samuel de manera natural en español y mantiene la secuencia directa con la orden anterior.
- source_word: אֵת אֲשֶׁר דִּבֶּר
  english_pob_choice: what ... said
  chosen_spanish: lo que habló
  alternatives_spanish:
  - lo que dijo
  - aquello que habló
  - las palabras que habló
  lexicon: HALOT
  rationale: La construcción introduce el contenido del discurso divino. «Lo que habló» preserva el vínculo verbal con דִּבֶּר sin sobrecargar el verso; «dijo» sería más idiomático, pero «habló» refleja mejor la forma verbal subyacente.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: usar el nombre divino transliterado como «Yahvé» en lugar de sustituirlo por un título. Es la forma más transparente para el texto fuente y la lectura pública en español.'
- source_word: הַלָּיְלָה
  english_pob_choice: last night
  chosen_spanish: anoche
  alternatives_spanish:
  - la noche pasada
  - durante la noche
  - esta noche
  lexicon: HALOT
  rationale: Con el perfecto anterior, la referencia temporal es la noche inmediatamente anterior en la narración. «Anoche» es la equivalencia natural y más fluida en español.
- source_word: וַיֹּאמְרוּ לוֹ
  english_pob_choice: And he said to him
  chosen_spanish: Y él le dijo
  alternatives_spanish:
  - Y ellos le dijeron
  - Y dijo a él
  lexicon: HALOT
  rationale: 'Aunque la forma consonántica es plural, el contexto exige un singular: Saúl es el interlocutor que responde. «Y él le dijo» refleja la lectura contextual sin perder de vista la irregularidad textual.'
- source_word: דַּבֵּר
  english_pob_choice: Speak
  chosen_spanish: Habla
  alternatives_spanish:
  - Di
  - Sigue
  - Hablad
  lexicon: HALOT
  rationale: El imperativo es breve y directo. «Habla» conserva la concisión y el tono de permiso/exhortación para continuar hablando.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: La pauta del proyecto pide representar el Nombre divino con una transliteración transparente. «Yahvé» mantiene la distinción entre el nombre propio de Dios y un título reverencial, sin añadir interpretación doctrinal al verso.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Irregularidad textual en ויאמרו לו
  english_pob_reading: And he said to him
  chosen_spanish_reading: Y él le dijo
  alternative_spanish_readings:
  - Y ellos le dijeron
  - Y le dijo
  rationale: La forma hebrea plural choca con el contexto inmediato, que presenta a Saúl como único respondiente. La traducción sigue la coherencia narrativa, como en el audit trail inglés, sin ocultar la tensión textual.
  doctrine_reference: Texto fuente y nota auditada sobre variante/construcción no concordante
translation_notes:
  revision_awareness: 'Se ha mantenido la lectura ya confirmada por el audit trail inglés: mando breve de Samuel, nombre divino como Yahvé, referencia temporal a la noche anterior y corrección contextual de la forma plural a singular en la respuesta de Saúl. No hubo revisiones pendientes en el pase más reciente.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el Tetragrámaton, conforme al criterio del proyecto.
  - Se prefiere «Saúl» y «Samuel» sin artículos añadidos.
  - Se mantiene un registro bíblico claro y público, con español natural y sin arcaísmos innecesarios.
  - La nota al pie marca únicamente la variante textual del verbo final, porque es la única tensión explícita del versículo.
