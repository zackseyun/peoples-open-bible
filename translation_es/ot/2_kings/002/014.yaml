translation:
  language: es
  text: 'Entonces tomó el manto[a] de Elías, que se le había caído, y golpeó las aguas y dijo: «¿Dónde está Yahvé, el Dios de Elías?[b]» Luego golpeó las aguas, y estas se dividieron de un lado y del otro, y Eliseo cruzó.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «capa». El hebreo אַדֶּרֶת designa la prenda exterior distintiva de Elías.
    reason: lexical_alternative
  - marker: b
    text: O «¿Dónde está Yahvé, el Dios de Elías? También él…». El hebreo אַף הוּא es breve y difícil; puede enfatizar que el mismo Dios que estuvo con Elías sigue presente.
    reason: alternative_reading
lexical_decisions:
- source_word: אַדֶּרֶת
  english_pob_choice: cloak
  chosen_spanish: manto
  alternatives_spanish:
  - capa
  - manto
  lexicon: HALOT
  rationale: אַדֶּרֶת nombra una prenda exterior distintiva de Elías. En español, «manto» conserva la concreción de una prenda significativa y tiene buena resonancia bíblica sin imponer un registro demasiado arcaico; «capa» sería más cotidiano pero menos cargado simbólicamente.
- source_word: נָפְלָה מֵעָלָיו
  english_pob_choice: had fallen from him
  chosen_spanish: se le había caído
  alternatives_spanish:
  - había caído de él
  - le había caído
  lexicon: HALOT
  rationale: El pluscuamperfecto refleja la relación temporal en la cláusula relativa. La construcción pronominal española expresa con naturalidad que la prenda cayó de Elías cuando fue levantado, sin añadir información.
- source_word: וַיַּכֶּה אֶת־הַמַּיִם
  english_pob_choice: struck the water
  chosen_spanish: golpeó las aguas
  alternatives_spanish:
  - golpeó el agua
  - hirió las aguas
  lexicon: HALOT
  rationale: «Golpeó» mantiene el valor narrativo de נכה en un acto milagroso. Se eligió «las aguas» para respetar el plural hebreo y el paralelismo del versículo; «el agua» sería más idiomático, pero atenúa la forma del texto fuente.
- source_word: אַיֵּה
  english_pob_choice: Where is
  chosen_spanish: ¿Dónde está?
  alternatives_spanish:
  - ¿Dónde está ahora?
  - ¿Dónde se encuentra?
  lexicon: HALOT
  rationale: La pregunta en español debe sonar natural y directa, pero sin perder su sentido de presencia/invocación. «¿Dónde está?» comunica bien la apelación a la presencia activa de Yahvé.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: «Yahvé» preserva el nombre divino revelado, en lugar de sustituirlo por un título enmascarado.'
- source_word: אֱלֹהֵי אֵלִיָּהוּ
  english_pob_choice: the God of Elijah
  chosen_spanish: el Dios de Elías
  alternatives_spanish:
  - Dios de Elías
  - el Dios que era de Elías
  lexicon: HALOT
  rationale: La construcción de estado constructo se expresa de manera clara y reverente como «el Dios de Elías», que mantiene la relación posesiva/relacional sin introducir una paráfrasis interpretativa.
- source_word: אַף הוּא
  english_pob_choice: even he
  chosen_spanish: también él
  alternatives_spanish:
  - incluso él
  - él también
  lexicon: HALOT
  rationale: La frase hebrea es breve y enfática. En español, «también él» conserva la idea de continuidad y énfasis sin forzar una construcción extraña; el sentido es que el mismo Dios que estuvo con Elías sigue presente para actuar.
- source_word: וַיֵּחָצוּ הֵנָּה וָהֵנָּה
  english_pob_choice: it was divided this way and that way
  chosen_spanish: se dividieron de un lado y del otro
  alternatives_spanish:
  - se abrieron por aquí y por allá
  - se dividieron aquí y allá
  lexicon: HALOT
  rationale: El idioma hebreo indica separación en dos direcciones. «De un lado y del otro» comunica la división sin calco excesivo y conserva el efecto visual del agua apartándose.
- source_word: וַיַּעֲבֹר
  english_pob_choice: crossed over
  chosen_spanish: cruzó
  alternatives_spanish:
  - cruzó al otro lado
  - pasó
  lexicon: HALOT
  rationale: En este contexto de cruce del río, «cruzó» es suficiente y narrativamente claro. «Pasó» sería posible, pero pierde algo del movimiento transfronterizo que el contexto subraya.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme a la práctica del proyecto, se preserva el nombre propio divino en español como «Yahvé» para evitar el ocultamiento del nombre mediante un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Interpretación de אַף הוּא
  english_pob_reading: Retained as the terse expression 'even he' in the main text
  chosen_spanish_reading: también él
  alternative_spanish_readings:
  - incluso él
  - él también
  - se omitió por elipsis
  rationale: 'La expresión es compacta y debatida. «También él» conserva la tensión: el lector percibe una referencia enfática a la continuidad del Dios de Elías sin resolver de manera excesiva la sintaxis ni introducir una paráfrasis más interpretativa.'
  doctrine_reference: DOCTRINE.md Translation philosophy §3
translation_notes:
  revision_awareness: La redacción sigue la revisión final del inglés POB al mantener la pregunta breve y directa sobre Yahvé y al reflejar el idiomático movimiento del agua con una fórmula más formal en español. También evita sobrecargar el cierre con una expansión innecesaria de אַף הוּא, preservando la tensión interpretativa documentada en el expediente.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se conserva el plural «las aguas» para respetar el hebreo y la escena narrativa.
  - «Elías» y «Eliseo» siguen la forma española estándar de los nombres propios bíblicos.
  - El marcador de nota [a] está anclado en el sustantivo «manto» para señalar la alternativa léxica principal.
