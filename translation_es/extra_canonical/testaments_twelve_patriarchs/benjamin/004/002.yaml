  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/benjamin/004/002.yaml
  text: For the good man does not have a dark eye, for he has mercy on all, even if they are sinners.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:08Z'
    unchanged: false
    changes_summary: Changed 'darkened eye' to 'dark eye' for closer lexical correspondence to σκοτεινόν, and 'shows mercy to all' to 'has mercy on all' for a more direct rendering of ἐλεεῖ.
translation:
  language: es
  text: Pues el hombre bueno no tiene un ojo oscuro, pues tiene misericordia de todos, aunque sean pecadores.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀγαθὸς ἄνθρωπος
  english_pob_choice: the good man
  chosen_spanish: el hombre bueno
  alternatives_spanish:
  - el varón bueno
  - el hombre virtuoso
  lexicon: BDAG
  rationale: Traducción directa; 'hombre bueno' conserva el contraste moral del capítulo.
- source_word: σκοτεινὸν ὀφθαλμόν
  english_pob_choice: a dark eye
  chosen_spanish: un ojo oscuro
  alternatives_spanish:
  - el ojo oscurecido
  - ojo de tinieblas
  lexicon: LSJ
  rationale: Sigue la revisión POB que ajustó 'darkened eye' a 'dark eye' por correspondencia léxica con σκοτεινόν. 'Ojo oscuro' es la imagen bíblica del egoísmo/avaricia opuesta al 'ojo bueno'.
- source_word: ἐλεεῖ
  english_pob_choice: has mercy on
  chosen_spanish: tiene misericordia de
  alternatives_spanish:
  - se apiada de
  - muestra misericordia a
  lexicon: BDAG
  rationale: Sigue la revisión POB que ajustó 'shows mercy to all' a 'has mercy on all' como traducción más directa de ἐλεεῖ.
- source_word: ἁμαρτωλοί
  english_pob_choice: sinners
  chosen_spanish: pecadores
  alternatives_spanish:
  - transgresores
  lexicon: BDAG
  rationale: Traducción estándar bíblica de ἁμαρτωλός.
theological_decisions:
- issue: Imagen del 'ojo oscuro'
  chosen_reading: Conservar la imagen literal 'ojo oscuro' como contraste con la 'mirada simple/buena' de la tradición sapiencial.
  alternative_readings:
  - Parafrasear como 'mirada envidiosa' o 'mirada avara'
  - Reducir a 'malicia'
  rationale: La imagen del 'ojo oscuro' es bíblicamente cargada (cf. Mt 6:22-23) y conviene conservarla literalmente para que el lector perciba la metáfora original.
translation_notes:
  revision_awareness: El POB inglés fue revisado de 'darkened eye' a 'dark eye' y de 'shows mercy to all' a 'has mercy on all' para correspondencia léxica más estrecha. La versión española sigue 'ojo oscuro' y 'tiene misericordia de'.
  spanish_consistency_notes:
  - ἐλεέω → 'tener misericordia'
  - ἁμαρτωλός → 'pecador'
  - ἀγαθός → 'bueno'
  - σκοτεινός → 'oscuro'
