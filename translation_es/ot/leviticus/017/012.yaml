  spanish_quality_summary: 'El español es claro y digno. ''Por eso'' y ''no comerá sangre'' son naturales en registro legal bíblico. ''El extranjero que reside entre ustedes'' es legible, aunque menos preciso que el matiz de ''forastero residente/ residente extranjero''; la nota puede suplirlo. Hay también un detalle menor de puntuación: en español es preferible colocar el punto final dentro de las comillas de cierre en este contexto editorial.'
