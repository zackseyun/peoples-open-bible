revisions:
- from: Cuando Balaam vio que era bueno ante los ojos de Yahvé bendecir a Israel[a], no fue, como en otras ocasiones, a buscar presagios, sino que puso su rostro hacia el desierto.
  to: Cuando Balaam vio que le parecía bien a Yahvé bendecir a Israel[a], no fue, como en otras ocasiones, a buscar presagios, sino que volvió su rostro hacia el desierto.
  rationale: Se ajusta la cláusula sobre lo que era agradable a Yahvé para que el español sea natural sin perder la imagen valorativa del hebreo, y se mejora el hebraísmo final con una forma más idiomática en español. Se conserva «Yahvé», «buscar presagios» y la nota léxica sobre נְחָשִׁים.
