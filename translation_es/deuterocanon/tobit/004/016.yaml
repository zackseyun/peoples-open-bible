  timestamp: '2026-05-07T22:43:05Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'La mayor parte del borrador sigue bien el griego: «Da de tu pan», «al hambriento», «de tus vestidos», «todo lo que te sobre» y la referencia concreta a la limosna reflejan adecuadamente ἐκ τοῦ ἄρτου σου δίδου, πεινῶντι, ἐκ τῶν ἱματίων σου, πᾶν ὃ ἐὰν περισσεύσῃ σοι y ἐλεημοσύνην. Sin embargo, la última cláusula no representa bien μὴ φθονεσάτω σου ὁ ὀφθαλμός ἐν τῷ ποιεῖν σε ἐλεημοσύνην: «no deje tu ojo de ser envidioso» en español significa lo contrario de la exhortación y además es gramaticalmente torpe.'
  spanish_quality_summary: 'El texto es generalmente claro y de registro bíblico legible, pero presenta dos problemas de naturalidad importantes: «a los desnudos» suena menos idiomático que «al desnudo» o «a los que no tienen ropa» en este contexto distributivo, y sobre todo «no deje tu ojo de ser envidioso» es una construcción poco natural y semánticamente fallida. Conviene conservar la imagen del ojo, pero con una formulación española comprensible como «que tu ojo no sea mezquino». También «cuando hagas limosna» es entendible, aunque «cuando des limosna» es más natural y sigue expresando ἐν τῷ ποιεῖν… ἐλεημοσύνην.'
  glossary_alignment: No hay conflicto con la terminología de proyecto. «Limosna» refleja bien ἐλεημοσύνη en este contexto. No aparecen términos sensibles como Yahvé/Mesías. La preservación de la metáfora del ojo concuerda con la decisión auditada del POB, pero debe hacerse con un español idiomático.
  issues:
  - severity: high
    issue: La cláusula final invierte o distorsiona la exhortación
    rationale: «No deje tu ojo de ser envidioso» no comunica «no permitas que tu ojo sea envidioso/mezquino», sino algo cercano a «no deje de serlo», lo cual contradice μὴ φθονεσάτω.
  - severity: medium
    issue: La expresión española del modismo del ojo es poco natural
    rationale: Aunque conviene preservar la imagen, «ser envidioso» aplicado al ojo suena forzado en español bíblico actual. «Que tu ojo no sea mezquino» o «no sea avaro tu ojo» comunica mejor el sentido de renuencia al dar.
  - severity: low
    issue: «A los desnudos» puede sonar menos idiomático en singular distributivo
    rationale: El griego τοῖς γυμνοῖς es plural genérico, pero en español «al desnudo» o «a los que no tienen ropa» suele leerse con más fluidez. No obstante, no es un error grave.
  revised_spanish_text: Da de tu pan al hambriento[a], y de tus vestidos al desnudo. Todo lo que te sobre, hazlo limosna, y que tu ojo no sea mezquino[b] cuando des limosna.
