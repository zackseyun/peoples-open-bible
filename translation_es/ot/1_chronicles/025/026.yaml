lexical_decisions:
- source_word: לְ/תִשְׁעָה עָשָׂר
  english_pob_choice: for the nineteenth
  chosen_spanish: para el decimonoveno
  alternatives_spanish:
  - para el diecinueve
  - para el decimonoveno sorteo
  - para la decimonovena asignación
  lexicon: HALOT
  rationale: El hebreo usa un ordinal dentro de una fórmula de reparto. En español, 'para el decimonoveno' conserva el valor ordinal y la función administrativa de la lista sin introducir una glosa no atestiguada en el texto.
- source_word: לְ/מַלּוֹתִי
  english_pob_choice: Mallothi
  chosen_spanish: Mallothi
  alternatives_spanish:
  - Malloti
  lexicon: HALOT
  rationale: Es un nombre propio; se translitera. Se mantiene la forma convencional 'Mallothi', coherente con la tradición de transliteración del nombre.
- source_word: בָּנָיו
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus hijos
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'sus hijos'. En español, 'hijos' reproduce el término sin forzar una marca masculina redundante, y sigue siendo compatible con el dato genealógico del contexto.
- source_word: וְ/אֶחָיו
  english_pob_choice: and his brothers
  chosen_spanish: y sus hermanos
  alternatives_spanish:
  - y sus parientes
  - y sus hermanos
  lexicon: HALOT
  rationale: '''Hermanos'' es el sentido básico de אחים y el inglés auditado también lo conserva. En este listado administrativo puede incluir una relación de clan más amplia, pero el texto base no obliga a ampliarla en la traducción principal.'
- source_word: שְׁנֵים עָשָׂר
  english_pob_choice: twelve
  chosen_spanish: doce
  alternatives_spanish:
  - doce
  lexicon: HALOT
  rationale: Número cardinal directo; se traduce sin ajuste adicional.
