review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia narrativa y la mayoría de las decisiones léxicas del hebreo: David se levantó, el pueblo con él, cruzaron el Jordán, y al amanecer no faltaba nadie sin cruzar. Sin embargo, la frase temporal עַד אוֹר הַבֹּקֶר está mal resuelta en español como «Para la luz de la mañana», construcción poco natural y semánticamente imprecisa para un límite temporal. También el anclaje de la nota [a] está colocado sobre «se levantó», cuando la nota explica la frase de la luz de la mañana.'
  spanish_quality_summary: El texto es mayormente claro, pero «Para la luz de la mañana» suena forzado y no corresponde al español natural ni al valor temporal del hebreo. Además, la nota al pie está anclada en el lugar equivocado. «Todo el pueblo» es aceptable, aunque en español bíblico también podría considerarse «toda la gente»; no hace falta cambiarlo. El resto del verso es legible y digno.
  glossary_alignment: No hay términos del glosario mayor que entren en juego aquí. Las decisiones «se levantó», «cruzaron el Jordán» y «no faltó ni uno» son compatibles con la evidencia fuente y con el enfoque POB. La principal corrección requerida es una formulación temporal española que preserve, hasta donde sea posible, la imagen de la luz matutina sin sacrificar naturalidad.
  issues:
  - severity: high
    issue: La frase «Para la luz de la mañana» es una mala solución para עַד אוֹר הַבֹּקֶר.
    rationale: El hebreo marca el punto temporal para cuando el cruce ya estaba completado. «Para la luz de la mañana» no es una expresión idiomática natural en español y puede sugerir finalidad en vez de límite temporal. «Al amanecer» o «con la luz de la mañana» comunican mejor el sentido; si se quiere preservar la imagen léxica de «luz», una nota puede retener la alternativa «hasta la luz de la mañana».
  - severity: high
    issue: La nota [a] está anclada en «se levantó» pero explica la frase temporal de la mañana.
    rationale: Las notas deben aparecer exactamente en la palabra o frase relevante. Aquí la nota trata de עַד אוֹר הַבֹּקֶר, no de וַיָּקָם.
  - severity: low
    issue: La doble coordinación con «y» antes de «cruzaron» es algo pesada en español.
    rationale: Refleja el polisíndeton hebreo, pero en español puede mantenerse sin ser incorrecta. No exige cambio mayor, aunque una puntuación más fluida ayuda.
  revised_spanish_text: Entonces David se levantó, y todo el pueblo que estaba con él cruzó el Jordán. Al amanecer[a], no faltó ni uno que no hubiera cruzado el Jordán.
  revised_footnotes:
  - marker: a
    text: 'O: «hasta la luz de la mañana»; el hebreo conserva la imagen de la luz matutina mientras señala el momento para el cual terminó el cruce.'
    reason: lexical_alternative
  revision_rationale: Se corrigió la frase temporal a «Al amanecer» para lograr un español natural y fiel al valor temporal del hebreo, mientras la nota conserva la alternativa más literal con «luz». También se movió la nota al lugar correcto y se aligeró levemente la coordinación para mejorar la legibilidad sin perder sentido.
