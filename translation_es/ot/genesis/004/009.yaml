translation:
  language: es
  text: 'Entonces Yahvé dijo a Caín: «¿Dónde está Abel, tu hermano?» Y él dijo: «No lo sé[a]. ¿Acaso soy yo el guardián de mi hermano?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «No lo sabía». El perfecto hebreo puede traducirse como una negación en pasado, aunque en el contexto funciona de manera natural como una afirmación presente de ignorancia.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del Tetragrámaton, siguiendo el criterio POB de no sustituirlo por un título. «Yahvé» es la forma más reconocible y publicada en español dentro de una traducción transparente.
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said / And he said
  chosen_spanish: Entonces ... dijo / Y él dijo
  alternatives_spanish:
  - dijo
  - y dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «Entonces» en la primera cláusula y «Y» en la segunda reproducen ese flujo narrativo sin forzar el español.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  - hacia
  lexicon: HALOT
  rationale: La preposición marca dirección de habla; «a» es la equivalencia natural en español.
- source_word: אֵי
  english_pob_choice: Where is
  chosen_spanish: ¿Dónde está?
  alternatives_spanish:
  - ¿Dónde?
  - ¿En dónde está?
  lexicon: HALOT
  rationale: La pregunta de ubicación requiere el verbo copulativo en español para sonar natural y fiel al sentido interrogativo del hebreo.
- source_word: הֶבֶל
  english_pob_choice: Abel
  chosen_spanish: Abel
  lexicon: HALOT
  rationale: Nombre propio transliterado de manera estándar.
- source_word: אָחִיךָ
  english_pob_choice: your brother
  chosen_spanish: tu hermano
  alternatives_spanish:
  - tu hermano varón
  - tu pariente
  lexicon: HALOT
  rationale: El hebreo usa el sustantivo masculino singular «hermano» con sufijo de segunda persona masculina singular; se mantiene la fuerza fraterna explícita.
- source_word: לֹא יָדַעְתִּי
  english_pob_choice: I do not know
  chosen_spanish: No lo sé
  alternatives_spanish:
  - No sabía
  - No lo supe
  lexicon: HALOT
  rationale: Aunque el perfecto hebreo puede leerse como negación pasada, en el diálogo funciona como una negativa de conocimiento actual; «No lo sé» expresa esa función discursiva con naturalidad.
- source_word: הֲשֹׁמֵר
  english_pob_choice: keeper
  chosen_spanish: guardián
  alternatives_spanish:
  - guarda
  - vigilante
  - el que cuida
  lexicon: HALOT
  rationale: Se conserva el matiz de responsabilidad de שמר sin diluirlo en una paráfrasis; «guardián» comunica bien la pregunta retórica por la custodia/responsabilidad.
- source_word: אָחִי
  english_pob_choice: my brother
  chosen_spanish: de mi hermano
  alternatives_spanish:
  - a mi hermano
  - mi hermano
  lexicon: HALOT
  rationale: El hebreo usa la construcción posesiva «mi hermano» dentro de la pregunta; en español, la pregunta idiomática queda mejor como «el guardián de mi hermano».
- source_word: אָנֹכִי
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - soy yo
  - yo mismo
  lexicon: HALOT
  rationale: El pronombre independiente aporta énfasis; en español puede expresarse de forma natural en la pregunta «¿Acaso soy yo...?».
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo emplea directamente el nombre del pacto. Se evita la sustitución por un título para preservar la transparencia y la decisión doctrinal del POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y el control cruzado reportó alto acuerdo (1.0). La redacción española mantiene ese consenso, especialmente en el nombre divino, la pregunta retórica y la negación de conocimiento.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma del nombre divino, en coherencia con el criterio POB.
  - Se conserva el masculino explícito de «hermano» sin neutralizarlo.
  - «Guardián» refleja mejor la función relacional y retórica de הֲשֹׁמֵר en esta pregunta que opciones más genéricas.
  - La nota al pie se ancla en la negación «No lo sé» para preservar la alternativa del perfecto hebreo.
