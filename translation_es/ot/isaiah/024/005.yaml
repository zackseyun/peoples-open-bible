translation:
  language: es
  text: La tierra está contaminada bajo sus habitantes, porque han transgredido las leyes, han violado[a] un estatuto y han quebrantado el pacto eterno[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «han cambiado un estatuto». El verbo hebreo también puede llevar el sentido de alterar o sobrepasar una ordenanza establecida.
    reason: lexical_alternative
  - marker: b
    text: «El pacto eterno» no se identifica explícitamente aquí; intérpretes lo relacionan de diversas maneras con el pacto con Noé o con el orden moral permanente de Dios para la humanidad.
    reason: alternative_reading
lexical_decisions:
- source_word: חָנְפָה
  english_pob_choice: is defiled
  chosen_spanish: está contaminada
  alternatives_spanish:
  - está defilada
  - está profanada
  - está impura
  lexicon: HALOT
  rationale: En este contexto la idea es una contaminación moral del suelo por el pecado humano. «Contaminada» comunica bien el estado resultante en español sin limitarlo solo a impureza ritual.
- source_word: תַּחַת
  english_pob_choice: under
  chosen_spanish: bajo
  alternatives_spanish:
  - debajo de
  - a causa de
  - por
  lexicon: HALOT
  rationale: «Bajo» conserva la imagen espacial del hebreo y funciona naturalmente en español con el sentido de condición o carga sobre sus habitantes.
- source_word: יֹשְׁבֶיהָ
  english_pob_choice: its inhabitants
  chosen_spanish: sus habitantes
  alternatives_spanish:
  - los que habitan en ella
  - sus moradores
  lexicon: HALOT
  rationale: Es una forma idiomática y colectiva en español que conserva el referente de la tierra sin añadir matices extra.
- source_word: עָבְרוּ
  english_pob_choice: have transgressed
  chosen_spanish: han transgredido
  alternatives_spanish:
  - han cruzado
  - han violado
  - han pasado por encima de
  lexicon: HALOT
  rationale: En un contexto legal-moral, «transgredido» reproduce con precisión la idea de quebrantar límites o mandatos.
- source_word: תוֹרֹת
  english_pob_choice: laws
  chosen_spanish: las leyes
  alternatives_spanish:
  - las instrucciones
  - las enseñanzas
  lexicon: HALOT
  rationale: El plural aquí apunta a normas vinculantes; «leyes» comunica mejor ese peso legal que «instrucciones» en español moderno.
- source_word: חָלְפוּ
  english_pob_choice: violated
  chosen_spanish: han violado
  alternatives_spanish:
  - han cambiado
  - han sobrepasado
  - han trastocado
  lexicon: HALOT
  rationale: La POB inglés deja abierta una posible idea de «cambiar»; en español «han violado» preserva la fuerza de ruptura normativa en paralelo con «han transgredido».
- source_word: חֹק
  english_pob_choice: a statute
  chosen_spanish: un estatuto
  alternatives_spanish:
  - un estatuto establecido
  - un decreto
  - una ordenanza
  lexicon: HALOT
  rationale: «Un estatuto» mantiene el singular genérico y refleja una norma establecida, sin convertir el término en algo demasiado técnico o eclesiástico.
- source_word: הֵפֵרוּ
  english_pob_choice: broken
  chosen_spanish: han quebrantado
  alternatives_spanish:
  - han roto
  - han violado
  - han anulado
  lexicon: HALOT
  rationale: Para un pacto, «quebrantado» es natural y fiel en español bíblico contemporáneo, conservando la imagen de romper una obligación vinculante.
- source_word: בְּרִית עוֹלָם
  english_pob_choice: the everlasting covenant
  chosen_spanish: el pacto eterno
  alternatives_spanish:
  - el pacto perpetuo
  - la alianza eterna
  lexicon: HALOT
  rationale: «Pacto eterno» conserva el alcance duradero del hebreo. Se evita identificarlo en la traducción con un pacto específico, siguiendo la cautela documental de la POB.
theological_decisions:
- issue: Referente de «el pacto eterno»
  english_pob_reading: Render generically as 'the everlasting covenant' without specifying Noahic, creation, or Mosaic covenant in the main text.
  chosen_spanish_reading: Traducirlo de manera genérica como «el pacto eterno» sin identificarlo en el texto principal.
  alternative_spanish_readings:
  - el pacto noéico
  - el orden moral creado expresado como pacto
  - un pacto eterno entre Dios y la humanidad
  rationale: El hebreo no nombra explícitamente cuál pacto es. Mantener la formulación amplia evita resolver una tensión teológica que el texto no resuelve y deja abierta la identificación interpretativa.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La versión inglesa POB más reciente indica que no hubo cambios en la última revisión; este borrador español sigue ese estado estable y conserva la misma prudencia lexical y teológica.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término por defecto cuando aparezca el nombre divino, aunque este versículo no lo contiene.
  - «Pacto» se usa para בְּרִית en coherencia con la terminología POB cuando el contexto es covenantal.
  - 'Se conserva la fuerza legal de la serie verbal: transgredido / violado / quebrantado, sin suavizarla a un mero incumplimiento.'
