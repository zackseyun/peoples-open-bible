  to: Entonces sus siervos dijeron a David estas palabras[a], y el asunto le pareció bien a David, para llegar a ser yerno del rey[b]; y los días aún no se habían cumplido[c].
  rationale: 'Se hizo una reparación menor para mejorar la naturalidad del español sin perder el sentido del hebreo ni la documentación del POB: «le pareció bien a David» comunica mejor la aprobación de la propuesta, mientras la nota conserva la literalidad del modismo «recto en los ojos». También se limpió el formato de la nota a.'
