theological_decisions:
- issue: Sense of the final infinitive לְהַחֲיֹתוֹ
  chosen_reading: to preserve his life
  alternative_readings:
  - that he might live
  - and live
  rationale: The Hebrew allows a straightforward life-oriented result/purpose clause. The translation avoids importing a specifically eternal-salvation reading; in Ezekiel, the phrase often concerns life in covenantal judgment context and should remain broad enough to preserve that tension.
  doctrine_reference: Preserve theological tension rather than resolve it.
