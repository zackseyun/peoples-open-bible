translation:
  language: es
  text: Y lo llamó[a]; él entró y se saludaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El texto griego aquí es muy breve: «Y lo llamó; él entró y se saludaron». Una tradición semítica más amplia de Tobit conserva un diálogo más extenso en este punto, pero el texto principal sigue el testimonio griego disponible para esta traducción.'
    reason: textual_variant
lexical_decisions:
- source_word: ἐκάλεσεν
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - lo llamó
  - le llamó
  - lo convocó
  lexicon: καλέω
  rationale: En este contexto narrativo breve, «llamó» reproduce el acto simple de hacer venir a alguien sin añadir formalidad. «Convocó» suena demasiado solemne, y «invitó» sugiere una intención que el griego no explicita.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - le
  lexicon: pronombre objeto masculino singular
  rationale: El objeto directo del verbo en español queda naturalmente como «lo». Mantiene la referencia masculina singular sin expandir el referente, que ya está claro en el contexto.
- source_word: εἰσῆλθεν
  english_pob_choice: went in
  chosen_spanish: entró
  alternatives_spanish:
  - se metió
  - pasó adentro
  lexicon: εἰσέρχομαι
  rationale: «Entró» expresa de modo natural el movimiento de ingreso y conserva el sentido del verbo griego. «Fue adentro» o «pasó adentro» serían más coloquiales; «entró» es más directo y digno.
- source_word: ἠσπάσαντο
  english_pob_choice: greeted
  chosen_spanish: se saludaron
  alternatives_spanish:
  - se dieron la bienvenida
  - se abrazaron
  lexicon: ἀσπάζομαι
  rationale: El verbo indica saludo o expresión de cortesía. «Se saludaron» comunica bien la reciprocidad sin añadir un gesto físico que el texto no menciona. «Se abrazaron» sería demasiado específico.
- source_word: ἀλλήλους
  english_pob_choice: one another
  chosen_spanish: mutuamente
  alternatives_spanish:
  - el uno al otro
  - entre sí
  lexicon: ἀλλήλους
  rationale: «Mutuamente» conserva la reciprocidad del pronombre sin volver la frase pesada. «El uno al otro» es posible, pero menos fluido en español contemporáneo.
translation_notes:
  revision_awareness: El texto griego de Tobit 5:10 es conciso y coincide de cerca con la línea base inglesa auditada; no se observan revisiones materiales aplicables a esta unidad. Se mantiene la misma decisión de seguir el testimonio griego breve, señalando en nota la existencia de una tradición semítica más desarrollada.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evita «Cristo/Mesías» porque no aparecen en el texto.
  - «Se saludaron mutuamente» preserva la reciprocidad del griego ἀλλήλους sin añadir abrazo ni hospitalidad explícita.
  - La nota a pie de página está anclada en la llamada [a] junto a «llamó», siguiendo el modelo auditado en inglés.
