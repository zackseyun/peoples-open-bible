translation:
  language: es
  text: 'La palabra que vino a Jeremías de parte de Yahvé después de que el rey Sedequías había hecho un pacto[a] con todo el pueblo que estaba en Jerusalén, para proclamarles libertad[b]:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «cortar un pacto».
    reason: lexical_alternative
  - marker: b
    text: O «liberación» o «emancipación». El término hebreo se refiere a una liberación formal, de tipo jurídico.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַדָּבָר
  english_pob_choice: The word
  chosen_spanish: La palabra
  alternatives_spanish:
  - Esta palabra
  - El mensaje
  lexicon: HALOT
  rationale: Mantiene la fórmula profética concreta y recurrente del hebreo. "Palabra" conserva mejor que "mensaje" el valor técnico de introducción profética.
- source_word: הָיָה אֶל
  english_pob_choice: came to
  chosen_spanish: vino a
  alternatives_spanish:
  - llegó a
  - se dirigió a
  lexicon: HALOT
  rationale: En la fórmula profética, הָיָה אֶל expresa la llegada de una revelación al profeta. "Vino a" reproduce bien ese movimiento sin forzar una paráfrasis.
- source_word: מֵאֵת יְהוָה
  english_pob_choice: from Yahweh
  chosen_spanish: de parte de Yahvé
  alternatives_spanish:
  - de Yahvé
  - de parte del SEÑOR
  lexicon: HALOT
  rationale: Sigue el criterio del proyecto de traducir יְהוָה como "Yahvé". "De parte de" expresa mejor el origen y procedencia del mensaje profético en español natural.
- source_word: כְּרֹת בְּרִית
  english_pob_choice: had made a covenant
  chosen_spanish: había hecho un pacto
  alternatives_spanish:
  - había cortado un pacto
  - había concertado un pacto
  lexicon: HALOT
  rationale: En español bíblico, "hacer un pacto" comunica con claridad la relación pactal. Se conserva en nota la literalidad hebrea de "cortar" para no borrar la imagen idiomática.
- source_word: בְּרִית
  english_pob_choice: a covenant
  chosen_spanish: un pacto
  alternatives_spanish:
  - un convenio
  - una alianza
  lexicon: HALOT
  rationale: Aquí "pacto" es el equivalente más natural y bíblicamente reconocido en español para בְּרִית. "Alianza" o "convenio" suavizan demasiado la carga formal del término.
- source_word: אֶת כָּל הָעָם אֲשֶׁר בִּירוּשָׁלִַם
  english_pob_choice: with all the people who were in Jerusalem
  chosen_spanish: con todo el pueblo que estaba en Jerusalén
  alternatives_spanish:
  - con toda la gente que estaba en Jerusalén
  - con todo el pueblo en Jerusalén
  lexicon: HALOT
  rationale: '"Pueblo" conserva הָעָם con el alcance colectivo del texto; la cláusula relativa expresa la ubicación de manera fiel y natural.'
- source_word: לִקְרֹא לָהֶם
  english_pob_choice: to proclaim to them
  chosen_spanish: para proclamarles
  alternatives_spanish:
  - para anunciarles
  - para declararles
  lexicon: HALOT
  rationale: El contexto legal-emancipatorio exige un verbo público y formal. "Proclamar" refleja bien קרא con דְּרוֹר como objeto implícito.
- source_word: דְּרוֹר
  english_pob_choice: liberty
  chosen_spanish: libertad
  alternatives_spanish:
  - liberación
  - emancipación
  lexicon: HALOT
  rationale: El término designa libertad formal de liberación/manumisión. "Libertad" es idiomática en español y preserva el peso legal del término; "emancipación" se explicita en nota como trasfondo.
- source_word: צִדְקִיָּהוּ
  english_pob_choice: Zedekiah
  chosen_spanish: Sedequías
  alternatives_spanish:
  - Zedequías
  lexicon: HALOT
  rationale: Se usa la forma española tradicional del nombre propio, plenamente comprensible y estable en la literatura bíblica.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: El proyecto pide renderizar el Tetragrámaton como "Yahvé" en el texto principal. Esto preserva la identidad del nombre pactal sin recurrir a una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: דְּרוֹר como término jurídico de liberación
  english_pob_reading: liberty
  chosen_spanish_reading: libertad
  alternative_spanish_readings:
  - liberación
  - emancipación
  rationale: En este contexto el término alude a una liberación formal proclamada públicamente; "libertad" es la forma más natural en español y no pierde el sentido jurídico. La nota conserva la posibilidad de "liberación"/"emancipación".
  doctrine_reference: Jeremiah 34 context of manumission and covenant renewal
translation_notes:
  revision_awareness: 'El pasaje coincide ampliamente con el contexto inglés auditado: se mantiene la fórmula profética, el nombre divino como Yahvé, el nombre propio Sedequías, y el sentido jurídico de דְּרוֹר. No hubo revisiones textuales relevantes en el pass más reciente; se conservó la lectura de alta concordancia.'
  spanish_consistency_notes:
  - Se mantuvo "Yahvé" por consistencia con el estándar del proyecto para יְהוָה.
  - Se prefirió "pacto" en la decisión léxica, pero el texto principal usa "pacto" con nota sobre la metáfora hebrea de "cortar".
  - La puntuación con dos puntos refleja la cadencia del encabezado profético y la clausula final de finalidad.
  - Se usó "pueblo" para הָעָם y "proclamarles" para conservar el tono legal y solemne del enunciado.
