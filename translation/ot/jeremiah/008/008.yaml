id: JER.8.8
reference: Jeremiah 8:8
source:
  edition: WLC
  text: אֵיכָ֤ה תֹֽאמְרוּ֙ חֲכָמִ֣ים אֲנַ֔חְנוּ וְ/תוֹרַ֥ת יְהוָ֖ה אִתָּ֑/נוּ אָכֵן֙ הִנֵּ֣ה לַ/שֶּׁ֣קֶר עָשָׂ֔ה עֵ֖ט שֶׁ֥קֶר סֹפְרִֽים׃
translation:
  text: How can you say[a], ‘We are wise, and the law of Yahweh is with us’? But look, the lying pen of the scribes has made it into a lie.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Surely, look, the pen of the scribes has made falsehood,” or “the false pen of the scribes has worked falsely.” The Hebrew is compact and allows more than one way of expressing the scribes’ falsification.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵיכָה
  chosen: How can
  alternatives:
  - How
  - Why
  lexicon: HALOT
  rationale: Introduces an indignant rhetorical question. 'How can' brings out the incredulous force in natural English better than a bare 'How'.
- source_word: חֲכָמִים אֲנַחְנוּ
  chosen: We are wise
  alternatives:
  - We are sages
  lexicon: HALOT
  rationale: חכמים denotes those claiming wisdom. 'Wise' is the most natural English rendering here; 'sages' is possible but sounds more specialized than the context requires.
- source_word: תּוֹרַת יְהוָה
  chosen: the law of the LORD
  alternatives:
  - the instruction of the LORD
  lexicon: HALOT
  rationale: תורה can mean 'instruction,' but in Jeremiah this phrase commonly evokes the covenantal law/instruction associated with YHWH. 'Law' preserves the established covenantal and textual sense, while remaining understandable. The divine name follows doctrine default as 'the LORD'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אִתָּנוּ
  chosen: is with us
  alternatives:
  - belongs to us
  - is among us
  lexicon: HALOT
  rationale: The preposition with pronoun most naturally means 'with us.' This preserves the claim that they possess or stand under divine torah without overinterpreting it.
- source_word: אָכֵן הִנֵּה
  chosen: But look
  alternatives:
  - Surely, behold
  - Indeed, look
  lexicon: HALOT
  rationale: The pair marks emphatic rebuttal and attention shift. 'But look' captures the adversative turn and deictic force in readable modern English.
- source_word: לַשֶּׁקֶר
  chosen: into a lie
  alternatives:
  - for falsehood
  - falsely
  - into falsehood
  lexicon: HALOT
  rationale: The phrase modifies the result of the scribes' action. Rendering it as 'into a lie' makes explicit the resultative sense in idiomatic English and matches the repeated שקר wordplay.
- source_word: עָשָׂה
  chosen: has made
  alternatives:
  - made
  - has worked
  lexicon: HALOT
  rationale: The verb means 'do/make.' 'Has made' fits the completed-result sense in context and works smoothly with the object-complement construction.
- source_word: עֵט
  chosen: pen
  alternatives:
  - stylus
  lexicon: HALOT
  rationale: Refers to a writing implement. 'Pen' is the standard accessible equivalent; 'stylus' is more technically precise but less natural for general readers.
- source_word: שֶׁקֶר סֹפְרִים
  chosen: the lying pen of the scribes
  alternatives:
  - the false pen of the scribes
  - the pen of the scribes is a lie
  lexicon: HALOT
  rationale: 'The construct chain is compressed and somewhat difficult. This rendering takes שקר attributively with עט: the scribes'' pen is characterized by falsehood. It preserves the accusation against the scribal handling of torah. An alternative construal is preserved in a footnote because the Hebrew syntax allows different nuances.'
