translation:
  language: es
  text: Boca a boca[a] hablo con él, claramente y no en enigmas; y contempla la forma de Yahvé[b]. Entonces, ¿por qué no tuvieron temor de hablar contra mi siervo, contra Moisés?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cara a cara». El hebreo dice literalmente «boca a boca», enfatizando el habla directa.
    reason: lexical_alternative
  - marker: b
    text: O «la semejanza de Yahvé» o «la apariencia de Yahvé».
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶּה אֶל פֶּה
  english_pob_choice: Mouth to mouth
  chosen_spanish: Cara a cara
  alternatives_spanish:
  - Boca a boca
  - De boca en boca
  lexicon: HALOT
  rationale: El hebreo dice literalmente «boca a boca», pero en español «cara a cara» comunica con naturalidad la idea de comunicación directa e inmediata. Mantiene la fuerza idiomática sin sonar mecánico.
- source_word: אֲדַבֶּר בּוֹ
  english_pob_choice: I speak with him
  chosen_spanish: hablo con él
  alternatives_spanish:
  - hablo a él
  - hablo con él directamente
  lexicon: HALOT
  rationale: El verbo con ב expresa trato/conversación con alguien; «con él» refleja mejor esa relación que un simple «a él» y sigue siendo natural en español.
- source_word: וּמַרְאֶה
  english_pob_choice: plainly
  chosen_spanish: claramente
  alternatives_spanish:
  - de manera clara
  - abiertamente
  lexicon: HALOT
  rationale: Aquí el sustantivo contrasta con «enigmas» y funciona adverbialmente. «Claramente» conserva la idea de comunicación transparente sin forzar un sustantivo español.
- source_word: בְחִידֹת
  english_pob_choice: riddles
  chosen_spanish: enigmas
  alternatives_spanish:
  - acertijos
  - adivinanzas
  - riddles
  lexicon: HALOT
  rationale: חִידוֹת puede referirse a dichos enigmáticos; «enigmas» suena más solemne y abarca mejor el sentido de habla oscura que solo «acertijos».
- source_word: וּתְמֻנַת יְהוָה
  english_pob_choice: the form of Yahweh
  chosen_spanish: la forma de Yahvé
  alternatives_spanish:
  - la semejanza de Yahvé
  - la apariencia de Yahvé
  lexicon: HALOT
  rationale: תְּמוּנָה admite «forma», «semejanza» o «apariencia». Se mantiene «forma» para conservar la concreción del texto y la decisión del POB en inglés, junto con el nombre divino Yahvé según la política del proyecto.
- source_word: יַבִּיט
  english_pob_choice: he beholds
  chosen_spanish: contempla
  alternatives_spanish:
  - ve
  - mira
  - contempla
  lexicon: HALOT
  rationale: El verbo implica mirar con intención. «Contempla» eleva el registro y comunica mejor la solemnidad del contexto que un simple «ve».
- source_word: וּמַדּוּעַ
  english_pob_choice: So why
  chosen_spanish: Entonces, ¿por qué
  alternatives_spanish:
  - Y, ¿por qué
  - ¿Por qué entonces
  lexicon: HALOT
  rationale: La partícula introduce una conclusión retórica; «Entonces, ¿por qué» reproduce bien el enlace inferencial y el tono de reprensión.
- source_word: לֹא יְרֵאתֶם
  english_pob_choice: were you not afraid
  chosen_spanish: no tuvieron temor
  alternatives_spanish:
  - no temieron
  - no les dio temor
  lexicon: HALOT
  rationale: En este contexto de reprensión, ירא expresa falta culpable de temor/reverencia. «No tuvieron temor» conserva esa fuerza y es natural en español.
- source_word: לְדַבֵּר בְּעַבְדִּי בְמֹשֶׁה
  english_pob_choice: to speak against my servant, against Moses
  chosen_spanish: de hablar contra mi siervo, contra Moisés
  alternatives_spanish:
  - de hablar contra mi siervo Moisés
  - de hablar contra Moisés, mi siervo
  lexicon: HALOT
  rationale: 'El ב repetido marca el objeto de habla hostil; «hablar contra» expresa la fuerza adversativa. Se conserva la aposición con una pausa para claridad: «mi siervo, contra Moisés».'
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  - Jehová
  rationale: Se sigue la política del proyecto de nombrar el Tetragrámaton como «Yahvé» en el texto principal, evitando la sustitución por «SEÑOR» y preservando el nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Revelación singular concedida a Moisés
  english_pob_reading: the form of Yahweh
  chosen_spanish_reading: la forma de Yahvé
  alternative_spanish_readings:
  - la semejanza de Yahvé
  - la apariencia de Yahvé
  rationale: «Forma» mantiene la afirmación de una revelación extraordinariamente directa sin explicar en exceso la modalidad de esa manifestación; así se preserva la tensión teológica del pasaje.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La versión inglesa auditada mantiene la decisión óptima de conservar el contraste literal/idiomático y no requiere cambios; la drafta española sigue esa línea con equivalentes naturales y mantiene la tensión sobre la forma de la revelación.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente con la política del proyecto para el Tetragrámaton.
  - Se prefirió «hablar contra» para reflejar el valor adversativo del verbo con ב.
  - Se mantuvo un registro reverente pero claro, adecuado para lectura eclesial.
