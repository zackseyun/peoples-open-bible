translation:
  language: es
  text: Y los principales sacerdotes y los escribas buscaban cómo matarlo[a], porque temían al pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cómo podían darle muerte».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐζήτουν
  english_pob_choice: were seeking
  chosen_spanish: buscaban
  alternatives_spanish:
  - estaban buscando
  - se hallaban buscando
  lexicon: BDAG
  rationale: El imperfecto griego expresa acción continua o reiterada en el pasado. En español, «buscaban» comunica ese trasfondo durativo de manera natural y digna, sin perder la intención persistente del verbo.
- source_word: ἀρχιερεῖς
  english_pob_choice: chief priests
  chosen_spanish: principales sacerdotes
  alternatives_spanish:
  - sumos sacerdotes
  - jefes de los sacerdotes
  lexicon: BDAG
  rationale: «Principales sacerdotes» conserva la referencia al grupo dirigente sacerdotal y evita la ambigüedad de «sumos sacerdotes» en plural, que puede sonar menos natural o sugerir una categoría técnica distinta en español.
- source_word: γραμματεῖς
  english_pob_choice: scribes
  chosen_spanish: escribas
  alternatives_spanish:
  - maestros de la Ley
  - doctores de la Ley
  lexicon: BDAG
  rationale: «Escribas» reproduce de forma directa el término narrativo griego. Las alternativas explican más de lo que el texto dice y desplazan el término hacia una interpretación.
- source_word: τὸ πῶς
  english_pob_choice: how
  chosen_spanish: cómo
  alternatives_spanish:
  - de qué manera
  - la forma en que
  lexicon: BDAG
  rationale: La construcción con artículo y πῶς funciona idiomáticamente como «cómo». En español, «buscaban cómo...» mantiene la sencillez y la intención deliberativa del griego.
- source_word: ἀνέλωσιν
  english_pob_choice: might kill
  chosen_spanish: matarlo
  alternatives_spanish:
  - hacerlo morir
  - quitarlo de en medio
  - darle muerte
  lexicon: BDAG
  rationale: El verbo ἀναιρέω aquí indica quitar la vida. «Matarlo» expresa esa fuerza con claridad y evita suavizar la hostilidad. La nota conserva la alternativa lexical documentada de «ponerlo a muerte».
- source_word: ἐφοβοῦντο
  english_pob_choice: were afraid
  chosen_spanish: temían
  alternatives_spanish:
  - estaban temiendo
  - tenían miedo
  lexicon: BDAG
  rationale: El imperfecto presenta un estado continuo en el pasado. «Temían» mantiene esa duratividad con un registro sobrio; «tenían miedo» sería más coloquial.
- source_word: τὸν λαόν
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la multitud
  lexicon: BDAG
  rationale: 'En este contexto λαός designa al colectivo del pueblo, no una muchedumbre momentánea. «El pueblo» conserva mejor la tensión narrativa: los líderes temen la reacción pública.'
theological_decisions:
- issue: Intensidad del plan homicida expresado por ἀνέλωσιν
  english_pob_reading: Rendered as 'kill him' without softening the hostility or specifying a formal execution process.
  chosen_spanish_reading: «matarlo» sin atenuarlo ni juridizarlo.
  alternative_spanish_readings:
  - «ponerlo a muerte»
  - «hacerlo morir»
  - «destruirlo»
  rationale: El contexto muestra intención hostil clara. «Matarlo» preserva la gravedad del texto y no introduce un procedimiento legal que el griego no especifica aquí.
  doctrine_reference: Translation philosophy §1, §6
- issue: Sentido colectivo de λαός y su función narrativa
  english_pob_reading: Rendered collectively as 'the people.'
  chosen_spanish_reading: «el pueblo» como colectivo social.
  alternative_spanish_readings:
  - «la gente»
  - «la multitud»
  rationale: '«El pueblo» mantiene la referencia colectiva amplia y deja intacta la tensión narrativa: los líderes obran con temor a la reacción pública.'
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: El texto griego y la auditoría inglesa concuerdan plenamente en el valor imperfectivo de ἐζήτουν/ἐφοβοῦντο, en el sentido de ἀναιρέω como quitar la vida y en la referencia colectiva de λαός. No se registran revisiones aplicadas en la fuente inglesa; por tanto, la versión española sigue esa lectura estable sin añadir matices no sustentados.
  spanish_consistency_notes:
  - Se mantuvo un registro narrativo sobrio y directo, acorde con el estilo POB.
  - Se prefirió la equivalencia funcional «principales sacerdotes» para evitar una formulación más técnica o menos idiomática.
  - «Temían» preserva el imperfecto sin volver pesada la frase.
  - La nota textual usa una alternativa verbal documentada sin desplazar el sentido principal del cuerpo del texto.
