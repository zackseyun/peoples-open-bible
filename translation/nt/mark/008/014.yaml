id: MRK.8.14
reference: Mark 8:14
source:
  edition: SBLGNT
  text: Καὶ ἐπελάθοντο λαβεῖν ἄρτους, καὶ εἰ μὴ ἕνα ἄρτον οὐκ εἶχον μεθ’ ἑαυτῶν ἐν τῷ πλοίῳ.
translation:
  text: And they had forgotten to take bread[a], and except for one loaf they had no bread with them in the boat.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “they had forgotten to take loaves.” The plural ἄρτους may refer to individual loaves, but here it likely means bread/provisions in general.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπελάθοντο
  chosen: had forgotten
  alternatives:
  - forgot
  - neglected
  lexicon: BDAG
  rationale: Aorist middle of ἐπιλανθάνομαι conveys that the disciples forgot; English pluperfect fits the narrative context, explaining their present lack of provisions.
- source_word: λαβεῖν
  chosen: to take
  alternatives:
  - to bring
  - to get
  lexicon: BDAG
  rationale: 'Infinitive complements ἐπελάθοντο: they forgot to take/bring bread along. ''Take'' is a natural and sufficiently literal rendering.'
- source_word: ἄρτους
  chosen: bread
  alternatives:
  - loaves
  lexicon: BDAG
  rationale: Although ἄρτος can mean a loaf, the plural here functions idiomatically for bread/provisions. Rendering it as 'bread' gives natural English while preserving the sense of food supply.
- source_word: εἰ μὴ ἕνα ἄρτον
  chosen: except for one loaf
  alternatives:
  - except one loaf
  - unless it was one loaf
  lexicon: BDAG
  rationale: 'The idiom εἰ μή here is exceptive, not conditional: they had nothing with them except a single loaf. ''One loaf'' preserves the countable sense of ἄρτος in the singular.'
- source_word: οὐκ εἶχον
  chosen: they had no bread
  alternatives:
  - they did not have
  - they had none
  lexicon: BDAG
  rationale: Combined with the exceptive phrase, this expresses lack of provisions. Supplying 'bread' in English clarifies the object from context and avoids an awkward ellipsis.
- source_word: μεθ’ ἑαυτῶν
  chosen: with them
  alternatives:
  - with themselves
  lexicon: BDAG
  rationale: Standard idiomatic rendering of μετά with reflexive pronoun in this context.
- source_word: ἐν τῷ πλοίῳ
  chosen: in the boat
  alternatives:
  - on the boat
  lexicon: BDAG
  rationale: ἐν with πλοῖον is most naturally rendered 'in the boat,' matching the enclosed setting of the narrative.
