- from: Sin embargo, que nadie [a] contienda, ni [b] reprenda a nadie, porque tu pueblo es como los que contienden con un sacerdote.
  to: Sin embargo, que nadie contienda[a], ni nadie reprenda[b], porque tu pueblo es como los que contienden con un sacerdote.
