  text: אַשְׁרֵ֤י הַ/גֶּ֣בֶר אֲשֶׁר תְּיַסְּרֶ֣/נּוּ יָּ֑הּ וּֽ/מִ/תּוֹרָתְ/ךָ֥ תְלַמְּדֶֽ/נּוּ׀־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/094/012.yaml
  text: Blessed is the man whom you discipline[a], O Yah, and teach out of your law[e][d][c][b],
  footnotes:
  - marker: a
    text: Or 'Happy is the man.' The Hebrew beatitude אַשְׁרֵי can denote blessedness, happiness, or flourishing; 'Blessed' is chosen for its fuller theological sense.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the man'; the singular masculine here likely has a representative sense, referring to the person who receives the Lord’s discipline and instruction.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'Yah,' the shortened poetic form of the divine name, distinct from the full tetragrammaton YHWH often rendered 'the LORD.'
    reason: lexical_alternative
  - marker: d
    text: Or 'from your instruction.' Hebrew torah can mean 'law' or more broadly 'instruction.'
    reason: lexical_alternative
  - marker: e
    text: Or 'and whom you teach'.
    reason: previous_rendering
