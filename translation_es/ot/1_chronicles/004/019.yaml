review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue de cerca el hebreo y conserva bien la compresión genealógica entre «hijos» y «padre de», así como los gentilicios de clan. Sin embargo, la nota al pie [a] está anclada en «Hodías» cuando su contenido explica «padre de», no el nombre propio. Además, «Hodías» introduce una adaptación no justificada frente al inglés auditado «Hodiah» y al hebreo הוֹדִיָּה; una forma más directa y estable en español es «Hodía».
  spanish_quality_summary: El español es claro y legible, pero el anclaje de notas es confuso y afecta la usabilidad. «Fueron el padre de» suena extraño, pero esa extrañeza refleja deliberadamente la tensión del hebreo; conviene mantenerla. La revisión propuesta mejora precisión formal sin perder legibilidad.
  glossary_alignment: No hay términos teológicos de proyecto en juego aquí. Los nombres propios y gentilicios están mayormente bien tratados. Se recomienda «Hodía» en vez de «Hodías» por mayor cercanía al hebreo y menor apariencia de reinterpretación. «Queila», «garmita» y «maacatita» son aceptables.
  issues:
  - severity: medium
    issue: La nota [a] está colocada en «Hodías» pero explica «padre de».
    rationale: Los marcadores deben aparecer en la palabra o frase pertinente. Tal como está, induce a pensar que la nota trata del nombre propio, no de la expresión genealógica אבי.
  - severity: medium
    issue: «Hodías» es una adaptación dudosa del nombre הוֹדִיָּה.
    rationale: El inglés auditado usa «Hodiah» y el hebreo termina en -iah/-yah, no en una forma española pluralizante. «Hodía» conserva mejor la forma del nombre sin sobreadaptarlo.
  revised_spanish_text: Y los hijos de la esposa de Hodía, hermana de Naham[b], fueron el padre[a] de Queila el garmita y Eshtemoa el maacatita.
