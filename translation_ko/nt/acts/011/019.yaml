    text: '''The word'' here refers to the proclaimed message about Jesus; alternatively, ''the message.'''
    reason: lexical_alternative
  - marker: c
    text: 'The Greek is emphatic: ''except only to Jews'' or ''except to Jews alone.'''
    reason: lexical_alternative
