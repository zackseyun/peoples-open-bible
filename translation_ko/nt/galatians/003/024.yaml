  text: ὥστε ὁ νόμος παιδαγωγὸς ἡμῶν γέγονεν εἰς Χριστόν, ἵνα ἐκ πίστεως δικαιωθῶμεν·
base_translation:
  language: en
  yaml_path: translation/nt/galatians/003/024.yaml
  text: So then[a], the law has become our guardian until Messiah[b], so that we might be justified by faith.
  footnotes:
  - marker: a
    text: 'Or ''our custodian''; traditionally ''our tutor.'' The Greek παιδαγωγός refers to a household guardian or supervisor for a child, not primarily a classroom teacher.'
    reason: lexical_alternative
  - marker: b
    text: 'Literally ''unto the Messiah''; the phrase may also be understood as ''leading to the Messiah.'''
    reason: alternative_reading
translation:
  language: ko
  text: 그래서 율법은 우리를 메시아께로[a] 이끄는 양육자[b]가 되었으니, 이는 우리가 믿음으로 의롭다 함을 받게 하려는 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 직역하면 「메시아를 향하여」. 「메시아에게로 이끄는」 또는 「메시아의 때까지」로도 풀 수 있다.
    reason: alternative_reading
  - marker: b
    text: 헬라어 παιδαγωγός. 그리스·로마 가정에서 미성년 자녀를 감독하던 노예 양육인으로, 학교 교사가 아니다.
    reason: lexical_alternative
