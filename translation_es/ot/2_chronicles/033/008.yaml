base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/033/008.yaml
  text: And I will no longer remove the foot of Israel from upon the land that I appointed for your fathers[a], if only they are careful to do all that I commanded them[b], according to all the law and the statutes and the judgments given through Moses.
  footnotes:
