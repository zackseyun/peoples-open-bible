translation:
  language: es
  text: Entonces harás acercar a los levitas delante de la tienda de reunión, y reunirás a toda la congregación de los hijos de Israel[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O “los israelitas”. Hebreo: “los hijos de Israel”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְרַבְתָּ
  english_pob_choice: Then you shall bring
  chosen_spanish: Entonces harás acercar
  alternatives_spanish:
  - entonces traerás
  - entonces presentarás
  lexicon: HALOT
  rationale: El hiphil de קרב expresa hacer que alguien se acerque o presentarlo ante una presencia sagrada. "Harás acercar" conserva la fuerza causativa y el sentido ritual del movimiento hacia el lugar sagrado, sin reducirlo solo a un "traer" más general.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levíes
  lexicon: HALOT
  rationale: Es el nombre tribal consagrado en español para los miembros de la tribu de Leví. "Levitas" es claro, idiomático y fiel al referente colectivo.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: HALOT
  rationale: En este contexto ceremonial, "delante de" comunica bien la ubicación ritual frente al lugar sagrado. "Ante" también sería posible, pero "delante de" suena más natural en español bíblico moderno.
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: el tabernáculo de reunión
  alternatives_spanish:
  - la tienda de reunión
  - el tabernáculo del encuentro
  lexicon: HALOT
  rationale: La fórmula tradicional española "tabernáculo de reunión" mantiene el valor cultual del término y sigue siendo inteligible. Aunque "tienda de reunión" es más literal, "tabernáculo" comunica mejor en español el recinto sagrado del texto.
- source_word: וְהִקְהַלְתָּ
  english_pob_choice: and you shall assemble
  chosen_spanish: y reunirás
  alternatives_spanish:
  - y congregarás
  - y convocarás
  lexicon: HALOT
  rationale: קהל en hiphil expresa juntar o convocar una asamblea. "Reunirás" es natural en español y conserva la idea de formar una asamblea visible; "congregarás" sería más eclesiástico y menos neutro.
- source_word: כָּל עֲדַת
  english_pob_choice: the whole congregation
  chosen_spanish: toda la congregación
  alternatives_spanish:
  - toda la asamblea
  - toda la comunidad
  lexicon: HALOT
  rationale: '"Congregación" preserva el lenguaje corporativo de עֵדָה en contexto pentateucal. "Toda" refleja כָּל sin necesidad de añadir matices no presentes.'
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se conserva la forma masculina y genealógica del hebreo. "Los hijos de Israel" mantiene la correspondencia formal y evita neutralizar la expresión en el texto principal.
theological_decisions:
- issue: Tratamiento de בְּנֵי יִשְׂרָאֵל como expresión masculina/genealógica
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Jacob
  rationale: El hebreo usa una construcción masculina explícita. En armonía con el principio de precisión de género del POB, la versión principal conserva esa forma; una alternativa más idiomática como "los israelitas" queda implícitamente disponible, pero no sustituye el texto base.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios y el cotejo final reporta alta concordancia; por ello, el borrador español sigue de cerca la decisión inglesa establecida y solo ajusta la naturalidad idiomática necesaria en español.
  spanish_consistency_notes:
  - Se conserva "congregación" para עֲדָה en un sentido corporativo pentateucal, no eclesiástico.
  - '"Tabernáculo de reunión" mantiene la terminología cultual establecida en español bíblico y la coherencia interna del proyecto.'
  - Se preserva la forma masculina "los hijos de Israel" en el texto principal, con nota alternativa para lectura idiomática.
