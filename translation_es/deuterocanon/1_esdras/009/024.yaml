lexical_decisions:
- source_word: ἐκ τῶν
  english_pob_choice: From the
  chosen_spanish: De los
  alternatives_spanish:
  - Entre los
  - De entre los
  lexicon: LSJ
  rationale: La frase introduce un subgrupo dentro de una lista nominal. En español, 'De los' conserva bien la relación partitiva sin sonar forzado.
- source_word: ἱεροψαλτῶν
  english_pob_choice: temple singers
  chosen_spanish: cantores del templo
  alternatives_spanish:
  - cantores sagrados
  - cantores del santuario
  lexicon: LSJ
  rationale: El compuesto señala servicio cultual y canto. 'Cantores del templo' comunica con claridad el ámbito litúrgico y evita una expresión demasiado literal o rara en español.
- source_word: Ἐλιάσεβος
  english_pob_choice: Eliasib
  chosen_spanish: Eliasib
  alternatives_spanish:
  - Eliashib
  lexicon: transliteración del nombre griego con apoyo de tradición hebrea paralela
  rationale: Se mantiene la forma que refleja directamente el griego. La tradición paralela hebrea sugiere la variante 'Eliashib', que se conserva como alternativa de identificación, no como sustitución del texto base.
- source_word: Βάκχουρος
  english_pob_choice: Bacchurus
  chosen_spanish: Bacuro
  alternatives_spanish:
  - Bacchuro
  - Bakhuro
  lexicon: transliteración del nombre griego
  rationale: Se vierte el nombre propio por transliteración natural al español, sin normalizarlo hacia una forma hebrea no atestiguada en el griego. 'Bacuro' es legible y cercano al sonido del original.
translation_notes:
  revision_awareness: El texto griego es breve y estable; la revisión auditada no introdujo cambios. Se mantuvo la correspondencia directa con la lista nominal del griego y se preservó la nota de variante onomástica del audit trail inglés en forma de nota española.
  spanish_consistency_notes:
  - Se usa 'templo' para ἱερός/ἱερο- en contexto cultual, evitando una calca extraña.
  - Se conserva la transliteración de nombres propios sin intento de armonización con otras tradiciones textuales en el cuerpo principal.
  - La nota al pie marca solo la variante onomástica documentada para Eliasib/Eliashib.
