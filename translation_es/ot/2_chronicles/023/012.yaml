translation:
  language: es
  text: Cuando Atalía oyó el sonido[a] del pueblo corriendo[b] y alabando al rey, vino al pueblo en la casa de Yahvé[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'voz' o 'ruido' del pueblo.
    reason: lexical_alternative
  - marker: b
    text: El participio hebreo puede significar 'corriendo'; algunos lo entienden más específicamente como corredores o guardias reales.
    reason: lexical_alternative
  - marker: c
    text: O 'el templo de Yahvé'.
    reason: lexical_alternative
lexical_decisions:
- source_word: קוֹל
  english_pob_choice: sound
  chosen_spanish: sonido
  alternatives_spanish:
  - voz
  - ruido
  lexicon: HALOT
  rationale: קוֹל abarca sonido, voz o ruido. Aquí Atalía percibe el clamor público de la celebración; 'sonido' mantiene la amplitud semántica sin cargar el término con una valoración negativa.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - el pueblo reunido
  lexicon: HALOT
  rationale: עָם designa al conjunto del pueblo reunido. En español, 'el pueblo' conserva mejor ese sentido colectivo y el tono bíblico natural que 'la gente'.
- source_word: הָרָצִים
  english_pob_choice: running
  chosen_spanish: corriendo
  alternatives_spanish:
  - apurándose
  - corriendo velozmente
  lexicon: HALOT
  rationale: El participio de רוץ indica movimiento de correr. 'Corriendo' es la forma más directa y natural en español; se evita interpretar aquí 'corredores' o 'guardias' porque el contexto inmediato lo presenta junto con la alabanza del pueblo.
- source_word: וְהַמְהַלְלִים
  english_pob_choice: and praising
  chosen_spanish: y alabando
  alternatives_spanish:
  - y celebrando
  - y proclamando alabanza
  lexicon: HALOT
  rationale: הלל en piel expresa alabar. Como el objeto directo es 'el rey', 'alabando' preserva el sentido léxico y la dirección del acto sin añadir una formulación litúrgica que el hebreo no exige.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa del Señor
  lexicon: HALOT
  rationale: בית יהוה se vierte como 'casa de Yahvé' para conservar el idiomatismo hebreo y el nombre divino en su forma propia, conforme al criterio del proyecto para יְהוָה.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se traduce con 'Yahvé' según la norma doctrinal del proyecto, preservando el nombre personal del Dios del pacto en vez de sustituirlo por un título.
theological_decisions:
- issue: Renderización de יְהוָה en un sintagma locativo sacral
  english_pob_reading: house of Yahweh
  chosen_spanish_reading: casa de Yahvé
  alternative_spanish_readings:
  - templo de Yahvé
  - casa del Señor
  rationale: La expresión hebrea usa el nombre divino directo. Mantener 'Yahvé' evita ocultar el Tetragrámaton y conserva la referencia al santuario asociado con el nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de קוֹל en un contexto de celebración pública
  english_pob_reading: sound of the people running and praising the king
  chosen_spanish_reading: el sonido del pueblo corriendo y alabando al rey
  alternative_spanish_readings:
  - la voz del pueblo
  - el ruido del pueblo
  rationale: Aunque קוֹל puede ser 'voz' o 'ruido', el contexto de una celebración colectiva sugiere un audible alboroto. 'Sonido' conserva neutralidad y amplitud semántica, sin forzar una valoración peyorativa.
  doctrine_reference: HALOT / uso contextual de קוֹל
- issue: Ambigüedad de הָרָצִים
  english_pob_reading: running
  chosen_spanish_reading: corriendo
  alternative_spanish_readings:
  - los corredores
  - los guardias corriendo
  rationale: El texto vincula el participio con el pueblo y con la alabanza al rey. Por eso se conserva el valor verbal simple 'corriendo' y no se especifica una función cortesana no requerida por el contexto.
  doctrine_reference: HALOT / análisis sintáctico del participio
- issue: בית יהוה como edificación o complejo sacro
  english_pob_reading: the house of Yahweh
  chosen_spanish_reading: la casa de Yahvé
  alternative_spanish_readings:
  - el templo de Yahvé
  rationale: '''Casa de Yahvé'' sigue de cerca la construcción hebrea, mientras que ''templo'' interpreta y moderniza el referente. Dado que el proyecto privilegia la transparencia del idiomismo, se conserva ''casa''.'
  doctrine_reference: 'POB style: preserve Hebrew idiom where intelligible'
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión posterior del auditable inglés: se prefirió ''sonido'' frente a ''ruido'' para קוֹל por neutralidad semántica, y se mantuvo la estructura general del versículo. También se integró la decisión doctrinal revisada de traducir יְהוָה como ''Yahvé''.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' de forma consistente para יְהוָה, en línea con el criterio del proyecto.
  - '''Casa de Yahvé'' preserva el hebraísmo בית יהוה sin recurrir a ''templo'' en el texto principal.'
  - El paralelismo de 'corriendo' y 'alabando' conserva el ritmo sintáctico del hebreo.
  - '''El pueblo'' se eligió para עָם por su valor colectivo y su naturalidad bíblica en español.'
