    changes_summary: Replaced 'has brought evil to completion' with 'has completed evil' for a more direct and natural rendering of the Hebrew while preserving the formal tone. Kept the rest unchanged.
translation:
  language: es
  text: El que cierra los ojos para idear cosas perversas, el que frunce los labios, ha consumado el mal.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: עֹצֶה
  english_pob_choice: shuts
  chosen_spanish: cierra
  alternatives_spanish:
  - entorna
  - aprisiona
  lexicon: HALOT
  rationale: El participio expresa el gesto de cerrar los ojos; en español, 'cierra' comunica de manera natural la acción y conserva el matiz idiomático del contexto de maquinación.
- source_word: עֵינָיו
  english_pob_choice: his eyes
  chosen_spanish: los ojos
  alternatives_spanish:
  - sus ojos
  lexicon: HALOT
  rationale: El sufijo posesivo de tercera persona singular se expresa de modo natural con 'los ojos' en la construcción relativa del proverbio; el antecedente queda claro por el sujeto implícito 'el que'.
- source_word: לַחְשֹׁב
  english_pob_choice: to devise
  chosen_spanish: para idear
  alternatives_spanish:
  - para planear
  - para pensar
  lexicon: HALOT
  rationale: חשׁב aquí implica cálculo intencional y diseño de una maldad; 'idear' conserva la idea de elaborar un plan, sin volverlo demasiado coloquial.
- source_word: תַּהְפֻּכ֑וֹת
  english_pob_choice: perverse things
  chosen_spanish: cosas perversas
  alternatives_spanish:
  - cosas torcidas
  - cosas depravadas
  - perversidades
  lexicon: HALOT
  rationale: El plural abstracto puede referirse a actos o planes desviados; 'cosas perversas' mantiene la carga moral del término sin sobreinterpretarlo como un sustantivo técnico.
- source_word: קֹרֵץ
  english_pob_choice: purses
  chosen_spanish: frunce
  alternatives_spanish:
  - comprime
  - aprieta
  - parpadea
  lexicon: HALOT
  rationale: En este versículo el gesto recae sobre los labios, no sobre los ojos; por eso 'frunce' reproduce el movimiento de tensión en la boca que acompaña la intención maliciosa.
- source_word: שְׂפָתָיו
  english_pob_choice: his lips
  chosen_spanish: los labios
  alternatives_spanish:
  - sus labios
  lexicon: HALOT
  rationale: La referencia corporal es literal y directa; en español, 'los labios' funciona naturalmente dentro de la relativa y evita una repetición innecesaria del posesivo.
- source_word: כִּלָּה
  english_pob_choice: has completed evil
  chosen_spanish: ha consumado
  alternatives_spanish:
  - ha completado
  - ha terminado
  - ha llevado a cabo
  lexicon: HALOT
  rationale: כלה en piel expresa llevar algo a su culminación o final. 'Ha consumado el mal' preserva la fuerza telica del verbo y sugiere que la maldad fue llevada hasta su pleno cumplimiento.
- source_word: רָעָה
  english_pob_choice: evil
  chosen_spanish: el mal
  alternatives_spanish:
  - la maldad
  - el malvado actuar
  - la perversidad
  lexicon: HALOT
  rationale: En este contexto sapiencial, רעה denota maldad moral y práctica. 'El mal' es una equivalencia sobria y natural en español, manteniendo el alcance ético del hebreo.
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del POB inglés, que prefirió 'has completed evil' frente a la formulación más explicativa 'has brought evil to completion'. Por eso se eligió una solución breve y telica ('ha consumado') que conserva la fuerza culminativa del hebreo sin añadir paráfrasis.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' porque no aparece el tetragrámaton ni un sustituto divino en este versículo.
  - Se prefirió un español sobrio y literal en la primera cláusula, pero idiomático en los gestos corporales ('cierra', 'frunce') para respetar el paralelismo poético.
  - '''El mal'' se mantuvo como sustantivo genérico coherente con la lectura ética del proverbio, sin especificar ''maldad'' para no forzar el término hebreo.'
