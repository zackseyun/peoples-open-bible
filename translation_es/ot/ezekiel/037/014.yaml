review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo y del POB inglés: Yahvé pone su רוח en el pueblo, ellos vivirán, serán reinstalados en su tierra, conocerán a Yahvé, y la fórmula final expresa la certeza de su palabra y acción. También preserva correctamente la nota sobre el rango semántico de רוּחַ.'
  spanish_quality_summary: 'El español es claro y digno, pero hay dos ajustes de naturalidad/fidelidad: en español bíblico natural ''dentro de ustedes'' puede simplificarse a ''en ustedes'', que además refleja mejor בכם; y ''sobre su propia tierra'' suena menos idiomático que ''en su propia tierra'' para el sentido de reasentamiento. El resto fluye bien. La raya antes de ''declara Yahvé'' es aceptable pero no necesaria.'
  glossary_alignment: 'Alineado con la terminología del proyecto: יְהוָה -> ''Yahvé''; רוּחִי -> ''mi Espíritu'' con nota de alternativas; no hay conflictos terminológicos mayores. La decisión de capitalizar ''Espíritu'' está bien justificada por el contexto teológico.'
  issues:
  - severity: medium
    issue: '''dentro de ustedes'' sobretraduce בכם'
    rationale: El hebreo בכם significa simplemente 'en ustedes'. 'Dentro de ustedes' no es falso, pero añade un matiz espacial más marcado de lo necesario. 'En ustedes' es más directo, natural y suficiente en español.
  - severity: medium
    issue: '''sobre su propia tierra'' suena poco idiomático en este contexto'
    rationale: Aunque עַל puede ser literalmente 'sobre', aquí en contexto de restauración y reasentamiento español natural pide 'en su propia tierra'. Esto comunica mejor la reinstalación del pueblo sin perder el sentido.
  - severity: low
    issue: Pronombre enfático 'Yo he hablado' no es necesario
    rationale: El hebreo no exige énfasis especial en el pronombre aquí. 'He hablado' suena más natural en español y mantiene la solemnidad.
  revised_spanish_text: Pondré mi Espíritu[a] en ustedes, y vivirán; los estableceré en su propia tierra. Entonces sabrán que yo soy Yahvé. He hablado, y lo he hecho, declara Yahvé.
  revised_footnotes:
