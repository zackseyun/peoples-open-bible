translation:
  language: es
  text: para quitar el decreto de tu boca[a] y destruir tu herencia[b], y para cerrar la boca[c] de los que te alaban, y apagar la gloria de tu casa[d] y tu altar,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «quitar de tu boca el decreto». La frase probablemente se refiere a abolir o anular el decreto autoritativo de Dios.
    reason: lexical_alternative
  - marker: b
    text: «Tu herencia» probablemente se refiere al pueblo o posesión que pertenece a Dios; compárense los usos de pacto donde Israel es la herencia de Dios.
    reason: cross_reference
  - marker: c
    text: O «silenciar a los que te alaban». El modismo griego se mantiene más literalmente en el texto principal.
    reason: lexical_alternative
  - marker: d
    text: «Tu casa» probablemente se refiere al templo, aunque el griego dice simplemente «casa».
    reason: cultural_note
lexical_decisions:
- source_word: ἐξᾶραι
  english_pob_choice: to remove
  chosen_spanish: quitar
  alternatives_spanish:
  - remover
  - retirar
  - quitar de en medio
  lexicon: LSJ
  rationale: En este contexto de propósito hostil, «quitar» comunica bien la idea de apartar o anular lo que procede de la boca, sin volver la frase demasiado física o forzada en español.
- source_word: ὁρισμὸν
  english_pob_choice: the decree
  chosen_spanish: el decreto
  alternatives_spanish:
  - la ordenanza
  - la decisión fija
  lexicon: LSJ
  rationale: «Decreto» conserva el valor de determinación autoritativa que la POB inglesa señaló para ὁρισμός, y suena natural en español bíblico actual.
- source_word: στόματός σου
  english_pob_choice: your mouth
  chosen_spanish: tu boca
  alternatives_spanish:
  - tu boca misma
  lexicon: LSJ
  rationale: Se mantiene la imagen literal de «boca» porque el griego repite στόμα en paralelo, reforzando la metáfora de la palabra y su silencio.
- source_word: ἀφανίσαι
  english_pob_choice: to destroy
  chosen_spanish: destruir
  alternatives_spanish:
  - borrar
  - aniquilar
  - hacer desaparecer
  lexicon: LSJ
  rationale: «Destruir» reproduce la fuerza del verbo sin suavizarlo. La POB inglesa opta por un término fuerte, y el español puede sostener esa intensidad.
- source_word: κληρονομίαν σου
  english_pob_choice: your inheritance
  chosen_spanish: tu herencia
  alternatives_spanish:
  - tu heredad
  - tu posesión
  lexicon: LSJ
  rationale: «Herencia» mantiene el sentido de bien perteneciente por pacto y conserva la tensión teológica sin especificar en el texto principal si se trata del pueblo o de la posesión de Dios.
- source_word: ἐμφράξαι
  english_pob_choice: to shut
  chosen_spanish: cerrar
  alternatives_spanish:
  - tapar
  - obstruir
  - sellar
  lexicon: LSJ
  rationale: Como sigue «la boca», «cerrar la boca» preserva el modismo griego de manera clara y natural en español, equivalente al inglés POB «to shut the mouth».
- source_word: αἰνούντων σοι
  english_pob_choice: those who praise you
  chosen_spanish: los que te alaban
  alternatives_spanish:
  - los que te ensalzan
  - los que te bendicen
  lexicon: LSJ
  rationale: «Alaban» traduce bien el participio presente y expresa el acto de adoración o alabanza sin perder la relación directa con el pronombre dativo «te».
- source_word: σβέσαι
  english_pob_choice: to extinguish
  chosen_spanish: apagar
  alternatives_spanish:
  - extinguir
  - sofocar
  - quitar
  lexicon: LSJ
  rationale: Aunque «extinguir» sería más literal, «apagar» resulta más idiomático en español para una gloria que se presenta como algo que puede ser apagado, y conserva la imagen de luz/fuego.
- source_word: δόξαν οἴκου σου
  english_pob_choice: the glory of your house
  chosen_spanish: la gloria de tu casa
  alternatives_spanish:
  - el esplendor de tu casa
  - el honor de tu casa
  lexicon: LSJ
  rationale: Se conserva «casa» de manera literal, como en la POB inglesa, porque el griego dice simplemente οἶκος; el posible sentido de templo queda implícito en el contexto y no se impone en el texto principal.
- source_word: θυσιαστήριόν σου
  english_pob_choice: your altar
  chosen_spanish: tu altar
  alternatives_spanish:
  - tu altar de sacrificio
  lexicon: LSJ
  rationale: «Altar» es la equivalencia directa y suficiente para θυσιαστήριον; no se añade especificación que el griego no requiere.
theological_decisions:
- issue: Referente de «tu herencia»
  english_pob_reading: left as 'your inheritance' without specifying Israel explicitly
  chosen_spanish_reading: dejada como «tu herencia» sin explicitar el referente
  alternative_spanish_readings:
  - tu pueblo
  - tu heredad
  rationale: El griego no nombra explícitamente el referente y la POB inglesa conserva la ambigüedad teológica. En español conviene mantener ese término de pacto sin resolverlo artificialmente en el texto principal.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.'
- issue: Sentido de «tu casa» y «tu altar»
  english_pob_reading: rendered literally
  chosen_spanish_reading: se traduce literalmente como «tu casa y tu altar»
  alternative_spanish_readings:
  - tu templo y tu altar
  rationale: Aunque «casa» probablemente alude al templo, el griego usa οἶκος. La traducción literal preserva la primacía del original y deja que el contexto exegético haga el resto.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition.'
translation_notes:
  revision_awareness: La revisión inglesa reciente afinó la segunda cláusula de la imagen oral a «shut the mouth of those who praise you». Por eso el español adopta «cerrar la boca de los que te alaban», manteniendo el modismo y la literalidad del griego, mientras conserva la estructura acumulativa del resto del versículo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» cuando el texto base lo exija explícitamente, pero aquí no aparece el nombre divino en el versículo.
  - Se usa «herencia» como término de pacto, coherente con la terminología POB.
  - Se conserva «casa» en lugar de «templo» en el texto principal para respetar οἶκος.
  - Se evita suavizar la secuencia de verbos hostiles, preservando la fuerza retórica del griego.
