review_pass:
  verdict: revise
  source_alignment_summary: El borrador español sigue bien la estructura del griego y preserva el paralelismo entre ἀλλοτριότητι y ἀλλοτρία. Sin embargo, «alienación» suena psicológica y poco bíblica en español actual, y «con orgullo» debilita el matiz negativo de ὑπερηφανίᾳ, mejor expresado como «en soberbia» o «con arrogancia».
  spanish_quality_summary: La frase es comprensible, pero «en alienación» resulta poco natural y algo técnica para lectura eclesial. «Era ajeno a nuestro Dios» sí es defendible y comunica bien la idea de otredad/ajenidad sin imponer una ruptura previa de pacto. Un ajuste menor mejora fidelidad y legibilidad.
  glossary_alignment: 'No hay conflicto con la glosa base del proyecto. «Dios» está bien. La principal cuestión léxica es ἀλλοτριότητι/ἀλλοτρία: conviene evitar tanto «extrañamiento» como un «alienación» demasiado moderno-psicológico. «En condición ajena» sería demasiado interpretativo; «como forastero» estrecha indebidamente el sentido. «En ajenidad» sería fiel pero poco idiomático. La mejor solución española equilibrada aquí es verbalizar el primer segmento como «obró como ajeno» y mantener «su corazón era ajeno a nuestro Dios».'
  issues:
  - severity: medium
    issue: «en alienación» es poco natural y puede sugerir alienación psicológica o sociológica
    rationale: Aunque intenta preservar la otredad de ἀλλοτριότητι, en español contemporáneo no suena bíblico ni claro en este contexto; distrae del sentido moral-relacional de ser ajeno.
  - severity: medium
    issue: «con orgullo» atenúa el valor negativo de ὑπερηφανίᾳ
    rationale: En español, «orgullo» puede tener lectura positiva o ambigua. El griego aquí expresa altivez arrogante; «en soberbia» conserva mejor la fuerza moral y además refleja la construcción preposicional del original.
  - severity: low
    issue: La nota a sobrecarga alternativas poco naturales
    rationale: «En extrañamiento» y «en condición de ajeno» no ayudan mucho a un lector español; conviene dejar alternativas realmente útiles, como «como un extraño» o «como forastero», aclarando que son aproximaciones.
  revised_spanish_text: El enemigo obró como ajeno[a], en soberbia; y su corazón era ajeno a nuestro Dios[b].
