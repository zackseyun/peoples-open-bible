id: 1MA.13.35
reference: 1 Maccabees 13:35
source:
  edition: lxx-swete-1909
  text: καὶ ἀπέστειλεν αὐτῷ Δημήτριος ὁ βασιλεὺς κατὰ τοὺς λόγους τούτους, καὶ ἀπεκρίθη αὐτῷ, καὶ ἔγραψεν αὐτῷ ἐπιστολὴν τοιαύτην
  language: Greek
  pages:
  - 673
  confidence: high
  validation: agree
translation:
  text: 'And King Demetrius sent to him according to these words[a], and answered him, and wrote to him a letter like this:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'answered him.' Because the verse immediately continues with 'and wrote him a letter,' the translation renders the reply in explicitly epistolary terms.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστειλεν
  chosen: sent
  alternatives:
  - dispatched
  lexicon: BDAG
  rationale: Standard narrative verb for sending; 'sent' is natural modern English and fits the epistolary context.
- source_word: Δημήτριος ὁ βασιλεύς
  chosen: King Demetrius
  alternatives:
  - Demetrius the king
  lexicon: BDAG
  rationale: English idiom normally places the royal title before the name; this preserves the referent and reads naturally.
- source_word: κατὰ τοὺς λόγους τούτους
  chosen: in these words
  alternatives:
  - according to these words
  - with these words
  lexicon: BDAG
  rationale: Idiomatic formula introducing the content of a message or document; 'in these words' best conveys the sense in English without wooden literalism.
- source_word: ἀπεκρίθη αὐτῷ
  chosen: sent him a reply
  alternatives:
  - answered him
  - replied to him
  lexicon: BDAG
  rationale: Although literally 'answered him,' the immediate context is written correspondence, so 'sent him a reply' makes explicit the epistolary force already implied by the surrounding verbs.
- source_word: ἔγραψεν αὐτῷ ἐπιστολήν
  chosen: wrote him a letter
  alternatives:
  - wrote a letter to him
  lexicon: BDAG
  rationale: Direct and idiomatic rendering of the Greek construction.
- source_word: τοιαύτην
  chosen: like this
  alternatives:
  - such as this
  - of this kind
  lexicon: BDAG
  rationale: Introduces the letter text that follows; 'like this' is clear, contemporary English.
