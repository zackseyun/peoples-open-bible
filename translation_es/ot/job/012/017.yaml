  - severity: medium
    issue: '''Enloquece'' sobretraduce יְהוֹלֵל'
    rationale: El inglés auditado eligió 'makes foolish', no 'drives mad'. En español, 'enloquece' suele sugerir locura más fuerte que necedad/insensatez. 'Vuelve insensatos' refleja mejor el valor causativo sin exceso.
