    text: El griego continúa en el versículo siguiente; la cláusula final aquí está incompleta en el fragmento fuente y se ha traducido para reflejar esa continuación.
    reason: textual_variant
  revision_rationale: 'Se corrige la frase inicial para alinearla con τὴν ἀρχιερωσύνην y con la auditoría inglesa documentada: el sentido es ''acerca del sumo sacerdocio'', no ''la honra del sumo sacerdocio''. Se conserva el resto del versículo porque refleja adecuadamente la sintaxis y el sentido de la fuente, incluida la cláusula final incompleta señalada por la nota.'
