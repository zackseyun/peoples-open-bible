translation:
  language: es
  text: Y Noé hizo conforme a todo lo que Yahvé le había mandado[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «conforme a todo lo que Yahvé le había mandado».'
