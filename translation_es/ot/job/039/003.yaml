translation:
  language: es
  text: Se agachan[a], dan a luz a sus crías; se libran de sus dolores de parto[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se inclinan» por «se agachan».
    reason: lexical_alternative
  - marker: b
    text: O «sus dolores de alumbramiento» por «sus dolores de parto».
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּכְרַעְנָה
  english_pob_choice: they crouch down
  chosen_spanish: se agachan
  alternatives_spanish:
  - se inclinan
  - se arrodillan
  lexicon: HALOT
  rationale: כרע expresa aquí el descenso físico de la hembra en el parto animal. «Se agachan» conserva la idea corporal concreta con naturalidad en español y evita una formulación demasiado abstracta como «se inclinan».
- source_word: יַלְדֵיהֶן
  english_pob_choice: their young
  chosen_spanish: sus crías
  alternatives_spanish:
  - sus jóvenes
  - su prole
  lexicon: HALOT
  rationale: En el contexto animal de Job 39, ילד designa lo que nace. «Crías» comunica mejor que «hijos» o «jóvenes» la referencia zoológica y mantiene la precisión contextual.
- source_word: תְּפַלַּחְנָה
  english_pob_choice: they bring forth
  chosen_spanish: dan a luz
  alternatives_spanish:
  - traen al mundo
  - paren
  lexicon: HALOT
  rationale: El verbo describe el acto de parir o traer al mundo. «Dan a luz» es una equivalencia clara y digna en español; «paren» sería más directo pero menos idiomático en esta construcción.
- source_word: חֶבְלֵיהֶם
  english_pob_choice: their labor pains
  chosen_spanish: sus dolores de parto
  alternatives_spanish:
  - sus contracciones
  - sus penas de parto
  lexicon: HALOT
  rationale: חבל puede referirse a los dolores del parto en este contexto. «Dolores de parto» conserva la imagen y la intensidad del hebreo; «contracciones» suena más técnico y menos poético.
- source_word: תְּשַׁלַּחְנָה
  english_pob_choice: they cast off
  chosen_spanish: se libran
  alternatives_spanish:
  - se desprenden
  - las dejan
  lexicon: HALOT
  rationale: שלח en este marco expresa soltar o quedar libre de los dolores. «Se libran» comunica bien la cesación del sufrimiento en español y mantiene el paralelismo poético con la primera mitad del verso.
translation_notes:
  revision_awareness: 'El contexto animal de Job 39:3 y el audit trail inglés apoyan una traducción poética y concreta: crouch down / bring forth / labor pains / cast off. No se requieren revisiones textuales; la lectura hebrea y el POB inglés están en alta concordancia.'
  spanish_consistency_notes:
  - 'Se evitó «SEÑOR» o terminología teológica no pertinente: el versículo no contiene nombre divino ni título cristológico.'
  - Se mantuvo el registro poético con verbos naturales en español y un sustantivo zoológico preciso («crías»).
  - «Se libran» fue preferido por su claridad idiomática; la nota conserva la alternativa más literal de «dolores de alumbramiento».
