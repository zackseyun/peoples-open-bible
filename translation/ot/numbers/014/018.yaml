id: NUM.14.18
reference: Numbers 14:18
source:
  edition: WLC
  text: יְהוָ֗ה אֶ֤רֶךְ אַפַּ֨יִם֙ וְ/רַב חֶ֔סֶד נֹשֵׂ֥א עָוֺ֖ן וָ/פָ֑שַׁע וְ/נַקֵּה֙ לֹ֣א יְנַקֶּ֔ה פֹּקֵ֞ד עֲוֺ֤ן אָבוֹת֙ עַל בָּנִ֔ים עַל שִׁלֵּשִׁ֖ים וְ/עַל רִבֵּעִֽים־־־־׃
translation:
  text: Yahweh is slow to anger and abundant in steadfast love[a], forgiving iniquity and transgression, but he will by no means clear the guilty[d][c][b], visiting the iniquity of fathers on children to the third and to the fourth generation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'great in covenant loyalty,' 'rich in mercy,' or 'abounding in lovingkindness' for 'abundant in steadfast love.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'forgiving' is literally 'bearing' or 'carrying' iniquity and transgression.
    reason: lexical_alternative
  - marker: c
    text: Or 'he will certainly not leave unpunished' or 'he will not acquit.'
    reason: lexical_alternative
  - marker: d
    text: Hebrew 'to the third and to the fourth' refers to generations.
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶרֶךְ אַפַּיִם
  chosen: slow to anger
  alternatives:
  - long of nostrils
  - patient
  lexicon: HALOT
  rationale: This Hebrew idiom literally refers to having a 'long nose/nostrils,' a metaphor for delayed anger. 'Slow to anger' is the established idiomatic equivalent in clear modern English.
- source_word: רַב חֶסֶד
  chosen: abundant in steadfast love
  alternatives:
  - great in covenant loyalty
  - rich in mercy
  - abounding in lovingkindness
  lexicon: HALOT
  rationale: חֶסֶד carries covenantal loyalty, mercy, and steadfast love. 'Steadfast love' preserves the covenantal and relational force better than the broader 'mercy,' while 'abundant in' reflects רַב.
- source_word: נֹשֵׂא עָוֺן וָפָשַׁע
  chosen: forgiving iniquity and transgression
  alternatives:
  - bearing iniquity and transgression
  - carrying away guilt and rebellion
  lexicon: HALOT
  rationale: נשא with sin terms often means to bear away or forgive. In this creedal formula about divine mercy, 'forgiving' best communicates the sense in natural English, while retaining both עָוֺן and פָשַׁע as distinct but related sin terms.
- source_word: עָוֺן
  chosen: iniquity
  alternatives:
  - guilt
  - wickedness
  lexicon: HALOT
  rationale: עָוֺן can denote both guilt and the crookedness of wrongdoing. 'Iniquity' preserves the moral weight and traditional distinction from פֶּשַׁע.
- source_word: פָשַׁע
  chosen: transgression
  alternatives:
  - rebellion
  - offense
  lexicon: HALOT
  rationale: פָשַׁע often denotes rebellion or breach. 'Transgression' is a clear English equivalent that pairs well with 'iniquity' without over-paraphrasing.
- source_word: וְנַקֵּה לֹא יְנַקֶּה
  chosen: but he will by no means clear the guilty
  alternatives:
  - yet he will certainly not leave unpunished
  - and clearing he will not clear
  - but he will not acquit
  lexicon: HALOT
  rationale: 'The infinitive absolute plus finite verb intensifies the negation: he definitely will not clear/acquit. English normally requires an object; ''the guilty'' makes explicit the implied object and conveys the judicial sense idiomatically.'
- source_word: פֹּקֵד עֲוֺן אָבוֹת עַל בָּנִים
  chosen: visiting the iniquity of fathers on children
  alternatives:
  - punishing children for the iniquity of fathers
  - attending to the fathers' iniquity upon children
  lexicon: HALOT
  rationale: פקד here refers to bringing consequences or punishment to bear. 'Visiting the iniquity ... on' preserves the traditional judicial idiom without over-resolving the mechanism.
- source_word: עַל שִׁלֵּשִׁים וְעַל רִבֵּעִים
  chosen: to the third and to the fourth generation
  alternatives:
  - upon the third and fourth
  - to the third and fourth descendants
  lexicon: HALOT
  rationale: The Hebrew elliptically refers to successive generations. Supplying 'generation' in English is necessary for clarity and reflects the idiom's standard sense.
