review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del hebreo: mandato futuro, referencia a las piedras previas, ''todas las palabras de esta ley'', propósito de entrar en la tierra, nombre divino ''Yahvé'', fórmula de pacto ''el Dios de tus padres'' y cierre ''tal como ... habló''. Sin embargo, dos puntos requieren ajuste para mayor fidelidad y naturalidad: (1) בְּעָבְרֶךָ se traduce mejor ''cuando cruces al otro lado'' o ''cuando pases'', ya que ''cruces'' solo puede sonar incompleto en español sin objeto; (2) אֶרֶץ זָבַת חָלָב וּדְבַשׁ no debe quedar como ''tierra que fluye leche y miel'', que no es español natural ni reproduce bien el modismo bíblico; ''tierra que mana leche y miel'' preserva la imagen tradicional y el sentido de abundancia.'
  spanish_quality_summary: 'El español general es claro y digno, pero contiene una construcción poco idiomática: ''tierra que fluye leche y miel''. También mejora la fluidez añadir ''al otro lado'' tras ''cruces'', lo que encaja con el contexto del Jordán y evita una sensación de verbo truncado. El resto del registro es adecuado para una Biblia eclesial moderna.'
  glossary_alignment: 'Buen alineamiento con la terminología del proyecto: יהוה -> ''Yahvé''; תּוֹרָה -> ''ley'' en contexto deuteronómico; אֱלֹהֵי אֲבֹתֶיךָ -> ''el Dios de tus padres''. No hay conflicto doctrinal. El único ajuste léxico importante es preferir ''mana'' frente a ''fluye'' para זָבַת ... en español bíblico natural.'
  issues:
  - severity: medium
    issue: Expresión española no idiomática en 'tierra que fluye leche y miel'
    rationale: Aunque intenta seguir de cerca el hebreo/inglés, en español la fórmula bíblica estable y natural es 'tierra que mana leche y miel'. 'Fluye leche y miel' suena forzado y gramaticalmente incompleto.
  - severity: low
    issue: '''Cuando cruces'' queda algo elíptico'
    rationale: El hebreo בְּעָבְרֶךָ significa 'cuando cruces/pases al otro lado'. En español, añadir 'al otro lado' mejora claridad contextual sin sobretraducir.
  - severity: low
    issue: La nota [a] no refleja la alternativa principal del inglés
    rationale: El inglés auditado da como alternativa 'all the words of this instruction', pero la nota española actual solo comenta la construcción temporal de בְּעָבְרֶךָ. Conviene alinear la nota con la alternativa léxica preservada por el POB para תּוֹרָה.
  revised_spanish_text: Y escribirás sobre ellas todas las palabras de esta ley[a] cuando cruces al otro lado, para que entres en la tierra que Yahvé tu Dios te da, una tierra que mana leche y miel, tal como Yahvé, el Dios de tus padres[b], te habló.
  revised_footnotes:
