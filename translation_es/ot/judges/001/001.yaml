translation:
  language: es
  text: 'Y aconteció que, después de la muerte de Josué, los hijos de Israel consultaron a Yahvé[a], diciendo: «¿Quién subirá primero por nosotros contra los cananeos[b], para combatir contra ellos?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Se preserva el nombre divino Yahvé según la pauta del proyecto para יְהוָה.
    reason: theological_note
  - marker: b
    text: El hebreo usa «el cananeo» en singular formal, pero con sentido colectivo; por eso aquí se traduce «los cananeos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y ocurrió
  lexicon: HALOT
  rationale: La fórmula narrativa wayyiqtol introduce un nuevo episodio; «aconteció» mantiene esa función discursiva con un registro digno y natural en español.
- source_word: אַחֲרֵי מוֹת יְהוֹשֻׁעַ
  english_pob_choice: after the death of Joshua
  chosen_spanish: después de la muerte de Josué
  alternatives_spanish:
  - después que Josué murió
  - tras la muerte de Josué
  lexicon: HALOT
  rationale: La construcción nominal del hebreo se reproduce de forma natural en español con «después de la muerte de Josué», conservando el valor temporal y la forma sustantivada.
- source_word: וַיִּשְׁאֲלוּ
  english_pob_choice: asked
  chosen_spanish: consultaron
  alternatives_spanish:
  - preguntaron
  - inquirieron
  lexicon: HALOT
  rationale: En este contexto la acción no es una simple pregunta, sino una consulta dirigida a Yahvé para recibir dirección; «consultaron» expresa mejor la fuerza de שׁאל en un marco oracular sin forzar la frase.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: Se mantiene la forma masculina plural transparente del hebreo. «Hijos de Israel» es una equivalencia directa y bíblicamente reconocible en español.
- source_word: בַּיהוָה
  english_pob_choice: the LORD / Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: El texto hebreo dice literalmente «en/por Yahvé» como fórmula de consulta. En español, «consultaron a Yahvé» comunica de manera natural la dirección de la consulta sin ocultar el nombre divino; se preserva Yahvé según el término base del proyecto.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijeron
  - en estos términos
  lexicon: HALOT
  rationale: Se conserva la función quotativa de introducir el discurso directo con una forma breve y natural en español.
- source_word: מִי יַעֲלֶה לָּנוּ
  english_pob_choice: Who will go up for us
  chosen_spanish: ¿Quién subirá primero por nosotros?
  alternatives_spanish:
  - ¿Quién subirá por nosotros?
  - ¿Quién irá primero por nosotros?
  lexicon: HALOT
  rationale: עלָה en contexto bélico conserva el matiz de avance ascendente/ir a la campaña; «subirá» mantiene ese valor. «Primero» refleja בַּתְּחִלָּה y su función de prioridad en la acción.
- source_word: אֶל הַכְּנַעֲנִי
  english_pob_choice: against the Canaanites
  chosen_spanish: contra el cananeo
  alternatives_spanish:
  - contra los cananeos
  - contra el pueblo cananeo
  lexicon: HALOT
  rationale: El hebreo usa singular colectivo; se mantiene «el cananeo» para conservar la forma singular del original y su valor colectivo, evitando borrar la tensión entre forma singular y sentido plural.
- source_word: בַּתְּחִלָּה
  english_pob_choice: first
  chosen_spanish: primero
  alternatives_spanish:
  - al principio
  - de primero
  lexicon: HALOT
  rationale: En el reparto de la iniciativa militar, «primero» es la equivalencia más natural y directa para expresar prioridad.
- source_word: לְהִלָּחֶם בּוֹ
  english_pob_choice: to fight against them
  chosen_spanish: para combatir contra él
  alternatives_spanish:
  - para luchar contra él
  - para pelear contra él
  lexicon: HALOT
  rationale: El infinitivo nifal de לחם expresa combate; «combatir» es claro y digno. El sufijo singular se conserva con «él», manteniendo la singularidad formal del hebreo, aunque su referencia sea colectiva.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה en la consulta
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El hebreo emplea directamente el Tetragrámaton. Conforme a la pauta del proyecto, se traduce con el nombre propio «Yahvé» en vez de una sustitución reverencial, preservando la transparencia del texto fuente.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Colectivo singular de הַכְּנַעֲנִי
  english_pob_reading: the Canaanites
  chosen_spanish_reading: el cananeo
  alternative_spanish_readings:
  - los cananeos
  - el pueblo cananeo
  rationale: El hebreo presenta forma singular con sentido colectivo. «El cananeo» conserva esa tensión formal; no la aplana automáticamente a plural, aunque el contexto militar permite entender un colectivo.
  doctrine_reference: Lexical transparency / singular collective preservation
translation_notes:
  revision_awareness: El contexto inglés ya había sido revisado con acuerdo alto y sin cambios sustanciales; esta versión española sigue ese trazado auditable, pero adapta algunas decisiones al español para mantener transparencia del hebreo, especialmente en la consulta a Yahvé y en el singular colectivo de הַכְּנַעֲנִי.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se conserva la singularidad formal de «el cananeo» para reflejar el singular colectivo hebreo.
  - Se mantiene un registro bíblico moderno y claro, evitando arcaísmos innecesarios.
