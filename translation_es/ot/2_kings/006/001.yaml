translation:
  language: es
  text: 'Y dijeron los hijos de los profetas a Eliseo: «Por favor, mira[a]: el lugar donde habitamos delante de ti[b] es demasiado estrecho para nosotros».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los discípulos» o «la compañía de los profetas». El hebreo «hijos de los profetas» probablemente se refiere a una comunidad profética bajo instrucción o supervisión.
    reason: lexical_alternative
  - marker: b
    text: O «en tu presencia». La expresión puede indicar que vivían bajo la supervisión de Eliseo, no solo físicamente delante de él.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְנֵי הַנְּבִיאִים
  english_pob_choice: the sons of the prophets
  chosen_spanish: los hijos de los profetas
  alternatives_spanish:
  - la compañía de los profetas
  - los discípulos de los profetas
  lexicon: HALOT
  rationale: Se conserva el idiomatismo hebreo de manera transparente. «Hijos de los profetas» mantiene la forma del original y evita especificar demasiado la relación como si fuera solo escolar o institucional.
- source_word: הִנֵּה נָא
  english_pob_choice: Please see
  chosen_spanish: Mira, por favor
  alternatives_spanish:
  - Mira ahora
  - Te rogamos, mira
  - Por favor, mira
  lexicon: HALOT
  rationale: La combinación expresa atención e implícita cortesía/urgencia. En español, «Mira, por favor» reproduce bien el valor discursivo sin sonar artificial.
- source_word: הַמָּקוֹם
  english_pob_choice: the place
  chosen_spanish: el lugar
  alternatives_spanish:
  - el sitio
  - el lugar donde vivimos
  lexicon: HALOT
  rationale: «Lugar» es una traducción amplia y sobria para מָקוֹם. No se especifica más de lo que el hebreo exige.
- source_word: יֹשְׁבִים
  english_pob_choice: we dwell
  chosen_spanish: habitamos
  alternatives_spanish:
  - vivimos
  - moramos
  - estamos asentados
  lexicon: HALOT
  rationale: יָשַׁב puede significar sentarse, permanecer o habitar. Aquí el contexto es una queja sobre espacio insuficiente, por lo que «habitamos» conserva la idea residencial sin caer en un calco rígido.
- source_word: לְפָנֶיךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - en tu presencia
  - bajo tu supervisión
  lexicon: HALOT
  rationale: Se conserva la expresión espacial literal «delante de ti», dejando abierta la posible implicación de presencia u oversight sin cerrarla prematuramente.
- source_word: צַר מִמֶּנּוּ
  english_pob_choice: is too cramped for us
  chosen_spanish: es demasiado estrecho para nosotros
  alternatives_spanish:
  - es demasiado pequeño para nosotros
  - nos queda estrecho
  - nos aprieta demasiado
  lexicon: HALOT
  rationale: צַר denota estrechez, compresión o falta de espacio. «Demasiado estrecho» es natural en español y mantiene la fuerza espacial de la queja.
- source_word: וַיֹּאמְרוּ
  english_pob_choice: Now ... said
  chosen_spanish: Y dijeron
  alternatives_spanish:
  - Entonces dijeron
  - Ahora dijeron
  lexicon: HALOT
  rationale: La waw narrativa se refleja con «Y» para mantener la progresión del relato de modo sobrio y fiel.
theological_decisions:
- issue: Sentido de לְפָנֶיךָ en relación con Eliseo
  english_pob_reading: before you may indicate that they lived under Elisha's supervision rather than merely in front of him physically
  chosen_spanish_reading: delante de ti, con posible matiz de presencia/supervisión
  alternative_spanish_readings:
  - en tu presencia
  - bajo tu supervisión
  rationale: Se conserva una traducción abierta para no borrar la tensión interpretativa documentada por la POB inglesa. El español «delante de ti» permite tanto la lectura espacial como la relacional.
  doctrine_reference: No aplica; decisión de alcance semántico y relacional.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió «Please see», eliminó el redundante «there» y cambió a «dwell» para un registro más formal. En español, esto se refleja con una apelación breve («Mira, por favor») y con «habitamos», evitando redundancia innecesaria.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponda; en este versículo no aparece.
  - «Mesías/Cristo» no aplica.
  - Se mantuvo un registro formal pero natural, apto para lectura pública.
  - 'Se evitó paraphrasear la queja espacial: el eje semántico es la estrechez del lugar.'
  - Se preservó el idiomatismo «hijos de los profetas» por transparencia interlingüística.
