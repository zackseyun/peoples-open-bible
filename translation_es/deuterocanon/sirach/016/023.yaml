translation:
  language: es
  text: Los que carecen de entendimiento entenderán estas cosas, y el hombre necio considerará esto[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice ‘esto’ en la segunda cola; el paralelo griego tiene ‘cosas necias’. El texto principal sigue el testimonio hebreo, mientras el griego apoya el matiz de פּוֹתֶה como más que simplemente ingenuo.
    reason: alternative_reading
lexical_decisions:
- source_word: חַסְרֵי לֵב
  english_pob_choice: those lacking sense
  chosen_spanish: los que carecen de entendimiento
  alternatives_spanish:
  - los que carecen de corazón
  - los sensatos no
  lexicon: HALOT
  rationale: El hebreo literalmente dice ‘faltos de corazón’, un hebraísmo para falta de entendimiento o buen juicio. En español, ‘carecen de entendimiento’ comunica esa idiomaticidad con naturalidad y sin cargar el verso con una metáfora corporal demasiado opaca.
- source_word: יָבִינוּ
  english_pob_choice: will understand
  chosen_spanish: entenderán
  alternatives_spanish:
  - comprenderán
  - discernirán
  lexicon: HALOT
  rationale: El verbo expresa comprender o entender. ‘Entenderán’ mantiene el paralelismo sapiencial y es la opción más directa en español.
- source_word: אֵלֶּה
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  - estas
  lexicon: HALOT
  rationale: El hebreo plural y el paralelo griego ταῦτα justifican un plural explícito en español. ‘Estas cosas’ evita ambigüedad y conserva la referencia amplia.
- source_word: גֶבֶר
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  - el varón
  lexicon: HALOT
  rationale: El sustantivo es masculino y aquí designa un individuo ejemplar en estilo sapiencial. ‘El hombre’ refleja el género del original sin forzar una neutralización que debilite el paralelismo.
- source_word: פּוֹתֶה
  english_pob_choice: foolish
  chosen_spanish: necio
  alternatives_spanish:
  - simple
  - ingenuo
  - falto de juicio
  lexicon: HALOT
  rationale: El hebreo puede sugerir simplicidad o facilidad para dejarse llevar, pero el paralelo griego ἄφρων καὶ πλανώμενος intensifica el matiz hacia falta de juicio. ‘Necio’ recoge mejor ese valor en español bíblico contemporáneo que ‘ingenuo’ o ‘simple’.
- source_word: יַחְשֹׁב
  english_pob_choice: will consider
  chosen_spanish: considerará
  alternatives_spanish:
  - pensará en
  - tomará en cuenta
  - reflexionará sobre
  lexicon: HALOT
  rationale: El verbo significa pensar, calcular o considerar. ‘Considerará’ es fiel al sentido reflexivo y reproduce bien la revisión inglesa más reciente del POB.
- source_word: זֹאת
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - esta cosa
  - estas cosas
  lexicon: HALOT
  rationale: El demonstrativo singular se mantiene como singular en español. ‘Esto’ conserva la diferencia con el plural de la primera cola y no uniforma indebidamente el hebreo.
theological_decisions:
- issue: Relación entre el hebreo y el paralelo griego en la segunda cola
  english_pob_reading: Hebrew reads 'this' in the second line, while the Greek parallel has 'foolish things.' The main text follows the Hebrew witness, with the Greek informing the sense of פּוֹתֶה as more than merely naive.
  chosen_spanish_reading: El texto principal sigue el hebreo en ‘esto’, mientras el griego apoya el matiz de פּוֹתֶה como ‘necio’ y no solo ‘ingenuo’.
  alternative_spanish_readings:
  - el hombre necio pensará en cosas necias
  - el hombre insensato considerará cosas necias
  rationale: No se debe armonizar el hebreo con el griego en la línea principal cuando el POB documenta una diferencia real. La traducción principal conserva ‘esto’ para זֹאת y deja que el griego informe la fuerza de ‘necio’, sin introducir ‘cosas necias’ en el texto base.
  doctrine_reference: Principio de crítica textual y fidelidad a testigos múltiples sin borrar la tensión documentada.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente que prefirió ‘considerará’ frente a ‘pensará en’ por mayor naturalidad formal. También se respetó la nota de variación hebreo/griego: el texto principal mantiene el singular ‘esto’ del hebreo, sin borrar el plural griego de sentido en la nota.'
  spanish_consistency_notes:
  - Se mantuvo ‘Dios/Yahvé/Mesías’ fuera de este verso por no aparecer en el texto.
  - Se prefirió ‘carecen de entendimiento’ para reflejar el hebraísmo ‘faltos de corazón’ sin usar un calco opaco.
  - ‘Necio’ se usa como término sapiencial fuerte, coherente con la carga del griego ἄφρων.
  - Se conservó el singular ‘esto’ para זֹאת, conforme al testimonio hebreo y a la decisión auditada del POB.
