revisions:
- from: 'Así que volvió a Judá y dijo[a]: «No la encontré, y además los hombres del lugar dijeron[b]: “No ha habido aquí una qĕdēšâ”».'
  to: 'Así que volvió a Judá y dijo: «No la encontré, y además los hombres del lugar dijeron: “No ha habido aquí una prostituta de culto[a]”».[b]'
  rationale: 'Se corrige la nota mal ubicada y se alinea el texto principal con la decisión léxica auditada: קְדֵשָׁה se traduce como «prostituta de culto» en vez de dejarse transliterado. La explicación del hebreo qĕdēšâ pasa a una nota anclada al término, y la alternativa de la cláusula existencial se conserva en una nota separada, como en el POB inglés. El resultado es más fiel al expediente, más claro para lectores hispanohablantes y editorialmente consistente.'
  reviewer_model: gpt-5.4
