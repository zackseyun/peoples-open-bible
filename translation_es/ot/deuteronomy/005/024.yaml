translation:
  language: es
  text: 'Y dijeron[a]: «Miren, Yahvé nuestro Dios nos ha mostrado su gloria y su grandeza, y hemos oído su voz de en medio del fuego. Hoy hemos visto que Dios habla con el hombre, y vive».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con la humanidad, y viven». El hebreo tiene el singular «el hombre», usado de manera representativa para la humanidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמְרוּ
  english_pob_choice: And you said
  chosen_spanish: Y ustedes dijeron
  alternatives_spanish:
  - Y dijeron
  - Entonces dijeron
  lexicon: HALOT
  rationale: La forma wayyiqtol avanza la narración. En español, "Y ustedes dijeron" conserva el valor narrativo y el plural del interlocutor sin recargar con una glosa innecesaria.
- source_word: הֵן
  english_pob_choice: Look
  chosen_spanish: Miren
  alternatives_spanish:
  - Vean
  - He aquí
  - Miren
  lexicon: HALOT
  rationale: Es una partícula de llamada de atención; "Miren" comunica mejor su fuerza deíctica en español moderno y solemne.
- source_word: הֶרְאָנוּ
  english_pob_choice: has shown us
  chosen_spanish: nos ha mostrado
  alternatives_spanish:
  - nos ha dejado ver
  - nos mostró
  lexicon: HALOT
  rationale: El hifil de ראה es causativo, "hacer ver/mostrar". El perfecto español expresa bien el resultado vigente en el discurso citado.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: transliterar el nombre divino como "Yahvé" en lugar de sustituirlo por un título.'
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - nuestro Dios
  lexicon: HALOT
  rationale: Equivalencia directa del sintagma posesivo; mantiene la aposición natural en español después del nombre divino.
- source_word: כְּבֹדוֹ
  english_pob_choice: his glory
  chosen_spanish: su gloria
  alternatives_spanish:
  - su honor
  - su esplendor
  lexicon: HALOT
  rationale: En contexto de teofanía, כבוד refiere a gloria manifiesta; "gloria" es la opción más fiel y reconocible.
- source_word: גָּדְלוֹ
  english_pob_choice: his greatness
  chosen_spanish: su grandeza
  alternatives_spanish:
  - su majestad
  - su grandeza
  lexicon: HALOT
  rationale: Conserva el sentido de magnitud/excelencia y distingue este término de "gloria" sin hacerlo sonar técnico en español.
- source_word: קֹלוֹ
  english_pob_choice: his voice
  chosen_spanish: su voz
  alternatives_spanish:
  - su sonido
  lexicon: HALOT
  rationale: En el contexto del habla divina, "voz" es la equivalencia natural y precisa.
- source_word: מִתּוֹךְ הָאֵשׁ
  english_pob_choice: from the midst of the fire
  chosen_spanish: desde en medio del fuego
  alternatives_spanish:
  - desde el fuego
  - desde en medio del fuego
  lexicon: HALOT
  rationale: Preserva la imagen locativa intensa de תּוֹךְ sin volverla artificiosa; "desde en medio" reproduce el valor espacial de la expresión hebrea.
- source_word: הַיּוֹם הַזֶּה
  english_pob_choice: This day
  chosen_spanish: Hoy
  alternatives_spanish:
  - Este día
  - En este día
  lexicon: HALOT
  rationale: '"Hoy" suena natural en español y mantiene la solemnidad inmediata del enunciado deíctico.'
- source_word: רָאִינוּ
  english_pob_choice: we have seen
  chosen_spanish: hemos visto
  alternatives_spanish:
  - vimos
  lexicon: HALOT
  rationale: El perfecto español expresa el valor presente del testimonio dado en el discurso directo.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues que
  lexicon: HALOT
  rationale: Introduce de manera directa el contenido constatado por la experiencia.
- source_word: יְדַבֵּר
  english_pob_choice: speaks
  chosen_spanish: habla
  alternatives_spanish:
  - puede hablar
  - habla
  lexicon: HALOT
  rationale: 'Aunque el inglés revisado pasó a un presente simple, el hebreo imperfecto aquí expresa una verdad/posibilidad general en el contexto: "habla" comunica la afirmación sin sobreinterpretar modalidad.'
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios
  lexicon: HALOT
  rationale: El contexto exige sentido singular; en español "Dios" mantiene la referencia monoteísta sin pérdida.
- source_word: אֶת הָאָדָם
  english_pob_choice: with man
  chosen_spanish: con el hombre
  alternatives_spanish:
  - con un hombre
  - con la humanidad
  lexicon: HALOT
  rationale: Se toma אֶת aquí como valor de compañía, no de objeto directo. "El hombre" conserva el singular representativo del hebreo, como en el audit trail inglés.
- source_word: וָחָי
  english_pob_choice: and he lives
  chosen_spanish: y vive
  alternatives_spanish:
  - y vive todavía
  - y sigue viviendo
  lexicon: HALOT
  rationale: El valor resultante se expresa de forma sobria con el presente; evita añadir una matización no exigida por el hebreo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: Se conserva la decisión doctrinal del proyecto de no enmascarar el Tetragrámaton con un título. "Yahvé" es la transliteración establecida en el español de esta serie.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh (adaptado al español como Yahvé)'
- issue: Alcance de אָדָם en singular representativo
  english_pob_reading: man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - la humanidad
  - el ser humano
  rationale: El hebreo usa singular masculino representativo; se mantiene "el hombre" para no diluir la forma del original. El sentido inclusivo queda implícito en la representación genérica.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #4; Contested terms: אָדָם adam → man / humankind (context)'
- issue: Sentido de יְדַבֵּר en la cláusula final
  english_pob_reading: speaks
  chosen_spanish_reading: habla
  alternative_spanish_readings:
  - puede hablar
  - habla con
  rationale: 'El imperfecto hebreo aquí expresa una verdad observada/constatada: que Dios habla con el hombre y este vive. En español, "habla" conserva esa afirmación general sin añadir modalidad que el texto no exige.'
  doctrine_reference: 'DOCTRINE.md: verbal aspect and context-sensitive rendering'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que cambió «may speak with man, and he still lives» por «speaks with man, and he lives» para reflejar con mayor cercanía la construcción hebrea y una formulación más sobria. La versión española sigue esa misma dirección, evitando una modalidad excesiva y manteniendo el resultado vivido con un presente simple.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה conforme al criterio del proyecto.
  - Se mantiene la distinción entre «gloria» y «grandeza» para כבוד y גדול, respectivamente.
  - «Su voz» preserva el valor auditivo de קוֹל en contexto de teofanía.
  - La nota al pie se ancla en «el hombre» para conservar la alternativa inclusiva documentada sin alterar el texto principal.
