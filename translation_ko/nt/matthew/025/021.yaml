  yaml_path: translation/nt/matthew/025/021.yaml
  text: His master said to him[a], ‘Well done, good and faithful servant. You were faithful over a few things; I will appoint you over many things[b]. Enter into the joy of your master.’
  footnotes:
  - marker: a
    text: 'Or ''slave'': ''Well done, good and faithful slave.'' The Greek word is doulos, which can mean either ''servant'' or ''slave'' depending on context.'
    reason: alternative_reading
  - marker: b
    text: Greek kyrios here could also be rendered 'lord,' but 'master' best fits the parable's servant-master relationship.
    reason: lexical_alternative
