translation:
  language: es
  text: La apariencia de las ruedas y su hechura era como el resplandor del berilo[a], y las cuatro tenían la misma semejanza; y su apariencia y su hechura eran como si una rueda estuviera dentro de otra rueda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo tarshish, una piedra preciosa de identificación incierta; tradicionalmente se traduce «berilo» o «crisólito».
    reason: lexical_alternative
lexical_decisions:
- source_word: מַרְאֵה
  english_pob_choice: appearance
  chosen_spanish: apariencia
  alternatives_spanish:
  - aspecto
  - visible forma
  lexicon: HALOT
  rationale: מַרְאֶה designa lo que se ve, la apariencia visible. «Apariencia» conserva bien ese valor y funciona naturalmente en español.
- source_word: הָאוֹפַנִּים
  english_pob_choice: the wheels
  chosen_spanish: las ruedas
  alternatives_spanish:
  - los ruedas
  lexicon: HALOT
  rationale: אוֹפַן es el término ordinario para «rueda». En español el plural definido se traduce de forma directa como «las ruedas».
- source_word: וּמַעֲשֵׂיהֶם
  english_pob_choice: their workmanship
  chosen_spanish: su obra
  alternatives_spanish:
  - su construcción
  - su hechura
  lexicon: HALOT
  rationale: מַעֲשֶׂה puede significar trabajo, obra o hechura. «Su obra» mantiene la idea de lo hecho o confeccionado y deja el paralelismo con «apariencia» sin sonar forzado.
- source_word: כְּעֵין תַּרְשִׁישׁ
  english_pob_choice: like the gleam of beryl
  chosen_spanish: como el resplandor del berilo
  alternatives_spanish:
  - como el brillo del berilo
  - como la apariencia del berilo
  lexicon: HALOT
  rationale: כְּעֵין expresa una comparación visual; en este contexto se trata del fulgor o resplandor de una piedra preciosa. «Berilo» sigue la equivalencia tradicional usada por la POB en inglés, y «resplandor» comunica la cualidad visual sin negar la incertidumbre del término hebreo.
- source_word: וּדְמוּת אֶחָד לְאַרְבַּעְתָּן
  english_pob_choice: the four of them had the same likeness
  chosen_spanish: las cuatro tenían la misma semejanza
  alternatives_spanish:
  - una misma semejanza era para las cuatro
  - las cuatro tenían un mismo aspecto
  lexicon: HALOT
  rationale: 'La construcción hebrea es comprimida: enfatiza que una sola semejanza correspondía a las cuatro. «Tenían la misma semejanza» conserva esa uniformidad en español con claridad idiomática.'
- source_word: וּמַרְאֵיהֶם
  english_pob_choice: their appearance
  chosen_spanish: su apariencia
  alternatives_spanish:
  - su aspecto
  lexicon: HALOT
  rationale: Se mantiene el mismo campo léxico de מַרְאֶה para respetar la repetición hebrea y la simetría del verso.
- source_word: וּמַעֲשֵׂיהֶם
  english_pob_choice: their workmanship
  chosen_spanish: su obra
  alternatives_spanish:
  - su hechura
  - su construcción
  lexicon: HALOT
  rationale: Se traduce de modo consistente con el primer uso de מַעֲשֶׂה para preservar el paralelismo y la repetición retórica del texto.
- source_word: כַּאֲשֶׁר יִהְיֶה הָאוֹפַן בְּתוֹךְ הָאוֹפָן
  english_pob_choice: as if a wheel were within a wheel
  chosen_spanish: como si una rueda estuviera dentro de otra rueda
  alternatives_spanish:
  - como una rueda dentro de otra rueda
  - como si una rueda estuviera en medio de otra rueda
  lexicon: HALOT
  rationale: La comparación final describe la disposición de las ruedas. «Estuviera dentro de otra rueda» reproduce con naturalidad el valor de la simiente hebrea y la imagen espacial del original.
translation_notes:
  revision_awareness: Se revisó la redacción a la luz del texto hebreo y del trazado auditado en inglés; no hubo cambios sustantivos respecto del sentido tradicionalmente aceptado por la POB en este versículo.
  spanish_consistency_notes:
  - Se mantuvo «apariencia/obra» de forma repetida para reflejar el paralelismo hebreo.
  - Se eligió «berilo» siguiendo la solución inglesa auditada, pero con nota de incertidumbre lexical.
  - «Semejanza» conserva la fuerza de דְמוּת sin sustituirlo por una paráfrasis más libre.
