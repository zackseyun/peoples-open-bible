review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: la mirada fija, la casa de un hombre, el estado favorable del hogar, el símil de la serpiente y el propósito de deshacer la sabiduría mutua. También acierta al tratar παρανόμων como genitivo sustantivado. Sin embargo, hay dos puntos mejorables para fidelidad y español natural: 1) ἐπʼ οἶκον se expresa mejor como ''hacia/contra la casa'' o ''puestos en la casa'', no simplemente ''en la casa''; 2) ''como serpiente'' suena algo abrupto en español y pide artículo. Además, conviene conservar la nota inglesa sobre ''casa'' = hogar/patrimonio.'
  spanish_quality_summary: El texto es comprensible y digno, pero 'en la casa de un hombre' puede sugerir ubicación física más que dirección de la mirada, y 'la sabiduría unos de otros' resulta menos natural que 'la sabiduría de unos y otros'. 'Como una serpiente' mejora la fluidez idiomática. La nota b es útil gramaticalmente, pero falta una nota léxica para 'casa' si se quiere preservar el alcance semántico documentado en el audit trail.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. 'Serpiente' es adecuado para ὄφις; 'hombres sin ley' conserva bien el matiz jurídico-moral de παράνομος. 'Prosperidad' sigue la decisión contextual inglesa y la nota a preserva las alternativas léxicas pertinentes.
  issues:
  - severity: medium
    issue: '''en la casa de un hombre'' puede malrepresentar ἐπʼ οἶκον como ubicación en vez de dirección u objetivo de la mirada'
    rationale: El griego describe los ojos puestos sobre/hacia la casa, no a los sujetos dentro de ella. 'Puestos en la casa' o 'hacia la casa' comunica mejor la orientación visual.
  - severity: low
    issue: Falta la nota léxica sobre 'casa' como hogar o patrimonio
    rationale: El audit trail inglés preserva expresamente la amplitud semántica de οἶκος. En español conviene mantener esa posibilidad para no estrechar el sentido al edificio.
  - severity: low
    issue: '''como serpiente'' suena menos natural que ''como una serpiente'''
    rationale: En español general, el símil con artículo es más idiomático sin alterar el sentido.
  - severity: low
    issue: '''la sabiduría unos de otros'' es menos natural en español'
    rationale: '''La sabiduría de unos y otros'' preserva el valor recíproco de ἀλλήλων con mejor fluidez.'
  revised_spanish_text: Y sus ojos están puestos en la casa[a] de un hombre en prosperidad[b], como una serpiente, para deshacer la sabiduría de unos y otros con palabras de hombres sin ley[c].
  revised_footnotes:
