base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/016/013.yaml
  text: Then Samuel took the horn of oil and anointed him in the midst of his brothers[a]. And the Spirit of Yahweh rushed upon David from that day onward[b]. Then Samuel rose and went to Ramah.
  footnotes:
