base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/012/002.yaml
  text: Son of man[a], you dwell in the midst of a rebellious house, who have eyes to see but do not see, ears to hear but do not hear[b], for they are a rebellious house.
  footnotes:
  - marker: a
    text: Or 'a house of rebellion' or 'a rebellious people.' The Hebrew 'house' is a corporate term for the people as a whole.
    reason: lexical_alternative
  - marker: b
    text: Literally 'eyes are to them to see, and they do not see; ears are to them to hear, and they do not hear.'
    reason: lexical_alternative
