    reason: lexical_alternative
  revision_rationale: Se conserva el sentido del borrador, pero se añaden las notas necesarias para reflejar plenamente el rastro de auditoría inglés y las alternativas exegéticamente relevantes. Además, se pule la cláusula final con 'para dársela' para mejorar la fluidez del español sin alejarse del hebreo.
