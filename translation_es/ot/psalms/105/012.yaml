translation:
  language: es
  text: Cuando eran pocos en número[a], muy pocos, y residentes temporales en ella,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y extraños en ella». El término hebreo se refiere a personas que viven como extranjeros o como residentes temporales en una tierra que no es propia.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּהְיוֹתָם
  english_pob_choice: When they were
  chosen_spanish: Cuando eran
  alternatives_spanish:
  - Cuando estuvieron
  - Mientras eran
  - Al ser
  lexicon: HALOT
  rationale: La construcción temporal con ב + infinitivo de היה expresa circunstancia de tiempo. «Cuando eran» reproduce de forma natural el valor temporal sin volverla rígida o demasiado literal.
- source_word: מְתֵי מִסְפָּר
  english_pob_choice: few in number
  chosen_spanish: pocos en número
  alternatives_spanish:
  - unos pocos
  - de número reducido
  - hombres de número
  lexicon: HALOT
  rationale: El hebreo es un modismo para una cantidad pequeña y contable. «Pocos en número» mantiene la idea cuantitativa y conserva el tono formal del verso.
- source_word: כִּמְעַט
  english_pob_choice: very few
  chosen_spanish: muy pocos
  alternatives_spanish:
  - casi ninguno
  - poquísimos
  - pocos de verdad
  lexicon: HALOT
  rationale: La partícula intensifica la frase anterior. «Muy pocos» comunica la intensificación sin agregar matices no presentes en el hebreo.
- source_word: וְגָרִים
  english_pob_choice: and sojourners
  chosen_spanish: y forasteros
  alternatives_spanish:
  - y extranjeros residentes
  - y peregrinos
  - y residentes temporales
  lexicon: HALOT
  rationale: גּוּר describe vivir como extranjero o residente temporal. En español, «forasteros» transmite la condición de no pertenecer al lugar; se evita «siervos» o vocabulario eclesiástico que no corresponde aquí.
- source_word: בָּהּ
  english_pob_choice: in it
  chosen_spanish: en ella
  alternatives_spanish:
  - en ella misma
  - en esa tierra
  - allí
  lexicon: HALOT
  rationale: El sufijo femenino singular remite a la tierra mencionada en el contexto. «En ella» es natural en español y preserva la referencia implícita sin añadir un sustantivo no presente.
translation_notes:
  revision_awareness: 'Coincide con el control textual disponible: el hebreo describe una temporalidad inicial de escasez y residencia extranjera; el inglés POB no introduce variantes textuales ni cambios doctrinales, y el español conserva esa misma secuencia semántica con equivalencia óptima.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque no aparece un nombre divino en este versículo.
  - «Forasteros» se usa aquí en sentido de residencia ajena o temporal, no como simple desconocido.
  - 'La nota al pie conserva la alternativa léxica principal del inglés POB: «strangers/sojourners».'
