translation:
  language: es
  text: Esdras, el escriba, estaba de pie sobre una plataforma de madera[a] que habían hecho para ese propósito[b]; y junto a él estaban de pie Matitías, Sema, Anaías, Urías, Hilquías y Maasías, a su derecha, y Pedaías, Misael, Malquías, Hasum, Hasbadana, Zacarías y Mesulam, a su izquierda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''torre de madera''; es decir, una estructura elevada de madera o un estrado.'
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse como 'para el asunto' o 'para la ocasión'.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִגְדַּל עֵץ
  english_pob_choice: a wooden platform
  chosen_spanish: una plataforma de madera
  alternatives_spanish:
  - una torre de madera
  - un estrado de madera
  - un pedestal de madera
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'torre de madera', pero el contexto narrativo es de una estructura elevada para que Esdras se pusiera de pie ante la asamblea. 'Plataforma de madera' comunica la función sin perder la base material de 'madera'.
- source_word: לַדָּבָר
  english_pob_choice: for the purpose
  chosen_spanish: para el propósito
  alternatives_spanish:
  - para el asunto
  - para la ocasión
  - para el evento
  lexicon: HALOT
  rationale: דָּבָר puede significar 'palabra, asunto, cosa, motivo'. Sigo la decisión inglesa reciente de acercarse más al valor léxico de 'purpose', manteniendo una formulación natural en español.
- source_word: הַסֹּפֵר
  english_pob_choice: the scribe
  chosen_spanish: el escriba
  alternatives_spanish:
  - el escribano
  - el secretario
  - el copista
  lexicon: HALOT
  rationale: '''Escriba'' es el equivalente más preciso y tradicional para סֹפֵר en este contexto de enseñanza pública y lectura de la ley.'
- source_word: וַיַּעֲמֹד
  english_pob_choice: stood
  chosen_spanish: se puso de pie / estuvieron
  alternatives_spanish:
  - estuvo de pie
  - se mantuvo en pie
  - se colocaron
  lexicon: HALOT
  rationale: Para Esdras, 'se puso de pie' suena natural y conserva el acto narrativo; para los que estaban a su lado, 'estuvieron' evita una repetición áspera y mantiene la idea de posición estable.
- source_word: אֶצְלוֹ
  english_pob_choice: beside him
  chosen_spanish: junto a él
  alternatives_spanish:
  - al lado de él
  - cerca de él
  - a su lado
  lexicon: HALOT
  rationale: '''Junto a él'' expresa proximidad inmediata en un español fluido y recoge el sentido relacional de la preposición.'
- source_word: עַל יְמִינוֹ
  english_pob_choice: on his right hand
  chosen_spanish: a su derecha
  alternatives_spanish:
  - a su mano derecha
  - sobre su lado derecho
  - a su diestra
  lexicon: HALOT
  rationale: En español actual, 'a su derecha' transmite de manera clara la dirección espacial; 'a su diestra' sería más tradicional pero menos neutral y más marcada.
- source_word: וּמִשְּׂמֹאלוֹ
  english_pob_choice: on his left hand
  chosen_spanish: a su izquierda
  alternatives_spanish:
  - a su mano izquierda
  - sobre su lado izquierdo
  lexicon: HALOT
  rationale: Paralela a 'a su derecha', esta expresión es natural y exacta.
- source_word: מַתִּתְיָה
  english_pob_choice: Mattithiah
  chosen_spanish: Matitías
  alternatives_spanish:
  - Matatías
  - Matatía
  lexicon: BDB/HALOT
  rationale: Se hispaniza el nombre propio para una lectura pública en español, manteniendo una forma reconocible y cercana a la tradición bíblica.
- source_word: שֶׁמַע
  english_pob_choice: Shema
  chosen_spanish: Sema
  alternatives_spanish:
  - Shema
  - Shemá
  lexicon: BDB/HALOT
  rationale: Se adapta la transliteración al uso hispano de nombres bíblicos; 'Sema' evita una grafía menos integrada al español.
- source_word: עֲנָיָה
  english_pob_choice: Anaiah
  chosen_spanish: Ananías
  alternatives_spanish:
  - Anaya
  - Ananías
  lexicon: BDB/HALOT
  rationale: Aunque la forma inglesa es 'Anaiah', la adaptación española más transparente y estable para el lector es 'Ananías'.
- source_word: אוּרִיָּה
  english_pob_choice: Uriah
  chosen_spanish: Urías
  alternatives_spanish:
  - Uria
  - Urija
  lexicon: BDB/HALOT
  rationale: Forma castellana bien establecida del nombre.
- source_word: חִלְקִיָּה
  english_pob_choice: Hilkiah
  chosen_spanish: Hilkías
  alternatives_spanish:
  - Jilquías
  - Elcías
  lexicon: BDB/HALOT
  rationale: Se preserva la forma cercana al hebreo con adaptación española regular para el nombre propio.
- source_word: מַעֲשֵׂיָה
  english_pob_choice: Maaseiah
  chosen_spanish: Maasías
  alternatives_spanish:
  - Maseías
  - Maaseya
  lexicon: BDB/HALOT
  rationale: Se hispaniza el nombre propio manteniendo el eco del hebreo y la legibilidad en español.
- source_word: פְּדָיָה
  english_pob_choice: Pedaiah
  chosen_spanish: Pedaías
  alternatives_spanish:
  - Pedaya
  - Pedaia
  lexicon: BDB/HALOT
  rationale: Adaptación hispana regular del nombre.
- source_word: מִישָׁאֵל
  english_pob_choice: Mishael
  chosen_spanish: Misael
  alternatives_spanish:
  - Micael
  - Misael
  lexicon: BDB/HALOT
  rationale: Se usa la forma española asentada del nombre bíblico.
- source_word: מַלְכִּיָּה
  english_pob_choice: Malchijah
  chosen_spanish: Malquías
  alternatives_spanish:
  - Malquía
  - Melquías
  lexicon: BDB/HALOT
  rationale: Se elige la forma hispanizada que mejor conserva el valor del nombre y es comprensible para el lector.
- source_word: חָשֻׁם
  english_pob_choice: Hashum
  chosen_spanish: Hasum
  alternatives_spanish:
  - Jasum
  - Jashum
  lexicon: BDB/HALOT
  rationale: Adaptación simple y legible del nombre propio.
- source_word: חַשְׁבַּדָּנָה
  english_pob_choice: Hashbaddanah
  chosen_spanish: Hasbadana
  alternatives_spanish:
  - Jasbadana
  - Hashbadana
  lexicon: BDB/HALOT
  rationale: Se conserva la aproximación fonética al hebreo con una forma española pronunciable.
- source_word: זְכַרְיָה
  english_pob_choice: Zechariah
  chosen_spanish: Zacarías
  alternatives_spanish:
  - Zaharías
  - Zacarías
  lexicon: BDB/HALOT
  rationale: Forma española establecida del nombre bíblico.
- source_word: מְשֻׁלָּם
  english_pob_choice: Meshullam
  chosen_spanish: Meschulam
  alternatives_spanish:
  - Mesulam
  - Meshulam
  lexicon: BDB/HALOT
  rationale: Se mantiene una transliteración cercana al hebreo pero acomodada a una lectura española fluida.
theological_decisions:
- issue: La expresión lַדָּבָר puede entenderse como 'el asunto', 'el propósito' o 'la ocasión'
  english_pob_reading: for the purpose
  chosen_spanish_reading: para el propósito
  alternative_spanish_readings:
  - para el asunto
  - para la ocasión
  - para el evento
  rationale: No hay carga doctrinal directa; la decisión busca reflejar la revisión inglesa más reciente y conservar la ambigüedad mínima del hebreo sin forzar una paráfrasis temporal.
  doctrine_reference: N/A
- issue: La lista de nombres propios y la dirección espacial del grupo junto a Esdras
  english_pob_reading: beside him ... on his right hand ... on his left hand
  chosen_spanish_reading: junto a él ... a su derecha ... a su izquierda
  alternative_spanish_readings:
  - al lado de él ... a su diestra ... a su siniestra
  - cerca de él ... a la derecha ... a la izquierda
  rationale: La decisión privilegia claridad pública en español sin cambiar la disposición espacial del texto. No introduce interpretación teológica nueva.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La base inglesa revisó 'for the occasion' a 'for the purpose' para acercarse más al hebreo לַדָּבָר. La versión española sigue esa revisión con 'para el propósito', pero conserva una nota que deja visibles las alternativas semánticas que el hebreo admite.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' por norma del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se traduce הַסֹּפֵר como 'el escriba', coherente con el léxico del proyecto.
  - Los nombres propios se hispanizan de forma conservadora para lectura pública, evitando una transliteración excesivamente técnica.
  - Se conserva la estructura enumerativa del hebreo con comas y punto y coma para marcar la pausa principal tras 'para el propósito'.
