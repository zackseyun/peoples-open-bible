translation:
  language: es
  text: Pues mientras Judas[a] permanezca, es imposible que la situación alcance la paz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La apertura transmitida en el testigo griego es textualmente difícil; el sentido de la cláusula es que la presencia continua de Judas hace imposible la paz.
    reason: textual_variant
lexical_decisions:
- source_word: ἰσχρὰ
  english_pob_choice: for as long as
  chosen_spanish: mientras
  alternatives_spanish:
  - mientras que
  - si
  lexicon: LSJ
  rationale: 'La forma transmitida es difícil y el contexto exige una relación temporal: la permanencia de Judas impide la paz. «Mientras» reproduce de forma natural esa fuerza temporal sin añadir más de lo que el griego permite.'
- source_word: Ἰούδας
  english_pob_choice: Judas
  chosen_spanish: Judas
  alternatives_spanish:
  - Judá
  lexicon: nombre propio
  rationale: Se trata de un nombre personal; en español bíblico, «Judas» es la transliteración estándar para este personaje.
- source_word: περιὼν
  english_pob_choice: remains
  chosen_spanish: permanezca
  alternatives_spanish:
  - permanezca vivo
  - siga presente
  - siga viviendo
  lexicon: LSJ
  rationale: El valor de περίειμι aquí es el de seguir existiendo o seguir presente. En español, el subjuntivo tras «mientras» comunica bien la permanencia continua que el contexto presupone.
- source_word: ἀδύνατον
  english_pob_choice: it is impossible
  chosen_spanish: es imposible
  alternatives_spanish:
  - resulta imposible
  - no es posible
  lexicon: LSJ
  rationale: Es un predicado impersonal directo; «es imposible» conserva la fuerza categórica del griego.
- source_word: εἰρήνης
  english_pob_choice: peace
  chosen_spanish: la paz
  alternatives_spanish:
  - paz
  - un acuerdo de paz
  lexicon: LSJ
  rationale: «Paz» es la equivalencia normal; el artículo definido ayuda a la fluidez española sin alterar el sentido general político del pasaje.
- source_word: τυχεῖν
  english_pob_choice: to attain
  chosen_spanish: alcancen
  alternatives_spanish:
  - obtener
  - lograr
  - alcanzar
  lexicon: LSJ
  rationale: El infinitivo griego expresa llegar a poseer o alcanzar paz; en español, «alcancen» mantiene esa idea de llegada a un estado.
- source_word: τὰ πράγματα
  english_pob_choice: affairs
  chosen_spanish: los asuntos
  alternatives_spanish:
  - los asuntos públicos
  - la situación
  - el estado de las cosas
  lexicon: LSJ
  rationale: El plural griego alude a la situación política o a los asuntos públicos en general. «Los asuntos» conserva amplitud sin forzar una especificación interpretativa.
translation_notes:
  revision_awareness: 'Se siguió el juicio revisado del POB en inglés: la cláusula inicial se entiende de manera temporal, no como una afirmación autónoma sobre “φιλανθρωπίαν”, y el resultado final permanece sin cambios sustanciales respecto de la lectura auditada.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» y otras sustituciones no pertinentes, porque no hay aquí el Tetragrámaton ni una cita del nombre divino.
  - Se mantuvo un registro sobrio y público, apto para una edición eclesial amplia.
  - La nota textual se ancla en la palabra «Judas» para señalar que el problema afecta al inicio de la cláusula, no al contenido central de la oración.
