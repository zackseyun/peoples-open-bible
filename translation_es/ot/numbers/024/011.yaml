revisions:
- from: 'Así que ahora[a], huye a tu lugar. Yo dije: «Sin duda[b] te honraría», pero mira, Yahvé te ha retenido del honor.'
  to: 'Y ahora[a], huye a tu lugar. Yo dije[b]: «Sin duda[c] te honraría», pero he aquí[d], Yahvé te ha privado de honor.'
  rationale: 'Se ajusta el texto para: 1) anclar correctamente la nota alternativa de אָמַרְתִּי; 2) usar una transición más neutra (''Y ahora''); 3) elevar el registro de וְהִנֵּה con ''he aquí''; y 4) mejorar la idiomaticidad de מנע מן כבוד con ''te ha privado de honor'', manteniendo intactos el sentido y la terminología del proyecto.'
