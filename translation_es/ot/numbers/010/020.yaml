review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la estructura básica del hebreo: un jefe puesto ''sobre'' la unidad tribal de Gad, identificado como Eliasaf hijo de Deuel. Sin embargo, omite explícitamente el elemento בְנֵי (''hijos de'') presente en ''מַטֵּה בְנֵי גָד'', mientras que el inglés auditado lo preserva como ''the tribe of the sons of Gad''. Esa compresión a ''la tribu de Gad'' es entendible, pero pierde una pieza formal del sintagma fuente que conviene mantener en esta fórmula repetida.'
  spanish_quality_summary: El texto es claro y legible en español, con registro adecuado. 'Y sobre la compañía...' suena algo calcado pero aceptable dentro de la fórmula listada; la frase mejora si se preserva también 'los hijos de Gad'. La nota al pie está bien formulada y natural.
  glossary_alignment: No hay términos teológicos sensibles en el versículo. 'Compañía' para צְבָא concuerda con la decisión del POB y la nota conserva las alternativas 'hueste' y 'división'. Los nombres propios 'Eliasaf' y 'Deuel' son aceptables en español. El punto principal es mantener mejor el valor formal de בְנֵי con 'los hijos de Gad'.
  issues:
  - severity: medium
    issue: Se omite explícitamente 'los hijos de' en el sintagma tribal.
    rationale: El hebreo dice literalmente 'la tribu de los hijos de Gad' (מַטֵּה בְנֵי גָד). Reducirlo a 'la tribu de Gad' simplifica demasiado una fórmula genealógica/tribal que el inglés POB decidió conservar de modo transparente.
  - severity: low
    issue: La formulación inicial suena algo rígida.
    rationale: '''Y sobre la compañía...'' refleja bien וְעַל, pero en español queda ligeramente calco. Aun así, es tolerable en una serie formularia; no requiere reestructuración mayor.'
  revised_spanish_text: Y sobre la compañía de la tribu de los hijos de Gad estaba Eliasaf hijo de Deuel[a].
  revised_footnotes:
  - marker: a
    text: O «hueste» o «división» para צְבָא; en hebreo puede tener matiz militar, pero aquí se refiere al grupo tribal ordenado para la marcha.
    reason: lexical_alternative
  revision_rationale: Se restaura explícitamente 'los hijos de' para reflejar con más fidelidad בְנֵי גָד y alinearse con la transparencia formal del POB inglés, sin sacrificar claridad en español. Se conserva 'compañía' con la misma nota léxica, ya que la elección es fiel y natural dentro del contexto.
