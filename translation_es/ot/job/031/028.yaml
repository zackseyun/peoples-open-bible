revisions:
- from: Eso también sería una iniquidad digna de juicio,[a] porque yo habría negado a Dios[b] de lo alto.
  to: Esto también sería una iniquidad digna de juicio,[a] porque yo habría negado a Dios en lo alto.[b]
  rationale: Se ajusta el demostrativo a «Esto» para una referencia más natural al acto previo y, sobre todo, se corrige «a Dios de lo alto» a «a Dios en lo alto», que expresa mejor el valor de מִמָּעַל sin expansión interpretativa ni torpeza sintáctica. También se normaliza la nota b para que la alternativa española sea idiomática y fiel.
