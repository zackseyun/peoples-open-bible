  glossary_alignment: No hay términos del glosario principal en disputa aquí. «Samaria», «asno», «plata» y «cab» están bien manejados. La conservación de «cab» con nota cultural es adecuada. La opción «estiércol de paloma» es aceptable para חרי יונים, con nota de alternativa interpretativa.
