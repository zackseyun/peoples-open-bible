translation:
  language: es
  text: Ahora Moisés estaba pastoreando el rebaño de Jetro, su suegro, sacerdote de Madián. Llevó el rebaño más allá del desierto[a] y llegó al monte de Dios, Horeb.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al otro lado del desierto».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמֹשֶׁה
  english_pob_choice: Now Moses
  chosen_spanish: Ahora Moisés
  alternatives_spanish:
  - Y Moisés
  - Moisés
  lexicon: HALOT
  rationale: La conjunción inicial introduce un nuevo tramo narrativo. «Ahora Moisés» comunica ese cambio de escena en español con naturalidad, sin perder el valor discursivo del hebreo.
- source_word: הָיָה רֹעֶה
  english_pob_choice: was shepherding
  chosen_spanish: estaba apacentando
  alternatives_spanish:
  - estaba pastoreando
  - estaba cuidando como pastor
  - pastoreaba
  lexicon: HALOT
  rationale: El imperfecto expresa acción continua en pasado. «Estaba apacentando» conserva ese aspecto y el sentido pastoral de רעה con una formulación natural en español.
- source_word: צֹאן
  english_pob_choice: the flock
  chosen_spanish: el rebaño
  alternatives_spanish:
  - el ganado menor
  - las ovejas y las cabras
  - el hato
  lexicon: HALOT
  rationale: צֹאן designa colectivamente ganado menor. «Rebaño» es la opción más natural y suficientemente amplia para el contexto de pastoreo.
- source_word: יִתְרוֹ
  english_pob_choice: Jethro
  chosen_spanish: Jetro
  alternatives_spanish:
  - Yitro
  lexicon: HALOT
  rationale: Se sigue la convención española usual para el nombre propio, manteniendo la forma reconocible y auditables por transliteración.
- source_word: חֹתְנוֹ
  english_pob_choice: his father-in-law
  chosen_spanish: su suegro
  alternatives_spanish:
  - su pariente político
  - su suegro político
  lexicon: HALOT
  rationale: La relación familiar es directa y específica; «suegro» es la equivalencia estándar y clara en español.
- source_word: כֹּהֵן מִדְיָן
  english_pob_choice: the priest of Midian
  chosen_spanish: sacerdote de Madián
  alternatives_spanish:
  - un sacerdote de Madián
  - sacerdote en Madián
  lexicon: HALOT
  rationale: La construcción en genitivo se traslada de manera transparente. «Sacerdote de Madián» preserva la relación del título con el lugar/pueblo sin añadir explicaciones no presentes en el hebreo.
- source_word: וַיִּנְהַג
  english_pob_choice: He led
  chosen_spanish: Llevó
  alternatives_spanish:
  - Condujo
  - Guió
  - Llevaba
  lexicon: HALOT
  rationale: Para el movimiento del rebaño, «llevó» funciona de forma idiomática en español y conserva la idea de conducir el ganado sin endurecerla con «condujo».
- source_word: אַחַר הַמִּדְבָּר
  english_pob_choice: beyond the wilderness
  chosen_spanish: más allá del desierto
  alternatives_spanish:
  - al otro lado del desierto
  - tras el desierto
  - más allá del desierto, hacia el lado opuesto
  lexicon: HALOT
  rationale: אַחַר en este marco espacial expresa estar al otro lado o más allá. «Más allá del desierto» mantiene esa apertura sin precisar indebidamente la orientación geográfica.
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - arribó
  lexicon: HALOT
  rationale: El verbo marca arribo al lugar. «Llegó» es claro en narrativa española y comunica bien la culminación del desplazamiento.
- source_word: הַר הָאֱלֹהִים
  english_pob_choice: the mountain of God
  chosen_spanish: el monte de Dios
  alternatives_spanish:
  - la montaña de Dios
  - el monte divino
  lexicon: HALOT
  rationale: Se conserva la construcción transparente del hebreo. «Monte de Dios» preserva la forma y deja abierta la tensión narrativa sobre si la designación es retrospectiva o anticipada.
- source_word: חֹרֵבָה
  english_pob_choice: Horeb
  chosen_spanish: Horeb
  alternatives_spanish:
  - Horebá
  lexicon: HALOT
  rationale: El topónimo se conserva sin preposición añadida, siguiendo la revisión del POB inglés que hizo más directa la aposición final.
theological_decisions:
- issue: Si «el monte de Dios» debe interpretarse como ya sagrado o identificado así de manera retrospectiva
  english_pob_reading: the mountain of God
  chosen_spanish_reading: el monte de Dios
  alternative_spanish_readings:
  - el monte santo
  - el monte de Dios, es decir, el monte santo
  rationale: Se traduce literalmente la expresión del hebreo sin resolver la cuestión narrativa-teológica. Así se preserva la tensión documentada en el audit trail inglés.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: La versión inglesa revisó la puntuación final para dejar «the mountain of God, Horeb» sin una preposición añadida antes de Horeb. La redacción española sigue esa decisión al conservar la aposición directa «el monte de Dios, Horeb».
  spanish_consistency_notes:
  - Se mantiene «Moisés» y «Jetro» según la convención española usual de nombres propios.
  - «Yahvé» no aparece en este versículo; no hay necesidad de aplicar la convención del nombre divino aquí.
  - Se prefirió «sacerdote» en vez de una paráfrasis eclesiástica, por fidelidad al título hebreo.
  - La nota al pie marca solo la alternativa espacial documentada para אַחַר con valor locativo.
