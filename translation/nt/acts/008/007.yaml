id: ACT.8.7
reference: Acts 8:7
source:
  edition: SBLGNT
  text: ⸀πολλοὶ γὰρ τῶν ἐχόντων πνεύματα ἀκάθαρτα βοῶντα φωνῇ μεγάλῃ ⸀ἐξήρχοντο, πολλοὶ δὲ παραλελυμένοι καὶ χωλοὶ ἐθεραπεύθησαν·
translation:
  text: For many who had unclean spirits[a], they came out crying with a loud voice; and many who were paralyzed and lame were healed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'crying out with a loud voice'; the Greek participle most naturally describes the unclean spirits as they came out.
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλοὶ γὰρ
  chosen: For many
  alternatives:
  - For a great many
  - Because many
  lexicon: BDAG
  rationale: γάρ is rendered 'For' to preserve the explanatory connection to the preceding statement, and πολλοί as 'many' in straightforward quantitative sense.
- source_word: τῶν ἐχόντων
  chosen: of those who had
  alternatives:
  - from those having
  - of the ones who had
  lexicon: BDAG
  rationale: The genitive participial construction is most naturally represented in English as 'of those who had,' identifying the people affected rather than the spirits themselves as the primary referent.
- source_word: πνεύματα ἀκάθαρτα
  chosen: unclean spirits
  alternatives:
  - impure spirits
  lexicon: BDAG
  rationale: '''Unclean spirits'' is the standard and contextually precise rendering for demonic spirits in Luke-Acts; ''impure spirits'' is possible but less idiomatic in this narrative setting.'
- source_word: βοῶντα φωνῇ μεγάλῃ
  chosen: with a loud voice crying out
  alternatives:
  - crying out with a loud voice
  - shouting loudly
  lexicon: BDAG
  rationale: The phrase modifies the departure of the spirits and preserves both the participial action and the instrumental/dative phrase. 'With a loud voice crying out' keeps close to the Greek while remaining readable.
- source_word: ἐξήρχοντο
  chosen: they came out
  alternatives:
  - were coming out
  - went out
  lexicon: BDAG
  rationale: The imperfect middle is rendered with simple past in English for natural narrative flow, with 'they' referring to the unclean spirits. 'Came out' fits exorcism context better than the less idiomatic 'went out.'
- source_word: πολλοὶ δὲ
  chosen: and many
  alternatives:
  - but many
  - now many
  lexicon: BDAG
  rationale: δέ here advances the narrative rather than sharply contrasting, so 'and many' is smoother in English while preserving coordination.
- source_word: παραλελυμένοι
  chosen: who were paralyzed
  alternatives:
  - paralytics
  - those who had been paralyzed
  lexicon: BDAG
  rationale: The perfect passive participle denotes a resulting condition; 'who were paralyzed' communicates the state clearly in natural English.
- source_word: χωλοὶ
  chosen: lame
  alternatives:
  - crippled
  lexicon: BDAG
  rationale: '''Lame'' is the standard, non-pejorative rendering for physical inability to walk properly; ''crippled'' is avoided as less suitable in modern English.'
- source_word: ἐθεραπεύθησαν
  chosen: were healed
  alternatives:
  - were cured
  lexicon: BDAG
  rationale: θεραπεύω in healing contexts is best rendered 'heal'; the passive preserves that healing happened to them without specifying the agent in the clause.
