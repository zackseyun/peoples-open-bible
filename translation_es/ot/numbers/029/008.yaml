  text: וְ/הִקְרַבְתֶּ֨ם עֹלָ֤ה לַֽ/יהוָה֙ רֵ֣יחַ נִיחֹ֔חַ פַּ֧ר בֶּן בָּקָ֛ר אֶחָ֖ד אַ֣יִל אֶחָ֑ד כְּבָשִׂ֤ים בְּנֵֽי שָׁנָה֙ שִׁבְעָ֔ה תְּמִימִ֖ם יִהְי֥וּ לָ/כֶֽם־־׃
