translation:
  language: es
  text: 'Entonces Onias respondió y dijo: «Este es Jeremías, el profeta de Dios, el que ama[a] a sus hermanos y ora mucho por el pueblo y la ciudad santa».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «el que ama a los hermanos». El griego φιλάδελφος significa literalmente «amante de los hermanos» y expresa afecto fraternal hacia sus compatriotas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθέντα
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió y dijo
  lexicon: LSJ
  rationale: El participio aoristo introduce la intervención de Onias. En español, «respondió» comunica bien la función narrativa sin sonar forzado; la coordinación «respondió y dijo» preserva el tono solemne del relato bíblico.
- source_word: Ὁ φιλάδελφος
  english_pob_choice: who loves his brothers
  chosen_spanish: el que ama a sus hermanos
  alternatives_spanish:
  - el que ama a los hermanos
  - el amigo de sus hermanos
  - el hermano-amante
  lexicon: LSJ
  rationale: φιλάδελφος significa literalmente «amante de los hermanos». En español, «el que ama a sus hermanos» conserva la imagen fraternal y la relación afectiva sin volverla abstracta. Se evita «fiel» o «amigo» porque suavizan el componente léxico.
- source_word: πολλὰ προσευχόμενος
  english_pob_choice: prays much
  chosen_spanish: ora mucho
  alternatives_spanish:
  - ora con frecuencia
  - hace muchas oraciones
  - está orando mucho
  lexicon: LSJ
  rationale: La frase participial expresa acción continua e intensa. «Ora mucho» es natural en español bíblico contemporáneo y mantiene la fuerza cuantitativa de πολλὰ sin sobreinterpretar duración o frecuencia exacta.
- source_word: λαοῦ
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - su pueblo
  - la nación
  lexicon: LSJ
  rationale: El contexto es el pueblo del pacto; «el pueblo» reproduce la referencia colectiva sin añadir posesivo que no está en el griego.
- source_word: ἁγίας πόλεως
  english_pob_choice: the holy city
  chosen_spanish: la ciudad santa
  alternatives_spanish:
  - la ciudad sagrada
  lexicon: LSJ
  rationale: «La ciudad santa» es la traducción directa y clara de ἁγίας πόλεως. En este contexto alude a Jerusalén, pero el griego mantiene la formulación general.
- source_word: ὁ τοῦ θεοῦ προφήτης
  english_pob_choice: the prophet of God
  chosen_spanish: el profeta de Dios
  alternatives_spanish:
  - el profeta de Dios mismo
  - el profeta perteneciente a Dios
  lexicon: LSJ
  rationale: La estructura genitiva se conserva de manera natural en español con «de Dios». Esta forma mantiene la relación posesiva/identificadora sin necesidad de paráfrasis.
theological_decisions:
- issue: Cómo rendir φιλάδελφος sin diluir su sentido fraternal
  english_pob_reading: who loves his brothers
  chosen_spanish_reading: el que ama a sus hermanos
  alternative_spanish_readings:
  - el que ama a los hermanos
  - el amigo de sus hermanos
  rationale: La lectura inglesa preserva el lenguaje de parentesco. En español, «sus hermanos» conserva ese campo semántico y permite inferir el sentido comunitario sin borrar la imagen literal. Se evita un término más general que perdería la tensión entre afecto familiar y pertenencia al pueblo.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
translation_notes:
  revision_awareness: La redacción sigue de cerca el acuerdo alto entre la traducción inglesa auditada y el griego de Swete. Se adopta «respondió» como verbo narrativo natural y se conserva la imagen fraternal de φιλάδελφος con una nota alternativa, siguiendo la revisión inglesa que pasó de una formulación más literal a otra más natural sin cambiar el sentido.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός según el estándar del proyecto.
  - Se usa «ora» y no «reza» para mantener un registro bíblico y amplio en contextos de intercesión.
  - «Ciudad santa» conserva la santidad del lugar sin introducir explícitamente «Jerusalén», aunque el contexto la presupone.
  - La nota[a] se ancla en el sintagma fraternal porque esa es la principal zona de ambigüedad léxica del versículo.
