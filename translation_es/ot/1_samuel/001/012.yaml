translation:
  language: es
  text: Y mientras ella seguía orando delante de Yahvé[a], Elí observaba su boca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Y aconteció que, cuando ella oraba por largo tiempo delante de Yahvé, Elí observaba su boca».

      '
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה כִּי
  english_pob_choice: And as
  chosen_spanish: Y aconteció que, mientras
  alternatives_spanish:
  - Y cuando
  - Y sucedió que, cuando
  - Y aconteció que, cuando
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea introduce una circunstancia simultánea o continua para la acción siguiente. «Y aconteció que» conserva el valor narrativo; «mientras» expresa con naturalidad la duración de la oración sin forzar el español.
- source_word: הִרְבְּתָה
  english_pob_choice: she continued
  chosen_spanish: oraba largamente
  alternatives_spanish:
  - continuaba orando
  - seguía orando
  - oraba mucho
  lexicon: HALOT
  rationale: El hiphil de רבה aquí expresa intensificación o prolongación de la acción verbal. «Oraba largamente» conserva la idea de duración continua sin perder la fuerza idiomática del hebreo.
- source_word: לְהִתְפַּלֵּל
  english_pob_choice: praying
  chosen_spanish: oraba
  alternatives_spanish:
  - estaba orando
  - seguía orando
  - oraba
  lexicon: HALOT
  rationale: El infinitivo con el verbo anterior forma una cláusula de acción prolongada. En español, el imperfecto «oraba» transmite bien la continuidad y evita un calco pesado.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: La preposición hebrea marca la idea de presencia delante de Dios. «Delante de Yahvé» sigue el valor idiomático y mantiene el nombre divino según el criterio del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino según el criterio del proyecto en español. «Yahvé» es la forma de referencia establecida para el Tetragrámaton.
- source_word: שֹׁמֵר
  english_pob_choice: was watching
  chosen_spanish: observaba
  alternatives_spanish:
  - estaba vigilando
  - miraba atentamente
  - observaba
  lexicon: HALOT
  rationale: El participio qal describe una acción en curso. «Observaba» comunica vigilancia atenta con buen registro en español y evita una expresión más áspera que pudiera sugerir sospecha excesiva.
- source_word: אֶת פִּיהָ
  english_pob_choice: her mouth
  chosen_spanish: su boca
  alternatives_spanish:
  - sus labios
  - la boca de ella
  lexicon: HALOT
  rationale: El hebreo dice literalmente «su boca». Aunque el versículo siguiente aclara el movimiento de los labios, aquí conviene mantener «boca» por precisión textual y por coherencia con el flujo narrativo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. El español del proyecto preserva el nombre divino en lugar de sustituirlo por un título. «Yahvé» mantiene esa decisión con una forma ampliamente reconocible.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Se incorporó la corrección del seguimiento de revisión: la idea de acción prolongada se expresa ahora con un imperfecto natural en español («oraba largamente»), equivalente funcionalmente a la actualización inglesa de «continued praying». Se evitó una traducción mecánica del fórmula hebrea para preservar fluidez y fidelidad.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma consistente para יְהוָה, en línea con el criterio del proyecto.
  - «Delante de» conserva el valor relacional de לִפְנֵי sin convertirlo en una paráfrasis doctrinal.
  - «Boca» se mantiene por precisión léxica, dejando a la nota la alternativa más interpretativa «labios».
  - El imperfecto «oraba» preserva la continuidad de la acción mejor que un pasado perfecto simple.
