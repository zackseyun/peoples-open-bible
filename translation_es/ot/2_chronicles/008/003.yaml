review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: וילך = movimiento simple; חמת צובה = topónimo compuesto; ויחזק עליה = imponerse/prevalecer contra la ciudad o región. Sin embargo, «fue a» es más natural que «fue» solo antes de un destino, y la nota al pie introduce un error al traducir literalmente el segundo verbo como «fue fuerte» en vez de «fue/se hizo fuerte».'
  spanish_quality_summary: La frase es clara y comprensible, pero «Entonces Salomón fue a…» suena ligeramente menos pulida que «Entonces Salomón fue a…» with normalized toponym punctuation and more idiomatic military phrasing. «Prevaleció contra ella» es aceptable, aunque «prevaleció sobre ella» sería algo más idiomático en español; no obstante, conviene conservar la cercanía con el inglés auditado. La nota al pie necesita corrección estilística y semántica menor.
  glossary_alignment: No hay términos teológicos sensibles en este versículo. El topónimo compuesto debe mantenerse como «Hamat-zobá». La decisión verbal principal puede conservar «prevaleció contra ella» por fidelidad al audit trail, con nota alternativa que incluya «prevaleció sobre ella» y «tomó control de ella».
  issues:
  - severity: medium
    issue: La forma principal usa «fue» sin incorporar la preposición requerida por el complemento de destino.
    rationale: En español natural se dice «fue a Hamat-zobá», no simplemente «fue Hamat-zobá». El propio análisis léxico del borrador reconoce «fue a» como la mejor opción.
  - severity: low
    issue: La nota al pie dice literalmente «fue fuerte sobre ella».
    rationale: 'Para reflejar חזק en este contexto, la literalidad mínima correcta es «fue fuerte sobre ella» o mejor «se hizo fuerte sobre ella»; dado el inglés auditado, conviene una formulación natural: «fue fuerte sobre ella», pero sin comillas inglesas y con redacción española pulida. Mejor aún, aclarar que es un modismo hebreo.'
  revised_spanish_text: Entonces Salomón fue a Hamat-zobá[a] y prevaleció contra ella.
  revised_footnotes:
  - marker: a
    text: 'O «prevaleció sobre ella» o «tomó control de ella». El modismo hebreo dice literalmente: «fue fuerte sobre ella».'
    reason: lexical_alternative
  revision_rationale: Se ajusta la redacción principal para usar la preposición de destino natural en español («fue a») y se corrige la nota al pie para que suene idiomática y explique mejor la literalidad del modismo hebreo, sin cambiar el sentido auditado.
