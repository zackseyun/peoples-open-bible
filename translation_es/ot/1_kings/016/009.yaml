revisions:
- from: Pero su siervo Zimri[a], comandante de la mitad de los carros de guerra, conspiró contra él mientras él estaba en Tirsa, bebiendo hasta embriagarse en la casa de Arza[b], que estaba sobre la casa en Tirsa.
