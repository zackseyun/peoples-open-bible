translation:
  language: es
  text: '¿Qué quieren decir al repetir este proverbio acerca de la tierra de Israel[a], diciendo: “Los padres comen uvas agrias, y los dientes de los hijos se destemplan”?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: “Los padres comen uvas agrias, y los hijos tienen los dientes destemplados / se les ponen sensibles.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה לָּכֶם
  english_pob_choice: What do you mean
  chosen_spanish: ¿Qué quieren decir
  alternatives_spanish:
  - ¿Qué les pasa
  - ¿Qué tienen que ver con esto
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y de reprensión; en español, '¿Qué quieren decir?' comunica bien el reproche y la confrontación sin volverse rígido.
- source_word: מֹשְׁלִים
  english_pob_choice: by repeating
  chosen_spanish: al repetir
  alternatives_spanish:
  - al usar
  - al citar
  - al proferir
  lexicon: HALOT
  rationale: El participio expresa una acción habitual o reiterada de usar un proverbio; 'al repetir' transmite esa fuerza de manera natural en español.
- source_word: הַמָּשָׁל הַזֶּה
  english_pob_choice: this proverb
  chosen_spanish: este proverbio
  alternatives_spanish:
  - este dicho
  - esta parábola
  lexicon: HALOT
  rationale: Aquí מָשָׁל es claramente un refrán proverbial, no una parábola narrativa.
- source_word: עַל אַדְמַת יִשְׂרָאֵל
  english_pob_choice: concerning the land of Israel
  chosen_spanish: acerca de la tierra de Israel
  alternatives_spanish:
  - sobre la tierra de Israel
  - respecto de la tierra de Israel
  lexicon: HALOT
  rationale: עַל en este contexto introduce el asunto del proverbio; 'acerca de' evita la imagen más espacial de 'en' y refleja mejor la relación semántica.
- source_word: אָבוֹת
  english_pob_choice: The fathers
  chosen_spanish: Los padres
  alternatives_spanish:
  - Los padres varones
  - Los antepasados
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'padres', en español 'padres' puede abarcar la relación genealógica de la comparación y suena más natural que 'fathers' calco literal. Se mantiene el referente masculino/parental sin neutralizarlo a 'progenitores'.
- source_word: יֹאכְלוּ בֹסֶר
  english_pob_choice: eat sour grapes
  chosen_spanish: comen uvas agrias
  alternatives_spanish:
  - comen uvas verdes
  - comen uvas inmaduras
  lexicon: HALOT
  rationale: בֹסֶר designa uvas inmaduras/agrias; 'uvas agrias' conserva el valor proverbial y es claro en español.
- source_word: שִׁנֵּי הַבָּנִים
  english_pob_choice: the children’s teeth
  chosen_spanish: los dientes de los hijos
  alternatives_spanish:
  - los dientes de los niños
  - los dientes de los hijos varones
  lexicon: HALOT
  rationale: בָּנִים es literalmente 'hijos', y en el proverbio funciona como descendencia representativa; 'hijos' preserva esa forma y evita perder la correspondencia con el hebreo.
- source_word: תִּקְהֶינָה
  english_pob_choice: are set on edge
  chosen_spanish: se destemplan
  alternatives_spanish:
  - se les ponen sensibles
  - se les aceran
  lexicon: HALOT
  rationale: El verbo describe el efecto desagradable en los dientes provocado por la acidez; 'se destemplan' comunica bien la idea de alteración/sensación molesta en un español natural.
theological_decisions:
- issue: Referencia colectiva de אָבוֹת / בָּנִים
  english_pob_reading: Retain 'fathers' but render בָּנִים as 'children'
  chosen_spanish_reading: '''padres'' / ''hijos'' mantiene la estructura generacional del proverbio sin exagerar el alcance del masculino plural'
  alternative_spanish_readings:
  - '''los padres'' / ''los hijos'''
  - '''los antepasados'' / ''los niños'''
  rationale: El proverbio contrasta generaciones. 'Padres' e 'hijos' conservan la relación familiar y la fuerza proverbial sin introducir una neutralización indebida ni una restricción al género masculino más allá de lo que el dicho requiere.
  doctrine_reference: DOCTRINE.md §Translation philosophy, punto 4
translation_notes:
  revision_awareness: El texto sigue la revisión final del POB inglés al reflejar el valor de עַל con 'acerca de' y el carácter iterativo del participio con 'al repetir'. También conserva la nota lexical donde el inglés ofrecía la alternativa proverbial 'set on edge'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma estándar de la serie española del proyecto cuando aparezca el Tetragrámaton; aquí no aplica.
  - Se mantiene 'proverbio' para מָשָל, evitando 'parábola' porque alteraría el género textual.
  - '''Padres'' / ''hijos'' se usa como par generacional directo y más natural en español, sin borrar el vínculo familiar del hebreo.'
  - La nota al pie conserva la alternativa semántica de תִּקְהֶינָה para dejar visible la tensión léxica del efecto dental.
