id: 2MA.8.36
reference: 2 Maccabees 8:36
source:
  edition: lxx-swete-1909
  text: καὶ ὁ τοῖς Ῥωμαίοις ἀναδεξάμενος φόρον ἀπὸ τῆς τῶν ἐν Ἱεροσολύμοις αἰχμαλωσίας κατορθώσασθαι, κατήγγελλεν ὑπέρμαχον ἔχειν τοὺς Ἰουδαίους, καὶ διὰ τὸν τρόπον τοῦτον ἀτρώτους εἶναι τοὺς Ἰουδαίους, διὰ τὸ ἀκολουθεῖν τοῖς ἑαυτῶν προστεταγμένοις νόμοις.
  language: Greek
  pages:
  - 709
  confidence: high
  validation: minor_mismatch
translation:
  text: And the one who had undertaken to pay tribute to the Romans from the capture of those in Jerusalem kept proclaiming that the Jews had as their defender one who fought for them[a], and that for this reason the Jews were invulnerable[b], because they followed the laws that had been commanded to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from taking captive the people in Jerusalem'; the Greek phrase refers to the expected proceeds from the captivity of Jerusalem's inhabitants.
    reason: lexical_alternative
  - marker: b
    text: The defender is not named explicitly here; the context implies God as the one fighting on behalf of the Jews.
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ ... ἀναδεξάμενος
  chosen: the one who had undertaken
  alternatives:
  - the man who had contracted
  - the one who had assumed responsibility
  lexicon: BDAG
  rationale: The articular aorist middle participle functions substantivally, referring back to Nicanor. 'Had undertaken' captures the sense of assuming an obligation without over-specifying a commercial contract, though the context is financial.
- source_word: φόρον
  chosen: tribute
  alternatives:
  - tax
  - payment
  lexicon: LSJ
  rationale: '''Tribute'' fits a payment owed to imperial power and preserves the political tone of payment to the Romans better than the more generic ''tax'' or ''payment''.'
- source_word: ἀπὸ τῆς τῶν ἐν Ἱεροσολύμοις αἰχμαλωσίας
  chosen: from the capture of those in Jerusalem
  alternatives:
  - from the enslavement of those in Jerusalem
  - from taking captive the people in Jerusalem
  lexicon: LSJ
  rationale: 'αἰχμαλωσία denotes captivity/capture. The phrase explains the projected source of the tribute: proceeds/result from capturing Jerusalem''s inhabitants. ''Capture of those in Jerusalem'' stays close to the Greek while remaining readable. ''Enslavement'' is interpretive and narrower than the noun itself.'
- source_word: κατορθώσασθαι
  chosen: to pay
  alternatives:
  - to accomplish
  - to make good
  - to realize
  lexicon: LSJ
  rationale: Though literally 'to accomplish' or 'bring to success,' in this financial context it refers to making good on the promised tribute. Rendering it simply as 'to pay' communicates the idiomatic sense in English.
- source_word: κατήγγελλεν
  chosen: kept proclaiming
  alternatives:
  - reported
  - announced
  - declared
  lexicon: BDAG
  rationale: The imperfect indicates repeated or ongoing action. 'Kept proclaiming' reflects that aspect better than a simple past such as 'reported'.
- source_word: ὑπέρμαχον ἔχειν
  lemma: ὑπέρμαχος
  chosen: had as their defender one who fought for them
  alternatives:
  - had a champion
  - had a protector
  - had an ally
  lexicon: LSJ
  rationale: ὑπέρμαχος carries the sense of one who fights on behalf of another, not merely a passive protector. The expanded rendering preserves both defense and active combat implied in the term.
- source_word: ἀτρώτους
  chosen: invulnerable
  alternatives:
  - unwoundable
  - unharmed
  - untouchable
  lexicon: LSJ
  rationale: The adjective means not wounded or not susceptible to injury. 'Invulnerable' is idiomatic English and fits the military context.
- source_word: διὰ τὸ ἀκολουθεῖν
  chosen: because they followed
  alternatives:
  - because they were following
  - on account of following
  lexicon: BDAG
  rationale: The preposition with infinitive gives the reason. 'Because they followed' is natural English and preserves the causal force.
- source_word: τοῖς ἑαυτῶν προστεταγμένοις νόμοις
  chosen: the laws that had been commanded to them
  alternatives:
  - their prescribed laws
  - the laws appointed for them
  - their commanded laws
  lexicon: BDAG
  rationale: The perfect passive participle προστεταγμένοις indicates laws that had been authoritatively prescribed to them. This rendering makes the passive force clear without awkwardness.
