revisions:
- from: Serán avergonzados y también humillados[a], todos ellos juntos; los fabricantes de ídolos[b] irán en ignominia.
  to: Quedan avergonzados y también humillados, todos ellos juntos; los fabricantes de ídolos[a] quedan en ignominia.
  rationale: Se ajustó el tiempo verbal al valor declarativo natural del perfecto profético en este contexto y se reemplazó «irán en ignominia» por una expresión española más idiomática que conserva el sentido de entrar/quedar en estado de deshonra. Se eliminó la nota [a] original por ser una mera paráfrasis no necesaria y se mantuvo la alternativa léxica relevante sobre «imágenes».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:54:39Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del hebreo: vergüenza y humillación compartidas por los fabricantes de ídolos. También conserva la alternativa léxica de צִירִים con una nota. Sin embargo, «Serán avergonzados» e «irán» introducen un futuro que no sigue tan de cerca el valor declarativo del perfecto profético que el inglés POB resolvió como presente; en español bíblico natural aquí funciona mejor un presente resultativo/declarativo.'
  spanish_quality_summary: El español es claro y digno, pero «irán en ignominia» suena algo forzado; «van en ignominia» tampoco sería natural. Una formulación como «entran en ignominia» o «van a la ignominia» sería posible, pero la más fluida y fiel al giro hebreo es «quedan en ignominia» o «van en deshonra». Para mantener cercanía con el inglés auditado y buena legibilidad, conviene usar presente en toda la frase y una expresión más idiomática para el estado de deshonra.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Ídolos» está bien justificado por el contexto. La nota alternativa «imágenes» preserva la opción léxica documentada. No se observan problemas con nombres divinos ni títulos mesiánicos en este versículo.
  issues:
  - severity: medium
    issue: Uso de futuro en «Serán avergonzados»
    rationale: El hebreo usa perfectos en declaración profética; el inglés POB los resolvió como presente («They are put to shame»). En español, el presente («Quedan avergonzados») preserva mejor la fuerza declarativa sin desplazarla a una mera predicción futura.
  - severity: medium
    issue: Uso de futuro en «irán en ignominia»
    rationale: Además del cambio temporal, la combinación resulta poco idiomática en español. El sentido de הָלְכוּ בַכְּלִמָּה es entrar/quedar en un estado de deshonra. «Quedan en ignominia» comunica bien ese resultado y suena natural.
  - severity: low
    issue: Nota [a] no corresponde a una alternativa significativa del origen
    rationale: La nota actual solo reformula «también» como «además» y repite casi el mismo sentido. La nota léxica preservada por el inglés POB está en el sintagma final («images»), no en esta cola inicial.
  revised_spanish_text: Quedan avergonzados y también humillados, todos ellos juntos; los fabricantes de ídolos[a] quedan en ignominia.
  revised_footnotes:
  - marker: a
    text: O «los fabricantes de imágenes».
    reason: lexical_alternative
  revision_rationale: Se ajustó el tiempo verbal al valor declarativo natural del perfecto profético en este contexto y se reemplazó «irán en ignominia» por una expresión española más idiomática que conserva el sentido de entrar/quedar en estado de deshonra. Se eliminó la nota [a] original por ser una mera paráfrasis no necesaria y se mantuvo la alternativa léxica relevante sobre «imágenes».
