base_translation:
  language: en
  yaml_path: translation/ot/lamentations/002/013.yaml
  text: What can I testify to you? What can I compare you to[a], daughter Jerusalem? What can I liken to you, that I may comfort you, virgin daughter Zion? For your ruin is as great as the sea[b]; who can heal you?
  footnotes:
  - marker: a
    text: Or 'What can I bear witness to for you?' The Hebrew verb can carry a witness/testimony sense; the line is difficult, and some understand it more broadly as 'What can I say about you?'
    reason: lexical_alternative
  - marker: b
    text: Or 'your wound,' 'your ruin,' or 'your brokenness.' The Hebrew term denotes a breaking or collapse and is rendered here as 'fracture' to match the following question about healing.
    reason: lexical_alternative
