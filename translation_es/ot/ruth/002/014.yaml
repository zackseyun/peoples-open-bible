    issue: La nota [a] está puesta sobre «Acércate» en vez de sobre «vino agrio»/חֹמֶץ, que es donde la auditoría inglesa preserva la alternativa léxica.
    rationale: El inglés POB documenta específicamente la alternativa «vinegar» para חֹמֶץ. La nota sobre גֹּשִׁי הֲלֹם no es necesaria y desplaza el aparato crítico de un punto léxico más importante.
  - severity: medium
    issue: «y le sobró» queda demasiado elíptico en español.
    rationale: Aunque el hebreo deja implícito el objeto, el POB inglés lo hace explícito («she had some left over»). En español natural y claro conviene «y le sobró algo» o similar.
  - severity: low
