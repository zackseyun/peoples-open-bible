translation:
  language: es
  text: Y en Tahpanés el día se oscurecerá cuando yo rompa allí las barras de Egipto[a]; y cesará en ella el orgullo de su fuerza. Una nube la cubrirá, y sus hijas irán al cautiverio[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las barras del yugo de Egipto». El hebreo puede referirse a los soportes del poder o dominio de Egipto.
    reason: lexical_alternative
  - marker: b
    text: «Sus hijas» es una expresión profética común para los pueblos dependientes o asentamientos circundantes de una ciudad.
    reason: cultural_note
lexical_decisions:
- source_word: וּבִתְחַפְנְחֵס
  english_pob_choice: And in Tahpanhes
  chosen_spanish: Y en Tahpanhés
  alternatives_spanish:
  - Y en Tahpanes
  - Y en Tahpanhés, en
  lexicon: HALOT
  rationale: El nombre propio se translitera; el prefijo locativo ב se vierte naturalmente como «en». Mantengo una forma española inteligible y cercana al hebreo, sin sustituir el topónimo por una versión tradicional no auditada.
- source_word: חָשַׂךְ הַיּוֹם
  english_pob_choice: the day will grow dark
  chosen_spanish: el día se oscurecerá
  alternatives_spanish:
  - el día será oscurecido
  - la luz del día se apagará
  lexicon: HALOT
  rationale: El hebreo expresa oscuridad/jornada oscurecida como imagen de juicio. «Se oscurecerá» conserva la fuerza idiomática y evita una paráfrasis excesiva.
- source_word: בְּשִׁבְרִי
  english_pob_choice: when I break
  chosen_spanish: cuando yo rompa
  alternatives_spanish:
  - cuando quebrante
  - al quebrar yo
  lexicon: HALOT
  rationale: El infinitivo constructo con sufijo de 1cs funciona temporalmente; «cuando yo rompa» reproduce de manera directa la acción divina y su valor de tiempo.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - allí mismo
  - en ese lugar
  lexicon: HALOT
  rationale: Conserva la referencia locativa y el énfasis de proximidad del hebreo, con un español natural.
- source_word: מֹטוֹת מִצְרַיִם
  english_pob_choice: the bars of Egypt
  chosen_spanish: las barras de Egipto
  alternatives_spanish:
  - los yugos de Egipto
  - las barras/yugos de Egipto
  lexicon: HALOT
  rationale: «מֹטוֹת» puede aludir a barras, postes o varas de yugo. En el contexto de quebrar el poder de Egipto, «barras» conserva la metáfora de soporte/dominación sin introducir una interpretación demasiado específica. Mantengo la tensión lexical documentada por la traducción inglesa.
- source_word: וְנִשְׁבַּת בָּהּ
  english_pob_choice: will cease in her
  chosen_spanish: cesará en ella
  alternatives_spanish:
  - será eliminado en ella
  - llegará a su fin en ella
  lexicon: HALOT
  rationale: El nifal de שבת expresa cesar/llegar a término. «Cesará en ella» conserva el sentido intransitivo y el referente femenino del lugar/ciudad, sin añadir un agente explícito.
- source_word: גְּאוֹן עֻזָּהּ
  english_pob_choice: the pride of her strength
  chosen_spanish: el orgullo de su fuerza
  alternatives_spanish:
  - el orgullo de su poder
  - su orgullosa fortaleza
  lexicon: HALOT
  rationale: La cadena constructa une «orgullo» y «fuerza». «Orgullo» mantiene la carga moral, y «su fuerza» preserva el sustantivo de potencia/might. En español, «fuerza» comunica bien la idea de poder militar sin perder transparencia.
- source_word: הִיא
  english_pob_choice: A cloud will cover her
  chosen_spanish: Una nube la cubrirá
  alternatives_spanish:
  - Ella, una nube la cubrirá
  - La cubrirá una nube
  lexicon: HALOT
  rationale: El pronombre independiente es enfático en hebreo, pero la revisión inglesa lo resolvió sin una glosa explícita. En español, la simple continuidad mantiene la fluidez y el foco en el objeto cubierto.
- source_word: עָנָן יְכַסֶּנָּה
  english_pob_choice: a cloud will cover her
  chosen_spanish: Una nube la cubrirá
  alternatives_spanish:
  - Una nube la cubrirá por completo
  - Una nube la envolverá
  lexicon: HALOT
  rationale: La imagen de nube se conserva literalmente para mantener el simbolismo de juicio/oscurecimiento. «Cubrirá» reproduce la relación verbal sin sobreexplicar el alcance.
- source_word: וּבְנוֹתֶיהָ
  english_pob_choice: her daughters
  chosen_spanish: sus hijas
  alternatives_spanish:
  - sus aldeas
  - sus ciudades dependientes
  lexicon: HALOT
  rationale: Sigo la literalidad de «hijas» porque el hebreo usa la fórmula profética tradicional. En español suena natural y preserva la metáfora; el sentido de poblados dependientes queda en la nota, como en el audit trail inglés.
- source_word: בַּשְּׁבִי תֵלַכְנָה
  english_pob_choice: will go into captivity
  chosen_spanish: irán al cautiverio
  alternatives_spanish:
  - irán al exilio
  - serán llevadas cautivas
  lexicon: HALOT
  rationale: «Cautiverio» traduce con sobriedad la idea de deportación/captura y conserva el movimiento del verbo «irán». Mantiene la fuerza del hebreo sin perder legibilidad.
theological_decisions:
- issue: Referente de los pronombres femeninos y de «sus hijas»
  english_pob_reading: The feminine singular refers to Tahpanhes/city imagery, with 'her daughters' denoting dependent towns or settlements.
  chosen_spanish_reading: El singular femenino se mantiene como imagen de la ciudad de Tahpanhés; «sus hijas» alude a sus poblados o asentamientos dependientes.
  alternative_spanish_readings:
  - El singular femenino puede referirse de manera más amplia a Egipto personificado.
  - «Sus hijas» podría entenderse simplemente como hijas literales, aunque el contexto profético sugiere otra cosa.
  rationale: La proximidad inmediata de Tahpanhés favorece leer el femenino como personificación de la ciudad, pero el contexto más amplio sigue concerniendo a Egipto. Conservo la imagen sin resolverla de manera reductiva, y explicito en la nota el sentido profético de «hijas» como dependencias o poblados.
  doctrine_reference: Preservar la tensión interpretativa sin forzarla.
translation_notes:
  revision_awareness: 'La redacción inglesa revisada eliminó una frase introductoria innecesaria y mantuvo «bars of Egypt», «the pride of her strength» y «go into captivity». La versión española sigue esa línea: conserva la metáfora de las barras, el paralelo nominal de «orgullo de su fuerza» y el movimiento de «ir al cautiverio», sin añadir glosas que suavicen el juicio.'
  spanish_consistency_notes:
  - Usé «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - 'Mantuve la transliteración de topónimos con acento españolizable: Tahpanhés.'
  - Conservé «cautiverio» para respetar la imagen de movimiento del hebreo.
  - No introduje «Mesías», «SEÑOR» ni otros equivalentes no presentes en el verso.
