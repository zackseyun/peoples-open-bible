    issue: Uso de formas de 'vosotros' en vez de español neutral latinoamericano
    rationale: La guía de estilo pide español neutral LATAM/broadly church-readable. 'Quisisteis', 'os rebelasteis' y 'vuestro' son correctos, pero regionalmente marcados y menos adecuados para el objetivo del proyecto.
  - severity: low
    issue: 'Alternativa española mal acentuada en metadatos: ''desafiastéis'''
    rationale: No afecta el texto bíblico principal, pero la forma correcta sería 'desafiasteis'. No requiere adjudicación compleja.
  revised_spanish_text: Pero ustedes no quisieron subir[a], y se rebelaron contra el mandato de Yahvé su Dios.
  revised_footnotes:
