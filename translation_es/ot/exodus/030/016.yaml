translation:
  language: es
  text: Tomarás el dinero de la expiación[a] de los hijos de Israel y lo darás para el servicio de la tienda de reunión, y servirá para los hijos de Israel como memorial delante de Yahvé[b], para hacer expiación por sus vidas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "la plata de la expiación" o "el dinero del rescate". El hebreo dice literalmente algo como "la plata/dinero de las expiaciones" y se refiere a la contribución cultual establecida en el contexto anterior.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: "por vuestras almas". Aquí el sentido es "por sus vidas" o "por ustedes mismos" en el contexto de la expiación relacionada con el censo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֶּסֶף הַכִּפֻּרִים
  english_pob_choice: the atonement money
  chosen_spanish: el dinero de la expiación
  alternatives_spanish:
  - el dinero de la reconciliación
  - el dinero del rescate
  - la plata de las expiaciones
  lexicon: HALOT
  rationale: כֶּסֶף puede significar 'plata' o 'dinero', y en este contexto designa la contribución cultual indicada por el texto anterior. En español, 'dinero de la expiación' comunica el valor cultual sin volverlo demasiado arcaico ni perder la relación con כפר.
- source_word: מֵאֵת בְּנֵי יִשְׂרָאֵל
  english_pob_choice: from the sons of Israel
  chosen_spanish: de los hijos de Israel
  alternatives_spanish:
  - de los israelitas
  - de los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva la forma masculina plural del hebreo para reflejar con transparencia la expresión de pacto. 'Hijos de Israel' es natural en español bíblico y mantiene la correspondencia formal mejor que una neutralización.
- source_word: עַל עֲבֹדַת אֹהֶל מוֹעֵד
  english_pob_choice: for the service of the tent of meeting
  chosen_spanish: para el servicio del tabernáculo de reunión
  alternatives_spanish:
  - para el trabajo del tabernáculo de reunión
  - para el ministerio del tabernáculo de reunión
  lexicon: HALOT
  rationale: עֲבֹדָה en contexto santuario es 'servicio' más que simple trabajo. אֹהֶל מוֹעֵד se vierte con el equivalente tradicional y comprensible 'tabernáculo de reunión', que en español comunica bien la función cultual del lugar.
- source_word: לְזִכָּרוֹן
  english_pob_choice: as a memorial
  chosen_spanish: como memorial
  alternatives_spanish:
  - como recordatorio
  - para recuerdo
  lexicon: HALOT
  rationale: '''Memorial'' es el término más adecuado para el uso cultual de זִכָּרוֹן. Conserva el sentido de un recuerdo estable y presentado ante Dios, sin reducirlo a mera memoria psicológica.'
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: Se mantiene 'Yahvé' conforme a la guía del proyecto para יהוה. 'Delante de' reproduce bien la locución cultual de estar en la presencia de Dios.
- source_word: לְכַפֵּר
  english_pob_choice: to make atonement
  chosen_spanish: para hacer expiación
  alternatives_spanish:
  - para hacer expiación
  - para hacer atonamiento
  lexicon: HALOT
  rationale: '''Hacer expiación'' preserva la fuerza sacrificial del verbo כפר y evita confundirlo con una simple disculpa o compensación. Aunque ''hacer expiación'' es menos coloquial, es claro y fiel en contexto sacerdotal.'
- source_word: עַל נַפְשֹׁתֵיכֶם
  english_pob_choice: for your lives
  chosen_spanish: por sus vidas
  alternatives_spanish:
  - por sus almas
  - por ustedes mismos
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí apunta a la vida/persona, no a una distinción cuerpo-alma. Se usa 'sus vidas' para el antecedente colectivo 'los hijos de Israel', manteniendo el sentido de la POB inglesa y la relación con la expiación.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  rationale: La guía del proyecto pide renderizar el Tetragrámaton como 'Yahvé'. Se evita la sustitución tradicional 'SEÑOR' porque el texto fuente nombra explícitamente a YHWH y la política del POB busca transparencia auditable.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de נֶפֶשׁ en contexto de expiación
  english_pob_reading: for your lives
  chosen_spanish_reading: por sus vidas
  alternative_spanish_readings:
  - por sus almas
  - por ustedes mismos
  rationale: En este contexto jurídico-cultual, נֶפֶשׁ se refiere a la vida/persona de los israelitas y no a un concepto dualista del alma. 'Por sus vidas' evita cargar el texto con una antropología ajena al pasaje y sigue de cerca la decisión auditada en inglés.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Designación del pueblo como בְּנֵי יִשְׂרָאֵל
  english_pob_reading: sons of Israel
  chosen_spanish_reading: hijos de Israel
  alternative_spanish_readings:
  - israelitas
  - hijos/descendientes de Israel
  rationale: Se conserva la forma masculina del hebreo, que en este contexto representa corporativamente al pueblo del pacto. 'Hijos de Israel' es una formulación bíblica estable en español y evita neutralizar una decisión lexical documentada.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: La revisión más reciente no requirió cambios sustanciales y el control cruzado informó alta coincidencia; por eso se mantiene la solución auditada, con ajustes de español para fluidez y precisión cultual.
  spanish_consistency_notes:
  - Se mantiene Yahvé para יְהוָה conforme a la terminología del proyecto.
  - Se conserva 'hijos de Israel' para reflejar la forma masculina plural del hebreo.
  - '''Memorial'' y ''hacer expiación'' preservan el registro cultual del pasaje.'
  - '''Por sus vidas'' traduce נַפְשֹׁתֵיכֶם sin introducir una lectura dualista de ''alma''.'
