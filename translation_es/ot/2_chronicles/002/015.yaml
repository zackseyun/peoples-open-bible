  text: וַ֠/אֲנַחְנוּ נִכְרֹ֨ת עֵצִ֤ים מִן הַ/לְּבָנוֹן֙ כְּ/כָל צָרְכֶּ֔/ךָ וּ/נְבִיאֵ֥/ם לְ/ךָ֛ רַפְסֹד֖וֹת עַל יָ֣ם יָפ֑וֹ וְ/אַתָּ֛ה תַּעֲלֶ֥ה אֹתָ֖/ם יְרוּשָׁלִָֽם־־־׃פ
base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/002/015.yaml
  text: And we will cut timber from Lebanon[a], as much as you need, and bring it to you as rafts by sea to Joppa[c][b]; and you will take it up to Jerusalem.
  footnotes:
  - marker: a
    text: Or 'bring them to you in rafts' or 'bring them to you as floats.'
    reason: lexical_alternative
  - marker: b
    text: Joppa is the seaport later known as Jaffa.
    reason: cultural_note
  - marker: c
    text: Hebrew 'bring them up to Jerusalem'; 'up' reflects Jerusalem's higher elevation.
    reason: lexical_alternative
