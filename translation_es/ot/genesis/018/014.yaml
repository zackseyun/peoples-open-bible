translation:
  language: es
  text: ¿Hay algo demasiado difícil para Yahvé? En el tiempo señalado, volveré a ti[a], por este mismo tiempo el año próximo[b], y Sara tendrá un hijo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Hay algo demasiado maravilloso para Yahvé?». El verbo hebreo también puede expresar algo extraordinario o admirable, o algo más allá de la capacidad humana.'
    reason: lexical_alternative
  - marker: b
    text: 'Modismo hebreo: «como al tiempo de la vida». Probablemente significa la misma estación del año siguiente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲיִפָּלֵא
  english_pob_choice: too difficult
  chosen_spanish: demasiado difícil
  alternatives_spanish:
  - demasiado maravilloso
  - demasiado extraordinario
  - imposible
  lexicon: HALOT
  rationale: El nifal de פלא puede expresar algo extraordinario o fuera del alcance humano. En una pregunta retórica, «demasiado difícil» comunica con naturalidad que nada queda fuera del poder de Yahvé, sin volver el sentido más absoluto de lo que exige el hebreo.
- source_word: מֵיְהוָה
  english_pob_choice: for Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - de Yahvé
  - con Yahvé
  lexicon: HALOT
  rationale: El מן aquí marca limitación o comparación en relación con Yahvé. En español, «para Yahvé» transmite de modo idiomático la idea de que algo le resulta demasiado difícil o fuera de su capacidad, conservando el nombre divino como indica la política terminológica del proyecto.
- source_word: דָּבָר
  english_pob_choice: anything
  chosen_spanish: algo
  alternatives_spanish:
  - cosa alguna
  - ninguna cosa
  - ningún asunto
  lexicon: HALOT
  rationale: Aunque literalmente es «palabra/cosa/asunto», la pregunta retórica en español fluye mejor con «algo». Conserva el alcance amplio del término sin sonar rígido o forzado.
- source_word: לַמּוֹעֵד
  english_pob_choice: At the appointed time
  chosen_spanish: en el tiempo señalado
  alternatives_spanish:
  - en el tiempo fijado
  - en el tiempo назначado
  - a la cita
  lexicon: HALOT
  rationale: מוֹעֵד designa un tiempo fijado o señalado. «En el tiempo señalado» mantiene la referencia a un momento determinado por Dios y es claro para lector contemporáneo.
- source_word: אָשׁוּב
  english_pob_choice: I will return
  chosen_spanish: volveré
  alternatives_spanish:
  - regresaré
  - yo regresaré
  - volveré otra vez
  lexicon: HALOT
  rationale: שׁוּב aquí expresa retorno. «Volveré» es breve, natural y suficientemente formal para el habla divina en español.
- source_word: אֵלֶיךָ
  english_pob_choice: to you
  chosen_spanish: a ti
  alternatives_spanish:
  - a ustedes
  - hacia ti
  lexicon: HALOT
  rationale: El singular masculino se refiere a Abraham. «A ti» conserva la segunda persona singular con la cercanía y claridad normales en español.
- source_word: כָּעֵת חַיָּה
  english_pob_choice: about this time next year
  chosen_spanish: por este tiempo el año próximo
  alternatives_spanish:
  - como a esta hora el año que viene
  - en esta misma época del próximo año
  - para este tiempo, el año próximo
  lexicon: HALOT
  rationale: Se trata de un modismo hebreo difícil. En contexto apunta a la misma temporada del año siguiente. «Por este tiempo el año próximo» conserva el valor idiomático sin imponer una precisión no explícita en el hebreo.
- source_word: וּלְשָׂרָה בֵן
  english_pob_choice: and Sarah will have a son
  chosen_spanish: y Sara tendrá un hijo
  alternatives_spanish:
  - y Sara dará a luz un hijo
  - y un hijo le nacerá a Sara
  - y Sara tendrá un hijo varón
  lexicon: HALOT
  rationale: La cláusula hebrea es nominal y futura por el contexto. «Tendrá un hijo» expresa el resultado prometido con naturalidad. «Hijo» reproduce el término general בן sin añadir énfasis no requerido.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El original hebreo usa el Tetragrámaton directamente. Siguiendo la política terminológica española del proyecto, se preserva el nombre divino como «Yahvé» en vez de ocultarlo con «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fuerza de la pregunta retórica
  english_pob_reading: Is anything too difficult for Yahweh?
  chosen_spanish_reading: ¿Hay algo demasiado difícil para Yahvé?
  alternative_spanish_readings:
  - ¿Hay algo demasiado maravilloso para Yahvé?
  - ¿Hay algo imposible para Yahvé?
  rationale: La pregunta retórica subraya que nada queda fuera del poder de Yahvé para cumplir su promesa. «Demasiado difícil» preserva la fuerza semántica sin exagerar hacia una imposibilidad filosófica absoluta.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve source-text plain sense'
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y mantiene el mismo sentido ya confirmado por el audit trail inglés, con ajustes naturales para el español y sin introducir cambios sustantivos respecto de la última revisión aceptada.
  spanish_consistency_notes:
  - Se conserva «Yahvé» según la terminología del proyecto para יהוה.
  - Se evita «SEÑOR» como sustituto del nombre divino.
  - «Sara» sigue la forma española habitual del nombre propio.
  - La expresión temporal se mantiene idiomática y no excesivamente literal.
  - El cierre «tendrá un hijo» conserva el valor futuro prometido de la cláusula nominal hebrea.
