lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque
  - Ya que
  lexicon: HALOT
  rationale: La partícula introduce la razón de la afirmación anterior. «Porque» conserva la relación causal de manera natural en español.
- source_word: בָחַר
  english_pob_choice: has chosen
  chosen_spanish: ha escogido
  alternatives_spanish:
  - eligió
  - ha elegido
  - seleccionó
  lexicon: HALOT
  rationale: El verbo expresa elegir/seleccionar. «Ha escogido» mantiene el valor de acción completada con relevancia presente, en paralelo con el inglés auditado.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton, conforme al criterio del proyecto, en lugar de sustituirlo por un título.
- source_word: בְּצִיּוֹן
  english_pob_choice: Zion
  chosen_spanish: a Sion
  alternatives_spanish:
  - en Sion
  - Sion
  lexicon: HALOT
  rationale: Con בחר, la preposición marca el objeto elegido. En español resulta más natural decir «ha escogido a Sion» que calcar «en Sion»; se mantiene el referente geográfico-personificado sin añadir más explicación al texto principal.
- source_word: אִוָּהּ
  english_pob_choice: has desired it
  chosen_spanish: la ha deseado
  alternatives_spanish:
  - la ha anhelado
  - la ha querido
  - la ha deseado como morada
  lexicon: HALOT
  rationale: El verbo expresa deseo o anhelo. En español, para Sion, el pronombre femenino «la» conserva el dato gramatical del hebreo y evita neutralizar la referencia.
- source_word: לְמוֹשָׁב
  english_pob_choice: for his dwelling place
  chosen_spanish: para su morada
  alternatives_spanish:
  - para su lugar de morada
  - como su morada
  - para su habitación
  lexicon: HALOT
  rationale: מוֹשָׁב es un lugar de residencia/asiento. «Morada» es claro, digno y suficientemente literal; «su» mantiene la relación posesiva/benefactiva del sufijo.
theological_decisions:
- issue: Nombre divino en el texto español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El hebreo usa יְהוָה directamente. Se preserva el nombre propio de Dios según la convención del proyecto, evitando la sustitución tradicional por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Referencia pronominal de Sion
  english_pob_reading: it
  chosen_spanish_reading: la
  alternative_spanish_readings:
  - le
  - ello
  rationale: Aunque Sion funciona como lugar, el hebreo usa un sufijo femenino. El español permite conservar esa tensión con «la», sin imponer una neutralización que borre el dato morfológico.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, #6'
translation_notes:
  revision_awareness: 'Coincide con el contexto auditado de alta concordancia: no hay revisiones aplicadas en el registro inglés base. La versión española conserva el paralelismo y la tensión entre el referente locativo de Sion y su tratamiento femenino en hebreo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente con la convención del proyecto para יְהוָה.
  - «Sion» se mantiene sin artículo para preservar el nombre propio bíblico.
  - La nota [a] preserva la ambigüedad de género/pronombre presente en el hebreo, sin trasladar al texto principal una glosa excesiva.
