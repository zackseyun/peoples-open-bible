review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego y el audit trail inglés en los elementos principales: vocativo a Dios, imperativo de liberación, ψυχή como «alma», ἀνήρ como «hombre», y la corrección importante de entender ψιθυροῦ como adjetivo de «lengua» y no como sustantivo. Sin embargo, «susurrante» suena poco natural en español bíblico y puede sugerir mero volumen de voz más que murmuración calumniosa. Además, la nota a sobre «Señor» no aporta una alternativa real en español.'
  spanish_quality_summary: El texto es claro y mayormente fiel, pero requiere un ajuste menor para mejorar naturalidad y precisión semántica. «Lengua sin ley y murmuradora» comunica mejor el valor de ψιθυροῦ en contexto de habla dañina y suena más idiomático que «susurrante». También conviene eliminar la nota [a], que actualmente solo repite la misma palabra con distinta puntuación y no añade información útil.
  glossary_alignment: 'La terminología está bien alineada con el proyecto: κύριε como «Señor» es apropiado aquí porque la fuente inmediata es griega, no el Tetragrámaton hebreo; ψυχή como «alma» con alternativa «vida / a mí» está bien preservado; παράνομος como «sin ley» mantiene la fuerza léxica; γλῶσσα como «lengua» conserva la metáfora. El único ajuste léxico recomendado es ψιθυροῦ → «murmuradora» en lugar de «susurrante».'
  issues:
  - severity: medium
    issue: «Susurrante» para ψιθυροῦ es poco idiomático y semánticamente débil en este contexto.
    rationale: Aunque formalmente refleja la imagen de susurro, en español común y eclesial «susurrante» suena extraño y puede no transmitir el matiz de murmuración maliciosa/backbiting que tiene ψίθυρος. «Murmuradora» conserva mejor el sentido dañino sin violar la observación del audit trail de que se trata de un adjetivo que modifica «lengua».
  - severity: low
    issue: La nota [a] no ofrece una alternativa significativa.
    rationale: «O “Señor”» solo duplica la lectura principal sin aportar variante léxica o interpretativa. Debe omitirse para mantener disciplina editorial y evitar ruido.
  revised_spanish_text: Señor, libra mi alma[a] de un hombre sin ley y malvado, de una lengua sin ley y murmuradora, que habla falsedad y engaño[b];
  revised_footnotes:
  - marker: a
    text: O «mi vida» o simplemente «a mí».
    reason: lexical_alternative
  - marker: b
    text: O «de una lengua sin ley y susurrante».
    reason: lexical_alternative
  revision_rationale: 'La revisión es menor y no doctrinal: se mejora la naturalidad y precisión de ψιθυροῦ con «murmuradora», se conserva la alternativa más literal «susurrante» en nota, y se elimina una nota redundante sobre «Señor». El resto del borrador preserva bien el sentido del griego y las decisiones documentadas del POB.'
