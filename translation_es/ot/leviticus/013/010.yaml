revisions:
- from: Y el sacerdote lo examina[a]; y he aquí una hinchazón blanca en la piel, y el pelo se le ha vuelto blanco, y hay carne viva[b] en la hinchazón.
  to: Y el sacerdote lo examina[a], y he aquí una hinchazón blanca en la piel, y esta ha vuelto blanco el pelo, y hay carne viva[b] en la hinchazón.
  rationale: 'Se ajustó la sintaxis para mejorar la naturalidad y la precisión con respecto al hebreo: se mantuvo la fuerza deíctica de «he aquí», pero con mejor puntuación, y se cambió «el pelo se le ha vuelto blanco» por «esta ha vuelto blanco el pelo» para conservar mejor que la lesión es el referente femenino que produce la señal diagnóstica. También se precisó la nota sobre «carne viva» para reflejar el matiz documentado de tejido vivo/expuesto dentro de la hinchazón.'
  reviewer_model: gpt-5.4
