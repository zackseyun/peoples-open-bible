    issue: El topónimo Χασφώθ se vertió como «Hasfot» en vez de una forma alineada con la transliteración auditada «Hasphoth».
    rationale: El proyecto documentó mantener el nombre cercano al griego como Hasphoth. «Hasfot» simplifica la forma y se aparta del expediente inglés sin necesidad. En un texto donde los demás nombres permanecen cercanos a la forma griega, conviene conservar esa consistencia.
  revised_spanish_text: Desde allí partió y se apoderó de Hasphoth[a], Maked, Bosor y el resto de las ciudades de Galaad.
