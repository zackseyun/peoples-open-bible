translation:
  language: es
  text: 'Entonces Israel envió mensajeros a Sijón, rey de los amorreos, rey de Hesbón, e Israel le dijo[a]: «Por favor, déjanos pasar por tu tierra hasta nuestra tierra[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, “e Israel le dijo”; se conserva la repetición explícita de ‘Israel’ que aparece en el hebreo.
    reason: source_note
  - marker: b
    text: O “hasta mi lugar” o “hasta mi propia tierra”, con Israel hablando como un singular colectivo. Compárese la petición paralela en Números 21:22, donde la tradición hebrea aquí reflejada también lee “mi lugar”.
    reason: cross_reference
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: HALOT
  rationale: En el relato narrativo, el wayyiqtol de שׁלח se expresa de forma natural en español con ‘envió’. Mantiene el valor de acción puntual sin forzar un calco.
- source_word: מַלְאָכִים
  english_pob_choice: messengers
  chosen_spanish: mensajeros
  alternatives_spanish:
  - enviados
  - embajadores
  lexicon: HALOT
  rationale: El contexto es diplomático y no angelical; ‘mensajeros’ comunica con claridad representantes humanos y conserva la neutralidad de registro.
- source_word: סִיחוֹן
  english_pob_choice: Sihon
  chosen_spanish: Sijón
  alternatives_spanish:
  - Sihón
  lexicon: transliteration
  rationale: Se translitera el nombre propio en forma hispana estándar. ‘Sijón’ refleja mejor la pronunciación castellana y evita una grafía menos natural para lectores en español.
- source_word: מֶלֶךְ הָאֱמֹרִי
  english_pob_choice: king of the Amorites
  chosen_spanish: rey de los amorreos
  alternatives_spanish:
  - rey amorreo
  - rey de los amoritas
  lexicon: HALOT
  rationale: Se mantiene la relación genitiva de modo transparente. ‘Amorreos’ es el etnónimo habitual y comprensible en español bíblico.
- source_word: מֶלֶךְ חֶשְׁבּוֹן
  english_pob_choice: king of Heshbon
  chosen_spanish: rey de Hesbón
  alternatives_spanish:
  - rey de Heshbón
  lexicon: HALOT
  rationale: Se conserva el segundo título aposicional, como en el hebreo, para identificar a Sijón y su esfera política. La transliteración se adapta al español.
- source_word: וַיֹּאמֶר ל/וֹ יִשְׂרָאֵל
  english_pob_choice: and Israel said to him
  chosen_spanish: e Israel le dijo
  alternatives_spanish:
  - y Israel le dijo
  - e Israel le habló
  lexicon: HALOT
  rationale: Se preserva la repetición explícita de ‘Israel’ que aparece en el hebreo. ‘Le dijo’ reproduce el destinatario sin añadir matices no presentes en el texto.
- source_word: נַעְבְּרָה נָּא
  english_pob_choice: Please let us pass
  chosen_spanish: Por favor, déjanos pasar
  alternatives_spanish:
  - Por favor, permítenos pasar
  - Déjanos pasar, por favor
  lexicon: HALOT
  rationale: La forma cohortativa con נָא expresa una petición cortés. ‘Déjanos pasar’ refleja bien el valor desiderativo y la súplica del contexto.
- source_word: בְאַרְצְךָ
  english_pob_choice: through your land
  chosen_spanish: por tu tierra
  alternatives_spanish:
  - a través de tu tierra
  - por tu territorio
  lexicon: HALOT
  rationale: Con עבר, la frase expresa tránsito por un territorio. ‘Por tu tierra’ es idiomático en español y evita una literalidad pesada.
- source_word: עַד מְקוֹמִי
  english_pob_choice: to our place
  chosen_spanish: hasta nuestro lugar
  alternatives_spanish:
  - hasta nuestro sitio
  - hasta nuestro territorio
  lexicon: HALOT
  rationale: Se sigue la revisión inglesa que entiende el referente como plural colectivo. ‘Hasta nuestro lugar’ conserva el sentido de destino sin sobreespecificar más de lo que permite el hebreo.
theological_decisions:
- issue: Identidad de los representantes enviados
  english_pob_reading: messengers
  chosen_spanish_reading: mensajeros
  alternative_spanish_readings:
  - embajadores
  - enviados
  rationale: No se entiende aquí un sentido celestial de ‘ángeles’ ni una figura eclesial posterior, sino representantes diplomáticos. La traducción mantiene esa lectura histórica y contextual.
  doctrine_reference: Lectura contextual del vocabulario narrativo del Antiguo Testamento
- issue: Referencia colectiva en ‘nuestro lugar’
  english_pob_reading: our place
  chosen_spanish_reading: nuestro lugar
  alternative_spanish_readings:
  - mi lugar
  - nuestro territorio
  rationale: La revisión inglesa opta por el plural para reflejar con más naturalidad la voz colectiva de Israel. El español sigue esa decisión para no aislar indebidamente el singular hebreo del sujeto colectivo.
  doctrine_reference: Colectivo singular/plural en discurso narrativo bíblico
translation_notes:
  revision_awareness: El borrador sigue la revisión inglesa más reciente que cambió “my place” por “our place” para reflejar más naturalmente la voz colectiva. No se intenta retroceder a la lectura anterior, sino reflejar el estado final del audit trail. También se conserva la repetición explícita de ‘Israel’ y el doble título de Sijón siguiendo el hebreo.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ como forma predeterminada cuando aparezca el tetragrámaton; aquí no aparece.
  - Se mantiene ‘mensajeros’ para מַלְאָכִים en contexto diplomático, evitando ‘ángeles’.
  - 'Se prefieren transliteraciones hispanas estables: ‘Sijón’, ‘Hesbón’.'
  - Se conserva la repetición de ‘Israel’ porque el hebreo la presenta explícitamente y el audit trail la considera significativa.
