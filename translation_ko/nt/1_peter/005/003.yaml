  lexicon: BDAG
  rationale: κατακυριεύω의 「위에서 강압적으로 주관함」을 「주관하려 들다」로 옮겨 부정적 강도 살림 (마 20:25과 동일 어휘).
- source_word: τῶν κλήρων
  english_pob_choice: those allotted to your care
  chosen_korean: 맡겨진 자들
