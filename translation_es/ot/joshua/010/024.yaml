  to: 'Y cuando llevaron a estos reyes a Josué, Josué llamó a todos los hombres[a] de Israel y dijo a los comandantes de los hombres de guerra que habían ido con él[b]: «Acérquense; pongan sus pies sobre los cuellos de estos reyes». Entonces ellos se acercaron y pusieron sus pies sobre sus cuellos.'
