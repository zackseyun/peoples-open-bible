revisions:
- from: Como león joven[a], ha dejado su guarida, porque su tierra ha quedado en desolación por la ardiente ira del opresor[b], y por la ardiente ira de él.
  to: Como un león joven, ha dejado su guarida, porque la tierra de ellos ha quedado en desolación por la ardiente ira del opresor[a], y por su ardiente ira[b].
  rationale: 'Se corrige la ubicación de la nota textual para que recaiga sobre «opresor», se mejora la fidelidad al plural posesivo hebreo con «la tierra de ellos», y se sustituye la construcción poco natural «de él» por «su», dejando la ambigüedad interpretativa donde corresponde: en la nota.'
