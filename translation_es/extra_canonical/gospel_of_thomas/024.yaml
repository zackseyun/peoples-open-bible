translation:
  language: es
  text: 'Sus discípulos le dijeron: «Muéstranos el lugar donde estás, porque nos es necesario buscarlo». Él les dijo: «Quien tenga oídos, que oiga[a]. Hay[b] luz dentro de un hombre de luz[c], y él ilumina[d] el mundo entero. Cuando él no ilumina[f], hay oscuridad».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El copto usa una fórmula idiomática equivalente a «quien tenga oídos con él»; en español se omite esa expresión en el texto principal.
    reason: lexical_alternative
  - marker: b
    text: 'El copto es declarativo: «Hay luz dentro de un hombre de luz». El fragmento griego lo presenta condicionalmente: «Si hay luz en un hombre de luz…».'
    reason: textual_variant
  - marker: c
    text: También puede entenderse «persona de luz», pero se conserva «hombre de luz» para mantener la expresión característica de Tomás.
    reason: lexical_alternative
  - marker: d
    text: En copto, el sujeto del verbo es la persona de luz, no la luz misma; por eso se traduce «él ilumina». El fragmento griego tiene «ella brilla», tomando «luz» como sujeto.
    reason: textual_variant
  - marker: f
    text: 'El copto dice: «Cuando él no ilumina, hay oscuridad». La reconstrucción griega se ha entendido como: «si no está, el mundo está en oscuridad». También puede traducirse «es oscuridad».'
    reason: textual_variant
lexical_decisions:
- source_word: ϯⲧⲥⲉⲃⲟⲁⲛⲟⲛ
  english_pob_choice: show us
  chosen_spanish: Muéstranos
  alternatives_spanish:
  - Haznos saber
  - Enséñanos
  lexicon: Crum, s.v. ⲥⲃⲱ/ⲥⲃⲱⲛ
  rationale: El valor causativo/informativo se expresa de manera natural en español con «muéstranos», que conserva la petición directa sin añadir explicaciones.
- source_word: ⲧⲟⲡⲟⲥ
  english_pob_choice: place
  chosen_spanish: lugar
  alternatives_spanish:
  - sitio
  - ubicación
  lexicon: Préstamo griego τόπος
  rationale: «Lugar» es el equivalente más natural y sobrio, y mantiene la concisión del dicho.
- source_word: ⲉⲧⲉⲣⲉⲛⲧⲟⲕⲙⲙⲁⲩ
  english_pob_choice: where you are
  chosen_spanish: donde estás
  alternatives_spanish:
  - donde te encuentras
  - donde moras
  lexicon: Lambdin §173
  rationale: La cláusula relativa expresa ubicación; «donde estás» transmite la referencia espacial sin forzar un matiz de permanencia.
- source_word: ⲡⲉⲓⲡⲁⲛⲁⲅⲕⲏ ⲉⲁⲛⲟⲛ ⲡⲉ
  english_pob_choice: it is necessary for us
  chosen_spanish: nos es necesario
  alternatives_spanish:
  - es necesario para nosotros
  - tenemos necesidad de
  lexicon: Préstamo griego ἀνάγκη; construcción impersonal
  rationale: La impersonalidad del Coptic se conserva con «nos es necesario», que suena natural en español y mantiene el sentido de necesidad impuesta.
- source_word: ϣⲓⲛⲉ ⲛⲥⲁⲛⲧⲟϥ
  english_pob_choice: to seek it
  chosen_spanish: buscarlo
  alternatives_spanish:
  - buscarlo a él
  - ir en busca de él
  lexicon: Crum, s.v. ϣⲓⲛⲉ
  rationale: «Buscarlo» es idiomático en español y reproduce la acción de procurar activamente aquello que se pide.
- source_word: ⲡⲉⲧⲉⲣⲉⲟⲩⲛ ⲙⲁⲁϫⲉ ⲙⲙⲟϥ
  english_pob_choice: Whoever has ears
  chosen_spanish: Quien tenga oídos
  alternatives_spanish:
  - El que tiene oídos
  - Quien tenga oídos consigo
  lexicon: Crum, s.v. ⲙⲁⲁϫⲉ
  rationale: Se preserva la fórmula proverbial en una forma de subjuntivo general; el giro idiomático «con él» queda implícito en español y no hace falta explicitarlo en el texto principal.
- source_word: ⲙⲁⲣⲉϥ ⲥⲱⲧⲙ
  english_pob_choice: let him hear
  chosen_spanish: que oiga
  alternatives_spanish:
  - que escuche
  - que preste oído
  lexicon: Layton §377
  rationale: El jussivo queda bien reflejado con «que oiga», la forma más breve y solemne para la fórmula de exhortación.
- source_word: ⲟⲩⲛⲟⲩⲟⲉⲓⲛ ϣⲱⲡⲉ
  english_pob_choice: There is light
  chosen_spanish: Hay luz
  alternatives_spanish:
  - Existe luz
  - Una luz hay
  lexicon: Crum, s.v. ⲟⲉⲓⲛ; ⲥϣⲱⲡⲉ
  rationale: La construcción existencial se expresa con «Hay luz», que conserva la presencia real y evita una lectura demasiado nominal («Una luz es») o demasiado literalista.
- source_word: ⲛⲡϩⲟⲩⲛ
  english_pob_choice: within
  chosen_spanish: dentro de
  alternatives_spanish:
  - en el interior de
  - en
  lexicon: Crum, s.v. ϩⲟⲩⲛ
  rationale: «Dentro de» comunica bien la localización interna sin sonar arcaico; mantiene la imagen espacial del original.
- source_word: ⲛⲟⲩⲣⲙⲟⲩⲟⲉⲓⲛ
  english_pob_choice: a man of light
  chosen_spanish: un hombre de luz
  alternatives_spanish:
  - una persona de luz
  - un ser de luz
  lexicon: Crum, s.v. ⲣⲙⲛ- + ⲟⲉⲓⲛ
  rationale: Se conserva la extrañeza genitiva de Thomas con «de luz», evitando una paráfrasis que borre el rasgo distintivo del dicho.
- source_word: ⲛⲧⲟϥ ⲣⲟⲩⲟⲉⲓⲛ
  english_pob_choice: he lights (up)
  chosen_spanish: él ilumina
  alternatives_spanish:
  - él da luz
  - él alumbra
  lexicon: Crum, s.v. ⲣⲟⲩⲟⲉⲓⲛ
  rationale: El verbo es transitivo y el sujeto es la persona; «ilumina» comunica la acción de dar luz sin perder la direccionalidad del original.
- source_word: ⲧⲏⲣⲛⲧⲟϥ
  english_pob_choice: the whole [of it]
  chosen_spanish: todo el mundo
  alternatives_spanish:
  - todo el mundo entero
  - el mundo entero
  lexicon: Crum, s.v. ⲧⲏⲣ
  rationale: Con «todo el mundo» se integra naturalmente la totalidad del objeto iluminado y se preserva el alcance universal del dicho.
- source_word: ⲉⲣⲉⲛⲧⲟϥ ⲧⲙⲣⲟⲩⲟⲉⲓⲛ
  english_pob_choice: When he does not shine
  chosen_spanish: Cuando él no ilumina
  alternatives_spanish:
  - Si él no ilumina
  - Cuando no brilla
  lexicon: Crum, s.v. ⲣⲟⲩⲟⲉⲓⲛ; Layton §188
  rationale: La relación temporal-protásica se traduce con «Cuando», y se conserva el sujeto personal del coptico en lugar de convertir el verbo en un impersonal.
- source_word: ⲟⲩⲕⲁⲕⲉ ⲡⲉ
  english_pob_choice: there is darkness
  chosen_spanish: hay oscuridad
  alternatives_spanish:
  - es oscuridad
  - es tinieblas
  lexicon: Crum, s.v. ⲕⲁⲕⲉ
  rationale: La predicación existencial se expresa con «hay oscuridad», una forma natural y clara que mantiene el paralelismo con «Hay luz».
theological_decisions:
- issue: Mantener la formulación proverbial sobre oír sin domesticarla
  english_pob_reading: Whoever has ears, let him hear.
  chosen_spanish_reading: Quien tenga oídos, que oiga.
  alternative_spanish_readings:
  - El que tiene oídos, que oiga.
  - Quien tenga oídos, escuche.
  rationale: No hay una disputa doctrinal fuerte, pero sí una forma proverbial fija. Se conserva el tono exhortativo y la generalidad del dicho sin añadir explicaciones interpretativas.
  doctrine_reference: Sabiduría proverbial / forma exhortativa
- issue: Conservar la tensión entre luz interior y alcance universal
  english_pob_reading: There is light within a man of light, and he lights the whole world.
  chosen_spanish_reading: Hay luz dentro de un hombre de luz, y él ilumina todo el mundo.
  alternative_spanish_readings:
  - Hay una luz dentro de un hombre de luz, y ella ilumina todo el mundo.
  - Existe luz dentro de un hombre de luz, y él alumbra todo el mundo.
  rationale: La traducción mantiene la presencia interna de la luz y el sujeto humano que irradia hacia el mundo, sin resolver la ambigüedad del texto a favor de una lectura más tradicional o más simbólica.
  doctrine_reference: Cristología/antropología simbólica del dicho
- issue: Preservar la oscuridad como consecuencia de no iluminar
  english_pob_reading: When he does not shine, there is darkness.
  chosen_spanish_reading: Cuando él no ilumina, hay oscuridad.
  alternative_spanish_readings:
  - Cuando no brilla, hay oscuridad.
  - Si él no ilumina, hay oscuridad.
  rationale: El Coptic presenta una relación condicional-temporal con predicación existencial; «Cuando» conserva esa relación sin convertirla en un aforismo distinto. La oscuridad queda como estado resultante, no como metáfora suavizada.
  doctrine_reference: Simbolismo de luz/oscuridad
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión reciente que favorece una lectura existencial de la primera cláusula («Hay luz») frente a una nominalizada («Una luz es»). La versión española sigue esa decisión y además conserva la sintaxis personal del Coptic en las cláusulas de iluminación y oscuridad, en línea con el audit trail revisado.
  spanish_consistency_notes:
  - Se usa «luz/oscuridad» de forma paralela para mantener el contraste semántico del dicho.
  - Se mantiene «hombre de luz» como calco controlado, porque la expresión tiene valor literario y distintivo en Thomas.
  - Se prefiere el tuteo reverencial implícito en «estás» dentro de una cita directa, coherente con el español bíblico de registro medio-alto.
  - No se emplean términos eclesiásticos añadidos; se conserva el tono sentencioso y sapiencial del original.
