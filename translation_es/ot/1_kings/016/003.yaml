translation:
  language: es
  text: He aquí[a], voy a barrer de la faz de la tierra a Baasa y a su casa, y haré que tu casa sea como la casa de Jeroboam hijo de Nabat.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «estoy quemando/consumiendo después de Baasa». El hebreo usa un modismo que significa que Yahvé eliminará por completo a Baasa y a su linaje.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנְנִי
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Mira, pues
  lexicon: HALOT
  rationale: La interjección introduce una declaración solemne y profética. En español, «Mira» comunica con naturalidad la fuerza de atención inmediata de הִנְנִי, sin caer en una fórmula excesivamente arcaica. «He aquí» también sería posible, pero suena más tradicional que conversacional en este contexto.
- source_word: מַבְעִיר
  english_pob_choice: am sweeping away
  chosen_spanish: estoy consumiendo
  alternatives_spanish:
  - estoy quemando
  - estoy destruyendo
  - estoy borrando
  lexicon: HALOT
  rationale: El verbo en hifil puede expresar quemar/consumir con sentido idiomático de eliminación total. «Estoy consumiendo» conserva la imagen fuerte de destrucción y permite una traducción más cercana al hebreo que «estoy borrando»; al mismo tiempo evita una paráfrasis excesivamente libre.
- source_word: אַחֲרֵי
  english_pob_choice: away
  chosen_spanish: a
  alternatives_spanish:
  - después de
  - tras
  lexicon: HALOT
  rationale: La combinación idiomática con el verbo no suena natural si se replica literalmente en español. En este verso, el efecto global del hebreo es el de eliminar a Baasa y su linaje; por eso la relación se integra de forma natural en «a Baasa y a su casa», manteniendo el sentido de juicio completo sin forzar el giro idiomático.
- source_word: בַעְשָׁא
  english_pob_choice: Baasha
  chosen_spanish: Baasa
  alternatives_spanish:
  - Baasa
  - Baasha
  lexicon: Onomástica bíblica estándar
  rationale: Se adopta la transliteración española usual «Baasa», ampliamente reconocible y coherente con el uso bíblico en español. La forma con doble h no es necesaria en esta tradición de transliteración.
- source_word: בֵיתוֹ
  english_pob_choice: his house
  chosen_spanish: su casa
  alternatives_spanish:
  - su casa
  - su casa real
  - su dinastía
  lexicon: HALOT
  rationale: «Casa» preserva la metáfora hebrea y deja abierta la referencia dinástica/real sin explicitarla de más. «Su dinastía» aclara el sentido, pero reduce la resonancia del término בית en el discurso profético.
- source_word: וְנָתַתִּי
  english_pob_choice: I will make
  chosen_spanish: haré que
  alternatives_spanish:
  - pondré
  - daré
  - estableceré
  lexicon: HALOT
  rationale: Aunque el verbo básico es «dar», en esta construcción expresa hacer que una cosa llegue a ser como otra. «Haré que» reproduce bien esa relación causativa y mantiene la comparación explícita del verso.
- source_word: בֵּיתְךָ
  english_pob_choice: your house
  chosen_spanish: tu casa
  alternatives_spanish:
  - tu casa
  - tu casa real
  - tu dinastía
  lexicon: HALOT
  rationale: Se conserva la misma imagen de «casa» para mantener el paralelismo con «su casa» y reflejar el lenguaje dinástico del texto hebreo.
- source_word: כְּבֵית
  english_pob_choice: like the house of
  chosen_spanish: como la casa de
  alternatives_spanish:
  - igual que la casa de
  - tal como la casa de
  lexicon: HALOT
  rationale: La comparación es directa y se expresa de forma natural en español con «como la casa de», conservando el paralelismo formal del hebreo.
- source_word: יָרָבְעָם בֶּן נְבָט
  english_pob_choice: Jeroboam son of Nebat
  chosen_spanish: Jeroboam hijo de Nabat
  alternatives_spanish:
  - Jeroboam hijo de Nabat
  - Jeroboam, hijo de Nabat
  lexicon: Onomástica bíblica estándar
  rationale: «Hijo de» reproduce el patronímico bíblico con naturalidad en español. «Nabat» es la transliteración usual en la tradición bíblica hispana, suficiente para identificar el nombre propio.
theological_decisions:
- issue: Forma del juicio divino sobre Baasa y su casa
  english_pob_reading: Render the idiom as total dynastic removal without specifying a literal mechanism of fire in the main text.
  chosen_spanish_reading: Expresar la eliminación completa de Baasa y de su casa sin hacer del fuego un detalle interpretativo en el cuerpo principal.
  alternative_spanish_readings:
  - «estoy quemando a Baasa y a su casa»
  - «estoy destruyendo a Baasa y a su casa»
  rationale: El hebreo usa un giro idiomático que comunica juicio total sobre la línea de Baasa. La traducción española debe dejar claro el resultado —la aniquilación de su casa— sin obligar al lector a imaginar necesariamente un incendio literal. «Estoy consumiendo» mantiene la intensidad del juicio y la conexión con el verbo hebreo.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: 'La lectura española sigue el acuerdo alto del análisis comparado: se conserva la solemnidad de הִנְנִי, se resuelve el modismo de מַבְעִיר אַחֲרֵי de manera idiomática en español, y se mantiene el paralelismo «su casa / tu casa» para respetar la estructura del hebreo. No se introdujeron cambios respecto del consenso del audit trail inglés.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en la nota para mantener la terminología POB cuando se explicita el sujeto divino.
  - «Casa» se conserva de manera uniforme para reflejar la metáfora dinástica hebrea.
  - La traducción evita «SEÑOR» como máscara y evita también una paráfrasis que diluya el juicio profético.
  - Se prefirió «Mira» por fluidez pública, con nota para la alternativa más literal.
