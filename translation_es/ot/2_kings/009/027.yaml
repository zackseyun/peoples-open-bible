translation:
  language: es
  text: 'Cuando Ocozías, rey de Judá, vio esto[a], huyó por el camino de Bet-hagán. Y Jehú lo persiguió y dijo: «Hiérenlo también, en el carro[b]». Entonces lo hirieron en la subida de Gur, que está junto a Ibleam. Pero huyó a Meguido y murió allí.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Bet-hagán puede significar ‘casa del jardín’, pero aquí probablemente funciona como nombre de lugar; por eso se conserva transliterado.
    reason: cultural_note
  - marker: b
    text: O ‘Hiérenlo también en el carro’. La preposición hebrea es algo flexible aquí y puede indicar ubicación o dirección.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאָה
  english_pob_choice: saw this
  chosen_spanish: vio esto
  alternatives_spanish:
  - vio
  - vio eso
  lexicon: HALOT
  rationale: El hebreo solo dice ‘vio’; el contexto inmediato aporta el referente implícito. ‘Esto’ reproduce en español la referencia implícita sin especificarla de más.
- source_word: דֶּרֶךְ בֵּית הַגָּן
  english_pob_choice: by the way of Beth-haggan
  chosen_spanish: por el camino de Bet-hagán
  alternatives_spanish:
  - por la vía de Bet-hagán
  - por el camino de la casa del jardín
  lexicon: HALOT
  rationale: Se mantiene Bet-hagán como topónimo, siguiendo la decisión auditada en inglés de no traducirlo literalmente. ‘Por el camino de’ conserva la construcción direccional natural del hebreo.
- source_word: וַיִּרְדֹּף אַחֲרָיו
  english_pob_choice: pursued him
  chosen_spanish: lo persiguió
  alternatives_spanish:
  - lo persiguió tras él
  - lo siguió persiguiéndolo
  lexicon: HALOT
  rationale: Aunque el hebreo refuerza la idea de persecución tras la persona, el español ‘lo persiguió’ comunica ese sentido de manera natural sin sobrecargar la frase.
- source_word: גַּם אֹתוֹ
  english_pob_choice: him too
  chosen_spanish: también
  alternatives_spanish:
  - a él también
  - también a él
  lexicon: HALOT
  rationale: La partícula additive se expresa con ‘también’, ligado al objeto implícito en el imperativo. El español evita la redundancia innecesaria pero mantiene el valor de ‘además’.
- source_word: הַכֻּהוּ
  english_pob_choice: Strike him
  chosen_spanish: Hiérenlo
  alternatives_spanish:
  - Golpéenlo
  - Hieranlo
  lexicon: HALOT
  rationale: El imperativo de נכה admite ‘herir/golpear/derribar’. ‘Hiérenlo’ conserva el carácter violento del mandato sin decidir todavía entre herida o muerte.
- source_word: אֶל הַמֶּרְכָּבָה
  english_pob_choice: in the chariot
  chosen_spanish: en el carro
  alternatives_spanish:
  - sobre el carro
  - dentro del carro
  lexicon: HALOT
  rationale: La preposición hebrea es flexible; en este contexto el sentido locativo es el más probable. ‘En el carro’ resulta claro y fiel al dato narrativo.
- source_word: בְּמַעֲלֵה גוּר
  english_pob_choice: at the ascent of Gur
  chosen_spanish: en la subida de Gur
  alternatives_spanish:
  - en el ascenso de Gur
  - junto a la subida de Gur
  lexicon: HALOT
  rationale: ‘מַעֲלֶה’ nombra una subida o cuesta. ‘Subida’ es más natural en español que ‘ascenso’ y mantiene la referencia topográfica.
- source_word: אֲשֶׁר אֶת יִבְלְעָם
  english_pob_choice: which is by Ibleam
  chosen_spanish: que está junto a Ibleam
  alternatives_spanish:
  - que está cerca de Ibleam
  - que está en Ibleam
  lexicon: HALOT
  rationale: La relación espacial es aproximativa. ‘Junto a’ conserva la cercanía sin fijar con demasiada precisión una preposición que el hebreo deja algo abierta.
- source_word: וַיָּנָס מְגִדּוֹ
  english_pob_choice: he fled to Megiddo
  chosen_spanish: huyó a Meguido
  alternatives_spanish:
  - huyó hacia Meguido
  - escapó a Meguido
  lexicon: HALOT
  rationale: ‘Huir’ reproduce היטב el verbo. Se translitera el nombre propio con forma española usual ‘Meguido’.
- source_word: וַיָּמָת שָׁם
  english_pob_choice: died there
  chosen_spanish: murió allí
  alternatives_spanish:
  - y murió allí
  - falleció allí
  lexicon: HALOT
  rationale: El cierre narrativo es directo; ‘murió allí’ mantiene la sobriedad del hebreo y la fluidez del español.
theological_decisions:
- issue: 'Topónimo בית הגן: traducción o transliteración'
  english_pob_reading: Beth-haggan may mean 'house of the garden,' but here it is likely a place-name, so it is transliterated.
  chosen_spanish_reading: Bet-hagán se conserva como nombre de lugar.
  alternative_spanish_readings:
  - casa del jardín
  - la casa del huerto
  rationale: Siguiendo la decisión auditada, el texto no fuerza una traducción literal de un probable topónimo. Esto evita imponer una identificación semántica que el contexto no exige.
  doctrine_reference: Principio de transparencia textual y respeto al dato toponímico
- issue: 'Orden y fuerza del mandato verbal: הַכֻּהוּ'
  english_pob_reading: Strike him too, in the chariot!
  chosen_spanish_reading: Hiérenlo también, en el carro.
  alternative_spanish_readings:
  - Golpéenlo también, en el carro.
  - Mátenlo también, en el carro.
  rationale: ‘Herir’/‘golpear’ conserva la amplitud léxica de נכה y evita añadir una interpretación más cerrada de la que el imperativo por sí solo exige. La secuencia narrativa posterior explica el desenlace.
  doctrine_reference: Precisión léxica y no sobreactualización interpretativa
- issue: Relación espacial de Gur con Ibleam
  english_pob_reading: which is by Ibleam
  chosen_spanish_reading: que está junto a Ibleam
  alternative_spanish_readings:
  - que está cerca de Ibleam
  - que está en Ibleam
  rationale: La preposición hebrea permite una relación de proximidad. ‘Junto a’ preserva esa flexibilidad y no convierte la referencia geográfica en una localización más fuerte de la que el texto da.
  doctrine_reference: Respeto a la ambigüedad espacial del original
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que eliminó el ‘after’ redundante en ‘pursued him’ por naturalidad. En español se reflejó con ‘lo persiguió’, manteniendo la misma decisión de fluidez sin perder la idea de persecución.
  spanish_consistency_notes:
  - Se usa ‘Bet-hagán’ como transliteración estable del topónimo, coherente con la política POB para nombres de lugar probables.
  - Se usa ‘Meguido’ con grafía española habitual, y ‘Ibleam’ sin adaptación adicional por tratarse de nombre propio menos asentado en español.
  - Se mantiene ‘Yahvé’ en la política general, pero este versículo no contiene el nombre divino.
  - ‘Hiérenlo’ conserva el mandato violento sin anticipar explícitamente la muerte; el contexto narrativo posterior completa el sentido.
  - La puntuación y el tono buscan un registro bíblico claro y contemporáneo, sin calco excesivo del inglés.
