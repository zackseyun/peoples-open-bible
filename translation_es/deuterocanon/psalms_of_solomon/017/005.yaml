  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: elección de David, juramento acerca de su descendencia, duración perpetua y no desaparición de su reino/dinastía delante de Dios. Sin embargo, la nota [a] no preserva correctamente la alternativa inglesa, porque repite prácticamente el mismo sentido en vez de reflejar la opción más literal «simiente/semilla». Además, «no faltaría» para τοῦ μὴ ἐκλείπειν es posible, pero en español suena menos natural aquí que «no desaparecería» o «no cesaría».'
  spanish_quality_summary: 'El español es claro y digno, pero tiene dos detalles mejorables: la nota [a] necesita corregirse para no duplicar «descendencia», y «no faltaría delante de ti» suena algo forzado en español contemporáneo; «no desaparecería ante ti» mantiene mejor el sentido y la legibilidad. «Yahvé» cumple el estándar del proyecto, aunque el griego tenga Κύριε.'
  glossary_alignment: 'Buena alineación global con la terminología del proyecto: «Yahvé», «David», «reino», «descendencia». No hay conflicto teológico mayor. La excepción necesaria es que, dado que el griego dice Κύριε y no el tetragrámaton explícito, conviene dejar constancia en la decisión léxica, pero el texto principal puede permanecer con «Yahvé» por la política del proyecto.'
  issues:
