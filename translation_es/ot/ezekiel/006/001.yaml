lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ... came
  chosen_spanish: Y vino
  alternatives_spanish:
  - Y sucedió
  - Y aconteció
  lexicon: HALOT
  rationale: El valor narrativo-secuencial de וַיְהִי en esta fórmula profética se expresa de manera natural en español con «vino», manteniendo la continuidad discursiva sin volverlo mecánico con «sucedió».
- source_word: דְבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - la palabra pronunciada
  lexicon: HALOT
  rationale: En la fórmula דְבַר־יְהוָה, «la palabra» conserva el idiomatismo profético y la relación formal con Yahvé mejor que una paráfrasis como «el mensaje».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino con la forma estándar del proyecto en español, «Yahvé», en lugar de sustituirlo por un título.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - para mí
  lexicon: HALOT
  rationale: La construcción preposicional con sufijo de primera persona se vierte de manera directa y natural como «a mí».
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - con estas palabras
  lexicon: HALOT
  rationale: El infinitivo constructo introduce el discurso siguiente; «diciendo» preserva la fórmula hebrea sin añadir contenido interpretativo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. La decisión española sigue la norma del proyecto de transliterarlo como «Yahvé» para preservar el nombre personal del pacto y no ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El audit trail inglés no requirió cambios de revisión; se mantuvo la fórmula profética breve con equivalencia óptima y con el nombre divino no sustituido por un título.
  spanish_consistency_notes:
  - Se mantiene el estilo profético formular de apertura con orden natural en español.
  - «Yahvé» se usa de forma consistente con la política terminológica del proyecto.
  - La puntuación final con coma refleja que la cláusula introduce el discurso inmediato siguiente.
