revisions:
- from: Y el sacerdote hará expiación[a] por la persona que yerra por haber pecado inadvertidamente, delante de Yahvé, para hacer expiación por él; y le será perdonado.
  to: Y el sacerdote hará expiación[a] por la persona que yerra al pecar inadvertidamente, delante de Yahvé, para hacer expiación por él; y se le perdonará.
  rationale: Se ajusta la cláusula de inadvertencia para reflejar mejor la relación circunstancial del hebreo y sonar más natural en español, y se mejora la última frase con una formulación más idiomática que preserva el resultado pasivo del perdón. Se mantienen 'Yahvé' y 'expiación' por fidelidad terminológica al proyecto.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:30:35Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: el sacerdote realiza כפר por la persona que peca por error, delante de Yahvé, con el resultado de perdón. También preserva correctamente el nombre divino como ''Yahvé''. Sin embargo, la frase española ''que yerra por haber pecado inadvertidamente'' introduce una relación retrospectiva algo extraña (''por haber pecado'') que no representa bien el hebreo circunstancial; además, ''le será perdonado'' deja implícito el objeto del perdón de forma menos natural que una pasiva impersonal más idiomática.'
  spanish_quality_summary: El texto es claro y digno, pero puede mejorarse en naturalidad y precisión. 'Hará expiación' funciona bien en registro bíblico, aunque la repetición con nota puede mantenerse. La secuencia 'que yerra por haber pecado inadvertidamente' suena forzada en español contemporáneo; 'que yerra al pecar inadvertidamente' o 'que peca por error' sería más natural. 'Y le será perdonado' es comprensible, pero 'y se le perdonará' suena mejor y conserva el valor pasivo/impersonal.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יְהוָה -> ''Yahvé''; הַכֹּהֵן -> ''el sacerdote''; נֶפֶשׁ -> ''persona''; כפר -> ''expiación'' como término cultual aceptable en español. No hay conflicto doctrinal significativo. La única corrección es estilístico-semántica en la formulación de la inadvertencia.'
  issues:
  - severity: medium
    issue: Construcción 'que yerra por haber pecado inadvertidamente'
    rationale: El hebreo combina participio + frase circunstancial de pecado involuntario. 'Por haber pecado' sugiere causa retrospectiva o anterioridad completiva, lo cual suena menos fiel y menos natural que una construcción simultánea como 'al pecar inadvertidamente'.
  - severity: low
    issue: '''le será perdonado'' es menos idiomático'
    rationale: Aunque comprensible, en español bíblico moderno suena más natural 'se le perdonará', que conserva la idea de concesión de perdón sin crear una pasiva algo rígida.
  revised_spanish_text: Y el sacerdote hará expiación[a] por la persona que yerra al pecar inadvertidamente, delante de Yahvé, para hacer expiación por él; y se le perdonará.
  revised_footnotes:
  - marker: a
    text: Expiación traduce aquí el verbo sacerdotal כפר; no es simplemente “perdón”, sino el acto ritual que conduce al perdón.
    reason: lexical_alternative
  revision_rationale: Se ajusta la cláusula de inadvertencia para reflejar mejor la relación circunstancial del hebreo y sonar más natural en español, y se mejora la última frase con una formulación más idiomática que preserva el resultado pasivo del perdón. Se mantienen 'Yahvé' y 'expiación' por fidelidad terminológica al proyecto.
