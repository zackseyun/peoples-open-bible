    rationale: En las decisiones léxicas del borrador aparece «bastura» como alternativa para רֹחַב, pero no es una opción adecuada aquí. No afecta el texto final, pero muestra descuido léxico.
  revised_spanish_text: Y el ancho[a] del frente del templo[b] y del área separada hacia el oriente[c] era de cien codos.
