translation:
  language: es
  text: En aquel tiempo Josué volvió[a] y capturó a Hazor, y golpeó a su rey con la espada[c][b], porque Hazor antes era la cabeza de todos estos reinos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «regresó». El verbo hebreo puede verterse de ambas maneras; se eligió «volvió» para conservar mejor el matiz direccional del movimiento de la campaña.
    reason: lexical_alternative
  - marker: b
    text: O «era el jefe de todos estos reinos». El hebreo dice literalmente «era la cabeza de todos estos reinos», usando una metáfora de primacía.
    reason: lexical_alternative
  - marker: c
    text: «Golpeó ... con la espada» es una traducción sobria del hebreo. En contexto, la frase probablemente implica que lo mató, pero el verbo en sí dice literalmente «golpeó».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב
  english_pob_choice: turned back
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  - dio media vuelta
  lexicon: HALOT
  rationale: El hebreo שוב en este contexto de campaña militar puede expresar movimiento de regreso o vuelta. En español, «volvió» comunica bien ese desplazamiento sin introducir una parapráfrasis excesiva; «regresó» sería también posible, pero «volvió» es más breve y flexible.
- source_word: בָּעֵת הַהִיא
  english_pob_choice: At that time
  chosen_spanish: En aquel tiempo
  alternatives_spanish:
  - En ese tiempo
  - Entonces
  lexicon: HALOT
  rationale: Es una expresión temporal idiomática y solemne en español bíblico contemporáneo. «En aquel tiempo» conserva el tono narrativo y la referencia temporal amplia del hebreo.
- source_word: וַיִּלְכֹּד
  english_pob_choice: captured
  chosen_spanish: capturó
  alternatives_spanish:
  - tomó
  - se apoderó de
  lexicon: HALOT
  rationale: לכד se usa comúnmente para tomar una ciudad. «Capturó» es natural en español moderno y mantiene el sentido militar directo.
- source_word: חָצוֹר
  english_pob_choice: Hazor
  chosen_spanish: Hazor
  alternatives_spanish:
  - Jazor
  lexicon: transliteration
  rationale: Se mantiene la transliteración del nombre propio. «Hazor» es la forma estándar y transparente para un lector bíblico en español.
- source_word: מַלְכָּהּ
  english_pob_choice: its king
  chosen_spanish: su rey
  alternatives_spanish:
  - el rey de ella
  - su monarca
  lexicon: HALOT
  rationale: El sufijo femenino singular remite a la ciudad Hazor, pero en español la referencia posesiva natural para una ciudad es «su rey». «El rey de ella» suena forzado; «su monarca» cambia el registro sin necesidad.
- source_word: הִכָּה בֶחָרֶב
  english_pob_choice: struck its king with the sword
  chosen_spanish: hirió a su rey con la espada
  alternatives_spanish:
  - mató a su rey con la espada
  - lo hirió con la espada
  lexicon: HALOT
  rationale: נכה significa literalmente «golpear/herir/smiter». La traducción conserva la literalidad básica y la restricción del hebreo, sin explicitar «mató» como interpretación, aunque el contexto lo sugiera.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón explicativa del enunciado siguiente. «Porque» es claro y natural en español; «pues» también sería posible, pero puede sonar más literario o ambiguo según el contexto.
- source_word: לְפָנִים
  english_pob_choice: formerly
  chosen_spanish: antes
  alternatives_spanish:
  - anteriormente
  - antiguamente
  lexicon: HALOT
  rationale: La idea es de prioridad temporal anterior. «Antes» es la forma más directa y natural en español; «anteriormente» sería más formal, pero menos ágil.
- source_word: רֹאשׁ
  english_pob_choice: the head
  chosen_spanish: la cabeza
  alternatives_spanish:
  - el jefe
  - la principal
  lexicon: HALOT
  rationale: El hebreo conserva la metáfora corporal de primacía. «La cabeza» reproduce esa imagen con fidelidad; aunque en español puede sonar menos usual, es la opción más cercana al texto fuente.
- source_word: כָּל הַמַּמְלָכוֹת הָאֵלֶּה
  english_pob_choice: all these kingdoms
  chosen_spanish: todos estos reinos
  alternatives_spanish:
  - todas estas naciones
  - todos estos dominios
  lexicon: HALOT
  rationale: ממלכות puede referirse a reinos como entidades políticas. «Reinos» preserva el plural y evita trasladar innecesariamente el término a «naciones» o «dominios», que diluirían la imagen política del hebreo.
translation_notes:
  revision_awareness: 'La revisión más reciente indica que no hubo cambios necesarios y que el acuerdo con el control cruzado fue alto (0.95). Se conserva, por tanto, la línea de traducción del inglés POB: movimiento de retorno, captura de Hazor, verbo de golpe/herida sin explicitar muerte, y la metáfora de «cabeza» para primacía.'
  spanish_consistency_notes:
  - Se mantiene el nombre propio «Hazor» de forma uniforme.
  - Se preserva la metáfora de «cabeza» en el texto principal y se aclara en nota.
  - Se evita introducir un equivalente doctrinal o litúrgico no requerido por el hebreo.
  - El posesivo «su rey» refleja la relación gramatical con la ciudad sin forzar una personificación en español.
