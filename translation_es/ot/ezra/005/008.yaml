translation:
  language: es
  text: «Sea conocido al rey que fuimos a la provincia de Judá, a la casa del gran Dios. Se está edificando con piedras grandes[a], y se está colocando madera en los muros. Esta obra se está haciendo con diligencia[b] y prospera en sus manos.»
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con piedras muy grandes». La expresión aramea puede referirse en general a piedras de construcción de gran tamaño.
    reason: lexical_alternative
  - marker: b
    text: O «cuidadosamente» o posiblemente «rápidamente» para «con diligencia». El matiz del adverbio es debatido, pero claramente describe que la obra avanza de manera eficaz.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְדִיעַ לֶהֱוֵא
  english_pob_choice: Let it be known
  chosen_spanish: Sea conocido
  alternatives_spanish:
  - Que se sepa
  - Sea notorio
  lexicon: HALOT
  rationale: La fórmula aramea es administrativa y solemne. «Sea conocido» conserva el tono impersonal y formal sin volverlo arcaico en exceso.
- source_word: לְמַלְכָּא
  english_pob_choice: to the king
  chosen_spanish: al rey
  alternatives_spanish:
  - ante el rey
  - para el rey
  lexicon: HALOT
  rationale: 'La construcción dativa se naturaliza en español como destinatario del mensaje: «al rey».'
- source_word: אֲזַלְנָא
  english_pob_choice: we went
  chosen_spanish: fuimos
  alternatives_spanish:
  - caminamos
  - nos trasladamos
  lexicon: HALOT
  rationale: El verbo indica desplazamiento desde el punto de vista de los remitentes; «fuimos» es la equivalencia más directa y natural.
- source_word: לִיהוּד מְדִינְתָּא
  english_pob_choice: to the province of Judah
  chosen_spanish: a la provincia de Judá
  alternatives_spanish:
  - a la provincia de Yehud
  - a Judá, la provincia
  lexicon: HALOT
  rationale: «Judá» comunica de manera clara el topónimo histórico y refleja el valor provincial de מְדִינְתָּא.
- source_word: לְבֵית אֱלָהָא רַבָּא
  english_pob_choice: to the house of the great God
  chosen_spanish: a la casa del gran Dios
  alternatives_spanish:
  - al templo del gran Dios
  - a la casa del Dios grande
  lexicon: HALOT
  rationale: Se conserva «casa» para respetar el lenguaje del texto fuente, aunque se refiere al templo; «gran Dios» mantiene el orden reverencial del arameo.
- source_word: מִתְבְּנֵא
  english_pob_choice: It is being built
  chosen_spanish: Se está edificando
  alternatives_spanish:
  - Está siendo construido
  - Se construye
  lexicon: HALOT
  rationale: La forma pasiva/reflexiva se rinde bien con «se está edificando», que además suena natural y conserva el aspecto progresivo.
- source_word: אֶבֶן גְּלָל
  english_pob_choice: with great stones
  chosen_spanish: con piedras grandes
  alternatives_spanish:
  - con grandes piedras
  - con piedras enormes
  lexicon: HALOT
  rationale: La frase admite una referencia a piedras de gran tamaño. «Piedras grandes» es fiel y evita intensificar sin necesidad el tamaño.
- source_word: וְאָע
  english_pob_choice: and timber
  chosen_spanish: y madera
  alternatives_spanish:
  - y maderos
  - y vigas
  lexicon: HALOT
  rationale: El sustantivo es amplio y puede designar madera de construcción; «madera» es fiel y suficientemente claro en español.
- source_word: מִתְּשָׂם בְּכֻתְלַיָּא
  english_pob_choice: is being laid in the walls
  chosen_spanish: se está poniendo en los muros
  alternatives_spanish:
  - se está asentando en las paredes
  - se coloca en los muros
  lexicon: HALOT
  rationale: La imagen es de madera colocada dentro de la estructura mural. «Poniendo en los muros» conserva la acción concreta sin explicar de más.
- source_word: וַעֲבִידְתָּא דָךְ
  english_pob_choice: This work
  chosen_spanish: Esta obra
  alternatives_spanish:
  - Este trabajo
  - Esta construcción
  lexicon: HALOT
  rationale: «Obra» funciona bien para una actividad de construcción y preserva el tono formal del informe.
- source_word: אָסְפַּרְנָא
  english_pob_choice: diligently
  chosen_spanish: con diligencia
  alternatives_spanish:
  - cuidadosamente
  - rápidamente
  lexicon: HALOT
  rationale: La adverbialidad es debatida, pero aquí el contexto describe ejecución eficaz. «Con diligencia» refleja bien el progreso serio y activo sin fijar de modo indebido la velocidad.
- source_word: מִתְעַבְדָא
  english_pob_choice: is being done
  chosen_spanish: se hace
  alternatives_spanish:
  - se está llevando a cabo
  - se está realizando
  lexicon: HALOT
  rationale: La forma refleja un proceso en curso; «se hace» es breve y natural, y el contexto ya sugiere continuidad.
- source_word: וּמַצְלַח בְּיֶדְהֹם
  english_pob_choice: and is prospering in their hands
  chosen_spanish: y prospera en sus manos
  alternatives_spanish:
  - y tiene éxito en sus manos
  - y avanza bien en sus manos
  lexicon: HALOT
  rationale: Se conserva el modismo de éxito bajo su agencia. «Prospera en sus manos» mantiene la imagen idiomática del original sin perder claridad.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que corrigió «huge stones» a «great stones» para ajustarse mejor al léxico del arameo y al registro formal. El español adopta una solución equivalente («piedras grandes») y conserva el debate semántico en nota. También se respetó la decisión auditada de mantener la metáfora idiomática de «prosperar en sus manos».
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca explícitamente; aquí el texto dice «Dios» y se conserva esa forma.
  - Se preserva «casa» en lugar de «templo» para seguir de cerca el source wording y el tono reverencial del informe.
  - 'Se mantiene el paralelismo aspectual con perífrasis progresivas donde el arameo lo sugiere: «se está edificando», «se está poniendo».'
  - «Prospera en sus manos» conserva el modismo sin reemplazarlo por una explicación interpretativa.
