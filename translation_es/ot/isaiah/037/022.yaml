review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo: conserva la fórmula profética, el nombre divino Yahvé, la personificación de Sion/Jerusalén, el doble verbo de desprecio y burla, y el gesto de mover la cabeza detrás del enemigo. También mantiene adecuadamente la alternativa de עָלָיו como ‘acerca de él’ / ‘contra él’.'
  spanish_quality_summary: 'El español es claro y digno, pero necesita un ajuste menor de legibilidad y consistencia ortográfica: en español bíblico general es preferible ‘Sión’ con tilde. Además, conviene invertir el orden de las notas para que el marcador cultural caiga sobre ‘Sión’, que es donde realmente corresponde la explicación de la personificación, mientras la nota lexical sobre ‘acerca de él’ debe anclarse en esa frase.'
  glossary_alignment: 'Alineado en lo principal con el glosario del proyecto: יְהוָה → ‘Yahvé’, בְּתוּלַת בַּת צִיּוֹן → ‘la virgen hija de Sión’, בַּת יְרוּשָׁלִָם → ‘la hija de Jerusalén’. No hay conflicto terminológico mayor; la revisión propuesta solo normaliza ‘Sión’ y mejora la ubicación de notas.'
  issues:
  - severity: medium
    issue: Uso de ‘Sion’ sin tilde
    rationale: En español estándar la forma asentada es ‘Sión’. La propia ficha reconoce esta alternativa y es la opción más natural y ampliamente legible en una Biblia en español.
  - severity: low
    issue: Ubicación poco precisa de los marcadores de nota
    rationale: La nota cultural sobre ‘Virgen Hija de Sion’ está anclada al segmento ‘se burla de ti[a][b]’, cuando en realidad explica la expresión personificada ‘la virgen hija de Sión’. Reubicar los marcadores mejora claridad editorial sin cambiar el sentido.
  revised_spanish_text: 'Esta es la palabra que Yahvé ha hablado acerca de él[a]: «La virgen hija de Sión[b] te desprecia y se burla de ti; la hija de Jerusalén menea la cabeza detrás de ti».'
  revised_footnotes:
