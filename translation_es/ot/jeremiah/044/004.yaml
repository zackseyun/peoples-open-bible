translation:
  language: es
  text: 'Sin embargo, les envié a todos mis siervos, los profetas, madrugando y enviándolos[a], diciendo: «Por favor, no hagan esta cosa abominable[b] que yo aborrezco».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «madrugando y enviando»; es un modismo para una acción reiterada, diligente y urgente.'
    reason: cultural_note
  - marker: b
    text: O «esta cosa detestable» / «esta abominación».
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶשְׁלַח
  english_pob_choice: Yet I sent
  chosen_spanish: Sin embargo, les envié
  alternatives_spanish:
  - Y les envié
  - Así que les envié
  lexicon: HALOT
  rationale: El waw consecutivo avanza el discurso con un matiz adversativo en contexto; «Sin embargo» conserva esa tensión mejor que un simple «y» y refleja que, pese a las advertencias previas, Yahvé siguió enviando mensajes.
- source_word: אֲלֵיכֶם
  english_pob_choice: to you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - a vosotros
  lexicon: HALOT
  rationale: El objeto plural de segunda persona se expresa naturalmente con «les» en español cuando el referente ya está claro por el contexto; evita redundancia y mantiene el tono directo.
- source_word: כָּל עֲבָדַי הַנְּבִיאִים
  english_pob_choice: all my servants the prophets
  chosen_spanish: a todos mis siervos, los profetas
  alternatives_spanish:
  - a todos mis siervos, profetas
  - a todos mis siervos profetas
  lexicon: HALOT
  rationale: Se conserva la doble caracterización apposicional. «Siervos» sigue la fuerza de comisión divina del hebreo y, según el audit trail inglés, evita introducir «esclavos», que aquí no es el foco semántico.
- source_word: הַשְׁכֵּים וְשָׁלֹחַ
  english_pob_choice: rising early and sending them
  chosen_spanish: madrugando y enviándolos
  alternatives_spanish:
  - madrugando para enviarlos
  - insistentemente enviándolos
  - madrugando a enviar
  lexicon: HALOT
  rationale: El hebreo es un modismo de acción repetida y diligente. «Madrugando y enviándolos» conserva la imagen literal y la idea de insistencia/urgencia señalada por el POB inglés, sin hacerla demasiado explicativa en el texto principal.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  - y diciendo
  lexicon: HALOT
  rationale: Fórmula discursiva estándar; «diciendo» reproduce el enlace natural al contenido citado en español.
- source_word: אַל נָא תַעֲשׂוּ
  english_pob_choice: Please do not do
  chosen_spanish: Por favor, no hagan
  alternatives_spanish:
  - Les ruego que no hagan
  - Por favor, no hagan esto
  lexicon: HALOT
  rationale: Se preservan tanto la prohibición como el ruego/urgencia de נָא. El verbo en plural mantiene la fuerza dirigida al pueblo completo.
- source_word: דְּבַר הַתֹּעֵבָה הַזֹּאת
  english_pob_choice: this abominable thing
  chosen_spanish: esta cosa abominable
  alternatives_spanish:
  - esta cosa detestable
  - esta abominación
  lexicon: HALOT
  rationale: דבר aquí funciona idiomáticamente como «cosa/materia». «Abominable» conserva el peso moral-religioso de תועבה; se evita «abominación» en el texto principal para no volver demasiado técnico el giro.
- source_word: אֲשֶׁר שָׂנֵאתִי
  english_pob_choice: that I hate
  chosen_spanish: que yo aborrezco
  alternatives_spanish:
  - que yo odio
  - que detesto
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una postura divina estable. «Aborrezco» comunica con dignidad y fuerza la oposición moral de Dios sin sonar excesivamente coloquial como «odio».
theological_decisions:
- issue: Expresar la oposición moral divina al acto sin atenuarla ni convertirla en una categoría doctrinal ajena al verso
  english_pob_reading: that I hate
  chosen_spanish_reading: que yo aborrezco
  alternative_spanish_readings:
  - que yo odio
  - que detesto
  rationale: El hebreo afirma directamente el rechazo divino a la práctica abominable. «Aborrezco» mantiene esa intensidad con un registro bíblico claro en español y sin desplazar el sentido hacia una formulación abstracta.
  doctrine_reference: Jeremías 44:4; traducción de fuerza moral del texto
- issue: Conservar la imagen idiomática de diligencia repetida en הַשְׁכֵּים וְשָׁלֹחַ
  english_pob_reading: rising early and sending them
  chosen_spanish_reading: madrugando y enviándolos
  alternative_spanish_readings:
  - insistentemente enviándolos
  - madrugando para enviarlos
  rationale: El modismo hebreo comunica empeño reiterado. La versión española mantiene la imagen sin perder inteligibilidad, y deja abierta la lectura de insistencia que el audit trail inglés documenta.
  doctrine_reference: Jeremías 44:4; nota cultural sobre el modismo hebreo
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia y no requiere cambios respecto al pasaje fuente. Esta propuesta sigue la lectura inglesa aprobada, pero ajusta el registro al español natural, manteniendo la tensión adversativa de וָאֶשְׁלַח, la imagen idiomática de הַשְׁכֵּים וְשָׁלֹחַ y la fuerza moral de תֹּעֵבָה y שָׂנֵאתִי.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino según la terminología del proyecto; en este verso el sujeto está implícito por el contexto del discurso profético.
  - «Siervos» se conserva para עֲבָדַי conforme al uso reconocido en lenguaje profético de comisión divina, evitando «esclavos» porque aquí no es la intención semántica principal.
  - Se prefiere «Mesías» solo cuando corresponda por el término fuente; este verso no lo contiene.
  - Las notas distinguen entre la metáfora literal del hebreo y la explicación idiomática, para no borrar la imagen original.
