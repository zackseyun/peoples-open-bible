translation:
  language: es
  text: Pero cuando el príncipe haga una ofrenda voluntaria a Yahvé, ya sea un holocausto o sacrificios de paz[a], se le abrirá la puerta que mira al oriente, y ofrecerá su holocausto y sus sacrificios de paz, como hace en el día de reposo. Luego saldrá[b], y después de que él salga, se cerrará la puerta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "ofrendas de comunión" para "sacrificios de paz".
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo usa verbos en tercera persona sin agente explícito ("y abrió" / "y cerró"); el español aquí conserva ese agente no especificado con expresiones impersonales: "se le abrirá" ... "se cerrará".'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  english_pob_choice: But when
  chosen_spanish: Pero cuando
  alternatives_spanish:
  - Y cuando
  - Ahora bien, cuando
  lexicon: HALOT
  rationale: Introduce una circunstancia específica dentro de la instrucción legal; 'Pero cuando' preserva bien el giro discursivo y la restricción condicional.
- source_word: הַנָּשִׂיא
  english_pob_choice: the prince
  chosen_spanish: el príncipe
  alternatives_spanish:
  - el líder
  - el gobernante
  lexicon: HALOT
  rationale: '''Príncipe'' mantiene la designación técnico-cultual habitual para esta figura en Ezequiel sin convertirla en un término más general o político.'
- source_word: נְדָבָה
  english_pob_choice: a freewill offering
  chosen_spanish: una ofrenda voluntaria
  alternatives_spanish:
  - una ofrenda de libre voluntad
  - una ofrenda espontánea
  lexicon: HALOT
  rationale: En español, 'ofrenda voluntaria' comunica con claridad la idea de una ofrenda no obligatoria; evita el calco pesado y conserva el sentido lexical.
- source_word: עוֹלָה
  english_pob_choice: a burnt offering
  chosen_spanish: un holocausto
  alternatives_spanish:
  - un sacrificio totalmente quemado
  - una ofrenda quemada
  lexicon: HALOT
  rationale: '''Holocausto'' es el equivalente sacrificial establecido para עֹלָה en español bíblico y comunica la ofrenda completamente quemada.'
- source_word: שְׁלָמִים
  english_pob_choice: peace offerings
  chosen_spanish: sacrificios de paz
  alternatives_spanish:
  - ofrendas de comunión
  - ofrendas de paz
  lexicon: HALOT
  rationale: Se conserva la relación con la traducción inglesa 'peace offerings', pero en español 'sacrificios de paz' suena más natural y mantiene el valor cultual. Se evita imponer una sola interpretación más estrecha.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  lexicon: HALOT
  rationale: Se sigue el criterio POB de traducir el nombre divino como 'Yahvé', conservando la referencia al nombre propio del pacto en lugar de ocultarlo con un título.
- source_word: וּפָתַח ל֗וֹ אֶת הַשַּׁעַר הַפֹּנֶה קָדִים
  english_pob_choice: the gate that faces east shall be opened for him
  chosen_spanish: se le abrirá la puerta que mira al oriente
  alternatives_spanish:
  - le abrirán la puerta que mira al oriente
  - la puerta que mira al oriente será abierta para él
  lexicon: HALOT
  rationale: El hebreo usa una forma sin agente explícito; el pasivo impersonal en español preserva esa indeterminación. 'Mira al oriente' es natural y fiel a la identificación direccional del texto.
- source_word: וְעָשָׂה
  english_pob_choice: he shall offer
  chosen_spanish: ofrecerá
  alternatives_spanish:
  - hará
  - presentará
  lexicon: HALOT
  rationale: En contexto sacrificial, עשה significa realizar/ofrecer el sacrificio; 'ofrecerá' es el equivalente cultual más claro en español.
- source_word: כַּאֲשֶׁר יַעֲשֶׂה בְּיוֹם הַשַּׁבָּת
  english_pob_choice: as he does on the Sabbath day
  chosen_spanish: como hace en el día de reposo
  alternatives_spanish:
  - como lo hace en el día de reposo
  - así como hace en sábado
  lexicon: HALOT
  rationale: '''Día de reposo'' comunica claramente el referente sabático en español bíblico y mantiene el paralelismo habitual del rito.'
- source_word: וְיָצָא
  english_pob_choice: Then he shall go out
  chosen_spanish: Luego saldrá
  alternatives_spanish:
  - Y saldrá
  - Entonces saldrá
  lexicon: HALOT
  rationale: Marca la secuencia procedimental sin sobrecargar el español; 'Luego' preserva el orden narrativo/legal.
- source_word: וְסָגַר אֶת הַשַּׁעַר אַחֲרֵי צֵאתוֹ
  english_pob_choice: and after he goes out the gate shall be shut
  chosen_spanish: y después de salir, se cerrará la puerta
  alternatives_spanish:
  - y después de salir, la puerta será cerrada
  - y la puerta se cerrará después de que él salga
  lexicon: HALOT
  rationale: Se mantiene el pasivo sin agente explícito, como en el hebreo. 'Puerta' es más natural en español que repetir 'puerta' y 'salir' de manera pesada, y conserva el sentido procedimental.
theological_decisions:
- issue: Nombre divino יהוה / YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: El proyecto POB en español usa 'Yahvé' como forma principal para el nombre del pacto, preservando el nombre divino en vez de enmascararlo con un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Rendering of שְׁלָמִים
  english_pob_reading: peace offerings
  chosen_spanish_reading: sacrificios de paz
  alternative_spanish_readings:
  - ofrendas de comunión
  - ofrendas de paz
  rationale: '''Sacrificios de paz'' conserva la familiaridad cultual y no obliga a elegir de antemano entre ''paz'', ''comunión'' o ''fellowship'' como única glosa interpretativa.'
  doctrine_reference: Lexical-theological consistency for sacrificial terminology in Ezekiel
- issue: Impersonal passive for omitted agent
  english_pob_reading: the gate shall be opened... the gate shall be shut
  chosen_spanish_reading: se le abrirá... se cerrará
  alternative_spanish_readings:
  - la puerta será abierta... la puerta será cerrada
  - abrirán... cerrarán
  rationale: El hebreo omite el agente; el español impersonal conserva esa ambigüedad sin añadir sujeto no expresado.
  doctrine_reference: Syntax and source transparency
translation_notes:
  revision_awareness: Se incorporó la revisión del audit trail que ajusta la idea de 'offers' a 'makes' en el primer miembro, pero en español el giro natural sigue siendo 'hacer una ofrenda voluntaria' / 'ofrecer' según el contexto sacrificial. También se preservó la pasiva impersonal para reflejar el hebreo sin agente explícito.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma coherente con el estándar del proyecto para יהוה.
  - Se mantiene 'príncipe' para הַנָּשִׂיא como término técnico-cultual.
  - '''Holocausto'' y ''sacrificios de paz'' siguen la terminología sacrificial estable, sin sustituirla por paráfrasis.'
  - La sintaxis impersonal ('se le abrirá', 'se cerrará') refleja la ausencia de agente en el hebreo y evita añadir un sujeto no expresado.
