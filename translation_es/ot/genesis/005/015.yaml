  spanish_consistency_notes:
  - Se mantiene el patrón genealógico breve y directo de la serie en Génesis 5.
  - Se evita «Cristo», «Señor» o fórmulas eclesiásticas no presentes en el texto.
  - El nombre propio y el valor numérico quedan transparentes para lectura pública y auditoría.
