  rationale: Se revisa la cláusula final para un español más natural y fiel al valor causativo de וְלַשְׁבִּית, reemplazando el calco 'llevan ... a su fin' por 'hacen desaparecer'. Se reubica la nota al término realmente debatido ('pisotean') y se elimina la exclamación para mantener un tono profético digno. Se conserva la distinción entre 'necesitado' y 'pobres' y la referencia concreta a 'la tierra'.
