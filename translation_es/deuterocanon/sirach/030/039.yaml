translation:
  language: es
  text: Si tienes un esclavo[a], que sea como tú, porque con sangre lo adquiriste; si tienes un esclavo, trátalo como a ti mismo[b], porque lo necesitas como a tu propia vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego literalmente, 'porque con sangre lo adquiriste'; es una expresión idiomática que señala adquisición a gran costo personal.
    reason: lexical_alternative
  - marker: b
    text: La última cláusula es difícil en griego. El sentido parece ser que el esclavo es necesario con la misma urgencia o cercanía que la propia vida.
    reason: textual_variant
lexical_decisions:
- source_word: οἰκέτης
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - sirviente de la casa
  - doméstico
  lexicon: BDAG
  rationale: El contexto de posesión y adquisición ('si tienes', 'lo adquiriste') hace saliente la condición de servidumbre vinculada a propiedad. 'Esclavo' preserva mejor esa realidad social que suavizarla con 'siervo' o 'sirviente'.
- source_word: ἔστω ὡς σύ
  english_pob_choice: let him be like yourself
  chosen_spanish: que sea como tú
  alternatives_spanish:
  - que sea como eres tú
  - que sea como tú mismo
  - que sea igual que tú
  lexicon: LSJ
  rationale: La expresión comparativa se vierte de forma natural en español con 'que sea como tú', manteniendo la fuerza ética de tratar al esclavo como equivalente en dignidad y trato.
- source_word: ἐν αἵματι
  english_pob_choice: with blood
  chosen_spanish: con sangre
  alternatives_spanish:
  - al costo de sangre
  - con tu propia sangre
  - con gran costo
  lexicon: LSJ
  rationale: '''Con sangre'' conserva la literalidad vívida del griego y deja abierta la lectura idiomática de adquisición a gran costo, sin resolverla en exceso.'
- source_word: ἐκτήσω
  english_pob_choice: you acquired
  chosen_spanish: lo adquiriste
  alternatives_spanish:
  - lo compraste
  - lo ganaste
  - lo obtuviste
  lexicon: LSJ
  rationale: '''Adquiriste'' sigue el valor amplio de adquirir/obtener sin imponer de manera explícita una transacción comercial que el verbo por sí solo no exige.'
- source_word: ἄγε αὐτὸν ὡς σεαυτόν
  english_pob_choice: treat him like yourself
  chosen_spanish: trátalo como a ti mismo
  alternatives_spanish:
  - llévalo como a ti mismo
  - guíalo como a ti mismo
  - trátalo como si fueras tú
  lexicon: LSJ
  rationale: Aunque ἄγω significa literalmente 'llevar/guíar', en este contexto la equivalencia práctica es mejor expresada por 'trátalo', siguiendo la lectura contextual ya auditada en el inglés POB.
- source_word: σεαυτόν
  english_pob_choice: yourself
  chosen_spanish: a ti mismo
  alternatives_spanish:
  - como tú mismo
  - a ti
  lexicon: LSJ
  rationale: '''A ti mismo'' conserva el matiz reflexivo y hace natural la comparación en español.'
- source_word: ψυχή
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - alma
  - vida propia
  - ser
  lexicon: BDAG
  rationale: Aquí ψυχή apunta a la vida misma o a la persona entera, no a un 'alma' separada. 'Vida' reproduce el peso afectivo y práctico de la comparación.
- source_word: ἐπιδέησις
  english_pob_choice: you need
  chosen_spanish: lo necesitas
  alternatives_spanish:
  - dependes de él
  - tienes necesidad de él
  - él te es indispensable
  lexicon: LSJ
  rationale: La forma griega es sintácticamente difícil; la solución española verbaliza la necesidad de modo claro sin ocultar la tensión del original ni forzar una paráfrasis excesiva.
theological_decisions:
- issue: Mantener el término de servidumbre fuerte en un contexto de posesión
  english_pob_reading: slave
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - siervo
  - sirviente
  rationale: El pasaje habla de adquisición y dependencia, por lo que 'esclavo' preserva la dureza social del texto. Evita suavizar una realidad que el original no atenúa.
  doctrine_reference: 'DOCTRINE.md: Contested terms table; principio de primacía del texto original y de no suavizar realidades sociales por defecto.'
- issue: Cláusula final difícil y sintácticamente rugosa
  english_pob_reading: because you need him as your own life
  chosen_spanish_reading: porque lo necesitas como a tu propia vida
  alternative_spanish_readings:
  - porque te es necesario como tu propia vida
  - porque dependes de él como de tu propia vida
  - porque él te es tan necesario como tu vida
  rationale: El griego transmitido es difícil y probablemente refleja aspereza sintáctica o sustrato semítico. La versión española conserva el sentido básico de necesidad intensa sin pretender resolver plenamente la dificultad textual.
  doctrine_reference: 'DOCTRINE.md: preservar tensiones textuales y no sobreexplicar donde el original es áspero; PHILOSOPHY.md: honestidad ante la incertidumbre del texto.'
translation_notes:
  revision_awareness: 'Se siguió el auditable inglés POB y sus notas: se conservó ''slave'' en español como ''esclavo'' por la carga social del contexto; se mantuvo la literalidad de ''with blood'' como ''con sangre''; y se adoptó una solución contextual para la cláusula final difícil, coherente con la revisión inglesa que favorece el sentido de trato equitativo en la segunda instancia y la necesidad intensa al cierre.'
  spanish_consistency_notes:
  - Se usó 'esclavo' de manera consistente en ambas ocurrencias para reflejar la misma base léxica οἰκέτης.
  - '''Con sangre'' mantiene la tensión entre literalidad e idiomatismo sin convertirla en ''al costo de sangre'' dentro del texto principal.'
  - La segunda cláusula usa 'trátalo como a ti mismo' para reflejar el valor pragmático de ἄγε αὐτὸν ὡς σεαυτόν, evitando una calca extraña en español.
  - '''Vida'' se eligió para ψυχή, en continuidad con la lectura inglesa auditada, sin introducir ''alma''.'
