revisions:
- from: Entonces el rey Acaz fue a encontrarse con Tiglat-pileser, rey de Asiria, en Damasco[a], y vio el altar que estaba en Damasco. Y el rey Acaz envió al sacerdote Urías la semejanza[b] del altar y su diseño, según toda su hechura.
  to: Entonces el rey Acaz fue a encontrarse con Tiglat-pileser, rey de Asiria, en Damasco, y vio el altar que estaba en Damasco. Y el rey Acaz envió al sacerdote Urías la semejanza[a] del altar y su diseño, con todos sus detalles de construcción[b].
  rationale: Se quitó la nota sobre «Damasco» porque no aporta una ambigüedad que requiera nota en español y su anclaje era impreciso. Se mantuvieron «semejanza» y «diseño» por fidelidad a דְּמוּת y תַּבְנִית. Se revisó «según toda su hechura» a «con todos sus detalles de construcción» para comunicar con mayor claridad el valor de לְכָל מַעֲשֵׂהוּ, en línea con la explicación lexical auditada.
