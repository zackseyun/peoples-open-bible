translation:
  language: es
  text: 'Entonces dije[a]: “Moriré en mi nido, y multiplicaré mis días como la arena.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Posible traducción alternativa: «y multiplicaré mis días como el fénix». El hebreo de «arena» ha sido entendido por algunos como un nombre de ave en este versículo, pero «arena» es el sentido más probable en el contexto y conserva la imagen bíblica común de gran número.'
    reason: alternative_reading
lexical_decisions:
- source_word: וָאֹמַר
  english_pob_choice: Then I said
  chosen_spanish: Entonces dije
  alternatives_spanish:
  - Y dije
  - Entonces diré
  lexicon: HALOT
  rationale: La forma con waw consecutiva expresa avance narrativo en el recuerdo de Job; «Entonces dije» conserva esa secuencia y suena natural en español.
- source_word: עִם קִנִּי
  english_pob_choice: in my nest
  chosen_spanish: en mi nido
  alternatives_spanish:
  - con mi nido
  - en mi casa
  lexicon: HALOT
  rationale: El sustantivo קִן significa literalmente «nido»; el español admite la imagen sin necesidad de aplanarla a «casa». La preposición עִם queda idiomáticamente expresada aquí como «en», tal como en la solución inglesa «in my nest».
- source_word: אֶגְוָע
  english_pob_choice: I will die
  chosen_spanish: Moriré
  alternatives_spanish:
  - Expiraré
  - Daré mi último aliento
  lexicon: HALOT
  rationale: El verbo denota morir o perecer. «Moriré» es la equivalencia más clara y natural en español, manteniendo el sentido sin sobrecargarlo.
- source_word: וְכַחוֹל
  english_pob_choice: like the sand
  chosen_spanish: como la arena
  alternatives_spanish:
  - como la arena del mar
  - como el polvo
  lexicon: HALOT
  rationale: El sentido más probable de חול aquí es «arena», imagen bíblica común de multitud innumerable. «Arena» mantiene la metáfora y evita introducir una interpretación más específica de la necesaria.
- source_word: אַרְבֶּה
  english_pob_choice: I will multiply
  chosen_spanish: multiplicaré
  alternatives_spanish:
  - aumentaré
  - haré muchos
  lexicon: HALOT
  rationale: El hifil de רבה expresa hacer muchos o aumentar. «Multiplicaré» conserva la fuerza verbal del original y el paralelismo con «mis días».
- source_word: יָמִים
  english_pob_choice: my days
  chosen_spanish: mis días
  alternatives_spanish:
  - mis años
  - mi vida
  lexicon: HALOT
  rationale: «Mis días» reproduce la expresión hebrea y preserva la referencia a la duración de la vida, sin sustituirla por un equivalente explicativo menos literal.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo de WLC y el audit trail inglés de la POB, conservando la imagen poética de «nido» y la lectura principal «arena», sin eliminar la alternativa documentada de «fénix».
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma por defecto solo cuando aparece el nombre divino; este versículo no contiene ese elemento.
  - Se mantiene el paralelismo poético con un orden natural en español, sin introducir glosas interpretativas adicionales.
  - La nota al pie recoge la tensión lexical documentada en el inglés POB para חול, preservando la alternativa sin convertirla en lectura principal.
