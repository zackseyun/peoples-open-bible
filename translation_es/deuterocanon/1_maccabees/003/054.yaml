translation:
  language: es
  text: Y tocaron las trompetas, y gritaron[a] a gran voz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Gritaron» traduce el valor del griego ἐβόησαν; también podría entenderse como «clamaron».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐσάλπισαν
  english_pob_choice: sounded
  chosen_spanish: tocaron
  alternatives_spanish:
  - sonaron
  - soplaron
  lexicon: BDAG
  rationale: El verbo griego se refiere a hacer sonar una trompeta. En español, «tocar» es el equivalente natural y claro para instrumentos de viento, y conserva el acto deliberado de producir el sonido.
- source_word: ταῖς σάλπιγξιν
  english_pob_choice: the trumpets
  chosen_spanish: las trompetas
  alternatives_spanish:
  - con las trompetas
  - en las trompetas
  lexicon: LSJ
  rationale: El dativo instrumental griego puede expresarse de forma natural en español con el objeto directo del verbo «tocar». Se conserva el instrumento de manera concreta sin forzar una construcción pesada.
- source_word: ἐβόησαν
  english_pob_choice: cried out
  chosen_spanish: gritaron
  alternatives_spanish:
  - clamaron
  - alzaron un grito
  lexicon: BDAG
  rationale: El verbo indica un clamor o grito fuerte. «Gritaron» reproduce bien la fuerza vocal y resulta más directo y natural en español que una perífrasis más explicativa.
- source_word: φωνῇ μεγάλῃ
  english_pob_choice: with a loud voice
  chosen_spanish: con voz fuerte
  alternatives_spanish:
  - en alta voz
  - con gran voz
  lexicon: BDAG
  rationale: La expresión griega es idiomática. «Con voz fuerte» conserva la referencia concreta a la voz y expresa el matiz de intensidad sin sonar artificioso en español.
translation_notes:
  revision_awareness: El texto griego es breve y transparente; la versión española sigue de cerca la estructura original sin añadir contenido interpretativo. Se mantuvo la imaginería militar y la duplicación coordinada del verso.
  spanish_consistency_notes:
  - Se prefirió «trompetas» y «voz fuerte» por claridad y fidelidad idiomática.
  - No se introdujeron términos teológicos específicos porque el versículo no los contiene.
  - La puntuación reproduce dos miembros coordinados unidos por «y», como en el griego.
