id: PHP.2.23
reference: Philippians 2:23
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: τοῦτον μὲν οὖν ἐλπίζω πέμψαι ὡς ἂν ἀφίδω τὰ περὶ ἐμὲ ἐξαυτῆς·
base_translation:
  language: en
  yaml_path: translation/nt/philippians/002/023.yaml
  text: 'Therefore, I hope to send him as soon as I see how things go with me.'
translation:
  language: ko
  text: 그러므로 나는 내 일이 어떻게 되어 가는지[a] 보는 대로 곧 그를 보내기를 바랍니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「나에 관한 일들을 분명히 알게 되는 대로」.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦτον
  english_pob_choice: him
  chosen_korean: 그를
  alternatives_korean:
  - 이 사람을
  lexicon: BDAG
  rationale: 직전 문맥의 디모데를 가리키는 지시 대명사. 한국어로는 「그」가 자연스럽다.
- source_word: μὲν οὖν
  english_pob_choice: Therefore
  chosen_korean: 그러므로
  alternatives_korean:
  - 그러니
  - 따라서
  lexicon: BDAG
  rationale: 추론적 전환의 짝 어휘. 「그러므로」가 한국어 담론 흐름을 자연스럽게 담는다.
- source_word: ἐλπίζω πέμψαι
  english_pob_choice: I hope to send
  chosen_korean: 보내기를 바라다
  alternatives_korean:
  - 보낼 것을 기대하다
  - 보낼 계획이다
  lexicon: BDAG
  rationale: 「바라다」가 ἐλπίζω의 의미를 자연스럽게 담고, 부정사와 결합도 매끄럽다.
- source_word: ὡς ἂν ἀφίδω
  english_pob_choice: as soon as I see
  chosen_korean: 보는 대로
  alternatives_korean:
  - 보게 되는 대로
  - 보게 되면 곧
  lexicon: BDAG
  rationale: 불확정 미래 시간 구문을 한국어 「~는 대로」로 자연스럽게 옮긴다. ἐξαυτῆς(곧)의 신속함과도 호응한다.
- source_word: ἀφίδω
  english_pob_choice: I see
  chosen_korean: 보다
  alternatives_korean:
  - 분별하다
  - 알아보다
  lexicon: BDAG
  rationale: 「보다」가 비유를 보존하면서 한국어로 자연스럽다.
- source_word: τὰ περὶ ἐμέ
  english_pob_choice: how things go with me
  chosen_korean: 내 일이 어떻게 되어 가는지
  alternatives_korean:
  - 나에 관한 일들
  - 내 형편
  lexicon: BDAG
  rationale: 바울의 개인적 처지를 가리킨다. 「내 일이 어떻게 되어 가는지」가 한국어로 자연스럽고 상황적 의미를 보존한다.
- source_word: ἐξαυτῆς
  english_pob_choice: as soon as
  chosen_korean: 곧
  alternatives_korean:
  - 즉시
  - 바로
  lexicon: BDAG
  rationale: 신속함을 강조하는 부사. 한국어 「곧」으로 자연스럽게 통합한다.
