  rationale: Se ajusta la primera cláusula a una forma española más natural y claramente pasiva, manteniendo la agencia divina del original. Se elimina el pronombre explícito «él» para preservar mejor la ambigüedad del sujeto en la segunda cláusula. Se suprime la nota léxica sobre «de», porque no es necesaria para el lector y la nueva redacción ya comunica fielmente el sentido.
