translation:
  language: es
  text: Y al ver las blasfemias que se cometían en Judá y en Jerusalén,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἰδών
  english_pob_choice: seeing
  chosen_spanish: al ver
  alternatives_spanish:
  - viendo
  - cuando vio
  - habiendo visto
  lexicon: BDAG
  rationale: El participio aoristo de ὁράω funciona aquí como acción circunstancial que introduce la reacción narrativa. «Al ver» conserva esa relación sin forzar una temporalidad más pesada que el griego.
- source_word: βλασφημίας
  english_pob_choice: blasphemies
  chosen_spanish: blasfemias
  alternatives_spanish:
  - sacrilegios
  - actos blasfemos
  - profanaciones
  lexicon: BDAG
  rationale: «Blasfemias» reproduce de modo directo la carga religiosa del sustantivo griego y mantiene el peso ofensivo contra Dios y lo sagrado. «Sacrilegios» interpreta más estrechamente el contexto que el término mismo.
- source_word: τὰς γινομένας
  english_pob_choice: being committed
  chosen_spanish: que se cometían
  alternatives_spanish:
  - que se hacían
  - que estaban ocurriendo
  - que se realizaban
  lexicon: BDAG
  rationale: El participio presente medio/pasivo de γίνομαι expresa actos en curso. En español, «se cometían» comunica bien el carácter culpable de las blasfemias y preserva la idea de acción continuada.
- source_word: ἐν Ἰούδᾳ
  english_pob_choice: in Judah
  chosen_spanish: en Judá
  alternatives_spanish:
  - en Judea
  lexicon: BDAG
  rationale: «Judá» sigue de cerca la forma griega Ἰούδα y conserva el valor territorial y étnico propio del libro. «Judea» introduce una denominación más administrativa y posterior.
- source_word: ἐν Ἱερουσαλήμ
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  lexicon: BDAG
  rationale: Nombre propio estándar sin ambigüedad relevante; se mantiene la forma usual en español.
theological_decisions:
- issue: Fuerza religiosa de βλασφημίας en un contexto histórico de profanación
  english_pob_reading: blasphemies
  chosen_spanish_reading: blasfemias
  alternative_spanish_readings:
  - sacrilegios
  - profanaciones
  - actos blasfemos
  rationale: Se conserva la ofensa explícitamente religiosa del griego sin rebajarla a un término genérico. «Blasfemias» es claro en español y mantiene la tensión teológica del pasaje.
  doctrine_reference: 'DOCTRINE.md: primacía del idioma original y preservación del peso teológico del texto'
translation_notes:
  revision_awareness: 'El texto inglés POB dice: “And seeing the blasphemies being committed in Judah and in Jerusalem,”. No hay notas textuales añadidas en el audit trail y la versión española sigue de cerca esa decisión, ajustando solo la sintaxis para sonar natural en español.'
  spanish_consistency_notes:
  - Se mantiene el topónimo «Judá» para reflejar el valor territorial del griego, en línea con la decisión inglesa.
  - Se evita cualquier sustitución por terminología eclesiástica tradicional que atenúe la fuerza de «blasfemias».
  - La frase inicial con gerundio nominalizado («Al ver») conserva la subordinación participial del original sin sobretraducirla.
