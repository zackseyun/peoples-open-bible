translation:
  language: es
  text: Pero el afán por la brevedad en la expresión[a], y el prescindir de un tratamiento elaborado del asunto, deben concedérsele a quien está haciendo un compendio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a quien está haciendo una traducción», si μετάφρασις se toma en su sentido más común; aquí el contexto favorece «compendio» o «epítome».
    reason: lexical_alternative
lexical_decisions:
- source_word: σύντομον
  english_pob_choice: brevity
  chosen_spanish: brevedad
  alternatives_spanish:
  - concisión
  - brevedad concisa
  lexicon: LSJ
  rationale: El adjetivo sustantivado expresa la cualidad de ser breve o conciso. «Brevedad» reproduce bien la idea sin volverla artificial en español.
- source_word: λέξεως
  english_pob_choice: expression
  chosen_spanish: expresión
  alternatives_spanish:
  - redacción
  - dicción
  - expresión verbal
  lexicon: LSJ
  rationale: Aquí λέξις se refiere al modo de formular el texto, no a una sola palabra. «Expresión» mantiene el matiz literario y suena natural en español.
- source_word: μεταδιώκειν
  english_pob_choice: pursuit of
  chosen_spanish: afán por
  alternatives_spanish:
  - búsqueda de
  - afán de
  - persecución de
  lexicon: LSJ
  rationale: El infinitivo expresa el objetivo que se persigue. «Afán por» conserva la idea de empeño orientado a algo y evita una construcción demasiado literal y pesada.
- source_word: ἐξεργαστικὸν
  english_pob_choice: elaborate treatment
  chosen_spanish: tratamiento elaborado
  alternatives_spanish:
  - tratamiento detallado
  - elaboración minuciosa
  - desarrollo exhaustivo
  lexicon: LSJ
  rationale: El adjetivo describe algo trabajado en detalle. «Tratamiento elaborado» refleja bien el contraste con la brevedad.
- source_word: πραγματίας
  english_pob_choice: the subject
  chosen_spanish: el asunto
  alternatives_spanish:
  - la materia
  - el tema
  - el contenido
  lexicon: LSJ
  rationale: πραγματεία aquí apunta al material tratado. «Asunto» es claro, amplio y fiel al contexto prologal.
- source_word: παραιτεῖσθαι
  english_pob_choice: the refusal of
  chosen_spanish: dejar de lado
  alternatives_spanish:
  - renunciar a
  - prescindir de
  - descartar
  lexicon: LSJ
  rationale: El medio infinitivo indica evitar o omitir algo deliberadamente. «Dejar de lado» conserva esa renuncia sin sonar rígido.
- source_word: τῷ τὴν μετάφρασιν ποιουμένῳ
  english_pob_choice: to one who is making an abridgment
  chosen_spanish: a quien está haciendo un compendio
  alternatives_spanish:
  - a quien está haciendo un resumen
  - al que compone un epítome
  - a quien realiza una abreviación
  lexicon: LSJ
  rationale: En este contexto, μετάφρασις se entiende mejor como una versión abreviada o epitomada, no como traducción lingüística. «Compendio» comunica bien la idea de condensación literaria.
- source_word: συγχωρητέον
  english_pob_choice: should be allowed
  chosen_spanish: debe concedérsele
  alternatives_spanish:
  - debe permitírsele
  - conviene concedérselo
  - debe admitírsele
  lexicon: LSJ
  rationale: El adjetivo verbal expresa una obligación impersonal de conceder algo. «Debe concedérsele» preserva el tono normativo y el destinatario implícito.
theological_decisions:
- issue: Sentido de μετάφρασις en el prólogo de 2 Macabeos
  english_pob_reading: abridgment/epitome rather than linguistic translation
  chosen_spanish_reading: compendio/versión abreviada más que traducción lingüística
  alternative_spanish_readings:
  - traducción
  - traslado
  - interpretación
  rationale: El contexto literario del prólogo habla de condensar una obra mayor. Por eso conviene evitar «traducción» en el sentido moderno, aunque el término griego pueda tener esa acepción en otros contextos.
  doctrine_reference: Prioridad del contexto original sobre el uso posterior; mantener el sentido llano del texto fuente.
translation_notes:
  revision_awareness: No se requieren revisiones textuales en esta unidad; el punto principal es mantener la ambigüedad documentada de μετάφρασις y reflejarla en español con una opción contextual de «compendio».
  spanish_consistency_notes:
  - Se conservó un registro sobrio y literario, adecuado para una nota prologal.
  - Se evitó «SEÑOR» y otras convenciones no pertinentes, porque este versículo no contiene el nombre divino.
  - «Compendio» se usó como equivalente contextual de una obra abreviada, en línea con el audit trail inglés.
