translation:
  language: es
  text: Israel ha sido tragado[a]; ahora están entre las naciones como una vasija en la que no hay deleite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «como una vasija que nadie desea».'
    reason: lexical_alternative
lexical_decisions:
- source_word: נִבְלַע
  english_pob_choice: is swallowed up
  chosen_spanish: ha sido tragado
  alternatives_spanish:
  - está tragado
  - ha sido engullido
  - está consumido
  lexicon: HALOT
  rationale: El nifal de בלע expresa ser tragado/engullido. En español, «ha sido tragado» conserva la pasiva y la imagen concreta. Se evita «consumido» porque diluye la metáfora física.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - el pueblo de Israel
  - Israel (el reino del norte)
  lexicon: Nombre propio / referencia histórica
  rationale: Se mantiene el nombre propio tal como en el hebreo y en el audit trail inglés, sin añadir explicación intratextual que el verso no exige.
- source_word: עַתָּה
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - ya
  - en este momento
  lexicon: HALOT
  rationale: Adverbio temporal directo que marca la consecuencia presente del juicio anunciado.
- source_word: הָיוּ
  english_pob_choice: they are
  chosen_spanish: están
  alternatives_spanish:
  - son
  - han quedado
  lexicon: HALOT
  rationale: Aunque el hebreo es perfecto plural, con עַתָּה expresa un estado resultante; «están» funciona naturalmente en español y evita forzar un tiempo compuesto innecesario.
- source_word: בַגּוֹיִם
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los pueblos
  - en medio de las naciones
  lexicon: HALOT
  rationale: «Entre las naciones» reproduce la relación locativa/colectiva del hebreo y es la opción más neutra en español para גוים en este contexto profético.
- source_word: כִּכְלִי
  english_pob_choice: like a vessel
  chosen_spanish: como un vaso
  alternatives_spanish:
  - como un recipiente
  - como un utensilio
  - como un vaso
  lexicon: HALOT
  rationale: כְּלִי puede abarcar vasija, utensilio o recipiente. «Vaso» es una solución española natural y bíblicamente inteligible para conservar la metáfora sin sonar técnica.
- source_word: אֵין חֵפֶץ בּוֹ
  english_pob_choice: in which there is no delight
  chosen_spanish: en el que no hay deleite
  alternatives_spanish:
  - que nadie desea
  - en el que no se halla agrado
  - que no es deseado
  lexicon: HALOT
  rationale: La frase indica ausencia de agrado/deseo respecto del vaso. «No hay deleite» mantiene la noción de חֵפֶץ y la forma relacional del hebreo. Se preserva la tensión entre «deleite» y «deseo» mediante la nota textual.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo: pasiva de נִבְלַע, estado resultante con הָיוּ + עַתָּה, y metáfora de כְּלִי con la cláusula negativa de חֵפֶץ. Se tomó en cuenta la revisión inglesa que prefirió «they are among the nations» para una expresión más natural; por eso en español se usa «están entre las naciones».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponda, pero este versículo no contiene el nombre divino.
  - Se evita «gentiles» porque el hebreo dice גוים y el contexto profético apunta a naciones extranjeras sin carga técnica posterior.
  - «Vaso» funciona aquí como equivalente natural de כְּלִי y conserva la imagen; la nota ofrece la alternativa «que nadie desea» para transparentar la ambigüedad léxica de חֵפֶץ.
