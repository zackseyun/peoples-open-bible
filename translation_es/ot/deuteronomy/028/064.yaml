translation:
  language: es
  text: Y Yahvé te dispersará entre todos los pueblos, desde un extremo de la tierra[a] hasta el otro extremo de la tierra, y allí servirás a otros dioses, que ni tú ni tus padres han conocido[b]—madera y piedra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desde un extremo del país hasta el otro extremo del país». Hebreo אֶרֶץ puede significar «tierra» o «país/territorio»; aquí se prefiere «tierra» porque el contexto habla de dispersión entre todos los pueblos.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «madera y piedra», en referencia a ídolos hechos de estos materiales.
    reason: cultural_note
lexical_decisions:
- source_word: וֶהֱפִיצְךָ
  english_pob_choice: will scatter you
  chosen_spanish: te dispersará
  alternatives_spanish:
  - te esparcirá
  - te repartirá
  lexicon: HALOT
  rationale: El hiphil de פוץ expresa la acción de dispersar a alguien. «Dispersará» conserva la fuerza del verbo sin sonar forzado en español, y encaja bien en un contexto de maldición pactal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se traduce con el nombre propio divino «Yahvé», preservando el nombre del pacto en lugar de sustituirlo por un título.
- source_word: בְּכָל הָעַמִּים
  english_pob_choice: among all the peoples
  chosen_spanish: entre todos los pueblos
  alternatives_spanish:
  - entre todas las naciones
  lexicon: HALOT
  rationale: «Pueblos» refleja mejor עַמִּים que «naciones», y «entre» comunica de forma natural la idea de dispersión en medio de ellos.
- source_word: מִקְצֵה הָאָרֶץ וְעַד קְצֵה הָאָרֶץ
  english_pob_choice: from one end of the earth to the other end of the earth
  chosen_spanish: desde un extremo de la tierra hasta el otro extremo de la tierra
  alternatives_spanish:
  - desde un extremo de la tierra al otro
  - desde un extremo del país hasta el otro
  lexicon: HALOT
  rationale: La repetición hebrea se mantiene en español para conservar el alcance total del giro. «Tierra» sigue la preferencia contextual por el sentido global, dado que el versículo habla de dispersión entre todos los pueblos.
- source_word: וְעָבַדְתָּ
  english_pob_choice: you will serve
  chosen_spanish: servirás
  alternatives_spanish:
  - admirarás
  - adorarás
  lexicon: HALOT
  rationale: עבד con objetos divinos conserva la idea de servicio leal/culto. «Servirás» mantiene el verbo sin sobretraducirlo a «adorar», dejando que el contexto idólatra lo determine.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  lexicon: HALOT
  rationale: Adverbio locativo simple que refiere al lugar del exilio.
- source_word: אֱלֹהִים אֲחֵרִים
  english_pob_choice: other gods
  chosen_spanish: otros dioses
  alternatives_spanish:
  - dioses ajenos
  - dioses extranjeros
  lexicon: HALOT
  rationale: La fórmula de pacto se conserva de manera directa con «otros dioses», sin introducir matices no explicitados por el hebreo.
- source_word: אֲשֶׁר לֹא יָדַעְתָּ אַתָּה וַאֲבֹתֶיךָ
  english_pob_choice: that neither you nor your fathers have known
  chosen_spanish: que ni tú ni tus padres han conocido
  alternatives_spanish:
  - que ni tú ni tus padres conocisteis
  - que tú y tus padres no han conocido
  lexicon: HALOT
  rationale: «Han conocido» preserva ידע como experiencia/conocimiento relacional y mantiene el paralelismo con el inglés auditado, sin forzar una perífrasis más explicativa.
- source_word: עֵץ וָאָבֶן
  english_pob_choice: wood and stone
  chosen_spanish: madera y piedra
  alternatives_spanish:
  - de madera y piedra
  - leño y piedra
  lexicon: HALOT
  rationale: Se traduce la apposición material de forma concisa. «Madera y piedra» comunica la materia de los ídolos de manera natural en español, como en el POB inglés.
theological_decisions:
- issue: Uso del nombre divino en español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El versículo nombra explícitamente a יְהוָה; la política del proyecto pide preservarlo como nombre propio divino, y «Yahvé» es la forma española adoptada para ello.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de הָאָרֶץ en la fórmula de dispersión
  english_pob_reading: earth
  chosen_spanish_reading: la tierra
  alternative_spanish_readings:
  - el país
  - la tierra habitada
  rationale: El contexto inmediato habla de ser dispersado entre todos los pueblos, por lo que «la tierra» mantiene la amplitud geográfica del original sin restringirlo a una sola región.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, original-language primacy
- issue: Relación entre «otros dioses» y «madera y piedra»
  english_pob_reading: wood and stone
  chosen_spanish_reading: madera y piedra
  alternative_spanish_readings:
  - ídolos de madera y piedra
  - hechos de madera y piedra
  rationale: El hebreo presenta una apposición que identifica la naturaleza material de esos dioses. Se conserva la dureza de la expresión sin explicitar «ídolos», aunque la referencia idolátrica es clara por el contexto.
  doctrine_reference: DOCTRINE.md Translation philosophy §2, lexical restraint
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente no introdujo cambios; la lectura auditada permanece estable. La redacción española sigue esa estabilidad y conserva las decisiones clave: nombre divino como Yahvé, alcance geográfico amplio de אֶרֶץ y cierre material «madera y piedra» sin añadir glosa interpretativa al texto principal.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה conforme a la terminología del proyecto.
  - Se prefirió «pueblos» para עַמִּים y «tierra» para אֶרֶץ en el sentido global contextual.
  - 'Se conservó la estructura acumulativa del hebreo con dos miembros paralelos: dispersión geográfica y servicio idólatra.'
  - «Madera y piedra» funciona como remate breve y contundente; la nota aclara la referencia a ídolos sin sustituir el texto principal.
