translation:
  language: es
  text: Habitarán en cabañas[a] durante siete días; todo nativo de Israel habitará en cabañas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en chozas» o «en refugios temporales»; el hebreo סֻכּוֹת se refiere a alojamientos festivos temporales.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּסֻּכֹּת
  english_pob_choice: in booths
  chosen_spanish: en enramadas
  alternatives_spanish:
  - en chozas
  - en cabañas
  - en refugios temporales
  lexicon: HALOT
  rationale: סֻכּוֹת designa alojamientos temporales para la fiesta. En español, «enramadas» comunica una estructura festiva y temporal sin sonar tan arcaico como «tabernáculos» ni tan genérico como «refugios». Mantiene la imagen concreta del hebreo.
- source_word: תֵּשְׁבוּ
  english_pob_choice: you shall dwell
  chosen_spanish: vivirán
  alternatives_spanish:
  - morarán
  - habitarán
  - dwell
  lexicon: HALOT
  rationale: El verbo ישׁב en contexto de habitación expresa residencia. «Vivirán» comunica de forma natural la permanencia durante la fiesta; se evita una calca poco natural como «morarán» y se conserva el sentido de habitar.
- source_word: שִׁבְעַת יָמִים
  english_pob_choice: for seven days
  chosen_spanish: durante siete días
  alternatives_spanish:
  - por siete días
  - siete días
  lexicon: HALOT
  rationale: El valor temporal en español se expresa mejor con «durante». La duración prescrita queda clara y fiel al acusativo temporal hebreo.
- source_word: כָּל הָאֶזְרָח
  english_pob_choice: every native-born person
  chosen_spanish: todo nacido
  alternatives_spanish:
  - todo nativo
  - todo ciudadano
  - cada nacido en la tierra
  lexicon: HALOT
  rationale: אֶזְרָח señala al miembro nativo de la comunidad frente al forastero. «Todo nacido» preserva el alcance inclusivo y evita introducir categorías políticas modernas como «ciudadano». El contexto de Israel completa la referencia.
- source_word: בְּיִשְׂרָאֵל
  english_pob_choice: in Israel
  chosen_spanish: en Israel
  alternatives_spanish:
  - entre Israel
  - dentro de Israel
  lexicon: HALOT
  rationale: La preposición y el nombre propio se rinden de manera directa y transparente. «En Israel» delimita al pueblo del pacto destinatario del mandamiento.
- source_word: יֵשְׁבוּ
  english_pob_choice: shall dwell
  chosen_spanish: vivirá
  alternatives_spanish:
  - habitará
  - morará
  - dwell
  lexicon: HALOT
  rationale: Se mantiene la misma idea de residencia que en la primera cláusula para conservar la repetición enfática del hebreo. Aunque el plural hebreo puede tener valor distributivo, en español la formulación singular colectiva «todo nacido» pide concordancia en singular.
theological_decisions:
- issue: Alcance inclusivo de הָאֶזְרָח frente a una lectura masculinizada
  english_pob_reading: every native-born person
  chosen_spanish_reading: todo nacido
  alternative_spanish_readings:
  - todo varón nativo
  - todo nativo
  rationale: El sustantivo hebreo es masculino singular, pero con fuerza representativa. «Todo nacido» preserva la inclusión del grupo sin restringirlo innecesariamente a varones ni introducir un tecnicismo ajeno al texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy, punto 4
- issue: Término para las estructuras festivas temporales
  english_pob_reading: booths
  chosen_spanish_reading: enramadas
  alternative_spanish_readings:
  - chozas
  - cabañas
  - sucot
  rationale: La fiesta exige una referencia concreta a alojamientos temporales. «Enramadas» es comprensible para lectores de español y mantiene la materialidad festiva del mandamiento. Se evita «tabernáculos» por su carga eclesiástica tradicional y por sonar menos transparente para el lector moderno.
  doctrine_reference: DOCTRINE.md §Translation philosophy, punto 2
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo y toma en cuenta el audit trail inglés: se conserva la repetición de la idea de habitar/dwelling en ambas cláusulas y la nota léxica sobre סֻכּוֹת como alojamiento temporal festivo. También se mantiene la lectura inclusiva de הָאֶזְרָח sin convertirla en una categoría política moderna.'
  spanish_consistency_notes:
  - Se usó «enramadas» para mantener una solución consistente y publicable en español donde el inglés optó por «booths».
  - Se preservó la repetición semántica de ישׁב con un solo verbo de residencia para ambas cláusulas.
  - La concordancia singular en español se ajusta a la construcción colectiva «todo nacido» y no altera el sentido distributivo del hebreo.
