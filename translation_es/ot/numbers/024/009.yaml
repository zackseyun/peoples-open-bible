revisions:
- from: Se encogió[a], se acostó como un león, y como una leona—¿quién lo despertará? Los que te bendicen son benditos[b], y los que te maldicen son malditos.
  to: Se agazapó, se acostó como un león, y como una leona[a]—¿quién lo despertará? Los que te bendicen son bendecidos[b], y los que te maldicen son malditos.
  rationale: Se ajusta כָּרַע a 'se agazapó' para una imagen animal más natural y precisa; se cambia 'son benditos' por 'son bendecidos' para mejor español contemporáneo sin perder el sentido; y se corrige la ubicación de las notas para que el eco intertextual quede anclado a la fórmula final y la alternativa léxica a 'leona'.
