translation:
  language: es
  text: El jefe fue Ahiezer, luego Joás, los hijos de Semaá el gabaatita; y Jeziel[a] y Pelet, los hijos de Azmavet; y Beracá[b] y Jehu el anatotita.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El nombre hebreo ויזואל también puede transliterarse «Iziel».
    reason: lexical_alternative
  - marker: b
    text: El nombre «Beracá» también suele escribirse «Berakah» en transliteración inglesa.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרֹאשׁ
  english_pob_choice: The chief was
  chosen_spanish: El jefe fue
  alternatives_spanish:
  - El cabeza fue
  - El líder fue
  lexicon: HALOT
  rationale: En este contexto de lista genealógica y militar, רֹאשׁ indica al personaje principal o jefe, no una cabeza literal. «Jefe» comunica la función de liderazgo con naturalidad en español.
- source_word: אֲחִיעֶזֶר
  english_pob_choice: Ahiezer
  chosen_spanish: Ahiezer
  alternatives_spanish:
  - Ahiézer
  lexicon: Transliteración convencional
  rationale: Es nombre propio; se conserva en transliteración estable, sin forzar una adaptación que altere el reconocimiento del nombre.
- source_word: וְיוֹאָשׁ
  english_pob_choice: then Joash
  chosen_spanish: luego Joás
  alternatives_spanish:
  - y Joás
  lexicon: Transliteración convencional
  rationale: El hebreo usa simple conjunción, pero en una lista de nombres el español se beneficia de una secuencia clara. «Luego» mantiene la progresión narrativa sin añadir contenido ajeno.
- source_word: בְּנֵי הַשְּׁמָעָה
  english_pob_choice: the sons of Shemaah
  chosen_spanish: los hijos de Semaá
  alternatives_spanish:
  - los hijos de Shemaah
  - los hijos de Hasemaá
  lexicon: HALOT / nombre propio
  rationale: Se conserva la construcción genealógica literal «los hijos de» y se translitera el nombre con una forma española transparente. Se evita convertirlo en un topónimo o en una glosa interpretativa.
- source_word: הַגִּבְעָתִי
  english_pob_choice: the Gibeathite
  chosen_spanish: el gabaatita
  alternatives_spanish:
  - el de Gibeá
  - el gibeatita
  lexicon: HALOT
  rationale: El adjetivo gentilicio indica procedencia de Gibeá. «Gabaatita» preserva esa fuerza gentilicia con una forma castellana comprensible y cercana al patrón bíblico.
- source_word: ויזואל
  english_pob_choice: Jeziel
  chosen_spanish: Jeziel
  alternatives_spanish:
  - Iziel
  lexicon: Transliteración convencional
  rationale: Se adopta la transliteración usual en español bíblico, manteniendo la identificación del nombre propio; la variante con I se conserva como alternativa reconocida.
- source_word: וָפֶלֶט
  english_pob_choice: and Pelet
  chosen_spanish: y Pelet
  alternatives_spanish:
  - y Pelet
  lexicon: Transliteración convencional
  rationale: Nombre propio transliterado de manera directa. No hay razón para expandir semánticamente el nombre en el texto principal.
- source_word: בְּנֵי עַזְמָוֶת
  english_pob_choice: the sons of Azmaveth
  chosen_spanish: los hijos de Azmavet
  alternatives_spanish:
  - los hijos de Azmaveth
  lexicon: HALOT / nombre propio
  rationale: Se mantiene la genealogía literal y una transliteración española coherente. La forma sin h final facilita la lectura en español sin perder la identidad del nombre.
- source_word: וּבְרָכָה
  english_pob_choice: and Beracah
  chosen_spanish: y Beracá
  alternatives_spanish:
  - y Berakah
  - y Beracah
  lexicon: Transliteración convencional
  rationale: Se conserva el nombre propio con acento gráfico español. La variante Berakah queda implícitamente disponible como forma alternativa tradicional en transliteración inglesa.
- source_word: וְיֵהוּא
  english_pob_choice: and Jehu
  chosen_spanish: y Jehu
  alternatives_spanish:
  - y Jehú
  lexicon: Transliteración convencional
  rationale: Se mantiene el nombre propio en una forma ampliamente reconocible en contexto bíblico. La opción con acento puede usarse en otras tradiciones, pero aquí se preserva la forma más estable del conjunto.
- source_word: הָעֲנְּתֹתִי
  english_pob_choice: the Anathothite
  chosen_spanish: el anatotita
  alternatives_spanish:
  - el de Anatot
  - el anathotita
  lexicon: HALOT
  rationale: El gentilicio indica procedencia de Anatot. «Anatotita» conserva el valor gentilicio de forma compacta y transparente, en paralelo con el patrón del versículo.
translation_notes:
  revision_awareness: El texto sigue de cerca el consenso alto del audit trail inglés, sin revisiones aplicadas en la fuente. Se conservan la estructura nominal, los gentilicios y las alternativas transliteradas documentadas para Ahiezer/Jeziel/Beracá.
  spanish_consistency_notes:
  - Se mantiene «hijos de» para la construcción genealógica בְּנֵי.
  - Los gentilicios se uniforman con sufijo español -ita/-atita donde corresponde a procedencia.
  - Los nombres propios se transliteran con criterios consistentes y sin castellanizaciones no documentadas.
  - Se evita sustituir el valor de רֹאשׁ por una glosa demasiado literal como «cabeza».
