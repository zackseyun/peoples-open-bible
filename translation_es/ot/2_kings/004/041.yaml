  yaml_path: translation/ot/2_kings/004/041.yaml
  text: Then he said[a], “Bring some flour.” And he threw it into the pot and said, “Pour it out for the people[b], so that they may eat.” And there was nothing harmful in the pot.
  footnotes:
  - marker: a
    text: Or “Pour it out for the people.” The Hebrew verb is more literally “pour,” but here it refers to serving the prepared food.
    reason: lexical_alternative
  - marker: b
    text: Literally, “there was not a bad/evil thing in the pot,” meaning the stew was no longer harmful.
    reason: lexical_alternative
