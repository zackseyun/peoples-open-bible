base_translation:
  language: en
  yaml_path: translation/ot/2_kings/004/013.yaml
  text: And he said to him[a], “Please say to her, ‘Look, you have taken all this trouble for us. What is to be done for you? Is there anything to be spoken for you to the king or to the commander of the army?’” And she said[c][b], “I am living among my own people.”
  footnotes:
  - marker: a
    text: Or, more literally, “you have trembled/been anxious for us with all this anxiety,” an idiom here meaning she has shown great care and gone to much trouble for them.
    reason: lexical_alternative
  - marker: b
    text: Or, “Is there anything to say on your behalf to the king or to the commander of the army?”
    reason: lexical_alternative
  - marker: c
    text: “I am living among my own people” likely means she is settled securely within her community and does not seek special favor from royal or military authorities.
    reason: cultural_note
