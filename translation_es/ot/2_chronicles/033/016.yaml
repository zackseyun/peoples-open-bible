translation:
  language: es
  text: Entonces restauró el altar de Yahvé y ofreció sobre él sacrificios de paz[a] y de acción de gracias[b], y dijo a Judá que sirviera[c] a Yahvé, el Dios de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ofrendas de paz»; alternativamente, algunos traducen «ofrendas de comunión».
    reason: lexical_alternative
  - marker: b
    text: Hebreo «agradecimiento»; en este contexto sacrificial, es decir, una ofrenda de agradecimiento o acción de gracias.
    reason: lexical_alternative
  - marker: c
    text: El hebreo dice «servir», término más amplio que «adorar» y que conserva el matiz de lealtad y servicio al Dios del pacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ו/יכן
  english_pob_choice: restored
  chosen_spanish: restauró
  alternatives_spanish:
  - preparó
  - estableció
  - puso en orden
  lexicon: HALOT
  rationale: El Hiphil de כון aquí expresa dejar el altar nuevamente en su condición debida tras su profanación o deterioro. «Restauró» comunica bien ese sentido contextual en español, mejor que una opción más literal pero menos precisa.
- source_word: מִזְבַּח יְהוָה
  english_pob_choice: the altar of Yahweh
  chosen_spanish: el altar de Yahvé
  alternatives_spanish:
  - el altar de Yahvé
  - el altar de Yahvé, el altar de Yahvé
  lexicon: HALOT
  rationale: Se mantiene la posesión nominal en una forma natural en español. Se usa «Yahvé» como equivalente del nombre divino לפי la convención del proyecto, sin sustituirlo por una máscara como «SEÑOR».
- source_word: וַ/יִּזְבַּח עָלָיו
  english_pob_choice: and sacrificed on it
  chosen_spanish: y sobre él ofreció sacrificios
  alternatives_spanish:
  - y sacrificó sobre él
  - y ofreció sacrificios sobre él
  lexicon: HALOT
  rationale: זבח se expresa con el verbo sacrificial en español. «Sobre él» preserva el referente del altar, y el orden se adapta a una sintaxis más natural sin perder la relación espacial.
- source_word: זִבְחֵי שְׁלָמִים
  english_pob_choice: sacrifices of peace offerings
  chosen_spanish: sacrificios de ofrendas de paz
  alternatives_spanish:
  - sacrificios de ofrendas de comunión
  - ofrendas de paz
  - sacrificios de paz
  lexicon: HALOT
  rationale: El hebreo usa tanto el sustantivo general «sacrificios» como la categoría específica שְׁלָמִים. «Ofrendas de paz» conserva la tradición semántica del término sin imponer una interpretación más libre como «comunión».
- source_word: וְ/תוֹדָה
  english_pob_choice: and thanksgiving
  chosen_spanish: y de agradecimiento
  alternatives_spanish:
  - y de acción de gracias
  - y de gratitud
  - y de agradecimiento sacrificial
  lexicon: HALOT
  rationale: תוֹדָה puede referirse a agradecimiento/acción de gracias en contexto sacrificial. «De agradecimiento» suena natural en español y mantiene la relación con el grupo de ofrendas sin convertirlo en una paráfrasis litúrgica más amplia.
- source_word: וַ/יֹּאמֶר לִ/יהוּדָה
  english_pob_choice: and he told Judah
  chosen_spanish: y dijo a Judá
  alternatives_spanish:
  - y habló a Judá
  - y mandó a Judá
  lexicon: HALOT
  rationale: El hebreo dice literalmente «y dijo a Judá». En español, «dijo a Judá» conserva esa forma básica sin añadir la fuerza de un mandato explícito que el verbo por sí solo no exige.
- source_word: לַ/עֲבֹד
  english_pob_choice: to serve
  chosen_spanish: que sirviera
  alternatives_spanish:
  - para servir
  - para que sirviera
  - que adorara
  lexicon: HALOT
  rationale: עבד en relación con Dios tiene un alcance más amplio que «adorar». «Sirviera» conserva el sentido de servicio leal/covenantal y encaja bien con la construcción de discurso indirecto en español.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - Dios de Israel
  - el Dios de Israel
  lexicon: HALOT
  rationale: Se conserva la construcción de relación típica del hebreo, con el artículo para claridad y solemnidad. La frase identifica a Yahvé por su vínculo pactual con Israel.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Se sigue la pauta del proyecto de traducirlo como «Yahvé», preservando el nombre de pacto sin la convención de sustitución por «SEÑOR»; «Jehová» se evita por su menor adecuación filológica en español actual.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de תוֹדָה en contexto sacrificial
  english_pob_reading: thanksgiving
  chosen_spanish_reading: de agradecimiento
  alternative_spanish_readings:
  - de acción de gracias
  - ofrenda de agradecimiento
  - agradecimiento
  rationale: En este versículo תוֹדָה funciona dentro de una secuencia de sacrificios. «De agradecimiento» mantiene el valor básico de la raíz y deja abierta la referencia a una ofrenda de gratitud sin forzar una expansión interpretativa.
  doctrine_reference: HALOT; contexto sacrificial de 2 Crónicas 33:16
- issue: לַעֲבֹד aplicado al pueblo
  english_pob_reading: to serve
  chosen_spanish_reading: que sirviera
  alternative_spanish_readings:
  - que adorara
  - que obedeciera
  - para servir
  rationale: La raíz עבד en contexto bíblico no debe reducirse automáticamente a «adorar», pues incluye servicio/lealtad al Dios del pacto. «Sirviera» conserva esa amplitud sin perder inteligibilidad en español.
  doctrine_reference: Uso léxico de עבד en relación con Dios
translation_notes:
  revision_awareness: 'El pasaje presenta alta concordancia con el análisis de la fuente y la auditoría inglesa; no se requieren revisiones sustanciales. Se preservan las dos tensiones léxicas principales: שְׁלָמִים como ofrendas de paz/ofrendas de comunión y תוֹדָה como agradecimiento/acción de gracias dentro del lenguaje sacrificial.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma uniforme para יְהוָה.
  - Se usa «Dios» para אֱלֹהֵי, evitando pluralizaciones innecesarias.
  - «Sirviera» conserva el campo semántico de עבד sin reemplazarlo por «adorara».
  - La sintaxis es fluida en español moderno, pero sigue de cerca la estructura hebrea del versículo.
