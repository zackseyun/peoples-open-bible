translation:
  language: es
  text: Pues él mismo expulsó a los que estaban formados para la batalla en la ciudad santa a Persia[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego παρατασσομένους es un término militar; literalmente alude a los que están dispuestos o formados para la batalla. Otra posible traducción es «los que estaban puestos en orden de batalla».
    reason: lexical_alternative
  - marker: b
    text: El pasaje griego es difícil en su contexto y puede reflejar un problema textual o de transmisión; esta traducción se mantiene cerca de la formulación griega conservada.
    reason: textual_variant
lexical_decisions:
- source_word: αὐτὸς
  english_pob_choice: he himself
  chosen_spanish: él mismo
  alternatives_spanish:
  - él
  lexicon: LSJ
  rationale: El griego usa un pronombre enfático; «él mismo» conserva ese énfasis mejor que un simple «él».
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: pues
  alternatives_spanish:
  - porque
  - ya que
  lexicon: LSJ
  rationale: Aquí introduce una explicación o apoyo a lo anterior; «pues» suena natural en español y preserva la función causal/explanatoria.
- source_word: ἐξέβρασεν
  english_pob_choice: drove out
  chosen_spanish: expulsó
  alternatives_spanish:
  - echó fuera
  - desterró
  lexicon: LSJ
  rationale: El verbo expresa una salida forzada. «Expulsó» comunica bien la acción en español sin suavizarla en exceso.
- source_word: τοὺς παρατασσομένους
  english_pob_choice: those arrayed in battle
  chosen_spanish: los que estaban alineados para la batalla
  alternatives_spanish:
  - los que estaban dispuestos en orden de batalla
  - los que estaban formados para el combate
  lexicon: LSJ
  rationale: El participio es militar y alude a tropas puestas en orden de batalla. «Alineados para la batalla» mantiene ese matiz sin forzar una lectura demasiado técnica en español.
- source_word: ἐν τῇ ἁγίᾳ πόλει
  english_pob_choice: in the holy city
  chosen_spanish: en la ciudad santa
  alternatives_spanish:
  - dentro de la ciudad santa
  lexicon: LSJ
  rationale: La frase descriptiva se traduce de forma directa; el texto griego no nombra Jerusalén, por lo que conviene conservar la designación «ciudad santa».
- source_word: εἰς τὴν Περσίδα
  english_pob_choice: into Persia
  chosen_spanish: hacia Persia
  alternatives_spanish:
  - a Persia
  - en Persia
  lexicon: LSJ
  rationale: La preposición indica movimiento hacia un lugar. En español, «hacia Persia» preserva la dirección del desplazamiento sin sonar rígido.
translation_notes:
  revision_awareness: Se sigue la última revisión inglesa que prefirió una formulación más natural («arrayed in battle») sin perder el sentido militar de παρατασσομένους, y se mantiene la cautela del aparato respecto a una posible dificultad textual o de transmisión.
  spanish_consistency_notes:
  - Se conserva «ciudad santa» en vez de explicitar «Jerusalén», siguiendo la designación descriptiva del griego.
  - «Expulsó» mantiene la fuerza del verbo griego sin introducir una atenuación interpretativa.
  - El movimiento final se expresa con una dirección («hacia») para reflejar εἰς en un contexto de desplazamiento.
