translation:
  language: es
  text: Abatió a todo primogénito en Egipto[a], las primicias de su vigor en las tiendas de Cam.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el primer producto de su fuerza»; el hebreo usa un modismo que se refiere al primer fruto de la fuerza generativa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּךְ
  english_pob_choice: He struck down
  chosen_spanish: Él hirió
  alternatives_spanish:
  - Él golpeó
  - Él mató
  lexicon: HALOT
  rationale: נכה puede expresar golpear, herir o abatir. En este contexto de la plaga de los primogénitos, «hirió» mantiene la fuerza letal sin añadir un verbo más interpretativo como «mató». Se evita también un calco rígido de «struck down».
- source_word: כָּל בְּכוֹר
  english_pob_choice: every firstborn
  chosen_spanish: a todo primogénito
  alternatives_spanish:
  - a todos los primogénitos
  - a cada primogénito
  lexicon: HALOT
  rationale: El hebreo tiene valor distributivo y totalizador. «A todo primogénito» preserva ese alcance en español natural, con el objeto directo explícito que requiere el verbo en esta construcción.
- source_word: בְּמִצְרַיִם
  english_pob_choice: in Egypt
  chosen_spanish: en Egipto
  alternatives_spanish:
  - entre los egipcios
  lexicon: HALOT
  rationale: La preposición ב indica localización; «en Egipto» sigue de cerca el sentido geográfico y conserva la referencia directa al escenario de la plaga.
- source_word: רֵאשִׁית אֹנִים
  english_pob_choice: the firstfruits of their vigor
  chosen_spanish: las primicias de su vigor
  alternatives_spanish:
  - el primer fruto de su fuerza
  - las primicias de su fuerza
  - el primer brote de su virilidad
  lexicon: HALOT
  rationale: El giro hebreo es un modismo para el primer producto de la fuerza generativa. «Primicias» conserva la idea de primer producto/ofrenda inicial, y «vigor» reproduce el campo semántico de אֹנִים sin forzar una paráfrasis sexual demasiado explícita.
- source_word: בְּאָהֳלֵי חָם
  english_pob_choice: in the tents of Ham
  chosen_spanish: en las tiendas de Cam
  alternatives_spanish:
  - en los campamentos de Cam
  - en las moradas de Cam
  lexicon: HALOT
  rationale: Se conserva el nombre propio bíblico «Cam» para mantener la imaginería poética y la alusión genealógica. «Tiendas» traduce el plural poético de אָהֳלֵי sin sustituirlo por un término más interpretativo como «moradas».
theological_decisions:
- issue: Designación poética de Egipto mediante Ham/Cam
  english_pob_reading: Retain 'Ham' in the main text rather than interpretively replacing it with 'Egyptians' or 'Egypt.'
  chosen_spanish_reading: Mantener «Cam» en el texto principal, no reemplazarlo por una glosa interpretativa como «Egipto» o «los egipcios» en la segunda cola.
  alternative_spanish_readings:
  - en las moradas de Egipto
  - entre los egipcios
  rationale: La primera cola ya nombra Egipto; la segunda añade una designación poética y genealógica. Conservar «Cam» respeta esa intensificación literaria y evita borrar el vínculo textual con la tradición de Ham/Cam.
  doctrine_reference: Principio de primacía del texto original y de preservación de los nombres propios con carga poética y genealógica.
translation_notes:
  revision_awareness: 'Coincido con el estado de alta concordancia del audit trail inglés: no se requieren revisiones sustantivas. La única tensión léxica relevante es רֵאשִׁית אֹנִים, que en español se resuelve con una expresión idiomática que conserve tanto la idea de primacía como la de vigor generativo.'
  spanish_consistency_notes:
  - Se usa «Cam» de forma consistente para חָם, siguiendo la transliteración bíblica usual en español y manteniendo la alusión genealógica.
  - «Primicias» se emplea en sentido idiomático, no cultual, para reflejar el paralelo con firstfruits en el audit trail inglés.
  - El verbo «hirió» conserva el peso de juicio divino sin añadir información no explícita en el hebreo.
