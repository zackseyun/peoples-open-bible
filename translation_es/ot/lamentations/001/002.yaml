translation:
  language: es
  text: Llora amargamente en la noche, con sus lágrimas sobre sus mejillas; entre todos sus amantes[a] no tiene quien la consuele. Todos sus compañeros han actuado traidoramente contra ella[b]; se han vuelto sus enemigos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entre todos sus aliados». El hebreo «amantes» conserva la personificación poética de la ciudad como mujer y también puede insinuar vínculos políticos.
    reason: lexical_alternative
  - marker: b
    text: O «todos sus amigos» o «todos sus aliados».
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּכוֹ תִבְכֶּה
  english_pob_choice: she weeps bitterly
  chosen_spanish: llora amargamente
  alternatives_spanish:
  - llora con amargura
  - llora mucho
  - llora sin cesar
  lexicon: HALOT
  rationale: La intensificación del infinitivo absoluto + imperfecto pide en español una forma enfática natural. «Amargamente» conserva el valor expresivo sin volver mecánica la frase.
- source_word: בַּלַּיְלָה
  english_pob_choice: in the night
  chosen_spanish: en la noche
  alternatives_spanish:
  - por la noche
  - de noche
  lexicon: HALOT
  rationale: Es una indicación temporal. «En la noche» sigue de cerca la preposición hebrea y mantiene el tono poético.
- source_word: וְדִמְעָתָהּ עַל לֶחֱיָהּ
  english_pob_choice: with her tears on her cheeks
  chosen_spanish: con sus lágrimas sobre sus mejillas
  alternatives_spanish:
  - y sus lágrimas en sus mejillas
  - con su llanto sobre sus mejillas
  lexicon: HALOT
  rationale: El hebreo presenta la imagen de las lágrimas sobre el rostro. En español, el plural «lágrimas» comunica mejor la imagen colectiva que un singular literal.
- source_word: אֵין לָהּ מְנַחֵם
  english_pob_choice: she has no comforter
  chosen_spanish: no tiene consolador
  alternatives_spanish:
  - no hay quien la consuele
  - no tiene quien la consuele
  lexicon: HALOT
  rationale: «Consolador» conserva la fuerza nominal del participio hebreo. Aunque «quien la consuele» es natural, la elección principal mantiene la concisión del original.
- source_word: מִכָּל אֹהֲבֶיהָ
  english_pob_choice: among all her lovers
  chosen_spanish: entre todos sus amantes
  alternatives_spanish:
  - entre todos los que la amaban
  - entre todos sus aliados
  lexicon: HALOT
  rationale: Se conserva el lenguaje metafórico del texto, que personifica a la ciudad como mujer. «Amantes» reproduce esa carga relacional y evita reducirlo de entrada a una lectura meramente política.
- source_word: כָּל רֵעֶיהָ
  english_pob_choice: all her companions
  chosen_spanish: todos sus compañeros
  alternatives_spanish:
  - todos sus amigos
  - todos sus aliados
  lexicon: HALOT
  rationale: רֵעַ admite la gama amigo/compañero/socio. «Compañeros» funciona bien en español para el registro poético y conserva la amplitud semántica.
- source_word: בָּגְדוּ בָהּ
  english_pob_choice: have dealt treacherously with her
  chosen_spanish: han obrado con traición contra ella
  alternatives_spanish:
  - la han traicionado
  - han sido infieles con ella
  lexicon: HALOT
  rationale: «Obrar con traición» preserva la fuerza de בגד, que implica traición o infidelidad, y mantiene el matiz relacional/covenantal sin suavizarlo.
- source_word: הָיוּ לָהּ לְאֹיְבִים
  english_pob_choice: they have become her enemies
  chosen_spanish: se han vuelto sus enemigos
  alternatives_spanish:
  - han llegado a ser sus enemigos
  - le han sido enemigos
  lexicon: HALOT
  rationale: La construcción señala un cambio de relación. «Se han vuelto sus enemigos» comunica claramente esa transición en español idiomático.
theological_decisions:
- issue: Metáfora de Jerusalén como mujer con «amantes»
  english_pob_reading: Retain the relational metaphor with 'lovers' rather than flattening to purely political language.
  chosen_spanish_reading: Conservar «amantes» como metáfora relacional, sin reducirlo de inmediato a «aliados».
  alternative_spanish_readings:
  - aliados
  - amigos
  rationale: El poema personifica a la ciudad como mujer, y el término sostiene esa imagen. Mantener la metáfora preserva la tensión literaria y teológica del texto, sin excluir que el trasfondo pueda ser político.
  doctrine_reference: Principio de primacía del idioma original y conservación de la tensión textual; no resolver por adelantado una ambigüedad productiva.
translation_notes:
  revision_awareness: El texto sigue de cerca la lectura inglesa auditada, sin cambios respecto al último pase revisado; se mantiene la distinción entre «amantes» y «compañeros» para conservar tanto la metáfora poética como la amplitud relacional del hebreo.
  spanish_consistency_notes:
  - Se usó «amantes» en el primer miembro y «compañeros» en el segundo para reflejar la diferencia entre אֹהֲבֶיהָ y רֵעֶיהָ.
  - «Consolador» traduce el participio nominal מְנַחֵם de manera consistente con el valor sustantivo del hebreo.
  - La puntuación conserva la estructura poética de dos cola principales con paralelismo interno.
