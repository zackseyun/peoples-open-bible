translation:
  language: es
  text: Pero Nikanor[a], ese hombre enteramente vil, que había traído tres mil mercaderes para la venta de los judíos,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'ese hombre tres veces maldito' o 'ese hombre tres veces desdichado'. El adjetivo griego es raro y muy peyorativo, con un elemento intensivo de 'tres veces-'.
    reason: lexical_alternative
lexical_decisions:
- source_word: τρισαλιτήριιος
  english_pob_choice: utterly defiled
  chosen_spanish: totalmente impuro
  alternatives_spanish:
  - tres veces maldito
  - tres veces desdichado
  - sumamente vil
  - completamente contaminado
  lexicon: LSJ
  rationale: El compuesto raro expresa una invectiva fuertemente intensificada por τρις- y con carga moral/religiosa. En español, 'totalmente impuro' conserva la idea de profanación moral sin sonar arcaico ni opaco; 'tres veces maldito' sería más literal pero menos natural.
- source_word: Νικάνωρ
  english_pob_choice: Nikanor
  chosen_spanish: Nikanor
  alternatives_spanish:
  - Nicanor
  lexicon: Transliteración griega estándar
  rationale: Se conserva la transliteración más cercana a la forma griega, siguiendo la práctica POB de reflejar la fuente original con fidelidad.
- source_word: ἐμπόρους
  english_pob_choice: merchants
  chosen_spanish: mercaderes
  alternatives_spanish:
  - comerciantes
  - traders
  - negociantes
  lexicon: LSJ
  rationale: El contexto es el de personas llevadas para realizar una compra-venta de cautivos; 'mercaderes' comunica bien el carácter comercial sin modernizar en exceso.
- source_word: ἐπὶ τὴν πρᾶσιν
  english_pob_choice: for the sale
  chosen_spanish: para la venta
  alternatives_spanish:
  - para venderlos
  - para el remate
  - para la subasta
  lexicon: LSJ
  rationale: La frase indica propósito relacionado con la venta de judíos cautivos. 'Para la venta' es directo y fiel al valor de propósito, sin añadir detalles no presentes en el griego.
- source_word: τῶν Ἰουδαίων
  english_pob_choice: of the Jews
  chosen_spanish: de los judíos
  alternatives_spanish:
  - de los judeanos
  lexicon: Uso etnorreligioso contextual
  rationale: En 2 Macabeos el término designa al pueblo judío; 'judíos' es claro y natural en español bíblico contemporáneo.
- source_word: ἀγαγών
  english_pob_choice: had brought
  chosen_spanish: había traído
  alternatives_spanish:
  - habiendo traído
  - trajo
  lexicon: LSJ
  rationale: El participio aoristo se vierte con pluscuamperfecto para mantener el trasfondo narrativo previo a la acción principal del contexto más amplio.
theological_decisions:
- issue: Intensificación insultante de τρισαλιτήριος
  english_pob_reading: utterly defiled man
  chosen_spanish_reading: hombre totalmente impuro
  alternative_spanish_readings:
  - hombre tres veces maldito
  - hombre tres veces desdichado
  - hombre sumamente vil
  rationale: La decisión mantiene la fuerza peyorativa y la carga de impureza moral/religiosa sin imponer un giro que en español suene excesivamente arcaico o artificial. No se suaviza el insulto.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'El dossier inglés pasó por una corrección y luego una restauración de las decisiones léxicas originales: ''utterly defiled'' para τρισαλιτήριος y ''Nikanor'' para Νικάνωρ. Esta versión española sigue esas decisiones documentadas y evita la lectura revisada que intensificaba indebidamente el prefijo τρις- en una forma menos natural para el español.'
  spanish_consistency_notes:
  - Mantengo 'Nikanor' para alinearlo con la transliteración griega directa y con la revisión restaurada del expediente.
  - '''judíos'' se conserva como designación etnorreligiosa natural del contexto, sin sustituirla por una forma geográfica.'
  - La nota de pie preserva la alternativa literal de 'tres veces maldito/desdichado' para reflejar la tensión lexical del original griego.
