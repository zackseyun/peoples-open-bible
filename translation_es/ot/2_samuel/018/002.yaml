    text: 'Hebreo literalmente: «en la mano de», un modismo que indica autoridad o mando.'
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota para que corresponda al modismo hebreo בְּיַד, y se reemplaza «sin falta» por «ciertamente» para mantener mejor el registro bíblico digno sin perder la intensificación del hebreo.
