- from: Yo los traeré[a], y habitarán en medio de Jerusalén; y serán para mí un pueblo, y yo seré para ellos Dios, en verdad[b] y en justicia[c].
  to: Yo los traeré[a], y habitarán en medio de Jerusalén; y serán mi pueblo, y yo seré su Dios, en verdad[b] y en rectitud[c].
