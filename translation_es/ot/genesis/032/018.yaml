revisions:
- from: 'Y le dio instrucciones al primero[a], diciendo: «Cuando Esaú, mi hermano, te encuentre y te pregunte: “¿A quién perteneces[b], y adónde vas, y de quién son estos que van delante de ti[c]?”...»'
  to: 'Y le dio instrucciones al primero[a], diciendo: «Cuando Esaú, mi hermano, te encuentre y te pregunte: “¿A quién perteneces[b], y adónde vas, y a quién pertenecen estos delante de ti[c]?”...»'
  rationale: Se ajustó la tercera pregunta para reflejar con mayor precisión la repetición hebrea de לְמִי («a quién ... pertenece(n)») y se evitó la pequeña expansión interpretativa «que van». El resto del borrador es fiel y natural, por lo que no requiere cambios mayores.
