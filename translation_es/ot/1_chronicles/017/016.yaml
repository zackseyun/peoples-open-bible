translation:
  language: es
  text: 'Entonces el rey David entró y se sentó delante de Yahvé, y dijo[a]: «¿Quién soy yo, oh Yahvé Dios, y qué es mi casa, que me has traído hasta aquí?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi familia», «mi casa real» o «mi dinastía» para «mi casa». El hebreo «casa» puede referirse a la familia de David y, en este contexto, a su línea real.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: went in
  chosen_spanish: entró
  alternatives_spanish:
  - fue
  - pasó
  - entró al lugar
  lexicon: HALOT
  rationale: El verbo בוא puede significar venir, ir o entrar; en este contexto de acceso a la presencia divina, «entró» expresa bien el movimiento sin añadir detalles no explicitados por el hebreo.
- source_word: הַמֶּלֶךְ דָּוִיד
  english_pob_choice: King David
  chosen_spanish: el rey David
  alternatives_spanish:
  - David el rey
  - el rey David
  lexicon: HALOT
  rationale: El hebreo presenta el título con artículo; en español la construcción natural y reverente es «el rey David».
- source_word: וַיֵּשֶׁב
  english_pob_choice: sat
  chosen_spanish: se sentó
  alternatives_spanish:
  - permaneció sentado
  - se quedó sentado
  lexicon: HALOT
  rationale: El contexto inmediato narra una acción concreta tras «entró», por lo que «se sentó» conserva el sentido literal de ישב.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: La preposición לִפְנֵי se rinde de forma natural con «delante de» o «ante». Se usa «Yahvé» siguiendo la terminología base del proyecto para el nombre divino.
- source_word: יְהוָה אֱלֹהִים
  english_pob_choice: O Yahweh God
  chosen_spanish: oh Yahvé Dios
  alternatives_spanish:
  - oh Yahvé, Dios
  - oh Señor Dios
  lexicon: HALOT
  rationale: Es una vocación directa. «Oh Yahvé Dios» preserva el orden y la fuerza del hebreo, mientras que «Dios» traduce אֱלֹהִים como título.
- source_word: מִי אֲנִי
  english_pob_choice: Who am I
  chosen_spanish: ¿Quién soy yo?
  alternatives_spanish:
  - ¿Qué soy yo?
  - ¿Quién soy?
  lexicon: HALOT
  rationale: La fórmula expresa humildad e insignificancia; «¿Quién soy yo?» es la equivalencia más natural y fiel en español.
- source_word: וּמִי בֵיתִי
  english_pob_choice: and what is my house
  chosen_spanish: ¿y qué es mi casa?
  alternatives_spanish:
  - ¿y qué es mi familia?
  - ¿y qué es mi linaje?
  lexicon: HALOT
  rationale: «Casa» conserva la amplitud semántica de בַּיִת y permite el posible sentido dinástico, sin cerrar el término a una sola interpretación.
- source_word: בֵיתִי
  english_pob_choice: my house
  chosen_spanish: mi casa
  alternatives_spanish:
  - mi familia
  - mi linaje
  - mi casa / mi casa real
  lexicon: HALOT
  rationale: «Casa» mantiene la metáfora hebrea y su posible referencia a familia, casa real o dinastía; el texto español no resuelve la ambigüedad que el hebreo deja abierta.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: para que
  alternatives_spanish:
  - que
  - porque
  lexicon: HALOT
  rationale: En este giro, כִּי introduce la cláusula dependiente del asombro de David; «para que» expresa bien la relación final/resultativa en español.
- source_word: הֲבִיאֹתַנִי
  english_pob_choice: you have brought me
  chosen_spanish: me hayas traído
  alternatives_spanish:
  - me has traído
  - me trajeras
  lexicon: HALOT
  rationale: El hiphil de בוא tiene valor causativo. En español, la subordinada con subjuntivo tras «para que» comunica naturalmente la acción divina de traer a David hasta este punto.
- source_word: עַד הֲלֹם
  english_pob_choice: this far
  chosen_spanish: hasta aquí
  alternatives_spanish:
  - hasta este punto
  - tan lejos
  lexicon: HALOT
  rationale: La expresión denota alcance hasta el presente. «Hasta aquí» es breve, idiomática y fiel al sentido de avance otorgado por Dios.
theological_decisions:
- issue: Nombre divino YHWH / יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se sigue el criterio base del proyecto para transliterar el Tetragrama como «Yahvé» en el texto principal, evitando el reemplazo por una máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Dirección de la expresión «Yahweh God»
  english_pob_reading: O Yahweh God
  chosen_spanish_reading: oh Yahvé Dios
  alternative_spanish_readings:
  - oh Yahvé, Dios
  - oh Señor Dios
  rationale: La secuencia es una invocación directa. Mantener ambos elementos en español conserva el paralelismo del hebreo y la fuerza vocativa.
  doctrine_reference: Uso contextual de אֱלֹהִים como título divino
- issue: Sentido de בֵיתִי en este contexto
  english_pob_reading: my house
  chosen_spanish_reading: mi casa
  alternative_spanish_readings:
  - mi familia
  - mi linaje
  - mi casa real
  rationale: El hebreo puede apuntar a hogar, familia o dinastía. «Mi casa» preserva la ambigüedad productiva y no borra la posible referencia a la línea real de David.
  doctrine_reference: Footnote lexical alternative retained from English POB audit trail
translation_notes:
  revision_awareness: La auditoría inglesa indica alta concordancia y ningún cambio reciente aplicado; por ello la versión española sigue de cerca las decisiones léxicas validadas y conserva la ambigüedad de בֵיתִי con nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» en lugar de «SEÑOR» para el nombre divino, conforme al estándar del proyecto.
  - Se mantiene «casa» para בֵיתִי, con nota explicativa sobre su posible sentido de casa real o dinastía.
  - Se conserva el orden retórico del hebreo con vocativo «oh Yahvé Dios» y la pregunta doble de humildad.
