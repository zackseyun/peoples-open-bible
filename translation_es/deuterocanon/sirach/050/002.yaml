translation:
  language: es
  text: En sus días se excavó un reservorio[a], y un conducto[b] como el mar en su abundancia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo griego dice: «Por él fue fundada la altura de la doble estructura, el alto contrafuerte del recinto sagrado». El hebreo conservado, en cambio, habla de un reservorio y un conducto, lo que refleja una divergencia textual significativa.'
    reason: alternative_reading
  - marker: b
    text: El término hebreo traducido aquí como «conducto» es incierto y puede referirse de modo más general a un canal o curso de agua.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִכְרָה
  english_pob_choice: was dug out
  chosen_spanish: se excavó
  alternatives_spanish:
  - se cavó
  - fue excavado
  lexicon: HALOT
  rationale: El pasivo del hebreo indica una acción de cavar o excavar. En español, 'se excavó' transmite con naturalidad una obra de ingeniería hídrica y conserva el matiz pasivo sin sonar forzado.
- source_word: מִקְוֶה
  english_pob_choice: reservoir
  chosen_spanish: reservorio
  alternatives_spanish:
  - depósito de agua
  - estanque
  - cisterna
  lexicon: HALOT
  rationale: En este contexto arquitectónico, el término designa una gran acumulación o instalación para almacenar agua. 'Reservorio' expresa mejor esa realidad técnica que 'estanque' o 'cisterna', y mantiene la amplitud del inglés 'reservoir'.
- source_word: שִׂיחַ
  english_pob_choice: conduit
  chosen_spanish: conducto
  alternatives_spanish:
  - canal
  - canaleta
  - curso de agua
  lexicon: HALOT
  rationale: El hebreo es incierto, pero el contexto de obras hidráulicas favorece una estructura o vía para conducir agua. 'Conducto' preserva esa ambigüedad controlada y funciona bien en español moderno.
- source_word: כַּיָּם
  english_pob_choice: like the sea
  chosen_spanish: como el mar
  alternatives_spanish:
  - como el mar
  - igual que el mar
  lexicon: HALOT
  rationale: La comparación debe mantenerse de manera directa. En español, 'mar' es la opción natural y fiel para el símil.
- source_word: בַּהֲמוֹנוֹ
  english_pob_choice: in its abundance
  chosen_spanish: en su abundancia
  alternatives_spanish:
  - en su multitud
  - en su plenitud
  - en su muchedumbre
  lexicon: HALOT
  rationale: La raíz puede sugerir abundancia, multitud o tumulto. Dado el paralelo con el mar, 'abundancia' comunica la grandeza de la masa de agua sin forzar una lectura más específica.
theological_decisions:
- issue: Divergencia textual entre el hebreo conservado y el paralelo griego
  english_pob_reading: The Hebrew witness instead speaks of a reservoir and a conduit, reflecting a significant textual divergence.
  chosen_spanish_reading: El texto hebreo conservado habla de un reservorio y un conducto, mientras que el paralelo griego presenta otra descripción arquitectónica del mismo ámbito.
  alternative_spanish_readings:
  - 'Seguir el griego: ''Por él fue fundada la altura de la doble estructura, el alto contrafuerte del recinto del templo.'''
  rationale: La política del proyecto da primacía al hebreo donde se conserva, pero el griego debe permanecer visible como testimonio alterno real. Por eso el texto principal sigue el hebreo y la nota conserva la lectura griega sin ocultar la tensión textual.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde Sirácida lo conserva; usar el paralelo griego como control y testimonio alterno'
- issue: Alcance de la imagen hidráulica en un contexto del templo
  english_pob_reading: The verse describes major temple-related construction works.
  chosen_spanish_reading: La frase se entiende como una gran obra hidráulica asociada al templo.
  alternative_spanish_readings:
  - Obra de abastecimiento de agua
  - Instalación de agua para el templo
  rationale: La referencia no es doctrinal, sino histórica y arquitectónica. Conviene mantener abierta la imagen de una obra hidráulica importante sin especificar más de lo que el hebreo obliga.
  doctrine_reference: Contexto histórico-literario de Sirácida 50:2
translation_notes:
  revision_awareness: El borrador sigue el hebreo conservado de Sirácida 50:2, con el paralelo griego incorporado en nota como lectura alternativa. Se mantuvo la diferencia textual visible y no se armonizó artificialmente.
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando el pasaje lo requiera; aquí no aparece el tetragrámaton.
  - '''Reservorio'' y ''conducto'' conservan el registro técnico de la obra hidráulica.'
  - Se evitó 'SEÑOR' y otra terminología eclesiástica no presente en el texto.
  - La puntuación y el estilo buscan una lectura fluida en español latinoamericano sin perder la estructura semítica del enunciado.
