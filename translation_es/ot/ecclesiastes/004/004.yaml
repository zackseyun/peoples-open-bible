translation:
  language: es
  text: Y vi yo que todo trabajo y todo trabajo bien hecho[a] provienen de la envidia de un hombre por su prójimo[b]. También esto es vanidad y afán tras el viento[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todo éxito en el trabajo»; el hebreo כִּשְׁרוֹן puede referirse a habilidad, competencia o al éxito que resulta de ello.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «la envidia de un hombre por su prójimo». El singular masculino probablemente tiene valor representativo.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «correr tras el viento».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָמָל
  english_pob_choice: labor
  chosen_spanish: trabajo
  alternatives_spanish:
  - fatiga
  - tarea
  - esfuerzo
  lexicon: HALOT
  rationale: En Eclesiastés, עָמָל suele referirse al trabajo humano penoso o esforzado. «Trabajo» es natural en español y conserva el valor general sin volverlo demasiado interpretativo.
- source_word: כִּשְׁרוֹן
  english_pob_choice: skill
  chosen_spanish: obra hábil
  alternatives_spanish:
  - habilidad
  - destreza
  - éxito
  - competencia
  lexicon: HALOT
  rationale: El término puede expresar habilidad, competencia o el éxito que resulta de ella. «Obra hábil» mantiene la relación con el hacer y refleja que el hebreo no habla solo de capacidad abstracta, sino de un trabajo realizado con pericia o eficacia.
- source_word: הַמַּעֲשֶׂה
  english_pob_choice: work
  chosen_spanish: obra
  alternatives_spanish:
  - trabajo
  - hecho
  - tarea
  lexicon: HALOT
  rationale: Aquí designa la actividad humana o el producto del hacer. «Obra» funciona bien junto a «hábil» y conserva el campo semántico de realización concreta.
- source_word: כִּי הִיא
  english_pob_choice: come from
  chosen_spanish: provienen de
  alternatives_spanish:
  - son
  - se deben a
  - nacen de
  lexicon: HALOT
  rationale: El hebreo es literalmente «porque ella es...», pero el español requiere explicitar la relación causal. «Provienen de» expresa que el trabajo y la obra hábil tienen su origen motivacional en la envidia.
- source_word: קִנְאַת
  english_pob_choice: envy
  chosen_spanish: envidia
  alternatives_spanish:
  - celos
  - rivalidad
  - zelo
  lexicon: HALOT
  rationale: En este contexto de comparación y competencia entre personas, «envidia» comunica mejor el deseo resentido ante el bien ajeno.
- source_word: אִישׁ
  english_pob_choice: a man's
  chosen_spanish: de un hombre
  alternatives_spanish:
  - de alguien
  - de una persona
  - de un varón
  lexicon: HALOT
  rationale: Se conserva el singular masculino representativo del hebreo. En español, «de un hombre» mantiene la forma fuente sin forzar una neutralización que el texto no pide.
- source_word: מֵרֵעֵהוּ
  english_pob_choice: of his neighbor
  chosen_spanish: a su prójimo
  alternatives_spanish:
  - de su vecino
  - de su compañero
  - respecto de su prójimo
  lexicon: HALOT
  rationale: «Prójimo» refleja bien la relación interpersonal señalada por רֵעַ y es idiomático en español bíblico contemporáneo; «vecino» sería demasiado estrecho geográficamente.
- source_word: הֶבֶל
  english_pob_choice: vanity
  chosen_spanish: vanidad
  alternatives_spanish:
  - vapor
  - futilidad
  - inconsistencia
  lexicon: HALOT
  rationale: «Vanidad» conserva el término temático tradicional de Eclesiastés y sigue siendo comprensible; el contexto no exige una restricción semántica más técnica.
- source_word: רְעוּת רוּחַ
  english_pob_choice: a chasing after wind
  chosen_spanish: persecución tras el viento
  alternatives_spanish:
  - carrera tras el viento
  - afán tras el viento
  - perseguir el viento
  lexicon: HALOT
  rationale: El giro expresa una búsqueda inútil o un afán vano. «Persecución tras el viento» mantiene la imagen verbal del hebreo y el carácter de inutilidad; aunque menos idiomático que otras opciones, preserva mejor la metáfora.
theological_decisions:
- issue: Cómo representar la causalidad implícita en «כי היא» sin perder el carácter sentencioso del versículo
  english_pob_reading: The labor and skillful work come from a man's envy of his neighbor.
  chosen_spanish_reading: Todo trabajo y toda obra hábil provienen de la envidia de un hombre a su prójimo.
  alternative_spanish_readings:
  - Todo trabajo y toda obra hábil son envidia de un hombre a su prójimo.
  - '...nacen de la envidia...'
  rationale: El hebreo es elíptico, pero el sentido del contexto requiere una relación de origen o motivo. «Provienen de» preserva la sentencia sapiencial sin añadir una interpretación doctrinal ajena.
  doctrine_reference: Eclesiastés 4:4; sabiduría bíblica sobre la motivación humana
translation_notes:
  revision_awareness: El texto inglés revisado sustituyó «all skill in work» por «all skillful work» para reflejar con más naturalidad el sintagma hebreo. La versión española adopta esa misma decisión semántica al unir la idea de habilidad con el sustantivo de acción mediante «obra hábil», evitando una traducción demasiado abstracta de «habilidad en el trabajo».
  spanish_consistency_notes:
  - Se mantuvo «vanidad» para הֶבֶל, en continuidad con el lenguaje temático de Eclesiastés y con el audit trail inglés.
  - Se eligió «prójimo» para רֵעַ porque en español bíblico contemporáneo conserva la relación interpersonal sin reducirla a vecindad física.
  - Se evitó «SEÑOR» y cualquier sustitución reverencial no presente en el verso.
  - La metáfora final conserva el movimiento de persecución/futilidad y no se paraphraseó como mera inutilidad abstracta.
