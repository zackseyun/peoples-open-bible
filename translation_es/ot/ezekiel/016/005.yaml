translation:
  language: es
  text: Ningún ojo tuvo compasión de ti, para hacer por ti ni siquiera una de estas cosas, para compadecerse de ti; más bien, fuiste arrojada al campo abierto, con aborrecimiento de tu vida[a], el día que naciste.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porque tu vida era aborrecida». La expresión hebrea בְּגֹעַל נַפְשֵׁךְ es compacta y puede entenderse más literalmente como una expresión de aborrecimiento dirigida a la recién nacida misma.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חָסָה עָלַיִךְ עַיִן
  english_pob_choice: No eye pitied you
  chosen_spanish: Ningún ojo tuvo compasión de ti
  alternatives_spanish:
  - Ningún ojo se compadeció de ti
  - Ningún ojo te tuvo lástima
  lexicon: HALOT
  rationale: La imagen hebrea personifica al «ojo» como sede de la compasión. En español, «tener compasión de» conserva bien la idea sin perder naturalidad. «Tener lástima» es posible, pero su matiz puede ser más coloquial.
- source_word: לַעֲשׂוֹת לָךְ אַחַת מֵאֵלֶּה
  english_pob_choice: to do for you even one of these things
  chosen_spanish: para hacer por ti ni siquiera una de estas cosas
  alternatives_spanish:
  - para hacer por ti una de estas cosas
  - para hacer por ti cualquiera de estas cosas
  lexicon: HALOT
  rationale: «Ni siquiera una» refleja el valor minimizador de אַחַת מֵאֵלֶּה y mantiene la referencia a las atenciones infantiles del contexto inmediato.
- source_word: לְחֻמְלָה עָלָיִךְ
  english_pob_choice: to have compassion on you
  chosen_spanish: para compadecerse de ti
  alternatives_spanish:
  - por compasión de ti
  - para mostrarte misericordia
  lexicon: HALOT
  rationale: El sustantivo חֻמְלָה expresa compasión/pena. «Compadecerse de ti» reproduce la finalidad o motivo del gesto y evita cargar el texto con connotaciones más técnicas de «misericordia».
- source_word: וַתֻּשְׁלְכִי
  english_pob_choice: you were thrown out
  chosen_spanish: fuiste arrojada
  alternatives_spanish:
  - fuiste echada
  - fuiste lanzada
  lexicon: HALOT
  rationale: El verbo pasivo expresa abandono violento. «Arrojada» comunica bien el desecho físico y el tono duro del pasaje.
- source_word: אֶל פְּנֵי הַשָּׂדֶה
  english_pob_choice: into the open field
  chosen_spanish: al campo abierto
  alternatives_spanish:
  - al descampado
  - a la superficie del campo
  lexicon: HALOT
  rationale: «Campo abierto» transmite exposición y desamparo de manera natural en español. Se evita una versión demasiado literal de «al rostro del campo».
- source_word: בְּגֹעַל נַפְשֵׁךְ
  english_pob_choice: in loathing of your life
  chosen_spanish: con aborrecimiento de tu vida
  alternatives_spanish:
  - por aborrecimiento de tu vida
  - en repugnancia de tu vida
  - porque tu vida era aborrecida
  lexicon: HALOT
  rationale: Se preserva la tensión interpretativa del hebreo compacto. «De tu vida» sigue la lectura donde נֶפֶשׁ se refiere a la persona viva, no solo a una abstracción. «Aborrecimiento» mantiene el peso semántico de גֹעַל.
- source_word: בְּיוֹם הֻלֶּדֶת אֹתָךְ
  english_pob_choice: on the day you were born
  chosen_spanish: el día que naciste
  alternatives_spanish:
  - el día de tu nacimiento
  - cuando naciste
  lexicon: HALOT
  rationale: La formulación directa es natural y fiel al valor temporal del hebreo. «El día que naciste» suena más vivo en español que una construcción nominal.
theological_decisions:
- issue: La frase hebrea compacta בְּגֹעַל נַפְשֵׁךְ admite más de una relación semántica entre el aborrecimiento y la persona recién nacida.
  english_pob_reading: in loathing of your life; footnote allows 'because your life was abhorred.'
  chosen_spanish_reading: con aborrecimiento de tu vida
  alternative_spanish_readings:
  - porque tu vida era aborrecida
  - con aborrecimiento hacia ti
  rationale: 'Se conserva la ambigüedad controlada del original: puede describir el aborrecimiento como actitud hacia la vida/vida-persona de la niña, o como causa del abandono. No se reduce a una sola explicación interpretativa.'
  doctrine_reference: Ninguna; decisión de exégesis léxica, no doctrinal.
translation_notes:
  revision_awareness: La redacción inglesa más reciente ajustó «in loathing for your life» a «in loathing of your life» por naturalidad. La versión española sigue esa lectura más natural sin perder la dureza del hebreo. El resto del verso mantiene la secuencia y el énfasis del audit trail inglés.
  spanish_consistency_notes:
  - Se usa «compasión/compadecerse» para חָמַל/חֻמְלָה según el valor contextual, en lugar de «misericordia», para no introducir un matiz más técnico o litúrgico.
  - Se mantiene «Yahvé» solo cuando aparece el nombre divino; este versículo no lo contiene.
  - «Aborrecimiento de tu vida» conserva la tensión entre vida-persona y rechazo, siguiendo la nota inglesa sobre la frase compacta.
  - No se introduce vocabulario eclesiástico ajeno al cuadro familiar del pasaje.
