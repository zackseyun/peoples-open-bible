translation:
  language: es
  text: Por medio de mí gobiernan los gobernantes, y los nobles, todos los jueces de justicia[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «jueces de rectitud». El hebreo צֶדֶק puede denotar tanto justicia en sentido judicial como rectitud o justicia moral.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּי
  english_pob_choice: By me
  chosen_spanish: Por medio de mí
  alternatives_spanish:
  - Por mí
  - Mediante mí
  - Gracias a mí
  lexicon: HALOT
  rationale: La preposición con sufijo de primera persona expresa aquí medio/instrumento. «Por medio de mí» conserva esa relación causal e instrumental en un español natural, sin reducirla solo a ubicación ni sonar excesivamente mecánica.
- source_word: שָׂרִים
  english_pob_choice: rulers
  chosen_spanish: gobernantes
  alternatives_spanish:
  - príncipes
  - magistrados
  - jefes
  lexicon: HALOT
  rationale: El término apunta a altos dirigentes o autoridades. «Gobernantes» comunica autoridad política o administrativa de forma amplia y evita limitar indebidamente el sentido a hijos de reyes o a una clase cortesana específica.
- source_word: יָשֹׂרוּ
  english_pob_choice: rule
  chosen_spanish: reinan
  alternatives_spanish:
  - gobiernan
  - ejercen dominio
  - mandan
  lexicon: HALOT
  rationale: El verbo indica reinar o ejercer dominio. «Reinan» mantiene la fuerza verbal del original y funciona bien en estilo proverbial, con una cadencia más cercana al paralelo hebreo que una perífrasis más larga.
- source_word: וּנְדִיבִים
  english_pob_choice: nobles
  chosen_spanish: los nobles
  alternatives_spanish:
  - los príncipes
  - los notables
  - los dignatarios
  lexicon: HALOT
  rationale: «Nobles» es la equivalencia directa y natural para esta clase social o dirigente. Se conserva como grupo distinto del anterior, según la estructura paralela del verso.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todos los
  - cada uno de los
  lexicon: HALOT
  rationale: El cuantificador totaliza la frase siguiente. «Todos» mantiene la amplitud explícita del hebreo y el tono de resumen de la construcción.
- source_word: שֹׁפְטֵי צֶדֶק
  english_pob_choice: judges of righteousness
  chosen_spanish: los jueces de la justicia
  alternatives_spanish:
  - los jueces de la rectitud
  - los jueces de lo recto
  - los jueces de justicia
  lexicon: HALOT
  rationale: Se conserva la estructura nominal del hebreo con un sustantivo en relación constructa. «Justicia» es una alternativa válida y, en este contexto judicial, más inmediata para el lector español que «rectitud», aunque esta última sigue siendo posible.
- source_word: צֶדֶק
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia
  lexicon: HALOT
  rationale: En este contexto sapiencial y judicial, צֶדֶק puede abarcar tanto rectitud moral como justicia jurídica. Se eligió «justicia» por la cercanía del campo semántico judicial del verso, sin borrar la tensión ética subyacente.
theological_decisions:
- issue: La agencia de la Sabiduría en el gobierno
  english_pob_reading: The verse states that rulers and judges exercise their authority by means of Wisdom, without making a broader doctrinal claim about the legitimacy of every ruler.
  chosen_spanish_reading: El verso afirma que gobernantes y jueces ejercen su autoridad por medio de la Sabiduría, sin convertir eso en una afirmación general sobre la legitimidad de todo gobierno.
  alternative_spanish_readings:
  - La Sabiduría legitima a todo gobernante
  - Todo poder político procede directamente de la Sabiduría
  rationale: La traducción conserva el valor instrumental de la preposición y la formulación proverbial del hebreo. Así no se amplía indebidamente la declaración a una doctrina más fuerte sobre toda autoridad política.
  doctrine_reference: 'Principio POB: preservar la tensión teológica del texto y no importar afirmaciones doctrinales que el versículo no hace.'
translation_notes:
  revision_awareness: 'El texto inglés auditado pasó de «and nobles—all judges of righteousness» a «and nobles, all judges of righteousness» para reflejar mejor la sintaxis hebrea. La versión española sigue esa pauta con una coma simple: «y los nobles, todos los jueces de la justicia».'
  spanish_consistency_notes:
  - Se mantiene «Sabiduría» como sujeto implícito del contexto inmediato, sin añadirla en el verso para no sobrecargar el español.
  - Se evita «SEÑOR» porque el hebreo aquí no contiene el nombre divino.
  - «Justicia» se usa de forma consistente para צֶדֶק en un marco judicial, dejando abierta la alternativa de «rectitud» en la nota.
  - 'La puntuación reproduce la relación appositiva del hebreo: «los nobles, todos los jueces de la justicia».'
