translation:
  language: es
  text: Se comerá en una sola casa; no sacarás nada de la carne fuera de la casa[a], y no quebrarán un hueso de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “en una sola familia”. La palabra hebrea puede designar tanto la casa física como el grupo doméstico reunido allí.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּבַיִת אֶחָד
  english_pob_choice: in one house
  chosen_spanish: en una sola casa
  alternatives_spanish:
  - en una casa
  - en un solo hogar
  - en una sola familia
  lexicon: HALOT
  rationale: בַּיִת puede referirse a la casa física o al grupo doméstico; aquí el contraste con “fuera de la casa” favorece la imagen espacial, mientras que “una sola” conserva el énfasis en la unidad del recinto o del grupo reunido.
- source_word: יֵאָכֵל
  english_pob_choice: shall be eaten
  chosen_spanish: Se comerá
  alternatives_spanish:
  - deberá comerse
  - ha de comerse
  lexicon: HALOT
  rationale: El nifal expresa una obligación/instrucción en voz pasiva. En español, “se comerá” mantiene la pasiva impersonal y el tono normativo sin volver la frase innecesariamente pesada.
- source_word: לֹא תוֹצִיא
  english_pob_choice: you shall not take
  chosen_spanish: no sacarás
  alternatives_spanish:
  - no llevarás fuera
  - no harás salir
  lexicon: HALOT
  rationale: El hifil de יצא tiene el sentido de hacer salir o sacar. “Sacarás” comunica con naturalidad la prohibición de retirar la carne del ámbito de la casa.
- source_word: מִן הַבַּיִת
  english_pob_choice: outside the house
  chosen_spanish: fuera de la casa
  alternatives_spanish:
  - de la casa
  - desde la casa
  lexicon: HALOT
  rationale: La secuencia con חוּצָה no señala solo origen sino movimiento hacia el exterior. “Fuera de la casa” reproduce ese valor direccional de forma clara en español.
- source_word: מִן הַבָּשָׂר
  english_pob_choice: any of the meat
  chosen_spanish: ningún pedazo de la carne
  alternatives_spanish:
  - nada de la carne
  - parte alguna de la carne
  lexicon: HALOT
  rationale: בָּשָׂר literalmente es “carne/flesh”, pero en este contexto alimentario el español natural es “carne”. Añadir “ningún pedazo” hace explícito el valor partitivo y evita que el mandato suene demasiado abstracto.
- source_word: חוּצָה
  english_pob_choice: outside
  chosen_spanish: fuera
  alternatives_spanish:
  - afuera
  - al exterior
  lexicon: HALOT
  rationale: Es un adverbio direccional de exterioridad. Unido a “fuera de la casa”, “fuera” conserva la fuerza prohibitiva sin redundancia innecesaria.
- source_word: וְעֶצֶם לֹא תִשְׁבְּרוּ בוֹ
  english_pob_choice: and you shall not break a bone of it
  chosen_spanish: y no le quebrarán ningún hueso
  alternatives_spanish:
  - y no quebrarán ninguno de sus huesos
  - y no romperán un hueso de él
  lexicon: HALOT
  rationale: עֶצֶם es singular, pero funciona colectivamente en esta norma. “Le quebrarán ningún hueso” mantiene el referente del animal y el valor idiomático de que no debe romperse hueso alguno del sacrificio.
theological_decisions:
- issue: Referente del pronombre final בוֹ
  english_pob_reading: the Passover animal as a whole ('of it')
  chosen_spanish_reading: el animal pascual como referente global (“le” / “de él”), sin especificar más allá del texto
  alternative_spanish_readings:
  - del cordero
  - de él
  rationale: El hebreo usa un pronombre masculino singular que remite al animal del que se viene hablando. En español, “le” permite conservar el referente sin forzar “cordero”, que sería una precisión contextual correcta pero ligeramente más específica que la forma hebrea del versículo.
  doctrine_reference: Éxodo 12:46; cf. la norma pascual de no quebrar hueso alguno del sacrificio.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y coincide sustancialmente con la decisión inglesa auditada: casa/hogar, pasiva normativa para יֵאָכֵל, prohibición de sacar la carne fuera, y la cláusula final sobre no quebrar huesos. Se ha conservado la tensión léxica casa/hogar en una nota, pero el texto principal privilegia la lectura espacial por el contraste inmediato con “fuera de la casa”.'
  spanish_consistency_notes:
  - Se usa “Yahvé” solo cuando el hebreo contiene el nombre divino explícito; este versículo no lo contiene.
  - Se mantiene “carne” para בָּשָׂר por el contexto alimentario, no “flesh”.
  - Se evita “romper” y se prefiere “quebrar” para reflejar el valor de תִשְׁבְּרוּ en la prohibición ritual.
  - La impersonal con “se” en la primera cláusula y la segunda persona en la prohibición conservan el registro legal del hebreo sin uniformarlo artificialmente.
