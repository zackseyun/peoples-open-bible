translation:
  language: es
  text: Además del holocausto del mes[b] y su ofrenda vegetal, y del holocausto regular y su ofrenda vegetal, y de sus libaciones, conforme a su ordenanza, como aroma agradable, una ofrenda de alimento[a] para Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más tradicionalmente, 'una ofrenda por fuego' o 'una ofrenda ígnea'.
    reason: lexical_alternative
  - marker: b
    text: '''El holocausto del mes'' probablemente se refiere a la ofrenda de luna nueva; la redacción hebrea es literalmente ''del mes''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִלְּבַד
  english_pob_choice: besides
  chosen_spanish: Además de
  alternatives_spanish:
  - aparte de
  - además de
  lexicon: HALOT
  rationale: Expresa con naturalidad que estas ofrendas se añaden a las ya prescritas, sin perder el valor aditivo del hebreo.
- source_word: עֹלַת הַחֹדֶשׁ
  english_pob_choice: the burnt offering of the month
  chosen_spanish: el holocausto del mes
  alternatives_spanish:
  - el holocausto mensual
  - el holocausto de la luna nueva
  lexicon: HALOT
  rationale: Conserva de cerca la forma hebrea literal 'del mes', evitando imponer en el texto principal la interpretación de luna nueva.
- source_word: מִנְחָתָהּ
  english_pob_choice: its grain offering
  chosen_spanish: su ofrenda vegetal
  alternatives_spanish:
  - su ofrenda de cereal
  - su ofrenda de harina
  lexicon: HALOT
  rationale: מִנְחָה en contexto sacrificial se refiere a la ofrenda vegetal que acompaña al holocausto; 'vegetal' es la opción POB para mantener el sentido técnico sin restringirlo solo a 'cereal'.
- source_word: עֹלַת הַתָּמִיד
  english_pob_choice: the regular burnt offering
  chosen_spanish: el holocausto regular
  alternatives_spanish:
  - el holocausto continuo
  - el holocausto diario
  lexicon: HALOT
  rationale: '''Regular'' comunica la idea de continuidad prescrita sin sobreespecificar el ritmo; sigue la decisión inglesa de evitar una traducción demasiado interpretativa.'
- source_word: וְנִסְכֵּיהֶם
  english_pob_choice: and their drink offerings
  chosen_spanish: y de sus libaciones
  alternatives_spanish:
  - y de sus ofrendas líquidas
  lexicon: HALOT
  rationale: '''Libaciones'' es la equivalencia cultual natural en español para las ofrendas derramadas, y mantiene el plural del sufijo.'
- source_word: כְּמִשְׁפָּטָם
  english_pob_choice: according to their ordinance
  chosen_spanish: conforme a su norma
  alternatives_spanish:
  - según su ordenanza
  - según su decreto
  lexicon: HALOT
  rationale: '''Norma'' conserva el sentido de prescripción ritual establecida, con un español más fluido que ''ordenanza'' sin perder formalidad.'
- source_word: לְרֵיחַ נִיחֹחַ
  english_pob_choice: as a pleasing aroma
  chosen_spanish: como aroma agradable
  alternatives_spanish:
  - como aroma placentero
  - como olor grato
  lexicon: HALOT
  rationale: Reproduce la fórmula sacrificial con un equivalente claro y natural; 'agradable' conserva la idea de aceptación sin cargarlo de idiomatismo arcaico.
- source_word: אִשֶּׁה
  english_pob_choice: a food offering
  chosen_spanish: ofrenda que se quema
  alternatives_spanish:
  - ofrenda ígnea
  - ofrenda quemada
  lexicon: HALOT
  rationale: 'Se evita ''ofrecida por fuego'' como calco rígido y se refleja el rasgo material del término: una ofrenda consumida por el fuego.'
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - para Yahvé
  lexicon: HALOT
  rationale: Se preserva el nombre divino con la forma POB 'Yahvé', conforme al criterio doctrinal del proyecto y al dativo de dedicación cultual.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton; la política del proyecto pide mantener el nombre divino visible en español. 'Yahvé' sigue el estándar POB y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH -> Yahvé'
- issue: Sentido técnico de אִשֶּׁה
  english_pob_reading: a food offering
  chosen_spanish_reading: ofrenda que se quema
  alternative_spanish_readings:
  - ofrenda por fuego
  - ofrenda ígnea
  rationale: En este contexto de inventario sacrificial, el término designa una ofrenda consumida por el fuego. La versión española conserva el valor técnico sin introducir una frase demasiado arcaica.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior asegurando que cada marcador de nota esté anclado exactamente en el texto español: [a] en ''ofrenda vegetal'' y [b] en ''aroma agradable''. No se añadieron notas sin ancla.'
  spanish_consistency_notes:
  - Se mantuvo 'holocausto' para עֹלָה, en coherencia con el uso sacrificial tradicional y con el registro del pasaje.
  - Se usó 'ofrenda vegetal' para מִנְחָה como término técnico del proyecto, evitando alternar entre 'vegetal', 'de cereal' u otras variantes dentro del mismo versículo.
  - Se preservó la sintaxis enumerativa del hebreo con repeticiones coordinadas para respetar el inventario ritual.
  - Se mantuvo 'Yahvé' en lugar de 'SEÑOR' para no ocultar el nombre divino revelado en el texto fuente.
