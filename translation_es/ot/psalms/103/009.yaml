translation:
  language: es
  text: No contenderá para siempre[a], ni guardará su enojo para siempre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No disputará para siempre» o «No pleiteará para siempre». ריב puede significar contender, disputar o llevar un caso.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «ni retendrá su enojo»; literalmente, «ni guardará». נטר puede significar guardar, retener o, en este contexto, guardar rencor o conservar ira.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָנֶצַח
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - constantemente
  - perpetuamente
  lexicon: HALOT
  rationale: נֶצַח con לְ expresa duración continua o indefinida. En español, «para siempre» es natural, solemne y conserva el valor durativo del primer hemistiquio sin endurecer el verso.
- source_word: יָרִיב
  english_pob_choice: contend
  chosen_spanish: contenderá
  alternatives_spanish:
  - disputará
  - litigará
  - acusará
  - pleiteará
  lexicon: HALOT
  rationale: ריב puede abarcar contender, disputar o llevar un caso. «Contenderá» conserva el matiz relacional/judicial sin especificar indebidamente un tribunal ni introducir una acusación explícita.
- source_word: לְעוֹלָם
  english_pob_choice: for all time
  chosen_spanish: por todo el tiempo
  alternatives_spanish:
  - para siempre
  - eternamente
  lexicon: HALOT
  rationale: עוֹלָם indica duración indefinida o perpetua. Aquí se evita repetir exactamente «para siempre» para reflejar el paralelismo poético, manteniendo el sentido durativo con una formulación natural en español.
- source_word: יִטּוֹר
  english_pob_choice: keep his anger
  chosen_spanish: guardará su enojo
  alternatives_spanish:
  - mantendrá su enojo
  - retendrá su ira
  - guardará rencor
  lexicon: HALOT
  rationale: נטר literalmente significa guardar/retener/proteger, y en contextos de enojo divino puede equivaler a guardar ira o rencor. «Guardará su enojo» conserva el verbo con un objeto explícito que la revisión inglesa consideró contextual y más natural en esta línea.
theological_decisions:
- issue: Objeto implícito de נטר frente al contexto de ira divina
  english_pob_reading: The Hebrew leaves the object implicit in the base line, but the revised English makes it explicit as 'his anger.'
  chosen_spanish_reading: «guardará su enojo» explicita el objeto implícito a partir del contexto inmediato.
  alternative_spanish_readings:
  - ni lo guardará por todo el tiempo
  - ni conservará su ira para siempre
  - ni retendrá [su enojo] por todo el tiempo
  rationale: El hebreo no nombra el objeto en la forma verbal, pero el contexto de este salmo y la revisión auditada apuntan a la ira/enojo divino. En español, explicitarlo evita oscuridad innecesaria sin añadir un elemento ajeno al texto.
  doctrine_reference: Translation philosophy items 1 and 3
translation_notes:
  revision_awareness: Tomé en cuenta la revisión auditada que corrigió la traducción de יִטּוֹר desde una idea general de «vigilar/guardar» hacia el sentido contextual de retener enojo o ira. Por eso el español evita una traducción demasiado literal del verbo solo y hace explícito el objeto con base en el contexto, sin perder la metáfora de «guardar».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera de la línea porque este versículo no contiene el nombre divino explícito.
  - Se prefirió «enojo» a «ira» para un registro bíblico moderno y claro; ambas son viables, pero «enojo» suena menos abstracto en español y conserva la tensión afectiva del contexto.
  - El paralelismo se preservó con dos miembros breves y coordinados, siguiendo el hebreo y la revisión inglesa.
