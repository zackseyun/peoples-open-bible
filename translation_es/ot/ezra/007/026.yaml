  yaml_path: translation/ot/ezra/007/026.yaml
  text: And anyone who will not obey the law of your God and the law of the king[a], let judgment be executed on him promptly, whether for death, or for banishment, or for confiscation of goods, or for imprisonment.
  footnotes:
