translation:
  language: es
  text: pero mostrando amor leal[a] a millares, a los que me aman y guardan mis mandamientos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a mil generaciones» (compárese Deuteronomio 5:10); el hebreo aquí dice simplemente «a millares».'
    reason: alternative_reading
lexical_decisions:
- source_word: וְעֹשֶׂה
  english_pob_choice: but showing
  chosen_spanish: pero mostrando
  alternatives_spanish:
  - y mostrando
  - y haciendo
  lexicon: HALOT
  rationale: El participio continúa el contraste con el juicio de la cláusula anterior. En español, «pero mostrando» conserva ese valor adversativo sin perder el sentido progresivo del participio.
- source_word: חֶסֶד
  english_pob_choice: steadfast love
  chosen_spanish: amor leal
  alternatives_spanish:
  - misericordia
  - amor constante
  - lealtad de pacto
  lexicon: HALOT
  rationale: חֶסֶד expresa amor fiel, relacional y de pacto. «Amor leal» comunica esa fidelidad en español moderno sin reducirlo indebidamente a «misericordia».
- source_word: לַאֲלָפִים
  english_pob_choice: to thousands
  chosen_spanish: a millares
  alternatives_spanish:
  - a miles
  - a mil generaciones
  lexicon: HALOT
  rationale: El hebreo dice simplemente «a millares», sin añadir «generaciones». Mantengo ese alcance abierto y no importo la ampliación interpretativa de otras tradiciones o pasajes paralelos.
- source_word: לְאֹהֲבַי
  english_pob_choice: to those who love me
  chosen_spanish: a los que me aman
  alternatives_spanish:
  - a mis amantes
  - a los que me aman continuamente
  lexicon: HALOT
  rationale: La forma participial con sufijo se vierte mejor como relativa natural en español. «A los que me aman» preserva la relación personal y el valor de lealtad afectiva.
- source_word: וּלְשֹׁמְרֵי
  english_pob_choice: and keep
  chosen_spanish: y guardan
  alternatives_spanish:
  - y observan
  - y cumplen
  lexicon: HALOT
  rationale: שׁמר incluye guardar, observar y custodiar. Con mandamientos como objeto, «guardan» mantiene bien el registro de obediencia y cuidado.
- source_word: מִצְוֺתָי
  english_pob_choice: my commandments
  chosen_spanish: mis mandamientos
  alternatives_spanish:
  - mis órdenes
  - mis preceptos
  lexicon: HALOT
  rationale: En el contexto del Decálogo, «mandamientos» es el equivalente más directo y fiel al registro legal/covenantal del hebreo.
theological_decisions:
- issue: Alcance de לַאֲלָפִים
  english_pob_reading: to thousands
  chosen_spanish_reading: a millares
  alternative_spanish_readings:
  - a mil generaciones
  - a miles de generaciones
  rationale: El texto hebreo no dice literalmente «generaciones». La traducción principal conserva el dato explícito y deja abierta la interpretación amplia en nota, sin resolver la tensión por tradición.
  doctrine_reference: 'Principio POB: primacía del texto original; preservar tensiones textuales cuando el hebreo es más estrecho que la tradición receptora.'
translation_notes:
  revision_awareness: 'El pasaje fue revisado y se mantuvo sin cambios sustanciales respecto del pasaje de control: la lectura principal sigue respetando el hebreo breve de לַאֲלָפִים y el contraste discursivo con la cláusula anterior.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del nombre divino en el proyecto, pero aquí el versículo no lo contiene explícitamente.
  - «Mandamientos» se conserva para מִצְוֺתָי en coherencia con el Decálogo y con el uso proyectual habitual.
  - La nota al pie preserva la alternativa tradicional sobre «generaciones» sin desplazar el texto principal.
