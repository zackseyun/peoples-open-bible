source:
  edition: WLC
  text: וְ/הָיָ֗ה אִם תִּשְׁמַע֮ אֶת כָּל אֲשֶׁ֣ר אֲצַוֶּ/ךָ֒ וְ/הָלַכְתָּ֣ בִ/דְרָכַ֗/י וְ/עָשִׂ֨יתָ הַ/יָּשָׁ֤ר בְּ/עֵינַ/י֙ לִ/שְׁמ֤וֹר חֻקּוֹתַ/י֙ וּ/מִצְוֺתַ֔/י כַּ/אֲשֶׁ֥ר עָשָׂ֖ה דָּוִ֣ד עַבְדִּ֑/י וְ/הָיִ֣יתִי עִמָּ֗/ךְ וּ/בָנִ֨יתִי לְ/ךָ֤ בַֽיִת נֶאֱמָן֙ כַּ/אֲשֶׁ֣ר בָּנִ֣יתִי לְ/דָוִ֔ד וְ/נָתַתִּ֥י לְ/ךָ֖ אֶת יִשְׂרָאֵֽל־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/1_kings/011/038.yaml
  text: And it shall be[a], if you listen to all that I command you, and walk in my ways, and do what is right in my eyes by keeping my statutes and my commandments, as David my servant did, then I will be with you and build for you a faithful house, just as I built for David, and I will give Israel to you.
  footnotes:
  - marker: a
    text: Or 'an enduring house,' 'a sure house,' or 'a faithful house'; that is, a lasting dynasty.
    reason: lexical_alternative
