translation:
  text: Divinations and omens[b] and dreams are empty, and the heart imagines them like a woman in labor.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The extant Hebrew line supplied for this verse reads, 'With a good eye give to the poor, and do not be resentful when you give to him,' which appears to reflect a different verse or a mismatched witness. The Greek text supplies the reading translated here.
    reason: textual_variant
  - marker: b
    text: Or 'auguries' for 'omens.' The Greek term refers to interpreting signs as portents.
    reason: lexical_alternative
lexical_decisions:
- source_word: μαντεῖαι
  chosen: Divinations
  alternatives:
  - soothsaying
  - oracles
  lexicon: BDAG
  rationale: The Hebrew Zone 1 text appears to reflect a different verse, so the Greek parallel is used as the actual basis here. μαντεῖαι refers to practices of divination; 'divinations' is direct and readable without importing a specific technique.
- source_word: οἰωνισμοί
  chosen: omens
  alternatives:
  - auguries
  - bird-signs
  lexicon: BDAG
  rationale: The term denotes omen-taking/augury. 'Omens' is the clearest modern English equivalent; 'auguries' is more technical but less accessible.
- source_word: ἐνύπνια
  chosen: dreams
  alternatives:
  - dream-visions
  lexicon: BDAG
  rationale: A straightforward rendering for dream experiences; no need to heighten beyond the source.
- source_word: μάταιά
  chosen: empty
  alternatives:
  - vain
  - worthless
  lexicon: BDAG
  rationale: Conveys futility and unreliability in natural English. 'Vain' is traditional but less idiomatic for modern readers.
- source_word: φαντάζεται
  chosen: imagines
  alternatives:
  - has fantasies
  - is deluded by appearances
  lexicon: BDAG
  rationale: The verb suggests forming appearances or fantasies in the mind. 'Imagines' preserves the mental activity without overinterpreting psychological delusion.
- source_word: καρδία
  chosen: the heart
  alternatives:
  - the mind
  - the inner self
  lexicon: BDAG
  rationale: In biblical idiom καρδία is the inner center of thought and feeling. 'Heart' preserves the source metaphor and biblical register.
- source_word: ὡς ὠδινούσης
  chosen: like a woman in labor
  alternatives:
  - like one in childbirth
  - like a woman giving birth
  lexicon: BDAG
  rationale: The participle is feminine and evokes labor pains/childbirth. English requires an explicit subject for clarity; 'a woman in labor' communicates the simile naturally.
