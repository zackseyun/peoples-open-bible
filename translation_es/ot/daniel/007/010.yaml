translation:
  language: es
  text: Un río de fuego fluía y salía de delante de él[a]; mil millares le servían, y diez mil veces diez mil estaban de pie delante de él. El tribunal tomó asiento[b], y los libros fueron abiertos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «millares de millares le servían, y miríadas de miríadas estaban de pie delante de él».'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «el juicio se sentó»; la expresión se refiere a la sesión del tribunal celestial para juzgar.
    reason: lexical_alternative
  - marker: c
    text: 'O: «y los rollos fueron abiertos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: נְהַר
  english_pob_choice: river
  chosen_spanish: río
  alternatives_spanish:
  - corriente
  - arroyo
  lexicon: HALOT
  rationale: El sustantivo arameo designa un curso de agua abundante; «río» conserva la imagen poderosa del texto apocalíptico y corresponde bien al inglés POB.
- source_word: נָגֵד וְנָפֵק
  english_pob_choice: was flowing and coming out
  chosen_spanish: fluía y salía
  alternatives_spanish:
  - estaba fluyendo y saliendo
  - manaba y salía
  lexicon: HALOT
  rationale: Los dos participios presentan una acción continua. «Fluía y salía» mantiene el movimiento sostenido sin sonar excesivamente técnico en español.
- source_word: מִן קֳדָמוֹהִי
  english_pob_choice: from before him
  chosen_spanish: de delante de él
  alternatives_spanish:
  - desde su presencia
  - de su presencia
  lexicon: HALOT
  rationale: La expresión conserva la imagen espacial de estar «delante» de la figura entronizada. «De delante de él» evita reducirla a una formulación más abstracta.
- source_word: אֶלֶף אלפים
  english_pob_choice: a thousand thousands
  chosen_spanish: mil millares
  alternatives_spanish:
  - mil miles
  - mil por mil
  lexicon: HALOT
  rationale: La construcción es multiplicativa y enfática. «Mil millares» es una equivalencia idiomática natural en español que mantiene la fuerza numérica sin perder inteligibilidad.
- source_word: יְשַׁמְּשׁוּנֵּהּ
  english_pob_choice: were serving him
  chosen_spanish: le servían
  alternatives_spanish:
  - le ministraban
  - lo servían
  lexicon: HALOT
  rationale: El verbo arameo significa servir o atender. «Le servían» es fiel y suficientemente amplio para la escena de corte; evita introducir un matiz litúrgico no explicitado por el término.
- source_word: וְרִבּוֹ רבון
  english_pob_choice: ten thousand times ten thousand
  chosen_spanish: diez mil veces diez mil
  alternatives_spanish:
  - millares de millares
  - miríadas de miríadas
  lexicon: HALOT
  rationale: La frase refuerza la inmensidad del grupo. La repetición numérica conserva el paralelismo y la intensidad del arameo mejor que una expresión más general.
- source_word: קָדָמוֹהִי יְקוּמוּן
  english_pob_choice: were standing before him
  chosen_spanish: estaban de pie delante de él
  alternatives_spanish:
  - estaban en pie delante de él
  - se mantenían delante de él
  lexicon: HALOT
  rationale: El verbo expresa la postura de estar en presencia del rey o juez. «Estaban de pie delante de él» es claro en español y preserva la escena cortesana.
- source_word: דִּינָא יְתִב
  english_pob_choice: The court sat
  chosen_spanish: El tribunal se sentó
  alternatives_spanish:
  - El juicio se sentó
  - El tribunal tomó asiento
  lexicon: HALOT
  rationale: Aunque literalmente dice «el juicio se sentó», el POB inglés sigue la lectura idiomática de un tribunal celestial que se reúne para juzgar. «El tribunal se sentó» refleja ese sentido sin borrar la metáfora legal.
- source_word: וְסִפְרִין פְּתִיחוּ
  english_pob_choice: and the books were opened
  chosen_spanish: y los libros fueron abiertos
  alternatives_spanish:
  - y los rollos fueron abiertos
  - y los registros fueron abiertos
  lexicon: HALOT
  rationale: En este contexto judicial-apocalíptico, el plural puede referirse a libros o registros escritos. «Libros» sigue el sentido convencional adoptado por la POB inglesa y conserva la literalidad suficiente.
theological_decisions:
- issue: La metáfora judicial de דִּינָא יְתִב
  english_pob_reading: The court sat
  chosen_spanish_reading: El tribunal se sentó
  alternative_spanish_readings:
  - El juicio se sentó
  - El tribunal tomó asiento
  rationale: La frase aramea es un modismo para la sesión del tribunal celestial. La traducción conserva la imagen jurídica y evita una formulación que suene doctrinalmente cargada o demasiado abstracta.
  doctrine_reference: Translation philosophy §1, §6
- issue: Las expresiones numéricas de los asistentes celestiales
  english_pob_reading: a thousand thousands ... ten thousand times ten thousand
  chosen_spanish_reading: mil millares ... diez mil veces diez mil
  alternative_spanish_readings:
  - millares de millares ... miríadas de miríadas
  - mil por mil ... diez mil por diez mil
  rationale: Se mantiene la imaginería numérica del texto fuente en vez de reducirla a un simple «innumerables». Esto preserva la grandiosidad apocalíptica sin imponer una interpretación simbólica.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La versión inglesa auditada permanece sin cambios en la última revisión (high_agreement, sin modificaciones aplicadas). La redacción española sigue esa lectura estable, manteniendo tanto la imaginería numérica como el modismo judicial.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto cuando el texto lo requiera; aquí no aparece el nombre divino explícito.
  - Se usa un español sobrio y bíblico, evitando arcaísmos innecesarios, pero conservando la intensidad apocalíptica.
  - «Tribunal» traduce el sentido idiomático de la escena judicial sin diluirla en una abstracción.
  - «Libros» se conserva como término literal y natural; la nota ofrece la alternativa «rollos» donde el plural arameo lo permita.
