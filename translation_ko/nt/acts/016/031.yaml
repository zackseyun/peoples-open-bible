id: ACT.16.31
reference: Acts 16:31
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: οἱ δὲ εἶπαν· Πίστευσον ἐπὶ τὸν κύριον ⸀Ἰησοῦν, καὶ σωθήσῃ σὺ καὶ ὁ οἶκός σου.
base_translation:
  language: en
  yaml_path: translation/nt/acts/016/031.yaml
  text: And they said[a], “Believe in the Lord Jesus[b], and you will be saved—you and your household.”
  footnotes:
  - marker: a
    text: Or “Believe on the Lord Jesus.”
    reason: lexical_alternative
  - marker: b
    text: “Your household” refers to those of his house, not merely the physical building.
    reason: cultural_note
translation:
  language: ko
  text: 그들이 말하기를, 「주 예수를 믿으십시오. 그리하면 당신과 당신의 집안이 구원을 얻을 것입니다」 하였습니다.
  philosophy: optimal-equivalence
theological_decisions:
- issue: 16:31의 「당신과 당신의 집안」의 의미 — 가족 대리신앙(household salvation)인가, 각자의 신앙 권유인가
  chosen_reading: 「주 예수를 믿으십시오. 그리하면 당신과 당신의 집안이 구원을 얻을 것입니다」
  alternative_readings:
  - 「당신과 당신 집안이 (각자) 믿어야 구원받습니다」
  rationale: 헬라어 본문은 명령형 단수(「πίστευσον」 — 너는 믿으라)에 미래형 「σωθήσῃ σὺ καὶ ὁ οἶκός σου」(너와 너의 집안이 구원을 받을 것이다)이다. 본 절은 가장의 신앙적 결단이 집안 복음 수용의 통로가 됨을 보여주는 사도행전적 정형(루디아, 고넬료, 그리스보)에 속하며, 33-34절은 실제로 집안 전체가 세례를 받고 믿는 모습을 보여준다. 따라서 단순 대리신앙이 아니라, 「가장에 의한 복음 도달과 가족 신앙의 응답」으로 읽는다. 한국 정통 번역의 정형을 그대로 따른다.
  doctrine_reference: 'DOCTRINE.md: oikos formula in Acts'
