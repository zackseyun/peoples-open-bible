translation:
  language: es
  text: Y hubo gran aflicción en Israel[a], como no la había habido desde el día en que ya no se veía un profeta entre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «como no había ocurrido desde el día en que ya no aparecía un profeta entre ellos». El pasivo griego de «se veía» también puede entenderse como «aparecía».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  english_pob_choice: there was
  chosen_spanish: hubo
  alternatives_spanish:
  - se produjo
  - llegó a haber
  lexicon: BDAG
  rationale: El griego introduce un acontecimiento en forma narrativa; en español, «hubo» transmite bien la irrupción del hecho sin sonar forzado. Mantiene el valor eventivo que la POB inglesa conserva con «there was».
- source_word: θλίψις μεγάλη
  english_pob_choice: great distress
  chosen_spanish: gran angustia
  alternatives_spanish:
  - gran aflicción
  - gran tribulación
  lexicon: BDAG
  rationale: «Angustia» expresa bien presión, aflicción y aflicción intensa en español actual. Evita cargar el texto con el matiz técnico-escatológico que puede tener «tribulación» en uso eclesial, y conserva la gravedad del adjetivo «grande».
- source_word: ἐν τῷ Ἰσραήλ
  english_pob_choice: in Israel
  chosen_spanish: en Israel
  alternatives_spanish:
  - entre Israel
  - para Israel
  lexicon: BDAG
  rationale: 'La locución es naturalmente locativa/corporal: el dolor acontece dentro del pueblo de Israel. «En Israel» preserva la sencillez del griego y la opción inglesa.'
- source_word: ἥτις
  english_pob_choice: such as
  chosen_spanish: como
  alternatives_spanish:
  - tal como
  - de tal clase que
  lexicon: BDAG
  rationale: La cláusula es cualitativa y describe la naturaleza de la angustia. En español, «como no la había habido» reproduce ese valor comparativo sin volver la frase rígida.
- source_word: οὐκ ἐγένετο
  english_pob_choice: had not been
  chosen_spanish: no la había habido
  alternatives_spanish:
  - no había ocurrido
  - no se había dado
  lexicon: BDAG
  rationale: En español, con «angustia» resulta más natural expresar la comparación como inexistencia previa del mismo tipo de angustia. Así se conserva la idea de unprecedented severity sin perder fluidez.
- source_word: ἀφʼ ἧς ἡμέρας
  english_pob_choice: since the day
  chosen_spanish: desde el día
  alternatives_spanish:
  - a partir del día
  - desde el tiempo
  lexicon: BDAG
  rationale: «Desde el día» refleja de modo directo el punto temporal de referencia y sigue de cerca el griego y la POB inglesa.
- source_word: οὐκ ὤφθη
  english_pob_choice: was no longer seen
  chosen_spanish: ya no se veía
  alternatives_spanish:
  - ya no fue visto
  - ya no aparecía
  lexicon: BDAG
  rationale: El pasivo de ὁράω puede entenderse como «ser visto» o «aparecer». «Ya no se veía» conserva la ambigüedad útil entre ausencia de visión y ausencia de manifestación profética, y evita sobreespecificar el modo de cesación.
- source_word: προφήτης
  english_pob_choice: a prophet
  chosen_spanish: un profeta
  alternatives_spanish:
  - profeta
  lexicon: BDAG
  rationale: 'Se mantiene el singular genérico del griego: no necesariamente un profeta específico, sino la ausencia de la presencia profética entre el pueblo. En español, el artículo indefinido ayuda a preservar ese valor.'
- source_word: αὐτοῖς
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - para ellos
  - con ellos
  lexicon: BDAG
  rationale: Aunque formalmente es dativo, el sentido contextual es de presencia dentro de la comunidad. «Entre ellos» reproduce mejor esa idea que un simple «a ellos».
theological_decisions:
- issue: Ausencia del profeta y posible tensión histórica/teológica
  english_pob_reading: The verse laments a period in which prophetic presence had ceased among Israel.
  chosen_spanish_reading: El versículo lamenta un período en que ya no había presencia profética entre Israel.
  alternative_spanish_readings:
  - El versículo habla de la ausencia de un profeta concreto
  - El versículo significa solo que ningún profeta se presentó públicamente
  rationale: 'La sintaxis singular («un profeta») puede leerse de forma genérica, no como referencia a una sola persona. La redacción española conserva esa tensión: no formula una doctrina amplia sobre el cese de la profecía, sino la afirmación histórica del texto sobre la ausencia profética en ese período.'
  doctrine_reference: Mantener la tensión histórica del texto sin resolverla dogmáticamente; lectura transparente y auditable.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que prefirió una formulación más natural («there was») sin perder el valor formal del original y conservó la idea de que el profeta ya no era visto/manifestado entre el pueblo.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda al tetragrámaton; este versículo no lo contiene.
  - Se mantiene «profeta» en singular como genericidad histórica, no como referencia a un individuo concreto.
  - «Angustia» se eligió para θλίψις por coherencia con el registro bíblico actual y para evitar una tecnicidad innecesaria de «tribulación».
  - La nota a pie de página se ancla en «[a]» para preservar la alternativa lexical del pasivo griego.
