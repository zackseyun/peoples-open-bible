review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura general del griego: los sacerdotes dejan de mostrarse prontos para el servicio del altar, desprecian el templo, descuidan los sacrificios y se apresuran a participar en actividades atléticas tras la convocatoria del disco. Sin embargo, hay un desajuste importante entre el texto español principal y la auditoría inglesa revisada: el inglés POB final optó por entender παρανόμου χορηγίας en contexto como ''unlawful exercise'', mientras que el español mantiene ''ilegal provisión'', que suena opaco y poco natural en español. Además, la nota [a] está anclada en ''altar'' cuando en realidad comenta la expresión difícil παρανόμου χορηγίας.'
  spanish_quality_summary: El español es mayormente legible, pero 'deseosos de los servicios del altar' suena algo rígido; 'ya no mostraban interés por los servicios del altar' o 'ya no estaban ansiosos por' sería más idiomático, aunque no indispensable. Lo principal es que 'ilegal provisión en la palestra' resulta extraño y confuso para un lector hispano; también 'participar de' aquí es menos natural que 'participar en'. 'Palestra' puede conservarse, pero conviene explicarla con la nota ya existente sobre el evento atlético y con un texto principal más claro.
  glossary_alignment: 'No hay conflictos con la terminología teológica principal del proyecto. ''Templo'', ''sacrificios'' y ''altar'' están bien. El problema central es léxico-contextual: παρανόμου χορηγίας debe reflejar la decisión auditada y sonar natural en español. Conviene además mover la nota [a] al sintagma correspondiente, no a ''altar''.'
  issues:
  - severity: high
    issue: '''ilegal provisión'' no refleja bien la revisión auditada inglesa ni produce español natural'
    rationale: La auditoría final cambió de 'unlawful provision' a 'unlawful exercise' por el contexto de la palestra. En español, 'provisión' aquí parece suministro material y desconcierta al lector; el sentido contextual apunta a la práctica o actividad atlética ilícita.
  - severity: medium
    issue: La nota [a] está anclada en 'altar' pero comenta παρανόμου χορηγίας
    rationale: El marcador debe aparecer en la palabra o frase pertinente. Tal como está, induce a pensar que la nota explica 'servicios del altar', cuando en realidad trata de la expresión difícil posterior.
  - severity: low
    issue: '''participar de'' es menos natural que ''participar en'' en este contexto'
    rationale: Ambas construcciones existen, pero para tomar parte en una actividad atlética 'participar en' o 'tomar parte en' es más claro y ampliamente natural.
