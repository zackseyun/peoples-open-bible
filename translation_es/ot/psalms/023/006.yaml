review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español capta bien la estructura y la mayoría de las decisiones del hebreo: אַךְ como afirmación confiada, יִרְדְּפוּנִי con fuerza activa, וְשַׁבְתִּי como «habitaré», y el nombre divino como «Yahvé». Sin embargo, dos puntos clave necesitan ajuste para alinearse mejor con la evidencia fuente y el rastro POB en inglés: חֶסֶד se debilitó a «fidelidad», perdiendo el componente explícito de amor/lealtad constante que el inglés preserva con «steadfast love»; y לְאֹרֶךְ יָמִים se volvió más idiomático/interpretativo como «por largo tiempo», cuando el POB busca preservar la formulación más literal y abierta.'
  spanish_quality_summary: 'El texto es claro y legible, pero la sintaxis final «y en la casa de Yahvé habitaré» suena algo invertida y literaria de forma innecesaria para español moderno. Una redacción como «y habitaré en la casa de Yahvé» mantiene dignidad sin rigidez. También conviene mejorar la colocación de las notas para que anclen exactamente donde corresponden: la nota sobre «habitaré/volveré» debe ir en el verbo, no en «todos los días de mi vida».'
  glossary_alignment: 'Buen cumplimiento en «Yahvé». No hay conflictos con otros términos del glosario. La principal desviación terminológica es חֶסֶד: «la fidelidad» sola no refleja plenamente «amor constante / amor fiel / misericordia leal». Para este contexto, «amor constante» alinea mejor con el POB auditado y con la razón léxico-teológica documentada.'
  issues:
  - severity: high
    issue: חֶסֶד se tradujo como «la fidelidad»
    rationale: El inglés POB eligió «steadfast love» para conservar el sentido de amor leal y perdurable. «Fidelidad» refleja lealtad, pero omite el componente explícito de amor/benevolencia y estrecha el sentido del paralelo «goodness and steadfast love».
  - severity: medium
    issue: לְאֹרֶךְ יָמִים se tradujo «por largo tiempo»
    rationale: Aunque es comprensible, esta frase resuelve más el modismo y se aleja de la decisión POB de mantener la literalidad abierta de «for length of days». «Por longitud de días» o similar preserva mejor la tensión poética documentada.
  - severity: medium
    issue: La nota b está anclada en la frase equivocada
    rationale: La alternativa «volveré» corresponde a וְשַׁבְתִּי («habitaré»), no a «todos los días de mi vida». El marcador debe moverse al verbo o a la cláusula relevante.
  - severity: low
    issue: Orden sintáctico final algo forzado
    rationale: «Y en la casa de Yahvé habitaré» es entendible, pero «y habitaré en la casa de Yahvé» suena más natural en español neutral sin perder solemnidad.
  - severity: low
    issue: Una alternativa léxica listada contiene texto erróneo
    rationale: En las decisiones léxicas aparece «por طول de días», mezcla accidental de escritura ajena al español. No afecta el texto principal, pero confirma necesidad de corrección editorial.
