    text: 'Hebreo: «porque no había número», un modismo que significa que era imposible seguir contando.'
    reason: lexical_alternative
  revision_rationale: Se elimina la inserción no textual de «Yahvé» y se restituye a José como sujeto explícito del verbo, conforme al hebreo. «Acumuló» refleja bien וַיִּצְבֹּר en contexto administrativo. «En grandísima abundancia» expresa con español natural el énfasis de הַרְבֵּה מְאֹד sin perder la imagen «como la arena del mar». Se conserva la cláusula final literal «porque no había número» y se explica su valor idiomático en una sola nota útil. No requiere adjudicación adicional; es una corrección textual y estilística clara.
