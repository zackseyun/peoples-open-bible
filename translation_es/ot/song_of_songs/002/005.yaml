    rationale: 'El inglés preserva «Or ''love-sick.''». La nota española «amorosamente enferma» es poco idiomática y no refleja bien el valor léxico. Debe sustituirse por una alternativa que represente el compuesto de modo natural, por ejemplo «O ‘con mal de amores’». '
  - severity: low
