  yaml_path: translation/ot/ezra/007/007.yaml
  text: And some of the sons of Israel[a], and some of the priests, and the Levites, and the singers, and the gatekeepers[b], and the temple servants went up to Jerusalem in the seventh year of King Artaxerxes.
