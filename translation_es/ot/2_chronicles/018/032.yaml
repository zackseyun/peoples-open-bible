translation:
  language: es
  text: Y cuando los comandantes de los carros vieron que no era el rey de Israel, dejaron de seguirlo.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «se volvieron de detrás de él», un modismo que significa que dejaron de seguirlo o perseguirlo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Y aconteció que cuando
  - Entonces, cuando
  lexicon: HALOT
  rationale: 'El waw consecutivo introduce la siguiente acción narrativa; en español, «Y cuando» transmite la transición temporal de modo natural y fiel sin recargar con una fórmula más literal como «aconteció». '
- source_word: כִּרְאוֹת
  english_pob_choice: when ... saw
  chosen_spanish: vieron
  alternatives_spanish:
  - cuando vieron
  - al ver
  lexicon: HALOT
  rationale: El infinitivo constructo con כִּ expresa temporalidad. Dado que la cláusula ya queda marcada por «Y cuando», el verbo simple «vieron» resulta claro y sobrio en español.
- source_word: שָׂרֵי הָרֶכֶב
  english_pob_choice: the commanders of the chariots
  chosen_spanish: los comandantes de los carros
  alternatives_spanish:
  - los capitanes de los carros
  - los comandantes de los carros de guerra
  - los jefes de los carros
  lexicon: HALOT
  rationale: שָׂרֵי denota jefes militares; en español, «comandantes» conserva la fuerza de liderazgo. הָרֶכֶב se refiere al cuerpo de carros; «carros» es la forma más natural y comprensible, evitando una perífrasis innecesaria.
- source_word: כִּי לֹא הָיָה מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: that he was not the king of Israel
  chosen_spanish: que no era el rey de Israel
  alternatives_spanish:
  - que él no era el rey de Israel
  - que no se trataba del rey de Israel
  lexicon: HALOT
  rationale: El hebreo omite el sujeto explícito, pero el contexto hace referencia a la persona que estaban persiguiendo. En español, «no era el rey de Israel» reproduce el sentido con naturalidad y conserva la identidad del sujeto implícito.
- source_word: וַיָּשֻׁבוּ
  english_pob_choice: they turned back
  chosen_spanish: se volvieron
  alternatives_spanish:
  - volvieron atrás
  - dieron la vuelta
  lexicon: HALOT
  rationale: שׁוּב suele significar volver/retroceder. «Se volvieron» mantiene la idea de cambio de dirección y funciona bien con la construcción siguiente.
- source_word: מֵאַחֲרָיו
  english_pob_choice: from following him
  chosen_spanish: de seguirlo
  alternatives_spanish:
  - de ir tras él
  - de perseguirlo
  lexicon: HALOT
  rationale: El hebreo dice literalmente «de detrás de él / de después de él», un modismo que expresa dejar de seguir o perseguir. «De seguirlo» conserva la imagen de seguimiento sin sonar forzado en español.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el hebreo y el audit trail inglés: mantiene la secuencia narrativa, explicita el sujeto implícito con naturalidad española y conserva en nota el modismo de «de detrás de él» reflejado por el hebreo מֵאַחֲרָיו.'
  spanish_consistency_notes:
  - Se mantiene «rey de Israel» como equivalente directo de מֶלֶךְ יִשְׂרָאֵל.
  - «Comandantes» se usa para שָׂרֵי, en línea con el valor militar del término.
  - La nota a conserva la imagen idiomática del hebreo sin sobrecargar el texto principal.
  - El pronombre enclítico en «seguirlo» ayuda a naturalidad y mantiene el referente masculino singular implícito del contexto.
