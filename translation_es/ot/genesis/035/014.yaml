translation:
  language: es
  text: Y Jacob levantó un pilar en el lugar donde había hablado con él, un pilar de piedra[a]; y derramó sobre él una libación[b], y vertió sobre él aceite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una piedra erigida».
    reason: lexical_alternative
  - marker: b
    text: Es decir, derramó una libación sobre él.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּצֵּב
  english_pob_choice: set up
  chosen_spanish: levantó
  alternatives_spanish:
  - erigió
  - levantó en pie
  lexicon: HALOT
  rationale: El verbo causativo aquí expresa hacer que algo quede de pie o erguido. «Levantó» comunica la acción concreta con naturalidad en español y evita una rigidez excesiva; «erigió» es posible, pero suena más solemne y algo menos directo.
- source_word: מַצֵּבָה
  english_pob_choice: pillar
  chosen_spanish: pilar
  alternatives_spanish:
  - columna
  - piedra erigida
  - piedra memorial
  lexicon: HALOT
  rationale: El sustantivo designa un monumento de piedra erguido. «Pilar» es breve, claro y conserva la idea de algo vertical levantado; «columna» puede sugerir una arquitectura más elaborada de la que el hebreo no exige.
- source_word: בַּמָּקוֹם
  english_pob_choice: in the place
  chosen_spanish: en el lugar
  alternatives_spanish:
  - en el sitio
  - allí
  lexicon: HALOT
  rationale: La preposición locativa se expresa naturalmente como «en el lugar». Mantiene la referencia espacial sin añadir matices interpretativos.
- source_word: אֲשֶׁר דִּבֶּר אִתּוֹ
  english_pob_choice: where he had spoken with him
  chosen_spanish: donde había hablado con él
  alternatives_spanish:
  - donde le había hablado
  - donde había hablado con él
  lexicon: HALOT
  rationale: Se conserva la relación temporal anterior al acto de Jacob mediante el pluscuamperfecto. «Con él» reproduce el valor relacional de אִתּוֹ sin especificar explícitamente al hablante, como ocurre en el hebreo.
- source_word: מַצֶּבֶת אָבֶן
  english_pob_choice: a pillar of stone
  chosen_spanish: un pilar de piedra
  alternatives_spanish:
  - un pilar de piedra
  - una piedra-pilar
  lexicon: HALOT
  rationale: La construcción en aposición se vierte de forma idiomática como «un pilar de piedra». Mantiene el material especificado por el hebreo sin forzar un calco poco natural.
- source_word: וַיַּסֵּךְ
  english_pob_choice: poured out
  chosen_spanish: derramó
  alternatives_spanish:
  - vertió
  - derramó
  lexicon: HALOT
  rationale: Con נֶסֶךְ como objeto, el verbo describe el derramamiento ritual de una libación. «Derramó» transmite bien el gesto ceremonial y evita sonar demasiado técnico.
- source_word: נֶסֶךְ
  english_pob_choice: a drink offering
  chosen_spanish: una libación
  alternatives_spanish:
  - una ofrenda de libación
  - un sacrificio líquido
  lexicon: HALOT
  rationale: Aquí se preserva el término ritual preciso. «Libación» es la equivalencia más exacta para la ofrenda derramada y corresponde al matiz cultual del hebreo.
- source_word: וַיִּצֹק
  english_pob_choice: poured
  chosen_spanish: vertió
  alternatives_spanish:
  - derramó
  - vertió
  lexicon: HALOT
  rationale: El segundo verbo de derramamiento se distingue del anterior y rige aceite. «Vertió» suena natural en español y mantiene la repetición diferenciada de los dos gestos líquidos.
- source_word: שָׁמֶן
  english_pob_choice: oil
  chosen_spanish: aceite
  alternatives_spanish:
  - aceite
  - aceite de oliva
  lexicon: HALOT
  rationale: El hebreo dice simplemente «aceite». «Aceite» conserva la neutralidad del original sin especificar «de oliva», dato plausible pero no explícito.
theological_decisions:
- issue: Sentido ritual del acto de Jacob con el pilar
  english_pob_reading: Render the actions descriptively as setting up a pillar, pouring out a drink offering, and pouring oil on it, without adding evaluative language.
  chosen_spanish_reading: Se describen los gestos sin explicar su significado teológico ni añadir valoración interpretativa.
  alternative_spanish_readings:
  - consagró el pilar
  - memorializó el encuentro divino
  rationale: El versículo narra acciones rituales, pero no explicita por sí mismo su interpretación. La redacción española conserva esa tensión y evita resolverla con una explicación que exceda la evidencia del texto.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la evaluación de alta concordancia del control cruzado y mantiene sin cambios sustantivos la lectura auditada: pilar, lugar, libación y aceite, con la diferenciación verbal entre derramó y vertió. Se preserva la ambigüedad textual respecto de quién habló con Jacob, sin explicitarlo en el cuerpo principal.'
  spanish_consistency_notes:
  - Se mantiene «Y Jacob» para seguir la progresión narrativa hebrea y la cadencia de inicio de cláusula con וַ.
  - «Pilar» se usa de manera consistente para מַצֵּבָה, y la nota alternativa conserva la posibilidad de «piedra-pilar» sin desplazar el texto principal.
  - Se distingue «derramó» para la libación y «vertió» para el aceite, reproduciendo la diferencia entre los dos verbos hebreos.
  - «Libación» se conserva como término cultual preciso, con nota aclaratoria para lectores menos familiarizados.
  - No se especifica «Yahvé» en el texto porque el hebreo aquí usa una cláusula relativa elíptica; la referencia al hablante se deja implícita como en el original.
