revisions:
- from: 'Y el Espíritu de Dios[a] vistió a Zacarías, hijo de Joyadá, el sacerdote; y se puso en pie sobre el pueblo, y les dijo: «Así dice Dios: ¿Por qué transgreden los mandamientos de Yahvé, para que no prosperen? Porque ustedes han abandonado a Yahvé, él también los ha abandonado»[b].'
  to: 'Y el Espíritu de Dios[a] vistió a Zacarías, hijo de Joyadá, el sacerdote; y se puso de pie por encima del pueblo, y les dijo: «Así dice Dios: ¿Por qué transgreden los mandamientos de Yahvé, para que no prosperen[b]? Porque ustedes han abandonado a Yahvé; él también los ha abandonado».'
  rationale: 'Se hicieron dos ajustes menores: (1) se mejoró la naturalidad de «וַיַּעֲמֹד מֵעַל לָעָם» con «se puso de pie por encima del pueblo», preservando el matiz espacial de elevación sin una imagen extraña en español; (2) se reubicó la nota [b] al lugar exacto de «no prosperen», ya que esa alternativa léxica solo corresponde a esa cláusula. También se refinó levemente la puntuación interna de la cita para una lectura más clara.'
