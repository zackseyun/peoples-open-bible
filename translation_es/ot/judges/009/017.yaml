translation:
  language: es
  text: porque mi padre peleó por ustedes, arrojó su vida al frente[a] y los libró de la mano de Madián[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «arrojó su vida al frente»; es un modismo hebreo que significa que se expuso a peligro de muerte.
    reason: lexical_alternative
  - marker: b
    text: O «los rescató del poder de Madián».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: En este contexto la partícula introduce la razón del reproche anterior; en español, «porque» comunica mejor la relación causal que un relativo literal.
- source_word: נִלְחַם
  english_pob_choice: fought
  chosen_spanish: peleó
  alternatives_spanish:
  - luchó
  - combatió
  lexicon: HALOT
  rationale: El verbo expresa acción de combate; «peleó» es natural y directo en español, sin perder el sentido militar del hebreo.
- source_word: עֲלֵיכֶם
  english_pob_choice: for you
  chosen_spanish: por ustedes
  alternatives_spanish:
  - en favor de ustedes
  - por su bien
  lexicon: HALOT
  rationale: Aquí עַל tiene valor de beneficio o apoyo, no de oposición; «por ustedes» conserva esa relación de provecho y suena idiomático en español.
- source_word: וַיַּשְׁלֵךְ אֶת־נַפְשׁוֹ מִנֶּגֶד
  english_pob_choice: cast his life in front of him
  chosen_spanish: expuso su vida
  alternatives_spanish:
  - arrojó su vida delante de sí
  - puso su vida en peligro
  - arriesgó su vida
  lexicon: HALOT
  rationale: La imagen hebrea es idiomática y describe exponerse a peligro mortal. «Expuso su vida» retiene la idea de ponerse en riesgo sin sustituirla por una paráfrasis más interpretativa.
- source_word: וַיַּצֵּל
  english_pob_choice: delivered
  chosen_spanish: los libró
  alternatives_spanish:
  - los rescató
  - los salvó
  lexicon: HALOT
  rationale: El verbo en causativo puede significar rescatar, librar o salvar. «Los libró» funciona bien con la expresión siguiente y mantiene el registro bíblico sin imponer un matiz doctrinal adicional.
- source_word: מִיַּד מִדְיָן
  english_pob_choice: from the hand of Midian
  chosen_spanish: de la mano de Madián
  alternatives_spanish:
  - del poder de Madián
  - de la mano de los madianitas
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea de «mano» como poder o dominio. «Madián» sigue la forma española del nombre propio y mantiene el paralelismo con el original.
theological_decisions:
- issue: Valor idiomático de «la mano de Madián»
  english_pob_reading: from the hand of Midian
  chosen_spanish_reading: de la mano de Madián
  alternative_spanish_readings:
  - del poder de Madián
  - del dominio de Madián
  rationale: El texto hebreo usa una metáfora de poder/control. Se preserva en el texto principal para no borrar la imagen bíblica; la alternativa explicita el sentido, pero sería menos transparente al original.
  doctrine_reference: No aplica; decisión lexicográfica y de imagen idiomática.
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de una paráfrasis interpretativa («risked his life») a una formulación más cercana al modismo hebreo («cast his life in front of him»). En español se optó por «expuso su vida», que conserva el sentido idiomático sin alejarse del hebreo. También se mantuvo la metáfora de «la mano de Madián» para reflejar la estructura original y el audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico claro y moderno, evitando calcos torpes pero preservando la metáfora hebrea.
  - Se usó «Madián» como forma española estable del topónimo.
  - «Por ustedes» refleja el valor de beneficio de עֲלֵיכֶם, coherente con el contexto narrativo.
  - No se introdujo «Cristo», «Señor» ni otros términos ajenos al pasaje.
