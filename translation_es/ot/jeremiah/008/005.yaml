translation:
  language: es
  text: ¿Por qué se ha apartado este pueblo —Jerusalén[c]— con un apartarse[a] perpetuo? Se aferran al engaño[b]; se niegan a volver.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'con una apostasía perpetua' o 'en una rebelión persistente'.
    reason: lexical_alternative
  - marker: b
    text: El hebreo repite formas del verbo 'volver/regresar' a lo largo del versículo, en contraste entre el apartarse del pueblo y su negativa a volver.
    reason: lexical_alternative
  - marker: c
    text: '''Jerusalén'' también puede entenderse como vocativo: ''¿Por qué se ha apartado este pueblo, oh Jerusalén...?'''
    reason: alternative_reading
lexical_decisions:
- source_word: מַדּוּעַ
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Por qué razón
  - ¿A qué se debe
  lexicon: HALOT
  rationale: Interrogativo causal natural en español para una pregunta retórica.
- source_word: שׁוֹבְבָה
  english_pob_choice: has turned away
  chosen_spanish: se ha desviado
  alternatives_spanish:
  - se ha apartado
  - ha vuelto atrás
  - ha apostatado
  lexicon: HALOT
  rationale: שוב aquí describe una desviación persistente; 'se ha desviado' comunica el alejamiento sin introducir un tecnicismo eclesiástico más fuerte que el hebreo.
- source_word: הָעָם הַזֶּה
  english_pob_choice: this people
  chosen_spanish: este pueblo
  alternatives_spanish:
  - esta gente
  - esta nación
  lexicon: HALOT
  rationale: ‘Pueblo’ conserva el tono profético y la referencia comunitaria del hebreo.
- source_word: יְרוּשָׁלִַם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalem
  lexicon: HALOT
  rationale: Nombre propio en español estándar; se mantiene en aposición con 'este pueblo' como en el análisis inglés.
- source_word: מְשֻׁבָה
  english_pob_choice: turning away
  chosen_spanish: desvío
  alternatives_spanish:
  - apartamiento
  - apostasía
  - rebeldía
  lexicon: HALOT
  rationale: Se busca conservar la familia léxica de שוב con una forma nominal que suene natural en español y que mantenga la idea de alejamiento persistente. 'Apostasía' es posible, pero más técnica y más interpretativa.
- source_word: נִצַּחַת
  english_pob_choice: perpetual
  chosen_spanish: perpetuo
  alternatives_spanish:
  - duradero
  - sin fin
  - constante
  lexicon: HALOT
  rationale: Adjetivo directo para continuidad persistente; funciona bien con el sustantivo 'desvío'.
- source_word: הֶחֱזִיקוּ
  english_pob_choice: They hold fast
  chosen_spanish: Se aferran
  alternatives_spanish:
  - se sujetan
  - se adhieren
  - se pegan
  lexicon: HALOT
  rationale: Verbo idiomático que expresa sujeción obstinada y deliberada, equivalente al matiz de 'hold fast'.
- source_word: בַּתַּרְמִית
  english_pob_choice: to deceit
  chosen_spanish: al engaño
  alternatives_spanish:
  - a la falsedad
  - a la trampa
  - a la mentira
  lexicon: HALOT
  rationale: תרמית denota engaño/decepción/treta; 'engaño' es claro y natural en español.
- source_word: מֵאֲנ֖וּ
  english_pob_choice: they refuse
  chosen_spanish: se niegan
  alternatives_spanish:
  - rehúsan
  - se resisten
  - no quieren
  lexicon: HALOT
  rationale: Expresa con precisión la negativa voluntaria y encaja con la sintaxis española.
- source_word: לָשׁוּב
  english_pob_choice: to return
  chosen_spanish: volver
  alternatives_spanish:
  - regresar
  - retornar
  - volver atrás
  lexicon: HALOT
  rationale: '''Volver'' mantiene el nexo léxico con שוב de forma natural y evita expandir el sentido a ''arrepentirse'' más de lo que exige el verso.'
theological_decisions:
- issue: Preservar el juego de שוב / מְשׁוּבָה
  english_pob_reading: Use 'turned away' / 'turning away' / 'return' to preserve the rhetorical contrast between defection and the call to come back.
  chosen_spanish_reading: Usar 'se ha desviado' / 'desvío' / 'volver' para conservar el contraste retórico entre apartarse y regresar.
  alternative_spanish_readings:
  - usar 'apostasía' / 'arrepentirse'
  - usar 'backsliding' transcrito como préstamo
  rationale: El versículo depende de la repetición de la raíz שוב. En español conviene preservar esa red léxica con términos de alejamiento y regreso, sin imponer una lectura doctrinal más explícita que el hebreo.
  doctrine_reference: Principios de transparencia léxica y de equivalencia óptima del proyecto
- issue: Función sintáctica de 'Jerusalén'
  english_pob_reading: Treat 'Jerusalem' appositionally to 'this people' and mark it with dashes.
  chosen_spanish_reading: Tratar 'Jerusalén' en aposición a 'este pueblo', con guiones.
  alternative_spanish_readings:
  - 'leerlo como vocativo: ''¡Jerusalén!'''
  - suprimir la aposición
  rationale: La sintaxis hebrea identifica al pueblo como Jerusalén; la aposición en español evita añadir un vocativo no exigido por el texto.
  doctrine_reference: Principio de fidelidad sintáctica al hebreo base
translation_notes:
  revision_awareness: Se corrigió la validación anterior eliminando notas al pie no ancladas en el texto y manteniendo una redacción publicable sin marcadores huérfanos.
  spanish_consistency_notes:
  - Se prefirió 'volver' para שוב en consonancia con el verso y para mantener la coherencia con la familia léxica de desviación/regreso.
  - Se evitó 'apostasía' como término principal porque en español puede sonar más técnico que el hebreo de este pasaje.
  - Se mantuvo 'Jerusalén' en aposición, con puntuación de interrupción, para reflejar la sintaxis analítica del hebreo.
