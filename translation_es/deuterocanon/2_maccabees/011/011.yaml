translation:
  language: es
  text: Pero, lanzándose contra los enemigos como leones, abatieron a once mil[a] de ellos y a mil seiscientos[b] jinetes; y obligaron a todos a huir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego literalmente: «mil además de diez mil».'
    reason: lexical_alternative
  - marker: b
    text: 'Griego literalmente: «seiscientos además de mil».'
    reason: lexical_alternative
lexical_decisions:
- source_word: λεόντινων
  english_pob_choice: like lions
  chosen_spanish: como leones
  alternatives_spanish:
  - leoninos
  - a la manera de leones
  lexicon: LSJ
  rationale: El giro compara el modo del ataque con la fiereza de los leones; en español, «como leones» conserva la imagen sin forzar un adjetivo poco natural.
- source_word: ἐντινάξαντες
  english_pob_choice: springing
  chosen_spanish: lanzándose
  alternatives_spanish:
  - arremetiendo
  - saltando
  lexicon: LSJ
  rationale: El participio expresa un movimiento súbito y enérgico contra el enemigo. «Lanzándose» transmite bien la rapidez y el ímpetu en español moderno.
- source_word: κατέστρωσαν
  english_pob_choice: struck down
  chosen_spanish: derribaron
  alternatives_spanish:
  - abatieron
  - mataron
  lexicon: LSJ
  rationale: En contexto militar, el verbo indica abatir o matar en combate. «Derribaron» conserva fuerza narrativa y permite mantener la violencia implícita sin sobreespecificar más de lo que el griego exige.
- source_word: χιλίους πρὸς τοῖς μυρίοις
  english_pob_choice: eleven thousand
  chosen_spanish: once mil
  alternatives_spanish:
  - diez mil más mil
  - once mil en total
  lexicon: LSJ
  rationale: El griego dice literalmente «mil además de diez mil». En español, «once mil» comunica el total de manera natural, como en la versión inglesa auditada.
- source_word: ἱππεῖς
  english_pob_choice: horsemen
  chosen_spanish: jinetes
  alternatives_spanish:
  - hombres a caballo
  - caballería
  lexicon: LSJ
  rationale: El término nombra a los soldados montados como personas, no al arma colectiva. «Jinetes» sigue la revisión inglesa que prefirió una traducción personal y resulta idiomática en español.
- source_word: ἑξακοσίους πρὸς χιλίοις
  english_pob_choice: sixteen hundred
  chosen_spanish: mil seiscientos
  alternatives_spanish:
  - seiscientos más mil
  - dieciséis cientos
  lexicon: LSJ
  rationale: La frase aditiva del griego expresa un total de 1,600. «Mil seiscientos» es la forma estándar y clara en español.
- source_word: ἠνάγκασαν φεύγειν
  english_pob_choice: forced them all to flee
  chosen_spanish: a todos los obligaron a huir
  alternatives_spanish:
  - los forzaron a huir
  - los hicieron huir a todos
  lexicon: LSJ
  rationale: La construcción causativa expresa que hicieron huir al enemigo. «Obligaron a huir» conserva la fuerza del verbo y «a todos» refleja el alcance de πάντας.
theological_decisions:
- issue: Tono bélico sin atenuación
  english_pob_reading: The verse presents a direct battle report with strong martial imagery and no theological softening.
  chosen_spanish_reading: Se mantiene el tono militar directo, sin suavizar la violencia del relato.
  alternative_spanish_readings:
  - Se moderó el verbo para hacerlo más neutro
  - Se espiritualizó la imagen
  rationale: El pasaje es un informe de batalla; atenuarlo borraría la fuerza narrativa del griego y del audit trail inglés. No hay base textual para una lectura simbólica.
  doctrine_reference: Narrativa histórica deuterocanónica; fidelidad léxica al relato bélico
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente al tratar ἱππεῖς como personas montadas («jinetes») y no como el arma colectiva («caballería»). También conserva la compresión idiomática de los totales numéricos y mantiene la simetría del relato bélico.
  spanish_consistency_notes:
  - Se usa «como leones» para la comparación, en línea con el sentido adverbial del griego.
  - Se mantiene «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - La puntuación coordina dos acciones bélicas y una conclusión causal final, siguiendo el flujo del griego.
