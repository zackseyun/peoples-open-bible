translation:
  language: es
  text: Y con cualquier animal no te acostarás, para hacerte inmundo con él[a]; y una mujer no se pondrá delante de un animal para aparearse con él[b]; es una perversión[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para inmundicia con él», o «contaminándote con él».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «para ser montada por él» o «para yacer con él»; la expresión se refiere a la relación sexual con un animal.'
    reason: lexical_alternative
  - marker: c
    text: O «confusión» o «ultraje»; el término hebreo denota una violación del orden debido, especialmente en un contexto sexual.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְכָל בְּהֵמָה
  english_pob_choice: And with any animal
  chosen_spanish: Y con cualquier animal
  alternatives_spanish:
  - Y con toda bestia
  - Y con cualquier bestia
  - Y con todo animal
  lexicon: HALOT
  rationale: בְּהֵמָה puede abarcar animal o bestia; en español, «animal» es natural y amplio, y «cualquier» conserva el alcance de כָּל sin restringirlo a ganado u otra subclase.
- source_word: לֹא תִתֵּן
  english_pob_choice: you shall not lie
  chosen_spanish: no te acostarás
  alternatives_spanish:
  - no darás tu acostarte
  - no pondrás tu acostarte
  - no te tenderás
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «dar», el POB inglés ya aclaró que el sentido idiomático es sexual. En español, «acostarse» comunica ese uso idiomático con naturalidad y evita una calca opaca como «dar tu acostarte».
- source_word: שְׁכָבְתְּךָ
  english_pob_choice: your lying
  chosen_spanish: te acostarás
  alternatives_spanish:
  - tu acostamiento
  - tu yacer
  - tu acto de acostarte sexualmente
  lexicon: HALOT
  rationale: La forma hebrea remite al yacer sexual. En español, reproducir la abstracción literal («tu yacer») suena forzado; el verbo pronominal conserva el valor idiomático sin añadir especificaciones ajenas al texto.
- source_word: לְטָמְאָה בָהּ
  english_pob_choice: making yourself unclean with it
  chosen_spanish: para hacerte inmundo con él
  alternatives_spanish:
  - para contaminarte con él
  - para hacerte impuro con él
  - para volverte inmundo con él
  lexicon: HALOT
  rationale: El hebreo expresa finalidad/resultado de impurificación. «Hacerte inmundo» preserva la categoría bíblica de impureza; se evita «contaminarte» por ser menos técnico y «impuro» por sonar más abstracto que el idioma bíblico de inmundicia. Se usa el masculino referido al animal genérico en español.
- source_word: וְאִשָּׁה
  english_pob_choice: and a woman
  chosen_spanish: y una mujer
  alternatives_spanish:
  - y la mujer
  - y una esposa
  lexicon: HALOT
  rationale: אִשָּׁה aquí es genérico, no «esposa». «Una mujer» preserva el término no marcado y la construcción paralela del hebreo.
- source_word: לֹא תַעֲמֹד לִפְנֵי בְהֵמָה
  english_pob_choice: shall not stand before an animal
  chosen_spanish: no se pondrá delante de un animal
  alternatives_spanish:
  - no permanecerá delante de un animal
  - no estará delante de un animal
  - no se presentará delante de un animal
  lexicon: HALOT
  rationale: «Ponerse delante» refleja con claridad el hebreo «estar/colocarse delante». Se evita intensificar demasiado el acto con un verbo interpretativo que sobrespecifique la postura.
- source_word: לְרִבְעָהּ
  english_pob_choice: to mate with it
  chosen_spanish: para unirse con él
  alternatives_spanish:
  - para aparearse con él
  - para montarlo
  - para tener relación con él
  lexicon: HALOT
  rationale: רבע en este contexto apunta a la cópula animal. «Unirse con él» comunica el acto sexual sin crudeza excesiva y sin introducir un tecnicismo zoológico que suene extraño en español bíblico. Se mantiene la ambigüedad relativa del eufemismo hebreo, tal como el POB inglés conservó el sentido mediante «to mate with it».
- source_word: תֶּבֶל
  english_pob_choice: a perversion
  chosen_spanish: una perversión
  alternatives_spanish:
  - confusión
  - una aberración
  - una violación del orden
  lexicon: HALOT
  rationale: תֶּבֶל señala una ruptura del orden debido, sobre todo en contextos sexuales. «Perversión» reproduce mejor en español esa carga moral que «confusión», la cual hoy suele sonar demasiado débil o semánticamente equívoca.
- source_word: הוּא
  english_pob_choice: it is
  chosen_spanish: es
  alternatives_spanish:
  - esto es
  - ello es
  lexicon: HALOT
  rationale: La copulativa española basta para la predicación final y mantiene la identificación categorial del acto prohibido.
theological_decisions:
- issue: Cómo rendir la impureza ritual/moral sin reducirla a higiene ni importar categorías posteriores
  english_pob_reading: making yourself unclean with it
  chosen_spanish_reading: para hacerte inmundo con él
  alternative_spanish_readings:
  - para contaminarte con él
  - para hacerte impuro con él
  rationale: La frase bíblica une defilement ritual y desorden moral. «Hacerte inmundo» conserva el léxico bíblico de inmundicia/impureza sin traducirlo a mera suciedad física ni suavizarlo en una categoría moral abstracta.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Cómo expresar תֶּבֶל sin diluir la fuerza normativa del término
  english_pob_reading: a perversion
  chosen_spanish_reading: una perversión
  alternative_spanish_readings:
  - confusión
  - una aberración
  - una violación del orden
  rationale: El término califica el acto como una infracción grave del orden moral/creacional. «Perversión» comunica esa evaluación con mayor fidelidad comunicativa que «confusión», que en español actual no transmite bien la gravedad del término.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Mantener el referente sexual del hebreo sin obscenizar innecesariamente el español
  english_pob_reading: to mate with it
  chosen_spanish_reading: para unirse con él
  alternative_spanish_readings:
  - para aparearse con él
  - para montarlo
  rationale: El hebreo usa una fórmula sexualmente concreta, pero el POB ya optó por una formulación moderada. «Unirse con él» conserva la referencia al acto prohibido sin introducir un tono más zoológico o más crudo de lo que el pasaje exige.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'El rastro inglés revisó una calca demasiado literal («give your lying») y la sustituyó por una forma idiomática («lie»), además de ajustar la expresión de impureza para mayor naturalidad. Esta versión española sigue esa misma lógica: evita una traducción mecánica de «dar tu yacer», conserva la fuerza sexual y de impureza del hebreo, y mantiene «perversión» para תֶּבֶל conforme al criterio final del POB en inglés.'
  spanish_consistency_notes:
  - Se mantiene «animal» en lugar de «bestia» para leer con naturalidad en español moderno, sin perder el alcance general de בְּהֵמָה.
  - «Inmundo» se usa deliberadamente como término bíblico tradicional de impureza, no como simple suciedad.
  - «Mujer» se conserva como término genérico de אִשָּׁה, no como «esposa».
  - La segunda mitad conserva la estructura paralela y el matiz eufemístico del hebreo, sin convertirla en una paráfrasis explicativa excesiva.
