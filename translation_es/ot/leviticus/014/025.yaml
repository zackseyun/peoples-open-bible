  language: en
  yaml_path: translation/ot/leviticus/014/025.yaml
  text: Then he shall slaughter the guilt-offering lamb[a], and the priest shall take some of the blood of the guilt offering and put it on the lobe of the right ear of the one being cleansed, and on the thumb of his right hand[b], and on the big toe of his right foot.
  footnotes:
