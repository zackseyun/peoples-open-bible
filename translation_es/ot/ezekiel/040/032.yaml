translation:
  language: es
  text: Entonces me llevó al atrio interior por el camino del oriente, y midió la puerta[a] según estas medidas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el portal». El hebreo שַׁעַר puede referirse a la puerta misma o a la estructura de acceso más amplia en esta visión del templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְבִיאֵנִי
  english_pob_choice: Then he brought me
  chosen_spanish: Entonces me llevó
  alternatives_spanish:
  - Y me llevó
  - Luego me llevó
  lexicon: HALOT
  rationale: La forma narrativa encadena una acción con la siguiente; «entonces» expresa bien la secuencia. «Llevó» conserva el valor causativo de הביא y, en español, resulta más natural que una calca más rígida.
- source_word: הֶחָצֵר הַפְּנִימִי
  english_pob_choice: the inner court
  chosen_spanish: el atrio interior
  alternatives_spanish:
  - el patio interior
  - el patio/corte interior
  lexicon: HALOT
  rationale: En contexto de templo, «atrio» comunica con claridad el espacio arquitectónico sagrado. «Interior» conserva la distinción frente a otros atrios y evita ambigüedad.
- source_word: דֶּרֶךְ הַקָּדִים
  english_pob_choice: by way of the east
  chosen_spanish: por el camino del oriente
  alternatives_spanish:
  - por la vía del oriente
  - por el lado del oriente
  - hacia el oriente
  lexicon: HALOT
  rationale: דֶּרֶךְ expresa ruta o acceso; «camino» es natural en español. «Del oriente» mantiene el valor direccional de הַקָּדִים sin convertirlo en un mero punto cardinal abstracto.
- source_word: וַיָּמָד
  english_pob_choice: and he measured
  chosen_spanish: midió
  alternatives_spanish:
  - y midió
  - entonces midió
  lexicon: HALOT
  rationale: El verbo de medición arquitectónica se traduce de manera directa. En español, el sujeto puede omitirse sin perder claridad, y el resultado suena más fluido.
- source_word: הַשַּׁעַר
  english_pob_choice: the gate
  chosen_spanish: la puerta
  alternatives_spanish:
  - la puerta de acceso
  - la puerta/portón
  - el portal
  lexicon: HALOT
  rationale: Aunque שַׁעַר puede abarcar la estructura de acceso más amplia, en español «puerta» funciona bien en un registro legible y no fuerza una especificación técnica. Se mantiene abierta la posibilidad de «puerta» o «portal» según el contexto visionario.
- source_word: כַּמִּדּוֹת הָאֵלֶּה
  english_pob_choice: according to these measurements
  chosen_spanish: según estas medidas
  alternatives_spanish:
  - conforme a estas medidas
  - de acuerdo con estas medidas
  lexicon: HALOT
  rationale: כְּ expresa conformidad; «según» es la forma española más natural y exacta. «Medidas» preserva el campo semántico de dimensión/medición arquitectónica.
translation_notes:
  revision_awareness: El texto inglés POB quedó sin cambios en la última revisión; el control cruzado reporta alta concordancia y solo una cuestión menor, relacionada con la posible amplitud semántica de שַׁעַר. En español se optó por «puerta» para mantener claridad, dejando la alternativa en nota.
  spanish_consistency_notes:
  - Se preservó la secuencia narrativa con un inicio adverbial equivalente a Then.
  - Se evitó «SEÑOR» o terminología teológica no pertinente; el verso es puramente arquitectónico.
  - «Atrio interior» mantiene el registro bíblico sin recurrir a una calca forzada de «court».
  - La nota textual se limita a la amplitud semántica de דֶּרֶךְ/הַקָּדִים; no se introduce variante textual inexistente.
