translation:
  language: es
  text: Porque la codorniz subió del mar para su consuelo.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego usa un sustantivo singular para «codorniz», con valor colectivo; «codornices» también comunicaría el sentido.
