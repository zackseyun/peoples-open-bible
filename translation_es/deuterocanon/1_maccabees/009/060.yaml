revisions:
- from: Y se apartó de venir con una gran fuerza[a], y envió en secreto cartas a todos sus aliados que estaban en Judea, para que prendieran a Jonatán y a los que estaban con él; pero no pudieron[b], porque su plan les fue dado a conocer.
  to: Y se abstuvo de venir con una gran fuerza[a], y envió en secreto cartas a todos sus aliados que estaban en Judea, para que prendieran a Jonatán y a los que estaban con él; pero no pudieron[b], porque su plan fue descubierto por ellos.
  rationale: 'Se hacen dos ajustes menores pero necesarios: (1) se reemplaza «se apartó de venir» por «se abstuvo de venir», que comunica mejor el valor de desistimiento sin calco extraño; y (2) se cambia «su plan les fue dado a conocer» por «su plan fue descubierto por ellos», que expresa con claridad el sentido de exposición de la conspiración documentado en la POB inglesa y evita introducir una agencia externa no marcada en griego. Se conservan el resto de elecciones, que son fieles y legibles.'
