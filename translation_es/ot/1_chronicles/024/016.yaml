translation:
  language: es
  text: para Petaquías, el decimonoveno; para Jehezquel[a], el vigésimo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'Ezequiel'. La forma hebrea de este nombre aquí es יְחֶזְקֵאל / יֶחֶזְקֵאל; se representa con mayor precisión como 'Jehezquel', aunque algunas versiones lo regularizan a la forma más conocida 'Ezequiel'.
