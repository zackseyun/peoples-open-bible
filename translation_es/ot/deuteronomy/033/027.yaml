translation:
  language: es
  text: 'El Dios de antaño es una morada[a], y debajo están los brazos eternos. Echó fuera al enemigo delante de ti, y dijo: «¡Destruye!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El Dios eterno es tu refugio». El hebreo puede entenderse de manera más interpretativa en ese sentido tradicional, aunque la redacción más directa es «El Dios de antaño es una morada».'
    reason: alternative_reading
lexical_decisions:
- source_word: מְעֹנָה
  english_pob_choice: dwelling place
  chosen_spanish: lugar de morada
  alternatives_spanish:
  - morada
  - refugio
  lexicon: HALOT
  rationale: La imagen básica es la de una habitación o sitio habitable/protector. «Lugar de morada» conserva el sustantivo espacial sin reducirlo demasiado a «refugio», que ya sería una interpretación más explícita.
- source_word: אֱלֹהֵי קֶדֶם
  english_pob_choice: The God of old
  chosen_spanish: El Dios de antaño
  alternatives_spanish:
  - El Dios eterno
  - El Dios antiguo
  lexicon: HALOT
  rationale: קֶדֶם apunta primariamente a la antigüedad o a lo que viene de tiempo atrás. «Antaño» comunica esa distancia temporal en español de manera natural, manteniendo la tensión con la lectura tradicional «eterno».
- source_word: וּמִתַּחַת
  english_pob_choice: and underneath
  chosen_spanish: y debajo
  alternatives_spanish:
  - y debajo de
  - y por debajo
  lexicon: HALOT
  rationale: La frase es espacial y poética. «Debajo» es la equivalencia más natural en español y conserva el paralelismo con la cláusula anterior.
- source_word: זְרֹעֹת עוֹלָם
  english_pob_choice: everlasting arms
  chosen_spanish: los brazos eternos
  alternatives_spanish:
  - los brazos perpetuos
  - los brazos de antaño
  lexicon: HALOT
  rationale: זְרֹעֹת se refiere literalmente a «brazos» como metáfora de fuerza y sostén. עוֹלָם expresa duración continua; «eternos» mantiene esa fuerza en español. Se evita una paráfrasis más libre para no perder el eco poético.
- source_word: וַיְגָרֶשׁ
  english_pob_choice: He drove out
  chosen_spanish: Echó fuera
  alternatives_spanish:
  - Expulsó
  - Arrojó fuera
  lexicon: HALOT
  rationale: גרש implica expulsar o echar fuera con fuerza. «Echó fuera» es idiomático y conserva el matiz enérgico del verbo.
- source_word: מִפָּנֶיךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - de tu presencia
  - ante ti
  lexicon: HALOT
  rationale: Literalmente «de delante de tu rostro/presencia». «Delante de ti» es natural en español y mantiene la idea de retirada frente al avance del pueblo.
- source_word: אוֹיֵב
  english_pob_choice: the enemy
  chosen_spanish: al enemigo
  alternatives_spanish:
  - enemigo
  - al adversario
  lexicon: HALOT
  rationale: Aunque singular, puede tener valor colectivo. El español con artículo definido mantiene esa fuerza y suena más natural en la frase verbal.
- source_word: וַיֹּאמֶר
  english_pob_choice: and said
  chosen_spanish: y dijo
  alternatives_spanish:
  - y dijo además
  - y respondió
  lexicon: HALOT
  rationale: Es una simple continuación narrativa. «Y dijo» es la forma más directa y fiel al hebreo.
- source_word: הַשְׁמֵד
  english_pob_choice: Destroy!
  chosen_spanish: ¡Destruye!
  alternatives_spanish:
  - ¡Aniquila!
  - ¡Extermina!
  lexicon: HALOT
  rationale: El imperativo hifil de שמד pide destrucción total. «¡Destruye!» transmite el mandato con fuerza sin añadir más especificidad que el hebreo.
theological_decisions:
- issue: 'Cómo renderizar אֱלֹהֵי קֶדֶם: temporalidad antigua vs. interpretación tradicional de eternidad'
  english_pob_reading: The God of old
  chosen_spanish_reading: El Dios de antaño
  alternative_spanish_readings:
  - El Dios eterno
  - El Dios antiguo
  rationale: La lectura principal sigue el valor temporal de קֶדֶם. Se preserva así el tono del hebreo y la tensión interpretativa que el POB documenta con la alternativa tradicional.
  doctrine_reference: Translation philosophy §1, §3
- issue: Sentido de זְרֹעֹת עוֹלָם como imagen de sostén divino
  english_pob_reading: everlasting arms
  chosen_spanish_reading: los brazos eternos
  alternative_spanish_readings:
  - brazos eternos
  - brazos perpetuos
  rationale: La metáfora de brazos como fuerza protectora se mantiene. «Eternos» conserva la idea de duración sin convertir la frase en una explicación doctrinal más amplia que el texto.
  doctrine_reference: Translation philosophy §2
- issue: Mandato final de destrucción
  english_pob_reading: Destroy!
  chosen_spanish_reading: ¡Destruye!
  alternative_spanish_readings:
  - ¡Aniquila!
  - ¡Extermina!
  rationale: Se mantiene el imperativo breve y absoluto del hebreo sin intensificarlo con un término español más cargado de lo que exige la fuente.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: La versión inglesa auditada ya fue revisada recientemente y quedó sin cambios sustanciales; este borrador español sigue la misma decisión principal, conservando la alternativa tradicional en nota para no borrar la tensión entre la lectura directa del hebreo y la interpretación heredada.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma preferida para el nombre divino cuando aparezca; en este versículo el texto hebreo usa אֱלֹהִים y no requiere esa sustitución.
  - Se conserva el tono poético y la sintaxis breve del hebreo, evitando una paráfrasis explicativa.
  - El artículo definido en «al enemigo» refleja el valor colectivo del singular hebreo sin forzar pluralización.
