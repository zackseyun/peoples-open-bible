translation:
  language: es
  text: Y será, en el día en que Yahvé te dé descanso de tu dolor[a] y de tu agitación, y del duro servicio con la que se te hizo servir[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de tu tristeza» por «de tu dolor».
    reason: lexical_alternative
  - marker: b
    text: O «la dura labor ... que te fue impuesta».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And it shall be
  chosen_spanish: Y será
  alternatives_spanish:
  - Y acontecerá
  - Y acontecerá que
  lexicon: HALOT
  rationale: La fórmula profética introduce una situación futura; «Y será» conserva el valor formal sin volver el español innecesariamente arcaico.
- source_word: בְּיוֹם
  english_pob_choice: in the day when
  chosen_spanish: en el día en que
  alternatives_spanish:
  - cuando
  - el día cuando
  lexicon: HALOT
  rationale: La construcción temporal hebrea se mantiene de manera natural en español con «en el día en que».
- source_word: הָנִיחַ
  english_pob_choice: gives you rest
  chosen_spanish: te dé descanso
  alternatives_spanish:
  - te haga descansar
  - te dé alivio
  lexicon: HALOT
  rationale: El hifil expresa la acción causativa de conceder reposo o alivio; «te dé descanso» es natural y conserva la idea de reposo concedido por Yahvé.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se sigue la norma del proyecto para el Nombre divino, transliterado en español como «Yahvé».
- source_word: מֵעָצְבְּךָ
  english_pob_choice: from your pain
  chosen_spanish: de tu dolor
  alternatives_spanish:
  - de tu tristeza
  - de tu sufrimiento
  lexicon: HALOT
  rationale: עצב puede abarcar dolor, pena o tristeza. Aquí, por el contexto de opresión y trabajo forzado, «dolor» comunica bien la aflicción sin reducirla solo a un estado emocional.
- source_word: וּמֵרָגְזֶךָ
  english_pob_choice: and your turmoil
  chosen_spanish: de tu agitación
  alternatives_spanish:
  - de tu turbación
  - de tu inquietud
  - de tu tumulto interior
  lexicon: HALOT
  rationale: רגז denota agitación, estremecimiento o turbación; «agitación» refleja con claridad ese sentido de inquietud interna y circunstancial.
- source_word: הָעֲבֹדָה הַקָּשָׁה
  english_pob_choice: the hard service
  chosen_spanish: la dura servidumbre
  alternatives_spanish:
  - el duro servicio
  - el trabajo duro
  - la labor dura
  lexicon: HALOT
  rationale: עבודה puede ser servicio, labor o trabajo; en este contexto opresivo, «servidumbre» transmite mejor la carga coercitiva que un mero «trabajo», y «dura» conserva la fuerza de קשה.
- source_word: אֲשֶׁר עֻבַּד בָּךְ
  english_pob_choice: with which you were made to serve
  chosen_spanish: con que fuiste hecho servir
  alternatives_spanish:
  - que te fue impuesta
  - con que fuiste obligado a servir
  - que se te impuso
  lexicon: HALOT
  rationale: El pasivo de עבד con ב conserva la idea de un servicio impuesto o forzado. «Fuiste hecho servir» mantiene la conexión verbal con el servicio y reproduce la coerción del hebreo sin añadir una interpretación más fuerte de la que el texto exige.
theological_decisions:
- issue: Traducción del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton; conforme al estándar del proyecto, se lo rinde como «Yahvé» en el texto principal para preservar el Nombre del pacto y evitar el ocultamiento por una convención de máscara.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el audit trail inglés: se mantiene la estructura temporal, el Nombre divino como Yahvé, y la tensión léxica entre dolor/agitación y la servidumbre impuesta. La redacción española busca ser publicable sin perder la fuerza coercitiva del hebreo.'
  spanish_consistency_notes:
  - Se evita «Señor» como máscara del Nombre divino, conforme a la norma del proyecto.
  - «Servidumbre» se eligió para conservar el matiz opresivo de עבודה en este contexto.
  - La pasiva «fuiste hecho servir» preserva la idea de coerción sin intensificarla con un verbo distinto como «esclavizar».
  - Se mantiene un registro bíblico digno pero en español moderno y claro.
