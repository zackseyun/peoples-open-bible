base_translation:
  language: en
  yaml_path: translation/deuterocanon/2_maccabees/007/004.yaml
  text: And when they were immediately heated[a], he ordered them to cut out the tongue of the one who had been their spokesman, and after scalping him, to cut off his extremities[d][c][b], while the rest of the brothers and the mother looked on.
  footnotes:
  - marker: a
    text: Greek literally, 'of those having been heated red-hot'; the object is supplied from the previous verse, referring to the pans or cauldrons prepared for torture.
    reason: cross_reference
  - marker: b
    text: The Greek term rendered 'spokesman' can also mean 'leader' or 'the one who went before them.' Here it likely refers to the brother who had spoken on behalf of the others.
    reason: lexical_alternative
  - marker: c
    text: The participle rendered 'after scalping him' is rare and difficult; it may more generally mean stripping off skin around him or around his head.
    reason: lexical_alternative
  - marker: d
    text: Or more specifically, 'to cut off his extremities.' The Greek verb denotes severe mutilation, but the exact form is not fully specified in this verse.
    reason: lexical_alternative
