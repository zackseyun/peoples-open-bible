translation:
  language: es
  text: 'Entonces dije al ángel que estaba hablando conmigo: «¿Adónde llevan la efa[a]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la canasta» o «la canasta de medir». El hebreo dice «la efa», una medida estándar para secos, aquí refiriéndose al recipiente visto en la visión.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמַר
  english_pob_choice: Then I said
  chosen_spanish: Entonces dije
  alternatives_spanish:
  - Y dije
  - Así que dije
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol introduce la acción siguiente en secuencia; «Entonces dije» conserva esa progresión natural en español sin recargar el texto.
- source_word: הַמַּלְאָךְ
  english_pob_choice: the angel
  chosen_spanish: el ángel
  alternatives_spanish:
  - el mensajero
  lexicon: HALOT
  rationale: En el contexto visionario de Zacarías, el personaje funciona como ser celestial/intérprete; «ángel» comunica mejor ese valor que «mensajero» en español.
- source_word: הַדֹּבֵר בִּי
  english_pob_choice: who was speaking with me
  chosen_spanish: que estaba hablando conmigo
  alternatives_spanish:
  - que hablaba conmigo
  - que me hablaba
  lexicon: HALOT
  rationale: La construcción participial expresa una acción en curso; «estaba hablando conmigo» refleja bien ese aspecto. Se evita «en mí», porque en esta fórmula de Zacarías el hebreo idiomáticamente significa interacción con el profeta, no habla interior.
- source_word: אָנָה
  english_pob_choice: Where
  chosen_spanish: ¿Adónde?
  alternatives_spanish:
  - ¿Dónde?
  - ¿A dónde?
  lexicon: HALOT
  rationale: El adverbio pregunta por destino o dirección. En español, «¿Adónde?» conserva esa orientación mejor que «¿Dónde?».
- source_word: הֵמָּה
  english_pob_choice: they
  chosen_spanish: llevan
  alternatives_spanish:
  - están llevando
  - las llevan
  lexicon: HALOT
  rationale: El pronombre enfático se integra de manera natural en el verbo implícito de la pregunta; el español no requiere repetir un pronombre explícito aquí.
- source_word: מוֹלִכוֹת
  english_pob_choice: are they taking
  chosen_spanish: llevan
  alternatives_spanish:
  - están llevando
  - transportan
  - se llevan
  lexicon: HALOT
  rationale: El participio hifil de הלך indica hacer ir, es decir, transportar. «Llevan» es breve y natural; conserva la idea de traslado sin introducir un matiz innecesario de «cargar» o «conducir».
- source_word: אֶת הָאֵיפָה
  english_pob_choice: the ephah
  chosen_spanish: la efa
  alternatives_spanish:
  - el ephah
  - la medida
  - la canasta
  lexicon: HALOT
  rationale: Se mantiene el término técnico «efa» para preservar la continuidad del símbolo y la referencia al objeto de la visión. El artículo femenino concuerda con el sustantivo español adoptado.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo de WLC y el audit trail inglés: mantiene la secuencia narrativa, el interlocutor angélico y el término técnico «efa», con una adaptación idiomática mínima para que la pregunta suene natural en español.'
  spanish_consistency_notes:
  - Se usa «ángel» de forma consistente con el contexto visionario, no «mensajero».
  - «Efa» se conserva como término técnico; si el contexto ampliado lo requiere, puede glosarse en nota o en una nota al pie de la sección.
  - La marca de nota [a] se coloca en el hablante angélico, siguiendo el equivalente inglés donde la nota explica la fórmula de habla.
