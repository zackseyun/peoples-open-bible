review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: énfasis en «ustedes mismos», experiencia constatada («han visto»), uso correcto de «Yahvé», y la explicación causal final de que Yahvé ha combatido en favor de Israel. También preserva la nota sobre מִפְּנֵיכֶם. Sin embargo, «delante de ustedes» en el texto principal debilita el matiz expulsivo de מִפְּנֵיכֶם más de lo deseable en español; el inglés pudo sostener «before you» con nota, pero en español suena más ambiguo. Además, «ha peleado» es comprensible, pero «ha combatido» o «ha luchado» encaja mejor con registro bíblico digno.'
  spanish_quality_summary: El español es natural y legible, pero puede afinarse para mayor precisión y dignidad. «Y ustedes mismos» suena algo redundante tras la conjunción; «Y ustedes mismos» es aceptable, pero el punto principal a corregir es «delante de ustedes», que en español moderno no comunica tan bien la idea de expulsión/remoción. «Es quien ha combatido por ustedes» mejora ligeramente el registro. El resto del verso es claro y bien formado.
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יְהוָה → «Yahvé» correctamente; אֱלֹהֵיכֶם → «su Dios» funciona para plural de cortesía amplio; no hay conflictos con términos doctrinales mayores. La excepción recomendada es léxica-contextual: ajustar מִפְּנֵיכֶם a «de delante de ustedes» en el texto principal para conservar mejor el valor espacial-expulsivo documentado en la auditoría inglesa.'
  issues:
  - severity: medium
    issue: «delante de ustedes» atenúa el matiz de מִפְּנֵיכֶם
    rationale: El hebreo literalmente expresa «de delante de ustedes», con sentido idiomático de expulsión desde la presencia de Israel. En español, «delante de ustedes» puede entenderse solo como ubicación, no como remoción. Dado que la nota ya explica el modismo, conviene que el texto principal preserve más de la forma fuente.
  - severity: low
    issue: «ha peleado» puede mejorarse a «ha combatido»
    rationale: «Pelear» es correcto, pero «combatir» suena más digno y bíblicamente sobrio en este contexto de guerra santa/campaña militar, sin alterar el significado.
  revised_spanish_text: Y ustedes mismos han visto todo lo que Yahvé su Dios ha hecho a todas estas naciones de delante de ustedes[a], porque Yahvé su Dios es quien ha combatido por ustedes.
  revised_footnotes:
