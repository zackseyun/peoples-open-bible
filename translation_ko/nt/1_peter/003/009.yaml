id: 1PE.3.9
reference: 1 Peter 3:9
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: μὴ ἀποδιδόντες κακὸν ἀντὶ κακοῦ ἢ λοιδορίαν ἀντὶ λοιδορίας τοὐναντίον δὲ εὐλογοῦντες, ὅτι εἰς τοῦτο ἐκλήθητε ἵνα εὐλογίαν κληρονομήσητε.
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/003/009.yaml
  text: 'not repaying evil for evil or insult for insult, but on the contrary blessing, because you were called to this, so that you might inherit a blessing.'
translation:
  language: ko
  text: '악을 악으로 갚지 말고 욕을 욕으로 갚지 마십시오. 도리어 축복하십시오. 이는 여러분이 이 일에 부르심을 받은 까닭이며, 또한 복을 유업으로 받게 하려는 것입니다.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: κακὸν ἀντὶ κακοῦ
  english_pob_choice: evil for evil
  chosen_korean: 악을 악으로
  alternatives_korean:
  - 악으로 악을
  lexicon: BDAG
  rationale: 한국어 어순에서 「악을 악으로 갚다」가 자연스럽다.
- source_word: λοιδορίαν ἀντὶ λοιδορίας
  english_pob_choice: insult for insult
  chosen_korean: 욕을 욕으로
  alternatives_korean:
  - 모욕을 모욕으로
  lexicon: BDAG
  rationale: 2:23의 λοιδορούμενος와 어근 동일. 「욕」으로 통일.
- source_word: εὐλογοῦντες
  english_pob_choice: blessing
  chosen_korean: 축복하십시오
  alternatives_korean:
  - 복을 빌어 주십시오
  - 복을 빌며 응대하십시오
  lexicon: BDAG
  rationale: εὐλογέω의 「복을 빎」을 「축복하다」로 옮긴다 (눅 6:28 참조).
- source_word: εὐλογίαν κληρονομήσητε
  english_pob_choice: inherit a blessing
  chosen_korean: 복을 유업으로 받게
  alternatives_korean:
  - 복을 상속받게
  - 축복을 기업으로 받게
  lexicon: BDAG
  rationale: 1:4의 κληρονομία(유업)와 어휘 일관성. 「유업으로 받다」로 옮긴다.
