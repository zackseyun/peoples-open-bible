translation:
  language: es
  text: Y mi fidelidad y mi amor constante estarán con él, y en mi nombre su cuerno[a] será exaltado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Cuerno» es una imagen hebrea de fuerza, dignidad o poder real.
    reason: cultural_note
lexical_decisions:
- source_word: אֱמוּנָתִי
  english_pob_choice: my faithfulness
  chosen_spanish: mi fidelidad
  alternatives_spanish:
  - mi fe
  - mi confiabilidad
  lexicon: HALOT
  rationale: אֱמוּנָה aquí expresa la fidelidad/dependencia confiable de Yahvé, no la fe humana. «Fidelidad» comunica bien el sentido pactal y la relación paralela con חַסְדִּי.
- source_word: חַסְדִּי
  english_pob_choice: my steadfast love
  chosen_spanish: mi amor constante
  alternatives_spanish:
  - mi amor leal
  - mi misericordia
  - mi amor de pacto
  lexicon: HALOT
  rationale: חֶסֶד en contexto de pacto combina amor, lealtad y constancia. «Amor constante» preserva esa fuerza relacional en un español claro y digno, sin reducirlo a «misericordia».
- source_word: עִמּוֹ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto a él
  lexicon: HALOT
  rationale: La preposición עִם con sufijo personal significa simplemente presencia acompañante. «Con él» es la equivalencia directa y natural en español.
- source_word: בִּשְׁמִי
  english_pob_choice: in my name
  chosen_spanish: en mi nombre
  alternatives_spanish:
  - por mi nombre
  - bajo mi nombre
  lexicon: HALOT
  rationale: La frase hebrea se mantiene de forma idiomática como «en mi nombre», conservando la idea de autoridad, respaldo y estatus derivados del nombre divino.
- source_word: תָּר֥וּם
  english_pob_choice: will be exalted
  chosen_spanish: será exaltado
  alternatives_spanish:
  - será levantado
  - subirá en alto
  lexicon: HALOT
  rationale: רוּם puede expresar elevación/exaltación. Dado que el objeto es «su cuerno», «será exaltado» suena natural en español y preserva el valor figurado sin borrar la imagen.
- source_word: קַרְנֽוֹ
  english_pob_choice: his horn
  chosen_spanish: su cuerno
  alternatives_spanish:
  - su fuerza
  - su poder
  - su dignidad
  lexicon: HALOT
  rationale: Se retiene la metáfora de קֶרֶן para conservar la imaginería real y de fuerza. En español «cuerno» puede sonar extrañado, pero aquí es una imagen poética bíblica intencional que no conviene sustituir en el texto principal.
theological_decisions:
- issue: Preservación de la metáfora real del cuerno
  english_pob_reading: his horn will be exalted
  chosen_spanish_reading: será exaltado su cuerno
  alternative_spanish_readings:
  - será exaltada su fuerza
  - aumentará su poder
  rationale: El hebreo usa una imagen de poder, dignidad y realeza. Mantener «cuerno» conserva el símbolo bíblico y el tono poético del salmo; la explicación puede ir en nota, pero no debe sustituirse en el cuerpo del texto.
  doctrine_reference: Translation philosophy §1, §5
- issue: Correspondencia de la pareja pactal fidelidad / amor constante
  english_pob_reading: my faithfulness and my steadfast love
  chosen_spanish_reading: mi fidelidad y mi amor constante
  alternative_spanish_readings:
  - mi fidelidad y mi amor leal
  - mi fidelidad y mi misericordia
  rationale: La combinación hebrea apunta a la confiabilidad de Yahvé y a su lealtad pactal. «Fidelidad» y «amor constante» reproducen esa pareja semántica sin caer en arcaísmos ni en una reducción afectiva.
  doctrine_reference: Translation philosophy §2, §4
translation_notes:
  revision_awareness: El audit trail inglés revisó la segunda cláusula de «will be lifted up» a «will be exalted» por mayor naturalidad idiomática; la versión española sigue esa última decisión y mantiene el paralelo poético del hebreo con registro formal.
  spanish_consistency_notes:
  - Se usa «Yahvé» como nombre divino cuando corresponda en esta serie; aquí el verso no lo explicita, pero el posesivo de primera persona mantiene la voz divina implícita del hebreo.
  - Se conserva el metáfora de «cuerno» en el texto principal por coherencia con la política POB de mantener imágenes bíblicas audibles.
  - «Fidelidad» y «amor constante» reflejan el binomio covenantal de אֱמוּנָה y חֶסֶד sin introducir vocabulario eclesiástico ajeno al texto.
