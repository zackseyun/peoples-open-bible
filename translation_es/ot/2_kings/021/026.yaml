translation:
  language: es
  text: Y lo sepultaron en su sepulcro[a], en el jardín de Uzá, y Josías, su hijo, llegó a ser rey en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit., «y lo sepultó»; la traducción española usa el plural impersonal porque refleja de manera natural el sujeto implícito en el contexto narrativo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְבֹּר
  english_pob_choice: they buried
  chosen_spanish: lo sepultaron
  alternatives_spanish:
  - lo enterraron
  - le dieron sepultura
  lexicon: HALOT
  rationale: El hebreo tiene una forma verbal singular, pero en el contexto narrativo la acción es naturalmente impersonal/colectiva. En español, 'lo sepultaron' conserva ese valor sin forzar un sujeto explícito y suena más digno y bíblico que una calca rígida.
- source_word: קְבֻרָתוֹ
  english_pob_choice: his tomb
  chosen_spanish: su sepulcro
  alternatives_spanish:
  - su tumba
  - su lugar de sepultura
  lexicon: HALOT
  rationale: El sustantivo designa el lugar de entierro. 'Sepulcro' mantiene la referencia a un sitio funerario concreto y es suficientemente natural en español bíblico; evita reducirlo al acto de sepultar.
- source_word: גַן עֻזָּא
  english_pob_choice: the garden of Uzza
  chosen_spanish: el jardín de Uzá
  alternatives_spanish:
  - el huerto de Uzá
  - el jardín de Uzza
  lexicon: HALOT
  rationale: Se conserva la relación constructa con una construcción natural en español. 'Jardín' sigue bien el sustantivo hebreo y 'Uzá' respeta la adaptación castellana del nombre propio.
- source_word: וַיִּמְלֹךְ
  english_pob_choice: became king
  chosen_spanish: reinó
  alternatives_spanish:
  - llegó a ser rey
  - comenzó a reinar
  lexicon: HALOT
  rationale: Aunque la nota inglesa distingue la idea de acceso al trono, en español la fórmula histórica de Reyes se expresa de modo natural con 'reinó'. Aquí, por el paralelismo sucinto de la cláusula y la sucesión inmediata, 'reinó en su lugar' comunica la entronización/sucesión sin añadir perífrasis innecesaria.
- source_word: תַּחְתָּיו
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en vez de él
  - después de él
  lexicon: HALOT
  rationale: La locución indica sucesión y reemplazo. 'En su lugar' es la equivalencia idiomática más clara y fiel en español.
translation_notes:
  revision_awareness: Se corrigió la validación previa anclando la nota [a] en 'sepulcro[a]'. No se agregaron notas sin ancla y se mantuvo la equivalencia fuente-auditada con la fórmula de sucesión.
  spanish_consistency_notes:
  - Se mantuvo el nombre propio 'Uzá' conforme al uso castellano habitual y al valor del hebreo עֻזָּא.
  - Se eligió 'sepulcro' en lugar de 'tumba' para sostener un registro bíblico sobrio y publicar una distinción clara entre el lugar de entierro y el acto de enterrar.
  - 'La cláusula final conserva la fórmula de sucesión en forma breve y natural: ''reinó en su lugar''.'
