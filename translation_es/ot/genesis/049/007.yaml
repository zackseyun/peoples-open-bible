translation:
  language: es
  text: Maldita sea su ira[a], porque es feroz, y su furor, porque es violento. Los dividiré en Jacob y los dispersaré en Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Maldita es su ira ... y su furor, porque es violento»'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָרוּר
  english_pob_choice: Cursed be
  chosen_spanish: Maldita sea
  alternatives_spanish:
  - Sea maldita
  - Sea maldito
  lexicon: HALOT
  rationale: La forma hebrea expresa una declaración de maldición en estilo poético. En español, «Maldita sea» comunica esa fuerza declarativa sin convertirla en una simple descripción.
- source_word: אַפָּם
  english_pob_choice: their anger
  chosen_spanish: su ira
  alternatives_spanish:
  - su enojo
  - su furor
  lexicon: HALOT
  rationale: El hebreo usa un idiomático «nariz/rostro» para la ira. Dado que el contexto es de violencia y juicio, «ira» transmite mejor el sentido léxico que una traducción corporal literal.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la maldición. «Porque» mantiene la relación causal de manera natural en español.
- source_word: עָז
  english_pob_choice: fierce
  chosen_spanish: feroz
  alternatives_spanish:
  - fuerte
  - violenta
  lexicon: HALOT
  rationale: En contexto de ira, el término apunta a intensidad destructiva; «feroz» conserva ese matiz mejor que «fuerte».
- source_word: וְעֶבְרָתָם
  english_pob_choice: and their wrath
  chosen_spanish: y su furor
  alternatives_spanish:
  - y su ira
  - y su cólera
  lexicon: HALOT
  rationale: עֶבְרָה expresa ira desbordada, con una carga más intensa que una simple molestia. «Furor» mantiene esa elevación y violencia del paralelo poético.
- source_word: קָשָׁתָה
  english_pob_choice: it is harsh
  chosen_spanish: es duro
  alternatives_spanish:
  - es áspero
  - es severo
  lexicon: HALOT
  rationale: La revisión inglesa prefirió «harsh» sobre «cruel» para acercarse más al campo semántico de dureza/severidad. En español, «duro» conserva esa severidad sin añadir una valoración moral más fuerte de la que exige el hebreo.
- source_word: אֲחַלְּקֵם
  english_pob_choice: I will divide them
  chosen_spanish: Los dividiré
  alternatives_spanish:
  - Los repartiré
  - Los apartaré
  lexicon: HALOT
  rationale: El verbo en primera persona expresa una acción futura del hablante sobre ellos. «Dividiré» preserva la imagen verbal y la correspondencia con la dispersión posterior.
- source_word: בְּיַעֲקֹב
  english_pob_choice: in Jacob
  chosen_spanish: en Jacob
  alternatives_spanish:
  - dentro de Jacob
  lexicon: HALOT
  rationale: Se mantiene el nombre propio como designación colectiva del pueblo descendiente de Jacob. «En Jacob» conserva el paralelismo con la línea siguiente.
- source_word: וַאֲפִיצֵם
  english_pob_choice: and scatter them
  chosen_spanish: y los dispersaré
  alternatives_spanish:
  - y los esparciré
  - y los desparramaré
  lexicon: HALOT
  rationale: El verbo causativo expresa dispersión. «Dispersaré» es la opción más natural y fiel al juicio anunciado.
- source_word: בְּיִשְׂרָאֵל
  english_pob_choice: in Israel
  chosen_spanish: en Israel
  alternatives_spanish:
  - dentro de Israel
  lexicon: HALOT
  rationale: Se conserva el segundo miembro del paralelismo nominal con el mismo valor corporativo que «Jacob».
theological_decisions:
- issue: Objeto de la maldición
  english_pob_reading: The curse falls on Simeon and Levi's anger and wrath, not directly on their persons.
  chosen_spanish_reading: La maldición recae sobre su ira y su furor, no directamente sobre sus personas.
  alternative_spanish_readings:
  - Se maldice a las personas mismas
  - La maldición recae sobre toda la tribu
  rationale: El hebreo nombra explícitamente la ira y el furor como objeto de la maldición. La redacción española conserva esa tensión y evita ampliar el juicio más allá de lo que dice el texto.
  doctrine_reference: Principio de primacía del original; preservar la distinción entre disposición/acto y persona.
translation_notes:
  revision_awareness: La base inglesa revisó «cruel» a «harsh» para acercarse mejor al hebreo de dureza/severidad. La versión española refleja esa revisión con «duro» y mantiene la distinción del objeto de la maldición sobre la ira/furor, no sobre las personas.
  spanish_consistency_notes:
  - Se usó «Yahvé» como convención general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó «SEÑOR» y también «Cristo», pues no corresponden al contenido del versículo.
  - Se mantuvo el paralelismo Jacob/Israel para conservar la estructura poética del hebreo.
  - «Ira» y «furor» distinguen dos términos cercanos pero no idénticos del original, sin colapsarlos en una sola palabra.
