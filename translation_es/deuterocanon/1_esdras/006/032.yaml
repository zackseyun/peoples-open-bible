translation:
  language: es
  text: Por tanto, que Yahvé[a], cuyo nombre ha sido invocado allí, destruya a todo rey y a toda nación que extienda su mano para impedir o dañar aquella casa de Yahvé en Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «cuyo nombre es llamado allí». El griego puede entenderse de manera más literal así; «ha sido invocado allí» destaca mejor el sentido cultual en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ ταῦτα
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: LSJ
  rationale: Expresa la consecuencia o conclusión de la fórmula con un giro natural en español, manteniendo el valor inferencial sin volverlo mecánico.
- source_word: ὁ κύριος
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: LSJ
  rationale: El contexto remite al Dios de Israel y, según la terminología del proyecto, el nombre divino se vierte como 'Yahvé' en vez de ocultarlo con una sustitución reverencial.
- source_word: οὗ τὸ ὄνομα αὐτοῦ ἐπικέκληται ἐκεῖ
  english_pob_choice: whose name has been invoked there
  chosen_spanish: cuyo nombre ha sido invocado allí
  alternatives_spanish:
  - cuyo nombre es llamado allí
  - cuyo nombre ha sido llamado allí
  lexicon: LSJ
  rationale: '''Ha sido invocado'' conserva el matiz cultual del perfecto pasivo y sugiere que el nombre divino está asociado con ese lugar, sin forzar una paráfrasis más amplia.'
- source_word: ἀφανίσαι
  english_pob_choice: destroy
  chosen_spanish: destruya
  alternatives_spanish:
  - aniquile
  - arruine
  lexicon: LSJ
  rationale: 'En el contexto de imprecación/decreto, el subjuntivo en español reproduce bien el valor de deseo o sentencia: una destrucción total y judicial.'
- source_word: πάντα βασιλέα καὶ ἔθνος
  english_pob_choice: every king and nation
  chosen_spanish: a todo rey y a toda nación
  alternatives_spanish:
  - a cualquier rey y nación
  - a todo rey y pueblo
  lexicon: LSJ
  rationale: La construcción distributiva se refleja de manera natural con 'a todo... y a toda...'. 'Nación' preserva ἔθνος sin reducirlo a un solo matiz étnico o político.
- source_word: ὃς ἐκτενεῖ χεῖρα αὐτοῦ
  english_pob_choice: that stretches out his hand
  chosen_spanish: que extienda su mano
  alternatives_spanish:
  - que alce su mano
  - que tienda su mano
  lexicon: LSJ
  rationale: Mantiene la imagen idiomática bíblica de extender la mano como acto hostil o de intervención. 'Su mano' concuerda con el antecedente colectivo implícito en el relativo singular distributivo.
- source_word: κωλῦσαι
  english_pob_choice: to hinder
  chosen_spanish: impedir
  alternatives_spanish:
  - estorbar
  - detener
  lexicon: LSJ
  rationale: '''Impedir'' es el equivalente más claro y formal en español para la obstrucción de la obra del templo.'
- source_word: κακοποιῆσαι
  english_pob_choice: to harm
  chosen_spanish: dañar
  alternatives_spanish:
  - hacer mal a
  - perjudicar
  lexicon: LSJ
  rationale: '''Dañar'' comunica la acción hostil sin estrechar indebidamente el sentido a daño físico בלבד.'
- source_word: τὸν οἶκον Κυρίου ἐκεῖνον τὸν ἐν Ἰερουσαλήμ
  english_pob_choice: that house of the Lord there in Jerusalem
  chosen_spanish: aquella casa de Yahvé allí en Jerusalén
  alternatives_spanish:
  - ese templo de Yahvé en Jerusalén
  - aquella casa del Señor allí en Jerusalén
  lexicon: LSJ
  rationale: '''Casa de Yahvé'' preserva el lenguaje del santuario y el énfasis deíctico de ἐκεῖνον/''allí''. Se evita ''templo'' para no reemplazar el idiomático ''casa'' del texto fuente.'
theological_decisions:
- issue: Nombre divino y fórmula de invocación del templo
  english_pob_reading: whose name has been invoked there
  chosen_spanish_reading: cuyo nombre ha sido invocado allí
  alternative_spanish_readings:
  - cuyo nombre es llamado allí
  - cuyo nombre ha sido llamado allí
  rationale: La frase conserva la asociación teológica entre el nombre de Dios y el lugar de culto en Jerusalén. 'Invocado' expresa bien el uso cultual sin añadir un comentario interpretativo ajeno al griego.
  doctrine_reference: DOCTRINE.md §§1, 3, 5
- issue: Fuerza del verbo ἀφανίσαι en una fórmula de imprecación/decreto
  english_pob_reading: may the Lord ... destroy
  chosen_spanish_reading: que Yahvé ... destruya
  alternative_spanish_readings:
  - que Yahvé ... aniquile
  - que Yahvé ... arruine
  rationale: En español, la subordinada con 'que' y subjuntivo reproduce de modo natural el valor jussivo o desiderativo del infinitivo en este contexto. No se convierte en futuro indicativo para no alterar la fuerza modal.
  doctrine_reference: DOCTRINE.md §1
- issue: Terminología del lugar sagrado
  english_pob_reading: that house of the Lord there in Jerusalem
  chosen_spanish_reading: aquella casa de Yahvé allí en Jerusalén
  alternative_spanish_readings:
  - ese templo de Yahvé en Jerusalén
  - aquella casa del Señor allí en Jerusalén
  rationale: Se conserva 'casa' por fidelidad al sintagma del texto y al énfasis demostrativo; 'templo' sería explicativo, pero menos literal al sustantivo οἶκος.
  doctrine_reference: DOCTRINE.md §§1, 5
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el griego de Swete y refleja el ajuste de concordancia del audit trail en la frase distributiva: el relativo singular mantiene valor genérico, por lo que en español se usa ''extienda su mano'' con antecedente colectivo implícito (''todo rey y toda nación''). También se preserva la tensión lexical entre ''cuyo nombre ha sido invocado allí'' y la alternativa más literal ''cuyo nombre es llamado allí''.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' conforme a la terminología por defecto del proyecto para יהוה/κύριος en contexto divino.
  - '''Casa de Yahvé'' conserva el idioma bíblico del santuario y evita sustituirlo automáticamente por ''templo''.'
  - La subordinada con subjuntivo ('que Yahvé destruya') reproduce la fuerza imprecativa del infinitivo griego en español natural.
  - '''Impedir o dañar'' refleja κωλῦσαι ἢ κακοποιῆσαι sin sobreespecificar el tipo de daño.'
