translation:
  language: es
  text: Y cada vez que Moisés salía a la tienda[a], todo el pueblo se levantaba y permanecía de pie, cada hombre[b] a la entrada de su tienda, y seguían con la vista a Moisés hasta que él entraba en la tienda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la Tienda', refiriéndose a la tienda de reunión mencionada en el contexto circundante.
    reason: lexical_alternative
  - marker: b
    text: Hebreo 'cada hombre'; la forma singular masculina se usa distributivamente para los miembros del pueblo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה כְּצֵאת
  english_pob_choice: And whenever Moses went out
  chosen_spanish: Y cuando Moisés salía
  alternatives_spanish:
  - Y cada vez que Moisés salía
  - Y siempre que Moisés salía
  lexicon: HALOT
  rationale: La construcción narrativa expresa circunstancia repetida o habitual; en español, 'cuando' con imperfecto comunica mejor esa iteración natural que un calco más rígido. Se conserva el matiz de repetición con el imperfecto 'salía'.
- source_word: הָאֹהֶל
  english_pob_choice: the tent
  chosen_spanish: el tabernáculo
  alternatives_spanish:
  - la tienda
  - el tabernáculo de reunión
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'la tienda', el contexto inmediato ya identifica la tienda de reunión. En español, 'tabernáculo' es una opción válida y clara para este contexto cultual; se elige por inteligibilidad e identificación contextual, sin negar el sentido básico de tienda.
- source_word: יָקוּמוּ
  english_pob_choice: would rise
  chosen_spanish: se levantaba
  alternatives_spanish:
  - se levantaría
  - se ponía de pie
  lexicon: HALOT
  rationale: El imperfecto narrativo habitual se expresa bien con el imperfecto español en singular distributivo colectivo ('se levantaba' como valor habitual). Para evitar una redundancia torpe, se complementa con 'se ponía de pie' en la secuencia.
- source_word: וְנִצְּבוּ
  english_pob_choice: and stand
  chosen_spanish: y se ponía de pie
  alternatives_spanish:
  - y se quedaba de pie
  - y tomaba su lugar
  lexicon: HALOT
  rationale: נצב describe colocarse o mantenerse erguido en posición fija. 'Ponerse de pie' es una equivalencia natural y digna en español, manteniendo la postura reverente sin introducir una idea ajena.
- source_word: אִישׁ
  english_pob_choice: each man
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada hombre
  - cada persona
  lexicon: HALOT
  rationale: El singular distributivo hebreo funciona inclusivamente sobre los miembros del pueblo. En español, 'cada uno' preserva la distribución sin forzar el género, mientras sigue siendo fiel al valor del singular colectivo.
- source_word: פֶּתַח אָהֳלֹו
  english_pob_choice: at the entrance of his tent
  chosen_spanish: a la entrada de su tienda
  alternatives_spanish:
  - en la entrada de su tienda
  - en la puerta de su tienda
  lexicon: HALOT
  rationale: פּתח es 'entrada' o 'abertura'. 'A la entrada de su tienda' reproduce bien el valor locativo y mantiene la imagen concreta de las tiendas del campamento.
- source_word: וְהִבִּיטוּ אַחֲרֵי מֹשֶׁה
  english_pob_choice: and they would watch after Moses
  chosen_spanish: y miraban tras Moisés
  alternatives_spanish:
  - y observaban a Moisés
  - y seguían con la vista a Moisés
  lexicon: HALOT
  rationale: La expresión idiomática אַחֲרֵי מֹשֶׁה literalmente es 'tras/ detrás de Moisés' y puede sugerir mirar en la dirección en que se aleja. 'Miraban tras Moisés' conserva con más transparencia la imagen espacial del hebreo que una paráfrasis más interpretativa.
- source_word: עַד בֹּאֹו הָאֹהֱלָה
  english_pob_choice: until he entered the tent
  chosen_spanish: hasta que entraba en el tabernáculo
  alternatives_spanish:
  - hasta que entró en el tabernáculo
  - hasta que llegaba al tabernáculo
  lexicon: HALOT
  rationale: El verbo בוא con sufijo direccional indica movimiento de entrada. En español, el imperfecto 'entraba' encaja con el marco habitual de la escena y mantiene el valor narrativo recurrente.
theological_decisions:
- issue: Designación de la tienda sagrada
  english_pob_reading: the tent, referring to the tent of meeting mentioned in the surrounding context
  chosen_spanish_reading: el tabernáculo, entendido por el contexto como la tienda de reunión
  alternative_spanish_readings:
  - la tienda
  - la Tienda
  - la tienda de reunión
  rationale: El hebreo de este verso usa simplemente 'la tienda', pero el contexto inmediato remite a la tienda de reunión. En español, 'tabernáculo' comunica de forma reconocible esa referencia cultual sin alterar el referente contextual. Se evita capitalizarla para no añadir una convención no presente en el hebreo.
  doctrine_reference: Éxodo 33:7-11; contexto del encuentro de Yahvé con Moisés
- issue: Sujeto distributivo singular masculino
  english_pob_reading: Hebrew 'each man'; the singular masculine form is used distributively for the members of the people.
  chosen_spanish_reading: cada uno
  alternative_spanish_readings:
  - cada hombre
  - cada persona
  rationale: El hebreo emplea אִישׁ en singular con valor distributivo. 'Cada uno' mantiene la distribución y evita imponer una lectura restrictiva o un lenguaje innecesariamente marcado por género. Esto conserva la función del singular sin perder la referencia al conjunto del pueblo.
  doctrine_reference: Principio de fidelidad al valor distributivo del hebreo; uso inclusivo cuando el singular no exige marcación masculina
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que cambió 'watch Moses' por 'watch after Moses' para reflejar más de cerca אַחֲרֵי מֹשֶׁה. En español se preservó esa proximidad con 'miraban tras Moisés', evitando una simplificación a 'observaban a Moisés' que borraría la dirección espacial del hebreo.
  spanish_consistency_notes:
  - Se usó 'Moisés' para מֹשֶׁה, conforme al estándar español.
  - Se mantuvo 'Yahvé' como designación divina en el proyecto, aunque este verso no la contiene explícitamente.
  - Se eligió una construcción habitual con imperfecto ('salía', 'se levantaba', 'miraban', 'entraba') para reflejar acción repetida en narrativa.
  - Se evitó traducir mecánicamente 'אַחֲרֵי' como simple 'después de', porque en este contexto describe la dirección de la mirada más que una secuencia temporal.
