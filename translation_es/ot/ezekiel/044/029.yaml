review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura del hebreo y la lista de porciones sacerdotales: מִנְחָה, חַטָּאת, אָשָׁם, seguido de חֵרֶם en Israel que pertenece a los sacerdotes. Sin embargo, hay dos puntos mejorables frente al rastro auditado: (1) מִנְחָה se alinea mejor con ‘ofrenda de cereal’ o ‘ofrenda de grano’ que con ‘ofrenda vegetal’, porque el inglés POB justificó específicamente ‘grain offering’ como término cúltico establecido; ‘vegetal’ suena más amplio y menos técnico. (2) חֵרֶם como ‘cosa dedicada’ es aceptable, pero ‘todo lo dedicado’ suena más natural y mantiene mejor el valor técnico de cosa/devoción sin la torpeza de ‘cosa’.'
  spanish_quality_summary: El español es claro y comprensible, pero ‘ofrenda vegetal’ no suena idiomáticamente fuerte en registro bíblico-cúltico y puede sugerir una categoría moderna o demasiado amplia. La nota b contiene ‘devotada’, forma no natural en español estándar; debe corregirse. ‘Toda cosa dedicada’ es entendible pero menos fluido que ‘todo lo dedicado’.
  glossary_alignment: 'No hay conflicto con los términos globales principales del proyecto. En terminología sacrificial, conviene acercarse al razonamiento documentado: ‘ofrenda de cereal’, ‘ofrenda por el pecado’, ‘ofrenda por la culpa’. Para חֵרֶם, ‘todo lo dedicado’ preserva mejor el sentido técnico que ‘cosa dedicada’, con nota que explique ‘consagrado irrevocablemente a Dios’ y el posible matiz de ‘dedicado a destrucción’ en otros contextos.'
  issues:
  - severity: medium
    issue: ‘Ofrenda vegetal’ para מִנְחָה
    rationale: Aunque comunica que no es una ofrenda animal, no corresponde tan bien al término cúltico específico ‘grain offering’ documentado en el English POB. ‘Vegetal’ es más amplio que cereal/grano y menos natural en español bíblico.
  - severity: medium
    issue: ‘Toda cosa dedicada’ para חֵרֶם
    rationale: Es comprensible, pero algo rígido y menos idiomático. ‘Todo lo dedicado’ suena más natural y conserva el referente neutro/abarcador del hebreo.
  - severity: high
    issue: La nota al pie usa ‘cosa devotada’
    rationale: ‘Devotada’ no es forma estándar adecuada en español neutral; afecta la calidad y puede confundir. Debe reemplazarse por una explicación léxica correcta del sentido técnico de חֵרֶם.
  revised_spanish_text: Ellos comerán la ofrenda de cereal, la ofrenda por el pecado y la ofrenda por la culpa, y todo lo dedicado[a] en Israel será de ellos.
