revisions:
- from: 'Entonces Samuel dijo a Saúl: “No volveré contigo, porque has rechazado la palabra de Yahvé, y Yahvé te ha rechazado para que no seas rey sobre Israel.”'
  to: 'Entonces Samuel dijo a Saúl: «No volveré contigo, porque has rechazado la palabra de Yahvé, y Yahvé te ha rechazado de ser rey sobre Israel».'
  rationale: Se sustituye “para que no seas” por “de ser” para reflejar con mayor fidelidad el hebreo מִהְיוֹת, que expresa remoción del cargo, no finalidad. Se mantiene “rey sobre Israel” por la presencia de עַל, y se conserva la repetición de “rechazado” para preservar el paralelismo teológico y retórico del original.
  reviewer_model: gpt-5.4
