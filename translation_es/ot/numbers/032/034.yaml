translation:
  language: es
  text: Los hijos de Gad[b] construyeron[a] Dibón, Atarot y Aroer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «reedificaron» o «fortificaron» en el contexto; el verbo hebreo en sí es simplemente «construyeron».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «hijos de Gad»; es decir, miembros de la tribu de Gad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבְנוּ
  english_pob_choice: built
  chosen_spanish: edificaron
  alternatives_spanish:
  - construyeron
  - reedificaron
  - fortificaron
  lexicon: HALOT
  rationale: El hebreo בנה expresa aquí la acción básica de construir. En español, «edificaron» conserva el sentido narrativo simple y es natural en un contexto de ciudades. No se explicita «reedificaron» ni «fortificaron» porque esas inferencias no están exigidas por el verbo hebreo en sí.
- source_word: בְנֵי גָד
  english_pob_choice: The sons of Gad
  chosen_spanish: los hijos de Gad
  alternatives_spanish:
  - los gaditas
  - los descendientes de Gad
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «hijos de Gad». Se mantiene esa formulación para reflejar de cerca la construcción tribal del original. «Gaditas» es idiomático, pero menos transparente respecto de la forma hebrea.
- source_word: דִּיבֹן
  english_pob_choice: Dibon
  chosen_spanish: Dibón
  alternatives_spanish:
  - Dibon
  lexicon: transliteración estándar
  rationale: 'Se translitera el topónimo al español con acento gráfico natural de la adaptación castellana: «Dibón». Mantiene la identificación del lugar sin alterar el nombre propio.'
- source_word: עֲטָרֹת
  english_pob_choice: Ataroth
  chosen_spanish: Atarot
  alternatives_spanish:
  - Atarot
  lexicon: transliteración estándar
  rationale: 'Se conserva el nombre del lugar con una forma española sobria y reconocible: «Atarot». Evita añadir una vocalización o adaptación innecesaria que no aporte claridad.'
- source_word: עֲרֹעֵר
  english_pob_choice: Aroer
  chosen_spanish: Aroer
  alternatives_spanish:
  - Aroer
  lexicon: transliteración estándar
  rationale: Se mantiene el topónimo en una forma ya ampliamente inteligible en español bíblico. No requiere adaptación adicional.
translation_notes:
  revision_awareness: El texto inglés de POB se mantuvo sin cambios en la revisión más reciente, con alto acuerdo del revisor; por eso no se introducen ajustes interpretativos adicionales ni ampliaciones contextuales.
  spanish_consistency_notes:
  - 'Se mantiene el orden enumerativo simple del hebreo y del inglés auditado: tres ciudades unidas por comas y una conjunción final.'
  - Se evita «tribu de Gad» en el cuerpo del texto para conservar la expresión hebrea literal; la aclaración se ofrece en nota.
  - La traducción usa un español bíblico claro y contemporáneo, sin recurrir a perífrasis que suavicen el valor narrativo del verbo.
