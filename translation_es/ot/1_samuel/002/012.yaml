translation:
  language: es
  text: Ahora bien, los hijos de Elí eran hombres malvados[a]; no conocían a Yahvé[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «hijos de worthlessness», es decir, «hijos de ruindad»; tradicionalmente, «hijos de Belial». La traducción usa una equivalencia idiomática.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no reconocían a Yahvé» / «no tenían en cuenta a Yahvé».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְנֵי
  english_pob_choice: Now ... sons
  chosen_spanish: Ahora bien, los hijos de ...
  alternatives_spanish:
  - Y ... hijos de ...
  - Ahora ... hijos de ...
  lexicon: HALOT
  rationale: El ו inicial marca transición narrativa; en español, «Ahora bien» introduce con naturalidad un nuevo giro del relato sin perder la conexión con lo anterior. בְנֵי se expresa como «los hijos de» para mantener la relación constructiva de posesión/descendencia.
- source_word: עֵלִי
  english_pob_choice: Eli
  chosen_spanish: Elí
  alternatives_spanish:
  - Eli
  lexicon: Nombre propio estándar
  rationale: Se translitera según la forma corriente en español bíblico, con acentuación gráfica para la pronunciación natural en español.
- source_word: בְּלִיָּעַל
  english_pob_choice: worthless men
  chosen_spanish: hombres inútiles
  alternatives_spanish:
  - hombres perversos
  - hombres indignos
  - hombres de Belial
  - hijos de Belial
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y literalmente cercana a «hijos de inutilidad/ruindad». «Hombres inútiles» conserva el carácter valorativo negativo y evita introducir de forma no justificada la lectura posterior de Belial como nombre propio. Se mantiene la tensión semántica de una caracterización moral fuerte pero no se explicita más allá del hebreo.
- source_word: לֹא יָדְעוּ
  english_pob_choice: did not know
  chosen_spanish: no conocían
  alternatives_spanish:
  - no sabían
  - no reconocían
  - no tenían en cuenta
  lexicon: HALOT
  rationale: יַדַע en contextos de pacto puede implicar conocer relacionalmente o reconocer. «No conocían» preserva la literalidad del verbo y deja abierta la fuerza teológica y relacional del hebreo, en lugar de resolverla con una paráfrasis más interpretativa.
- source_word: אֶת יְהוָה
  english_pob_choice: the LORD / Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - al Señor
  - a Yahveh
  lexicon: Convención POB para יהוה
  rationale: Se sigue la convención del proyecto de traducir יהוה como «Yahvé» en el texto principal, manteniendo el nombre divino de forma transparente. El acusativo hebreo אֶת no se vierte por separado en español.
theological_decisions:
- issue: 'Cómo rendir בְלִיָּעַל: idiomático común o nombre propio tradicional'
  english_pob_reading: 'common noun idiom: ''worthless men'''
  chosen_spanish_reading: 'idioma común: ''hombres inútiles'''
  alternative_spanish_readings:
  - '''hombres de Belial'''
  - '''hijos de Belial'''
  rationale: El contexto describe una valoración moral de los hijos de Elí, no una referencia clara a un personaje demoníaco. Traducirlo de modo idiomático evita sobrecargar el texto con una lectura tradicional menos transparente y conserva el juicio moral del hebreo.
  doctrine_reference: Primacía del hebreo original y preservación de la ambigüedad histórica donde el texto no la resuelve.
- issue: Si לֹא יָדְעוּ debe explicitarse como falta de reconocimiento o reverencia
  english_pob_reading: retain 'did not know Yahweh' in the main text
  chosen_spanish_reading: mantener 'no conocían a Yahvé'
  alternative_spanish_readings:
  - '''no reconocían a Yahvé'''
  - '''no tenían en cuenta a Yahvé'''
  - '''no honraban a Yahvé'''
  rationale: La frase hebrea conserva fuerza relacional y de pacto mediante el verbo 'conocer'. En español, 'no conocían a Yahvé' mantiene esa tensión sin convertirla en una explicación interpretativa que restrinja el alcance del original.
  doctrine_reference: Preservar la tensión teológica entre conocimiento literal y rechazo relacional.
translation_notes:
  revision_awareness: Se ha seguido el pasaje hebreo masorético y el audit trail inglés más reciente, que se mantiene sin cambios; la versión española conserva la caracterización idiomática de בְלִיָּעַל y la tensión de יָדַע sin resolverla en paráfrasis.
  spanish_consistency_notes:
  - Se usa «Yahvé» según el estándar del proyecto para יהוה.
  - Se evita «Señor» como sustituto en el texto principal.
  - Se mantiene un registro bíblico contemporáneo, claro y reverente, sin calco excesivo.
  - Los corchetes de nota se colocan solo donde hay alternativa real en el texto principal.
