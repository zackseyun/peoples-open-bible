  text: Everyone who remains in him does not sin[a]; everyone who sins has not seen him nor known him.
  footnotes:
  - marker: a
    text: Or, more formally, 'does not sin ... everyone who sins.' The Greek present-tense forms can be understood as describing ongoing or characteristic action, hence 'does not keep on sinning ... keeps on sinning.'
    reason: lexical_alternative
translation:
  language: ko
  text: 그분 안에 머무는 자마다 죄를 짓지 않습니다. 죄를 짓는 자마다 그분을 보지 못하였고 알지도 못한 것입니다.
  philosophy: optimal-equivalence
lexical_decisions:
