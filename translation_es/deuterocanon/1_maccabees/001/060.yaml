translation:
  language: es
  text: Y dieron muerte a las mujeres que habían circuncidado sus hijos[a], conforme al decreto,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las mujeres que habían hecho circuncidar a sus hijos»; el participio activo griego («habiendo circuncidado») puede describir tanto acción directa como la disposición de la circuncisión.'
    reason: lexical_alternative
lexical_decisions:
- source_word: περιτετμηκυίας
  english_pob_choice: who had circumcised
  chosen_spanish: que habían circuncidado
  alternatives_spanish:
  - que habían hecho circuncidar
  - que habían tenido circuncidados
  lexicon: LSJ
  rationale: El participio perfecto activo femenino plural de περιτέμνω se entiende mejor como acción ya realizada por las mujeres. En español, «habían circuncidado» conserva esa agencia directa; la alternativa causativa se deja implícita como posible, sin forzarla en el texto principal.
- source_word: τὰ τέκνα αὐτῶν
  english_pob_choice: their children
  chosen_spanish: a sus hijos
  alternatives_spanish:
  - a sus niños
  - a sus hijos varones
  lexicon: LSJ
  rationale: τέκνα significa «hijos/children» en sentido amplio. En este contexto la circuncisión presupone varones, pero el griego no lo dice de manera explícita; por eso el texto principal usa «hijos» sin estrecharlo interpretativamente a «hijos varones».
- source_word: ἐθανάτωσαν
  english_pob_choice: they put to death
  chosen_spanish: mataron
  alternatives_spanish:
  - dieron muerte
  - ejecutaron
  lexicon: LSJ
  rationale: El verbo significa causar la muerte. En español, «mataron» es directo y natural; «dieron muerte» sería más solemne, pero no añade precisión jurídica que el verbo griego no exige por sí mismo.
- source_word: κατὰ τὸ πρόσταγμα
  english_pob_choice: according to the decree
  chosen_spanish: conforme al decreto
  alternatives_spanish:
  - según el decreto
  - por orden
  lexicon: LSJ
  rationale: πρόσταγμα puede ser mandato, orden o decreto. Dado el contexto de persecución con autoridad oficial, «decreto» transmite mejor la formalidad estatal; «conforme al decreto» reproduce bien la relación preposicional del griego.
theological_decisions:
- issue: Agencia de las mujeres en la circuncisión
  english_pob_reading: The women are presented as those who had circumcised their children.
  chosen_spanish_reading: Las mujeres aparecen como las que habían circuncidado a sus hijos.
  alternative_spanish_readings:
  - Las mujeres aparecen como las que habían hecho circuncidar a sus hijos.
  rationale: El participio activo favorece una lectura de agencia directa. La redacción principal la mantiene, sin cerrar la posibilidad de una agencia mediada o causativa, que se deja como alternativa léxica.
  doctrine_reference: Translation philosophy §1, §5
- issue: Alcance de τέκνα en contexto de circuncisión
  english_pob_reading: Render τέκνα as 'children' rather than interpretively narrowing to 'sons'.
  chosen_spanish_reading: Renderizar τέκνα como «hijos» en vez de restringirlo a «hijos varones».
  alternative_spanish_readings:
  - hijos varones
  - niños
  rationale: Aunque la circuncisión se aplica a varones, el sustantivo griego es más amplio. Mantener «hijos» respeta la primacía del texto original y evita añadir una precisión que el versículo no expresa.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia con la versión inglesa POB y no registra revisiones aplicadas; por eso la propuesta española conserva la misma decisión exegética básica y solo adapta la formulación a un español natural y publicable.
  spanish_consistency_notes:
  - Se usa «decreto» para πρόσταγμα, en línea con el tono oficial del pasaje.
  - Se evita «SEÑOR» porque el versículo no contiene el nombre divino.
  - Se mantiene la agencia activa de las mujeres sin explicitar una mediación que el griego no exige.
  - Se conserva «hijos» para τέκνα, sin restringirlo a «hijos varones» en el texto principal.
