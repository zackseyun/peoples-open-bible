translation:
  language: es
  text: Porque tú nos has salvado de nuestros adversarios, y has avergonzado a los que nos odian[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nuestros odiadores». El hebreo usa un participio que significa literalmente «los que nos odian».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Ciertamente
  lexicon: HALOT
  rationale: En este contexto poético, כִּי introduce la razón o fundamento de lo dicho antes. «Porque» conserva bien esa fuerza explicativa en español sin volver la línea artificial.
- source_word: הוֹשַׁעְתָּנוּ
  english_pob_choice: you have saved us
  chosen_spanish: nos has librado
  alternatives_spanish:
  - nos has salvado
  - nos has rescatado
  - nos has dado victoria
  lexicon: HALOT
  rationale: El verbo en hifil comunica la acción salvífica/liberadora de Dios. «Librado» expresa con naturalidad en español la idea de liberar de un peligro o opresión, y evita restringir el sentido a una sola esfera.
- source_word: מִצָּרֵינוּ
  english_pob_choice: from our adversaries
  chosen_spanish: de nuestros adversarios
  alternatives_spanish:
  - de nuestros enemigos
  - de nuestros opositores
  - de quienes nos angustian
  lexicon: HALOT
  rationale: צָרִים designa adversarios o enemigos en oposición hostil. «Adversarios» mantiene un registro formal y poético, y preserva la amplitud del término mejor que una opción más estrecha.
- source_word: וּמְשַׂנְאֵינוּ
  english_pob_choice: those who hate us
  chosen_spanish: a los que nos aborrecen
  alternatives_spanish:
  - a los que nos odian
  - a los que nos tienen odio
  - a nuestros haters
  lexicon: HALOT
  rationale: El participio expresa a quienes continúan odiando/aborreciendo. «Los que nos aborrecen» conserva el carácter verbal y relacional del hebreo; «aborrecer» es más fuerte y más literario que un simple «odiar».
- source_word: הֱבִישׁוֹתָ
  english_pob_choice: you have put ... to shame
  chosen_spanish: has avergonzado
  alternatives_spanish:
  - has puesto ... en vergüenza
  - has cubierto de vergüenza
  - has humillado
  lexicon: HALOT
  rationale: El hifil de בּוֹשׁ implica causar vergüenza o deshonra. «Avergonzado» reproduce con naturalidad la idea causativa y el efecto de deshonra sin añadir matices no requeridos por el hebreo.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo y el cierre del texto inglés auditado, pero ajusta la sintaxis para español natural: «Porque» por כִּי, «nos has librado» por el perfecto divino de הוֹשַׁעְתָּנוּ, y distingue el segundo miembro con «los que nos aborrecen» para reflejar el participio hebreo. Se evitó «Cristo»/«SEÑOR» porque no hay base en este versículo para tales términos.'
  spanish_consistency_notes:
  - Se mantiene el paralelismo poético con dos miembros coordinados por «y».
  - Se conserva el aspecto completivo con «has ...» para ambos verbos principales.
  - «Adversarios» y «aborrecen» distinguen las dos expresiones hebreas relacionadas pero no idénticas.
  - El texto usa español neutral y eclesialmente readable sin recurrir a fórmulas tradicionales que oculten el hebreo.
