review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido del hebreo: el sacerdote examina, observa que la lesión se ve hundida respecto de la piel, que el pelo se ha vuelto blanco, y declara impuro al afectado. También conserva adecuadamente la clausula final sobre el brote en el forúnculo. Sin embargo, «una llaga de lepra» debilita el valor de נֶגַע צָרַעַת frente al inglés auditado «an outbreak of leprosy» y frente a פָּרָחָה «ha brotado», por lo que conviene usar «un brote de lepra».'
  spanish_quality_summary: El español es en general claro y digno. «Lo examinará», «lo declarará impuro» y «ha brotado» son buenas elecciones. No obstante, «divieso» resulta demasiado regional o poco transparente para un español ampliamente eclesial; «forúnculo» es más ampliamente entendible y sigue siendo preciso. «Cabello» suena algo menos natural en contexto de lesión cutánea que «pelo», pero no llega a ser un error; puede mantenerse o ajustarse por naturalidad.
  glossary_alignment: No hay conflicto con la terminología global principal. La decisión de mantener «lepra» con nota explicativa coincide con el estado auditado del inglés, aunque la nota sigue indicando el alcance más amplio de צָרַעַת. La función diagnóstica de וְטִמְּאוֹ está bien preservada con «lo declarará impuro».
  issues:
  - severity: medium
    issue: «una llaga de lepra» para נֶגַע צָרַעַת
    rationale: El hebreo combina la idea de afección/brote con צָרַעַת, y el inglés auditado quedó en «an outbreak of leprosy». «Llaga» desplaza el foco hacia una lesión individual y además pierde la resonancia verbal con פָּרָחָה «ha brotado».
  - severity: medium
    issue: «divieso» para בַּשְּׁחִין
    rationale: Aunque lexicalmente defendible, es menos claro para un español neutral latinoamericano y menos ampliamente reconocible que «forúnculo». El proyecto pide legibilidad amplia y no excesivamente arcaica o regional.
  - severity: low
    issue: Nota anclada en «examinará» en vez de en «lepra»
    rationale: La nota trata específicamente de צָרַעַת/«lepra», por lo que el anclaje natural en español debería ir junto a «lepra». No impide comprender el texto, pero mejora la correspondencia entre nota y término comentado.
  revised_spanish_text: Y el sacerdote lo examinará, y he aquí que su apariencia está más hundida que la piel, y su pelo se ha vuelto blanco; entonces el sacerdote lo declarará impuro. Es un brote de lepra[a]; ha brotado en el forúnculo.
