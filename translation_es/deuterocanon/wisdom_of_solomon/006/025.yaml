translation:
  language: es
  text: Por tanto, déjense instruir por mis palabras[a], y obtendrán provecho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «déjense disciplinar por mis palabras». El verbo griego puede incluir el sentido de formación o disciplina, además de instrucción.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥστε
  english_pob_choice: Therefore
  chosen_spanish: Así que
  alternatives_spanish:
  - Por tanto
  - De modo que
  - Entonces
  lexicon: LSJ
  rationale: Introduce la conclusión inferida del contexto previo. En español, «Así que» comunica bien la consecuencia sin volver el registro rígido o excesivamente formal.
- source_word: παιδεύεσθε
  english_pob_choice: be instructed
  chosen_spanish: sean instruidos
  alternatives_spanish:
  - sean disciplinados
  - reciban instrucción
  - se dejen formar
  lexicon: BDAG
  rationale: El verbo griego puede abarcar instrucción, formación y disciplina. Aquí «sean instruidos» conserva la fuerza formativa sin cargar de manera primaria la idea de castigo disciplinario, pero deja abierta esa tensión.
- source_word: τοῖς ῥήμασίν μου
  english_pob_choice: by my words
  chosen_spanish: por mis palabras
  alternatives_spanish:
  - por mis dichos
  - por mis expresiones
  - por mis declaraciones
  lexicon: LSJ
  rationale: «ῥήματα» se refiere a palabras dichas o dichos. «Palabras» es la equivalencia más natural y fiel; la preposición «por» expresa el valor instrumental del dativo.
- source_word: ὠφεληθήσεσθε
  english_pob_choice: you will benefit
  chosen_spanish: se beneficiarán
  alternatives_spanish:
  - obtendrán beneficio
  - les irá bien
  - sacarán provecho
  lexicon: BDAG
  rationale: El futuro pasivo tiene sentido de resultado beneficioso. «Se beneficiarán» es natural en español y conserva la idea de provecho sin convertirla en lenguaje comercial.
