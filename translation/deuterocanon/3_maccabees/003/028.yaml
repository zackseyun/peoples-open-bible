translation:
  text: And whoever wishes to inform against them will[a], for this, receive the property of the one who falls under the penalty, and two thousand drachmas from the royal treasury[b], and will be crowned with freedom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'of the one who comes under judicial scrutiny'; the Greek phrase can refer to being brought under official examination or liability, here in a punitive decree.
    reason: lexical_alternative
  - marker: b
    text: Literally 'will be crowned with freedom,' likely meaning that the informer would be granted freedom as a reward.
    reason: cultural_note
lexical_decisions:
- source_word: μηνύειν
  chosen: to inform against
  alternatives:
  - to report
  - to denounce
  - to disclose
  lexicon: LSJ
  rationale: In this legal-administrative context, the verb denotes giving information to authorities against someone, not merely neutral reporting. 'Inform against' preserves the accusatory force without over-paraphrasing.
- source_word: τὸν βουλόμενον
  chosen: whoever wishes
  alternatives:
  - the one who wants
  - anyone willing
  lexicon: LSJ
  rationale: The articular participle functions generically. 'Whoever wishes' gives natural English while preserving the open invitation implied by the decree.
- source_word: ἐφʼ ᾧ
  chosen: on the basis of which
  alternatives:
  - for which reason
  - whereupon
  - thereby
  lexicon: LSJ
  rationale: The phrase links the act of informing with the resulting reward. 'On the basis of which' keeps the causal/instrumental connection, though somewhat formal, and avoids obscuring the syntax.
- source_word: οὐσίαν
  chosen: property
  alternatives:
  - possessions
  - estate
  - substance
  lexicon: LSJ
  rationale: Here the term refers to material assets confiscated from the accused. 'Property' is clear modern English and fits the legal setting.
- source_word: τοῦ ἐμπίπτοντος ὑπὸ τὴν εὔθυναν
  chosen: of the one who falls under the penalty
  alternatives:
  - of the one who comes under punishment
  - of the one subjected to judicial scrutiny
  - of the one who falls under the charge
  lexicon: LSJ
  rationale: The phrase describes the person becoming liable under official sanction. εὔθυνα can denote an accounting or legal examination, but in this decree context the practical sense is punitive liability. 'Falls under the penalty' communicates the consequence in idiomatic English while staying close to the Greek.
- source_word: λήμψεται
  chosen: he will receive
  alternatives:
  - he will take
  - he will obtain
  lexicon: LSJ
  rationale: Future middle here straightforwardly indicates receipt of the promised reward.
- source_word: ἐκ τοῦ βασιλικοῦ
  chosen: from the royal treasury
  alternatives:
  - from the king's funds
  - from the royal coffers
  lexicon: LSJ
  rationale: The adjective with implied treasury/funds refers to royal resources. Supplying 'treasury' makes the ellipsis intelligible in English.
- source_word: δραχμὰς δισχιλίας
  chosen: two thousand drachmas
  alternatives:
  - two thousand silver coins
  lexicon: LSJ
  rationale: Keeping 'drachmas' preserves the historical monetary unit rather than flattening it into a generic equivalent.
- source_word: τῆς ἐλευθερίας στεφανωθήσεται
  chosen: will be crowned with freedom
  alternatives:
  - will be rewarded with freedom
  - will receive freedom as a crown
  - will be granted liberty
  lexicon: LSJ
  rationale: The passive of στεφανόω is metaphorical and honorific. 'Crowned with freedom' preserves the imagery and likely means manumission or legal enfranchisement as an added reward.
