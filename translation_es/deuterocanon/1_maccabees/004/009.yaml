review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del griego: imperativo de memoria, referencia a ''nuestros padres'', salvación/liberación en el mar Rojo y persecución de Faraón con fuerza. La única falla relevante está en la nota al pie: actualmente ofrece como alternativa exactamente la misma lectura principal (''en el mar Rojo''), mientras que la nota inglesa contrasta ''in'' con ''at'' y además menciona ''Reed Sea''.'
  spanish_quality_summary: El texto principal es claro, natural y digno en español eclesial. 'Recuerden', 'nuestros padres', 'fueron salvados' y 'los persiguió con fuerza' son aceptables y fieles. La nota, sin embargo, necesita corrección para evitar redundancia y para preservar correctamente las alternativas documentadas.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen términos sensibles como Yahvé, Mesías, Cristo, Espíritu, etc. Se mantiene correctamente el lenguaje de salvación ('fueron salvados') y la referencia masculina 'nuestros padres'.
  issues:
  - severity: medium
    issue: La nota al pie repite la lectura principal en vez de dar la alternativa documentada.
    rationale: El inglés dice 'Or "at the Red Sea"; alternatively ... "in the Reed Sea"'. El español actual dice 'O «en el mar Rojo»', que no aporta alternativa real y no preserva la distinción entre la preposición principal y la variante.
  revised_spanish_text: Recuerden cómo nuestros padres fueron salvados en el mar Rojo, cuando Faraón los persiguió con fuerza[a].
  revised_footnotes:
  - marker: a
    text: O «junto al mar Rojo»; alternativamente, algunos prefieren «en el mar de Juncos» para reflejar el trasfondo hebreo de la tradición del Éxodo.
    reason: lexical_alternative
  revision_rationale: 'Se conserva intacto el texto principal porque es fiel y natural. Solo se corrige la nota para reflejar con precisión las alternativas del expediente inglés: una variante preposicional equivalente a ''at the Red Sea'' y la alternativa ''Reed Sea'' como nota léxica secundaria.'
