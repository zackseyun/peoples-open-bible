translation:
  language: es
  text: Yahvé está entre los que me ayudan[a]; yo miraré[b] a los que me odian.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «Yahvé está para mí entre los que me ayudan». La construcción hebrea puede resaltar que Yahvé está con los que ayudan al salmista, más que presentarlo como un único ayudador por sí solo.'
    reason: lexical_alternative
  - marker: b
    text: O «veré» o «miraré con triunfo a los que me odian». Este modismo hebreo puede implicar ver la caída de los enemigos sin decirlo explícitamente.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se conserva como nombre propio divino, siguiendo la política POB de transliterar el nombre revelado en vez de sustituirlo por un título. En español, 'Yahvé' es la forma estándar y legible para ese nombre.
- source_word: לִי
  english_pob_choice: is
  chosen_spanish: está
  alternatives_spanish:
  - es para mí
  - está conmigo
  lexicon: HALOT
  rationale: La construcción hebrea es breve y relacional; en español, 'está' comunica bien la idea de presencia/ubicación sin forzar una perífrasis más interpretativa. La ambigüedad de pertenencia o favor queda implícita en el contexto.
- source_word: בְּעֹזְרָי
  english_pob_choice: among my helpers
  chosen_spanish: entre mis ayudadores
  alternatives_spanish:
  - entre los que me ayudan
  - con mis ayudadores
  - entre mis auxiliares
  lexicon: HALOT
  rationale: El participio plural debe mantenerse como plural para no convertirlo en singular. 'Ayudadores' conserva la relación léxica con el verbo de ayudar y permite reflejar la imagen de compañía entre quienes prestan ayuda.
- source_word: וַאֲנִי
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - y yo
  - pero yo
  lexicon: HALOT
  rationale: El pronombre independiente introduce contraste o continuación enfática; en español, el pronombre explícito 'yo' conserva esa marca sin añadir intensidad no requerida.
- source_word: אֶרְאֶה
  english_pob_choice: will look on
  chosen_spanish: miraré
  alternatives_spanish:
  - veré
  - contemplaré
  - miraré con triunfo
  lexicon: HALOT
  rationale: El verbo ראה puede implicar ver, mirar o presenciar. Aquí, con el objeto directo preposicional y el paralelismo del versículo, 'miraré' conserva la imagen sin explicitar 'con triunfo', que sería interpretativo.
- source_word: בְשֹׂנְאָי
  english_pob_choice: those who hate me
  chosen_spanish: a los que me odian
  alternatives_spanish:
  - a mis enemigos
  - a los que me aborrecen
  - a mis odiadores
  lexicon: HALOT
  rationale: El participio expresa literalmente 'los que me odian'; 'a los que me odian' preserva esa especificidad mejor que 'enemigos'. 'Odian' mantiene la fuerza verbal sin introducir una categoría más amplia.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: La decisión doctrinal de POB es preservar el nombre divino en transliteración. En español, 'Yahvé' cumple esa función de manera transparente y reconocible, evitando la sustitución por un título litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado para simplificar la primera persona y naturalizar el objeto de odio; la versión española sigue esa línea de lectura clara, pero conserva la estructura plural de 'mis ayudadores' y la referencia personal a quienes odian al salmista sin añadir triunfalismo explícito.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma preferida para יְהוָה.
  - Se conserva el plural de 'ayudadores' para reflejar בְּעֹזְרָי.
  - No se introduce 'Cristo', 'SEÑOR' ni un lenguaje de sustitución.
  - La primera persona queda en forma simple ('yo') conforme al ajuste de la revisión inglesa.
  - El matiz idiomático de ver/observar se deja abierto con 'miraré', sin sobreinterpretar el resultado de la derrota enemiga.
