translation:
  language: es
  text: Ahora, ten cuidado[a], por favor, y no bebas vino ni bebida fuerte[b], y no comas nada inmundo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y ahora, ten cuidado» o «mantente alerta».'
    reason: lexical_alternative
  - marker: b
    text: La expresión se refiere a bebidas intoxicantes distintas del vino.
    reason: cultural_note
  - marker: c
    text: 'O: «no comas ninguna cosa inmunda».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y ahora
  lexicon: HALOT
  rationale: Marca un giro discursivo-temporal natural en español. 'Ahora' comunica la transición con mayor fluidez; 'Y ahora' también sería posible si se quisiera destacar más la conexión explícita con lo anterior.
- source_word: הִשָּׁמְרִי נָא
  english_pob_choice: please be careful
  chosen_spanish: por favor, cuídate
  alternatives_spanish:
  - por favor, ten cuidado
  - por favor, guárdate
  lexicon: HALOT
  rationale: El verbo en sentido reflexivo pide vigilancia cuidadosa. 'Cuídate' transmite con naturalidad la idea de estar atenta y resguardarte; 'ten cuidado' es una alternativa válida, pero menos directamente reflexiva.
- source_word: וְאַל תִּשְׁתִּי
  english_pob_choice: do not drink
  chosen_spanish: no bebas
  alternatives_spanish:
  - y no bebas
  lexicon: HALOT
  rationale: La prohibición se expresa de forma directa con el imperativo negativo natural en español. Se mantiene la fuerza prohibitiva del hebreo sin recargarlo con literalidad innecesaria.
- source_word: יַיִן
  english_pob_choice: wine
  chosen_spanish: vino
  alternatives_spanish:
  - vino fermentado
  lexicon: HALOT
  rationale: Equivalente léxico directo y claro.
- source_word: וְשֵׁכָר
  english_pob_choice: strong drink
  chosen_spanish: bebida fuerte
  alternatives_spanish:
  - licor fuerte
  - bebida embriagante
  lexicon: HALOT
  rationale: '''שֵׁכָר'' designa una bebida intoxicante distinta del vino. ''Bebida fuerte'' conserva el valor tradicional de la expresión y evita estrechar el sentido a una clase moderna específica de alcohol.'
- source_word: וְאַל תֹּאכְלִי כָּל טָמֵא
  english_pob_choice: do not eat anything unclean
  chosen_spanish: ni comas cosa inmunda
  alternatives_spanish:
  - y no comas nada inmundo
  - ni comas ninguna cosa inmunda
  lexicon: HALOT
  rationale: '''Cosa inmunda'' preserva el campo ritual de טָמֵא y suena natural en español bíblico contemporáneo. ''Nada inmundo'' o ''ninguna cosa inmunda'' son alternativas posibles, pero ''cosa inmunda'' mantiene mejor la categoría concreta del objeto prohibido.'
theological_decisions:
- issue: Valor ritual de טָמֵא en la prohibición alimentaria
  english_pob_reading: unclean
  chosen_spanish_reading: inmunda
  alternative_spanish_readings:
  - impura
  - inmunda
  rationale: En este contexto nazareo prenatal, la noción es ritual/covenantal, no meramente higiénica. 'Inmunda' conserva la resonancia bíblica tradicional y la categoría de pureza ritual sin suavizarla.
  doctrine_reference: Números 6:2-8; Levítico 11
- issue: Sentido de שֵׁכָר
  english_pob_reading: strong drink
  chosen_spanish_reading: bebida fuerte
  alternative_spanish_readings:
  - bebida embriagante
  - licor fuerte
  rationale: El texto contrasta vino con otra bebida intoxicante. 'Bebida fuerte' mantiene esa distinción sin limitar indebidamente el término a una bebida moderna específica.
  doctrine_reference: Números 6:3
translation_notes:
  revision_awareness: 'El texto sigue el orden y la concatenación del hebreo: marcador temporal, exhortación de vigilancia, dos prohibiciones coordinadas y la última prohibición alimentaria. Se adoptó una puntuación simple con comas, en línea con la revisión inglesa que prefirió mantener la secuencia coordinada sin dos puntos.'
  spanish_consistency_notes:
  - Se usa 'bebida fuerte' para שֵׁכָר, coherente con el valor auditado de 'strong drink'.
  - Se mantiene 'inmunda' para טָמֵא por su fuerza ritual bíblica; no se reemplaza por un término higiénico o moral general.
  - La forma 'cuídate' traduce de manera idiomática el matiz reflexivo de הִשָּׁמְרִי sin perder la llamada a la vigilancia.
