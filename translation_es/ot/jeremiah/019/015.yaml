    reason: lexical_alternative
  - marker: b
    text: 'O: «todo el desastre»; aquí רָעָה se refiere a calamidad de juicio, no a mal moral.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «endurecieron su cerviz», un modismo para la negativa obstinada a escuchar o someterse.'
    reason: cultural_note
  revision_rationale: Se ajusta הִנְנִי a 'He aquí, yo' para preservar la auto-presentación enfática y solemne del hebreo; se simplifica 'yo estoy trayendo' a 'yo traigo' por naturalidad; y se corrige la nota de עָרֶיהָ para que sí preserve la alternativa léxica documentada por el POB. 'Poblaciones' comunica bien el valor de settlements/towns sin perder amplitud, mientras la nota guarda 'ciudades' como alternativa.
