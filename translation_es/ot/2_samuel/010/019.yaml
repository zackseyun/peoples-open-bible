translation:
  language: es
  text: Cuando todos los reyes que eran [a]siervos de Hadadézer vieron que habían sido derrotados delante de Israel, hicieron paz con Israel y les sirvieron[b]. Y Aram tuvo miedo de ayudar[c] más a los hijos de Amón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vasallos de Hadadézer».
    reason: lexical_alternative
  - marker: b
    text: O «les quedaron sujetos».
    reason: lexical_alternative
  - marker: c
    text: O «salvar».
    reason: lexical_alternative
lexical_decisions:
- source_word: עַבְדֵי
  english_pob_choice: servants of
  chosen_spanish: siervos de
  alternatives_spanish:
  - vasallos de
  - subordinados de
  lexicon: HALOT
  rationale: En este contexto político-militar, el término indica reyes subordinados a Hadadézer. «Siervos» conserva la raíz de עבד y permite mantener el contraste verbal con «les sirvieron» más adelante. «Vasallos» es más preciso históricamente, pero menos natural en el flujo del versículo.
- source_word: נִגְּפוּ
  english_pob_choice: had been defeated
  chosen_spanish: habían sido derrotados
  alternatives_spanish:
  - habían sido abatidos
  - habían sido vencidos
  lexicon: HALOT
  rationale: El nifal de נַגַּף/נָגַף aquí expresa una derrota militar. «Habían sido derrotados» comunica con claridad el resultado sin añadir detalles que el hebreo no especifica.
- source_word: לִפְנֵי יִשְׂרָאֵל
  english_pob_choice: before Israel
  chosen_spanish: delante de Israel
  alternatives_spanish:
  - ante Israel
  - frente a Israel
  lexicon: HALOT
  rationale: La expresión hebrea literalmente es «delante de Israel» y puede implicar derrota a manos de Israel. Se conserva la imagen espacial para reflejar el giro del original, en lugar de neutralizarla con una simple equivalencia causal.
- source_word: וַיַּשְׁלִמוּ אֶת יִשְׂרָאֵל
  english_pob_choice: they made peace with Israel
  chosen_spanish: hicieron paz con Israel
  alternatives_spanish:
  - se reconciliaron con Israel
  - concluyeron paz con Israel
  lexicon: HALOT
  rationale: El hifil de שׁלם con אֶת señala entrar en relaciones pacíficas. «Hicieron paz con» es una fórmula sobria y fiel, y evita suavizar el matiz político del verbo.
- source_word: וַיַּעַבְדוּם
  english_pob_choice: served them
  chosen_spanish: les sirvieron
  alternatives_spanish:
  - quedaron sujetos a ellos
  - les fueron tributarios
  lexicon: HALOT
  rationale: El verbo continúa la idea de subordinación política. «Les sirvieron» mantiene el vínculo léxico con «siervos» al inicio del versículo y preserva la ambigüedad entre servicio y sujeción.
- source_word: אֲרָם
  english_pob_choice: Aram
  chosen_spanish: Aram
  alternatives_spanish:
  - Siria
  - los arameos
  lexicon: HALOT
  rationale: Se translitera el nombre propio conforme a la preferencia del proyecto, evitando «Siria» por ser una designación más tardía y «los arameos» por desplazar el nombre del texto.
- source_word: לְהוֹשִׁיעַ
  english_pob_choice: to help
  chosen_spanish: ayudar
  alternatives_spanish:
  - salvar
  - rescatar
  lexicon: HALOT
  rationale: Aquí el infinitivo hifil de ישׁע se refiere a prestar auxilio militar. «Ayudar» refleja mejor ese sentido contextual que «salvar», que en español podría sonar más teológico o absoluto de lo que exige el versículo.
- source_word: עוֹד
  english_pob_choice: anymore
  chosen_spanish: más
  alternatives_spanish:
  - ya
  - otra vez
  lexicon: HALOT
  rationale: En esta construcción, עוֹד marca la cesación de una ayuda ulterior. «Más» dentro de «ayudar más» expresa con naturalidad que no volvieron a prestar apoyo.
- source_word: בְּנֵי עַמּוֹן
  english_pob_choice: the sons of Ammon
  chosen_spanish: los hijos de Amón
  alternatives_spanish:
  - los amonitas
  - el pueblo de Amón
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea formal y su sentido etnogeográfico. «Los amonitas» sería una alternativa fluida, pero «los hijos de Amón» refleja más de cerca el texto fuente.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y toma en cuenta el ajuste de la revisión inglesa más reciente: se traduce וַיִּרְאוּ אֲרָם לְהוֹשִׁיעַ עוֹד como «Y Aram tuvo miedo de ayudar más...», evitando «salvar» para no sobrecargar el infinitivo con un matiz más fuerte que el contexto militar inmediato. También se conserva la coordinación simple con «Y» para reflejar con transparencia la waw consecutiva final.'
  spanish_consistency_notes:
  - Se mantiene «Y» al inicio de la cláusula final para reflejar la conjunción hebrea sin añadir inferencia causal.
  - «Siervos» y «les sirvieron» se coordinen léxicamente para preservar la repetición del original.
  - Se usa «Aram» como nombre propio transliterado de manera consistente con el proyecto.
  - «Hijos de Amón» conserva la formulación hebrea formal sin reemplazarla por un etnónimo más tradicional.
