revisions:
- from: Porque, ya que nuestros padres tenían una paz profunda[a] debido a su buen orden bajo la ley, y les iba bien, hasta el punto de que también Seleuco Nicanor, rey de Asia, apartó dinero para ellos para el servicio sagrado y aprobó su constitución[b].
  to: Pues nuestros padres tenían una paz profunda debido a su vida ordenada bajo la ley[a], y les iba bien, hasta el punto de que incluso Seleuco Nicanor, rey de Asia, les destinó fondos para el servicio sagrado y aprobó su orden cívico[b].
  rationale: 'Se ajustó la sintaxis para un español más natural y fiel: «Pues» sustituye la apertura redundante, «vida ordenada bajo la ley» expresa mejor εὐνομία en español corriente, «les destinó fondos» aclara ἀφορίσαι χρήματα sin ambigüedad, y «orden cívico» representa πολιτεία con buen equilibrio entre precisión y legibilidad.'
