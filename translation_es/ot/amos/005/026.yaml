base_translation:
  language: en
  yaml_path: translation/ot/amos/005/026.yaml
  text: And you carried Sikkuth your king[a], and Kiyyun your images, the star of your god[c][b], which you made for yourselves.
  footnotes:
  - marker: a
    text: Or 'your Molech'; the Hebrew reads 'your king,' but many interpreters understand a reference to the deity Molech/Moloch here, reflected also in Acts 7:43.
    reason: alternative_reading
  - marker: b
    text: Sikkuth and Kiyyun are rare names, likely associated with astral worship; their precise identification is uncertain.
    reason: cultural_note
  - marker: c
    text: Or possibly 'the star of your gods,' though the Masoretic pointing supports the singular 'your god.'
    reason: lexical_alternative
