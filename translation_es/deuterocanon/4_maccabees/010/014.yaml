review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la sintaxis y el sentido del griego: «Pero les dijo», «el fuego ... contra mí», y la construcción de grado/resultado «no es tan ... como para ...» preservan adecuadamente ὁ δὲ αὐτοῖς ἔφη, ἔχετε ... κατʼ ἐμοῦ τὸ πῦρ, y οὐχ οὕτω ... ὥστε. También acierta en δειλανδρῆσαι con «hacerme un cobarde», en línea con la revisión inglesa final. La única mejora necesaria es léxica-estilística: «ardiente» es comprensible, pero «abrasador» comunica mejor el matiz de καυστικώτερον (‘scorching / searing’) en este contexto de tortura por fuego.'
  spanish_quality_summary: 'El texto es claro, natural y digno en español. Sin embargo, «no es tan ardiente» suena un poco débil para fuego aplicado como tormento; «no es tan abrasador» suena más idiomático y más preciso. La nota al pie también puede mejorarse: «hacerme un hombre sin valor» es comprensible, pero no es una equivalencia literal muy natural en español; «hacerme poco hombre» conserva mejor el matiz más literal/etimológico sin afirmar que sea la opción principal.'
  glossary_alignment: No hay términos del glosario principal en juego como Yahvé/Mesías. La decisión clave δειλανδρῆσαι -> «hacerme un cobarde» concuerda con la línea del POB y con la justificación teológica de evitar una formulación centrada en masculinidad. La nota mantiene las alternativas léxicas relevantes sin desplazar el sentido principal.
  issues:
  - severity: medium
    issue: «ardiente» debilita el matiz de καυστικώτερον
    rationale: El comparativo griego expresa algo más cercano a ‘abrasador/ardor que quema’ que a la cualidad general de ‘ardiente’. En contexto de fuego como instrumento de tortura, «abrasador» preserva mejor la fuerza léxica documentada por el POB.
  - severity: low
    issue: La alternativa «hacerme un hombre sin valor» suena algo torpe como nota literal
    rationale: Aunque intenta reflejar el matiz etimológico de δειλανδρῆσαι, la formulación no es idiomática. «Hacerme poco hombre» comunica mejor el valor más literal sin presentarlo como la traducción principal.
  revised_spanish_text: 'Pero les dijo[a]: «El fuego que tienen contra mí no es tan abrasador como para hacerme un cobarde»'
  revised_footnotes:
  - marker: a
    text: 'O: «hacerme actuar como un cobarde»; o, más literalmente, «hacerme poco hombre».'
    reason: lexical_alternative
  revision_rationale: Se ajusta «ardiente» a «abrasador» para reflejar con más precisión καυστικώτερον en un contexto de fuego torturador. Se pule la nota léxica para que la alternativa más literal sea más natural en español, manteniendo la decisión principal «hacerme un cobarde».
