translation:
  language: es
  text: 'Ese día[a] Gad vino a David y le dijo[b]: «Sube y levanta un altar para Yahvé en la era de Arauná, el jebuseo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «en aquel día».'
    reason: lexical_alternative
  - marker: b
    text: Crónicas da el nombre como Ornán (1 Cr 21:18).
    reason: cross_reference
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: fue
  alternatives_spanish:
  - vino
  - llegó
  lexicon: HALOT
  rationale: En contexto narrativo, el movimiento de Gad hacia David puede expresarse naturalmente como 'fue a David'. 'Vino' también sería posible, pero en español aquí 'fue' comunica mejor la dirección implícita hacia David sin sonar forzado.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: That day
  chosen_spanish: Ese día
  alternatives_spanish:
  - aquel día
  - en ese día
  lexicon: HALOT
  rationale: '''Ese día'' reproduce la referencia temporal específica y suena natural en español moderno, manteniendo la proximidad discursiva del hebreo.'
- source_word: עֲלֵה
  english_pob_choice: Go up
  chosen_spanish: Sube
  alternatives_spanish:
  - Asciende
  - Ve
  lexicon: HALOT
  rationale: El imperativo עלה conserva fuerza direccional. 'Sube' es la forma natural en español y mantiene la imagen de movimiento ascendente.
- source_word: הָקֵם
  english_pob_choice: set up
  chosen_spanish: levanta
  alternatives_spanish:
  - erigue
  - establece
  lexicon: HALOT
  rationale: El hifil de קום aquí significa hacer que algo quede en pie. 'Levanta' transmite bien la idea de erigir un altar sin añadir la noción constructiva más amplia de 'edificar'.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - en honor de Yahvé
  lexicon: HALOT
  rationale: Se conserva 'Yahvé' como nombre divino principal del proyecto. 'Para' refleja adecuadamente la dedicación del altar expresada por ל en este contexto.
- source_word: מִזְבֵּחַ
  english_pob_choice: altar
  chosen_spanish: altar
  alternatives_spanish:
  - altares
  lexicon: HALOT
  rationale: Término estándar y directo para מזבח; no requiere variación.
- source_word: בְּגֹרֶן
  english_pob_choice: on the threshing floor
  chosen_spanish: en la era
  alternatives_spanish:
  - sobre la era
  - en la era de trillar
  lexicon: HALOT
  rationale: '''Era'' es el equivalente natural de ''threshing floor'' en español bíblico. Con ''en'' se preserva el valor locativo de ב sin forzar una preposición más interpretativa.'
- source_word: ארניה
  english_pob_choice: Araunah
  chosen_spanish: Arauná
  alternatives_spanish:
  - Araunah
  - Ornan
  lexicon: HALOT
  rationale: Se adapta el nombre al español con acentuación gráfica para lectura fluida. Se mantiene la forma de Samuel ('Araunah') en lugar de la paralela de Crónicas ('Ornan').
- source_word: הַיְבֻסִי
  english_pob_choice: the Jebusite
  chosen_spanish: el jebuseo
  alternatives_spanish:
  - el jebusita
  - el yebuseo
  lexicon: HALOT
  rationale: '''Jebuseo'' es la forma española usual para el gentilicio. Mantiene la identificación étnica del texto hebreo.'
theological_decisions:
- issue: Rendering the divine name יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La consigna del proyecto exige traducir יהוה como 'Yahvé' en el texto principal. Esto conserva audiblemente el nombre propio del pacto, en lugar de sustituirlo por una máscara titulada.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando notas al pie no ancladas en el texto. El versículo queda sin notas porque ninguna alternativa textual relevante exigía marca en la línea española final.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente para יהוה.
  - '''Arauná'' adapta la forma hebrea de Samuel; no se mezcla con la variante de Crónicas.'
  - '''era'' se usa con valor bíblico de ''threshing floor'' y registro natural en español.'
