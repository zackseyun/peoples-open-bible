  source_alignment_summary: 'El hebreo contiene únicamente tres nombres propios en secuencia: שַׁלּוּם, אֲמַרְיָה, יוֹסֵף. El borrador español refleja correctamente una lista de nombres, pero adapta dos de ellos a formas españolas tradicionales (''Amarías'', ''José'') sin apoyo en el rastro inglés, que opta por transliteración/conventional name-form más cercana al hebreo. Para este tipo de lista genealógica, conviene preservar mejor la forma onomástica del origen.'
  spanish_quality_summary: El texto es legible y natural como lista de nombres. Sin embargo, en contexto de registro nominal, 'Amarías' puede sonar como normalización innecesaria y 'José' introduce una forma castellana muy asentada que puede sugerir equivalencia litúrgica más que simple transliteración del nombre hebreo. 'Salum' sería más habitual en español bíblico que 'Sallum', pero el borrador ya justificó 'Sallum' y es aceptable como transliteración consistente.
  glossary_alignment: No hay términos teológicos mayores. En nombres propios, el proyecto pide trabajar desde la evidencia fuente; aquí eso favorece transliteraciones más directas. Se recomienda 'Sallum, Amaría, Yosef' para conservar mejor los tres nombres hebreos, evitando la hispanización fuerte de 'José' y la expansión interpretativa de 'Amarías'.
  issues:
