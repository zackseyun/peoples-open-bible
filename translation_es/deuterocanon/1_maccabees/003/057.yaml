  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: el campamento/fuerza se puso en marcha y luego acampó al sur de Emaús. Sin embargo, hay una incoherencia interna importante entre el sujeto singular elegido («la tropa») y la segunda cláusula del griego, cuyo verbo está en plural («παρενεβάλοσαν» = «acamparon/establecieron campamento»). Además, la nota [a] está anclada en «partió», pero su contenido explica el topónimo Ἀμμαούμ/Emaús; debe anclarse en el nombre del lugar.'
  spanish_quality_summary: El español es claro y natural, pero la redacción mejora si se evita la discordancia conceptual entre «la tropa» y la alternancia singular/plural implícita de la frase. «El campamento partió ... acampó» sonaría menos natural en español; por eso conviene usar un sujeto personal colectivo como «la tropa» y mantener plural verbal en la segunda acción para reflejar el griego con buen español.
  glossary_alignment: No hay conflictos con la terminología teológica del proyecto. El topónimo «Emaús» sigue la convención española y la nota léxica es apropiada, pero debe reubicarse en el texto. La decisión «la tropa» para ἡ παρεμβολή es aceptable como excepción contextual frente a una traducción más literal «el campamento», siempre que se explique como fuerza militar colectiva.
  issues:
  - severity: medium
    issue: La nota [a] está colocada en «partió», pero el contenido de la nota trata del topónimo griego Ἀμμαούμ/Emaús.
    rationale: Las notas léxicas deben anclarse exactamente en la palabra o frase relevante del texto español.
  - severity: medium
    issue: La formulación «la tropa partió, y acampó» suaviza el cambio de número del griego y puede ocultar que la segunda acción se expresa con verbo plural.
    rationale: Aunque el español permite concordancia colectiva, «la tropa ... acamparon» refleja mejor el valor colectivo del primer sintagma y el plural explícito de παρενεβάλοσαν, sin perder naturalidad narrativa.
  revised_spanish_text: Y la tropa partió, y acamparon al sur de Emaús[a].
