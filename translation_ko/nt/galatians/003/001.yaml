id: GAL.3.1
reference: Galatians 3:1
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ὦ ἀνόητοι Γαλάται, τίς ὑμᾶς ⸀ἐβάσκανεν, οἷς κατ’ ὀφθαλμοὺς Ἰησοῦς Χριστὸς ⸀προεγράφη ἐσταυρωμένος;
base_translation:
  language: en
  yaml_path: translation/nt/galatians/003/001.yaml
  text: You foolish Galatians[a], who has bewitched you[c][b], before whose eyes Jesus Messiah was publicly portrayed as crucified?
  footnotes:
  - marker: a
    text: 'Or: ''who has deceived you?'' The verb literally evokes bewitching or casting a spell.'
    reason: lexical_alternative
  - marker: b
    text: 'Greek ''Jesus Christ''; translated here as ''Jesus the Messiah'' to preserve the title''s meaning.'
    reason: lexical_alternative
  - marker: c
    text: 'Or: ''was clearly set forth'' or ''was publicly placarded as crucified.'''
    reason: lexical_alternative
translation:
  language: ko
  text: 어리석은 갈라디아 사람들이여, 누가 여러분에게 마술을 걸었습니까[a]? 여러분의 눈앞에서 예수 메시아가 십자가에 못 박힌 모습으로 분명히 그려졌는데도 말입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 ἐβάσκανεν은 「마술을 걸다」, 「현혹하다」를 뜻한다. 바울은 비유적으로 갈라디아 사람들의 사고가 마치 마술에 걸린 듯 흐려졌음을 책망한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνόητοι
  english_pob_choice: foolish
  chosen_korean: 어리석은
  alternatives_korean:
  - 미련한
  lexicon: BDAG
  rationale: 바울의 책망 어조를 약화시키지 않는다.
- source_word: ἐβάσκανεν
  english_pob_choice: bewitched
  chosen_korean: 마술을 걸다
  alternatives_korean:
  - 미혹하다
  - 현혹하다
  - 주문을 걸다
  lexicon: BDAG
  rationale: 본디 「악의 시선·주술」을 가리키는 강한 표현. 직설적으로 옮겨 비유의 충격을 보존한다.
- source_word: προεγράφη ἐσταυρωμένος
  english_pob_choice: publicly portrayed as crucified
  chosen_korean: 십자가에 못 박힌 모습으로 분명히 그려졌다
  alternatives_korean:
  - 공개적으로 묘사되었다
  - 분명히 게시되었다
  lexicon: BDAG
  rationale: 「공개적으로 그림처럼 펼쳐 보이다」의 의미를 자연스러운 한국어로 옮긴다.
