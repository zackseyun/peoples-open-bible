base_translation:
  language: en
  yaml_path: translation/ot/ezra/006/005.yaml
  text: And also let the gold and silver vessels of the house of God[a], which Nebuchadnezzar took out of the temple that was in Jerusalem and brought to Babylon, be returned and brought to the temple that is in Jerusalem, each to its place; and you shall put them in the house of God.
  footnotes:
  - marker: a
    text: Or 'let them be restored, and let them go to the temple in Jerusalem, each to its place.' The Aramaic wording around 'and let each be brought/go' is somewhat difficult, but the sense is the restoration of the temple vessels to their proper places in Jerusalem.
