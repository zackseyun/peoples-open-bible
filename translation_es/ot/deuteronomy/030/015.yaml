translation:
  language: es
  text: Mira[a], hoy he puesto delante de ti la vida y el bien[b], y la muerte y el mal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «he dado delante de ti» o «he colocado delante de ti».'
    reason: lexical_alternative
  - marker: b
    text: «El mal» también puede entenderse como «daño» o «calamidad» en algunos contextos; aquí se conserva el contraste directo con «el bien».
    reason: lexical_alternative
lexical_decisions:
- source_word: רְאֵה
  english_pob_choice: See
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - Ve
  lexicon: ראה (HALOT)
  rationale: El imperativo funciona como llamado a prestar atención. «Mira» conserva la fuerza directa y es natural en español contemporáneo; «Ve» sería demasiado libre y «Mira bien» añade énfasis no explícito.
- source_word: נָתַתִּי
  english_pob_choice: I have set
  chosen_spanish: he puesto
  alternatives_spanish:
  - he dado
  - he colocado
  lexicon: נתן (HALOT)
  rationale: En la expresión con «delante de ti», el verbo transmite la idea de colocar o presentar alternativas. «He puesto» es idiomático en español y mantiene la noción de disposición ante alguien.
- source_word: לְפָנֶיךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - ante ti
  - enfrente de ti
  lexicon: לפני (HALOT)
  rationale: «Delante de ti» reproduce el valor locativo y la imagen de opciones presentadas para decisión. «Ante ti» también sería correcto, pero «delante de ti» resulta más natural aquí.
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  lexicon: היום (HALOT)
  rationale: «Hoy» es la equivalencia normal y clara en español moderno; conserva el marco temporal inmediato del versículo.
- source_word: הַחַיִּים
  english_pob_choice: life
  chosen_spanish: la vida
  alternatives_spanish:
  - vida
  lexicon: חיים (HALOT)
  rationale: Aunque el hebreo está en plural morfológico, aquí funciona como sustantivo abstracto. En español, «la vida» mantiene el sentido y la simetría con los otros sustantivos.
- source_word: הַטּוֹב
  english_pob_choice: good
  chosen_spanish: el bien
  alternatives_spanish:
  - lo bueno
  - el buen camino
  - la prosperidad
  lexicon: טוב (HALOT)
  rationale: En este contexto de contraste de elección, «el bien» preserva el paralelo con «la vida» frente a «la muerte y el mal». En español bíblico, «el bien» puede sonar más natural que «lo bueno» y mantiene la carga ética del término.
- source_word: הַמָּוֶת
  english_pob_choice: death
  chosen_spanish: la muerte
  alternatives_spanish:
  - muerte
  lexicon: מות (HALOT)
  rationale: Traducción directa y transparente; el artículo definido conserva el paralelismo con «la vida».
- source_word: הָרָע
  english_pob_choice: evil
  chosen_spanish: el mal
  alternatives_spanish:
  - el malheur
  - la calamidad
  - el daño
  lexicon: רע (HALOT)
  rationale: El inglés POB opta por «evil» para mantener el contraste moral-teológico. En español, «el mal» preserva mejor esa fuerza que «daño» o «calamidad», aunque el hebreo también puede abarcar consecuencias perjudiciales.
theological_decisions:
- issue: Alcance de la antítesis final בין טוֹב y רָע
  english_pob_reading: good / evil
  chosen_spanish_reading: el bien / el mal
  alternative_spanish_readings:
  - la prosperidad / la calamidad
  - lo bueno / el daño
  rationale: La pareja hebrea presenta una elección integral con tono moral y existencial. Traducirla como «el bien / el mal» mantiene la tensión teológica que el audit trail documenta para «good / evil» y evita reducir רָע a mera desgracia circunstancial.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: El último pase de revisión indica alta concordancia y sin cambios; esta versión mantiene el sentido del texto hebreo y las decisiones auditadas en inglés, con ajuste natural al español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como terminología estándar del proyecto cuando el pasaje lo requiera; aquí no aparece el nombre divino.
  - Se evita «Cristo» y otros términos no pertinentes al versículo.
  - «El bien / el mal» conserva el paralelismo semántico del hebreo mejor que una interpretación más explicativa.
  - 'La puntuación sigue el orden retórico del hebreo: llamado inicial, declaración, y doble contraste final.'
