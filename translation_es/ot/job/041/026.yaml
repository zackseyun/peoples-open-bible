translation:
  language: es
  text: Ve todo lo que es alto[a]; él es rey sobre todos los hijos de la soberbia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todos los soberbios»; literalmente, «todos los hijos de la soberbia».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵת
  english_pob_choice: 'on'
  chosen_spanish: mira
  alternatives_spanish:
  - mira sobre
  - ve
  - contempla
  lexicon: HALOT
  rationale: En español no hace falta reproducir el marcador de objeto directo de forma visible; el verbo simple «mira» conserva el valor transitivo y poético de יִרְאֶה sin forzar una construcción ajena al español.
- source_word: כָּל גָּבֹהַּ
  english_pob_choice: everything that is high
  chosen_spanish: todo lo que es alto
  alternatives_spanish:
  - todo lo elevado
  - todo lo sublime
  - todo lo altivo
  lexicon: HALOT
  rationale: La combinación totalizante se expresa con «todo lo que es alto», manteniendo el sentido literal de altura de גָּבֹהַּ y dejando abierta la posible resonancia metafórica de exaltación u orgullo.
- source_word: יִרְאֶה
  english_pob_choice: looks on
  chosen_spanish: mira
  alternatives_spanish:
  - ve
  - contempla
  - mira atentamente
  lexicon: HALOT
  rationale: «Mira» reproduce el ver poético con naturalidad en español y puede sugerir la mirada soberana o desafiante que el inglés POB quiso comunicar con «looks on».
- source_word: מֶלֶךְ
  english_pob_choice: king
  chosen_spanish: rey
  alternatives_spanish:
  - gobernante
  - soberano
  lexicon: HALOT
  rationale: «Rey» mantiene el metáfora regia del hebreo y la equivalencia directa con el audit trail inglés.
- source_word: עַל
  english_pob_choice: over
  chosen_spanish: sobre
  alternatives_spanish:
  - encima de
  - por encima de
  lexicon: HALOT
  rationale: «Sobre» es la preposición española más natural para dominio o supremacía y conserva el valor de gobierno del hebreo.
- source_word: בְּנֵי שָׁחַץ
  english_pob_choice: the sons of pride
  chosen_spanish: los hijos de la soberbia
  alternatives_spanish:
  - los hijos del orgullo
  - los soberbios
  - los orgullosos
  lexicon: HALOT
  rationale: «Soberbia» comunica mejor en español la carga de haughtiness/pride del sustantivo שָׁחַץ y mantiene el giro literal «hijos de», que el POB conserva como designación poética.
theological_decisions:
- issue: Sentido de «los hijos de la soberbia»
  english_pob_reading: A poetic designation for all proud or haughty creatures/beings, with Leviathan portrayed as supreme over them.
  chosen_spanish_reading: Una designación poética de todos los seres o criaturas soberbias/altivas, sin precisar más la clase referida, con Leviatán presentado como soberano sobre ellas.
  alternative_spanish_readings:
  - referencia a bestias fieras
  - alusión mitopoética a poderes cósmicos caracterizados por la soberbia
  rationale: La frase hebrea es metafórica y conviene preservar su amplitud. «Los hijos de la soberbia» deja intacta la tensión entre lectura zoológica, moral o mitopoética, en línea con el POB en inglés.
  doctrine_reference: Preservar la tensión interpretativa sin resolverla prematuramente.
translation_notes:
  revision_awareness: El texto español sigue el juicio del POB inglés en mantener la ambigüedad poética de la segunda cola y en conservar el giro literal «hijos de la soberbia» como nota, no como paráfrasis interpretativa cerrada. No se detectaron revisiones posteriores que requieran ajuste.
  spanish_consistency_notes:
  - Se usa «Yahvé» en el proyecto cuando el hebreo expresa el nombre divino; aquí no aparece.
  - Se evita «SEÑOR» porque el verso no contiene un sustituto del nombre divino.
  - «Soberbia» se elige para שָׁחַץ por su fuerza moral y su naturalidad en español bíblico.
  - La nota al pie conserva la alternativa «los soberbios» para reflejar el rango semántico del hebreo sin perder la literalidad del constructo.
