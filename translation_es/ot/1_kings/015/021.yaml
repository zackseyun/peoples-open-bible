translation:
  language: es
  text: Y cuando Baasa oyó esto, dejó de construir Ramá y permaneció[a] en Tirsa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cesó de construir Ramá y vivió en Tirsa».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כִּשְׁמֹעַ
  english_pob_choice: And when ... heard of it
  chosen_spanish: Y cuando ... oyó
  alternatives_spanish:
  - Y sucedió que, cuando ... oyó
  - Ahora bien, cuando ... oyó
  lexicon: HALOT
  rationale: La fórmula narrativa וַיְהִי + infinitivo constructo de שׁמע introduce una cláusula temporal. En español, «Y cuando ... oyó» comunica la función sin forzar un calco como «y sucedió». El complemento implícito «de ello / de esto» queda sobreentendido por el contexto narrativo, como en la solución inglesa auditada.
- source_word: בַּעְשָׁא
  english_pob_choice: Baasha
  chosen_spanish: Baasa
  alternatives_spanish:
  - Baasa
  lexicon: Convención transliterativa bíblica
  rationale: Se translitera el nombre propio al español como «Baasa», ajustando la ortografía al uso hispano y manteniendo la identificación del personaje.
- source_word: וַיֶּחְדַּל
  english_pob_choice: he stopped
  chosen_spanish: dejó de
  alternatives_spanish:
  - cesó de
  - se detuvo
  lexicon: HALOT
  rationale: חדל expresa cesar o dejar de hacer algo. En español, «dejó de» es natural y reproduce bien la idea de interrupción de una actividad.
- source_word: מִבְּנוֹת
  english_pob_choice: building
  chosen_spanish: construir
  alternatives_spanish:
  - edificar
  - edificación
  lexicon: HALOT
  rationale: La preposición מִן con infinitivo constructo tras חדל señala cese de una acción. En español, «dejó de construir» conserva esa relación verbal de manera fluida y fiel.
- source_word: אֶת הָרָמָה
  english_pob_choice: Ramah
  chosen_spanish: Ramá
  alternatives_spanish:
  - Rama
  lexicon: HALOT / convención toponímica
  rationale: Se conserva el nombre del lugar como topónimo bíblico en español, con forma acentuada «Ramá». El artículo hebreo no se reproduce porque el nombre funciona como designación propia.
- source_word: וַיֵּשֶׁב
  english_pob_choice: remained
  chosen_spanish: se quedó
  alternatives_spanish:
  - habitó
  - vivió
  - permaneció
  lexicon: HALOT
  rationale: ישׁב puede significar sentarse, habitar, permanecer o residir. En este contexto narrativo, «se quedó» expresa que no continuó la obra y permaneció en su base de manera natural en español.
- source_word: בְּתִרְצָה
  english_pob_choice: in Tirzah
  chosen_spanish: en Tirsa
  alternatives_spanish:
  - en Tirzah
  lexicon: Convención transliterativa bíblica
  rationale: 'Se conserva el topónimo con una forma española habitual, «Tirsa», y la preposición ב se traduce naturalmente como «en». '
translation_notes:
  revision_awareness: El texto español sigue de cerca el flujo narrativo del hebreo y coincide con la lectura auditada en inglés, sin introducir ampliaciones interpretativas. Se mantiene la alternancia verbal temporal de la frase hebrea y se conserva la ambigüedad razonable de ישׁב con una nota alternativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; este versículo no lo contiene.
  - Se prefieren formas toponímicas españolas estables («Ramá», «Tirsa») para legibilidad, sin perder la referencia geográfica.
  - «Dejó de construir» preserva el valor de cese de חדל y evita suavizar demasiado la acción.
