translation:
  text: For every act of righteousness there is a reward; each person will find it according to his works[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew reads ''Everyone who does righteousness has a reward'' (or, more literally, ''Every doer of righteousness—there is for him a reward''). The Greek parallel is fuller: ''for every almsgiving/merciful deed ... each will find according to his works.'''
    reason: textual_variant
  - marker: b
    text: Greek ἐλεημοσύνη can mean 'almsgiving' or more broadly a merciful deed; the Hebrew witness has 'righteousness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  chosen: every
  alternatives:
  - all
  - whoever
  lexicon: HALOT
  rationale: The Hebrew phrase כָּל הָעֹשֶׁה is somewhat compressed in the extant witness. In light of the Greek parallel πάσῃ ... / ἕκαστος, an indefinite distributive sense is best conveyed by 'every' rather than a collective 'all.'
- source_word: הָעֹשֶׁה
  chosen: act
  alternatives:
  - the one who does
  - who does
  - doing
  lexicon: HALOT
  rationale: Literally the participle means 'the one doing.' But the Hebrew wording as preserved is terse and the Greek parallel has ἐλεημοσύνῃ ('almsgiving/merciful deed'), suggesting reference to a deed rather than merely a person. Rendering the phrase as 'every act of ...' gives idiomatic English while preserving the sense of performed action.
- source_word: צְדָקָה
  chosen: righteousness
  alternatives:
  - justice
  - charity
  - almsgiving
  lexicon: HALOT
  rationale: The Hebrew plainly reads צְדָקָה, whose normal sense is 'righteousness' or 'justice.' The Greek parallel reflects ἐλεημοσύνη, which can mean 'almsgiving' or 'merciful deed,' likely an interpretive or variant rendering. Because the Hebrew is the primary witness here, 'righteousness' is retained in the main text, while the Greek-influenced alternative is preserved in a footnote.
- source_word: יֵשׁ לוֹ
  chosen: there is
  alternatives:
  - he has
  - belongs to him
  lexicon: HALOT
  rationale: The idiom יֵשׁ לוֹ can be rendered 'he has,' but in English the clause reads more naturally as 'there is a reward' for the deed. This keeps the existential force without awkwardness.
- source_word: שָׂכָר
  chosen: reward
  alternatives:
  - wages
  - recompense
  lexicon: HALOT
  rationale: שָׂכָר denotes payment, wages, or reward. 'Reward' fits wisdom-literature style and avoids over-commercializing the statement while preserving the idea of recompense.
- source_word: πάσῃ ἐλεημοσύνῃ ποιήσει τόπον
  chosen: For every act of righteousness there is a reward
  alternatives:
  - For every almsgiving he will make room
  - For every merciful deed he makes a place
  lexicon: BDAG
  rationale: The Greek wording differs notably from the Hebrew and is difficult in a literal rendering ('will make place/room'). Since the task requires using the Greek as actual input while prioritizing the Hebrew witness, the Greek supports the distributive sense and the idea of a deed receiving due outcome, but does not override the Hebrew wording in the main text.
- source_word: ἕκαστος κατὰ τὰ ἔργα αὐτοῦ εὑρήσει
  chosen: each person will find it according to his works
  alternatives:
  - each will find according to his deeds
  - everyone will receive according to his works
  lexicon: BDAG
  rationale: This clause is present in the Greek parallel but absent from the extant Hebrew line as given. Because the Hebrew source is marked with minor mismatch and the Greek likely preserves a fuller form of the verse, this clause is included in the translation to reflect the parallel witness, while the source divergence is documented in a footnote.
