translation:
  language: es
  text: Y escaparán sus sobrevivientes y estarán en los montes[a], como palomas de los valles, todos ellos gimiendo[b], cada uno en su iniquidad[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como palomas de los barrancos». El término hebreo puede referirse a valles o a wadis/barrancos.
    reason: lexical_alternative
  - marker: b
    text: O «murmurando» o «arrullando»; el verbo hebreo sugiere un sonido bajo y, en este contexto, duelo.
    reason: lexical_alternative
  - marker: c
    text: O «cada uno por su culpa» o «por su castigo»; la palabra hebrea puede denotar iniquidad, culpa o la consecuencia de la culpa.
    reason: alternative_reading
lexical_decisions:
- source_word: וּפָלְטוּ
  english_pob_choice: will escape
  chosen_spanish: escaparán
  alternatives_spanish:
  - huirán
  - se salvarán
  lexicon: HALOT
  rationale: פָּלַט expresa escape o libramiento del peligro. «Escaparán» conserva el futuro profético y la idea de salir con vida sin añadir matices no explicitados.
- source_word: פְּלִיטֵיהֶם
  english_pob_choice: their survivors
  chosen_spanish: sus sobrevivientes
  alternatives_spanish:
  - los que de ellos escaparon
  - sus fugitivos
  - los sobrevivientes de ellos
  lexicon: HALOT
  rationale: El sustantivo designa a los que han escapado. «Sobrevivientes» suena natural en español y retiene el énfasis en quienes quedan con vida tras el juicio.
- source_word: וְהָיוּ אֶל־הֶהָרִים
  english_pob_choice: and be on the mountains
  chosen_spanish: y estarán en los montes
  alternatives_spanish:
  - y irán a los montes
  - y estarán hacia los montes
  lexicon: HALOT
  rationale: La construcción indica localización resultante. «Estarán en los montes» conserva ese valor locativo sin forzar un movimiento que el hebreo no expresa de manera directa.
- source_word: כְּיוֹנֵי הַגֵּאָיוֹת
  english_pob_choice: like doves of the valleys
  chosen_spanish: como palomas de los valles
  alternatives_spanish:
  - como palomas de las quebradas
  - como palomas de los barrancos
  lexicon: HALOT
  rationale: El término puede referirse a valles o a cauces/quebradas. «Valles» es más accesible en español y mantiene la imagen topográfica del símil.
- source_word: כֻּלָּם הֹמוֹת
  english_pob_choice: all of them moaning
  chosen_spanish: todas ellas gimiendo
  alternatives_spanish:
  - todas ellas murmurando
  - todas ellas coando
  - todas ellas lamentándose
  lexicon: HALOT
  rationale: 'El participio de המה denota un sonido bajo: murmullo, gemido o lamento. En este contexto de juicio, «gimiendo» comunica mejor la carga de dolor sin perder la resonancia acústica del verbo.'
- source_word: אִישׁ
  english_pob_choice: each one
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada hombre
  - cada persona
  lexicon: HALOT
  rationale: Aunque formalmente singular masculino, aquí funciona distributivamente. «Cada uno» expresa el reparto individual sin restringir innecesariamente a varones en español.
- source_word: בַּעֲוֺנוֹ
  english_pob_choice: in his iniquity
  chosen_spanish: en su iniquidad
  alternatives_spanish:
  - por su culpa
  - a causa de su culpa
  - en su culpa
  lexicon: HALOT
  rationale: עָוֹן puede significar iniquidad, culpa o la consecuencia penal de la culpa. «En su iniquidad» preserva la ambigüedad útil del hebreo y deja abierta la tensión entre pecado, culpa y castigo.
theological_decisions:
- issue: Alcance de עָוֹן en contexto de juicio
  english_pob_reading: iniquity/guilt is left somewhat open by rendering 'in his iniquity'
  chosen_spanish_reading: «en su iniquidad» mantiene abierta la referencia a pecado, culpa o consecuencia de la culpa
  alternative_spanish_readings:
  - por su culpa
  - a causa de su castigo
  rationale: El hebreo permite varias lecturas relacionadas. La redacción española evita cerrar el sentido solo en culpa moral o solo en pena recibida, preservando la tensión teológica documentada en el POB inglés.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'Revisión alta concordancia: el pasaje quedó estable en el último pase, sin cambios sustantivos requeridos; se mantuvieron las decisiones léxicas y la tensión teológica documentadas en el audit trail.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma española estándar del nombre divino cuando corresponda; en este versículo no aparece explícitamente.
  - Se prefiere «iniquidad» para conservar la amplitud semántica de עָוֹן, en lugar de reducirla a una sola noción moral o penal.
  - La imagen aviar se conserva con «palomas», y la nota aclara la alternativa topográfica «barrancos» para reflejar la oscilación valle/ravine del hebreo.
