translation:
  language: es
  text: 'Y ahora tú estás diciendo[a]: «Ve, dile a tu señor: “He aquí, Elías”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a tu amo». El hebreo אֲדוֹן puede designar tanto a un superior humano como a «señor». Aquí se refiere a Acab, el superior de Obadías.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  lexicon: HALOT
  rationale: Conserva el valor discursivo-temporal de וְעַתָּה y su enlace con el contexto previo. En español, 'Y ahora' suena natural y mantiene la transición enfática.
- source_word: אַתָּה
  english_pob_choice: you
  chosen_spanish: tú
  alternatives_spanish:
  - usted
  lexicon: HALOT
  rationale: El pronombre explícito es enfático en hebreo. 'Tú' conserva esa segunda persona directa en un registro bíblico claro y natural.
- source_word: אֹמֵר
  english_pob_choice: are saying
  chosen_spanish: estás diciendo
  alternatives_spanish:
  - dices
  - estás hablando
  lexicon: HALOT
  rationale: El participio comunica acción presente/imperfectiva. 'Estás diciendo' refleja mejor la fuerza inmediata que un imperativo o un simple presente gnómico.
- source_word: לֵךְ
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Vete
  lexicon: HALOT
  rationale: Imperativo de הלך. 'Ve' es la forma directa y sobria; 'vete' añadiría un matiz reflexivo no exigido por el hebreo.
- source_word: אֱמֹר
  english_pob_choice: say
  chosen_spanish: dile
  alternatives_spanish:
  - di
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'di', en español el complemento con destinatario se expresa de modo más natural con 'dile'. Mantiene la orden directa sin perder precisión.
- source_word: לַאדֹנֶיךָ
  english_pob_choice: to your lord
  chosen_spanish: a tu señor
  alternatives_spanish:
  - a tu amo
  - a tu maestro
  lexicon: HALOT
  rationale: Aquí אָדוֹן se refiere a un superior humano, no al título divino. 'Señor' conserva la relación de autoridad y sigue siendo la opción más natural en español; 'amo' sería más duro y 'maestro' no encaja bien en este contexto cortesano.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: Aquí está
  alternatives_spanish:
  - Mira
  - He aquí
  lexicon: HALOT
  rationale: La partícula deíctica pide presentar la presencia de Elías. 'Aquí está' reproduce con claridad la deixis en un español contemporáneo; 'He aquí' es más solemne pero menos natural.
- source_word: אֵלִיָּהוּ
  english_pob_choice: Elijah
  chosen_spanish: Elías
  alternatives_spanish:
  - Elias
  lexicon: Tradicional transliteration standard
  rationale: Nombre propio bíblico en su forma castellana estándar. Mantiene identificación inmediata y fidelidad onomástica.
theological_decisions:
- issue: אָדוֹן aplicado a un superior humano
  english_pob_reading: your lord
  chosen_spanish_reading: tu señor
  alternative_spanish_readings:
  - tu amo
  - tu maestro
  rationale: El texto no usa el título divino, sino una referencia relacional a un superior humano (Ahab). 'Señor' preserva la jerarquía sin confundirla con Yahvé, mientras que 'amo' exagera el tono esclavista y 'maestro' cambia el matiz del cargo.
  doctrine_reference: 'DOCTRINE.md: titles for human superiors vs. divine title; YHWH reserved as Yahvé'
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó 'Look' por 'Behold' para dar a הִנֵּה un registro más formal. En español, se optó por 'Aquí está' porque conserva la función deíctica con mayor naturalidad y evita un calco arcaizante; no se pierde el énfasis de presentación del personaje.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma para el nombre divino, pero este versículo no contiene el tetragrámaton ni una mención directa a Dios.
  - '''Señor'' se usa aquí solo para אָדוֹן humano, no como sustituto de Yahvé.'
  - 'Los nombres propios se castellanizan de forma estándar: ''Elías''.'
