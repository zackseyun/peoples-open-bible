translation:
  language: es
  text: '[a]Oigan, cielos, y presten oído, tierra, porque Yahvé ha hablado: «Yo crié hijos y los hice crecer[b], pero ellos se rebelaron contra mí»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Escuchen». El hebreo abre con un llamado solemne a oír atentamente, con paralelismo poético entre cielo y tierra.
    reason: lexical_alternative
  - marker: b
    text: O «los crié y los levanté». El segundo verbo también puede traducirse más generalmente como «los hice grandes» o «los exalté», pero aquí se entiende mejor en el contexto de crianza y crecimiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ
  english_pob_choice: Hear
  chosen_spanish: Oigan
  alternatives_spanish:
  - Escuchen
  - Oigan atentamente
  lexicon: HALOT
  rationale: Imperativo plural de oír/escuchar en un llamado profético solemne. «Oigan» conserva la dirección a los oyentes y funciona bien en español bíblico actual.
- source_word: שָׁמַיִם
  english_pob_choice: O heavens
  chosen_spanish: cielos
  alternatives_spanish:
  - heavens
  - cielos, oh
  lexicon: HALOT
  rationale: El hebreo usa el plural cósmico en vocativo. «Cielos» preserva el paralelismo con «tierra» y suena natural en español bíblico.
- source_word: וְהַאֲזִינִי
  english_pob_choice: give ear
  chosen_spanish: presten oído
  alternatives_spanish:
  - escuchen con atención
  - atiendan
  lexicon: HALOT
  rationale: אוזן expresa una escucha más atenta y solemne que שׁמע. «Presten oído» mantiene esa intensificación sin volverse arcaico.
- source_word: אֶרֶץ
  english_pob_choice: O earth
  chosen_spanish: tierra
  alternatives_spanish:
  - la tierra
  - el país
  lexicon: HALOT
  rationale: En paralelo con «cielos», el sentido es cósmico y no geográfico-político. «Tierra» preserva la simetría poética.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino según el criterio del proyecto para el Tetragrámaton, evitando la sustitución por un título.
- source_word: דִּבֵּר
  english_pob_choice: has spoken
  chosen_spanish: ha hablado
  alternatives_spanish:
  - ha dicho
  - habló
  lexicon: HALOT
  rationale: El perfecto hebreo presenta una declaración solemne con fuerza vigente. «Ha hablado» conserva el valor de acto verbal autorizado.
- source_word: בָּנִים
  english_pob_choice: children
  chosen_spanish: hijos
  alternatives_spanish:
  - niños
  - hijos e hijas
  lexicon: HALOT
  rationale: El hebreo masculino plural puede referirse corporativamente al pueblo como descendencia. «Hijos» mantiene la metáfora filial y el enlace con el discurso divino; la referencia corporativa queda aclarada en la nota.
- source_word: גִּדַּלְתִּי
  english_pob_choice: I have reared
  chosen_spanish: crié
  alternatives_spanish:
  - crié y alimenté
  - hice crecer
  lexicon: HALOT
  rationale: En contexto de paternidad y crianza, el verbo expresa criar/educar. «CrIé» es breve y fiel al cuidado de los hijos.
- source_word: וְרוֹמַמְתִּי
  english_pob_choice: brought them up / made great / lifted up
  chosen_spanish: los engrandecí
  alternatives_spanish:
  - los levanté
  - los exalté
  - los hice crecer
  lexicon: HALOT
  rationale: El segundo verbo añade la idea de elevar/honrar más que repetir la crianza. «Los engrandecí» conserva la distinción semántica y la tensión entre crianza y elevación.
- source_word: פָּשְׁעוּ
  english_pob_choice: have rebelled
  chosen_spanish: se rebelaron
  alternatives_spanish:
  - han transgredido
  - se han rebelado
  lexicon: HALOT
  rationale: פשׁע denota rebelión/cisma contra autoridad legítima, con matiz pactual. «Se rebelaron» expresa bien esa ruptura relacional y jurídica.
- source_word: בִי
  english_pob_choice: against me
  chosen_spanish: contra mí
  alternatives_spanish:
  - frente a mí
  - en mi contra
  lexicon: HALOT
  rationale: Con פשע, la preposición señala oposición dirigida a una persona. «Contra mí» es la forma idiomática más clara en español.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: Se conserva el nombre personal del pacto y no se sustituye por un título. La forma «Yahvé» sigue el criterio del proyecto para el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Corporate sense of בָּנִים
  english_pob_reading: children
  chosen_spanish_reading: hijos
  alternative_spanish_readings:
  - hijos e hijas
  - descendencia
  rationale: Aquí el hebreo masculino plural funciona corporativamente para el pueblo como descendencia de Yahvé. «Hijos» conserva el vínculo filial sin introducir una neutralización que borre la metáfora.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión del audit trail que corrigió una redacción previa más abstracta (“raised/exalted”) hacia una más precisa en términos de crianza (“reared/brought them up”). La versión española evita reducir el segundo verbo a una simple exaltación y conserva la tensión entre criar y engrandecer/hacer crecer.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - 'Se preservó el paralelismo poético con pares imperativos breves: «Oigan... presten oído».'
  - Se evitó «SEÑOR» como sustitución del Tetragrámaton.
  - «Hijos» se usa en sentido corporativo; la nota explica el alcance colectivo.
  - La puntuación con dos puntos introduce correctamente la cita divina en estilo bíblico en español.
