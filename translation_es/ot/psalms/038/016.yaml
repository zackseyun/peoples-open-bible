  to: Porque en ti[a] he esperado, Yahvé; tú responderás[b], oh Señor, Dios mío.
  rationale: Se revisa porque el borrador omitía el verbo principal הוֹחָלְתִּי, lo que hacía incompleta la primera cláusula. Se adopta «en ti he esperado» para expresar de forma idiomática en español la esperanza dirigida a Dios, manteniendo la nota sobre el hebreo más literal «para ti». Se conserva «Yahvé» por política terminológica, «responderás» sin objeto explícito conforme al hebreo, y se ajusta el vocativo final a «oh Señor, Dios mío» por mayor naturalidad.
