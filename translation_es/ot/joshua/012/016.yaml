  text: el rey de Makeda[a], uno; el rey de Betel, uno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo conserva un estilo de lista muy breve: «el rey de Makeda, uno; el rey de Betel, uno», donde «uno» señala el total de cada rey derrotado.'
