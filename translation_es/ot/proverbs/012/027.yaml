translation:
  language: es
  text: El perezoso no asa su caza[a], pero la diligencia es la riqueza preciosa del hombre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no caza su presa», si el verbo se toma en sentido más amplio como obtener o preparar la presa, en vez de asarla específicamente.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «un hombre»; el singular masculino aquí es representativo y se refiere a una persona en general mediante lenguaje proverbial masculino.'
    reason: cultural_note
lexical_decisions:
- source_word: יַחֲרֹךְ
  english_pob_choice: roast
  chosen_spanish: asa
  alternatives_spanish:
  - rostiza
  - tuesta
  - cocina
  lexicon: HALOT
  rationale: El verbo hebreo se refiere propiamente a un proceso por fuego. «Asa» conserva la imagen concreta de cocinar la presa obtenida; en español es natural y mantiene el contraste proverbial. La alternativa «caza» sería demasiado libre frente al sentido preferido del texto auditado.
- source_word: רְמִיָּה
  english_pob_choice: lazy man
  chosen_spanish: el perezoso
  alternatives_spanish:
  - el flojo
  - la persona perezosa
  - el indolente
  lexicon: HALOT
  rationale: En Proverbios, el sustantivo expresa dejadez o pereza. «El perezoso» reproduce bien la categoría proverbial y mantiene el contraste con «la diligencia» en la segunda línea.
- source_word: צֵידוֹ
  english_pob_choice: his game
  chosen_spanish: su presa
  alternatives_spanish:
  - su caza
  - lo cazado
  - su game
  lexicon: HALOT
  rationale: En español, «presa» comunica de forma natural el animal o pieza cazada y encaja con la imagen de asar lo obtenido. «Su caza» sería posible, pero menos idiomático aquí.
- source_word: הוֹן
  english_pob_choice: wealth
  chosen_spanish: riqueza
  alternatives_spanish:
  - bienes
  - riquezas
  - tesoro
  lexicon: HALOT
  rationale: El sustantivo denota riqueza o bienes acumulados. «Riqueza» es claro y directo en español, y funciona bien en la sentencia sapiencial.
- source_word: אָדָם
  english_pob_choice: a man’s
  chosen_spanish: del hombre
  alternatives_spanish:
  - de un hombre
  - de la humanidad
  - de la persona
  lexicon: HALOT
  rationale: Se conserva el singular masculino representativo del hebreo, sin neutralizarlo. En español, «del hombre» es natural y permite el valor proverbial general.
- source_word: יָקָר
  english_pob_choice: precious
  chosen_spanish: preciosa
  alternatives_spanish:
  - valiosa
  - de gran precio
  - costosa
  lexicon: HALOT
  rationale: El adjetivo expresa valor precioso o apreciado. «Preciosa» preserva el tono evaluativo y la fuerza proverbial de la frase.
- source_word: חָרוּץ
  english_pob_choice: diligence
  chosen_spanish: la diligencia
  alternatives_spanish:
  - el diligente
  - la industria
  - la laboriosidad
  lexicon: HALOT
  rationale: El término puede referirse a la cualidad de ser diligente. Como en la lectura auditada inglesa, la abstracción «la diligencia» hace fluida la contraposición con la pereza y conserva la idea de que esta cualidad constituye riqueza.
theological_decisions:
- issue: Lenguaje representativo masculino en אָדָם
  english_pob_reading: a man’s
  chosen_spanish_reading: del hombre
  alternative_spanish_readings:
  - de la persona
  - de la humanidad
  - de uno
  rationale: No hay carga doctrinal, pero se preserva el masculino singular representativo del hebreo sapiencial, conforme a la política de fidelidad al género gramatical cuando funciona de modo proverbial y genérico.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: El texto inglés auditado conserva la imagen concreta de «roast» y registra una alternativa amplia («catch»). La versión española sigue la lectura concreta de asar la presa, sin perder la posibilidad interpretativa alternativa consignada en nota. No hay revisiones aplicadas en el paquete fuente y el veredicto de revisión es de alta concordancia.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como terminología estándar del proyecto cuando no aparece en este versículo.
  - Se eligió «pereza/diligencia» para sostener el paralelismo proverbial sin introducir lenguaje eclesiástico ajeno al hebreo.
  - La nota [b] preserva la función genérica del singular masculino sin convertirlo en plural abstracto.
