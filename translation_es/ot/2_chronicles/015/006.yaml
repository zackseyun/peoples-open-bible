translation:
  language: es
  text: Nación fue aplastada por nación, y ciudad por ciudad, porque Dios los turbó[a] con toda clase de angustia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «confundió» o «trastornó»; el verbo hebreo puede abarcar turbación, confusión o pánico.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכֻתְּת֥וּ
  english_pob_choice: was crushed
  chosen_spanish: fue aplastada
  alternatives_spanish:
  - fue triturada
  - fue quebrantada
  - fue destrozada
  lexicon: HALOT
  rationale: El pual de כתת expresa ser quebrado, aplastado o destruido violentamente. «Aplastada» comunica bien la fuerza de la imagen en español moderno sin suavizarla; mantiene el pasivo y la violencia del verbo original.
- source_word: גוֹי בְּגוֹי
  english_pob_choice: nation by nation
  chosen_spanish: nación por nación
  alternatives_spanish:
  - nación contra nación
  - una nación por otra nación
  - nación tras nación
  lexicon: HALOT
  rationale: La construcción distributiva con ב se conserva con «por», que en español permite reflejar la relación recíproca/internecina entre las naciones sin añadir una interpretación demasiado explícita.
- source_word: וְעִיר בְּעִיר
  english_pob_choice: and city by city
  chosen_spanish: y ciudad por ciudad
  alternatives_spanish:
  - y ciudad contra ciudad
  - y una ciudad por otra ciudad
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con la frase anterior y el mismo patrón distributivo, natural en español y fiel a la brevedad hebrea.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios mismo
  lexicon: HALOT
  rationale: Aunque אֱלֹהִים tiene forma plural, aquí rige verbo singular y designa al único Dios del contexto. «Dios» es la equivalencia normal y clara en español.
- source_word: הֲמָמָ֖ם
  english_pob_choice: troubled them
  chosen_spanish: los turbó
  alternatives_spanish:
  - los confundió
  - los perturbó
  - los trastornó
  lexicon: HALOT
  rationale: El verbo המם puede significar causar confusión, pánico o turbación. «Turbó» conserva el campo semántico de desconcierto y angustia con buena naturalidad en español bíblico contemporáneo.
- source_word: בְּכָל צָרָה
  english_pob_choice: with every kind of distress
  chosen_spanish: con toda clase de angustia
  alternatives_spanish:
  - con toda angustia
  - con todo tipo de aflicción
  - en toda angustia
  lexicon: HALOT
  rationale: La preposición ב aquí expresa medio o circunstancia; el sentido es que Dios los afligió/turbó mediante múltiples calamidades. «Toda clase de angustia» refleja la totalidad de כָּל y el carácter amplio de צָרָה sin sonar demasiado técnico.
theological_decisions:
- issue: Agencia divina en la calamidad
  english_pob_reading: for God troubled them with every kind of distress
  chosen_spanish_reading: porque Dios los turbó con toda clase de angustia
  alternative_spanish_readings:
  - porque Dios permitió que fueran turbados con toda clase de angustia
  - porque Dios los dejó en toda clase de angustia
  rationale: El hebreo presenta un verbo activo con Dios como sujeto. La traducción debe preservar esa agencia explícita, sin convertirla en mera अनुमति o permiso no dicho por el texto.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: El contexto inglés fue revisado como estable y sin cambios recientes; la redacción española sigue la lectura auditada sin introducir reinterpretaciones nuevas.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים y no se introduce «SEÑOR», porque el versículo no contiene el nombre divino YHWH.
  - 'Se preserva el paralelismo distributivo con «por» en ambas colonas: «nación por nación» / «ciudad por ciudad».'
  - Se evita un calco demasiado rígido como «en toda clase de angustia» porque en español «con» expresa mejor el medio o circunstancia del verbo.
  - El pie de nota marca la alternativa léxica principal para הֲמָם, ya que español ofrece varias opciones cercanas y la elección afecta el matiz de la acción divina.
