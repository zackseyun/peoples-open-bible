translation:
  language: es
  text: Porque si él clama contra ti[a] en la amargura de su alma, su Hacedor oirá su súplica.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'invoca juicio contra ti'. La línea hebrea conservada citada en el expediente no coincide con el texto griego de este versículo; por eso la traducción principal sigue aquí el testigo griego.
