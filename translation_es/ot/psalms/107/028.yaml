translation:
  language: es
  text: Entonces clamaron a Yahvé en sus apuros[a], y él los sacó de sus angustias.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «de sus angustias»; alternativamente, «de sus apuros».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּצְעֲקוּ
  english_pob_choice: Then they cried out
  chosen_spanish: Entonces clamaron
  alternatives_spanish:
  - Y clamaron
  - Entonces gritaron
  lexicon: HALOT
  rationale: El waw-consecutivo marca secuencia narrativa; «Entonces» conserva ese avance. צעק expresa un clamor urgente de auxilio, y «clamaron» comunica esa intensidad mejor que un simple «gritaron».
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - a
  - hacia
  lexicon: HALOT
  rationale: Con el verbo de clamor, el español natural es «clamar a». Mantiene la dirección hacia el destinatario del ruego sin añadir matices innecesarios.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como «Yahvé», conforme al criterio del proyecto en español. No se sustituye por un título como «SEÑOR».
- source_word: בַּצַּר
  english_pob_choice: in their trouble
  chosen_spanish: en su angustia
  alternatives_spanish:
  - en su trouble
  - en su aflicción
  - en su estrechez
  lexicon: HALOT
  rationale: צַר designa una situación de opresión, apuro o angustia. «Angustia» es idiomático en español y conserva la idea de presión o aflicción personal del contexto.
- source_word: וּמִמְּצוּקוֹתֵיהֶם
  english_pob_choice: out of their distresses
  chosen_spanish: de sus aflicciones
  alternatives_spanish:
  - de sus angustias
  - fuera de sus aflicciones
  - de sus estrecheces
  lexicon: HALOT
  rationale: מְצוּקוֹת es plural y sugiere presiones o apreturas múltiples; «aflicciones» preserva bien el plural y el sentido de padecimientos diversos. Se usa «de» para reflejar el valor de מן en la salida, con fluidez natural en español.
- source_word: יוֹצִיאֵם
  english_pob_choice: he brought them out
  chosen_spanish: los sacó
  alternatives_spanish:
  - los hizo salir
  - los sacó de allí
  - los libró
  lexicon: HALOT
  rationale: El hiphil de יצא significa hacer salir o sacar. «Los sacó» preserva la imagen concreta mejor que «los libró», que sería más interpretativo.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. La traducción española mantiene el nombre propio divino como «Yahvé», evitando la sustitución por un título y conservando la referencia personal del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Matiz de liberación en יוֹצִיאֵם
  english_pob_reading: he brought them out
  chosen_spanish_reading: él los sacó
  alternative_spanish_readings:
  - él los libró
  - él los rescató
  rationale: 'La imagen verbal hebrea es concreta: hacer salir. En español, «los sacó» mantiene ese movimiento sin borrar la metáfora física de la salida, que el inglés POB también conservó.'
  doctrine_reference: HALOT / equivalencia verbal concreta
translation_notes:
  revision_awareness: La versión inglesa final y la revisión más reciente no introducen cambios; el veredicto de concordancia es alto. El español sigue de cerca las decisiones auditadas, manteniendo el paralelismo del hebreo y la alternativa de la preposición con מן mediante una nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente con el estándar del proyecto para el Tetragrámaton.
  - Se evita «SEÑOR» para no ocultar el nombre divino.
  - «Clamaron» y «aflicciones» preservan el tono de súplica urgente y el plural hebreo.
  - La nota a pie de página marca la alternativa de traducción para מן sin sobrecargar el texto principal.
