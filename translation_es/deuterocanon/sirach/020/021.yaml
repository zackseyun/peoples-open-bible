translation:
  language: es
  text: Hay quien se ve impedido de pecar[a] por la pobreza, y en su descanso no sentirá remordimiento[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «por necesidad» o «a causa de la necesidad». El griego deja abierta la idea de falta, carencia o pobreza como motivo del impedimento.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «no será pinchado/traspasado». La expresión apunta a una punzada interior, es decir, compunción o remordimiento.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κωλυόμενος
  english_pob_choice: prevented from sinning
  chosen_spanish: es impedido de pecar
  alternatives_spanish:
  - es prevenido de pecar
  - es detenido de pecar
  - se le impide pecar
  lexicon: BDAG
  rationale: El participio pasivo expresa restricción o impedimento. «Es impedido de pecar» conserva la fuerza pasiva y el sentido causal sin sonar demasiado técnico. «Se le impide pecar» sería más idiomático, pero cambia ligeramente el enfoque impersonal.
- source_word: ἁμαρτάνειν
  english_pob_choice: sinning
  chosen_spanish: pecar
  alternatives_spanish:
  - pecando
  - cometer pecado
  - hacer el mal
  lexicon: BDAG
  rationale: El infinitivo significa literalmente «pecar». En español, «pecar» es la forma más directa y fiel al valor moral-religioso del verbo.
- source_word: ἀπὸ ἐνδείας
  english_pob_choice: by poverty
  chosen_spanish: por la pobreza
  alternatives_spanish:
  - por necesidad
  - a causa de la necesidad
  - por la escasez
  lexicon: LSJ
  rationale: 'La frase expresa causa o motivo: la falta material restringe a la persona. «Por la pobreza» recoge bien ese valor causal y mantiene el matiz socioeconómico del griego.'
- source_word: ἀναπαύσει
  english_pob_choice: rest
  chosen_spanish: descanso
  alternatives_spanish:
  - reposo
  - quietud
  - sosiego
  lexicon: LSJ
  rationale: «Descanso» es natural en español moderno y conserva la idea de reposo o alivio. «Reposo» también sería posible, pero suena algo más solemne y menos inmediato.
- source_word: οὐ κατανυγήσεται
  english_pob_choice: he will feel no remorse
  chosen_spanish: no sentirá remordimiento
  alternatives_spanish:
  - no será traspasado de dolor
  - no será herido interiormente
  - no sentirá compunción
  lexicon: LSJ
  rationale: El verbo puede significar ser herido/picado interiormente, de donde la idea de compunción o remordimiento. «No sentirá remordimiento» comunica bien ese sentido idiomático en español actual sin perder la tensión léxica del original.
theological_decisions:
- issue: La pobreza como freno para pecar
  english_pob_reading: The verse states that poverty can restrain a person from committing sin and that such a person, when at rest, is free from inward compunction.
  chosen_spanish_reading: El versículo afirma observacionalmente que la pobreza puede impedir que una persona peque, y que en su descanso no experimentará remordimiento interior.
  alternative_spanish_readings:
  - La pobreza hace que la persona no peque, lo cual podría sonar a afirmación moral más fuerte de lo que dice el texto.
  - La necesidad restringe el pecado, sin implicar que la pobreza sea en sí misma virtud.
  rationale: El griego presenta una observación sapiencial, no una tesis doctrinal que convierta la pobreza en virtud moral. La redacción española preserva esa observación sin resolver la tensión ni exagerarla.
  doctrine_reference: Preservar la tensión teológica sin convertir una observación sapiencial en doctrina normativa.
translation_notes:
  revision_awareness: La base inglesa revisó 'kept from sinning' a 'prevented from sinning' para ajustar κωλυόμενος. La versión española toma esa misma dirección con «es impedido de pecar», manteniendo el valor pasivo y causal del participio. No se adoptó una solución más libre porque el griego es breve y sentencioso, y el contexto no exige expansión.
  spanish_consistency_notes:
  - Se mantiene «pobreza» para ἐνδεία, coherente con la decisión inglesa principal, aunque se reconoce en nota la alternativa «necesidad».
  - Se evita «SEÑOR» u otro sustituto porque no hay aquí el nombre divino ni un título que lo requiera.
  - «Remordimiento» traduce el efecto interior de κατανυγήσεται, dejando visible en nota la metáfora de ser herido o traspasado.
