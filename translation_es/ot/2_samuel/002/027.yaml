translation:
  language: es
  text: 'Joab dijo: «Vive Dios, si no hubieras hablado, entonces desde la mañana[a] el pueblo habría subido[b], cada uno detrás de su hermano».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «desde el amanecer».'
    reason: lexical_alternative
  - marker: b
    text: Es decir, «cada uno habría dejado de perseguir a su hermano».
    reason: lexical_alternative
lexical_decisions:
- source_word: חַי הָאֱלֹהִים
  english_pob_choice: As God lives
  chosen_spanish: Vive Dios
  alternatives_spanish:
  - Vive Yahvé
  - Tan cierto como vive Dios
  lexicon: HALOT
  rationale: La fórmula hebrea es un juramento idiomático. «Vive Dios» conserva el valor juramentario directo y resulta natural en español bíblico; «Vive Yahvé» sería posible, pero aquí el hebreo dice literalmente «Dios», no el nombre divino.
- source_word: לוּלֵא דִּבַּרְתָּ
  english_pob_choice: if you had not spoken
  chosen_spanish: si no hubieras hablado
  alternatives_spanish:
  - si no hubieras dicho nada
  - si no hubieras hablado
  lexicon: HALOT
  rationale: La construcción expresa una condición contrafactual. «Hubieras hablado» mantiene el verbo general de hablar sin añadir objeto inexistente en el hebreo.
- source_word: מֵהַבֹּקֶר
  english_pob_choice: from the morning
  chosen_spanish: desde la mañana
  alternatives_spanish:
  - desde la mañana temprano
  - desde el amanecer
  lexicon: HALOT
  rationale: El מן con בֹּקֶר marca el punto temporal desde el cual habría ocurrido la acción. «Desde la mañana» es la equivalencia más natural en español y conserva la posibilidad temporal que el POB inglés anotó como alternativa «since morning».
- source_word: נַעֲלָה
  english_pob_choice: would have gone up
  chosen_spanish: habría subido
  alternatives_spanish:
  - habría salido
  - habría retrocedido
  lexicon: HALOT
  rationale: Se conserva el verbo básico עלה, «subir». En contexto militar puede implicar retirarse o dejar de perseguir, pero la traducción principal mantiene el sentido léxico central sin interpretar en exceso.
- source_word: אִישׁ מֵאַחֲרֵי אָחִיו
  english_pob_choice: each from following his brother
  chosen_spanish: cada uno detrás de su hermano
  alternatives_spanish:
  - cada uno de seguir a su hermano
  - cada uno apartándose de su hermano
  - cada uno de perseguir a su hermano
  lexicon: HALOT
  rationale: La imagen hebrea es literalmente «un hombre de detrás de su hermano». En español, «detrás de su hermano» conserva la metáfora espacial y evita forzar «perseguir» en el texto principal; la nota preserva la lectura contextual más idiomática.
theological_decisions:
- issue: Forma del juramento divino
  english_pob_reading: As God lives
  chosen_spanish_reading: Vive Dios
  alternative_spanish_readings:
  - Vive Yahvé
  - Tan cierto como vive Dios
  rationale: No se introduce el nombre divino aquí porque la fórmula hebrea usa אֱלֹהִים. La traducción mantiene el juramento y no lo paraphrasea como simple énfasis.
  doctrine_reference: Lexical oath formula; no doctrinal alteration.
- issue: Sentido de la expresión militar final
  english_pob_reading: each from following his brother
  chosen_spanish_reading: cada uno detrás de su hermano
  alternative_spanish_readings:
  - cada uno persiguiendo a su hermano
  - cada uno apartándose de su hermano
  rationale: La frase final puede describir el cese de la persecución entre hermanos israelitas, pero el hebreo conserva una imagen concreta. La versión principal mantiene esa tensión semántica, y la nota permite la lectura contextual de «perseguir» sin borrar el literal.
  doctrine_reference: Narrative military context; lexical tension preserved.
translation_notes:
  revision_awareness: 'Se revisó el borrador a la luz del audit trail inglés: se mantuvo la estructura condicional contrafactual, la fórmula juramentaria y la imagen espacial final, evitando interpretar en exceso el verbo עלה en el texto principal. La equivalencia fue ajustada para sonar natural en español sin perder las tensiones léxicas documentadas.'
  spanish_consistency_notes:
  - Se usa «Dios» y no «SEÑOR» porque el hebreo dice הָאֱלֹהִים en la fórmula de juramento.
  - «Hablado» conserva el verbo general sin añadir objeto; no se traduce como «dicho» porque el hebreo subraya la acción de hablar.
  - «Habría subido» mantiene la raíz de עלה; la nota recoge la posible implicación contextual de retirada o cese de persecución.
  - La nota final preserva la ambigüedad entre la imagen espacial literal y la interpretación militar contextual.
