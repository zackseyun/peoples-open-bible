  text: בִּרְכֹ֣ת אָבִ֗י/ךָ גָּֽבְרוּ֙ עַל בִּרְכֹ֣ת הוֹרַ֔/י עַֽד תַּאֲוַ֖ת גִּבְעֹ֣ת עוֹלָ֑ם תִּֽהְיֶ֨ין֙ לְ/רֹ֣אשׁ יוֹסֵ֔ף וּ/לְ/קָדְקֹ֖ד נְזִ֥יר אֶחָֽי/ו־־׃פ
base_translation:
  language: en
  yaml_path: translation/ot/genesis/049/026.yaml
