translation:
  language: es
  text: Y los hijos de Leví hicieron conforme a la palabra de Moisés[a], y ese día cayeron de entre el pueblo unos tres mil hombres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «cayeron», un modismo común para morir o ser abatidos; alternativamente, «fueron muertos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲשׂוּ
  english_pob_choice: did
  chosen_spanish: hicieron
  alternatives_spanish:
  - actuaron
  - cumplieron
  lexicon: HALOT
  rationale: עשה es amplio; aquí expresa la ejecución de una orden. «Hicieron» conserva la sencillez narrativa del hebreo y el vínculo natural con la frase siguiente.
- source_word: בְנֵי לֵוִי
  english_pob_choice: the sons of Levi
  chosen_spanish: los hijos de Leví
  alternatives_spanish:
  - los levitas
  - los descendientes de Leví
  lexicon: HALOT
  rationale: Se mantiene la expresión familiar literal del hebreo. «Levitas» es posible, pero borra la forma concreta del original y la correspondencia con el texto fuente.
- source_word: כִּדְבַר מֹשֶׁה
  english_pob_choice: according to the word of Moses
  chosen_spanish: conforme a la palabra de Moisés
  alternatives_spanish:
  - según la palabra de Moisés
  - como Moisés dijo
  lexicon: HALOT
  rationale: «Palabra» conserva el sustantivo hebreo דְבַר, que aquí implica instrucción/mandato. «Conforme a» refleja bien la relación normativa sin volverla demasiado paraprástica.
- source_word: וַיִּפֹּל
  english_pob_choice: fell
  chosen_spanish: cayeron
  alternatives_spanish:
  - fueron muertos
  - murieron
  - fueron derribados
  lexicon: HALOT
  rationale: El hebreo usa un modismo común de juicio y muerte. «Cayeron» preserva el idiomatismo sin añadir de antemano el agente o el modo de la muerte.
- source_word: מִן הָעָם
  english_pob_choice: from among the people
  chosen_spanish: de entre el pueblo
  alternatives_spanish:
  - del pueblo
  - entre el pueblo
  lexicon: HALOT
  rationale: La preposición partitiva se expresa mejor en español con «de entre», que muestra que se trata de una parte del pueblo y no del pueblo en conjunto.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - ese mismo día
  - ese día
  lexicon: HALOT
  rationale: «Aquel» conserva la referencia narrativa distante y solemne del hebreo, mejor que un simple «ese». La preposición temporal «en» hace natural la frase en español.
- source_word: כִּשְׁלֹשֶׁת אַלְפֵי אִישׁ
  english_pob_choice: about three thousand men
  chosen_spanish: como tres mil hombres
  alternatives_spanish:
  - unos tres mil hombres
  - aproximadamente tres mil hombres
  lexicon: HALOT
  rationale: El prefijo כ con el numeral expresa aproximación. «Como» reproduce esa señal de manera directa y sobria; «hombres» mantiene el valor de אִישׁ sin neutralizarlo.
theological_decisions:
- issue: Cómo traducir el idiomático וַיִּפֹּל en un contexto de juicio
  english_pob_reading: and about three thousand men from among the people fell that day
  chosen_spanish_reading: y cayeron de entre el pueblo, en aquel día, como tres mil hombres
  alternative_spanish_readings:
  - y fueron muertos de entre el pueblo aquel día, como tres mil hombres
  - y murieron de entre el pueblo aquel día, como tres mil hombres
  rationale: 'El POB inglés preserva el verbo idiomático «fell» en lugar de explicitar «were killed». El español «cayeron» mantiene esa misma tensión: sugiere muerte/derrota sin interpretar más de lo que el verbo hebreo dice.'
  doctrine_reference: Translation philosophy §§1, 3, 4, 6
translation_notes:
  revision_awareness: 'El texto fuente y el audit trail inglés muestran alto acuerdo y no registran revisiones aplicadas. Se mantiene la estrategia del POB inglés: conservar el modismo verbal de muerte/jucio sin explicitar el agente, y reflejar la aproximación del numeral.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en el proyecto cuando corresponde, pero en este versículo no aparece el nombre divino.
  - «Hijos de Leví» sigue el patrón familiar literal del hebreo, coherente con otros pasajes donde el POB preserva expresiones genealógicas.
  - «Cayeron» mantiene la ambigüedad semántica documentada en el inglés POB y evita una traducción más interpretativa como «fueron muertos».
  - «Como tres mil» conserva la aproximación marcada por כ; no se suaviza a una cifra exacta.
