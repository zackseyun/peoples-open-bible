revisions:
- from: Y el deber asignado a los hijos de Merari era los marcos[a] del tabernáculo, sus barras, sus columnas, sus bases[b], todos sus utensilios[c], y todo su servicio.
  to: 'Y el deber asignado a los hijos de Merari era: los marcos[a] del tabernáculo, sus barras, sus columnas, sus bases[b], todos sus enseres, y todo su servicio[c].'
  rationale: Se corrige la documentación léxica para que la nota c corresponda al hebreo כֹל עֲבֹדָתוֹ y a la auditoría inglesa. Además, se mejora la naturalidad sintáctica con dos puntos tras «era» y se sustituye «utensilios» por «enseres» para reflejar mejor la amplitud de כֵּלָיו en este contexto constructivo sin apartarse del sentido fuente.
