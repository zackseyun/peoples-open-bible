translation:
  language: es
  text: ni siquiera en dos días[a], porque hemos pecado grandemente en estos asuntos. Pero que se pongan en pie los dirigentes[b] de la multitud, y que todos los de nuestras poblaciones[c] que tienen esposas extranjeras se presenten en un tiempo señalado[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase griega es literalmente «ni siquiera dos»; el sentido contextual es que no bastan dos días para resolver el asunto.
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse «los principales» o «los que van delante»; se eligió «dirigentes» por claridad en español.
    reason: lexical_alternative
  - marker: c
    text: «Poblaciones» traduce el sentido comunitario de κατοικίαι; el griego se refiere a las comunidades o localidades de donde procedían, no solo a casas individuales.
    reason: lexical_alternative
  - marker: d
    text: La expresión final es breve y algo comprimida; el sentido es que comparezcan en un momento fijado o programado.
    reason: alternative_reading
lexical_decisions:
- source_word: οὐδὲ δύο
  english_pob_choice: not in two days
  chosen_spanish: ni siquiera en dos días
  alternatives_spanish:
  - ni en dos días
  - no en dos días
  lexicon: LSJ
  rationale: La frase griega es elíptica. En este contexto administrativo indica que el asunto no puede resolverse tan pronto. «Ni siquiera en dos días» conserva la fuerza comprimida de οὐδὲ δύο sin volverla opaca en español.
- source_word: ἐπὶ πλεῖον
  english_pob_choice: greatly
  chosen_spanish: grandemente
  alternatives_spanish:
  - mucho
  - en gran manera
  - sobremanera
  lexicon: LSJ
  rationale: Con ἡμάρτομεν, la expresión comunica intensidad de culpa, no mera comparación. «Grandemente» mantiene el tono elevado y la fuerza moral del original.
- source_word: ἡμάρτομεν
  english_pob_choice: we have sinned
  chosen_spanish: hemos pecado
  alternatives_spanish:
  - hemos cometido pecado
  - hemos hecho mal
  lexicon: BDAG
  rationale: El verbo designa pecado real, no solo error administrativo. «Hemos pecado» preserva la carga religiosa y moral del pasaje.
- source_word: ἐν τούτοις
  english_pob_choice: in these matters
  chosen_spanish: en estas cosas
  alternatives_spanish:
  - en estos asuntos
  - en esto
  lexicon: LSJ
  rationale: 'El demostrativo remite a la cuestión tratada: los matrimonios con mujeres extranjeras. «Estas cosas» es fiel y natural en español, sin añadir explicación innecesaria.'
- source_word: οἱ προηγούμενοι τοῦ πλήθους
  english_pob_choice: the leaders of the multitude
  chosen_spanish: los dirigentes de la multitud
  alternatives_spanish:
  - los líderes de la multitud
  - los principales del pueblo
  - los que van delante de la multitud
  lexicon: LSJ
  rationale: προηγούμενοι señala a los que van delante, es decir, quienes encabezan. «Dirigentes» expresa esa función en español actual, y «multitud» conserva el término correspondiente a πλήθος sin reemplazarlo por una formulación más interpretativa.
- source_word: οἱ ἐκ τῶν κατοικιῶν ἡμῶν
  english_pob_choice: those from our settlements
  chosen_spanish: los que están en nuestras poblaciones
  alternatives_spanish:
  - los que son de nuestras poblaciones
  - los de nuestros poblados
  - los que viven en nuestras localidades
  lexicon: LSJ
  rationale: κατοικίαι aquí alude a comunidades habitadas, no a casas individuales. «Poblaciones» transmite mejor el sentido colectivo y resulta más natural que un calco como «asentamientos».
- source_word: γυναῖκας ἀλλογενεῖς
  english_pob_choice: foreign wives
  chosen_spanish: mujeres extranjeras
  alternatives_spanish:
  - esposas extranjeras
  - mujeres de otro pueblo
  - mujeres de otra nación
  lexicon: LSJ
  rationale: ἀλλογενής significa perteneciente a otro pueblo/linaje. En español, «mujeres extranjeras» conserva el contraste étnico sin forzar un término técnico. No se añadió «esposas» porque el griego dice literalmente «mujeres».
- source_word: παραγενηθήτωσαν
  english_pob_choice: let ... come
  chosen_spanish: se presenten
  alternatives_spanish:
  - vengan
  - comparezcan
  - acudan
  lexicon: LSJ
  rationale: En el contexto judicial-administrativo, el verbo implica comparecer ante una autoridad. «Se presenten» comunica bien esa comparecencia formal sin perder el movimiento de venir.
- source_word: λαβόντες χρόνου
  english_pob_choice: at an appointed time
  chosen_spanish: a un tiempo señalado
  alternatives_spanish:
  - en un tiempo fijado
  - según un tiempo establecido
  - a la hora fijada
  lexicon: LSJ
  rationale: La expresión es comprimida; el sentido es de comparecencia programada. «A un tiempo señalado» mantiene la idea de cita fijada y refleja el carácter administrativo del pasaje.
theological_decisions:
- issue: Caracterización moral del pecado
  english_pob_reading: we have sinned greatly in these matters
  chosen_spanish_reading: hemos pecado grandemente en estas cosas
  alternative_spanish_readings:
  - hemos hecho mucho mal en esto
  - hemos errado gravemente en esto
  rationale: El texto usa el verbo ordinario para pecado y lo intensifica con ἐπὶ πλεῖον. La traducción conserva ese juicio moral sin reducirlo a una falta meramente procedimental.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'Se siguió el último estado revisado del inglés auditado: la cláusula inicial se entendió con conexión negativa («ni siquiera en dos días») y se mantuvo la idea de comparecencia programada para λαβόντες χρόνου. Se observó además la nota del paralelo hebreo/semítico como apoyo contextual, pero la redacción española se ancló primariamente en el griego.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención general del proyecto solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se preservó el valor de pecado de ἁμαρτάνω con «pecado» y no con un eufemismo más débil.
  - Se evitó sustituir πλήθος por un equivalente eclesiástico más tradicional; se prefirió una solución administrativa y textual directa.
  - Se usó «mujeres extranjeras» para reflejar el griego literal, sin introducir «esposas» que no aparece en el original.
