  text: אָסֹ֨ף אֶאֱסֹ֜ף יַעֲקֹ֣ב כֻּלָּ֗/ךְ קַבֵּ֤ץ אֲקַבֵּץ֙ שְׁאֵרִ֣ית יִשְׂרָאֵ֔ל יַ֥חַד אֲשִׂימֶ֖/נּוּ כְּ/צֹ֣אן בָּצְרָ֑ה כְּ/עֵ֨דֶר֙ בְּ/ת֣וֹךְ הַ/דָּֽבְר֔/וֹ תְּהִימֶ֖נָה מֵ/אָדָֽם׃
base_translation:
  language: en
  yaml_path: translation/ot/micah/002/012.yaml
  text: I will surely gather all of you[a], Jacob; I will surely assemble the remnant of Israel. Together I will set them like the sheep of Bozrah, like a flock in the midst of its pasture[c][b]; they will be noisy with people.
  footnotes:
  - marker: a
    text: Or 'like sheep in a fold.' The Hebrew בָּצְרָה is traditionally read as the place name 'Bozrah,' but some take it as related to a word for an enclosure or sheepfold.
    reason: lexical_alternative
  - marker: b
    text: Or 'they will be noisy because of people' / 'they will throng with people.' The Hebrew expression is difficult.
    reason: alternative_reading
  - marker: c
    text: Hebrew 'men'; here the sense is human beings generally.
    reason: lexical_alternative
