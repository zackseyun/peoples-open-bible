translation:
  language: es
  text: El don del justo permanecerá para los que le temen[a], y su favor prosperará para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Testigo griego: «Permanece firme en tu alianza y ocúpate de ella, y envejece en tu trabajo». El hebreo y el griego difieren sustancialmente aquí.'
    reason: alternative_reading
lexical_decisions:
- source_word: διαθήκῃ
  english_pob_choice: covenant
  chosen_spanish: alianza
  alternatives_spanish:
  - pacto
  - covenio
  lexicon: BDAG
  rationale: En español bíblico, «alianza» comunica bien διαθήκη como vínculo relacional y compromiso formal; «pacto» también es posible, pero «alianza» suena más natural y mantiene dignidad sin perder el valor de convenio sagrado.
- source_word: στῆθι
  english_pob_choice: Stand by
  chosen_spanish: Permanece firme
  alternatives_spanish:
  - Mantente en pie
  - Sostente firme
  - Permanece
  lexicon: BDAG
  rationale: El imperativo pide perseverancia y estabilidad, no solo postura física. «Permanece firme» conserva la fuerza exhortativa de la raíz y su matiz de constancia.
- source_word: ὁμίλει
  english_pob_choice: attend to
  chosen_spanish: ocúpate en
  alternatives_spanish:
  - trata con
  - medita en
  - conversa en
  lexicon: BDAG
  rationale: ὁμιλέω aquí expresa dedicación activa y trato continuado con la alianza. «Ocúpate en» transmite esa implicación práctica sin reducirlo a mera conversación o reflexión interna.
- source_word: παλαιώθητι
  english_pob_choice: grow old
  chosen_spanish: envejece
  alternatives_spanish:
  - hazte viejo
  - persevera hasta la vejez
  - hazte veterano
  lexicon: BDAG
  rationale: El verbo conserva su sentido concreto de hacerse viejo. «Envejece» mantiene la imagen de duración prolongada en el trabajo y la exhortación a perseverar a lo largo de la vida.
- source_word: ἔργῳ
  english_pob_choice: work
  chosen_spanish: trabajo
  alternatives_spanish:
  - obra
  - labor
  - ocupación
  lexicon: BDAG
  rationale: «Trabajo» es el equivalente más natural y amplio en español para ἔργον en este contexto sapiencial. Evita una restricción excesiva y suena claro para lectura pública.
theological_decisions:
- issue: Divergencia entre el hebreo conservado y el paralelo griego en Sirácides 11:20
  english_pob_reading: The English audit trail notes that the Hebrew witness reads very differently and that the Greek parallel is being used as the main translation input for this verse.
  chosen_spanish_reading: 'La línea principal sigue el griego: una exhortación a permanecer en la alianza, ocuparse en ella y perseverar en el trabajo.'
  alternative_spanish_readings:
  - «El regalo del justo permanecerá para los que le temen, y su favor prosperará para siempre.»
  - «El don del justo…»
  rationale: El verso presenta una divergencia textual fuerte. Dado que el encargo exige usar el griego paralelo como base de traducción, la redacción española sigue esa lectura exhortativa y no mezcla indebidamente ambas tradiciones en el texto principal.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde se conserva, pero usar el griego paralelo como entrada real cuando corresponde; preservar honestamente la incertidumbre textual.'
translation_notes:
  revision_awareness: La revisión reciente corrigió un borrador previo que dependía del hebreo en vez del paralelo griego. Esta versión se alinea con el griego de Sirácides 11:20 y conserva la tensión textual de forma transparente.
  spanish_consistency_notes:
  - Usé «alianza» para διαθήκη, coherente con un registro bíblico claro y contemporáneo.
  - Mantuve «trabajo» para ἔργον por ser el equivalente más natural en español.
  - No introduje «Mesías», «SEÑOR» ni otras sustituciones ajenas al texto griego de este versículo.
  - La puntuación separa las tres exhortaciones como una sola cadencia sapiencial en español.
