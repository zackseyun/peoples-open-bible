  to: solo si escuchas atentamente la voz de Yahvé tu Dios[a][b], teniendo cuidado de cumplir todo este mandamiento que hoy te mando.
  rationale: Se cambió «si solo» por «solo si» para un español más natural y fiel a la condición restrictiva de רַק אִם. Se sustituyó «observar» por «cumplir» para representar mejor la secuencia legal «guardar/observar para hacer», preservando la idea de puesta en práctica que el hebreo expresa. Se simplificó «te estoy mandando» a «te mando» para una lectura más idiomática y digna sin perder el sentido inmediato del participio.
