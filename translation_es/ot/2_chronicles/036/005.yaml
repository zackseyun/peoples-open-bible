    rationale: El hebreo y el inglés auditado apuntan a una transliteración más fiel del nombre. 'Joaquim' parece una adaptación abreviada o variante no óptima, y puede confundirse con otros nombres bíblicos. 'Jehoiaquim' preserva mejor la referencia específica del personaje.
  - severity: medium
