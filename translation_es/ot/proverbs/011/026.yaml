  spanish_quality_summary: 'El español es claro, natural y digno. «Al que retiene el grano, el pueblo lo maldice» suena proverbial y legible. La segunda mitad también está bien. El único problema real es de aparato: la ubicación de notas induce una asociación equivocada con «maldice».'
