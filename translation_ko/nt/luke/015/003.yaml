  philosophy: optimal-equivalence
theological_decisions:
- issue: 15장 — 잃은 양·잃은 드라크마·잃은 아들 삼중 비유의 어휘 운율 보존(ἀπώλεσα/εὑρέθη)
  chosen_reading: 「잃은(ἀπολωλός/ἀπώλεσα) ... 찾은(εὑρέθη/εὗρον)」 동근 반복을 한국어 「잃다 ... 찾다」로 일관되게 살림
  alternative_readings:
  - 「길 잃은 ... 발견한」
  - 「없어진 ... 되찾은」
  rationale: '누가 15장 세 비유의 신학적 핵심은 단일한 어휘 운율 — 잃음과 찾음의 짝 — 의 반복으로 직조된다. 15:4 πρόβατον τὸ ἀπολωλός, 15:6 「내 잃은 양을 찾았다」, 15:9 「내가 잃었던 드라크마를 찾았다」, 15:24 「잃었다가 찾았다」, 15:32 「잃었다가 찾았다」. 본 번역은 어떤 비유에서도 어휘를 흩지 않고 「잃다 / 찾다」 짝을 일관되게 유지한다.'
  doctrine_reference: DOCTRINE.md §5 (Consistency of key terms)
