revisions:
- from: Restáurame el gozo de tu salvación[a][b][c], y que un espíritu dispuesto me sostenga.
  to: Devuélveme el gozo de tu salvación[c], y que un espíritu dispuesto[a] me sostenga[b].
  rationale: Se cambia 'Restáurame' por 'Devuélveme' para reflejar con mayor precisión הָשִׁיבָה לִּי, donde el objeto restaurado es 'el gozo'. Se conservan 'gozo', 'tu salvación', 'espíritu' y 'dispuesto' por fidelidad al análisis léxico y teológico documentado. Se corrigen las notas para que correspondan exactamente a las alternativas significativas preservadas por el inglés y sean claras en español.
