translation:
  language: es
  text: Todos ellos vienen para cometer violencia; la dirección de sus rostros es hacia adelante[a], y reúnen cautivos como arena[c][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «la dirección de sus rostros es hacia el oriente». El hebreo es difícil: קָדִימָה puede significar «adelante» o «hacia el este», y מְגַמַּת puede significar «dirección», «fijeza» o «intención».'
    reason: lexical_alternative
  - marker: b
    text: El hebreo tiene verbo singular, «y reúne», tratando la fuerza invasora como una unidad colectiva.
    reason: lexical_alternative
  - marker: c
    text: O «y reúne cautiverio como arena», si שֶׁבִי se toma en sentido abstracto en vez de personal.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֻלֹּה / All of them
  english_pob_choice: All of them
  chosen_spanish: Todos ellos
  alternatives_spanish:
  - Todos
  - Todos los de ellos
  lexicon: HALOT
  rationale: El sufijo colectivo y el contexto militar permiten un plural explícito en español. «Todos ellos» conserva el sentido colectivo y la referencia al grupo invasor sin añadir interpretación.
- source_word: לְחָמָס
  english_pob_choice: for violence
  chosen_spanish: para la violencia
  alternatives_spanish:
  - por violencia
  - para el daño violento
  lexicon: HALOT
  rationale: El sustantivo חָמָס expresa violencia, brutalidad o maldad hecha por la fuerza. «Para la violencia» mantiene la finalidad o dirección del lamed sin suavizar el término.
- source_word: מְגַמַּת פְּנֵיהֶם
  english_pob_choice: the set of their faces
  chosen_spanish: el propósito de sus rostros
  alternatives_spanish:
  - la dirección de sus rostros
  - la intención de sus rostros
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y difícil. En español, «propósito» ayuda a reflejar el matiz de orientación fija o intención, mientras «rostros» preserva la imagen concreta del hebreo. No se reduce solo a una idea mental.
- source_word: קָדִימָה
  english_pob_choice: forward
  chosen_spanish: hacia adelante
  alternatives_spanish:
  - al oriente
  - hacia el este
  lexicon: HALOT
  rationale: El término puede significar «adelante» o «oriente». Dado el contexto de avance implacable y la decisión del POB en inglés, «hacia adelante» expresa mejor la dirección narrativa sin forzar un sentido geográfico.
- source_word: וַיֶּאֱסֹף
  english_pob_choice: they gather
  chosen_spanish: reúnen
  alternatives_spanish:
  - y reúnen
  - y amontonan
  lexicon: HALOT
  rationale: Aunque el hebreo tiene verbo singular, el contexto colectivo permite español plural para concordar con «Todos ellos». «Reúnen» conserva la idea de acumular o juntar cautivos sin cambiar el sentido básico.
- source_word: שֶׁבִי
  english_pob_choice: captives
  chosen_spanish: cautivos
  alternatives_spanish:
  - cautiverio
  - prisioneros
  lexicon: HALOT
  rationale: En este contexto con el verbo de reunir, el sentido personal «cautivos» resulta más natural que el abstracto «cautiverio». Mantiene la imagen de personas apresadas como cantidad innumerable.
- source_word: כַּח֖וֹל
  english_pob_choice: like sand
  chosen_spanish: como arena
  alternatives_spanish:
  - como la arena
  - cual arena
  lexicon: HALOT
  rationale: La comparación hebrea comunica multitud incontable. En español bíblico y moderno, «como arena» es natural y fiel, sin necesidad de añadir el artículo.
theological_decisions:
- issue: Expresión idiomática de orientación/fijeza de propósito
  english_pob_reading: the set of their faces is forward
  chosen_spanish_reading: el propósito de sus rostros es hacia adelante
  alternative_spanish_readings:
  - la dirección de sus rostros es hacia adelante
  - el intento de sus rostros es hacia adelante
  rationale: El texto no trata primariamente de emoción interna sino de una orientación decidida y avasalladora. «Propósito» conserva la tensión entre dirección física e intención, evitando reducir el hebreo a una mera psicología.
  doctrine_reference: Poética profética; imaginería de juicio y avance militar
- issue: Verbo singular hebreo con sujeto colectivo
  english_pob_reading: they gather captives like sand
  chosen_spanish_reading: reúnen cautivos como arena
  alternative_spanish_readings:
  - y reúne cautivos como arena
  - y amontonan cautivos como arena
  rationale: El hebreo usa singular, pero la revisión inglesa ya optó por plural para concordar con el colectivo. En español, el plural fluye naturalmente con «Todos ellos» y conserva la referencia al ejército como unidad colectiva.
  doctrine_reference: Gramática hebrea colectiva; concordancia discursiva en traducción
- issue: Sujeto de la acción violenta
  english_pob_reading: All of them come for violence
  chosen_spanish_reading: Todos ellos vienen para la violencia
  alternative_spanish_readings:
  - Todos vienen para la violencia
  - Todos ellos vienen con violencia
  rationale: Se mantiene el valor de finalidad o destino de לְחָמָס sin diluirlo en una mera descripción de modo. La frase conserva la crudeza del juicio profético.
  doctrine_reference: Lenguaje profético de invasión y violencia
translation_notes:
  revision_awareness: Se siguió el testimonio del texto hebreo WLC y el aparato de la POB en inglés. La decisión clave aquí es mantener el carácter difícil de מְגַמַּת פְּנֵיהֶם y קָדִימָה, sin resolverlo de manera excesivamente interpretativa; también se respetó la revisión inglesa que entiende el verbo como plural colectivo («they gather»), reflejándolo en español con concordancia natural.
  spanish_consistency_notes:
  - Se usa «cautivos» y no «prisioneros» para conservar la imaginería de captura bélica y la simetría con el simile de incontabilidad.
  - «Violencia» se mantiene como término principal para חָמָס, coherente con el valor léxico fuerte documentado.
  - «Hacia adelante» evita introducir una lectura exclusiva de «este/oriente» en el texto principal, pero la nota preserva esa alternativa.
  - La frase «el propósito de sus rostros» intenta sonar publicable en español sin perder el hebraísmo subyacente.
