base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/017/016.yaml
  text: Only[a], he must not multiply horses for himself, nor cause the people to return to Egypt in order to multiply horses, since Yahweh has said to you[c][b], ‘You must never return again by this way.’
  footnotes:
  - marker: a
    text: Or 'acquire many horses for himself.' The Hebrew verb means 'make many' or 'increase.'
    reason: lexical_alternative
  - marker: b
    text: 'Or ''bring the people back to Egypt.'' The verb is causative: the king is forbidden to cause a return.'
    reason: lexical_alternative
  - marker: c
    text: Literally, 'You shall not add to return by this way again,' an idiom meaning 'You must never return again by this way.'
    reason: lexical_alternative
