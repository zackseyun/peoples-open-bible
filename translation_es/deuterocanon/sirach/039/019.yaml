translation:
  language: es
  text: Las obras de toda carne están delante de él[a], y nada está oculto de su vista[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "toda la humanidad" o "todo ser viviente" para "toda carne"; el modismo hebreo es amplio, y el paralelo griego también dice "toda carne".
    reason: lexical_alternative
  - marker: b
    text: 'El griego dice: «y no es posible ocultarse de sus ojos», haciendo más explícita la imposibilidad que el hebreo.'
    reason: alternative_reading
lexical_decisions:
- source_word: מעשה
  english_pob_choice: deeds
  chosen_spanish: obras
  alternatives_spanish:
  - hechos
  - acciones
  - obras realizadas
  lexicon: HALOT
  rationale: El hebreo מעשה puede abarcar obra/hecho/acción. En español, "obras" conserva el carácter concreto y colectivo de las acciones humanas, y enlaza bien con el paralelo griego ἔργα (obras).
- source_word: כל בשר
  english_pob_choice: all flesh
  chosen_spanish: toda carne
  alternatives_spanish:
  - toda la humanidad
  - todo ser viviente
  - toda criatura
  lexicon: HALOT
  rationale: Se mantiene el modismo bíblico "toda carne" para no restringir el alcance más de lo que exigen el hebreo y el griego πάσης σαρκὸς. En español suena bíblico pero aún inteligible.
- source_word: נגדו
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - en su presencia
  - ante él
  - frente a él
  lexicon: HALOT
  rationale: La expresión hebrea indica estar puesto ante alguien. "Delante de él" reproduce bien esa relación espacial y funciona con naturalidad en español.
- source_word: אין נסתר
  english_pob_choice: nothing is hidden
  chosen_spanish: no hay quien pueda ocultarse
  alternatives_spanish:
  - nada está oculto
  - nada puede esconderse
  - no está escondido nada
  lexicon: HALOT
  rationale: El hebreo afirma la imposibilidad de quedar oculto. En español, una construcción impersonal con "no hay quien pueda ocultarse" comunica mejor esa fuerza de imposibilidad que un simple "nada está oculto".
- source_word: מנגד עיניו
  english_pob_choice: from before his eyes
  chosen_spanish: de sus ojos
  alternatives_spanish:
  - de delante de sus ojos
  - de su vista
  - de su mirada
  lexicon: HALOT
  rationale: El hebreo literalmente dice "de delante de sus ojos"; el griego también habla de los ojos. En español, "de sus ojos" conserva la imagen y suena más natural en la segunda mitad de la línea.
theological_decisions:
- issue: Alcance de "toda carne"
  english_pob_reading: Retain the idiom 'all flesh' rather than interpretively narrowing it.
  chosen_spanish_reading: Mantener "toda carne" como modismo bíblico de alcance amplio.
  alternative_spanish_readings:
  - toda la humanidad
  - todo ser viviente
  rationale: El hebreo y el griego usan el lenguaje de "carne" de modo deliberadamente amplio. Mantener el modismo preserva la tensión semántica sin resolverla de antemano en una sola dirección.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.'
- issue: Imposibilidad de ocultarse ante Dios
  english_pob_reading: 'Greek: ''and it is not possible to be hidden from his eyes,'' making the impossibility slightly more explicit than the Hebrew wording.'
  chosen_spanish_reading: Expresar la imposibilidad con "no hay quien pueda ocultarse".
  alternative_spanish_readings:
  - nada puede esconderse
  - no es posible ocultarse
  rationale: La lectura griega explicita la imposibilidad; la redacción española la hace explícita sin abandonar el sentido del hebreo. Así se preserva la fuerza del paralelo griego y la naturalidad del español.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.'
translation_notes:
  revision_awareness: El texto hebreo y el paralelo griego concuerdan estrechamente; la revisión más reciente del expediente indicó que no fueron necesarios cambios sustantivos. La redacción española conserva esa alta concordancia y solo ajusta la naturalidad sintáctica del cierre para reflejar la imposibilidad explícita del griego.
  spanish_consistency_notes:
  - Se mantiene "toda carne" como término técnico-bíblico, no se sustituye por "humanidad" en el cuerpo principal.
  - Se evita "SEÑOR" porque el versículo no contiene el nombre divino ni el título κύριος.
  - '"Obras" y no "hechos" sigue la preferencia de concretar el conjunto de acciones sin perder el matiz de ἔργα.'
  - La segunda cláusula integra el matiz de imposibilidad del griego sin añadir contenido doctrinal ajeno al versículo.
