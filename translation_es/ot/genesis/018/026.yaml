- from: 'Yahvé dijo[a]: «Si encuentro cincuenta personas justas dentro de la ciudad de Sodoma, perdonaré todo el lugar por causa de ellas».'
  to: 'Yahvé dijo[a]: «Si encuentro cincuenta personas justas dentro de la ciudad de Sodoma, le perdonaré a todo ese lugar por causa de ellas».'
  rationale: Se ajusta וְנָשָׂאתִי a una formulación española más natural con 'lugar' como referente afectado por el juicio, sin perder la posibilidad de remisión. La nota preserva explícitamente la alternativa contextual de suspensión del castigo. Se mantiene 'Yahvé', 'personas justas' y el resto de las decisiones bien fundadas del borrador.
