translation:
  language: es
  text: Te haré una roca desnuda, un lugar para tender redes[a]. No volverás a ser reconstruida, porque yo, Yahvé, he hablado[b], declara el Señor Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un lugar para tender redes de pesca».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «Yahvé» representa el nombre divino YHWH; la fórmula final dice literalmente «oráculo del Señor Yahvé».'
    reason: alternative_reading
lexical_decisions:
- source_word: וּנְתַתִּיךְ
  english_pob_choice: I will make you
  chosen_spanish: Te haré
  alternatives_spanish:
  - Te pondré
  - Te haré llegar a ser
  lexicon: HALOT
  rationale: El hebreo con נתן + complemento predicativo expresa causar que Tiro llegue a ser algo; en español, «te haré» comunica de forma natural ese valor causativo sin perder la fuerza del juicio.
- source_word: לִצְחִיחַ סֶלַע
  english_pob_choice: a bare rock
  chosen_spanish: una roca desnuda
  alternatives_spanish:
  - una roca pelada
  - una roca estéril
  lexicon: HALOT
  rationale: La imagen describe una superficie rocosa despojada y expuesta. «Roca desnuda» conserva bien la metáfora concreta y el tono de desolación; «pelada» sería posible pero algo más coloquial.
- source_word: מִשְׁטַח חֲרָמִים
  english_pob_choice: a place for spreading nets
  chosen_spanish: un lugar para tender redes
  alternatives_spanish:
  - un lugar para extender redes de pesca
  - una superficie para tender redes
  lexicon: HALOT
  rationale: מִשְׁטַח alude a una superficie o lugar de extensión, y חֲרָמִים son redes de pesca. «Tender redes» es idiomático en español y mantiene la imagen concreta sin sobreexplicar.
- source_word: תִּהְיֶה
  english_pob_choice: You will be
  chosen_spanish: serás
  alternatives_spanish:
  - llegarás a ser
  - estarás
  lexicon: HALOT
  rationale: El verbo copulativo en futuro se traduce de manera directa. En español, «serás» enlaza naturalmente con el predicativo anterior y preserva la identidad de la condición anunciada.
- source_word: לֹא תִבָּנֶה עוֹד
  english_pob_choice: You will not be rebuilt again
  chosen_spanish: No serás reconstruida otra vez
  alternatives_spanish:
  - No volverás a ser reconstruida
  - No se te reconstruirá más
  lexicon: HALOT
  rationale: 'El nifal de בנה expresa pasivo: «ser reconstruida». «Otra vez» refleja עוֹד como repetición/continuación futura sin convertirlo en una negación absoluta más fuerte que el hebreo.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: DOCTRINE.md contested terms
  rationale: El Tetragrámaton se conserva como nombre propio divino, conforme al criterio del proyecto. En español, «Yahvé» es la forma principal preferida para mantener la visibilidad del nombre del pacto y evitar el reemplazo por un título genérico.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  english_pob_choice: declares the Lord GOD
  chosen_spanish: declara el Señor Yahvé
  alternatives_spanish:
  - oráculo del Señor Yahvé
  - declara el Señor Dios
  lexicon: HALOT
  rationale: נְאֻם es fórmula profética de proclamación; «declara» suena natural y solemne en español. Para אֲדֹנָי + יְהוִה, se conserva la doble referencia con «Señor Yahvé», evitando borrar la distinción entre el título y el nombre divino.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El versículo usa directamente el Tetragrámaton. La pauta del proyecto pide mantener el nombre divino visible en el texto principal; en español, «Yahvé» es la forma adoptada para conservar esa referencia sin la convención de sustitución por mayúsculas.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Tratamiento de אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahvé
  rationale: La combinación hebrea une un título de soberanía con el nombre divino. «Señor Yahvé» mantiene ambos elementos en español de manera inteligible y preserva la tensión deliberada entre título y nombre.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: He tenido en cuenta que el audit trail inglés ya resolvió la imagen de לִצְחִיחַ סֶלַע como «bare rock» y la de מִשְׁטַח חֲרָמִים como un lugar para redes; también mantuvo la fórmula profética final con distinción entre יְהוָה y אֲדֹנָי יְהוִה. No se reportan revisiones aplicadas en el registro fuente, y la versión revisada más reciente quedó sin cambios.
  spanish_consistency_notes:
  - Se mantuvo un tono profético solemne y conciso, apto para publicación.
  - Se evitó «SEÑOR» como máscara del nombre divino, siguiendo la terminología del proyecto.
  - «Roca desnuda» y «un lugar para tender redes» conservan la imaginería concreta sin paráfrasis excesiva.
  - La nota final explica la combinación «Señor Yahvé» para reflejar la clausula hebrea completa sin redundancia impropia en español.
