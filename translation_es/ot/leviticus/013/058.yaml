translation:
  language: es
  text: Pero la prenda, o la urdimbre, o la trama, o cualquier objeto de cuero que laves, y la infección se aparta de ellos, será lavado por segunda vez y quedará limpio.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: הַבֶּגֶד
  english_pob_choice: the garment
  chosen_spanish: el vestido
  alternatives_spanish:
  - la prenda
  - el vestido de tela
  lexicon: HALOT
  rationale: בגד designa una prenda o pieza de ropa en general. 'Vestido' funciona aquí como equivalente natural y amplio en español; 'prenda' también sería posible, pero 'vestido' mantiene el referente textil concreto sin sonar técnico.
- source_word: הַשְּׁתִי
  english_pob_choice: the warp
  chosen_spanish: la urdimbre
  alternatives_spanish:
  - el urdido
  - los hilos longitudinales
  lexicon: HALOT
  rationale: El término hebreo es técnico de tejido y se refiere a los hilos longitudinales. 'Urdimbre' es el equivalente español establecido y preciso; conserva la pareja técnica con 'trama'.
- source_word: הָעֵרֶב
  english_pob_choice: the woof
  chosen_spanish: la trama
  alternatives_spanish:
  - la trama transversal
  - la weft
  lexicon: HALOT
  rationale: El término contrasta con שׁתי y alude a los hilos cruzados. 'Trama' es el par técnico natural de 'urdimbre' en español y comunica bien la relación textil.
- source_word: כָל כְּלִי הָעוֹר
  english_pob_choice: any article of leather
  chosen_spanish: cualquier objeto de cuero
  alternatives_spanish:
  - cualquier artículo de cuero
  - cualquier utensilio de cuero
  lexicon: HALOT
  rationale: כְּלִי es un término amplio para objeto o implemento. 'Objeto de cuero' evita restringirlo innecesariamente y suena natural en español, sin perder la concreción material.
- source_word: תְּכַבֵּס
  english_pob_choice: you wash
  chosen_spanish: laves
  alternatives_spanish:
  - lavas
  - lave
  lexicon: HALOT
  rationale: El verbo está en forma instruccional de segunda persona masculina singular. En español, la subordinación con 'que laves' conserva la dirección al destinatario sin volver la frase torpe.
- source_word: וְסָר מֵהֶם
  english_pob_choice: and the infection departs from them
  chosen_spanish: y la plaga se aparta de ellos
  alternatives_spanish:
  - y la plaga se ha apartado de ellos
  - y la plaga sale de ellos
  lexicon: HALOT
  rationale: El audit trail inglés corrigió la fuerza condicional hacia un encadenamiento más directo con 'and'. En español, 'se aparta' reproduce bien וְסָר sin añadir condición explícita; 'plaga' mantiene el término ritual del contexto levítico para נגע.
- source_word: וְכֻבַּס שֵׁנִית
  english_pob_choice: shall be washed a second time
  chosen_spanish: será lavado por segunda vez
  alternatives_spanish:
  - será lavado otra vez
  - deberá ser lavado por segunda vez
  lexicon: HALOT
  rationale: El pasivo de כבס y שׁנית expresa repetición ritual. 'Será lavado por segunda vez' conserva la forma procedural y el tono normativo del hebreo.
- source_word: וְטָהֵר
  english_pob_choice: and be clean
  chosen_spanish: y quedará limpio
  alternatives_spanish:
  - y estará limpio
  - y será limpio
  lexicon: HALOT
  rationale: En este contexto ritual, טהר indica quedar en estado de pureza ritual. 'Quedará limpio' es idiomático y preserva el resultado final sin forzar un matiz médico.
theological_decisions:
- issue: Valor ritual de נגע y טהר en Levítico 13
  english_pob_reading: infection ... be clean
  chosen_spanish_reading: la plaga ... quedará limpio
  alternative_spanish_readings:
  - la infección ... quedará limpio
  - la afección ... quedará puro
  rationale: La sección trata de impureza ritual en materiales, no de diagnóstico médico moderno. 'Plaga' mantiene la terminología levítica tradicional para נגע, mientras 'quedará limpio' expresa el estado ritual final sin introducir una lectura doctrinal adicional.
  doctrine_reference: Levítico 13; pureza ritual/impureza ceremonial
translation_notes:
  revision_awareness: 'Seguí la revisión más reciente del texto inglés, que reemplazó una lectura condicional por una coordinación más directa: el español refleja esa misma decisión con ''y la plaga se aparta de ellos''. También preservé el campo léxico técnico de tejido con ''urdimbre'' y ''trama'', en lugar de suavizarlo a una expresión genérica.'
  spanish_consistency_notes:
  - Usé 'plaga' para נגע, coherente con el registro levítico y con el uso tradicional del término ritual.
  - Mantuve la pareja técnica 'urdimbre / trama' para reflejar el paralelismo de tejido del hebreo.
  - Elegí 'quedará limpio' para טהר, entendiendo la limpieza como estado ritual, no solo higiene física.
  - Conservé una sintaxis normativa en futuro ('será lavado') para corresponder al estilo procedimental del mandato.
