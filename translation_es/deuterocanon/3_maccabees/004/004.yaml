translation:
  language: es
  text: Porque así, con la amarga crueldad de un espíritu despiadado, eran enviados fuera[a] todos juntos por los generales de cada ciudad[b], de modo que, además de los castigos exorbitantes, aun algunos de sus enemigos, al tener delante de sus ojos la compasión común[c] y considerar la incierta ruina de su vida, lloraban por su lamentable deportación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «eran expulsados» o «eran deportados»; el verbo griego significa literalmente «eran enviados fuera», pero el contexto indica remoción forzada.
    reason: lexical_alternative
  - marker: b
    text: O «comandantes»; el griego στρατηγῶν puede referirse a oficiales cívicos o militares, y aquí alude a autoridades locales de cada ciudad.
    reason: lexical_alternative
  - marker: c
    text: «Compasión común» refleja el ἔλεος compartido ordinariamente entre los seres humanos; incluso algunos enemigos fueron conmovidos por ella.
    reason: lexical_alternative
lexical_decisions:
- source_word: μετὰ πικρίας ἀνοίκτου ψυχῆς
  english_pob_choice: with the bitter cruelty of a merciless spirit
  chosen_spanish: con la amargura de un espíritu despiadado
  alternatives_spanish:
  - con la amarga crueldad de un espíritu sin misericordia
  - con la amargura de un alma sin piedad
  lexicon: LSJ
  rationale: 'Conservo la intensidad idiomática del griego: πικρίας aporta amargura/aspereza, e ἀνοίκτου exige una idea de falta de misericordia. «Espíritu» comunica bien ψυχῆς en español actual, y «despiadado» mantiene la fuerza moral sin sonar forzado.'
- source_word: στρατηγῶν
  english_pob_choice: generals
  chosen_spanish: estrategas
  alternatives_spanish:
  - generales
  - comandantes
  lexicon: LSJ
  rationale: En este contexto de funcionarios locales de ciudad, «estrategas» conserva el valor histórico-administrativo posible de στρατηγός mejor que «generales», que en español podría sugerir sólo rango militar moderno.
- source_word: ὁμοθυμαδόν
  english_pob_choice: together
  chosen_spanish: unánimemente
  alternatives_spanish:
  - juntos
  - con un mismo ánimo
  lexicon: BDAG
  rationale: El adverbio destaca acción concertada y unánime; «unánimemente» expresa mejor esa coordinación que un simple «juntos».
- source_word: ἐξαπεστέλλοντο
  english_pob_choice: were being sent out
  chosen_spanish: eran expulsados
  alternatives_spanish:
  - eran enviados fuera
  - eran deportados
  lexicon: LSJ
  rationale: Aunque el verbo es literalmente «eran enviados fuera», el contexto de remoción forzada pide una traducción que haga visible la coerción. «Expulsados» conserva la violencia del acto y es natural en español, sin borrar el matiz de envío fuera.
- source_word: ἐπὶ ταῖς ἐξάλλοις τιμωρίαις
  english_pob_choice: beyond the outrageous punishments
  chosen_spanish: además de los castigos exorbitantes
  alternatives_spanish:
  - además de los castigos excesivos
  - a causa de los castigos extraordinarios
  lexicon: LSJ
  rationale: Tomo ἐπὶ aquí en sentido aditivo, como en el audit trail inglés. «Exorbitantes» reproduce bien el carácter excesivo, extraño o desmesurado de ἐξάλλοις en español culto actual.
- source_word: τὸν κοινὸν ἔλεον
  english_pob_choice: the common pity
  chosen_spanish: la compasión común
  alternatives_spanish:
  - la piedad común
  - la compasión compartida
  lexicon: LSJ
  rationale: «Compasión» evita la posible aspereza de «piedad» en español contemporáneo y preserva el valor de ἔλεος. «Común» mantiene la idea de una compasión humana universal o compartida.
- source_word: τὴν ἄδηλον τοῦ βίου καταστροφήν
  english_pob_choice: the uncertain ruin of their life
  chosen_spanish: la incierta ruina de su vida
  alternatives_spanish:
  - el incierto derrumbe de su vida
  - el final incierto de su vida
  lexicon: LSJ
  rationale: Ἄδηλον exige incertidumbre o falta de visibilidad; καταστροφή puede ser ruina, derrumbe o destrucción. «Incierta ruina de su vida» conserva el tono ominoso y la relación con el audit trail inglés.
- source_word: δακρύειν
  english_pob_choice: were weeping over
  chosen_spanish: lloraban por
  alternatives_spanish:
  - derramaban lágrimas por
  - lloraban sobre
  lexicon: BDAG
  rationale: El infinitivo de resultado se vierte naturalmente como imperfecto de estado/resultativo en español. «Lloraban por» mantiene claridad y fuerza emotiva sin sobrecargar la frase.
- source_word: τὴν δυσάθλιον ἐξαποστολήν
  english_pob_choice: their wretched deportation
  chosen_spanish: su lamentable destierro
  alternatives_spanish:
  - su miserable expulsión
  - su deplorable deportación
  lexicon: LSJ
  rationale: Ἐξαποστολή retoma la idea de ser enviado fuera. En español, «destierro» comunica bien el desplazamiento forzado y su gravedad, mientras «lamentable» recoge δυσάθλιον de modo natural.
theological_decisions:
- issue: Tensión entre el sentido literal de «enviar fuera» y la coerción implícita del contexto
  english_pob_reading: were being sent out, with footnote clarifying forced removal / deportation
  chosen_spanish_reading: eran expulsados
  alternative_spanish_readings:
  - eran enviados fuera
  - eran deportados
  rationale: La escena describe una expulsión coercitiva ejecutada por autoridades. «Expulsados» hace explícita esa violencia sin perder la base verbal del griego, mientras la nota conserva la relación con ἐξαποστολή.
  doctrine_reference: Ninguna; decisión semántico-histórica
- issue: Valor de ἔλεος como compasión humana universal
  english_pob_reading: the common pity means the ordinary compassion shared by human beings generally
  chosen_spanish_reading: la compasión común
  alternative_spanish_readings:
  - la piedad común
  - la compasión compartida
  rationale: 'Se mantiene la lectura antropológica del pasaje: incluso enemigos se conmueven por una compasión humana básica. «Compasión común» suena natural y conserva la universalidad del término.'
  doctrine_reference: Ninguna; nota antropológica del texto
- issue: Designación de στρατηγοί en un marco cívico local
  english_pob_reading: generals in each city
  chosen_spanish_reading: estrategas de cada ciudad
  alternative_spanish_readings:
  - generales de cada ciudad
  - comandantes de cada ciudad
  rationale: El título griego puede ser militar o cívico. En español, «estrategas» evita forzar una imaginería militar moderna y deja visible el carácter oficial local del cargo.
  doctrine_reference: Ninguna; decisión histórico-administrativa
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin depender mecánicamente de él: se mantuvieron la fuerza idiomática del griego, la coerción del contexto y la ambigüedad histórica de στρατηγῶν. No hubo revisiones previas aplicadas; el draft incorpora la valoración de acuerdo moderado y resuelve los puntos menores mediante notas léxicas.'
  spanish_consistency_notes:
  - Se usó «Yahvé» sólo cuando no aparece en este versículo; no aplica aquí.
  - 'Se prefirió vocabulario transparente y digno: «espíritu», «compasión», «destierro», evitando calcos innecesarios.'
  - Se mantuvo la progresión retórica del griego con una sola oración larga, como en el original.
  - Los marcadores [a], [b], [c] aparecen exactamente donde corresponden en el texto.
