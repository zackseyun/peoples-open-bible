translation:
  language: es
  text: ¡Alábenlo, los cielos más altos[a], y las aguas[b] sobre los cielos!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'cielos de los cielos', una expresión hebrea de superlativo para los cielos más altos.
    reason: lexical_alternative
  - marker: b
    text: 'O: ''las aguas que están sobre los cielos''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַֽלְלוּהוּ
  english_pob_choice: Praise him
  chosen_spanish: ¡Alábenlo
  alternatives_spanish:
  - ¡Alábenlo ustedes
  - ¡Alábenlo a él
  lexicon: HALOT
  rationale: El hebreo es un imperativo plural con sufijo de 3.ª persona masculina singular; en español, un imperativo plural con clítico lo comunica con naturalidad y mantiene la dirección exhortativa a múltiples destinatarios.
- source_word: שְׁמֵי הַשָּׁמָיִם
  english_pob_choice: highest heavens
  chosen_spanish: los cielos de los cielos
  alternatives_spanish:
  - los más altos cielos
  - el cielo de los cielos
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente un superlativo intensivo, 'cielos de los cielos'. En español, conservar la forma permite reflejar mejor la estructura y la fuerza poética del hebreo que una paráfrasis más explicativa.
- source_word: וְהַמַּיִם
  english_pob_choice: and waters
  chosen_spanish: y las aguas
  alternatives_spanish:
  - y las aguas que están
  - y el agua
  lexicon: HALOT
  rationale: El sustantivo plural con artículo se traduce de forma directa como 'las aguas'. El hebreo sigue el llamado a la alabanza, pero en español no es necesario forzar un vocativo explícito para que el mandato sea claro.
- source_word: אֲשֶׁר מֵעַל הַשָּׁמָיִם
  english_pob_choice: above the heavens
  chosen_spanish: que están sobre los cielos
  alternatives_spanish:
  - sobre los cielos
  - que están encima de los cielos
  lexicon: HALOT
  rationale: La cláusula יחסית ('que') modifica 'las aguas'. 'Sobre' reproduce מעל con naturalidad y conserva la imagen espacial antigua sin modernizarla ni reinterpretarla.
theological_decisions:
- issue: Lenguaje cosmológico de 'las aguas sobre los cielos'
  english_pob_reading: Retain the ancient cosmological imagery as stated in the text without reinterpretation.
  chosen_spanish_reading: Conservar la imaginería cosmológica antigua tal como aparece en el texto, sin armonizarla con categorías científicas modernas.
  alternative_spanish_readings:
  - interpretarlo como aguas celestiales metafóricas
  - cambiarlo por aguas atmosféricas
  rationale: El versículo convoca a la creación entera, incluyendo las aguas sobre los cielos. La traducción debe preservar esa imagen del mundo del texto, no diluirla en una explicación posterior ni convertirla en metáfora sin base textual.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El texto inglés revisado eliminó la explicitación adicional 'and you waters' para mantener el paralelismo; en español también se evita añadir un vocativo independiente que no exige el hebreo, preservando la coordinación natural de la línea poética.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma cuando aparezca el nombre divino; aquí no aparece.
  - '''Cielos'' se usa para שָׁמַיִם en concordancia con la expresión superlativa ''cielos de los cielos''.'
  - '''Aguas'' conserva el plural hebreo y la imaginería cosmológica del pasaje.'
  - El inicio con signo de exclamación ayuda a reflejar el imperativo plural exhortativo del hebreo.
