translation:
  language: es
  text: Por la ira de Yahvé, no será habitada, sino que llegará a ser una desolación completa. Todo el que pase por Babilonia quedará horrorizado y silbará[a] por todas sus heridas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siseará»; el verbo hebreo puede denotar tanto silbar como sisear, y aquí probablemente expresa desprecio ante la ruina de Babilonia.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִקֶּצֶף / קֶצֶף
  english_pob_choice: Because of the wrath of
  chosen_spanish: Por la ira de
  alternatives_spanish:
  - A causa de la ira de
  - Por el furor de
  lexicon: HALOT
  rationale: El hebreo expresa causa/origen; en español, "por la ira de" comunica de forma natural el motivo del juicio. "Ira" conserva la fuerza de קֶצֶף sin suavizarla, y evita una paráfrasis excesiva.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: La pauta del proyecto para יהוה es usar "Yahvé" en el texto principal. Mantiene el nombre propio del pacto y evita la sustitución por un título.
- source_word: לֹא תֵשֵׁב
  english_pob_choice: it will not be inhabited
  chosen_spanish: no será habitada
  alternatives_spanish:
  - no será poblada
  - no tendrá habitantes
  lexicon: HALOT
  rationale: El verbo con Babilonia en femenino singular expresa que la ciudad no será habitada. En español, la pasiva natural conserva el sentido urbano de asentamiento/ocupación.
- source_word: וְהָיְתָה שְׁמָמָה
  english_pob_choice: but will become a complete desolation
  chosen_spanish: sino que llegará a ser una desolación completa
  alternatives_spanish:
  - sino que se convertirá en una desolación total
  - y será una desolación completa
  lexicon: HALOT
  rationale: '"שְׁמָמָה" es desolación/devastación; "llegará a ser" reproduce el valor de cambio de estado, y "completa" conserva la intensificación de כֻּלָּהּ sin volverla interpretativa.'
- source_word: כֻּלָּהּ
  english_pob_choice: complete
  chosen_spanish: completa
  alternatives_spanish:
  - total
  - entera
  lexicon: HALOT
  rationale: El hebreo intensifica la desolación. "Completa" funciona de modo natural en español y conserva el carácter total del juicio.
- source_word: כֹּל עֹבֵר עַל בָּבֶל
  english_pob_choice: Everyone who passes by Babylon
  chosen_spanish: Todo el que pase por Babilonia
  alternatives_spanish:
  - Todo el que pasa por Babilonia
  - Todos los que pasen por Babilonia
  lexicon: HALOT
  rationale: 'La construcción hebrea es general: todo transeúnte que cruza o pasa junto a la ciudad. "Todo el que pase por Babilonia" suena natural y mantiene la referencia a los que la contemplan en ruina.'
- source_word: יִשֹּׁם
  english_pob_choice: will be appalled
  chosen_spanish: quedará asombrado
  alternatives_spanish:
  - quedará horrorizado
  - se quedará atónito
  lexicon: HALOT
  rationale: El verbo expresa quedar impactado por la ruina. "Asombrado" mantiene la reacción de sorpresa/estupor; no fuerza una lectura más específica de horror que el hebreo no exige por sí solo.
- source_word: וְיִשְׁרֹק
  english_pob_choice: will hiss
  chosen_spanish: y silbará
  alternatives_spanish:
  - y silbará con desprecio
  - y chisporroteará
  lexicon: HALOT
  rationale: שרק puede significar silbar o chiflar; aquí el inglés POB mantiene la alternativa de hissing/whistling. En español, "silbará" preserva la ambigüedad básica y permite el matiz de burla o escarnio sin añadirlo al texto principal.
- source_word: עַל כָּל מַכּוֹתֶיהָ
  english_pob_choice: over all her wounds
  chosen_spanish: por causa de todas sus heridas
  alternatives_spanish:
  - sobre todas sus heridas
  - a causa de todas sus heridas
  - por todas sus heridas
  lexicon: HALOT
  rationale: מַכּוֹת puede significar golpes, heridas o plagas. "Heridas" conserva la imagen de devastación visible sobre Babilonia; "por causa de" expresa mejor la reacción del transeúnte que un simple "sobre" en español.
theological_decisions:
- issue: Nombre divino יהוה / YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: Se sigue la decisión doctrinal del proyecto de transliterar el nombre divino en vez de ocultarlo tras un título. En español, "Yahvé" es la forma fijada para el texto principal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El pasaje presenta alta concordancia con el cierre de revisión más reciente: no se requieren cambios sustantivos respecto del sentido auditado. Se mantiene la decisión sobre el nombre divino y la ambigüedad de שׁרק mediante una nota léxica.'
  spanish_consistency_notes:
  - Se preserva "Babilonia" como nombre propio sin articularlo.
  - '"Desolación completa" conserva la intensidad total de כֻּלָּהּ sin sobreexplicar.'
  - 'La reacción del transeúnte se vierte con dos verbos coordinados: "quedará asombrado" y "silbará", respetando la secuencia hebrea.'
  - Se evita usar "SEÑOR" para יְהוָה conforme a la terminología del proyecto.
  - '"Heridas" mantiene la personificación femenina y el campo semántico de devastación, más que una traducción abstracta como "plagas".'
