revisions:
- from: Santos serán para su Dios, y no profanarán el nombre de su Dios[a], porque ofrecen las ofrendas encendidas de Yahvé, el alimento de su Dios; por tanto, santos serán.
  to: Santos serán para su Dios, y no profanarán el nombre de su Dios,[a] porque ofrecen las ofrendas de alimento de Yahvé, el alimento de su Dios; por tanto, serán santos.
  rationale: Se revisa «ofrendas encendidas» a «ofrendas de alimento» para seguir de manera más fiel la decisión semántica auditada en inglés («food offerings») y producir un español más natural. Se conserva en la nota la alternativa más literal con «ofrendas por fuego ... el pan de su Dios». También se suaviza el orden final a «serán santos» para mayor fluidez sin alterar el sentido.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:28:58Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: santidad sacerdotal, no profanar el nombre de su Dios, razón cultual, y conclusión reiterada de santidad. También respeta correctamente יהוה como «Yahvé». Sin embargo, la frase «ofrendas encendidas» no preserva con suficiente claridad la decisión auditada de la POB inglesa, que optó por «food offerings» en el texto principal y reservó «offerings by fire» para nota. En español, «ofrendas encendidas» suena poco idiomático y desplaza el foco desde la función sacrificial/alimentaria hacia el mero hecho de estar encendidas.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «ofrendas encendidas» resulta extraño y menos natural que «ofrendas de alimento» o una formulación equivalente. El resto del verso es legible; aun así, la clausula final suena más natural como «por tanto, serán santos» que «por tanto, santos serán», sin pérdida de énfasis ni fidelidad.
  glossary_alignment: 'Se alinea bien con los términos del proyecto en «Yahvé», «Dios» y «santos». La principal desalineación está en אִשֵּׁי יְהוָה: el inglés POB documenta «food offerings» en texto principal y la alternativa más literal en nota; por eso el español debería seguir ese mismo reparto semántico, no introducir en el texto principal una formulación centrada en «encendidas».'
  issues:
  - severity: high
    issue: «ofrendas encendidas» para אִשֵּׁי יְהוָה
    rationale: No refleja adecuadamente la decisión principal de la POB inglesa («food offerings») y en español suena poco natural. Además, puede sugerir simplemente ofrendas prendidas/fuego visible, en vez del tecnicismo cultual con relación a «alimento/pan de su Dios».
  - severity: medium
    issue: La nota al pie debe corresponder a una redacción principal que privilegie el sentido de alimento
    rationale: Si el texto principal ya enfatiza el fuego, la nota pierde su función de preservar la alternativa más literal. Conviene mantener en la nota «ofrendas por fuego ... el pan de su Dios» y en el texto principal una formulación con «alimento».
  - severity: low
    issue: Orden final «santos serán» algo rígido
    rationale: Es comprensible, pero «serán santos» suena más natural en español contemporáneo y sigue siendo fiel al hebreo en contexto legal.
  revised_spanish_text: Santos serán para su Dios, y no profanarán el nombre de su Dios,[a] porque ofrecen las ofrendas de alimento de Yahvé, el alimento de su Dios; por tanto, serán santos.
  revised_footnotes:
  - marker: a
    text: 'O, más literalmente: «las ofrendas por fuego de Yahvé, el pan de su Dios».'
    reason: lexical_alternative
  revision_rationale: Se revisa «ofrendas encendidas» a «ofrendas de alimento» para seguir de manera más fiel la decisión semántica auditada en inglés («food offerings») y producir un español más natural. Se conserva en la nota la alternativa más literal con «ofrendas por fuego ... el pan de su Dios». También se suaviza el orden final a «serán santos» para mayor fluidez sin alterar el sentido.
