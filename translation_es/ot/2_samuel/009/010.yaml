translation:
  language: es
  text: Tú y tus hijos y tus esclavos labrarás la tierra para él, y traerás su fruto, y será pan para el hijo de tu señor, y él lo comerá. Pero Mefiboset, el hijo de tu señor, comerá siempre pan[a] en mi mesa. Y Ziba tenía quince hijos y veinte esclavos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «pan» también puede significar «alimento» o «provisiones» según el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָבַדְתָּ לּוֹ אֶת הָאֲדָמָה
  english_pob_choice: shall work the land for him
  chosen_spanish: labrarán la tierra para él
  alternatives_spanish:
  - trabajarás la tierra para él
  - cultivarás la tierra para él
  lexicon: HALOT
  rationale: עבד con אֲדָמָה aquí describe trabajo agrícola concreto en beneficio de Mefiboset. En español, “labrar la tierra” conserva el sentido agrícola y evita una formulación demasiado general.
- source_word: אַתָּה וּבָנֶיךָ וַעֲבָדֶיךָ
  english_pob_choice: you and your sons and your slaves
  chosen_spanish: tú y tus hijos y tus esclavos
  alternatives_spanish:
  - tú y tus hijos y tus siervos
  - tú y tus hijos y tus servidores
  lexicon: HALOT
  rationale: עֲבָדִים aquí señala personal vinculado a la casa y al trabajo, con fuerza de dependencia servil. Se mantiene “esclavos” para preservar ese peso léxico, según la política del proyecto.
- source_word: וְהֵבֵאתָ
  english_pob_choice: you shall bring in the produce
  chosen_spanish: y traerás su fruto
  alternatives_spanish:
  - y traerás eso
  - y traerás la cosecha
  lexicon: HALOT
  rationale: El verbo implica traer el producto de la tierra, aunque el objeto no se exprese. “Su fruto” hace explícito el referente agrícola sin expandir el sentido más allá del contexto.
- source_word: וְהָיָה לְבֶן אֲדֹנֶיךָ לֶּחֶם
  english_pob_choice: and it shall be bread for your master's son
  chosen_spanish: y será pan para el hijo de tu señor
  alternatives_spanish:
  - y será alimento para el hijo de tu señor
  - y servirá de pan para el hijo de tu señor
  lexicon: HALOT
  rationale: לֶחֶם se conserva como “pan” para respetar la repetición del hebreo y su enlace con la siguiente cláusula de comer en la mesa real.
- source_word: וַאֲכָלוֹ
  english_pob_choice: and he shall eat it
  chosen_spanish: y él lo comerá
  alternatives_spanish:
  - y lo comerá
  - y comerá de ello
  lexicon: HALOT
  rationale: El sufijo masculino singular remite al alimento recién mencionado; en español se explicita con “lo” para claridad.
- source_word: וּמְפִיבֹשֶׁת ... יֹאכַל תָּמִיד לֶחֶם עַל שֻׁלְחָנִי
  english_pob_choice: But Mephibosheth, your master's son, shall always eat bread at my table
  chosen_spanish: Pero Mefiboset, el hijo de tu señor, comerá siempre pan en mi mesa
  alternatives_spanish:
  - Pero Mefiboset ... comerá continuamente pan en mi mesa
  - Sin embargo, Mefiboset ... comerá siempre pan en mi mesa
  lexicon: HALOT
  rationale: La partícula adversativa introduce contraste con la provisión del campo. “Comerá siempre” traduce תָּמִיד de modo natural, y “en mi mesa” reproduce la imagen de provisión y comunión real.
- source_word: עַל שֻׁלְחָנִי
  english_pob_choice: at my table
  chosen_spanish: en mi mesa
  alternatives_spanish:
  - a mi mesa
  - sobre mi mesa
  lexicon: HALOT
  rationale: El español idiomático pide “en mi mesa” para expresar el lugar de la comida y la hospitalidad real, sin perder la referencia al hebreo.
- source_word: וּלְצִיבָא חֲמִשָּׁה עָשָׂר בָּנִים וְעֶשְׂרִים עֲבָדִים
  english_pob_choice: Now Ziba had fifteen sons and twenty slaves
  chosen_spanish: Y Ziba tenía quince hijos y veinte esclavos
  alternatives_spanish:
  - Y Ziba tenía quince hijos y veinte siervos
  - Y Ziba contaba con quince hijos y veinte esclavos
  lexicon: HALOT
  rationale: La cláusula final es un dato de fondo sin verbo expreso en hebreo; “tenía” es necesario en español. Se mantiene “esclavos” para עֲבָדִים, coherente con la decisión léxica principal.
translation_notes:
  revision_awareness: He respetado la restauración de “esclavos” en lugar de “siervos/servants” indicada en el rastro de revisión. También he conservado “pan” en ambas ocurrencias para reflejar la repetición hebrea y el juego de provisión/mesa real.
  spanish_consistency_notes:
  - Mefiboset y Ziba se han transliterado en forma habitual y uniforme.
  - Se mantiene la distinción entre el trabajo agrícola de los primeros miembros de la cláusula y la provisión permanente de Mefiboset en la mesa del rey.
  - La nota sobre ‘pan’ cubre la ambigüedad léxica sin alterar el texto principal.
