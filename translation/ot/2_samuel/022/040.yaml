id: 2SA.22.40
reference: 2 Samuel 22:40
source:
  edition: WLC
  text: וַ/תַּזְרֵ֥/נִי חַ֖יִל לַ/מִּלְחָמָ֑ה תַּכְרִ֥יעַ קָמַ֖/י תַּחְתֵּֽ/נִי׃
translation:
  text: You armed me with strength for battle[b][a]; you caused those who rose against me to bow beneath me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'You girded me with strength for battle.' The Hebrew verb carries the imagery of girding or equipping, which can be rendered more formally that way.
    reason: lexical_alternative
  - marker: b
    text: Or 'you caused my adversaries to bow under me.' The verb can more literally express forcing opponents to kneel or bow down.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּזְרֵנִי
  chosen: you armed me
  alternatives:
  - you girded me
  - you equipped me
  lexicon: HALOT
  rationale: From זָרָה/אַזַר in this stem and context, the idiom is to gird or equip someone. In English, 'armed me' naturally conveys preparation for combat and fits the following phrase 'for battle' without sounding archaic like 'girded me.'
- source_word: חַיִל
  chosen: strength
  alternatives:
  - might
  - valor
  lexicon: HALOT
  rationale: חַיִל can denote strength, might, valor, or military capacity. Here it is what David is equipped with for battle, so 'strength' best captures the empowering sense in clear modern English.
- source_word: לַמִּלְחָמָה
  chosen: for battle
  alternatives:
  - for war
  lexicon: HALOT
  rationale: The noun means war/battle. 'For battle' is idiomatic in English and suits the immediate martial context.
- source_word: תַּכְרִיעַ
  chosen: you brought down
  alternatives:
  - you caused to bow
  - you subdued
  lexicon: HALOT
  rationale: Hiphil of כָּרַע means to cause to bow down or bring low. 'Brought down' is natural English and preserves the image of forcing enemies into a lower position.
- source_word: קָמַי
  chosen: those who rose against me
  alternatives:
  - my adversaries
  - my attackers
  - those who stood up against me
  lexicon: HALOT
  rationale: From קוּם, literally 'those rising against me.' The participial sense is well represented by 'those who rose against me,' preserving the hostile uprising nuance.
- source_word: תַּחְתֵּנִי
  chosen: beneath me
  alternatives:
  - under me
  - below me
  lexicon: HALOT
  rationale: Literally 'under me/beneath me.' 'Beneath me' works idiomatically with 'brought down' and preserves the image of enemies being forced under the speaker.
