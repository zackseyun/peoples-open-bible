translation:
  language: es
  text: Quienes temen a Yahvé[a], confíen en él, y su recompensa no se retrasará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo, literalmente: «y él no dejará que su recompensa pase la noche», un modismo difícil de expresar con naturalidad en español; el paralelo griego dice: «y ciertamente no perderán su recompensa».'
    reason: alternative_reading
lexical_decisions:
- source_word: יִרְאֵי יְהֹוָה / οἱ φοβούμενοι Κύριον
  english_pob_choice: You who fear Yahweh / fear the LORD
  chosen_spanish: Ustedes que temen a Yahvé
  alternatives_spanish:
  - Los que temen a Yahvé
  - Quienes temen a Yahvé
  lexicon: HALOT; LXX φοβέομαι
  rationale: El hebreo y el griego usan una forma participial plural con valor vocativo en contexto. En español, la segunda persona plural directa comunica mejor la exhortación sapiencial que un sustantivo impersonal. Se conserva Yahvé conforme al criterio del proyecto para el nombre divino.
- source_word: הַאֲמִינוּ בּוֹ / πιστεύσατε αὐτῷ
  english_pob_choice: trust in him
  chosen_spanish: confíen en él
  alternatives_spanish:
  - crean en él
  - pongan su confianza en él
  lexicon: HALOT; BDAG
  rationale: El verbo hebreo con ב y el griego πιστεύσατε αὐτῷ expresan confianza/reliance, no solo asentimiento intelectual. 'Confíen en él' suena natural en exhortación y preserva mejor el sentido relacional y activo.
- source_word: שְׂכַרְכֶם / τὸν μισθὸν ὑμῶν
  english_pob_choice: your reward
  chosen_spanish: su recompensa
  alternatives_spanish:
  - su galardón
  - su salario
  lexicon: HALOT; LSJ
  rationale: שכר puede ser 'recompensa' o 'salario'. En un dicho sapiencial sobre la retribución divina, 'recompensa' comunica bien la idea sin endurecerla con un tecnicismo laboral. Se evita 'galardón' por registro más eclesiástico y menos neutro.
- source_word: לֹא יָלִין / οὐ μὴ ἀπολέσητε
  english_pob_choice: your reward will not be delayed
  chosen_spanish: no se retrasará
  alternatives_spanish:
  - no pasará la noche
  - no se perderá
  lexicon: HALOT; Greek parallel
  rationale: La hebrea literalidad de 'pasar la noche / permanecer overnight' es difícil en español con 'recompensa' como objeto. El paralelo griego aporta la idea de no perder la recompensa; la revisión inglesa decidió 'will not be delayed' para reflejar mejor el hebreo. 'No se retrasará' mantiene el sentido de demora sin borrar la tensión entre ambas formas.
theological_decisions:
- issue: Nombre divino en el texto
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El pasaje hebreo contiene יהוה. Se conserva el nombre propio 'Yahvé' según la política del proyecto, en lugar de sustituirlo por un título genérico. Esto mantiene la transparencia respecto del original.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Tensión hebreo-griego en la cláusula final
  english_pob_reading: your reward will not be delayed
  chosen_spanish_reading: su recompensa no se retrasará
  alternative_spanish_readings:
  - su recompensa no se perderá
  - no dejará de llegar su recompensa
  rationale: El hebreo dice literalmente algo como 'no pasará la noche' con el salario/recompensa, mientras que el griego expresa explícitamente que no se perderá la recompensa. La formulación española sigue la revisión inglesa más reciente y conserva la idea de demora, sin ocultar que existe una variante semántica atestiguada en el paralelo griego.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source uncertainty honestly'
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del audit trail inglés, que cambió 'will not be lost' a 'will not be delayed' para reflejar mejor el hebreo לין. La redacción española sigue esa decisión, pero mantiene la nota que reconoce la tensión con el griego.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma principal para יהוה, en coherencia con el proyecto.
  - Se usa 'confíen en él' para preservar el valor de confianza del verbo hebreo/ griego, no solo 'crean'.
  - '''Recompensa'' resulta más neutral y transparente que ''galardón'' en este contexto sapiencial.'
  - La cláusula final opta por una solución óptima-equivalente que no borra la dificultad literal del hebreo ni el apoyo interpretativo del griego.
