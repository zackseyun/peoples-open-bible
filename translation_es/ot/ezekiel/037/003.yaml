translation:
  language: es
  text: 'Y me dijo[a]: «Hijo de hombre, ¿pueden vivir estos huesos?» Y yo dije: «Señor Yahvé, tú sabes».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Señor Yahvé». La traducción conserva el nombre divino en lugar de ocultarlo con una convención tipográfica.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר אֵלַי
  english_pob_choice: And he said to me
  chosen_spanish: Y me dijo
  alternatives_spanish:
  - Entonces me dijo
  - Y me dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; en español, «Y me dijo» conserva el flujo hebreo de manera natural y fiel, y «me» reproduce directamente אֵלַי.
- source_word: בֶּן אָדָם
  english_pob_choice: Son of man
  chosen_spanish: Hijo de hombre
  alternatives_spanish:
  - Ser humano
  - Mortal
  lexicon: HALOT
  rationale: En Ezequiel es un apelativo fijo y repetido. «Hijo de hombre» preserva el idiomatismo, la resonancia literaria y la forma tradicional del vocativo sin introducir una paráfrasis interpretativa.
- source_word: הֲתִחְיֶינָה
  english_pob_choice: can ... live
  chosen_spanish: ¿pueden vivir?
  alternatives_spanish:
  - ¿vivirán?
  - ¿pueden volver a vivir?
  lexicon: HALOT
  rationale: La partícula interrogativa con el imperfecto expresa posibilidad/capacidad más que simple predicción. «¿Pueden vivir?» mantiene esa fuerza modal en español y suena natural en el diálogo.
- source_word: הָעֲצָמוֹת הָאֵלֶּה
  english_pob_choice: these bones
  chosen_spanish: estos huesos
  alternatives_spanish:
  - estos huesos secos
  lexicon: HALOT
  rationale: El adjetivo «secos» no está en este versículo; aparece en el contexto más amplio, pero no debe importarse aquí. «Estos huesos» refleja con precisión el hebreo.
- source_word: וָאֹמַר
  english_pob_choice: And I said
  chosen_spanish: Y yo dije
  alternatives_spanish:
  - Entonces dije
  - Y dije
  lexicon: HALOT
  rationale: Se mantiene la continuidad narrativa del waw consecutivo con «Y», y se explicita el sujeto con «yo» para claridad y naturalidad en español.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: Lord GOD
  chosen_spanish: Señor Yahvé
  alternatives_spanish:
  - Señor Yahvé Dios
  - Señor, Yahvé
  lexicon: HALOT
  rationale: El hebreo combina un título de soberanía con el nombre divino. Siguiendo el criterio del proyecto, se traduce יְהוִה como «Yahvé» en vez de ocultarlo bajo mayúsculas reverenciales; «Señor Yahvé» evita la repetición artificial «Señor Señor» y preserva el elemento del nombre propio.
- source_word: אַתָּה יָדָעְתָּ
  english_pob_choice: you know
  chosen_spanish: tú lo sabes
  alternatives_spanish:
  - tú sabes
  - tú solo lo sabes
  lexicon: HALOT
  rationale: El hebreo dice simplemente que Dios sabe; no añade «solo». «Tú lo sabes» expresa con naturalidad la respuesta deferente de Ezequiel sin ampliar el sentido explícito.
theological_decisions:
- issue: Representación del nombre divino יְהוִה dentro de אֲדֹנָי יְהוִה
  english_pob_reading: Lord GOD; the footnote explained that the English customary rendering preserves the divine-name element while avoiding 'Lord LORD'
  chosen_spanish_reading: Señor Yahvé
  alternative_spanish_readings:
  - Señor Dios
  - Señor Yahvé Dios
  rationale: El texto hebreo contiene el Tetragrámaton de forma directa. Conforme al criterio doctrinal del proyecto, se debe hacer visible el nombre divino en español. «Señor Yahvé» conserva tanto la función de título como el nombre propio sin disfrazarlo en una convención tipográfica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor del vocativo בֶּן אָדָם en Ezequiel
  english_pob_reading: Son of man; keep the idiom and literary force in Ezekiel
  chosen_spanish_reading: Hijo de hombre
  alternative_spanish_readings:
  - Ser humano
  - Mortal
  rationale: La expresión es un vocativo profético fijo dirigido a Ezequiel. «Hijo de hombre» preserva la forma idiomática y evita importar connotaciones cristológicas ajenas a este contexto profético.
  doctrine_reference: DOCTRINE.md Translation philosophy §4, gender-accurate over gender-neutral
translation_notes:
  revision_awareness: El pasaje no muestra cambios de revisión en el expediente auditado; la versión final coincide con la línea de traducción estable, con la única decisión visible de hacer explícito «Yahvé» en lugar de una máscara reverencial.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוִה conforme al estándar del proyecto.
  - «Hijo de hombre» se conserva por consistencia con el uso técnico en Ezequiel.
  - La puntuación reproduce la estructura dialogal del hebreo y del audit trail inglés.
  - No se añade «seco» a «huesos», porque no está en el versículo mismo.
