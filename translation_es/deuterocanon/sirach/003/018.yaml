translation:
  language: es
  text: Hazte pequeño en toda grandeza[a], y ante Dios encontrarás misericordia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «Cuanto más grande seas, tanto más humíllate, y delante del Señor encontrarás favor»'
    reason: alternative_reading
lexical_decisions:
- source_word: מַעֵט
  english_pob_choice: humble
  chosen_spanish: humillarte a ti mismo
  alternatives_spanish:
  - hacerte pequeño
  - rebajarte
  - humillarte
  lexicon: HALOT
  rationale: El hebreo expresa la idea de hacerse pequeño o disminuirse; el griego confirma el sentido de ταπείνου σεαυτόν. En español, «humillarte a ti mismo» conserva la fuerza ética del mandato y suena natural en contexto.
- source_word: נַפְשְׁךָ
  english_pob_choice: yourself
  chosen_spanish: a ti mismo
  alternatives_spanish:
  - tu alma
  - tu vida
  - ti
  lexicon: HALOT
  rationale: En esta construcción reflexiva, nephesh funciona como el propio sujeto. «A ti mismo» evita una lectura demasiado literal de «alma» y mantiene el valor reflexivo del hebreo.
- source_word: מִכָּל גְּדוּלָה
  english_pob_choice: the greater you are
  chosen_spanish: Cuanto más grande seas
  alternatives_spanish:
  - en toda grandeza
  - de toda grandeza
  - cuanto mayor seas
  lexicon: HALOT
  rationale: El hebreo es compacto y admite una idea proporcional. El griego explicita el paralelismo de proporcionalidad, por lo que una construcción comparativa en español comunica mejor el sentido que un calco como «en toda grandeza».
- source_word: לִפְנֵי אֵל
  english_pob_choice: before God
  chosen_spanish: delante de Dios
  alternatives_spanish:
  - ante Dios
  - en la presencia de Dios
  - delante de Dios
  lexicon: HALOT
  rationale: אֵל designa a Dios de forma directa; «delante de Dios» reproduce bien la preposición relacional y conserva un tono bíblico claro en español.
- source_word: תִּמְצָא רַחֲמִים
  english_pob_choice: you will find mercy
  chosen_spanish: encontrarás misericordia
  alternatives_spanish:
  - encontrarás compasión
  - encontrarás favor
  - hallarás misericordia
  lexicon: HALOT
  rationale: El hebreo dice literalmente «misericordias/compasiones». Se mantiene «misericordia» en el texto principal porque es la lectura primaria del testimonio hebreo; la opción griega de χάριν queda reflejada en la nota.
theological_decisions:
- issue: Desajuste entre el hebreo רחמים y el griego χάριν en la promesa final
  english_pob_reading: before God you will find mercy
  chosen_spanish_reading: delante de Dios encontrarás misericordia
  alternative_spanish_readings:
  - delante del Señor encontrarás favor
  - delante del Señor encontrarás gracia
  - delante de Dios encontrarás favor
  rationale: El hebreo conservado es la fuente primaria donde existe el texto. Por eso se mantiene «misericordia» en la línea principal, sin ocultar que el paralelo griego tiene «favor/gracia».
  doctrine_reference: 'Translation philosophy: primacía de la fuente original con preservación de tensiones textuales; no nivelar diferencias entre testigos.'
- issue: Título divino en el griego paralelo (Κυρίου) frente al hebreo אֵל
  english_pob_reading: before God
  chosen_spanish_reading: delante de Dios
  alternative_spanish_readings:
  - delante del Señor
  - ante el Señor
  rationale: El hebreo dice אֵל, no el nombre divino ni un sustituto litúrgico. Por eso se traduce «Dios» en el texto principal; el valor de «Señor» del griego se registra solo como variante implícita en la nota.
  doctrine_reference: Primacía del hebreo donde está conservado; evitar importar automáticamente el sustituto del griego cuando la base hebrea es clara.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español junto al término anotado, y que la nota corresponda a la alternativa griega documentada en el aparato auditado.
  spanish_consistency_notes:
  - Se prefirió «misericordia» en la línea principal por el hebreo, con «favor» preservado en la nota por el griego.
  - «Dios» se mantiene por el hebreo אֵל, evitando importar «Señor» al texto principal.
  - La construcción «Cuanto más grande seas» refleja la proporcionalidad del hebreo y el griego sin volverla un calco rígido.
