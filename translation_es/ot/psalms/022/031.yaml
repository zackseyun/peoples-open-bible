translation:
  language: es
  text: La descendencia[a] le servirá; se contará[b] del Señor[c] a la generación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «posteridad», «descendientes» o «semilla» para זֶרַע; el singular hebreo probablemente tiene sentido colectivo.
    reason: lexical_alternative
  - marker: b
    text: O «se relatará» o «se proclamará»; el hebreo también puede entenderse como «se contará/proclamará acerca del Señor a la generación venidera».
    reason: alternative_reading
  - marker: c
    text: O «acerca del Señor».
    reason: alternative_reading
lexical_decisions:
- source_word: זֶרַע
  english_pob_choice: Posterity / A seed
  chosen_spanish: la descendencia
  alternatives_spanish:
  - la posteridad
  - la semilla
  - los descendientes
  lexicon: HALOT
  rationale: El hebreo singular tiene sentido colectivo. En español, «descendencia» comunica bien la idea colectiva sin sonar tan literal o extraña como «semilla», y preserva el alcance genealógico del término. Mantengo la flexibilidad semántica que el POB documenta para זֶרַע.
- source_word: יַעַבְדֶנּוּ
  english_pob_choice: will serve him
  chosen_spanish: le servirá
  alternatives_spanish:
  - le adorará
  - será su siervo
  - le rendirá servicio
  lexicon: HALOT
  rationale: עבד expresa el campo básico de «servir». En español, «le servirá» conserva la amplitud léxica y deja abierta la implicación de servicio reverente sin convertirlo demasiado pronto en «adorar».
- source_word: יְסֻפַּר
  english_pob_choice: it will be told
  chosen_spanish: se hablará
  alternatives_spanish:
  - se contará
  - se proclamará
  - se narrará
  lexicon: HALOT
  rationale: El pasivo de ספר permite la idea de ser contado o relatado. En español, una pasiva refleja impersonal con «se hablará» comunica que el asunto será comunicado, aunque es ligeramente más libre que «se contará»; se elige por fluidez y porque encaja con la frase siguiente sin forzar un sujeto impersonal demasiado pesado.
- source_word: לַאדֹנָי
  english_pob_choice: of the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - acerca del Señor
  - del Señor como tema
  - sobre el Señor
  lexicon: HALOT
  rationale: 'La preposición ל admite una relación de tema o referencia. En español, «del Señor» con «se hablará» reproduce de forma natural la referencia del discurso y conserva la ambigüedad controlada que el POB documenta: el Señor es el contenido de lo que se dice.'
- source_word: לַדּוֹר
  english_pob_choice: to the generation
  chosen_spanish: a la generación
  alternatives_spanish:
  - a la generación venidera
  - para la generación
  - a una generación
  lexicon: HALOT
  rationale: דור es «generación». «A la generación» mantiene la estructura de destino o dirección del habla sin añadir una especificación interpretativa no exigida por el hebreo. La alternativa «generación venidera» queda como posibilidad contextual.
theological_decisions:
- issue: Referencia del sufijo en «le servirá» y del tema del discurso en la segunda cola
  english_pob_reading: The verse speaks of future descendants serving God and the Lord being proclaimed to the next generation.
  chosen_spanish_reading: La descendencia futura servirá a Dios, y del Señor se hablará a la siguiente generación.
  alternative_spanish_readings:
  - La descendencia servirá al rey vindicado del salmo, y luego se hablará del Señor aparte.
  - La descendencia servirá a él, y se anunciará al Señor a la generación venidera.
  rationale: 'Siguiendo el POB, el verso mantiene una tensión referencial real: el sufijo de «le servirá» apunta de modo natural a Dios en el contexto de alabanza del salmo, mientras que la segunda cola centra al Señor como tema de la transmisión a la siguiente generación. No se resuelve de manera cerrada una lectura mesiánica más específica, aunque sigue siendo compatible con ella.'
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una oscilación entre un rendido formal de זֶרַע («A seed») y uno más natural («Posterity»), y entre «told of» / «proclaimed about». Para el español se priorizó una formulación natural pero aún cercana al hebreo: «descendencia» conserva el valor colectivo de זֶרַע, y «se hablará del Señor» mantiene la ambigüedad temática de לַאדֹנָי sin exagerar el sentido.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» como máscara tipográfica; se usó «Señor» por ser el equivalente POB de יהוה en español.
  - Se prefirió «descendencia» frente a «semilla» para evitar una literalidad opaca en español.
  - Se mantuvo «Señor» como referente divino sin convertir automáticamente la cláusula en una proclamación litúrgica más fuerte que la evidenciada por el hebreo.
  - La pasiva refleja «se hablará» preserva el carácter impersonal del hebreo y sugiere transmisión oral continua.
