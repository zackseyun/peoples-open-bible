translation:
  language: es
  text: 'Porque así me mandó por la palabra de Yahvé, diciendo: «No comerás pan, ni beberás agua, ni volverás por el camino por el que viniste».'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: כִּי כֵן
  english_pob_choice: For thus
  chosen_spanish: Porque así
  alternatives_spanish:
  - Pues así
  - Porque de esta manera
  lexicon: HALOT
  rationale: La fórmula introduce la explicación de la negativa con un valor causal-explanatorio. «Porque así» conserva el sentido de «For thus» sin sonar forzado en español.
- source_word: צִוָּה אֹתִי
  english_pob_choice: he commanded me
  chosen_spanish: me mandó
  alternatives_spanish:
  - me ordenó
  - me dio mandamiento
  lexicon: HALOT
  rationale: El verbo expresa una orden autoritativa. «Me mandó» es natural en español y mantiene la fuerza de mandato; «ordenó» es posible, pero suena más administrativo.
- source_word: בִּדְבַר יְהוָה
  english_pob_choice: by the word of Yahweh
  chosen_spanish: por la palabra de Yahvé
  alternatives_spanish:
  - por la palabra de Yahveh
  - mediante la palabra de Yahvé
  lexicon: HALOT
  rationale: Se conserva la fórmula profética y la referencia al medio/autorización del mandato. «Por la palabra de Yahvé» sigue el default del proyecto para יְהוָה y es idiomático en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - así diciendo
  - y dijo
  lexicon: HALOT
  rationale: Funciona como introducción directa de las palabras citadas. «Diciendo» preserva la continuidad del discurso sin añadir matices.
- source_word: לֹא תֹאכַל לֶחֶם
  english_pob_choice: You shall not eat bread
  chosen_spanish: No comerás pan
  alternatives_spanish:
  - No comerás alimento
  - No habrás de comer pan
  lexicon: HALOT
  rationale: «Pan» conserva el lexema לֶחֶם sin generalizarlo a «alimento». La forma futura negativa reproduce bien el mandato reportado.
- source_word: וְלֹא תִשְׁתֶּה מָּיִם
  english_pob_choice: nor drink water
  chosen_spanish: ni beberás agua
  alternatives_spanish:
  - ni tomarás agua
  - y no beberás agua
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con la prohibición anterior. «Beberás agua» corresponde de manera directa a la raíz verbal y al sustantivo literal.
- source_word: וְלֹא תָשׁוּב
  english_pob_choice: nor return
  chosen_spanish: ni volverás
  alternatives_spanish:
  - ni regresarás
  - ni darás la vuelta
  lexicon: HALOT
  rationale: שוב significa volver/regresar. «Volverás» es breve, formal y equivalente; en contexto complementa la prohibición final.
- source_word: בַּדֶּרֶךְ אֲשֶׁר הָלָכְתָּ
  english_pob_choice: by the way that you came
  chosen_spanish: por el camino por el que fuiste
  alternatives_spanish:
  - por el camino por el que viniste
  - por el camino que recorriste
  lexicon: HALOT
  rationale: Se conserva la imagen del camino recorrido con una estructura española natural. «Fuiste» refleja más de cerca la forma hebrea de «fuiste/andaste»; «viniste» es una alternativa dinámica válida, pero desplaza un poco la perspectiva del hebreo.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo nombra directamente a יְהוָה, por lo que se mantiene el nombre propio divino en español. Se adopta «Yahvé» según el estándar del proyecto, evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de una redacción más interpretativa («For this is what...») a una más cercana al hebreo («For thus...»), y ajustó la cláusula final para reflejar mejor el verbo de movimiento. La redacción española sigue esa preferencia por una correspondencia más directa, sin perder naturalidad.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en lugar de «SEÑOR» conforme al estándar del proyecto.
  - Se conserva «pan» para לֶחֶם y «agua» para מָּיִם, sin generalizar el léxico.
  - La secuencia negativa reproduce el paralelismo hebreo con «ni... ni... ni...».
  - El cierre «por el camino por el que fuiste» preserva la imagen del hebreo y admite la alternativa dinámica indicada en la nota.
