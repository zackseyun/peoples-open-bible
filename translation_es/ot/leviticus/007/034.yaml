  text: כִּי֩ אֶת חֲזֵ֨ה הַ/תְּנוּפָ֜ה וְ/אֵ֣ת שׁ֣וֹק הַ/תְּרוּמָ֗ה לָקַ֨חְתִּי֙ מֵ/אֵ֣ת בְּנֵֽי יִשְׂרָאֵ֔ל מִ/זִּבְחֵ֖י שַׁלְמֵי/הֶ֑ם וָ/אֶתֵּ֣ן אֹ֠תָ/ם לְ/אַהֲרֹ֨ן הַ/כֹּהֵ֤ן וּ/לְ/בָנָי/ו֙ לְ/חָק עוֹלָ֔ם מֵ/אֵ֖ת בְּנֵ֥י יִשְׂרָאֵֽל־׀־־׃
base_translation:
  language: en
  yaml_path: translation/ot/leviticus/007/034.yaml
  text: For I have taken the breast of the wave offering and the thigh of the contribution from the sons of Israel[a], from their sacrifices of peace offerings[c][b], and I have given them to Aaron the priest and to his sons as a permanent statute from the sons of Israel.
  footnotes:
  - marker: a
    text: Or 'the Israelites' for 'the sons of Israel.' The Hebrew is literally 'sons of Israel,' a standard covenantal designation.
    reason: lexical_alternative
  - marker: b
    text: Or 'heave offering' for 'contribution.' The Hebrew term refers to a portion set apart and lifted up as an offering.
    reason: lexical_alternative
  - marker: c
    text: Or 'fellowship offerings' for 'peace offerings.'
    reason: lexical_alternative
