revisions:
- from: 'Y ellos le dijeron[a]: «Un hombre subió a encontrarnos y nos dijo: “Vayan, vuelvan al rey que los envió, y díganle: ‘Así dice Yahvé: ¿Es porque no hay Dios en Israel que tú estás enviando a consultar a Baal-zebub, dios de Ecrón? Por tanto, la cama[b] a la que subiste allí no bajarás de ella, porque ciertamente morirás’”».'
  to: 'Y ellos le dijeron[a]: «Un hombre subió a encontrarnos y nos dijo: “Vayan, vuelvan al rey que los envió, y háblenle: ‘Así dice Yahvé: ¿Es porque no hay Dios en Israel que tú estás enviando a consultar a Baal-zebub, el dios de Ecrón? Por tanto, no bajarás de la cama[b] a la que subiste, porque ciertamente morirás’”».'
  rationale: 'La revisión corrige dos puntos principales: preserva mejor la distinción léxica del hebreo con «háblenle» para וְדִבַּרְתֶּם, y reordena la sentencia sobre la cama para que suene natural en español sin perder la imagen de subir y no bajar. También mejora la nota b para que ofrezca una alternativa fiel y útil, y hace más natural la aposición «el dios de Ecrón».'
