  to: Se indignaban y se afligían profundamente por el injusto asesinato del hombre. Pero cuando el rey volvió de las regiones de Cilicia, los judíos de la ciudad le presentaron sus peticiones, y también los griegos[a], compartiendo su odio por la malvada acción,
