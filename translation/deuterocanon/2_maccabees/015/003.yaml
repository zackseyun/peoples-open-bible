theological_decisions:
- issue: Reference of the heavenly authority
  chosen_reading: a sovereign who is in heaven
  alternative_readings:
  - the Sovereign in heaven
  - a ruler in heaven
  rationale: The Greek uses ὁ δυνάστης with the article, but in this hostile pagan speech it functions as a descriptive designation rather than a fixed divine title. Lowercase 'sovereign' preserves the sense without over-specifying a formal title for God.
  doctrine_reference: Preserve theological tension rather than resolve it; translate titles by meaning without importing doctrinal claims the text does not make.
