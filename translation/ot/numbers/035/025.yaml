theological_decisions:
- issue: Legal status of הָרֹצֵחַ in the cities-of-refuge legislation
  chosen_reading: Rendered as 'manslayer' rather than 'murderer.'
  alternative_readings:
  - murderer
  - killer
  rationale: The chapter distinguishes intentional murder from unintentional killing. Using 'murderer' here would import culpability the immediate legal process has not assigned. 'Manslayer' preserves the juridical ambiguity until adjudication.
  doctrine_reference: Translation philosophy §1, §3
- issue: Implicit subject of מָשַׁח אֹתוֹ
  chosen_reading: Kept the active wording 'whom he anointed' with the subject left implicit.
  alternative_readings:
  - who had been anointed with the holy oil
  - who was anointed with the holy oil
  rationale: The Hebrew text uses an active verb with an unstated subject. Preserving that form is more auditable and avoids silently resolving the syntax. English readers may infer the conventional anointing agent from context, but the translation does not insert one.
  doctrine_reference: Translation philosophy §1, §3
