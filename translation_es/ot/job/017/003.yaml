translation:
  language: es
  text: Pon, te ruego, un fiador[a] por mí contigo mismo[b]; ¿quién otro hay que dé la mano conmigo[c]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘sé fiador de mí’. El hebreo usa lenguaje jurídico de fianza o garantía.
    reason: lexical_alternative
  - marker: b
    text: 'Lit. ‘contigo’. En contexto, el sentido es ‘contigo mismo’: Job le pide a Dios que provea la fianza y que él mismo sea la contraparte del compromiso.'
    reason: theological_note
  - marker: c
    text: Lit. ‘¿quién es el que daría la mano conmigo?’, un modismo para entrar en un compromiso de fianza.
    reason: cultural_note
lexical_decisions:
- source_word: שִׂימָה
  english_pob_choice: Lay down
  chosen_spanish: Pon
  alternatives_spanish:
  - Coloca
  - Establece
  - Pon por delante
  lexicon: WLC/HALOT
  rationale: El imperativo de שׂים aquí pide una acción concreta y directa. En español, 'pon' comunica mejor la súplica urgente y el tono coloquial-digno del hebreo que una opción más pesada como 'establece'.
- source_word: נָּא
  english_pob_choice: please
  chosen_spanish: te ruego
  alternatives_spanish:
  - por favor
  - ahora te ruego
  lexicon: HALOT
  rationale: La partícula de ruego se expresa de forma natural en español con 'te ruego', que conserva el matiz de súplica respetuosa mejor que un simple 'por favor' en este registro poético.
- source_word: עָרְבֵנִי
  english_pob_choice: a pledge for me
  chosen_spanish: un fiador
  alternatives_spanish:
  - una prenda
  - una garantía
  - sé fiador de mí
  lexicon: HALOT
  rationale: עָרַב pertenece al campo legal de salir garante, ofrecer seguridad o fianza. 'Fiador' conserva esa fuerza jurídica en español; el sintagma completo 'sé fiador de mí' sería más explicativo pero menos fluido aquí.
- source_word: עִמָּךְ
  english_pob_choice: with yourself
  chosen_spanish: contigo
  alternatives_spanish:
  - conmigo
  - con tu persona
  - contigo mismo
  lexicon: HALOT
  rationale: El hebreo puede reflejar una relación directa entre Dios y el compromiso pedido, pero en español 'contigo' suena más natural y no fuerza una reflexividad que no está explícita en la forma pronominal del verso.
- source_word: מִי הוּא
  english_pob_choice: who else is there
  chosen_spanish: ¿quién otro hay
  alternatives_spanish:
  - ¿quién es él?
  - ¿quién hay?
  - ¿quién más hay?
  lexicon: HALOT
  rationale: La pregunta retórica expresa la imposibilidad de otro garante. '¿Quién otro hay?' reproduce bien ese golpe idiomático sin añadir demasiado a la línea.
- source_word: לְיָדִי
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - para mi mano
  - a mi mano
  - junto a mí
  lexicon: HALOT
  rationale: Literalmente alude a la 'mano' en el acto de entrar en un acuerdo, pero en español el valor idiomático se comunica mejor con 'conmigo'. La referencia concreta a la mano queda reforzada en la frase siguiente.
- source_word: יִתָּקֵעַ
  english_pob_choice: would strike hands
  chosen_spanish: dé la mano
  alternatives_spanish:
  - choque las manos
  - dé fianza
  - estreche la mano
  lexicon: HALOT
  rationale: El verbo designa el gesto de chocar o dar la mano como señal de garantía. 'Dé la mano' conserva la imagen corporal y su valor pactal sin sonar excesivamente moderno o ajeno al contexto jurídico.
theological_decisions:
- issue: Job pide a Dios como garante en un lenguaje legal de fianza
  english_pob_reading: Job asks God to provide the pledge/security himself, emphasizing that no other guarantor exists.
  chosen_spanish_reading: Job pide a Dios que sea su fiador, subrayando que no hay otro garante posible.
  alternative_spanish_readings:
  - Job pide una garantía genérica sin implicar que Dios mismo actúe como garante.
  - Job usa solo una metáfora legal sin carga relacional especial.
  rationale: El hebreo combina la petición de un 'fiador' con la mención directa de la contraparte, lo que mantiene la tensión de que Job se dirige a Dios para que asuma ese papel. La traducción conserva esa apertura interpretativa sin resolverla de antemano.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Coincide con el pasaje hebreo y con el audit trail inglés en el reconocimiento del lenguaje legal de fianza, la súplica directa y el modismo de ‘dar la mano’. No se requieren revisiones adicionales respecto al último pase auditado.
  spanish_consistency_notes:
  - Se mantiene 'fiador' para preservar el campo semántico legal de ערב.
  - Se evita 'SEÑOR' porque el texto hebreo aquí no contiene el nombre divino, sino una apelación directa en segunda persona.
  - Se conserva la ambigüedad relacional de עִמָּךְ con 'contigo', dejando que la nota aclare la posible implicación teológica.
  - '''Dar la mano'' reproduce en español la imagen idiomática del gesto pactal mejor que una paráfrasis abstracta.'
