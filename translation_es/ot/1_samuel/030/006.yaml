  to: Y David estuvo[a] muy angustiado, porque el pueblo hablaba de apedrearlo, pues el alma de todo el pueblo estaba amarga, cada hombre a causa de sus hijos y de sus hijas. Pero David se fortaleció en Yahvé su Dios.
  rationale: Se corrige la nota para que refleje la alternativa léxica documentada entre 'alma' y 'espíritu', y se suaviza el orden de palabras en la cláusula de נֶפֶשׁ para lograr un español más natural sin perder el hebraísmo ni el sentido del original.
