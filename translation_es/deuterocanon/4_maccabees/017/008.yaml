  verdict: revise
  source_alignment_summary: 'La base griega dice que habría sido apropiado inscribir incluso estas palabras en el mismo monumento/epitafio, dichas como memorial dirigido a los del ἔθνος. El borrador español capta bien ἐπιτάφιον, ἀναγράψαι, καὶ ταῦτα, εἰς μνείαν y λεγόμενα, pero se aparta en dos puntos: «habría sido digno» suena menos idiomático y menos preciso que el valor de conveniencia/apropiación de ἄξιον ἦν, y «para los del pueblo» debilita tanto el matiz nacional de ἔθνος como el ajuste del inglés auditado «to those of the nation».'
  spanish_quality_summary: El español es generalmente claro y digno, con buena legibilidad. Sin embargo, «habría sido digno de inscribir» suena algo forzado en español moderno; «habría sido apropiado» o «habría sido justo/propio» fluye mejor. Además, «los del pueblo» resulta algo coloquial e impreciso para un registro bíblico-literario; «los de la nación» preserva mejor el tono y la referencia colectiva del original.
  glossary_alignment: 'No hay términos del glosario principal especialmente activados aquí. La decisión sobre ἔθνος debe respetar la racionalidad documentada del POB: preferir «nación» sobre «pueblo» en este versículo, porque el audit trail ya fijó «those of the nation» y el griego no justifica bajar a una formulación más coloquial o menos específica.'
  issues:
  - severity: medium
    issue: «habría sido digno» para ἄξιον ἦν
    rationale: Aunque posible, no es la mejor equivalencia en español para una expresión impersonal de conveniencia o adecuación; suena más valorativa que idiomática. «Habría sido apropiado» refleja mejor el sentido y el rationale inglés.
  - severity: medium
    issue: «para los del pueblo» para τοῖς ἀπὸ τοῦ ἔθνους
    rationale: «Pueblo» reduce el matiz nacional/colectivo de ἔθνος y «los del pueblo» suena menos natural y más coloquial. El audit trail inglés estableció «to those of the nation», que en español se preserva mejor como «a los de la nación».
  - severity: low
    issue: Preposición con «memorial»
    rationale: 'Dado el ajuste ya documentado en inglés de «for» a «to», conviene reflejar también en español un matiz de destinatario: «como memorial a los de la nación», no «para los del pueblo».'
  revised_spanish_text: 'Porque ciertamente habría sido apropiado inscribir aun estas palabras en su misma lápida[a], dichas como memorial a los de la nación:'
