translation:
  language: es
  text: El filisteo avanzaba mañana y tarde, y tomaba su puesto durante cuarenta días[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se acercaba… y se apostaba durante cuarenta días».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגַּשׁ
  english_pob_choice: came forward
  chosen_spanish: avanzaba
  alternatives_spanish:
  - se acercaba
  - venía adelante
  lexicon: HALOT
  rationale: נגשׁ expresa acercarse o avanzar hacia alguien. En este contexto narrativo y militar, «avanzaba» comunica la acción repetida de acercarse al frente sin forzar una construcción demasiado literal o artificial en español.
- source_word: הַפְּלִשְׁתִּי
  english_pob_choice: The Philistine
  chosen_spanish: El filisteo
  alternatives_spanish:
  - El filisteo campeón
  lexicon: HALOT
  rationale: El hebreo dice simplemente «el filisteo». Mantenerlo así evita añadir un calificativo no presente en este versículo, aunque el referente sea Goliat por el contexto inmediato.
- source_word: הַשְׁכֵּם
  english_pob_choice: morning
  chosen_spanish: mañana
  alternatives_spanish:
  - por la mañana
  - temprano
  lexicon: HALOT
  rationale: La forma adverbial expresa tiempo temprano del día. «Mañana» funciona de modo natural en la pareja fija «mañana y tarde» y conserva la repetición diaria del texto.
- source_word: וְהַעֲרֵב
  english_pob_choice: and evening
  chosen_spanish: y tarde
  alternatives_spanish:
  - y por la tarde
  - y en la tarde
  lexicon: HALOT
  rationale: La referencia es al momento del atardecer o tarde del día. En español, «mañana y tarde» es una pareja idiomática clara y fiel al ritmo diario del hebreo.
- source_word: וַיִּתְיַצֵּב
  english_pob_choice: and took his stand
  chosen_spanish: se plantaba
  alternatives_spanish:
  - tomaba su puesto
  - se apostaba
  lexicon: HALOT
  rationale: El hitpael de יצב puede expresar colocarse o ponerse de pie de manera firme. «Se plantaba» conserva la idea de tomar posición con firmeza y suena natural en español narrativo.
- source_word: אַרְבָּעִים יוֹם
  english_pob_choice: for forty days
  chosen_spanish: por cuarenta días
  alternatives_spanish:
  - durante cuarenta días
  - cuarenta días
  lexicon: HALOT
  rationale: La expresión señala duración. En español, «por cuarenta días» expresa con claridad el lapso durante el cual se repite la acción.
translation_notes:
  revision_awareness: El texto inglés auditado no requirió revisión sustantiva; se mantuvo la equivalencia óptima del movimiento repetido del filisteo y la duración de cuarenta días.
  spanish_consistency_notes:
  - Se usa «filisteo» sin ampliación interpretativa, en línea con el hebreo.
  - Se preserva la repetición temporal con «mañana y tarde».
  - «Se plantaba» refleja la postura firme del verbo reflexivo sin convertirlo en una mera estática de «estaba».
  - La nota conserva una alternativa lexical válida sin sobretraducir.
