    reason: lexical_alternative
  - marker: b
    text: Literalmente, ‘de Egipto’. La frase se entiende de manera idiomática como ‘en Egipto’, porque la acción se sitúa allí.
    reason: lexical_alternative
  - marker: c
    text: O ‘te sobaban los pechos’. La expresión hebrea es sexualmente explícita y alude a un trato erótico.
    reason: lexical_alternative
