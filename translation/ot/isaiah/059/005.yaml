id: ISA.59.5
reference: Isaiah 59:5
source:
  edition: WLC
  text: בֵּיצֵ֤י צִפְעוֹנִי֙ בִּקֵּ֔עוּ וְ/קוּרֵ֥י עַכָּבִ֖ישׁ יֶאֱרֹ֑גוּ הָ/אֹכֵ֤ל מִ/בֵּֽיצֵי/הֶם֙ יָמ֔וּת וְ/הַ/זּוּרֶ֖ה תִּבָּקַ֥ע אֶפְעֶֽה׃
translation:
  text: They hatch viper's eggs and weave spider's webs[a]; whoever eats from their eggs dies[b], and what is crushed breaks open into a viper.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'adder's eggs' for 'viper's eggs'; both terms refer to a poisonous snake.
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally 'is split open'; the sense is that when one of their eggs is crushed, a venomous snake emerges.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּיצֵי צִפְעוֹנִי
  chosen: viper's eggs
  alternatives:
  - eggs of an adder
  - eggs of a venomous snake
  lexicon: HALOT
  rationale: Construct phrase meaning the eggs belonging to a poisonous snake. 'Viper' is clear modern English and preserves the image of danger better than the more archaic 'adder.'
- source_word: בִּקֵּעוּ
  chosen: they hatch
  alternatives:
  - they split open
  - they break open
  lexicon: HALOT
  rationale: The verb literally denotes splitting or breaking open, but with eggs in context the natural English equivalent is 'hatch.' This preserves the concrete imagery without awkwardness.
- source_word: קוּרֵי עַכָּבִישׁ
  chosen: spider's webs
  alternatives:
  - spider webs
  - spider's threads
  - cobwebs
  lexicon: HALOT
  rationale: The noun refers to woven threads/webbing of a spider. 'Spider's webs' best matches the image and the following verb 'weave.' 'Cobwebs' is too specific and potentially misleading.
- source_word: יֶאֱרֹגוּ
  chosen: weave
  alternatives:
  - spin
  lexicon: HALOT
  rationale: The verb commonly means weave. Although spiders 'spin' in idiomatic English, 'weave' more closely reflects the Hebrew and keeps the parallelism with human wrongdoing imagery.
- source_word: הָאֹכֵל מִבֵּיצֵיהֶם
  chosen: whoever eats from their eggs
  alternatives:
  - he who eats their eggs
  - the one eating from their eggs
  lexicon: HALOT
  rationale: The participle with article functions generically. 'Whoever' gives natural English for the generic singular while preserving the warning force. 'From' reflects the preposition מִן.
- source_word: יָמוּת
  chosen: dies
  alternatives:
  - will die
  lexicon: HALOT
  rationale: English present here conveys proverbial certainty in a vivid poetic context. Future would also be possible, but present better matches the gnomic force of the verse.
- source_word: וְהַזּוּרֶה
  chosen: what is crushed
  alternatives:
  - what is pressed
  - the crushed egg
  - what is broken
  lexicon: HALOT
  rationale: 'The underlying verb is difficult and has been understood as something like ''that which is crushed/pressed.'' This fits the immediate egg imagery: an egg handled in this way does not become harmless but yields danger. The relative-like ''what is crushed'' is natural in English.'
- source_word: תִּבָּקַע
  chosen: breaks open
  alternatives:
  - is split open
  - bursts open
  lexicon: HALOT
  rationale: The Niphal/Qal-like passive-reflexive sense is well represented by 'breaks open.' It echoes the earlier egg imagery and keeps the action vivid.
- source_word: אֶפְעֶה
  chosen: a viper
  alternatives:
  - an adder
  - a venomous snake
  lexicon: HALOT
  rationale: A poisonous snake is intended; 'viper' is the clearest modern equivalent and pairs well with the earlier צפעוני. Using the same English family of terms preserves the poetic coherence of the verse.
