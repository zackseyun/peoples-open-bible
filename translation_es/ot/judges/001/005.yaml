translation:
  language: es
  text: Encontraron a Adoni-bezek en Bezek[a], y pelearon contra él y abatieron a los cananeos y a los perizitas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Adoni-bezek también podría entenderse etimológicamente como «señor de Bezek», pero aquí se conserva como nombre personal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּמְצְאוּ
  english_pob_choice: they found
  chosen_spanish: Encontraron
  alternatives_spanish:
  - Hallaron
  - Encontraron con
  lexicon: HALOT
  rationale: מצא en narrativa expresa normalmente 'encontrar' o 'hallar'. 'Encontraron' es natural en español y mantiene la secuencia narrativa breve del hebreo.
- source_word: אֲדֹנִי בֶזֶק
  english_pob_choice: Adoni-bezek
  chosen_spanish: Adoni-bezec
  alternatives_spanish:
  - Señor de Bezec
  - Adoní-bezec
  lexicon: HALOT
  rationale: La POB inglesa lo trata como nombre propio en el contexto, aunque admite la lectura etimológica 'lord of Bezek'. En español se conserva como nombre transliterado, ajustando la grafía final a 'Bezec' para reflejar el topónimo del versículo y evitar una traducción interpretativa no requerida por el contexto.
- source_word: בְּבֶזֶק
  english_pob_choice: in Bezek
  chosen_spanish: en Bezec
  alternatives_spanish:
  - en Bezek
  - en la ciudad de Bezec
  lexicon: HALOT
  rationale: La preposición ב con nombre de lugar se traduce de forma directa por 'en'. 'Bezec' mantiene la transliteración del topónimo con ortografía española más natural.
- source_word: וַיִּלָּחֲמוּ בּוֹ
  english_pob_choice: they fought against him
  chosen_spanish: pelearon contra él
  alternatives_spanish:
  - combatieron contra él
  - lucharon contra él
  lexicon: HALOT
  rationale: El valor adversarial del verbo con ב se expresa bien en español con 'pelearon contra él'. Es claro, natural y conserva el sentido de hostilidad militar sin introducir matices ajenos.
- source_word: וַיַּכּוּ
  english_pob_choice: struck down
  chosen_spanish: derrotaron
  alternatives_spanish:
  - hirieron
  - golpearon
  - abatieron
  lexicon: HALOT
  rationale: נכה puede abarcar 'golpear', 'herir' o 'derrotar' en contexto militar. La POB inglesa escogió 'struck down' para no sobreespecificar; en español, 'derrotaron' comunica el resultado militar de manera fluida sin afirmar más de lo que exige el hebreo.
- source_word: הַכְּנַעֲנִי
  english_pob_choice: the Canaanites
  chosen_spanish: los cananeos
  alternatives_spanish:
  - el cananeo
  - los cananeos
  lexicon: HALOT
  rationale: Aunque el hebreo es singular morfológico, funciona de modo colectivo. En español, el plural 'los cananeos' comunica naturalmente el grupo étnico vencido en batalla.
- source_word: הַפְּרִזִּי
  english_pob_choice: the Perizzites
  chosen_spanish: los perizitas
  alternatives_spanish:
  - el perizita
  - los perizitas
  lexicon: HALOT
  rationale: Como con 'Canaanite', el etnónimo se usa colectivamente. 'Perizitas' es la forma plural natural en español para el grupo humano, sin perder la referencia étnica.
theological_decisions:
- issue: Tratamiento de Adoni-bezec como nombre propio vs. traducción etimológica
  english_pob_reading: Adoni-bezek could be understood etymologically as 'lord of Bezek,' but here it is rendered as a personal name.
  chosen_spanish_reading: 'Se conserva como nombre propio transliterado: Adoni-bezec.'
  alternative_spanish_readings:
  - Señor de Bezec
  - mi señor de Bezec
  rationale: 'La decisión sigue la lectura contextual de la POB inglesa: el texto narrativo presenta la expresión como designación personal. Traducir etimológicamente impondría una interpretación no obligatoria y podría borrar la tensión entre nombre propio y título.'
  doctrine_reference: Onomástica bíblica / principio de no sobreinterpretación lexical
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; el acuerdo de revisión fue alto y el texto quedó sin modificaciones, así que la versión española sigue de cerca esa lectura estable.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando aparece el tetragrámaton; este versículo no lo contiene.
  - Se usó plural colectivo ('cananeos', 'perizitas') para reflejar el valor grupal de los etnónimos hebreos.
  - Se evitó 'Cristo', 'SEÑOR' y otras fórmulas no pertinentes al versículo.
  - La transliteración 'Bezec' se uniforma con la forma de lugar del propio versículo para claridad en español.
