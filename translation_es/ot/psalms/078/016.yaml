  glossary_alignment: 'No hay términos del glosario mayor en disputa en este versículo. Las decisiones léxicas principales son adecuadas: «sacó» para el hifil causativo, «corrientes» para נוֹזְלִים, «peña» para סלע, y «como ríos» para כַּנְּהָרוֹת. La alternativa de nota debe preservar la opción «aguas que fluyen» / «aguas corrientes» desde la roca.'
