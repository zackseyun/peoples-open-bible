translation:
  language: es
  text: Sus hijos y sus nietos con él[a], sus hijas y sus nietas, y toda su descendencia[b] los trajo consigo a Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'los hijos de sus hijos' y 'las hijas de sus hijos'.
    reason: lexical_alternative
  - marker: b
    text: O 'todos sus descendientes'; literalmente, 'toda su simiente'.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּנָיו
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus varones
  - sus hijos varones
  lexicon: HALOT
  rationale: En español, 'hijos' puede abarcar hijos varones cuando el contraste inmediato con 'hijas' ya especifica el sexo; aquí evita una repetición pesada y mantiene el valor específico del hebreo dentro de la pareja contrastiva.
- source_word: וּבְנֵי בָנָיו
  english_pob_choice: his grandsons
  chosen_spanish: sus nietos
  alternatives_spanish:
  - los hijos de sus hijos
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'los hijos de sus hijos'. 'Nietos' es el equivalente natural en español y conserva el sentido genealógico sin perder precisión.
- source_word: אִתּוֹ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto con él
  lexicon: HALOT
  rationale: Es la correspondencia normal de la preposición con sufijo pronominal; en español 'con él' suena natural y exacto.
- source_word: בְּנֹתָיו
  english_pob_choice: his daughters
  chosen_spanish: sus hijas
  alternatives_spanish:
  - sus hijas mujeres
  lexicon: HALOT
  rationale: Se trata de descendencia femenina directa; 'hijas' es la forma clara y estándar en español.
- source_word: וּבְנוֹת בָּנָיו
  english_pob_choice: his granddaughters
  chosen_spanish: sus nietas
  alternatives_spanish:
  - las hijas de sus hijos
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'las hijas de sus hijos'. 'Nietas' expresa con naturalidad esa relación en español.
- source_word: וְכָל זַרְעוֹ
  english_pob_choice: all his offspring
  chosen_spanish: toda su descendencia
  alternatives_spanish:
  - toda su simiente
  - todo su linaje
  lexicon: HALOT
  rationale: זֶרַע puede significar 'simiente', 'descendencia' o 'posteridad'. En este contexto familiar, 'descendencia' es claro y digno; evita el arcaísmo de 'simiente' sin perder el alcance colectivo.
- source_word: הֵבִיא
  english_pob_choice: he brought
  chosen_spanish: la llevó
  alternatives_spanish:
  - la trajo
  - la llevó consigo
  lexicon: HALOT
  rationale: El causativo de בוא expresa 'traer/llevar'. En español, referido a una colectividad femenina y masculina resumida por 'descendencia', 'la llevó' funciona como referencia colectiva implícita y mantiene el movimiento hacia Egipto.
- source_word: מִצְרָיְמָה
  english_pob_choice: to Egypt
  chosen_spanish: a Egipto
  alternatives_spanish:
  - hasta Egipto
  - hacia Egipto
  lexicon: HALOT
  rationale: El terminativo señala movimiento hacia Egipto; en español, 'a Egipto' es idiomático y fiel.
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó el guion largo para hacer la frase final más fluida; aquí se refleja con una cláusula simple en español sin alterar la secuencia del hebreo. También se mantuvo la distinción de descendencia masculina y femenina, y se optó por equivalentes naturales ('nietos', 'nietas', 'descendencia') donde el hebreo es genealógicamente literal.
  spanish_consistency_notes:
  - Se conservó el paralelismo de hijos/hijas y nietos/nietas para reflejar la estructura hebrea.
  - '''Descendencia'' se usó para זֶרַע por claridad y registro bíblico contemporáneo.'
  - Los marcadores [a] y [b] aparecen exactamente en el texto como anclas de notas léxicas.
