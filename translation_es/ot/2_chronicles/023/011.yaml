translation:
  language: es
  text: 'Entonces sacaron al hijo del rey, pusieron sobre él la corona y el testimonio[a], lo hicieron rey y lo ungieron; y Joyadá y sus hijos dijeron: «¡Viva el rey!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la ley» o «el documento del pacto» para «el testimonio». El término hebreo probablemente alude al testimonio escrito vinculado con el gobierno del rey.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹצִיאוּ
  english_pob_choice: they brought out
  chosen_spanish: sacaron
  alternatives_spanish:
  - trajeron afuera
  - sacaron fuera
  - llevaron fuera
  lexicon: HALOT
  rationale: El verbo causativo de יצא pide una acción de hacer salir; en español, en este contexto ceremonial, «sacaron» expresa bien la salida/presentación sin sonar forzado.
- source_word: בֶּן־הַמֶּלֶךְ
  english_pob_choice: the king’s son
  chosen_spanish: el hijo del rey
  alternatives_spanish:
  - el hijo del monarca
  - el hijo real
  lexicon: HALOT
  rationale: La construcción hebrea se traduce de manera natural como filiación dinástica. «El hijo del rey» conserva la identificación y evita una paráfrasis más libre.
- source_word: הַנֵּזֶר
  english_pob_choice: the crown
  chosen_spanish: la corona
  alternatives_spanish:
  - el diadema
  - el ornamento real
  - la diadema
  lexicon: HALOT
  rationale: En este contexto de entronización, נזר señala el distintivo real colocado sobre él. «Corona» es la equivalencia más clara y publicable en español, aunque «diadema» también sería posible.
- source_word: הָעֵדוּת
  english_pob_choice: the testimony
  chosen_spanish: el testimonio
  alternatives_spanish:
  - la ley
  - el documento del pacto
  - el pacto escrito
  lexicon: HALOT
  rationale: Se conserva el término lexicalmente más cercano al hebreo y al audit trail inglés. En español, «testimonio» mantiene la tensión entre una lectura jurídica y una lectura pactual/documental sin especificarla de más.
- source_word: וַיַּמְלִיכוּ אֹתוֹ
  english_pob_choice: made him king
  chosen_spanish: lo proclamaron rey
  alternatives_spanish:
  - lo hicieron rey
  - lo hicieron monarca
  - lo coronaron rey
  lexicon: HALOT
  rationale: El hiphil de מלך expresa causarlo a reinar. En español, «lo proclamaron rey» comunica la investidura pública sin duplicar innecesariamente la acción de poner la corona.
- source_word: וַיִּמְשָׁחֻהוּ
  english_pob_choice: anointed him
  chosen_spanish: lo ungieron
  alternatives_spanish:
  - lo consagraron con aceite
  - lo echaron aceite sobre él
  lexicon: HALOT
  rationale: «Ungieron» es la forma estándar y fiel para משׁח en contextos reales y cultuales, preservando su fuerza teológica.
- source_word: יְהוֹיָדָע וּבָנָיו
  english_pob_choice: Jehoiada and his sons
  chosen_spanish: Joyadá y sus hijos
  alternatives_spanish:
  - Jehoiadá y sus hijos
  - Joiadá y sus hijos
  lexicon: HALOT
  rationale: Se usa la forma española habitual del nombre como aparece de manera inteligible en castellano bíblico, manteniendo la referencia al sumo sacerdote y a su grupo familiar.
- source_word: יְחִי הַמֶּלֶךְ
  english_pob_choice: Long live the king!
  chosen_spanish: ¡Viva el rey!
  alternatives_spanish:
  - ¡Que viva el rey!
  - ¡Larga vida al rey!
  lexicon: HALOT
  rationale: La aclamación jussiva se expresa de modo natural en español con «¡Viva el rey!», que conserva el sentido de deseo/proclamación pública.
theological_decisions:
- issue: Sentido de הָעֵדוּת en la ceremonia de coronación
  english_pob_reading: '''the testimony'' is retained in the main text, with the note that it may mean the law or covenant document associated with the king’s rule.'
  chosen_spanish_reading: «el testimonio» en el texto principal, con nota de posibles sentidos como «la ley» o «el documento del pacto»
  alternative_spanish_readings:
  - la ley
  - el documento del pacto
  - el decreto
  rationale: La decisión conserva la tensión lexical y pactual del hebreo sin cerrarla prematuramente en una sola explicación. En español, «testimonio» sigue siendo suficientemente literal y permite la misma amplitud interpretativa que el original y el audit trail inglés.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Relación entre la unción y la proclamación real
  english_pob_reading: 'The English revision clarifies sequence: they made him king and anointed him; and Jehoiada and his sons said...'
  chosen_spanish_reading: 'Se mantiene la secuencia con punto y coma: «lo proclamaron rey y lo ungieron; y Joyadá y sus hijos dijeron...»'
  alternative_spanish_readings:
  - lo proclamaron rey, lo ungieron y Joyadá y sus hijos dijeron...
  - lo proclamaron rey y lo ungieron. Joyadá y sus hijos dijeron...
  rationale: El punto y coma refleja mejor la coordinación hebrea y evita que la aclamación parezca parte del acto de unción. Además, preserva la clarificación revisada del texto inglés auditado.
  doctrine_reference: Translation philosophy §§1, 4
translation_notes:
  revision_awareness: 'La redacción sigue la revisión auditada del texto inglés: se conserva la secuencia con punto y coma antes de la voz de Joyadá y sus hijos, para reflejar con mayor claridad la coordinación del hebreo y la separación entre la unción y la aclamación.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «testimonio» para הָעֵדוּת siguiendo el texto inglés auditado, con nota para sus posibles equivalentes.
  - Se evita «Cristo» porque no corresponde a este contexto; «ungieron» conserva el valor de משׁח.
  - Se elige «lo proclamaron rey» como equivalente funcional de וַיַּמְלִיכוּ, sin añadir un sentido de coronación ya expresado por «la corona».
