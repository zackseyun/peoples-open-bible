translation:
  language: es
  text: Los extranjeros desfallecen y salen temblando[a][b][c] de sus fortalezas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se marchitan». El verbo hebreo puede denotar más literalmente marchitarse o desvanecerse.
    reason: lexical_alternative
  - marker: b
    text: El verbo hebreo es difícil aquí; también puede entenderse como «salen cohibidos», «salen cojeando» o, más literalmente, «se ciñen».
    reason: lexical_alternative
  - marker: c
    text: O «de sus fortificaciones» o, menos probable, «de sus prisiones/encierros».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי נֵכָר
  english_pob_choice: Foreigners
  chosen_spanish: Los hijos de extraños
  alternatives_spanish:
  - extranjeros
  - hijos de extranjeros
  - gente extranjera
  lexicon: HALOT
  rationale: La expresión constructa hebrea significa literalmente 'hijos de extrañeza/extranjería', un modismo para personas extranjeras. 'Los hijos de extraños' conserva el color idiomático del hebreo y evita borrar la imagen, aunque 'extranjeros' también sería natural en español.
- source_word: יִבֹּלוּ
  english_pob_choice: lose heart
  chosen_spanish: desfallecen
  alternatives_spanish:
  - pierden el ánimo
  - se marchitan
  - se apagan
  lexicon: HALOT
  rationale: El verbo נבל puede significar 'marchitarse, desvanecerse'. En este contexto poético de derrota militar, la imagen apunta a decaer o perder vigor/valor. 'Desfallecen' mantiene esa idea de debilitamiento sin convertirla en una paráfrasis psicológica demasiado libre.
- source_word: וְיַחְגְּרוּ
  english_pob_choice: come trembling
  chosen_spanish: salen temblando
  alternatives_spanish:
  - salen encogidos
  - salen cohibidos
  - salen cojeando
  - se ciñen
  lexicon: HALOT
  rationale: El verbo חגר normalmente significa 'ceñir/gird', pero aquí su sentido es difícil y la tradición de traducción lo entiende idiomáticamente en paralelo con el Salmo 18:45. 'Salen temblando' refleja el resultado visible y conserva la lectura interpretativa del POB en inglés, sin forzar el hebreo a un valor literal inadecuado en español.
- source_word: מִמִּסְגְּרוֹתָם
  english_pob_choice: out of their strongholds
  chosen_spanish: de sus fortalezas
  alternatives_spanish:
  - de sus fortificaciones
  - de sus refugios
  - de sus prisiones
  lexicon: HALOT
  rationale: מִסְגְּרוֹת puede referirse a lugares de encierro o cierre, pero en este cántico de victoria el sentido militar de 'fortalezas/fortificaciones' es el más probable. 'Fortalezas' es claro y natural en español, y conserva la imagen de enemigos saliendo de posiciones defensivas.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios y que el acuerdo con la fuente es alto; se conserva la lectura optimizada del POB inglés, con alternativas léxicas explícitas donde el hebreo es semánticamente difícil.
  spanish_consistency_notes:
  - Se usa un registro bíblico moderno y digno, sin arcaísmos innecesarios.
  - Se mantiene la tensión entre la imagen literal y el sentido idiomático en יִבֹּלוּ y וְיַחְגְּרוּ mediante la traducción principal y las notas.
  - Se eligió «fortalezas» para el campo militar del contexto, dejando abiertas las alternativas textuales en la nota.
  - No se introduce terminología eclesiástica no respaldada por la fuente.
