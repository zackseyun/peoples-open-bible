translation:
  language: es
  text: Todo el servicio de los hijos de los gersonitas será[a] bajo el mandato de Aarón y de sus hijos, en todas sus cargas y en todo su servicio; y ustedes les asignarán, como un deber[b], todas sus cargas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «según la palabra de Aarón y de sus hijos». El hebreo, literalmente, dice «sobre la boca de».'
    reason: lexical_alternative
  - marker: b
    text: 'También: «como una responsabilidad» o «como un encargo». El hebreo puede expresar una obligación asignada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל פִּי
  english_pob_choice: at the command of
  chosen_spanish: bajo el mandato de
  alternatives_spanish:
  - según la palabra de
  - por orden de
  - de acuerdo con la palabra de
  lexicon: HALOT
  rationale: El hebreo es un modismo literal, 'sobre la boca de', que en contexto administrativo expresa autoridad directiva. 'Bajo el mandato de' conserva esa fuerza de autoridad en español natural sin convertirlo en una paráfrasis excesiva.
- source_word: תִּהְיֶה
  english_pob_choice: shall be
  chosen_spanish: estará
  alternatives_spanish:
  - será
  - ha de estar
  lexicon: HALOT
  rationale: La forma copulativa expresa aquí una disposición normativa. 'Estará' mantiene el tono prescriptivo con buena naturalidad en español.
- source_word: עֲבֹדַת
  english_pob_choice: service
  chosen_spanish: servicio
  alternatives_spanish:
  - trabajo
  - labor
  - ministerio
  lexicon: HALOT
  rationale: En contexto levítico/tabernacular, עֲבֹדָה combina labor asignada y servicio cultual. 'Servicio' preserva esa amplitud mejor que una opción demasiado técnica o demasiado general.
- source_word: בְּנֵי הַגֵּרְשֻׁנִּי
  english_pob_choice: the sons of the Gershonites
  chosen_spanish: los hijos de los gersonitas
  alternatives_spanish:
  - los gersonitas
  - los hijos de Gersón
  lexicon: HALOT
  rationale: Se conserva la filiación/clan del hebreo. 'Hijos de los gersonitas' refleja la forma del original y sigue siendo inteligible en español eclesial.
- source_word: לְכָל מַשָּׂאָם
  english_pob_choice: for all their loads
  chosen_spanish: en todas sus cargas
  alternatives_spanish:
  - para todas sus cargas
  - en todos sus transportes
  - en todos sus fardos
  lexicon: HALOT
  rationale: מַשָּׂא aquí refiere a lo que cargan y transportan. 'Cargas' es concreto y adecuado; 'fardos' sonaría menos natural y 'bultos' perdería el matiz de carga impuesta.
- source_word: וּלְכֹל עֲבֹדָתָם
  english_pob_choice: and in all their service
  chosen_spanish: y en todo su servicio
  alternatives_spanish:
  - y en toda su labor
  - y en todo su trabajo
  - y en todo su ministerio
  lexicon: HALOT
  rationale: Se mantiene la misma raíz semántica que en la primera mitad del versículo para conservar la correspondencia del hebreo entre 'servicio' y 'servicio'.
- source_word: וּפְקַדְתֶּם עֲלֵיהֶם
  english_pob_choice: you shall assign to them
  chosen_spanish: ustedes les asignarán
  alternatives_spanish:
  - ustedes los pondrán a cargo
  - ustedes los encargarán
  - ustedes les encomendarán
  lexicon: HALOT
  rationale: פָּקַד en esta construcción puede significar designar, encomendar o asignar responsabilidad. 'Asignarán' refleja bien el sentido administrativo que el contexto requiere.
- source_word: בְּמִשְׁמֶרֶת
  english_pob_choice: as a duty
  chosen_spanish: como un encargo
  alternatives_spanish:
  - como una responsabilidad
  - como una carga
  - como un deber
  lexicon: HALOT
  rationale: מִשְׁמֶרֶת puede denotar una obligación o responsabilidad asignada. 'Encargo' comunica bien la idea de tarea oficialmente confiada; se deja constancia de que también podría leerse como 'responsabilidad'.
- source_word: אֵת כָּל מַשָּׂאָם
  english_pob_choice: all their loads
  chosen_spanish: todas sus cargas
  alternatives_spanish:
  - todas sus cargas de transporte
  - todo lo que deben cargar
  - todas sus cargas
  lexicon: HALOT
  rationale: Se repite 'cargas' para reflejar la repetición enfática del hebreo y la carga concreta del traslado de los objetos sagrados.
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión final del POB inglés, que sustituyó una construcción más general por «in all their loads and in all their service» para reflejar mejor la sintaxis hebrea. En español se reprodujo esa relación con «en todas sus cargas y en todo su servicio», manteniendo el paralelismo y la repetición de «cargas».
  spanish_consistency_notes:
  - Se usó «Yahvé» por defecto para el Tetragrámaton, pero este versículo no lo contiene.
  - Se mantuvo «gersonitas» con minúscula conforme al uso español común para grupos/clanes dentro de un contexto bíblico.
  - Se prefirió «servicio» antes que «ministerio» para no introducir un registro eclesiástico posterior al hebreo.
  - La repetición de «cargas» en ambas mitades del versículo preserva el énfasis del hebreo y del POB inglés.
