  to: '¿Es este el ayuno que yo escojo: un día para que una persona se humille?[a] ¿Es para inclinar su cabeza como un junco,[b] y para extender cilicio y ceniza? ¿Llamarás a esto ayuno, y un día aceptable a Yahvé?'
  rationale: Se corrige el tiempo verbal de 'escojo' para ajustarlo al hebreo y al audit trail POB; se reubican y corrigen las notas para que reflejen las alternativas documentadas ('afligirse' y 'junco/caña/carrizo'); y se mejora la última cláusula con 'un día aceptable a Yahvé' para mayor fidelidad y fluidez en español.
