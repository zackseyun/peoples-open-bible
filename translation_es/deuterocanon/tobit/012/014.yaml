translation:
  language: es
  text: Y ahora Dios me ha enviado para sanarte y a Sara[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a Sara, tu nuera». El griego νύμφη puede significar «novia/esposa joven» o «nuera». Como Tobit es el destinatario, «tu nuera» es una posibilidad léxica clara; la referencia también puede apuntar al estado nupcial reciente de Sara.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ νῦν
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Y ahora mismo
  - Y en este momento
  lexicon: LSJ
  rationale: La combinación temporal y conectiva se mantiene de forma directa y natural en español con «Y ahora», sin añadir matices no presentes en el griego.
- source_word: ἀπέστειλέν
  english_pob_choice: has sent
  chosen_spanish: ha enviado
  alternatives_spanish:
  - envió
  - ha mandado
  lexicon: LSJ
  rationale: El aoristo de ἀποστέλλω expresa una acción completada con relevancia presente; «ha enviado» comunica bien esa actualidad narrativa en español.
- source_word: ὁ θεός
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: LSJ
  rationale: Se conserva el sujeto divino de forma estándar y reverente en español, sin necesidad de articularlo más allá de lo natural.
- source_word: ἰάσασθαί
  english_pob_choice: to heal
  chosen_spanish: sanarte
  alternatives_spanish:
  - curarte
  - restaurarte
  lexicon: LSJ
  rationale: «Sanar» es la equivalencia más natural y amplia en español para ἰάομαι; incluye tanto la ceguera de Tobit como la aflicción ligada a Sara sin precisar de más.
- source_word: σε
  english_pob_choice: you
  chosen_spanish: a ti
  alternatives_spanish:
  - te
  lexicon: LSJ
  rationale: Se explicita el objeto directo para mayor claridad y ritmo en español. La forma enclítica «te» también sería válida, pero aquí «a ti» preserva el paralelismo con la mención siguiente.
- source_word: τὴν νύμφην σου
  english_pob_choice: your bride
  chosen_spanish: tu esposa
  alternatives_spanish:
  - tu nuera
  - tu novia
  lexicon: LSJ
  rationale: El griego νύμφη puede significar «novia/esposa joven» o «nuera». En este contexto, dirigido a Tobit y dentro de la escena matrimonial reciente, «tu esposa» comunica de manera clara la relación de Sara con Tobias sin forzar un calco ambiguo. Se conserva la tensión semántica en nota mediante la alternativa «nuera».
- source_word: Σάρραν
  english_pob_choice: Sarah
  chosen_spanish: Sara
  alternatives_spanish:
  - Sarra
  lexicon: LSJ
  rationale: Se adopta la forma usual en español bíblico, «Sara», como transliteración natural del nombre propio Σάρρα/Σάρραν.
theological_decisions:
- issue: Sentido de νύμφη aplicado a Sara en relación con Tobit
  english_pob_reading: your bride
  chosen_spanish_reading: tu esposa
  alternative_spanish_readings:
  - tu nuera
  rationale: El término griego permite una ambigüedad real entre estado marital y parentesco por afinidad. En español, «tu esposa» es la opción más clara para el lector general, mientras que «tu nuera» conserva la posibilidad lexical que el texto admite y la relación con Tobit como destinatario.
  doctrine_reference: DOCTRINE.md §3 Preservar la tensión teológica y lexical; §5 Consistencia terminológica, salvo excepción documentada.
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del POB inglés, que ajustó el orden a «Sarah your bride» para reflejar mejor la aposición griega. En español, se optó por una solución equivalente y natural: «Sara, tu esposa», manteniendo la relación sintáctica sin calcar el orden inglés.'
  spanish_consistency_notes:
  - Se mantuvo «Dios» para ὁ θεός, conforme al estándar del proyecto.
  - Se prefirió «Sara» frente a «Sarra» por uso bíblico común en español, sin perder la referencia al mismo nombre griego.
  - La ambigüedad de νύμφη se conserva con nota, en lugar de resolverla por completo en el texto principal.
