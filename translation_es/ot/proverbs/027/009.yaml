translation:
  language: es
  text: El aceite y el incienso alegran el corazón[a], y la dulzura de un amigo proviene del consejo del alma.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «y la dulzura de un amigo es mejor que el propio consejo»; la segunda línea hebrea es muy compacta y admite más de una lectura.
    reason: alternative_reading
lexical_decisions:
- source_word: שֶׁמֶן
  english_pob_choice: oil
  chosen_spanish: aceite
  alternatives_spanish:
  - óleo
  - perfume
  - ungüento
  lexicon: HALOT
  rationale: «שֶׁמֶן» designa aceite en sentido amplio, a veces perfumado o usado para ungir. «Aceite» es la equivalencia más directa y natural en español para conservar la imagen proverbial junto con el incienso.
- source_word: קְטֹרֶת
  english_pob_choice: incense
  chosen_spanish: incienso
  alternatives_spanish:
  - perfume
  - ofrenda aromática
  lexicon: HALOT
  rationale: El término se refiere al humo aromático o mezcla perfumada quemada como incienso. «Incienso» preserva mejor la imagen concreta y el paralelismo con el aceite.
- source_word: יְשַׂמַּח לֵב
  english_pob_choice: make the heart glad
  chosen_spanish: alegran el corazón
  alternatives_spanish:
  - hacen alegrar el corazón
  - regocijan el corazón
  lexicon: HALOT
  rationale: El verbo causativo expresa hacer que haya gozo. En español, «alegran el corazón» suena natural y conserva la metáfora del corazón como sede de la vida interior.
- source_word: מֶתֶק
  english_pob_choice: sweetness
  chosen_spanish: dulzura
  alternatives_spanish:
  - suavidad
  - lo agradable
  lexicon: HALOT
  rationale: «מֶתֶק» denota dulzura o agrado sensible. «Dulzura» mantiene la metáfora gustativa que acompaña al aceite y al incienso.
- source_word: רֵעֵהוּ
  english_pob_choice: of a friend
  chosen_spanish: de un amigo
  alternatives_spanish:
  - de su amigo
  - de un compañero
  lexicon: HALOT
  rationale: El sustantivo significa amigo o compañero con sufijo de tercera persona. En español proverbial, generalizar a «un amigo» comunica bien el valor sentencioso sin forzar la posesión.
- source_word: מֵעֲצַת
  english_pob_choice: comes from counsel
  chosen_spanish: proviene del consejo
  alternatives_spanish:
  - nace del consejo
  - viene del consejo
  lexicon: HALOT
  rationale: La preposición מִן se entiende aquí como fuente o procedencia. «Proviene del consejo» expresa con claridad que la dulzura de la amistad brota de un consejo dado como fuente.
- source_word: נָפֶשׁ
  english_pob_choice: the soul
  chosen_spanish: el alma
  alternatives_spanish:
  - la vida
  - el ser interior
  lexicon: HALOT
  rationale: «נָפֶשׁ» puede significar alma, vida o ser interior. Dado que la revisión inglesa optó por «the soul», «el alma» preserva el matiz antropológico sin expandirlo interpretativamente.
translation_notes:
  revision_awareness: La versión inglesa revisada sustituyó una paráfrasis interpretativa por «the counsel of the soul». La redacción española sigue esa revisión con «el consejo del alma», evitando expandir el sentido a «consejo sincero» o expresiones similares. También se mantuvo el paralelismo de la primera línea con «aceite e incienso».
  spanish_consistency_notes:
  - Se usa «corazón» para לֵב conforme al uso bíblico habitual en español, sin psicologizarlo.
  - Se evita «SEÑOR» o sustitutos reverenciales porque el versículo no contiene el nombre divino.
  - «Dulzura» conserva el valor sensorial de מֶתֶק y deja abierta la lectura proverbial alternativa indicada en nota.
