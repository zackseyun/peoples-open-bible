translation:
  language: es
  text: 'Ellos dicen[a]: «Vamos, exterminémoslos como nación, para que el nombre de Israel no sea recordado nunca más».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «borrémoslos de ser nación». El hebreo expresa la meta de que Israel deje de existir como pueblo.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָמְרוּ
  english_pob_choice: They say
  chosen_spanish: Ellos dicen
  alternatives_spanish:
  - Ellos han dicho
  - Ellos dijeron
  lexicon: HALOT
  rationale: El perfecto hebreo se vierte en presente para dar viveza al discurso poético y mantener la intención enemiga como una amenaza vigente. "Ellos dicen" conserva esa inmediatez sin forzar un pasado narrativo.
- source_word: לְכוּ
  english_pob_choice: Come
  chosen_spanish: Vengan
  alternatives_spanish:
  - Vamos
  - Vayan
  lexicon: HALOT
  rationale: Es una exhortación plural idiomática. En español, "Vengan" funciona naturalmente como inicio de una propuesta conspirativa y corresponde mejor al valor exhortativo que un sentido espacial literal.
- source_word: וְנַכְחִידֵם
  english_pob_choice: let us wipe them out
  chosen_spanish: exterminémoslos
  alternatives_spanish:
  - destruyámoslos
  - aniquilémoslos
  lexicon: HALOT
  rationale: El verbo expresa hacer desaparecer o eliminar por completo. "Exterminémoslos" transmite con fuerza el carácter totalizante y violento del hebreo, y en español conserva mejor ese alcance que opciones más suaves.
- source_word: מִגּוֹי
  english_pob_choice: as a nation
  chosen_spanish: como nación
  alternatives_spanish:
  - de ser nación
  - para que dejen de ser nación
  lexicon: HALOT
  rationale: La preposición con גוי expresa separación de la existencia nacional. "Como nación" reproduce de modo claro y conciso la meta de borrar a Israel como pueblo, sin añadir más de lo que el texto exige.
- source_word: וְלֹא יִזָּכֵר
  english_pob_choice: so that ... will be remembered no more
  chosen_spanish: para que ... no sea recordado más
  alternatives_spanish:
  - y ... no sea mencionado más
  - para que ... no vuelva a ser recordado
  lexicon: HALOT
  rationale: 'El niphal de זכר aquí es pasivo/reflexivo: "ser recordado" o "ser mencionado". Se usa la cláusula de propósito "para que" para hacer explícita la relación final que en hebreo está implícita en la construcción.'
- source_word: שֵׁם יִשְׂרָאֵל
  english_pob_choice: the name of Israel
  chosen_spanish: el nombre de Israel
  alternatives_spanish:
  - la fama de Israel
  - la memoria de Israel
  lexicon: HALOT
  rationale: La cadena constructa se traduce de forma directa para preservar el idiomatismo bíblico de "nombre" como identidad, reputación y memoria histórica. En este contexto, "el nombre de Israel" es la opción más fiel y digna.
- source_word: עוֹד
  english_pob_choice: no more
  chosen_spanish: más
  alternatives_spanish:
  - ya no
  - nunca más
  lexicon: HALOT
  rationale: 'En negación, עוֹד expresa continuación que cesa: "no ... más" es una solución española natural y fiel. Aquí se integra con la pasiva para producir "no sea recordado más".'
translation_notes:
  revision_awareness: 'Se mantuvo la lectura y el tono del audit trail inglés: presente histórico para אָמְרוּ, exhortación idiomática para לְכוּ, intensificación total para וְנַכְחִידֵם, y cláusula final de propósito para וְלֹא יִזָּכֵר. No se introdujeron cambios doctrinales ni se suavizó el sentido de eliminación colectiva.'
  spanish_consistency_notes:
  - Se preserva "Israel" sin adaptar el nombre propio.
  - Se evitó "SEÑOR" u otros reemplazos, ya que el versículo no contiene el tetragrámaton.
  - '"Ser recordado" mantiene la pasiva del hebreo y la clausula de finalidad explicita la relación semántica del original.'
