translation:
  language: es
  text: Y cuando los sacerdotes de Nanea[a] habían puesto eso[b] delante, y él había entrado con pocos hombres en el recinto del santuario, cerraron el templo en cuanto entró Antíoco[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Nanea también puede transliterarse «Nanaia».
    reason: lexical_alternative
  - marker: b
    text: El pronombre griego es inespecífico y probablemente se refiere a objetos mencionados previamente en el contexto narrativo.
    reason: cross_reference
  - marker: c
    text: Este versículo parece pertenecer a la narración de Antíoco y el templo de Nanea, no al contexto circundante de este capítulo; se traduce tal como está transmitido.
    reason: textual_variant
lexical_decisions:
- source_word: προθεμένων
  english_pob_choice: had set ... out
  chosen_spanish: los hubieron puesto delante
  alternatives_spanish:
  - los habían colocado
  - los hubieron dispuesto
  lexicon: LSJ
  rationale: El griego indica colocar algo delante o presentar objetos; en español, «poner delante» conserva el gesto concreto de disposición sin añadir más contenido del que exige el texto.
- source_word: αὐτά
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - los objetos
  - estas cosas
  lexicon: LSJ
  rationale: El pronombre griego es anafórico y no explicita el antecedente; «los» mantiene esa indeterminación contextual sin precisar indebidamente qué cosas fueron presentadas.
- source_word: τῶν ἱερέων τοῦ Ναναίου
  english_pob_choice: the priests of Nanea
  chosen_spanish: los sacerdotes de Nanea
  alternatives_spanish:
  - los sacerdotes de Nanaia
  - los sacerdotes naneos
  lexicon: LSJ
  rationale: Se conserva el nombre propio tal como aparece en el testimonio griego principal. «Sacerdotes de Nanea» sigue de cerca la construcción posesiva del original y resulta natural en español.
- source_word: προσελθόντος
  english_pob_choice: had come
  chosen_spanish: se había acercado
  alternatives_spanish:
  - había llegado
  - se había presentado
  lexicon: LSJ
  rationale: El participio expresa aproximación; «se había acercado» mantiene mejor ese matiz que un simple «llegó» y evita duplicar la idea de entrada que ya aparece después.
- source_word: μετʼ ὀλίγων
  english_pob_choice: with a few men
  chosen_spanish: con pocos hombres
  alternatives_spanish:
  - con unos pocos
  - con unos pocos hombres
  lexicon: LSJ
  rationale: Aunque el sustantivo «hombres» no está explícito, el contexto lo sugiere y la adición es idiomática en español. «Pocos hombres» conserva la escasez del grupo sin exagerarla.
- source_word: περίβολον
  english_pob_choice: enclosure
  chosen_spanish: recinto
  alternatives_spanish:
  - enclosure
  - corral
  lexicon: LSJ
  rationale: «Recinto» comunica bien la idea de un espacio cercado o delimitado alrededor de un lugar sagrado, sin precisar excesivamente la forma arquitectónica.
- source_word: τέμενος
  english_pob_choice: sanctuary
  chosen_spanish: santuario
  alternatives_spanish:
  - recinto sagrado
  - santuario sagrado
  lexicon: LSJ
  rationale: Para τέμενος, «santuario» funciona bien en español como espacio consagrado. Se distingue de ἱερόν, que en esta frase se vierte como «templo».
- source_word: συγκλείσαντες
  english_pob_choice: they shut
  chosen_spanish: cerraron
  alternatives_spanish:
  - cerraron de golpe
  - sellaron
  lexicon: LSJ
  rationale: El aoristo participial indica el cierre del lugar; «cerraron» es la forma más natural y no introduce la idea de bloqueo mecánico que implicaría «sellaron».
- source_word: ἱερόν
  english_pob_choice: the temple
  chosen_spanish: el templo
  alternatives_spanish:
  - el santuario
  - el recinto sagrado
  lexicon: LSJ
  rationale: 'Se mantiene la distinción con τέμενος: aquí ἱερόν alude al edificio o complejo del templo, por lo que «templo» es la equivalencia más clara y estable en español.'
- source_word: ὡς εἰσῆλθεν Ἀντίοχος
  english_pob_choice: as soon as Antiochus entered
  chosen_spanish: en cuanto entró Antíoco
  alternatives_spanish:
  - tan pronto como entró Antíoco
  - cuando Antíoco entró
  lexicon: LSJ
  rationale: «ὡς» con aoristo marca inmediatez temporal; «en cuanto» reproduce mejor esa relación que un simple «cuando», preservando la idea de acción simultánea y repentina.
theological_decisions:
- issue: Identificación del lugar sagrado de Nanea y la aparente desalineación contextual con 2 Macabeos 2
  english_pob_reading: The verse is translated as given despite the apparent contextual mismatch; the narrative seems to belong to the temple of Nanea.
  chosen_spanish_reading: Se traduce el versículo tal como lo transmite el testimonio griego, sin armonizarlo con el contexto inmediato de la sección.
  alternative_spanish_readings:
  - Ajustar el versículo al contexto inmediato de 2 Macabeos 2
  - Reformular el lugar para hacerlo coincidir con la narración circundante
  rationale: El deber editorial aquí es transparentar el testimonio fuente y no corregirlo por conjetura. Por eso se conserva Nanea y la secuencia narrativa tal como aparece, aun cuando el encaje contextual parezca problemático.
  doctrine_reference: Principio de fidelidad textual y transparencia del testimonio base; no armonización conjetural.
translation_notes:
  revision_awareness: Se siguió el testimonio griego de Swete 1909 y se respetó la auditable decisión del POB inglés de mantener el nombre divino/local «Nanea» y la secuencia narrativa aun con desajuste contextual aparente. No se observaron revisiones aplicadas en el audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo la distinción entre «santuario» para τέμενος y «templo» para ἱερόν.
  - Se evitó normalizar el nombre propio a una forma más tradicional; se conservó «Nanea» con nota de transliteración alternativa.
  - Se usó una construcción temporal natural en español («en cuanto») para reflejar la inmediatez de ὡς + aoristo.
  - Se preservó la indefinición del pronombre αὐτά sin insertar un antecedente explícito en el texto principal.
