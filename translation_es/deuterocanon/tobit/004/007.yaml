translation:
  language: es
  text: De lo que tienes, da limosna, y no dejes que tu ojo sea mezquino cuando des limosna[a]. No apartes tu rostro de ningún pobre[b], y el rostro de Dios no se apartará de ti[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no dejes que tu ojo envidie» o «no seas tacaño al dar». El modismo griego habla de una actitud mezquina o resentida al dar limosna.
    reason: lexical_alternative
  - marker: b
    text: O «de ningún pobre hombre». El griego tiene un singular masculino con fuerza genérica o distributiva.
    reason: lexical_alternative
  - marker: c
    text: O «la presencia de Dios». El griego dice literalmente «el rostro de Dios» y mantiene el paralelismo con «tu rostro».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκ τῶν ὑπαρχόντων σοι
  english_pob_choice: From what you have
  chosen_spanish: De lo que tienes
  alternatives_spanish:
  - De tus bienes
  - De tus recursos
  lexicon: BDAG
  rationale: La frase griega alude de manera amplia a los bienes o medios disponibles de una persona. «De lo que tienes» suena natural en español y conserva la idea de dar desde los recursos reales de uno, sin volverlo técnico ni añadir precisión que el griego no exige.
- source_word: ποίηει ἐλεημοσύνην
  english_pob_choice: give alms
  chosen_spanish: da limosnas
  alternatives_spanish:
  - haz limosna
  - da caridad
  lexicon: BDAG
  rationale: En este contexto ἐλεημοσύνη designa una dádiva concreta al necesitado. «Da limosnas» mantiene el valor específico del acto y conserva la repetición del término en la cláusula siguiente.
- source_word: μὴ φθονεσάτω σου ὁ ὀφθαλμός
  english_pob_choice: do not let your eye be grudging
  chosen_spanish: no permita tu ojo ponerse envidioso
  alternatives_spanish:
  - no envidie tu ojo
  - no seas mezquino al dar
  - no mire con recelo tu ojo
  lexicon: BDAG
  rationale: El modismo griego expresa una actitud resentida, envidiosa o mezquina al dar. «Ponerse envidioso» conserva la imagen del ojo sin perder el matiz de avaricia o renuencia; además, evita aplanar el giro idiomático a una mera exhortación abstracta.
- source_word: ἐν τῷ ποιεῖν σε ἐλεημοσύνην
  english_pob_choice: when you give alms
  chosen_spanish: cuando des limosnas
  alternatives_spanish:
  - al dar limosnas
  - mientras das limosnas
  lexicon: BDAG
  rationale: La construcción tiene valor temporal. «Cuando des limosnas» es idiomática y fiel al sentido, manteniendo la repetición de ἐλεημοσύνη/limosnas.
- source_word: μὴ ἀποστρέψῃς τὸ πρόσωπόν σου
  english_pob_choice: Do not turn your face away
  chosen_spanish: No apartes tu rostro
  alternatives_spanish:
  - No vuelvas tu rostro
  - No apartes tu faz
  lexicon: BDAG
  rationale: El griego menciona literalmente el rostro. En español, «apartar el rostro» conserva la imagen y su paralelismo con la cláusula final, sin sonar forzado.
- source_word: ἀπὸ παντὸς πτωχοῦ
  english_pob_choice: from any poor person
  chosen_spanish: de ningún pobre
  alternatives_spanish:
  - de ningún pobre hombre
  - de ninguna persona pobre
  lexicon: BDAG
  rationale: Aunque el griego usa masculino singular con fuerza genérica, el español puede expresar esa universalidad con «ningún pobre». Evita una forma marcadamente masculina en el texto principal y sigue la revisión del audit trail que prefirió una formulación más general.
- source_word: τὸ πρόσωπον τοῦ θεοῦ
  english_pob_choice: the face of God
  chosen_spanish: el rostro de Dios
  alternatives_spanish:
  - la presencia de Dios
  - la faz de Dios
  lexicon: BDAG
  rationale: Se conserva la metáfora literal de «rostro» para reflejar el paralelismo con «tu rostro» en la cláusula anterior. «Presencia» sería más interpretativa y debilitaría la simetría deliberada del pasaje.
theological_decisions:
- issue: Lenguaje antropomórfico aplicado a Dios
  english_pob_reading: the face of God
  chosen_spanish_reading: el rostro de Dios
  alternative_spanish_readings:
  - la presencia de Dios
  rationale: El griego usa πρόσωπον tanto para el rostro humano como para el de Dios. Mantener «rostro» preserva la simetría retórica y la tensión teológica sin resolverla artificialmente.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
- issue: Referencia genérica al necesitado en πτωχοῦ
  english_pob_reading: any poor person
  chosen_spanish_reading: ningún pobre
  alternative_spanish_readings:
  - ninguna persona pobre
  - ningún pobre hombre
  rationale: El singular masculino griego funciona de manera distributiva y genérica. En español, «ningún pobre» comunica esa generalidad con naturalidad, sin perder la fuerza inclusiva del mandato.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: El audit trail inglés muestra una revisión reciente que pasó de «poor man» a «poor person» por un ajuste de generalidad. En español, la redacción principal «de ningún pobre» conserva el singular genérico sin marcar género explícito, a la vez que las notas mantienen visible la alternativa literal masculina. También se preservó la metáfora de «rostro» en ambos miembros de la frase para respetar la simetría del griego.
  spanish_consistency_notes:
  - Se usa «limosnas» de manera consistente para ἐλεημοσύνη, en paralelo con la repetición del griego.
  - Se mantiene «rostro» para πρόσωπον en ambos casos, evitando alternar con «presencia» en el texto principal.
  - «Pobre» funciona aquí con valor genérico/distributivo; la nota conserva la alternativa más literal.
  - La puntuación divide claramente las dos exhortaciones y la declaración final, como en el griego.
