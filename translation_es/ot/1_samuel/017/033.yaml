translation:
  language: es
  text: 'Saúl dijo a David[a]: «No puedes ir contra este filisteo para pelear con él, porque tú eres un joven[b] y él es un hombre de guerra desde su juventud».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No puedes salir contra este filisteo para pelear con él».'
    reason: alternative_reading
  - marker: b
    text: «Joven» traduce el hebreo naʿar, que también puede significar «muchacho» o, en algunos contextos, «niño».
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא תוּכַל
  english_pob_choice: You are not able
  chosen_spanish: No puedes
  alternatives_spanish:
  - No eres capaz de
  - No puedes hacerlo
  lexicon: HALOT
  rationale: El hebreo expresa incapacidad, no prohibición. En español, «no puedes» comunica esa imposibilidad de manera natural y fiel, sin añadir matices ajenos.
- source_word: לָלֶכֶת אֶל
  english_pob_choice: to go against
  chosen_spanish: ir contra
  alternatives_spanish:
  - salir contra
  - ir a
  lexicon: HALOT
  rationale: En este contexto militar, el verbo con אֶל indica acercamiento hostil al adversario. «Ir contra» conserva la fuerza de avance bélico sin sobrerreformular el texto.
- source_word: הַפְּלִשְׁתִּי הַזֶּה
  english_pob_choice: this Philistine
  chosen_spanish: este filisteo
  alternatives_spanish:
  - este filisteo hombre
  lexicon: HALOT
  rationale: La combinación demostrativo + etnónimo se vierte naturalmente como «este filisteo». No hace falta añadir «hombre» en español.
- source_word: לְהִלָּחֵם עִמּוֹ
  english_pob_choice: to fight with him
  chosen_spanish: para pelear con él
  alternatives_spanish:
  - para luchar con él
  - para pelearle
  lexicon: HALOT
  rationale: «Pelear con él» reproduce la relación preposicional con עִם y suena natural en español. «Luchar» también sería posible, pero «pelear» refleja mejor el registro directo del pasaje.
- source_word: נַעַר
  english_pob_choice: a youth
  chosen_spanish: un joven
  alternatives_spanish:
  - un muchacho
  - un muchacho joven
  - un muchacho / un joven
  lexicon: HALOT
  rationale: El término puede abarcar desde «muchacho» hasta «joven» según el contexto. Aquí David no es un niño; «un joven» mantiene la contraposición con la veteranía de Goliat sin infantilizarlo.
- source_word: אִישׁ מִלְחָמָה
  english_pob_choice: a man of war
  chosen_spanish: un hombre de guerra
  alternatives_spanish:
  - un guerrero
  - un hombre guerrero
  lexicon: HALOT
  rationale: «Hombre de guerra» conserva la expresión fija del hebreo y su tono solemne. «Guerrero» sería más interpretativo; la forma elegida mantiene la imaginería original.
- source_word: מִנְּעֻרָיו
  english_pob_choice: from his youth
  chosen_spanish: desde su juventud
  alternatives_spanish:
  - desde joven
  - desde sus años de juventud
  lexicon: HALOT
  rationale: La construcción con מִן marca duración iniciada en la juventud. «Desde su juventud» es la equivalencia más clara y conserva el contraste temporal del versículo.
translation_notes:
  revision_awareness: La traducción española sigue de cerca el ajuste revisado en el POB inglés que prefirió «youth» sobre «young man» para reflejar con más precisión נַעַר y mantener el contraste con «from his youth». En español se optó por «un joven» para conservar esa correspondencia sin sonar artificial en el contexto narrativo.
  spanish_consistency_notes:
  - Se preserva «filisteo» como etnónimo común en español bíblico, sin mayúscula interna.
  - Se mantiene el paralelismo entre «joven» y «desde su juventud» para reflejar la repetición enfática del hebreo.
  - Se usa «pelear» en vez de una paráfrasis más amplia para conservar el tono directo del discurso de Saúl.
