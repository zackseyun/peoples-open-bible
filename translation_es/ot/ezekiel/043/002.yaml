translation:
  language: es
  text: Y he aquí[a], la gloria del Dios de Israel venía del camino del oriente, y su voz era como el sonido de muchas aguas[b], y la tierra resplandecía de su gloria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desde el oriente» o «desde la dirección del oriente». El hebreo dice literalmente «del camino del oriente».
    reason: lexical_alternative
  - marker: b
    text: O «como el rugido de muchas aguas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mira
  - He aquí
  lexicon: HALOT
  rationale: Conserva el valor deíctico e interjectivo de la escena visionaria. «Y he aquí» suena natural en español bíblico formal y preserva la irrupción repentina del cuadro profético.
- source_word: כְּבוֹד
  english_pob_choice: the glory
  chosen_spanish: la gloria
  alternatives_spanish:
  - el esplendor
  - la majestad
  lexicon: HALOT
  rationale: «Gloria» es la equivalencia estable para כָּבוֹד en contextos teofánicos y visionarios. Mantiene mejor la densidad teológica que opciones más explicativas como «esplendor».
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: Traducción directa y natural de la cadena constructa, conservando la fórmula de alianza y la identificación del sujeto divino.
- source_word: בָּא
  english_pob_choice: was coming
  chosen_spanish: venía
  alternatives_spanish:
  - venía llegando
  - iba viniendo
  - vino
  lexicon: HALOT
  rationale: El imperfecto narrativo en visión profética se expresa bien con el imperfecto español «venía», que transmite el desarrollo de la aparición mejor que un pretérito cerrado.
- source_word: מִדֶּרֶךְ הַקָּדִים
  english_pob_choice: from the way of the east
  chosen_spanish: del camino del oriente
  alternatives_spanish:
  - desde el este
  - de la dirección del oriente
  - del camino oriental
  lexicon: HALOT
  rationale: «Camino del oriente» reproduce de cerca la imagen hebrea de דֶּרֶךְ sin perder inteligibilidad. «Oriente» es el término bíblico y literario más natural en español para este contexto.
- source_word: וְקוֹלוֹ
  english_pob_choice: and his voice
  chosen_spanish: y su voz
  alternatives_spanish:
  - y su sonido
  - y su voz/su sonido
  lexicon: HALOT
  rationale: Se mantiene la referencia personal que el audit trail inglés ya reconoce. «Voz» evita aplanar el término a un mero ruido, y funciona bien con la comparación inmediata.
- source_word: כְּקוֹל מַיִם רַבִּים
  english_pob_choice: was like the sound of many waters
  chosen_spanish: era como el sonido de muchas aguas
  alternatives_spanish:
  - era como el estruendo de muchas aguas
  - era como el rugido de muchas aguas
  lexicon: HALOT
  rationale: «Sonido» conserva el paralelismo con «voz» sin intensificar indebidamente la imagen. «Aguas» reproduce la metáfora básica; «estruendo» o «rugido» serían interpretativos y más fuertes que el hebreo base.
- source_word: וְהָאָרֶץ
  english_pob_choice: and the earth
  chosen_spanish: y la tierra
  alternatives_spanish:
  - y la tierra
  - y el mundo
  lexicon: HALOT
  rationale: En español bíblico «tierra» suele expresar mejor el alcance cósmico del cuadro que «suelo» o «país». Mantiene la amplitud de ארץ en una escena de teofanía.
- source_word: הֵאִירָה
  english_pob_choice: shone
  chosen_spanish: resplandecía
  alternatives_spanish:
  - brillaba
  - se iluminaba
  - resplandeció
  lexicon: HALOT
  rationale: El verbo hebreo expresa iluminación producida por la gloria. «Resplandecía» transmite el efecto continuo en español con dignidad literaria; es más evocador que «se iluminaba» y menos puntual que «resplandeció».
- source_word: מִכְּבֹדוֹ
  english_pob_choice: from his glory
  chosen_spanish: por su gloria
  alternatives_spanish:
  - desde su gloria
  - a causa de su gloria
  - de su gloria
  lexicon: HALOT
  rationale: El מן puede leerse como fuente, pero en español «por su gloria» comunica con naturalidad el origen causal/emanante del resplandor de la tierra. Se preserva la idea de procedencia sin forzar una repetición poco idiomática.
theological_decisions:
- issue: Referencia personal en los sufijos de «voz» y «gloria»
  english_pob_reading: 'Use personal pronouns: ''his voice'' ... ''his glory'''
  chosen_spanish_reading: Conservar «su voz» y «su gloria» con referencia personal implícita al Dios de Israel
  alternative_spanish_readings:
  - su sonido ... su gloria
  - su voz ... su resplandor
  rationale: Aunque el antecedente gramatical inmediato es la gloria, el contexto es una manifestación teofánica del Dios de Israel. El español puede mantener la referencia personal sin explicitar pronombres adicionales, evitando despersonalizar la escena o resolver indebidamente la tensión del texto.
  doctrine_reference: Primacía del texto original y preservación de la teofanía personal sin armonización excesiva
- issue: Valor de מִן en «מִכְּבֹדוֹ»
  english_pob_reading: from his glory
  chosen_spanish_reading: por su gloria
  alternative_spanish_readings:
  - de su gloria
  - desde su gloria
  - a causa de su gloria
  rationale: La imagen es de resplandor que procede de la gloria divina. En español, «por su gloria» conserva el efecto causal/emanante con fluidez; «de su gloria» también es posible, pero puede sonar más estático y menos naturalmente lumínico.
  doctrine_reference: Imagen de emanación de la gloria divina; no se reduce a mera causalidad impersonal
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el último pase sin cambios del audit trail inglés y no introduce revisiones textuales nuevas. Se ha ajustado la sintaxis al español natural manteniendo las dos tensiones documentadas: la expresión visionaria «he aquí» y la referencia personal de la teofanía.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto solo cuando aparece el nombre divino explícito; aquí el hebreo dice «Dios de Israel», por lo que corresponde «Dios».
  - Se eligió «oriente» en lugar de «este» por mayor naturalidad bíblica en español y por corresponder al registro profético.
  - «Gloria» se mantiene como término técnico-teológico consistente con el proyecto y con la tradición semítica del original.
  - No se introdujo «Cristo», «SEÑOR» ni otras sustituciones ajenas al hebreo de este versículo.
  - La comparación de sonido se mantuvo abierta, sin intensificar a «estruendo» en el texto principal para no sobretraducir la imagen.
