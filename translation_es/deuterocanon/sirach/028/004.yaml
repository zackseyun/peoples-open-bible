translation:
  language: es
  text: No tiene misericordia de un hombre como él[a], y aun así ¿pide que le perdonen sus propios pecados[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La línea hebrea de Cairo conservada en el expediente no corresponde a este versículo; por eso la traducción sigue aquí el testimonio griego.
    reason: textual_variant
  - marker: b
    text: 'O, más literalmente: «¿y ora acerca de sus pecados?». El griego deja implícito el resultado pedido; el texto principal explicita que se trata de perdón.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπʼ ἄνθρωπον ὅμοιον αὐτῷ
  english_pob_choice: on a man like himself
  chosen_spanish: de un hombre como él
  alternatives_spanish:
  - de una persona como él
  - contra uno como él
  lexicon: LSJ
  rationale: ἄνθρωπον es singular y masculino en la forma dada, y el sentido retórico apunta a un semejante. En español, «de un hombre como él» conserva la referencia humana y la comparación sin volverla más abstracta de lo que permite el griego.
- source_word: οὐκ ἔχει ἔλεος
  english_pob_choice: has no mercy
  chosen_spanish: No tiene misericordia
  alternatives_spanish:
  - No muestra misericordia
  - No tiene compasión
  lexicon: BDAG
  rationale: ἔλεος se rinde naturalmente por «misericordia» en este marco ético. El giro verbal mantiene la fuerza directa del griego y funciona bien en español.
- source_word: καὶ περὶ τῶν ἁμαρτιῶν αὐτοῦ δεῖται
  english_pob_choice: yet he asks for his own sins to be forgiven
  chosen_spanish: y aun así pide por el perdón de sus propios pecados
  alternatives_spanish:
  - y aun así ruega respecto de sus pecados
  - y aun así pide acerca de sus pecados
  lexicon: BDAG
  rationale: δεῖται puede significar «pedir, suplicar, orar». El contexto exige dejar implícita la petición de perdón, como en el inglés auditado. «Pide por el perdón» explicita ese resultado sin agregar un objeto extraño al griego.
theological_decisions:
- issue: Selección de fuente ante un hebreo no correspondiente al versículo
  english_pob_reading: Translate from the Greek witness for this verse, while noting the Hebrew mismatch
  chosen_spanish_reading: Traducir desde el testimonio griego para este versículo, señalando la falta de correspondencia del hebreo
  alternative_spanish_readings:
  - Intentar una traducción desde la línea hebrea conservada aunque no corresponda
  - Omitir la discrepancia textual
  rationale: La línea hebrea proporcionada no corresponde a Sirácides 28:4, mientras que el griego sí coincide con el contexto inmediato de venganza y perdón. Para respetar la evidencia y la transparencia editorial, se traduce del griego y se documenta la discrepancia en nota.
  doctrine_reference: 'PHILOSOPHY.md: traducir del hebreo donde se conserva y del griego donde falta; preservar honestamente la incertidumbre de la fuente'
translation_notes:
  revision_awareness: 'Se mantuvo la decisión revisada del expediente: no hubo cambios necesarios respecto de la versión inglesa auditada, y se preservó la preferencia por traducir del griego debido a la discrepancia del hebreo aportado.'
  spanish_consistency_notes:
  - Se usó «misericordia» para ἔλεος y no «compasión», por ser el término más estable en este contexto moral.
  - Se evitó «SEÑOR» o terminología no pertinente porque el versículo no contiene el nombre divino.
  - Se conservó el valor retórico de la pregunta con «aun así» para reflejar el contraste adversativo del griego.
  - La formulación «por el perdón de sus propios pecados» mantiene el matiz implícito del griego sin sobretraducirlo.
