translation:
  language: es
  text: Había allí un hombre que llevaba treinta y ocho años en su enfermedad[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en su debilidad» o «en su dolencia». El griego ἀσθένεια puede referirse ampliamente a debilidad física o a enfermedad.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦν δέ
  english_pob_choice: Now there was
  chosen_spanish: Había allí
  alternatives_spanish:
  - Y había allí
  - Ahora había allí
  lexicon: BDAG
  rationale: δέ funciona como un conector narrativo suave. En español, «Había allí» fluye con naturalidad y conserva la introducción de un nuevo personaje sin sobrecargar el texto con contraste.
- source_word: τις ἄνθρωπος
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - un cierto hombre
  - alguien
  lexicon: BDAG
  rationale: τις con ἄνθρωπος introduce un individuo indefinido. «Un hombre» es natural en español y preserva esa indefinición sin añadir matiz arcaico.
- source_word: ἐκεῖ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - en aquel lugar
  lexicon: BDAG
  rationale: El adverbio señala la ubicación del hombre en la escena ya descrita. «Allí» es la equivalencia más directa y natural.
- source_word: τριάκοντα ὀκτὼ ἔτη
  english_pob_choice: thirty-eight years
  chosen_spanish: treinta y ocho años
  alternatives_spanish:
  - treinta y ocho años completos
  lexicon: BDAG
  rationale: La frase numeral se traduce de manera idiomática y exacta en español como «treinta y ocho años».
- source_word: ἔχων
  english_pob_choice: who had been
  chosen_spanish: que llevaba
  alternatives_spanish:
  - que había estado
  - que tenía
  lexicon: BDAG
  rationale: El participio presente con el complemento temporal expresa una duración continua hasta ese momento. En español, «que llevaba» comunica bien esa extensión de tiempo en una condición.
- source_word: ἐν τῇ ἀσθενείᾳ αὐτοῦ
  english_pob_choice: in his sickness
  chosen_spanish: en su enfermedad
  alternatives_spanish:
  - en su debilidad
  - en su dolencia
  lexicon: BDAG
  rationale: ἀσθένεια puede abarcar debilidad, enfermedad o malestar. Aquí el contexto inmediato favorece una condición de padecimiento; «en su enfermedad» mantiene la ambigüedad amplia sin restringirla a una dolencia específica.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alta concordancia y no requieren una revisión textual adicional; la única decisión relevante es cómo verter ἀσθένεια en un español natural sin perder su amplitud semántica.
  spanish_consistency_notes:
  - Se mantiene «allí» para ἐκεῖ, en línea con el valor locativo simple del griego.
  - Se prefirió «en su enfermedad» como opción principal porque el contexto de Juan 5:5 describe una condición prolongada de aflicción; la nota conserva las alternativas semánticas reconocidas por la POB inglesa.
  - No se introdujo «SEÑOR» ni terminología doctrinal ajena al versículo.
  - El registro es moderno y reverente, con sintaxis natural para lectura pública.
