translation:
  language: es
  text: ¿Qué tiene en común un lobo con un cordero? Así, un hombre impío con un hombre justo,[b] y asimismo un hombre rico con un hombre venido a menos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «un hombre venido a menos». La expresión final es algo incierta; puede aludir a una persona socialmente baja o rebajada, por eso se traduce con cautela.'
    reason: lexical_alternative
  - marker: b
    text: 'Paralelo griego: «Toda carne se reúne según su género, y el hombre se adherirá a su semejante». Este testimonio refleja una forma distinta del dicho y apoya la idea general de que cada cual se asocia con los suyos.'
    reason: alternative_reading
lexical_decisions:
- source_word: מַה יְּחֻבַּר
  english_pob_choice: What fellowship has
  chosen_spanish: ¿Qué comunión tiene
  alternatives_spanish:
  - ¿Qué unión tiene
  - ¿Qué asociación tiene
  - ¿Qué compañerismo tiene
  lexicon: HALOT
  rationale: El pasivo de חבר plantea una pregunta retórica sobre ser unido o asociado. «Comunión» mantiene la fuerza relacional de la pregunta de la POB inglesa y suena natural en español bíblico sin reducirlo a una unión meramente física.
- source_word: זְאֵב
  english_pob_choice: wolf
  chosen_spanish: lobo
  alternatives_spanish:
  - lupa
  lexicon: HALOT
  rationale: Término zoológico directo y exacto en el proverbio.
- source_word: כֶּבֶשׂ
  english_pob_choice: lamb
  chosen_spanish: cordero
  alternatives_spanish:
  - oveja
  lexicon: HALOT
  rationale: En el contraste depredador-presa, «cordero» es más preciso e idiomático que el más general «oveja», y conserva la idea de vulnerabilidad.
- source_word: רָשָׁע
  english_pob_choice: wicked man
  chosen_spanish: hombre impío
  alternatives_spanish:
  - persona impía
  - malvado
  lexicon: HALOT
  rationale: El sustantivo/adjetivo denota al impío. «Hombre impío» conserva el singular masculino proverbial del hebreo y mantiene el paralelismo con «hombre justo».
- source_word: לַצַּדִיק
  english_pob_choice: with a righteous man
  chosen_spanish: con un hombre justo
  alternatives_spanish:
  - con el justo
  - para un hombre justo
  lexicon: HALOT
  rationale: Aunque la preposición es ל, el sentido en la comparación es relacional. «Con» refleja mejor la yuxtaposición proverbial, y «justo» conserva la fuerza ética de צדיק.
- source_word: עָשִׁיר
  english_pob_choice: a rich man
  chosen_spanish: un hombre rico
  alternatives_spanish:
  - el rico
  - un rico
  lexicon: HALOT
  rationale: El sustantivo singular se traduce genéricamente. «Un hombre rico» conserva el paralelo con «hombre impío / hombre justo» y evita una lectura demasiado definida.
- source_word: אִישׁ נֶאֱצָל
  english_pob_choice: a man brought low
  chosen_spanish: un hombre humillado
  alternatives_spanish:
  - un hombre abatido
  - un hombre de condición baja
  - un hombre reducido
  lexicon: HALOT
  rationale: El hebreo es difícil y la tradición auditada señala incertidumbre. «Humillado» preserva la idea de alguien socialmente rebajado o disminuido sin fijar en exceso el matiz económico; sigue la cautela de la POB inglesa con «brought low».
theological_decisions:
- issue: Mantener el proverbio hebreo como texto principal frente al paralelo griego
  english_pob_reading: Translate the Hebrew predator-prey proverb in the main text; preserve the Greek as an alternative reading in a footnote.
  chosen_spanish_reading: Traducir en el texto principal el proverbio hebreo sobre incompatibilidad social, y dejar el griego como lectura alternativa en nota.
  alternative_spanish_readings:
  - «Todas las carnes se juntan según su género, y el hombre se adherirá a su semejante»
  - «Toda carne se reúne según su especie, y el hombre se unirá a quien se le parezca»
  rationale: El hebreo está atestiguado con alta confianza y debe regir el texto principal. El griego ofrece una formulación distinta, útil como testimonio comparativo, pero no debe desplazar la fraseología hebrea cuando el testimonio primario es sólido.
  doctrine_reference: PHILOSOPHY.md §What we are translating
- issue: Uso de formas masculinas representativas en el proverbio
  english_pob_reading: wicked man / righteous man / rich man / a man brought low
  chosen_spanish_reading: hombre impío / hombre justo / hombre rico / hombre humillado
  alternative_spanish_readings:
  - persona impía / persona justa / persona rica / persona humillada
  - impío / justo / rico / humillado
  rationale: El hebreo usa formas masculinas singulares en un proverbio representativo. En español, conservar «hombre» evita aplanar la gramática fuente y mantiene el paralelismo sin forzar una neutralización no requerida por el texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: La revisión más reciente quedó sin cambios y el cotejo global fue de alta concordancia, con solo observaciones menores; por eso el texto conserva la lectura hebrea principal y anota la variante griega sin sustituirla.
  spanish_consistency_notes:
  - «Yahvé» no aplica en este versículo.
  - Se mantuvo «hombre» en los sustantivos representativos para conservar el paralelismo del hebreo.
  - «Comunión» se usa aquí en sentido relacional/proverbial, no técnico eclesiástico.
  - La nota b preserva la tensión entre el hebreo y el paralelo griego sin resolverla artificialmente.
