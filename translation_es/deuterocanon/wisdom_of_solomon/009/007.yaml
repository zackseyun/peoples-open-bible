lexical_decisions:
- source_word: σύ
  english_pob_choice: You
  chosen_spanish: Tú
  alternatives_spanish:
  - Tú
  lexicon: LSJ
  rationale: Se conserva el pronombre explícito al inicio para mantener el énfasis del original y el discurso directo a Dios.
- source_word: προείλω
  english_pob_choice: chose me beforehand
  chosen_spanish: me escogiste de antemano
  alternatives_spanish:
  - me elegiste de antemano
  - me nombraste de antemano
  - me seleccionaste de antemano
  lexicon: LSJ
  rationale: La forma compuesta expresa elección previa. 'Escogiste de antemano' comunica la prioridad temporal y la selección personal con naturalidad en español.
- source_word: βασιλέα
  english_pob_choice: king
  chosen_spanish: rey
  alternatives_spanish:
  - monarca
  - gobernante
  lexicon: LSJ
  rationale: '''Rey'' es la equivalencia directa y más natural para βασιλέα en este contexto real.'
- source_word: λαοῦ σου
  english_pob_choice: of your people
  chosen_spanish: de tu pueblo
  alternatives_spanish:
  - sobre tu pueblo
  lexicon: LSJ
  rationale: 'El genitivo se vierte de manera simple como pertenencia: ''de tu pueblo''. Evita añadir una relación preposicional no expresada explícitamente en el griego.'
- source_word: δικαστήν
  english_pob_choice: judge
  chosen_spanish: juez
  alternatives_spanish:
  - magistrado
  - juez que administra justicia
  lexicon: LSJ
  rationale: '''Juez'' conserva la función judicial de δικαστής sin ampliar indebidamente el cargo.'
- source_word: υἱῶν σου καὶ θυγατέρων
  english_pob_choice: of your sons and daughters
  chosen_spanish: de tus hijos y de tus hijas
  alternatives_spanish:
  - de tus niños y niñas
  - de tus descendientes varones y mujeres
  lexicon: LSJ
  rationale: Se preserva la distinción explícita de sexo presente en el griego. En español, repetir 'de' ante ambos sustantivos hace más clara la coordinación y mantiene el paralelismo.
theological_decisions:
- issue: Elección previa divina sin sobrecargar la doctrina
  english_pob_reading: You chose me beforehand
  chosen_spanish_reading: me escogiste de antemano
  alternative_spanish_readings:
  - me elegiste de antemano
  - me nombraste de antemano
  rationale: La redacción expresa la elección previa divina sin convertirla en una formulación doctrinal más fuerte que la del verso. 'De antemano' conserva el valor temporal del prefijo προ-.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Lenguaje filial con distinción de género
  english_pob_reading: your sons and daughters
  chosen_spanish_reading: tus hijos y tus hijas
  alternative_spanish_readings:
  - tus hijos e hijas
  - tus descendientes varones y mujeres
  rationale: El texto griego nombra explícitamente a hijos e hijas; por eso se conserva la distinción y no se neutraliza en un genérico como 'hijos' o 'niños'.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego normalizado y coincide con el auditorio inglés en la decisión clave de προείλω como elección previa. Se ajustó el orden y la coordinación al español natural, manteniendo el paralelismo entre rey y juez y la distinción explícita entre hijos e hijas.
  spanish_consistency_notes:
  - Se usa 'Tú' con mayúscula inicial al dirigirse a Dios de forma reverente y directa.
  - Se mantiene 'rey' y 'juez' como títulos concretos, sin sustituirlos por términos más vagos.
  - La repetición de 'de' ante 'tus hijos' y 'tus hijas' preserva claridad sintáctica y paralelismo.
  - El marcador [a] se coloca en la frase que contiene la elección previa para reflejar la alternativa léxica documentada.
