translation:
  language: es
  text: Y servirás a tus enemigos, a quienes Yahvé enviará contra ti, en hambre y en sed y en desnudez y en falta de todo; y pondrá sobre tu cuello un yugo de hierro[a] hasta que te haya destruido[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un yugo de hierro».'
    reason: lexical_alternative
  - marker: b
    text: El hebreo también puede entenderse con el enemigo como sujeto de «pondrá» y «haya destruido»; la lectura principal mantiene a Yahvé como sujeto continuo del versículo.
    reason: alternative_reading
lexical_decisions:
- source_word: וְעָבַדְתָּ
  english_pob_choice: you shall serve
  chosen_spanish: y servirás
  alternatives_spanish:
  - y habrás de servir
  - y estarás sirviendo
  lexicon: HALOT
  rationale: עבד expresa aquí servicio forzado bajo enemigos hostiles, no servicio religioso. En español, el futuro simple comunica bien la fuerza predictiva del hebreo y conserva el registro de juicio.
- source_word: אֹיְבֶיךָ
  english_pob_choice: your enemies
  chosen_spanish: a tus enemigos
  alternatives_spanish:
  - a tus adversarios
  - a los que te odian
  lexicon: HALOT
  rationale: El sustantivo significa de forma directa ‘enemigos’ o ‘adversarios’. ‘Tus enemigos’ es natural y mantiene la referencia personal del posesivo.
- source_word: אֲשֶׁר יְשַׁלְּחֶנּוּ יְהוָה בָּךְ
  english_pob_choice: whom Yahweh will send against you
  chosen_spanish: a quienes Yahvé enviará contra ti
  alternatives_spanish:
  - a quienes Yahvé enviará sobre ti
  - a quienes Yahvé mandará contra ti
  lexicon: HALOT
  rationale: El verbo indica que Yahvé despacha a estos enemigos con intención hostil. ‘Contra ti’ expresa mejor el valor adversativo de בָּךְ en español que una repetición más literal de ‘sobre ti’.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino explícito conforme a la norma del proyecto y al texto hebreo, evitando la sustitución por un título enmascarador.
- source_word: בְּרָעָב
  english_pob_choice: in hunger
  chosen_spanish: en hambre
  alternatives_spanish:
  - con hambre
  - en escasez de alimento
  lexicon: HALOT
  rationale: La secuencia de estados de carencia se rinde de manera directa. ‘En hambre’ conserva el paralelismo con ‘en sed’ y el carácter de privación.
- source_word: וּבְצָמָא
  english_pob_choice: and in thirst
  chosen_spanish: y en sed
  alternatives_spanish:
  - y con sed
  - y en sequía
  lexicon: HALOT
  rationale: Paralelo a ‘en hambre’; la forma breve y concreta preserva el encadenamiento del hebreo.
- source_word: וּבְעֵירֹם
  english_pob_choice: and in nakedness
  chosen_spanish: y en desnudez
  alternatives_spanish:
  - y en desnudez total
  - y sin ropa
  lexicon: HALOT
  rationale: עֵירֹם alude a desnudez o falta de vestido. ‘Desnudez’ es el equivalente directo y mantiene la dureza de la maldición.
- source_word: וּבְחֹסֶר כֹּל
  english_pob_choice: and in lack of everything
  chosen_spanish: y en falta de todo
  alternatives_spanish:
  - y en carencia de todo
  - y en necesidad de todo
  lexicon: HALOT
  rationale: חֹסֶר es falta, carencia o carencia de recursos; כֹּל intensifica la totalidad. ‘Falta de todo’ es claro y abarca la amplitud del hebreo sin suavizarla.
- source_word: וְנָתַן
  english_pob_choice: and he will put
  chosen_spanish: y pondrá
  alternatives_spanish:
  - y colocará
  - y echará
  lexicon: HALOT
  rationale: ‘Poner’ es la manera natural de expresar en español la imagen de cargar un yugo sobre alguien.
- source_word: עֹל בַּרְזֶל
  english_pob_choice: an iron yoke
  chosen_spanish: un yugo de hierro
  alternatives_spanish:
  - un yugo férreo
  - un yugo de hierro
  lexicon: HALOT
  rationale: El constructo significa un yugo hecho de hierro. ‘Yugo de hierro’ conserva la metáfora de esclavitud y opresión con máxima transparencia.
- source_word: עַל צַוָּארֶךָ
  english_pob_choice: on your neck
  chosen_spanish: sobre tu cuello
  alternatives_spanish:
  - en tu cuello
  - sobre tu cerviz
  lexicon: HALOT
  rationale: ‘Sobre tu cuello’ sigue la imagen corporal del dominio impuesto. ‘Cuello’ es más natural en español contemporáneo que ‘cerviz’, aunque la metáfora es la misma.
- source_word: עַד הִשְׁמִידוֹ אֹתָךְ
  english_pob_choice: until he has destroyed you
  chosen_spanish: hasta destruirte
  alternatives_spanish:
  - hasta que te destruya
  - hasta que te haya destruido
  lexicon: HALOT
  rationale: שׁמד en hifil significa destruir o exterminar. En español, ‘hasta destruirte’ comunica la finalidad y el alcance del castigo sin forzar una perífrasis más pesada.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El hebreo usa el Tetragrámaton de manera directa. Se conserva el nombre propio ‘Yahvé’ conforme a la terminología del proyecto y a la transparencia con el original.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH'
- issue: Sujeto de וְנָתַן ... עַד הִשְׁמִידוֹ
  english_pob_reading: The LORD remains the subject
  chosen_spanish_reading: 'Yahvé sigue siendo el sujeto: ‘y pondrá ... hasta destruirte’'
  alternative_spanish_readings:
  - 'El enemigo sigue siendo el sujeto: ‘y pondrá ... hasta destruirte’'
  - La frase puede leerse como que el enemigo pone el yugo
  rationale: Aunque el enemigo es el agente inmediato en el contexto, la secuencia verbal continúa naturalmente con Yahvé como sujeto explícito del versículo. Esta lectura mantiene la coherencia del marco de maldición pactal, en el que Yahvé envía y dispone el juicio por medio de enemigos.
  doctrine_reference: 'DOCTRINE.md: juicio pactual y agencia divina'
- issue: Valor de בָּךְ en el sintagma 'enviará ... בָּךְ'
  english_pob_reading: against you
  chosen_spanish_reading: contra ti
  alternative_spanish_readings:
  - sobre ti
  - en ti
  rationale: En español, ‘contra ti’ reproduce mejor la hostilidad activa del hebreo que una simple ubicación espacial. Conserva el matiz adversativo sin perder naturalidad.
  doctrine_reference: Gramática bíblica del valor adversativo de ב
translation_notes:
  revision_awareness: Se revisó el paralelo inglés con sus notas léxicas y teológicas, además del texto hebreo masorético. La versión española conserva la lectura principal del POB, la nota alternativa sobre el ‘yugo de hierro’ y la observación sobre la posible ambigüedad del sujeto en la última cláusula, sin introducir ampliaciones no sustentadas por el original.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ para el nombre divino, conforme al estándar del proyecto.
  - ‘Servirás’ refleja el servicio forzado del hebreo עבד en contexto de maldición.
  - ‘En hambre / en sed / en desnudez / en falta de todo’ conserva el paralelismo acumulativo y la dureza del texto.
  - ‘Cuello’ se usa por naturalidad en español; no se traduce ‘cerviz’ salvo necesidad estilística o exegética.
