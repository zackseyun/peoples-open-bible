base_translation:
  language: en
  yaml_path: translation/ot/psalms/049/020.yaml
  text: He will go to the generation of his fathers[c][b][a]; they will never again see the light.
  footnotes:
  - marker: a
    text: 'Hebrew has a person/number tension: the opening verb is written as second masculine singular (''you will go/come''), while the later verb is plural (''they will see''). Many translations smooth this to singular throughout; the Hebrew text as given preserves a shift in perspective.'
    reason: alternative_reading
  - marker: b
    text: Or 'his ancestors' instead of the more literal 'his fathers.'
    reason: lexical_alternative
  - marker: c
    text: '''See the light'' is a Hebrew idiom for experiencing life; here it means they will never again return to life in this world.'
    reason: cultural_note
