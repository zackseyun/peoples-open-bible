translation:
  language: es
  text: Los tres hijos mayores[a] de Isaí habían ido tras Saúl a la batalla. Y los nombres de sus tres hijos que habían ido a la batalla eran Eliab, el primogénito; su segundo, Abinadab; y el tercero, Samah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «tras Saúl» también puede entenderse como «siguiendo a Saúl».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלְכוּ / הָלְכוּ
  english_pob_choice: had gone
  chosen_spanish: habían ido
  alternatives_spanish:
  - fueron
  - habían seguido
  lexicon: HALOT
  rationale: הלך expresa aquí ir/acudir con Saúl a la campaña militar. El pluscuamperfecto español 'habían ido' conserva el trasfondo narrativo y la relación temporal relativa del hebreo, como en el audit trail inglés.
- source_word: שְׁלֹשֶׁת בְּנֵי יִשַׁי הַגְּדֹלִים
  english_pob_choice: the three oldest sons of Jesse
  chosen_spanish: los tres hijos mayores de Isaí
  alternatives_spanish:
  - los tres hijos mayores de Jesé
  - los tres hijos más grandes de Isaí
  lexicon: HALOT
  rationale: En este contexto familiar, הַגְּדֹלִים se refiere a la edad/senioridad, no al tamaño físico. 'Mayores' es la forma natural y fiel en español para 'oldest sons'.
- source_word: אַחֲרֵי שָׁאוּל
  english_pob_choice: after Saul
  chosen_spanish: tras Saúl
  alternatives_spanish:
  - detrás de Saúl
  - siguiendo a Saúl
  lexicon: HALOT
  rationale: אַחֲרֵי puede significar 'después de' o 'detrás de'. 'Tras Saúl' conserva el valor espacial/secuencial y suena natural en español, con la posible lectura de acompañamiento implícita.
- source_word: לַמִּלְחָמָה / בַּמִּלְחָמָה
  english_pob_choice: to the battle
  chosen_spanish: a la batalla
  alternatives_spanish:
  - a la guerra
  - en la batalla
  - hacia la batalla
  lexicon: HALOT
  rationale: מִלְחָמָה puede ser 'guerra' o 'batalla'; aquí el episodio apunta a un enfrentamiento militar concreto, por lo que 'batalla' es más preciso y natural.
- source_word: וְשֵׁם
  english_pob_choice: And the names ... were
  chosen_spanish: Y los nombres ... eran
  alternatives_spanish:
  - Y el nombre ... era
  - Ahora los nombres ... eran
  lexicon: HALOT
  rationale: Aunque שֵׁם es singular, el hebreo introduce una lista plural con esta fórmula. En español, 'los nombres ... eran' reproduce de forma idiomática la construcción enumerativa.
- source_word: בָּנָיו
  english_pob_choice: his three sons
  chosen_spanish: sus tres hijos
  alternatives_spanish:
  - los tres hijos de él
  - los tres hijos de Isaí
  lexicon: HALOT
  rationale: El sufijo remite a Isaí. 'Sus tres hijos' mantiene la cohesión pronominal del hebreo sin recargar la frase; 'Isaí' ya está cercano en el contexto.
- source_word: אֲשֶׁר הָלְכוּ בַּמִּלְחָמָה
  english_pob_choice: who had gone to the battle
  chosen_spanish: que habían ido a la batalla
  alternatives_spanish:
  - que fueron a la batalla
  - que habían ido a la guerra
  lexicon: HALOT
  rationale: La cláusula relativa identifica a los tres hijos mencionados. 'Habían ido' mantiene el valor de anterioridad y repite coherentemente el mismo campo léxico de 'a la batalla'.
- source_word: הַבְּכוֹר
  english_pob_choice: the firstborn
  chosen_spanish: el primogénito
  alternatives_spanish:
  - el primero en nacer
  - el mayor
  lexicon: HALOT
  rationale: בכור es un término de estatus familiar, no solo de antigüedad. 'Primogénito' es el equivalente español más preciso y preserva la fuerza lexical.
- source_word: וּמִשְׁנֵהוּ
  english_pob_choice: his second
  chosen_spanish: su segundo
  alternatives_spanish:
  - el segundo de él
  - el que seguía
  lexicon: HALOT
  rationale: El término designa al que sigue en orden al primogénito. 'Su segundo' reproduce la concisión del hebreo y del inglés auditado, sin explicar de más.
- source_word: וְהַשְּׁלִשִׁי
  english_pob_choice: and the third
  chosen_spanish: y el tercero
  alternatives_spanish:
  - y el tercer hijo
  - y tercero
  lexicon: HALOT
  rationale: Se trata de una enumeración ordinal formal; 'y el tercero' conserva la estructura y la progresión del original.
- source_word: שַׁמָּה
  english_pob_choice: Shammah
  chosen_spanish: Sama
  alternatives_spanish:
  - Samma
  - Samá
  lexicon: HALOT
  rationale: Para este antropónimo se adopta la transliteración española breve 'Sama', frecuente en tradición bíblica en español y fonéticamente adecuada. Se evita añadir aspiración o duplicación innecesaria.
translation_notes:
  revision_awareness: Se mantiene alta concordancia con el texto fuente y con el audit trail inglés. La principal decisión revisada es la naturalización española de 'the three oldest sons' como 'los tres hijos mayores' y la transliteración de שַׁמָּה como 'Sama' para claridad y fluidez editorial.
  spanish_consistency_notes:
  - Se conserva 'a la batalla' en ambas apariciones de מִלְחָמָה para mantener consistencia léxica.
  - Se preserva la secuencia ordinal con 'el primogénito; su segundo; y el tercero'.
  - Se usa 'Isaí' como forma española estándar del nombre propio.
  - No se introduce 'Señor' ni otra sustitución teológica; el versículo no contiene léxico divino directo.
