review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: partícula inferencial, anuncio profético, modismo de juicio con la mano extendida, entrega como botín, secuencia intensificada de eliminación/destrucción y fórmula final de reconocimiento con «Yahvé». Sin embargo, dos giros españoles debilitan la fidelidad formal y la naturalidad: «te cortaré de entre los pueblos» suena poco idiomático para כרת en este contexto, y «te destruiré de entre las tierras» no expresa bien מִן־הָאֲרָצוֹת en español bíblico natural. Conviene ajustar a «te eliminaré de entre los pueblos» y «te destruiré de las tierras» para conservar la separación/remoción sin calco torpe.'
  spanish_quality_summary: 'El texto es generalmente claro, digno y legible. «Por tanto», «he aquí» y «Yahvé» encajan con el registro del proyecto. El mayor problema de calidad está en dos calcos poco naturales: «te cortaré de entre» y «te destruiré de entre las tierras». Además, la nota al pie quedó en inglés y debe pasarse al español. Con esos cambios, el versículo suena natural y mantiene la fuerza profética.'
  glossary_alignment: 'Buena alineación con el glosario del proyecto: יהוה -> «Yahvé» correctamente; גּוֹיִם -> «naciones» y עַמִּים -> «pueblos» preservan la distinción léxica; בַּג/בז -> «botín» es adecuado; אַשְׁמִידְךָ -> «te aniquilaré» conserva la intensificación. La excepción recomendada es usar «eliminaré» en vez de «cortaré» por idiomaticidad española, aunque la decisión léxica debe explicar que se preserva la fuerza de כרת sin un calco extraño.'
  issues:
  - severity: medium
    issue: «te cortaré de entre los pueblos» es demasiado calcado
    rationale: Aunque intenta preservar כרת, en español suena extraño y poco natural. «Te eliminaré de entre los pueblos» o «te extirparé de entre los pueblos» comunica mejor la remoción/exterminio.
  - severity: medium
    issue: «te destruiré de entre las tierras» no es idiomático
    rationale: La expresión «de entre las tierras» resulta forzada en español. El hebreo indica destrucción/remoción desde los territorios; «de las tierras» conserva ese valor de manera más natural.
  - severity: medium
    issue: La nota al pie está en inglés
    rationale: Las notas del texto español deben estar en español. Además, debe mantenerse el marcador [a] correctamente anclado en el texto.
  revised_spanish_text: Por tanto[a], he aquí, he extendido mi mano contra ti, y te daré como botín a las naciones. Te eliminaré de entre los pueblos y te destruiré de las tierras; te aniquilaré, y sabrás que yo soy Yahvé.
  revised_footnotes:
  - marker: a
    text: O «por despojo» o «como botín para las naciones».
    reason: lexical_alternative
  revision_rationale: Se conservaron el sentido del hebreo y las decisiones teológicas del POB, pero se corrigieron dos calcos poco naturales en español («te cortaré de entre» y «te destruiré de entre las tierras») y se tradujo la nota al pie al español. Los cambios son menores y no requieren adjudicación adicional.
