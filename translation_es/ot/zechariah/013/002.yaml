translation:
  language: es
  text: Y sucederá en aquel día[a] —declara Yahvé de los ejércitos— que exterminaré los nombres de los ídolos de la tierra, y no serán recordados más[b]. Y también quitaré de la tierra a los profetas[c] y al espíritu inmundo[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en ese día».
    reason: alternative_reading
  - marker: b
    text: O «y no se hará memoria de ellos nunca más».
    reason: alternative_reading
  - marker: c
    text: «Los profetas» se refiere aquí, por el contexto, a profetas ilegítimos asociados con la idolatría y la impureza.
    reason: contextual_note
  - marker: d
    text: O «al espíritu de impureza».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And it shall happen
  chosen_spanish: Y sucederá
  alternatives_spanish:
  - Y acontecerá
  - Y ocurrirá
  lexicon: HALOT
  rationale: La fórmula profética introduce un evento futuro. «Sucederá» mantiene el tono bíblico sin recurrir a un calco demasiado rígido como «acontecerá».
- source_word: בַיּוֹם הַהוּא
  english_pob_choice: in that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - aquel día
  lexicon: HALOT
  rationale: La expresión profética se conserva como fórmula temporal estable. «Aquel día» mantiene la resonancia escatológica y suena natural en español.
- source_word: נְאֻם יְהוָה צְבָא֗וֹת
  english_pob_choice: declares Yahweh of hosts
  chosen_spanish: declara Yahvé de los ejércitos
  alternatives_spanish:
  - oráculo de Yahvé de los ejércitos
  - dice Yahvé de los ejércitos
  lexicon: HALOT
  rationale: «Declara» expresa bien נְאֻם en discurso profético. Se conserva «Yahvé» según la convención del proyecto y «de los ejércitos» para צְבָאוֹת sin transliteración.
- source_word: אַכְרִית
  english_pob_choice: I will cut off
  chosen_spanish: exterminaré
  alternatives_spanish:
  - cortaré
  - eliminaré
  lexicon: HALOT
  rationale: El verbo implica una remoción decisiva y total. En español, «exterminaré» comunica esa fuerza de manera más contundente que «cortaré» y evita suavizar el golpe del hebreo.
- source_word: שְׁמוֹת הָעֲצַבִּים
  english_pob_choice: the names of the idols
  chosen_spanish: los nombres de los ídolos
  alternatives_spanish:
  - los nombres de las imágenes
  - los nombres de los ídolos falsos
  lexicon: HALOT
  rationale: Se conserva explícitamente «nombres» para reflejar que el texto no sólo apunta a objetos cultuales, sino también a su memoria y presencia nominada. «Ídolos» es el equivalente directo de עֲצַבִּים.
- source_word: מִן הָאָרֶץ
  english_pob_choice: from the land
  chosen_spanish: de la tierra
  alternatives_spanish:
  - de la tierra/país
  - de la tierra prometida
  lexicon: HALOT
  rationale: «Tierra» reproduce היטב el alcance territorial/covenantal de הָאָרֶץ en Zacarías y funciona de modo natural en español bíblico.
- source_word: וְלֹא יִזָּכְרוּ עוֹד
  english_pob_choice: and they shall be remembered no more
  chosen_spanish: y no serán recordados más
  alternatives_spanish:
  - y no volverán a ser recordados
  - y ya no se hará memoria de ellos
  lexicon: HALOT
  rationale: La pasiva conserva la forma impersonal del hebreo. «Recordados» mantiene la idea de memoria pública y cultual sin añadir interpretación.
- source_word: וְגַם
  english_pob_choice: And also
  chosen_spanish: Y también
  alternatives_spanish:
  - Además
  - Y asimismo
  lexicon: HALOT
  rationale: Marca una acción adicional de purga; «y también» enlaza con naturalidad la segunda cláusula sin perder el valor aditivo.
- source_word: הַנְּבִיאִים
  english_pob_choice: the prophets
  chosen_spanish: a los profetas
  alternatives_spanish:
  - a los profetas falsos
  - a los profetas ilegítimos
  lexicon: HALOT
  rationale: Se mantiene el sustantivo sin añadir el adjetivo «falsos», que no aparece en el hebreo. El contexto de idolatría e impureza da la carga negativa.
- source_word: רוּחַ הַטֻּמְאָה
  english_pob_choice: the unclean spirit
  chosen_spanish: al espíritu de impureza
  alternatives_spanish:
  - al espíritu inmundo
  - al espíritu de inmundicia
  lexicon: HALOT
  rationale: El hebreo admite una construcción abstracta («espíritu de impureza») o una más personificada. En español, esta opción conserva la ambigüedad y refleja con mayor precisión la estructura nominal del original.
- source_word: אַעֲבִיר
  english_pob_choice: I will remove
  chosen_spanish: quitaré
  alternatives_spanish:
  - removeré
  - haré pasar
  lexicon: HALOT
  rationale: El Hifil de עבר aquí expresa hacer desaparecer o retirar. «Quitaré» es claro, sobrio y suficientemente fuerte para el paralelismo con «exterminaré».
theological_decisions:
- issue: Si deben identificarse explícitamente «los profetas» como falsos profetas
  english_pob_reading: Retain the text's wording as 'the prophets' and let the context indicate they are illegitimate prophets associated with uncleanness.
  chosen_spanish_reading: Mantener «los profetas» sin añadir «falsos», dejando que el contexto de idolatría e impureza marque su carácter ilegítimo.
  alternative_spanish_readings:
  - los falsos profetas
  - los profetas ilegítimos
  rationale: El hebreo no añade un adjetivo calificativo. La traducción debe preservar esa sobriedad y no resolver interpretativamente lo que el texto deja implícito.
  doctrine_reference: 'Principio POB: no paraphrase beyond what the source text warrants; preserve tension rather than flattening it.'
- issue: Cómo entender רוּחַ הַטֻּמְאָה
  english_pob_reading: Render as 'the unclean spirit.'
  chosen_spanish_reading: Traducirlo como «el espíritu de impureza», manteniendo abierta la posibilidad de una referencia espiritual personal o de una cualidad impura.
  alternative_spanish_readings:
  - el espíritu inmundo
  - el espíritu de inmundicia
  rationale: El hebreo puede leerse como un espíritu caracterizado por impureza. En español, «espíritu de impureza» conserva esa ambigüedad sin forzar una identificación doctrinal adicional.
  doctrine_reference: 'Translation philosophy: optimal equivalence; do not import doctrinal claims the text does not make.'
translation_notes:
  revision_awareness: 'El audit trail inglés mantiene la estructura y el sentido del texto sin cambios sustantivos en la revisión final, salvo un ajuste menor de orden en la frase sobre ‘I will also remove’. La versión española conserva esa misma estructura: anuncio profético inicial, declaración de Yahvé, eliminación de ídolos y su memoria, y luego la supresión de los profetas y del espíritu de impureza. Se decidió reflejar con precisión el paralelo hebreo בין la clausula de corte total y la de remoción, sin introducir ‘falsos’ en el texto principal ni resolver la expresión רוּחַ הַטֻּמְאָה más allá de lo que permite el original.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente con el estándar del proyecto.
  - Se mantiene «de los ejércitos» para צְבָאוֹת.
  - «Tierra» se usa en sentido territorial/covenantal, coherente con Zacarías.
  - «Profetas» permanece sin calificación en el texto principal, como en el hebreo.
  - La expresión «espíritu de impureza» conserva el matiz nominal del original y evita una simplificación doctrinal.
