review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura casuística del hebreo y la progresión del incendio: fuego que se origina, prende en espinos y consume bienes agrícolas. También conserva el contraste entre grano amontonado, mies en pie y campo. Sin embargo, la cláusula final שַׁלֵּם יְשַׁלֵּם se expresa mejor como obligación de restitución/compensación plena que como «deberá pagar ciertamente», ya que en español esa colocación suena poco natural y debilita el matiz jurídico resaltado por el POB inglés.'
  spanish_quality_summary: El español es generalmente claro y digno. «Si se origina un fuego» y «prende en espinos» son aceptables, y «la mies en pie» es buena. El principal problema es de naturalidad y precisión legal en «deberá pagar ciertamente», que resulta forzado en español. También conviene ajustar la nota [b] para que la opción principal sea la más fiel y natural, dejando «pagar» como alternativa si se desea.
  glossary_alignment: No hay conflictos con la terminología teológica del proyecto. Las decisiones léxicas agrícolas son adecuadas. La única desalineación relevante con el audit trail inglés está en שַׁלֵּם יְשַׁלֵּם, donde el POB privilegia «make restitution» y el español debería reflejar «hacer restitución» o «resarcir plenamente» como texto principal.
  issues:
  - severity: medium
    issue: La frase «deberá pagar[b] ciertamente» es poco idiomática en español.
    rationale: Aunque intenta reflejar el infinitivo absoluto hebreo, en español la intensificación con «ciertamente» después de «deberá pagar» suena rígida y menos natural que una formulación jurídica como «deberá hacer plena restitución».
  - severity: medium
    issue: La nota [b] invierte la prioridad léxica del POB auditado.
    rationale: El inglés POB adoptó «must surely make restitution» como texto principal y dejó «must surely pay» como alternativa. El español hace lo contrario, debilitando la racionalidad documentada.
  revised_spanish_text: Si se origina un fuego y prende en espinos[a], y se consume el montón de grano, o la mies en pie, o el campo, el que encendió el fuego deberá hacer plena restitución[b].
  revised_footnotes:
  - marker: a
    text: O «y encuentra espinos»; literalmente, «y encuentra espinos».
    reason: lexical_alternative
  - marker: b
    text: O «deberá pagar sin falta»; el hebreo intensifica la obligación con un infinitivo absoluto más verbo finito.
    reason: lexical_alternative
  revision_rationale: Se mantiene la mayor parte del borrador porque representa fielmente el caso legal y las imágenes agrícolas del hebreo. Se revisa únicamente la cláusula final para que el español preserve mejor el matiz jurídico de restitución y suene natural en español contemporáneo. La nota correspondiente también se ajusta para que la alternativa quede subordinada al sentido principal documentado por el POB inglés.
