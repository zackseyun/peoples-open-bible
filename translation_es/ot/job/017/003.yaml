    text: O ‘sé fiador de mí’. El hebreo usa lenguaje jurídico de fianza o garantía.
    reason: lexical_alternative
  - marker: b
    text: 'Lit. ‘contigo’. En contexto, el sentido es ‘contigo mismo’: Job le pide a Dios que provea la fianza y que él mismo sea la contraparte del compromiso.'
    reason: theological_note
  - marker: c
    text: Lit. ‘¿quién es el que daría la mano conmigo?’, un modismo para entrar en un compromiso de fianza.
    reason: cultural_note
  revision_rationale: 'La revisión es pequeña pero importante: explicita en el texto el matiz reflexivo de עִמָּךְ (''contigo mismo''), que forma parte central de la lectura documentada en el expediente inglés y del sentido contextual del verso. El resto del borrador ya era fiel y natural, así que se conserva con ajustes mínimos en la nota explicativa.'
