  text: הָלֹ֡ךְ וְ/קָֽרָאתָ֩ אֶת הַ/דְּבָרִ֨ים הָ/אֵ֜לֶּה צָפ֗וֹנָ/ה וְ֠/אָמַרְתָּ שׁ֣וּבָ/ה מְשֻׁבָ֤ה יִשְׂרָאֵל֙ נְאֻם יְהוָ֔ה לֽוֹא אַפִּ֥יל פָּנַ֖/י בָּ/כֶ֑ם כִּֽי חָסִ֤יד אֲנִי֙ נְאֻם יְהוָ֔ה לֹ֥א אֶטּ֖וֹר לְ/עוֹלָֽם־־־־־׃
