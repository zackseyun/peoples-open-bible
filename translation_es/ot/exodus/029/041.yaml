translation:
  language: es
  text: Y ofrecerás el segundo cordero al anochecer[a]; ofrecerás para él su ofrenda de cereal y su libación, como por la mañana, como aroma grato, ofrenda de alimento[b] a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «entre las tardes», un modismo para la última tarde o el período del anochecer.'
    reason: lexical_alternative
  - marker: b
    text: O «ofrenda por fuego».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַכֶּבֶשׂ הַשֵּׁנִי
  english_pob_choice: the second lamb
  chosen_spanish: el segundo cordero
  alternatives_spanish:
  - el otro cordero
  - el segundo cordero joven
  lexicon: HALOT
  rationale: כֶּבֶשׂ designa un cordero/oveja joven apto para sacrificio. «Segundo cordero» conserva la secuencia del sacrificio diario ya establecida en el versículo anterior y suena natural en español.
- source_word: תַּעֲשֶׂה
  english_pob_choice: you shall offer
  chosen_spanish: ofrecerás
  alternatives_spanish:
  - harás
  - prepararás
  lexicon: HALOT
  rationale: En contexto sacrificial, עשה no se traduce de manera mecánica como «hacer», sino con el sentido cultual de «ofrecer».
- source_word: בֵּין הָעַרְבָּיִם
  english_pob_choice: at twilight
  chosen_spanish: al anochecer
  alternatives_spanish:
  - entre las tardes
  - al atardecer
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y alude al período de la tarde tardía o el crepúsculo. «Al anochecer» comunica con claridad ese intervalo sin perder el valor contextual.
- source_word: כְּמִנְחַת הַבֹּקֶר
  english_pob_choice: as in the morning, with its grain offering
  chosen_spanish: como por la mañana, con su ofrenda de cereal
  alternatives_spanish:
  - como la ofrenda matinal
  - según la ofrenda de la mañana
  lexicon: HALOT
  rationale: מִנְחָה en lenguaje sacrificial se refiere a la ofrenda vegetal/granaria que acompaña al holocausto. «Ofrenda de cereal» mantiene la categoría cultual de forma comprensible en español.
- source_word: וּכְנִסְכָּהּ
  english_pob_choice: and its drink offering
  chosen_spanish: y su libación
  alternatives_spanish:
  - y su ofrenda líquida
  - y su ofrenda de bebida
  lexicon: HALOT
  rationale: נֶסֶךְ es una ofrenda derramada. «Libación» es el término español más preciso y digno para este rito.
- source_word: לָּהּ
  english_pob_choice: for it
  chosen_spanish: para él
  alternatives_spanish:
  - para ella
  - para ese cordero
  lexicon: HALOT
  rationale: El sufijo femenino del hebreo puede referirse a la construcción implícita de la ofrenda asociada al animal. En español, «para él» enlaza naturalmente con el cordero y conserva la función del pronombre explícito que la revisión inglesa subrayó.
- source_word: לְרֵיחַ נִיחֹחַ
  english_pob_choice: as a pleasing aroma
  chosen_spanish: como aroma grato
  alternatives_spanish:
  - como olor agradable
  - como fragancia placentera
  lexicon: HALOT
  rationale: La fórmula sacrificial fija comunica aceptación y agrado ante Dios. «Aroma grato» preserva la metáfora sin sonar arcaizante.
- source_word: אִשֶּׁה
  english_pob_choice: a food offering
  chosen_spanish: ofrenda encendida
  alternatives_spanish:
  - ofrenda hecha por fuego
  - ofrenda ígnea
  lexicon: HALOT
  rationale: אִשֶּׁה señala una ofrenda consumida por fuego. «Ofrenda encendida» es una forma natural en español que conserva el matiz de combustión ritual sin imponer un giro demasiado técnico.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - a YHWH
  lexicon: HALOT
  rationale: Siguiendo la política del proyecto, יהוה se vierte como «Yahvé» en el texto principal para preservar el nombre del pacto en vez de ocultarlo con un título.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El hebreo usa directamente el Tetragrámaton; la línea editorial del proyecto pide conservar el nombre divino en vez de enmascararlo con un título reverencial. «Yahvé» es la forma española consistente con esa decisión.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
- issue: Valor sacrificial de אִשֶּׁה
  english_pob_reading: a food offering / offering by fire
  chosen_spanish_reading: ofrenda encendida
  alternative_spanish_readings:
  - ofrenda por fuego
  - ofrenda de fuego
  rationale: No conviene neutralizar el término hasta perder su carácter cultual. «Ofrenda encendida» mantiene la referencia al fuego sacrificial y funciona bien en español bíblico actual.
  doctrine_reference: Levítico 1:9; Éxodo 29:18
- issue: Equivalente de בֵּין הָעַרְבָּיִם
  english_pob_reading: at twilight
  chosen_spanish_reading: al anochecer
  alternative_spanish_readings:
  - entre las tardes
  - al crepúsculo
  rationale: La expresión hebrea es idiomática; traducirla literalmente puede oscurecer el sentido. «Al anochecer» conserva la franja horaria y evita una traducción opaca.
  doctrine_reference: Éxodo 12:6; Daniel 9:21
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión que añadió el pronombre explícito «for it» en inglés; por eso se mantuvo «para él» para reflejar la referencia pronominal de לָּהּ. También se respetó la decisión revisada de conservar el orden cultual: sacrificio, ofrenda de cereal y libación, seguido de la fórmula de aroma grato y ofrenda consumida por fuego.'
  spanish_consistency_notes:
  - Se usó «cordero» para כֶּבֶשׂ, en coherencia con el valor sacrificial del término.
  - «Ofrenda de cereal» se eligió como equivalente funcional de מִנְחָה en contexto levítico, sin reducirlo a «ofrenda» genérica.
  - Se preservó la distinción entre la ofrenda acompañante y la libación.
  - «Yahvé» se empleó de forma consistente para יהוה según la política del proyecto.
  - Se evitó «SEÑOR» para no ocultar el nombre divino y mantener trazabilidad textual.
