translation:
  language: es
  text: Disciplina a tu hijo, porque hay esperanza[a]; no pongas tu corazón[b] en darle muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mientras hay esperanza». La cláusula hebrea puede entenderse de manera causal («porque hay esperanza») o temporal («mientras hay esperanza»).'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «no levantes tu alma para matarlo»; es un modismo hebreo que significa no orientar el deseo o la resolución hacia un desenlace mortal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַסֵּר
  english_pob_choice: Discipline
  chosen_spanish: Corrige
  alternatives_spanish:
  - Disciplina
  - Castiga
  - Corrige con disciplina
  lexicon: HALOT
  rationale: El verbo piel de יסר puede expresar corrección disciplinaria. En español, «corrige» comunica la acción correctiva de forma natural; para no perder el matiz formativo, se conserva en combinación con el contexto del proverbio y la nota de decisión.
- source_word: בִּנְךָ
  english_pob_choice: your son
  chosen_spanish: tu hijo
  alternatives_spanish:
  - tu hijo varón
  - tu niño
  - tu descendiente
  lexicon: HALOT
  rationale: El hebreo dice específicamente «tu hijo». «Tu hijo» es la equivalencia directa y clara en español; «hijo varón» sería explicativo pero innecesario, y «niño» no refleja con precisión el término filial.
- source_word: כִּי יֵשׁ תִּקְוָה
  english_pob_choice: for there is hope
  chosen_spanish: porque hay esperanza
  alternatives_spanish:
  - pues hay esperanza
  - porque aún hay esperanza
  - mientras hay esperanza
  lexicon: HALOT
  rationale: La cláusula causal se traduce de modo natural con «porque hay esperanza». Se preserva el sentido de fundamento de la corrección; «mientras hay esperanza» es posible, pero introduce una lectura temporal que no se impone desde el hebreo.
- source_word: וְאֶל
  english_pob_choice: do not set ... on
  chosen_spanish: no pongas ... en
  alternatives_spanish:
  - no dirijas ... hacia
  - no vuelques ... hacia
  - no tengas la mira en
  lexicon: HALOT
  rationale: La combinación con el idiomático «levantar el alma» apunta a orientar la voluntad o el deseo hacia algo. En español, «no pongas tu alma en» mantiene la imagen con una estructura idiomática legible; «no dirijas» sería más explicativo, pero menos cercano a la forma hebrea.
- source_word: הֲמִיתוֹ
  english_pob_choice: putting him to death
  chosen_spanish: matarlo
  alternatives_spanish:
  - ponerlo a muerte
  - darle muerte
  - causarle la muerte
  lexicon: HALOT
  rationale: El infinitivo causativo de מות expresa dar muerte. «Matarlo» es la forma española más directa y natural; «causarle la muerte» es más formal, pero menos idiomática; «ponerlo a muerte» suena forzado.
- source_word: נַפְשֶׁךָ
  english_pob_choice: your heart / your soul
  chosen_spanish: tu alma
  alternatives_spanish:
  - tu corazón
  - tu deseo
  - tu vida
  lexicon: HALOT
  rationale: El hebreo dice literalmente «tu alma», y la POB en inglés conserva la imagen corporal/volitiva antes de explicarla con una nota. En español, «tu alma» mantiene la metáfora bíblica sin reemplazarla por una equivalencia interpretativa.
theological_decisions:
- issue: 'Sentido del segundo hemistiquio: deseo o resolución hacia la muerte del hijo'
  english_pob_reading: 'The verse forbids excessive or destructive parental severity: the parent must discipline the son, but must not desire or pursue a course that results in his death.'
  chosen_spanish_reading: 'El versículo prohíbe orientar el propio querer hacia la muerte del hijo: debe haber corrección, pero no una disposición que busque matarlo.'
  alternative_spanish_readings:
  - No lo reprimas tanto que muera
  - No le perdones la disciplina, para que no muera
  - No seas cómplice de su muerte
  rationale: 'El hebreo literalmente dice que no se «levante el alma» hacia causarlo morir, una idiomática referencia a dirección de deseo o resolución. La traducción conserva esa tensión: hay disciplina necesaria, pero se excluye cualquier impulso o determinación orientada a la muerte.'
  doctrine_reference: Translation philosophy §§1, 3, 4, 6
- issue: 'Alcance de la primera cláusula: causal o temporal'
  english_pob_reading: for there is hope / while there is hope
  chosen_spanish_reading: porque hay esperanza
  alternative_spanish_readings:
  - mientras hay esperanza
  - pues hay esperanza
  rationale: La lectura causal es la más directa y coherente con la forma del hebreo. Se evita fijar la opción temporal como única, pero se mantiene disponible en la nota, pues el hebreo admite ambas posibilidades.
  doctrine_reference: Translation philosophy §§1, 4
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto se alinea con el estado de alta concordancia y no requiere ajustes adicionales.
  spanish_consistency_notes:
  - Se conserva «Yahvé» en otros textos como norma del proyecto; este versículo no contiene el nombre divino.
  - Se mantiene «tu alma» para respetar la imagen hebrea y la nota aclara el modismo volitivo.
  - «Hijo» se mantiene como término específico, en concordancia con el hebreo y con el criterio del proyecto de no neutralizar innecesariamente el género gramatical cuando el original es específico.
