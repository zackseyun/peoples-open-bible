    rationale: 'La nota inglesa ofrece una alternativa de estructura más literal: «... only in Gaza, Gath, and Ashdod they remained». La nota española actual («Solo en Gaza, Gat y Asdod quedaron algunos») repite sustancialmente el texto principal en vez de reflejar la alternativa «allí permanecieron/ellos permanecieron».'
  revised_spanish_text: No quedaron Anakim en la tierra de los hijos de Israel[a]; solo en Gaza, Gat y Asdod[b] quedaron algunos.
