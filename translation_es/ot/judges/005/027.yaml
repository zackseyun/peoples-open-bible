translation:
  language: es
  text: Entre sus pies él se hundió[a], cayó, se tendió; entre sus pies se hundió, cayó; donde se hundió[b], allí cayó—destruido[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a sus pies», en lugar de la más literal «entre sus pies».
    reason: lexical_alternative
  - marker: b
    text: El hebreo repite una secuencia breve de verbos («se hundió, cayó, se tendió ... se hundió, cayó») para dar énfasis poético.
    reason: cultural_note
  - marker: c
    text: O «destruido» / «violentamente abatido» para שָׁדוּד; aquí se conserva «destruido» por ser la opción más natural y directa.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּין רַגְלֶיהָ
  english_pob_choice: between her feet
  chosen_spanish: entre sus pies
  alternatives_spanish:
  - a los pies de ella
  - entre las piernas de ella
  lexicon: HALOT
  rationale: Conserva la imagen espacial concreta del hebreo y la repetición del verso. En español, «entre sus pies» reproduce mejor la literalidad que una paráfrasis como «a los pies de ella», que suaviza la escena. «Entre las piernas de ella» sería más anatómico de lo que exige el hebreo y menos adecuado para el registro bíblico.
- source_word: כָּרַע
  english_pob_choice: he sank
  chosen_spanish: se hundió
  alternatives_spanish:
  - se inclinó
  - se agachó
  - cayó de rodillas
  lexicon: HALOT
  rationale: El verbo puede implicar doblarse, agacharse o hundirse. En este contexto de muerte/derrumbe, «se hundió» comunica mejor el descenso repentino sin sugerir un gesto voluntario de reverencia. Además, mantiene bien la secuencia poética con «cayó» y «se tendió».
- source_word: נָפַל
  english_pob_choice: he fell
  chosen_spanish: cayó
  alternatives_spanish:
  - se desplomó
  - se derrumbó
  lexicon: HALOT
  rationale: Es la equivalencia natural y directa del hebreo. Se mantiene la repetición verbal para conservar el ritmo y la intensificación del poema.
- source_word: שָׁכָב
  english_pob_choice: he lay
  chosen_spanish: se tendió
  alternatives_spanish:
  - yació
  - se acostó
  - quedó tendido
  lexicon: HALOT
  rationale: «Se tendió» conserva la tersedad del hebreo y el cierre brusco de la secuencia verbal. «Yació» sería más solemne pero menos natural en español actual; «quedó tendido» añade una explicación no presente en el texto.
- source_word: בַּאֲשֶׁר
  english_pob_choice: where
  chosen_spanish: donde
  alternatives_spanish:
  - en el lugar donde
  - allí donde
  lexicon: HALOT
  rationale: Funciona como adverbio relativo de lugar. «Donde» es la equivalencia más concisa y natural en español, sin perder la fuerza de la línea.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: HALOT
  rationale: Reproduce el deíctico final del hebreo y refuerza la repetición espacial del verso. «Allí» suena más literario y estable que «ahí» en este registro.
- source_word: שָׁדוּד
  english_pob_choice: destroyed
  chosen_spanish: destruido
  alternatives_spanish:
  - destrozado
  - arruinado
  - violentamente muerto
  lexicon: HALOT
  rationale: El participio/adjetivo expresa ruina, devastación o destrucción total. En este contexto, con referencia a un enemigo abatido, «destruido» conserva la fuerza sin añadir una interpretación más específica como «violentamente muerto».
theological_decisions:
- issue: La frase final describe el destino del enemigo con un término de ruina/destrucción, no necesariamente con una glosa explícita de muerte.
  english_pob_reading: The line ends with 'destroyed,' keeping שָׁדוּד broad but forceful.
  chosen_spanish_reading: La línea termina con «destruido», manteniendo amplio pero contundente el sentido de שָׁדוּד.
  alternative_spanish_readings:
  - violentamente muerto
  - arruinado
  - aniquilado
  rationale: «Destruido» preserva la amplitud semántica del hebreo y evita cerrar demasiado el sentido. Otras opciones o bien interpretan de más la causa de la muerte, o bien debilitan la contundencia del cierre poético.
  doctrine_reference: No aplica; decisión léxica-poética sin implicación doctrinal directa.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB en inglés, que cambió la última palabra de «devastated» a «destroyed» por ser una equivalencia más natural para שָׁדוּד en referencia a una persona abatida. La versión española sigue esa decisión y conserva la estructura repetida y el cierre contundente del verso.
  spanish_consistency_notes:
  - Se mantiene el paralelismo triple del hebreo con dos repeticiones parciales, sin suavizar la acumulación verbal.
  - Se prefirió «se hundió» para כָּרַע y no «se inclinó» o «se arrodilló», porque el contexto es el de un derrumbe fatal, no una postura voluntaria.
  - Se usó «destruido» para שָׁדוּד conforme a la revisión inglesa, evitando una paráfrasis más interpretativa.
  - La puntuación con punto y coma y raya final reproduce la cadencia poética y la clausura enfática del hebreo.
