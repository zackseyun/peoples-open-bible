revisions:
- from: 'Y dijo el suegro de Moisés[a]: «No está bien[b] la cosa[c] que estás haciendo».'
  to: 'El suegro de Moisés le dijo: «No es bueno lo que estás haciendo[a]».'
  rationale: Se ajusta el texto para reflejar mejor el sentido fuente y la decisión idiomática documentada en el POB inglés. «No es bueno» preserva más directamente לֹא טוֹב, y «lo que estás haciendo» evita la calca poco natural «la cosa que estás haciendo». La nota mantiene la alternativa más formal correspondiente a הַדָּבָר.
