    text: O «los efraimitas». El hebreo literalmente dice «los hombres de Efraín», una expresión colectiva para la tribu.
    reason: lexical_alternative
  - marker: b
    text: O «disputaron con él con fuerza» o «vehementemente». El hebreo dice literalmente «contendieron con él con fuerza».
    reason: lexical_alternative
  revision_rationale: Se corrige «has hecho con nosotros» a «nos has hecho» para reflejar con fidelidad el dativo hebreo de agravio. Se elimina la nota b defectuosa y se reemplaza por una nota útil sobre el cierre intensivo. También se aligera «con gran fuerza» a «con fuerza» para un español más natural, manteniendo la intensidad del hebreo y del audit trail inglés.
