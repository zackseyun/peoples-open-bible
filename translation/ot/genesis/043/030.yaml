id: GEN.43.30
reference: Genesis 43:30
source:
  edition: WLC
  text: וַ/יְמַהֵ֣ר יוֹסֵ֗ף כִּֽי נִכְמְר֤וּ רַחֲמָי/ו֙ אֶל אָחִ֔י/ו וַ/יְבַקֵּ֖שׁ לִ/בְכּ֑וֹת וַ/יָּבֹ֥א הַ/חַ֖דְרָ/ה וַ/יֵּ֥בְךְּ שָֽׁמָּ/ה־־׃
translation:
  text: Then Joseph hurried[a], because his compassion for his brother was stirred, and he sought a place to weep[b]. He entered the room and wept there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'his feelings for his brother were deeply stirred.' The Hebrew idiom literally speaks of his compassions being stirred.
    reason: lexical_alternative
  - marker: b
    text: Or, 'he looked for a place to weep.' The Hebrew more literally says, 'he sought to weep.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְמַהֵר
  chosen: hurried out
  alternatives:
  - hurried
  - made haste
  lexicon: HALOT
  rationale: The verb means to hasten. English 'hurried out' makes the motion implied by the following sequence natural in context, as Joseph quickly leaves the public setting before entering a private room.
- source_word: נִכְמְרוּ רַחֲמָיו
  chosen: his compassion ... was stirred up
  alternatives:
  - his feelings were deeply moved
  - his tender mercies were aroused
  - his inward parts yearned
  lexicon: HALOT
  rationale: The idiom combines a verb of being stirred/warmed with 'compassions/mercies.' 'His compassion was stirred up' preserves the emotional intensity without using archaic bodily idiom.
- source_word: אֶל אָחִיו
  chosen: for his brother
  alternatives:
  - toward his brother
  - for his brother Benjamin
  lexicon: HALOT
  rationale: The preposition here marks the direction/object of Joseph's emotion. 'For his brother' is idiomatic English and keeps the text's wording without adding the name Benjamin into the main text.
- source_word: וַיְבַקֵּשׁ לִבְכּוֹת
  chosen: he sought a place to weep
  alternatives:
  - he looked for a place to weep
  - he wanted to weep
  lexicon: HALOT
  rationale: The Hebrew literally says he sought to weep. In context, he is looking for privacy in order to cry, so 'a place to weep' makes the implied object explicit in natural English without substantial paraphrase.
- source_word: הַחַדְרָה
  chosen: the room
  alternatives:
  - the chamber
  - an inner room
  lexicon: HALOT
  rationale: The noun denotes a room/chamber, likely a private interior space. 'The room' is clear modern English; 'chamber' is more formal but less natural.
- source_word: וַיֵּבְךְּ שָׁמָּה
  chosen: and wept there
  alternatives:
  - and cried there
  lexicon: HALOT
  rationale: Standard rendering of the verb for weeping. 'There' preserves the locative emphasis of שָׁמָּה.
