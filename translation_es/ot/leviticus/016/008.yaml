translation:
  language: es
  text: 'Y Aarón echará suertes sobre los dos cabríos: una suerte para Yahvé y una suerte para Azazel[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «para el chivo expiatorio». El término hebreo «Azazel» es discutido; puede entenderse como nombre propio, como la función del cabrío o como un término relacionado con la remoción.
    reason: alternative_reading
lexical_decisions:
- source_word: וְנָתַן
  english_pob_choice: shall cast
  chosen_spanish: echará suertes
  alternatives_spanish:
  - pondrá
  - colocará
  - dará
  lexicon: HALOT
  rationale: El hebreo literalmente dice 'dar/poner', pero con גּוֹרָלוֹת y עַל el sentido ritual es echar o sortear. 'Echará suertes' conserva el acto idiomático en español sin perder la imagen ceremonial.
- source_word: עַל
  english_pob_choice: over
  chosen_spanish: sobre
  alternatives_spanish:
  - encima de
  - por encima de
  - para
  lexicon: HALOT
  rationale: '''Sobre'' mantiene la preposición de contacto/ubicación del hebreo y preserva la imagen ritual de las suertes lanzadas sobre los dos animales.'
- source_word: שְׁנֵי הַשְּׂעִירִם
  english_pob_choice: the two goats
  chosen_spanish: los dos machos cabríos
  alternatives_spanish:
  - los dos cabros
  - los dos chivos
  lexicon: HALOT
  rationale: שְּׂעִירִם puede designar cabros o machos cabríos; en contexto ritual, 'machos cabríos' es preciso y natural en español bíblico, y explicita el sexo que el hebreo sugiere.
- source_word: גּוֹרָל֑וֹת
  english_pob_choice: lots
  chosen_spanish: suertes
  alternatives_spanish:
  - lotes
  - sortes
  lexicon: HALOT
  rationale: '''Suertes'' es el equivalente tradicional y claro para objetos/acciones de sorteo ritual; evita el tecnicismo menos natural ''lotes''.'
- source_word: גּוֹרָל אֶחָד
  english_pob_choice: one lot
  chosen_spanish: una suerte
  alternatives_spanish:
  - una porción por suerte
  - un sorteo
  lexicon: HALOT
  rationale: La repetición singular del hebreo se reproduce con 'una suerte', que suena natural y refleja la distribución paralela del verso.
- source_word: לַיהוָה
  english_pob_choice: for the LORD
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - para el SEÑOR
  - para Yahvé
  lexicon: HALOT
  rationale: 'Se sigue la norma del proyecto: YHWH se vierte ''Yahvé'' en el texto principal, preservando el nombre divino sin el sustituto reverencial ''SEÑOR''.'
- source_word: לַעֲזָאזֵל
  english_pob_choice: for Azazel
  chosen_spanish: para Azazel
  alternatives_spanish:
  - para el chivo expiatorio
  - para la remoción completa
  lexicon: HALOT
  rationale: Se conserva 'Azazel' como transliteración en el texto principal para mantener la ambigüedad del término hebreo y no resolver de antemano su sentido disputado.
theological_decisions:
- issue: Sentido de עֲזָאזֵל
  english_pob_reading: Azazel as a transliterated proper name left untranslated in the main text
  chosen_spanish_reading: Azazel transliterado en el texto principal
  alternative_spanish_readings:
  - el chivo expiatorio
  - la remoción completa
  - una figura del desierto o personal
  rationale: El pasaje no decide de forma inequívoca si el término alude a un nombre propio, a la función del macho cabrío o a una entidad asociada al desierto. La transliteración preserva la tensión textual y evita imponer una interpretación que el hebreo no explicita.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it; §2: Translate titles; transliterate names'
translation_notes:
  revision_awareness: 'El borrador sigue el pasaje hebreo masorético y coincide con la revisión inglesa más reciente: se mantiene la ambigüedad de עֲזָאזֵל en el texto principal y se conserva una nota alternativa para la lectura tradicional ''chivo expiatorio''.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' conforme al estándar del proyecto para יהוה.
  - Se usa 'machos cabríos' para reflejar con precisión el hebreo en un contexto sacrificial.
  - '''Echará suertes'' conserva el acto ritual y es idiomático en español.'
  - Se evita 'SEÑOR' y 'Cristo' porque no corresponden al hebreo de este versículo.
