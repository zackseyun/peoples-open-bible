    reason: lexical_alternative
  - marker: c
    text: El hebreo dice literalmente «y el hombre fue y tocó los huesos de Eliseo», probablemente describiendo el movimiento del cuerpo dentro de la sepultura antes del contacto.
    reason: cultural_note
  revision_rationale: Se corrige el error grave de nombre propio ('Elías' → 'Eliseo') para alinearlo con אֱלִישָׁע y con el POB inglés. También se mejora הַגְּדוּד a 'banda de salteadores' por mayor naturalidad y precisión contextual en español. Se conservan la estructura narrativa, la nota sobre 'tumba/sepultura' y la afirmación clara del milagro.
