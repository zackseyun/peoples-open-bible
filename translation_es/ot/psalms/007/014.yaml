translation:
  language: es
  text: Y para él ha preparado armas de muerte[a]; hace ardientes sus flechas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hace sus flechas para perseguidores» o «contra perseguidores». El término hebreo puede entenderse desde un verbo que significa «perseguir» más que «arder»; la traducción principal sigue la imagen bélica común de flechas encendidas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלֹו
  english_pob_choice: And for him
  chosen_spanish: Y para él
  alternatives_spanish:
  - Y para sí
  - Y también para él
  lexicon: HALOT
  rationale: 'La preposición con sufijo de tercera persona masculina singular expresa aquí destinatario o beneficiario: ''para él''. En español, ''para sí'' sugeriría de forma más fuerte una acción reflexiva del mismo sujeto, algo menos seguro en el hebreo del verso.'
- source_word: הֵכִין
  english_pob_choice: he has prepared
  chosen_spanish: ha preparado
  alternatives_spanish:
  - preparó
  - ha hecho listo
  lexicon: HALOT
  rationale: El verbo en hifil de כון comunica 'preparar, disponer, dejar listo'. El pretérito perfecto español mantiene la acción completada con relevancia actual, como en la POB inglesa.
- source_word: כְּלֵי מָוֶת
  english_pob_choice: weapons of death
  chosen_spanish: armas de muerte
  alternatives_spanish:
  - instrumentos de muerte
  - armas mortíferas
  lexicon: HALOT
  rationale: כְּלִי es un término amplio para utensilio, instrumento o arma. En este contexto bélico, 'armas' comunica con naturalidad el campo semántico. 'De muerte' conserva la construcción nominal hebrea y la fuerza letal del giro.
- source_word: חִצָּיו
  english_pob_choice: his arrows
  chosen_spanish: sus flechas
  alternatives_spanish:
  - sus saetas
  - sus dardos
  lexicon: HALOT
  rationale: El sustantivo plural con sufijo posesivo se traduce de manera directa. 'Flechas' es el equivalente más claro y natural en español actual.
- source_word: לְדֹלְקִים
  english_pob_choice: fiery
  chosen_spanish: ardientes
  alternatives_spanish:
  - de fuego
  - encendidas
  - para perseguidores
  lexicon: HALOT
  rationale: El participio de דלק admite lectura de 'arder' o de 'perseguir'. La imagen de flechas 'ardientes' preserva la lectura marcial más extendida y funciona bien en español. Se evita cerrar de manera excesiva una ambigüedad real del hebreo.
- source_word: יִפְעָל
  english_pob_choice: he makes
  chosen_spanish: hace
  alternatives_spanish:
  - obra
  - prepara
  - fabrica
  lexicon: HALOT
  rationale: פעל en qal puede significar 'hacer, obrar'. 'Hace ardientes' es breve y idiomático en español, y refleja la acción verbal aplicada a las flechas.
translation_notes:
  revision_awareness: Se siguió el texto hebreo consonante/vocalizado proporcionado y el auditable de la POB inglesa sin cambios de fondo. No hubo revisiones aplicadas en el historial más reciente; el punto lexical relevante sigue siendo la ambigüedad de לְדֹלְקִים, que se mantiene con nota.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' fuera del versículo porque no aparece el tetragrámaton en este hebreo.
  - Se prefirió 'armas' sobre 'instrumentos' por naturalidad contextual en español, sin perder el valor militar del hebreo כְּלִי.
  - La nota preserva la tensión lexical de לְדֹלְקִים sin resolverla de forma unilateral.
