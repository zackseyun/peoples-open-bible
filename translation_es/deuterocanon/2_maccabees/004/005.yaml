translation:
  language: es
  text: se presentó ante el rey, no convirtiéndose en acusador de sus conciudadanos, sino procurando lo que era ventajoso[a] tanto públicamente como en privado para toda la multitud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «pero buscando lo que era beneficioso tanto para la comunidad como para cada individuo del pueblo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: διεκοσμήθη
  english_pob_choice: presented himself
  chosen_spanish: se presentó
  alternatives_spanish:
  - se hizo presentar
  - fue presentado
  - se condujo
  lexicon: LSJ
  rationale: El pasivo de διακοσμέω aquí no se traduce con un literalismo de «adornar», sino con la idea idiomática de comparecer o presentarse ante el rey. «Se presentó» mantiene la escena cortesana y la acción voluntaria sin añadir contenido.
- source_word: οὐ γινόμενος
  english_pob_choice: not becoming
  chosen_spanish: no convirtiéndose en
  alternatives_spanish:
  - no actuando como
  - no siendo
  lexicon: LSJ
  rationale: El participio expresa modo o actitud al acercarse al rey. «No convirtiéndose en» conserva esa fuerza procesual; en español suena más natural que un calco rígido y sigue dejando visible la tensión del giro participial.
- source_word: τῶν πολιτῶν
  english_pob_choice: his fellow citizens
  chosen_spanish: sus conciudadanos
  alternatives_spanish:
  - sus compatriotas
  - los ciudadanos
  lexicon: LSJ
  rationale: πολῖται señala a los miembros del mismo cuerpo cívico. «Sus conciudadanos» conserva la relación cívica y personal que el inglés expresó con «his fellow citizens».
- source_word: κατήγορος
  english_pob_choice: accuser
  chosen_spanish: acusador
  alternatives_spanish:
  - denunciante
  - procurador
  lexicon: LSJ
  rationale: «Acusador» reproduce el sentido forense básico sin convertir la figura en un cargo técnico como «procurador». Mantiene el matiz de denuncia contra los propios.
- source_word: τὸ δὲ σύμφορον
  english_pob_choice: what was advantageous
  chosen_spanish: lo que era ventajoso
  alternatives_spanish:
  - lo que era beneficioso
  - lo conveniente
  lexicon: LSJ
  rationale: El sustantivo abstracto apunta a lo útil, provechoso o ventajoso. «Lo que era ventajoso» sigue de cerca el valor del original y evita cerrar el sentido en una sola formulación ética.
- source_word: κοινῇ καὶ κατʼ ἰδίαν
  english_pob_choice: both publicly and privately
  chosen_spanish: tanto públicamente como en privado
  alternatives_spanish:
  - tanto en común como en particular
  - tanto para la comunidad como para cada uno
  lexicon: LSJ
  rationale: La pareja contrasta el bien en el ámbito común y el bien en el ámbito particular. «Tanto públicamente como en privado» refleja bien el paralelismo y conserva la revisión inglesa que aclaró la frase sin perder su doble alcance.
- source_word: παντὶ τῷ πλήθει
  english_pob_choice: the whole multitude
  chosen_spanish: para toda la multitud
  alternatives_spanish:
  - para todo el pueblo
  - para la entera multitud
  lexicon: LSJ
  rationale: πλῆθος designa la masa o conjunto del pueblo. «Toda la multitud» mantiene la amplitud del referente; añadí «para» para enlazar con el infinitivo final en español de manera natural.
theological_decisions:
- issue: Cómo presentar la acción de acercarse al rey sin cargarla de juicio moral excesivo
  english_pob_reading: The verse portrays him as appealing to the king without denouncing his fellow citizens, aiming at benefit for the people as a whole and individually.
  chosen_spanish_reading: El verso lo presenta acercándose al rey sin convertirse en acusador de sus conciudadanos, y buscando el bien de todos en los ámbitos público y privado.
  alternative_spanish_readings:
  - lo presenta intercediendo ante el rey sin acusar a sus conciudadanos
  - lo presenta compareciendo ante el rey en favor del pueblo
  rationale: La frase griega combina una acción de comparecer ante el rey con la negación de una postura acusatoria. La traducción conserva esa tensión ética sin convertirla en una paráfrasis interpretativa; el foco sigue estando en la ausencia de acusación y en la búsqueda del provecho común e individual.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; optimal equivalence'
- issue: Alcance de κοινῇ καὶ κατʼ ἰδίαν en la última cláusula
  english_pob_reading: both publicly and privately
  chosen_spanish_reading: tanto públicamente como en privado
  alternative_spanish_readings:
  - para el bien común y para cada uno
  - en común y en particular
  rationale: La expresión permite distinguir el beneficio en la esfera colectiva y en la esfera individual. «Tanto públicamente como en privado» sigue la revisión inglesa que optó por claridad natural y mantiene abierta la posibilidad de un matiz comunitario e individual, sin forzarlo.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; optimal equivalence'
translation_notes:
  revision_awareness: El texto inglés base pasó de una formulación más cercana a «for the common good and privately» a la revisión final «both publicly and privately», para reflejar con mayor precisión κοινῇ καὶ κατʼ ἰδίαν. La versión española sigue esa lectura revisada y conserva el paralelismo público/privado sin eliminar el posible matiz de bien comunitario e individual que el pie inglés ya dejó abierto.
  spanish_consistency_notes:
  - Se mantuvo «rey» sin mayúscula por estilo español contemporáneo, salvo cuando el contexto exigiera título honorífico específico.
  - Se usó «multitud» para πλῆθος, coherente con el valor colectivo señalado en el audit trail.
  - Se evitó «beneficioso» en el texto principal para no sonar más interpretativo que «ventajoso», pero se ofreció como alternativa en la nota.
  - La construcción «no convirtiéndose en acusador» conserva la forma participial del griego, aunque el español sea algo más explícito que una simple coordinación.
