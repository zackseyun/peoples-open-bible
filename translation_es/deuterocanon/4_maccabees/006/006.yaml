translation:
  language: es
  text: 'Pero no, no, no: alzando los ojos hacia el cielo[a], el anciano estaba exponiendo su carne a los azotes, y chorreaba sangre[b], y sus costados eran traspasados[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «levantando los ojos hacia el cielo». El griego describe un gesto físico ascendente; la redacción española elegida procura mantener esa vividez de manera natural.
    reason: lexical_alternative
  - marker: b
    text: O «corría sangre». La expresión griega subraya el derramamiento continuo o la abundancia de sangre.
    reason: lexical_alternative
  - marker: c
    text: O «sus costillas eran heridas». πλευρά puede referirse de modo más específico a la zona de las costillas.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ ἀλλὰ ἀλλὰ
  english_pob_choice: But no—no—no!
  chosen_spanish: Pero no, no, no
  alternatives_spanish:
  - Pero, pero, pero
  - No, no, no
  - Pero de ningún modo
  lexicon: LSJ
  rationale: La triple ἀλλὰ expresa una negación enfática y brusca. En español, «Pero no, no, no» conserva la interrupción y la fuerza retórica mejor que repetir solo «pero».
- source_word: ὑψηλοὺς ἀντείνας εἰς τὸν οὐρανὸν τοὺς ὀφθαλμούς
  english_pob_choice: Lifting his eyes high toward heaven
  chosen_spanish: levantando en alto sus ojos hacia el cielo
  alternatives_spanish:
  - alzando sus ojos al cielo
  - levantando sus ojos en alto hacia el cielo
  - alzando en alto sus ojos hacia el cielo
  lexicon: LSJ
  rationale: La frase describe un gesto corporal ascendente. «Levantando en alto sus ojos» mantiene el movimiento físico sin sonar forzado en español.
- source_word: ἀπέφαινετο
  english_pob_choice: was exposing
  chosen_spanish: estaba exponiendo
  alternatives_spanish:
  - estaba mostrando
  - estaba dejando ver
  - estaba exhibiendo
  lexicon: LSJ
  rationale: El verbo sugiere que la carne queda manifiesta a causa del azote. «Estaba exponiendo» conserva esa idea de quedar al descubierto, como en la decisión inglesa.
- source_word: ταῖς μάστιξιν
  english_pob_choice: to the whips
  chosen_spanish: a los azotes
  alternatives_spanish:
  - bajo los azotes
  - a las correas
  - a los látigos
  lexicon: LSJ
  rationale: La dación griega es instrumental/relacional. En español, «a los azotes» comunica de modo natural la acción del castigo corporal sin perder el tono severo.
- source_word: τὰς σάρκας
  english_pob_choice: his flesh
  chosen_spanish: su carne
  alternatives_spanish:
  - su cuerpo
  - su piel
  - su carne corporal
  lexicon: LSJ
  rationale: σάρξ aquí es literal y físico; «carne» conserva el valor léxico directo que el proyecto pide mantener en contextos corporales.
- source_word: ὁ γέρων
  english_pob_choice: the old man
  chosen_spanish: el anciano
  alternatives_spanish:
  - el viejo
  - el hombre anciano
  - el envejecido
  lexicon: LSJ
  rationale: «Anciano» es natural, digno y fiel al dato de edad que intensifica el pathos de la escena.
- source_word: κατερρεῖτο τῷ αἵματι
  english_pob_choice: was streaming with blood
  chosen_spanish: se desangraba
  alternatives_spanish:
  - estaba chorreando sangre
  - corría en sangre
  - iba cubriéndose de sangre
  lexicon: LSJ
  rationale: La imagen griega indica derramamiento continuo de sangre. «Se desangraba» transmite de forma viva el flujo intenso y el deterioro físico, compatible con la lectura inglesa revisada.
- source_word: τὰ πλευρὰ
  english_pob_choice: his sides
  chosen_spanish: sus costados
  alternatives_spanish:
  - sus lados
  - sus costillas
  - su costado
  lexicon: LSJ
  rationale: πλευρά puede referirse a la zona lateral del torso. «Costados» conserva amplitud y evita restringirlo solo a las costillas.
- source_word: κατετιτρώσκετο
  english_pob_choice: were being pierced
  chosen_spanish: eran heridos
  alternatives_spanish:
  - eran traspasados
  - eran atravesados
  - eran lacerados
  lexicon: LSJ
  rationale: El verbo expresa daño repetido y continuo en la zona lateral. «Eran heridos» es más natural en español y suficientemente fiel al valor de ser alcanzados/dañados por los golpes.
theological_decisions:
- issue: Traducción de σάρξ en contexto de tortura física
  english_pob_reading: literal bodily 'flesh'
  chosen_spanish_reading: «carne» en sentido corporal literal
  alternative_spanish_readings:
  - cuerpo
  - piel
  - naturaleza humana
  rationale: Aquí no hay un uso metafórico o doctrinal de σάρξ, sino una referencia directa al cuerpo martirizado. Por eso se conserva «carne», conforme al valor léxico literal y al criterio del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, σάρξ'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del inglés POB: preferencia por una formulación más natural del participio, mantenimiento de la imagen de sangre como flujo continuo y simplificación del daño a los costados. La versión española sigue esas decisiones sin depender mecánicamente del inglés.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera de esta unidad porque no aparece el nombre divino en el texto.
  - Se conservó «carne» para σάρξ, alineado con el criterio doctrinal del proyecto.
  - «Anciano» traduce ὁ γέρων con tono natural y respetuoso.
  - Las notas al pie están ancladas donde hay alternativas relevantes en español y usan marcadores únicos.
