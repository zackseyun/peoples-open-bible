  yaml_path: translation/ot/leviticus/005/007.yaml
  text: But if his means do not suffice for a sheep[a], then he shall bring as his guilt offering for the sin that he committed two turtledoves or two young pigeons to Yahweh, one for a sin offering and one for a burnt offering.
