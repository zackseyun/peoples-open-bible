review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del hebreo y del POB inglés: imperativos sucesivos dirigidos a convocar al ejército, con propósito final de entrada por las puertas. «Monte desnudo», «señal», «levantad la voz», «agitad la mano» y «los nobles» reflejan adecuadamente las decisiones léxicas auditadas. Sin embargo, hay un problema textual en las notas: el orden y anclaje de los marcadores no preserva correctamente la distribución del POB inglés, y una nota contiene un carácter ajeno («այլ»), lo que requiere corrección editorial.'
  spanish_quality_summary: El español es claro, natural y digno. «Sobre un monte desnudo, alzad una señal; levantad la voz hacia ellos; agitad la mano, para que entren por las puertas de los nobles» es bien legible y fiel. Conviene solo ajustar el anclaje de notas para que la alternativa sobre «príncipes» corresponda a «nobles», no a «mano», y limpiar la errata tipográfica de la nota c.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Las elecciones principales son coherentes con el razonamiento léxico documentado: נֵס -> «señal», נְדִיבִים -> «nobles», הָנִיפוּ יָד -> «agitad la mano». No intervienen términos sensibles como Yahvé/Mesías/Espíritu.'
  issues:
  - severity: medium
    issue: Desajuste de anclaje y orden de notas respecto al contenido
    rationale: En el POB inglés, la nota sobre «the gates of the princes» corresponde a נְדִיבִים, mientras que la de «beckon with the hand» corresponde a הָנִיפוּ יָד. En el borrador español los marcadores están puestos de forma convencional, pero la tarea exige marcadores únicos y correctamente anclados al elemento pertinente; conviene dejar inequívocamente [b] en «mano» y [c] en «nobles».
  - severity: high
    issue: Errata no española en la nota c
    rationale: La frase «u այլ altos dignatarios» contiene texto armenio («այլ»), lo que es un error editorial claro y afecta la calidad final del registro.
  revised_spanish_text: Sobre un monte desnudo, alzad una señal[a]; levantad la voz hacia ellos; agitad la mano[b], para que entren por las puertas de los nobles[c].
  revised_footnotes:
  - marker: a
    text: O «bandera» o «estandarte» para «señal». El hebreo נֵס suele denotar una insignia alzada para reunir o dirigir tropas.
    reason: lexical_alternative
  - marker: b
    text: O «haced señas con la mano». El gesto probablemente funciona como una convocatoria a la fuerza atacante.
    reason: lexical_alternative
  - marker: c
    text: O «de los príncipes». נְדִיבִים puede designar nobles, príncipes u otros altos dignatarios.
    reason: lexical_alternative
  revision_rationale: 'La revisión es menor pero necesaria: se conserva el texto principal, se fija de forma explícita el anclaje correcto de las notas léxicas en español y se corrige la errata tipográfica de la nota c para que el registro sea publicable y plenamente coherente con la evidencia fuente y el rastro de auditoría inglés.'
