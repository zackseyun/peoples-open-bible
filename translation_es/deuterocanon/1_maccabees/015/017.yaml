translation:
  language: es
  text: Los enviados de los judíos llegaron a nosotros, amigos y aliados nuestros[a], renovando la amistad y la alianza desde el principio, enviados por Simón el sumo sacerdote y por el pueblo de los judíos[b];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «embajadores» para «enviados»; el término griego designa representantes diplomáticos oficiales.
    reason: lexical_alternative
  - marker: b
    text: «El pueblo de los judíos» también puede traducirse «la nación de los judíos» o «la asamblea de los judíos», ya que el griego puede designar al pueblo como cuerpo cívico.
    reason: lexical_alternative
lexical_decisions:
- source_word: πρεσβευταὶ
  english_pob_choice: envoys
  chosen_spanish: enviados
  alternatives_spanish:
  - embajadores
  - delegados
  lexicon: LSJ
  rationale: πρεσβευτής designa un representante oficial en misión diplomática. «Enviados» es natural en español y conserva la función diplomática sin sonar demasiado técnica o ceremonial. «Embajadores» sería posible, pero puede sugerir un rango moderno más específico que el griego no exige.
- source_word: φίλοι
  english_pob_choice: friends
  chosen_spanish: amigos
  alternatives_spanish:
  - amigos cercanos
  - aliados amistosos
  lexicon: LSJ
  rationale: En este contexto diplomático, φίλοι expresa una relación reconocida de amistad política. «Amigos» es la equivalencia directa y clara en español, sin suavizar el valor relacional del término.
- source_word: σύμμαχοι
  english_pob_choice: allies
  chosen_spanish: aliados
  alternatives_spanish:
  - confederados
  - socios de alianza
  lexicon: LSJ
  rationale: σύμμαχος es un término político-militar estándar para «aliado». «Aliados» transmite de manera más directa y natural ese valor en español.
- source_word: ἀνανεούμενοι
  english_pob_choice: renewing
  chosen_spanish: renovando
  alternatives_spanish:
  - reafirmando
  - reviviendo
  lexicon: LSJ
  rationale: El participio indica hacer nuevo otra vez o renovar. «Renovando» mantiene el matiz verbal y funciona bien en el marco de una relación diplomática que se vuelve a confirmar.
- source_word: ἐξ ἀρχῆς
  english_pob_choice: from the beginning
  chosen_spanish: desde el principio
  alternatives_spanish:
  - desde el comienzo
  - de antiguo
  lexicon: LSJ
  rationale: La frase remite al establecimiento original de la relación. «Desde el principio» es transparente, idiomático y fiel al punto de partida señalado por el griego.
- source_word: φιλίαν
  english_pob_choice: friendship
  chosen_spanish: amistad
  alternatives_spanish:
  - amistas
  - relación de amistad
  lexicon: LSJ
  rationale: En lenguaje diplomático φιλία puede ser una amistad formal o pactada. «Amistad» conserva esa sencillez y permite que el contexto político haga el trabajo interpretativo.
- source_word: συμμαχίαν
  english_pob_choice: alliance
  chosen_spanish: alianza
  alternatives_spanish:
  - pacto de alianza
  - liga
  lexicon: LSJ
  rationale: El sustantivo denota una alianza como arreglo político. «Alianza» es el equivalente estándar y claro en español.
- source_word: ἀπεσταλμένοι
  english_pob_choice: having been sent
  chosen_spanish: habiendo sido enviados
  alternatives_spanish:
  - enviados
  - comisionados
  lexicon: LSJ
  rationale: El participio perfecto pasivo conserva la relación con la cláusula anterior y señala la acción previa de envío. «Habiendo sido enviados» refleja ese valor sin introducir más interpretación de la necesaria.
- source_word: ἀπὸ Σιμωνος τοῦ ἀρχιερέως
  english_pob_choice: by Simon the high priest
  chosen_spanish: por Simón el sumo sacerdote
  alternatives_spanish:
  - de parte de Simón el sumo sacerdote
  - por Simón, el jefe de los sacerdotes
  lexicon: LSJ
  rationale: La revisión inglesa entendió ἀπό aquí con valor de agencia («por»), y el español lo sigue de forma natural. «Sumo sacerdote» es la equivalencia usual y fiel de ἀρχιερεύς.
- source_word: τοῦ δήμου τῶν Ἰουδαίων
  english_pob_choice: the people of the Jews
  chosen_spanish: por el pueblo de los judíos
  alternatives_spanish:
  - por la nación de los judíos
  - por la asamblea de los judíos
  lexicon: LSJ
  rationale: δῆμος puede referirse al pueblo como cuerpo cívico. «Pueblo» preserva ese sentido colectivo sin cargarlo con una formalidad constitucional que el griego no exige.
theological_decisions:
- issue: 'Valor de ἀπό en la cláusula de envío: agencia frente a procedencia'
  english_pob_reading: having been sent by Simon the high priest and by the people of the Jews
  chosen_spanish_reading: habiendo sido enviados por Simón el sumo sacerdote y por el pueblo de los judíos
  alternative_spanish_readings:
  - habiendo sido enviados desde Simón el sumo sacerdote y desde el pueblo de los judíos
  - habiendo sido enviados de parte de Simón el sumo sacerdote y de parte del pueblo de los judíos
  rationale: La lectura contextualmente más natural es de agencia, no mera procedencia espacial. El español usa «por» para reflejar quién los envía, en línea con la revisión auditada del inglés y sin perder la relación sintáctica del participio pasivo.
  doctrine_reference: Ninguna
- issue: φιλία y συμμαχία como términos políticos, no meramente afectivos
  english_pob_reading: friends and allies
  chosen_spanish_reading: amigos y aliados
  alternative_spanish_readings:
  - amigos íntimos y aliados
  - amigos de alianza
  rationale: El contexto de embajada muestra que no se trata solo de afecto privado, sino de una relación política reconocida. «Amigos y aliados» conserva ambas dimensiones sin añadir formulaciones no sustentadas por el texto.
  doctrine_reference: Ninguna
translation_notes:
  revision_awareness: 'Seguí la revisión auditada del inglés, especialmente el ajuste de "from" a "by" en la cláusula de envío, entendiendo ἀπὸ como agencia. Mantengo la estructura diplomática completa del griego: enviados/representantes, amistad y alianza renovadas, y origen del envío en Simón y el pueblo.'
  spanish_consistency_notes:
  - Usé «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - Conservé «sumo sacerdote» como equivalente estable de ἀρχιερεύς.
  - Elegí «enviados» frente a «embajadores» por naturalidad y fidelidad al rango diplomático sin sobre-especificar.
  - Mantuve «amistad» y «alianza» como términos formales, sin reemplazarlos por lenguaje eclesiástico posterior.
  - La puntuación reproduce la cadencia de una sola cláusula extensa, como en el griego.
