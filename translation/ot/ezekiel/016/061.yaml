theological_decisions:
- issue: Meaning of 'your covenant' in the closing clause
  chosen_reading: The restoration and incorporation of the 'sisters' is not grounded in Jerusalem's own covenantal standing or merit.
  alternative_readings:
  - It is not according to the covenant made by Jerusalem
  - It is not by virtue of any covenant belonging to Jerusalem
  rationale: The text contrasts God's giving action with any claim that it proceeds from Jerusalem's covenant. The translation avoids importing a full theological system and simply preserves the denial that the blessing arises from her covenantal status or achievement.
  doctrine_reference: Preserve theological tension rather than resolve it.
