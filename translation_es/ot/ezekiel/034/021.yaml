  to: Porque ustedes empujan con el costado y con el hombro, y cornean a todas las débiles[a] con sus cuernos hasta dispersarlas afuera.
  rationale: Se movió la nota al sintagma que realmente comenta («las débiles»), y se ajustó la cláusula final para reflejar mejor אֶל הַחוּצָה como expulsión hacia afuera. «Hasta dispersarlas afuera» suena natural en español, preserva el resultado de la acción abusiva y mantiene la imagen pastoral del hebreo sin parafrasear de más.
