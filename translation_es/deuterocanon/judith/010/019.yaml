revisions:
- from: 'Y se maravillaron[a] de su hermosura, y por causa de ella se maravillaron de los hijos de Israel; y cada uno dijo a su prójimo: «¿Quién despreciará a este pueblo, que tiene entre sí mujeres tales? Porque no es bueno que quede de entre ellos ni siquiera un hombre[b], pues los que queden podrán superar con astucia a toda la tierra».'
  to: 'Y se maravillaron de su hermosura, y por causa de ella se maravillaron de los hijos de Israel[a]; y cada uno dijo a su prójimo: «¿Quién despreciará a este pueblo, que tiene entre sí mujeres así? Porque no es bueno que quede de entre ellos ni siquiera un hombre[b], pues los que queden podrán burlar con astucia a toda la tierra».'
  rationale: Se corrige la ubicación y el contenido de la nota [a] para que refleje la alternativa auditada de τοὺς υἱοὺς Ἰσραήλ. Se mejora la naturalidad de «mujeres tales» a «mujeres así». Se ajusta la nota [b] para incluir las dos alternativas preservadas en inglés. Se afina κατασοφίσασθαι con «burlar con astucia», que comunica mejor la idea de vencer por sagacidad.
