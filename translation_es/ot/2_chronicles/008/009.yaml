translation:
  language: es
  text: Pero de entre los hijos de Israel[a], Salomón no hizo esclavos para su trabajo, porque ellos eran hombres de guerra, y sus capitanes[b], y los comandantes de sus carros y jinetes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas». El hebreo dice literalmente «los hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: O «sus oficiales». El término hebreo probablemente designa funcionarios militares de élite o ayudantes; «capitanes» es una posibilidad más concreta.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִן
  english_pob_choice: But from
  chosen_spanish: Pero de entre
  alternatives_spanish:
  - Y de entre
  - Pero de
  lexicon: HALOT
  rationale: El hebreo une continuidad y contraste con el versículo anterior; «pero de entre» conserva ambos matices con naturalidad en español.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: «Hijos de Israel» refleja con fidelidad la expresión hebrea y mantiene su color histórico sin perder inteligibilidad.
- source_word: לֹא נָתַן ... לַעֲבָדִים
  english_pob_choice: did not make slaves
  chosen_spanish: no los puso como esclavos
  alternatives_spanish:
  - no los hizo esclavos
  - no los asignó como esclavos
  lexicon: HALOT
  rationale: La construcción hebrea expresa poner a alguien en condición o labor de esclavitud; «los puso como esclavos» conserva esa fuerza sin sonar demasiado forzado en español.
- source_word: לִמְלַאכְתּוֹ
  english_pob_choice: for his work
  chosen_spanish: para su trabajo
  alternatives_spanish:
  - para su labor
  - para su obra
  lexicon: HALOT
  rationale: «Trabajo» es el equivalente más claro y amplio para מְלָאכָה en este contexto de labor asignada por el rey.
- source_word: כִּי הֵמָּה
  english_pob_choice: for they were
  chosen_spanish: porque ellos eran
  alternatives_spanish:
  - pues ellos eran
  - ya que ellos eran
  lexicon: HALOT
  rationale: La causalidad es explícita; «porque» reproduce bien la relación explicativa del hebreo.
- source_word: אַנְשֵׁי מִלְחָמָה
  english_pob_choice: men of war
  chosen_spanish: hombres de guerra
  alternatives_spanish:
  - guerreros
  - hombres guerreros
  lexicon: HALOT
  rationale: «Hombres de guerra» sigue de cerca la frase hebrea y conserva su tono idiomático y militar.
- source_word: שָׂרֵי שָׁלִישָׁיו
  english_pob_choice: his captains
  chosen_spanish: sus capitanes
  alternatives_spanish:
  - sus oficiales
  - sus comandantes
  lexicon: HALOT
  rationale: El término es de difícil precisión; el audit trail inglés prefirió «captains» tras revisar «officers». En español, «capitanes» comunica un rango militar adecuado sin imponer una especificidad no segura.
- source_word: שָׂרֵי רִכְבּוֹ
  english_pob_choice: the commanders of his chariots
  chosen_spanish: los comandantes de sus carros
  alternatives_spanish:
  - los capitanes de sus carros
  - los oficiales de sus carros
  lexicon: HALOT
  rationale: «Comandantes» expresa bien la idea de jefatura militar; «carros» mantiene la referencia al carro de guerra sin añadir interpretaciones.
- source_word: וּפָרָשָׁיו
  english_pob_choice: his horsemen
  chosen_spanish: sus jinetes
  alternatives_spanish:
  - su caballería
  - sus hombres de a caballo
  lexicon: HALOT
  rationale: «Jinetes» es el equivalente natural y transparente en español para פָרָשִׁים.
theological_decisions:
- issue: Referencia a la esclavitud/servicio forzado de israelitas
  english_pob_reading: did not make slaves for his work
  chosen_spanish_reading: no los puso como esclavos para su trabajo
  alternative_spanish_readings:
  - no los hizo esclavos para su trabajo
  - no los asignó a trabajo esclavo
  rationale: El hebreo expresa una asignación a esclavitud o labor forzada; no suavizo la idea a «siervos» para no perder la tensión histórica y lexical que el texto presenta.
  doctrine_reference: Éxodo 1; 1 Reyes 9:22
- issue: Término militar administrativo para שָׂרֵי שָׁלִישָׁיו
  english_pob_reading: his captains
  chosen_spanish_reading: sus capitanes
  alternative_spanish_readings:
  - sus oficiales
  - sus comandantes
  rationale: La evidencia auditada permite una traducción más militar que «oficiales». Mantengo un término amplio pero marcial para no fijar una función más precisa de la que el hebreo garantiza.
  doctrine_reference: 2 Samuel 23:8; 1 Crónicas 12:18
translation_notes:
  revision_awareness: Seguí la última revisión inglesa que eliminó «any» y prefirió una lectura militar más directa para שָׂרֵי שָׁלִישָׁיו. Por eso opté por «sus capitanes» en lugar de «sus oficiales», y mantuve una formulación concisa para לֹא נָתַן ... לַעֲבָדִים sin añadir palabras no exigidas por el hebreo.
  spanish_consistency_notes:
  - Usé «Yahvé» solo cuando el texto lo requiera explícitamente; aquí no aparece el nombre divino.
  - Mantuve «hijos de Israel» como fórmula de mayor cercanía al hebreo, consistente con el registro histórico del libro.
  - Conservé la distinción entre «hombres de guerra», «capitanes», «comandantes» y «jinetes» para reflejar la lista militar del verso.
