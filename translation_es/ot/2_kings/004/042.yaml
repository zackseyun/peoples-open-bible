translation:
  language: es
  text: 'Y un hombre vino de Baal-salishá y trajo al hombre de Dios pan de las primicias, veinte panes de cebada y grano fresco[a] en su saco[b]. Y él dijo: «Dáselo al pueblo, para que coman».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «grano tostado». El término hebreo puede referirse a grano preparado para comer, no simplemente a grano fresco.
    reason: lexical_alternative
  - marker: b
    text: El sustantivo hebreo traducido «saco» es raro e incierto; puede aludir a una bolsa, un envoltorio o incluso al grano en su cáscara.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - alguien
  lexicon: HALOT
  rationale: El sustantivo designa de forma directa a una persona masculina individual; «un hombre» conserva el sentido simple y natural del hebreo.
- source_word: מִבַּעַל שָׁלִשָׁה
  english_pob_choice: from Baal-shalishah
  chosen_spanish: de Baal-salisá
  alternatives_spanish:
  - de Baal-Shalisá
  lexicon: HALOT
  rationale: Es un nombre de lugar y debe transliterarse. «Baal-salisá» sigue la forma española más natural sin traducir el topónimo.
- source_word: אִישׁ הָאֱלֹהִים
  english_pob_choice: the man of God
  chosen_spanish: el hombre de Dios
  alternatives_spanish:
  - el profeta
  lexicon: HALOT
  rationale: Se conserva el giro hebreo literal «hombre de Dios», porque el texto usa ese título y no una explicación interpretativa como «profeta».
- source_word: לֶחֶם בִּכּוּרִים
  english_pob_choice: bread of the firstfruits
  chosen_spanish: pan de las primicias
  alternatives_spanish:
  - pan de los primeros frutos
  - pan de la primicia
  lexicon: HALOT
  rationale: «Primicias» reproduce bien el valor cultual del constructo y suena natural en español bíblico. «Pan de las primicias» mantiene la relación formal sin sobreexplicar.
- source_word: עֶשְׂרִים לֶחֶם שְׂעֹרִים
  english_pob_choice: twenty loaves of barley
  chosen_spanish: veinte panes de cebada
  alternatives_spanish:
  - veinte hogazas de cebada
  - veinte panes de cebada
  lexicon: HALOT
  rationale: En enumeraciones, לֶחֶם puede equivaler a «panes»; el complemento «de cebada» conserva el sustantivo de cereal sin añadir más de lo que da el hebreo.
- source_word: כַרְמֶל
  english_pob_choice: fresh grain
  chosen_spanish: grano fresco
  alternatives_spanish:
  - grano tostado
  - grano tostado al fuego
  - espigas
  lexicon: HALOT
  rationale: El término es raro y el contexto admite un alimento de cereal preparado o apto para comer. «Grano fresco» mantiene la amplitud semántica que la POB inglesa preserva al dejar abierta la alternativa de «parched grain».
- source_word: בְּצִקְלֹנוֹ
  english_pob_choice: in his sack
  chosen_spanish: en su saco
  alternatives_spanish:
  - en su bolsa
  - en su envoltorio
  lexicon: HALOT
  rationale: La palabra es rara y no segura; «saco» da un sentido claro y sobrio en español. Se conserva la referencia posesiva «su» porque el contexto indica el recipiente del hombre que trae la ofrenda.
- source_word: תֵּן לָעָם וְיֹאכֵלוּ
  english_pob_choice: Give it to the people, so that they may eat
  chosen_spanish: Dáselo al pueblo, para que coman
  alternatives_spanish:
  - Dáselo al pueblo, y que coman
  - Ponlo delante del pueblo, para que coman
  lexicon: HALOT
  rationale: El imperativo y el verbo final expresan finalidad. «Dáselo al pueblo, para que coman» conserva la claridad del mandato y el resultado esperado en español.
translation_notes:
  revision_awareness: La versión inglesa revisada sustituyó el signo de dos puntos por comas para reflejar mejor la lista appositiva del hebreo. La redacción española sigue esa misma decisión de puntuación, manteniendo la secuencia nominal sin una ruptura innecesaria.
  spanish_consistency_notes:
  - Se usa «Yahvé» como convención del proyecto solo cuando aparece el tetragrámaton; aquí no hay יהוה.
  - Se mantiene «hombre de Dios» en vez de «profeta» para conservar el título literal del hebreo.
  - «Primicias» se emplea en sentido cultual, coherente con el uso bíblico español y con la construcción hebrea.
  - 'La puntuación reproduce la lista acumulativa del hebreo: pan de las primicias, veinte panes de cebada y grano fresco.'
