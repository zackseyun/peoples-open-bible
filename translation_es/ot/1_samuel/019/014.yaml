translation:
  language: es
  text: 'Entonces Saúl envió mensajeros para capturar a David[a], y ella dijo: «Está enfermo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice simplemente «y dijo»; el sujeto femenino se sobreentiende por el contexto, donde se trata de Mical.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: Then ... sent
  chosen_spanish: Entonces ... envió
  alternatives_spanish:
  - Y ... envió
  - Así que ... envió
  lexicon: WLC/HALOT
  rationale: El waw consecutivo marca avance narrativo; «Entonces» conserva la secuencia natural en español sin agregar contraste.
- source_word: מַלְאָכִים
  english_pob_choice: messengers
  chosen_spanish: mensajeros
  alternatives_spanish:
  - emisarios
  - enviados
  lexicon: HALOT
  rationale: En este contexto son personas enviadas por Saúl, no seres celestiales; «mensajeros» es claro y fiel al uso narrativo.
- source_word: לָקַחַת
  english_pob_choice: to seize
  chosen_spanish: para apoderarse de
  alternatives_spanish:
  - para tomar
  - para capturar
  lexicon: HALOT
  rationale: El verbo base es amplio («tomar»), pero el contexto hostil exige explicitar la intención de apresar a David. «Apoderarse de» comunica esa fuerza sin exceder el sentido.
- source_word: אֶת דָּוִד
  english_pob_choice: David
  chosen_spanish: David
  alternatives_spanish:
  - a David
  lexicon: HALOT
  rationale: Nombre propio como objeto directo; en español se mantiene con la preposición requerida por la sintaxis natural.
- source_word: וַתֹּאמֶר
  english_pob_choice: and she said
  chosen_spanish: y ella dijo
  alternatives_spanish:
  - y dijo
  - entonces dijo
  lexicon: HALOT
  rationale: El hebreo solo dice «y dijo»; el sujeto femenino se entiende por el contexto. Se conserva esa sobriedad sin introducir contraste no explícito.
- source_word: חֹלֶה הוּא
  english_pob_choice: He is sick
  chosen_spanish: Está enfermo
  alternatives_spanish:
  - Él está enfermo
  - Está mal
  lexicon: HALOT
  rationale: La construcción predicativa expresa estado de enfermedad. «Está enfermo» es la equivalencia más natural y directa en español.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el expediente inglés: se evita introducir un matiz adversativo en la conjunción, y se refleja la intención hostil del infinitivo con una frase verbal española natural.'
  spanish_consistency_notes:
  - Se emplea «mensajeros» para מַלְאָכִים en sentido humano, evitando «ángeles».
  - Se conserva «David» como objeto directo con la preposición exigida por el español («de David» después de «apoderarse»).
  - «Está enfermo» traduce el estado resultante sin añadir intensidad clínica no presente en el hebreo.
  - La nota [a] marca el sujeto implícito de «y ella dijo» siguiendo el expediente inglés.
