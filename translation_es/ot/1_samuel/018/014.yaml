translation:
  language: es
  text: Y David actuaba sabiamente en todos sus caminos[a], y Yahvé estaba con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «prosperando» / «con éxito»; el término hebreo puede denotar una acción prudente que produce éxito.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: was
  chosen_spanish: procedía
  alternatives_spanish:
  - era
  - estaba
  lexicon: HALOT
  rationale: El wayyiqtol de היה introduce aquí un estado o patrón continuo de David. En español, «procedía» conserva mejor la idea de conducta en curso que un simple «era», y evita sonar demasiado estático.
- source_word: דָוִד
  english_pob_choice: David
  chosen_spanish: David
  alternatives_spanish:
  - —
  lexicon: nombre propio
  rationale: Nombre propio estándar, sin adaptación adicional.
- source_word: לְכָל דָּרְכָו
  english_pob_choice: in all his ways
  chosen_spanish: en todos sus caminos
  alternatives_spanish:
  - en toda su conducta
  - en todos sus asuntos
  lexicon: HALOT
  rationale: דֶּרֶךְ conserva su imagen básica de «camino», pero en este contexto se refiere al modo de vida o conducta. «En todos sus caminos» mantiene la metáfora hebrea y sigue siendo natural en español.
- source_word: מַשְׂכִּיל
  english_pob_choice: acting wisely
  chosen_spanish: con sabiduría
  alternatives_spanish:
  - procediendo prudentemente
  - actuando sabiamente
  - prosperando
  lexicon: HALOT
  rationale: El participio hifil de שכל puede implicar actuar con prudencia e incluso prosperar. La opción «con sabiduría» conserva el núcleo de discernimiento sin reducirlo solo al resultado; la formulación verbal ya queda reforzada por «procedía».
- source_word: וַיהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md contested term: YHWH'
  rationale: El Tetragrámaton se vierte según el estándar del proyecto como «Yahvé», manteniendo el nombre del pacto y evitando el sustituto litúrgico «SEÑOR».
- source_word: עִמּוֹ
  english_pob_choice: was with him
  chosen_spanish: estaba con él
  alternatives_spanish:
  - estaba junto a él
  - lo acompañaba
  lexicon: HALOT
  rationale: La preposición עִם con sufijo pronominal expresa presencia y asociación. «Estaba con él» es la manera más natural y fiel en español para indicar la presencia favorable de Yahvé.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. En español, el proyecto pide «Yahvé» como forma principal, preservando el nombre propio de Dios y la referencia al pacto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de מַשְׂכִּיל
  english_pob_reading: acting wisely
  chosen_spanish_reading: con sabiduría
  alternative_spanish_readings:
  - prosperando
  - procediendo prudentemente
  - actuando sabiamente
  rationale: La forma puede abarcar prudencia con éxito resultante. En esta cláusula narrativa, «con sabiduría» conserva la tensión entre conducta prudente y resultado favorable sin imponer solo una de las dos posibilidades.
  doctrine_reference: HALOT; contexto narrativo de 1 Samuel 18:14
translation_notes:
  revision_awareness: La revisión auditada más reciente indica que no hubo cambios necesarios y que el consenso fue alto; por eso la redacción española sigue de cerca la lectura inglesa final, pero ajusta el verbo y el sustantivo para un español natural y fiel al hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - Se conserva la metáfora de «caminos» para דְּרָכָיו, sin sustituirla por una paráfrasis más explicativa.
  - La ambigüedad de מַשְׂכִּיל se señala en nota, pues el hebreo admite tanto prudencia como éxito.
