    issue: Construcción ambigua y poco natural en «oyó acerca de Tirhaca, rey de Cus[a], diciendo»
    rationale: En español, esa secuencia puede hacer pensar que Tirhaca es el que está «diciendo». El לֵאמֹר hebreo introduce el contenido del reporte oído, no una atribución directa al nombre precedente. Conviene reestructurar para claridad natural sin perder la forma discursiva.
  - severity: low
