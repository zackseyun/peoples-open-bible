translation:
  language: es
  text: 'Para el director del coro: «No destruyas»[a]. Un salmo de Asaf[b]. Un cántico.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente una melodía o indicación musical: «No destruyas».'
    reason: cultural_note
  - marker: b
    text: La expresión «de Asaf» puede indicar autoría, asociación o pertenencia a la colección asafita.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Para el director del coro
  alternatives_spanish:
  - Para el maestro de coro
  - Para el músico principal
  - Para el líder del coro
  lexicon: HALOT
  rationale: En los encabezados de salmos, el término señala a la persona a cargo de la ejecución musical. "Director del coro" conserva la función litúrgico-musical con español natural y evita un calco menos idiomático.
- source_word: אַל תַּשְׁחֵת
  english_pob_choice: Do Not Destroy
  chosen_spanish: No destruyas
  alternatives_spanish:
  - No destruyas esto
  - No arruines
  - No destruyas
  lexicon: HALOT
  rationale: La expresión se entiende mejor como indicación musical o de título, no como contenido exhortativo del salmo. En español, el imperativo negativo singular mantiene la fuerza breve del hebreo; se conserva entre comillas como rótulo.
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Un salmo
  - Salmo [como encabezado]
  lexicon: HALOT
  rationale: Como etiqueta de género en un encabezado, "Salmo" comunica mejor la función formal del término que una frase más explicativa.
- source_word: לְאָסָף
  english_pob_choice: of Asaph
  chosen_spanish: de Asaf
  alternatives_spanish:
  - para Asaf
  - perteneciente a Asaf
  - de la colección de Asaf
  lexicon: HALOT
  rationale: El prefijo lamed puede indicar autoría, asociación o pertenencia al grupo asafita. "De Asaf" preserva esa ambigüedad sin resolverla indebidamente.
- source_word: שִׁיר
  english_pob_choice: A song
  chosen_spanish: Cántico
  alternatives_spanish:
  - Una canción
  - Canto
  - Cántico
  lexicon: HALOT
  rationale: Como segunda designación genérica en el encabezado, "cántico" resulta más natural y elevado en registro bíblico que "canción", aunque ambos podrían reflejar el sentido general de שׁיר. Se mantiene la distinción entre מִזְמוֹר y שִׁיר.
translation_notes:
  revision_awareness: Se siguió la revisión del texto inglés que mueve la nota sobre «Do Not Destroy» inmediatamente después de la frase a la que se refiere, y se mantuvo separada de la nota sobre Asaf. El español refleja esa colocación con [a] tras «No destruyas» y [b] tras «Asaf».
  spanish_consistency_notes:
  - 'Se mantuvo el tratamiento de encabezado poético con dos etiquetas genéricas separadas: «Salmo» y «Cántico».'
  - Se usó «Asaf» como forma española habitual del nombre propio.
  - Se evitó «SEÑOR» o equivalentes porque no aparece el tetragrámaton en este versículo; el texto es un superscrito litúrgico/musical.
