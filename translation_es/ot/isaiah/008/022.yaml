translation:
  language: es
  text: Y mirará a la tierra[a], y he aquí, angustia y oscuridad, la negrura de la aflicción[b]; y la densa oscuridad será apartada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el país' en vez de 'la tierra'.
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo es muy comprimido: ''angustia y oscuridad, negrura de aflicción, y densa oscuridad, apartada''. La última frase también puede entenderse más literalmente como ''y densa oscuridad, una apartada''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la tierra habitada
  lexicon: HALOT
  rationale: אֶרֶץ puede significar 'tierra', 'país' o 'tierra/territorio'. Aquí, 'la tierra' conserva la amplitud posible del término y funciona de modo natural en español, sin forzar una lectura restringida a 'país'.
- source_word: יַבִּיט
  english_pob_choice: he will look
  chosen_spanish: mirará
  alternatives_spanish:
  - verá
  - observará
  - fijará la vista
  lexicon: HALOT
  rationale: El hifil de נבט expresa mirar o volver la mirada. 'Mirará' es claro, sobrio y mantiene la acción de buscar con la vista que exige el contexto poético.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - pero he aquí
  lexicon: HALOT
  rationale: '''He aquí'' preserva la función deíctica y solemne del hebreo, introduciendo de manera enfática lo que se encuentra al mirar.'
- source_word: צָרָה
  english_pob_choice: distress
  chosen_spanish: angustia
  alternatives_spanish:
  - aflicción
  - tribulación
  - dificultad
  lexicon: HALOT
  rationale: צָרָה denota estrechez, aflicción o angustia. 'Angustia' encaja bien con el paralelismo y deja espacio para el segundo término de sufrimiento que sigue.
- source_word: חֲשֵׁכָה
  english_pob_choice: darkness
  chosen_spanish: oscuridad
  alternatives_spanish:
  - tinieblas
  - noche
  lexicon: HALOT
  rationale: El sustantivo designa oscuridad de manera directa. 'Oscuridad' es transparente en español moderno y evita un registro demasiado arcaico.
- source_word: מְעוּף
  english_pob_choice: the gloom of
  chosen_spanish: la penumbra de
  alternatives_spanish:
  - la negrura de
  - la sombra de
  - la oscuridad de
  lexicon: HALOT
  rationale: Este término raro se entiende aquí como un sustantivo en relación de complemento con el siguiente. 'Penumbra de' conserva la idea de un oscurecimiento opresivo y permite expresar en español la estructura comprimida del hebreo sin perder el matiz.
- source_word: צוּקָה
  english_pob_choice: anguish
  chosen_spanish: la aflicción
  alternatives_spanish:
  - la angustia
  - la estrechez
  - la angustiosa opresión
  lexicon: HALOT
  rationale: צוּקָה puede significar angustia, estrechez o aflicción. Dado que 'angustia' ya se usó para צָרָה, 'aflicción' evita repetición excesiva y mantiene el tono de sufrimiento opresivo.
- source_word: אֲפֵלָה
  english_pob_choice: thick darkness
  chosen_spanish: la densa oscuridad
  alternatives_spanish:
  - las tinieblas densas
  - la oscuridad espesa
  - la profunda oscuridad
  lexicon: HALOT
  rationale: אֲפֵלָה indica oscuridad intensa o espesa. 'Densa oscuridad' comunica bien esa intensificación en un español natural y digno.
- source_word: מְנֻדָּח
  english_pob_choice: will be driven away
  chosen_spanish: será ahuyentada
  alternatives_spanish:
  - será expulsada
  - será desterrada
  - será apartada
  lexicon: HALOT
  rationale: La revisión inglesa destaca que el final describe a la oscuridad como la realidad que es expulsada o alejada, no a una persona arrojada dentro de ella. 'Ahuyentada' mantiene la pasiva y la idea de expulsión, y suena idiomática en español para una realidad personificada como 'la densa oscuridad'.
theological_decisions:
- issue: Alcance de אֶרֶץ como 'tierra' o 'país'
  english_pob_reading: the earth, with 'the land' as alternative
  chosen_spanish_reading: la tierra, con 'el país' como alternativa posible implícita
  alternative_spanish_readings:
  - el país
  - la tierra habitada
  rationale: En este contexto poético de búsqueda sin alivio, 'la tierra' preserva el sentido amplio que la nota inglesa privilegia. No se restringe a una unidad política, ya que el movimiento del verso sugiere una mirada desesperada sobre todo el ámbito visible.
  doctrine_reference: Uso semántico de אֶרֶץ en contextos poéticos (HALOT; tradición exegética de Isaías)
- issue: Naturaleza comprimida de la cadena final y sujeto implícito
  english_pob_reading: '''distress and darkness, the gloom of anguish; and thick darkness will be driven away.'''
  chosen_spanish_reading: '''angustia y oscuridad, la penumbra de la aflicción; y la densa oscuridad será ahuyentada.'''
  alternative_spanish_readings:
  - '''angustia y oscuridad, la penumbra de la angustia; y la densa oscuridad será ahuyentada.'''
  - '''angustia y oscuridad, el oscuro sopor de la aflicción; y la densa oscuridad será ahuyentada.'''
  rationale: 'Se mantiene la compresión poética del hebreo sin añadir un sujeto inexistente. La última cláusula sigue la revisión auditada del POB: el participante final es ''la densa oscuridad'', que es expulsada/ahuyentada. Eso evita leer el verso como si una persona fuese arrojada al oscuridad.'
  doctrine_reference: Crítica textual y sintaxis poética hebrea; revisión auditada del POB
- issue: Elección de 'ahuyentada' para מְנֻדָּח
  english_pob_reading: thick darkness will be driven away
  chosen_spanish_reading: la densa oscuridad será ahuyentada
  alternative_spanish_readings:
  - la densa oscuridad será expulsada
  - la densa oscuridad será apartada
  rationale: '''Ahuyentar'' expresa bien la expulsión o alejamiento forzado sin requerir un objeto explícito en español. Además, permite reflejar la pasiva hebrea y la personificación de la oscuridad en un registro literario natural.'
  doctrine_reference: Semántica de נדח en poesía bíblica; equivalencia funcional moderada
translation_notes:
  revision_awareness: 'La redacción sigue la revisión auditada del POB que corrige el final del verso: el hebreo describe a la densa oscuridad como expulsada/ahuyentada, no a una persona arrojada dentro de ella. También se ha conservado la alternativa léxica de אֶרֶץ y la compresión poética del cierre.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino en el proyecto; este versículo no lo contiene.
  - '''Angustia'' y ''aflicción'' se distinguen para evitar redundancia excesiva, aunque ambos términos pueden solaparse semánticamente en hebreo.'
  - Se prefiere 'la tierra' por amplitud semántica y naturalidad en español, manteniendo la alternativa textual abierta en nota.
  - '''Densa oscuridad'' se eligió como equivalente idiomático de ''thick darkness'', evitando un calco rígido como ''tinieblas espesas''.'
