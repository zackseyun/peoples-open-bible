translation:
  language: es
  text: Por tu reprensión huyeron[a]; al sonido de tu trueno se apresuraron a huir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Por tu reprensión salieron huyendo; al sonido de tu trueno se apresuraron».'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּעֲרָתְךָ
  english_pob_choice: your rebuke
  chosen_spanish: tu reprensión
  alternatives_spanish:
  - tu reprende
  - tu reprimenda
  - tu reprensión severa
  lexicon: HALOT
  rationale: גְּעָרָה expresa una reprensión o amonestación enérgica, con fuerza que en este contexto afecta a la creación. 'Reprensión' conserva el tono de palabra correctiva y poderosa mejor que 'reprimenda', que suena más doméstica o disciplinaria, o que 'amenaza', que añade un matiz no explicitado.
- source_word: יְנוּסוּן
  english_pob_choice: they fled
  chosen_spanish: huyeron
  alternatives_spanish:
  - se fueron huyendo
  - escaparon
  - salieron corriendo
  lexicon: HALOT
  rationale: De נוּס, 'huir'. El perfecto poético se refleja bien con el pasado simple 'huyeron', breve y natural en español, sin introducir un matiz más interpretativo que 'escaparon' o más coloquial que 'salieron corriendo'.
- source_word: קוֹל
  english_pob_choice: the sound of
  chosen_spanish: el sonido de
  alternatives_spanish:
  - la voz de
  - el ruido de
  lexicon: HALOT
  rationale: קוֹל puede significar sonido, voz o ruido. Aquí, con 'trueno', 'el sonido de' es la opción más natural en español y preserva la imagen auditiva sin forzar 'la voz de tu trueno'.
- source_word: רַעַמְךָ
  english_pob_choice: your thunder
  chosen_spanish: tu trueno
  alternatives_spanish:
  - tu estruendo
  - tu tronido
  lexicon: HALOT
  rationale: רַעַם designa trueno. 'Tu trueno' es directo y mantiene la imagen teofánica de poder tempestuoso.
- source_word: יֵחָפֵזוּן
  english_pob_choice: they hurried away
  chosen_spanish: se apresuraron
  alternatives_spanish:
  - se dieron prisa
  - huyeron apresuradamente
  - aceleraron el paso
  lexicon: HALOT
  rationale: חפז comunica prisa o movimiento rápido, a veces con alarma. 'Se apresuraron' conserva la rapidez sin añadir explícitamente pánico ni cambiar el tono poético.
- source_word: מִן ... מִן
  english_pob_choice: At ... at
  chosen_spanish: Ante ... ante
  alternatives_spanish:
  - A causa de ... a causa de
  - Por ... por
  - Desde ... desde
  lexicon: HALOT
  rationale: Aunque מִן significa literalmente 'de / desde', en este paralelismo poético marca la ocasión o causa inmediata. 'Ante' transmite mejor en español la reacción instantánea ante la voz divina, manteniendo el carácter responsorial del verso.
theological_decisions:
- issue: Sujeto implícito de los verbos plurales
  english_pob_reading: The implied subject is the waters mentioned in the surrounding context, rendered simply as 'they' in continuity with the Hebrew.
  chosen_spanish_reading: Se mantiene el sujeto implícito ('huyeron', 'se apresuraron') sin añadir 'las aguas'.
  alternative_spanish_readings:
  - las aguas huyeron
  - ellas huyeron
  rationale: El hebreo deja el sujeto fuera del verso y depende del contexto previo. En español, mantener la elipsis respeta la continuidad poética y evita añadir un sustantivo que el texto no dice en esta línea.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado: no se registraron cambios sustantivos en la auditoría inglesa, y la presente redacción sigue de cerca la equivalencia óptima del verso hebreo sin añadir el sujeto explícito.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el hebreo contiene el nombre divino; aquí el verso no lo explicita, por lo que no aparece.
  - Se mantiene el paralelo 'ante... ante...' para reflejar el valor causal/ocasional de מִן en poesía.
  - '''Reprensión'' y ''trueno'' conservan el registro teofánico sin recurrir a formulaciones eclesiásticas tradicionales que debiliten la imagen original.'
