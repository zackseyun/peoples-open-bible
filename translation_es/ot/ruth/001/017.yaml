review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: lugar de muerte, lugar de sepultura, fórmula de juramento, y condición de que solo la muerte separe a Rut de Noemí. Sin embargo, las notas están mal asignadas respecto al rastro inglés: la nota [a] en inglés no pertenece a «Where you die» sino a la fórmula juratoria, y la [b] corresponde a la cláusula final. Además, «Yahvé me haga así, y aun añada» suena incompleto en español; conviene explicitar «más» para representar וְכֹה יֹסִיף con naturalidad y fidelidad idiomática.'
  spanish_quality_summary: 'El texto es generalmente claro y digno, pero las notas actuales crean confusión y una de ellas repite exactamente la lectura principal como si fuera alternativa. «Donde tú mueras» es natural; «seré sepultada» funciona bien. La fórmula del juramento mejora con «y aún más» o equivalente. La cláusula final se lee mejor sin las comas internas: «si algo fuera de la muerte me separa de ti».'
  glossary_alignment: Se alinea bien con la terminología del proyecto al usar «Yahvé» para יְהוָה. No hay conflictos con otros términos doctrinales clave. La revisión propuesta conserva la autoimprecación hebrea y la exclusividad de la muerte como único separador legítimo.
  issues:
  - severity: medium
    issue: Las notas al pie están ancladas a los lugares equivocados.
    rationale: El rastro inglés asigna la primera nota a la fórmula juratoria y la segunda a la cláusula «if anything but death...». En el borrador, [a] está en «mueras» y [b] en «añada», lo que distorsiona la evidencia auditada.
  - severity: medium
    issue: La nota [a] actual no aporta una alternativa real.
    rationale: 'Dice «O, más literalmente: “Donde tú mueras, yo moriré”», que coincide sustancialmente con el texto principal y no corresponde a ninguna alternativa preservada por el inglés.'
  - severity: low
    issue: «Yahvé me haga así, y aun añada» suena elíptico y poco idiomático en español.
    rationale: Aunque cercano al hebreo, en español eclesial y general «y aún más» comunica mejor la fórmula autoimprecatoria sin perder solemnidad.
  - severity: low
    issue: Puntuación innecesariamente cortada en la cláusula final.
    rationale: Las comas en «si algo, fuera de la muerte, me separa de ti» entorpecen la lectura; sin comas la frase fluye mejor y conserva el sentido.
  revised_spanish_text: Donde tú mueras, yo moriré, y allí seré sepultada. Yahvé me haga así, y aún más[a], si algo fuera de la muerte me separa de ti[b].
  revised_footnotes:
