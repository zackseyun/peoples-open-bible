translation:
  language: es
  text: 'David dijo a Ahimelec, el sacerdote: «El rey me ha encargado un asunto y me dijo[a]: “Que ningún hombre sepa nada del asunto para el cual te envío y sobre el cual te he encargado”. Y he dirigido a los jóvenes a cierto lugar[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Que nadie sepa nada». El hebreo dice literalmente: «Que ningún hombre sepa nada».'
    reason: lexical_alternative
  - marker: b
    text: Hebreo literalmente, «a un lugar tal y tal», un modismo para un lugar no especificado o no revelado.
    reason: lexical_alternative
lexical_decisions:
- source_word: צִוַּנִי דָבָר
  english_pob_choice: has charged me with a matter
  chosen_spanish: me ha encargado un asunto
  alternatives_spanish:
  - me ha mandado algo
  - me ha dado una comisión
  lexicon: HALOT
  rationale: צוה expresa encargo/mandato; con דָבָר, la frase se refiere a un asunto concreto confiado a David. «Encargar» conserva la fuerza directiva del rey y «asunto» traduce bien דָבָר sin volverlo meramente verbal.
- source_word: אִישׁ אַל יֵדַע מְאוּמָה
  english_pob_choice: Let no man know anything
  chosen_spanish: No deje ningún hombre saber nada
  alternatives_spanish:
  - Que nadie sepa nada
  - No permita que nadie sepa nada
  lexicon: HALOT
  rationale: Se conserva el matiz literal de אִישׁ como «hombre» y el absoluto «nada» para מְאוּמָה. La forma española suena más natural en discurso directo, pero mantiene la restricción del hebreo sin suavizarla.
- source_word: הַדָּבָר
  english_pob_choice: the matter
  chosen_spanish: el asunto
  alternatives_spanish:
  - la cosa
  - el caso
  lexicon: HALOT
  rationale: דָּבָר aquí significa el asunto o negocio de la misión, no simplemente una palabra. «Asunto» es natural en español y conserva esa referencia concreta.
- source_word: אֲשֶׁר אָנֹכִי שֹׁלֵחֲךָ
  english_pob_choice: for which I am sending you
  chosen_spanish: para el cual te envío
  alternatives_spanish:
  - sobre el cual te envío
  - en relación con el cual te envío
  lexicon: HALOT
  rationale: La relativa modifica «el asunto» y explica la misión. «Para el cual» mantiene la relación teleológica del hebreo y permite un español fluido en el marco de la cita directa.
- source_word: וַאֲשֶׁר צִוִּיתִךָ
  english_pob_choice: and with which I have charged you
  chosen_spanish: y con el cual te he encargado
  alternatives_spanish:
  - y que te he mandado
  - y con el cual te he dado instrucciones
  lexicon: HALOT
  rationale: Se refleja la repetición de צוה con el mismo verbo «encargar», preservando la coherencia lexical del mandato real. «Con el cual» conserva el paralelismo con la cláusula anterior.
- source_word: וְאֶת־הַנְּעָרִים
  english_pob_choice: And ... the young men
  chosen_spanish: Y he dirigido a los jóvenes
  alternatives_spanish:
  - Y he instruido a los jóvenes
  - Y he indicado a los muchachos
  lexicon: HALOT
  rationale: נְעָרִים puede ser «jóvenes» o «sirvientes/acompañantes» según contexto. Aquí, «jóvenes» sigue la lectura directa y deja abierta la función social del grupo sin forzarla.
- source_word: יוֹדַעְתִּי
  english_pob_choice: I have directed
  chosen_spanish: he dirigido
  alternatives_spanish:
  - he hecho saber
  - he informado
  lexicon: HALOT
  rationale: El hifil de ידע con אֶל־מְקוֹם apunta a disponer/dirigir a los jóvenes hacia un lugar señalado. «He dirigido» transmite esa orientación práctica mejor que una traducción demasiado literal como «he hecho saber».
- source_word: אֶל מְקוֹם פְּלֹנִי אַלְמוֹנִי
  english_pob_choice: to a certain place
  chosen_spanish: a un lugar determinado
  alternatives_spanish:
  - a tal lugar
  - a un lugar no revelado
  lexicon: HALOT
  rationale: La expresión fija es un modismo de lugar no especificado. «Lugar determinado» comunica la idea de un sitio concreto sin identificar, y permite conservar el carácter enigmático del hebreo.
translation_notes:
  revision_awareness: Se siguió el auditorio inglés con acuerdo alto y sin revisiones aplicadas; la redacción española busca la misma equivalencia óptima, conservando el paralelismo de los mandatos y el modismo final con nota explicativa.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se evitó «Cristo/Mesías» porque no aparece ningún término correspondiente en el hebreo de este versículo.
  - Se preservó «encargado» para צוה a fin de mantener la coherencia con el tono formal del encargo real.
  - «Jóvenes» deja abierta la posible función de acompañantes sin imponer una equivalencia social no explicitada por el hebreo.
