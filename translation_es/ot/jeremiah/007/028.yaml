review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del hebreo y mantiene correctamente «Yahvé», «nación», «su Dios», «corrección» y «la fidelidad ha perecido» con la alternativa léxica adecuada en nota. Sin embargo, hay dos desajustes importantes con el texto fuente y la auditoría inglesa: (1) «a ellos[a]» coloca la nota en un lugar incorrecto, ya que la nota documenta אֱמוּנָה, no «ellos»; y (2) «ha sido cortada de su boca» se aparta del inglés auditado «it is cut off from their mouth» y además suena menos natural en español. Conviene también ajustar «dirás a ellos» a la forma idiomática «les dirás».'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero «dirás a ellos» es poco natural frente a «les dirás», y la nota mal anclada produce confusión. «Es cortada de su boca» sería demasiado literal; una solución más natural y fiel es «ha sido eliminada de su boca» o «ha desaparecido de su boca», pero dado que la auditoría inglesa quiso preservar la metáfora de כרת, conviene usar «ha sido cortada de su boca» solo si se prioriza literalidad. Mejor equilibrio: «ha sido cortada de su boca» sigue siendo comprensible, aunque menos elegante; aun así, el problema principal es el anclaje de la nota y la expresión dativa.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה -> «Yahvé» correctamente; אֱמוּנָה -> «fidelidad» con nota alternativa «verdad» bien justificada; no hay conflictos doctrinales relevantes. La revisión solo corrige ubicación de nota y naturalidad/precisión sintáctica.'
  issues:
  - severity: medium
    issue: La nota [a] está anclada en «ellos» en lugar de «fidelidad».
    rationale: La nota explica la alternativa léxica de אֱמוּנָה («fidelidad/verdad»), por lo que debe marcarse en la palabra o frase correspondiente en el texto español. Tal como está, induce a error y no cumple la disciplina de notas del proyecto.
  - severity: medium
    issue: «dirás a ellos» no es la formulación idiomática normal en español.
    rationale: Aunque comprensible, suena calcado del hebreo/inglés. «Les dirás» preserva el sentido y mejora la legibilidad sin perder fidelidad.
  - severity: low
    issue: La cláusula final necesita mejor ajuste al español manteniendo la metáfora fuente.
    rationale: El hebreo/Niphal y la auditoría inglesa preservan «cut off from their mouth». En español, «ha sido cortada de su boca» es aceptable pero algo rígido; se mantiene por fidelidad metafórica, aunque con el resto de ajustes queda más claro el conjunto.
  revised_spanish_text: 'Entonces les dirás: «Esta es la nación que no ha escuchado la voz de Yahvé, su Dios, y no ha aceptado corrección. La fidelidad[a] ha perecido; ha sido cortada de su boca».'
  revised_footnotes:
  - marker: a
    text: O «La verdad ha perecido». El hebreo אֱמוּנָה puede significar «fidelidad», «fiabilidad» o «verdad».
    reason: lexical_alternative
  revision_rationale: Se corrigió el anclaje de la nota para que corresponda a אֱמוּנָה, se mejoró la naturalidad de «dirás a ellos» a «les dirás», y se conservaron las decisiones léxicas principales del POB y del hebreo fuente.
