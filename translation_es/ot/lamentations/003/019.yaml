translation:
  language: es
  text: Acuérdate de mi aflicción y de mi vagar[a], del ajenjo y de la hiel[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi homelessness»; el hebreo sugiere vagar sin asentamiento fijo, incluso una condición de desarraigo o falta de hogar.
    reason: lexical_alternative
  - marker: b
    text: «Ajenjo y hiel» son imágenes concretas de amargura y veneno; también pueden entenderse metafóricamente como extrema amargura.
    reason: cultural_note
lexical_decisions:
- source_word: זְכָר
  english_pob_choice: Remember
  chosen_spanish: Acuérdate
  alternatives_spanish:
  - Recuerda
  - Ten presente
  lexicon: HALOT
  rationale: El imperativo directo pide una forma natural en español que conserve el tono de súplica. «Acuérdate» transmite la apelación personal con el valor exhortativo del hebreo.
- source_word: עָנְיִי
  english_pob_choice: my affliction
  chosen_spanish: mi aflicción
  alternatives_spanish:
  - mi miseria
  - mi sufrimiento
  lexicon: HALOT
  rationale: «Aflicción» mantiene el peso concreto del dolor y la opresión sin reducirlo a una abstracción psicológica. Sigue de cerca la decisión inglesa y el campo semántico del hebreo.
- source_word: מְרוּדִי
  english_pob_choice: my wandering
  chosen_spanish: mi vagar
  alternatives_spanish:
  - mi errancia
  - mi homelessness
  lexicon: HALOT
  rationale: «Vagar» conserva la imagen de deambular o andar sin asentamiento fijo. En español, «mi vagar» resulta natural y evita estrechar el sentido a «homelessness», que sería más interpretativo.
- source_word: לַעֲנָה
  english_pob_choice: wormwood
  chosen_spanish: ajenjo
  alternatives_spanish:
  - ajenjo amargo
  - wormwood
  lexicon: HALOT
  rationale: El hebreo nombra la planta concreta; «ajenjo» es el equivalente español más reconocido para preservar la imagen botánica y su asociación con amargura.
- source_word: וָרֹאשׁ
  english_pob_choice: the gall
  chosen_spanish: la hiel
  alternatives_spanish:
  - el veneno
  - la amargura
  lexicon: HALOT
  rationale: «Hiel» conserva la imagen de amargura y ponzoña en una forma breve y bíblica en español. Evita abstraer el término a «amargura» y mantiene el paralelismo con «ajenjo».
translation_notes:
  revision_awareness: El texto fuente hebreo y el audit trail inglés están en alto acuerdo; no se registraron revisiones aplicadas. La versión española sigue esa lectura estable y conserva las imágenes concretas del original.
  spanish_consistency_notes:
  - Se mantiene el tuteo reverente «Acuérdate» como equivalente natural del imperativo hebreo.
  - Se preserva la doble imagen poética con sustantivos concretos («ajenjo» y «hiel») en lugar de abstraerla a «amargura».
  - «Vagar» se usa como término amplio y poético para מְרוּדִי, evitando una restricción demasiado estrecha del sentido.
