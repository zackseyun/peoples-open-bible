review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: Matitías, levita, primogénito de Salum el coreíta/corahita, tenía una responsabilidad confiada respecto a la preparación de los חביתים. Sin embargo, el anclaje de las notas no corresponde bien al contenido: la nota [a] trata בֶּאֱמוּנָה pero está colocada en el nombre propio, y la nota [b] explica הַחֲבִתִּים pero está colocada en «corahita».'
  spanish_quality_summary: 'El español es claro y eclesialmente legible. No obstante, conviene ajustar algunos detalles: «corahita» es menos natural/estable en español bíblico que «coreíta», y las notas deben anclarse en las palabras pertinentes. «Fue encargado del trabajo de las tortas planas» es aceptable, pero «fue puesto en una responsabilidad de confianza sobre la preparación de las tortas planas» sería demasiado pesado; por tanto, basta una reparación mínima.'
  glossary_alignment: No hay términos del glosario mayor en juego como Yahvé/Mesías. La decisión «primogénito» para בְּכוֹר es correcta. Para הַקָּרְחִי, «coreíta» se alinea mejor con el uso español relacionado con Coré. Para בֶּאֱמוּנָה, la nota léxica debe quedar anclada en «fue encargado[a]».
  issues:
  - severity: medium
    issue: Marcadores de notas mal anclados en el texto
    rationale: La nota sobre בֶּאֱמוּנָה está puesta en «Mattitías» y la nota sobre הַחֲבִתִּים está puesta en «corahita», lo que no preserva correctamente el rastro auditado ni ayuda al lector.
  - severity: low
    issue: «corahita» suena menos natural que «coreíta» en español bíblico
    rationale: El hebreo הַקָּרְחִי es gentilicio derivado de Coré/Korah. En español amplio, «coreíta» resulta más transparente y eufónico que «corahita».
  revised_spanish_text: Y Matitías, de entre los levitas, el primogénito de Salum el coreíta, fue encargado[a] del trabajo de las tortas planas[b].
  revised_footnotes:
  - marker: a
    text: 'O: «fielmente»; la expresión hebrea puede describir tanto el modo confiable de Matitías como el hecho de haber sido puesto en una función de confianza.'
    reason: lexical_alternative
  - marker: b
    text: El término hebreo designa una clase de torta horneada, quizá hecha en plancha o comal.
    reason: cultural_note
  revision_rationale: 'La revisión corrige el problema principal de fidelidad editorial: las notas ahora quedan ancladas a las expresiones que realmente explican. Además, «coreíta» mejora la naturalidad y la reconocibilidad del gentilicio en español sin alterar el sentido. El resto del texto se conserva porque representa bien el hebreo y las decisiones léxicas auditadas.'
