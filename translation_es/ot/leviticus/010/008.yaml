translation:
  language: es
  text: 'Y Yahvé habló a Aarón[a], diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo YHWH; se traduce aquí como «Yahvé» para conservar el nombre divino, en lugar de sustituirlo por un título.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: And ... spoke
  chosen_spanish: Y ... habló
  alternatives_spanish:
  - Entonces ... habló
  - Y ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo introduce avance narrativo; en español, «Y» preserva la continuidad breve y formal. «Habló» mantiene mejor el valor de דבר en la fórmula de introducción de discurso que «dijo», y evita repetir el matiz de לֵאמֹר.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: transliteración del nombre divino como «Yahvé», conservando el nombre propio del pacto y no sustituyéndolo por un título.'
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  - hacia
  lexicon: HALOT
  rationale: La preposición marca el destinatario indirecto del habla; en español, «a» es la equivalencia natural y clara.
- source_word: אַהֲרֹן
  english_pob_choice: Aaron
  chosen_spanish: Aarón
  alternatives_spanish:
  - Aaron
  lexicon: HALOT
  rationale: Nombre propio bíblico adaptado a la ortografía española habitual, manteniendo identificación inequívoca.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - para decir
  lexicon: HALOT
  rationale: El infinitivo constructo introduce el contenido del discurso; «diciendo» preserva la estructura formal sin añadir interpretación. En español suena natural junto a «habló».
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La fuente hebrea usa directamente el Tetragrámaton. Se mantiene como nombre propio divino en español, conforme a la política del proyecto, sin sustituirlo por un título devocional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El pasaje coincide con la revisión auditada: no se registran cambios posteriores ni divergencias entre el texto hebreo, la traducción inglesa POB y el estado revisado más reciente.'
  spanish_consistency_notes:
  - Se mantiene el nombre divino «Yahvé» de forma consistente con la terminología del proyecto.
  - «Aarón» sigue la adaptación española estándar de nombres bíblicos.
  - La puntuación conserva el patrón narrativo de introducción de discurso con coma antes del gerundio.
