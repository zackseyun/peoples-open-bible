translation:
  language: es
  text: 'Yahvé levantará contra ti una nación de lejos, desde el extremo de la tierra, como el águila se abate[a]: una nación cuya lengua no entenderás[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «como el águila vuela en picada» o «como el águila se lanza». El verbo hebreo enfatiza un movimiento rápido y descendente.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «cuya lengua no oirás»; el sentido es que no entenderás su idioma.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשָּׂא
  english_pob_choice: will raise up against
  chosen_spanish: levantará contra
  alternatives_spanish:
  - alzará contra
  - hará venir contra
  lexicon: HALOT
  rationale: En este dicho de juicio, נשא con עַל/contra expresa la acción divina de suscitar o hacer venir un pueblo enemigo. «Levantará contra» conserva la agencia de Yahvé y la fuerza adversativa sin sonar rígido en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se mantiene el nombre propio del pacto, de acuerdo con la directriz del proyecto para el Tetragrámaton, en vez de sustituirlo por un título como «el SEÑOR».
- source_word: גּוֹי
  english_pob_choice: nation
  chosen_spanish: nación
  alternatives_spanish:
  - pueblo
  lexicon: HALOT
  rationale: Aquí גוי designa una entidad política extranjera y hostil. «Nación» transmite mejor el sentido de invasión y el marco de maldición del pacto.
- source_word: מֵרָחוֹק
  english_pob_choice: from far away
  chosen_spanish: de lejos
  alternatives_spanish:
  - desde lejos
  - de una tierra lejana
  lexicon: HALOT
  rationale: La frase enfatiza distancia remota. «De lejos» es natural en español y conserva la idea sin añadir información.
- source_word: מִקְצֵה הָאָרֶץ
  english_pob_choice: from the end of the earth
  chosen_spanish: desde el extremo de la tierra
  alternatives_spanish:
  - desde el confín de la tierra
  - desde la parte más lejana de la tierra
  lexicon: HALOT
  rationale: La expresión es idiomática para una procedencia remotísima. «Extremo de la tierra» mantiene la imagen espacial del hebreo y el alcance universal de la amenaza.
- source_word: כַּאֲשֶׁר יִדְאֶה הַנָּשֶׁר
  english_pob_choice: as the eagle swoops down
  chosen_spanish: como el águila se abate
  alternatives_spanish:
  - como el águila se lanza
  - como el águila vuela en picada
  lexicon: HALOT
  rationale: El verbo denota movimiento rápido y descendente. «Se abate» comunica bien la caída súbita y amenazante; «águila» sigue la imagen convencional del texto y evita oscilar entre posibles aves de rapiña sin necesidad.
- source_word: לֹא תִשְׁמַע לְשֹׁנוֹ
  english_pob_choice: whose language you will not understand
  chosen_spanish: cuya lengua no entenderás
  alternatives_spanish:
  - cuyo idioma no comprenderás
  - cuyo hablar no podrás entender
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «no oirás su lengua», el sentido idiomático es la incomprensión lingüística. «Lengua» conserva el eco semítico y «entenderás» expresa el sentido, tal como lo hace el POB inglés.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: Se preserva el nombre personal de Dios revelado a Israel. No se usa una sustitución reverencial, porque el proyecto POB busca transparencia textual y el hebreo aquí contiene el Tetragrámaton directamente.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Similitud del ave de presa
  english_pob_reading: as the eagle swoops down
  chosen_spanish_reading: como el águila se abate
  alternative_spanish_readings:
  - como el águila vuela en picada
  - como el águila se lanza
  rationale: El hebreo subraya rapidez y descenso brusco. «Se abate» conserva el movimiento descendente con tono solemne y evita suavizar la imagen de juicio.
  doctrine_reference: Lexical decision anchored in HALOT for יִדְאֶה and הַנָּשֶׁר
translation_notes:
  revision_awareness: El pasaje coincide en alto grado con el audit trail inglés y no requiere revisión sustantiva; se mantuvieron la agencia divina, la distancia extrema, la imagen del ave y la incomprensión lingüística con equivalente español natural.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - Se prefirió «lengua» en el texto principal para reflejar el hebreo לְשֹׁנוֹ y se aclaró el sentido idiomático en nota.
  - La imagen de «águila» se conserva sin introducir una glosa zoológica adicional, ya que el contexto no exige decidir entre águila y buitre en español.
