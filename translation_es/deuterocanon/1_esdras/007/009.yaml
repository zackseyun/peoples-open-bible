  - severity: low
    issue: «los porteros» es comprensible pero algo menos específico en contexto cultual
    rationale: θυρωροί son quienes guardan las puertas/entradas. «Porteros» funciona, pero puede sonar doméstico o genérico; «guardias de las puertas» es más nítido para el templo sin resultar extraño.
