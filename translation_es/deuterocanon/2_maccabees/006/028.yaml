translation:
  language: es
  text: Así dejó a los jóvenes un noble ejemplo de morir voluntariamente y valerosamente por las leyes venerables y santas. Y, después de decir estas cosas, fue inmediatamente al potro[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego τύμπανον, literalmente «tambor», aquí usado para un instrumento de tortura; de ahí «potro».
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῖς δὲ νέοις
  english_pob_choice: to the young
  chosen_spanish: a los jóvenes
  alternatives_spanish:
  - para los jóvenes
  - a los más jóvenes
  lexicon: LSJ
  rationale: El dativo de destinatario o referencia se entiende naturalmente en español como "a los jóvenes". Conserva la función ejemplar sin forzar una lectura masculina exclusiva.
- source_word: ὑπόδειγμα γενναῖον
  english_pob_choice: a noble example
  chosen_spanish: un noble ejemplo
  alternatives_spanish:
  - un ejemplo valiente
  - un ejemplo de nobleza
  lexicon: BDAG/LSJ
  rationale: '"Noble" recoge bien la dignidad moral y el valor de γενναῖον, mientras que "ejemplo" traduce ὑπόδειγμα con precisión formal.'
- source_word: καταλελοιπὼς
  english_pob_choice: leaving
  chosen_spanish: dejó
  alternatives_spanish:
  - habiendo dejado
  - dejando
  lexicon: BDAG/LSJ
  rationale: 'El participio perfecto se traduce en español de manera natural con un verbo principal en pretérito que mantenga el resultado: el ejemplo queda dejado a los jóvenes.'
- source_word: εἰς τὸ προθύμως καὶ γενναίως ... ἀπευθανατίζειν
  english_pob_choice: of dying willingly and bravely
  chosen_spanish: de morir voluntaria y valerosamente
  alternatives_spanish:
  - de morir con voluntad y valentía
  - para morir voluntaria y valerosamente
  lexicon: LSJ
  rationale: El infinitivo articular con εἰς τό expresa propósito o resultado; "de morir" conserva la relación sintáctica. "Voluntaria y valerosamente" reproduce προθύμως y γενναίως sin suavizar el tono martirial.
- source_word: ὑπὲρ τῶν σεμνῶν καὶ ἁγίων νόμων
  english_pob_choice: for the revered and holy laws
  chosen_spanish: por las leyes venerables y santas
  alternatives_spanish:
  - por las leyes reverenciadas y santas
  - en favor de las leyes venerables y santas
  lexicon: LSJ
  rationale: '"Por" expresa bien ὑπέρ en sentido de causa o defensa. "Venerables" recoge σεμνῶν con la carga de dignidad y reverencia; "santas" traduce ἁγίων de modo directo y elevado.'
- source_word: τοσαῦτα δὲ εἰπών
  english_pob_choice: after saying these things
  chosen_spanish: después de decir estas cosas
  alternatives_spanish:
  - habiendo dicho estas cosas
  - tras decir esto
  lexicon: BDAG/LSJ
  rationale: Es una transición participial natural en español y mantiene el enlace narrativo sin añadir interpretación.
- source_word: ἐπὶ τὸ τύμπανον
  english_pob_choice: to the rack
  chosen_spanish: al tambor[a]
  alternatives_spanish:
  - al rack
  - al instrumento de tortura
  lexicon: LSJ
  rationale: Se conserva la imagen literal de τύμπανον como "tambor", pero se indica en nota que aquí designa un instrumento de tortura, como observó la POB en inglés.
- source_word: εὐθέως ἦλθεν
  english_pob_choice: he immediately went
  chosen_spanish: fue inmediatamente
  alternatives_spanish:
  - fue al instante
  - acudió de inmediato
  lexicon: BDAG/LSJ
  rationale: '"Inmediatamente" mantiene εὐθέως; el verbo de movimiento se integra de forma natural en español con el contexto de acercarse al instrumento.'
theological_decisions:
- issue: Valoración martirial del pasaje
  english_pob_reading: Retain 'revered and holy laws' and 'willingly and bravely' without softening the text's commendation of Eleazar's death.
  chosen_spanish_reading: Mantener "leyes venerables y santas" y "voluntaria y valerosamente" sin neutralizar el elogio del texto.
  alternative_spanish_readings:
  - leyes honradas y santas
  - con determinación y valentía
  rationale: El griego presenta la muerte de Eleazar como ejemplo digno para los jóvenes. La traducción debe conservar esa valoración moral y religiosa sin rebajarla a un tono neutral.
  doctrine_reference: Preservar la tensión teológica del texto; primacía del idioma fuente sobre la tradición de traducción.
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión más reciente del POB inglés, que prefirió "dying willingly and bravely" frente a una paráfrasis más explicativa, y conserva esa precisión en español con una estructura igualmente directa.
  spanish_consistency_notes:
  - Se usó "Yahvé" como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - '"Leyes venerables y santas" conserva el tono valorativo del original y evita un equivalente demasiado neutro.'
  - '"Tambor" se mantiene solo por fidelidad literal con nota explicativa; en el cuerpo del texto, la función se entiende por el contexto martirial.'
