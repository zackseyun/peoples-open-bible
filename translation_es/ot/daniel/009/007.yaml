  language: en
  yaml_path: translation/ot/daniel/009/007.yaml
  text: To you[a], O Lord, belongs righteousness, but to us belongs shame of face, as it is this day—to the men of Judah, to the inhabitants of Jerusalem, and to all Israel, those who are near and those who are far away[b], in all the lands where you have driven them[c], because of the unfaithfulness they have committed against you.
  footnotes:
