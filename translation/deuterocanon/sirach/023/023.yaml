translation:
  text: For first[a], she disobeyed the law of the Most High; and second, she committed an offense against her husband; and third, in sexual immorality she committed adultery and presented children from another man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more dynamically, 'bore children by another man.' The Greek more literally says 'presented children from another man.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πρῶτον μὲν ... καὶ δεύτερον ... καὶ τὸ τρίτον
  chosen: For first ... and second ... and third
  alternatives:
  - First ... second ... third
  - In the first place ... in the second ... in the third
  lexicon: LSJ
  rationale: Preserves the Greek's explicit threefold enumeration and the explanatory γάρ with natural English flow.
- source_word: ἐν νόμῳ Ὑψίστου
  chosen: the law of the Most High
  alternatives:
  - the law of the Highest
  - the law of the Most High God
  lexicon: LSJ
  rationale: ἐν with ἀπειθέω here is best represented by reference to the sphere/standard violated. 'Most High' is the conventional rendering of Ὑψίστος and keeps the divine title clear without adding 'God,' which is not explicit.
- source_word: ἠπείθησεν
  chosen: disobeyed
  alternatives:
  - was disobedient
  - refused to obey
  lexicon: BDAG
  rationale: Aorist active of ἀπειθέω is straightforwardly 'disobeyed.' This is concise and idiomatic in English.
- source_word: εἰς ἄνδρα ἑαυτῆς
  chosen: against her husband
  alternatives:
  - with respect to her husband
  - toward her husband
  lexicon: LSJ
  rationale: The idiom with πλημμελέω indicates wrongdoing in relation to her husband. 'Against her husband' makes the offense relation explicit in natural English.
- source_word: ἐπλημμέλησεν
  chosen: committed an offense
  alternatives:
  - transgressed
  - acted wrongly
  - was unfaithful
  lexicon: LSJ
  rationale: The verb denotes committing a fault or offense. 'Committed an offense' preserves the moral/legal nuance without prematurely collapsing it into adultery, which is stated explicitly in the next clause.
- source_word: ἐν πορνείᾳ
  chosen: in sexual immorality
  alternatives:
  - in fornication
  - through prostitution
  - in harlotry
  lexicon: BDAG
  rationale: πορνεία has a broad sexual-immorality sense. 'Sexual immorality' is accessible modern English and avoids the narrower or archaic feel of 'fornication' or the overly specific 'prostitution.'
- source_word: ἐμοιχεύθη
  chosen: she committed adultery
  alternatives:
  - she was adulterous
  - she became an adulteress
  lexicon: BDAG
  rationale: Despite the passive/middle form, the sense is plainly that she engaged in adultery. English active wording is the clearest equivalent.
- source_word: ἐξ ἀλλοτρίου ἀνδρός
  chosen: from another man
  alternatives:
  - by another man
  - from a stranger's husband
  lexicon: LSJ
  rationale: ἀλλότριος here means belonging to another / another's, in context a man not her husband. 'From another man' is idiomatic and fits the childbirth clause.
- source_word: τέκνα παρέστησεν
  chosen: presented children
  alternatives:
  - bore children
  - produced children
  - brought forward children
  lexicon: LSJ
  rationale: παρίστημι literally suggests presenting or producing. 'Presented children' keeps closer to the Greek than simply 'bore children,' while still making sense in context as bringing forth children fathered by another man.
