theological_decisions:
- issue: Moral valence of ἔκδικον in wisdom/family-honor context
  chosen_reading: an avenger
  alternative_readings:
  - a defender
  - a vindicator
  rationale: The Greek presents the son as one who answers enemies on behalf of the father. The text itself does not explicitly moralize the retaliation, so the translation preserves the stronger retaliatory nuance rather than softening it into mere protection.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
