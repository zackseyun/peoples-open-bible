id: GEN.2.9
reference: Genesis 2:9
source:
  edition: WLC
  text: וַ/יַּצְמַ֞ח יְהוָ֤ה אֱלֹהִים֙ מִן הָ֣/אֲדָמָ֔ה כָּל עֵ֛ץ נֶחְמָ֥ד לְ/מַרְאֶ֖ה וְ/ט֣וֹב לְ/מַאֲכָ֑ל וְ/עֵ֤ץ הַֽ/חַיִּים֙ בְּ/ת֣וֹךְ הַ/גָּ֔ן וְ/עֵ֕ץ הַ/דַּ֖עַת ט֥וֹב וָ/רָֽע־־׃
translation:
  text: And Yahweh God caused to grow from the ground every tree that is pleasant to the sight and good for food[a], and the tree of life in the midst of the garden[b], and the tree of the knowledge of good and evil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pleasant to the sight.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'the knowledge of good and evil' is left literal; interpreters differ on whether it refers specifically to moral discernment, maturity, or comprehensive knowledge.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּצְמַח
  chosen: caused to grow
  alternatives:
  - made grow
  - caused to spring up
  - grew
  lexicon: HALOT
  rationale: Hiphil wayyiqtol of צמח is causative, so 'caused to grow' better reflects the verbal stem than the intransitive 'grew.'
- source_word: יְהוָה אֱלֹהִים
  chosen: the LORD God
  alternatives:
  - Yahweh God
  - Jehovah God
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD'; the compound divine name is conventionally and accurately rendered 'the LORD God.'
- source_word: מִן הָאֲדָמָה
  chosen: from the ground
  alternatives:
  - from the soil
  - out of the earth
  lexicon: HALOT
  rationale: אֲדָמָה here denotes the cultivable ground/soil from which vegetation springs. 'Ground' is natural English and fits the Eden context.
- source_word: כָּל עֵץ
  chosen: every tree
  alternatives:
  - all kinds of trees
  - every kind of tree
  lexicon: HALOT
  rationale: The singular collective after כָּל is idiomatically rendered 'every tree,' preserving the distributive sense.
- source_word: נֶחְמָד לְמַרְאֶה
  chosen: desirable to look at
  alternatives:
  - pleasant to the sight
  - delightful in appearance
  lexicon: HALOT
  rationale: The phrase expresses visual desirability or attractiveness. 'Desirable to look at' is clear modern English while preserving the sense of delight/pleasantness.
- source_word: וְטוֹב לְמַאֲכָל
  chosen: and good for food
  alternatives:
  - and good to eat
  - and good for eating
  lexicon: HALOT
  rationale: A straightforward rendering of quality with respect to food value; 'good for food' preserves the Hebrew construction closely.
- source_word: וְעֵץ הַחַיִּים
  chosen: and the tree of life
  lexicon: HALOT
  rationale: Standard and transparent rendering of the construct phrase.
- source_word: בְּתוֹךְ הַגָּן
  chosen: in the midst of the garden
  alternatives:
  - in the middle of the garden
  - within the garden
  lexicon: HALOT
  rationale: בְּתוֹךְ often means 'in the midst/middle of.' 'In the midst of' preserves the slightly elevated, central-location nuance.
- source_word: וְעֵץ הַדַּעַת טוֹב וָרָע
  chosen: and the tree of the knowledge of good and evil
  alternatives:
  - and the tree of knowledge of good and evil
  lexicon: HALOT
  rationale: The article on דַּעַת supports 'the knowledge.' Retaining the full phrase avoids interpretive reduction and preserves the traditional theological expression.
