translation:
  language: es
  text: Los filisteos reunieron sus ejércitos[a] para la batalla, y se reunieron en Soco[b], que pertenece a Judá, y acamparon entre Soco y Azeca, en Efes-damim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sus fuerzas'; el hebreo puede referirse a campamentos militares o, por extensión, a tropas o ejércitos.
    reason: lexical_alternative
  - marker: b
    text: Soco era una ciudad en el territorio de Judá.
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּאַסְפוּ / וַיֵּאָסְפוּ
  english_pob_choice: gathered / assembled
  chosen_spanish: reunieron / se concentraron
  alternatives_spanish:
  - juntaron / se reunieron
  - convocaron / se reunieron
  lexicon: HALOT
  rationale: אָסַף expresa la idea de reunir o juntar; el contexto militar favorece ‘reunieron’ para las fuerzas y ‘se concentraron’ para el movimiento hacia un lugar. Mantiene la progresión narrativa sin forzar un tecnicismo militar ajeno al español natural.
- source_word: פְלִשְׁתִּים
  english_pob_choice: the Philistines
  chosen_spanish: los filisteos
  alternatives_spanish:
  - los filisteos
  lexicon: HALOT
  rationale: Nombre étnico estándar en español bíblico. No requiere adaptación especial.
- source_word: מַחֲנֵיהֶם
  english_pob_choice: their armies
  chosen_spanish: sus ejércitos
  alternatives_spanish:
  - sus campamentos
  - sus fuerzas
  lexicon: HALOT
  rationale: Aunque מַחֲנֶה puede significar ‘campamento’, el auditor inglés revisó la opción hacia ‘armies’ por precisión en este contexto de movilización para batalla. En español, ‘ejércitos’ comunica mejor la fuerza militar reunida sin perder el trasfondo de campamento.
- source_word: לַמִּלְחָמָה
  english_pob_choice: for battle
  chosen_spanish: para la guerra
  alternatives_spanish:
  - para la batalla
  lexicon: HALOT
  rationale: מִלְחָמָה cubre ‘guerra’ y ‘batalla’. Aquí la frase fija de movilización militar admite ‘para la guerra’ en español como equivalente natural y suficientemente literal; ‘para la batalla’ también es viable, pero ‘guerra’ preserva la amplitud del término hebreo.
- source_word: שֹׂכֹה
  english_pob_choice: Socoh
  chosen_spanish: Soco
  alternatives_spanish:
  - Soco
  - Sojoc
  lexicon: HALOT
  rationale: Se adopta una transliteración española breve y estable. ‘Soco’ es legible y evita una forma excesivamente anglicada.
- source_word: אֲשֶׁר לִיהוּדָה
  english_pob_choice: which belongs to Judah
  chosen_spanish: que pertenece a Judá
  alternatives_spanish:
  - que está en Judá
  - que era de Judá
  lexicon: HALOT
  rationale: La construcción con לְ indica pertenencia/adscripción territorial. ‘Pertenece a Judá’ conserva esa relación de forma directa y evita diluirla en una mera ubicación geográfica.
- source_word: וַיַּחֲנוּ
  english_pob_choice: camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - acamparon
  - acampaban
  lexicon: HALOT
  rationale: חנה significa acampar o encamparse. ‘Acamparon’ es el equivalente moderno claro y evita la rigidez de ‘encamparon’.
- source_word: בֵּין ... וּבֵין
  english_pob_choice: between ... and
  chosen_spanish: entre ... y
  alternatives_spanish:
  - entre ... y
  lexicon: HALOT
  rationale: Correlación espacial directa y natural en español.
- source_word: עֲזֵקָה
  english_pob_choice: Azekah
  chosen_spanish: Azeca
  alternatives_spanish:
  - Azeká
  - Azeca
  lexicon: HALOT
  rationale: Topónimo españolizado de manera moderada para lectura eclesial; conserva reconocibilidad bíblica.
- source_word: בְּאֶפֶס דַּמִּים
  english_pob_choice: at Ephes-dammim
  chosen_spanish: en Efes-damim
  alternatives_spanish:
  - en Efes-damim
  - en Epes-damim
  lexicon: HALOT
  rationale: Se trata mejor como nombre propio de lugar. Se mantiene el guion en español para reflejar el compuesto toponímico y facilitar la identificación del sitio.
translation_notes:
  revision_awareness: El auditorio inglés revisó מַחֲנֵיהֶם desde ‘their camps’ a ‘their armies’ por mayor precisión lexical. La redacción española sigue esa revisión y evita la ambigüedad de ‘campamentos’ en un contexto de movilización bélica, sin perder la posibilidad semántica del término hebreo mediante la nota.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando el texto lo requiera; este versículo no contiene el tetragrámaton.
  - Se prefiere ‘los filisteos’ como etnónimo estándar y ‘Soco’/‘Azeca’ como topónimos consistentes dentro del estilo bíblico en español.
  - Se mantiene la estructura narrativa simple del hebreo con verbos en pretérito perfecto simple para fluidez y fidelidad.
