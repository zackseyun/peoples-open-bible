  to: Y lo que se preparaba para cada día era un buey y seis ovejas escogidas; también se preparaban aves para mí, y cada diez días, abundancia de toda clase de vino. Con todo esto, no reclamé la asignación de comida del gobernador[a], porque la carga de trabajo pesaba sobre este pueblo[b].
