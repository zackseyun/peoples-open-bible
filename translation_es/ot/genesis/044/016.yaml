  text: וַ/יֹּ֣אמֶר יְהוּדָ֗ה מַה נֹּאמַר֙ לַֽ/אדֹנִ֔/י מַה נְּדַבֵּ֖ר וּ/מַה נִּצְטַדָּ֑ק הָ/אֱלֹהִ֗ים מָצָא֙ אֶת עֲוֺ֣ן עֲבָדֶ֔י/ךָ הִנֶּ/נּ֤וּ עֲבָדִים֙ לַֽ/אדֹנִ֔/י גַּם אֲנַ֕חְנוּ גַּ֛ם אֲשֶׁר נִמְצָ֥א הַ/גָּבִ֖יעַ בְּ/יָדֽ/וֹ־־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/genesis/044/016.yaml
  text: And Judah said[a], “What shall we say to my lord? What shall we speak? Or how shall we justify ourselves? God has found out the guilt of your slaves. Here we are, my lord’s slaves[c][b], both we and the one in whose hand the cup was found.”
  footnotes:
  - marker: a
    text: Or “How can we clear ourselves?” The Hebrew verb can mean to show oneself in the right or to justify oneself.
    reason: lexical_alternative
  - marker: b
    text: Or “has uncovered the iniquity of your servants.”
    reason: lexical_alternative
  - marker: c
    text: The first “servants” is a deferential self-designation before a superior; “slaves” later in the verse reflects the brothers’ offered status of bondage.
    reason: lexical_alternative
