translation:
  language: es
  text: Ve a la casa de los recabitas, y háblales, y tráelos a la casa de Yahvé[a], a una de las cámaras, y dales a beber vino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el templo de Yahvé». Literalmente, «la casa de Yahvé».
    reason: lexical_alternative
lexical_decisions:
- source_word: הָלוֹךְ
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Anda
  - Vete
  lexicon: HALOT
  rationale: El hebreo usa un imperativo directo de הלך; en español, «Ve» reproduce esa orden de modo natural y breve.
- source_word: בֵּית הָרֵכָבִים
  english_pob_choice: the house of the Rechabites
  chosen_spanish: la casa de los recabitas
  alternatives_spanish:
  - el hogar de los recabitas
  - la familia de los recabitas
  lexicon: HALOT
  rationale: בֵּית puede significar casa, casa-hogar o clan familiar. «La casa de los recabitas» conserva el hebraísmo y la identificación del grupo como unidad social.
- source_word: וְדִבַּרְתָּ אֹתָם
  english_pob_choice: speak to them
  chosen_spanish: háblales
  alternatives_spanish:
  - habla con ellos
  - dirígete a ellos
  lexicon: HALOT
  rationale: דבר con אֵת expresa hablar a/con alguien. «Háblales» es una forma natural en español y mantiene la relación directa del mandato.
- source_word: וַהֲבִיאוֹתָם
  english_pob_choice: bring them
  chosen_spanish: tráelos
  alternatives_spanish:
  - llévalos
  - hazlos venir
  lexicon: HALOT
  rationale: El hiphil de בוא tiene valor causativo. «Tráelos» es idiomático en español y refleja bien la acción de hacer que vengan al lugar indicado.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa del SEÑOR
  lexicon: HALOT
  rationale: La norma del proyecto para יְהוָה es «Yahvé». El hebreo dice literalmente «casa de Yahvé», por lo que esa formulación se conserva en el texto principal.
- source_word: אַחַת הַלְּשָׁכוֹת
  english_pob_choice: one of the chambers
  chosen_spanish: una de las cámaras
  alternatives_spanish:
  - una de las habitaciones
  - una de los aposentos
  lexicon: HALOT
  rationale: לשכה designa una cámara o recinto, a menudo dentro del área del templo. «Cámaras» mantiene mejor el matiz arquitectónico y cultual que «habitaciones».
- source_word: וְהִשְׁקִיתָ אֹתָם יָיִן
  english_pob_choice: give them wine to drink
  chosen_spanish: dales a beber vino
  alternatives_spanish:
  - haz que beban vino
  - ofréceles vino para beber
  lexicon: HALOT
  rationale: El hiphil de שקה significa causar a beber o dar de beber. «Dales a beber vino» expresa el sentido sin introducir una coerción que el contexto no exige.
theological_decisions:
- issue: Representación del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: 'Se sigue la convención doctrinal del proyecto para el nombre divino: transliterar el Tetragrámaton como «Yahvé» en lugar de sustituirlo por un título como «Señor».'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La fuente inglesa revisó «speak with them» a «speak to them» para ajustarse más de cerca al hebreo, sin otros cambios sustanciales. La redacción española sigue esa decisión con «háblales», manteniendo la cercanía semántica y la naturalidad idiomática.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme a la terminología del proyecto para יְהוָה.
  - «Casa de los recabitas» conserva el hebraísmo social sin forzar una paráfrasis explicativa en el texto principal.
  - «Cámaras» reproduce el espacio arquitectónico-templo del hebreo y evita un término demasiado genérico.
  - El imperativo y las coordinaciones siguen el paralelismo del hebreo sin añadir elementos interpretativos.
