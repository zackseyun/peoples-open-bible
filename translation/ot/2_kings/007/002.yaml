id: 2KI.7.2
reference: 2 Kings 7:2
source:
  edition: WLC
  text: וַ/יַּ֣עַן הַ/שָּׁלִ֡ישׁ אֲשֶׁר לַ/מֶּלֶךְ֩ נִשְׁעָ֨ן עַל יָד֜/וֹ אֶת אִ֣ישׁ הָ/אֱלֹהִים֮ וַ/יֹּאמַר֒ הִנֵּ֣ה יְהוָ֗ה עֹשֶׂ֤ה אֲרֻבּוֹת֙ בַּ/שָּׁמַ֔יִם הֲ/יִהְיֶ֖ה הַ/דָּבָ֣ר הַ/זֶּ֑ה וַ/יֹּ֗אמֶר הִנְּ/כָ֤ה רֹאֶה֙ בְּ/עֵינֶ֔י/ךָ וּ/מִ/שָּׁ֖ם לֹ֥א תֹאכֵֽל־־־׃ס
translation:
  text: Then the officer on whose arm the king leaned answered the man of God and said[a], “Look, if Yahweh were making windows in the heavens, could this thing happen?” And he said, “Look, you are about to see it with your own eyes[b], but you will not eat from it.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'if the LORD were opening floodgates in heaven.' The Hebrew literally says 'making windows in the heavens,' a metaphor for extraordinary provision from above.
    reason: lexical_alternative
  - marker: b
    text: Or 'Look, if the LORD were making windows in the heavens, could this thing happen?'.
    reason: previous_rendering
lexical_decisions:
- source_word: הַשָּׁלִישׁ
  chosen: the officer
  alternatives:
  - the captain
  - the adjutant
  - the royal officer
  lexicon: HALOT
  rationale: שָׁלִישׁ can denote a high-ranking military or royal officer, traditionally 'captain.' 'Officer' is clearer in modern English and fits the court setting without overstating a precise rank not explicit in the context.
- source_word: נִשְׁעָן עַל יָדוֹ
  chosen: on whose arm the king leaned
  alternatives:
  - on whose hand the king leaned
  - the king's attendant
  lexicon: HALOT
  rationale: The idiom is kept fairly literally to preserve the vivid court image and the relational nuance of trusted support. 'Arm' is more natural English than 'hand' here while still reflecting יָד.
- source_word: אִישׁ הָאֱלֹהִים
  chosen: the man of God
  lexicon: HALOT
  rationale: This is the standard Hebrew title for a prophet and is transparent in English; no need to paraphrase as 'prophet' in the main text.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: A discourse marker drawing attention. 'Look' is readable modern English and preserves the confrontational tone better than archaic 'Behold.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עֹשֶׂה אֲרֻבּוֹת בַּשָּׁמַיִם
  chosen: were making windows in the heavens
  alternatives:
  - were opening floodgates in heaven
  - were making sluices in the sky
  lexicon: HALOT
  rationale: אֲרֻבּוֹת literally refers to openings/windows, often in contexts of heavenly outpouring. 'Windows in the heavens' preserves the metaphor and the officer's skeptical hyperbole. 'Floodgates' is interpretive and better preserved as an alternative.
- source_word: הֲיִהְיֶה הַדָּבָר הַזֶּה
  chosen: could this thing happen?
  alternatives:
  - would this thing happen?
  - could this be?
  lexicon: HALOT
  rationale: The interrogative expresses incredulity about possibility. 'Could this thing happen?' captures the skeptical force in natural English.
- source_word: הִנְּכָה
  chosen: Look, you are about to
  alternatives:
  - Behold, you will
  - See, you shall
  lexicon: HALOT
  rationale: The particle plus pronoun is emphatic and deictic, introducing Elisha's direct reply. 'Look, you are about to' preserves the immediacy and address to the officer.
- source_word: רֹאֶה בְּעֵינֶיךָ
  chosen: see it with your own eyes
  alternatives:
  - see with your eyes
  - be seeing with your eyes
  lexicon: HALOT
  rationale: English idiom naturally adds 'your own' for emphasis already present in the Hebrew construction.
- source_word: וּמִשָּׁם לֹא תֹאכֵל
  chosen: but you will not eat from it
  alternatives:
  - but from there you will not eat
  - but you will not eat any of it
  lexicon: HALOT
  rationale: מִשָּׁם likely refers to the promised provision just mentioned in context. 'From it' is the most natural English way to express exclusion from partaking in that provision.
