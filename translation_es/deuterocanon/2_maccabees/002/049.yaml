translation:
  language: es
  text: y a recobrar el santuario renombrado en toda la tierra habitada[a], y a liberar la ciudad, y a restaurar las leyes que estaban a punto de ser abolidas, mientras el Señor, con toda clemencia[b], les mostraba misericordia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todo el mundo»; el griego dice literalmente «la tierra habitada».
    reason: lexical_alternative
  - marker: b
    text: O «con toda benignidad» o «con toda indulgencia»; el griego también puede expresar la idea de clemencia, gentileza o paciente tolerancia.
    reason: lexical_alternative
lexical_decisions:
- source_word: περιβόητον
  english_pob_choice: renowned
  chosen_spanish: famoso
  alternatives_spanish:
  - renombrado
  - célebre
  - ampliamente conocido
  lexicon: LSJ
  rationale: El adjetivo comunica que algo es muy conocido o muy comentado. En español, «famoso» mantiene esa idea de notoriedad de manera natural y solemne, sin exagerar el matiz.
- source_word: οἰκουμένην
  english_pob_choice: the whole inhabited world
  chosen_spanish: toda la tierra habitada
  alternatives_spanish:
  - todo el mundo habitado
  - el mundo entero
  - toda la tierra
  lexicon: LSJ
  rationale: La expresión griega es literalmente «la tierra/mundo habitado». «Tierra habitada» conserva el matiz de οἰκουμένην sin convertirlo sin más en una noción moderna de globalidad.
- source_word: ἱερὸν
  english_pob_choice: sanctuary
  chosen_spanish: santuario
  alternatives_spanish:
  - templo
  - lugar santo
  lexicon: LSJ
  rationale: Aquí el referente es el complejo sagrado de Jerusalén. «Santuario» preserva el carácter sagrado del lugar y evita restringirlo innecesariamente a un edificio específico.
- source_word: ἀνακομίσασθαι
  english_pob_choice: recover
  chosen_spanish: recobrar
  alternatives_spanish:
  - recuperar
  - restaurar
  - volver a traer
  lexicon: LSJ
  rationale: El infinitivo medio expresa la acción de volver a obtener o recuperar algo perdido. «Recobrar» transmite bien la idea de recuperar de nuevo el santuario en un español claro y elevado.
- source_word: ἐλευθερῶσαι
  english_pob_choice: free
  chosen_spanish: libertar
  alternatives_spanish:
  - liberar
  - hacer libre
  lexicon: LSJ
  rationale: El verbo significa liberar o poner en libertad. «Libertar la ciudad» conserva el sentido político y formal del texto, sin perder claridad.
- source_word: τοὺς μέλλοντας καταλύεσθαι νόμους
  english_pob_choice: the laws that were about to be abolished
  chosen_spanish: las leyes que estaban a punto de ser abolidas
  alternatives_spanish:
  - las leyes que iban a ser abolidas
  - las leyes destinadas a ser anuladas
  - las leyes que estaban por ser derrocadas
  lexicon: LSJ
  rationale: μέλλοντας + infinitivo pasivo expresa inminencia; καταλύω aquí es abolir o desmantelar. «A punto de ser abolidas» conserva esa inmediatez y la amenaza contra las leyes.
- source_word: ἐπανορθῶσαι
  english_pob_choice: restore
  chosen_spanish: restaurar
  alternatives_spanish:
  - reestablecer
  - reparar
  - poner de nuevo en pie
  lexicon: LSJ
  rationale: El verbo significa enderezar de nuevo, corregir o restaurar. «Restaurar» es idiomático y mantiene la dimensión institucional/legal del contexto.
- source_word: τοῦ κυρίου
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el maestro
  lexicon: LSJ
  rationale: De acuerdo con la convención doctrinal del proyecto, κύριος referido a Dios se traduce como «el Señor». Aquí la referencia es a la acción misericordiosa de Dios hacia el pueblo.
- source_word: μετὰ πάσης ἐπιεικείας
  english_pob_choice: with all forbearance
  chosen_spanish: con toda forbearance
  alternatives_spanish:
  - con toda clemencia
  - con toda benignidad
  - con toda indulgencia
  lexicon: LSJ
  rationale: ἐπιείκεια puede abarcar forbearance, clemencia o benignidad. Dado que el audit trail finalizó en «forbearance» como ajuste más preciso, se conserva el término en inglés en el texto español solo como marca auditiva provisoria para evitar falsear el matiz; la opción española más natural queda documentada entre alternativas.
- source_word: ἐλεημονοῦντος αὐτοῖς
  english_pob_choice: was showing them mercy
  chosen_spanish: les mostraba misericordia
  alternatives_spanish:
  - les tenía misericordia
  - actuaba misericordiosamente para con ellos
  lexicon: LSJ
  rationale: El participio expresa una acción continua y misericordiosa del Señor hacia ellos. «Les mostraba misericordia» es natural en español y preserva el aspecto durativo.
theological_decisions:
- issue: Valor de κύριος como referencia divina
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el maestro
  rationale: El contexto atribuye misericordia divina y acción salvadora al sujeto. Por eso se mantiene «el Señor» conforme a la convención del proyecto para κύριος cuando designa a Dios.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Tensión semántica de ἐπιείκεια en el contexto de misericordia
  english_pob_reading: with all forbearance
  chosen_spanish_reading: con toda forbearance
  alternative_spanish_readings:
  - con toda clemencia
  - con toda benignidad
  - con toda indulgencia
  rationale: 'La palabra griega admite varias cercanías semánticas: clemencia, benignidad, indulgencia, forbearance. Para no borrar esa tensión lexical, se documentan alternativas y se conserva el matiz de tolerancia benigna del acto divino.'
  doctrine_reference: LSJ / uso helenístico de ἐπιείκεια
translation_notes:
  revision_awareness: Se siguió el audit trail inglés y se priorizó el ajuste final de ἐπιείκεια hacia «forbearance», pero en español se optó por una redacción natural que conserva el matiz mediante nota léxica. Se mantuvo la equivalencia de ἀνακομίσασθαι como acción de recobrar/recuperar, ἐλευθερῶσαι como liberar, y ἐπανορθῶσαι como restaurar, en concordancia con la revisión más reciente.
  spanish_consistency_notes:
  - Se usa «santuario» para ἱερὸν por coherencia con el POB inglés y el referente del templo de Jerusalén.
  - Se evita «SEÑOR» en mayúsculas como máscara y se traduce con «el Señor» en forma natural de español.
  - Se conserva la cadencia coordinada del griego con cuatro infinitivos finales en español.
  - Se anotó la ambigüedad de οἰκουμένην sin sobrerreferirla a un globo moderno.
  - La nota b mantiene visible la tensión de ἐπιείκεια sin imponer una sola equivalencia rígida.
