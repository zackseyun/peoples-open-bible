    issue: Falta la nota cultural sobre «sus hermanos».
    rationale: El inglés POB conserva explícitamente una nota que aclara que «their brothers» se refiere a sus correligionarios dentro de la comunidad sacerdotal. En español, «sus hermanos» también puede leerse literalmente como hermanos de sangre; por fidelidad al expediente auditado conviene preservar esa aclaración.
  - severity: low
