  revision_awareness: El texto fuente y la evaluación en inglés muestran acuerdo alto y no registran revisiones aplicadas; por eso la versión española sigue de cerca la cadena genealógica y conserva las opciones léxicas ya auditadas, adaptándolas solo a la morfología natural del español.
  spanish_consistency_notes:
  - Se mantiene la coordinación repetida con 'y' para reflejar la enumeración hebrea.
  - Se usa 'hijo de' de modo literal en la cadena genealógica, con nota sobre su posible valor de descendiente.
  - Los nombres propios se transliteran con grafía española legible y uniforme.
  - No se introduce puntuación adicional que altere el ritmo enumerativo del versículo.
