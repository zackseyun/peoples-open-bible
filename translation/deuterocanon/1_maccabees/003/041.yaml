translation:
  text: And the merchants of the land heard their name[a], and they took very much silver and gold, and servants, and came into the camp to take the sons of Israel as servants[c][b]. And forces from Syria and from the land of foreigners were added to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their fame' or 'the report about them.' Literally, 'their name.'
    reason: lexical_alternative
  - marker: b
    text: '''Servants'' here refers to people acquired as human property; alternatively, ''slaves.'' The Greek uses the same word both for those brought along and for what the sons of Israel were to become.'
    reason: lexical_alternative
  - marker: c
    text: Or 'forces of Syria and of foreign lands joined them.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἔμποροι
  chosen: merchants
  alternatives:
  - traders
  lexicon: LSJ
  rationale: The term denotes commercial dealers. 'Merchants' is natural modern English and fits the context of people coming prepared to buy captives.
- source_word: τῆς χώρας
  chosen: of the land
  alternatives:
  - of the country
  - of the region
  lexicon: LSJ
  rationale: χώρα commonly means land, country, or region. 'Of the land' stays close to the Greek while remaining intelligible.
- source_word: τὸ ὄνομα αὐτῶν
  chosen: their name
  alternatives:
  - the report about them
  - their fame
  lexicon: LSJ
  rationale: Literally 'their name.' In context it refers to the heard report/reputation of the opposing forces, but retaining 'their name' preserves the Greek idiom without obscuring sense.
- source_word: ἀργύριον καὶ χρυσίον πολὺ σφόδρα
  chosen: very much silver and gold
  alternatives:
  - a great deal of silver and gold
  - an exceedingly large amount of silver and gold
  lexicon: LSJ
  rationale: The phrase intensifies quantity. 'Very much silver and gold' is a close rendering of πολὺ σφόδρα without becoming wooden.
- source_word: παῖδας
  chosen: servants
  alternatives:
  - slaves
  - boys
  lexicon: LSJ
  rationale: The noun can mean children/boys or slaves/servants depending on context. Here the merchants come with money to acquire Israelites as human property; the bonded sense is primary. Because the same word is used both for what they brought and what they intended to make the Israelites become, 'servants' preserves lexical consistency while allowing the slavery context to be inferred from the scene.
- source_word: παρεμβολήν
  chosen: camp
  alternatives:
  - encampment
  lexicon: LSJ
  rationale: Standard military sense; 'camp' is the most natural English equivalent.
- source_word: τοῦ λαβεῖν ... εἰς παῖδας
  chosen: to take the sons of Israel as servants
  alternatives:
  - to seize the sons of Israel as slaves
  - to take the Israelites for servants
  lexicon: LSJ
  rationale: The infinitive phrase expresses purpose. 'As servants' reflects εἰς παῖδας and keeps the repeated noun visible. 'Sons of Israel' is retained rather than flattening to 'Israelites' because the Greek explicitly has υἱούς.
- source_word: προσετέθησαν πρὸς αὐτούς
  chosen: were added to them
  alternatives:
  - joined them
  lexicon: LSJ
  rationale: A straightforward passive/additive expression. 'Were added to them' is slightly more formal but closely tracks the Greek.
- source_word: δυνάμεις Συρίας
  chosen: forces from Syria
  alternatives:
  - Syrian forces
  lexicon: LSJ
  rationale: The genitive can be rendered adjectivally, but 'from Syria' mirrors the parallel structure with 'from the land of foreigners.'
- source_word: γῆς ἀλλοφύλων
  chosen: the land of foreigners
  alternatives:
  - the land of the Philistines
  - foreign lands
  lexicon: LSJ
  rationale: ἀλλόφυλοι literally means people of another tribe/foreigners. In some biblical contexts it can function as 'Philistines,' but here the broader sense fits the military coalition context better and avoids importing a narrower ethnic identification not demanded by the verse.
