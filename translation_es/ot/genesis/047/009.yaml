translation:
  language: es
  text: 'Entonces Jacob dijo a Faraón: «Los días de los años de mi residencia temporal[a] son ciento treinta años. Pocos y malos han sido los días de los años de mi vida[b], y no han alcanzado los días de los años de la vida de mis padres en los días de su residencia temporal».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi peregrinación … su peregrinación». El hebreo se refiere a vivir como residente temporal o extranjero.
    reason: lexical_alternative
  - marker: b
    text: 'O: «Pocos y malos han sido los días de los años de mi vida»; «malos» también puede entenderse como «duros» o «penosos» en este contexto.'
    reason: alternative_reading
lexical_decisions:
- source_word: מְגוּרַי / מְגוּרֵיהֶם
  english_pob_choice: my sojourning / their sojourning
  chosen_spanish: peregrinación / su peregrinación
  alternatives_spanish:
  - sojourn / su sojourn
  - residencia temporal / su residencia temporal
  - morada / su morada
  lexicon: HALOT
  rationale: El hebreo מָגוּר / מְגוּרִים expresa la condición de residente temporal o extranjero. En español, «peregrinación» conserva bien la idea de vida no asentada definitivamente, aunque también puede oírse en clave religiosa; por eso se mantiene con nota alternativa. Evita a la vez la neutralización de «residencia», que perdería el matiz histórico-patriarcal.
- source_word: יְמֵי שְׁנֵי
  english_pob_choice: the days of the years of
  chosen_spanish: los días de los años de
  alternatives_spanish:
  - los años de
  - la duración de
  lexicon: HALOT
  rationale: Se conserva la acumulación hebrea de «días» y «años», que da al enunciado su tono solemne y su carácter idiomático de recuento de vida. No se comprime a «los años de», para no perder esa textura.
- source_word: שְׁלֹשִׁים וּמְאַת שָׁנָה
  english_pob_choice: one hundred thirty years
  chosen_spanish: ciento treinta años
  alternatives_spanish:
  - cien y treinta años
  lexicon: HALOT
  rationale: Forma numérica normal en español moderno y plenamente equivalente en sentido. Mantiene la naturalidad sin alterar el valor exacto.
- source_word: מְעַט
  english_pob_choice: few
  chosen_spanish: pocos
  alternatives_spanish:
  - breves
  - escasos
  lexicon: HALOT
  rationale: «Pocos» reproduce directamente el valor cuantitativo del adjetivo. En combinación con la evaluación de vida de Jacob, comunica comparación y resumen retrospectivo.
- source_word: וְרָעִים
  english_pob_choice: evil
  chosen_spanish: malos
  alternatives_spanish:
  - malos y duros
  - malignos
  lexicon: HALOT
  rationale: Aquí רָעִים describe la calidad penosa de la vida, no maldad moral de los días. «Malos» es la equivalencia breve y amplia que evita importar de manera demasiado fuerte «malvados» o «malignos» a los días mismos; si se quisiera intensificar el sufrimiento, «duros» sería una alternativa interpretativa.
- source_word: חַיַּי / חַיֵּי אֲבֹתַי
  english_pob_choice: my life / the lives of my fathers
  chosen_spanish: mi vida / la vida de mis padres
  alternatives_spanish:
  - mi vida / las vidas de mis padres
  - mi existencia / la existencia de mis padres
  lexicon: HALOT
  rationale: «Vida» en singular suena natural en español y refleja el hebreo constructo referido al lapso vital. «Mis padres» mantiene la referencia patriarcal concreta sin abstraerla a «antepasados».
- source_word: הָיוּ
  english_pob_choice: have been
  chosen_spanish: han sido
  alternatives_spanish:
  - fueron
  lexicon: HALOT
  rationale: El perfecto español expresa bien el balance retrospectivo desde el presente de Jacob ante Faraón.
- source_word: הִשִּׂיגוּ
  english_pob_choice: have not attained
  chosen_spanish: no han alcanzado
  alternatives_spanish:
  - no han llegado a
  - no han igualado
  lexicon: HALOT
  rationale: «Alcanzar» conserva la idea de llegar a un nivel o medida; en el contexto, Jacob declara que sus años no han llegado a los de sus padres. La opción mantiene la comparación sin sobretraducir a «igualado».
- source_word: אֲבֹתַי
  english_pob_choice: my fathers
  chosen_spanish: mis padres
  alternatives_spanish:
  - mis padres ancestros
  - mis antepasados
  lexicon: HALOT
  rationale: Aunque el hebreo es literalmente «mis padres», en el contexto patriarcal puede referirse a los antepasados fundacionales. En español, «padres» conserva la relación textual directa y la continuidad genealógica.
theological_decisions:
- issue: Condición patriarcal de extranjero residente
  english_pob_reading: sojourning
  chosen_spanish_reading: peregrinación
  alternative_spanish_readings:
  - residencia temporal
  - condición de extranjero residente
  rationale: La idea no es una peregrinación devocional en sentido posterior, sino la vida de los patriarcas como residentes no poseedores de la tierra. «Peregrinación» preserva esa tensión histórica; la nota ofrece alternativas para evitar una lectura excesivamente espiritualizada.
  doctrine_reference: Translation philosophy §3, §5
- issue: Valor de רָעִים aplicado a los días
  english_pob_reading: evil
  chosen_spanish_reading: malos
  alternative_spanish_readings:
  - duros
  - penosos
  rationale: El hebreo puede abarcar maldad, desgracia o adversidad. En este contexto, no se atribuye inmoralidad a los días sino una vida marcada por aflicción. «Malos» retiene la amplitud semántica sin forzar una moralización del tiempo vivido.
  doctrine_reference: HALOT; contexto narrativo de Génesis 47
- issue: Comparación con la vida de los patriarcas
  english_pob_reading: have not attained to the days of the years of the lives of my fathers
  chosen_spanish_reading: no han alcanzado los días de los años de la vida de mis padres
  alternative_spanish_readings:
  - no han igualado los años de la vida de mis padres
  - no han llegado a los días de la vida de mis padres
  rationale: El enunciado subraya la brevedad relativa de Jacob frente a Abraham e Isaac. «No han alcanzado» preserva el matiz comparativo y de insuficiencia de medida sin simplificar la frase hebrea.
  doctrine_reference: Génesis 25–35; 47:9
translation_notes:
  revision_awareness: Se tuvo en cuenta la última revisión inglesa, que prefirió una equivalencia más estricta para רָעִים como “evil” y para הִשִּׂיגוּ como “attained to”. En español se optó por “malos” y “no han alcanzado” para conservar el contraste semántico y una sintaxis natural, sin perder la dureza evaluativa ni la comparación de medida. También se conservó la estructura solemne de la frase hebrea mediante la repetición de «los días de los años».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma de referencia al nombre divino, aunque este versículo no lo contiene.
  - «Faraón» se escribe con mayúscula por tratarse del título/nombre propio en contexto narrativo.
  - Se prefirió «padres» a «antepasados» para respetar la formulación patriarcal directa del hebreo.
  - La puntuación sigue el estilo español de cita directa con comillas angulares y cierre narrativo después de la comilla final.
