- from: ¿Por qué retraes[a] tu mano, tu mano derecha? Sáquela de en medio de tu seno y consúmelos.
  to: ¿Por qué retraes[a] tu mano, tu mano derecha? Sácala de en medio de tu seno y consúmelos.
  rationale: 'Se corrige un error gramatical significativo en el imperativo dirigido a Dios: «Sáquela» → «Sácala». Se conserva el resto porque representa fielmente el hebreo y las decisiones del audit trail inglés. La nota al pie se mantiene, con leve ajuste de puntuación y redacción, porque aún sirve para justificar la elección de «retraes».'
