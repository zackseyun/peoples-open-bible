translation:
  language: es
  text: 'Y el rey Salomón amó[a] a muchas mujeres extranjeras, incluyendo a la hija de Faraón: mujeres moabitas, amonitas, edomitas, sidonias e hititas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esposas extranjeras». El hebreo dice «mujeres extranjeras»; el contexto indica que eran mujeres que Salomón tomó en matrimonio o como consortes.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַמֶּלֶךְ
  english_pob_choice: Now King
  chosen_spanish: Y el rey
  alternatives_spanish:
  - Ahora el rey
  - Pero el rey
  lexicon: HALOT
  rationale: La conjunción inicial funciona como avance narrativo; en español, «Y» conserva la conexión sin forzar un adverbio discursivo. «El rey» refleja directamente מֶלֶךְ con el artículo del hebreo.
- source_word: שְׁלֹמֹה
  english_pob_choice: Solomon
  chosen_spanish: Salomón
  lexicon: nombre propio estándar
  rationale: Nombre propio bíblico establecido en español.
- source_word: אָהַב
  english_pob_choice: loved
  chosen_spanish: amó
  alternatives_spanish:
  - tuvo afecto por
  - deseó
  lexicon: HALOT
  rationale: El verbo expresa amor/afecto real; «amó» conserva la fuerza léxica sin debilitarla. En este contexto, la valoración moral se desarrollará en los versículos siguientes.
- source_word: נָשִׁים נָכְרִיּוֹת רַבּוֹת
  english_pob_choice: many foreign women
  chosen_spanish: a muchas mujeres extranjeras
  alternatives_spanish:
  - a muchas esposas extranjeras
  - a muchas mujeres de otras naciones
  lexicon: HALOT
  rationale: «Mujeres extranjeras» traduce de forma directa נָשִׁים נָכְרִיּוֹת sin importar «esposas» al texto principal. «Muchas» preserva רַבּוֹת y el adjetivo «extranjeras» conserva la pertenencia a otro pueblo.
- source_word: וְאֶת בַּת פַּרְעֹה
  english_pob_choice: including Pharaoh’s daughter
  chosen_spanish: incluyendo a la hija de Faraón
  alternatives_spanish:
  - y a la hija de Faraón
  - junto con la hija de Faraón
  lexicon: HALOT
  rationale: La construcción es aditiva; «incluyendo» refleja que la hija de Faraón queda incluida en el grupo, tal como indica el audit trail inglés. «Faraón» es la forma española habitual del nombre/título egipcio.
- source_word: מוֹאֲבִיּוֹת
  english_pob_choice: Moabite
  chosen_spanish: moabitas
  alternatives_spanish:
  - mujeres de Moab
  lexicon: HALOT
  rationale: El gentilicio plural concuerda con «mujeres» y conserva la clasificación étnica específica.
- source_word: עַמֳּנִיּוֹת
  english_pob_choice: Ammonite
  chosen_spanish: amonitas
  alternatives_spanish:
  - mujeres de Amón
  lexicon: HALOT
  rationale: Gentilicio plural estándar en español para el pueblo de Amón.
- source_word: אֲדֹמִיֹּת
  english_pob_choice: Edomite
  chosen_spanish: edomitas
  alternatives_spanish:
  - mujeres de Edom
  lexicon: HALOT
  rationale: Gentilicio plural estándar en español.
- source_word: צֵדְנִיֹּת
  english_pob_choice: Sidonian
  chosen_spanish: sidonias
  alternatives_spanish:
  - mujeres de Sidón
  lexicon: HALOT
  rationale: Se traduce con el gentilicio femenino plural específico de Sidón, manteniendo la precisión geográfica/étnica.
- source_word: חִתִּיֹּת
  english_pob_choice: Hittite
  chosen_spanish: hititas
  alternatives_spanish:
  - mujeres hititas
  lexicon: HALOT
  rationale: Gentilicio plural estándar en español; el plural femenino concuerda con «mujeres».
theological_decisions:
- issue: Si נָשִׁים debe leerse como «mujeres» o «esposas»
  english_pob_reading: women
  chosen_spanish_reading: mujeres
  alternative_spanish_readings:
  - esposas
  rationale: El hebreo dice literalmente «mujeres» y la POB inglesa conserva ese término en el texto principal. «Esposas» sería interpretativo; la dimensión matrimonial queda sugerida por el contexto, no por esta palabra aislada.
  doctrine_reference: Translation philosophy §1, §5
- issue: Si la hija de Faraón queda incluida dentro del conjunto de mujeres extranjeras
  english_pob_reading: included among them
  chosen_spanish_reading: incluida mediante «incluyendo»
  alternative_spanish_readings:
  - separada como categoría aparte
  - y además la hija de Faraón
  rationale: La sintaxis aditiva favorece la inclusión. «Incluyendo» reproduce esa relación sin añadir una separación que el hebreo no exige.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La redacción sigue el punto revisado del audit trail inglés, que cambió «along with» por «including» para reflejar mejor la relación aditiva con la hija de Faraón. También conserva la elección principal de «women» en vez de «wives», reflejando el texto hebreo directo.
  spanish_consistency_notes:
  - Se mantiene «Salomón» como nombre propio establecido y «Faraón» como forma española corriente.
  - «Mujeres extranjeras» preserva el plural del hebreo y evita introducir «esposas» en el cuerpo principal.
  - Los gentilicios aparecen en plural femenino para concordar con «mujeres».
  - La nota al pie usa una alternativa léxica real documentada en el audit trail inglés.
