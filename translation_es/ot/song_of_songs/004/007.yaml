translation:
  language: es
  text: Eres toda hermosa[a], mi amada[b], y no hay defecto[c] en ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «Eres toda hermosa» o «Toda tú eres hermosa».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «mi amor» o «mi cariño».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «mancha», «defecto» o «falta».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֻּלָּךְ
  english_pob_choice: altogether
  chosen_spanish: toda
  alternatives_spanish:
  - enteramente
  - completamente
  - toda tú
  lexicon: HALOT
  rationale: El hebreo intensifica la afirmación sobre la persona en su totalidad. En español, «toda» transmite de forma natural esa totalidad sin volver la frase pesada; «enteramente» o «completamente» suenan más abstractas, y «toda tú» resulta más marcada.
- source_word: יָפָה
  english_pob_choice: beautiful
  chosen_spanish: hermosa
  alternatives_spanish:
  - bella
  - bonita
  - hermosa
  lexicon: HALOT
  rationale: El adjetivo expresa belleza física y estética en un registro poético. «Hermosa» conserva dignidad y claridad en español actual; «bella» también sería posible, pero «hermosa» suena más natural en esta vocación amorosa.
- source_word: רַעְיָתִי
  english_pob_choice: my beloved
  chosen_spanish: mi amada
  alternatives_spanish:
  - mi amada
  - mi amor
  - mi querida
  lexicon: HALOT
  rationale: El vocativo es íntimo y relacional. «Mi amada» preserva el valor nominal y afectivo del término sin reducirlo a una fórmula demasiado coloquial; «mi amor» es posible, pero en español puede sonar más general o idiomático que vocativo.
- source_word: וּמוּם
  english_pob_choice: blemish
  chosen_spanish: defecto
  alternatives_spanish:
  - mancha
  - defecto
  - flaw
  lexicon: HALOT
  rationale: Aunque «blemish» admite «mancha», «defecto» refleja bien el campo semántico de una falta o imperfección y suena natural en español contemporáneo. En este contexto poético, evita una imagen excesivamente específica de suciedad o marca visible.
- source_word: אֵין בָּךְ
  english_pob_choice: there is no ... in you
  chosen_spanish: no hay ... en ti
  alternatives_spanish:
  - no tienes ...
  - no existe ... en ti
  lexicon: HALOT
  rationale: La negación existencial con preposición se vierte de modo natural como «no hay ... en ti», manteniendo la estructura del hebreo y la fluidez en español.
translation_notes:
  revision_awareness: La versión inglesa auditada permanece sin cambios en la última revisión; el español sigue esa lectura estable, conservando las alternativas léxicas documentadas para las expresiones clave.
  spanish_consistency_notes:
  - Se preserva el vocativo íntimo con «mi amada» para mantener el paralelismo con la decisión inglesa.
  - «Toda» y «no hay» reflejan la totalidad y la negación existencial del hebreo sin endurecer el ritmo poético.
  - El término «defecto» se usa aquí como equivalente amplio de מוּם, dejando registradas alternativas más literales en nota.
