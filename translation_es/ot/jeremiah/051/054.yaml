translation:
  language: es
  text: El sonido de un grito[a] viene de Babilonia, y una gran destrucción viene de la tierra de los caldeos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El sonido de un clamor desde Babilonia, y una gran ruina de la tierra de los caldeos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ק֥וֹל
  english_pob_choice: The sound
  chosen_spanish: La voz
  alternatives_spanish:
  - El sonido
  - El ruido
  lexicon: HALOT
  rationale: קול puede significar «voz», «sonido» o «ruido». En este paralelo con זְעָקָה, el español «voz de un grito» mantiene la imagen audible y natural sin forzar una explicación verbal que el hebreo no expresa.
- source_word: זְעָקָ֖ה
  english_pob_choice: of a cry
  chosen_spanish: de un grito
  alternatives_spanish:
  - de un clamor
  - de un alarido
  - de un grito de angustia
  lexicon: HALOT
  rationale: זְעָקָה denota un grito o clamor de angustia. «Grito» es breve y fiel; «clamor» o «alarido» son posibles, pero «grito» conserva mejor la inmediatez del texto.
- source_word: מִ/בָּבֶ֑ל
  english_pob_choice: comes from Babylon
  chosen_spanish: sale de Babilonia
  alternatives_spanish:
  - viene de Babilonia
  - proviene de Babilonia
  lexicon: HALOT
  rationale: El hebreo marca origen o procedencia. «Sale de» reproduce con naturalidad el movimiento implícito en la frase, equivalente funcional de «comes from» en el audit trail inglés.
- source_word: וְ/שֶׁ֥בֶר
  english_pob_choice: and great destruction
  chosen_spanish: y una gran destrucción
  alternatives_spanish:
  - y ruina grande
  - y un gran quebrantamiento
  - y gran ruina
  lexicon: HALOT
  rationale: שבר puede ser «quebranto», «ruina» o «destrucción». En contexto profético de juicio, «destrucción» comunica bien el alcance catastrófico; el sustantivo con artículo indefinido mantiene el paralelismo con la primera cola.
- source_word: גָּד֖וֹל
  english_pob_choice: great
  chosen_spanish: gran
  alternatives_spanish:
  - grande
  - enorme
  lexicon: HALOT
  rationale: גָּדוֹל intensifica la magnitud. En español, «gran» antepuesto suena natural y solemne, conservando la fuerza del adjetivo sin recargar la línea.
- source_word: מֵ/אֶ֥רֶץ
  english_pob_choice: from the land of
  chosen_spanish: de la tierra de
  alternatives_spanish:
  - del país de
  - de la región de
  lexicon: HALOT
  rationale: אֶרֶץ aquí es territorio/país, no la tierra en sentido cósmico. «Tierra de» sigue de cerca la expresión hebrea y la formulación inglesa, y funciona bien en español bíblico actual.
- source_word: כַּשְׂדִּֽים
  english_pob_choice: the Chaldeans
  chosen_spanish: los caldeos
  alternatives_spanish:
  - Chaldea
  - los caldeos
  lexicon: HALOT
  rationale: El hebreo nombra al pueblo, no un topónimo abstracto. «Caldeos» respeta la referencia etnopolítica del original y evita sustituirla por un nombre de país que el texto no usa.
translation_notes:
  revision_awareness: El texto inglés auditado no requiere cambios sustanciales. Se mantuvo la estructura paralela y el valor semántico de קול/זְעָקָה y שבר/גדול, con una opción española idiomática que sigue de cerca el hebreo.
  spanish_consistency_notes:
  - Se empleó «Babilonia» y «los caldeos» de forma consistente con los equivalentes históricos habituales y con el contexto profético.
  - Se prefirió «grito» sobre «clamor» en el texto principal para conservar la concisión del paralelismo.
  - Se usó «sale de» para expresar origen sin añadir una lectura interpretativa más fuerte que el hebreo.
