review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del hebreo: Abram pasa por la tierra hasta Siquem y luego hasta el árbol/lugar de Moreh; también conserva el singular colectivo en «el cananeo». Sin embargo, hay un problema grave de anclaje de notas y correspondencia léxica: la nota [a] está puesta en «Siquem» pero su contenido corresponde a «encina/terebinto», y la nota [b] está puesta en «More» pero su contenido corresponde a la alternativa «los cananeos». Además, «encinar» no es fiel a אֵלוֹן, que se refiere a un árbol singular o árbol notable, no a una arboleda.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «encinar de More» suena menos preciso y algo impropio en este contexto bíblico, porque normalmente designa un conjunto de encinas. «La encina de More» o «el terebinto de More» es más natural y más cercano a la fuente. También conviene usar «Moreh» para reflejar mejor la transliteración del nombre propio documentada en el POB inglés.
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto. «Dios», «Yahvé», etc. no aparecen aquí. Sí hay una desviación del razonamiento léxico auditado: el inglés documenta «oak of Moreh» con nota alternativa «terebinth», mientras que el español usa «encinar», que cambia singular por colectivo/localidad. El singular colectivo «el cananeo» sí está bien alineado con la decisión auditada.'
  issues:
  - severity: high
    issue: Las notas al pie están ancladas a los lugares equivocados.
    rationale: La nota [a] habla de «terebinto» y de la especie del árbol, por lo que debe anclarse en «encina/árbol», no en «Siquem». La nota [b] trata de la alternativa «los cananeos», por lo que debe anclarse en «cananeo», no en «More».
  - severity: medium
    issue: «Encinar» no corresponde bien a אֵלוֹן.
    rationale: אֵלוֹן aquí se entiende mejor como un árbol singular o árbol notable («encina», con alternativa «terebinto»), no como una arboleda o encinar. «Encinar» introduce un matiz locativo/colectivo no presente en la fuente.
  - severity: low
    issue: «More» debería preferiblemente transliterarse «Moreh».
    rationale: La decisión inglesa auditada conserva «Moreh» como nombre propio. En español bíblico es natural mantener «Moreh» para no perder la forma del nombre ni crear una adaptación innecesaria.
  revised_spanish_text: Abram pasó por la tierra hasta el lugar de Siquem, hasta la encina[a] de Moreh. Y el cananeo[b] estaba entonces en la tierra.
  revised_footnotes:
  - marker: a
    text: O «el terebinto de Moreh»; el término hebreo designa un árbol grande, pero la especie exacta es incierta.
    reason: lexical_alternative
  - marker: b
    text: O «los cananeos estaban entonces en la tierra». El hebreo usa un término étnico singular que puede funcionar colectivamente.
    reason: alternative_reading
  revision_rationale: Se corrigieron los anclajes de las notas para que coincidan con las palabras relevantes del texto. También se reemplazó «encinar» por «encina» para reflejar mejor el singular de אֵלוֹן y se ajustó «More» a «Moreh» en línea con la transliteración auditada.
