translation:
  language: es
  text: Y Laban dio a Zilpá su esclava a Lea su hija como esclava[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sierva»; el término hebreo designa a una mujer en condición de dependencia, probablemente esclavizada.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  english_pob_choice: gave
  chosen_spanish: entregó
  alternatives_spanish:
  - dio
  - le dio
  lexicon: HALOT
  rationale: נתן expresa aquí una acción narrativa de transferencia o entrega. En español, "entregó" conserva mejor que "dio" la idea de asignación formal de una persona a otra en este contexto doméstico y matrimonial, sin añadir interpretación.
- source_word: לָבָן
  english_pob_choice: Laban
  chosen_spanish: Laban
  alternatives_spanish:
  - Labán
  lexicon: convención onomástica
  rationale: El nombre propio se translitera. Se conserva "Laban" para mantener uniformidad con la forma base del proyecto y porque es plenamente reconocible en español bíblico.
- source_word: לָהּ
  english_pob_choice: to Leah
  chosen_spanish: a Lea
  alternatives_spanish:
  - a ella
  lexicon: HALOT
  rationale: El sufijo pronominal significa literalmente "a ella", pero el referente inmediato es Lea. Explicitar "a Lea" evita ambigüedad y sigue la lógica de la POB en inglés.
- source_word: זִלְפָּה
  english_pob_choice: Zilpah
  chosen_spanish: Zilpá
  alternatives_spanish:
  - Zilpa
  lexicon: convención onomástica
  rationale: Se translitera el nombre propio en forma natural para el español. "Zilpá" respeta la acentuación aguda habitual en nombres bíblicos hispanos.
- source_word: שִׁפְחָתוֹ
  english_pob_choice: his female servant
  chosen_spanish: su esclava
  alternatives_spanish:
  - su sierva
  - su criada
  - su servidora
  lexicon: HALOT
  rationale: שִׁפְחָה designa una mujer de estatus dependiente, probablemente esclavizado. "Esclava" conserva esa fuerza léxica mejor que "sierva" o "criada", y evita suavizar el término.
- source_word: לְלֵאָה בִתּוֹ
  english_pob_choice: to Leah his daughter
  chosen_spanish: a Lea, su hija
  alternatives_spanish:
  - para Lea, su hija
  lexicon: HALOT
  rationale: El lamed marca destinatario; "a Lea, su hija" es la reproducción directa y clara del vínculo filial en apposición.
- source_word: שִׁפְחָה
  english_pob_choice: as a female servant
  chosen_spanish: como esclava
  alternatives_spanish:
  - como sierva
  - para esclava
  lexicon: HALOT
  rationale: El segundo sustantivo repite la función asignada a Zilpá. Se mantiene la repetición semántica en español para no borrar la tensión léxica del hebreo; "como esclava" refleja el estatus y la finalidad de su entrega.
theological_decisions:
- issue: estatus social de שִׁפְחָה
  english_pob_reading: female servant with dependent, likely enslaved, status
  chosen_spanish_reading: esclava, con estatus dependiente y probablemente esclavizado
  alternative_spanish_readings:
  - sierva
  - criada
  rationale: La POB inglesa preserva la dependencia probable y la carga social del término. "Esclava" comunica con mayor precisión ese peso que opciones más suaves, sin eliminar la posibilidad contextual de matizar en nota.
  doctrine_reference: Éxodo 21; Génesis 16:1-6; observación léxica sobre estado servil en el mundo antiguo
translation_notes:
  revision_awareness: 'La redacción sigue el último estado revisado del inglés POB: evita comas innecesarias, conserva la repetición del término de estatus en lugar de suavizarla, y refleja de manera directa la asignación de Zilpá a Lea como parte del contexto narrativo sin reinterpretarlo.'
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como convención general del proyecto, aunque este versículo no contiene el tetragrámaton.
  - Se usa "esclava" de forma consistente con la decisión léxica del proyecto para שִׁפְחָה cuando el contexto exige la fuerza social del término.
  - Se conserva el estilo narrativo simple y paratáctico del hebreo, sin expandir el texto más allá de lo necesario.
