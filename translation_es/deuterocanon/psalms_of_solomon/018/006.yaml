translation:
  language: es
  text: Que Dios purifique a Israel para un día de misericordia con bendición, para un día de selección en la exaltación de su Mesías.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καθαρίσαι
  english_pob_choice: purify
  chosen_spanish: purifique
  alternatives_spanish:
  - limpie
  - purifique
  lexicon: LSJ
  rationale: El griego expresa una acción de purificación en forma optativa de ruego. En español, el subjuntivo exhortativo/optativo "que ... purifique" comunica con naturalidad la fuerza de súplica sin volver la frase rígidamente literal.
- source_word: Ἰσραὴλ
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - el Israel
  - el pueblo de Israel
  lexicon: LSJ
  rationale: Aquí Ἰσραήλ funciona como objeto directo del verbo, no como genitivo. Mantener "Israel" conserva la sintaxis del griego y evita introducir un sujeto o complemento no presente en el texto.
- source_word: εἰς ἡμέραν ἐλέους
  english_pob_choice: for a day of mercy
  chosen_spanish: para un día de misericordia
  alternatives_spanish:
  - para el día de misericordia
  - hacia un día de misericordia
  lexicon: LSJ
  rationale: 'εἰς tiene aquí valor prospectivo: orientación hacia una fecha o momento venidero. "Para un día de misericordia" preserva esa proyección futura y traduce ἔλεος con el sustantivo bíblico natural "misericordia".'
- source_word: ἐν εὐλογίᾳ
  english_pob_choice: in blessing
  chosen_spanish: en bendición
  alternatives_spanish:
  - con bendición
  - por bendición
  lexicon: LSJ
  rationale: La preposición ἐν señala circunstancia o modo. "En bendición" mantiene cercanía al griego y es idiomático en español culto; "bendición" traduce adecuadamente εὐλογία sin añadir un matiz instrumental que el texto no exige.
- source_word: εἰς ἡμέραν ἐκλογῆς
  english_pob_choice: for a day of selection
  chosen_spanish: para un día de selección
  alternatives_spanish:
  - para un día de elección
  - para un día de escogimiento
  lexicon: LSJ
  rationale: ἐκλογή puede ser "elección" en sentido teológico, pero en español "selección" comunica mejor la idea de acto de escoger sin cargar el término con asociaciones ajenas. Se conserva así la fuerza de la elección divina.
- source_word: ἐν ἀνάξει
  english_pob_choice: in the exaltation
  chosen_spanish: en la exaltación
  alternatives_spanish:
  - en el levantamiento
  - en la elevación
  lexicon: LSJ
  rationale: La forma nominal apunta a elevación o encumbramiento. "Exaltación" reproduce bien el sentido abstracto y solemne que ya asumió el texto inglés revisado, sin perder el matiz de ascenso honorífico.
- source_word: χριστοῦ αὐτοῦ
  english_pob_choice: his Messiah
  chosen_spanish: su Mesías
  alternatives_spanish:
  - su Cristo
  lexicon: LSJ
  rationale: Conforme al criterio del proyecto, Χριστός se vierte como "Mesías" cuando funciona como título. "Su Mesías" mantiene el sentido judío-mesiánico del pasaje y evita el uso litúrgico cristiano de "Cristo".
theological_decisions:
- issue: La fuerza modal de καθαρίσαι en un texto poético-oracional.
  english_pob_reading: May God purify Israel ...
  chosen_spanish_reading: Que Dios purifique a Israel ...
  alternative_spanish_readings:
  - Purifique Dios a Israel ...
  - Ojalá Dios purifique a Israel ...
  rationale: El griego presenta una forma optativa que expresa deseo o petición. En español, la construcción con "Que" reproduce esa modalidad de ruego de manera natural y reverente, sin convertirla en una afirmación indicativa.
  doctrine_reference: Lectura oracional y dependiente del contexto; prioridad al valor volitivo del original.
- issue: El valor de ἐκλογῆς entre "elección" y "selección".
  english_pob_reading: for a day of selection
  chosen_spanish_reading: para un día de selección
  alternative_spanish_readings:
  - para un día de elección
  - para un día de escogimiento
  rationale: '"Elección" es posible, pero en español puede sonar más técnico o doctrinal de lo que el sintagma exige. "Selección" conserva la idea de escoger divinamente y refleja la revisión inglesa más reciente, con un tono más transparente.'
  doctrine_reference: Mantener la ambigüedad útil del término sin imponer un sistema doctrinal externo.
- issue: La relación entre ἀνάξει y la entronización/encumbramiento del Mesías.
  english_pob_reading: in the exaltation of his Messiah
  chosen_spanish_reading: en la exaltación de su Mesías
  alternative_spanish_readings:
  - en el levantamiento de su Mesías
  - en la elevación de su Mesías
  rationale: El griego permite una elevación real/mesiánica sin precisar el mecanismo. "Exaltación" preserva la amplitud semántica y la dignidad del título, sin reducirlo a una sola imagen política o ritual.
  doctrine_reference: No estrechar el alcance del texto más allá de lo que el griego explícitamente dice.
translation_notes:
  revision_awareness: La redacción sigue la revisión final inglesa que corrigió la lectura sintáctica principal de Ἰσραήλ como objeto directo y prefirió "selection" / "exaltation". Se evitó la formulación previa que implicaba genitivo ('Dios de Israel') o un objeto suplido ('nos') porque el griego no lo exige y la revisión posterior descartó esa interpretación.
  spanish_consistency_notes:
  - Se mantiene "Mesías" para χριστός conforme a la terminología proyectual.
  - Se traduce ἔλεος por "misericordia" y εὐλογία por "bendición" con registro bíblico natural en español.
  - La oración conserva el paralelismo de dos miembros con 'para un día ...' / 'para un día ...' para reflejar la estructura del griego.
  - No se añaden notas al texto porque no hay ambigüedad residual que requiera marcadores en la línea española.
