source:
  edition: SBLGNT
  text: καὶ γὰρ κινδυνεύομεν ἐγκαλεῖσθαι στάσεως περὶ τῆς σήμερον μηδενὸς αἰτίου ὑπάρχοντος περὶ οὗ οὐ δυνησόμεθα ⸀ἀποδοῦναι λόγον ⸀περὶ τῆς συστροφῆς ταύτης. καὶ ταῦτα εἰπὼν ἀπέλυσεν τὴν ἐκκλησίαν.
base_translation:
  language: en
  yaml_path: translation/nt/acts/019/040.yaml
  text: For indeed we are in danger of being charged with rioting over what happened today[a], since there is no cause for it, and we will not be able to give an account for this commotion. And after saying these things[c][b], he dismissed the assembly.
  footnotes:
  - marker: a
    text: Or 'with sedition' or 'with insurrection'; the Greek term can denote a serious civil uprising, but here 'rioting' best fits the immediate context of a public uproar.
    reason: lexical_alternative
  - marker: b
    text: Or 'commotion' or 'mob'; the Greek refers to this tumultuous gathering and is distinct from the more formal 'assembly' later in the verse.
    reason: lexical_alternative
  - marker: c
    text: The word translated 'assembly' is the same Greek word often used elsewhere for 'church,' but here it refers to the civic assembly in Ephesus.
    reason: cross_reference
translation:
  language: ko
  text: 오늘 일에 대하여 우리가 이 소요에 관하여 해명할 만한 까닭이 없는데, 폭동의 죄로 고발될 위험에 있습니다.」 이렇게 말하고 그가 모임을 해산시켰습니다.
  philosophy: optimal-equivalence
