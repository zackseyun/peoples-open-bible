translation:
  language: es
  text: Bienaventurado es el pueblo que conoce la aclamación festiva[a]; Yahvé[b], andan en la luz de tu rostro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el grito de júbilo»; posiblemente incluye también la aclamación de trompeta en el culto.
    reason: lexical_alternative
  - marker: b
    text: Lit. «tu rostro»; es decir, tu presencia o favor.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַשְׁרֵי
  english_pob_choice: Blessed are
  chosen_spanish: ¡Bienaventurado el...!
  alternatives_spanish:
  - ¡Feliz el...!
  - ¡Dichoso el...!
  lexicon: HALOT
  rationale: La forma plural exclamativa introduce una bienaventuranza. «Bienaventurado» preserva mejor el tono elevado, litúrgico y de pacto que «feliz», y evita el matiz demasiado emocional de algunas opciones.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la nación
  - el pueblo de Dios
  lexicon: HALOT
  rationale: עָם se refiere aquí a la comunidad del pacto. «El pueblo» es natural en español y conserva el alcance comunitario sin cargarlo con una interpretación adicional como «de Dios».
- source_word: יוֹדְעֵי
  english_pob_choice: who know
  chosen_spanish: que conoce
  alternatives_spanish:
  - que saben
  - conocedor de
  lexicon: HALOT
  rationale: El participio describe a los que se caracterizan por conocer. En español, una relativa simple mantiene la idea de rasgo permanente y suena idiomática.
- source_word: תְרוּעָה
  english_pob_choice: the joyful shout
  chosen_spanish: la aclamación festiva
  alternatives_spanish:
  - el grito de júbilo
  - la aclamación jubilos[a]
  - el toque festivo
  lexicon: HALOT
  rationale: El término puede abarcar grito de júbilo, aclamación cultual o incluso resonancia de trompeta. «Aclamación festiva» conserva el campo semántico celebrativo sin reducirlo indebidamente al instrumento o al ámbito militar.
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: Oh Yahvé
  alternatives_spanish:
  - Yahvé
  - Oh SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé» según la norma del proyecto. Se añade «Oh» para reflejar el vocativo del hebreo y la sintaxis española natural en una invocación.
- source_word: בְּאוֹר
  english_pob_choice: in the light
  chosen_spanish: en la luz
  alternatives_spanish:
  - por la luz
  - con la luz
  lexicon: HALOT
  rationale: La preposición con אוֹר aquí expresa esfera o ambiente. «En la luz» reproduce con claridad esa relación espacial/metafórica.
- source_word: פָּנֶיךָ
  english_pob_choice: of your face
  chosen_spanish: de tu rostro
  alternatives_spanish:
  - de tu presencia
  - de tu semblante
  lexicon: HALOT
  rationale: «Rostro» conserva la imagen literal de פָּנִים y resulta más natural en español contemporáneo que «cara». Mantiene la tensión entre imagen concreta y sentido relacional, sin resolverlo exclusivamente como «presencia».
- source_word: יְהַלֵּכוּן
  english_pob_choice: they walk
  chosen_spanish: andan
  alternatives_spanish:
  - caminan
  - viven
  lexicon: HALOT
  rationale: El verbo expresa una conducta continua. «Andan» suena bíblico sin ser arcaico y conserva la metáfora de vida y conducta ante Dios.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: O Yahweh
  chosen_spanish_reading: Oh Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Oh SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Siguiendo la convención del proyecto, se preserva el nombre divino transliterado, no el sustituto tradicional «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: How to render תְרוּעָה without narrowing the semantic range
  english_pob_reading: the joyful shout; possibly including trumpet acclamation in worship
  chosen_spanish_reading: la aclamación festiva
  alternative_spanish_readings:
  - el grito de júbilo
  - el toque de trompeta
  - la aclamación de fiesta
  rationale: El hebreo puede incluir celebración verbal y, en algunos contextos, resonancia de trompeta. La redacción elegida conserva la amplitud semántica y evita reducir el término solo a un instrumento o solo a emoción.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
- issue: Whether פָּנֶיךָ should be made purely idiomatic as 'presence'
  english_pob_reading: your face; that is, your presence or favor
  chosen_spanish_reading: tu rostro
  alternative_spanish_readings:
  - tu presencia
  - tu favor
  rationale: Se mantiene la imagen literal para conservar la textura poética y la posible tensión entre imagen corporal y sentido relacional. «Presencia» queda implícita como alternativa interpretativa, no como sustitución total del hebreo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el expediente inglés; el pasaje muestra alta concordancia entre la traducción auditada y el control de revisión, por lo que no se introducen cambios textuales adicionales.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - Se eligió «rostro» para mantener la imagen hebrea de פָּנִים, evitando reemplazarla por una explicación interpretativa en el cuerpo principal.
  - «Andan» conserva el valor de conducta continua del verbo, con un registro bíblico natural en español.
  - La puntuación vocativa «Oh Yahvé» refleja el llamado directo del hebreo y evita ambigüedad sintáctica en español.
