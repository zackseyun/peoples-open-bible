translation:
  language: es
  text: Sólo los árboles que sepas que no son árboles de alimento, esos los podrás destruir y cortar, y levantarás obras de asedio[a] contra la ciudad que te hace la guerra, hasta que la derribes[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «construir una rampa de asedio» o «levantar fortificaciones de asedio». El hebreo מָצוֹר puede referirse en sentido amplio a obras o fortificaciones de asedio, no sólo a una estructura específica.
    reason: lexical_alternative
  - marker: b
    text: O «hasta que caiga». El hebreo dice literalmente «hasta que la hagas descender», usando un verbo de descenso para la derrota de la ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  english_pob_choice: Only
  chosen_spanish: Sólo
  alternatives_spanish:
  - Pero sólo
  - Sin embargo, sólo
  lexicon: HALOT
  rationale: Preserva el sentido restrictivo/excepcional de la cláusula inicial. «Sólo» es natural en español y reproduce bien la limitación que introduce la prohibición anterior.
- source_word: עֵץ ... עֵץ מַאֲכָל
  english_pob_choice: trees ... trees for food
  chosen_spanish: árboles ... árboles para alimento
  alternatives_spanish:
  - árbol ... árbol para alimento
  - madera ... madera para alimento
  lexicon: HALOT
  rationale: En este contexto bélico se trata de árboles vivos, no de madera. «Árboles para alimento» conserva la idea de árboles comestibles o frutales sin forzar una perífrasis más específica que el hebreo no exige.
- source_word: אֲשֶׁר תֵּדַע כִּי
  english_pob_choice: that you know are
  chosen_spanish: que sepas que no son
  alternatives_spanish:
  - que sabes que no son
  - que tú sabes que no son
  lexicon: HALOT
  rationale: El hebreo expresa conocimiento discernible; en español, el subjuntivo «sepas» conserva esa referencia a conocimiento previo o verificado, sin perder naturalidad.
- source_word: לֹא ... הוּא
  english_pob_choice: are not
  chosen_spanish: no son
  alternatives_spanish:
  - no es
  - no fueran
  lexicon: HALOT
  rationale: Aunque el hebreo usa singular, el referente en español es plural («árboles»). La concordancia plural evita una construcción extraña y mantiene el sentido distributivo.
- source_word: אֹתוֹ תַשְׁחִית
  english_pob_choice: those you may destroy
  chosen_spanish: esos los destruirás
  alternatives_spanish:
  - esos los podrás destruir
  - a esos los destruirás
  lexicon: HALOT
  rationale: El verbo transmite destrucción/arruinamiento intencional en contexto de asedio. Se prefirió «destruirás» como instrucción directa y clara en español; el matiz permisivo del inglés se puede leer por el contexto legal.
- source_word: וְכָרָתָּ
  english_pob_choice: and cut down
  chosen_spanish: y los cortarás
  alternatives_spanish:
  - y los talarás
  - y los derribarás
  lexicon: HALOT
  rationale: «Cortarás» es fiel y general; «talarás» sería más específico, pero el hebreo sólo exige la acción de cortar/fellar árboles.
- source_word: וּבָנִיתָ מָצוֹר
  english_pob_choice: and build siegeworks
  chosen_spanish: y levantarás obras de asedio
  alternatives_spanish:
  - y construirás obras de asedio
  - y harás un cerco
  lexicon: HALOT
  rationale: מָצוֹר puede abarcar fortificaciones o dispositivos de asedio. «Obras de asedio» preserva la amplitud semántica sin reducirlo indebidamente a una sola máquina o rampa.
- source_word: עַל הָעִיר
  english_pob_choice: against the city
  chosen_spanish: contra la ciudad
  alternatives_spanish:
  - sobre la ciudad
  - alrededor de la ciudad
  lexicon: HALOT
  rationale: «Contra» expresa mejor el carácter hostil y militar del asedio que un mero valor locativo.
- source_word: אֲשֶׁר הִוא עֹשָׂה עִמְּךָ מִלְחָמָה
  english_pob_choice: that is making war with you
  chosen_spanish: que te hace guerra
  alternatives_spanish:
  - que está haciendo guerra contigo
  - que está guerreando contigo
  lexicon: HALOT
  rationale: La expresión hebrea «hacer guerra» se reproduce con el giro español establecido «hacer guerra». Mantiene el aspecto continuo y el registro bélico sin sonar forzado.
- source_word: עַד רִדְתָּהּ
  english_pob_choice: until you bring it down
  chosen_spanish: hasta que la derribes
  alternatives_spanish:
  - hasta que la sometas
  - hasta que caiga
  lexicon: HALOT
  rationale: «Derribar» conserva la imagen de hacer caer/bajar la ciudad desde la acción del sitiador, más cercana al verbo hebreo que una simple intransitividad como «caiga».
translation_notes:
  revision_awareness: 'Se siguió de cerca la auditoría inglesa, manteniendo la estructura legal y las dos ambigüedades principales: מָצוֹר como término amplio de asedio y רִדְתָּהּ como caída/descenso de la ciudad. No se detectaron revisiones aplicadas en el pasaje fuente.'
  spanish_consistency_notes:
  - Se usó «Yahvé» no porque aparezca en este versículo, sino como norma del proyecto para el Tetragrámaton en el cuerpo principal cuando corresponda.
  - Se evitó «señorío» o fórmulas eclesiásticas innecesarias; el tono es jurídico-militar, acorde con el hebreo.
  - «Obras de asedio» mantiene la amplitud de מָצוֹר sin fijarlo indebidamente en una rampa específica.
