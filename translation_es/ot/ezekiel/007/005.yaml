translation:
  language: es
  text: 'Así dice el Señor Yahvé: un desastre[a], un desastre único—he aquí, viene.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un desastre, un solo desastre»; el hebreo repite «desastre» para dar énfasis, y «uno/una» puede subrayar singularidad o unicidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה
  english_pob_choice: Thus
  chosen_spanish: Así
  alternatives_spanish:
  - De este modo
  - De esta manera
  lexicon: HALOT
  rationale: La fórmula profética requiere una apertura solemne y natural en español; «Así» conserva el tono formal sin volverse arcaico.
- source_word: אָמַר
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: En la fórmula profética se usa presente histórico en español, como equivalente idiomático de la introducción oracular.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahveh
  lexicon: HALOT
  rationale: Se conserva la convención del proyecto para יְהוָה como «Yahvé», y el título compuesto se vierte de manera que no repita «Señor» de forma artificial. «Yahvé» mantiene el nombre divino revelado.
- source_word: רָעָה
  english_pob_choice: disaster
  chosen_spanish: desastre
  alternatives_spanish:
  - calamidad
  - mal
  lexicon: HALOT
  rationale: En este contexto de juicio, el sustantivo designa calamidad o desastre, no mal moral. «Desastre» es claro y evita atribuir maldad ética a Dios.
- source_word: אַחַת
  english_pob_choice: a unique / one
  chosen_spanish: único
  alternatives_spanish:
  - singular
  - solo
  lexicon: HALOT
  rationale: El numeral intensifica la idea de una catástrofe singular o excepcional. En español, «desastre único» comunica la fuerza enfatizadora de la repetición hebrea sin sonar forzado.
- source_word: רָעָה אַחַת רָעָה
  english_pob_choice: A disaster, a unique disaster
  chosen_spanish: un desastre, un desastre único
  alternatives_spanish:
  - un desastre, un solo desastre
  - un desastre, un desastre singular
  lexicon: HALOT
  rationale: Se conserva la repetición enfática del hebreo. La coma y la repetición mantienen la estructura appositiva y el carácter solemne del anuncio.
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: miren
  alternatives_spanish:
  - he aquí
  - vean
  lexicon: HALOT
  rationale: «Miren» conserva la deíxis urgente del hebreo con un español natural para lectores contemporáneos; «he aquí» sería más tradicional pero menos directo.
- source_word: בָאָה
  english_pob_choice: it is coming
  chosen_spanish: viene
  alternatives_spanish:
  - está viniendo
  - ya llega
  lexicon: HALOT
  rationale: El participio/forma verbal expresa inminencia. «Viene» es breve, solemne y mantiene la cercanía del desastre anunciado.
theological_decisions:
- issue: Tratamiento del nombre divino en אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahveh
  rationale: El texto hebreo contiene el Tetragrámaton. Según la convención del proyecto, se traduce como «Yahvé» en el texto principal, evitando el ocultamiento del nombre divino. Se evita «el Señor Dios» por sonar más genérico y por no reflejar explícitamente el nombre.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La redacción sigue el último ajuste del inglés auditado, que prefirió «a unique disaster» por encima de «one unique disaster» para mayor naturalidad. En español se preserva esa naturalidad con «un desastre único», manteniendo la repetición enfática del hebreo y la urgencia del anuncio.
  spanish_consistency_notes:
  - Se mantiene la convención del proyecto de usar «Yahvé» para יְהוָה en el texto principal.
  - «desastre» se usa para רָעָה en contexto de juicio; no se usa «mal» para evitar una lectura moral impropia.
  - La repetición «un desastre, un desastre único» refleja la duplicación hebrea sin explicar en el cuerpo del texto lo que la nota ya aclara.
  - «Miren» se escogió como equivalente deíctico moderno para הִנֵּה, evitando una formulación demasiado arcaica.
