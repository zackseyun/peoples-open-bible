translation:
  language: es
  text: 'Entonces Booz respondió y le dijo: «Se me ha informado[a] plenamente de todo lo que has hecho por tu suegra, después de la muerte de tu esposo, y de cómo dejaste a tu padre y a tu madre, y la tierra de tu nacimiento, y te fuiste a vivir entre un pueblo[b] que no conocías antes».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «se me ha informado, sí, se me ha informado»; el hebreo intensifica la certeza y plenitud del informe.
    reason: lexical_alternative
  - marker: b
    text: Lit. «a un pueblo que no conocías ayer o anteayer»; el modismo expresa desconocimiento previo.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֻגֵּד הֻגַּד לִי
  english_pob_choice: I have been fully told
  chosen_spanish: Me han informado plenamente
  alternatives_spanish:
  - Me han contado con toda certeza
  - He sido plenamente informado
  lexicon: HALOT
  rationale: El hebreo usa un intensivo pasivo (infinitivo absoluto + forma pasiva) que subraya la certeza y plenitud del informe. «Me han informado plenamente» conserva el pasivo y la intensificación con español natural.
- source_word: כֹּל אֲשֶׁר עָשִׂית
  english_pob_choice: all that you have done
  chosen_spanish: todo lo que has hecho
  alternatives_spanish:
  - todo cuanto hiciste
  - todo lo que hiciste
  lexicon: HALOT
  rationale: «Todo lo que has hecho» reproduce el valor totalizador de כֹּל y mantiene la relevancia presente del hecho para la conversación.
- source_word: אֶת חֲמוֹתֵךְ
  english_pob_choice: for your mother-in-law
  chosen_spanish: por tu suegra
  alternatives_spanish:
  - para tu suegra
  - a tu suegra
  lexicon: HALOT
  rationale: Aunque la partícula אֶת marca objeto directo, el contexto de beneficio hace que en español «por tu suegra» exprese mejor la acción realizada en favor de ella, como en el audit trail inglés.
- source_word: אַחֲרֵי מוֹת אִישֵׁךְ
  english_pob_choice: after the death of your husband
  chosen_spanish: después de la muerte de tu esposo
  alternatives_spanish:
  - después de que murió tu esposo
  - tras la muerte de tu marido
  lexicon: HALOT
  rationale: 'La construcción nominal se conserva con tono sobrio: «después de la muerte de tu esposo». «Esposo» es claro y digno en español bíblico contemporáneo.'
- source_word: וַתַּעַזְבִי
  english_pob_choice: you left
  chosen_spanish: dejaste
  alternatives_spanish:
  - abandonaste
  - dejaste atrás
  lexicon: HALOT
  rationale: «Dejaste» es el equivalente más natural y fiel al verbo de movimiento/separación; evita el matiz excesivamente duro de «abandonaste», que el contexto no exige.
- source_word: אָּבִיךְ וְאִמֵּךְ
  english_pob_choice: your father and your mother
  chosen_spanish: a tu padre y a tu madre
  alternatives_spanish:
  - a tu padre y tu madre
  - a tus padres
  lexicon: HALOT
  rationale: El hebreo menciona a ambos individualmente; el español preserva esa especificidad. La preposición «a» acompaña naturalmente el verbo «dejar».
- source_word: וְאֶרֶץ מוֹלַדְתֵּךְ
  english_pob_choice: the land of your birth
  chosen_spanish: la tierra de tu nacimiento
  alternatives_spanish:
  - la tierra donde naciste
  - tu tierra natal
  lexicon: HALOT
  rationale: «La tierra de tu nacimiento» sigue de cerca el sustantivo de origen y mantiene la forma nominal del hebreo, sin perder inteligibilidad.
- source_word: וַתֵּלְכִי אֶל עַם
  english_pob_choice: and went to a people
  chosen_spanish: y fuiste a un pueblo
  alternatives_spanish:
  - y fuiste a un pueblo de gente
  - y te fuiste a un pueblo
  lexicon: HALOT
  rationale: Se conserva el movimiento con «fuiste». «Pueblo» refleja עַם como colectivo humano, más natural que «nación» en este contexto relacional.
- source_word: עַם
  english_pob_choice: a people
  chosen_spanish: un pueblo
  alternatives_spanish:
  - un pueblo/una gente
  - una nación
  lexicon: HALOT
  rationale: En español, «pueblo» comunica bien un grupo humano/corporativo. «Nación» sonaría más político que el hebreo en esta escena.
- source_word: אֲשֶׁר לֹא יָדַעַתְּ
  english_pob_choice: whom you did not know
  chosen_spanish: que no conocías
  alternatives_spanish:
  - a quien no conocías
  - que no habías conocido
  lexicon: HALOT
  rationale: El ידע aquí expresa conocimiento relacional/personal. «No conocías» es la forma más natural; permite el referente colectivo sin forzar el relativo personal.
- source_word: תְּמוֹל שִׁלְשׁוֹם
  english_pob_choice: before
  chosen_spanish: antes
  alternatives_spanish:
  - ayer o anteayer
  - anteriormente
  lexicon: HALOT
  rationale: El modismo temporal se vierte con una equivalencia funcional («antes») en la línea del audit trail inglés, que preserva el sentido de anterioridad sin sonar mecánico.
theological_decisions:
- issue: Cómo expresar el impacto del favor de Rut sin añadir interpretación
  english_pob_reading: Boaz acknowledges Ruth's actions as reported to him, emphasizing her loyalty and sacrifice.
  chosen_spanish_reading: Booz reconoce lo que se le ha informado sobre la lealtad y el sacrificio de Rut, sin expandir el sentido más allá del texto.
  alternative_spanish_readings:
  - Booz elogia la misericordia de Rut
  - Booz celebra su fidelidad con palabras más interpretativas
  rationale: El verso no nombra explícitamente virtudes abstractas; describe acciones concretas. La traducción evita introducir vocabulario teológico no presente, manteniendo la tensión narrativa del elogio implícito.
  doctrine_reference: Narrative fidelity; avoid unwarranted theological amplification
translation_notes:
  revision_awareness: 'Coincide con el audit trail inglés en los puntos principales: intensificación pasiva de הֻגֵּד הֻגַּד, benefactivo de אֶת חֲמוֹתֵךְ, y el sentido temporal idiomático de תְּמוֹל שִׁלְשׁוֹם. No se detectan revisiones posteriores en el paquete de referencia.'
  spanish_consistency_notes:
  - Se mantiene «Booz» como forma estable del nombre propio.
  - Se usa «esposo» en lugar de «marido» por registro bíblico contemporáneo y consistencia con tono digno.
  - Se conserva la distinción entre acciones concretas y cualidades implícitas, sin convertir el elogio narrativo en explicación doctrinal.
  - La puntuación con comillas angulares respeta el estilo editorial bíblico en español.
