review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del griego: juicio por fuego sobre la ciudad personificada, procedente del título divino παρὰ τοῦ αἰωνίου, seguido por una larga desolación habitada por δαιμόνια. Conserva las dos expresiones temporales distintas y la pasiva de κατοικηθήσεται. La única corrección necesaria es afinar la expresión del título divino y la nota para alinearlas mejor con el inglés auditado y con un español más natural.'
  spanish_quality_summary: El español es claro y legible, pero «de parte del Eterno» suena algo más pesado de lo necesario en este contexto y la nota alternativa repite esencialmente la misma lectura en vez de ofrecer una verdadera alternativa. «del Eterno» es más natural, mantiene el valor titular y evita expansión innecesaria. También «por muchísimo tiempo» es comprensible, pero «por mucho tiempo» o «por largo tiempo» serían más sobrios; sin embargo, no es un error que exija cambio.
  glossary_alignment: No hay conflicto con los términos base del proyecto. «demonios» para δαιμονίων está bien. El título divino τοῦ αἰωνίου no involucra Yahvé directamente; «el Eterno» / «el Perdurable» son opciones posibles, pero la principal debe quedar como «del Eterno» para reflejar el adjetivo sustantivado sin añadir «Dios».
  issues:
  - severity: medium
    issue: La frase «de parte del Eterno» es menos natural y más expansiva que el griego requiere.
    rationale: παρὰ con genitivo aquí puede expresarse naturalmente como «del». El inglés POB eligió «from the Everlasting One», no una perífrasis equivalente a «de parte de». En español bíblico legible, «del Eterno» conserva mejor el título y fluye mejor.
  - severity: medium
    issue: La nota al pie no presenta una alternativa real y está formulada de manera redundante.
    rationale: La nota dice «O “del Eterno”», pero el texto principal usa «de parte del Eterno», de modo que la alternativa es prácticamente la lectura corregida, no una verdadera opción paralela al inglés «from the Eternal One / from the Everlasting One». Conviene ofrecer una alternativa como «del Perdurable» o explicar mejor el valor del adjetivo sustantivado.
  - severity: low
    issue: «por muchísimo tiempo» suena algo coloquial-intensivo para el registro buscado.
    rationale: No es infiel y comunica bien τὸν πλεῖονα χρόνον, pero un tono más digno y sobrio en español eclesial amplio suele preferir «por mucho tiempo» o «por largo tiempo». Se puede dejar sin que sea un problema mayor.
  revised_spanish_text: Porque fuego vendrá sobre ella del Eterno[a] por muchos días, y será habitada por demonios por muchísimo tiempo.
