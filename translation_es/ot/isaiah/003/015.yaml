    text: O «moler el rostro de los pobres». La imagen hebrea es una metáfora vívida de opresión despiadada.
    reason: lexical_alternative
  revision_rationale: Se corrige el título divino para reflejar fielmente אֲדֹנָי יְהוִה צְבָאוֹת conforme a la política del proyecto sobre «Yahvé», sin sustituir אֲדֹנָי por «Dios». También se ajusta el giro inicial para mayor naturalidad en español y se preserva mejor la imagen plural de «rostros», manteniendo en nota la alternativa singular idiomática.
