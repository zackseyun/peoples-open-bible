review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: acción narrativa simple (וַיְצַו), referencia temporal puntual (בַּיּוֹם הַהוּא), dos grupos distintos (הַנֹּגְשִׂים ... וְאֶת שֹׁטְרָיו) y la fórmula introductoria לֵאמֹר. Sin embargo, la distribución de notas no preserva fielmente la lógica del expediente inglés: la nota sobre «taskmasters/capataces» debe anclarse en «capataces», y la nota sobre שֹׁטְרָיו debe explicar una alternativa española, no dejar «foremen» en inglés. También conviene suavizar «Así que», que añade un matiz consecutivo no exigido por el hebreo.'
  spanish_quality_summary: El español es claro y legible, pero «Así que» suena algo discursivo y menos neutral que la simple apertura narrativa. «Capataces del pueblo» y «sus oficiales» son comprensibles y dignos. La nota c contiene un anglicismo innecesario («foremen»), impropio de una edición bíblica en español.
  glossary_alignment: No hay conflictos con la terminología troncal del proyecto. Las decisiones «mandó», «Faraón», «capataces», «oficiales» y «diciendo» son en general adecuadas. La principal corrección necesaria es de aparato crítico y legibilidad española, no de glosario teológico.
  issues:
  - severity: medium
    issue: «Así que» añade una conexión inferencial no marcada en el hebreo.
    rationale: וַיְצַו introduce la siguiente acción narrativa con waw consecutivo; en español basta «Entonces» o una narración directa. «Así que» puede sonar más argumentativo o conclusivo de lo que exige el texto.
  - severity: high
    issue: Las notas b y c están intercambiadas respecto de sus anclajes semánticos.
    rationale: En el texto español, [a] está en «oficiales», pero la nota a habla de la expresión temporal. Además, [b] y [c] aparecen en «diciendo», mientras sus contenidos pertenecen a «capataces» y «oficiales». Esto rompe la disciplina requerida de anclar cada nota a la palabra o frase pertinente.
  - severity: high
    issue: La nota c deja «foremen» sin traducir al español.
    rationale: El aparato debe ser plenamente español. Dado que el expediente inglés ofrece «his foremen» como alternativa contextual para שֹׁטְרָיו, en español debe verterse como «sus capataces» o «sus encargados», no conservar el inglés.
  revised_spanish_text: 'Entonces Faraón mandó aquel día[a] a los capataces del pueblo[b] y a sus oficiales[c], diciendo:'
  revised_footnotes:
  - marker: a
    text: O «ese mismo día». La expresión temporal hebrea puede enfatizar la inmediatez.
    reason: lexical_alternative
  - marker: b
    text: «Capataces» traduce un término para quienes impulsaban o exigían la labor; «supervisores» también es posible.
    reason: lexical_alternative
  - marker: c
    text: O «sus capataces». El término hebreo se refiere a funcionarios subordinados dentro del sistema laboral.
    reason: lexical_alternative
