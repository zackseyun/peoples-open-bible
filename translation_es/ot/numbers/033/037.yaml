translation:
  language: es
  text: Salieron de Cades[a] y acamparon en el monte Hor[b], en el borde de la tierra de Edom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Cades»; algunas traducciones amplían este nombre a «Cades-barnea» por el contexto más amplio, pero aquí el texto hebreo usa solo el nombre corto.'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo literalmente: «en Hor el monte»; se conserva la forma convencional «monte Hor» por claridad y uso establecido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְעוּ
  english_pob_choice: They set out
  chosen_spanish: Salieron
  alternatives_spanish:
  - Se pusieron en marcha
  - Partieron
  lexicon: HALOT
  rationale: נסע en esta fórmula itinerante del desierto expresa salida de un campamento. «Salieron» comunica con naturalidad el movimiento de partida sin forzar un calco demasiado técnico.
- source_word: מִקָּדֵשׁ
  english_pob_choice: from Kadesh
  chosen_spanish: de Cades
  alternatives_spanish:
  - de Cades-barnea
  lexicon: HALOT
  rationale: El hebreo aquí nombra simplemente Cades; por eso se conserva el topónimo breve y no se amplía a Cades-barnea, que no aparece en este versículo.
- source_word: וַיַּחֲנוּ
  english_pob_choice: and camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - y acamparon
  - y plantaron campamento
  lexicon: HALOT
  rationale: חנה es el verbo normal del itinerario del desierto para establecer campamento. «Acamparon» mantiene la concreción y suena natural en español.
- source_word: בְּהֹר הָהָר
  english_pob_choice: at Mount Hor
  chosen_spanish: en el monte Hor
  alternatives_spanish:
  - en Hor, el monte
  - en el monte Hor
  lexicon: HALOT
  rationale: El hebreo es literalmente «en Hor, el monte», pero en español la forma más transparente y reconocible es el topónimo tradicional «monte Hor». Se evita añadir una explicación ajena al texto.
- source_word: בִּקְצֵה
  english_pob_choice: on the edge of
  chosen_spanish: en el borde de
  alternatives_spanish:
  - en el extremo de
  - en la frontera de
  lexicon: HALOT
  rationale: קצה puede indicar borde, extremo o límite. «En el borde de» conserva la imagen espacial sin decidir más de lo que el hebreo dice sobre un límite político formal.
- source_word: אֶרֶץ אֱדוֹם
  english_pob_choice: the land of Edom
  chosen_spanish: la tierra de Edom
  alternatives_spanish:
  - el territorio de Edom
  - el país de Edom
  lexicon: HALOT
  rationale: אֶרֶץ normalmente significa tierra/territorio. «La tierra de Edom» sigue de cerca la expresión bíblica y resulta idiomática en español.
translation_notes:
  revision_awareness: Se siguió el estado revisado más reciente del audit trail inglés, que no registró cambios posteriores ni problemas de acuerdo; por eso la versión española mantiene la solución óptima ya validada para los topónimos y la fórmula del itinerario.
  spanish_consistency_notes:
  - Se mantuvo «Edom» como nombre propio sin traducción adicional.
  - Se evitó «SEÑOR» u այլ substituciones porque no aparece el nombre divino en este versículo.
  - La secuencia verbal en pasado simple respeta el estilo narrativo de la lista de estaciones.
  - Se usó «monte Hor» en el texto principal, con nota para la literalidad hebrea.
