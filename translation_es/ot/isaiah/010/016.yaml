review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: inferencia inicial, título divino con Yahvé, juicio de consumición sobre los ''gordos'' y la imagen de fuego bajo la gloria. Sin embargo, hay desajustes en el aparato de notas y en una decisión léxica clave: la nota [a] está anclada a ''Señor'' pero en realidad trata בְּמִשְׁמַנָּיו; además, el texto principal usa ''un fuego'' para יֵקַד יְקֹד, donde el hebreo habla de un ''ardor/quemazón'' que es encendido, no simplemente de fuego.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero tiene dos problemas de naturalidad/fidelidad: ''el Señor[a]'' crea una nota mal ubicada y confusa, y ''se encenderá un fuego'' debilita la fuerza cognada de יֵקַד יְקֹד y duplica torpemente ''fuego... fuego''. Una formulación como ''se encenderá un ardor'' o ''arderá una quemazón'' preserva mejor el paralelismo y suena aceptable en registro bíblico.'
  glossary_alignment: 'Se cumple bien el uso de ''Yahvé'' para יהוה y ''de los ejércitos'' para צבאות. No hay conflicto terminológico mayor. La excepción principal es que el aparato de notas no sigue la disciplina requerida: la nota sobre ''sus gordos'' debe anclarse en esa frase, y la nota sobre ''su gloria'' debe anclarse allí, no en otras palabras.'
  issues:
  - severity: high
    issue: La nota [a] está colocada en 'el Señor' pero su contenido trata 'sus gordos'.
    rationale: Esto viola la disciplina de anclaje de notas y confunde al lector, porque parece ofrecer alternativas para אָדוֹן en vez de para בְּמִשְׁמַנָּיו.
  - severity: medium
    issue: La nota [c] sobre 'su gloria' no está anclada a 'gloria' sino a 'gordos'.
    rationale: El contenido de la nota corresponde a כְּבֹדוֹ; el marcador debe aparecer junto a 'gloria'.
  - severity: medium
    issue: '''se encenderá un fuego'' para יֵקַד יְקֹד simplifica en exceso la imagen de ''ardor/quemazón'' encendida.'
    rationale: El hebreo usa verbo + sustantivo cognado para intensificar el quemar. 'Un fuego' desplaza el foco desde el proceso/ardor hacia el objeto y hace menos fiel la formulación.
  revised_spanish_text: Por tanto, el Señor, Yahvé de los ejércitos, enviará delgadez entre sus gordos[a], y bajo su gloria[b][c] se encenderá un ardor, como el ardor del fuego.
  revised_footnotes:
