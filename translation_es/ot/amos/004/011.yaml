revisions:
- from: Los trastorné[a] entre ustedes[b], como Dios trastornó a Sodoma y a Gomorra[c]; y quedaron[d] como un tizón arrancado del incendio, pero no volvieron a mí, declara Yahvé.
  to: Destruí a algunos de ustedes[a] como Dios destruyó a Sodoma y a Gomorra[b], y quedaron como un tizón arrancado del incendio[c]; pero no volvieron a mí, declara Yahvé.
  rationale: Se reemplaza 'trastorné/trastornó' por 'destruí/destruyó' para reflejar mejor el sentido de juicio catastrófico de הפך en esta alusión a Sodoma y Gomorra. Se explicita en el texto principal el valor partitivo de בָכֶם con 'a algunos de ustedes', en línea con la auditoría inglesa, y se deja 'entre ustedes' como alternativa en nota. Se simplifican y corrigen las notas para que correspondan exactamente a los puntos significativos del original y del rastro de auditoría inglés.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:39:11Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: juicio comparable al de Sodoma y Gomorra, supervivencia apenas rescatada, y el estribillo de no volver a Yahvé. También conserva correctamente Yahvé para יְהוָה y ''volver a mí'' para שׁוב. Sin embargo, dos decisiones debilitan la fidelidad semántica: ''trastorné'' no comunica bien el sentido de destrucción/catástrofe de הָפַכְתִּי/מַהְפֵּכָה en este contexto, y la nota/anchaje sobre בָכֶם está invertida respecto del inglés auditado, creando confusión sobre el valor partitivo.'
  spanish_quality_summary: El español es claro y legible, con buen tono bíblico moderno. 'Tizón arrancado del incendio' funciona bien. No obstante, 'Los trastorné entre ustedes' suena poco natural y semánticamente inadecuado en español contemporáneo, porque 'trastornar' sugiere desorden o perturbación más que derrocamiento destructor. 'Quedaron como un tizón...' es aceptable y natural.
  glossary_alignment: 'Alineación sólida con la terminología del proyecto en ''Yahvé'' y en el valor covenantal de ''volvieron a mí''. No hay conflicto doctrinal mayor. La principal desviación es léxica: para הפך en este contexto conviene ''destruí'' o ''arrasé'' más que ''trastorné''.'
  issues:
  - severity: high
    issue: '''trastorné'' para הָפַכְתִּי / מַהְפֵּכָה'
    rationale: En el contexto de juicio con alusión a Sodoma y Gomorra, el hebreo expresa derrocamiento/destrucción catastrófica. 'Trastornar' en español normalmente significa perturbar, alterar o desordenar, y no preserva bien la fuerza judicial del original.
  - severity: medium
    issue: Notas a y b sobre בָכֶם están desalineadas con el texto y con la auditoría inglesa
    rationale: El texto principal dice 'entre ustedes' mientras la nota a repite prácticamente esa lectura; la alternativa partitiva 'algunos de ustedes' queda relegada sin explicar bien que es la explicitación del sentido natural. Esto confunde la función de la nota.
  - severity: low
    issue: Marcador [d] sobre 'quedaron' no preserva la alternativa inglesa más relevante
    rationale: La auditoría inglesa trata וַתִּהְיוּ como 'you became' con alternativa 'you were'. La nota española ofrece 'se convirtieron en', que no es incorrecta, pero la nota más útil aquí sería innecesaria; 'quedaron' ya expresa bien el estado resultante.
  revised_spanish_text: Destruí a algunos de ustedes[a] como Dios destruyó a Sodoma y a Gomorra[b], y quedaron como un tizón arrancado del incendio[c]; pero no volvieron a mí, declara Yahvé.
  revised_footnotes:
