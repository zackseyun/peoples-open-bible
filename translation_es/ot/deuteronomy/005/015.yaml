review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del hebreo: exhortación a recordar, esclavitud en Egipto, liberación por Yahvé con poder, y la consecuencia de guardar el sábado. También mantiene correctamente «Yahvé» y «esclavo». Sin embargo, las notas al pie están desalineadas con los anclajes y con la auditoría inglesa: [a] está puesto sobre «esclavo», pero la nota inglesa preservada para a corresponde a «en la tierra de Egipto» / alternativa con «con mano poderosa»; y [b] en inglés corresponde al modismo «hacer/guardar el día de sábado», no a «brazo extendido».'
  spanish_quality_summary: El español es claro, digno y natural. «Y recuerda», «te sacó de allí», «con mano poderosa y brazo extendido», y «por eso» leen bien. «Guardar el día de reposo» es aceptable y bíblicamente inteligible, aunque conviene ajustar las notas para explicar el modismo hebreo sobre «hacer» el sábado. La sintaxis no requiere cambios mayores.
  glossary_alignment: 'Buena alineación con el glosario del proyecto: יְהוָה → «Yahvé» y עֶבֶד → «esclavo». «Día de reposo» para הַשַּׁבָּת es defendible en español eclesial, aunque el rastro inglés usa «Sabbath day»; no es necesario forzar «sábado» aquí. El problema principal no es terminológico sino de correspondencia de notas y razones léxicas.'
  issues:
  - severity: medium
    issue: La nota [a] está anclada en «esclavo» pero su contenido no corresponde a la nota preservada en la auditoría inglesa.
    rationale: La nota inglesa a trata una alternativa ligada a la expresión idiomática de poder («with a mighty hand») o, al menos, no a עֶבֶד. En español, la nota sobre «siervo» introduce una alternativa no apoyada por la decisión principal del proyecto y rompe la trazabilidad del aparato.
  - severity: high
    issue: La nota [b] está anclada en «brazo extendido» pero debería explicar el modismo hebreo de «hacer/guardar el día de reposo».
    rationale: La auditoría inglesa documenta explícitamente que [b] corresponde a לַעֲשׂוֹת אֶת יוֹם הַשַּׁבָּת, literalmente «hacer el día de sábado», con sentido de guardarlo/observarlo. Mantenerla sobre «brazo extendido» distorsiona la evidencia fuente.
  - severity: low
    issue: La nota sobre «siervo» como alternativa para עֶבֶד no concuerda con la preferencia doctrinal del proyecto por «esclavo» en contextos de servidumbre opresiva.
    rationale: Aunque como alternativa léxica es posible, aquí no conviene destacarla sin necesidad, porque la propia justificación doctrinal subraya que «esclavo» es la mejor elección teológica y semántica en Egipto.
  revised_spanish_text: Y recuerda que fuiste esclavo en la tierra de Egipto, y Yahvé tu Dios te sacó de allí con mano poderosa[a] y brazo extendido; por eso Yahvé tu Dios te mandó guardar el día de reposo[b].
  revised_footnotes:
  - marker: a
    text: O «con mano fuerte». La expresión hebrea es un modismo que enfatiza el poderoso acto de liberación de Yahvé.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «hacer el día de reposo». El modismo hebreo significa guardarlo u observarlo.
    reason: lexical_alternative
  revision_rationale: 'Se conserva casi todo el texto principal porque es fiel y natural, pero se corrige el aparato de notas para que coincida con la evidencia fuente y con la auditoría inglesa: [a] ahora explica «mano poderosa», y [b] se traslada al final para explicar el modismo hebreo detrás de «guardar el día de reposo». También se elimina la nota innecesaria sobre «siervo», que debilitaba la decisión doctrinal de «esclavo».'
