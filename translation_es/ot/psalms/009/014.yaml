translation:
  language: es
  text: Ten misericordia de mí[a], Yahvé; mira mi aflicción de parte de los que me odian[b], tú que me levantas de las puertas de la muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Sé propicio conmigo, Yahvé».'
    reason: lexical_alternative
  - marker: b
    text: Las «puertas de la muerte» son una imagen hebrea de estar al borde o bajo el poder de la muerte.
    reason: cultural_note
lexical_decisions:
- source_word: חָנְנֵנִי
  english_pob_choice: Be gracious to me
  chosen_spanish: Sé benigno conmigo
  alternatives_spanish:
  - Ten favor conmigo
  - Ten misericordia de mí
  lexicon: HALOT
  rationale: El imperativo de חנן con sufijo de 1cs expresa una petición de favor benigno. 'Sé benigno conmigo' conserva la dimensión relacional y de gracia sin reducirla necesariamente a una sola emoción como 'misericordia'.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se mantiene el nombre divino del Tetragrámaton con la forma recomendada para el español del proyecto: ''Yahvé'', en lugar de sustituirlo por un título.'
- source_word: רְאֵה
  english_pob_choice: see
  chosen_spanish: mira
  alternatives_spanish:
  - ve
  - considera
  lexicon: HALOT
  rationale: El imperativo de ראה en lenguaje de oración se expresa de modo natural con 'mira', que conserva la petición directa de atención divina.
- source_word: עָנְיִי
  english_pob_choice: my affliction
  chosen_spanish: mi aflicción
  alternatives_spanish:
  - mi miseria
  - mi sufrimiento
  lexicon: HALOT
  rationale: '''Aflicción'' reproduce el alcance de עֳנִי como angustia/opresión sin especificar indebidamente si el énfasis es físico, social o emocional.'
- source_word: מִשֹּׂנְאַי
  english_pob_choice: from those who hate me
  chosen_spanish: de parte de los que me odian
  alternatives_spanish:
  - causada por los que me odian
  - de mis enemigos que me odian
  lexicon: HALOT
  rationale: La preposición מִן se entiende aquí como procedencia/causa de la aflicción. 'De parte de' mantiene esa relación en español y suena natural en contexto de súplica.
- source_word: מְרוֹמְמִי
  english_pob_choice: you who lift me up
  chosen_spanish: tú que me levantas
  alternatives_spanish:
  - tú que me alzas
  - el que me levanta
  lexicon: HALOT
  rationale: El participio polel con sufijo funciona de manera vocativa/apposicional; 'tú que me levantas' preserva la función descriptiva del apelativo dirigido a Yahvé.
- source_word: מִשַּׁעֲרֵי מָוֶת
  english_pob_choice: from the gates of death
  chosen_spanish: desde las puertas de la muerte
  alternatives_spanish:
  - de las puertas de la muerte
  - desde las puertas mortales
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de umbrales de muerte con un español claro y poético. 'Desde' comunica el rescate desde la proximidad/poder de la muerte, como en la nota inglesa sobre la imagen cultural.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton de forma directa. La elección 'Yahvé' sigue la política del proyecto de preservar el nombre personal de Dios en lugar de ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Relación sintáctica de 'de parte de los que me odian'
  english_pob_reading: Attached to 'my affliction' ('see my affliction from those who hate me')
  chosen_spanish_reading: Adjunta a 'mi aflicción' ('mira mi aflicción de parte de los que me odian')
  alternative_spanish_readings:
  - mira mi aflicción; mira a los que me odian
  - mira mi aflicción causada por los que me odian
  rationale: Se conserva la relación de procedencia/causa sin convertir el verso en dos peticiones separadas. El español 'de parte de' permite mantener la compactación hebrea y la lectura auditada.
  doctrine_reference: 'POB audit trail: syntactical relation of מִן as source/cause'
- issue: La metáfora 'las puertas de la muerte'
  english_pob_reading: A Hebrew image for being at the brink or power of death
  chosen_spanish_reading: Imagen de hallarse al borde o bajo el poder de la muerte
  alternative_spanish_readings:
  - umbral de la muerte
  - puertas del Seol
  rationale: Se preserva la metáfora sin importar 'Seol', que no aparece en el hebreo. La formulación española permite entender la imagen como la cercanía/poder de la muerte.
  doctrine_reference: POB cultural note on 'the gates of death'
translation_notes:
  revision_awareness: El borrador sigue la lectura auditada más reciente en inglés, incluida la unión sintáctica de 'from those who hate me' con 'my affliction' y la preferencia por una puntuación fluida sin guion. Se conservó la imagen de 'the gates of death' con una solución española natural y transparente.
  spanish_consistency_notes:
  - Se usó 'Yahvé' para el nombre divino, conforme al estándar del proyecto.
  - Se prefirió 'aflicción' para עֳנִי por ser más precisa y sobria que 'miseria'.
  - Se mantuvo la metáfora de 'puertas de la muerte' sin explicar de más dentro del texto principal.
  - No se introdujo 'Seol' en el texto principal porque no está en el hebreo de este versículo.
