translation:
  language: es
  text: ¿Quién es esta que sube de la soledad[c], como columnas de humo[a], perfumada con mirra e incienso, con toda clase de polvos aromáticos del mercader?[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como pilares de humo».
    reason: lexical_alternative
  - marker: b
    text: O «de toda clase de polvos aromáticos del mercader».
    reason: lexical_alternative
  - marker: c
    text: «La soledad» también puede traducirse «el desierto». Además, el hebreo puede expresarse como «¿Quién es ella, la que sube...?» porque usa un demostrativo femenino.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי זֹאת
  english_pob_choice: Who is this
  chosen_spanish: ¿Quién es esta?
  alternatives_spanish:
  - ¿Quién es ella?
  lexicon: HALOT
  rationale: El hebreo usa interrogativo + demostrativo femenino. En español, «esta» conserva la deixis femenina y mantiene la exclamación poética sin añadir una glosa explicativa que no está en el texto.
- source_word: עֹלָה
  english_pob_choice: coming up
  chosen_spanish: sube
  alternatives_spanish:
  - va subiendo
  - asciende
  lexicon: HALOT
  rationale: עלה expresa movimiento ascendente. «Sube» es breve, natural y fiel al sentido de ascender/venir hacia arriba en el contexto poético.
- source_word: מִן הַמִּדְבָּר
  english_pob_choice: from the wilderness
  chosen_spanish: del desierto
  alternatives_spanish:
  - del desierto agreste
  - de la soledad
  lexicon: HALOT
  rationale: «Desierto» comunica bien el rango semántico de מִדְבָּר en español actual. Aunque «wilderness» puede abarcar más que arena, aquí el paralelo poético permite una traducción natural sin perder el contraste espacial.
- source_word: כְּתִימֲרוֹת עָשָׁן
  english_pob_choice: like columns of smoke
  chosen_spanish: como columnas de humo
  alternatives_spanish:
  - como pilares de humo
  - como penachos de humo
  lexicon: HALOT
  rationale: תימרות son formas verticales que ascienden; «columnas» transmite la imagen sin rigidez arcaizante. «Humo» reproduce el sustantivo עָשָׁן de manera directa.
- source_word: מְקֻטֶּרֶת
  english_pob_choice: perfumed
  chosen_spanish: perfumada
  alternatives_spanish:
  - aromatizada
  - sazonada con aromas
  lexicon: HALOT
  rationale: El participio pasivo describe el estar impregnada de fragancia por aromáticos quemados o aplicados. «Perfumada» comunica el resultado con naturalidad poética en español.
- source_word: מוֹר
  english_pob_choice: myrrh
  chosen_spanish: mirra
  alternatives_spanish:
  - mirra aromática
  lexicon: HALOT
  rationale: Término estándar para la resina aromática מוֹר.
- source_word: וּלְבוֹנָה
  english_pob_choice: frankincense
  chosen_spanish: incienso
  alternatives_spanish:
  - olíbano
  lexicon: HALOT
  rationale: לבונה suele referirse al incienso/frankincense. «Incienso» es claro y ampliamente reconocido en español; «olíbano» sería más técnico, pero menos transparente para la lectura pública.
- source_word: מִכֹּל אַבְקַת רֹכֵל
  english_pob_choice: from every fragrant powder of the merchant
  chosen_spanish: desde todo polvo aromático del mercader
  alternatives_spanish:
  - de todo polvo aromático del mercader
  - desde toda especia pulverizada del mercader
  lexicon: HALOT
  rationale: אָבְקַת es polvo fino; en contexto, polvo aromático o de especias. «Del mercader» preserva רֹכֵל como comerciante/mercader sin especificar indebidamente un oficio más restringido. Se conserva el valor preposicional de מִן con «desde».
theological_decisions:
- issue: Imagen poética de la mujer que asciende del desierto
  english_pob_reading: Who is this coming up from the wilderness...
  chosen_spanish_reading: ¿Quién es esta que sube del desierto...
  alternative_spanish_readings:
  - ¿Quién es ella que sube del desierto...?
  - ¿Quién es esta, que asciende del desierto...?
  rationale: No hay necesidad de resolver la imagen como título o símbolo doctrinal; el texto conserva una descripción poética con referencialidad femenina. La traducción mantiene la ambigüedad literaria sin exagerarla.
  doctrine_reference: Cantar de los Cantares 3:6
- issue: Referencia aromática acumulativa
  english_pob_reading: perfumed with myrrh and frankincense, from every fragrant powder of the merchant
  chosen_spanish_reading: perfumada con mirra y con incienso, desde todo polvo aromático del mercader
  alternative_spanish_readings:
  - aromatizada con mirra y con incienso, desde todo polvo aromático del mercader
  - perfumada con mirra e incienso, desde todo polvo aromático del mercader
  rationale: No se debe diluir la acumulación de aromas. «Perfumada» mantiene la fuerza sensorial y «polvo aromático» conserva la relación con el hebreo sin introducir una interpretación alegórica que el verso no exige.
  doctrine_reference: Cantar de los Cantares 3:6
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y coincide con la revisión inglesa más reciente en dos puntos clave: el movimiento se expresa con un verbo ascendente natural («sube») y la preposición de מִן se refleja con «desde» en la frase final. También conserva la imaginería vertical de תימרות y la secuencia aromática de mirra, incienso y polvo aromático del mercader.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo contiene el nombre divino; este versículo no lo contiene.
  - «Mercader» se mantiene como equivalente amplio de רֹכֵל sin convertirlo en un término eclesiástico o litúrgico.
  - No se añade mayúscula a «desierto» ni a los aromas, porque son sustantivos comunes en el poema.
  - La nota al pie marca únicamente la alternativa léxica ya atestiguada en el audit trail inglés.
