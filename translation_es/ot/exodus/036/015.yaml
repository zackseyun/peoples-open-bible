translation:
  language: es
  text: La longitud de cada cortina era de treinta codos, y el ancho de cada cortina era de cuatro codos; las once cortinas tenían la misma medida.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: אֹרֶךְ
  english_pob_choice: length
  chosen_spanish: longitud
  alternatives_spanish:
  - largo
  - medida de longitud
  lexicon: HALOT
  rationale: En contexto arquitectónico, אֹרֶךְ expresa la extensión en dimensión lineal. 'Longitud' es el equivalente natural y preciso en español para este tipo de medida.
- source_word: הַיְרִיעָה
  english_pob_choice: curtain
  chosen_spanish: cortina
  alternatives_spanish:
  - lona
  - panel
  lexicon: HALOT
  rationale: En el contexto del tabernáculo, יְרִיעָה designa una pieza de tela/recubrimiento. 'Cortina' comunica bien la imagen y es inteligible en español bíblico contemporáneo.
- source_word: הָאַחַת / הָאֶחָת
  english_pob_choice: each
  chosen_spanish: cada
  alternatives_spanish:
  - la una
  - una
  lexicon: HALOT
  rationale: El hebreo usa una forma distributiva literal ('la אחת'), pero en español la equivalencia idiomática y clara es 'cada', que preserva la distribución sin sonar artificial.
- source_word: שְׁלֹשִׁים בָּאַמָּה
  english_pob_choice: thirty cubits
  chosen_spanish: treinta codos
  alternatives_spanish:
  - treinta codos de longitud
  - treinta en codo
  lexicon: HALOT
  rationale: La frase da la medida de la longitud. 'Treinta codos' es la forma estándar y fiel en español bíblico, sin sobrecargar la frase.
- source_word: וְאַרְבַּע אַמּוֹת
  english_pob_choice: and four cubits
  chosen_spanish: y cuatro codos
  alternatives_spanish:
  - con cuatro codos
  - cuatro codos
  lexicon: HALOT
  rationale: La coordinación hebrea mantiene el paralelismo entre longitud y ancho. 'Y cuatro codos' conserva esa coordinación de manera natural.
- source_word: רֹחַב
  english_pob_choice: width
  chosen_spanish: ancho
  alternatives_spanish:
  - anchura
  - brevedad
  lexicon: HALOT
  rationale: '''Ancho'' es el término más natural en español moderno para la dimensión opuesta a la longitud, y refleja bien la medida arquitectónica.'
- source_word: מִדָּה אַחַת
  english_pob_choice: had the same measure
  chosen_spanish: tenían la misma medida
  alternatives_spanish:
  - eran de una misma medida
  - tenían una sola medida
  - eran iguales en medida
  lexicon: HALOT
  rationale: El hebreo expresa uniformidad entre las cortinas. 'Tenían la misma medida' transmite con claridad esa igualdad dimensional, como el inglés auditado 'had the same measure'.
- source_word: לְעַשְׁתֵּי עֶשְׂרֵה יְרִיעֹת
  english_pob_choice: the eleven curtains
  chosen_spanish: las once cortinas
  alternatives_spanish:
  - para las once cortinas
  - de las once cortinas
  lexicon: HALOT
  rationale: La expresión identifica el conjunto de cortinas al que se aplica la medida uniforme. En español, 'las once cortinas' funciona de modo natural como sujeto del enunciado final.
theological_decisions:
- issue: Uniformidad de las piezas del tabernáculo
  english_pob_reading: all eleven curtains had the same measure
  chosen_spanish_reading: las once cortinas tenían la misma medida
  alternative_spanish_readings:
  - las once cortinas eran de una misma medida
  - todas las once cortinas tenían la misma medida
  rationale: El punto del versículo es la coincidencia exacta de las piezas. La formulación elegida conserva la idea de uniformidad sin añadir matices interpretativos.
  doctrine_reference: Éxodo 36:15; descripción del tabernáculo
translation_notes:
  revision_awareness: Se siguió el texto hebreo masorético (WLC) y el audit trail inglés, especialmente la decisión revisada de expresar la uniformidad como 'had the same measure'. No se requiere nota textual porque no hay variante relevante en el paquete fuente.
  spanish_consistency_notes:
  - Se mantuvo 'codos' como unidad de medida bíblica estándar.
  - Se prefirió una estructura española fluida pero cercana al orden y sentido del hebreo.
  - No se introdujo terminología eclesiástica no presente en el pasaje.
  - '''Cortina'' se usó consistentemente para יְרִיעָה en este contexto constructivo.'
