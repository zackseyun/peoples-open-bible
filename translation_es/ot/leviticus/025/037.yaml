translation:
  language: es
  text: No le prestarás tu dinero a interés[a][b], ni le darás tu alimento para aumento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'tu plata'. כֶּסֶף puede significar tanto 'plata' como 'dinero'; aquí se refiere al dinero usado en un préstamo.
    reason: lexical_alternative
  - marker: b
    text: O 'con interés'. El término hebreo puede denotar interés cobrado sobre lo prestado; en paralelo con 'aumento', expresa una ganancia adicional exigida.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּסְפְּךָ
  english_pob_choice: your money
  chosen_spanish: tu dinero
  alternatives_spanish:
  - tu plata
  - tu silver
  lexicon: HALOT
  rationale: כֶּסֶף puede significar 'plata' o 'dinero'. En un contexto legal de préstamo, 'tu dinero' comunica mejor el valor económico en español actual y conserva la referencia monetaria sin forzar el metal literal.
- source_word: תִתֵּן לוֹ
  english_pob_choice: lend him
  chosen_spanish: No cobrarás a él
  alternatives_spanish:
  - no le darás
  - no le prestarás
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'dar', pero con 'tu dinero' y el contexto de interés el sentido práctico es el de un préstamo con cobro. En español, 'no le prestarás' sería claro, pero 'no cobrarás a él' refleja la prohibición de exigir ganancia sobre el préstamo; aun así, se mantiene la fuerza normativa mediante la estructura legal del mandato negativo.
- source_word: בְּנֶשֶׁךְ
  english_pob_choice: at interest
  chosen_spanish: en interés
  alternatives_spanish:
  - con interés
  - a interés
  - por usura
  lexicon: HALOT
  rationale: נֶשֶׁךְ designa interés cobrado en un préstamo. 'En interés' suena menos natural que 'a interés', pero evita un giro demasiado idiomático y sigue de cerca la forma semántica del término, manteniendo el registro jurídico.
- source_word: וּבְמַרְבִּית
  english_pob_choice: for increase
  chosen_spanish: para aumento
  alternatives_spanish:
  - para incremento
  - para ganancia
  - con aumento
  lexicon: HALOT
  rationale: מַרְבִּית comunica idea de aumento, incremento o ganancia añadida. 'Para aumento' conserva la relación con el hebreo y con la revisión del POB inglés hacia 'increase', sin introducir una interpretación más específica como 'ganancia'.
- source_word: אָכְלֶךָ
  english_pob_choice: your food
  chosen_spanish: tu alimento
  alternatives_spanish:
  - tu comida
  - tus provisiones
  lexicon: HALOT
  rationale: אָכֶל significa 'comida' o 'alimento'. 'Tu alimento' es formal, claro y cercano al valor concreto del sustento provisto, manteniendo la referencia a lo que se entrega en vez de abstraerlo como provisiones.
theological_decisions:
- issue: La expresión de préstamo con interés y aumento, y su tono legal
  english_pob_reading: You shall not lend him your money at interest, nor give him your food for increase.
  chosen_spanish_reading: No cobrarás a él por tu dinero en interés, ni le darás tu alimento para aumento.
  alternative_spanish_readings:
  - No prestarás tu dinero con interés, ni le darás tu alimento para incremento.
  - No le prestarás dinero con interés, ni le darás tu alimento para aumento.
  rationale: El versículo prohíbe tomar provecho económico del hermano necesitado. La redacción española mantiene esa prohibición sin suavizarla a una simple observación económica. Se conserva la tensión entre 'dar' y el sentido real de préstamo/cobro, porque el hebreo usa נתן en un marco legal que presupone préstamo.
  doctrine_reference: Levítico 25:35-37; prohibición de explotación del hermano pobre mediante interés o ganancia adicional.
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió 'for profit' a 'for increase' para acercarse más a וּבְמַרְבִּית. Por eso la forma española evita 'ganancia' o 'lucro' y usa 'aumento', manteniendo un equivalente más fuente-cercano y formal.
  spanish_consistency_notes:
  - Se prefirió 'tu dinero' para כַּסְפְּךָ, en coherencia con el uso económico/legal del término.
  - Se evitó 'usura' porque en español moderno puede sugerir solo interés excesivo, mientras el hebreo abarca el interés mismo.
  - Se mantuvo 'aumento' para מַרְבִּית, en paralelo con la revisión inglesa hacia 'increase'.
  - El pronombre 'a él' conserva la referencia personal del objeto indirecto hebreo, aunque el español puede sonar marcado; se puede revisar a 'le' en una pasada de estilo si se busca mayor naturalidad sin perder el sentido legal.
