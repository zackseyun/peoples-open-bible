translation:
  language: es
  text: ¿Se deleitará en el Todopoderoso? ¿Invocará a Dios[a] en todo momento?[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «si se deleita en el Todopoderoso»; aquí la partícula hebrea introduce una pregunta retórica.'
    reason: lexical_alternative
  - marker: b
    text: '«Invocar» también puede traducirse como «llamar a» o «orar a Dios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: Will ... ?
  chosen_spanish: ¿Se deleitará ...?
  alternatives_spanish:
  - Si ...
  - ¿Acaso ...?
  lexicon: HALOT
  rationale: En este contexto, אִם introduce una pregunta retórica, no una condición. El español interrogativo transmite mejor esa fuerza discursiva que un «si» condicional.
- source_word: עַל
  english_pob_choice: in
  chosen_spanish: en
  alternatives_spanish:
  - sobre
  - con respecto a
  lexicon: HALOT
  rationale: Con התענג, la preposición marca el objeto en el que alguien se deleita. «En» es la opción natural en español y conserva la relación semántica.
- source_word: שַׁדַּי
  english_pob_choice: the Almighty
  chosen_spanish: el Todopoderoso
  alternatives_spanish:
  - Shaddai
  lexicon: HALOT
  rationale: Como título divino, se traduce para mantener accesible el sentido del hebreo. «El Todopoderoso» sigue la decisión documentada del POB de traducir títulos divinos.
- source_word: יִתְעַנָּג
  english_pob_choice: delight himself
  chosen_spanish: se deleitará
  alternatives_spanish:
  - tendrá deleite
  - se gozará
  lexicon: HALOT
  rationale: El hitpael expresa la idea de tomar placer o deleitarse. En español, el reflexivo «se deleitará» conserva esa fuerza sin sonar forzado.
- source_word: יִקְרָא
  english_pob_choice: call on
  chosen_spanish: invocará
  alternatives_spanish:
  - clamará a
  - llamará a
  lexicon: HALOT
  rationale: Con Dios como objeto, קרא significa llamar/invocar en sentido religioso. «Invocará» mantiene ese matiz de oración o apelación dirigida a Dios.
- source_word: אֱלוֹהַּ
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - el Dios único
  lexicon: HALOT
  rationale: El sustantivo divino singular se traduce simplemente como «Dios», sin ampliación innecesaria.
- source_word: בְּכָל עֵת
  english_pob_choice: at all times
  chosen_spanish: en todo momento
  alternatives_spanish:
  - siempre
  - en cada momento
  lexicon: HALOT
  rationale: La expresión denota continuidad y regularidad. «En todo momento» es claro, digno y comunica bien la amplitud temporal del hebreo.
theological_decisions:
- issue: Forma de la pregunta retórica con אִם
  english_pob_reading: Will he delight himself in the Almighty?
  chosen_spanish_reading: ¿Se deleitará en el Todopoderoso?
  alternative_spanish_readings:
  - Si se deleitara en el Todopoderoso...
  - ¿Acaso se deleitará en el Todopoderoso?
  rationale: El hebreo usa אִם como partícula interrogativa retórica dentro del discurso. El español debe reflejar esa pregunta, no convertirla en condición.
  doctrine_reference: Job 27:10 en el flujo argumental del discurso de Job; principio POB de respetar la fuerza discursiva del original.
- issue: Traducción del título divino שַׁדַּי
  english_pob_reading: the Almighty
  chosen_spanish_reading: el Todopoderoso
  alternative_spanish_readings:
  - Shaddai
  rationale: Se mantiene la decisión de traducir títulos divinos en lugar de transliterarlos, conforme al criterio editorial del POB para accesibilidad y claridad.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
translation_notes:
  revision_awareness: 'Se siguió el informe auditado en inglés sin cambios de revisión pendientes: el sentido retórico de אִם, la traducción del título שַׁדַּי, el valor reflexivo de התענג, el matiz religioso de קרא y la continuidad de בְּכָל עֵת se mantienen coherentes con la versión POB en inglés.'
  spanish_consistency_notes:
  - Se usó «Todopoderoso» para שַׁדַּי por consistencia con la política POB de traducir títulos divinos.
  - Se prefirió «invocará» frente a una calca de «llamar sobre» para conservar español natural sin perder el sentido religioso.
  - La puntuación interrogativa duplica la fuerza retórica de ambas cláusulas del hebreo.
