translation:
  language: es
  text: entonces las aguas nos habrían arrastrado; la corriente habría pasado sobre nuestra alma[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nuestra vida» o simplemente «nosotros». El hebreo נֶפֶשׁ aquí puede referirse a la persona entera o a la vida.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲזַי
  english_pob_choice: then
  chosen_spanish: entonces
  alternatives_spanish:
  - en ese momento
  - luego
  lexicon: HALOT
  rationale: Adverbio temporal y consecutivo en una oración contrafactual; «entonces» mantiene la secuencia lógica y suena natural en español.
- source_word: הַמַּיִם
  english_pob_choice: the waters
  chosen_spanish: las aguas
  alternatives_spanish:
  - el agua
  lexicon: HALOT
  rationale: El plural con artículo preserva la imaginería concreta de una crecida amenazante; «las aguas» es más fiel al plural hebreo que «el agua».
- source_word: שְׁטָפוּנוּ
  english_pob_choice: would have swept us away
  chosen_spanish: nos habrían arrastrado
  alternatives_spanish:
  - nos habrían inundado
  - nos habrían barrido
  lexicon: HALOT
  rationale: El verbo expresa inundar y llevarse por delante; «arrastrado» comunica con claridad la fuerza destructiva del agua y funciona bien con el valor contrafactual implícito.
- source_word: נַחְלָה
  english_pob_choice: the stream
  chosen_spanish: el arroyo
  alternatives_spanish:
  - el torrente
  - la corriente
  lexicon: HALOT
  rationale: La revisión inglesa movió la opción hacia un término más cercano al hebreo. En español, «arroyo» conserva la referencia a un cauce/curso de agua sin cargarlo excesivamente de poesía interpretativa; en este contexto puede seguir siendo amenazante por el paralelismo con las aguas desbordadas.
- source_word: עָבַר
  english_pob_choice: would have passed over
  chosen_spanish: habría pasado sobre
  alternatives_spanish:
  - habría cruzado sobre
  - habría corrido sobre
  lexicon: HALOT
  rationale: «Pasar sobre» reproduce de manera directa el movimiento verbal y conserva la imagen del agua cubriendo completamente a los sujetos.
- source_word: עַל
  english_pob_choice: over
  chosen_spanish: sobre
  alternatives_spanish:
  - encima de
  lexicon: HALOT
  rationale: Preposición estándar para expresar movimiento o cobertura por encima de algo; en español bíblico moderno, «sobre» es claro y natural.
- source_word: נַפְשֵׁנוּ
  english_pob_choice: our soul
  chosen_spanish: nuestra alma
  alternatives_spanish:
  - nuestra vida
  - nosotros
  lexicon: HALOT
  rationale: «Alma» conserva el valor hebreo de נֶפֶשׁ en poesía sin reducirlo a una mera paráfrasis. La nota permite la amplitud semántica hacia «vida» o «nosotros», como en el audit trail inglés.
theological_decisions:
- issue: Valor de נֶפֶשׁ en un contexto de peligro poético
  english_pob_reading: our soul
  chosen_spanish_reading: nuestra alma
  alternative_spanish_readings:
  - nuestra vida
  - nosotros
  rationale: No se trata aquí de fijar una antropología técnica, sino de conservar el giro poético hebreo. «Alma» mantiene la dignidad literaria del verso y deja abierta la extensión semántica que el propio hebreo admite.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó נַחְלָה de «torrent» a «stream» para acercarse más al hebreo. En español se refleja esa tendencia con «arroyo», evitando una intensificación excesiva y manteniendo la relación entre las aguas que arrastran y el curso de agua que pasa sobre la נפש.
  spanish_consistency_notes:
  - Se usó el imperfecto condicional compuesto («habrían arrastrado», «habría pasado») para reflejar la contrafactualidad del hebreo en el contexto.
  - Se mantuvo la imagen plural «las aguas» para respetar la forma hebrea.
  - Se evitó traducir נַפְשֵׁנוּ de manera meramente pronominal, porque el POB inglés preserva «soul» y documenta la amplitud semántica en nota.
