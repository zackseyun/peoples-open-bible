translation:
  language: es
  text: un tiempo para buscar[a], y un tiempo para perder; un tiempo para guardar[b], y un tiempo para tirar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un tiempo para buscar algo, y un tiempo para darlo por perdido».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «un tiempo para conservar, y un tiempo para desechar»; también: «un tiempo para custodiar» para שׁמר.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵת
  english_pob_choice: a time
  chosen_spanish: un tiempo
  alternatives_spanish:
  - una temporada
  - una sazón
  lexicon: HALOT
  rationale: עֵת designa un tiempo u ocasión señalada. «Un tiempo» conserva el paralelismo repetido del poema y suena natural en español.
- source_word: לְבַקֵּשׁ
  english_pob_choice: to seek
  chosen_spanish: buscar
  alternatives_spanish:
  - buscar con cuidado
  - buscar
  lexicon: HALOT
  rationale: En este contexto poético, el infinitivo piel expresa la acción de buscar algo. «Buscar» comunica bien la fuerza léxica sin sobrecargar el verso; la nota conserva la alternativa «buscar»/«buscar con diligencia» implícita en el inglés auditado.
- source_word: לְאַבֵּד
  english_pob_choice: to lose
  chosen_spanish: perder
  alternatives_spanish:
  - dar por perdido
  - dejar perderse
  lexicon: HALOT
  rationale: El paralelo con «buscar» apunta a la pérdida de lo buscado o poseído, no a destruirlo activamente. «Perder» es la correspondencia más directa y natural en español.
- source_word: לִשְׁמֹור
  english_pob_choice: to keep
  chosen_spanish: guardar
  alternatives_spanish:
  - conservar
  - mantener
  lexicon: HALOT
  rationale: שׁמר abarca guardar, custodiar, conservar. «Guardar» mantiene el contraste con «arrojar» y permite una lectura de retener o preservar sin forzar un matiz técnico.
- source_word: לְהַשְׁלִיךְ
  english_pob_choice: to throw away
  chosen_spanish: arrojar
  alternatives_spanish:
  - tirar
  - echar fuera
  - despedir
  lexicon: HALOT
  rationale: El hiphil de שלך significa lanzar, arrojar, echar. El inglés POB eligió «throw away» para explicitar la idea de deshacerse de algo; en español «arrojar» preserva el sentido básico del verbo y deja abierta la inferencia de desecho por el contexto antitético con «guardar».
translation_notes:
  revision_awareness: Coincide con el texto fuente hebreo y con el audit trail inglés en la estructura paralela de dos pares antitéticos. La única decisión revisada fue optar por «arrojar» en lugar de «tirar» para sostener el valor verbal de לְהַשְׁלִיךְ sin perder la posibilidad contextual de desecho implícita en el verso.
  spanish_consistency_notes:
  - Se mantuvo la cadencia repetida de «un tiempo para…» para reflejar עֵת ארבע veces.
  - Se evitó «SEÑOR» u այլ sustituciones porque el versículo no contiene el tetragrámaton ni lenguaje divino explícito.
  - «Perder» y «guardar» se eligieron como equivalentes directos y idiomáticos de לְאַבֵּד y לִשְׁמֹור en este paralelismo sapiencial.
  - La nota de «buscar» conserva la alternativa semántica señalada por el POB inglés sin introducir una paráfrasis excesiva.
