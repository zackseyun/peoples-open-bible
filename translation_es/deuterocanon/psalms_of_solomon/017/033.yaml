review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el griego: καθαριεῖ = «purificará», Ἰερουσαλήμ = «Jerusalén», ἐν ἁγιασμῷ = «en santidad», y reconoce correctamente la elipsis de ὡς καὶ τὸ ἀπ’ ἀρχῆς. Sin embargo, la formulación española «como también [fue] desde el principio» suena truncada y menos inteligible que el inglés auditado, que explícitamente suple el estado comparado.'
  spanish_quality_summary: La calidad general es buena, pero la cláusula final necesita una reparación menor para sonar natural y clara en español eclesial contemporáneo. «Como era desde el principio» comunica la elipsis de manera más idiomática que «como también [fue] desde el principio». También conviene ajustar la nota para explicar la elipsis sin mantener una inserción entre corchetes poco natural en el texto corrido.
  glossary_alignment: No hay conflicto con la terminología del proyecto. «Jerusalén», «purificará» y «en santidad» están bien alineados con el griego y con las decisiones del POB. No intervienen términos sensibles como Yahvé/Mesías/esclavo.
  issues:
  - severity: medium
    issue: La frase «como también [fue] desde el principio» es poco natural en español.
    rationale: Aunque intenta conservar la elipsis griega, el resultado español queda rígido y ambiguo. «Como era desde el principio» preserva el sentido comparativo documentado por el POB y mejora notablemente la legibilidad.
  - severity: low
    issue: El adverbio «también» no aporta claridad en la versión española revisada.
    rationale: Corresponde a καὶ dentro de una expresión elíptica, pero en español su mantenimiento literal aquí produce torpeza más que fidelidad. La comparación se expresa suficientemente con «como era desde el principio».
  - severity: low
    issue: Los corchetes alrededor de «[fue]» entorpecen la lectura principal.
    rationale: El proyecto permite explicar suplementos en nota; no es necesario exhibir el verbo suplido dentro del texto cuando la formulación natural española ya puede incorporarlo sin confusión.
  revised_spanish_text: Y purificará a Jerusalén en santidad[a], como era desde el principio[b].
  revised_footnotes:
  - marker: a
    text: O «limpiará a Jerusalén».
    reason: lexical_alternative
  - marker: b
    text: La frase griega «como también lo de desde el principio» es elíptica; en español se expresa como «como era desde el principio» para aclarar la comparación sin añadir contenido nuevo.
    reason: lexical_alternative
  revision_rationale: Se conserva plenamente el sentido del griego y del POB auditado, pero se reemplaza una cláusula final poco idiomática por una formulación natural y clara en español. La nota mantiene la información sobre la elipsis original.
