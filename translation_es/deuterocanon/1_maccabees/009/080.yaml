lexical_decisions:
- source_word: κατόπισθεν
  english_pob_choice: behind
  chosen_spanish: detrás de él
  alternatives_spanish:
  - tras él
  - por detrás de él
  lexicon: LSJ
  rationale: El adverbio indica posición posterior. Como el fragmento griego empieza a mitad de la idea, 'detrás de él' mantiene la continuidad y suena natural en español.
- source_word: ἐκύκλωσαν
  english_pob_choice: surrounded
  chosen_spanish: rodearon
  alternatives_spanish:
  - circundaron
  - encerraron
  lexicon: LSJ
  rationale: El verbo expresa acción de cercar en contexto militar. 'Rodearon' es idiomático y conserva la imagen de cerco sin añadir matices innecesarios.
- source_word: παρεμβολήν
  english_pob_choice: camp
  chosen_spanish: campamento
  alternatives_spanish:
  - campamento militar
  - real
  lexicon: LSJ
  rationale: En narrativa militar, παρεμβολή designa el campamento o el despliegue militar. 'Campamento' es claro en español y refleja bien el contexto bélico.
- source_word: ἐξετίναξαν
  english_pob_choice: shot
  chosen_spanish: dispararon
  alternatives_spanish:
  - lanzaron
  - arrojaron
  lexicon: LSJ
  rationale: El verbo denota lanzar proyectiles. 'Dispararon' comunica una acción bélica concreta y es comprensible en español moderno, sin precisar indebidamente el mecanismo.
- source_word: σχίζας
  english_pob_choice: arrows
  chosen_spanish: flechas
  alternatives_spanish:
  - proyectiles
  - dardos
  - saetas
  lexicon: LSJ
  rationale: El término es raro y puede referirse genéricamente a proyectiles. En este contexto, 'flechas' es la opción más natural e inteligible, conservando la lectura contextual del POB en inglés.
- source_word: ἐκ πρωΐθεν ἕως δείλης
  english_pob_choice: from early morning until evening
  chosen_spanish: desde temprano en la mañana hasta la tarde
  alternatives_spanish:
  - desde el amanecer hasta el anochecer
  - desde la mañana hasta la tarde
  lexicon: LSJ
  rationale: La expresión marca la duración completa del ataque. 'Desde temprano en la mañana hasta la tarde' mantiene el span temporal de forma clara y fluida en español.
- source_word: λαός
  english_pob_choice: people
  chosen_spanish: pueblo
  alternatives_spanish:
  - gente
  - pueblo del ejército
  - tropa
  lexicon: LSJ
  rationale: Aunque el término puede referirse al conjunto combatiente, 'pueblo' preserva la correspondencia literal con el griego y mantiene el sujeto colectivo del relato.
translation_notes:
  revision_awareness: El texto griego y el expediente inglés muestran acuerdo alto, sin revisiones aplicadas en la pasada más reciente. Se mantiene el valor narrativo militar y la incompletud del final de la frase, que continúa en el versículo siguiente.
  spanish_consistency_notes:
  - Se conserva el tono narrativo sobrio y militar.
  - Se evita reemplazar el término raro del griego por un tecnicismo no sustentado; se mantiene una nota alternativa.
  - La frase queda deliberadamente incompleta porque el fragmento griego termina en ὁ δὲ λαὸς, igual que el inglés auditado.
