review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue en lo esencial la revisión inglesa al leer el imperativo como dirigido a los levitas mismos y conserva la tensión con el paralelo hebreo mediante nota. También respeta bien los elementos principales del griego: levitas, servicio sagrado, santificación, lugar, arca, casa y la cláusula relativa sobre Salomón hijo de David. Sin embargo, la nota explica la decisión como si dependiera de la revisión inglesa más que de la evidencia textual, y el texto español puede mejorarse en naturalidad sin perder el registro cultual.'
  spanish_quality_summary: El texto es generalmente claro y digno, pero «siervos sagrados» suena menos natural que «santos servidores», y «la santa arca» es gramaticalmente posible pero menos idiomático que «el arca santa» en español bíblico actual. «Santificaos» usa voseo/vosotros peninsular; para un español latinoamericano neutral y eclesial amplio conviene «Santifíquense».
  glossary_alignment: Se alinea bien con el glosario al usar «Yahvé» para κύριος en un contexto que remite al nombre divino. No hay conflicto con otras entradas terminológicas mayores. La elección de «siervos» no viola una regla fija, pero «servidores» refleja mejor ἱεροδούλοις aquí sin activar matices de esclavitud no pretendidos.
  issues:
  - severity: medium
    issue: Uso de «Santificaos»
    rationale: El proyecto pide español neutral latinoamericano/broadly church-readable; la forma de segunda persona plural peninsular resulta menos adecuada que «Santifíquense».
  - severity: low
    issue: «la santa arca» suena poco natural
    rationale: Aunque «arca» admite femenino históricamente, en español bíblico moderno la formulación más clara y extendida es «el arca santa».
  - severity: low
    issue: «siervos sagrados» puede pulirse
    rationale: «Santos servidores» o «servidores santos» suena más natural y mantiene el valor cultual de ἱεροδούλοις sin excesiva rigidez.
  - severity: medium
    issue: La nota atribuye la decisión al POB inglés en vez de priorizar el griego
    rationale: La revisión debe partir de la fuente griega y usar el inglés como contexto auditado; la nota debe reflejar esa prioridad metodológica.
