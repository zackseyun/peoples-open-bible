translation:
  language: es
  text: cuando combatió contra Aram-naharaim[a] y Aram-zobah[b], y Joab volvió y derrotó a doce mil de Edom en el Valle de Sal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Aram-naharaim significa «Aram de los Dos Ríos».
    reason: lexical_alternative
  - marker: b
    text: O «Aram de Zobah».
    reason: previous_rendering
lexical_decisions:
- source_word: בְּהַצּוֹתוֹ
  english_pob_choice: when he fought against
  chosen_spanish: cuando combatió contra
  alternatives_spanish:
  - cuando peleó contra
  - cuando luchó contra
  lexicon: HALOT
  rationale: El prefijo ב con infinitivo constructo y sufijo cumple aquí función temporal; en este contexto histórico, «combatió contra» comunica bien la acción militar sin añadir interpretación extra.
- source_word: אֲרַם נַהֲרַיִם
  english_pob_choice: Aram-naharaim
  chosen_spanish: Aram-naharaim
  alternatives_spanish:
  - Aram de los Dos Ríos
  - Aram de Mesopotamia
  lexicon: HALOT
  rationale: Se conserva la transliteración del nombre propio, como en el inglés POB. La nota explica el sentido geográfico subyacente sin reemplazar el topónimo.
- source_word: אֲרַם צוֹבָה
  english_pob_choice: Aram-zobah
  chosen_spanish: Aram-zobah
  alternatives_spanish:
  - Aram de Zobah
  - Zobah
  lexicon: HALOT
  rationale: También se preserva la forma transliterada para respetar el topónimo compuesto del hebreo y mantener continuidad con la tradición auditada del POB.
- source_word: וַיָּשָׁב
  english_pob_choice: returned
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  - dio la vuelta
  lexicon: HALOT
  rationale: El verbo שוב expresa volver/retornar. «Volvió» es natural en español y mantiene la secuencia narrativa.
- source_word: וַיַּךְ
  english_pob_choice: struck down
  chosen_spanish: derrotó
  alternatives_spanish:
  - hirió
  - golpeó
  - derribó
  lexicon: HALOT
  rationale: En contexto militar, נכה puede equivaler a derrotar. «Derrotó» comunica la victoria con claridad en español; conserva el sentido de acción bélica sin forzar una imagen corporal donde el español la sentiría extraña.
- source_word: אֶת אֱד֣וֹם
  english_pob_choice: twelve thousand of Edom
  chosen_spanish: doce mil de Edom
  alternatives_spanish:
  - doce mil edomitas
  - doce mil de los de Edom
  lexicon: HALOT
  rationale: Se mantiene la construcción del objeto directo con el nombre nacional «Edom», sin expandir a «edomitas» dentro del texto principal. Así se conserva la sobriedad y la correspondencia con el hebreo.
- source_word: בְּגֵיא מֶלַח
  english_pob_choice: in the Valley of Salt
  chosen_spanish: en el Valle de Sal
  alternatives_spanish:
  - en el Valle de la Sal
  lexicon: HALOT
  rationale: גיא significa valle; el topónimo se vierte de forma directa y clara en español. Se evita una perífrasis más larga que no aporta mayor fidelidad.
- source_word: שְׁנֵים עָשָׂר אָלֶף
  english_pob_choice: twelve thousand
  chosen_spanish: doce mil
  alternatives_spanish:
  - doce mil hombres
  - doce mil soldados
  lexicon: HALOT
  rationale: La secuencia numérica se traduce de forma simple, sin introducir un sustantivo no presente en el hebreo. El referente humano queda inferido por el contexto militar.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que cada marcador de nota aparezca exactamente en el texto español. La nota se ancló únicamente a «Valle de Sal», donde el texto inglés auditado la colocaba en relación con la toponimia, y se evitó introducir un segundo marcador sin ancla.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» reservado para casos del nombre divino; este versículo no lo contiene.
  - Se conservaron los topónimos transliterados Aram-naharaim y Aram-zobah para seguir el POB auditado.
  - No se añadió «edomitas» en el texto principal, para no expandir el hebreo más allá de lo requerido.
