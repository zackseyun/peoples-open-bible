translation:
  language: es
  text: 'Para el maestro de coro: según La Octava[a]. Salmo de David[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «La Octava»; probablemente una designación musical o litúrgica, quizá una melodía, instrumento o ajuste de octava. Tradicionalmente se translitera «Sheminith».'
    reason: cultural_note
  - marker: b
    text: O «por David» o «para David»; el hebreo «de David» deja abierta la relación exacta.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Al músico principal
  alternatives_spanish:
  - Al director
  - Al líder musical
  - Al maestro de coro
  lexicon: HALOT
  rationale: En encabezamientos de salmos, la expresión apunta al responsable de la ejecución musical o litúrgica. «Al músico principal» es una fórmula tradicional y clara en español bíblico, y conserva la función musical sin volverla demasiado interpretativa.
- source_word: עַל
  english_pob_choice: according to
  chosen_spanish: según
  alternatives_spanish:
  - sobre
  - con
  - para
  lexicon: HALOT
  rationale: En la superinscripción, עַל introduce una designación musical o de ejecución. «Según» comunica en español esa relación de ajuste a una melodía, modo o indicación técnica mejor que un calco literal como «sobre».
- source_word: הַשְּׁמִינִית
  english_pob_choice: The Eighth
  chosen_spanish: La Octava
  alternatives_spanish:
  - la octava
  - la Sheminith
  lexicon: HALOT
  rationale: El hebreo significa literalmente «la octava» y probablemente designa una indicación musical. Traducirlo mantiene la transparencia del término y evita depender de la transliteración técnica «Sheminith», menos clara para el lector en español.
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Cántico
  - Poema
  lexicon: HALOT
  rationale: Como rótulo genérico del encabezamiento, «salmo» es el equivalente natural y preciso en español e identifica correctamente el género del texto.
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - por David
  - para David
  - perteneciente a David
  lexicon: HALOT
  rationale: La preposición ל deja abierta la relación exacta. «De David» preserva esa ambigüedad mejor que una opción más específica como «por David» o «para David».
theological_decisions:
- issue: Relación exacta de David con el salmo en la superinscripción
  english_pob_reading: of David
  chosen_spanish_reading: de David
  alternative_spanish_readings:
  - por David
  - para David
  rationale: La forma hebrea no obliga a resolver si indica autoría, dedicación o asociación. «De David» conserva la tensión documental y evita afirmar más de lo que el texto exige.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Función de הַשְּׁמִינִית como designación musical
  english_pob_reading: The Eighth
  chosen_spanish_reading: La Octava
  alternative_spanish_readings:
  - la Sheminith
  - la octava cuerda / el octavo tono
  rationale: El término parece ser una indicación musical o litúrgica, no un contenido doctrinal. Mantener la forma literal en español preserva la evidencia textual y la posible ambigüedad funcional.
  doctrine_reference: Principio de transparencia lexical en encabezamientos poéticos.
translation_notes:
  revision_awareness: La revisión del texto fuente indicó un ajuste de ubicación para la nota alternativa de «de David» en el inglés; la presente línea española coloca la nota [b] junto a «David» para reflejar correctamente la ambigüedad del לְדָוִד.
  spanish_consistency_notes:
  - He usado «Al músico principal» para mantener la terminología funcional y litúrgica ya documentada en el POB.
  - «La Octava» se capitaliza para reflejar que funciona como designación/título en la superinscripción.
  - Conservo «Salmo» y la preposición «de» para respetar el género del encabezamiento y la ambigüedad de pertenencia/autoria.
  - No he introducido «SEÑOR» ni otras sustituciones convencionales porque aquí no aparece el Tetragrámaton.
