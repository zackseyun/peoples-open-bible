translation:
  language: es
  text: Por favor, perdona la transgresión[a] de tu sierva, porque Yahvé ciertamente hará a mi señor una casa duradera, pues mi señor libra las batallas de Yahvé, y no se hallará maldad en ti todos tus días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pecado» o «rebelión». El hebreo פשע puede abarcar transgresión grave o rebelión; aquí «transgresión» conserva mejor la seriedad moral del término en esta súplica personal.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂא נָא
  english_pob_choice: Please forgive
  chosen_spanish: Por favor, perdona
  alternatives_spanish:
  - Por favor, absuelve
  - Te ruego que perdones
  lexicon: HALOT
  rationale: El idiomático hebreo de «levantar/llevar» el pecado significa perdonar o pasar por alto una falta. «Por favor, perdona» expresa con naturalidad la súplica y conserva el tono rogativo de נָא.
- source_word: לְפֶשַׁע
  english_pob_choice: the transgression of
  chosen_spanish: el pecado de
  alternatives_spanish:
  - la transgresión de
  - la falta de
  lexicon: HALOT
  rationale: פשע puede denotar transgresión o rebelión. En esta súplica personal, «pecado» comunica de forma clara la culpa moral sin cargar el texto con un matiz político más fuerte que el contexto inmediato.
- source_word: אֲמָתֶךָ
  english_pob_choice: your servant
  chosen_spanish: tu sierva
  alternatives_spanish:
  - tu esclava
  - tu criada
  lexicon: HALOT
  rationale: אמה es específicamente una mujer sierva. «Sierva» mantiene el matiz de auto-humillación respetuosa en español y evita tanto la pérdida del género como la aspereza de «esclava» en este contexto de cortesía.
- source_word: עָשֹׂה יַעֲשֶׂה
  english_pob_choice: will surely make
  chosen_spanish: hará ciertamente
  alternatives_spanish:
  - hará sin duda
  - seguramente hará
  lexicon: HALOT
  rationale: La construcción de infinitivo absoluto + verbo finito intensifica la afirmación. «Hará ciertamente» refleja esa certeza enfática de manera natural en español.
- source_word: לַאדֹנִי
  english_pob_choice: my lord
  chosen_spanish: a mi señor
  alternatives_spanish:
  - a mi señoría
  - a mi amo
  lexicon: HALOT
  rationale: En el trato respetuoso de Abigail a David, «mi señor» reproduce la fórmula cortesana sin la dureza de «amo». Se mantiene el dativo con «a» para conservar la dirección del beneficio/promesa.
- source_word: בַּיִת נֶאֱמָן
  english_pob_choice: a lasting house
  chosen_spanish: una casa duradera
  alternatives_spanish:
  - una casa segura
  - una dinastía duradera
  - una casa fiel
  lexicon: HALOT
  rationale: «Casa» conserva la metáfora dinástica del hebreo. «Duradera» comunica la estabilidad y permanencia prometidas, sin reemplazar el término por una paráfrasis interpretativa como «dinastía».
- source_word: מִלְחֲמוֹת יְהוָה
  english_pob_choice: the LORD’s battles
  chosen_spanish: las batallas de Yahvé
  alternatives_spanish:
  - las guerras de Yahvé
  - las batallas del Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino «Yahvé» conforme a la política del proyecto. «Batallas» corresponde al plural hebreo y suena más ajustado al contexto inmediato que «guerras».
- source_word: נִלְחָם
  english_pob_choice: fights
  chosen_spanish: pelea
  alternatives_spanish:
  - lucha
  - está peleando
  - hace guerra
  lexicon: HALOT
  rationale: El participio/forma verbal expresa una acción característica. «Pelea» da una equivalencia directa y comprensible en español, preservando el sentido habitual de combatir en favor de Yahvé.
- source_word: וְרָעָה
  english_pob_choice: evil
  chosen_spanish: maldad
  alternatives_spanish:
  - mal
  - daño
  - perversidad
  lexicon: HALOT
  rationale: Aquí רעה tiene peso moral, no solo de daño físico. «Maldad» preserva mejor esa dimensión ética en español que «daño», que podría sonar meramente pragmático.
- source_word: לֹא תִמָּצֵא בְךָ
  english_pob_choice: will not be found in you
  chosen_spanish: no se hallará en ti
  alternatives_spanish:
  - no se encontrará en ti
  - no habrá en ti
  lexicon: HALOT
  rationale: La pasiva nifal de מצא con ב indica que algo no estará presente o adherido a la persona. «No se hallará en ti» mantiene la construcción pasiva y el sentido moral de ausencia.
- source_word: מִיָּמֶיךָ
  english_pob_choice: all your days
  chosen_spanish: en todos tus días
  alternatives_spanish:
  - durante todos tus días
  - a lo largo de todos tus días
  lexicon: HALOT
  rationale: La expresión idiomática apunta a la duración de toda la vida. «En todos tus días» es fluido en español y conserva la idea temporal total sin sobreexplicar.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto de transliterar el Tetragrámaton como «Yahvé», preservando el nombre propio divino en lugar de sustituirlo por un título.
theological_decisions:
- issue: Sentido dinástico de «casa»
  english_pob_reading: lasting house / enduring dynasty; Hebrew 'house' refers to a stable lineage, not merely a physical household.
  chosen_spanish_reading: casa duradera
  alternative_spanish_readings:
  - casa segura
  - dinastía duradera
  rationale: Se conserva «casa» para mantener la metáfora bíblica y su conexión intertextual con la promesa a David. «Duradera» comunica la estabilidad prometida sin borrar el valor dinástico del término.
  doctrine_reference: 'Translation philosophy: optimal equivalence; consistency of covenant/dynastic imagery.'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la lectura auditada del inglés POB, pero adapta varios puntos al español para mantener naturalidad y fidelidad: se conservó la metáfora de «casa», se mantuvo el nombre divino Yahvé, y se eligió una construcción verbal enfática («hará ciertamente») para reflejar el infinitivo absoluto hebreo. A diferencia del último pase inglés, se prefirió «tu sierva» para preservar el género explícito de אֲמָתֶךָ.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - «Sierva» preserva el género de אֲמָתֶךָ y la voz humilde de Abigail.
  - «Casa duradera» conserva la metáfora dinástica sin introducir un término más interpretativo que «dinastía».
  - Se mantiene la repetición de «Yahvé» en ambas cláusulas para reflejar el hebreo.
  - 'La negativa final se expresa con una pasiva impersonal natural en español: «no se hallará».'
