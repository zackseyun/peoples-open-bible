reference: 4 Maccabees 15:3
source:
  edition: lxx-swete-1909
  text: τὴν εὐσέβειαν μᾶλλον ἠγάπησεν τὴν σώζουσαν εἰς αἰώνιον ζωὴν κατὰ θεόν.
  language: Greek
