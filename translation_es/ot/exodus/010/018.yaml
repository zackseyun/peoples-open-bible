translation:
  language: es
  text: Así que salió de la presencia de Faraón y suplicó a Yahvé[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rogó con insistencia a Yahvé» o «imploró a Yahvé». El verbo hebreo expresa una súplica ferviente.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - partió
  - se fue
  lexicon: HALOT
  rationale: El wayyiqtol de יצא indica salida o alejamiento. «Salió» conserva el movimiento narrativo breve y natural en español, equivalente a «went out» sin añadir matices no presentes.
- source_word: מֵעִם
  english_pob_choice: from
  chosen_spanish: de parte de
  alternatives_spanish:
  - desde
  - de con
  - de la presencia de
  lexicon: HALOT
  rationale: La construcción מֵעִם expresa separación de alguien con quien se estaba. En español, «de parte de» comunica mejor que se apartó de estar con Faraón, aunque mantiene la brevedad del texto.
- source_word: פַּרְעֹה
  english_pob_choice: Pharaoh
  chosen_spanish: Faraón
  alternatives_spanish:
  - el faraón
  lexicon: nombre propio / título
  rationale: Se usa la forma asentada en español bíblico, «Faraón», como título y nombre regnal reconocible sin necesidad de artículo.
- source_word: וַיֶּעְתַּר
  english_pob_choice: pleaded
  chosen_spanish: suplicó
  alternatives_spanish:
  - rogó
  - intercedió
  - imploró
  lexicon: HALOT
  rationale: עתר comunica súplica insistente y ferviente. «Suplicó» conserva la fuerza de la petición urgente mejor que un simple «pidió», y corresponde bien al valor de «pleaded» del POB.
- source_word: אֶל
  english_pob_choice: with
  chosen_spanish: a
  alternatives_spanish:
  - ante
  - hacia
  lexicon: HALOT
  rationale: Aunque el POB inglés opta por «with» por idiomatismo, el hebreo lleva אֶל, «a/hacia». En español, «suplicó a Yahvé» conserva la dirección de la súplica sin forzar una preposición impropia con este verbo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: 'Se sigue la norma española del proyecto para el Tetragrámaton: «Yahvé». Preserva el nombre divino personal revelado en el hebreo y evita sustituirlo por un título.'
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: La base hebrea usa explícitamente el nombre de pacto. En español, la forma del proyecto es «Yahvé», que mantiene la referencia directa al nombre divino en vez de ocultarlo bajo un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor verbal de עתר
  english_pob_reading: pleaded
  chosen_spanish_reading: suplicó
  alternative_spanish_readings:
  - rogó
  - imploró
  - oró con insistencia
  rationale: El verbo expresa una petición intensa y fervorosa dirigida a Dios. «Suplicó» conserva ese peso sin rebajar la intensidad a una oración genérica.
  doctrine_reference: HALOT / contexto inmediato de oración a Yahvé
translation_notes:
  revision_awareness: El pasaje es breve y el alineamiento con el hebreo es alto. Se mantuvo la secuencia narrativa («salió... y suplicó») y se preservó el matiz intenso de עתר mediante una opción española natural y reverente. No hubo revisiones aplicadas en el audit trail reciente, y el consenso de revisión es de alta concordancia.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se evitó «el SEÑOR» para no ocultar el nombre divino.
  - Se eligió un español sobrio y bíblico sin arcaísmos innecesarios.
  - La preposición «a» en «suplicó a Yahvé» refleja mejor el hebreo que una calca de «with» en español.
