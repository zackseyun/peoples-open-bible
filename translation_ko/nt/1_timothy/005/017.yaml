id: 1TI.5.17
reference: 1 Timothy 5:17
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Οἱ καλῶς προεστῶτες πρεσβύτεροι διπλῆς τιμῆς ἀξιούσθωσαν, μάλιστα οἱ κοπιῶντες ἐν λόγῳ καὶ διδασκαλίᾳ·
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/005/017.yaml
  text: Let the elders who lead well be considered worthy of double honor[c][b][a], especially those who labor in word and teaching.
  footnotes:
  - marker: a
    text: Or 'be counted worthy of twofold honor.' The phrase may include both respect and material support, especially in light of the following verse.
    reason: lexical_alternative
  - marker: b
    text: Or 'especially' may be understood by some as 'namely,' identifying the elders in view as those laboring in preaching and teaching.
    reason: alternative_reading
  - marker: c
    text: '''In word and teaching'' likely refers to verbal ministry such as preaching and instruction.'
    reason: cultural_note
translation:
  language: ko
  text: 잘 다스리는 장로[a]들은 두 배의 존경[b]을 받기에 합당한 자로 여기십시오. 특히 말씀과 가르침에 수고하는[c] 자들이 그러합니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 본 절의 πρεσβύτεροι는 교회 직제(장로)를 가리킨다.
    reason: cultural_note
  - marker: b
    text: 또는 「이중의 존경에 합당한 자로」. 본 어구는 존경뿐 아니라 물질적 지원도 포함할 수 있으며, 다음 절(18절)이 이를 뒷받침한다.
    reason: lexical_alternative
  - marker: c
    text: 「말씀과 가르침에 수고하는」은 설교·교훈 등 언어적 사역을 가리킨다.
    reason: cultural_note
lexical_decisions:
- source_word: Οἱ καλῶς προεστῶτες πρεσβύτεροι
  english_pob_choice: the elders who lead well
  chosen_korean: 잘 다스리는 장로들
  alternatives_korean:
  - 잘 통솔하는 장로들
  - 잘 인도하는 장로들
  lexicon: BDAG
  rationale: 3:4 προΐστημι와 일관 「다스리다」. πρεσβύτερος는 본 절에서 교회 직제로 사용되므로 「장로」(글로서리 표준).
- source_word: διπλῆς τιμῆς ἀξιούσθωσαν
  english_pob_choice: be considered worthy of double honor
  chosen_korean: 두 배의 존경을 받기에 합당한 자로 여기십시오
  alternatives_korean:
  - 두 배의 영예에 합당한 자로 여기십시오
  - 갑절의 존경에 합당한 자로
  lexicon: BDAG
  rationale: τιμή의 「존경·영예」를 「존경」으로(3절 「공경」과 어휘 변화). 「두 배」가 자연스럽다.
- source_word: μάλιστα οἱ κοπιῶντες ἐν λόγῳ καὶ διδασκαλίᾳ
  english_pob_choice: especially those who labor in word and teaching
  chosen_korean: 특히 말씀과 가르침에 수고하는 자들
  alternatives_korean:
  - 무엇보다 말씀과 교훈에 수고하는 자들
  lexicon: BDAG
  rationale: μάλιστα를 「특히」로(4:10과 일관).
