translation:
  language: es
  text: Pero tú, Yahvé, eres un escudo alrededor de mí[a], mi gloria[b], y el que levanta mi cabeza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por mí» o «a mi favor»; la preposición hebrea puede expresar protección en favor de alguien, aunque aquí probablemente sugiere una protección que rodea.
    reason: lexical_alternative
  - marker: b
    text: «Levanta mi cabeza» es un modismo hebreo para restaurar dignidad, confianza o vindicación.
    reason: cultural_note
lexical_decisions:
- source_word: וְ/אַתָּה
  english_pob_choice: But you
  chosen_spanish: Pero tú
  alternatives_spanish:
  - Y tú
  - Mas tú
  lexicon: HALOT
  rationale: La partícula inicial con pronombre independiente introduce un fuerte contraste con la angustia precedente; «Pero tú» conserva la fuerza adversativa en un español natural y digno.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme al criterio del proyecto, se vierte con el nombre propio «Yahvé», no con una sustitución titulada.
- source_word: מָגֵן
  english_pob_choice: a shield
  chosen_spanish: un escudo
  alternatives_spanish:
  - escudo
  lexicon: HALOT
  rationale: El sustantivo denota un objeto defensivo concreto. En español, el predicado nominal suena natural como «eres un escudo».
- source_word: בַּעֲדִי
  english_pob_choice: around me
  chosen_spanish: alrededor de mí
  alternatives_spanish:
  - por mí
  - en favor de mí
  - sobre mí
  lexicon: HALOT
  rationale: La preposición puede expresar protección en favor de alguien; en este contexto con «escudo» la idea de encierro protector queda bien reflejada con «alrededor de mí».
- source_word: כְּבוֹדִי
  english_pob_choice: my glory
  chosen_spanish: mi gloria
  alternatives_spanish:
  - mi honor
  lexicon: HALOT
  rationale: «Gloria» mantiene el paralelismo compacto del hebreo y permite el sentido poético-teológico de honor, dignidad y verdadero valor sin resolverlo en una sola glosa.
- source_word: וּ/מֵרִים
  english_pob_choice: and the one who lifts up
  chosen_spanish: y el que levanta
  alternatives_spanish:
  - y quien levanta
  - y el que alza
  lexicon: HALOT
  rationale: El participio expresa acción característica y continua. «El que levanta» preserva ese valor sin forzar una perífrasis excesiva.
- source_word: רֹאשִׁי
  english_pob_choice: my head
  chosen_spanish: mi cabeza
  alternatives_spanish:
  - mi cabeza erguida
  lexicon: HALOT
  rationale: Se conserva la imagen concreta del hebreo. La expresión puede sugerir restauración de dignidad o vindicación, pero eso se deja implícito en el texto principal.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: O Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El pasaje nombra explícitamente a Yahvé. Mantener el nombre propio respeta la decisión confesional y auditada del proyecto, en vez de ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: La imagen de «levanta mi cabeza»
  english_pob_reading: Retain the literal idiom in the main text
  chosen_spanish_reading: 'Mantener la imagen literal: «el que levanta mi cabeza»'
  alternative_spanish_readings:
  - el que me restablece el honor
  - el que me da ánimo
  - el que me vindica
  rationale: La expresión hebrea es un modismo rico que puede implicar honra, ánimo o vindicación. Conviene preservarlo en el texto principal y, si hace falta, explicarlo aparte sin cerrar su alcance.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Coincide con el pasaje fuente y con la última revisión inglesa; no se observan cambios aplicados ni divergencias textuales relevantes en el audit trail. La redacción española conserva el contraste inicial, el nombre divino, la imagen del escudo y el modismo final sin diluirlos.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se conserva «mi gloria» en paralelo con la formulación breve del hebreo.
  - Se mantiene la imagen concreta de «mi cabeza» en lugar de una paráfrasis explicativa en el cuerpo del texto.
  - El registro es bíblico, claro y apto para publicación en español neutro latinoamericano.
