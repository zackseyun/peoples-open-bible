translation:
  language: es
  text: Sé que puedes hacerlo todo[a], y ningún propósito tuyo puede frustrarse.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ningún plan tuyo puede ser impedido». El sustantivo hebreo puede significar «plan» o «propósito», y el verbo puede expresar la idea de ser retenido, impedido o frustrado.
    reason: lexical_alternative
lexical_decisions:
- source_word: ידעת
  english_pob_choice: I know
  chosen_spanish: Sé
  alternatives_spanish:
  - He conocido
  - Conozco
  lexicon: HALOT
  rationale: El perfecto qal 2ms expresa aquí una confesión presente dirigida a Dios. En español, «sé» comunica de manera natural esa certeza actual sin perder el valor confesional del hebreo.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Introduce el contenido de la confesión; «que» funciona como complemento directo natural en español.
- source_word: כֹל
  english_pob_choice: all things
  chosen_spanish: todo
  alternatives_spanish:
  - todas las cosas
  - todo lo que existe
  lexicon: HALOT
  rationale: Con תּוּכָל, el sentido es de capacidad universal. «Todo» transmite la totalidad de modo natural en español y evita una expansión innecesaria.
- source_word: תּוּכָל
  english_pob_choice: you can do
  chosen_spanish: puedes
  alternatives_spanish:
  - eres capaz de
  - puedes hacer
  lexicon: HALOT
  rationale: El verbo יכל expresa poder o capacidad. En español, el complemento verbal puede quedar implícito en «todo lo puedes», una construcción idiomática y fiel al alcance de la frase.
- source_word: יִבָּצֵר
  english_pob_choice: can be thwarted
  chosen_spanish: puede frustrarse
  alternatives_spanish:
  - puede impedirse
  - puede ser estorbado
  - puede verse impedido
  lexicon: HALOT
  rationale: El nifal de בצר con מִן comunica que algo queda impedido, retenido o frustrado. «Frustrarse» conserva bien esa fuerza en español contemporáneo, especialmente en relación con un propósito.
- source_word: מִמְּךָ
  english_pob_choice: of yours
  chosen_spanish: tuyo
  alternatives_spanish:
  - de ti
  - que es tuyo
  lexicon: HALOT
  rationale: La relación posesiva es la más natural en español para expresar que el propósito pertenece a Dios. «Tuyo» conserva la referencia personal sin sonar mecánico.
- source_word: מְזִמָּה
  english_pob_choice: purpose
  chosen_spanish: propósito
  alternatives_spanish:
  - plan
  - designio
  - intención
  lexicon: HALOT
  rationale: El sustantivo puede significar plan, propósito o designio. Aquí, hablando de Dios, «propósito» evita connotaciones negativas y reproduce bien la idea de intención soberana. Se mantiene la alternativa «plan» como posibilidad semántica.
theological_decisions:
- issue: Omnipotencia divina y la imposibilidad de frustrar su intención
  english_pob_reading: I know that you can do all things, and no purpose of yours can be thwarted.
  chosen_spanish_reading: Sé que todo lo puedes, y que no puede frustrarse ningún propósito tuyo.
  alternative_spanish_readings:
  - Sé que puedes hacerlo todo, y que ningún plan tuyo puede ser impedido.
  - Sé que eres capaz de todo, y que nada de lo que propones puede frustrarse.
  rationale: El hebreo afirma tanto la capacidad ilimitada de Dios como la imposibilidad de que su intención quede impedida. La formulación española conserva esa doble afirmación sin añadir matices especulativos, y deja abierta la alternativa léxica entre «propósito» y «plan».
  doctrine_reference: Job 42:2; Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El inglés POB no requirió revisión textual en esta unidad; el consenso de auditoría fue alto, con una única nota léxica sobre «purpose/plan» y el valor del verbo. La redacción española conserva esa tensión semántica en una forma natural y auditable.
  spanish_consistency_notes:
  - Se mantuvo «Dios» implícito por el contexto de la oración a Job; no se introdujo un sujeto explícito distinto al de la segunda persona singular.
  - Se prefirió «propósito» sobre «plan» por la lectura más sobria y positiva en referencia a Dios, pero la nota conserva la alternativa documentada.
  - «Todo lo puedes» es una equivalencia idiomática válida en español para «you can do all things» y evita añadir un objeto verbal innecesario.
