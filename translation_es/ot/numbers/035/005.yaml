translation:
  language: es
  text: 'Medirán fuera de la ciudad: el lado este, dos mil codos; el lado sur, dos mil codos; el lado oeste[a], dos mil codos; y el lado norte, dos mil codos, con la ciudad en medio. Estos serán para ellos los terrenos de pasto[b] de las ciudades.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente «mar» para el lado occidental, usando el giro direccional común basado en el Mediterráneo.
    reason: lexical_alternative
  - marker: b
    text: O «terrenos comunales» o «terrenos abiertos» de las ciudades; el término hebreo se refiere al espacio que rodea una ciudad y suele usarse para pastoreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמַדֹּתֶם
  english_pob_choice: You shall measure
  chosen_spanish: Medirán
  alternatives_spanish:
  - Y medirán
  - Deberán medir
  lexicon: HALOT
  rationale: El hebreo usa una forma verbal con fuerza instructiva en contexto legal. En español, el futuro exhortativo 'Medirán' conserva el tono normativo sin volverlo mecánico.
- source_word: מִחוּץ לָעִיר
  english_pob_choice: outside the city
  chosen_spanish: desde fuera de la ciudad
  alternatives_spanish:
  - fuera de la ciudad
  - desde afuera de la ciudad
  lexicon: HALOT
  rationale: La frase indica el punto de referencia de la medición. 'Desde fuera de la ciudad' mantiene la idea espacial y suena natural en español.
- source_word: פְּאַת
  english_pob_choice: side
  chosen_spanish: lado
  alternatives_spanish:
  - extremo
  - borde
  - costado
  lexicon: HALOT
  rationale: En este contexto de medición por direcciones, 'lado' comunica mejor la extensión cardinal que 'esquina' o 'borde'.
- source_word: קֵדְמָה
  english_pob_choice: east
  chosen_spanish: oriental
  alternatives_spanish:
  - este
  - hacia el este
  lexicon: HALOT
  rationale: Es una dirección cardinal. 'Oriental' es claro y sobrio en español; también conserva el paralelismo con los otros puntos cardinales.
- source_word: נֶגֶב
  english_pob_choice: south
  chosen_spanish: sur
  alternatives_spanish:
  - meridional
  - Negev
  lexicon: HALOT
  rationale: Aquí funciona como dirección, no como nombre geográfico. 'Sur' es la lectura contextual más directa.
- source_word: יָם
  english_pob_choice: west
  chosen_spanish: occidental
  alternatives_spanish:
  - oeste
  - lado del mar
  lexicon: HALOT
  rationale: El hebreo usa 'mar' como idiomático direccional para el oeste. En español, 'occidental' preserva la orientación sin perder el trasfondo idiomático; se documenta la alternativa literal en nota.
- source_word: צָפוֹן
  english_pob_choice: north
  chosen_spanish: norte
  alternatives_spanish:
  - septentrional
  lexicon: HALOT
  rationale: Término cardinal estándar. 'Norte' es el equivalente más natural y preciso.
- source_word: אַלְפַּיִם בָּאַמָּה
  english_pob_choice: two thousand cubits
  chosen_spanish: dos mil codos
  alternatives_spanish:
  - dos mil codos de longitud
  lexicon: HALOT
  rationale: Se conserva la unidad antigua 'codo' para no sustituir la especificidad del texto. El número y la unidad se mantienen literalmente.
- source_word: וְהָעִיר בַּתָּוֶךְ
  english_pob_choice: with the city in the middle
  chosen_spanish: con la ciudad en medio
  alternatives_spanish:
  - y la ciudad en medio
  - con la ciudad en el centro
  lexicon: HALOT
  rationale: La cláusula describe la disposición espacial. 'En medio' reproduce bien la relación sin añadir una idea más técnica que el hebreo no exige.
- source_word: זֶה יִהְיֶה לָהֶם
  english_pob_choice: This shall be for them
  chosen_spanish: Esto será para ellos
  alternatives_spanish:
  - Esto les pertenecerá
  - Esto les servirá
  lexicon: HALOT
  rationale: '''Será para ellos'' mantiene el valor de asignación o designación sin convertirlo en un enunciado de propiedad más fuerte que el hebreo.'
- source_word: מִגְרְשֵׁי הֶעָרִים
  english_pob_choice: the pasture lands of the cities
  chosen_spanish: los terrenos de pasto de las ciudades
  alternatives_spanish:
  - los terrenos comunales de las ciudades
  - los terrenos abiertos de las ciudades
  lexicon: HALOT
  rationale: מִגְרָשׁ designa el espacio abierto alrededor de una ciudad, a menudo usado para pastoreo. 'Terrenos de pasto' comunica esa función sin ocultar la referencia espacial.
translation_notes:
  revision_awareness: Coincide con el sentido del texto hebreo y con la solución auditada en inglés; se conserva la estructura normativa, las cuatro direcciones, la unidad de medida antigua y el término espacial final con nota de alternativa semántica.
  spanish_consistency_notes:
  - Se mantiene 'codos' para אַמָּה por consistencia con el proyecto y con la transparencia del dato antiguo.
  - Se usa 'Yahvé' en el texto base sólo cuando el hebreo lo exige; aquí no aparece el Tetragrámaton, así que no corresponde.
  - '''Mar'' en el hebreo direccional se explicita en nota para evitar perder el idiomatismo original.'
  - '''Terrenos de pasto'' intenta preservar la función práctica del hebreo sin borrar el sentido de espacio abierto alrededor de la ciudad.'
