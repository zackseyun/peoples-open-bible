base_translation:
  language: en
  yaml_path: translation/ot/amos/005/016.yaml
  text: 'Therefore[a], thus says Yahweh, the God of hosts, the Lord: In all the squares there will be wailing, and in all the streets they will say, “Alas! Alas!” They will call the farmer to mourning[b], and those who know lamentation to wailing.'
  footnotes:
  - marker: a
    text: Or “Woe! Woe!” The Hebrew cry הוֹ הוֹ is an exclamation of lament; “Alas! Alas!” was chosen to emphasize mourning rather than denunciation.
    reason: lexical_alternative
  - marker: b
    text: Literally “those who know lamentation,” likely referring to skilled or professional mourners.
    reason: cultural_note
