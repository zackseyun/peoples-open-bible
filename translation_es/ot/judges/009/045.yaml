revisions:
- from: Y Abimélec luchó contra la ciudad todo aquel día[a], y tomó la ciudad y mató al pueblo que estaba en ella[b]. Luego derribó la ciudad y la sembró con sal.
  to: Y Abimélec luchó contra la ciudad todo aquel día[a], y capturó la ciudad y mató a la gente que estaba en ella. Luego derribó la ciudad y la sembró con sal[b].
  rationale: Se ajusta «tomó» a «capturó» para reflejar mejor el verbo militar לכד, y «el pueblo que estaba en ella» a «la gente que estaba en ella» para lograr un español más natural y preciso sin perder el sentido del hebreo. La nota cultural [b] se ancla en la frase relevante «la sembró con sal», conforme a la disciplina de notas requerida.
