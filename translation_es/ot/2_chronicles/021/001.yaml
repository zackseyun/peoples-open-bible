    reason: cultural_note
  revision_rationale: Se reemplaza 'se acostó' por 'durmió' para preservar el idiomático hebreo de muerte de manera fiel pero natural en español. También se ajusta el orden de 'Jehoram su hijo' para mejorar la fluidez sin alterar el sentido. Se actualiza la nota lexical para que coincida exactamente con el texto revisado.
