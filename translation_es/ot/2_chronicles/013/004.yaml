translation:
  language: es
  text: 'Entonces Abías se puso de pie en el monte Zemaraim[a], que está en la región montañosa de Efraín, y dijo: «¡Óiganme, Jeroboam y todo Israel!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que está en las montañas de Efraín». La expresión hebrea puede designar la región montañosa de Efraín o un sector montañoso de esa zona.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  english_pob_choice: stood
  chosen_spanish: se puso de pie
  alternatives_spanish:
  - se levantó
  - se alzó
  - tomó su puesto
  lexicon: HALOT
  rationale: El hebreo קום en narración puede expresar que alguien se levantó o se puso en pie. En este contexto de discurso público, «se puso de pie» conserva el sentido natural y la preparación para hablar, sin añadir una postura militar que el texto no explicita.
- source_word: מֵעַל לְהַר
  english_pob_choice: on Mount
  chosen_spanish: en el monte
  alternatives_spanish:
  - sobre el monte
  - en la cima del monte
  - desde el monte
  lexicon: HALOT
  rationale: La secuencia preposicional hebrea es idiomática y describe la ubicación de Abías. «En el monte» comunica con claridad la localización sin reproducir de manera forzada las preposiciones hebreas.
- source_word: צְמָרַיִם
  english_pob_choice: Zemaraim
  chosen_spanish: Zemaraim
  alternatives_spanish:
  - Cemaraim
  lexicon: Nombre propio
  rationale: Es un topónimo propio y se translitera para mantener la referencia geográfica del texto base.
- source_word: אֲשֶׁר בְּהַר אֶפְרָיִם
  english_pob_choice: which is in the hill country of Ephraim
  chosen_spanish: que está en la región montañosa de Efraín
  alternatives_spanish:
  - que está en el monte Efraín
  - que está en las montañas de Efraín
  lexicon: HALOT
  rationale: הַר puede designar una montaña o una zona montañosa. «Región montañosa» preserva el valor regional que el POB inglés decidió explicitar con «hill country», manteniendo la tensión entre montaña singular y territorio montañoso.
- source_word: שְׁמָעוּנִי
  english_pob_choice: Hear me
  chosen_spanish: Oiganme
  alternatives_spanish:
  - Escúchenme
  - Óiganme
  lexicon: HALOT
  rationale: 'El imperativo plural con sufijo de primera persona singular pide una apelación directa. «Oiganme» conserva el tono inmediato y público del llamado. Se prefiere la forma con tilde correspondiente: «Óiganme».'
- source_word: יָרָבְעָם וְכָל יִשְׂרָאֵל
  english_pob_choice: Jeroboam and all Israel
  chosen_spanish: Jeroboam y todo Israel
  alternatives_spanish:
  - Jeroboam y todo el Israel
  - Jeroboam y todos los israelitas
  lexicon: HALOT
  rationale: Se mantiene el nombre propio y la designación colectiva literal. «Todo Israel» conserva la formulación compacta y la carga político-covenantal del hebreo, como en el POB inglés.
theological_decisions:
- issue: Designación de Israel en contexto de reino dividido
  english_pob_reading: all Israel
  chosen_spanish_reading: todo Israel
  alternative_spanish_readings:
  - todos los israelitas
  - todo el pueblo de Israel
  rationale: Se preserva la expresión global del texto, sin rebajarla a una mera referencia étnica. Así queda visible la retórica del Cronista al dirigirse al reino del norte con el nombre pleno de Israel.
  doctrine_reference: Preservar la tensión teológica e histórica del texto, no resolverla por paráfrasis.
translation_notes:
  revision_awareness: 'Coincide con el tramo auditado en inglés: se mantiene la lectura locativa de Mount Zemaraim y la alternativa regional para הַר אֶפְרָיִם, sin cambios de sentido respecto del POB inglés.'
  spanish_consistency_notes:
  - Se usa «Abías» para el nombre propio, en continuidad con la tradición castellana y la transliteración del hebreo del registro inglés.
  - Se conserva «Israel» como designación colectiva sin añadir artículos innecesarios para no alterar el paralelismo del llamado.
  - La puntuación del discurso directo sigue la división del original y la naturalidad del español moderno.
