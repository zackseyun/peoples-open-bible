  to: Así Salomón expulsó a Abiatar de ser sacerdote de Yahvé[a][b], cumpliendo la palabra de Yahvé que había hablado acerca de la casa de Elí en Siló.
  rationale: Se ajusta 'contra' a 'acerca de' para preservar mejor la amplitud semántica de עַל y alinearse con la decisión léxica y teológica documentada en el English POB, sin afectar la claridad del español. También se armoniza la nota de referencia cruzada con esa misma elección.
