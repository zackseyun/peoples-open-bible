translation:
  text: |-
    1 There is, then, a soul that in its words turns away the good for the sake of evil, and leads the outcome of the matter into wickedness.
    
    2 There is a man who does not pity his own servants; and though this is double-faced, the whole of it is evil.
    
    3 And there is a man who loves one who acts wickedly, because he himself also chooses to die in evil on that man's account; and concerning this it is plain that he is double-faced, but the whole of it is an evil deed.
    
    4 Even if they are in love, they are in wickedness when they hide evil under a good name; but the end of the deed comes to evil.
    
    5 Another steals, acts unjustly, plunders, is greedy, and yet shows mercy to the poor. This too is double-faced, but the whole of it is evil.
    
    6 The one who defrauds his neighbor provokes God, swears falsely by the Most High, and has no regard for the Lord, the giver of the law, yet gives rest to the poor.
    
    7 He stains the soul and makes the body bright; he kills many and shows mercy to a few. This too is double-faced, but the whole of it is evil.
    
    8 Another commits adultery and practices sexual immorality, and abstains from foods. And while fasting he does evil, and by the force of his wealth he drags many down, and out of his excessive wickedness performs the commandments. This is double-faced, but the whole of it is evil.
    
    9 Such people are like hares, because they are half clean, but in truth they are unclean.
    
    10 For God also, in the tablets of the commandments, has declared it so.
