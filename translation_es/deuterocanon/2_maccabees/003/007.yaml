revisions:
- from: Pero Apolonio, al entrevistarse con el rey[a], le informó acerca del dinero que se le había denunciado. Entonces el rey nombró a Heliodoro, el encargado de los asuntos[b], y lo envió con órdenes de llevar a cabo la retirada[c] del dinero antes mencionado.
  to: Después de conferenciar con el rey[a], Apolonio le informó acerca del dinero que se le había reportado. Entonces el rey nombró a Heliodoro, el encargado de los asuntos del Estado[b], y lo envió con órdenes de llevar a cabo la retirada[c] del dinero antes mencionado.
  rationale: Se ajusta μηνυθέντων a «se le había reportado» para preservar el tono administrativo sin introducir una acusación que el griego no exige; se explicita «del Estado» para reflejar el título administrativo τὸν ἐπὶ τῶν πραγμάτων; y se suaviza el arranque con un conector narrativo más natural. Se mantiene «retirada» como opción válida, reforzada por la nota léxica.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:59:41Z'
