base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/030/018.yaml
  text: And in Tahpanhes the day will grow dark when I break there the bars of Egypt[a], and the pride of her strength will cease in her. A cloud will cover her[b], and her daughters will go into captivity.
  footnotes:
  - marker: a
    text: Or 'the yoke-bars of Egypt.' The Hebrew metaphor may refer to the supports of Egypt's power or dominion.
    reason: lexical_alternative
  - marker: b
    text: '''Her daughters'' is a common prophetic expression for a city''s dependent towns or surrounding settlements.'
    reason: cultural_note
