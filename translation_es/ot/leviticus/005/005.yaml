translation:
  language: es
  text: Y será[a] que, cuando sea culpable en uno de estos casos, confesará aquello en que ha pecado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «incurra en culpa» o «sea culpable». El verbo hebreo subraya culpa o responsabilidad legal, no solo conciencia interior de haber obrado mal.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «que pecó sobre/ respecto de ello», refiriéndose a uno de los casos recién enumerados.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And it shall be
  chosen_spanish: Y sucederá
  alternatives_spanish:
  - Y será
  - Y acontecerá
  lexicon: HALOT
  rationale: La fórmula introduce una transición legal y futura; «sucederá» conserva el tono formal sin sonar demasiado arcaico en español.
- source_word: כִּי
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - si
  - que
  lexicon: HALOT
  rationale: En este contexto legal, la circunstancia se presenta como eventual pero esperable; «cuando» refleja bien ese matiz, como en la auditoría inglesa.
- source_word: יֶאְשַׁם
  english_pob_choice: becomes guilty
  chosen_spanish: sea culpable
  alternatives_spanish:
  - incurra en culpa
  - quede bajo culpa
  - sea responsable
  lexicon: HALOT
  rationale: El verbo expresa quedar bajo culpa o responsabilidad legal. «Sea culpable» mantiene la fuerza jurídica y es natural en español, sin reducirlo a mera sensación interna.
- source_word: לְאַחַת מֵאֵלֶּה
  english_pob_choice: in one of these matters
  chosen_spanish: en una de estas cosas
  alternatives_spanish:
  - en uno de estos casos
  - por una de estas cosas
  - en una de estas
  lexicon: HALOT
  rationale: El antecedente son las situaciones legales precedentes. «Cosas» sigue de cerca la forma hebrea y es suficientemente claro; «casos» sería más explicativo, pero menos pegado al texto.
- source_word: וְהִתְוַדָּה
  english_pob_choice: he shall confess
  chosen_spanish: confesará
  alternatives_spanish:
  - entonces confesará
  - deberá confesar
  lexicon: HALOT
  rationale: El hitpael de ידה aquí significa confesar. El futuro simple conserva el carácter prescriptivo del mandato legal.
- source_word: אֲשֶׁר חָטָא
  english_pob_choice: that in which he has sinned
  chosen_spanish: aquello en que ha pecado
  alternatives_spanish:
  - lo que ha pecado
  - la falta que ha cometido
  - eso en lo que pecó
  lexicon: HALOT
  rationale: La cláusula relativa especifica el contenido de la confesión. «Aquello en que ha pecado» mantiene la relación sintáctica hebrea y evita introducir una paráfrasis interpretativa.
- source_word: עָלֶיהָ
  english_pob_choice: in regard to it
  chosen_spanish: en que
  alternatives_spanish:
  - respecto de ello
  - sobre lo cual
  - en relación con ello
  lexicon: HALOT
  rationale: El sufijo femenino remite a la falta/caso precedente. En español, la construcción «aquello en que ha pecado» reproduce con claridad la referencia sin forzar un equivalente preposicional literal.
theological_decisions:
- issue: Naturaleza de יֶאְשַׁם como culpa legal o conciencia interior
  english_pob_reading: The Hebrew verb emphasizes legal guilt/liability rather than merely an inward awareness of wrongdoing.
  chosen_spanish_reading: El verbo se refleja como culpa/responsabilidad legal, no solo como remordimiento interior.
  alternative_spanish_readings:
  - llega a sentir culpa
  - reconoce su culpa interior
  - se da cuenta de su error
  rationale: La redacción española evita psicologizar el verbo; «sea culpable» conserva la categoría legal, en línea con la nota de la POB inglesa.
  doctrine_reference: Levítico 5:5; uso legal de אשם
- issue: Relación del confesarse con el pecado específico
  english_pob_reading: that in which he has sinned
  chosen_spanish_reading: La confesión se dirige al acto o asunto específico en que pecó.
  alternative_spanish_readings:
  - confesará su pecado en general
  - confesará que pecó sin más detalle
  - confesará la falta cometida
  rationale: Se conserva la referencia concreta al caso particular previo, evitando generalizar la confesión de forma que pierda el vínculo con la ofensa descrita.
  doctrine_reference: Levítico 5:1-5; confesión específica del pecado
translation_notes:
  revision_awareness: 'La traducción sigue la revisión inglesa más reciente, que prefirió una clausula final más natural y fiel al hebreo: no se lee como «lo que ha pecado en relación con ello», sino como una estructura relativa que señala aquello en lo que pecó. Por eso se usó «aquello en que ha pecado», manteniendo la referencia al caso concreto sin introducir explicaciones ajenas al texto.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para el nombre divino cuando aparezca en contextos del Pentateuco; este verso no lo contiene.
  - «Culpable» se usa en sentido jurídico, coherente con el valor legal de אשם en la auditoría inglesa.
  - Se evitó «siervo» u otras soluciones no pertinentes; el versículo trata de confesión y culpa legal.
  - «Pecado/pecar» se conserva para חטא, siguiendo el campo semántico básico del hebreo.
