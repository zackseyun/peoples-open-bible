translation:
  text: And the eye of the Lord looked on him for good[c][b][a], and shook him out of the dust of filth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the eye of the Lord watched him with favor'; the Hebrew phrase combines divine sight with beneficial intent.
    reason: lexical_alternative
  - marker: b
    text: '''Dust of filth'' may also be understood as ''dust of stench'' or ''foul dust''; the Hebrew image is vivid but somewhat uncertain in nuance.'
    reason: alternative_reading
  - marker: c
    text: 'The Greek parallel for this verse differs sharply: ''The Lord plucked up the roots of nations and planted the humble in their place.'' The Hebrew and Greek appear to reflect substantially different textual forms.'
    reason: textual_variant
lexical_decisions:
- source_word: וְעֵין יי
  chosen: And the eye of the Lord
  alternatives:
  - And the LORD's eye
  - And the eye of YHWH
  lexicon: HALOT
  rationale: The Hebrew uses the singular 'eye' idiomatically for divine regard. Per doctrine, יהוה/יי is rendered 'the Lord' rather than transliterated. Retaining 'eye' preserves the concrete Hebrew expression rather than flattening it to simply 'the Lord saw'.
- source_word: צָפַתְהוּ
  chosen: looked on him
  alternatives:
  - watched him
  - kept him in view
  - looked out for him
  lexicon: HALOT
  rationale: The verb conveys looking/keeping watch. 'Looked on him' fits the immediate idiom with 'eye' and avoids overinterpreting the nuance as either mere observation or active protection alone.
- source_word: לְטוֹב
  chosen: for good
  alternatives:
  - favorably
  - for his good
  - with favor
  lexicon: HALOT
  rationale: The phrase likely expresses beneficial intent or favorable regard. 'For good' stays close to the Hebrew while remaining intelligible; 'for his good' would slightly expand beyond the explicit wording.
- source_word: וַיְנַעֲרֵהוּ
  chosen: shook him out
  alternatives:
  - roused him out
  - cast him out
  - lifted him out
  lexicon: HALOT
  rationale: From נער in the sense of shaking off/shaking out. 'Shook him out' preserves the vivid metaphor of forceful removal from a degraded condition. It is preferable to smoother but less literal options like 'raised him up'.
- source_word: מֵעֲפַר
  chosen: out of the dust
  alternatives:
  - from the dust
  lexicon: HALOT
  rationale: A straightforward rendering of the preposition plus noun. 'Out of the dust' works naturally with 'shook him out' and preserves the image of emergence from abasement.
- source_word: צַחֲנָה
  chosen: filth
  alternatives:
  - stench
  - foulness
  - dungheap
  lexicon: HALOT
  rationale: The noun denotes foulness/stench and by extension a filthy condition. 'Filth' communicates the degraded state in idiomatic English without forcing a more specific image than the Hebrew securely provides. Because the exact nuance may be 'stench' rather than material dirt, an alternative is preserved in a footnote.
