    rationale: El hebreo expresa internalizar seriamente, tomar muy a pecho o en serio. 'Poner atención' puede sonar más externo o momentáneo y debilita la repetición enfática del versículo.
  - severity: low
    issue: Falta objeto explícito en la repetición final
    rationale: En español, 'no ponen atención' queda más suelto que el hebreo idiomático y que el inglés auditado. Añadir 'a esto' o usar 'no lo toman en serio' mejora claridad y cohesión.
  - severity: low
    issue: Nota a pie a sobre la alternativa de יהוה צבאות no refleja la decisión inglesa auditada
    rationale: La nota actual en a trata שׁמע, mientras que la nota inglesa a documenta la alternativa tradicional para el título divino. No es obligatorio calcar la ubicación inglesa, pero conviene preservar las alternativas significativas del expediente. A la vez, la ambigüedad de שׁמע sí merece nota en español. Se puede conservar ambas mediante marcadores distintos.
