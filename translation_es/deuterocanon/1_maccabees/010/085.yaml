translation:
  language: es
  text: Y los que cayeron a espada, junto con los que fueron quemados, fueron ocho mil hombres.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐγένοντο
  english_pob_choice: were
  chosen_spanish: fueron
  alternatives_spanish:
  - llegaron a ser
  - resultaron ser
  - sumaron
  lexicon: LSJ
  rationale: En una cifra total, γίνομαι puede expresar el resultado numérico. En español, «fueron» comunica con naturalidad el total alcanzado sin añadir matices ajenos al griego.
- source_word: οἱ πεπτωκότες
  english_pob_choice: those who fell
  chosen_spanish: los que cayeron
  alternatives_spanish:
  - los caídos
  - los que habían caído
  lexicon: LSJ
  rationale: El participio perfecto sustantivado señala a los muertos o bajas del combate. «Los que cayeron» conserva el sentido narrativo y evita una formulación demasiado abstracta.
- source_word: μαχαίρᾳ
  english_pob_choice: by the sword
  chosen_spanish: a espada
  alternatives_spanish:
  - por la espada
  - con la espada
  - en batalla
  lexicon: LSJ
  rationale: El dativo es instrumental. En español, «a espada» es una expresión natural y fiel para muerte en combate; «por la espada» también sería posible, pero suena menos directo aquí.
- source_word: σὺν
  english_pob_choice: together with
  chosen_spanish: junto con
  alternatives_spanish:
  - con
  - además de
  - así como
  lexicon: LSJ
  rationale: Indica suma de dos grupos en el total. «Junto con» reproduce claramente la combinación sin forzar un matiz de simple acompañamiento.
- source_word: τοῖς ἐμπυρισθεῖσιν
  english_pob_choice: those who were burned
  chosen_spanish: los que fueron quemados
  alternatives_spanish:
  - los quemados
  - los que ardieron
  - los que fueron consumidos por el fuego
  lexicon: LSJ
  rationale: El participio pasivo aoristo denota personas que sufrieron quemadura en el conflicto. «Los que fueron quemados» es directo y no especifica más de lo que el griego permite.
- source_word: εἰς ἄνδρας ὀκτακισχιλίους
  english_pob_choice: eight thousand men
  chosen_spanish: ocho mil hombres
  alternatives_spanish:
  - hasta ocho mil hombres
  - como ocho mil hombres
  - ocho mil varones
  lexicon: LSJ
  rationale: La construcción expresa el total alcanzado; en español, el resultado numérico se comunica de forma natural con «ocho mil hombres». Se mantiene «hombres» porque ἄνδρας es masculino explícito.
