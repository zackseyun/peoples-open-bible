translation:
  language: es
  text: ¿Puedes alzar tu voz a las nubes[a], para que una abundancia de agua[b] te cubra?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a la nube» o «a la nube espesa». El sustantivo hebreo puede ser singular y destacar una nube de lluvia densa.
    reason: lexical_alternative
  - marker: b
    text: O «y un torrente de aguas te cubra». La expresión hebrea puede sugerir abundancia desbordante.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲתָרִים
  english_pob_choice: Can you raise
  chosen_spanish: ¿Puedes alzar
  alternatives_spanish:
  - ¿Puedes levantar
  - ¿Puedes elevar
  lexicon: HALOT
  rationale: 'El hiphil interrogativo de רוּם plantea capacidad: “can you raise”. En español, “alzar” conserva bien la idea de elevar una voz y suena natural en una pregunta retórica de desafío divino.'
- source_word: לָעָב
  english_pob_choice: to the clouds
  chosen_spanish: hasta la nube
  alternatives_spanish:
  - hasta las nubes
  - hasta la nube espesa
  - hasta la nube densa
  lexicon: HALOT
  rationale: El hebreo puede ser singular y sugerir una nube gruesa o de lluvia. Conservar el singular (“la nube”) refleja mejor esa ambigüedad documentada que un plural automático; la preposición “hasta” expresa el movimiento direccional implícito.
- source_word: קוֹלֶךָ
  english_pob_choice: your voice
  chosen_spanish: tu voz
  alternatives_spanish:
  - tu sonido
  lexicon: HALOT
  rationale: קוֹל normalmente significa “voz” en un contexto de hablar o clamar. “Tu voz” es la correspondencia más directa y clara en español.
- source_word: וְשִׁפְעַת מַיִם
  english_pob_choice: so that an abundance of water
  chosen_spanish: para que una abundancia de aguas
  alternatives_spanish:
  - y una inundación de aguas
  - y un torrente de aguas
  - y mucha agua
  lexicon: HALOT
  rationale: שִׁפְעָה expresa abundancia, plenitud u overflow. “Una abundancia de aguas” preserva la fuerza cuantitativa sin imponer por sí sola la idea de desastre que tendría “inundación”.
- source_word: תְּכַסֶּךָּ
  english_pob_choice: covers you
  chosen_spanish: te cubra
  alternatives_spanish:
  - te cubre
  - te cubriera
  - te envuelva
  lexicon: HALOT
  rationale: El piel de כסה es “cubrir”. En español, el subjuntivo en la cláusula final (“para que… te cubra”) comunica bien el resultado pretendido o hipotético que el inglés POB expresa con “so that”.
theological_decisions:
- issue: Relación entre las dos cláusulas
  english_pob_reading: 'The second clause expresses the result of the first: raising one’s voice to the clouds so that abundant water would cover the speaker.'
  chosen_spanish_reading: 'La segunda cláusula expresa el resultado de la primera: alzar la voz a la nube para que una abundancia de aguas cubra al hablante.'
  alternative_spanish_readings:
  - ¿Puedes alzar tu voz hasta la nube, y una abundancia de aguas te cubre?
  - ¿Puedes alzar tu voz hasta la nube, y una abundancia de aguas te cubrirá?
  rationale: La lectura principal mantiene la relación de resultado implícita en el hebreo y marcada explícitamente en el audit trail inglés. El subjuntivo final en español conserva mejor esa dependencia que una coordinación simple.
  doctrine_reference: Job 38:34; retórica de interrogación divina sobre la impotencia humana ante el dominio de Yahvé sobre el clima.
translation_notes:
  revision_awareness: La versión más reciente del POB inglés no requirió cambios y fue aprobada con alto acuerdo; esta redacción española sigue de cerca sus decisiones léxicas y su lectura de resultado, pero conserva en español la ambigüedad documentada de לָעָב mediante el singular “la nube”.
  spanish_consistency_notes:
  - Se usa “Yahvé” en lugar de “SEÑOR” por norma del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - “Aguas” mantiene el plural colectivo del hebreo מַיִם y su tono poético.
  - El subjuntivo “te cubra” conserva la relación hipotética/resultativa del hebreo y del audit trail inglés.
