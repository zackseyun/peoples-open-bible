translation:
  language: es
  text: Los malvados huyen cuando nadie los persigue[a], pero los justos están seguros como un león joven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Los malvados huyen aunque nadie los persigue ... pero los justos son audaces como un león». El hebreo permite matices algo distintos en ambas cláusulas; «león joven» refleja el sentido más específico de כְּפִיר.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נָסוּ
  english_pob_choice: flee
  chosen_spanish: huyen
  alternatives_spanish:
  - escapan
  - huyen de
  lexicon: HALOT
  rationale: El verbo hebreo expresa huida; en español, «huyen» conserva el valor proverbial y el movimiento de escape con naturalidad, sin añadir matices que el texto no exige.
- source_word: וְאֵין רֹדֵף
  english_pob_choice: when no one is pursuing
  chosen_spanish: cuando nadie los persigue
  alternatives_spanish:
  - aunque nadie los persigue
  - sin que haya quien los persiga
  lexicon: HALOT
  rationale: La construcción negativa con participio expresa ausencia de perseguidor. «Cuando nadie los persigue» conserva el sentido circunstancial y suena fluido en español; la alternativa concesiva queda registrada en la nota.
- source_word: רָשָׁע
  english_pob_choice: the wicked
  chosen_spanish: los malvados
  alternatives_spanish:
  - el malvado
  - los impíos
  lexicon: HALOT
  rationale: Aunque el hebreo está en singular, funciona como tipo moral general. «Los malvados» transmite la clase colectiva en español de modo idiomático; «impíos» es posible, pero suele cargar un registro más religioso que el término hebreo por sí mismo.
- source_word: וְצַדִּיקִים
  english_pob_choice: but the righteous
  chosen_spanish: pero los justos
  alternatives_spanish:
  - pero los rectos
  - pero los justificados
  lexicon: HALOT
  rationale: El plural sustantivado se vierte naturalmente como una clase moral. «Justos» conserva la contraposición con «malvados» y mantiene el alcance proverbial.
- source_word: כִּכְפִיר
  english_pob_choice: like a young lion
  chosen_spanish: como un león joven
  alternatives_spanish:
  - como un cachorro de león
  - como un león
  lexicon: HALOT
  rationale: כְּפִיר designa específicamente un león joven. «León joven» preserva la distinción léxica sin sonar infantil; «cachorro de león» es más explícito, pero menos sobrio para este dicho sapiencial.
- source_word: יִבְטָח
  english_pob_choice: are confident
  chosen_spanish: tienen confianza
  alternatives_spanish:
  - confían
  - están seguros
  - son valientes
  lexicon: HALOT
  rationale: El verbo puede implicar confiar, estar seguro o mostrar intrepidez. En el símil, «tienen confianza» comunica bien la serenidad valiente de los justos y evita reducir el matiz a una sola noción psicológica o volitiva.
theological_decisions:
- issue: Valor proverbial de clases morales generales
  english_pob_reading: Render רָשָׁע and צַדִּיקִים as class terms ('the wicked' / 'the righteous') rather than individuated gendered expressions.
  chosen_spanish_reading: 'Traducir con clases morales generales: «los malvados» / «los justos».'
  alternative_spanish_readings:
  - el malvado ... los justos
  - la gente malvada ... la gente justa
  rationale: El proverbio contrapone tipos morales, no individuos concretos. El plural español mantiene la generalidad y evita una lectura restringida al género masculino o a una sola persona.
  doctrine_reference: DOCTRINE.md §Translation philosophy, item 4
- issue: Tensión léxica entre confianza, seguridad y audacia en יִבְטָח
  english_pob_reading: '''are confident'' / alternative note ''are bold like a lion.'''
  chosen_spanish_reading: «tienen confianza como un león joven».
  alternative_spanish_readings:
  - «son valientes como un león joven»
  - «están seguros como un león joven»
  rationale: El hebreo admite tanto seguridad como audacia. «Tienen confianza» conserva el núcleo semántico sin desplazarlo hacia una audacia más interpretativa; la nota preserva la alternativa «valientes» para no ocultar la tensión.
  doctrine_reference: HALOT; Proverbs 28:1 source note
translation_notes:
  revision_awareness: Texto revisado con acuerdo alto y sin cambios necesarios en el pase más reciente; la formulación española se alinea con la lectura inglesa auditada y con el hebreo, manteniendo abiertas las alternativas léxicas señaladas por la fuente.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se mantiene el contraste moral general con sustantivos plurales idiomáticos en español.
  - «León joven» conserva el valor específico de כְּפִיר sin forzar un regionalismo ni una paráfrasis.
  - No se introduce «Cristo», «Mesías» ni terminología teológica ajena al verso.
