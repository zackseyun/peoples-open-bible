- issue: Prophetic sexual metaphor for Jerusalem's covenant infidelity
  chosen_reading: Retain explicit prostitution imagery in the main text
  alternative_readings:
  - Use softened covenantal language such as 'were unfaithful'
  rationale: The Hebrew deliberately uses sexualized language to portray idolatry and political infidelity. Following optimal equivalence and original-language primacy, the translation preserves the metaphor rather than resolving it into abstract theological language.
