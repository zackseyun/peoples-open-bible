    rationale: La nota trata sobre la ambigüedad de וְנִבְרֲכוּ («serán bendecidas / se bendecirán a sí mismas»), no sobre «como el polvo de la tierra». El marcador debe aparecer junto a la cláusula de bendición para que el lector relacione correctamente la variante con el texto relevante.
  revised_spanish_text: Y tu descendencia será como el polvo de la tierra, y te extenderás hacia el oeste y hacia el este, hacia el norte y hacia el sur; y en ti y en tu descendencia serán bendecidas[a] todas las familias de la tierra.
