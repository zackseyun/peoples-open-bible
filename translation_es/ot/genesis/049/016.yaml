translation:
  language: es
  text: Dan juzgará a su pueblo como una de las tribus de Israel[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘Dan vindicará a su pueblo’; el verbo hebreo puede incluir el sentido de defender o asegurar justicia, no solo pronunciar juicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: דָּן
  english_pob_choice: Dan
  chosen_spanish: Dan
  alternatives_spanish:
  - Dan
  lexicon: HALOT
  rationale: Nombre propio de la tribu/persona; se conserva transliterado para mantener la referencia tribal y el posible juego de palabras con el verbo siguiente.
- source_word: יָדִין
  english_pob_choice: will judge
  chosen_spanish: juzgará
  alternatives_spanish:
  - vindicará
  - hará justicia
  lexicon: HALOT
  rationale: El verbo דין admite ‘juzgar’ y también matices de vindicar o administrar justicia. ‘Juzgará’ conserva el vínculo léxico con Dan y funciona naturalmente en español; las alternativas se preservan en la nota.
- source_word: עַמּוֹ
  english_pob_choice: his people
  chosen_spanish: a su pueblo
  alternatives_spanish:
  - a su propio pueblo
  - a su gente
  lexicon: HALOT
  rationale: La forma con sufijo de tercera persona singular se entiende de manera directa como ‘su pueblo’. En español, el complemento con ‘a’ expresa bien el objeto del verbo ‘juzgar’.
- source_word: כְּאַחַד
  english_pob_choice: as one
  chosen_spanish: como una
  alternatives_spanish:
  - como uno
  - como uno de
  lexicon: HALOT
  rationale: El comparativo כְּ + אחד señala comparación e inclusión dentro de un conjunto. ‘Como una de’ comunica con claridad que Dan está contado entre las tribus de Israel.
- source_word: שִׁבְטֵי
  english_pob_choice: of the tribes of
  chosen_spanish: de las tribus de
  alternatives_spanish:
  - tribus de
  lexicon: HALOT
  rationale: En este contexto שבטֵי significa ‘tribus’, no ‘cetros’. La construcción posesiva se ajusta naturalmente al español con ‘de las tribus de’.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - Israel
  lexicon: HALOT
  rationale: Nombre propio del pueblo del pacto; se mantiene la forma estándar en español.
theological_decisions:
- issue: Alcance del verbo דין en la bendición de Jacob
  english_pob_reading: Dan is portrayed as exercising judgment/governance as a full member among Israel's tribes.
  chosen_spanish_reading: Dan aparece como ejerciendo juicio dentro del pueblo, y al mismo tiempo contado plenamente entre las tribus de Israel.
  alternative_spanish_readings:
  - Dan vindicará a su pueblo
  - Dan defenderá o hará justicia a su pueblo
  rationale: El hebreo permite tanto ‘juzgar’ como defender o vindicar. El contexto inmediato de la comparación con las tribus favorece una lectura de función tribal plena; por eso se mantiene ‘juzgará’ en el texto principal y se registra la amplitud semántica en la nota.
  doctrine_reference: Génesis 49:16; uso léxico de דין en hebreo bíblico
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se requirieron cambios respecto al texto base auditado. La redacción española conserva la ambigüedad léxica documentada en דין mediante una nota alternativa.'
  spanish_consistency_notes:
  - Se usa ‘juzgará’ para mantener el vínculo sonoro y semántico con ‘Dan’.
  - ‘Como una de las tribus de Israel’ evita interpretar de más el comparativo y refleja la pertenencia tribal.
  - No se emplea ‘SEÑOR’ ni terminología confesional ajena al verso.
