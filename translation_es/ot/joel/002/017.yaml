base_translation:
  language: en
  yaml_path: translation/ot/joel/002/017.yaml
  text: Let the priests[a], the ministers of Yahweh, weep between the portico and the altar, and let them say, “Spare your people, Yahweh, and do not make your inheritance a reproach, a byword among the nations. Why should they say among the peoples[b], ‘Where is their God?’”
  footnotes:
