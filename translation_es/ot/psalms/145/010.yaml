translation:
  language: es
  text: Todas tus obras te darán gracias, oh Yahvé[a], y tus fieles[b] te bendecirán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ‘YHWH’; tradicionalmente se traduce ‘el SEÑOR’.'
    reason: alternative_reading
  - marker: b
    text: O ‘tus santos’ o ‘tus piadosos’. El término hebreo se refiere a quienes están marcados por la lealtad y devoción al pacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: יוֹדוּךָ
  english_pob_choice: will give thanks to you
  chosen_spanish: te darán gracias
  alternatives_spanish:
  - te alabarán
  - te agradecerán
  lexicon: HALOT
  rationale: El verbo hifil de ידה puede expresar ‘dar gracias’ o ‘alabar’. En español, ‘te darán gracias’ conserva el valor directo del agradecimiento y mantiene el paralelismo con ‘te bendecirán’ sin volver la línea redundante.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se vierte el Tetragrámaton como ‘Yahvé’ para preservar el nombre personal del pacto, de acuerdo con la convención POB en español y sin sustituirlo por un título.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: Todas
  alternatives_spanish:
  - Todos
  - Cada una de
  lexicon: HALOT
  rationale: ‘Todas’ concuerda con ‘obras’ y conserva la amplitud colectiva de כָּל en este hemistiquio poético.
- source_word: מַעֲשֶׂיךָ
  english_pob_choice: your works
  chosen_spanish: tus obras
  alternatives_spanish:
  - tus hechos
  - todo lo que has hecho
  lexicon: HALOT
  rationale: ‘Obras’ es la equivalencia más directa y natural en español para מַעֲשִׂים/מַעֲשֶׂיךָ en este contexto de creación y acción divina.
- source_word: וַחֲסִידֶיךָ
  english_pob_choice: your faithful ones
  chosen_spanish: tus fieles
  alternatives_spanish:
  - tus santos
  - tus piadosos
  - tus leales
  lexicon: HALOT
  rationale: חֲסִידִים designa a los leales al pacto, con matiz de piedad y fidelidad. ‘Fieles’ reproduce bien ese campo semántico en español sin importar el peso eclesiástico de ‘santos’.
- source_word: יְבָרֲכוּךָ
  english_pob_choice: will bless you
  chosen_spanish: te bendecirán
  alternatives_spanish:
  - te alabarán
  - te pronunciarán bendición
  lexicon: HALOT
  rationale: El piel de ברך aquí se traduce naturalmente como ‘bendecir’. En español, ‘te bendecirán’ mantiene el futuro poético y el paralelismo verbal con la primera cola.
theological_decisions:
- issue: Rendering of the divine name יהוה
  english_pob_reading: O Yahweh
  chosen_spanish_reading: oh Yahvé
  alternative_spanish_readings:
  - Yahvé
  - SEÑOR
  rationale: La línea invoca directamente el nombre del pacto. Se evita la sustitución por un título y se conserva la forma auditiva reverente ‘oh Yahvé’ en vocativo poético.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Meaning of חֲסִידֶיךָ
  english_pob_reading: your faithful ones
  chosen_spanish_reading: tus fieles
  alternative_spanish_readings:
  - tus santos
  - tus fieles del pacto
  - tus piadosos
  rationale: La POB inglesa privilegia la lealtad de pacto sin cargar el texto con un término eclesiástico fijo. ‘Fieles’ conserva esa tensión semántica entre piedad y lealtad.
  doctrine_reference: DOCTRINE.md Translation philosophy §6
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; el borrador español sigue la lectura estable con alta concordancia con el texto fuente y el audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como forma principal para יהוה, coherente con la política del proyecto.
  - ‘Fieles’ se usa como equivalente natural de חֲסִידִים, evitando ‘santos’ en el cuerpo principal para no introducir una carga denominacional no exigida por el hebreo.
  - 'El paralelismo verbal se conserva con dos futuros: ‘darán gracias’ / ‘bendecirán’.'
