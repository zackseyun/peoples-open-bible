translation:
  language: es
  text: Como unos engastes de oro y un sello de berilo[b][a], así es el sonido de un salmo con la dulzura del vino nuevo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo griego suministrado para este versículo dice: «No aparezcas ante el Señor vacío», lo que refleja otra tradición o numeración del texto. La traducción principal sigue el testimonio hebreo conservado.'
    reason: textual_variant
  - marker: b
    text: O «de esmeralda». La identificación de ברקת es incierta; «berilo» es una elección académica común.
    reason: lexical_alternative
lexical_decisions:
- source_word: מלואות פז
  english_pob_choice: settings of gold
  chosen_spanish: engastes de oro
  alternatives_spanish:
  - rellenos de oro
  - incrustaciones de oro
  - monturas de oro
  lexicon: HALOT
  rationale: La imagen es poética y el sustantivo es elíptico. En español, "engastes" comunica con naturalidad la idea de una pieza preciosa montada o sujeta en metal noble, sin volver la frase demasiado técnica o opaca.
- source_word: חותם ברקת
  english_pob_choice: a seal of beryl
  chosen_spanish: sello de berilo
  alternatives_spanish:
  - sello de esmeralda
  - anillo-sello de berilo
  - sello de esmeralda
  lexicon: HALOT
  rationale: חותם puede ser "sello" o "sello-anillo"; el hebreo no exige especificar anillo. ברקת admite diversas identificaciones. "Berilo" preserva la cautela lexicográfica del texto base y de la nota inglesa.
- source_word: קול מזמור
  english_pob_choice: the sound of a psalm
  chosen_spanish: el sonido de un salmo
  alternatives_spanish:
  - la voz de un canto
  - el sonido de la música
  - el sonido de un himno
  lexicon: HALOT
  rationale: '"קול" es "sonido/voz" y "מזמור" es un salmo o canto salmódico. "Salmo" mantiene el matiz litúrgico-poético mejor que una generalización como "música".'
- source_word: על נועם תירוש
  english_pob_choice: with the sweetness of new wine
  chosen_spanish: con la dulzura del vino nuevo
  alternatives_spanish:
  - sobre la suavidad del vino nuevo
  - junto con el agradable vino nuevo
  - al son de dulce vino nuevo
  lexicon: HALOT
  rationale: '"נועם" expresa agradabilidad o dulzura, y "תירוש" es vino nuevo. Traducir "con" da una relación idiomática de acompañamiento acorde con la imagen comparativa sin forzar el valor de la preposición.'
theological_decisions:
- issue: Divergencia entre el hebreo conservado y el paralelo griego
  english_pob_reading: The main translation follows the extant Hebrew witness; the Greek parallel reads, 'Do not appear before the Lord empty,' indicating a different verse tradition or numbering.
  chosen_spanish_reading: El texto principal sigue el hebreo conservado; se preserva en nota la tradición griega divergente.
  alternative_spanish_readings:
  - «No te presentes ante el Señor vacío»
  - «No aparezcas ante Yahvé vacío»
  rationale: La política del proyecto para Sirácides es traducir desde el hebreo donde se conserva, usando el griego como control de consistencia y para documentar variantes. Aquí el griego no equivale semánticamente a la línea hebrea, así que no gobierna el texto principal. La divergencia se conserva explícitamente para transparencia textual.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo cuando existe; preservar honestamente la incertidumbre y las variantes de fuente.'
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas; la lectura actual coincide con el último pase de revisión y con el resumen de control cruzado de alta concordancia.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma preferente del nombre divino cuando aparezca; en este versículo el hebreo conservado no lo menciona, pero la nota reproduce fielmente la redacción inglesa que sí usa «Lord».
  - Se conserva el paralelismo poético hebreo sin sobreexplicar la imagen.
  - Se evita "SEÑOR" como sustitución del nombre divino en el texto principal porque aquí la base principal es el hebreo poético, no la paráfrasis del paralelo griego.
