  text: וְ/שָׁ֨מַעְתָּ֜ אֶל תְּחִנַּ֤ת עַבְדְּ/ךָ֙ וְ/עַמְּ/ךָ֣ יִשְׂרָאֵ֔ל אֲשֶׁ֥ר יִֽתְפַּֽלְל֖וּ אֶל הַ/מָּק֣וֹם הַ/זֶּ֑ה וְ֠/אַתָּה תִּשְׁמַ֞ע אֶל מְק֤וֹם שִׁבְתְּ/ךָ֙ אֶל הַ/שָּׁמַ֔יִם וְ/שָׁמַעְתָּ֖ וְ/סָלָֽחְתָּ־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/1_kings/008/030.yaml
  text: And hear the plea of your servant and of your people Israel when they pray toward this place[a]. And hear in heaven, the place of your dwelling[b]; hear and forgive.
  footnotes:
