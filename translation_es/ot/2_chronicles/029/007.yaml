review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca la secuencia y el sentido del hebreo: cerraron las puertas del אוּלָם, apagaron las lámparas, no quemaron incienso, y no ofrecieron עֹלָה en el espacio sagrado al Dios de Israel. Sin embargo, hay dos desajustes importantes respecto al número y a la preposición final: עֹלָה aquí funciona colectivamente/plural en el contexto de ofrendas, y el inglés auditado lo refleja con ''burnt offerings''; en español, ''holocausto'' singular suena más estrecho. Además, לֵאלֹהֵי יִשְׂרָאֵל se expresa mejor como ''al Dios de Israel'' que ''para el Dios de Israel'' en español bíblico natural.'
  spanish_quality_summary: El texto es claro y legible, con buen registro eclesial moderno. 'Vestíbulo', 'apagaron las lámparas' y 'no quemaron incienso' funcionan bien. La principal mejora de calidad es reemplazar 'ni ofrecieron holocausto' por una forma plural más natural y fiel, y ajustar 'para el Dios de Israel' a 'al Dios de Israel', que suena más idiomático y cultualmente adecuado en español.
  glossary_alignment: No hay conflicto con las directrices principales del glosario. 'Dios' y la terminología cultual se preservan bien. La decisión de usar 'holocaustos' sigue siendo compatible con la rationale teológica documentada para עֹלָה y evita estrechar el referente. No se requiere nota nueva.
  issues:
  - severity: medium
    issue: '''holocausto'' está en singular'
    rationale: וְעֹלָה לֹא הֶעֱלוּ en este contexto cultual se entiende mejor de forma colectiva/plural, y el English POB auditado lo vierte como 'burnt offerings'. En español, 'ni ofrecieron holocausto' puede sonar como una sola ofrenda o como categoría abstracta; 'ni ofrecieron holocaustos' preserva mejor la fuerza del original y del audit trail.
  - severity: medium
    issue: '''para el Dios de Israel'' es menos natural que ''al Dios de Israel'''
    rationale: Aunque el lamed puede indicar dedicación, en español bíblico y culto la orientación de la ofrenda se expresa más naturalmente con 'al Dios de Israel'. 'Para' no es incorrecto semánticamente, pero suena menos idiomático y menos directo.
  - severity: low
    issue: 'Nota al pie a: ''atrio de entrada'' no refleja bien אוּלָם'
    rationale: El inglés auditado habla de 'entry hall', no de 'courtyard'. 'Atrio' en español puede sugerir un patio o área abierta, lo que desplaza el sentido arquitectónico del vestíbulo/entrada techada. Conviene usar 'sala de entrada' o 'entrada'.
  revised_spanish_text: También cerraron las puertas del vestíbulo[a], apagaron las lámparas, no quemaron incienso[b] ni ofrecieron holocaustos en el santuario al Dios de Israel.
