id: LEV.13.19
reference: Leviticus 13:19
source:
  edition: WLC
  text: וְ/הָיָ֞ה בִּ/מְק֤וֹם הַ/שְּׁחִין֙ שְׂאֵ֣ת לְבָנָ֔ה א֥וֹ בַהֶ֖רֶת לְבָנָ֣ה אֲדַמְדָּ֑מֶת וְ/נִרְאָ֖ה אֶל הַ/כֹּהֵֽן־׃
translation:
  text: and in the place of the boil there develops a white swelling or a reddish-white bright spot[a], then it shall be shown to the priest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and it shall appear to the priest.' The Hebrew can be rendered more literally as 'be seen,' but here it likely refers to being presented for priestly examination.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: there develops
  alternatives:
  - and it is
  - and it becomes
  - and there is
  lexicon: HALOT
  rationale: In this diagnostic law, היה introduces the arising of a condition at the site of the prior boil. 'There develops' conveys emergence in natural English better than a bare 'and it is,' while staying close to the Hebrew sense.
- source_word: בִּמְקוֹם
  chosen: in the place of
  alternatives:
  - at the site of
  - in the spot of
  lexicon: HALOT
  rationale: A straightforward locative rendering. 'In the place of' is formally close and idiomatic in English in this medical-ritual context.
- source_word: הַשְּׁחִין
  chosen: the boil
  alternatives:
  - the inflammation
  - the ulcer
  lexicon: HALOT
  rationale: שְׁחִין refers to a boil or inflamed sore. 'Boil' is the most natural and established English equivalent in this context.
- source_word: שְׂאֵת
  chosen: swelling
  alternatives:
  - raised swelling
  - elevation
  - swelling up
  lexicon: HALOT
  rationale: In Leviticus 13 this term denotes a raised lesion or swelling on the skin. 'Swelling' is clear, medically plausible, and consistent with the chapter's diagnostic terminology.
- source_word: לְבָנָה
  chosen: white
  alternatives:
  - whitish
  lexicon: HALOT
  rationale: The adjective simply denotes whiteness. 'White' is the plainest rendering.
- source_word: בַהֶרֶת
  chosen: bright spot
  alternatives:
  - shining spot
  - bright patch
  - spot
  lexicon: HALOT
  rationale: In Leviticus 13 this term refers to a bright or conspicuous skin patch. 'Bright spot' preserves the lexical distinction from שְׂאֵת and matches the diagnostic setting.
- source_word: אֲדַמְדָּמֶת
  chosen: reddish-white
  alternatives:
  - white and reddish
  - reddish
  lexicon: HALOT
  rationale: The adjective means reddish. Because it modifies 'bright spot' already described as white, 'reddish-white' captures the combined description naturally in English.
- source_word: וְנִרְאָה
  chosen: then it shall be shown
  alternatives:
  - and it shall be seen
  - and he shall appear
  - and it is presented
  lexicon: HALOT
  rationale: Niphal of ראה can be passive/reflexive ('be seen/appear'), but in this legal context the sense is that the affected case is presented for priestly inspection. 'It shall be shown' communicates the procedural force clearly.
- source_word: אֶל הַכֹּהֵן
  chosen: to the priest
  alternatives:
  - before the priest
  lexicon: HALOT
  rationale: Standard rendering of the prepositional phrase indicating presentation to the priest for examination.
