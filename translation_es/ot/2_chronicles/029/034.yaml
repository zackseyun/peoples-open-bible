    issue: «eran pocos» debilita la insuficiencia implícita en לִמְעָט
    rationale: El hebreo, con היה + לִמְעָט, no solo describe cantidad pequeña sino cantidad insuficiente para la tarea. «Eran demasiado pocos» preserva mejor la fuerza causal del pasaje.
  - severity: high
