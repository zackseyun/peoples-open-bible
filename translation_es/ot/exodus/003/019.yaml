    issue: «sino por una mano fuerte» suena poco natural en español contemporáneo
    rationale: Aunque es defendible como calco cercano, en este contexto «excepto por una mano fuerte» comunica mejor la cláusula elíptica sin perder la imagen fuente ni la ambigüedad documentada.
  - severity: low
