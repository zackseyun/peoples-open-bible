revisions:
- from: Si tus desterrados[a] estuvieren al fin de los cielos[b], de allí Yahvé tu Dios te reunirá[c], y de allí te tomará.
  to: Si tus desterrados[a] están al fin de los cielos[b], de allí Yahvé tu Dios te reunirá, y de allí te tomará[c].
  rationale: Se actualiza «estuvieren» a «están» para ajustarse al español moderno y al valor idiomático reconocido por el English POB; se mantiene «desterrados», «al fin de los cielos», «Yahvé», la repetición de «de allí» y «te tomará» por fidelidad léxica. La nota c se corrige a «te traerá» para reflejar con precisión la alternativa documentada sin alterar el texto principal.
