translation:
  language: es
  text: Hay engaño en el corazón de los que maquinan el mal, pero la alegría pertenece a los que aconsejan la paz[b][a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "pero para los que aconsejan la paz, hay alegría".'
    reason: lexical_alternative
  - marker: b
    text: '"Paz" traduce שָׁלוֹם; el término también puede abarcar bienestar, plenitud o integridad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִרְמָה
  english_pob_choice: Deceit
  chosen_spanish: Engaño
  alternatives_spanish:
  - decepción
  - fraude
  - deceit
  lexicon: HALOT
  rationale: El sustantivo expresa engaño o fraude moral. "Engaño" es natural en español y conserva la idea de intención engañosa sin volver demasiado técnico el verso.
- source_word: בְּלֶב
  english_pob_choice: is in the heart of
  chosen_spanish: hay en el corazón de
  alternatives_spanish:
  - está en el corazón de
  - está en la mente de
  - está en el interior de
  lexicon: HALOT
  rationale: La construcción hebrea sitúa el engaño dentro del centro interno de la persona. "Hay en el corazón de" reproduce con naturalidad el valor locativo y mantiene "corazón" como sede de intención.
- source_word: חֹרְשֵׁי רָע
  english_pob_choice: those who devise evil
  chosen_spanish: los que maquinan el mal
  alternatives_spanish:
  - los que traman el mal
  - los que planean el mal
  - los que hacen el mal
  lexicon: HALOT
  rationale: El participio de חרשׁ aquí implica idear/tejer planes dañinos. "Maquinar" conserva la noción deliberada y suele sonar más fuerte que el simple "hacer".
- source_word: וּלְיֹעֲצֵי שָׁלוֹם
  english_pob_choice: but joy belongs to those who counsel peace
  chosen_spanish: pero la alegría pertenece a los que aconsejan paz
  alternatives_spanish:
  - pero hay alegría para los que aconsejan paz
  - pero la alegría es para los que aconsejan paz
  - pero a los que aconsejan paz les toca alegría
  lexicon: HALOT
  rationale: La lamed contrastiva se expresa bien con "pertenece a" en español, manteniendo el paralelismo del hebreo y la relación entre el grupo y la alegría.
- source_word: שָׁלוֹם
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - bienestar
  - plenitud
  - shalom
  lexicon: HALOT
  rationale: '"Paz" es la equivalencia más idiomática y fiel en el texto principal. Otras opciones captan el campo semántico amplio de shalom, pero no son necesarias en la línea principal.'
- source_word: שִׂמְחָה
  english_pob_choice: joy belongs to
  chosen_spanish: la alegría pertenece a
  alternatives_spanish:
  - hay alegría para
  - gozo pertenece a
  - la dicha pertenece a
  lexicon: HALOT
  rationale: El hebreo presenta una cláusula nominal; en español, "la alegría pertenece a" preserva ese valor de pertenencia y la antítesis con el primer colon. "Alegría" es preferible a "gozo" por registro y fluidez aquí.
translation_notes:
  revision_awareness: Se mantuvo el paralelismo del hebreo con una cláusula nominal en ambos hemistiquios, evitando sobreexplicar la imagen y conservando la tensión entre la interioridad del mal y el consejo orientado a shalom.
  spanish_consistency_notes:
  - Se usó "corazón" como sede de intención, en línea con el hebreo y con el español bíblico comprensible.
  - '"Paz" se dejó como término principal para שָׁלוֹם, con nota sobre su alcance semántico.'
  - La primera mitad conserva el matiz deliberado de חֹרְשֵׁי con "maquinar"; no se suavizó a un mero comportamiento general.
