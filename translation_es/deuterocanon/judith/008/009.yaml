translation:
  language: es
  text: Y oyó las malas palabras del pueblo contra el gobernante, porque habían perdido el ánimo a causa de la escasez de agua; y oyó todas las palabras que Ozías les había dicho, que les había jurado entregar[a] la ciudad a los asirios después de cinco días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rendir la ciudad a los asirios». El griego dice literalmente «entregar la ciudad».
    reason: lexical_alternative
lexical_decisions:
- source_word: ῥήματα
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - dichos
  - lo que decían
  - expresiones
  lexicon: BDAG
  rationale: «Palabras» conserva el carácter concreto de lo dicho y sigue de cerca el sustantivo griego sin volverlo demasiado abstracto.
- source_word: τὰ πονηρά
  english_pob_choice: evil
  chosen_spanish: malas
  alternatives_spanish:
  - malvadas
  - perversas
  - impías
  lexicon: BDAG
  rationale: En español, «malas» mantiene el juicio negativo del griego con naturalidad; «malvadas» o «perversas» serían más intensas de lo que el contexto exige.
- source_word: ἄρχοντα
  english_pob_choice: ruler
  chosen_spanish: gobernante
  alternatives_spanish:
  - líder
  - magistrado
  - autoridad
  lexicon: BDAG
  rationale: «Gobernante» es un equivalente amplio y natural para un cargo de dirección política sin precisar más de lo que el texto dice.
- source_word: ὠλιγοψύχησαν
  english_pob_choice: had lost heart
  chosen_spanish: habían perdido el ánimo
  alternatives_spanish:
  - se habían desanimado
  - habían desfallecido de ánimo
  - se habían acobardado
  lexicon: BDAG
  rationale: La expresión comunica bien el sentido de desánimo o falta de valor interior; evita un giro demasiado idiomático que oculte la fuerza del verbo.
- source_word: σπάνει
  english_pob_choice: shortage
  chosen_spanish: escasez
  alternatives_spanish:
  - falta
  - carestía
  - penuria
  lexicon: BDAG
  rationale: «Escasez» es el término más claro y fiel para la idea de insuficiencia de agua en este contexto.
- source_word: πάντας τοὺς λόγους
  english_pob_choice: all the words
  chosen_spanish: todas las palabras
  alternatives_spanish:
  - todo lo que dijo
  - todo lo hablado
  - cada una de las palabras
  lexicon: BDAG
  rationale: Se conserva la repetición enfática del griego, que destaca la totalidad de lo dicho y oído.
- source_word: ἐλάλησεν
  english_pob_choice: had spoken
  chosen_spanish: había dicho
  alternatives_spanish:
  - había hablado
  - les había hablado
  - les había dirigido
  lexicon: BDAG
  rationale: En español, «había dicho» fluye mejor con el complemento indirecto y refleja con fidelidad la acción de hablar en discurso referido.
- source_word: ὤμοσεν
  english_pob_choice: had sworn
  chosen_spanish: les había jurado
  alternatives_spanish:
  - había jurado
  - había prometido bajo juramento
  - les había hecho jurar
  lexicon: BDAG
  rationale: «Juró» / «había jurado» expresa explícitamente el elemento de juramento del verbo griego; aquí se adapta al estilo narrativo español con objeto indirecto claro.
- source_word: παραδώσειν
  english_pob_choice: to hand over
  chosen_spanish: entregar
  alternatives_spanish:
  - poner en manos de
  - ceder
  - someter
  lexicon: BDAG
  rationale: «Entregar la ciudad» reproduce bien la idea básica de ponerla en poder ajeno, sin introducir un matiz técnico innecesario.
- source_word: μετὰ ἡμέρας πέντε
  english_pob_choice: after five days
  chosen_spanish: después de cinco días
  alternatives_spanish:
  - dentro de cinco días
  - al cabo de cinco días
  - tras cinco días
  lexicon: BDAG
  rationale: La preposición con acusativo indica relación temporal posterior; «después de cinco días» sigue de cerca el valor más natural del griego.
theological_decisions:
- issue: Repetición del sujeto en la segunda cláusula
  english_pob_reading: 'Retain the same subject without repeating the name in English: ''and she heard all the words...'''
  chosen_spanish_reading: Mantener el sujeto pronominal implícito («oyó») y repetir el nombre solo cuando el orden español lo necesita; aquí se mantiene la continuidad narrativa sin forzar una repetición innecesaria.
  alternative_spanish_readings:
  - y oyó Judit todas las palabras...
  - y Judit oyó todas las palabras...
  rationale: El griego continúa con el mismo sujeto; el español puede sostener esa continuidad sin repetir el nombre, evitando una construcción menos natural. Al mismo tiempo, no se elimina la referencia a Judit, que permanece en el contexto inmediato.
  doctrine_reference: 'Translation philosophy: original-language primacy; consistency of key terms, or documented exception.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail, que corrigió la repetición innecesaria del nombre propio en la segunda cláusula para ajustarse al griego. La presente redacción conserva esa continuidad y traduce de forma natural el encadenamiento narrativo.
  spanish_consistency_notes:
  - Se usó «Yahvé» no aplica en este versículo; no hay término divino explícito.
  - Se prefirió «Judit» para Ἰουδεὶθ, y «Ozías» para Ὀζείας, en transliteración estándar y consistente.
  - Se mantuvo «asirios» para Ἀσσυρίοις como etnónimo claro en español.
  - La nota al pie marca solo la alternativa lexical documentada para παραδώσειν; no se añadieron notas no ancladas en el texto.
