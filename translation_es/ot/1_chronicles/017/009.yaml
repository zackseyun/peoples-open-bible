review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue en general el sentido del hebreo: Yahvé asigna un lugar a Israel, lo establece allí, promete habitación segura y el cese de la opresión. Sin embargo, se aparta del rumbo documentado del POB en un punto importante: el inglés auditado resolvió los singulares colectivos en plural para claridad (''plant them'', ''they will dwell'', ''wear them down''), mientras que el español vuelve a singulares pronominales (''lo plantaré'', ''habitará'', ''desgastándolo''), lo que en español suena ambiguo entre ''Israel'', ''pueblo'' y ''lugar''. Además, la nota [a] quedó mal anclada: en el inglés la nota a acompaña ''plant them'', pero aquí la nota [a] explica una alternativa preferible al texto principal. También falta reflejar adecuadamente la alternativa documentada para ''como al principio / como antes'' sin sobrecargar el texto.'
  spanish_quality_summary: 'El español es comprensible pero algo rígido y menos natural de lo deseable en varias decisiones: ''lo plantaré'' y ''habitará'' resultan poco idiomáticos para un pueblo en este contexto; ''no será perturbado más'' es entendible, pero ''no será inquietado nunca más'' o ''no será perturbado nunca más'' fluye mejor; ''desgastándolo'' con singular refuerza la ambigüedad. ''Los hijos de maldad'' es aceptable como hebraísmo transparente, con nota alternativa a ''malhechores''. En conjunto, conviene una revisión menor para claridad y fidelidad al audit trail.'
  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto. Las decisiones léxicas centrales son aceptables: ''lugar'', ''mi pueblo Israel'', ''habitar'', ''hijos de maldad''. La principal desalineación no es glosaria sino de resolución sintáctica/semántica: el POB inglés documentó explícitamente el uso de plurales para aclarar la referencia colectiva de Israel, y el español debería hacer lo mismo aquí.'
  issues:
  - severity: high
    issue: Uso de singulares pronominales ambiguos ('lo plantaré', 'habitará', 'desgastándolo')
    rationale: Aunque el hebreo usa formas colectivas singulares, el audit trail del POB decidió explicitarlas en plural para claridad. En español, el singular aquí no aporta fidelidad útil y sí introduce ambigüedad entre pueblo, Israel y lugar.
  - severity: medium
    issue: La nota [a] está invertida respecto de la mejor solución
    rationale: El texto principal usa la opción menos clara ('lo plantaré') y la nota ofrece la solución más natural ('los plantaré'). Dado el análisis documentado, la lectura aclaratoria debe pasar al texto principal.
  - severity: low
    issue: '''no será perturbado más'' suena algo poco natural'
    rationale: Es comprensible, pero en español bíblico moderno 'no será perturbado nunca más' o 'no será inquietado nunca más' expresa mejor el valor de עוֹד con negación.
  revised_spanish_text: Y pondré un lugar para mi pueblo Israel, y los plantaré; y habitarán en su propio lugar y no serán perturbados nunca más. Y los hijos de maldad[a] no seguirán desgastándolos, como al principio[b].
  revised_footnotes:
  - marker: a
    text: O 'malhechores'.
    reason: lexical_alternative
  - marker: b
    text: O 'como antes' o 'como antiguamente'.
    reason: lexical_alternative
  revision_rationale: Se revisa para alinearse con la decisión documentada del POB de explicitar en plural las referencias colectivas a Israel, evitando ambigüedades poco naturales en español. Se conservan las elecciones léxicas principales ('lugar', 'plantar', 'habitar', 'hijos de maldad') y se mantienen las alternativas pertinentes en notas. También se mejora la fluidez de עוֹד con 'nunca más'.
