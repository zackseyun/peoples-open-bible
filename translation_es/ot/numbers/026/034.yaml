- from: Estas son las familias de Manasés[a], y los contados de ellas fueron cincuenta y dos mil setecientos.
  to: Estos son los clanes de Manasés[a], y los inscritos en el censo de ellos fueron cincuenta y dos mil setecientos.
  rationale: Se reemplaza «familias» por «clanes» para reflejar con más precisión מִשְׁפְּחֹת en contexto censal tribal. Se sustituye «los contados de ellas» por «los inscritos en el censo de ellos», que conserva el sentido de פקד documentado en la auditoría inglesa y suena natural en español. También se mejora la nota al pie eliminando «musterados», que no es una opción española adecuada en este registro. Se usa «Estos son» por concordancia más idiomática con «clanes» en masculino plural.
