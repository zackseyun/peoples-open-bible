translation:
  language: es
  text: Pero los campos de la ciudad y sus pastizales[a] se los dieron a Caleb, hijo de Jefone.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «sus aldeas» o «sus asentamientos». En este contexto de repartición de tierras, el hebreo probablemente se refiere a las tierras vinculadas a la ciudad, no a patios urbanos.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂדֵה הָעִיר
  english_pob_choice: the fields of the city
  chosen_spanish: los campos de la ciudad
  alternatives_spanish:
  - la tierra de cultivo de la ciudad
  - el campo de la ciudad
  lexicon: HALOT
  rationale: שָׂדֶה se refiere al campo abierto o tierra cultivable. En español, «campos de la ciudad» conserva la idea de tierras anexas a la ciudad sin convertirla en un área urbana.
- source_word: חֲצֵרֶיהָ
  english_pob_choice: its pasturelands
  chosen_spanish: pastizales
  alternatives_spanish:
  - sus aldeas
  - sus asentamientos
  - sus terrenos alrededor
  lexicon: HALOT
  rationale: En contextos de ciudades levíticas, חָצֵר puede aludir a dependencias o tierras asociadas a la ciudad. «Pastizales» comunica bien la función del terreno en español y sigue la decisión de la POB inglesa de captar el sentido funcional del término.
- source_word: נָתְנוּ
  english_pob_choice: they gave
  chosen_spanish: se los dieron
  alternatives_spanish:
  - los dieron
  - los asignaron
  - los concedieron
  lexicon: HALOT
  rationale: El verbo נתן en qal expresa de manera simple «dar». El español pronominal «se los dieron» conserva la fuerza básica del verbo y hace claro el destinatario implícito.
- source_word: לְכָלֵב בֶּן יְפֻנֶּה
  english_pob_choice: to Caleb son of Jephunneh
  chosen_spanish: a Caleb, hijo de Jefone
  alternatives_spanish:
  - para Caleb, hijo de Jefone
  - a Caleb, hijo de Jephuné
  lexicon: Transliteration policy / proper names
  rationale: Se mantienen los nombres propios en forma bíblica usual en español, con «Caleb» y «Jefone». El dativo לְ se vierte naturalmente con «a».
- source_word: וְ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Mas
  lexicon: HALOT
  rationale: El waw inicial enlaza con el contexto anterior en contraste. «Pero» reproduce ese giro discursivo de forma natural en español sin añadir contenido nuevo.
translation_notes:
  revision_awareness: 'El texto español sigue la lectura consolidada del auditable English POB: contraste inicial con «Pero», distinción entre las tierras de la ciudad y las dependencias asociadas, y asignación de esas tierras a Caleb hijo de Jefone. No se detectaron revisiones posteriores que alteren la sustancia del versículo.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u otra convención de ocultamiento porque el versículo no contiene el nombre divino.
  - «Pastizales» se usó para mantener una solución natural y breve para חֲצֵרֶיהָ, dejando la alternativa léxica en nota.
  - La puntuación sigue el español editorial moderno con coma vocativa/apositiva en el nombre propio.
