  glossary_alignment: No hay términos del glosario principal en conflicto. 'Tienda de reunión' es coherente con אֹהֶל מוֹעֵד. 'Yacían con' respeta la decisión documentada de mantener un eufemismo formal. 'Servían' también concuerda con la preferencia del expediente inglés, preservando en nota la alternativa 'se reunían'.
