translation:
  language: es
  text: Y se acordaron de Juan, su hermano, y subieron y se escondieron bajo el cobijo[a] del monte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También podría traducirse «bajo la cobertura» o «bajo el amparo»; el griego σκέπη puede significar cobertura, refugio o protección.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμνήσθησαν
  english_pob_choice: remembered
  chosen_spanish: se acordaron de
  alternatives_spanish:
  - recordaron
  - trajeron a la memoria
  lexicon: LSJ
  rationale: El aoristo de μιμνῄσκομαι expresa aquí un recordar concreto y narrativo. «Se acordaron de» es natural en español y conserva el valor simple de la acción sin añadir matices devocionales o reflexivos que el griego no exige.
- source_word: Ἰωάνου
  english_pob_choice: John
  chosen_spanish: Juan
  alternatives_spanish:
  - Johanan
  lexicon: LSJ
  rationale: El nombre griego Ἰωάνου corresponde de manera directa al nombre bíblico establecido «Juan» en español. «Johanan» introduciría una forma hebrea no presente en el texto griego.
- source_word: τοῦ ἀδελφοῦ αὐτῶν
  english_pob_choice: their brother
  chosen_spanish: su hermano
  alternatives_spanish:
  - el hermano de ellos
  - el hermano suyo
  lexicon: LSJ
  rationale: La relación de parentesco es directa y posesiva. «Su hermano» comunica con naturalidad la frase genitiva sin sobrecargarla.
- source_word: ἀνέβησαν
  english_pob_choice: went up
  chosen_spanish: subieron
  alternatives_spanish:
  - ascendieron
  - fueron hacia arriba
  lexicon: LSJ
  rationale: El verbo indica movimiento ascendente. «Subieron» preserva la imagen espacial de forma idiomática en español.
- source_word: ἐκρύβησαν
  english_pob_choice: hid
  chosen_spanish: se escondieron
  alternatives_spanish:
  - se ocultaron
  - se escondieron a sí mismos
  lexicon: LSJ
  rationale: La forma pasiva/deponente en contexto significa que ellos mismos se ocultaron. «Se escondieron» es la equivalencia más natural y clara.
- source_word: ὑπὸ τὴν σκέπην
  english_pob_choice: under the cover
  chosen_spanish: bajo la cobertura
  alternatives_spanish:
  - bajo el cobijo
  - bajo el amparo
  - bajo la cobertura de
  lexicon: LSJ
  rationale: σκέπη puede denotar cobertura, refugio o protección. «Cobertura» conserva la imagen concreta que el POB inglés dejó en su revisión final, y en español mantiene la ambigüedad entre cobertura física y resguardo.
- source_word: τοῦ ὄρους
  english_pob_choice: of the mountain
  chosen_spanish: del monte
  alternatives_spanish:
  - de la montaña
  - del cerro
  lexicon: LSJ
  rationale: ὄρος puede ser «monte» o «montaña». En español bíblico, «monte» suena natural y mantiene el referente topográfico sin volverlo innecesariamente técnico.
translation_notes:
  revision_awareness: La revisión inglesa final cambió «shelter» por «cover» para hacer más directo σκέπη. La versión española sigue esa decisión con «cobertura», manteniendo la imagen concreta y la ambigüedad semántica de refugio/protección sin añadir interpretación.
  spanish_consistency_notes:
  - 'Se mantuvo el orden narrativo simple del griego: recuerdo, ascenso y ocultamiento.'
  - Se eligió «monte» por ser el equivalente bíblico más natural de ὄρος en este contexto.
  - No se introdujo mayúscula teológica en «espíritu» u otras palabras porque el versículo no las contiene.
