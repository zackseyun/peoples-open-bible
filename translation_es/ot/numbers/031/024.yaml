translation:
  language: es
  text: Lavarán sus vestidos el séptimo día, y quedarán limpios[a]; después podrán entrar en el campamento[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "serán purificados". El hebreo puede expresar el quedar ritualmente limpios después del lavado prescrito.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "podrán entrar en el campamento". El sentido es que se permite volver a entrar una vez completada la limpieza.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִבַּסְתֶּם
  english_pob_choice: you shall wash
  chosen_spanish: lavarán
  alternatives_spanish:
  - deberán lavar
  - lavarán sus ropas
  lexicon: HALOT
  rationale: El piel de כבס se usa para lavar ropa o tejidos. En español, 'lavarán' expresa bien la instrucción futura/mandativa sin volverla forzosamente más dura que el hebreo. Se entiende de manera natural con el objeto explícito 'sus vestidos'.
- source_word: בִּגְדֵיכֶם
  english_pob_choice: your clothes
  chosen_spanish: sus vestidos
  alternatives_spanish:
  - sus ropas
  - sus prendas
  - sus vestiduras
  lexicon: HALOT
  rationale: '''בגד'' designa ropa o vestiduras. ''Vestidos'' mantiene el referente textil y suena digno en español bíblico actual. ''Ropas'' sería también válido, pero ''vestidos'' conserva mejor el tono formal del contexto ritual.'
- source_word: בַּיּוֹם הַשְּׁבִיעִי
  english_pob_choice: on the seventh day
  chosen_spanish: el séptimo día
  alternatives_spanish:
  - en el séptimo día
  - al séptimo día
  lexicon: HALOT
  rationale: Es la expresión temporal directa y natural en español. La preposición no necesita repetirse porque el mandato ya funciona como marco temporal claro.
- source_word: וּטְהַרְתֶּם
  english_pob_choice: you shall be clean
  chosen_spanish: estarán limpios
  alternatives_spanish:
  - serán limpios
  - quedarán limpios
  - serán purificados
  lexicon: HALOT
  rationale: 'El hebreo es resultativo/intransitivo: después del lavado, el estado es ''limpio''. ''Estarán limpios'' preserva ese valor sin introducir una acción reflexiva que el hebreo no exige. También evita cargar el verbo con una connotación moral que no corresponde aquí.'
- source_word: וְאַחַר
  english_pob_choice: afterward
  chosen_spanish: después
  alternatives_spanish:
  - y después
  - entonces
  - luego
  lexicon: HALOT
  rationale: Marca simple secuencia. 'Después' es claro y breve en español.
- source_word: תָּבֹאוּ אֶל הַמַּחֲנֶה
  english_pob_choice: you may come into the camp
  chosen_spanish: podrán entrar en el campamento
  alternatives_spanish:
  - podrán venir al campamento
  - entrarán en el campamento
  - podrán volver al campamento
  lexicon: HALOT
  rationale: '''בוא אל'' permite ''entrar en''. El contexto ritual muestra permiso de reingreso tras la limpieza, por eso ''podrán'' conserva la fuerza permisiva del inglés POB y del hebreo contextual. ''Campamento'' es la forma natural y fiel para מַחֲנֶה.'
theological_decisions:
- issue: Pureza ritual frente a purificación moral
  english_pob_reading: Rendered טהר as 'be clean' rather than 'be purified.'
  chosen_spanish_reading: '''estarán limpios'''
  alternative_spanish_readings:
  - serán purificados
  - se purificarán
  - quedarán purificados
  rationale: La orden trata de pureza ritual posterior a la guerra, no de limpieza moral. 'Estarán limpios' conserva el estado resultante que expresa el hebreo y evita introducir una lectura devocional que el contexto no pide. La alternancia con 'purificados' puede sugerir más proceso o agencia de la que aquí aparece.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: Coincide con el pasaje fuente y con la auditoría inglesa vigente; no se registran revisiones aplicadas en el último pase, y la concordancia de revisión indica acuerdo alto sin cambios necesarios.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' no porque aparezca en este versículo, sino por la norma general del proyecto cuando el tetragrámaton esté presente; aquí no aplica.
  - Se preservó la ambigüedad ritual de טהר con una nota, como hace la edición inglesa al ofrecer 'be clean' / 'be purified'.
  - '''Campamento'' traduce מַחֲנֶה de forma constante y no se sustituye por un término militar moderno, porque el contexto es el campamento israelita del desierto.'
