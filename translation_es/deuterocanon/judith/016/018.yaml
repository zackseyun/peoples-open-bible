review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue fielmente el sentido griego general: llegada a Jerusalén, adoración a Dios, purificación ritual previa del pueblo y presentación de tres clases de ofrendas. Sin embargo, hay un desajuste importante de naturalidad y matiz en «hubo sido purificado», que no es la forma narrativa normal en español bíblico moderno para reflejar ἐκαθαρίσθη con anterioridad relativa.'
  spanish_quality_summary: El texto es claro y mayormente natural. «Adoraron a Dios», «holocaustos» y «ofrendas voluntarias» funcionan bien. La principal reparación necesaria es cambiar «cuando el pueblo hubo sido purificado» por una forma idiomática y digna como «cuando el pueblo se había purificado» o «cuando el pueblo fue purificado». También conviene evitar posible ambigüedad de voz/paciente manteniendo explícita la idea de purificación ritual previa.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Dios» para θεῷ es correcto. «Holocaustos» preserva el término cultual. «Dones» mantiene la distinción de δόματα frente a las otras ofrendas, aunque «dádivas» también sería posible; no es necesario cambiarlo.
  issues:
  - severity: medium
    issue: «hubo sido purificado» suena antinatural en español
    rationale: Aunque intenta reflejar anterioridad, esa perífrasis casi no se usa en español estándar y entorpece la legibilidad. El griego solo exige pasiva de purificación ritual previa; «se había purificado» o «fue purificado» comunican mejor el sentido.
  revised_spanish_text: Y cuando llegaron a Jerusalén, adoraron a Dios; y cuando el pueblo se había purificado, ofrecieron sus holocaustos, sus ofrendas voluntarias y sus dones.
  revision_rationale: Se reemplaza una construcción verbal poco idiomática por una formulación natural en español que aún preserva la secuencia temporal y el sentido cultual de la purificación previa a las ofrendas. No se requieren notas adicionales porque no se introduce nueva ambigüedad ni se pierde una alternativa preservada por la auditoría inglesa.
