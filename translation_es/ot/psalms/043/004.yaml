    reason: lexical_alternative
  - marker: b
    text: O «con el arpa». El hebreo kinnor se refiere a un antiguo instrumento de cuerdas, probablemente más parecido a una lira.
    reason: cultural_note
  revision_rationale: 'Se conserva el sentido global del borrador, pero se corrige una decisión léxica importante para ajustarla al texto fuente y al POB auditado: כִּנּוֹר debe traducirse principalmente como «lira», con «arpa» como alternativa en nota. También se pule la nota [a] para un español más natural y correcto.'
