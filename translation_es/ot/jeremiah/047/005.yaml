  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo y en general sigue el rastro de la POB inglesa: mantiene «calvicie», «ha venido sobre Gaza», «ha sido silenciada», «remanente» y la pregunta final. Sin embargo, hay un desajuste importante en עִמְקָם, que en la POB inglesa y en el hebreo morfológico es plural posesivo («their valley»), mientras el español dice «su valle», introduciendo ambigüedad singular. También conviene afinar la expresión de auto-laceración para preservar mejor la fuerza de תִּתְגּוֹדָדִי.'
