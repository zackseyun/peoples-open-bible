    text: 'O "los israelitas". Hebreo: "los hijos de Israel".'
    reason: lexical_alternative
  - marker: b
    text: 'O "por mandato de Yahvé". Literalmente: "según la boca de Yahvé".'
    reason: lexical_alternative
  - marker: c
    text: Es decir, el terreno abierto o de pastoreo perteneciente a las ciudades.
    reason: cultural_note
  revision_rationale: 'La revisión hace dos ajustes menores: (1) cambia ''por mandato de Yahvé'' a ''según el mandato de Yahvé'' para reflejar con mayor precisión el idiomático hebreo אֶל־פִּי; (2) cambia ''tierras de pasto'' a ''pastizales'' por mayor naturalidad y claridad en español general, mientras la nota cultural conserva el matiz de terreno abierto asociado a la ciudad. El resto del borrador está bien alineado con la fuente y con la política terminológica del proyecto.'
