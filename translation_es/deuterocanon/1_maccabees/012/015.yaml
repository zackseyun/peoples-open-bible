revisions:
- from: Por tanto, nosotros continuamente nos acordamos de ustedes en todo tiempo[a], en las fiestas y en los demás días debidos[b], cuando ofrecemos sacrificios y en nuestras oraciones, como es justo y conveniente acordarse de los hermanos.
  to: Por tanto, nosotros continuamente nos acordamos de ustedes en todo tiempo, en las fiestas[a] y en los demás días señalados[b], cuando ofrecemos sacrificios y en nuestras oraciones, como es justo y conveniente acordarse de los hermanos.
  rationale: Se corrigió la ubicación y el contenido de la nota léxica sobre ἑορταῖς para que corresponda al término marcado en el texto. También se reemplazó «días debidos» por «días señalados», una formulación más natural en español y más adecuada al sentido de días establecidos o prescritos del calendario religioso. Se mantuvo el resto de la redacción porque refleja fielmente el griego y las decisiones del POB inglés.
  reviewer_model: gpt-5.4
