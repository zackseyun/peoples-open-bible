review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo y el análisis POB: futuro profético, valor causal de מן en ambos miembros, conservación de «Cus», y paralelismo entre confianza en Cus y orgullo en Egipto. Sin embargo, no preserva con precisión la decisión léxica principal de תפארתם, que en el POB inglés es «their boast», no «their glory»; además, las notas b/c están invertidas en el anclaje del texto.'
  spanish_quality_summary: El español es generalmente claro y legible, pero «serán consternados» suena algo calcado; «quedarán consternados» o «se llenarán de consternación» sería más idiomático. También conviene evitar la nota alternativa anclada sobre «Egipto» cuando la alternativa corresponde al sustantivo predicativo final. «Su jactancia» es fiel pero algo dura; «su motivo de orgullo» sería más natural, aunque el proyecto pide no paraprasear de más. «Su gloria» en texto principal pierde el matiz relacional de aquello de lo que se gloriaban.
  glossary_alignment: Alinea bien con la política de topónimos al usar «Cus». No hay términos teológicos mayores en juego. La principal desviación es que תפארת aquí debe reflejarse más como «jactancia»/«motivo de orgullo» que como «gloria», según la auditoría léxica inglesa.
  issues:
  - severity: high
    issue: El texto principal traduce תִּפְאַרְתָּם como «su gloria» en vez de la elección auditada «their boast».
    rationale: Aunque «gloria» aparece como alternativa posible, el POB inglés documenta que aquí el sentido relacional es el objeto de su gloriarse. «Su gloria» en español puede leerse como atributo intrínseco de Egipto, no como aquello en lo que ellos se jactaban.
  - severity: medium
    issue: Los marcadores de notas [c][b] están colocados tras «Egipto», pero las alternativas corresponden a «su esperanza» y al equivalente de תפארתם, no al topónimo.
    rationale: La disciplina del proyecto exige que cada marcador aparezca en la palabra o frase pertinente. La nota sobre «expectativa» debe anclarse en «esperanza» y la de «gloria/jactancia» en el sustantivo final.
  - severity: medium
    issue: «Serán consternados» es menos idiomático en español que otras opciones.
    rationale: No es incorrecto, pero suena pasivo y algo forzado. «Quedarán consternados» preserva mejor el resultado emocional del hebreo en español natural.
  revised_spanish_text: Y quedarán consternados y avergonzados a causa de Cus[a], su esperanza[b], y a causa de Egipto, su jactancia[c].
  revised_footnotes:
