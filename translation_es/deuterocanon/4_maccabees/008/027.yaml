translation:
  language: es
  text: Pero los jóvenes[a], que estaban a punto de ser torturados, no dijeron nada de eso, ni siquiera pensaron en ello.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ni siquiera albergaron tales pensamientos». El verbo griego puede significar pensar en algo, considerarlo o tenerlo en mente.'
