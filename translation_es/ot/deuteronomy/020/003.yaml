translation:
  language: es
  text: 'y les dirás[a]: «Escucha, Israel: hoy ustedes se acercan a la batalla contra sus enemigos. No se acobarde su corazón. No teman, ni entren en pánico[b], ni se aterroricen por causa de ellos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y dirás». El hebreo usa una forma secuencial que, en este contexto legal e instructivo, funciona naturalmente como continuación directiva.
    reason: lexical_alternative
  - marker: b
    text: O «No teman, y no entren en pánico, y no se aterroricen ante ellos». Las tres prohibiciones intensifican el mandato contra el miedo en la batalla.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַר
  english_pob_choice: and say
  chosen_spanish: y les dirá
  alternatives_spanish:
  - y dirá
  - y les dirá entonces
  lexicon: HALOT
  rationale: El waw con perfecto en contexto exhortativo/procedimental se expresa naturalmente en español como continuación futura o directiva. «Les dirá» conserva el movimiento secuencial sin forzar un pasado narrativo.
- source_word: שְׁמַע יִשְׂרָאֵל
  english_pob_choice: Hear, Israel
  chosen_spanish: Oye, Israel
  alternatives_spanish:
  - Escucha, Israel
  - Oíd, Israel
  lexicon: HALOT
  rationale: Se preserva la fórmula de llamado pactual con un imperativo breve y solemne. «Oye» mantiene el valor de atención obediente, cercano a «Hear», sin sonar demasiado coloquial.
- source_word: קְרֵבִים
  english_pob_choice: are drawing near
  chosen_spanish: se acercan
  alternatives_spanish:
  - están acercándose
  - se van acercando
  lexicon: HALOT
  rationale: El participio expresa proximidad inminente; «se acercan» es natural en español y conserva la idea de avance hacia el enfrentamiento.
- source_word: לַמִּלְחָמָה
  english_pob_choice: to battle
  chosen_spanish: a la batalla
  alternatives_spanish:
  - para la batalla
  - a la guerra
  lexicon: HALOT
  rationale: «Batalla» transmite el contexto militar inmediato con claridad y evita una abstracción excesiva. «Guerra» sería más amplio, pero menos ajustado al choque concreto aquí.
- source_word: עַל אֹיְבֵיכֶם
  english_pob_choice: against your enemies
  chosen_spanish: contra sus enemigos
  alternatives_spanish:
  - contra vuestros enemigos
  - sobre sus enemigos
  lexicon: HALOT
  rationale: «Contra» es la equivalencia más natural para el valor hostil de עַל en contexto bélico. Se usa «sus» por cortesía/neutralidad textual de registro público en español.
- source_word: אַל יֵרַךְ לְבַבְכֶם
  english_pob_choice: Do not let your heart grow faint
  chosen_spanish: No desmaye su corazón
  alternatives_spanish:
  - No se les acobarde el corazón
  - No pierdan el ánimo
  lexicon: HALOT
  rationale: «Desmayar» reproduce bien la imagen de debilitamiento interior y mantiene la metáfora del corazón como sede de valor. Aunque la POB inglesa optó por «grow faint», en español esta forma es más idiomática y aún cercana al hebreo.
- source_word: לְבַבְכֶם
  english_pob_choice: your heart
  chosen_spanish: su corazón
  alternatives_spanish:
  - el corazón de ustedes
  - su ánimo
  lexicon: HALOT
  rationale: Se conserva «corazón» para mantener la imagen hebrea del centro interior de valor, voluntad y resolución. El posesivo plural de respeto/neutralidad («su») cubre el destinatario colectivo.
- source_word: אַל תִּירְאוּ
  english_pob_choice: Do not fear
  chosen_spanish: No teman
  alternatives_spanish:
  - No tengan miedo
  - No se asusten
  lexicon: HALOT
  rationale: La prohibición es directa y breve. «No teman» preserva la fuerza imperativa y la relación con la serie de mandatos negativos.
- source_word: וְאַל תַּחְפְּזוּ
  english_pob_choice: or panic
  chosen_spanish: ni entren en pánico
  alternatives_spanish:
  - ni se apresuren
  - ni se agiten
  lexicon: HALOT
  rationale: En este contexto militar, el verbo no describe simple prisa sino agitación alarmada. «Entren en pánico» comunica bien esa reacción interna sin diluirla.
- source_word: וְאַל תַּעַרְצוּ
  english_pob_choice: or be terrified
  chosen_spanish: ni se aterroricen
  alternatives_spanish:
  - ni se amedrenten
  - ni se espanten
  lexicon: HALOT
  rationale: El verbo intensifica la serie de prohibiciones con una respuesta de espanto ante el enemigo. «Aterrorizarse» mantiene esa escalada y suena natural en español.
- source_word: מִפְּנֵיהֶם
  english_pob_choice: because of them
  chosen_spanish: delante de ellos
  alternatives_spanish:
  - por causa de ellos
  - ante ellos
  lexicon: HALOT
  rationale: La expresión hebrea literalmente apunta a «de delante de ellos»; en español, «delante de ellos» conserva el valor espacial/relacional más de cerca que una pura causalidad. La frase final queda así vinculada a la presencia del enemigo, como en el hebreo.
theological_decisions:
- issue: La serie de tres prohibiciones del miedo en la guerra
  english_pob_reading: Do not fear, or panic, or be terrified because of them.
  chosen_spanish_reading: No teman, ni entren en pánico, ni se aterroricen delante de ellos.
  alternative_spanish_readings:
  - No teman, ni se asusten, ni se espanten delante de ellos.
  - No teman, ni entren en confusión, ni se aterroricen por causa de ellos.
  rationale: Se conserva la intensificación de las tres prohibiciones sin suavizarla. La traducción mantiene el crescendo emocional del texto hebreo y evita colapsar los tres verbos en un solo mandato genérico.
  doctrine_reference: Deuteronomio 20:3; exhortación pactual a la confianza obediente en el combate
translation_notes:
  revision_awareness: El contexto auditado en inglés no requirió revisión textual mayor. La única tensión relevante es cómo verter la serie hebrea de prohibiciones y el modismo «que el corazón no se debilite»; la versión española mantiene ambos rasgos con un nivel de naturalidad propio de publicación.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como terminología de base del proyecto, aunque este versículo no lo contiene.
  - Se conserva «corazón» para לֵבָב como sede del valor interior, en vez de reemplazarlo por «ánimo» en el texto principal.
  - Se traduce la secuencia negativa con «ni... ni...» para reflejar la acumulación de prohibiciones.
  - Se evita «SEÑOR» u այլ masking conventions porque el versículo no contiene el nombre divino.
