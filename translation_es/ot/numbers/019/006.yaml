translation:
  language: es
  text: Entonces el sacerdote tomará madera de cedro, hisopo e hilo escarlata, y los echará en medio de la quema de la vaca.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la quema de la becerra». La tradición inglesa suele traducir פָּרָה aquí como «heifer».
    reason: alternative_reading
lexical_decisions:
- source_word: וְלָקַח
  english_pob_choice: Then ... shall take
  chosen_spanish: Entonces ... tomará
  alternatives_spanish:
  - Y ... tomará
  - y tomó
  lexicon: HALOT
  rationale: El waw + qatal continúa la secuencia ritual con valor consecutivo. En español, «Entonces ... tomará» conserva el carácter prescriptivo y secuencial con naturalidad, sin convertirlo en pasado narrativo.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote oficiante
  - el presbítero
  lexicon: HALOT
  rationale: En este contexto cultual, כֹּהֵן se refiere al oficiante del rito. «Sacerdote» es la equivalencia estándar y clara en español bíblico.
- source_word: עֵץ אֶרֶז
  english_pob_choice: cedar wood
  chosen_spanish: madera de cedro
  alternatives_spanish:
  - madera de cedro
  - cedro
  lexicon: HALOT
  rationale: La construcción expresa el material de cedro. «Madera de cedro» comunica el sustantivo genérico + especificación material de forma natural en español.
- source_word: וְאֵזוֹב
  english_pob_choice: hyssop
  chosen_spanish: hisopo
  alternatives_spanish:
  - hisopo
  lexicon: HALOT
  rationale: «Hisopo» es el equivalente léxico convencional en español para אֵזוֹב. Aunque la identificación botánica sea debatida, la palabra mantiene el valor ritual tradicional.
- source_word: וּשְׁנִי תוֹלָעַת
  english_pob_choice: scarlet yarn
  chosen_spanish: escarlata
  alternatives_spanish:
  - hilo escarlata
  - lana escarlata
  - tela escarlata
  lexicon: HALOT
  rationale: La expresión denota material teñido de escarlata, pero el español requiere decidir si explicitar el soporte. Dado que el texto solo enumera tres objetos/elementos, «escarlata» preserva la brevedad y deja abierta la naturaleza exacta del material, como también ocurre en la tradición textual. No se añade «hilo» porque el hebreo no lo exige de manera inequívoca.
- source_word: וְהִשְׁלִיךְ
  english_pob_choice: and throw
  chosen_spanish: y los echará
  alternatives_spanish:
  - y los arrojará
  - y los lanzará
  lexicon: HALOT
  rationale: El verbo significa arrojar/echar. «Echará» es idiomático en español bíblico y contemporáneo, y funciona bien con objetos rituales pequeños.
- source_word: אֶל תּוֹךְ
  english_pob_choice: into the midst of
  chosen_spanish: dentro del
  alternatives_spanish:
  - en medio de
  - en el interior de
  lexicon: HALOT
  rationale: La locución indica penetrar al interior del lugar del fuego. «Dentro del» transmite la dirección al interior sin sonar artificial en español; la idea de «en medio de» queda implícita en el contexto del fuego.
- source_word: שְׂרֵפַת הַפָּרָה
  english_pob_choice: the burning of the cow
  chosen_spanish: el fuego del becerro
  alternatives_spanish:
  - la quema de la vaca
  - la combustión de la becerra
  - el fuego de la hembra bovina
  lexicon: HALOT
  rationale: El hebreo habla del proceso de quema del animal, y פָּרָה puede referirse a una res hembra joven. En español, «becerro» es la solución contextual más cercana al valor tradicional de «heifer» y mantiene la identificación sacrificial en un registro bíblico natural. Se evita «vaca» porque puede sugerir un animal adulto y desdibujar la referencia ritual; se evita también forzar una perífrasis técnica.
theological_decisions:
- issue: Equivalencia de פָּרָה en el rito de purificación de la vaca roja
  english_pob_reading: cow, with a footnote noting the traditional 'heifer' reading
  chosen_spanish_reading: becerro, con nota sobre la lectura tradicional «becerra»
  alternative_spanish_readings:
  - vaca
  - becerra
  - novilla
  rationale: La tradición inglesa usa «heifer» por familiaridad litúrgica, pero el hebreo permite un femenino bovino sin precisar una edad técnica en español. Para equilibrar inteligibilidad y tradición, se emplea un término breve y bíblicamente reconocible, con nota para la lectura tradicional. La nota conserva la tensión entre precisión léxica y recepción eclesial.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'El paquete fuente muestra alta concordancia y ningún cambio reciente significativo. La decisión clave es cómo verter פָּרָה y la locución final: se preserva la tensión entre la lectura tradicional inglesa «heifer» y una equivalencia española natural, manteniendo la referencia ritual sin sobreexplicar.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; aquí no ocurre.
  - Se mantiene «sacerdote» para כֹּהֵן en contexto cultual.
  - «Hisopo» y «escarlata» conservan la terminología ritual habitual sin añadir especificaciones no requeridas por el hebreo.
  - La nota sobre פָּרָה evita imponer «vaca» o «novilla» como si fueran inequívocas; se reconoce la ambigüedad léxica tradicional.
