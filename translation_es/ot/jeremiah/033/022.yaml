  text: אֲשֶׁ֤ר לֹֽא יִסָּפֵר֙ צְבָ֣א הַ/שָּׁמַ֔יִם וְ/לֹ֥א יִמַּ֖ד ח֣וֹל הַ/יָּ֑ם כֵּ֣ן אַרְבֶּ֗ה אֶת זֶ֨רַע֙ דָּוִ֣ד עַבְדִּ֔/י וְ/אֶת הַ/לְוִיִּ֖ם מְשָׁרְתֵ֥י אֹתִֽ/י־־־׃ס
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/033/022.yaml
  text: As the host of heaven cannot be counted and the sand of the sea cannot be measured[d][c][b][a], so I will multiply the offspring of David my servant and the Levites who minister to me.
  footnotes:
  - marker: a
    text: Or 'cannot be numbered' for 'cannot be counted.'
    reason: lexical_alternative
  - marker: b
    text: '''Host of heaven'' is a Hebrew idiom for the heavenly multitude, often including the stars.'
    reason: cultural_note
  - marker: c
    text: Or 'the seed of David' or 'the descendants of David.'
    reason: lexical_alternative
  - marker: d
    text: Or 'who serve me'; the Hebrew can denote ongoing cultic service.
    reason: lexical_alternative
