review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo: restauración de jueces y consejeros, seguida por el nuevo nombre de la ciudad. Sin embargo, no preserva del todo la decisión léxica auditada para עִיר הַצֶּדֶק: el inglés POB eligió ''city of righteousness'' con nota alternativa ''city of justice'', mientras que el español invierte esa prioridad y pone ''ciudad de justicia'' en el texto principal. Además, la nota al pie está mal anclada: el marcador [a] aparece junto a ''principio'' pero la nota trata de ''ciudad de rectitud''.'
  spanish_quality_summary: El español es claro y natural, pero puede mejorarse para alinearse mejor con el sentido y con la documentación del POB. 'Haré volver' es comprensible, aunque 'restauraré' fluye mejor en contexto institucional; aun así, no es un error grave. El problema principal de legibilidad/editorial es la nota al pie colocada en el lugar incorrecto y la elección principal 'justicia' en vez de una opción más amplia como 'rectitud' o 'justicia' según la auditoría.
  glossary_alignment: 'No hay conflictos con términos del glosario mayor como Yahvé, Mesías, etc. Sí hay desalineación con la política contextual para צדק/δικαιοσύνη: en este verso el expediente inglés privilegia ''righteousness'' por su alcance moral y de rectitud pactual, dejando ''justice'' como alternativa. En español conviene reflejar eso con ''rectitud'' en el texto principal y ''justicia'' en nota.'
  issues:
  - severity: high
    issue: La nota al pie está anclada en la frase equivocada.
    rationale: El marcador [a] aparece en 'como al principio[a]', pero el contenido de la nota ('O «ciudad de rectitud»') corresponde a 'ciudad de justicia'. Esto crea una incoherencia editorial clara.
  - severity: high
    issue: La traducción principal de עִיר הַצֶּדֶק no sigue la decisión léxica auditada del POB.
    rationale: El expediente inglés eligió 'city of righteousness' como lectura principal y 'city of justice' como alternativa. El español la invierte sin justificación suficiente, debilitando el matiz más amplio de צדק en este contexto de restauración moral y cívica.
  - severity: low
    issue: '''Haré volver'' es menos idiomático que ''restauraré'' en contexto institucional.'
    rationale: Aunque el hebreo hiphil de שוב puede expresarse así, en español bíblico natural la restauración de jueces y consejeros se entiende mejor con 'restauraré'. No obstante, 'haré volver' sigue siendo defendible y no requiere adjudicación mayor.
  revised_spanish_text: Y restauraré tus jueces como al principio, y tus consejeros como al comienzo. Después de esto se te llamará ciudad de rectitud[a], ciudad fiel.
  revised_footnotes:
  - marker: a
    text: O «ciudad de justicia».
    reason: lexical_alternative
  revision_rationale: 'Se corrige el anclaje de la nota al pie y se alinea la traducción principal de עִיר הַצֶּדֶק con la decisión auditada del POB: priorizar el sentido más amplio de rectitud/righteousness y conservar ''justicia'' como alternativa léxica. También se mejora la naturalidad de וְאָשִׁיבָה con ''restauraré'', que encaja mejor con la reconstitución del liderazgo cívico.'
