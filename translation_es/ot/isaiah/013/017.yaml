revisions:
- from: Miren[a], yo estoy incitando contra ellos a los medos, que no estiman la plata ni se deleitan en el oro.
  to: He aquí[a], yo estoy levantando contra ellos a los medos, que no valoran la plata ni desean el oro.
  rationale: Se ajusta הִנְנִי a «He aquí» para conservar la fuerza deíctica y profética sin convertirlo en mandato plural; se cambia «incitando» por «levantando» para reflejar mejor מֵעִיר en contexto militar y evitar un matiz indebido; y se pule la segunda mitad hacia un español más natural manteniendo la distinción semántica entre valorar/dese ar y las alternativas en nota. No hace falta adjudicación adicional.
  reviewer_model: gpt-5.4
