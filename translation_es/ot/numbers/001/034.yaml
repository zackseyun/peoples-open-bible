translation:
  language: es
  text: 'De los hijos de Manasés, por sus generaciones, por sus clanes, por sus casas paternas, por el número de nombres, de veinte años en adelante, todo varón que sale[a] para el servicio militar:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todo varón que sale a la guerra». La expresión hebrea se refiere a los aptos para el servicio militar.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבְנֵי מְנַשֶּׁה
  english_pob_choice: From the sons of Manasseh
  chosen_spanish: De los hijos de Manasés
  alternatives_spanish:
  - De los descendientes de Manasés
  - Entre los hijos de Manasés
  lexicon: HALOT
  rationale: Conservo la fórmula tribal y la relación genealógica de בני como «hijos», que en este contexto censal no conviene generalizar a «descendientes». El hebreo introduce el encabezado de la tribu para el conteo.
- source_word: תּוֹלְדֹתָם
  english_pob_choice: by their generations
  chosen_spanish: por sus generaciones
  alternatives_spanish:
  - según sus generaciones
  - por su genealogía
  lexicon: HALOT
  rationale: «Generaciones» mantiene la fórmula censal repetida y el matiz de descentencia/líneas genealógicas sin convertirla en una explicación más libre como «genealogía».
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: by their clans
  chosen_spanish: por sus clanes
  alternatives_spanish:
  - según sus familias
  lexicon: HALOT
  rationale: En contexto tribal, מִשְׁפָּחָה se refiere a subdivisiones de parentesco; «clanes» es más preciso y reproduce la distinción interna del texto mejor que «familias».
- source_word: לְבֵית אֲבֹתָם
  english_pob_choice: by their fathers’ houses
  chosen_spanish: por las casas de sus padres
  alternatives_spanish:
  - por sus casas paternas
  - por las casas ancestrales de sus padres
  lexicon: HALOT
  rationale: Mantengo la expresión social israelita de «casa paterna» en una forma natural en español. «Casas de sus padres» conserva la estructura del hebreo sin perder inteligibilidad.
- source_word: בְּמִסְפַּר שֵׁמוֹת
  english_pob_choice: by the number of names
  chosen_spanish: por el número de nombres
  alternatives_spanish:
  - según el número de nombres
  - por nombre, según el número
  lexicon: HALOT
  rationale: La frase expresa el conteo de individuos nombrados. «Número de nombres» refleja la formulación censal formal y evita suavizar el carácter administrativo del pasaje.
- source_word: מִבֶּן עֶשְׂרִים שָׁנָה וָמַעְלָה
  english_pob_choice: from twenty years old and upward
  chosen_spanish: desde los veinte años de edad y más
  alternatives_spanish:
  - desde los veinte años y más
  - a partir de los veinte años de edad
  lexicon: HALOT
  rationale: Opto por una equivalencia idiomática natural en español para el umbral de edad, preservando el sentido de elegibilidad militar sin calcar «hijo de veinte años».
- source_word: כֹּל יֹצֵא צָבָא
  english_pob_choice: every man going out for military service
  chosen_spanish: todo varón que sale para el servicio militar
  alternatives_spanish:
  - todo varón que sale para la guerra
  - todo varón apto para el servicio militar
  lexicon: HALOT
  rationale: «Varón» conserva la referencia masculina que el contexto exige. «Sale para el servicio militar» reproduce la idea de salir a cumplir servicio organizado; evito neutralizar el masculino o reducirlo solo a «guerra» porque el hebreo abarca aptitud para duty militar.
theological_decisions:
- issue: Referencia masculina en el censo militar
  english_pob_reading: every man going out for military service
  chosen_spanish_reading: todo varón que sale para el servicio militar
  alternative_spanish_readings:
  - todo el que sale para el servicio militar
  - toda persona que sale para el servicio militar
  rationale: El contexto inmediato es un censo de varones aptos para el servicio militar; por eso mantengo la referencia masculina explícita y no la neutralizo. La elección respeta el alcance social del texto sin introducir universalización ajena al original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: El texto sigue de cerca la revisión inglesa vigente, sin cambios pendientes indicados en el audit trail. Se ha mantenido la estructura formularia del censo y la lectura masculina del participio, con español más natural en la frase de edad y en la expresión militar.
  spanish_consistency_notes:
  - Se mantiene «hijos» para בְנֵי cuando funciona como encabezado tribal.
  - Se usa «clanes» para מִשְׁפָּחֹת en contexto de subdivisión tribal.
  - Se reserva «varón» para el masculino específico del censo militar.
  - Se traduce צָבָא como «servicio militar» en el sentido de aptitud/obligación militar, con nota alternativa sobre «guerra».
