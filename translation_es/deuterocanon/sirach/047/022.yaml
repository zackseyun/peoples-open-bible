    rationale: El expediente inglés explicita «from his chosen one», y el hebreo/greigo apuntan a no eliminar la línea procedente del elegido. En español, «cortar X de Y» o «arrancar de Y X» comunica mejor que no se suprimirá la descendencia de su línea.
  - severity: low
    issue: «Cortará» suena algo rígido en español con «descendencia y posteridad».
    rationale: Aunque es cercano al hebreo, «arrancará» o «extirpará» suenan más naturales en un registro bíblico moderno y mantienen la fuerza de לא יכרית sin paráfrasis excesiva.
