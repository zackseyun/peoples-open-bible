review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien la imagen poética y la distinción entre los instrumentos, pero no preserva con precisión el valor singular del imperativo עוּרָה. El hebreo convoca poéticamente al conjunto instrumental con una forma singular, mejor reflejada en español como «¡Despierta…!» dirigido al par coordinado que como plural «¡Despierten…!».
  spanish_quality_summary: 'El español es claro y digno, pero «¡Despierten, arpa y lira!» suena menos natural por la discordancia entre un plural verbal y dos sustantivos singulares coordinados en vocativo poético. También la nota al pie está mal formulada: presenta una alternativa ya incorporada y no refleja bien las opciones del inglés auditado.'
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. «Arpa», «lira» y «el alba» son buenas decisiones. La repetición léxica de עור se preserva mejor con «Despierta… yo despertaré…».
  issues:
  - severity: medium
    issue: Imperativo plural «¡Despierten!» para un hebreo singular poético
    rationale: עוּרָה es singular imperativo. Aunque el español puede flexibilizar concordancia en vocativos poéticos, aquí «¡Despierta, arpa y lira!» refleja mejor la forma hebrea y su efecto retórico.
  - severity: medium
    issue: Nota al pie mal redactada y poco fiel al rastro de auditoría inglés
    rationale: 'La nota española dice «O: “¡Despierta!”, o “yo despertaré el alba”», pero «yo despertaré el alba» no es alternativa, sino el texto principal. La nota debe explicar alternativas para la segunda cláusula («despertaré», «haré despertar», «la mañana») y la imagen poética.'
  revised_spanish_text: ¡Despierta[a], arpa y lira; yo despertaré el alba!
  revised_footnotes:
  - marker: a
    text: 'O «despertaré el amanecer» o «haré despertar la mañana». El hebreo presenta una imagen poética vívida: levantarse antes del amanecer para alabar a Dios.'
