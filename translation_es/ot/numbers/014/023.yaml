review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido fuente: la fórmula hebrea de juramento con אִם se interpreta correctamente como negación enfática, «la tierra» preserva el idiom bíblico, «juré» refleja bien נִשְׁבַּעְתִּי, y «a sus padres» sigue la decisión documentada. También mantiene bien «los que me despreciaron».'
  spanish_quality_summary: 'El español es claro y digno, pero hay un problema gramatical serio en la segunda cláusula: «ninguno de los que me despreciaron la verá» cambia indebidamente el predicado de plural a singular y produce discordancia con «los que...». Debe expresarse en plural: «ninguno de los que me despreciaron la verá» no es natural ni fiel a לֹא יִרְאוּהָ; lo natural y fiel es «ninguno de los que me despreciaron la verá» solo si el antecedente fuera singular personal, lo cual no ocurre aquí. La forma correcta es «ninguno de los que me despreciaron verá[a?]» o mejor «ninguno de los que me despreciaron verá la tierra / la verá» pero con verbo singular por ‘ninguno’; sin embargo, el problema real es que el hebreo distribuye sobre el grupo plural, y en español la estructura más natural es «ninguno de los que me despreciaron verá la tierra» o «ninguno de los que me despreciaron la verá». Aun así, la frase dada suena aceptable para muchos hablantes; la revisión recomendada es estilística
    y de claridad, no de sentido básico. Más importante: conviene capitalizar la frase inicial según puntuación de versículo y mantener mejor fluidez con «Ellos ciertamente no verán...» o simplemente sin sujeto expreso. La mejor reparación mínima es quitar la posible rareza y reforzar claridad con «ninguno de los que me despreciaron verá la tierra».'
  glossary_alignment: No hay conflicto con la terminología del proyecto. No aparece Yahvé, Mesías, Cristo, esclavo, etc. «Padres» concuerda con la política documentada frente a «antepasados», preservando la alternativa en nota. «Despreciaron» refleja adecuadamente נאץ.
  issues:
  - severity: medium
    issue: Segunda cláusula mejorable por claridad y naturalidad
    rationale: 'Aunque «ninguno de los que me despreciaron la verá» puede entenderse, suena menos natural que repetir el objeto: «verá la tierra». La repetición ayuda a reflejar el énfasis judicial del hebreo y evita tropiezo sintáctico en español bíblico contemporáneo.'
  - severity: low
    issue: Inicio en minúscula
    rationale: 'Como texto de versículo independiente, conviene iniciar con mayúscula en la presentación final: «Ciertamente...».'
  revised_spanish_text: Ciertamente no verán la tierra que juré a sus padres[a][b], y ninguno de los que me despreciaron verá la tierra.
