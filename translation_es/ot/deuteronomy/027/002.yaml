revisions:
- from: Y sucederá que, el día en que crucen el Jordán hacia la tierra que Yahvé su Dios les da, levantarás para ti piedras grandes y las cubrirás con cal[a].
  to: Y sucederá que el día en que crucen el Jordán a la tierra que Yahvé tu Dios te da, levantarás para ti piedras grandes y las recubrirás con cal[a].
  rationale: 'Se corrigió la cláusula central para preservar los pronombres de segunda persona singular del hebreo y del audit trail POB: «Yahvé tu Dios te da». Se mantuvo la mezcla de plural («crucen») y singular («levantarás», «para ti», «te da») porque forma parte del texto fuente y no debe resolverse mediante una paráfrasis con tercera persona. «A la tierra» refleja mejor la entrada al territorio prometido que «hacia la tierra». «Las recubrirás con cal» expresa mejor el verbo de revestir que el genérico «cubrirás». Se conservó «Yahvé» conforme al glosario del proyecto y se retuvo una nota léxica breve y clara sobre «cal/yeso».'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:40:59Z'
review_pass:
  verdict: revise
  source_alignment_summary: El borrador conserva el sentido general del versículo, pero no refleja fielmente varios detalles del hebreo ni del rastro de auditoría POB. La mezcla de segunda persona plural y singular del original debe preservarse en español en vez de resolverse con pronombres de tercera persona plural. Además, «hacia la tierra» debilita la idea de entrada a la tierra, y «las cubrirás con cal» pierde la fuerza léxica más específica de שׂדָה como enlucir/recubrir con yeso o cal.
  spanish_quality_summary: El español es legible, pero «Y sucederá que, el día en que...» suena algo forzado por la coma y por un giro más pesado de lo necesario. También hay discordancia poco natural entre «crucen» y «levantarás», y «Yahvé su Dios les da» introduce una referencia pronominal ajena al texto fuente. Una redacción más natural y fiel mantiene el contraste original sin recurrir a tercera persona.
  glossary_alignment: 'Se acierta en usar «Yahvé». Sin embargo, el proyecto favorece preservar la forma singular de «tu Dios» donde el hebreo la tiene, aunque el contexto sea colectivo. También conviene acercarse más a la decisión inglesa sobre el verbo de revestir: no un genérico «cubrir», sino «recubrir/enlucir/revestir» con nota léxica sobre «cal/yeso».'
  issues:
  - severity: high
    issue: Pronombres alterados de 2.ª persona a 3.ª persona en «Yahvé su Dios les da»
    rationale: El hebreo dice literalmente «Yahvé tu Dios te da» dentro de un contexto con otros verbos plurales/singulares mezclados. Cambiar a «su Dios les da» no preserva la forma ni la fuerza del original y resuelve indebidamente una tensión textual que el POB decidió conservar.
  - severity: high
    issue: Inconsistencia pronominal no fiel en «crucen ... levantarás»
    rationale: El hebreo tiene plural en «crucéis/crucen» y luego singular en «levantarás». Esa mezcla puede conservarse en español, pero el borrador la combina con un cambio a tercera persona en la cláusula intermedia, creando una estructura menos fiel y menos clara.
  - severity: medium
    issue: «hacia la tierra» debilita «אל הארץ» en contexto de entrada
    rationale: Aquí no se trata solo de dirección general, sino de cruce del Jordán para entrar en la tierra. «A la tierra» o «en la tierra» refleja mejor el movimiento hacia el destino del pacto que «hacia la tierra».
  - severity: medium
    issue: «las cubrirás con cal» es demasiado genérico para שׂדָה
    rationale: Aunque no es incorrecto, el verbo hebreo se refiere específicamente a recubrir/enlucir con una capa de cal/yeso. «Recubrirás» o «enlucirás» comunica mejor el valor léxico sin perder naturalidad.
  - severity: low
    issue: Puntuación y arranque algo pesados en «Y sucederá que, el día...»
    rationale: 'La coma tras «que» no ayuda, y el inicio puede simplificarse para sonar bíblico-moderno y natural: «Y sucederá que el día en que...» o incluso «Y el día en que...»; dado el audit trail, conviene mantener el giro pero con mejor puntuación.'
  revised_spanish_text: Y sucederá que el día en que crucen el Jordán a la tierra que Yahvé tu Dios te da, levantarás para ti piedras grandes y las recubrirás con cal[a].
  revised_footnotes:
  - marker: a
    text: O «las recubrirás con yeso»; el sustantivo hebreo se refiere a cal o yeso usado como revestimiento.
    reason: lexical_alternative
  revision_rationale: 'Se corrigió la cláusula central para preservar los pronombres de segunda persona singular del hebreo y del audit trail POB: «Yahvé tu Dios te da». Se mantuvo la mezcla de plural («crucen») y singular («levantarás», «para ti», «te da») porque forma parte del texto fuente y no debe resolverse mediante una paráfrasis con tercera persona. «A la tierra» refleja mejor la entrada al territorio prometido que «hacia la tierra». «Las recubrirás con cal» expresa mejor el verbo de revestir que el genérico «cubrirás». Se conservó «Yahvé» conforme al glosario del proyecto y se retuvo una nota léxica breve y clara sobre «cal/yeso».'
