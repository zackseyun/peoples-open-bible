translation:
  language: es
  text: 'Deja la ira y abandona el furor; no te irrites[a]: solo conduce al mal[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no te exasperes» o «no te dejes provocar». El verbo hebreo también puede traducirse «no te inquietes» o «no te agites».'
    reason: lexical_alternative
  - marker: b
    text: 'Más literalmente: «solo para hacer el mal».'
    reason: alternative_reading
lexical_decisions:
- source_word: הֶרֶף
  english_pob_choice: Let go of
  chosen_spanish: Deja
  alternatives_spanish:
  - Suelta
  - Deja ir
  - Refrénte de
  lexicon: HALOT
  rationale: El imperativo expresa la idea de soltar o cesar; en español, 'deja' comunica con naturalidad la acción de soltar una emoción sin volverlo forzado.
- source_word: מֵאַף
  english_pob_choice: anger
  chosen_spanish: la ira
  alternatives_spanish:
  - la cólera
  - el enojo
  - la indignación
  lexicon: HALOT
  rationale: El hebreo usa 'nariz' como figura para la ira; el sentido idiomático debe pasar a un término natural en español. 'Ira' mantiene el registro bíblico y distingue bien el primer miembro del segundo.
- source_word: וַעֲזֹב
  english_pob_choice: and abandon
  chosen_spanish: y abandona
  alternatives_spanish:
  - y deja
  - y suelta
  - y abandona por completo
  lexicon: HALOT
  rationale: עָזַב suele significar dejar, abandonar o desamparar. 'Abandona' conserva la fuerza del paralelo imperativo y evita suavizar la exhortación.
- source_word: חֵמָה
  english_pob_choice: wrath
  chosen_spanish: el furor
  alternatives_spanish:
  - la furia
  - la cólera
  - el enojo ardiente
  lexicon: HALOT
  rationale: '''Furor'' transmite el matiz de ira encendida y mantiene la distinción poética respecto de ''ira'' en la primera cola.'
- source_word: אַל תִּתְחַר
  english_pob_choice: do not be provoked
  chosen_spanish: no te enojes
  alternatives_spanish:
  - no te irrites
  - no te provoques
  - no te exasperes
  lexicon: HALOT
  rationale: El hitpael de חרה puede aludir a calentarse, irritarse o irritar el ánimo. La revisión inglesa optó por 'do not be provoked' para reflejar el efecto emocional; en español, 'no te enojes' reproduce de manera clara y natural esa prohibición sin introducir una pasiva poco idiomática.
- source_word: אַךְ
  english_pob_choice: only
  chosen_spanish: porque eso solo
  alternatives_spanish:
  - solo
  - únicamente
  - porque solo
  lexicon: HALOT
  rationale: '''אַךְ'' marca restricción o resultado adverso. En español, incorporar ''solo'' en la cláusula causal mantiene la idea de limitación y prepara el desenlace moral.'
- source_word: לְהָרֵעַ
  english_pob_choice: leads to evil
  chosen_spanish: lleva al mal
  alternatives_spanish:
  - lleva a hacer el mal
  - conduce al mal
  - lleva a la maldad
  lexicon: HALOT
  rationale: El infinitivo puede entenderse de forma resultativa o final. 'Lleva al mal' conserva la advertencia ética sin sobreexplicar el mecanismo, y es una equivalencia natural para el lector español.
theological_decisions:
- issue: Relación entre la ira y el resultado moral final
  english_pob_reading: 'The clause is a warning about the result of angry agitation: ''it only leads to evil.'''
  chosen_spanish_reading: 'La cláusula advierte sobre el resultado de la agitación iracunda: ''porque eso solo lleva al mal.'''
  alternative_spanish_readings:
  - porque eso solo lleva a hacer el mal
  - porque eso únicamente conduce al mal
  - pues eso termina en mal
  rationale: La hebra final no solo prohíbe una emoción, sino que advierte de su desenlace ético. La formulación elegida conserva esa relación causal sin añadir doctrina extra ni diluir la amonestación.
  doctrine_reference: Poética sapiencial y ética bíblica del dominio de la ira
translation_notes:
  revision_awareness: La revisión inglesa reemplazó una traducción más literal de תִּתְחַר por una expresión más natural ('do not be provoked'). La versión española sigue esa misma intención revisada con 'no te enojes', que comunica de forma idiomática la prohibición sin perder el tono exhortativo ni la relación con el resultado moral final.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto cuando aparezca el nombre divino; este verso no lo contiene.
  - Se distingue 'ira' de 'furor' para conservar el paralelismo y la progresión semántica del hebreo.
  - '''Mal'' se usa en sentido ético general, no meramente como desgracia.'
  - La redacción evita el calco 'no seas provocado', poco natural en español.
  - Las notas a y b preservan la alternativa léxica donde el hebreo permite matiz figurado y poético.
