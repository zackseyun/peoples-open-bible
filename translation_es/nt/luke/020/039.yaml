lexical_decisions:
- source_word: ἀποκριθέντες
  english_pob_choice: answered
  chosen_spanish: respondieron
  alternatives_spanish:
  - contestaron
  - dijeron
  lexicon: BDAG
  rationale: El participio aoristo introduce una respuesta verbal. En español, «respondieron» conserva el valor de réplica y suena natural en el flujo narrativo, sin necesidad de forzar un gerundio.
- source_word: δέ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Ahora
  lexicon: BDAG
  rationale: La partícula marca transición suave en la narración. «Entonces» reproduce bien ese enlace discursivo en español sin exagerar contraste.
- source_word: τινες τῶν γραμματέων
  english_pob_choice: some of the scribes
  chosen_spanish: algunos de los escribas
  alternatives_spanish:
  - unos escribas
  - ciertos escribas
  lexicon: BDAG
  rationale: La construcción partitiva se expresa de forma directa con «algunos de los escribas», dejando claro que responde solo un subconjunto.
- source_word: γραμματέων
  english_pob_choice: scribes
  chosen_spanish: escribas
  alternatives_spanish:
  - maestros de la ley
  - expertos en la Ley
  lexicon: BDAG
  rationale: «Escribas» es la correspondencia estándar y suficientemente transparente para γραμματεῖς en el contexto evangélico; las alternativas añaden interpretación.
- source_word: Διδάσκαλε
  english_pob_choice: Teacher
  chosen_spanish: Maestro
  alternatives_spanish:
  - Maestro de la Ley
  - Profesor
  lexicon: BDAG
  rationale: El vocativo expresa la dirección respetuosa al hablante. En español, «Maestro» es natural y comunica el sentido básico sin introducir connotaciones ajenas.
- source_word: καλῶς
  english_pob_choice: well
  chosen_spanish: bien
  alternatives_spanish:
  - correctamente
  - rectamente
  lexicon: BDAG
  rationale: El adverbio elogia la calidad o corrección de la afirmación de Jesús. «Bien» es la forma más natural y amplia en español, manteniendo el valor commendatorio.
- source_word: εἶπας
  english_pob_choice: you have spoken
  chosen_spanish: has hablado
  alternatives_spanish:
  - has dicho
  - has dicho correctamente
  lexicon: BDAG
  rationale: El aoristo puede traducirse de modo idiomático con perfecto en la aprobación directa. «Has hablado» mantiene el foco en el acto discursivo; «bien» ya transmite la valoración.
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia entre la fuente griega y el control auditado en inglés; no se detectaron revisiones aplicadas en el tramo de referencia, y la formulación española sigue de cerca esa lectura sin introducir matices no atestiguados.
  spanish_consistency_notes:
  - Se mantiene «escribas» como término técnico consistente con la terminología evangélica estándar.
  - Se evita «SEÑOR» o equivalentes teológicos porque el verso no contiene referencias al nombre divino ni al título κύριος.
  - La puntuación y el vocativo respetan el discurso directo breve del griego.
