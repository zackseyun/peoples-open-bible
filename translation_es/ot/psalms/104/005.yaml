translation:
  language: es
  text: Él fundó la tierra sobre sus cimientos[a]; no será sacudida por siempre y para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estableció la tierra sobre sus bases»; el hebreo usa una imagen arquitectónica para la estabilidad del mundo.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָסַד
  english_pob_choice: founded
  chosen_spanish: fundó
  alternatives_spanish:
  - estableció
  - puso los cimientos de
  lexicon: HALOT
  rationale: El verbo hebreo expresa fundar o establecer mediante una base firme. «Fundó» conserva la imagen arquitectónica del texto y suena natural en español.
- source_word: אֶרֶץ
  english_pob_choice: earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el mundo
  lexicon: HALOT
  rationale: En este himno de creación, el sentido global es el de la tierra como ámbito creado; «la tierra» comunica bien la referencia sin forzar una precisión científica.
- source_word: מְכוֹנֶיהָ
  english_pob_choice: its foundations
  chosen_spanish: sus cimientos
  alternatives_spanish:
  - sus fundamentos
  - sus bases
  lexicon: HALOT
  rationale: El sustantivo apunta a base, soporte o fundamento fijo. «Cimientos» mantiene la metáfora arquitectónica con claridad en español.
- source_word: בַּל
  english_pob_choice: will not
  chosen_spanish: 'no'
  alternatives_spanish:
  - no... jamás
  - nunca
  lexicon: HALOT
  rationale: La partícula niega el verbo siguiente. En español basta con «no» dentro de la construcción verbal; el sentido de permanencia queda reforzado por el contexto y por la expresión final de duración.
- source_word: תִּמּוֹט
  english_pob_choice: be shaken
  chosen_spanish: será sacudida
  alternatives_spanish:
  - será movida
  - vacilará
  - se tambaleará
  lexicon: HALOT
  rationale: El nifal de מוט comunica ser movido o sacudido, es decir, perder estabilidad. «Será sacudida» mantiene la imagen de inestabilidad física sin suavizarla demasiado.
- source_word: עוֹלָם וָעֶד
  english_pob_choice: forever and ever
  chosen_spanish: jamás y para siempre
  alternatives_spanish:
  - por siempre y para siempre
  - eternamente
  lexicon: HALOT
  rationale: La expresión hebrea intensifica la duración. «Jamás y para siempre» reproduce en español el énfasis acumulativo de manera idiomática y solemne.
theological_decisions:
- issue: Lenguaje cosmológico e imaginería de estabilidad
  english_pob_reading: Retain the psalm's phenomenological and architectural imagery without flattening it into modern scientific prose.
  chosen_spanish_reading: Conservar la imaginería de fundación y firmeza sin convertirla en prosa científica moderna.
  alternative_spanish_readings:
  - Él colocó la tierra de modo que no puede moverse
  - Él aseguró firmemente el mundo
  rationale: El verso usa lenguaje poético sobre la estabilidad de la tierra. «Fundó... sobre sus cimientos» y «no será sacudida» preservan la imagen sin reinterpretarla según categorías modernas.
  doctrine_reference: 'Philosophy of translation: preservar la tensión teológica del poema; primacía del texto original sobre la tradición de traducción.'
translation_notes:
  revision_awareness: El borrador sigue el pasaje hebreo y el audit trail en inglés sin cambios relevantes respecto de la última revisión; se mantiene la imagen arquitectónica y la intensificación final de duración.
  spanish_consistency_notes:
  - Se usa «la tierra» para אֶרֶץ, acorde con el contexto cósmico del salmo.
  - «Cimientos» conserva el paralelismo con la nota alternativa de «bases», sin sustituir el valor metafórico.
  - «Ser sacudida» refleja היטב la pasividad y la inestabilidad del nifal hebreo.
  - La fórmula final «jamás y para siempre» busca reproducir la duplicación enfática de עוֹלָם וָעֶד.
