translation:
  language: es
  text: 'Los hijos de Sem: Elam[a], Asur, Arpacsad, Lud y Aram; Uz, Hul, Geter y Mesec.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Génesis 10:23 lee «Mash» en lugar de «Mesec» en la genealogía paralela.
    reason: textual_variant
lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Los descendientes de
  lexicon: HALOT
  rationale: En una genealogía, la construcción plural de בן se expresa de forma directa con "hijos de". "Descendientes de" también es posible, pero suaviza el vínculo genealógico inmediato del hebreo.
- source_word: שֵׁם
  english_pob_choice: Shem
  chosen_spanish: Sem
  alternatives_spanish:
  - Shem
  lexicon: HALOT
  rationale: Nombre propio bíblico; en español bíblico estándar se usa "Sem" para este patriarca, manteniendo la forma reconocible y estable en castellano.
- source_word: עֵילָם
  english_pob_choice: Elam
  chosen_spanish: Elam
  lexicon: HALOT
  rationale: Nombre propio/topónimo transliterado de manera estándar en español bíblico.
- source_word: אַשּׁוּר
  english_pob_choice: Asshur
  chosen_spanish: Asur
  alternatives_spanish:
  - Asiria
  lexicon: HALOT
  rationale: En esta lista genealógica funciona como nombre propio del antepasado, no como designación del imperio. Por eso se prefiere "Asur"; "Asiria" cambiaría el referente histórico.
- source_word: אַרְפַּכְשַׁד
  english_pob_choice: Arpachshad
  chosen_spanish: Arpajsad
  alternatives_spanish:
  - Arfaxad
  lexicon: HALOT
  rationale: Se conserva la transliteración cercana al hebreo, en lugar de la forma tradicional más mediada por la tradición griega/inglesa.
- source_word: לוּד
  english_pob_choice: Lud
  chosen_spanish: Lud
  alternatives_spanish:
  - Ludim
  lexicon: HALOT
  rationale: Aquí el hebreo presenta un nombre singular propio, no el etnónimo plural. "Lud" es la forma exacta para este contexto.
- source_word: אֲרָם
  english_pob_choice: Aram
  chosen_spanish: Aram
  alternatives_spanish:
  - Siria
  lexicon: HALOT
  rationale: En contexto genealógico, "Aram" preserva el nombre del antepasado; "Siria" desplazaría el sentido hacia la entidad territorial posterior.
- source_word: עוּץ
  english_pob_choice: Uz
  chosen_spanish: Uz
  alternatives_spanish:
  - Uts
  lexicon: HALOT
  rationale: Nombre propio transliterado en forma breve y reconocible en español.
- source_word: חוּל
  english_pob_choice: Hul
  chosen_spanish: Hul
  alternatives_spanish:
  - Jul
  lexicon: HALOT
  rationale: Nombre propio conservado con transliteración simple y legible.
- source_word: גֶתֶר
  english_pob_choice: Gether
  chosen_spanish: Geter
  alternatives_spanish:
  - Géter
  lexicon: HALOT
  rationale: Nombre propio transliterado de forma directa al español; se evita una acentuación no requerida por el hebreo.
- source_word: מֶשֶׁךְ
  english_pob_choice: Meshech
  chosen_spanish: Mesec
  alternatives_spanish:
  - Mash
  lexicon: HALOT
  rationale: Se sigue el texto masorético, pero se conserva la tensión textual con la forma paralela de Génesis 10:23 en nota. En español, "Mesec" reproduce la forma bíblica usual.
translation_notes:
  revision_awareness: El texto base inglés eliminó el segundo "and" después del punto y coma para hacer más natural la lista; en español se refleja la misma división con punto y coma sin repetir una conjunción innecesaria. La decisión de mantener "Mesec" en el cuerpo del texto sigue el texto masorético, mientras que la variante paralela se preserva en la nota.
  spanish_consistency_notes:
  - Se mantiene el estilo genealógico sobrio y lineal.
  - Los nombres propios se presentan con formas españolas bíblicas comunes cuando existen (Sem, Asur, Arpajsad, Mesec), y con transliteración directa cuando es pertinente.
  - Se conserva el punto y coma para reflejar la estructura hebrea de la lista.
  - La nota textual marca explícitamente la variante de Génesis 10:23 sin introducir armonización en el texto principal.
