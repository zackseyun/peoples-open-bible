translation:
  language: es
  text: Porque fui afligido[a] todo el día, y recibía corrección[b] cada mañana.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «herido» o «azotado» para «afligido».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «y mi corrección/reprensión [fue] en las mañanas»; el sentido es una corrección o disciplina recurrente cada mañana.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֱהִי
  english_pob_choice: For I was
  chosen_spanish: Porque fui
  alternatives_spanish:
  - Y fui
  - Así que fui
  lexicon: HALOT
  rationale: El waw consecutivo/explicativo al comienzo da una relación de causa o explicación respecto del contexto anterior; en español, «Porque fui» comunica esa función con naturalidad y conserva el pasado de היה.
- source_word: נָגוּעַ
  english_pob_choice: afflicted
  chosen_spanish: afligido
  alternatives_spanish:
  - herido
  - castigado
  - azotado
  lexicon: HALOT
  rationale: El participio pasivo/adjetival de נגע expresa haber sido golpeado o afligido. «Afligido» mantiene el sentido amplio sin concretarlo indebidamente como enfermedad, castigo específico o simple dolor físico.
- source_word: כָּל הַיּוֹם
  english_pob_choice: all day long
  chosen_spanish: todo el día
  alternatives_spanish:
  - durante todo el día
  - todo el día entero
  lexicon: HALOT
  rationale: La expresión idiomática denota duración continua durante el día. «Todo el día» es la forma española más natural y fiel.
- source_word: וְתוֹכַחְתִּי
  english_pob_choice: and chastened
  chosen_spanish: y corregido
  alternatives_spanish:
  - y reprendido
  - y disciplinado
  - y mi corrección
  lexicon: HALOT
  rationale: תּוֹכַחַת con sufijo de primera persona puede ser «mi reprensión/corrección», pero en este contexto describe la experiencia recibida por el salmista. «Corregido» conserva la idea de disciplina/corrección sin reducirla a una mera reprensión verbal.
- source_word: לַבְּקָרִים
  english_pob_choice: every morning
  chosen_spanish: cada mañana
  alternatives_spanish:
  - por las mañanas
  - mañana tras mañana
  lexicon: HALOT
  rationale: El plural con preposición funciona distributivamente. «Cada mañana» expresa con claridad el carácter recurrente de la acción.
theological_decisions:
- issue: Naturaleza del sufrimiento y de la corrección
  english_pob_reading: General divine affliction/discipline language without specifying sickness or punitive wrath
  chosen_spanish_reading: Lenguaje general de aflicción y corrección, sin precisar enfermedad ni ira punitiva
  alternative_spanish_readings:
  - aflicción física concreta
  - reprensión meramente verbal
  - castigo retributivo específico
  rationale: El hebreo es amplio y permite tanto la idea de ser herido/afligido como la de corrección recibida. La traducción española debe preservar esa amplitud y no cerrar el sentido hacia una sola explicación.
  doctrine_reference: Salmo 73:14; cf. el paralelismo hebreo entre aflicción y corrección
- issue: Valor de תּוֹכַחַת
  english_pob_reading: correction/rebuke experienced by the psalmist
  chosen_spanish_reading: corrección experimentada por el salmista
  alternative_spanish_readings:
  - reprensión
  - disciplina
  - amonestación
  rationale: En la sintaxis del versículo, el término no funciona sólo como palabra hablada sino como una experiencia de corrección. «Corregido» preserva esa fuerza experiencial y el vínculo con la disciplina continua.
  doctrine_reference: Proverbios 3:11-12; Salmo 73:14
translation_notes:
  revision_awareness: El texto inglés auditado mantiene la lectura de aflicción general y de corrección recurrente; la versión española conserva esa amplitud, evitando especificar enfermedad o mero reproche verbal. Se ha respetado también el matiz distributivo de «morning(s)» con una expresión natural en español.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto sólo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se prefirió «afligido» y «corregido» por su compatibilidad con el campo semántico amplio de נגע y תּוֹכַחַת.
  - La puntuación sigue una construcción fluida en español sin añadir contenido interpretativo ajeno al hebreo.
