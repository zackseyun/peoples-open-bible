translation:
  language: es
  text: Llevaba un casco de bronce sobre la cabeza, y estaba vestido con una coraza de escamas[a]; y el peso de la coraza era de cinco mil siclos[b] de bronce.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'coraza de malla'. El hebreo describe más específicamente una armadura hecha de escamas superpuestas.
    reason: lexical_alternative
  - marker: b
    text: Cinco mil siclos equivalen aproximadamente a 57 kilogramos, o unas 125 libras.
    reason: cultural_note
lexical_decisions:
- source_word: כּוֹבַע
  english_pob_choice: helmet
  chosen_spanish: casco
  alternatives_spanish:
  - yelmo
  - helmeta
  lexicon: HALOT
  rationale: En contexto militar, el término nombra una protección para la cabeza. 'Casco' es el equivalente natural en español moderno; 'yelmo' suena arcaico y 'helmeta' no es idiomático.
- source_word: נְחֹשֶׁת
  english_pob_choice: bronze
  chosen_spanish: bronce
  alternatives_spanish:
  - cobre
  lexicon: HALOT
  rationale: En este contexto de armamento, 'bronce' reproduce bien el valor material convencional en castellano bíblico y evita una precisión química ajena al uso literario.
- source_word: שִׁרְיוֹן
  english_pob_choice: coat
  chosen_spanish: coraza
  alternatives_spanish:
  - armadura
  - coselete
  lexicon: HALOT
  rationale: El hebreo designa una pieza de protección corporal. Como el complemento 'de escamas' ya especifica el tipo, 'coraza' comunica con claridad un armazón defensivo portátil sin crear redundancia. 'Armadura' es más general y 'coselete' es menos transparente.
- source_word: קַשְׂקַשִּׂים
  english_pob_choice: scale armor
  chosen_spanish: de escamas
  alternatives_spanish:
  - escamosa
  - de malla
  lexicon: HALOT
  rationale: El plural describe la construcción de la coraza mediante placas o escamas superpuestas. 'De escamas' conserva la imagen concreta y evita confundirla con cota de malla.
- source_word: הוּא לָבוּשׁ
  english_pob_choice: he was clothed with
  chosen_spanish: estaba vestido con
  alternatives_spanish:
  - llevaba
  - iba vestido con
  lexicon: HALOT
  rationale: La construcción verbal expresa un estado de estar provisto de la armadura. 'Estaba vestido con' mantiene ese matiz estatativo de manera natural en español.
- source_word: מִשְׁקַל
  english_pob_choice: weight
  chosen_spanish: peso
  alternatives_spanish:
  - pesaba
  lexicon: HALOT
  rationale: El sustantivo nombra la medida de pesadez del objeto. 'Peso' es la traducción directa y apropiada en una descripción técnica.
- source_word: חֲמֵשֶׁת אֲלָפִים שְׁקָלִים
  english_pob_choice: five thousand shekels
  chosen_spanish: cinco mil siclos
  alternatives_spanish:
  - cinco mil shekels
  - unos cinco mil siclos
  lexicon: HALOT
  rationale: Se preserva la unidad antigua como en el inglés POB para mantener transparencia y audibilidad del dato. 'Siclo' es la forma estable en español bíblico.
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto hebreo y conserva la precisión militar y métrica del original, en continuidad con la decisión inglesa de mantener la unidad antigua y aclararla solo en nota.
  spanish_consistency_notes:
  - Se usó 'bronce' de manera consistente para נְחֹשֶׁת, en armonía con el audit trail en inglés.
  - Se evitó 'cota de malla' en el cuerpo del texto porque el hebreo no describe malla entrelazada, sino escamas superpuestas.
  - '''Coraza de escamas'' mantiene la imagen sin introducir una equivalencia técnica demasiado estrecha.'
  - Se prefirió 'siclos' como forma bíblica castellana estable y legible para lectores eclesiales.
