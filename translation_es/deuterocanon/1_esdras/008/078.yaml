translation:
  language: es
  text: pero nos ha mostrado favor[a] delante de los reyes de Persia, para darnos sustento y glorificar nuestro santuario y levantar a Sión desolada, para darnos una fortaleza[b] en Judea y Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘nos ha hecho objeto de favor’ o ‘nos ha tratado con gracia’.
    reason: alternative_reading
  - marker: b
    text: O ‘un firme apoyo’ o ‘seguridad’.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐποίησεν ἡμᾶς ἐν χάριτι ἐνώπιον
  english_pob_choice: has shown us favor before
  chosen_spanish: nos ha mostrado favor
  alternatives_spanish:
  - nos ha hecho objeto de favor
  - nos ha tratado con gracia
  lexicon: BDAG
  rationale: 'La expresión griega es idiomática: no solo indica ‘gracia’ como cualidad, sino el hecho de situarnos en una relación favorable ante otros. En español, ‘ha mostrado favor’ conserva esa relación de benevolencia de modo natural y fiel.'
- source_word: τῶν βασιλέων Περσῶν
  english_pob_choice: the kings of Persia
  chosen_spanish: los reyes de Persia
  alternatives_spanish:
  - los reyes persas
  lexicon: BDAG
  rationale: Se mantiene la construcción posesiva sencilla del griego y del POB inglés. ‘Persia’ preserva el marco histórico sin necesidad de reordenar el sintagma.
- source_word: δοῦναι ἡμῖν τροφήν
  english_pob_choice: to give us sustenance
  chosen_spanish: para darnos sustento
  alternatives_spanish:
  - para darnos alimento
  - para proveernos
  lexicon: BDAG
  rationale: τροφή puede ser ‘alimento’, pero aquí el contexto de apoyo real y restauración amplia favorece ‘sustento’, que mantiene la idea de provisión sin reducirla solo a comida.
- source_word: δοξάσαι τὸ ἱερὸν ἡμῶν
  english_pob_choice: to glorify our sanctuary
  chosen_spanish: glorificar nuestro santuario
  alternatives_spanish:
  - honrar nuestro templo
  - dar esplendor a nuestro santuario
  lexicon: BDAG
  rationale: ἱερόν se refiere al santuario/templo en su ámbito sagrado. ‘Glorificar’ reproduce la fuerza de δοξάζω y evita sustituir el término por una paráfrasis más amplia.
- source_word: ἐγεῖραι τὴν ἔρημον Σειών
  english_pob_choice: to raise up desolate Zion
  chosen_spanish: levantar a Sión desolada
  alternatives_spanish:
  - restaurar a Sión desolada
  - reconstruir la desolada Sión
  lexicon: BDAG
  rationale: ἐγείρω admite la idea de levantar, alzar o restaurar. ‘Levantar’ conserva la metáfora y no especifica más de lo que el griego dice; ‘desolada’ traduce ἔρημος con naturalidad.
- source_word: στερέωμα
  english_pob_choice: a stronghold
  chosen_spanish: un lugar firme
  alternatives_spanish:
  - una fortaleza
  - seguridad
  - un firme apoyo
  lexicon: LSJ
  rationale: En este contexto de asentamiento posrestauración, στερέωμα apunta a firmeza, estabilidad o establecimiento seguro. ‘Un lugar firme’ preserva esa amplitud y deja abierta la alternativa documentada en el POB inglés de ‘firm footing’ o ‘security’.
- source_word: ἐν τῇ Ἰουδαίᾳ καὶ Ἰερουσαλήμ
  english_pob_choice: in Judea and Jerusalem
  chosen_spanish: en Judea y Jerusalén
  alternatives_spanish:
  - en Judá y Jerusalén
  lexicon: BDAG
  rationale: ‘Judea’ refleja el nombre geográfico de la época persa y sigue la decisión del POB inglés. Jerusalén se mantiene sin cambio por ser el topónimo habitual y claro en español.
theological_decisions:
- issue: Σειών como nombre de lugar mesiánico/restaurativo
  english_pob_reading: Zion
  chosen_spanish_reading: Sión
  alternative_spanish_readings:
  - Sion
  rationale: Se conserva el nombre bíblico transliterado como topónimo, sin interpretarlo ni sustituirlo por otra designación teológica. ‘Sión’ es la forma más reconocible y estándar en español bíblico.
  doctrine_reference: Translate titles; transliterate names.
- issue: Sentido de στερέωμα en un contexto de restauración nacional
  english_pob_reading: a stronghold
  chosen_spanish_reading: un lugar firme
  alternative_spanish_readings:
  - una fortaleza
  - seguridad
  - estabilidad
  rationale: El término puede sugerir fortaleza material o estabilidad de asentamiento. ‘Un lugar firme’ evita cerrar el sentido solo en una imagen militar y conserva la noción de establecimiento seguro en Judea y Jerusalén.
  doctrine_reference: Consistency of key terms, or documented exception.
translation_notes:
  revision_awareness: 'La revisión más reciente indicó que no eran necesarios cambios adicionales; este borrador sigue de cerca el texto griego y la solución auditada en inglés, manteniendo las dos tensiones léxicas principales: χάρις como favor relacional y στερέωμα como firmeza/establecimiento seguro.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ por norma del proyecto solo cuando aparezca el tetragrámaton; aquí no aparece, por lo que no se introduce.
  - ‘Sión’ se conserva como nombre propio bíblico; no se traduce como ‘Sion’.
  - ‘Santuario’ se prefiere a ‘templo’ para respetar ἱερόν y la decisión inglesa auditada.
  - ‘Sustento’ mantiene un alcance más amplio que ‘alimento’, acorde con la provisión real implícita en el pasaje.
