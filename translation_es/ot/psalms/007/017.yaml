translation:
  language: es
  text: Su mal[a] volverá sobre su propia cabeza[b], y su violencia descenderá sobre su cráneo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su maldad» o «su perjuicio». El hebreo עָמָל puede denotar mal, perjuicio o conducta dañina en este contexto.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la coronilla de su cabeza». El hebreo קָדְקֹד designa la parte superior o coronilla de la cabeza.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָשׁוּב
  english_pob_choice: returns
  chosen_spanish: volverá
  alternatives_spanish:
  - retornará
  - regresará
  lexicon: HALOT
  rationale: El verbo hebreo expresa reversión/retorno de una consecuencia. «Volverá» conserva la idea de retribución que recae sobre el mismo sujeto y suena natural en español poético.
- source_word: עֲמָלוֹ
  english_pob_choice: his trouble
  chosen_spanish: su daño
  alternatives_spanish:
  - su maldad
  - su aflicción
  - su miseria
  lexicon: HALOT
  rationale: En este contexto retributivo, עָמָל puede señalar el mal perjudicial o la conducta dañina que produce consecuencias. «Daño» evita reducirlo a mera «fatiga» o «trabajo» y mantiene la fuerza negativa sin forzar una interpretación más estrecha que la del hebreo.
- source_word: בְּרֹאשׁוֹ
  english_pob_choice: on his own head
  chosen_spanish: sobre su propia cabeza
  alternatives_spanish:
  - en su cabeza
  - sobre su cabeza
  lexicon: HALOT
  rationale: La expresión idiomática se conserva de forma natural en español. «Su propia» explicita el valor reflexivo de בְּרֹאשׁוֹ y mantiene el paralelismo con la segunda línea.
- source_word: קָדְקֳדוֹ
  english_pob_choice: his own skull
  chosen_spanish: su cráneo
  alternatives_spanish:
  - la coronilla
  - la parte superior de su cabeza
  - su cabeza
  lexicon: HALOT
  rationale: קָדְקֹד refiere al vértice o parte superior de la cabeza; en español «cráneo» transmite la imagen concreta y severa elegida por el inglés POB, aunque con un registro menos idiomático. Se mantiene así la intensificación poética del paralelismo.
- source_word: חֲמָסוֹ
  english_pob_choice: his violence
  chosen_spanish: su violencia
  alternatives_spanish:
  - su injusticia
  - su abuso
  - su maldad violenta
  lexicon: HALOT
  rationale: חָמָס denota violencia o conducta violenta e injusta. «Violencia» es la equivalencia directa y más transparente para el lector español.
- source_word: יֵרֵד
  english_pob_choice: descends
  chosen_spanish: descenderá
  alternatives_spanish:
  - caerá
  - bajará
  lexicon: HALOT
  rationale: El verbo mantiene la imagen vertical de algo que baja sobre el culpable. «Descenderá» conserva el paralelismo poético y el valor de movimiento hacia abajo.
theological_decisions:
- issue: Imágenes de retribución poética y justicia moral
  english_pob_reading: The verse describes the wicked person's own harmful schemes and violence rebounding upon himself.
  chosen_spanish_reading: El versículo presenta el regreso sobre el culpable de su propio daño y de su violencia, como justicia retributiva poética.
  alternative_spanish_readings:
  - Solo describe que le sobrevienen consecuencias dolorosas sin énfasis moral.
  - Se puede leer de forma más general como desgracia, sin señalar retribución ética.
  rationale: La doble imagen de retorno y descenso sobre la cabeza conserva con fuerza la idea de retribución moral del texto hebreo. La formulación española no añade doctrina externa, pero sí mantiene esa tensión ética que el original y la traducción inglesa documentan.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el pasaje de referencia; el texto inglés más reciente permanece sin cambios y el acuerdo de revisión es alto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera; este versículo no lo contiene.
  - Se usa español poético claro y digno, evitando calcos rígidos pero preservando el paralelismo hebreo.
  - «Cráneo» conserva la concreción de la imagen; la nota ofrece la alternativa más literal «coronilla».
