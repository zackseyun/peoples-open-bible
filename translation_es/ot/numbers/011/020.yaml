translation:
  language: es
  text: 'por un mes entero, hasta que salga por sus narices y les resulte repugnante[a], porque han rechazado a Yahvé, que está en medio de ustedes, y han llorado delante de él, diciendo: “¿Por qué salimos de Egipto?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: “se vuelva repulsivo para ustedes” / “se vuelva algo de disgusto para ustedes”. La expresión hebrea comunica una fuerte repulsión.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַד חֹדֶשׁ יָמִים
  english_pob_choice: for a whole month
  chosen_spanish: por un mes entero
  alternatives_spanish:
  - durante un mes completo
  - por todo un mes
  lexicon: HALOT
  rationale: La expresión hebrea es un giro idiomático que indica duración completa de un mes. 'Por un mes entero' mantiene la fuerza temporal sin sonar artificial en español.
- source_word: יֵצֵא מֵאַפְּכֶם
  english_pob_choice: it comes out of your nostrils
  chosen_spanish: salga por tus narices
  alternatives_spanish:
  - salga por tu nariz
  - salga por tus fosas nasales
  lexicon: HALOT
  rationale: El hebreo es concreto y gráfico; 'narices' conserva esa imagen corporal. Se usa el singular/plural flexible de segunda persona por concordancia natural en español con el plural colectivo del contexto.
- source_word: וְהָיָה לָכֶם לְזָרָא
  english_pob_choice: and becomes loathsome to you
  chosen_spanish: se vuelva algo repugnante para ti
  alternatives_spanish:
  - les resulte repugnante
  - se vuelva para ustedes algo repulsivo
  lexicon: HALOT
  rationale: זָרָא expresa fuerte aversión o repulsión. 'Repugnante' comunica bien la intensidad sin perder naturalidad. Se conserva la idea de efecto resultante.
- source_word: יַעַן כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - puesto que
  lexicon: HALOT
  rationale: La partícula introduce la causa del juicio; 'porque' es la correspondencia más directa y clara en español.
- source_word: מְאַסְתֶּם
  english_pob_choice: you have rejected
  chosen_spanish: han rechazado
  alternatives_spanish:
  - han despreciado
  - han repudiado
  lexicon: HALOT
  rationale: El verbo connota rechazo deliberado y de peso pactual. 'Han rechazado' preserva esa fuerza sin cargar el texto con una dureza emocional adicional no necesaria.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como transliteración del Tetragrámaton, conforme al criterio del proyecto, y no como sustituto por título.
- source_word: אֲשֶׁר בְּקִרְבְּכֶם
  english_pob_choice: who is among you
  chosen_spanish: que está en medio de ustedes
  alternatives_spanish:
  - que está entre ustedes
  - que está en medio de vosotros
  lexicon: HALOT
  rationale: La expresión señala la presencia de Yahvé en la comunidad. 'En medio de ustedes' comunica con claridad esa presencia corporativa en español latinoamericano.
- source_word: וַתִּבְכּוּ לְפָנָיו
  english_pob_choice: and have wept before him
  chosen_spanish: y han llorado delante de él
  alternatives_spanish:
  - y han llorado en su presencia
  - y han llorado ante él
  lexicon: HALOT
  rationale: בכה se traduce de forma directa por 'llorar'. 'Delante de él' reproduce bien la escena de lamento delante de la presencia divina.
- source_word: לָמָּה זֶּה
  english_pob_choice: Why did we come out of Egypt?
  chosen_spanish: ¿Por qué salimos de Egipto?
  alternatives_spanish:
  - ¿Por qué salimos de Egipto?
  - ¿Por qué hemos salido de Egipto?
  lexicon: HALOT
  rationale: El hebreo plantea una queja retrospectiva sin añadir intensidad no presente en el texto. '¿Por qué salimos de Egipto?' sigue fielmente el sentido sin sobreinterpretar el énfasis.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. En español se adopta 'Yahvé' para preservar el nombre propio divino y evitar la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Intensity of זָרָא
  english_pob_reading: loathsome / repulsive to you
  chosen_spanish_reading: algo repugnante para ti
  alternative_spanish_readings:
  - repulsivo para ti
  - algo aborrecible para ti
  rationale: El hebreo expresa una reacción de fuerte asco o aversión. 'Repugnante' transmite bien la intensidad del término sin suavizarlo.
  doctrine_reference: HALOT entry for זָרָא; English POB footnote a
- issue: Collective second person in context
  english_pob_reading: you / among you
  chosen_spanish_reading: ustedes
  alternative_spanish_readings:
  - vosotros
  - ti
  rationale: El hebreo plural dirige la acusación a la comunidad. En español se usa 'ustedes' para mantener el plural colectivo en un registro neutral latinoamericano.
  doctrine_reference: Spanish audience/register convention; grammar from Sp2mp morphology
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa que eliminó ''ever'' de la pregunta final por no estar en el hebreo. Por eso la pregunta española se formula sin ningún intensificador añadido: ''¿Por qué salimos de Egipto?'' También se respetó el tono gráfico de la imagen corporal (''narices'') y la decisión doctrinal de renderizar el nombre divino como Yahvé.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como forma uniforme para יְהוָה.
  - Se usó 'ustedes' para coherencia con el público meta latinoamericano y con la segunda persona plural del hebreo.
  - '''Repugnante'' conserva la intensidad semántica de לְזָרָא sin caer en una paráfrasis amplia.'
