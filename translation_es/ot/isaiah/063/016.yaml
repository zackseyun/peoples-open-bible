review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador preserva bien la estructura principal del hebreo: causal inicial, doble apelación a Dios como Padre, mención de Abraham e Israel/Jacob, uso de Yahvé, y la tensión temporal de מֵעוֹלָם con «desde antaño». Sin embargo, omite en el texto principal גֹּאֲלֵנוּ («nuestro Redentor»), que sí está en la fuente y en el POB inglés. Esa omisión altera materialmente el sentido de la cláusula final.'
  spanish_quality_summary: El español es claro y digno, pero la puntuación con varios puntos y coma suena algo trabada; además, la cláusula final «desde antaño es tu nombre» queda incompleta y poco natural sin el predicado «nuestro Redentor». Con esa reposición, el verso fluye bien en español eclesial moderno.
  glossary_alignment: Se alinea correctamente con la terminología del proyecto en «Yahvé», «Padre» y el manejo de מֵעוֹלָם como «desde antaño». También es adecuada la nota sobre «Israel» como Jacob. El problema principal de alineación léxica es la ausencia de «nuestro Redentor» para גֹּאֲלֵנוּ.
  issues:
  - severity: high
    issue: Omisión de גֹּאֲלֵנוּ en el texto principal
    rationale: El hebreo dice explícitamente «nuestro Redentor». El borrador termina «desde antaño es tu nombre», dejando fuera un elemento nuclear de la predicación sobre Dios y debilitando la cláusula nominal final.
  - severity: medium
    issue: La nota [a] no compensa la omisión del texto principal
    rationale: La nota alternativa preserva una lectura posible de toda la cláusula, pero el texto base no puede depender de la nota para incluir un lexema presente en la fuente. La alternativa debe seguir siendo alternativa, no suplencia.
  - severity: low
    issue: Puntuación mejorable para lectura natural
    rationale: 'Puede mantenerse el punto y coma mayor, pero conviene que la cláusula final quede plenamente formada: «nuestro Redentor desde antaño es tu nombre».'
