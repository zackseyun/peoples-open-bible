base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/006/022.yaml
  text: And Yahweh gave great and grievous signs and wonders in Egypt[a], against Pharaoh and against all his house[b], before our eyes.
  footnotes:
  - marker: a
    text: Or 'in Egypt'; the Hebrew preposition can be read locatively, but here it likely carries the sense of judgments directed against Egypt, Pharaoh, and his household.
    reason: lexical_alternative
  - marker: b
    text: Or 'terrible' or 'harmful' signs and wonders; Hebrew 'grievous' emphasizes the devastating effect of these acts on Egypt.
    reason: lexical_alternative
