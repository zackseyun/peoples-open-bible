revisions:
- from: Caiga sobre la cabeza de Joab y sobre toda la casa de su padre[a]; y nunca sea cortado de la casa de Joab quien tenga una secreción, o sea leproso, o se apoye en un bastón[b], o caiga a espada, o carezca de pan.
  to: Caiga sobre la cabeza de Joab y sobre toda la casa de su padre; y que nunca falte de la casa de Joab quien tenga una secreción, o sea leproso[a], o se apoye en un bastón[b], o caiga a espada, o carezca de pan.
  rationale: Se reubicó la nota [a] para anclarla correctamente en ‘leproso’. Además, se ajustó ‘y nunca sea cortado de la casa de Joab’ a ‘y que nunca falte de la casa de Joab’ para lograr un español más natural, manteniendo el sentido imprecatorio de que tales aflicciones nunca cesen en la casa de Joab. Se conservaron las decisiones léxicas principales y las notas alternativas pertinentes.
