translation:
  language: es
  text: Entonces Saúl hirió a Amalec[a], desde Havilá, camino a Shur[b], que está frente a Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los amalecitas'; el hebreo dice 'Amalec', uso colectivo del nombre del antepasado para el pueblo.
    reason: lexical_alternative
  - marker: b
    text: O 'que está al oriente de Egipto' o 'que está delante de Egipto'; la expresión hebrea puede denotar un lugar que está frente a Egipto o en oposición a Egipto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּךְ
  english_pob_choice: struck
  chosen_spanish: hirió
  alternatives_spanish:
  - golpeó
  - hirió de muerte
  - venció
  lexicon: HALOT
  rationale: El hebreo נכה puede significar 'golpear', 'herir' o 'vencer' según el contexto. En español, 'hirió' conserva la fuerza concreta del verbo sin adelantar más de lo que afirma la cláusula; evita también el tono algo arcaico de 'hirió' en algunas tradiciones, pero sigue siendo claro y fiel.
- source_word: עֲמָלֵק
  english_pob_choice: Amalek
  chosen_spanish: Amalec
  alternatives_spanish:
  - los amalecitas
  - Amalek
  lexicon: HALOT
  rationale: El nombre singular colectivo hebreo puede referirse al pueblo. 'Amalec' reproduce la forma habitual en español bíblico y mantiene la tensión documentada entre nombre ancestral y pueblo colectivo. No se opta por 'los amalecitas' en el texto principal porque el hebreo dice literalmente el nombre singular.
- source_word: מֵחֲוִילָה
  english_pob_choice: from Havilah
  chosen_spanish: desde Havilá
  alternatives_spanish:
  - de Havilá
  - a partir de Havilá
  lexicon: HALOT
  rationale: La preposición מִן señala punto de inicio geográfico. 'Desde Havilá' expresa mejor ese arranque de extensión territorial que un simple 'de'. Se mantiene el topónimo transliterado en forma española común.
- source_word: בּוֹאֲךָ
  english_pob_choice: as you go
  chosen_spanish: cuando vas a
  alternatives_spanish:
  - en tu camino a
  - al ir a
  - por el camino a
  lexicon: HALOT
  rationale: La construcción idiomática con בוא + sufijo 2ms describe una ruta o dirección. 'Cuando vas a' reproduce de manera natural la imagen de 'as you go' y evita sobredeterminar el matiz direccional.
- source_word: שׁוּר
  english_pob_choice: Shur
  chosen_spanish: Shur
  lexicon: HALOT
  rationale: Topónimo propio transliterado.
- source_word: אֲשֶׁר עַל־פְּנֵי מִצְרַיִם
  english_pob_choice: which is opposite Egypt
  chosen_spanish: que está frente a Egipto
  alternatives_spanish:
  - que está opuesto a Egipto
  - que está ante Egipto
  - que está al oriente de Egipto
  lexicon: HALOT
  rationale: עַל־פְּנֵי puede significar 'frente a', 'opuesto a' o 'en la presencia de'. 'Frente a Egipto' comunica la relación espacial sin forzar una precisión direccional que el hebreo no exige. En nota se preserva la alternativa tradicional de 'al oriente de Egipto' o 'antes de Egipto'.
- source_word: שָׁאוּל
  english_pob_choice: Saul
  chosen_spanish: Saúl
  alternatives_spanish:
  - Saul
  lexicon: HALOT
  rationale: Nombre propio bíblico con acentuación española estándar.
theological_decisions:
- issue: Nombre colectivo singular para Amalec
  english_pob_reading: The Hebrew reads 'Amalek,' a collective use of the ancestor-name for the people.
  chosen_spanish_reading: Amalec en singular colectivo, con nota explicativa.
  alternative_spanish_readings:
  - los amalecitas
  - Amalek
  rationale: La decisión preserva la forma hebrea documentada y evita disolver el nombre colectivo en una pluralización interpretativa en el texto principal. La nota explica el valor colectivo para que el lector no pierda el sentido poblacional.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El borrador sigue el pasaje hebreo directamente y mantiene el mismo alcance semántico que el audit trail inglés. No se introducen ampliaciones narrativas ni se suaviza la literalidad de la acción verbal. Se conserva la ambigüedad geográfica de עַל־פְּנֵי מִצְרַיִם mediante una formulación española neutral y una nota con alternativas documentadas.
  spanish_consistency_notes:
  - Se usa 'Amalec' en el texto principal porque es la forma española usual para el nombre colectivo hebreo, mientras la nota explica la alternativa plural.
  - '''Frente a Egipto'' mantiene la ambigüedad espacial del hebreo mejor que una traducción direccional cerrada.'
  - Se evita 'SEÑOR' u otras sustituciones no pertinentes; no aparece ningún término divino en este versículo.
  - La puntuación y el orden siguen la cadencia narrativa breve del hebreo sin añadir conectores explicativos innecesarios.
