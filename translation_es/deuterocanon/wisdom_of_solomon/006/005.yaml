revisions:
- from: Él vendrá sobre ustedes de manera terrible[a] y veloz, porque un juicio severo cae sobre los que están en altos puestos.
  to: Él vendrá sobre ustedes terriblemente[a] y con rapidez, porque un juicio severo cae sobre quienes ocupan puestos elevados.
  rationale: Se ajusta la primera cláusula para reflejar dos adverbios griegos de manera más natural en español y se corrige la nota alternativa para no convertir φρικτῶς en un estado subjetivo de temor. También se mejora levemente la expresión de estatus elevado con 'quienes ocupan puestos elevados', que conserva la imagen del original y suena más idiomático.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:05:17Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: una amenaza de juicio divino que vendrá con terror y rapidez sobre los gobernantes elevados. Sin embargo, hay un problema de naturalidad y categoría gramatical en ''de manera terrible y veloz'': φρικτῶς y ταχέως son ambos adverbios, y en español conviene expresarlos adverbialmente de forma paralela. Además, la nota alternativa ''con temor'' no representa bien φρικτῶς, que describe el carácter temible de la visita, no el estado emocional del agente.'
  spanish_quality_summary: El texto es claro, pero 'de manera terrible y veloz' suena algo forzado y desequilibrado, porque 'veloz' es adjetivo donde se espera adverbio. 'De manera terrible y con rapidez' o 'terriblemente y con rapidez' mejora la fluidez y la correspondencia gramatical. 'Los que están en altos puestos' es comprensible, aunque algo más idiomático es 'los que están en puestos elevados' o 'los que ocupan puestos elevados'.
  glossary_alignment: No hay términos del glosario maestro especialmente conflictivos en este versículo. 'Juicio' para κρίσις y 'severo' para ἀπότομος concuerdan con la auditoría inglesa. La elección 'vendrá sobre ustedes' para ἐπιστήσεται es aceptable. La frase sobre los elevados debe seguir reflejando rango o estatus, no excelencia moral.
  issues:
  - severity: medium
    issue: Expresión adverbial poco natural en 'de manera terrible y veloz'
    rationale: El griego usa dos adverbios coordinados. En español, 'veloz' como adjetivo rompe el paralelismo y suena menos natural. Conviene una forma plenamente adverbial.
  - severity: medium
    issue: La nota alternativa 'con temor' distorsiona φρικτῶς
    rationale: φρικτῶς significa 'de manera temible/aterradora/terriblemente', no 'con temor', que sugeriría que el sujeto actúa temerosamente.
  - severity: low
    issue: '''Altos puestos'' es entendible pero puede afinarse'
    rationale: '''Puestos elevados'' o ''quienes ocupan puestos elevados'' suena más natural y mantiene mejor la imagen de elevación presente en ὑπερέχουσιν.'
  revised_spanish_text: Él vendrá sobre ustedes terriblemente[a] y con rapidez, porque un juicio severo cae sobre quienes ocupan puestos elevados.
  revised_footnotes:
  - marker: a
    text: O 'de manera temible y rápidamente vendrá sobre ustedes, porque un juicio abrupto viene para los exaltados'.
    reason: lexical_alternative
  revision_rationale: Se ajusta la primera cláusula para reflejar dos adverbios griegos de manera más natural en español y se corrige la nota alternativa para no convertir φρικτῶς en un estado subjetivo de temor. También se mejora levemente la expresión de estatus elevado con 'quienes ocupan puestos elevados', que conserva la imagen del original y suena más idiomático.
