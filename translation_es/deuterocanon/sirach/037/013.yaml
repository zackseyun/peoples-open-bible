translation:
  language: es
  text: Consulta con una mujer acerca de su rival, y con un cobarde acerca de la guerra.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El testimonio hebreo aquí es difícil y difiere mucho del griego, que dice aproximadamente: «uno que es en su alma según tu alma, y si tropiezas, sufrirá contigo»; es decir, un amigo afín que comparte tu dolor. El término hebreo traducido «cobarde» es incierto; se han propuesto alternativas como «rebelde» o «desertor».'
    reason: textual_variant
lexical_decisions:
- source_word: עִם
  english_pob_choice: with / consult with
  chosen_spanish: consulta con
  alternatives_spanish:
  - con
  - consulta con
  lexicon: HALOT
  rationale: En este tipo de advertencias sapienciales, la preposición introduce a la persona de quien se busca consejo. «Consulta con» expresa el matiz consultivo sin alejarse del hebreo.
- source_word: אִשָּׁה
  english_pob_choice: a woman
  chosen_spanish: una mujer
  alternatives_spanish:
  - una mujer
  - una esposa
  lexicon: HALOT
  rationale: El sustantivo es genérico y no lleva marca posesiva. «Una mujer» evita imponer el sentido de «esposa» sin apoyo explícito del texto.
- source_word: צָרָהּ
  english_pob_choice: her rival
  chosen_spanish: su rival
  alternatives_spanish:
  - su rival
  - su coesposa
  - su adversaria
  lexicon: HALOT
  rationale: El contexto y el paralelo griego apuntan a una rival femenina. «Su rival» conserva la amplitud del hebreo y no fuerza un sentido más estrecho que el texto no garantiza.
- source_word: מָרֵד
  english_pob_choice: a coward
  chosen_spanish: un cobarde
  alternatives_spanish:
  - un rebelde
  - uno que retrocede
  - un desertor
  lexicon: HALOT
  rationale: La tradición hebrea es difícil aquí y diverge del griego. Dentro de la línea hebrea conservada, el término parece designar a alguien poco fiable en contexto bélico; «cobarde» transmite esa idea de forma legible, manteniendo la incertidumbre textual.
- source_word: מִלְחַמְתּוֹ
  english_pob_choice: war
  chosen_spanish: la guerra
  alternatives_spanish:
  - la guerra
  - la batalla
  - su guerra
  lexicon: HALOT
  rationale: El sustantivo refiere a combate o guerra. Como la revisión inglesa redujo la literalidad para naturalidad, «la guerra» comunica bien el sentido militar sin sonar forzado en español.
theological_decisions:
- issue: Desajuste importante entre el hebreo conservado y el griego de Sirácides 37:13
  english_pob_reading: 'The Hebrew witness is primary, but the Greek reads: ''one who is in his soul according to your soul, and if you stumble, he will suffer with you''—a kindred friend who shares your pain.'
  chosen_spanish_reading: Se traduce como texto principal el hebreo conservado, y se señala en nota la divergencia sustancial con el griego.
  alternative_spanish_readings:
  - amigo afín que comparte tu dolor
  - quien es de una misma alma contigo y, si tropiezas, sufrirá contigo
  rationale: La política del proyecto da primacía al hebreo donde se conserva, pero aquí la discrepancia no es menor. Por eso el texto principal sigue el hebreo y la nota preserva la lectura griega para auditoría y para no borrar la tensión entre testigos.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo cuando se conserva; preservar honestamente la incertidumbre textual'
translation_notes:
  revision_awareness: Se siguió el pasaje hebreo tal como aparece en el expediente fuente, mientras se preservó en nota la gran divergencia del paralelo griego. La formulación española busca ser publicable y natural, pero sin borrar la incertidumbre textual documentada ni el sentido bélico del segundo hemistiquio.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el Tetragrámaton; aquí no ocurre.
  - Se usa «guerra» en vez de una forma más literal como «batalla» para reflejar la revisión inglesa y la naturalidad del español.
  - No se emplea «Cristo/Mesías» ni terminología teológica ajena al versículo.
  - La nota de pie conserva la tensión entre el hebreo y el griego sin armonizarlos artificialmente.
