    rationale: El expediente inglés justifica «Judean» precisamente para evitar «Jewish» y «Hebrew». En español, «judío» reproduce el problema que el POB buscó evitar, porque puede entenderse como identidad judía general más que como lengua de Judá/judeanos.
  - severity: low
