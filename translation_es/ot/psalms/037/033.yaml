translation:
  language: es
  text: Yahvé no lo dejará en su mano[a][b], ni lo condenará cuando sea juzgado[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «abandonará» para «dejará».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «en su mano»; es decir, bajo su poder o control.
    reason: lexical_alternative
  - marker: c
    text: O «lo declarará culpable» para «lo condenará».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del Tetragrámaton, siguiendo la política del proyecto de usar una transliteración del nombre y no una sustitución titulativa. «Yahvé» es la forma estable y legible en español para ese nombre.
- source_word: יַעַזְבֶנּוּ
  english_pob_choice: will not leave him
  chosen_spanish: no lo dejará
  alternatives_spanish:
  - no lo abandonará
  - no lo forsácará
  lexicon: HALOT
  rationale: עָזַב admite «dejar», «abandonar» o «desamparar». Aquí «no lo dejará» reproduce bien el valor base del verbo y mantiene la relación inmediata con el objeto directo y el contexto de protección.
- source_word: בְיָדוֹ
  english_pob_choice: in his hand
  chosen_spanish: en su mano
  alternatives_spanish:
  - bajo su poder
  - bajo su control
  lexicon: HALOT
  rationale: Se mantiene la imagen literal de la mano, como en el hebreo. En español «en su mano» suena natural y conserva la metáfora de dominio o poder, que puede inferirse sin borrar el cuadro verbal.
- source_word: יַרְשִׁיעֶנּוּ
  english_pob_choice: condemn him
  chosen_spanish: lo condenará
  alternatives_spanish:
  - lo declarará culpable
  - lo tendrá por culpable
  lexicon: HALOT
  rationale: 'El hifil de רשע tiene sentido forense: pronunciar culpable o condenar. «Lo condenará» es conciso, jurídico y fiel al registro judicial del miembro paralelo.'
- source_word: בְּהִשָּׁפְטוֹ
  english_pob_choice: when he is judged
  chosen_spanish: cuando sea juzgado
  alternatives_spanish:
  - en su juicio
  - cuando comparezca ante el juicio
  lexicon: HALOT
  rationale: La preposición ב con infinitivo constructo expresa aquí tiempo. «Cuando sea juzgado» preserva el sentido judicial sin forzar una especificación adicional del tribunal o del escenario.
theological_decisions:
- issue: Referencia de los pronombres y continuidad del contraste justo/malvado
  english_pob_reading: The object pronouns refer to the righteous man of the surrounding context, and the possessive 'his hand' refers to the wicked man.
  chosen_spanish_reading: Los pronombres retoman al justo del contexto y la mano es la del impío.
  alternative_spanish_readings:
  - De modo más general, los pronombres aluden al justo y al malvado sin explicitarlo en la traducción.
  rationale: El contexto inmediato de Salmo 37 contrapone a los impíos con el justo. La traducción conserva los pronombres masculinos singulares y la referencia implícita, sin neutralizar el contraste que el hebreo mantiene.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Registro forense del segundo miembro
  english_pob_reading: The verse promises that the LORD will not allow the righteous to be judicially condemned in the decisive sense intended by the psalm.
  chosen_spanish_reading: El versículo promete que Yahvé no permitirá una condena judicial del justo en el sentido decisivo del salmo.
  alternative_spanish_readings:
  - Yahvé no dejará que sea declarado culpable
  - Yahvé no lo tratará como culpable en el juicio.
  rationale: El paralelismo de רשע y שפט es judicial. «Condenará/juzgado» conserva ese campo semántico sin ampliar indebidamente el texto hacia categorías doctrinales posteriores.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requerían cambios y el control cruzado informó alta concordancia.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como nombre divino, coherente con los lineamientos del proyecto.
  - Se conserva el paralelismo jurídico del hebreo con un español natural y públicamente legible.
  - Los pronombres masculinos singulares se preservan para reflejar la continuidad del contexto de Salmo 37 sin neutralización innecesaria.
