- from: Entonces el Señor despertó como de un sueño[a], como un guerrero que grita por el vino.
  to: Entonces Yahvé despertó como quien sale del sueño[a], como un guerrero que grita por efecto del vino.
  rationale: Se revisa para alinear mejor la terminología del proyecto («Yahvé»), mejorar la naturalidad del símil en español y expresar con más claridad el valor causal de מִן en «por efecto del vino», manteniendo la imaginería antropomórfica y la alternativa léxica documentada.
