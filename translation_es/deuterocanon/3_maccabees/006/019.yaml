translation:
  language: es
  text: Y se levantaron[a], y llenaron de confusión y cobardía[b] la fuerza de sus adversarios, y los ataron con grilletes inmovibles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se opusieron» o «resistieron». El verbo griego también puede expresar la idea de ponerse de pie contra alguien o hacerle frente.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «llenaron la fuerza de los adversarios de confusión y cobardía».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀντέστησαν
  english_pob_choice: rose up
  chosen_spanish: se opusieron
  alternatives_spanish:
  - se levantaron
  - resistieron
  - se pusieron contra ellos
  lexicon: LSJ
  rationale: El verbo puede expresar tanto 'oponerse/resistir' como la imagen narrativa de tomar posición contra alguien. En español, 'se opusieron' conserva la fuerza oposicional sin añadir un matiz físico que el griego no exige.
- source_word: δύναμιν
  english_pob_choice: force
  chosen_spanish: la fuerza
  alternatives_spanish:
  - el poder
  - el ejército
  - la hueste
  lexicon: LSJ
  rationale: Aquí δύναμις se refiere al cuerpo combatiente de los adversarios, no a poder abstracto. 'La fuerza' mantiene esa amplitud militar y sigue de cerca la opción auditada en inglés.
- source_word: ὑπεναντίων
  english_pob_choice: their adversaries
  chosen_spanish: de sus adversarios
  alternatives_spanish:
  - de sus opositores
  - de sus enemigos
  - de los que estaban contra ellos
  lexicon: LSJ
  rationale: '''Adversarios'' reproduce el valor relacional de quienes están en contra, sin intensificarlo innecesariamente a ''enemigos''.'
- source_word: ἐπλήρωσαν ταραχῆς καὶ δειλίας
  english_pob_choice: filled ... with confusion and cowardice
  chosen_spanish: llenaron de confusión y cobardía
  alternatives_spanish:
  - llenaron de turbación y temor
  - causaron confusión y pánico
  - los llenaron de confusión y miedo
  lexicon: LSJ
  rationale: La construcción griega literalmente expresa 'llenar de tumulto/confusión y cobardía/timidez'. 'Confusión y cobardía' sigue de cerca la lectura auditada en inglés y evita reemplazar δειλία por un término más psicológico que el texto no exige.
- source_word: ἀκινήτοις
  english_pob_choice: immovable
  chosen_spanish: inmovibles
  alternatives_spanish:
  - inamovibles
  - inmóviles
  - firmes
  lexicon: LSJ
  rationale: El adjetivo califica las cadenas/ligaduras y subraya que no podían ser movidas ni sacudidas. 'Inmovibles' comunica bien esa cualidad en español actual.
- source_word: πέδαις
  english_pob_choice: fetters
  chosen_spanish: cadenas
  alternatives_spanish:
  - grilletes
  - prisiones
  - ligaduras
  lexicon: LSJ
  rationale: πέδαι designa ataduras o hierros para los pies; en español, 'cadenas' es claro y lector-friendly, aunque 'grilletes' también sería posible. Se evita 'siervos' o vocabulario eclesial ajeno al contexto.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacía falta cambio sustantivo; esta versión mantiene el sentido auditado y conserva la tensión lexical de ἀντέστησαν con una nota alternativa, sin sobreinterpretar el gesto narrativo.
  spanish_consistency_notes:
  - Se conserva 'Y...' al inicio para reflejar la secuencia narrativa del griego.
  - '''Adversarios'' se usa de modo consistente con el valor relacional de ὑπεναντίων.'
  - '''Cobardía'' sigue la tradición de la auditoría inglesa para δειλία, aunque en español también podría decirse ''temor'' en un registro más interpretativo; se mantiene la opción más cercana al texto.'
  - '''Cadenas inmovibles'' mantiene la imagen de ataduras fijas e inamovibles sin forzar una metáfora distinta.'
