translation:
  text: His disciples said[1], "Show us the place where you are, for it is necessary
    for us to seek it." He said to them, "Whoever has ears, let him hear.[1] There
    is light within a man of light,[2] and he lights the whole world.[3] When he does
    not shine[a][e][4][3][2], there is darkness."[4]
  philosophy: optimal-equivalence
  footnotes:
  - marker: '1'
    text: Lit. “whoever has ears with him.” The idiom ⲙⲙⲟϥ ‘with him’ is part of the
      standard hearing formula.
    reason: dialect_note
  - marker: '2'
    text: 'Coptic is declarative: “A light is within a man of light.” The Greek fragment
      reads conditionally, “If light is in a man of light….”'
    reason: textual_variant
  - marker: '3'
    text: 'Coptic makes the person the subject: “he lights (the whole world).” The
      Greek fragment has “it shines,” taking “light” as the subject.'
    reason: textual_variant
  - marker: '4'
    text: 'Coptic: “When he does not shine, it is/there is darkness.” The Greek reconstruction
      reads, “if it is not, (the world) is in darkness.”'
    reason: textual_variant
  - marker: e
    text: “Man of light” could be rendered “luminous person,” but the genitive construction
      is preserved to keep Thomas’s distinctive tone.
    reason: lexical_alternative
  - marker: a
    text: Or 'A light is within a man of light'.
    reason: previous_rendering
lexical_decisions:
- source_word: ϯⲧⲥⲉⲃⲟⲁⲛⲟⲛ
  chosen: show us
  alternatives:
  - make known to us
  - teach us
  lexicon: Crum, s.v. ⲥⲃⲱ/ⲥⲃⲱⲛ (teach; inform; cause to know)
  rationale: The causative sense ‘make known’ best yields idiomatic English “show
    us” in this request context.
- source_word: ⲧⲟⲡⲟⲥ
  chosen: place
  alternatives:
  - location
  lexicon: Loan from Gk. τόπος
  rationale: Common loan with concrete sense; “place” preserves Thomas’s terseness.
- source_word: ⲉⲧⲉⲣⲉⲛⲧⲟⲕⲙⲙⲁⲩ
  chosen: where you are
  alternatives:
  - where you abide
  lexicon: Lambdin §173 (relative ⲉⲧⲉⲣⲉ + subject + locative)
  rationale: Relative clause expressing location/state; “are” is the minimal accurate
    verb in English.
- source_word: ⲡⲉⲓⲡⲁⲛⲁⲅⲕⲏ ⲉⲁⲛⲟⲛ ⲡⲉ
  chosen: it is necessary for us
  alternatives:
  - there is compulsion upon us
  lexicon: Loan from Gk. ἀνάγκη; Lambdin §159 (impersonal construction)
  rationale: Idiomatic impersonal necessity; keeps the loan’s force without over-explaining.
- source_word: ϣⲓⲛⲉ ⲛⲥⲁⲛⲧⲟϥ
  chosen: to seek it
  alternatives:
  - to look for it
  lexicon: Crum, s.v. ϣⲓⲛⲉ (seek, search)
  rationale: Standard verb for seeking with ⲛⲥⲁ + pronominal object ‘after it’.
- source_word: ⲡⲉⲧⲉⲣⲉⲟⲩⲛ ⲙⲁⲁϫⲉ ⲙⲙⲟϥ
  chosen: Whoever has ears
  alternatives:
  - Whoever has ears with him
  - Whoever has ears to hear
  lexicon: Crum, s.v. ⲙⲁⲁϫⲉ (ear); ⲟⲩⲛ (have)
  rationale: Formulaic saying; omits the idiomatic ‘with him’ while noted in a footnote.
- source_word: ⲙⲁⲣⲉϥ ⲥⲱⲧⲙ
  chosen: let him hear
  alternatives:
  - he must listen
  lexicon: Layton, Grammar §377 (jussive ⲙⲁⲣⲉ- construction)
  rationale: Standard imperative-jussive formula retained for Thomas’s idiom.
- source_word: ⲟⲩⲛⲟⲩⲟⲉⲓⲛ ϣⲱⲡⲉ
  chosen: A light is
  alternatives:
  - Light exists
  - A light comes to be
  lexicon: Crum, s.v. ⲟⲉⲓⲛ (light); ⲥϣⲱⲡⲉ (come to be, be present)
  rationale: Captures declarative presence; preserves the indefinite nuance.
- source_word: ⲛⲡϩⲟⲩⲛ
  chosen: within
  alternatives:
  - in the inner part
  - inside
  lexicon: Crum, s.v. ϩⲟⲩⲛ (inside, interior)
  rationale: Spatial ‘within’ is concise and idiomatic.
- source_word: ⲛⲟⲩⲣⲙⲟⲩⲟⲉⲓⲛ
  chosen: a man of light
  alternatives:
  - a luminous person
  lexicon: Crum, s.v. ⲣⲙⲛ- (person of …) + ⲟⲉⲓⲛ (light)
  rationale: Genitival compound; retaining ‘man of light’ preserves Thomas’s strangeness.
- source_word: ⲛⲧⲟϥ ⲣⲟⲩⲟⲉⲓⲛ
  chosen: he lights (up)
  alternatives:
  - he illumines
  - he gives light
  lexicon: Crum, s.v. ⲣⲟⲩⲟⲉⲓⲛ (to give light, illumine)
  rationale: Verb is transitive; Coptic subject is the ‘man,’ not the light—maintained
    in translation.
- source_word: ⲧⲏⲣⲛⲧⲟϥ
  chosen: the whole [of it]
  alternatives:
  - entirely
  - the whole
  lexicon: Crum, s.v. ⲧⲏⲣ (all, whole)
  rationale: With ⲡⲕⲟⲥⲙⲟⲥ supplies ‘the whole world.’
- source_word: ⲉⲣⲉⲛⲧⲟϥ ⲧⲙⲣⲟⲩⲟⲉⲓⲛ
  chosen: When he does not shine
  alternatives:
  - If he does not give light
  - When he does not illuminate
  lexicon: Crum, s.v. ⲣⲟⲩⲟⲉⲓⲛ; Layton §188 (ⲧⲙ- negation)
  rationale: Temporal-protasis sense fits the following predicate.
- source_word: ⲟⲩⲕⲁⲕⲉ ⲡⲉ
  chosen: there is darkness
  alternatives:
  - it is darkness
  - it is dark
  lexicon: Crum, s.v. ⲕⲁⲕⲉ (darkness)
  rationale: Indefinite predication best rendered by English existential; note alternative
    ‘it is darkness’ in footnote discussion.
textual_note: 'No lacunae in NH II for this saying. Orthography shows expected Sahidic
  with Lycopolitan coloring: e.g., pronominal subject ⲛⲧⲟϥ is explicit before verbs
  (ⲛⲧⲟϥ ⲣⲟⲩⲟⲉⲓⲛ), and the idiom ⲙⲙⲟϥ ‘with him’ appears in the ears formula. The printed
  line-joined text shows ⲙⲁⲧⲥⲉⲃⲟⲛ vs. normalized ϯⲧⲥⲉⲃⲟⲁⲛⲟⲛ; both reflect a causative
  ‘make known’ addressed to ‘us.’ No restorations are marked by Dilley here.'
