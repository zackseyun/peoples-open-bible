  text: וְ/הָיָ֗ה הָ/אִ֛ישׁ אֲשֶׁ֥ר אֶבְחַר בּ֖/וֹ מַטֵּ֣/הוּ יִפְרָ֑ח וַ/הֲשִׁכֹּתִ֣י מֵֽ/עָלַ֗/י אֶת תְּלֻנּוֹת֙ בְּנֵ֣י יִשְׂרָאֵ֔ל אֲשֶׁ֛ר הֵ֥ם מַלִּינִ֖ם עֲלֵי/כֶֽם־־׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/017/020.yaml
  text: And it shall be that the staff of the man whom I choose will bud[a], and I will put an end to the complaints of the sons of Israel, which they are grumbling against you.
  footnotes:
  - marker: a
    text: 'Or ''the Israelites'' or ''the people of Israel.'' Hebrew: ''the sons of Israel.'''
