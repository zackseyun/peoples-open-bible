- from: Pero cualquiera que no prestó atención a la palabra de Yahvé dejó a sus siervos y a su ganado en el campo[a].
  to: Pero el que no prestó atención a la palabra de Yahvé dejó a sus siervos y a su ganado en el campo[a].
  rationale: Se ajusta «cualquiera que» a «el que» para un español más natural en contexto narrativo contrastivo, sin perder el sentido del hebreo. También se afina la nota para reflejar mejor el modismo «poner el corazón» evitando una formulación algo ambigua.
