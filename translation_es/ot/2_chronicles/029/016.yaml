revisions:
- from: Entonces los sacerdotes entraron en la parte interior de la casa de Yahvé[a], para limpiarla, y sacaron a la corte de la casa de Yahvé toda la impureza[b] que hallaron en el templo de Yahvé[c]. Y los levitas la recibieron para llevarla al valle del Cedrón.
  to: Entonces los sacerdotes entraron en la parte interior de la casa de Yahvé para limpiarla, y sacaron al atrio de la casa de Yahvé toda la impureza que hallaron en el templo de Yahvé[a]. Y los levitas la recibieron para llevarla al valle del Cedrón[b].
  rationale: Se reemplaza ‘corte’ por ‘atrio’ para reflejar correctamente חָצֵר en contexto templario y mejorar la naturalidad en español bíblico. Se corrige el anclaje de la nota sobre הֵיכָל colocándola en ‘templo de Yahvé’, donde corresponde. Se elimina la nota duplicada sobre templo/santuario y se preserva la alternativa tradicional para נַחַל קִדְרוֹן con una nota específica.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:54:45Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura hebrea básica y conserva correctamente Yahvé para יְהוָה, así como la distinción entre ‘casa de Yahvé’ y ‘templo de Yahvé’. Sin embargo, hay dos problemas de fidelidad léxica y de legibilidad: (1) לַחֲצַר debe verterse como ‘al atrio’ o ‘al patio del templo’, no ‘a la corte’, que en español moderno sugiere corte real/judicial; (2) el anclaje de la nota [a] está mal colocado sobre ‘casa de Yahvé’, aunque la nota explica הֵיכָל / ‘templo’. También conviene ajustar la nota del Cedrón para preservar la alternativa documentada en inglés (‘torrente/aroyo Cedrón’), y simplificar el aparato de notas para evitar duplicación innecesaria.'
  spanish_quality_summary: El español es generalmente claro y digno, pero ‘a la corte de la casa de Yahvé’ suena poco natural y equívoco. ‘Al atrio de la casa de Yahvé’ es la opción bíblica y ampliamente inteligible. El resto del texto fluye bien; ‘parte interior’ es aceptable, aunque ‘al interior’ también sería posible. ‘Impureza’ funciona bien en registro cultual.
  glossary_alignment: Alineación fuerte con la terminología del proyecto en ‘Yahvé’. También es correcta la conservación de ‘casa de Yahvé’ para בֵית יְהוָה y ‘templo’ para הֵיכָל. La principal desviación terminológica está en לַחֲצַר, donde ‘corte’ no representa bien el referente cultual en español bíblico. Las notas deben reflejar con precisión los lugares donde aparecen las alternativas léxicas.
  issues:
  - severity: high
    issue: ‘a la corte de la casa de Yahvé’ para לַחֲצַר בֵּית יְהוָה
    rationale: ‘Corte’ en español actual no es la forma natural para el recinto del templo y puede malinterpretarse como corte palaciega o judicial. ‘Atrio’ representa mucho mejor el espacio cultual del templo y preserva el sentido del hebreo.
  - severity: medium
    issue: La nota [a] está anclada a ‘casa de Yahvé’, pero explica ‘templo/santuario’ para הֵיכָל
    rationale: El marcador debe aparecer en la palabra o frase relevante. Tal como está, induce a pensar erróneamente que la alternativa afecta בֵית יְהוָה en vez de הֵיכָל.
  - severity: low
    issue: Duplicación innecesaria de notas sobre ‘templo/santuario’
    rationale: Las notas [a] y [c] repiten sustancialmente la misma alternativa para הֵיכָל. Conviene dejar una sola nota bien anclada y usar otra para Cedrón si se desea preservar la alternativa auditada.
  revised_spanish_text: Entonces los sacerdotes entraron en la parte interior de la casa de Yahvé para limpiarla, y sacaron al atrio de la casa de Yahvé toda la impureza que hallaron en el templo de Yahvé[a]. Y los levitas la recibieron para llevarla al valle del Cedrón[b].
  revised_footnotes:
  - marker: a
    text: O ‘santuario de Yahvé’ para ‘templo de Yahvé’ (hebreo הֵיכָל).
    reason: lexical_alternative
  - marker: b
    text: Tradicionalmente también se ha vertido ‘torrente Cedrón’ o ‘arroyo Cedrón’.
    reason: lexical_alternative
  revision_rationale: Se reemplaza ‘corte’ por ‘atrio’ para reflejar correctamente חָצֵר en contexto templario y mejorar la naturalidad en español bíblico. Se corrige el anclaje de la nota sobre הֵיכָל colocándola en ‘templo de Yahvé’, donde corresponde. Se elimina la nota duplicada sobre templo/santuario y se preserva la alternativa tradicional para נַחַל קִדְרוֹן con una nota específica.
