translation:
  language: es
  text: Y pasó hasta los confines de la tierra, y tomó botín de una multitud de naciones; y la tierra quedó en calma delante de él, y fue exaltado, y su corazón fue enaltecido[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su corazón se volvió orgulloso». El griego dice literalmente: «su corazón fue levantado» o «fue enaltecido», un modismo frecuentemente asociado con la soberbia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διῆλθεν
  english_pob_choice: passed
  chosen_spanish: pasó
  alternatives_spanish:
  - avanzó
  - atravesó
  - pasó adelante
  lexicon: LSJ
  rationale: El verbo griego expresa movimiento a través o hasta un lugar; «pasó» es una equivalencia natural y directa en español, sin añadir matices de ruta o de continuidad que el texto no explicita.
- source_word: ἕως ἄκρων τῆς γῆς
  english_pob_choice: to the ends of the earth
  chosen_spanish: hasta los confines de la tierra
  alternatives_spanish:
  - hasta los extremos de la tierra
  - hasta los límites de la tierra
  lexicon: LSJ
  rationale: La expresión es idiomática e hiperbólica; «confines» conserva el alcance total y la resonancia bíblica sin reducirla a una localización más estrecha.
- source_word: ἔλαβεν σκῦλα
  english_pob_choice: took plunder
  chosen_spanish: tomó botín
  alternatives_spanish:
  - se apoderó de botín
  - tomó despojos
  lexicon: LSJ
  rationale: σκῦλα se refiere al botín de guerra. «Botín» comunica bien el valor militar del término en español contemporáneo y evita un giro demasiado técnico.
- source_word: πλήθους ἐθνῶν
  english_pob_choice: from a multitude of nations
  chosen_spanish: de una multitud de naciones
  alternatives_spanish:
  - de muchas naciones
  - de una muchedumbre de naciones
  lexicon: LSJ
  rationale: Conservo la estructura genitiva como en el griego y reflejo tanto la abundancia («multitud») como la pluralidad de pueblos («naciones»), sin convertir la frase en una paráfrasis.
- source_word: ἡσύχασεν ἡ γῆ ἐνώπιον αὐτοῦ
  english_pob_choice: the earth was quiet before him
  chosen_spanish: la tierra quedó en silencio delante de él
  alternatives_spanish:
  - la tierra estuvo quieta delante de él
  - la tierra descansó ante él
  lexicon: LSJ
  rationale: «Quedó en silencio» transmite la quietud/sosiego del verbo ἡσυχάζω y funciona bien en español; «delante de él» preserva la idea de subordinación o presencia sin suavizarla excesivamente.
- source_word: ὑψώθη
  english_pob_choice: he was exalted
  chosen_spanish: fue engrandecido
  alternatives_spanish:
  - fue exaltado
  - fue levantado en alto
  lexicon: LSJ
  rationale: Aunque «exaltado» es posible, en español puede sonar más litúrgico o ambiguo; «engrandecido» comunica elevación de estatus/poder, acorde con el contexto de conquista, sin perder la idea de ser elevado.
- source_word: ἐπήρθη ἡ καρδία αὐτοῦ
  english_pob_choice: his heart was lifted up
  chosen_spanish: se le enalteció el corazón
  alternatives_spanish:
  - su corazón se elevó
  - su corazón se volvió orgulloso
  lexicon: LSJ
  rationale: Mantengo el giro idiomático de «ser alzado/levantado el corazón» con una construcción natural en español. «Enalteció» conserva la elevación literal y deja abierta la tensión semántica de orgullo sugerida por el griego.
theological_decisions:
- issue: La frase final ἐπήρθη ἡ καρδία αὐτοῦ puede implicar orgullo, pero el griego lo expresa idiomáticamente.
  english_pob_reading: his heart was lifted up
  chosen_spanish_reading: se le enalteció el corazón
  alternative_spanish_readings:
  - su corazón se volvió orgulloso
  - su corazón se elevó
  rationale: El texto griego dice literalmente que el corazón fue levantado/enaltecido; la POB inglesa conserva esa idiomática y añade la nota de orgullo como alternativa. En español mantengo la imagen literal para no resolver prematuramente la ambigüedad, pero la nota explica la posible connotación moral negativa.
  doctrine_reference: Preservar la tensión lexical y moral sin cerrar el sentido idiomático del original.
translation_notes:
  revision_awareness: La base inglesa revisó 'passed on' a 'passed' por una equivalencia más directa de διῆλθεν. Esta versión española sigue esa línea con «pasó». También mantiene la decisión de conservar el giro idiomático final sin traducirlo de forma interpretativa en el cuerpo principal, dejando la posible lectura de orgullo en nota.
  spanish_consistency_notes:
  - Se usa «tierra» para γῆ de manera consistente con el alcance universal del pasaje.
  - Se evita «Señor» o vocabulario cultual no presente; el verso es narrativo y militar.
  - «Botín» se emplea como equivalente natural de σκῦλα en contexto bélico.
  - La nota [a] marca la tensión entre literalidad e implicación moral, siguiendo el audit trail inglés.
