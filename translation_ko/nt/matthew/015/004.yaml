id: MAT.15.4
reference: Matthew 15:4
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὁ γὰρ θεὸς ⸀εἶπεν· Τίμα τὸν πατέρα καὶ τὴν μητέρα, καί· Ὁ κακολογῶν πατέρα ἢ μητέρα θανάτῳ τελευτάτω·
base_translation:
  language: en
  yaml_path: translation/nt/matthew/015/004.yaml
  text: 'For God said[a], ''Honor your father and your mother,'' and, ''Whoever speaks evil of father or mother must surely die.'''
translation:
  language: ko
  text: '하나님께서 말씀하시기를, 「네 아버지와 어머니를 공경하라」, 그리고, 「아버지나 어머니를 욕하는 자는 반드시 죽임을 당해야 한다」 하셨다.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Τίμα
  english_pob_choice: Honor
  chosen_korean: 공경하라
  alternatives_korean:
  - 존경하라
  lexicon: BDAG
  rationale: τιμάω의 윤리적 무게를 한국어 「공경하다」로 보존한다. 부모를 향한 명령의 정착어이다.
- source_word: Ὁ κακολογῶν
  english_pob_choice: Whoever speaks evil of
  chosen_korean: 욕하는 자는
  alternatives_korean:
  - 악담하는 자는
  - 저주하는 자는
  lexicon: BDAG
  rationale: κακολογέω는 「악하게 말하다·욕하다·저주하다」의 범위. 「욕하는 자」가 한국어에서 가장 자연스러우면서 어휘적 폭을 살린다.
- source_word: θανάτῳ τελευτάτω
  english_pob_choice: must surely die
  chosen_korean: 반드시 죽임을 당해야 한다
  alternatives_korean:
  - 죽음으로 끝나야 한다
  lexicon: BDAG
  rationale: 셈어식 강조형 사형 정식. 한국어 사형 명령의 무게를 살리되, 명령자의 모호성을 보존한다.
