translation:
  language: es
  text: Y tomó por esposa a una llamada Susana[a], hija de Helcías, hermosa,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más idiomática: «y se casó con Susana, hija de Helcías, que era hermosa». El griego es más comprimido y continúa con la siguiente descripción.'
