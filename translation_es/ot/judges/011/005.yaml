translation:
  language: es
  text: Y cuando los amonitas pelearon contra Israel[a], los ancianos de Galaad fueron a traer a Jefté de la tierra de Tob.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tomar a Jefté de la tierra de Tob». El verbo hebreo suele significar «tomar», pero aquí se refiere a ir a recuperarlo y traerlo de vuelta.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כַּאֲשֶׁר
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Y aconteció cuando
  - Ahora bien, cuando
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea introduce una acción temporal en secuencia; «Y cuando» conserva esa relación sin forzar un calco más pesado en español.
- source_word: נִלְחֲמוּ
  english_pob_choice: fought
  chosen_spanish: pelearon
  alternatives_spanish:
  - lucharon
  - hicieron guerra
  lexicon: HALOT
  rationale: El verbo expresa entablar combate. «Pelearon» es natural en español y mantiene el sentido de enfrentamiento bélico.
- source_word: בְנֵי עַמּוֹן
  english_pob_choice: the Ammonites
  chosen_spanish: los amonitas
  alternatives_spanish:
  - los hijos de Amón
  - el pueblo de Amón
  lexicon: HALOT
  rationale: Se trata de la designación étnica habitual. «Amonitas» es la forma idiomática en español y corresponde al valor contextual del hebreo.
- source_word: עִם יִשְׂרָאֵל
  english_pob_choice: against Israel
  chosen_spanish: contra Israel
  alternatives_spanish:
  - con Israel
  lexicon: HALOT
  rationale: Aunque עִם significa literalmente «con», con נלחם marca al adversario. «Contra Israel» expresa correctamente la relación hostil sin perder el matiz del hebreo.
- source_word: זִקְנֵי גִלְעָד
  english_pob_choice: the elders of Gilead
  chosen_spanish: los ancianos de Galaad
  alternatives_spanish:
  - los mayores de Galaad
  - los líderes de Galaad
  lexicon: HALOT
  rationale: El constructo refiere a los jefes o dirigentes reconocidos de Galaad. «Ancianos» conserva la terminología bíblica y es comprensible en español.
- source_word: לָקַחַת
  english_pob_choice: to bring
  chosen_spanish: traer
  alternatives_spanish:
  - tomar
  - ir a buscar
  lexicon: HALOT
  rationale: En este contexto la idea es ir a recuperar a Jefté y conducirlo de regreso. «Traer» refleja mejor la acción prevista que el más literal «tomar», que podría sonar ambiguo.
- source_word: אֶת יִפְתָּח
  english_pob_choice: Jephthah
  chosen_spanish: a Jefté
  alternatives_spanish:
  - a Jefté
  lexicon: HALOT
  rationale: El objeto directo explícito introduce el nombre propio. Se conserva la forma habitual en español, «Jefté».
- source_word: מֵאֶרֶץ טוֹב
  english_pob_choice: from the land of Tob
  chosen_spanish: desde la tierra de Tob
  alternatives_spanish:
  - desde el territorio de Tob
  - de la tierra de Tob
  lexicon: HALOT
  rationale: «אֶרֶץ» puede ser «tierra» o «territorio». Aquí se mantiene «tierra» por ser la equivalencia más directa y tradicional para este topónimo, con «desde» para reflejar el punto de procedencia.
translation_notes:
  revision_awareness: 'El texto coincide con el sentido del hebreo masorético y con la decisión auditada en la POB inglesa: la construcción temporal, el adversario implícito de עִם con נלחם, y el valor contextual de לָקַחַת como ir a recuperar a Jefté. No se detectaron revisiones posteriores que alteren la lectura.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como terminología por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió la forma etnónica española «amonitas» para בְנֵי עַמּוֹן, consistente con el estilo bíblico natural en español.
  - Se mantuvo «Galaad» y «Tob» como topónimos tradicionales en español.
  - La nota al pie preserva la alternativa lexical documentada por la POB inglesa sin sobretraducir el matiz de לָקַחַת.
