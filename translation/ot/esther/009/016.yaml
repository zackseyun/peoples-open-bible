id: EST.9.16
reference: Esther 9:16
source:
  edition: WLC
  text: וּ/שְׁאָ֣ר הַ/יְּהוּדִ֡ים אֲשֶׁר֩ בִּ/מְדִינ֨וֹת הַ/מֶּ֜לֶךְ נִקְהֲל֣וּ וְ/עָמֹ֣ד עַל נַפְשָׁ֗/ם וְ/נ֨וֹחַ֙ מֵ/אֹ֣יְבֵי/הֶ֔ם וְ/הָרֹג֙ בְּ/שֹׂ֣נְאֵי/הֶ֔ם חֲמִשָּׁ֥ה וְ/שִׁבְעִ֖ים אָ֑לֶף וּ/בַ֨/בִּזָּ֔ה לֹ֥א שָֽׁלְח֖וּ אֶת יָדָֽ/ם׀־־׃
translation:
  text: And the rest of the Jews who were in the king’s provinces gathered themselves together and stood for their lives[a], and had relief from their enemies, and killed seventy-five thousand of those who hated them[b]; but they did not lay a hand on the plunder.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stood in defense of their lives.'
    reason: lexical_alternative
  - marker: b
    text: Or 'plunder' could be rendered 'spoil.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּשְׁאָר
  chosen: And the rest of
  alternatives:
  - And the remainder of
  lexicon: HALOT
  rationale: שְׁאָר denotes what remains. 'The rest of' is natural modern English and preserves the contrast with the Jews in Susa from the prior verse.
- source_word: הַיְּהוּדִים
  chosen: the Jews
  alternatives:
  - the Judeans
  lexicon: HALOT
  rationale: In Esther the ethnoreligious people-group sense is primary, so 'the Jews' is the most idiomatic and contextually accurate rendering.
- source_word: בִּמְדִינוֹת הַמֶּלֶךְ
  chosen: who were in the king’s provinces
  alternatives:
  - who were in the provinces of the king
  lexicon: HALOT
  rationale: מְדִינוֹת refers to administrative provinces of the empire. 'The king’s provinces' is clear and idiomatic.
- source_word: נִקְהֲלוּ
  chosen: gathered themselves together
  alternatives:
  - assembled
  - gathered together
  lexicon: HALOT
  rationale: This verb in Esther repeatedly refers to the Jews assembling in response to the royal edict. 'Gathered themselves together' preserves the reflexive/corporate sense and echoes the repeated wording in the chapter.
- source_word: וְעָמֹד עַל נַפְשָׁם
  chosen: and stood for their lives
  alternatives:
  - and stood for themselves
  - and stood in defense of their lives
  - and defended their lives
  lexicon: HALOT
  rationale: Literally 'stood on/for their life.' The idiom conveys taking one's stand in self-defense. 'Stood for their lives' keeps the Hebrew imagery while remaining understandable; more explicit defensive paraphrases were possible but less formally aligned.
- source_word: וְנוֹחַ מֵאֹיְבֵיהֶם
  chosen: and had relief from their enemies
  alternatives:
  - and got rest from their enemies
  - and had respite from their enemies
  lexicon: HALOT
  rationale: נוּחַ here denotes obtaining rest or relief after conflict. 'Had relief' reads naturally in English and fits the narrative outcome.
- source_word: וְהָרֹג בְּשֹׂנְאֵיהֶם
  chosen: and killed seventy-five thousand among those who hated them
  alternatives:
  - and killed seventy-five thousand of those who hated them
  - and struck down seventy-five thousand of their haters
  lexicon: HALOT
  rationale: The infinitive absolute-like form with object phrase reports the result of their action. 'Those who hated them' renders שֹׂנְאֵיהֶם straightforwardly. 'Among' reflects the ב preposition without overpressing it.
- source_word: חֲמִשָּׁה וְשִׁבְעִים אָלֶף
  chosen: seventy-five thousand
  alternatives:
  - five and seventy thousand
  lexicon: HALOT
  rationale: English reverses the Hebrew number order for natural style.
- source_word: וּבַבִּזָּה
  chosen: but on the plunder
  alternatives:
  - but on the spoil
  - and on the plunder
  lexicon: HALOT
  rationale: בִּזָּה means spoil/plunder taken in war. 'Plunder' is more accessible modern English than 'spoil.' The prefixed conjunction is rendered adversatively in context because it contrasts their killing with their refusal to seize goods.
- source_word: לֹא שָׁלְחוּ אֶת יָדָם
  chosen: they did not lay a hand
  alternatives:
  - they did not send out their hand
  - they did not put forth their hand
  lexicon: HALOT
  rationale: This is an idiom for taking hold of or seizing. 'Did not lay a hand on' is the clearest idiomatic English equivalent and preserves the sense of refraining from taking property.
