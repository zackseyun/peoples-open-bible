translation:
  language: es
  text: Su cuerpo era como berilo[a], su rostro como la apariencia del relámpago, sus ojos como antorchas de fuego, sus brazos y sus pies como el brillo del bronce pulido[b], y el sonido de sus palabras como el sonido de una multitud[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «topacio», «crisólito» u otra piedra preciosa; la identificación exacta del hebreo tarshish es incierta.
    reason: lexical_alternative
  - marker: b
    text: O «como la apariencia del bronce bruñido».
    reason: lexical_alternative
  - marker: c
    text: O «como el sonido de una multitud» o «como el rugido de una multitud».
    reason: lexical_alternative
lexical_decisions:
- source_word: גְוִיָּתוֹ
  english_pob_choice: his body
  chosen_spanish: su cuerpo
  alternatives_spanish:
  - su torso
  - su forma
  lexicon: HALOT
  rationale: גְוִיָּה designa el cuerpo o la contextura física. En español, «su cuerpo» es natural y concreto, y mantiene el carácter visible de la descripción visionaria.
- source_word: כְתַרְשִׁישׁ
  english_pob_choice: like beryl
  chosen_spanish: como topacio
  alternatives_spanish:
  - como berilo
  - como crisólito
  - como piedra de Tarsis
  lexicon: HALOT
  rationale: El hebreo תַּרְשִׁישׁ nombra una piedra preciosa, pero su identificación mineral exacta es incierta. En español, «topacio» es una equivalencia tradicional posible; la incertidumbre se conserva en la nota, y se ofrecen alternativas sin fijar con demasiada precisión la gema.
- source_word: פָנָיו
  english_pob_choice: his face
  chosen_spanish: su rostro
  alternatives_spanish:
  - su cara
  - su rostro/presencia
  lexicon: HALOT
  rationale: Aunque פָּנִים puede significar «rostro» o «presencia», el contexto enumera rasgos visibles. «Su rostro» es claro y solemne en español.
- source_word: כְמַרְאֵה בָרָק
  english_pob_choice: like the appearance of lightning
  chosen_spanish: como la apariencia del relámpago
  alternatives_spanish:
  - como relámpago
  - como el aspecto del relámpago
  - como la visión del relámpago
  lexicon: HALOT
  rationale: מַרְאֶה añade el matiz de apariencia visible. «La apariencia del relámpago» conserva ese matiz mejor que una equivalencia más breve.
- source_word: עֵינָיו
  english_pob_choice: his eyes
  chosen_spanish: sus ojos
  lexicon: HALOT
  rationale: Término anatómico directo dentro de una descripción visual.
- source_word: כְלַפִּידֵי אֵשׁ
  english_pob_choice: like torches of fire
  chosen_spanish: como antorchas de fuego
  alternatives_spanish:
  - como antorchas encendidas
  - como teas de fuego
  - como brasas ardientes
  lexicon: HALOT
  rationale: לַפִּיד es una antorcha o tea encendida. «Antorchas de fuego» preserva la imaginería hebrea de manera natural y vívida.
- source_word: זְרֹעֹתָיו
  english_pob_choice: his arms
  chosen_spanish: sus brazos
  alternatives_spanish:
  - sus antebrazos
  lexicon: HALOT
  rationale: זְרוֹעַ normalmente significa «brazo». «Brazos» es la opción más natural y no requiere una restricción anatómica adicional.
- source_word: מַרְגְּלֹתָיו
  english_pob_choice: his feet
  chosen_spanish: sus pies
  alternatives_spanish:
  - sus piernas
  - sus extremidades inferiores
  lexicon: HALOT
  rationale: Aunque el término puede abarcar las extremidades inferiores, «pies» es la equivalencia estándar y encaja con el lenguaje visionario paralelo.
- source_word: כְעֵין נְחֹשֶׁת קָלָל
  english_pob_choice: like the gleam of polished bronze
  chosen_spanish: como el brillo del bronce pulido[b]
  alternatives_spanish:
  - como la apariencia del bronce bruñido
  - como el resplandor del bronce pulido
  - como el fulgor del bronce pulido
  lexicon: HALOT
  rationale: עֵין en este giro significa «apariencia» o «brillo». נְחֹשֶׁת es bronce/cobre, y קָלָל probablemente expresa algo pulido, bruñido o reluciente. «El brillo del bronce pulido» comunica bien el efecto visual en español.
- source_word: קוֹל דְּבָרָיו
  english_pob_choice: the sound of his words
  chosen_spanish: la voz de sus palabras
  alternatives_spanish:
  - el sonido de sus palabras
  - la voz de su discurso
  lexicon: HALOT
  rationale: Literalmente es «la voz/el sonido de sus palabras». «La voz de sus palabras» mantiene la estructura hebrea y el efecto auditivo, aunque en español también podría decirse «el sonido de sus palabras».
- source_word: כְקוֹל הָמוֹן
  english_pob_choice: like the sound of a multitude
  chosen_spanish: como la voz de una multitud[c]
  alternatives_spanish:
  - como el sonido de una multitud
  - como el ruido de una multitud
  - como el clamor de una multitud
  lexicon: HALOT
  rationale: הָמוֹן puede significar multitud, muchedumbre o tumulto ruidoso. «La voz de una multitud» conserva la imagen sonora; la nota ofrece las alternativas «sonido» y «ruido» para mostrar la ambigüedad del hebreo.
theological_decisions:
- issue: Identidad del personaje descrito
  english_pob_reading: Render the description straightforwardly as a visionary humanlike figure without identifying him in the translation text.
  chosen_spanish_reading: Presentar la descripción de manera directa como una figura visionaria de apariencia humana, sin identificarla en el texto traducido.
  alternative_spanish_readings:
  - un mensajero angelical
  - una manifestación teofánica
  - una aparición preencarnada de Cristo
  rationale: El versículo ofrece una descripción visionaria, pero no identifica explícitamente a la figura. Para no introducir una conclusión doctrinal ajena al versículo, la traducción se mantiene descriptiva y deja la identificación para la interpretación.
  doctrine_reference: Afirmaciones; filosofía de traducción, puntos 1 y 3
translation_notes:
  revision_awareness: El pasaje coincide de cerca con la auditoría inglesa; no se detectaron revisiones aplicadas en la fuente inglesa más reciente, y se preservó la misma estructura descriptiva general en español.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó introducir identificación doctrinal de la figura, siguiendo la lectura auditada del texto inglés.
  - Se preservó la secuencia de rasgos corporales y el paralelismo sonoro del hebreo.
