revisions:
- from: Si tu pueblo Israel es derrotado[a] delante de un enemigo, porque pecaron contra ti, y se vuelven[b] y confiesan tu nombre, y oran y te suplican[c] delante de ti en esta casa.
  to: Si tu pueblo de Israel es derrotado[a] delante de un enemigo, porque ha pecado contra ti, y se vuelve[b] y confiesa tu nombre, y ora e implora tu favor[c] delante de ti en esta casa.
  rationale: 'Ajusté la redacción para un español más natural y fiel al hebreo: ''tu pueblo de Israel'' evita una construcción áspera; mantuve el sujeto colectivo en singular con verbos singulares; cambié ''te suplican'' por ''implora tu favor'' para reflejar mejor el matiz de חנן como súplica por favor/gracia y eliminar la redundancia con ''delante de ti''. También armonicé las notas con el singular del sujeto colectivo en la redacción revisada.'
