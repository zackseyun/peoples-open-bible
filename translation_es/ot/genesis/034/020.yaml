translation:
  language: es
  text: Entonces Hamor y Siquem, su hijo, llegaron a la puerta de su ciudad y hablaron a los hombres de su ciudad[a], diciendo[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los hombres de su ciudad»; probablemente se refiere a los varones de la ciudad reunidos para la deliberación cívica en la puerta.'
    reason: cultural_note
  - marker: b
    text: 'O: «a la puerta de la ciudad». El hebreo dice literalmente «a la puerta de su ciudad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: llegaron
  alternatives_spanish:
  - vinieron
  - fueron
  - se acercaron
  lexicon: HALOT
  rationale: El hebreo avanza la narración con el verbo de movimiento hacia un destino. En español, con el complemento 'a la puerta de su ciudad', 'llegaron' comunica con naturalidad la llegada al punto objetivo sin perder el valor narrativo del wayyiqtol.
- source_word: חֲמוֹר
  english_pob_choice: Hamor
  chosen_spanish: Hamor
  lexicon: Nombre propio
  rationale: Se translitera el nombre propio sin traducirlo.
- source_word: וּשְׁכֶם בְּנוֹ
  english_pob_choice: and Shechem his son
  chosen_spanish: y Siquem, su hijo
  alternatives_spanish:
  - y su hijo Siquem
  - y Siquem su hijo
  lexicon: HALOT
  rationale: Se conserva la relación aposicional y filial. 'Siquem' mantiene la transliteración habitual en español bíblico; la coma ayuda a que el vínculo 'su hijo' quede claro y natural.
- source_word: אֶל שַׁעַר עִירָם
  english_pob_choice: to the gate of their city
  chosen_spanish: a la puerta de su ciudad
  alternatives_spanish:
  - a la puerta de la ciudad
  - al portal de su ciudad
  lexicon: HALOT
  rationale: '''שַׁעַר'' es literalmente ''puerta/portal'', pero en contexto urbano designa la entrada cívica. ''Puerta de su ciudad'' conserva la construcción hebrea y comunica el marco público sin forzar un calco incómodo.'
- source_word: וַיְדַבְּרוּ
  english_pob_choice: spoke
  chosen_spanish: hablaron
  alternatives_spanish:
  - dijeron
  - se dirigieron
  lexicon: HALOT
  rationale: '''דבר'' con ''a'' expresa hablar o dirigirse. ''Hablaron'' es el equivalente natural en español y mantiene el registro formal del relato.'
- source_word: אֶל אַנְשֵׁי עִירָם
  english_pob_choice: to the men of their city
  chosen_spanish: a los hombres de su ciudad
  alternatives_spanish:
  - a los varones de su ciudad
  - a los habitantes de su ciudad
  lexicon: HALOT
  rationale: '''אַנְשֵׁי'' significa literalmente ''hombres de''. Se mantiene ''hombres'' porque la escena apunta a los varones reunidos para deliberación cívica; ''habitantes'' diluiría esa precisión.'
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - así
  lexicon: HALOT
  rationale: '''לֵאמֹר'' introduce discurso directo. ''Diciendo'' preserva la función de conector narrativo y la proximidad al hebreo.'
theological_decisions:
- issue: sentido cívico de 'la puerta' en la ciudad
  english_pob_reading: The Hebrew is literally 'to the gate of their city.' The gate is the public place of civic deliberation.
  chosen_spanish_reading: '''la puerta de su ciudad'' mantiene el sentido literal y deja implícito el valor cívico del lugar.'
  alternative_spanish_readings:
  - '''la puerta de la ciudad'''
  - '''la puerta cívica de su ciudad'''
  rationale: No hay una carga doctrinal en el versículo, pero sí una nuance cultural importante. Mantener la literalidad evita perder la referencia al espacio público de decisión que el contexto sugiere.
  doctrine_reference: Contexto histórico-cultural del relato
- issue: referente masculino de 'los hombres de su ciudad'
  english_pob_reading: this likely refers to the male townsmen assembled for civic deliberation at the gate.
  chosen_spanish_reading: '''los hombres de su ciudad'' conserva la referencia a los varones reunidos para deliberación.'
  alternative_spanish_readings:
  - '''la gente de su ciudad'''
  - '''los ciudadanos de su ciudad'''
  rationale: La POB distingue deliberadamente el masculino literal del colectivo más general. En español conviene retener esa precisión para no borrar el matiz histórico-social del pasaje.
  doctrine_reference: Contexto histórico-social del texto bíblico
translation_notes:
  revision_awareness: El pasaje concuerda plenamente con el audit trail en inglés. No se registran revisiones aplicadas; la redacción española conserva la estructura narrativa, el valor literal de 'puerta' y el matiz masculino de 'los hombres de su ciudad'.
  spanish_consistency_notes:
  - Se mantiene 'Hamor' y 'Siquem' como transliteraciones consistentes con el español bíblico.
  - '''puerta de su ciudad'' conserva la correspondencia con el hebreo שער עירם y evita reemplazarla por una paráfrasis más interpretativa.'
  - Se preserva el masculino literal 'hombres' para no desdibujar el valor cívico-legal del contexto.
