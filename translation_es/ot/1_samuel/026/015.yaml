translation:
  language: es
  text: 'David dijo a Abner: «¿No eres un hombre? ¿Y quién es como tú[a] en Israel? ¿Por qué entonces no has montado guardia sobre tu señor el rey? Porque uno del pueblo[b] vino a destruir al rey, tu señor».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Y quién es tu igual en Israel?»'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «uno del pueblo», es decir, una persona de entre el campamento.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלוֹא אִישׁ אַתָּה
  english_pob_choice: Are you not a man?
  chosen_spanish: ¿No eres un hombre?
  alternatives_spanish:
  - ¿No eres un valiente?
  - ¿No eres un hombre de verdad?
  lexicon: HALOT
  rationale: אִישׁ designa literalmente a un hombre; el texto usa una pregunta retórica de reproche. En español, «¿No eres un hombre?» conserva la forma y la fuerza de amonestación sin añadir un calificativo que el hebreo no da.
- source_word: וּמִי כָמוֹךָ בְּיִשְׂרָאֵל
  english_pob_choice: And who is like you in Israel?
  chosen_spanish: ¿Y quién es como tú en Israel?
  alternatives_spanish:
  - ¿Y quién es tu igual en Israel?
  lexicon: HALOT
  rationale: כָמוֹךָ expresa comparación, no identidad. «¿Quién es como tú?» reproduce bien el giro hebreo y su matiz idiomático de singularidad o superioridad.
- source_word: וְלָמָּה לֹא שָׁמַרְתָּ אֶל
  english_pob_choice: Why then have you not kept watch over
  chosen_spanish: ¿Por qué entonces no has vigilado a
  alternatives_spanish:
  - ¿Por qué no has guardado a
  - ¿Por qué no has estado atento a
  lexicon: HALOT
  rationale: שׁמר puede significar guardar, cuidar o vigilar. En este contexto militar/político, «vigilar» comunica la obligación de custodia y alerta. Mantengo la relación con el objeto mediante «a», porque el hebreo dirige la responsabilidad hacia la persona del rey.
- source_word: אֲדֹנֶיךָ הַמֶּלֶךְ
  english_pob_choice: your lord the king
  chosen_spanish: a tu señor, el rey
  alternatives_spanish:
  - a tu señor el rey
  - a tu señor, el rey
  lexicon: HALOT
  rationale: אדון aquí expresa superioridad jerárquica y cortesana; «señor» conserva esa relación sin sobrecargar con «amo». El orden apposicional «tu señor, el rey» mantiene el énfasis del hebreo y la referencia doble a Saúl.
- source_word: כִּי בָא אַחַד הָעָם
  english_pob_choice: For one of the people came
  chosen_spanish: Porque uno del pueblo vino
  alternatives_spanish:
  - Pues vino uno del pueblo
  - Porque vino uno del pueblo
  lexicon: HALOT
  rationale: אַחַד הָעָם es literalmente «uno del pueblo». La forma elegida preserva la expresión hebrea sin especificar más de lo que dice el texto, tal como hace la POB inglesa.
- source_word: לְהַשְׁחִית
  english_pob_choice: to destroy
  chosen_spanish: a destruir
  alternatives_spanish:
  - para destruir
  - a arruinar
  lexicon: HALOT
  rationale: 'El hiphil de שׁחת suele significar destruir o arruinar. «A destruir» mantiene la intención verbal del hebreo y suena natural en la construcción española con «vino a». '
- source_word: הַמֶּלֶךְ אֲדֹנֶיךָ
  english_pob_choice: the king your lord
  chosen_spanish: al rey, tu señor
  alternatives_spanish:
  - al rey, tu señor
  - a tu señor, el rey
  lexicon: HALOT
  rationale: La repetición intensifica la responsabilidad de Abner. En español, «al rey, tu señor» conserva esa duplicación de manera clara y digna, sin eliminar la apposición.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés POB, que sustituyó «So why» por «Why then»; por eso se emplea «¿Por qué entonces...?» para reflejar con naturalidad la partícula interrogativa y el matiz discursivo sin cambiar el contenido.
  spanish_consistency_notes:
  - Se preservó «señor» para אֲדֹנֶיךָ según el valor jerárquico del hebreo en contexto real/cortesano.
  - «Vigilar» se eligió para שׁמר por el contexto militar de custodia y alerta.
  - Se mantuvo la repetición de títulos («el rey», «tu señor») para reflejar la intensificación retórica del hebreo.
  - La nota sobre «uno del pueblo» se ancla en el texto para conservar la ambigüedad controlada del hebreo sin especificar «soldado» o «hombre».
  - El orden y puntuación españoles se ajustan a lectura pública, pero la estructura interrogativa y causal sigue de cerca la sintaxis de origen.
