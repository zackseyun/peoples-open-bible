review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: contraste personal («Pero en cuanto a ti»), mandato («ve»), descanso previo a la consumación, y vindicación futura al final. Sin embargo, dos puntos requieren ajuste para alinearse mejor con la evidencia fuente y la pista auditada inglesa: (1) el texto español omitió en el texto principal la nota escatológica vinculada a «al fin de los días» y en cambio añadió una nota [b] que introduce una interpretación sobre el fin de la vida de Daniel ligada a «ve al fin», lo cual no corresponde a la distribución de notas del POB inglés; (2) «heredad» para לְגֹרָלְךָ es demasiado interpretativo y menos preciso que «porción asignada» o equivalente, ya que גּוֹרָל es ‘lote/porción asignada’, no necesariamente herencia en sentido patrimonial.'
  spanish_quality_summary: El español es generalmente claro y digno. «Pero en cuanto a ti, ve al fin» suena aceptable, aunque algo más natural sería mantenerlo tal cual con apoyo de nota alternativa «hasta el fin». La coordinación con comas («y descansarás, y te levantarás») resulta algo rígida; es mejor «y descansarás y te levantarás». «Heredad» suena más tradicional pero menos transparente para lectores actuales y puede sugerir un matiz no explicitado por el hebreo.
  glossary_alignment: 'No hay conflicto con las directrices principales de terminología del proyecto. Las decisiones sobre «descansarás» y «te levantarás» preservan correctamente la tensión teológica documentada. El punto léxico principal es גּוֹרָל: conviene evitar «heredad» y preferir «porción asignada» para ajustarse mejor a la rationale auditada y a la legibilidad contemporánea.'
  issues:
  - severity: medium
    issue: La nota [b] del borrador introduce una interpretación sobre «el fin de la vida de Daniel» anclada a «al fin».
    rationale: En la auditoría inglesa, la nota sobre la muerte de Daniel pertenece a «you will rest», no a «to the end». Tal como está, la nota española desplaza y confunde la justificación fuente.
  - severity: medium
    issue: Falta una nota para «al fin de los días» con su valor escatológico.
    rationale: El POB inglés conserva esta observación explícita. Dado que la frase puede sonar formulaica en español, conviene mantener la nota de referencia escatológica.
  - severity: medium
    issue: «Heredad» para לְגֹרָלְךָ es demasiado interpretativa.
    rationale: Aunque puede aproximar la idea de posesión asignada, el término hebreo es literalmente ‘lote’ y por extensión ‘porción asignada’. «Heredad» puede desviar hacia un campo semántico de herencia que no está explicitado aquí.
  - severity: low
    issue: La puntuación con dos comas entre verbos coordinados suena algo acartonada.
    rationale: «Y descansarás y te levantarás» es más natural en español sin perder solemnidad.
