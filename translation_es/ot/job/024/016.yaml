  to: En la oscuridad irrumpen en las casas[a]; de día se encierran[b]; no conocen la luz[c].
  rationale: Se ajusta חָתַר a «irrumpen en» para reflejar mejor la intrusión forzada del original y de la decisión inglesa «break into». Se elimina «en ellas» porque no está expresado en el hebreo y puede sobreinterpretar el referente. Se mantienen «la luz» y las notas alternativas para conservar tanto el contraste literal como la posible resonancia moral.
