translation:
  language: es
  text: Los profetas que fueron antes de mí y antes de ti desde tiempos antiguos profetizaron contra muchas tierras y contra grandes reinos[a], de guerra, de calamidad y de peste[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘desde antiguo’. La expresión hebrea aquí se refiere a un tiempo muy lejano, no necesariamente a la eternidad.
    reason: lexical_alternative
  - marker: b
    text: O ‘pestilencia’.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנְּבִיאִים
  english_pob_choice: The prophets
  chosen_spanish: Los profetas
  alternatives_spanish:
  - Los profetas
  lexicon: HALOT
  rationale: El hebreo usa el sustantivo definido en plural; en español corresponde de manera directa y natural como ‘los profetas’.
- source_word: אֲשֶׁר הָיוּ לְפָנַי וּלְפָנֶיךָ
  english_pob_choice: who were before me and before you
  chosen_spanish: que estaban antes de mí y antes de ti
  alternatives_spanish:
  - que fueron antes de mí y antes de ti
  - que estuvieron delante de mí y delante de ti
  lexicon: HALOT
  rationale: La expresión es temporal, no espacial. ‘Estaban antes de mí y antes de ti’ conserva el giro hebreo con español natural. ‘Delante de’ sería posible, pero podría sonar espacial y menos claro aquí.
- source_word: מִן הָעוֹלָם
  english_pob_choice: from ancient times
  chosen_spanish: desde tiempos antiguos
  alternatives_spanish:
  - desde antiguo
  - desde tiempos remotos
  - desde lo antiguo
  lexicon: HALOT
  rationale: En este contexto עוֹלָם señala tiempo muy lejano, no eternidad metafísica. ‘Desde tiempos antiguos’ comunica bien esa antigüedad sin exagerar el alcance.
- source_word: וַיִּנָּבְאוּ
  english_pob_choice: prophesied
  chosen_spanish: profetizaron
  alternatives_spanish:
  - profetizaron
  - anunciaron como profetas
  lexicon: HALOT
  rationale: El verbo נבא se traduce de forma directa con ‘profetizar’, que mantiene el sentido técnico y profético del hebreo.
- source_word: אֶל אֲרָצוֹת רַבּוֹת וְעַל מַמְלָכֹת גְּדֹלוֹת
  english_pob_choice: against many lands and against great kingdoms
  chosen_spanish: contra muchas tierras y contra grandes reinos
  alternatives_spanish:
  - contra muchos países y contra grandes reinos
  - acerca de muchas tierras y de grandes reinos
  - para muchas tierras y para grandes reinos
  lexicon: HALOT
  rationale: Con נבא, estas preposiciones tienen fuerza adversativa en oráculos de juicio. ‘Contra’ preserva esa lectura, que además armoniza con la lista de calamidades que sigue.
- source_word: לְמִלְחָמָה
  english_pob_choice: of war
  chosen_spanish: de guerra
  alternatives_spanish:
  - para guerra
  - sobre guerra
  lexicon: HALOT
  rationale: El לְ introduce el contenido del anuncio. ‘De guerra’ es la forma más natural en español dentro de la serie nominal.
- source_word: וּלְרָעָה
  english_pob_choice: and disaster
  chosen_spanish: y de calamidad
  alternatives_spanish:
  - y de desastre
  - y de mal
  - y de desgracia
  lexicon: HALOT
  rationale: רָעָה aquí no apunta primariamente a mal moral, sino a ruina/calamidad judicial. ‘Calamidad’ conserva ese valor con dignidad y claridad.
- source_word: וּלְדָבֶר
  english_pob_choice: and plague
  chosen_spanish: y de peste
  alternatives_spanish:
  - y de plaga
  - y de pestilencia
  lexicon: HALOT
  rationale: דָבֶר denota peste/pestilencia. ‘Peste’ es claro y bíblicamente reconocible en español; además mantiene la concreción de un castigo epidémico.
theological_decisions:
- issue: Valor adversativo de las preposiciones con ‘profetizar’
  english_pob_reading: The prophets 'prophesied against many lands and against great kingdoms.'
  chosen_spanish_reading: Los profetas profetizaron contra muchas tierras y contra grandes reinos.
  alternative_spanish_readings:
  - Los profetas profetizaron acerca de muchas tierras y de grandes reinos.
  - Los profetas profetizaron para muchas tierras y para grandes reinos.
  rationale: El contexto inmediato es un contraste entre el mensaje de Jeremías y el de un profeta optimista; la serie final ‘de guerra, de calamidad y de peste’ muestra que se trata de oráculos de juicio. Por eso ‘contra’ expresa mejor la intención del texto que una traducción neutral.
  doctrine_reference: Profecía de juicio en Jeremías; cf. Jeremías 28:9-10 para el contraste contextual.
translation_notes:
  revision_awareness: 'El texto inglés auditado mantiene una lectura adversativa de אֶל/עַל en contexto de juicio y una nota léxica para מִן הָעוֹלָם. La versión española conserva ambas decisiones: ‘contra’ para el sentido profético hostil y ‘desde tiempos antiguos’ con nota alternativa para evitar leer eternidad metafísica. También refleja la alternativa léxica de דָבֶר con ‘peste’.'
  spanish_consistency_notes:
  - Se mantuvo ‘profetizaron’ para נבא, en coherencia con el POB inglés.
  - Se usó ‘Yahvé’ solo cuando el texto lo exija; este versículo no contiene el Tetragrámaton.
  - ‘Calamidad’ se eligió para רָעָה por su valor de juicio, no moral.
  - ‘Peste’ conserva el matiz de epidemia/judicio y es aceptable junto a la nota alternativa ‘pestilencia’.
