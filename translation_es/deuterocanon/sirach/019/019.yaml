translation:
  language: es
  text: Hay una maldad que también es abominación, y hay un necio carente de sabiduría[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un necio falto de sabiduría» o «un necio disminuido en sabiduría». El participio griego puede expresar más literalmente una deficiencia o disminución respecto de la sabiduría.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πονηρία
  english_pob_choice: wickedness
  chosen_spanish: maldad
  alternatives_spanish:
  - maldad
  - perversidad
  - malicia
  lexicon: BDAG
  rationale: Aquí πονηρία designa una condición moral mala en general. 'Maldad' comunica bien ese peso moral en español sin restringirlo a la intención hostil de 'malicia' ni sonar más abstracto que el contexto sapiencial requiere.
- source_word: βδέλυγμα
  english_pob_choice: abomination
  chosen_spanish: abominación
  alternatives_spanish:
  - cosa abominable
  - detestación
  lexicon: LEH
  rationale: '''Abominación'' conserva el registro bíblico fuerte de repulsión moral o religiosa que el término griego suele tener. Es más fiel y estable en español bíblico que una paráfrasis más explicativa.'
- source_word: ἄφρων
  english_pob_choice: fool
  chosen_spanish: necio
  alternatives_spanish:
  - tonto
  - insensato
  - fool
  lexicon: BDAG
  rationale: En literatura sapiencial, ἄφρων no es mera torpeza intelectual, sino una necedad moral y espiritual. 'Necio' es el equivalente español más natural y bíblico para esa categoría.
- source_word: ἐλαττούμενος σοφίᾳ
  english_pob_choice: lacking in wisdom
  chosen_spanish: carente de sabiduría
  alternatives_spanish:
  - falto de sabiduría
  - sin sabiduría
  - que carece de sabiduría
  lexicon: LSJ
  rationale: El participio expresa deficiencia o disminución respecto de la sabiduría. 'Carente de sabiduría' es un español formal y claro que conserva la idea de falta, sin forzar una construcción demasiado literal o pesada.
- source_word: καὶ αὕτη
  english_pob_choice: that is also
  chosen_spanish: también es
  alternatives_spanish:
  - y esto también es
  - y esta también es
  lexicon: LSJ
  rationale: La secuencia une de cerca la segunda predicación con la primera. 'También es' mantiene la relación aditiva y la fluidez natural del español, sin perder que la maldad mencionada queda clasificada como abominación.
translation_notes:
  revision_awareness: La redacción sigue la revisión del inglés POB que prefirió 'lacking in wisdom' sobre formulaciones más dinámicas como 'falls short in wisdom'. En español se refleja con 'carente de sabiduría', una forma directa, formal y naturalmente comprensible.
  spanish_consistency_notes:
  - Se mantiene 'sabiduría' para σοφίᾳ, coherente con el lenguaje sapiencial de Sirácida.
  - Se evita 'Cristo', 'Señor' u otras terminologías no presentes en el versículo.
  - '''Necio'' se usa como término sapiencial, no meramente coloquial.'
  - La frase 'Hay una maldad' preserva el tono impersonal del griego ἔστιν sin añadir sujeto explícito innecesario.
