translation:
  language: es
  text: ¿Hay injusticia en mi lengua? ¿Acaso mi paladar no discierne calamidades?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cosas perversas» o «cosas ruinosas» para «calamidades». El término hebreo puede referirse tanto a males destructivos o calamidades como a cosas moralmente torcidas.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲיֵשׁ
  english_pob_choice: Is there
  chosen_spanish: ¿Hay…?
  alternatives_spanish:
  - ¿Existe…?
  - ¿Acaso hay…?
  lexicon: HALOT
  rationale: La pregunta retórica se expresa de forma natural en español con «¿Hay…?». Conserva la brevedad y el valor interrogativo del hebreo sin añadir énfasis innecesario.
- source_word: בִּלְשׁוֹנִי
  english_pob_choice: on my tongue
  chosen_spanish: en mi lengua
  alternatives_spanish:
  - sobre mi lengua
  - en mi boca
  lexicon: HALOT
  rationale: «Lengua» mantiene el órgano concreto y el valor metonímico del habla. En español, «en mi lengua» comunica mejor la imagen que un calco como «sobre mi lengua».
- source_word: עַוְלָה
  english_pob_choice: injustice
  chosen_spanish: iniquidad
  alternatives_spanish:
  - injusticia
  - perversidad
  - error
  lexicon: HALOT
  rationale: El término hebreo puede abarcar injusticia, torcimiento o mal moral. «Iniquidad» preserva bien esa carga moral y suena más fuerte que «injusticia» en este contexto de autodefensa retórica.
- source_word: חִכִּי
  english_pob_choice: my palate
  chosen_spanish: mi paladar
  alternatives_spanish:
  - mi boca
  - mi gusto
  lexicon: HALOT
  rationale: «Paladar» refleja el sentido literal del hebreo y conserva la metáfora de discernimiento por el gusto. Es más preciso que «boca» y más concreto que «gusto».
- source_word: לֹא יָבִין
  english_pob_choice: not discern
  chosen_spanish: no discierne
  alternatives_spanish:
  - no entiende
  - no percibe
  - no distingue
  lexicon: HALOT
  rationale: Con la imagen del paladar, «discierne» reproduce mejor la capacidad evaluativa del verbo hebreo que «entiende». Mantiene el enlace entre sabor y juicio.
- source_word: הַוּוֹת
  english_pob_choice: calamities
  chosen_spanish: calamidades
  alternatives_spanish:
  - males
  - ruinas
  - cosas perversas
  lexicon: HALOT
  rationale: «Calamidades» sigue de cerca la lectura principal del POB inglés y encaja con el contexto de sufrimiento de Job. Se preserva en nota la alternativa moral de «cosas perversas» o la idea de «ruinas».
translation_notes:
  revision_awareness: 'Se siguió de cerca la lectura auditada del POB inglés, que entiende el paralelismo como dos preguntas retóricas: la primera sobre la lengua y la segunda sobre el paladar que discierne. No hubo revisiones aplicadas en el último pase, y la traducción española conserva la ambigüedad lexical de הַוּוֹת en una nota.'
  spanish_consistency_notes:
  - Se prefirió «lengua» para בִּלְשׁוֹנִי y «paladar» para חִכִּי por consistencia con la metáfora corporal del discernimiento.
  - Se mantuvo «calamidades» en el texto principal para seguir la elección principal del POB inglés, dejando la alternativa moral en la nota.
  - Se usó puntuación interrogativa española completa y un solo marcador de nota al final de la frase, sin introducir notas adicionales no requeridas.
