translation:
  language: es
  text: ¿Quién justificará[a] al que peca contra su propia alma, y quién honrará al que deshonra su propia vida?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo conservado de este versículo en la Geniza de El Cairo difiere notablemente del griego y es difícil: aproximadamente, «Hijo mío, en humildad honra tu alma, y él te dará discernimiento y honra perdida». El texto principal sigue aquí el griego porque el testimonio hebreo parece textualmente inestable en este punto.'
    reason: textual_variant
lexical_decisions:
- source_word: בְּנִי / τὸν ἁμαρτάνοντα
  english_pob_choice: My son / the one who sins
  chosen_spanish: Hijo mío
  alternatives_spanish:
  - el que peca
  - el pecador
  lexicon: LXX / Kahana Hebrew context; English POB revision trail
  rationale: Aunque el griego paralelo ofrece otra sentencia distinta, la revisión auditada del POB adopta el hebreo conservado como base textual principal para esta edición. Por eso se mantiene el vocativo filial «Hijo mío», que corresponde directamente a בְּנִי y es el arranque del hebreo transmitido.
- source_word: בַּעֲנָוָה
  english_pob_choice: with humility
  chosen_spanish: con humildad
  alternatives_spanish:
  - en humildad
  - humildemente
  lexicon: Hebrew semantic range; English POB
  rationale: La preposición y el sustantivo español reproducen de manera natural el medio o circunstancia de la acción. «Con humildad» conserva el tono sapiencial y evita un calco rígido.
- source_word: כַּבֵּד נַפְשֶׁךָ / εἰς τὴν ψυχὴν αὐτοῦ
  english_pob_choice: honor yourself / against his own soul
  chosen_spanish: honra tu alma
  alternatives_spanish:
  - honra tu ser
  - haz honor a tu vida
  lexicon: Hebrew plus Greek parallel; POB lexical tension
  rationale: El hebreo usa el verbo «honrar» con el objeto «tu alma». En español, «alma» conserva el valor interno/personal sin forzar el sentido; además respeta la redacción de la fuente hebrea que el POB decidió seguir en la revisión. No se traslada el giro griego de «contra su alma» porque la lectura publicada aquí sigue el hebreo documentado.
- source_word: וְיִתֶּן לְךָ טַעַם וְכָבוֹד
  english_pob_choice: and give yourself the esteem you deserve
  chosen_spanish: y date el aprecio que mereces
  alternatives_spanish:
  - y te conceda discernimiento y honra
  - y te dé gusto y honor
  lexicon: Hebrew + English POB revision; semantic range of טַעַם / כָבוֹד
  rationale: La frase hebrea es difícil y el audit trail señala inestabilidad textual frente al griego. La revisión inglesa optó por un equivalente idiomático centrado en el honor/aprecio. En español, «date el aprecio que mereces» comunica la idea de dignidad o estima adecuada sin introducir más contenido del que la base hebrea y la revisión justifican.
theological_decisions:
- issue: Divergencia fuerte entre el hebreo conservado y el griego paralelo
  english_pob_reading: The main text follows the Hebrew revision, while the Greek is noted as a divergent parallel
  chosen_spanish_reading: Se sigue el hebreo transmitido en el texto principal, con la divergencia griega preservada solo como trasfondo auditado
  alternative_spanish_readings:
  - 'Traducir el griego: «¿Quién justificará al que peca contra su alma, y quién honrará al que deshonra su vida?»'
  - Traducir de forma mixta incorporando ambos testigos
  rationale: La documentación del POB muestra una revisión posterior que reemplaza un borrador basado en el griego por una traducción ajustada al hebreo de Kahana. Dado que la edición final auditada privilegia ese hebreo, el texto español debe seguir esa decisión, manteniendo honestidad textual sin mezclar testigos en la línea principal.
  doctrine_reference: 'PHILOSOPHY.md: en Sirácides se prioriza el hebreo cuando está disponible y suficientemente claro; las divergencias se registran abiertamente.'
translation_notes:
  revision_awareness: 'El audit trail muestra una corrección importante: un borrador previo seguía el griego («¿Quién justificará...?»), pero la revisión final reemplazó ese enfoque por una traducción alineada con el hebreo de Kahana. Este draft español sigue la línea revisada y deja constancia de la divergencia textual en la nota.'
  spanish_consistency_notes:
  - Se usa «Hijo mío» como vocativo sapiencial, coherente con el hebreo.
  - «alma» se conserva para נֶפֶשׁ / ψυχή cuando el texto hebreo lo pide y no se fuerza a «vida».
  - Se evita introducir «Cristo», «SEÑOR» o terminología eclesial ajena al versículo.
  - La nota [a] está anclada explícitamente en el texto para cumplir la trazabilidad de la variante textual.
