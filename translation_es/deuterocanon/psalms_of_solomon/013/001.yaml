revisions:
- from: La diestra de Yahvé me cubrió[a]; la diestra de Yahvé nos perdonó[b].
  to: La diestra de Yahvé me cubrió[a]; la diestra de Yahvé nos perdonó la vida[b].
  rationale: Se conserva 'diestra' y 'Yahvé' por fidelidad al registro bíblico y a la terminología del proyecto. Se corrige ἐφείσατο ἡμῶν a 'nos perdonó la vida', que en español expresa claramente el sentido de 'spared us' sin inducir la idea principal de absolución de culpa. La nota alternativa mantiene el matiz de misericordia documentado en el English POB. No se requiere adjudicación superior porque la corrección es clara y de bajo riesgo doctrinal.
