translation:
  language: es
  text: 'y de la tribu de Aser: Misal con sus pastizales[a][b], y Abdón con sus pastizales.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'Mishal'. Las transliteraciones de este topónimo varían entre tradiciones y ediciones.
    reason: lexical_alternative
  - marker: b
    text: '''Pastizales'' traduce aquí el campo abierto perteneciente a la ciudad, especialmente para pastoreo y uso comunal.'
    reason: cultural_note
lexical_decisions:
- source_word: וּמִמַּטֵּה
  english_pob_choice: and from the tribe of
  chosen_spanish: y de la tribu de
  alternatives_spanish:
  - y del báculo de
  - y de la vara de
  lexicon: HALOT
  rationale: En contextos de reparto territorial, מַטֶּה designa la tribu, no un objeto físico; por eso se traduce naturalmente como 'tribu'. La preposición prefijada exige 'de la'. Se conserva la relación de procedencia con 'y de la tribu de'.
- source_word: אָשֵׁר
  english_pob_choice: Asher
  chosen_spanish: Aser
  alternatives_spanish:
  - Asher
  lexicon: HALOT
  rationale: Nombre propio tribal. En español bíblico la forma habitual y más natural es 'Aser', manteniendo la identificación clara sin depender del calco inglés.
- source_word: מִשְׁאָל
  english_pob_choice: Mishal
  chosen_spanish: Mishal
  alternatives_spanish:
  - Misheal
  lexicon: HALOT
  rationale: Topónimo transliterado. Se conserva 'Mishal' porque refleja más de cerca la forma consonántica hebrea y coincide con la decisión auditada del inglés POB.
- source_word: מִגְרָשֶׁהָ
  english_pob_choice: its pasturelands
  chosen_spanish: sus pastizales
  alternatives_spanish:
  - sus tierras abiertas
  - sus terrenos comunales
  - su espacio abierto
  lexicon: HALOT
  rationale: מִגְרָשׁ se refiere al terreno abierto que rodea la ciudad, usado a menudo para pastoreo y uso comunal. 'Pastizales' comunica ese valor funcional en español sin reducirlo a un sentido exclusivamente agrícola.
- source_word: עַבְדּוֹן
  english_pob_choice: Abdon
  chosen_spanish: Abdón
  alternatives_spanish:
  - Abdón
  lexicon: HALOT
  rationale: Topónimo/nombre propio. Se adapta a la ortografía española con tilde por ser palabra aguda terminada en n, manteniendo la transliteración reconocible.
- source_word: וְאֶת
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - y
  lexicon: HALOT
  rationale: La conjunción coordinante se expresa con 'y'; el marcador de objeto directo hebreo no tiene equivalente en español y no se traduce.
translation_notes:
  revision_awareness: Se siguió el pasaje hebreo base y el audit trail inglés sin cambios textuales relevantes; la única adaptación principal fue la naturalización de nombres propios al español (Aser, Abdón) y la elección de un equivalente funcional para מִגְרָשׁ coherente con el uso territorial del listado levítico.
  spanish_consistency_notes:
  - Se mantiene 'Mishal' sin españolizar el nombre, en línea con la variación textual documentada.
  - '''Pastizales'' conserva la idea de terreno abierto y de uso comunal, evitando una equivalencia demasiado técnica o demasiado restrictiva.'
  - No se introdujo 'SEÑOR' ni terminología teológica ajena al versículo; el texto es puramente toponímico y territorial.
