translation:
  language: es
  text: Y Betuel engendró a Rebeca. Estos ocho Milca[a] se los dio a luz a Nahor, hermano de Abraham.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Estos fueron los ocho que Milca dio a luz a Nahor, hermano de Abraham».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְתוּאֵ֖ל
  english_pob_choice: And Bethuel
  chosen_spanish: Y Betuel
  alternatives_spanish:
  - Ahora Betuel
  lexicon: HALOT
  rationale: La conjunción ו se vierte con «Y» para mantener la continuidad genealógica. El nombre propio se translitera como Betuel, forma natural y transparente en español.
- source_word: יָלַ֣ד אֶת רִבְקָ֑ה
  english_pob_choice: fathered Rebekah
  chosen_spanish: engendró a Rebeca
  alternatives_spanish:
  - fue padre de Rebeca
  - engendró Rebeca
  lexicon: HALOT
  rationale: En este contexto genealógico, יָלַד con sujeto masculino se expresa con «engendró» para conservar el registro bíblico y la relación de paternidad. «A» marca el objeto directo de forma natural en español.
- source_word: שְׁמֹנָ֥ה אֵ֨לֶּה֙
  english_pob_choice: These eight
  chosen_spanish: Estas ocho
  alternatives_spanish:
  - Estas eran las ocho
  - Estos ocho
  lexicon: HALOT
  rationale: Se conserva la concisión del hebreo y la referencia anafórica. En español, el femenino plural concuerda con la idea implícita de «personas/hijas» o con el grupo mencionado en la genealogía, sin añadir una palabra no explicitada por el texto.
- source_word: יָלְדָ֣ה
  english_pob_choice: bore
  chosen_spanish: dio a luz
  alternatives_spanish:
  - engendró
  - parió
  lexicon: HALOT
  rationale: Con sujeto femenino, יָלַד se rinde de manera natural como «dio a luz», que conserva el sentido biológico y genealógico sin arcaísmo excesivo.
- source_word: מִלְכָּ֔ה
  english_pob_choice: Milcah
  chosen_spanish: Milca
  alternatives_spanish:
  - Milcá
  lexicon: HALOT
  rationale: Se adapta el nombre al uso español habitual con terminación simple «Milca», manteniendo la identidad del nombre propio.
- source_word: לְ/נָח֖וֹר
  english_pob_choice: to Nahor
  chosen_spanish: para Nahor
  alternatives_spanish:
  - a Nahor
  - de Nahor
  lexicon: HALOT
  rationale: En fórmulas genealógicas, ל puede expresar relación de pertenencia o asignación. «Para Nahor» preserva bien la relación del linaje con Nahor y evita una calca innecesaria; también deja abierta la posible lectura de descendencia vinculada a él.
- source_word: אֲחִ֥י אַבְרָהָֽם
  english_pob_choice: Abraham’s brother
  chosen_spanish: hermano de Abraham
  alternatives_spanish:
  - el hermano de Abraham
  - el hermano de Abrahán
  lexicon: HALOT
  rationale: La construcción genitiva se vierte con naturalidad como «hermano de Abraham», clara y fiel. Se mantiene Abraham como forma estable en español bíblico contemporáneo.
translation_notes:
  revision_awareness: Se siguió el sentido genealógico del hebreo y el acuerdo sustantivo con el antecedente implícito, procurando una versión pública clara y auditable; no hubo cambios relevantes respecto del audit trail inglés.
  spanish_consistency_notes:
  - Se emplea «engendró» para יָלַד en contexto masculino y «dio a luz» en contexto femenino, manteniendo la distinción genética del hebreo.
  - Se transliteran los nombres propios de manera uniforme y en forma habitual para el español bíblico.
  - Se preserva la estructura genealógica compacta del hebreo sin añadir información no presente en el texto.
