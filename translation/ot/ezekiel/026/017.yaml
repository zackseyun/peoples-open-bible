id: EZK.26.17
reference: Ezekiel 26:17
source:
  edition: WLC
  text: וְ/נָשְׂא֨וּ עָלַ֤יִ/ךְ קִינָה֙ וְ/אָ֣מְרוּ לָ֔/ךְ אֵ֣יךְ אָבַ֔דְתְּ נוֹשֶׁ֖בֶת מִ/יַּמִּ֑ים הָ/עִ֣יר הַ/הֻלָּ֗לָה אֲשֶׁר֩ הָיְתָ֨ה חֲזָקָ֤ה בַ/יָּם֙ הִ֣יא וְ/יֹשְׁבֶ֔י/הָ אֲשֶׁר נָתְנ֥וּ חִתִּיתָ֖/ם לְ/כָל יוֹשְׁבֶֽי/הָ־־׃
translation:
  text: They will raise a lament over you and say to you[a], ‘How you have perished, inhabited from the seas, the renowned city, which was strong in the sea, she and her inhabitants[c][b], who imposed their terror on all its inhabitants.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'inhabited from the seas,' a difficult phrase that may mean populated or supplied from maritime regions; some translations render more interpretively, such as 'situated at the entrance of the sea.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the renowned city' / 'the celebrated city.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'gave their terror'—that is, caused dread among others.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָשְׂאוּ ... קִינָה
  chosen: they will raise a lament
  alternatives:
  - they will take up a lament
  - they will lift up a dirge
  lexicon: HALOT
  rationale: The idiom נשׂא + קינה means to utter or take up a lamentation. 'Raise a lament' preserves the metaphor while remaining natural English.
- source_word: אָבַדְתְּ
  chosen: you have perished
  alternatives:
  - you are destroyed
  - you have vanished
  lexicon: HALOT
  rationale: The verb אבד commonly denotes perishing or being destroyed. 'Have perished' keeps the exclamatory lament tone introduced by אֵיךְ.
- source_word: נוֹשֶׁבֶת מִיַּמִּים
  chosen: you who were inhabited from the seas
  alternatives:
  - inhabited from the seas
  - settled from the seas
  - dwelling by the seas
  lexicon: HALOT
  rationale: The MT reads a passive/participle form from ישׁב with מִן + 'seas.' The phrase is difficult. Rather than emending, this draft preserves the likely sense that Tyre was populated or supplied from maritime regions. 'From the seas' reflects the plural יַמִּים.
- source_word: הָעִיר הַהֻלָּלָה
  chosen: the praised city
  alternatives:
  - the renowned city
  - the celebrated city
  lexicon: HALOT
  rationale: The passive participle from הלל here means praised/celebrated. 'Praised city' is slightly more formal and stays close to the Hebrew; 'renowned' is possible but more interpretive.
- source_word: חֲזָקָה בַיָּם
  chosen: was strong in the sea
  alternatives:
  - was mighty on the sea
  - was powerful at sea
  lexicon: HALOT
  rationale: חזק denotes strength or might. בַיָּם is rendered 'in the sea' to reflect Tyre's maritime setting and the Hebrew preposition directly.
- source_word: הִיא וְיֹשְׁבֶיהָ
  chosen: she and her inhabitants
  alternatives:
  - it and its inhabitants
  lexicon: HALOT
  rationale: Because עיר is grammatically feminine and cities are often personified in prophetic poetry, 'she and her inhabitants' preserves the Hebrew personification better than impersonal 'it.'
- source_word: נָתְנוּ חִתִּיתָם
  chosen: imposed their terror
  alternatives:
  - caused their terror
  - spread their dread
  - put their fear
  lexicon: HALOT
  rationale: The idiom נתן + חִתִּית conveys causing dread or terror. 'Imposed their terror' is idiomatic English and preserves the active force.
- source_word: לְכָל יוֹשְׁבֶיהָ
  chosen: on all her inhabitants
  alternatives:
  - on all who inhabited her
  - on all its inhabitants
  lexicon: HALOT
  rationale: The suffix most naturally refers back to the city in the poetic personification. The phrase is syntactically awkward in Hebrew; this rendering keeps the MT wording without smoothing away the difficulty.
