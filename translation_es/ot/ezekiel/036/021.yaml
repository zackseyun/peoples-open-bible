review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: preserva ''la casa de Israel'', ''profanó'', ''entre las naciones'' y el enfoque en el nombre santo de Dios. Sin embargo, ''tuve piedad de mi santo nombre'' suena poco natural en español cuando el objeto es ''nombre'', y la nota ofrece ''lo preservé'', que se aleja del valor básico de חמל en este contexto, donde la idea principal es consideración/cuidado por el honor del nombre.'
  spanish_quality_summary: La redacción es clara y digna, pero 'tuve piedad de mi santo nombre' resulta extraña en español e introduce una imagen poco idiomática. 'Tuve consideración por mi santo nombre' o 'tuve cuidado por/de mi santo nombre' comunica mejor la preocupación por el honor del nombre sin sonar forzado. 'Adonde habían ido' es aceptable, aunque 'a donde habían ido' suele leerse más naturalmente en español actual.
  glossary_alignment: No hay conflicto con los términos troncales del proyecto. 'Yahvé' aparece correctamente en la nota. 'Santo nombre', 'casa de Israel' y 'naciones' están bien alineados con la terminología y con la rationale teológica del pasaje.
  issues:
  - severity: medium
    issue: 'Expresión principal poco idiomática: ''tuve piedad de mi santo nombre'''
    rationale: Aunque reproduce de cerca el inglés auditado, en español 'tener piedad de' con 'nombre' como objeto suena antinatural y puede distraer del sentido de celo por el honor divino.
  - severity: medium
    issue: Nota lexical incluye 'lo preservé' como alternativa
    rationale: '''Preservé'' desplaza el campo semántico desde compasión/consideración hacia protección material. La nota inglesa dice ''I spared'' y ''I had pity for''; en español conviene una alternativa como ''tuve consideración por'' o ''perdoné/escatimé'' solo si se explica mejor, pero ''preservé'' no es la mejor equivalencia aquí.'
  - severity: low
    issue: '''Adonde'' puede actualizarse a ''a donde'''
    rationale: Ambas formas son comprensibles, pero 'a donde' suele percibirse más natural en español contemporáneo general.
  revised_spanish_text: Pero tuve consideración por mi santo nombre[a], que la casa de Israel profanó entre las naciones a donde habían ido.
  revised_footnotes:
