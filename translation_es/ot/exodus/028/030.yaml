translation:
  language: es
  text: Y pondrás en el pectoral del juicio[a] los Urim y los Tumim[b], y estarán sobre el corazón de Aarón cuando entre delante de Yahvé[c]; y Aarón llevará el juicio de los hijos de Israel sobre su corazón delante de Yahvé continuamente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el pectoral para decisión» / «el pectoral de justicia». El hebreo מִשְׁפָּט puede denotar juicio, decisión o justicia según el contexto.
    reason: alternative_reading
  - marker: b
    text: '«Urim» y «Tumim» son los nombres hebreos de objetos sagrados asociados con el discernimiento sacerdotal; su forma y funcionamiento exactos son inciertos. Posibles sentidos etimológicos: «luces» y «perfecciones».'
    reason: lexical_alternative
  - marker: c
    text: O «cuando va delante de Yahvé» / «cuando se presenta delante de Yahvé». El hebreo expresa el momento de la entrada de Aarón en la presencia divina.
    reason: alternative_reading
lexical_decisions:
- source_word: חֹשֶׁן הַמִּשְׁפָּט
  english_pob_choice: the breastpiece of judgment
  chosen_spanish: el pectoral del juicio
  alternatives_spanish:
  - el pectoral para decisión
  - el pectoral de justicia
  lexicon: HALOT
  rationale: חֹשֶׁן designa la pieza sacerdotal del pecho; en español, «pectoral» comunica mejor esa prenda que un calco más técnico. Se conserva מִשְׁפָּט como «juicio» para mantener la repetición léxica del versículo y la idea de una función judicial/oracular asociada al objeto.
- source_word: הָאוּרִים
  english_pob_choice: the Urim
  chosen_spanish: los Urim
  alternatives_spanish:
  - las luces
  lexicon: HALOT
  rationale: Se translitera el término técnico en vez de traducirlo semánticamente, porque su forma y función precisas son inciertas. Así se evita convertir una posible etimología en significado cerrado.
- source_word: הַתֻּמִּים
  english_pob_choice: the Thummim
  chosen_spanish: los Tumim
  alternatives_spanish:
  - las perfecciones
  - las integridades
  lexicon: HALOT
  rationale: Como con Urim, se preserva el nombre técnico por transliteración. Esto mantiene la transparencia del texto y evita una interpretación especulativa.
- source_word: אֶל
  english_pob_choice: into
  chosen_spanish: en
  alternatives_spanish:
  - dentro de
  - sobre
  lexicon: HALOT
  rationale: Aunque el inglés POB usa «into», en español «en» funciona de forma natural con la colocación de objetos en una prenda/elemento litúrgico y conserva el sentido de inserción o ubicación.
- source_word: וְהָיוּ עַל לֵב אַהֲרֹן
  english_pob_choice: and they shall be on Aaron’s heart
  chosen_spanish: y estarán sobre el corazón de Aarón
  alternatives_spanish:
  - y estarán en el corazón de Aarón
  - y estarán sobre el pecho de Aarón
  lexicon: HALOT
  rationale: «Corazón» conserva la imagen hebrea y su valor representativo; «sobre» refleja עַל sin borrar la ubicación física de la placa sobre el pecho.
- source_word: בְּבֹאוֹ לִפְנֵי יְהוָה
  english_pob_choice: when he goes in before Yahweh
  chosen_spanish: cuando entre delante de Yahvé
  alternatives_spanish:
  - cuando vaya delante de Yahvé
  - cuando se presente delante de Yahvé
  lexicon: HALOT
  rationale: Se vierte con un futuro de subjuntivo natural en español. «Delante de Yahvé» conserva el lenguaje de comparecencia cultual ante la presencia divina.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el principio del proyecto de transliterar el Nombre divino como «Yahvé», preservando la referencia personal del Tetragrámaton en lugar de sustituirlo por un título.
- source_word: וְנָשָׂא
  english_pob_choice: shall bear
  chosen_spanish: llevará
  alternatives_spanish:
  - cargará
  - soportará
  lexicon: HALOT
  rationale: En este contexto sacerdotal, «llevará» permite expresar tanto la carga física/representativa como la responsabilidad ritual. «Bear» en inglés tiene ese doble alcance; en español «llevar» lo comunica con naturalidad.
- source_word: מִשְׁפַּט בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the judgment of the sons of Israel
  chosen_spanish: el juicio de los hijos de Israel
  alternatives_spanish:
  - la decisión de los hijos de Israel
  - la justicia de los hijos de Israel
  lexicon: HALOT
  rationale: Se mantiene «juicio» para conservar el enlace con «pectoral del juicio» y la carga judicial del término. «Hijos de Israel» reproduce el hebreo de forma precisa y el registro bíblico tradicional.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la forma masculina del hebreo como designación pactual del pueblo. En español bíblico, «hijos de Israel» sigue siendo claro y fiel al original.
- source_word: עַל לִבּוֹ
  english_pob_choice: on his heart
  chosen_spanish: sobre su corazón
  alternatives_spanish:
  - en su corazón
  - sobre su pecho
  lexicon: HALOT
  rationale: Se mantiene la repetición de la imagen del corazón y el valor simbólico de portar representativamente a Israel ante Dios.
- source_word: תָּמִיד
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - siempre
  - sin cesar
  lexicon: HALOT
  rationale: «Continuamente» transmite la idea de una vigencia constante u ordinaria, sin exigir una acción ininterrumpida minuto a minuto.
theological_decisions:
- issue: Cómo rendir los términos sacerdotales Urim y Tumim
  english_pob_reading: Transliterate as 'Urim' and 'Thummim'
  chosen_spanish_reading: Transliterar como «Urim» y «Tumim»
  alternative_spanish_readings:
  - Traducirlos como «luces y perfecciones»
  rationale: El texto no permite definir con seguridad la naturaleza exacta de estos objetos. La transliteración preserva la incertidumbre legítima y evita presentar una etimología discutida como si fuera el sentido inequívoco del pasaje.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Cómo traducir מִשְׁפָּט en este versículo
  english_pob_reading: Render as 'judgment' in both occurrences
  chosen_spanish_reading: Traducirlo como «juicio» en ambas ocurrencias
  alternative_spanish_readings:
  - «decisión»
  - «justicia»
  rationale: «Juicio» mantiene la repetición interna del versículo y la relación con el pectoral del juicio. También deja abierta la dimensión de decisión oracular/jurídica sin reducirla demasiado.
  doctrine_reference: Translation philosophy §5
- issue: Cómo verter בְּנֵי יִשְׂרָאֵל
  english_pob_reading: '''the sons of Israel'' in the main text'
  chosen_spanish_reading: «los hijos de Israel» en el texto principal
  alternative_spanish_readings:
  - «los israelitas»
  - «el pueblo de Israel»
  rationale: Se conserva la forma masculina del hebreo, que funciona como etnónimo pactual y no sólo como referencia genérica al pueblo.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: La redacción inglesa auditada fue revisada para sustituir «Thus» por «And» y conservar el simple enlace conjuntivo del hebreo. El español sigue esa decisión con «y» al inicio de la segunda cláusula, manteniendo el paralelismo y la continuidad sintáctica del original.
  spanish_consistency_notes:
  - Se conserva «Yahvé» para el Nombre divino, en coherencia con el estándar del proyecto.
  - Se usa «juicio» de manera uniforme para מִשְׁפָּט en ambos lugares del versículo.
  - Se transliteran «Urim» y «Tumim» como términos técnicos, sin interpretarlos en el texto principal.
  - «Corazón» se mantiene en ambas ocurrencias de לֵב/לִבּוֹ para preservar la imaginería hebrea.
  - «Hijos de Israel» reproduce el etnónimo masculino del hebreo sin neutralización.
