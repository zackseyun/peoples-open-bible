translation:
  language: es
  text: Pero tú, Yahvé, muéstrame tu gracia y levántame, para que yo les pague[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y yo les pagaré». El cohortativo hebreo puede entenderse como finalidad/resultado («para que yo les pague») o como resolución después de las súplicas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַתָּה
  english_pob_choice: But you
  chosen_spanish: Pero tú
  alternatives_spanish:
  - Y tú
  - Pero en cuanto a ti
  lexicon: HALOT
  rationale: La partícula conjuntiva con pronombre independiente marca contraste con el contexto previo; en español, «Pero tú» reproduce de forma natural esa oposición sin añadir contenido.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino como transliteración del Tetragrama, siguiendo la preferencia del proyecto; «Yahvé» es la forma establecida en español para mantener el nombre personal de Dios sin sustituirlo por un título.
- source_word: חָנֵּנִי
  english_pob_choice: be gracious to me
  chosen_spanish: sé gracioso conmigo
  alternatives_spanish:
  - sé misericordioso conmigo
  - muéstrame gracia
  lexicon: HALOT
  rationale: El verbo חנן expresa una súplica por favor/gracia. «Sé gracioso conmigo» conserva la idea de gracia activa; «misericordioso» sería posible, pero tiende a desplazar el matiz de favor hacia compasión.
- source_word: וַהֲקִימֵנִי
  english_pob_choice: and raise me up
  chosen_spanish: levántame
  alternatives_spanish:
  - y levántame
  - y restáurame
  lexicon: HALOT
  rationale: El Hifil de קום comunica hacer levantar/poner en pie. En español, «levántame» mantiene la imagen concreta y puede abarcar la restauración sin explicitar más de lo que el hebreo exige.
- source_word: וַאֲשַׁלְּמָה
  english_pob_choice: that I may repay
  chosen_spanish: para que yo les pague
  alternatives_spanish:
  - para que yo les repare
  - y yo les retribuiré
  - para retribuirles
  lexicon: HALOT
  rationale: El Piel de שלם aquí tiene el sentido de retribuir/pagar de vuelta. En español, «les pague» expresa el acto de retribución de manera natural; se mantiene el posible matiz de propósito que el inglés marcó con «that I may» mediante «para que yo».
- source_word: לָהֶם
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: HALOT
  rationale: El complemento indirecto se integra de forma idiomática en español con el dativo «les», que preserva el valor de ל sin forzar una construcción menos natural.
theological_decisions:
- issue: Si suavizar o conservar el sentido retributivo/imprecatorio de «repay them»
  english_pob_reading: retain 'repay them'
  chosen_spanish_reading: mantener «para que yo les pague»
  alternative_spanish_readings:
  - para vindicarme contra ellos
  - para darles su merecido
  - para que yo los recompense
  rationale: El hebreo שלם expresa pagar/retribuir. Suavizarlo borraría la tensión judicial del versículo. «Les pague» conserva esa fuerza sin convertirla en una paráfrasis interpretativa.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolving it.'
translation_notes:
  revision_awareness: El borrador sigue el texto hebreo masorético con alta concordancia con el audit trail inglés. Se mantiene la tensión del cohortativo de ואשלמה y el valor contrastivo de וְאַתָּה sin armonizarlo hacia una lectura más suave.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el Tetragrama, de acuerdo con la terminología del proyecto.
  - Se evita «misericordia» como sustituto automático de חנן, para no borrar el matiz de gracia/favor.
  - «Les pague» conserva la posibilidad de retribución judicial del verbo sin añadir un sujeto ni un objeto implícitos no presentes en el hebreo.
  - La puntuación con coma tras «Yahvé» sigue el flujo vocativo natural en español y no altera la relación sintáctica del original.
