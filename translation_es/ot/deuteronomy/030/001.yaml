revisions:
- from: Y sucederá que, cuando vengan sobre ti todas estas cosas —la bendición y la maldición que he puesto delante de ti—, las traerás de nuevo a tu corazón[a] entre todas las naciones a las cuales Yahvé tu Dios te habrá dispersado allí.
  to: Y sucederá que, cuando vengan sobre ti todas estas cosas —la bendición y la maldición que he puesto delante de ti—, y las hagas volver a tu corazón[a] entre todas las naciones adonde Yahvé tu Dios te haya expulsado,
  rationale: Se corrige la expresión central para reflejar mejor וַהֲשֵׁבֹתָ אֶל־לְבָבֶךָ con una formulación que conserva la metáfora del corazón y suena mejor en español. Se reemplaza «te habrá dispersado allí» por «te haya expulsado» para respetar mejor הִדִּיחֲךָ y se recoloca «adonde» para integrar correctamente שָׁמָּה en la cláusula relativa. Se mantiene «Yahvé» según la terminología del proyecto.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:36:58Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura general del hebreo: la fórmula temporal futura, «todas estas cosas», «la bendición y la maldición», «Yahvé tu Dios» y la referencia al exilio entre las naciones. Sin embargo, dos puntos importantes requieren ajuste: (1) וַהֲשֵׁבֹתָ אֶל־לְבָבֶךָ no suena natural ni fielmente idiomático en español como «las traerás de nuevo a tu corazón»; el sentido es reflexivo/recordativo, mejor «las hagas volver a tu corazón» o una formulación idiomática equivalente. (2) הִדִּיחֲךָ significa «te ha arrojado/expulsado/echado/impulsado», no específicamente «te habrá dispersado»; además el tiempo verbal español con futuro perfecto no corresponde al hebreo ni al inglés auditado. También «allí» queda mal colocado tras «a las cuales».'
  spanish_quality_summary: 'El español actual del borrador es comprensible, pero suena rígido y en partes poco natural: «las traerás de nuevo a tu corazón» es extraño en español bíblico legible, y «te habrá dispersado allí» resulta torpe y sintácticamente sobrecargado. Conviene simplificar la sintaxis, mantener el tono digno y conservar la metáfora del corazón con una expresión española más clara.'
  glossary_alignment: Alineado en el uso de «Yahvé» para יְהוָה y «Dios» para אֱלֹהֶיךָ. «La bendición y la maldición» también está bien. La principal desviación léxica está en הִדִּיחֲךָ, donde el borrador sustituye la fuerza de «ha expulsado/ha arrojado/ha echado» por «habrá dispersado», y en la formulación de וַהֲשֵׁבֹתָ אֶל־לְבָבֶךָ, que necesita una expresión española más fiel y legible.
  issues:
  - severity: high
    issue: «te habrá dispersado» no refleja adecuadamente הִדִּיחֲךָ
    rationale: El hebreo describe que Yahvé lo ha empujado/expulsado a esas naciones. «Dispersado» interpreta el resultado, pero pierde la fuerza verbal inmediata y añade un matiz no necesario; además el futuro perfecto español no está motivado por la forma verbal hebrea.
  - severity: high
    issue: «las traerás de nuevo a tu corazón» es poco natural y semánticamente torpe para וַהֲשֵׁבֹתָ אֶל־לְבָבֶךָ
    rationale: La frase hebrea expresa volver algo al corazón en el sentido de considerar profundamente/recordar interiormente. La redacción actual suena forzada en español y no comunica bien la idea.
  - severity: medium
    issue: Ubicación y función de «allí»
    rationale: 'En «entre todas las naciones a las cuales Yahvé tu Dios te habrá dispersado allí», el adverbio queda redundante y mal encajado. Debe ir con la cláusula de destino: «adonde Yahvé tu Dios te haya expulsado» o equivalente.'
  - severity: low
    issue: «Y sucederá que, cuando» es aceptable pero algo pesado
    rationale: No es incorrecto, pero puede aligerarse manteniendo el tono bíblico. Aun así, no es el problema principal del versículo.
  revised_spanish_text: Y sucederá que, cuando vengan sobre ti todas estas cosas —la bendición y la maldición que he puesto delante de ti—, y las hagas volver a tu corazón[a] entre todas las naciones adonde Yahvé tu Dios te haya expulsado,
  revised_footnotes:
  - marker: a
    text: 'O: «las tomes a pecho»; literalmente, «las hagas volver a tu corazón».'
    reason: lexical_alternative
  revision_rationale: Se corrige la expresión central para reflejar mejor וַהֲשֵׁבֹתָ אֶל־לְבָבֶךָ con una formulación que conserva la metáfora del corazón y suena mejor en español. Se reemplaza «te habrá dispersado allí» por «te haya expulsado» para respetar mejor הִדִּיחֲךָ y se recoloca «adonde» para integrar correctamente שָׁמָּה en la cláusula relativa. Se mantiene «Yahvé» según la terminología del proyecto.
