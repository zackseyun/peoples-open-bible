revisions:
- from: si guardas[a] todo este mandamiento, para cumplirlo, que yo te mando hoy, para amar a Yahvé tu Dios y para andar en sus caminos todos tus días, entonces añadirás para ti todavía tres ciudades más, además de estas tres.
  to: si guardas[a] todo este mandamiento, poniéndolo por obra, que yo te mando hoy —amar a Yahvé tu Dios y andar en sus caminos todos tus días—, entonces te añadirás tres ciudades más, además de estas tres.
  rationale: Se ajusta לַעֲשֹׂתָהּ a «poniéndolo por obra», más cercano al hebreo y a la auditoría inglesa que «cumplirlo»; se elimina la redundancia de «todavía ... más»; y se mejora la fluidez de לְךָ con «te añadirás», manteniendo el sentido aditivo del original. También se aligera la serie de infinitivos para un español más natural sin perder contenido.
