translation:
  language: es
  text: El sacerdote los mecerá[a] con el pan de las primicias[b], como ofrenda mecida delante de Yahvé, con los dos corderos[b]. Serán santos para Yahvé, para el sacerdote.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «los presentará como ofrenda mecida». El hebreo puede entenderse como el acto ritual de mecer o presentar ante Dios.'
    reason: lexical_alternative
  - marker: b
    text: 'O también: «sobre el pan de las primicias» y «sobre los dos corderos». La preposición hebrea עַל puede traducirse de modo más literal, aunque aquí probablemente indica una presentación asociada en el rito.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵנִיף
  english_pob_choice: shall wave
  chosen_spanish: la mecerá
  alternatives_spanish:
  - la presentará como ofrenda mecida
  - la alzará ritualmente
  lexicon: HALOT
  rationale: En contexto cultual, נוף/הניף designa el gesto ritual de mecer o presentar. «Mecerá» conserva la acción concreta y evita volverlo una paráfrasis general.
- source_word: אֹתָם
  english_pob_choice: them
  chosen_spanish: la
  alternatives_spanish:
  - los
  - estas cosas
  lexicon: HALOT
  rationale: En español, el antecedente inmediato principal es «el pan de las primicias»; el pronombre singular femenino concuerda con «ofrenda» implícita en el gesto ritual del verso, pero el hebreo puede referirse de manera colectiva a los elementos ofrecidos. Se optó por mantener la referencia ritual sin sobre-especificar elementos ausentes en el verso español.
- source_word: עַל לֶחֶם הַבִּכּוּרִים
  english_pob_choice: with the bread of the firstfruits
  chosen_spanish: con el pan de las primicias
  alternatives_spanish:
  - sobre el pan de las primicias
  - encima del pan de las primicias
  lexicon: HALOT
  rationale: «Con» reproduce la relación ritual conjunta que la POB inglesa entendió como presentación asociada, sin forzar una lectura espacial demasiado literal de עַל.
- source_word: לֶחֶם הַבִּכּוּרִים
  english_pob_choice: the bread of the firstfruits
  chosen_spanish: el pan de las primicias
  alternatives_spanish:
  - el pan de los primeros frutos
  - el pan de primicias
  lexicon: HALOT
  rationale: «Primicias» conserva el valor técnico del sustantivo בִּכּוּרִים en lenguaje sacrificial y litúrgico, y es más natural que una construcción más pesada en español.
- source_word: תְּנוּפָה
  english_pob_choice: as a wave offering
  chosen_spanish: como ofrenda mecida
  alternatives_spanish:
  - como ofrenda alzada
  - como ofrenda de mecimiento
  lexicon: HALOT
  rationale: «Ofrenda mecida» traslada el término técnico a un español cultual inteligible. Se evita «onda» o calcos opacos, pero se mantiene la imagen ritual de mecer.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para יְהוָה con «Yahvé». «Delante de» conserva el valor ceremonial del hebreo y su sintaxis breve.
- source_word: עַל שְׁנֵי כְּבָשִׂים
  english_pob_choice: with the two lambs
  chosen_spanish: junto con los dos corderos
  alternatives_spanish:
  - sobre los dos corderos
  - con los dos corderos
  lexicon: HALOT
  rationale: «Junto con» comunica la asociación ritual entre el pan y los animales sin imponer una relación espacial exacta. «Corderos» es la equivalencia natural de כְּבָשִׂים en este contexto sacrificial.
- source_word: קֹדֶשׁ יִהְיוּ
  english_pob_choice: They shall be holy
  chosen_spanish: Serán cosa santa
  alternatives_spanish:
  - Serán santos
  - Quedarán consagrados
  lexicon: HALOT
  rationale: El hebreo expresa un estado cultual de santidad/consagración. «Cosa santa» refleja mejor el carácter de las ofrendas que un adjetivo aplicado a personas.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - de Yahvé
  lexicon: HALOT
  rationale: «Para» expresa pertenencia y dedicación, alineado con el uso legal-sacrificial del verso. Se conserva el nombre divino según la norma del proyecto.
- source_word: לַכֹּהֵן
  english_pob_choice: for the priest
  chosen_spanish: para el sacerdote
  alternatives_spanish:
  - del sacerdote
  - a disposición del sacerdote
  lexicon: HALOT
  rationale: «Para el sacerdote» mantiene el sentido de asignación cultual y legal del remanente santo, sin agregar explicaciones no presentes en el hebreo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El proyecto prescribe traducir יְהוָה como «Yahvé» en el texto principal. Se preserva el nombre del pacto en lugar de enmascararlo con un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH'
- issue: Carácter cultual de las ofrendas
  english_pob_reading: They shall be holy
  chosen_spanish_reading: Serán cosa santa
  alternative_spanish_readings:
  - Serán santos
  - Serán consagrados
  rationale: El versículo no describe santidad moral de personas, sino el estatus de elementos ofrecidos. «Cosa santa» protege esa lectura cultual.
  doctrine_reference: Leviticus cultic legislation; semantic status of קֹדֶשׁ
translation_notes:
  revision_awareness: La redacción sigue el consenso alto del audit trail inglés sin cambios sustantivos. Se mantuvo la decisión terminológica sobre el nombre divino y la lectura cultual de תְּנוּפָה, ajustándolas al español natural. No se adoptaron revisiones adicionales.
  spanish_consistency_notes:
  - Se usa «Yahvé» consistentemente para יְהוָה conforme al estándar del proyecto.
  - «Ofrenda mecida» conserva el término técnico de תְּנוּפָה sin recurrir a una glosa excesiva.
  - «Cosa santa» evita antropomorfizar el predicado de santidad aplicado a ofrendas.
  - La relación de asociación marcada por עַל se expresa con «con/junto con» en el cuerpo, con nota textual para la alternativa literal.
