translation:
  language: es
  text: 'Entonces dijo[a]: «Llámala». Así que la llamó, y ella se paró en el umbral.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la entrada». El término hebreo puede referirse al umbral o al área de entrada.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then he said
  chosen_spanish: Entonces él dijo
  alternatives_spanish:
  - Y él dijo
  - Entonces dijo
  lexicon: HALOT
  rationale: La forma wayyiqtol marca secuencia narrativa; «entonces» conserva esa continuidad sin sonar rígido en español. Se mantiene el sujeto explícito para claridad contextual.
- source_word: קְרָא
  english_pob_choice: Call
  chosen_spanish: Llámala
  alternatives_spanish:
  - Haz que venga
  - Llámenla
  lexicon: HALOT
  rationale: El imperativo de segunda masculina singular se vierte naturalmente como mandato directo. «Llámala» reproduce bien la orden breve del hebreo.
- source_word: לָהּ
  english_pob_choice: her
  chosen_spanish: la
  alternatives_spanish:
  - a ella
  lexicon: HALOT
  rationale: El pronombre objeto femenino singular se expresa de modo natural en español con clítico directo; el referente femenino ya está claro por el contexto.
- source_word: וַיִּקְרָא
  english_pob_choice: So he called
  chosen_spanish: Así que él la llamó
  alternatives_spanish:
  - Y él la llamó
  - Entonces la llamó
  lexicon: HALOT
  rationale: La continuación narrativa responde al mandato previo. Se conserva la relación de consecuencia con «así que» y se mantiene el objeto femenino explícito.
- source_word: וַתַּעֲמֹד
  english_pob_choice: and she stood
  chosen_spanish: y ella se quedó de pie
  alternatives_spanish:
  - y ella estuvo de pie
  - y ella permaneció de pie
  lexicon: HALOT
  rationale: עָמַד significa «estar de pie/ponerse en pie». En español, «se quedó de pie» comunica con naturalidad el estado resultante sin añadir movimiento no expresado por el texto.
- source_word: בַּפָּתַח
  english_pob_choice: in the doorway
  chosen_spanish: en el umbral
  alternatives_spanish:
  - en la entrada
  - en la puerta
  lexicon: HALOT
  rationale: פֶּתַח puede referir la apertura, entrada o área del acceso. «Umbral» preserva la ambigüedad espacial y evita especificar indebidamente «puerta» como objeto físico cerrado.
translation_notes:
  revision_awareness: El texto inglés auditado se mantiene sin cambios sustanciales en esta escena narrativa; la decisión principal en español es cómo expresar בַּפָּתַח sin perder la amplitud semántica señalada por la nota inglesa. No se detectaron variantes textuales ni tensiones doctrinales.
  spanish_consistency_notes:
  - Se usó «Yahvé»/«Mesías»/otros términos estándar del proyecto solo cuando corresponden; este versículo no los contiene.
  - Se mantuvo un estilo moderno y dignificado, evitando calco excesivo.
  - «Umbral» se eligió como equivalente amplio de בַּפָּתַח, con nota alternativa para la posible lectura de «entrada».
