translation:
  language: es
  text: Porque no cayó su poderoso a manos de jóvenes, ni los hijos de Titanes lo hirieron, ni los gigantes altos se lanzaron contra él; sino Judit, hija de Merarí, lo dejó sin fuerzas[a] con la belleza de su rostro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo paralizó» o «lo inutilizó»; el verbo griego puede expresar que alguien queda incapacitado o sin poder, de manera literal o figurada.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δυνατὸς αὐτῶν
  english_pob_choice: their mighty one
  chosen_spanish: su poderoso
  alternatives_spanish:
  - su hombre poderoso
  - su valiente
  - el poderoso de ellos
  lexicon: LSJ
  rationale: El griego usa δυνατός sustantivado para un personaje fuerte o campeón. «Su poderoso» conserva la fuerza poética y la referencia posesiva sin añadir un cargo militar que el texto no explicita.
- source_word: ὑπὸ νεανίσκων
  english_pob_choice: by the hands of young men
  chosen_spanish: por mano de jóvenes
  alternatives_spanish:
  - por los jóvenes
  - a manos de jóvenes
  - por jóvenes
  lexicon: LSJ
  rationale: El auditorio inglés añadió «the hands of» para naturalizar ὑπό con personas. En español, «por mano de» expresa bien la agencia sin perder el matiz idiomático del original.
- source_word: υἱοὶ Τιτάνων
  english_pob_choice: sons of Titans
  chosen_spanish: los hijos de Titanes
  alternatives_spanish:
  - hijos de los Titanes
  - hijos titanes
  - descendientes de Titanes
  lexicon: LSJ
  rationale: Se conserva el eco mítico del griego. «Hijos de Titanes» mantiene la elevación retórica y evita suavizarlo a «guerreros» o «héroes».
- source_word: ἐπάταξαν
  english_pob_choice: strike him
  chosen_spanish: lo hirieron
  alternatives_spanish:
  - lo golpearon
  - lo atacaron
  - lo abatieron
  lexicon: LSJ
  rationale: El verbo puede significar golpear o herir. En este contexto la acción se suma a las imágenes de caída y agresión; «lo hirieron» es sobrio y compatible con el valor verbal sin forzar el resultado.
- source_word: ὑψηλοὶ γίγαντες
  english_pob_choice: tall giants
  chosen_spanish: los gigantes altos
  alternatives_spanish:
  - gigantes altos
  - los grandes gigantes
  - gigantes elevados
  lexicon: LSJ
  rationale: «Altos» traduce ὑψηλοί de manera directa y preserva la imaginería corporal concreta del griego.
- source_word: ἐπέθεντο αὐτῷ
  english_pob_choice: set upon him
  chosen_spanish: se lanzaron contra él
  alternatives_spanish:
  - se arrojaron sobre él
  - lo acometieron
  - lo atacaron
  lexicon: LSJ
  rationale: El giro griego significa ponerse contra alguien, acometerlo o asaltarlo. «Se lanzaron contra él» conserva la fuerza idiomática y el registro elevado.
- source_word: παρέλυσεν
  english_pob_choice: disabled him
  chosen_spanish: lo dejó sin fuerzas
  alternatives_spanish:
  - lo paralizó
  - lo deshizo
  - lo debilitó
  lexicon: LSJ
  rationale: El verbo puede expresar aflojar, dejar inútil o incapacitar. «Lo dejó sin fuerzas» comunica la deshabilitación figurada sin convertirla en una paralización médica literal.
- source_word: ἐν κάλλει προσώπου αὐτῆς
  english_pob_choice: with the beauty of her face
  chosen_spanish: con la belleza de su rostro
  alternatives_spanish:
  - con la hermosura de su rostro
  - por la belleza de su rostro
  - con la belleza de su semblante
  lexicon: LSJ
  rationale: Se mantiene la concreción de πρόσωπον como «rostro», en paralelo con el inglés auditado. «Belleza» traduce κάλλει de modo directo y digno.
- source_word: θυγάτηρ Μεραρεί
  english_pob_choice: daughter of Merari
  chosen_spanish: hija de Merarí
  alternatives_spanish:
  - hija de Merari
  - Merarí, su hija
  lexicon: LSJ
  rationale: Es una designación genealógica simple. La acentuación española de Merarí facilita la lectura y conserva el nombre propio del original.
theological_decisions:
- issue: Conservación del lenguaje mítico en el pasaje
  english_pob_reading: Retain the mythic terms directly as 'sons of Titans' and 'tall giants.'
  chosen_spanish_reading: Conservar «hijos de Titanes» y «gigantes altos».
  alternative_spanish_readings:
  - volverlo genérico como «hombres fuertes»
  - «héroes»
  rationale: El griego intensifica el contraste mediante figuras míticas o sobrehumanas. Traducirlas literalmente preserva la retórica del texto y evita aplanar su imaginería.
  doctrine_reference: Principio de primacía de la fuente original; no neutralizar el lenguaje del texto para acomodarlo a expectativas modernas.
- issue: Alcance de παρέλυσεν en el desenlace
  english_pob_reading: Render figuratively as 'disabled him.'
  chosen_spanish_reading: «Lo dejó sin fuerzas»
  alternative_spanish_readings:
  - «lo paralizó»
  - «lo destruyó»
  - «lo inutilizó»
  rationale: El contexto habla de la acción debilitadora de la belleza de Judit antes de la muerte de Holofernes. «Lo dejó sin fuerzas» expresa la incapacidad figurada sin imponer una lectura médica ni exagerar hacia destrucción total.
  doctrine_reference: Equivalencia óptima; mantener la tensión semántica entre incapacitar y paralizar sin cerrarla indebidamente.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail inglés al reflejar ὑπό con personas mediante una construcción natural en español («por mano de»), al mantener la agresión de ἐπέθεντο con un verbo idiomático de acometida, y al conservar la fuerza figurada de παρέλυσεν sin convertirla en destrucción explícita. También se retuvo el lenguaje mítico del pasaje sin suavizarlo.
  spanish_consistency_notes:
  - Se usa «Judit» para Ἰουδεὶθ, conforme al uso bíblico en español.
  - Se usa «Merarí» con acento prosódico español para el nombre propio.
  - Se evita «SEÑOR» porque este versículo no contiene el nombre divino.
  - Se mantiene un registro bíblico digno y actual, sin arcaísmos innecesarios.
  - «Gigantes altos» conserva la imagen física del griego, aunque en español suene algo enfático; se prefiere esa literalidad por fidelidad al texto.
