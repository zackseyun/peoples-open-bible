translation:
  language: es
  text: Hizo el propiciatorio[a] de oro puro; su longitud era de dos codos y medio, y su anchura de un codo y medio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cubierta de expiación». El término hebreo designa la cubierta de oro del arca y tiene asociaciones con la expiación.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: He made
  chosen_spanish: Hizo
  alternatives_spanish:
  - Y hizo
  - Entonces hizo
  lexicon: HALOT
  rationale: El wayyiqtol narra una acción pasada en secuencia. En español, «hizo» comunica el hecho de forma natural y conserva el valor narrativo sin añadir una conjunción innecesaria.
- source_word: כַּפֹּרֶת
  english_pob_choice: the mercy seat
  chosen_spanish: el propiciatorio
  alternatives_spanish:
  - la cubierta de expiación
  - la cubierta
  lexicon: HALOT
  rationale: En español bíblico, «propiciatorio» es el término más asentado para el objeto del arca y conserva su función cultual ligada a la expiación. «Cubierta de expiación» explicita el sentido, pero suena más interpretativa; «cubierta» pierde la carga teológica.
- source_word: זָהָב טָהוֹר
  english_pob_choice: of pure gold
  chosen_spanish: de oro puro
  alternatives_spanish:
  - de oro fino
  - de oro puro y fino
  lexicon: HALOT
  rationale: La relación constructa se expresa naturalmente en español con «de». «Oro puro» reproduce con claridad la cualidad material sin sobrecargar el sintagma.
- source_word: אַמָּתַיִם וָחֵצִי
  english_pob_choice: two and a half cubits
  chosen_spanish: de dos codos y medio
  alternatives_spanish:
  - de dos codos y medio exactos
  - de dos codos y un medio
  lexicon: HALOT
  rationale: La medida hebrea se vuelve en español la forma idiomática «dos codos y medio», que conserva con precisión el valor numérico.
- source_word: אָרְכָּהּ
  english_pob_choice: its length was
  chosen_spanish: su longitud era
  alternatives_spanish:
  - su largo era
  - medía de largo
  lexicon: HALOT
  rationale: El hebreo presenta una cláusula nominal de medida; «su longitud era» la expresa de modo claro y formal en español.
- source_word: וְאַמָּה וָחֵצִי
  english_pob_choice: and a cubit and a half
  chosen_spanish: y de un codo y medio
  alternatives_spanish:
  - y un codo y medio
  - y un codo y medio de ancho
  lexicon: HALOT
  rationale: Se mantiene la misma estructura de medida que en la primera parte. El «de» ayuda a enlazar con la cláusula de dimensión en un español más fluido y fiel.
- source_word: רָחְבָּהּ
  english_pob_choice: its width
  chosen_spanish: su anchura
  alternatives_spanish:
  - su ancho
  - su amplitud
  lexicon: HALOT
  rationale: «Anchura» corresponde con precisión al término de dimensión y conserva un registro bíblico sobrio, preferible aquí a «ancho» por ser más nominal y paralelo a «longitud».
theological_decisions:
- issue: Rendering of כַּפֹּרֶת in a cultic context
  english_pob_reading: mercy seat
  chosen_spanish_reading: propiciatorio
  alternative_spanish_readings:
  - cubierta de expiación
  - mercy seat
  rationale: El inglés POB conserva la carga cultual/teológica del objeto. En español, «propiciatorio» es un equivalente tradicional y preciso para el arca de la alianza, mientras que «cubierta de expiación» explicaría más el sentido pero introduciría una glosa menos compacta. Se mantiene así la asociación con la expiación sin diluir el término técnico.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El texto inglés auditado no presenta revisiones aplicadas; la lectura se mantiene estable con acuerdo alto y sin cambios necesarios. La decisión española principal se concentra en כַּפֹּרֶת, donde se opta por un equivalente técnico tradicional más natural en español que la calca inglesa «mercy seat».
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico sobrio y publicable, con medidas expresadas de forma idiomática en español.
  - Se evitó «SEÑOR» u այլ masking porque el versículo no contiene el tetragrámaton.
  - Se preservó la relación entre longitud y anchura con sustantivos paralelos para claridad y consistencia estilística.
