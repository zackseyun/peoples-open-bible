  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido básico del griego: la afección por los hijos no logró apartar a la madre, y ella es presentada como de un mismo espíritu con Abraham. También conserva la alternativa interpretativa sobre ὁμόψυχον. Sin embargo, «simpatía» para συμπάθεια suena engañoso en español actual, donde suele significar agrado o simpatía personal, no ternura o afecto compasivo; eso debilita la fuerza relacional del original en este contexto materno.'
  spanish_quality_summary: La oración es mayormente clara y digna, pero «la simpatía por sus hijos» resulta poco natural y semánticamente imprecisa en español bíblico contemporáneo. Además, la nota al pie contiene un anglicismo inaceptable («Abraham-like»), lo que afecta la legibilidad y fidelidad editorial. «De un mismo espíritu con Abraham» es comprensible, aunque «de un mismo espíritu que Abraham» también podría sonar más idiomático; no es necesario cambiarlo.
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. La decisión sobre «espíritu» para ὁμόψυχον es coherente con el expediente inglés. La principal corrección léxica necesaria es reemplazar «simpatía» por una expresión española más fiel al sentido contextual de συμπάθεια, como «afecto» o «ternura».
  issues:
  - severity: medium
    issue: «simpatía» no refleja bien συμπάθεια en este contexto
    rationale: En español actual, «simpatía» suele significar agrado, amabilidad o afinidad personal, no el afecto compasivo o ternura de una madre hacia sus hijos. Puede confundir al lector y rebaja la precisión semántica del original.
  - severity: high
    issue: La nota al pie contiene el anglicismo «Abraham-like»
    rationale: La nota debe estar en español natural y explicar la alternativa preservada por la POB inglesa. El anglicismo es impropio del proyecto y editorialmente incorrecto.
