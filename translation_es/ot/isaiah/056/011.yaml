    issue: Giro poco natural en 'se han vuelto por su propio camino'
    rationale: El hebreo כֻּלָּם לְדַרְכָּם פָּנוּ expresa volverse hacia/siguiendo su propio camino. En español, 'volverse por' resulta torpe y menos fiel al movimiento idiomático; 'se han vuelto a su propio camino' o 'cada cual se ha vuelto a su propio camino' es más natural y exacto.
  - severity: low
