review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del hebreo: mandato de residir en סֻכּוֹת por siete días y aplicación a cada nativo de Israel. Sin embargo, pierde fidelidad en dos puntos relevantes: usa futuro indicativo de tercera persona («vivirán») en lugar del mandato de segunda persona plural («ustedes habitarán / vivirán»), y «todo nacido en Israel» suena incompleto frente a הָאֶזְרָח בְּיִשְׂרָאֵל, que expresa «todo nativo/nacido en el país dentro de Israel», no meramente cualquier persona nacida allí. Además, la repetición de ישׁב conviene mantenerse con un verbo de residencia más formal y consistente.'
  spanish_quality_summary: El español es generalmente claro, pero «En las enramadas vivirán» resulta extraño por el cambio de persona y «todo nacido en Israel» suena poco idiomático y algo brusco. «Enramadas» es defendible, pero en este contexto bíblico-festivo «cabañas» comunica mejor para lectura amplia eclesial y general. La frase revisada mejora naturalidad, precisión y registro digno sin caer en arcaísmo.
  glossary_alignment: 'No hay conflicto con los términos globales principales del proyecto. La decisión local más importante es סֻכּוֹת: el inglés auditado privilegia ''booths'' con alternativas ''shelters/temporary shelters''. En español, «cabañas» preserva mejor la imagen concreta y la inteligibilidad amplia que «enramadas», mientras la nota puede conservar alternativas. Para ישׁב, «habitar» alinea mejor con el inglés revisado ''dwell'' y con el sentido de residencia temporal. Para הָאֶזְרָח, «todo nativo de Israel» refleja mejor el contraste comunitario que «todo nacido».'
  issues:
  - severity: high
    issue: Cambio incorrecto de persona verbal en la primera cláusula
    rationale: תֵּשְׁבוּ es segunda persona plural ('ustedes habitarán/deben habitar'), pero el borrador dice «vivirán», tercera persona plural, lo que altera quién recibe el mandato.
  - severity: medium
    issue: «Todo nacido en Israel» no expresa bien הָאֶזְרָח
    rationale: La expresión hebrea denota al nativo de la comunidad, en contraste con el extranjero. «Todo nacido» es poco natural en español y semánticamente más débil que «todo nativo» o «toda persona nacida en el país».
  - severity: medium
    issue: Selección léxica de «enramadas» es menos clara para lectura general
    rationale: Aunque posible, «enramadas» puede sonar regional o menos transparente. «Cabañas» comunica mejor la idea de refugios temporales festivos sin la carga arcaica de «tabernáculos».
  revised_spanish_text: Habitarán en cabañas[a] durante siete días; todo nativo de Israel habitará en cabañas.
