translation:
  language: es
  text: 'Y hablarás a los hijos de Israel[a], diciendo: «Si un hombre muere y no tiene hijo, entonces transferirán su herencia a su hija».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas». El hebreo dice literalmente «los hijos de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֶל בְּנֵי יִשְׂרָאֵל
  english_pob_choice: And ... to the sons of Israel
  chosen_spanish: a los hijos de Israel
  alternatives_spanish:
  - a los israelitas
  - a los hijos de Israel
  lexicon: HALOT
  rationale: Conservo la forma familiar masculina plural del hebreo, que es literalmente «hijos de Israel». En español, «hijos» mantiene esa transparencia mejor que neutralizarlo a «israelitas», aunque esta última sería idiomática.
- source_word: תְּדַבֵּר לֵ/אמֹר
  english_pob_choice: you shall speak, saying
  chosen_spanish: hablarás, diciendo
  alternatives_spanish:
  - dirás
  - hablarás de esta manera
  lexicon: HALOT
  rationale: La combinación verbal introduce una fórmula formal de discurso. «Hablarás, diciendo» conserva la estructura del hebreo sin volverla excesivamente rígida en español.
- source_word: אִ֣ישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: HALOT
  rationale: El caso legal se formula en masculino singular en hebreo. «Un hombre» refleja con precisión esa formulación y el contexto jurídico de herencia.
- source_word: כִּֽי יָמ֗וּת
  english_pob_choice: if a man dies
  chosen_spanish: si un hombre muere
  alternatives_spanish:
  - cuando un hombre muere
  lexicon: HALOT
  rationale: En cláusulas casuísticas, כִּי + imperfecto introduce una situación condicional. «Si» expresa mejor ese valor legal que «cuando».
- source_word: וּ/בֵן֙ אֵ֣ין ל֔/וֹ
  english_pob_choice: and has no son
  chosen_spanish: y no tiene hijo
  alternatives_spanish:
  - y no tiene hijo varón
  - y no le queda hijo
  lexicon: HALOT
  rationale: El hebreo dice literalmente que «no hay hijo para él». En español, «no tiene hijo» reproduce la idea de ausencia de heredero directo de forma natural; «hijo» conserva la referencia al descendiente masculino implícita en el texto.
- source_word: וְ/הַֽעֲבַרְתֶּ֥ם
  english_pob_choice: you shall transfer
  chosen_spanish: entonces pasarán
  alternatives_spanish:
  - transferirán
  - harán pasar
  lexicon: HALOT
  rationale: El hiphil de עבר tiene aquí sentido jurídico de hacer pasar una herencia. «Pasarán» comunica la idea de traslado de la herencia de modo natural en español; el sujeto implícito se entiende por el mandato previo a Israel.
- source_word: נַחֲלָת֖/וֹ
  english_pob_choice: his inheritance
  chosen_spanish: su herencia
  alternatives_spanish:
  - su patrimonio heredado
  - su posesión hereditaria
  lexicon: HALOT
  rationale: En este contexto, נַחֲלָה se refiere a la porción hereditaria. «Herencia» es el equivalente más claro y usual en español bíblico para este caso legal.
- source_word: לְ/בִתּֽ/וֹ
  english_pob_choice: to his daughter
  chosen_spanish: a su hija
  alternatives_spanish:
  - para su hija
  lexicon: HALOT
  rationale: El lamed marca la destinataria de la herencia transferida. «A su hija» es la forma más directa y natural en español.
translation_notes:
  revision_awareness: 'El texto coincide sustancialmente con la revisión más reciente: no se requieren cambios adicionales según el audit trail inglés y la comparación con el hebreo masorético.'
  spanish_consistency_notes:
  - Se mantiene la fórmula jurídica casuística con «si».
  - Se conserva la referencia masculina singular del caso legal («un hombre», «hijo»), sin neutralizarla.
  - La terminología de herencia se expresa con «herencia», coherente con el valor jurídico de נַחֲלָה.
  - La nota al pie distingue entre la traducción literal y la alternativa idiomática sin perder la transparencia del hebreo.
