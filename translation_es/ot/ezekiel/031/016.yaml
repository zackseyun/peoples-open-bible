- from: Al oírse su caída, hice temblar a las naciones[a], cuando lo hice bajar al Seol con los que descienden a la fosa; y todos los árboles de Edén, la elección y lo mejor del Líbano, todos los que beben agua[c][b], fueron consolados en la tierra de abajo.
  to: Al estruendo de su caída hice temblar a las naciones, cuando lo hice bajar al Seol[a] con los que descienden a la fosa; y todos los árboles de Edén, lo escogido y lo mejor del Líbano, todos los que beben agua, fueron consolados en la tierra de abajo[c][b].
  rationale: Se corrige la nota de «Seol» para que ofrezca alternativas genuinas; se mejora la naturalidad de מִבְחַר וְטוֹב לְבָנוֹן con «lo escogido y lo mejor»; y se ajusta el inicio a «Al estruendo de su caída» para reflejar más directamente מִקּוֹל. También se reubican las notas [c][b] al final de «tierra de abajo», que es donde corresponden según el expediente inglés.
