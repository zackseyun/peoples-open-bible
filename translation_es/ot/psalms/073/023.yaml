- from: Y yo, continuamente, estoy contigo[a]; tú has tomado mi mano derecha.
  to: Pero yo estoy continuamente contigo[a]; tú has sostenido mi mano derecha.
  rationale: Se ajusta el inicio a un contraste más fiel al hebreo contextual («Pero yo») y se reemplaza «has tomado» por «has sostenido» para reflejar mejor la lectura principal del English POB sobre אָחַז como apoyo continuo con relevancia presente. La nota conserva alternativas léxicas válidas.
