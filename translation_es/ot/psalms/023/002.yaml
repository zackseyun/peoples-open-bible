translation:
  language: es
  text: En pastizales de hierba me hace recostar; junto a aguas de reposo[a] me conduce.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "aguas tranquilas" o "aguas quietas". La expresión hebrea enfatiza aguas asociadas con reposo o descanso.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּ/נְא֣וֹת
  english_pob_choice: in ... pastures
  chosen_spanish: en pastizales
  alternatives_spanish:
  - en pastos
  - en prados
  - en lugares de pastura
  lexicon: HALOT
  rationale: נְאוֹת se refiere a lugares de pasto o estancia para rebaños; en español, "pastizales" comunica de forma natural el campo de pastoreo y conserva la imagen pastoral.
- source_word: דֶּ֭שֶׁא
  english_pob_choice: grassy
  chosen_spanish: de hierba
  alternatives_spanish:
  - verdes
  - de hierba fresca
  - verdes y frescos
  lexicon: HALOT
  rationale: דֶּשֶׁא alude a vegetación tierna o hierba fresca. "De hierba" mantiene la referencia concreta sin imponer una paráfrasis demasiado interpretativa.
- source_word: יַרְבִּיצֵ֑/נִי
  english_pob_choice: he makes me lie down
  chosen_spanish: me hace recostar
  alternatives_spanish:
  - me hace acostar
  - me hace yacer
  - me da descanso
  lexicon: HALOT
  rationale: El hifil de רבץ expresa causar que uno se eche o recueste. "Me hace recostar" conserva la fuerza causativa y suena natural en español sin reducir el verbo a una mera idea abstracta de descanso.
- source_word: עַל
  english_pob_choice: beside
  chosen_spanish: junto a
  alternatives_spanish:
  - al lado de
  - cerca de
  - junto con
  lexicon: HALOT
  rationale: En este contexto poético, עַל funciona de manera idiomática con proximidad. "Junto a" conserva la relación espacial de cercanía que el inglés POB expresó como "beside".
- source_word: מֵ֖י
  english_pob_choice: waters
  chosen_spanish: aguas
  alternatives_spanish:
  - agua
  - corrientes
  - manantiales
  lexicon: HALOT
  rationale: El plural constructo se refleja con "aguas", preservando el plural poético del hebreo.
- source_word: מְנֻח֣וֹת
  english_pob_choice: restful
  chosen_spanish: de reposo
  alternatives_spanish:
  - quietas
  - tranquilas
  - de descanso
  lexicon: HALOT
  rationale: מְנֻחוֹת está ligado a reposo o descanso. "De reposo" mantiene el vínculo semántico con descanso sin forzar la imagen a la sola inmovilidad del agua.
- source_word: יְנַהֲלֵֽ/נִי
  english_pob_choice: he leads me
  chosen_spanish: me conduce
  alternatives_spanish:
  - me guía
  - me lleva
  - me dirige
  lexicon: HALOT
  rationale: El pi'el de נהל implica guiar o conducir con cuidado. "Me conduce" es fiel, sobrio y adecuado al tono pastoral del versículo.
theological_decisions:
- issue: Tradición de "aguas tranquilas" frente a una formulación más cercana al sentido de reposo
  english_pob_reading: restful waters
  chosen_spanish_reading: aguas de reposo
  alternative_spanish_readings:
  - aguas tranquilas
  - aguas quietas
  - aguas en reposo
  rationale: El hebreo subraya reposo, descanso o lugar de descanso más que simplemente la ausencia de movimiento. "Aguas de reposo" conserva ese matiz y, a la vez, mantiene una expresión natural y reconocible en español.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: Revisado contra el texto hebreo (WLC) y el audit trail inglés; se mantiene la imagen pastoral y la tensión lexical de מְנֻחוֹת mediante "aguas de reposo" sin depender de una traducción tradicional automática.
  spanish_consistency_notes:
  - Se preserva el paralelismo poético con dos miembros breves unidos por punto y coma.
  - Se evita "SEÑOR" porque este versículo no contiene el Tetragrámaton explícito.
  - '"Me hace recostar" retiene la causalidad del hifil de רבץ sin convertirlo en una paráfrasis devocional.'
  - '"Aguas de reposo" ofrece una alternativa más source-grounded que "aguas tranquilas", pero la nota conserva la lectura tradicional como variante válida.'
