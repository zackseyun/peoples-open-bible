translation:
  language: es
  text: 'Y este fue el motivo por el cual levantó la mano contra el rey[a]: Salomón edificó el Milo y cerró la brecha de la ciudad de David, su padre[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más interpretativamente: «se rebeló contra el rey». El hebreo dice literalmente: «levantó la mano contra el rey».'
    reason: alternative_reading
  - marker: b
    text: «El Milo» es probablemente una fortificación conocida por ese nombre o una estructura de relleno o terraplén en Jerusalén.
    reason: cultural_note
lexical_decisions:
- source_word: הַדָּבָר
  english_pob_choice: the reason
  chosen_spanish: el motivo
  alternatives_spanish:
  - la razón
  - el asunto
  - la cosa
  lexicon: HALOT
  rationale: En la fórmula וְזֶה הַדָּבָר אֲשֶׁר, el sustantivo introduce la explicación de la rebelión. «El motivo» comunica esa función explicativa sin perder el valor causal del hebreo.
- source_word: הֵרִים יָד
  english_pob_choice: raised his hand against
  chosen_spanish: levantó la mano contra
  alternatives_spanish:
  - alzó la mano contra
  - se rebeló contra
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y literalmente habla de «levantar la mano contra». Mantenerla en español conserva la imagen y la tensión lexical; «se rebeló contra» sería más interpretativo.
- source_word: בַּמֶּלֶךְ
  english_pob_choice: against the king
  chosen_spanish: contra el rey
  alternatives_spanish:
  - contra el rey Solomon
  - contra el rey Salomón
  lexicon: HALOT
  rationale: El hebreo dice simplemente «contra el rey». En español, «contra el rey» preserva esa literalidad; el nombre de Salomón aparece en la cláusula siguiente, como en el texto fuente.
- source_word: הַמִּלּוֹא
  english_pob_choice: the Millo
  chosen_spanish: el Milo
  alternatives_spanish:
  - el Millo
  - la rellena
  - el terraplén
  lexicon: HALOT
  rationale: Se trata de un término topográfico/arquitectónico específico de Jerusalén. Se conserva transliterado como nombre propio técnico; en español bíblico resulta más natural «el Milo» que una traducción con sentido incierto.
- source_word: סָגַר
  english_pob_choice: closed up
  chosen_spanish: cerrado
  alternatives_spanish:
  - cerró
  - reparado
  - fortificado
  lexicon: HALOT
  rationale: En contexto de una brecha de muro, el verbo significa cerrar o tapar. «Cerrado» mantiene la imagen y funciona bien en la coordinación verbal de la oración.
- source_word: פֶּרֶץ
  english_pob_choice: the breach
  chosen_spanish: la brecha
  alternatives_spanish:
  - el boquete
  - la abertura
  - la rotura
  lexicon: HALOT
  rationale: En contexto fortificado, פֶּרֶץ es una ruptura o abertura en una defensa. «La brecha» es el equivalente más preciso y claro en español.
- source_word: עִיר דָּוִד
  english_pob_choice: the city of David
  chosen_spanish: la ciudad de David
  alternatives_spanish:
  - la ciudad de David
  - la Ciudad de David
  lexicon: HALOT
  rationale: Es la designación estable del enclave de Jerusalén asociado con David. Se mantiene la forma nominal usual y reconocible en español bíblico.
- source_word: אָבִיו
  english_pob_choice: his father
  chosen_spanish: su padre
  alternatives_spanish:
  - su antepasado
  - de su padre
  lexicon: HALOT
  rationale: 'El sentido aquí es dinástico y literal: David es el padre de Salomón. «Su padre» es simple, exacto y fiel al hebreo.'
theological_decisions:
- issue: Uso del idiomático «levantó la mano contra el rey» frente a una interpretación explícita de rebelión
  english_pob_reading: The main text preserves the idiom; a footnote gives 'he rebelled against King Solomon.'
  chosen_spanish_reading: La traducción principal conserva la imagen idiomática y una nota permite la lectura interpretativa de rebelión.
  alternative_spanish_readings:
  - se rebeló contra el rey
  - se alzó contra el rey
  rationale: El hebreo usa un modismo concreto que no debe borrarse. Mantenerlo en el texto principal preserva la fuerza literal, mientras que la nota puede orientar al lector hacia la implicación de rebelión.
  doctrine_reference: Principio de fidelidad formal al giro idiomático; no hay contenido doctrinal directo, sino una decisión de traducción lexical.
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó «against King Solomon» a «against the king», porque el hebreo dice simplemente «contra el rey» y nombra a Salomón en la cláusula siguiente. La presente versión española sigue esa corrección y evita anticipar el nombre propio antes de tiempo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se conserva el título «rey» sin capitalización especial, conforme al uso natural del español bíblico.
  - «Milo» se translitera como término técnico; no se intenta forzar una equivalencia semántica incierta.
  - La nota sobre la mano levantada preserva la tensión entre el modismo literal y la lectura interpretativa de rebelión.
