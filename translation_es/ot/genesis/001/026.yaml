base_translation:
  language: en
  yaml_path: translation/ot/genesis/001/026.yaml
  text: Then God said[a], “Let us make man in our image, according to our likeness[d][c][b], and let them rule over the fish of the sea and over the birds of the heavens and over the livestock and over all the earth and over every creeping thing that creeps on the earth.”
  footnotes:
  - marker: a
    text: 'Or ''humankind'' or ''humanity.'' Hebrew adam here is a collective singular: ''man'' as humanity considered as one kind, which is why the verse continues with the plural ''let them rule.'''
    reason: lexical_alternative
  - marker: b
    text: The plural expressions 'Let us make' and 'in our image' are preserved as in the Hebrew. Interpreters variously understand them as divine deliberation, an address to the heavenly court, or—within Christian canonical reading—a hint consistent with later Trinitarian revelation.
    reason: alternative_reading
  - marker: c
    text: Or 'have dominion over.'
    reason: lexical_alternative
  - marker: d
    text: Or 'birds of the sky.'
    reason: lexical_alternative
