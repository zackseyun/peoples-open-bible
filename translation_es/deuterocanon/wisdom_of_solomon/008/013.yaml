translation:
  language: es
  text: Y por medio de ella tendré inmortalidad[a][b], y dejaré una memoria perdurable entre los que vengan después de mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mediante ella» o «con ella»; el pronombre se refiere a la Sabiduría personificada como femenina.
    reason: lexical_alternative
  - marker: b
    text: La expresión «inmortalidad» puede entenderse como inmortalidad personal o, en conexión con la cláusula siguiente, como un legado perdurable; el griego deja abierta la relación entre ambas ideas.
    reason: alternative_reading
lexical_decisions:
- source_word: ἕξω
  english_pob_choice: I will have
  chosen_spanish: tendré
  alternatives_spanish:
  - tendré
  - obtendré
  - poseeré
  lexicon: BDAG
  rationale: El futuro de ἔχω expresa posesión/obtención. «Tendré» es natural en español y mantiene la idea de poseer sin introducir con demasiada fuerza la noción de adquisición.
- source_word: αὐτὴν
  english_pob_choice: through her
  chosen_spanish: por medio de ella
  alternatives_spanish:
  - por ella
  - con ella
  - mediante ella
  lexicon: BDAG
  rationale: El pronombre femenino remite a la Sabiduría personificada. «Por medio de ella» conserva el sentido instrumental/mediador y la referencia femenina con claridad en español.
- source_word: ἀθανασίαν
  english_pob_choice: immortality
  chosen_spanish: inmortalidad
  alternatives_spanish:
  - inmortalidad
  - muerte no
  - incorrupción
  lexicon: BDAG
  rationale: «Inmortalidad» es la equivalencia directa y más idiomática en español. «Incorrupción» desplaza el matiz hacia otro campo léxico y no es necesario aquí.
- source_word: μνήμην αἰώνιον
  english_pob_choice: an everlasting remembrance
  chosen_spanish: un recuerdo eterno
  alternatives_spanish:
  - una memoria eterna
  - un memorial perdurable
  - un recuerdo perdurable
  lexicon: BDAG
  rationale: La expresión puede significar recuerdo duradero o reputación/memorial perdurable. «Un recuerdo eterno» conserva la durabilidad sin forzar una terminología cultual ajena al griego del versículo.
- source_word: τοῖς μετʼ ἐμὲ
  english_pob_choice: to those after me
  chosen_spanish: a los que vendrán después de mí
  alternatives_spanish:
  - a los que vienen después de mí
  - para los que vendrán después de mí
  - a la posteridad
  lexicon: BDAG
  rationale: La frase se refiere a generaciones futuras. «A los que vendrán después de mí» refleja bien el dativo y mantiene transparencia respecto al texto griego.
- source_word: ἀπολείψω
  english_pob_choice: I will leave behind
  chosen_spanish: dejaré
  alternatives_spanish:
  - dejaré atrás
  - dejaré en herencia
  - legaré
  lexicon: BDAG
  rationale: El verbo implica dejar algo para quienes vienen después. En español, el complemento ya comunica ese matiz; añadir «atrás» o «en herencia» sería más interpretativo de lo necesario.
theological_decisions:
- issue: Relación entre «inmortalidad» y «recuerdo eterno»
  english_pob_reading: The Greek leaves open whether immortality refers to personal deathlessness or enduring legacy; the verse also promises everlasting remembrance to later generations.
  chosen_spanish_reading: Se conserva «inmortalidad» sin reducirla a «legado» ni convertirla explícitamente en inmortalidad literal cerrada; el «recuerdo eterno» permanece como beneficio paralelo.
  alternative_spanish_readings:
  - «vida eterna»
  - «permanencia del nombre»
  - «legado imperecedero»
  rationale: El griego mantiene una tensión real entre una posible inmortalidad personal y una fama/memoria perdurable. El español debe preservar esa apertura sin resolverla prematuramente.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El inglés POB revisó «for those after me» a «to those after me» para reflejar más de cerca el dativo griego; la redacción española sigue ese ajuste con «a los que vendrán después de mí». Se mantuvo la tensión interpretativa de ἀθανασίαν sin resolverla.
  spanish_consistency_notes:
  - Se usa «Sabiduría» implícita en el pronombre femenino «ella», en armonía con la personificación del contexto.
  - «Inmortalidad» se mantiene como término técnico claro y no se sustituye por expresiones más devocionales.
  - «Recuerdo eterno» evita confundir el versículo con fórmulas litúrgicas ajenas al texto.
  - La preposición «por medio de» expresa mejor la mediación que un simple «por» en español contemporáneo.
