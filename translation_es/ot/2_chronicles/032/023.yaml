translation:
  language: es
  text: Y muchos traían una ofrenda a Yahvé en Jerusalén[a], y regalos selectos a Ezequías, rey de Judá[b], y después de esto fue exaltado a los ojos de todas las naciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «a Jerusalén». El hebreo permite entender la preposición como destino o como ubicación en este contexto.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «regalos preciosos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַבִּים
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - muchas personas
  lexicon: HALOT
  rationale: El adjetivo funciona sustantivamente en este contexto narrativo. «Muchos» conserva la concisión y el valor colectivo sin añadir una palabra innecesaria.
- source_word: מְבִיאִים
  english_pob_choice: were bringing
  chosen_spanish: traían
  alternatives_spanish:
  - estaban trayendo
  - llevaban
  lexicon: HALOT
  rationale: El participio en narración pasada expresa acción continuada o habitual. En español, el pretérito imperfecto «traían» comunica bien esa duratividad sin sonar forzado.
- source_word: מִנְחָה
  english_pob_choice: an offering
  chosen_spanish: una ofrenda
  alternatives_spanish:
  - un tributo
  - un regalo de ofrenda
  lexicon: HALOT
  rationale: Como el destinatario es Yahvé, el sentido cultual es central. «Ofrenda» reproduce ese valor religioso de forma natural en español.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahweh
  lexicon: DOCTRINE.md contested terms / Hebrew Tetragrammaton
  rationale: Se mantiene el nombre divino según la norma del proyecto. La preposición marca destinatario de la ofrenda, por eso «a Yahvé» es la forma más directa.
- source_word: לִירוּשָׁלִַם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - a Jerusalén
  - en la ciudad de Jerusalén
  lexicon: HALOT
  rationale: La preposición hebrea puede leerse como destino o ubicación, pero aquí el contexto favorece el lugar donde se presentan las ofrendas. «En Jerusalén» es natural y fiel.
- source_word: מִגְדָּנוֹת
  english_pob_choice: choice gifts
  chosen_spanish: regalos selectos
  alternatives_spanish:
  - dones preciosos
  - obsequios escogidos
  lexicon: HALOT
  rationale: El sustantivo alude a cosas selectas o valiosas ofrecidas como presentes. «Regalos selectos» conserva la idea de regalos escogidos sin restringir indebidamente el campo semántico.
- source_word: לִיחִזְקִיָּהוּ מֶלֶךְ יְהוּדָה
  english_pob_choice: to Hezekiah king of Judah
  chosen_spanish: a Ezequías, rey de Judá
  alternatives_spanish:
  - para Ezequías, rey de Judá
  lexicon: HALOT
  rationale: La frase identifica de manera directa al receptor y lo presenta en aposición como rey de Judá. La coma ayuda a la claridad en español.
- source_word: וַיִּנַּשֵּׂא
  english_pob_choice: he was exalted
  chosen_spanish: fue engrandecido
  alternatives_spanish:
  - fue exaltado
  - fue levantado en alto
  lexicon: HALOT
  rationale: El nifal expresa elevación en prestigio o estatus. «Fue engrandecido» comunica bien el resultado social/reputacional en español y evita una solemnidad demasiado abstracta de «exaltado».
- source_word: לְעֵינֵי כָל הַגּוֹיִם
  english_pob_choice: in the sight of all the nations
  chosen_spanish: a los ojos de todas las naciones
  alternatives_spanish:
  - delante de todas las naciones
  - en la vista de todas las naciones
  lexicon: HALOT
  rationale: Es un modismo de valoración pública. «A los ojos de» reproduce con naturalidad el giro idiomático y mantiene la idea de evaluación pública.
- source_word: מֵאַחֲרֵי כֵן
  english_pob_choice: after this
  chosen_spanish: después de esto
  alternatives_spanish:
  - después
  - luego de esto
  lexicon: HALOT
  rationale: Expresa secuencia temporal posterior a los hechos previos. «Después de esto» es claro, sobrio y suficientemente literal.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme al estándar del proyecto, se traduce por «Yahvé» para preservar el nombre pactal y evitar el ocultamiento convencional mediante mayúsculas.
  doctrine_reference: 'DOCTRINE.md: contested terms — יהוה / YHWH'
- issue: Valor de מִנְחָה delante de Yahvé
  english_pob_reading: an offering
  chosen_spanish_reading: una ofrenda
  alternative_spanish_readings:
  - un tributo
  - un presente
  rationale: Como el destinatario es Yahvé, el contexto es cultual y no meramente diplomático. «Ofrenda» conserva la dimensión religiosa sin añadir detalles que el hebreo no especifica.
  doctrine_reference: HALOT / contexto cultual del pasaje
translation_notes:
  revision_awareness: Tomé en cuenta que el audit trail inglés mantuvo la oscilación locativa de לִירוּשָׁלִַם y la nota alternativa de מִגְדָּנוֹת. Aun cuando el inglés final prefirió «in Jerusalem», el hebreo sigue permitiendo una lectura de destino o ubicación; por eso la nota en español conserva ambas posibilidades. También seguí la revisión inglesa que privilegió la naturalidad locativa sin perder precisión.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» según la norma del proyecto para יהוה.
  - Se prefirió el imperfecto «traían» para reflejar el participio hebreo.
  - «Ofrenda» conserva el tono cultual del sustantivo מִנְחָה.
  - «Fue engrandecido» traduce el valor resultativo del nifal sin introducir una interpretación doctrinal extra.
  - La puntuación separa con punto y coma la segunda cláusula para reflejar la coordinación del hebreo y mejorar la legibilidad en español.
