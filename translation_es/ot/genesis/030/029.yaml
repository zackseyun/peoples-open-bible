translation:
  language: es
  text: 'Él le dijo: «Tú sabes cómo te he servido, y cómo tu ganado[a] ha estado conmigo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «y lo que tu ganado fue conmigo». El modismo hebreo probablemente se refiere a cómo le fue al ganado de Labán bajo el cuidado de Jacob, no solo a dónde estaba.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר אֵלָיו
  english_pob_choice: He said to him
  chosen_spanish: Él le dijo
  alternatives_spanish:
  - Y le dijo
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol se vierte de manera natural en español con «le dijo». El sujeto explícito «Él» preserva la referencia personal del hebreo sin forzar una repetición innecesaria del conector.
- source_word: אַתָּה
  english_pob_choice: you
  chosen_spanish: Tú
  alternatives_spanish:
  - Tú mismo
  - Vos
  lexicon: HALOT
  rationale: El pronombre independiente en hebreo aporta énfasis, pero en español la simple anteposición de «Tú» delante del verbo mantiene la fuerza directa sin sobrecargar la frase. No se añade «mismo» porque el texto revisado en inglés ya retiró ese énfasis.
- source_word: יָדַעְתָּ
  english_pob_choice: know
  chosen_spanish: sabes
  alternatives_spanish:
  - has sabido
  - conoces
  lexicon: HALOT
  rationale: En discurso directo, el perfecto qal funciona como estado presente; por eso «sabes» comunica la misma vigencia que el inglés POB «you know».
- source_word: עֲבַדְתִּיךָ
  english_pob_choice: how I have served you
  chosen_spanish: cómo te he servido
  alternatives_spanish:
  - cómo trabajé para ti
  - cómo te serví
  lexicon: HALOT
  rationale: עבד aquí se refiere a trabajar/servir en contexto laboral. «Te he servido» conserva la relación de subordinación y trabajo personal. El orden con «cómo» sigue la estructura hebrea de manera idiomática.
- source_word: מִקְנְךָ
  english_pob_choice: your livestock
  chosen_spanish: tu ganado
  alternatives_spanish:
  - tu ganado mayor y menor
  - tu rebaño
  lexicon: HALOT
  rationale: מִקְנֶה designa el ganado/livestock. «Ganado» es natural en español y suficientemente amplio para el contexto de rebaños y prosperidad patrimonial.
- source_word: אִתִּי
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - bajo mi cuidado
  - en mi poder
  lexicon: HALOT
  rationale: La preposición es literalmente «con». «Conmigo» conserva la forma básica del hebreo y, en este contexto, sugiere la estancia y el trato del ganado bajo la custodia de Jacob sin añadir interpretación excesiva.
theological_decisions:
- issue: Sentido idiomático de «tu ganado ha estado conmigo»
  english_pob_reading: how your livestock has been with me
  chosen_spanish_reading: cómo tu ganado ha estado conmigo
  alternative_spanish_readings:
  - cómo tu ganado ha prosperado conmigo
  - cómo tu ganado ha fared with me
  rationale: El inglés POB revisado optó por la literalidad «has been with me» y relegó la lectura idiomática a nota. En español se conserva la misma literalidad, dejando abierta la posibilidad de que el hebreo implique más que mera ubicación, sin imponer una paráfrasis interpretativa en el texto principal.
  doctrine_reference: Gn 30:29; nota lexical del POB en inglés
translation_notes:
  revision_awareness: Sigo la revisión más reciente del POB en inglés, que sustituyó la interpretación «has fared with me» por la formulación más literal «has been with me» y eliminó el énfasis explícito de «yourself». Por eso el español principal mantiene la literalidad y evita ampliar el sentido en el cuerpo del texto.
  spanish_consistency_notes:
  - Se mantiene un español natural y breve, apto para lectura pública.
  - «Ganado» traduce de forma amplia מִקְנֶה sin estrechar indebidamente a «cattle».
  - La nota al pie conserva la alternativa idiomática porque el hebreo admite una lectura de prosperidad, pero el texto principal no la impone.
