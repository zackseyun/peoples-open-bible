translation:
  language: es
  text: '«Hijo de hombre[a], mira, la casa de Israel dice: “La visión que él ve es para muchos días por venir, y profetiza para tiempos lejanos”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para muchos días» / «para tiempos lejanos». El hebreo enfatiza que el pueblo piensa que la visión de Ezequiel apunta a un futuro remoto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  english_pob_choice: Son of man
  chosen_spanish: Hijo de hombre
  alternatives_spanish:
  - Ser humano
  - Mortal
  lexicon: HALOT
  rationale: Mantiene el apelativo fijo dirigido a Ezequiel y conserva la continuidad literaria del hebreo. 'Hijo de hombre' es la forma española más reconocible y fiel para este título discursivo.
- source_word: הִנֵּה
  english_pob_choice: look
  chosen_spanish: mira
  alternatives_spanish:
  - mira, pues
  - he aquí
  - observa
  lexicon: HALOT
  rationale: Expresa el llamado de atención con naturalidad en español moderno sin perder la fuerza deíctica del hebreo.
- source_word: בֵית יִשְׂרָאֵל
  english_pob_choice: the house of Israel
  chosen_spanish: la casa de Israel
  alternatives_spanish:
  - el pueblo de Israel
  - la familia de Israel
  lexicon: HALOT
  rationale: Conserva la expresión corporativa y pactal del original en vez de reducirla a un simple colectivo genérico.
- source_word: אֹמְרִים
  english_pob_choice: is saying
  chosen_spanish: está diciendo
  alternatives_spanish:
  - dicen
  - dice
  lexicon: HALOT
  rationale: Aunque el sujeto es plural en hebreo, en español el singular colectivo 'la casa de Israel' fluye mejor con un progresivo que mantiene el sentido de habla en curso.
- source_word: הֶחָזוֹן
  english_pob_choice: the vision
  chosen_spanish: la visión
  alternatives_spanish:
  - esta visión
  - la visión profética
  lexicon: HALOT
  rationale: Es la equivalencia directa y suficiente para el sustantivo definido, sin añadir matices no exigidos por el texto.
- source_word: אֲשֶׁר הוּא חֹזֶה
  english_pob_choice: that he sees
  chosen_spanish: que él ve
  alternatives_spanish:
  - que está viendo
  - que contempla
  lexicon: HALOT
  rationale: Refleja de manera directa la cláusula relativa y evita solemnizar innecesariamente el verbo.
- source_word: לְיָמִים רַבִּים
  english_pob_choice: for many days to come
  chosen_spanish: para muchos días por venir
  alternatives_spanish:
  - para muchos días
  - para el futuro lejano
  lexicon: HALOT
  rationale: Reproduce la idea de distancia temporal futura que el audit trail inglés entendió como remota. 'Por venir' conserva naturalidad y el valor de futuro.
- source_word: וּלְעִתִּים רְחוֹקוֹת
  english_pob_choice: for distant times
  chosen_spanish: para tiempos lejanos
  alternatives_spanish:
  - para tiempos distantes
  - para épocas lejanas
  lexicon: HALOT
  rationale: Mantiene la paralela remota de la frase anterior con un español claro y literal sin sonar rígido.
- source_word: הוּא נִבָּא
  english_pob_choice: he prophesies
  chosen_spanish: profetiza
  alternatives_spanish:
  - está profetizando
  - habla proféticamente
  lexicon: HALOT
  rationale: El verbo profético estándar en español comunica bien el valor del hebreo sin convertirlo en perífrasis innecesaria.
theological_decisions:
- issue: Tratamiento del apelativo בן־אדם
  english_pob_reading: Son of man
  chosen_spanish_reading: Hijo de hombre
  alternative_spanish_readings:
  - Ser humano
  - Mortal
  rationale: Se preserva el apelativo tradicional y literario dirigido a Ezequiel, en línea con la continuidad del texto y con la elección inglesa documentada. No se neutraliza el término porque el contexto lo usa como vocativo profético establecido.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; Contested terms table for אָדָם'
- issue: Valor temporal de לְיָמִים רַבִּים y וּלְעִתִּים רְחוֹקוֹת
  english_pob_reading: for many days to come / for distant times
  chosen_spanish_reading: para muchos días por venir / para tiempos lejanos
  alternative_spanish_readings:
  - para muchos días / para tiempos distantes
  - para el futuro lejano
  rationale: La decisión conserva la tensión de un futuro remoto sin convertirlo en mero lapso de duración. El español refleja la remoteness temporal que el audit trail inglés explicó explícitamente.
  doctrine_reference: Principio de fidelidad semántica al alcance temporal del hebreo
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del audit trail inglés: se prefirió una formulación natural para לְיָמִים רַבִּים (''para muchos días por venir'') y se mantuvo la preposición simple de la segunda cola como ''para tiempos lejanos'', preservando el paralelismo y la distancia futura indicada en la nota revisada.'
  spanish_consistency_notes:
  - Se mantuvo 'casa de Israel' como expresión corporativa estable.
  - Se usó 'profetiza' para נבא, consistente con el verbo profético estándar.
  - Se evitó 'SEÑOR' o sustituciones litúrgicas porque el versículo no contiene el tetragrámaton.
  - El vocativo 'Hijo de hombre' se conservó como apelativo fijo, no como expresión genérica.
