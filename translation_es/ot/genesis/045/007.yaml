review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien la estructura básica del hebreo: Dios envía a José antes que sus hermanos con el propósito de preservar vida. Sin embargo, dos elecciones se apartan del análisis fuente/POB: (1) בָּאָרֶץ está mejor como «en la tierra/la región/el país», pero en este contexto el inglés auditado fijó «in the land» por precisión local; en español «en la tierra» suena demasiado amplio/cósmico. (2) La nota b usa «escapatoria», que en español moderno suele sonar coloquial o mecánica y no representa bien פְּלֵיטָה. Además, «preservar para ustedes» es demasiado calcado; el sentido puede mantenerse con español más natural.'
  spanish_quality_summary: 'El texto es comprensible, pero contiene calcos poco naturales: «preservar para ustedes» y la repetición de «para» resultan rígidas; «escapatoria» es poco digna y no eclesial. «Mantenerlos con vida mediante una gran liberación» es aceptable, aunque «preservarles la vida» sería también idiomático. Conviene pulir hacia un español más natural sin perder la semántica fuente.'
  glossary_alignment: No hay conflicto con terminología troncal del proyecto. «Dios» es correcto para אֱלֹהִים y «remanente» preserva bien שְׁאֵרִית. La mejora principal es alinear בָּאָרֶץ con «en la tierra/land» en sentido local mediante «en la tierra» -> mejor «en la tierra» contextualizado o, preferiblemente, «en el país/la tierra». Dado el POB auditado, «en la tierra» pierde precisión; «en el país» sería demasiado interpretativo. «en la tierra» puede funcionar, pero «en la tierra» junto a la nota inglesa «in the land» sigue siendo menos fiel. También se debe reemplazar «escapatoria» por «escape» o «liberación/rescate» en la nota.
  issues:
  - severity: medium
    issue: «en la tierra» no refleja con suficiente precisión el sentido local de בָּאָרֶץ
    rationale: El expediente inglés justificó «in the land» frente a «on the earth». En español, «en la tierra» puede leerse de modo global o abstracto; aquí el contexto narrativo pide un sentido local/concreto.
  - severity: medium
    issue: «preservar para ustedes» es un calco poco natural
    rationale: Aunque reproduce el inglés, en español bíblico natural es mejor «preservarles» o «preservar para ustedes» reformulado. La fidelidad no exige mantener la duplicación preposicional rígida.
  - severity: medium
    issue: La nota b usa «escapatoria», término poco idiomático y demasiado coloquial
    rationale: פְּלֵיטָה puede ser «escape», «liberación», «rescate» o «supervivientes», pero «escapatoria» suele referirse a una salida o excusa, no a un acto de salvación.
  revised_spanish_text: Y Dios me envió delante de ustedes para preservarles un remanente en la tierra[a], y para mantenerlos con vida mediante una gran liberación[b].
  revised_footnotes:
  - marker: a
    text: O «para preservarles sobrevivientes en la tierra». El hebreo שְׁאֵרִית puede denotar «remanente», «sobrevivientes» o «posteridad».
    reason: lexical_alternative
  - marker: b
    text: O «mediante un gran escape» o «mediante muchos sobrevivientes». La expresión hebrea לִפְלֵיטָה גְּדֹלָה puede subrayar el acto de liberación o el resultado de personas preservadas con vida.
    reason: lexical_alternative
  revision_rationale: 'Se hicieron reparaciones menores para mejorar la naturalidad del español y la fidelidad al expediente auditado: «preservarles» evita un calco torpe; se mantuvo «remanente» por su valor léxico-teológico; y en la nota b se sustituyó «escapatoria» por «escape», que refleja mejor פְּלֵיטָה en español digno y claro. No se requiere adjudicación adicional porque los ajustes son estilísticos y léxicamente directos.'
