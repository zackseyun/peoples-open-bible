theological_decisions:
- issue: Rendering the patriarchal idiom of walking before God
  chosen_reading: before whom my fathers Abraham and Isaac walked
  alternative_readings:
  - whom my fathers Abraham and Isaac followed
  - in whose presence my fathers Abraham and Isaac lived
  rationale: The translation preserves the relational and covenantal metaphor rather than interpreting it more narrowly as obedience alone. This maintains theological texture without importing a specific doctrinal system.
  doctrine_reference: Translation philosophy §3, §6
- issue: Rendering the divine shepherd metaphor
  chosen_reading: the God who has shepherded me
  alternative_readings:
  - the God who has been my shepherd
  - the God who has fed me
  rationale: The shepherd image is theologically significant in Scripture and should be preserved rather than reduced to provision language. The participial form is rendered with an English perfect to express ongoing care from the past into the present.
  doctrine_reference: Translation philosophy §1, §6
