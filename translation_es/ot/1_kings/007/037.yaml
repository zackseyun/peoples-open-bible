translation:
  language: es
  text: 'Así hizo los diez soportes: una sola fundición[a], una sola medida, una sola forma para todos ellos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «una sola pieza fundida, una sola medida, un solo diseño para todos ellos». El hebreo usa tres expresiones compactas y paralelas para subrayar que los diez soportes fueron hechos según la misma especificación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּזֹאת
  english_pob_choice: Thus
  chosen_spanish: Así
  alternatives_spanish:
  - De este modo
  - De esta manera
  lexicon: HALOT
  rationale: La partícula introduce una conclusión resumida que remite al diseño descrito antes. «Así» conserva esa fuerza demostrativa en español sin sobrecargar la frase.
- source_word: עָשָׂה
  english_pob_choice: he made
  chosen_spanish: hizo
  alternatives_spanish:
  - fabricó
  - realizó
  lexicon: HALOT
  rationale: En contexto de artesanía y fabricación, «hizo» es natural y fiel al valor básico de עשה. Evita sonar técnico en exceso y mantiene el sentido de producción del objeto.
- source_word: הַמְּכֹנוֹת
  english_pob_choice: the ten stands
  chosen_spanish: los diez soportes
  alternatives_spanish:
  - los diez basamentos
  - los diez pedestales
  lexicon: HALOT
  rationale: En este contexto de mobiliario del templo, el término designa las bases/soportes de metal. «Soportes» es claro en español y suficientemente amplio para no imponer una imagen más específica de la que el hebreo y el contexto garantizan.
- source_word: מוּצָק אֶחָד
  english_pob_choice: one casting
  chosen_spanish: un solo vaciado
  alternatives_spanish:
  - una sola colada
  - una sola pieza fundida
  - un solo moldeado
  lexicon: HALOT
  rationale: El hebreo alude a una pieza hecha por fundición, con énfasis en uniformidad de manufactura. «Vaciado» comunica el proceso metalúrgico en español moderno y conserva la concisión del original. «Un solo» refuerza la unidad de fabricación implícita en אֶחָד.
- source_word: מִדָּה אַחַת
  english_pob_choice: one measure
  chosen_spanish: una sola medida
  alternatives_spanish:
  - las mismas dimensiones
  - una medida idéntica
  lexicon: HALOT
  rationale: La frase apunta a dimensiones uniformes. «Una sola medida» mantiene el paralelismo compacto del hebreo y deja visible la idea de igualdad dimensional.
- source_word: קֶצֶב אֶחָד
  english_pob_choice: one form
  chosen_spanish: una sola forma
  alternatives_spanish:
  - un solo diseño
  - una sola proporción
  - una sola figura
  lexicon: HALOT
  rationale: קֶצֶב puede referirse a forma, patrón o proporción. «Forma» es la opción más neutra y natural en español para reproducir el paralelismo con «medida» sin forzar una interpretación demasiado técnica.
- source_word: לְכֻלָּהְנָה
  english_pob_choice: for all of them
  chosen_spanish: para todos ellos
  alternatives_spanish:
  - para las diez
  - para cada uno de ellos
  lexicon: HALOT
  rationale: La referencia es distributiva respecto de los diez soportes. «Para todos ellos» es fluido y preserva el sentido colectivo del hebreo.
translation_notes:
  revision_awareness: 'El texto coincide con el sentido del hebreo masorético y con la solución auditada en inglés: una declaración resumida de fabricación uniforme de los diez soportes, con el mismo proceso y las mismas dimensiones y forma para todos. No se registran revisiones textuales relevantes en el expediente inglés.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque el hebreo no contiene el nombre divino aquí.
  - Se optó por «soportes» en lugar de «bases» o «carros» para mantener neutralidad semántica y evitar sobreespecificar la función del objeto.
  - La repetición de «una sola» refleja el énfasis hebreo en uniformidad y ayuda a conservar el paralelismo triple del original.
  - «Vaciado» se eligió para expresar el valor de fundición metálica sin introducir terminología excesivamente arcaica.
