translation:
  language: es
  text: 'Cuando Jezabel oyó que Nabot había sido apedreado y había muerto[a], Jezabel dijo a Ahab: «Levántate, toma posesión de la viña de Nabot el jezreelita, que rehusó darte por plata; pues Nabot ya no está vivo; está muerto».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que rehusó vendértela por dinero». El hebreo dice literalmente: «que rehusó darte por plata».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַֽיְהִי כִּשְׁמֹעַ
  english_pob_choice: When ... heard
  chosen_spanish: Cuando ... oyó
  alternatives_spanish:
  - Y aconteció que, al oír...
  - Ahora bien, cuando... oyó
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea introduce el siguiente episodio. En español, «Cuando ... oyó» comunica con naturalidad la relación temporal sin cargar el texto con una construcción más literal pero menos fluida.
- source_word: סֻקַּל
  english_pob_choice: had been stoned
  chosen_spanish: había sido apedreado
  alternatives_spanish:
  - había sido lapidado
  - había sido muerto a pedradas
  lexicon: HALOT
  rationale: El pasivo de סקל señala muerte por pedradas. «Apedreado» es claro y natural en español; «lapidado» también sería válido, pero puede sonar más técnico o eclesiástico.
- source_word: וַיָּמֹת
  english_pob_choice: and had died
  chosen_spanish: y había muerto
  alternatives_spanish:
  - y murió
  - y había fallecido
  lexicon: HALOT
  rationale: Se conserva el valor de secuencia anterior al habla de Jezabel. «Había muerto» refleja ese orden temporal sin perder la fuerza del hecho.
- source_word: קוּם
  english_pob_choice: Get up
  chosen_spanish: Levántate
  alternatives_spanish:
  - Ponte de pie
  - Alza
  lexicon: HALOT
  rationale: El imperativo comunica urgencia e inmediatez. «Levántate» es el equivalente natural y directo en español contemporáneo.
- source_word: רֵשׁ
  english_pob_choice: take possession of
  chosen_spanish: toma posesión de
  alternatives_spanish:
  - posee
  - apodérate de
  - hereda
  lexicon: HALOT
  rationale: יַרַשׁ aquí se refiere a reclamar la propiedad ahora disponible. «Toma posesión de» mantiene la acción concreta sin introducir una interpretación más estrecha como «hereda».
- source_word: כֶּרֶם
  english_pob_choice: vineyard
  chosen_spanish: viña
  alternatives_spanish:
  - viñedo
  - viña de uvas
  lexicon: HALOT
  rationale: En español bíblico, «viña» es la equivalencia natural y estable para כֶּרֶם en este contexto agrícola.
- source_word: הַיִּזְרְעֵאלִי
  english_pob_choice: the Jezreelite
  chosen_spanish: el jezreelita
  alternatives_spanish:
  - el de Jezreel
  lexicon: HALOT
  rationale: El gentilicio identifica a Nabot por su procedencia. «Jezreelita» conserva esa relación de forma directa y comprensible.
- source_word: מֵאֵן לָתֶת לְךָ בְכֶסֶף
  english_pob_choice: which he refused to give you for silver
  chosen_spanish: que te rehusó dar por plata
  alternatives_spanish:
  - que se negó a darte por dinero
  - que rehusó venderte por plata
  lexicon: HALOT
  rationale: Se mantiene la literalidad relevante de «dar ... por plata», siguiendo la decisión inglesa de no convertirlo de forma directa en «vender», aunque ese sea el sentido transaccional. «Rehusó» conserva el matiz de negativa formal del hebreo.
- source_word: בְכֶסֶף
  english_pob_choice: for silver
  chosen_spanish: por plata
  alternatives_spanish:
  - por dinero
  lexicon: HALOT
  rationale: «Plata» preserva el valor metonímico del hebreo כסף y sigue de cerca la decisión inglesa de conservar el material monetario en lugar de neutralizarlo por completo como «dinero».
- source_word: אֵין נָבוֹת חַי
  english_pob_choice: Naboth is not alive
  chosen_spanish: Nabot no está vivo
  alternatives_spanish:
  - Nabot no vive
  - Nabot no está con vida
  lexicon: HALOT
  rationale: La construcción negativa más el adjetivo se refleja mejor como «no está vivo», que conserva el énfasis del hebreo antes de la declaración final.
- source_word: כִּי מֵת
  english_pob_choice: he is dead
  chosen_spanish: está muerto
  alternatives_spanish:
  - porque está muerto
  - pues está muerto
  lexicon: HALOT
  rationale: La frase final refuerza el juicio tajante de Jezabel. «Está muerto» es directo y natural en español, y funciona bien tras la declaración previa de que Nabot no está vivo.
translation_notes:
  revision_awareness: 'Se ha seguido de cerca el audit trail inglés: se conserva la secuencia temporal del reporte («había sido apedreado» / «había muerto»), la literalidad de «por plata» en lugar de suavizarla a «vender», y la doble afirmación final («no está vivo; está muerto») para mantener la contundencia del hebreo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se mantiene «Nabot» y «Jezabel» con ortografía española habitual, y «Ahab» se conserva como forma tradicional del nombre propio en este contexto narrativo.
  - Se prefiere «viña» para כֶּרֶם y «plata» para כֶּסֶף siguiendo la textura semítica preservada por el POB inglés.
