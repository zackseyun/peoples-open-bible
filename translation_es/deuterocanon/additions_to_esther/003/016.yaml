translation:
  language: es
  text: Y ahora hemos pecado delante de ti, y tú nos has entregado en manos de nuestros enemigos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καὶ νῦν
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Y así ahora
  - Y ahora mismo
  lexicon: BDAG
  rationale: Conserva la conexión narrativa y el valor temporal inmediato de la frase griega sin añadir contraste que el texto no expresa.
- source_word: ἡμάρτομεν
  english_pob_choice: we have sinned
  chosen_spanish: hemos pecado
  alternatives_spanish:
  - pecamos
  lexicon: BDAG
  rationale: El perfecto español expresa una acción cometida con vigencia actual, adecuado para una confesión orante. 'Pecado' mantiene el alcance moral y religioso de ἁμαρτάνω.
- source_word: ἐνώπιόν σου
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - en tu presencia
  - a tus ojos
  lexicon: BDAG
  rationale: '''Delante de ti'' es natural en español bíblico y conserva el sentido relacional y judicial de estar ante Dios.'
- source_word: παρέδωκας
  english_pob_choice: you have handed us over
  chosen_spanish: nos has entregado
  alternatives_spanish:
  - nos has entregado a
  - nos has puesto en manos de
  lexicon: BDAG
  rationale: '''Entregado'' mantiene la acción de entregar a otro poder; la forma compuesta preserva el valor resultativo que el inglés POB expresó con perfecto.'
- source_word: εἰς χεῖρας
  english_pob_choice: into the hands of
  chosen_spanish: en manos de
  alternatives_spanish:
  - en las manos de
  - bajo el poder de
  lexicon: BDAG
  rationale: La expresión idiomática española 'en manos de' reproduce de forma natural la imagen bíblica de quedar bajo control ajeno.
- source_word: τῶν ἐχθρῶν ἡμῶν
  english_pob_choice: our enemies
  chosen_spanish: nuestros enemigos
  alternatives_spanish:
  - los enemigos de nosotros
  lexicon: BDAG
  rationale: Traducción directa y sobria de ἐχθροί; mantiene la referencia clara a quienes se oponen al pueblo.
theological_decisions:
- issue: Agencia divina en el juicio
  english_pob_reading: The verse states directly that God handed the people over to their enemies as a consequence of their sin.
  chosen_spanish_reading: El texto dice directamente que Dios los entregó en manos de sus enemigos como consecuencia de su pecado.
  alternative_spanish_readings:
  - Una versión que atenúe la acción divina
  - Una paráfrasis que presente solo la derrota humana
  rationale: Se preserva la atribución directa a Dios del verbo 'entregar', sin suavizar la afirmación de juicio. Esto mantiene la tensión teológica del original y el auditable enlace entre pecado y entrega divina.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica en vez de resolverla; primacía del lenguaje original sobre la tradición de traducción.'
translation_notes:
  revision_awareness: El audit trail inglés no mostró notas textuales ni revisiones aplicadas; el griego y la traducción inglesa están en alta concordancia. La versión española sigue de cerca la sintaxis del original sin introducir glosas.
  spanish_consistency_notes:
  - Se mantiene 'Dios' implícito por el discurso en segunda persona, como en el griego, sin añadir el nombre divino.
  - Se usa 'entregar en manos de' como equivalente idiomático estable de παραδίδωμι + εἰς χεῖρας.
  - El perfecto compuesto español ('hemos pecado', 'has entregado') conserva la culminación de los hechos con relevancia presente en la confesión.
