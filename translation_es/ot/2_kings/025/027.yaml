translation:
  language: es
  text: Y sucedió que, en el año treinta y siete del destierro de Jehoiaquín, rey de Judá, en el duodécimo mes, el día veintisiete del mes, Evil-merodac, rey de Babilonia, en el año de su reinado[b][c], levantó la cabeza de Jehoiaquín, rey de Judá, de la cárcel[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebraísmo: «levantó la cabeza de» significa que lo elevó de condición o le mostró favor; esto comenzó con su salida de la cárcel.'
    reason: lexical_alternative
  - marker: b
    text: Evil-merodac es también conocido históricamente como Amel-Marduk.
    reason: cultural_note
  - marker: c
    text: «En el año de su reinado» también puede entenderse como «en el primer año de su reinado».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y sucedió que
  alternatives_spanish:
  - Y aconteció que
  - Y ocurrió que
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol introduce un nuevo episodio; «Y sucedió que» conserva ese valor discursivo en español con tono digno y natural.
- source_word: לְגָלוּת
  english_pob_choice: of the exile
  chosen_spanish: del destierro
  alternatives_spanish:
  - del exilio
  - de la deportación
  lexicon: HALOT
  rationale: El hebreo indica el estado de estar expulsado/cautivo lejos de la tierra; «destierro» es claro y fiel, y en español mantiene bien el matiz de expulsión histórica. «Exilio» también es posible, pero «destierro» suena menos técnico y más directo para este contexto narrativo.
- source_word: יְהוֹיָכִין
  english_pob_choice: Jehoiachin
  chosen_spanish: Jehoiaquín
  alternatives_spanish:
  - Joaquín
  lexicon: Transliteración tradicional española
  rationale: Se adopta la forma española habitual para este nombre bíblico, que es transparente y reconocible para lectores en español.
- source_word: בִּשְׁנֵים עָשָׂר חֹדֶשׁ
  english_pob_choice: in the twelfth month
  chosen_spanish: en el duodécimo mes
  alternatives_spanish:
  - en el mes doce
  lexicon: HALOT
  rationale: La fórmula de fecha se expresa con el ordinal en español para conservar la estructura del hebreo y la fluidez natural.
- source_word: בְּעֶשְׂרִים וְשִׁבְעָה לַחֹדֶשׁ
  english_pob_choice: on the twenty-seventh day of the month
  chosen_spanish: a los veintisiete días del mes
  alternatives_spanish:
  - el día veintisiete del mes
  lexicon: HALOT
  rationale: La expresión española normal de fecha admite «a los veintisiete días del mes»; reproduce el valor distributivo del hebreo sin sobrecargar la frase.
- source_word: אֱוִיל מְרֹדַךְ
  english_pob_choice: Evil-merodach
  chosen_spanish: Evil-merodac
  alternatives_spanish:
  - Evil-merodaj
  - Amel-Marduk
  lexicon: Uso bíblico tradicional / forma hispanizada
  rationale: Se conserva el nombre bíblico usual en español, con ajuste ortográfico mínimo para la adaptación fonética.
- source_word: בִּשְׁנַת מָלְכוֹ
  english_pob_choice: in the year of his reign
  chosen_spanish: en el año de su reinado
  alternatives_spanish:
  - en el año en que comenzó a reinar
  - en el primer año de su reinado
  lexicon: HALOT
  rationale: La frase puede significar simplemente el año regnal, sin forzar en el texto principal la inferencia de «primer año». Se conserva así la ambigüedad documentada por el audit trail.
- source_word: נָשָׂא אֶת רֹאשׁ
  english_pob_choice: lifted up the head of
  chosen_spanish: levantó la cabeza de
  alternatives_spanish:
  - levantó el rostro de
  - exaltó a
  lexicon: HALOT
  rationale: Se mantiene el modismo hebreo en español porque el POB lo preserva y porque el giro tiene valor lexical propio; el sentido contextual de elevación/favor queda indicado en la nota.
- source_word: מִבֵּית כֶּלֶא
  english_pob_choice: out of the prison
  chosen_spanish: sacándolo de la cárcel
  alternatives_spanish:
  - sacándolo de prisión
  - sacándolo de la cárcel de detención
  lexicon: HALOT
  rationale: «Cárcel» es la equivalencia natural y clara en español para el lugar de confinamiento; la forma gerundiva enlaza bien con el verbo anterior y expresa la acción resultante.
theological_decisions:
- issue: Modismo de restauración y favor implícito en «levantó la cabeza de»
  english_pob_reading: The idiom means he elevated Jehoiachin's status or showed him favor, beginning with his release from prison.
  chosen_spanish_reading: El modismo se conserva literalmente en el texto, y su sentido de restauración de estatus o favor queda explicado en la nota.
  alternative_spanish_readings:
  - lo favoreció
  - lo restauró en su dignidad
  - lo liberó
  rationale: No se diluye el modismo hebreo en la línea principal porque el audit trail lo considera lexicalmente significativo. La nota permite que el lector entienda el sentido contextual sin perder la imagen original.
  doctrine_reference: None
- issue: Ambigüedad regnal en «en el año de su reinado»
  english_pob_reading: May mean 'in the first year of his reign.'
  chosen_spanish_reading: Se conserva la formulación abierta en el texto principal.
  alternative_spanish_readings:
  - en el primer año de su reinado
  - cuando comenzó a reinar
  rationale: La nota permite reflejar la posibilidad interpretativa sin imponerla como única lectura. Esto respeta la cautela del audit trail y evita sobretraducir un matiz no asegurado por el hebreo.
  doctrine_reference: None
translation_notes:
  revision_awareness: Se siguió el pasaje inglés auditado sin cambios de revisión pendientes; el control cruzado reporta alta concordancia y solo cuestiones menores. La redacción española mantiene la ambigüedad documentada del año de reinado y conserva el modismo hebreo clave con nota explicativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma predeterminada del proyecto solo cuando aparece el nombre divino; aquí no aparece.
  - Se emplea una forma hispanizada y reconocible para Jehoiaquín, consistente con el uso bíblico en español.
  - Se conserva el orden narrativo y cronológico del hebreo sin añadir elementos interpretativos.
  - Se mantiene la distinción entre la imagen idiomática («levantó la cabeza») y su sentido contextual mediante nota, para no borrar la tensión lexical documentada.
