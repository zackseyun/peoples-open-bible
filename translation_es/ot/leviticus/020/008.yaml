lexical_decisions:
- source_word: וּשְׁמַרְתֶּם
  english_pob_choice: You shall keep
  chosen_spanish: Guardarán
  alternatives_spanish:
  - Y guardarán
  - Observarán
  - Mantendrán
  lexicon: HALOT
  rationale: שׁמר expresa guardar, observar o custodiar. En español, «guardar» funciona de manera natural en un contexto legal/pactual y mantiene la idea de obedecer con cuidado, sin introducir un matiz más técnico que el hebreo no exige.
- source_word: חֻקֹּתַי
  english_pob_choice: my statutes
  chosen_spanish: mis estatutos
  alternatives_spanish:
  - mis decretos
  - mis ordenanzas
  lexicon: HALOT
  rationale: «Estatutos» conserva el valor jurídico de חֻקָּה dentro de la Torá y coincide bien con el registro legal del pasaje. «Decretos» y «ordenanzas» son posibles, pero alteran ligeramente el perfil lexical.
- source_word: וַעֲשִׂיתֶם אֹתָם
  english_pob_choice: and do them
  chosen_spanish: y los cumplirán
  alternatives_spanish:
  - y los harán
  - y los practicarán
  - y los pondrán en práctica
  lexicon: HALOT
  rationale: עָשָׂה con objetos legales puede significar ejecutar o llevar a cabo. En español, «cumplir» expresa con claridad la realización obediente de los estatutos, evitando la ambigüedad de un «hacerlos» demasiado literal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: La política terminológica del proyecto en español usa «Yahvé» para el nombre divino יְהוָה. Mantiene la transliteración del Nombre propio y evita la sustitución por un título.
- source_word: מְקַדִּשְׁכֶם
  english_pob_choice: who sanctifies you
  chosen_spanish: que los santifico
  alternatives_spanish:
  - que los hace santos
  - que los consagra
  lexicon: HALOT
  rationale: El participio קדשׁ expresa una acción característica y continua de Yahvé. «Santifico» preserva el lenguaje de santidad de modo teológicamente consistente. Se mantiene la primera persona implícita en el hebreo («yo soy… que los santifico»), en lugar de una relativa explícita en tercera persona.
theological_decisions:
- issue: Tratamiento del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El hebreo tiene el Tetragrama de forma explícita; por tanto, la versión española conserva el Nombre propio como «Yahvé» en vez de sustituirlo por un título. Esto sigue la intención auditada del POB de transparentar el texto fuente.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Verbo de santificación en contexto pactual
  english_pob_reading: who sanctifies you
  chosen_spanish_reading: que los santifico
  alternative_spanish_readings:
  - que los hace santos
  - que los consagra
  rationale: El hebreo presenta a Yahvé como el agente que santifica a su pueblo. «Santifico» conserva la fuerza teológica y la continuidad del acto divino mejor que una paráfrasis moralizante. Se evita diluir el término en mera mejoría ética.
  doctrine_reference: DOCTRINE.md §5 Consistency of key terms, or documented exception
translation_notes:
  revision_awareness: El paquete fuente y la traducción inglesa auditada muestran acuerdo alto y sin revisiones aplicadas. La versión española sigue esa lectura estable, conservando la estructura de mandato seguida por la autoidentificación divina y el participio de santificación.
  spanish_consistency_notes:
  - Se mantiene el plural de segunda persona implícito en los verbos («Guardarán», «cumplirán») según el hebreo.
  - «Yahvé» se usa de manera consistente para יְהוָה.
  - «Santifico» preserva el léxico de santidad con un registro bíblico claro y no sustituto.
