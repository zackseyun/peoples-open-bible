source:
  edition: SBLGNT
  text: Καὶ οἱ λοιποὶ τῶν ἀνθρώπων, οἳ οὐκ ἀπεκτάνθησαν ἐν ταῖς πληγαῖς ταύταις, ⸀οὐδὲ μετενόησαν ἐκ τῶν ἔργων τῶν χειρῶν αὐτῶν, ἵνα μὴ ⸀προσκυνήσουσιν τὰ δαιμόνια καὶ τὰ εἴδωλα τὰ χρυσᾶ καὶ τὰ ἀργυρᾶ καὶ τὰ χαλκᾶ καὶ τὰ λίθινα καὶ τὰ ξύλινα, ἃ οὔτε βλέπειν ⸀δύνανται οὔτε ἀκούειν οὔτε περιπατεῖν,
base_translation:
  language: en
  yaml_path: translation/nt/revelation/009/020.yaml
  text: 'And the rest of humanity[a], who were not killed by these plagues, did not even repent of the works of their hands, so as not to worship demons and the idols of gold and silver and bronze and stone and wood[c][b], which can neither see nor hear nor walk.'
  footnotes:
  - marker: a
    text: Or, 'the rest of mankind.' The Greek term is generic for human beings.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'repent from the works of their hands,' an idiom referring especially here to what they had made and worshiped.
    reason: lexical_alternative
  - marker: c
    text: Or, 'so that they would not worship.' The Greek clause can express purpose or intended result.
    reason: alternative_reading
translation:
  language: ko
  text: 이 재앙들로 죽임을 당하지 아니한 그 남은 사람들은, 자기들 손의 행위를 회개하지 아니하였습니다. 곧 귀신들과 보지도 듣지도 걷지도 못하는 금과 은과 동과 돌과 나무의 우상들을 경배하기를 그치지 아니하였습니다.
  philosophy: optimal-equivalence
