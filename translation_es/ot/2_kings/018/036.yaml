translation:
  language: es
  text: 'Pero el pueblo guardó silencio y no le respondieron ni una palabra[a], porque la orden del rey era: «No le respondan».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «no le respondieron ni una palabra», un modismo que significa que no dieron ninguna respuesta en absoluto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֶחֱרִישׁוּ
  english_pob_choice: kept silent
  chosen_spanish: calló
  alternatives_spanish:
  - guardó silencio
  - se mantuvo en silencio
  - callaron
  lexicon: HALOT
  rationale: El hiphil de חרשׁ aquí expresa guardar silencio o permanecer callado. «Calló» conserva la idea de silencio efectivo y funciona con naturalidad en español narrativo. Aunque el hebreo es plural, en español el sujeto colectivo «el pueblo» admite este verbo en singular colectivo sin perder el sentido.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la población
  - el pueblo allí
  lexicon: HALOT
  rationale: עָם designa aquí al grupo colectivo presente en la escena. «El pueblo» es el equivalente más directo y sobrio en español bíblico.
- source_word: וְלֹא עָנוּ אֹתוֹ דָבָר
  english_pob_choice: did not answer him a word
  chosen_spanish: no le respondió ni una palabra
  alternatives_spanish:
  - no le contestó nada
  - no le respondieron una palabra
  - no le respondieron en absoluto
  lexicon: HALOT
  rationale: ענה con objeto pronominal significa «responder». El hebreo usa la expresión idiomática «no... palabra»; «ni una palabra» preserva ese giro con naturalidad. Se evita mecanizar «una palabra» como si fuera cuantificación literal y se mantiene el matiz de ausencia total de respuesta.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - puesto que
  lexicon: HALOT
  rationale: Aquí introduce la razón del silencio del pueblo. «Porque» expresa con claridad la relación causal en español.
- source_word: מִצְוַת הַמֶּלֶךְ
  english_pob_choice: the king’s command
  chosen_spanish: la orden del rey
  alternatives_spanish:
  - el mandamiento del rey
  - el mandato del rey
  - el comando del rey
  lexicon: HALOT
  rationale: מִצְוָה puede ser «mandamiento» o «orden». En este contexto narrativo, «orden del rey» comunica bien la autoridad y evita una posible connotación demasiado religiosa que tendría «mandamiento» en español.
- source_word: הִיא לֵאמֹר
  english_pob_choice: was, ‘...’
  chosen_spanish: 'era: «... »'
  alternatives_spanish:
  - 'era, diciendo: «...»'
  - 'era así: «...»'
  - 'consistía en esto: «...»'
  lexicon: HALOT
  rationale: La construcción hebrea introduce la cita directa. En español, «era:» reproduce con concisión la relación entre la frase introductoria y el mandato citado sin añadir explicación ajena al texto.
- source_word: לֹא תַעֲנֻהוּ
  english_pob_choice: Do not answer him
  chosen_spanish: No le respondan
  alternatives_spanish:
  - No le contesten
  - No le respondáis
  - No le hablen
  lexicon: HALOT
  rationale: El plural masculino de segunda persona transmite una prohibición dirigida al grupo. «No le respondan» conserva la fuerza del mandato y evita la repetición de «responder» que podría sonar torpe en español si se traduce de forma demasiado literal.
translation_notes:
  revision_awareness: Se siguió de cerca el texto hebreo y el audit trail inglés. No hubo revisiones aplicadas en el expediente más reciente; la formulación española conserva la idiomaticidad del hebreo sin suavizar la reiteración de la negativa a responder.
  spanish_consistency_notes:
  - Se mantuvo «el pueblo» como sujeto colectivo estable.
  - Se prefirió «responder» en las dos ocurrencias para conservar el paralelismo verbal del hebreo.
  - Se usó «orden» para מִצְוָה en un contexto real, no cultual.
  - La nota al pie preserva el modismo hebreo sobre la ausencia total de respuesta.
