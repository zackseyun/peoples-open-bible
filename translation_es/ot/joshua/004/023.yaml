revisions:
- from: Porque Yahvé su Dios secó[a] las aguas del Jordán delante de ustedes, hasta que ustedes pasaron, tal como Yahvé su Dios hizo con el mar de Reeds[b], el cual secó delante de nosotros hasta que pasamos.
  to: Porque Yahvé su Dios secó las aguas del Jordán delante de ustedes, hasta que pasaron, tal como Yahvé su Dios hizo con el mar de los Juncos[a], el cual secó delante de nosotros hasta que pasamos.
  rationale: Se corrige la mezcla de idiomas en יַם סוּף con una forma española natural y fiel («mar de los Juncos»), y se reubica la nota tradicional al término que realmente explica. También se elimina la duplicación innecesaria de notas y se aligera levemente la sintaxis sin cambiar el sentido.
