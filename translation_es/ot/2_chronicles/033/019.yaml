    text: O ‘los postes de Asera’. El hebreo puede referirse a objetos cultuales asociados con Asera.
    reason: lexical_alternative
  - marker: b
    text: O ‘en las palabras de Hozai’. La frase final puede conservar un nombre propio en lugar de significar ‘los videntes’.
    reason: alternative_reading
  revision_rationale: 'Se corrige la lectura principal de la cláusula final para alinearla con la evidencia y con la decisión documentada del POB inglés: el texto principal debe decir ‘los videntes’ y la opción ‘Hozai’ debe quedar en nota. También se reubican los marcadores de nota a las palabras/frases correctas: [a] en ‘asherim’ y [b] en ‘los videntes’. El resto del borrador puede mantenerse por ser fiel y claro.'
