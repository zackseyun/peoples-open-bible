  glossary_alignment: 'No hay conflicto con la terminología marco del proyecto. No aparecen Yahvé, Mesías/Cristo, Espíritu, etc. Las decisiones léxicas principales están bien alineadas: «estatutos» para חֻקִּים, «leyes» para תּוֹרֹת con alternativa «instrucciones», y preservación de «camino/andar».'
