- from: Hacen eclosionar huevos de víbora[a] y tejen telas de araña; el que come de sus huevos muere[b], y el que es aplastado se abre y sale una víbora.
  to: Eclosionan huevos de víbora[a] y tejen telas de araña; el que come de sus huevos muere, y lo que es aplastado[b] se abre y sale una víbora.
  rationale: Se reemplaza 'hacen eclosionar' por 'eclosionan' para lograr un español más natural sin perder la imagen contextual de huevos que se abren. Se corrige 'el que es aplastado' a 'lo que es aplastado' para reflejar que el referente es el huevo o aquello aplastado, no una persona. Se mantiene la nota sobre el literal hebreo en la cláusula final.
