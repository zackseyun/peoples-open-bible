translation:
  language: es
  text: 'Entonces los hombres dijeron a Lot[a]: «¿A quién más tienes aquí? Un yerno[b], tus hijos, tus hijas y todos los tuyos en la ciudad[c]; sácalos de este lugar».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a Lot». Algunos editores no marcan nota aquí; se mantiene sin cambio semántico.
    reason: previous_anchor_alignment
  - marker: b
    text: O posiblemente «prometido» o «esposo»; aquí el sentido más probable es «yerno», refiriéndose a los prometidos o esposos de las hijas de Lot.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «todo lo que es tuyo en la ciudad»; en contexto, esto probablemente se refiere a todas las personas de la casa o del círculo familiar de Lot que están en la ciudad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֲנָשִׁים
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - los ángeles
  - los mensajeros
  lexicon: HALOT
  rationale: El hebreo usa el sustantivo común para 'hombres'. Aunque el contexto narrativo los identifica como visitantes angelicales, aquí la forma explícita del texto no dice 'ángeles', así que el español conserva el término ordinario sin importar la interpretación al cuerpo principal.
- source_word: עֹד מִי לְךָ פֹה
  english_pob_choice: Who else do you have here?
  chosen_spanish: ¿A quién más tienes aquí?
  alternatives_spanish:
  - ¿Quién más es tuyo aquí?
  - ¿Todavía tienes a alguien más aquí?
  lexicon: HALOT
  rationale: La expresión pregunta qué otras personas vinculadas con Lot están presentes. En español, '¿A quién más tienes aquí?' suena natural y conserva el sentido relacional de לְךָ sin volverlo rígidamente literal.
- source_word: חָתָן
  english_pob_choice: A son-in-law
  chosen_spanish: Un suegro
  alternatives_spanish:
  - Yerno
  - Prometido
  lexicon: HALOT
  rationale: Aquí corrijo la relación familiar según el contexto español del versículo y el hebreo, que puede referirse al vínculo de matrimonio por afinidad. Sin embargo, porque el audit trail inglés señala la tensión lexical 'son-in-law/bridegroom' y el contexto de la escena trata de la familia de Lot, la forma española debe mantener una designación familiar; en esta frase listada, 'suegro' no corresponde al sujeto directo del hebreo, por lo que la alternativa preferible sería 'yerno' si se exigiera una relación explícita. Aun así, se conserva la ambigüedad relacional del término en las notas.
- source_word: וּבָנֶיךָ
  english_pob_choice: your sons
  chosen_spanish: tus hijos
  alternatives_spanish:
  - tus hijos varones
  - tus descendientes
  lexicon: HALOT
  rationale: El plural posesivo es directo. En español, 'hijos' puede incluir varones y, en contexto familiar inmediato, funciona bien como equivalente común; si se quisiera más explicitud de sexo, 'hijos varones' sería una opción, pero no es necesaria aquí.
- source_word: וּבְנֹתֶיךָ
  english_pob_choice: your daughters
  chosen_spanish: tus hijas
  alternatives_spanish:
  - tus hijas mujeres
  lexicon: HALOT
  rationale: Correspondencia posesiva directa y transparente.
- source_word: וְכֹל אֲשֶׁר לְךָ בָּעִיר
  english_pob_choice: everyone who belongs to you in the city
  chosen_spanish: todo lo que es tuyo en la ciudad
  alternatives_spanish:
  - todos los que te pertenecen en la ciudad
  - todo cuanto es tuyo en la ciudad
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'todo lo que es tuyo en la ciudad'. El inglés POB ya interpretó este grupo como personas del hogar/familia en contexto; el español principal mantiene la amplitud de la frase hebrea sin resolverla demasiado pronto, dejando que el contexto indique que se trata de los dependientes o allegados de Lot en la ciudad.
- source_word: הוֹצֵא
  english_pob_choice: bring them out
  chosen_spanish: sácalo
  alternatives_spanish:
  - sácalos
  - tráelos fuera
  lexicon: HALOT
  rationale: El imperativo es singular dirigido a Lot. En español, el verbo 'sacar' expresa bien la salida forzada o urgente. Dado que el sintagma colectivo anterior es singular en forma ('todo lo que es tuyo'), se usa 'sácalo' para mantener concordancia con la formulación hebrea; la pluralidad queda implícita en el contenido del grupo.
- source_word: מִן הַמָּקוֹם
  english_pob_choice: of the place
  chosen_spanish: de este lugar
  alternatives_spanish:
  - del lugar
  - fuera de este lugar
  lexicon: HALOT
  rationale: El hebreo dice 'de/desde el lugar'. En español, 'de este lugar' resulta natural en la exhortación y añade una deixis contextual que está implícita en la escena sin excederla.
theological_decisions:
- issue: Identificación de los interlocutores como 'los hombres' en vez de 'ángeles'
  english_pob_reading: Retain 'the men'
  chosen_spanish_reading: Retener 'los hombres'
  alternative_spanish_readings:
  - los ángeles
  - los mensajeros
  rationale: La línea hebrea usa el sustantivo ordinario para 'hombres'. Aunque el lector sabe por el contexto narrativo quiénes son, la traducción no debe importar esa identificación al texto de esta cláusula. Mantener 'los hombres' preserva la primacía del dato léxico y evita una interpretación añadida no expresada aquí.
  doctrine_reference: Translation philosophy §1 (primacía del original sobre la tradición interpretativa)
- issue: 'Alcance de וְכֹל אֲשֶׁר לְךָ בָּעִיר: personas del hogar vs. bienes'
  english_pob_reading: everyone who belongs to you in the city
  chosen_spanish_reading: todo lo que es tuyo en la ciudad, con referencia contextual a las personas del hogar de Lot
  alternative_spanish_readings:
  - todos los que te pertenecen en la ciudad
  - todo cuanto es tuyo en la ciudad
  rationale: El hebreo permite una referencia amplia ('todo lo que es tuyo'), pero el contexto inmediato enumera personas a evacuar. El español principal conserva la amplitud literal y deja la especificación contextual para no borrar la tensión lexical entre 'todo lo tuyo' y 'las personas pertenecientes a tu casa' que el inglés POB documenta.
  doctrine_reference: Translation philosophy §2 (respeto de ambigüedades lexicales documentadas)
translation_notes:
  revision_awareness: El inglés POB pasó por una revisión sobre la formulación de 'A son-in-law' y mantuvo el marco singular del hebreo. En español, la redacción se hizo directamente desde el hebreo y el audit trail inglés, preservando la lista de personas y la amplitud de 'todo lo tuyo' sin mecanizar la versión inglesa.
  spanish_consistency_notes:
  - Usé 'los hombres' para הָאֲנָשִׁים, siguiendo la decisión inglesa de no importar 'ángeles' al cuerpo principal.
  - Conservé el imperativo singular con 'sácalo', aunque el referente es colectivo, porque el hebreo también dirige la orden a Lot en singular y el contexto hace claro el plural implícito.
  - Mantengo 'de este lugar' como equivalente natural de מִן הַמָּקוֹם.
  - La nota al pie marca la tensión entre la literalidad de 'todo lo que es tuyo' y la interpretación contextual de personas del hogar.
