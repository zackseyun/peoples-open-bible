  yaml_path: translation/nt/luke/014/021.yaml
  text: 'And when the servant came back[a], he reported these things to his lord. Then the master of the house, becoming angry, said to his servant, ‘Go out quickly into the broad streets and lanes of the city[b], and bring in here the poor and disabled and blind and lame.’'
  footnotes:
  - marker: a
    text: Or “master” for “lord” (κύριος); the term here refers to the servant’s human superior, not to God.
    reason: lexical_alternative
  - marker: b
    text: Or “maimed” for “disabled” (ἀναπείρους).
    reason: lexical_alternative
translation:
  language: ko
  text: 「그 종이 와서 자기 주인에게 이 말을 보고하자, 집주인이 분노하여 종에게 말하였다. 「급히 성의 거리와 골목으로 나가, 가난한 자들과 몸 불편한 자들과 맹인들과 다리 저는 자들을 이리로 데려오라.」」
  philosophy: optimal-equivalence
