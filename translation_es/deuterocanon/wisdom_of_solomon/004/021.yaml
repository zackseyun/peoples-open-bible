translation:
  language: es
  text: Entonces el justo estará en pie con gran valentía delante de los que lo afligieron[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más literalmente: «delante de la faz de los que lo afligieron». El griego conserva la idea de confrontación directa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: LSJ
  rationale: Marca la sucesión temporal del escenario de juicio/vindicación; «Entonces» es natural y fiel al valor adverbial.
- source_word: στήσεται
  english_pob_choice: will stand
  chosen_spanish: se pondrá
  alternatives_spanish:
  - estará en pie
  - se presentará
  - tomará su lugar
  lexicon: LSJ
  rationale: El futuro de ἵστημι aquí expresa una postura de comparecencia o de presentarse de pie. «Se pondrá» conserva la imagen corporal y funciona con naturalidad en español sin forzar una pasiva analítica.
- source_word: ἐν παρρησίᾳ πολλῇ
  english_pob_choice: with great boldness
  chosen_spanish: con gran confianza
  alternatives_spanish:
  - con gran valentía
  - con gran franqueza
  - con mucha audacia
  lexicon: LSJ
  rationale: παρρησία puede ser boldness, confidence o frankness. En este contexto judicial de vindicación, «confianza» comunica bien la seguridad pública y desinhibida; «gran» reproduce πολλῇ.
- source_word: ὁ δίκαιος
  english_pob_choice: the righteous man
  chosen_spanish: el justo
  alternatives_spanish:
  - el hombre justo
  - el justo varón
  - el justo, en singular
  lexicon: LSJ
  rationale: El adjetivo sustantivado en singular masculino se mantiene como «el justo», que es idiomático en español y conserva la fuerza representativa sin añadir un sustantivo innecesario.
- source_word: κατὰ πρόσωπον
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - frente a
  - en presencia de
  lexicon: LSJ
  rationale: Aunque literalmente es «según la faz/rostro», el audit trail inglés ya decidió que la expresión funciona como presencia directa y confrontación. «Delante de» mantiene esa relación sin caer en un calco poco natural.
- source_word: τῶν θλιψάντων αὐτόν
  english_pob_choice: those who afflicted him
  chosen_spanish: de los que lo afligieron
  alternatives_spanish:
  - de los que lo oprimieron
  - de los que lo hicieron sufrir
  - de los que lo atormentaron
  lexicon: LSJ
  rationale: θλίβω abarca afligir, oprimir o causar angustia. «Afligieron» reproduce el alcance amplio sin estrechar indebidamente el sentido a una sola forma de opresión.
theological_decisions:
- issue: Figura singular representativa del justo
  english_pob_reading: the righteous man
  chosen_spanish_reading: el justo
  alternative_spanish_readings:
  - el hombre justo
  - el justo varón
  rationale: La forma griega es un singular masculino representativo. En español, «el justo» conserva esa singularidad y permite leer la figura de modo ejemplar, sin neutralizar el género ni introducir un matiz ajeno al texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: El inglés POB revisó «before the face of» a «before» por naturalidad. La versión española sigue esa decisión de sentido con «delante de», evitando un calco de «ante la faz de» y conservando la confrontación directa implícita en κατὰ πρόσωπον.
  spanish_consistency_notes:
  - Se mantiene «el justo» para ὁ δίκαιος, en armonía con la política de singular masculino representativo del POB.
  - Se traduce παρρησία como «confianza» en este marco judicial; no se usa «franqueza» porque aquí predomina la audacia pública ante los acusadores.
  - «Afligieron» cubre la gama de θλίβω sin convertirla en un término más técnico de opresión política.
