base_translation:
  language: en
  yaml_path: translation/ot/isaiah/001/006.yaml
  text: From the sole of the foot even to the head[a], there is no soundness in it—only wounds and bruises and fresh blows; they have not been pressed out, or bandaged[d][c][b], or softened with oil.
  footnotes:
  - marker: a
    text: Or 'there is no soundness in him.' The Hebrew personifies the nation as a wounded body.
    reason: alternative_reading
  - marker: b
    text: Or 'fresh wounds.' The phrase can denote recent, raw injuries.
    reason: lexical_alternative
  - marker: c
    text: The verb may refer to pressing or squeezing wounds to expel matter before treatment.
    reason: cultural_note
  - marker: d
    text: Or 'bound up.'
    reason: lexical_alternative
