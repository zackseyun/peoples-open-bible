translation:
  language: es
  text: Entonces Moisés fue y habló estas palabras a todo Israel[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y Moisés fue y habló estas palabras a todo Israel». La conjunción inicial puede verterse más formalmente como «y».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - anduvo
  - proseguió
  lexicon: HALOT
  rationale: El verbo הלך en este contexto narrativo expresa el avance de Moisés; en español, «fue» transmite bien el movimiento sin añadir una localización que el hebreo no da. «Anduvo» sería posible, pero suena más marcado hacia caminar a pie; «proseguió» suena más interpretativo.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: Nombre propio estándar
  rationale: Nombre propio bíblico normalizado en español. No requiere variante.
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - se dirigió
  lexicon: HALOT
  rationale: דבר en piel suele significar «hablar». En español, «habló» conserva el registro narrativo y el valor de acto verbal formal. «Dijo» sería más genérico y debilita el paralelismo con «las palabras».
- source_word: אֶת הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: these words
  chosen_spanish: estas palabras
  alternatives_spanish:
  - estas cosas
  - este mensaje
  lexicon: HALOT
  rationale: La expresión hebrea significa literalmente «estas palabras». «Estas palabras» preserva la forma léxica y la referencia al discurso inmediato. «Estas cosas» sería más libre y menos preciso.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: La preposición marca destinatario; en español, «a» es la equivalencia natural y directa para introducir la audiencia.
- source_word: כָּל יִשְׂרָאֵל
  english_pob_choice: all Israel
  chosen_spanish: todo Israel
  alternatives_spanish:
  - todo el Israel
  - todos los israelitas
  lexicon: HALOT
  rationale: Se conserva el nombre colectivo nacional. «Todo Israel» mantiene mejor la unidad corporativa del hebreo que «todos los israelitas», que individualiza el conjunto.
- source_word: וַ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  lexicon: Valor discursivo del waw consecutivo
  rationale: El waw narrativo avanza la secuencia. «Entonces» reproduce el avance temporal de forma natural en español. «Y» sería más literal, pero menos fluido en este inicio narrativo.
translation_notes:
  revision_awareness: La versión sigue la lectura estable del texto hebreo y coincide sustancialmente con la POB inglesa revisada; no se detectan revisiones relevantes que alteren la sintaxis o el léxico básico para el español.
  spanish_consistency_notes:
  - 'Se mantiene el tratamiento de los nombres propios bíblicos en su forma española estándar: Moisés, Israel.'
  - «Todo Israel» conserva el sentido colectivo del hebreo sin convertirlo en un plural individualizante.
  - Se usa «habló» para reflejar el verbo hebreo de habla y mantener el registro narrativo formal.
  - La nota al pie preserva la alternativa formal del waw inicial, siguiendo el audit trail inglés.
