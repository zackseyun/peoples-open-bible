translation:
  language: es
  text: 'Y aquel día tomaron resolución, diciendo: «Todo hombre que venga contra nosotros para combatir en el día de sábado[a], pelearemos contra él; y ciertamente no moriremos todos como murieron nuestros hermanos en los lugares ocultos[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «en el día de los sábados», giro idiomático para decir «en el día de sábado».
    reason: lexical_alternative
  - marker: b
    text: El griego habla de lugares ocultos en general; no especifica explícitamente «cuevas» en este versículo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐβουλεύσαντο
  english_pob_choice: they decided
  chosen_spanish: tomaron resolución
  alternatives_spanish:
  - decidieron
  - tomaron consejo
  - deliberaron
  lexicon: LSJ
  rationale: El verbo medio griego expresa deliberación y llegada a una decisión. «Tomaron resolución» conserva el sentido colectivo y deliberativo sin sonar rígido en español.
- source_word: Πᾶς ἄνθρωπος
  english_pob_choice: Every man
  chosen_spanish: Todo hombre
  alternatives_spanish:
  - Cualquier hombre
  - Toda persona
  - Todo varón
  lexicon: LSJ
  rationale: La construcción es singular y genérica, con fuerza universal. «Todo hombre» refleja mejor la forma griega y mantiene el paralelismo con el inglés POB sin diluir el género gramatical del original.
- source_word: ἔλθῃ πρὸς ἡμᾶς εἰς πόλεμον
  english_pob_choice: comes against us for battle
  chosen_spanish: venga contra nosotros para combatir
  alternatives_spanish:
  - venga a nosotros para guerra
  - nos ataque en batalla
  - venga contra nosotros para hacer guerra
  lexicon: LSJ
  rationale: La expresión indica aproximación hostil con intención bélica. «Venga contra nosotros para combatir» suena natural en español y conserva la idea de enfrentamiento armado sin ampliar el sentido.
- source_word: τῇ ἡμέρᾳ τῶν σαββάτων
  english_pob_choice: on the Sabbath day
  chosen_spanish: en día de sábado
  alternatives_spanish:
  - en el día del sábado
  - en el sábado
  - en el día de los sábados
  lexicon: LSJ
  rationale: El plural griego es idiomático para referirse al sábado. «Día de sábado» conserva la referencia cultual y evita la calca poco natural «día de los sábados».
- source_word: πολεμήσομεν κατέναντι αὐτοῦ
  english_pob_choice: we will fight against him
  chosen_spanish: pelearemos contra él
  alternatives_spanish:
  - combatiremos contra él
  - haremos guerra contra él
  - lucharemos contra él
  lexicon: LSJ
  rationale: «Pelearemos contra él» es claro y directo. Mantiene el valor adversativo de κατέναντι sin introducir un registro excesivamente formal o militarizado.
- source_word: οὐ μὴ ἀποθάνωμεν πάντες
  english_pob_choice: we will certainly not all die
  chosen_spanish: ciertamente no moriremos todos
  alternatives_spanish:
  - de ninguna manera moriremos todos
  - no moriremos todos, ciertamente
  - no moriremos todos
  lexicon: LSJ
  rationale: La negación enfática οὐ μή exige una traducción con fuerte certeza negativa. «Ciertamente no moriremos todos» preserva esa intensidad en español.
- source_word: οἱ ἀδελφοὶ ἡμῶν
  english_pob_choice: our brothers
  chosen_spanish: nuestros hermanos
  alternatives_spanish:
  - nuestros hermanos y hermanas
  - nuestros parientes
  - nuestros hermanos de raza
  lexicon: LSJ
  rationale: El plural masculino griego refiere a los miembros del grupo cercano ya asesinados. «Nuestros hermanos» conserva el término relacional y el eco comunitario del original.
- source_word: ἐν τοῖς κρυφοῖς
  english_pob_choice: in the hiding places
  chosen_spanish: en los lugares ocultos
  alternatives_spanish:
  - en los escondites
  - en los lugares escondidos
  - en las ocultaciones
  lexicon: LSJ
  rationale: El sustantivo plural sustantivado alude a lugares ocultos sin especificar «cuevas». «Lugares ocultos» reproduce el valor general del griego y mantiene abierta la referencia.
theological_decisions:
- issue: Alcance de la resolución sobre el sábado
  english_pob_reading: The verse states a practical resolution to fight defensively on the Sabbath if attacked.
  chosen_spanish_reading: 'El versículo presenta una resolución práctica y defensiva: si alguien los ataca en sábado, ellos pelearán.'
  alternative_spanish_readings:
  - Autoriza de modo general la guerra en sábado.
  - Describe una norma absoluta para combatir en sábado.
  rationale: 'El griego es condicional y reactivo: ''todo hombre que venga contra nosotros para combatir''. La traducción mantiene ese alcance limitado y no convierte la frase en una autorización general.'
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente; no añadir doctrina que el texto no formula.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés, que sustituyó una formulación condicional por otra que refleja mejor la fuerza universal de πᾶς ἄνθρωπος ὃς ἐὰν ἔλθῃ. También conserva la nota sobre ἐν τοῖς κρυφοῖς como referencia general a lugares ocultos, sin concretar indebidamente en «cuevas».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero aquí no aparece el tetragrámaton.
  - Se traduce «sábado» con minúscula por ser nombre común en español.
  - «Lugares ocultos» evita sobreespecificar el referente y deja abierta la ambigüedad textual documentada.
  - La negación enfática se expresa con «ciertamente no» para reflejar οὐ μή sin perder naturalidad en español.
