review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego: confesión de pecado innumerable, repetición enfática de ἐπλήθυναν αἱ ἀνομίαι μου, indignidad para mirar y ver la altura del cielo, y causalidad final por la multitud de las ἀδικίαι. Sin embargo, la nota al pie está mal anclada: el marcador [a] aparece sobre «actos sin ley», pero la nota explica ἀτενίσαι («mirar fijamente / mirar atentamente»). Además, «Yahvé» para κύριε aquí no está suficientemente justificado por el griego inmediato, que dice κύριε, no el tetragrámaton.'
  spanish_quality_summary: El español es claro y digno, pero «actos sin ley» suena algo calcado y menos natural en registro bíblico que «transgresiones», mientras que aún permite distinguirlo de «actos injustos». También conviene mover la nota al verbo correspondiente. El resto del verso fluye bien y mantiene un tono confesional adecuado.
  glossary_alignment: Acierta en distinguir ἀνομίαι y ἀδικιῶν, pero la solución léxica para ἀνομίαι puede mejorarse en español. El uso de «Yahvé» como equivalente de κύριε en este versículo choca con el hecho de que la evidencia fuente inmediata es griega con κύριε; sin una razón documental más fuerte, «Señor» es más fiel al término presente aquí. Se mantiene «he pecado», «la arena del mar», «se han multiplicado», «no soy digno», «la altura del cielo» y «a causa de la multitud de» como opciones acertadas.
  issues:
  - severity: high
    issue: Marcador de nota al pie mal ubicado
    rationale: La nota [a] explica el verbo griego ἀτενίσαι ('mirar atentamente / fijamente'), pero en el texto español el marcador está puesto tras «actos sin ley». Esto rompe la trazabilidad exigida entre nota y palabra anclada.
  - severity: medium
    issue: «Yahvé» para κύριε no refleja de manera directa la evidencia griega inmediata
    rationale: El texto fuente tiene κύριε, no יהוה. Aunque el proyecto usa «Yahvé» para el nombre divino, aquí la evidencia inmediata no obliga a sustituir el vocativo griego por el nombre propio. «Señor» representa mejor el término presente, salvo documentación específica en contrario.
  - severity: low
    issue: «Actos sin ley» es comprensible pero algo poco idiomático
    rationale: Preserva la fuerza de ἀνομίαι, pero en español suena más forzado que «transgresiones». «Transgresiones» mantiene el matiz de violación de ley/orden y sigue distinguiéndose bien de «actos injustos» para ἀδικιῶν.
  revised_spanish_text: Porque he pecado más allá del número de la arena del mar. Se han multiplicado mis transgresiones, Señor; se han multiplicado mis transgresiones, y no soy digno de mirar fijamente[a] y ver la altura del cielo a causa de la multitud de mis actos injustos.
  revised_footnotes:
  - marker: a
    text: O «mirar atentamente y ver la altura del cielo». El verbo griego puede enfatizar una mirada fija o intensa, no solo la dirección hacia arriba.
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota al verbo que realmente comenta. Se cambia «Yahvé» por «Señor» para reflejar con más fidelidad el κύριε griego de la evidencia inmediata. Se mejora «actos sin ley» a «transgresiones», que suena más natural en español bíblico y sigue preservando la distinción frente a «actos injustos».
