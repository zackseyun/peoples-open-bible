    reason: lexical_alternative
  - marker: b
    text: O 'una imagen abominable' / 'una cosa horrenda'. La forma exacta del objeto de culto no es segura.
    reason: lexical_alternative
  - marker: c
    text: '''Asherah'' puede referirse a la diosa Asherah o a su símbolo cultual, a menudo traducido ''poste de Asherah''.'
    reason: alternative_reading
  revision_rationale: Se reemplaza 'apartó' por 'quitó' para expresar con más precisión la destitución de un cargo oficial en español natural, sin alterar el sentido ni la estructura del original. El resto del texto y las notas se mantienen sustancialmente igual porque ya preservaban bien el significado fuente y la justificación léxico-teológica documentada.
