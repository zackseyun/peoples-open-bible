revisions:
- from: Y si en la casa de su marido hizo un voto[a], o se impuso una obligación con juramento.
  to: Y si en la casa de su marido hizo un voto, o se obligó a sí misma por juramento a una obligación[a].
  rationale: Se corrige la segunda cláusula para reflejar mejor la construcción hebrea cognada y la revisión auditada del inglés, preservando el sentido reflexivo de «sobre sí misma» y el papel formal de «por juramento». También se mueve la nota al segmento pertinente y se reformula para representar la alternativa más literal documentada.
