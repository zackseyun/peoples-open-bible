lexical_decisions:
- source_word: εὐλογεῖτε
  english_pob_choice: Bless
  chosen_spanish: Bendecid
  alternatives_spanish:
  - Bendigan
  - Alabad
  lexicon: BDAG
  rationale: El imperativo plural exhorta a la creación a decir bien de Dios o alabarlo. 'Bendecid' conserva el tono litúrgico del refrán y refleja bien el valor de 'Bless' en español de iglesia sin volverlo mecánico.
- source_word: πάχναι
  english_pob_choice: frost
  chosen_spanish: escarchas
  alternatives_spanish:
  - hielos
  - heladas
  - cencelladas
  lexicon: LSJ
  rationale: La palabra griega puede significar escarcha u hoarfrost. 'Escarchas' es claro en español, mantiene el fenómeno natural y evita una expresión demasiado técnica o poco natural para lectura pública.
- source_word: χιόνες
  english_pob_choice: snow
  chosen_spanish: nieves
  alternatives_spanish:
  - nieve
  lexicon: LSJ
  rationale: Aunque el griego está en plural, el español bíblico puede conservar el plural para reflejar la forma y el paralelismo poético. 'Nieves' suena natural en estilo elevado y mantiene la fuerza del original.
- source_word: τὸν κύριον
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor Yahvé
  - el Señor Dios
  lexicon: BDAG
  rationale: Aquí κύριος se traduce con el valor usual de 'Señor'. No hay indicio en el contexto inmediato de que deba marcarse el nombre divino como 'Yahvé' en esta fórmula de alabanza dirigida a Dios.
- source_word: ὑμνεῖτε
  english_pob_choice: sing hymns
  chosen_spanish: cantad himnos
  alternatives_spanish:
  - cantad alabanzas
  - entonad himnos
  lexicon: LSJ
  rationale: El verbo implica cantar un himno, no solo alabar de modo general. 'Cantad himnos' preserva el matiz musical mejor que una traducción más vaga.
- source_word: ὑπερυψοῦτε
  english_pob_choice: highly exalt
  chosen_spanish: exaltadlo grandemente
  alternatives_spanish:
  - exaltadlo en gran manera
  - ensalzadlo grandemente
  lexicon: LSJ
  rationale: El verbo intensifica 'exaltar' y exige el objeto pronominal. 'Grandemente' comunica la intensificación con naturalidad en español y evita sonar forzado.
- source_word: εἰς τοὺς αἰῶνας
  english_pob_choice: forever
  chosen_spanish: por los siglos
  alternatives_spanish:
  - por los siglos de los siglos
  - para siempre
  lexicon: BDAG
  rationale: La expresión griega significa literalmente 'a los siglos' y en español litúrgico puede expresarse como 'por los siglos'. Se conserva el color semítico/poético que 'forever' simplifica en inglés.
theological_decisions:
- issue: Rendering of κύριος in a deuterocanonical hymn
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el Señor Yahvé
  - Yahvé
  rationale: En este pasaje el griego usa κύριος como título de alabanza, y la pauta inglesa optó por 'the Lord' sin marcar el nombre del pacto. En español, 'el Señor' transmite la misma función devocional sin introducir una decisión onomástica no requerida por el texto.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
translation_notes:
  revision_awareness: El contexto inglés fue revisado y quedó sin cambios sustantivos; la versión española sigue la misma decisión de fondo, pero ajusta el cierre temporal a una forma más natural en español y conserva el paralelo poético mediante el plural 'nieves'.
  spanish_consistency_notes:
  - 'Se mantiene el paralelismo imperativo de la línea: bendecid / cantad / exaltadlo.'
  - Se evitó 'SEÑOR' como convención tipográfica porque el contexto no exige el nombre del pacto.
  - '''Nieves'' conserva el plural del griego y armoniza con ''escarchas'' en estilo poético.'
  - El final 'por los siglos' preserva el valor literal de εἰς τοὺς αἰῶνας y su registro litúrgico.
