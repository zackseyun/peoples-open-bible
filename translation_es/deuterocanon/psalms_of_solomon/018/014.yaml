revisions:
- from: Y no se han extraviado desde el día en que los creó[a]. Desde generaciones antiguas no se han apartado de sus caminos[d][c][b], a menos que Dios les haya mandado por el mandamiento de sus esclavos.
  to: Y no se han extraviado desde el día en que los creó[a]. Desde generaciones antiguas no se han apartado de sus caminos[b], a menos que Dios les haya ordenado por mandato de sus esclavos[c][d].
  rationale: Se hace una reparación menor para que el español sea más natural y preciso sin apartarse del griego ni del historial auditado en inglés. «Ordenado ... por mandato» expresa mejor la autoridad de ἐνετείλατο / ἐπιταγή que «mandado ... por el mandamiento», mientras que «esclavos» se mantiene por fidelidad a δοῦλοι. También se simplifica el orden de notas para evitar acumulación innecesaria y se ajusta la nota alternativa a la redacción revisada.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:14:27Z'
