translation:
  language: es
  text: Y a lo largo del límite de Gad, en el lado del sur, hacia el sur, el límite será desde Tamar hasta las aguas de Meribat-cades[a], hasta el wadi[b], hasta el Mar Grande.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Meribat-cades» refleja el constructo hebreo מְרִיבַת קָדֵשׁ. La forma más familiar en algunas traducciones es «Meribá-cades».
    reason: lexical_alternative
  - marker: b
    text: O «el torrente». El hebreo puede denotar un cauce estacional o wadi; aquí se usa «wadi» para evitar sugerir un curso de agua permanente y para no añadir una identificación geográfica que el verso no expresa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל
  english_pob_choice: And along
  chosen_spanish: Y junto a
  alternatives_spanish:
  - Y a lo largo de
  - Y sobre
  lexicon: HALOT
  rationale: La preposición marca continuidad espacial del lindero; «junto a» conserva la relación de contigüidad sin sonar demasiado literal o extraña en español.
- source_word: גְּב֣וּל גָּד
  english_pob_choice: the border of Gad
  chosen_spanish: el límite de Gad
  alternatives_spanish:
  - el territorio de Gad
  - la frontera de Gad
  lexicon: HALOT
  rationale: «Límite» funciona bien para descripciones de repartición territorial y evita un calco duro. Se mantiene la relación posesiva del hebreo.
- source_word: אֶל פְּאַת נֶגֶב תֵּימָנָה
  english_pob_choice: at the south side southward
  chosen_spanish: en el lado del sur, hacia el sur
  alternatives_spanish:
  - hacia el lado sur, hacia el sur
  - al lado sur, al sur
  lexicon: HALOT
  rationale: El hebreo acumula dos indicaciones direccionales; el español conserva esa intensificación con dos expresiones coordinadas, sin reducirla a un solo «sur».
- source_word: וְהָיָה גְבוּל
  english_pob_choice: the border shall be
  chosen_spanish: el límite estará
  alternatives_spanish:
  - el límite será
  - el límite se extenderá
  lexicon: HALOT
  rationale: En un contexto de demarcación, «estará» mantiene la fórmula descriptiva del hebreo con naturalidad en español y sin añadir la imagen de un “recorrido” que no está explícita.
- source_word: מִתָּמָר
  english_pob_choice: from Tamar
  chosen_spanish: desde Tamar
  alternatives_spanish:
  - de Tamar
  lexicon: HALOT
  rationale: Nombre propio de lugar; «desde» reproduce la idea de punto de partida del límite.
- source_word: מֵי מְרִיבַת קָדֵשׁ
  english_pob_choice: the waters of Meribath-kadesh
  chosen_spanish: las aguas de Meribat-cades
  alternatives_spanish:
  - las aguas de Meribá-cades
  - las aguas de Meribat-cades
  lexicon: HALOT
  rationale: Se conserva el topónimo con transliteración sobria. Se evita la forma más familiar «Meribá» porque el hebreo aquí presenta el constructo מְרִיבַת, y el español puede reflejarlo sin forzar una normalización tradicional.
- source_word: נַחֲלָה
  english_pob_choice: the Wadi
  chosen_spanish: el torrente
  alternatives_spanish:
  - el wadi
  - la vaguada
  lexicon: HALOT
  rationale: El sustantivo puede referirse a un cauce estacional; «torrente» comunica bien esa idea al lector español sin introducir una identificación geográfica no presente en el hebreo de este verso.
- source_word: הַגָּדוֹל
  english_pob_choice: the Great
  chosen_spanish: Grande
  alternatives_spanish:
  - Grande
  lexicon: HALOT
  rationale: Se conserva el epíteto del mar con la mayúscula convencional en nombres geográficos.
theological_decisions:
- issue: Tratamiento del nombre divino ausente en este versículo
  english_pob_reading: No theological term requiring a divine-name rendering appears here.
  chosen_spanish_reading: No aparece aquí ningún término que requiera decisión sobre el nombre divino.
  rationale: El verso es geográfico y no contiene יהוה ni κύριος; por tanto no se introduce ninguna convención de traducción del nombre divino.
  doctrine_reference: N/A
- issue: Valor de la fórmula direccional acumulada
  english_pob_reading: south side southward
  chosen_spanish_reading: en el lado del sur, hacia el sur
  alternative_spanish_readings:
  - al lado del sur, hacia el sur
  - en el lado sur, hacia el sur
  rationale: La acumulación no se suaviza a una sola indicación; se preserva la redundancia semítica como precisión topográfica.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'La redacción española sigue de cerca la última revisión inglesa: se evita añadir «de Egipto» porque no está en el hebreo de este versículo, y se conserva el topónimo de Meribat-cades con una transliteración que respeta el constructo hebreo.'
  spanish_consistency_notes:
  - Se usa «límite» de manera consistente para גְּבוּל en este pasaje.
  - Se mantiene la duplicación direccional («en el lado del sur, hacia el sur») para reflejar la intensificación del hebreo.
  - «Mar Grande» conserva el nombre geográfico tradicional, equivalente al Great Sea del inglés POB.
