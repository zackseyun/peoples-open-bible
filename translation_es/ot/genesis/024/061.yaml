translation:
  language: es
  text: Entonces Rebeca y sus jóvenes[a] se levantaron, montaron en los camellos y fueron tras el hombre. Y el siervo tomó a Rebeca y se fue.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘sus doncellas’ o ‘sus jóvenes acompañantes’. El término hebreo se refiere a mujeres jóvenes y, en contexto, probablemente a las acompañantes femeninas de Rebeca.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּקָם
  english_pob_choice: arose
  chosen_spanish: se levantaron
  alternatives_spanish:
  - se alzaron
  - se pusieron en pie
  lexicon: HALOT
  rationale: El verbo קום en esta forma narrativa expresa levantarse/ponerse en pie. En español, ‘se levantaron’ mantiene la secuencia narrativa sin sonar artificial.
- source_word: נַעֲרֹתֶיהָ
  english_pob_choice: her young women
  chosen_spanish: sus jóvenes mujeres
  alternatives_spanish:
  - sus doncellas
  - sus muchachas
  - sus jóvenes acompañantes
  lexicon: HALOT
  rationale: El hebreo refiere a mujeres jóvenes; el contexto sugiere acompañantes femeninas de Rebeca. ‘Jóvenes mujeres’ conserva el dato léxico sin imponer de entrada una función servil que el término no exige por sí solo.
- source_word: וַתִּרְכַּבְנָה עַל הַגְּמַלִּים
  english_pob_choice: mounted the camels
  chosen_spanish: montaron en los camellos
  alternatives_spanish:
  - subieron a los camellos
  - montaron sobre los camellos
  lexicon: HALOT
  rationale: רכב con עַל expresa montar/subirse. ‘Montaron en los camellos’ es natural en español y preserva el acto de subir para viajar.
- source_word: אַחֲרֵי הָאִישׁ
  english_pob_choice: after the man
  chosen_spanish: tras el hombre
  alternatives_spanish:
  - después del hombre
  - siguiendo al hombre
  lexicon: HALOT
  rationale: ‘Tras’ reproduce bien la relación espacial y de seguimiento del hebreo, sin volverla interpretativamente más fuerte que el texto.
- source_word: הָאִישׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el varón
  - el servidor
  lexicon: HALOT
  rationale: Se conserva ‘el hombre’ porque el hebreo no dice explícitamente ‘servidor’ aquí; esa identificación viene del contexto, pero no sustituye el sustantivo del texto.
- source_word: וַיִּקַּח הָעֶבֶד אֶת רִבְקָה
  english_pob_choice: the servant took Rebekah
  chosen_spanish: el esclavo tomó a Rebeca
  alternatives_spanish:
  - el siervo tomó a Rebeca
  - el servidor llevó consigo a Rebeca
  lexicon: HALOT
  rationale: POB suele reservar ‘esclavo’ para עֶבֶד cuando se quiere conservar su fuerza léxica. Aquí se mantiene esa decisión para no suavizar el término bíblico con ‘siervo’.
- source_word: וַיֵּלַךְ
  english_pob_choice: went
  chosen_spanish: se fue
  alternatives_spanish:
  - anduvo
  - partió
  lexicon: HALOT
  rationale: El hebreo simplemente dice ‘fue/anduvo’. ‘Se fue’ es un equivalente español sobrio y directo, sin añadir ‘en su camino’ u otra información no explícita.
theological_decisions:
- issue: Valor de עֶבֶד en contexto narrativo
  english_pob_reading: the servant
  chosen_spanish_reading: el esclavo
  alternative_spanish_readings:
  - el siervo
  - el servidor
  rationale: Aunque el agente es una figura de confianza en la casa de Abraham, el léxico hebreo עֶבֶד tiene fuerza de dependencia/servidumbre. Para evitar diluir esa carga, se conserva ‘esclavo’, conforme al criterio léxico del proyecto.
  doctrine_reference: No aplica; decisión léxica de traducción, no doctrinal.
translation_notes:
  revision_awareness: 'El inglés POB revisó la última mitad de la cláusula para acercarla más al hebreo: cambió ‘So’ por ‘And’ y simplificó ‘went on his way’ a ‘went’. La versión española sigue esa misma línea, evitando añadidos como ‘en su camino’ y manteniendo la secuencia narrativa con ‘Y… se fue’.'
  spanish_consistency_notes:
  - Se mantiene ‘Rebeca’ y no ‘Rébeka’ para uniformidad editorial.
  - Se usa ‘Y’ inicial para reflejar la cadena narrativa del hebreo.
  - Se conserva la ambigüedad de ‘el hombre’ aunque el contexto identifique al siervo.
  - La nota de pie de página recoge la alternativa léxica de נַעֲרֹתֶיהָ sin forzar una sola interpretación.
