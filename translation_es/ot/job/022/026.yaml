translation:
  language: es
  text: Porque entonces te deleitarás en el Todopoderoso, y alzarás tu rostro a Dios[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Alzar tu rostro a Dios» es un modismo que puede sugerir acercamiento confiado, favor restaurado o audacia en la oración. O «hallarás deleite en el Todopoderoso».
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la consecuencia o fundamento de la exhortación anterior; «porque» conserva la relación causal/resultativa con naturalidad en español.
- source_word: אָז
  english_pob_choice: then
  chosen_spanish: entonces
  alternatives_spanish:
  - en ese momento
  - luego
  lexicon: HALOT
  rationale: Marca el resultado temporal de la condición previa; «entonces» reproduce bien la secuencia lógica del hebreo.
- source_word: עַל שַׁדַּי
  english_pob_choice: in the Almighty
  chosen_spanish: en el Todopoderoso
  alternatives_spanish:
  - ante el Todopoderoso
  - sobre el Todopoderoso
  - en Shaddai
  lexicon: HALOT
  rationale: El hebreo usa עַל con תִּתְעַנָּג para indicar el objeto de deleite. En español, «deleitarse en» comunica la relación sin perder el matiz relacional y poético; «Todopoderoso» traduce שַׁדַּי conforme al criterio del proyecto.
- source_word: תִּתְעַנָּג
  english_pob_choice: you will delight yourself
  chosen_spanish: te deleitarás
  alternatives_spanish:
  - te deleitarás intensamente
  - hallarás deleite
  lexicon: HALOT
  rationale: El hitpael expresa gozo personal/reflexivo; «te deleitarás» conserva el sentido y evita una construcción demasiado literal o forzada en español.
- source_word: וְתִשָּׂא
  english_pob_choice: and lift up
  chosen_spanish: y alzarás
  alternatives_spanish:
  - y levantarás
  - y elevarás
  lexicon: HALOT
  rationale: נשא con «rostro» funciona idiomáticamente como «alzar/levantar». «Alzarás» mantiene la imagen corporal y el tono poético.
- source_word: אֶל אֱלֹהַּ
  english_pob_choice: to God
  chosen_spanish: hacia Dios
  alternatives_spanish:
  - a Dios
  - ante Dios
  lexicon: HALOT
  rationale: אֶל indica dirección. «Hacia Dios» preserva el movimiento del gesto y evita restringir el sentido a una sola interpretación devocional.
- source_word: פָּנֶיךָ
  english_pob_choice: your face
  chosen_spanish: tu rostro
  alternatives_spanish:
  - tu cara
  - tu semblante
  lexicon: HALOT
  rationale: «Rostro» es una opción natural y digna en español bíblico para mantener el idiomático «alzar el rostro» sin sonar arcaizante.
theological_decisions:
- issue: Sentido idiomático de «alzar el rostro hacia Dios»
  english_pob_reading: Retain the concrete idiom of confident approach to God rather than paraphrasing it as prayer or hope.
  chosen_spanish_reading: Conservar la expresión concreta «alzarás tu rostro hacia Dios» sin explicitarla como oración o esperanza.
  alternative_spanish_readings:
  - orarás a Dios con confianza
  - buscarás a Dios con confianza
  - mantendrás en alto tu cabeza delante de Dios
  rationale: El hebreo puede sugerir confianza, favor restaurado o atrevimiento ante Dios. Mantener el modismo preserva esa tensión teológica y poética sin reducirla a una sola interpretación.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente no requirió cambios; el borrador mantiene alta concordancia con el análisis auditado y conserva las tensiones léxicas e idiomáticas del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Todopoderoso» para שַׁדַּי, conforme al criterio del proyecto de traducir títulos divinos con transparencia.
  - 'Se conserva el paralelismo poético mediante dos verbos coordinados: deleitarse / alzar el rostro.'
  - «Hacia Dios» sigue la dirección de אֶל sin sobreinterpretar el gesto.
  - El registro es bíblico y contemporáneo, evitando tanto arcaismos fuertes como paráfrasis extensas.
