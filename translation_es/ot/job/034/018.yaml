translation:
  language: es
  text: 'el que dice a un rey[a]: «¡Despreciable!» y a los nobles[b]: «¡Inicuos!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «canalla» para בְּלִיָּעַל; el hebreo usa aquí un término de bajeza o falta de valor, no necesariamente el nombre propio posterior «Belial».
    reason: lexical_alternative
  - marker: b
    text: El hebreo «inicuo» es singular en forma, pero está dirigido a los «nobles» en plural; por claridad, se expresa como insulto plural en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַאֲמֹר
  english_pob_choice: who says
  chosen_spanish: el que dice
  alternatives_spanish:
  - quien dice
  - el que habla
  lexicon: HALOT
  rationale: El infinitivo constructo con artículo funciona de manera sustantiva y describe al tipo de persona. En español, «el que dice» conserva esa función relativa sin forzar una estructura extraña.
- source_word: לְמֶלֶךְ
  english_pob_choice: to a king
  chosen_spanish: a un rey
  alternatives_spanish:
  - a el rey
  - al rey
  lexicon: HALOT
  rationale: El hebreo no lleva artículo definido; por eso se traduce de forma genérica con «un rey», manteniendo el valor no específico del sustantivo.
- source_word: בְּלִיָּעַל
  english_pob_choice: Worthless one
  chosen_spanish: Hombre inútil
  alternatives_spanish:
  - desgraciado
  - insensato
  - hombre vil
  - inútil
  lexicon: HALOT
  rationale: El término expresa desvalorización o bajeza, no necesariamente el nombre propio posterior «Belial». «Hombre inútil» comunica el insulto sin convertirlo en nombre propio; se evita «Belial» por falta de base contextual en este versículo.
- source_word: רָשָׁע
  english_pob_choice: Wicked ones
  chosen_spanish: Inicuos
  alternatives_spanish:
  - malvados
  - impíos
  - inicuos
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular, en el paralelismo se dirige a los nobles en plural. En español, el plural «inicuos» conserva la correspondencia con el uso distributivo y la fuerza insultante, como hizo la revisión inglesa al preferir una forma plural.
- source_word: נְדִיבִים
  english_pob_choice: nobles
  chosen_spanish: los nobles
  alternatives_spanish:
  - nobles
  - príncipes
  - nobleza
  lexicon: HALOT
  rationale: El término designa personas de rango elevado. En español, «los nobles» mantiene el valor social del sustantivo y hace natural el paralelo con «un rey».
theological_decisions:
- issue: Insulto textual sin suavización teológica
  english_pob_reading: Worthless one! ... Wicked ones!
  chosen_spanish_reading: ¡Hombre inútil! ... ¡Inicuos!
  alternative_spanish_readings:
  - ¡Belial!
  - ¡malvados!
  - ¡impíos!
  rationale: 'No hay una carga doctrinal especial aquí, pero sí una tensión léxica: el hebreo usa insultos fuertes y no un título religioso. Se conserva el tono injurioso sin domesticarlo ni convertirlo en una designación teológica posterior.'
  doctrine_reference: Job 34:18; lexical insult language
translation_notes:
  revision_awareness: La revisión inglesa cambió «Wicked men!» por «Wicked ones!» para acercarse más al hebreo y preservar el paralelismo singular/plural. La versión española sigue esa misma orientación con «¡Inicuos!», evitando añadir un sustantivo innecesario.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque no aparece el tetragrámaton en este versículo.
  - Se evita «Cristo/Mesías» porque el pasaje no contiene vocabulario mesiánico.
  - Se conserva un registro sobrio y bíblico, pero con español natural.
  - «Hombre inútil» intenta reproducir el insulto de בְּלִיָּעַל sin importar «Belial» como nombre propio.
