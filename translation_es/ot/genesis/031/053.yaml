    reason: alternative_reading
  - marker: b
    text: «El Temor de su padre Isaac» es un título inusual para Dios, usando literalmente el sustantivo «temor» o «pavor» como designación divina.
    reason: lexical_alternative
  revision_rationale: Se ajusta «el dios de su padre» a «el dios de su antepasado» para representar con más fidelidad y claridad el posesivo plural hebreo sin volver la frase torpe en español. Se actualiza la nota [a] para mantener esa misma precisión en la lectura alternativa. El resto del texto conserva correctamente la ambigüedad teológica y el título divino inusual del original.
