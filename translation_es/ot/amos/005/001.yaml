translation:
  language: es
  text: 'Escuchen esta palabra que yo pronuncio sobre ustedes como lamentación[a], oh, casa de Israel:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que yo entono sobre ustedes una endecha»; el hebreo dice literalmente «que yo estoy levantando sobre ustedes un lamento».
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ
  english_pob_choice: Hear
  chosen_spanish: Escuchen
  alternatives_spanish:
  - Oigan
  - Escuchen atentamente
  lexicon: HALOT
  rationale: El imperativo plural de שׁמע pide una exhortación directa a la audiencia. «Escuchen» es natural en español, conserva el tono profético y evita la rigidez de un calco.
- source_word: הַדָּבָר הַזֶּה
  english_pob_choice: this word
  chosen_spanish: esta palabra
  alternatives_spanish:
  - este mensaje
  - este asunto
  lexicon: HALOT
  rationale: דָּבָר puede ser «palabra» o «mensaje». «Esta palabra» mantiene la fórmula profética breve y directa, en línea con la decisión inglesa.
- source_word: אֲשֶׁר אָנֹכִי נֹשֵׂא
  english_pob_choice: that I am taking up
  chosen_spanish: que yo estoy levantando
  alternatives_spanish:
  - que yo estoy tomando
  - que yo estoy entonando
  - que yo estoy elevando
  lexicon: HALOT
  rationale: נָשָׂא literalmente es «levantar / tomar / cargar». En el contexto de una lamentación, «levantando» conserva la imagen idiomática de iniciar o entonar un lamento, sin perder la cercanía al hebreo.
- source_word: עֲלֵיכֶם
  english_pob_choice: over you
  chosen_spanish: sobre ustedes
  alternatives_spanish:
  - contra ustedes
  - acerca de ustedes
  lexicon: HALOT
  rationale: עַל en este marco puede indicar algo pronunciado sobre alguien, con posible matiz adversativo. «Sobre ustedes» preserva la preposición y deja que el tono funerario quede en la frase completa.
- source_word: קִינָה
  english_pob_choice: as a lament
  chosen_spanish: como un lamento
  alternatives_spanish:
  - como una endecha
  - como una elegía
  - como un canto fúnebre
  lexicon: HALOT
  rationale: קִינָה designa una lamentación, a menudo funeraria. «Lamento» es claro y digno en español moderno; «como» refleja que la acción verbal introduce la lamentación.
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: O house of Israel
  chosen_spanish: casa de Israel
  alternatives_spanish:
  - casa de Israel, oigan
  - pueblo de Israel
  lexicon: HALOT
  rationale: La expresión funciona como vocativo en el contexto profético. En español, el vocativo puede quedar sin «oh» para sonar natural; «casa de Israel» conserva la fórmula bíblica y su fuerza de interpelación.
translation_notes:
  revision_awareness: El borrador sigue de cerca la lectura aprobada en inglés y no introduce cambios textuales. Se mantiene la tensión lexical de נָשָׂא con una solución española que conserva la imagen de “levantar” un lamento, en vez de suavizarla a “pronunciar” en el texto principal.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque no aparece en este versículo.
  - Se mantuvo «casa de Israel» como vocativo bíblico sobrio, sin añadir partículas exclamativas innecesarias.
  - «Lamento» se eligió como término base por claridad contemporánea; la nota conserva la alternativa más literal/poética «endecha».
