id: EZK.16.8
reference: Ezekiel 16:8
source:
  edition: WLC
  text: וָ/אֶעֱבֹ֨ר עָלַ֜יִ/ךְ וָ/אֶרְאֵ֗/ךְ וְ/הִנֵּ֤ה עִתֵּ/ךְ֙ עֵ֣ת דֹּדִ֔ים וָ/אֶפְרֹ֤שׂ כְּנָפִ/י֙ עָלַ֔יִ/ךְ וָ/אֲכַסֶּ֖ה עֶרְוָתֵ֑/ךְ וָ/אֶשָּׁ֣בַֽע לָ֠/ךְ וָ/אָב֨וֹא בִ/בְרִ֜ית אֹתָ֗/ךְ נְאֻ֛ם אֲדֹנָ֥/י יְהוִ֖ה וַ/תִּ֥הְיִי לִֽ/י׃
translation:
  text: When I passed by you and saw you[a], behold, your time was the time for love. So I spread the edge of my garment over you and covered your nakedness. I swore myself to you and entered into a covenant with you, declares the Lord GOD[b], and you became mine.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'I spread my wing over you.' The Hebrew idiom can refer to the edge of a garment and evokes marital protection or claim.
    reason: lexical_alternative
  - marker: b
    text: '''The time for love'' may also be rendered ''the time for caresses'' or ''the time for lovemaking''; the Hebrew carries romantic and erotic overtones within the marriage metaphor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶעֱבֹר עָלַיִךְ
  chosen: When I passed by you again
  alternatives:
  - When I passed by you
  - When I came by you
  lexicon: HALOT
  rationale: עבר with על conveys passing by/alongside. 'Again' is supplied from the narrative context, since YHWH had previously passed by her in v. 6; it is not explicit in the verb itself but helps English readers track the sequence without changing the sense.
- source_word: וָאֶרְאֵךְ
  chosen: and saw you
  alternatives:
  - and looked at you
  lexicon: HALOT
  rationale: ראה is the ordinary verb 'see.' 'Saw you' is the most direct rendering and preserves the narrative flow.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - look
  - indeed
  lexicon: HALOT
  rationale: הִנֵּה marks vivid attention. 'Behold' preserves the rhetorical force better than a flatter connective, while remaining understandable in elevated modern English.
- source_word: עִתֵּךְ עֵת דֹּדִים
  chosen: your time was the time for love
  alternatives:
  - your time was the time for lovemaking
  - your time was the time of sexual maturity
  lexicon: HALOT
  rationale: דֹּדִים can denote love, caresses, or erotic love. In this marriage-covenant metaphor, 'the time for love' preserves the relational and erotic nuance without becoming crass. The doubled עֵת construction is retained as 'your time was the time...' for emphasis.
- source_word: וָאֶפְרֹשׂ כְּנָפִי עָלַיִךְ
  chosen: So I spread the edge of my garment over you
  alternatives:
  - I spread my wing over you
  - I spread my cloak over you
  lexicon: HALOT
  rationale: כָּנָף literally means 'wing' and by extension the extremity/skirt of a garment. In this marital context, the idiom refers to symbolic betrothal/marital protection (cf. Ruth 3:9). 'Edge of my garment' makes the idiom intelligible in English while preserving the concrete image; the more literal 'wing' is preserved in a footnote.
- source_word: וָאֲכַסֶּה עֶרְוָתֵךְ
  chosen: and covered your nakedness
  alternatives:
  - and covered your shame
  lexicon: HALOT
  rationale: עֶרְוָה is literally nakedness, often with sexual exposure/shame connotations. 'Covered your nakedness' keeps the literal image and its covenantal modesty implications.
- source_word: וָאֶשָּׁבַע לָךְ
  chosen: I swore myself to you
  alternatives:
  - I swore to you
  - I made an oath to you
  lexicon: HALOT
  rationale: The Niphal/related oath expression with לְ marks swearing an oath to someone. 'Swore myself to you' brings out the marital-oath force in context more clearly than the flatter 'swore to you,' while remaining faithful to the Hebrew.
- source_word: וָאָבוֹא בִבְרִית אֹתָךְ
  chosen: and entered into a covenant with you
  alternatives:
  - and came into covenant with you
  - and made a covenant with you
  lexicon: HALOT
  rationale: The idiom בוא בברית means to enter into covenant. 'Entered into a covenant with you' is the standard natural English equivalent and preserves the covenantal formality.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - declares the Lord Yahweh
  - oracle of the Lord GOD
  lexicon: HALOT
  rationale: נְאֻם is a prophetic declaration formula, naturally rendered 'declares.' אֲדֹנָי יְהוִה is conventionally 'Lord GOD'; this also aligns with the doctrine's default of rendering YHWH as 'the LORD,' though in the compound title 'Lord GOD' is the established English equivalent for אֲדֹנָי יְהוִה.
- source_word: וַתִּהְיִי לִי
  chosen: and you became mine
  alternatives:
  - and you became my wife
  - and you became belonging to me
  lexicon: HALOT
  rationale: Literally, 'and you became to me.' In context this expresses covenantal belonging in marriage imagery. 'You became mine' is concise and faithful, preserving the metaphor without over-specifying 'wife,' which is implied but not stated.
