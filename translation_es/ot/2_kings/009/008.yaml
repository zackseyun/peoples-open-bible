translation:
  language: es
  text: Y toda la casa de Ahab perecerá[a], y yo cortaré de Ahab todo varón, esclavo y libre en Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: "todo el que orina contra una pared", un modismo áspero que significa "todo varón".'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָבַד
  english_pob_choice: shall perish
  chosen_spanish: perecerá
  alternatives_spanish:
  - será destruida
  - perecerá
  lexicon: HALOT
  rationale: En español, 'perecerá' conserva el matiz de juicio futuro profético sin añadir explícitamente el agente. 'Será destruida' sería más interpretativo y más fuerte que el hebreo por sí solo.
- source_word: כָּל בֵּית אַחְאָב
  english_pob_choice: all the house of Ahab
  chosen_spanish: toda la casa de Ahab
  alternatives_spanish:
  - toda la familia de Ahab
  - toda la casa de Ahab
  lexicon: HALOT
  rationale: '''Casa'' mantiene el idioma bíblico de linaje/dinastía, que es importante en un oráculo de juicio real. ''Familia'' aclara, pero pierde la resonancia dinástica del término.'
- source_word: וְהִכְרַתִּי
  english_pob_choice: I will cut off
  chosen_spanish: cortaré
  alternatives_spanish:
  - extirparé
  - eliminaré
  lexicon: HALOT
  rationale: El verbo 'cortar' conserva la fuerza idiomática de כרת y su eco en fórmulas de juicio. 'Extirparé' o 'eliminaré' son más explicativos, pero menos transparentes al patrón bíblico.
- source_word: לְאַחְאָב
  english_pob_choice: from Ahab
  chosen_spanish: de Ahab
  alternatives_spanish:
  - de la casa de Ahab
  - procedente de Ahab
  lexicon: HALOT
  rationale: Después de 'cortar', 'de Ahab' refleja bien la relación de origen/pertenencia del lamed y permite entender la eliminación de su línea.
- source_word: מַשְׁתִּין בְּקִיר
  english_pob_choice: every male
  chosen_spanish: todo varón
  alternatives_spanish:
  - todo el que orina contra una pared
  - todo hombre
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo crudo que designa a los varones. En el texto principal, 'todo varón' comunica con claridad el referente sin introducir una imagen innecesariamente áspera; la literalidad se conserva como nota.
- source_word: וְעָצוּר וְעָזוּב
  english_pob_choice: bond and free
  chosen_spanish: cautivo y libre
  alternatives_spanish:
  - esclavo y libre
  - atado y suelto
  lexicon: HALOT
  rationale: En español, 'cautivo y libre' funciona como un merismo natural para abarcar todos los estados sociales sin forzar una categoría legal específica. 'Esclavo y libre' es posible, pero puede sonar más rígido o anacrónico en este contexto; 'cautivo' conserva la idea de dependencia/restricción.
- source_word: בְּיִשְׂרָאֵל
  english_pob_choice: in Israel
  chosen_spanish: en Israel
  alternatives_spanish:
  - dentro de Israel
  - en medio de Israel
  lexicon: HALOT
  rationale: La preposición locativa se conserva naturalmente con 'en', indicando el ámbito en que caerá el juicio.
theological_decisions:
- issue: Mantenimiento del lenguaje de juicio dinástico
  english_pob_reading: Retain 'house of Ahab' and 'cut off' language while expressing the male-targeting idiom as 'every male' in the main text.
  chosen_spanish_reading: Mantener 'casa de Ahab' y 'cortaré' en el texto principal, con 'todo varón' para el modismo referido a los varones.
  alternative_spanish_readings:
  - '''Toda la familia de Ahab desaparecerá, y borraré de Ahab a cada hombre'''
  - '''Toda la casa de Ahab será exterminada, y yo eliminaré de Ahab a todo varón'''
  rationale: El versículo es un oráculo de juicio real. Conservar 'casa' y el verbo 'cortar' preserva el tono bíblico y la resonancia teológica de la sentencia contra una dinastía. 'Todo varón' evita la oscuridad del modismo sin perder el referente principal. La nota conserva la forma literal para auditoría.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente del audit trail, que suprimió ''both'' en favor de una formulación más formal y natural. Se preserva la estructura de juicio: ''toda la casa de Ahab'' + ''cortaré de Ahab todo varón, cautivo y libre en Israel''.'
  spanish_consistency_notes:
  - Se usa 'Ahab' como forma estable del nombre propio, coherente con el contexto auditado.
  - Se mantiene 'casa' para el valor dinástico, no como simple hogar.
  - '''Cautivo y libre'' traduce el merismo de estatus social sin añadir ''ambos'', siguiendo la revisión más reciente.'
  - La nota al pie ancla el modismo hebreo crudo y su sentido, evitando ocultar la tensión lexical.
