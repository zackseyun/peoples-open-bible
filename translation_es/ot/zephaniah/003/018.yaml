translation:
  language: es
  text: Reuniré[a] a los que se afligen por la fiesta señalada, de ti; fueron[b] un reproche sobre ella, una carga[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «reuniré a los afligidos por la asamblea señalada»; el hebreo es difícil y la frase puede referirse tanto a personas que lamentan la privación de la fiesta como a quienes fueron apartados de la reunión festiva.'
    reason: alternative_reading
  - marker: b
    text: 'O: «he reunido» o, en contexto profético, «reuniré».'
    reason: lexical_alternative
  - marker: c
    text: La referencia femenina probablemente alude a Sion o Jerusalén.
    reason: cross_reference
lexical_decisions:
- source_word: נוּגֵי
  english_pob_choice: those grieving
  chosen_spanish: los que se afligen
  alternatives_spanish:
  - los que se entristecen
  - los que lloran
  - los que están de duelo
  lexicon: HALOT
  rationale: El participio sustantivado describe personas en un estado de aflicción o tristeza. «Los que se afligen» conserva el matiz personal y emotivo sin forzar una especificación más fuerte que el hebreo no exige.
- source_word: מִמּוֹעֵד
  english_pob_choice: over the appointed festival
  chosen_spanish: por la fiesta señalada
  alternatives_spanish:
  - por la asamblea señalada
  - a causa de la fiesta señalada
  - de la reunión señalada
  lexicon: HALOT
  rationale: En contexto cultual, מוֹעֵד puede referirse a una cita/tiempo señalado o a una asamblea festiva. «Fiesta señalada» comunica bien el marco cultual en español y mantiene la ambigüedad razonable del hebreo sin sobreexplicar.
- source_word: אָסַפְתִּי
  english_pob_choice: I have gathered
  chosen_spanish: Reuniré
  alternatives_spanish:
  - he reunido
  - reuní
  - reuniré
  lexicon: HALOT
  rationale: Aunque la forma hebrea es un qatal perfecto, en lenguaje profético puede funcionar con valor futuro. En español, el futuro expresa de manera natural la acción de restauración anunciada sin perder la tensión profética del contexto.
- source_word: מִמֵּךְ
  english_pob_choice: from you
  chosen_spanish: de ti
  alternatives_spanish:
  - desde ti
  - de entre ti
  lexicon: HALOT
  rationale: La segunda persona femenina singular apunta a Sion/Jerusalén. «De ti» es natural en español y conserva la referencia relacional sin añadir un matiz espacial innecesario.
- source_word: הָיוּ
  english_pob_choice: they were
  chosen_spanish: fueron
  alternatives_spanish:
  - eran
  - han sido
  lexicon: HALOT
  rationale: El verbo copulativo simple se vierte con un pasado directo en español. «Fueron» mantiene la brevedad del hebreo y encaja con la estructura nominal siguiente.
- source_word: מַשְׂאֵת
  english_pob_choice: a burden
  chosen_spanish: una carga
  alternatives_spanish:
  - un peso
  - una carga impuesta
  - un fardo
  lexicon: HALOT
  rationale: Aquí el sustantivo tiene el sentido de algo llevado como peso o carga, no de «oráculo». «Una carga» refleja bien la imagen y funciona con naturalidad junto a «reproche».
- source_word: עָלֶיהָ
  english_pob_choice: on her
  chosen_spanish: sobre ella
  alternatives_spanish:
  - contra ella
  - en ella
  lexicon: HALOT
  rationale: La preposición con sufijo femenino singular se traduce de manera directa. «Sobre ella» conserva la referencia a Sion/Jerusalén y se ajusta al paralelismo con «reproche» y «carga».
- source_word: חֶרְפָּה
  english_pob_choice: a reproach
  chosen_spanish: un reproche
  alternatives_spanish:
  - una vergüenza
  - una deshonra
  - un oprobio
  lexicon: HALOT
  rationale: «Reproche» mantiene el componente de deshonra pública y posible censura verbal. En este contexto preserva mejor la fuerza social del término que una traducción más abstracta como «vergüenza».
theological_decisions:
- issue: Ambigüedad sintáctica del versículo y del destinatario femenino
  english_pob_reading: The verse speaks of the LORD gathering people from Zion who grieve over the loss of the appointed festival; these people had been a burden of reproach upon her.
  chosen_spanish_reading: 'El versículo se entiende como una promesa de restauración: Dios reunirá a los afligidos por la fiesta señalada, y el cuadro final conserva la acusación de haber sido un reproche y una carga sobre Jerusalén/Sion.'
  alternative_spanish_readings:
  - El versículo habla de quitar de Sion la afrenta asociada con quienes fueron excluidos de la asamblea.
  - 'La cláusula final podría leerse: «fueron un reproche sobre ella, una carga para ellos».'
  rationale: El hebreo es comprimido y difícil. La redacción española conserva la secuencia verbal y nominal sin resolver por completo la ambigüedad. Se mantiene la referencia femenina implícita, probablemente Sion/Jerusalén, sin introducir una aclaración que cierre indebidamente el sentido.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica en vez de resolverla artificialmente.'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión del inglés POB que prefirió «over the appointed festival» en lugar de «because of», y que reordenó la cláusula final a «a reproach upon her, a burden». La versión española refleja esa misma cautela: usa una expresión natural («por la fiesta señalada») y conserva el orden de la carga/reproche sin armonizarlo artificialmente.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca en el contexto mayor, conforme al estándar del proyecto.
  - Se evitó «SEÑOR» como sustituto del nombre divino, y no hay necesidad de introducirlo en este versículo.
  - «Fiesta señalada» conserva el campo semántico cultual de מוֹעֵד sin cerrar la ambigüedad de forma excesiva.
  - La voz profética del verbo se expresó con futuro español para mantener naturalidad y la función anunciadora del pasaje.
