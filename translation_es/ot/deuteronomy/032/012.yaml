translation:
  language: es
  text: Yahvé solo lo guió[a], y ningún dios extranjero estaba con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'lo dirigió'. El verbo hebreo puede denotar tanto guiar como conducir.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino personal del Tetragrámaton, siguiendo la decisión doctrinal y el equivalente español ya establecido en el proyecto, en lugar de sustituirlo por un título.
- source_word: בָּדָד
  english_pob_choice: alone
  chosen_spanish: solo
  alternatives_spanish:
  - solamente
  - por sí solo
  - apartado
  lexicon: HALOT
  rationale: El adverbio modifica la acción de Yahvé e indica que actuó sin ayuda ni acompañamiento. 'Solo' es natural en español y mantiene la fuerza idiomática.
- source_word: יַנְחֶנּוּ
  english_pob_choice: led him
  chosen_spanish: lo guió
  alternatives_spanish:
  - lo condujo
  - lo llevó
  - lo dirigió
  lexicon: HALOT
  rationale: El verbo en hifil puede significar 'guiar' o 'conducir'. En español, 'guió' comunica bien la idea de dirección providencial y conserva la alternativa léxica documentada en la nota.
- source_word: וְאֵין
  english_pob_choice: and no
  chosen_spanish: y ningún
  alternatives_spanish:
  - y no había
  - y no
  - sin
  lexicon: HALOT
  rationale: La negación existencial se adapta de forma natural en español ante el sintagma nominal siguiente. 'Ningún' preserva el valor negativo sin volver pesada la cláusula.
- source_word: עִמּוֹ
  english_pob_choice: was with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto a él
  - estaba con él
  lexicon: HALOT
  rationale: 'El hebreo expresa acompañamiento. En español, el verbo ''estar'' puede suplirse implícitamente en una construcción más fluida: ''con él''.'
- source_word: אֵל נֵכָר
  english_pob_choice: foreign god
  chosen_spanish: dios extranjero
  alternatives_spanish:
  - dios ajeno
  - dios forastero
  - dios extraño
  lexicon: HALOT
  rationale: La frase denota una deidad ajena a Israel, no simplemente 'extraña'. 'Dios extranjero' preserva el matiz polemizante y la referencia a una deidad no perteneciente al pueblo del pacto.
theological_decisions:
- issue: Referente singular de los sufijos verbales y preposicionales
  english_pob_reading: The singular pronoun is retained as 'him,' referring corporately to Israel/Jacob in the immediate context.
  chosen_spanish_reading: Se mantiene el singular en 'lo' y 'él', refiriéndose corporativamente a Israel/Jacob.
  alternative_spanish_readings:
  - 'pluralizar: ''los guió'' / ''con ellos'''
  - explicitar 'a Israel' en el texto
  rationale: El hebreo conserva sufijos masculinos singulares, y el contexto personifica a Israel/Jacob como un solo pueblo. La traducción mantiene esa forma gramatical sin forzar un pluralización interpretativa.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral) and §5 (consistency/documented exception)
translation_notes:
  revision_awareness: No hubo revisiones aplicadas en el paquete auditado; la versión revisada más reciente coincide con el consenso de alta concordancia y no requirió cambios.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como forma principal para el nombre divino, conforme al estándar del proyecto.
  - '''dios extranjero'' mantiene el matiz de una deidad ajena, evitando la interpretación suavizada de ''forastero'' o ''extraño'' como mero adjetivo descriptivo.'
  - El singular pronominal se preserva de manera consistente con el hebreo y con la lectura corporativa del pueblo de Israel.
