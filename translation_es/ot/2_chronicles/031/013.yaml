translation:
  language: es
  text: Jehiel, Azazías, Nahat, Asael, Jerimot, Jozabad, Eliel, Ismakías, Mahat y Benaía fueron oficiales bajo la autoridad[a] de Conanías y de Simi, su hermano, por designación[b] del rey Ezequías y de Azarías, el principal oficial de la casa de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «bajo la mano de Conanías y de Simi, su hermano».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «por la orden de» o «bajo la supervisión de» el rey Ezequías y de Azarías.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּקִידִים
  english_pob_choice: officers
  chosen_spanish: oficiales
  alternatives_spanish:
  - funcionarios
  - supervisores
  - encargados
  lexicon: HALOT
  rationale: El término describe responsables nombrados para una tarea administrativa. «Oficiales» comunica bien esa función en español moderno sin elevar indebidamente el rango.
- source_word: מִיַּד
  english_pob_choice: under the authority of
  chosen_spanish: bajo la autoridad de
  alternatives_spanish:
  - bajo la mano de
  - a cargo de
  - bajo el control de
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y apunta a subordinación o supervisión. «Bajo la autoridad de» conserva ese sentido funcional en español natural.
- source_word: אָחִיו
  english_pob_choice: his brother
  chosen_spanish: su hermano
  alternatives_spanish:
  - su hermano carnal
  - su pariente
  lexicon: HALOT
  rationale: Es una relación familiar directa; no hay base en el texto para generalizarla.
- source_word: בְּמִפְקַד
  english_pob_choice: by the appointment of
  chosen_spanish: por la designación de
  alternatives_spanish:
  - por el mandato de
  - bajo la supervisión de
  - según la comisión de
  lexicon: HALOT
  rationale: El sustantivo puede implicar nombramiento, comisión u orden. En este contexto administrativo, «por la designación de» expresa autorización formal sin introducir más de lo que el hebreo dice.
- source_word: נְגִיד
  english_pob_choice: chief officer
  chosen_spanish: principal oficial
  alternatives_spanish:
  - jefe
  - príncipe
  - líder
  lexicon: HALOT
  rationale: En un marco de administración del templo, «principal oficial» comunica mejor la función que títulos más tradicionales o ambiguos como «príncipe».
- source_word: בֵּית הָאֱלֹהִים
  english_pob_choice: the house of God
  chosen_spanish: la casa de Dios
  alternatives_spanish:
  - el templo de Dios
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «casa de Dios». Se conserva esa formulación, que también resulta clara en español.
- source_word: Proper names (יְחִיאֵל, עֲזַזְיָהוּ, נַחַת, עֲשָׂהאֵל, יְרִימוֹת, יוֹזָבָד, אֱלִיאֵל, יִסְמַכְיָהוּ, מַחַת, בְּנָיָהוּ, כּוֹנַנְיָהוּ, שִׁמְעִי, יְחִזְקִיָּהוּ, עֲזַרְיָהוּ)
  english_pob_choice: Jehiel, Azaziah, Nahath, Asahel, Jerimoth, Jozabad, Eliel, Ismakiah, Mahath, Benaiah, Conaniah, Shimei, Hezekiah, Azariah
  chosen_spanish: Jehiel, Azazías, Nahat, Asael, Jerimot, Jozabad, Eliel, Ismakías, Mahat, Benaía, Conanías, Simi, Ezequías y Azarías
  alternatives_spanish:
  - Yejiel, Azaziyáhu, Nahat, Asael, Yerimot, Yozabad, Eliel, Ismakiyahu, Mahat, Benaya, Konanías, Simei, Jejizquías, Azarías
  lexicon: N/A
  rationale: Se transliteran los nombres propios con formas bíblicas usuales en español cuando existen. «Ezequías» es la forma establecida del rey, y «Simi/Conanías/Ismakías» se ajustan mejor a la ortografía española que mantener grafías inglesas.
theological_decisions:
- issue: Jerarquía administrativa del templo
  english_pob_reading: Render administrative terms in ordinary institutional English without importing sacerdotal hierarchy beyond the text.
  chosen_spanish_reading: Traducir los términos administrativos con lenguaje institucional ordinario, sin introducir una jerarquía sacerdotal más fuerte que la del texto.
  alternative_spanish_readings:
  - Usar títulos más elevados como «príncipes» o «gobernantes»
  - Usar vocabulario eclesiástico tradicional
  rationale: El verso es una lista de funcionarios y de su cadena de autoridad. «Oficiales» y «principal oficial» mantienen ese carácter administrativo sin añadir implicaciones doctrinales o monárquicas ajenas al hebreo.
  doctrine_reference: Principio de primacía del idioma original; lectura histórica y administrativa del texto; no importar categorías eclesiales no explícitas.
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente no requirió cambios y el cotejo informó alta concordancia. Esta versión española sigue esa lectura estable, manteniendo la estructura administrativa, los nombres propios y las dos ambigüedades relevantes: מִיַּד como subordinación/autoridad y בְּמִפְקַד como designación/orden/supervisión.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando corresponde; aquí no aparece.
  - Se mantiene «casa de Dios» por fidelidad literal al hebreo.
  - Se prefieren formas bíblicas asentadas en español para nombres propios cuando existen.
  - Los términos administrativos se traducen sin cargar el texto con lenguaje eclesiástico posterior.
