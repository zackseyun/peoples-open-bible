translation:
  language: es
  text: 'Entonces Jeremías le dijo al rey Sedequías[a]: «¿En qué he pecado contra ti, contra tus siervos y contra este pueblo, que me han puesto en la casa de la prisión?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿En qué he pecado contra ti, tus siervos y este pueblo?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «Entonces» mantiene la secuencia natural en español sin perder el valor discursivo.
- source_word: יִרְמְיָהוּ
  english_pob_choice: Jeremiah
  chosen_spanish: Jeremías
  alternatives_spanish:
  - Jeremiah
  lexicon: Transliteración tradicional castellana
  rationale: En español bíblico, el nombre del profeta se expresa de forma plenamente reconocible como «Jeremías».
- source_word: הַמֶּלֶךְ צִדְקִיָּהוּ
  english_pob_choice: King Zedekiah
  chosen_spanish: el rey Sedequías
  alternatives_spanish:
  - el rey, Sedequías
  - Sedequías el rey
  lexicon: HALOT
  rationale: El hebreo lleva artículo definido; en español se conserva con «el rey» y el nombre propio sigue la forma habitual «Sedequías».
- source_word: מֶה חָטָאתִי
  english_pob_choice: How have I sinned
  chosen_spanish: ¿En qué he pecado?
  alternatives_spanish:
  - ¿Cómo he pecado?
  - ¿Qué pecado he cometido?
  lexicon: HALOT
  rationale: La pregunta hebrea con מֶה no pide una explicación moral general sino la identificación del motivo o esfera de culpa; «¿En qué he pecado?» refleja bien la construcción y suena natural en español.
- source_word: לְךָ וְלַעֲבָדֶיךָ וְלָעָם הַזֶּה
  english_pob_choice: against you, against your servants, and against this people
  chosen_spanish: contra ti, contra tus siervos y contra este pueblo
  alternatives_spanish:
  - a ti, a tus siervos y a este pueblo
  - contra ti, contra tus servidores y contra este pueblo
  lexicon: HALOT
  rationale: Con חטא, ל expresa la esfera de la ofensa; en español «contra» comunica con claridad la relación de culpa. «Siervos» se conserva por su cercanía lexical y su amplitud contextual.
- source_word: עֲבָדֶיךָ
  english_pob_choice: your servants
  chosen_spanish: tus siervos
  alternatives_spanish:
  - tus servidores
  - tus oficiales
  lexicon: HALOT
  rationale: «Siervos» mantiene la fuerza lexical básica de עבד sin desplazarlo hacia un rango administrativo más específico que el hebreo no explicita.
- source_word: הָעָם הַזֶּה
  english_pob_choice: this people
  chosen_spanish: este pueblo
  alternatives_spanish:
  - estas personas
  - el pueblo
  lexicon: HALOT
  rationale: El singular colectivo hebreo se conserva con «este pueblo», una fórmula bíblica sobria y precisa.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: para que
  alternatives_spanish:
  - porque
  - ya que
  lexicon: HALOT
  rationale: 'En esta construcción el hebreo introduce la consecuencia o finalidad percibida de la acción: Jeremías pregunta por qué lo han puesto preso. «Para que» reproduce bien el vínculo lógico en español, aunque el matiz sea de motivo percibido más que de propósito declarado.'
- source_word: נְתַתֶּם אוֹתִי
  english_pob_choice: you have put me
  chosen_spanish: me hayan puesto
  alternatives_spanish:
  - me pusieron
  - me han puesto
  lexicon: HALOT
  rationale: נָתַן con אֶל más destino funciona idiomáticamente como «poner». El subjuntivo encaja con la subordinada final explicativa introducida por «para que».
- source_word: אֶל בֵּית הַכֶּלֶא
  english_pob_choice: into the house of imprisonment
  chosen_spanish: en la casa de la prisión
  alternatives_spanish:
  - en la casa de prisión
  - en la prisión
  - en la casa de encarcelamiento
  lexicon: HALOT
  rationale: Se conserva la imagen literal «casa» + sustantivo de confinamiento, como en el hebreo, sin colapsarla del todo a «prisión». «Casa de la prisión» comunica el valor formal y suena comprensible en español bíblico.
translation_notes:
  revision_awareness: El texto inglés revisado prefirió «How have I sinned» por mayor naturalidad y precisión, y elevó בֵּית הַכֶּלֶא a «house of imprisonment». La versión española sigue esa dirección semántica, pero conserva una formulación más natural para el español («¿En qué he pecado?») y una construcción literal pero inteligible para בית הכלא («casa de la prisión»).
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usó «siervos» para עֲבָדִים, coherente con la fuerza lexical básica requerida por el proyecto.
  - Se conservó el estilo bíblico sobrio sin convertir la imagen del hebreo en una paráfrasis demasiado general.
