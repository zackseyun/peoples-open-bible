  glossary_alignment: 'Buen alineamiento con los términos del proyecto: יְהוָה → «Yahvé» correctamente; se mantiene la frase plena «el trono del reino de Yahvé». No hay conflictos con otros términos doctrinales. La única desviación relevante es lexical/contextual: בָּנַי debería representarse con mayor especificidad masculina dado el contexto dinástico.'
