translation:
  language: es
  text: Son hechos caer[a]; su propia lengua está contra ellos; todos los que los ven sacuden la cabeza[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Su lengua lo hizo tropezar sobre ellos». El hebreo del primer miembro es sintácticamente difícil, y las traducciones difieren en cómo se relacionan los pronombres. El texto principal sigue el sentido de que los impíos quedan arruinados por su propia palabra.'
    reason: alternative_reading
  - marker: b
    text: El verbo también puede traducirse «menean la cabeza», «tiemblan» o, en algunos contextos, «huyen».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּכְשִׁילוּהוּ
  english_pob_choice: They are made to stumble
  chosen_spanish: son hechos tropezar
  alternatives_spanish:
  - fueron hechos tropezar
  - se les hace tropezar
  - son derribados
  lexicon: HALOT
  rationale: El verbo causativo de כשׁל pide en español una pasiva verbal natural. 'Son hechos tropezar' conserva el matiz de ser causados a caer sin introducir más interpretación que la necesaria para una cláusula poética difícil.
- source_word: עָלֵימוֹ
  english_pob_choice: them / against them / upon them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - contra ellos
  - a ellos
  - en ellos
  lexicon: HALOT
  rationale: La preposición על con sufijo puede expresar 'sobre/contra'. En español, 'contra ellos' es posible, pero el hebreo queda mejor reflejado con una relación más abierta en la línea, y la tensión del verso se deja para la frase siguiente.
- source_word: לְשׁוֹנָם
  english_pob_choice: their tongue
  chosen_spanish: su propia lengua
  alternatives_spanish:
  - su lengua
  - sus palabras
  - su habla
  lexicon: HALOT
  rationale: Se mantiene el singular colectivo 'lengua' para conservar la imagen concreta del instrumento de habla. 'Su propia lengua' explicita que es la lengua de ellos misma la que se vuelve contra ellos, en línea con la nota inglesa.
- source_word: יִתְנֹדֲדוּ
  english_pob_choice: shake their heads
  chosen_spanish: sacuden la cabeza
  alternatives_spanish:
  - mueven la cabeza
  - niegan con la cabeza
  - tiemblan
  lexicon: HALOT
  rationale: El verbo נוד admite varios matices; aquí el gesto visible de reacción es el sentido más natural. 'Sacuden la cabeza' es una equivalencia idiomática clara en español para la reacción de burla o asombro.
- source_word: כָּל רֹאֵה בָם
  english_pob_choice: all who see them
  chosen_spanish: todos los que los ven
  alternatives_spanish:
  - todo el que los ve
  - quienes los contemplan
  - todos sus espectadores
  lexicon: HALOT
  rationale: Se conserva el alcance universal de כָּל y el participio 'los que ven'. La formulación es directa y fiel al hebreo sin perder fluidez en español.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que corrigió el primer miembro hacia una lectura pasiva/causativa y que hizo explícito que la lengua propia está contra ellos. En español se preserva esa lectura, evitando una traducción puramente activa que aplastaría la dificultad sintáctica del hebreo.
  spanish_consistency_notes:
  - Se usó 'lengua' y no 'habla' para mantener el cuerpo-imagen del hebreo.
  - Se prefirió una pasiva verbal ('son hechos tropezar') para reflejar el valor causativo del Hiphil.
  - No se introdujo 'SEÑOR' ni terminología eclesiástica no presente en el texto.
  - La nota a conserva la tensión sintáctica del primer hemistiquio sin resolverla excesivamente.
