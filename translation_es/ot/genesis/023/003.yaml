revisions:
- from: Entonces Abraham se levantó de delante de su muerta[a] y habló a los hijos de Heth, diciendo,
  to: Entonces Abraham se levantó de delante de su difunta esposa y habló a los hijos de Heth[a], diciendo,
  rationale: Se reemplaza «su muerta» por «su difunta esposa» para lograr español natural, claro y digno, manteniendo el referente contextual a Sara sin introducir cambio de sentido. Se conserva «los hijos de Heth» con nota alternativa, conforme a la prioridad de la forma hebrea.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:20:16Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'La estructura narrativa y los elementos fuente están mayormente preservados: וַיָּקָם = «se levantó», מֵעַל פְּנֵי = «de delante de», וַיְדַבֵּר אֶל = «habló a», בְּנֵי חֵת = «los hijos de Heth», y לֵאמֹר = «diciendo». Sin embargo, «su muerta» para מֵתוֹ, aunque intenta reflejar la literalidad hebrea, suena poco natural y puede distraer o confundir en español eclesial general. Dado que el rastro auditado en inglés ya justificó explicitar «wife» por naturalidad, el español debe hacer una reparación equivalente.'
  spanish_quality_summary: El borrador es claro en casi todo, pero «su muerta» resulta áspero y poco idiomático en español moderno neutral; su efecto no es dignificado sino extraño. «Su difunta esposa» o «su esposa muerta» comunican bien el referente contextual sin perder la sobriedad. El resto del verso lee con naturalidad bíblica aceptable.
  glossary_alignment: No hay términos teológicos sensibles del glosario principal en este versículo. «Heth» se conserva adecuadamente, con nota alternativa «los hititas», en línea con la preferencia por primacía de la fuente. No hay conflicto con Yahvé/Mesías/etc.
  issues:
  - severity: medium
    issue: «su muerta» es poco natural en español
    rationale: Aunque busca preservar la compacidad de מֵתוֹ, en español contemporáneo neutral suena extrañamente nominalizado y menos legible que el hebreo original. Puede interpretarse como formulación torpe más que como fidelidad formal.
  - severity: low
    issue: Desajuste con la justificación auditada en inglés sobre explicitación del referente
    rationale: El historial inglés ya determinó que explicitar «wife» mejoraba la naturalidad sin traicionar el contexto. Conviene reflejar esa misma resolución en español para consistencia editorial.
  revised_spanish_text: Entonces Abraham se levantó de delante de su difunta esposa y habló a los hijos de Heth[a], diciendo,
  revised_footnotes:
  - marker: a
    text: O «los hititas»; hebreo, «los hijos de Heth».
    reason: lexical_alternative
  revision_rationale: Se reemplaza «su muerta» por «su difunta esposa» para lograr español natural, claro y digno, manteniendo el referente contextual a Sara sin introducir cambio de sentido. Se conserva «los hijos de Heth» con nota alternativa, conforme a la prioridad de la forma hebrea.
