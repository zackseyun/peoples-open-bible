review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del hebreo: edad al acceder al trono, duración del reinado, eufemismo para la muerte, sepultura en la ciudad de David y exclusión de los sepulcros reales. Sin embargo, en בְּלֹא חֶמְדָּה el texto principal español se aparta de la decisión principal auditada en inglés (''with no regret'') al optar por ''sin ser deseado'', que corresponde más bien a la alternativa literal que debía ir en nota. Además, la nota actual no refleja con precisión la alternativa inglesa documentada.'
  spanish_quality_summary: El español es generalmente claro y digno. 'Tenía treinta y dos años cuando comenzó a reinar' y 'lo sepultaron' suenan naturales. No obstante, 'Luego se fue sin ser deseado' resulta extraño e idiomáticamente poco natural en español bíblico contemporáneo; puede sugerir falta de deseo previo más que ausencia de duelo tras su muerte. 'Ciudad de David' funciona mejor en minúscula inicial en este contexto narrativo.
  glossary_alignment: No hay términos del glosario mayor en juego como Yahvé, Mesías o esclavo. Las decisiones léxicas principales están mayormente alineadas, salvo que el español principal debe seguir la elección semántica del POB inglés para בְּלֹא חֶמְדָּה ('sin pesar' / 'sin que lo lamentaran') y reservar la literalidad más rígida para nota.
  issues:
  - severity: medium
    issue: La frase principal 'sin ser deseado' no reproduce la decisión principal auditada del POB inglés.
    rationale: El inglés eligió 'with no regret' como sentido contextual principal, dejando la literalidad 'without being desired' en nota. En español, la redacción principal debería comunicar ausencia de pesar o de lamento, no simplemente 'no deseado'.
  - severity: medium
    issue: La nota al pie actual no corresponde exactamente a la alternativa documentada.
    rationale: La nota dice 'sin que lo echaran de menos', pero la alternativa inglesa auditada es 'he went away without being desired', es decir, una preservación más literal de la expresión hebrea. La nota española debe reflejar esa relación con mayor precisión.
  - severity: low
    issue: Capitalización de 'Ciudad de David'.
    rationale: En español bíblico corriente, 'ciudad de David' suele escribirse en minúscula dentro de la oración, salvo en tratamientos toponímicos especiales. La minúscula mejora la naturalidad sin perder referencia.
  revised_spanish_text: Tenía treinta y dos años cuando comenzó a reinar[a], y reinó ocho años en Jerusalén. Luego se fue sin pesar, y lo sepultaron en la ciudad de David, pero no en los sepulcros de los reyes.
  revised_footnotes:
  - marker: a
    text: 'O: «se fue sin ser deseado», preservando el sentido más literal de la expresión hebrea.'
    reason: lexical_alternative
  revision_rationale: Se ajusta בְּלֹא חֶמְדָּה en el texto principal a 'sin pesar' para seguir la decisión contextual del POB inglés ('with no regret') y mejorar la naturalidad en español. La alternativa más literal se conserva en nota, como en la auditoría inglesa. También se normaliza 'ciudad de David' en minúscula para un español más natural.
