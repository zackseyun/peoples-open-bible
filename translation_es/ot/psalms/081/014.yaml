translation:
  language: es
  text: ¡Si tan solo[a] mi pueblo me escuchara, si Israel anduviera en mis caminos!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¡Oh, que mi pueblo me escuchara, que Israel anduviera en mis caminos!»'
    reason: alternative_reading
lexical_decisions:
- source_word: לוּ
  english_pob_choice: Oh, that
  chosen_spanish: ¡Oh[a], que
  alternatives_spanish:
  - Si tan solo
  - Ojalá que
  lexicon: HALOT
  rationale: לוּ expresa aquí un deseo lamentoso u optativo, no una condición simple. En español, «¡Oh, que…!» conserva mejor el tono emotivo del hebreo que una construcción condicional.
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mi gente
  - mi pueblo, que me pertenece
  lexicon: HALOT
  rationale: 'El sufijo de primera persona singular señala posesión relacional: «mi pueblo» comunica la relación de pacto de forma natural y fiel.'
- source_word: שֹׁמֵעַ לִי
  english_pob_choice: would listen to me
  chosen_spanish: me escuchara
  alternatives_spanish:
  - oyera mi voz
  - estuviera escuchándome
  lexicon: HALOT
  rationale: 'שׁמע con ל indica más que oír: implica atender con obediencia. «Me escuchara» preserva ese valor de atención obediente sin volverse mecánico.'
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva el nombre propio estándar, como en el inglés POB, sin sustituirlo por una paráfrasis.
- source_word: בִּדְרָכַי
  english_pob_choice: in my ways
  chosen_spanish: en mis caminos
  alternatives_spanish:
  - por mis caminos
  - según mis caminos
  lexicon: HALOT
  rationale: דֶּרֶךְ en plural suele referirse a la conducta o modo de vida. «En mis caminos» mantiene la metáfora bíblica y su sentido ético-covenantal.
- source_word: יְהַלֵּכוּ
  english_pob_choice: would walk
  chosen_spanish: anduviera
  alternatives_spanish:
  - caminara
  - estuviera andando
  lexicon: HALOT
  rationale: El imperfecto piel expresa una conducta deseada y sostenida. «Anduviera» refleja el valor aspectual y conserva la imagen de vida conforme a un camino.
theological_decisions:
- issue: Deseo optativo frente a lectura condicional
  english_pob_reading: 'The verse is rendered as a divine lament/wish: ''Oh, that ... would ...'''
  chosen_spanish_reading: 'El versículo se traduce como un lamento/deseo divino: «¡Oh, que ...!»'
  alternative_spanish_readings:
  - Si mi pueblo me escuchara, si Israel anduviera en mis caminos
  - Si tan solo mi pueblo me escuchara
  rationale: Aunque לוּ puede adquirir matiz condicional en otros contextos, aquí el hebreo expresa el anhelo de Dios ante la desobediencia de Israel. Mantener el modo optativo preserva la fuerza retórica y la tensión teológica del texto.
  doctrine_reference: 'Translation philosophy #3: preserve theological tension rather than resolve it; optimal equivalence favors the plain sense of the Hebrew here.'
translation_notes:
  revision_awareness: 'El texto sigue el pasaje hebreo WLC y coincide con el audit trail inglés: se mantiene el valor optativo de לוּ, el sentido obediencial de שׁמע לִי y la metáfora conductual de דֶּרֶךְ.'
  spanish_consistency_notes:
  - Se prefiere «Yahvé» para el nombre divino cuando aparezca; en este versículo no está explícito en el texto hebreo.
  - «Escuchara» conserva el matiz de obediencia implícito en שׁמע לִי mejor que un simple «oyera».
  - «Anduviera» evita una lectura meramente física de caminar y mantiene la imagen bíblica de conducta recta.
