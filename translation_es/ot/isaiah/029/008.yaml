base_translation:
  language: en
  yaml_path: translation/ot/isaiah/029/008.yaml
  text: And it will be as when a hungry man dreams[a], and behold, he is eating, but he wakes and his appetite is empty; and as when a thirsty man dreams, and behold, he is drinking, but he wakes, and behold, he is faint and his appetite craves[b]. So will be the multitude of all the nations that wage war against Mount Zion.
  footnotes:
  - marker: a
    text: Or 'his soul is empty.' Hebrew נֶפֶשׁ often means 'soul,' but here likely refers to the person's appetite or inner craving in the context of hunger and thirst.
    reason: lexical_alternative
  - marker: b
    text: Or 'his soul craves' / 'his throat is parched.' The Hebrew expression emphasizes continuing desire after waking, despite the dream of drinking.
    reason: lexical_alternative
