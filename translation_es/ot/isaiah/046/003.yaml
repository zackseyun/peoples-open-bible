review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del hebreo: imperativo plural dirigido a la casa de Jacob y al remanente de Israel, con los dos participios pasivos y la imagen del cuidado divino desde los inicios de la vida. También preserva correctamente «remanente». Sin embargo, en la segunda cláusula participial omite la agencia explícita de מִנִּי (''por mí''), presente tanto en el hebreo como en la justificación inglesa. Además, «cargados desde el vientre» en español suena torpe y puede evocar más bien una carga pesada que el portar cuidadoso de Dios.'
  spanish_quality_summary: El texto es mayormente legible y digno, pero la secuencia «llevados por mí ... cargados desde el vientre» resulta poco natural y pierde paralelismo claro. «Escúchenme» es adecuado, aunque sin acento gráfico en alternativas internas; eso no afecta el texto principal. El ajuste mínimo necesario es explicitar también «por mí» en la segunda cláusula y sustituir «cargados» por una forma más natural como «sostenidos», que conserva la idea de portar/cuidar sin la connotación áspera de «cargados».
  glossary_alignment: Alinea bien con la terminología del proyecto en «remanente» y con la lectura teológica del contraste entre ídolos cargados y Dios que lleva a su pueblo. La principal desalineación es no mantener de forma consistente la agencia divina documentada para ambos participios. No hay conflictos con términos como Yahvé, Mesías, espíritu, etc., en este versículo.
  issues:
  - severity: high
    issue: Falta la agencia explícita en la segunda cláusula participial
    rationale: 'El hebreo repite מִנִּי con ambos participios: הָעֲמֻסִים מִנִּי בֶטֶן / הַנְּשֻׂאִים מִנִּי רָחַם. El borrador solo traduce «por mí» en la primera y la omite en la segunda, debilitando un rasgo sintáctico y teológico central del versículo.'
  - severity: medium
    issue: «Cargados desde el vientre» suena poco natural y semánticamente áspero en español
    rationale: Aunque נשׂא puede admitir la idea de cargar/portar, en este contexto de cuidado divino «cargados» puede sonar impersonal o pesado. «Sostenidos» o «llevados» comunican mejor en español la acción protectora sin perder la pasividad.
  - severity: low
    issue: La nota al pie explica bien el paralelismo, pero puede afinarse para corresponder exactamente al texto revisado
    rationale: Si el texto mantiene «desde el nacimiento» y «desde el vientre», la nota debe seguir reflejando que son dos expresiones relacionadas, no estrictamente equivalentes léxicas.
  revised_spanish_text: Escúchenme[a], casa de Jacob, y todo el remanente de la casa de Israel, los que han sido llevados por mí desde el nacimiento, sostenidos por mí desde el vientre.
  revised_footnotes:
