    issue: La nota [a] está colocada en «engrandecer», pero la ambigüedad léxica principal documentada por la POB inglesa corresponde a שֹׁרְרוּ («han cantado / han visto / han contemplado»).
    rationale: Esto desalinea la evidencia fuente y la auditoría inglesa. La nota debe anclarse en el verbo de la cláusula relativa, no en «engrandecer».
  - severity: low
