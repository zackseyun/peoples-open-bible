    text: 'Traditional English: “into the lions’ den.”'
    reason: lexical_alternative
  - marker: b
    text: Or, “may he deliver you.” The Aramaic can be taken by some as expressing a wish, though the main text follows the more direct declarative sense, “he will deliver you.”
