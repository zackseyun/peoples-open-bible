translation:
  language: es
  text: de modo que los que fueron hostiles en el pasado y son hostiles ahora, después de descender violentamente al Hades[a] en un solo día, nos aseguren de allí en adelante, para siempre, una situación estable y sin perturbación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el sepulcro» o «el inframundo» para «Hades». El griego nombra el ámbito de los muertos, no específicamente el lugar del castigo final.
    reason: lexical_alternative
lexical_decisions:
- source_word: δυσμενεῖς
  english_pob_choice: hostile
  chosen_spanish: hostiles
  alternatives_spanish:
  - enemigos
  - mal dispuestos
  - malévolos
  lexicon: LSJ
  rationale: El adjetivo expresa enemistad o mala disposición activa; «hostiles» conserva ese sentido sin forzar el texto hacia una categoría más técnica como «enemigos».
- source_word: ἐν ἡμέρᾳ μιᾷ
  english_pob_choice: in a single day
  chosen_spanish: en un solo día
  alternatives_spanish:
  - en un día
  - dentro de un solo día
  lexicon: LSJ
  rationale: La expresión subraya la rapidez y concentración del juicio; «en un solo día» es natural en español y conserva esa fuerza.
- source_word: βιαίως
  english_pob_choice: violently
  chosen_spanish: violentamente
  alternatives_spanish:
  - por la fuerza
  - forzosamente
  lexicon: LSJ
  rationale: El adverbio señala un descenso brusco y violento; «violentamente» reproduce bien esa intensidad.
- source_word: εἰς τὸν ἅδην κατελθόντες
  english_pob_choice: after going down ... to Hades
  chosen_spanish: después de descender ... al Hades
  alternatives_spanish:
  - después de bajar ... al sepulcro
  - después de descender ... al inframundo
  lexicon: LSJ
  rationale: El griego nombra explícitamente ᾅδης; se conserva «Hades» para respetar la especificidad del término y la distinción teológica/lexical indicada por el POB en inglés.
- source_word: εἰς τὸν μετέπειτα χρόνον
  english_pob_choice: for all time afterward
  chosen_spanish: para siempre
  alternatives_spanish:
  - para el tiempo venidero
  - en adelante
  lexicon: LSJ
  rationale: El contexto es un deseo de seguridad permanente; «para siempre» comunica de forma natural la duración continua que el griego exige en este pasaje.
- source_word: εὐσταθῆ
  english_pob_choice: stable
  chosen_spanish: estables
  alternatives_spanish:
  - firmes
  - seguras
  - bien ordenadas
  lexicon: LSJ
  rationale: Describe condiciones asentadas y seguras; «estables» encaja con el sustantivo implícito «asuntos» y mantiene la idea de firmeza.
- source_word: ἀτάραχα
  english_pob_choice: undisturbed
  chosen_spanish: tranquilos
  alternatives_spanish:
  - sin turbación
  - sin disturbio
  - no perturbados
  lexicon: LSJ
  rationale: El término apunta a ausencia de agitación o tumulto; «tranquilos» es idiomático en español y conserva la serenidad del estado descrito.
- source_word: παρέχωσιν ἡμῖν ... τὰ πράγματα
  english_pob_choice: provide us with ... affairs
  chosen_spanish: nos proporcionen ... asuntos
  alternatives_spanish:
  - nos concedan ... circunstancias
  - nos den ... la situación
  lexicon: LSJ
  rationale: τὰ πράγματα aquí remite al conjunto de circunstancias o asuntos públicos; «asuntos» mantiene la concreción del griego sin imponer una paráfrasis demasiado libre.
- source_word: διὰ τέλους
  english_pob_choice: for all time
  chosen_spanish: para siempre
  alternatives_spanish:
  - hasta el fin
  - continuamente
  lexicon: LSJ
  rationale: La frase expresa continuidad duradera; «para siempre» es la forma más clara y natural en español en este contexto.
theological_decisions:
- issue: Renderización de ᾅδης en un contexto griego deuterocanónico
  english_pob_reading: Hades
  chosen_spanish_reading: Hades
  alternative_spanish_readings:
  - el sepulcro
  - el inframundo
  - el lugar de los muertos
  rationale: Se conserva el nombre griego para no diluir la especificidad del texto ni importar asociaciones doctrinales posteriores de «infierno». La nota en inglés del POB sobre el ámbito de los muertos queda reflejada por la simple transliteración en español.
  doctrine_reference: Primacía del idioma original; preservar tensiones léxicas y teológicas sin resolverlas de antemano
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB en inglés, que cambió «before» por «in the past» para πάλαι. Por eso se traduce «en el pasado», no «antes». También se mantuvo la lectura establecida de Hades y el cierre durativo del ruego.
  spanish_consistency_notes:
  - Se emplea «Yahvé» por defecto cuando corresponda, pero este versículo no contiene el nombre divino.
  - Se conserva «Hades» por ser un término técnico del griego; no se sustituye por «infierno».
  - «Hostiles» reproduce la fuerza adjetival de δυσμενεῖς sin elevarlo innecesariamente a «enemigos».
  - La construcción «asuntos estables y tranquilos» sigue de cerca τὰ πράγματα εὐσταθῆ καὶ ἀτάραχα sin sonar calcada en español.
