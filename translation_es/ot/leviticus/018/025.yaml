  text: וַ/תִּטְמָ֣א הָ/אָ֔רֶץ וָ/אֶפְקֹ֥ד עֲוֺנָ֖/הּ עָלֶ֑י/הָ וַ/תָּקִ֥א הָ/אָ֖רֶץ אֶת יֹשְׁבֶֽי/הָ־׃
base_translation:
  language: en
  yaml_path: translation/ot/leviticus/018/025.yaml
  text: So the land became unclean[a], and I punished its iniquity upon it[c][b], and the land vomited out its inhabitants.
  footnotes:
  - marker: a
    text: Or 'was defiled.' The Hebrew verb can be rendered either 'became unclean' or 'was defiled.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'I visited its iniquity upon it,' an idiom for calling guilt to account in judgment.
    reason: lexical_alternative
  - marker: c
    text: Or 'spewed out.' The Hebrew keeps the graphic image of vomiting to portray the land's expulsion of its inhabitants because of defilement.
    reason: lexical_alternative
