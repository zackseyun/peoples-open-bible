translation:
  language: es
  text: Crucen a Calné[b] y vean; y de allí vayan a Hamat la grande; luego bajen a Gat de los filisteos. ¿Son mejores[a] que estos reinos? ¿O es su territorio mayor que el de ustedes?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Son ustedes mejores que estos reinos?». El adjetivo hebreo «mejores» no tiene sujeto explícito, por lo que la comparación puede entenderse ya sea de las ciudades o reinos mencionados, o de las personas a quienes se dirige el profeta.'
    reason: alternative_reading
  - marker: b
    text: Calné es un nombre de lugar; algunos la identifican con una ciudad del norte de Siria o de Mesopotamia, pero su identificación es incierta.
    reason: cultural_note
lexical_decisions:
- source_word: עִבְרוּ
  english_pob_choice: Cross over
  chosen_spanish: Pásen[a]
  alternatives_spanish:
  - Crucen
  - Pasen
  lexicon: HALOT
  rationale: El imperativo plural de עבר pide un movimiento de paso o cruce. En español, «pasen» mantiene la idea de atravesar y suena natural; el plural respetado conserva el tono exhortativo dirigido a un grupo.
- source_word: כַֽלְנֵה
  english_pob_choice: Calneh
  chosen_spanish: Calné[a]
  alternatives_spanish:
  - Calneh
  - Kalné
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se usa una forma española legible y cercana al hebreo; la nota advierte la incertidumbre identificatoria sin fijar una etimología artificial.
- source_word: וּרְאוּ
  english_pob_choice: and see
  chosen_spanish: y vean
  alternatives_spanish:
  - y miren
  - y vean allí
  lexicon: HALOT
  rationale: ראה en imperativo se rinde de forma directa con «vean». Es la invitación retórica a observar esos lugares, no solo a desplazarse.
- source_word: וּלְכוּ מִשָּׁם
  english_pob_choice: and from there go
  chosen_spanish: y de allí vayan
  alternatives_spanish:
  - y desde allí vayan
  - y luego vayan de allí
  lexicon: HALOT
  rationale: La secuencia con וּ + imperativo se traduce de manera coordinada con «y». «De allí» conserva el adverbio locativo y el avance por etapas del recorrido.
- source_word: חֲמַת רַבָּה
  english_pob_choice: Hamath the great
  chosen_spanish: Hamat la grande
  alternatives_spanish:
  - Hamat la grandeza
  - Hamat la Grande
  - Gran Hamat
  lexicon: HALOT
  rationale: רַבָּה funciona aquí como epíteto de la ciudad, no como superlativo libre. «La grande» reproduce con sobriedad el valor del hebreo y mantiene la referencia a la ciudad conocida.
- source_word: וּרְד֣וּ
  english_pob_choice: then go down
  chosen_spanish: luego bajen
  alternatives_spanish:
  - y bajen
  - desciendan
  lexicon: HALOT
  rationale: ירד en este contexto geográfico se expresa naturalmente con «bajen». «Luego» marca la progresión del itinerario sin añadir contenido extra.
- source_word: גַת פְּלִשְׁתִּים
  english_pob_choice: Gath of the Philistines
  chosen_spanish: Gat de los filisteos
  alternatives_spanish:
  - Gat filistea
  - Gat de Filistea
  lexicon: HALOT
  rationale: La construcción de genitivo se conserva con «de los filisteos», manteniendo la relación étnica/territorial. «Gat» sigue la transliteración española estándar del nombre.
- source_word: הֲטוֹבִים
  english_pob_choice: Are they better
  chosen_spanish: ¿Son ellos mejores
  alternatives_spanish:
  - ¿Son mejores
  - ¿Son ustedes mejores
  lexicon: HALOT
  rationale: El adjetivo plural masculino no expresa sujeto explícito. Se hace explícito «ellos» como referencia inmediata a las ciudades/reinos mencionados, preservando la ambigüedad interpretativa sin imponer una lectura homilética.
- source_word: הַמַּמְלָכ֣וֹת הָאֵ֔לֶּה
  english_pob_choice: these kingdoms
  chosen_spanish: estos reinos
  alternatives_spanish:
  - estos reinos de aquí
  - estos dominios
  lexicon: HALOT
  rationale: ממלכות alude a entidades reales/políticas; «reinos» comunica mejor esa dimensión que «ciudades». El demostrativo plural se refleja con «estos».
- source_word: אִם
  english_pob_choice: Or
  chosen_spanish: ¿O
  alternatives_spanish:
  - o
  - o bien
  lexicon: HALOT
  rationale: En la segunda rama de la pregunta retórica, אִם introduce alternativa. En español, «¿O» es la forma natural para sostener la comparación binaria.
- source_word: רַב גְּבוּלָם מִגְּבֻלְכֶם
  english_pob_choice: is their territory greater than your territory
  chosen_spanish: es su territorio mayor que el de ustedes
  alternatives_spanish:
  - es su territorio más extenso que el de ustedes
  - es su frontera mayor que la de ustedes
  lexicon: HALOT
  rationale: גְּבוּל puede ser frontera o territorio; en este contexto comparativo político, «territorio» comunica la extensión del dominio mejor que una línea fronteriza. «El de ustedes» evita una repetición pesada y mantiene la segunda persona plural implícita.
theological_decisions:
- issue: Sujeto implícito en la comparación «¿Son ellos mejores...? / ¿O es su territorio mayor...?
  english_pob_reading: The Hebrew adjective 'better' has no explicit subject, so the comparison may be understood either of the named cities/kingdoms or of the people being addressed.
  chosen_spanish_reading: Se mantiene el sujeto explícito «ellos» para referirlo a las ciudades/reinos mencionados, pero la formulación no clausura por completo la posibilidad de que la comparación alcance a los oyentes en el trasfondo.
  alternative_spanish_readings:
  - ¿Son ustedes mejores que estos reinos?
  - ¿Son esas ciudades mejores que estos reinos?
  rationale: El hebreo deja el sujeto del adjetivo en suspenso. La traducción conserva esa tensión interpretativa, evitando resolverla de manera dogmática. Así se respeta la ambigüedad retórica del profeta y la nota explica la alternativa.
  doctrine_reference: Ambigüedad sintáctica del hebreo; no implica una afirmación doctrinal independiente.
translation_notes:
  revision_awareness: La versión inglesa final añadió explícitamente el «and» antes de «from there go to Hamath the great», reflejando con mayor plenitud la conjunción del hebreo. La redacción española sigue esa secuencia coordinada con «y de allí vayan». También se respetó el ajuste del pasaje en forma de recorrido imperativo y la lectura comparativa abierta del par de preguntas finales.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - «Mesías/Cristo» no aparece en el pasaje.
  - 'Se mantiene una terminología geográfica/política consistente: «reinos», «territorio», «Gat», «Hamat», «Calné».'
  - El tono es formal y público, sin arcaísmos innecesarios, pero con suficiente elevación para lectura eclesial.
