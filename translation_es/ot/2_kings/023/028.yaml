translation:
  language: es
  text: Ahora bien, el resto de los hechos de Josías, y todo lo que hizo, ¿no están escritos[a] en el libro de las Crónicas[b] de los reyes de Judá?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «registrados» para «escritos»; el participio pasivo hebreo significa «escritos», pero en este contexto archivístico también puede entenderse como «registrados».
    reason: lexical_alternative
  - marker: b
    text: «El libro de las Crónicas» se refiere a una fuente de registro real citada en Reyes, no necesariamente a los libros bíblicos de 1–2 Crónicas en su forma canónica final.
    reason: cross_reference
lexical_decisions:
- source_word: וְיֶתֶר
  english_pob_choice: the rest of
  chosen_spanish: el resto de
  alternatives_spanish:
  - lo restante de
  - el remanente de
  lexicon: HALOT
  rationale: En esta fórmula historiográfica, יֶתֶר introduce lo que queda por mencionar de la vida o reinado del rey. «El resto de» conserva la idea de lo que queda y suena natural en español.
- source_word: דִּבְרֵי
  english_pob_choice: acts
  chosen_spanish: los hechos
  alternatives_spanish:
  - las palabras
  - los asuntos
  - las acciones
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «palabras/asuntos», en este resumen real la referencia es a las acciones registradas de Josías. «Hechos» comunica bien el valor historiográfico sin perder amplitud semántica.
- source_word: וְכָל אֲשֶׁר עָשָׂה
  english_pob_choice: and all that he did
  chosen_spanish: y todo lo que hizo
  alternatives_spanish:
  - y todo lo que realizó
  - y todo lo que obró
  lexicon: HALOT
  rationale: La construcción es directa y resume de manera global las obras del rey. «Hizo» mantiene la sencillez y la amplitud del hebreo עשה.
- source_word: הֲלֹא הֵם כְּתוּבִים
  english_pob_choice: are they not written
  chosen_spanish: ¿no está escrito?
  alternatives_spanish:
  - ¿no están escritos?
  - ¿acaso no se escribió?
  lexicon: HALOT
  rationale: El hebreo usa un plural («ellos») con participio pasivo, pero en español el antecedente conceptual es el conjunto de datos/registro. Se opta por una formulación natural y retórica en singular impersonal, sin perder la pregunta esperada como respuesta afirmativa. La alternativa plural es posible si se quisiera enfatizar el sujeto implícito plural.
- source_word: עַל סֵפֶר
  english_pob_choice: in the Book
  chosen_spanish: en el libro
  alternatives_spanish:
  - en el rollo
  - sobre el libro
  lexicon: HALOT
  rationale: Aunque עַל es literalmente «sobre/upon», en esta fórmula archivística el sentido idiomático español es «en». «Libro» reproduce el valor convencional de סֵפֶר en este contexto.
- source_word: סֵפֶר דִּבְרֵי הַיָּמִים
  english_pob_choice: the Book of the Chronicles
  chosen_spanish: el libro de las Crónicas
  alternatives_spanish:
  - el libro de los hechos de los días
  - el libro del registro de los días
  lexicon: HALOT
  rationale: La expresión corresponde al título del registro real citado en Reyes. «Crónicas» es la equivalencia estable en español para este tipo de título histórico, mientras que las alternativas conservan de manera más literal la imagen de «hechos/días».
- source_word: לְמַלְכֵי יְהוּדָה
  english_pob_choice: of the Kings of Judah
  chosen_spanish: de los reyes de Judá
  alternatives_spanish:
  - para los reyes de Judá
  - concerniente a los reyes de Judá
  lexicon: HALOT
  rationale: La preposición ל forma parte del título de la fuente citada; en español se expresa de forma natural con «de». Se mantiene «reyes de Judá» como designación histórica del archivo real.
theological_decisions:
- issue: Referencia al libro citado sin confundirlo automáticamente con 1–2 Crónicas canónicas
  english_pob_reading: '''Book of the Chronicles'' refers to a royal record source cited in Kings, not necessarily the biblical books of 1–2 Chronicles in their final canonical form.'
  chosen_spanish_reading: «el libro de las Crónicas» se entiende como el registro real citado en Reyes, no necesariamente como los libros canónicos de 1–2 Crónicas en su forma final.
  alternative_spanish_readings:
  - «el libro de las Crónicas» como título bíblico canónico
  - «el libro histórico de Crónicas»
  rationale: 'Se conserva la cautela del aparato inglés: el hebreo alude a una fuente archivística real. En español, «Crónicas» puede sonar inmediatamente al libro canónico; por eso conviene dejar implícita, en la nota, la identidad de fuente histórica y no forzar una identificación canónica automática.'
  doctrine_reference: Historiografía bíblica y fuente citada en el libro de Reyes
translation_notes:
  revision_awareness: El inglés POB ya mostró alta conformidad con la fuente y no requirió cambios. La versión española mantiene el valor formular y la cautela sobre la fuente archivística citada, sin introducir ampliaciones interpretativas.
  spanish_consistency_notes:
  - Se usa «Yahvé» no porque aparezca aquí explícitamente, sino como terminología estándar del proyecto cuando corresponda; este versículo no lo contiene.
  - Se prefirió «hechos» para דִּבְרֵי en un resumen real, en lugar de «palabras», por ajuste al género historiográfico.
  - Se optó por una pregunta retórica natural en español; el hebreo plural implícito en הֵם queda reflejado por el contenido del antecedente.
  - Se mantuvo «Crónicas» como título establecido, pero la nota evita confundir la fuente citada con el libro canónico final.
