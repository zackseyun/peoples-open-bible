  text: 'And now[a], our God—the great, mighty, and fearsome God, who keeps the covenant and steadfast love—do not let all the hardship that has come upon us seem small before you: upon our kings, our officials, our priests, our prophets, our fathers[b], and all your people, from the days of the kings of Assyria until this day.'
  footnotes:
