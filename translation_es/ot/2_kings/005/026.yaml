revisions:
- from: 'Pero él le dijo: “¿No iba mi corazón[a] cuando aquel hombre se volvió desde su carro para encontrarte? ¿Es este el tiempo para tomar el plata, y para tomar vestidos, y olivares y viñas, y ovejas y ganado[b], y esclavos y esclavas?”'
  to: 'Pero él le dijo: “¿No fue mi corazón[a] cuando aquel hombre se volvió de su carro para encontrarte? ¿Es este el tiempo para tomar la plata, y para tomar vestidos, y olivares y viñas, y ovejas y ganado, y siervos y siervas[b]?”'
  rationale: Se corrige la gramática española (‘la plata’), se mejora la naturalidad de la relación espacial (‘de su carro’), se ajusta el tiempo verbal para un español más idiomático conservando el modismo hebreo (‘fue mi corazón’), y se realinea el par עֲבָדִים וּשְׁפָחוֹת con la decisión principal auditada del POB inglés usando ‘siervos y siervas’ en el texto y ‘esclavos y esclavas’ como alternativa en nota. También se repara la nota b para que no duplique inválidamente el texto principal.
