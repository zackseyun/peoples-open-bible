revisions:
- from: De todas sus ofrendas levantarán[a] toda ofrenda de Yahvé; de todo su mejor[b], su porción santa de ello.
  to: De todos sus dones ofrecerán[a] toda ofrenda de Yahvé; de toda su mejor parte[b], su porción santa[c] de ella.
  rationale: Se corrige la frase para reflejar mejor el sentido del hebreo y la revisión inglesa auditada, y para sonar natural en español. «Dones» evita duplicar «ofrenda» y representa bien מַתְּנֹתֵיכֶם; «ofrecerán» sigue la revisión POB de תריםו; «mejor parte» explicita el valor idiomático de חלבו; «de ella» reemplaza el poco natural «de ello». Se añade una nota breve para la alternativa de «porción consagrada», ya preservada en el rastro inglés.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:32:56Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta la estructura general del hebreo: origen distributivo («de todas»), referencia a las dádivas/ofrendas, la ofrenda para Yahvé, la idea de la parte mejor, y la porción santa tomada de ella. Sin embargo, varias elecciones no preservan bien el sentido ni la naturalidad: «sus ofrendas» cambia la 2.ª persona a 3.ª; «levantarán» es menos fiel al inglés POB revisado y suena poco natural aquí; «su mejor» no expresa claramente «su mejor parte»; y «de ello» es torpe en español para este referente.'
  spanish_quality_summary: La redacción actual suena rígida y en puntos poco idiomática. «De todas sus ofrendas levantarán...» y «de todo su mejor... de ello» resultan extraños para un lector hispano. Una reparación menor puede conservar el contenido cultual y mejorar mucho la legibilidad con «De todos sus dones ofrecerán...» y «de toda su mejor parte, su porción santa de ella».
  glossary_alignment: Alinea bien «Yahvé» con la norma del proyecto. «Ofrenda» para תְּרוּמָה es aceptable. Para מַתְּנֹתֵיכֶם, «dones» refleja mejor «gifts» que «ofrendas», evitando duplicación inmediata con «ofrenda de Yahvé». Para חֶלֶב, en español conviene explicitar «mejor parte» en vez de «su mejor».
  issues:
  - severity: high
    issue: Cambio de persona en «sus ofrendas»
    rationale: El hebreo tiene sufijo de 2.ª persona plural («vuestros/ustedes»), y el borrador usa 3.ª persona posesiva. En español latinoamericano neutral, «sus» puede servir para «ustedes», pero aquí genera ambigüedad y además choca con el resto del versículo. Conviene explicitar una forma verbal/posesiva coherente.
  - severity: medium
    issue: «levantarán» suena poco natural y desalineado con la revisión POB
    rationale: Aunque תריםו conserva la imagen de alzar, el English POB audit trail revisó a «offer». En español bíblico natural, «ofrecerán» comunica mejor la acción cultual sin perder fidelidad general; la imagen técnica puede preservarse en nota.
  - severity: high
    issue: «su mejor» es gramatical y semánticamente deficiente
    rationale: No expresa claramente el sustantivo implícito de חלבו en este contexto. «Su mejor parte» o «su parte más escogida» sí transmiten la idea idiomática de la porción mejor.
  - severity: medium
    issue: «de ello» es poco idiomático
    rationale: Para un antecedente como «porción/ofrenda», «de ella» o la reestructuración de la frase resulta mucho más natural en español. «Ello» suena abstracto y forzado.
  - severity: low
    issue: Repetición de «ofrendas / ofrenda»
    rationale: No es un error de fidelidad, pero «dones ... ofrenda» evita cacofonía y refleja mejor la distinción entre מתנות y תרומה.
  revised_spanish_text: De todos sus dones ofrecerán[a] toda ofrenda de Yahvé; de toda su mejor parte[b], su porción santa[c] de ella.
  revised_footnotes:
  - marker: a
    text: O «elevarán»; el verbo hebreo conserva la imagen ritual de alzar una porción como contribución sagrada.
    reason: lexical_alternative
  - marker: b
    text: O «su grasa», es decir, su porción más escogida; aquí el hebreo puede referirse a la parte mejor o más rica de la ofrenda.
    reason: lexical_alternative
  - marker: c
    text: O «su porción consagrada».
    reason: lexical_alternative
  revision_rationale: Se corrige la frase para reflejar mejor el sentido del hebreo y la revisión inglesa auditada, y para sonar natural en español. «Dones» evita duplicar «ofrenda» y representa bien מַתְּנֹתֵיכֶם; «ofrecerán» sigue la revisión POB de תריםו; «mejor parte» explicita el valor idiomático de חלבו; «de ella» reemplaza el poco natural «de ello». Se añade una nota breve para la alternativa de «porción consagrada», ya preservada en el rastro inglés.
