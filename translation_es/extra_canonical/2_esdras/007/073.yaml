base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/007/073.yaml
  text: They have defrauded her whom they received. And what will they have to say in the judgment[a], or how will they answer in the last times?
  footnotes:
  - marker: a
    text: Or 'What then'.
    reason: previous_rendering
  revision_pass:
