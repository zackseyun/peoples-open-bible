translation:
  language: es
  text: Ahora, por tanto, la espada no se apartará jamás de tu casa[a], porque me has despreciado[b] y has tomado la mujer de Urías el hitita para ser tu esposa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de tu hogar» o «de tu dinastía»; el hebreo «casa» puede abarcar la familia y la línea real.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «me has despreciado»; la ofensa contra Urías y su mujer se presenta como desprecio contra Dios mismo.
    reason: cross_reference
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: Now therefore
  chosen_spanish: Ahora, por tanto
  alternatives_spanish:
  - Y ahora
  - Ahora
  lexicon: HALOT
  rationale: La expresión hebrea introduce tanto continuidad temporal como conclusión inferida; «Ahora, por tanto» conserva ese matiz inferencial de juicio consecuente sin sonar rígido en español.
- source_word: לֹא תָסוּר
  english_pob_choice: shall never depart
  chosen_spanish: no se apartará jamás
  alternatives_spanish:
  - no se apartará
  - nunca se apartará
  lexicon: HALOT
  rationale: Con espada como sujeto, סור transmite salir o apartarse. «No se apartará jamás» reproduce la permanencia duradera del juicio y suena natural en español.
- source_word: חֶרֶב
  english_pob_choice: the sword
  chosen_spanish: la espada
  alternatives_spanish:
  - espada
  lexicon: HALOT
  rationale: «Espada» preserva el símbolo de violencia y conflicto judicial. En español, el artículo definido es natural y no añade interpretación indebida.
- source_word: מִבֵּיתְךָ
  english_pob_choice: from your house
  chosen_spanish: de tu casa
  alternatives_spanish:
  - de tu hogar
  - de tu familia
  - de tu dinastía
  lexicon: HALOT
  rationale: «Casa» mantiene la metáfora hebrea amplia, que puede abarcar familia, casa real y linaje. Otras opciones estrechan o explicitan más de lo que el texto dice.
- source_word: עַד עוֹלָם
  english_pob_choice: never
  chosen_spanish: jamás
  alternatives_spanish:
  - para siempre
  - eternamente
  - nunca
  lexicon: HALOT
  rationale: En este contexto de sentencia, la frase expresa duración indefinida y continua. «Jamás» comunica de forma idiomática que la espada no cesará en el horizonte del juicio.
- source_word: עֵקֶב כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  lexicon: HALOT
  rationale: La combinación introduce la causa de la sentencia. «Porque» es la forma más clara y fiel en español moderno.
- source_word: בְזִתָנִי
  english_pob_choice: you have despised me
  chosen_spanish: me has despreciado
  alternatives_spanish:
  - me has tratado con desprecio
  - me has menospreciado
  - me has desdeñado
  lexicon: HALOT
  rationale: El verbo בזה expresa desprecio o menosprecio. «Me has despreciado» conserva el referente divino en primera persona, tal como el hebreo, sin expandir el sentido.
- source_word: וַתִּקַּח
  english_pob_choice: and have taken
  chosen_spanish: y has tomado
  alternatives_spanish:
  - y tomaste
  - y has llevado
  lexicon: HALOT
  rationale: 'Aunque la forma verbal es narrativa, en español conviene coordinarla con el reproche en presente perfecto: «has tomado», que refleja una acción completada con relevancia en la acusación.'
- source_word: אֵשֶׁת אוּרִיָּה הַחִתִּי
  english_pob_choice: the wife of Uriah the Hittite
  chosen_spanish: la mujer de Urías el hitita
  alternatives_spanish:
  - la esposa de Urías el hitita
  - la mujer-esposa de Urías el hitita
  lexicon: HALOT
  rationale: «Mujer» es fiel a אֵשֶׁת y evita introducir una carga más técnica que el hebreo no exige. Se conserva el identificador étnico «el hitita» y el vínculo previo con Urías.
- source_word: לִהְיוֹת לְךָ לְאִשָּׁה
  english_pob_choice: to be your wife
  chosen_spanish: para que sea tu esposa
  alternatives_spanish:
  - para ser tu esposa
  - para llegar a ser tu esposa
  - como esposa para ti
  lexicon: HALOT
  rationale: La frase final expresa el propósito/resultante de tomarla. «Para que sea tu esposa» es natural y mantiene la idea de incorporación matrimonial sin sobreparafrasear.
theological_decisions:
- issue: Referencia directa de la primera persona en «me has despreciado»
  english_pob_reading: Retain 'me' as the direct divine referent
  chosen_spanish_reading: Mantener «me» como referente divino directo
  alternative_spanish_readings:
  - has despreciado la palabra del Señor
  - has despreciado a Yahvé
  rationale: El hebreo usa sufijo de primera persona singular; conviene conservar el choque teológico de que la ofensa contra Urías y su esposa es, en última instancia, desprecio contra Dios mismo. No se debe suavizar a una paráfrasis explicativa.
  doctrine_reference: Prioridad del texto original; preservar la tensión teológica sin resolverla interpretativamente.
- issue: Alcance de «tu casa»
  english_pob_reading: Translate literally as 'your house'
  chosen_spanish_reading: Traducir literalmente como «tu casa»
  alternative_spanish_readings:
  - tu hogar
  - tu familia
  - tu dinastía
  rationale: «Casa» mantiene la ambigüedad productiva del hebreo entre familia, casa real y linaje. Es preferible no restringir el alcance de la sentencia mediante una aclaración no requerida por el texto.
  doctrine_reference: Preservar la amplitud semántica del original.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo WLC y el auditable POB en inglés, manteniendo la equivalencia óptima: conserva la fuerza inferencial de וְעַתָּה, la durabilidad de עַד עוֹלָם mediante «jamás», el valor metafórico de בַּיִת como «casa», y la acusación teológica directa de בְזִתָנִי con «me has despreciado». No se introducen glosas adicionales ni se atenúa la confrontación divina.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como término estándar del proyecto, pero en este versículo el referente explícito de la primera persona está preservado en «me has despreciado», siguiendo la decisión inglesa auditable.
  - «Casa» se mantiene consistente con otros pasajes donde בַּיִת funciona como hogar, casa real o linaje.
  - Se prefiere «mujer» para אֵשֶׁת conforme al hebreo, mientras que «esposa» aparece solo en la cláusula final para reproducir el resultado matrimonial del verbo «tomar» sin perder naturalidad en español.
