translation:
  language: es
  text: 'En el lado sur[a], 4.500 codos de medida, con tres puertas: la puerta de Simeón, una; la puerta de Isacar, una; la puerta de Zabulón, una.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice simplemente «4.500 de medida»; «codos» se toma del contexto inmediato de las dimensiones de la ciudad en esta sección.
    reason: cross_reference
lexical_decisions:
- source_word: וּ/פְאַת נֶגְבָּה
  english_pob_choice: On the south side
  chosen_spanish: Y en el lado sur
  alternatives_spanish:
  - Y al lado sur
  - Y en el costado sur
  - Y en el lado meridional
  lexicon: HALOT
  rationale: פאה designa lado/borde/costado, y נגב señala la dirección sur. En español, «en el lado sur» reproduce bien la relación espacial de la descripción arquitectónica. Se conserva la conjunción inicial para reflejar el arranque coordinado del hebreo.
- source_word: חֲמֵשׁ מֵאוֹת וְאַרְבַּעַת אֲלָפִים
  english_pob_choice: 4,500
  chosen_spanish: '4.500'
  alternatives_spanish:
  - cuatro mil quinientos
  - 4,500
  lexicon: HALOT
  rationale: El hebreo expresa literalmente «quinientos y cuatro mil», es decir, 4.500. Se usa la cifra moderna para claridad y fluidez en español, sin alterar el valor numérico.
- source_word: מִדָּה
  english_pob_choice: cubits by measure
  chosen_spanish: codos de medida
  alternatives_spanish:
  - en medida
  - como medida
  - codos medidos
  lexicon: HALOT
  rationale: En este contexto la medida se refiere a la dimensión de la ciudad, y el contexto inmediato de la sección permite entender que la unidad es el codo. «Codos de medida» conserva la huella formal de מִדָּה y evita borrar el matiz de medición que el texto subraya.
- source_word: וּ/שְׁעָרִים שְׁלֹשָׁה
  english_pob_choice: with three gates
  chosen_spanish: con tres puertas
  alternatives_spanish:
  - y tres puertas
  - habrá tres puertas
  lexicon: HALOT
  rationale: שער puede ser «puerta» o «portal»; en una descripción urbana española, «puertas» es natural y claro. Se mantiene la estructura aditiva y se evita introducir un verbo no presente en el hebreo.
- source_word: שַׁעַר שִׁמְע֞וֹן אֶחָ֗ד
  english_pob_choice: the gate of Simeon, one
  chosen_spanish: la puerta de Simeón, una
  alternatives_spanish:
  - una puerta de Simeón
  - la puerta llamada de Simeón, una
  lexicon: HALOT
  rationale: 'Se conserva el patrón enumerativo del hebreo: sustantivo + nombre tribal + «una». «Puerta de Simeón» mantiene la relación nominal sin suavizarla en exceso, y «una» refleja el valor distributivo de אֶחָד en la lista.'
- source_word: שַׁ֤עַר יִשָּׂשכָר֙ אֶחָ֔ד
  english_pob_choice: the gate of Issachar, one
  chosen_spanish: la puerta de Isacar, una
  alternatives_spanish:
  - una puerta de Isacar
  - la puerta llamada de Isacar, una
  lexicon: HALOT
  rationale: Se mantiene la misma construcción que en las demás puertas para respetar la cadencia repetitiva del hebreo y la estructura paralela de la lista.
- source_word: שַׁ֥עַר זְבוּלֻ֖ן אֶחָֽד
  english_pob_choice: the gate of Zebulun, one
  chosen_spanish: la puerta de Zabulón, una
  alternatives_spanish:
  - una puerta de Zabulón
  - la puerta llamada de Zabulón, una
  lexicon: HALOT
  rationale: Se conserva el paralelismo con las dos puertas anteriores y el mismo valor distributivo de «una».
theological_decisions:
- issue: Tribus de Israel y enumeración cultual/territorial
  english_pob_reading: A plain territorial listing with the tribe names Simeon, Issachar, and Zebulun.
  chosen_spanish_reading: Una enumeración territorial simple de las tribus Simeón, Isacar y Zabulón.
  alternative_spanish_readings:
  - Una lista simbólica sin referencia territorial concreta.
  - Una mención litúrgica de las tribus sin función arquitectónica.
  rationale: No hay indicio en el texto de una carga doctrinal añadida; la traducción debe conservar el carácter descriptivo y arquitectónico de la distribución de las puertas.
  doctrine_reference: Ezequiel 48:33 en su contexto de la distribución final de la ciudad; lectura no doctrinalmente expansiva.
translation_notes:
  revision_awareness: Se siguió el texto hebreo masorético y el audit trail inglés sin cambios de revisión pendientes; la formulación española mantiene la misma estructura descriptiva y la misma decisión de suplir «codos» por contexto, como en la POB inglesa.
  spanish_consistency_notes:
  - Se preservó «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «puerta» para שַׁעַר por claridad urbana en español, sin perder el paralelismo formal del hebreo.
  - Se mantuvo la cifra arábiga para 4.500 siguiendo el criterio de legibilidad moderna.
  - La puntuación con dos puntos introduce la lista de puertas de manera equivalente a la estructura del inglés POB.
