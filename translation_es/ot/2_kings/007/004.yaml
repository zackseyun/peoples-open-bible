review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura condicional del hebreo y conserva adecuadamente la repetición retórica: entrar en la ciudad / quedarse aquí / ir al campamento de Aram; vivirán o morirán. También mantiene correctamente «Aram». Sin embargo, la nota [a] está mal anclada y mezcla dos asuntos: está puesta en «decimos», pero el asunto léxico documentado en el audit trail corresponde a וְנִפְּלָה אֶל («caer/entregarse/pasarse al campamento de Aram»), no a «Si decimos» ni a «Entremos».'
  spanish_quality_summary: El español es claro y legible, pero «lancémonos al campamento» suena más brusco y físicamente violento de lo que exige el hebreo, y puede desviar el sentido de rendición/pasarse al otro lado. «Vayamos y caigamos en manos del campamento de Aram» sería demasiado interpretativo; una solución más fiel y natural es «vayamos y entreguémonos al campamento de Aram», con nota que preserve la imagen hebrea «caer hacia». También conviene ajustar la nota [a] para que explique correctamente la alternativa. El resto del verso está bien en español.
  glossary_alignment: 'La terminología del proyecto se respeta en lo principal: «Aram» está bien preservado. No hay términos teológicos sensibles adicionales. La decisión sobre נפל אל debe reflejar la racionalidad lexical inglesa: mantener el matiz de rendición/pasarse a otro bando sin perder que la metáfora hebrea literal es «caer hacia/en».'
  issues:
  - severity: high
    issue: La nota [a] está anclada en el lugar equivocado.
    rationale: El audit trail inglés marca la nota en «let us enter» por una limitación de anclaje textual, pero el contenido de la nota trata exclusivamente de וְנִפְּלָה אֶל מַחֲנֵה אֲרָם, no de «Si decimos» ni de «Entremos». En español debe colocarse junto a la frase correspondiente para evitar confusión.
  - severity: medium
    issue: «Lancémonos al campamento de Aram» no refleja bien el sentido militar probable de נפל אל.
    rationale: Aunque intenta conservar la imagen de movimiento abrupto, en español sugiere arrojarse físicamente sobre el campamento. En este contexto el hebreo puede significar rendirse, pasarse o entregarse al otro lado. La traducción principal debe comunicar ese sentido con claridad, dejando la literalidad/metáfora en nota.
  - severity: low
    issue: La nota [a] dice «por eso el sentido de la frase puede ser “rendirnos” al campamento de Aram», pero además introduce erróneamente «O “Entremos en la ciudad”».
    rationale: Esa alternativa no corresponde al lugar léxico discutido y crea ruido interpretativo.
