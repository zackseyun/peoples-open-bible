base_translation:
  language: en
  yaml_path: translation/ot/2_kings/015/009.yaml
  text: He did what was evil in the sight of Yahweh[a], just as his fathers had done. He did not turn away from the sins of Jeroboam son of Nebat, with which he caused Israel to sin.
  footnotes:
