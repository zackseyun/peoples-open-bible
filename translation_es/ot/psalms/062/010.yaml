translation:
  language: es
  text: Ciertamente, los hijos del ser humano son un aliento; los hijos del varón son una mentira[a]. En las balanzas suben; juntos son más livianos que un aliento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, interpretativamente: «hombres de baja condición» y «hombres de alta condición». El hebreo, más literalmente, dice «los hijos de אדם» y «los hijos de איש», dos expresiones paralelas para el ser humano.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - Solo
  - De veras
  lexicon: HALOT
  rationale: אַךְ funciona aquí como partícula enfática. «Ciertamente» conserva la afirmación solemne y natural en español sin introducir restricción indebida.
- source_word: הֶבֶל
  english_pob_choice: a breath
  chosen_spanish: un aliento
  alternatives_spanish:
  - un soplo
  - vanidad
  - vapor
  lexicon: HALOT
  rationale: El hebreo sugiere algo efímero e insubstancial. «Un aliento» mantiene la imagen concreta del POB en inglés y suena más natural que un calco rígido; evita además «vanidad», que puede sonar moralizante o tradicionalista.
- source_word: בְּנֵי אָדָם
  english_pob_choice: the sons of man
  chosen_spanish: los hijos de Adán
  alternatives_spanish:
  - los hijos del hombre
  - la humanidad
  - los hombres
  lexicon: HALOT
  rationale: La expresión es literalmente «hijos de adam/hombre». Opto por «los hijos de Adán» para conservar el paralelismo nominal y la forma hebrea más visible en español, sin resolver de antemano la posible lectura social.
- source_word: כָּזָב
  english_pob_choice: a lie
  chosen_spanish: una mentira
  alternatives_spanish:
  - una falsedad
  - engaño
  lexicon: HALOT
  rationale: El sustantivo expresa falsedad o falta de fiabilidad. «Una mentira» transmite bien la fuerza breve y directa del hebreo y corresponde al valor elegido en inglés.
- source_word: בְּנֵי אִישׁ
  english_pob_choice: the sons of men
  chosen_spanish: los hijos del hombre
  alternatives_spanish:
  - los hijos de un hombre
  - los de alta posición
  - los seres humanos
  lexicon: HALOT
  rationale: Mantengo la distinción léxica del hebreo respecto de בְּנֵי אָדָם. «Los hijos del hombre» preserva la forma del texto y deja abierta la tensión interpretativa; no sustituyo por una clase social explícita en el texto principal.
- source_word: בְּמֹאזְנַיִם
  english_pob_choice: In the balances
  chosen_spanish: En las balanzas
  alternatives_spanish:
  - En la balanza
  - Sobre las balanzas
  lexicon: HALOT
  rationale: El dual se refiere a instrumentos de peso. «En las balanzas» reproduce la imagen metafórica y es idiomático en español bíblico actual.
- source_word: לַעֲלוֹת
  english_pob_choice: they go up
  chosen_spanish: suben
  alternatives_spanish:
  - se elevan
  - ascienden
  - van hacia arriba
  lexicon: HALOT
  rationale: El infinitivo de עלה significa «subir/ascender». En el contexto del pesaje, «suben» conserva la metáfora sin volverla interpretativa.
- source_word: מֵהֶבֶל
  english_pob_choice: lighter than a breath
  chosen_spanish: más livianos que un aliento
  alternatives_spanish:
  - más ligeros que un soplo
  - menos que un aliento
  - más livianos que el vapor
  lexicon: HALOT
  rationale: La comparación expresa que resultan aún menos substanciales que הֶבֶל. «Más livianos que un aliento» mantiene el paralelismo con la primera cola y hace explícita la imagen de la balanza.
- source_word: יָחַד
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - todos juntos
  - en conjunto
  - a la vez
  lexicon: HALOT
  rationale: יָחַד indica totalidad colectiva. «Juntos» comunica la aplicación universal del juicio poético con naturalidad en español.
theological_decisions:
- issue: Interpretación de la pareja בְּנֵי אָדָם / בְּנֵי אִישׁ
  english_pob_reading: Preserve the literal parallel as 'the sons of man' / 'the sons of men' rather than resolving them into social classes.
  chosen_spanish_reading: Conservar el paralelismo literal con «los hijos de Adán» / «los hijos del hombre», en vez de convertirlo en «los de baja condición» / «los de alta posición».
  alternative_spanish_readings:
  - los de baja condición / los de alta posición
  - los humildes / los nobles
  rationale: 'El hebreo presenta dos expresiones emparentadas para «ser humano» y el POB en inglés opta por no cerrar la posible inferencia social. En español mantengo esa tensión: el texto principal conserva la forma semántica del original y la nota deja constancia de la lectura interpretativa alternativa.'
  doctrine_reference: 'DOCTRINE.md: primacía del idioma original; preservar tensiones textuales en lugar de resolverlas; fidelidad al paralelismo hebreo.'
translation_notes:
  revision_awareness: El contexto inglés indica que la revisión más reciente no introdujo cambios y que el texto quedó sin modificaciones, aunque el control cruzado marcó necesidad de revisión por posible cuestión mayor. Por eso conservo el paralelismo literal y hago explícita la lectura alternativa en nota, sin resolverla en el cuerpo principal.
  spanish_consistency_notes:
  - Se preserva el uso de «aliento» para הֶבֶל en ambas apariciones para mantener consistencia poética.
  - Se evita «SEÑOR» o terminología eclesiástica tradicional no motivada por este verso.
  - La puntuación sigue el paralelismo poético del hebreo con dos hemistiquios principales y una clausula final comparativa.
