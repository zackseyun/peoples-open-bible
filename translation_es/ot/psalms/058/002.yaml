translation:
  language: es
  text: ¿De veras habláis justicia en silencio? ¿Juzgáis con rectitud, hijos de los hombres?[a][b][c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo אֵלֶם es difícil. La vocalización masorética lo entiende como «silencio» o «mudez»; muchos intérpretes prefieren entender «poderosos» o incluso «dioses», dando el sentido: «¿De veras habláis justicia, oh poderosos?»'
    reason: alternative_reading
  - marker: b
    text: O «hijos de Adán» / «seres humanos». Literalmente, «hijos de hombre».
    reason: lexical_alternative
  - marker: c
    text: También puede entenderse que «hijos de los hombres» funciona como vocativo para ambas preguntas, no solo para la segunda.
    reason: previous_rendering
lexical_decisions:
- source_word: הַאֻמְנָם
  english_pob_choice: Do you indeed
  chosen_spanish: ¿De veras...
  alternatives_spanish:
  - ¿Realmente...
  - ¿Acaso...
  - ¿De verdad...
  lexicon: HALOT
  rationale: La partícula interrogativa enfática pide una formulación que conserve el tono retórico e irónico. «De veras» transmite bien la intensificación de la pregunta sin volverla demasiado coloquial.
- source_word: אֵלֶם
  english_pob_choice: in silence
  chosen_spanish: en silencio
  alternatives_spanish:
  - silencio
  - mudez
  - los poderosos
  lexicon: HALOT
  rationale: El texto masorético favorece el sentido de silencio/mudez, por lo que el cuerpo principal debe reflejar esa lectura. «En silencio» es natural en español y mantiene la dificultad textual; las lecturas vocativas alternativas se preservan aparte.
- source_word: צֶדֶק
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia recta
  - lo recto
  lexicon: HALOT
  rationale: Aquí el término se relaciona con el contenido de lo que se habla. «Justicia» en español conserva el peso moral y judicial del hebreo; «rectitud» sería posible, pero suena menos directo como objeto de «hablar».
- source_word: תְּדַבֵּרוּן
  english_pob_choice: speak
  chosen_spanish: hablas
  alternatives_spanish:
  - habláis
  - dicen
  - pronuncias
  lexicon: HALOT
  rationale: El verbo dice simplemente «hablar». En español, «hablas» sostiene la pregunta retórica de manera fluida y directa. Aunque el hebreo es plural, la forma española puede funcionar como plural de tratamiento implícito dentro del paralelo poético.
- source_word: מֵישָׁרִים
  english_pob_choice: uprightly
  chosen_spanish: con rectitud
  alternatives_spanish:
  - rectamente
  - con equidad
  - con justicia
  lexicon: HALOT
  rationale: El sustantivo/adverbial expresa lo recto, lo llano, lo equitativo. «Con rectitud» preserva esa cualidad adverbial y evita forzar un adverbio menos natural o demasiado interpretativo.
- source_word: תִּשְׁפְּטוּ
  english_pob_choice: judge
  chosen_spanish: juzgas
  alternatives_spanish:
  - juzgáis
  - emites juicio
  - gobiernas
  lexicon: HALOT
  rationale: El contexto es judicial. «Juzgas» es la equivalencia más natural y conserva la fuerza forense del verbo en español.
- source_word: בְּנֵי אָדָם
  english_pob_choice: sons of man
  chosen_spanish: hijos de hombre
  alternatives_spanish:
  - hijos de Adán
  - hijos del hombre
  - seres humanos
  lexicon: HALOT
  rationale: La forma hebrea es literalmente «hijos de hombre/Adán». Se conserva la estructura para mantener el golpe retórico y la textura del original; «seres humanos» suavizaría demasiado la imagen.
theological_decisions:
- issue: Sentido de אֵלֶם en un versículo textualmente difícil
  english_pob_reading: Follow the Masoretic pointing as 'silence' in the main text, while preserving the alternative reading 'mighty ones' or 'gods' in a footnote.
  chosen_spanish_reading: Seguir el sentido masorético de «silencio» en el texto principal, con nota para la lectura alternativa «poderosos» o «dioses».
  alternative_spanish_readings:
  - dirigido a «los poderosos»
  - dirigido a «dioses»
  - «mudez»
  rationale: La dificultad lexical no debe resolverse en secreto. El texto principal mantiene la lectura recibida del hebreo, y la nota conserva la alternativa tradicionalmente discutida, porque cambia de manera importante el tono y el destinatario del versículo.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'Tomé en cuenta el vaivén de las revisiones inglesas: una colocó «sons of man» al inicio para clarificar su alcance sobre ambas preguntas, y la revisión final lo devolvió al cierre para reflejar mejor el hebreo. En español mantengo el vocativo al final, pero marco con nota la posibilidad de leerlo con ambas cláusulas. También preservo la lectura principal «en silencio» para אֵלֶם, que el audit trail trata como la opción MT más segura.'
  spanish_consistency_notes:
  - Usé «Yahvé» no porque aparezca explícitamente aquí, sino por consistencia del proyecto cuando el tetragrámaton esté presente.
  - Conservo el tono interrogativo-retórico sin domesticar el ataque del salmo.
  - Mantengo la tensión interpretativa de אֵלֶם sin resolverla mediante una paráfrasis neutralizadora.
  - Preferí «justicia» y «con rectitud» para reflejar el paralelismo hebreo sin introducir términos eclesiásticos no requeridos.
