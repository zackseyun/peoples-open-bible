base_translation:
  language: en
  yaml_path: translation/ot/isaiah/029/023.yaml
  text: For when he sees his children[a], the work of my hands, in his midst, they will sanctify my name; they will sanctify the Holy One of Jacob[b], and they will stand in awe of the God of Israel.
  footnotes:
