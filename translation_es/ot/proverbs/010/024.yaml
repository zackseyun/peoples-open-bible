review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del hebreo y sigue de cerca las decisiones del POB en ambos hemistiquios: «lo que el impío teme» corresponde adecuadamente a מְגוֹרַת רָשָׁע, «le sobrevendrá» comunica bien הִיא תְבוֹאֶנּוּ, y «el deseo de los justos será concedido» preserva la decisión de no explicitar el sujeto de יִתֵּן. La única desviación significativa está en la nota b, que dice «será dado», mientras que el hebreo literal es activo, «él dará» o «dará», no pasivo.'
  spanish_quality_summary: El español es natural, claro y de registro bíblico moderno. «Le sobrevendrá» y «será concedido» son formulaciones dignas y legibles. La puntuación y el paralelismo proverbial funcionan bien. Solo hace falta corregir la nota b para que no atribuya al hebreo una pasiva que no está en el original.
  glossary_alignment: No hay conflicto con la terminología marco del proyecto. «Impío» para רָשָׁע y «justos» para צַדִּיקִים son opciones aceptables y fieles en este contexto sapiencial. No aparecen términos sensibles del glosario mayor que requieran ajuste.
  issues:
  - severity: medium
    issue: 'La nota b presenta incorrectamente el hebreo literal como pasivo: «será dado».'
    rationale: יִתֵּן es verbo activo singular, literalmente «él dará» o «dará», con sujeto implícito. La traducción principal puede seguir en pasiva por claridad, pero la nota debe describir con precisión la forma hebrea.
  revised_spanish_text: Lo que el impío teme[a] le sobrevendrá; pero el deseo de los justos[b] será concedido.
  revised_footnotes:
  - marker: a
    text: 'También: «el temor del impío». El hebreo puede expresarse más literalmente, pero el texto principal comunica la misma idea en un español más claro.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo literalmente: «él dará» o «dará». El sujeto no se expresa; la traducción principal conserva ese rasgo al usar la voz pasiva sin especificar quién concede el deseo.'
    reason: alternative_reading
  revision_rationale: El texto principal puede mantenerse. Se corrige únicamente la nota b para reflejar con precisión que el hebreo usa una forma activa con sujeto implícito, no una pasiva literal. También se pule levemente la redacción de la nota a para mayor naturalidad.
