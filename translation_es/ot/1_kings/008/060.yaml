translation:
  language: es
  text: para que todos los pueblos de la tierra sepan que Yahvé es Dios[a][b][c]; no hay otro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo dice literalmente: «Yahvé, él es Dios»; el pronombre enfático subraya la identificación exclusiva de Yahvé como Dios.'
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse como «todos los pueblos del país» si הָאָרֶץ se toma en sentido más local; aquí se adopta el sentido amplio, «la tierra».
    reason: lexical_alternative
  - marker: c
    text: El nombre divino יְהוָה se representa aquí como 'Yahvé' según la terminología del proyecto; compárese la forma tradicional 'el SEÑOR'.
    reason: alternative_reading
lexical_decisions:
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el fin de que
  lexicon: HALOT
  rationale: Expresa con naturalidad en español el valor de propósito del hebreo, sin añadir matices no presentes.
- source_word: דַּעַת
  english_pob_choice: may know
  chosen_spanish: sepan
  alternatives_spanish:
  - conozcan
  - lleguen a saber
  lexicon: HALOT
  rationale: El infinitivo constructo con לְמַעַן en español funciona mejor con una subordinada final; 'sepan' conserva el resultado/intención del texto.
- source_word: כָּל עַמֵּי הָאָרֶץ
  english_pob_choice: all the peoples of the earth
  chosen_spanish: todos los pueblos de la tierra
  alternatives_spanish:
  - todas las naciones de la tierra
  - todos los pueblos del país
  lexicon: HALOT
  rationale: '''Pueblos'' refleja mejor עַמִּים que ''naciones''; ''tierra'' mantiene la amplitud universal indicada por el contexto, frente a una lectura local de ''país''.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: La pauta del proyecto en español establece 'Yahvé' para el Tetragrámaton. Preserva el nombre propio divino en vez de sustituirlo por un título.
- source_word: הוּא
  english_pob_choice: he is
  chosen_spanish: es
  alternatives_spanish:
  - él es
  lexicon: HALOT
  rationale: El pronombre independiente aporta énfasis en hebreo, pero en español 'es Dios' comunica con naturalidad la identificación exclusiva sin sonar forzado.
- source_word: הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: En español bíblico estándar, 'Dios' expresa la identificación plena y natural de Yahvé como el único Dios verdadero; 'el Dios' suena menos idiomático.
- source_word: אֵין עוֹד
  english_pob_choice: there is no other
  chosen_spanish: no hay otro
  alternatives_spanish:
  - no existe otro
  - no hay ninguno más
  lexicon: HALOT
  rationale: Resume el modismo de exclusividad de forma breve y fiel. Evita añadir 'dios' que no está explícito en el hebreo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Nombre divino. En la política española del proyecto, 'Yahvé' conserva ese nombre propio y evita la sustitución convencional por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de הָאָרֶץ
  english_pob_reading: earth
  chosen_spanish_reading: la tierra
  alternative_spanish_readings:
  - el país
  - la tierra de Israel
  rationale: El contexto de la dedicación del templo y la formulación universal de la frase favorecen una lectura amplia; 'la tierra' en español mantiene esa universalidad mejor que una localización restringida.
  doctrine_reference: English audit trail for 1 Kings 8:60, lexical decision on כָּל עַמֵּי הָאָרֶץ
- issue: Expresión final de exclusividad
  english_pob_reading: there is no other
  chosen_spanish_reading: no hay otro
  alternative_spanish_readings:
  - no hay ningún otro
  - no hay otro dios
  rationale: El hebreo cierra con una fórmula absoluta de exclusividad. 'No hay otro' reproduce esa fuerza sin añadir un objeto explícito que el texto no menciona.
  doctrine_reference: English audit trail for אֵין עוֹד
translation_notes:
  revision_awareness: La base inglesa había pasado de 'the LORD, he is God' a 'the LORD is God' por fluidez. En español se opta por 'Yahvé es Dios' para mantener naturalidad, pero se conserva en nota la fuerza enfática del hebreo ('Yahvé es Dios'). No se introduce 'he' de manera artificial; tampoco se pierde la afirmación exclusiva final 'no hay otro'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה, conforme a la política española del proyecto.
  - '''pueblos de la tierra'' mantiene la universalidad del contexto y evita una restricción geográfica innecesaria.'
  - '''Dios'' se conserva sin artículo para sonar natural en español y reflejar la identificación predicativa del hebreo.'
  - La cláusula final 'no hay otro' preserva la brevedad enfática del hebreo sin glosa interpretativa.
