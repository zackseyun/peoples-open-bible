  text: כִּ֤י יִרְאֶ֨ה חֲכָ֘מִ֤ים יָמ֗וּתוּ יַ֤חַד כְּסִ֣יל וָ/בַ֣עַר יֹאבֵ֑דוּ וְ/עָזְב֖וּ לַ/אֲחֵרִ֣ים חֵילָֽ/ם׀׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/049/011.yaml
