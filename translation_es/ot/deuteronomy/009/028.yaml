translation:
  language: es
  text: 'No sea que digan la tierra[a] de donde nos sacaste: «Porque Yahvé no pudo traerlos a la tierra que les prometió[b], y porque los odiaba, los sacó para matarlos en el desierto».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «la tierra de donde nos sacaste», con «tierra» funcionando como metonimia de sus habitantes.'
    reason: cultural_note
  - marker: b
    text: 'O más literalmente: «la tierra de la que les habló».'
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶּן
  english_pob_choice: Otherwise
  chosen_spanish: No sea que
  alternatives_spanish:
  - De lo contrario
  - O si no
  lexicon: HALOT
  rationale: En este contexto de advertencia temida, "No sea que" reproduce bien la fuerza precautoria del hebreo sin sonar arcaico en español.
- source_word: הָאָרֶץ אֲשֶׁר הוֹצֵאתָנוּ מִשָּׁם
  english_pob_choice: the land from which you brought us out
  chosen_spanish: el país de donde nos sacaste
  alternatives_spanish:
  - la tierra de donde nos sacaste
  - la tierra de la cual nos sacaste
  lexicon: HALOT
  rationale: El hebreo dice literalmente "la tierra", pero en español "el país" puede mantener más naturalmente la metonimia por sus habitantes. Se conserva la imagen básica del texto sin aclararla de más.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el término por defecto del proyecto para el nombre divino, evitando el reemplazo convencional por una máscara reverencial.
- source_word: מִבְּלִי יְכֹלֶת יְהוָה
  english_pob_choice: Because the LORD was not able
  chosen_spanish: Por no poder Yahvé
  alternatives_spanish:
  - Porque Yahvé no pudo
  - Por falta de poder de Yahvé
  lexicon: HALOT
  rationale: La construcción expresa incapacidad según la acusación de las naciones. "Por no poder" mantiene el valor causal y la tensión teológica sin atribuir incapacidad real a Dios.
- source_word: לַהֲבִיאָם
  english_pob_choice: to bring them
  chosen_spanish: traerlos
  alternatives_spanish:
  - llevarlos
  - introducirlos
  lexicon: HALOT
  rationale: '"Traerlos" conserva el verbo de movimiento del hebreo y armoniza con el inicio del versículo donde Israel es "sacado" de allí.'
- source_word: אֶל הָאָרֶץ אֲשֶׁר דִּבֶּר לָהֶם
  english_pob_choice: into the land that he promised them
  chosen_spanish: a la tierra que les habló
  alternatives_spanish:
  - a la tierra que les prometió
  - a la tierra de la que les habló
  lexicon: HALOT
  rationale: El hebreo usa literalmente "habló", aunque en contexto de pacto apunta a una promesa. Se conserva la tensión entre el literal y el sentido pactal, en vez de resolverla sin huella.
- source_word: וּמִשִּׂנְאָתוֹ אֹתָם
  english_pob_choice: and because he hated them
  chosen_spanish: y por su odio hacia ellos
  alternatives_spanish:
  - y porque los odiaba
  - y por el odio que les tenía
  lexicon: HALOT
  rationale: Se evita atribuir directamente el verbo "odiar" a Dios en la voz del traductor, pero se conserva la dureza del sustantivo hebreo y la acusación implícita del discurso.
- source_word: הוֹצִיאָם
  english_pob_choice: he brought them out
  chosen_spanish: los sacó
  alternatives_spanish:
  - los hizo salir
  - los llevó fuera
  lexicon: HALOT
  rationale: '"Sacar" mantiene la correspondencia con el verbo de salida del éxodo y con el movimiento ya expresado al inicio del versículo.'
- source_word: לַהֲמִתָם
  english_pob_choice: to put them to death
  chosen_spanish: para matarlos
  alternatives_spanish:
  - para darles muerte
  - para hacerlos morir
  lexicon: HALOT
  rationale: '"Para matarlos" es claro, directo y suficientemente fuerte en español. En este contexto retiene la intención adversa del discurso.'
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en la soledad
  - en el yermo
  lexicon: HALOT
  rationale: '"Desierto" es el término más natural y comprensible para lectores en español; aquí comunica bien el escenario del peregrinaje de Israel.'
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo emplea el Tetragrámaton directamente. Se conserva el nombre propio del pacto en la forma española ya adoptada por el proyecto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Verbo דִּבֶּר en el giro "אֲשֶׁר דִּבֶּר לָהֶם"
  english_pob_reading: promised them
  chosen_spanish_reading: les habló
  alternative_spanish_readings:
  - les prometió
  - les dijo
  rationale: En español se mantiene el término literal del hebreo y, al mismo tiempo, se deja que el contexto pactal sugiera la dimensión de promesa. Así no se borra la tensión documentada entre literalidad y sentido.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence'
- issue: Atribución del odio en "וּמִשִּׂנְאָתוֹ אֹתָם"
  english_pob_reading: and because he hated them
  chosen_spanish_reading: y por su odio hacia ellos
  alternative_spanish_readings:
  - y porque los odiaba
  - y por el odio que les tenía
  rationale: La frase sigue siendo una acusación puesta en boca de los enemigos, no una afirmación doctrinal del traductor. El sustantivo conserva la aspereza del hebreo sin suavizarla.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve documented tensions'
translation_notes:
  revision_awareness: 'El archivo inglés muestra una revisión menor: se corrigió ''promised to them'' a ''promised them'' por fluidez. La presente versión española conserva la tensión entre el verbo literal ''habló'' y el sentido pactal implícito, en vez de resolverla de manera interpretativa.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' de forma consistente con el término del proyecto para el nombre divino.
  - Se preservó la metáfora/metonimia de 'la tierra/el país' con nota explicativa.
  - Se evitó 'SEÑOR' por el mandato del proyecto y para mantener auditable el nombre divino.
  - Se mantuvo un registro sobrio y bíblico, pero en español natural.
  - Se respetó la dureza del discurso hostil sin expandirla más allá del hebreo.
