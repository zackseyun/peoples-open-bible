translation:
  language: es
  text: Entonces Salomón buscó dar muerte[a] a Jeroboam; pero Jeroboam se levantó y huyó a Egipto, a Sisac rey de Egipto, y estuvo en Egipto hasta la muerte de Salomón.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «buscó matar a Jeroboam».
    reason: lexical_alternative
  - marker: b
    text: O, «y permaneció en Egipto hasta que Salomón murió».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְבַקֵּשׁ
  english_pob_choice: sought
  chosen_spanish: buscó
  alternatives_spanish:
  - intentó
  - se propuso
  lexicon: HALOT
  rationale: בקש expresa búsqueda o intento. «Buscó» conserva el valor de intención/iniciativa sin afirmar que Salomón lograra su propósito.
- source_word: לְהָמִית
  english_pob_choice: to put ... to death
  chosen_spanish: matar
  alternatives_spanish:
  - dar muerte a
  - hacer morir
  lexicon: HALOT
  rationale: El infinitivo causativo de מות señala la intención de quitar la vida. En español, «matar» es natural y fiel en este contexto; la nota mantiene la alternativa más literal de «buscar matar».
- source_word: וַיָּקָם
  english_pob_choice: arose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso en pie
  - partió
  lexicon: HALOT
  rationale: קום aquí marca una acción decisiva que introduce la huida. «Se levantó» conserva la transición narrativa y sugiere el inicio inmediato del movimiento.
- source_word: וַיִּבְרַח
  english_pob_choice: fled
  chosen_spanish: huyó
  alternatives_spanish:
  - escapó
  - salió huyendo
  lexicon: HALOT
  rationale: ברח indica huir ante peligro. «Huyó» es directo, natural y mantiene la fuerza del peligro real frente a Salomón.
- source_word: מִצְרַיִם ... אֶל שִׁישַׁק מֶלֶךְ מִצְרַיִם
  english_pob_choice: to Egypt, to Shishak king of Egypt
  chosen_spanish: a Egipto, donde Sisac, rey de Egipto
  alternatives_spanish:
  - a Egipto, a Sisac rey de Egipto
  - a Egipto, junto a Sisac, rey de Egipto
  lexicon: HALOT
  rationale: El hebreo repite Egipto y distingue el destino geográfico del destinatario político. En español, «a Egipto, donde Sisac, rey de Egipto» comunica ambas relaciones de modo fluido y conserva la repetición conceptual sin sonar forzado.
- source_word: וַיְהִי בְמִצְרַיִם
  english_pob_choice: and he was in Egypt
  chosen_spanish: y estuvo en Egipto
  alternatives_spanish:
  - y permaneció en Egipto
  - y vivió en Egipto
  lexicon: HALOT
  rationale: היה con localización puede traducirse con simple estado o permanencia. «Estuvo en Egipto» es natural en español y mantiene abierta la duración indicada por la frase temporal siguiente.
- source_word: עַד מוֹת שְׁלֹמֹה
  english_pob_choice: until the death of Solomon
  chosen_spanish: hasta la muerte de Salomón
  alternatives_spanish:
  - hasta que murió Salomón
  - hasta el fallecimiento de Salomón
  lexicon: HALOT
  rationale: La construcción nominal se vierte de manera directa como «hasta la muerte de Salomón», una formulación natural que preserva el carácter sustantivo del hebreo.
theological_decisions:
- issue: La intención homicida de Salomón frente a la posibilidad de traducir con mayor o menor fuerza.
  english_pob_reading: sought to put Jeroboam to death; Or, 'sought to kill Jeroboam.'
  chosen_spanish_reading: buscó matar a Jeroboam
  alternative_spanish_readings:
  - buscó darle muerte a Jeroboam
  - buscó quitarle la vida a Jeroboam
  rationale: El POB inglés conserva la idea de intento y deja abierta la equivalencia con «kill». En español, «buscar matar» mantiene ese mismo arco semántico, con una nota para reflejar la alternativa lexical.
  doctrine_reference: No aplica; cuestión lexical/narrativa, no doctrinal.
- issue: El matiz de permanencia en Egipto antes de la muerte de Salomón.
  english_pob_reading: and he was in Egypt until the death of Solomon; Or, 'and he remained in Egypt until Solomon died.'
  chosen_spanish_reading: y estuvo en Egipto hasta la muerte de Salomón
  alternative_spanish_readings:
  - y permaneció en Egipto hasta que Salomón murió
  - y se quedó en Egipto hasta la muerte de Salomón
  rationale: La lectura principal preserva el verbo simple del hebreo. La alternativa con «permaneció» explicita la continuidad, pero no es necesaria para el texto principal porque la frase temporal ya comunica duración.
  doctrine_reference: No aplica; cuestión de aspecto/estilo narrativo.
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión disponible (gpt-5.4, 2026-04-23): sin cambios necesarios; acuerdo alto con el control cruzado.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no contiene el tetragrámaton.
  - Se usa «Salomón» y «Jeroboam» de forma consistente con los nombres bíblicos habituales en español.
  - «Huyó» y «se levantó» preservan la secuencia narrativa y la fuerza del relato sin añadir interpretación.
  - La estructura del final («hasta la muerte de Salomón») conserva el sustantivo hebreo y su lectura temporal.
