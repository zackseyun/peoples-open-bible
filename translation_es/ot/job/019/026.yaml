translation:
  language: es
  text: Y después que mi piel haya sido destruida[b], sin embargo, de mi carne veré a Dios[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «en mi carne veré a Dios»; alternativamente, «sin mi carne veré a Dios». El hebreo es difícil y se ha entendido de más de una manera.'
    reason: alternative_reading
  - marker: b
    text: La cláusula «después que mi piel haya sido destruida» es textual y léxicamente difícil; versiones más literales incluyen «después de que hayan arrancado mi piel, esto».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַחַר
  english_pob_choice: And after
  chosen_spanish: Y después de que
  alternatives_spanish:
  - Después de que
  - Y después
  lexicon: HALOT
  rationale: La secuencia temporal se expresa de forma natural en español con una construcción subordinada; conserva la conexión del hebreo con la línea anterior sin endurecer el orden del original.
- source_word: עוֹרִי
  english_pob_choice: my skin
  chosen_spanish: mi piel
  alternatives_spanish:
  - mi piel
  - mi dermis
  - mi carne
  lexicon: HALOT
  rationale: עוֹר se refiere a la piel o cuero; en contexto humano, «mi piel» comunica la imagen corporal de manera clara y digna en español.
- source_word: נִקְּפוּ זֹאת
  english_pob_choice: has been destroyed
  chosen_spanish: haya sido destruida
  alternatives_spanish:
  - haya sido arrancada
  - haya sido arrancada de mí
  - haya sido golpeada
  lexicon: HALOT
  rationale: El verbo es difícil y la POB inglesa opta por una solución pasiva general para no forzar una precisión inexistente. En español, «haya sido destruida» mantiene el sentido de ruina sin añadir una lectura más específica de la que el hebreo garantiza.
- source_word: וּמִבְּשָׂרִי
  english_pob_choice: yet from my flesh
  chosen_spanish: sin embargo, desde mi carne
  alternatives_spanish:
  - y desde mi carne
  - en mi carne
  - sin mi carne
  lexicon: HALOT
  rationale: Se preserva la preposición «de/desde» para mantener la ambigüedad textual, y se usa «carne» para reflejar el término bíblico בשר. «Sin embargo» intenta reproducir la fuerza adversativa que la POB inglesa marca con «yet».
- source_word: אֶחֱזֶה
  english_pob_choice: I will see
  chosen_spanish: veré
  alternatives_spanish:
  - contemplaré
  - miraré
  - veré
  lexicon: HALOT
  rationale: חזה implica ver o contemplar; «veré» es el equivalente más natural y claro en español, sin perder la referencia visual intensa del verbo.
- source_word: אֱלוֹהַּ
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios Todopoderoso
  - el Dios
  lexicon: HALOT
  rationale: אֱלוֹהַּ es el nombre/título singular para Dios en Job; «Dios» es el equivalente directo y contextual.
theological_decisions:
- issue: Ambigüedad de וּמִבְּשָׂרִי y si el versículo afirma visión corporal, en la carne o fuera de la carne
  english_pob_reading: The main text preserves the ambiguity with 'from my flesh' and the footnote lists 'in my flesh' and 'without my flesh' as alternatives.
  chosen_spanish_reading: La traducción principal conserva la ambigüedad con «desde mi carne»; las alternativas no se fijan en el texto principal.
  alternative_spanish_readings:
  - en mi carne
  - sin mi carne
  rationale: La sintaxis hebrea no obliga a resolver el pasaje a favor de una lectura dogmática. Mantener la ambigüedad respeta el texto y preserva la tensión teológica documentada por la POB inglesa.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Alcance de la destrucción de la piel antes de la visión de Dios
  english_pob_reading: '''after my skin has been destroyed'' is retained as a difficult clause rather than smoothed out.'
  chosen_spanish_reading: «después de que mi piel haya sido destruida» conserva el carácter difícil del hemistiquio.
  alternative_spanish_readings:
  - después de que me arranquen la piel
  - después de que mi piel sea arrancada
  rationale: La frase hebrea es textualmente y léxicamente difícil; una solución más concreta podría aparentar mayor certeza de la que el texto ofrece. La traducción mantiene la dificultad sin oscurecer la comprensión.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior anclando explícitamente las notas [a] y [b] en el texto español. La redacción principal sigue la auditoría inglesa: mantiene la dificultad del hebreo, conserva la ambigüedad de וּמִבְּשָׂרִי y evita resolver el pasaje más allá de lo que el original sustenta.'
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלוֹהַּ en coherencia con la serie de Job.
  - Se mantiene «carne» para בשר por su fuerza bíblica; no se sustituye por «cuerpo» o «naturaleza humana».
  - Se prefiere una sintaxis natural en español («Y después de que…») sin perder la relación temporal del hebreo.
  - Las notas al pie se anclan exactamente en las palabras señaladas para cumplir la validación y preservar la trazabilidad.
