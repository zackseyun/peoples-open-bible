review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja la estructura básica del griego: Ozías y los dirigentes hablan a Judit, le dicen que vaya en paz, y piden que Dios vaya delante de ella con propósito de ἐκδίκησις respecto de los enemigos. Sin embargo, la frase final «para la venganza de nuestros enemigos» en español se entiende de manera natural como venganza perteneciente a los enemigos o causada por ellos, no como venganza ejercida contra ellos. Eso distorsiona la relación semántica de εἰς ἐκδίκησιν τῶν ἐχθρῶν ἡμῶν, que el rastro inglés correctamente explica como acción contra los enemigos.'
  spanish_quality_summary: El español es mayormente claro y digno, pero la construcción «Yahvé, Dios» suena algo menos natural que «Yahvé Dios» o «Yahvé, el Dios», y la ubicación del marcador de nota al final de la cita no ancla con precisión el término discutido. Además, «Vete en paz» es aceptable, pero «Ve en paz» suena algo más sobrio en registro bíblico. La reparación necesaria es pequeña y mejora tanto fidelidad como naturalidad.
  glossary_alignment: Buena alineación general con el glosario del proyecto en el uso de «Yahvé» para Κύριος y «venganza» para ἐκδίκησις en contexto bélico. No obstante, la realización española del complemento de ἐκδίκησις debe expresarse como «contra/sobre nuestros enemigos» o mediante un verbo («para vengarse de nuestros enemigos») para conservar el sentido documentado. Se conserva mejor «Yahvé Dios» que «Yahvé, Dios».
  issues:
  - severity: high
    issue: «para la venganza de nuestros enemigos» invierte o vuelve ambigua la dirección de la venganza
    rationale: En español, «venganza de nuestros enemigos» se interpreta normalmente como venganza que procede de los enemigos. El griego, según el análisis auditado, expresa venganza ejercida sobre/contra ellos.
  - severity: medium
    issue: La nota al pie está anclada al final de toda la cita en vez del término relevante
    rationale: La nota explica ἐκδίκησις/venganza; debe marcarse junto a «venganza» o la frase correspondiente para mayor precisión editorial.
  - severity: low
    issue: «Yahvé, Dios» es menos idiomático que «Yahvé Dios»
    rationale: La coma hace sonar la frase como aposición marcada. «Yahvé Dios» transmite mejor el título doble en español bíblico moderno sin perder claridad.
  - severity: low
    issue: «Vete en paz» puede sonar más coloquial que «Ve en paz»
    rationale: Ambas opciones son válidas, pero «Ve en paz» encaja mejor con un registro moderno-digno y formulístico.
  revised_spanish_text: 'Entonces Ozías y los gobernantes le dijeron: «Ve en paz, y que Yahvé Dios vaya delante de ti para la venganza[a] contra nuestros enemigos».'
  revised_footnotes:
