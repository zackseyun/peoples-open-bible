translation:
  language: es
  text: 'Por tanto, así dice Yahvé: He aquí, yo estoy trayendo sobre ellos un desastre[a] del que no podrán escapar; y clamarán a mí, pero yo no los escucharé.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "calamidad"; aquí רָעָה se refiere a un juicio destructivo, no al mal moral.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Conserva la fuerza inferencial del hebreo y suena natural en español bíblico contemporáneo.
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: thus says Yahweh
  chosen_spanish: así dice Yahvé
  alternatives_spanish:
  - así dice el Señor
  - así ha dicho Yahvé
  lexicon: HALOT
  rationale: La fórmula profética se mantiene con registro solemne. Se conserva el nombre divino como Yahvé, conforme al criterio del proyecto.
- source_word: הִנְנִי
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Miren
  - Mira
  lexicon: HALOT
  rationale: Expresa la introducción enfática e inmediata del anuncio divino sin perder el tono bíblico.
- source_word: מֵבִיא
  english_pob_choice: I am bringing
  chosen_spanish: estoy trayendo
  alternatives_spanish:
  - voy a traer
  - traigo
  lexicon: HALOT
  rationale: El participio con הִנְנִי comunica acción inminente o segura; el presente progresivo español preserva bien esa inmediatez.
- source_word: אֲלֵיהֶם
  english_pob_choice: on them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - contra ellos
  - a ellos
  lexicon: HALOT
  rationale: En contexto de juicio, 'sobre ellos' mantiene la idea de un mal que cae encima de la comunidad.
- source_word: רָעָה
  english_pob_choice: a disaster
  chosen_spanish: un desastre
  alternatives_spanish:
  - una calamidad
  - un mal
  lexicon: HALOT
  rationale: En este contexto רָעָה denota calamidad punitiva, no mal moral. 'Desastre' comunica bien la destrucción anunciada en español.
- source_word: אֲשֶׁר לֹא יוּכְלוּ לָצֵאת מִמֶּנָּה
  english_pob_choice: from which they will not be able to escape
  chosen_spanish: del cual no podrán salir
  alternatives_spanish:
  - del que no podrán escapar
  - del que no podrán salir fuera
  lexicon: HALOT
  rationale: El hebreo usa una expresión de no poder salir de algo; en español, 'salir' conserva la imagen y funciona de modo idiomático.
- source_word: וְזָעֲקוּ אֵלַי
  english_pob_choice: and they will cry out to me
  chosen_spanish: y clamarán a mí
  alternatives_spanish:
  - y gritarán a mí
  - y llorarán a mí
  lexicon: HALOT
  rationale: זעק implica un clamor intenso de angustia. 'Clamar' es una opción natural y reverente en español bíblico.
- source_word: וְלֹא אֶשְׁמַע אֲלֵיהֶם
  english_pob_choice: but I will not listen to them
  chosen_spanish: pero yo no los escucharé
  alternatives_spanish:
  - pero no los oiré
  - y no los escucharé
  lexicon: HALOT
  rationale: '''Escuchar'' transmite aquí no simple percepción auditiva, sino el acto de atender o responder a sus súplicas. ''Pero'' explicita el contraste implícito.'
theological_decisions:
- issue: Rendering of יְהוָה / divine name
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - Yahweh
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: transliterar el nombre propio divino como Yahvé, en vez de sustituirlo por un título.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering of רָעָה in a judgment context
  english_pob_reading: a disaster
  chosen_spanish_reading: un desastre
  alternative_spanish_readings:
  - una calamidad
  - un mal
  rationale: El contexto es el juicio pactual anunciado por Yahvé. 'Desastre' evita la lectura moral de 'mal' y conserva el carácter de calamidad destructiva.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tensions without flattening them.'
translation_notes:
  revision_awareness: El texto base en inglés ya fue revisado y quedó sin cambios en la última pasada; la versión española sigue ese consenso auditado y mantiene las decisiones clave sobre el nombre divino, רָעָה y la clausula de no poder salir.
  spanish_consistency_notes:
  - Se conserva Yahvé para יְהוָה de manera consistente con el proyecto.
  - '''Desastre'' se usa en sentido de juicio/calamidad, no de mal moral.'
  - '''Clamar'' y ''escuchar'' mantienen el paralelismo de súplica rechazada.'
  - La puntuación sigue el registro profético y la sintaxis española natural.
