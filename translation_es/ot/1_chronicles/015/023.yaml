review_pass:
  verdict: revise
  source_alignment_summary: 'El hebreo dice literalmente: «Berequías y Elcaná, porteros/guardianes de acceso para/al arca». La estructura nominal y el valor de לָאָרוֹן apoyan una relación de asignación o ubicación respecto del arca. El borrador acierta en los nombres y en la nota sobre la preposición, pero pierde precisión léxica al usar «guardianes» sin indicar el rol específico de control de acceso que expresa שֹׁעֲרִים.'
  spanish_quality_summary: El español es fluido, pero «guardianes del arca» suena más general, como custodios del objeto, y no refleja tan bien el oficio de porteros. «Porteros del arca» en este contexto bíblico es más exacto y suficientemente natural. La nota puede simplificarse para reflejar mejor la alternativa ya documentada en inglés.
  glossary_alignment: No hay términos teológicos mayores en disputa. Los nombres propios están bien castellanizados. La principal cuestión de glosario es שֹׁעֲרִים, que según el rastro auditado debe conservar el sentido específico de «gatekeepers»; por eso conviene «porteros» en vez de «guardianes». Para לָאָרוֹן, «del arca» es aceptable en español como relación funcional, con nota que preserve la alternativa «junto al arca».
  issues:
  - severity: medium
    issue: «guardianes» debilita el sentido específico de שֹׁעֲרִים
    rationale: El sustantivo hebreo designa a quienes guardan una entrada o puerta; «guardianes» es demasiado amplio y puede sugerir solo custodia general del arca, mientras que el inglés auditado justificó explícitamente «gatekeepers» frente a opciones más amplias como «guards».
  - severity: low
    issue: La nota puede ceñirse más estrechamente a la alternativa documentada
    rationale: La explicación actual («ubicación en torno a ella») es comprensible, pero el inglés auditado habla de asignación «for» o ubicación «at» the ark. En español, «junto al arca» o «ante el arca» preserva mejor esa alternativa sin ampliar el matiz.
  revised_spanish_text: Berequías y Elcaná fueron porteros del arca[a].
  revised_footnotes:
  - marker: a
    text: 'O: «porteros junto al arca». El hebreo puede indicar asignación al servicio del arca o ubicación junto a ella.'
    reason: lexical_alternative
  revision_rationale: Se cambia «guardianes» por «porteros» para reflejar con mayor fidelidad el sentido específico de שֹׁעֲרִים como quienes custodian el acceso. Se mantiene «del arca» como complemento relacional natural en español, y la nota conserva la alternativa locativa documentada en el inglés POB.
