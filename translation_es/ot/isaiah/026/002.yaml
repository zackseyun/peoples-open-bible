review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la estructura básica del hebreo: imperativo plural seguido de finalidad/resultado, entrada de una nación, y descripción atributiva de esa nación. «para que entre la nación justa, la que guarda la fidelidad» refleja adecuadamente ויבא גוי צדיק שמר אמנים. Sin embargo, la nota al pie no preserva la alternativa significativa documentada en el POB inglés para אֱמֻנִים («truth/faith») y en cambio introduce una nota innecesaria sobre «puertas/portones», que no corresponde al principal punto léxico auditado.'
  spanish_quality_summary: La frase es legible, digna y natural, pero «Abrid» suena marcadamente peninsular/arcaizante y no encaja con el objetivo de español neutral latinoamericano. «Abran» conserva el imperativo plural con mejor naturalidad. El resto de la redacción es buena. «la nación justa» es aceptable, aunque «nación justa» sin artículo también sería posible; mantener el artículo sigue de cerca el inglés auditado.
  glossary_alignment: No hay conflictos con los términos doctrinales de proyecto. La elección «fidelidad» para אֱמֻנִים está alineada con la decisión léxica y teológica del POB. Debe conservarse en nota la alternativa «verdad» o «fe», como hizo el inglés. La sustitución de «Abrid» por «Abran» mejora el ajuste al estilo meta sin afectar la fidelidad.
  issues:
  - severity: medium
    issue: Registro verbal no neutral en «Abrid»
    rationale: Aunque es comprensible, «Abrid» es propio del voseo plural peninsular y suena arcaizante para un español neutral latinoamericano. «Abran» comunica el imperativo plural con naturalidad y dignidad.
  - severity: medium
    issue: La nota al pie está anclada al término equivocado
    rationale: El inglés conserva una nota léxica sobre אֱמֻנִים («faithfulness / truth / faith»). El borrador omite esa información y en su lugar añade una nota sobre «puertas», que no responde al principal lugar de ambigüedad semántica documentado.
  - severity: low
    issue: La nota actual sobre «puertas» es innecesaria
    rationale: «Puertas» es una elección española natural para שְׁעָרִים y no requiere nota aquí, especialmente cuando desplaza una nota más importante sobre אֱמֻנִים.
  revised_spanish_text: Abran las puertas, para que entre la nación justa, la que guarda la fidelidad[a].
  revised_footnotes:
