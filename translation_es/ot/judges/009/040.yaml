translation:
  language: es
  text: Abimelec lo persiguió, y él huyó delante de él; y muchos muertos cayeron[a] hasta la entrada de la puerta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «muchos caídos» / «muchos fueron derribados hasta la entrada del portón». El hebreo conserva el modismo vívido de combate «cayeron» junto con «muertos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְדְּפֵהוּ
  english_pob_choice: pursued him
  chosen_spanish: lo persiguió
  alternatives_spanish:
  - lo siguió persiguiendo
  - lo cazó
  lexicon: HALOT
  rationale: רדף expresa persecución hostil o militar. «Lo persiguió» es natural en español y conserva el sentido de hostigamiento sin suavizarlo.
- source_word: וַיָּנָס
  english_pob_choice: he fled
  chosen_spanish: huyó
  alternatives_spanish:
  - escapó
  - salió huyendo
  lexicon: HALOT
  rationale: נוס significa huir. «Huyó» es la equivalencia más directa y breve para el movimiento de escape en contexto bélico.
- source_word: מִפָּנָיו
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - de delante de él
  - de su presencia
  lexicon: HALOT
  rationale: El hebreo literalmente dice «de delante de su rostro/presencia», pero en español «delante de él» comunica bien la relación espacial e idiomática de huida frente al perseguidor.
- source_word: וַיִּפְּלוּ
  english_pob_choice: fell
  chosen_spanish: cayeron
  alternatives_spanish:
  - fueron derribados
  - quedaron tendidos
  lexicon: HALOT
  rationale: נפל mantiene la imagen de caída. En español, «cayeron» preserva ese valor verbal; el contexto bélico permite entender el resultado de muerte o derribo.
- source_word: חֲלָלִים
  english_pob_choice: slain
  chosen_spanish: muchos heridos de muerte
  alternatives_spanish:
  - muchos muertos
  - muchos caídos
  lexicon: HALOT
  rationale: חֲלָלִים designa a los caídos en batalla, normalmente muertos o mortalmente heridos. «Heridos de muerte» comunica la fuerza sin perder del todo la ambigüedad de «caídos».
- source_word: רַבִּים
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - gran número de
  - numerosos
  lexicon: HALOT
  rationale: רבים es cuantitativo directo. «Muchos» reproduce la cantidad sin añadir énfasis no requerido.
- source_word: עַד פֶּתַח הַשָּׁעַר
  english_pob_choice: as far as the entrance of the gate
  chosen_spanish: hasta la entrada de la puerta
  alternatives_spanish:
  - hasta la entrada de la puerta de la ciudad
  - hasta el umbral de la puerta
  lexicon: HALOT
  rationale: פֶּתַח es «entrada» y שַׁעַר es «puerta» o «portón». «Entrada de la puerta» sigue de cerca la estructura hebrea; en este contexto puede entenderse como la entrada del portón de la ciudad.
translation_notes:
  revision_awareness: El texto base en inglés no cambió en la última revisión, y el cotejo de revisión indica alta concordancia con el hebreo. La versión española conserva esa misma solución con adaptación natural al español.
  spanish_consistency_notes:
  - Se mantiene el nombre propio «Abimelec» en la forma española habitual.
  - Se conserva el paralelismo narrativo de persecución, huida y caída de combatientes.
  - La expresión final sigue de cerca la secuencia hebrea «hasta la entrada de la puerta» sin sustituirla por una simplificación interpretativa.
