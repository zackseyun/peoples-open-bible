review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del hebreo: salida de la presencia de Faraón, clamor de Moisés a Yahvé, y referencia a las ranas impuestas a Faraón. También preserva correctamente יְהוָה como ''Yahvé''. Sin embargo, hay un problema de fidelidad editorial: la nota [a] no presenta una alternativa real, sino prácticamente la misma redacción ya usada en el texto, y por eso no preserva adecuadamente la alternativa documentada en la auditoría inglesa (''against Pharaoh'' / ''contra Faraón'').'
  spanish_quality_summary: 'El español es claro y digno. ''Clamó a Yahvé'' y ''acerca de las ranas'' son naturales. ''Salieron de delante de Faraón'' es aceptable, aunque algo más elevado que ''salieron de la presencia de Faraón'' o simplemente ''salieron de donde estaba Faraón''. La principal reparación necesaria no es de estilo mayor, sino de consistencia de notas y de anclaje: la nota debe explicar una alternativa genuina al sintagma final.'
  glossary_alignment: 'Buen alineamiento con el glosario del proyecto: יְהוָה → ''Yahvé'' correctamente; no hay términos doctrinales conflictivos adicionales. La decisión sobre שׂוּם como ''puesto sobre'' es defendible en español y sigue la revisión inglesa que quiso conservar más de cerca el verbo hebreo. La excepción necesaria es corregir la nota para reflejar la alternativa ''contra Faraón'' en vez de repetir la lectura principal.'
  issues:
  - severity: medium
    issue: La nota [a] no ofrece una alternativa distinta de la redacción principal.
    rationale: El texto dice 'que había puesto sobre Faraón', y la nota vuelve a decir esencialmente lo mismo. La auditoría inglesa conserva como alternativa significativa 'that he had set against Pharaoh'; en español debe preservarse una nota equivalente, por ejemplo 'contra Faraón'.
  - severity: low
    issue: La ubicación del marcador [a] en 'Yahvé[a]' no corresponde al lugar del problema léxico anotado.
    rationale: La nota trata del sintagma final sobre las ranas puestas sobre/contra Faraón, no del nombre divino. Para claridad editorial, el marcador debe anclarse en la frase relevante.
  revised_spanish_text: Así, Moisés y Aarón salieron de delante de Faraón, y Moisés clamó a Yahvé acerca de las ranas que había puesto sobre Faraón[a].
  revised_footnotes:
  - marker: a
    text: 'O: «que había puesto contra Faraón». El hebreo usa literalmente «poner/poner contra»; «sobre Faraón» mantiene la imagen básica del verbo en este contexto de plaga.'
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal casi intacto porque es fiel y legible, pero se corrige la nota para que presente una alternativa léxica real documentada por la auditoría inglesa, y se mueve el marcador al sintagma final, que es donde pertenece la observación.
