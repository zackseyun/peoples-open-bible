translation:
  language: es
  text: En aquellos días la casa de Judá irá con la casa de Israel[a], y vendrán juntos desde la tierra del norte a la tierra que di en herencia a vuestros padres[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la casa de Judá irá hacia la casa de Israel». El hebreo puede leerse de modo más literal con la preposición עַל, pero aquí probablemente expresa unión y no oposición.'
    reason: alternative_reading
  - marker: b
    text: 'O: «a vuestros antepasados». El hebreo dice literalmente «a vuestros padres».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיָּמִים הָהֵמָּה
  english_pob_choice: In those days
  chosen_spanish: En aquellos días
  alternatives_spanish:
  - En esos días
  - En aquellos tiempos
  lexicon: HALOT
  rationale: Es el modismo temporal profético normal y conserva el tono escatológico/restaurador del hebreo sin sonar arcaico en español.
- source_word: יֵלְכ֥וּ
  english_pob_choice: will go with
  chosen_spanish: irá con
  alternatives_spanish:
  - caminará con
  - irá hacia
  lexicon: HALOT
  rationale: En este contexto la idea es de acompañamiento o alineación entre Judá e Israel, no de simple destino. 'Ir con' reproduce bien esa relación en español natural.
- source_word: בֵית יְהוּדָ֖ה
  english_pob_choice: the house of Judah
  chosen_spanish: la casa de Judá
  alternatives_spanish:
  - Judá
  lexicon: HALOT
  rationale: Se conserva la expresión corporativa 'casa de' porque es parte del lenguaje profético y tiene peso teológico de pueblo/pacto.
- source_word: עַל בֵּית יִשְׂרָאֵ֑ל
  english_pob_choice: with the house of Israel
  chosen_spanish: con la casa de Israel
  alternatives_spanish:
  - hacia la casa de Israel
  - sobre la casa de Israel
  lexicon: HALOT
  rationale: Aunque la preposición hebrea puede ser más literal 'sobre/a', el contexto de restauración y la cláusula siguiente favorecen el sentido de unión; 'con' evita una lectura hostil o meramente direccional.
- source_word: וְיָבֹ֤אוּ יַחְדָּו֙
  english_pob_choice: and they will come together
  chosen_spanish: y vendrán juntos
  alternatives_spanish:
  - y vendrán unidos
  - y llegarán juntos
  lexicon: HALOT
  rationale: '''Vendrán juntos'' conserva el futuro plural y la idea de simultaneidad/unidad expresada por יַחְדָּו.'
- source_word: מֵאֶ֣רֶץ צָפ֔וֹן
  english_pob_choice: from the land of the north
  chosen_spanish: desde la tierra del norte
  alternatives_spanish:
  - desde el país del norte
  - desde el norte
  lexicon: HALOT
  rationale: '''Tierra del norte'' mantiene la imaginería geográfica del exilio/restauración; ''tierra'' es más neutro y cercano al hebreo que ''país''.'
- source_word: עַל הָאָרֶץ
  english_pob_choice: to the land
  chosen_spanish: a la tierra
  alternatives_spanish:
  - hacia la tierra
  - sobre la tierra
  lexicon: HALOT
  rationale: Aquí עַל marca destino o llegada; en español 'a la tierra' es la manera más clara y natural de expresar ese movimiento.
- source_word: אֲשֶׁ֥ר הִנְחַ֖לְתִּי
  english_pob_choice: that I gave as an inheritance
  chosen_spanish: que di en herencia
  alternatives_spanish:
  - que concedí como herencia
  - que repartí como herencia
  lexicon: HALOT
  rationale: La forma causativa de נחל combina asignación y posesión heredada. 'Di en herencia' conserva ambas ideas con fluidez bíblica en español.
- source_word: אֶת אֲבוֹתֵי/כֶם
  english_pob_choice: to your fathers
  chosen_spanish: a sus padres
  alternatives_spanish:
  - a sus antepasados
  - a vuestros padres
  lexicon: HALOT
  rationale: El hebreo es masculino plural y remite a los padres/fundadores del pueblo. En español, 'sus padres' funciona como referencia colectiva al linaje receptor y evita una repetición pesada de 'vuestros' en un registro bíblico moderno.
theological_decisions:
- issue: Sentido de עַל בֵּית יִשְׂרָאֵל
  english_pob_reading: The house of Judah will go with the house of Israel
  chosen_spanish_reading: la casa de Judá irá con la casa de Israel
  alternative_spanish_readings:
  - la casa de Judá irá hacia la casa de Israel
  - la casa de Judá irá sobre la casa de Israel
  rationale: La línea siguiente ('vendrán juntos') confirma que el énfasis es la reunificación del pueblo restaurado, no la dominación de una casa sobre la otra. 'Irá con' preserva esa tensión resuelta en el contexto.
  doctrine_reference: Jeremías 3:18; unidad restaurada del pueblo del pacto
- issue: Referencia familiar de אֲבוֹתֵיכֶם
  english_pob_reading: your fathers
  chosen_spanish_reading: sus padres
  alternative_spanish_readings:
  - sus antepasados
  - vuestros padres
  rationale: El hebreo usa un plural masculino que apunta a los padres/ancestros del pueblo; 'sus padres' mantiene el vínculo intergeneracional sin forzar una forma demasiado rígida en español.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente, que prefirió 'go with' sobre 'walk with' por naturalidad contextual. La versión española adopta ese ajuste con 'irá con', manteniendo la lectura de reunificación y el valor corporativo de 'casa de' en ambos miembros del paralelismo.
  spanish_consistency_notes:
  - Se mantiene 'casa de Judá' y 'casa de Israel' como expresiones corporativas estables.
  - '''En aquellos días'' reproduce el arranque profético convencional sin sobrecargar el estilo.'
  - '''Tierra del norte'' conserva el motivo geográfico del exilio y retorno.'
  - '''Di en herencia'' preserva el matiz de asignación hereditaria del verbo causativo hebreo.'
