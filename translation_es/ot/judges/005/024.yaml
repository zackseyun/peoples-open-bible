    issue: Valor modal de 'sea' en el texto principal
    rationale: תְּבֹרַךְ en este contexto poético funciona como declaración de bendición/praise con fuerza comparativa, no principalmente como yusivo español. 'Bendita ... es Jael' preserva mejor el sentido afirmativo del hebreo y del POB inglés.
  - severity: low
    issue: Anclaje de la nota [b] en 'mujeres' en vez de 'tienda'
    rationale: La nota explica que el hebreo dice literalmente 'en la tienda' y que el sustantivo está en singular; el marcador debe ir en la frase correspondiente para precisión editorial.
  - severity: low
    issue: Cadencia final poco natural
    rationale: '''Bendita sea'' al final queda elíptico y ligeramente litúrgico; ''bendita es ella'' mantiene el paralelismo y resulta más claro en español moderno y digno.'
  revised_spanish_text: Bendita[a] entre las mujeres es Jael, la esposa de Heber el ceneo; entre las mujeres en la tienda[b], bendita es ella.
