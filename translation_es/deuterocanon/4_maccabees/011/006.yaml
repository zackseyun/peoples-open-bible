  text: Pero estas cosas de ustedes no son dignas de torturas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «estas cosas de ustedes no son dignas de torturas». «De ustedes» refleja el sentido probable de ὑμῶν en el contexto.'
