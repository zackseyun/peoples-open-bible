base_translation:
  language: en
  yaml_path: translation/ot/1_kings/021/013.yaml
  text: Then the two worthless men came in and sat opposite him[a], and the worthless men testified against Naboth before the people, saying, “Naboth cursed God and the king.” So they brought him outside the city and stoned him with stones[b], and he died.
  footnotes:
  - marker: a
    text: Hebrew literally, 'sons of Belial' / 'men of Belial,' an idiom for worthless or wicked men.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'blessed,' used here as a euphemism for 'cursed' in an accusation of blasphemy.
    reason: lexical_alternative
