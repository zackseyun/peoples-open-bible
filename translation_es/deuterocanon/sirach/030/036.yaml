translation:
  language: es
  text: Ponlo[a] a trabajar, para que no esté ocioso,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Mételo en labor, para que no esté ocioso».'
