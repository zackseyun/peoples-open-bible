translation:
  language: es
  text: 'del gran Rafael. Y fue enviado para sanar a los dos: para quitar las películas blancas de los ojos de Tobit[a], y para dar a Sara, hija de Ragüel, por esposa a Tobías, hijo de Tobit, y para atar a Asmodeo, el demonio maligno, porque Tobías tenía derecho a heredarla. En ese mismo momento, Tobit regresó y entró en su casa, y Sara, hija de Ragüel, bajó de su aposento alto.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: «porque Tobías tenía derecho a casarse con ella». El griego dice literalmente «heredarla», reflejando el marco legal-familiar del relato.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦ μεγάλου Ῥαφαήλ
  english_pob_choice: of the great Raphael
  chosen_spanish: del gran Rafael
  alternatives_spanish:
  - del magnífico Rafael
  - del gran arcángel Rafael
  lexicon: BDAG/uso propio del nombre
  rationale: Mantengo el genitivo de relación con una fórmula española natural. 'Gran' conserva la evaluación del texto sin añadir rango angelológico que aquí no se expresa explícitamente.
- source_word: ἀπεστάλη
  english_pob_choice: he was sent
  chosen_spanish: fue enviado
  alternatives_spanish:
  - fue despachado
  - fue mandado
  lexicon: BDAG
  rationale: Pasivo narrativo directo y natural en español; conserva que el agente del envío permanece implícito.
- source_word: ἰάσασθαι
  english_pob_choice: to heal
  chosen_spanish: sanar
  alternatives_spanish:
  - curar
  - restaurar
  lexicon: BDAG
  rationale: '''Sanar'' cubre tanto la curación física como la restauración que el contexto exige para Tobit y Sara, sin estrechar el verbo a una sola esfera.'
- source_word: τοὺς δύο
  english_pob_choice: the two
  chosen_spanish: a los dos
  alternatives_spanish:
  - a ambos
  - a los dos
  lexicon: BDAG
  rationale: Conservo la referencia conjunta a Tobit y Sara como receptores del envío y la sanidad.
- source_word: λεπίσαι τὰ λευκώματα
  english_pob_choice: to remove the white films from Tobit's eyes
  chosen_spanish: quitar las manchas blancas de los ojos de Tobit
  alternatives_spanish:
  - retirar las opacidades blancas de los ojos de Tobit
  - quitar las películas blancas de los ojos de Tobit
  lexicon: LSJ
  rationale: '''Manchas blancas'' comunica la imagen del griego λευκώματα sin imponer un diagnóstico moderno. ''Ojos de Tobit'' preserva la referencia corporal y evita un calco extraño.'
- source_word: δοῦναι ... γυναῖκα
  english_pob_choice: to give Sarah ... as a wife
  chosen_spanish: dar a Sara, hija de Ragüel, por esposa a Tobías, hijo de Tobit
  alternatives_spanish:
  - dar a Sara ... como esposa
  - entregar a Sara en matrimonio a Tobías
  lexicon: BDAG
  rationale: '''Por esposa'' expresa la fórmula marital del griego con naturalidad. Mantengo también la filiación de ambos personajes, que el texto subraya.'
- source_word: δῆσαι
  english_pob_choice: to bind
  chosen_spanish: atar
  alternatives_spanish:
  - sujetar
  - encadenar
  lexicon: BDAG
  rationale: '''Atar'' es el equivalente directo y suficientemente fuerte para la acción de restringir al demonio, sin sobreespecificar medios físicos.'
- source_word: τὸ πονηρὸν δαιμόνιον
  english_pob_choice: the evil demon
  chosen_spanish: el demonio maligno
  alternatives_spanish:
  - el demonio malo
  - el espíritu maligno
  lexicon: BDAG
  rationale: '''Maligno'' transmite con naturalidad πονηρόν en un contexto demoníaco y mantiene el registro bíblico sin recurrir a un eufemismo.'
- source_word: ἐπιβάλλει κληρονομῆσαι αὐτήν
  english_pob_choice: was entitled to inherit her
  chosen_spanish: tenía derecho a heredarla
  alternatives_spanish:
  - tenía el derecho de casarse con ella
  - tenía derecho a tomarla por esposa
  lexicon: LSJ
  rationale: Conservo el lenguaje de herencia del griego, que en este relato refleja un marco legal-familiar. 'Heredarla' preserva la tensión léxica que el POB inglés también mantuvo.
- source_word: ἐν αὐτῷ τῷ καιρῷ
  english_pob_choice: At that same time
  chosen_spanish: En ese mismo momento
  alternatives_spanish:
  - En ese mismo tiempo
  - Justo entonces
  lexicon: BDAG
  rationale: Marca simultaneidad narrativa con español natural y preciso.
- source_word: ἐπιστρέψας
  english_pob_choice: returned
  chosen_spanish: regresó
  alternatives_spanish:
  - volvió
  - retornó
  lexicon: BDAG
  rationale: '''Regresó'' es idiomático en español y preserva el valor narrativo de retorno.'
- source_word: εἰσῆλθεν εἰς τὸν οἶκον αὐτοῦ
  english_pob_choice: entered into his house
  chosen_spanish: entró en su casa
  alternatives_spanish:
  - entró a su casa
  - se metió en su casa
  lexicon: BDAG
  rationale: '''Entró en su casa'' conserva la dirección del movimiento sin el pesado ''entró dentro de''.'
- source_word: τὸ ὑπερῷον
  english_pob_choice: upper room
  chosen_spanish: aposento alto
  alternatives_spanish:
  - cuarto alto
  - habitación superior
  lexicon: LSJ
  rationale: '''Aposento alto'' es una solución bíblica clara y natural en español, cercana al valor arquitectónico del término griego y comprensible para lectores eclesiales.'
theological_decisions:
- issue: Alcance de la misión de Rafael
  english_pob_reading: The verse presents Raphael as divinely sent to heal both Tobit and Sarah through multiple concrete actions.
  chosen_spanish_reading: El versículo presenta a Rafael como enviado para sanar a ambos mediante acciones concretas, no solo para una curación física aislada.
  alternative_spanish_readings:
  - Rafael fue enviado solo para curar a Tobit.
  - La sanidad de Sara debe tratarse aparte del envío de Rafael.
  rationale: La infinitiva ἰάσασθαι gobierna a 'los dos' y abarca varias acciones. Mantengo esa amplitud sin estrecharla indebidamente.
  doctrine_reference: Preservar el alcance del texto fuente; equivalencia óptima.
- issue: Sentido de κληρονομῆσαι αὐτήν respecto de Sara
  english_pob_reading: was entitled to inherit her
  chosen_spanish_reading: tenía derecho a heredarla
  alternative_spanish_readings:
  - tenía derecho a casarse con ella
  - era el que debía tomarla por esposa
  rationale: Conservo la tensión legal-marital del griego. En español, 'heredarla' puede sonar fuerte, pero precisamente mantiene el matiz extraño y documentado del original.
  doctrine_reference: Primacía del texto original sobre la suavización interpretativa.
translation_notes:
  revision_awareness: El verso coincide sustancialmente con el texto fuente y con el POB inglés auditado; la única tensión relevante es κληρονομῆσαι αὐτήν, que se conserva en la traducción principal y se explica en nota para no perder el marco legal-familiar.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el nombre divino aparezca explícitamente; aquí no aplica.
  - Se mantiene 'Rafael', 'Sara', 'Tobit' y 'Tobías' de forma consistente con la transliteración establecida.
  - '''Demonio maligno'' preserva el registro bíblico sin sustituirlo por terminología más moderna.'
  - '''Aposento alto'' es coherente con la terminología bíblica tradicional en español y no fuerza una paráfrasis.'
  - La nota a pie de página se ancla en 'heredarla' para preservar la alternativa idiomática sin perder el sentido literal del griego.
