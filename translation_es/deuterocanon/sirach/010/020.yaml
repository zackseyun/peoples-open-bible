translation:
  language: es
  text: ¿Qué descendencia es despreciable? La descendencia del que transgrede un mandamiento.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «los que transgreden mandamientos» (plural), lo cual aclara el hebreo difícil.'
    reason: alternative_reading
lexical_decisions:
- source_word: זֶרַע
  english_pob_choice: offspring
  chosen_spanish: descendencia
  alternatives_spanish:
  - semilla
  - linaje
  lexicon: HALOT
  rationale: En este dicho sapiencial, זֶרַע nombra progenie/linaje, no semilla literal. «Descendencia» mantiene el valor colectivo y suena natural en español sin perder el matiz genealógico.
- source_word: נִקְלֶה
  english_pob_choice: contemptible
  chosen_spanish: despreciable
  alternatives_spanish:
  - contemptible
  - vil
  - afrentoso
  lexicon: HALOT
  rationale: El adjetivo expresa algo tenido por bajo o sin honor. «Despreciable» conserva la evaluación negativa y conecta bien con el paralelo griego ἄτιμον, «sin honor».
- source_word: מַה
  english_pob_choice: What
  chosen_spanish: Qué
  alternatives_spanish:
  - Qué clase de
  - Cuál
  lexicon: HALOT
  rationale: La pregunta es retórica y clasifica por valor moral; en español, «¿Qué descendencia...?» reproduce la concisión y el tono aforístico del hebreo mejor que una expansión explicativa.
- source_word: עוֹבֵר
  english_pob_choice: transgresses
  chosen_spanish: transgrede
  alternatives_spanish:
  - quebranta
  - viola
  - pasa por alto
  lexicon: HALOT
  rationale: Con מִצְוָה, el participio tiene sentido moral-jurídico. «Transgrede» preserva ese registro sapiencial y evita suavizar la fuerza del verbo.
- source_word: מִצְוָה
  english_pob_choice: a commandment
  chosen_spanish: un mandamiento
  alternatives_spanish:
  - un mandato
  - el mandamiento
  lexicon: HALOT
  rationale: Se mantiene el singular del hebreo en el texto principal. «Mandamiento» refleja bien el campo bíblico de norma dada por Dios; el plural griego queda recogido en la nota.
theological_decisions:
- issue: Divergencia entre el hebreo singular y el griego plural en la segunda cola
  english_pob_reading: The offspring of one who transgresses a commandment.[a]
  chosen_spanish_reading: La descendencia del que transgrede un mandamiento.
  alternative_spanish_readings:
  - La descendencia de los que transgreden mandamientos.
  - La descendencia del que transgrede mandamientos.
  rationale: Siguiendo la política del proyecto para Sirácida, el hebreo disponible tiene primacía, mientras que el griego sirve como control interpretativo. Por eso el texto principal conserva el singular, y la nota aclara la lectura plural del griego.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde se conserva; usar el paralelo griego como apoyo real'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que eliminó una expansión tipo «qué clase de» para volver más directo el enunciado; por eso el español sigue de cerca la brevedad retórica del hebreo y conserva la pregunta abierta sin añadidos interpretativos.
  spanish_consistency_notes:
  - Se evitó «Cristo» o terminología cristológica porque el texto no la requiere.
  - Se mantuvo la alternancia de número entre el texto principal y la nota según el testimonio hebreo/griego.
  - «Mandamiento» se usa en sentido normativo bíblico, no como fórmula eclesiástica.
  - El sujeto colectivo «descendencia» preserva el carácter general del proverbio.
