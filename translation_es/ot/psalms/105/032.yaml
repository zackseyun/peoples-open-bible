translation:
  language: es
  text: Él les dio granizo por lluvia[a], y fuego llameante en su tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «relámpagos» o «dardos ígneos»; la frase dice literalmente «fuego de llamas».
    reason: lexical_alternative
lexical_decisions:
- source_word: נָתַן
  english_pob_choice: He gave
  chosen_spanish: Él les dio
  alternatives_spanish:
  - Él hizo
  - Él envió
  lexicon: HALOT
  rationale: נתן tiene el sentido básico de 'dar'. En español, 'les dio' conserva el verbo directo del hebreo y expresa de manera natural la acción divina que produce la plaga.
- source_word: גִּשְׁמֵיהֶם
  english_pob_choice: rain
  chosen_spanish: lluvia
  alternatives_spanish:
  - su lluvia
  - chaparrones
  lexicon: HALOT
  rationale: El sustantivo significa 'lluvia' o 'aguaceros'. 'Lluvia' mantiene la relación idiomática con 'granizo por lluvia' y evita una literalidad torpe.
- source_word: בָּרָד
  english_pob_choice: hail
  chosen_spanish: granizo
  alternatives_spanish:
  - pedrisco
  lexicon: HALOT
  rationale: '''Granizo'' es la equivalencia normal y clara en español para la plaga mencionada.'
- source_word: אֵשׁ לֶהָבוֹת
  english_pob_choice: flaming fire
  chosen_spanish: fuego de llamas
  alternatives_spanish:
  - fuego flamígero
  - fuego llameante
  - llamas de fuego
  lexicon: HALOT
  rationale: La expresión hebrea combina 'fuego' y 'llamas'. 'Fuego de llamas' conserva esa doblete intensificador sin adelantar una interpretación más estrecha como 'relámpagos' en el texto principal.
- source_word: בְּאַרְצָם
  english_pob_choice: in their land
  chosen_spanish: en su tierra
  alternatives_spanish:
  - en su país
  - por su tierra
  lexicon: HALOT
  rationale: '''En su tierra'' reproduce con claridad el valor locativo de ב y mantiene el referente del contexto egipcio sin necesidad de explicitarlo en la línea principal.'
theological_decisions:
- issue: Alcance de אֵשׁ לֶהָבוֹת en el contexto de la plaga
  english_pob_reading: Rendered as 'flaming fire' without specifying 'lightning' in the main text.
  chosen_spanish_reading: '''fuego de llamas'' sin especificar ''relámpagos'' en el texto principal.'
  alternative_spanish_readings:
  - relámpagos
  - dardos ígneos
  - fuego relampagueante
  rationale: Aunque el trasfondo de las plagas puede sugerir un fenómeno como el relámpago, el hebreo dice literalmente 'fuego, llamas'. El texto principal conserva esa imagen amplia; la nota permite la alternativa contextual sin imponerla.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Alineado con el último pase de revisión, que no introdujo cambios, y con el control cruzado de alta concordancia; se mantiene la decisión de no estrechar la imagen a 'relámpagos' en el texto principal.
  spanish_consistency_notes:
  - Se conserva el paralelismo poético con una estructura breve y directa.
  - '''Granizo por lluvia'' refleja la sustitución de la lluvia normal por granizo sin sobreexplicar la imagen.'
  - '''Fuego de llamas'' mantiene la tensión léxica del hebreo y la nota recoge la alternativa interpretativa presente en el audit trail inglés.'
