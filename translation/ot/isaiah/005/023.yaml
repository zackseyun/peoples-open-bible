theological_decisions:
- issue: Rendering צִדְקָה in a legal-ethical denunciation
  chosen_reading: righteousness
  alternative_readings:
  - justice
  - right
  rationale: The verse condemns corrupt legal practice. While 'justice' is contextually plausible, the Hebrew root links the acquittal of the wicked with the removal of what belongs to the righteous. 'Righteousness' preserves that lexical contrast and theological-moral texture without excluding legal nuance.
  doctrine_reference: 'DOCTRINE.md: consistency of key terms; preserve tension rather than over-resolve'
