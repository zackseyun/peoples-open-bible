lexical_decisions:
- source_word: וְ/אַתָּה
  english_pob_choice: Yet you
  chosen_spanish: Pero tú
  alternatives_spanish:
  - Y tú
  - Mas tú
  lexicon: HALOT
  rationale: El conjunto adversativo con el pronombre independiente contrasta con el lamento anterior; en español, "Pero tú" comunica ese giro de manera natural y fiel.
- source_word: קָדוֹשׁ
  english_pob_choice: holy
  chosen_spanish: santo
  alternatives_spanish:
  - sagrado
  - apartado
  lexicon: HALOT
  rationale: '"Santo" es el equivalente más natural y teológicamente pleno para la santidad divina en este contexto poético.'
- source_word: יֹשֵׁב
  english_pob_choice: enthroned
  chosen_spanish: entronizado
  alternatives_spanish:
  - sentado
  - habitando
  - morando
  lexicon: HALOT
  rationale: Aunque el participio puede significar literalmente "sentado" o "habitando", el contexto realza la imagen real; "entronizado" preserva esa metáfora sin volverla plana.
- source_word: תְּהִלּוֹת
  english_pob_choice: praises
  chosen_spanish: alabanzas
  alternatives_spanish:
  - praises
  - cantos de alabanza
  - alabanza
  lexicon: HALOT
  rationale: El plural hebreo se conserva mejor con "alabanzas", que mantiene la idea de actos o expresiones múltiples de alabanza.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  lexicon: HALOT
  rationale: Nombre propio estándar en español.
theological_decisions:
- issue: Sentido de יֹשֵׁב תְּהִלּוֹת יִשְׂרָאֵל
  english_pob_reading: God is portrayed as enthroned upon/among Israel's praises in royal-poetic imagery.
  chosen_spanish_reading: Dios es presentado como entronizado sobre las alabanzas de Israel, manteniendo la imagen real-poética.
  alternative_spanish_readings:
  - Dios habita en las alabanzas de Israel
  - Tú eres la alabanza de Israel
  rationale: La lectura más natural del hebreo conserva la imagen de realeza y cercanía litúrgica. "Entronizado" expresa mejor ese trasfondo que una traducción puramente abstracta, y mantiene la tensión poética sin resolverla en exceso.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: Sin revisiones posteriores; el contexto auditado de la versión inglesa permanece en acuerdo alto y no requiere ajustes.
  spanish_consistency_notes:
  - Se evita «SEÑOR» para el nombre divino porque en este versículo no aparece el tetragrámaton.
  - Se mantiene el paralelismo poético y el contraste adversativo iniciado por la conjunción hebrea.
  - «Entronizado» preserva la imagen regia que la POB inglesa documenta como preferible al simple «sentado».
