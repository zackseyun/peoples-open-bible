translation:
  language: es
  text: Tú salvas a un pueblo afligido[a], pero tus ojos están sobre los soberbios[b], para humillarlos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pobre». El adjetivo hebreo puede referirse a quienes son pobres, afligidos u oprimidos.
    reason: lexical_alternative
  - marker: b
    text: O «los orgullosos».
    reason: lexical_alternative
lexical_decisions:
- source_word: עַם
  english_pob_choice: people
  chosen_spanish: pueblo
  alternatives_spanish:
  - gente
  - población
  lexicon: HALOT
  rationale: El sustantivo colectivo hebreo designa a un grupo humano. En español, «pueblo» conserva bien la idea colectiva y suena natural en poesía bíblica.
- source_word: עָנִי
  english_pob_choice: afflicted
  chosen_spanish: afligido
  alternatives_spanish:
  - pobre
  - humilde
  - necesitado
  - oprimido
  lexicon: HALOT
  rationale: El término puede abarcar pobreza, aflicción, opresión o humillación. «Afligido» preserva esa amplitud sin reducirlo solo a lo económico, y mantiene el contraste con «soberbios».
- source_word: תּוֹשִׁיעַ
  english_pob_choice: you save
  chosen_spanish: salvas
  alternatives_spanish:
  - liberas
  - rescatas
  - das victoria
  lexicon: HALOT
  rationale: El verbo hiphil de ישׁע expresa salvar o librar. «Salvas» es breve, natural y suficientemente amplio para el sentido salvífico/deliverativo del hebreo.
- source_word: עֵינֶיךָ
  english_pob_choice: your eyes
  chosen_spanish: tus ojos
  alternatives_spanish:
  - tu mirada
  - tu vista
  lexicon: HALOT
  rationale: Se conserva la imagen concreta del hebreo. «Tus ojos» mantiene el lenguaje corporal poético sin explicar la metáfora en exceso.
- source_word: רָמִים
  english_pob_choice: the haughty
  chosen_spanish: los soberbios
  alternatives_spanish:
  - los orgullosos
  - los altivos
  - los elevados
  lexicon: HALOT
  rationale: Aunque la forma literal puede sugerir «altos/elevados», en contexto tiene valor moral negativo. «Soberbios» expresa bien ese matiz y encaja con el contraste con el pueblo afligido.
- source_word: תַּשְׁפִּיל
  english_pob_choice: to bring them low
  chosen_spanish: humillarlos
  alternatives_spanish:
  - abatirlos
  - rebajarlos
  - ponerlos en lo bajo
  lexicon: HALOT
  rationale: El hiphil de שׁפל significa hacer bajar, humillar o abajar. En español, el infinitivo «humillarlos» transmite el resultado de la acción divina de manera clara y poética.
- source_word: וְאֶת
  english_pob_choice: (not separately translated)
  chosen_spanish: (implícito)
  alternatives_spanish:
  - y
  - a
  lexicon: HALOT
  rationale: La marca de objeto directo no aporta contenido léxico independiente y queda absorbida por la sintaxis española.
- source_word: וְ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - y
  - mas
  lexicon: HALOT
  rationale: Aunque la conjunción es formalmente «y», el paralelismo contrasta dos acciones divinas; «pero» comunica mejor esa relación adversativa en español.
theological_decisions:
- issue: Contraste entre aflicción y soberbia
  english_pob_reading: The verse contrasts God's saving of the lowly/afflicted with his humbling of the proud.
  chosen_spanish_reading: El versículo contrasta que Dios salva al pueblo afligido y humilla a los soberbios.
  alternative_spanish_readings:
  - El versículo contrasta a los pobres con los orgullosos.
  - El versículo contrasta a los oprimidos con los exaltados.
  rationale: El hebreo admite un matiz social (pobre/oprimido) y uno moral (afligido/soberbio). La redacción elegida preserva ambos sin restringir el texto a una sola esfera.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; optimal equivalence'
translation_notes:
  revision_awareness: Coincide con el consenso de revisión alto y no requiere cambios respecto al pasaje fuente y el audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo «pueblo» para el colectivo hebreo עַם, evitando una paráfrasis más abstracta.
  - Se eligió «afligido» para preservar la amplitud semántica de עָנִי sin colapsarlo en pobreza material.
  - Se conservó la imagen corporal «tus ojos» como en el hebreo.
  - «Soberbios» traduce el valor moral negativo de רָמִים en el paralelismo.
  - La cláusula final usa infinitivo en español («humillarlos») para reflejar el sentido resultativo del hiphil sin forzar la sintaxis.
