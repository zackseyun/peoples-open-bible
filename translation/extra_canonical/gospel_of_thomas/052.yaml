translation:
  text: His disciples said to him[a], “Twenty-four prophets spoke in Israel, and they
    all spoke about you.” He said to them, “You have left out the living one who is
    in your presence[d][c][b], and you have spoken about the dead.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase appears in the printed transcription as ‘about your heart’ (ϩⲣⲁⲓ
      ⲛ̄ϩⲏⲧⲕ); Dilley’s normalized lemma reads ‘about you’ (ϩⲣⲁⲓ ϩⲛⲛⲧⲟⲕ). We translate
      the latter but the ‘heart’ reading is possible.
    reason: textual_variant
  - marker: b
    text: ‘Leave out’ can also be rendered ‘omit’ or ‘lack’ (Crum, s.v. ⲕⲱ).
    reason: lexical_alternative
  - marker: c
    text: ‘Twenty-four prophets’ may reflect a traditional enumeration of prophetic
      authorities or a symbolic count (compare the 24-book reckoning of the Hebrew
      scriptures in some ancient traditions), though the saying does not specify.
    reason: cultural_note
  - marker: d
    text: Compare the contrast of ‘living’ and ‘dead’ in Mark 12:27 and parallels;
      Thomas, however, frames the point as missing the living one ‘in your presence.’
    reason: cross_reference
lexical_decisions:
- source_word: ϫⲟⲩⲧⲁϥⲧⲉ
  chosen: twenty-four
  alternatives:
  - twenty and four
  lexicon: Crum; Layton
  rationale: Standard numeral; rendering as a compound number keeps Thomas’s terseness
    without archaizing.
- source_word: ⲁⲛⲧⲟⲟⲩϣⲁϫⲉ
  chosen: they spoke
  alternatives:
  - they have spoken
  lexicon: Layton (verbal system)
  rationale: Narrative past in context; simple past in English matches Thomas’s compact
    style.
- source_word: ϩⲣⲁⲓ
  chosen: about
  alternatives:
  - concerning
  - toward
  lexicon: Crum
  rationale: Preposition used with persons/topics (Crum s.v. hrai) fits ‘about you’
    more naturally than ‘toward’ in English.
- source_word: ⲛ̄ϩⲏⲧⲕ / ϩⲛⲛⲧⲟⲕ
  chosen: you
  alternatives:
  - your heart
  lexicon: Crum; Layton
  rationale: Dilley’s normalized lemmatization reads ϩⲛⲛⲧⲟⲕ (‘concerning you’). The
    printed letters can be read ⲛ̄ϩⲏⲧⲕ (‘your heart’). Sense ‘about you’ fits the
    discourse; we note the alternative in a footnote.
- source_word: ⲕⲱ
  chosen: leave out
  alternatives:
  - omit
  - lack
  lexicon: Crum
  rationale: Crum notes ‘to be lacking; fail, omit.’ ‘Leave out’ preserves active
    nuance addressed to the hearers; ‘omit’ is an equally viable alternative (see
    footnote).
- source_word: ⲡⲉⲧⲉⲣⲉⲱⲛϩ
  chosen: the living one
  alternatives:
  - the one who is alive
  - the living
  lexicon: Layton
  rationale: Relative construction ⲡⲉⲧⲉⲣⲉ- + ⲉⲱⲛϩ functions substantivally; English
    ‘the living one’ keeps the marked singular.
- source_word: ⲛⲡⲉⲧⲛⲙⲧⲟ ⲉⲃⲟⲗ
  chosen: in your presence
  alternatives:
  - before you
  - in front of you
  lexicon: Crum; Lambdin
  rationale: ⲙⲧⲟ ‘front’ + ⲉⲃⲟⲗ idiomatically ‘before’; ‘in your presence’ keeps the
    slightly formal ring of Thomas.
- source_word: ϣⲁϫⲉ
  chosen: speak
  alternatives:
  - say
  lexicon: Crum
  rationale: Here, repeated with ⲁⲛⲧⲟⲟⲩ, it denotes verbal proclamation; ‘speak’ is
    apt.
- source_word: ⲡⲉⲧⲉⲣⲉⲙⲟⲩ
  chosen: the dead
  alternatives:
  - the one who is dead
  - the dead one
  lexicon: Layton; Crum
  rationale: Substantivized relative in singular with generic force; English ‘the
    dead’ communicates the collective sense without forcing a plural.
textual_note: 'Dialect: Sahidic with Lycopolitan features. The phrase-joined transcription
  shows ϩⲣⲁⲓ ⲛ̄ϩⲏⲧⲕ (‘about your heart’), while Dilley’s normalized lemmas read ϩⲣⲁⲓ
  ϩⲛⲛⲧⲟⲕ (‘about you’). We translate the normalized reading but note the ‘heart’ reading
  in a footnote. The preposition ϩⲙ̄/ϩⲛ before ⲡⲓⲥⲣⲁⲏⲗ reflects expected dialectal
  alternation; meaning is ‘in Israel’. The relative forms ⲡⲉⲧⲉⲣⲉⲱⲛϩ and ⲡⲉⲧⲉⲣⲉⲙⲟⲩ
  are singulars with generic or titular force; we preserve the singular ‘the living
  one’ / ‘the dead’. No lacunae are marked in this saying in Dilley’s edition.'
