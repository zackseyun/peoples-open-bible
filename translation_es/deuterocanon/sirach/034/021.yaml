translation:
  language: es
  text: El que ofrece un sacrificio con los bienes de los pobres es como el que degüella a un hijo delante de su padre[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «El que ofrece un sacrificio con los bienes de los pobres es el que degüella a un hijo delante de su padre». El griego es una comparación proverbial comprimida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: θύων
  english_pob_choice: is like one who slaughters
  chosen_spanish: es como el que degüella
  alternatives_spanish:
  - sacrifica
  - mata
  - inmola
  lexicon: LSJ
  rationale: El participio griego expresa la acción violenta de sacrificar/degollar. En español, «degüella» conserva mejor el impacto brutal de la imagen que «sacrifica», que suena más cultual y suaviza la fuerza del proverbio.
- source_word: υἱὸν
  english_pob_choice: a son
  chosen_spanish: a un hijo
  alternatives_spanish:
  - a un hijo suyo
  - a un muchacho
  - a un niño
  lexicon: LSJ
  rationale: El griego no trae posesivo explícito. «A un hijo» reproduce esa apertura sin añadir una relación que el texto no expresa. «Hijo» se usa aquí en sentido literal y no genérico de «niño».
- source_word: ἔναντι
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  - frente a
  lexicon: LSJ
  rationale: «Delante de» es natural en español y preserva la idea de una acción hecha en la presencia directa del padre.
- source_word: τοῦ πατρὸς αὐτοῦ
  english_pob_choice: his father
  chosen_spanish: su padre
  alternatives_spanish:
  - de su padre
  - del padre de él
  lexicon: LSJ
  rationale: El referente más natural del posesivo es el hijo. «Su padre» mantiene la relación implícita sin forzar una formulación artificial.
- source_word: ὁ προσάγων θυσίαν
  english_pob_choice: He who offers a sacrifice
  chosen_spanish: el que ofrece un sacrificio
  alternatives_spanish:
  - el que presenta una ofrenda
  - el que trae un sacrificio
  lexicon: LSJ
  rationale: «Ofrece un sacrificio» es la forma más idiomática en español y conserva el contexto cultual del sintagma griego.
- source_word: ἐκ χρημάτων πενήτων
  english_pob_choice: from the goods of the poor
  chosen_spanish: con los bienes de los pobres
  alternatives_spanish:
  - de los bienes de los pobres
  - con el dinero de los pobres
  - de las posesiones de los pobres
  lexicon: LSJ
  rationale: χρήματα puede significar dinero, bienes o posesiones. «Bienes» es suficientemente amplio y fiel, y «con» expresa el origen/medio culpable del sacrificio sin hacer más estrecho el sentido que el griego permite.
theological_decisions:
- issue: Comparación proverbial entre sacrificio injusto y violencia contra un hijo
  english_pob_reading: 'The verse is rendered as a direct moral simile: offering sacrifice from property taken from the poor is like slaughtering a son before his father.'
  chosen_spanish_reading: La frase española hace explícita la comparación con «es como» para reflejar la sintaxis proverbial comprimida del griego y mantener la denuncia moral contra el culto financiado con opresión.
  alternative_spanish_readings:
  - El que ofrece un sacrificio con los bienes de los pobres, el que degüella a un hijo delante de su padre.
  - Degollar a un hijo delante de su padre es el que ofrece un sacrificio con los bienes de los pobres.
  rationale: El griego es elíptico y proverbial. En español, hacer explícita la comparación evita oscuridad sin añadir doctrina ni suavizar la crítica ética del texto.
  doctrine_reference: Equivalencia óptima; conservar el sentido llano del original sin paraphrasearlo.
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se registraron cambios y hay alta concordancia entre los controles del texto fuente y la traducción inglesa auditada. Esta versión mantiene esa lectura sin introducir ampliaciones interpretativas.'
  spanish_consistency_notes:
  - Se preservó «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni una cita directa que lo requiera.
  - Se eligió «sacrificio» para θυσίαν por su valor cultual, y «degüella» para θύων para no diluir la violencia de la imagen.
  - Se evitó «siervo» o formulaciones litúrgicas tradicionales que no están justificadas por el griego.
  - «Bienes» se mantuvo amplio para respetar la amplitud semántica de χρήματα; no se restringió a «dinero».
