translation:
  language: es
  text: Entonces Yahvé[a] siguió su camino cuando terminó de hablar a Abraham, y Abraham volvió a su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH». Otra forma de transliteración al español es «Jehová».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: went his way
  chosen_spanish: siguió su camino
  alternatives_spanish:
  - se fue
  - partió
  - fue
  lexicon: HALOT
  rationale: הלך en narrativa expresa salida o alejamiento. «Siguió su camino» conserva la idea de partir tras concluir el encuentro, con naturalidad en español y sin añadir una paráfrasis excesiva.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre propio divino del Tetragrámaton y no una sustitución como «el SEÑOR». «Yahvé» es la forma adoptada por el proyecto en español para preservar el nombre personal revelado de Dios.
- source_word: כַּאֲשֶׁר
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - as
  - después de que
  lexicon: HALOT
  rationale: La partícula introduce la circunstancia temporal de la partida. «Cuando» comunica de forma natural ese valor temporal en español.
- source_word: כִּלָּה לְדַבֵּר
  english_pob_choice: had finished speaking
  chosen_spanish: terminó de hablar
  alternatives_spanish:
  - había terminado de hablar
  - acabó de hablar
  lexicon: HALOT
  rationale: El hebreo expresa завершamiento de la acción de hablar. En español, «terminó de hablar» reproduce bien el sentido sin forzar un pluscuamperfecto innecesario en una secuencia narrativa simple.
- source_word: אֶל אַבְרָהָם
  english_pob_choice: to Abraham
  chosen_spanish: con Abraham
  alternatives_spanish:
  - a Abraham
  - para Abraham
  lexicon: HALOT
  rationale: Aunque אֶל es literalmente direccional («a/hacia»), en este contexto la conversación se entiende naturalmente como interacción con Abraham. «Con Abraham» evita una construcción poco idiomática en español y no altera el hecho de que el discurso estaba dirigido a él.
- source_word: שָׁב
  english_pob_choice: returned
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  - retornó
  lexicon: HALOT
  rationale: שוב indica retorno. «Volvió» es breve, fiel y natural en narración española.
- source_word: לִמְקֹמוֹ
  english_pob_choice: to his place
  chosen_spanish: a su lugar
  alternatives_spanish:
  - a su sitio
  - a donde estaba
  lexicon: HALOT
  rationale: מקום significa literalmente «lugar». «A su lugar» preserva el sentido léxico sin concretarlo indebidamente como «casa» o «hogar».
theological_decisions:
- issue: Nombre divino יְהוָה (Tetragrámaton)
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: El texto hebreo usa el nombre propio divino directamente. La traducción española conserva ese nombre como «Yahvé» para mantener la transparencia hacia el original y la coherencia con la política del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada desde «went on his way» a «went his way» para ajustarse mejor al hebreo. La redacción española adopta esa misma precisión con «siguió su camino» y conserva la terminación natural del episodio.
  spanish_consistency_notes:
  - Se conserva «Yahvé» para יְהוָה en el texto principal, conforme al estándar del proyecto.
  - «Volvió a su lugar» mantiene el sentido espacial literal de לִמְקֹמוֹ sin añadir interpretaciones.
  - La relación sintáctica de la cláusula temporal se expresa con «cuando», en paralelo al valor temporal del hebreo.
  - No se introduce «Cristo» ni terminología eclesiástica ajena al verso.
