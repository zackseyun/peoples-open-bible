translation:
  language: es
  text: Y se oyó el sonido de las alas de los querubines hasta el atrio exterior[a], como el sonido de Dios Todopoderoso cuando habla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «como el sonido de El Shaddai cuando habla». Aquí se traduce el título como «Dios Todopoderoso».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְקוֹל
  english_pob_choice: And the sound
  chosen_spanish: Y se oyó el sonido
  alternatives_spanish:
  - Y la voz
  - Y el ruido
  lexicon: HALOT
  rationale: קוֹל puede significar 'sonido', 'voz' o 'ruido'. Aquí se trata de un fenómeno audible producido por las alas, por eso 'sonido' conserva el sentido concreto sin volverlo coloquial ni demasiado interpretativo. La coordinación narrativa se expresa naturalmente con 'Y'.
- source_word: כַּנְפֵי
  english_pob_choice: of the wings
  chosen_spanish: de las alas
  alternatives_spanish:
  - de los batir de alas
  - de los aleteos
  lexicon: HALOT
  rationale: El constructo plural de כָּנָף se refiere literalmente a 'alas'. En español, 'de las alas' preserva la imagen concreta sin introducir una acción no explícita en el hebreo.
- source_word: הַכְּרוּבִים
  english_pob_choice: the cherubim
  chosen_spanish: los querubines
  alternatives_spanish:
  - los querubines celestiales
  lexicon: HALOT
  rationale: '''Querubines'' es el equivalente asentado para כְּרוּבִים y conserva mejor el referente bíblico específico que una paráfrasis como ''seres celestiales''.'
- source_word: נִשְׁמַע
  english_pob_choice: was heard
  chosen_spanish: se oyó
  alternatives_spanish:
  - fue oído
  - era audible
  lexicon: HALOT
  rationale: El nifal de שׁמע aquí expresa pasividad/resultatividad. En español, 'se oyó' es natural y comunica bien que el sonido llegó a oírse a cierta distancia.
- source_word: עַד
  english_pob_choice: as far as
  chosen_spanish: hasta
  alternatives_spanish:
  - tan lejos como hasta
  - al punto de llegar a
  lexicon: HALOT
  rationale: La preposición indica extensión o alcance. 'Hasta' es la forma más natural en español para expresar la distancia a la que llegó el sonido.
- source_word: הֶחָצֵר הַחִיצֹנָה
  english_pob_choice: the outer court
  chosen_spanish: el patio exterior
  alternatives_spanish:
  - el atrio exterior
  - el patio exterior del templo
  lexicon: HALOT
  rationale: חָצֵר puede ser 'patio', 'atrio' o 'recinto'. Dado el contexto del templo y para una prosa clara en español, 'patio exterior' comunica bien la imagen sin forzar una terminología más eclesiástica.
- source_word: כְּקוֹל
  english_pob_choice: like the sound of
  chosen_spanish: como el sonido de
  alternatives_spanish:
  - como la voz de
  - igual que el sonido de
  lexicon: HALOT
  rationale: La comparación es auditiva; 'como el sonido de' mantiene explícito el símil y evita cargar 'voz' con una connotación personal que el contexto inmediato no exige.
- source_word: אֵל שַׁדַּי
  english_pob_choice: God Almighty
  chosen_spanish: Dios Todopoderoso
  alternatives_spanish:
  - El Shaddai
  - el Dios Todopoderoso
  lexicon: HALOT
  rationale: El título divino se traduce para preservar su sentido. 'Dios Todopoderoso' es una equivalencia transparente y digna en español; se evita transliterar 'El Shaddai' porque el POB inglés también opta por traducir el título.
- source_word: בְּדַבְּרוֹ
  english_pob_choice: when he speaks
  chosen_spanish: cuando habla
  alternatives_spanish:
  - al hablar
  - mientras habla
  - cuando estaba hablando
  lexicon: HALOT
  rationale: La construcción con ב y el infinitivo con sufijo puede expresar circunstancia temporal. 'Cuando habla' reproduce bien el valor habitual del símil y mantiene el presente gnómico que el inglés POB captó con 'when he speaks'.
theological_decisions:
- issue: Traducción del título divino אֵל שַׁדַּי
  english_pob_reading: God Almighty
  chosen_spanish_reading: Dios Todopoderoso
  alternative_spanish_readings:
  - El Shaddai
  - el Dios Todopoderoso
  rationale: La decisión sigue el principio del proyecto de traducir títulos divinos en lugar de transliterarlos. 'Dios Todopoderoso' transmite el valor semántico de אֵל שַׁדַּי sin añadir una interpretación doctrinal ajena al texto.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
translation_notes:
  revision_awareness: 'Coincide con el testimonio del hebreo y con el audit trail inglés: se mantiene la similitud auditiva, el alcance espacial y la traducción del título divino sin cambios de sentido relevantes. No se registran revisiones aplicadas en el contexto inglés, y el texto español conserva esa estabilidad.'
  spanish_consistency_notes:
  - Se usa 'Dios Todopoderoso' de manera consistente con la política del proyecto para títulos divinos.
  - '''Querubines'' conserva el término técnico bíblico en lugar de una reducción a ''ángeles''.'
  - '''Patio exterior'' se mantiene como equivalente natural de ''outer court'' en contexto templario.'
  - La nota al pie marca la alternativa transliterada del título hebreo para transparencia textual.
