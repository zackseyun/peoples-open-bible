translation:
  language: es
  text: Y vio la mujer que el árbol era bueno para comer, y que era un deleite para los ojos[a], y que el árbol era deseable para hacer sabio[b]. Entonces tomó de su fruto y comió, y también dio a su marido, que estaba con ella, y él comió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un deseo para los ojos» o «deseable para los ojos». La expresión hebrea destaca el atractivo visual del árbol.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «para hacerse sabio». El hebreo puede expresar el llegar a ser sabio o el impartir sabiduría.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּרֶא
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - miró
  - percibió
  lexicon: HALOT
  rationale: Es el verbo narrativo básico de ver; "vio" conserva la observación simple sin añadir interpretación.
- source_word: הָאִשָּׁה
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la esposa
  lexicon: HALOT
  rationale: El hebreo nombra a la mujer; "la mujer" sigue el sustantivo del texto y evita introducir el rol conyugal demasiado pronto.
- source_word: טוֹב
  english_pob_choice: good
  chosen_spanish: bueno
  alternatives_spanish:
  - agradable
  - provechoso
  lexicon: HALOT
  rationale: '"Bueno" es el equivalente directo de טוֹב y aquí describe la aptitud del árbol para comer.'
- source_word: לְמַאֲכָל
  english_pob_choice: for food
  chosen_spanish: para comer
  alternatives_spanish:
  - como alimento
  - para alimento
  lexicon: HALOT
  rationale: En español, "para comer" expresa con naturalidad la idoneidad para el consumo y mantiene la relación funcional del hebreo.
- source_word: תַאֲוָה
  english_pob_choice: a delight
  chosen_spanish: un deleite
  alternatives_spanish:
  - un deseo
  - algo deseable
  lexicon: HALOT
  rationale: En este contexto visual y descriptivo, "un deleite" reproduce el valor atractivo sin cargar de antemano un matiz moral de concupiscencia.
- source_word: לָעֵינַיִם
  english_pob_choice: to the eyes
  chosen_spanish: para los ojos
  alternatives_spanish:
  - a la vista
  - a los ojos
  lexicon: HALOT
  rationale: La expresión conserva el idiomatismo hebreo y el énfasis en la atracción visual; "para los ojos" resulta claro y fiel.
- source_word: וְנֶחְמָד
  english_pob_choice: desirable
  chosen_spanish: deseable
  alternatives_spanish:
  - agradable
  - codiciable
  - precioso
  lexicon: HALOT
  rationale: '"Deseable" refleja el participio evaluativo sin sobretraducirlo como "codiciable", que intensificaría el tono más allá de este punto narrativo.'
- source_word: לְהַשְׂכִּיל
  english_pob_choice: to make one wise
  chosen_spanish: para hacerse sabia
  alternatives_spanish:
  - para hacerse sabio
  - para adquirir sabiduría
  - para entender
  lexicon: HALOT
  rationale: El hifil expresa la idea de llegar a ser prudente/sabio; en español "para hacerse sabia" conserva el sentido de resultado o finalidad. Se usa femenino porque el referente inmediato es la mujer.
- source_word: מִפִּרְיוֹ
  english_pob_choice: from its fruit
  chosen_spanish: de su fruto
  alternatives_spanish:
  - de su fruto alguno
  - de su fruta
  lexicon: HALOT
  rationale: '"De su fruto" es la manera natural de expresar el מקור/מן con un sustantivo colectivo singular en español.'
- source_word: וַתֹּאכַל
  english_pob_choice: ate
  chosen_spanish: comió
  alternatives_spanish:
  - y comió
  lexicon: HALOT
  rationale: El perfecto narrativo se expresa con el pretérito simple; en español la cadena de acciones ya hace innecesaria una repetición enfática extra.
- source_word: וַתִּתֵּן גַּם
  english_pob_choice: also gave some
  chosen_spanish: también dio
  alternatives_spanish:
  - dio también
  - y además dio
  lexicon: HALOT
  rationale: '"También" conserva la fuerza aditiva de גַּם. El objeto elíptico queda implícito, como en el hebreo, sin introducir "algo" que no está explícito.'
- source_word: לְאִישָׁהּ
  english_pob_choice: to her husband
  chosen_spanish: a su marido
  alternatives_spanish:
  - a su esposo
  - a su hombre
  lexicon: HALOT
  rationale: En este contexto אִישׁ con sufijo apunta al cónyuge; "marido" es claro y fiel, y evita el sabor más técnico de "esposo" si se busca mayor naturalidad narrativa.
- source_word: עִמָּהּ
  english_pob_choice: who was with her
  chosen_spanish: que estaba con ella
  alternatives_spanish:
  - con ella
  lexicon: HALOT
  rationale: Hacer explícita la cláusula relativa conserva el dato narrativo de la presencia del marido sin añadir contenido ajeno al texto.
- source_word: וַיֹּאכַל
  english_pob_choice: and he ate
  chosen_spanish: y él comió
  alternatives_spanish:
  - y comió
  lexicon: HALOT
  rationale: Se mantiene el sujeto explícito para claridad narrativa en español, como en la secuencia hebrea.
theological_decisions:
- issue: Coloración moral de la evaluación de la mujer
  english_pob_reading: Use neutral evaluative language ('good,' 'a delight,' 'desirable') rather than importing explicit sinful language.
  chosen_spanish_reading: Mantener "bueno", "un deleite" y "deseable" sin introducir "lujuria" o "codicia".
  alternative_spanish_readings:
  - '"lujuria para los ojos"'
  - '"codiciable"'
  - '"tentador"'
  rationale: El versículo describe la percepción de la mujer antes de la desobediencia explícita. La traducción no debe adelantar un juicio moral que el hebreo aquí no formula.
  doctrine_reference: Primacía del original; preservar la tensión teológica sin resolverla artificialmente.
- issue: Sentido de לְהַשְׂכִּיל
  english_pob_reading: '''to make one wise'' as a purpose/result phrase.'
  chosen_spanish_reading: '"para hacerse sabia" como finalidad o resultado.'
  alternative_spanish_readings:
  - '"para adquirir sabiduría"'
  - '"para entender"'
  - '"para volverse prudente"'
  rationale: La construcción apunta a la obtención de sabiduría/prudencia. En español conviene mantener el valor resultativo sin cerrar indebidamente el matiz entre 'hacer sabio' y 'llegar a ser sabio'.
  doctrine_reference: Respeto por la ambigüedad lexical documentada en el texto fuente.
- issue: Presencia del marido
  english_pob_reading: Explicitly make עִמָּהּ modify 'her husband' with 'who was with her.'
  chosen_spanish_reading: Expresar "que estaba con ella" para el marido.
  alternative_spanish_readings:
  - '"con ella"'
  - '"estando con ella"'
  rationale: 'La cláusula relativa hace explícita una información narrativa importante: el marido estaba presente. La versión española debe conservar ese detalle de modo claro y fluido.'
  doctrine_reference: Equivalencia óptima y transparencia narrativa.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo WLC y el cierre auditado del POB en inglés. Se conserva la progresión de tres evaluaciones: aptitud para comer, deleite visual y deseabilidad para adquirir sabiduría. Se mantiene también la cláusula relativa del marido presente, siguiendo la decisión revisada del audit trail en inglés.'
  spanish_consistency_notes:
  - Se usa "Yahvé" solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se traduce אִישׁ aquí como "marido" por el contexto inmediato, no como "siervo" ni como "hombre".
  - '"Deseable" y no "codiciable" para no intensificar moralmente el participio hebreo más allá del contexto.'
  - '"Para hacerse sabia" refleja el sentido resultativo de לְהַשְׂכִּיל y mantiene abierta la ambigüedad documentada en el POB inglés.'
