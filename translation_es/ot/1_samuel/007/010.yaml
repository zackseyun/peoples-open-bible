  language: en
  yaml_path: translation/ot/1_samuel/007/010.yaml
  text: And as Samuel was offering up the burnt offering[a], the Philistines drew near for battle against Israel. But Yahweh thundered with a great sound on that day against the Philistines and threw them into confusion, and they were defeated before Israel.
