translation:
  language: es
  text: La casa de Israel los sepultará durante siete meses[a], para purificar la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «limpiar la tierra». El verbo hebreo puede referirse a limpiar algo en sentido ritual.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּקְבָרוּם
  english_pob_choice: will bury them
  chosen_spanish: los sepultará
  alternatives_spanish:
  - los enterrará
  - los dará sepultura
  lexicon: HALOT
  rationale: El verbo קבר expresa sepultar/enterrar; en español bíblico claro, «sepultar» conserva la acción funeraria sin perder naturalidad. El sujeto colectivo implícito se expresa con «La casa de Israel», siguiendo el valor corporativo del hebreo y del audit trail en inglés.
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: The house of Israel
  chosen_spanish: La casa de Israel
  alternatives_spanish:
  - Israel
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se mantiene la expresión colectiva y profética tradicional del hebreo. «La casa de Israel» preserva mejor la fuerza corporativa que una simplificación como «Israel» o «el pueblo de Israel».
- source_word: לְמַעַן
  english_pob_choice: in order to
  chosen_spanish: para
  alternatives_spanish:
  - a fin de
  - con el propósito de
  lexicon: HALOT
  rationale: Marca finalidad. En español, «para» comunica de forma natural y fiel el valor purposivo del hebreo en este contexto.
- source_word: טַהֵר
  english_pob_choice: cleanse
  chosen_spanish: limpiar
  alternatives_spanish:
  - purificar
  - hacer limpia
  lexicon: HALOT
  rationale: En este pasaje el verbo tiene sentido ritual y físico por la contaminación de cadáveres. «Limpiar» es una opción comprensible en español para el efecto sobre la tierra, y evita cargar el texto con un tecnicismo doctrinal que el contexto no exige. Se conserva la posible tensión ritual en nota.
- source_word: אֶת הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - el territorio
  lexicon: HALOT
  rationale: En Ezequiel, el sustantivo suele referirse a la tierra de Israel, no a la tierra en sentido cósmico. «La tierra» reproduce bien ese valor territorial y el contraste con la defilement/limpieza ritual del contexto.
- source_word: שִׁבְעָה חֳדָשִׁים
  english_pob_choice: for seven months
  chosen_spanish: durante siete meses
  alternatives_spanish:
  - por siete meses
  - siete meses
  lexicon: HALOT
  rationale: La expresión es de duración. «Durante siete meses» es idiomático en español y conserva el tiempo de la acción sin añadir matices ajenos.
theological_decisions:
- issue: Naturaleza de la limpieza de la tierra
  english_pob_reading: Render the verb in a way that preserves the ritual/defilement dimension without importing later doctrinal categories.
  chosen_spanish_reading: «Limpiar la tierra» conserva la idea de deshonra/contaminación por cadáveres y el acto de restaurar su pureza ritual, sin imponer categorías posteriores.
  alternative_spanish_readings:
  - purificar la tierra
  - hacer limpia la tierra
  rationale: El contexto de Ezequiel trata de impureza por muertos. «Limpiar» permite una lectura amplia y fiel, mientras que la nota mantiene la alternativa lexical de «purificar» como posibilidad semántica del hebreo.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin cambios necesarios: el sujeto colectivo se mantiene, el verbo de sepultura conserva su fuerza lexical, y la finalidad de la acción se expresa de forma natural en español. No se detectaron revisiones posteriores que alteren la solución.'
  spanish_consistency_notes:
  - Se usa «La casa de Israel» de manera consistente con el registro profético del POB.
  - «Limpiar» se eligió por claridad; la nota preserva la alternativa ritual «purificar».
  - «La tierra» se entiende en sentido territorial, acorde al contexto de Ezequiel.
  - Se evitó «SEÑOR» y otras sustituciones no pertinentes porque no aparecen en este versículo.
