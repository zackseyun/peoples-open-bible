translation:
  language: es
  text: Y yo, Daniel, quedé abatido y estuve enfermo por días. Luego me levanté e hice el trabajo del rey, pero quedé sobrecogido[a] por la visión, y no había quien la entendiera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «yo no la entendí». El hebreo es breve y puede leerse de manera impersonal («no había quien la entendiera») o personal, referido a Daniel.'
    reason: alternative_reading
lexical_decisions:
- source_word: נִהְיֵיתִי
  english_pob_choice: was overcome
  chosen_spanish: quedé abatido
  alternatives_spanish:
  - fui sobrecogido
  - quedé exhausto
  - caí deshecho
  lexicon: HALOT
  rationale: El hebreo expresa un estado resultante tras la visión, no simple existencia. «Quedé abatido» comunica bien la pérdida de ánimo o de fuerzas sin concretar indebidamente si se trata de desmayo físico.
- source_word: נֶחֱלֵיתִי
  english_pob_choice: was sick
  chosen_spanish: estuve enfermo
  alternatives_spanish:
  - me enfermé
  - quedé debilitado
  lexicon: HALOT
  rationale: El nifal de חלה indica volverse enfermo o débil. «Estuve enfermo» es natural en español y conserva la idea de una condición prolongada.
- source_word: יָמִים
  english_pob_choice: for days
  chosen_spanish: por días
  alternatives_spanish:
  - durante días
  - por algunos días
  lexicon: HALOT
  rationale: La pluralidad indefinida de «días» se mantiene sin precisar cantidad. «Por días» reproduce bien la duración abierta del hebreo.
- source_word: וָאָקוּם
  english_pob_choice: Then I rose
  chosen_spanish: Luego me levanté
  alternatives_spanish:
  - y me levanté
  - después me levanté
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración. «Luego me levanté» suena natural en español y preserva la secuencia de recuperación y reanudación.
- source_word: וָאֶעֱשֶׂה אֶת מְלֶאכֶת הַמֶּלֶךְ
  english_pob_choice: did the king’s work
  chosen_spanish: hice la obra del rey
  alternatives_spanish:
  - cumplí el trabajo del rey
  - realicé el servicio del rey
  - hice los asuntos del rey
  lexicon: HALOT
  rationale: מְלָאכָה puede significar trabajo, tarea o labor. «Obra del rey» mantiene el campo semántico de labor/encargo sin imponer un matiz de cortesía más eclesiástico que el hebreo.
- source_word: וָאֶשְׁתּוֹמֵם
  english_pob_choice: I was appalled
  chosen_spanish: quedé sobrecogido
  alternatives_spanish:
  - me quedé atónito
  - quedé estupefacto
  - me sentí desolado
  lexicon: HALOT
  rationale: La forma reflexiva expresa quedar desorientado o impactado por algo abrumador. «Sobrecogido» conserva esa intensidad y encaja con la reacción ante la visión.
- source_word: הַמַּרְאֶה
  english_pob_choice: the vision
  chosen_spanish: la visión
  alternatives_spanish:
  - lo visto
  - la aparición
  - la escena
  lexicon: HALOT
  rationale: En Daniel, este sustantivo remite al contenido revelado en visión profética. «La visión» es la equivalencia más directa y adecuada al contexto apocalíptico.
- source_word: וְאֵין מֵבִין
  english_pob_choice: there was no one who understood it
  chosen_spanish: no había quien la entendiera
  alternatives_spanish:
  - yo no la entendía
  - nadie la entendía
  - no hubo quien la entendiera
  lexicon: HALOT
  rationale: El hebreo es terse y admite lectura impersonal o personal. La forma impersonal «no había quien la entendiera» preserva el valor abierto del original y la decisión auditada del POB en inglés.
theological_decisions:
- issue: Sujeto implícito de וְאֵין מֵבִין
  english_pob_reading: 'existential/impersonal: ''there was no one who understood it'''
  chosen_spanish_reading: 'impersonal: «no había quien la entendiera»'
  alternative_spanish_readings:
  - «yo no la entendía»
  - «no había entendimiento»
  rationale: El hebreo no expresa de manera explícita el sujeto en primera persona. Mantener la construcción impersonal respeta mejor la forma masorética, aunque la lectura personal sigue siendo posible por el contexto inmediato; por eso se conserva en nota.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión textual en lugar de resolverla sin necesidad.'
translation_notes:
  revision_awareness: 'La versión española sigue el mismo equilibrio del POB inglés: mantiene la ambigüedad final de וְאֵין מֵבִין, conserva la progresión narrativa y evita añadir especificaciones no presentes en el hebreo. No se aplicaron revisiones posteriores al texto base auditado.'
  spanish_consistency_notes:
  - Se usó «Yahvé» no pertinente en este versículo; no aparece nomenclatura divina directa.
  - Se mantuvo «visión» para הַמַּרְאֶה por consistencia con Daniel 8.
  - Se prefirió un español sobrio y bíblico, pero sin calco innecesario de estructuras inglesas.
  - El marcador [a] está anclado en la frase con ambigüedad real del hebreo y corresponde a la nota alternativa de lectura.
