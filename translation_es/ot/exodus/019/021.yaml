translation:
  language: es
  text: 'Yahvé dijo a Moisés: «Desciende; advierte al pueblo, para que no se abran paso hasta Yahvé para ver[a], y caigan muchos de ellos[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para mirar». El verbo hebreo puede significar tanto «mirar» como «ver»; aquí se refiere al intento de mirar la manifestación de Yahvé.
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «y muchos de entre ellos caigan». El verbo «caer» puede implicar muerte en este contexto, pero el hebreo no lo expresa de manera más explícita.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del texto hebreo mediante transliteración reverente y reconocible en español. Se evita sustituirlo por un título como «el SEÑOR», porque la tradición POB documenta la intención de preservar el Tetragrámaton.
- source_word: רֵד
  english_pob_choice: Go down
  chosen_spanish: Desciende
  alternatives_spanish:
  - Baja
  lexicon: HALOT
  rationale: El imperativo de ירד pide un movimiento hacia abajo. «Desciende» mantiene con precisión ese valor direccional y suena digno en español bíblico actual.
- source_word: הָעֵד
  english_pob_choice: warn
  chosen_spanish: advierte
  alternatives_spanish:
  - amonesta
  - da aviso solemne
  lexicon: HALOT
  rationale: El hifil de עוד aquí funciona como advertencia o amonestación solemne. «Advierte» conserva la fuerza imperativa sin introducir explicaciones adicionales.
- source_word: בָּעָם
  english_pob_choice: the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - al pueblo de Israel
  - a la gente
  lexicon: HALOT
  rationale: En el contexto del Sinaí, עם se refiere al conjunto de Israel. «Al pueblo» es natural y exacto; el dativo preposicional en español expresa correctamente la dirección de la advertencia.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: para que no
  alternatives_spanish:
  - no sea que
  - lest
  lexicon: HALOT
  rationale: En español moderno, «para que no» transmite con claridad el matiz preventivo de la cláusula negativa. Se evita «no sea que» por sonar más marcado sin aportar mayor precisión.
- source_word: יֶהֶרְסוּ
  english_pob_choice: break through
  chosen_spanish: se abran paso
  alternatives_spanish:
  - irrumpan
  - rompan el cerco
  lexicon: HALOT
  rationale: El verbo הרס en este contexto expresa forzar o violar un límite. «Se abran paso» comunica la idea de avanzar indebidamente contra una restricción, con buena naturalidad en español.
- source_word: אֶל יְהוָה
  english_pob_choice: to Yahweh / to the LORD
  chosen_spanish: hasta Yahvé
  alternatives_spanish:
  - hacia Yahvé
  - a Yahvé
  lexicon: HALOT
  rationale: La preposición marca movimiento dirigido a la presencia divina. «Hasta Yahvé» conserva el valor de aproximación peligrosa y refleja el sentido de avance hasta el límite de la presencia santa.
- source_word: לִרְאוֹת
  english_pob_choice: to look
  chosen_spanish: para ver
  alternatives_spanish:
  - para mirar
  - para contemplar
  lexicon: HALOT
  rationale: La infinitiva indica propósito. Aquí el énfasis del contexto es el intento de ver la manifestación divina; «para ver» es idiomático y suficientemente abierto para ese matiz, como en la nota inglesa sobre ver/looks.
- source_word: וְנָפַל
  english_pob_choice: and many of them fall
  chosen_spanish: y caigan
  alternatives_spanish:
  - y mueran
  - y se desplomen
  lexicon: HALOT
  rationale: El hebreo usa נפל, literalmente «caer». Se conserva esa forma verbal sin explicitar muerte, porque el texto no la expresa de manera directa aunque el contexto la sugiera.
- source_word: מִמֶּנּוּ רָב
  english_pob_choice: many of them
  chosen_spanish: muchos de ellos
  alternatives_spanish:
  - una gran cantidad de ellos
  - muchos entre ellos
  lexicon: HALOT
  rationale: La expresión indica una gran cantidad dentro del grupo. «Muchos de ellos» es la forma más natural en español y mantiene la cuantificación sin sobreinterpretar.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה en un contexto de advertencia sobre la presencia santa
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se mantiene el nombre propio divino en español para preservar la relación entre el nombre revelado y la escena de Sinaí. Dado que el hebreo usa directamente יְהוָה, no se oculta tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH'
- issue: 'Matiz de la consecuencia al acercarse indebidamente: «fall»'
  english_pob_reading: and many of them fall
  chosen_spanish_reading: y caigan muchos de ellos
  alternative_spanish_readings:
  - y mueran muchos de ellos
  - y perezcan muchos de ellos
  rationale: La POB inglesa preserva la literalidad de נפל y deja implícita la posible muerte mediante nota. En español se conserva igualmente «caigan», evitando añadir más de lo que el hebreo afirma explícitamente.
  doctrine_reference: 'DOCTRINE.md: Principles of source transparency'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el audit trail inglés: preserva el nombre divino, mantiene el verbo de «caer» sin explicitar muerte, y reproduce la finalidad negativa de פֶּן con una construcción natural en español. No se introdujeron ampliaciones doctrinales ni paráfrasis fuera de lo requerido por la sintaxis española.'
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente para יְהוָה.
  - Se prefirió «desciende» para רֵד como equivalente sobrio y directo.
  - «Advierte» conserva el valor de exhortación preventiva de הָעֵד.
  - Se mantuvo la ambigüedad de לִרְאוֹת con una nota de alternativa lectora.
  - «Caigan» reproduce la literalidad de נפל sin explicitar el resultado final.
  - El tono general es bíblico contemporáneo, claro y apto para lectura pública.
