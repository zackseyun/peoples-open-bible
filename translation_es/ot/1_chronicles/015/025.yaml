revisions:
- from: Así David, y los ancianos de Israel, y los jefes de los millares, iban a subir el arca del pacto de Yahvé desde la casa de Obed-edom, con alegría.
  to: Entonces David, y los ancianos de Israel, y los jefes de los millares, fueron a llevar el arca del pacto de Yahvé desde la casa de Obed-edom con alegría.
  rationale: Se ajusta el inicio a «Entonces» para una transición narrativa más natural, y se reemplaza «iban a subir» por «fueron a llevar» para reflejar mejor la acción narrativa efectiva de הַהֹלְכִים לְהַעֲלוֹת en español idiomático. Se conserva «Yahvé», «arca del pacto» y el resto del contenido esencial del hebreo sin añadir ni omitir sentido.
