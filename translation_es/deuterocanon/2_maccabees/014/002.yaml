translation:
  language: es
  text: habiendo tomado el control del país[a], después de haber quitado a Antíoco y a Lisias, su guardián.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del territorio». La palabra griega χώρα puede significar «país», «tierra» o «territorio»; aquí se ha preferido «país» por su sentido político. «Su guardián» también puede entenderse como «su regente», ya que el griego ἐπίτροπος puede referirse a un tutor, administrador o regente.
    reason: lexical_alternative
lexical_decisions:
- source_word: κεκρατηκέναι
  english_pob_choice: having gained control
  chosen_spanish: habiendo tomado control
  alternatives_spanish:
  - habiendo obtenido dominio
  - habiendo llegado a dominar
  - habiendo ganado el control
  lexicon: LSJ
  rationale: El perfecto infinitivo de κρατέω expresa posesión o dominio ya alcanzado. «Habiendo tomado control» transmite ese dominio político/militar de manera natural en español sin añadir una idea de permanencia que el griego no exige.
- source_word: τῆς χώρας
  english_pob_choice: of the country
  chosen_spanish: de la región
  alternatives_spanish:
  - de la tierra
  - del país
  - del territorio
  lexicon: LSJ
  rationale: χώρα puede significar tierra, país, región o territorio. Aquí el contexto histórico-político favorece una referencia al ámbito territorial bajo disputa; «región» mantiene amplitud semántica sin sonar demasiado moderno o nacional en sentido estricto.
- source_word: ἐπανελόμενον
  english_pob_choice: after removing
  chosen_spanish: después de haber quitado
  alternatives_spanish:
  - después de haber removido
  - después de haber apartado
  - después de haber eliminado
  lexicon: LSJ
  rationale: El participio de ἐπαναιρέω aquí remite a la supresión o retiro de rivales políticos. «Quitar» conserva la vaguedad del griego y evita precisar un modo de acción que el texto no explicita.
- source_word: Ἀντίοχον
  english_pob_choice: Antiochus
  chosen_spanish: Antíoco
  alternatives_spanish:
  - Antíoco
  lexicon: transliteration
  rationale: Nombre propio transliterado según uso hispano estándar y coherente con el texto fuente.
- source_word: ἐπίτροπον
  english_pob_choice: guardian
  chosen_spanish: gobernador
  alternatives_spanish:
  - guardián
  - regente
  - administrador
  lexicon: LSJ
  rationale: ἐπίτροπος puede significar guardián, administrador o regente. En este contexto histórico, la función de Lisias es claramente la de un delegado con autoridad de gobierno; «gobernador» comunica mejor esa función al lector español, aunque sin agotar la gama léxica del griego.
- source_word: Λυσίαν
  english_pob_choice: Lysias
  chosen_spanish: Lisias
  alternatives_spanish:
  - Lysias
  lexicon: transliteration
  rationale: Nombre propio vertido al español con transliteración habitual.
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión inglesa más reciente, que suavizó 'overthrowing' a 'removing' para no especificar más de lo que permite ἐπανελόμενον. Se mantuvo esa cautela en español con «quitar».
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o vocabulario teológico no pertinente, pues el verso es histórico y no contiene lenguaje divino.
  - Se prefirió «gobernador» para ἐπίτροπον por el contexto de autoridad delegada; se registran alternativas más literales en la decisión léxica.
  - «Región» funciona como equivalente contextual de χώρα, sin forzar la idea de nación moderna.
