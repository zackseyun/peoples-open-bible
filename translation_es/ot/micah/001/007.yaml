translation:
  language: es
  text: Todas sus imágenes talladas[a] serán destrozadas, y todos sus salarios de prostituta[b] serán quemados con fuego; todos sus ídolos los dejaré desolados. Porque de los salarios de una prostituta los reunió,[c] y a los salarios de una prostituta volverán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «imágenes grabadas».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «sus salarios de prostituta»; la frase alude metafóricamente a la riqueza obtenida mediante infidelidad idolátrica.'
    reason: cultural_note
  - marker: c
    text: O «volverán a ser salarios de prostituta».
    reason: alternative_reading
lexical_decisions:
- source_word: פְּסִילֶיהָ
  english_pob_choice: her carved images
  chosen_spanish: sus imágenes talladas
  alternatives_spanish:
  - sus imágenes esculpidas
  - sus imágenes grabadas
  - sus ídolos
  lexicon: HALOT
  rationale: פֶּסֶל nombra una imagen fabricada por talla o talla en piedra/madera. «Imágenes talladas» conserva el rasgo concreto sin caer en el arcaísmo de «grabadas» como fórmula fija; además permite distinguirlo de עֲצַבֶּיהָ en la siguiente hemistiquio.
- source_word: יֻכַּתּוּ
  english_pob_choice: will be smashed
  chosen_spanish: serán destrozadas
  alternatives_spanish:
  - serán quebradas
  - serán hechas pedazos
  - serán abatidas
  lexicon: HALOT
  rationale: La pasiva comunica destrucción violenta. «Destrozadas» es natural en español y mantiene el golpe devastador que el contexto de juicio exige.
- source_word: אֶתְנַנֶּיהָ
  english_pob_choice: her prostitute’s wages
  chosen_spanish: el salario de prostitución
  alternatives_spanish:
  - su paga de prostituta
  - la ganancia de prostituta
  - el pago de prostitución
  lexicon: HALOT
  rationale: אֶתְנַן es pago o salario por prostitución. «Salario de prostitución» conserva el valor metafórico y la aspereza del hebreo; aunque suena fuerte, no suaviza el vínculo profético entre idolatría y prostitución.
- source_word: יִשָּׂרְפוּ בָאֵשׁ
  english_pob_choice: will be burned with fire
  chosen_spanish: será quemado con fuego
  alternatives_spanish:
  - será quemado en el fuego
  - será consumido por el fuego
  lexicon: HALOT
  rationale: La construcción incluye de manera enfática el medio de destrucción. «Quemado con fuego» sigue de cerca la imagen sin sonar forzado en español.
- source_word: עֲצַבֶּיהָ
  english_pob_choice: her idols
  chosen_spanish: sus ídolos
  alternatives_spanish:
  - sus imágenes
  - sus falsos dioses
  lexicon: HALOT
  rationale: En este contexto עָצָב se refiere a ídolos. «Ídolos» es transparente en español y evita repetir el mismo matiz de «imágenes talladas», respetando la variedad semántica del hebreo.
- source_word: אָשִׂים שְׁמָמָה
  english_pob_choice: I will make desolate
  chosen_spanish: haré desolación
  alternatives_spanish:
  - haré desolada
  - la dejaré desolada
  - la devastaré
  lexicon: HALOT
  rationale: El hebreo usa el verbo con un sustantivo de devastación. «Haré desolación» conserva la fuerza nominal del original y el tono solemne del anuncio profético.
- source_word: מֵאֶתְנַן זוֹנָה
  english_pob_choice: from the wages of a prostitute
  chosen_spanish: de salario de prostituta
  alternatives_spanish:
  - de la paga de una prostituta
  - de la ganancia de una prostituta
  - del pago de una prostituta
  lexicon: HALOT
  rationale: La frase es deliberadamente cruda y metafórica. «De salario de prostituta» mantiene el sustantivo «salario» para reflejar אֶתְנַן y preservar el eco económico del texto.
- source_word: קִבָּצָה
  english_pob_choice: she gathered them
  chosen_spanish: los reunió
  alternatives_spanish:
  - los juntó
  - los recogió
  - los amontonó
  lexicon: HALOT
  rationale: El sujeto femenino es Samaria personificada. «Reunió» es una forma natural de קבץ y funciona bien con el objeto implícito del contexto, sin sobreexplicar.
- source_word: וְעַד אֶתְנַן זוֹנָה יָשׁוּבוּ
  english_pob_choice: and to the wages of a prostitute they will return
  chosen_spanish: y al salario de prostituta volverán
  alternatives_spanish:
  - y volverán al salario de prostituta
  - y nuevamente serán salario de prostituta
  - y al pago de una prostituta volverán
  lexicon: HALOT
  rationale: 'שׁוּב expresa retorno/reversión. «Volverán» preserva esa idea de inversión: lo obtenido mediante idolatría regresa al mismo ámbito de ganancia ilícita.'
theological_decisions:
- issue: Metáfora de prostitución para idolatría y ganancia ilícita
  english_pob_reading: Retain the prostitution language explicitly in the main text
  chosen_spanish_reading: Mantener explícitamente el lenguaje de prostitución en el texto principal
  alternative_spanish_readings:
  - Suavizarlo como 'ganancia inmoral' o 'ingreso idólatra'
  rationale: El hebreo repite אֶתְנַן y זוֹנָה con intención profética. Suavizarlo diluiría la denuncia y ocultaría la relación teológica entre idolatría, infidelidad y juicio.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Referente de los pronombres femeninos
  english_pob_reading: Use 'her' throughout, referring to Samaria personified as a woman/city
  chosen_spanish_reading: Usar 'sus' / 'prostituta' con referencia implícita a Samaria personificada
  alternative_spanish_readings:
  - Reemplazar por 'de ella' o por un impersonal como 'sus' sin personificación
  - hacer explícito 'Samaria'
  rationale: El hebreo conserva la personificación femenina. El español puede mantenerla sin añadir un sujeto explícito, dejando que el contexto del libro identifique a la ciudad.
  doctrine_reference: Translation philosophy §§1, 4
translation_notes:
  revision_awareness: La redacción española sigue la última revisión inglesa al preferir una construcción más natural para el verbo de devastación («haré desolación») y mantener la omisión de la segunda conjunción antes de «todos sus ídolos». También conserva la metáfora sexual y económica del hebreo, tal como la edición inglesa auditada la preservó.
  spanish_consistency_notes:
  - Se mantuvo Yahvé como norma general del proyecto, pero este versículo no contiene el nombre divino explícito.
  - Se prefirió 'imágenes talladas' para פְּסִילִים y 'ídolos' para עֲצָבִים, preservando una distinción léxica útil en español.
  - El orden de los miembros sigue el hebreo de cerca, pero con sintaxis española fluida y publicación-readable.
  - No se usó 'Cristo', 'SEÑOR' ni sustitutos eclesiásticos que oculten el tenor del original.
