theological_decisions:
- issue: Degree of explicitness in the child-sacrifice idiom
  chosen_reading: Retain the Hebrew idiom 'made his son pass through the fire' in the main text
  alternative_readings:
  - He sacrificed his son in the fire
  - He burned his son in the fire
  rationale: The verse strongly alludes to child sacrifice, but the Hebrew expression itself is idiomatic rather than analytically explicit. Preserving the idiom avoids importing a more specific reconstruction than the wording itself states, while a footnote records the likely sense.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it.'
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the project's contested-terms policy for the Tetragrammaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
