    text: También puede entenderse «en tu presencia» o «delante de ti». El griego dice literalmente «delante de tu rostro», preservando una expresión concreta de comparecer ante Dios.
    reason: lexical_alternative
  revision_rationale: Se cambia «humillado» por «deshonrado» para reflejar mejor ἐντέτραμμαι según la revisión final del POB inglés («disgraced») y para mantener la intensificación de la vergüenza con un registro formal y natural en español. Se conserva «delante de tu rostro» y su nota por su fidelidad al giro concreto del griego.
