translation:
  language: es
  text: 'Y el rey David envió a Sadoc y a Abiatar, los sacerdotes[a], diciendo: «Hablen a los ancianos de Judá, diciendo: “¿Por qué serán los últimos en hacer volver al rey a su casa, cuando la palabra de todo Israel ha llegado al rey, a su casa?”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuando el mensaje o la propuesta de todo Israel había llegado al rey en su casa». La expresión hebrea «la palabra de todo Israel» es amplia y puede referirse al informe, la propuesta o la apelación de las tribus para hacer volver a David.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַמֶּלֶךְ דָּוִד
  english_pob_choice: King David
  chosen_spanish: el rey David
  alternatives_spanish:
  - el rey, David
  - David, el rey
  lexicon: HALOT
  rationale: La apposición natural en español mantiene el título real y el nombre propio sin sonar forzada.
- source_word: שָׁלַח
  english_pob_choice: sent to
  chosen_spanish: envió a
  alternatives_spanish:
  - mandó a
  - envió para
  lexicon: HALOT
  rationale: El verbo básico es «enviar»; con אֶל y destinatarios nombrados, «envió a» comunica el despacho del mensaje sin implicar necesariamente una convocatoria.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes ministros
  - los clérigos
  lexicon: HALOT
  rationale: Es la designación directa de Sadoc y Abiatar por su oficio; «sacerdotes» es el equivalente claro y fiel en español.
- source_word: דַּבְּרוּ אֶל
  english_pob_choice: Speak to
  chosen_spanish: Hablad a
  alternatives_spanish:
  - Decid a
  - Hablen a
  lexicon: HALOT
  rationale: El imperativo plural mantiene el valor de hablar dirigiéndose a alguien; «hablad a» preserva la forma y la fuerza del mandato.
- source_word: זִקְנֵי יְהוּדָה
  english_pob_choice: the elders of Judah
  chosen_spanish: los ancianos de Judá
  alternatives_spanish:
  - los ancianos judíos
  - los ancianos de la tribu de Judá
  lexicon: HALOT
  rationale: La construcción de posesión/en dependencia se traduce de forma directa y transparente.
- source_word: לָמָּה תִהְיוּ אַחֲרֹנִים
  english_pob_choice: Why should you be the last
  chosen_spanish: ¿Por qué seréis los últimos
  alternatives_spanish:
  - ¿Por qué vais a ser los últimos
  - ¿Por qué quedaréis los últimos
  lexicon: HALOT
  rationale: El hebreo plantea una pregunta retórica de exhortación; en español, el futuro reproduce mejor la presión retórica que un presente plano.
- source_word: לְהָשִׁיב
  english_pob_choice: to bring back
  chosen_spanish: traer de vuelta
  alternatives_spanish:
  - hacer volver
  - restaurar
  lexicon: HALOT
  rationale: Aquí el causativo de שוב alude a devolver/reconducir al rey a su lugar; «traer de vuelta» es natural y conserva el sentido de retorno.
- source_word: אֶת הַמֶּלֶךְ אֶל בֵּיתוֹ
  english_pob_choice: the king back to his house
  chosen_spanish: al rey de vuelta a su casa
  alternatives_spanish:
  - al rey a su casa
  - al rey de nuevo a su hogar
  lexicon: HALOT
  rationale: «Casa» traduce בית sin especificar «palacio»; «de vuelta» refleja el movimiento de regreso implícito por el contexto.
- source_word: וּדְבַר כָּל יִשְׂרָאֵל
  english_pob_choice: the word of all Israel
  chosen_spanish: la palabra de todo Israel
  alternatives_spanish:
  - el asunto de todo Israel
  - el mensaje de todo Israel
  - la propuesta de todo Israel
  lexicon: HALOT
  rationale: Se conserva la amplitud semántica de דבר sin estrecharla a una sola opción interpretativa; «palabra» mantiene la tensión lexical que el inglés POB también preserva.
- source_word: בָּא אֶל הַמֶּלֶךְ
  english_pob_choice: has come to the king
  chosen_spanish: ha llegado al rey
  alternatives_spanish:
  - vino al rey
  - ha venido al rey
  - ha alcanzado al rey
  lexicon: HALOT
  rationale: El perfecto expresa un hecho ya consumado en el discurso; «ha llegado» es idiomático y fiel al valor resultativo.
- source_word: אֶל בֵּיתוֹ
  english_pob_choice: to his house
  chosen_spanish: a su casa
  alternatives_spanish:
  - en su casa
  - a su hogar
  lexicon: HALOT
  rationale: La repetición hebrea se mantiene de modo sencillo y natural; «casa» conserva la literalidad sin añadir una especificación no requerida.
theological_decisions:
- issue: Sentido de דְבַר כָּל־יִשְׂרָאֵל
  english_pob_reading: The Hebrew phrase 'the word of all Israel' is broad and may refer to the report, proposal, or appeal from the tribes to bring David back.
  chosen_spanish_reading: «la palabra de todo Israel» se conserva como formulación amplia y potencialmente ambigua.
  alternative_spanish_readings:
  - «el mensaje de todo Israel»
  - «la propuesta de todo Israel»
  - «el asunto de todo Israel»
  rationale: La fuente hebrea no obliga a restringir el sustantivo a una sola categoría; mantener la amplitud evita borrar la tensión lexical documentada por el POB inglés.
  doctrine_reference: Ninguna; decisión lexical/hermenéutica de alcance semántico.
translation_notes:
  revision_awareness: Se revisó el expediente inglés y se mantuvo sin cambios sustanciales la lectura amplia de וּדְבַר כָּל־יִשְׂרָאֵל, con una nota española equivalente a la del POB inglés. No se detectaron revisiones aplicadas en el pasaje base.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiere; aquí no aparece el nombre divino.
  - Se mantiene «sacerdotes» para הַכֹּהֲנִים por claridad contextual.
  - Se conserva la estructura de cita interna con comillas españolas y comillas angulares para reflejar el discurso directo anidado.
