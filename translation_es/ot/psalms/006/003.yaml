translation:
  language: es
  text: Sé bondadoso conmigo[a], Yahvé, porque estoy débil; sáname, Yahvé[b], porque mis huesos tiemblan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'ten misericordia de mí'; el hebreo expresa una petición de favor o gracia inmerecida.
    reason: lexical_alternative
  - marker: b
    text: O 'mis huesos están turbados' / 'mis huesos están consternados'; 'huesos' expresa una angustia corporal o interior profunda.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָנֵּנִי
  english_pob_choice: Be gracious to me
  chosen_spanish: Sé bondadoso conmigo
  alternatives_spanish:
  - Ten misericordia de mí
  - Muéstrame favor
  lexicon: HALOT
  rationale: La forma pide favor inmerecido. En español, 'sé bondadoso conmigo' comunica una actitud graciosa y cercana sin reducirla solo a compasión emocional. 'Ten misericordia de mí' sería posible, pero tiende a cargar el matiz hacia piedad más que favor.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton con la forma de uso del proyecto en español, 'Yahvé', en vez de sustituirlo por un título. Esto mantiene la referencia personal del texto hebreo.
- source_word: אֻמְלַל
  english_pob_choice: weak
  chosen_spanish: débil
  alternatives_spanish:
  - languidecido
  - exhausto
  - marchito
  lexicon: HALOT
  rationale: '''Débil'' es la equivalencia española más natural y clara para un estado de desgaste o abatimiento físico. ''Languidecido'' preserva más literalmente la idea de debilitamiento continuo, pero resulta menos natural en esta línea poética.'
- source_word: רְפָאֵנִי
  english_pob_choice: heal me
  chosen_spanish: sáname
  alternatives_spanish:
  - restáurame
  lexicon: HALOT
  rationale: El verbo רפא significa sanar o curar. 'Sáname' mantiene el sentido directo y funciona bien en el tono de lamentación; 'restáurame' amplía demasiado el alcance.
- source_word: נִבְהֲלוּ
  english_pob_choice: are trembling
  chosen_spanish: tiemblan
  alternatives_spanish:
  - están turbados
  - están consternados
  - están aterrados
  lexicon: HALOT
  rationale: Con 'mis huesos' como sujeto, 'tiemblan' expresa de modo idiomático el efecto físico del verbo hebreo y conserva la intensidad corporal. Las alternativas psicológicas son posibles, pero menos concretas aquí.
- source_word: עֲצָמַי
  english_pob_choice: my bones
  chosen_spanish: mis huesos
  alternatives_spanish:
  - todo mi ser
  - mi cuerpo
  lexicon: HALOT
  rationale: Se mantiene el literal 'mis huesos', porque el hebreo usa esa imagen corporal para expresar angustia profunda. En español es comprensible y conserva la fuerza imagética.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: La decisión del proyecto es reproducir el nombre divino en vez de sustituirlo por 'el SEÑOR'. En español, 'Yahvé' preserva la función de nombre propio y es la forma de referencia estable para este corpus.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor del sintagma 'mis huesos tiemblan'
  english_pob_reading: my bones are trembling
  chosen_spanish_reading: mis huesos tiemblan
  alternative_spanish_readings:
  - mis huesos están turbados
  - todo mi ser tiembla
  rationale: Se conserva la imagen concreta del hebreo. En este lamento, 'huesos' funciona como una metonimia de la integridad física y del dolor interior; no se la deshace en una paráfrasis más general.
  doctrine_reference: 'Poética hebrea: metonimia corporal para aflicción integral'
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia y sin cambios en la última pasada de revisión. Se siguió la lectura inglesa aprobada (be gracious / weak / heal / bones trembling) con equivalencias naturales en español y sin añadir matices no sustentados por el hebreo.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה.
  - Se conserva la imagen corporal 'mis huesos' en el texto principal.
  - El tono es poético y de lamentación, con léxico moderno pero reverente.
  - Las notas a pie recogen las alternativas semánticas relevantes sin sobrecargar el texto principal.
