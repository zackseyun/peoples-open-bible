review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura y la mayor parte del sentido del griego: la metáfora agrícola de φυτεία/ἐρριζωμένη, la duración de εἰς τὸν αἰῶνα, y la afirmación pactal sobre Israel como porción y herencia de Dios. Sin embargo, «no fallarán» para οὐκ ἐκλήξουσιν introduce en español una lectura de defecto o incumplimiento más que de permanencia/cesación, y la secuencia «no fallarán todos los días del cielo» suena poco natural. También falta la nota cultural sobre «todos los días del cielo».'
  spanish_quality_summary: El español es generalmente digno y claro, con buena elección de «plantío» y «arraigado». No obstante, «no fallarán» resulta menos natural y potencialmente equívoco en español bíblico contemporáneo. Una reparación menor a «no cesarán» mejora fidelidad y legibilidad. La nota c es redundante porque repite exactamente el texto principal y no aporta una alternativa real; conviene sustituirla por la nota sobre el modismo «todos los días del cielo».
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Dios» está bien. El lenguaje de «porción» y «herencia» preserva la decisión léxica y teológica documentada. La excepción necesaria es abandonar el calco del inglés «fail» y usar un equivalente español que refleje mejor el valor de ἐκλήξουσιν.
  issues:
  - severity: medium
    issue: «no fallarán» para οὐκ ἐκλήξουσιν
    rationale: En español sugiere más naturalmente que no cometerán errores o no incumplirán, no que no cesarán o no llegarán a su fin. El griego, según el propio expediente, apunta a permanencia y no-cesación.
  - severity: medium
    issue: Falta la nota sobre «todos los días del cielo»
    rationale: El POB inglés preserva una nota cultural para esta expresión literal. En español también ayuda a evitar malentendidos y a justificar la literalidad elevada.
  - severity: low
    issue: La nota c no añade información útil
    rationale: Dice «O “Israel es la porción y herencia de Dios”», que es idéntico al texto principal. No preserva una alternativa real ni aclara un problema de traducción.
  revised_spanish_text: Su plantío está arraigado para siempre[a]; no cesarán[b] todos los días del cielo[c], porque Israel es la porción y herencia de Dios.
  revised_footnotes:
  - marker: a
    text: O «arraigado firmemente»; el participio griego expresa un estado duradero y establecido.
    reason: lexical_alternative
  - marker: b
    text: O «no llegarán a su fin» / «no serán cortados». El verbo es raro y apunta a una estabilidad permanente.
    reason: lexical_alternative
  - marker: c
    text: «Todos los días del cielo» es una expresión literal para la duración completa del orden celestial presente.
    reason: cultural_note
  revision_rationale: 'La revisión es pequeña pero necesaria: cambia «no fallarán» por «no cesarán» para reflejar mejor el sentido de ἐκλήξουσιν en español, y reemplaza una nota redundante por la nota cultural sobre «todos los días del cielo», ya atestiguada en el expediente inglés. El resto del verso puede mantenerse.'
