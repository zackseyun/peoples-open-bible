translation:
  language: es
  text: David le capturó[a] 1.700 jinetes[b] y 20.000 hombres de a pie. Entonces David desjarretó[c] todos los caballos de los carros[d], pero dejó suficientes para 100 carros[e].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo usa un sufijo singular, refiriéndose al rey derrotado, Hadadézer.
    reason: source_note
  - marker: b
    text: El texto hebreo dice «1.700 jinetes». El paralelo en 1 Crónicas 18:4 dice «7.000 jinetes».
    reason: textual_variant
  - marker: c
    text: O «dejó inválidos». El verbo hebreo se refiere concretamente a desjarretar a los caballos para inutilizarlos en combate.
    reason: lexical_alternative
  - marker: d
    text: Hebreo «todo el carro» o «toda la fuerza de carros»; aquí se entiende metonímicamente de los caballos del cuerpo de carros, ya que esa es la acción descrita.
    reason: lexical_alternative
  - marker: e
    text: O «pero dejó suficientes de ellos para 100 carros».
    reason: previous_rendering
lexical_decisions:
- source_word: וַיִּלְכֹּד
  english_pob_choice: captured
  chosen_spanish: capturó
  alternatives_spanish:
  - se apoderó de
  - tomó cautivos a
  lexicon: HALOT
  rationale: לכד en contexto bélico significa capturar o apoderarse de una fuerza enemiga. «Capturó» es natural en español y conserva el sentido militar directo.
- source_word: מִמֶּנּוּ
  english_pob_choice: from him
  chosen_spanish: de él
  alternatives_spanish:
  - de ellos
  lexicon: HALOT
  rationale: El sufijo es singular y se refiere al rey derrotado, Hadadézer. El español conserva esa referencia singular con «de él».
- source_word: אֶלֶף וּשְׁבַע מֵאוֹת פָּרָשִׁים
  english_pob_choice: 1,700 horsemen
  chosen_spanish: 1.700 jinetes
  alternatives_spanish:
  - 1.700 de a caballo
  - 1.700 caballeros
  lexicon: HALOT
  rationale: פָּרָשִׁים designa jinetes/caballería. «Jinetes» comunica bien la fuerza montada en español y mantiene la equivalencia militar del texto.
- source_word: וְעֶשְׂרִים אֶלֶף אִישׁ רַגְלִי
  english_pob_choice: 20,000 foot soldiers
  chosen_spanish: 20.000 hombres de a pie
  alternatives_spanish:
  - 20.000 soldados de infantería
  - 20.000 infantes
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «hombre de pie». «Hombres de a pie» conserva esa imagen y contrasta con los jinetes sin forzar un tecnicismo.
- source_word: וַיְעַקֵּר
  english_pob_choice: hamstrung
  chosen_spanish: dejó inútiles
  alternatives_spanish:
  - hamstró
  - cortó los jarretes de
  lexicon: HALOT
  rationale: El verbo aquí describe deshabilitar los caballos de guerra. En español, «dejó inútiles» mantiene la idea de inutilización sin un término técnico poco transparente; la acción física queda implícita en el contexto, como en la decisión inglesa de explicitarla.
- source_word: אֶת כָּל הָרֶכֶב
  english_pob_choice: all the chariot horses
  chosen_spanish: todos los carros de guerra
  alternatives_spanish:
  - todos los caballos de los carros
  - todo el carro de guerra
  lexicon: HALOT
  rationale: רֶכֶב puede referirse metonímicamente al conjunto de carros de guerra/cuerpo de carros. En español, «carros de guerra» es claro; la nota recoge la tensión con la lectura más explícita de caballos que la POB inglesa desarrolla.
- source_word: וַיּוֹתֵר מִמֶּנּוּ
  english_pob_choice: left enough of them
  chosen_spanish: dejó suficientes
  alternatives_spanish:
  - dejó sobrantes
  - reservó
  lexicon: HALOT
  rationale: יתר en hiphil significa dejar, reservar o dejar sobrante. «Dejó suficientes» comunica la cantidad restante necesaria para el número siguiente sin añadir elementos ajenos al hebreo.
- source_word: מֵאָה רָכֶב
  english_pob_choice: for 100 chariots
  chosen_spanish: para 100 carros
  alternatives_spanish:
  - para 100 carros de guerra
  - para 100 carros
  lexicon: HALOT
  rationale: La cláusula final funciona como medida de capacidad para el cuerpo de carros. «Para 100 carros» conserva la brevedad del hebreo y la ambigüedad controlada del sustantivo.
translation_notes:
  revision_awareness: La redacción española sigue el testimonio masorético de 2 Samuel 8:4, manteniendo la cifra de 1.700 jinetes y la clausula final como capacidad para 100 carros. Se tomó en cuenta la lectura inglesa más reciente, que simplifica la conclusión a «left enough for 100 chariots», y la nota permite la alternativa metonímica del hebreo en torno a רֶכֶב.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece el tetragrámaton.
  - «Jinetes» traduce פָּרָשִׁים de manera consistente con el registro militar.
  - «Hombres de a pie» conserva la oposición semántica con los jinetes y evita un tecnicismo innecesario.
  - Se evitó «SEÑOR» y otras convenciones de sustitución no presentes en el versículo.
  - La puntuación y el formato numérico se adaptan a la norma española latina con separador de millares.
