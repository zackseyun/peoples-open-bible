revisions:
- from: Haré del monte de Seír una desolación y un yermo[a], y extirparé de él a los que pasan y vuelven.
  to: Haré del monte de Seír una desolación y un yermo, y eliminaré de él a los que pasan y vuelven[a].
  rationale: Se corrige la nota para que refleje la alternativa y la explicación documentadas en el POB inglés sobre עֹבֵר וָשָׁב. También se ajusta ‘extirparé’ a ‘eliminaré’ para acercarse mejor a la fuerza de ‘cut off’ sin perder naturalidad en español. Se mantiene ‘desolación y un yermo’ porque preserva los dos sustantivos del hebreo y es aceptable, aunque no sea la opción más idiomática posible.
