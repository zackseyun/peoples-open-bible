translation:
  language: es
  text: Entonces Joab tocó la trompeta[a], y todo el pueblo se detuvo, y ya no persiguió a Israel ni siguió peleando.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el cuerno»; שׁוֹפָר se refiere a un cuerno usado como instrumento de señal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְקַע
  english_pob_choice: blew
  chosen_spanish: tocó
  alternatives_spanish:
  - sopló
  - hizo sonar
  lexicon: HALOT
  rationale: En español, con un instrumento de señal, «tocó» comunica de manera natural la acción de dar sonido a la trompeta. «Hizo sonar» sería más explícito, pero menos fluido. «Sopló» puede funcionar, aunque suena algo más literal y menos idiomático.
- source_word: בַּשּׁוֹפָר
  english_pob_choice: the trumpet
  chosen_spanish: la trompeta
  alternatives_spanish:
  - el cuerno
  - el cuerno de carnero
  lexicon: HALOT
  rationale: שׁוֹפָר designa un cuerno usado como instrumento de señal. «Trompeta» es claro y natural en español para un instrumento de aviso. Se conserva la opción de «cuerno» en nota, porque el término hebreo no nombra una trompeta metálica moderna.
- source_word: וַיַּעַמְדוּ כָּל הָעָם
  english_pob_choice: all the people stood still
  chosen_spanish: todo el pueblo se detuvo
  alternatives_spanish:
  - todo el pueblo permaneció quieto
  - todo el pueblo se quedó quieto
  lexicon: HALOT
  rationale: El verbo עמד, en este contexto militar, expresa que dejaron de avanzar. «Se detuvo» comunica el cese de la acción con un español natural, manteniendo la imagen de detención sin forzar un calco.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - las tropas
  lexicon: HALOT
  rationale: El hebreo dice literalmente «el pueblo». Aunque el contexto es militar, conservar «el pueblo» respeta la forma del texto y la amplitud del término, como en la POB en inglés.
- source_word: יִרְדְּפ֥וּ ע֖וֹד אַחֲרֵ֣י יִשְׂרָאֵ֑ל
  english_pob_choice: they no longer pursued Israel
  chosen_spanish: ya no persiguieron más a Israel
  alternatives_spanish:
  - no siguieron persiguiendo a Israel
  - dejaron de perseguir a Israel
  lexicon: HALOT
  rationale: 'רדף אחרי significa «perseguir». Con la negación y עוֹד, la idea es cese continuo: «ya no... más» expresa bien la interrupción de la persecución sin perder el matiz de continuación anterior.'
- source_word: וְלֹא יָסְפוּ עוֹד לְהִלָּחֵם
  english_pob_choice: or continued to fight
  chosen_spanish: ni continuaron peleando
  alternatives_spanish:
  - ni volvieron a pelear
  - ni siguieron combatiendo
  lexicon: HALOT
  rationale: יסף + infinitivo transmite «seguir/continuar» haciendo algo. «Continuaron peleando» reproduce con naturalidad el valor de continuar la acción. «Pelear» es más idiomático para español contemporáneo que un calco más técnico.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el hebreo WLC y concuerda con el audit trail inglés: acción de tocar la señal, detención del pueblo, cese de la persecución y del combate. No hay cambios respecto al último pase revisado.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se preservó «Israel» sin glosa, conforme al original y al uso del audit trail inglés.
  - «El pueblo» refleja el hebreo literal y conserva la amplitud semántica militar del término.
  - 'La estructura coordinada reproduce las dos negaciones finales del hebreo: cese de la persecución y cese del combate.'
