translation:
  language: es
  text: Abram era muy rico[a] en ganado, plata y oro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y Abram era muy rico en ganado, plata y oro».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַבְרָ֖ם
  english_pob_choice: Now Abram
  chosen_spanish: Ahora Abram
  alternatives_spanish:
  - Y Abram
  lexicon: HALOT
  rationale: El ו inicial funciona como marcador discursivo de continuidad narrativa. «Ahora Abram» conserva esa transición de escena de forma natural en español, sin convertirlo en una coordinación pesada. «Y Abram» también sería posible, pero suena menos idiomático al inicio de oración narrativa.
- source_word: כָּבֵ֣ד מְאֹ֑ד
  english_pob_choice: very wealthy
  chosen_spanish: era muy rico
  alternatives_spanish:
  - era muy adinerado
  - era muy próspero
  - era muy pesado
  lexicon: HALOT
  rationale: כָּבֵד literalmente significa «pesado» o «ponderado», pero en este contexto, con la lista de bienes que sigue, expresa abundancia material/riqueza. En español, «rico» comunica mejor ese valor idiomático y mantiene la tensión lexical entre el sentido literal y el contextual. Se evita «pesado» por ser engañoso aquí.
- source_word: בַּ/מִּקְנֶ֕ה
  english_pob_choice: in livestock
  chosen_spanish: en ganado
  alternatives_spanish:
  - en bestias
  - en animales domésticos
  - en hacienda
  lexicon: HALOT
  rationale: מִקְנֶה se refiere a posesión adquirida, especialmente rebaños y animales domésticos en este entorno patriarcal. «Ganado» es una equivalencia clara y bíblicamente adecuada en español. «Hacienda» o «animales domésticos» serían más amplios o menos precisos en este contexto.
- source_word: בַּ/כֶּ֖סֶף
  english_pob_choice: in silver
  chosen_spanish: en plata
  alternatives_spanish:
  - en dinero
  - con plata
  lexicon: HALOT
  rationale: El hebreo enumera categorías de riqueza; aquí כֶּסֶף es el metal precioso, no «dinero» en sentido abstracto. «En plata» mantiene el paralelismo con «en oro» y reproduce la estructura del texto fuente.
- source_word: וּ/בַ/זָּהָֽב
  english_pob_choice: and in gold
  chosen_spanish: y en oro
  alternatives_spanish:
  - y con oro
  lexicon: HALOT
  rationale: זָהָב es «oro» literalmente. La coordinación final «y en oro» conserva el inventario de bienes y el paralelismo con «en plata».
translation_notes:
  revision_awareness: El texto inglés POB fue revisado desde «rich» a «wealthy» para acercarse mejor al matiz formal de כָּבֵד y para mantener naturalidad al eliminar repeticiones de «in». La versión española sigue esa línea semántica, pero opta por «rico» por ser la forma idiomática más transparente y publicable en español, sin perder la referencia al estado de abundancia material.
  spanish_consistency_notes:
  - Se mantiene «Abram» sin adaptación del nombre, conforme al proyecto.
  - Se traduce la lista de bienes con preposición repetida solo donde el español la sostiene de manera natural («en ganado, en plata y en oro»).
  - No se introduce «SEÑOR» ni terminología teológica adicional, porque el versículo no contiene el tetragrámaton ni una decisión doctrinal explícita.
