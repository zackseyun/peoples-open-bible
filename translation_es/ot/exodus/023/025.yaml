    rationale: El expediente inglés tiene una nota sobre «bread» y otra sobre la alternativa «disease» para «sickness». En español, la primera debe ir con «pan» y la segunda debe ofrecer una alternativa española real para מַחֲלָה, no reproducir el inglés.
  revised_spanish_text: Servirán a Yahvé, su Dios, y él bendecirá su pan[a] y su agua, y quitaré la enfermedad[b] de en medio de ustedes.
