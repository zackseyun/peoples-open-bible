translation:
  language: es
  text: Y si su ofrenda a Yahvé es un holocausto de aves, presentará su ofrenda de las tórtolas o de los pichones de paloma.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: And if
  chosen_spanish: Y si
  alternatives_spanish:
  - Si
  lexicon: HALOT
  rationale: La combinación conjuntiva-condicional introduce un nuevo caso dentro de las instrucciones sacrificiales; «Y si» conserva mejor la continuidad discursiva que un simple «Si».
- source_word: מִן הָעוֹף
  english_pob_choice: from the birds
  chosen_spanish: de aves
  alternatives_spanish:
  - de los pájaros
  - de las aves
  lexicon: HALOT
  rationale: עוף en contexto sacrificial designa aves en general; «aves» es más natural en español bíblico actual que «pájaros» y evita un tono coloquial.
- source_word: עֹלָה
  english_pob_choice: burnt offering
  chosen_spanish: holocausto
  alternatives_spanish:
  - ofrenda quemada
  - ofrenda ascendente
  lexicon: HALOT
  rationale: En español bíblico, «holocausto» es el término cultual consolidado para עֹלָה y comunica la categoría sacrificial específica; «ofrenda ascendente» sería demasiado explicativa y poco natural.
- source_word: קָרְבָּנוֹ
  english_pob_choice: his offering
  chosen_spanish: su ofrenda
  alternatives_spanish:
  - su oblación
  - su ofrenda ritual
  lexicon: HALOT
  rationale: קָרְבָּן es una ofrenda presentada; «ofrenda» transmite bien el sentido básico de algo acercado/presentado sin introducir tecnicismos innecesarios.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - para el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para יהוה: «Yahvé» en el texto principal. La preposición sacrificial expresa destino/propósito con naturalidad en español mediante «para».'
- source_word: וְהִקְרִיב
  english_pob_choice: then he shall present
  chosen_spanish: presentará
  alternatives_spanish:
  - ofrecerá
  - hará presentar
  lexicon: HALOT
  rationale: El hifil de קרב tiene el valor de hacer acercar/presentar una ofrenda; «presentará» conserva el sentido ritual sin forzar una calca como «hará acercar».
- source_word: מִן הַתֹּרִים
  english_pob_choice: from the turtledoves
  chosen_spanish: de entre los tórtolos
  alternatives_spanish:
  - de entre las tórtolas
  - de entre los tórtolos
  lexicon: HALOT
  rationale: תֹּרִים se refiere a tórtolos/tórtolas; «tórtolos» sigue la terminología bíblica española tradicional y es clara en registro culto.
- source_word: אוֹ
  english_pob_choice: or
  chosen_spanish: o
  alternatives_spanish:
  - o bien
  lexicon: HALOT
  rationale: Conjunción disyuntiva directa y natural en español.
- source_word: מִן בְּנֵי הַיּוֹנָה
  english_pob_choice: from the young pigeons
  chosen_spanish: de entre los pichones
  alternatives_spanish:
  - de entre los pichones de paloma
  - de entre los polluelos de paloma
  lexicon: HALOT
  rationale: La expresión idiomática «hijos de la paloma» apunta a aves jóvenes; «pichones» conserva la edad y fluidez en español. Se evita «jóvenes palomas» porque puede sonar menos idiomático en el contexto sacrificial.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton. Conforme al criterio del proyecto, se usa «Yahvé» y no el reemplazo litúrgico «SEÑOR», manteniendo visible el nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor cultual de עֹלָה
  english_pob_reading: burnt offering
  chosen_spanish_reading: holocausto
  alternative_spanish_readings:
  - ofrenda quemada
  - ofrenda ascendente
  rationale: El término español «holocausto» conserva el nombre técnico de la categoría sacrificial de עֹלָה en un registro bíblico estándar. No se opta por una paráfrasis explicativa que diluya la fuerza cultual.
  doctrine_reference: Lexical tradition in sacrificial terminology; no separate doctrine citation
- issue: Especie aviar permitida
  english_pob_reading: turtledoves / young pigeons
  chosen_spanish_reading: tórtolos / pichones
  alternative_spanish_readings:
  - tórtolas / pichones
  - tórtolos / palominos
  rationale: La pareja lexical refleja dos tipos de aves permitidas. «Pichones» preserva la noción de juventud de בְּנֵי הַיּוֹנָה sin sobrerinterpretar la especie, y «tórtolos» es un equivalente bíblico español reconocible.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'La redacción sigue el pasaje hebreo directamente y está en alta concordancia con el audit trail inglés. Se ajustaron dos decisiones al español: se usa «Yahvé» conforme al estándar del proyecto, y se eligieron «holocausto», «tórtolos» y «pichones» por naturalidad bíblica en español sin perder el matiz técnico.'
  spanish_consistency_notes:
  - Se mantuvo el nombre divino Yahvé en vez de «SEÑOR», conforme a la política del proyecto.
  - «Holocausto» se usa como término cultual técnico para עֹלָה, no en su uso moderno general.
  - «Tórtolos» y «pichones» reflejan la distinción de las dos aves permitidas sin añadir información inexistente en el hebreo.
  - La estructura condicional «Y si… presentará…» preserva el encadenamiento legal del hebreo con una sintaxis fluida en español.
