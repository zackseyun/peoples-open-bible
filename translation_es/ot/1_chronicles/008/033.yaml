translation:
  language: es
  text: Ner engendró a Quis, y Quis engendró a Saúl, y Saúl engendró a Jonatán, a Malqui-súa, a Abinadab y a Esbaal[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Esbaal es llamado Ish-boset en 2 Samuel.
    reason: alternative_reading
lexical_decisions:
- source_word: הוֹלִיד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - procreó
  lexicon: HALOT
  rationale: En una genealogía, el verbo causativo expresa descendencia directa. «Engendró» conserva bien la fuerza genealógica en español y es más natural que una perífrasis como «fue padre de»; también evita una intensidad semántica innecesaria de «procreó».
- source_word: נֵר
  english_pob_choice: Ner
  chosen_spanish: Ner
  alternatives_spanish:
  - Néer
  lexicon: Transliteración estándar del nombre propio
  rationale: Es un nombre propio; se mantiene transliterado para respetar la forma del hebreo y la convención bíblica en español.
- source_word: קִישׁ
  english_pob_choice: Kish
  chosen_spanish: Quis
  alternatives_spanish:
  - Kish
  lexicon: Transliteración estándar del nombre propio
  rationale: En español bíblico es normal adaptar la grafía inicial de ק a «Qu-» en algunos nombres tradicionales; «Quis» resulta legible y conserva la identidad del nombre sin depender del inglés. Se preserva la pronunciación aproximada con una forma natural en español.
- source_word: שָׁאוּל
  english_pob_choice: Saul
  chosen_spanish: Saúl
  alternatives_spanish:
  - Saul
  lexicon: Transliteración estándar del nombre propio
  rationale: «Saúl» es la forma tradicional y clara en español, con acento gráfico conforme a la pronunciación llana aguda del nombre.
- source_word: יְהוֹנָתָן
  english_pob_choice: Jonathan
  chosen_spanish: Jonatán
  alternatives_spanish:
  - Jehonatán
  - Jonathan
  lexicon: Transliteración estándar del nombre propio
  rationale: El nombre hebreo aquí es Yehonatan; en español bíblico la forma reconocible y fiel es «Jonatán», que comunica el nombre sin importar una transliteración más técnica.
- source_word: מַלְכִּי שׁוּעַ
  english_pob_choice: Malchi-shua
  chosen_spanish: Malqui-Quisúa
  alternatives_spanish:
  - Malqui-shúa
  - Malki-shua
  lexicon: Transliteración del nombre compuesto
  rationale: El nombre es compuesto; se conserva con guion para reflejar la estructura del hebreo. «Malqui» sigue la primera parte del nombre de manera natural en español, y «Quisúa» adapta la segunda parte con una grafía legible. Se evita aplanar el nombre en una forma no compuesta.
- source_word: אֲבִינָדָב
  english_pob_choice: Abinadab
  chosen_spanish: Abinadab
  alternatives_spanish:
  - Abinadab
  lexicon: Transliteración estándar del nombre propio
  rationale: Forma ya establecida y transparente en español bíblico.
- source_word: אֶשְׁבָּעַל
  english_pob_choice: Eshbaal
  chosen_spanish: Esbaal
  alternatives_spanish:
  - Eshbaal
  - Ish-boset
  lexicon: Transliteración del nombre propio
  rationale: Se refleja la forma hebrea de Crónicas sin armonizarla con 2 Samuel. «Esbaal» mantiene la relación con el original y evita introducir una tradición textual ajena en el texto principal.
theological_decisions:
- issue: Nombre final de los descendientes de Saúl en 1 Crónicas frente a la forma de 2 Samuel
  english_pob_reading: The main text uses Eshbaal, with a footnote noting that 2 Samuel calls him Ish-bosheth.
  chosen_spanish_reading: El texto principal usa Esbaal, con nota sobre la forma alternativa de 2 Samuel.
  alternative_spanish_readings:
  - Ish-boset
  - Ish-bosheth
  rationale: No hay diferencia doctrinal, sino una cuestión de forma textual y tradición de traducción. Como el hebreo de Crónicas dice explícitamente אֶשְׁבָּעַל, el texto principal debe reflejar esa forma; la variante conocida de 2 Samuel se conserva en nota para orientar al lector sin desplazar la lectura del original.
  doctrine_reference: Primacía del texto hebreo en la traducción; decisión de forma textual, no doctrinal.
translation_notes:
  revision_awareness: El borrador sigue el pasaje hebreo de Crónicas y preserva la decisión auditada del POB inglés de reflejar la forma del texto fuente en el nombre final, sin armonizarla con la variante de Samuel. No se registraron revisiones adicionales en el paquete fuente.
  spanish_consistency_notes:
  - Se mantuvo una serie genealógica uniforme con el verbo «engendró» para todos los miembros de la línea.
  - Los nombres propios se transliteran de modo consistente y legible para un lector bíblico en español.
  - La nota textual se ancla sólo en el nombre final, donde el paquete fuente documenta la variante de 2 Samuel.
