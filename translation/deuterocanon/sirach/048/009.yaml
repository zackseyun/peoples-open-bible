translation:
  text: who was taken up into the heavens in a storm[a], and in ranks of fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''who was taken up in a storm of fire, in a chariot of fiery horses.'' This fuller wording makes the allusion to Elijah in 2 Kings 2:11 more explicit.'
    reason: alternative_reading
lexical_decisions:
- source_word: הנלקח
  chosen: who was taken up
  alternatives:
  - who was taken
  - who was carried away
  lexicon: HALOT
  rationale: Passive participle of לקח, here in Elijah context, denotes being taken up/removed. The Greek parallel ἀναλημφθείς supports an upward assumption sense rather than merely 'taken.'
- source_word: בסערה
  chosen: in a storm
  alternatives:
  - in a whirlwind
  - in a tempest
  lexicon: HALOT
  rationale: סערה commonly means storm/tempest. Although 2 Kings 2:11 has the traditional 'whirlwind,' this Hebrew witness reads the broader term, and the Greek λαῖλαψ likewise means stormwind/whirlwind. 'Storm' keeps close to the extant wording without importing the exact Kings phrasing.
- source_word: מעלה
  chosen: into the heavens
  alternatives:
  - upward
  - on high
  - above
  lexicon: HALOT
  rationale: The form is difficult in isolation, but in context and with the Greek parallel it indicates upward/heavenward movement. Rendering 'into the heavens' makes explicit the directional sense implied by the Hebrew and Elijah tradition, while remaining faithful to the ascent context.
- source_word: ובגדודי אש
  chosen: and in ranks of fire
  alternatives:
  - and with troops of fire
  - and in bands of fire
  - and with chariots of fire
  lexicon: HALOT
  rationale: גדודים normally denotes bands, troops, or ranks. The Hebrew witness does not explicitly say 'chariot,' though the Greek has ἐν ἅρματι ἵππων πυρίνων ('in a chariot of fiery horses'). To honor original-language primacy, the main text follows the Hebrew 'ranks/bands of fire,' while preserving the Greek-based alternative in a footnote.
- source_word: שמים
  chosen: the heavens
  alternatives:
  - heaven
  - sky
  lexicon: HALOT
  rationale: The plural form naturally yields 'heavens.' This also fits the upward-ascent imagery in context.
