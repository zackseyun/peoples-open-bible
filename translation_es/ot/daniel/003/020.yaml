review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del arameo: el rey manda a ciertos hombres de su fuerza militar que aten a Sadrac, Mesac y Abednego y los echen al horno. Sin embargo, suaviza un poco גִּבָּרֵי חַיִל al decir solo «hombres valientes», donde el original y la auditoría inglesa conservan mejor la idea de hombres poderosos/de guerra. Además, la nota al pie no preserva bien la alternativa inglesa tradicional, porque repite prácticamente la misma frase en vez de reflejar la opción equivalente a «horno ardiente de fuego».'
  spanish_quality_summary: El español es generalmente claro y natural, pero la sintaxis con dos «que» seguidos puede mejorarse levemente. «Mandó a ciertos guerreros valientes de su ejército atar...» fluye mejor y conserva el registro narrativo. «Horno de fuego ardiente» es inteligible, aunque «horno ardiente de fuego» funciona mejor como alternativa tradicional en la nota.
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé, Mesías o esclavo. Los nombres propios están bien en formas bíblicas españolas tradicionales: «Sadrac, Mesac y Abednego». La principal cuestión léxica es גִּבָּרֵי חַיִל, para la cual «guerreros valientes» o «hombres poderosos de valor» se alinea mejor con el matiz militar documentado que «hombres valientes» a secas.'
  issues:
  - severity: medium
    issue: «hombres valientes» debilita el matiz militar y de fuerza de גִּבָּרֵי חַיִל
    rationale: La expresión aramea describe hombres poderosos/capaces en contexto militar, no solo personas valientes en general. «Guerreros valientes» preserva mejor fuerza y ambiente castrense.
  - severity: medium
    issue: La nota al pie no refleja adecuadamente la alternativa tradicional documentada
    rationale: La auditoría inglesa conserva una alternativa equivalente a «into the burning fiery furnace». La nota española actual repite esencialmente la lectura principal y añade una opción no tan claramente anclada a esa tradición.
  - severity: low
    issue: La construcción con dos subordinadas introducidas por «que» resulta algo pesada
    rationale: No es infiel, pero se puede mejorar la legibilidad en español moderno con una estructura más directa sin perder formalidad.
  revised_spanish_text: Y mandó a ciertos guerreros valientes de su ejército atar a Sadrac[a], Mesac y Abednego, para echarlos en el horno de fuego ardiente.
  revised_footnotes:
  - marker: a
    text: 'O, de manera más tradicional: «en el horno ardiente de fuego».'
    reason: lexical_alternative
  revision_rationale: Se ajusta «hombres valientes» a «guerreros valientes» para reflejar mejor el modismo militar גִּבָּרֵי חַיִל en contexto. Se aligera la sintaxis para una lectura más natural en español digno y moderno. Se corrige la nota al pie para que preserve de manera clara la alternativa tradicional documentada en la auditoría inglesa, en vez de repetir casi la misma frase de la línea principal.
