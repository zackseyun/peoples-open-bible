lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y ... dijo
  alternatives_spanish:
  - Entonces ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo marca avance narrativo; en español, «Y ... dijo» conserva esa secuencia sin forzar una precisión temporal mayor que la del hebreo.
- source_word: יִרְמְיָהוּ
  english_pob_choice: Jeremiah
  chosen_spanish: Jeremías
  alternatives_spanish:
  - Jeremiah
  lexicon: Convención onomástica bíblica en español
  rationale: Se usa la forma española establecida del nombre propio, natural y reconocible en lectura bíblica en español.
- source_word: הָיָה דְבַר־יְהוָה אֵלַי
  english_pob_choice: The word of Yahweh came to me
  chosen_spanish: La palabra de Yahvé vino a mí
  alternatives_spanish:
  - La palabra de Yahvé fue para mí
  - La palabra de Yahvé me llegó
  lexicon: HALOT
  rationale: Se conserva la fórmula profética con un verbo de movimiento en español («vino») que comunica bien la irrupción de la comunicación divina, sin borrar la base hebrea de היה + דבר + אלי.
- source_word: דְבַר
  english_pob_choice: word
  chosen_spanish: palabra
  alternatives_spanish:
  - mensaje
  lexicon: HALOT
  rationale: «Palabra» mantiene el paralelismo y la fórmula profética tradicional del término דבר, con mayor cercanía lexical que «mensaje».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton en español: «Yahvé», preservando el nombre divino en lugar de una sustitución titular.'
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - para mí
  lexicon: HALOT
  rationale: La preposición y sufijo de primera persona se reflejan de manera directa con «a mí», que funciona naturalmente en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  lexicon: HALOT
  rationale: «Diciendo» reproduce la introducción formularia del discurso en español bíblico actual; «para decir» sería menos natural aquí.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El audit trail inglés explicita que el texto hebreo usa el Tetragrámaton y que el proyecto lo vierte como nombre propio. En español, la forma de proyecto «Yahvé» conserva esa decisión y evita la sustitución tradicional por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El pasaje inglés fue revisado sin cambios sustanciales; el acuerdo de revisión es alto. Por eso el español sigue de cerca la estructura del hebreo y la decisión lexical ya auditada, sin introducir nuevas interpretaciones.
  spanish_consistency_notes:
  - Se mantiene el nombre divino como «Yahvé» conforme al estándar del proyecto.
  - 'Se conserva la fórmula profética con orden natural en español: «La palabra de Yahvé vino a mí».'
  - El cierre con «diciendo» queda abierto porque funciona como enlace discursivo al contenido del versículo siguiente.
