translation:
  language: es
  text: Tus adversarios rugieron en medio de tu lugar designado[a]; pusieron sus propias señales[b] como señales.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tu lugar de reunión designado». מוֹעֵד puede referirse al lugar de encuentro, a una asamblea o, en otros contextos, al tiempo señalado; aquí probablemente alude al lugar sagrado.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «sus señales». El hebreo repite «señales»: «pusieron sus señales [como] señales», probablemente refiriéndose a emblemas o estandartes puestos como marca de posesión o triunfo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁאֲגוּ
  english_pob_choice: roared
  chosen_spanish: rugieron
  alternatives_spanish:
  - bramaron
  - aullaron
  lexicon: HALOT
  rationale: El hebreo expresa un rugido violento y amenazante, no solo un grito. «Rugieron» conserva bien la fuerza animal y hostil del verbo.
- source_word: צֹרְרֶיךָ
  english_pob_choice: your adversaries
  chosen_spanish: tus adversarios
  alternatives_spanish:
  - tus enemigos
  - tus opresores
  lexicon: HALOT
  rationale: «Adversarios» mantiene el matiz de oposición hostil sin reducirlo solo a enemistad general. Funciona bien en un contexto de profanación del santuario.
- source_word: בְּקֶרֶב
  english_pob_choice: in the midst of
  chosen_spanish: en medio de
  alternatives_spanish:
  - dentro de
  - en el centro de
  lexicon: HALOT
  rationale: La expresión española «en medio de» reproduce la fuerza espacial e ինտensiva de la frase hebrea de forma natural.
- source_word: מוֹעֲדֶךָ
  english_pob_choice: your appointed place
  chosen_spanish: tu lugar señalado
  alternatives_spanish:
  - tu lugar de reunión señalado
  - tu lugar de cita señalado
  - tu lugar designado
  lexicon: HALOT
  rationale: מועֵד puede ser tiempo señalado, reunión o lugar señalado. Aquí, por el contexto de invasión del espacio sagrado, «lugar señalado» conserva la ambigüedad útil del hebreo sin añadir «reunión» más de lo que exige el texto.
- source_word: שָׂמוּ
  english_pob_choice: they set up
  chosen_spanish: pusieron
  alternatives_spanish:
  - colocaron
  - levantaron
  - establecieron
  lexicon: HALOT
  rationale: El verbo hebreo es general para poner o colocar. «Pusieron» es fiel y permite enlazar con el objeto hostil que sigue.
- source_word: אוֹתֹתָם
  english_pob_choice: their own signs
  chosen_spanish: sus propias señales
  alternatives_spanish:
  - sus propias insignias
  - sus propias enseñas
  - sus propios signos
  lexicon: HALOT
  rationale: «Señales» puede abarcar emblemas, insignias o estandartes sin fijar indebidamente una imagen concreta. El posesivo explícito «propias» refleja el sufijo hebreo y refuerza el contraste.
- source_word: אֹתוֹת
  english_pob_choice: as signs
  chosen_spanish: como señales
  alternatives_spanish:
  - como signos
  - por señales
  lexicon: HALOT
  rationale: La repetición enfática del sustantivo se conserva con «señales... como señales». En español, «como señales» mantiene la predicación final sin sonar forzado.
theological_decisions:
- issue: Sentido de מוֹעֵד en un lamento por profanación del templo
  english_pob_reading: 'locative/cultic: ''appointed place'''
  chosen_spanish_reading: «lugar señalado» con sentido cultual-locativo
  alternative_spanish_readings:
  - lugar de reunión
  - lugar de cita
  - tiempo señalado
  rationale: El contexto inmediato habla de invasión del espacio sagrado, no solo de una fecha litúrgica. «Lugar señalado» preserva la referencia cultual y deja visible la amplitud semántica del hebreo sin cerrar indebidamente la interpretación.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Repetición de אוֹתֹת / אֹתוֹת y su valor retórico
  english_pob_reading: they set their signs as signs
  chosen_spanish_reading: pusieron sus propias señales como señales
  alternative_spanish_readings:
  - pusieron sus propias insignias como signos
  - pusieron sus propios signos como señales
  rationale: La repetición hebrea es enfática y sugiere que los símbolos enemigos ocuparon el lugar de las señales legítimas. El español conserva esa tensión repitiendo «señales» sin suavizar la confrontación semántica.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'El texto español sigue la revisión más reciente del POB inglés al preferir una formulación directa para מוֹעֵד y al conservar la repetición de ‘signs’. También toma en cuenta la observación de legibilidad: por eso se eligió un equivalente español natural para la duplicación retórica, sin perder la literalidad sustancial del hebreo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo lo requiera explícitamente; aquí no aparece.
  - «Señales» se eligió para conservar la repetición y mantener un registro bíblico claro, evitando una paráfrasis más interpretativa.
  - «Lugar señalado» intenta reflejar la ambigüedad cultual de מוֹעֵד sin imponer «reunión» como si fuera seguro en el verso.
