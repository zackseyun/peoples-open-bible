review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la escena general: remoción forzada coordinada por autoridades locales, castigos extremos, y enemigos conmovidos hasta llorar. Sin embargo, hay varios desajustes respecto del griego y del audit trail inglés: (1) μετὰ πικρίας ἀνοίκτου ψυχῆς queda debilitado en «con la amargura de un espíritu despiadado», porque pierde el matiz de crueldad/misericordia implacable que el inglés documenta; (2) «eran expulsados» es posible contextualmente, pero el POB inglés preserva en texto principal la imagen verbal de “ser enviados fuera” y reserva la coerción para la nota; (3) «estrategas» en español moderno suena sobre todo a expertos en estrategia, no a funcionarios, y reduce la legibilidad eclesial; (4) la nota [c] está anclada correctamente, pero su rationale en el paquete inglés corresponde a la explicación de «common pity», mientras el inglés marcó erróneamente b en la traducción; el español puede resolverlo limpiamente sin copiar esa inconsistencia.
    En conjunto, requiere ajuste menor-medio, no rechazo.'
  spanish_quality_summary: El español es generalmente fluido y digno, pero «estrategas de cada ciudad» resulta poco natural y potencialmente engañoso para lectores comunes. «Compasión común» suena aceptable, aunque «compasión humana común» o mantener la nota explicativa ayuda. «Lamentable destierro» es legible, pero «deportación» refleja mejor la cognación con ἐξαπεστέλλοντο / ἐξαποστολή y el audit trail. La sintaxis general funciona bien.
  glossary_alignment: No hay términos teológicos mayores en juego. La principal alineación léxica pendiente es respetar la política del POB de mantener en texto la transparencia de ἐξαπεστέλλοντο como «eran enviados fuera» y explicar en nota la remoción forzada; además, «στρατηγοί» debe verterse con un término español claro, idealmente «generales» con nota contextual, en vez de «estrategas».
  issues:
  - severity: medium
    issue: «estrategas» para στρατηγῶν
    rationale: Aunque etimológicamente cercano, en español actual «estratega» normalmente no designa a un magistrado u oficial local; afecta la claridad y se aparta del audit trail, que prefirió «generals» con aclaración contextual.
  - severity: medium
    issue: «eran expulsados» como texto principal para ἐξαπεστέλλοντο
    rationale: El contexto sí implica coerción, pero la decisión auditada del POB fue conservar la imagen literal «eran enviados fuera / enviados lejos» en el texto y dejar «deportados / expulsados» como alternativas en nota.
  - severity: medium
    issue: Atenuación de μετὰ πικρίας ἀνοίκτου ψυχῆς
    rationale: «Con la amargura de un espíritu despiadado» no expresa tan claramente la crueldad implacable del griego y del inglés auditado («bitter cruelty of a merciless spirit»).
  - severity: low
    issue: «destierro» para τὴν δυσάθλιον ἐξαποστολήν
    rationale: Es comprensible, pero «deportación» conserva mejor la relación con el verbo precedente y comunica con más precisión la remoción forzada estatal.
  revised_spanish_text: Porque así, con la amarga crueldad de un espíritu despiadado, eran enviados fuera[a] todos juntos por los generales de cada ciudad[b], de modo que, además de los castigos exorbitantes, aun algunos de sus enemigos, al tener delante de sus ojos la compasión común[c] y considerar la incierta ruina de su vida, lloraban por su lamentable deportación.
