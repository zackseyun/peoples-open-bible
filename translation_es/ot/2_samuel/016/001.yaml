translation:
  language: es
  text: Cuando David había pasado un poco más allá de la cumbre[a], he aquí que Ziba, el siervo de Mefiboset[b], salió a recibirlo con un par de asnos ensillados, y sobre ellos había doscientos panes, cien racimos de pasas, cien frutos de verano[c] y un odre de vino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «un poco de la cabeza»; aquí «cabeza» se entiende como la cima o parte alta del monte.'
    reason: lexical_alternative
  - marker: b
    text: «Siervo» también puede traducirse «joven» o «atendiente»; aquí el contexto favorece el papel de Ziba como siervo de Mefiboset.
    reason: lexical_alternative
  - marker: c
    text: «Frutos de verano» puede referirse más específicamente a higos, pero el término hebreo es más amplio.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/דָוִ֗ד עָבַ֤ר מְעַט֙ מֵֽ/הָ/רֹ֔אשׁ
  english_pob_choice: When David had passed a little beyond the summit
  chosen_spanish: Cuando David había pasado un poco más allá de la cumbre
  alternatives_spanish:
  - Cuando David había pasado un poco más allá de la cima
  - Cuando David había pasado un poco más allá de la cabeza
  lexicon: HALOT
  rationale: רֹאשׁ literalmente es «cabeza», pero en contexto topográfico designa la parte alta o cumbre del cerro. «Cumbre» conserva el sentido espacial con español natural; «cabeza» se reserva solo como alternativa literal, demasiado extraña aquí.
- source_word: וְ/הִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - y he aquí
  - mira
  lexicon: HALOT
  rationale: La partícula introduce una aparición repentina o un giro narrativo. «He aquí» preserva esa fuerza enfática en español bíblico sin volver el verso arcaizante en exceso.
- source_word: צִיבָא נַ֥עַר מְפִי בֹ֖שֶׁת
  english_pob_choice: Ziba the servant of Mephibosheth
  chosen_spanish: Ziba, el esclavo de Mefiboset
  alternatives_spanish:
  - Ziba, el siervo de Mefiboset
  - Ziba, el joven de Mefiboset
  - Ziba, el atendiente de Mefiboset
  lexicon: HALOT
  rationale: נַעַר puede significar «joven», «sirviente» o «esclavo/servidor» según el contexto. Aquí el español «esclavo» mantiene la fuerza lexical que el POB inglés ya hizo explícita al preferir «servant» por el rol subordinado de Ziba; «siervo» suaviza demasiado la relación.
- source_word: לִ/קְרָאת֑/וֹ
  english_pob_choice: to meet him
  chosen_spanish: salió a recibirlo
  alternatives_spanish:
  - para encontrarlo
  - a su encuentro
  lexicon: HALOT
  rationale: קָרָא en esta construcción expresa salir al encuentro de alguien. «Salir a recibirlo» comunica bien el movimiento interpersonal y es idiomático en español.
- source_word: וְ/צֶ֨מֶד חֲמֹרִ֜ים
  english_pob_choice: with a pair of saddled donkeys
  chosen_spanish: con una pareja de asnos ensillados
  alternatives_spanish:
  - con dos asnos ensillados
  - con un yugo de asnos ensillados
  lexicon: HALOT
  rationale: צֶמֶד denota una pareja, a menudo un par apareado o yugo. «Pareja de asnos» conserva ese valor; «asnos» es más cercano al término hebreo que «donkeys», y «ensillados» traduce el participio en su función contextual de preparados para montar o cargar.
- source_word: מָאתַ֨יִם לֶ֜חֶם
  english_pob_choice: two hundred loaves of bread
  chosen_spanish: doscientos panes
  alternatives_spanish:
  - doscientos panes de pan
  - doscientas hogazas
  lexicon: HALOT
  rationale: El hebreo usa «pan» como unidad contable. En español, «panes» transmite naturalmente esa cuantificación sin añadir una precisión que el texto no exige.
- source_word: וּ/מֵאָ֧ה צִמּוּקִ֛ים
  english_pob_choice: a hundred clusters of raisins
  chosen_spanish: cien racimos de pasas
  alternatives_spanish:
  - cien pasas
  - cien racimos de uvas pasas
  lexicon: HALOT
  rationale: צִמּוּקִים se refiere a pasas o uvas secas agrupadas/compactadas. «Racimos de pasas» conserva la idea de agrupación y evita estrechar el sentido a una forma procesada específica.
- source_word: וּ/מֵ֥אָה קַ֖יִץ
  english_pob_choice: a hundred summer fruits
  chosen_spanish: cien frutos de verano
  alternatives_spanish:
  - cien frutas de verano
  - cien higos
  lexicon: HALOT
  rationale: קַיִץ puede abarcar fruto de verano en general, quizá higos en algunos contextos, pero el término es más amplio. «Frutos de verano» conserva la amplitud semántica sin imponer una identificación no segura.
- source_word: וְ/נֵ֥בֶל יָֽיִן
  english_pob_choice: a skin of wine
  chosen_spanish: un odre de vino
  alternatives_spanish:
  - una piel de vino
  - un pellejo de vino
  lexicon: HALOT
  rationale: נֵבֶל aquí designa un recipiente de cuero para líquidos. «Odre» es el equivalente natural en español y mantiene la materialidad del contenedor sin redundancia.
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto hebreo y el audit trail inglés; no se registran revisiones posteriores ni cambios de última hora en el pasaje.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto cuando aparezca el nombre divino; este verso no lo contiene.
  - Se prefiere «Mesías» para el título cristológico cuando corresponda; aquí no aparece.
  - Se mantiene un registro bíblico natural en español, pero sin forzar arcaísmos más allá de expresiones como «he aquí» para la partícula narrativa.
  - La cuantificación y los recipientes se ajustan al español idiomático sin borrar la imagen concreta del hebreo.
