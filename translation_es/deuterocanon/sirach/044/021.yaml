translation:
  language: es
  text: Por tanto, se lo confirmó con juramento, para que las naciones fueran bendecidas en su descendencia[a], y para darles en herencia de mar a mar[b] y desde el Río hasta los confines de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo de la edición citada presenta una forma menos estable ('bendecir en su descendencia'); el griego paralelo apoya explícitamente la lectura pasiva, por eso se traduce 'fueran bendecidas'.
    reason: textual_variant
  - marker: b
    text: '''El Río'' es la forma bíblica convencional para el Éufrates en el lenguaje de promesa territorial.'
    reason: cross_reference
lexical_decisions:
- source_word: על כן / διὰ τοῦτο
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Por consiguiente
  lexicon: HALOT; BDAG
  rationale: Expresa con naturalidad el valor inferencial del conector y mantiene el tono solemne del pasaje.
- source_word: בשבועה הקים לו / ἐν ὅρκῳ ἔστησεν αὐτῷ
  english_pob_choice: he confirmed to him with an oath
  chosen_spanish: lo confirmó con juramento
  alternatives_spanish:
  - lo estableció con juramento
  - se lo confirmó con juramento
  lexicon: HALOT; BDAG
  rationale: En español, 'confirmó' reproduce bien la idea de ratificar una promesa o pacto; 'con juramento' conserva el medio solemne. Se omite 'a él' por economía estilística, ya que el complemento está claro por el contexto.
- source_word: לברך בזרעו גוים / ἐνευλογηθῆναι ἔθνη ἐν τῷ σπέρματι αὐτοῦ
  english_pob_choice: that nations would be blessed in his offspring
  chosen_spanish: para que las naciones fueran bendecidas en su descendencia
  alternatives_spanish:
  - para bendecir a las naciones en su descendencia
  - para que las naciones recibieran bendición en su descendencia
  lexicon: HALOT; BDAG
  rationale: '''Fueran bendecidas'' conserva la lectura pasiva apoyada por el griego y evita forzar la agencia. ''Descendencia'' comunica el sentido colectivo de זרע/σπέρμα sin el tono más técnico de ''semilla''.'
- source_word: זרעו / σπέρμα
  english_pob_choice: offspring
  chosen_spanish: descendencia
  alternatives_spanish:
  - descendientes
  - linaje
  - semilla
  lexicon: HALOT; BDAG
  rationale: '''Descendencia'' es el equivalente español más claro para el colectivo de alianza y mantiene la resonancia bíblica sin sonar duro en el registro actual.'
- source_word: להנחילם / κατακληρονομῆσαι αὐτοὺς
  english_pob_choice: to give them as an inheritance
  chosen_spanish: para darles en herencia
  alternatives_spanish:
  - para heredarlos
  - para concederles como herencia
  - para asignarles una herencia
  lexicon: HALOT; BDAG
  rationale: La expresión española 'dar en herencia' reproduce con fidelidad el valor de causativo/herencia del verbo y suena natural en contexto bíblico.
- source_word: מים עד ים / ἀπὸ θαλάσσης ἕως θαλάσσης
  english_pob_choice: from sea to sea
  chosen_spanish: de mar a mar
  alternatives_spanish:
  - de un mar a otro
  - de costa a costa
  lexicon: HALOT; Louw-Nida
  rationale: '''De mar a mar'' es la forma idiomática y bíblica más transparente en español para la fórmula territorial; mantiene la amplitud geográfica sin añadir interpretación.'
- source_word: ומנהר / ἀπὸ ποταμοῦ
  english_pob_choice: from the River
  chosen_spanish: desde el Río
  alternatives_spanish:
  - desde el río
  - desde el Éufrates
  lexicon: HALOT; BDAG
  rationale: Se conserva el artículo enfático tradicional ('el Río') como referencia bíblica convencional al Éufrates, sin expandirlo al nombre propio en el texto principal.
- source_word: עד אפסי ארץ / ἕως ἄκρου γῆς
  english_pob_choice: to the ends of the earth
  chosen_spanish: hasta los confines de la tierra
  alternatives_spanish:
  - hasta los extremos de la tierra
  - hasta el fin de la tierra
  lexicon: HALOT; BDAG
  rationale: '''Confines'' expresa bien el límite extremo y mantiene un registro bíblico digno en español contemporáneo.'
theological_decisions:
- issue: Agencia en la bendición de las naciones
  english_pob_reading: that nations would be blessed in his offspring
  chosen_spanish_reading: para que las naciones fueran bendecidas en su descendencia
  alternative_spanish_readings:
  - para bendecir a las naciones en su descendencia
  - para que las naciones recibieran bendición en su descendencia
  rationale: Se preserva la tensión entre la formulación hebrea infinitiva y el pasivo explícito del griego. El español adopta el pasivo para no resolver unilateralmente la cuestión de la agencia, siguiendo el rastro textual auditado.
  doctrine_reference: Preservar la tensión textual sin armonizarla indebidamente.
- issue: Fórmula territorial de promesa
  english_pob_reading: from sea to sea ... from the River to the ends of the earth
  chosen_spanish_reading: de mar a mar ... desde el Río hasta los confines de la tierra
  alternative_spanish_readings:
  - de un mar a otro ... desde el río hasta los confines de la tierra
  - de mar a mar ... desde el Éufrates hasta los confines de la tierra
  rationale: Se mantiene la fórmula bíblica reconocible y su amplitud universal. 'El Río' conserva la convención intertextual sin cerrar prematuramente la referencia con un nombre propio, aunque el referente implícito sea el Éufrates.
  doctrine_reference: Mantener el lenguaje heredado de la promesa sin sobreexplicarlo.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés POB al omitir cualquier pronombre innecesario tras 'confirmó' y al expresar el infinitivo final como una cláusula final compacta en español ('para darles en herencia'). También se tomó en cuenta la preferencia revisada por una estructura más directa y menos explicativa.
  spanish_consistency_notes:
  - Se conservó 'Yahvé' como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni un equivalente directo.
  - '''Descendencia'' se usa de manera colectiva para זרע/σπέρμα, coherente con otros pasajes de promesa abrahámica.'
  - '''El Río'' mantiene mayúscula por tratarse de un título bíblico convencional, no de un sustantivo común.'
