translation:
  language: es
  text: 'Entonces Elías tomó al muchacho, lo bajó del aposento alto a la casa y lo dio a su madre. Y Elías dijo: «Mira, tu hijo vive[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu hijo está vivo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - agarró
  - recibió
  lexicon: HALOT
  rationale: לקח en narración בדרך כלל se expresa naturalmente con «tomó». Conserva el avance de la acción sin añadir matices de modo que el hebreo no exige.
- source_word: הַיֶּלֶד
  english_pob_choice: the boy
  chosen_spanish: el muchacho
  alternatives_spanish:
  - el niño
  - el chico
  - el muchacho
  lexicon: HALOT
  rationale: En este contexto, el hijo de la viuda ya no sugiere necesariamente un infante; «muchacho» comunica bien la referencia a un hijo joven sin sonar infantil en exceso. Mantiene la relación madre-hijo del relato.
- source_word: וַיֹּרִדֵהוּ
  english_pob_choice: brought him down
  chosen_spanish: lo bajó
  alternatives_spanish:
  - lo hizo bajar
  - lo llevó hacia abajo
  lexicon: HALOT
  rationale: El causativo de ירד expresa hacer descender. «Lo bajó» es breve y natural en español, y conserva el movimiento desde el aposento alto sin sobrerexplicar el medio.
- source_word: הָעֲלִיָּה
  english_pob_choice: the upper room
  chosen_spanish: el aposento alto
  alternatives_spanish:
  - el cuarto alto
  - la habitación de arriba
  - el aposento alto
  lexicon: HALOT
  rationale: עֲלִיָּה designa una estancia superior; «aposento alto» es una opción española bíblicamente transparente y suficientemente precisa para el contexto arquitectónico.
- source_word: הַבַּיְתָה
  english_pob_choice: into the house
  chosen_spanish: a la casa
  alternatives_spanish:
  - dentro de la casa
  - hacia la casa
  - a la casa
  lexicon: HALOT
  rationale: La terminación direccional sugiere movimiento hacia el interior o ámbito de la casa. «A la casa» conserva el destino del movimiento en un español fluido; «dentro de la casa» sería más explícito de lo que el hebreo requiere.
- source_word: וַיִּתְּנֵהוּ לְאִמּוֹ
  english_pob_choice: gave him to his mother
  chosen_spanish: lo dio a su madre
  alternatives_spanish:
  - se lo entregó a su madre
  - lo devolvió a su madre
  - lo entregó a su madre
  lexicon: HALOT
  rationale: נתן con complemento indirecto es «dar a». «Lo dio a su madre» reproduce la relación verbal directa sin introducir la interpretación de «devolver» que el hebreo no explicita.
- source_word: רְאִי
  english_pob_choice: See
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira
  - Ve
  - Mira, pues
  lexicon: HALOT
  rationale: Imperativo femenino singular dirigido a la madre. «Mira» mantiene la inmediatez de la deíxis y suena natural en español contemporáneo.
- source_word: חַי
  english_pob_choice: is alive
  chosen_spanish: vive
  alternatives_spanish:
  - está vivo
  - vive
  lexicon: HALOT
  rationale: El predicado hebreo comunica estado de vida. «Vive» reproduce esa afirmación de forma directa y breve; «está vivo» sería igualmente válido, pero algo más explicativo.
- source_word: בְּנֵךְ
  english_pob_choice: your son
  chosen_spanish: tu hijo
  alternatives_spanish:
  - tu hijo
  - tu muchacho
  lexicon: HALOT
  rationale: בֵּן aquí se refiere al hijo de la madre; «hijo» es el equivalente más natural y preciso en español.
theological_decisions:
- issue: Expresión de la restauración a la vida sin añadir formulación interpretativa
  english_pob_reading: See, your son is alive.
  chosen_spanish_reading: Mira, tu hijo vive.
  alternative_spanish_readings:
  - Mira, tu hijo está vivo.
  - Mira, tu hijo ha vuelto a la vida.
  rationale: El hebreo afirma el estado de vida con sencillez; no añade una explicación del mecanismo del milagro. «Tu hijo vive» conserva la contundencia del enunciado sin expandirlo más allá del texto.
  doctrine_reference: Principio de no parafrasear más allá de lo que el texto fuente permite; mantener la tensión teológica del milagro tal como se expresa narrativamente.
translation_notes:
  revision_awareness: 'Coincide con el sentido del texto fuente y con la auditoría inglesa: no se han introducido cambios doctrinales ni ampliaciones interpretativas; se mantiene la formulación breve del reconocimiento de vida.'
  spanish_consistency_notes:
  - Se preserva el nombre divino no aplicable en este versículo.
  - Se usa «aposento alto» como equivalente bíblico claro para עֲלִיָּה.
  - «Mira» mantiene el imperativo directo y natural del hebreo.
  - La nota a pie conserva la alternativa lexical de «vive»/«está vivo» sin resolver la ambigüedad del predicado hebreo.
