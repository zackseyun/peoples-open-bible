translation:
  language: es
  text: 'Y aconteció en el año duodécimo, en el décimo mes, el quinto día del mes de nuestro destierro, que vino a mí el fugitivo[a] de Jerusalén, diciendo: «La ciudad ha sido abatida[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el sobreviviente de Jerusalén».
    reason: lexical_alternative
  - marker: b
    text: O «La ciudad ha caído». El hebreo dice más literalmente «ha sido golpeada» o «ha sido abatida».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y pasó
  lexicon: HALOT
  rationale: La fórmula narrativa introduce un nuevo episodio. «Aconteció» conserva bien el valor discursivo del hebreo sin sonar mecánico; además es una opción digna y natural en español bíblico actual.
- source_word: בִּשְׁתֵּי עֶשְׂרֵה שָׁנָה
  english_pob_choice: in the twelfth year
  chosen_spanish: en el año doce
  alternatives_spanish:
  - en el duodécimo año
  - en el año duodécimo
  lexicon: HALOT
  rationale: El hebreo usa una fórmula fechada estándar. En español, «año doce» es más natural que una forma demasiado latinizante, pero mantiene el dato temporal con fidelidad.
- source_word: בָּעֲשִׂרִי
  english_pob_choice: in the tenth month
  chosen_spanish: en el décimo mes
  alternatives_spanish:
  - en el mes décimo
  lexicon: HALOT
  rationale: El sentido es claramente calendárico. «Décimo mes» expresa la relación ordinal sin añadir interpretación.
- source_word: בַּחֲמִשָּׁה לַחֹדֶשׁ
  english_pob_choice: on the fifth day of the month
  chosen_spanish: a los cinco días del mes
  alternatives_spanish:
  - el quinto día del mes
  - a cinco del mes
  lexicon: HALOT
  rationale: La expresión hebrea es una fecha convencional. Elegí una forma fluida en español que conserva el marcador temporal y evita un calco demasiado rígido.
- source_word: לְגָלוּתֵנוּ
  english_pob_choice: of our exile
  chosen_spanish: de nuestro destierro
  alternatives_spanish:
  - de nuestro exilio
  - de nuestra cautividad
  lexicon: HALOT
  rationale: «Destierro» comunica la condición de desplazamiento forzado de forma clara y natural. Mantiene la fuerza histórica del término sin borrar el componente de alejamiento de la tierra.
- source_word: הַפָּלִיט
  english_pob_choice: the fugitive
  chosen_spanish: el fugitivo
  alternatives_spanish:
  - el sobreviviente
  - el escapado
  - el refugiado
  lexicon: HALOT
  rationale: «Fugitivo» reproduce mejor la idea de alguien que escapó de la catástrofe. «Sobreviviente» es posible según el contexto, pero la elección principal preserva la tensión léxica que el inglés POB también documenta.
- source_word: מִירוּשָׁלַם
  english_pob_choice: from Jerusalem
  chosen_spanish: de Jerusalén
  alternatives_spanish:
  - desde Jerusalén
  lexicon: HALOT
  rationale: Preposición directa y natural en español para el origen geográfico.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: Funciona como introductor de discurso directo. «Diciendo» conserva la subordinación del hebreo sin necesidad de reestructurar la oración.
- source_word: הֻכְּתָה
  english_pob_choice: has been struck down
  chosen_spanish: ha sido derribada
  alternatives_spanish:
  - ha sido golpeada
  - ha sido herida
  - ha caído
  lexicon: HALOT
  rationale: Aunque el hebreo es más literalmente «ha sido golpeada/smitten», en español «derribada» comunica mejor la imagen de una ciudad sometida y deshecha. Se mantiene el pasivo verbal y la fuerza del evento sin caer en una construcción extraña.
- source_word: הָעִיר
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - la ciudad de Jerusalén
  lexicon: HALOT
  rationale: El hebreo dice simplemente «la ciudad». En español se conserva esa forma, dejando que el contexto identifique Jerusalén.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacían falta cambios; este borrador sigue esa línea y conserva el acuerdo alto con el audit trail inglés, ajustando sólo la redacción al español natural y manteniendo las alternativas léxicas relevantes documentadas por la POB inglesa.
  spanish_consistency_notes:
  - Se conserva la fórmula narrativa inicial con un equivalente natural de וַיְהִי.
  - Se mantiene «el fugitivo» en el texto principal y se deja «el sobreviviente» como alternativa en nota, reflejando la tensión léxica documentada.
  - Se preserva el sujeto indefinido «la ciudad» en vez de explicitar Jerusalén, porque el hebreo también lo deja implícito.
  - La nota sobre «derribada/caído» refleja la alternativa semántica señalada en el audit trail inglés y evita suavizar el verbo hebreo.
