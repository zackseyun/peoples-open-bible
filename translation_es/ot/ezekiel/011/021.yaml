review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: contraste inicial, modismo del corazón que sigue las abominaciones, retribución que recae sobre ellos y fórmula profética final. Sin embargo, hay dos desajustes importantes con el sentido y la documentación: (1) la nota [b] está anclada en «cabeza», pero la alternativa «sus ídolos» corresponde a «sus cosas detestables»; (2) «he puesto su camino sobre su propia cabeza» es demasiado rígido y menos natural que una forma que exprese la retribución efectuada, como «he hecho recaer su camino sobre su propia cabeza».'
  spanish_quality_summary: El español es generalmente claro y digno, pero «he puesto su camino sobre su propia cabeza» suena algo calcado. «Declara el Señor Yahvé» es comprensible, aunque en español bíblico más natural es «declara el Señor, Yahvé» o «declara el Señor Yahvé»; no es un problema grave. El principal problema formal es la ubicación incorrecta de la nota [b].
  glossary_alignment: 'Se respeta bien la terminología del proyecto: «Yahvé» para יהוה, «abominaciones», «corazón», «camino». La elección «cosas detestables» para שִׁקּוּצֵיהֶם es defendible y coherente con el POB. No hay conflicto doctrinal que requiera adjudicación especial.'
  issues:
  - severity: high
    issue: La nota [b] está anclada en «cabeza», pero su contenido explica «sus cosas detestables».
    rationale: El usuario exige que toda nota tenga su marcador exactamente en la palabra o frase pertinente. Aquí la nota alternativa sobre «sus ídolos» debe marcar «cosas detestables», no «cabeza».
  - severity: medium
    issue: «He puesto su camino sobre su propia cabeza» suena demasiado literal y poco idiomático en español.
    rationale: Aunque es cercano al hebreo, en español la idea de retribución se comunica mejor con «he hecho recaer» o «he traído». Esto también armoniza con la decisión inglesa auditada de evitar un calco excesivo.
  - severity: low
    issue: La puntuación antes de la fórmula profética puede ajustarse para mayor naturalidad.
    rationale: «—declara el Señor Yahvé» funciona, pero una coma antes de «declara» o una raya espaciada conforme al estilo editorial puede mejorar la lectura. No afecta el sentido.
