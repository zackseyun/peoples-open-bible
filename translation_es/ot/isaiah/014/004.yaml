translation:
  language: es
  text: 'Entonarás esta burla contra el rey de Babilonia, y dirás: «¡Cómo ha cesado el opresor, ha cesado la insolencia[a]! »'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O quizá: «¡Cómo ha cesado el opresor, ha cesado el asalto/la tiranía exigente!». El hebreo מַדְהֵבָה es raro e incierto; por eso se conserva aquí una traducción interpretativa en vez de la lectura tradicional «ciudad de oro».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָשָׂאתָ
  english_pob_choice: you will take up
  chosen_spanish: tú levantarás
  alternatives_spanish:
  - tomarás
  - elevarás
  - proferirás
  lexicon: HALOT
  rationale: En español, la combinación idiomática más natural para introducir un dicho satírico es «levantar» una burla o refrán; conserva la idea de iniciar/formular el dicho sin sonar forzado. También mantiene el movimiento verbal del hebreo נשא con משל.
- source_word: הַמָּשָׁל הַזֶּה
  english_pob_choice: this taunt
  chosen_spanish: esta burla
  alternatives_spanish:
  - este proverbio
  - este refrán
  - esta sátira
  lexicon: HALOT
  rationale: מָשָׁל puede ser proverbio, dicho o sátira según el contexto. Aquí el tono es claramente despectivo contra el rey de Babilonia; «burla» expresa bien la función discursiva sin perder la referencia a un dicho poético.
- source_word: עַל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - acerca de
  - sobre
  lexicon: HALOT
  rationale: El hebreo introduce el dicho como dirigido hostilmente al rey de Babilonia. «Contra» comunica mejor la fuerza adversativa que una preposición neutral.
- source_word: מֶלֶךְ בָּבֶל
  english_pob_choice: the king of Babylon
  chosen_spanish: el rey de Babilonia
  lexicon: HALOT
  rationale: Construcción directa y transparente; no requiere ajuste especial en español.
- source_word: וְאָמַרְתָּ
  english_pob_choice: and say
  chosen_spanish: y dirás
  alternatives_spanish:
  - y dirás tú
  - y dirás entonces
  lexicon: HALOT
  rationale: El español mantiene con naturalidad el futuro exhortativo/performativo con «dirás» en el marco de la cita introducida.
- source_word: אֵיךְ
  english_pob_choice: How
  chosen_spanish: ¡Cómo!
  alternatives_spanish:
  - ¡Cuán!
  - ¡Ay, cómo!
  lexicon: HALOT
  rationale: La exclamación española «¡Cómo!» reproduce bien el valor retórico y lamentativo/taunt del hebreo en este contexto.
- source_word: שָׁבַת
  english_pob_choice: has ceased
  chosen_spanish: ha cesado
  alternatives_spanish:
  - ha terminado
  - ha parado
  - ha dejado de
  lexicon: HALOT
  rationale: «Ha cesado» conserva la repetición verbal del paralelismo hebreo y es una equivalencia precisa y digna en español bíblico moderno.
- source_word: נֹגֵשׂ
  english_pob_choice: the oppressor
  chosen_spanish: el opresor
  alternatives_spanish:
  - el tirano
  - el exactor
  - el verdugo
  lexicon: HALOT
  rationale: נֹגֵשׂ designa a quien oprime o exacciona. «Opresor» es la opción más clara y amplia en español, y encaja con el tono político del verso.
- source_word: שָׁבְתָה
  english_pob_choice: has ceased
  chosen_spanish: ha cesado
  alternatives_spanish:
  - ha terminado
  - ha parado
  - ha dejado de
  lexicon: HALOT
  rationale: Se repite el mismo verbo para reflejar el paralelismo del hebreo y evitar suavizar la estructura poética.
- source_word: מַדְהֵבָה
  english_pob_choice: the insolence
  chosen_spanish: la insolencia
  alternatives_spanish:
  - la violencia
  - la opresión
  - el exactor
  lexicon: HALOT
  rationale: Siguiendo la revisión inglesa más reciente y la incertidumbre léxica del término raro, «insolencia» ofrece una lectura que conserva el matiz de arrogancia/vehemencia sin introducir una imagen no asegurada como «ciudad de oro».
theological_decisions:
- issue: Tratamiento del término raro מַדְהֵבָה
  english_pob_reading: the insolence
  chosen_spanish_reading: la insolencia
  alternative_spanish_readings:
  - la ciudad de oro
  - la violencia
  - la opresión
  - el asalto
  - la tiranía exigente
  rationale: No es una cuestión doctrinal sino léxica-textual. La traducción española sigue la lectura revisada del POB inglés, que prefirió un sentido derivado de hostilidad/arrogancia frente a una tradición más antigua y lexicográficamente incierta. La nota conserva la alternativa tradicional para transparencia.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Función del dicho sobre Babilonia
  english_pob_reading: this taunt against the king of Babylon
  chosen_spanish_reading: esta burla contra el rey de Babilonia
  alternative_spanish_readings:
  - este proverbio contra el rey de Babilonia
  - esta sátira contra el rey de Babilonia
  rationale: El verso presenta una pieza poética de escarnio profético, no un proverbio general ni una simple observación. «Burla» preserva el tono de juicio y humillación del contexto.
  doctrine_reference: Isaías 14:4–21; Translation philosophy §2
- issue: Valor del exclamativo hebreo en la cita
  english_pob_reading: How ... has ceased
  chosen_spanish_reading: ¡Cómo ha cesado ...!
  alternative_spanish_readings:
  - ¡Cuán ... ha cesado!
  - ¡Ay, cómo ... ha cesado!
  rationale: El exclamativo en español mantiene el lamento y la ironía del hebreo sin aumentar el contenido. No se añade interpretación doctrinal; se conserva la fuerza retórica.
  doctrine_reference: Poética hebrea; Translation philosophy §4
translation_notes:
  revision_awareness: La versión española sigue la revisión inglesa más reciente, que reemplazó la lectura tradicional «the golden city» por «the insolence» para reflejar mejor el probable sentido de מַדְהֵבָה y evitar importar una interpretación antigua pero léxicamente dudosa. Se ha conservado el paralelismo verbal y el tono irónico/triunfal del verso.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este verso no contiene el nombre divino.
  - «Mesías/Cristo» no aplica en este versículo.
  - Se optó por «burla» en lugar de «proverbio» para reflejar el contexto de escarnio contra el rey de Babilonia.
  - Se conservó la repetición de «ha cesado» para respetar la estructura poética hebrea.
