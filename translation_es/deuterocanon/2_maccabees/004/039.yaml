translation:
  language: es
  text: Pero cuando en la ciudad se habían cometido muchos actos de robo de cosas sagradas por Lisímaco[a], con el consentimiento de Menelao, y la noticia[b] se había difundido fuera de la ciudad, la multitud se reunió contra Lisímaco, pues ya habían sido saqueados muchos objetos de oro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «muchos sacrilegios»; el término griego designa más específicamente el robo de bienes sagrados o del templo.
    reason: lexical_alternative
  - marker: b
    text: O «el rumor». El griego φήμη puede significar «noticia», «reporte» o «rumor».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἱεροσυλημάτων
  english_pob_choice: acts of temple robbery
  chosen_spanish: actos de robo de cosas sagradas
  alternatives_spanish:
  - sacrilegios
  - robos de cosas sagradas
  - saqueos del templo
  lexicon: LSJ
  rationale: El griego apunta a robo sacrílego de bienes sagrados; en español, "robo de cosas sagradas" conserva el componente de hurto y la referencia religiosa sin cerrar el sentido solo a un edificio. "Actos" mantiene el plural y la repetición implícita del sustantivo griego.
- source_word: μετὰ τῆς τοῦ Μενελάου γνώμης
  english_pob_choice: with the consent of Menelaus
  chosen_spanish: con el consentimiento de Menelao
  alternatives_spanish:
  - con la aprobación de Menelao
  - con el conocimiento de Menelao
  - por consejo de Menelao
  lexicon: LSJ
  rationale: γνώμη puede expresar opinión, intención, aprobación o asentimiento. "Consentimiento" comunica complicidad o concurrencia en la acción de forma fiel y natural en español, sin atribuirle a Menelao la autoría directa.
- source_word: διαδοθείσης ... τῆς φήμης
  english_pob_choice: the report had spread
  chosen_spanish: la noticia se había difundido afuera
  alternatives_spanish:
  - el rumor se había difundido afuera
  - el reporte se había difundido afuera
  - la fama se había difundido afuera
  lexicon: LSJ
  rationale: φήμη puede ser noticia, reporte o rumor. Aquí el contexto es la difusión pública de los hechos; "noticia" suena neutral en español y evita el matiz despectivo de "rumor". "Se había difundido afuera" reproduce la idea de salir al exterior.
- source_word: ἐπισυνήχθη τὸ πλῆθος
  english_pob_choice: the crowd gathered
  chosen_spanish: la multitud se reunió
  alternatives_spanish:
  - la multitud se congregó
  - el pueblo se reunió
  - la muchedumbre se reunió
  lexicon: LSJ
  rationale: τὸ πλῆθος designa al conjunto numeroso de personas. "La multitud se reunió" es claro y natural en español, preservando el carácter colectivo del sujeto.
- source_word: ἐπὶ τὸν Λυσίμαχον
  english_pob_choice: against Lysimachus
  chosen_spanish: contra Lisímaco
  alternatives_spanish:
  - para confrontar a Lisímaco
  - hacia Lisímaco
  lexicon: LSJ
  rationale: Con el verbo de reunión y el contexto de indignación por el saqueo, ἐπί con acusativo expresa dirección hostil. "Contra" reproduce ese matiz de oposición mejor que una dirección neutra.
- source_word: χρυσωμάτων
  english_pob_choice: gold
  chosen_spanish: objetos de oro
  alternatives_spanish:
  - oro
  - bienes de oro
  - veneros de oro
  lexicon: LSJ
  rationale: El término alude a objetos o valuables de oro. "Objetos de oro" evita reducirlo a metal bruto, y en español permite relacionarlo con bienes saqueados sin añadir una clase específica no presente en el griego.
- source_word: διηρπαγμένων
  english_pob_choice: had already been plundered
  chosen_spanish: habían sido arrebatados
  alternatives_spanish:
  - habían sido saqueados
  - habían sido robados
  - habían sido llevados
  lexicon: LSJ
  rationale: El participio perfecto pasivo indica una acción ya consumada. "Arrebatados" mantiene la violencia del despojo; en la cláusula final se integra con "muchos objetos de oro" para dar el resultado del saqueo.
theological_decisions:
- issue: Naturaleza del delito descrito por ἱεροσυλημάτων
  english_pob_reading: The verse refers specifically to theft of sacred/temple property, not merely general impiety.
  chosen_spanish_reading: El versículo habla específicamente de robo de bienes sagrados, no solo de impiedad general.
  alternative_spanish_readings:
  - sacrilegios cometidos en la ciudad
  - delitos religiosos en la ciudad
  rationale: La fuerza léxica de ἱεροσυλία es robo sacrílego. Mantener esa especificidad preserva la gravedad histórica y religiosa del texto, evitando diluirlo en una noción genérica de impiedad.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; consistency of key terms, or documented exception.'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto griego de Swete y concuerda con el audit trail inglés. Se conservan las dos tensiones principales documentadas: ἱεροσυλημάτων como robo sacrílego de bienes sagrados, y φήμη como noticia/reporte con posible matiz de rumor. No se introdujeron añadidos interpretativos ni terminología eclesiástica no sustentada por el fuente.'
  spanish_consistency_notes:
  - Se usa «Lisímaco» y «Menelao» como formas españolas directas de los nombres propios.
  - Se evita «SEÑOR» o cualquier sustitución litúrgica, porque este versículo no contiene el nombre divino.
  - Se mantiene «multitud» como equivalente de τὸ πλῆθος, en registro natural y apto para lectura pública.
  - Se conserva la referencia explícita al robo de bienes sagrados para no atenuar el peso del griego ἱεροσυλημάτων.
