review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la escena general, pero no preserva con suficiente precisión varios elementos clave del hebreo y del rastro auditado en inglés. נִשְׁקְפָה se entiende mejor como «se asomó» o «miró hacia afuera», no simplemente «miraba». וַתְּיַבֵּב requiere un lamento vocal más fuerte que «se lamentaba». El problema principal está en פַּעֲמֵי מַרְכְּבוֹתָיו: «huellas de sus carros» no encaja bien con el contexto ni con la revisión inglesa, que corrigió hacia «wheels» por exactitud contextual; en español hace falta una formulación que refleje el avance/rodar de los carros, no rastros en el suelo.'
  spanish_quality_summary: El español es legible, pero «miraba» suena algo débil para alguien observando desde una ventana, «se lamentaba» reduce la viveza del lamento, y «las huellas de sus carros» resulta poco natural e imagísticamente confuso. Una revisión breve mejora fidelidad y fluidez.
  glossary_alignment: No hay términos teológicos de proyecto en juego aquí. «Sísara» y «celosía» son aceptables. «Carro/carros» funciona bien para רִכְבּוֹ / מַרְכְּבוֹתָיו en este contexto.
  issues:
  - severity: medium
    issue: «miraba» debilita נִשְׁקְפָה
    rationale: El verbo hebreo describe asomarse o mirar hacia afuera desde una abertura. «Miraba» es demasiado general y pierde el matiz espacial.
  - severity: medium
    issue: «se lamentaba» atenúa el matiz vocal de וַתְּיַבֵּב
    rationale: El verbo raro apunta a un lamento emitido en voz alta; «lamentaba» puede sonar más interno o genérico que «clamó» o «gimió».
  - severity: high
    issue: «las huellas de sus carros» no representa bien פַּעֲמֵי מַרְכְּבוֹתָיו
    rationale: «Huellas» introduce la idea de rastros físicos, mientras que el contexto pregunta por la tardanza del avance de los carros. Además, el audit trail inglés corrigió explícitamente una lectura auditiva previa para acercarse a «wheels». En español conviene una expresión como «las ruedas de sus carros».
  revised_spanish_text: 'Por la ventana se asomó la madre de Sísara, y clamó[a] por la celosía: «¿Por qué se demora tanto su carro en venir? ¿Por qué se retrasan las ruedas[b] de sus carros?»'
  revised_footnotes:
