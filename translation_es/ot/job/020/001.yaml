translation:
  language: es
  text: Entonces Zofar el naamatita respondió y dijo:[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «Y Zofar el naamatita respondió y dijo».'
