translation:
  language: es
  text: Ninguno de los pecados que cometió serán recordados[a] contra él; ha hecho justicia y rectitud; ciertamente vivirá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no serán tenidos en cuenta contra él». El hebreo literalmente dice «no serán recordados para él», con sentido judicial en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל חטאת/ו
  english_pob_choice: None of the sins
  chosen_spanish: Ninguno de los pecados
  alternatives_spanish:
  - Todos los pecados
  - Ningún pecado
  lexicon: HALOT
  rationale: 'El hebreo combina un sustantivo con sufijo posesivo y el cuantificador כָּל en un uso distributivo; por eso, en español, la forma natural y fiel es negativa/distributiva: «ninguno de los pecados». Mantiene el sentido de que no queda ninguno vigente contra la persona.'
- source_word: אֲשֶׁר חָטָא
  english_pob_choice: that he committed
  chosen_spanish: que cometió
  alternatives_spanish:
  - que pecó
  - que hizo
  lexicon: HALOT
  rationale: «Cometió» expresa con naturalidad el acto previo de pecar y evita el calco «que pecó», que suena menos idiomático en este contexto narrativo-jurídico.
- source_word: לֹא תִזָּכַרְנָה ל֑/וֹ
  english_pob_choice: will be remembered against him
  chosen_spanish: será recordado contra él
  alternatives_spanish:
  - no será recordado para él
  - no le será recordado
  - no será tenido en cuenta contra él
  lexicon: HALOT
  rationale: 'El verbo זכר con לֹא ... לֹו tiene fuerza forense: no se le trae a cuenta. «Será recordado contra él» preserva esa tensión judicial sin resolverla con una explicación doctrinal añadida.'
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: justicia
  alternatives_spanish:
  - juicio
  - derecho
  - rectitud
  lexicon: HALOT
  rationale: En el par ético con צְדָקָה, מִשְׁפָּט se refiere a conducta justa; «justicia» es el equivalente más directo y mantiene el paralelismo con «rectitud».
- source_word: וּ/צְדָקָה
  english_pob_choice: righteousness
  chosen_spanish: rectitud
  alternatives_spanish:
  - justicia
  - justeza
  - justicia y rectitud
  lexicon: HALOT
  rationale: Para español, «rectitud» comunica bien la idea moral de צְדָקָה sin duplicar «justicia». Así se conserva el par semántico con una distinción clara y natural.
- source_word: עָשָׂה
  english_pob_choice: has done
  chosen_spanish: ha hecho
  alternatives_spanish:
  - ha practicado
  - ha obrado
  lexicon: HALOT
  rationale: Se mantiene la correspondencia formal con עָשָׂה sin forzar una perífrasis interpretativa. «Ha hecho justicia y rectitud» es sobrio y fiel al hebreo y al audit trail en inglés.
- source_word: חָי֥וֹ יִֽחְיֶֽה
  english_pob_choice: he shall surely live
  chosen_spanish: ciertamente vivirá
  alternatives_spanish:
  - vivirá seguramente
  - sin duda vivirá
  - vivirá, sí, vivirá
  lexicon: HALOT
  rationale: La combinación infinitivo absoluto + imperfecto intensifica la certeza. «Ciertamente vivirá» conserva el énfasis sin sonar artificial en español moderno.
theological_decisions:
- issue: Fuerza forense de la no-rememoración de los pecados
  english_pob_reading: will be remembered against him
  chosen_spanish_reading: será recordado contra él
  alternative_spanish_readings:
  - no le será recordado
  - será tenido en cuenta contra él
  - no será contado contra él
  rationale: El contexto jurídico-moral requiere conservar la idea de que los pecados no vuelven a ser puestos en su contra. Se evita suavizarlo a una simple amnesia subjetiva o a una formulación doctrinal no explícita en el versículo.
  doctrine_reference: Mantener la tensión lexical y judicial del texto sin resolverla dogmáticamente más allá de lo dicho.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y el audit trail en inglés: conserva el valor distributivo de כָּל + חטאת/ו, la fuerza forense de זכר con לֹו, y el paralelismo ético מִשְׁפָּט / צְדָקָה. La revisión inglesa que ajustó ''has practiced'' a ''has done'' se refleja aquí con una construcción simple y directa («ha hecho»), sin perder naturalidad española.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda a otros contextos; en este versículo no aparece el nombre divino.
  - Se evita «Cristo» y cualquier terminología litúrgica no presente en el hebreo.
  - «Pecados» se mantiene en plural distributivo para reflejar el valor de כָּל con el sustantivo singular posesivo.
  - «Justicia y rectitud» distingue mejor מִשְׁפָּט / צְדָקָה que una duplicación con dos veces «justicia».
  - El tono es formal y bíblico, pero no arcaizante.
