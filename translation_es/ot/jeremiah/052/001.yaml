    rationale: El texto principal ya dice 'cuando comenzó a reinar'; la nota 'O “cuando comenzó a reinar”' no aporta alternativa léxica ni preserva la auditoría inglesa, que distingue entre 'when he became king' y 'when he began to reign'.
  - severity: medium
    issue: La nota [b] no refleja correctamente la alternativa respecto a 'de Libna'.
