translation:
  language: es
  text: Pero los magos de Egipto hicieron lo mismo por medio de sus artes secretas[a], y el corazón de Faraón se endureció[b], y no los escuchó, tal como Yahvé había hablado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'con sus encantamientos' o 'por sus artes ocultas'.
    reason: lexical_alternative
  - marker: b
    text: O 'el corazón de Faraón fue endurecido'. El hebreo no expresa de forma explícita en este versículo el agente del endurecimiento.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעֲשׂוּ כֵן
  english_pob_choice: did the same
  chosen_spanish: hicieron lo mismo
  alternatives_spanish:
  - lo hicieron así
  - hicieron lo mismo
  lexicon: HALOT
  rationale: El hebreo expresa un vínculo idiomático con la señal anterior; en español, 'hicieron lo mismo' comunica con naturalidad la repetición o imitación de la acción sin añadir explicaciones.
- source_word: חַרְטֻמֵּי מִצְרַיִם
  english_pob_choice: the magicians of Egypt
  chosen_spanish: los magos de Egipto
  alternatives_spanish:
  - los magos egipcios
  - los magos de los egipcios
  - los hechiceros de Egipto
  lexicon: HALOT
  rationale: '''חרטומים'' en Éxodo designa a los especialistas rituales de la corte faraónica que imitan señales. ''Magos'' es la opción española más clara y funcional en este contexto, sin imponer una precisión técnica no explicitada por el texto.'
- source_word: בְּלָטֵיהֶם
  english_pob_choice: by their secret arts
  chosen_spanish: por medio de sus artes secretas
  alternatives_spanish:
  - con sus encantamientos
  - por sus artes ocultas
  - con su magia
  lexicon: HALOT
  rationale: La preposición בְּ pide un medio o instrumento; 'artes secretas' conserva la idea de prácticas ocultas sin fijar innecesariamente el método. 'Por medio de' transmite bien el matiz instrumental en español.
- source_word: וַיֶּחֱזַק לֵב פַּרְעֹה
  english_pob_choice: Pharaoh’s heart was hardened
  chosen_spanish: el corazón de Faraón se endureció
  alternatives_spanish:
  - el corazón de Faraón fue endurecido
  - Faraón endureció su corazón
  - el corazón de Faraón se puso duro
  lexicon: HALOT
  rationale: El hebreo usa חזק con 'corazón' en forma resultativa/intransitiva y no nombra aquí al agente del endurecimiento. 'Se endureció' preserva ese estado sin resolver la agencia, a diferencia de una forma activa o de una pasiva más interpretativa.
- source_word: וְלֹא שָׁמַע אֲלֵהֶם
  english_pob_choice: he did not listen to them
  chosen_spanish: no les hizo caso
  alternatives_spanish:
  - no los escuchó
  - no les prestó atención
  - no les obedeció
  lexicon: HALOT
  rationale: שׁמע con אֶל puede significar 'escuchar' en el sentido de atender/obedecer. 'No les hizo caso' es una equivalencia idiomática natural en español y conserva la idea de no atender su mensaje.
- source_word: כַּאֲשֶׁר דִּבֶּר יְהוָה
  english_pob_choice: just as Yahweh had spoken
  chosen_spanish: tal como Yahvé había hablado
  alternatives_spanish:
  - tal como Yahvé había dicho
  - como Yahvé había hablado
  - justo como Yahvé había hablado
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como 'Yahvé' según la norma del proyecto. 'Había hablado' conserva el valor retrospectivo del perfecto relativo al hilo narrativo y reproduce la fórmula de cumplimiento sin suavizarla.
theological_decisions:
- issue: Agencia en el endurecimiento del corazón de Faraón
  english_pob_reading: Render the clause as a state/result ('Pharaoh’s heart was hardened') without specifying an external agent.
  chosen_spanish_reading: 'Traducirlo como estado resultante: ''el corazón de Faraón se endureció'', sin asignar explícitamente el agente.'
  alternative_spanish_readings:
  - el corazón de Faraón fue endurecido
  - Faraón endureció su corazón
  rationale: El verso no dice explícitamente que Dios endureció el corazón ni que Faraón lo endureció a sí mismo. La versión española conserva esa tensión textual y evita resolverla con una lectura teológica que el hebreo de este versículo no formula de manera explícita.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el audit trail en inglés. Se mantiene la tensión sobre la agencia del endurecimiento, se conserva el nombre divino 'Yahvé' conforme al estándar del proyecto y se evita una traducción mecanicista de 'shama' y 'bĕlātêhem' que pierda el matiz idiomático e instrumental.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el Tetragrama, en coherencia con la política del proyecto.
  - '''Corazón de Faraón se endureció'' preserva la lectura resultativa/intransitiva sin añadir agente.'
  - '''No les hizo caso'' comunica el valor idiomático de שׁמע אֶל en español natural.'
  - '''Artes secretas'' mantiene la ambigüedad léxica del hebreo y admite alternativas en la nota.'
  - Se emplea 'Faraón' como forma castellana estándar del nombre propio bíblico.
