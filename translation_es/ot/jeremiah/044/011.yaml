  to: 'Por tanto[a], así dice Yahvé de los Ejércitos, Dios de Israel: He aquí, pongo mi rostro contra ustedes para mal[b], para extirpar a toda Judá.'
  rationale: Se reemplaza 'para cortar a toda Judá' por 'para extirpar a toda Judá' para reflejar con claridad וּלְהַכְרִית en español natural y grave, preservando la fuerza de juicio del hebreo. Se mantienen los demás elementos, que ya están bien alineados con la fuente y con la terminología del proyecto.
