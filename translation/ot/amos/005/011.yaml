id: AMO.5.11
reference: Amos 5:11
source:
  edition: WLC
  text: לָ֠/כֵן יַ֣עַן בּוֹשַׁסְ/כֶ֞ם עַל דָּ֗ל וּ/מַשְׂאַת בַּר֙ תִּקְח֣וּ מִמֶּ֔/נּוּ בָּתֵּ֥י גָזִ֛ית בְּנִיתֶ֖ם וְ/לֹא תֵ֣שְׁבוּ בָ֑/ם כַּרְמֵי חֶ֣מֶד נְטַעְתֶּ֔ם וְ/לֹ֥א תִשְׁתּ֖וּ אֶת יֵינָֽ/ם־־־־־׃
translation:
  text: Therefore[a], because you trample on the poor and take a grain tax from him, you have built houses of cut stone, but you will not live in them; you have planted delightful vineyards[c][b], but you will not drink their wine.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'exact levies of grain from him.' The Hebrew expression refers to an imposed burden or tribute consisting of grain.
    reason: lexical_alternative
  - marker: b
    text: Or 'houses of hewn stone.'
    reason: lexical_alternative
  - marker: c
    text: Or 'choice vineyards' or 'pleasant vineyards.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - Therefore
  lexicon: HALOT
  rationale: Marks the verse as a consequence statement flowing from the preceding indictment; 'therefore' preserves the prophetic judicial force better than a looser 'so.'
- source_word: יַעַן
  chosen: because
  alternatives:
  - because
  - inasmuch as
  lexicon: HALOT
  rationale: Introduces the reason for the announced judgment. 'Because' is natural modern English and preserves the causal sense.
- source_word: בּוֹשַׁסְכֶם עַל דָּל
  chosen: you trample on the poor
  alternatives:
  - you trample the poor
  - you oppress the poor
  lexicon: HALOT
  rationale: The verb here conveys abusive crushing/trampling. 'Trample on' vividly reflects the concrete metaphor and fits Amos's social-justice rhetoric better than the more generalized 'oppress.' 'Poor' is the natural rendering of דָּל in this context.
- source_word: וּמַשְׂאַת בַּר תִּקְחוּ מִמֶּנּוּ
  chosen: and take a grain tax from him
  alternatives:
  - and exact levies of grain from him
  - and take tribute of grain from him
  lexicon: HALOT
  rationale: מַשְׂאַת with בַּר refers to a burden/levy consisting of grain. 'Grain tax' communicates the economic exploitation clearly in contemporary English while remaining close to the source. 'From him' keeps the singular poor person in view.
- source_word: בָּתֵּי גָזִית
  chosen: houses of cut stone
  alternatives:
  - houses of hewn stone
  - mansions of hewn stone
  lexicon: HALOT
  rationale: גָזִית denotes dressed/hewn stone. 'Cut stone' is idiomatic modern English and preserves the image of costly, elite construction without overinterpreting as 'mansions.'
- source_word: בְּנִיתֶם
  chosen: you have built
  alternatives:
  - you built
  - you have built
  lexicon: HALOT
  rationale: The perfect is rendered with English present perfect to connect their completed acts with the impending consequence.
- source_word: וְלֹא תֵשְׁבוּ בָם
  chosen: but you will not live in them
  alternatives:
  - but you will not dwell in them
  - yet you will not inhabit them
  lexicon: HALOT
  rationale: יָשַׁב in this housing context means to dwell/live. 'Live in them' is more natural modern English than 'dwell' while preserving the sense.
- source_word: כַּרְמֵי חֶמֶד
  chosen: delightful vineyards
  alternatives:
  - pleasant vineyards
  - choice vineyards
  - desirable vineyards
  lexicon: HALOT
  rationale: חֶמֶד conveys desirability/pleasantness. 'Delightful vineyards' captures the attractive, luxurious quality of what they planted.
- source_word: נְטַעְתֶּם
  chosen: you have planted
  alternatives:
  - you planted
  - you have planted
  lexicon: HALOT
  rationale: As with 'you have built,' the present perfect suits the completed action whose expected benefit will be denied.
- source_word: וְלֹא תִשְׁתּוּ אֶת יֵינָם
  chosen: but you will not drink their wine
  alternatives:
  - but you will not drink the wine from them
  - but you will not drink their wine
  lexicon: HALOT
  rationale: Retains the directness of the Hebrew and the irony of denied enjoyment. 'Their wine' naturally refers to the wine of the vineyards just mentioned.
