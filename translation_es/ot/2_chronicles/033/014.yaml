base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/033/014.yaml
  text: After this he built an outer wall for the city of David[a], west of Gihon in the valley, as far as the entrance of the Fish Gate; it went around Ophel, and he made it very high[c][b]. He also placed military commanders in all the fortified cities in Judah.
  footnotes:
  - marker: a
    text: Or 'and to the entrance of the Fish Gate.' The Hebrew expression may be read as marking the wall's extent toward that gate.
    reason: lexical_alternative
  - marker: b
    text: '''Ophel'' is a place-name in Jerusalem, likely the raised area south of the temple mount.'
    reason: cultural_note
  - marker: c
    text: Or 'encircled Ophel.' The Hebrew verb can emphasize surrounding rather than simply going around.
    reason: lexical_alternative
