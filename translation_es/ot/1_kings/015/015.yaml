review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: verbo de movimiento, complemento de destino, los bienes dedicados de su padre y los suyos, y la aposición final ''plata, oro y utensilios''. También preserva correctamente ''Yahvé'' para יְהוָה. Sin embargo, ''cosas santas'' suena poco natural en español bíblico actual para objetos dedicados y puede sugerir cualidad moral más que bienes consagrados.'
  spanish_quality_summary: La redacción es clara, pero 'las cosas santas... sus propias cosas santas' resulta algo rígida y poco idiomática. 'Las cosas consagradas' mantiene el sentido cultual y mejora notablemente la legibilidad sin sobreinterpretar. El resto de la frase fluye bien.
  glossary_alignment: 'Se alinea con el glosario del proyecto en ''Yahvé''. No hay conflicto con otros términos base. El ajuste principal es léxico-estilístico para קדשׁ: en este contexto ''consagradas'' comunica mejor en español el valor de objetos apartados para Dios, mientras la nota conserva la alternativa más explícita de ''dedicado''.'
  issues:
