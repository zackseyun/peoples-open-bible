lexical_decisions:
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: ἵνα expresa finalidad o resultado; «para que» comunica esa relación de manera natural y solemne en español, sin perder el movimiento prospectivo de la cláusula.
- source_word: δικαιωθῇς
  english_pob_choice: may be vindicated
  chosen_spanish: seas vindicado
  alternatives_spanish:
  - seas justificado
  - seas reconocido como justo
  - seas declarado justo
  lexicon: BDAG
  rationale: Con Dios como sujeto, el pasivo no sugiere que llegue a ser justo, sino que su justicia sea reconocida. «Vindicado» preserva esa fuerza y evita confundir la frase con un cambio moral en Dios.
- source_word: ὁ θεός
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  - Dios mío
  lexicon: BDAG
  rationale: La forma nominativa funciona como vocativo en la oración. «Oh Dios» refleja la dirección de la súplica y mantiene el tono litúrgico.
- source_word: ἐν τῇ δικαιοσύνῃ σου
  english_pob_choice: in your righteousness
  chosen_spanish: en tu justicia
  alternatives_spanish:
  - en tu rectitud
  - en tu justicia/righteousness
  lexicon: BDAG
  rationale: δικαιοσύνη admite aquí «justicia» y «rectitud». Dado el marco forense del verso, «justicia» funciona con claridad en español; se preserva la alternativa en la nota porque el audit trail inglés retiene «righteousness» como lectura principal.
- source_word: ἐν ταῖς ἀνομίαις ἡμῶν
  english_pob_choice: amid our lawless deeds
  chosen_spanish: en medio de nuestros actos de iniquidad
  alternatives_spanish:
  - en medio de nuestras iniquidades
  - entre nuestros actos de iniquidad
  - ante nuestros actos de iniquidad
  lexicon: BDAG
  rationale: ἀνομίαις es más fuerte que un simple «pecados» y apunta a impiedad o transgresión de la ley. «Actos de iniquidad» conserva esa dureza; «en medio de» reproduce el valor espacial/relacional de ἐν sin forzar una causalidad explícita.
theological_decisions:
- issue: Cómo entender δικαιωθῇς cuando el sujeto es Dios
  english_pob_reading: may be vindicated
  chosen_spanish_reading: seas vindicado
  alternative_spanish_readings:
  - seas justificado
  - seas reconocido como justo
  rationale: 'La línea afirma que Dios queda demostrado como justo frente a la conducta humana rebelde. «Vindicado» conserva la tensión teológica: no implica cambio en Dios, sino reconocimiento de su justicia.'
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica sin resolverla prematuramente'
- issue: Cómo rendir δικαιοσύνη en este contexto
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - justicia/rectitud
  rationale: Aunque «righteousness» puede traducirse como «justicia» o «rectitud», el contexto judicial de este verso hace que «justicia» sea la opción más transparente en español. Se mantiene la alternativa porque el campo semántico no se agota en un solo equivalente.
  doctrine_reference: 'DOCTRINE.md contested terms table: δικαιοσύνη → righteousness / justice'
translation_notes:
  revision_awareness: El texto español sigue la última revisión inglesa que vuelve a «amid our lawless deeds»; por eso se eligió «en medio de» en vez de una preposición más interpretativa. También se mantuvo el tono elevado y la construcción de propósito de ἵνα con una formulación idiomática en español.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque el sujeto es explícitamente «Dios».
  - Se prefirió «vindicado» en la lectura principal para conservar la tensión del pasivo aplicado a Dios.
  - «Actos de iniquidad» mantiene la dureza de ἀνομίαις sin suavizarla a un mero «pecados».
