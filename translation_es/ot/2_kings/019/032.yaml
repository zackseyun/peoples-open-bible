base_translation:
  language: en
  yaml_path: translation/ot/2_kings/019/032.yaml
  text: 'Therefore thus says Yahweh concerning the king of Assyria: He shall not come into this city[a], or shoot an arrow there, or come before it with a shield[b], or cast up a siege ramp against it.'
  footnotes:
  - marker: a
    text: Or 'advance against it with a shield.' The Hebrew likely refers to approaching the city under shield protection in siege warfare.
    reason: lexical_alternative
  - marker: b
    text: Or 'heap up a siege mound against it.'
    reason: lexical_alternative
