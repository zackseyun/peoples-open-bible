revisions:
- from: Han sido rebeldes contra Yahvé[a] desde el día en que te conocí.
  to: Han sido rebeldes contra Yahvé[a] desde el día en que los conocí.
  rationale: 'Se corrige el único problema sustancial del borrador: la referencia al destinatario debe permanecer en plural/colectivo, conforme a אֶתְכֶם. «Los conocí» conserva el sentido de Moisés con respecto a Israel como pueblo y mantiene un español natural y neutro. Se conserva la nota sobre «con Yahvé» porque refleja una alternativa significativa preservada en la auditoría inglesa.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:48:51Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la mayor parte del sentido: «rebeldes», «contra Yahvé» y «desde el día» reflejan correctamente מַמְרִים, עִם en sentido adversativo, y מִיּוֹם. También preserva correctamente «Yahvé» para יְהוָה y mantiene la nota léxica pertinente sobre «con Yahvé». Sin embargo, falla en un punto importante de alineación con el hebreo: אֶתְכֶם es segunda persona plural, pero el texto español cambia a singular en «te conocí», produciendo discordancia con «Han sido» y alterando el destinatario colectivo de Israel.'
  spanish_quality_summary: El español es claro y digno, pero la mezcla de plural («Han sido», «rebeldes») con singular («te conocí») es gramatical y discursivamente inconsistente. En español neutral eclesial conviene mantener el plural con «los conocí» o reestructurar la frase. «Desde el día en que los conocí» es natural, fiel y evita voseo/español peninsular.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יְהוָה -> «Yahvé» correctamente; valor adversativo de עִם -> «contra» correctamente explicado. No hay otros términos doctrinales sensibles aquí. La única desviación relevante está en la representación de אֶתְכֶם, que debe mantenerse plural/colectiva en español.'
  issues:
  - severity: high
    issue: Cambio indebido de segunda persona plural a singular en «te conocí»
    rationale: El hebreo אֶתְכֶם es objeto plural («a ustedes / a vosotros / los» refiriéndose a Israel como colectivo). «Te conocí» introduce singular no sustentado por la fuente y rompe la concordancia con «Han sido rebeldes». Debe corregirse a una forma plural/colectiva natural, p. ej. «los conocí».
  - severity: medium
    issue: La justificación léxica del borrador defiende una oscilación singular/plural no apoyada por el texto fuente
    rationale: La nota de decisión lexical afirma que el discurso español puede oscilar entre singular y plural según el receptor implícito, pero aquí la fuente y el contexto recriminatorio se dirigen a Israel en plural. Esa racionalización no debe conservarse.
  revised_spanish_text: Han sido rebeldes contra Yahvé[a] desde el día en que los conocí.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «con Yahvé»; en este contexto la expresión implica oposición a él, por eso se traduce «contra Yahvé».'
    reason: lexical_alternative
  revision_rationale: 'Se corrige el único problema sustancial del borrador: la referencia al destinatario debe permanecer en plural/colectivo, conforme a אֶתְכֶם. «Los conocí» conserva el sentido de Moisés con respecto a Israel como pueblo y mantiene un español natural y neutro. Se conserva la nota sobre «con Yahvé» porque refleja una alternativa significativa preservada en la auditoría inglesa.'
