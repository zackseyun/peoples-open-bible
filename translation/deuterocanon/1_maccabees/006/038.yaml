translation:
  text: And he stationed the remaining cavalry on both sides[a], at the two flanks of the camp[b], brandishing and fully armed in the phalanxes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brandishing' for 'shaking their weapons'; the Greek participle κατασείοντες implies a threatening waving or shaking, with the object left unstated.
    reason: lexical_alternative
  - marker: b
    text: Or 'forming up in the phalanxes' / 'drawing together in the battle lines' for 'closing up in the phalanxes.' The Greek καταφρασσόμενοι is contextually difficult and likely describes tightening or arranging the formation.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὴν ἐπίλοιπον ἵππον
  chosen: the remaining cavalry
  alternatives:
  - the rest of the horsemen
  - the remaining horse
  lexicon: LSJ
  rationale: ἵππος can denote horses, horsemen, or cavalry collectively in military context. With the singular collective construction and the battle setting, 'the remaining cavalry' best conveys the force as a unit in natural English.
- source_word: ἔνθεν καὶ ἔνθεν
  chosen: on both sides
  alternatives:
  - here and there
  - from one side and the other
  lexicon: LSJ
  rationale: The idiom indicates placement on either side rather than scattered movement. 'On both sides' is the clearest contextual rendering.
- source_word: ἐπὶ τὰ δύο μέρη τῆς παρεμβολῆς
  chosen: at the two flanks of the camp
  alternatives:
  - on the two sides of the camp
  - at the two parts of the camp
  lexicon: LSJ
  rationale: παρεμβολή in military narrative commonly means 'camp.' τὰ δύο μέρη are its two sides; 'flanks' gives the military sense idiomatically without over-paraphrasing.
- source_word: κατασείοντες
  chosen: shaking their weapons
  alternatives:
  - brandishing
  - waving
  lexicon: LSJ
  rationale: The participle literally means 'shaking down/upon' or 'brandishing.' Because the object is implicit, 'shaking their weapons' makes the military action explicit in idiomatic English while staying close to the sense.
- source_word: καταφρασσόμενοι
  chosen: closing up
  alternatives:
  - being armed
  - fortifying themselves
  - forming a barrier
  lexicon: LSJ
  rationale: In this tactical context, paired with ἐν ταῖς φάλαγξιν, the sense is of drawing up or compacting the formation rather than literal fortification. 'Closing up' captures the action of tightening ranks.
- source_word: ἐν ταῖς φάλαγξιν
  chosen: in the phalanxes
  alternatives:
  - in battle lines
  - in close formations
  lexicon: LSJ
  rationale: φάλαγξ is a specific military formation. 'Phalanxes' preserves the technical term and the Hellenistic military setting better than a generic 'battle lines.'
