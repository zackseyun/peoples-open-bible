review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura del hebreo y la terminología principal: «Yahvé», «señales», «maravillas», «en la tierra de Egipto». También preserva adecuadamente la nota sobre וּלְכָל אַרְצוֹ. Sin embargo, «para Faraón ... para todos sus siervos ... para toda su tierra» no es la mejor correspondencia para לְ en esta serie; en español suena teleológico o benefactivo, mientras que el hebreo y el audit trail inglés apuntan más bien a relación/dirección. Además, la colocación de la nota en «tierra[a]» está bien, pero conviene ajustar la preposición principal a «a» para una lectura más fiel y natural.'
  spanish_quality_summary: El español es claro y digno, pero «que Yahvé lo envió a hacer» resulta algo forzado; «que Yahvé lo envió a hacer» es aceptable, aunque con el resto de la serie conviene mejorar la fluidez mediante «a Faraón». El mayor problema de naturalidad es la repetición de «para», que en este contexto suena poco idiomática y semánticamente desviada. «Siervos» es legible en registro bíblico y no necesita cambio aquí.
  glossary_alignment: 'Buena alineación con la glosa del proyecto: יְהוָה -> «Yahvé» correctamente; אותות/מופתים -> «señales y maravillas» adecuadamente; עֲבָדָיו -> «sus siervos» es defendible en contexto real. La única desalineación relevante es el tratamiento de לְ como «para» en la serie final, donde «a» refleja mejor la decisión inglesa «to ...» y el hebreo.'
  issues:
  - severity: medium
    issue: Uso de «para» en «para Faraón ... para todos sus siervos ... para toda su tierra»
    rationale: La preposición hebrea לְ admite varios matices, pero en español «para» introduce con fuerza una idea de propósito o beneficio que no corresponde bien aquí. «A Faraón ... a todos sus siervos ... a toda su tierra» conserva mejor la relación/dirección y suena más natural.
  - severity: low
    issue: Riesgo menor de rigidez en «que Yahvé lo envió a hacer»
    rationale: La frase es comprensible y cercana al hebreo. No exige corrección para fidelidad, pero el ajuste de la serie preposicional ya mejora suficientemente la fluidez general del versículo.
  revised_spanish_text: por todas las señales y las maravillas que Yahvé lo envió a hacer en la tierra de Egipto, a Faraón y a todos sus siervos y a toda su tierra[a],
  revised_footnotes:
  - marker: a
    text: O «contra toda su tierra» / «y por toda su tierra». La preposición hebrea puede entenderse aquí con distintos matices relacionales.
    reason: lexical_alternative
  revision_rationale: Se cambia «para» por «a» en la serie final para reflejar mejor el valor relacional de לְ, alinearse con el audit trail inglés («to ...»), y mejorar la naturalidad del español sin perder la ambigüedad contextual preservada en la nota.
