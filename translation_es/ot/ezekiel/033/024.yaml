  - severity: low
    issue: «Sobre la tierra de Israel» resulta algo forzado en español.
    rationale: Aunque refleja literalmente עַל, en español bíblico natural «en la tierra de Israel» comunica mejor el valor territorial sin pérdida relevante de sentido.
