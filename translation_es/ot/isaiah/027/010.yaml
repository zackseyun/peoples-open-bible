translation:
  language: es
  text: Porque la ciudad fortificada está solitaria, una morada[a] desierta y abandonada como el yermo; allí pace un becerro, y allí se echa y deja peladas sus ramas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una pastura» o «un lugar de morada» para «una morada». El hebreo נָוֶה puede llevar un matiz residencial o pastoral.
    reason: lexical_alternative
  - marker: b
    text: O «consume sus ramas». El verbo hebreo comunica una consumición completa; «deja peladas sus ramas» hace explícita la imagen en un español natural.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque entonces
  lexicon: HALOT
  rationale: Introduce la explicación o fundamento de la afirmación anterior. «Porque» conserva bien el valor causal/explanatorio de כִּי en un español natural y digno.
- source_word: עִיר בְּצוּרָה
  english_pob_choice: the fortified city
  chosen_spanish: la ciudad fortificada
  alternatives_spanish:
  - una ciudad fortificada
  - la ciudad amurallada
  - la ciudad fuerte
  lexicon: HALOT
  rationale: El hebreo describe un centro urbano defendido. «Ciudad fortificada» es la equivalencia más directa y clara; el artículo definido en español sigue el valor contextual que el inglés POB adoptó.
- source_word: בָּדָד
  english_pob_choice: solitary
  chosen_spanish: solitaria
  alternatives_spanish:
  - sola
  - aislada
  - solitaria y aislada
  lexicon: HALOT
  rationale: «Solitaria» conserva el matiz poético de desolación y abandono. «Sola» sería más simple, pero menos expresiva; «aislada» añade una idea algo más concreta de separación física que no es necesaria aquí.
- source_word: נָוֶה
  english_pob_choice: a habitation
  chosen_spanish: una morada
  alternatives_spanish:
  - una habitación
  - un lugar de morada
  - un pastizal
  lexicon: HALOT
  rationale: נָוֶה puede significar residencia o morada, y en algunos contextos también tener matiz pastoral. Aquí, en aposición a la ciudad desierta, «morada» preserva la idea de lugar habitado sin reducirlo indebidamente a pastizal.
- source_word: מְשֻׁלָּח
  english_pob_choice: deserted
  chosen_spanish: desierta
  alternatives_spanish:
  - abandonada
  - dejada
  - expulsada
  lexicon: HALOT
  rationale: El pasivo transmite la idea de algo dejado o despachado, con el resultado de quedar vacío. En español, «desierta» funciona bien con «morada» y mantiene el estado resultante sin volver la frase pesada.
- source_word: וְנֶעֱזָב
  english_pob_choice: and abandoned
  chosen_spanish: y abandonada
  alternatives_spanish:
  - y dejada
  - y desamparada
  - y forsaken
  lexicon: HALOT
  rationale: Se empareja con מְשֻׁלָּח para intensificar la imagen de ruina y desolación. «Abandonada» es la correspondencia moderna más clara y natural.
- source_word: כַּמִּדְבָּר
  english_pob_choice: like the wilderness
  chosen_spanish: como el desierto
  alternatives_spanish:
  - como un desierto
  - como el yermo
  - como la soledad
  lexicon: HALOT
  rationale: El símil comunica un lugar inculto y sin vida cultivada. En español, «desierto» expresa bien esa imagen; aunque «desierto» puede sonar más concreto que «wilderness», aquí conserva adecuadamente la fuerza del contraste.
- source_word: שָׁם יִרְעֶה עֵגֶל
  english_pob_choice: there a calf grazes
  chosen_spanish: allí pace un becerro
  alternatives_spanish:
  - allí un becerro pasta
  - allí apacienta un becerro
  - allí se alimenta un becerro
  lexicon: HALOT
  rationale: רעה en este cuadro pastoral se expresa naturalmente con «pacer». «Becerro» corresponde bien a עֵגֶל y mantiene el tono concreto de la imagen.
- source_word: וְשָׁם יִרְבָּץ
  english_pob_choice: and there it lies down
  chosen_spanish: y allí se echa
  alternatives_spanish:
  - y allí se acuesta
  - y allí reposa
  - y allí se recuesta
  lexicon: HALOT
  rationale: El verbo indica que el animal se tumba o se recuesta. «Se echa» es breve, idiomático y preserva la continuidad de la imagen pastoral.
- source_word: וְכִלָּה סְעִפֶיהָ
  english_pob_choice: and strips its branches bare
  chosen_spanish: y devora sus ramas[b]
  alternatives_spanish:
  - y consume sus ramas
  - y deja desnudas sus ramas
  - y agota sus ramas
  lexicon: HALOT
  rationale: כִלָּה expresa consumación total. El hebreo permite entender que el animal acaba con el follaje/ramaje; «devora sus ramas» conserva la fuerza de consumo completo y sigue siendo natural en español. La nota recoge la alternativa más explícita de «consumir/ dejar desnudas».
translation_notes:
  revision_awareness: 'Se siguió el trazo del texto fuente hebreo y el audit trail inglés sin cambios relevantes de revisión: la imagen de la ciudad fortificada desolada y del becerro que paciendo consume la vegetación se mantiene íntegra, con solución española natural y auditable.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparezca el Nombre divino; en este versículo no aparece.
  - Se conserva la equivalencia de imagen pastoral con «pacer/se echa» y se evita suavizar el consumo final, manteniendo la tensión semántica de כִלָּה.
  - «Morada» se eligió por su amplitud semántica frente a «pastura», que se reserva como alternativa documentada.
