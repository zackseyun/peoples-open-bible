review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo y la línea del POB en casi todo: mantiene el alcance universal de הָאָרֶץ, traduce יְהוָה como «Yahvé», conserva «gloria» para כְּבוֹד y el símil final con valor gnómico. La principal desviación está en la nota al pie, que contradice la decisión auditada: ofrece «la tierra» como alternativa local y luego vuelve a preferir «la tierra» por alcance universal, sin distinguir entre «earth» y «land».'
  spanish_quality_summary: 'El español es claro y digno, pero «será llena» suena menos natural que «se llenará» en español bíblico contemporáneo. Además, la nota necesita corrección para expresar adecuadamente la alternativa local. El resto del verso lee bien: «como las aguas cubren el mar».'
  glossary_alignment: 'Alineación fuerte con el glosario del proyecto: «Yahvé» correcto para יהוה; «gloria» correcto; no hay conflictos terminológicos mayores. La excepción necesaria es estilística: preferir «se llenará» sobre «será llena» por naturalidad del español sin pérdida semántica.'
  issues:
  - severity: medium
    issue: La nota al pie está mal formulada y no preserva la alternativa semántica real de הָאָרֶץ.
    rationale: El inglés distingue entre «the earth» y «the land». En español, el borrador pone «la tierra» como texto principal y también como alternativa local, lo que vuelve la nota incoherente e inútil. Debe ofrecer una alternativa como «la tierra» en sentido local o mejor «la tierra/el país» con explicación explícita del sentido localizado.
  - severity: low
    issue: «Será llena» es gramatical pero menos idiomático que «se llenará».
    rationale: El nifal futuro puede verterse de forma más natural en español con una construcción pronominal media/pasiva refleja. «Se llenará» suena más fluido y ampliamente legible sin alterar el significado.
  revised_spanish_text: Porque la tierra[a] se llenará del conocimiento de la gloria de Yahvé, como las aguas cubren el mar.
