translation:
  language: es
  text: ¿Puede alguien capturarlo ante sus ojos? ¿Puede alguien perforarle la nariz con ganchos?[a][b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «¿Lo tomará ante sus ojos? ¿Le perforará la nariz con lazos?». El hebreo es breve y difícil; algunas traducciones entienden los verbos de manera menos genérica.'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «con lazos» o «con trampas». Aquí se mantiene «ganchos» siguiendo la revisión inglesa, por la imagen de perforar la nariz con un instrumento.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּעֵינָיו
  english_pob_choice: before his eyes
  chosen_spanish: delante de sus ojos
  alternatives_spanish:
  - ante sus ojos
  - en su presencia
  lexicon: HALOT
  rationale: La preposición con "ojos" expresa que la acción ocurre a la vista del animal, no como instrumento. "Delante de sus ojos" conserva el valor retórico de desafío y suena natural en español.
- source_word: יִקָּחֶנּוּ
  english_pob_choice: can one capture him
  chosen_spanish: Se lo puede capturar
  alternatives_spanish:
  - ¿Puede uno capturarlo?
  - ¿Se lo puede tomar?
  lexicon: HALOT
  rationale: לקח puede significar "tomar", pero aquí el contexto de caza/sujeción favorece "capturar". Se mantiene la pregunta retórica implícita del hebreo y del POB inglés.
- source_word: בְּמוֹקְשִׁים
  english_pob_choice: with hooks
  chosen_spanish: con ganchos
  alternatives_spanish:
  - con trampas
  - con lazos
  lexicon: HALOT
  rationale: El POB inglés revisado tomó "hooks" para reflejar un instrumento que perfora la nariz. En español, "ganchos" comunica mejor ese implemento que "trampas", aunque el término hebreo puede abarcar la idea de lazo o trampa en otros contextos.
- source_word: יִנְקָב
  english_pob_choice: pierce
  chosen_spanish: perforar
  alternatives_spanish:
  - punzar
  - horadar
  lexicon: HALOT
  rationale: נקב significa perforar o hacer un orificio. "Perforar" conserva la fuerza física de la imagen y se adapta bien a la nariz.
- source_word: אָף
  english_pob_choice: nose
  chosen_spanish: la nariz
  alternatives_spanish:
  - el hocico
  - las narices
  lexicon: HALOT
  rationale: Aquí el sentido anatómico es claro. "Nariz" es el equivalente más natural y preciso en español; "hocico" sería más marcado zoológicamente y menos neutral.
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó «snares» por «hooks» para reflejar mejor un instrumento con el que se perfora la nariz. El español sigue esa decisión, pero conserva en nota la posibilidad léxica del hebreo más amplio.
  spanish_consistency_notes:
  - Se mantuvo un español neutral y digno, con pregunta retórica explícita para reflejar la sintaxis del hebreo y del POB inglés.
  - Se evitó «SEÑOR» o terminología doctrinal ajena al versículo, porque aquí no aparece el nombre divino ni vocabulario teológico especializado.
  - «Perforar la nariz» preserva la concreción anatómica del hebreo אָף y evita suavizar la imagen.
