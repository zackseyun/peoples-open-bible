translation:
  language: es
  text: 'Se levantaron temprano[a], y cuando estaba despuntando el alba, Samuel llamó a Saúl en la azotea, diciendo: «Levántate, y te enviaré en tu camino[b]». Entonces Saúl se levantó, y los dos, él y Samuel, salieron.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «al levantarse el alba».
    reason: lexical_alternative
  - marker: b
    text: O «te despediré» o «te dejaré partir». El hebreo puede significar despedir a alguien o enviarlo en su camino.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁכִּמוּ
  english_pob_choice: They rose early
  chosen_spanish: Ellos se levantaron temprano
  alternatives_spanish:
  - Se levantaron de madrugada
  - Se levantaron temprano
  lexicon: HALOT
  rationale: El verbo hebreo indica levantarse muy temprano. «Se levantaron temprano» conserva el valor temporal de forma natural en español y evita un calco duro.
- source_word: כַּעֲלוֹת הַשַּׁחַר
  english_pob_choice: when the dawn was breaking
  chosen_spanish: cuando estaba despuntando el alba
  alternatives_spanish:
  - cuando amanecía
  - al despuntar el alba
  - cuando estaba saliendo el alba
  lexicon: HALOT
  rationale: La imagen literal es «al subir el alba». En español, «estaba despuntando el alba» comunica bien el proceso de llegada del amanecer sin perder la metáfora original.
- source_word: הַגָּג
  english_pob_choice: on the roof
  chosen_spanish: en el terrado
  alternatives_spanish:
  - en el techo
  - en la azotea
  - en el tejado
  lexicon: HALOT
  rationale: El contexto de una casa oriental con techo plano favorece «terrado». Es más preciso que «techo» y más natural que «azotea» en registro bíblico.
- source_word: קוּמָה
  english_pob_choice: Get up
  chosen_spanish: Levántate
  alternatives_spanish:
  - Ponte de pie
  - Alzate
  - Levántese
  lexicon: HALOT
  rationale: Es un imperativo directo para ponerse en pie. «Levántate» es la equivalencia más clara y idiomática.
- source_word: וַאֲשַׁלְּחֶךָּ
  english_pob_choice: I will send you on your way
  chosen_spanish: te despediré
  alternatives_spanish:
  - te enviaré
  - te dejaré ir
  - te enviaré en camino
  lexicon: HALOT
  rationale: Aquí שׁלח puede significar despedir o enviar fuera. En español, «te despediré» recoge el sentido de dejar partir sin sugerir rechazo, aunque queda la posibilidad de «te enviaré».
- source_word: וַיֵּצְאוּ ... הַחוּצָה
  english_pob_choice: went outside
  chosen_spanish: salieron afuera
  alternatives_spanish:
  - salieron
  - salieron fuera
  lexicon: HALOT
  rationale: La combinación verbal y direccional expresa salir al exterior. «Salieron afuera» mantiene el énfasis espacial del hebreo, aunque en español suene algo enfático.
- source_word: שְׁנֵיהֶם הוּא וּשְׁמוּאֵל
  english_pob_choice: the two of them, he and Samuel
  chosen_spanish: los dos, él y Samuel
  alternatives_spanish:
  - ambos, Saúl y Samuel
  - los dos, Saúl y Samuel
  lexicon: HALOT
  rationale: El hebreo conserva una apposición enfática con el pronombre «él» que remite a Saúl. En español se preserva esa estructura para no borrar el matiz textual.
translation_notes:
  revision_awareness: 'Alineado con el último pase del texto fuente: no hubo revisiones posteriores y el juicio de concordancia fue de alta coincidencia; se conserva el sentido y las ambigüedades léxicas documentadas en el audit trail inglés.'
  spanish_consistency_notes:
  - Se mantuvo «Samuel» y «Saúl» de forma consistente con los nombres propios del pasaje.
  - Se evitó «SEÑOR» u otras sustituciones teológicas porque el verso no contiene el nombre divino.
  - Se preservó la estructura enfática hebrea «los dos, él y Samuel» para reflejar la apposición original.
