translation:
  language: es
  text: En aquellos días no había rey en Israel[a]; cada hombre hacía lo que era recto ante sus propios ojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cada uno hacía lo que era recto ante sus propios ojos». El hebreo usa el singular masculino אִישׁ de manera distributiva.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיָּמִים הָהֵם
  english_pob_choice: In those days
  chosen_spanish: En aquellos días
  alternatives_spanish:
  - En esos días
  - En aquellos tiempos
  lexicon: HALOT
  rationale: La fórmula temporal narrativa se expresa de manera idiomática en español con "En aquellos días"; conserva el marco retrospectivo sin volverse mecánica.
- source_word: אֵין מֶלֶךְ
  english_pob_choice: there was no king
  chosen_spanish: no había rey
  alternatives_spanish:
  - no existía rey
  - no había un rey
  lexicon: HALOT
  rationale: El negativo existencial se vierte naturalmente con "no había". "Rey" mantiene la referencia política y no requiere artículo para sonar natural en español.
- source_word: בְּיִשְׂרָאֵל
  english_pob_choice: in Israel
  chosen_spanish: en Israel
  alternatives_spanish:
  - dentro de Israel
  lexicon: HALOT
  rationale: La preposición locativa directa transmite el ámbito nacional del enunciado.
- source_word: אִישׁ
  english_pob_choice: each man
  chosen_spanish: cada hombre
  alternatives_spanish:
  - cada varón
  - cada uno
  lexicon: HALOT
  rationale: Se conserva el singular distributivo masculino del hebreo. "Cada hombre" refleja el valor representativo del sustantivo sin neutralizarlo.
- source_word: הַיָּשָׁר
  english_pob_choice: what was right
  chosen_spanish: lo recto
  alternatives_spanish:
  - lo justo
  - lo correcto
  - lo derecho
  lexicon: HALOT
  rationale: El adjetivo sustantivado en hebreo se vierte con un sustantivo/adjetivo sustantivado español natural. "Lo recto" preserva la valoración moral sin añadir interpretación mayor que la del texto.
- source_word: בְּעֵינָיו
  english_pob_choice: in his own eyes
  chosen_spanish: a sus propios ojos
  alternatives_spanish:
  - en sus propios ojos
  - ante sus propios ojos
  - según su propio parecer
  lexicon: HALOT
  rationale: La imagen idiomática hebrea se conserva en español con una construcción igualmente natural. "Sus propios" explicita el matiz reflexivo/subjectivo del original.
- source_word: יַעֲשֶׂה
  english_pob_choice: did
  chosen_spanish: hacía
  alternatives_spanish:
  - hizo
  - solía hacer
  lexicon: HALOT
  rationale: Aunque la forma verbal es imperfecta, en esta sentencia resumida expresa acción habitual o característica en el marco narrativo. "Hacía" comunica bien el valor iterativo en español.
theological_decisions:
- issue: Mantenimiento del lenguaje masculino singular distributivo en אִישׁ
  english_pob_reading: each man
  chosen_spanish_reading: cada hombre
  alternative_spanish_readings:
  - cada persona
  - todos
  rationale: Se preserva la forma masculina singular representativa del hebreo, tal como hace el texto inglés, sin sustituirla por una neutralización que borre el rasgo lexical del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: No intensificar el juicio moral más allá del texto
  english_pob_reading: each man did what was right in his own eyes
  chosen_spanish_reading: cada hombre hacía lo recto a sus propios ojos
  alternative_spanish_readings:
  - cada hombre hacía lo que le parecía mejor
  - cada hombre hacía lo que quería
  rationale: El hebreo afirma la autovaloración subjetiva de lo recto; la traducción retiene esa formulación sin convertirla en una paráfrasis más fuerte o más interpretativa.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: El contexto inglés muestra alta concordancia y sin revisiones aplicadas; mantengo la estructura y las decisiones léxicas auditadas, adaptándolas al español con equivalencia óptima y sin añadir intensificación interpretativa.
  spanish_consistency_notes:
  - '"Yahvé" no aparece en este versículo, así que no se requiere decisión sobre el tetragrámaton.'
  - Se conserva el paralelismo sintáctico breve del hebreo con una sola cláusula temporal y dos proposiciones coordinadas.
  - '"Lo recto" mantiene la sobriedad del original y evita la expansión explicativa.'
