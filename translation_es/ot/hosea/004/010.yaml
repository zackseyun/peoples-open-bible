  source_alignment_summary: 'El borrador español refleja bien la estructura del hebreo y las decisiones auditadas del POB: futuro profético (''Comerán''), privación (''no se saciarán''), conducta sexual ilícita, falta de aumento, y el uso de ''Yahvé''. Sin embargo, la cláusula final hebrea es muy elíptica y la revisión inglesa optó por ''to cherish prostitution''. El español ''para entregarse a la prostitución'' es interpretativo y algo más dinámico que ''cherish''; además, el sistema de notas no preserva la nota inglesa sobre la dificultad textual/final del verso.'
