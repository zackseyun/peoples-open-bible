  text: אחרי הֶחֱזִ֗יק מַלְכִּיָּה֙ בֶּן הַ/צֹּ֣רְפִ֔י עַד בֵּ֥ית הַ/נְּתִינִ֖ים וְ/הָ/רֹכְלִ֑ים נֶ֚גֶד שַׁ֣עַר הַ/מִּפְקָ֔ד וְ/עַ֖ד עֲלִיַּ֥ת הַ/פִּנָּֽה־־׃
base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/003/031.yaml
  text: After him Malkijah son of the goldsmith repaired as far as the house of the temple servants and of the merchants[a], opposite the Inspection Gate[c][b], and as far as the upper chamber of the corner.
  footnotes:
  - marker: a
    text: Or 'the house of the Nethinim'; this is a technical term for temple servants.
    reason: lexical_alternative
  - marker: b
    text: Or 'the Muster Gate' or 'the Gate of Muster.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the ascent of the corner.' The Hebrew phrase may refer either to an upper chamber or to an upward approach at the corner.
    reason: lexical_alternative
