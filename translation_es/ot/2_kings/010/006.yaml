translation:
  language: es
  text: 'Así que les escribió una segunda carta, diciendo: «Si ustedes están por mí y si escuchan mi voz[a], tomen las cabezas de los hombres, los hijos de su señor, y vengan a mí mañana a esta hora, en Jezreel[b]». Ahora bien, los hijos del rey, setenta hombres, estaban con los grandes hombres[c] de la ciudad, que los estaban criando.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, 'si me obedecen'. El hebreo dice literalmente, 'si escuchan mi voz', una expresión que a menudo incluye obediencia.
    reason: lexical_alternative
  - marker: b
    text: O, 'a Jezreel'. La forma hebrea incluye una terminación direccional.
    reason: lexical_alternative
  - marker: c
    text: O, 'los principales de la ciudad'. El hebreo puede referirse a hombres prominentes o dirigentes; 'grandes hombres' sigue de cerca la decisión del POB en inglés.
    reason: lexical_alternative
lexical_decisions:
- source_word: סֵפֶר שֵׁנִית
  english_pob_choice: a second letter
  chosen_spanish: una segunda carta
  alternatives_spanish:
  - otra carta
  - un segundo escrito
  lexicon: HALOT
  rationale: En este contexto epistolar, סֵפֶר se entiende mejor como 'carta' que como 'libro' o 'documento'. שֵׁנִית señala secuencia, por eso 'segunda'.
- source_word: אִם לִי אַתֶּם
  english_pob_choice: if you are for me
  chosen_spanish: si ustedes están por mí
  alternatives_spanish:
  - si ustedes son míos
  - si ustedes están de mi lado
  lexicon: HALOT
  rationale: La frase expresa lealtad o alineamiento con Jehú. 'Están por mí' conserva esa fuerza relacional sin sonar demasiado idiomático ni suavizar el compromiso implícito.
- source_word: וּלְקוֹלִי אַתֶּם שֹׁמְעִים
  english_pob_choice: if you are listening to my voice
  chosen_spanish: si escuchan mi voz
  alternatives_spanish:
  - si me obedecen
  - si oyen mi voz
  lexicon: HALOT
  rationale: שׁמע con קוֹל puede implicar obediencia, pero el hebreo literal es 'escuchar la voz'. 'Escuchan mi voz' preserva la expresión y deja visible la posible implicación de obediencia.
- source_word: קְחוּ אֶת רָאשֵׁי
  english_pob_choice: take the heads of
  chosen_spanish: tomen las cabezas de
  alternatives_spanish:
  - traigan las cabezas de
  - tomen la cabeza de
  lexicon: HALOT
  rationale: El hebreo habla de cabezas en plural y de manera directa. Se mantiene la dureza literal, ya que el contexto exige entender cabezas cortadas.
- source_word: אַנְשֵׁי בְנֵי אֲדֹנֵיכֶם
  english_pob_choice: the men, the sons of your master
  chosen_spanish: los hombres, los hijos de su señor
  alternatives_spanish:
  - los hijos de su señor
  - los varones, hijos de su señor
  lexicon: HALOT
  rationale: La construcción hebrea es appositiva y algo áspera. En español se conserva 'los hombres, los hijos de su señor' para no borrar esa tensión textual, aunque el sentido se refiere a los hijos varones reales.
- source_word: כָּעֵת מָחָר
  english_pob_choice: at this time tomorrow
  chosen_spanish: a esta misma hora mañana
  alternatives_spanish:
  - para esta hora mañana
  - mañana a esta hora
  lexicon: HALOT
  rationale: Es un modismo temporal estándar que señala la misma hora del día siguiente; 'a esta misma hora mañana' comunica bien el valor idiomático.
- source_word: יִזְרְעֶאלָה
  english_pob_choice: at Jezreel
  chosen_spanish: en Jezreel
  alternatives_spanish:
  - a Jezreel
  - hacia Jezreel
  lexicon: HALOT
  rationale: El sufijo direccional puede indicar movimiento hacia Jezreel, pero en español 'en Jezreel' funciona de forma natural para el punto de encuentro ya implícito.
- source_word: וּבְנֵי הַמֶּלֶךְ שִׁבְעִים אִישׁ
  english_pob_choice: Now the king’s sons, seventy men,
  chosen_spanish: Ahora bien, los hijos del rey, setenta hombres,
  alternatives_spanish:
  - Y los hijos del rey, setenta hombres,
  - Ahora los hijos del rey, setenta hombres,
  lexicon: HALOT
  rationale: Se conserva la apposición numérica 'setenta hombres' para reflejar la estructura hebrea. 'Ahora bien' marca el giro de fondo narrativo.
- source_word: אֶת גְּדֹלֵי הָעִיר
  english_pob_choice: the great men of the city
  chosen_spanish: los grandes hombres de la ciudad
  alternatives_spanish:
  - los principales de la ciudad
  - los notables de la ciudad
  lexicon: HALOT
  rationale: '''גדולי'' remite a personas prominentes o importantes; ''grandes hombres'' sigue de cerca la elección del inglés POB y preserva el matiz de prominencia.'
- source_word: מְגַדְּלִים אוֹתָם
  english_pob_choice: who were raising them
  chosen_spanish: que los estaban criando
  alternatives_spanish:
  - que los estaban educando
  - que los estaban criando y cuidando
  lexicon: HALOT
  rationale: El participio expresa acción continua de crianza/cuidado. 'Criando' es la forma más directa y natural en español para ese contexto.
theological_decisions:
- issue: La exigencia de lealtad expresada por 'אם לי אתם' y 'לקולי אתם שומעים'
  english_pob_reading: If you are for me and if you are listening to my voice
  chosen_spanish_reading: Si ustedes están por mí y si escuchan mi voz
  alternative_spanish_readings:
  - Si ustedes son míos y si obedecen mi voz
  - Si están de mi lado y si me escuchan
  rationale: Se conserva la tensión entre adhesión personal y obediencia verbal. 'Escuchan mi voz' deja visible el eco bíblico de oír con obediencia sin convertirlo del todo en una paráfrasis interpretativa.
  doctrine_reference: Lealtad/covenant fidelity en la narrativa histórica del AT
- issue: La violencia explícita del mandato sobre las cabezas de los hijos del rey
  english_pob_reading: take the heads of the men, the sons of your master
  chosen_spanish_reading: tomen las cabezas de los hombres, los hijos de su señor
  alternative_spanish_readings:
  - traigan las cabezas de los hombres, los hijos de su señor
  - tomen la cabeza de los hijos de su señor
  rationale: Se mantiene la crudeza del mandato porque el hebreo es deliberadamente directo. No se atenúa ni se eufemiza el contenido, ya que el contexto narrativo exige reconocer la violencia real.
  doctrine_reference: Narrativa histórica; preservación de la contundencia textual
- issue: El papel de los 'great men of the city' como cuidadores de los príncipes
  english_pob_reading: the great men of the city, who were raising them
  chosen_spanish_reading: los grandes hombres de la ciudad, que los estaban criando
  alternative_spanish_readings:
  - los principales de la ciudad, que los estaban criando
  - los notables de la ciudad, que los criaban
  rationale: '''Grandes hombres'' conserva la correspondencia lexical con la decisión del POB en inglés y mantiene la ambigüedad entre prominencia social y función de tutela. ''Criando'' refleja la acción continua sin cargarla doctrinalmente.'
  doctrine_reference: Contexto socio-político del relato monárquico
translation_notes:
  revision_awareness: El borrador sigue la lectura revisada del POB inglés que optó por 'for me' y 'great men' para acercarse más al hebreo, manteniendo además la nota sobre la dureza de 'take the heads of' y la observación temporal de 'at this time tomorrow'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo requiera; este versículo no contiene el Tetragrámaton.
  - Se mantiene 'voz' como traducción de קוֹל, conservando la expresión bíblica sin convertirla en una explicación interpretativa.
  - '''Criando'' se eligió por su naturalidad en español y su correspondencia con el participio hebreo de acción continua.'
  - Se preserva la apposición y el orden informativo del hebreo en 'los hijos del rey, setenta hombres' para no borrar la estructura del original.
