revisions:
- from: Allí el fuego te devorará; la espada te cortará; te devorará como la langosta[a]. Hazte muchas como la langosta; hazte muchas como la langosta devoradora.
  to: Allí el fuego te devorará; la espada te cortará de raíz; te devorará como la langosta[a]. Hazte numerosa como la langosta; hazte numerosa como la langosta en enjambre.
  rationale: Se corrige 'te cortará' a 'te cortará de raíz' para reflejar mejor el sentido de כרת y la decisión inglesa 'cut you off'. Se mejora la naturalidad de los imperativos con 'Hazte numerosa', manteniendo el tono irónico sin forzar el español. Se reemplaza 'langosta devoradora' por 'langosta en enjambre' para ajustarse a la razón léxica documentada para אַרְבֶּה y a una expresión más clara en español.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:44:04Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo y del POB inglés en casi todo: ''Allí'', ''el fuego te devorará'' y la repetición de ''te devorará'' preservan el paralelismo y la viveza de אָכַל. También conserva adecuadamente el doble imperativo irónico dirigido a Nínive. Sin embargo, ''la espada te cortará'' no transmite bien תַּכְרִיתֵךְ, cuyo sentido es ''cortarte/destruirte/eliminarte'', no meramente herirte o cortarte físicamente. Además, ''langosta devoradora'' para אַרְבֶּה no refleja la razón documentada en el POB inglés, que distingue el segundo término por matiz de enjambre o masa, no por ser más devorador.'
  spanish_quality_summary: El español es en general claro, pero 'Hazte muchas' resulta poco natural porque el adjetivo femenino plural no concuerda bien con el sujeto singular implícito de la ciudad; en español suena mejor 'Hazte numerosa', que mantiene el imperativo reflexivo y la ironía. Asimismo, 'la espada te cortará' suena ambiguo y poco idiomático en contexto de juicio. 'Langosta devoradora' es comprensible, pero menos preciso y menos natural que una expresión con 'enjambre'.
  glossary_alignment: 'No hay conflicto con terminología teológica mayor. La principal desviación es léxica: para כָּאַרְבֶּה conviene reflejar el matiz de ''langosta en enjambre'' o ''langosta de enjambre'', en línea con la nota inglesa sobre la intensificación entre יֶלֶק y אַרְבֶּה. También conviene ajustar כרת a ''cortar de raíz'' para conservar el valor de ''cut off'' de la auditoría inglesa y del hebreo.'
  issues:
  - severity: high
    issue: '''la espada te cortará'' subtraduce תַּכְרִיתֵךְ'
    rationale: כרת en hiphil aquí significa 'cortar/destruir/eliminar', y el POB inglés documenta 'cut you off'. En español, 'te cortará' sugiere una acción física incompleta o torpe, no el sentido de extirpación o ruina total.
  - severity: medium
    issue: '''Hazte muchas'' es poco natural en español'
    rationale: Aunque intenta reflejar 'make yourself many', el resultado suena gramaticalmente forzado con Nínive como sujeto singular femenino. 'Hazte numerosa' mantiene la idea de hacerse muchos/numerosa con mejor legibilidad.
  - severity: medium
    issue: '''langosta devoradora'' no refleja bien el contraste documentado para אַרְבֶּה'
    rationale: La nota inglesa explica que el segundo término se distingue por claridad como 'swarming locust'. 'Devoradora' cambia el eje semántico de la diferenciación y no preserva tan bien el matiz de enjambre/multitud.
  revised_spanish_text: Allí el fuego te devorará; la espada te cortará de raíz; te devorará como la langosta[a]. Hazte numerosa como la langosta; hazte numerosa como la langosta en enjambre.
  revised_footnotes:
