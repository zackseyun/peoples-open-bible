translation:
  language: es
  text: Entonces giró hacia el oriente, hacia el amanecer, a Bet-dagón, y llegó a Zabulón y al valle de Iphtah-el, hacia el norte, a Bet-emec y Neiel; luego salió hacia Cabul por la izquierda[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «desde la izquierda». En descripciones de fronteras, esto puede señalar el lado norte, según la orientación.'
    reason: cultural_note
lexical_decisions:
- source_word: וְשָׁב
  english_pob_choice: Then it turned
  chosen_spanish: Entonces giró
  alternatives_spanish:
  - y giró
  - entonces se volvió
  lexicon: HALOT
  rationale: En descripciones de fronteras, el verbo hebreo expresa un cambio de dirección de la línea, no un regreso narrativo. «Giró» comunica bien ese movimiento en español sin perder la idea direccional.
- source_word: מִזְרַח הַשֶּׁמֶשׁ
  english_pob_choice: eastward, toward the sunrise
  chosen_spanish: hacia el oriente, hacia el amanecer
  alternatives_spanish:
  - al este
  - hacia el este
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «desde/hacia el levante del sol». «Hacia el oriente» conserva la dirección geográfica, y «hacia el amanecer» mantiene la imagen idiomática sin sonar forzado en español.
- source_word: בֵּית דָּגֹן
  english_pob_choice: Beth-dagon
  chosen_spanish: Bet-dagón
  alternatives_spanish:
  - Bet Dagon
  - Beth-dagón
  lexicon: Nombre propio transliterado
  rationale: Se translitera el topónimo; se prefiere «Bet-» para una forma española más natural y consistente con otros nombres bíblicos.
- source_word: וּפָגַע
  english_pob_choice: reached to
  chosen_spanish: llegó a
  alternatives_spanish:
  - tocó
  - se encontró con
  - colindó con
  lexicon: HALOT
  rationale: En fórmulas territoriales, el verbo indica que el límite alcanza o toca otra región. «Llegó a» es una solución clara en español y mantiene la secuencia de puntos fronterizos.
- source_word: בִּזְבֻלוּן
  english_pob_choice: to Zebulun
  chosen_spanish: a Zabulón
  alternatives_spanish:
  - con Zabulón
  - hasta Zabulón
  lexicon: HALOT
  rationale: Se trata del territorio de Zabulón; «a Zabulón» preserva la relación limítrofe de manera breve y natural.
- source_word: וּבְגֵי יִפְתַּח אֵל
  english_pob_choice: and to the Valley of Iphtah-el
  chosen_spanish: y al valle de Iphtah-el
  alternatives_spanish:
  - y en el valle de Iphtah-el
  - y al valle de Jiftael
  lexicon: HALOT
  rationale: גֵי es «valle», y el nombre propio se translitera. Se mantiene la estructura de ubicación sucesiva del límite.
- source_word: צָפוֹנָה
  english_pob_choice: northward
  chosen_spanish: hacia el norte
  alternatives_spanish:
  - al norte
  - al lado norte
  lexicon: HALOT
  rationale: El adverbio direccional se expresa de forma natural con «hacia el norte», conservando la orientación del límite.
- source_word: בֵּית הָעֵמֶק
  english_pob_choice: Beth-emek
  chosen_spanish: Bet-emec
  alternatives_spanish:
  - Beth-emec
  - Bet Emec
  lexicon: Nombre propio transliterado
  rationale: Topónimo transliterado; se usa la forma española breve y consistente «Bet-». No se traduce como «casa del valle» porque el POB trata estos nombres como designaciones propias.
- source_word: וּנְעִיאֵל
  english_pob_choice: Neiel
  chosen_spanish: Neiel
  alternatives_spanish:
  - Nei-el
  lexicon: Nombre propio transliterado
  rationale: Se conserva el nombre propio con transliteración estándar.
- source_word: וְיָצָא
  english_pob_choice: then it went out
  chosen_spanish: luego salió
  alternatives_spanish:
  - y salió
  - entonces salió
  lexicon: HALOT
  rationale: En lenguaje de fronteras, el verbo indica que el trazado continúa hacia otro punto. «Luego salió» reproduce ese avance sin pesadez.
- source_word: אֶל כָּבוּל
  english_pob_choice: to Cabul
  chosen_spanish: hacia Cabul
  alternatives_spanish:
  - a Cabul
  - hasta Cabul
  lexicon: Nombre propio transliterado
  rationale: Se translitera el topónimo. «Hacia» ayuda a conservar el valor de dirección del movimiento del límite.
- source_word: מִשְּׂמֹאל
  english_pob_choice: on the left
  chosen_spanish: por la izquierda
  alternatives_spanish:
  - a la izquierda
  - por el lado izquierdo
  lexicon: HALOT
  rationale: El hebreo dice literalmente «desde la izquierda». En español, «por la izquierda» mantiene la imagen concreta; en este contexto fronterizo puede implicar el lado norte según la orientación, pero el texto conserva el término concreto.
translation_notes:
  revision_awareness: Se siguió el pasaje hebreo de frontera territorial y el audit trail inglés. No hubo revisiones aplicadas en el contexto auditado; la traducción conserva la secuencia topográfica y la ambigüedad direccional de מִשְּׂמֹאל con nota explicativa.
  spanish_consistency_notes:
  - Se mantuvo la transliteración de los topónimos como Bet-dagón, Bet-emec, Iphtah-el, Neiel y Cabul.
  - Se preservó la lógica de frontera territorial con verbos de dirección («giró», «llegó», «salió») en lugar de verbos narrativos más libres.
  - Se evitó traducir los nombres propios como expresiones comunes («casa de Dagón», «casa del valle»), conforme al uso del POB.
  - Se conservó una nota para aclarar que «por la izquierda» puede equivaler al lado norte en orientación geográfica bíblica.
