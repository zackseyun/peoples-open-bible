revisions:
- from: No haréis ningún trabajo laborioso[a], y presentaréis una ofrenda encendida a Yahvé.
  to: No haréis ningún trabajo laborioso, y presentaréis una ofrenda de alimento[a] a Yahvé.
  rationale: Se mantiene la buena solución para la prohibición y para el nombre divino, pero se corrige אִשֶּׁה a 'ofrenda de alimento' para reflejar mejor la decisión léxica documentada del POB y producir un español más natural y menos ambiguo que 'ofrenda encendida'. La nota conserva las alternativas tradicionales relacionadas con fuego, tal como hace el audit trail inglés.
