translation:
  language: es
  text: Pero cierto Teódoto[a], habiendo planeado llevar a cabo la trama, tomó las mejores armas ptolemaicas que le habían sido asignadas y fue conducido de noche a la tienda de Ptolomeo, para matarlo él mismo y de ese modo poner fin a la guerra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'matarlo solo' o 'matarlo por su propia mano'; el griego μόνος puede subrayar que Teódoto pensaba hacerlo él mismo.
    reason: lexical_alternative
lexical_decisions:
- source_word: Θεόδοτος
  english_pob_choice: Theodotus
  chosen_spanish: Teódoto
  alternatives_spanish:
  - Teodoto
  lexicon: nombre propio
  rationale: Se translitera el nombre propio al español con la forma más natural y reconocible. Conserva la identidad del personaje sin introducir equivalencia interpretativa.
- source_word: ἐκπληρῶσαι
  english_pob_choice: to carry out
  chosen_spanish: llevar a cabo
  alternatives_spanish:
  - ejecutar
  - cumplir
  lexicon: BDAG
  rationale: En el contexto de un complot homicida, el infinitivo expresa realizar o ejecutar el plan. 'Llevar a cabo' es idiomático en español y evita la posible resonancia positiva de 'cumplir'.
- source_word: ἐπιβουλήν
  english_pob_choice: the plot
  chosen_spanish: la trama
  alternatives_spanish:
  - el complot
  - la conspiración
  lexicon: LSJ
  rationale: El término denota un designio hostil. 'Trama' funciona bien en español y no sobrecarga con un matiz político que 'conspiración' podría sugerir; mantiene la idea de una intención maliciosa.
- source_word: διανοηθείς
  english_pob_choice: having planned
  chosen_spanish: habiendo planeado
  alternatives_spanish:
  - habiendo resuelto
  - habiendo concebido
  lexicon: BDAG
  rationale: El participio indica una intención deliberada ya formada. 'Habiendo planeado' reproduce esa premeditación de manera clara y natural.
- source_word: παραλαβὼν
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - habiendo tomado
  - recibió
  lexicon: BDAG
  rationale: El participio introduce la acción por la cual avanza en su plan. 'Tomó' conserva la fluidez narrativa sin perder el valor verbal del griego.
- source_word: τῶν προυποτεταγμένων αὐτῷ ὅπλων Πτολεμαικῶν
  english_pob_choice: the Ptolemaic weapons that had been assigned to him
  chosen_spanish: las armas ptolemaicas que le habían sido asignadas
  alternatives_spanish:
  - las armas de Ptolomeo previamente puestas a su disposición
  - las armas ptolemaicas previamente asignadas a él
  lexicon: LSJ
  rationale: La frase indica armas ya designadas para Teódoto y calificadas como ptolemaicas. 'Asignadas' conserva la idea de distribución previa; 'ptolemaicas' sigue el adjetivo griego sin necesidad de ampliarlo.
- source_word: τὰ κράτιστα
  english_pob_choice: the best
  chosen_spanish: las mejores
  alternatives_spanish:
  - las más excelentes
  - las más fuertes
  lexicon: BDAG
  rationale: El superlativo señala las armas de mejor calidad o más selectas. 'Las mejores' es la solución más directa y fiel en español.
- source_word: διεκομίσθη
  english_pob_choice: was conveyed
  chosen_spanish: fue conducido
  alternatives_spanish:
  - fue llevado
  - fue transportado
  lexicon: LSJ
  rationale: La pasiva sugiere que alguien lo condujo o lo hizo llegar, no solo que él fue andando. 'Fue conducido' mantiene ese matiz pasivo y el tono narrativo elevado.
- source_word: νύκτωρ
  english_pob_choice: by night
  chosen_spanish: de noche
  alternatives_spanish:
  - por la noche
  - durante la noche
  lexicon: BDAG
  rationale: El adverbio temporal se expresa con naturalidad como 'de noche'. Es claro, breve y fiel al tiempo de la acción.
- source_word: σκηνήν
  english_pob_choice: tent
  chosen_spanish: tienda
  alternatives_spanish:
  - tienda de campaña
  - pabellón
  lexicon: LSJ
  rationale: En contexto militar, 'tienda' es la forma tradicional y comprensible en español. 'Tienda de campaña' sería más explícito, pero menos sobrio.
- source_word: ὡς μόνος κτεῖναι αὐτόν
  english_pob_choice: to kill him himself
  chosen_spanish: para matarlo él mismo
  alternatives_spanish:
  - para matarlo solo
  - para matarlo por su propia mano
  lexicon: BDAG
  rationale: La construcción expresa intención, y μόνος recalca que Teódoto haría la acción personalmente. 'Él mismo' preserva el énfasis sin forzar el sentido de 'solo' como si excluyera toda ayuda previa.
- source_word: ἐν τούτῳ διαλῦσαι τὸν πόλεμον
  english_pob_choice: in this way bring the war to an end
  chosen_spanish: de ese modo poner fin a la guerra
  alternatives_spanish:
  - así terminar la guerra
  - y de esa manera disolver la guerra
  lexicon: BDAG
  rationale: La frase indica resultado buscado por medio del asesinato. 'Poner fin a la guerra' expresa bien la idea de término del conflicto en español contemporáneo.
translation_notes:
  revision_awareness: La redacción sigue de cerca la lectura inglesa revisada más reciente, que prefirió una formulación natural para el valor de ὡς μόνος κτεῖναι αὐτόν ('to kill him himself') sin perder el énfasis en que Teódoto actuaría personalmente. También conserva la distinción entre el plan previo, las armas asignadas, la conducción nocturna y el propósito de terminar la guerra.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva 'Teódoto' para el nombre propio, en línea con el español bíblico usual y sin añadir formas no atestiguadas.
  - Se traduce ἐπιβουλήν con un término de hostilidad concreta ('trama') en vez de un vocabulario más técnico o eclesiástico.
  - Se conserva la pasiva de διεκομίσθη con 'fue conducido' para no borrar la acción de traslado implícita.
  - 'Se expresa μόνος en una nota para no sobrerinterpretar el alcance de la intención: el texto puede significar que él mismo lo mataría, no necesariamente que lo haría sin ayuda alguna en todo sentido.'
