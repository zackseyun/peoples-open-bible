id: ISA.55.7
reference: Isaiah 55:7
source:
  edition: WLC
  text: יַעֲזֹ֤ב רָשָׁע֙ דַּרְכּ֔/וֹ וְ/אִ֥ישׁ אָ֖וֶן מַחְשְׁבֹתָ֑י/ו וְ/יָשֹׁ֤ב אֶל יְהוָה֙ וִֽ/ירַחֲמֵ֔/הוּ וְ/אֶל אֱלֹהֵ֖י/נוּ כִּֽי יַרְבֶּ֥ה לִ/סְלֽוֹחַ־־־׃
translation:
  text: Let the wicked man forsake his way[a], and the man of iniquity his thoughts; let him return to Yahweh, and he will have compassion on him, and to our God[e][d][c][b], for he will abundantly pardon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the unrighteous man'; Hebrew 'the man of iniquity.'
    reason: lexical_alternative
  - marker: b
    text: Or 'let him turn back' or 'repent.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the LORD' represents the divine name YHWH.
    reason: alternative_reading
  - marker: d
    text: Or 'for he will freely forgive.'
    reason: lexical_alternative
  - marker: e
    text: Or 'him, and to our God'.
    reason: previous_rendering
lexical_decisions:
- source_word: יַעֲזֹב
  chosen: forsake
  alternatives:
  - leave
  - abandon
  lexicon: HALOT
  rationale: Qal imperfect/jussive-like in exhortation context; 'forsake' preserves the moral-volitional force better than the flatter 'leave.'
- source_word: רָשָׁע
  chosen: wicked man
  alternatives:
  - wicked person
  - guilty man
  lexicon: HALOT
  rationale: Singular masculine noun referring to an individual exemplar. 'Wicked man' is gender-accurate to the Hebrew form and fits the representative force of the exhortation.
- source_word: דַּרְכּוֹ
  chosen: his way
  alternatives:
  - his path
  - his conduct
  lexicon: HALOT
  rationale: '''Way'' is the standard metaphor for one''s course of life and preserves the Hebrew imagery without over-interpreting it as merely behavior.'
- source_word: אִישׁ אָוֶן
  chosen: the man of iniquity
  alternatives:
  - the unrighteous man
  - the man of evil
  - the man of trouble
  lexicon: HALOT
  rationale: Construct-like phrase with אָוֶן denoting wickedness/iniquity in this moral context. 'Man of iniquity' keeps the parallelism with 'wicked man' and avoids flattening the noun to an adjective.
- source_word: מַחְשְׁבֹתָיו
  chosen: his thoughts
  alternatives:
  - his plans
  - his schemes
  lexicon: HALOT
  rationale: The noun can denote thoughts, intentions, or plans. 'Thoughts' best matches the internal dimension contrasted with 'way' as outward conduct.
- source_word: וְיָשֹׁב
  chosen: let him return
  alternatives:
  - and let him turn back
  - and let him repent
  lexicon: HALOT
  rationale: שׁוּב commonly means 'return/turn back.' 'Return' preserves the relational movement toward God without importing the fuller theological term 'repent' as the direct gloss.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וִירַחֲמֵהוּ
  chosen: and he will have compassion on him
  alternatives:
  - and he will show him mercy
  - that he may have compassion on him
  lexicon: HALOT
  rationale: From רחם, denoting compassion/mercy. 'Have compassion on him' preserves the personal, affective sense. The imperfect after the exhortation is rendered as a resulting promise.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: Straightforward possessive form; retaining 'our' preserves the communal covenantal voice of the prophet.
- source_word: כִּי יַרְבֶּה לִסְלוֹחַ
  chosen: for he will abundantly pardon
  alternatives:
  - for he will freely forgive
  - for he will multiply to forgive
  - for he is great in forgiveness
  lexicon: HALOT
  rationale: The Hiphil of רבה with the infinitive 'to forgive' expresses abundance in forgiving. 'Abundantly pardon' is idiomatic English that preserves the intensifying force without awkward literalism.
