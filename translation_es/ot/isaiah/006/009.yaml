translation:
  language: es
  text: 'Y dijo: «Ve, y di a este pueblo: “Sigan oyendo[a], pero no entiendan; sigan viendo, pero no perciban”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Oigan, sí, pero no entiendan; vean, sí, pero no perciban», preservando de manera más formal la intensificación del hebreo. La línea también puede entenderse con fuerza predictiva: «De veras oirán ... de veras verán ...»'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And he said
  chosen_spanish: Y él dijo
  alternatives_spanish:
  - Entonces dijo
  - Y dijo
  lexicon: אמר
  rationale: Mantiene la fórmula narrativa directa del hebreo sin añadir énfasis innecesario; el sujeto explícito en español mejora la claridad natural del relato.
- source_word: לֵךְ
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Anda
  - Vete
  lexicon: הלך
  rationale: El imperativo breve reproduce bien la orden de comisión dada a Isaías y suena natural en español bíblico contemporáneo.
- source_word: וְאָמַרְתָּ
  english_pob_choice: and say
  chosen_spanish: y di
  alternatives_spanish:
  - y dirás
  - y dile
  lexicon: אמר
  rationale: La secuencia imperativa en español comunica mejor la continuación de la comisión que una forma futura; 'di' conserva el valor de mandato.
- source_word: לָעָם הַזֶּה
  english_pob_choice: to this people
  chosen_spanish: a este pueblo
  alternatives_spanish:
  - a esta gente
  - a este pueblo
  lexicon: עם
  rationale: '''Pueblo'' conserva el matiz colectivo y el tono profético del hebreo; ''gente'' sería más general y menos exacto aquí.'
- source_word: שִׁמְעוּ שָׁמוֹעַ
  english_pob_choice: Keep hearing
  chosen_spanish: Sigan oyendo
  alternatives_spanish:
  - Oigan bien
  - Sigan escuchando
  lexicon: שמע
  rationale: La combinación imperativo + infinitivo absoluto expresa intensidad o continuidad; 'sigan oyendo' preserva esa fuerza sin sonar mecánico.
- source_word: וְאַל תָּבִינוּ
  english_pob_choice: but do not understand
  chosen_spanish: pero no entiendan
  alternatives_spanish:
  - pero no comprendan
  - y no entiendan
  lexicon: בין
  rationale: '''Entender'' es el equivalente más directo en español para בין en este contexto de percepción/comprensión; el conector ''pero'' refleja adecuadamente el contraste pragmático.'
- source_word: וּרְא֥וּ רָא֖וֹ
  english_pob_choice: keep seeing
  chosen_spanish: sigan viendo
  alternatives_spanish:
  - vean bien
  - sigan mirando
  lexicon: ראה
  rationale: Como en el primer miembro, la intensificación se traduce mejor con una forma continua en español que con una calca literal de infinitivo absoluto.
- source_word: וְאַל תֵּדָעוּ
  english_pob_choice: but do not perceive
  chosen_spanish: pero no perciban
  alternatives_spanish:
  - pero no sepan
  - pero no adviertan
  lexicon: ידע
  rationale: Aunque ידע puede significar 'saber/conocer', aquí el paralelo con 'ver' favorece un verbo de captación perceptiva; 'perciban' conserva esa relación y la agudeza del juicio profético.
theological_decisions:
- issue: 'Forma del enunciado: mandato profético con fuerza judicial versus mera predicción'
  english_pob_reading: 'Direct imperatives with rhetorical force: ''Keep hearing ... keep seeing ... do not understand ... do not perceive.'''
  chosen_spanish_reading: 'Mandatos proféticos con fuerza judicial: ''Sigan oyendo ... sigan viendo ... no entiendan ... no perciban.'''
  alternative_spanish_readings:
  - 'Lectura predictiva: ''oirán ... pero no entenderán; verán ... pero no percibirán.'''
  rationale: El hebreo usa imperativos y formas de negación que funcionan como comisión profética; la traducción debe conservar esa gramática, aunque el contexto comunica un endurecimiento judicial. La nota permite registrar la posible lectura predictiva sin resolver la tensión.
  doctrine_reference: Isaías 6:9; preservación de la tensión profética/judicial en la traducción
- issue: Valor de תֵּדָעוּ en paralelo con תָּבִינוּ y רְאוּ
  english_pob_reading: do not perceive
  chosen_spanish_reading: no perciban
  alternative_spanish_readings:
  - no sepan
  - no conozcan
  rationale: '''Perciban'' encaja mejor con el paralelismo de percepción visual y comprensión intelectual del verso; evita repetir ''saber'' de manera demasiado abstracta y mantiene la progresión retórica.'
  doctrine_reference: Isaías 6:9; paralelismo semántico en el texto hebreo
translation_notes:
  revision_awareness: Se incorporó la revisión auditada que favorece 'percibir' para el último miembro, manteniendo el paralelismo lexical y la tensión entre mandato e ironía judicial sin convertirla en mera predicción.
  spanish_consistency_notes:
  - Se usó 'pueblo' para לָעָם הַזֶּה por ser el equivalente más natural y profético en español.
  - Se mantuvo la repetición aspectual con 'sigan' para reflejar el intensivo hebreo sin calco áspero.
  - '''Perciban'' se reservó para תֵּדָעוּ siguiendo la decisión inglesa revisada y para evitar confundirlo con תָּבִינוּ.'
  - La puntuación con comillas angulares y una cita interna reproduce la estructura de discurso directo del original.
