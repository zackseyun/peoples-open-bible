review_pass:
  verdict: revise
  source_alignment_summary: 'La propuesta española capta bien la idea general del hebreo difícil: Dios no necesita fijar un plazo adicional antes del juicio. Sin embargo, «a Dios» debilita la decisión auditada «before God» y en español suena menos judicial que «ante Dios». Además, la nota al pie actual repite prácticamente el texto principal en vez de reflejar claramente la alternativa documentada («tiempo adicional / tiempo más»).'
  spanish_quality_summary: 'El borrador es legible y digno, pero «fija más tiempo» suena algo tosco en español bíblico-natural. «No fija un tiempo más» o mejor «no fija más tiempo» puede funcionar, pero el giro mejora claramente si se refuerza el marco forense con «ante Dios». La nota necesita pulirse: la apertura con comillas y «O:» está mal formada y la redacción debe ser más natural en español.'
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto: אֵל se traduce correctamente como «Dios», no como nombre divino; no aparecen otros términos sensibles del glosario. La principal cuestión es idiomática y de correspondencia con la decisión inglesa auditada de «before God», mejor representada por «ante Dios».'
  issues:
  - severity: medium
    issue: «a Dios» no refleja bien el valor judicial de אֶל אֵל en este contexto
    rationale: Aunque literal, en español «ir a Dios en juicio» suena menos natural y menos forense que «ir ante Dios en juicio», mientras que la auditoría inglesa documenta explícitamente «before God» como decisión contextual.
  - severity: medium
    issue: La nota al pie está mal formulada y no presenta con claridad la alternativa documentada
    rationale: 'Empieza con una construcción defectuosa («''O: ...») y repite el texto principal. Debe expresar con claridad la lectura alternativa: «no fija un tiempo más/adicional» y explicar la compresión del hebreo.'
  - severity: low
    issue: «fija más tiempo» es entendible pero algo rígido
    rationale: No es incorrecto, pero en combinación con «ante Dios» conviene mantener la frase y dejar la aclaración en nota, o alternativamente usar «un tiempo más». La reparación principal necesaria es el complemento preposicional.
  revised_spanish_text: Porque no fija más tiempo a un hombre para ir ante Dios en juicio[a].
  revised_footnotes:
  - marker: a
    text: 'O: «Porque no fija un tiempo más para que un hombre vaya ante Dios en juicio». El hebreo es difícil y comprimido; el sentido probable es que Dios no necesita conceder una audiencia adicional ni un aplazamiento antes de juzgar.'
    reason: alternative_reading
