revisions:
- from: 'No confíen en palabras engañosas[a], diciendo: «Templo de Yahvé, templo de Yahvé[b], templo de Yahvé; estos son».'
  to: 'No confíen en palabras engañosas[a], diciendo: «El templo de Yahvé, el templo de Yahvé[b], el templo de Yahvé: estos son».'
  rationale: Se añade el artículo 'el' para lograr un español natural y específico al templo de Jerusalén, sin perder la repetición enfática del hebreo. Se mantiene 'estos son' para conservar la deixis de הֵמָּה, pero se integra mejor con dos puntos después de la tercera repetición para que la cita sea más clara en español. También se ajusta la nota b para reflejar la fórmula completa.
