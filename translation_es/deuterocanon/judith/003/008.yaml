  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: demolición de límites, tala de arboledas cultuales, destrucción de los dioses de la tierra, culto exclusivo a Nabucodonosor e invocación de él como dios. Sin embargo, hay un problema claro en la nota c: presenta como alternativa exactamente la misma frase ya usada en el texto, y por tanto no preserva la alternativa documentada en el inglés (''llamar/invocar'' matiz) sino que la duplica. Además, ''todas sus lenguas'' suena menos natural en español que ''todas sus lenguas/idiomas y todas sus tribus'', pero puede mantenerse; el ajuste principal es la nota.'
  spanish_quality_summary: El español es mayormente claro y digno. 'Derribó todos sus linderos' y 'bosquecillos sagrados' son comprensibles, aunque 'arboledas sagradas' sería un poco más idiomático. La oración fluye bien. La única falla de calidad/documentación que requiere corrección es la nota c defectuosa. Aprovechable también una leve mejora estilística en 'y que todas sus lenguas...' para paralelismo, pero no es obligatoria.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Dios/dios' está bien manejado con minúscula final por tratarse de divinización imperial. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La decisión 'adoraran' para λατρεύσωσι y 'lo invocaran como dios' para ἐπικαλέσωνται αὐτὸν εἰς θεόν concuerda con el expediente inglés.
  issues:
  - severity: medium
    issue: La nota c repite el texto principal en lugar de dar una alternativa real.
    rationale: El inglés documenta una alternativa interpretativa ('might invoke him as god') frente a 'call on him as god'. En español, la nota debería ofrecer una variante como 'o "lo llamaran dios"' o similar, no duplicar literalmente 'lo invocaran como dios'.
  - severity: low
    issue: '''Bosquecillos sagrados'' es fiel pero menos idiomático que ''arboledas sagradas''.'
    rationale: ἄλση se refiere a groves/arboledas de culto; 'bosquecillos' puede sonar diminutivo o menos natural en registro bíblico español. No es error grave, pero conviene suavizarlo.
