translation:
  language: es
  text: Una vez hablé[a], y no responderé; dos veces, y no añadiré más.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Hablé una vez, y no responderé; dos veces, y no añadiré más». El hebreo usa un modismo en el que "añadir" puede significar continuar o repetir una acción.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחַת
  english_pob_choice: once
  chosen_spanish: una vez
  alternatives_spanish:
  - una cosa
  - una vez
  lexicon: HALOT
  rationale: El numeral femenino singular funciona adverbialmente junto con el verbo de habla; en español, "una vez" transmite de modo natural el valor idiomático de "once" sin volverlo literal de más.
- source_word: דִּבַּרְתִּי
  english_pob_choice: I have spoken
  chosen_spanish: hablé
  alternatives_spanish:
  - he hablado
  - hablé
  lexicon: HALOT
  rationale: El perfecto hebreo presenta una acción ya realizada. En este contexto de réplica de Job, el pretérito simple suena natural en español y mantiene la referencia a una palabra ya dicha.
- source_word: וְלֹא אֶעֱנֶה
  english_pob_choice: and I will not answer
  chosen_spanish: y no responderé
  alternatives_spanish:
  - pero no responderé
  - y no responderé más
  lexicon: HALOT
  rationale: ענה en qal significa "responder". Conservar la coordinación simple "y" evita cargar el contraste que no está explicitado en el hebreo, y el futuro expresa la resolución de Job de no seguir contestando.
- source_word: וּשְׁתַּיִם
  english_pob_choice: twice
  chosen_spanish: dos veces
  alternatives_spanish:
  - dos veces
  - una segunda vez
  lexicon: HALOT
  rationale: El número dos es adverbial aquí, equivalente a "twice". "Dos veces" preserva el paralelismo con "una vez" en español de forma clara y natural.
- source_word: וְלֹא אוֹסִיף
  english_pob_choice: and I will add nothing more
  chosen_spanish: y no añadiré más
  alternatives_spanish:
  - y no continuaré
  - y no añadiré nada más
  - y no seguiré
  lexicon: HALOT
  rationale: יסף en hifil puede significar "añadir", pero en este giro idiomático refiere a no continuar la acción. "No añadiré más" conserva la metáfora hebrea de "añadir" y el sentido de no proseguir hablando.
translation_notes:
  revision_awareness: El texto coincide con el sentido confirmado por el audit trail inglés y no requiere revisión adicional; se preservó la tensión idiomática de יסף con una nota alternativa.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y bíblico, sin recurrir a fórmulas eclesiásticas innecesarias.
  - '"Responderé" y "añadiré" conservan la fuerza verbal del hebreo y el paralelismo sintáctico del verso.'
  - La nota al pie mantiene la alternativa documentada sobre el sentido idiomático de "añadir".
