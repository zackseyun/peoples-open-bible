    rationale: Ambas opciones son fieles a וְשַׂמְתָּ שְׁמוֹ, pero la auditoría inglesa prefirió una formulación idiomática equivalente a 'gave him the name'. En español general, 'le diste el nombre Abraham' comunica la renominación con más naturalidad moderna.
