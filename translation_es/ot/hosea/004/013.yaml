base_translation:
  language: en
  yaml_path: translation/ot/hosea/004/013.yaml
  text: On the tops of the mountains they sacrifice[a], and on the hills they burn incense, under oak and poplar and terebinth, because their shade is good. Therefore your daughters prostitute themselves[c][b], and your daughters-in-law commit adultery.
  footnotes:
  - marker: a
    text: Or 'they burn incense.' The Hebrew verb can refer specifically to burning incense or more broadly to making offerings go up in smoke.
    reason: lexical_alternative
  - marker: b
    text: The tree names are traditionally identified as oak, poplar, and terebinth; exact botanical equivalents are not fully certain.
    reason: cultural_note
  - marker: c
    text: Hosea often uses sexual unfaithfulness as imagery for covenant unfaithfulness; here the wording also plainly describes literal sexual sin.
    reason: cross_reference
