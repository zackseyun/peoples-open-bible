translation:
  language: es
  text: Mientras Samuel ofrecía el holocausto, los filisteos se acercaron para la batalla contra Israel. Pero Yahvé tronó con gran estruendo[a] en aquel día contra los filisteos, y los confundió, y fueron derrotados delante de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con un poderoso trueno» o «con un gran ruido». El hebreo dice literalmente «con un gran sonido».
    reason: lexical_alternative
lexical_decisions:
- source_word: מַעֲלֶה
  english_pob_choice: was offering up
  chosen_spanish: ofrecía
  alternatives_spanish:
  - estaba ofreciendo
  - ofrecía en ofrenda
  lexicon: HALOT
  rationale: El participio hifil en narrativa describe una acción en curso; en español, el imperfecto «ofrecía» transmite bien esa continuidad sin sonar forzado. Evita un calco como «estaba levantando» que no comunica el acto sacrificial.
- source_word: הָעֹלָה
  english_pob_choice: the burnt offering
  chosen_spanish: el holocausto
  alternatives_spanish:
  - el sacrificio quemado
  - la ofrenda quemada
  lexicon: HALOT
  rationale: עֹלָה designa la ofrenda totalmente consumida por el fuego. «Holocausto» es un término bíblico y reconocible en español para ese sacrificio, aunque en uso moderno puede requerir cuidado contextual.
- source_word: נִגְּשׁוּ
  english_pob_choice: drew near
  chosen_spanish: se acercaron
  alternatives_spanish:
  - se aproximaron
  - vinieron cerca
  lexicon: HALOT
  rationale: El verbo indica aproximación; «se acercaron» es natural y conserva el avance militar del pasaje.
- source_word: לַמִּלְחָמָה
  english_pob_choice: for battle
  chosen_spanish: para la batalla
  alternatives_spanish:
  - a la batalla
  - para combatir
  lexicon: HALOT
  rationale: La construcción expresa propósito o movimiento hacia el combate. «Para la batalla» mantiene esa relación sin sobretraducir.
- source_word: בְּיִשְׂרָאֵל
  english_pob_choice: against Israel
  chosen_spanish: contra Israel
  alternatives_spanish:
  - frente a Israel
  - en contra de Israel
  lexicon: HALOT
  rationale: Aunque el hebreo usa ב, el contexto militar hostil exige un equivalente adversativo claro en español. «Contra Israel» conserva la fuerza relacional del texto.
- source_word: וַיַּרְעֵם
  english_pob_choice: thundered
  chosen_spanish: tronó
  alternatives_spanish:
  - truenoó
  - hizo tronar
  lexicon: HALOT
  rationale: El verbo רעם, aplicado a Dios, expresa el trueno divino; «tronó» es la forma más natural y directa en español.
- source_word: בְּקוֹל גָּדוֹל
  english_pob_choice: with a great sound
  chosen_spanish: con gran sonido
  alternatives_spanish:
  - con gran estruendo
  - con un gran ruido
  - con gran voz
  lexicon: HALOT
  rationale: קוֹל puede significar sonido, voz o ruido. «Con gran sonido» refleja la elección auditiva amplia del POB inglés y evita fijarlo prematuramente como «voz», que podría sugerir habla.
- source_word: וַיְהֻמֵּם
  english_pob_choice: threw them into confusion
  chosen_spanish: los llenó de confusión
  alternatives_spanish:
  - los confundió
  - los puso en pánico
  - los desbarató
  lexicon: HALOT
  rationale: El verbo הָמַם expresa causar desconcierto, pánico o confusión en combate. «Los llenó de confusión» conserva el efecto causado sin introducir un matiz militar más específico que el hebreo no exige.
- source_word: וַיִּנָּגְפוּ
  english_pob_choice: they were defeated
  chosen_spanish: fueron derrotados
  alternatives_spanish:
  - fueron vencidos
  - cayeron
  - fueron abatidos
  lexicon: HALOT
  rationale: En contexto bélico, נָגַף en nifal significa ser derrotado o abatido. «Fueron derrotados» expresa el resultado con claridad y sin exceder el alcance del verbo.
- source_word: לִפְנֵי יִשְׂרָאֵל
  english_pob_choice: before Israel
  chosen_spanish: delante de Israel
  alternatives_spanish:
  - ante Israel
  - en presencia de Israel
  lexicon: HALOT
  rationale: La expresión idiomática indica derrota en la presencia o frente al enemigo. «Delante de Israel» es natural en español y conserva el sentido espacial y relacional del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la norma del proyecto para el Tetragrama: «Yahvé» en el texto principal. Mantiene el nombre divino personal y evita la sustitución por un título.'
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  - el SEÑOR
  rationale: 'El pasaje usa el Tetragrama directamente. En consonancia con la política del proyecto, se preserva el nombre divino con una forma española establecida y reverente: «Yahvé». Se evita «el SEÑOR» porque ocultaría el nombre propio presente en el hebreo.'
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH'
- issue: Sentido de בְּקוֹל גָּדוֹל
  english_pob_reading: with a great sound
  chosen_spanish_reading: con gran sonido
  alternative_spanish_readings:
  - con gran estruendo
  - con gran voz
  - con gran ruido
  rationale: El hebreo habla de «sonido/voz» de forma amplia. La formulación elegida mantiene esa amplitud y deja abierta la relación con el trueno divino sin convertirla en una interpretación más estrecha de la que el texto exige.
  doctrine_reference: Principio de no borrar tensiones léxicas entre קול como sonido/voz
translation_notes:
  revision_awareness: Se consultó el texto hebreo consonante/vocalizado y la auditoría inglesa. La redacción española sigue la lectura óptimo-equivalente del POB inglés, pero con terminología ajustada al uso bíblico en español y al mandato del proyecto de conservar «Yahvé» para el Tetragrama. No se observaron revisiones aplicadas en la fuente inglesa reciente.
  spanish_consistency_notes:
  - 'Se mantuvo el orden narrativo del hebreo: acción sacrificial de Samuel, aproximación militar filistea, intervención divina, confusión del enemigo y derrota ante Israel.'
  - «Holocausto» se usa como término sacrificial específico; no se emplea como referencia moderna general.
  - «Yahvé» se emplea de manera consistente para el nombre divino en el texto principal.
  - La nota al pie preserva la alternativa semántica de קול sin forzar una sola lectura.
