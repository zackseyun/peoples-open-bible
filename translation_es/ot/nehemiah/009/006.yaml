  to: Solo tú eres Yahvé. Tú hiciste los cielos, los cielos de los cielos[a] y toda su hueste; la tierra y todo lo que hay sobre ella, los mares y todo lo que hay en ellos; y tú mantienes con vida a todos ellos[b], y la hueste de los cielos se postra ante ti[c].
  rationale: Se corrige el anclaje de la nota [a] para que corresponda a la frase que explica. Se sustituye 'ejército' por 'hueste' en ambas apariciones para reflejar mejor el sentido amplio de צָבָא en el contexto celestial y alinearse con la justificación léxica de la POB. Se ajusta 'a todos' a 'a todos ellos' para representar mejor la totalidad explícita del hebreo. También se mejora ligeramente la naturalidad enfática inicial con 'Solo tú eres Yahvé'.
