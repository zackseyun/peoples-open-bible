    text: The surviving Hebrew and Greek differ in the details of the priestly garments here. The Hebrew reads 'trousers, tunics, and a robe ... bells,' while the Greek witness has a different sequence and includes the ephod.
    reason: textual_variant
  - marker: b
    text: Or 'full ornament of beauty' for 'perfect splendor'; the Hebrew phrase is compact and exalted, and the Greek points in a similarly heightened direction.
