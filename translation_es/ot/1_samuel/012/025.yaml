translation:
  language: es
  text: Pero si ustedes persisten en hacer lo malo[a], tanto ustedes como su rey serán barridos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «si hacen lo malo» o «si actúan perversamente»; el hebreo intensifica el verbo con un infinitivo absoluto.
    reason: lexical_alternative
  - marker: b
    text: O «perecerán» o «serán destruidos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Si
  lexicon: HALOT
  rationale: La partícula conjunta-condicional admite un valor adversativo en este contexto. «Pero si» conserva la oposición discursiva frente a la advertencia anterior y suena natural en español.
- source_word: הָרֵעַ תָּרֵעוּ
  english_pob_choice: you persist in doing evil
  chosen_spanish: persisten en hacer lo malo
  alternatives_spanish:
  - hacen lo malo
  - obran mal
  - actúan wickedly
  lexicon: HALOT
  rationale: La construcción con infinitivo absoluto intensifica el verbo; «persisten en hacer lo malo» comunica la fuerza enfática sin caer en una repetición torpe. Se prefirió «hacer lo malo» para mantener el valor moral general del hebreo sin exagerar el matiz lexical.
- source_word: גַּם אַתֶּם גַּם מַלְכְּכֶם
  english_pob_choice: both you and your king
  chosen_spanish: tanto ustedes como su rey
  alternatives_spanish:
  - ambos, ustedes y su rey
  - ustedes también, y también su rey
  lexicon: HALOT
  rationale: El doble גַּם marca inclusión de ambas partes bajo la misma advertencia. «Tanto... como...» reproduce bien el paralelismo distributivo en español.
- source_word: תִּסָּפוּ
  english_pob_choice: will be swept away
  chosen_spanish: serán arrastrados
  alternatives_spanish:
  - perecerán
  - serán destruidos
  - serán consumidos
  lexicon: HALOT
  rationale: El nifal de ספה puede expresar ser removido o barrido en juicio. «Serán arrastrados» conserva la pasividad y el sentido de remoción violenta, aunque en español permite también oír el matiz de desastre/jucio corporativo.
theological_decisions:
- issue: Alcance del juicio anunciado sobre pueblo y rey
  english_pob_reading: A corporate warning of divine judgment/removal affecting both the people and their king
  chosen_spanish_reading: Una advertencia corporativa de juicio divino que afecta tanto al pueblo como a su rey
  alternative_spanish_readings:
  - solo una derrota militar
  - solo una ruina espiritual
  rationale: El versículo no especifica la forma concreta del juicio; por eso la traducción evita precisar más allá de la remoción/ruina anunciada. «Serán arrastrados» mantiene abierta la amplitud del castigo sin reducirlo a una sola modalidad.
  doctrine_reference: Juicio pactal/divino sobre la comunidad y su rey
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo de 1 Samuel 12:25 y el audit trail en inglés. Se mantuvo la advertencia condicional adversativa, la intensificación verbal del infinitivo absoluto y el alcance corporativo del juicio, sin suavizar ni precisar indebidamente el resultado.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma por defecto del proyecto solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se eligió «hacer lo malo» para reflejar el valor moral general de רַע/רעע sin imponer un matiz más técnico de «maldad» que no exige el contexto.
  - «Ustedes» y «su rey» mantienen un registro claro y bíblico en español latinoamericano.
  - La voz pasiva «serán arrastrados» preserva el efecto de juicio sufrido por ambos sujetos.
