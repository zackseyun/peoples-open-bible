revisions:
- from: Ahora escucha mi voz[a]; te aconsejaré, y que Dios esté contigo. Tú sé para el pueblo delante de Dios[b], y tú llevarás los asuntos[c] a Dios.
  to: Ahora escucha mi voz; te aconsejaré, y que Dios esté contigo[a]. Sé tú para el pueblo delante de Dios[b], y llevarás los asuntos[c] a Dios.
  rationale: La revisión corrige el anclaje erróneo de la nota [a], ordena y ubica las notas donde corresponden según el contenido que explican, mejora la naturalidad de «Sé tú para el pueblo» sin abandonar la transparencia frente al hebreo, y elimina un pronombre redundante para un español más fluido y digno. Se mantiene «Dios», «delante de Dios» y «asuntos» como decisiones fieles al expediente léxico y teológico.
