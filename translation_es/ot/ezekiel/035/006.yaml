review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español conserva bien la estructura del hebreo, especialmente la repetición retórica de דָם (''sangre''), la fórmula juratoria ''vivo yo'' y el refrán ''la sangre te perseguirá''. También mantiene correctamente la nota sobre el juego de palabras. Sin embargo, ''declara el Señor Yahvé'' no sigue del todo la política terminológica del proyecto para יהוה dentro de אֲדֹנָי יְהוִה: en español conviene evitar la yuxtaposición poco natural ''Señor Yahvé'' y reflejar mejor el título compuesto como ''el Señor Dios, Yahvé'' o equivalente claro. Además, el primer marcador [a] está mal anclado: la nota explica ''yo te haré sangre'', no ''Por tanto''.'
  spanish_quality_summary: El español es claro y digno, con buen registro bíblico moderno. 'Yo te haré sangre' suena extraño, pero esa aspereza es deliberada y fiel al hebreo; la nota lo justifica bien. 'No has aborrecido la sangre' es inteligible y preserva el peso verbal. Los ajustes necesarios son principalmente de terminología divina y de colocación de la nota, no de fluidez general.
  glossary_alignment: Alineación parcial. 'sangre', 'perseguirá' y la preservación del juego léxico están bien. Pero la política del proyecto pide יהוה -> 'Yahvé' en el texto principal; en la combinación אֲדֹנָי יְהוִה el borrador usa 'Señor Yahvé', que preserva Yahvé pero resulta menos natural y menos transparente que una forma como 'el Señor Dios, Yahvé'.
  issues:
  - severity: medium
    issue: Tratamiento poco natural de אֲדֹנָי יְהוִה como 'el Señor Yahvé'
    rationale: Aunque incluye 'Yahvé', la combinación española 'Señor Yahvé' suena forzada y puede oscurecer que אֲדֹנָי funciona como título separado. 'El Señor Dios, Yahvé' preserva el nombre divino y mejora la claridad litúrgica y la legibilidad.
  - severity: medium
    issue: Marcador de nota [a] anclado en 'Por tanto' en vez de en 'yo te haré sangre'
    rationale: La nota a explica la literalidad y el juego de palabras de לְדָם אֶעֶשְׂךָ, por lo que el marcador debe aparecer junto a esa frase y no junto al conector inicial.
  revised_spanish_text: Por tanto, vivo yo, declara el Señor Dios, Yahvé, yo te haré sangre[a], y la sangre te perseguirá. Ciertamente no has aborrecido la sangre[b], así que la sangre te perseguirá.
  revised_footnotes:
