translation:
  language: es
  text: Esto es lo que hicieron sus padres cuando yo los envié desde Cades-barnea para ver la tierra.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para inspeccionar» o «para espiar la tierra». El verbo hebreo significa literalmente «ver», pero en este contexto se refiere a recorrerla para reconocerla.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה
  english_pob_choice: This is what
  chosen_spanish: Esto es lo que
  alternatives_spanish:
  - Así
  - De este modo
  lexicon: HALOT
  rationale: La expresión introduce un ejemplo previo para comparar con la situación presente. «Esto es lo que» conserva bien el valor demostrativo y suena natural en español moderno.
- source_word: עָשׂוּ
  english_pob_choice: did
  chosen_spanish: hicieron
  alternatives_spanish:
  - actuaron
  - procedieron
  lexicon: HALOT
  rationale: El verbo simple de acción pasada reproduce con fidelidad el hebreo עשה en este contexto narrativo.
- source_word: אֲבֹתֵיכֶם
  english_pob_choice: your fathers
  chosen_spanish: sus padres
  alternatives_spanish:
  - sus antepasados
  lexicon: HALOT
  rationale: El hebreo dice literalmente «sus padres». En español, «padres» preserva la fuerza generacional y la cercanía formal del original mejor que una expansión interpretativa.
- source_word: בְּשָׁלְחִי
  english_pob_choice: when I sent
  chosen_spanish: cuando yo envié
  alternatives_spanish:
  - al enviar yo
  - cuando los había enviado
  lexicon: HALOT
  rationale: La construcción con ב + infinitivo con sufijo 1cs expresa valor temporal en este pasaje. «Cuando yo envié» comunica ese sentido de manera natural sin perder la referencia a la acción de enviar.
- source_word: אֹתָם
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  lexicon: HALOT
  rationale: El objeto directo se refiere a «sus padres». En español, el pronombre átono «los» es la forma más natural y clara en este contexto.
- source_word: מִקָּדֵשׁ בַּרְנֵעַ
  english_pob_choice: from Kadesh-barnea
  chosen_spanish: desde Cades-barnea
  alternatives_spanish:
  - desde Cadés-barnea
  - desde Cades Barnea
  lexicon: HALOT
  rationale: Se translitera el topónimo de manera consistente y legible en español. «Desde» refleja היטב el punto de partida del envío.
- source_word: לִרְאוֹת
  english_pob_choice: to see
  chosen_spanish: para ver
  alternatives_spanish:
  - para inspeccionar
  - para explorar
  lexicon: HALOT
  rationale: El hebreo dice literalmente «ver». En contexto se trata de una exploración del territorio, pero la traducción principal mantiene el verbo básico y deja la implicación contextual sin sobretraducir.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra prometida
  - el país
  lexicon: HALOT
  rationale: «La tierra» es una traducción natural y fiel del sustantivo הארץ en este contexto. Aunque alude a la tierra prometida, el hebreo aquí no añade esa especificación.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el texto hebreo y el criterio auditado de la POB inglesa: mantiene el sentido demostrativo de כֹּה, el valor temporal de בְּשָׁלְחִי y la literalidad contextual de לִרְאוֹת con una nota para las alternativas interpretativas.'
  spanish_consistency_notes:
  - Se usa «Cades-barnea» como forma transliterada uniforme del topónimo.
  - Se conserva «la tierra» sin expansionar a «la tierra prometida», porque el hebreo no lo dice explícitamente.
  - El pronombre objeto directo se expresa de forma natural en español con «los».
