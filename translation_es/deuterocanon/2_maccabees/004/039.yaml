  to: Pero cuando en la ciudad se habían cometido muchos actos de robo de cosas sagradas por Lisímaco[a], con el consentimiento de Menelao, y la noticia[b] se había difundido fuera de la ciudad, la multitud se reunió contra Lisímaco, pues ya habían sido saqueados muchos objetos de oro.
  rationale: 'Se hicieron ajustes menores para mejorar la naturalidad del español y acercar más la traducción al valor léxico documentado: «fuera de la ciudad» expresa mejor ἔξω en contexto, y «saqueados» refleja mejor διηρπαγμένων que «arrebatados». También se reancló la nota b en «noticia», que es donde recae la alternativa léxica de φήμη.'
