lexical_decisions:
- source_word: ἀπέστειλαν
  english_pob_choice: they sent
  chosen_spanish: enviaron
  alternatives_spanish:
  - mandaron
  - remitieron
  lexicon: BDAG
  rationale: El aoristo expresa una acción de envío; en español, «enviaron» es natural y fiel al sentido básico sin añadir matices diplomáticos o epistolares no presentes en el griego.
- source_word: εἰς Ἰερουσαλήμ
  english_pob_choice: to Jerusalem
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - hacia Jerusalén
  - a la ciudad de Jerusalén
  lexicon: BDAG
  rationale: Con nombre de ciudad, «a Jerusalén» comunica bien el movimiento hacia el lugar y evita un calco menos idiomático como «hacia».
- source_word: πρὸς Ἰωακεὶμ ... τὸν ἱερέα
  english_pob_choice: to Jehoiakim son of Hilkiah, son of Shallum, the priest
  chosen_spanish: a Joaquim hijo de Helcías, hijo de Salún, el sacerdote
  alternatives_spanish:
  - a Jehoiaquim hijo de Helcías, hijo de Salún, el sacerdote
  - a Joaquim hijo de Helcías, hijo de Salún, sacerdote
  lexicon: BDAG
  rationale: πρός indica destinatarios del envío. Se conserva «el sacerdote» porque el griego dice ἱερεύς y no ἀρχιερεύς; «Joaquim» sigue la forma española usual del nombre, sin forzar un título superior que el texto no da.
- source_word: τοὺς ἱερεῖς
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los presbíteros
  - los curas
  lexicon: BDAG
  rationale: Plural simple de ἱερεύς; «sacerdotes» es la correspondencia directa y mantiene el registro bíblico adecuado.
- source_word: πάντα τὸν λαόν
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - toda la gente
  - toda la población
  lexicon: BDAG
  rationale: La colectividad griega se reproduce de forma natural con «todo el pueblo», que preserva el sentido comunitario y suena más bíblico que «toda la gente».
- source_word: τοὺς εὑρεθέντας
  english_pob_choice: who were found
  chosen_spanish: que fue hallado
  alternatives_spanish:
  - que fueron hallados
  - que estaban allí
  lexicon: BDAG
  rationale: 'El participio pasivo de εὑρίσκω se conserva con una forma pasiva: «que fue hallado». Aunque la concordancia singular puede sonar marcada en español, refleja la singularidad griega transmitida por el texto y evita normalizarla prematuramente.'
- source_word: μετ᾽ αὐτοῦ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - con él mismo
  - con ese hombre
  lexicon: BDAG
  rationale: Se mantiene el singular como en el griego transmitido. En español, «con él» transmite la misma referencia pronominal sin sobreexplicar el antecedente, cuya identificación exacta queda implícita en el contexto.
theological_decisions:
- issue: Título sacerdotal sin expansión a 'sumo sacerdote'
  english_pob_reading: the priest; the Greek does not include high priest
  chosen_spanish_reading: el sacerdote
  alternative_spanish_readings:
  - el sumo sacerdote
  - el sacerdote principal
  rationale: La lectura evita introducir un grado jerárquico no expresado en ἱερεύς. Esto preserva la precisión textual y la distinción entre ἱερεύς y ἀρχιερεύς.
  doctrine_reference: Precisión léxica en títulos ministeriales; cf. distinción griega entre ἱερεύς y ἀρχιερεύς
translation_notes:
  revision_awareness: Se siguió de cerca el texto griego de Swete y el audit trail inglés. Se conservó la ambigüedad del singular de μετ᾽ αὐτοῦ en el pie de nota, sin normalizarla a plural. No hubo revisiones aplicadas en el pasaje inglés, y la versión española mantiene esa misma línea de alta concordancia.
  spanish_consistency_notes:
  - Se usa «Yahvé» como convención general del proyecto cuando corresponda, pero este versículo no contiene el tetragrámaton.
  - Se prefirió «sacerdote/sacerdotes» para ἱερεύς/ἱερεῖς, de acuerdo con la práctica del proyecto y el griego.
  - Se mantuvo un español claro y litúrgicamente sobrio, evitando arcaísmos innecesarios.
