translation:
  language: es
  text: 'Y de los hijos de Elam: Jeshaías, hijo de Atalía, y con él setenta varones[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «setenta hombres». El hebreo dice más específicamente «los varones».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מִ/בְּנֵי
  english_pob_choice: And from the sons of
  chosen_spanish: Y de los hijos de
  alternatives_spanish:
  - Y de los descendientes de
  - Y de la familia de
  lexicon: HALOT
  rationale: El hebreo introduce una unidad genealógica/lista de procedencia. «Hijos de» conserva la forma directa del texto base y su valor de pertenencia a un linaje, sin forzar una relación exclusivamente biológica.
- source_word: עֵילָם
  english_pob_choice: Elam
  chosen_spanish: Elam
  lexicon: HALOT
  rationale: Nombre propio transliterado de manera transparente y usual en español bíblico.
- source_word: יְשַׁעְיָה
  english_pob_choice: Jeshaiah
  chosen_spanish: Jeshaías
  alternatives_spanish:
  - Jeshaia
  lexicon: HALOT
  rationale: Se mantiene el nombre propio con una forma hispanizada y reconocible. «Jeshaías» conserva mejor la sonoridad y lectura natural en español que una transliteración más cruda.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: En un patronímico inmediato, «hijo de» es la equivalencia natural y fiel en español, manteniendo la relación nominal directa.
- source_word: עֲתַלְיָה
  english_pob_choice: Athaliah
  chosen_spanish: Atalía
  alternatives_spanish:
  - Atalías
  lexicon: HALOT
  rationale: Nombre propio traducido con la forma tradicional y corriente en español bíblico, evitando una transliteración más dura.
- source_word: וְ/עִמּוֹ
  english_pob_choice: and with him
  chosen_spanish: y con él
  alternatives_spanish:
  - con él
  lexicon: HALOT
  rationale: La coordinación hebrea se expresa de forma natural en español y conserva el matiz de acompañamiento del conteo.
- source_word: שִׁבְעִים
  english_pob_choice: seventy
  chosen_spanish: setenta
  lexicon: HALOT
  rationale: Número cardinal directo y sin ambigüedad.
- source_word: הַ/זְּכָרִים
  english_pob_choice: males
  chosen_spanish: varones
  alternatives_spanish:
  - males
  - hombres
  lexicon: HALOT
  rationale: El hebreo dice literalmente «los machos / los varones»; en español bíblico «varones» preserva la referencia masculina y el tono de registro administrativo mejor que «hombres».
translation_notes:
  revision_awareness: El texto inglés POB y la revisión más reciente coinciden plenamente; no hubo cambios de contenido. La decisión española conserva el valor genealógico de la lista y la precisión de הַזְּכָרִים como referencia masculina explícita.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando el texto lo requiera; aquí no aparece el Tetragrámaton.
  - Se usa «Jeshaías» y «Atalía» como formas hispanizadas consistentes con un registro bíblico legible.
  - «Varones» funciona como equivalente de lista censal y evita el sentido más general de «hombres».
