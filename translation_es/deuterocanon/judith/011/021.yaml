  rationale: Se mantiene la fidelidad general del borrador, pero se sustituye 'sabiduría de palabras' por 'sabiduría al hablar' para expresar de forma natural y precisa el sentido de συνέσει λόγων en español. También se corrige la nota [a] para que presente una alternativa genuina para γῆ y se conserva la nota [b] como apoyo a la literalidad griega.
