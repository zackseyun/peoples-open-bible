translation:
  language: es
  text: Dichoso el marido de una mujer prudente[a], y que no ara con un buey y un asno juntos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego ofrece una lectura sustancialmente distinta: «Qué grande es el que halló sabiduría, pero no hay nadie por encima del que teme al Señor».'
    reason: alternative_reading
  - marker: b
    text: La imagen probablemente alude a Deuteronomio 22:10, donde se prohíbe arar con un buey y un asno juntos; aquí funciona como proverbio de una combinación despareja.
    reason: cross_reference
lexical_decisions:
- source_word: אַשְׁרֵי
  english_pob_choice: Happy is
  chosen_spanish: Dichoso
  alternatives_spanish:
  - Feliz
  - Bienaventurado
  lexicon: HALOT
  rationale: La fórmula sapiencial expresa un estado envidiable de bienestar. «Dichoso» suena natural en español moderno y conserva el tono de beatitud sin introducir de manera fuerte una carga litúrgica que el hebreo no exige por sí mismo.
- source_word: בַעַל אִשָּׁה
  english_pob_choice: the husband of a ... wife
  chosen_spanish: el esposo de una esposa
  alternatives_spanish:
  - el marido de una esposa
  - el hombre de una esposa
  lexicon: HALOT
  rationale: El hebreo usa una expresión idiomática que designa al marido. «Esposo» mantiene la relación conyugal en un español claro y digno; aunque «marido» sería posible, «esposo» se ajusta mejor al registro sapiencial.
- source_word: מַשְׁכָּלֶת
  english_pob_choice: prudent
  chosen_spanish: prudente
  alternatives_spanish:
  - sensata
  - sabia
  - inteligente
  lexicon: HALOT
  rationale: El adjetivo apunta a buen juicio práctico y conducta acertada. «Prudente» reproduce bien esa sabiduría aplicada, especialmente en un contexto doméstico, y evita reducir el sentido a mera capacidad intelectual.
- source_word: חוֹרֵשׁ
  english_pob_choice: plow
  chosen_spanish: ara
  alternatives_spanish:
  - labra
  - planta
  lexicon: HALOT
  rationale: El participio se refiere a arar la tierra. «Ara» es el equivalente directo y natural en español; «labra» sería posible pero menos específico para el acto de arar.
- source_word: בְּשׁוֹר וְבַחְמוֹר יַחְדָּו
  english_pob_choice: with an ox and a donkey together
  chosen_spanish: con un buey y un asno juntos
  alternatives_spanish:
  - con un buey y un burro juntos
  - con un buey y un asno apareados
  lexicon: HALOT
  rationale: Se conserva la imagen literal y el valor proverbial del emparejamiento desparejo. «Asno» mantiene el tono bíblico y tradicional sin sacrificar inteligibilidad; «juntos» reproduce יחדו de forma directa.
theological_decisions:
- issue: Desacuerdo importante entre el hebreo conservado y el paralelo griego
  english_pob_reading: Main text follows the Hebrew witness; the Greek substantially different reading is preserved in a footnote.
  chosen_spanish_reading: El texto principal sigue el hebreo conservado; la lectura griega alternativa se preserva en una nota.
  alternative_spanish_readings:
  - Seguir la versión griega en el texto principal
  - Harmonizar hebreo y griego en una sola sentencia
  rationale: Para Sirácida, cuando el hebreo está disponible, se traduce como testigo principal. Aquí el griego ofrece una sentencia sustancialmente distinta; por fidelidad documental, se evita armonizarla y se conserva como tradición alternativa significativa.
  doctrine_reference: 'PHILOSOPHY.md: traducir del hebreo donde se conserva; preservar honestamente la incertidumbre de la fuente'
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente del inglés al eliminar un sujeto innecesario antes de la segunda cláusula; por eso la frase queda coordinada de manera continua: «y el que no ara...». También se respetó la decisión de mantener la sentencia hebrea principal y reservar la versión griega en nota.'
  spanish_consistency_notes:
  - Se usa «Dichoso» como equivalente de beatitud sapiencial, no «Bienaventurado», para evitar un giro demasiado litúrgico.
  - Se mantiene «asno» por coherencia bíblica y porque reproduce mejor el contraste proverbial con «buey».
  - La cláusula final se deja literal para conservar la fuerza del símil y la posible alusión a Deuteronomio 22:10.
  - La nota griega no se armoniza con el texto principal, conforme al criterio editorial de transparencia textual.
