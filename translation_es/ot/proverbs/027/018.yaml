translation:
  language: es
  text: El que cuida una higuera comerá su fruto[a], y el que cuida a su amo[b] será honrado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «guarda» o «atiende» una higuera; el hebreo subraya una atención cuidadosa y fiel.
    reason: lexical_alternative
  - marker: b
    text: O «guarda a su amo»; la frase se refiere ante todo al cuidado atento y fiel hacia un superior humano, no necesariamente solo a protección física.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֹצֵר
  english_pob_choice: tends
  chosen_spanish: cuida
  alternatives_spanish:
  - guarda
  - atiende
  - vela por
  lexicon: HALOT
  rationale: El participio comunica la idea de vigilancia/cuidado fiel. En español, con un árbol como objeto, «cuida» conserva la noción de atención diligente sin sonar forzado; «guarda» y «atiende» siguen siendo posibles, pero «cuida» suena más natural en la imagen agrícola.
- source_word: תְּאֵנָה
  english_pob_choice: fig tree
  chosen_spanish: higuera
  alternatives_spanish:
  - árbol de higos
  - higo
  lexicon: HALOT
  rationale: El hebreo se refiere al árbol, no solo al fruto. «Higuera» es la forma natural y precisa en español para preservar la imagen concreta del proverbio.
- source_word: פִּרְיָהּ
  english_pob_choice: its fruit
  chosen_spanish: su fruto
  alternatives_spanish:
  - su fruto
  - el fruto de ella
  lexicon: HALOT
  rationale: El sufijo femenino remite a la higuera; en español, para un árbol, el posesivo neutro «su fruto» expresa bien la referencia sin cargar la frase.
- source_word: שֹׁמֵר
  english_pob_choice: watches over
  chosen_spanish: vela sobre
  alternatives_spanish:
  - guarda
  - cuida
  - vigila sobre
  lexicon: HALOT
  rationale: שמַר combina guardar y vigilar. «Vela sobre» comunica cuidado atento y continuo, manteniendo el paralelismo funcional con נֹצֵר y evitando reducirlo a mera supervisión física.
- source_word: אֲדֹנָיו
  english_pob_choice: his master
  chosen_spanish: su señor
  alternatives_spanish:
  - su amo
  - su maestro
  - su dueño
  lexicon: HALOT
  rationale: En este contexto sapiencial, el referente es una relación humana de superioridad y fidelidad. «Señor» preserva el rango social del término sin introducir de inmediato una lectura divina; «amo» o «dueño» serían más duros o estrechos.
- source_word: יְכֻבָּד
  english_pob_choice: will be honored
  chosen_spanish: será honrado
  alternatives_spanish:
  - será estimado
  - recibirá honra
  - será glorificado
  lexicon: HALOT
  rationale: El pual de כבד expresa recibir honor. «Será honrado» es la traducción directa y natural en español, y mantiene el carácter proverbial de retribución apropiada.
theological_decisions:
- issue: Referente de «su señor»
  english_pob_reading: human master in a wisdom analogy about faithful service
  chosen_spanish_reading: un superior humano en una analogía sapiencial de servicio fiel
  alternative_spanish_readings:
  - el Señor/Dios como aplicación ampliada
  - un dueño literal de tipo económico
  rationale: El hebreo אֲדֹנָיו no obliga a leer una referencia divina. La comparación con la higuera favorece una relación humana ordinaria de fidelidad y responsabilidad. La posible aplicación teológica más amplia queda abierta, pero no debe fijarse en la traducción.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'La revisión más reciente indicó que no eran necesarios cambios: el texto inglés quedó estable y con alta concordancia; esta versión española sigue de cerca esa lectura sin añadir una interpretación nueva.'
  spanish_consistency_notes:
  - Se mantiene «higuera» para תְּאֵנָה, en consonancia con el referente concreto del hebreo.
  - Se usa «su señor» para אֲדֹנָיו siguiendo la lectura humana del contexto sapiencial, sin forzar una lectura divina.
  - «Será honrado» conserva la voz pasiva de resultado del hebreo y el tono proverbial.
  - Los marcadores [a] y [b] se colocan en el texto exactamente donde corresponden a las alternativas léxicas documentadas.
