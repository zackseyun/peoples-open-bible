revisions:
- from: Porque estamos a punto de destruir este lugar[a], ya que su clamor ha crecido mucho delante de Yahvé, y Yahvé nos ha enviado para destruirlo.
  to: Porque estamos a punto de destruir este lugar[a], ya que su clamor se ha hecho grande delante de Yahvé, y Yahvé nos ha enviado para destruirlo.
  rationale: Se ajusta «ha crecido mucho» a «se ha hecho grande» para reflejar más de cerca el resultativo de גָדְלָה sin intensificación añadida, y se corrige la tipografía de la nota. Se mantiene el resto del texto porque preserva fielmente la inminencia del juicio, el nombre divino «Yahvé» y la ambigüedad formal/contextual de צַעֲקָתָם.
