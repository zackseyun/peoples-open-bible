  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura temporal y los referentes del hebreo: Sihón y Og como objetos de la acción previa, sus títulos regios y sus lugares de residencia. También preserva correctamente la nota sobre la relación no del todo explícita entre Astarot y Edrei. Sin embargo, en הַכֹּתוֹ el audit trail inglés justificó específicamente una formulación fuerte como ''had struck down'' frente a la más débil ''defeated''. En español, «haber derrotado» atenúa esa fuerza léxica.'
  spanish_quality_summary: El español es claro y natural, con topónimos y gentilicios bien formados. La sintaxis general es buena. Conviene ajustar «después de haber derrotado» a una expresión más fiel al verbo hebreo y al razonamiento documentado, sin perder naturalidad. También es preferible armonizar el topónimo con la forma española más habitual «Astarot» si se busca lectura eclesial amplia.
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé, Mesías, esclavo, etc. Los nombres propios están bien hispanizados en general: Sihón, Hesbón, Basán, Edrei. Se recomienda «Astarot» como forma española más estable de Ashtaroth/עשתרות.'
  issues:
  - severity: medium
    issue: «haber derrotado» debilita הַכֹּתוֹ
    rationale: El hebreo נכה en esta construcción fue documentado en el audit trail como 'he had struck down', y se prefirió evitar el más débil 'defeated'. «Derrotado» comunica resultado militar, pero no preserva tan bien la fuerza verbal de abatir/herir mortalmente.
  - severity: low
    issue: Forma del topónimo «Ashtarot»
    rationale: Aunque comprensible, «Astarot» es una forma española más natural y más ampliamente reconocible en textos bíblicos para עשתרות. El cambio mejora legibilidad sin afectar el sentido.
  revised_spanish_text: después de haber abatido a Sihón, rey de los amorreos, que vivía en Hesbón, y a Og, rey de Basán, que vivía en Astarot[a], en Edrei.
  revised_footnotes:
