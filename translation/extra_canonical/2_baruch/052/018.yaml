translation:
  text: For they chose for themselves this present time, which cannot pass apart from
    anguish, and they chose for themselves that time whose outcomes are full of groanings
    and evils; and they rejected the world that does not age those who come to it,
    and they rejected the time of glory, so that they might not come to the honor
    of which I told you before.
