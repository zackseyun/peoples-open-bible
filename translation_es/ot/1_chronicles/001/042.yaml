lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Los descendientes de
  lexicon: HALOT
  rationale: En listas genealógicas, בְּנֵי introduce una relación de filiación inmediata o clan. "Los hijos de" conserva la estructura directa del hebreo y el valor genealógico; "descendientes de" es posible, pero diluye la forma del original.
- source_word: אֵצֶר
  english_pob_choice: Ezer
  chosen_spanish: Ezer
  lexicon: nombre propio
  rationale: Nombre propio transliterado; no requiere traducción.
- source_word: בִּלְהָן
  english_pob_choice: Bilhan
  chosen_spanish: Bilán
  alternatives_spanish:
  - Bilhan
  lexicon: nombre propio
  rationale: Nombre propio. Se adapta la acentuación al español para lectura natural, manteniendo la forma reconocible del nombre hebreo.
- source_word: וְזַעֲוָן
  english_pob_choice: Zaavan
  chosen_spanish: Zaaván
  alternatives_spanish:
  - Zaván
  lexicon: nombre propio
  rationale: Se translitera la forma hebrea de Crónicas como Zaaván, preservando la vocalización del texto fuente. La variante breve "Zaván" refleja la forma paralela de Génesis 36:27 y se conserva en nota.
- source_word: יַעֲקָן
  english_pob_choice: Jaakan
  chosen_spanish: Jaacán
  alternatives_spanish:
  - Acan
  lexicon: nombre propio
  rationale: Se mantiene la forma de Crónicas mediante transliteración cercana al hebreo. La variante "Acan" aparece en el paralelo de Génesis 36:27 y se anota como alternativa textual.
- source_word: דִישׁוֹן
  english_pob_choice: Dishon
  chosen_spanish: Dishón
  alternatives_spanish:
  - Dishon
  lexicon: nombre propio
  rationale: Nombre propio transliterado. Se acentúa en español para facilitar la pronunciación sin alterar la identificación del nombre.
- source_word: עוּץ
  english_pob_choice: Uz
  chosen_spanish: Uz
  alternatives_spanish:
  - Uts
  lexicon: nombre propio
  rationale: Se conserva la forma tradicional ampliamente reconocible en español. "Uts" sería una transliteración más cercana, pero menos natural para lectores bíblicos en español.
- source_word: אֲרָן
  english_pob_choice: Aran
  chosen_spanish: Arán
  alternatives_spanish:
  - Aran
  lexicon: nombre propio
  rationale: Nombre propio transliterado con acento gráfico para lectura española clara; se mantiene la identidad del nombre hebreo.
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con el texto hebreo y con la versión inglesa auditada; no se detectan revisiones textuales relevantes. Se preserva la lista genealógica y se reflejan en nota las variantes paralelas de Génesis 36:27 para los nombres Zaaván/Zaván y Jaacán/Acan.
  spanish_consistency_notes:
  - Se mantiene "hijos de" como fórmula genealógica estable.
  - Se conservan acentos gráficos solo para facilitar lectura española de nombres propios, sin introducir equivalencias interpretativas.
  - Las notas señalan únicamente variantes paralelas atestiguadas en el texto bíblico, sin alterar el cuerpo principal.
