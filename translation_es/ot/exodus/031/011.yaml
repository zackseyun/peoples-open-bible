translation:
  language: es
  text: y el aceite de la unción, y el incienso aromático[a] para el lugar santo. Los harán conforme a todo lo que te he mandado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el incienso de especias para el lugar santo».
    reason: lexical_alternative
lexical_decisions:
- source_word: שֶׁמֶן הַמִּשְׁחָה
  english_pob_choice: the anointing oil
  chosen_spanish: el aceite de la unción
  alternatives_spanish:
  - el aceite para la unción
  - el aceite de ungir
  lexicon: HALOT
  rationale: La construcción hebrea nombra el aceite destinado a la unción cultual. «Aceite de la unción» conserva bien la función sin añadir matices no explícitos; «ungir» sería posible, pero en español «aceite de la unción» suena más natural y sigue de cerca la relación nominal.
- source_word: קְטֹרֶת הַסַּמִּים
  english_pob_choice: the fragrant incense
  chosen_spanish: incienso aromático
  alternatives_spanish:
  - incienso de especias
  - incienso perfumado
  - incienso fragante
  lexicon: HALOT
  rationale: El hebreo alude a incienso compuesto de sustancias aromáticas. «Aromático» comunica de manera idiomática esa cualidad en español. Se mantiene la alternativa más literal en la nota para preservar la posibilidad de leer «incienso de especias».
- source_word: לַקֹּדֶשׁ
  english_pob_choice: for the holy place
  chosen_spanish: para el lugar santo
  alternatives_spanish:
  - para el santuario
  - para lo santo
  - para el recinto santo
  lexicon: HALOT
  rationale: El término puede referirse al ámbito sagrado/ritual. En este contexto cultual, «lugar santo» traduce de forma clara y bastante literal el valor de לַקֹּדֶשׁ sin forzar una equivalencia más espacial que el hebreo requiere. También deja ver la relación con el conjunto tabernacular.
- source_word: כְּכֹל אֲשֶׁר צִוִּיתִךָ
  english_pob_choice: according to all that I have commanded you
  chosen_spanish: conforme a todo lo que te he mandado
  alternatives_spanish:
  - según todo lo que te he mandado
  - tal como te he mandado en todo
  - de acuerdo con todo lo que te he mandado
  lexicon: HALOT
  rationale: La fórmula conserva el alcance total de כְּכֹל («conforme a todo») y el mandato directo en segunda persona. «Conforme a» refleja mejor el registro normativo que una paráfrasis más libre.
- source_word: יַעֲשׂוּ
  english_pob_choice: They shall make them
  chosen_spanish: Lo harán
  alternatives_spanish:
  - Los harán
  - Deben hacerlo
  - Los han de hacer
  lexicon: HALOT
  rationale: El hebreo tiene un plural impersonal que remite a los artesanos implícitos. En español, «lo harán» mantiene el tono de instrucción futura y evita sobrecargar la frase con un objeto redundante; el singular neutro «lo» resume la elaboración de estos elementos cultuales como conjunto.
theological_decisions:
- issue: Alcance de לַקֹּדֶשׁ en contexto cultual
  english_pob_reading: for the holy place
  chosen_spanish_reading: para el lugar santo
  alternative_spanish_readings:
  - para el santuario
  - para lo santo
  rationale: 'No hay una decisión doctrinal controvertida, pero sí una decisión de matiz: el hebreo puede señalar el ámbito sagrado destinado al uso ritual. «Lugar santo» mantiene ese valor y evita imponer una terminología más amplia o más abstracta de lo que el texto exige.'
  doctrine_reference: Éxodo 30:25-31; 31:10-11 (uso consagrado de los elementos del tabernáculo)
- issue: Referencia implícita de los objetos listados
  english_pob_reading: They shall make them
  chosen_spanish_reading: Lo harán
  alternative_spanish_readings:
  - Los harán
  - Harán estos objetos
  rationale: El plural hebreo se refiere a los objetos cultuales mencionados. En español, el singular neutro «lo» funciona como resumen colectivo y evita forzar una referencia plural poco natural; no altera la identidad de los elementos ni su función litúrgica.
  doctrine_reference: Éxodo 31:11; Éxodo 30:22-33
translation_notes:
  revision_awareness: El texto inglés base fue revisado para preferir «for the holy place» en vez de «for the sanctuary», afinando el valor de לַקֹּדֶשׁ. La versión española sigue ese ajuste con «para el lugar santo» y mantiene la alternativa literal sobre קְטֹרֶת הַסַּמִּים en nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en esta serie cuando el contexto requiera el nombre divino; aquí el versículo contiene solo la voz divina en primera persona implícita en «te he mandado».
  - «Lugar santo» se usa consistentemente para לַקֹּדֶשׁ cuando el contexto indica el espacio/ámbito sagrado del tabernáculo.
  - Se evita «Señor» como sustituto del nombre divino; no aparece en este versículo, pero la consistencia terminológica debe preservarse en la sección.
  - La nota de alternativa conserva la tensión entre una traducción idiomática («incienso aromático») y una más formal («incienso de especias»).
