translation:
  language: es
  text: Si vendimiadores vinieran a ti, ¿no dejarían uvas para rebuscar[a]? Si ladrones vinieran de noche, destruirían solo lo suficiente para ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si ladrones vinieran de noche, ¿no robarían solo hasta tener suficiente?». La expresión hebrea final es idiomática; literalmente, «su suficiente».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  lexicon: HALOT
  rationale: La construcción introduce un caso hipotético y comparativo; «si» conserva mejor la fuerza condicional y retórica del hebreo que una lectura temporal.
- source_word: בֹּצְרִים
  english_pob_choice: grape gatherers
  chosen_spanish: vendimiadores
  alternatives_spanish:
  - recolectores de uvas
  - pisadores de uvas
  - cosechadores de uvas
  lexicon: HALOT
  rationale: El término apunta a quienes reúnen uvas en la vendimia. «Vendimiadores» es natural en español y mantiene la imagen vitícola específica.
- source_word: בָּאוּ לָךְ
  english_pob_choice: came to you
  chosen_spanish: vinieran a ti
  alternatives_spanish:
  - vinieran contra ti
  - vinieran sobre ti
  lexicon: HALOT
  rationale: La comparación funciona mejor en español con una condicional futura o hipotética. «A ti» conserva la cercanía del hebreo y deja que el contexto hostil lo determine.
- source_word: יַשְׁאִירוּ
  english_pob_choice: would they not leave
  chosen_spanish: dejarían
  alternatives_spanish:
  - dejarían atrás
  - dejarían sin recoger
  lexicon: HALOT
  rationale: El verbo expresa dejar algo restante. En español, el valor esperado de la pregunta retórica se comunica de forma natural con «dejarían».
- source_word: עֹלֵלוֹת
  english_pob_choice: gleanings
  chosen_spanish: rebuscos
  alternatives_spanish:
  - restos
  - uvas rebuscadas
  lexicon: HALOT
  rationale: Es un término agrícola preciso para lo que queda tras la vendimia. «Rebuscos» preserva el matiz técnico y evita una paráfrasis más general.
- source_word: גַּנָּבִים
  english_pob_choice: thieves
  chosen_spanish: ladrones
  alternatives_spanish:
  - robadores
  lexicon: HALOT
  rationale: El hebreo señala a quienes hurtan; «ladrones» es el equivalente más natural y transparente en español.
- source_word: בַּלַּיְלָה
  english_pob_choice: by night
  chosen_spanish: de noche
  alternatives_spanish:
  - en la noche
  - por la noche
  lexicon: HALOT
  rationale: «De noche» expresa con claridad la circunstancia temporal y la idea de incursión furtiva.
- source_word: הִשְׁחִיתוּ
  english_pob_choice: they would destroy
  chosen_spanish: destruirían
  alternatives_spanish:
  - arruinarían
  - devastarían
  lexicon: HALOT
  rationale: El verbo hiphil transmite daño o destrucción. «Destruirían» conserva la fuerza del contraste sin exagerar más allá del hebreo.
- source_word: דַיָּם
  english_pob_choice: only enough for themselves
  chosen_spanish: solo lo suficiente para ellos
  alternatives_spanish:
  - solo hasta quedar satisfechos
  - solo lo necesario para sí
  lexicon: HALOT
  rationale: La expresión es idiomática y literal­mente significa «su suficiente». En español, «solo lo suficiente para ellos» comunica la idea sin perder la limitación de alcance que destaca el texto.
translation_notes:
  revision_awareness: La versión española sigue el acuerdo alto del pasaje y conserva la comparación retórica del hebreo; se ajustó la primera cláusula para sonar más natural en español sin perder el condicional, y se mantuvo la ambigüedad idiomática final mediante nota.
  spanish_consistency_notes:
  - Se usó «Yahvé» como terminología por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se eligió un registro sobrio y publicable, evitando calcos innecesarios pero conservando la estructura paralela del original.
  - Se mantuvo la alternancia verbal condicional para reflejar la fuerza retórica de las dos preguntas comparativas.
