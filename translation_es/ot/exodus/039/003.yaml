    text: O «placas de oro». El hebreo se refiere a piezas metálicas delgadas, martilladas y extendidas.
    reason: lexical_alternative
  - marker: b
    text: O «cortaron hilos» o «las cortaron en tiras». El sentido es que el oro se preparó como filamentos finos para ser tejido.
    reason: lexical_alternative
  - marker: c
    text: «La obra de un hábil diseñador» traduce una expresión técnica de artesanía artística experta; también puede verterse «la obra de un hábil artesano» o «la de un tejedor artístico».
    reason: lexical_alternative
  revision_rationale: Se ajustó la redacción para reflejar mejor el sentido textil de בְּתוֹךְ mediante «para entretejerlo en», se explicitó el referente material con «hilo escarlata», y se mejoró la fluidez sintáctica al final con «la obra de un hábil diseñador». Se conservaron las alternativas léxicas del rastro POB y sus notas, reordenando los marcadores para que correspondan con el texto revisado.
