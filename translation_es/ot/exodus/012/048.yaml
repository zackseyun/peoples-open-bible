review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido del hebreo: residencia del גֵּר entre Israel, requisito de circuncisión de todos los varones asociados a él, permiso posterior para participar en la Pascua, y exclusión del incircunciso. También preserva correctamente Yahvé para יהוה. Sin embargo, hay ajustes de fidelidad y naturalidad: «forastero» no refleja tan bien el matiz legal de גֵּר como «residente extranjero», y «ningún incircunciso comerá de ella» suena menos claramente modal/prohibitivo que «ningún incircunciso podrá comer de ella».'
  spanish_quality_summary: El español es claro y digno, pero algunas elecciones pueden mejorarse para legibilidad bíblica neutral y precisión jurídica. «Residente extranjero» comunica mejor la categoría legal que «forastero», que puede sugerir transeúnte. «Natural de la tierra» es aceptable, aunque «nativo de la tierra» sería más llano; no es indispensable cambiarlo. El resto fluye bien.
  glossary_alignment: 'Alineación general buena con los términos del proyecto: «Yahvé», «Pascua», «circuncidado». La principal desviación es גֵּר -> «forastero», que no conserva tan bien el valor de residente no nativo documentado en la auditoría inglesa. Las notas están bien planteadas, pero deben actualizarse si se corrige ese término.'
  issues:
  - severity: medium
    issue: גֵּר traducido como «forastero»
    rationale: Aunque no es imposible, «forastero» en español suele sonar a alguien ajeno o de paso. El hebreo גֵּר aquí, y la auditoría inglesa, apuntan a un no nativo que reside entre Israel. «Residente extranjero» preserva mejor el matiz legal/covenantal.
  - severity: low
    issue: «comerá de ella» expresa menos claramente la prohibición/permiso
    rationale: El hebreo con negación formula inelegibilidad/prohibición. «No podrá comer de ella» suena más natural y refleja mejor el valor modal captado también por el inglés POB ('may eat of it' bajo negación).
  - severity: low
    issue: Falta nota para la equivalencia de יהוה si se desea paralelar la auditoría inglesa
    rationale: No es obligatorio crear una nota nueva, pero la auditoría inglesa conserva una nota sobre que el hebreo usa YHWH. Dado que el texto español ya usa «Yahvé» según política del proyecto, no hace falta nota adicional para evitar sobrecarga.
