id: JOB.37.2
reference: Job 37:2
source:
  edition: WLC
  text: שִׁמְע֤וּ שָׁמ֣וֹעַ בְּ/רֹ֣גֶז קֹל֑/וֹ וְ֝/הֶ֗גֶה מִ/פִּ֥י/ו יֵצֵֽא׃
translation:
  text: Listen carefully[a] to the trembling of his voice[b], and the rumbling that comes out from his mouth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Hear, hear the agitation/rage of his voice.' The Hebrew term can denote trembling, agitation, or raging.
    reason: lexical_alternative
  - marker: b
    text: Or 'the murmur' or 'the sound' that comes out from his mouth.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ שָׁמוֹעַ
  chosen: Listen carefully
  alternatives:
  - Hear, hear
  - Listen, yes listen
  - Hear attentively
  lexicon: HALOT
  rationale: The finite imperative plus infinitive absolute of שמע intensifies the command. 'Listen carefully' captures the emphatic force in natural English without awkward repetition.
- source_word: בְּרֹגֶז
  chosen: to the trembling of
  alternatives:
  - in the trembling of
  - in the rage of
  - with the agitation of
  lexicon: HALOT
  rationale: רֹגֶז can denote trembling, agitation, or raging. In the context of thunder imagery and parallel with 'rumbling,' 'trembling' best conveys the quaking, unsettling quality of the sound without over-personalizing it as anger.
- source_word: קֹלוֹ
  chosen: his voice
  alternatives:
  - his sound
  lexicon: HALOT
  rationale: קוֹל commonly means 'voice' or 'sound.' Because the verse personifies God's thunder as his utterance and the following phrase mentions 'his mouth,' 'voice' preserves the poetic anthropomorphic imagery.
- source_word: וְהֶגֶה
  chosen: the rumbling
  alternatives:
  - the sound
  - the murmur
  - the growling
  lexicon: HALOT
  rationale: הֶגֶה denotes a low sound, murmur, or moaning. In this storm context, 'rumbling' fits the acoustic imagery of thunder better than the more speech-oriented 'murmur.'
- source_word: מִפִּיו יֵצֵא
  chosen: that comes out from his mouth
  alternatives:
  - that goes out from his mouth
  - from his mouth it comes forth
  lexicon: HALOT
  rationale: The verb יצא is straightforwardly 'go out/come out.' 'Comes out from his mouth' preserves the concrete anthropomorphic expression while reading naturally in English.
