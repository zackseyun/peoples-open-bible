review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo y sigue de cerca el rastro auditado en inglés: consejo de los dirigentes amonitas, sospecha sobre la supuesta honra de David, y la triple finalidad hostil de los enviados. Sin embargo, hay problemas de anclaje y distribución de notas en la frase idiomática בְּעֵינֶיךָ: el texto principal tiene «a tu padre[a] a tus ojos[b]», de modo que la nota [a] queda mal anclada sobre «tu padre» aunque explica «a tus ojos». Además, falta en español una nota para «derrocar» que preserve la alternativa documentada en inglés para וְלַהֲפֹךְ («voltear / trastornar / derrocar»).'
  spanish_quality_summary: El español es claro y digno, pero requiere pequeños ajustes. «A tus ojos» funciona, aunque con mejor fluidez conviene integrarlo sin la coma antes de «porque». «Príncipes» es aceptable en registro bíblico, pero la grafía «ammonitas» no es la forma estándar moderna; «amonitas» es preferible para legibilidad general. El resto del verso suena natural y fiel.
  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto. Las decisiones léxicas concuerdan en general con el POB auditado: «príncipes», «honrando», «consoladores», «escudriñar», «derrocar», «espiar», «la tierra», «siervos». Se recomienda normalizar «ammonitas» a «amonitas» por ortografía española estándar y añadir la nota léxica de «derrocar» para reflejar la justificación documentada del inglés.'
  issues:
  - severity: medium
    issue: La nota [a] está mal anclada en «tu padre[a]» aunque su contenido explica «a tus ojos».
    rationale: Las notas deben anclarse exactamente en la palabra o frase relevante. Aquí el marcador induce a pensar que la alternativa afecta «tu padre», no el idiomático בְּעֵינֶיךָ.
  - severity: medium
    issue: Falta la nota española correspondiente a la alternativa de וְלַהֲפֹךְ («to overthrow / to overturn») documentada en el POB inglés.
    rationale: El inglés preserva una alternativa léxica significativa. El español debe conservarla cuando la polisemia sigue siendo relevante, especialmente porque «derrocar» interpreta el matiz contextual más fuerte.
  - severity: low
    issue: La grafía «ammonitas» es menos natural que «amonitas» en español estándar.
    rationale: Aunque reconocible, «amonitas» es la forma ortográfica usual y más legible para el público meta.
