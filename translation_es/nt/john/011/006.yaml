review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite correctamente la secuencia básica del griego: al oír que él estaba enfermo, Jesús se quedó dos días más en el lugar donde estaba. Conserva bien la tensión narrativa y no la suaviza. Sin embargo, la nota al pie contradice el texto principal: ofrece como alternativa exactamente la misma forma verbal en pasado («estaba enfermo») cuando la alternativa documentada debe reflejar el presente griego («está enfermo»).'
  spanish_quality_summary: El español es claro y digno. «Permaneció» y «en el lugar donde estaba» son naturales y fieles. «Así que, cuando» es aceptable, aunque algo cargado junto con «entonces»; aun así, no requiere cambio obligatorio. La única reparación necesaria es la nota al pie para que sea coherente y útil.
  glossary_alignment: No hay términos del glosario principal en juego que presenten conflicto. La elección de «enfermo», «permaneció» y la preservación sobria de la demora concuerdan con la filosofía del proyecto.
  issues:
  - severity: medium
    issue: La nota al pie repite el mismo tiempo verbal que el texto principal
    rationale: 'El texto dice «estaba enfermo[a]», y la nota dice «O «que estaba enfermo»». Eso no presenta una alternativa real. Según el POB inglés y el griego presente ἀσθενεῖ, la alternativa debe ser «que está enfermo». '
  revised_spanish_text: Así que, cuando oyó que estaba enfermo[a], entonces permaneció dos días en el lugar donde estaba.
  revised_footnotes:
  - marker: a
    text: O «que está enfermo». El griego usa el presente después de «oyó», pero en español suele expresarse naturalmente en pasado en este contexto.
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel y natural. Se corrige únicamente la nota al pie para reflejar la alternativa real basada en el presente griego, en coherencia con la auditoría inglesa y con el propósito de la nota.
