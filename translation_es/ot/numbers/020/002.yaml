translation:
  language: es
  text: Ahora no había agua para la congregación[a], y se reunieron contra Moisés y contra Aarón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Congregación» traduce el hebreo עֵדָה; también puede entenderse como «asamblea» o «comunidad», según el matiz del contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/לֹא
  english_pob_choice: Now ... no
  chosen_spanish: Ahora no
  alternatives_spanish:
  - Y no
  - Pero no
  lexicon: HALOT
  rationale: La narración avanza con una negación existencial; «Ahora» conserva el arranque discursivo natural del inglés POB sin forzar contraste, y «no» introduce la ausencia de agua.
- source_word: הָיָה
  english_pob_choice: there was
  chosen_spanish: había
  alternatives_spanish:
  - existía
  - era
  lexicon: HALOT
  rationale: El verbo היה con sustantivo indefinido expresa existencia; «había» es la forma española más natural y fiel a ese valor.
- source_word: מַיִם
  english_pob_choice: water
  chosen_spanish: agua
  lexicon: HALOT
  rationale: El plural hebreo de sustancia se refleja con el sustantivo massivo español «agua».
- source_word: לָ/עֵדָה
  english_pob_choice: for the congregation
  chosen_spanish: para la congregación[a]
  alternatives_spanish:
  - para la comunidad
  - para la asamblea
  lexicon: HALOT
  rationale: «Congregación» conserva el sentido de pueblo reunido del hebreo עֵדָה y coincide con la elección auditada del POB; se mantiene la nota para explicitar las alternativas léxicas.
- source_word: וַ/יִּקָּהֲלוּ
  english_pob_choice: they assembled
  chosen_spanish: se reunieron
  alternatives_spanish:
  - se congregaron
  - se juntaron
  lexicon: HALOT
  rationale: El verbo קהל expresa reunión colectiva; «se reunieron» suena natural en español y conserva la acción de juntarse como grupo.
- source_word: עַל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - sobre
  - ante
  lexicon: HALOT
  rationale: En este contexto de queja y oposición, עַל tiene fuerza adversativa; «contra» reproduce esa hostilidad.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: HALOT
  rationale: Nombre propio estándar en español bíblico.
- source_word: וְ/עַֽל אַהֲרֹן
  english_pob_choice: and against Aaron
  chosen_spanish: y contra Aarón
  alternatives_spanish:
  - y sobre Aarón
  - y ante Aarón
  lexicon: HALOT
  rationale: Se conserva la repetición de la preposición con el mismo valor hostil, dirigida también de modo individual a Aarón.
translation_notes:
  revision_awareness: 'Concordancia alta con el tramo auditado en inglés: no hubo revisiones aplicadas en el pasaje fuente, y la versión española sigue de cerca las decisiones léxicas confirmadas (existencia, reunión colectiva y valor adversativo de עַל).'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - «Congregación» se conserva como término técnico bíblico; la nota explica la alternativa semántica sin desplazar el texto principal.
  - La preposición repetida en hebreo se refleja dos veces con «contra» para preservar el paralelismo de la acusación.
