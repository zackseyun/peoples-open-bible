  rationale: 'Se corrigió la primera cláusula para un español natural y fiel al valor de חֵרֶם, reemplazando «devotada a destrucción» por «consagrado a destrucción» y moviendo correctamente la nota al final de la frase pertinente. También se realineó la nota b con el punto léxico documentado en el POB inglés: הַמַּלְאָכִים = «los mensajeros». El resto del versículo se mantiene sustancialmente igual por ser fiel y claro.'
