    reason: alternative_reading
  revision_rationale: Se ajusta el español para mejorar naturalidad y registro («pueblo», «recobraron fuerzas») y se restaura en nota la singularidad del verbo hebreo final, tal como la auditoría inglesa la preservó, aunque el texto principal siga la lectura colectiva final del POB.
