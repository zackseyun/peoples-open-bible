id: 2PE.2.6
reference: 2 Peter 2:6
source:
  edition: SBLGNT
  text: καὶ πόλεις Σοδόμων καὶ Γομόρρας τεφρώσας ⸀καταστροφῇ κατέκρινεν, ὑπόδειγμα μελλόντων ⸀ἀσεβέσιν τεθεικώς,
translation:
  text: and if by reducing the cities of Sodom and Gomorrah to ashes he condemned them to destruction[a], having made them an example for those who would be ungodly[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having turned them to ashes.'
    reason: lexical_alternative
  - marker: b
    text: Or 'having made them an example for future ungodly people.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τεφρώσας
  lemma: τεφρόω
  chosen: by reducing them to ashes
  alternatives:
  - having turned them to ashes
  - having burned them to ashes
  lexicon: BDAG
  rationale: Aorist participle from τεφρόω denotes reducing to ashes, not merely burning. 'By reducing them to ashes' captures both the means and result in natural English.
- source_word: καταστροφῇ
  chosen: to destruction
  alternatives:
  - with an overthrow
  - to ruin
  - by catastrophe
  lexicon: BDAG
  rationale: 'The dative is best taken with κατέκρινεν as the content/result of the condemnation: he condemned them to destruction. This avoids the awkward literalism ''with an overthrow'' while preserving the judicial sense.'
- source_word: κατέκρινεν
  chosen: condemned
  alternatives:
  - sentenced
  - judged
  lexicon: BDAG
  rationale: The verb carries a judicial sense of pronouncing condemnation. 'Condemned' is the most direct and standard rendering here.
- source_word: ὑπόδειγμα
  chosen: an example
  alternatives:
  - a warning example
  - a pattern
  lexicon: BDAG
  rationale: ὑπόδειγμα can mean example or pattern; in this judgment context it functions as a warning example. The simpler 'an example' keeps close to the Greek while allowing the context to supply the warning force.
- source_word: μελλόντων ἀσεβέσιν
  chosen: for those who were going to live ungodly lives
  alternatives:
  - for those who would be ungodly
  - for future ungodly people
  - for those about to be ungodly
  lexicon: BDAG
  rationale: μέλλω with the infinitive idea implied by the adjective/noun phrase points to futurity relative to the example. Because ἀσεβέσιν is adjectival/substantival ('ungodly ones'), English requires expansion for readability. 'Were going to live ungodly lives' makes explicit the ethical force of ἀσεβής without over-paraphrasing.
- source_word: τεθεικώς
  chosen: having made them
  alternatives:
  - having set them
  - having appointed them
  lexicon: BDAG
  rationale: 'Perfect active participle of τίθημι indicates resultant state: God has set/made them as an example. ''Having made them'' is idiomatic and fits the construction with ὑπόδειγμα.'
- source_word: πόλεις Σοδόμων καὶ Γομόρρας
  chosen: the cities of Sodom and Gomorrah
  alternatives:
  - Sodom and Gomorrah's cities
  lexicon: BDAG
  rationale: This is the natural English rendering of the genitival construction, preserving the plural 'cities' and the proper names by transliteration.
