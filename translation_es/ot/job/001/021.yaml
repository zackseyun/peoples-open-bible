translation:
  language: es
  text: 'Y dijo[a]: «Desnudo salí del vientre de mi madre, y desnudo volveré allí. Yahvé dio, y Yahvé quitó[b]. Sea bendito el nombre de Yahvé».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y desnudo volveré»; el hebreo dice «allí», dejando implícito el destino. Puede aludir figuradamente al vientre, o más ampliamente a la tierra/la tumba y al estado de no poseer nada.'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «YHWH» (el nombre divino), tradicionalmente vertido «el SEÑOR».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָרֹם
  english_pob_choice: naked
  chosen_spanish: desnudo
  alternatives_spanish:
  - nudo
  - sin ropa
  - sin nada
  lexicon: HALOT
  rationale: El hebreo designa la condición de estar sin vestir y, por extensión, despojado. «Desnudo» es el equivalente natural en español y conserva la fuerza literal y la posible resonancia de desposesión.
- source_word: יצתי
  english_pob_choice: I came out
  chosen_spanish: salí
  alternatives_spanish:
  - salí afuera
  - vine
  - salí de
  lexicon: HALOT
  rationale: El verbo יצא en este contexto expresa salida desde el vientre materno. «Salí» es idiomático y mantiene la imagen concreta del nacimiento.
- source_word: מִבֶּטֶן אִמִּי
  english_pob_choice: from my mother’s womb
  chosen_spanish: del vientre de mi madre
  alternatives_spanish:
  - de mi madre's womb
  - desde el vientre de mi madre
  lexicon: HALOT
  rationale: «Vientre» preserva la concreción corporal del hebreo y su fuerza poética. Se prefiere «de mi madre» para una construcción natural en español, equivalente a la referencia materna del original.
- source_word: וְעָרֹם אָשׁוּב שָׁמָה
  english_pob_choice: and naked I will return there
  chosen_spanish: y desnudo volveré allí
  alternatives_spanish:
  - y desnudo regresaré allí
  - y volveré allí desnudo
  - y desnudo volveré a esa condición
  lexicon: HALOT
  rationale: Se conserva «allí» para reflejar שָׁמָה y no resolver su referente. El orden español mantiene el énfasis en «desnudo» sin forzar una especificación interpretativa como «a la tierra» o «a la tumba».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la decisión doctrinal del POB de transliterar el nombre divino. En español, «Yahvé» es la forma más establecida y legible para reproducir יְהוָה sin la sustitución tradicional por un título.
- source_word: נָתַן
  english_pob_choice: gave
  chosen_spanish: dio
  alternatives_spanish:
  - ha dado
  - entregó
  lexicon: HALOT
  rationale: El perfecto hebreo se vierte de manera simple y directa. «Dio» conserva la afirmación breve y sentenciosa del dicho de Job.
- source_word: לָקָח
  english_pob_choice: has taken away
  chosen_spanish: quitó
  alternatives_spanish:
  - tomó
  - ha quitado
  - se llevó
  lexicon: HALOT
  rationale: El hebreo dice literalmente «tomó». En español, «quitó» transmite bien la idea de pérdida provocada y evita agregar «away» de modo demasiado interpretativo. Se conserva la parataxis breve del original.
- source_word: יְהִי
  english_pob_choice: May ... be
  chosen_spanish: Sea
  alternatives_spanish:
  - Que sea
  - Sea que
  lexicon: HALOT
  rationale: El jussivo expresa deseo o bendición. «Sea» es conciso, solemne y reproduce bien el valor volitivo en español bíblico contemporáneo.
- source_word: שֵׁם יְהוָה
  english_pob_choice: the name of Yahweh
  chosen_spanish: el nombre de Yahvé
  alternatives_spanish:
  - el nombre de Yahweh
  - el nombre del Señor
  lexicon: HALOT
  rationale: Se preserva la construcción nominal hebrea y el uso del nombre divino según la política terminológica del proyecto.
- source_word: מְבֹרָךְ
  english_pob_choice: blessed
  chosen_spanish: bendito
  alternatives_spanish:
  - bendecido
  - alabado
  lexicon: HALOT
  rationale: El participio pasivo funciona como fórmula de bendición. «Bendito» es la forma española más natural y reverencial; «bendecido» suena más adjetival y menos litúrgico.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  - el Señor
  rationale: El texto hebreo contiene explícitamente el Tetragrama. Se mantiene la transliteración del nombre propio para no ocultarlo tras un título y para conservar la identidad covenantal del pasaje, siguiendo la política doctrinal del POB.
  doctrine_reference: 'DOCTRINE.md: contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de שָׁמָה («allí»)
  english_pob_reading: retain the literal 'there' without specifying 'to the earth'
  chosen_spanish_reading: conservar «allí» sin concretar el destino
  alternative_spanish_readings:
  - volveré a la tierra
  - volveré al sepulcro
  - volveré al vientre
  rationale: 'El hebreo deja el referente implícito. «Allí» preserva la ambigüedad: puede aludir al origen, a la tierra/sepulcro o al estado de desnudez y desposesión. Resolverlo en español reduciría una tensión interpretativa que el original mantiene.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y coincide sustancialmente con el audit trail inglés. Se mantuvo la ambigüedad de שָׁמָה («allí») y la transliteración del Tetragrama, sin adoptar la sustitución tradicional por «SEÑOR». No hubo revisiones aplicadas en el pass más reciente, y la concordancia global fue alta.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, en lugar de «SEÑOR».
  - «Desnudo» conserva la imagen corporal y la posible connotación de desposesión.
  - «Allí» queda sin especificación para respetar la ambigüedad del hebreo.
  - «Bendito» se elige como fórmula de bendición, no como simple «alabado».
