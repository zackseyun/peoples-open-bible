translation:
  language: es
  text: Y Judas iba reuniendo a los que se quedaban atrás[a] y animando al pueblo por todo el camino, hasta que llegó a la tierra de Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a los rezagados» / «a los que iban en la retaguardia». El griego probablemente se refiere a los que iban quedándose atrás durante la marcha.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπισυνάγων
  english_pob_choice: gathering up
  chosen_spanish: iba reuniendo
  alternatives_spanish:
  - iba recogiendo
  - iba juntando
  - iba agrupando
  lexicon: LSJ
  rationale: 'El participio expresa una acción շարունակada durante la marcha: Judas va volviendo a juntar a los dispersos. «Iba reuniendo» conserva ese valor progresivo y suena natural en español sin perder la idea de reunir de nuevo a quienes se retrasan.'
- source_word: τοὺς ἐσχατίζοντας
  english_pob_choice: those who were falling behind
  chosen_spanish: a los que se quedaban atrás
  alternatives_spanish:
  - a los rezagados
  - a los que iban en la retaguardia
  - a los que se retrasaban
  lexicon: LSJ
  rationale: En contexto de viaje, el término apunta a los que se rezagan o quedan al final de la columna. «Los que se quedaban atrás» comunica bien el matiz de stragglers sin imponer un tecnicismo militar que el griego no exige.
- source_word: παρακαλῶν
  english_pob_choice: encouraging
  chosen_spanish: animando
  alternatives_spanish:
  - exhortando
  - alentando
  - animando y exhortando
  lexicon: BDAG
  rationale: La gama semántica incluye exhortar, consolar y fortalecer. Aquí, en una marcha, la función principal es sostener el ánimo y urgir a seguir adelante; «animando» reproduce esa amplitud de forma natural en español.
- source_word: τὸν λαόν
  english_pob_choice: the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - al pueblo
  - a la gente
  - a las tropas
  lexicon: LSJ
  rationale: Se mantiene «el pueblo» porque el griego dice literalmente eso y no obliga a reducir el referente a una unidad militar. El contexto bélico está presente, pero la forma griega conserva un alcance más amplio.
- source_word: κατὰ πᾶσαν τὴν ὁδόν
  english_pob_choice: all along the way
  chosen_spanish: por todo el camino
  alternatives_spanish:
  - a lo largo de todo el camino
  - durante todo el trayecto
  - en todo el camino
  lexicon: LSJ
  rationale: La expresión indica continuidad durante todo el recorrido. «Por todo el camino» es idiomático en español y preserva el sentido distributivo de la frase griega.
- source_word: γῆν Ἰούδα
  english_pob_choice: the land of Judah
  chosen_spanish: la tierra de Judá
  alternatives_spanish:
  - el país de Judá
  - la tierra de Judea
  - el territorio de Judá
  lexicon: LSJ
  rationale: «La tierra de Judá» sigue de cerca el original y conserva el valor bíblico del nombre geográfico. Se evita sustituirlo por una equivalencia más interpretativa como «Judea» salvo que el contexto lo requiriera.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés presentan alta concordancia; no se registran revisiones sustantivas aplicadas. La versión española sigue de cerca la lectura establecida, conservando el matiz progresivo de los participios y la referencia geográfica literal.
  spanish_consistency_notes:
  - Se usa «Judá» para el territorio en coherencia con la fórmula bíblica «la tierra de Judá».
  - Se evita «Cristo», «SEÑOR» o terminología doctrinal no presente en el versículo.
  - Se preserva el valor procesual de los participios con «iba reuniendo» y «animando».
  - La nota al pie marca la alternativa léxica principal para τοὺς ἐσχατίζοντας, tal como en el audit trail inglés.
