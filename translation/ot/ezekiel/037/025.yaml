id: EZK.37.25
reference: Ezekiel 37:25
source:
  edition: WLC
  text: וְ/יָשְׁב֣וּ עַל הָ/אָ֗רֶץ אֲשֶׁ֤ר נָתַ֨תִּי֙ לְ/עַבְדִּ֣/י לְ/יַֽעֲקֹ֔ב אֲשֶׁ֥ר יָֽשְׁבוּ בָ֖/הּ אֲבֽוֹתֵי/כֶ֑ם וְ/יָשְׁב֣וּ עָלֶ֡י/הָ הֵ֠מָּה וּ/בְנֵי/הֶ֞ם וּ/בְנֵ֤י בְנֵי/הֶם֙ עַד עוֹלָ֔ם וְ/דָוִ֣ד עַבְדִּ֔/י נָשִׂ֥יא לָ/הֶ֖ם לְ/עוֹלָֽם־־־׃
translation:
  text: They will dwell in the land that I gave to my servant Jacob[a], where your fathers dwelt; and they will dwell on it, they and their sons and their sons' sons, forever[c][b]. And David my servant will be prince for them forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your ancestors.' The Hebrew reads 'your fathers.'
    reason: lexical_alternative
  - marker: b
    text: '''David'' may refer to the promised Davidic ruler; the text does not specify whether this is to be taken as the historical David restored or as a future Davidic figure.'
    reason: alternative_reading
  - marker: c
    text: Or 'leader' or 'ruler.' The Hebrew term is 'prince,' not 'king.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָשְׁבוּ
  chosen: they will dwell
  alternatives:
  - they will live
  - they will settle
  lexicon: HALOT
  rationale: ישב commonly denotes dwelling/settling. 'Dwell' preserves the covenant-land nuance and matches the repeated verb in the verse without sounding overly archaic in this context.
- source_word: עַל הָאָרֶץ
  lemma: עַל
  chosen: in the land
  alternatives:
  - on the land
  - upon the land
  lexicon: HALOT
  rationale: Although עַל literally means 'on/upon,' with ישב and הארץ in land-promise contexts idiomatic English is 'dwell in the land.' This is an optimal-equivalence adjustment for natural English while preserving the territorial sense.
- source_word: אֲשֶׁר נָתַתִּי
  chosen: that I gave
  alternatives:
  - which I gave
  - that I have given
  lexicon: HALOT
  rationale: Simple past best reflects the Hebrew perfect in this retrospective reference to the ancestral land grant.
- source_word: לְעַבְדִּי לְיַעֲקֹב
  chosen: to my servant Jacob
  alternatives:
  - for my servant Jacob
  lexicon: HALOT
  rationale: The lamed marks the indirect object of נתן here. 'My servant Jacob' is retained formally because it is a significant covenantal designation.
- source_word: אֲשֶׁר יָשְׁבוּ בָהּ אֲבוֹתֵיכֶם
  chosen: where your fathers dwelt
  alternatives:
  - in which your fathers lived
  - where your ancestors dwelt
  lexicon: HALOT
  rationale: '''Where'' is smoother English for the relative clause. ''Fathers'' is retained rather than ''ancestors'' because the Hebrew is explicitly masculine plural and representative; this follows the gender-accurate policy.'
- source_word: וְיָשְׁבוּ עָלֶיהָ
  chosen: and they will dwell on it
  alternatives:
  - and they will dwell in it
  - and they will live there
  lexicon: HALOT
  rationale: Here עָלֶיהָ is more naturally represented as 'on it' or 'upon it.' Keeping a slightly more literal rendering helps preserve the repetition and emphasis after the prior clause.
- source_word: הֵמָּה וּבְנֵיהֶם וּבְנֵי בְנֵיהֶם
  chosen: they and their sons and their sons’ sons
  alternatives:
  - they and their children and their grandchildren
  - they and their sons and their grandsons
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'sons' and 'sons of sons.' This is preserved for gender accuracy and formal transparency, while still being understandable in English.
- source_word: עַד עוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - for the age
  - perpetually
  lexicon: HALOT
  rationale: In this restoration context, עַד עוֹלָם idiomatically expresses enduring permanence. 'Forever' is clear modern English.
- source_word: וְדָוִד עַבְדִּי
  chosen: And David my servant
  alternatives:
  - And my servant David
  lexicon: HALOT
  rationale: Hebrew word order can be represented either way in English. 'David my servant' keeps the name prominent and mirrors the source sequence.
- source_word: נָשִׂיא
  chosen: prince
  alternatives:
  - leader
  - ruler
  lexicon: HALOT
  rationale: נָשִׂיא in Ezekiel often denotes a recognized ruler/prince rather than the more absolute 'king.' Since the verse intentionally uses נָשִׂיא, not מֶלֶךְ, 'prince' preserves that distinction.
- source_word: לָהֶם
  chosen: for them
  alternatives:
  - over them
  - to them
  lexicon: HALOT
  rationale: The preposition is ל, not על. 'For them' is the most direct rendering, though in context it implies leadership on their behalf rather than mere benefit.
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - perpetually
  lexicon: HALOT
  rationale: Consistent rendering with the earlier עַד עוֹלָם preserves the verse's emphasis on enduring permanence.
