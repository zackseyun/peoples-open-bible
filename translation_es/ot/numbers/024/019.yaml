    rationale: Aunque comunica origen, en español bíblico-natural suena espacial o temporal. «Procedente de Jacob» expresa mejor la procedencia/origen del gobernante.
  - severity: medium
    issue: Anclaje incorrecto de la nota [b]
    rationale: La nota trata de alternativas para שָׂרִיד («sobreviviente», «remanente»), no para el verbo «destruirá». Debe ir en «sobreviviente».
  - severity: low
    issue: Redacción de la nota [b] mejorable
    rationale: La nota actual dice «O “el sobreviviente” o “al remanente”», mezclando formas con y sin preposición/artículo según el contexto sintáctico. Es mejor dar las alternativas léxicas limpias y explicar la fuerza colectiva en la razón o en la nota.
