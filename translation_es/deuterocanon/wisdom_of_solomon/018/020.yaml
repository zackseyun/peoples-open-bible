translation:
  language: es
  text: Pero la prueba de la muerte también tocó a los justos[a], y hubo una destrucción de la multitud en el desierto[b]; sin embargo, la ira no permaneció por mucho tiempo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la experiencia de la muerte» o «la prueba por la muerte» para «la prueba de la muerte».
    reason: lexical_alternative
  - marker: b
    text: O «un quebrantamiento de la multitud» para «una destrucción de la multitud».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἥψατο
  english_pob_choice: touched
  chosen_spanish: tocó
  alternatives_spanish:
  - alcanzó
  - afectó
  - se abatió sobre
  lexicon: LSJ
  rationale: ἅπτομαι aquí expresa que la experiencia llegó a afectar a los justos. «Tocó» conserva la imagen sin volverla demasiado interpretativa.
- source_word: δικαίων
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - las personas justas
  lexicon: LSJ
  rationale: El sustantivo plural designa a un grupo moralmente aprobado; «los justos» es natural en español y preserva la categoría ética-religiosa.
- source_word: πεῖρα θανάτου
  english_pob_choice: the trial of death
  chosen_spanish: la prueba de la muerte
  alternatives_spanish:
  - la experiencia de la muerte
  - la prueba mortal
  - el trial de la muerte
  lexicon: LSJ
  rationale: πεῖρα puede significar prueba, experiencia o ensayo. «Prueba de la muerte» mantiene la concisión del griego y el sentido de un evento mortífero sin resolver indebidamente si se trata de prueba, experiencia o asalto.
- source_word: θραῦσις
  english_pob_choice: a destruction
  chosen_spanish: una destrucción
  alternatives_spanish:
  - un quebrantamiento
  - un quebranto
  - un destrozo
  lexicon: LSJ
  rationale: Aunque el término literalmente puede referirse a ruptura o quebradura, el contexto de juicio mortal favorece una traducción más fuerte y natural en español, como hizo la revisión inglesa al pasar de «breaking» a «destruction».
- source_word: πλήθους
  english_pob_choice: of the multitude
  chosen_spanish: de la multitud
  alternatives_spanish:
  - del pueblo
  - de la muchedumbre
  - de muchos
  lexicon: LSJ
  rationale: «Multitud» conserva el valor colectivo del griego sin reducirlo a una mera cantidad abstracta.
- source_word: ἐν ἐρήμῳ
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto del éxodo
  - en la soledad
  - en la estepa
  lexicon: LSJ
  rationale: En español bíblico puede ser natural «desierto»; aquí se mantiene la imagen del escenario del éxodo sin forzar un término técnico más marcado.
- source_word: ὀργή
  english_pob_choice: the wrath
  chosen_spanish: la ira
  alternatives_spanish:
  - la cólera
  - el furor
  - la ira de Dios
  lexicon: LSJ
  rationale: El griego no explicita poseedor. «La ira» respeta esa reserva, aunque el contexto sugiera juicio divino; no se añade «de Dios» para no cerrar la tensión documental.
- source_word: οὐκ ἐπὶ πολὺ ἔμεινεν
  english_pob_choice: did not remain for long
  chosen_spanish: no permaneció por mucho tiempo
  alternatives_spanish:
  - no duró mucho
  - no se mantuvo por largo tiempo
  - no permaneció largo tiempo
  lexicon: LSJ
  rationale: La expresión temporal se vierte de modo idiomático en español, conservando la brevedad del juicio.
theological_decisions:
- issue: Si explicitar o no que la ira es de Dios
  english_pob_reading: the wrath
  chosen_spanish_reading: la ira
  alternative_spanish_readings:
  - la ira de Dios
  - su ira
  rationale: El griego solo dice ἡ ὀργή. Mantener «la ira» preserva la redacción del texto y deja que el contexto determine el referente divino sin eliminar la ambigüedad documentada.
  doctrine_reference: Preservar la tensión teológica y no sobreexplicar el referente implícito.
- issue: Cómo expresar πεῖρα θανάτου respecto de los justos
  english_pob_reading: the trial of death also touched the righteous
  chosen_spanish_reading: la prueba de la muerte también tocó a los justos
  alternative_spanish_readings:
  - la muerte también probó a los justos
  - los justos también experimentaron la muerte
  - la prueba mortal también alcanzó a los justos
  rationale: La formulación conserva que los justos fueron alcanzados por la calamidad, sin afirmar que fueran destruidos del mismo modo que la multitud. Esto respeta la tensión del pasaje entre aflicción compartida y juicio diferenciado.
  doctrine_reference: Primacía del original y preservación de la tensión interpretativa.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que prefirió «trial» para πεῖρα y «destruction» para θραῦσις, frente a opciones más débiles como «testing» y «breaking». También conserva la decisión auditada de no explicitar el poseedor de ὀργή.
  spanish_consistency_notes:
  - Se mantiene «justos» para δικαίων, en línea con la categoría moral-religiosa usada en la auditoría inglesa.
  - Se evita «SEÑOR» o añadidos interpretativos para ὀργή, preservando el referente implícito del texto.
  - «Destrucción» traduce con mayor naturalidad el efecto del juicio en este contexto que un mero «quebrantamiento».
