    issue: «robó a su hermano» es menos natural para גָּזַל גֵּזֶל אָח
    rationale: En español, «robar a alguien» es posible, pero aquí el hebreo enfatiza despojo/saqueo contra un prójimo. «Despojó a su hermano» comunica mejor el acto interpersonal sin perder cercanía al original; además evita una construcción algo dura en español eclesial general.
  - severity: medium
    issue: La nota d no preserva las alternativas auditadas para מֵת
    rationale: La nota actual dice «O “morirá en su iniquidad” con valor cierto», lo cual no aporta una alternativa real al texto principal. El audit trail inglés documenta las opciones «muere» o «está muerto» junto con la explicación del perfecto hebreo como desenlace cierto.
