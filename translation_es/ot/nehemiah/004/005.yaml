revisions:
- from: 'Y nuestros adversarios dijeron[a]: “No lo sabrán ni lo verán, hasta que entremos en medio de ellos y los matemos y hagamos cesar la obra.”'
  to: 'Y nuestros adversarios dijeron[a]: «No sabrán ni verán, hasta que lleguemos a estar entre ellos[b] y los matemos y detengamos la obra».'
  rationale: Se elimina el objeto añadido «lo» para seguir más de cerca el hebreo; se sustituye la cadena de subjuntivos por una formulación más natural y fiel al plan expresado en discurso directo; y se cambia «hagamos cesar la obra» por «detengamos la obra» para una mejor legibilidad en español. Se conserva la alternativa espacial documentada para אֶל תּוֹכָם, anclándola correctamente en el texto revisado.
