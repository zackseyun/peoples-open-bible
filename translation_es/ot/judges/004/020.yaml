translation:
  language: es
  text: 'Y él le dijo: «Quédate de pie a la entrada de la tienda, y si alguien[a] viene y te pregunta, diciendo: “¿Hay aquí un hombre?”, dirás: “No”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: En la cláusula condicional, el hebreo dice literalmente «si un hombre viene», pero el contexto permite un valor más indefinido. Por eso se traduce «si alguien viene»; la pregunta posterior conserva «un hombre» para reflejar la repetición de אִישׁ.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲמֹד
  english_pob_choice: Stand
  chosen_spanish: Párate
  alternatives_spanish:
  - Permanece de pie
  - Ponte de pie
  lexicon: HALOT
  rationale: El imperativo de עמד pide colocarse o mantenerse en posición de pie. «Párate» conserva la fuerza directa del mandato y suena natural en español bíblico contemporáneo sin perder la instrucción concreta.
- source_word: פֶּתַח הָאֹהֶל
  english_pob_choice: the entrance of the tent
  chosen_spanish: la entrada de la tienda
  alternatives_spanish:
  - la entrada de la tienda de campaña
  - el acceso de la tienda
  lexicon: HALOT
  rationale: פֶּתַח es «entrada» o «apertura». En español, «tienda» comunica bien la estructura nómada sin añadir rigidez. «Tienda de campaña» sería más explícito, pero menos sobrio; «entrada de la tienda» mantiene la sencillez del hebreo.
- source_word: וְהָיָה אִם
  english_pob_choice: and if
  chosen_spanish: y si
  alternatives_spanish:
  - y acontecerá que si
  - y será que si
  lexicon: HALOT
  rationale: La fórmula introduce una situación condicional. «Y si» reproduce la función narrativa con naturalidad en español, evitando una calca innecesaria.
- source_word: אִישׁ
  english_pob_choice: a man / anyone
  chosen_spanish: alguien
  alternatives_spanish:
  - un hombre
  - algún hombre
  lexicon: HALOT
  rationale: El inglés POB distinguió entre el uso indefinido en la condición y el uso literal en la pregunta. En español, «alguien» comunica mejor el valor indefinido de איש en la cláusula condicional, mientras que la pregunta conserva «un hombre» para reflejar la repetición del hebreo.
- source_word: יָבֹוא
  english_pob_choice: comes
  chosen_spanish: viene
  alternatives_spanish:
  - llega
  - entra
  lexicon: HALOT
  rationale: בוא suele ser «venir»; aquí describe a alguien que se aproxima a la tienda. «Viene» mantiene la amplitud semántica sin especificar más de lo que el texto dice.
- source_word: וּשְׁאֵלֵךְ
  english_pob_choice: asks you
  chosen_spanish: te pregunta
  alternatives_spanish:
  - te consulta
  - te inquiere
  lexicon: HALOT
  rationale: שׁאל es «preguntar»/«inquirir». «Te pregunta» es claro y fiel; evita un registro demasiado formal y sigue la naturalidad del español.
- source_word: הֲיֵשׁ פֹּה אִישׁ
  english_pob_choice: Is there a man here?
  chosen_spanish: ¿Hay aquí un hombre?
  alternatives_spanish:
  - ¿Está aquí un hombre?
  - ¿Hay un hombre aquí?
  lexicon: HALOT
  rationale: La pregunta hebrea usa la partícula existencial y repite אִישׁ. «¿Hay aquí un hombre?» preserva el sustantivo masculino y la idea de presencia sin sonar forzado en español.
- source_word: אָיִן
  english_pob_choice: 'No'
  chosen_spanish: 'No'
  alternatives_spanish:
  - No hay
  - Ninguno
  lexicon: HALOT
  rationale: La respuesta hebrea es muy breve. «No» reproduce esa concisión y la brusquedad del intercambio.
translation_notes:
  revision_awareness: 'El audit trail inglés revisó la cláusula condicional de «a man comes» a «anyone comes» para captar el valor indefinido de אִישׁ, pero mantuvo «a man» en la pregunta citada. La versión española sigue esa misma distinción: «si alguien viene» y «¿Hay aquí un hombre?».'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para el nombre divino según la norma del proyecto, aunque este versículo no lo contiene.
  - Se prefirió «tienda» como equivalente de אֹהֶל por naturalidad contextual; no se usó «carpa» para evitar una tonalidad demasiado moderna o regional.
  - Se preservó la repetición de «hombre» dentro de la pregunta citada, mientras que la condición se volvió indefinida con «alguien» para reflejar el matiz del hebreo y del audit trail inglés.
