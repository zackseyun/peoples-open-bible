translation:
  language: es
  text: 'Así le compré el campo a Hanamel, hijo de mi tío, que estaba en Anatot[b], y le pesé la plata: diecisiete siclos de plata[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «siete siclos y diez plata». Esto comúnmente se entiende como «diecisiete siclos de plata».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «de Hanamel, mi primo, que estaba en Anatot». El hebreo dice más literalmente: «Hanamel, hijo de mi tío, que estaba en Anatot».'
    reason: alternative_reading
lexical_decisions:
- source_word: וָאֶקְנֶה
  english_pob_choice: So I bought
  chosen_spanish: Así compré
  alternatives_spanish:
  - Y compré
  - Entonces compré
  lexicon: HALOT
  rationale: La forma wayyiqtol narra una acción pasada continuada; «así» conserva la continuidad narrativa de manera natural en español sin forzar un calco de la waw consecutiva.
- source_word: הַשָּׂדֶה
  english_pob_choice: the field
  chosen_spanish: el campo
  alternatives_spanish:
  - el terreno
  - la parcela
  lexicon: HALOT
  rationale: שָׂדֶה puede referirse a un campo o extensión de terreno. «Campo» es claro, natural y suficientemente preciso en este contexto de compra.
- source_word: מֵאֵת
  english_pob_choice: from
  chosen_spanish: de
  alternatives_spanish:
  - de parte de
  - de manos de
  lexicon: HALOT
  rationale: La preposición marca el origen del pago/compraventa. «De» expresa de manera simple y fiel la relación transaccional.
- source_word: בֶּן דֹּדִי
  english_pob_choice: the son of my uncle
  chosen_spanish: hijo de mi tío
  alternatives_spanish:
  - mi primo
  - hijo del hermano de mi padre
  lexicon: HALOT
  rationale: El hebreo dice literalmente «hijo de mi tío». Se mantiene esa formulación explícita porque la POB en inglés preserva la relación familiar formal, aunque «mi primo» sería una equivalencia práctica.
- source_word: אֲשֶׁר בַּעֲנָתוֹת
  english_pob_choice: who was at Anathoth
  chosen_spanish: que estaba en Anatot
  alternatives_spanish:
  - que era de Anatot
  - que estaba en Anatot
  lexicon: HALOT
  rationale: La cláusula relativa puede localizar a Hanamel o al campo; siguiendo la revisión inglesa, se toma a Hanamel como el localizado en Anatot, reflejado en español con una formulación directa y natural.
- source_word: וָאֶשְׁקֲלָה לוֹ
  english_pob_choice: and I weighed out the silver to him
  chosen_spanish: y le pesé la plata
  alternatives_spanish:
  - y le entregué el dinero
  - y pesé la plata para él
  lexicon: HALOT
  rationale: שׁקל en contexto comercial alude a pesar como acto de pago. «Le pesé la plata» conserva la acción concreta y el medio material, más fiel que «le pagué».
- source_word: הַכֶּסֶף
  english_pob_choice: the silver
  chosen_spanish: la plata
  alternatives_spanish:
  - el dinero
  - el metal
  lexicon: HALOT
  rationale: כֶּסֶף puede significar plata o dinero. Aquí el acto de pesar y la especificación de siclos favorecen «plata» para mantener el valor material del pago.
- source_word: שִׁבְעָה שְׁקָלִים וַעֲשָׂרָה
  english_pob_choice: seventeen shekels
  chosen_spanish: diecisiete siclos
  alternatives_spanish:
  - siete siclos y diez
  - siete siclos y diez de plata
  lexicon: HALOT
  rationale: El hebreo dice literalmente «siete siclos y diez [de] plata», expresión idiomática entendida como diecisiete siclos. En español se traduce el monto de forma clara, como hizo la POB en inglés.
- source_word: שְׁקָלִים
  english_pob_choice: shekels
  chosen_spanish: siclos
  alternatives_spanish:
  - shekels
  - piezas de plata
  lexicon: HALOT
  rationale: «Siclo» es el término estándar en español bíblico para esta unidad de peso/valor. Se conserva por precisión histórica y claridad.
theological_decisions:
- issue: Identidad de la persona localizada por la cláusula relativa
  english_pob_reading: who was at Anathoth
  chosen_spanish_reading: que estaba en Anatot
  alternative_spanish_readings:
  - que era de Anatot
  - donde estaba Anatot
  rationale: La revisión inglesa prefirió vincular la localización con Hanamel, no con «el campo». En español se mantiene esa lectura sin forzar una interpretación adicional.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Se siguió la revisión del audit trail inglés que reasigna la cláusula de localización a Hanamel: no «el campo en Anatot», sino «Hanamel, que estaba en Anatot». También se conservó la decisión inglesa de representar el monto idiomático como diecisiete siclos, no como «siete y diez».'
  spanish_consistency_notes:
  - Se usa «Anatot» como transliteración estándar del topónimo.
  - Se evita «SEÑOR» porque no aparece el Tetragrámaton en este versículo.
  - «Plata» y «siclos» conservan el lenguaje comercial concreto del hebreo.
  - La puntuación con dos puntos introduce la cantidad, en línea con el valor explicativo del original y la tradición de edición bíblica en español.
