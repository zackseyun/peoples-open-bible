lexical_decisions:
- source_word: διὰ
  english_pob_choice: because of
  chosen_spanish: por
  alternatives_spanish:
  - a causa de
  - debido a
  lexicon: LSJ
  rationale: Con acusativo, la preposición expresa causa; en español, «por» comunica bien la causalidad sin añadir rigidez.
- source_word: πολλὰς ... ὠδῖνας
  english_pob_choice: the many pangs
  chosen_spanish: las muchas angustias
  alternatives_spanish:
  - los muchos dolores
  - los muchos sufrimientos
  - los muchos vaivenes de dolor
  lexicon: LSJ
  rationale: ὠδῖνας puede ser «dolores» o «pangs», pero aquí el contexto de tortura favorece un dolor intenso y aflictivo. «Angustias» conserva intensidad en español y evita la imagen de parto que no domina el contexto.
- source_word: καθʼ ἕκαστον αὐτῶν
  english_pob_choice: of each one of them
  chosen_spanish: de cada uno de ellos
  alternatives_spanish:
  - que cada uno de ellos sufrió
  - de cada uno de ellos individualmente
  - de cada uno
  lexicon: LSJ
  rationale: La fuerza distributiva del giro se refleja de forma natural con «de cada uno de ellos», manteniendo la referencia individual a los hijos sin sobreexplicarla.
- source_word: ἠναγκασμένην
  english_pob_choice: she was compelled
  chosen_spanish: se vio obligada
  alternatives_spanish:
  - fue obligada
  - estaba forzada
  - se sintió forzada
  lexicon: LSJ
  rationale: El participio expresa constricción real; «se vio obligada» suena natural en español y preserva la idea de necesidad impuesta por la situación.
- source_word: τὴν εἰς αὐτοὺς ἔχειν συμπάθειαν
  english_pob_choice: to have sympathy for them
  chosen_spanish: a tener simpatía por ellos
  alternatives_spanish:
  - a tener compasión por ellos
  - a sentir simpatía por ellos
  - a tener fellow-feeling hacia ellos
  lexicon: LSJ
  rationale: συμπάθεια es «simpatía» o «compasión». Como el audit trail inglés eligió «sympathy» para mantener el matiz de co-sufrimiento emocional, «simpatía» es la correspondencia más directa en español, con «tener» siguiendo la construcción verbal del griego.
theological_decisions:
- issue: Naturaleza de la respuesta emocional de la madre
  english_pob_reading: The clause is rendered as genuine maternal sympathy compelled by witnessing each son's pains.
  chosen_spanish_reading: La cláusula presenta una simpatía materna genuina, nacida de ver las angustias de cada hijo y no una categoría doctrinal.
  alternative_spanish_readings:
  - compasión materna
  - piedad materna
  - fellow-feeling materno
  rationale: El pasaje describe una reacción humana real ante el sufrimiento, no un término técnico. «Simpatía» conserva el valor de συμπάθεια sin forzar el texto hacia un vocabulario devocional más pesado.
  doctrine_reference: 'Translation philosophy: preserve source meaning and emotional force without doctrinal inflation or paraphrase.'
translation_notes:
  revision_awareness: He seguido la revisión más reciente del audit trail al mantener la relación causal de διὰ y la construcción verbal de ἔχειν συμπάθειαν, pero adapté la formulación al español para que sea publicable y natural. También resolví la observación de validación asegurando que el marcador de nota [a] aparezca exactamente en el texto principal donde corresponde.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» no aplicable en este versículo.
  - Se conserva el registro sobrio y moderno, sin arcaísmos innecesarios.
  - «Simpatía» se usa con sentido de participación afectiva, coherente con el audit trail inglés y con συμπάθεια.
