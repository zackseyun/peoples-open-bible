id: ROM.11.20
reference: Romans 11:20
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καλῶς· τῇ ἀπιστίᾳ ἐξεκλάσθησαν, σὺ δὲ τῇ πίστει ἕστηκας. μὴ ⸂ὑψηλὰ φρόνει⸃, ἀλλὰ φοβοῦ·
base_translation:
  language: en
  yaml_path: translation/nt/romans/011/020.yaml
  text: 'Quite right: they were broken off because of unbelief[a], but you stand by faith. Do not be arrogant[d][c][b], but fear.'
  footnotes:
  - marker: a
    text: Or 'Well' or 'That is true.'
    reason: lexical_alternative
  - marker: b
    text: Or 'through faith' or 'by trust.' Greek pistis is rendered 'faith' by default in the main text.
    reason: alternative_reading
  - marker: c
    text: Or 'Do not be high-minded' or 'do not think proudly.'
    reason: lexical_alternative
  - marker: d
    text: That is, fear with humble reverence and caution before God, not arrogant presumption.
    reason: lexical_alternative
translation:
  language: ko
  text: 옳습니다. 그들은 믿지 않음으로 꺾였고, 당신은 믿음으로 서 있습니다. 교만한 마음을 품지 말고, 두려워하십시오.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀπιστίᾳ
  english_pob_choice: unbelief
  chosen_korean: 믿지 않음
  alternatives_korean:
  - 불신앙
  lexicon: BDAG
  rationale: πίστις 「믿음」과의 대조를 자연스럽게 보존한다.
- source_word: ὑψηλὰ φρόνει
  english_pob_choice: be arrogant
  chosen_korean: 교만한 마음을 품지
  alternatives_korean:
  - 높은 것을 생각하지
  lexicon: BDAG
  rationale: 관용구 「높이 생각하다」를 한국어 「교만한 마음」으로 옮긴다.
