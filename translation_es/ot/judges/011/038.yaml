translation:
  language: es
  text: 'Y él dijo[a]: «Ve». Así la dejó ir por dos meses; y ella fue, ella y sus compañeras, y lloró por su virginidad en los montes.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre su virginidad» / «a causa de su virginidad». El hebreo expresa de forma explícita que el objeto de su lamento fue su virginidad, detalle central para las interpretaciones del pasaje más amplio.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵכִי
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Vete
  - Anda
  lexicon: HALOT
  rationale: Es un imperativo femenino singular de הלך. «Ve» reproduce la brevedad del mandato y suena natural en español bíblico moderno sin sobrecargarlo.
- source_word: וַיִּשְׁלַח אוֹתָהּ
  english_pob_choice: he sent her away
  chosen_spanish: la despachó
  alternatives_spanish:
  - la envió
  - la dejó ir
  lexicon: HALOT
  rationale: El hebreo expresa el acto de dejarla partir o darle salida por un tiempo. «La despachó» comunica el sentido de autorización/despedida con concisión, evitando una formulación demasiado mecánica.
- source_word: שְׁנֵי חֳדָשִׁים
  english_pob_choice: for two months
  chosen_spanish: por dos meses
  alternatives_spanish:
  - durante dos meses
  - por el lapso de dos meses
  lexicon: HALOT
  rationale: La frase señala duración. «Por dos meses» es idiomático en español y mantiene el valor temporal del hebreo.
- source_word: וַתֵּלֶךְ הִיא וְרֵעוֹתֶיהָ
  english_pob_choice: she went, she and her companions
  chosen_spanish: ella fue, ella y sus compañeras
  alternatives_spanish:
  - fue con sus compañeras
  - ella fue junto con sus compañeras
  lexicon: HALOT
  rationale: El hebreo antepone el pronombre para dar énfasis. La duplicación «ella fue, ella y sus compañeras» conserva esa estructura enfática. «Compañeras» es preferible aquí porque el contexto inmediato es femenino.
- source_word: רֵעוֹתֶיהָ
  english_pob_choice: her companions
  chosen_spanish: sus compañeras
  alternatives_spanish:
  - sus amigas
  - sus acompañantes
  lexicon: HALOT
  rationale: El sustantivo refiere a sus asociadas o acompañantes femeninas. «Compañeras» mantiene el matiz relacional sin añadir informalidad.
- source_word: וַתֵּבְךְּ
  english_pob_choice: wept
  chosen_spanish: lloró
  alternatives_spanish:
  - lloraba
  - sollozó
  lexicon: HALOT
  rationale: בכה puede traducirse «llorar» o «lloró». En español, «lloró» es claro y solemne; evita un matiz excesivamente literario que no agrega precisión.
- source_word: עַל בְּתוּלֶיהָ
  english_pob_choice: over her virginity
  chosen_spanish: por su virginidad
  alternatives_spanish:
  - sobre su virginidad
  - a causa de su virginidad
  lexicon: HALOT
  rationale: El hebreo dice literalmente que lloró «sobre/por» su virginidad. «Por su virginidad» preserva la ambigüedad interpretativa del pasaje y es más natural en español que «sobre».
- source_word: עַל הֶהָרִים
  english_pob_choice: on the mountains
  chosen_spanish: en los montes
  alternatives_spanish:
  - sobre los montes
  - en las montañas
  lexicon: HALOT
  rationale: «Montes» es una opción bíblica y natural en español para ההרים. «En los montes» refleja el ámbito del lamento sin forzar una imagen física de superficie.
theological_decisions:
- issue: Objeto del lamento de la hija de Jefté
  english_pob_reading: The main text preserves the Hebrew focus on her virginity without resolving the broader interpretive debate about whether the narrative implies literal sacrifice, perpetual virginity, or both.
  chosen_spanish_reading: El texto principal conserva el foco hebreo en su virginidad sin resolver el debate interpretativo más amplio del pasaje.
  alternative_spanish_readings:
  - Lloró porque iba a morir como sacrificio humano.
  - Lloró por una vida de virginidad perpetua y sin hijos.
  rationale: El versículo especifica de manera explícita el objeto de su llanto. Traducir más allá de eso introduciría una interpretación que el hebreo de este versículo no formula. La redacción española mantiene la tensión teológica abierta.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El borrador sigue de cerca el consenso del audito inglés y no introduce cambios respecto de la lectura revisada más reciente; conserva la tensión interpretativa sobre el lamento de la hija de Jefté y mantiene la correspondencia semántica con el hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - «Mesías/Cristo» no aplica aquí.
  - Se mantiene el pronombre enfático «ella fue, ella y sus compañeras» para reflejar la estructura hebrea.
  - Se elige «montes» por ser el equivalente bíblico más natural de הרים en español, sin alterar el sentido locativo.
