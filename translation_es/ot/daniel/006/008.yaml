  text: אִתְיָעַ֜טוּ כֹּ֣ל סָרְכֵ֣י מַלְכוּתָ֗/א סִגְנַיָּ֤/א וַֽ/אֲחַשְׁדַּרְפְּנַיָּ/א֙ הַדָּֽבְרַיָּ֣/א וּ/פַחֲוָתָ֔/א לְ/קַיָּמָ֤ה קְיָם֙ מַלְכָּ֔/א וּ/לְ/תַקָּפָ֖ה אֱסָ֑ר דִּ֣י כָל דִּֽי יִבְעֵ֣ה בָ֠עוּ מִן כָּל אֱלָ֨הּ וֶֽ/אֱנָ֜שׁ עַד יוֹמִ֣ין תְּלָתִ֗ין לָהֵן֙ מִנָּ֣/ךְ מַלְכָּ֔/א יִתְרְמֵ֕א לְ/גֹ֖ב אַרְיָוָתָֽ/א׀־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/daniel/006/008.yaml
  text: 'All the high officials of the kingdom[a], the prefects and satraps, the counselors and governors, have agreed together to establish a royal statute and to enforce an injunction: that whoever makes a petition to any god or man for thirty days, except to you, O king[c][b], shall be thrown into the lions’ den.'
  footnotes:
  - marker: a
    text: Aramaic 'from any god or man'; rendered 'to any god or man' in English because 'make a petition' normally takes the addressee with 'to.'
    reason: lexical_alternative
  - marker: b
    text: Or 'have consulted together.' The verb can emphasize joint deliberation as well as unified agreement.
    reason: lexical_alternative
  - marker: c
    text: Or 'royal decree' for 'royal statute.' The Aramaic legal terms here overlap in the field of decree, statute, and binding injunction.
    reason: lexical_alternative
