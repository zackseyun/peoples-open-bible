revisions:
- from: Así que ellos fueron y subieron[a] a la región montañosa, y permanecieron allí tres días, hasta que los perseguidores regresaron. Los perseguidores buscaron por todo el camino, pero no los encontraron.
  to: Entonces fueron y llegaron a la región montañosa[a], y permanecieron allí tres días, hasta que los perseguidores regresaron. Los perseguidores buscaron por todo el camino, pero no los encontraron.
  rationale: Se reemplaza «subieron» por «llegaron a» para evitar sobreinterpretar וַיָּבֹאוּ, manteniendo la fuerza direccional en «a la región montañosa». También se suaviza «Así que» a «Entonces» para una progresión narrativa más neutra y fiel.
