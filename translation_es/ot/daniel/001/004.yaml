  glossary_alignment: No hay términos teológicos mayores en juego. Se conserva «caldeos» conforme al hebreo específico. «Literatura» sigue correctamente la decisión del POB para סֵפֶר, con nota aclaratoria. No hay conflictos con los glosarios maestros de Yahvé/Mesías/etc.
