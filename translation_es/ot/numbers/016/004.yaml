translation:
  language: es
  text: Cuando Moisés oyó esto, cayó rostro en tierra[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cayó de bruces» o «se postró». El hebreo dice literalmente «cayó sobre su rostro».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - escuchó
  - oyó de
  lexicon: HALOT
  rationale: El hebreo narrativo וַיִּשְׁמַע aquí expresa de manera natural que Moisés recibió la noticia; en español, «oyó esto» reproduce bien el hecho implícito sin volver explícito el contenido de la queja anterior. «Escuchó» sería posible, pero «oyó» corresponde mejor al simple acto de percibir lo dicho.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: Nombre propio
  rationale: Nombre propio tradicional en español, correspondiente al transliterado inglés y al hebreo מֹשֶׁה.
- source_word: וַיִּפֹּל
  english_pob_choice: fell
  chosen_spanish: cayó
  alternatives_spanish:
  - se postró
  - se echó
  lexicon: HALOT
  rationale: El verbo נפל significa literalmente «caer». «Cayó sobre su rostro» conserva la acción concreta del hebreo y deja abierta la carga de humillación o súplica sin explicitarla en exceso.
- source_word: עַל פָּנָיו
  english_pob_choice: on his face
  chosen_spanish: sobre su rostro
  alternatives_spanish:
  - boca abajo
  - postrado
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo de postración. «Sobre su rostro» mantiene la imagen corporal del original y evita resolver el modismo con una paráfrasis interpretativa; además, la frase es plenamente inteligible en español bíblico y contemporáneo.
theological_decisions:
- issue: Sentido de la postración de Moisés
  english_pob_reading: Render the physical action straightforwardly as 'he fell on his face' without explicating whether it signifies prayer, shock, humility, or intercession.
  chosen_spanish_reading: 'Traducir la acción física de forma directa: «cayó sobre su rostro», sin especificar si fue oración, shock, humildad o intercesión.'
  alternative_spanish_readings:
  - se postró en oración
  - cayó de bruces en señal de humildad
  rationale: El hebreo presenta el gesto sin interpretarlo. Mantener la imagen concreta preserva la tensión narrativa y evita añadir una explicación devocional o emocional que el texto no formula.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Sin cambios respecto al pasaje fuente y en acuerdo alto con la auditoría en inglés; se conserva la forma concreta del gesto sin interpretarlo.
  spanish_consistency_notes:
  - Se mantiene la convención POB de no ocultar el modismo hebreo detrás de una equivalencia eclesiástica más interpretativa.
  - «Sobre su rostro» conserva la metáfora corporal y permite que el lector perciba el carácter deliberadamente no explicado del gesto.
  - El añadido «esto» refleja el objeto implícito del verbo hebreo a partir del contexto inmediato, como en la versión inglesa auditada.
