translation:
  language: es
  text: 'Y dijo[a]: «Cuando ayuden a las mujeres hebreas a dar a luz y las vean sobre el asiento de parto, si es un hijo, deberán darle muerte; pero si es una hija, vivirá».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «sobre las dos piedras», probablemente una referencia a un asiento o banco de parto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּיַלֶּדְכֶן
  english_pob_choice: When you help ... give birth
  chosen_spanish: Cuando asistan en el parto
  alternatives_spanish:
  - cuando ayuden a dar a luz
  - cuando sirvan como parteras a
  lexicon: HALOT
  rationale: El hebreo, en contexto obstétrico y dirigido a las comadronas, expresa la asistencia en el nacimiento más que solo la profesión. «Asistan en el parto» conserva la función de ayuda a la hora de dar a luz sin volverlo demasiado técnico ni perder el matiz verbal.
- source_word: הָעִבְרִיּוֹת
  english_pob_choice: the Hebrew women
  chosen_spanish: las mujeres hebreas
  alternatives_spanish:
  - las hebreas
  - las mujeres hebreas en parto
  lexicon: HALOT
  rationale: El término designa a las mujeres hebreas; el contexto del parto ya está dado por el verbo. «Mujeres hebreas» es directo y fiel al sustantivo/adjetivo femenino plural.
- source_word: וּרְאִיתֶן
  english_pob_choice: and see
  chosen_spanish: y las vean
  alternatives_spanish:
  - y las miren
  - y las inspeccionen
  lexicon: HALOT
  rationale: Se trata de una instrucción secuencial a las parteras. «Vean» es el equivalente más natural y mantiene la sencillez del hebreo.
- source_word: עַל הָאָבְנָיִם
  english_pob_choice: on the birthstool
  chosen_spanish: sobre el banco de parto
  alternatives_spanish:
  - sobre la silla de parto
  - sobre el asiento de parto
  - sobre las dos piedras
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «sobre las dos piedras», pero en este contexto se refiere probablemente a un asiento o banco de parto. «Banco de parto» conserva el sentido idiomático sin ocultar la imagen concreta; la alternativa literal queda reflejada en la nota.
- source_word: אִם בֵּן הוּא
  english_pob_choice: if it is a son
  chosen_spanish: si es un hijo
  alternatives_spanish:
  - si es un hijo varón
  - si es un varón
  - si es un niño
  lexicon: HALOT
  rationale: בן indica el recién nacido de sexo masculino. «Hijo» conserva la correspondencia léxica con el hebreo y la pareja hijo/hija; «varón» sería más explicativo, pero menos cercano al término original.
- source_word: וַהֲמִתֶּן אֹתוֹ
  english_pob_choice: then you shall put him to death
  chosen_spanish: lo harán morir
  alternatives_spanish:
  - lo matarán
  - lo harán morir ustedes
  - lo pondrán a muerte
  lexicon: HALOT
  rationale: El hiphil de מות expresa causar la muerte. «Lo harán morir» reproduce el valor causativo sin introducir una formulación más jurídica de la que el hebreo exige. En español, la perífrasis mantiene el carácter deliberado de la orden.
- source_word: וְאִם בַּת הִיא
  english_pob_choice: but if it is a daughter
  chosen_spanish: pero si es una hija
  alternatives_spanish:
  - y si es una hija
  - pero si es una niña
  lexicon: HALOT
  rationale: בת corresponde a la contraparte femenina de בן. «Hija» mantiene la simetría léxica con «hijo» y la contraposición del mandato.
- source_word: וָחָיָה
  english_pob_choice: then she shall live
  chosen_spanish: vivirá
  alternatives_spanish:
  - entonces vivirá
  - que viva
  - será dejada con vida
  lexicon: HALOT
  rationale: El verbo expresa que la niña no debe ser matada, sino quedar con vida. En español, la forma simple «vivirá» conserva la concisión del hebreo y la fuerza permisiva/ordenativa del contexto.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el análisis léxico del audit trail en inglés y conserva la tensión interpretativa de עַל הָאָבְנָיִם mediante una nota: el sentido idiomático se vierte en el cuerpo principal como «banco de parto», mientras la lectura literal «sobre las dos piedras» queda documentada. También se mantiene la estructura contrastiva hijo/hija del hebreo, sin suavizar la orden causativa del hiphil.'
  spanish_consistency_notes:
  - Se usa un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - Se preserva la simetría léxica hijo/hija para reflejar בן / בת.
  - Se evita «SEÑOR» porque no hay aquí el tetragrámaton ni una cita directa de κύριος.
  - La puntuación con comillas angulares y dos puntos sigue la convención editorial en español.
