translation:
  language: es
  text: 'Por tanto, mi pueblo conocerá mi nombre[a]; por tanto, en aquel día conocerá que yo soy él, el que habla: Aquí estoy.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «yo soy el que habla».
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Mantiene el valor discursivo de consecuencia y la repetición enfática del hebreo sin sonar rígido en español.
- source_word: יֵדַע
  english_pob_choice: will know
  chosen_spanish: conocerá / sabrán
  alternatives_spanish:
  - conocerán
  - sabrá
  lexicon: HALOT
  rationale: El singular colectivo de עַמִּי permite en español una primera concordancia singular más cercana al hebreo ('mi pueblo conocerá'), seguida de la explicitación plural del verbo en la segunda cláusula según el sentido del sujeto colectivo ('sabrán').
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mi gente
  - mi nación
  lexicon: HALOT
  rationale: '''Pueblo'' conserva el sentido pactual y colectivo del hebreo sin interpretarlo como nación política ni como simple multitud.'
- source_word: שְׁמִי
  english_pob_choice: my name
  chosen_spanish: mi nombre
  alternatives_spanish:
  - mi fama
  - mi reputación
  lexicon: HALOT
  rationale: Se mantiene la literalidad de 'nombre', que en hebreo puede incluir identidad y carácter revelado; no se expande más allá de lo que el texto exige.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - en aquel tiempo
  lexicon: HALOT
  rationale: Fórmula profética natural en español, fiel al deíctico temporal y a su tono escatológico o de cumplimiento.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Aquí introduce el contenido de lo que sabrán; 'que' reproduce de manera natural la subordinación en español.
- source_word: אֲנִי הוּא
  english_pob_choice: I am he
  chosen_spanish: yo soy
  alternatives_spanish:
  - yo soy él
  - yo soy el que es
  lexicon: HALOT
  rationale: Se preserva la fuerza de la autoidentificación divina en forma breve. En español, 'yo soy' comunica mejor la fórmula sin añadir un pronombre de objeto que suena menos natural y podría endurecer innecesariamente la frase.
- source_word: הַמְדַבֵּר
  english_pob_choice: who speaks
  chosen_spanish: el que habla
  alternatives_spanish:
  - el que está hablando
  - quien habla
  lexicon: HALOT
  rationale: El participio sustantivado se vierte con una relativa compacta que conserva la acción verbal en curso y la identificación del hablante.
- source_word: הִנֵּנִי
  english_pob_choice: Here I am
  chosen_spanish: Aquí estoy
  alternatives_spanish:
  - He aquí que estoy
  - Aquí me tienes
  lexicon: HALOT
  rationale: 'Fórmula de presencia y disponibilidad en español actual y reverente; evita el arcaísmo de ''he aquí'' y el calco ''aquí yo''. '
theological_decisions:
- issue: Autoidentificación divina enfática en אֲנִי הוּא
  english_pob_reading: I am he
  chosen_spanish_reading: yo soy
  alternative_spanish_readings:
  - yo soy él
  - yo soy el que es
  rationale: La expresión hebrea es compacta y cargada de peso teológico, pero el español necesita una forma que suene natural y no sobreexplique. 'Yo soy' conserva la solemnidad y deja abierta la tensión interpretativa sin resolverla en exceso.
  doctrine_reference: Preservar la tensión teológica, no simplificarla.
translation_notes:
  revision_awareness: Se sigue el paquete fuente hebreo y el audit trail inglés sin introducir ampliaciones doctrinales. La única variación relevante es la adaptación natural de la fórmula אֲנִי הוּא en español, donde 'yo soy' conserva la autoidentificación enfática mejor que un calco más duro.
  spanish_consistency_notes:
  - Se usa 'Yahvé' en esta serie cuando el texto lo requiera; aquí no aparece el Tetragrámaton explícito.
  - Se mantiene 'mi nombre' como expresión literal, sin sustituirla por perífrasis interpretativas.
  - La nota al pie preserva la alternativa lexical documentada por el inglés POB.
  - La puntuación reproduce la cadencia de dos miembros paralelos y una cita final directa.
