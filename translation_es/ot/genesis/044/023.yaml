revisions:
- from: 'Y tú dijiste a tus siervos[a]: «Si no baja con ustedes su hermano menor, no volverán a ver mi rostro[b]».'
  to: 'Y tú dijiste a tus siervos[a]: «Si su hermano más joven no baja con ustedes, no volverán a ver mi rostro[b]»'
  rationale: La revisión restaura «con ustedes» para reflejar plenamente אִתְּכֶם, mejora «su hermano menor» a «su hermano más joven» para expresar con más claridad el superlativo implícito, y conserva la imagen hebrea «ver mi rostro» con una nota idiomática alineada con el POB inglés.
