  to: He visto la tarea que Dios ha dado a los hijos del hombre para ocuparse[a] de ella.
  rationale: Se ajusta únicamente la preposición en la expresión principal para un español más natural y fiel al sentido auditado («ocuparse de ella»), y se pule la nota para mejorar la idiomaticidad sin cambiar la ambigüedad léxica preservada por el POB inglés. El anclaje de la nota se mueve al verbo relevante para señalar con mayor precisión la alternativa semántica.
