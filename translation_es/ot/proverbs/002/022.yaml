    text: O 'serán desarraigados'. El verbo hebreo comunica una remoción forzosa, con imagen de arranque o desarraigo.
    reason: lexical_alternative
  revision_rationale: Se revisa 'de la tierra' a 'del país' para reflejar mejor la decisión contextual documentada para אֶרֶץ ('land' más que 'earth') en Proverbios 2:21–22. También se corrige la nota léxica para expresar claramente la alternativa semántica. Se mantiene 'serán arrancados' por naturalidad y fidelidad a la idea de remoción forzosa de יִסְּחוּ.
