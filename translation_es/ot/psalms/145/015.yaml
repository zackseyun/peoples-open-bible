review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: mantiene «los ojos de todos», la dirección «a ti», el paralelismo con «y tú les das», y la amplitud de «todos» sin restringir el referente. También preserva adecuadamente la alternativa léxica de יְשַׂבֵּרוּ y de בְּעִתּוֹ en notas. Sin embargo, la nota [a] introduce «confían en ti», que no corresponde tan directamente a las alternativas auditadas en inglés ni al matiz principal de espera expectante del verbo; conviene ceñirse más a «esperan» / «te miran con expectación».'
  spanish_quality_summary: El español es claro, natural y digno. La línea principal funciona bien como castellano bíblico contemporáneo. El único ajuste necesario es de precisión en la nota léxica [a], para no ampliar innecesariamente el campo semántico con «confían en ti».
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparece Yahvé, Mesías, esclavo, etc. Las decisiones «comida» y «en su tiempo» son aceptables y fieles al expediente inglés. La revisión propuesta solo afina la nota lexical de יְשַׂבֵּרוּ.
  issues:
  - severity: medium
    issue: La nota [a] añade «confían en ti» como alternativa para יְשַׂבֵּרוּ.
    rationale: El expediente inglés documenta «wait for you», «look expectantly to you» y «hope in you». «Confiar en ti» desplaza el matiz desde espera expectante hacia confianza, que en español puede leerse como una idea distinta y menos visual. Conviene mantener alternativas más cercanas al hebreo y al razonamiento auditado.
  revised_spanish_text: Los ojos de todos miran[a] a ti, y tú les das su comida en su tiempo[b].
  revised_footnotes:
  - marker: a
    text: O «esperan por ti», «te miran con expectación» o «esperan en ti». El verbo hebreo conlleva espera expectante.
    reason: lexical_alternative
  - marker: b
    text: O «en el momento debido» o «a su debido tiempo».
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel, natural y bien alineado con el hebreo y con la revisión inglesa. Solo se corrige la nota [a] para ajustarla mejor al campo semántico documentado de יְשַׂבֵּרוּ y evitar una ampliación interpretativa innecesaria con «confían en ti».
