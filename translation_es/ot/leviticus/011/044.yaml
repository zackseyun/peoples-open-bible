translation:
  language: es
  text: Porque yo soy Yahvé, su Dios. Por tanto, conságrense[a] y sean santos, porque yo soy santo. Y no se contaminen[b] con ningún ser que pulula y se mueve sobre la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘Santifíquense’. El verbo hebreo es reflexivo y expresa apartarse ustedes mismos como santos.
    reason: lexical_alternative
  - marker: b
    text: O ‘no se hagan impuros con ningún ser que pulula sobre la tierra’.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino en forma transliterada, conforme a la práctica POB. ‘Yahvé’ evita la sustitución por un título y sigue el valor del Tetragrámaton en el hebreo.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - vuestro Dios
  - sus dioses
  lexicon: HALOT
  rationale: En esta fórmula de pacto, el plural morfológico funciona con valor singular referido a Yahvé. En español, ‘su Dios’ es natural y respeta el vínculo posesivo con el pueblo; el contexto impide ‘sus dioses’.
- source_word: וְהִתְקַדִּשְׁתֶּם
  english_pob_choice: Consecrate yourselves
  chosen_spanish: conságrense
  alternatives_spanish:
  - santifíquense
  - consagren ustedes mismos
  lexicon: HALOT
  rationale: 'El hitpael es reflexivo: la gente debe apartarse para la santidad. ‘Conságrense’ conserva el matiz cultual y reflexivo mejor que un calco más duro; además encaja con el tono imperativo del pasaje.'
- source_word: וִהְיִיתֶם קְדֹשִׁים
  english_pob_choice: and be holy
  chosen_spanish: y sean santos
  alternatives_spanish:
  - y serán santos
  - y estén santos
  lexicon: HALOT
  rationale: ‘Ser santos’ reproduce de forma idiomática la exigencia de estado/resultante del verbo hebreo. ‘Santos’ mantiene el enlace léxico con ‘santo’ aplicado a Dios más adelante.
- source_word: קָדוֹשׁ
  english_pob_choice: holy
  chosen_spanish: santo
  alternatives_spanish:
  - sagrado
  - consagrado
  lexicon: HALOT
  rationale: ‘Santo’ es el equivalente normal y teológicamente adecuado en esta fórmula de santidad de pacto. ‘Sagrado’ o ‘consagrado’ reducirían o desplazarían el campo semántico.
- source_word: תְטַמְּאוּ
  english_pob_choice: defile
  chosen_spanish: se contaminarán
  alternatives_spanish:
  - no se harán inmundos
  - no se mancharán ritualmente
  lexicon: HALOT
  rationale: En español, ‘contaminarse’ comunica bien la mezcla de impureza ritual y profanación moral del contexto levítico. La forma negativa refleja el hebreo prohibitivo y conserva la fuerza formal del texto.
- source_word: נַפְשֹׁתֵיכֶם
  english_pob_choice: yourselves
  chosen_spanish: se
  alternatives_spanish:
  - ustedes mismos
  - sus almas
  - sus vidas
  lexicon: HALOT
  rationale: Siguiendo el auditable criterio POB, נֶפֶשׁ aquí no debe forzarse a ‘alma’. En español, el reflexivo ‘se’ evita importar una antropología ajena al verso y conserva el sentido de contaminación personal.
- source_word: שֶּׁרֶץ
  english_pob_choice: swarming thing
  chosen_spanish: animal que se arrastra
  alternatives_spanish:
  - animal que se agita
  - criatura que se arrastra
  lexicon: HALOT
  rationale: El referente en Levítico 11 son pequeñas criaturas terrestres; ‘animal que se arrastra’ es una opción natural en español, aunque menos literal que ‘cosa que se mueve en enjambre’. Mantiene inteligibilidad sin perder el marco levítico.
- source_word: הָרֹמֵשׂ
  english_pob_choice: that moves
  chosen_spanish: que se arrastra
  alternatives_spanish:
  - que se mueve
  - que camina
  lexicon: HALOT
  rationale: El participio de רמשׂ describe desplazamiento cercano al suelo. ‘Que se arrastra’ refleja bien la imagen en español bíblico y evita una generalización excesiva.
- source_word: עַל הָאָרֶץ
  english_pob_choice: on the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre el suelo
  - en la tierra
  lexicon: HALOT
  rationale: ‘Sobre la tierra’ es fiel y idiomático en español; conserva el contraste espacial del hebreo y su alcance general, no restringido a un suelo concreto.
theological_decisions:
- issue: Relación entre la santidad de Yahvé y la santidad exigida al pueblo
  english_pob_reading: Retain 'holy' consistently for both God and the people
  chosen_spanish_reading: Mantener ‘santo/santos’ de manera consistente para Dios y para el pueblo
  alternative_spanish_readings:
  - usar ‘apartados’ para el pueblo
  - usar ‘consagrados’ para Dios o el pueblo
  rationale: 'La repetición del grupo קדשׁ crea un vínculo teológico directo: la norma de Israel deriva del carácter de Yahvé. Mantener ‘santo’ y ‘santos’ preserva esa conexión y evita diluirla con expresiones solo funcionales.'
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: Valor de נַפְשֹׁתֵיכֶם en el prohibitivo final
  english_pob_reading: Translate idiomatically as 'yourselves' rather than 'your souls'
  chosen_spanish_reading: Traducirlo de manera reflexiva y no antropológica explícita
  alternative_spanish_readings:
  - ‘sus almas’
  - ‘sus vidas’
  - ‘sus personas’
  rationale: El verso trata de contaminación ritual por contacto con criaturas prohibidas, no de una tesis sobre el alma. El reflexivo español evita imponer una lectura dualista o psicológica que el hebreo no exige.
  doctrine_reference: Affirmations / Never import doctrinal claims the text does not make
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail inglés: mantiene el conector inferencial ‘por tanto’ para reflejar el וְ inicial antes de ‘conságrense’, usa ‘porque’ para la justificación divina, y conserva una prohibición formal en futuro negativo (‘no se contaminarán’) que corresponde al tono solemne del hebreo y a la decisión revisada de la POB inglesa.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como forma fija para יְהוָה en todo el proyecto.
  - Se conserva la familia léxica santo/santidad/consagrar para קדשׁ, sin alternar con ‘sagrado’ salvo necesidad contextual.
  - Se evita ‘alma’ para נֶפֶשׁ en este contexto, conforme al criterio POB de no importar antropología ajena.
  - La negación final se formula de modo formal y bíblico, no como una simple instrucción coloquial.
