review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego: el pueblo vuelve rápidamente, los ancianos invitan a Daniel a sentarse en medio de la asamblea y a hablar, y atribuyen su autoridad a Dios. Sin embargo, hay dos puntos de ajuste. Primero, «anúncianos» es español no natural aquí y además cambia el régimen esperado; ἀνάγγειλον ἡμῖν se expresa mejor como «dinos» o «decláranos». Segundo, el conector griego ὅτι aquí se entiende mejor como explicativo/causal y el English POB lo fija como «for»; «porque» es posible, pero «pues» suena más digno y fluido en este registro. La representación de τὸ πρεσβεῖον como autoridad reconocida no literal está bien encaminada.'
  spanish_quality_summary: El texto es claro y mayormente fiel, pero «anúncianos» resulta poco idiomático en español bíblico natural; lo normal sería «dinos» o «decláranos». «El rango de un anciano» es comprensible, aunque un poco pesado; «la dignidad de un anciano» suena mejor en español y conserva mejor el matiz de rango honorífico. La sintaxis general es buena y el tono es adecuado.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Dios» y «ancianos» están bien. El manejo de τὸ πρεσβεῖον debe seguir reflejando autoridad/rango y no edad literal; «la dignidad de un anciano» encaja mejor con la racionalidad léxica documentada que «el rango de un anciano», aunque ambas son defendibles.
  issues:
  - severity: medium
    issue: «anúncianos» no es natural ni idiomático para ἀνάγγειλον ἡμῖν en este contexto
    rationale: Aunque ἀναγγέλλω puede significar anunciar o declarar, en español directo «anúncianos» suena forzado e incluso ambiguo. «Dinos» o «decláranos» comunica mejor el mandato de informar a la asamblea.
  - severity: low
    issue: «el rango de un anciano» suena algo rígido en español
    rationale: La frase busca evitar una lectura literal de edad, lo cual es correcto, pero «la dignidad de un anciano» o «la preeminencia» fluye mejor en español y mantiene el matiz de estatus honorífico reconocido.
  - severity: low
    issue: El conector «porque» puede mejorarse estilísticamente
    rationale: En este registro narrativo-formal, «pues» reproduce bien la función explicativa de ὅτι y suena más natural y digno que «porque» dentro del discurso directo.
