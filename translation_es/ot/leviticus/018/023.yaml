  to: Y con cualquier animal no te acostarás, para hacerte inmundo con él[a]; y una mujer no se pondrá delante de un animal para aparearse con él[b]; es una perversión[c].
  rationale: Se corrige el anclaje de las notas para que correspondan al término fuente apropiado, especialmente [c] sobre תֶּבֶל. Se reemplaza «para unirse con él» por «para aparearse con él» para preservar mejor el valor sexual específico de לְרִבְעָהּ, en línea con la auditoría inglesa y sin volver el español innecesariamente crudo. También se ajusta la nota [a] para que refleje con precisión las alternativas del segmento de impurificación y no genere ambigüedad sobre qué parte del texto comenta.
