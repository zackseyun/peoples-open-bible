- from: En ti[a], oh Yahvé, he tomado refugio; que nunca sea yo avergonzado. En tu justicia[b] líbrame.
  to: En ti, Yahvé, he tomado refugio; que nunca sea avergonzado. En tu rectitud[a], líbrame.
