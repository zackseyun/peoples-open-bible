review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: salida del amo, retorno al clan y retorno a la heredad ancestral. Mantiene correctamente la repetición de שׁוב con «volverá». Sin embargo, hay un problema gramatical importante: el sujeto explícito hebreo tras «saldrá» es singular («él»), seguido por una frase coordinada añadida («y sus hijos con él»). Por eso el verbo principal debe ir en singular en español («saldrá»), no en plural («saldrán»). Además, el borrador inserta marcadores de notas [b][a] en el texto sin proporcionar notas, y el anclaje de [b] está mal ubicado: en el inglés la nota b corresponde a «from you», cuando en realidad según las decisiones léxicas y el contenido de la nota debe ir con «la propiedad/heredad de sus padres», no con «de ti».'
  spanish_quality_summary: El español es mayormente claro y digno, pero «saldrán de ti» suena algo brusco; aun así puede mantenerse por cercanía formal. Mejor todavía sería «saldrá de tu lado» o «saldrá de contigo», pero lo segundo es antinatural y lo primero es algo más interpretativo. Para una reparación mínima y fiel, «saldrá de ti» es aceptable. «Clan» funciona bien en este contexto socio-legal. «La propiedad de sus padres» es comprensible, aunque «la posesión de sus padres» o «su propiedad ancestral» también serían válidas; el texto base favorece conservar el modismo ancestral.
  glossary_alignment: 'No hay conflictos con la terminología del proyecto. Se preserva el lenguaje masculino pertinente: «hijos» y «padres». La elección «clan» concuerda con la justificación del POB inglés para מִשְׁפָּחָה. Deben restituirse las notas léxicas y reanclarse correctamente.'
  issues:
  - severity: high
    issue: Concordancia verbal incorrecta en «saldrán»
    rationale: 'El hebreo usa וְיָצָא en singular masculino: «él saldrá». La frase «y sus hijos con él» acompaña al sujeto, pero no cambia la forma verbal hebrea. El español debe reflejarlo con «saldrá».'
  - severity: high
    issue: Marcadores de notas en el texto sin notas correspondientes
    rationale: El borrador incluye [b][a] pero el arreglo de footnotes está vacío. Esto incumple el formato requerido y deja al lector sin las aclaraciones preservadas por el POB inglés.
  - severity: medium
    issue: Anclaje incorrecto de la nota b
    rationale: La nota b del POB inglés explica «the property of his fathers / his ancestral property», no «from you». En español debe anclarse en «la propiedad de sus padres» o frase equivalente.
  revised_spanish_text: Entonces él y sus hijos con él saldrá de ti, y volverá a su clan[a] y volverá a la propiedad de sus padres[b].
  revised_footnotes:
