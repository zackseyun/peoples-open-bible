  text: σὺ πίστιν ⸀ἣν ἔχεις κατὰ σεαυτὸν ἔχε ἐνώπιον τοῦ θεοῦ. μακάριος ὁ μὴ κρίνων ἑαυτὸν ἐν ᾧ δοκιμάζει·
base_translation:
  language: en
  yaml_path: translation/nt/romans/014/022.yaml
  text: The faith that you have, keep to yourself before God. Blessed is the one who does not judge himself by what he approves.
translation:
  language: ko
  text: 당신이 가진 믿음은 하나님 앞에서 당신 자신에게 두십시오. 자기가 옳다고 인정하는 일로 자신을 판단하지 않는 자는 복이 있습니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: σὺ πίστιν ἣν ἔχεις κατὰ σεαυτὸν ἔχε
  english_pob_choice: The faith that you have, keep to yourself
  chosen_korean: 당신이 가진 믿음은 당신 자신에게 두십시오
  alternatives_korean:
  - 당신이 가진 확신은 자기 안에 간직하라
  lexicon: BDAG
  rationale: κατὰ σεαυτὸν은 「자기에게 (간직)」. ἔχε(현재 명령)와 결합하여 「자기에게 두라」.
- source_word: ἐνώπιον τοῦ θεοῦ
  english_pob_choice: before God
  chosen_korean: 하나님 앞에서
  lexicon: BDAG
  rationale: 표준 표현.
- source_word: μακάριος
  english_pob_choice: Blessed
  chosen_korean: 복이 있다
  lexicon: BDAG
  rationale: 「복 있는 자」 정형.
- source_word: ὁ μὴ κρίνων ἑαυτὸν ἐν ᾧ δοκιμάζει
  english_pob_choice: the one who does not judge himself by what he approves
  chosen_korean: 자기가 옳다고 인정하는 일로 자신을 판단하지 않는 자
  alternatives_korean:
  - 스스로 시인하는 바로 자기를 정죄하지 않는 자
  lexicon: BDAG
  rationale: δοκιμάζει는 「시험하여 옳다고 인정함」. 자기 판단의 일치 의미를 「옳다고 인정하는」으로.
