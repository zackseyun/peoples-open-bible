lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: Then ... spoke
  chosen_spanish: Entonces ... habló
  alternatives_spanish:
  - Y ... habló
  - Entonces ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo marca avance narrativo; en español, «Entonces» comunica mejor la secuencia que «Y» en este contexto. «Habló» preserva la distinción verbal frente a לֵאמֹר, evitando igualar ambos verbos con «dijo».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El texto hebreo usa el Tetragrámaton directamente. La política del proyecto pide «Yahvé» para preservar el nombre divino, en lugar de sustituirlo por un título como «el SEÑOR».
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: conmigo
  alternatives_spanish:
  - a mí
  - me
  lexicon: HALOT
  rationale: Aunque el valor literal es direccional («a mí»), en esta fórmula narrativa española «habló conmigo» expresa de forma natural la comunicación dirigida al hablante. Se mantiene la relación personal sin endurecer la sintaxis.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  - y dijo
  lexicon: HALOT
  rationale: La fórmula introductoria conserva su función de presentar discurso directo. «Diciendo» es la correspondencia idiomática más cercana y mantiene el enlace formal con la cita siguiente.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El versículo contiene el nombre pactual de Dios, no un título. «Yahvé» preserva esa identidad divina y sigue la decisión doctrinal del POB de no enmascarar el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Se corrigió el anclaje de la nota al texto español: el marcador [a] ahora aparece en la palabra correspondiente («habló[a]»). No hubo cambios sustantivos en el contenido frente al pasaje fuente; solo se ajustó la presentación para cumplir la validación y conservar la nota audit trail.'
  spanish_consistency_notes:
  - 'Se mantuvo el orden narrativo del hebreo: marcador temporal + verbo de habla + destinatario + fórmula introductoria.'
  - Se evitó usar «SEÑOR» como sustituto editorial del nombre divino, en coherencia con el POB.
  - «Habló» y «diciendo» conservan la diferencia entre דבר y לֵאמֹר.
  - La frase «conmigo» refleja el sentido relacional de אֵלַי en español natural, sin perder dirección de habla.
