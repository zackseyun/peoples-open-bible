translation:
  language: es
  text: Tú también[a], carga con tu deshonra, porque pronunciaste juicio a favor de tus hermanas. Por tus pecados, en los que actuaste más abominablemente que ellas, han resultado más justas que tú. Así que tú también, avergüénzate y carga con tu deshonra[b], porque hiciste que tus hermanas resultaran justas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «juzgaste en favor de tus hermanas»; también puede entenderse como «intercediste por tus hermanas». El hebreo es irónico: los pecados de Jerusalén han terminado vindicando a sus hermanas por contraste.'
    reason: lexical_alternative
  - marker: b
    text: O «ellas son más justas que tú» o «ellas han quedado más justificadas que tú». El sentido es comparativo, no que las hermanas fueran justas en sentido absoluto.
    reason: alternative_reading
lexical_decisions:
- source_word: שְׂאִי
  english_pob_choice: bear
  chosen_spanish: lleva
  alternatives_spanish:
  - soporta
  - carga
  - sobrelleva
  lexicon: HALOT
  rationale: El imperativo de נשׂא aquí expresa asumir o cargar la vergüenza/disgracia. «Lleva» conserva la idea de cargar con algo oneroso y resulta natural en español, sin suavizar el peso moral del mandato.
- source_word: כְלִמָּתֵךְ
  english_pob_choice: your disgrace
  chosen_spanish: tu vergüenza
  alternatives_spanish:
  - tu deshonra
  - tu oprobio
  - tu afrenta
  lexicon: HALOT
  rationale: כְּלִמָּה denota vergüenza pública, deshonra o oprobio. «Vergüenza» comunica bien el sentido, y se complementa con «avergüénzate» para mantener la fuerza afectiva y pública del reproche.
- source_word: פִּלַּלְתְּ לַאֲחוֹתֵךְ
  english_pob_choice: you pronounced judgment in favor of your sisters
  chosen_spanish: pronunciaste juicio a favor de tus hermanas
  alternatives_spanish:
  - intercediste por tus hermanas
  - abogaste por tus hermanas
  - fallaste a favor de tus hermanas
  lexicon: HALOT
  rationale: 'El piel de פלל con ל puede significar intervenir/juzgar a favor. Aquí el contexto es irónico: por contraste, Jerusalén ha «justificado» a sus hermanas. «Pronunciaste juicio a favor» preserva el matiz forense sin resolverlo en una sola imagen devocional.'
- source_word: בְּחַטֹּאתַיִךְ
  english_pob_choice: by your sins
  chosen_spanish: por tus pecados
  alternatives_spanish:
  - a causa de tus pecados
  - mediante tus pecados
  - en tus pecados
  lexicon: HALOT
  rationale: La preposición ב expresa aquí medio o circunstancia. «Por tus pecados» funciona de manera natural en español y mantiene la relación causal/instrumental.
- source_word: הִתְעַבְתְּ מֵהֵן
  english_pob_choice: you acted more abominably than they
  chosen_spanish: actuaste más abominablemente que ellas
  alternatives_spanish:
  - te hiciste más abominable que ellas
  - te comportaste más detestablemente que ellas
  - cometiste más abominaciones que ellas
  lexicon: HALOT
  rationale: El hitpael de תעב expresa conducta abominable en grado comparativo. «Actuaste más abominablemente que ellas» conserva la comparación y el juicio moral intenso sin introducir una interpretación más débil.
- source_word: תִּצְדַּקְנָה מִמֵּךְ
  english_pob_choice: they have become more righteous than you
  chosen_spanish: ellas han quedado más justas que tú
  alternatives_spanish:
  - ellas son más justas que tú
  - ellas han sido vindicadas más que tú
  - ellas parecen más justas que tú
  lexicon: HALOT
  rationale: צדק en este contexto comparativo apunta a quedar en mejor situación moral/jurídica frente a otra. «Han quedado más justas» preserva la comparación y la idea de vindicación relativa sin afirmar una justicia absoluta de las hermanas.
- source_word: בּוֹשִׁי
  english_pob_choice: be ashamed
  chosen_spanish: avergüénzate
  alternatives_spanish:
  - siente vergüenza
  - ponte avergonzada
  - sé avergonzada
  lexicon: HALOT
  rationale: El imperativo de בוש pide una respuesta de vergüenza o humillación. «Avergüénzate» es la forma natural y fuerte en español para este reproche profético.
- source_word: בְּצַדֶּקְתֵּךְ אַחְיוֹתֵךְ
  english_pob_choice: because you made your sisters appear righteous
  chosen_spanish: porque hiciste que tus hermanas parecieran justas
  alternatives_spanish:
  - porque justificaste a tus hermanas
  - porque hiciste ver justas a tus hermanas
  - porque declaraste justas a tus hermanas
  lexicon: HALOT
  rationale: 'La forma con ב y el sustantivo/infinitivo de צדק expresa el efecto comparativo: por contraste, Jerusalén ha hecho que sus hermanas aparezcan en mejor situación. «Parecieran justas» comunica esa vindicación relativa sin borrar la tensión teológica ni convertirla en absolución plena.'
theological_decisions:
- issue: Justicia comparativa aplicada a las hermanas de Jerusalén
  english_pob_reading: Render the verse as relative/comparative vindication, not absolute moral righteousness.
  chosen_spanish_reading: Renderizar el versículo como vindicación relativa/comparativa, no como justicia moral absoluta de las hermanas.
  alternative_spanish_readings:
  - Presentar a las hermanas como absolutamente justas
  - Reducir la frase a una absolución legal formal
  rationale: 'En Ezequiel 16 el punto es la vergüenza de Jerusalén: sus pecados la hacen parecer peor que Samaria y Sodoma. La traducción conserva esa comparación escandalosa sin afirmar que las hermanas fueran inocentes o perfectamente justas.'
  doctrine_reference: Preservar la tensión teológica del texto profético; primacía del hebreo sobre la tradición interpretativa.
- issue: El verbo פלל en contexto irónico
  english_pob_reading: you pronounced judgment in favor of your sisters / you interceded for your sisters
  chosen_spanish_reading: juicio a favor de tus hermanas, con matiz irónico-forense
  alternative_spanish_readings:
  - intercesión por tus hermanas
  - defensa de tus hermanas
  - sentencia favorable a tus hermanas
  rationale: 'El hebreo permite más de una lectura contextual. En este pasaje la lógica es irónica: los pecados de Jerusalén hacen que las hermanas queden justificadas en comparación. La frase española mantiene esa ambigüedad controlada y el tono judicial del profeta.'
  doctrine_reference: Mantener la polisemia cuando el contexto no obliga a una sola equivalencia.
translation_notes:
  revision_awareness: 'Tomé en cuenta la revisión más reciente del audit trail: la preferencia por una lectura forense de פלל, la conservación de la comparación en צדק, y la necesidad de mantener la ironía retórica del profeta. La versión española sigue esa línea y evita tanto una paráfrasis devocional como una traducción excesivamente literal que sonaría extraña en español.'
  spanish_consistency_notes:
  - Usé «Yahvé» como convención del proyecto solo cuando el texto lo requiriera; en este versículo no aparece el Tetragrámaton.
  - Mantuve el contraste entre «vergüenza» y «avergüénzate» para reflejar la doble carga de כְלִמָּה y בושׁ.
  - Elegí «justas» en femenino plural por concordancia con «tus hermanas» y para conservar la comparación directa del hebreo.
  - Conservé el tono profético judicial del pasaje sin añadir explicaciones interpretativas dentro del cuerpo del texto.
