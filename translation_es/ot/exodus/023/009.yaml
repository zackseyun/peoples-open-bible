base_translation:
  language: en
  yaml_path: translation/ot/exodus/023/009.yaml
  text: You shall not oppress a sojourner[a], and you yourselves know the soul of the sojourner[b], because you were sojourners in the land of Egypt.
  footnotes:
  - marker: a
    text: Or 'foreigner,' 'resident alien,' or 'stranger.' The Hebrew ger refers to a non-native living among a people, often in a socially vulnerable position.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'you know the nephesh of the sojourner'—an idiom expressing firsthand knowledge of the sojourner's inner life or lived condition.
    reason: lexical_alternative
