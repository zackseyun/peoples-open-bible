  text: וְ/עַבְדִּ֤/י דָוִד֙ מֶ֣לֶךְ עֲלֵי/הֶ֔ם וְ/רוֹעֶ֥ה אֶחָ֖ד יִהְיֶ֣ה לְ/כֻלָּ֑/ם וּ/בְ/מִשְׁפָּטַ֣/י יֵלֵ֔כוּ וְ/חֻקֹּתַ֥/י יִשְׁמְר֖וּ וְ/עָשׂ֥וּ אוֹתָֽ/ם׃
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/037/024.yaml
  text: My servant David will be king over them[a], and there will be one shepherd for all of them. They will walk in my judgments[b], and they will keep my statutes and do them.
  footnotes:
  - marker: a
    text: Or, 'he will be one shepherd for them all.' The Hebrew can be understood with the shepherd clause referring directly to David.
    reason: lexical_alternative
  - marker: b
    text: '''David'' may refer literally to David, to a future Davidic ruler, or typologically to the Messiah; the translation preserves the Hebrew wording without resolving the interpretation.'
    reason: alternative_reading
