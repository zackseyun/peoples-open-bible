translation:
  language: es
  text: Entonces Aarón extendió su mano sobre las aguas de Egipto, y las ranas[a] subieron y cubrieron la tierra de Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo usa una forma singular para צפרדע, pero aquí funciona de modo colectivo; por eso se traduce en plural.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּט
  english_pob_choice: stretched out
  chosen_spanish: extendió
  alternatives_spanish:
  - estiró
  - tendió
  lexicon: HALOT
  rationale: נטה en este contexto de señal y acción ritual se expresa naturalmente en español como 'extendió'; conserva la imagen de la mano alzada y evita un giro demasiado literal o corporal que sonaría menos idiomático.
- source_word: יָדוֹ
  english_pob_choice: his hand
  chosen_spanish: su mano
  alternatives_spanish:
  - su brazo
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'mano', no 'brazo'. Mantener 'mano' conserva la imagen concreta de la acción de Aarón.
- source_word: עַל
  english_pob_choice: over
  chosen_spanish: sobre
  alternatives_spanish:
  - encima de
  - contra
  lexicon: HALOT
  rationale: '''Sobre'' reproduce bien la orientación espacial de la mano extendida respecto de las aguas y es la opción más natural en español.'
- source_word: מֵימֵי מִצְרַיִם
  english_pob_choice: the waters of Egypt
  chosen_spanish: las aguas de Egipto
  alternatives_spanish:
  - el agua de Egipto
  - las aguas egipcias
  lexicon: HALOT
  rationale: 'El constructo plural se traduce mejor en plural: ''las aguas de Egipto''. Así se mantiene la referencia colectiva a los cuerpos de agua de Egipto.'
- source_word: וַתַּעַל
  english_pob_choice: came up
  chosen_spanish: subieron
  alternatives_spanish:
  - salieron
  - aparecieron
  lexicon: HALOT
  rationale: עלה describe el movimiento ascendente de las ranas desde el agua hacia la tierra. 'Subieron' conserva ese movimiento sin añadir interpretación.
- source_word: הַצְּפַרְדֵּעַ
  english_pob_choice: the frogs
  chosen_spanish: las ranas
  alternatives_spanish:
  - la rana
  lexicon: HALOT
  rationale: Aunque el hebreo usa una forma singular con artículo, funciona aquí como singular colectivo. En español se expresa mejor en plural para reflejar el sentido colectivo del relato y la cláusula siguiente.
- source_word: וַתְּכַס
  english_pob_choice: covered
  chosen_spanish: cubrieron
  alternatives_spanish:
  - taparon
  - recubrieron
  lexicon: HALOT
  rationale: כסה significa 'cubrir'. En español, el plural concuerda con el sujeto colectivo entendido ('las ranas') y conserva la fuerza visual del texto.
- source_word: אֶרֶץ מִצְרָיִם
  english_pob_choice: the land of Egypt
  chosen_spanish: la tierra de Egipto
  alternatives_spanish:
  - el país de Egipto
  - la región de Egipto
  lexicon: HALOT
  rationale: '''אֶרֶץ'' en este contexto denota el territorio de Egipto. ''La tierra de Egipto'' es fiel, natural y mantiene el registro bíblico sin exigir una paráfrasis.'
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; la lectura permanece estable y de alta concordancia con el texto hebreo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino cuando corresponda; aquí no aparece.
  - Se conserva 'tierra de Egipto' en estilo bíblico, coherente con el valor territorial de אֶרֶץ.
  - Se evita 'SEÑOR' o formas de ocultamiento del nombre divino porque el versículo no lo requiere.
  - Se usa plural en español para el sujeto colectivo implícito, manteniendo la tensión entre forma singular hebrea y sentido colectivo.
