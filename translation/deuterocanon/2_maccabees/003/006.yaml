id: 2MA.3.6
reference: 2 Maccabees 3:6
source:
  edition: lxx-swete-1909
  text: καὶ προσήγγειλεν περὶ τοῦ χρημάτων ἀμυθήτων γέμειν τὸ ἐν Ἱεροσολύμοις γαζοφυλάκιον, ὥστε τὸ πλῆθος τῶν διαφόρων ἀναρίθμητον εἶναι, καὶ μὴ προσήκειν αὐτὰ πρὸς τὸν τῶν θυσιῶν λόγον, εἶναι δὲ δυνατόν ὑπὸ τὴν τοῦ βασιλέως ἐξουσίαν πεσεῖν ταῦτα.
  language: Greek
  pages:
  - 690
  confidence: high
  validation: agree
translation:
  text: And he reported that the treasury in Jerusalem was full of immense sums of money[a], so that the quantity of the separate funds was beyond counting, and that they were not connected with the account of the sacrifices[c][b], but that it was possible for these things to fall under the king’s authority.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the amount of the deposits was innumerable.' The Greek phrase may refer to various entrusted sums held in the treasury.
    reason: lexical_alternative
  - marker: b
    text: That is, these monies were not part of the regular sacrificial account or expenditure.
    reason: lexical_alternative
  - marker: c
    text: Or 'to come under the king’s control.'
    reason: lexical_alternative
lexical_decisions:
- source_word: προσήγγειλεν
  chosen: reported
  alternatives:
  - announced
  - informed
  lexicon: LSJ
  rationale: The verb denotes bringing a report or information to someone. 'Reported' fits the narrative context of informing an authority without sounding overly formal.
- source_word: χρημάτων ἀμυθήτων
  chosen: immense sums of money
  alternatives:
  - countless riches
  - vast amounts of money
  lexicon: LSJ
  rationale: χρήματα here refers to money/wealth, and ἀμύθητος conveys vastness beyond easy reckoning. 'Immense sums of money' preserves both the financial sense and the scale.
- source_word: γαζοφυλάκιον
  chosen: treasury
  alternatives:
  - storehouse
  - treasure chamber
  lexicon: LSJ
  rationale: The term refers to a treasury or place where valuables are kept. 'Treasury' is the most natural and contextually precise English rendering here.
- source_word: τὸ πλῆθος τῶν διαφόρων
  chosen: the quantity of the separate funds
  alternatives:
  - the amount of the deposits
  - the multitude of the various monies
  lexicon: LSJ
  rationale: διαφόρων likely refers to distinct sums or categories of deposited monies rather than merely 'differences.' 'Separate funds' captures the idea of various entrusted monies held in the treasury.
- source_word: ἀναρίθμητον
  chosen: beyond counting
  alternatives:
  - innumerable
  - numberless
  lexicon: LSJ
  rationale: The adjective means not countable or innumerable. 'Beyond counting' is idiomatic modern English and preserves the hyperbolic force.
- source_word: μὴ προσήκειν αὐτὰ πρὸς τὸν τῶν θυσιῶν λόγον
  chosen: they were not connected with the account of the sacrifices
  alternatives:
  - they did not belong to the sacrificial expenses
  - they were not applicable to the matter of the sacrifices
  lexicon: LSJ
  rationale: προσήκειν means to pertain or belong to; λόγος here is best taken as account, matter, or administration. The phrase indicates that these funds were not part of the ordinary sacrificial budget or temple-offering account.
- source_word: ὑπὸ τὴν τοῦ βασιλέως ἐξουσίαν πεσεῖν
  chosen: to fall under the king’s authority
  alternatives:
  - to come under the king's control
  - to pass into the king's power
  lexicon: LSJ
  rationale: The idiom πεσεῖν ὑπό with ἐξουσία conveys coming under someone's power or jurisdiction. 'Fall under the king’s authority' preserves the idiom while remaining clear.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - these funds
  - these assets
  lexicon: LSJ
  rationale: The pronoun refers back to the monies in view. 'These things' stays close to the Greek, though the antecedent in context is the treasury funds.
