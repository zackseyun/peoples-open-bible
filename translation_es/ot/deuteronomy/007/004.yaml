    reason: alternative_reading
  - marker: c
    text: «Yahvé» traduce el nombre divino YHWH.
    reason: alternative_reading
  revision_rationale: Se corrige la cláusula final a singular («te destruirá») para ajustarse al sufijo hebreo y al inglés POB. Se añade la nota sobre el cambio de singular a plural en «servirán», ya que esa tensión sí está en el texto fuente y en la auditoría inglesa. Se conserva «Yahvé» conforme al estándar del proyecto.
