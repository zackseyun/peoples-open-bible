base_translation:
  language: en
  yaml_path: translation/ot/2_kings/023/005.yaml
  text: And he put an end to the priests whom the kings of Judah had appointed to burn incense at the high places in the cities of Judah and around Jerusalem[a], and also those who burned incense to Baal, to the sun, to the moon, to the constellations[c][b], and to all the host of the heavens.
  footnotes:
  - marker: a
    text: Or 'the pagan priests.' The Hebrew term refers to priests associated with illegitimate or idolatrous worship, not the lawful priests of the LORD.
    reason: lexical_alternative
  - marker: b
    text: Or 'the zodiac signs.' The Hebrew term likely refers to constellations or astral groupings.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the host of the heavens'; also commonly rendered 'the host of heaven' or 'the heavenly host.' Here it refers to celestial bodies worshiped in astral religion.
    reason: lexical_alternative
