translation:
  language: es
  text: Entonces el límite pasó a la ladera norte de Bet-hogla, y el límite terminó en la lengua[a] del Mar Salado[b], en el extremo sur del Jordán. Este es el límite meridional.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «lengua del Mar Salado», una expresión geográfica para una ensenada o saliente con forma de lengua.'
    reason: lexical_alternative
  - marker: b
    text: O «Mar Muerto»; el texto hebreo dice «Mar Salado».
    reason: alternative_reading
lexical_decisions:
- source_word: וְעָבַר
  english_pob_choice: Then the border passed
  chosen_spanish: Entonces el límite pasó
  alternatives_spanish:
  - Y el límite cruzó
  - Y el límite siguió
  lexicon: HALOT
  rationale: En descripciones de límites, עָבַר expresa que la línea avanza o pasa por un punto. «Pasó» conserva el movimiento del límite en español sin forzar un giro más literal y menos natural.
- source_word: כֶּתֶף
  english_pob_choice: shoulder
  chosen_spanish: hombro
  alternatives_spanish:
  - lado
  - ladera
  - flanco
  lexicon: HALOT
  rationale: El hebreo usa una imagen corporal aplicada a geografía. «Hombro» mantiene esa imagen concreta y refleja bien el uso topográfico del término.
- source_word: בֵּית חָגְלָה
  english_pob_choice: Beth-hoglah
  chosen_spanish: Bet-hogla
  alternatives_spanish:
  - Beth-hogla
  lexicon: nombre propio
  rationale: Nombre de lugar transliterado; se adapta a la ortografía española habitual de topónimos bíblicos, sin traducirlo.
- source_word: צָפוֹנָה
  english_pob_choice: northern
  chosen_spanish: norte
  alternatives_spanish:
  - septentrional
  - hacia el norte
  lexicon: HALOT
  rationale: Aquí la forma direccional califica la ubicación del hombro de Bet-hogla. «Norte» en función adjetival es claro y fiel en español.
- source_word: לְשׁוֹן
  english_pob_choice: tongue
  chosen_spanish: lengua
  alternatives_spanish:
  - promontorio
  - saliente
  - inlet
  lexicon: HALOT
  rationale: La POB inglesa corrigió a «tongue» para ajustarse mejor al hebreo. «Lengua» conserva la metáfora geográfica y es la equivalencia más directa en español.
- source_word: יָם הַמֶּלַח
  english_pob_choice: the Salt Sea
  chosen_spanish: Mar Salado
  alternatives_spanish:
  - Mar de la Sal
  - Mar Muerto
  lexicon: HALOT
  rationale: Se sigue la forma del hebreo, que dice literalmente «Mar Salado». No se sustituye por «Mar Muerto» porque la prioridad aquí es el nombre fuente.
- source_word: קְצֵה הַיַּרְדֵּן נֶגְבָּה
  english_pob_choice: the southern end of the Jordan
  chosen_spanish: el extremo sur del Jordán
  alternatives_spanish:
  - el extremo meridional del Jordán
  - el fin sur del Jordán
  lexicon: HALOT
  rationale: קָצֶה es «extremo» o «punta final», y נֶגְבָּה señala el lado sur. «Extremo sur» reproduce ambos elementos con naturalidad.
- source_word: זֶה גְּבוּל נֶגֶב
  english_pob_choice: This is the southern border
  chosen_spanish: Este es el límite sur
  alternatives_spanish:
  - Este es el límite del sur
  - Este es el borde sur
  lexicon: HALOT
  rationale: En este contexto, נֶגֶב funciona direccionalmente y resume el borde meridional del territorio. «Límite sur» comunica esa función mejor que convertirlo en nombre propio.
translation_notes:
  revision_awareness: Se incorporó la revisión auditada que prefirió «tongue/lengua» para לְשׁוֹן por mayor precisión léxica frente a una equivalencia más libre. La redacción española mantiene esa precisión y conserva el nombre fuente «Mar Salado».
  spanish_consistency_notes:
  - Se usa «límite» de modo consistente para גְּבוּל, siguiendo el valor geográfico del pasaje.
  - Se translitera Bet-hogla con ortografía española simple y uniforme.
  - Se evita «Mar Muerto» en el texto principal para respetar la forma hebrea, dejándolo solo como alternativa en nota.
  - La construcción final «Este es el límite sur» refleja el cierre resumido del hebreo sin añadir interpretaciones territoriales extra.
