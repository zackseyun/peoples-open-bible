translation:
  language: es
  text: Su corazón es ceniza, y su esperanza es más despreciable que la tierra[a], y su vida más deshonrada que el barro[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «suelo»; la comparación griega subraya una extrema falta de valor.
    reason: lexical_alternative
  - marker: b
    text: O «más despreciable que el barro»; el término griego puede subrayar falta de honra o estima.
    reason: lexical_alternative
lexical_decisions:
- source_word: σποδός
  english_pob_choice: ashes
  chosen_spanish: ceniza
  alternatives_spanish:
  - cenizas
  - polvo
  lexicon: LSJ
  rationale: El griego usa un predicado nominal metafórico para describir la condición interior. En español, «ceniza» conserva mejor la imagen de residuo sin vida y evita un plural forzado; «cenizas» también sería posible, pero el singular nominal funciona de modo más natural en este contexto.
- source_word: καρδία
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - mente
  - ser interior
  lexicon: LSJ
  rationale: Mantiene el antropologismo bíblico común y no estrecha indebidamente el sentido a lo puramente cognitivo. «Corazón» comunica el centro interior de la persona.
- source_word: γῆς
  english_pob_choice: earth
  chosen_spanish: tierra
  alternatives_spanish:
  - suelo
  - terreno
  lexicon: LSJ
  rationale: La comparación expresa un estándar de muy bajo valor; «tierra» reproduce bien el alcance amplio y conserva la correspondencia con el material terrenal frente al barro.
- source_word: εὐτελεστέρα
  english_pob_choice: more worthless
  chosen_spanish: más vil
  alternatives_spanish:
  - más despreciable
  - más de poco valor
  - más insignificante
  lexicon: LSJ
  rationale: El adjetivo apunta a un valor extremadamente bajo. En español, «más vil» transmite con fuerza la idea de bajeza/escaso valor, aunque también deja oír una connotación moral y social acorde con el tono polémico del pasaje.
- source_word: ἐλπίς
  english_pob_choice: hope
  chosen_spanish: esperanza
  alternatives_spanish:
  - expectativa
  lexicon: LSJ
  rationale: Es la equivalencia natural y conserva la fuerza abstracta del término sin interpretarlo más de lo necesario.
- source_word: πηλοῦ
  english_pob_choice: clay
  chosen_spanish: barro
  alternatives_spanish:
  - arcilla
  - lodo
  lexicon: LSJ
  rationale: Aunque «arcilla» es más técnico, «barro» comunica mejor en español la imagen de material terrenal y humilde. «Barro» mantiene la oposición con la ceniza y la tierra sin sonar artificioso.
- source_word: ἀτιμότερος
  english_pob_choice: more dishonored
  chosen_spanish: más deshonrada
  alternatives_spanish:
  - más deshonroso
  - más despreciada
  - más sin honra
  lexicon: LSJ
  rationale: El griego centra la falta de honor/estima. En español, «deshonrada» preserva ese campo semántico y puede aplicarse al «vida» personificada del sujeto, evitando reducirlo a simple inutilidad.
- source_word: βίος
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - modo de vida
  - existencia
  - sustento
  lexicon: LSJ
  rationale: En esta tríada paralela, «vida» es la opción más directa y coherente; expresa la existencia entera del individuo sin añadir matices no presentes en el texto.
theological_decisions:
- issue: Metáfora directa de degradación para el idólatra
  english_pob_reading: Render the clauses as direct metaphors of worthlessness and dishonor without softening them into similes or psychological paraphrase.
  chosen_spanish_reading: Mantener las cláusulas como metáforas directas de degradación y vaciedad interior, sin introducir «como» ni explicaciones interpretativas.
  alternative_spanish_readings:
  - Su corazón es como ceniza...
  - Su mente es polvo...
  rationale: El griego presenta predicados nominales directos. La traducción española conserva la dureza retórica y la tensión del texto contra la idolatría, en lugar de suavizarla o reinterpretarla.
  doctrine_reference: Principio de primacía del original; preservar la tensión teológica y retórica del pasaje.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego de la edición Swete y el aparato auditado en inglés, conservando las tres predicaciones nominales sin convertirlas en símiles. Se adopta la equivalencia ya establecida en inglés para σποδός, γῆς, εὐτελεστέρα, πηλοῦ y ἀτιμότερος, ajustándolas a un español natural y reverente.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda al tetragrámaton; este versículo no lo contiene.
  - «Corazón» se conserva como término antropológico bíblico estándar.
  - «Ceniza» y «barro» mantienen la imaginería material del texto sin atenuarla.
  - Las notas al pie se limitan a alternativas léxicas documentadas por el audit trail en inglés.
