review_pass:
  verdict: revise
  source_alignment_summary: El borrador conserva bien la secuencia narrativa hebrea, los referentes principales y la consistencia de עֲדָה como «congregación». También mantiene correctamente «el fruto de la tierra» y el valor causativo de «les mostraron». Sin embargo, «les dieron palabra» no refleja bien וַיָּשִׁיבוּ אוֹתָם דָּבָר en español natural; la idea es devolver/traer palabra, informar o dar reporte, no «dar palabra» en el sentido usual español. Además, la nota [a] está anclada en «Cades», pero su contenido explica «hijos de Israel / israelitas», por lo que el anclaje es incorrecto.
  spanish_quality_summary: 'El texto es mayormente legible y digno, pero tiene dos problemas de calidad importantes: 1) «les dieron palabra» suena poco idiomático y puede malentenderse como «prometer»; 2) la puntuación del segmento «Y les dieron palabra, y a toda la congregación» resulta torpe. Conviene explicitar mejor el complemento indirecto repetido y mover la nota al sintagma pertinente.'
  glossary_alignment: 'Hay buena alineación con la terminología del proyecto: «congregación», «hijos de Israel», «desierto de Parán», «Cades», «fruto de la tierra». No hay conflictos con los defaults teológicos. La principal excepción necesaria es reemplazar «dieron palabra» por una formulación española que preserve דָּבָר sin crear un falso sentido idiomático.'
  issues:
  - severity: high
    issue: «les dieron palabra» es una traducción poco fiel e inidiomática de וַיָּשִׁיבוּ אוֹתָם דָּבָר
    rationale: En español, «dar palabra» suele significar prometer o empeñar la palabra, no informar. El hebreo aquí expresa devolver/traer palabra tras la exploración. «Les dieron noticias», «les llevaron palabra» o «les informaron» serían más claros; entre ellos, «les dieron noticias» suena natural y conserva el campo semántico de דָּבָר mejor que «informe».
  - severity: medium
    issue: La nota [a] está anclada en «Cades» pero explica «hijos de Israel»
    rationale: Las instrucciones requieren que el marcador aparezca en la palabra o frase relevante. La nota alternativa corresponde a «la congregación de los hijos de Israel», no al topónimo «Cades».
  - severity: low
    issue: La estructura «Y les dieron palabra, y a toda la congregación» suena forzada
    rationale: 'Aunque intenta reflejar la repetición hebrea, en español conviene una coordinación más natural: «Les dieron noticias a ellos y a toda la congregación» o similar, sin perder el doble destinatario.'
  revised_spanish_text: Ellos fueron y llegaron a Moisés, a Aarón y a toda la congregación de los hijos de Israel[a], en el desierto de Parán, en Cades. Les dieron noticias a ellos y a toda la congregación, y les mostraron el fruto de la tierra.
  revised_footnotes:
  - marker: a
    text: O «la congregación de los israelitas». El hebreo dice literalmente «la congregación de los hijos de Israel».
    reason: lexical_alternative
  revision_rationale: Se corrige la expresión inidiomática «les dieron palabra» por «Les dieron noticias», que comunica de forma natural y fiel la idea de devolver palabra/informar. También se reubica la nota [a] al sintagma «hijos de Israel», que es donde pertenece su alternativa léxica. Se mantiene el resto de las decisiones principales del borrador porque reflejan bien el hebreo y el expediente inglés.
