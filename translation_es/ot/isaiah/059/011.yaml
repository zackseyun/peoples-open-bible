review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido básico del hebreo: el contraste entre osos y palomas, la continuidad del gemido, la esperanza frustrada de justicia y la lejanía de la salvación. Sin embargo, contiene dos fallas significativas: la nota [a] está anclada en el lugar equivocado y explica otro verbo distinto (נְקַוֶּה, no נֶהֱמֶה), y la frase «por salvación» no es español natural para el segundo miembro elíptico; debe ajustarse para reflejar mejor «[esperamos] salvación». También conviene dar al nexo adversativo el matiz de contraste que el contexto exige.'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero presenta tropiezos de legibilidad: el espacio antes de [a] es incorrecto, la nota [a] confunde al lector al colocarse tras «nosotros», «y no hay ninguna» suena algo torpe para un abstracto como «justicia», y «por salvación» resulta poco idiomático. Una revisión menor deja el versículo más natural y fiel.'
  glossary_alignment: 'La terminología principal está bien alineada: «justicia» para מִשְׁפָּט y «salvación» para יְשׁוּעָה respetan tanto el hebreo como la política del proyecto. «Gruñimos» para נֶהֱמֶה y «gemimos continuamente» para הָגֹה נֶהְגֶּה son decisiones sólidas en español.'
  issues:
  - severity: high
    issue: La nota [a] está asociada al segmento equivocado.
    rationale: La nota trata la alternativa de נְקַוֶּה («esperamos / aguardamos / buscamos»), pero en el borrador está anclada después de «Todos nosotros», donde no corresponde a ningún problema léxico del hebreo.
  - severity: medium
    issue: «Por salvación» es poco natural y no refleja bien la elipsis española.
    rationale: 'El hebreo elide el verbo en el segundo miembro («[esperamos] salvación»), pero en español «por salvación» suena forzado. Es preferible repetir el verbo: «esperamos salvación».'
  - severity: medium
    issue: «Y no hay ninguna» es menos natural que una formulación impersonal más directa.
    rationale: Con el abstracto «justicia», «pero no la hay» o «pero no hay» refleja mejor la frustración expresada por וָאַיִן y suena más idiomático en español bíblico moderno.
  - severity: low
    issue: Espaciado y puntuación del marcador [a].
    rationale: En el texto hay un espacio innecesario antes del marcador, y el anclaje debe ponerse junto a «esperamos» o la cláusula correspondiente.
  revised_spanish_text: Todos nosotros gruñimos como osos, y como palomas gemimos continuamente; esperamos[a] justicia, pero no la hay; esperamos salvación[b], pero está lejos de nosotros.
  revised_footnotes:
  - marker: a
    text: O «aguardamos justicia» / «buscamos justicia»; el verbo hebreo puede expresar tanto esperar como esperar con esperanza.
    reason: lexical_alternative
  - marker: b
    text: O «liberación» para «salvación».
    reason: lexical_alternative
  revision_rationale: Se reubicó la nota [a] para que corresponda al verbo נְקַוֶּה, se mejoró el contraste con «pero no la hay», y se sustituyó «por salvación» por «esperamos salvación» para producir un español natural sin perder la elipsis y el sentido del hebreo.
