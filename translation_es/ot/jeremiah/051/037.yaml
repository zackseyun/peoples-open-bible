review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura y el sentido del hebreo: futuro/resultativo para וְהָיְתָה, plural en לְגַלִּים, identificación contextual de תַּנִּים como «chacales», y cierre de despoblación total en מֵאֵין יוֹשֵׁב. Sin embargo, una elección clave no preserva plenamente la fuerza contextual auditada: מְעוֹן en esta serie de ruina y fauna salvaje se expresa mejor como «guarida» que como «morada», porque «morada» suena demasiado neutra y humana en español. Además, «en silbido» es comprensible pero menos idiomático que «en objeto de silbidos» o «en silbido burlón»; dado que el inglés POB mantuvo la literalidad principal, puede conservarse «silbido» si la nota aclara el matiz.'
  spanish_quality_summary: 'El texto es legible y digno, pero «morada de chacales» suena algo plano y menos natural en un contexto de desolación profética; «guarida de chacales» comunica mejor la imagen. También conviene pulir la nota b: menciona «versiones inglesas antiguas», cuando la cuestión documentada es una tradición de versiones antiguas/inglesas más antiguas; en español es preferible no centrar la nota en el inglés de manera tan marcada. El resto del verso fluye bien y mantiene un registro bíblico moderno.'
  glossary_alignment: No hay conflictos con la terminología troncal del proyecto. «Babilonia», «chacales» y la ausencia de habitante están alineados con la auditoría. La principal mejora léxica es reemplazar «morada» por «guarida» para reflejar mejor el valor contextual de מְעוֹן como lugar ocupado por animales salvajes en una ciudad arruinada.
  issues:
  - severity: medium
    issue: «morada de chacales» debilita el matiz contextual de מְעוֹן
    rationale: Aunque מְעוֹן puede significar habitación o morada, en este contexto de animales salvajes ocupando ruinas la auditoría inglesa justificó «haunt». En español, «guarida» transmite mejor esa ocupación animal y el tono ominoso sin sobreinterpretar.
  - severity: low
    issue: La nota b está formulada de manera demasiado anglocéntrica
    rationale: Decir «en versiones inglesas antiguas» no es ideal en una edición española. Basta con señalar la alternativa tradicional «dragones» y explicar por qué aquí se prefiere «chacales».
  - severity: low
    issue: «en silbido» es algo rígido en español
    rationale: No es incorrecto, pero suena menos idiomático. Se puede conservar por cercanía al original y a la auditoría inglesa, siempre que la nota explique que se trata de un silbido de burla/escarnio.
  revised_spanish_text: Y Babilonia se convertirá en montones[a], en guarida de chacales, en horror y en silbido[c], sin habitante.
  revised_footnotes:
  - marker: a
    text: O «montones de ruinas»; el hebreo está en plural.
    reason: lexical_alternative
  - marker: b
    text: O «dragones» en traducciones antiguas; aquí el término hebreo probablemente se refiere a chacales en un contexto de desolación.
    reason: lexical_alternative
  - marker: c
    text: O «silbido burlón», es decir, un objeto de escarnio.
    reason: lexical_alternative
  revision_rationale: 'Se cambió «morada» por «guarida» para reflejar mejor la imagen de animales salvajes habitando una ciudad devastada. Se mantuvo el plural «montones» conforme al hebreo. Se simplificó el sistema de notas en el texto: la nota sobre «dragones» no necesita anclaje separado en el español revisado, porque la alternativa zoológica ya queda suficientemente tratada en la revisión general; se conserva la nota principal sobre «montones» y la aclaración sobre «silbido».'
