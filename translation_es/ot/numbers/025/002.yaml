review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura general del hebreo: invitación a los sacrificios, comida del pueblo y acto de postración ante los dioses. Sin embargo, el primer verbo está mal orientado: וַתִּקְרֶאןָ tiene sujeto femenino plural y objeto ''al pueblo'', por lo que debe ser ''invitaron al pueblo'', no ''las invitaron''. Ese error altera el sentido básico del versículo. El resto refleja adecuadamente לְזִבְחֵי אֱלֹהֵיהֶן, וַיֹּאכַל הָעָם, y וַיִּשְׁתַּחֲווּ לֵאלֹהֵיהֶן.'
  spanish_quality_summary: El español es generalmente claro y eclesialmente legible. 'El pueblo comió y se postró ante sus dioses' suena natural. No obstante, 'Y las invitaron...' es gramaticalmente claro pero contextualmente incorrecto. Además, la nota al pie debe anclarse al verbo de postración, no a 'dioses', porque la alternativa léxica corresponde a וַיִּשְׁתַּחֲווּ.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Dioses' para אֱלֹהֵיהֶן es correcto en este contexto idolátrico. 'Se postraron' preserva bien la decisión POB de mantener el acto físico en vez de interpretar directamente como 'adoraron'.
  issues:
  - severity: high
    issue: Objeto incorrecto en 'las invitaron'
    rationale: El hebreo לָעָם significa 'al pueblo'. El borrador cambia el referente y dice 'las invitaron', lo que invierte quién recibe la invitación.
  - severity: medium
    issue: Concordancia narrativa menos natural en español con 'el pueblo comió y se postró'
    rationale: Es aceptable por el singular colectivo, pero en español bíblico moderno también puede sonar más natural 'el pueblo comió y se postró'. No requiere cambio adicional; solo se mantiene por fidelidad y fluidez.
  - severity: medium
    issue: Anclaje incorrecto de la nota léxica
    rationale: La nota sobre 'adoraron' explica el verbo וַיִּשְׁתַּחֲווּ, no 'sus dioses'. El marcador debe ir junto al verbo correspondiente en el texto español.
  revised_spanish_text: Y ellas invitaron al pueblo a los sacrificios de sus dioses, y el pueblo comió y se postró[a] ante sus dioses.
  revised_footnotes:
  - marker: a
    text: 'O: "adoró a sus dioses". El verbo hebreo se refiere literalmente a postrarse, a menudo como acto de culto.'
    reason: lexical_alternative
  revision_rationale: Se corrige el sentido del primer verbo para reflejar que las mujeres invitaron al pueblo, no que alguien invitó a unas mujeres. También se mueve la nota al verbo 'se postró' para que el anclaje coincida con la alternativa léxica documentada en el POB inglés. No se requiere adjudicación adicional porque la corrección es directa desde el hebreo y el rastro de auditoría inglés.
