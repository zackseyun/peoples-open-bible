  spanish_quality_summary: 'El español es mayormente claro, digno y fiel. «De cerviz dura» y «destierro» son opciones eclesialmente legibles. La única reparación necesaria es de gramática y fluidez: «porque son un pueblo de cerviz dura». Además, la nota al pie debe anclarse a la frase idiomática del corazón, no a «escucharían», ya que esa es la unidad léxica que la nota explica.'
