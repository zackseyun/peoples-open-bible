- from: Porque el rey confía en Yahvé[a], y por la fidelidad constante del Altísimo no será sacudido[b].
  to: Porque el rey confía en Yahvé, y por el amor fiel[a] del Altísimo no será sacudido[b].
  rationale: La revisión corrige el anclaje de las notas para que coincidan con las palabras que explican y ajusta חֶסֶד en el texto principal a «amor fiel», una opción más natural en español y más cercana al equilibrio semántico de «steadfast love» con posibilidad de matiz pactual mantenida en la nota. Se conserva «Yahvé», «Altísimo» y «no será sacudido», que son fieles al hebreo y al criterio del proyecto.
