translation:
  language: es
  text: Bendito será tu canasto y tu artesa para amasar[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «recipiente para amasar». El término hebreo se refiere a un recipiente usado en la preparación de la masa.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּרוּךְ
  english_pob_choice: Blessed shall be
  chosen_spanish: Bendito será
  alternatives_spanish:
  - Bendito es
  - Que sea bendito
  lexicon: HALOT
  rationale: El participio pasivo se usa aquí en una fórmula de bendición declarativa. En español, «será» comunica bien el valor futuro-declarativo de la promesa sin convertirla en deseo o mandato.
- source_word: טַנְאֲךָ
  english_pob_choice: your basket
  chosen_spanish: tu canasto
  alternatives_spanish:
  - tu cesta
  - tu canasta
  - tu cesta de fruta
  lexicon: HALOT
  rationale: El término hebreo designa un recipiente de carga, especialmente para productos. «Canasto» es natural en español y conserva la referencia general sin añadir una especificidad no expresada en el hebreo.
- source_word: וּמִשְׁאַרְתֶּךָ
  english_pob_choice: and your kneading bowl
  chosen_spanish: y tu artesa para amasar
  alternatives_spanish:
  - y tu artesa
  - y tu recipiente para amasar
  - y tu recipiente para la masa
  lexicon: HALOT
  rationale: El sustantivo hebreo se refiere a un recipiente asociado con preparar masa. «Artesa para amasar» mantiene el sentido funcional y evita una imagen demasiado genérica; también recoge la alternativa tradicional de «kneading trough» que el inglés audita documenta.
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el texto hebreo masorético citado y con la traducción inglesa auditada; no se registran revisiones aplicadas ni divergencias textuales relevantes.
  spanish_consistency_notes:
  - Se mantiene «Bendito será» para conservar el valor declarativo de la fórmula de bendición.
  - Se eligió «canasto» como equivalente neutro de un recipiente de carga, sin especificar material.
  - Se optó por «artesa para amasar» para reflejar el uso doméstico del recipiente y preservar la alternativa léxica documentada en la auditoría inglesa.
