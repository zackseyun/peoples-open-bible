review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del hebreo: confesión de pecado, habla contra Yahvé y contra Moisés, petición de intercesión y oración de Moisés por el pueblo. También mantiene correctamente «Yahvé» para יְהוָה y conserva el singular «la serpiente». Sin embargo, hay un problema de naturalidad y precisión idiomática en «quite de nosotros la serpiente», que suena poco español en este contexto y no expresa tan bien la idea de apartar de encima del pueblo la plaga/amenaza.'
  spanish_quality_summary: El texto es claro y digno, pero necesita una reparación menor para sonar natural en español bíblico contemporáneo. «Entonces el pueblo fue a Moisés» es aceptable, aunque «vino a Moisés» también sería posible; no requiere cambio. La principal dificultad es «de nosotros[a]», construcción extraña con «quitar» + objeto animado/plaga. Además, la nota al pie actualmente repite exactamente la lectura principal («O «la serpiente»»), por lo que no aporta la alternativa real documentada.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יְהוָה → «Yahvé» correctamente; lenguaje de oración e intercesión bien manejado; נָחָשׁ → «serpiente» preserva el singular formal del hebreo y coincide con la revisión inglesa. No hay conflictos doctrinales relevantes.'
  issues:
  - severity: medium
    issue: «para que quite de nosotros la serpiente» suena antinatural en español
    rationale: Aunque intenta reflejar מֵעָלֵינוּ, en español idiomático se expresa mejor como «quite de encima de nosotros» o «aparte de nosotros». La forma actual es comprensible pero torpe y menos fiel al sentido de remover una aflicción que está sobre el pueblo.
  - severity: medium
    issue: La nota al pie no ofrece una alternativa real
    rationale: 'El texto principal ya dice «la serpiente», y la nota dice «O «la serpiente»». Debe preservar la observación útil del inglés: singular hebreo con posible valor colectivo, no repetir la misma forma sin contraste.'
  - severity: low
    issue: Anclaje de nota en una frase poco adecuada
    rationale: El marcador está colocado en «nosotros», pero la nota trata sobre «la serpiente» como singular/colectivo. El anclaje debe moverse al sustantivo pertinente.
  revised_spanish_text: 'Entonces el pueblo fue a Moisés y dijo: «Hemos pecado, porque hemos hablado contra Yahvé y contra ti. Ruega a Yahvé, para que quite de encima de nosotros la serpiente[a]». Y Moisés oró por el pueblo.'
  revised_footnotes:
