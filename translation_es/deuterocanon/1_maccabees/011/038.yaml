translation:
  language: es
  text: Y vio el rey Demetrio que la tierra estaba quieta delante de él y que nada se le oponía; por eso despidió todas sus fuerzas, cada una a su lugar, excepto las fuerzas extranjeras[a] que había reclutado de las islas de las naciones; y todas las fuerzas de sus padres[b] se le volvieron hostiles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «fuerzas mercenarias». El griego ξένων δυνάμεων designa tropas extranjeras y puede implicar soldados contratados.'
    reason: lexical_alternative
  - marker: b
    text: La expresión «las fuerzas de sus padres» probablemente se refiere a las tropas tradicionales heredadas del dominio de sus antepasados, en contraste con las tropas extranjeras que conservó.
    reason: cultural_note
lexical_decisions:
- source_word: ἰδεν / saw
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - miró
  - observó
  lexicon: LSJ
  rationale: El verbo simple de percepción visual comunica bien el inicio narrativo sin añadir matiz interpretativo.
- source_word: ἡσύχασεν
  english_pob_choice: was quiet
  chosen_spanish: estaba quieta
  alternatives_spanish:
  - estaba en paz
  - había quedado tranquila
  lexicon: LSJ
  rationale: En el contexto político-militar, 'quieta' refleja reposo o ausencia de agitación sin afirmar una paz plena.
- source_word: ἡ γῆ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - el territorio
  lexicon: LSJ
  rationale: '''La tierra'' conserva la amplitud del griego para el ámbito sometido al rey, sin restringirlo demasiado a una unidad política moderna.'
- source_word: ἐνώπιον αὐτοῦ
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - en su presencia
  - ante él
  lexicon: LSJ
  rationale: '''Delante de él'' mantiene la idea espacial e idiomática de estar en relación directa con su autoridad.'
- source_word: οὐθὲν αὐτῷ ἀνθεστήκει
  english_pob_choice: nothing opposed him
  chosen_spanish: nada se le oponía
  alternatives_spanish:
  - nada resistía contra él
  - nada se le enfrentaba
  lexicon: LSJ
  rationale: La forma española impersonal conserva la ausencia continuada de oposición con un giro natural en castellano.
- source_word: ἀπέλυσεν
  english_pob_choice: dismissed
  chosen_spanish: despidió
  alternatives_spanish:
  - disolvió
  - desmovilizó
  lexicon: LSJ
  rationale: En contexto militar, 'despidió' expresa que los envió fuera del servicio o los dejó ir, sin forzar un tecnicismo moderno.
- source_word: πάσας τὰς δυνάμεις αὐτοῦ
  english_pob_choice: all his forces
  chosen_spanish: todas sus fuerzas
  alternatives_spanish:
  - todas sus tropas
  - todos sus ejércitos
  lexicon: LSJ
  rationale: '''Fuerzas'' preserva el valor colectivo militar amplio de δυνάμεις y deja abierta la composición concreta de los contingentes.'
- source_word: ἕκαστον εἰς τὸν ἴδιον τόπον
  english_pob_choice: each to his own place
  chosen_spanish: cada una a su propio lugar
  alternatives_spanish:
  - cada uno a su propio lugar
  - cada cual a su lugar
  lexicon: LSJ
  rationale: Se mantiene la distribución individual de los contingentes; 'cada una' concuerda con 'fuerzas' en español y evita una masculinización innecesaria.
- source_word: ξένων δυνάμεων
  english_pob_choice: foreign forces
  chosen_spanish: fuerzas extranjeras
  alternatives_spanish:
  - tropas extranjeras
  - fuerzas mercenarias
  lexicon: LSJ
  rationale: '''Extranjeras'' reproduce ξένος de modo directo; la posible idea de mercenarios queda sin imponerla en el texto principal.'
- source_word: ἐξενολόγησεν
  english_pob_choice: had recruited
  chosen_spanish: había reclutado
  alternatives_spanish:
  - había enlistado
  - había alistado
  lexicon: LSJ
  rationale: '''Reclutado'' expresa la incorporación de extranjeros al ejército y se ajusta al valor verbal sin sobreespecificar el modo de contratación.'
- source_word: ἀπὸ τῶν νήσων τῶν ἐθνῶν
  english_pob_choice: from the islands of the nations
  chosen_spanish: de las islas de las naciones
  alternatives_spanish:
  - de las islas de los pueblos
  - de las islas de los gentiles
  lexicon: LSJ
  rationale: La traducción sigue de cerca la estructura del griego y preserva 'naciones' como equivalente de ἐθνῶν en este relato histórico.
- source_word: ἠχθρασαν αὐτῷ
  english_pob_choice: became hostile to him
  chosen_spanish: se volvieron hostiles a él
  alternatives_spanish:
  - se le volvieron enemigas
  - pasaron a ser sus enemigas
  lexicon: LSJ
  rationale: El giro reflexivo comunica el cambio de disposición que sugiere el verbo, más que una simple hostilidad estática.
- source_word: πᾶσαι αἱ δυνάμεις αἱ ἀπὸ τῶν πατέρων
  english_pob_choice: all the forces from his fathers
  chosen_spanish: todas las fuerzas de sus padres
  alternatives_spanish:
  - todas las fuerzas heredadas de sus padres
  - todas las fuerzas de sus antepasados
  lexicon: LSJ
  rationale: Se conserva la expresión breve del griego. En español, 'de sus padres' mantiene la referencia dinástica heredada, sin ampliar innecesariamente a 'antepasados'.
translation_notes:
  revision_awareness: Se siguió de cerca el texto griego de Swete y el audit trail inglés, manteniendo la estructura narrativa, el contraste entre fuerzas extranjeras y las de origen dinástico, y la ambigüedad controlada de ξένων δυνάμεων sin imponer 'mercenarios' en el cuerpo principal.
  spanish_consistency_notes:
  - Se usó 'Yahvé' no por aplicar aquí, sino porque no aparece el tetragrámaton en este versículo.
  - '''Fuerzas'' se mantuvo para δυνάμεις en ambas ocurrencias para conservar la red militar del pasaje.'
  - '''Naciones'' se preservó en ''islas de las naciones'' siguiendo el audit trail inglés y el griego literal.'
  - La última cláusula se tradujo de manera breve como 'de sus padres', coherente con la revisión inglesa más cercana al griego.
