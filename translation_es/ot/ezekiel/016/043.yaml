translation:
  language: es
  text: Porque no recordaste los días de tu juventud, sino que me enfureciste con todas estas cosas, yo también he hecho recaer tu conducta sobre tu cabeza, declara el Señor Yahvé; ¿no has cometido inmoralidad[a] además de todas tus abominaciones?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y no cometiste inmoralidad además de todas tus abominaciones». El hebreo de la cláusula final es difícil, y algunos lo entienden como que la lascivia de Jerusalén fue cometida junto con, o además de, todas sus abominaciones.'
    reason: alternative_reading
lexical_decisions:
- source_word: יַעַן אֲשֶׁר
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Ya que
  - Puesto que
  lexicon: HALOT
  rationale: Introduce la base causal del juicio. «Porque» es natural en español moderno y conserva el valor causal sin añadir matiz interpretativo extra.
- source_word: לֹא זכרתי
  english_pob_choice: you did not remember
  chosen_spanish: no recordaste
  alternatives_spanish:
  - no te acordaste
  - no tuviste presente
  lexicon: HALOT
  rationale: El contexto exige segunda femenina singular dirigida a Jerusalén. «Recordar» en español puede sonar algo más abstracto; «recordaste» mantiene la memoria moral/covenantal del texto.
- source_word: יְמֵי נְעוּרַיִךְ
  english_pob_choice: the days of your youth
  chosen_spanish: los días de tu juventud
  alternatives_spanish:
  - los días de tu adolescencia
  - tus días juveniles
  lexicon: HALOT
  rationale: Es una expresión idiomática clara y transparente en español. Conserva la referencia a la condición temprana de Jerusalén sin explicar de más.
- source_word: וַתִּרְגְּזִי לִי
  english_pob_choice: but enraged me
  chosen_spanish: sino que me enfureciste
  alternatives_spanish:
  - y me provocaste
  - y me irritaste
  lexicon: HALOT
  rationale: רגז aquí comunica provocación intensa contra Dios. «Me enfureciste» preserva la fuerza afectiva que el inglés POB destacó con «enraged me».
- source_word: בְּכָל אֵלֶּה
  english_pob_choice: with all these things
  chosen_spanish: con todas estas cosas
  alternatives_spanish:
  - por todas estas cosas
  - mediante todas estas cosas
  lexicon: HALOT
  rationale: El beth instrumental se expresa naturalmente con «con» en español. «Estas cosas» remite a las acciones ya enumeradas en el contexto.
- source_word: וְגַם אֲנִי הֵא
  english_pob_choice: I also
  chosen_spanish: yo también
  alternatives_spanish:
  - así que yo también
  - yo asimismo
  lexicon: HALOT
  rationale: La partícula enfática se integra de forma sobria en español. No se traduce «he aquí» porque en este contexto funcionaría como calco innecesario y el valor de respuesta enfática ya queda expresado.
- source_word: דַּרְכֵּךְ בְּרֹאשׁ נָתַתִּי
  english_pob_choice: have put your way on your head
  chosen_spanish: he puesto tu camino sobre tu cabeza
  alternatives_spanish:
  - he puesto tu conducta sobre tu cabeza
  - he hecho recaer tu camino sobre tu cabeza
  lexicon: HALOT
  rationale: Mantiene la imagen judicial de retribución. «Camino» conserva el singular hebreo y su carga ética; «sobre tu cabeza» reproduce la metáfora de responsabilidad que recae sobre la persona.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  english_pob_choice: declares the Lord GOD
  chosen_spanish: dice Yahvé, el Señor
  alternatives_spanish:
  - declara el Señor Yahvé
  - oráculo de Yahvé, el Señor
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el nombre divino: יְהוָה → «Yahvé». Como אֲדֹנָי precede al Tetragrámaton, se refleja la combinación reverencial con «el Señor». «Dice» reproduce la fórmula profética נְאֻם de modo natural en español.'
- source_word: וְלֹא עשיתי
  english_pob_choice: have you not committed
  chosen_spanish: ¿no has cometido
  alternatives_spanish:
  - ¿no hiciste
  - ¿no has hecho
  lexicon: HALOT
  rationale: La tradición textual y el contexto favorecen una segunda femenina singular interpelativa. «Cometido» se ajusta mejor al complemento ético-sexual que un simple «hecho».
- source_word: הַזִּמָּה
  english_pob_choice: lewdness
  chosen_spanish: inmoralidad
  alternatives_spanish:
  - desenfreno sexual
  - lascivia
  - lewdness
  lexicon: HALOT
  rationale: El término hebreo es sexual-moralmente fuerte, pero «inmoralidad» ofrece en español una equivalencia pública más natural y comprensible, sin perder el reproche ético. Se evita suavizar el sentido con una palabra demasiado genérica como «maldad».
- source_word: עַל כָּל תּוֹעֲבֹתָיִךְ
  english_pob_choice: in addition to all your abominations
  chosen_spanish: además de todas tus abominaciones
  alternatives_spanish:
  - junto con todas tus abominaciones
  - por encima de todas tus abominaciones
  lexicon: HALOT
  rationale: La cláusula final es difícil y el inglés POB preserva la ambigüedad. «Además de» mantiene el sentido aditivo que el audit trail considera probable, sin resolver en exceso la tensión del hebreo.
theological_decisions:
- issue: Tratamiento del nombre divino en la fórmula profética אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: Yahvé, el Señor
  alternative_spanish_readings:
  - el Señor Yahvé
  - el Señor Dios
  rationale: El proyecto requiere traducir יְהוָה como «Yahvé» en el texto principal. La combinación con אֲדֹנָי se expresa de manera reverente y legible como «el Señor», manteniendo la distinción sin enmascarar el nombre propio divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: 'La redacción refleja la revisión más reciente del audit trail: se eliminó el equivalente innecesario de «therefore»/«por tanto» en la cláusula central, y se adoptó la lectura interrogativa final («¿no has cometido…?») en lugar de una coordinación simple. También se preserva la tensión textual de la última frase sin resolverla excesivamente.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - «Camino» traduce דַּרְכֵּךְ para conservar la metáfora judicial singular.
  - La cláusula final conserva la ambigüedad aditiva/interrogativa señalada por el audit trail mediante nota textual.
  - «Inmoralidad» se usa aquí como equivalente funcional de הַזִּמָּה en un contexto sexual-moral, sin diluir el reproche.
