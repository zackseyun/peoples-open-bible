translation:
  language: es
  text: Porque tú eres el Señor Altísimo[a], compasivo, paciente y abundante en misericordia[b], y que desiste[c] respecto de las maldades de los hombres[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el Altísimo»; el título griego expresa una designación divina estable.
    reason: lexical_alternative
  - marker: b
    text: O «misericordioso en gran manera»; el griego intensifica la abundancia de misericordia.
    reason: lexical_alternative
  - marker: c
    text: O «se vuelve atrás» o «cede» respecto de las maldades de los hombres; el griego puede expresar el apartarse del juicio, no un arrepentimiento moral.
    reason: lexical_alternative
  - marker: d
    text: «Los hombres» aquí representa a los seres humanos en general.
    reason: lexical_alternative
lexical_decisions:
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: Aquí κύριος funciona como título divino; en español, «Señor» es el equivalente natural y reverente, y no requiere sustitución por una perífrasis.
- source_word: ὕψιστος
  english_pob_choice: Most High
  chosen_spanish: Altísimo
  alternatives_spanish:
  - el Más Alto
  - Sumo
  lexicon: LSJ
  rationale: «Altísimo» es el equivalente idiomático normal en español para el título divino y conserva la fuerza superlativa del griego.
- source_word: εὔσπλαγχνος
  english_pob_choice: compassionate
  chosen_spanish: compasivo
  alternatives_spanish:
  - misericordioso
  - tierno de corazón
  lexicon: LSJ
  rationale: El término expresa profunda compasión; «compasivo» es claro, natural y evita duplicar innecesariamente la idea que luego aparece con misericordia.
- source_word: μακρόθυμος
  english_pob_choice: patient
  chosen_spanish: paciente
  alternatives_spanish:
  - longánimo
  - tardo para la ira
  lexicon: LSJ
  rationale: «Paciente» reproduce bien la idea de longanimidad o forbearance en español moderno, sin volverse demasiado explicativo.
- source_word: πολυέλεος
  english_pob_choice: abounding in mercy
  chosen_spanish: abundante en misericordia
  alternatives_spanish:
  - rico en misericordia
  - lleno de misericordia
  lexicon: LSJ
  rationale: La frase compuesta intensifica la misericordia divina; «abundante en misericordia» preserva esa abundancia de manera natural en español.
- source_word: μετανοῶν
  english_pob_choice: relenting
  chosen_spanish: que se arrepiente
  alternatives_spanish:
  - que se vuelve atrás
  - que se apiada
  lexicon: LSJ
  rationale: El griego predicado de Dios con ἐπὶ κακίαις ἀνθρώπων expresa un cambio respecto del juicio. En español, «se arrepiente» aquí puede leerse como «se vuelve atrás» o «cede»; aun así, deja una tensión terminológica que conviene anotar, porque evita un giro demasiado interpretativo y mantiene la cercanía verbal del original.
- source_word: ἐπὶ κακίαις ἀνθρώπων
  english_pob_choice: concerning the evils of men
  chosen_spanish: de las maldades de los hombres
  alternatives_spanish:
  - ante las maldades de los hombres
  - a causa de las maldades de los hombres
  - respecto de las maldades de los hombres
  lexicon: LSJ
  rationale: La preposición y el dativo señalan la esfera o motivo del cambio divino. «De las maldades de los hombres» conserva la relación estrecha con el sustantivo y suena natural en español; «hombres» sigue el genérico representativo del griego.
theological_decisions:
- issue: Renderizar μετανοῶν de Dios sin borrar la tensión teológica
  english_pob_reading: relenting concerning the evils of men
  chosen_spanish_reading: que se arrepiente de las maldades de los hombres
  alternative_spanish_readings:
  - que se vuelve atrás de las maldades de los hombres
  - que cede ante las maldades de los hombres
  rationale: El sentido del texto no es arrepentimiento moral de Dios, sino un cambio en su obrar respecto del juicio. Sin embargo, el español «se arrepiente» puede sostener esa tensión si se lee en clave de revocación o desistimiento; por eso se conserva con nota en vez de neutralizarla por completo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Cómo reflejar ἀνθρώπων en español
  english_pob_reading: men
  chosen_spanish_reading: los hombres
  alternative_spanish_readings:
  - las personas
  - la humanidad
  rationale: Se mantiene el valor representativo masculino del griego, tal como hace la POB en inglés, sin negar que se refiere a la humanidad en general. La nota aclara esa inclusión para el lector moderno.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió «concerning» frente a «over» para ἐπὶ, y se optó por una construcción española que mantenga esa relación sin perder fluidez. También se preservó la tensión teológica de μετανοῶν, evitando una paráfrasis que la disolviera.
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος como título divino, en línea con el tratamiento establecido para la divinidad en español.
  - Se mantiene el genérico masculino «hombres» por fidelidad al griego ἀνθρώπων, con aclaración implícita en la nota.
  - «Compasivo», «paciente» y «abundante en misericordia» forman una serie adjetival natural en español y no alteran la acumulación retórica del original.
  - La colocación de la nota sobre μετανοῶν en el verbo evita confundir el lector sobre el sujeto y conserva la ambigüedad controlada del texto griego.
