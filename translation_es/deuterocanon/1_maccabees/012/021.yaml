  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Las decisiones clave están mayormente alineadas: ''Se halló'', ''en un escrito'', ''hermanos''. La principal excepción es ἐκ γένους Ἀβραάμ, donde ''familia'' no refleja tan bien el valor de linaje/descendencia documentado en el POB inglés. También conviene explicitar el valor emparejador de τε ... καί con ''tanto ... como ...''.'
