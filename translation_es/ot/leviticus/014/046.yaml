translation:
  language: es
  text: Y todo el que entre en la casa durante todos los días que esté aislada[a], será inmundo hasta la tarde.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que esté confinada» o «que esté encerrada». El hebreo se refiere a la casa aislada bajo restricción sacerdotal para su inspección.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/הַ/בָּא
  english_pob_choice: And whoever enters
  chosen_spanish: Y cualquiera[a] que entre
  alternatives_spanish:
  - Y quien entre
  - Y todo el que entre
  lexicon: HALOT
  rationale: El participio con artículo funciona de manera sustantiva y general; en español, "cualquiera que entre" conserva bien el valor jurídico-genericidad del hebreo sin sonar artificial. Se mantiene la coordinación inicial con "Y".
- source_word: אֶל הַ/בַּ֔יִת
  english_pob_choice: the house
  chosen_spanish: en la casa
  alternatives_spanish:
  - a la casa
  - dentro de la casa
  lexicon: HALOT
  rationale: Con בוא + אֶל, la idea es de entrada al interior; en español, "entre en la casa" ya incorpora ese movimiento, por lo que no hace falta repetir una preposición adicional en la redacción principal.
- source_word: כָּל יְמֵי
  english_pob_choice: during all the days
  chosen_spanish: durante todos los días
  alternatives_spanish:
  - durante todos los días de
  - a lo largo de todos los días
  lexicon: HALOT
  rationale: La frase marca toda la duración del periodo de restricción. "Durante todos los días" conserva esa extensión temporal con naturalidad en español.
- source_word: הִסְגִּיר אֹתוֹ
  english_pob_choice: that it is quarantined
  chosen_spanish: que esté aislada
  alternatives_spanish:
  - que esté confinada
  - que esté encerrada
  lexicon: HALOT
  rationale: En Levítico 13–14, סגר en este contexto ritual expresa aislamiento para inspección. "Aislada" comunica el sentido legal-ritual sin cargar innecesariamente un matiz médico moderno; se preserva la ambigüedad documentada entre "shut up", "confined" y el sentido de cuarentena.
- source_word: יִטְמָא
  english_pob_choice: shall be unclean
  chosen_spanish: será inmundo
  alternatives_spanish:
  - quedará inmundo
  - será impuro
  lexicon: HALOT
  rationale: El verbo expresa el estado de impureza ritual resultante. "Inmundo" conserva el registro bíblico-legal y la fuerza terminológica de la categoría cultual; "impuro" es una alternativa moderna posible, pero menos tradicional en este contexto.
- source_word: עַד הָעָרֶב
  english_pob_choice: until the evening
  chosen_spanish: hasta la tarde
  alternatives_spanish:
  - hasta el atardecer
  - hasta la noche
  lexicon: HALOT
  rationale: El hebreo usa el valor temporal habitual de fin del día. "Hasta la tarde" es claro y bíblicamente sobrio en español; "atardecer" podría sugerir un momento más específico que el hebreo no exige.
theological_decisions:
- issue: Impureza ritual de entrada durante el aislamiento de la casa
  english_pob_reading: shall be unclean until the evening
  chosen_spanish_reading: será inmundo hasta la tarde
  alternative_spanish_readings:
  - quedará inmundo hasta la tarde
  - será impuro hasta la tarde
  rationale: Se mantiene la categoría de impureza ritual como estado legal, no como suciedad moral. "Inmundo" preserva la terminología cultual del pasaje y la continuidad con Levítico 13–14.
  doctrine_reference: Levítico 13–14; pureza ritual levítica
- issue: Aislamiento de la casa bajo restricción sacerdotal
  english_pob_reading: that it is quarantined ... The Hebrew refers to the house being isolated under priestly restriction for inspection.
  chosen_spanish_reading: que esté aislada
  alternative_spanish_readings:
  - que esté confinada
  - que esté bajo cuarentena
  rationale: La nota inglesa distingue el aislamiento ritual de la cuarentena médica moderna. "Aislada" conserva esa precisión y evita importar un marco clínico ajeno al texto.
  doctrine_reference: Levítico 14:38-47; restricción sacerdotal y examen ritual
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios y el cotejo interno mostró alta concordancia; por eso se conserva la estructura legal del versículo y solo se ajusta a un español natural, manteniendo la tensión lexical entre aislamiento ritual y el posible eco de "cerrada/confinada".
  spanish_consistency_notes:
  - Se mantiene "inmundo" como término técnico de impureza ritual, coherente con Levítico.
  - Se usa "Yahvé" en esta sección solo cuando el texto lo requiera explícitamente; aquí no aparece el tetragrámaton.
  - '"Aislada" traduce el contexto de restricción ritual sin convertirlo en una cuarentena médica moderna.'
