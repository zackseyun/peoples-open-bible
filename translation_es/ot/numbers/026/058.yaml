    rationale: El hebreo señala subdivisiones de parentesco dentro de la tribu. El POB inglés eligió 'clans' precisamente para evitar el sentido moderno de familia nuclear. En español, 'clanes' es claro y más exacto en este contexto.
  - severity: low
    issue: La nota al pie queda en tensión con el texto principal
    rationale: El texto principal usa 'familias', mientras la nota presenta 'clanes' como alternativa más precisa. Si el término más fiel puede funcionar naturalmente en español, debe ir en el texto principal y dejar las alternativas en la nota.
  - severity: low
    issue: La coordinación de la lista puede ajustarse mejor al patrón repetitivo del hebreo
    rationale: El hebreo repite 'la clan de...' cinco veces. En español se puede mantener esa repetición sin dificultad para reflejar mejor la forma enumerativa del original.
