revisions:
- from: Todo lugar que pise la planta de su pie[a] será de ustedes; desde el desierto y el Líbano, desde el río, el río Éufrates, hasta el mar occidental, será su límite.
  to: Todo lugar donde pise la planta de sus pies será de ustedes; desde el desierto y el Líbano, desde el río, el río Éufrates, hasta el mar occidental[a], será su límite.
  rationale: Se corrige la cláusula inicial para representar con fidelidad y naturalidad la expresión hebrea sobre «la planta del pie», se armoniza mejor la segunda persona plural y se traslada la nota al punto textual que realmente comenta. No se requieren cambios doctrinales ni de fondo.
