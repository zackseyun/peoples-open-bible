translation:
  language: es
  text: Pero el hombre que actúa con presunción[a], al no escuchar[b] al sacerdote que está allí para ministrar ante Yahvé tu Dios, o al juez, ese hombre morirá. Así purgarás el mal de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «actúa en presunción»; también puede entenderse como «actúa con arrogancia» o «actúa deliberadamente». La expresión denota una negativa deliberada y desafiante, no una falla accidental.'
    reason: lexical_alternative
  - marker: b
    text: O «al no obedecer». El hebreo «escuchar» a menudo lleva el sentido de prestar atención obediente en contextos legales.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָאִישׁ
  english_pob_choice: But the man
  chosen_spanish: Pero el hombre
  alternatives_spanish:
  - Y el hombre
  - Ahora bien, el hombre
  lexicon: HALOT
  rationale: La waw inicial continúa la instrucción legal previa, con un matiz adversativo o de contraste que en español se expresa bien con «Pero». אִישׁ es singular masculino e individual; «el hombre» conserva ese valor sin suavizarlo indebidamente.
- source_word: יַעֲשֶׂה בְזָדוֹן
  english_pob_choice: acts presumptuously
  chosen_spanish: actúa con presunción
  alternatives_spanish:
  - actúa con arrogancia
  - actúa con insolencia
  - actúa voluntariamente
  lexicon: HALOT
  rationale: La expresión hebrea indica una acción deliberada y desafiante, no un simple error. «Con presunción» mantiene la fuerza moral y legal del acto, y en español resulta más natural que una calca rígida.
- source_word: לְבִלְתִּי שְׁמֹעַ
  english_pob_choice: by not listening
  chosen_spanish: al no escuchar
  alternatives_spanish:
  - por no escuchar
  - al desobedecer
  - negándose a escuchar
  lexicon: HALOT
  rationale: שׁמע conserva el sentido básico de «oír/escuchar», aunque en contextos legales implica rehusar obedecer. «Al no escuchar» respeta la forma verbal y deja visible la tensión entre escuchar y obedecer.
- source_word: אֶל הַכֹּהֵן
  english_pob_choice: to the priest
  chosen_spanish: al sacerdote
  alternatives_spanish:
  - al sacerdote oficial
  - al sacerdote
  lexicon: HALOT
  rationale: כֹּהֵן se traduce aquí naturalmente como «sacerdote». En español moderno y eclesial amplio, «sacerdote» comunica mejor la función cultual que una transliteración o expansión innecesaria.
- source_word: הָעֹמֵד לְשָׁרֶת שָׁם
  english_pob_choice: who stands there to minister
  chosen_spanish: que está allí para ministrar
  alternatives_spanish:
  - que se encuentra allí para servir
  - que está allí sirviendo
  lexicon: HALOT
  rationale: El participio con infinitivo expresa la función oficial del sacerdote en el lugar santo. «Ministrar» preserva el matiz cultual de שׁרת mejor que «servir» sin perder claridad en español.
- source_word: אֶת יְהוָה אֱלֹהֶיךָ
  english_pob_choice: before Yahweh your God
  chosen_spanish: ante Yahvé tu Dios[a]
  alternatives_spanish:
  - delante de Yahvé tu Dios
  - ante Yahvé, tu Dios
  lexicon: HALOT
  rationale: La combinación con שׁרת en contexto sacerdotal se expresa idiomáticamente como servicio «ante» la presencia divina. Se conserva «Yahvé» por la política editorial del POB para el Tetragrámaton, y «tu Dios» mantiene el valor de pacto del hebreo.
- source_word: אֶל הַשֹּׁפֵט
  english_pob_choice: or to the judge
  chosen_spanish: o al juez
  alternatives_spanish:
  - o ante el juez
  - o al magistrado
  lexicon: HALOT
  rationale: שֹׁפֵט designa la autoridad judicial en el procedimiento. «Juez» es la equivalencia directa y más clara en español.
- source_word: וּמֵת הָאִישׁ הַהוּא
  english_pob_choice: that man shall die
  chosen_spanish: ese hombre morirá
  alternatives_spanish:
  - aquel hombre morirá
  - ese mismo hombre morirá
  - debe morir ese hombre
  lexicon: HALOT
  rationale: La construcción legal hebrea expresa consecuencia penal. En español, «morirá» transmite la pena sin añadir modalización; «ese hombre» reproduce el demostrativo enfático de הַהוּא.
- source_word: וּבִעַרְתָּ הָרָע
  english_pob_choice: So you shall purge the evil
  chosen_spanish: Así purgarás el mal
  alternatives_spanish:
  - Y purgarás el mal
  - Así eliminarás el mal
  - Y quitarás el mal
  lexicon: HALOT
  rationale: בער en esta fórmula deuteronómica alude a remover o purgar el mal de la comunidad. «Purgarás» conserva el peso jurídico-ritual de la fórmula mejor que «eliminarás», y «Así» refleja bien el resultado de la cláusula anterior.
- source_word: מִיִּשְׂרָאֵל
  english_pob_choice: from Israel
  chosen_spanish: de Israel
  alternatives_spanish:
  - de entre Israel
  - de en medio de Israel
  lexicon: HALOT
  rationale: El hebreo indica remoción de la comunidad pactal. «De Israel» es breve y natural en español; cuando se requiriera mayor explicitación, «de entre Israel» sería una alternativa válida.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo contiene el Tetragrámaton directamente. Siguiendo la convención del POB en español, se translitera como «Yahvé» para preservar el nombre propio del pacto, en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Fuerza legal de שמע en contexto judicial
  english_pob_reading: by not listening
  chosen_spanish_reading: al no escuchar
  alternative_spanish_readings:
  - por no escuchar
  - al no obedecer
  - rehusando escuchar
  rationale: El hebreo conserva el verbo de oír/escuchar, aunque el contexto legal implica desobediencia. Mantener «escuchar» deja visible esa tensión semántica y evita aplanarla demasiado pronto a «obedecer».
  doctrine_reference: HALOT / contexto legal de Deuteronomio 17:12
- issue: Terminología cultual de שׁרת
  english_pob_reading: to minister
  chosen_spanish_reading: para ministrar
  alternative_spanish_readings:
  - para servir
  - para desempeñar su ministerio
  rationale: En un contexto sacerdotal, «ministrar» comunica mejor la función litúrgica que un «servir» genérico. Conserva el carácter oficial del servicio ante Yahvé.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Registro jurídico de la pena
  english_pob_reading: that man shall die
  chosen_spanish_reading: ese hombre morirá
  alternative_spanish_readings:
  - ese hombre deberá morir
  - morirá ese hombre
  rationale: La secuencia legal hebrea expresa sentencia, no mera posibilidad. «Morirá» es sobrio, directo y compatible con el estilo jurídico de la sección.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas; el contexto de auditoría indica alto acuerdo y sin cambios necesarios en la revisión más reciente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al estándar editorial del proyecto.
  - Se conserva «sacerdote» para כֹּהֵן y «juez» para שֹׁפֵט como términos jurídicos directos.
  - «Ministrar» se usa en sentido cultual, no meramente administrativo.
  - Se evita traducir שמע como «obedecer» en el texto principal para no borrar la tensión lexical entre oír y obedecer.
