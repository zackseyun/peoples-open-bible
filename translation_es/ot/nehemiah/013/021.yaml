translation:
  language: es
  text: 'Así que les advertí y les dije[a]: «¿Por qué pasan la noche frente al muro? Si vuelven a hacerlo, les echaré mano». Desde entonces no volvieron a venir en sábado.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «Si repiten esto, usaré la fuerza contra ustedes». El hebreo dice literalmente: «enviaré una mano contra ustedes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאָעִידָה
  english_pob_choice: I warned
  chosen_spanish: les advertí
  alternatives_spanish:
  - les amonesté
  - di testimonio contra ellos
  lexicon: HALOT
  rationale: El hifil de עוד aquí expresa una advertencia solemne o protesta contra su conducta. «Les advertí» comunica bien la fuerza de corrección sin sonar rígido. «Di testimonio contra ellos» es más literal, pero menos natural en español.
- source_word: וָאֹמְרָה אֲלֵיהֶם
  english_pob_choice: and said to them
  chosen_spanish: y les dije
  alternatives_spanish:
  - y les hablé
  - y dije a ellos
  lexicon: HALOT
  rationale: Es la secuencia narrativa normal. En español, «les dije» resulta más natural que una forma más pesada.
- source_word: מַדּוּעַ
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Con qué motivo
  - ¿A qué viene
  lexicon: HALOT
  rationale: Interrogativo directo y natural en español.
- source_word: לֵנִים
  english_pob_choice: are you spending the night
  chosen_spanish: pasan la noche
  alternatives_spanish:
  - se alojan
  - se quedan a pasar la noche
  lexicon: HALOT
  rationale: El verbo לון/לין significa alojarse o pasar la noche. «Pasan la noche» conserva el sentido y funciona bien en español contemporáneo.
- source_word: נֶגֶד הַחוֹמָה
  english_pob_choice: opposite the wall
  chosen_spanish: opuestos al muro
  alternatives_spanish:
  - frente al muro
  - en frente del muro
  - al otro lado del muro
  lexicon: HALOT
  rationale: נֶגֶד expresa estar enfrente u opuesto. «Opuestos al muro» mantiene la relación espacial sin introducir la idea interpretativa de estar fuera.
- source_word: אִם תִּשְׁנוּ
  english_pob_choice: If you do so again
  chosen_spanish: Si hacen eso otra vez
  alternatives_spanish:
  - Si lo repiten
  - Si vuelven a hacerlo
  lexicon: HALOT
  rationale: El verbo שנה aquí es «repetir, hacer de nuevo». «Hacen eso otra vez» reproduce la repetición implícita de forma clara y natural.
- source_word: יָד אֶשְׁלַח בָּכֶם
  english_pob_choice: I will lay hands on you
  chosen_spanish: echaré mano sobre ustedes
  alternatives_spanish:
  - usaré fuerza contra ustedes
  - levantaré la mano contra ustedes
  - pondré mi mano contra ustedes
  lexicon: HALOT
  rationale: La frase es un modismo de acción o fuerza directa. «Echaré mano sobre ustedes» conserva el matiz idiomático y la amenaza, sin precisar más de lo que permite el hebreo. Se evita una fórmula eclesiástica no requerida por el texto.
- source_word: מִן הָעֵת הַהִיא
  english_pob_choice: From that time on
  chosen_spanish: Desde entonces
  alternatives_spanish:
  - A partir de ese momento
  - Desde aquel tiempo
  lexicon: HALOT
  rationale: Expresión temporal idiomática en español que marca el cambio resultante de la advertencia.
- source_word: לֹא בָאוּ
  english_pob_choice: they did not come
  chosen_spanish: no vinieron
  alternatives_spanish:
  - ya no venían
  - no volvieron
  lexicon: HALOT
  rationale: La negación narrativa se expresa con claridad y concisión en español.
- source_word: בַּשַּׁבָּת
  english_pob_choice: on the Sabbath
  chosen_spanish: en sábado
  alternatives_spanish:
  - en el sábado
  - el día de reposo
  lexicon: HALOT
  rationale: «Sábado» es el equivalente natural y entendible para שַׁבָּת en este contexto. Se prefiere la formulación breve «en sábado».
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB en inglés: se mantiene la precisión de נגד como «opuestos», y el matiz formal de la condición con una frase equivalente a «if you do so again». También se conserva el resultado temporal con «Desde entonces» y la negación narrativa final.'
  spanish_consistency_notes:
  - Se usa «muro» para חוֹמָה, manteniendo el referente arquitectónico de Jerusalén.
  - Se evita «SEÑOR» u otras sustituciones teológicas porque el verso no contiene el Tetragrámaton ni lenguaje divino directo.
  - La nota al pie está anclada exactamente en «les dije[a]» para cumplir la correspondencia entre marcador y texto.
