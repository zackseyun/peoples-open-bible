review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue en gran parte la estructura griega y conserva bien la cláusula identificacional de la segunda mitad. Sin embargo, ὅσιοι se ha vertido como «santos», aunque el rastro léxico del POB prefiere «los santos/holy ones» precisamente para evitar sobretonos eclesiásticos; en español, «santos» carga aún más esos sobretonos y no refleja tan bien el matiz de piadosos/consagrados. Además, la nota [a] está mal formulada porque ofrece como alternativa «los santos» para un texto que ya usa «santos», en vez de anclar la alternativa principal frente a otras posibles. El resto de las decisiones principales—«vivirán», «en él», «para siempre», «paraíso», y el plural «árboles»—sí preservan adecuadamente el sentido de la línea griega dada.
  spanish_quality_summary: El español es claro y natural, pero «los santos del Señor ... son sus santos» suena menos elegante y más eclesiásticamente cargado que «los santos/consagrados del Señor ... son sus santos/consagrados». Para legibilidad y fidelidad conceptual, conviene usar «los santos» en ambos casos, con artículo, o mejor otra solución más marcada por cualidad. Dado el proyecto y la cercanía al inglés POB, «los santos» funciona mejor que el simple sustantivo desnudo inicial, y la nota debe corregirse para no duplicar el término base. La puntuación de la cláusula final es aceptable.
  glossary_alignment: 'Alineación parcial. κύριος -> «Señor» está bien. παράδεισος -> «paraíso» está bien. τὰ ξύλα τῆς ζωῆς -> «los árboles de la vida» respeta correctamente el plural. El principal desajuste es ὅσιοι: el proyecto documenta «holy ones» con alternativas «saints/devout ones», por lo que en español conviene reflejar esa preferencia con «los santos» como base más literal a la decisión inglesa, pero explicando «los piadosos» o «los devotos» como alternativas; la nota actual no lo hace correctamente.'
  issues:
  - severity: medium
    issue: Rendición de ὅσιοι como «santos» sin artículo y con fuerte carga eclesiástica
    rationale: Aunque no es imposible, «santos» en español tiende más que en inglés a sugerir una categoría técnica o canonizada. «Los santos» atenúa algo esa lectura y refleja mejor el sustantivo plural identificacional. También mejora la simetría entre ambas ocurrencias.
  - severity: medium
    issue: La nota [a] está defectuosa
    rationale: Dice «O «los santos», o «los piadosos»» cuando el texto base ya usa «santos». La nota debe presentar alternativas reales al término escogido o explicar el rango semántico de ὅσιοι.
  revised_spanish_text: Los santos del Señor vivirán en él para siempre[a]; el paraíso del Señor, los árboles de la vida[b], son sus santos.
  revised_footnotes:
  - marker: a
    text: O «los piadosos» o «los devotos», para ὅσιοι.
    reason: lexical_alternative
  - marker: b
    text: El griego «los árboles de la vida» está en plural.
    reason: lexical_alternative
  revision_rationale: Se conserva la traducción base porque es mayormente fiel al griego y al POB, pero se corrige la formulación de la nota léxica para ὅσιοι y se normaliza ligeramente la presentación con artículo explícito en ambas ocurrencias de «santos», que mejora tanto la naturalidad como la relación con la decisión inglesa «holy ones». No hace falta adjudicación adicional porque el ajuste es menor y no depende de una incertidumbre textual nueva.
