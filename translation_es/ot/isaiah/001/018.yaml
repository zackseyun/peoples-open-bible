translation:
  language: es
  text: 'Vengan ahora[a], y razonemos juntos, dice Yahvé: aunque sus pecados sean como escarlata, se volverán blancos como la nieve; aunque sean rojos como el carmesí[b], serán como la lana.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y discutamos el asunto», «y lleguemos a un acuerdo» o «y disputemos juntos». El verbo hebreo tiene matices legales y dialogales.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «como gusano escarlata» o «como tintura escarlata»; el término alude, por asociación, al color rojo intenso producido a partir del insecto.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְכוּ נָא
  english_pob_choice: Come now
  chosen_spanish: Vengan ahora
  alternatives_spanish:
  - Vengan, por favor
  - Vengan ahora, por favor
  lexicon: HALOT
  rationale: לְכוּ es un imperativo plural con sentido de invitación o llamado, y נָא atenúa/urge la apelación. «Vengan ahora» comunica con naturalidad ese tono exhortativo en español sin volverlo arcaico ni añadir una cortesía no explícita en el hebreo.
- source_word: וְנִוָּכְחָה
  english_pob_choice: and let us reason together
  chosen_spanish: y razonemos juntos
  alternatives_spanish:
  - y discutamos el asunto
  - y lleguemos a un acuerdo
  - y disputemos juntos
  lexicon: HALOT
  rationale: El verbo en esta forma expresa un entrar mutuamente en una controversia, examen o ajuste de cuentas. «Razonemos juntos» conserva el valor dialógico y forense del texto, mientras que las alternativas reflejan matices posibles que el hebreo admite.
- source_word: יֹאמַר יְהוָה
  english_pob_choice: says Yahweh
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - dice Yahveh
  - dice el Señor
  lexicon: HALOT
  rationale: El texto hebreo nombra directamente a יְהוָה. La norma del proyecto en español es usar «Yahvé» en el texto principal, por fidelidad al nombre pactual, evitando la sustitución por «Señor» como convención de ocultamiento.
- source_word: חֲטָאֵיכֶם
  english_pob_choice: your sins
  chosen_spanish: sus pecados
  alternatives_spanish:
  - sus faltas
  - sus errores
  lexicon: HALOT
  rationale: חטאֵיכֶם designa pecados en sentido moral y relacional, no solo fallas menores. «Pecados» es el equivalente natural y más exacto en español.
- source_word: כַּשָּׁנִים
  english_pob_choice: like scarlet
  chosen_spanish: como escarlata
  alternatives_spanish:
  - como escarlata teñida
  - como carmesí
  lexicon: HALOT
  rationale: שָׁנִים apunta al rojo intenso asociado con el tinte escarlata. «Escarlata» es el equivalente breve y claro, y mantiene la imagen cromática del paralelo poético.
- source_word: כַּשֶּׁלֶג יַלְבִּינוּ
  english_pob_choice: they will become white like snow
  chosen_spanish: se volverán blancos como la nieve
  alternatives_spanish:
  - blanquearán como la nieve
  - quedarán blancos como la nieve
  lexicon: HALOT
  rationale: El Hiphil de לבן expresa volverse blanco. «Se volverán blancos como la nieve» comunica el cambio resultante con naturalidad en español y conserva la imagen de pureza/limpieza del paralelo.
- source_word: אִם יַאְדִּימוּ
  english_pob_choice: though they are red
  chosen_spanish: aunque sean rojos
  alternatives_spanish:
  - aunque se vuelvan rojos
  - si son rojos
  lexicon: HALOT
  rationale: La partícula אִם funciona aquí con valor concesivo, y el Hiphil de אדם describe el estado de rojez. «Aunque sean rojos» preserva esa fuerza concesiva en paralelo con la primera mitad del versículo.
- source_word: כַּתּוֹלָע
  english_pob_choice: like crimson
  chosen_spanish: como el gusano escarlata
  alternatives_spanish:
  - como el carmesí
  - como tintura de escarlata
  lexicon: HALOT
  rationale: תּוֹלָע alude al insecto del que se obtenía el tinte rojo intenso. La elección «gusano escarlata» conserva la asociación concreta del hebreo y la tensión entre el referente literal y el color resultante.
- source_word: כַּצֶּמֶר יִהְיוּ
  english_pob_choice: they will become like wool
  chosen_spanish: serán como la lana
  alternatives_spanish:
  - se volverán como lana
  - serán blancos como la lana
  lexicon: HALOT
  rationale: La comparación final cierra el paralelismo poético. «Serán como la lana» sigue de cerca la imagen del hebreo sin añadir un adjetivo de color que el texto no explicita en esta cláusula.
theological_decisions:
- issue: Nombre divino יְהוָה en el texto principal
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el Señor
  rationale: El hebreo usa directamente el Tetragrama. En la política terminológica del proyecto, se traduce como «Yahvé» en el cuerpo principal, preservando el nombre del pacto y evitando la máscara litúrgica «el Señor».
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'El pasaje muestra alto acuerdo en la auditoría inglesa y no requirió revisiones aplicadas. La versión española sigue el mismo perfil interpretativo: invita al diálogo forense, conserva la concesión de אִם, mantiene la imagen cromática de escarlata/nieve/lana, y preserva el nombre divino como Yahvé en el texto principal.'
  spanish_consistency_notes:
  - Se mantuvo el paralelismo poético con dos cláusulas concesivas y dos resultados transformados.
  - «Razonemos juntos» conserva el tono deliberativo sin sonar excesivamente jurídico en español.
  - «Escarlata» se usa de manera consistente para כַּשָּׁנִים; la segunda comparación se explicita con nota porque תּוֹלָע tiene un trasfondo material/insecto.
  - Se evitó «Señor» para יְהוָה conforme al estándar terminológico del proyecto.
  - «Sus» mantiene la referencia al plural implícito del hebreo dirigido a la comunidad.
