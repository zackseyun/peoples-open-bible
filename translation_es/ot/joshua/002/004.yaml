translation:
  language: es
  text: 'Pero la mujer había tomado consigo a los dos hombres y los había escondido[a], y dijo: «Sí, los hombres vinieron a mí, pero no sabía de dónde eran».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo presenta un sufijo singular en «y lo escondió» (וַתִּצְפְּנוֹ), pero el contexto se refiere a los dos hombres en conjunto; por eso se traduce en plural.
    reason: textual_variant
lexical_decisions:
- source_word: וַתִּקַּח
  english_pob_choice: had taken
  chosen_spanish: había tomado
  alternatives_spanish:
  - tomó
  lexicon: HALOT
  rationale: El perfecto anterior en español expresa bien la acción de fondo ya realizada antes del dicho posterior. 'Tomó' sería posible, pero 'había tomado' conserva mejor el orden narrativo que el inglés POB también marca como anterioridad.
- source_word: הָאִשָּׁה
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la esposa
  lexicon: HALOT
  rationale: El contexto presenta a Rahab como mujer individual; 'esposa' añadiría una relación no indicada por el hebreo.
- source_word: שְׁנֵי הָאֲנָשִׁים
  english_pob_choice: the two men
  chosen_spanish: los dos hombres
  alternatives_spanish:
  - las dos personas
  lexicon: HALOT
  rationale: אֲנָשִׁים aquí denota varones concretos, los espías. 'Hombres' mantiene el rasgo de género y el plural.
- source_word: וַתִּצְפְּנוֹ
  english_pob_choice: hidden them
  chosen_spanish: los había escondido
  alternatives_spanish:
  - los ocultó
  - lo había escondido
  lexicon: HALOT
  rationale: Aunque la forma consonántica puede leerse con sufijo singular, el contexto exige referir la acción a los dos hombres colectivamente. En español, 'los había escondido' refleja de modo natural esa referencia plural y la anterioridad de la acción.
- source_word: וַתֹּאמֶר
  english_pob_choice: and she said
  chosen_spanish: y dijo
  alternatives_spanish:
  - y respondió
  lexicon: HALOT
  rationale: Es la fórmula narrativa más directa y fiel para introducir el discurso.
- source_word: כֵּן
  english_pob_choice: 'Yes'
  chosen_spanish: Sí
  alternatives_spanish:
  - Ciertamente
  - Así es
  lexicon: HALOT
  rationale: Aquí funciona como asentimiento a la pregunta previa; 'Sí' reproduce esa afirmación directa en español.
- source_word: בָּאוּ אֵלַי הָאֲנָשִׁים
  english_pob_choice: the men came to me
  chosen_spanish: los hombres vinieron a mí
  alternatives_spanish:
  - los hombres llegaron a mí
  lexicon: HALOT
  rationale: '''Vinieron a mí'' conserva el movimiento hacia la hablante y suena natural en diálogo; ''llegaron a mí'' es posible, pero menos idiomático.'
- source_word: וְלֹא יָדַעְתִּי
  english_pob_choice: but I did not know
  chosen_spanish: pero no sabía
  alternatives_spanish:
  - y no sabía
  lexicon: HALOT
  rationale: El valor adversativo del contexto se expresa mejor con 'pero'. El imperfecto 'sabía' comunica el estado de desconocimiento sin sobrecargar el énfasis.
- source_word: מֵאַיִן הֵמָּה
  english_pob_choice: where they were from
  chosen_spanish: de dónde eran
  alternatives_spanish:
  - de dónde venían
  - de qué lugar eran
  lexicon: HALOT
  rationale: La pregunta hebrea pide origen/procedencia; en español, 'de dónde eran' es natural y preserva esa procedencia sin añadir más precisión de la que el texto ofrece.
theological_decisions:
- issue: Referencia colectiva en el pronombre del objeto de 'escondió'
  english_pob_reading: Hebrew has a singular suffix in 'and hid him' (וַתִּצְפְּנוֹ), but the context refers to the two men collectively; hence 'hidden them.'
  chosen_spanish_reading: El texto español usa plural ('los había escondido') para reflejar que el referente real son los dos hombres, no una sola persona.
  alternative_spanish_readings:
  - lo había escondido
  - los escondió
  rationale: La lectura contextual es colectiva. El singular literal en la forma hebrea no debe imponerse a costa del sentido inmediato; en español conviene marcar de forma explícita el plural, como hace el POB inglés.
  doctrine_reference: Crítica textual y coherencia referencial del pasaje narrativo
translation_notes:
  revision_awareness: 'Se siguió el mismo criterio del POB inglés: acción anterior expresada con pluscuamperfecto y referencia plural para el objeto de ''escondió''. No hubo revisiones posteriores en el contexto auditado.'
  spanish_consistency_notes:
  - Se mantuvo 'mujer' y no 'esposa', conforme al contexto.
  - '''Hombres'' conserva el rasgo masculino explícito del hebreo.'
  - '''Sí'' reproduce el asentimiento de כֵּן de manera directa y no litúrgica.'
  - '''De dónde eran'' evita una paráfrasis excesiva y conserva la pregunta por procedencia.'
