translation:
  language: es
  text: 'Él midió el lado norte: quinientas cañas[a], con la caña de medir alrededor.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «quinientas cañas». Algunos manuscritos y versiones antiguas reflejan una lectura que varias traducciones vierten como «quinientos codos». El texto principal sigue aquí el hebreo masorético.'
    reason: textual_variant
lexical_decisions:
- source_word: מָדַד
  english_pob_choice: He measured
  chosen_spanish: midió
  alternatives_spanish:
  - medió
  - midió la medida
  lexicon: HALOT
  rationale: Verbo perfecto narrativo; en español, el pretérito simple expresa con naturalidad la acción de medir realizada en la visión.
- source_word: רוּחַ הַצָּפוֹן
  english_pob_choice: the north side
  chosen_spanish: el lado norte
  alternatives_spanish:
  - el costado norte
  - la parte norte
  - el norte
  lexicon: HALOT
  rationale: Aquí רוּחַ no se entiende como 'viento', sino como orientación o lado en un contexto arquitectónico. 'Lado norte' conserva esa referencia espacial de forma clara y natural.
- source_word: חֲמֵשׁ מֵאוֹת
  english_pob_choice: five hundred
  chosen_spanish: quinientas
  alternatives_spanish:
  - quinientos
  lexicon: HALOT
  rationale: Se mantiene el número cardinal. Se usa femenino plural porque el sustantivo implícito 'cañas' es femenino en español.
- source_word: קָנִים
  english_pob_choice: reeds
  chosen_spanish: cañas
  alternatives_spanish:
  - reeds
  - juncos
  lexicon: HALOT
  rationale: קָנֶה designa literalmente una caña o carrizo; en este contexto es la unidad de medida. 'Cañas' conserva el vínculo con el original y su valor técnico.
- source_word: בִּקְנֵה הַמִּדָּה
  english_pob_choice: by the measuring reed
  chosen_spanish: con la caña de medir
  alternatives_spanish:
  - por la caña de medir
  - según la caña de medir
  - con la caña de la medida
  lexicon: HALOT
  rationale: La preposición instrumental admite 'con'. 'Caña de medir' comunica de modo idiomático el instrumento de medición sin perder la imagen concreta del hebreo.
- source_word: סָבִיב
  english_pob_choice: all around
  chosen_spanish: todo alrededor
  alternatives_spanish:
  - alrededor
  - en derredor
  lexicon: HALOT
  rationale: Adverbio que indica el contorno completo. 'Todo alrededor' es natural en español y conserva la idea de perímetro completo.
translation_notes:
  revision_awareness: El texto español sigue de cerca la lectura masorética del hebreo para קָנִים ('cañas/reeds') y mantiene la nota textual del POB en cuanto a la variante de 'codos'. No se requieren ajustes adicionales según el registro de revisión más reciente, que indicó sin cambios.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evita 'SEÑOR' y también 'codos', porque la evidencia principal del hebreo dice 'cañas'.
  - '''Lado norte'' traduce רוּחַ הַצָּפוֹן en su sentido direccional/arquitectónico, no meteorológico.'
