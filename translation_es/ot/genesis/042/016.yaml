  to: Envíen a uno de ustedes[a], y que él traiga a su hermano; mientras ustedes quedan bajo custodia[b], para que sus palabras sean probadas, [c]a ver si la verdad está con ustedes. Pero si no, por la vida de Faraón[d], ciertamente ustedes son espías.
