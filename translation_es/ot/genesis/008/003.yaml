    text: Hebreo literalmente, "yendo y volviendo"; es un modismo que expresa el retiro continuo o progresivo de las aguas.
    reason: lexical_alternative
  revision_rationale: Se hizo una reparación menor para mejorar la naturalidad del español sin apartarse del hebreo ni del rastro de auditoría inglés. 'Se retiraron' comunica mejor el sentido de וַיָּשֻׁבוּ con aguas, mientras se conserva 'de sobre la tierra' por la imagen espacial de מֵעַל. Se mantuvo el giro literal 'yendo y volviendo' con una nota más limpia y precisa.
