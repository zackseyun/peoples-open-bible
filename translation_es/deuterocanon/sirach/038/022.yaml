review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue en términos generales la lectura hebrea priorizada por el expediente inglés: una afirmación sobre la morada/lugar de reposo del muerto, seguida de una exhortación al consuelo cuando su vida/nefesh parte. Sin embargo, los marcadores de notas están invertidos respecto al contenido: [a] aparece anclado en ''lugar de reposo'' pero su nota trata de נפש=''alma'', mientras [b] aparece en ''cuando'' pero su nota trata de la variante griega de toda la primera cláusula. Además, ''salga su vida'' suena poco natural en español; ''parta su vida'' tampoco sería ideal. La idea temporal y idiomática se expresa mejor con ''cuando su vida se vaya'' o ''cuando se vaya su vida'', pero la opción más natural y fiel es ''cuando su vida se vaya''.'
  spanish_quality_summary: 'La frase es legible, pero hay dos problemas de calidad: 1) el anclaje de las notas no corresponde a las palabras pertinentes; 2) ''cuando salga su vida'' es gramaticalmente posible pero poco idiomático en español bíblico moderno. También conviene ajustar la puntuación eliminando el punto y coma tras ''y'', que en español aquí resulta innecesario. ''La morada del muerto es su lugar de reposo'' es aceptable, aunque algo redundante; aun así preserva bien la relación semántica documentada y no requiere una reescritura mayor.'
  glossary_alignment: No hay conflictos con la terminología teológica por defecto del proyecto. 'Vida' para נפש respeta la decisión inglesa, con 'alma' conservada en nota. La variante griega debe mantenerse en nota, pero anclada a la primera cláusula, no a 'cuando'.
  issues:
  - severity: medium
    issue: Marcadores de notas mal anclados
    rationale: La nota [a] explica נפש/vida/alma, por lo que debe anclarse en 'vida', no en 'lugar de reposo'. La nota [b] trata la lectura griega alternativa de la primera cláusula, por lo que debe anclarse allí.
  - severity: medium
    issue: 'Expresión poco natural: ''cuando salga su vida'''
    rationale: Aunque calca el verbo hebreo 'salir', en español suena forzado. 'Cuando su vida se vaya' conserva la idea de partida sin rigidez semítica innecesaria.
  - severity: low
    issue: Puntuación mejorable
    rationale: El punto y coma después de 'y' no es natural aquí; una simple coma coordina mejor las dos cláusulas.
  revised_spanish_text: La morada del muerto[b] es su lugar de reposo, y consuélate cuando su vida[a] se vaya.
