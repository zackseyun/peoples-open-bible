  yaml_path: translation/ot/ezekiel/017/016.yaml
  text: As I live[a], declares the Lord GOD, surely in the place of the king who made him king[b], whose oath he despised and whose covenant he broke—with him in the midst of Babylon he will die.
  footnotes:
