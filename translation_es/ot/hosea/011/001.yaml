translation:
  language: es
  text: Cuando Israel era un niño[a], lo amé, y llamé de Egipto a mi hijo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque Israel era un niño». El hebreo inicial puede leerse de manera causal («porque») o temporal («cuando»); aquí se prefiere el sentido temporal porque encaja mejor con la narración retrospectiva del versículo. Además, «llamé de Egipto a mi hijo» es citado después en Mateo 2:15.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Porque
  - Pues
  lexicon: HALOT
  rationale: Aquí כִּי introduce una cláusula temporal-retrospectiva, no una causal simple. «Cuando» conserva el sentido narrativo de la frase hebrea y suena natural en español.
- source_word: נַעַר
  english_pob_choice: child
  chosen_spanish: niño
  alternatives_spanish:
  - muchacho
  - joven
  - criatura
  lexicon: HALOT
  rationale: נַעַר puede abarcar niño, muchacho o joven. En este contexto de Israel como pueblo en su etapa inicial, «niño» comunica inmadurez y relación filial sin forzar una edad precisa.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  lexicon: nombre propio
  rationale: Se mantiene el nombre propio del pueblo/persona colectiva sin transliteración adicional.
- source_word: וָאֹהֲבֵהוּ
  english_pob_choice: I loved him
  chosen_spanish: yo lo amé
  alternatives_spanish:
  - yo le amé
  - entonces lo amé
  lexicon: HALOT
  rationale: El verbo está en primera persona singular con sufijo masculino singular, refiriéndose a Israel personificado. «Yo lo amé» conserva la voz divina y el objeto masculino singular con español natural.
- source_word: וּמִמִּצְרַיִם
  english_pob_choice: and out of Egypt
  chosen_spanish: y de Egipto
  alternatives_spanish:
  - y desde Egipto
  - y fuera de Egipto
  lexicon: HALOT
  rationale: La preposición marca origen o fuente. «De Egipto» es directo y fiel; el matiz de salida queda claro por el verbo siguiente y por el trasfondo del éxodo.
- source_word: קָרָאתִי
  english_pob_choice: I called
  chosen_spanish: llamé
  alternatives_spanish:
  - llamé a
  - convocqué
  - clamé
  lexicon: HALOT
  rationale: קרא puede significar llamar o convocar. Aquí «llamé» preserva la amplitud del verbo sin añadir especificaciones innecesarias.
- source_word: לִבְנִי
  english_pob_choice: my son
  chosen_spanish: a mi hijo
  alternatives_spanish:
  - mi hijo
  - para mi hijo
  - hacia mi hijo
  lexicon: HALOT
  rationale: La preposición ל con קרא marca al destinatario/nombrado, por lo que «a mi hijo» comunica mejor el giro hebreo que simplemente «mi hijo». Mantiene además la metáfora filial aplicada a Israel.
theological_decisions:
- issue: Israel corporativo como «mi hijo» y reutilización posterior en Mateo 2:15
  english_pob_reading: La traducción mantiene el sentido inmediato de Oseas como referencia a Israel en el éxodo, sin convertir el versículo en una paráfrasis mesiánica exclusiva.
  chosen_spanish_reading: El texto español conserva a Israel como pueblo-hijo de Yahvé y deja abierta la reutilización posterior en el Nuevo Testamento sin incorporarla al sentido principal.
  alternative_spanish_readings:
  - Interpretarlo directamente como profecía exclusiva del Mesías
  - Suavizar «mi hijo» para evitar lectura corporativa
  rationale: El referente histórico-literario primario es Israel. Dado que Mateo 2:15 cita este pasaje, la traducción debe permanecer compatible con ese uso canónico, pero sin borrar el sentido original de Oseas.
  doctrine_reference: Primacía del sentido original; conservar la tensión canónica sin resolverla por paráfrasis.
translation_notes:
  revision_awareness: No se aprecian cambios necesarios respecto del texto fuente y del expediente inglés; se conservó la lectura temporal de כִּי, el valor filial de לִבְנִי y la tensión canónica con Mateo 2:15 sin introducir una paráfrasis teológica.
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto en el proyecto, pero este versículo no contiene el nombre divino explícito; la voz divina queda implícita por la primera persona verbal.
  - Se eligió «niño» como equivalente contextual de נַעַר, evitando «siervo» o «joven» porque no corresponden al marco metafórico principal.
  - «A mi hijo» preserva la preposición ל del hebreo con el verbo llamar, en vez de nivelarla a una frase posesiva simple.
