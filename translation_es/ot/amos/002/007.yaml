base_translation:
  language: en
  yaml_path: translation/ot/amos/002/007.yaml
  text: those who pant after the dust of the earth on the head of the poor[a], and turn aside the way of the humble; and a man and his father go in to the same girl[d][c][b], so as to profane my holy name.
  footnotes:
  - marker: a
    text: Or 'those who pant after the dust of the earth on the head of the poor.' The Hebrew verb can be read more literally as intense craving, but in context it likely describes ruthless oppression.
    reason: lexical_alternative
  - marker: b
    text: Or 'turn aside the path of the afflicted/meek.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'go in to the girl'; this is a sexual euphemism. 'Girl' may also be rendered 'young woman.'
    reason: lexical_alternative
  - marker: d
    text: The verse does not explicitly identify the girl as a cult prostitute or slave, though some interpreters infer exploitation of that kind from the context.
    reason: alternative_reading
