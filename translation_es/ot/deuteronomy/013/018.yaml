base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/013/018.yaml
  text: And nothing from what is devoted to destruction shall cling to your hand[a], so that Yahweh may turn from the fierceness of his anger and show you mercy, and have compassion on you, and multiply you[b], just as he swore to your fathers.
  footnotes:
  - marker: a
    text: Or, more traditionally, 'nothing from the ban' or 'nothing of what is under the ban.' The Hebrew חֵרֶם refers to something devoted irrevocably to God, often for destruction.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from the fierceness of his nose/anger,' an idiom for intense anger.
    reason: cultural_note
