translation:
  language: es
  text: 'Porque tu nombre será llamado por Dios para siempre: «Paz de rectitud[a] y gloria de piedad[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Paz de justicia».
    reason: lexical_alternative
  - marker: b
    text: O «gloria de reverencia para con Dios».
