base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/004/008.yaml
  text: Woe to us! Who can deliver us from the hand of these mighty gods? These are the gods who struck Egypt with every plague in the wilderness[a][b].
  footnotes:
  - marker: a
    text: Or 'these mighty God(s).' The Philistines speak in plural terms, reflecting their own understanding of Israel's deity.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''in the wilderness.'' The phrase is difficult in context, since the plagues struck Egypt before Israel''s wilderness journey; the translation follows the Masoretic Text as written.'
    reason: textual_variant
