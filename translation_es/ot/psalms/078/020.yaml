  to: Miren[a], él golpeó la roca, y las aguas brotaron, y los arroyos se desbordaron. ¿Puede también dar pan, o proveer carne[b] para su pueblo?
  rationale: Se ajusta la partícula inicial para que suene más natural y poética en español, sin perder su fuerza deíctica, y se añade la nota léxica necesaria sobre «carne» para reflejar la decisión documentada del POB inglés respecto de שְׁאֵר.
