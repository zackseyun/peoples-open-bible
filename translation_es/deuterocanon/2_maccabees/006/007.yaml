base_translation:
  language: en
  yaml_path: translation/deuterocanon/2_maccabees/006/007.yaml
  text: And they were being led[a], under bitter compulsion, to the king’s monthly birthday observance for the sacrificial meal; and when a festival of Dionysus came, they were being forced, wearing ivy wreaths[b], to join the procession in honor of Dionysus.
  footnotes:
  - marker: a
    text: Or, more literally, 'for the eating of sacrificial entrails/portions.' The Greek term refers to participation in the sacrificial rite by eating the offered portions.
    reason: lexical_alternative
  - marker: b
    text: Ivy was associated with Dionysian worship; the phrase likely refers to wearing ivy garlands or wreaths in the procession.
    reason: cultural_note
