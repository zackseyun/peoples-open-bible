  to: 'Aunque Edom dice[a]: «Hemos sido devastados, pero volveremos y reconstruiremos las ruinas», así dice Yahvé de los Ejércitos[b]: «Podrán edificar, pero yo derribaré; y serán llamados territorio de maldad[c], el pueblo contra quien Yahvé está indignado para siempre[d]».'
  rationale: 'Se ajusta el texto para reflejar mejor el hebreo y el audit trail del POB: «hemos sido devastados» representa mejor la ruina nacional; «Podrán edificar, pero yo derribaré» preserva la lectura concesivo-adversativa documentada; «serán llamados» mejora la naturalidad española de la impersonal hebrea; y la nota [d] ahora sí conserva una alternativa significativa.'
