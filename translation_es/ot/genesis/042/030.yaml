base_translation:
  language: en
  yaml_path: translation/ot/genesis/042/030.yaml
  text: The man[a], the lord of the land[b], spoke harshly to us and treated us as spies of the land.
  footnotes:
  - marker: a
    text: Or 'spoke harsh things to us' or 'spoke severely with us.' The Hebrew phrase uses an adjective adverbially.
    reason: lexical_alternative
  - marker: b
    text: Or 'considered us spies of the land.' The Hebrew literally says 'gave us as spies of the land,' an idiom for regarding or treating someone as such.
    reason: lexical_alternative
