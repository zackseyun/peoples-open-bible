translation:
  language: es
  text: Tú los escondes en el refugio de tu presencia, de las tramas[a] del hombre; los ocultas en un refugio, de la contienda de las lenguas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión hebrea traducida aquí como «tramas» es rara y puede entenderse también como «conspiraciones» o «planes» hostiles.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «de la contienda de las lenguas»; es decir, de la palabra hostil, disputas verbales o calumnias.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּסְתִּירֵם
  english_pob_choice: you hide them
  chosen_spanish: Tú los escondes
  alternatives_spanish:
  - Tú los ocultas
  - Tú los mantienes escondidos
  lexicon: HALOT
  rationale: El hiphil de סתר expresa hacer que alguien quede escondido o fuera de vista. «Escondes» conserva el acto protector y suena natural en español; «ocultas» también es posible, pero «escondes» comunica mejor la acción directa.
- source_word: בְּסֵתֶר פָּנֶיךָ
  english_pob_choice: in the shelter of your presence
  chosen_spanish: en el refugio de tu presencia
  alternatives_spanish:
  - en el escondite de tu presencia
  - en el secreto de tu presencia
  lexicon: HALOT
  rationale: סֵתֶר es un lugar de resguardo, y פָּנֶיךָ en este contexto relacional apunta a la presencia divina. «Refugio de tu presencia» mantiene ambos matices sin la dureza del calco «rostro».
- source_word: מֵרֻכְסֵי אִישׁ
  english_pob_choice: from the schemes of man
  chosen_spanish: lejos de las tramas del hombre
  alternatives_spanish:
  - lejos de las conspiraciones del hombre
  - lejos de los planes del hombre
  lexicon: HALOT
  rationale: La expresión hebrea es rara y difícil; el contexto sugiere maquinaciones hostiles. «Tramas» transmite la idea de combinaciones o intrigas adversas y preserva mejor la tensión semántica que una palabra demasiado general.
- source_word: תִּצְפְּנֵם
  english_pob_choice: you conceal them
  chosen_spanish: los ocultas
  alternatives_spanish:
  - los escondes
  - los guardas
  lexicon: HALOT
  rationale: צפן puede significar esconder u ocultar con la idea de guardar en seguridad. «Ocultas» sigue de cerca la revisión inglesa que prefirió «conceal them» y evita repetir exactamente «escondes» del primer cola.
- source_word: בְּסֻכָּה
  english_pob_choice: in a shelter
  chosen_spanish: en una tienda
  alternatives_spanish:
  - en un refugio
  - en una cabaña
  lexicon: HALOT
  rationale: סֻכָּה es literalmente una tienda, choza o cabaña. Aquí la imagen es protectora; «tienda» conserva la literalidad básica y encaja en el paralelo poético con «refugio».
- source_word: מֵרִיב לְשֹׁנֽוֹת
  english_pob_choice: from the strife of tongues
  chosen_spanish: lejos de la contienda de las lenguas
  alternatives_spanish:
  - lejos del conflicto de las lenguas
  - lejos de la lengua contenciosa
  lexicon: HALOT
  rationale: רִיב es contienda/pleito/discordia, y לְשֹׁנֹות conserva la imagen vívida de las lenguas como órgano de habla hostil. «Contienda de las lenguas» preserva el hebraísmo y su fuerza poética.
theological_decisions:
- issue: Renderización de אִישׁ como singular representativo
  english_pob_reading: man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - los hombres
  - la gente
  rationale: El hebreo es singular masculino y funciona de manera representativa o genérica. Se mantiene «el hombre» para conservar el perfil del original sin neutralizarlo indebidamente.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Preservación del paralelismo entre protección y ocultamiento
  english_pob_reading: You hide... you conceal...
  chosen_spanish_reading: Tú los escondes... los ocultas...
  alternative_spanish_readings:
  - Tú los guardas... los resguardas...
  rationale: El versículo repite la acción divina de amparar a los suyos, pero con dos verbos distintos. La versión española conserva esa duplicación con verbos emparentados pero no idénticos, reflejando el paralelismo hebreo.
  doctrine_reference: Poetic parallelism in Psalms
- issue: Sentido de פָּנֶיךָ como presencia divina
  english_pob_reading: your presence
  chosen_spanish_reading: tu presencia
  alternative_spanish_readings:
  - tu rostro
  - tu faz
  rationale: Aunque פָּנִים literalmente es «rostro», en lenguaje bíblico de relación y amparo suele equivaler a la presencia personal de Dios. «Presencia» evita una literalidad extraña y mantiene la lectura teológica del texto.
  doctrine_reference: Biblical Hebrew פנים semantic range
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió «conceal them» sobre «store them away» para acercarse más al verbo hebreo de esconder/ocultar. En español se reflejó con «ocultas» en el segundo hemistiquio y con un primer hemistiquio que evita duplicación mecánica.
  spanish_consistency_notes:
  - Se mantuvo «tu» en referencia a Dios para conservar la cercanía del hebreo.
  - 'Se usó un vocabulario de resguardo coherente: «refugio», «escondes», «ocultas», «tienda».'
  - Se preservó la imagen poética de las «lenguas» en lugar de reducirla a «hablar» o «palabras».
