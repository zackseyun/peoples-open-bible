    text: 'Hebreo: «los hijos de Judá»; puede funcionar colectivamente por el pueblo de Judá.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «la sangre de los inocentes».'
    reason: lexical_alternative
  revision_rationale: Se corrige un error gramatical importante ('cuya' en lugar de 'cuyo') y se reubican las notas para que correspondan exactamente a las alternativas léxicas documentadas en el POB inglés. También se mejora la naturalidad de 'violencia contra' sin apartarse del hebreo ni del expediente auditado.
