revisions:
- from: Y hubo otra vez guerra en Gat[a], y había un hombre de gran tamaño, cuyos dedos de las manos y de los pies eran seis y seis, veinticuatro en total; también él nació de Rapha.
  to: Y hubo otra vez guerra en Gat, y había un hombre de gran tamaño, cuyos dedos de las manos y de los pies eran seis y seis, veinticuatro en total; también él había nacido de Rapha[a].
  rationale: Se elimina una nota redundante sobre «Gat» y se añade la nota importante exigida por el expediente inglés en «Rapha». También se ajusta «nació» a «había nacido» para mejorar la naturalidad narrativa en español sin alterar el sentido ni la ambigüedad preservada por el POB.
