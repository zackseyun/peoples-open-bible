  - Se mantiene una transliteración sobria de nombres propios bíblicos y una equivalencia contextual para relaciones familiares cuando el hebreo usa un sustantivo genérico.
  - La puntuación refleja español moderno y evita añadir explicaciones al cuerpo principal más allá de lo necesario.
