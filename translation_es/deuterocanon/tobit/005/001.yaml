translation:
  language: es
  text: 'Y Tobías le respondió: «Padre, haré todo lo que me has mandado».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀποκριθεὶς
  english_pob_choice: answered
  chosen_spanish: le respondió
  alternatives_spanish:
  - respondió
  - le contestó
  lexicon: BDAG
  rationale: La partícula participial introduce la respuesta de Tobías de forma narrativa; en español, «le respondió» conserva esa función con naturalidad y sin sobrecargar el estilo.
- source_word: Τωβίας
  english_pob_choice: Tobiah
  chosen_spanish: Tobías
  alternatives_spanish:
  - Tobías
  lexicon: convención onomástica bíblica
  rationale: Se mantiene la forma española usual del nombre propio, plenamente inteligible en contexto bíblico.
- source_word: αὐτῷ
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El pronombre griego se traduce con el dativo átono español, que es la forma más natural en este diálogo.
- source_word: Πάτερ
  english_pob_choice: Father
  chosen_spanish: Padre
  alternatives_spanish:
  - Mi padre
  - Padre mío
  lexicon: BDAG
  rationale: El vocativo griego es simplemente «Padre»; no se importa el posesivo del testimonio paralelo para no sobrepasar el ancla principal griega.
- source_word: ποιήσω
  english_pob_choice: I will do
  chosen_spanish: haré
  alternatives_spanish:
  - voy a hacer
  - cumpliré
  lexicon: BDAG
  rationale: El futuro expresa decisión e intención de obedecer; «haré» es directo y fiel al valor verbal aquí.
- source_word: πάντα
  english_pob_choice: everything
  chosen_spanish: todo
  alternatives_spanish:
  - todo lo
  - todo cuanto
  lexicon: BDAG
  rationale: En combinación con la cláusula relativa siguiente, «todo» da en español una cobertura natural y completa.
- source_word: ὅσα
  english_pob_choice: that / all that
  chosen_spanish: lo que
  alternatives_spanish:
  - todo lo que
  - cuanto
  lexicon: BDAG
  rationale: La relativa se vierte de modo idiomático como «lo que», manteniendo la amplitud de la obediencia sin rigidez calcaica.
- source_word: ἐντέταλσαί
  english_pob_choice: have commanded
  chosen_spanish: me has mandado
  alternatives_spanish:
  - me has ordenado
  - me has encargado
  lexicon: BDAG
  rationale: «Mandar» conserva la fuerza de mandato/encargo del verbo griego y encaja bien en el marco filial; «has» refleja el estado de la orden como ya dada y vigente.
- source_word: μοι
  english_pob_choice: me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: BDAG
  rationale: El dativo se integra de manera natural en español con el verbo «mandar».
translation_notes:
  revision_awareness: Se corrige la validación anterior eliminando cualquier nota no anclada; la presente redacción no requiere nota textual, porque el contraste con el testimonio semítico paralelo no afecta de forma necesaria la publicación breve de este versículo.
  spanish_consistency_notes:
  - Se mantiene «Tobías» como forma española del nombre propio en lugar de «Tobiah/Tobías» híbrido.
  - Se conserva el trato reverente filial con el vocativo «Padre» sin añadir «mi», ya que el griego principal no lo expresa.
  - La combinación «haré todo lo que me has mandado» reproduce la totalidad y la obediencia del original sin introducir matices ajenos.
