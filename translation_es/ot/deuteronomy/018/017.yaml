lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y ... dijo
  alternatives_spanish:
  - Entonces ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: El wayyiqtol marca secuencia narrativa; en español, «Y ... dijo» conserva ese avance de la narración sin volverla artificial.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del hebreo, siguiendo la convención del proyecto para יְהוָה y evitando la sustitución por un título.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  - para mí
  lexicon: HALOT
  rationale: En español, el dativo clítico «me» es natural y fiel al valor de אֶל con sufijo de primera persona, mientras que «a mí» puede quedar enfático pero menos fluido.
- source_word: הֵיטִיבוּ
  english_pob_choice: have spoken well
  chosen_spanish: han hablado bien
  alternatives_spanish:
  - han hecho bien
  - han dicho bien
  lexicon: HALOT
  rationale: El Hifil de יטב evalúa positivamente lo dicho. «Han hablado bien» mantiene la valoración y resulta idiomático en español.
- source_word: אֲשֶׁר
  english_pob_choice: implicit in 'have spoken well'
  chosen_spanish: implícito en «han hablado bien»
  alternatives_spanish:
  - que
  - lo que
  lexicon: HALOT
  rationale: La relativa hebrea queda absorbida de modo natural en la expresión española, como hizo el POB inglés, sin perder el sentido evaluativo del original.
- source_word: דִּבֵּרוּ
  english_pob_choice: spoken
  chosen_spanish: hablado
  alternatives_spanish:
  - dicho
  - hablaban
  lexicon: HALOT
  rationale: El piel perfecto de דבר se traduce con el participio/participo verbal «hablado» en la frase fija «han hablado bien», conservando el acto de hablar como contenido evaluado.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La lectura auditada del POB inglés preserva el nombre divino. En español, «Yahvé» es la forma adoptada por el proyecto para reflejar directamente el Tetragrama sin convertirlo en un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La versión inglesa auditada quedó sin cambios en el último pase y mostró alta concordancia con el revisor. No se registraron revisiones aplicadas; esta propuesta sigue esa lectura estable y conserva la tensión lexical del original en forma idiomática española.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma regular del nombre divino en el texto principal.
  - La valoración de הֵיטִיבוּ + דִּבֵּרוּ se expresa de manera natural como «han hablado bien», sin perder el matiz literal explicable en nota.
  - Se evita el sustitutivo «SEÑOR» para conservar la transparencia textual del proyecto.
