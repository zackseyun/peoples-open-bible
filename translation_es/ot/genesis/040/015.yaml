    text: O «ciertamente fui robado» o «fui arrebatado». El hebreo usa un infinitivo absoluto con el verbo finito para dar énfasis.
    reason: lexical_alternative
  - marker: b
    text: «Pozo» conserva la imagen hebrea de בּוֹר; en este contexto también puede referirse a un calabozo o celda de prisión.
    reason: lexical_alternative
  revision_rationale: Se ajusta la cláusula final para expresar mejor la idea de que José no hizo nada que justificara su encarcelamiento, en línea con la revisión del POB inglés. También se mejora la fluidez del énfasis verbal y se refuerza el matiz de «even here» con «aun aquí».
