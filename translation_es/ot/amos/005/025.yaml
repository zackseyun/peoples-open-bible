    rationale: En la evidencia fuente y en el POB inglés, la alternativa específica «grain offering» corresponde a וּמִנְחָה, no a הַזְּבָחִים. El anclaje actual puede confundir qué término hebreo admite esa alternativa.
  - severity: medium
