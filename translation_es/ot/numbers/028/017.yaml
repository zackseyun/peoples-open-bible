revisions:
- from: Y en el día quince de este mes hay una fiesta[a]; durante siete días se comerán panes sin levadura.
  to: Y el día quince de este mes es una fiesta[a]; durante siete días se comerán panes sin levadura.
  rationale: Se ajusta la apertura para un español más natural y fiel al valor temporal del hebreo, y se cambia «hay una fiesta» por «es una fiesta» para reflejar mejor la cláusula nominal de חָג. También se pule la nota léxica para mayor claridad y dignidad estilística, manteniendo la alternativa documentada en el POB inglés.
