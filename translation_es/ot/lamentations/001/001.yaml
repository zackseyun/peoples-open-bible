  to: ¡Cómo está sentada sola la ciudad que antes estaba llena de gente! Se ha vuelto como una viuda, la que era grande entre las naciones, una princesa entre las provincias; ha quedado sometida a trabajos forzados[a].
  rationale: Se reemplaza «se sienta» por «está sentada» para expresar en español natural el estado vívido de desolación que comunica יָשְׁבָה en este lamento. También se mueve el marcador de la nota al término pertinente, «trabajos forzados», ya que la nota explica el valor léxico de מַס.
