translation:
  language: es
  text: Porque si de veras mejoran sus caminos y sus obras[a], si de veras hacen justicia entre un hombre y su prójimo[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «si en verdad enmiendan sus caminos y sus obras». El hebreo usa un infinitivo absoluto con el verbo finito para dar énfasis en ambas cláusulas.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «si de veras hacen justicia entre un hombre y otro».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  english_pob_choice: For if
  chosen_spanish: Porque si
  alternatives_spanish:
  - Pero si
  - Más bien, si
  - Solo si
  lexicon: HALOT
  rationale: La expresión introduce una condición real y enlaza con el contexto previo; «Porque si» conserva el valor conectivo de כִּי y la fuerza condicional de אִם sin volverla rígidamente literal.
- source_word: הֵיטֵיב תֵּיטִיבוּ
  english_pob_choice: you truly make ... good
  chosen_spanish: de veras mejoran
  alternatives_spanish:
  - corrigen profundamente
  - mejoran de veras
  - enmendaran completamente
  lexicon: HALOT
  rationale: El infinitivo absoluto con verbo finito da énfasis. «De veras» comunica esa intensificación en español natural; «mejoran» mantiene el sentido de היטיב sin forzar una paráfrasis excesiva.
- source_word: דַּרְכֵיכֶם
  english_pob_choice: your ways
  chosen_spanish: sus caminos
  alternatives_spanish:
  - su conducta
  - sus sendas
  - su proceder
  lexicon: HALOT
  rationale: «Caminos» preserva la metáfora hebrea de manera clara y bíblica; «conducta» explicaría el sentido, pero pierde la imagen concreta del original.
- source_word: מַעַלְלֵיכֶם
  english_pob_choice: your deeds
  chosen_spanish: sus obras
  alternatives_spanish:
  - sus acciones
  - sus hechos
  - sus prácticas
  lexicon: HALOT
  rationale: El sustantivo se refiere a actos o hechos realizados. «Obras» funciona bien junto a «caminos» y conserva el matiz moral del término sin sobreexplicarlo.
- source_word: אִם עָשׂוֹ תַעֲשׂוּ
  english_pob_choice: if you truly do
  chosen_spanish: si de veras hacen
  alternatives_spanish:
  - si verdaderamente hacen
  - si realmente practican
  - si ciertamente hacen
  lexicon: HALOT
  rationale: La repetición verbal intensifica la afirmación. «De veras» reproduce la fuerza enfática de la construcción hebrea de modo idiomático y legible en español.
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: justicia
  alternatives_spanish:
  - juicio
  - rectitud
  - lo justo
  lexicon: HALOT
  rationale: Aquí el sentido es la práctica de justicia en las relaciones sociales. «Justicia» es la equivalencia más natural y exacta en español moderno.
- source_word: בֵּין אִישׁ וּבֵין רֵעֵהוּ
  english_pob_choice: between a man and his neighbor
  chosen_spanish: entre un hombre y su prójimo
  alternatives_spanish:
  - entre un hombre y otro
  - entre una persona y su prójimo
  - entre un hombre y su vecino
  lexicon: HALOT
  rationale: Se conserva el singular masculino representativo de אִישׁ con «un hombre». «Prójimo» traduce bien רֵעַ en un registro bíblico comprensible y evita restringir el sentido a mera vecindad física.
theological_decisions:
- issue: Valor representativo y generizado de אִישׁ
  english_pob_reading: a man
  chosen_spanish_reading: un hombre
  alternative_spanish_readings:
  - una persona
  - alguien
  rationale: El hebreo usa el sustantivo masculino singular con fuerza representativa en una fórmula social-jurídica. Mantener «un hombre» conserva esa correspondencia sin neutralizar indebidamente el texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Construcción enfática con infinitivo absoluto
  english_pob_reading: you truly make ... good / if you truly do
  chosen_spanish_reading: de veras mejoran / si de veras hacen
  alternative_spanish_readings:
  - mejoran completamente / si realmente hacen
  - enmendan de verdad / si verdaderamente hacen
  rationale: La duplicación verbal hebrea intensifica la acción. En español, un adverbio enfático como «de veras» transmite la fuerza sin añadir contenido ajeno al original.
  doctrine_reference: HALOT; audit trail on infinitive absolute emphasis
translation_notes:
  revision_awareness: Sin revisiones aplicadas en el último pase; el expediente indica acuerdo alto y sin cambios necesarios. La redacción española mantiene la doble cláusula enfática y la equivalencia formal-optativa del audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma predeterminada cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se conserva el registro bíblico de «caminos», «obras» y «justicia» para mantener la red semántica del pasaje.
  - «Prójimo» se usa como equivalente de רֵעַ por claridad y naturalidad en español, sin desplazar el matiz relacional del hebreo.
