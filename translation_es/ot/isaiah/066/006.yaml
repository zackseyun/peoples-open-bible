  - severity: low
    issue: Faltan en notas las alternativas para שָׁאוֹן
    rationale: La auditoría inglesa conserva 'tumult'/'roar' como alternativas léxicas; conviene preservarlas también en español.
  - severity: low
    issue: Los signos de exclamación añaden énfasis no marcado en el hebreo
    rationale: No son herejía ni cambian drásticamente el sentido, pero sí introducen una coloración estilística innecesaria para un texto nominal descriptivo.
  - severity: low
