translation:
  language: es
  text: 'Entonces se acercó Zedequías hijo de Quenaaná y golpeó a Miqueas en la mejilla[a], y dijo: «¿Por qué camino pasó el Espíritu de Yahvé de mí para hablarte?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en la mandíbula»; el hebreo לֶחִי puede referirse a la mejilla o a la zona de la mandíbula.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגַּשׁ
  english_pob_choice: came near
  chosen_spanish: se acercó
  alternatives_spanish:
  - se aproximó
  - vino cerca
  lexicon: HALOT
  rationale: El verbo expresa aproximación física en un contexto de confrontación; «se acercó» es natural en español y conserva el matiz de movimiento hacia el otro.
- source_word: צִדְקִיָּהוּ בֶן־כְּנַעֲנָה
  english_pob_choice: Zedekiah son of Chenaanah
  chosen_spanish: Zedequías hijo de Quenaaná
  alternatives_spanish:
  - Zedecías hijo de Cananá
  - Sedecías hijo de Quenaaná
  lexicon: Transliteración auditada por el POB
  rationale: Se conserva el nombre propio con transliteración coherente al español bíblico moderno. «Hijo de» reproduce la relación filial sin añadir interpretación.
- source_word: וַיַּךְ אֶת־מִיכָיְהוּ עַל־הַלֶּחִי
  english_pob_choice: struck Micaiah on the cheek
  chosen_spanish: golpeó a Miqueas en la mejilla
  alternatives_spanish:
  - abofeteó a Miqueas en la mejilla
  - hirió a Miqueas en la mejilla
  lexicon: HALOT
  rationale: נכה es un verbo amplio de golpear; «golpeó» mantiene neutralidad y fidelidad. «Mejilla» sigue el valor corporal más probable de לֶחִי y sugiere el gesto insultante sin exagerarlo.
- source_word: אֵי זֶה הַדֶּרֶךְ
  english_pob_choice: Which way
  chosen_spanish: ¿Por qué camino?
  alternatives_spanish:
  - ¿De qué manera?
  - ¿Por cuál camino?
  lexicon: HALOT
  rationale: La pregunta es irónica y desafiante; en español, «¿Por qué camino?» conserva la imagen de ruta o vía por la que algo pasa, sin volverla rígidamente literal.
- source_word: עָבַר
  english_pob_choice: did ... pass
  chosen_spanish: pasó
  alternatives_spanish:
  - cruzó
  - se fue
  lexicon: HALOT
  rationale: «Pasó» reproduce el movimiento de transición del espíritu de una fuente a otra, que es el centro de la burla de Zedequías.
- source_word: רוּחַ יְהוָה
  english_pob_choice: the Spirit of Yahweh
  chosen_spanish: el Espíritu de Yahvé
  alternatives_spanish:
  - el espíritu de Yahvé
  - el Espíritu del SEÑOR
  lexicon: HALOT
  rationale: En este contexto profético, רוּחַ יְהוָה designa al Espíritu divino, no al viento ni a una mera disposición. Se capitaliza «Espíritu» para reflejar ese referente, y se usa «Yahvé» conforme al criterio del proyecto para יְהוָה.
- source_word: מֵאִתִּי
  english_pob_choice: from me
  chosen_spanish: desde mí
  alternatives_spanish:
  - de mí
  - apartándose de mí
  lexicon: HALOT
  rationale: La frase marca origen o procedencia. «Desde mí» conserva la idea espacial de movimiento desde la persona que habla y encaja con la ironía del hablante.
- source_word: לְדַבֵּר אֹתָךְ
  english_pob_choice: to speak to you
  chosen_spanish: para hablarte
  alternatives_spanish:
  - para hablar contigo
  - para dirigirse a ti
  lexicon: HALOT
  rationale: En español, «hablarte» expresa con naturalidad la relación directa del verbo דִּבֵּר con la segunda persona. «Para» traduce la finalidad del infinitivo, manteniendo la estructura del hebreo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: the Spirit of Yahweh
  chosen_spanish_reading: el Espíritu de Yahvé
  alternative_spanish_readings:
  - el Espíritu del SEÑOR
  - el espíritu de Yahvé
  rationale: El texto hebreo usa directamente el Tetragrámaton. Siguiendo la política del proyecto, se preserva el nombre divino como «Yahvé» en español, en lugar de sustituirlo por una máscara reverencial.
  doctrine_reference: 'DOCTRINE.md: יְהוָה YHWH'
- issue: Capitalización de «Espíritu»
  english_pob_reading: the Spirit of Yahweh
  chosen_spanish_reading: el Espíritu de Yahvé
  alternative_spanish_readings:
  - el espíritu de Yahvé
  rationale: La mayúscula comunica que se trata del Espíritu divino en un contexto profético, no de viento ni de ánimo humano. En español bíblico esto ayuda a evitar ambigüedad sin alterar el sentido.
  doctrine_reference: Uso contextual de πνεῦμα / רוּחַ
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el único marcador de nota [a] aparezca exactamente en el texto español. La redacción mantiene el contenido auditado del inglés POB y el hebreo base, sin depender mecánicamente del inglés para la elección léxica.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al criterio del proyecto para יְהוָה.
  - Se evitó «SEÑOR» en el texto principal porque el original hebreo nombra explícitamente a Yahvé.
  - «Miqueas» sigue la forma española usual del nombre מִיכָיְהוּ en este contexto.
  - La nota [a] está anclada en el sintagma «en la mejilla[a]» para cumplir la validación.
