translation:
  language: es
  text: 'Y dijeron: «Si hemos hallado favor ante tus ojos, que esta tierra sea dada a tus siervos como posesión. No nos hagas pasar el Jordán[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No nos lleves al otro lado del Jordán». El verbo hebreo es causativo y admite equivalentes cercanos como «hacer pasar» o «llevar al otro lado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מָצָאנוּ חֵן בְּעֵינֶיךָ
  english_pob_choice: if we have found favor in your sight
  chosen_spanish: si hemos hallado favor ante tus ojos
  alternatives_spanish:
  - si hemos hallado gracia ante tus ojos
  - si hemos hallado favor en tus ojos
  lexicon: HALOT
  rationale: Conservo el modismo hebreo de aceptación favorable con «hallado favor». «Ante tus ojos» reproduce bien la imagen relacional de בְּעֵינֶיךָ y evita un calco menos natural como «en tus ojos».
- source_word: יֻתַּן
  english_pob_choice: let this land be given
  chosen_spanish: que esta tierra sea dada
  alternatives_spanish:
  - sea concedida esta tierra
  - que se otorgue esta tierra
  lexicon: HALOT
  rationale: El pasivo exhortativo/jussivo en hebreo pide una forma de ruego en español. «Que ... sea dada» mantiene la estructura de petición sin volverla demasiado interpretativa.
- source_word: הָאָרֶץ הַזֹּאת
  english_pob_choice: this land
  chosen_spanish: esta tierra
  alternatives_spanish:
  - este territorio
  - esta región
  lexicon: HALOT
  rationale: «Tierra» es la equivalencia más directa para אֶרֶץ en un contexto de heredad territorial. «Esta tierra» conserva la deixis del original.
- source_word: לַעֲבָדֶיךָ
  english_pob_choice: to your servants
  chosen_spanish: a tus siervos
  alternatives_spanish:
  - a tus servidores
  - a tus esclavos
  lexicon: HALOT
  rationale: Aquí la autodesignación es deferente en una súplica dirigida a Moisés; por eso «siervos» comunica el tono reverente mejor que «esclavos», sin borrar del todo la relación de subordinación.
- source_word: לַאֲחֻזָּה
  english_pob_choice: as a possession
  chosen_spanish: como posesión
  alternatives_spanish:
  - como heredad
  - como propiedad
  lexicon: HALOT
  rationale: «Posesión» reproduce el sentido de un bien territorial estable y evita introducir «heredad» con una carga más técnica que el hebreo inmediato no exige.
- source_word: אַל תַּעֲבִרֵנוּ אֶת הַיַּרְדֵּן
  english_pob_choice: Do not make us cross the Jordan
  chosen_spanish: No nos hagas pasar el Jordán
  alternatives_spanish:
  - No nos lleves al otro lado del Jordán
  - No nos hagas cruzar el Jordán
  lexicon: HALOT
  rationale: El verbo causativo pide expresar que no los hagan cruzar. «Hacer pasar» conserva el matiz causal mejor que una mera prohibición de cruzar, y «Jordán» es la forma usual del topónimo en español.
theological_decisions:
- issue: Cómo traducir עֲבָדֶיךָ en una súplica sin perder la deferencia ni introducir una categoría eclesiástica posterior
  english_pob_reading: to your servants
  chosen_spanish_reading: a tus siervos
  alternative_spanish_readings:
  - a tus esclavos
  - a tus servidores
  rationale: En este contexto la palabra funciona como fórmula de humildad y subordinación. «Siervos» mantiene el registro reverente y evita el choque semántico que tendría «esclavos» en español, aunque sin eliminar completamente la relación de servicio implícita.
  doctrine_reference: Lexical/theological nuance of servant-language in petition narratives
- issue: La fuerza causativa de אַל תַּעֲבִרֵנוּ
  english_pob_reading: Do not make us cross the Jordan
  chosen_spanish_reading: No nos hagas pasar el Jordán
  alternative_spanish_readings:
  - No nos dejes pasar el Jordán
  - No nos lleves al otro lado del Jordán
  rationale: 'El hebreo usa una forma causativa: no solo piden que no se les permita pasar, sino que no se les obligue a hacerlo. «Hacer pasar» preserva esa fuerza sin perder claridad en español.'
  doctrine_reference: Hebrew causative verbal force / request nuance
translation_notes:
  revision_awareness: 'El pasaje presenta acuerdo alto con la tradición de análisis auditada: la única tensión relevante es la del verbo causativo final. La redacción española preserva esa fuerza con «hacer pasar» y mantiene el resto del versículo cercano al hebreo y al registro petitorio del texto.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto cuando aparezca el tetragrámaton; aquí no aparece en el versículo.
  - Se mantiene «siervos» por el tono deferente de la petición, no como equivalencia automática de δοῦλος en todo contexto.
  - «Tierra» traduce אֶרֶץ en sentido territorial, con «posesión» para לַאֲחֻזָּה.
  - La puntuación conserva la voz directa y la estructura de súplica del original.
