    text: 'O: «su poder crecerá» o «su poder será grande».'
    reason: alternative_reading
  - marker: b
    text: 'O: «el pueblo santo» o «el pueblo de los santos».'
    reason: alternative_reading
  revision_rationale: 'Se ajusta la primera cláusula para reflejar mejor la decisión principal del POB auditado (‘become great’) con un español natural: ‘se hará grande’. También se reemplaza ‘prosperará y hará’ por ‘tendrá éxito y actuará’, que reproduce mejor ‘succeed and act’ y mejora la fluidez. Se conservan las alternativas interpretativas documentadas en notas, con anclajes correctos en el texto.'
