translation:
  language: es
  text: Los lugares altos de Isaac serán desolados[a], y los santuarios de Israel serán devastados[c][b]; me levantaré contra la casa de Jeroboam con la espada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'quedarán desolados'.
    reason: lexical_alternative
  - marker: b
    text: '''Isaac'' es aquí una designación poética del pueblo pactual del norte; algunas traducciones lo simplifican como ''Israel''.'
    reason: alternative_reading
  - marker: c
    text: O 'por la espada'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָשַׁמּוּ
  english_pob_choice: will be made desolate
  chosen_spanish: serán desolados
  alternatives_spanish:
  - serán devastados
  - quedarán desolados
  lexicon: HALOT
  rationale: El nifal de שׁמם expresa quedar en desolación o ser devastado. 'Serán desolados' conserva el valor pasivo/resultativo y suena natural en español bíblico moderno.
- source_word: בָּמוֹת
  english_pob_choice: high places
  chosen_spanish: lugares altos
  alternatives_spanish:
  - altos lugares
  - santuarios en las alturas
  lexicon: HALOT
  rationale: '''Bamot'' designa sitios cultuales elevados. ''Lugares altos'' es claro en español y mantiene el término técnico sin forzar una interpretación más amplia.'
- source_word: יִשְׂחָק
  english_pob_choice: Isaac
  chosen_spanish: Isaac
  alternatives_spanish:
  - Israel
  lexicon: Nombre propio
  rationale: Se conserva el nombre propio 'Isaac' porque el hebreo lo usa deliberadamente como designación poética del pueblo del norte. Sustituirlo por 'Israel' borraría esa tensión literaria.
- source_word: וּמִקְדְּשֵׁי
  english_pob_choice: and the sanctuaries of
  chosen_spanish: y los santuarios de
  alternatives_spanish:
  - y los lugares santos de
  - y los recintos sagrados de
  lexicon: HALOT
  rationale: מקדשׁ apunta a un lugar santo o santuario. 'Santuarios' preserva el matiz cultual mejor que una expresión más genérica.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - el pueblo de Israel
  lexicon: Nombre propio
  rationale: Se mantiene 'Israel' como nombre propio, dejando al lector el sentido contextual de reino del norte.
- source_word: יֶחֱרָבוּ
  english_pob_choice: will be laid waste
  chosen_spanish: serán devastados
  alternatives_spanish:
  - serán arruinados
  - quedarán en ruinas
  lexicon: HALOT
  rationale: חרב expresa ruina, devastación o desolación. 'Serán devastados' comunica con fuerza el juicio y evita repetir demasiado 'desolados'.
- source_word: וְקַמְתִּי
  english_pob_choice: and I will rise against
  chosen_spanish: y me levantaré contra
  alternatives_spanish:
  - y me alzaré contra
  - y surgiré contra
  lexicon: HALOT
  rationale: קום en este contexto tiene fuerza hostil/judicial. 'Me levantaré contra' reproduce bien la oposición activa de Dios.
- source_word: עַל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - sobre
  - contra de
  lexicon: HALOT
  rationale: Con קום, la preposición tiene valor adversativo. 'Contra' expresa mejor el sentido que una traducción espacial literal.
- source_word: בֵּית יָרָבְעָם
  english_pob_choice: the house of Jeroboam
  chosen_spanish: la casa de Jeroboam
  alternatives_spanish:
  - la dinastía de Jeroboam
  - la familia de Jeroboam
  lexicon: HALOT
  rationale: '''Casa de Jeroboam'' conserva el giro dinástico del hebreo בית sin introducir una explicación interpretativa ajena al texto.'
- source_word: בֶּחָרֶב
  english_pob_choice: with the sword
  chosen_spanish: con la espada
  alternatives_spanish:
  - por la espada
  - a filo de espada
  lexicon: HALOT
  rationale: Aunque el inglés POB usa 'with the sword', en español 'con la espada' es la forma idiomática y directa para el instrumento de juicio violento.
theological_decisions:
- issue: Referent de 'Isaac' como designación poética del pueblo del norte
  english_pob_reading: Retain 'Isaac' in the main text as a poetic designation for the people/land associated with the northern kingdom.
  chosen_spanish_reading: Conservar 'Isaac' en el texto principal como designación poética del pueblo del norte.
  alternative_spanish_readings:
  - Sustituirlo por 'Israel' para mayor claridad
  rationale: El hebreo nombra a 'Isaac' intencionalmente. Mantenerlo respeta la textura literaria y la conexión pactual, sin borrar la ambigüedad productiva que ya reconocía el aparato inglés.
  doctrine_reference: Primacía del texto original; no aplanar figuras poéticas cuando son parte del sentido inspirado.
- issue: Fuerza de la acción divina en 'me levantaré contra'
  english_pob_reading: Render as direct divine opposition and judgment.
  chosen_spanish_reading: Traducirlo como oposición divina directa y acto de juicio.
  alternative_spanish_readings:
  - Expresarlo más débilmente como 'actuaré contra'
  rationale: El hebreo presenta a Yahvé tomando posición activa contra la casa de Jeroboam. 'Me levantaré contra' conserva el tono judicial y militar sin suavizarlo.
  doctrine_reference: Fidelidad semántica al lenguaje de juicio divino en el AT.
translation_notes:
  revision_awareness: No se detectaron revisiones aplicadas en el pasaje fuente inglés; el consenso de revisión fue de alta concordancia y no requirió cambios. La versión española mantiene ese mismo nivel de estabilidad textual y de decisiones léxicas.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' no relevante en este versículo, por lo que no aparece ninguna sustitución divina adicional.
  - '''Espada'' se usa como instrumento de juicio, coherente con el giro hebreo בֶּחָרֶב y con el registro bíblico natural en español.'
  - Se conserva la duplicación semántica de desolación/ruina con dos verbos distintos para reflejar los dos miembros paralelos del hebreo sin homogeneizarlos en exceso.
