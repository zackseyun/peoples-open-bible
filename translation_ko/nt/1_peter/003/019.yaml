id: 1PE.3.19
reference: 1 Peter 3:19
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἐν ᾧ καὶ τοῖς ἐν φυλακῇ πνεύμασιν πορευθεὶς ἐκήρυξεν,
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/003/019.yaml
  text: 'in which also he went and proclaimed to the spirits in prison,'
translation:
  language: ko
  text: '그분은 또한 그 영으로[a] 가셔서 옥에 갇혀 있는 영들에게 선포하셨습니다.[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '「그 영으로」(ἐν ᾧ)는 3:18의 πνεύματι를 받는다 — 그리스도가 살리심을 받으신 그 「영」으로.'
    reason: cross_reference
  - marker: b
    text: |
      베드로전서에서 가장 해석이 갈리는 절. 본문은 어느 해석도 강요하지 않는다.

      주요 해석:
      (1) 그리스도가 죽으심과 부활 사이에 음부(Hades) / 옥(φυλακή)에 내려가 거기 있는 영들(타락한 천사들 또는 죽은 자들)에게 선포 — 신조의 「음부에 내려가심」 전통.
      (2) 부활 후 승귀 전 / 또는 승귀 후에, 창세기 6장의 「하나님의 아들들」 곧 타락한 천사들에게 자신의 승리를 선포 (3:20-22의 노아 홍수·천사들의 복종 흐름과 일치).
      (3) 그리스도가 선재하시는 「영」으로 노아 시대에 노아를 통해 그 시대 불순종한 자들에게 (지금은 옥에 있는 영들에게) 회개를 선포.

      한국어 번역은 어느 옵션도 닫지 않도록 직역에 가깝게 둔다. 「선포하셨다」(ἐκήρυξεν)의 내용(구원의 복음인지, 승리의 선포인지, 심판의 선언인지) 또한 본문에 명시되지 않으므로 「선포」로 평이하게 옮긴다.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν ᾧ
  english_pob_choice: in which
  chosen_korean: 그 영으로
  alternatives_korean:
  - 그 안에서
  - 그것으로
  - 그 가운데
  lexicon: BDAG
  rationale: 'ἐν ᾧ의 지시 대상은 3:18의 πνεύματι로 가장 자연스럽게 읽힌다 (Selwyn, Beare 등). 「그 영으로」로 옮긴다. 다른 해석(「그 일 가운데」「그 상태에서」)도 가능하나 가장 일반적 해석을 본문에 두고 다른 옵션은 함의로 남김.'
- source_word: τοῖς ἐν φυλακῇ πνεύμασιν
  english_pob_choice: to the spirits in prison
  chosen_korean: 옥에 갇혀 있는 영들에게
  alternatives_korean:
  - 감옥에 있는 영들에게
  - 갇힌 영들에게
  lexicon: BDAG
  rationale: φυλακή는 「감옥·구금처」. 「옥」으로 옮긴다. 「영들」의 정체(타락한 천사 / 노아 시대 불순종자의 영혼)는 본문에서 닫지 않는다.
- source_word: ἐκήρυξεν
  english_pob_choice: he proclaimed
  chosen_korean: 선포하셨습니다
  alternatives_korean:
  - 선언하셨습니다
  - 전파하셨습니다
  lexicon: BDAG
  rationale: κηρύσσω는 「공식 선포」. 내용은 본문에 명시되지 않으므로 평이한 「선포」로 옮긴다.
theological_decisions:
- issue: 3:19의 옥에 있는 영들에게의 선포 — 음부 강하인가, 노아 시대 선재 그리스도의 선포인가, 부활 후 타락 천사들에게의 승리 선포인가
  chosen_reading: '직역으로 보존; 세 해석을 각주에 명시; 어느 옵션도 본문에서 닫지 않음'
  alternative_readings:
  - 음부 강하설 (전통적 사도신경 「음부에 내려가시고」)
  - 노아 시대 선재 그리스도 선포설 (Augustine, Aquinas)
  - 부활 후 타락한 천사들에게의 승리 선포설 (Dalton, Selwyn — 3:20-22의 흐름과 일치)
  rationale: 베드로전서 3:18-22는 신약에서 가장 해석이 갈리는 단락이다. 본문 자체가 모호하므로 한국어도 「영으로 가셔서 옥에 갇힌 영들에게 선포하셨다」는 직역에 가깝게 옮기고, 해석 옵션은 각주에 모두 명시한다. 어느 한 해석을 본문에 박으면 본문의 정직한 모호성을 침해한다.
  doctrine_reference: 'DOCTRINE.md: 본문의 모호성 보존; 해석을 본문에 박지 말 것'
