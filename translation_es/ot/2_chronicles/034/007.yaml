    rationale: פסילים nombra imágenes esculpidas; aunque sean idolátricas por contexto, «imágenes talladas» preserva mejor la especificidad léxica sin generalizar ni añadir una interpretación innecesaria en el sustantivo principal.
  - severity: medium
