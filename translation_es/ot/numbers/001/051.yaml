translation:
  language: es
  text: Cuando el tabernáculo esté[a] por salir, los levitas lo desmontarán; y cuando el tabernáculo esté por acampar, los levitas lo instalarán. Y el forastero[b] que se acerque será puesto a muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esté por ponerse en marcha»; el hebreo expresa el momento en que el tabernáculo ha de salir o ponerse en marcha.
    reason: lexical_alternative
  - marker: b
    text: O «la persona no autorizada»; el hebreo se refiere a alguien que no tiene permiso para acercarse al santuario.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבִנְסֹעַ
  english_pob_choice: When ... is to set out
  chosen_spanish: Cuando ... esté por ponerse en marcha
  alternatives_spanish:
  - cuando ... salga
  - al ponerse en marcha
  lexicon: HALOT
  rationale: La construcción con infinitivo expresa una situación temporal futura/pendiente. «Esté por ponerse en marcha» conserva la idea de un movimiento inminente del tabernáculo y suena natural en español bíblico moderno.
- source_word: הַמִּשְׁכָּן
  english_pob_choice: the tabernacle
  chosen_spanish: el tabernáculo
  alternatives_spanish:
  - la morada
  - la tienda sagrada
  lexicon: HALOT
  rationale: En este contexto cultual, «tabernáculo» es el término establecido y preciso para el santuario portátil.
- source_word: יוֹרִידוּ אֹתוֹ
  english_pob_choice: shall take it down
  chosen_spanish: lo desmontarán
  alternatives_spanish:
  - lo bajarán
  - lo desarmarán
  lexicon: HALOT
  rationale: El hiphil de ירד aquí se refiere al desmontaje del tabernáculo para el traslado. «Desmontarán» comunica el acto práctico con claridad; «bajarán» sería más literal pero menos idiomático.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  lexicon: HALOT
  rationale: Es la designación tribal y sacerdotal estándar; en español se conserva sin cambio.
- source_word: וּבַחֲנֹת
  english_pob_choice: when ... camps
  chosen_spanish: cuando ... esté por acampar
  alternatives_spanish:
  - cuando ... acampe
  - al acampar
  lexicon: HALOT
  rationale: La forma infinitiva con ב expresa una ocasión temporal. «Esté por acampar» conserva el valor prospectivo y mantiene la paralela simetría con la primera cláusula.
- source_word: יָקִימוּ אֹתוֹ
  english_pob_choice: shall set it up
  chosen_spanish: lo levantarán
  alternatives_spanish:
  - lo erigirán
  - lo montarán
  lexicon: HALOT
  rationale: El hiphil de קום en este contexto significa erigir o levantar la estructura. «Levantarán» mantiene la imagen física y es natural en español; «erigirán» sería más formal, pero menos transparente.
- source_word: וְהַזָּר
  english_pob_choice: the outsider
  chosen_spanish: el extraño
  alternatives_spanish:
  - el forastero
  - el no autorizado
  lexicon: HALOT
  rationale: En lenguaje sacerdotal, זָר no describe principalmente una procedencia étnica sino a quien está fuera de la autorización cultual. «Extraño» reproduce bien esa idea de alguien ajeno a la función sagrada; «no autorizado» aclara, pero pierde la carga semántica del término.
- source_word: הַקָּרֵב
  english_pob_choice: who comes near
  chosen_spanish: que se acerque
  alternatives_spanish:
  - que se aproxime
  - que llegue cerca
  lexicon: HALOT
  rationale: El participio de קרב marca el acto de aproximarse al espacio sagrado. «Que se acerque» es claro y conserva el sentido de aproximación ritual.
- source_word: יוּמָת
  english_pob_choice: shall be put to death
  chosen_spanish: será muerto
  alternatives_spanish:
  - será puesto a muerte
  - morirá
  lexicon: HALOT
  rationale: La forma hophal indica muerte infligida, no solo una consecuencia natural. «Será muerto» conserva la fuerza judicial y solemne del hebreo, aunque suene más bíblico que «será puesto a muerte».
theological_decisions:
- issue: Naturaleza de la pena en יוּמָת
  english_pob_reading: 'judicial/passive: ''shall be put to death'''
  chosen_spanish_reading: «será muerto» como pasiva judicial
  alternative_spanish_readings:
  - «morirá» como consecuencia
  - «será ejecutado»
  rationale: El hophal comunica que la muerte es impuesta. La traducción «será muerto» mantiene el peso legal-sacral sin especificar el agente de la ejecución.
  doctrine_reference: Santidad del santuario y pena por profanación o acceso no autorizado (contexto sacerdotal de Números 1).
- issue: Sentido de זָר
  english_pob_reading: an unauthorized outsider to sanctuary service
  chosen_spanish_reading: «el extraño» como persona ajena y no autorizada
  alternative_spanish_readings:
  - «el forastero»
  - «el no autorizado»
  rationale: En este pasaje el término no debe leerse solo como extranjero étnico. La opción «el extraño» conserva la exclusión cultual implícita en el texto y deja abierta la nota explicativa.
  doctrine_reference: Acceso restringido al tabernáculo y distinción entre los encargados levitas y los demás.
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó la primera cláusula para reflejar mejor la construcción infinitiva («is to set out» / «is to camp»). En español se siguió esa misma decisión con fórmulas prospectivas («esté por ponerse en marcha» / «esté por acampar») para conservar la temporalidad pendiente sin hacerla demasiado mecánica.
  spanish_consistency_notes:
  - Se mantuvo «tabernáculo» para הַמִּשְׁכָּן, en línea con el uso cultual estándar del proyecto.
  - Se evitó «SEÑOR» u otras sustituciones no pertinentes; no hay tétragrama en este versículo.
  - «Levitas» se conserva como nombre propio tribal; no requiere nota adicional.
  - «Será muerto» se eligió por la fuerza judicial del pasivo hebreo, siguiendo la distinción del POB inglés entre mera consecuencia y pena infligida.
