id: LUK.2.29
reference: Luke 2:29
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Νῦν ἀπολύεις τὸν δοῦλόν σου, δέσποτα, κατὰ τὸ ῥῆμά σου ἐν εἰρήνῃ·
base_translation:
  language: en
  yaml_path: translation/nt/luke/002/029.yaml
  text: Now you are dismissing your slave[a], Master, according to your word[b], in peace.
  footnotes:
  - marker: a
    text: Or 'your servant.' The Greek δοῦλος can mean either 'slave' or 'servant'; 'slave' is used here because the paired address 'Master' makes the bond of ownership/service especially explicit.
    reason: lexical_alternative
  - marker: b
    text: The sense is that Simeon is ready to depart this life in peace, though the Greek says more literally 'you are releasing' or 'dismissing.'
    reason: alternative_reading
translation:
  language: ko
  text: 「주재[a]시여, 이제는 당신의 말씀대로 당신의 종을 평안히 놓아 주십니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 「δεσπότης」는 주권자·주인의 의미가 강한 칭호로, 본문은 통상적 「κύριος」 대신 의도적으로 이 어휘를 택한다. 한국어 「주재」로 옮긴다.
    reason: lexical_alternative
lexical_decisions:
- source_word: δέσποτα
  english_pob_choice: Master
  chosen_korean: 주재
  alternatives_korean:
  - 주권자
  - 주인
  lexicon: BDAG
  rationale: δεσπότης는 절대 주권의 칭호이며, 시므온은 자신을 「δοῦλος(종)」으로 부르며 그 대비를 의도한다.
- source_word: τὸν δοῦλόν σου
  english_pob_choice: your slave
  chosen_korean: 당신의 종
  alternatives_korean:
  - 당신의 노예
  lexicon: BDAG
  rationale: 누가의 사용에서 본 어휘는 매임의 폭력성이 아니라 언약적 종됨을 강조한다. 합쇼체 시적 어조에서 「종」이 자연스럽다.
theological_decisions:
- issue: 시므온의 송가(Nunc Dimittis) 2:29-32의 신현·구원사적 어조
  chosen_reading: 송가 전체를 합쇼체 시적 어조로 옮기고 신적 주권 강조를 위해 δεσπότης를 「주재」로 명시한다
  alternative_readings:
  - 전통적 「주(님)」로 단순화
  - 사가체로 옮김
  rationale: 본 송가는 사 40-55의 종의 노래와 사 49:6의 이방의 빛을 직접 반향한다. 「당신의 구원」(2:30), 「만민 앞에서 예비하신」(2:31), 「이방을 비추는 빛」(2:32a), 「당신의 백성 이스라엘의 영광」(2:32b)의 네 행은 종말론적 보편성을 분명히 한다. δεσπότης→δοῦλος 대비를 한국어에서도 살린다.
  doctrine_reference: 'DOCTRINE.md: Isaianic Servant echoes'
