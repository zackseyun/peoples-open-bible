translation_notes:
  revision_awareness: 'El estado de revisión indica que la redacción inglesa anterior para 2 Esdras 11:27 estaba desalineada por versificación y que la corrección restablece la secuencia latina de este versículo: «uelocius quam prior non conparuit. Et uidi et ecce duae quae». La versión española sigue esa corrección y no incorpora el contenido de 11:28.'
  spanish_consistency_notes:
  - Se mantiene un español sobrio y publicable, con sintaxis que refleja la clausura incompleta del fragmento fuente.
  - Se usa «apareció»/«desapareció» para conservar la tensión semántica del latín sin imponer una interpretación adicional.
  - La nota alternativa en [a] preserva el vínculo con el aparato inglés, pero se marca como lectura alternativa porque pertenece al material previo desalineado.
