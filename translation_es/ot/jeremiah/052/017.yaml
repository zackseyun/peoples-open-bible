translation:
  language: es
  text: Y los caldeos hicieron pedazos las columnas de bronce que pertenecían a la casa de Yahvé, y los soportes[a], y el mar de bronce que estaba en la casa de Yahvé, y llevaron a Babilonia todo su bronce.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las bases», para מְכֹנוֹת, refiriéndose a los soportes del templo descritos en otros pasajes.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַמּוּדֵי הַנְּחֹשֶׁת
  english_pob_choice: the bronze pillars
  chosen_spanish: las columnas de bronce
  alternatives_spanish:
  - los pilares de bronce
  - las columnas de cobre
  lexicon: HALOT
  rationale: עַמּוּדֵי son soportes verticales; en español 'columnas' comunica con naturalidad la forma arquitectónica. 'Bronce' conserva el valor contextual de נְחֹשֶׁת en el mobiliario del templo; 'cobre' es posible, pero menos preciso en este contexto.
- source_word: אֲשֶׁר לְבֵית יְהוָה
  english_pob_choice: that belonged to the house of Yahweh
  chosen_spanish: que estaban en la casa de Yahvé
  alternatives_spanish:
  - que pertenecían a la casa de Yahvé
  - que eran para la casa de Yahvé
  lexicon: HALOT
  rationale: El hebreo con לְ- en בֵית sugiere relación/pertinencia, pero el paralelo inmediato con בְּבֵית favorece una referencia de ubicación en español. 'Estaban en' evita forzar una posesión que el hebreo no explicita aquí.
- source_word: הַמְּכֹנוֹת
  english_pob_choice: the stands
  chosen_spanish: los basamentos
  alternatives_spanish:
  - los soportes
  - las bases
  lexicon: HALOT
  rationale: מְכֹנוֹת puede referirse a bases o pedestales de los utensilios del templo. 'Basamentos' mantiene la idea de una base estructural sin sonar demasiado técnico; se conserva la alternativa en nota por la tensión lexical.
- source_word: יָם הַנְּחֹשֶׁת
  english_pob_choice: the bronze Sea
  chosen_spanish: el mar de bronce
  alternatives_spanish:
  - el Mar de bronce
  - la gran pila de bronce
  lexicon: HALOT
  rationale: '''Mar de bronce'' reproduce el nombre tradicional del gran recipiente del templo sin añadir interpretación. Se evita traducirlo como ''pila'' para no debilitar la designación estable del objeto.'
- source_word: אֲשֶׁר בְּבֵית יְהוָה
  english_pob_choice: that was in the house of Yahweh
  chosen_spanish: que estaba en la casa de Yahvé
  alternatives_spanish:
  - que estaba en el templo de Yahvé
  lexicon: HALOT
  rationale: El בְּ- indica localización directa. 'Casa de Yahvé' conserva la relación cultual y el lenguaje del texto; 'templo' sería una clarificación posible, pero menos pegada al hebreo.
- source_word: שִׁבְּרוּ
  english_pob_choice: broke in pieces
  chosen_spanish: rompieron en piezas
  alternatives_spanish:
  - quebraron
  - despedazaron
  lexicon: HALOT
  rationale: El verbo expresa desarmar/fragmentar objetos grandes para su traslado. 'Rompieron en piezas' mantiene el sentido práctico de demolición sin exagerar con un matiz más violento que el hebreo demande.
- source_word: כַשְׂדִּים
  english_pob_choice: the Chaldeans
  chosen_spanish: los caldeos
  alternatives_spanish:
  - los babilonios
  lexicon: HALOT
  rationale: Se conserva 'caldeos' porque ese es el etnónimo del hebreo y el elegido por el POB en inglés. 'Babilonios' aclararía, pero perdería la textura histórica del término.
- source_word: וַיִּשְׂא֥וּ
  english_pob_choice: carried
  chosen_spanish: se llevaron
  alternatives_spanish:
  - cargaron
  - transportaron
  lexicon: HALOT
  rationale: Aquí נשא implica llevarse el botín. 'Se llevaron' resulta natural en español y comunica la acción de traslado de los metales al exilio.
- source_word: כָּל נְחֻשְׁתָּם
  english_pob_choice: all their bronze
  chosen_spanish: todo su bronce
  alternatives_spanish:
  - todo el bronce de ellos
  - todo el bronce perteneciente a ellos
  lexicon: HALOT
  rationale: El sufijo pronominal se refiere a los objetos mencionados; en español, 'su bronce' reproduce la referencia colectiva sin sobredeterminar la relación semántica.
- source_word: בָּבֶלָה
  english_pob_choice: to Babylon
  chosen_spanish: a Babilonia
  alternatives_spanish:
  - hacia Babilonia
  lexicon: HALOT
  rationale: El sufijo direccional expresa movimiento hacia Babilonia. 'A Babilonia' es la forma idiomática y clara en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se aplica el estándar del proyecto para el Tetragrámaton: ''Yahvé''. Mantiene el nombre divino propio en lugar de sustituirlo por un título.'
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa el nombre propio del pacto, no un título. En español del proyecto, 'Yahvé' conserva esa distinción y evita la sustitución por 'Señor'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Identificación de los objetos del templo y su traslado
  english_pob_reading: the bronze pillars ... the stands ... the bronze Sea ... carried all their bronze to Babylon
  chosen_spanish_reading: las columnas de bronce ... los basamentos ... el mar de bronce ... se llevaron a Babilonia todo su bronce
  alternative_spanish_readings:
  - los pilares de bronce ... las bases ... el Mar de bronce ... llevaron todo su bronce a Babilonia
  rationale: La enumeración es un inventario de objetos concretos del templo; la traducción debe mantener la secuencia y la materialidad sin suavizarla. 'Basamentos' y 'mar de bronce' preservan la tensión de nombres de objetos frente a descripciones comunes.
  doctrine_reference: No doctrinal issue beyond source fidelity; temple-furnishing inventory should remain concrete and auditable.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del POB inglés que ajustó 'belonged to' a 'were in' para reflejar mejor לְ/בֵית frente a בְּבֵית, y la preferencia por mantener 'Chaldeans' y 'bronze Sea'. La versión española refleja esa distinción con 'estaban en' para la primera cláusula y 'que estaba en' para la segunda, además de conservar el inventario concreto de objetos del templo.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' de forma consistente para יְהוָה.
  - Se evitó 'Señor' para no ocultar el nombre divino.
  - '''Caldeos'' se conserva como etnónimo histórico, paralelo al inglés auditado.'
  - '''Mar de bronce'' se mantiene como nombre estable del objeto cultual.'
  - 'La secuencia de objetos sigue el orden hebreo: columnas, basamentos, mar de bronce, luego el traslado del bronce a Babilonia.'
