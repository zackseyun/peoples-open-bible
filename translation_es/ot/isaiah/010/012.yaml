translation:
  language: es
  text: Y sucederá que, cuando el Señor haya terminado toda su obra en el monte Sion y en Jerusalén, yo castigaré[a] el fruto de la grandeza del corazón del rey de Asiria[b], y el esplendor de la altivez de sus ojos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «llamaré a cuentas». El verbo hebreo puede expresar una visita divina para juicio, no solo un castigo retributivo.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «el fruto de la grandeza del corazón del rey de Asiria».'
    reason: lexical_alternative
  - marker: c
    text: 'Lit.: «el esplendor de la altura de sus ojos», es decir, la mirada altiva o soberbia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And it will happen
  chosen_spanish: Y sucederá
  alternatives_spanish:
  - Y ocurrirá
  - Y acontecerá
  lexicon: HALOT
  rationale: La fórmula introduce un cambio de situación futura; «sucederá» conserva el valor discursivo sin sonar arcaico en español.
- source_word: כִּי
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - que
  - pues
  lexicon: HALOT
  rationale: En esta construcción temporal con וְהָיָה, la relación es de tiempo, por lo que «cuando» expresa mejor el sentido.
- source_word: יְבַצַּע
  english_pob_choice: has finished
  chosen_spanish: haya terminado
  alternatives_spanish:
  - termine
  - haya completado
  lexicon: HALOT
  rationale: El piel expresa llevar algo a su culminación; el perfecto subordinado en español transmite bien la anterioridad temporal dentro de la cláusula con «cuando».
- source_word: אֲדֹנָי
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - el Dueño
  lexicon: HALOT
  rationale: Aunque el hebreo aquí usa el título אֲדֹנָי, el contexto de Isaías y la política terminológica del proyecto favorecen nombrar a la deidad como «Yahvé» en el texto principal. No se trata del Tetragrámaton escrito, pero la referencia es al Dios de Israel, y la traducción auditable debe conservar esa identificación sin máscara reverencial.
- source_word: כָּל מַעֲשֵׂהוּ
  english_pob_choice: all his work
  chosen_spanish: toda su obra
  alternatives_spanish:
  - toda su labor
  - todo lo que hace
  lexicon: HALOT
  rationale: «Obra» mantiene el alcance total del sustantivo colectivo sin reducirlo a una acción aislada; «toda su obra» es idiomática en español y conserva la amplitud del hebreo.
- source_word: בְּהַר צִיּוֹן וּבִירוּשָׁלָם
  english_pob_choice: on Mount Zion and in Jerusalem
  chosen_spanish: en el monte Sion y en Jerusalén
  alternatives_spanish:
  - sobre el monte Sion y en Jerusalén
  - contra el monte Sion y Jerusalén
  lexicon: HALOT
  rationale: Se mantiene el valor locativo de בְּ sin convertirlo en adversativo. «En el monte Sion y en Jerusalén» respeta la construcción y evita sobreinterpretar el lugar como objeto de ataque en esta cláusula.
- source_word: אֶפְקֹד עַל
  english_pob_choice: I will punish
  chosen_spanish: yo castigaré
  alternatives_spanish:
  - yo llamaré a cuentas
  - yo visitaré juicio sobre
  lexicon: HALOT
  rationale: En contextos de juicio, פקד עַל puede significar castigar o pedir cuentas. «Castigaré» expresa la fuerza judicial de manera natural en español, sin perder la posibilidad semántica de rendir cuentas.
- source_word: פְּרִי
  english_pob_choice: the fruit
  chosen_spanish: el fruto
  alternatives_spanish:
  - el resultado
  - el producto
  lexicon: HALOT
  rationale: Se conserva la metáfora vegetal del hebreo. «Fruto» permite ver el efecto producido por la actitud del rey, en lugar de aplanarlo en una explicación abstracta.
- source_word: גֹדֶל לְבַב
  english_pob_choice: the greatness of the heart
  chosen_spanish: la grandeza del corazón
  alternatives_spanish:
  - la soberbia del corazón
  - la arrogancia del corazón
  lexicon: HALOT
  rationale: La secuencia literal se mantiene para no borrar la tensión lexical. Aunque el sentido contextual es negativo, «grandeza» preserva la imagen hebrea de magnitud interior que el lector debe evaluar por el contexto.
- source_word: מֶלֶךְ אַשּׁוּר
  english_pob_choice: the king of Assyria
  chosen_spanish: el rey de Asiria
  alternatives_spanish:
  - el rey asirio
  lexicon: HALOT
  rationale: Construcción normal y transparente en español para la cadena constructa con el nombre propio.
- source_word: תִּפְאֶרֶת
  english_pob_choice: the splendor
  chosen_spanish: el esplendor
  alternatives_spanish:
  - la gloria
  - el boato
  lexicon: HALOT
  rationale: «Esplendor» conserva el valor de brillo, magnificencia o gloria visible sin imponer un matiz excesivamente litúrgico.
- source_word: רוּם עֵינָיו
  english_pob_choice: his haughty eyes
  chosen_spanish: la altivez de sus ojos
  alternatives_spanish:
  - la altura de sus ojos
  - sus ojos altivos
  lexicon: HALOT
  rationale: El hebreo dice literalmente «la elevación/altura de sus ojos», un modismo de orgullo. «Altivez» en español comunica la arrogancia del gesto ocular y preserva la imagen sin sonar extraño.
theological_decisions:
- issue: 'Cómo traducir el sujeto divino: אֲדֹנָי en un versículo donde la política del proyecto prefiere «Yahvé»'
  english_pob_reading: The Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - el Señor Dios
  rationale: El texto hebreo usa el título אֲדֹנָי, pero el contexto profético remite inequívocamente al Dios de Israel. Siguiendo la política del proyecto, se evita la máscara reverencial «SEÑOR» y se nombra a Dios como «Yahvé» para mantener auditabilidad y consistencia con el resto del cuerpo español.
  doctrine_reference: Terminología divina del proyecto POB.
- issue: Si la cláusula locativa debe volverse adversativa por el juicio sobre Jerusalén
  english_pob_reading: Rendered locatively as 'on Mount Zion and in Jerusalem' without specifying 'against'
  chosen_spanish_reading: en el monte Sion y en Jerusalén
  alternative_spanish_readings:
  - contra el monte Sion y Jerusalén
  rationale: 'El hebreo usa בְּ con valor locativo. Traducir «contra» resolvería prematuramente la tensión interpretativa y desplazaría el foco del texto: Yahvé completa su obra en ese ámbito antes de visitar juicio sobre Asiria. Se conserva así la tensión teológica sin simplificarla.'
  doctrine_reference: Preservar la tensión teológica del pasaje.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés: la traducción inglesa preserva la decisión de leer בְּ como locativo y de mantener la metáfora «fruit / greatness of heart / splendor of his haughty eyes». El español conserva esas tensiones, pero adopta terminología propia del proyecto (especialmente «Yahvé») y naturaliza la sintaxis sin perder la transparencia lexical.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el sujeto divino conforme a la política del proyecto.
  - «Monte Sion» y «Jerusalén» se conservan con valor locativo, sin introducir «contra».
  - Se preserva la metáfora de «fruto» y la secuencia literal «grandeza del corazón» para no borrar el matiz hebreo.
  - «Altivez de sus ojos» recoge el modismo de ojos elevados/hinchados de orgullo en español natural.
  - Las notas a pie distinguen entre alternativa lexical y glosa literal, siguiendo el patrón auditable del POB.
