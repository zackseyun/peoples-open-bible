translation:
  language: es
  text: Pues la longitud de las cámaras que estaban junto al atrio exterior era de cincuenta codos[a], y he aquí, delante del templo era de cien codos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «frente al templo era de cien codos». La frase hebrea puede describir el lado de las cámaras que mira al templo o la medida del espacio delante del templo.'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque así
  lexicon: HALOT
  rationale: Introduce una explicación o continuación lógica de la descripción de medidas. 'Porque' mantiene el flujo discursivo del hebreo mejor que una simple marca expositiva y es natural en español bíblico moderno.
- source_word: אֹרֶךְ
  english_pob_choice: length
  chosen_spanish: longitud
  alternatives_spanish:
  - largo
  - extensión
  lexicon: HALOT
  rationale: En un contexto arquitectónico y de medición, 'longitud' es claro, preciso y evita ambigüedad con una cualidad general de tamaño.
- source_word: לְשָׁכוֹת
  english_pob_choice: chambers
  chosen_spanish: cámaras
  alternatives_spanish:
  - salas
  - aposentos
  lexicon: HALOT
  rationale: En la visión del templo se trata de espacios arquitectónicos laterales. 'Cámaras' conserva el valor técnico de la serie visionaria y evita reducirlo a habitaciones comunes.
- source_word: אֲשֶׁר לֶחָצֵר הַחִיצוֹנָה
  english_pob_choice: that were by the outer court
  chosen_spanish: que estaban junto al atrio exterior
  alternatives_spanish:
  - que estaban junto al patio exterior
  - que pertenecían al atrio exterior
  lexicon: HALOT
  rationale: '''Atrio exterior'' reproduce el término cultual con naturalidad en español. ''Junto a'' expresa adecuadamente la relación espacial sin imponer una idea de pertenencia que el hebreo no obliga.'
- source_word: חֲמִשִּׁים אַמָּה
  english_pob_choice: fifty cubits
  chosen_spanish: de cincuenta codos
  alternatives_spanish:
  - cincuenta codos
  - de cincuenta medidas de codo
  lexicon: HALOT
  rationale: Se conserva la unidad bíblica tradicional 'codos' para mantener el sistema de medidas del texto y su registro arquitectónico.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y he aquí que
  lexicon: HALOT
  rationale: '''Y he aquí'' preserva el giro de atención y el tono solemne de la visión, sin sonar excesivamente coloquial.'
- source_word: עַל פְּנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - frente a
  - ante
  lexicon: HALOT
  rationale: El hebreo es espacial e idiomático; 'delante de' mantiene la relación de ubicación sin añadir una interpretación demasiado específica. El español admite esta construcción con naturalidad.
- source_word: הַהֵיכָל
  english_pob_choice: the temple
  chosen_spanish: el templo
  alternatives_spanish:
  - el edificio del templo
  - el santuario
  lexicon: HALOT
  rationale: '''Templo'' es la forma más clara y directa para el complejo cultual en este contexto visionario.'
- source_word: מֵאָה אַמָּה
  english_pob_choice: a hundred cubits
  chosen_spanish: de cien codos
  alternatives_spanish:
  - cien codos
  - de ciento de codos
  lexicon: HALOT
  rationale: Se mantiene la misma unidad y el mismo patrón de medida que en la primera mitad del versículo, conservando la simetría del texto.
theological_decisions:
- issue: Valor espacial de עַל פְּנֵי הַהֵיכָל
  english_pob_reading: before the temple it was a hundred cubits
  chosen_spanish_reading: delante del templo era de cien codos
  alternative_spanish_readings:
  - frente al templo era de cien codos
  - la parte frente al templo era de cien codos
  rationale: El hebreo admite una relación espacial que puede referirse al área situada ante el templo o al lado que mira al templo. La formulación española conserva esa ambigüedad sin introducir 'parte', que no está en el texto, y sin cerrar indebidamente la lectura.
  doctrine_reference: No doctrinal issue; architectural/semantic ambiguity in prophetic vision text.
translation_notes:
  revision_awareness: La redacción sigue de cerca la última revisión inglesa, que sustituyó una formulación más interpretativa por una más literal respecto de עַל פְּנֵי הַהֵיכָל. En español se evitó añadir elementos como 'parte' y se mantuvo la medida paralela de ambos miembros del versículo.
  spanish_consistency_notes:
  - Se mantuvo 'codos' para las unidades de medida, coherente con el registro arquitectónico del pasaje.
  - Se usó 'atrio exterior' para armonizar con el vocabulario cultual estándar del contexto visionario.
  - Se preservó la ambigüedad espacial de עַל פְּנֵי mediante 'delante de', con nota alternativa para la otra posibilidad semántica.
