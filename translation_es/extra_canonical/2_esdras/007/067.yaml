translation:
  language: es
  text: porque no conocen los tormentos, ni la salvación prometida para después de la muerte. Pero en cuanto a nosotros,
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: cruciamenta
  english_pob_choice: torments
  chosen_spanish: tormentos
  alternatives_spanish:
  - suplicios
  - padecimientos
  lexicon: cruciamenta → tormenta/tormento (sentido de castigo y dolor intenso)
  rationale: El latín pluraliza la idea de sufrimientos punitivos; «tormentos» conserva el plural y la fuerza de castigo sin suavizar el término. «Suplicios» es posible, pero en español puede sonar más técnico o jurídico.
- source_word: salutem
  english_pob_choice: salvation
  chosen_spanish: salvación
  alternatives_spanish:
  - liberación
  - rescate
  lexicon: salus → salvación/salud (aquí, sentido escatológico)
  rationale: El contexto contrapone tormentos y una salvación futura; «salvación» comunica mejor el valor escatológico y coincide con el campo semántico del latín en este pasaje.
- source_word: post mortem repromissam sibi
  english_pob_choice: promised to them after death
  chosen_spanish: prometida después de la muerte
  alternatives_spanish:
  - prometida para después de la muerte
  - prometida tras la muerte
  lexicon: repromitto → prometer de nuevo / prometer solemnemente
  rationale: El latín indica una promesa futura vinculada al tiempo posterior a la muerte. «Prometida después de la muerte» mantiene la estructura breve y natural en español, sin introducir explicaciones ajenas al texto.
theological_decisions:
- issue: Alcance de la promesa post mortem
  english_pob_reading: the salvation promised to them after death
  chosen_spanish_reading: la salvación prometida después de la muerte
  alternative_spanish_readings:
  - la salvación que les fue prometida tras la muerte
  - la salvación prometida para después de morir
  rationale: 'Se preserva la afirmación escatológica tal como aparece en el latín: una salvación vinculada a la esfera post mortem. No se atenúa ni se reinterpreta como mera liberación terrenal.'
  doctrine_reference: Esperanza escatológica / juicio y destino después de la muerte en literatura apocalíptica
translation_notes:
  revision_awareness: 'La revisión más reciente corrigió un error grave de alineación versicular: este segmento corresponde a 2 Esdras 7:67 y debe reflejar el latín «nec enim sciunt cruciamenta nec salutem post mortem repromissam sibi. Nobis autem», no la cláusula anterior sobre «quid prodest». Por eso el español se limita a «porque no conocen...» y conserva el giro final abierto «Pero en cuanto a nosotros,» para respetar la transición textual.'
  spanish_consistency_notes:
  - Se mantiene «salvación» en sentido escatológico, no como bienestar general.
  - Se preserva el inicio causal «porque» para reflejar nec enim en la secuencia argumentativa.
  - El cierre con coma después de «nosotros» refleja que el latín continúa en el siguiente versículo.
