translation:
  language: es
  text: Entonces fui y lo escondí junto al Éufrates[a], como Yahvé me había mandado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo Perat, generalmente entendido como el Éufrates; algunos lo toman como un topónimo local, «Perat».
    reason: alternative_reading
lexical_decisions:
- source_word: וָ/אֵלֵךְ
  english_pob_choice: So I went
  chosen_spanish: Así fui
  alternatives_spanish:
  - Y fui
  - Entonces fui
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol avanza la acción en secuencia. «Así fui» conserva la sucesión y suena natural en español sin perder el valor de respuesta obediente implícito en el contexto.
- source_word: וָ/אֶטְמְנֵ֖/הוּ
  english_pob_choice: hid it
  chosen_spanish: lo escondí
  alternatives_spanish:
  - lo oculté
  - lo enterré
  lexicon: HALOT
  rationale: טמן puede ser 'esconder/ocultar'. «Lo escondí» mantiene el sentido amplio sin especificar un modo de ocultación que el texto no exige; «lo enterré» sería demasiado preciso.
- source_word: בִּ/פְרָ֑ת
  english_pob_choice: by the Euphrates
  chosen_spanish: junto al Éufrates
  alternatives_spanish:
  - en Perat
  - junto a Perat
  lexicon: HALOT
  rationale: La lectura más extendida identifica פְרָת con el Éufrates. El hebreo permite un valor locativo flexible de ב, por lo que «junto al» comunica con naturalidad que fue ocultado cerca de ese lugar.
- source_word: כַּ/אֲשֶׁ֛ר
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - tal como
  - así como
  lexicon: HALOT
  rationale: Introduce conformidad con la orden recibida. «Como» reproduce la relación de manera breve y clara en español.
- source_word: צִוָּ֥ה
  english_pob_choice: had commanded
  chosen_spanish: me había mandado
  alternatives_spanish:
  - me había ordenado
  - me mandó
  lexicon: HALOT
  rationale: El pluscuamperfecto español refleja adecuadamente que la orden precede a la acción narrada. «Mandado» conserva un registro bíblico sobrio y fiel al campo semántico de צוה.
- source_word: יְהוָ֖ה
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: La norma del proyecto exige «Yahvé» para יהוה. Aquí no hay cita griega ni razón contextual para enmascarar el nombre divino.
- source_word: אוֹתִֽ/י
  english_pob_choice: me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: HALOT
  rationale: El sufijo de objeto directo de primera persona se expresa naturalmente con «me» en español.
theological_decisions:
- issue: Identificación de פְרָת
  english_pob_reading: the Euphrates
  chosen_spanish_reading: el Éufrates
  alternative_spanish_readings:
  - Perat como topónimo local no identificado
  rationale: La identificación lexical más directa de פְרָת es el Éufrates. Sin embargo, se mantiene en nota la posibilidad discutida de un topónimo local, sin resolverla dogmáticamente más allá de la evidencia textual.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés están en alto acuerdo; no hay revisiones aplicadas. La draft española conserva la misma decisión de fondo sobre פְרָת y mantiene el sentido narrativo y obediencial del versículo.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יהוה, conforme a la política del proyecto.
  - «Mandado» mantiene un registro bíblico claro y evita volverlo excesivamente coloquial.
  - «Lo escondí» preserva la ambigüedad del acto sin añadir el detalle de 'enterrar'.
  - La nota al pie solo cubre la alternativa textual sobre פְרָת, siguiendo el tratamiento auditado del inglés.
