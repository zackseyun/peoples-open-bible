translation:
  language: es
  text: Ahora bien, los hechos de David el rey[a], los primeros y los últimos, están escritos en los registros[b] de Samuel el vidente[c], y en los registros de Natán el profeta, y en los registros de Gad el vidente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las palabras o asuntos de David el rey, los primeros y los últimos». El modismo hebreo se refiere a los acontecimientos o hechos de su reinado.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «escritos sobre las palabras de Samuel ... Natán ... Gad»; aquí «registros» expresa que se trata de documentos escritos.'
    reason: lexical_alternative
  - marker: c
    text: Tanto רֹאֶה como חֹזֶה se traducen aquí «vidente»; alternativamente, חֹזֶה puede verterse «visionario» para conservar la distinción léxica.
    reason: lexical_alternative
lexical_decisions:
- source_word: דִּבְרֵי
  english_pob_choice: acts
  chosen_spanish: hechos
  alternatives_spanish:
  - palabras
  - asuntos
  - acontecimientos
  - registros
  lexicon: HALOT
  rationale: El hebreo דִבְרֵי, en esta construcción sobre David y su reinado, no apunta simplemente a palabras pronunciadas, sino al conjunto de hechos o asuntos de su vida y gobierno. En español, «hechos» comunica bien ese sentido histórico y evita reducirlo a un material meramente verbal.
- source_word: הָרִאשֹׁנִים וְהָאֲחֲרֹנִים
  english_pob_choice: the former and the latter
  chosen_spanish: los primeros y los últimos
  alternatives_spanish:
  - los anteriores y los posteriores
  - de primero a último
  lexicon: HALOT
  rationale: La expresión hebrea funciona como merismo para abarcar todo el período. «Los primeros y los últimos» mantiene la forma de la frase y su alcance total sin volverla demasiado explicativa.
- source_word: הִנָּם כְּתוּבִים
  english_pob_choice: are written
  chosen_spanish: están escritos
  alternatives_spanish:
  - están escritos de hecho
  - he aquí que están escritos
  lexicon: HALOT
  rationale: La partícula enfática hebrea se deja implícita porque en español «están escritos» ya expresa con naturalidad la afirmación documental. No hacía falta forzar un «he aquí» en el texto principal.
- source_word: עַל דִּבְרֵי שְׁמוּאֵל
  english_pob_choice: in the records of Samuel
  chosen_spanish: en los registros de Samuel
  alternatives_spanish:
  - sobre los escritos de Samuel
  - en las palabras de Samuel
  lexicon: HALOT
  rationale: Aquí עַל introduce la fuente documental. «En los registros de» reproduce el sentido de lugar documental en español con naturalidad y conserva la idea de material escrito usada en el audit trail inglés.
- source_word: הָרֹאֶה
  english_pob_choice: the seer
  chosen_spanish: el vidente
  alternatives_spanish:
  - el seer
  - el visionario
  lexicon: HALOT
  rationale: Para רֹאֶה, «vidente» es un equivalente español directo y bíblicamente inteligible. Se evita «seer», que no es idiomático en español, y también «visionario», que puede sonar moderno en un sentido ajeno al título profético.
- source_word: דִּבְרֵי נָתָן
  english_pob_choice: the records of Nathan
  chosen_spanish: los registros de Natán
  alternatives_spanish:
  - las palabras de Natán
  - las crónicas de Natán
  lexicon: HALOT
  rationale: Se mantiene la solución documental «registros» para la repetición de דִּבְרֵי en la lista de fuentes. Así se preserva la referencia a documentos escritos y no sólo a discursos.
- source_word: הַנָּבִיא
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  alternatives_spanish:
  - el profeta de Dios
  lexicon: HALOT
  rationale: La palabra hebrea נָבִיא tiene el equivalente español estándar «profeta». No se requiere expansión adicional.
- source_word: דִּבְרֵי גָּד
  english_pob_choice: the records of Gad
  chosen_spanish: los registros de Gad
  alternatives_spanish:
  - las palabras de Gad
  - las crónicas de Gad
  lexicon: HALOT
  rationale: Se traduce igual que las ocurrencias anteriores de דִּבְרֵי, conservando la coherencia documental del versículo.
- source_word: הַחֹזֶה
  english_pob_choice: the seer
  chosen_spanish: el vidente
  alternatives_spanish:
  - el seer
  - el visionario
  lexicon: HALOT
  rationale: חֹזֶה y רֹאֶה son títulos proféticos relacionados, pero distintos en hebreo. En español, «vidente» funciona como equivalente común para ambos; la distinción lexical se conserva sólo en la nota, ya que no hay dos términos igualmente naturales que reproduzcan la diferencia sin perder claridad.
theological_decisions:
- issue: Distinción entre רֹאֶה y חֹזֶה como títulos proféticos
  english_pob_reading: Both rendered 'seer' in the main text, with a note that חֹזֶה could be 'visionary'
  chosen_spanish_reading: Ambos se traducen como «vidente» en el texto principal, con nota que reconoce la distinción lexical y la alternativa «visionario» para חֹזֶה
  alternative_spanish_readings:
  - traducir uno como «vidente» y el otro como «visionario»
  - usar «seer» como préstamo técnico
  rationale: La diferencia entre los dos títulos es real en hebreo, pero aquí es más lexical e histórica que doctrinal. En español, «vidente» es la opción más natural y transparente para ambos, mientras que la nota conserva la tensión y la posibilidad alternativa sin sobrecargar el verso.
  doctrine_reference: Translation philosophy §§5–6; consistencia terminológica con excepción documentada
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del audit trail inglés, que prefirió «the former and the latter» frente a una paráfrasis temporal más libre. Por eso el español conserva una estructura formal equivalente («los primeros y los últimos») y mantiene el carácter documental de «records» con «registros».
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparece; en este versículo no aparece.
  - Se conserva «Mesías/Cristo» fuera de este pasaje; aquí no aplica.
  - «Vidente» se usa de manera consistente para רֹאֶה y חֹזֶה, siguiendo la decisión auditada de preservar el título profético sin calco innecesario.
  - «Registros» refleja el matiz documental de דִּבְרֵי en este contexto y se mantiene repetido para las tres fuentes.
  - La puntuación y el orden de miembros siguen el paralelismo hebreo sin introducir explicaciones extra en el texto principal.
