revisions:
- from: 'De Jedutún: los hijos de Jedutún — Gedalías, Zeri, Jesaías, Hasabías y Matitías, seis—, bajo la dirección de su padre Jedutún, quien profetizaba con el lira,[a] dando gracias y alabanza a Yahvé.'
