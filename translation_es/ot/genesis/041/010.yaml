base_translation:
  language: en
  yaml_path: translation/ot/genesis/041/010.yaml
  text: Pharaoh was angry with his servants[a], and he put me in custody in the house of the captain of the guard[b], me and the chief baker.
  footnotes:
  - marker: a
    text: Or 'under guard'; the Hebrew term denotes guarded confinement and need not specify a formal prison building.
    reason: lexical_alternative
  - marker: b
    text: '''Captain of the guard'' renders a court title that is more literally ''chief of the slaughterers/executioners.'''
    reason: lexical_alternative
