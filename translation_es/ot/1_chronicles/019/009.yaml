review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura y el sentido del hebreo: salida de los amonitas/hijos de Amón, formación militar junto a la ciudad, y contraste con los reyes aliados separados en el campo. También conserva adecuadamente la precisión de פתח como ''entrada'' y de לבדם como separación, no soledad individual. Sin embargo, ''dispusieron la batalla'' no refleja bien en español el modismo militar ויערכו מלחמה; suena poco idiomático y puede sugerir ''organizar la guerra'' más que ''formarse para combatir''.'
  spanish_quality_summary: 'El texto es claro y legible, con buen registro bíblico moderno. La principal debilidad es la naturalidad de ''dispusieron la batalla'', que resulta forzada en español contemporáneo. ''Se formaron para la batalla'' o ''se pusieron en orden de batalla'' comunica mejor el sentido táctico del hebreo. Además, la nota a parece mal planteada: ofrece como alternativa la misma idea ya presente en el texto, cuando la alternativa documentada en inglés es ''los amonitas''.'
  glossary_alignment: No hay términos teológicos sensibles en este versículo. 'Los hijos de Amón' preserva correctamente la decisión formal del POB para בני עמון, con posible alternativa 'los amonitas' en nota. 'Entrada de la ciudad' respeta la distinción frente a 'puerta'. 'Aparte, en el campo' está bien alineado con לבדם בשדה.
  issues:
  - severity: high
    issue: '''dispusieron la batalla'' es una traducción poco idiomática de ויערכו מלחמה'
    rationale: Aunque intenta conservar el modismo, en español no comunica con claridad la idea militar de ordenar tropas en formación. Puede sonar abstracto o antinatural. Una formulación como 'se formaron para la batalla' preserva mejor el sentido y la legibilidad.
  - severity: medium
    issue: La nota [a] no presenta una alternativa real útil
    rationale: 'El texto principal ya dice ''los hijos de Amón''; la nota debería reflejar la alternativa auditada en inglés: ''los amonitas'', o explicar que esa es la opción idiomática frente a la forma más literal conservada en el texto.'
  revised_spanish_text: Y salieron los hijos de Amón[a] y se formaron para la batalla[b] a la entrada de la ciudad[c], mientras los reyes que habían venido estaban aparte, en el campo[d].
  revised_footnotes:
  - marker: a
    text: 'O «los amonitas». El hebreo dice más literalmente: «los hijos de Amón».'
    reason: lexical_alternative
  - marker: b
    text: O «se pusieron en orden de batalla». El modismo hebreo describe la formación de tropas en orden de combate.
    reason: lexical_alternative
  - marker: c
    text: 'O «a la puerta de la ciudad», aunque la palabra hebrea es más general: «entrada/abertura» y no el término usual para «puerta».'
    reason: lexical_alternative
  - marker: d
    text: Es decir, los reyes aliados estaban apostados aparte de las fuerzas amonitas, en el campo.
    reason: cultural_note
  revision_rationale: 'Se corrige el modismo militar principal para lograr fidelidad semántica y español natural: ''se formaron para la batalla'' expresa mejor ערך מלחמה que ''dispusieron la batalla''. También se repara la nota [a] para que preserve la alternativa léxica auditada (''los amonitas'') en lugar de repetir innecesariamente el texto principal.'
