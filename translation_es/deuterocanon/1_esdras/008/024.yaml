    rationale: Aunque refleja el inglés auditado, en español el adverbio modifica torpemente «castigados». El griego ἐπιμελῶς puede expresarse mejor como aplicación estricta o esmerada del castigo. «Serán castigados estrictamente» conserva el valor jurídico y mejora la legibilidad.
  - severity: low
