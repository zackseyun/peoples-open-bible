translation:
  language: es
  text: Y los magos hicieron lo mismo con sus artes secretas[a], e hicieron subir las ranas sobre la tierra de Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con sus encantamientos» o «por sus artes ocultas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲשׂוּ כֵן
  english_pob_choice: did the same
  chosen_spanish: hicieron lo mismo
  alternatives_spanish:
  - hicieron así
  - hicieron de la misma manera
  lexicon: HALOT
  rationale: La expresión hebrea combina el verbo 'hacer' con 'así/mismo' para indicar que actuaron de manera equivalente a lo anterior. 'Hicieron lo mismo' conserva bien esa fuerza comparativa en español natural.
- source_word: הַחֲרְטֻמִּים
  english_pob_choice: the magicians
  chosen_spanish: los magos
  alternatives_spanish:
  - los magos de la corte
  - los hechiceros
  lexicon: HALOT
  rationale: En el contexto de Éxodo, el término designa a los especialistas de la corte de Faraón asociados con prácticas ocultas o rituales. 'Magos' mantiene la función narrativa y es comprensible en español sin forzar una interpretación técnica más específica.
- source_word: בְּלָטֵיהֶם
  english_pob_choice: by their secret arts
  chosen_spanish: por sus artes secretas
  alternatives_spanish:
  - con sus encantamientos
  - por sus artes ocultas
  lexicon: HALOT
  rationale: La forma hebrea expresa medio o instrumento y alude a prácticas ocultas. 'Por sus artes secretas' refleja el valor instrumental y el matiz de secreto/esoterismo, de manera sobria y readable en español.
- source_word: וַיַּעֲלוּ
  english_pob_choice: they brought up
  chosen_spanish: hicieron subir
  alternatives_spanish:
  - trajeron arriba
  - hicieron venir arriba
  lexicon: HALOT
  rationale: 'El hifil de עלה es causativo: no solo ''subieron'', sino que causaron que algo subiera. ''Hicieron subir'' preserva ese causativo en español con claridad.'
- source_word: אֶת הַצְפַרְדְּעִים
  english_pob_choice: the frogs
  chosen_spanish: las ranas
  alternatives_spanish:
  - las ranas mismas
  - las ranas
  lexicon: HALOT
  rationale: El referente animal en español natural es 'rana(s)'. Se conserva el artículo definido implícito del hebreo con 'las ranas', que corresponde al objeto directo específico del texto.
- source_word: עַל אֶרֶץ מִצְרָיִם
  english_pob_choice: over the land of Egypt
  chosen_spanish: sobre la tierra de Egipto
  alternatives_spanish:
  - sobre la tierra de Egipto
  - por toda la tierra de Egipto
  lexicon: HALOT
  rationale: '''עַל'' puede significar ''sobre/encima de'' y en este contexto describe la extensión de la plaga sobre el país. ''Sobre la tierra de Egipto'' mantiene el sentido espacial del hebreo sin añadir una paráfrasis excesiva.'
theological_decisions:
- issue: Naturaleza de la acción de los magos
  english_pob_reading: 'Report the act straightforwardly: the magicians also brought up frogs.'
  chosen_spanish_reading: 'Presentar la acción de manera directa: los magos también hicieron subir ranas.'
  alternative_spanish_readings:
  - matizarlo como simple imitación aparente
  - explicarlo como truco naturalista
  rationale: El hebreo narra la acción sin calificación interpretativa. La traducción debe conservar esa afirmación directa y no introducir una explicación naturalista o polemizante que el texto no explicita.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que añadió el artículo definido antes de 'frogs'; en español se reflejó naturalmente con 'las ranas'. También se conservó la relación causal del hifil con 'hicieron subir'.
  spanish_consistency_notes:
  - Se mantuvo 'Egipto' en lugar de una circunlocución más amplia para respetar el sintagma territorial del hebreo.
  - Se evitó 'SEÑOR' o sustituciones litúrgicas, porque este versículo no contiene el nombre divino.
  - Se prefirió 'magos' como término funcional y reconocido en este contexto narrativo, sin convertirlo en una explicación técnica no presente en el texto.
