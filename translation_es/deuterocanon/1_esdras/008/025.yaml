    rationale: Aunque fiel al sentido de μόνος, la colocación posverbal de «solo» suena menos natural y puede leerse con ligera ambigüedad de alcance en español. «Únicamente Yahvé» expresa mejor la exclusividad en registro digno y claro.
  revised_spanish_text: Bendito sea únicamente Yahvé, que puso estas cosas en el corazón del rey.[a]
