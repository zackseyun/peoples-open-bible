    rationale: וְאֶת מֵתְךָ קְבֹר usa singular con sentido colectivo/idiomático. En español, «tu muerto» suena excesivamente literal e individualizado; «tus muertos» comunica mejor el sentido natural que también preserva el inglés POB con «your dead».
