translation:
  language: es
  text: Y Finees, el celoso, nos hablaba[a], y Hananías, Azarías y Misael en el fuego[b] les enseñaban a ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el celoso». El griego destaca el celo ejemplar de Finees.
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «Hananías, Azarías y Misael, los que estaban en el fuego». La frase identifica a los tres jóvenes por su prueba en el horno.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγεν
  english_pob_choice: was speaking
  chosen_spanish: nos hablaba
  alternatives_spanish:
  - decía
  - nos decía
  - nos seguía hablando
  lexicon: BDAG
  rationale: El imperfecto griego expresa acción continua o reiterada. «Nos hablaba» conserva ese valor aspectual en español natural, sin volverlo puntillual con «dijo».
- source_word: ζηλωτὴν
  english_pob_choice: the zealot
  chosen_spanish: el celoso
  alternatives_spanish:
  - el celoso fervoroso
  - el hombre celoso
  - el zelote
  lexicon: BDAG
  rationale: El sustantivo caracteriza a Finees por su celo. «El celoso» mantiene la fuerza adjetival y evita introducir la asociación histórica posterior de «zelote» como grupo político/religioso.
- source_word: Φινεές
  english_pob_choice: Phinehas
  chosen_spanish: Finees
  alternatives_spanish:
  - Finees
  - Finees
  lexicon: LSJ
  rationale: Se usa la forma bíblica tradicional en español para este nombre propio. «Finees» es inteligible y mantiene la correspondencia con la transliteración habitual del personaje.
- source_word: ἐδίδασκεν
  english_pob_choice: were teaching
  chosen_spanish: les enseñaban
  alternatives_spanish:
  - enseñaban
  - estaban enseñando
  - les instruían
  lexicon: BDAG
  rationale: El imperfecto también sugiere acción continua o ejemplar. «Les enseñaban» reproduce ese matiz de instrucción en curso de manera idiomática en español.
- source_word: τοὺς ἐν πυρὶ
  english_pob_choice: in the fire
  chosen_spanish: en el fuego
  alternatives_spanish:
  - entre las llamas
  - en medio del fuego
  - los que estaban en el fuego
  lexicon: LSJ
  rationale: El sintagma identifica a los tres jóvenes por su situación en el horno/fuego. «En el fuego» es fiel y natural; el contexto ya aporta la referencia narrativa.
- source_word: Ἀνανίαν καὶ Ἀζαρίαν καὶ Μισαήλ
  english_pob_choice: Hananiah and Azariah and Mishael
  chosen_spanish: Hananías, Azarías y Misael
  alternatives_spanish:
  - Ananías, Azarías y Misael
  - Hananías y Azarías y Misael
  lexicon: LSJ
  rationale: Se adoptan las formas bíblicas estándar en español para los tres nombres, coherentes con el uso eclesial amplio y con la política de transliteración bíblica del proyecto.
theological_decisions:
- issue: Función retórica de los ejemplos bíblicos como maestros continuos
  english_pob_reading: The verse presents Phinehas and the three youths as ongoing moral instructors through their remembered example.
  chosen_spanish_reading: El versículo presenta a Finees y a los tres jóvenes como ejemplos que siguen enseñando por su memoria y su testimonio.
  alternative_spanish_readings:
  - Finees y los tres jóvenes simplemente fueron citados como casos históricos.
  - El imperfecto puede leerse solo como pasado narrativo sin fuerza ejemplar continua.
  rationale: 'Los imperfectos griegos favorecen una lectura de acción continuada o repetida. La traducción mantiene esa fuerza sin exagerarla doctrinalmente: no añade una afirmación sobre autoridad extra-bíblica, sino la función literaria del recuerdo ejemplar.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; readable modern Spanish, not archaic or academic.'
translation_notes:
  revision_awareness: No se aplicaron revisiones previas en el paquete; esta versión sigue el griego de Swete y el rastro auditado en inglés, conservando el valor aspectual del imperfecto y la caracterización de Finees por su celo.
  spanish_consistency_notes:
  - Se evita «Cristo»/«SEÑOR» porque no aparecen en el versículo.
  - Se mantiene «Finees» como nombre bíblico estándar en español y no se sustituye por una forma eclesiástica no necesaria.
  - «En el fuego» conserva la identificación narrativa de los tres jóvenes sin añadir paráfrasis.
  - Los dos imperfectos se reflejan con tiempos imperfectivos en español para no perder la continuidad del original.
