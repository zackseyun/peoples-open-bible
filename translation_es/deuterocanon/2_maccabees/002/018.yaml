translation:
  language: es
  text: Reúne[a] a nuestra gente dispersa, libera a los que están esclavizados entre las naciones, pon tu mirada[b] sobre los despreciados y aborrecidos; y que las naciones sepan que tú eres nuestro Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nuestra dispersión». El griego dice literalmente «nuestra dispersión», usando el sustantivo abstracto para la comunidad dispersa.
    reason: lexical_alternative
  - marker: b
    text: O «hazte cargo de», «mira con favor a» o «ten compasión de». El griego pide que Dios dirija su atención hacia los despreciados y aborrecidos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπισυνάγαγε
  english_pob_choice: Gather
  chosen_spanish: Reúne
  alternatives_spanish:
  - Junta
  - Agrupa
  - Reúne de nuevo
  lexicon: LSJ
  rationale: El imperativo pide a Dios que junte lo disperso; «reúne» es natural en español y conserva la fuerza de petición directa sin añadir explicaciones.
- source_word: τὴν διασπορὰν ἡμῶν
  english_pob_choice: our dispersion
  chosen_spanish: nuestra dispersión
  alternatives_spanish:
  - nuestro pueblo disperso
  - nuestros desterrados
  lexicon: LSJ
  rationale: «Dispersión» mantiene la abstracción concreta del griego διασπορά, como en la decisión inglesa de preservar la textura del sustantivo y no normalizarlo de inmediato a «pueblo disperso».
- source_word: ἐλευθέρωσον
  english_pob_choice: free
  chosen_spanish: libera
  alternatives_spanish:
  - suelta
  - pon en libertad
  - rescata
  lexicon: LSJ
  rationale: El verbo expresa liberación efectiva; «libera» es claro, digno y fiel al valor de hacer libre o soltar.
- source_word: τοὺς δουλεύοντας
  english_pob_choice: those who are enslaved
  chosen_spanish: los que están esclavizados
  alternatives_spanish:
  - los esclavos
  - los que sirven como esclavos
  - los cautivos
  lexicon: LSJ
  rationale: Se conserva la fuerza de δουλεύω en un contexto de opresión; «esclavizados» refleja condición de esclavitud sin suavizarla ni convertirla en servicio voluntario.
- source_word: ἐν τοῖς ἔθνεσιν
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los gentiles
  - en las naciones
  lexicon: LSJ
  rationale: «Entre las naciones» expresa bien el ámbito de dispersión y evita cargar el término con un matiz técnico que no exige el contexto.
- source_word: τοὺς ἐξουθενημένους
  english_pob_choice: those who are despised
  chosen_spanish: los despreciados
  alternatives_spanish:
  - los tenidos en nada
  - los humillados
  - los tratados con desprecio
  lexicon: LSJ
  rationale: El participio perfecto pasivo indica personas rebajadas socialmente; «despreciados» comunica con concisión ese estado.
- source_word: καὶ βδελυκτοὺς
  english_pob_choice: and abhorred
  chosen_spanish: y aborrecidos
  alternatives_spanish:
  - y detestados
  - y repudiados
  - y objeto de horror
  lexicon: LSJ
  rationale: «Aborrecidos» conserva el matiz de repulsión pasiva que el griego sugiere, de modo paralelo a «despreciados».
- source_word: ἔφιδε
  english_pob_choice: look upon
  chosen_spanish: pon tu mirada
  alternatives_spanish:
  - mira
  - ten en cuenta
  - fíjate en
  lexicon: LSJ
  rationale: La petición no solo es ver, sino dirigir la atención hacia ellos; «pon tu mirada» mantiene el registro oracional y deja abierta la compasión implícita sin forzarla.
- source_word: γνώτωσαν
  english_pob_choice: let ... know
  chosen_spanish: que ... sepan
  alternatives_spanish:
  - que ... conozcan
  - haz que ... sepan
  - que ... reconozcan
  lexicon: LSJ
  rationale: La forma jussiva se expresa naturalmente en español con «que ... sepan», conservando el tono de súplica/proclamación.
- source_word: ὅτι σὺ ὁ θεὸς ἡμῶν
  english_pob_choice: that you are our God
  chosen_spanish: que tú eres nuestro Dios
  alternatives_spanish:
  - que tú eres el Dios de nosotros
  - que tú eres Dios para nosotros
  lexicon: LSJ
  rationale: La confesión del pacto se vierte de manera directa y natural; «nuestro Dios» preserva la relación sin añadir perífrasis.
theological_decisions:
- issue: Tratamiento de δουλεύοντας en un contexto de subyugación nacional
  english_pob_reading: those who are enslaved
  chosen_spanish_reading: los que están esclavizados
  alternative_spanish_readings:
  - los esclavos
  - los que sirven
  rationale: El contexto es de dominación entre naciones, no de servicio voluntario. La elección mantiene la fuerza social y teológica del término sin diluirla en «servir».
  doctrine_reference: 'DOCTRINE.md: contested doul- terms; Translation philosophy §1'
- issue: Cómo reflejar διασπορά sin perder transparencia textual
  english_pob_reading: our dispersion
  chosen_spanish_reading: nuestra dispersión
  alternative_spanish_readings:
  - nuestro pueblo disperso
  - nuestros exiliados
  rationale: La forma abstracta conserva la imagen bíblica de la comunidad esparcida y evita estrechar innecesariamente el sentido a «exilio» o a una mera descripción colectiva.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §5'
- issue: Valor de ἔφιδε como mirada atenta con posible compasión
  english_pob_reading: look upon
  chosen_spanish_reading: pon tu mirada
  alternative_spanish_readings:
  - ten piedad de
  - haz caso de
  - mira con compasión
  rationale: El griego pide atención dirigida; la compasión está implícita pero no explicitada de forma obligatoria. «Pon tu mirada» mantiene esa tensión y evita sobretraducción.
  doctrine_reference: English footnote b; LSJ ἐφοράω/ἔφιδε
translation_notes:
  revision_awareness: La base inglesa revisada pasó de «our dispersion» a «our dispersed people» por naturalidad; en español se optó por mantener la transparencia del abstracto («nuestra dispersión») porque el griego original usa διασπορά y esa forma conserva mejor la textura fuente. También se preservó la tensión de ἔφιδε como mirada atenta sin explicitar más de lo que el texto exige.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y «nuestro Dios» para la confesión final.
  - Se usa «esclavizados» para reflejar la fuerza de δουλεύω en un contexto de opresión.
  - No se sustituye διασπορά por una paráfrasis amplia en el texto principal; la alternativa natural queda en nota.
  - La puntuación sigue el ritmo de la invocación y la cláusula final de confesión.
  - Se evita «SEÑOR» porque el versículo no contiene el Tetragrámaton; el referente es θεός, no יהוה.
