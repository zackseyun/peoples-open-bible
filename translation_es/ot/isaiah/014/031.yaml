    reason: lexical_alternative
  - marker: c
    text: O «y no hay quien quede atrás en sus puestos señalados». El hebreo final puede referirse a tropas completamente reunidas y ordenadas.
    reason: alternative_reading
  revision_rationale: 'Se hicieron reparaciones pequeñas pero importantes: se sustituyó «Aúlla» por «Gime» para reflejar mejor el lamento humano de הֵילִילִי, y se cambió «Desfalleced, toda tú, Filistea» por «Desfallece, toda Filistea» para ajustarse al español neutral y a la personificación singular/colectiva del hebreo. También se eliminó la nota innecesaria sobre «del norte»/«desde el norte», porque no preserva una alternativa significativa del original.'
