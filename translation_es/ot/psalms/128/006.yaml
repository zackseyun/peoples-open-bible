  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura y el sentido general del hebreo: una bendición optativa seguida de la bendición final sobre Israel. Sin embargo, «hijos de tus hijos» en español es torpe y menos idiomático que la solución auditada en inglés («your children''s children»), cuyo sentido en español se expresa mejor como «los hijos de tus hijos» o sencillamente «tus nietos».'
  spanish_quality_summary: La frase «¡Ojalá veas a tus hijos de tus hijos!» suena antinatural en español y dificulta la comprensión inmediata. «Que veas a los hijos de tus hijos» conserva mejor la dignidad bíblica y la legibilidad. «Paz sobre Israel» es aceptable y natural en registro bíblico.
  glossary_alignment: No hay conflicto con la terminología del proyecto. «Paz» para שָׁלוֹם e «Israel» están bien. La cuestión principal es idiomática en la expresión generacional. Conviene mantener una nota léxica para explicar el literal hebreo y el alcance de shalom.
  issues:
  - severity: high
    issue: 'Expresión no idiomática: «a tus hijos de tus hijos»'
    rationale: Aunque intenta conservar la literalidad, en español esa secuencia no funciona naturalmente. El hebreo expresa un modismo de descendencia multigeneracional; la forma española debe comunicarlo con claridad sin calco torpe.
  - severity: medium
    issue: «¡Ojalá veas!» es posible, pero «Que veas» encaja mejor en bendición bíblica sobria
    rationale: «Ojalá» comunica deseo, pero introduce un matiz más coloquial/exclamativo. «Que veas» mantiene mejor el tono benedictorio y digno del salmo.
  - severity: low
    issue: La nota a usa «hijos para tus hijos»
    rationale: Refleja el lamed de forma demasiado mecánica. Es preferible explicar el modismo como «hijos a/para tus hijos», es decir, nietos, pero con formulación más clara en español.
