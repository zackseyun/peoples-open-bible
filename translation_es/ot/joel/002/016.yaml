review_pass:
  verdict: revise
  source_alignment_summary: El borrador español refleja bien la secuencia imperativa del hebreo, el matiz cultual de קַדְּשׁוּ con «consagren», la distinción entre niños y lactantes, y el valor exhortativo de יֵצֵא con «Que salga». También conserva adecuadamente la nota sobre חֻפָּה como posible dosel o cámara. Sin embargo, hay pequeños problemas de fidelidad y de calidad editorial en las notas y en la consistencia léxica del último hemistiquio.
  spanish_quality_summary: 'El texto es claro y ampliamente legible en español eclesial neutral. No obstante, conviene mejorar la consistencia estilística entre «aposento» y «habitación», y corregir notas poco naturales o poco útiles: la nota [a] no preserva la alternativa inglesa real, y la nota [b] necesita mejor redacción en español. «Cámara» funciona mejor que «habitación» para un registro más digno y para emparejarse con «aposento» sin sonar coloquial.'
  glossary_alignment: No hay conflicto con los términos troncales del proyecto. «Consagren», «asamblea», «ancianos», «niños» y «lactantes» están alineados con la evidencia y la auditoría inglesa. La elección «novio/novia» es aceptable en español moderno para חָתָן/כַלָּה en este contexto. La principal mejora es estilística y de notas, no terminológica de glosario.
  issues:
  - severity: medium
    issue: La nota [a] no corresponde a la alternativa documentada en la auditoría inglesa.
    rationale: La nota inglesa preserva la alternativa para זְקֵנִים ('old men' / 'the elders'), no para עָם. «O «el pueblo»» además no aporta una variante real, porque el texto ya dice «al pueblo».
  - severity: medium
    issue: La nota [b] está redactada de forma poco natural en español.
    rationale: '«Hebreo: “los que maman los pechos”» suena torpe. Debe conservar la literalidad de יֹנְקֵי שָׁדָיִם, pero con redacción española más idiomática, por ejemplo «los que maman de los pechos».'
  - severity: low
    issue: «la novia de su habitación» es comprensible pero menos adecuado que «de su cámara» en este contexto solemne.
    rationale: El hebreo חֻפָּה puede referirse a dosel o cámara nupcial. Dado que el texto ya usa «aposento» para חדר, «cámara» mantiene un registro paralelo y más digno que «habitación», evitando un tono doméstico común.
  revised_spanish_text: Reúnan al pueblo; consagren la asamblea; reúnan a los ancianos[a]; reúnan a los niños, incluso a los lactantes[b]. Que salga el novio de su aposento, y la novia de su cámara[c].
  revised_footnotes:
  - marker: a
    text: O «los hombres mayores».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «los que maman de los pechos».'
    reason: lexical_alternative
  - marker: c
    text: O «de su dosel nupcial»; el término hebreo puede referirse a un dosel de boda o a una cámara nupcial.
    reason: lexical_alternative
  revision_rationale: Se corrige la nota [a] para que preserve la alternativa real documentada para זְקֵנִים, se mejora la naturalidad de la nota [b], y se ajusta «habitación» a «cámara» para un registro más apropiado y una mejor correspondencia estilística con «aposento». No se requieren cambios de fondo en el sentido del versículo.
