lexical_decisions:
- source_word: ὑπέταξεν ὑπὸ τοὺς πόδας αὐτοῦ
  english_pob_choice: subjected all things under his feet
  chosen_korean: 만물을 그분의 발아래 복종케 하시고
  alternatives_korean:
  - 만물을 그분 발 아래 두시고
  lexicon: BDAG
  rationale: 시 8:6 반향. 「복종케 하시고」가 ὑποτάσσω의 능동 무게를 살린다.
- source_word: ἐκκλησίᾳ
  english_pob_choice: church
  chosen_korean: 교회
  alternatives_korean:
  - 회중
  lexicon: BDAG
  rationale: 에베소서는 ἐκκλησία를 우주적·보편적 의미(곧 그리스도의 몸)로 사용하므로 「교회」를 택한다. 글로서리는 회중을 1차로 두지만 에베소서의 사용은 제도적·보편적 무게가 명백하다.
theological_decisions:
- issue: 에베소서에서 ἐκκλησία를 「교회」로 옮기는 carve-out
  chosen_reading: 교회
  alternative_readings:
  - 회중
  rationale: 에베소서는 「교회」를 그리스도가 머리되시고 만물 위에 세워진 우주적·보편적 몸으로 묘사한다(1:22–23; 3:10, 21; 5:23–32). 글로서리의 「회중」 기본값은 지역 모임이 분명한 본문에 적합하나, 에베소서 본문은 보편적·제도적 무게가 명백하므로 책 전체에서 「교회」를 일관되게 채택한다.
  doctrine_reference: 'KOREAN_PIPELINE.md Glossary: ἐκκλησία (carve-out for institutional/universal use in Ephesians).'
