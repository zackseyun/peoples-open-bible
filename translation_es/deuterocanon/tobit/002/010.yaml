    text: Or 'small birds'; the Greek στρουθία can refer more generally to small birds, though 'sparrows' is the most likely sense.
    reason: lexical_alternative
  - marker: b
    text: The Greek says 'white films' or 'white opacities' formed on his eyes; this is often understood as a cataract-like condition, but the text itself does not give a precise medical diagnosis.
    reason: lexical_alternative
