translation:
  language: es
  text: Y los sacaré de en medio de ella, y los entregaré en manos de extranjeros, y ejecutaré juicios sobre ustedes.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְהוֹצֵאתִי
  english_pob_choice: And I will bring you out
  chosen_spanish: y los sacaré
  alternatives_spanish:
  - y los haré salir
  - y los sacaré fuera
  lexicon: HALOT
  rationale: 'El hifil de יצא es causativo: ''hacer salir / sacar''. ''Sacaré'' preserva la fuerza causativa con un español natural y directo.'
- source_word: מִתּוֹכָהּ
  english_pob_choice: from its midst
  chosen_spanish: de en medio de ella
  alternatives_spanish:
  - de su medio
  - del interior de ella
  lexicon: HALOT
  rationale: תּוֹךְ indica el interior o centro. 'De en medio de ella' conserva la imagen espacial y permite mantener el referente femenino implícito sin añadir sustantivos ajenos al verso.
- source_word: וְנָתַתִּי אֶתְכֶם בְּיַד
  english_pob_choice: and I will give you into the hand of
  chosen_spanish: y los pondré en manos de
  alternatives_spanish:
  - y los entregaré en manos de
  - y los daré en manos de
  lexicon: HALOT
  rationale: נתן + בְּיַד es un modismo para entregar al poder de otro. 'Poner en manos de' comunica bien el idioma hebreo en español y conserva la idea de sometimiento/poder ajeno.
- source_word: זָרִים
  english_pob_choice: foreigners
  chosen_spanish: extranjeros
  alternatives_spanish:
  - forasteros
  - extraños
  lexicon: HALOT
  rationale: Aquí זָרִים se refiere a pueblos/ocupantes extranjeros, no a personas desconocidas. 'Extranjeros' es el equivalente más claro y natural en español contemporáneo.
- source_word: וְעָשִׂיתִי בָכֶם שְׁפָטִים
  english_pob_choice: and I will execute judgments on you
  chosen_spanish: y haré en ustedes juicios
  alternatives_spanish:
  - y ejecutaré juicios sobre ustedes
  - y realizaré sobre ustedes actos de juicio
  lexicon: HALOT
  rationale: עָשָׂה + ב + שְׁפָטִים expresa actos judiciales punitivos. 'Haré en ustedes juicios' mantiene la literalidad del sustantivo y el valor de acción judicial, sin sonar forzado en español.
theological_decisions:
- issue: Alcance punitivo de שְׁפָטִים
  english_pob_reading: and I will execute judgments on you
  chosen_spanish_reading: y haré en ustedes juicios
  alternative_spanish_readings:
  - y ejecutaré juicios sobre ustedes
  - y pronunciaré juicios contra ustedes
  rationale: Se conserva el sentido judicial y punitivo del hebreo sin convertirlo en una formulación más interpretativa de condena explícita. El texto habla de actos de juicio sobre el pueblo, no solo de una sentencia abstracta.
  doctrine_reference: Justicia/juicio divinos en el lenguaje profético; cf. el uso bíblico de שְׁפָטִים en contexto de castigo.
- issue: Referente femenino de מִתּוֹכָהּ
  english_pob_reading: its midst
  chosen_spanish_reading: de en medio de ella
  alternative_spanish_readings:
  - de en medio de la ciudad
  - del interior de ella
  rationale: El sufijo femenino alude a la ciudad/Jerusalén. El español puede mantener el pronombre femenino sin explicitar 'la ciudad', respetando la economía del hebreo y el contexto inmediato.
  doctrine_reference: Contexto profético de Jerusalén como ciudad-persona en oráculos de juicio.
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del POB inglés: ''execute judgments on you''. En español se evitó añadir marcadores de nota porque, para esta sección, la solución elegida permite expresar el sentido sin introducir ambigüedades que requieran alternativas textuales ancladas.'
  spanish_consistency_notes:
  - Se mantiene el pronombre de objeto directo plural 'los' para la segunda persona plural de destino, en consonancia con el plural hebreo.
  - Se preserva el referente femenino implícito de 'ella' para la ciudad sin explicitar 'Jerusalén', siguiendo la economía del texto fuente.
  - Se usó 'extranjeros' para זָרִים por su valor étnico/político en contexto de invasión, no como 'extraños'.
  - Se evitó 'SEÑOR' para el nombre divino porque este verso no contiene el tetragrámaton.
