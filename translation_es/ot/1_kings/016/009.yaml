translation:
  language: es
  text: Pero su siervo Zimri[a], comandante de la mitad de los carros de guerra, conspiró contra él mientras estaba en Tirsa, bebiendo hasta embriagarse en la casa de Arza[b], que estaba a cargo de la casa real en Tirsa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «bebiendo hasta emborracharse». La expresión hebrea es vívida: describe una acción de beber que culmina en embriaguez.'
    reason: lexical_alternative
  - marker: b
    text: «Estaba a cargo de la casa real» traduce un título administrativo; probablemente se refiere al funcionario encargado de la casa real o del palacio.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּקְשֹׁר עָלָיו
  english_pob_choice: conspired against him
  chosen_spanish: conspiró contra él
  alternatives_spanish:
  - tramó contra él
  - hizo una conspiración contra él
  lexicon: HALOT
  rationale: קשר con עַל en contexto real indica una conjura contra un gobernante. «Conspiró contra él» conserva el sentido político y suena natural en español.
- source_word: עַבְדּוֹ
  english_pob_choice: his servant
  chosen_spanish: su siervo
  alternatives_spanish:
  - su esclavo
  - su servidor
  lexicon: HALOT
  rationale: El hebreo puede referirse a un sirviente o funcionario de corte. Aquí «siervo» mantiene la relación de pertenencia y evita la dureza de «esclavo» en español, dado el contexto administrativo/cortesano.
- source_word: זִמְרִי
  english_pob_choice: Zimri
  chosen_spanish: Zimri
  lexicon: transliteración
  rationale: Nombre propio transliterado de forma directa.
- source_word: שַׂר מַחֲצִית הָרָכֶב
  english_pob_choice: commander of half the chariots
  chosen_spanish: comandante de la mitad de los carros de guerra
  alternatives_spanish:
  - comandante de la mitad de los carros
  - oficial sobre la mitad de los carros
  lexicon: HALOT
  rationale: שַׂר expresa mando militar; רכב alude al cuerpo de carros, no solo a vehículos aislados. «Carros de guerra» comunica mejor el valor militar en español sin perder la referencia concreta a los carros.
- source_word: וְהוּא
  english_pob_choice: while he was
  chosen_spanish: mientras él estaba
  alternatives_spanish:
  - y él estaba
  - cuando él estaba
  lexicon: HALOT
  rationale: La construcción introduce una circunstancia temporal; «mientras él estaba» hace explícita esa relación en español, como en la POB inglesa.
- source_word: בְתִרְצָה
  english_pob_choice: in Tirzah
  chosen_spanish: en Tirsa
  alternatives_spanish:
  - en Tirzá
  lexicon: topónimo
  rationale: Se usa la forma castellana tradicional y ampliamente reconocible «Tirsa» para el nombre del lugar.
- source_word: שֹׁתֶה שִׁכּוֹר
  english_pob_choice: drinking himself drunk
  chosen_spanish: bebiendo hasta embriagarse
  alternatives_spanish:
  - bebiendo hasta emborracharse
  - bebiendo hasta quedar ebrio
  - bebiendo para embriagarse
  lexicon: HALOT
  rationale: La combinación participio + adjetivo expresa una acción en curso que culmina en intoxicación. «Bebiendo hasta embriagarse» conserva la vividez y evita convertirlo solo en un estado ya consumado.
- source_word: בֵּית אַרְצָא
  english_pob_choice: in the house of Arza
  chosen_spanish: en la casa de Arza
  alternatives_spanish:
  - en casa de Arza
  lexicon: HALOT
  rationale: בית + nombre propio se rinde de modo natural como «la casa de». Mantiene la estructura narrativa del hebreo.
- source_word: אֲשֶׁר עַל הַבַּיִת
  english_pob_choice: who was over the household
  chosen_spanish: que estaba sobre la casa
  alternatives_spanish:
  - que estaba a cargo de la casa
  - que estaba sobre la administración de la casa
  lexicon: HALOT
  rationale: La frase hebrea es un título administrativo. «Estaba sobre la casa» conserva la idiomaticidad del original; «casa» aquí funciona como equivalente de la casa real/administración doméstica, según el uso cortesano del hebreo.
- source_word: בְּתִרְצָה
  english_pob_choice: in Tirzah
  chosen_spanish: en Tirsa
  alternatives_spanish:
  - en Tirzá
  lexicon: topónimo
  rationale: Se repite el mismo topónimo con la misma forma española para mantener consistencia y reflejar la repetición del hebreo.
translation_notes:
  revision_awareness: El texto sigue el testimonio hebreo masorético presentado y coincide con el audit trail inglés de la POB en los puntos léxicos principales. La decisión más sensible es renderizar שֹׁתֶה שִׁכּוֹר con una expresión progresiva en español para conservar la vividez del original sin suavizarla a un simple estado de embriaguez. También se conserva el idiomatismo administrativo de עַל הַבַּיִת, explicándolo en nota.
  spanish_consistency_notes:
  - Se usa «Tirsa» de forma uniforme para בְתִרְצָה.
  - Se usa «siervo» para עַבְדּוֹ en este contexto de corte, evitando «esclavo» porque el pasaje describe relación de servicio/función política.
  - Se mantiene «casa» en «sobre la casa» para respetar el título administrativo hebreo y no sustituirlo por una paráfrasis interpretativa en el texto principal.
