id: PRO.12.4
reference: Proverbs 12:4
source:
  edition: WLC
  text: אֵֽשֶׁת חַ֭יִל עֲטֶ֣רֶת בַּעְלָ֑/הּ וּ/כְ/רָקָ֖ב בְּ/עַצְמוֹתָ֣י/ו מְבִישָֽׁה־׃
translation:
  text: A wife of noble character is her husband's crown[b][a], but one who brings shame is like rot in his bones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a capable wife,' 'a valiant wife,' or 'an excellent wife.' The Hebrew חַיִל carries a broad sense including strength, worth, competence, and excellence.
    reason: lexical_alternative
  - marker: b
    text: Literally 'like rot in his bones,' a figure for deep inward ruin or corrosive disgrace.
    reason: cultural_note
lexical_decisions:
- source_word: אֵשֶׁת
  chosen: a wife of
  alternatives:
  - a woman of
  lexicon: HALOT
  rationale: Construct form of אִשָּׁה here is best rendered 'wife of' because it is explicitly linked to 'her husband' later in the verse, making the marital sense contextually clear.
- source_word: חַיִל
  chosen: noble character
  alternatives:
  - valor
  - excellence
  - worth
  - strength
  lexicon: HALOT
  rationale: חַיִל can denote strength, valor, competence, wealth, or excellence. In wisdom literature describing an ideal wife, 'noble character' captures moral excellence and capability in natural English without narrowing the sense to military 'valor' or material 'wealth.'
- source_word: עֲטֶרֶת
  chosen: crown
  alternatives:
  - wreath
  lexicon: HALOT
  rationale: The noun denotes a crown or garland as a symbol of honor. 'Crown' is the standard and clearest metaphor in English for the husband's honor.
- source_word: בַּעְלָהּ
  chosen: her husband's
  alternatives:
  - of her husband
  - to her husband
  lexicon: HALOT
  rationale: The possessive is rendered idiomatically in English as 'her husband's crown' rather than the more wooden 'a crown of her husband.'
- source_word: וּכְרָקָב
  chosen: but one who brings shame is like rot
  alternatives:
  - and like rottenness
  - but like decay
  lexicon: HALOT
  rationale: The conjunction plus comparative introduces the contrasting image. רָקָב denotes rot, decay, or rottenness. 'Like rot' is vivid and natural. The adversative sense 'but' fits the proverb's contrast better than a simple 'and.'
- source_word: בְּעַצְמוֹתָיו
  chosen: in his bones
  alternatives:
  - in his body
  - to his bones
  lexicon: HALOT
  rationale: Literally 'in his bones.' Retaining 'bones' preserves the Hebrew metaphor for deep inward corrosion rather than generalizing to 'body.'
- source_word: מְבִישָׁה
  chosen: one who brings shame
  alternatives:
  - a shameful wife
  - she who causes shame
  - one who acts shamefully
  lexicon: HALOT
  rationale: The Hiphil participle means 'causing shame' or 'bringing shame.' Rendering it verbally preserves the active sense better than the adjectival 'shameful.' The feminine participle refers back to the wife.
