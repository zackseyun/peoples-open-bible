translation:
  language: es
  text: 'Entonces la hija de Faraón le dijo: «Lleva a este niño y amamántalo[a] para mí, y yo te daré tu salario». Y la mujer tomó al niño y lo amamantó.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dale de mamar para mí».
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּת פַּרְעֹה
  english_pob_choice: Pharaoh’s daughter
  chosen_spanish: la hija de Faraón
  alternatives_spanish:
  - la hija del faraón
  - la hija de Faraón
  lexicon: HALOT
  rationale: La construcción hebrea es un sintagma de pertenencia/relación; en español, «hija de Faraón» comunica con naturalidad la identificación de la hablante sin añadir matices no presentes en el hebreo.
- source_word: הֵילִיכִי
  english_pob_choice: Take
  chosen_spanish: Lleva
  alternatives_spanish:
  - Toma
  - Ve y lleva
  lexicon: HALOT
  rationale: El imperativo hifil de הלך puede expresar la idea de llevar consigo o tomar para hacer algo. Aquí la escena es una comisión para hacerse cargo del niño; «Lleva» conserva esa dirección de acción con español natural.
- source_word: הַיֶּלֶד הַזֶּה
  english_pob_choice: this child
  chosen_spanish: este niño
  alternatives_spanish:
  - este niño pequeño
  - este hijo
  lexicon: HALOT
  rationale: יֶלֶד designa un niño o muchacho; en este contexto, «niño» es la opción más clara y natural en español. «Este» conserva el demostrativo enfático del hebreo.
- source_word: וְהֵינִקִהוּ לִי
  english_pob_choice: and nurse him for me
  chosen_spanish: y críalo para mí
  alternatives_spanish:
  - y amamántalo para mí
  - y dale de mamar para mí
  lexicon: HALOT
  rationale: El verbo expresa alimentar al niño con leche materna. En español, «críalo» resume de forma idiomática la acción de cuidar y alimentar a un bebé dentro de este contexto, pero la alternativa literal se conserva en nota por la tensión léxica del original.
- source_word: שְׂכָרֵךְ
  english_pob_choice: your wages
  chosen_spanish: tu salario
  alternatives_spanish:
  - tu paga
  - tu remuneración
  lexicon: HALOT
  rationale: שָׂכָר es retribución por trabajo realizado. «Salario» mantiene ese valor económico y resulta más natural que una formulación más arcaica en español bíblico.
- source_word: הָאִשָּׁה
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la madre
  lexicon: HALOT
  rationale: El hebreo dice «la mujer»; aunque el lector sabe por el contexto que es la madre del niño, no conviene explicitar «madre» en el texto principal, porque añadiría más especificidad que la fuente aquí.
- source_word: וַתְּנִיקֵהוּ
  english_pob_choice: and nursed him
  chosen_spanish: lo crió
  alternatives_spanish:
  - lo amamantó
  - lo amamantó y lo crió
  lexicon: HALOT
  rationale: El verbo final retoma la acción de alimentar y criar al niño. Para un español fluido, «lo crió» funciona como síntesis contextual; sin embargo, se señala la alternativa más literal para preservar la tensión léxica de la raíz de amamantar.
theological_decisions:
- issue: Si el texto debe explicitar a la madre en lugar de «la mujer»
  english_pob_reading: the woman took the child
  chosen_spanish_reading: la mujer tomó al niño
  alternative_spanish_readings:
  - la madre tomó al niño
  rationale: El hebreo conserva la designación genérica; el contexto ya identifica a la mujer, pero la traducción no debe sustituir la referencia por una glosa interpretativa en el cuerpo del texto.
  doctrine_reference: Principio de suficiencia textual y precisión exegética
translation_notes:
  revision_awareness: 'Se siguió el consenso de alta concordancia del audit trail en inglés: no hubo revisiones aplicadas y la traducción inglesa vigente se mantuvo estable. La decisión principal en español fue equilibrar la literalidad de הֵינִיק/תְּנִיק con una formulación natural; por eso se dejó «críalo» en el texto y se reservó la alternativa literal en nota.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usó «hija de Faraón» en minúsculas para un título relacional, con mayúscula solo en «Faraón» como nombre propio/título histórico.
  - «Salario» mantiene el valor de retribución laboral de שָׂכָר sin introducir lenguaje eclesiástico.
  - El texto evita añadir «madre» porque el hebreo dice simplemente «la mujer».
