translation:
  language: es
  text: Joksán tuvo por hijos a Saba y a Dedán. Los hijos de Dedán fueron Asurim[a], Letushim y Leummim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente nombres de clanes, escritos convencionalmente «Ashurim», «Lethushim» y «Leumim».
    reason: lexical_alternative
lexical_decisions:
- source_word: יָקְשָׁן
  english_pob_choice: Jokshan
  chosen_spanish: Joksán
  alternatives_spanish:
  - Joksán
  - Yoksán
  lexicon: HALOT
  rationale: Nombre propio; se translitera en español manteniendo la correspondencia con la forma hebrea y con la convención inglesa auditada, adaptando la acentuación al español para una lectura natural.
- source_word: יָלַד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - padreó
  lexicon: HALOT
  rationale: En genealogías, 'engendró' comunica la relación de descendencia con fuerza genealógica y conserva mejor el tono bíblico que una paráfrasis moderna.
- source_word: שְׁבָא
  english_pob_choice: Sheba
  chosen_spanish: Saba
  alternatives_spanish:
  - Sheba
  lexicon: HALOT
  rationale: Nombre propio; la forma española tradicional y reconocible es 'Saba', que refleja el mismo referente sin forzar la pronunciación inglesa.
- source_word: דְּדָן
  english_pob_choice: Dedan
  chosen_spanish: Dedán
  alternatives_spanish:
  - Dedan
  lexicon: HALOT
  rationale: Nombre propio transliterado al español con acento gráfico para ajustarse a la prosodia española y distinguirlo de otras formas afines.
- source_word: בְנֵי
  english_pob_choice: sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los hijos de
  lexicon: HALOT
  rationale: Se conserva la forma literal del hebreo. En este contexto genealógico puede referirse a descendientes o grupos-clan, pero 'los hijos de' mantiene la forma fuente sin sobreinterpretar.
- source_word: הָיוּ
  english_pob_choice: were
  chosen_spanish: fueron
  alternatives_spanish:
  - eran
  lexicon: HALOT
  rationale: Copulativo introductorio en español genealógico; 'fueron' suena natural con el listado nominal que sigue.
- source_word: אַשּׁוּרִם
  english_pob_choice: Asshurim
  chosen_spanish: Asurim[a]
  alternatives_spanish:
  - Asshurim
  - Ashurim
  lexicon: HALOT
  rationale: Se translitera el etnónimo con una forma española transparente. Se mantiene la nota de alternativa porque el audit trail inglés registra la vacilación ortográfica tradicional entre Asurim/Ashurim.
- source_word: לְטוּשִׁים
  english_pob_choice: Letushim
  chosen_spanish: Letushim
  alternatives_spanish:
  - Létushim
  - Lethushim
  lexicon: HALOT
  rationale: Nombre de clan o pueblo poco claro; se preserva la transliteración para no atribuir un significado incierto. La forma española puede llevar tilde opcional, pero aquí se conserva la grafía más sobria del nombre.
- source_word: לְאֻמִּים
  english_pob_choice: Leummim
  chosen_spanish: Leummim
  alternatives_spanish:
  - Leumim
  lexicon: HALOT
  rationale: Nombre propio/clan; se translitera para evitar tomarlo como el sustantivo común 'naciones/pueblos' y así respetar la decisión auditada de no sobreinterpretar el término.
theological_decisions:
- issue: Genealogía y valor del verbo יָלַד
  english_pob_reading: fathered
  chosen_spanish_reading: engendró
  alternative_spanish_readings:
  - engendró
  - fue padre de
  rationale: 'No hay una cuestión doctrinal controvertida, pero sí una tensión semántica: el hebreo expresa la relación genealógica de manera compacta. ''Engendró'' preserva esa fuerza sin diluirla en una frase más explicativa.'
  doctrine_reference: Genealogías patriarcales en Génesis; sentido filológico del verbo יָלַד
- issue: Nombres de grupos/clanes en la lista final
  english_pob_reading: Asshurim, Letushim, and Leummim
  chosen_spanish_reading: Asurim, Letushim y Leummim
  alternative_spanish_readings:
  - Ashurim, Lethushim y Leumim
  - Asshurim, Letushim y Leummim
  rationale: El texto parece enumerar nombres de grupos o clanes, no vocabulario común. La traducción los conserva como nombres propios para no borrar la ambigüedad histórica/etnónima documentada en el audit trail.
  doctrine_reference: Gen 25:3; nombres de clanes/etnónimos en genealogías
translation_notes:
  revision_awareness: 'El audit trail inglés indica acuerdo alto y sin cambios de revisión; no se aplicaron revisiones posteriores. La versión española sigue la misma decisión base: transliterar los nombres propios, usar un verbo genealógico fuerte y conservar la nota alternativa para el etnónimo final.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usó 'engendró' para conservar el registro genealógico y evitar una paráfrasis explicativa.
  - Los nombres propios se hispanizaron solo cuando la forma española está bien establecida y no altera el referente.
  - La nota al pie se ancla únicamente en 'Asurim' porque ahí el audit trail inglés preserva explícitamente una alternativa ortográfica convencional.
