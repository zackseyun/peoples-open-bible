    rationale: πλεονάζειν contrasta con ἐπιτέμνειν; «excederse» mantiene mejor el paralelismo semántico de exceso frente a abreviar.
  revised_spanish_text: Por tanto, a partir de aquí comencemos el relato[a], añadiendo solo esto a lo ya dicho; porque es insensato excederse antes de la historia[b], pero abreviar la historia misma.
