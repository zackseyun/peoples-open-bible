translation:
  language: es
  text: Ahora se levantó un rey nuevo[a] sobre Egipto, que no conocía[b] a Yosef.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «otro rey»; el adjetivo hebreo es literalmente «nuevo», pero algunos entienden que implica una dinastía o régimen diferente.
    reason: lexical_alternative
  - marker: b
    text: O «no reconocía a Yosef»; «conocer» puede incluir el sentido de reconocer o tomar en cuenta a alguien, no solo carecer de información sobre él.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  english_pob_choice: Now ... arose
  chosen_spanish: Ahora se levantó
  alternatives_spanish:
  - Entonces se levantó
  - Y se levantó
  - Ahora surgió
  lexicon: HALOT
  rationale: El wayyiqtol de קום impulsa la narración. «Se levantó» conserva la imagen verbal y puede aplicarse de manera natural a la subida al poder de un rey. «Ahora» funciona como marcador discursivo para reflejar el avance narrativo hebreo sin volver la frase rígida.
- source_word: מֶלֶךְ
  english_pob_choice: king
  chosen_spanish: rey
  alternatives_spanish:
  - gobernante
  - soberano
  lexicon: HALOT
  rationale: El sustantivo designa de forma directa a un rey; «rey» es la correspondencia más precisa y transparente en español.
- source_word: חָדָשׁ
  english_pob_choice: new
  chosen_spanish: nuevo
  alternatives_spanish:
  - otro
  lexicon: HALOT
  rationale: El adjetivo significa literalmente «nuevo». Aunque algunos intérpretes entienden la idea de «otro» en el sentido de una nueva dinastía o régimen, esa inferencia no debe entrar en el texto principal sin necesidad.
- source_word: עַל מִצְרַיִם
  english_pob_choice: over Egypt
  chosen_spanish: sobre Egipto
  alternatives_spanish:
  - en Egipto
  - en contra de Egipto
  lexicon: HALOT
  rationale: Con un soberano, עַל expresa autoridad o dominio sobre un territorio. «Sobre Egipto» refleja mejor esa relación de gobierno que «en Egipto».
- source_word: אֲשֶׁר לֹא יָדַע
  english_pob_choice: who did not know
  chosen_spanish: que no conocía
  alternatives_spanish:
  - que no reconocía
  - que no tomaba en cuenta
  lexicon: HALOT
  rationale: «Conocer» preserva el valor básico de יָדַע y deja abierta la posible implicación de no reconocer o no tener en cuenta a Yosef, sin introducir esa interpretación en el texto principal.
- source_word: יוֹסֵף
  english_pob_choice: Yosef
  chosen_spanish: Yosef
  alternatives_spanish:
  - José
  lexicon: Project name policy
  rationale: Se conserva la transliteración directa del nombre hebreo, conforme a la práctica del proyecto, en lugar de la forma tradicional castellana.
theological_decisions:
- issue: Si «no conocía a Yosef» debe ampliarse a «no lo reconocía» o «no lo tuvo en cuenta»
  english_pob_reading: Retain the plain wording 'who did not know Yosef' without expanding it to 'did not acknowledge/remember Yosef.'
  chosen_spanish_reading: Mantener «que no conocía a Yosef» sin expandirlo a «que no lo reconocía» o «que no lo tomó en cuenta».
  alternative_spanish_readings:
  - que no lo reconocía
  - que no lo tomó en cuenta
  - que no recordaba a Yosef
  rationale: El hebreo dice literalmente «no conocía». Aunque en contexto puede implicar falta de reconocimiento o de consideración, la traducción principal debe preservar esa ambigüedad y no especificar más de lo que el texto exige.
  doctrine_reference: Translation philosophy items 1 and 3
- issue: Si «rey nuevo» sugiere cambio dinástico o solo un nuevo monarca
  english_pob_reading: Retain the plain wording 'a new king' without expanding it to 'another dynasty.'
  chosen_spanish_reading: Mantener «un rey nuevo» en el texto principal sin convertirlo en «otro rey» o «una nueva dinastía».
  alternative_spanish_readings:
  - otro rey
  - una nueva dinastía
  rationale: El adjetivo hebreo es «nuevo». La posible implicación histórica de un cambio de régimen es interpretativa y debe quedar abierta, no fijada por la traducción principal.
  doctrine_reference: Translation philosophy items 1 and 3
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el borrador final en inglés se mantuvo sin modificaciones y el acuerdo de revisión fue alto.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma principal para el nombre divino en todo el proyecto, aunque este versículo no lo contiene.
  - Se conserva la transliteración «Yosef» para coherencia con el POB en español.
  - «Conocer» se usa en sentido literal básico para respetar la ambigüedad semántica del hebreo.
  - La puntuación con notas al pie sigue el orden de los marcadores del texto fuente y de la práctica del proyecto.
