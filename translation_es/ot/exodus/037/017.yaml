translation:
  language: es
  text: Hizo el candelabro[a] de oro puro. Hizo el candelabro de obra martillada; su base y su fuste, sus copas, sus brotes[b] y sus flores eran de una sola pieza con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'candelero'. El hebreo se refiere al soporte ritual de luz del tabernáculo, no a una lámpara individual.
    reason: lexical_alternative
  - marker: b
    text: O 'nudos' o 'botones'. El término hebreo designa protuberancias ornamentales; se traduce 'brotes' por la imagen floral del candelabro.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְּנֹרָה
  english_pob_choice: lampstand
  chosen_spanish: candelabro
  alternatives_spanish:
  - lámpara
  - candelero
  lexicon: HALOT
  rationale: En este contexto cultual, el objeto es el soporte de siete brazos del tabernáculo. En español, 'candelabro' comunica mejor la pieza de iluminación ritual que un simple 'lámpara'; 'candelero' es posible, pero menos natural en el uso bíblico moderno y puede sonar más genérico o eclesiástico.
- source_word: זָהָב טָהוֹר
  english_pob_choice: pure gold
  chosen_spanish: oro puro
  alternatives_spanish:
  - oro refinado
  - oro limpio
  lexicon: HALOT
  rationale: La combinación describe metal sin mezcla o depurado. 'Oro puro' es la equivalencia natural y fiel en español, sin perder la idea de refinamiento material.
- source_word: מִקְשָׁה
  english_pob_choice: hammered work
  chosen_spanish: obra martillada
  alternatives_spanish:
  - trabajo martillado
  - obra batida
  - hecho a martillo
  lexicon: HALOT
  rationale: El hebreo indica metal formado por martillado. 'Obra martillada' conserva el sentido técnico y suena digno en español. No se optó por una paráfrasis más amplia porque el texto destaca la manufactura del objeto.
- source_word: יְרֵכָהּ
  english_pob_choice: its base
  chosen_spanish: su base
  alternatives_spanish:
  - su pedestal
  - su parte inferior
  lexicon: HALOT
  rationale: Aunque literalmente el término puede ser 'muslo' o 'lado', en este mobiliario del tabernáculo designa la parte inferior de sostén. 'Base' expresa bien esa función en español.
- source_word: קָנָהּ
  english_pob_choice: its shaft
  chosen_spanish: su tallo
  alternatives_spanish:
  - su eje
  - su vara
  - su tronco
  lexicon: HALOT
  rationale: El singular nombra el elemento central vertical de la menorá. 'Tallo' mantiene la imagen estructural con cierto eco vegetal, coherente con el resto de términos ornamentales del versículo, sin caer en una traducción demasiado técnica o extraña.
- source_word: גְּבִיעֶיהָ
  english_pob_choice: its cups
  chosen_spanish: sus copas
  alternatives_spanish:
  - sus vasos
  - sus cáliz(es)
  lexicon: HALOT
  rationale: '''Copas'' reproduce la forma del elemento ornamental y es más natural en español que ''vasos'' o ''cálices'' para esta descripción artesanal.'
- source_word: כַּפְתֹּרֶיהָ
  english_pob_choice: its buds
  chosen_spanish: sus brotes
  alternatives_spanish:
  - sus nudos
  - sus botones
  - sus knobs
  lexicon: HALOT
  rationale: La POB inglesa eligió 'buds' por la imagen floral del diseño. 'Brotes' conserva esa decisión y resulta claro en español. Se evita 'nudos' o 'botones' porque debilitan la coherencia floral del conjunto.
- source_word: פְרָחֶיהָ
  english_pob_choice: its blossoms
  chosen_spanish: sus flores
  alternatives_spanish:
  - sus floraciones
  - sus florones
  lexicon: HALOT
  rationale: '''Flores'' es la correspondencia más directa y transparente. Aunque ''blossoms'' en inglés puede sugerir ''blossoms'', en español ''flores'' expresa con claridad el motivo ornamental sin exceso de literariedad.'
- source_word: מִמֶּנָּה הָיוּ
  english_pob_choice: were of one piece with it
  chosen_spanish: eran de una sola pieza con él
  alternatives_spanish:
  - procedían de él
  - eran de él
  - salían de él
  lexicon: HALOT
  rationale: El hebreo afirma que las partes eran integrales al objeto, no añadidas aparte. 'De una sola pieza con él' conserva esa fuerza unitaria en español y evita una lectura meramente material o derivativa.
- source_word: וַיַּעַשׂ ... עָשָׂה
  english_pob_choice: He made ... He made
  chosen_spanish: Hizo ... Hizo
  alternatives_spanish:
  - Entonces hizo ... hizo
  - Fabricó ... hizo
  lexicon: HALOT
  rationale: Se conserva la repetición del verbo hebreo 'hacer' para reflejar la estructura del original. 'Hizo' es simple, exacto y adecuado para la prosa narrativa bíblica.
theological_decisions:
- issue: Unidad integral del candelabro
  english_pob_reading: its base and its shaft, its cups, its buds, and its blossoms were of one piece with it
  chosen_spanish_reading: su base y su tallo, sus copas, sus brotes y sus flores eran de una sola pieza con él
  alternative_spanish_readings:
  - estaban unidos a él
  - eran parte de él
  - salían de él
  rationale: La frase debe transmitir que las partes no fueron ensambladas aparte, sino forjadas como una sola unidad. 'De una sola pieza con él' conserva esa precisión y evita suavizar el dato técnico del objeto del santuario.
  doctrine_reference: Éxodo 25:31-40; Hebreos 9:2
translation_notes:
  revision_awareness: 'Sin cambios respecto al último pase de revisión: el contexto de Exodus 37:17 mantiene alta concordancia con la lectura inglesa auditada, y no se reportaron revisiones aplicadas.'
  spanish_consistency_notes:
  - Se mantuvo el paralelismo verbal 'Hizo ... Hizo' para reflejar la repetición hebrea de עשה.
  - Se conservó la imagen floral ('brotes', 'flores') coherente con la decisión inglesa de 'buds' y 'blossoms'.
  - '''Candelabro'' se usa en el texto principal por claridad cultural; la nota recoge la alternativa ''candelero'' sin desplazar el sentido cultual.'
  - '''De una sola pieza con él'' expresa la integridad del objeto mejor que una formulación genérica como ''unido a él''.'
