base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/019/004.yaml
  text: So Jehoshaphat lived in Jerusalem[a], and he went out again among the people from Beersheba to the hill country of Ephraim and brought them back to Yahweh[b], the God of their fathers.
  footnotes:
  - marker: a
    text: Or 'returned and went out among the people'; the Hebrew repeats the verb 'return' before 'went out,' likely indicating that Jehoshaphat resumed this activity after returning to Jerusalem.
    reason: lexical_alternative
  - marker: b
    text: '''The LORD'' renders the divine name YHWH; alternatively, ''Yahweh.'''
    reason: alternative_reading
