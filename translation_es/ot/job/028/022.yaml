translation:
  language: es
  text: 'Abadón y Muerte dicen[a]: «Con nuestros oídos hemos oído noticias de ella».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Destrucción y muerte dijeron: “Hemos oído un rumor de ella.”»'
