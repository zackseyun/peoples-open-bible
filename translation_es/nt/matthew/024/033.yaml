translation:
  language: es
  text: Así también ustedes[a], cuando vean todas estas cosas, sepan que está cerca, a las puertas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «él está cerca». El griego no expresa el sujeto de manera explícita.
    reason: alternative_reading
lexical_decisions:
- source_word: οὕτως καὶ ὑμεῖς
  english_pob_choice: So also you
  chosen_spanish: Así también ustedes
  alternatives_spanish:
  - De la misma manera, ustedes también
  - Así ustedes también
  lexicon: BDAG
  rationale: οὕτως expresa comparación con la ilustración anterior; καὶ ὑμεῖς añade énfasis a los discípulos como observadores correspondientes. "Así también ustedes" conserva la fuerza comparativa y el énfasis sin sobreexplicar.
- source_word: ὅταν ἴδητε
  english_pob_choice: when you see
  chosen_spanish: cuando vean
  alternatives_spanish:
  - cuando ustedes vean
  - siempre que vean
  lexicon: BDAG
  rationale: La construcción temporal futura se expresa de modo natural en español con "cuando". El verbo en segunda persona plural mantiene el destinatario directo del mandato.
- source_word: πάντα ταῦτα
  english_pob_choice: all these things
  chosen_spanish: todas estas cosas
  alternatives_spanish:
  - todo esto
  - todos estos acontecimientos
  lexicon: BDAG
  rationale: El neutro plural se conserva mejor con un plural explícito. "Todas estas cosas" evita comprimir indebidamente el alcance de la referencia.
- source_word: γινώσκετε
  english_pob_choice: know
  chosen_spanish: sepan
  alternatives_spanish:
  - conozcan
  - reconozcan
  lexicon: BDAG
  rationale: El imperativo presente plural admite fuerza exhortativa; "sepan" mantiene la orden y resulta natural en español bíblico contemporáneo.
- source_word: ἐγγύς
  english_pob_choice: near
  chosen_spanish: cerca
  alternatives_spanish:
  - próximo
  - near
  lexicon: BDAG
  rationale: '"Cerca" es el equivalente español más directo y natural para la proximidad expresada por ἐγγύς.'
- source_word: ἐπὶ θύραις
  english_pob_choice: at the doors
  chosen_spanish: a las puertas
  alternatives_spanish:
  - en las puertas
  - junto a las puertas
  lexicon: BDAG
  rationale: El plural θύραις se preserva con "las puertas"; la preposición "a" comunica la idea idiomática de inminencia y conserva la pluralidad mejor que la singular tradicional.
theological_decisions:
- issue: Sujeto implícito de ἐγγύς ἐστιν
  english_pob_reading: Render impersonally as 'it is near'
  chosen_spanish_reading: está cerca
  alternative_spanish_readings:
  - él está cerca
  - está cerca de ustedes
  rationale: El griego no expresa sujeto explícito. En español, "está cerca" preserva esa ambigüedad mejor que resolverla con un sujeto personal o con una referencia más concreta al evento, al Reino o al Hijo del Hombre.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
translation_notes:
  revision_awareness: El texto inglés auditado no requirió revisiones; se mantuvo la ambigüedad del sujeto implícito en ἐγγύς ἐστιν y la pluralidad de θύραις.
  spanish_consistency_notes:
  - Se prefirió "ustedes" en lugar de "vosotros" por registro neutro latinoamericano.
  - Se mantuvo la repetición de pluralidad en "todas estas cosas" y "las puertas" para reflejar mejor el griego.
  - La nota al pie conserva la tensión interpretativa sobre el sujeto implícito sin resolverla.
