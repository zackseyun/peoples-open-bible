translation:
  language: es
  text: Pues nuestros hermanos[a], después de haber soportado un breve sufrimiento, han caído bajo el pacto de Dios en la vida eterna; pero tú, por el juicio de Dios, cargarás justamente con las penas de tu arrogancia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «han muerto bajo el pacto de Dios para la vida eterna». El griego es compacto, y «han caído» conserva la imagen verbal literal.'
    reason: alternative_reading
lexical_decisions:
- source_word: βραχὺν
  english_pob_choice: brief
  chosen_spanish: breve
  alternatives_spanish:
  - corto
  - momentáneo
  lexicon: LSJ
  rationale: «Breve» conserva la idea de poca duración de πόνος en un español natural y mantiene el contraste con «vida eterna» sin añadir intensidad no explicitada.
- source_word: ἐπενέγκαντες πόνον
  english_pob_choice: having endured a brief pain
  chosen_spanish: después de haber soportado un breve sufrimiento
  alternatives_spanish:
  - después de haber padecido un breve dolor
  - después de haber pasado por un breve tormento
  lexicon: LSJ
  rationale: El participio con πόνος expresa haber soportado/padecido aflicción. «Soportado un breve sufrimiento» suena idiomático y conserva el sentido martirial sin volverlo más específico de lo que permite el griego.
- source_word: ἀενάου ζωῆς
  english_pob_choice: everlasting life
  chosen_spanish: vida eterna
  alternatives_spanish:
  - vida perpetua
  - vida incesante
  lexicon: LSJ
  rationale: «Vida eterna» es la forma española clara y fiel para ζωή de duración perpetua; preserva el valor durativo de ἀενάος y el contraste con la breve aflicción.
- source_word: ὑπὸ διαθήκην θεοῦ
  english_pob_choice: under God's covenant
  chosen_spanish: bajo el pacto de Dios
  alternatives_spanish:
  - bajo el pacto de Yahvé
  - en el ámbito del pacto de Dios
  lexicon: LSJ
  rationale: «Pacto» refleja διαθήκη en este contexto de alianza/covenio, y «bajo» conserva la preposición ὑπό. Se evita suavizarlo a una fórmula más interpretativa como «según el pacto».
- source_word: πεπτώκασιν
  english_pob_choice: have fallen
  chosen_spanish: han caído
  alternatives_spanish:
  - han muerto
  - han perecido
  lexicon: LSJ
  rationale: Se mantiene la imaginería literal de «caer» que el POB inglés preservó; en este contexto martirial, la muerte queda sugerida por la construcción sin eliminar la figura textual.
- source_word: τῇ τοῦ θεοῦ κρίσει
  english_pob_choice: by the judgment of God
  chosen_spanish: por el juicio de Dios
  alternatives_spanish:
  - según el juicio de Dios
  - ante el juicio de Dios
  lexicon: LSJ
  rationale: «Juicio» es la equivalencia directa de κρίσις y la preposición «por» expresa el medio o la referencia judicial sin perder la relación con la acción retributiva de Dios.
- source_word: δίκαια
  english_pob_choice: justly
  chosen_spanish: con justicia
  alternatives_spanish:
  - justamente
  - de manera justa
  lexicon: LSJ
  rationale: Se conserva el adverbial de manera natural en español y la fuerza de retribución justa que el texto atribuye al castigo.
- source_word: τὰ πρόστιμα
  english_pob_choice: the penalties
  chosen_spanish: las penas
  alternatives_spanish:
  - los castigos
  - las sanciones
  lexicon: LSJ
  rationale: Aunque πρόστιμα puede sugerir multa o pena, aquí el contexto es retributivo-divino; «penas» mantiene amplitud semántica y suena más natural que una traducción administrativa.
- source_word: ὑπερηφανίας
  english_pob_choice: arrogance
  chosen_spanish: tu arrogancia
  alternatives_spanish:
  - tu soberbia
  - tu altivez
  lexicon: LSJ
  rationale: «Arrogancia» reproduce el juicio moral del texto y evita una tonalidad demasiado coloquial. Se conserva el posesivo para la acusación directa al rey.
theological_decisions:
- issue: Relación entre la muerte sufrida y la vida eterna en ὑπὸ διαθήκην θεοῦ ... ἀενάου ζωῆς
  english_pob_reading: The brothers, after brief suffering, have died within the sphere of God's covenant and so entered everlasting life.
  chosen_spanish_reading: Los hermanos, después de sufrir brevemente, han caído bajo el pacto de Dios hacia la vida eterna.
  alternative_spanish_readings:
  - Los hermanos han caído conforme al pacto de Dios para la vida eterna.
  - Los hermanos han muerto bajo el pacto de Dios y han entrado en la vida eterna.
  rationale: 'La redacción conserva la tensión del griego: caída/muerte literal y orientación hacia vida eterna, sin resolver demasiado la relación sintáctica. «Hacia» deja abierta la compacta conexión entre el caer y la vida, siguiendo la cautela del POB inglés.'
  doctrine_reference: Mantener la tensión lexical y teológica del texto fuente; primacía del original sobre una armonización doctrinal.
- issue: Cómo expresar la retribución divina en τῇ τοῦ θεοῦ κρίσει δίκαια τὰ πρόστιμα τῆς ὑπερηφανίας ἀποίσῃ
  english_pob_reading: by the judgment of God, will justly bear the penalties of your arrogance.
  chosen_spanish_reading: por el juicio de Dios, sufrirás con justicia las penas de tu arrogancia.
  alternative_spanish_readings:
  - por el juicio de Dios, cargarás justamente con las penas de tu arrogancia.
  - según el juicio de Dios, recibirás con justicia las penas de tu arrogancia.
  rationale: El futuro mantiene la advertencia directa al rey. «Sufrirás con justicia» comunica el carácter retributivo sin introducir un matiz excesivamente técnico; «penas» conserva la idea de castigo impuesto por un juez divino.
  doctrine_reference: Preservar el juicio retributivo divino sin añadir especificaciones penales no explícitas en el griego.
translation_notes:
  revision_awareness: El texto griego presenta una sintaxis compacta y algo abrupta; la versión española sigue la decisión auditada del POB de preservar la imagen de «caer» y la relación entre sufrimiento breve, pacto de Dios y vida eterna, sin suavizar la tensión. No se aplicaron revisiones nuevas respecto al último pase auditable.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεοῦ y «pacto» para διαθήκη en coherencia con el pasaje.
  - Se evita «SEÑOR» como sustituto del nombre divino porque el source packet usa θεοῦ explícitamente.
  - «Vida eterna» conserva la fórmula española estable para ἀενάου ζωῆς, sin borrar el matiz de duración indefinida.
  - «Arrogancia» traduce ὑπερηφανία con carga moral directa, en línea con el inglés auditado.
