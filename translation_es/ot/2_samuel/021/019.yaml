    issue: '''hirió'' debilita וַיַּךְ en este contexto'
    rationale: En un relato de combate con objeto directo personal famoso, 'hirió' puede sugerir solo una herida no mortal. El POB inglés eligió 'struck down' precisamente para mantener la fuerza marcial sin reducirla a mera lesión.
  - severity: medium
    issue: '''enjullo de un telar'' es demasiado técnico y poco transparente'
    rationale: Aunque intenta precisar la pieza del telar, no es una expresión ampliamente comprendida en español general. Una formulación como 'rodillo de un telar' comunica la comparación de manera más clara sin perder la imagen.
  - severity: low
