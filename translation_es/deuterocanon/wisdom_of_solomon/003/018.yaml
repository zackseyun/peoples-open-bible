translation:
  language: es
  text: Aunque murieran rápidamente[a], no tienen esperanza ni consuelo en el día del juicio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el día de la decisión» o «el día del discernimiento». El término griego puede denotar una evaluación decisiva o un juicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐάν τε
  english_pob_choice: Even if
  chosen_spanish: Aunque
  alternatives_spanish:
  - si acaso
  - aun si
  lexicon: LSJ
  rationale: La construcción griega introduce una concesión; «Aunque» expresa bien esa fuerza en español natural, sin perder el matiz hipotético.
- source_word: ὀξέως
  english_pob_choice: quickly
  chosen_spanish: rápidamente
  alternatives_spanish:
  - de prisa
  - velozmente
  lexicon: LSJ
  rationale: El adverbio señala rapidez. «Rápidamente» es la opción más directa y sobria en español.
- source_word: τελευτήσωσιν
  english_pob_choice: they die
  chosen_spanish: murieran
  alternatives_spanish:
  - mueren
  - llegaran a morir
  - terminaran su vida
  lexicon: LSJ
  rationale: El verbo alude a morir o llegar al fin de la vida. En la cláusula concesiva española, el subjuntivo imperfecto mantiene la estructura natural de «Aunque».
- source_word: ἐλπίδα
  english_pob_choice: hope
  chosen_spanish: esperanza
  alternatives_spanish:
  - expectativa
  lexicon: LSJ
  rationale: «Esperanza» reproduce el sentido normal de ἐλπίδα y conserva el tono escatológico del contexto.
- source_word: ἡμέρᾳ διαγνώσεως
  english_pob_choice: the day of judgment
  chosen_spanish: el día del juicio
  alternatives_spanish:
  - el día de la decisión
  - el día del discernimiento
  lexicon: LSJ
  rationale: Se conserva la lectura de juicio por el contexto de retribución final, pero en la nota se mantiene la amplitud semántica de διάγνωσις que puede implicar decisión o discernimiento.
- source_word: παραμύθιον
  english_pob_choice: comfort
  chosen_spanish: consuelo
  alternatives_spanish:
  - consolación
  - aliento
  lexicon: LSJ
  rationale: El sustantivo expresa alivio o consolación; «consuelo» es el equivalente más natural y fiel en español bíblico contemporáneo.
theological_decisions:
- issue: Alcance de ἡμέρᾳ διαγνώσεως
  english_pob_reading: the day of judgment
  chosen_spanish_reading: el día del juicio
  alternative_spanish_readings:
  - el día de la decisión
  - el día del discernimiento
  rationale: El pasaje contrasta el destino final de los impíos y los justos; «día del juicio» comunica mejor ese horizonte escatológico. A la vez, se preserva la tensión lexical de διάγνωσις en la nota, sin reducirla de modo absoluto a una sola acepción.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica y el rango semántico cuando el original lo permite.'
translation_notes:
  revision_awareness: Coincide sustancialmente con el tramo revisado del audit trail inglés; no se requieren cambios respecto de la lectura base, pero se mantiene en español la ambigüedad documentada de διάγνωσις en la nota.
  spanish_consistency_notes:
  - Se usa «juicio» para ἡμέρᾳ διαγνώσεως por coherencia con el sentido escatológico del contexto y con la decisión inglesa auditada.
  - Se usa «consuelo» para παραμύθιον, evitando un tono excesivamente abstracto como «consolación».
  - La cláusula concesiva se adapta a una sintaxis española natural con «Aunque» + subjuntivo, sin alterar el contenido del griego.
