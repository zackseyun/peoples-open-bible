translation:
  language: es
  text: y el peso del oro para las mesas de la disposición[a], mesa por mesa, y plata para las mesas de plata.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mesas para el pan de la disposición», tradicionalmente «mesas para el pan de la proposición».
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשְׁקָל
  english_pob_choice: weight
  chosen_spanish: peso
  alternatives_spanish:
  - cantidad por peso
  - medida
  lexicon: HALOT
  rationale: En este contexto de inventario del templo, el hebreo indica la cantidad asignada por peso de metal precioso. «Peso» es la equivalencia más directa y natural en español, sin introducir una noción de valor abstracto.
- source_word: שֻׁלְחֲנוֹת הַמַּעֲרֶכֶת
  english_pob_choice: tables of the arrangement
  chosen_spanish: las mesas de la disposición
  alternatives_spanish:
  - las mesas de la fila
  - las mesas para el pan de la disposición
  - las mesas del pan de la proposición
  lexicon: HALOT
  rationale: Se conserva el sentido transparente de מַעֲרֶכֶת como algo «dispuesto en orden». «Disposición» mantiene esa transparencia y evita imponer en el texto principal la terminología tradicional posterior, aunque esa referencia cultual se reconoce en nota.
- source_word: לְשֻׁלְחָן וְשֻׁלְחָן
  english_pob_choice: for each table and table
  chosen_spanish: para cada mesa y mesa
  alternatives_spanish:
  - para mesa por mesa
  - para cada mesa
  - para cada una de las mesas
  lexicon: HALOT
  rationale: La repetición hebrea es distributiva. «Para cada mesa y mesa» conserva esa repetición enfática y sigue siendo comprensible en español, sin aplanarla del todo.
- source_word: כֶּסֶף
  english_pob_choice: silver
  chosen_spanish: plata
  alternatives_spanish:
  - plata
  - metal de plata
  lexicon: HALOT
  rationale: El término denota el material mismo, en paralelo con el oro. «Plata» es el equivalente natural en español.
- source_word: שֻׁלְחֲנוֹת הַכָּסֶף
  english_pob_choice: the silver tables
  chosen_spanish: las mesas de plata
  alternatives_spanish:
  - las mesas plateadas
  - las mesas de plata
  lexicon: HALOT
  rationale: El sintagma constructo se entiende de manera natural como mesas de plata o destinadas a la plata. «Mesas de plata» es conciso, fiel y idiomático.
theological_decisions:
- issue: Terminología cultual de מַעֲרֶכֶת
  english_pob_reading: tables of the arrangement; footnote notes possible 'tables for the bread of arrangement,' traditionally 'tables for the showbread.'
  chosen_spanish_reading: 'mesas de la disposición; nota: «O ‘mesas para el pan de la disposición’, tradicionalmente ‘mesas para el pan de la proposición’»'
  alternative_spanish_readings:
  - mesas para el pan de la disposición
  - mesas para el pan de la proposición
  rationale: La traducción principal mantiene la transparencia lexical del hebreo y no adelanta la terminología tradicional en el cuerpo del texto. La nota preserva la lectura cultual más específica, incluida la forma tradicional conocida en español.
  doctrine_reference: Terminología del culto del tabernáculo/templo; no implica una diferencia doctrinal, sino de precisión lexical y tradición de traducción.
translation_notes:
  revision_awareness: 'El texto sigue la lectura hebrea directa y coincide con el sentido auditado en inglés: peso del oro, distribución mesa por mesa y plata para las mesas de plata. Se conserva la ambigüedad léxica de מַעֲרֶכֶת en el cuerpo y se explicita en nota, sin introducir interpretaciones no atestiguadas.'
  spanish_consistency_notes:
  - Se emplea «Yahvé» solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se usa «mesas» para mantener coherencia con el inventario de utensilios del templo y con el paralelo hebreo de שֻׁלְחָן.
  - Se evita «pan de la proposición» en el texto principal porque la nota ya preserva la terminología tradicional como alternativa, y porque el hebreo aquí es más transparente que técnico.
