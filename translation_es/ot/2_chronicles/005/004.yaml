lexical_decisions:
- source_word: וַיָּבֹאוּ
  english_pob_choice: came
  chosen_spanish: vinieron
  alternatives_spanish:
  - llegaron
  - vinieron y llegaron
  lexicon: HALOT
  rationale: El wayyiqtol de בוא marca la secuencia narrativa. En español, «vinieron» comunica de forma natural la llegada de los ancianos sin añadir matices ajenos al hebreo.
- source_word: כֹּל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - la totalidad de
  - cada uno de
  lexicon: HALOT
  rationale: «Todos» preserva el valor cuantificador y mantiene el tono narrativo claro y natural en español.
- source_word: זִקְנֵי יִשְׂרָאֵל
  english_pob_choice: the elders of Israel
  chosen_spanish: los ancianos de Israel
  alternatives_spanish:
  - los ancianos de Israel
  - los líderes ancianos de Israel
  lexicon: HALOT
  rationale: «Ancianos» reproduce el grupo reconocido de autoridad representativa. En español eclesial es el equivalente más directo y natural de זִקְנֵי.
- source_word: וַיִּשְׂאוּ
  english_pob_choice: carried
  chosen_spanish: llevaron
  alternatives_spanish:
  - cargaron
  - transportaron
  - alzaron
  lexicon: HALOT
  rationale: Aquí נשׂא describe el traslado del arca. «Llevaron» es más idiomático en español y conserva la idea de transporte sin forzar un tecnicismo.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levitas
  - los levitas de la tribu de Leví
  lexicon: HALOT
  rationale: El nombre tribal/cultual estándar se expresa naturalmente como «los levitas», que es el equivalente establecido y transparente en español.
- source_word: אֶת הָאָרוֹן
  english_pob_choice: the ark
  chosen_spanish: el arca
  alternatives_spanish:
  - el arca
  - el arca del pacto
  lexicon: HALOT
  rationale: El hebreo dice simplemente «el arca». Se conserva esa forma en la línea principal, dejando que el contexto identifique el referente sin expandirlo más allá del texto.
theological_decisions:
- issue: Identidad del arca
  english_pob_reading: Render simply as 'the ark' without adding 'of the covenant' in the main text.
  chosen_spanish_reading: Traducir simplemente «el arca» en el texto principal.
  alternative_spanish_readings:
  - el arca del pacto
  rationale: El hebreo no añade una especificación aquí. Para respetar la primacía del texto original, la línea principal mantiene la forma breve; la precisión contextual puede señalarse en nota.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; never paraphrase beyond what the source text warrants.'
translation_notes:
  revision_awareness: La revisión más reciente marcó el pasaje como sin cambios necesarios; se mantiene el contenido principal y la decisión de no expandir «el arca» en la línea principal.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como terminología general del proyecto cuando aplique, pero en este versículo no aparece el nombre divino.
  - «Levitas» se conserva como término técnico cultual estándar.
  - El orden narrativo español sigue de cerca la secuencia hebrea sin calcar la sintaxis de manera rígida.
