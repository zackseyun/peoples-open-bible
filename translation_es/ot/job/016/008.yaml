translation:
  language: es
  text: Tú me has marchitado; se ha vuelto un testigo; mi flacura[a] se levanta contra mí y testifica ante mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi consumición». El término hebreo puede denotar emaciación física; algunos lo toman en cambio como «mi falsedad» o «la mentira contra mí», pero el sentido corporal encaja mejor con el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּקְמְטֵנִי
  english_pob_choice: You have shriveled me up
  chosen_spanish: Tú me has marchitado
  alternatives_spanish:
  - Tú me has encogido
  - Tú me has arrugado
  - Tú me has consumido
  lexicon: HALOT
  rationale: El verbo raro apunta a desgaste físico o consumición del cuerpo. «Marchitado» comunica bien el sentido de debilitamiento corporal y mantiene una imagen natural en español, sin forzar un calco como «arrugado».
- source_word: לְעֵד הָיָה
  english_pob_choice: it has become a witness
  chosen_spanish: se ha vuelto un testigo
  alternatives_spanish:
  - se ha convertido en testigo
  - es un testigo
  - sirve como testigo
  lexicon: HALOT
  rationale: 'La frase conserva la metáfora forense: la condición física de Job pasa a funcionar como testigo en su contra. «Se ha vuelto un testigo» mantiene la terseza del hebreo y la relación con el lenguaje legal.'
- source_word: וַיָּקָם
  english_pob_choice: rises up
  chosen_spanish: se levanta
  alternatives_spanish:
  - se alza
  - se pone en pie
  - ha surgido
  lexicon: HALOT
  rationale: El verbo expresa la imagen de alguien que se pone en pie como testigo o acusador. «Se levanta» es idiomático y conserva la vivacidad de la escena.
- source_word: בִּי
  english_pob_choice: against me
  chosen_spanish: contra mí
  alternatives_spanish:
  - en mí
  - sobre mí
  lexicon: HALOT
  rationale: Aunque literalmente puede decir «en mí», el contexto es adversarial y jurídico; por eso en español se expresa naturalmente como «contra mí».
- source_word: כַחֲשִׁי
  english_pob_choice: my gauntness
  chosen_spanish: mi flacura
  alternatives_spanish:
  - mi leanness
  - mi adelgazamiento
  - mi wasting
  lexicon: HALOT
  rationale: El sustantivo puede referirse a delgadez, emaciación o flaqueza corporal. «Flacura» comunica el estado físico visible y evita la ambigüedad moral de «falsedad», que el contexto aquí no favorece.
- source_word: בְּפָנַי
  english_pob_choice: to my face
  chosen_spanish: delante de mi rostro
  alternatives_spanish:
  - ante mí
  - a mi cara
  - en mi presencia
  lexicon: HALOT
  rationale: La expresión conserva el tono confrontativo y forense. «Delante de mi rostro» sigue de cerca el hebreo y resulta comprensible en registro bíblico español.
- source_word: יַעֲנֶה
  english_pob_choice: testifies
  chosen_spanish: testifica
  alternatives_spanish:
  - responde
  - da testimonio
  - declara
  lexicon: HALOT
  rationale: En este contexto, ענה tiene sentido legal de responder como testigo. «Testifica» enlaza bien con «testigo» y preserva la fuerza acusatoria del verso.
theological_decisions:
- issue: ¿El verso debe suavizar la acusación implícita contra Dios?
  english_pob_reading: 'Direct address to God: ''You have shriveled me up'''
  chosen_spanish_reading: 'Dirección explícita a Dios: «Tú me has marchitado»'
  alternative_spanish_readings:
  - Me he marchitado
  - Esto me ha marchitado
  - Mi cuerpo ha quedado marchito
  rationale: El hebreo conserva una acusación en segunda persona dentro del lamento. La traducción mantiene esa tensión teológica sin suavizarla ni convertirla en una descripción impersonal.
  doctrine_reference: Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en inglés, que prefirió una fórmula forense consistente («testifies») para el último verbo. En español se reflejó esa coherencia mediante «testifica» y la repetición del campo semántico legal con «testigo».
  spanish_consistency_notes:
  - Se mantiene el vocativo directo en segunda persona («Tú me has...»), conforme a la lectura teológica del lamento.
  - Se preserva el léxico forense con «testigo» / «testifica» para reflejar la progresión de la imagen hebrea.
  - «Marchitado» y «flacura» se coordinan como imágenes corporales coherentes sin introducir un matiz moral ajeno al contexto.
