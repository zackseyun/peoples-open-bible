theological_decisions:
- issue: Referent of 'my house'
  chosen_reading: YHWH speaks of his own house/people under his protection, without narrowing it to temple alone in the main text.
  alternative_readings:
  - the temple specifically
  - the land/people of God more broadly
  rationale: The phrase can evoke the temple, but in this context of military protection and the following plural pronoun 'them,' the scope appears to include the people associated with YHWH's house. The translation keeps the literal 'my house' and avoids over-specifying the referent.
