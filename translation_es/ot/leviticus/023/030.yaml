translation:
  language: es
  text: Y toda persona que haga cualquier trabajo en este mismo día, yo destruiré[a] a esa persona de entre su pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cortaré a esa persona de entre su pueblo». El verbo hebreo aquí es «destruir/hacer perecer», no el verbo habitual para «cortar», aunque el sentido de remoción en juicio está estrechamente relacionado.'
    reason: alternative_reading
lexical_decisions:
- source_word: הַנֶּפֶשׁ
  english_pob_choice: person
  chosen_spanish: persona
  alternatives_spanish:
  - alma
  - vida
  lexicon: HALOT
  rationale: En prose legal/covenantal, נֶפֶשׁ designa a menudo al individuo mismo, no al alma inmortal. «Persona» conserva ese valor referencial y suena natural en español jurídico-bíblico.
- source_word: תַּעֲשֶׂה
  english_pob_choice: does
  chosen_spanish: haga
  alternatives_spanish:
  - hace
  - realice
  lexicon: HALOT
  rationale: El hebreo es un verbo amplio de hacer/actuar; en español, en una subordinada condicional relativa, «haga» mantiene el sentido de acción sin sonar mecánico.
- source_word: כָּל מְלָאכָה
  english_pob_choice: any work
  chosen_spanish: cualquier trabajo
  alternatives_spanish:
  - cualquier labor
  - ningún trabajo
  lexicon: HALOT
  rationale: La expresión abarca toda clase de trabajo prohibido. «Cualquier trabajo» reproduce bien la amplitud de כָּל y es idiomático en español.
- source_word: בְּעֶצֶם הַיּוֹם הַזֶּה
  english_pob_choice: on this very day
  chosen_spanish: en este mismo día
  alternatives_spanish:
  - en este mismo día mismo
  - en el mismo día
  lexicon: HALOT
  rationale: La locución intensifica el momento señalado. «Este mismo día» conserva el énfasis de עֶצֶם הַיּוֹם sin perder naturalidad en español.
- source_word: וְהַאֲבַדְתִּי
  english_pob_choice: I will destroy
  chosen_spanish: yo destruiré
  alternatives_spanish:
  - yo haré perecer
  - yo cortaré
  lexicon: HALOT
  rationale: El hifil de אבד significa causar perecer/destruir. Se conserva «destruiré» como reflejo directo del verbo, sin introducir el tecnicismo de «cortaré» como lectura principal.
- source_word: מִקֶּרֶב עַמָּהּ
  english_pob_choice: from among his people
  chosen_spanish: de en medio de su pueblo
  alternatives_spanish:
  - de entre su pueblo
  - de en medio de su gente
  lexicon: HALOT
  rationale: La fórmula expresa remoción de la comunidad. «De en medio de su pueblo» preserva el valor relacional y judicial del hebreo; «su» refleja el sufijo pronominal del texto, mientras que «pueblo» es el término más estable en este contexto.
theological_decisions:
- issue: Naturaleza de la pena en וְהַאֲבַדְתִּי ... מִקֶּרֶב עַמָּהּ
  english_pob_reading: I will destroy that person from among his people
  chosen_spanish_reading: yo destruiré a esa persona de en medio de su pueblo
  alternative_spanish_readings:
  - yo cortaré a esa persona de en medio de su pueblo
  rationale: El hebreo usa אבד en hifil, no כרת. Por eso la traducción principal mantiene «destruiré». Se deja implícita la idea de expulsión/judgment comunitario mediante «de en medio de su pueblo», sin convertir el verbo principal en el tecnicismo tradicional de «cortar».
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: El control cruzado reporta alta concordancia (1.0) con el texto fuente y sin cambios pendientes; se conserva la decisión principal de traducir אבד en hifil como «destruir» y se mantiene la nota alternativa de «cortar» solo como lectura contextual.
  spanish_consistency_notes:
  - Se usa «Yahvé» cuando el texto fuente requiera el nombre divino; este versículo no lo contiene.
  - Se mantiene «persona» para נֶפֶשׁ en contexto legal, coherente con el criterio del POB inglés.
  - Se preserva el tono jurídico de la cláusula mediante «de en medio de su pueblo».
