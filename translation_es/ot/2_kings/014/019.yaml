translation:
  language: es
  text: Y conspiraron contra él en Jerusalén, y huyó a Laquis; y enviaron tras él[a] a Laquis y le dieron muerte allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «enviaron en persecución de él a Laquis». El hebreo dice literalmente «enviaron tras él».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְשְׁרוּ עָלָיו קֶשֶׁר
  english_pob_choice: they conspired against him
  chosen_spanish: conspiraron contra él
  alternatives_spanish:
  - tramaron contra él
  - hicieron una conspiración contra él
  lexicon: HALOT
  rationale: La construcción hebrea con קשר y קֶשֶׁר es un modismo de intriga o rebelión política. «Conspiraron contra él» comunica de forma natural ese sentido hostil y mantiene la idea relacional de agresión implícita en el hebreo.
- source_word: בִּירוּשָׁלִַם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  lexicon: HALOT
  rationale: Corresponde al valor locativo directo de la preposición ב con el nombre propio de la ciudad.
- source_word: וַיָּנָס
  english_pob_choice: he fled
  chosen_spanish: huyó
  alternatives_spanish:
  - escapó
  - salió huyendo
  lexicon: HALOT
  rationale: נוס normalmente expresa huida; «huyó» es la opción más directa y natural en español narrativo, sin añadir matiz interpretativo.
- source_word: לָכִישָׁה
  english_pob_choice: to Lachish
  chosen_spanish: a Laquis
  alternatives_spanish:
  - hacia Laquis
  lexicon: HALOT
  rationale: El sufijo direccional indica movimiento hacia el lugar. En español, «a Laquis» comunica bien esa dirección con fluidez; se conserva el topónimo tradicional Laquis.
- source_word: וַיִּשְׁלְחוּ אַחֲרָיו
  english_pob_choice: they sent after him
  chosen_spanish: enviaron tras él
  alternatives_spanish:
  - lo persiguieron enviando gente
  - enviaron en su persecución
  lexicon: HALOT
  rationale: El hebreo dice literalmente «enviaron después de él/tras él»; la frase española mantiene esa tersura y evita introducir un objeto no explicitado, como «hombres».
- source_word: וַיְמִתֻהוּ
  english_pob_choice: put him to death
  chosen_spanish: lo mataron
  alternatives_spanish:
  - le dieron muerte
  - lo hicieron morir
  lexicon: HALOT
  rationale: Aunque el inglés opta por «put him to death» para reflejar el carácter deliberado, en español «lo mataron» transmite de manera natural la acción causativa sin perder la fuerza del relato. «Le dieron muerte» sería más formal, pero menos inmediato.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  lexicon: HALOT
  rationale: Adverbio de lugar que remite a Laquis; «allí» suena más formal y adecuado al registro bíblico en español.
translation_notes:
  revision_awareness: El inglés POB fue revisado desde «but» a «and» para reflejar mejor la conjunción hebrea; la versión española sigue ese flujo coordinativo con «y» en ambas cláusulas principales. También se mantuvo la decisión del POB de no explicitar el objeto de «enviaron tras él».
  spanish_consistency_notes:
  - Se conservó el nombre tradicional «Laquis» para el topónimo.
  - Se mantuvo el tono narrativo sobrio y directo, sin añadir sujetos u objetos no presentes en el hebreo.
  - La nota [a] se ancla en «Jerusalén» para reflejar la posibilidad de relacionar el envío con la ciudad del complot, sin alterar el sentido principal del versículo.
