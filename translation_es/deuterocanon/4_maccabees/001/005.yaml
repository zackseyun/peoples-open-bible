translation:
  language: es
  text: ¿Cómo, pues, quizá dirían algunos[a], si la razón gobierna las pasiones, no domina también el olvido y la ignorancia? Al intentar decir esto, se vuelven ridículos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «es ridículo intentar decir esto». El griego γελοῖον ἐπιχειροῦντες λέγειν puede entenderse de manera impersonal o referido a los objetores.'
    reason: alternative_reading
lexical_decisions:
- source_word: πῶς οὖν
  english_pob_choice: How then
  chosen_spanish: ¿Cómo, pues
  alternatives_spanish:
  - ¿Cómo, entonces
  - ¿De qué modo, pues
  lexicon: LSJ
  rationale: Mantiene la apertura retórica del griego y el nexo argumentativo de οὖν sin volver la frase pesada en español.
- source_word: ἴσως εἴποιεν ἄν τινες
  english_pob_choice: perhaps some might say
  chosen_spanish: quizá dirían algunos
  alternatives_spanish:
  - quizá algunos dirían
  - tal vez dirían algunos
  lexicon: LSJ
  rationale: Reproduce la idea de una objeción hipotética, con un español natural que conserva la indefinición de τινες y la modalidad potencial.
- source_word: τῶν παθῶν
  english_pob_choice: the passions
  chosen_spanish: las pasiones
  alternatives_spanish:
  - las emociones
  - los impulsos
  lexicon: LSJ
  rationale: En 4 Macabeos πάθη es un término técnico ético-filosófico; 'pasiones' conserva mejor ese valor que 'emociones' o 'impulsos'.
- source_word: ὁ λογισμὸς
  english_pob_choice: reason
  chosen_spanish: la razón
  alternatives_spanish:
  - el razonamiento
  - el juicio racional
  lexicon: LSJ
  rationale: '''Razón'' es la forma más natural y fiel para el facultad racional de este argumento, sin perder el peso filosófico de λογισμός.'
- source_word: κρατεῖ
  english_pob_choice: rules over
  chosen_spanish: gobierna sobre
  alternatives_spanish:
  - rige sobre
  - domina sobre
  lexicon: LSJ
  rationale: '''Gobierna sobre'' expresa bien la relación de mando y resulta idiomático en español; mantiene la imagen de soberanía sobre las pasiones.'
- source_word: λήθης καὶ ἀγνοίας
  english_pob_choice: forgetfulness and ignorance
  chosen_spanish: el olvido y la ignorancia
  alternatives_spanish:
  - el olvido y el desconocimiento
  - la falta de conocimiento y la ignorancia
  lexicon: LSJ
  rationale: Conserva la pareja de sustantivos concretos sin intensificar ni suavizar el contraste. 'Olvido' comunica λήθη con naturalidad en español.
- source_word: οὐ δεσπόζει
  english_pob_choice: does it not also master
  chosen_spanish: no domina también
  alternatives_spanish:
  - no es también dueña de
  - no ejerce también dominio sobre
  lexicon: LSJ
  rationale: '''Domina'' conserva la fuerza de δεσπόζω y encaja con el paralelismo de gobernar/dominar. El ''también'' reproduce la inferencia lógica del argumento.'
- source_word: γελοῖον
  english_pob_choice: they are being ridiculous
  chosen_spanish: son ridículos
  alternatives_spanish:
  - resultan ridículos
  - hablan con ridiculez
  lexicon: LSJ
  rationale: El adjetivo predicativo en español puede expresarse de forma natural con 'son ridículos', que refleja el tono polémico sin forzar una perífrasis.
- source_word: ἐπιχειροῦντες λέγειν
  english_pob_choice: In attempting to say this
  chosen_spanish: Al intentar decir esto
  alternatives_spanish:
  - Mientras intentan decir esto
  - Intentando decir esto
  lexicon: LSJ
  rationale: La frase participial se expresa como circunstancia concomitante; 'esto' remite a la objeción inmediatamente precedente, como en el inglés auditado.
theological_decisions:
- issue: Términos antropológicos y éticos en 4 Macabeos
  english_pob_reading: Render λογισμός as 'reason' and πάθη as 'passions'
  chosen_spanish_reading: Traducir λογισμός como 'razón' y πάθη como 'pasiones'
  alternative_spanish_readings:
  - λoγισμός como 'juicio racional'
  - πάθη como 'emociones'
  rationale: La sección pertenece al argumento continuo del libro sobre la razón piadosa que gobierna las pasiones. 'Razón'/'pasiones' preserva mejor el marco conceptual sin diluir la precisión filosófica.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Fuerza de γελοῖον con el participio ἐπιχειροῦντες λέγειν
  english_pob_reading: 'Apply the ridicule to the unnamed objectors: ''they are being ridiculous'''
  chosen_spanish_reading: 'Aplicar la ridiculización a los objetores implícitos: ''son ridículos'''
  alternative_spanish_readings:
  - '''es ridículo intentar decir esto'''
  - '''resulta ridículo decir esto'''
  rationale: El griego puede leerse impersonalmente o referido a quienes proponen la objeción. La opción escogida mantiene el tono polémico y hace explícita la referencia a los objetores, como en el audit trail inglés.
  doctrine_reference: Translation philosophy §§3, 6
translation_notes:
  revision_awareness: El pasaje fue revisado recientemente y quedó sin cambios sustanciales; la versión española sigue el mismo juicio textual y semántico del audit trail inglés, ajustándolo a un español natural y fiel al griego.
  spanish_consistency_notes:
  - Se mantiene 'pasiones' como término técnico ético-filosófico en 4 Macabeos.
  - '''Razón'' se usa para λογισμός según la lectura filosófica del libro.'
  - 'Se evita ''Señor'' u otras sustituciones innecesarias: no aparecen aquí.'
  - El tono retórico y polémico se conserva sin ampliar el sentido del griego.
