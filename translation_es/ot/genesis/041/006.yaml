  - severity: low
    issue: «después de ellas» es menos idiomático que «tras ellas» en esta imagen onírica
    rationale: אַחֲרֵיהֶן puede ser temporal o espacial; «tras ellas» conserva ambas posibilidades con mejor fluidez en español narrativo.
  revised_spanish_text: Y he aquí[a], siete espigas delgadas, abrasadas por el viento del oriente, brotaban tras ellas.
