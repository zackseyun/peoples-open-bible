translation:
  text: A cruel man will give a stumbling block and will not spare[b][a]; against the life of many he plots a plot.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''A merciless man is one who does not keep words, and he will certainly not spare with respect to injury and bonds.'' The Greek parallel reflects a substantially different wording in the first half of the verse and supports the general sense of pitiless harm, but the main translation follows the extant Hebrew witness.'
    reason: textual_variant
  - marker: b
    text: 'Or more idiomatically, ''he schemes against many lives.'' The Hebrew repeats the same root for emphasis: literally, ''he plots a plot.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: אַכְזָרִי
  chosen: a cruel man
  alternatives:
  - the cruel one
  - a ruthless man
  - merciless
  lexicon: HALOT
  rationale: The Hebrew adjective/noun denotes a cruel or ruthless person. 'A cruel man' gives natural English while preserving the singular representative force of the Hebrew.
- source_word: יִתֵּן כֹּשֶׂל
  chosen: will give a stumbling block
  alternatives:
  - will cause stumbling
  - will trip up
  - will give offense
  lexicon: HALOT
  rationale: The Hebrew is somewhat terse. כֹּשֶׂל is taken in the sense of something causing stumbling or collapse. 'Give a stumbling block' stays close to the Hebrew wording while signaling harmful action. The Greek parallel differs here, reading about not keeping words, which suggests textual instability, but the Hebrew witness is primary.
- source_word: וְלֹא יַחְמוֹל
  chosen: and will not spare
  alternatives:
  - and will not have pity
  - and will show no mercy
  lexicon: HALOT
  rationale: חמל commonly means to spare or have compassion. 'Will not spare' is concise and idiomatic, matching the hard tone of the verse.
- source_word: עַל נֶפֶשׁ רַבִּים
  chosen: against the life of many
  alternatives:
  - against many lives
  - against many persons
  - concerning the lives of many
  lexicon: HALOT
  rationale: נפש here is best understood as 'life' rather than 'soul' in this context of harm. The preposition על is rendered 'against' because the clause describes hostile intent.
- source_word: קוֹשֵׂר קָשֶר
  chosen: he plots a plot
  alternatives:
  - he conspires a conspiracy
  - he schemes
  - he binds a plot
  lexicon: HALOT
  rationale: The cognate construction intensifies the act of scheming or conspiring. 'Plots a plot' preserves the Hebrew emphasis, though somewhat formal; it is preferable here for auditability. The smoother English sense is 'he schemes' or 'he conspires'.
