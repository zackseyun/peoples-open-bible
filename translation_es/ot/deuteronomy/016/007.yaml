  to: Y cocinarás[a] y comerás en el lugar que Yahvé tu Dios escogerá, y por la mañana te volverás e irás a tus tiendas.
  rationale: Se corrige 'escogiera' a 'escogerá' para reflejar mejor el valor prospectivo de יבחר en la fórmula deuteronómica. Se ajusta 'te volverás y te irás' a 'te volverás e irás' para conservar la secuencia de acciones del hebreo con mejor español. La nota léxica se conserva con una leve mejora de estilo.
