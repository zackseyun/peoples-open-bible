translation:
  language: es
  text: Yo soy Yahvé, y no hay otro; fuera de mí no hay Dios. Te fortalezco[a], aunque no me has conocido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «te armo» o «te ciño». El verbo hebreo puede expresar equipar, ceñir o fortalecer.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del Tetragrámaton con la forma española establecida en el proyecto, 'Yahvé', en vez de sustituirlo por un título. Esto mantiene la transparencia respecto del hebreo y evita ocultar el nombre personal de Dios.
- source_word: וְאֵין עוֹד
  english_pob_choice: and there is no other
  chosen_spanish: y no hay otro
  alternatives_spanish:
  - y no hay ninguno más
  - y no existe otro
  lexicon: HALOT
  rationale: La frase expresa exclusividad absoluta. 'No hay otro' es natural en español moderno y conserva la fuerza monoteísta del hebreo sin arcaísmo innecesario.
- source_word: זוּלָתִי
  english_pob_choice: besides me
  chosen_spanish: fuera de mí
  alternatives_spanish:
  - además de mí
  - aparte de mí
  lexicon: HALOT
  rationale: La forma con sufijo de primera persona refuerza exclusión respecto del hablante. 'Fuera de mí' comunica bien la relación de exclusión y funciona en paralelo con 'no hay otro'.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - dios
  - divinidad
  lexicon: HALOT
  rationale: En este contexto de afirmación monoteísta, 'Dios' en español reproduce mejor el valor absoluto del hebreo que una minúscula 'dios', que podría sugerir una deidad entre otras.
- source_word: אֲאַזֶּרְךָ
  english_pob_choice: I strengthen you
  chosen_spanish: yo te укрепezco
  alternatives_spanish:
  - yo te armo
  - yo te ciño
  - yo te equipo
  lexicon: HALOT
  rationale: El verbo puede abarcar equipar, ceñir o fortalecer. En contexto, la idea es que Yahvé capacita a Ciro para actuar; 'fortalezco' / 'te fortalezco' comunica esa habilitación de manera clara en español contemporáneo. Se mantiene la tensión lexical del hebreo sin resolverla de forma demasiado técnica.
- source_word: וְלֹא יְדַעְתָּנִי
  english_pob_choice: though you have not known me
  chosen_spanish: aunque no me has conocido
  alternatives_spanish:
  - aunque no me conocías
  - y no me has conocido
  lexicon: HALOT
  rationale: La lectura concesiva preserva la idea de que Yahvé fortalece a Ciro a pesar de que Ciro no lo reconoce ni lo conoce previamente. 'No me has conocido' conserva el valor relacional de ידע sin añadir más de lo que el texto dice.
theological_decisions:
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: 'La versión española mantiene la decisión doctrinal y textual del proyecto: transliterar el nombre divino en lugar de sustituirlo por un título. Esto preserva la identidad personal del Dios del pacto en el propio texto.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Concesión final frente a simple coordinación
  english_pob_reading: I strengthen you, though you have not known me
  chosen_spanish_reading: yo te fortalezco, aunque no me has conocido
  alternative_spanish_readings:
  - yo te fortalezco, y no me has conocido
  - yo te fortalezco, aunque no me conocías
  rationale: 'La conjunción concesiva mantiene la tensión teológica: Yahvé actúa soberanamente en favor de Ciro sin que éste tenga conocimiento previo de él. No se suaviza la distancia entre el don divino y el desconocimiento humano.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se requieren cambios respecto del consenso auditado; la traducción española sigue la lectura óptima y conserva las decisiones léxicas y teológicas principales del expediente en un registro publicable.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - '''Dios'' se escribe con mayúscula por referencia al único Dios verdadero en esta afirmación exclusiva.'
  - Se mantiene el matiz concesivo de la última cláusula con 'aunque'.
  - El verbo final se ha vertido con una forma española natural que conserva la ambigüedad del hebreo entre fortalecer, armar o ceñir.
