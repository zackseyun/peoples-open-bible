lexical_decisions:
- source_word: הֲ/תֹצִ֣יא
  english_pob_choice: Can you bring out
  chosen_spanish: ¿Puedes sacar a relucir
  alternatives_spanish:
  - ¿Puedes sacar
  - ¿Puedes hacer salir
  - ¿Puedes traer a la vista
  lexicon: HALOT
  rationale: 'El hifil de יצא conserva un matiz causativo: no solo “salir”, sino hacer aparecer o hacer venir a la vista. “Sacar a relucir” comunica bien esa causatividad en español sin volver más precisa la imagen de lo que permite el hebreo.'
- source_word: מַזָּר֣וֹת
  english_pob_choice: the Mazzaroth
  chosen_spanish: Mazzarot
  alternatives_spanish:
  - las constelaciones
  - el zodíaco
  lexicon: HALOT
  rationale: El término es raro y de sentido incierto. Se conserva transliterado para mantener la opacidad léxica del hebreo y no imponer una identificación discutida. Se adapta la terminación al español como nombre propio/ término técnico.
- source_word: בְּ/עִתּ֑/וֹ
  english_pob_choice: in its season
  chosen_spanish: en su tiempo
  alternatives_spanish:
  - en su estación
  - a su debido tiempo
  lexicon: HALOT
  rationale: La expresión señala el momento apropiado o designado. “En su tiempo” es natural en español y retiene el valor temporal sin forzar la imagen astronómica.
- source_word: וְ֝/עַ֗יִשׁ
  english_pob_choice: Ayish
  chosen_spanish: Ayish
  alternatives_spanish:
  - el Oso
  - Arcturo
  lexicon: HALOT
  rationale: Como el nombre astronómico es incierto, se conserva la transliteración del hebreo. Así se evita escoger una identificación tradicional que el texto no asegura.
- source_word: עַל בָּנֶ֥י/הָ
  english_pob_choice: along with her children
  chosen_spanish: con sus hijos
  alternatives_spanish:
  - con sus crías
  - junto con sus hijos
  lexicon: HALOT
  rationale: El hebreo usa un lenguaje filial/familiar que probablemente alude a estrellas o acompañantes del conjunto astronómico. “Con sus hijos” preserva la metáfora y la referencia femenina del sufijo sin añadir interpretación excesiva.
- source_word: תַנְחֵֽ/ם
  english_pob_choice: guide
  chosen_spanish: guiar
  alternatives_spanish:
  - conducir
  - dirigir
  lexicon: HALOT
  rationale: El hifil de נחה significa llevar, conducir o guiar. “Guiar” es fiel y idiomático en español, y encaja con la imagen de conducir un grupo de estrellas o una constelación.
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia con la traducción inglesa auditada. Se mantuvo la opacidad léxica de los dos nombres astronómicos raros, se preservó la metáfora filial de «sus hijos» y se evitó una identificación astronómica más precisa que el hebreo no exige.
  spanish_consistency_notes:
  - Se usó «Mazzarot» como transliteración estable en español para el término raro מַזָּרוֹת.
  - Se mantuvo «Ayish» como nombre propio astronómico incierto, con nota explicativa.
  - Se prefirió «en su tiempo» para בְּעִתּוֹ por ser más natural que una calca rígida.
  - «Guiar» reproduce bien el verbo causativo sin añadir un sujeto implícito no presente en el hebreo.
