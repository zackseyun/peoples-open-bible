revisions:
- from: Porque la alcaravea negra no se trilla con un trillo[a], ni se pasa sobre el comino con la rueda de un carro; más bien, la alcaravea negra se golpea con un palo[b], y el comino con una vara.
  to: Porque el comino negro no se trilla con un trillo[a], ni se hace rodar sobre el comino la rueda de un carro; más bien, el comino negro se bate con un bastón, y el comino con una vara[b].
  rationale: Se corrige la identificación principal de קֶצַח a "comino negro" para seguir la evidencia y la decisión documentada del POB; se repara la nota de כַּמּוֹן para reflejar la alternativa correcta; se mejora יֵחָבֶט con "se bate"; y se eleva el registro de מַטֶּה con "bastón", preservando la distinción con "vara" para שָּׁבֶט. También se hace más explícito el movimiento de la rueda con "se hace rodar sobre".
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:22:08Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura agrícola del hebreo y la lógica de contraste del versículo, pero falla en dos puntos léxicos importantes: קֶצַח se ha vertido como "alcaravea negra" en lugar de algo equivalente a "comino negro", y la nota b está invertida, pues debería preservar la alternativa de כַּמֹּן como "alcaravea", no "comino". Además, "se golpea" atenúa el matiz de יֵחָבֶט (''se bate/se apalea para desprender''), y "palo" debilita innecesariamente la distinción con "vara".'
  spanish_quality_summary: El español es natural y legible, con buena sintaxis. Sin embargo, "alcaravea negra" no es la mejor opción para el lector general ni refleja bien la decisión documentada del POB para qetsaḥ. "Bastón" tampoco conviene aquí; una pareja como "vara ... vara" perdería distinción, pero "palo" resulta algo coloquial. "Garrote" sería demasiado fuerte. "Vara" para מַטֶּה y "vara"/"cetro" no funciona; por eso conviene mantener una distinción con "bastón" o reformular. La solución más fiel y clara es usar "comino negro" para qetsaḥ y mantener "vara" para šēbeṭ, con "bastón" para maṭṭeh.
  glossary_alignment: 'No hay términos teológicos mayores en juego. En terminología léxica, el borrador se desvía del razonamiento auditado: qetsaḥ debe alinearse con "black cumin" → "comino negro" (con alternativas en nota), y kammon con "cumin" → "comino" o, mejor para evitar colisión española, "alcaravea" solo como alternativa en nota si se explicita que es identificación botánica posible. También debe preservarse la diferencia entre מַטֶּה y שָּׁבֶט.'
  issues:
  - severity: high
    issue: קֶצַח fue traducido como "alcaravea negra".
    rationale: La evidencia y la auditoría inglesa favorecen "black cumin"; en español la correspondencia natural es "comino negro", no "alcaravea negra". La elección actual altera la identificación principal y además genera confusión con la alternativa de kammon.
  - severity: high
    issue: La nota b está equivocada.
    rationale: El borrador dice "O posiblemente 'comino' para כַּמֹּן", pero "comino" ya es la identificación principal de כַּמֹּן en la auditoría inglesa. La alternativa preservada debía ser "alcaravea"/"caraway".
  - severity: medium
    issue: '"Se golpea" para יֵחָבֶט queda algo débil.'
    rationale: El verbo describe golpear para desprender la semilla. "Se bate" o "se apalea" conservan mejor el matiz de proceso agrícola sin sobreexplicar.
  - severity: medium
    issue: '"Palo" para מַטֶּה es demasiado coloquial.'
    rationale: Aunque posible, rebaja el registro y la precisión. Conviene una opción más digna que mantenga la distinción con שָּׁבֶט, como "bastón" frente a "vara".
  - severity: low
    issue: La nota a conserva innecesariamente "fitches" en inglés.
    rationale: Puede mantenerse por fidelidad al rastro auditado, pero en español conviene marcarlo claramente como arcaísmo inglés o simplemente dejarlo como alternativa histórica. No impide la comprensión del texto principal.
  revised_spanish_text: Porque el comino negro no se trilla con un trillo[a], ni se hace rodar sobre el comino la rueda de un carro; más bien, el comino negro se bate con un bastón, y el comino con una vara[b].
  revised_footnotes:
