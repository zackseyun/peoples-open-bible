translation:
  language: es
  text: Y mientras hablaba conmigo[a], caí en un sueño profundo, con el rostro en tierra[b]; pero me tocó y me puso de pie.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mientras me hablaba»; el hebreo expresa una acción en curso durante la cual ocurre el siguiente evento.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «con mi rostro hacia la tierra». La frase describe la postura de postración o caída.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְדַבְּרוֹ
  english_pob_choice: while he was speaking
  chosen_spanish: mientras hablaba conmigo
  alternatives_spanish:
  - mientras me hablaba
  - mientras estaba hablando conmigo
  lexicon: HALOT
  rationale: 'El participio con ב temporal expresa una acción en curso: no solo que habló, sino que hablaba mientras ocurre el hecho siguiente. ‘Mientras hablaba conmigo’ conserva la simultaneidad y refleja bien el valor aspectual en español natural.'
- source_word: עִמִּי
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - conmigo mismo?
  - a mí
  lexicon: HALOT
  rationale: עִם normalmente significa ‘con’. En español, ‘hablaba conmigo’ es la forma natural y sigue el matiz relacional del hebreo mejor que un simple ‘a mí’.
- source_word: נִרְדַּמְתִּי
  english_pob_choice: I fell into a deep sleep
  chosen_spanish: me quedé profundamente dormido
  alternatives_spanish:
  - caí en un sueño profundo
  - quedé en un sopor profundo
  lexicon: HALOT
  rationale: El nifal de רדם sugiere ser vencido por el sueño o un sopor intenso. ‘Me quedé profundamente dormido’ mantiene la idea de ser sobrecogido por el sueño sin introducir por sí sola la categoría técnica de ‘éxtasis’ o ‘trance’.
- source_word: עַל־פָּנַי אָרְצָה
  english_pob_choice: with my face to the ground
  chosen_spanish: con el rostro en tierra
  alternatives_spanish:
  - con la cara en el suelo
  - boca abajo en tierra
  lexicon: HALOT
  rationale: La imagen hebrea es literalmente ‘sobre mi rostro, hacia la tierra’. ‘Con el rostro en tierra’ conserva la postura de postración y suena digno en español bíblico moderno.
- source_word: וַיִּגַּע בִּי
  english_pob_choice: he touched me
  chosen_spanish: me tocó
  alternatives_spanish:
  - me rozó
  - puso su mano sobre mí
  lexicon: HALOT
  rationale: נגע con ב significa ordinariamente ‘tocar’. No se requiere un sentido más fuerte; el toque sirve para reanimar a Daniel.
- source_word: וַיַּעֲמִידֵנִי
  english_pob_choice: made me stand on my feet
  chosen_spanish: me hizo ponerme sobre mis pies
  alternatives_spanish:
  - me hizo levantarme
  - me puso de pie
  lexicon: HALOT
  rationale: 'El hifil de עמד es causativo: ‘hacer estar/poner de pie’. ‘Me hizo ponerme sobre mis pies’ refleja la revisión del inglés y comunica claramente la restauración física sin perder la fuerza causativa.'
- source_word: עַל עָמְדִי
  english_pob_choice: on my standing
  chosen_spanish: sobre mis pies
  alternatives_spanish:
  - en mi lugar
  - en mi posición
  lexicon: HALOT
  rationale: La expresión idiomática apunta a que fue restablecido a su posición erguida, no a una abstracción. En español, ‘sobre mis pies’ comunica de manera natural la restauración corporal y preserva el sentido idiomático.
theological_decisions:
- issue: Naturaleza de la condición de Daniel durante la visión
  english_pob_reading: physical collapse into deep sleep/stupor rather than a doctrinally loaded ecstatic state
  chosen_spanish_reading: un sueño profundo o sopor físico, sin imponer la categoría de éxtasis
  alternative_spanish_readings:
  - trance
  - éxtasis visionario
  rationale: El hebreo רדם describe sueño profundo o estupor. La traducción mantiene el relato corporal de Daniel y evita fijar una categoría teológica o mística que el texto no exige. Así se preserva la tensión interpretativa documentada en el original.
  doctrine_reference: Primacía del texto original; preservar la tensión exegética sin resolverla artificialmente.
translation_notes:
  revision_awareness: 'La versión final sigue la revisión inglesa más reciente al optar por una frase idiomática y natural para la restauración física: «me hizo ponerme sobre mis pies», en lugar de una fórmula más rígida. También conserva la opción de sueño profundo/sopor, sin añadir ‘trance’ como término principal.'
  spanish_consistency_notes:
  - Se usó «Dios/Yahvé» solo cuando el texto lo requiere; este versículo no contiene el nombre divino.
  - Se eligió un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - Se mantuvo la causalidad del hebreo en «me hizo ponerme» para reflejar el hifil de עמד.
  - «Conmigo» y «me» se distinguen según la función sintáctica, sin sobretraducir el hebreo.
