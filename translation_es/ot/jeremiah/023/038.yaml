translation:
  language: es
  text: 'Pero si ustedes dicen[a]: «La carga de Yahvé», por tanto, así dice Yahvé: Porque han dicho esta palabra, «La carga de Yahvé», aunque les envié a decirles: «No digan: “La carga de Yahvé”»,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «oráculo de Yahvé». El hebreo massa puede designar una declaración profética, pero se conserva «carga» para preservar el juego de palabras repetido en este pasaje.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַשָּׂא
  english_pob_choice: burden
  chosen_spanish: carga
  alternatives_spanish:
  - oráculo
  - mensaje
  lexicon: HALOT
  rationale: Conservo en español la imagen de peso/“carga” para mantener el juego de palabras y la ironía del reproche profético. «Oráculo» sería posible como sentido contextual, pero debilita la repetición del término en el versículo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Sigo el criterio del proyecto para el nombre divino. «Yahvé» preserva el Tetragrámaton como nombre propio, en lugar de ocultarlo tras «SEÑOR».
- source_word: תֹּאמֵרוּ
  english_pob_choice: you say
  chosen_spanish: dicen
  alternatives_spanish:
  - dicen ustedes
  - hablan
  - declaran
  lexicon: HALOT
  rationale: En español, la forma condicional con «si dicen» fluye mejor que un futuro o un presente más rígido. Mantiene el valor de habla directa del verbo sin añadir matices ajenos.
- source_word: לָכֵן
  english_pob_choice: therefore
  chosen_spanish: por tanto
  alternatives_spanish:
  - por eso
  - así que
  - por lo cual
  lexicon: HALOT
  rationale: «Por tanto» refleja la conclusión judicial/retórica del hebreo y mantiene el tono profético formal.
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: this is what Yahweh says
  chosen_spanish: así dice Yahvé
  alternatives_spanish:
  - esto dice Yahvé
  - así ha dicho Yahvé
  lexicon: HALOT
  rationale: «Así dice Yahvé» reproduce con naturalidad la fórmula profética clásica sin volverla arcaizante. Conserva su fuerza de mensajero.
- source_word: יַעַן
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - ya que
  - debido a que
  lexicon: HALOT
  rationale: Introduce la razón del juicio de forma directa y clara en español.
- source_word: אֲמָרְכֶם אֶת־הַדָּבָר הַזֶּה
  english_pob_choice: you have said this word
  chosen_spanish: han dicho esta palabra
  alternatives_spanish:
  - han dicho esta cosa
  - han pronunciado esta palabra
  - han dicho este dicho
  lexicon: HALOT
  rationale: «Palabra» traduce mejor el hebreo דָּבָר en este contexto de fórmula repetida. Mantiene la referencia concreta al dicho culpable.
- source_word: וָאֶשְׁלַח אֲלֵיכֶם לֵאמֹר
  english_pob_choice: though I sent to you, saying
  chosen_spanish: y les envié para decirles
  alternatives_spanish:
  - y les envié diciendo
  - aunque les envié para decirles
  - y les mandé a decir
  lexicon: HALOT
  rationale: El hebreo enlaza el envío divino con la advertencia. En español, «y les envié para decirles» conserva la secuencia sin forzar una concesiva explícita que el hebreo no marca con una partícula propia aquí.
- source_word: לֹא תֹאמְרוּ
  english_pob_choice: You shall not say
  chosen_spanish: No digan
  alternatives_spanish:
  - No dirán
  - No deben decir
  - No digáis
  lexicon: HALOT
  rationale: La prohibición se expresa naturalmente en español con el imperativo negativo plural «No digan», que comunica la fuerza normativa del hebreo.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El texto hebreo usa el nombre del pacto directamente. En español, «Yahvé» mantiene la distinción entre el nombre propio divino y un título genérico, acorde con la política del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Preserving the polemical wordplay around מַשָּׂא
  english_pob_reading: burden
  chosen_spanish_reading: carga
  alternative_spanish_readings:
  - oráculo
  - mensaje
  rationale: «Carga» permite conservar la repetición enfática de la expresión «la carga de Yahvé» y su tono polémico. «Oráculo» sería interpretativo y suavizaría el efecto retórico.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #5 (consistency of key terms, or documented exception)'
translation_notes:
  revision_awareness: Coincido con la revisión más reciente de que no eran necesarias alteraciones sustantivas. Mantengo la lectura de מַשָּׂא como término repetido y polémico, y el nombre divino como nombre propio.
  spanish_consistency_notes:
  - Se conserva el paralelismo y la repetición de «la carga de Yahvé» para no perder el efecto retórico.
  - El español elegido es moderno pero digno; evita calcos excesivos como «así ha dicho» sin sacrificar la fórmula profética.
  - La cláusula final queda en suspenso, como en el hebreo, sin intentar completar el pensamiento más allá del verso.
