translation:
  language: es
  text: Entonces, después de ser trasladado a Jerusalén, y después de sacrificar al Dios fiel[a] y dar gracias, y después de hacer algo más para el lugar[c], en efecto, cuando llegó al lugar[b] y quedó sobrecogido por su dignidad y piedad,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el Dios confiable». El adjetivo griego puede expresar fidelidad o confiabilidad; «fiel» es la traducción más directa aquí.
    reason: lexical_alternative
  - marker: b
    text: Es decir, el sitio sagrado en Jerusalén, probablemente el recinto del templo. El griego dice simplemente «el lugar».
    reason: cultural_note
  - marker: c
    text: La expresión «hacer algo más para el lugar» es indefinida en griego y no precisa cuál fue la acción.
    reason: lexical_alternative
lexical_decisions:
- source_word: διακομισθεὶς
  english_pob_choice: after being conveyed
  chosen_spanish: después de ser trasladado
  alternatives_spanish:
  - después de ser llevado
  - después de ser transportado
  - después de llegar
  lexicon: LSJ
  rationale: διακομισθεὶς indica movimiento pasivo hacia otro lugar; «trasladado» conserva esa idea sin añadir medios concretos. «Llegar» sería demasiado débil frente al valor del participio.
- source_word: θύσας
  english_pob_choice: after sacrificing
  chosen_spanish: después de sacrificar
  alternatives_spanish:
  - después de ofrecer sacrificio
  - después de hacer un sacrificio
  lexicon: LSJ
  rationale: El aoristo participial expresa acto sacrificial; «sacrificar» es directo y cultual en español, y mantiene la brevedad del griego.
- source_word: τῷ πιστῷ θεῷ
  english_pob_choice: to the faithful God
  chosen_spanish: al Dios fiel
  alternatives_spanish:
  - al Dios confiable
  - al Dios verdadero
  lexicon: LSJ
  rationale: Se conserva πιστός como «fiel», equivalente más directo de la POB inglesa. El sustantivo con artículo y adjetivo resulta natural en español y mantiene la tensión entre fidelidad y confiabilidad sin resolverla en una paráfrasis.
- source_word: χάριτας ἀποδιδοὺς
  english_pob_choice: offering thanks
  chosen_spanish: dar gracias
  alternatives_spanish:
  - rendir gracias
  - ofrecer gracias
  lexicon: LSJ
  rationale: La locución idiomática significa devolver o rendir gracias; «dar gracias» es la formulación española más natural y mantiene el sentido religioso del pasaje.
- source_word: τῶν ἑξῆς τι
  english_pob_choice: something further
  chosen_spanish: algo más
  alternatives_spanish:
  - algo adicional
  - alguna otra cosa
  lexicon: LSJ
  rationale: La frase griega es indefinida; «algo más» preserva esa vaguedad sin especificar qué hizo, como en la POB inglesa.
- source_word: τῷ τόπῳ ποιήσας
  english_pob_choice: doing ... for the place
  chosen_spanish: para el lugar
  alternatives_spanish:
  - en favor del lugar
  - en honor del lugar
  lexicon: LSJ
  rationale: El dativo es amplio y no define la acción concreta; «para el lugar» conserva la relación abierta y la referencia al sitio sagrado sin interpretarla excesivamente.
- source_word: τὸν τόπον
  english_pob_choice: the place
  chosen_spanish: el lugar
  alternatives_spanish:
  - el sitio
  - el recinto
  lexicon: LSJ
  rationale: Se mantiene la repetición del griego con «el lugar». Aunque el contexto apunta al ámbito sagrado de Jerusalén, el término genérico del original se preserva en el texto principal.
- source_word: τῇ σπουδαιότητι
  english_pob_choice: its dignity
  chosen_spanish: su dignidad
  alternatives_spanish:
  - su grandeza
  - su solemnidad
  - su majestad
  lexicon: LSJ
  rationale: σπουδαιότης puede expresar seriedad, peso o dignidad; «dignidad» capta bien el valor solemne del lugar sin exagerar su aspecto físico.
- source_word: εὐσεβείᾳ
  english_pob_choice: piety
  chosen_spanish: piedad
  alternatives_spanish:
  - devoción
  - reverencia
  - religiosidad
  lexicon: LSJ
  rationale: εὐσέβεια denota reverencia y conducta piadosa; «piedad» reproduce el registro religioso de la POB inglesa y su tono bíblico.
- source_word: καταπληγείς
  english_pob_choice: was struck with awe
  chosen_spanish: quedó sobrecogido
  alternatives_spanish:
  - quedó asombrado
  - fue sobrecogido por el asombro
  - quedó impresionado
  lexicon: LSJ
  rationale: El verbo transmite quedar intensamente impactado; «quedó sobrecogido» expresa bien ese efecto de reverente admiración en español.
theological_decisions:
- issue: Rendering of πιστῷ applied to God
  english_pob_reading: the faithful God
  chosen_spanish_reading: el Dios fiel
  alternative_spanish_readings:
  - el Dios confiable
  - el Dios verdadero
  rationale: Se conserva la cualidad explícita del adjetivo sin convertirlo en una explicación doctrinal. «Fiel» es la equivalencia más cercana y mantiene la posible tensión entre fidelidad y confiabilidad.
  doctrine_reference: Translation philosophy §1, §3
- issue: Reference of τὸν τόπον
  english_pob_reading: the place
  chosen_spanish_reading: el lugar
  alternative_spanish_readings:
  - el templo
  - el recinto sagrado
  - el santuario
  rationale: El griego dice literalmente «el lugar»; aunque el contexto sugiere el ámbito del templo, la traducción principal no sustituye el término más general por uno interpretativo.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: Se siguió el ajuste revisado del inglés auditado que elimina una conjunción innecesaria antes de «en efecto»; el español conserva la estructura acumulativa de participios sin añadir explicaciones que el griego no da.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero aquí el original habla explícitamente de θεός y la POB inglesa eligió «God»; por eso se traduce «Dios» y no se introduce el nombre divino.
  - Se preservó la repetición de τόπος con «lugar» en ambos casos para reflejar el texto griego.
  - Se eligió un registro bíblico moderno y claro, evitando arcaísmos innecesarios, pero sin suavizar la indeterminación del original.
