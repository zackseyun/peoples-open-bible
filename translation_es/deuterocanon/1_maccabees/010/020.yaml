translation:
  language: es
  text: Y ahora, hoy te hemos constituido sumo sacerdote de tu nación, y para ser llamado el Amigo del rey[a]—y le enviaron un manto de púrpura y una corona de oro—, y para ponerte de nuestro lado[b] y mantener amistad con nosotros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «amigo del rey». El griego puede reflejar un título cortesano oficial en el uso helenístico.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «pensar nuestras cosas». El modismo significa favorecer nuestros intereses o ponerse de nuestro lado.
    reason: lexical_alternative
lexical_decisions:
- source_word: καθεστάκαμέν
  english_pob_choice: we have appointed
  chosen_spanish: te hemos constituido
  alternatives_spanish:
  - te hemos nombrado
  - te hemos establecido
  lexicon: LSJ
  rationale: En un contexto de investidura oficial, καθεστάκαμέν expresa una instalación formal en un cargo. «Constituido» conserva ese valor institucional con tono digno y natural en español.
- source_word: ἀρχιερέα
  english_pob_choice: high priest
  chosen_spanish: sumo sacerdote
  alternatives_spanish:
  - alto sacerdote
  - pontífice
  lexicon: LSJ
  rationale: «Sumo sacerdote» es la forma bíblica clara y fiel para el oficio judío; mantiene el cargo sin introducir matices eclesiásticos ajenos.
- source_word: τοῦ ἔθνους σου
  english_pob_choice: of your nation
  chosen_spanish: de tu nación
  alternatives_spanish:
  - de tu pueblo
  - de tu gente
  lexicon: LSJ
  rationale: ἔθνος aquí tiene un sentido político-corporativo. «Nación» preserva ese alcance mejor que «pueblo», aunque ambas opciones son posibles en español.
- source_word: φίλον βασιλέως
  english_pob_choice: the king’s Friend
  chosen_spanish: el Amigo del rey
  alternatives_spanish:
  - amigo del rey
  - el amigo del rey
  - amigo real
  lexicon: LSJ
  rationale: La mayúscula en «Amigo» ayuda a señalar el posible valor de título cortesano, sin ocultar la relación amistosa que expresa el griego. Se mantiene la transparencia al original y la posible fuerza titulary.
- source_word: καλεῖσθαι
  english_pob_choice: be called
  chosen_spanish: para que seas llamado
  alternatives_spanish:
  - para ser llamado
  - para que te llamen
  lexicon: LSJ
  rationale: La construcción final en español requiere un giro natural. «Para que seas llamado» refleja la infinitiva dependiente con claridad y mantiene el sentido formal del nombramiento.
- source_word: πορφύραν
  english_pob_choice: a purple robe
  chosen_spanish: un manto de púrpura
  alternatives_spanish:
  - una túnica púrpura
  - una vestidura púrpura
  lexicon: LSJ
  rationale: πορφύραν puede designar tela o prenda púrpura. «Manto» funciona bien en un envío regio y evita especificar en exceso; «de púrpura» conserva el color/material del original.
- source_word: στέφανον χρυσοῦν
  english_pob_choice: a crown of gold
  chosen_spanish: una corona de oro
  alternatives_spanish:
  - una corona dorada
  - una corona de oro fino
  lexicon: LSJ
  rationale: «Corona» reproduce el valor de στέφανον en este contexto de investidura. «De oro» sigue de cerca el adjetivo griego y mantiene el tono ceremonial.
- source_word: φρονεῖν τὰ ἡμῶν
  english_pob_choice: take our side
  chosen_spanish: pensar como nosotros
  alternatives_spanish:
  - tomar nuestro partido
  - favorecer nuestros intereses
  - ponerse de nuestro lado
  lexicon: LSJ
  rationale: 'La expresión griega es idiomática: literalmente «pensar nuestras cosas». Siguiendo el audit trail, se conserva la metáfora mental con una formulación española que no la aplana del todo.'
- source_word: συντηρεῖν φιλίαν πρὸς ἡμᾶς
  english_pob_choice: maintain friendship with us
  chosen_spanish: mantener amistad con nosotros
  alternatives_spanish:
  - preservar amistad con nosotros
  - conservar amistad con nosotros
  lexicon: LSJ
  rationale: La frase expresa continuidad diplomática y lealtad relacional. «Mantener amistad» es idiomático en español y fiel al valor de φιλίαν πρὸς ἡμᾶς.
- source_word: ἀπέστειλαν αὐτῷ
  english_pob_choice: they sent him
  chosen_spanish: le enviaron
  alternatives_spanish:
  - le mandaron
  - se lo enviaron
  lexicon: LSJ
  rationale: Se conserva el sujeto implícito plural y el cambio de persona señalado en el audit trail. «Le enviaron» es natural en español y no corrige la oscilación textual.
theological_decisions:
- issue: Título cortesano φίλον βασιλέως
  english_pob_reading: rendered as the titulary-sounding 'the king’s Friend'
  chosen_spanish_reading: el Amigo del rey
  alternative_spanish_readings:
  - amigo del rey
  - el amigo del rey
  rationale: No es una cuestión doctrinal, pero sí histórica y semántica. La forma elegida conserva la posibilidad de un título oficial helenístico y evita reducirlo a mera amistad privada.
  doctrine_reference: Translation philosophy §1, §5
- issue: Cambio de voz/perspectiva en ἀπέστειλαν αὐτῷ
  english_pob_reading: the translation preserves the third-person narrative shift
  chosen_spanish_reading: le enviaron
  alternative_spanish_readings:
  - le enviamos
  - le envié
  - y le enviaron
  rationale: Como en el texto griego, la secuencia no se armoniza a una sola voz. Mantener el plural de tercera persona deja visible la tensión textual que el audit trail documenta.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se tomó como guía la revisión más reciente del audit trail, que ajustó las infinitivas inglesas para reflejar mejor el griego. En español se mantuvo esa estructura final de propósito con «para que seas llamado» / «para pensar» / «mantener», preservando el valor formal del decreto y el cambio a tercera persona en «le enviaron».
  spanish_consistency_notes:
  - Se usa «Yahvé» como default del proyecto solo cuando el texto lo exija; aquí no aparece el nombre divino.
  - Se mantiene «sumo sacerdote» como término bíblico estándar para ἀρχιερεύς.
  - Se conserva la posible fuerza titulary de φίλος βασιλέως con mayúscula inicial en «Amigo».
  - «Pensar como nosotros» intenta reflejar la idiomática griega sin convertirla en una paráfrasis interpretativa más amplia.
