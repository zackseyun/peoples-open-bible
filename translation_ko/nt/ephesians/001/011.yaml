  yaml_path: translation/nt/ephesians/001/011.yaml
  text: In him we also were made an inheritance, having been predestined according to the purpose of the one who works all things according to the counsel of his will,
translation:
  language: ko
  text: 그분 안에서 우리도 기업이 되었으니[a], 이는 모든 일을 자기 뜻의 결의대로 이루시는 분의 작정을 따라 미리 정하심을 받은 결과이며—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ἐκληρώθημεν은 「제비뽑아 분깃이 됨/분깃을 받음」을 함의한다. 「기업이 되었다」로 옮기되, 「기업을 얻었다」도 가능하다.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐκληρώθημεν
  english_pob_choice: were made an inheritance
  chosen_korean: 기업이 되었으니
  alternatives_korean:
  - 기업을 얻었으니
  - 분깃을 받았으니
  lexicon: BDAG
  rationale: 수동태로 「하나님의 분깃이 됨」을 우선 표현. 「기업을 얻음」도 의미적으로 가능하나 본문의 수동성을 보존하기 위해 「기업이 되었으니」를 택한다.
- source_word: πρόθεσιν
  english_pob_choice: purpose
  chosen_korean: 작정
  alternatives_korean:
