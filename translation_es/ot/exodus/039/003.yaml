  yaml_path: translation/ot/exodus/039/003.yaml
  text: They hammered out sheets of gold and cut it into threads[a], to work it into the blue and into the purple and into the scarlet yarn and into the fine linen[c][b], the work of a skillful designer.
  footnotes:
