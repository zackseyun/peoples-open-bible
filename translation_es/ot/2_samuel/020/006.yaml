translation:
  language: es
  text: 'Entonces David dijo a Abisai: «Ahora Seba hijo de Bicri nos hará más daño que Absalón. Tú, toma a los siervos de tu señor y ve tras él, no sea que encuentre para sí ciudades fortificadas y escape de nuestra vista[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «y libre nuestros ojos», un modismo que significa «escape de nuestra vista» o «nos eluda».
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵרַע לָנוּ
  english_pob_choice: will do us more harm
  chosen_spanish: nos hará más daño
  alternatives_spanish:
  - nos perjudicará más
  - nos causará más mal
  lexicon: HALOT
  rationale: El verbo רעע aquí expresa causar daño o mal, no la idea abstracta de mal moral. «Nos hará más daño» conserva el comparativo y suena natural en español.
- source_word: שֶׁבַע בֶּן בִּכְרִי
  english_pob_choice: Sheba son of Bichri
  chosen_spanish: Seba hijo de Bicri
  alternatives_spanish:
  - Seba, hijo de Bicri
  - Seba ben Bicri
  lexicon: Convención de nombres propios
  rationale: Se transliteran los nombres propios según el uso bíblico en español; «hijo de» preserva la relación patronímica del hebreo.
- source_word: מִן אַבְשָׁלוֹם
  english_pob_choice: than Absalom
  chosen_spanish: que Absalón
  alternatives_spanish:
  - más que Absalón
  - que lo hizo Absalón
  lexicon: HALOT
  rationale: La comparación con מִן se expresa naturalmente con «que» en español. Se mantiene la comparación directa sin sobreexplicar.
- source_word: אַתָּה קַח
  english_pob_choice: You, take
  chosen_spanish: Tú, toma
  alternatives_spanish:
  - Toma
  - Tú debes tomar
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis; «Tú» lo refleja en español.
- source_word: עַבְדֵי אֲדֹנֶיךָ
  english_pob_choice: your lord’s servants
  chosen_spanish: los siervos de tu señor
  alternatives_spanish:
  - los servidores de tu señor
  - los esclavos de tu señor
  lexicon: HALOT
  rationale: Aquí la relación jerárquica y militar es la del séquito del señor; «siervos» comunica mejor el vínculo de servicio en español bíblico sin forzar «esclavos» donde no es el foco.
- source_word: וּרְדֹף אַחֲרָיו
  english_pob_choice: and pursue after him
  chosen_spanish: y persíguelos tras él
  alternatives_spanish:
  - y persíguelo
  - y ve en su persecución
  lexicon: HALOT
  rationale: El hebreo intensifica la persecución con רדף + אחרי; en español se preserva esa cercanía sintáctica con «tras él». El objeto se expresa por el sentido colectivo de los «siervos» enviados en la misión de persecución.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - por si
  lexicon: HALOT
  rationale: «No sea que» reproduce la cautela o prevención de פֶּן en español con registro natural y bíblico.
- source_word: מָצָא ל֛וֹ עָרִים בְּצֻרוֹת
  english_pob_choice: he find fortified cities for himself
  chosen_spanish: encuentre para sí ciudades fortificadas
  alternatives_spanish:
  - halle para sí ciudades fortificadas
  - encuentre ciudades fortificadas para él
  lexicon: HALOT
  rationale: Se conserva el matiz de ventaja de לוֹ con «para sí» y la imagen concreta de refugiarse en ciudades defendibles.
- source_word: וְהִצִּיל עֵינֵינוּ
  english_pob_choice: escape our sight
  chosen_spanish: nos escape de la vista
  alternatives_spanish:
  - escape de nuestra vista
  - se nos pierda de vista
  lexicon: HALOT
  rationale: La expresión es literalmente «arrancar/deliver nuestras ojos» y funciona como idiomática de perderlo de vista. «Nos escape de la vista» mantiene la imagen con español fluido.
theological_decisions:
- issue: Nombre divino / terminología teológica
  english_pob_reading: No divine-name masking in this verse; narrative royal speech only.
  chosen_spanish_reading: No aparece aquí el nombre divino; no se requiere decisión terminológica teológica especial.
  alternative_spanish_readings:
  - Usar equivalentes litúrgicos innecesarios
  - Introducir glosas teológicas
  rationale: El versículo es narrativo y no contiene lexemas teológicos directos; por tanto, no se añaden glosas doctrinales ni sustituciones no motivadas por el texto.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «pursue him» a «pursue after him» y «escape from our sight» a «escape our sight». La redacción española sigue esa revisión al conservar la idea de persecución reforzada con «tras él» y al reflejar el modismo con una expresión directa de pérdida de vista.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general cuando corresponda, aunque este versículo no lo incluye.
  - Se mantiene «Seba» y «Absalón» con grafía española habitual de nombres bíblicos.
  - Se evita «Cristo/Mesías» por no ser pertinente al pasaje.
  - Se usa «siervos» para el séquito del señor en una orden militar, sin implicar automáticamente esclavitud literal.
  - La puntuación y el discurso directo siguen el estilo bíblico en español moderno y digno.
