  source_alignment_summary: 'El borrador español transmite bien la estructura básica y los datos militares del griego: acompañamiento con Antíoco, identificación de Lisias por dos cargos, la frase participial aplicada a ambos, y las cifras de infantería, caballería, elefantes y carros. Sin embargo, hay dos problemas de alineación documental: la nota [a] está anclada indebidamente en «Lisias» cuando en realidad explica «once miríadas», y la nota [b] mezcla dos títulos griegos bajo un solo anclaje en «encargado», cuando el primer alternativo («regente») corresponde a ἐπίτροπον y no solo al segundo título. Además, «carros guadañeros» es comprensible, pero «carros con guadañas» refleja con más claridad y naturalidad δρεπανηφόρα para un público amplio.'
