translation:
  language: es
  text: Clavará las tiendas de su pabellón real[a] entre los mares y el hermoso monte santo[b]; pero llegará a su fin, y no habrá quien lo ayude.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘su palacio’, ‘su tienda palaciega’ o ‘su pabellón’. La palabra rara probablemente alude a una residencia real o pabellón de estado.
    reason: lexical_alternative
  - marker: b
    text: O ‘el glorioso monte santo’. La expresión hebrea puede referirse al monte santo en su belleza o esplendor, probablemente a Sion/Jerusalén.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיִטַּע
  english_pob_choice: He will pitch
  chosen_spanish: Clavará
  alternatives_spanish:
  - Plantará
  - Pondrá
  - Levantarán
  lexicon: HALOT
  rationale: נטע literalmente es ‘plantar’, pero con tiendas el valor idiomático es ‘clavar/poner en pie/armar’. ‘Clavará’ conserva la imagen concreta de fijar una tienda y suena natural en español con ‘tiendas’.
- source_word: אָהֳלֵי
  english_pob_choice: the tents of
  chosen_spanish: las tiendas de
  alternatives_spanish:
  - las tiendas del
  - la tienda de
  - los pabellones de
  lexicon: HALOT
  rationale: El constructo plural debe conservarse. ‘Tiendas de’ mantiene la pluralidad y la imagen de un campamento/pabellón real sin normalizarlo a singular.
- source_word: אַפַּדְנוֹ
  english_pob_choice: his royal pavilion
  chosen_spanish: su pabellón real
  alternatives_spanish:
  - su palacio
  - su tienda palaciega
  - su pabellón
  lexicon: HALOT
  rationale: Es un préstamo raro que probablemente alude a una residencia o pabellón real. ‘Pabellón real’ conserva el matiz de residencia cortesana móvil o ceremonial, más cercano al contexto de tiendas que ‘palacio’.
- source_word: בֵּין יַמִּים
  english_pob_choice: between the seas
  chosen_spanish: entre los mares
  alternatives_spanish:
  - entre mares
  - entre el mar y el mar
  - entre los dos mares
  lexicon: HALOT
  rationale: El hebreo es plural y la traducción debe preservarlo. ‘Entre los mares’ respeta la forma plural y la posible referencia geográfica amplia sin precisar indebidamente cuál(es) mares.
- source_word: לְהַר צְבִי קֹדֶשׁ
  english_pob_choice: and the beautiful holy mountain
  chosen_spanish: y el hermoso monte santo
  alternatives_spanish:
  - y el monte santo glorioso
  - y el monte santo de hermosura
  - hacia el hermoso monte santo
  lexicon: HALOT
  rationale: צבי puede ser belleza, esplendor o gloria. ‘Hermoso’ es una equivalencia clara y moderna en español. ‘Monte santo’ preserva el orden natural de la frase y la posible alusión a Sion/Jerusalén.
- source_word: וּבָא עַד קִצּוֹ
  english_pob_choice: yet he will come to his end
  chosen_spanish: pero llegará a su fin
  alternatives_spanish:
  - y llegará a su fin
  - sin embargo, llegará a su fin
  - llegará a su fin
  lexicon: HALOT
  rationale: ‘Llegará a su fin’ reproduce el giro idiomático de una culminación o término. ‘Pero’ expresa el contraste con la seguridad aparente del versículo sin sobrecargarlo.
- source_word: וְאֵין עוֹזֵר לוֹ
  english_pob_choice: and there will be no one to help him
  chosen_spanish: y no habrá quien lo ayude
  alternatives_spanish:
  - y no habrá ayudador para él
  - y nadie lo ayudará
  - y no habrá quien le ayude
  lexicon: HALOT
  rationale: עוֹזֵר es ‘ayudador/uno que ayuda’. ‘No habrá quien lo ayude’ es natural y mantiene la idea de abandono total. El clítico ‘lo’ sigue el uso más corriente en español peninsular y latinoamericano culto para objeto directo masculino humano.
theological_decisions:
- issue: Identidad del rey aludido en Daniel 11:45
  english_pob_reading: The translation leaves the referent implicit as 'he' without identifying him in the text.
  chosen_spanish_reading: La traducción conserva el referente implícito en tercera persona sin identificarlo en el texto.
  alternative_spanish_readings:
  - Antíoco IV Epífanes
  - una figura anticrística escatológica
  - un gobernante compuesto o tipológico
  rationale: El hebreo usa solo formas verbales y sufijos de tercera persona. Como la identificación histórica o escatológica es disputada, el texto español no debe introducir una interpretación cerrada en el cuerpo principal.
  doctrine_reference: Mantener la tensión interpretativa sin resolverla en la traducción principal.
translation_notes:
  revision_awareness: 'Revisión última sin cambios: el estado de auditoría indica alta concordancia y no se registraron enmiendas posteriores; la formulación española sigue de cerca la decisión inglesa final y conserva las alternativas documentadas donde el hebreo presenta ambigüedad léxica.'
  spanish_consistency_notes:
  - 'Se preserva el paralelismo de dos miembros principales: la instalación del campamento/pabellón y la llegada al fin sin ayuda.'
  - Se mantiene la referencia genérica de tercera persona para no resolver la identidad del rey en el texto principal.
  - ‘Monte santo’ conserva la posible alusión a Sion/Jerusalén sin explicitarla en el versículo.
  - Los pies de nota acompañan únicamente las ambigüedades léxicas documentadas por el audit trail en inglés.
