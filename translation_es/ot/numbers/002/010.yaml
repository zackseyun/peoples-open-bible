translation:
  language: es
  text: El estandarte del campamento de Rubén estará al sur[a], según sus divisiones[b]; y el jefe de los hijos de Rubén será Elizur hijo de Sedeur.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bandera»; el hebreo דֶּגֶל designa un estandarte o insignia identificadora.
    reason: lexical_alternative
  - marker: b
    text: O «según sus huestes»; el hebreo lleva aquí un sentido ordenado de agrupación militar/tribal.
    reason: lexical_alternative
lexical_decisions:
- source_word: דֶּגֶל
  english_pob_choice: banner
  chosen_spanish: estandarte
  alternatives_spanish:
  - bandera
  - banner
  lexicon: HALOT
  rationale: En este contexto de orden tribal y militar, «estandarte» transmite mejor que «bandera» la función de señal identificadora del campamento. «Banner» no es idiomático en español bíblico; «estandarte» mantiene la dignidad y la imagen de agrupación bajo un signo.
- source_word: מַחֲנֵה
  english_pob_choice: camp
  chosen_spanish: campamento
  alternatives_spanish:
  - campamento
  - campamento militar
  - camp
  lexicon: HALOT
  rationale: «Campamento» es claro y natural en español para la disposición de Israel en el desierto, y conserva la idea de un agrupamiento ordenado. «Camp» sería anglicismo innecesario.
- source_word: רְאוּבֵן
  english_pob_choice: Reuben
  chosen_spanish: Rubén
  alternatives_spanish:
  - Reúben
  lexicon: uso bíblico estándar en español
  rationale: Se adopta la forma usual en español bíblico «Rubén», que es transparente y reconocible para lectores hispanohablantes.
- source_word: תֵּימָנָה
  english_pob_choice: on the south
  chosen_spanish: al sur
  alternatives_spanish:
  - al lado sur
  - hacia el sur
  - en el sur
  lexicon: HALOT
  rationale: La forma direccional con sufijo locativo se expresa de modo natural como «al sur», sin perder el valor locativo de colocación en ese lado del campamento.
- source_word: לְצִבְאֹתָם
  english_pob_choice: by their divisions
  chosen_spanish: según sus divisiones
  alternatives_spanish:
  - por sus divisiones
  - conforme a sus divisiones
  - según sus huestes
  lexicon: HALOT
  rationale: «Divisiones» conserva el sentido organizativo y ordenado de צבא en Números 1–2. «Según» refleja bien la relación normativa/organizativa sin endurecer el texto con un calco militar excesivo.
- source_word: וְנָשִׂיא
  english_pob_choice: and the leader
  chosen_spanish: y el jefe
  alternatives_spanish:
  - y el líder
  - y el príncipe
  - y el caudillo
  lexicon: HALOT
  rationale: «Jefe» comunica la función de autoridad tribal sin introducir la carga monárquica de «príncipe». «Líder» sería posible, pero «jefe» encaja mejor con el registro bíblico sobrio.
- source_word: לִבְנֵי רְאוּבֵן
  english_pob_choice: of the sons of Reuben
  chosen_spanish: de los hijos de Rubén
  alternatives_spanish:
  - de los hijos de Reuben
  - para los hijos de Rubén
  lexicon: HALOT
  rationale: Se conserva la fórmula genealógica/tribal «hijos de Rubén», que es más fiel al hebreo que una paráfrasis como «pueblo de Rubén».
- source_word: אֱלִיצוּר בֶּן שְׁדֵיאוּר
  english_pob_choice: Elizur son of Shedeur
  chosen_spanish: Elizur hijo de Sedeur
  alternatives_spanish:
  - Elizur, hijo de Sedeur
  lexicon: transliteración estándar
  rationale: Los nombres propios se transliteran de forma estándar al español. «Hijo de» reproduce directamente la construcción patronímica hebrea.
theological_decisions:
- issue: Tribal ordering and military-administrative sense of צבא
  english_pob_reading: by their divisions; the Hebrew carries an ordered military sense
  chosen_spanish_reading: según sus divisiones
  alternative_spanish_readings:
  - según sus huestes
  - por sus ejércitos
  - conforme a sus compañías
  rationale: 'En español, «divisiones» comunica el orden interno sin sobrecargar el verso con terminología bélica. Se preserva la tensión: el texto tiene un trasfondo militar-organizativo, pero en este pasaje funciona sobre todo como esquema de distribución tribal.'
  doctrine_reference: Números 1–2; organización del campamento de Israel
translation_notes:
  revision_awareness: La versión en inglés de referencia fue revisada y quedó sin cambios en el último pase (high_agreement). Esta propuesta española sigue de cerca esa lectura y sólo ajusta la naturalidad idiomática del español, manteniendo el valor organizativo y militar leve de los términos hebreos.
  spanish_consistency_notes:
  - Se usa «Rubén» de manera consistente para el nombre tribal.
  - Se mantiene «hijos de» para reflejar la fórmula hebrea y evitar una paraphrasis explicativa.
  - «Estandarte» se reserva aquí para דֶּגֶל por su fuerza visual y su adecuación al contexto de campamento ordenado.
  - «Divisiones» conserva la organización interna sin convertir el texto en una descripción bélica más fuerte que la del hebreo.
