revisions:
- from: 'Pero el hombre dijo a Joab[a]: «Aun si yo estuviera pesando en mis palmas mil piezas de plata, no alargaría mi mano contra el hijo del rey; porque en nuestros oídos el rey mandó a ti, a Abisai y a Itai, diciendo[b]: “Guarden para mí al joven Absalón”».'
  to: 'Pero el hombre dijo a Joab[a]: «Aun si yo estuviera pesando sobre mis palmas mil piezas de plata, no alargaría mi mano contra el hijo del rey; porque el rey te ordenó a ti, a Abisai y a Itai, en nuestra presencia, diciendo[b]: “Guarden para mí al joven Absalón”».'
  rationale: 'Se corrigió el español para que sea idiomático y fiel a las decisiones auditadas: se añadió «para mí» en la orden final, se reparó «mandó a ti» a «te ordenó a ti, a Abisai y a Itai», se suavizó el calco auditivo con «en nuestra presencia», y se ajustó «sobre mis palmas» para corresponder mejor a עַל כַּפַּי.'
