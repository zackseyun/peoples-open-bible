- from: 'Y Abimelec dijo[a]: “No sé quién hizo esta cosa. Tú tampoco me lo dijiste, y yo no lo supe hasta hoy.”'
  to: 'Y Abimelec dijo[a]: «No sé quién hizo esta cosa. Tú tampoco me lo dijiste, y yo tampoco oí de eso hasta hoy».'
  rationale: Se mantiene la estructura y el tono del borrador, pero se corrige «yo no lo supe» a «yo tampoco oí de eso» para reflejar mejor שׁמע ('oír/recibir noticia') y para conservar la progresión semántica del original. También se explicita «tampoco» en la tercera cláusula para representar mejor וְגַם אָנֹכִי. No se requiere adjudicación adicional porque la corrección es sencilla y no doctrinal.
