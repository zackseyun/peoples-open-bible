review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: separación de Israel, pertenencia divina, herencia, contraste con los pueblos, mediación por Moisés, éxodo y la doble invocación אֲדֹנָי יְהוִה. Sin embargo, hay dos desajustes importantes con la evidencia y el rastro POB: (1) la nota [a] no corresponde al lugar anclado en el texto; el inglés conserva una alternativa para «by the hand of Moses», no para «pueblos de la tierra»; (2) «tu esclavo» para עַבְדֶּךָ en este contexto profético-honorífico no sigue la decisión auditada del POB, que aquí prefirió «your servant», y en español «tu siervo» es la opción más fiel y natural.'
  spanish_quality_summary: El español es mayormente claro y digno, pero «Señor Yahvé» suena algo forzado en vocativo final; aun así, es defendible por la política del proyecto de conservar Yahvé. La reparación principal es cambiar «tu esclavo» por «tu siervo» y reordenar las notas para que coincidan con los anclajes y las alternativas realmente documentadas. También conviene quitar la coma antes de «de entre» para una lectura más fluida.
  glossary_alignment: Alineación parcial. «Yahvé» está bien conforme al proyecto. «Herencia», «padres», «por medio de Moisés» y «cuando sacaste» son adecuados. Pero «esclavo» aquí contradice la razón contextual documentada para עבד en este pasaje, donde corresponde «siervo».
  issues:
  - severity: high
    issue: «tu esclavo» para עַבְדֶּךָ en referencia a Moisés
    rationale: 'Aunque el proyecto a menudo privilegia «esclavo», la evidencia auditada para este versículo especifica una excepción contextual: en este uso honorífico-profético se eligió «servant». En español bíblico legible, «tu siervo» preserva mejor ese valor sin introducir una dureza no foregrounded por el contexto.'
  - severity: high
    issue: Desajuste de notas al pie y anclajes
    rationale: La nota [a] en el borrador está anclada a «la tierra» y ofrece una alternativa para «pueblos/naciones», pero el rastro inglés conserva en esa posición una alternativa para «by the hand of Moses». Además, faltan las alternativas documentadas para «nuestros padres» y para la fórmula divina.
  - severity: medium
    issue: Puntuación menos natural en «como herencia, de entre...»
    rationale: La coma interrumpe innecesariamente la unidad sintáctica de «apartado para ti como herencia de entre todos los pueblos...».
  revised_spanish_text: Porque tú los has apartado para ti como herencia de entre todos los pueblos de la tierra, tal como hablaste por medio[a] de Moisés, tu siervo, cuando sacaste a nuestros padres[b] de Egipto, Señor Yahvé[c].
  revised_footnotes:
