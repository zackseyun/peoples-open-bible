theological_decisions:
- issue: Metaphorical imagery of Zion/Israel as a threshing instrument
  chosen_reading: Retain the concrete agricultural metaphor in the main text rather than interpretively rendering its meaning (e.g., 'defeat great enemies').
  alternative_readings:
  - Interpret mountains and hills explicitly as nations or obstacles
  rationale: The Hebrew presents vivid metaphorical imagery without identifying the referents in this verse. Preserving the image maintains theological and poetic tension rather than resolving it beyond the text.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather than resolve it.
