    text: «Su pueblo» se refiere al pueblo de Yahvé.
    reason: cross_reference
  revision_rationale: Se reemplaza «gobernador» por «gobernante» para reflejar mejor נָגִיד y evitar un matiz administrativo moderno. También se normaliza el orden de los marcadores de notas para que siga el orden de aparición en el texto.
