    reason: lexical_alternative
  - marker: c
    text: «El malvado» puede referirse de manera genérica a un dueño perverso; alternativamente, «un hombre malvado».
    reason: lexical_alternative
  revision_rationale: Se mantiene el sentido del original y del POB inglés, pero se sustituye «espigan» por «rebuscan» para expresar mejor la acción de recoger remanentes en una viña. También se actualiza una alternativa de nota para mayor claridad en español contemporáneo.
