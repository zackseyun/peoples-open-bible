review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo: כִּי como causa, עָנִי וְאֶבְיוֹן como pareja «pobre y necesitado», y לִבִּי ... בְּקִרְבִּי como daño interior. Sin embargo, la nota al pie no preserva correctamente la alternativa léxica del inglés POB, porque repite la misma redacción del texto principal en lugar de ofrecer una alternativa real para חָלַל.'
  spanish_quality_summary: El español principal es natural, claro y digno. «Porque soy pobre y necesitado, y mi corazón está herido dentro de mí» es plenamente legible. El único problema de calidad editorial es la nota, que no añade información útil y por eso debe corregirse.
  glossary_alignment: No hay conflictos con la terminología del proyecto. Las decisiones «pobre», «necesitado», «corazón» y «herido» son adecuadas. «Dentro de mí» es aceptable y fiel para בְּקִרְבִּי.
  issues:
  - severity: medium
    issue: La nota al pie repite el texto principal en vez de dar una alternativa real.
    rationale: El inglés POB documenta una alternativa léxica para חָלַל («pierced / wounded / fatally stricken»). En español, la nota «O “mi corazón está herido dentro de mí”» no ofrece una variante distinta y por tanto no preserva la función del aparato crítico.
  - severity: low
    issue: 'Hay una alternativa inglesa sin traducir en las decisiones léxicas: «wounded».'
    rationale: En el campo de alternativas aparece «está wounded», lo cual es un descuido editorial. No afecta el texto bíblico, pero conviene corregirlo en revisión editorial interna.
  revised_spanish_text: Porque soy pobre y necesitado[a], y mi corazón está herido dentro de mí.
  revised_footnotes:
  - marker: a
    text: O «mi corazón está traspasado dentro de mí». El verbo hebreo puede comunicar estar herido, traspasado o golpeado de muerte.
    reason: lexical_alternative
  revision_rationale: Se mantiene el texto principal porque es fiel y natural. Solo se corrige la nota para que preserve una alternativa léxica genuina para חָלַל, en línea con el audit trail inglés.
