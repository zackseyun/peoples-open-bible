source:
  edition: SBLGNT
  text: ⸀Εἶπεν κύριος τῷ κυρίῳ μου· Κάθου ἐκ δεξιῶν μου ἕως ἂν θῶ τοὺς ἐχθρούς σου ⸀ὑποκάτω τῶν ποδῶν σου;
base_translation:
  language: en
  yaml_path: translation/nt/matthew/022/044.yaml
  text: The Lord said to my Lord[a], ‘Sit at my right hand until I put your enemies under your feet’?”
  footnotes:
  - marker: a
    text: Or, following the Hebrew idiom of Psalm 110:1, “make your enemies a footstool for your feet.”
    reason: lexical_alternative
translation:
  language: ko
  text: ʻ야훼께서 나의 주께 말씀하셨다, 내가 네 원수들을 네 발 아래 둘 때까지 너는 내 오른편에 앉아 있어라.ʼ
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 시 110:1 인용. 히브리 본문은 「יהוה(야훼)께서 나의 אדון(주)께 이르시되」이므로, 첫 κύριος는 야훼를, 둘째 κυρίῳ는 다윗의 「주」(메시아)를 가리킨다. 본 번역에서는 이 구분을 본문 안에 그대로 보존한다.
    reason: alternative_reading
theological_decisions:
- issue: 시 110:1 인용에서 두 κύριος의 구분 (YHWH vs 다윗의 주)
  chosen_reading: 첫째 κύριος→「야훼」, 둘째 κυρίῳ→「나의 주」
  alternative_readings:
  - 둘 다 「주」로 옮김
  rationale: 본 절은 시 110:1을 직접 인용하며 그 안의 두 「주」 — יהוה와 אדון — 의 구분이 예수의 논증 전체의 핵심이다. 둘 다 「주」로 옮기면 다윗이 자기 자손을 어찌 「주」라 부르느냐는 논증의 기반이 흐려진다. 본 프로젝트 glossary는 YHWH를 가리키는 κύριος를 「야훼」로 표기하도록 지시하므로, 본 절은 그 원칙이 가장 분명히 적용되는 본보기이다.
  doctrine_reference: 'DOCTRINE.md §1, §5: YHWH naming; render the source''s strongest plain meaning'
