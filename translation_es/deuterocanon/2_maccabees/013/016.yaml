translation:
  language: es
  text: Y al final llenaron el campamento de temor y confusión, y se retiraron con éxito[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se retiraron prosperando» o «partieron con buen resultado». El griego εὐημεροῦντες sugiere literalmente irles bien o prosperar; el texto principal expresa ese sentido de forma idiomática en este contexto militar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ τέλος
  english_pob_choice: in the end
  chosen_spanish: al final
  alternatives_spanish:
  - por fin
  - finalmente
  lexicon: LSJ
  rationale: Expresa el valor temporal e idiomático del griego sin sonar forzado en español; mantiene la idea de desenlace narrativo.
- source_word: παρεμβολὴν
  english_pob_choice: camp
  chosen_spanish: campamento
  alternatives_spanish:
  - campamento militar
  - real
  lexicon: LSJ
  rationale: En contexto militar, 'campamento' comunica claramente el lugar o conjunto de tropas acampadas; es natural en español y conserva el sentido militar.
- source_word: δέους
  english_pob_choice: fear
  chosen_spanish: temor
  alternatives_spanish:
  - miedo
  - dread
  lexicon: LSJ
  rationale: '''Temor'' reproduce bien la amplitud semántica del sustantivo griego y evita cargar el texto con una intensidad mayor que la indicada por el original.'
- source_word: ταραχῆς
  english_pob_choice: confusion
  chosen_spanish: confusión
  alternatives_spanish:
  - tumulto
  - perturbación
  - pánico
  lexicon: LSJ
  rationale: '''Confusión'' corresponde al valor de agitación y desorden que el inglés POB ya captó con ''confusion''; funciona bien junto a ''temor'' en un contexto bélico.'
- source_word: ἐπλήρωσαν
  english_pob_choice: filled
  chosen_spanish: llenaron
  alternatives_spanish:
  - llenaron de
  - colmaron
  lexicon: LSJ
  rationale: Verbo directo y transparente para expresar que el campamento quedó lleno de esos efectos.
- source_word: ἐξέλυσαν
  english_pob_choice: withdrew
  chosen_spanish: se retiraron
  alternatives_spanish:
  - partieron
  - levantaron el campamento
  - se alejaron
  lexicon: LSJ
  rationale: En un relato militar, 'se retiraron' es el equivalente más natural para el movimiento de salida indicado por el verbo.
- source_word: εὐημεροῦντες
  english_pob_choice: prosperously
  chosen_spanish: prósperamente
  alternatives_spanish:
  - con éxito
  - con buen resultado
  - afortunadamente
  lexicon: LSJ
  rationale: El participio significa literalmente 'prosperando' o 'faring bien'; 'prósperamente' conserva esa fuerza verbal y sigue de cerca la revisión inglesa que prefirió 'prosperously'.
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada de 'withdrew in good order' a 'withdrew prosperously' para reflejar mejor εὐημεροῦντες. La propuesta española sigue esa revisión con 'prósperamente', manteniendo también la imagen militar de retirada.
  spanish_consistency_notes:
  - Se mantiene 'campamento' para παρεμβολή coherente con el contexto militar.
  - Se evita 'SEÑOR' u otras fórmulas no presentes, ya que el versículo no contiene nombre divino ni títulos cristológicos.
  - '''Temor y confusión'' sigue la solución inglesa, pero se ancla con nota para mostrar la alternativa semántica de ''perturbación'' o ''trastorno''.'
