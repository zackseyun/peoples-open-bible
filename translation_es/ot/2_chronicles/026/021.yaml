  yaml_path: translation/ot/2_chronicles/026/021.yaml
  text: And King Uzziah was leprous until the day of his death[a], and he lived in a separate house, leprous, because he was cut off from the house of Yahweh. And Jotham his son was over the king’s house[b], judging the people of the land.
  footnotes:
