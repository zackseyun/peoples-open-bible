translation:
  language: es
  text: Una buena esposa[a] es un buen don; será dada al seno de quien teme a Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «en la porción de los que temen al Señor será dada». El hebreo dice «al seno de quien teme a Dios», con una imagen más íntima.'
    reason: alternative_reading
lexical_decisions:
- source_word: אִשָּׁה טוֹבָה / γυνὴ ἀγαθή
  english_pob_choice: a good wife
  chosen_spanish: una buena esposa
  alternatives_spanish:
  - una buena mujer
  lexicon: HALOT
  rationale: El hebreo אִשָּׁה puede significar 'mujer' o 'esposa', y el contexto sapiencial de una dádiva otorgada a quien teme a Dios favorece el sentido marital. 'Esposa' comunica mejor esa relación en español que el más general 'mujer'.
- source_word: מַתָּנָה טוֹבָה / μερὶς ἀγαθή
  english_pob_choice: a good gift
  chosen_spanish: un buen regalo
  alternatives_spanish:
  - un buen don
  - un regalo bueno
  lexicon: HALOT
  rationale: מַתָּנָה designa algo dado como regalo. 'Buen regalo' conserva la concisión proverbial y el paralelismo con 'buena esposa', con un español natural.
- source_word: בְּחֵיק
  english_pob_choice: into the bosom of
  chosen_spanish: en el seno de
  alternatives_spanish:
  - en el regazo de
  - en el abrazo de
  lexicon: HALOT
  rationale: El hebreo expresa cercanía e intimidad con una imagen corporal concreta. 'En el seno de' mantiene ese campo imagético en español y refleja mejor la metáfora que una paráfrasis abstracta.
- source_word: יֵרֵא אֱלֹהִים / φοβουμένων Κύριον
  english_pob_choice: one who fears God
  chosen_spanish: uno que teme a Dios
  alternatives_spanish:
  - un hombre que teme a Dios
  - uno que teme al Señor
  lexicon: HALOT
  rationale: La frase hebrea es literalmente 'el que teme a Dios'; en español, 'uno que teme a Dios' preserva el sujeto genérico y no introduce masculinidad explícita que el hebreo no formula aquí, aunque el contexto presupone un varón.
- source_word: תִּנָּתֵן / δοθήσεται
  english_pob_choice: she will be given
  chosen_spanish: se dará
  alternatives_spanish:
  - será dada
  - le será dada
  lexicon: HALOT
  rationale: La pasiva niphal admite un futuro pasivo en español. 'Se dará' es natural y conserva la pasividad sin sobrecargar la frase; la referencia pronominal queda clara por el contexto inmediato de 'una buena esposa'.
theological_decisions:
- issue: Título divino en la cláusula final
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - Señor
  rationale: El hebreo base lee אֱלֹהִים ('Dios'), mientras que el paralelo griego tiene Κύριον ('Señor'). Siguiendo la primacía del testimonio hebreo en este versículo, se traduce 'Dios' en el texto principal y se preserva la alternativa griega en nota.
  doctrine_reference: 'DOCTRINE.md: primacía del idioma fuente; tratamiento de κύριος / YHWH en textos con variantes'
translation_notes:
  revision_awareness: El testimonio hebreo principal coincide en alta medida con la revisión más reciente y con el paralelo griego. No se registran cambios de revisión adicionales; se mantiene la decisión ya auditada de privilegiar el hebreo para la cláusula final y conservar la imagen corporal de בְּחֵיק.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' como sustituto automático del nombre divino; aquí corresponde 'Dios' por el hebreo base.
  - Se usa 'esposa' y no 'mujer' por el valor marital que el contexto sapiencial y la imagen de la dádiva favorecen.
  - '''Seno'' conserva la metáfora corporal del hebreo; no se suaviza a una abstracción como ''cuidado'' o ''hogar''.'
  - La pasiva hebrea se vierte con 'se dará' para mantener naturalidad en español sin perder el sentido de recepción/otorgamiento.
