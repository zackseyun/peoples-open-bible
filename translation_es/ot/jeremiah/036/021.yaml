  language: en
  yaml_path: translation/ot/jeremiah/036/021.yaml
  text: Then the king sent Jehudi to get the scroll[a], and he took it from the chamber of Elishama the scribe[d][c][b]. And Jehudi read it in the hearing of the king and in the hearing of all the officials standing beside the king.
  footnotes:
