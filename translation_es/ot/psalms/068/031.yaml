base_translation:
  language: en
  yaml_path: translation/ot/psalms/068/031.yaml
  text: Rebuke the beast of the reeds[a], the herd of bulls among the calves of the peoples, trampling on pieces of silver[b]. Scatter the peoples who delight in wars.
  footnotes:
