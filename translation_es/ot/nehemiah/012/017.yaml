- source_word: לְ/מִנְיָמִין
  english_pob_choice: for Miniamin
  chosen_spanish: para Miniamín
  alternatives_spanish:
  - de Miniamín
  - perteneciente a Miniamín
  lexicon: HALOT
  rationale: De nuevo, la ל indica asociación. «Para» preserva la estructura tersa del hebreo y el paralelismo con Abías, sin forzar una perífrasis más interpretativa.
- source_word: לְ/מוֹעַדְיָה
  english_pob_choice: for Moadiah
  chosen_spanish: para Moadías
  alternatives_spanish:
  - para Moadia
  - para Maadías
  lexicon: HALOT
  rationale: Se mantiene el nombre propio en transliteración. Se elige una forma española consistente con la vocalización del texto base; el nombre aparece con variantes en tradiciones afines.
- source_word: פִּלְטָי
  english_pob_choice: Piltai
  chosen_spanish: Piltai
  alternatives_spanish:
  - Piltái
  lexicon: HALOT
  rationale: Nombre propio transliterado. La forma sin tilde mantiene la simplicidad del listado y sigue el patrón del POB inglés para nombres no hispanizados.
