translation:
  language: es
  text: Y subió a su segundo carro; y, después de ser llevado de vuelta a Jerusalén[a], terminó su vida[b] y fue sepultado en su tumba ancestral.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El paralelo hebreo en 2 Crónicas 35:24 dice «el carro de segundo rango» y añade que todo Judá y Jerusalén hicieron duelo por Josías; 1 Esdras aquí es más breve y usa el singular «tumba».
    reason: cross_reference
  - marker: b
    text: O, de manera más idiomática, «murió». El griego dice literalmente «cambió/terminó su vida», una expresión idiomática de muerte.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνέβη
  english_pob_choice: got onto
  chosen_spanish: subió
  alternatives_spanish:
  - montó
  - se subió
  lexicon: BDAG
  rationale: En español, con ἐπὶ τὸ ἅρμα, «subió» comunica el movimiento físico de montar el carro sin sonar forzado. «Montó» también sería posible, pero «subió» conserva mejor el matiz de ascenso/abordaje del griego.
- source_word: τὸ ἅρμα τὸ δεύτερον αὐτοῦ
  english_pob_choice: his second chariot
  chosen_spanish: su segundo carro
  alternatives_spanish:
  - su segundo carro de guerra
  - el segundo carro que era suyo
  lexicon: LSJ
  rationale: ἅρμα es «carro»/«carro de guerra». Se eligió «carro» como término más natural y suficientemente preciso en español. «Segundo» se mantiene como adjetivo atributivo, siguiendo el valor del griego y el paralelo hebreo.
- source_word: ἀποκατασταθεὶς εἰς Ἰερουσαλήμ
  english_pob_choice: after being brought back to Jerusalem
  chosen_spanish: después de ser traído de vuelta a Jerusalén
  alternatives_spanish:
  - después de haber sido llevado de vuelta a Jerusalén
  - cuando fue devuelto a Jerusalén
  lexicon: BDAG
  rationale: El participio pasivo sugiere que no simplemente regresó por sí mismo, sino que fue traído de vuelta. «Traído de vuelta» conserva esa pasividad y sigue de cerca el sentido narrativo del contexto.
- source_word: μετήλλαξεν τὸν βίον αὐτοῦ
  english_pob_choice: ended his life
  chosen_spanish: terminó su vida
  alternatives_spanish:
  - murió
  - partió de esta vida
  - cambió su vida
  lexicon: LSJ
  rationale: La expresión griega es un eufemismo/idioma para la muerte. «Terminó su vida» mantiene el valor idiomático y la relación semántica con los elementos literales del griego, sin volverlo explicativo en exceso.
- source_word: ἐτάφη
  english_pob_choice: was buried
  chosen_spanish: fue sepultado
  alternatives_spanish:
  - fue enterrado
  - fue depositado en sepultura
  lexicon: BDAG
  rationale: «Fue sepultado» es una opción elevada y natural en registro bíblico en español, equivalente al pasivo simple del verbo griego.
- source_word: ἐν τῷ πατρικῷ τάφῳ
  english_pob_choice: in his ancestral tomb
  chosen_spanish: en su tumba ancestral
  alternatives_spanish:
  - en la tumba de sus padres
  - en su sepulcro familiar
  lexicon: LSJ
  rationale: πατρικός denota lo que pertenece a los padres/antepasados. Se prefirió «ancestral» porque refleja bien el valor de herencia familiar y evita una posible lectura demasiado literal de pluralidad. El singular τάφος se respeta con «tumba».
theological_decisions:
- issue: Eufemismo griego para la muerte
  english_pob_reading: he ended his life
  chosen_spanish_reading: terminó su vida
  alternative_spanish_readings:
  - murió
  - partió de esta vida
  rationale: 'No hay contenido doctrinal especial, pero sí una decisión de tono: mantener la expresión como eufemismo/idioma, en vez de reducirla a una simple equivalencia directa. Esto preserva la textura del original.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés: la revisión final prefirió un equivalente más natural para la acción de montar el carro y resolvió la tumba familiar/ancestral con un singular formal. En español se siguió esa línea, ajustando además el verbo de sepultura a un registro bíblico natural.'
  spanish_consistency_notes:
  - Se mantiene «Jerusalén» con la forma española estándar.
  - Se usó «carro» para ἅρμα, coherente con un contexto antiguo y bíblico.
  - «Sepultado» mantiene el registro reverente sin introducir un tecnicismo no requerido.
  - No se introdujo «Cristo», «SEÑOR» ni otros términos no presentes en el texto fuente.
