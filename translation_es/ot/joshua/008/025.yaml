translation:
  language: es
  text: 'Y todos los que cayeron aquel día, de hombre a mujer, fueron doce mil: todos los habitantes[a] de Hai.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘todos los hombres de Hai’. El hebreo dice literalmente ‘todos los hombres de Hai’, una expresión idiomática que puede referirse de manera corporativa a la población de la ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ... were
  chosen_spanish: fueron
  alternatives_spanish:
  - y aconteció
  - y fue
  lexicon: HALOT
  rationale: La forma narrativa hebrea introduce una afirmación de resumen; en español, el verbo copulativo en pretérito plural comunica de manera natural el resultado sin recurrir a una fórmula arcaica.
- source_word: כָל הַנֹּפְלִים
  english_pob_choice: all who fell
  chosen_spanish: todos los que cayeron
  alternatives_spanish:
  - todos los caídos
  - todos los que fueron derribados
  lexicon: HALOT
  rationale: El participio hebreo conserva la imagen de quienes ‘caen’; en este contexto bélico, ‘cayeron’ mantiene la idiomática del original sin forzar una explicitación interpretativa excesiva.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: that day
  chosen_spanish: aquel día
  alternatives_spanish:
  - ese día
  - en aquel día
  lexicon: HALOT
  rationale: ‘Aquel día’ reproduce de forma natural la referencia temporal definida del hebreo.
- source_word: מֵאִישׁ וְעַד אִשָּׁה
  english_pob_choice: from man to woman
  chosen_spanish: de hombre a mujer
  alternatives_spanish:
  - desde hombre hasta mujer
  - de varón a mujer
  lexicon: HALOT
  rationale: La construcción distributiva singular se conserva con un giro español igualmente natural. ‘De hombre a mujer’ preserva el alcance totalizante y la marcada referencia de género del hebreo.
- source_word: שְׁנֵים עָשָׂר אָלֶף
  english_pob_choice: twelve thousand
  chosen_spanish: doce mil
  alternatives_spanish:
  - doce millares
  lexicon: HALOT
  rationale: Correspondencia cardinal directa y transparente.
- source_word: כֹּל אַנְשֵׁי הָעָי
  english_pob_choice: all the people of Ai
  chosen_spanish: todos los habitantes de Hai
  alternatives_spanish:
  - todos los hombres de Hai
  - toda la gente de Hai
  lexicon: HALOT
  rationale: אַנְשֵׁי literalmente puede ser ‘hombres de’, pero el contexto y el paralelismo con ‘de hombre a mujer’ favorecen un referente corporativo de la población de la ciudad. ‘Habitantes’ evita borrar la amplitud del hebreo y resuelve con claridad la tensión idiomática documentada por la POB inglesa.
theological_decisions:
- issue: Lenguaje de género en el resumen de bajas
  english_pob_reading: Retain 'from man to woman' and 'all the people of Ai' in the main text
  chosen_spanish_reading: Conservar ‘de hombre a mujer’ y ‘todos los habitantes de Hai’
  alternative_spanish_readings:
  - de hombres a mujeres
  - todos los hombres de Hai
  - toda la gente de Hai
  rationale: El hebreo usa un rango distributivo con sustantivos singulares de género y luego una expresión corporativa para la población de la ciudad. En español, ‘habitantes’ expresa con precisión el sentido global sin neutralizar indebidamente el rango de género anterior ni forzar una lectura exclusivamente masculina del final.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy #4'
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió ‘all the men of Ai’ por ‘all the people of Ai’ para reflejar la inclusión explícita de ‘de hombre a mujer’. La presente redacción española sigue esa revisión, pero conserva la tensión del hebreo mediante ‘habitantes’ y la nota alternativa, en vez de masculinizar el cierre.
  spanish_consistency_notes:
  - Se mantuvo ‘Hai’ como transliteración habitual del topónimo en español.
  - Se evitó ‘SEÑOR’ u otras sustituciones porque el versículo no contiene el nombre divino.
  - Se usó ‘cayeron’ para reflejar el participio hebreo sin añadir una interpretación causal explícita.
  - El cierre con dos puntos conserva la relación resumitiva entre el número y la frase final.
