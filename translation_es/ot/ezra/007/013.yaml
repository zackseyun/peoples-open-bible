  - severity: low
    issue: Nota b demasiado abreviada en la explicación de la lectura alternativa
    rationale: La nota actual puede dejar ambiguo qué alternativa se contempla. Conviene explicitar que también podría entenderse 'los sacerdotes de él', aunque el contexto favorece referencia a Israel.
