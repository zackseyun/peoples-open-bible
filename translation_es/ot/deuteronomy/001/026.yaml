  to: Pero ustedes no quisieron subir[a], y se rebelaron contra el mandato de Yahvé su Dios.
  rationale: 'Se mantiene la fidelidad semántica del borrador, pero se adapta la redacción al español neutral latinoamericano solicitado por el proyecto: ''ustedes... se rebelaron... su Dios''. También se armoniza la nota al pie con esa misma segunda persona plural de tratamiento. No se requieren cambios de fondo en la exégesis ni en la terminología.'
