  language: ko
  text: 그래서 빌라도가 자기가 아무것도 얻지 못하고 도리어 소요가 일어나는 것을 보고는, 물을 가져다가 무리 앞에서 자기 손을 씻으며 말하였습니다, 「나는 이 피에 대하여 무죄하다. 너희가 알아서 할 일이다.」
