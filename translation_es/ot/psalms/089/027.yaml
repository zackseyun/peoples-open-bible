translation:
  language: es
  text: 'Él clamará a mí[a]: «Tú eres mi Padre, mi Dios y la roca de mi salvación».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «me llamará» o «me invocará». El verbo hebreo puede llevar el sentido de llamar en voz alta, especialmente en oración.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הוּא
  english_pob_choice: He
  chosen_spanish: Él
  alternatives_spanish:
  - Él mismo
  - Él, precisamente
  lexicon: HALOT
  rationale: El pronombre independiente se conserva para reflejar el énfasis del hebreo y mantener el sujeto explícito en español.
- source_word: יִקְרָאֵנִי
  english_pob_choice: will call to me
  chosen_spanish: me llamará
  alternatives_spanish:
  - clamará a mí
  - me invocará
  lexicon: HALOT
  rationale: קרא puede significar 'llamar' o 'clamar'. Dado que el hebreo lleva sufijo de objeto de primera persona, 'me llamará' expresa de manera natural la dirección del llamado sin añadir elementos no requeridos por el texto.
- source_word: אָבִי
  english_pob_choice: my Father
  chosen_spanish: mi Padre
  alternatives_spanish:
  - mi padre
  lexicon: HALOT
  rationale: Se mantiene el valor relacional y la función de dirección a Dios. La mayúscula en 'Padre' ayuda a señalar que se trata de un título divino en el contexto de la alocución.
- source_word: אֵלִי
  english_pob_choice: my God
  chosen_spanish: mi Dios
  alternatives_spanish:
  - mi Dios poderoso
  lexicon: HALOT
  rationale: אֵל aquí designa a Dios en paralelo con 'mi Padre'; 'mi Dios' es la forma más clara y fiel en español.
- source_word: וְצוּר
  english_pob_choice: and the rock
  chosen_spanish: y la roca
  alternatives_spanish:
  - y mi roca
  lexicon: HALOT
  rationale: צוּר se traduce literalmente como 'roca'. Se omite el posesivo explícito porque el hebreo no lo tiene en este punto; la relación se completa con el sintagma siguiente.
- source_word: יְשׁוּעָתִי
  english_pob_choice: of my salvation
  chosen_spanish: de mi salvación
  alternatives_spanish:
  - de mi liberación
  - que me salva
  lexicon: HALOT
  rationale: יְשׁוּעָה puede ser 'salvación' o 'liberación'. Se preserva 'salvación' para mantener el lenguaje teológico del sustantivo y la relación constructa con 'roca'.
theological_decisions:
- issue: Dirección de la oración y tono del llamado
  english_pob_reading: He will call to me
  chosen_spanish_reading: Él me llamará
  alternative_spanish_readings:
  - Él clamará a mí
  - Él me invocará
  rationale: El verso presenta una escena de خطاب o alocución dirigida a Dios. 'Me llamará' conserva la posibilidad de llamado en oración sin forzar una formulación más interpretativa que 'invocará'.
  doctrine_reference: Psalm 89:27; Translation philosophy §§1, 3, 6
- issue: Relación filial y lenguaje reverente
  english_pob_reading: You are my Father, my God
  chosen_spanish_reading: Tú eres mi Padre, mi Dios
  alternative_spanish_readings:
  - Tú eres mi padre, mi Dios
  rationale: El hebreo presenta un discurso directo que atribuye a Dios un vínculo filial y confesional. La mayúscula en 'Padre' en la frase dirigida a Dios ayuda a preservar la fuerza titular sin cambiar el contenido.
  doctrine_reference: Affirmations; Psalm 89 covenant context
- issue: Metáfora de la roca
  english_pob_reading: the rock of my salvation
  chosen_spanish_reading: la roca de mi salvación
  alternative_spanish_readings:
  - mi roca de salvación
  - la roca que me salva
  rationale: Se conserva la metáfora clásica de 'roca' y la construcción posesiva 'de mi salvación' para reflejar la relación nominal del hebreo sin convertirla en una cláusula explicativa.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'El texto sigue de cerca el análisis hebreo y coincide sustancialmente con la decisión inglesa más reciente: pronombre explícito, verbo de llamada dirigido a Dios, títulos relacionales y metáfora de la roca. No hay revisiones aplicadas en el registro inglés; esta propuesta mantiene esa lectura sin introducir expansión interpretativa.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo exija; aquí no aparece el nombre divino.
  - Se mantiene 'Dios' para אֵל en paralelo con 'Padre', conforme al uso de POB.
  - Se conserva la metáfora 'roca' en lugar de una explicación dinámica como 'refugio', porque el hebreo es explícitamente figurado.
  - La puntuación con dos puntos introduce la cita directa de forma natural en español y respeta el valor del llamado verbal.
