review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura hebrea, preserva la aposición «tu hermano, el hijo de tu madre», mantiene la cadena de relaciones íntimas, traduce correctamente עבד como «servir» y conserva el matiz de בַּסֵּתֶר con «en secreto». Sin embargo, «te seduce» para יְסִיתְךָ tiende en español a un matiz sexual/romántico que no está en el hebreo y debilita el sentido de incitar o inducir a la apostasía. Además, «ni tú ni tus padres conocisteis» mezcla tuteo singular con voseo/vosotros peninsular, impropio del objetivo de español neutro latinoamericano.
  spanish_quality_summary: 'El texto es legible y digno, pero requiere dos ajustes para sonar natural en español neutro eclesial: sustituir «te seduce» por una opción menos ambigua como «te incita», y cambiar «conocisteis» por «han conocido» o «conocieron». También conviene retirar la nota [a], porque en español no está anclada al sintagma realmente explicado y no corresponde a una alternativa preservada por el inglés, mientras que la nota [b] sí sigue siendo útil.'
  glossary_alignment: 'No hay conflicto con los términos doctrinales del proyecto. «dioses» y «servir» están bien. «alma» para נֶפֶשׁ es defendible aquí con nota alternativa «vida». La principal desalineación es léxica: יְסִיתְךָ se alinea mejor con «te incita»/«te induce» que con «te seduce».'
  issues:
  - severity: medium
    issue: «te seduce» para יְסִיתְךָ
    rationale: En español moderno «seducir» suele sugerir atracción erótica o encanto persuasivo; aquí el hebreo apunta a incitar o inducir a la idolatría. «Te incita en secreto» preserva mejor el sentido lexical y evita ambigüedad.
  - severity: medium
    issue: «conocisteis» en un texto dirigido con «tú»
    rationale: La forma «conocisteis» introduce un registro peninsular/vosotros ajeno al español neutro latinoamericano. «han conocido» reproduce bien el perfecto inglés auditado y suena natural en el registro meta.
  - severity: low
    issue: Nota [a] innecesaria y mal anclada
    rationale: La nota explica «el hijo de tu madre», pero el marcador está puesto en «tu hermano». Además, el inglés POB no llevaba nota en ese punto; no hace falta crear una nota nueva si no resuelve una ambigüedad del español.
  revised_spanish_text: 'Porque si tu hermano, el hijo de tu madre, o tu hijo o tu hija, o la mujer de tu seno, o tu amigo[a] que es como tu propia alma, te incita en secreto, diciendo: «Vayamos y sirvamos a otros dioses», dioses que ni tú ni tus padres han conocido—'
  revised_footnotes:
  - marker: a
    text: 'O: «tu amigo que es como tu propia vida/alma».'
    reason: lexical_alternative
  revision_rationale: Se corrige el verbo principal para reflejar mejor el sentido de incitación a la apostasía, se normaliza la concordancia al español neutro latinoamericano con «han conocido», y se conserva solo la nota útil sobre «alma/vida». «Vayamos y sirvamos» expresa de manera más directa los cohortativos hebreos que «Vamos y sirvamos».
