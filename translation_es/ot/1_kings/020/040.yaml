  to: 'Y mientras tu siervo andaba ocupado aquí y allá[a], él ya no estaba[b]. Entonces el rey de Israel le dijo: «Así será tu juicio[c]; tú mismo lo has decidido».'
  rationale: 'Se revisa principalmente para ajustarse a la decisión léxica auditada sobre עַבְדְּךָ: en este contexto cortesano corresponde ''tu siervo'', no ''tu esclavo''. También se suaviza el calco narrativo inicial para un español más natural y se afina la nota de literalidad de אֵינֶנּוּ sin perder el matiz contextual de desaparición. El resto del versículo conserva adecuadamente el sentido judicial del original.'
