translation:
  language: es
  text: Quemará toda su grasa sobre el altar[a], como la grasa del sacrificio de paz. Así el sacerdote hará expiación por él, por su pecado[b], y será perdonado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sacrificio de paz' también puede traducirse 'ofrendas de paz', 'ofrendas de comunión' u 'ofrendas de bienestar'.
    reason: lexical_alternative
  - marker: b
    text: El hebreo חַטָּאת puede significar 'pecado' o 'ofrenda por el pecado'; aquí lo más probable es que se refiera al pecado de la persona.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֶלְבּוֹ
  english_pob_choice: its fat
  chosen_spanish: toda su grosura
  alternatives_spanish:
  - toda su grasa
  - toda la grosura de él
  lexicon: HALOT
  rationale: En español, חֵלֶב en contexto sacrificial puede expresarse con 'grosura' o 'grasa'. 'Grosura' conserva mejor el registro cultual y evita una asociación demasiado culinaria; 'toda' refleja el alcance total del hebreo כָּל y el sufijo posesivo 'su' mantiene la referencia al animal de la ofrenda.
- source_word: יַקְטִיר
  english_pob_choice: he shall burn
  chosen_spanish: quemará
  alternatives_spanish:
  - hará subir humo de
  - ofrecerá en humo
  lexicon: HALOT
  rationale: En el contexto del altar, el verbo indica la acción ritual de quemar la porción sacrificial. 'Quemará' es natural y fiel en español; el contexto ya especifica que se trata del acto cultual, sin necesidad de una perífrasis más pesada.
- source_word: הַמִּזְבֵּחָה
  english_pob_choice: on the altar
  chosen_spanish: sobre el altar
  alternatives_spanish:
  - en el altar
  - al altar
  lexicon: HALOT
  rationale: La terminación direccional del hebreo sugiere movimiento hacia el altar, pero en español la formulación ritual normal es 'sobre el altar', que comunica con claridad el lugar donde se consume la ofrenda.
- source_word: כְּחֵלֶב זֶבַח הַשְּׁלָמִים
  english_pob_choice: like the fat of the sacrifice of peace offerings
  chosen_spanish: como la grosura del sacrificio de las ofrendas de paz
  alternatives_spanish:
  - como la grasa del sacrificio de comunión
  - como la grosura del sacrificio de las ofrendas de bienestar
  lexicon: HALOT
  rationale: '''Ofrendas de paz'' mantiene la equivalencia tradicional de שְׁלָמִים en la línea del POB en inglés. Se conserva ''sacrificio de las ofrendas de paz'' para reflejar la construcción hebrea y la comparación ritual; otras opciones españolas captan el matiz de comunión o bienestar, pero el texto principal preserva la terminología cultual reconocible.'
- source_word: וְכִפֶּר עָלָיו
  english_pob_choice: the priest shall make atonement for him
  chosen_spanish: el sacerdote hará expiación por él
  alternatives_spanish:
  - el sacerdote hará expiación en favor de él
  - el sacerdote hará expiación por su persona
  lexicon: HALOT
  rationale: '''Hacer expiación'' representa bien כפר en contexto sacerdotal y conserva la forma cultual sin reducirla a una sola teoría. ''Por él'' traduce עָלָיו con naturalidad y mantiene el destinatario humano del rito.'
- source_word: מֵחַטָּאתוֹ
  english_pob_choice: for his sin
  chosen_spanish: por su pecado
  alternatives_spanish:
  - a causa de su pecado
  - de su pecado
  lexicon: HALOT
  rationale: El contexto inmediato favorece entender חַטָּאת aquí como la ofensa personal, no como 'ofrenda por el pecado'. 'Pecado' es el equivalente más claro y directo en español; 'por' preserva la relación de expiación indicada por el hebreo y la lectura auditada en inglés.
- source_word: וְנִסְלַח לוֹ
  english_pob_choice: and he shall be forgiven
  chosen_spanish: y le será perdonado
  alternatives_spanish:
  - y será perdonado
  - y se le perdonará
  lexicon: HALOT
  rationale: La pasiva impersonal 'le será perdonado' reproduce bien el hebreo y mantiene el sentido de favor recibido sin introducir un sujeto explícito. Es una formulación solemne y natural en español bíblico contemporáneo.
theological_decisions:
- issue: Rendering of שְׁלָמִים
  english_pob_reading: peace offerings
  chosen_spanish_reading: ofrendas de paz
  alternative_spanish_readings:
  - ofrendas de comunión
  - ofrendas de bienestar
  rationale: Se conserva 'ofrendas de paz' como término principal por continuidad terminológica con la tradición auditada en inglés y por su reconocibilidad en español eclesial. Las alternativas captan el campo semántico de plenitud, comunión y bienestar, pero no reemplazan al término base en el texto principal.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: Meaning of חַטָּאת in מֵחַטָּאתוֹ
  english_pob_reading: his sin
  chosen_spanish_reading: su pecado
  alternative_spanish_readings:
  - su ofrenda por el pecado
  - su falta
  rationale: El flujo de la frase —expia 'por él' y luego 'será perdonado'— favorece entender el término como la culpa u ofensa personal. Traducir 'su pecado' evita forzar aquí el sentido de 'ofrenda por el pecado' y respeta la tensión lexical documentada en el POB inglés.
  doctrine_reference: Translation philosophy §1 (original-language primacy over translation tradition)
- issue: Expiation language for כפר
  english_pob_reading: make atonement
  chosen_spanish_reading: hacer expiación
  alternative_spanish_readings:
  - hacer propiciación
  - hacer reparación sacrificial
  rationale: '''Hacer expiación'' conserva la resonancia cultual y la ambigüedad teológica deliberada del verbo hebreo, sin fijar una sola teoría de su mecanismo. Es una solución estable en español bíblico y coherente con la lectura auditada.'
  doctrine_reference: Translation philosophy §1 (original-language primacy over translation tradition)
translation_notes:
  revision_awareness: 'La revisión auditada más reciente indica que no hubo cambios necesarios y que el consenso de revisión es alto; por eso el borrador español sigue de cerca la lectura final en inglés, preservando las dos tensiones léxicas documentadas: שְׁלָמִים y חַטָּאת.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como término estándar del proyecto cuando aparezca el Tetragrámaton; en este versículo no se presenta.
  - '''Ofrendas de paz'' se conserva como término técnico principal, con nota para alternativas semánticas.'
  - '''Hacer expiación'' y ''será perdonado'' mantienen el paralelismo cultual del hebreo sin añadir explicaciones doctrinales externas.'
  - '''Pecado'' se usa aquí en sentido de culpa/ofensa, no como nombre de la ofrenda, conforme al contexto inmediato.'
