revisions:
- from: Y los príncipes de Isacar estaban con Débora[a]; e Isacar estuvo asimismo con Barac; al valle fueron enviados a sus pies[b]. Entre las divisiones de Rubén hubo grandes indagaciones[c] de corazón.
  to: Y los príncipes de Isacar estaban con Débora[a]; e Isacar estuvo asimismo con Barac; al valle fueron enviados tras sus pasos[b]. Entre las divisiones de Rubén hubo grandes exámenes[c] del corazón.
  rationale: 'Se hicieron solo ajustes menores para mejorar la naturalidad y precisión del español: «tras sus pasos» expresa mejor el sentido idiomático de seguir de cerca, mientras la nota conserva la literalidad «a sus pies»; «grandes exámenes del corazón» suena más idiomático que «indagaciones de corazón» y sigue reflejando la introspección dubitativa del hebreo y del audit trail inglés.'
