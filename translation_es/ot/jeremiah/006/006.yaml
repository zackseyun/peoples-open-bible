translation:
  language: es
  text: 'Porque así dice Yahvé de los ejércitos: «Corten árboles y levanten contra Jerusalén una rampa de asedio[a]. Esta es la ciudad que ha de ser castigada[b]; todo dentro de ella es opresión».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «echen un terraplén de asedio contra Jerusalén». El hebreo dice literalmente «viertan una rampa de asedio», un giro idiomático para la construcción de obras de sitio.
    reason: lexical_alternative
  - marker: b
    text: O «ha de ser visitada», con el sentido de ser llamada a cuentas en juicio.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: Yahweh of hosts
  chosen_spanish: Yahvé de los ejércitos
  alternatives_spanish:
  - Yahvé de las huestes
  - Yahvé de los ejércitos celestiales
  lexicon: HALOT
  rationale: Conservo el nombre divino como «Yahvé» según el estándar del proyecto, y traduzco צְבָאוֹת con «de los ejércitos» por ser transparente y naturalmente comprensible en español. «Huestes» sería más tradicional, pero menos claro para una lectura moderna.
- source_word: כִּרְת֣וּ עֵצָ֔ה
  english_pob_choice: Cut down trees
  chosen_spanish: Corten árboles
  alternatives_spanish:
  - Talen árboles
  - Corten madera
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo colectivo en contexto militar; «árboles» transmite mejor la imagen concreta del trabajo de asedio que «madera». «Talen» sería posible, pero «corten» conserva un imperativo claro y natural en español.
- source_word: וְשִׁפְכ֥וּ ... סֹלְלָ֑ה
  english_pob_choice: heap up a siege ramp
  chosen_spanish: levanten ... una rampa de asedio
  alternatives_spanish:
  - echen ... un terraplén de asedio
  - vayan amontonando ... un terraplén de asedio
  lexicon: HALOT
  rationale: El verbo literalmente es «derramar/verter», pero en este contexto idiomático se refiere a construir obras de sitio. «Levanten una rampa de asedio» comunica la acción bélica con naturalidad, sin perder la referencia a la obra militar.
- source_word: עַל יְרוּשָׁלִַם
  english_pob_choice: against Jerusalem
  chosen_spanish: contra Jerusalén
  alternatives_spanish:
  - sobre Jerusalén
  - hacia Jerusalén
  lexicon: HALOT
  rationale: En un contexto de asedio, עַל expresa hostilidad y ataque; «contra» es la opción más exacta y natural en español.
- source_word: הָפְקַד
  english_pob_choice: to be punished
  chosen_spanish: ha de ser castigada
  alternatives_spanish:
  - ha de ser visitada
  - ha de ser llamada a cuentas
  - debe ser castigada
  lexicon: HALOT
  rationale: 'Sigo la lectura judicial preferida en el audit trail inglés: no una mera visita, sino una intervención punitiva. «Ha de ser castigada» reproduce bien el valor profético-jurídico sin sonar arcaico.'
- source_word: כֻּלָּהּ עֹשֶׁק
  english_pob_choice: all of it is oppression
  chosen_spanish: toda ella es opresión
  alternatives_spanish:
  - todo en ella es opresión
  - no hay en ella sino opresión
  lexicon: HALOT
  rationale: El hebreo es conciso y totalizante. «Toda ella es opresión» conserva la fuerza global del original y mantiene la personificación femenina de la ciudad.
- source_word: בְּקִרְבָּהּ
  english_pob_choice: within her
  chosen_spanish: en medio de ella
  alternatives_spanish:
  - dentro de ella
  - en su interior
  lexicon: HALOT
  rationale: «En medio de ella» refleja bien la idea de interioridad dentro de la ciudad personificada y suena más idiomático que una repetición pesada de «dentro de ella».
theological_decisions:
- issue: Sentido judicial de הָפְקַד en el contexto del asedio profético
  english_pob_reading: The city is to be punished / visited in judgment.
  chosen_spanish_reading: La ciudad ha de ser castigada en juicio.
  alternative_spanish_readings:
  - La ciudad ha de ser visitada
  - La ciudad ha de ser llamada a cuentas
  rationale: En Jeremías 6:6 el verbo no describe una visita neutral, sino una acción judicial de Yahvé contra Jerusalén. «Castigada» hace explícita esa dimensión sin añadir doctrina ajena al pasaje.
  doctrine_reference: Juicio divino profético; cf. el uso judicial de פקד en el contexto de advertencia y castigo.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la revisión más reciente del audit trail inglés: mantiene la estructura breve y enfática, conserva la imagen militar de la rampa de asedio, traduce הָפְקַד con un valor punitivo explícito, y refleja כֻּלָּהּ con una formulación totalizante («toda ella»).'
  spanish_consistency_notes:
  - Se conserva «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - Se evita «SEÑOR» como máscara tipográfica para no ocultar el Tetragrámaton.
  - Se mantiene la personificación femenina de Jerusalén con pronombres femeninos («ella»).
  - «Opresión» traduce עֹשֶׁק de forma directa y no se sustituye por un término más suave, para no perder la carga ética del texto.
