  yaml_path: translation/ot/judges/006/039.yaml
  text: 'Then Gideon said to God[a], “Do not let your anger burn against me, and let me speak just this once. Please let me test just this once with the fleece: let there be dryness on the fleece alone[c][b], and on all the ground let there be dew.”'
  footnotes:
  - marker: a
    text: Or, 'Do not be angry with me.' The Hebrew idiom is literally, 'Do not let your anger burn against me.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'Please let me try just this once with the fleece.'
    reason: lexical_alternative
  - marker: c
    text: '''Ground'' could also be rendered ''land'' or ''earth''; here it refers to the area around the fleece in contrast with the fleece itself.'
    reason: lexical_alternative
