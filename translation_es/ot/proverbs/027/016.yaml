revisions:
- from: Quien la restringe, restringe el viento[a], y su mano derecha sujeta aceite.
  to: Quien la contiene, contiene el viento[a], y su mano derecha sujeta aceite.
  rationale: Se hace una reparación mínima para mejorar la naturalidad del español sin apartarse del sentido documentado por el hebreo y la auditoría inglesa. «Contiene» comunica mejor que «restringe» la idea de intentar refrenar o retener algo tan incontrolable como el viento, y preserva el paralelismo verbal del original. Se mantiene la nota sobre la lectura más literal de יִקְרָא.
