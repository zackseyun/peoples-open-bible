translation:
  language: es
  text: Porque la palabra de Yahvé[a] es recta, y toda su obra está en fidelidad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la palabra de Yahvé es recta'.
    reason: lexical_alternative
  - marker: b
    text: O 'está en fidelidad'.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la base causal o explicativa del versículo anterior; en español, 'Porque' conserva bien ese valor y suena natural en registro poético.
- source_word: יָשָׁר
  english_pob_choice: upright
  chosen_spanish: recta
  alternatives_spanish:
  - justa
  - derecha
  - upright
  lexicon: HALOT
  rationale: El hebreo expresa rectitud moral y confiabilidad. 'Recta' transmite esa idea de forma breve y poética en español, sin perder el matiz ético.
- source_word: דְּבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el dicho de Yahvé
  - la declaración de Yahvé
  lexicon: HALOT
  rationale: '''דָּבָר'' aquí se refiere a la palabra/declaração de Dios. ''La palabra de Yahvé'' sigue el valor semántico y mantiene el nombre divino según el estándar del proyecto.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se conserva el nombre propio del pacto. En español, 'Yahvé' es la forma establecida por el proyecto para el Tetragrámaton, en lugar de un reemplazo litúrgico.
- source_word: וְכָל
  english_pob_choice: and all
  chosen_spanish: y toda
  alternatives_spanish:
  - y todo
  - y cada
  lexicon: HALOT
  rationale: El sustantivo colectivo singular en hebreo se expresa naturalmente en español con 'toda' concordando con 'obra', preservando la idea de totalidad.
- source_word: מַעֲשֵׂהוּ
  english_pob_choice: his work
  chosen_spanish: su obra
  alternatives_spanish:
  - su trabajo
  - sus obras
  - su hacer
  lexicon: HALOT
  rationale: El singular hebreo con sufijo posesivo funciona de modo colectivo. 'Su obra' es una forma natural y digna en español para la actividad total de Dios, sin forzar el plural.
- source_word: בֶּאֱמוּנָה
  english_pob_choice: in faithfulness
  chosen_spanish: en fidelidad
  alternatives_spanish:
  - con fidelidad
  - fielmente
  - en verdad
  lexicon: HALOT
  rationale: אֱמוּנָה denota fiabilidad, constancia y fidelidad. 'En fidelidad' conserva la construcción preposicional y evita reducir el sustantivo a un adverbio.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La lectura del texto hebreo exige preservar el nombre del pacto. 'Yahvé' es la opción del proyecto en español y evita la sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Estructura verbal de בֶּאֱמוּנָה
  english_pob_reading: is done in faithfulness / is in faithfulness
  chosen_spanish_reading: está en fidelidad
  alternative_spanish_readings:
  - es fiel
  - obra fielmente
  rationale: 'El hebreo es nominal/verbless: ''y todo su trabajo/obra [está] en fidelidad''. ''Está en fidelidad'' mantiene esa estructura y la tensión entre cualidad y modo de actuar, sin convertirla innecesariamente en adverbio.'
  doctrine_reference: 'POB translation philosophy #5 (consistency of key terms, or documented exception)'
- issue: Singular colectivo de מַעֲשֵׂהוּ
  english_pob_reading: all his work
  chosen_spanish_reading: toda su obra
  alternative_spanish_readings:
  - todas sus obras
  - todo lo que hace
  rationale: El singular hebreo con sufijo debe conservarse en lo posible. 'Toda su obra' comunica la totalidad de su actividad y mantiene la forma singular colectiva.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #5 (consistency of key terms, or documented exception)'
translation_notes:
  revision_awareness: El inglés POB pasó por una revisión que afinó la segunda cláusula de 'is in faithfulness' a 'is done in faithfulness' por naturalidad. Para el español, el hebreo permite con claridad una construcción sin verbo explícito; por eso se eligió 'está en fidelidad', que conserva mejor la forma nominal y la equivalencia poética del paralelismo con 'es recta'.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' conforme al estándar del proyecto para יְהוָה.
  - Se usó 'fidelidad' para אֱמוּנָה por su valor de confiabilidad y constancia.
  - Se eligió 'obra' en singular colectivo para מַעֲשֵׂהוּ, evitando un plural innecesario.
  - 'El paralelismo hebreo se refleja con dos predicaciones breves: ''es recta'' / ''está en fidelidad''.'
