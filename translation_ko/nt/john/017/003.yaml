id: JHN.17.3
reference: 'John 17:3'
language:
  code: ko
  name: Korean
  variant: '표준어 / modern formal-polite (합쇼체)'
source:
  edition: SBLGNT
  text: αὕτη δέ ἐστιν ἡ αἰώνιος ζωὴ ἵνα γινώσκωσι σὲ τὸν μόνον ἀληθινὸν θεὸν καὶ ὃν ἀπέστειλας Ἰησοῦν Χριστόν.
base_translation:
  language: en
  yaml_path: translation/nt/john/017/003.yaml
  text: 'And this is eternal life: that they may know you[a], the only true God, and Jesus Messiah whom you sent.'
  footnotes:
  - marker: a
    text: Or, traditionally, 'Jesus Christ.' The Greek Χριστός can function as a title ('Messiah') or, in some contexts, as a name-like designation ('Christ').
    reason: alternative_reading
translation:
  language: ko
  text: 영원한 생명은 이것입니다. 곧 유일하신 참 하나님과, 아버지께서 보내신 예수 메시아를 아는 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 전통적으로 「예수 그리스도」. 헬라어 Χριστός는 칭호(「메시아」)로도, 일부 문맥에서는 이름과 같은 지칭으로도 기능한다. 본 글로사리는 칭호의 무게를 보존하기 위해 「메시아」를 채택한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: γινώσκωσι
  english_pob_choice: know
  chosen_korean: 알다
  alternatives_korean:
  - 깨닫다
  lexicon: BDAG
  rationale: 요한적 「앎」은 인격적 관계의 앎을 포괄하며, 「알다」가 자연스럽다.
- source_word: μόνον ἀληθινὸν θεὸν
  english_pob_choice: only true God
  chosen_korean: 유일하신 참 하나님
  alternatives_korean:
  - 홀로 참되신 하나님
  lexicon: BDAG
  rationale: 신학적 정의의 무게를 「유일하신 참 하나님」으로.
- source_word: Ἰησοῦν Χριστόν
  english_pob_choice: Jesus Messiah
  chosen_korean: 예수 메시아
  alternatives_korean:
  - 예수 그리스도
  lexicon: BDAG
  rationale: 칭호의 무게 보존(글로사리 정책).
