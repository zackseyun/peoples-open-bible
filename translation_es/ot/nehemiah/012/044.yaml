- from: En aquel día se asignaron hombres sobre las cámaras, para las contribuciones[a], para las primicias y para los diezmos, para recoger en ellas, desde los campos de las ciudades, las porciones de la ley para los sacerdotes y para los levitas[b], porque se alegró Judá por los sacerdotes y por los levitas que estaban sirviendo[c].
  to: En aquel día fueron nombrados hombres a cargo de los depósitos[a] para las contribuciones, para las primicias y para los diezmos, para recoger en ellos, de los campos de las ciudades, las porciones prescritas por la ley para los sacerdotes y para los levitas[b], porque Judá se alegró por los sacerdotes y por los levitas que estaban sirviendo[c].
  rationale: La revisión corrige la construcción administrativa inicial para reflejar mejor וַיִּפָּקְדוּ, cambia «cámaras» por «depósitos» para que la nota alternativa tenga sentido y para resaltar la función contextual de almacenamiento, y explicita «prescritas por la ley» para comunicar con más claridad el sentido de מְנָאוֹת הַתּוֹרָה sin apartarse del hebreo ni del audit trail inglés. No se requiere adjudicación adicional.
