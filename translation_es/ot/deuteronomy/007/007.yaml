revisions:
- from: No fue por ser ustedes más numerosos que todos los pueblos que Yahvé se aficionó a ustedes[a] y los escogió, pues ustedes eran los más pocos de todos los pueblos.
  to: No fue por ser ustedes más numerosos que todos los pueblos que Yahvé puso su afecto en ustedes[a] y los escogió, porque ustedes eran los menos numerosos de todos los pueblos.
  rationale: Se reemplaza «se aficionó a» por «puso su afecto en ustedes» para reflejar mejor חָשַׁק en un español digno, claro y fiel al matiz de apego fuerte destacado por la auditoría inglesa. Se sustituye «los más pocos» por «los menos numerosos», que conserva el contraste numérico con naturalidad. La nota se mantiene como alternativa léxica significativa y se ajusta al español más idiomático. No se requiere adjudicación adicional porque la corrección es estilística y léxicamente clara a partir de la evidencia dada.
