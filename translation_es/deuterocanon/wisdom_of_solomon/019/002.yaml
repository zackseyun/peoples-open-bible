translation:
  language: es
  text: porque ellos mismos[a], después de volverse atrás en cuanto a dejarlos ir y de haberlos despedido con urgencia, los perseguirían[b], habiendo cambiado de parecer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «después de haber retrocedido en cuanto a dejarlos partir» o «después de haber revertido su decisión de dejarlos ir».'
    reason: lexical_alternative
  - marker: b
    text: «Habiendo cambiado de parecer» también puede traducirse «habiéndolo lamentado».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιστρέψαντες
  english_pob_choice: had turned back
  chosen_spanish: se hubieron vuelto atrás
  alternatives_spanish:
  - hubieran regresado
  - se hubieran revertido
  lexicon: LSJ
  rationale: El participio expresa reversión de la acción previa; «volverse atrás» conserva la imagen de retroceso o cambio de dirección sin forzar un tecnicismo.
- source_word: τοῦ ἀπεῖναι
  english_pob_choice: from letting them go
  chosen_spanish: de dejarles ir
  alternatives_spanish:
  - de permitir que partieran
  - de dejarlos partir
  lexicon: LSJ
  rationale: En este contexto narrativo se refiere a permitir la salida; «dejarles ir» es natural en español y mantiene el valor de concesión de salida.
- source_word: μετὰ σπουδῆς
  english_pob_choice: with urgency
  chosen_spanish: con urgencia
  alternatives_spanish:
  - con prisa
  - con premura
  lexicon: LSJ
  rationale: σπουδή aquí señala rapidez apremiante; «con urgencia» conserva tanto el tono como la velocidad del acto de despedirlos.
- source_word: προπέμψαντες
  english_pob_choice: had sent them on
  chosen_spanish: haberlos despedido
  alternatives_spanish:
  - haberlos enviado
  - haberlos acompañado en el camino
  lexicon: LSJ
  rationale: El verbo puede implicar despedir o enviar adelante; en español, «despedir» comunica bien el acto de enviarlos fuera con intención de marcha, sin añadir una escena de acompañamiento no asegurada.
- source_word: διώξουσιν
  english_pob_choice: they would pursue them
  chosen_spanish: los perseguirían
  alternatives_spanish:
  - los seguirían
  - los irían a perseguir
  lexicon: LSJ
  rationale: La persecución es literal en el contexto; «perseguirían» es el equivalente más directo y claro.
- source_word: μεταμεληθέντες
  english_pob_choice: having changed their minds
  chosen_spanish: habiendo cambiado de parecer
  alternatives_spanish:
  - habiendo cambiado de mente
  - habiéndose arrepentido
  lexicon: LSJ
  rationale: El participio expresa cambio de decisión con posible matiz de arrepentimiento; «haber cambiado de parecer» preserva esa ambigüedad sin imponer una lectura moral o penitencial.
theological_decisions:
- issue: Matiz de μεταμεληθέντες
  english_pob_reading: Having changed their minds may also be rendered having regretted it.
  chosen_spanish_reading: habiendo cambiado de parecer
  alternative_spanish_readings:
  - habiéndose arrepentido
  - habiendo lamentado lo hecho
  rationale: La lectura principal mantiene abierto el campo semántico entre cambio de decisión y arrepentimiento, evitando teologizar el término más allá de la escena histórica.
  doctrine_reference: Evitar importar automáticamente el lenguaje penitencial de μετανοέω a μεταμέλομαι; mantener la distinción léxica.
- issue: Sujetos implícitos y claridad narrativa
  english_pob_reading: 'The verse refers to the Egyptians: after reversing their earlier release of Israel and urgently sending them away, they then pursued them after changing their minds.'
  chosen_spanish_reading: El texto se refiere a los egipcios, pero la narración puede dejar el sujeto implícito porque el contexto ya lo fija.
  alternative_spanish_readings:
  - hacer explícitos los egipcios en la traducción
  - dejar todos los referentes tácitos
  rationale: En español, el pronombre «ellos mismos» conserva el énfasis del griego y la secuencia verbal mantiene la referencia narrativa sin sobreexplicar el contexto.
  doctrine_reference: Principio de equivalencia óptima; claridad contextual sin expansión interpretativa.
translation_notes:
  revision_awareness: La redacción sigue la revisión del POB en inglés que suavizó la secuencia participial para una sintaxis más natural, conservando «they themselves», «with urgency» y el cierre con «having changed their minds». En español se replicó ese orden lógico con participios y gerundios subordinados, manteniendo el énfasis en la reversión previa, la urgencia y el cambio de parecer.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o terminología litúrgica no presente en el verso.
  - Se mantuvo un registro bíblico moderno y digno, sin calco rígido del inglés.
  - «Habiendo cambiado de parecer» preserva la tensión léxica de μεταμεληθέντες sin convertirlo automáticamente en arrepentimiento penitencial.
