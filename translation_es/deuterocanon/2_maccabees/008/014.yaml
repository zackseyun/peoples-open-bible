translation:
  language: es
  text: Pero ellos estaban vendiendo todo lo que les quedaba[a], y al mismo tiempo rogaban al Señor que rescatara a los que habían sido vendidos por el impío Nicanor antes de que se encontrara con ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más explícita en el contexto, 'los que habían sido vendidos como esclavos'. El griego dice simplemente 'los que habían sido vendidos'.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ περιλελειμμένα πάντα
  english_pob_choice: all that remained
  chosen_spanish: todo lo que les quedaba
  alternatives_spanish:
  - todo lo que quedaba
  - todas las cosas que les quedaban
  lexicon: LSJ
  rationale: El participio perfecto con πάντα comunica el conjunto de bienes restantes. En español, 'todo lo que les quedaba' mantiene el sentido global y evita una formulación demasiado pesada o técnica.
- source_word: ἐπώλουν
  english_pob_choice: were selling
  chosen_spanish: estaban vendiendo
  alternatives_spanish:
  - vendían
  - seguían vendiendo
  lexicon: LSJ
  rationale: El imperfecto expresa acción continua o en curso. 'Estaban vendiendo' conserva bien ese valor durativo en español moderno.
- source_word: ὁμοῦ δὲ
  english_pob_choice: and at the same time
  chosen_spanish: y al mismo tiempo
  alternatives_spanish:
  - y a la vez
  - mientras tanto
  lexicon: LSJ
  rationale: La idea es simultaneidad con la venta. 'Al mismo tiempo' reproduce con claridad la coordinación temporal.
- source_word: τὸν κύριον
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Dueño
  - el amo
  lexicon: LSJ
  rationale: Aquí κύριος se refiere a Dios en una súplica; por eso corresponde 'el Señor' según el uso devocional y la convención del proyecto para esta referencia.
- source_word: ἠξίουν
  english_pob_choice: were imploring
  chosen_spanish: rogaban
  alternatives_spanish:
  - imploraban
  - suplicaban
  lexicon: LSJ
  rationale: En contexto de oración urgente, 'rogaban' comunica la insistencia sin sonar forzado en español. Conserva la fuerza peticionaria del verbo.
- source_word: ῥύσασθαι
  english_pob_choice: to rescue
  chosen_spanish: rescatar
  alternatives_spanish:
  - librar
  - salvar
  lexicon: LSJ
  rationale: El infinitivo aoristo expresa el contenido de la súplica. 'Rescatar' encaja con el peligro inmediato y evita cargar el verbo con un matiz soteriológico más amplio de lo que exige el griego.
- source_word: τοὺς ... πεπραμένους
  english_pob_choice: those who had been sold
  chosen_spanish: a los que habían sido vendidos
  alternatives_spanish:
  - a los que habían sido vendidos como esclavos
  - a los vendidos
  lexicon: LSJ
  rationale: El griego dice simplemente 'los que habían sido vendidos'. En español, 'a los que habían sido vendidos' conserva la literalidad sin añadir 'como esclavos' en el texto principal.
- source_word: ὑπὸ τοῦ δυσσεβοῦς Νικάνορος
  english_pob_choice: by the ungodly Nikanor
  chosen_spanish: por el impío Nicanor
  alternatives_spanish:
  - por el impío Nicanor
  - por el irreligioso Nicanor
  lexicon: LSJ
  rationale: δυσσεβής es un juicio moral-religioso fuerte. 'Impío' transmite bien esa valoración en español bíblico y literario.
- source_word: πρὶν συντυχεῖν
  english_pob_choice: before he encountered them
  chosen_spanish: antes de que se encontrara con ellos
  alternatives_spanish:
  - antes de encontrarse con ellos
  - antes de toparse con ellos
  lexicon: LSJ
  rationale: La construcción con πρίν + infinitivo marca un evento aún no realizado. 'Antes de que se encontrara con ellos' mantiene el valor temporal y la referencia implícita a Nicanor.
theological_decisions:
- issue: Si κύριος debe traducirse con una forma devocional o literal en una oración dirigida a Dios
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el Dueño
  - el amo
  rationale: El contexto es una petición a Dios, no a un amo humano. Por eso 'el Señor' es la forma española natural y fiel a la lectura del POB en inglés.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Si conviene explicitar que 'fueron vendidos' implica esclavitud
  english_pob_reading: those who had been sold
  chosen_spanish_reading: a los que habían sido vendidos
  alternative_spanish_readings:
  - a los que habían sido vendidos como esclavos
  rationale: El griego no añade el complemento 'como esclavos'. La forma principal preserva esa reserva; la implicación histórica queda en el contexto, como en el audit trail inglés.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con la revisión más reciente del POB en inglés: el imperfecto sigue marcando acción continua; κύριος se mantiene como referencia a Dios; y no se explicita en el texto principal que los vendidos lo fueron ''como esclavos'', porque el griego no lo dice de forma directa.'
  spanish_consistency_notes:
  - Se mantiene 'Nicanor' con transliteración uniforme, como en el audit trail inglés.
  - '''Impío'' conserva el juicio moral-religioso de δυσσεβής sin suavizarlo.'
  - La puntuación y la sintaxis buscan una sola oración fluida, acorde con el paralelo inglés pero natural en español.
