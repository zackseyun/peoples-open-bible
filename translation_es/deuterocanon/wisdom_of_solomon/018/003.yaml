review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: contraste inicial, provisión divina, columna de fuego, guía para una travesía desconocida y sol inofensivo para la ξενιτεία de Israel. Sin embargo, «camino desconocido» estrecha ἀγνώστου ὁδοιπορίας a la ruta misma más que al viaje/travesía, y «destierro» puede sonar más negativo que la nota y la decisión inglesa, que preservan la dignidad de una estancia en tierra extranjera.'
  spanish_quality_summary: 'El español es claro y digno, pero tiene dos puntos mejorables: «camino desconocido» suena menos natural y menos preciso que «viaje desconocido» o «travesía desconocida»; y la nota usa «sojorno», forma no estándar en español, que afecta legibilidad. También «diste» es aceptable, pero «proporcionaste» expresa mejor la idea de παρέσχες como provisión.'
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Las decisiones principales son fieles. La única excepción relevante es léxica: para ξενιτεία conviene en español principal una formulación menos cargada negativamente que «destierro», en línea con la nota auditada; y en la nota debe corregirse «sojorno» por una expresión idiomática española.'
  issues:
  - severity: medium
    issue: «camino desconocido» para ἀγνώστου ὁδοιπορίας
    rationale: ὁδοιπορία denota viaje, travesía o desplazamiento, no meramente camino/ruta. «Camino desconocido» puede desplazar el foco desde la experiencia del viaje a la senda física.
  - severity: medium
    issue: «honorable destierro» para φιλοτίμου ξενιτείας
    rationale: Aunque defendible, «destierro» en español suele cargar más la idea de expulsión punitiva. Dado que la nota y la auditoría subrayan un matiz positivo de residencia en tierra extranjera, «estancia honorable en tierra extranjera» o similar preserva mejor el matiz.
  - severity: high
    issue: La nota usa «sojorno», forma no natural en español
    rationale: Es un calco impropio del inglés sojourn y perjudica la calidad del español objetivo. Debe reemplazarse por «estancia» o «residencia temporal».
  - severity: low
    issue: «diste» es algo más débil que παρέσχες
    rationale: No es incorrecto, pero «proporcionaste» o «concediste» refleja mejor el sentido de proveer/facilitar en un registro bíblico digno.
  revised_spanish_text: En vez de estas cosas[a], proporcionaste una columna de fuego ardiente, como guía para un viaje desconocido y como un sol inofensivo para su honorable estancia en tierra extranjera.
