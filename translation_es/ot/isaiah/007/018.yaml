translation:
  language: es
  text: Y en aquel día Yahvé silbará[b][a] para la mosca que está al extremo de las corrientes de Egipto, y para la abeja que está en la tierra de Asiria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hará un siseo para». El verbo hebreo se refiere a emitir un sonido agudo para llamar o dar señal.
    reason: lexical_alternative
  - marker: b
    text: «Corrientes de Egipto» puede referirse específicamente a las ramas del Nilo o a los canales de irrigación de Egipto.
    reason: cultural_note
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And ... will be / And ...
  chosen_spanish: Y ...
  alternatives_spanish:
  - Y sucederá
  - Y acontecerá
  lexicon: HALOT
  rationale: La fórmula hebrea introduce una escena futura con tono profético. En español, «Y en aquel día» comunica esa transición sin forzar un giro arcaizante innecesario como «sucederá» o «acontecerá».
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: in that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - en aquel tiempo
  lexicon: HALOT
  rationale: «Aquel día» preserva la fórmula profética fija y mantiene el registro solemne. «En ese día» resulta posible, pero menos idiomático en este contexto bíblico.
- source_word: יִשְׁרֹק
  english_pob_choice: will whistle for
  chosen_spanish: silbará
  alternatives_spanish:
  - chistará
  - hará un silbido para
  - silbará para
  lexicon: HALOT
  rationale: El verbo hebreo alude a emitir un sonido agudo para llamar o señalar. «Silbará» conserva la fuerza del gesto de convocatoria; en español, el complemento «para» expresa bien la finalidad de la señal. Se prefiere esta forma porque evita la connotación hostil que «siseará» podría sugerir.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton, con la forma española «Yahvé» como equivalente natural y reverente de la transliteración «Yahweh». Se evita la sustitución por un título como «el SEÑOR» porque el texto preserva el nombre divino.
- source_word: לַזְּבוּב
  english_pob_choice: the fly
  chosen_spanish: la mosca
  alternatives_spanish:
  - el insecto
  - la mosca insecto
  lexicon: HALOT
  rationale: Se conserva el singular imagístico del hebreo. «Mosca» es la forma natural en español y refleja el valor simbólico sin añadir explicaciones que el texto no da.
- source_word: אֲשֶׁר בִּקְצֵה יְאֹרֵי מִצְרָיִם
  english_pob_choice: that is at the far end of the streams of Egypt
  chosen_spanish: que está al extremo de los canales de Egipto
  alternatives_spanish:
  - que está en lo remoto de los canales de Egipto
  - que está al extremo de los ríos de Egipto
  lexicon: HALOT
  rationale: «קצה» comunica extremidad o lejanía; «extremo» la reproduce con naturalidad. «יְאֹרֵי» en contexto egipcio puede referirse a canales o brazos del Nilo; «canales» es una opción clara y culturalmente plausible en español, sin sobredeterminar la topografía.
- source_word: וְלַדְּבוֹרָה
  english_pob_choice: and for the bee
  chosen_spanish: y para la abeja
  alternatives_spanish:
  - y para las abejas
  lexicon: HALOT
  rationale: Se mantiene el singular paralelo a «la mosca», porque el hebreo usa una imagen singular coordinada. «Abeja» es el equivalente directo y conserva el tono figurativo.
- source_word: אֲשֶׁר בְּאֶרֶץ אַשּׁוּר
  english_pob_choice: that is in the land of Assyria
  chosen_spanish: que está en la tierra de Asiria
  alternatives_spanish:
  - que está en Asiria
  lexicon: HALOT
  rationale: «Tierra de Asiria» reproduce la expresión territorial de manera más concreta que un simple «en Asiria» y conserva el paralelo con «canales de Egipto».
theological_decisions:
- issue: Preservar el carácter figurativo del envío de insectos como imagen de convocatoria/juicio
  english_pob_reading: Retain the metaphor as political-military imagery without making the referents explicit in the main text.
  chosen_spanish_reading: Conservar la imagen de la mosca y la abeja sin identificar explícitamente a los poderes referidos en el texto principal.
  alternative_spanish_readings:
  - Explicitar en la traducción que la mosca representa a Egipto y la abeja a Asiria
  - Parafrasear la imagen para indicar un llamado a ejércitos extranjeros
  rationale: El hebreo presenta una imagen de convocatoria con insectos sin glosa interpretativa. La traducción española preserva esa tensión y evita resolver en el cuerpo del versículo lo que el texto sólo sugiere por contexto.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La traducción española mantiene el nombre propio divino, siguiendo la práctica del proyecto. Esto conserva la audibilidad del Tetragrámaton y evita la sustitución por un título tradicional que oculta el nombre.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'El texto inglés auditado permaneció sin cambios en la última revisión (latest_revision_pass: unchanged), y el acuerdo general fue alto. La propuesta española sigue esa misma lectura, conservando la imagen figurativa, el singular de los animales y la referencia territorial concreta.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se mantiene el paralelismo singular «la mosca / la abeja» para reflejar el hebreo.
  - Se traduce יְאֹרֵי con «canales» para evitar una especificación excesiva y conservar legibilidad.
  - Se evita «SEÑOR» como sustituto del nombre divino, conforme al criterio del proyecto.
