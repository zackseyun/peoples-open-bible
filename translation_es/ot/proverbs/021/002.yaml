review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite correctamente el sentido básico del hebreo: cada persona considera recto su propio camino, mientras Yahvé evalúa la interioridad. Conserva bien la metáfora de «camino», el contraste con «pesa», «corazones» para לִבּוֹת, y el nombre divino «Yahvé» para יְהוָה. Sin embargo, el anclaje y contenido de la nota al pie no están bien orientados: «recto[a]» no corresponde al punto explicado por la nota, que trata la locución בְּעֵינָיו. Además, en español la frase «a sus propios ojos» resulta más idiomática que «ante sus propios ojos» para este hebraísmo.'
  spanish_quality_summary: El texto es claro y digno, pero requiere un ajuste menor para mejorar naturalidad e integración de la nota. «Todo camino del hombre» es aceptable, y «recto» funciona, aunque el giro «a sus propios ojos» suena más natural y bíblico que «ante sus propios ojos». La puntuación y el registro son apropiados.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה → «Yahvé» correctamente; דֶּרֶךְ → «camino» preserva la metáfora sapiencial; לִבּוֹת → «corazones» mantiene la antropología bíblica; וְתֹכֵן → «pesa» conserva la imagen de evaluación. No hay conflicto doctrinal relevante.'
  issues:
  - severity: medium
    issue: La nota al pie está anclada en «recto» pero explica «a sus propios ojos».
    rationale: El marcador debe aparecer en la palabra o frase pertinente. Tal como está, induce a pensar que la nota comenta יָשָׁר en vez de בְּעֵינָיו.
  - severity: low
    issue: «Ante sus propios ojos» es menos idiomático que «a sus propios ojos» en este contexto.
    rationale: Ambas son comprensibles, pero «a sus propios ojos» refleja mejor el uso español habitual para juicio subjetivo y preserva la imagen hebrea sin rigidez innecesaria.
  - severity: low
    issue: 'El contenido de la nota formula «Hebreo: “ante sus propios ojos”» como si fuera una alternativa textual.'
    rationale: No hay variante; la nota debe explicar el sentido idiomático, no presentar la misma frase como lectura alternativa.
  revised_spanish_text: Todo camino del hombre es recto a sus propios ojos[a], pero Yahvé pesa los corazones.
  revised_footnotes:
  - marker: a
    text: La expresión hebrea significa según la propia evaluación o parecer de la persona.
