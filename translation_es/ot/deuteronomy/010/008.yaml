review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el hebreo y el rastro de auditoría inglés: conserva «Yahvé», «la tribu de Leví», «llevar», «ministrarle» y «bendecir en su nombre». Sin embargo, «estar en pie delante de Yahvé» suena innecesariamente rígido en español para לַעֲמֹד לִפְנֵי יְהוָה, donde «estar delante de Yahvé» preserva mejor el sentido idiomático de presencia/servicio sin la torpeza literalista. Además, «arca del pacto» es posible, pero aquí «arca del pacto de Yahvé» conviene menos que «arca del pacto de Yahvé» only stylistically; no issue of meaning. The main needed repair is readability at the priestly-idiom phrase.'
  spanish_quality_summary: El español es claro y fiel en general, con buen uso de «Yahvé» y sintaxis comprensible. La principal debilidad es la expresión «estar en pie delante de Yahvé», que resulta pesada y poco natural en español bíblico contemporáneo. Una leve simplificación mejora la legibilidad sin perder el matiz cultual.
  glossary_alignment: 'Alinea bien con la terminología del proyecto: יְהוָה → «Yahvé», לְשָׁרְתוֹ → «ministrarle», בְּרִית → «pacto». No hay conflicto doctrinal significativo. Se mantiene correctamente «Leví» como nombre tribal y no «los levitas».'
  issues:
  - severity: medium
    issue: Expresión demasiado literal en «para estar en pie delante de Yahvé»
    rationale: Aunque refleja formalmente לַעֲמֹד לִפְנֵי, en español suena forzado. «Para estar delante de Yahvé» conserva la idea de presencia cultual y servicio sin calco torpe.
  revised_spanish_text: En aquel tiempo Yahvé apartó la tribu de Leví para llevar el arca del pacto de Yahvé, para estar delante de Yahvé, para ministrarle y para bendecir en su nombre, hasta el día de hoy.
  revision_rationale: Se hace una reparación menor de naturalidad española en la locución sacerdotal «estar en pie delante de», reduciéndola a «estar delante de», que sigue siendo fiel al hebreo y al inglés auditado pero evita un calco rígido. No se requieren notas.
