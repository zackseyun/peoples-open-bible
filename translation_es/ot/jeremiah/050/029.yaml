translation:
  language: es
  text: Convoquen contra Babilonia[a] a muchos, a todos los que tensan el arco; acampen alrededor de ella, por todos lados; no haya escape. Páguenle según su obra; conforme a todo lo que ella ha hecho, háganle. Porque ha actuado con arrogancia contra Yahvé, contra el Santo de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no haya sobreviviente» / «no haya un remanente que escape». El hebreo פְּלֵטָה puede denotar el escape o a quienes escapan.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשְׁמִיעוּ
  english_pob_choice: Summon
  chosen_spanish: Convocad
  alternatives_spanish:
  - Llamad
  - Proclamad
  - Reunid
  lexicon: HALOT
  rationale: El imperativo causativo pide reunir fuerzas contra Babilonia; en español, 'convocad' comunica bien la idea de llamar a un contingente militar sin volverlo mecánico.
- source_word: רַבִּים
  english_pob_choice: many
  chosen_spanish: a muchos
  alternatives_spanish:
  - muchos
  - multitudes
  - muchos hombres
  lexicon: HALOT
  rationale: Como sustantivo después de 'contra Babilonia', apunta a muchos atacantes. 'A muchos' mantiene brevedad y naturalidad.
- source_word: דֹּרְכֵי קֶשֶׁת
  english_pob_choice: all who bend the bow
  chosen_spanish: a todos los que tensan el arco
  alternatives_spanish:
  - a todos los arqueros
  - a todos los que doblan el arco
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para arqueros. 'Tensan el arco' conserva la imagen corporal del hebreo y suena natural en español.
- source_word: חֲנוּ עָלֶיהָ סָבִיב
  english_pob_choice: encamp around her on every side
  chosen_spanish: acampen contra ella alrededor
  alternatives_spanish:
  - acampen alrededor de ella por todos lados
  - pongan campamento alrededor de ella
  lexicon: HALOT
  rationale: El contexto es de asedio; 'acampen contra ella alrededor' conserva la fuerza militar y evita una redundancia pesada con 'por todos lados'.
- source_word: אַ ל יְהִי פְּלֵטָה
  english_pob_choice: let there be no escape
  chosen_spanish: no haya escape
  alternatives_spanish:
  - no haya sobreviviente
  - no quede refugio
  - no haya escapatoria
  lexicon: HALOT
  rationale: פְּלֵטָה puede referirse al escape o a los que escapan. 'No haya escape' reproduce la ambigüedad útil para el asedio sin cargarlo demasiado hacia 'superviviente'.
- source_word: שַׁלְּמוּ לָהּ
  english_pob_choice: Repay her
  chosen_spanish: Repagadle
  alternatives_spanish:
  - Pagadle
  - Retribuidle
  - Recompensadle
  lexicon: HALOT
  rationale: El piel de שלם aquí expresa retribución. 'Repagadle' conserva la reciprocidad judicial del hebreo y la fuerza imperativa plural.
- source_word: כְּפָעֳלָהּ
  english_pob_choice: according to her work
  chosen_spanish: según su obra
  alternatives_spanish:
  - conforme a su obra
  - según su trabajo
  - de acuerdo con su obra
  lexicon: HALOT
  rationale: '''Obra'' en español bíblico mantiene el valor de acto/resultado sin reducirlo a mera ocupación laboral.'
- source_word: כְּכֹל אֲשֶׁר עָשְׂתָה עֲשׂוּ לָהּ
  english_pob_choice: according to all that she has done, do to her
  chosen_spanish: conforme a todo lo que ella ha hecho, hacedle
  alternatives_spanish:
  - según todo lo que ha hecho, hacedle
  - como ella ha hecho, hacedle
  - según todo lo que hizo, hacedle
  lexicon: HALOT
  rationale: La repetición hebrea intensifica la ley de retribución. 'Conforme a todo lo que ella ha hecho' mantiene esa estructura sin suavizarla.
- source_word: זָדָה
  english_pob_choice: has acted arrogantly
  chosen_spanish: ha actuado con arrogancia
  alternatives_spanish:
  - ha sido arrogante
  - ha actuado presuntuosamente
  - ha obrado con insolencia
  lexicon: HALOT
  rationale: El verbo expresa soberbia presuntuosa con matiz de desafío. 'Ha actuado con arrogancia' comunica conducta y actitud en español actual.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: La pauta del proyecto para el Tetragrámaton es 'Yahvé' en el texto principal. Dado que el hebreo trae explícitamente el nombre divino, se evita la sustitución por un título.
- source_word: קְדוֹשׁ יִשְׂרָאֵל
  english_pob_choice: the Holy One of Israel
  chosen_spanish: el Santo de Israel
  alternatives_spanish:
  - el Santo de Israel
  - el Santo de Israel
  lexicon: HALOT
  rationale: Es un título profético fijo. 'El Santo de Israel' es la forma española establecida y más transparente para el lector.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El versículo usa el Tetragrámaton directamente. En la norma del proyecto, el español principal debe conservar el nombre divino como 'Yahvé' en vez de ocultarlo tras 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de פְּלֵטָה en contexto de asedio
  english_pob_reading: no escape
  chosen_spanish_reading: no haya escape
  alternative_spanish_readings:
  - no haya sobreviviente
  - no quede un remanente que escape
  rationale: El contexto es una orden de cerco militar. 'No haya escape' preserva la ambigüedad entre escape, fuga y escapatoria sin imponer una interpretación más fuerte de la que exige el término.
  doctrine_reference: Jeremías 50:29 / nota léxica de פְּלֵטָה
- issue: Lenguaje de retribución proporcional
  english_pob_reading: according to her work / according to all that she has done
  chosen_spanish_reading: según su obra / conforme a todo lo que ella ha hecho
  alternative_spanish_readings:
  - según sus obras
  - de acuerdo con lo que hizo
  rationale: La duplicación del paralelismo hebreo sostiene la idea de retribución exacta. El español conserva ambas cláusulas para no diluir la equivalencia judicial.
  doctrine_reference: Principio de retribución en oráculos de juicio
translation_notes:
  revision_awareness: Se siguió el audit trail inglés y no se introdujeron cambios sustanciales respecto de la versión revisada más reciente; la única decisión de forma relevante es adaptar el nombre divino a la convención española del proyecto ('Yahvé').
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo de mandato militar con verbos en plural de segunda persona: ''Convocad... acampen... repagadle... hacedle''.'
  - '''Yahvé'' se usa de manera consistente para el Tetragrámaton, conforme a la pauta del proyecto.'
  - '''El Santo de Israel'' preserva el título profético fijo sin expandirlo.'
  - Se conservó la ambigüedad de פְּלֵטָה mediante una nota textual, en lugar de resolverla unilateralmente.
