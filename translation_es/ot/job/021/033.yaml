translation:
  language: es
  text: Los terrones del valle le son dulces[a]; toda la humanidad[b] va tras él[c], y los que van delante de él son innumerables.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los terrones del cauce/wadi»; נחל puede referirse a un valle, barranco o lecho de arroyo.
    reason: lexical_alternative
  - marker: b
    text: O «todas las personas»; literalmente, «todo אָדָם/hombre».
    reason: lexical_alternative
  - marker: c
    text: 'La línea puede evocar una procesión funeraria o el movimiento universal de la humanidad hacia la muerte: incontables personas lo han precedido, y toda la humanidad va tras él.'
    reason: alternative_reading
lexical_decisions:
- source_word: מָתְקוּ
  english_pob_choice: are sweet
  chosen_spanish: le son dulces
  alternatives_spanish:
  - le resultan agradables
  - son dulces para él
  lexicon: HALOT
  rationale: El verbo comunica la idea de dulzura o agrado. «Le son dulces» conserva la metáfora de manera natural en español y mantiene el matiz de reposo agradable asociado con el sepulcro.
- source_word: לּוֹ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - para él
  lexicon: HALOT
  rationale: El dativo pronominal se expresa con naturalidad en español como complemento indirecto, evitando rigidez sin perder la referencia personal.
- source_word: רִגְבֵי
  english_pob_choice: clods
  chosen_spanish: los terrones
  alternatives_spanish:
  - los grumos de tierra
  - los pedazos de tierra
  lexicon: HALOT
  rationale: «Terrones» conserva la concreción terrestre de רֶגֶב y funciona bien en una imagen funeraria. «Clodos» sonaría menos natural en español bíblico contemporáneo.
- source_word: נָחַל
  english_pob_choice: the valley
  chosen_spanish: del valle
  alternatives_spanish:
  - del wadi
  - del cauce
  lexicon: HALOT
  rationale: En este contexto funerario, «valle» es la equivalencia más clara y comprensible. Se mantiene la nota alternativa para no borrar la posibilidad de «wadi/cauce» del hebreo.
- source_word: כָּל אָדָם
  english_pob_choice: all mankind
  chosen_spanish: todo hombre
  alternatives_spanish:
  - toda la humanidad
  - todas las personas
  lexicon: HALOT
  rationale: Aquí se conserva el carácter genérico de אָדָם. «Todo hombre» sigue de cerca la construcción hebrea y permite mantener la tensión entre lo individual y lo colectivo; la nota puede explicar que el sentido abarca a toda la humanidad.
- source_word: יִמְשׁוֹךְ
  english_pob_choice: follows
  chosen_spanish: lo sigue
  alternatives_spanish:
  - va tras él
  - lo arrastra tras de sí
  - lo acompaña
  lexicon: HALOT
  rationale: En combinación con «después de él / tras él», el verbo expresa seguimiento o ir en pos de alguien. «Lo sigue» conserva la imagen de desplazamiento humano sin introducir una paráfrasis interpretativa fuerte.
- source_word: וּלְפָנָיו
  english_pob_choice: before him
  chosen_spanish: los que van delante de él
  alternatives_spanish:
  - antes de él
  - delante de él
  lexicon: HALOT
  rationale: La expresión hebrea es espacial y también puede sugerir precedencia temporal. «Los que van delante de él» preserva la ambigüedad de personas que le preceden, sin resolverla exclusivamente como una coordenada espacial.
- source_word: אֵין מִסְפָּר
  english_pob_choice: are without number
  chosen_spanish: son innumerables
  alternatives_spanish:
  - no tienen número
  - no pueden contarse
  lexicon: HALOT
  rationale: «Son innumerables» reproduce la idiomaticidad de la construcción hebrea de modo fluido y idiomático en español, manteniendo la intensidad cuantitativa.
theological_decisions:
- issue: Imagen de muerte y sepultura del versículo
  english_pob_reading: The verse describes the prosperous wicked man's burial as peaceful/honorable and emphasizes that countless humans both precede and follow him in death.
  chosen_spanish_reading: El versículo describe la sepultura del impío próspero como apacible u honorable, y subraya que innumerables seres humanos lo preceden y lo siguen en la muerte.
  alternative_spanish_readings:
  - El versículo alude a una procesión funeraria concreta.
  - El versículo expresa sólo que toda la humanidad comparte el mismo destino mortal.
  rationale: La redacción española conserva los elementos concretos de la imagen sin forzarla hacia una sola interpretación. Así se preserva la tensión entre procesión funeraria y destino universal de la muerte que el hebreo permite.
  doctrine_reference: Preservar la tensión interpretativa sin resolverla de forma excesiva.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el estado final coincide con la concordancia alta del cotejo cruzado.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general cuando corresponda, pero este versículo no contiene el nombre divino.
  - Se conserva la tensión entre lectura funeraria concreta y alcance universal de muerte, sin convertirla en paráfrasis explicativa dentro del texto principal.
  - «Todo hombre» se usa como equivalente genérico de אָדָם, con aclaración en nota para evitar una lectura restrictivamente masculina.
