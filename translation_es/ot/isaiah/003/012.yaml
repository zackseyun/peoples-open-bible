  yaml_path: translation/ot/isaiah/003/012.yaml
  text: My people—children are their oppressors[a], and women rule over them. My people[b], your guides lead you astray and swallow up the course of your paths.
  footnotes:
  - marker: a
    text: Or, 'your blessers' or 'those who call you blessed'; the Hebrew form can carry that sense, but in context it likely refers to leaders or guides who misdirect the people.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew literally says, 'the way of your paths they have swallowed up,' a vivid metaphor for obliterating the people's proper course.
    reason: lexical_alternative
