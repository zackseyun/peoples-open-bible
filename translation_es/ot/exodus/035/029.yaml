translation:
  language: es
  text: 'Todo hombre o mujer[a] cuyo corazón los movió a traer algo para toda la obra que Yahvé había mandado hacer por medio de Moisés: los hijos de Israel trajeron una ofrenda voluntaria a Yahvé[b][c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuyo corazón los impulsó» o «cuyo corazón los hizo dispuestos». El hebraísmo expresa una disposición interior voluntaria, no mera emoción.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «por la mano de Moisés», un hebraísmo que significa «por medio de Moisés» o «Moisés como mediador».
    reason: lexical_alternative
  - marker: c
    text: O «los israelitas trajeron». Literalmente, «los hijos de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל אִישׁ וְאִשָּׁה
  english_pob_choice: Every man and woman
  chosen_spanish: Todo hombre y mujer
  alternatives_spanish:
  - Toda persona, hombre y mujer
  - Todo hombre o mujer
  lexicon: HALOT
  rationale: Conserva el paralelismo explícito de masculino y femenino del hebreo y el alcance distributivo de כָּל. "Todo hombre y mujer" es natural en español bíblico y mantiene la inclusividad textual sin borrar la forma original.
- source_word: נָדַב לִבָּם אֹתָם
  english_pob_choice: whose heart moved them
  chosen_spanish: cuyo corazón los movió
  alternatives_spanish:
  - cuyo corazón los impulsó
  - cuyo corazón los hizo voluntarios
  - cuyo corazón los animó
  lexicon: HALOT
  rationale: El hebreo expresa un impulso interno de voluntad. "Los movió" reproduce bien la idea de iniciativa interior sin reducirla a una mera emoción ni volverla demasiado explicativa.
- source_word: לְהָבִיא
  english_pob_choice: to bring something
  chosen_spanish: traer algo
  alternatives_spanish:
  - presentar algo
  - llevar algo
  lexicon: HALOT
  rationale: El infinitivo simplemente indica traer; en español, "traer algo" es claro y no añade contenido ajeno. Se mantiene la referencia implícita a la contribución sin especificarla de más.
- source_word: לְכָל הַמְּלָאכָה
  english_pob_choice: for all the work
  chosen_spanish: para toda la obra
  alternatives_spanish:
  - para todo el trabajo
  - para toda la labor
  - para toda la tarea
  lexicon: HALOT
  rationale: Aquí מְלָאכָה apunta al trabajo de construcción del tabernáculo. "Obra" suena natural en español y conserva el sentido colectivo y artesanal del contexto mejor que "trabajo" en este pasaje.
- source_word: אֲשֶׁר צִוָּה יְהוָה לַעֲשׂוֹת בְּיַד מֹשֶׁה
  english_pob_choice: that Yahweh had commanded to be done through Moses
  chosen_spanish: que Yahvé había mandado hacer por medio de Moisés
  alternatives_spanish:
  - que Yahvé había mandado hacer mediante Moisés
  - que Yahvé había mandado realizar por la mano de Moisés
  lexicon: HALOT
  rationale: '"Por medio de Moisés" expresa con claridad el hebraísmo בְּיַד מֹשֶׁה como mediación/agencia. Se preserva el matiz de mandato divino y ejecución mediada sin calco incómodo.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: Se sigue el criterio del proyecto para el Tetragrama, usando "Yahvé" en el texto principal en vez de una sustitución litúrgica como "SEÑOR". Esto conserva el nombre propio del pacto.
- source_word: הֵבִיאוּ בְנֵי יִשְׂרָאֵל
  english_pob_choice: the children of Israel brought
  chosen_spanish: los hijos de Israel trajeron
  alternatives_spanish:
  - los israelitas trajeron
  - los hijos de Israel llevaron
  lexicon: HALOT
  rationale: '"Hijos de Israel" es la correspondencia más literal y tradicional del hebreo, y mantiene el valor étnico del giro. "Trajeron" corresponde al verbo del hebreo y al contexto de ofrenda.'
- source_word: נְדָבָה
  english_pob_choice: a freewill offering
  chosen_spanish: una ofrenda voluntaria
  alternatives_spanish:
  - una ofrenda libremente dada
  - una ofrenda de voluntad espontánea
  - una ofrenda voluntaria
  lexicon: HALOT
  rationale: '"Ofrenda voluntaria" comunica bien la ausencia de compulsión en el acto. Se evita "freewill offering" en calco inglés, y se conserva el sentido cultual de una contribución libre.'
theological_decisions:
- issue: Nombre divino en el texto principal
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - el Señor
  rationale: El versículo contiene explícitamente יְהוָה. Conforme al criterio del proyecto, se mantiene el nombre divino en transliteración española y no se lo reemplaza por una sustitución tradicional, preservando la transparencia textual.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Expresión idiomática בְּיַד מֹשֶׁה
  english_pob_reading: through Moses
  chosen_spanish_reading: por medio de Moisés
  alternative_spanish_readings:
  - mediante Moisés
  - por la mano de Moisés
  rationale: La expresión hebrea indica mediación. En español, "por medio de" comunica con fidelidad la agencia mediada sin perder naturalidad ni introducir una imagen innecesariamente literal.
  doctrine_reference: HALOT / idiom of agency and mediation
translation_notes:
  revision_awareness: Se tomó en cuenta la auditoría en inglés, incluida la decisión estable de leer יְהוָה como Yahweh/Yahvé, la mediación de בְּיַד מֹשֶׁה y la equivalencia de נְדָבָה como ofrenda voluntaria. No se requirieron cambios de revisión respecto del sentido básico; la traducción española mantiene esas elecciones con formulación natural.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente para יְהוָה.
  - Se conserva el paralelismo hombre/mujer del hebreo.
  - '''Ofrenda voluntaria'' sigue el valor cultual de נְדָבָה.'
  - '''Por medio de Moisés'' evita el calco demasiado literal de ''por la mano de Moisés''.'
  - '''Hijos de Israel'' preserva el etnónimo literal del hebreo.'
