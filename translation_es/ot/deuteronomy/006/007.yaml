revisions:
- from: Las enseñarás diligentemente a tus hijos[a], y hablarás de ellas cuando te sientes en tu casa, cuando andes por el camino, cuando te acuestes y cuando te levantes.
  to: Las inculcarás diligentemente[a] a tus hijos[b], y hablarás de ellas cuando te sientes en tu casa, cuando andes por el camino, cuando te acuestes y cuando te levantes.
  rationale: 'La revisión corrige una formulación española poco natural en el verbo principal y restituye las dos notas significativas del rastro de auditoría inglés: la metáfora léxica de שׁנן y la extensión doméstica de ''tus hijos''. El resto del versículo puede mantenerse tal como está por ser fiel y claro.'
  reviewer_model: gpt-5.4
