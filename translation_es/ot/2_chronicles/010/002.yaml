revisions:
- from: Y sucedió que, cuando Jeroboam hijo de Nabat oyó[a], y estaba en Egipto, donde había huido de delante del rey Salomón[b], Jeroboam volvió de Egipto.
  to: Y cuando Jeroboam hijo de Nabat oyó[a] (pues él estaba en Egipto, adonde había huido de delante del rey Salomón[b]), Jeroboam volvió de Egipto.
  rationale: Se ajusta la cláusula inicial a un español más natural y acorde con la decisión auditada («Y cuando... oyó»), se convierte «él estaba en Egipto» en inciso parentético explicativo con «pues», y se mejora la fluidez de la relativa con «adonde había huido». Se conserva la alternativa literal importante de מִפְּנֵי en nota. No hay cambio de sentido, solo reparación de estilo y sintaxis.
