review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del hebreo y del POB inglés: fuego encendido en la ira de Dios, alcance hasta Seol, devastación de la tierra y de lo que produce, y combustión de los cimientos de los montes. Mantiene correctamente ''Seol'' y no importa ''infierno''. Sin embargo, hay un problema léxico importante en ''su produce'', que no es español natural ni digno; además, la nota al pie está mal anclada, porque [a] aparece sobre ''ira'' aunque la alternativa documentada corresponde a ''Seol''.'
  spanish_quality_summary: La redacción es generalmente clara y solemne, pero 'su produce' suena como calco del inglés y debe cambiarse por una opción idiomática como 'su fruto'. El resto fluye bien. También conviene mover la marca de nota al segmento de 'Seol' para reflejar correctamente la variante lexical.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: ''Seol'' preserva שְׁאוֹל; no hay conflictos con Yahvé/Mesías/etc. La decisión ''ira'' para אַף es aceptable. La principal desalineación no es teológica sino de calidad léxica: ''produce'' no es la mejor equivalencia española para יְבוּלָהּ en texto bíblico legible.'
  issues:
  - severity: high
    issue: Uso de 'su produce'
    rationale: Aunque intenta reflejar 'its produce', 'produce' no es idiomático en español general en este contexto bíblico. Resulta un anglicismo/calco y perjudica seriamente la legibilidad. 'Su fruto' o 'su cosecha' preservan mejor el sentido de יבול.
  - severity: medium
    issue: Anclaje incorrecto de la nota [a]
    rationale: La nota explica עַד שְׁאוֹל תַּחְתִּית, no 'mi ira'. El marcador debe aparecer junto a 'Seol' o la frase correspondiente para mantener trazabilidad precisa.
  - severity: low
    issue: Texto de nota mejorable
    rationale: 'La nota actual ofrece una alternativa redundante con el propio texto principal (''hasta las profundidades de Seol''). Conviene conservar alternativas reales: ''hasta el Seol más profundo'' o ''hasta las profundidades del sepulcro'', en línea con el audit trail inglés.'
  revised_spanish_text: Porque un fuego se ha encendido en mi ira, y arde hasta las profundidades de Seol[a]; devora la tierra y su fruto, y abrasa los cimientos de los montes.
  revised_footnotes:
  - marker: a
    text: O 'hasta el Seol más profundo' o 'hasta las profundidades del sepulcro'. El hebreo dice 'hasta Seol, lo más bajo/profundo'.
    reason: lexical_alternative
