    reason: lexical_alternative
  revision_rationale: Se ajusta la cláusula comparativa para reflejar más de cerca la construcción hebrea ‘no había estado sobre ningún rey’, se mejora el modismo público de לְעֵינֵי con ‘ante los ojos de todo Israel’, y se afina la nota léxica para ofrecer alternativas más naturales en español sin perder el sentido fuente.
