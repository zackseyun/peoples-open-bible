translation:
  language: es
  text: Arrojen de sobre ustedes todas sus transgresiones[a] con las cuales han transgredido, y háganse un corazón nuevo y un espíritu nuevo. ¿Por qué habrían de morir, casa de Israel?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todas sus rebeliones… con las cuales se han rebelado». El hebreo repite la misma raíz en «transgresiones» y «han transgredido», enfatizando la culpabilidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשְׁלִיכוּ
  english_pob_choice: Cast away
  chosen_spanish: ¡Arrojad de sobre vosotros!
  alternatives_spanish:
  - ¡Echad lejos de vosotros!
  - ¡Despojaos de vosotros!
  lexicon: HALOT
  rationale: El imperativo pide una acción fuerte de quitar o desechar. «Arrojad» conserva la fuerza del mandato y encaja con el valor de desechar; la frase preposicional «de sobre vosotros» representa el matiz literal de מֵעֲלֵיכֶם sin sonar artificial en español.
- source_word: מֵעֲלֵיכֶם
  english_pob_choice: from yourselves
  chosen_spanish: de sobre vosotros
  alternatives_spanish:
  - de vosotros
  - de encima de vosotros
  lexicon: HALOT
  rationale: Literalmente es «de sobre vosotros». «De sobre vosotros» mantiene la imagen de algo que está cargando sobre la persona; en español es entendible y fiel, aunque ligeramente más marcada que una paráfrasis como «de vosotros».
- source_word: פִּשְׁעֵיכֶם
  english_pob_choice: your transgressions
  chosen_spanish: vuestros pecados
  alternatives_spanish:
  - vuestras transgresiones
  - vuestras rebeliones
  lexicon: HALOT
  rationale: פֶּשַׁע suele abarcar transgresión o rebelión contra autoridad legítima. En español, «pecados» es más natural para lectura pública, pero la nota conserva la opción más técnica del campo semántico. Se mantiene el vínculo con el verbo siguiente mediante la repetición del mismo término verbal «pecado/pecado» no siendo posible en español sin forzar el texto.
- source_word: אֲשֶׁר פְּשַׁעְתֶּם בָּם
  english_pob_choice: by which you have transgressed
  chosen_spanish: con los que habéis pecado
  alternatives_spanish:
  - con los que os habéis rebelado
  - en los que habéis transgredido
  lexicon: HALOT
  rationale: La cláusula repite la raíz verbal para subrayar culpabilidad. «Con los que habéis pecado» suena natural en español y conserva la relación entre objeto y acción; «transgredido» preservaría más el registro técnico, pero resulta menos idiomático. La nota reconoce la repetición cognada que el español no puede reproducir exactamente.
- source_word: וַעֲשׂוּ לָכֶם
  english_pob_choice: make for yourselves
  chosen_spanish: haceos
  alternatives_spanish:
  - haced para vosotros
  - procurad para vosotros
  lexicon: HALOT
  rationale: עָשָׂה con לָכֶם indica producir o conseguir para sí. «Haceos» condensa bien el imperativo reflexivo y evita una construcción pesada; mantiene la idea de procurar una disposición interior nueva.
- source_word: לֵב חָדָשׁ
  english_pob_choice: a new heart
  chosen_spanish: un corazón nuevo
  alternatives_spanish:
  - un nuevo corazón
  - un corazón renovado
  lexicon: HALOT
  rationale: Se conserva el sustantivo «corazón» por su peso antropológico y teológico en Ezequiel. «Un corazón nuevo» refleja directamente el hebreo y sigue siendo claro en español bíblico contemporáneo.
- source_word: וְר֣וּחַ חֲדָשָׁ֑ה
  english_pob_choice: and a new spirit
  chosen_spanish: y un espíritu nuevo
  alternatives_spanish:
  - y un nuevo espíritu
  - y un aliento nuevo
  lexicon: HALOT
  rationale: רוּחַ se entiende aquí como «espíritu», no como viento. Se mantiene la pareja «corazón / espíritu» para preservar la terminología profética de Ezequiel.
- source_word: וְלָמָּה
  english_pob_choice: Why should
  chosen_spanish: ¿Por qué habríais de
  alternatives_spanish:
  - ¿Por qué moriréis?
  - ¿Por qué vais a
  lexicon: HALOT
  rationale: La pregunta es exhortativa y retórica, no meramente predictiva. «¿Por qué habríais de…?» reproduce mejor la fuerza de apelación que un simple futuro, y suena natural en español formal.
- source_word: תָמֻתוּ
  english_pob_choice: you die
  chosen_spanish: morir
  alternatives_spanish:
  - moriríais
  - perecer
  lexicon: HALOT
  rationale: מָוֶת se traduce de manera directa por «morir». En la pregunta retórica, el infinitivo en español («habríais de morir») evita una forma menos natural y conserva el sentido básico sin añadir interpretaciones.
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: O house of Israel
  chosen_spanish: casa de Israel
  alternatives_spanish:
  - oh casa de Israel
  - pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la vocación profética directa sin necesidad de «oh», que en español moderno puede sonar innecesariamente arcaizante. «Casa de Israel» es el giro bíblico estándar y fiel al vocativo.
theological_decisions:
- issue: Tensión entre el mandato humano de obtener un corazón/espíritu nuevos y la acción divina de renovación en Ezequiel
  english_pob_reading: Retain the imperative 'make for yourselves a new heart and a new spirit' without softening or harmonizing with later passages where God gives a new heart/spirit.
  chosen_spanish_reading: 'Mantener el imperativo fuerte: «haceos un corazón nuevo y un espíritu nuevo».'
  alternative_spanish_readings:
  - «Procurad para vosotros un corazón nuevo y un espíritu nuevo»
  - «Pedid a Dios un corazón nuevo y un espíritu nuevo»
  rationale: El versículo presenta responsabilidad humana real. La traducción no resuelve la tensión teológica con Ezequiel 36; la deja visible, como lo hace el texto hebreo y el POB inglés. «Haceos» conserva la exigencia ética sin convertirla en una petición implícita.
  doctrine_reference: Translation philosophy §3
- issue: Repetición cognada de פשע en sustantivo y verbo
  english_pob_reading: Use 'transgressions' and 'have transgressed' to preserve the lexical repetition.
  chosen_spanish_reading: Usar «pecados» y «habéis pecado», con nota sobre la repetición de la misma raíz hebrea.
  alternative_spanish_readings:
  - «transgresiones» y «habéis transgredido»
  - «rebeliones» y «os habéis rebelado»
  rationale: Aunque «transgresiones/transgredido» preserva mejor el paralelismo técnico, «pecados/habéis pecado» ofrece mayor claridad para una lectura pública en español. La nota aclara que el hebreo repite la misma raíz, de modo que no se oculta la carga retórica del original.
  doctrine_reference: Translation philosophy §5
translation_notes:
  revision_awareness: El texto inglés auditado pasó de «Throw away» a «Cast away» por registro más formal, sin cambio de sentido. En español se siguió esa intención de registro elevado con «Arrojad de sobre vosotros», manteniendo el tono exhortativo y la imagen de desechar algo que pesa sobre el pueblo.
  spanish_consistency_notes:
  - Se conserva «casa de Israel» como vocativo bíblico estable.
  - Se usa «espíritu» en sentido interior, no meteorológico.
  - Se evita «SEÑOR» para el nombre divino porque este versículo no contiene el Tetragrámaton.
  - La nota del pie de página recoge la alternativa semántica de פשע para no perder la tensión lexical del hebreo.
