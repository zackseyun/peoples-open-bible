id: PHP.3.9
reference: Philippians 3:9
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ εὑρεθῶ ἐν αὐτῷ, μὴ ἔχων ἐμὴν δικαιοσύνην τὴν ἐκ νόμου ἀλλὰ τὴν διὰ πίστεως Χριστοῦ, τὴν ἐκ θεοῦ δικαιοσύνην ἐπὶ τῇ πίστει,
base_translation:
  language: en
  yaml_path: translation/nt/philippians/003/009.yaml
  text: and be found in him[a], not having my own righteousness from the law[b], but that which is through faith in Messiah—the righteousness from God based on faith.
  footnotes:
  - marker: a
    text: Or, 'through the faithfulness of the Messiah.'
    reason: alternative_reading
  - marker: b
    text: Or, 'justice' (for both occurrences of 'righteousness').
    reason: lexical_alternative
translation:
  language: ko
  text: 또한 그분 안에서 발견되기를 바랍니다. 율법에서 난 나 자신의 의가 아니라, 메시아를 믿음으로 말미암는 의[a], 곧 믿음을 근거로 하나님께로부터 오는 의[b]를 가지고 말입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「메시아의 신실함으로 말미암는 의」. 헬라어 πίστεως Χριστοῦ는 목적격 속격(메시아를 향한 믿음)으로도, 주격 속격(메시아의 신실함)으로도 읽힐 수 있다. 본문은 「믿음으로」 독법을 따르고 대안은 각주에 둔다.
    reason: alternative_reading
  - marker: b
    text: 또는 두 곳의 「의」를 「정의」로도 옮길 수 있다.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὑρεθῶ
  english_pob_choice: be found
  chosen_korean: 발견되기를 바랍니다
  alternatives_korean:
  - 발견되기를
  - 그분 안에 있는 자로 인정받기를
  lexicon: BDAG
  rationale: 수동 아오리스트 가정법으로, 앞 절의 「얻고자(ἵνα)」에 이어지는 목적의 연속. 한국어 「~기를 바랍니다」로 목적·소망의 어조를 살린다.
- source_word: ἐν αὐτῷ
  english_pob_choice: in him
  chosen_korean: 그분 안에서
  alternatives_korean:
  - 그와 연합하여
  - 그 안에서
  lexicon: BDAG
  rationale: 바울의 「그리스도와의 연합」 정형 표현. 풀어쓰지 않고 「그분 안에서」로 보존한다.
- source_word: μὴ ἔχων
  english_pob_choice: not having
  chosen_korean: ~가 아니라
  alternatives_korean:
  - 가지지 않은 채
  - 갖지 않고
  lexicon: BDAG
  rationale: 분사가 발견되는 양상을 한정한다. 「~가 아니라 ~를 가지고」 대비 구조로 자연스럽게 옮긴다.
- source_word: δικαιοσύνην
  english_pob_choice: righteousness
  chosen_korean: 의
  alternatives_korean:
  - 정의
  lexicon: BDAG
  rationale: 글로사리 기본형 「의」. 바울의 구원론적 문맥에서는 「의」가 표준이다.
- source_word: τὴν ἐκ νόμου
  english_pob_choice: from the law
  chosen_korean: 율법에서 난
  alternatives_korean:
  - 율법으로부터
  - 율법에서 비롯된
  lexicon: BDAG
  rationale: ἐκ가 기원·출처를 가리킨다. 한국어 관형절 「~에서 난」이 가장 자연스럽고 한국 성서 전통과도 일치한다.
- source_word: διὰ πίστεως Χριστοῦ
  english_pob_choice: through faith in Messiah
  chosen_korean: 메시아를 믿음으로 말미암는
  alternatives_korean:
  - 메시아에 대한 믿음을 통한
  - 메시아의 신실함으로 말미암는
  - 메시아 안에서의 믿음으로
  lexicon: BDAG
  rationale: 논쟁적 pistis Christou 구문. 본 번역은 영어 POB와 동일하게 목적격 속격(믿음의 대상이 메시아) 독법을 본문으로, 주격 속격(메시아의 신실함) 독법을 각주로 둔다. 「~을 믿음으로 말미암는」은 한국 성서 전통의 정착된 어법이다.
- source_word: Χριστοῦ
  english_pob_choice: Messiah
  chosen_korean: 메시아
  alternatives_korean:
  - 그리스도
  lexicon: BDAG
  rationale: 본 신학적 대조에서 메시아 칭호의 의미가 살아 있다.
- source_word: τὴν ἐκ θεοῦ δικαιοσύνην
  english_pob_choice: the righteousness from God
  chosen_korean: 하나님께로부터 오는 의
  alternatives_korean:
  - 하나님으로부터 난 의
  - 하나님에게서 비롯된 의
  lexicon: BDAG
  rationale: 반복된 관사와 명사가 앞 구절을 재진술하며 정의한다. 「하나님께로부터 오는」이 한국어로 자연스럽고 출처의 ἐκ를 보존한다.
- source_word: ἐπὶ τῇ πίστει
  english_pob_choice: based on faith
  chosen_korean: 믿음을 근거로
  alternatives_korean:
  - 믿음 위에
  - 믿음에 기초하여
  lexicon: BDAG
  rationale: ἐπί + 여격이 근거를 가리킨다. 「믿음을 근거로」가 간결하고 한국어 자연성에 부합한다.
theological_decisions:
- issue: πίστεως Χριστοῦ의 속격 해석
  chosen_reading: 메시아를 믿음으로 말미암는(objective genitive)
  alternative_readings:
  - 메시아의 신실함으로 말미암는(subjective genitive)
  rationale: 본 구문은 진정으로 논쟁적이다. 신학적 긴장을 과도하게 해소하지 않기 위해 본 번역의 기본 정책(πίστις→「믿음」)에 따라 본문은 「믿음」 독법을, 「메시아의 신실함」 독법은 각주에 둔다.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension; contested terms table for πίστις and Χριστός.'
- issue: 바울 문맥에서 δικαιοσύνη의 번역
  chosen_reading: 의
  alternative_readings:
  - 정의
  rationale: 구원론적 바울 문맥에서 글로사리 기본형 「의」를 유지한다. 「정의」는 사회적·법적 함의가 강하므로 각주에 둔다.
  doctrine_reference: 'DOCTRINE.md: contested terms table for δικαιοσύνη.'
