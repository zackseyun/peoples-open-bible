base_translation:
  language: en
  yaml_path: translation/ot/isaiah/027/009.yaml
  text: 'Therefore by this the iniquity of Jacob will be atoned for[a], and this will be the full fruit of the removal of his sin: when he makes all the stones of the altar like crushed chalkstones[c][b], the Asherah poles and incense altars will not stand.'
  footnotes:
  - marker: a
    text: 'Or ''this is all the fruit: the removal of his sin.'' The Hebrew syntax may be read more compactly, with ''fruit'' meaning ''result.'''
    reason: lexical_alternative
  - marker: b
    text: '''Chalkstones'' may also be rendered ''limestone'' or ''lime stones''; the image is of altar stones smashed into friable pieces.'
    reason: lexical_alternative
  - marker: c
    text: Or 'sun pillars' for 'incense altars'; the Hebrew term likely refers to a cultic object associated with idolatrous worship, possibly solar worship.
    reason: alternative_reading
