translation:
  language: es
  text: 'Moisés los envió para reconocer la tierra de Canaán[a], y les dijo: «Suban por aquí, al Neguev[b], y suban a la región montañosa[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «espionar la tierra de Canaán».
    reason: lexical_alternative
  - marker: b
    text: Hebreo «el Neguev», la región árida del sur.
    reason: cultural_note
  - marker: c
    text: O «las montañas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: HALOT
  rationale: El valor narrativo de שׁלח en este contexto es el de enviar a una misión. «Envió» es natural y fiel en español, sin cargar el verbo con matices más fuertes que el hebreo no exige.
- source_word: לָתוּר
  english_pob_choice: to scout out
  chosen_spanish: reconocer
  alternatives_spanish:
  - explorar
  - espiar
  lexicon: HALOT
  rationale: לָתוּר expresa una inspección o reconocimiento del territorio. «Reconocer» comunica bien la idea de examinar la tierra; se evita «espiar» por su matiz clandestino, aunque sigue siendo una alternativa posible según el contexto.
- source_word: אֶרֶץ כְּנָעַן
  english_pob_choice: the land of Canaan
  chosen_spanish: la tierra de Canaán
  alternatives_spanish:
  - el país de Canaán
  - la tierra de los cananeos
  lexicon: HALOT
  rationale: La construcción hebrea nombra directamente el territorio. «La tierra de Canaán» preserva la referencia geográfica con claridad y sin añadir interpretación.
- source_word: עֲלוּ
  english_pob_choice: Go up
  chosen_spanish: Suban
  alternatives_spanish:
  - Subid
  - Ascendan
  lexicon: HALOT
  rationale: Aunque el hebreo usa el verbo «subir», en español el mandato resulta más natural como simple imperativo «Suban», que conserva la dirección ascendente implícita en el contexto topográfico.
- source_word: זֶה
  english_pob_choice: this way
  chosen_spanish: por aquí
  alternatives_spanish:
  - por este camino
  - así
  lexicon: HALOT
  rationale: El demostrativo tiene fuerza adverbial en la orden. «Por aquí» reproduce bien la orientación concreta de ruta sin forzar una literalidad extraña en español.
- source_word: בַּנֶּגֶב
  english_pob_choice: the Negev
  chosen_spanish: por el Neguev
  alternatives_spanish:
  - en el Neguev
  - hacia el Neguev
  - por el Néguev
  lexicon: HALOT
  rationale: Se conserva el topónimo tradicional transliterado «Neguev» para mantener la referencia geográfica específica. La preposición «por» encaja con la ruta indicada por el mandato de avanzar por esa zona.
- source_word: וַעֲלִיתֶם
  english_pob_choice: and go up
  chosen_spanish: y suban
  alternatives_spanish:
  - y asciendan
  - y subirán
  lexicon: HALOT
  rationale: 'Aunque formalmente continúa la cadena verbal hebrea, en español funciona mejor como coordinación imperativa: «y suban». Así se mantiene el tono exhortativo de la instrucción.'
- source_word: הָהָר
  english_pob_choice: the hill country
  chosen_spanish: la región montañosa
  alternatives_spanish:
  - la sierra
  - el monte
  - la zona montañosa
  lexicon: HALOT
  rationale: En este contexto no se trata de una montaña aislada, sino de la zona alta del terreno. «La región montañosa» transmite el valor colectivo/topográfico del hebreo con claridad.
translation_notes:
  revision_awareness: El texto inglés auditado pasó de «through the Negev» a «into the Negev» para ajustarse mejor al sentido direccional del hebreo. La traducción española sigue esa corrección con «por el Neguev», evitando una lectura de tránsito genérico que debilite la indicación de ruta. También mantiene la equivalencia funcional de «scout out» con «reconocer», y de «hill country» con «región montañosa», sin perder la precisión geográfica.
  spanish_consistency_notes:
  - Se conserva «Moisés» como forma estable del nombre propio.
  - Se usa «Neguev» como transliteración española consistente del topónimo hebreo.
  - Se evita «espía/espionar» en el texto principal por su matiz más fuerte; queda como alternativa en nota.
  - «Región montañosa» mantiene el sentido topográfico de הָהָר sin suponer una sola montaña.
  - La puntuación y el uso de comillas siguen el registro bíblico en español moderno.
