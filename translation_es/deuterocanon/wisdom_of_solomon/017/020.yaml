translation:
  language: es
  text: Pues todo el mundo estaba iluminado con luz resplandeciente y estaba ocupado en obras sin impedimento;[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "estaba dedicado a actividades sin impedimento". La frase griega "estaba ocupado en obras sin impedimento" probablemente se refiere al curso normal de la actividad que continuaba en todas partes fuera de la plaga de oscuridad.'
