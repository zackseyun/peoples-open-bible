translation:
  language: es
  text: Mis días son como una sombra que se alarga[a], y yo me marchito como la hierba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «una sombra extendida» o «una sombra que se estira». El hebreo probablemente evoca la sombra vespertina que se alarga, imagen de declive y fugacidad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָמַי
  english_pob_choice: My days
  chosen_spanish: Mis días
  alternatives_spanish:
  - Mi vida
  - Mi existencia
  lexicon: HALOT
  rationale: El hebreo usa el plural con sufijo de primera persona, por lo que «Mis días» conserva la imagen idiomática y la referencia al transcurso de la vida mejor que una paráfrasis como «mi vida».
- source_word: כְּצֵל
  english_pob_choice: like a ... shadow
  chosen_spanish: como una sombra
  alternatives_spanish:
  - como sombra
  - cual sombra
  lexicon: HALOT
  rationale: El prefijo comparativo pide un equivalente con «como». «Sombra» mantiene el símil poético de transitoriedad sin añadir interpretación ajena al texto.
- source_word: נָטוּי
  english_pob_choice: lengthening
  chosen_spanish: que se alarga
  alternatives_spanish:
  - extendida
  - estirada
  - que se extiende
  lexicon: HALOT
  rationale: El participio verbal comunica una sombra que va creciendo hacia el atardecer. «Que se alarga» expresa de modo natural en español la idea de extensión progresiva y conserva el matiz metafórico de declive.
- source_word: וַאֲנִי
  english_pob_choice: and I
  chosen_spanish: y yo
  alternatives_spanish:
  - pero yo
  - mas yo
  lexicon: HALOT
  rationale: Se mantiene la conjunción simple sin intensificarla a contraste adversativo. El contraste con la sombra se desprende del paralelismo poético.
- source_word: כָּעֵשֶׂב
  english_pob_choice: like grass
  chosen_spanish: como la hierba
  alternatives_spanish:
  - como el pasto
  - como la vegetación
  lexicon: HALOT
  rationale: «Hierba» reproduce bien el campo semántico de עֵשֶׂב en poesía bíblica y resulta natural para lectores bíblicos en español. «Pasto» puede sonar más regional y menos amplio.
- source_word: אִיבָשׁ
  english_pob_choice: I wither away
  chosen_spanish: me seco
  alternatives_spanish:
  - me marchito
  - me estoy secando
  - me agoto
  lexicon: HALOT
  rationale: El verbo expresa el secarse o marchitarse. «Me seco» conserva la fuerza verbal directa y armoniza con la imagen de la hierba que pierde su vitalidad.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés concuerdan en una lectura poética de declive y transitoriedad. La redacción española sigue de cerca esa imagen sin introducir una paráfrasis explicativa en el cuerpo del versículo, y conserva la alternativa léxica principal en nota.
  spanish_consistency_notes:
  - Se mantiene el tratamiento poético en primera persona singular con paralelismo entre «mis días» y «yo».
  - «Sombra» y «hierba» son términos concretos y bíblicamente reconocibles en español, equivalentes al campo semántico del hebreo sin endurecer el estilo.
  - No se añadió mayúscula a «hierba» ni se introdujo capitalización devocional artificial; el verso queda en registro bíblico sobrio y publicable.
