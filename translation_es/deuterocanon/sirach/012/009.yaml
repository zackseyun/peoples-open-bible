translation:
  language: es
  text: En la prosperidad de un hombre, aun su enemigo se muestra amistoso[a]; pero en su adversidad, aun su amigo se aparta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «aun un enemigo se hace amigo». El hebreo usa רֵעַ en la primera línea, término que puede significar «amigo» o «compañero»; el texto principal traduce con más cautela «se muestra amistoso» para conservar la ironía del proverbio sin afirmar una reconciliación plena.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּטוֹבַת / ἐν ἀγαθοῖς
  english_pob_choice: in ... prosperity
  chosen_spanish: en la prosperidad
  alternatives_spanish:
  - en la buena fortuna
  - en los buenos tiempos
  - en el bienestar
  lexicon: HALOT / LXX ἀγαθά
  rationale: La idea es la de una condición favorable o exitosa de la persona, en contraste con la adversidad del segundo miembro. «Prosperidad» conserva el valor proverbial y el contraste social sin volverlo excesivamente abstracto.
- source_word: אִישׁ / ἀνδρός
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: HALOT / LXX ἀνδρός
  rationale: El hebreo y el griego usan masculino singular representativo. «Un hombre» preserva esa forma proverbial y la correspondencia auditada con el original.
- source_word: שׂוֹנֵא / οἱ ἐχθροὶ αὐτοῦ
  english_pob_choice: an enemy
  chosen_spanish: su enemigo
  alternatives_spanish:
  - un enemigo
  - sus enemigos
  lexicon: HALOT / LXX ἐχθροί
  rationale: El sentido relacional en contexto es de hostilidad; por eso «enemigo» es más natural que una glosa literal como «el que odia». El singular del español mantiene el carácter proverbial del dicho, aunque el griego tenga plural genérico.
- source_word: רֵעַ
  english_pob_choice: is friendly
  chosen_spanish: es amistoso
  alternatives_spanish:
  - se muestra amigo
  - se hace amigo
  - es amigo
  lexicon: HALOT
  rationale: El hebreo permite una relación de amistad/compañerismo, pero el POB inglés evitó afirmar una reconciliación real. «Es amistoso» conserva la cautela, la ironía del proverbio y evita sobretraducir como «se hace amigo».
- source_word: וּבְרָעָתוֹ / ἐν τοῖς κακοῖς αὐτοῦ / ἐν λύπῃ
  english_pob_choice: in his adversity
  chosen_spanish: en su adversidad
  alternatives_spanish:
  - en su desgracia
  - en su infortunio
  - en sus males
  lexicon: HALOT / LXX κακά, λύπη
  rationale: Aquí el contraste es con la prosperidad, y el término apunta a circunstancias desfavorables, no a mal moral. «Adversidad» recoge bien ese valor y mantiene el paralelo con la primera línea.
- source_word: בּוֹדֵד / διαχωρισθήσεται
  english_pob_choice: keeps apart
  chosen_spanish: se aparta
  alternatives_spanish:
  - se mantiene distante
  - se separa
  - se retira
  lexicon: HALOT / LXX διαχωρισθήσεται
  rationale: El hebreo expresa quedar solo/aislado, y el griego refuerza la separación. «Se aparta» es idiomático en español y conserva la idea de retiro relacional sin cargarlo con un matiz más fuerte de abandono absoluto.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el estado revisado final del expediente inglés (sin cambios necesarios) y conserva la misma cautela interpretativa en רֵעַ: no fuerza una reconciliación real, sino una actitud amistosa en la primera línea. También armoniza el paralelismo con el segundo miembro, donde la separación del amigo en la adversidad queda explícita.'
  spanish_consistency_notes:
  - Se mantuvo el paralelismo proverbial con dos miembros contrastivos, usando léxico natural en español y evitando calcos rígidos.
  - Se prefirió «adversidad» como término puente entre el hebreo רָעָה y el griego κακά / λύπη.
  - Se conservó la ambigüedad relevante de רֵעַ mediante nota, en línea con el cuidado del POB inglés.
  - No se introdujo lenguaje doctrinal ni se añadió contenido ausente del texto fuente.
