    text: O “al Nilo”; el hebreo dice más literalmente “al agua”.
    reason: lexical_alternative
  revision_rationale: Se elimina la nota errónea sobre 'Moisés'; se corrige 'para que me sirva' a 'para que me sirvan' para reflejar el plural hebreo y la decisión auditada en inglés; se ajusta 'hacia el agua' a 'al agua' por mayor precisión; y se añade la nota léxica sobre la posible referencia al Nilo, preservando la evidencia y el audit trail del POB.
