translation:
  language: es
  text: Él me libró de mi poderoso enemigo[a], y de quienes me odiaban[b], porque eran más poderosos que yo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Él me rescata», si se lee el imperfecto poético con valor de presente.'
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo dice «mi enemigo» en singular; la frase siguiente pasa al plural: «quienes me odiaban».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַצִּילֵנִי
  english_pob_choice: He delivered me
  chosen_spanish: Él me libró
  alternatives_spanish:
  - Él me rescata
  - Él me salvó
  lexicon: HALOT
  rationale: נצל en hifil expresa librar/rescatar. En español, «libró» reproduce bien el sentido de liberación ya cumplida en el marco narrativo del salmo, sin perder la posibilidad aspectual del imperfecto hebreo.
- source_word: מֵאֹיְבִי
  english_pob_choice: from my enemy
  chosen_spanish: de mi enemigo
  alternatives_spanish:
  - de mis enemigos
  lexicon: HALOT
  rationale: El hebreo es singular con sufijo de primera persona singular. Se conserva el singular en español para reflejar la forma y el énfasis del texto fuente.
- source_word: עָז
  english_pob_choice: strong
  chosen_spanish: fuerte
  alternatives_spanish:
  - poderoso
  - mighty
  - fiero
  lexicon: HALOT
  rationale: El adjetivo significa «fuerte, poderoso». «Fuerte» es natural en español y mantiene la cualidad de fortaleza del enemigo sin cargar el verso con una expresión más interpretativa.
- source_word: וּמִשֹּׂנְאַי
  english_pob_choice: and from those who hated me
  chosen_spanish: y de los que me odiaban
  alternatives_spanish:
  - y de mis odiadores
  - y de los que me eran hostiles
  lexicon: HALOT
  rationale: El participio con sufijo se vuelve de forma natural una relativa en español. «Los que me odiaban» conserva la idea de hostilidad continua y evita una forma nominal menos idiomática.
- source_word: אָמְצוּ
  english_pob_choice: were too mighty
  chosen_spanish: eran más poderosos
  alternatives_spanish:
  - eran muy fuertes
  - prevalecían
  lexicon: HALOT
  rationale: אָמַץ significa ser fuerte/poderoso. En combinación con מִמֶּנִּי, la comparación está implícita; por eso «más poderosos» expresa la superioridad respecto de «yo» sin añadir una interpretación ajena.
- source_word: מִמֶּנִּי
  english_pob_choice: for me
  chosen_spanish: que yo
  alternatives_spanish:
  - que para mí
  - más que yo
  lexicon: HALOT
  rationale: Con expresiones de fuerza, מן puede marcar comparación. En español, la construcción más natural es «más poderosos que yo», que comunica con claridad la relación comparativa del hebreo.
theological_decisions:
- issue: Tiempo/aspecto del verbo inicial en poesía hebrea
  english_pob_reading: 'Past-time narration: ''He delivered me'''
  chosen_spanish_reading: 'Pasado narrativo: «Él me libró»'
  alternative_spanish_readings:
  - 'Presente poético: «Él me rescata»'
  rationale: El contexto del salmo recuerda actos concretos de rescate de Yahvé. El pasado narrativo mantiene ese encadenamiento testimonial sin imponer una lectura gnómica.
  doctrine_reference: Translation philosophy §1, §6
- issue: Relación entre singular y plural en 'enemy' / 'those who hated me'
  english_pob_reading: Hebrew 'my enemy' is singular; the following phrase is plural, 'those who hated me.'
  chosen_spanish_reading: Se conserva el singular en «mi enemigo» y luego el plural en «los que me odiaban».
  alternative_spanish_readings:
  - 'Nivelar ambos en plural: «mis enemigos»'
  rationale: Mantener la oscilación singular/plural respeta el relieve retórico del hebreo y no borra la tensión documentada por el texto y el audit trail.
  doctrine_reference: Translation philosophy §2, §4
translation_notes:
  revision_awareness: 'Se revisó el texto siguiendo el audit trail inglés y no se detectaron cambios posteriores: la lectura global permanece estable y en alto acuerdo con la revisión cruzada.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino explícito.
  - Se prefirió «libró» por el valor de rescate ya consumado en el flujo del salmo, en línea con el pasado narrativo del POB inglés.
  - Se preservó la alternancia singular/plural del hebreo en el vocabulario de los adversarios.
  - «Más poderosos que yo» expresa la comparación implícita de מִמֶּנִּי de forma idiomática en español.
