translation:
  language: es
  text: Dame la sabiduría que se sienta junto a tus tronos[a], y no me rechaces de entre tus hijos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la sabiduría que está sentada junto a tus tronos». El griego dice «tus tronos» en plural.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «de entre tus siervos», porque el griego puede significar «hijos» o «siervos» según el contexto.'
    reason: alternative_reading
lexical_decisions:
- source_word: δός
  english_pob_choice: Give
  chosen_spanish: Dame
  alternatives_spanish:
  - Concédeme
  - Otórgame
  lexicon: LSJ
  rationale: El imperativo aoristo de δίδωμι pide una equivalencia directa y natural en español. 'Dame' conserva la petición urgente de la oración sin volverla más solemne de lo que exige el griego.
- source_word: πάρεδρον
  english_pob_choice: that sits beside
  chosen_spanish: que se sienta junto a
  alternatives_spanish:
  - sentada junto a
  - que está sentada junto a
  - asistente junto a
  lexicon: LSJ
  rationale: El término sugiere estar sentado al lado, en relación con el trono. 'Que se sienta junto a' mantiene la imagen espacial y la personificación de la Sabiduría sin imponer una interpretación técnica como 'asistente'.
- source_word: σοφίαν
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - Sabiduría
  lexicon: LSJ
  rationale: '''Sabiduría'' reproduce el sustantivo común y, a la vez, permite la personificación presente en el libro. No se capitaliza porque el griego no obliga a una forma nominalizada distinta y el contexto ya sugiere la personificación.'
- source_word: τῶν σῶν θρόνων
  english_pob_choice: your throne
  chosen_spanish: tu trono
  alternatives_spanish:
  - tus tronos
  - tu trono(s)
  lexicon: LSJ
  rationale: Aunque el griego conserva el plural, la revisión inglesa consideró natural la lectura singular en contexto. En español, 'tu trono' es la forma más natural y digna; la pluralidad se documenta en nota para no borrar la huella textual.
- source_word: ἀποδοκιμάσῃς
  english_pob_choice: reject
  chosen_spanish: rechaces
  alternatives_spanish:
  - desprecies
  - deseches
  - descalifiques
  lexicon: LSJ
  rationale: '''Rechazar'' es el valor central del verbo en este contexto de petición ante Dios. ''Rechaces'' conserva el sentido sin añadir el matiz técnico de ''descalificar'' ni la fuerza emocional de ''desechar''.'
- source_word: ἐκ παίδων σου
  english_pob_choice: from among your children
  chosen_spanish: de entre tus hijos
  alternatives_spanish:
  - de entre tus siervos
  - de entre tus servidores
  - de entre tus niños
  lexicon: LSJ
  rationale: παῖδες puede significar 'hijos' o 'siervos'; aquí el paralelismo de una oración filial favorece 'hijos'. 'De entre' reproduce bien ἐκ y evita reducir indebidamente el matiz relacional.
theological_decisions:
- issue: Sentido de παῖδες en relación con Dios
  english_pob_reading: children
  chosen_spanish_reading: hijos
  alternative_spanish_readings:
  - siervos
  - servidores
  rationale: La lectura 'hijos' preserva la relación filial implícita en la plegaria y sigue la decisión auditada de la POB inglesa. 'Siervos' es posible léxicamente, pero en este pasaje desplazaría el énfasis teológico hacia la servidumbre y no hacia la pertenencia familiar.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: La POB inglesa revisó 'your thrones' a 'your throne' por naturalidad y por la lectura más probable en contexto. En español se adoptó 'tu trono' como texto principal, pero se conservó en nota la alternativa plural del griego para no ocultar esa tensión textual.
  spanish_consistency_notes:
  - Se mantuvo 'sabiduría' en minúscula, siguiendo el valor léxico y la personificación contextual sin imponer una capitalización devocional no requerida.
  - Se tradujo el movimiento ἐκ con 'de entre' para reflejar la separación implícita sin sonar forzado.
  - Se evitó 'Cristo', 'SEÑOR' u otras sustituciones no presentes en el fuente, conforme al criterio de traducción directa desde el griego.
