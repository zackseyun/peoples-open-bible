translation:
  language: es
  text: Así, la rectitud[a] conduce a la vida, pero el que persigue el mal, a su propia muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Así, la rectitud es para la vida»; también puede entenderse: «En verdad, la rectitud conduce a la vida». El primer colon hebreo no expresa verbo, por lo que la traducción debe suplir la relación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֵּן
  english_pob_choice: So
  chosen_spanish: Así
  alternatives_spanish:
  - Entonces
  - De este modo
  - Así pues
  lexicon: HALOT
  rationale: כֵּן funciona aquí como adverbio inferencial o enfático. «Así» conserva la fuerza proverbial y suena natural en español sin añadir una relación causal más fuerte de la que el hebreo expresa.
- source_word: צְדָקָה
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia recta
  - righteousness
  lexicon: HALOT
  rationale: En este contexto sapiencial, צְדָקָה puede abarcar justicia/rectitud moral. Se elige «justicia» porque en español comunica bien la orientación correcta de vida que se contrapone a «el mal», aunque «rectitud» también sería posible. Se evita forzar un sentido exclusivamente jurídico que el paralelismo no exige.
- source_word: לְחַיִּים
  english_pob_choice: leads to life
  chosen_spanish: conduce a la vida
  alternatives_spanish:
  - es para la vida
  - resulta en vida
  - lleva a la vida
  lexicon: HALOT
  rationale: La preposición ל con «vida» expresa resultado o meta. Como el hebreo es nominal/verbless, en español se necesita suplir una relación verbal; «conduce a la vida» mantiene claridad y la fuerza resultativa.
- source_word: וּמְרַדֵּף
  english_pob_choice: but he who pursues
  chosen_spanish: pero el que persigue
  alternatives_spanish:
  - y el que persigue
  - pero quien persigue
  - pero el que va tras
  lexicon: HALOT
  rationale: El participio funciona sustantivamente como «el que persigue». Se conserva el contraste adversativo con «pero» y el valor habitual o continuo del participio.
- source_word: רָעָה
  english_pob_choice: evil
  chosen_spanish: el mal
  alternatives_spanish:
  - maldad
  - maldad moral
  - mal
  lexicon: HALOT
  rationale: En la oposición con justicia y vida, רָעָה designa el mal en sentido ético. «El mal» es natural en español y conserva la amplitud moral del término sin introducir un matiz más específico de lo que el hebreo exige.
- source_word: לְמוֹתוֹ
  english_pob_choice: to his own death
  chosen_spanish: a su propia muerte
  alternatives_spanish:
  - para su muerte
  - hasta su muerte
  - hacia su propia muerte
  lexicon: HALOT
  rationale: La frase indica resultado/destino y el sufijo posesivo 3ms. «A su propia muerte» refleja ese destino personal; «propia» ayuda a hacer visible que el desenlace recae sobre el mismo que persigue el mal.
theological_decisions:
- issue: Sentido de צְדָקָה en contexto sapiencial
  english_pob_reading: righteousness as moral uprightness leading to life
  chosen_spanish_reading: justicia como rectitud moral que conduce a la vida
  alternative_spanish_readings:
  - justicia social que conduce a la vida
  - rectitud que lleva a la vida
  rationale: El paralelismo antitético con «el mal» favorece una lectura ética general más que una categoría exclusivamente forense o social. «Justicia» mantiene la amplitud del término, y la nota lexical aclara que aquí se entiende como rectitud moral que resulta en vida.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1, §5'
- issue: Verbo implícito en el primer colon hebreo
  english_pob_reading: The Hebrew first clause is verbless, so English must supply the sense.
  chosen_spanish_reading: El español también debe suplir una relación verbal sin convertirla en una afirmación más fuerte de lo que dice el hebreo.
  alternative_spanish_readings:
  - La justicia es para la vida
  - La justicia resulta en vida
  rationale: Se opta por «conduce a» para expresar la relación resultativa de forma idiomática, pero se reconoce que el hebreo no tiene verbo explícito. La formulación evita convertir la sentencia en una definición rígida; conserva el carácter proverbial y abreviado del original.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1, §3'
translation_notes:
  revision_awareness: 'La versión inglesa auditada quedó sin cambios en la última revisión. El único punto sensible para el español es cómo suplir el hebreo nominal del primer colon: se decidió por una solución idiomática («conduce a la vida») sin ocultar en nota la alternativa literal («es para la vida»).'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se eligió «justicia» para צְדָקָה, coherente con el campo semántico moral de la poesía sapiencial; se evita «rectitud» en el texto principal porque puede sonar más abstracto en español, aunque se reconoce como alternativa válida.
  - «El mal» conserva la amplitud ética de רָעָה sin restringirlo a calamidad o daño circunstancial.
  - La puntuación reproduce la antítesis del hebreo con coma y «pero», de modo natural en español.
