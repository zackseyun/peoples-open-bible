base_translation:
  language: en
  yaml_path: translation/ot/2_kings/002/024.yaml
  text: He turned around and saw them[a], and he cursed them in the name of Yahweh[c][b]. Then two she-bears came out of the forest and tore apart forty-two of the boys.
  footnotes:
  - marker: a
    text: Or more literally, 'tore' or 'split open.' The Hebrew verb is stronger and more graphic than the English 'mauled,' but 'mauled' best fits natural English for a bear attack.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew says 'boys' or 'children' (יְלָדִים), a broad term that can refer to young people and does not by itself specify very small children.
    reason: lexical_alternative
  - marker: c
    text: Or 'He turned behind him'.
    reason: previous_rendering
