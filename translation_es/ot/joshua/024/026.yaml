translation:
  language: es
  text: Y Josué escribió estas palabras en el libro de la ley de Dios, y tomó una piedra grande y la puso en pie allí, debajo del roble[a] que estaba en el santuario de Yahvé[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “debajo del terebinto”. El término hebreo puede referirse a un terebinto más que a un roble.
    reason: lexical_alternative
  - marker: b
    text: O “que estaba junto al santuario de Yahvé”. La preposición hebrea puede entenderse de manera más amplia según el contexto.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּכְתֹּב
  english_pob_choice: wrote
  chosen_spanish: escribió
  alternatives_spanish:
  - anotó
  - registró
  lexicon: HALOT
  rationale: כתב significa de manera directa ‘escribir’; ‘escribió’ preserva el sentido documental del texto y suena natural en español bíblico contemporáneo.
- source_word: הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: these words
  chosen_spanish: estas palabras
  alternatives_spanish:
  - estas cosas
  - estos asuntos
  lexicon: HALOT
  rationale: דברים puede significar ‘palabras’, ‘cosas’ o ‘asuntos’. Aquí, por tratarse de palabras inscritas en un libro, ‘palabras’ conserva mejor el carácter textual del pasaje.
- source_word: בְּסֵפֶר תּוֹרַת אֱלֹהִים
  english_pob_choice: in the Book of the Law of God
  chosen_spanish: en el libro de la ley de Dios
  alternatives_spanish:
  - en el libro de la instrucción de Dios
  - en el rollo de la ley de Dios
  lexicon: HALOT
  rationale: ספר se traduce naturalmente ‘libro’ en español bíblico; תורת aquí mantiene ‘ley’ por su fuerza pactual y normativa en este contexto. ‘Ley de Dios’ reproduce bien la construcción genitiva sin oscurecerla.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: Aquí אֱלֹהִים funciona como referencia simple al Dios de Israel; ‘Dios’ es la equivalencia natural y más transparente.
- source_word: וַיִּקַּח אֶבֶן גְּדוֹלָה
  english_pob_choice: he took a large stone
  chosen_spanish: tomó una piedra grande
  alternatives_spanish:
  - tomó una piedra de gran tamaño
  - tomó una gran piedra
  lexicon: HALOT
  rationale: אבן es ‘piedra’; גדולה puede ser ‘grande’ o ‘de gran tamaño’. ‘Piedra grande’ mantiene la sencillez y el tamaño físico sin forzar un giro más literario.
- source_word: וַיְקִימֶהָ
  english_pob_choice: set it up
  chosen_spanish: la levantó
  alternatives_spanish:
  - la erigió
  - la colocó en pie
  lexicon: HALOT
  rationale: El causativo de קום indica poner la piedra en posición vertical. ‘La levantó’ comunica el acto de erigirla de forma natural; aunque ‘la erigió’ es posible, suena más técnico.
- source_word: תַּחַת הָאַלָּה
  english_pob_choice: under the oak
  chosen_spanish: debajo del roble
  alternatives_spanish:
  - debajo del terebinto
  lexicon: HALOT
  rationale: אַלָּה puede designar un árbol identificado de manera aproximada como roble o terebinto. Se conserva ‘roble’ en el texto principal por fluidez, dejando la alternativa botánica en nota.
- source_word: בְּמִקְדַּשׁ יְהוָה
  english_pob_choice: in the sanctuary of Yahweh
  chosen_spanish: en el santuario de Yahvé
  alternatives_spanish:
  - junto al santuario de Yahvé
  - en el lugar santo de Yahvé
  lexicon: HALOT
  rationale: מקדש significa ‘santuario’ o ‘lugar sagrado’. Se mantiene ‘en’ para reflejar la preposición ב de forma directa, como hace el texto hebreo según la lectura principal del POB.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del Tetragrámaton como ‘Yahvé’, de acuerdo con la terminología del proyecto y para no sustituirlo por un título.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el nombre propio de Dios, no un título. ‘Yahvé’ preserva esa referencia personal y pactual, en consonancia con la política terminológica del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
- issue: Relación espacial entre el árbol y el santuario
  english_pob_reading: the oak that was in the sanctuary of Yahweh
  chosen_spanish_reading: el roble que estaba en el santuario de Yahvé
  alternative_spanish_readings:
  - el roble que estaba junto al santuario de Yahvé
  - el roble que estaba en el recinto del santuario de Yahvé
  rationale: La preposición hebrea ב se entiende de manera directa como ‘en’; por eso la traducción principal sigue la relación espacial más inmediata, aunque el contexto permite una lectura más laxa. La nota conserva esa alternativa.
  doctrine_reference: Principio de transparencia textual y manejo de ambigüedades espaciales del hebreo
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado del POB inglés: no se registraron cambios posteriores y el dictamen de revisión fue de alta concordancia. La redacción española sigue esa lectura estable, manteniendo las dos ambigüedades documentadas: תּוֹרַת como ‘ley’ e אַלָּה como ‘roble’ con alternativa botánica, además de la relación espacial de בְּמִקְדַּשׁ como ‘en’ con nota de lectura más laxa.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de forma consistente para יְהוָה.
  - Se mantiene el registro bíblico moderno y digno, sin arcaísmos innecesarios.
  - Las notas conservan las alternativas documentadas por el POB inglés sin añadir especulación nueva.
  - ‘Piedra grande’ y ‘la levantó’ buscan naturalidad en español sin perder el valor memorial/erígico del hebreo.
