translation:
  language: es
  text: Y llevó a Jehoiaquín a Babilonia, junto con la madre del rey[a], las esposas del rey, sus oficiales[b] y los poderosos de la tierra[c]; los llevó al exilio desde Jerusalén a Babilonia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''la madre del rey''; también podría expresarse como ''la reina madre'', pero aquí se conserva la formulación familiar del texto.'
    reason: lexical_alternative
  - marker: b
    text: O 'sus eunucos'; el término hebreo puede referirse específicamente a eunucos o, de manera más general, a oficiales de la corte.
    reason: lexical_alternative
  - marker: c
    text: O 'los hombres poderosos de la tierra' o 'los nobles de la tierra'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֶּגֶל
  english_pob_choice: carried ... away / took them into exile
  chosen_spanish: llevó ... a Babilonia / los llevó en exilio
  alternatives_spanish:
  - deportó
  - trasladó ... al exilio
  - se llevó ... al destierro
  lexicon: HALOT
  rationale: El verbo causativo de גלה expresa remoción forzada al exilio. En español, 'llevó' conserva el movimiento concreto y 'en exilio' mantiene el valor de destierro sin perder la escena narrativa.
- source_word: בָּבֶלָה
  english_pob_choice: to Babylon
  chosen_spanish: a Babilonia
  alternatives_spanish:
  - hacia Babilonia
  - para Babilonia
  lexicon: HALOT
  rationale: La terminación direccional indica movimiento hacia Babilonia; 'a Babilonia' es el giro natural y fiel en español.
- source_word: אֵם הַמֶּלֶךְ
  english_pob_choice: the king’s mother
  chosen_spanish: la madre del rey
  alternatives_spanish:
  - la reina madre
  lexicon: HALOT
  rationale: Se mantiene la formulación familiar y transparente del hebreo. 'Reina madre' introduce un título no explícito en el texto base.
- source_word: נְשֵׁי הַמֶּלֶךְ
  english_pob_choice: the king’s wives
  chosen_spanish: las esposas del rey
  alternatives_spanish:
  - las mujeres del rey
  - sus esposas
  lexicon: HALOT
  rationale: El constructo plural refiere a las mujeres pertenecientes al rey. 'Esposas del rey' reproduce bien la relación posesiva y evita ambigüedad.
- source_word: סָרִיסָיו
  english_pob_choice: his officials
  chosen_spanish: sus oficiales
  alternatives_spanish:
  - sus eunucos
  - sus funcionarios
  - sus cortesanos
  lexicon: HALOT
  rationale: El término puede significar eunucos o funcionarios de corte. Siguiendo el criterio de la POB inglesa revisada, 'oficiales' preserva la referencia administrativa sin forzar la lectura física de eunucos.
- source_word: אולי הָאָרֶץ
  english_pob_choice: the mighty men of the land
  chosen_spanish: los guerreros poderosos
  alternatives_spanish:
  - los poderosos de la tierra
  - los nobles de la tierra
  - los hombres valerosos de la tierra
  lexicon: HALOT
  rationale: La expresión apunta a personas prominentes o fuertes del país. 'Guerreros poderosos' conserva el matiz de fuerza/élite militar que la POB inglesa finalmente privilegió, sin exceder lo que el hebreo permite.
- source_word: הוֹלִיךְ גּוֹלָה
  english_pob_choice: he took them into exile
  chosen_spanish: los llevó en exilio
  alternatives_spanish:
  - los llevó al destierro
  - los condujo al exilio
  - los deportó
  lexicon: HALOT
  rationale: La construcción expresa causar que otros vayan como exiliados. 'En exilio' mantiene el sustantivo temático y el movimiento forzado; aunque menos idiomático que 'al exilio', conserva mejor la relación con גּוֹלָה.
- source_word: מִירוּשָׁלִַם בָּבֶלָה
  english_pob_choice: from Jerusalem to Babylon
  chosen_spanish: desde Jerusalén a Babilonia
  alternatives_spanish:
  - de Jerusalén a Babilonia
  - fuera de Jerusalén hacia Babilonia
  lexicon: HALOT
  rationale: El par origen-destino se expresa con claridad en español mediante 'desde... a...'. Mantiene el contraste geográfico y narrativo del texto.
theological_decisions:
- issue: סָרִיסָיו puede referirse a eunucos o a oficiales de corte
  english_pob_reading: his officials
  chosen_spanish_reading: sus oficiales
  alternative_spanish_readings:
  - sus eunucos
  - sus funcionarios de corte
  rationale: La POB inglesa opta por una lectura funcional más que anatómica. En español, 'oficiales' conserva esa prudencia y evita imponer una identificación que el contexto no obliga a fijar.
  doctrine_reference: N/A
- issue: אולי הָאָרֶץ describe una élite del país con posible tono militar o nobiliario
  english_pob_reading: the mighty men of the land
  chosen_spanish_reading: los guerreros poderosos
  alternative_spanish_readings:
  - los poderosos de la tierra
  - los nobles de la tierra
  rationale: La frase admite varias matizaciones legítimas. Se preserva el peso social y la fuerza del grupo sin convertirlo en un título técnico que el hebreo no especifica.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La POB inglesa revisó recientemente 'court officials' a 'officials' y 'leading men of the land' a 'mighty men of the land'. La versión española sigue esa revisión, manteniendo 'oficiales' y una expresión que refleje fuerza/prominencia ('guerreros poderosos') sin perder la apertura semántica del hebreo.
  spanish_consistency_notes:
  - Se usa 'Babilonia' como destino direccional, no como nombre sin preposición, para reflejar el movimiento del hebreo.
  - Se mantiene 'madre del rey' en vez de 'reina madre' por transparencia lexical.
  - Se evita 'siervos' para סָרִיסָיו porque la POB auditada privilegia una lectura de función oficial.
  - Se conserva un tono narrativo sobrio y bíblico, sin arcaísmos innecesarios.
