    issue: Falta la nota para «espacio abierto»/εὐρύχωρον
    rationale: 'El inglés POB preserva alternativas significativas: «the broad place» / «the square». La revisión española debe conservar esa transparencia léxica con una nota anclada en el texto.'
  - severity: medium
    issue: Falta la nota de referencia cruzada para «cada uno en sus propios lugares»
    rationale: El inglés documenta la relación con el paralelo hebreo de Nehemías, donde Israel está asentado en sus poblaciones. Esa nota respalda la elección española y no debería perderse.
  - severity: low
