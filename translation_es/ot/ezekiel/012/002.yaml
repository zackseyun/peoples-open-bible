translation:
  language: es
  text: Hijo de hombre[a], tú habitas en medio de una casa rebelde, que tiene ojos para ver, pero no ven; y oídos para oír, pero no oyen[b], porque son una casa rebelde.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'un pueblo rebelde' o 'una casa de rebelión'. El hebreo 'casa' es un término corporativo para el pueblo en su conjunto.
    reason: lexical_alternative
  - marker: b
    text: Lit. 'ojos para ellos para ver, y no ven; oídos para ellos para oír, y no oyen'.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  english_pob_choice: Son of man
  chosen_spanish: Hijo de hombre
  alternatives_spanish:
  - Hombre mortal
  - Ser humano
  lexicon: HALOT
  rationale: Mantiene la forma vocativa fija del hebreo y la resonancia profética de Ezekiel. En español, 'Hijo de hombre' conserva mejor la huella del original que una paráfrasis como 'ser humano'.
- source_word: בְּתוֹךְ
  english_pob_choice: in the midst of
  chosen_spanish: en medio de
  alternatives_spanish:
  - entre
  - dentro de
  lexicon: HALOT
  rationale: Expresa con naturalidad la idea de estar situado dentro de un grupo. 'En medio de' comunica la imagen sin forzar el español.
- source_word: בֵּית הַמֶּרִי / בֵּית מְרִי
  english_pob_choice: a rebellious house
  chosen_spanish: una casa rebelde
  alternatives_spanish:
  - un pueblo rebelde
  - una casa de rebeldía
  - una casa de rebelión
  lexicon: HALOT
  rationale: Se conserva 'casa' como metáfora corporativa para el pueblo, tal como lo hace la POB inglesa. 'Casa rebelde' suena natural en español y retiene la tensión metafórica del hebreo.
- source_word: יֹשֵׁב
  english_pob_choice: dwell
  chosen_spanish: habitas
  alternatives_spanish:
  - vives
  - resides
  lexicon: HALOT
  rationale: El participio en este contexto describe la permanencia de Ezequiel entre el pueblo. 'Habitas' mantiene el tono profético y es más solemne que 'vives'.
- source_word: עֵינַיִם לָהֶם לִרְאוֹת וְלֹא רָאוּ
  english_pob_choice: have eyes to see but do not see
  chosen_spanish: tiene ojos para ver, pero no ve
  alternatives_spanish:
  - tienen ojos para ver, pero no ven
  - tienen ojos para ver y no ven
  lexicon: HALOT
  rationale: 'En español, el singular relativo ''que tiene'' encaja con ''una casa'' y evita una construcción pesada. El sentido semántico del hebreo se conserva: poseen ojos, pero no ven.'
- source_word: אָזְנַיִם לָהֶם לִשְׁמֹעַ וְלֹא שָׁמֵעוּ
  english_pob_choice: ears to hear but do not hear
  chosen_spanish: oídos para oír, pero no oye
  alternatives_spanish:
  - oídos para oír, pero no oyen
  - oídos para escuchar, pero no escuchan
  lexicon: HALOT
  rationale: Se mantiene el paralelismo semántico con la cláusula anterior y el mismo sujeto corporativo 'casa'. 'Oír' preserva la literalidad del verbo hebreo mejor que 'escuchar'.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce con claridad la causa de su ceguera y sordera espiritual. 'Porque' es el equivalente más natural en español para este uso explicativo.
- source_word: הֵם
  english_pob_choice: they are
  chosen_spanish: son
  alternatives_spanish:
  - son ellos
  - ellos son
  lexicon: HALOT
  rationale: El pronombre independiente hebreo es enfático, pero en español basta el verbo copulativo. 'Son una casa rebelde' conserva el predicado nominal sin añadir énfasis artificial.
theological_decisions:
- issue: Metáfora corporativa de 'casa' aplicada a Israel
  english_pob_reading: Retain 'house' rather than replacing it with 'people' in the main text
  chosen_spanish_reading: Mantener 'casa' en el texto principal
  alternative_spanish_readings:
  - pueblo
  - linaje
  - familia
  rationale: Ezequiel usa repetidamente la metáfora de la 'casa' para el conjunto del pueblo. Traducirla como 'pueblo' suavizaría una imagen que el original quiere reiterar y cargar de significado profético.
  doctrine_reference: Translation philosophy §5 (consistency of key terms)
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo y la decisión auditada de la POB inglesa de conservar la metáfora corporativa de 'house'. No se introdujeron cambios doctrinales ni expansiones interpretativas; las notas preservan la alternativa literal semítica que el español no reproduce de forma idiomática.
  spanish_consistency_notes:
  - Se conserva 'casa' para בֵּית / בַּיִת de manera consistente con la tradición auditada de la POB.
  - Se mantiene el paralelismo retórico 'ojos para ver... oídos para oír...' sin ampliar el alcance semántico de 'ver' o 'oír'.
  - '''Hijo de hombre'' preserva la fórmula vocativa profética sin sustituirla por una paráfrasis antropológica.'
