revisions:
- from: 'Así dice Yahvé de los ejércitos: Pongan su corazón en[a] sus caminos.'
  to: 'Así dice Yahvé de los ejércitos: Pongan su corazón en[a] sus propios caminos.'
  rationale: Se conserva la fidelidad al hebreo y a la revisión inglesa explícita («Set your heart»), pero se mejora la naturalidad del español añadiendo «propios» para aclarar el sentido moral de «caminos». La nota se mantiene como alternativa más literal para reflejar la preposición hebrea.
