translation:
  text: '1[a]. See, then, my children, how much endurance accomplishes, and prayer with fasting.


    2. So you also, if you pursue self-control and purity with endurance, and prayer with fasting, in humility of heart, the Lord will dwell in you, because he loves self-control.


    3[b]. And where the Most High dwells, even if envy should befall someone, or slavery, or slander, the Lord dwelling in him, because of his self-control, not only rescues him from evils, but also exalts and glorifies him, as he did me.


    4. For every person, whether in deed or in word or in thought, comes together.


    5. My brothers knew how my father loved me, yet I was not exalted in my mind; but though I was a child, I had the fear of God in my heart, for I knew that all things will surely pass away.


    6. And I was not puffed up in evil; rather, I honored my brothers, and because of fear of them I kept silent, when I was being sold, so as not to tell the Ishmaelites that I was a son of Jacob[c], a great and mighty man.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'false accusation'; the Greek term can denote malicious or trumped-up charges, fitting Joseph's experience in Egypt.
    reason: lexical_alternative
    anchor_ref: '10:3'
  - marker: b
    text: 'The Greek text here is difficult. The sense is that a person comes to prominence or is manifested in every sphere: deed, word, and thought.'
    reason: textual_variant
    anchor_ref: '10:4'
  - marker: c
    text: Some witnesses differ in this clause, but the sense is that Joseph remained silent about his family identity while being sold.
    reason: textual_variant
    anchor_ref: '10:6'
lexical_decisions:
- source_word: ὑπομονή
  chosen: endurance
  alternatives:
  - steadfastness
  - patient endurance
  lexicon: BDAG
  rationale: In paraenetic context this denotes persevering constancy under trial. 'Endurance' is concise and natural while preserving the moral virtue emphasized by Joseph.
- source_word: προσευχή μετὰ νηστείας
  chosen: prayer with fasting
  alternatives:
  - prayer and fasting
  - prayer accompanied by fasting
  lexicon: BDAG
  rationale: The preposition μετά naturally conveys accompaniment. 'Prayer with fasting' preserves the paired ascetic practice without over-expansion.
- source_word: σωφροσύνη
  chosen: self-control
  alternatives:
  - temperance
  - chastity
  - sobriety
  lexicon: BDAG
  rationale: Joseph's testament centers on sexual restraint and disciplined moral sanity. 'Self-control' best captures the broader virtue while remaining readable; the sexual dimension is reinforced by pairing with 'purity.'
- source_word: ἁγνεία
  chosen: purity
  alternatives:
  - chastity
  - holiness
  lexicon: BDAG
  rationale: In this context the term points especially to sexual and moral purity. 'Purity' is broad enough to preserve the ethical scope without narrowing too quickly to only chastity.
- source_word: ταπείνωσις καρδίας
  chosen: humility of heart
  alternatives:
  - lowliness of heart
  - humble heart
  lexicon: BDAG
  rationale: A semitic-sounding ethical phrase; 'humility of heart' preserves the testamentary register and inward moral focus.
- source_word: κατοικέω
  chosen: dwell
  alternatives:
  - live
  - abide
  lexicon: BDAG
  rationale: Used of the Lord's presence among the righteous. 'Dwell' preserves elevated biblical diction without sounding archaic.
- source_word: ὁ ὕψιστος
  chosen: the Most High
  alternatives:
  - the Highest
  lexicon: BDAG
  rationale: Standard rendering for the divine title in Jewish literature; preserves reverent register.
- source_word: φθόνος
  chosen: envy
  alternatives:
  - jealousy
  lexicon: BDAG
  rationale: Joseph's story is driven by his brothers' envious hostility. 'Envy' best matches the vice motif in this testament.
- source_word: δουλεία
  chosen: slavery
  alternatives:
  - bondage
  - servitude
  lexicon: BDAG
  rationale: The term denotes actual enslavement in Joseph's narrative. Following project philosophy, bonded status should not be softened to 'servitude' where salient.
- source_word: συκοφαντία
  chosen: slander
  alternatives:
  - false accusation
  - malicious accusation
  lexicon: BDAG
  rationale: The context likely alludes to false charges against Joseph. 'Slander' is compact; the nuance of false accusation is preserved in footnote possibility.
- source_word: ῥύεται
  chosen: rescues
  alternatives:
  - delivers
  - saves
  lexicon: BDAG
  rationale: The verb denotes deliverance from danger. 'Rescues' is vivid and accessible, fitting narrative exhortation.
- source_word: ὑψοῖ καὶ δοξάζει
  chosen: exalts and glorifies
  alternatives:
  - raises up and honors
  lexicon: BDAG
  rationale: The pair is rhetorically important and should remain distinct. 'Exalts and glorifies' preserves the elevated register and Joseph's own rise.
- source_word: διανοία
  chosen: mind
  alternatives:
  - thought
  - understanding
  lexicon: BDAG
  rationale: In vv. 4-5 the term concerns inward disposition. 'Mind' is the most natural English equivalent and keeps the contrast with deed and word.
- source_word: φόβος τοῦ θεοῦ
  chosen: the fear of God
  alternatives:
  - reverence for God
  lexicon: BDAG
  rationale: This is a stable biblical ethical phrase. The more literal rendering preserves traditional moral weight and intertextual resonance.
- source_word: ἐπήρθην
  chosen: was puffed up
  alternatives:
  - was arrogant
  - was lifted up
  lexicon: BDAG
  rationale: The verb denotes becoming proud. 'Puffed up' keeps the metaphorical force and matches the warning against inward exaltation.
- source_word: ἐσιώπουν
  chosen: I kept silent
  alternatives:
  - I was silent
  lexicon: BDAG
  rationale: The imperfect suggests sustained restraint. 'I kept silent' conveys deliberate ongoing silence.
