revisions:
- from: Venga venganza de los hijos de Israel sobre los madianitas[a]. Después serás reunido a tu pueblo[b].
  to: Toma venganza de los hijos de Israel contra los madianitas[a]. Después serás reunido a tu pueblo[b].
  rationale: Se reemplaza «Venga venganza» por «Toma venganza» para expresar de forma natural y fiel el imperativo hebreo dirigido a Moisés. Se ajusta «sobre» a «contra» por mejor español con «venganza» y por mantener el sentido de represalia dirigida contra Madián. Se conservan «los hijos de Israel» y «serás reunido a tu pueblo» por fidelidad léxica y teológica al original y al rastro auditado en inglés. Las notas se actualizan para corresponder exactamente al texto revisado.
