    text: The Greek witness here includes the isolated word 'Asalim' (Ἀσαλήμ) after 'Jerusalem.' Because it does not fit the sentence smoothly, it may reflect a textual corruption or stray place-name in this line of transmission.
    reason: textual_variant
  - marker: b
    text: Literally, 'he gave them right hands,' an idiom for giving pledges of peace or good faith.
    reason: lexical_alternative
