  text: כָּל עַבְדֵ֣י הַ/מֶּ֡לֶךְ וְ/עַם מְדִינ֨וֹת הַ/מֶּ֜לֶךְ יֽוֹדְעִ֗ים אֲשֶׁ֣ר כָּל אִ֣ישׁ וְ/אִשָּׁ֡ה אֲשֶׁ֣ר יָבֽוֹא אֶל הַ/מֶּלֶךְ֩ אֶל הֶ/חָצֵ֨ר הַ/פְּנִימִ֜ית אֲשֶׁ֣ר לֹֽא יִקָּרֵ֗א אַחַ֤ת דָּת/וֹ֙ לְ/הָמִ֔ית לְ֠/בַד מֵ/אֲשֶׁ֨ר יֽוֹשִׁיט ל֥/וֹ הַ/מֶּ֛לֶךְ אֶת שַׁרְבִ֥יט הַ/זָּהָ֖ב וְ/חָיָ֑ה וַ/אֲנִ֗י לֹ֤א נִקְרֵ֨אתי֙ לָ/ב֣וֹא אֶל הַ/מֶּ֔לֶךְ זֶ֖ה שְׁלוֹשִׁ֥ים יֽוֹם־־־־־־־־־־׃
