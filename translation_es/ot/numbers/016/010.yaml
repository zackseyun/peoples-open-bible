- from: Él te ha acercado[a], y contigo a todos tus hermanos, los hijos de Leví; y además buscan el sacerdocio.
  to: Él te ha acercado[a], y a todos tus hermanos, los hijos de Leví, contigo; pero ustedes también buscan el sacerdocio.
  rationale: Se corrige la concordancia para reflejar el cambio deliberado del hebreo de singular a plural, se mejora la fuerza adversativa del reproche sin perder el valor aditivo de גַּם, y se ajusta el orden de la frase media para mayor naturalidad y transparencia respecto al original.
