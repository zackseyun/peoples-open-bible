translation:
  language: es
  text: Cuando el rey Joacim[a], todos sus valientes y todos los oficiales oyeron sus palabras, el rey buscó matarlo. Pero cuando Urías oyó, tuvo miedo, huyó y fue a Egipto[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Joacim'' sigue la forma española bíblica usual para יְהוֹיָקִים; en este contexto se refiere al rey de Judá.'
    reason: source_note
  - marker: b
    text: Literalmente, 'vino a Egipto'; en español se vierte naturalmente como 'fue a Egipto'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - escuchó
  - oyó y recibió noticia de
  lexicon: HALOT
  rationale: En narrativa, שׁמע suele significar 'oír' o 'enterarse de'. 'Oyó' mantiene el paralelismo entre las dos ocurrencias del versículo y suena natural en español.
- source_word: גִּבּוֹרָיו
  english_pob_choice: his mighty men
  chosen_spanish: sus valientes
  alternatives_spanish:
  - sus hombres valientes
  - sus guerreros
  - sus poderosos
  lexicon: HALOT
  rationale: גִּבּוֹר puede referirse a hombres de guerra o retén militar. 'Valientes' conserva el valor marcial y es más idiomático en español que una traducción más pesada.
- source_word: הַשָּׂרִים
  english_pob_choice: the officials
  chosen_spanish: los oficiales
  alternatives_spanish:
  - los príncipes
  - los jefes
  - los funcionarios
  lexicon: HALOT
  rationale: En el contexto de la corte real, שׂרים abarca autoridades administrativas o cortesanas. 'Oficiales' es claro y evita sugerir nobleza hereditaria.
- source_word: דְּבָרָיו
  english_pob_choice: his words
  chosen_spanish: sus palabras
  alternatives_spanish:
  - su mensaje
  - lo que había dicho
  lexicon: HALOT
  rationale: '''Sus palabras'' preserva el vínculo léxico con דבר y comunica con claridad el contenido del mensaje profético sin añadir interpretación.'
- source_word: וַיְבַקֵּשׁ ... הֲמִיתוֹ
  english_pob_choice: sought to put him to death
  chosen_spanish: buscó matarlo
  alternatives_spanish:
  - intentó matarlo
  - quiso darle muerte
  lexicon: HALOT
  rationale: בקש + infinitivo expresa intento o propósito. 'Buscó matarlo' conserva esa intención formal sin perder naturalidad en español.
- source_word: וַיִּרָא
  english_pob_choice: he was afraid
  chosen_spanish: tuvo miedo
  alternatives_spanish:
  - temió
  - se asustó
  lexicon: HALOT
  rationale: En español, 'tuvo miedo' expresa bien la reacción de Urías al enterarse del intento del rey. Es un equivalente directo y claro.
- source_word: וַיִּבְרַח
  english_pob_choice: fled
  chosen_spanish: huyó
  alternatives_spanish:
  - escapó
  - salió huyendo
  lexicon: HALOT
  rationale: '''Huyó'' reproduce con concisión el sentido de ברח y la urgencia de la acción narrativa.'
- source_word: מִצְרָיִם
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  alternatives_spanish:
  - a Egipto
  lexicon: HALOT
  rationale: Nombre propio geográfico estándar en español.
- source_word: וַיָּבֹא
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - vino
  - llegó
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'vino', en español la orientación hacia el destino se expresa con naturalidad mediante 'fue'.
translation_notes:
  revision_awareness: 'Se siguió de cerca el tramo final del audit trail en inglés: ''mighty men'' se conservó con un término de fuerza militar cercana (''valientes'') en vez de una frase más interpretativa; también se mantuvo la secuencia narrativa breve y directa. No se incorporaron lecturas textuales alternativas ni tensiones doctrinales especiales en este versículo.'
  spanish_consistency_notes:
  - Se mantiene 'Egipto' como topónimo estándar.
  - Se evita 'SEÑOR' porque el versículo no contiene el Tetragrámaton.
  - La estructura narrativa conserva la contraposición implícita entre la búsqueda de muerte por el rey y la reacción de Urías.
