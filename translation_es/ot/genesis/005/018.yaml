translation:
  language: es
  text: Jared vivió ciento sesenta y dos años y engendró a Enoc.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְחִי
  english_pob_choice: lived
  chosen_spanish: vivió
  alternatives_spanish:
  - vivió
  - estuvo vivo
  lexicon: HALOT
  rationale: En las fórmulas genealógicas, el verbo חיה introduce la edad del patriarca; en español, «vivió» reproduce de forma natural ese uso idiomático sin perder el sentido básico de existencia continuada.
- source_word: יֶרֶד
  english_pob_choice: Jered
  chosen_spanish: Jared
  alternatives_spanish:
  - Yered
  lexicon: convención onomástica bíblica en español
  rationale: El nombre propio se adapta a la forma establecida en español bíblico, «Jared», que corresponde al uso tradicional de la genealogía de Génesis.
- source_word: שְׁתַּיִם וְשִׁשִּׁים ... וּמְאַת שָׁנָה
  english_pob_choice: one hundred sixty-two years
  chosen_spanish: ciento sesenta y dos años
  alternatives_spanish:
  - ciento sesenta y dos años
  - ciento y sesenta y dos años
  lexicon: HALOT
  rationale: La secuencia hebrea suma literalmente «dos y sesenta ... y cien», pero el sentido idiomático en español se expresa con el cardinal compuesto «ciento sesenta y dos». Se mantiene «años» en plural por claridad natural en español.
- source_word: וַיּוֹלֶד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - engendró
  - fue padre de
  - engendró a
  lexicon: HALOT
  rationale: En contextos genealógicos, ילד puede expresar la acción de generar descendencia. «Engendró» conserva la fuerza genealógica del término y es más preciso que «fue padre de» si se quiere mantener el tono formal del registro bíblico.
- source_word: אֶת חֲנוֹךְ
  english_pob_choice: Enoch
  chosen_spanish: a Enoc
  alternatives_spanish:
  - a Enoc
  - Enoc
  lexicon: convención onomástica bíblica en español
  rationale: El marcador de objeto directo אֶת no se traduce, pero en español la construcción verbal requiere la preposición «a» ante la persona objeto del verbo. «Enoc» es la forma estándar del nombre en español.
translation_notes:
  revision_awareness: El texto inglés POB permanece sin cambios respecto al pasaje fuente; no se detectaron revisiones que alteren la decisión de traducción. La versión española sigue la misma lectura genealógica simple y directa.
  spanish_consistency_notes:
  - Se mantiene la convención española «Jared» para el nombre propio, coherente con el uso bíblico establecido en español.
  - Se conserva «engendró» para el valor genealógico de ילד, alineado con un registro bíblico formal y transparente.
  - La numeración se naturaliza a «ciento sesenta y dos años» para evitar una calca incómoda del hebreo sin perder contenido.
