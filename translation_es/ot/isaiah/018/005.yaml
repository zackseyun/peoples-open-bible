translation:
  language: es
  text: Pues, antes de la siega[a], cuando se acaba la floración y la flor se convierte en una uva que madura, él cortará los sarmientos[b] con podaderas, y quitará y arrancará las ramas extendidas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando la floración se completa y la flor se convierte en una uva verde, es decir, inmadura». La imagen hebrea va de la flor al fruto en desarrollo antes de la siega.'
    reason: lexical_alternative
  - marker: b
    text: Los términos hebreos para el crecimiento de la vid aquí son raros y también podrían traducirse como «retoños», «zarcillos» o «ramas colgantes».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación o fundamento de la escena anterior; «Porque» conserva bien el valor explicativo/causal sin sonar forzado en español.
- source_word: לִפְנֵי קָצִיר
  english_pob_choice: before the harvest
  chosen_spanish: antes de la siega
  alternatives_spanish:
  - antes de la cosecha
  - antes de la recolección
  lexicon: HALOT
  rationale: «Siega» mantiene el campo agrícola y el momento previo al corte del fruto; en español bíblico es natural y preciso.
- source_word: כְּתָם פֶּרַח
  english_pob_choice: when the blossom is finished
  chosen_spanish: cuando la flor se ha acabado
  alternatives_spanish:
  - cuando la flor está completa
  - cuando termina la floración
  lexicon: HALOT
  rationale: La idea es que la floración llega a su fin; «se ha acabado» expresa esa culminación temporal de forma clara en español.
- source_word: וּבֹסֶר גֹּמֵל יִהְיֶה נִצָּה
  english_pob_choice: and the flower becomes a ripening grape
  chosen_spanish: y la flor se vuelve una uva en maduración
  alternatives_spanish:
  - y la flor se vuelve una uva verde
  - y el capullo se vuelve una uva que madura
  lexicon: HALOT
  rationale: El hebreo conserva la imagen de transición desde flor a fruto en desarrollo; «uva en maduración» preserva esa progresión sin exigir una identificación botánica demasiado rígida.
- source_word: וְכָרַת
  english_pob_choice: he will cut off
  chosen_spanish: él cortará
  alternatives_spanish:
  - cortará
  - entonces cortará
  lexicon: HALOT
  rationale: El verbo marca la acción de poda; «cortará» es suficiente y natural en español, con el sujeto explícito para claridad.
- source_word: הַזַּלְזַלִּים
  english_pob_choice: the shoots
  chosen_spanish: los sarmientos
  alternatives_spanish:
  - los brotes
  - los vástagos
  - los sarmientos de la vid
  lexicon: HALOT
  rationale: En contexto de vid, «sarmientos» es un término español preciso para los brotes o ramas de la vid y conserva el carácter vitícola del hebreo.
- source_word: בַּמַּזְמֵרוֹת
  english_pob_choice: with pruning knives
  chosen_spanish: con tijeras de podar
  alternatives_spanish:
  - con cuchillos de podar
  - con podaderas
  lexicon: HALOT
  rationale: El instrumento es de poda; «tijeras de podar» comunica bien al lector moderno la función agrícola, aunque el hebreo nombra una herramienta antigua de poda.
- source_word: הַנְּטִישׁוֹת
  english_pob_choice: the spreading branches
  chosen_spanish: los brotes extendidos
  alternatives_spanish:
  - las ramas extendidas
  - los sarmientos extendidos
  - los brotes que se extienden
  lexicon: HALOT
  rationale: El término es raro y parece referirse a crecimiento extendido o colgante; «brotes extendidos» mantiene la imagen sin sobreespecificar la forma exacta.
- source_word: הֵסִיר הֵתַז
  english_pob_choice: he will remove and lop off
  chosen_spanish: quitará y arrancará
  alternatives_spanish:
  - quitará y cortará
  - removerá y arrancará
  - quitará y desgajará
  lexicon: HALOT
  rationale: La pareja verbal intensifica la acción de poda y eliminación; «quitará y arrancará» conserva esa doble fuerza en español sin perder naturalidad.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el rastro auditado en inglés; conserva la progresión imagen–fruto–poda y mantiene las equivalencias léxicas principales con una formulación española natural.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se prefirió «sarmientos» para la vid por su precisión en español, y se mantuvo la ambigüedad del término raro en una nota.
  - Se conservó la secuencia de dos verbos de poda («quitará y arrancará») para reflejar la intensificación del hebreo.
