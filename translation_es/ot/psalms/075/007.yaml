translation:
  language: es
  text: Porque no del oriente ni del occidente, y no del desierto viene el enaltecimiento[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más idiomáticamente, 'la exaltación' o 'la promoción'. La expresión hebrea es elíptica y difícil; el sentido se aclara por el versículo siguiente, donde Dios humilla a uno y levanta a otro.
    reason: lexical_alternative
  - marker: b
    text: También se ha entendido el último término hebreo como 'montañas', lo que daría un sentido como 'y no del desierto de montañas'. El contexto, sin embargo, favorece el sentido de 'enaltecimiento' o 'alzamiento'.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación del enunciado anterior; en español, 'Porque' comunica bien la relación explicativa sin forzar el orden.
- source_word: לֹא
  english_pob_choice: not
  chosen_spanish: 'no'
  alternatives_spanish:
  - nunca
  - ni
  lexicon: HALOT
  rationale: Negación simple y repetida, mantenida con paralelismo en la frase.
- source_word: מִמּוֹצָא
  english_pob_choice: from the east
  chosen_spanish: del oriente
  alternatives_spanish:
  - del lugar de la salida del sol
  - del nacimiento del sol
  lexicon: HALOT
  rationale: El término puede referirse al punto de salida del sol, es decir, el este. 'Oriente' conserva el valor direccional y el tono bíblico sin perder claridad.
- source_word: וּמִמַּעֲרָב
  english_pob_choice: or from the west
  chosen_spanish: ni del occidente
  alternatives_spanish:
  - o del occidente
  - ni del oeste
  lexicon: HALOT
  rationale: En una serie negativa española, 'ni... ni...' expresa con naturalidad la coordinación negada. 'Occidente' mantiene el paralelismo con 'oriente'.
- source_word: מִמִּדְבַּר
  english_pob_choice: from the wilderness
  chosen_spanish: del desierto
  alternatives_spanish:
  - del yermo
  - de la estepa
  lexicon: HALOT
  rationale: '''Desierto'' es la opción más clara en español contemporáneo; en este contexto conserva el alcance de ''wilderness'' sin tecnicismos.'
- source_word: הָרִים
  english_pob_choice: comes lifting up
  chosen_spanish: la elevación
  alternatives_spanish:
  - el levantamiento
  - la exaltación
  - el ascenso
  lexicon: HALOT
  rationale: El hebreo es elíptico y se entiende mejor a la luz del versículo siguiente. 'Elevación' mantiene el sentido de alzamiento sin cerrar prematuramente la ambigüedad; no se traduce como 'montañas' porque el contexto favorece el valor de exaltación/lifting up.
theological_decisions:
- issue: Sentido de la cláusula final con הָרִים
  english_pob_reading: The verse denies that exaltation or lifting up comes from any earthly direction.
  chosen_spanish_reading: El versículo niega que la elevación provenga de alguna dirección terrenal.
  alternative_spanish_readings:
  - 'El versículo podría leerse como una referencia a montañas: ''del desierto de montañas''.'
  - 'La idea puede expresarse más interpretativamente: ''ni del oriente, ni del occidente, ni del desierto viene la promoción''.'
  rationale: El contexto inmediato conduce a entender que el tema es el alzamiento/exaltación, no una topografía literal. El español debe reflejar esa ambigüedad resuelta por el contexto, manteniendo la conexión verbal con el versículo siguiente.
  doctrine_reference: Salmo 75:8; cf. 1 Samuel 2:7-8
translation_notes:
  revision_awareness: He seguido la revisión más reciente del inglés auditado, que conserva una serie negativa coordinada natural ('not from the east or from the west, and not from the wilderness') y mantiene 'lifting up' como lectura preferida de la cláusula final elíptica. En español, esa coordinación se vierte con 'ni... ni...' para lograr paralelismo natural sin perder la estructura del hebreo.
  spanish_consistency_notes:
  - Usé 'oriente/occidente' para un registro bíblico claro y simétrico.
  - Preferí 'desierto' sobre 'yermo' por intelligibilidad, aunque ambos son posibles.
  - '''Elevación'' conserva la referencia al alzamiento y permite vincular el versículo con el siguiente.'
  - Las notas al pie están ancladas exactamente en [a] y [b] dentro del texto, sin marcadores sobrantes.
