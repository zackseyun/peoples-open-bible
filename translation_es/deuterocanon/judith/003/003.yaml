translation:
  language: es
  text: ¡Mira![a] nuestras casas de campo[b], cada campo de trigo, los rebaños, los hatos y todos los corrales[c] de nuestras tiendas están delante de ti; úsalos como te plazca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «He aquí». El griego ἰδοὺ funciona como llamado de atención.
    reason: alternative_reading
  - marker: b
    text: El término ἐπαύλεις puede referirse a propiedades rurales, casas de labor o residencias de campo.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «todos los corrales de nuestras tiendas». La imagen puede aludir a cercados o recintos asociados con el campamento y el ganado.
    reason: cultural_note
lexical_decisions:
- source_word: ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - ¡He aquí!
  - ¡Miren!
  lexicon: BDAG
  rationale: Se traduce como llamado directo de atención, natural y claro en español moderno, sin el tono arcaico de «He aquí». Mantiene la fuerza deíctica del griego.
- source_word: ἐπαύλεις
  english_pob_choice: homesteads
  chosen_spanish: casas de campo
  alternatives_spanish:
  - casas de labor
  - fincas
  - propiedades rurales
  lexicon: LSJ
  rationale: El término alude a residencias o propiedades rurales establecidas; «casas de campo» comunica bien el sentido agrario sin sonar demasiado técnico o forzado en español.
- source_word: πᾶν πεδίον πυρῶν
  english_pob_choice: every field of wheat
  chosen_spanish: todo campo de trigo
  alternatives_spanish:
  - todo campo de trigo sembrado
  - todos los trigales
  - cada campo de trigo
  lexicon: LSJ
  rationale: El griego habla de un campo/plano de trigo. En español, «todo campo de trigo» conserva la referencia agrícola y la generalidad del singular colectivo del original.
- source_word: ποίημνια
  english_pob_choice: flocks
  chosen_spanish: rebaños
  alternatives_spanish:
  - manadas de ovejas
  - greyes
  - hatos
  lexicon: BDAG
  rationale: «Rebaños» es el equivalente natural para grupos de ganado menor y mantiene la pareja semántica con el siguiente término para ganado mayor.
- source_word: βουκόλια
  english_pob_choice: herds
  chosen_spanish: las manadas
  alternatives_spanish:
  - el ganado vacuno
  - las reses
  - los hatos
  lexicon: LSJ
  rationale: El término remite al ganado bovino en conjunto. «Manadas» preserva el valor colectivo y la paralelía con «rebaños», sin especificar más de lo que el griego exige.
- source_word: μάνδραι
  english_pob_choice: enclosures
  chosen_spanish: corrales
  alternatives_spanish:
  - cercados
  - rediles
  - enclosures
  lexicon: LSJ
  rationale: En este contexto, un espacio cercado para animales o pertenencias del campamento se expresa de forma natural como «corrales». Es más concreto y comprensible que un calco literal.
- source_word: τῶν σκηνῶν ἡμῶν
  english_pob_choice: of our tents
  chosen_spanish: de nuestras tiendas
  alternatives_spanish:
  - de nuestros campamentos
  - de nuestras carpas
  lexicon: BDAG
  rationale: «Tiendas» reproduce el sentido literal de σκηναί y conserva la imagen nómada/campamental del pasaje.
- source_word: παράκεινται πρὸ προσώπου σου
  english_pob_choice: lie before you
  chosen_spanish: están delante de ti
  alternatives_spanish:
  - están puestas delante de ti
  - quedan a tu disposición
  lexicon: BDAG
  rationale: La expresión idiomática de estar colocadas ante alguien se expresa con naturalidad como «están delante de ti», manteniendo la idea espacial y de disponibilidad.
- source_word: χρῆσαι
  english_pob_choice: use them
  chosen_spanish: úsalos
  alternatives_spanish:
  - haz uso de ellos
  - tómalos
  lexicon: BDAG
  rationale: En contexto funciona como una invitación a disponer de esos bienes. «Úsalos» es directo y fiel al imperativo de sentido contextual.
- source_word: καθʼ ὃ ἂν ἀρέσκῃ σοι
  english_pob_choice: as it pleases you
  chosen_spanish: como te plazca
  alternatives_spanish:
  - como quieras
  - según te parezca bien
  - como te guste
  lexicon: BDAG
  rationale: La construcción expresa permiso según el agrado del destinatario. «Como te plazca» conserva el matiz deferente y la relación con el verbo de agrado del griego.
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego de Swete (1909) y el auditable POB inglés. Se conserva la enumeración agraria, la imagen de disponibilidad ante el interlocutor y el matiz de permiso final sin añadir contenido interpretativo no presente en el texto.
  spanish_consistency_notes:
  - Se mantiene «tiendas» para σκηναί y no «campamentos», por fidelidad literal a la imagen del texto.
  - Se evita «SEÑOR» o equivalentes de sustitución porque no aparece el tetragrámaton en este versículo.
  - «Rebaños»/«manadas» conservan la distinción entre ovinos/caprinos y bovinos en la medida en que el español lo permite sin sobreespecificar.
