translation:
  language: es
  text: Allí el fuego te devorará; la espada te cortará de raíz; te devorará como la langosta[a]. Hazte numerosa como la langosta; hazte numerosa como la langosta en enjambre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo emplea aquí dos términos afines para insectos: יֶלֶק, que puede referirse a una clase o etapa de langosta, y אַרְבֶּה, el término común para langosta, a menudo con matiz de enjambre. El texto principal los vierte como ''langosta'' y ''langosta en enjambre'' para conservar claridad sin perder la intensificación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁם
  english_pob_choice: There
  chosen_spanish: Allí
  alternatives_spanish:
  - Allí, en ese lugar
  - Ahí
  lexicon: HALOT
  rationale: El adverbio locativo apunta al lugar mismo de juicio; 'Allí' conserva la referencia espacial directa sin expansión innecesaria.
- source_word: תֹּאכְלֵךְ אֵשׁ
  english_pob_choice: the fire will devour you
  chosen_spanish: el fuego te devorará
  alternatives_spanish:
  - el fuego te consumirá
  - el fuego te comerá
  lexicon: HALOT
  rationale: '''Devorará'' conserva la imagen vívida de אָכַל con sujeto ''fuego'' y suena natural en español, manteniendo el matiz destructivo fuerte.'
- source_word: תַּכְרִיתֵךְ חֶרֶב
  english_pob_choice: the sword will cut you off
  chosen_spanish: la espada te cortará
  alternatives_spanish:
  - la espada te destruirá
  - la espada te exterminará
  lexicon: HALOT
  rationale: El hebreo comunica 'cortar/destruir'. En español, 'te cortará' conserva la metáfora de cortar, aunque de forma menos explícita que 'cortará de raíz'; se evita sobreinterpretar con un verbo más técnico que el texto no exige.
- source_word: תֹּאכְלֵךְ
  english_pob_choice: it will devour you
  chosen_spanish: te devorará
  alternatives_spanish:
  - te consumirá
  lexicon: HALOT
  rationale: Se conserva la repetición verbal del hebreo con la misma solución verbal que en la primera cláusula para mantener paralelismo e intensidad.
- source_word: כַּיָּלֶק
  english_pob_choice: like the locust
  chosen_spanish: como la langosta
  alternatives_spanish:
  - como la langosta devoradora
  - como el saltón
  lexicon: HALOT
  rationale: La equivalencia 'langosta' es natural y bíblicamente transparente en español. El matiz específico de יֶלֶק como posible tipo/estado se reserva para la nota, sin cargar el texto principal.
- source_word: הִתְכַּבֵּד
  english_pob_choice: Make yourself many
  chosen_spanish: Hazte muchas
  alternatives_spanish:
  - Multiplícate
  - Hazte numerosa
  lexicon: HALOT
  rationale: El hitpael de כבד expresa hacerse numeroso/pesado. 'Hazte muchas' refleja el plural nocional y el tono irónico del mandato dirigido a Nínive como ciudad femenina; evita una fórmula menos natural como 'multiplícate'.
- source_word: כַּיֶּלֶק
  english_pob_choice: like the locust
  chosen_spanish: como la langosta
  alternatives_spanish:
  - como la langosta joven
  - como el saltón
  lexicon: HALOT
  rationale: Se mantiene el mismo sustantivo en la primera comparación para conservar la repetición retórica y la claridad de lectura.
- source_word: הִתְכַּבְּדִי
  english_pob_choice: Make yourself many
  chosen_spanish: hazte muchas
  alternatives_spanish:
  - multiplícate
  - hazte numerosa
  lexicon: HALOT
  rationale: La forma femenina singular se conserva en el español con el mismo mandato irónico; la minúscula después del punto y coma sigue la puntuación idiomática.
- source_word: כָּאַרְבֶּה
  english_pob_choice: like the swarming locust
  chosen_spanish: como la langosta devoradora
  alternatives_spanish:
  - como la langosta en enjambre
  - como la langosta que se apiña
  lexicon: HALOT
  rationale: En lugar de introducir un participio técnico, 'devoradora' comunica la intensificación de אַרְבֶּה y preserva la diferencia semántica respecto de יֶלֶק, de modo comprensible para el lector español.
translation_notes:
  revision_awareness: 'Seguí la revisión más reciente del audit trail: las dos imperativas finales se expresan como ''Hazte muchas'', no como una paráfrasis más abstracta. Mantuve la progresión de imágenes de destrucción (fuego, espada, devoración) y conservé una diferenciación funcional entre los dos términos hebreos para ''langosta'' mediante la nota, sin sobrecargar el verso principal.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' no porque aparezca en este versículo, sino como principio general del proyecto cuando corresponda.
  - Se prefirió 'langosta' en el cuerpo principal por naturalidad en español; la nota preserva la distinción léxica del hebreo.
  - Se mantuvo un tono formal y bíblico, evitando arcaísmos innecesarios.
