translation:
  language: es
  text: Y Booz comió y bebió[a], y su corazón se alegró, y fue a acostarse al extremo del montón de grano. Entonces ella llegó calladamente, descubrió sus pies[b] y se acostó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "su corazón estaba alegre" o "estaba de buen ánimo". El hebreo expresa un modismo de alegría o bienestar, pero por sí mismo no obliga a pensar en embriaguez.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, "descubrió sus pies". Algunos intérpretes lo toman como un gesto puramente literal; otros ven posibles sugerencias implícitas. El hebreo, sin embargo, permanece contenido y no describe de manera explícita actividad sexual.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאכַל
  english_pob_choice: ate
  chosen_spanish: comió
  alternatives_spanish:
  - había comido
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol pide un pasado simple en español. "Comió" expresa de manera directa la acción sin añadir aspecto que el hebreo no exige aquí.
- source_word: וַיֵּשְׁתְּ
  english_pob_choice: drank
  chosen_spanish: bebió
  alternatives_spanish:
  - había bebido
  lexicon: HALOT
  rationale: Se mantiene el verbo de consumo de bebida en un pasado simple natural en español, sin expandirlo.
- source_word: וַיִּיטַב לִבּוֹ
  english_pob_choice: his heart was merry
  chosen_spanish: su corazón se alegró
  alternatives_spanish:
  - su corazón estaba alegre
  - estaba de buen ánimo
  lexicon: HALOT
  rationale: El hebreo expresa un modismo de bienestar/alegría del corazón. "Se alegró" conserva ese valor idiomático sin obligar a leer embriaguez ni a diluir la imagen interna del texto.
- source_word: וַיָּבֹא לִשְׁכַּב
  english_pob_choice: he went to lie down
  chosen_spanish: fue a acostarse
  alternatives_spanish:
  - fue a recostarse
  - fue a dormir
  lexicon: HALOT
  rationale: '"Acostarse" comunica bien la intención de echarse/recostarse. Se evita "dormir" porque el infinitivo hebreo describe acostarse, no necesariamente dormir.'
- source_word: בִּקְצֵה הָעֲרֵמָה
  english_pob_choice: at the end of the grain heap
  chosen_spanish: al extremo de la parva de grano
  alternatives_spanish:
  - al borde de la parva
  - al final del montón de grano
  lexicon: HALOT
  rationale: '"קצה" es "extremo"; "עֲרֵמָה" es una pila o montón. "Parva de grano" da un español natural de escena agrícola y conserva el referente contextual del grano en la era.'
- source_word: בַלָּט
  english_pob_choice: quietly
  chosen_spanish: en secreto
  alternatives_spanish:
  - calladamente
  - sigilosamente
  lexicon: HALOT
  rationale: El adverbio puede sugerir discreción o sigilo. "En secreto" mantiene la idea de aproximación reservada sin añadir una carga moral que el término por sí solo no exige.
- source_word: וַתְּגַל מַרְגְּלֹתָיו
  english_pob_choice: uncovered his feet
  chosen_spanish: descubrió sus pies
  alternatives_spanish:
  - descubrió la parte de sus pies
  - descubrió sus piernas
  lexicon: HALOT
  rationale: Se conserva la literalidad básica del hebreo, que habla de "pies". En español, "descubrió sus pies" mantiene la frase sin resolver de antemano si hay o no un matiz más allá del gesto literal.
- source_word: וַתִּשְׁכָּב
  english_pob_choice: lay down
  chosen_spanish: y se acostó
  alternatives_spanish:
  - y se recostó
  - y quedó acostada
  lexicon: HALOT
  rationale: El verbo se rinde con una forma simple y sobria. No se sexualiza ni se amplía el sentido; sólo indica que ella se echó junto a él.
theological_decisions:
- issue: Si el versículo debe insinuar actividad sexual entre Rut y Booz
  english_pob_reading: Retain the literal description without making sexual implications explicit in the main text.
  chosen_spanish_reading: Mantener la descripción literal sin explicitar implicaciones sexuales en el texto principal.
  alternative_spanish_readings:
  - Traducir de forma interpretativa para sugerir seducción o contacto sexual
  - Hacer explícita una lectura moralizante del episodio
  rationale: 'El hebreo es deliberadamente sobrio: presenta a Rut acercándose en secreto, descubriendo los pies de Booz y acostándose. Como el versículo no declara actividad sexual, la traducción conserva la ambigüedad textual en vez de resolverla por adelantado.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el pasaje mantiene alto acuerdo entre revisión y control cruzado, así que no se requirieron ajustes respecto del sentido auditado.
  spanish_consistency_notes:
  - Se usa "Booz" como forma española estable del nombre propio.
  - '"Yahvé" no aparece en este versículo.'
  - Se conservó la imagen concreta de "pies" y no se la sustituyó por una explicación interpretativa en el texto principal.
  - '"Parva de grano" busca naturalidad en español sin perder la referencia agrícola del hebreo.'
  - El registro es sobrio y narrativo, acorde con el carácter contenido del pasaje.
