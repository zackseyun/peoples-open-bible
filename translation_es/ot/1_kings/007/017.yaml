  rationale: Se revisó la redacción para mejorar la naturalidad arquitectónica del español ('sobre la parte alta de las columnas') y para reflejar mejor la nota léxica alternativa documentada en el POB inglés. También se ajustó la frase artesanal a 'trabajo de cadenas' por mayor fluidez. Se conserva la distribución explícita de siete para cada capitel. Aunque 'el un capitel' reproduce de cerca 'the one capital', puede sonar algo tenso en español; aun así se mantiene para reflejar el contraste con 'el segundo'.
