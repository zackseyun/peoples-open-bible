translation:
  language: es
  text: Y nosotros no nos apartaremos de ti[a], porque tus juicios hacia nosotros son buenos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no nos mantendremos lejos de ti» o «no nos alejaremos de ti».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «tus juicios hacia nosotros son bondadosos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀφεξόμεθά
  english_pob_choice: will not turn away
  chosen_spanish: no nos apartaremos
  alternatives_spanish:
  - no nos alejaremos
  - no nos mantendremos lejos
  - no nos retiraremos
  lexicon: BDAG
  rationale: El futuro medio expresa mantener(se) alejado de una persona. «Apartarnos» conserva la relación personal y la idea de no retirarse de Dios, con una formulación natural en español.
- source_word: χρηστὰ
  english_pob_choice: good
  chosen_spanish: buenos
  alternatives_spanish:
  - bondadosos
  - benignos
  - amables
  lexicon: BDAG
  rationale: El adjetivo puede significar bueno, bondadoso o benigno. «Buenos» sigue la amplitud semántica del inglés POB y funciona con naturalidad en español, sin cerrar el matiz benevolente.
- source_word: κρίματά
  english_pob_choice: judgments
  chosen_spanish: juicios
  alternatives_spanish:
  - sentencias
  - decretos
  - fallos
  lexicon: BDAG
  rationale: «Juicios» preserva el registro formal y teológico de κρίματα como decisiones o actos judiciales divinos, sin reducirlo a un decreto meramente administrativo.
- source_word: εἰς ἡμᾶς
  english_pob_choice: toward us
  chosen_spanish: hacia nosotros
  alternatives_spanish:
  - para con nosotros
  - sobre nosotros
  - con respecto a nosotros
  lexicon: BDAG
  rationale: La preposición indica dirección o relación. «Hacia nosotros» reproduce bien esa orientación y evita imponer de antemano una lectura solo benéfica o solo punitiva.
theological_decisions:
- issue: La fuerza de κρίματα en relación con Dios y su pueblo
  english_pob_reading: your judgments toward us are good
  chosen_spanish_reading: tus juicios hacia nosotros son buenos
  alternative_spanish_readings:
  - tus juicios hacia nosotros son bondadosos
  - tus sentencias para con nosotros son buenas
  rationale: Se mantiene la tensión entre lenguaje judicial y valoración positiva. «Juicios» conserva el campo legal-teológico, mientras «buenos» refleja la calificación de χρηστά sin suavizarla indebidamente.
  doctrine_reference: Divine justice and benevolence in judgment
translation_notes:
  revision_awareness: 'El borrador sigue la lectura griega de Swete 1909 y concuerda con el audit trail inglés: ἀφεξόμεθά se entiende como no apartarse/alejarse, χρηστά como bueno, y κρίματα como juicios. No se introducen ajustes textuales ni cambios de sentido respecto del consenso alto indicado en la revisión.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque el pasaje no contiene el Tetragrámaton ni una cita explícita de κύριος.
  - «Juicios» mantiene coherencia con el registro judicial del griego plural κρίματα.
  - La colocación de «hacia nosotros» conserva la relación direccional del griego εἰς ἡμᾶς sin forzar una interpretación exclusivamente favorable o adversa.
