revisions:
- from: Como la destrucción de Sodoma, Gomorra y sus ciudades vecinas[a], dice Yahvé, no habitará allí hombre[b], ni morará en ella hijo de hombre.
  to: Como cuando Sodoma y Gomorra y sus ciudades vecinas[a] fueron destruidas, dice Yahvé, no habitará allí hombre, ni vivirá en ella como forastero hijo de hombre[b].
  rationale: Se ajusta la apertura para reflejar mejor la comparación/evento de כְּמַהְפֵּכַת y mejorar la naturalidad del español; se corrige «Sodoma y Gomorra»; y se reemplaza «morará» por «vivirá en ella como forastero» para conservar el matiz de יָגוּר frente a «habitará». Se mantiene «Yahvé» y la literalidad de «hijo de hombre» con su nota explicativa.
