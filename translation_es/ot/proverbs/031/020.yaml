translation:
  language: es
  text: Ella abre su palma[a] al pobre, y extiende sus manos al necesitado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su mano abierta».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּפָּהּ
  english_pob_choice: her palm
  chosen_spanish: su palma
  alternatives_spanish:
  - su mano
  - la palma de su mano
  lexicon: HALOT
  rationale: כַּף suele designar la palma o concavidad de la mano. «Palma» conserva la imagen concreta elegida por el POB en inglés y suena natural en español, mientras que «mano» perdería precisión y «la palma de su mano» resulta más pesada para el paralelismo poético.
- source_word: פָּרְשָׂה
  english_pob_choice: opens
  chosen_spanish: abre
  alternatives_spanish:
  - extiende
  - despliega
  - tiende
  lexicon: HALOT
  rationale: El hebreo significa «extender/abrir/spread out». Con «palma» como objeto, «abre» comunica bien la imagen de una mano abierta en generosidad y evita un calco excesivamente literal en español. No se elimina la fuerza del gesto de apertura.
- source_word: לֶעָנִי
  english_pob_choice: to the poor
  chosen_spanish: al pobre
  alternatives_spanish:
  - al afligido
  - al humilde
  lexicon: HALOT
  rationale: עָנִי puede abarcar al pobre, afligido o socialmente vulnerable. En este contexto sapiencial de ayuda concreta, «el pobre» conserva el matiz socioeconómico principal y mantiene la naturalidad del español.
- source_word: יָדֶיהָ
  english_pob_choice: her hands
  chosen_spanish: sus manos
  alternatives_spanish:
  - sus brazos
  lexicon: HALOT
  rationale: La forma dual/plural se refiere naturalmente a ambas manos. «Manos» es la correspondencia directa y clara en español.
- source_word: שִׁלְּחָה
  english_pob_choice: extends
  chosen_spanish: extiende
  alternatives_spanish:
  - tiende
  - alarga
  - repite hacia
  lexicon: HALOT
  rationale: El piel de שלח puede significar enviar o extender. Aquí, con «manos» y un destinatario con ל, la idea es extenderlas en favor de alguien. «Extiende» conserva la imagen y el tono digno del texto.
- source_word: לָאֶבְיוֹן
  english_pob_choice: to the needy
  chosen_spanish: al necesitado
  alternatives_spanish:
  - al pobre
  - al indigente
  lexicon: HALOT
  rationale: אֶבְיוֹן denota a quien carece de recursos o está en necesidad. «Necesitado» preserva una distinción útil respecto de עָנִי en la primera cola y refleja bien el paralelismo hebreo sin repetir innecesariamente «pobre».
translation_notes:
  revision_awareness: El texto hebreo presenta un paralelismo directo entre la palma abierta hacia el pobre y las manos extendidas hacia el necesitado. La redacción española sigue esa estructura sin añadir contenido interpretativo. Se conserva la distinción entre עָנִי («pobre») y אֶבְיוֹן («necesitado»).
  spanish_consistency_notes:
  - Se evita «SEÑOR» u otra sustitución porque no aparece el nombre divino en este versículo.
  - Se mantiene la distinción léxica entre «pobre» y «necesitado» para reflejar el paralelismo del hebreo.
  - «Palma» se usa en sentido anatómico concreto, acorde con el valor de כַּף en el texto.
