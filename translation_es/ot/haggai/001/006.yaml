revisions:
- from: Han sembrado mucho, pero han recogido poco. Ustedes comen, pero no hay lo suficiente para saciarse; beben, pero no hay lo suficiente para llenarse; se visten, pero nadie tiene calor; y el que gana salario lo gana para meterlo en una bolsa con agujeros.
  to: Han sembrado mucho[a], pero han recogido poco. Ustedes comen, pero no hay lo suficiente para saciarse; beben, pero no hay lo suficiente para llenarse[b]; se visten, pero nadie entra en calor[c]; y el que gana salario lo gana para una bolsa con agujeros.
  rationale: 'Se corrigieron dos expresiones para mayor fidelidad y mejor español: ''nadie tiene calor'' pasó a ''nadie entra en calor'', y se eliminó el añadido interpretativo ''meterlo'' en la imagen de la bolsa agujereada. También se añadieron notas al pie para preservar alternativas léxicas significativas ya atestiguadas en la auditoría inglesa y útiles para el lector español.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:26:39Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia de privación del hebreo y mantiene el sentido agrícola de ''sembrar mucho'' y obtener poco. Sin embargo, hay dos puntos que necesitan ajuste para mayor fidelidad y naturalidad: ''nadie tiene calor'' no expresa bien לְחֹם לוֹ, que apunta a no estar caliente/abrigado, y ''para meterlo en una bolsa con agujeros'' añade una explicación no presente en el texto fuente. Además, conviene preservar en notas las alternativas léxicas relevantes ya documentadas en la auditoría inglesa.'
  spanish_quality_summary: El español es claro y generalmente natural, pero 'nadie tiene calor' suena poco idiomático en este contexto; 'nadie entra en calor' o 'nadie se calienta' comunica mejor la falta de abrigo. También 'lo gana para meterlo en una bolsa con agujeros' es más largo e interpretativo que el original; una forma más directa y digna sería 'lo gana para una bolsa con agujeros'.
  glossary_alignment: No hay términos teológicos mayores en este versículo. Las decisiones léxicas principales están alineadas en general con el proyecto, salvo que el borrador no conservó las notas alternativas del POB inglés para 'recogido poco', 'llenarse' y el singular genérico de 'tener calor'.
  issues:
  - severity: medium
    issue: '''nadie tiene calor'' no reproduce bien la idea de abrigo/calor corporal'
    rationale: El hebreo 'no hay calor para él' se refiere a falta de calor/abrigo, no al estado de 'tener calor' en español, que puede sonar como sentir calor ambiental. 'Nadie entra en calor' o 'nadie se calienta' es más fiel e idiomático.
  - severity: medium
    issue: '''para meterlo en una bolsa con agujeros'' añade contenido explicativo'
    rationale: אֶל צְרוֹר נָקוּב expresa destino hacia una bolsa agujereada; 'meterlo' no es necesario y explicita una acción no dicha. Mejor mantener la imagen más compacta.
  - severity: low
    issue: Faltan notas al pie para alternativas léxicas ya preservadas en la auditoría inglesa
    rationale: El proyecto pide conservar alternativas significativas cuando el inglés ya las documentó o cuando el español crea ambigüedad. Aquí conviene retener las notas sobre 'recogido poco/traído poco', 'llenarse/emborracharse' y el singular genérico en la cláusula del calor.
  revised_spanish_text: Han sembrado mucho[a], pero han recogido poco. Ustedes comen, pero no hay lo suficiente para saciarse; beben, pero no hay lo suficiente para llenarse[b]; se visten, pero nadie entra en calor[c]; y el que gana salario lo gana para una bolsa con agujeros.
  revised_footnotes:
  - marker: a
    text: O 'pero han traído poco'. El hebreo dice literalmente 'pero trajeron poco', un modismo para un rendimiento agrícola escaso.
    reason: lexical_alternative
  - marker: b
    text: O 'beben, pero no hasta embriagarse'. El hebreo puede referirse específicamente a llegar a la embriaguez, no solo a quedar saciado.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, 'pero no hay calor para él'. El pronombre singular tiene sentido genérico.
    reason: lexical_alternative
  revision_rationale: 'Se corrigieron dos expresiones para mayor fidelidad y mejor español: ''nadie tiene calor'' pasó a ''nadie entra en calor'', y se eliminó el añadido interpretativo ''meterlo'' en la imagen de la bolsa agujereada. También se añadieron notas al pie para preservar alternativas léxicas significativas ya atestiguadas en la auditoría inglesa y útiles para el lector español.'
