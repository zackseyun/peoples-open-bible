translation:
  language: es
  text: 'Y ellos dijeron a Josué[a]: «Nosotros somos tus siervos». Entonces Josué les dijo: «¿Quiénes son ustedes, y de dónde vienen?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «tus esclavos». El hebreo עֲבָדֶיךָ puede denotar tanto ‘siervos’ como ‘esclavos’; aquí se traduce ‘siervos’ porque los hablantes usan lenguaje deferente en una petición diplomática.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲבָדֶיךָ
  english_pob_choice: your servants
  chosen_spanish: tus esclavos
  alternatives_spanish:
  - tus siervos
  lexicon: HALOT
  rationale: El sustantivo עֶבֶד puede abarcar tanto ‘sirviente’ como ‘esclavo’. Aquí la POB en inglés documenta que el hebreo puede leerse en sentido de deferencia diplomática, pero decide que la fuerza léxica de esclavitud sigue siendo posible. En español, ‘esclavos’ preserva mejor esa tensión semántica documentada que ‘siervos’, que suele suavizar el término. El posesivo de segunda persona singular concuerda con el hebreo."},{
- source_word: אֲנָחְנוּ
  english_pob_choice: we are
  chosen_spanish: Nosotros somos
  alternatives_spanish:
  - somos nosotros
  - nosotros somos tus esclavos
  lexicon: HALOT
  rationale: El hebreo usa un pronombre independiente en una cláusula nominal sin cópula explícita. El español requiere un verbo copulativo; ‘somos’ mantiene el sentido explícito sin añadir matiz interpretativo. Se conserva ‘nosotros’ para reproducir el énfasis del pronombre hebreo.
theological_decisions:
- issue: Término de subordinación social en la declaración de los gabaonitas
  english_pob_reading: The Hebrew עֲבָדֶיךָ can denote either servants or slaves; here it is rendered 'servants' because the speakers are using deferential language in a diplomatic appeal.
  chosen_spanish_reading: «tus esclavos» conserva la ambigüedad social del hebreo, aunque el contexto sea una petición diplomática.
  alternative_spanish_readings:
  - «tus siervos» suaviza el término y destaca la deferencia
  - «tus servidores» podría sonar más natural en español, pero atenúa la fuerza léxica
  rationale: No conviene borrar la tensión documentada entre un uso deferencial y la carga fuerte de עבד. La decisión española mantiene el valor léxico robusto sin negar el contexto diplomático, que sigue siendo visible por la escena misma.
  doctrine_reference: 'Lexical/theological caution: no doctrinal claim; social-status terminology in the narrative'
translation_notes:
  revision_awareness: No se aplicaron revisiones posteriores; el estado más reciente indica que no hubo cambios necesarios y el pasaje mantiene alto grado de acuerdo con la auditoría inglesa.
  spanish_consistency_notes:
  - Se usa «Josué» para el nombre propio, en línea con el texto fuente y la práctica bíblica española estándar.
  - Se mantiene el orden narrativo con «Entonces» para reflejar la secuencia del hebreo וַיֹּאמֶר sin calcar la coordinación repetitiva.
  - Se conserva «¿Quiénes son ustedes, y de dónde vienen?» como interrogación natural en español, sin añadir sustantivos no presentes en el hebreo.
  - Se evita «SEÑOR» u otra sustitución reverencial porque no aparece el Tetragrámaton en este versículo.
