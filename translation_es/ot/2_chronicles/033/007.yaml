translation:
  language: es
  text: 'Puso la imagen tallada[a], el ídolo que había hecho, en la casa de Dios, de la cual Dios había dicho a David y a Salomón su hijo: «En esta casa y en Jerusalén, que yo he escogido de entre todas las tribus de Israel, pondré mi nombre para siempre».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «la imagen tallada del ídolo»; el hebreo usa dos términos estrechamente relacionados para la estatua idolátrica.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׂם
  english_pob_choice: He put
  chosen_spanish: Puso
  alternatives_spanish:
  - La puso
  - La colocó
  - La puso allí
  lexicon: HALOT
  rationale: שׂים en narración se expresa de manera natural con «poner» en español. «Puso» mantiene el acto concreto sin volverlo interpretativo.
- source_word: פֶּסֶל הַסֶּמֶל
  english_pob_choice: the carved image, the idol
  chosen_spanish: la imagen tallada, el ídolo
  alternatives_spanish:
  - la imagen esculpida, el ídolo
  - la imagen tallada del ídolo
  - la escultura, el ídolo
  lexicon: HALOT
  rationale: 'Se conservan ambos términos hebreos relacionados: פֶּסֶל como «imagen tallada» y הַסֶּמֶל como «ídolo». Esto mantiene visible la intensificación léxica que el POB inglés también preserva.'
- source_word: אֲשֶׁר עָשָׂה
  english_pob_choice: that he had made
  chosen_spanish: que había hecho
  alternatives_spanish:
  - que hizo
  - que él hizo
  lexicon: HALOT
  rationale: El pluscuamperfecto español refleja bien la relación temporal con el verbo principal narrativo y coincide con el valor de antecedencia del inglés auditado.
- source_word: בְּבֵית הָאֱלֹהִים
  english_pob_choice: in the house of God
  chosen_spanish: en la casa de Dios
  alternatives_spanish:
  - en la casa de Dios
  - en el templo de Dios
  lexicon: HALOT
  rationale: «Casa de Dios» reproduce de cerca בית הָאֱלֹהִים y preserva el motivo de «casa» que continúa en la cita divina siguiente.
- source_word: אֲשֶׁר אָמַר אֱלֹהִים
  english_pob_choice: of which God had said
  chosen_spanish: de la cual Dios había dicho
  alternatives_spanish:
  - sobre la cual Dios había dicho
  - acerca de la cual Dios había dicho
  lexicon: HALOT
  rationale: La construcción relativa en español suena natural con «de la cual» y mantiene la referencia al lugar/edificio mencionado.
- source_word: אֶל דָּוִיד וְאֶל שְׁלֹמֹה בְנוֹ
  english_pob_choice: to David and to Solomon his son
  chosen_spanish: a David y a Salomón su hijo
  alternatives_spanish:
  - a David y a Salomón, su hijo
  - a David y a su hijo Salomón
  lexicon: HALOT
  rationale: Se conserva la doble dirección preposicional «a… y a…» y la identificación filial de Salomón, sin añadir interpretación.
- source_word: בַּבַּיִת הַזֶּה וּבִירוּשָׁלַם
  english_pob_choice: In this house and in Jerusalem
  chosen_spanish: En esta casa y en Jerusalén
  alternatives_spanish:
  - En este templo y en Jerusalén
  - En esta casa y en la ciudad de Jerusalén
  lexicon: HALOT
  rationale: «Casa» reproduce mejor el hebreo literal que «templo» y conserva el paralelismo con la declaración divina.
- source_word: אֲשֶׁר בָּחַרְתִּי מִכֹּל שִׁבְטֵי יִשְׂרָאֵל
  english_pob_choice: which I have chosen out of all the tribes of Israel
  chosen_spanish: que yo he escogido de entre todas las tribus de Israel
  alternatives_spanish:
  - que escogí de entre todas las tribus de Israel
  - que elegí de entre todas las tribus de Israel
  lexicon: HALOT
  rationale: «He escogido» expresa bien el estado resultante de la elección divina; «de entre» refleja naturalmente מִכֹּל y mantiene el matiz selectivo.
- source_word: אָשִׂים אֶת שְׁמִי
  english_pob_choice: I will put my name
  chosen_spanish: pondré mi nombre
  alternatives_spanish:
  - colocaré mi nombre
  - estableceré mi nombre
  lexicon: HALOT
  rationale: Se conserva el idiomático «poner mi nombre», evitando reinterpretarlo como una paráfrasis teológica. Es una fórmula covenantal concreta.
- source_word: לְעֵילֹום
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  - para la eternidad
  lexicon: HALOT
  rationale: «Para siempre» es el equivalente idiomático más claro y natural en español para לעולם.
theological_decisions:
- issue: Uso del nombre divino frente a la forma genérica
  english_pob_reading: The Hebrew here uses אֱלֹהִים, not יהוה. The translation therefore renders the term as 'God' rather than importing the covenant name.
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - Yahvé
  - el Señor
  rationale: El texto hebreo de este versículo dice אֱלֹהִים; por tanto, «Dios» preserva el dato del original sin introducir el nombre pactual donde no aparece. La forma «Yahvé» queda reservada para יהוה.
  doctrine_reference: 'Contested terms table: יהוה -> Yahvé; אֱלֹהִים -> Dios'
- issue: La fórmula de presencia del nombre divino en el templo
  english_pob_reading: I will put my name forever
  chosen_spanish_reading: pondré mi nombre para siempre
  alternative_spanish_readings:
  - estableceré mi nombre para siempre
  - haré morar mi nombre para siempre
  rationale: Se mantiene el modismo hebreo sin convertirlo en una explicación doctrinal. En español, «poner mi nombre» conserva la tensión bíblica de la presencia representada por el nombre.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: 'Coincide con el sentido del hebreo y con el audit trail inglés: se conserva la doble designación del objeto idolátrico, la referencia a la casa de Dios, la cita divina en tiempo anterior y la fórmula covenantal de poner el nombre de Dios para siempre. No se identificaron revisiones aplicadas en el contexto inglés reciente.'
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהִים y se evita «SEÑOR» o «Yahvé» porque el versículo no contiene יהוה.
  - «Casa» se prefiere a «templo» para reflejar בית y mantener la repetición léxica del texto.
  - «Poner mi nombre» se conserva como modismo bíblico y no se expande a una paráfrasis.
  - La nota a pie de página marca la alternativa lexical sin duplicar el sentido en el cuerpo del texto.
