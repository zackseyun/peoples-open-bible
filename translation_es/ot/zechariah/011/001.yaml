translation:
  language: es
  text: Abre tus puertas[a], Líbano, para que el fuego consuma tus cedros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Abre tus portones, Líbano, y el fuego consumirá tus cedros».'
    reason: alternative_reading
lexical_decisions:
- source_word: פְּתַח
  english_pob_choice: Open
  chosen_spanish: Abre
  alternatives_spanish:
  - Ábrete
  - Abre de par en par
  lexicon: HALOT
  rationale: Imperativo masculino singular de פתח. En español, «abre» conserva la orden directa y natural. «Ábrete» haría más explícita la personificación, pero el hebreo manda abrir; «abre de par en par» añade intensidad no exigida por el texto.
- source_word: לְבָנוֹן
  english_pob_choice: Lebanon
  chosen_spanish: Líbano
  alternatives_spanish:
  - Lebanón
  lexicon: HALOT
  rationale: Nombre propio geográfico personificado como destinatario del mandato. «Líbano» es la forma estándar y clara en español bíblico contemporáneo.
- source_word: דְּלָתֶיךָ
  english_pob_choice: your doors
  chosen_spanish: tus puertas
  alternatives_spanish:
  - tus portones
  - tus entradas
  lexicon: HALOT
  rationale: דֶּלֶת puede referirse a puerta/hoja de puerta. En español, «puertas» comunica mejor la imagen concreta sin forzar una lectura arquitectónica más amplia como «portones».
- source_word: וְתֹאכַל
  english_pob_choice: so that ... may consume
  chosen_spanish: para que ... consuma
  alternatives_spanish:
  - y ... consumirá
  - y ... devore
  lexicon: HALOT
  rationale: El imperfecto con אֵשׁ como sujeto expresa resultado o propósito después del imperativo. «Para que ... consuma» preserva esa relación sin perder la fuerza profética. «Devore» es posible, pero introduce un matiz más figurado que el básico de אכל.
- source_word: אֵשׁ
  english_pob_choice: fire
  chosen_spanish: el fuego
  alternatives_spanish:
  - fuego
  lexicon: HALOT
  rationale: 'Sentido léxico básico: fuego. Se mantiene el artículo natural en español por fluidez, sin alterar el referente.'
- source_word: בַּאֲרָזֶיךָ
  english_pob_choice: your cedars
  chosen_spanish: tus cedros
  alternatives_spanish:
  - entre tus cedros
  - en tus cedros
  lexicon: HALOT
  rationale: אֶרֶז es «cedro». El hebreo con ב puede sugerir ubicación/inclusión, pero la imagen central es la destrucción de los cedros de Líbano; «tus cedros» conserva el objeto afectado, como en el inglés POB.
theological_decisions:
- issue: Imagen profética personificada de Líbano
  english_pob_reading: Lebanon is addressed directly as a personified land/forest region whose doors are opened to destructive judgment.
  chosen_spanish_reading: Líbano es tratado como un destinatario personificado cuya apertura introduce el juicio destructivo del fuego.
  alternative_spanish_readings:
  - Un llamado literal a abrir pasos o entradas de Líbano
  - Una alusión simbólica a poderes políticos asociados con Líbano
  rationale: El hebreo es poético y profético; la traducción debe conservar la personificación sin resolver qué aspecto exacto de Líbano está en vista. «Abre tus puertas» mantiene la imagen y deja abierta la tensión interpretativa.
  doctrine_reference: Preservar la tensión literaria y profética sin sobreespecificar el referente simbólico.
translation_notes:
  revision_awareness: 'Coincide con el último pasaje de revisión: sin cambios necesarios; el inglés POB también optó por una equivalencia óptima y mantuvo la ambigüedad poética del hebreo.'
  spanish_consistency_notes:
  - Se mantiene «Líbano» como nombre propio transliterado, conforme al uso bíblico estándar.
  - «Puertas» reproduce la imagen concreta de דְּלָתֶיךָ sin imponer «portones».
  - «Para que ... consuma» conserva el valor resultativo del imperfecto hebreo tras el imperativo.
  - Se evitó «SEÑOR» o equivalentes porque no aparece el Tetragrámaton en este versículo.
