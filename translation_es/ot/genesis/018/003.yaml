translation:
  language: es
  text: 'Y dijo[a]: «Mi señor, si he hallado favor ante tus ojos, por favor no pases de largo de tu siervo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Señor», si se entiende que Abraham se dirige específicamente a Dios y no solo a un visitante respetado.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמַר
  english_pob_choice: And he said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Entonces dijo
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol se conserva con una transición simple y natural en español; «Y dijo» mantiene el flujo del relato sin añadir una secuencia interpretativa más fuerte que la del hebreo.
- source_word: אֲדֹנָי
  english_pob_choice: My lord
  chosen_spanish: Mi señor
  alternatives_spanish:
  - Señor
  - señor
  lexicon: HALOT
  rationale: El vocativo con sufijos de segunda persona y el contexto inmediato permiten un tratamiento respetuoso hacia el interlocutor. «Mi señor» conserva la ambigüedad de la forma hebrea entre un superior humano y una posible referencia divina, sin imponer de entrada «Señor» como título teológico.
- source_word: אִם נָא
  english_pob_choice: if ... please
  chosen_spanish: si ... por favor
  alternatives_spanish:
  - si ... te ruego
  - si ... te suplico
  lexicon: HALOT
  rationale: 'La partícula condicional y de cortesía se reparte de modo natural en español: «si» abre la fórmula y «por favor» expresa la súplica respetuosa sin sonar repetitivo o forzado.'
- source_word: מָצָאתִי חֵן בְּעֵינֶיךָ
  english_pob_choice: I have found favor in your eyes
  chosen_spanish: he hallado favor ante tus ojos
  alternatives_spanish:
  - he hallado gracia ante tus ojos
  - he encontrado favor a tus ojos
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática de «favor» y «ojos», muy cercana al hebreo. «Ante tus ojos» transmite mejor la relación de evaluación o aprobación que un simple «contigo», y evita cargar «gracia» con una connotación teológica no exigida por la frase.
- source_word: אַל נָא תַעֲבֹר מֵעַל
  english_pob_choice: please do not pass by
  chosen_spanish: por favor no pases de largo junto a
  alternatives_spanish:
  - por favor no pases por alto a
  - por favor no sigas de largo junto a
  lexicon: HALOT
  rationale: «Pasar de largo» reproduce con naturalidad el movimiento de «pasar de»; añadir «junto a» aclara el objeto personal en español. La forma intenta mantener la cortesía urgente del hebreo sin volverla demasiado rígida.
- source_word: עַבְדֶּךָ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu esclavo
  - tu servidor
  lexicon: HALOT
  rationale: En el lenguaje reverente de autoidentificación ante un superior, «siervo» es la equivalencia más estable y digna en español. Aunque el campo léxico de עבד puede ser más fuerte, aquí la relación de deferencia y humildad es la que domina el contexto.
theological_decisions:
- issue: Cómo reflejar la ambigüedad de אֲדֹנָי en una escena donde Abraham se dirige a una figura posiblemente divina
  english_pob_reading: My lord in the main text, with a footnote allowing Lord if the address is taken as directed to God
  chosen_spanish_reading: Mi señor en el texto principal, con nota que permite entender «Señor» si se toma como un trato dirigido a Dios
  alternative_spanish_readings:
  - Señor
  - mi Señor
  rationale: El contexto narrativo admite la tensión entre una cortesía hacia un visitante y una dirección a una presencia divina. El texto principal conserva esa ambigüedad con «mi señor»; la nota mantiene abierta la lectura teológica sin resolverla prematuramente.
  doctrine_reference: 'Translation philosophy §3; término disputado: אֲדֹנָי / κύριος'
- issue: Cómo traducir חֵן sin imponer de antemano una lectura teológica de «gracia»
  english_pob_reading: favor in your eyes
  chosen_spanish_reading: favor ante tus ojos
  alternative_spanish_readings:
  - gracia ante tus ojos
  - favor en tus ojos
  rationale: «Favor» comunica la idiomaticidad hebrea y preserva la relación evaluativa de benevolencia. «Gracia» puede ser legítima en otros contextos, pero aquí podría sobredeterminar el sentido y borrar la textura idiomática del hebreo.
  doctrine_reference: Uso léxico de חֵן; principio de no sobrerresolver asociaciones teológicas
translation_notes:
  revision_awareness: La versión auditada en inglés no requirió cambios posteriores según el registro más reciente; esta propuesta sigue ese estado estable y adapta con fidelidad las decisiones léxicas y la ambigüedad teológica al español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este versículo no contiene el nombre divino explícito.
  - Se usa «siervo» para עבד en coherencia con el contexto deferencial y con el criterio POB de reservar «esclavo» para contextos donde la fuerza léxica lo requiera.
  - Se conserva el registro reverente y directo, sin arcaísmos innecesarios, para una lectura eclesial moderna.
