id: ROM.13.3
reference: Romans 13:3
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: οἱ γὰρ ἄρχοντες οὐκ εἰσὶν φόβος ⸂τῷ ἀγαθῷ ἔργῳ⸃ ἀλλὰ ⸂τῷ κακῷ⸃. θέλεις δὲ μὴ φοβεῖσθαι τὴν ἐξουσίαν; τὸ ἀγαθὸν ποίει, καὶ ἕξεις ἔπαινον ἐξ αὐτῆς·
base_translation:
  language: en
  yaml_path: translation/nt/romans/013/003.yaml
  text: For rulers are not a terror to good conduct, but to bad. But if you do not want to fear the authority, do what is good, and you will have praise from it.
translation:
  language: ko
  text: 통치자들은 선한 행실에는 두려움이 되지 아니하고 악한 행실에는 두려움이 됩니다. 권세를 두려워하지 않기를 원합니까? 선을 행하십시오. 그러면 권세[a]로부터 칭찬을 받을 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 곧 통치 권세를 가리킨다. 헬라어 αὐτῆς는 여성 단수로 ἐξουσία를 받는다.
    reason: cross_reference
lexical_decisions:
- source_word: ἄρχοντες
  english_pob_choice: rulers
  chosen_korean: 통치자들
  alternatives_korean:
  - 관원들
  - 다스리는 자들
  lexicon: BDAG
  rationale: ἄρχοντες는 다스리는 직책에 있는 자들을 가리킨다. 「통치자」가 정치적 문맥에 자연스럽고 직책을 과잉 특정하지 않는다.
- source_word: φόβος
  english_pob_choice: a terror
  chosen_korean: 두려움
  alternatives_korean:
  - 공포의 대상
  lexicon: BDAG
  rationale: '술어적 주격으로 구체화: 통치자가 선행에는 두려움의 대상이 아니라는 뜻. 「두려움」으로 자연스럽게 옮긴다.'
- source_word: τῷ ἀγαθῷ ἔργῳ / τῷ κακῷ
  english_pob_choice: to good conduct / to bad
  chosen_korean: 선한 행실 / 악한 행실
  alternatives_korean:
  - 선한 일 / 악한 일
  lexicon: BDAG
  rationale: ἔργον이 단수지만 일반적 행실의 뜻이다. 대조 구조를 「선한 행실 / 악한 행실」로 동일한 어휘군에서 유지한다.
- source_word: θέλεις δὲ μὴ φοβεῖσθαι
  english_pob_choice: But do you want not to fear
  chosen_korean: 두려워하지 않기를 원합니까
  alternatives_korean:
  - 두려워하기를 원치 않습니까
  lexicon: BDAG
  rationale: '헬라어 수사 의문문 구조 θέλεις + 부정사를 한국어 의문문으로 보존한다. doctrine-realignment가 명시적으로 수사 의문문을 회복했음을 반영한다.'
- source_word: τὸ ἀγαθὸν ποίει
  english_pob_choice: do what is good
  chosen_korean: 선을 행하십시오
  alternatives_korean:
  - 선한 것을 행하십시오
  lexicon: BDAG
  rationale: 관형 명사화된 형용사. 합쇼체 명령으로 옮기되 도덕적 범주를 「선」으로 유지한다.
- source_word: ἕξεις ἔπαινον ἐξ αὐτῆς
  english_pob_choice: you will have praise from it
  chosen_korean: 권세로부터 칭찬을 받을 것입니다
  alternatives_korean:
  - 그것에게서 칭찬을 받으리라
  lexicon: BDAG
  rationale: 여성 단수 αὐτῆς가 ἐξουσία를 받음을 한국어 독자에게 분명히 하기 위해 「권세로부터」를 명시한다.
theological_decisions:
- issue: 통치자와 칭찬에 관한 바울의 진술의 범위
  chosen_reading: 통치 권세의 정상적·의도된 기능에 대한 진술로 옮기되, 모든 통치자의 모든 행위에 대한 절대적 신학적 인준으로 강화하지 않는다.
  alternative_readings:
  - 모든 통치자가 항상 선을 상주고 악을 벌한다는 무조건적 보편 주장으로 읽기
  - 풍자나 전복적 발화로 읽기
  rationale: 본문은 문맥에서 시민 권세의 의도된 역할을 진술한다. 본문의 문언을 넘는 교리적 주장으로 강화하거나 본문에 없는 풍자를 더하지 않는다.
  doctrine_reference: 'DOCTRINE.md: 신학적 긴장은 해소하지 말고 보존하라'
