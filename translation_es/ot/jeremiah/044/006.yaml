translation:
  language: es
  text: Así se derramaron mi ira[a] y mi enojo, y ardieron en las ciudades de Judá y en las calles de Jerusalén[b], y se convirtieron en ruina y desolación, como están hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'furor' o 'cólera'.
    reason: lexical_alternative
  - marker: b
    text: O 'plazas' o 'espacios abiertos' de Jerusalén.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּתַּךְ / חֲמָתִי
  english_pob_choice: were poured out / my wrath
  chosen_spanish: se derramaron mi ira
  alternatives_spanish:
  - se vertieron mi furor
  - se descargó mi ira
  lexicon: HALOT
  rationale: El hebreo conserva la metáfora de algo que se derrama; en español, 'se derramaron' mantiene esa imagen con naturalidad. 'Ira' comunica היטב el valor de חֲמָה en este contexto profético de juicio.
- source_word: וְאַפִּי
  english_pob_choice: and my anger
  chosen_spanish: y mi enojo
  alternatives_spanish:
  - y mi furor
  - y mi ira
  lexicon: HALOT
  rationale: אַף es literalmente 'nariz', pero aquí es el idiomático 'enojo/ira'. 'Enojo' evita una repetición excesiva con 'ira' y preserva el paralelismo de dos términos cercanos sin aplanarlo por completo.
- source_word: וַתִּבְעַר
  english_pob_choice: burned
  chosen_spanish: ardieron
  alternatives_spanish:
  - quemaron
  - estallaron en fuego
  lexicon: HALOT
  rationale: בער significa 'arder/quemar'. 'Ardieron' conserva el efecto vívido del juicio divino y sigue naturalmente la imagen de algo derramado que luego prende fuego.
- source_word: בְּעָרֵי יְהוּדָה
  english_pob_choice: in the cities of Judah
  chosen_spanish: en las ciudades de Judá
  alternatives_spanish:
  - contra las ciudades de Judá
  lexicon: HALOT
  rationale: La preposición ב indica el ámbito donde se manifestó el fuego del juicio. 'Ciudades de Judá' reproduce de forma directa el sustantivo en constructo.
- source_word: וּבְחֻצוֹת יְרוּשָׁלִָם
  english_pob_choice: in the streets of Jerusalem
  chosen_spanish: y en las calles de Jerusalén
  alternatives_spanish:
  - y en las plazas de Jerusalén
  - y en los espacios abiertos de Jerusalén
  lexicon: HALOT
  rationale: חֻצוֹת puede significar 'calles', 'plazas' o 'lugares abiertos'. 'Calles' es la opción más natural en español moderno sin perder la amplitud posible del término. La nota conserva la alternativa relevante.
- source_word: וַתִּהְיֶינָה
  english_pob_choice: and they became
  chosen_spanish: y quedaron
  alternatives_spanish:
  - y se hicieron
  - y fueron
  lexicon: HALOT
  rationale: El verbo expresa el estado resultante tras el juicio. 'Quedaron' comunica bien el resultado permanente sin forzar un verbo copulativo más débil en español.
- source_word: לְחָרְבָּה
  english_pob_choice: a ruin
  chosen_spanish: en ruina
  alternatives_spanish:
  - ruina
  - arrasamiento
  lexicon: HALOT
  rationale: חָרְבָּה describe una condición devastada. 'En ruina' suena natural con 'quedaron' y conserva el valor de estado resultante.
- source_word: לִשְׁמָמָה
  english_pob_choice: and a desolation
  chosen_spanish: y en desolación
  alternatives_spanish:
  - y en devastación
  - y en desierto
  lexicon: HALOT
  rationale: שְׁמָמָה denota desolación/devastación. 'Desolación' mantiene el paralelismo con 'ruina' y el registro profético.
- source_word: כַּיּוֹם הַזֶּה
  english_pob_choice: as they are this day
  chosen_spanish: como están hoy
  alternatives_spanish:
  - como están en este día
  - tal como se ven hoy
  lexicon: HALOT
  rationale: La frase idiomática apunta al estado observable en el presente. 'Como están hoy' es breve, natural y conserva la referencia temporal inmediata.
theological_decisions:
- issue: Lenguaje concreto del juicio divino
  english_pob_reading: Retained the concrete metaphors 'wrath,' 'anger,' 'poured out,' and 'burned' without softening them.
  chosen_spanish_reading: Se mantienen las imágenes concretas de ira derramada y fuego ardiente, sin reducirlas a una explicación abstracta de castigo.
  alternative_spanish_readings:
  - El castigo cayó sobre...
  - El juicio vino sobre...
  rationale: El hebreo presenta el juicio divino con metáforas intensas y personales. La traducción española conserva ese peso retórico y teológico.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Referencia del plural final
  english_pob_reading: Applied 'they became' / 'as they are this day' to the judged locations collectively.
  chosen_spanish_reading: Se entiende el plural final como referido colectivamente a las ciudades y calles mencionadas.
  alternative_spanish_readings:
  - Quedó en ruina y desolación, como está hoy.
  - Se hicieron ruina y desolación, como son hoy.
  rationale: El hebreo usa plural femenino para los referentes locales afectados. El español conserva esa referencia colectiva sin convertirla innecesariamente en singular impersonal.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: La última revisión indicó alta concordancia y no requirió cambios sustanciales; esta redacción mantiene el mismo sentido del texto base, con ajustes mínimos para fluidez y precisión en español.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando el texto fuente lo requiera explícitamente; en este versículo no aparece el Tetragrámaton como vocativo independiente en la traducción final.
  - Se conservan los pares semánticos 'ira/enojo' y 'ruina/desolación' para reflejar el paralelismo hebreo sin redundancia excesiva.
  - La nota sobre חֻצוֹת preserva la ambigüedad legítima entre 'calles', 'plazas' y 'espacios abiertos'.
