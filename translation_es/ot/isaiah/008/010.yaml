translation:
  language: es
  text: ¡Hagan un plan[a], y será frustrado; hablen una palabra, y no se mantendrá, porque Dios está con nosotros!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «porque con nosotros [está] Dios», en eco del nombre Emanuel («Dios con nosotros») en Isaías 7:14; 8:8.'
    reason: cross_reference
lexical_decisions:
- source_word: עֻצוּ
  english_pob_choice: Make a plan
  chosen_spanish: Haced un plan
  alternatives_spanish:
  - Tomad consejo
  - Diseñad un plan
  lexicon: HALOT
  rationale: El imperativo plural expresa la acción de formar consejo o tramar un plan. «Haced un plan» conserva el tono desafiante y es natural en español moderno.
- source_word: עֵצָה
  english_pob_choice: a plan
  chosen_spanish: un plan
  alternatives_spanish:
  - consejo
  - una decisión
  lexicon: HALOT
  rationale: En este paralelismo hostil, el sustantivo apunta a una trama o proyecto. «Plan» mantiene la fuerza contextual mejor que «consejo» en español.
- source_word: וְתֻפָר
  english_pob_choice: and it will be thwarted
  chosen_spanish: y será frustrado
  alternatives_spanish:
  - y será quebrantado
  - y será anulado
  - y quedará sin efecto
  lexicon: HALOT
  rationale: El nifal de פרר indica ser roto, frustrado o anulado. «Será frustrado» comunica bien la derrota del plan en español contemporáneo sin perder el sentido de fracaso.
- source_word: דַּבְּרוּ
  english_pob_choice: speak
  chosen_spanish: hablad
  alternatives_spanish:
  - decid
  - proclamad
  - pronunciad
  lexicon: HALOT
  rationale: El imperativo plural de דבר se traduce de modo directo. «Hablad» preserva el paralelismo con el primer colon.
- source_word: דָבָר
  english_pob_choice: a word
  chosen_spanish: una palabra
  alternatives_spanish:
  - un asunto
  - una declaración
  - un dicho
  lexicon: HALOT
  rationale: Aunque también puede significar «asunto» o «cosa», aquí el paralelismo con «hablad» favorece «palabra» como equivalente principal en español.
- source_word: וְלֹא יָקוּם
  english_pob_choice: and it will not stand
  chosen_spanish: y no se mantendrá
  alternatives_spanish:
  - y no se levantará
  - y no permanecerá
  - y no se afirmará
  lexicon: HALOT
  rationale: Qal imperfect de קום en este contexto expresa que el plan no tendrá estabilidad ni éxito. «No se mantendrá» es idiomático y conserva la idea de no quedar firme.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque en verdad
  lexicon: HALOT
  rationale: Introduce la razón por la cual fracasan los planes enemigos. «Porque» es claro y natural en español.
- source_word: עִמָּנוּ אֵל
  english_pob_choice: God is with us
  chosen_spanish: Dios está con nosotros
  alternatives_spanish:
  - Con nosotros está Dios
  - Dios con nosotros
  lexicon: HALOT
  rationale: La frase hebrea expresa «con nosotros [está] Dios». En español, la forma más clara y fiel es una cláusula completa. Se conserva el eco de Emanuel sin importar el nombre propio al texto principal.
theological_decisions:
- issue: Relación con el nombre Emanuel / Immanuel
  english_pob_reading: Render the phrase as the clause 'for God is with us' in the main text, while preserving its connection to 'Immanuel' in a footnote.
  chosen_spanish_reading: Traducir en el texto principal «porque Dios está con nosotros» y anotar su eco con Emanuel/Immanuel.
  alternative_spanish_readings:
  - porque Emanuel
  - porque con nosotros está Dios
  - porque Dios con nosotros
  rationale: El hebreo final no aparece como un nombre propio aislado, sino como la frase «con nosotros Dios». Por eso el texto principal debe dar el sentido de la cláusula, mientras que la nota conserva la conexión intertextual con Isaías 7:14 y 8:8.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La revisión más reciente mantuvo el pasaje sin cambios; el inglés auditado muestra alta concordancia y no se registraron observaciones pendientes.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para אֵל conforme al estándar del proyecto.
  - Se evitó «SEÑOR» porque aquí no aparece el Tetragrámaton, sino אֵל.
  - El paralelismo imperativo se conservó con formas breves y directas.
  - La nota a conserva el eco con Emanuel sin sustituir la cláusula principal por un nombre propio.
