base_translation:
  language: en
  yaml_path: translation/deuterocanon/bel_and_the_dragon/001/034.yaml
  text: And an angel of the Lord said to Habakkuk[a], “Carry the meal that you have to Babylon[b], to Daniel in the lions’ pit.”
  footnotes:
  - marker: a
    text: Or “the food,” “the dinner,” or “the midday meal”; the Greek term refers to a meal and does not by itself specify the exact time of day.
    reason: lexical_alternative
  - marker: b
    text: Traditionally, “the lions’ den.” The Greek more literally says “the pit of the lions.”
    reason: lexical_alternative
