    issue: «ante los ojos de Yahvé» es menos idiomático aquí
    rationale: Aunque comprensible, para una evaluación figurada desde la perspectiva de alguien, «a los ojos de Yahvé» suena más natural y convencional en español que «ante los ojos de Yahvé», sin perder la metáfora del hebreo.
  - severity: low
    issue: 'La nota b contiene un giro algo calcado: «lealtad de pacto»'
    rationale: En español eclesial general, «lealtad al pacto» o «lealtad fiel a Dios» comunica mejor el sentido sin sonar traducido literalmente del inglés.
  revised_spanish_text: Preciosa[a] a los ojos de Yahvé es la muerte de sus fieles[b].
