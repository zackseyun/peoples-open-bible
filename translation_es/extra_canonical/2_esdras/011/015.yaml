translation:
  language: es
  text: su fin estaba llegando[a], de modo que no aparecía como la anterior. Y he aquí, una voz
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su fin estaba llegando, de modo que desaparecía como la anterior».'
    reason: previous_rendering
lexical_decisions:
- source_word: ueniebat finis eius
  english_pob_choice: its end was coming
  chosen_spanish: su fin estaba llegando
  alternatives_spanish:
  - se acercaba su fin
  - su fin venía
  lexicon: finis
  rationale: El latín indica un proceso en curso (ueniebat), no solo un resultado consumado. «Estaba llegando» conserva esa progresión y mantiene el tono sobrio del original.
- source_word: ut non appareret
  english_pob_choice: so that it did not appear
  chosen_spanish: de modo que no aparecía
  alternatives_spanish:
  - de modo que no se mostraba
  - de modo que no resultaba visible
  lexicon: apparere
  rationale: El verbo appareret expresa «aparecer / hacerse visible», y la revisión inglesa corrigió la lectura de «disappeared» a «did not appear». «No aparecía» refleja mejor la negación de la visibilidad que una paráfrasis más interpretativa.
- source_word: sicut prior
  english_pob_choice: like the former
  chosen_spanish: como la anterior
  alternatives_spanish:
  - como la primera
  - igual que la anterior
  lexicon: prior
  rationale: «Prior» aquí remite a la figura precedente femenina en el contexto inmediato; «la anterior» es natural en español y conserva la comparación sin introducir matices no presentes en el latín.
- source_word: Et ecce uox
  english_pob_choice: And behold, a voice
  chosen_spanish: Y he aquí, una voz
  alternatives_spanish:
  - Y he aquí una voz
  - Y miren, una voz
  lexicon: ecce
  rationale: «Et ecce» funciona como fórmula de atención. «Y he aquí» es una equivalencia directa, solemne y reconocible en español bíblico sin depender de un giro arcaizante extremo.
theological_decisions:
- issue: Alcance del versículo respecto de la frase siguiente
  english_pob_reading: The revised English trims off “was sent out to it, saying,” as belonging to the next verse.
  chosen_spanish_reading: El español termina en «una voz» y no incorpora la cláusula siguiente.
  alternative_spanish_readings:
  - Y he aquí, una voz fue enviada a ella, diciendo,
  - Y he aquí, se le envió una voz, diciendo,
  rationale: La revisión auditada señala que la frase sobre la voz enviada pertenece al inicio del versículo 16, no al 15. Por fidelidad al tramo textual disponible, el español debe detenerse en «una voz».
  doctrine_reference: Fidelidad de delimitación textual; no añadir material de verso vecino.
translation_notes:
  revision_awareness: La fuente inglesa auditada fue revisada para eliminar la cláusula «was sent out to it, saying,» por pertenecer al versículo 16. El español sigue esa delimitación y refleja además la corrección de «disappeared» a «did not appear», preservando la comparación con «la anterior».
  spanish_consistency_notes:
  - Se mantuvo «una voz» como cierre del versículo, sin anticipar el contenido del versículo siguiente.
  - Se eligió «la anterior» para sintonizar con el comparativo de prior y evitar introducir una identificación más específica de la figura previa.
  - El tono es bíblico pero no arcaizante en exceso, acorde con español neutral de lectura eclesial.
