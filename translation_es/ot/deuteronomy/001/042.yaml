review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: Yahvé habla a Moisés, manda decir al pueblo que no suba ni combata, porque su presencia no está con ellos, y advierte una derrota ante sus enemigos. Sin embargo, la cláusula final española usa «para que no caigan», que suena a propósito o prevención desde la perspectiva del hablante, mientras que el hebreo וְלֹא תִּנָּגְפוּ aquí, según el propio rastro auditado en inglés, funciona mejor como advertencia de consecuencia: «no sea que sean derrotados / caigan derrotados».'
  spanish_quality_summary: El español es claro y digno, pero conviene ajustar la cláusula final para que suene menos teleológica y más admonitiva. Además, «caigan delante de sus enemigos» es entendible, pero «sean derrotados ante sus enemigos» comunica con más precisión el valor militar de נגף. El resto del texto es natural y fiel.
  glossary_alignment: «Yahvé» alinea correctamente con la política del proyecto para יְהוָה. No hay conflictos terminológicos mayores. La elección «en medio de ustedes» es aceptable y conserva la imagen espacial; la nota correspondiente está bien anclada. La principal mejora es léxico-sintáctica en וְלֹא תִּנָּגְפוּ.
  issues:
  - severity: medium
    issue: La cláusula final «para que no caigan» no reproduce con suficiente precisión la advertencia consecuencial del hebreo en contexto.
    rationale: El audit trail inglés ya documenta que una simple cláusula final negativa puede desorientar el sentido. En español, «para que no» suena a finalidad; «no sea que» expresa mejor la consecuencia temida por desobedecer.
  - severity: medium
    issue: «Caigan» es algo menos preciso que «sean derrotados» para נגף en contexto militar.
    rationale: נגף en este contexto no es solo caer físicamente, sino sufrir derrota/ser abatidos ante el enemigo. «Sean derrotados» transmite mejor la fuerza militar y coincide con la alternativa ya preservada en nota.
  revised_spanish_text: 'Yahvé me dijo: «Diles: No suban ni peleen, porque yo no estoy en medio de ustedes[a]; no sea que sean derrotados ante sus enemigos[b]».'
  revised_footnotes:
  - marker: a
    text: 'Más literalmente: «porque yo no estoy en medio de ustedes».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no sea que caigan delante de sus enemigos».'
    reason: lexical_alternative
  revision_rationale: Se reemplazó «para que no caigan» por «no sea que sean derrotados» para reflejar mejor la advertencia de consecuencia del hebreo y la decisión contextual ya documentada en el inglés POB. También se cambió «delante de» por «ante» en el texto principal por mayor naturalidad, preservando la alternativa más literal en nota.
