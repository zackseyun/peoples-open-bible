translation:
  language: es
  text: Esto también sería una iniquidad digna de juicio,[a] porque yo habría negado a Dios en lo alto.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «una iniquidad para los jueces», «una falta judicial» o «una iniquidad punible por los jueces».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «habría sido falso a Dios en lo alto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  english_pob_choice: too
  chosen_spanish: también
  alternatives_spanish:
  - además
  - incluso
  lexicon: HALOT
  rationale: El hebreo suma este acto hipotético a otros pecados mencionados en el contexto; «también» comunica esa adición de manera natural en español.
- source_word: הוּא
  english_pob_choice: this
  chosen_spanish: eso
  alternatives_spanish:
  - esto
  - aquello
  lexicon: HALOT
  rationale: El demostrativo retoma el acto ya aludido en el versículo anterior; «eso» funciona bien en español para una referencia anafórica sin forzar un sustantivo explícito.
- source_word: עָוֺן
  english_pob_choice: iniquity
  chosen_spanish: iniquidad
  alternatives_spanish:
  - culpa
  - maldad
  - pecado
  lexicon: HALOT
  rationale: «Iniquidad» conserva el peso moral y jurídico del término mejor que opciones más generales como «culpa» o «pecado».
- source_word: פְּלִילִי
  english_pob_choice: for the judges
  chosen_spanish: digna de juicio
  alternatives_spanish:
  - punible por los jueces
  - un delito judicial
  - para juicio
  lexicon: HALOT
  rationale: El término remite a juicio o decisión judicial. En español, «digna de juicio» conserva la fuerza legal sin sonar forzado; se mantiene la idea de una falta sometida a evaluación judicial.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón por la cual esa conducta sería una iniquidad judicial; «porque» expresa con claridad la relación causal.
- source_word: כִחַשְׁתִּי
  english_pob_choice: I would have denied
  chosen_spanish: yo habría negado
  alternatives_spanish:
  - yo habría mentido a
  - yo habría sido falso a
  - yo habría repudiado
  lexicon: HALOT
  rationale: En este contexto, el verbo implica negar o ser infiel a Dios, no solo mentir. El condicional compuesto en español refleja adecuadamente el valor hipotético del pasaje.
- source_word: לָאֵל
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - contra Dios
  - de Dios
  lexicon: HALOT
  rationale: Aunque literalmente la preposición puede sentirse idiomáticamente con «negado a», en español bíblico claro se expresa como «a Dios» para conservar la relación verbal sin sobreexplicar.
- source_word: מִמָּעַל
  english_pob_choice: above
  chosen_spanish: de lo alto
  alternatives_spanish:
  - desde arriba
  - en lo alto
  - del cielo
  lexicon: HALOT
  rationale: La frase hebrea es breve y vertical; «de lo alto» comunica la referencia espacial y teológica sin ampliar innecesariamente el texto.
theological_decisions:
- issue: 'Alcance de פְּלִילִי: judicial vs. moral general'
  english_pob_reading: for the judges / a judicial offense
  chosen_spanish_reading: digna de juicio
  alternative_spanish_readings:
  - punible por los jueces
  - un delito judicial
  - para juicio
  rationale: 'La POB inglesa preserva la tensión entre lo moral y lo jurídico. En español, «digna de juicio» mantiene esa ambigüedad útil: la acción sería a la vez una culpa moral y un caso sometido a juicio.'
  doctrine_reference: Principio de equivalencia óptima; conservar tensiones léxicas cuando el original las presenta.
- issue: 'Valor de מִמָּעַל: ¿desarrollar como ''en el cielo'' o mantener brevedad?'
  english_pob_reading: God above
  chosen_spanish_reading: de lo alto
  alternative_spanish_readings:
  - de arriba
  - del cielo de lo alto
  - en lo alto
  rationale: El texto hebreo es conciso y no añade un desarrollo explícito. «De lo alto» preserva la dirección vertical y la referencia a Dios sin introducir una glosa interpretativa.
  doctrine_reference: Primacía del texto original; no ampliar más allá de lo que el hebreo warrants.
translation_notes:
  revision_awareness: Se revisó el pasaje con base en el hebreo consonántico y la audit trail inglesa. La decisión clave fue mantener la carga jurídico-moral de פְּלִילִי sin convertirla en una paráfrasis explicativa extensa, y conservar la brevedad de מִמָּעַל con una expresión española igualmente breve.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים/אֵל según el estándar del proyecto.
  - Se usa un condicional compuesto en español para reflejar el valor hipotético del contexto de Job 31.
  - La frase «de lo alto» conserva la orientación vertical del hebreo sin introducir 'SEÑOR' ni una expansión doctrinal.
  - «Iniquidad» se conserva por su fuerza jurídica y moral, en continuidad con el criterio POB para contextos legales.
