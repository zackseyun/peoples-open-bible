translation:
  language: es
  text: No me arrastres[a] con los malvados, con los que hacen el mal; los que hablan de paz con sus prójimos, mientras hay maldad en sus corazones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No me lleves con los malvados».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּמְשְׁכֵנִי
  english_pob_choice: drag me away
  chosen_spanish: arrastres[a]
  alternatives_spanish:
  - me lleves
  - me jales
  - me apartes
  lexicon: HALOT
  rationale: El hebreo expresa una acción fuerte de ser llevado o arrastrado junto con otros. «Arrastres» conserva esa fuerza verbal y la petición negativa sin sonar demasiado literal o arcaica en español. Se eligió una forma breve y natural que mantiene la idea de ser removido junto con los demás.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los malvados
  alternatives_spanish:
  - los impíos
  - los perversos
  - los culpables
  lexicon: HALOT
  rationale: «Malvados» comunica bien la referencia moral a personas abiertamente malas. Se evita «impíos» como opción más eclesiástica, aunque también es posible, para mantener un registro claro y directo en español contemporáneo.
- source_word: פֹּעֲלֵי אָוֶן
  english_pob_choice: those who work evil
  chosen_spanish: los que hacen el mal
  alternatives_spanish:
  - los que obran iniquidad
  - los hacedores de mal
  - los que practican el mal
  lexicon: HALOT
  rationale: La construcción hebrea conserva un matiz activo de personas que practican el mal. «Los que hacen el mal» reproduce ese valor verbal de manera natural en español y evita el giro más tradicional pero menos transparente «obradores de iniquidad».
- source_word: דֹּבְרֵי שָׁלוֹם
  english_pob_choice: who speak peace
  chosen_spanish: los que hablan de paz
  alternatives_spanish:
  - los que hablan paz
  - los que pronuncian paz
  - los que dicen palabras de paz
  lexicon: HALOT
  rationale: El hebreo presenta una expresión idiomática de habla pacífica o conciliadora. «Hablan de paz» conserva la forma directa del participio y la idea de discurso exterior pacífico. Se evita ampliar a «hablan pacíficamente», porque el contraste del versículo requiere el contenido de las palabras.
- source_word: רֵעֵיהֶם
  english_pob_choice: their neighbors
  chosen_spanish: sus prójimos
  alternatives_spanish:
  - sus vecinos
  - sus amigos
  - sus compañeros
  lexicon: HALOT
  rationale: Aquí רֵעַ puede ser vecino, amigo o prójimo. «Prójimos» mantiene la amplitud relacional del término y resulta natural en español bíblico sin imponer la idea más limitada de amistad. Aunque la POB inglesa usa «neighbors», en español «prójimos» expresa mejor la relación social general.
- source_word: רָעָה
  english_pob_choice: evil
  chosen_spanish: maldad
  alternatives_spanish:
  - mal
  - evil
  - malicia
  lexicon: HALOT
  rationale: El sustantivo final subraya la disposición interna opuesta a las palabras de paz. «Maldad» funciona bien en español como el contenido moral interno del corazón y mantiene el contraste con la paz exterior.
- source_word: בִּלְבָבָם
  english_pob_choice: in their hearts
  chosen_spanish: en su corazón
  alternatives_spanish:
  - en sus corazones
  - dentro de ellos
  - en lo íntimo de su ser
  lexicon: HALOT
  rationale: Aunque el hebreo tiene plural con sufijo, en español el singular colectivo «su corazón» es idiomático y natural para un grupo. Mantiene la imagen bíblica del corazón como sede interior de intención y pensamiento.
theological_decisions:
- issue: Si la frase indica simple asociación moral o ser llevado a juicio junto con los malvados
  english_pob_reading: A request not to be swept away together with evildoers in their company or fate
  chosen_spanish_reading: Una petición para no ser arrastrado junto con los malvados, sin explicitar en el texto el mecanismo exacto
  alternative_spanish_readings:
  - Una petición para no imitar a los malvados
  - Una petición para no compartir su destino en el juicio
  - Una petición para no ser contado entre ellos
  rationale: 'El hebreo y la POB inglesa dejan abierta la forma precisa en que el salmista teme ser incluido con los malvados. La traducción española conserva esa ambigüedad: expresa claramente el ser arrastrado «con» ellos, pero no añade una explicación doctrinal o narrativa que el texto no dice de manera explícita.'
  doctrine_reference: Salmo 28:3; cf. el valor general de juicio/retribución en los salmos sin imponerlo como glosa interpretativa
translation_notes:
  revision_awareness: La redacción sigue de cerca el sentido del hebreo y la lectura auditada en inglés, pero adapta la sintaxis para que el verso suene natural en español. Se preserva la tensión entre habla externa de paz e interior maldad, y se mantiene la fuerza negativa de la petición.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; este versículo no contiene el tetragrámaton.
  - Se prefiere «maldad/malvados» para mantener un campo léxico coherente con אָוֶן y רְשָׁעִים.
  - «Prójimos» se elige como equivalente relacional amplio; en otros contextos puede preferirse «vecinos» si el contraste social lo exige.
