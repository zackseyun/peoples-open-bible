translation:
  language: es
  text: No muevas[a] el antiguo mojón, y no entres en los campos de los huérfanos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No quites un antiguo mojón, y no vayas a los campos de los huérfanos».

      '
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּסֵּג
  english_pob_choice: move
  chosen_spanish: muevas
  alternatives_spanish:
  - quites
  - remuevas
  - desplaces
  lexicon: HALOT
  rationale: El verbo en este contexto legal advierte contra desplazar un límite de propiedad. «Mover» en inglés se refleja naturalmente como «mover» en español en forma de mandato negativo, y «muevas» conserva el valor de no alterar la posición del mojón.
- source_word: גְּבוּל
  english_pob_choice: boundary marker
  chosen_spanish: mojón
  alternatives_spanish:
  - límite
  - mojón de lindero
  - señal de lindero
  lexicon: HALOT
  rationale: El contexto no es una frontera abstracta sino una marca física que delimita una parcela. «Mojón» comunica mejor la idea concreta de marcador de linderos que «límite», aunque «límite» queda como alternativa válida.
- source_word: עוֹלָם
  english_pob_choice: ancient
  chosen_spanish: antiguo
  alternatives_spanish:
  - de antaño
  - viejo
  - antiguo de mucho tiempo
  lexicon: HALOT
  rationale: Aquí la palabra no expresa eternidad metafísica sino antigüedad de larga data. «Antiguo» reproduce bien esa cualidad temporal y mantiene la sobriedad del proverbio.
- source_word: וּ/בִ/שְׂדֵי
  english_pob_choice: and ... the fields of
  chosen_spanish: en los campos de
  alternatives_spanish:
  - y en los campos de
  - y dentro de los campos de
  lexicon: HALOT
  rationale: La preposición con el verbo de movimiento tiene fuerza direccional de entrada. En español, «entrar en» expresa esa relación de manera natural y fiel.
- source_word: יְתוֹמִים
  english_pob_choice: orphans
  chosen_spanish: huérfanos
  alternatives_spanish:
  - desamparados
  - los que no tienen padre
  lexicon: HALOT
  rationale: «Huérfanos» es la equivalencia clara y directa para el término hebreo en este contexto; conserva la referencia a menores vulnerables y evita una paráfrasis excesiva.
- source_word: תָּבֹא
  english_pob_choice: enter
  chosen_spanish: entres
  alternatives_spanish:
  - vayas
  - penetres
  - entres dentro
  lexicon: HALOT
  rationale: El verbo de movimiento con negación expresa intrusión en propiedad ajena. «Entres» es idiomático, breve y mantiene la advertencia legal y ética.
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado y quedó sin cambios; el control cruzado reporta alta concordancia con observaciones menores, sin necesidad de ajustar el sentido base.
  spanish_consistency_notes:
