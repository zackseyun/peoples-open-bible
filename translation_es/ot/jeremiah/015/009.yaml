translation:
  language: es
  text: Se marchitó la que dio a luz siete[a]; exhaló su vida[b]. Su sol se puso[c] mientras todavía era de día. Está avergonzada y humillada. Y al remanente de ellos los daré a la espada delante de sus enemigos, declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la madre de siete». El hebreo presenta a una mujer antes vista como plenamente fecunda o bendecida.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «exhaló su alma/vida». Se conserva la imagen concreta del aliento que se va.'
    reason: lexical_alternative
  - marker: c
    text: 'Lit.: «su sol se puso mientras todavía era de día», una imagen poética de un final prematuro.'
    reason: cultural_note
lexical_decisions:
- source_word: אֻמְלְלָה
  english_pob_choice: has withered away
  chosen_spanish: Se marchitó
  alternatives_spanish:
  - Se consumió
  - Languideció
  lexicon: HALOT
  rationale: El hebreo expresa debilitamiento y desvanecimiento; «se marchitó» conserva la imagen poética de decaimiento, con buena naturalidad en español y sin perder el matiz de ruina vital.
- source_word: יֹלֶדֶת הַשִּׁבְעָה
  english_pob_choice: she who bore seven
  chosen_spanish: la que dio a luz siete
  alternatives_spanish:
  - la madre de siete
  - la que ha dado a luz siete hijos
  lexicon: HALOT
  rationale: La expresión es idiomática y alude a una mujer vista como plenamente fecunda o bendecida. «La que dio a luz siete» preserva la forma poética y evita precisar «hijos» donde el hebreo sólo dice «siete».
- source_word: נָפְחָה נַפְשָׁהּ
  english_pob_choice: has breathed out her life
  chosen_spanish: exhaló su vida
  alternatives_spanish:
  - exhaló su alma
  - expiró
  lexicon: HALOT
  rationale: La imagen concreta es la de la vida que sale con el aliento. «Exhaló su vida» mantiene esa fuerza idiomática; «alma» sería posible, pero «vida» comunica mejor el sentido en español actual sin borrar la metáfora.
- source_word: בָּאָה שִׁמְשָׁהּ
  english_pob_choice: Her sun has gone down
  chosen_spanish: Su sol se puso
  alternatives_spanish:
  - Su sol se ha puesto
  - Su sol se ha hundido
  lexicon: HALOT
  rationale: El hebreo usa una imagen de ocaso para una vida truncada. «Se puso» reproduce bien el giro idiomático del sol y sugiere el fin prematuro con concisión poética.
- source_word: בְּעוֹד יוֹמָם
  english_pob_choice: while it was still day
  chosen_spanish: todavía de día
  alternatives_spanish:
  - mientras aún era de día
  - cuando todavía era de día
  lexicon: HALOT
  rationale: La frase subraya que el ocaso llegó antes de tiempo. «Todavía de día» es breve y natural en español, y conserva la tensión de una caída prematura.
- source_word: בּוֹשָׁה וְחָפֵרָה
  english_pob_choice: is ashamed and humiliated
  chosen_spanish: Avergonzada y humillada está
  alternatives_spanish:
  - Está avergonzada y humillada
  - Queda avergonzada y confundida
  lexicon: HALOT
  rationale: El hebreo acumula vergüenza y deshonra pública. La colocación delante del verbo ayuda a preservar el paralelismo poético; «humillada» refleja bien la segunda idea sin suavizarla.
- source_word: וּשְׁאֵרִיתָם
  english_pob_choice: the remnant of them
  chosen_spanish: a sus sobrevivientes
  alternatives_spanish:
  - al remanente de ellos
  - a lo que les quede
  lexicon: HALOT
  rationale: Aquí el sustantivo designa a los que quedan con vida tras el juicio. «Sobrevivientes» comunica el grupo restante con naturalidad en español, aunque «remanente» podría preservar más el eco técnico.
- source_word: לַחֶרֶב אֶתֵּן
  english_pob_choice: I will give to the sword
  chosen_spanish: los daré a la espada
  alternatives_spanish:
  - los entregaré a la espada
  - los pondré a la espada
  lexicon: HALOT
  rationale: Es una fórmula profética de juicio. «Dar a la espada» conserva el giro idiomático; en español, agregar el pronombre «los» hace clara la referencia a los sobrevivientes sin alterar el sentido.
- source_word: לִפְנֵי אֹיְבֵיהֶם
  english_pob_choice: before their enemies
  chosen_spanish: delante de sus enemigos
  alternatives_spanish:
  - en presencia de sus enemigos
  - ante sus enemigos
  lexicon: HALOT
  rationale: «Delante de» reproduce bien la idea de quedar expuestos frente al poder del enemigo y mantiene la transparencia de la imagen hebrea.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como «Yahvé» según la convención del proyecto, y la fórmula profética «declara» transmite con dignidad el cierre oracular.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El hebreo usa directamente el Tetragrámaton; por la convención del proyecto, se traduce por «Yahvé» para conservar el nombre de pacto y evitar la sustitución litúrgica impersonal.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: Se revisó la concordancia con el texto hebreo y con el audit trail inglés. No hubo cambios sustanciales respecto de la lectura base; se mantuvo la estructura poética, el paralelismo y la referencia explícita a Yahvé, ajustando el español para mayor naturalidad sin perder la imaginería ni la tensión léxica.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה, conforme a la terminología del proyecto.
  - Se evitó «Cristo/SEÑOR» porque no corresponde al versículo.
  - Se preservó la metáfora del sol y la idea de juicio con «a la espada» / «delante de sus enemigos».
  - «Sobrevivientes» se usó como equivalente contextual de «remanente» para claridad en español, sin borrar el matiz corporativo del término.
