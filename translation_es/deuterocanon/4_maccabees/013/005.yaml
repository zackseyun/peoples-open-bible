translation:
  language: es
  text: ¿Cómo, pues, no ha de reconocerse en estos hombres el dominio sobre el sufrimiento que procede de la bendición[a], si no se dejaron desviar ni por los dolores del fuego?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «el dominio sobre las pasiones que pertenece a la bendición / piedad». El griego es raro y difícil, pero el sentido elogia la firme autodisciplina virtuosa de estos hermanos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πῶς οὖν οὐκ ἔστιν ... ὁμολογεῖν
  english_pob_choice: How then can one fail to acknowledge
  chosen_spanish: ¿Cómo, pues, no ha de reconocerse...
  alternatives_spanish:
  - ¿Cómo, pues, no puede dejar de reconocerse...
  - ¿Cómo, pues, no ha de admitirse...
  lexicon: LSJ
  rationale: La pregunta retórica griega expresa una imposibilidad práctica de no conceder algo. En español, «¿Cómo, pues, no ha de reconocerse...?» conserva ese valor de admisión forzosa sin sonar artificial.
- source_word: τούτοις
  english_pob_choice: in these men
  chosen_spanish: en estos hombres
  alternatives_spanish:
  - para estos hombres
  - entre estos hombres
  lexicon: LSJ
  rationale: El dativo con ὁμολογεῖν señala reconocimiento respecto de estas personas. «En estos hombres» comunica de manera natural que la cualidad se observa en ellos.
- source_word: τὴν τῆς εὐλογιστίας παθοκρατίαν
  english_pob_choice: the mastery over suffering that comes from blessedness
  chosen_spanish: la maestría sobre el sufrimiento que procede de la bienaventuranza
  alternatives_spanish:
  - el dominio sobre el sufrimiento que procede de la bienaventuranza
  - la maestría sobre las pasiones que pertenece a la piedad
  - el dominio sobre el padecimiento que nace de la bienaventuranza
  lexicon: LSJ
  rationale: παθοκρατία apunta al dominio o maestría sobre el padecimiento/pasiones; εὐλογιστία es un término raro y difícil. «Bienaventuranza» rinde el matiz de bendición/estado dichoso asociado a virtud, y «maestría sobre el sufrimiento» sigue la revisión inglesa más reciente sin resolver de forma excesiva la tensión filosófica del compuesto.
- source_word: οὐκ ἐπεστράφησαν
  english_pob_choice: since they were not turned aside
  chosen_spanish: si no se dejaron desviar
  alternatives_spanish:
  - si no fueron apartados
  - si no se volvieron atrás
  - si no cedieron
  lexicon: LSJ
  rationale: El pasivo expresa que no fueron desviados de su firmeza bajo presión. «No se dejaron desviar» preserva la idea de no ser apartados del curso/resolución con buen español.
- source_word: διὰ πυρὸς ἀλγηδόνων
  english_pob_choice: the pains of fire
  chosen_spanish: los dolores del fuego
  alternatives_spanish:
  - los tormentos del fuego
  - las penas del fuego
  - los sufrimientos del fuego
  lexicon: LSJ
  rationale: ἀλγηδόνες son dolores/tormentos, y διὰ πυρός vincula el medio o la esfera del fuego. «Dolores del fuego» es una forma natural y fiel; evita una paráfrasis más interpretativa que podría estrechar el sentido.
theological_decisions:
- issue: Naturaleza de la rareza filosófico-moral de τῆς εὐλογιστίας παθοκρατία
  english_pob_reading: A commendation of virtuous rational mastery over passions/sufferings, expressed as 'the mastery over suffering that comes from blessedness'
  chosen_spanish_reading: Una alabanza de la maestría moral sobre el sufrimiento que procede de la bienaventuranza
  alternative_spanish_readings:
  - el dominio sobre las pasiones que pertenece a la piedad
  - el dominio sobre el padecimiento producido por la bienaventuranza
  rationale: El pasaje forma parte del argumento de 4 Macabeos sobre la firmeza virtuosa ante el tormento. La traducción española conserva la tensión del sintagma raro sin sustituirlo por un término doctrinal más cerrado ni resolver la ambigüedad de manera excesiva.
  doctrine_reference: 'DOCTRINE.md: mantener la tensión teológica/lexical cuando el texto la presenta; español claro, no paraprástico.'
translation_notes:
  revision_awareness: Se incorporó la revisión más reciente del inglés POB, que corrigió la frase desde una referencia a la razón hacia una referencia al sufrimiento, y se reflejó en español con «maestría sobre el sufrimiento». También se ajustó la segunda cláusula para seguir más de cerca «the pains of fire» con una formulación natural en español.
  spanish_consistency_notes:
  - Se usó «bienaventuranza» para εὐλογιστία siguiendo el valor de bendición/estado dichoso ya sugerido por el audit trail, sin fijar indebidamente una sola glosa.
  - Se evitó «Cristo» u otra terminología no pertinente; no hay vocabulario cristológico en el versículo.
  - Se mantuvo un registro solemne y readable, propio de una edición bíblica pública en español latino neutral.
