id: ZEC.9.8
reference: Zechariah 9:8
source:
  edition: WLC
  text: וְ/חָנִ֨יתִי לְ/בֵיתִ֤/י מִצָּבָה֙ מֵ/עֹבֵ֣ר וּ/מִ/שָּׁ֔ב וְ/לֹֽא יַעֲבֹ֧ר עֲלֵי/הֶ֛ם ע֖וֹד נֹגֵ֑שׂ כִּ֥י עַתָּ֖ה רָאִ֥יתִי בְ/עֵינָֽ/י־׃ס
translation:
  text: And I will encamp at my house as a guard[a], so that none may pass to and fro, and no oppressor will pass over them again[c][b]; for now I have seen with my own eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as a garrison.' The Hebrew term refers to a stationed guard-post or military defense.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from the one passing through and from the one returning,' likely meaning from hostile movement in either direction.
    reason: lexical_alternative
  - marker: c
    text: Or 'exactor' or 'taskmaster' for 'oppressor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְחָנִיתִי
  chosen: And I will encamp
  alternatives:
  - And I will camp
  - And I will pitch camp
  lexicon: HALOT
  rationale: From חנה, 'to encamp, pitch camp.' First person singular with prefixed conjunction. 'Encamp' preserves the military/protective nuance better than a flatter 'stay' or 'dwell.'
- source_word: לְבֵיתִי
  chosen: at my house
  alternatives:
  - for my house
  - around my house
  lexicon: HALOT
  rationale: Literally 'to/for my house.' In context of protective encampment, English 'at my house' communicates location naturally while retaining the sense that YHWH is defending his own house/household. 'Around my house' is interpretive and therefore not preferred in the main text.
- source_word: מִצָּבָה
  chosen: as a guard
  alternatives:
  - as a garrison
  - as a stationed force
  lexicon: HALOT
  rationale: The noun denotes a stationed post, garrison, or guard-position. 'As a guard' is idiomatic and clear in modern English while preserving the protective military image. 'Garrison' is possible but sounds more technical and less natural here.
- source_word: מֵעֹבֵר וּמִשָּׁב
  chosen: against those who pass by and return
  alternatives:
  - from the one passing through and from the one returning
  - against passerby and returner
  lexicon: HALOT
  rationale: These are participial forms from עבר ('pass over/through') and שוב ('return'). The pair likely expresses movement in both directions, i.e., hostile traffic through the land. Rendering them verbally in English is more natural than preserving the participles woodenly.
- source_word: וְלֹא יַעֲבֹר עֲלֵיהֶם עוֹד
  chosen: and no oppressor will pass over them again
  alternatives:
  - and he will not pass over them again
  - and none will pass over them anymore
  lexicon: HALOT
  rationale: The verb עבר recurs from the previous clause. The subject is supplied by the following participle נֹגֵשׂ, yielding the sense that no oppressor will again overrun them. 'Pass over them' preserves the military sense of invasion or overrunning.
- source_word: נֹגֵשׂ
  chosen: oppressor
  alternatives:
  - taskmaster
  - exactor
  lexicon: HALOT
  rationale: נגשׂ in participial form often denotes one who drives, exacts, or oppresses, especially in political or economic domination. 'Oppressor' best fits the broader prophetic context of foreign domination. 'Taskmaster' is too narrow; 'exactor' is possible but less broadly intelligible.
- source_word: כִּי עַתָּה
  chosen: for now
  alternatives:
  - for now at last
  - because now
  lexicon: HALOT
  rationale: כִּי here gives the reason for the promised protection, and עתה marks the present decisive moment. 'For now' is concise and natural.
- source_word: רָאִיתִי בְעֵינָי
  chosen: I have seen with my own eyes
  alternatives:
  - I have looked with my eyes
  - I have seen with my eyes
  lexicon: HALOT
  rationale: The idiom emphasizes direct personal observation. Adding 'own' is a natural English way to preserve the emphatic force of the first-person suffix without changing the sense.
