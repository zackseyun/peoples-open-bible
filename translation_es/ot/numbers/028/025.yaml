translation:
  language: es
  text: El séptimo día tendrán santa convocación[a]; no harán ningún trabajo ordinario[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como “asamblea santa” o “asamblea sagrada”.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: “ningún trabajo de labor/servicio”; es decir, ningún trabajo ocupacional ordinario.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בַ/יּוֹם
  english_pob_choice: On the ... day
  chosen_spanish: En el ... día
  alternatives_spanish:
  - Y en el ... día
  - El ... día
  lexicon: HALOT
  rationale: La construcción hebrea combina la preposición y la conjunción con 'día'; en español, 'En el séptimo día' reproduce con naturalidad el valor temporal sin forzar una conjunción redundante.
- source_word: הַ/שְּׁבִיעִי
  english_pob_choice: the seventh
  chosen_spanish: séptimo
  alternatives_spanish:
  - séptimo día
  - el séptimo
  lexicon: HALOT
  rationale: Es el ordinal que modifica 'día'; 'séptimo' conserva el sentido directo del hebreo y encaja con el registro legal-litúrgico.
- source_word: מִקְרָא קֹדֶשׁ
  english_pob_choice: a holy convocation
  chosen_spanish: una convocación santa
  alternatives_spanish:
  - una asamblea santa
  - una asamblea sagrada
  - una convocación sagrada
  lexicon: HALOT
  rationale: El hebreo nombra una reunión solemnemente convocada. 'Convocación' preserva mejor el matiz de llamada/reunión formal que 'asamblea', y 'santa' mantiene el valor cultual de קֹדֶשׁ.
- source_word: יִהְיֶה לָכֶם
  english_pob_choice: you shall have
  chosen_spanish: tendrán
  alternatives_spanish:
  - será para ustedes
  - les corresponderá
  lexicon: HALOT
  rationale: En español, 'tendrán' expresa de forma fluida la obligación/prescripción de que el día les sea contado como tal, equivalente funcional de 'shall have' en este contexto normativo.
- source_word: כָּל מְלֶאכֶת עֲבֹדָה
  english_pob_choice: ordinary work
  chosen_spanish: ningún trabajo ordinario
  alternatives_spanish:
  - ningún trabajo de labor
  - ningún trabajo laboral
  - ninguna labor ordinaria
  lexicon: HALOT
  rationale: La POB inglesa interpreta la frase como trabajo ocupacional normal, no como toda actividad. 'Trabajo ordinario' conserva esa distinción; 'ningún' refleja bien la fuerza negativa de la construcción hebrea.
- source_word: לֹא תַעֲשׂוּ
  english_pob_choice: you shall do no
  chosen_spanish: no harán
  alternatives_spanish:
  - no harán ustedes
  - no deben hacer
  - no harán nada
  lexicon: HALOT
  rationale: En una ley cultual, el hebreo expresa prohibición normativa. 'No harán' comunica la prohibición de manera sobria y natural en español, manteniendo el tono prescriptivo.
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requirieron cambios y que hay alto acuerdo entre revisiones; esta redacción sigue de cerca el sentido del hebreo y la solución auditada en inglés, ajustándola a un español natural y publicable.
  spanish_consistency_notes:
  - Se mantiene el término cultual 'convocación' para מִקְרָא, en línea con la decisión inglesa de 'holy convocation'.
  - '''Trabajo ordinario'' preserva la restricción de מְלֶאכֶת עֲבֹדָה sin introducir el arcaísmo ''servil''.'
  - No se usa 'SEÑOR' ni terminología de sustitución divina, ya que este versículo no contiene el nombre divino.
  - La negación normativa se expresa con una construcción natural en español sin debilitar el carácter legal del mandato.
