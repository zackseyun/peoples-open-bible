translation:
  language: es
  text: Y aquel día cayeron tres mil hombres de entre los extranjeros[a]; y Jonatán volvió a Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tres mil hombres». La expresión griega puede indicar el total alcanzado, más que una aproximación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔπεσον
  english_pob_choice: fell
  chosen_spanish: cayeron
  alternatives_spanish:
  - fueron muertos
  - murieron
  lexicon: BDAG
  rationale: En contexto de combate, el verbo griego conserva el modismo de bajas militares. «Cayeron» mantiene ese registro breve y directo en español sin especificar más de lo que dice el texto.
- source_word: ἐκ τῶν ἀλλοφύλων
  english_pob_choice: of the foreigners
  chosen_spanish: de los extranjeros
  alternatives_spanish:
  - de los forasteros
  - de los enemigos extranjeros
  lexicon: LEH
  rationale: ἀλλόφυλοι designa literalmente a los de otro pueblo/linaje. En este contexto no se debe importar «filisteos» si el griego no lo nombra; «extranjeros» preserva la referencia amplia y la tensión lexical del original.
- source_word: ἐν τῇ ἡμέρᾳ ἐκείνῃ
  english_pob_choice: on that day
  chosen_spanish: aquel día
  alternatives_spanish:
  - en aquel día
  lexicon: BDAG
  rationale: Es la equivalencia idiomática natural en español para la expresión temporal griega, sin perder el énfasis demostrativo.
- source_word: εἰς ἄνδρας τρισχιλίους
  english_pob_choice: three thousand men
  chosen_spanish: tres mil hombres
  alternatives_spanish:
  - tres mil varones
  - tres mil hombres exactamente
  lexicon: LEH
  rationale: La construcción con εἰς puede indicar resultado total. Dado que la revisión inglesa eliminó la aproximación, «tres mil hombres» reproduce el número de forma directa y pública, sin añadir «aproximadamente».
- source_word: ἐπέστρεψεν
  english_pob_choice: returned
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  - volvió de regreso
  lexicon: BDAG
  rationale: En un contexto de desplazamiento, «volvió» es un equivalente natural y fiel; evita una rigidez innecesaria y conserva el sentido de retorno a un lugar.
- source_word: Ἰωναθάν
  english_pob_choice: Jonathan
  chosen_spanish: Jonatán
  alternatives_spanish:
  - Jonathan
  lexicon: transliteration
  rationale: Se usa la forma castellana habitual del nombre propio para una lectura eclesial amplia y fluida.
- source_word: Ἰερουσαλήμ
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalem
  lexicon: transliteration
  rationale: Se emplea la forma castellana estándar del topónimo.
translation_notes:
  revision_awareness: La revisión inglesa más reciente eliminó «about» porque el griego presenta el número sin marcador de aproximación. Esta versión española sigue esa decisión y mantiene la lectura de bajas en combate con el verbo «cayeron».
  spanish_consistency_notes:
  - Se conserva el registro breve y militar del relato.
  - No se introdujo «filisteos» ni otra identificación étnica más específica que la que permite ἀλλοφύλων.
  - 'Los nombres propios siguen la forma usual en español bíblico: Jonatán y Jerusalén.'
