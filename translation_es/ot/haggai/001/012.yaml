translation:
  language: es
  text: Entonces Zorobabel hijo de Salatiel, y Josué hijo de Josadac, el sumo sacerdote, y todo el remanente[a] del pueblo escucharon la voz de Yahvé su Dios y las palabras de Hageo el profeta, como[b] Yahvé su Dios lo había enviado; y el pueblo tuvo temor delante de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el resto del pueblo»; «remanente» conserva la resonancia profética de la comunidad preservada.
    reason: lexical_alternative
  - marker: b
    text: O «porque»; el hebreo también puede entenderse con valor causal, aunque «como» sigue de cerca la relación sintáctica.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׁמַע
  english_pob_choice: listened
  chosen_spanish: escucharon
  alternatives_spanish:
  - oyeron
  - obedecieron
  lexicon: HALOT
  rationale: שׁמע puede significar oír, escuchar o atender con obediencia. En este contexto, con la respuesta posterior de temor reverente, «escucharon» conserva la idea de recepción atenta sin convertirla explícitamente en obediencia.
- source_word: זְרֻבָּבֶל
  english_pob_choice: Zerubbabel
  chosen_spanish: Zorobabel
  alternatives_spanish:
  - Zorobabel
  - Zerubabel
  lexicon: transliteración tradicional en español
  rationale: En español bíblico es común la forma «Zorobabel». Mantiene la identificación del nombre propio sin forzar la grafía inglesa.
- source_word: שַׁלְתִּיאֵל
  english_pob_choice: Shealtiel
  chosen_spanish: Salatiel
  alternatives_spanish:
  - Shealtiel
  lexicon: transliteración tradicional en español
  rationale: La forma española asentada es «Salatiel», más natural para lectores bíblicos en español y equivalente al nombre hebreo del texto.
- source_word: יְהוֹשֻׁעַ
  english_pob_choice: Joshua
  chosen_spanish: Josué
  alternatives_spanish:
  - Jesúa
  lexicon: transliteración tradicional en español
  rationale: El hebreo aquí es יְהוֹשֻׁעַ, que corresponde de manera directa a «Josué». «Jesúa» reflejaría otra forma hebrea abreviada que no aparece en este versículo.
- source_word: יְהוֹצָדָק
  english_pob_choice: Jehozadak
  chosen_spanish: Josadac
  alternatives_spanish:
  - Jehozadac
  lexicon: transliteración tradicional en español
  rationale: «Josadac» es la forma española tradicional del nombre propio y resulta más reconocible en este contexto bíblico.
- source_word: הַכֹּהֵן הַגָּדוֹל
  english_pob_choice: the high priest
  chosen_spanish: el sumo sacerdote
  alternatives_spanish:
  - el gran sacerdote
  lexicon: uso bíblico español
  rationale: «Sumo sacerdote» es la expresión española estable para este título. «Gran sacerdote» sería demasiado literal y menos natural.
- source_word: שְׁאֵרִית הָעָם
  english_pob_choice: the remnant of the people
  chosen_spanish: el remanente del pueblo
  alternatives_spanish:
  - el resto del pueblo
  - el remanente sobreviviente del pueblo
  lexicon: HALOT
  rationale: «Remanente» conserva la carga profética del término, no solo la idea numérica de los que quedaron. Se mantiene la resonancia teológica del texto.
- source_word: בְּקוֹל יְהוָה
  english_pob_choice: to the voice of Yahweh
  chosen_spanish: la voz de Yahvé
  alternatives_spanish:
  - la voz del SEÑOR
  - la voz de Yahveh
  lexicon: HALOT
  rationale: Se conserva «Yahvé» según el estándar del proyecto para el Tetragrámaton. Con «escuchar la voz de» la construcción española fluye naturalmente y refleja el idioma hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Yahveh
  lexicon: convención del proyecto
  rationale: Se sigue la política del proyecto de usar «Yahvé» para יְהוָה, en lugar de sustituirlo por un título.
- source_word: דִּבְרֵי חַגַּי הַנָּבִיא
  english_pob_choice: the words of Haggai the prophet
  chosen_spanish: las palabras de Hageo el profeta
  alternatives_spanish:
  - el mensaje de Hageo el profeta
  lexicon: HALOT
  rationale: «Palabras» conserva el paralelo con «la voz de Yahvé» y respeta el plural del hebreo. «Hageo» es la forma española usual del nombre del profeta.
- source_word: כַּאֲשֶׁר שְׁלָחוֹ יְהוָה אֱלֹהֵיהֶם
  english_pob_choice: as Yahweh their God had sent him
  chosen_spanish: como Yahvé su Dios lo había enviado
  alternatives_spanish:
  - porque Yahvé su Dios lo había enviado
  - puesto que Yahvé su Dios lo había enviado
  lexicon: HALOT
  rationale: «Como» reproduce con bastante cercanía el valor de כַּאֲשֶׁר tal como fue revisado en el audit trail. «Porque» explicaría más de lo necesario; «como» permite entender la relación sin convertirla en causa explícita.
- source_word: וַיִּירְאוּ
  english_pob_choice: feared
  chosen_spanish: temió
  alternatives_spanish:
  - tuvo miedo
  - estuvo en reverente temor
  lexicon: HALOT
  rationale: «Temió» mantiene la ambivalencia bíblica de temor y reverencia, sin resolverla por completo en una sola dirección. En español suena solemne y fiel al registro profético.
- source_word: מִפְּנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: «Delante de Yahvé» es una forma idiomática natural en español bíblico para expresar la postura reverente ante Dios, sin perder el matiz espacial del hebreo.
theological_decisions:
- issue: Valor de שְׁאֵרִית en contexto profético
  english_pob_reading: the remnant of the people
  chosen_spanish_reading: el remanente del pueblo
  alternative_spanish_readings:
  - el resto del pueblo
  rationale: '«Remanente» conserva el peso teológico del término en los profetas: no solo los que quedaron, sino la comunidad preservada por Dios. Esto sigue la tensión documentada por el audit trail.'
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave)
- issue: Relación entre escuchar la voz de Yahvé y las palabras del profeta
  english_pob_reading: listened to the voice of Yahweh their God and to the words of Haggai the prophet
  chosen_spanish_reading: escucharon la voz de Yahvé su Dios y las palabras de Hageo el profeta
  alternative_spanish_readings:
  - oyeron la voz...
  - obedecieron la voz...
  rationale: «Escucharon» conserva la respuesta receptiva sin añadir la obediencia explícita que no está lexicalizada de forma necesaria en el verbo. Así se preserva la tensión entre oír y atender.
  doctrine_reference: Translation philosophy §3 (preservar la tensión teológica)
- issue: Forma de renderizar el Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahveh
  rationale: Se sigue la directriz del proyecto para traducir יְהוָה como «Yahvé», manteniendo el nombre propio divino en lugar de una sustitución titulativa.
  doctrine_reference: Norma terminológica del proyecto para יְהוָה
translation_notes:
  revision_awareness: El audit trail en inglés revisó «just as» a «as» para hacer más directa la relación de כַּאֲשֶׁר. En español, «como» ofrece una equivalencia natural y suficientemente cercana para esa relación, mientras que se conservaron los demás rasgos estables de la revisión reciente.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme a la norma del proyecto para יְהוָה.
  - Se usaron formas españolas tradicionales y ampliamente reconocibles para los nombres propios bíblicos.
  - «Remanente» y «temió» preservan la terminología profética y la ambivalencia reverente del hebreo.
  - La sintaxis sigue el orden del hebreo de manera legible en español sin calco rígido.
