revisions:
- from: No encenderán fuego en ninguna de sus moradas[a] en el día del sábado.
  to: No enciendan fuego en ninguna de sus moradas[a] el día de sábado.
  rationale: Se ajusta el verbo a una prohibición natural en español («No enciendan») y se mejora la fluidez temporal sin perder el elemento explícito «día» del hebreo («el día de sábado»). Se conserva «moradas» por su amplitud semántica y tono apropiado.
