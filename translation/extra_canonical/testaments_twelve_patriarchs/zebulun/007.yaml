theological_decisions:
- issue: Divine reciprocity in compassion language
  chosen_reading: Render the chapter's repeated pattern as reciprocal compassion between humans and the Lord without softening it.
  alternative_readings:
  - Generalize to 'God blesses the kind'
  - Reduce to impersonal moral causality
  rationale: 'The Greek presents a strong moral-theological reciprocity: as one shows compassion, so the Lord shows compassion. This should remain explicit rather than diluted into generic ethics.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Reference to Beliar
  chosen_reading: Translate Beliar as a personal hostile spiritual power in line with the testament tradition.
  alternative_readings:
  - Treat as a mere abstraction for wickedness
  - Normalize to 'the devil'
  rationale: The Greek witness uses the proper name/formula of the testament tradition. Translating it directly preserves the text's demonological framework without importing later harmonization.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 4
- issue: Potentially expanded closing burial notices
  chosen_reading: Translate the burial conclusion straightforwardly and note its formulaic character rather than omitting it.
  alternative_readings:
  - Excise as secondary expansion
  - Compress as editorial summary
  rationale: Even if formulaic, the closing notices belong to the transmitted chapter and should be translated honestly, with transparency rather than silent pruning.
  doctrine_reference: PHILOSOPHY.md 'translate what is in the source text honestly'
