revisions:
- from: cuando todo Israel venga para presentarse delante de Yahvé tu Dios en el lugar que él escoja[a], leerás esta ley delante de todo Israel, en su presencia.
  to: cuando todo Israel venga para presentarse delante de Yahvé tu Dios en el lugar que él escoja[a], leerás esta ley delante de todo Israel, de modo que lo oiga.
  rationale: 'Se corrige el cierre para reflejar el sentido auditivo de בְּאָזְנֵיהֶם con un español natural y claro: «de modo que lo oiga». Esto evita el falso sentido de mera presencia física y mantiene la función de lectura pública audible ante la asamblea. La nota existente sobre el modismo «ver el rostro» se conserva sin cambios.'
