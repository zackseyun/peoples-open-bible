translation:
  language: es
  text: para que lleves tu vergüenza y te avergüences[a] a causa de todo lo que has hecho, llegando a ser consuelo para ellas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando las consueles»; o «al consolarlas». La expresión hebrea admite más de una relación cercana entre el consuelo y la vergüenza.'
    reason: alternative_reading
lexical_decisions:
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: HALOT
  rationale: Marca propósito o resultado. En español, «para que» transmite con naturalidad la fuerza final de la cláusula y conserva su valor de propósito/resulto sin sobrecargarla.
- source_word: תִּשְׂאִי
  english_pob_choice: you may bear
  chosen_spanish: lleves
  alternatives_spanish:
  - soportes
  - cargues
  lexicon: HALOT
  rationale: El verbo נשׂא aquí se usa idiomáticamente con vergüenza/deshonra. «Llevar» es una correspondencia natural en español para cargar con vergüenza, manteniendo la imagen de portar una carga pública.
- source_word: כְלִמָּתֵךְ
  english_pob_choice: your disgrace
  chosen_spanish: tu vergüenza
  alternatives_spanish:
  - tu deshonra
  - tu oprobio
  lexicon: HALOT
  rationale: כְּלִמָּה puede abarcar vergüenza, deshonra u oprobio. «Vergüenza» comunica bien el efecto social y personal en español, aunque «deshonra» conserva más explícitamente el matiz público de honor.
- source_word: וְנִכְלַמְתְּ
  english_pob_choice: and be ashamed
  chosen_spanish: te avergüences
  alternatives_spanish:
  - te humilles
  - seas avergonzada
  lexicon: HALOT
  rationale: El nifal de כלם expresa quedar avergonzada o humillada. «Te avergüences» preserva el sentido resultativo y es más idiomático que una construcción más literal con pasivo.
- source_word: מִכֹּל אֲשֶׁר עָשִׂית
  english_pob_choice: because of all that you have done
  chosen_spanish: a causa de todo lo que has hecho
  alternatives_spanish:
  - por todo lo que has hecho
  - debido a todo lo que has hecho
  lexicon: HALOT
  rationale: La preposición מִן tras un verbo de vergüenza puede marcar causa u ocasión. «A causa de» expresa claramente la relación causal que el audit trail inglés también privilegia.
- source_word: בְּנַחֲמֵךְ אֹתָן
  english_pob_choice: becoming a comfort to them
  chosen_spanish: llegando a ser consuelo para ellas
  alternatives_spanish:
  - cuando consuelas a ellas
  - al consolarlas
  lexicon: HALOT
  rationale: El giro con בְּנַחֲמֵךְ es circunstancial y admite más de una lectura cercana. «Llegando a ser consuelo para ellas» conserva la idea de una condición concomitante de restauración sin fijar de manera excesiva si el matiz es temporal («cuando») o instrumental («al/por consolarlas»).
- source_word: אֹתָן
  english_pob_choice: to them
  chosen_spanish: para ellas
  alternatives_spanish:
  - a ellas
  - las
  lexicon: HALOT
  rationale: El pronombre retoma a las ciudades/hermanas femeninas del contexto. «Para ellas» se ajusta al sintagma «consuelo para» y mantiene el referente femenino plural.
theological_decisions:
- issue: Relación de la vergüenza de Jerusalén con su papel de consuelo para las otras ciudades/mujeres
  english_pob_reading: Jerusalem's shame is intensified in the circumstance that she becomes a comfort to them.
  chosen_spanish_reading: La vergüenza se intensifica precisamente porque Jerusalén llega a ser consuelo para ellas.
  alternative_spanish_readings:
  - Jerusalén se avergüenza por haberlas consolado
  - Jerusalén se avergüenza cuando las consuela
  rationale: En el contexto de Ezequiel 16:53-55, la restauración incluye a Jerusalén junto con Sodoma y Samaria, y el giro con בְּנַחֲמֵךְ debe conservar su ambigüedad cercana. La formulación española deja abierta la relación exacta entre consuelo y vergüenza, sin resolverla artificialmente y respetando la tensión del oráculo.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de resolverla'
translation_notes:
  revision_awareness: La redacción sigue el último ajuste del POB inglés, que pasó de una formulación temporal más explícita a una más cercana al valor circunstancial de בְּנַחֲמֵךְ. En español se eligió una solución igualmente abierta («llegando a ser consuelo para ellas») para reflejar esa decisión revisada sin fijar en exceso el matiz temporal o instrumental.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar en el proyecto cuando aparezca el nombre divino; este versículo no contiene el Tetragrámaton.
  - Se mantiene «vergüenza»/«consuelo» para preservar el campo semántico del honor y la restauración.
  - Se evita «señor» o fórmulas eclesiásticas no requeridas por el hebreo.
  - El referente femenino plural de אֹתָן se conserva con «ellas» para concordar con el contexto de las ciudades/personificaciones femeninas.
