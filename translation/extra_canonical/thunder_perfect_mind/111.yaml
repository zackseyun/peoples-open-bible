    reach.”
- source_word: ⲁⲧⲉⲧⲛⲉⲛⲉⲩ (segmentation uncertain)
  chosen: cannot seize
  alternatives:
  - cannot grasp
  - cannot comprehend
  lexicon: Uncertain segmentation; see alignment note
  rationale: The string appears to encode a negated potential aimed at capacity/attainment.
