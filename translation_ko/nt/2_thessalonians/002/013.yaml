id: 2TH.2.13
reference: 2 Thessalonians 2:13
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ἡμεῖς δὲ ὀφείλομεν εὐχαριστεῖν τῷ θεῷ πάντοτε περὶ ὑμῶν, ἀδελφοὶ ἠγαπημένοι ὑπὸ κυρίου, ὅτι εἵλατο ὑμᾶς ὁ θεὸς ⸀ἀπαρχὴν εἰς σωτηρίαν ἐν ἁγιασμῷ πνεύματος καὶ πίστει ἀληθείας,
base_translation:
  language: en
  yaml_path: translation/nt/2_thessalonians/002/013.yaml
  text: But we ought always to give thanks to God for you[a], brothers beloved by the Lord, because God chose you as firstfruits for salvation through sanctification by the Spirit and faith in the truth[b],
translation:
  language: ko
  text: 그러나 주의 사랑을 받은 형제[b] 여러분, 우리는 여러분에 대해 언제나 하나님께 감사드려야 합니다. 하나님께서 여러분을 첫 열매[a]로 택하셔서, 성령으로 거룩하게 하심과 진리에 대한 믿음을 통해 구원에 이르게 하셨기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는, 일부 사본에서는 「처음부터」(ἀπ’ ἀρχῆς). 본문은 SBLGNT의 「첫 열매」(ἀπαρχήν)를 따른다.
    reason: textual_variant
  - marker: b
    text: 헬라어 ἀδελφοί는 남성 복수 호격이며, 회중 전체를 대표적으로 가리킨다.
    reason: cultural_note
lexical_decisions:
- source_word: Ἡμεῖς δὲ
  english_pob_choice: But we
  chosen_korean: 그러나 우리는
  alternatives_korean:
  - 우리로서는
  - 한편 우리는
  lexicon: BDAG
  rationale: 강조 대명사 Ἡμεῖς + δέ의 대조를 「그러나 우리는」으로 자연스럽게 표현한다.
- source_word: ἀδελφοὶ ἠγαπημένοι ὑπὸ κυρίου
  english_pob_choice: brothers beloved by the Lord
  chosen_korean: 주의 사랑을 받은 형제 여러분
  alternatives_korean:
  - 주께 사랑받은 형제 여러분
  - 주의 사랑하시는 형제 여러분
  lexicon: BDAG
  rationale: 완료 수동분사의 지속 상태를 「사랑을 받은」으로 자연스럽게 표현한다. 호격을 「여러분」으로 합쇼체에 맞게 보충.
- source_word: εἵλατο
  english_pob_choice: chose
  chosen_korean: 택하셔서
  alternatives_korean:
  - 선택하셔서
  - 친히 택하셔서
  lexicon: BDAG
  rationale: 중간태 αἱρέομαι의 능동적 신적 선택을 「택하시다」로 옮긴다.
- source_word: ἀπαρχὴν
  english_pob_choice: as firstfruits
  chosen_korean: 첫 열매로
  alternatives_korean:
  - 첫 수확으로
  - 처음 익은 열매로
  lexicon: BDAG
  rationale: SBLGNT 사본 채택. 한국 성경 전통의 「첫 열매」가 정착되어 있다.
- source_word: εἰς σωτηρίαν
  english_pob_choice: for salvation
  chosen_korean: 구원에 이르게 하셨기
  alternatives_korean:
  - 구원을 위해
  - 구원을 향해
  lexicon: BDAG
  rationale: εἰς의 목적/결과를 「~에 이르게 하다」 결과적 표현으로 자연스럽게 옮긴다.
- source_word: ἐν ἁγιασμῷ πνεύματος
  english_pob_choice: through sanctification by the Spirit
  chosen_korean: 성령으로 거룩하게 하심
  alternatives_korean:
  - 성령으로 인한 거룩하게 하심
  - 영의 거룩하게 하심
  lexicon: BDAG
  rationale: 정황상 πνεῦμα를 성령으로 본다. 「거룩하게 하심」으로 ἁγιασμός를 자연스럽게 표현한다.
- source_word: καὶ πίστει ἀληθείας
  english_pob_choice: and faith in the truth
  chosen_korean: 진리에 대한 믿음
  alternatives_korean:
  - 진리에의 믿음
  - 진리의 믿음
  lexicon: BDAG
  rationale: 객관적 속격 — 진리를 향한/대한 믿음. 「믿음」은 표준 글로서리.
theological_decisions:
- issue: πνεύματος의 의미(성령 vs 인간 영)
  chosen_reading: 성령
  alternative_readings:
  - 인간의 영
  rationale: 바울의 구원론적 정황에서 거룩하게 하심은 성령에게 귀속된다. 한국어에서는 「영」을 대문자화할 수 없으므로 「성령」으로 명시하되, 본 결정을 신학_결정에 문서화한다.
  doctrine_reference: 'KOREAN_PIPELINE Glossary: πνεῦμα (divine) → 성령'
- issue: εἵλατο ὑμᾶς ὁ θεὸς의 신학적 함의
  chosen_reading: 「하나님께서 여러분을 택하셨다」 — 직역적 의미 보존
  alternative_readings:
  - 「임명하셨다」
  - 「자신의 것으로 삼으셨다」
  rationale: 신적 선택의 어휘적 의미를 보존하되, 본문이 진술한 것을 넘어 특정 교파적 선택론을 도입하지 않는다.
  doctrine_reference: 'Translation does not advocate denominational distinctives unless Greek supports unambiguously'
