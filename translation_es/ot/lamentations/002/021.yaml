review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la escena central y la atribución directa a Dios: jóvenes/ancianos en las calles, caída a espada, y la secuencia ''mataste... degollaste'' / ''sin piedad''. Sin embargo, hay un desajuste léxico importante en וּבַחוּרַי: el hebreo especifica varones jóvenes, mientras que ''mis jóvenes'' en español queda demasiado amplio y puede incluir mujeres, especialmente junto a ''mis vírgenes''.'
  spanish_quality_summary: El español es generalmente claro y digno. 'Yacen en el suelo, en las calles' suena natural, aunque la coma no es necesaria. 'Los degollaste' es fuerte y comprensible, pero conviene ajustar 'mis jóvenes' a una forma explícitamente masculina para preservar el paralelismo y evitar ambigüedad. Las notas están bien formadas y ancladas.
  glossary_alignment: 'No hay conflicto con la terminología troncal del proyecto. La principal cuestión léxica es de precisión contextual: בְּתוּלֹתַי se preserva correctamente como ''mis vírgenes'' con nota alternativa; בָּחוּרַי debe reflejar ''mis jóvenes varones'' / ''mis jóvenes hombres'' / ''mis hombres jóvenes'', no el genérico ''mis jóvenes''.'
  issues:
  - severity: medium
    issue: '''mis jóvenes'' no preserva la referencia masculina de וּבַחוּרַי'
    rationale: בָּחוּר designa jóvenes varones en la flor de la vida. En español, 'jóvenes' es mixto o ambiguo; junto a 'mis vírgenes' borra el contraste femenino/masculino presente en el hebreo y en el POB inglés ('my young men').
  - severity: low
    issue: Puntuación algo innecesaria en 'en el suelo, en las calles'
    rationale: 'Sin la coma, la línea fluye mejor en español: ''yacen en el suelo en las calles''. No afecta el sentido, pero mejora la naturalidad.'
  revised_spanish_text: Jóvenes y ancianos yacen en el suelo en las calles[a]; mis vírgenes y mis hombres jóvenes han caído a espada. Los mataste en el día de tu ira[b]; los degollaste sin piedad.
  revised_footnotes:
