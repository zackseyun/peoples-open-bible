translation:
  language: es
  text: un macho cabrío para una ofrenda por el pecado;
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: שְׂעִיר עִזִּים
  english_pob_choice: male goat
  chosen_spanish: macho cabrío de las cabras
  alternatives_spanish:
  - macho cabrío
  - cabro
  - chivo macho
  lexicon: HALOT
  rationale: La frase hebrea designa un macho de la especie caprina; en español, «macho cabrío» conserva el rasgo masculino y el matiz sacrificial. Añadir «de las cabras» refleja el constructo hebreo y evita perder la referencia específica del rebaño.
- source_word: אֶחָד
  english_pob_choice: one
  chosen_spanish: un
  alternatives_spanish:
  - uno
  - un solo
  lexicon: HALOT
  rationale: El numeral se expresa naturalmente como artículo numeral en español, manteniendo la cuenta formal de la ofrenda sin sobrecargar el estilo.
- source_word: לְחַטָּאת
  english_pob_choice: for a sin offering
  chosen_spanish: para expiación
  alternatives_spanish:
  - para una ofrenda por el pecado
  - como ofrenda por el pecado
  lexicon: HALOT
  rationale: En contexto sacrificial, חַטָּאת puede referirse a la ofrenda expiatoria. «Expiación» conserva el valor cultual y resulta idiomático en español bíblico; evita reducirlo a «pecado» abstracto.
theological_decisions:
- issue: Sentido cultual de חַטָּאת
  english_pob_reading: for a sin offering
  chosen_spanish_reading: para expiación
  alternative_spanish_readings:
  - para una ofrenda por el pecado
  - como ofrenda por el pecado
  rationale: La lista de Números 7 enumera ofrendas rituales. En español, «expiación» comunica el acto/ofrecimiento expiatorio sin confundirlo con el pecado mismo, aunque la alternativa más explícita mantiene el sustantivo «ofrenda».
  doctrine_reference: Levítico 4; Números 7
translation_notes:
  revision_awareness: El pasaje coincide con la lectura inglesa aprobada y no requiere revisión textual; la única decisión relevante es la naturalización de la terminología sacrificial en español.
  spanish_consistency_notes:
  - 'Se mantiene el conteo singular de la ofrenda: «un».'
  - No se introduce terminología eclesiástica ajena al contexto sacrificial.
  - «Expiación» se usa aquí como equivalente cultual breve de חַטָּאת, no como abstracción doctrinal independiente.
