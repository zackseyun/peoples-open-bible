translation:
  language: es
  text: Si son honestos[a], que uno de sus hermanos quede confinado[b] en el lugar donde están bajo custodia, y ustedes[c], vayan y lleven grano para la hambruna de sus hogares.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «si son hombres veraces». El adjetivo hebreo también puede traducirse más formalmente como «verdaderos» o «veraces».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «en la casa de su custodia».
    reason: lexical_alternative
  - marker: c
    text: O «y ustedes vayan, lleven grano para la hambruna de sus hogares».
    reason: previous_rendering
lexical_decisions:
- source_word: כֵּנִים
  english_pob_choice: honest
  chosen_spanish: honestos
  alternatives_spanish:
  - veraces
  - sinceros
  - verdaderos
  lexicon: HALOT
  rationale: El hebreo apunta a la cualidad de decir la verdad en un contexto de prueba judicial/interrogatorio. «Honestos» es natural en español moderno y conserva bien la idea de integridad veraz sin volver la frase arcaica o demasiado literal.
- source_word: אֲחִיכֶם אֶחָד
  english_pob_choice: one of your brothers
  chosen_spanish: uno de vuestros hermanos
  alternatives_spanish:
  - vuestro hermano uno
  - un hermano vuestro
  lexicon: HALOT
  rationale: 'La construcción hebrea es partitiva: un solo miembro entre varios hermanos. «Uno de vuestros hermanos» preserva ese sentido de manera clara y idiomática.'
- source_word: יֵאָסֵר
  english_pob_choice: be confined
  chosen_spanish: quedará confinado
  alternatives_spanish:
  - será encerrado
  - será preso
  - quedará preso
  lexicon: HALOT
  rationale: El nifal de אסר aquí describe restricción/custodia. «Quedará confinado» mantiene el matiz de detención sin cargar la frase con una especificidad penal mayor que la que exige el contexto.
- source_word: בְּבֵית מִשְׁמַרְכֶם
  english_pob_choice: in your place of custody
  chosen_spanish: en la casa de vuestra custodia
  alternatives_spanish:
  - en vuestro lugar de custodia
  - en la casa de vuestro arresto
  - en vuestra prisión
  lexicon: HALOT
  rationale: La imagen hebrea es literalmente «casa de custodia/guardia». Se conserva la metáfora institucional con «casa de vuestra custodia», que suena publicable en español y evita introducir «prisión» si el texto no la explicita.
- source_word: לְכוּ
  english_pob_choice: you go
  chosen_spanish: vosotros, id
  alternatives_spanish:
  - id
  - vosotros id
  - andad
  lexicon: HALOT
  rationale: El pronombre explícito marca contraste con el hermano que queda retenido. En español, «vosotros, id» reproduce ese énfasis de manera natural y mantiene la separación retórica.
- source_word: הָבִיאוּ
  english_pob_choice: bring
  chosen_spanish: traed
  alternatives_spanish:
  - llevad
  - traed de vuelta
  - conducid
  lexicon: HALOT
  rationale: El verbo hifil expresa la acción de llevar/proveer lo necesario de vuelta. «Traed» es la solución directa y idiomática en español bíblico moderno.
- source_word: שֶׁבֶר
  english_pob_choice: grain
  chosen_spanish: grano
  alternatives_spanish:
  - trigo
  - alimento
  - provisiones
  lexicon: HALOT
  rationale: En el relato de José, שֶׁבֶר designa víveres comprados en tiempo de hambre, especialmente grano. «Grano» conserva la especificidad agrícola sin forzar una lectura más estrecha que «trigo».
- source_word: רַעֲבוֹן
  english_pob_choice: for the famine
  chosen_spanish: para el hambre
  alternatives_spanish:
  - para la hambruna
  - por el hambre
  - a causa del hambre
  lexicon: HALOT
  rationale: El sustantivo expresa hambre intensa/hambruna. «Para el hambre» sigue de cerca la relación constructa del hebreo y resulta comprensible en español, sin convertirlo en una paráfrasis interpretativa.
- source_word: בָּתֵּיכֶם
  english_pob_choice: your households
  chosen_spanish: vuestras casas
  alternatives_spanish:
  - vuestras familias
  - vuestros hogares
  - vuestras casas y los vuestros
  lexicon: HALOT
  rationale: Aunque el sentido incluye a los dependientes del hogar, el hebreo dice literalmente «vuestras casas». «Vuestras casas» preserva mejor la imagen textual que una equivalencia más explicativa como «familias».
translation_notes:
  revision_awareness: La revisión inglesa reciente osciló entre una formulación más dinámica («your hungry households») y una más literal («the famine of your households»). La redacción española sigue la lectura más cercana al hebreo, manteniendo el paralelismo y la relación constructa de רַעֲבוֹן בָּתֵּיכֶם, pero con sintaxis natural en español.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se prefirió «grano» para שֶׁבֶר en coherencia con el relato de José y con el uso habitual del término en contexto de compra de provisiones.
  - «Casa de vuestra custodia» conserva la imagen del hebreo sin sustituirla por un término institucional más moderno que podría estrechar indebidamente el sentido.
