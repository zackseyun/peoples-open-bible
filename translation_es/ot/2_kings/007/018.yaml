base_translation:
  language: en
  yaml_path: translation/ot/2_kings/007/018.yaml
  text: And it happened just as the man of God had spoken to the king[a], saying, “Two seahs of barley for a shekel, and one seah of fine flour for a shekel[b], will be about this time tomorrow in the gate of Samaria.”
  footnotes:
  - marker: a
    text: 'A seah was an ancient dry measure. The Hebrew names the units directly: two seahs of barley and one seah of fine flour.'
    reason: cultural_note
  - marker: b
    text: Or “at the gate of Samaria.” The city gate was the public place of trade and judgment.
    reason: lexical_alternative
