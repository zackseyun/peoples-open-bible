translation:
  language: es
  text: Mi alma te ha deseado en la noche[a]; sí, mi espíritu dentro de mí te busca temprano. Porque cuando tus juicios[b] están en la tierra, los habitantes del mundo aprenden rectitud[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «te busca con empeño» o «te busca al alba»; el verbo hebreo sugiere buscar temprano y, por extensión, buscar con ardor.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «tus juicios están en la tierra».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «aprenden justicia».'
    reason: lexical_alternative
lexical_decisions:
- source_word: נַפְשִׁי
  english_pob_choice: My soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - mi ser interior
  - yo
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí señala la vida interior, el impulso personal y afectivo del hablante. En español, 'alma' conserva el paralelismo poético con 'espíritu' y mantiene la fuerza antropológica sin reducirlo a un simple pronombre.
- source_word: אִוִּיתִיךָ
  english_pob_choice: has desired you
  chosen_spanish: te ha deseado
  alternatives_spanish:
  - te ha anhelado
  - te ha anhelado con fervor
  lexicon: HALOT
  rationale: El verbo expresa un deseo intenso y sostenido. 'Te ha deseado' respeta el valor de perfecto y la intensidad del anhelo; 'anhelado' es posible, pero 'deseado' sigue de cerca la decisión inglesa sin sonar forzado en español.
- source_word: בַּלַּיְלָה
  english_pob_choice: in the night
  chosen_spanish: en la noche
  alternatives_spanish:
  - de noche
  - durante la noche
  lexicon: HALOT
  rationale: La frase es directa y poética. 'En la noche' conserva la referencia temporal y la cadencia del paralelismo con la línea siguiente.
- source_word: רוּחִי בְקִרְבִּי
  english_pob_choice: my spirit within me
  chosen_spanish: mi espíritu dentro de mí
  alternatives_spanish:
  - mi espíritu en mí
  - el espíritu dentro de mí
  lexicon: HALOT
  rationale: רוּחַ se traduce mejor aquí como 'espíritu' por el paralelismo con נֶפֶשׁ y el sentido interior del sujeto. 'Dentro de mí' expresa bien בְקִרְבִּי sin perder naturalidad en español.
- source_word: אֲשַׁחֲרֶךָּ
  english_pob_choice: seeks you early
  chosen_spanish: te busca temprano
  alternatives_spanish:
  - te busca al alba
  - te busca con empeño
  lexicon: HALOT
  rationale: El verbo lleva la idea de buscar al amanecer y, por extensión, buscar con diligencia. 'Temprano' preserva la imagen horaria de la raíz y permite que el matiz de empeño quede disponible en el contexto y en la nota.
- source_word: מִשְׁפָּטֶיךָ
  english_pob_choice: your judgments
  chosen_spanish: tus juicios
  alternatives_spanish:
  - tus decisiones judiciales
  - tus actos de juicio
  lexicon: HALOT
  rationale: מִשְׁפָּט en este contexto cubre decisiones/juicios de Dios, con matiz judicial. 'Juicios' es la forma más natural y suficientemente precisa en español; 'justicias' sería menos directo aquí.
- source_word: לָאָרֶץ
  english_pob_choice: are in the earth
  chosen_spanish: están en la tierra
  alternatives_spanish:
  - están sobre la tierra
  - llegan a la tierra
  lexicon: HALOT
  rationale: La revisión inglesa prefirió una forma más literal. 'Están en la tierra' refleja la locución hebrea con sencillez y sin añadir el matiz de movimiento que el hebreo no exige.
- source_word: צֶדֶק
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justeza
  lexicon: HALOT
  rationale: Aunque 'righteousness' puede traducirse como 'justicia' o 'rectitud', en este contexto el contraste con los juicios divinos y la enseñanza moral universal favorece 'justicia'. Se preserva así la tensión léxica sin imponer una sola glosa técnica.
- source_word: לָמְדוּ
  english_pob_choice: learn
  chosen_spanish: aprenden
  alternatives_spanish:
  - han aprendido
  - llegan a aprender
  lexicon: HALOT
  rationale: El perfecto hebreo funciona aquí como verdad general o gnómica. El presente español 'aprenden' transmite mejor esa generalidad que un pasado perfecto en castellano.
- source_word: יֹשְׁבֵי תֵבֵל
  english_pob_choice: the inhabitants of the world
  chosen_spanish: los habitantes del mundo
  alternatives_spanish:
  - los que habitan el mundo
  - los moradores del mundo
  lexicon: HALOT
  rationale: La expresión designa a la población humana de la tierra habitable. 'Los habitantes del mundo' es natural, universal y conserva el alcance de תֵבֵל.
theological_decisions:
- issue: צֶדֶק como virtud aprendida bajo los juicios de Yahvé
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  rationale: La línea final presenta el resultado moral de la presencia de los juicios divinos en la tierra. 'Justicia' mantiene la dimensión ética y relacional del término y funciona bien con 'aprenden'. Se preserva la posibilidad de 'rectitud' en la decisión léxica, pero no se la impone al texto principal.
  doctrine_reference: 'DOCTRINE.md: contested terms; Hebrew צֶדֶק may overlap with δικαιοσύνη-style ethical/legal force, and Spanish should preserve the overlap where the context allows.'
- issue: Búsqueda nocturna y búsqueda temprana como paralelismo intensivo
  english_pob_reading: desired you in the night ... seeks you early
  chosen_spanish_reading: te ha deseado en la noche ... te busca temprano
  alternative_spanish_readings:
  - te ha anhelado en la noche ... te busca al alba
  - te ha deseado de noche ... te busca al amanecer
  rationale: 'El verso contrapone deseo nocturno e impulso matinal. La traducción mantiene ambos polos sin deshacer el paralelismo: el deseo permanece como estado consumado (''ha deseado'') y la búsqueda conserva la referencia temporal (''temprano'').'
  doctrine_reference: Poetic parallelism and aspect note; no doctrinal alteration.
translation_notes:
  revision_awareness: La base inglesa fue revisada de «come upon the earth» a «are in the earth» para ceñirse más al hebreo. La versión española sigue esa revisión con «están en la tierra», evitando añadir movimiento o llegada. También se respetó la decisión de mantener «righteousness» como término principal con alternativa «justice» preservada en nota, aquí reflejada como «justicia» con una nota alternativa posible en español.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' por norma del proyecto solo cuando el Tetragrama está en el texto fuente; en este versículo no aparece, por lo que no se introduce.
  - '''Espíritu'' se usa en minúscula porque se refiere al interior del hablante, no al Espíritu Santo.'
  - '''Juicios'' traduce מִשְׁפָּטֶיךָ de forma más idiomática en español que ''sentencias'' o ''actos de juicio'', sin perder el sentido judicial.'
  - Se preserva el paralelismo poético entre 'alma' y 'espíritu' con dos sustantivos internos distintos.
