  - severity: medium
    issue: Falta nota léxica para la imagen literal de לְשׁוֹן זָהָב
    rationale: El POB inglés documenta explícitamente que el hebreo dice literalmente 'lengua de oro' y que 'bar' es una interpretación funcional. El español mantiene 'barra de oro' pero no conserva esa justificación en nota.
