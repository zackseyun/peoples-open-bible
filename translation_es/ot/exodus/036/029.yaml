base_translation:
  language: en
  yaml_path: translation/ot/exodus/036/029.yaml
  text: They were paired at the bottom[a], and together they were complete at its top, to the one ring. Thus he did for both of them[c][b], for the two corners.
  footnotes:
  - marker: a
    text: Or 'matched' or 'twinned' at the bottom; the Hebrew emphasizes that the two pieces corresponded to each other structurally.
    reason: lexical_alternative
  - marker: b
    text: Or 'whole' up to its top. The sense is that each was fully joined or finished from bottom to top.
    reason: lexical_alternative
  - marker: c
    text: Or 'for the two corner pieces.' The Hebrew literally says 'for the two corners,' likely referring to the corner frames/boards.
    reason: lexical_alternative
