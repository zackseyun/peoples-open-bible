translation:
  language: es
  text: Que tus sacerdotes se vistan de rectitud[a], y que tus fieles[b] griten de alegría[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «justicia». El hebreo צֶדֶק puede llevar tanto matiz moral como judicial.
    reason: lexical_alternative
  - marker: b
    text: O «tus piadosos» o «tus santos». El hebreo se refiere a personas marcadas por lealtad y devoción al pacto.
    reason: lexical_alternative
  - marker: c
    text: O «canten de alegría». El verbo hebreo expresa regocijo vocal jubiloso.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּהֲנֶיךָ
  english_pob_choice: your priests
  chosen_spanish: tus sacerdotes
  alternatives_spanish:
  - tus ministros
  lexicon: HALOT
  rationale: כֹּהֵן designa de manera directa a un sacerdote. «Sacerdotes» conserva el referente cultual del salmo mejor que alternativas más amplias como «ministros». El sufijo de 2.ª masc. sing. se expresa naturalmente con «tus».
- source_word: יִלְבְּשׁוּ
  english_pob_choice: be clothed
  chosen_spanish: se vistan
  alternatives_spanish:
  - sean vestidos
  - lleven
  - se pongan
  lexicon: HALOT
  rationale: El verbo לבשׁ literalmente significa «vestirse / ponerse ropa». En un contexto volitivo de petición, «se vistan» comunica bien la imagen de ser revestidos, con una construcción natural en español.
- source_word: צֶדֶק
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia / rectitud
  lexicon: HALOT
  rationale: צֶדֶק puede abarcar tanto la rectitud moral como la justicia en sentido judicial. Aquí, la POB inglesa preserva esa tensión con la nota «Or 'justice'». En español, «justicia» es una opción plenamente válida y mantiene abierta la amplitud semántica sin forzar una noción meramente interior.
- source_word: וַחֲסִידֶיךָ
  english_pob_choice: your faithful ones
  chosen_spanish: tus fieles
  alternatives_spanish:
  - tus piadosos
  - tus santos
  - tus devotos
  lexicon: HALOT
  rationale: חָסִיד se refiere a quienes se caracterizan por lealtad pactal y devoción. «Fieles» comunica bien esa idea en español moderno sin cargar el término con resonancias eclesiásticas posteriores que «santos» podría sugerir.
- source_word: יְרַנֵּנוּ
  english_pob_choice: shout for joy
  chosen_spanish: griten de alegría
  alternatives_spanish:
  - canten de alegría
  - griten gozosos
  - irrumpan en júbilo
  lexicon: HALOT
  rationale: El pi‘el de רנן expresa regocijo vocal jubiloso. «Griten de alegría» conserva la intensidad sonora de la raíz y suena natural en español; «canten de alegría» es una alternativa aceptable, pero un poco más suave.
theological_decisions:
- issue: Fuerza volitiva de los imperfectos en una oración/petición
  english_pob_reading: Render as a wish/prayer with 'May ...'
  chosen_spanish_reading: 'Traducir como ruego: «Que ...» / «que ...»'
  alternative_spanish_readings:
  - Tus sacerdotes estarán vestidos ... y tus fieles gritarán de alegría
  - Ojalá tus sacerdotes se vistan ...
  rationale: En el contexto del Salmo 132, los imperfectos funcionan como deseos o peticiones, no como simple futuro. «Que» transmite en español la fuerza jussiva/orativa de manera natural y reverente.
  doctrine_reference: 'Filosofía de traducción: equivalencia óptima; preservar el sentido oracional del hebreo con español publicable.'
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo y coincide con la evaluación de alta concordancia del audit trail inglés; no se registraron revisiones aplicadas en la fuente inglesa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando el texto no requiere el Tetragrámaton explícito; aquí el versículo no lo contiene.
  - Se usa «sacerdotes» por el valor cultual específico de כֹּהֲנֶיךָ.
  - Se preserva la imagen de vestidura con una construcción natural en español («se vistan de justicia»).
  - «Fieles» evita una carga eclesiástica posterior que no está exigida por חֲסִידֶיךָ.
  - La cadencia de la línea conserva el paralelismo poético del hebreo.
