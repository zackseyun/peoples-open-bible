review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: una súplica del grupo mencionado que asciende al cielo de manera continua/intensa. Sin embargo, añade simultáneamente dos matices para ἐκτενῶς —«ferviente» y «continuamente»— cuando el audit trail inglés preserva uno en el texto principal y el otro en nota alternativa. Eso sobretraduce el adverbio.'
  spanish_quality_summary: El español es natural y digno, pero «iba subiendo» suena algo coloquial frente al tono literario del pasaje; «ascendía» o «subía» encaja mejor. Además, la nota sobre «su» no es necesaria para la lectura y la nota sobre «ferviente» debería reformularse si el texto principal cambia para no duplicar sentidos.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. «Súplica» corresponde bien a λιτανία. «al cielo» es aceptable en este contexto. El problema principal es la gestión de ἐκτενῶς: conviene elegir en el texto principal el valor de extensión/duración («continuamente») y dejar la intensidad («fervientemente») en nota, siguiendo más de cerca el POB auditado.'
  issues:
  - severity: medium
    issue: Sobretraducción de ἐκτενῶς
    rationale: El texto español usa «ferviente» y además «continuamente», incorporando a la vez intensidad y duración. El original permite ambas lecturas, pero el POB inglés escogió una para el texto principal y dejó la otra en nota.
  - severity: low
    issue: Registro de «iba subiendo»
    rationale: Aunque comunica aspecto progresivo, suena menos sobrio que «ascendía» y no mejora claramente la fidelidad.
  - severity: low
    issue: Nota innecesaria en «su»
    rationale: La referencia posesiva de τούτων queda suficientemente clara en español sin nota; mantenerla recarga el aparato sin aportar ambigüedad real.
  revised_spanish_text: Así pues, su súplica ascendía al cielo continuamente[a].
  revised_footnotes:
  - marker: a
    text: O «su súplica subía fervientemente al cielo». El adverbio griego ἐκτενῶς puede destacar intensidad («fervientemente») o extensión/duración («continuamente»).
    reason: lexical_alternative
  revision_rationale: Se elimina la sobretraducción de ἐκτενῶς, se eleva ligeramente el registro con «ascendía», y se conserva en nota la alternativa intensiva documentada en el audit trail inglés.
