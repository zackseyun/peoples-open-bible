review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el hebreo: sujeto colectivo (''las tribus de Israel''), objeto literal (''hombres''), distribución ''por/a todas las tribus de Benjamín'', fórmula introductoria ''diciendo'', y la pregunta sobre ''este mal'' ocurrido ''entre ustedes''. La única desalineación relevante está en la nota [b], que presenta ''este mal'' como alternativa cuando en realidad es la lectura principal, y añade ''esta injusticia'', que no corresponde al conjunto de alternativas documentadas en el rastro inglés.'
  spanish_quality_summary: El español principal es claro, natural y de tono digno. 'Entonces' es aceptable para el waw narrativo; 'por todas las tribus de Benjamín' suena bien y preserva la amplitud distributiva. La puntuación con dos puntos antes del discurso directo funciona, aunque con 'diciendo' también podría ir coma; no requiere cambio. La reparación necesaria está en la nota léxica para evitar redundancia/confusión.
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé, Mesías o esclavo. Las decisiones léxicas clave están bien alineadas: שִׁבְטֵי יִשְׂרָאֵל -> ''las tribus de Israel''; אֲנָשִׁים -> ''hombres''; הָרָעָה הַזֹּאת -> ''este mal''. Conviene ajustar la nota [b] para concordar con las alternativas auditadas: ''esta maldad'' o ''este agravio/este mal proceder'' sería posible en español, pero el rastro inglés conserva específicamente ''this wickedness'' y ''this wrong''.'
  issues:
  - severity: medium
    issue: La nota [b] está mal formulada y no sigue el audit trail inglés.
    rationale: 'La nota dice: ''O «este mal», «esta maldad» o «esta injusticia».'' Pero ''este mal'' no debe aparecer como alternativa porque ya es el texto principal, y ''esta injusticia'' no corresponde a las alternativas inglesas documentadas (''this wickedness'' / ''this wrong''). Esto introduce confusión editorial y una expansión semántica no auditada.'
  revised_spanish_text: 'Entonces las tribus de Israel enviaron hombres por todas las tribus de Benjamín[a], diciendo[b]: «¿Qué es este mal que ha ocurrido entre ustedes?»'
  revised_footnotes:
  - marker: a
    text: O «a todas las tribus de Benjamín». La preposición hebrea puede entenderse de manera distributiva.
    reason: lexical_alternative
  - marker: b
    text: O «esta maldad» o «este agravio».
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel al hebreo y suena natural en español. Solo se corrige la nota [b] para que no repita la lectura principal como si fuera alternativa y para alinearla con las alternativas léxicas documentadas en el POB inglés ('this wickedness' / 'this wrong'). 'Este agravio' expresa mejor en español la alternativa 'this wrong' que 'esta injusticia', sin tecnificar ni desviar el sentido.
