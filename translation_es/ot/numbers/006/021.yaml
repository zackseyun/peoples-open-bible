review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura legal del hebreo, mantiene «Yahvé» correctamente para יהוה, y refleja la secuencia principal: ley del nazareo, voto/ofrenda, capacidad económica, y obligación de cumplir conforme al voto. Sin embargo, hay dos problemas de fidelidad: (1) la nota [a] no corresponde al lugar donde el POB inglés preserva una alternativa significativa; el pie necesario aquí es para «lo que alcance su mano», no para «nazareo»; (2) «que hace voto: su ofrenda» introduce una puntuación y sintaxis algo abruptas que oscurecen que el nazareo es el que promete su ofrenda a Yahvé.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero puede sonar más natural y preciso con «que promete su ofrenda a Yahvé» en lugar de «que hace voto: su ofrenda a Yahvé». También conviene explicitar en la nota el sentido idiomático de capacidad económica para «lo que alcance su mano», ya que en español la imagen puede percibirse menos transparentemente.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יהוה -> «Yahvé» correctamente; קָרְבָּן -> «ofrenda» bien; תּוֹרָה -> «ley» aceptable en contexto jurídico. «Nazareo/nazareato» es defendible y consistente internamente. No obstante, la decisión documentada del inglés sobre la única nota léxica significativa en este versículo recae en מִלְּבַד אֲשֶׁר תַּשִּׂיג יָדוֹ, y eso debe preservarse en español.'
  issues:
  - severity: medium
    issue: La nota al pie está anclada a «nazareo» en vez de a la expresión idiomática «lo que alcance su mano».
    rationale: El rastro de auditoría inglés conserva una alternativa explícita para מִלְּבַד אֲשֶׁר תַּשִּׂיג יָדוֹ ('besides what he can afford'), no para הַנָּזִיר. En español, esa es también la zona que más necesita aclaración por posible ambigüedad idiomática.
  - severity: medium
    issue: '«Que hace voto: su ofrenda a Yahvé» suena forzado y menos claro que una construcción verbal directa.'
    rationale: אֲשֶׁר יִדֹּר קָרְבָּנוֹ לַיהוָה expresa que el nazareo promete/vota su ofrenda a Yahvé. La puntuación con dos puntos introduce una ruptura no marcada en hebreo y reduce la fluidez del español.
  - severity: low
    issue: La repetición legal del voto está bien conservada, pero puede formularse con mayor naturalidad sin perder formalidad.
    rationale: «Conforme al voto que hace» es aceptable, pero «Conforme al voto que haga» o «que ha hecho» serían opciones interpretativas. Aun así, «que hace» no es un error y puede mantenerse para cercanía formal al hebreo.
  revised_spanish_text: Esta es la ley del nazareo que promete su ofrenda a Yahvé por su nazareato, además de lo que alcance su mano[a]. Conforme al voto que hace, así hará, según la ley de su nazareato.
  revised_footnotes:
  - marker: a
    text: O «además de lo que pueda costear»; literalmente, «además de lo que su mano pueda alcanzar».
    reason: lexical_alternative
  revision_rationale: Se corrige la sintaxis para reflejar con más claridad que el nazareo promete su ofrenda a Yahvé, y se traslada la nota al pie al modismo hebreo sobre la capacidad económica, que es donde el inglés auditado preserva la alternativa léxica pertinente. Se mantiene «nazareo/nazareato» y la estructura legal repetitiva del versículo.
