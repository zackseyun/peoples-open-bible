review_pass:
  verdict: revise
  source_alignment_summary: El borrador conserva bien la estructura del verso, el nombre divino 'Yahvé', la lectura locativa de בְּהַשָּׁמַיִם ('en los cielos') y la imagen poética de שְׁחָקִים como 'nubes'. También refleja adecuadamente la extensión de עַד con 'alcanza hasta'. Sin embargo, la elección principal 'misericordia' para חַסְדֶּךָ no sigue bien la decisión auditada del POB ('steadfast love') ni la rationale léxica, que enfatiza amor leal/constante más que misericordia.
  spanish_quality_summary: 'El español es claro y digno, pero la nota al pie está mal formulada: ''O:'' no es una manera natural de introducir la alternativa en español, y además ofrece una alternativa incompleta frente al texto base inglés, pues omite la segunda mitad equivalente (''tu fidelidad [llega/alcanza] hasta las nubes''). El texto principal suena natural, pero ''alcanza hasta'' puede simplificarse a ''alcanza'' para mejor fluidez sin pérdida de sentido.'
  glossary_alignment: 'Alineación parcial. ''Yahvé'' cumple la política del proyecto. ''Fidelidad'' para אֱמוּנָה está bien. El problema principal es חֶסֶד: el proyecto y el audit trail favorecen ''amor constante'', ''amor leal'' o similar, no ''misericordia'' como opción principal, salvo razón contextual fuerte, que aquí no la hay.'
  issues:
  - severity: high
    issue: חַסְדֶּךָ fue traducido como 'tu misericordia' en lugar de un equivalente de 'steadfast love'.
    rationale: En este paralelo con אֱמוּנָה, חֶסֶד apunta a amor leal/constante/pactual. 'Misericordia' es demasiado estrecho y no preserva la rationale documentada del POB ni la fuerza relacional del hebreo.
  - severity: medium
    issue: La nota al pie [a] está redactada de forma poco natural e incompleta.
    rationale: El inglés dice 'Or your steadfast love is to the heavens; the Hebrew may be taken as expressing extent rather than simple location.' La versión española empieza con 'O:' de manera extraña y solo altera la primera cláusula, cuando la nota debe centrarse en la alternativa de alcance de la primera expresión sin confundir al lector.
  - severity: low
    issue: '''alcanza hasta'' suena algo redundante en español.'
    rationale: Aunque no es incorrecto, 'alcanza las nubes' o 'llega hasta las nubes' suena más idiomático. Dado que עַד ya expresa el límite, puede traducirse con una construcción española más limpia.
  revised_spanish_text: Yahvé[a], tu amor constante está en los cielos; tu fidelidad alcanza las nubes.
  revised_footnotes:
  - marker: a
    text: O «tu amor constante llega hasta los cielos»; el hebreo puede entenderse como expresión de alcance, no solo de ubicación.
    reason: lexical_alternative
