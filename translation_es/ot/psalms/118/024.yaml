translation:
  language: es
  text: Este es el día que Yahvé ha hecho; regocijémonos y alegrémonos en él.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: זֶה
  english_pob_choice: This is
  chosen_spanish: Este es
  alternatives_spanish:
  - Este
  lexicon: HALOT
  rationale: El demostrativo introduce la cláusula; en español se necesita el verbo copulativo para una sintaxis natural sin alterar el sentido deíctico.
- source_word: הַיּוֹם
  english_pob_choice: the day
  chosen_spanish: el día
  alternatives_spanish:
  - este día
  lexicon: HALOT
  rationale: El sustantivo lleva artículo definido y refiere a un día específico ya en vista; el demostrativo previo aporta la deixis.
- source_word: עָשָׂה
  english_pob_choice: has made
  chosen_spanish: ha hecho
  alternatives_spanish:
  - ha hecho
  - ha preparado
  lexicon: HALOT
  rationale: El perfecto qal comunica una acción completa de Yahvé con vigencia presente; 'ha hecho' conserva la amplitud verbal y es el equivalente natural de 'has made'.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se preserva el nombre propio divino del Tetragrámaton, siguiendo el criterio del proyecto para español.
- source_word: נָגִילָה
  english_pob_choice: let us rejoice
  chosen_spanish: regocijémonos
  alternatives_spanish:
  - alegrémonos
  - exultemos
  lexicon: HALOT
  rationale: La forma cohortativa expresa exhortación/volición; 'regocijémonos' mantiene la fuerza jubilosa mejor que un futuro simple.
- source_word: וְנִשְׂמְחָה
  english_pob_choice: and be glad
  chosen_spanish: y alegrémonos
  alternatives_spanish:
  - y estemos alegres
  - y gocémonos
  lexicon: HALOT
  rationale: La segunda cohortativa se coordina con la primera. Se diferencia de נָגִילָה sin repetir exactamente el mismo verbo; 'alegrémonos' conserva la idea de alegría gozosa.
- source_word: בּוֹ
  english_pob_choice: in it
  chosen_spanish: en él
  alternatives_spanish:
  - en eso
  - en ello
  lexicon: HALOT
  rationale: El sufijo masculino singular vuelve al 'día'; en español, 'día' es masculino, por lo que 'en él' refleja la referencia pronominal de forma natural.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. En español se conserva como nombre propio 'Yahvé', evitando la sustitución por un título y manteniendo la transparencia auditiva del original.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor exhortativo de los cohortativos
  english_pob_reading: let us rejoice and be glad
  chosen_spanish_reading: regocijémonos y alegrémonos
  alternative_spanish_readings:
  - nos alegraremos y nos gozaremos
  - regocijémonos y gocémonos
  rationale: Los cohortativos 1cp expresan invitación/autoexhortación compartida, no simple futuro. La forma exhortativa en español preserva mejor ese valor volitivo.
  doctrine_reference: 'HALOT: cohortative 1cp; Spanish verbal mood equivalence'
translation_notes:
  revision_awareness: El contexto inglés fue de alta concordancia, sin notas textuales ni revisiones aplicadas; la redacción española sigue la misma lectura base y solo ajusta la sintaxis para español natural y la convención del nombre divino.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma estable para יְהוָה.
  - Se usa 'regocijémonos' / 'alegrémonos' para distinguir los dos cohortativos sin perder el paralelismo.
  - '''en él'' sigue al antecedente masculino singular ''el día''.'
  - No se introducen glosas ni interpretaciones adicionales fuera del alcance del verso.
