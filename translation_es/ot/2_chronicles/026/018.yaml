base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/026/018.yaml
  text: They stood against King Uzziah and said to him[a], “It is not for you, Uzziah, to burn incense to Yahweh, but for the priests, the sons of Aaron, who are consecrated to burn incense. Leave the sanctuary, for you have acted unfaithfully[c][b], and it will not be for your honor from Yahweh God.”
  footnotes:
  - marker: a
    text: Or 'withstood him' or 'confronted him' for 'stood against.'
    reason: lexical_alternative
  - marker: b
    text: Or 'you have trespassed.' The Hebrew verb can denote acting unfaithfully, especially in a sacred or covenantal matter.
    reason: lexical_alternative
  - marker: c
    text: Literally, 'and not to you for honor from the LORD God,' an elliptical expression meaning that this action would not result in honor from God.
    reason: lexical_alternative
