translation:
  language: es
  text: que afilan su lengua como una espada; apuntan su flecha[a], palabra amarga.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «preparan su flecha: palabra amarga». El verbo hebreo puede implicar preparar el arco para disparar, aunque «arco» no aparece explícitamente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  english_pob_choice: who
  chosen_spanish: que
  alternatives_spanish:
  - quien
  - el cual
  lexicon: HALOT
  rationale: La partícula relativa introduce la descripción de los impíos; en español, 'que' suena natural y mantiene la referencia personal sin recargar el estilo.
- source_word: שָׁנְנוּ
  english_pob_choice: sharpen
  chosen_spanish: afilan
  alternatives_spanish:
  - aguzan
  - hacen más aguda
  lexicon: HALOT
  rationale: El verbo expresa la acción de afilar o aguzar. 'Afilan' conserva la imagen agresiva de la lengua como arma y es idiomático en español.
- source_word: כַחֶרֶב
  english_pob_choice: like a sword
  chosen_spanish: como espada
  alternatives_spanish:
  - como una espada
  - cual espada
  lexicon: HALOT
  rationale: El comparativo כ marca similitud; 'como espada' preserva la metáfora de arma. Se omite el artículo por fluidez poética, sin perder la comparación.
- source_word: לְשׁוֹנָם
  english_pob_choice: their tongue
  chosen_spanish: su lengua
  alternatives_spanish:
  - su lengua,
  - la lengua de ellos
  lexicon: HALOT
  rationale: El hebreo usa singular colectivo con sufijo plural. En español, 'su lengua' mantiene la fuerza singular y la imagen concreta de la lengua como instrumento de daño.
- source_word: דָּרְכוּ
  english_pob_choice: aim their arrow
  chosen_spanish: tensan su flecha
  alternatives_spanish:
  - preparan su flecha
  - apuntan su flecha
  lexicon: HALOT
  rationale: El verbo en contexto de armas puede aludir a tensar el arco para disparar. Como el arco no está explícito, 'tensan su flecha' conserva la tensión idiomática sin añadir un objeto ausente en el hebreo. Es más fuente-adhesivo que 'apuntan'.
- source_word: חִצָּם
  english_pob_choice: their arrow
  chosen_spanish: su flecha
  alternatives_spanish:
  - sus flechas
  - la flecha
  lexicon: HALOT
  rationale: Aunque el hebreo tiene singular con sufijo plural, el singular funciona de modo representativo. 'Su flecha' reproduce esa forma y enlaza con la imagen del arma preparada.
- source_word: דָּבָר
  english_pob_choice: word
  chosen_spanish: palabra
  alternatives_spanish:
  - habla
  - dicho
  lexicon: HALOT
  rationale: Aquí el sustantivo identifica la flecha metafórica como un discurso hostil. 'Palabra' es la correspondencia más directa y comprensible en español.
- source_word: מָר
  english_pob_choice: bitter
  chosen_spanish: amarga
  alternatives_spanish:
  - áspera
  - dolorosa
  lexicon: HALOT
  rationale: El adjetivo significa literalmente 'amargo'. 'Amarga' conserva la tensión moral y afectiva de una palabra dañina, sin diluir la metáfora.
translation_notes:
  revision_awareness: 'He alineado la cláusula final con el hebreo y con la revisión inglesa más reciente: דָּרְכוּ חִצָּם se rinde de manera concisa como ''tensan su flecha'', evitando introducir ''arco'' y manteniendo la imaginería bélica del texto fuente. La nota alternativa se ancla en la palabra ''flecha'' para cumplir la trazabilidad de la lectura secundaria.'
  spanish_consistency_notes:
  - Se mantiene el registro poético y sobrio del salmo.
  - '''espada'' y ''flecha'' conservan la doble metáfora de agresión verbal y ataque.'
  - '''palabra amarga'' queda en aposición, como en el hebreo דָּבָר מָר.'
  - No se usa 'Cristo', 'SEÑOR' ni otro término de sustitución que no corresponde al pasaje.
