translation:
  language: es
  text: 'Y seguían insistiendo y apremiando para retirarse. Y dijo al rey, a los jefes del ejército y a los hombres: «Vamos desfalleciendo[a] día tras día, y nuestra comida es escasa, y el lugar donde estamos acampados es fuerte, y nos apremian los asuntos del reino[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Nos vamos debilitando día tras día»; el verbo griego puede significar fallar, menguar o quedar exhaustos.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el negocio del reino nos apremia»; o «los asuntos del reino nos apremian».'
    reason: lexical_alternative
lexical_decisions:
- source_word: κατέσπευδον
  english_pob_choice: kept urging
  chosen_spanish: los seguían instando
  alternatives_spanish:
  - apresuraban
  - insistían continuamente
  - los presionaban
  lexicon: LSJ
  rationale: El imperfecto expresa acción շարունակada o repetida. «Los seguían instando» conserva la insistencia sostenida sin reducirla a simple rapidez física.
- source_word: ἐπενύοντο
  english_pob_choice: pressing
  chosen_spanish: presionando
  alternatives_spanish:
  - insistiendo con fuerza
  - apremiando
  - urgiendo
  lexicon: LSJ
  rationale: Junto con κατέσπευδον, intensifica la petición de partir. «Presionando» mantiene la fuerza retórica y la relación semántica con el verbo anterior.
- source_word: τοῦ ἀπελθεῖν
  english_pob_choice: to depart
  chosen_spanish: para que se fueran
  alternatives_spanish:
  - para partir
  - para irse
  - para salir
  lexicon: BDAG
  rationale: El infinitivo de ἀπέρχομαι pide un verbo natural en español. «Para que se fueran» expresa el movimiento de retirada con claridad y evita un calco rígido.
- source_word: Ἐκλείπομεν
  english_pob_choice: We are growing weaker
  chosen_spanish: Vamos desfalleciendo
  alternatives_spanish:
  - Nos estamos debilitando
  - Nos vamos agotando
  - Vamos perdiendo fuerzas
  lexicon: LSJ
  rationale: El verbo puede abarcar fallar, menguar o quedar exhaustos. «Vamos desfalleciendo» conserva la idea de debilitamiento progresivo y la duración del imperfecto.
- source_word: τροφὴ
  english_pob_choice: food
  chosen_spanish: comida
  alternatives_spanish:
  - alimento
  - provisiones
  - sustento
  lexicon: LSJ
  rationale: En este contexto militar y de asedio, «comida» es la opción más natural y directa en español moderno; «provisiones» sería más técnico y menos inmediato.
- source_word: ὀλίγη
  english_pob_choice: scant
  chosen_spanish: escasa
  alternatives_spanish:
  - poca
  - menguante
  - insuficiente
  lexicon: LSJ
  rationale: «Escasa» reproduce bien la idea de carencia sin sonar arcaica ni exagerar la escasez.
- source_word: παρεμβάλλομεν
  english_pob_choice: we are encamped
  chosen_spanish: estamos acampados
  alternatives_spanish:
  - estamos acuartelados
  - hemos acampado
  - estamos en campamento
  lexicon: LSJ
  rationale: La forma verbal señala un estado militar en curso. «Estamos acampados» es natural y conserva la situación táctica.
- source_word: ὀχυρός
  english_pob_choice: strong
  chosen_spanish: fuerte
  alternatives_spanish:
  - fortificado
  - seguro
  - inexpugnable
  lexicon: LSJ
  rationale: El adjetivo describe un lugar difícil de tomar o de operar. «Fuerte» respeta la sobriedad del original y el criterio inglés de no forzar una precisión mayor que la del texto.
- source_word: ἐπίκειται ἡμῖν
  english_pob_choice: are pressing upon us
  chosen_spanish: nos están apremiando
  alternatives_spanish:
  - pesan sobre nosotros
  - nos acosan
  - recaen sobre nosotros
  lexicon: BDAG
  rationale: La locución idiomática expresa presión o carga urgente. «Nos están apremiando» comunica bien la urgencia política y administrativa del contexto.
- source_word: τὰ τῆς βασιλείας
  english_pob_choice: the affairs of the kingdom
  chosen_spanish: los asuntos del reino
  alternatives_spanish:
  - los negocios del reino
  - las cosas del reino
  - las materias del reino
  lexicon: LSJ
  rationale: El genitivo sustantivado se refiere a cuestiones de gobierno y administración. «Asuntos del reino» es claro, formal y fiel al campo semántico.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés auditado, que prefirió «growing weaker day by day» para Ἐκλείπομεν. En español se refleja esa decisión con «Vamos desfalleciendo día tras día», manteniendo el valor progresivo y la amplitud semántica del verbo griego.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general solo cuando el texto fuente lo requiera; este versículo no contiene el nombre divino.
  - Se evita «Cristo»/«Mesías» porque el pasaje no lo usa.
  - Se conserva un registro narrativo sobrio y militar, acorde con 1 Macabeos.
  - «Reino» traduce βασιλεία en sentido político-administrativo, no teológico.
