  source_alignment_summary: 'El borrador refleja bien el hebreo: imperativos exhortativos («ק֛וּם», «חֲזַ֖ק», «וַעֲשֵֽׂה»), la causalidad de «כִּי», el modismo de responsabilidad en «עָלֶיךָ הַדָּבָר», y la solidaridad en «וַאֲנַחְנוּ עִמָּךְ». No hay problema teológico. La única reparación necesaria es de estilo y puntuación en la nota al pie en español.'
  spanish_quality_summary: El texto principal es natural, fiel y de buena legibilidad para español eclesial general. «Levántate», «recae sobre ti», «estamos contigo», «Sé fuerte y hazlo» suenan claros y dignos. La nota al pie, sin embargo, comienza con una comilla innecesaria antes de «O:», lo que conviene corregir.
  glossary_alignment: 'No hay términos del glosario de proyecto especialmente activados aquí. Las decisiones léxicas están alineadas con la auditoría inglesa: «Levántate» por קום, «porque» por כִּי, «recae sobre ti» por עָלֶיךָ הַדָּבָר, «estamos contigo» por עִמָּךְ, «Sé fuerte» por חזק, y «hazlo» por וַעֲשֵׂה.'
  issues:
