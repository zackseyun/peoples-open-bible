review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura hebrea: Jacob oye las palabras de los hijos de Labán, se conserva el quotativo «diciendo», la doble referencia posesiva «de nuestro padre» y el sentido contextual de כָּבוֹד como prosperidad material con nota alternativa. Sin embargo, «ha hecho toda esta riqueza» no representa bien la decisión auditada para עָשָׂה en contexto; el inglés POB documenta un sentido idiomático de adquisición/ganancia, y en español «hacer riqueza» suena forzado y menos fiel al valor contextual.'
  spanish_quality_summary: La redacción es en general clara y digna, pero presenta un problema de legibilidad y naturalidad en «ha hecho toda esta riqueza». También conviene evitar la nota [a] sobre «Labán», ya que la nota corresponde a «riqueza/gloria» y debe anclarse en el término pertinente para no inducir a error. El resto del versículo fluye bien en español bíblico moderno.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Los nombres propios están bien, y la elección «riqueza» para כָּבוֹד coincide con la racionalidad documentada, siempre que la nota se ancle allí. La excepción necesaria es ajustar עָשָׂה a «ha adquirido» o «ha ganado» en vez de un calco de «ha hecho».
  issues:
  - severity: high
    issue: «ha hecho toda esta riqueza» traduce de forma poco fiel y poco natural עָשָׂה en este contexto
    rationale: Aunque עָשָׂה literalmente puede ser «hacer», el expediente auditado establece que aquí significa ganar/adquirir riqueza. «Ha hecho toda esta riqueza» suena antinatural en español y debilita el sentido acusatorio del original.
  - severity: medium
    issue: La nota [a] está anclada en «Labán» en lugar de en «riqueza»/«gloria»
    rationale: La nota explica כָּבוֹד, no el nombre propio. Según las reglas del proyecto, el marcador debe aparecer exactamente en la palabra o frase pertinente del texto.
  revised_spanish_text: 'Y oyó las palabras de los hijos de Labán, diciendo: «Jacob ha tomado todo lo que pertenecía a nuestro padre, y de lo que pertenecía a nuestro padre ha adquirido toda esta riqueza[a]».'
  revised_footnotes:
  - marker: a
    text: O «toda esta gloria». El hebreo כָּבוֹד puede denotar honor, esplendor o riqueza material; aquí se refiere a la prosperidad visible de Jacob.
    reason: lexical_alternative
  revision_rationale: Se corrige el verbo para reflejar el sentido contextual de עָשָׂה como adquisición/ganancia, en línea con la auditoría inglesa y con un español natural. También se reubica el marcador de nota al término que realmente comenta, «riqueza».
