base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/020/039.yaml
  text: 'But as for you[a], O house of Israel, thus says the Lord GOD: Go, each of you, serve his idols now and hereafter, if you will not listen to me[b]; but you shall no longer profane my holy name with your gifts and with your idols.'
  footnotes:
  - marker: a
    text: Hebrew גִּלּוּלִים is a strongly contemptuous term for idols; possible renderings include 'filthy idols' or 'dung-idols.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'Go, serve each his idols; but afterward, if you will not listen to me…' The Hebrew syntax after 'serve' is difficult, and the clause may be taken with slightly different punctuation.
    reason: alternative_reading
