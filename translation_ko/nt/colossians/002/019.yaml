id: COL.2.19
reference: Colossians 2:19
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ οὐ κρατῶν τὴν κεφαλήν, ἐξ οὗ πᾶν τὸ σῶμα διὰ τῶν ἁφῶν καὶ συνδέσμων ἐπιχορηγούμενον καὶ συμβιβαζόμενον αὔξει τὴν αὔξησιν τοῦ θεοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/colossians/002/019.yaml
  text: and not holding fast to the Head, from whom the whole body, being supplied and held together through the joints and ligaments, grows with the growth of God.
translation:
  language: ko
  text: 그러한 사람은 머리[a]를 굳게 붙들지 않습니다. 그 머리로부터 온 몸이 관절과 인대를 통하여 공급을 받고 결속되어, 하나님께서 주시는 성장으로[b] 자라납니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 곧 그리스도. 본 절의 「머리」는 교회의 머리이신 그리스도를 가리킨다.
    reason: cross_reference
  - marker: b
    text: 직역하면 「하나님의 성장으로」. 헬라어 속격은 성장의 근원(하나님으로부터 오는)을 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ κρατῶν
  english_pob_choice: not holding fast
  chosen_korean: 굳게 붙들지 않습니다
  alternatives_korean:
  - 붙들지 않으며
  - 매달리지 않으며
  lexicon: BDAG
  rationale: κρατέω의 「단단히 붙듦·고수함」을 「굳게 붙들다」로 옮긴다.
- source_word: τὴν κεφαλήν
  english_pob_choice: the Head
  chosen_korean: 머리
  alternatives_korean:
  - 그 머리
  lexicon: BDAG
  rationale: 「머리」는 그리스도의 머리 됨을 가리키며, 한국 교회의 정립된 표현.
- source_word: ἐξ οὗ
  english_pob_choice: from whom
  chosen_korean: 그 머리로부터
  alternatives_korean:
  - 그분으로부터
  - 그로부터
  lexicon: BDAG
  rationale: 남성 단수 관계대명사. 「머리」를 받아 한국어에서는 명사를 반복하여 명료성 살림.
- source_word: πᾶν τὸ σῶμα
  english_pob_choice: the whole body
  chosen_korean: 온 몸
  alternatives_korean:
  - 모든 몸
  - 전체 몸
  lexicon: BDAG
  rationale: 「온 몸」은 한국 교회의 정립된 표현.
- source_word: διὰ τῶν ἁφῶν καὶ συνδέσμων
  english_pob_choice: through the joints and ligaments
  chosen_korean: 관절과 인대를 통하여
  alternatives_korean:
  - 마디와 힘줄을 통하여
  lexicon: BDAG
  rationale: 해부학적 비유를 「관절·인대」로 옮긴다.
- source_word: ἐπιχορηγούμενον καὶ συμβιβαζόμενον
  english_pob_choice: being supplied and held together
  chosen_korean: 공급을 받고 결속되어
  alternatives_korean:
  - 공급되고 함께 엮여
  - 양육되고 결합되어
  lexicon: BDAG
  rationale: 두 수동 분사를 「공급을 받고 결속되어」로 옮긴다.
- source_word: αὔξει τὴν αὔξησιν τοῦ θεοῦ
  english_pob_choice: grows with the growth of God
  chosen_korean: 하나님께서 주시는 성장으로 자라납니다
  alternatives_korean:
  - 하나님으로부터 오는 성장으로 자랍니다
  - 하나님의 성장으로 자랍니다
  lexicon: BDAG
  rationale: 속격 τοῦ θεοῦ를 근원으로 보는 영어 POB의 해석을 따라 「하나님께서 주시는」으로 옮긴다. 직역은 각주로 보존.
