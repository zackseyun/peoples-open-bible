translation:
  language: es
  text: 'Entonces Yahvé habló a Aarón: «Y yo, mira, te he dado el encargo de mis ofrendas[a], de todos los dones sagrados de los hijos[c] de Israel. Te los he dado como porción de unción[b], y a tus hijos, como estatuto perpetuo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mis contribuciones» o, más técnicamente, «mis ofrendas alzadas».
    reason: lexical_alternative
  - marker: b
    text: O «para la unción»; el hebreo probablemente significa la porción que pertenece a Aarón en virtud de su oficio sacerdotal ungido.
    reason: lexical_alternative
  - marker: c
    text: Hebreo «hijos de Israel», la designación pactual estándar del pueblo de Israel.
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: No inventar
  rationale: Se conserva el nombre divino propio del Tetragrama, conforme a la política del proyecto y al valor auditado en inglés. 'Yahvé' es la forma española estándar para reflejar el nombre revelado, no un sustituto titulado.
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - se dirigió
  lexicon: No inventar
  rationale: En esta fórmula narrativa, 'habló' mantiene el arranque solemne de la palabra divina sin cargarlo de interpretación adicional.
- source_word: אֶל אַהֲרֹן
  english_pob_choice: to Aaron
  chosen_spanish: a Aarón
  alternatives_spanish:
  - para Aarón
  - con Aarón
  lexicon: No inventar
  rationale: Preposición directa de destinatario del discurso; 'a Aarón' es la correspondencia natural y fiel.
- source_word: וַאֲנִי הִנֵּה
  english_pob_choice: And I, behold, I
  chosen_spanish: Y yo, mira,
  alternatives_spanish:
  - Y yo, he aquí,
  - Y yo, mira tú,
  lexicon: No inventar
  rationale: Se conserva el énfasis del pronombre explícito y de הִנֵּה con una interjección española natural. 'Mira' reproduce la fuerza de atención sin sonar arcaico.
- source_word: מִשְׁמֶרֶת
  english_pob_choice: the charge
  chosen_spanish: la custodia
  alternatives_spanish:
  - la responsabilidad
  - el encargo
  - la guarda
  lexicon: No inventar
  rationale: En contexto sacerdotal, el término implica una encomienda confiada y custodiada. 'Custodia' conserva el sentido de obligación/encargo sin perder la idea de algo confiado al cuidado de Aarón.
- source_word: תְּרוּמֹתָי
  english_pob_choice: my contributions
  chosen_spanish: mis ofrendas
  alternatives_spanish:
  - mis contribuciones
  - mis ofrendas elevadas
  - mis ofrendas alzadas
  lexicon: No inventar
  rationale: En español bíblico, 'ofrendas' comunica mejor que 'contribuciones' el carácter cultual del término, sin exigir una expresión técnica extraña. Se evita 'heave offerings' por ser demasiado especializado para el lector general.
- source_word: לְכָל קָדְשֵׁי בְנֵי יִשְׂרָאֵל
  english_pob_choice: all the holy gifts of the sons of Israel
  chosen_spanish: de todos los dones sagrados de los hijos de Israel
  alternatives_spanish:
  - de todas las cosas sagradas de los hijos de Israel
  - de todas las ofrendas sagradas de los hijos de Israel
  - de todos los bienes consagrados de los hijos de Israel
  lexicon: No inventar
  rationale: '''Dones sagrados'' refleja bien la función cultual de קָדְשֵׁי en este pasaje sobre deberes sacerdotales. Se mantiene ''hijos de Israel'' como eco del hebreo y del audit trail inglés; ''dones'' evita una literalidad más dura (''cosas sagradas'') sin ampliar el sentido.'
- source_word: נְתַתִּים
  english_pob_choice: I have given them
  chosen_spanish: te los he dado
  alternatives_spanish:
  - los he dado
  - te los entrego
  - te los he confiado
  lexicon: No inventar
  rationale: 'Se preserva la repetición de נתן con un perfecto de resultado: ''te los he dado''. El dativo explícito en español mantiene la relación directa con Aarón.'
- source_word: לְמָשְׁחָה
  english_pob_choice: for an anointing portion
  chosen_spanish: para un derecho por tu unción
  alternatives_spanish:
  - como porción de unción
  - para una porción de unción
  - como derecho de tu unción
  lexicon: No inventar
  rationale: El hebreo vincula el don con el estado ungido de Aarón; el audit trail inglés subraya que no se trata de un rito nuevo sino de un derecho derivado del oficio ungido. 'Derecho por tu unción' preserva esa fuerza jurídica/funcional sin convertirla en una simple porción material.
- source_word: וּלְבָנֶיךָ
  english_pob_choice: and to your sons
  chosen_spanish: y para tus hijos
  alternatives_spanish:
  - y a tus hijos
  - y para tus hijos también
  lexicon: No inventar
  rationale: '''Tus hijos'' comunica el linaje sacerdotal heredado en español común y claro; ''para'' enlaza con la extensión del estatuto a ellos.'
- source_word: לְחָק עוֹלָם
  english_pob_choice: as a permanent statute
  chosen_spanish: como estatuto perpetuo
  alternatives_spanish:
  - como estatuto permanente
  - como ley perpetua
  - como decreto perpetuo
  lexicon: No inventar
  rationale: '''Estatuto perpetuo'' conserva el carácter legal-covenantal de חָק y el valor duradero de עוֹלָם. Es una fórmula española bíblica clara y fiel.'
theological_decisions:
- issue: Cómo traducir el valor de מִשְׁמֶרֶת en un contexto sacerdotal
  english_pob_reading: the charge
  chosen_spanish_reading: la custodia
  alternative_spanish_readings:
  - la responsabilidad
  - el encargo
  - la guarda
  rationale: El pasaje no describe solo una tarea abstracta, sino una encomienda sagrada confiada a Aarón sobre los dones de Yahvé. 'Custodia' conserva el elemento de confianza, obligación y resguardo del depósito sagrado, sin perder el trasfondo sacerdotal.
  doctrine_reference: Éxodo 28–29; Números 18:8–10
- issue: Sentido de לְמָשְׁחָה en relación con la unción sacerdotal
  english_pob_reading: for an anointing portion
  chosen_spanish_reading: para un derecho por tu unción
  alternative_spanish_readings:
  - como porción de unción
  - para una porción de unción
  - como derecho de tu unción
  rationale: La nota inglesa aclara que el sentido probable es el de una porción que corresponde a Aarón por virtud de su oficio ungido. 'Derecho por tu unción' intenta preservar esa relación sin introducir una ceremonia nueva ni suavizar la fuerza legal del privilegio sacerdotal.
  doctrine_reference: Éxodo 29:7; Levítico 8:12; Números 18:8
- issue: Conservación de la fórmula covenantal בְנֵי יִשְׂרָאֵל
  english_pob_reading: sons of Israel
  chosen_spanish_reading: hijos de Israel
  alternative_spanish_readings:
  - israelitas
  - pueblo de Israel
  rationale: Se mantiene la fórmula heredada del hebreo, tal como el audit trail inglés la conserva por fidelidad formal y precisión de identidad nacional-covenantal.
  doctrine_reference: Éxodo 1:1; Números 18:8
translation_notes:
  revision_awareness: El borrador sigue la revisión inglesa más reciente, que suavizó el valor de la expresión equivalente a ‘given you’ y prefirió una formulación menos interpretativa para לְמָשְׁחָה. En español, por eso se evita una paráfrasis explicativa excesiva y se conserva una relación directa entre el don, la unción sacerdotal y el estatuto perpetuo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el Tetragrama, en continuidad con el estándar del proyecto.
  - '''hijos de Israel'' se conserva por fidelidad a la fórmula hebrea y coherencia con el audit trail.'
  - '''estatuto perpetuo'' se usa de modo consistente para חָק עוֹלָם en contextos legales-cultuales.'
  - Se evita 'SEÑOR' como sustituto del nombre divino.
  - Se evita 'siervo' para expresiones de estatus donde el hebreo no lo requiere.
