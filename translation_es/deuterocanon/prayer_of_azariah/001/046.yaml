review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: imperativo plural dirigido a elementos de la creación, pareja léxica πάγος/ψῦχος, doble mandato de alabanza, y cierre durativo εἰς τοὺς αἰῶνας. Sin embargo, dos elecciones españolas no preservan con buena naturalidad ni precisión el matiz auditado: «cantadle alabanzas» introduce un dativo no explícito y suena forzado, y «exaltadlo altamente» es un calco poco idiomático para ὑπερυψοῦτε.'
  spanish_quality_summary: El verso es comprensible y digno, pero necesita pulido para español eclesial natural. «Bendecid» funciona, aunque «bendigan» sería más neutral latinoamericano; no obstante, puede mantenerse el registro litúrgico. La principal debilidad es la combinación «cantadle alabanzas y exaltadlo altamente», que suena rígida y algo antinatural. Una formulación más clara y fiel es «cántenle alabanzas y exáltenlo en gran manera».
  glossary_alignment: La traducción de κύριον como «el Señor» concuerda con la decisión auditada para κύριος en este contexto griego y no requiere «Yahvé». «Escarcha» para πάγος y «frío» para ψῦχος están bien alineados. No hay conflicto relevante con la terminología base del proyecto.
  issues:
  - severity: medium
    issue: «cantadle alabanzas» suena forzado y añade una construcción dativa innecesaria
    rationale: Ὑμνεῖτε significa cantar himnos o cantar alabanza. En español bíblico natural, «cántenle alabanzas» o «alábenlo con cánticos» comunica mejor el matiz musical sin rigidez.
  - severity: medium
    issue: «exaltadlo altamente» es un calco poco idiomático
    rationale: Aunque intenta reflejar la intensificación de ὑπερυψοῦτε, en español «altamente» con «exaltar» resulta extraño. «Exáltenlo en gran manera» o «ensálcenlo sobremanera» preserva mejor la fuerza intensiva y la legibilidad.
  - severity: low
    issue: Registro verbal mixto respecto al objetivo de español latinoamericano neutral
    rationale: «Bendecid / cantadle / exaltadlo» es comprensible y tradicional, pero más peninsular/litúrgico. No es un error grave, pero una revisión a formas como «bendigan / cántenle / exáltenlo» mejora la amplitud panhispánica.
  revised_spanish_text: ¡Bendigan al Señor, escarcha y frío; cántenle alabanzas y exáltenlo en gran manera para siempre!
  revision_rationale: 'Se conserva el sentido fuente y la estructura doxológica, pero se ajusta el español para mayor naturalidad y fidelidad estilística: «cántenle alabanzas» expresa mejor ὑμνεῖτε, «exáltenlo en gran manera» comunica la intensificación de ὑπερυψοῦτε sin calco extraño, y las formas en -n favorecen un español latinoamericano neutral y ampliamente legible.'
