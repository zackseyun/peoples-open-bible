review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: condición matrimonial, transferencia de herencia fuera del clan paterno, adición a otra tribu y pérdida de la porción asignada. Conserva adecuadamente la repetición de ''herencia'' y de ''será quitada''. Sin embargo, ''de uno de los hijos...'' suena menos idiomático para matrimonio que ''con uno de los hijos...'', y el cierre ''del lote de nuestra herencia'' es comprensible pero menos natural que una formulación que mantenga la nota explicativa sin sonar rígida.'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero tiene dos puntos mejorables de naturalidad: 1) en contexto matrimonial, ''esposas de uno de los hijos...'' puede afinarse a ''esposas de alguno de los hijos...'' o ''se casan con alguno...''; 2) ''lote'' en el cuerpo del texto es algo tosco en español bíblico contemporáneo. ''Porción asignada'' o ''porción sorteada'' comunica mejor el sentido, dejando ''lote'' como alternativa literal en nota. Además, ''pertenezcan'' funciona, pero ''lleguen a pertenecer'' marcaría mejor la afiliación resultante; no es indispensable.'
  glossary_alignment: No hay términos del glosario mayor que entren en conflicto. 'Herencia' para נַחֲלָה y 'tribu' para מַטֶּה están bien. La decisión sobre וּמִגֹּרַל puede mejor alinearse con el razonamiento auditado del inglés, que privilegia el sentido metonímico de porción asignada por sorteo más que la literalidad desnuda de 'lote'.
  issues:
  - severity: medium
    issue: Expresión matrimonial 'esposas de uno de los hijos'
    rationale: Aunque no es incorrecta, en español suena menos natural para el vínculo matrimonial que 'esposas de alguno de los hijos' o una construcción con 'casarse con'. El hebreo expresa llegada a ser esposas en relación con un miembro de otra tribu; conviene una formulación más fluida sin perder la estructura.
  - severity: medium
    issue: Uso de 'lote' en el texto principal
    rationale: El inglés auditado eligió 'allotted portion' para explicar el sentido contextual de גּוֹרָל. 'Lote' preserva la literalidad, pero en español puede sonar técnico o poco eclesial. 'Porción asignada[a]' conserva mejor el sentido del reparto de tierra y permite dejar la literalidad 'lote' en la nota.
  revised_spanish_text: Y si llegan a ser esposas de alguno de los hijos de las tribus de los hijos de Israel, entonces su herencia será quitada de la herencia de nuestros padres y añadida a la herencia de la tribu a la que pertenezcan, y será quitada de la porción asignada[a] de nuestra herencia.
  revised_footnotes:
  - marker: a
    text: O “del lote de nuestra herencia”. El hebreo dice literalmente “del lote”, refiriéndose a la porción asignada por sorteo.
    reason: lexical_alternative
  revision_rationale: Se ajusta la expresión matrimonial para un español más natural y se cambia 'lote' por 'porción asignada' en el texto principal, siguiendo mejor la decisión contextual documentada en el POB inglés para גּוֹרָל, mientras la nota conserva la alternativa más literal.
