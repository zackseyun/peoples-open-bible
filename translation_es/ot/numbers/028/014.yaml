translation:
  language: es
  text: 'Y sus ofrendas de bebida serán: la mitad de un hin para el toro[a], la tercera parte de un hin para el carnero, y la cuarta parte de un hin para el cordero, de vino. Este es el holocausto de cada mes, en su mes, a lo largo de los meses del año.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Este es el holocausto de la luna nueva en su mes, para los meses del año». La palabra hebrea חֹדֶשׁ puede denotar tanto «mes» como «luna nueva»; aquí el texto principal refleja el sentido recurrente mensual.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנִסְכֵּיהֶם
  english_pob_choice: their drink offerings
  chosen_spanish: sus libaciones
  alternatives_spanish:
  - sus ofrendas de bebida
  - sus ofrendas líquidas
  lexicon: HALOT
  rationale: נֶסֶךְ designa una ofrenda derramada; en español, «libación» conserva el valor sacrificial técnico sin sonar demasiado perifrástico. «Ofrenda de bebida» es posible, pero menos natural en español bíblico contemporáneo.
- source_word: חֲצִי הַהִין
  english_pob_choice: half a hin
  chosen_spanish: la mitad de un hin
  alternatives_spanish:
  - medio hin
  - la mitad del hin
  lexicon: HALOT
  rationale: Se mantiene la unidad antigua de medida «hin» por transparencia al texto fuente; «la mitad de un hin» refleja con fidelidad la expresión fraccional hebrea.
- source_word: לַפָּר
  english_pob_choice: for the bull
  chosen_spanish: para el toro
  alternatives_spanish:
  - para el buey
  - para el toro sacrificial
  lexicon: HALOT
  rationale: En contexto sacrificial, פָּר puede referir al animal de sacrificio; «toro» es claro y digno en español, y conserva el referente zoológico sin añadir explicación interpretativa.
- source_word: וּשְׁלִישִׁת הַהִין
  english_pob_choice: a third of a hin
  chosen_spanish: la tercera parte de un hin
  alternatives_spanish:
  - un tercio de un hin
  lexicon: HALOT
  rationale: «La tercera parte» reproduce de forma precisa la fracción hebrea y mantiene el tono formal del pasaje.
- source_word: לָאַיִל
  english_pob_choice: for the ram
  chosen_spanish: para el carnero
  alternatives_spanish:
  - para el macho carnero
  - para el macho
  lexicon: HALOT
  rationale: אַיִל es el carnero sacrificial; «carnero» es idiomático y exacto en español, con suficiente solemnidad ritual.
- source_word: וּרְבִיעִת הַהִין
  english_pob_choice: a fourth of a hin
  chosen_spanish: la cuarta parte de un hin
  alternatives_spanish:
  - un cuarto de un hin
  lexicon: HALOT
  rationale: La fracción se expresa de modo directo y fiel al hebreo, evitando simplificación excesiva.
- source_word: לַכֶּבֶשׂ
  english_pob_choice: for the lamb
  chosen_spanish: para el cordero
  alternatives_spanish:
  - para el cordero sacrificial
  - para el borrego
  lexicon: HALOT
  rationale: כֶּבֶשׂ designa el cordero; «cordero» es la opción más natural y clara para el lector español.
- source_word: יָיִן
  english_pob_choice: of wine
  chosen_spanish: de vino
  alternatives_spanish:
  - vino
  lexicon: HALOT
  rationale: El genitivo apposicional se vierte con «de vino», que funciona bien en español y especifica la sustancia de las libaciones.
- source_word: זֹאת עֹלַת חֹדֶשׁ
  english_pob_choice: This is the burnt offering of each month
  chosen_spanish: Este es el holocausto de cada mes
  alternatives_spanish:
  - Este es el holocausto mensual
  - Este es el holocausto del mes
  lexicon: HALOT
  rationale: עֹלָה se traduce de manera tradicional y transparente como «holocausto». «De cada mes» conserva el sentido recurrente del hebreo sin forzar una paráfrasis como «mensual».
- source_word: בְּחָדְשׁוֹ
  english_pob_choice: in its month
  chosen_spanish: en su mes
  alternatives_spanish:
  - en el mes correspondiente
  - en cada mes
  lexicon: HALOT
  rationale: La frase hebrea literalmente significa «en su mes»; se mantiene esa formulación para preservar la referencia distributiva y la posible resonancia con el inicio de cada mes.
- source_word: לְחָדְשֵׁי הַשָּׁנָה
  english_pob_choice: throughout the months of the year
  chosen_spanish: para los meses del año
  alternatives_spanish:
  - a lo largo de los meses del año
  - durante los meses del año
  lexicon: HALOT
  rationale: La expresión señala el patrón repetido en el año; «para los meses del año» es fiel y natural, y conserva la secuencia temporal sin suavizarla en exceso.
theological_decisions:
- issue: קֹדֶשׁ/עֹלָה como ofrenda ritual de repetición mensual
  english_pob_reading: The verse describes the recurring monthly burnt offering, while preserving the lexical ambiguity of חֹדֶשׁ as 'month' or 'new moon' in the footnote.
  chosen_spanish_reading: El verso se traduce como el holocausto recurrente de cada mes, y se conserva en nota la posibilidad de entender חֹדֶשׁ como «mes» o «luna nueva».
  alternative_spanish_readings:
  - «Este es el holocausto de la luna nueva en su mes»
  - «Este es el holocausto mensual»
  rationale: El contexto inmediato habla de una pauta que se repite «para los meses del año», por lo que el sentido principal es mensual. Sin embargo, la ambigüedad lexical de חֹדֶשׁ debe quedar visible, no resuelta por completo en el texto principal.
  doctrine_reference: No doctrinal issue; lexical ambiguity in sacrificial calendar terminology.
translation_notes:
  revision_awareness: The English POB revised the final clause from a looser 'monthly burnt offering for each month' to the more source-close 'the burnt offering of each month in its month throughout the months of the year.' The Spanish draft follows that revision closely with «el holocausto de cada mes, en su mes, para los meses del año», preserving the distributive and repetitive force without smoothing the Hebrew.
  spanish_consistency_notes:
  - Se usa «Y sus libaciones» para reflejar la coordinación inicial con el contexto sacrificial.
  - Se preserva «hin» como unidad de medida por consistencia con la política de transparencia textual.
  - Se mantiene «holocausto» para עֹלָה en armonía con el registro sacrificial tradicional y la transparencia al hebreo.
  - La nota de חֹדֶשׁ conserva la tensión entre «mes» y «luna nueva» sin imponer una sola lectura.
