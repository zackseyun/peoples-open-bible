translation:
  language: es
  text: Pero en cuanto a mí[a], mi oración es a ti, Yahvé, en tiempo de favor; oh Dios, en la abundancia de tu amor leal[b], respóndeme en la verdad de tu salvación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en un tiempo aceptable». La expresión hebrea señala un tiempo favorable para que Dios oiga y actúe.
    reason: lexical_alternative
  - marker: b
    text: O «en la fidelidad de tu salvación». אמת puede significar «verdad» o «fidelidad/fiabilidad».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  english_pob_choice: But as for me
  chosen_spanish: Pero en cuanto a mí
  alternatives_spanish:
  - Pero yo
  - En cuanto a mí
  lexicon: HALOT
  rationale: La partícula adversativa y el pronombre independiente expresan contraste enfático con el contexto anterior. «Pero en cuanto a mí» conserva esa oposición con un español natural y claro.
- source_word: תְפִלָּתִי
  english_pob_choice: my prayer
  chosen_spanish: mi oración
  alternatives_spanish:
  - mi plegaria
  - mi oración es
  lexicon: HALOT
  rationale: El sustantivo significa «oración». En español no hace falta introducir explícitamente el verbo copulativo si la frase fluye naturalmente como predicado nominal con la preposición siguiente.
- source_word: לְךָ
  english_pob_choice: to you
  chosen_spanish: para ti
  alternatives_spanish:
  - a ti
  - hacia ti
  lexicon: HALOT
  rationale: En este contexto de oración dirigida a Dios, el valor direccional se expresa de modo idiomático con «para ti»; mantiene la orientación de la oración sin sonar forzado.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: transliterar el nombre divino como «Yahvé» y no sustituirlo por un título.'
- source_word: עֵת רָצוֹן
  english_pob_choice: at a time of favor
  chosen_spanish: en tiempo de favor
  alternatives_spanish:
  - en un tiempo favorable
  - en un tiempo aceptable
  - en tiempo aceptable
  lexicon: HALOT
  rationale: La expresión denota un tiempo propicio para que Dios oiga y actúe. «En tiempo de favor» conserva la concisión del hebreo y el sentido de oportunidad favorable.
- source_word: אֱלֹהִים
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  - oh, Dios
  lexicon: HALOT
  rationale: La repetición vocativa se expresa de forma explícita en español como llamada directa a Dios. «Oh Dios» mantiene el tono de súplica.
- source_word: בְּרָב
  english_pob_choice: in the abundance of
  chosen_spanish: en la abundancia de
  alternatives_spanish:
  - por la abundancia de
  - según la abundancia de
  lexicon: HALOT
  rationale: La preposición con «abundancia» marca base o esfera. «En la abundancia de» es la equivalencia más cercana y natural en español.
- source_word: חַסְדֶּךָ
  english_pob_choice: your steadfast love
  chosen_spanish: tu amor leal
  alternatives_spanish:
  - tu misericordia
  - tu fidelidad amorosa
  - tu amor constante
  lexicon: HALOT
  rationale: חסד tiene peso de amor pactal, lealtad y misericordia. «Amor leal» comunica bien ese campo semántico en español sin reducirlo a mera emoción ni a «misericordia» solamente.
- source_word: עֲנֵנִי
  english_pob_choice: answer me
  chosen_spanish: respóndeme
  alternatives_spanish:
  - respóndeme favorablemente
  - contéstame
  lexicon: HALOT
  rationale: En contexto de oración, el imperativo de ענה significa pedir respuesta divina. «Respóndeme» es directo, idiomático y fiel.
- source_word: בֶּאֱמֶת
  english_pob_choice: in the truth of
  chosen_spanish: en la verdad de
  alternatives_spanish:
  - en la fidelidad de
  - según la verdad de
  - en la veracidad de
  lexicon: HALOT
  rationale: אמת puede significar verdad o fidelidad/fiabilidad. Se mantiene «verdad» en el texto principal para reflejar la forma léxica, dejando abierta la otra posibilidad en nota.
- source_word: יִשְׁעֶךָ
  english_pob_choice: your salvation
  chosen_spanish: tu salvación
  alternatives_spanish:
  - tu liberación
  - tu ayuda salvadora
  lexicon: HALOT
  rationale: El sustantivo puede abarcar salvación, rescate o liberación. «Salvación» conserva la equivalencia tradicional y el alcance teológico del término.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo contiene el nombre propio del pacto, no un título genérico. Se preserva como «Yahvé» de acuerdo con la política del proyecto y para mantener la transparencia con la fuente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de אֱמֶת en relación con la salvación
  english_pob_reading: in the truth of your salvation
  chosen_spanish_reading: en la verdad de tu salvación
  alternative_spanish_readings:
  - en la fidelidad de tu salvación
  - con la verdad de tu salvación
  rationale: Se mantiene «verdad» porque reproduce la elección principal del POB inglés y el valor léxico directo. La alternativa «fidelidad» se conserva conceptualmente, sin resolver en exceso la tensión semántica.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
- issue: Χסד / חסד como amor leal de pacto
  english_pob_reading: steadfast love
  chosen_spanish_reading: amor leal
  alternative_spanish_readings:
  - amor constante
  - misericordia
  - amor fiel
  rationale: La frase hebrea expresa lealtad de pacto, no solo afecto. «Amor leal» comunica esa dimensión relacional y covenantal de manera comprensible en español contemporáneo.
  doctrine_reference: 'DOCTRINE.md: Preserve covenantal force where present'
translation_notes:
  revision_awareness: 'No se requirieron revisiones respecto del último pase: el audit trail indica que el texto quedó sin cambios y el verificador externo reportó alta concordancia.'
  spanish_consistency_notes:
