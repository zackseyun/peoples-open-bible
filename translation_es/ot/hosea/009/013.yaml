translation:
  language: es
  text: Efraín[a], como lo he visto, está plantado en un lugar agradable, como Tiro; pero Efraín debe sacar a sus hijos al que mata[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «como vi, Efraín fue plantado como Tiro en un lugar agradable». La sintaxis hebrea de la comparación está muy comprimida.'
    reason: alternative_reading
  - marker: b
    text: 'O: «al matador» o «al degollador». El hebreo dice literalmente «al que mata».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶפְרַיִם
  english_pob_choice: Ephraim
  chosen_spanish: Efraín
  alternatives_spanish:
  - Efraím
  lexicon: HALOT
  rationale: Es el nombre propio del reino/tribu del norte; en español bíblico es natural y claro como Efraín.
- source_word: כַּאֲשֶׁר רָאִיתִי
  english_pob_choice: as I have seen
  chosen_spanish: como lo he visto
  alternatives_spanish:
  - como vi
  - tal como vi
  lexicon: HALOT
  rationale: Conserva la observación profética en primera persona y evita una paráfrasis excesiva; el presente perfecto suena natural en español para una observación previa con fuerza actual.
- source_word: לְצוֹר
  english_pob_choice: like Tyre
  chosen_spanish: como Tiro
  alternatives_spanish:
  - igual que Tiro
  - semejante a Tiro
  lexicon: HALOT
  rationale: La ל comparativa se expresa de forma directa con 'como'. 'Tiro' es el topónimo español estándar y mantiene el paralelismo con la ciudad fenicia.
- source_word: שְׁתוּלָה
  english_pob_choice: planted
  chosen_spanish: está plantado
  alternatives_spanish:
  - fue plantado
  - plantada
  lexicon: HALOT
  rationale: La imagen agrícola debe preservarse. Aunque el hebreo es femenino, el referente colectivo 'Efraín' en español puede tomar un predicado masculino por concordancia idiomática sin perder el sentido de la metáfora.
- source_word: בְנָוֶה
  english_pob_choice: in a pleasant place
  chosen_spanish: en un lugar agradable
  alternatives_spanish:
  - en un sitio agradable
  - en una morada agradable
  - en un lugar apacible
  lexicon: HALOT
  rationale: '''נָוֶה'' puede significar lugar agradable, morada o pastizal; aquí la revisión inglesa prefirió la acepción general ''pleasant place''. ''Lugar agradable'' conserva esa generalidad sin introducir ''pastura''.'
- source_word: וְאֶפְרַיִם
  english_pob_choice: but Ephraim
  chosen_spanish: pero Efraín
  alternatives_spanish:
  - y Efraín
  lexicon: HALOT
  rationale: El waw introduce contraste fuerte entre la imagen favorable y el destino funesto; 'pero' refleja mejor la fuerza adversativa en español.
- source_word: לְהוֹצִיא
  english_pob_choice: must bring out
  chosen_spanish: debe sacar
  alternatives_spanish:
  - ha de sacar
  - tiene que sacar
  - debe hacer salir
  lexicon: HALOT
  rationale: El infinitivo con ל expresa acción destinada o inminente. 'Debe sacar' mantiene la inevitabilidad y es más natural que una repetición literal de 'hacer salir'.
- source_word: אֶל הֹרֵג
  english_pob_choice: to the slayer
  chosen_spanish: para entregarlos al matador
  alternatives_spanish:
  - al matador
  - al asesino
  - al que mata
  lexicon: HALOT
  rationale: El participio activo denota al agente que mata; 'matador' preserva esa personalización. Añadir 'entregarlos' explicita en español el movimiento implícito del hebreo, sin cambiar el núcleo semántico de llevar a los hijos hacia el que mata.
- source_word: בָּנָיו
  english_pob_choice: his children
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos e hijas
  - su descendencia
  - sus hijos
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'sus hijos'; el audit trail inglés abrió la posibilidad colectiva 'children', pero aquí 'sus hijos' sigue el valor más directo y permite conservar el referente familiar sin masculinizar de más ni perder la fuerza del juicio.
theological_decisions:
- issue: Cómo traducir la comparación comprimida y la tensión entre prosperidad aparente y juicio inminente
  english_pob_reading: Retain the image of Ephraim as planted in a pleasant place like Tyre
  chosen_spanish_reading: Conservar la imagen de Efraín plantado en un lugar agradable, como Tiro, y el giro abrupto hacia el castigo de sus hijos
  alternative_spanish_readings:
  - Efraín florecía como Tiro en un lugar agradable
  - Efraín estaba establecido en un sitio próspero como Tiro
  rationale: 'La fuerza del versículo está en la ironía: una situación aparentemente segura y favorable termina en pérdida de hijos. Mantener la metáfora de plantación y el contraste evita suavizar el juicio.'
  doctrine_reference: 'Principio POB: equivalencia óptima con preservación de imagen y tensión textual.'
- issue: Cómo expresar הֹרֵג sin diluir el agente personal del juicio
  english_pob_reading: to the slayer
  chosen_spanish_reading: al matador
  alternative_spanish_readings:
  - al asesino
  - al que mata
  - a la muerte
  rationale: El hebreo usa un participio activo personal, no una abstracción. 'Matador' conserva la idea de agente que mata mejor que una forma impersonal como 'muerte' o una paráfrasis abstracta.
  doctrine_reference: 'Principio POB: mantener fuerza léxica y agente visible cuando el hebreo lo hace.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que cambió 'pleasant pasture' por 'pleasant place' y 'killer' por 'slayer'. Por eso se usó 'lugar agradable' y se mantuvo un agente personal de matanza, sin forzar un término más técnico o más abstracto que el hebreo.
  spanish_consistency_notes:
  - Se conserva 'Efraín' como nombre del reino/tribu, siguiendo el uso bíblico español estándar.
  - '''Tiro'' corresponde a Tyre y mantiene la referencia histórica y geográfica.'
  - Se preserva la imagen agrícola ('plantado') porque la segunda cola del verso depende del contraste entre establecimiento favorable y pérdida de hijos.
  - El español usa 'sus hijos' de forma directa; la nota aclara la opción colectiva del inglés POB sin imponerla en el cuerpo del texto.
  - No se emplea 'SEÑOR' ni otros reemplazos reverenciales porque el verso no contiene el nombre divino.
