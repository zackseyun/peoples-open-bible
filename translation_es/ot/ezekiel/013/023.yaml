review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo y del POB inglés: consecuencia de juicio, cese de visiones falsas y de adivinación, liberación del pueblo y reconocimiento de Yahvé. También preserva correctamente el nombre divino como «Yahvé» y la nota léxica sobre «ver» en contexto profético.'
  spanish_quality_summary: La redacción es clara y natural en español eclesial moderno. Sin embargo, «de su mano» no concuerda con el referente plural femenino de 2fp («de vuestra mano» / «de sus manos») y debilita un detalle importante del original. Además, la forma de tratamiento mezcla «verán/practicarán/sabrán» con «su mano», lo que produce inconsistencia pronominal.
  glossary_alignment: 'Buen alineamiento general con la terminología del proyecto: «Yahvé», «adivinación», «mi pueblo». Se conserva adecuadamente el giro profético «ver visiones falsas» con nota alternativa. La corrección necesaria es principalmente gramatical y de fidelidad al plural femenino de מִיֶּדְכֶן.'
  issues:
  - severity: medium
    issue: «de su mano» no refleja bien el hebreo plural femenino מִיֶּדְכֶן
    rationale: El original se dirige a varias mujeres («de vuestra mano / de sus manos»), no a una sola. «Su mano» puede leerse como singular y rompe la correspondencia con los verbos en plural.
  - severity: low
    issue: Inconsistencia de tratamiento entre verbos en tercera persona plural y posesivo singular
    rationale: «Verán… practicarán… sabrán» combinado con «su mano» suena internamente desigual. «Sus manos» resuelve la concordancia sin forzar voseo/vosotras.
  revised_spanish_text: Por tanto, ya no verán visiones falsas ni practicarán adivinación[a], y libraré a mi pueblo de sus manos. Entonces sabrán que yo soy Yahvé.
  revised_footnotes:
