translation:
  language: es
  text: Yo mismo pastorearé mi rebaño[a], y yo mismo los haré echarse[b], declara el Señor Yahvé[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «mis ovejas»; se vierte «mi rebaño» para conservar el sentido colectivo de צֹאן en este contexto pastoral.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «los haré recostarse». El verbo hebreo puede incluir la idea de hacer que se echen o se asienten con seguridad.'
    reason: lexical_alternative
  - marker: c
    text: 'El hebreo dice literalmente: «el Señor Yahvé» (אֲדֹנָי יְהוִה). Se conserva «Yahvé» para el nombre divino y «Señor» para el título אֲדֹנָי.'
    reason: theological_note
lexical_decisions:
- source_word: אֲנִי
  english_pob_choice: I myself
  chosen_spanish: yo mismo
  alternatives_spanish:
  - yo
  - yo solo
  lexicon: HALOT
  rationale: El pronombre independiente está explícito y aparece de nuevo tras la conjunción, con valor enfático. «Yo mismo» conserva bien esa insistencia personal en español natural.
- source_word: אֶרְעֶה
  english_pob_choice: will shepherd
  chosen_spanish: pastorearé
  alternatives_spanish:
  - apacentaré
  - pastorearé
  lexicon: HALOT
  rationale: רעה en este contexto es lenguaje pastoral de cuidado y gobierno, no solo de alimentación. «Pastorearé» comunica mejor la imagen del pastor que «alimentaré» o una paráfrasis más amplia.
- source_word: צֹאנִי
  english_pob_choice: my flock
  chosen_spanish: mi rebaño
  alternatives_spanish:
  - mis ovejas
  - mi rebaño
  lexicon: HALOT
  rationale: צֹאן puede referirse colectivamente a ganado menor. En español, «mi rebaño» preserva el sentido colectivo y la imagen pastoril sin perder naturalidad.
- source_word: וַאֲנִי
  english_pob_choice: and I myself
  chosen_spanish: y yo mismo
  alternatives_spanish:
  - y yo
  - y yo mismo
  lexicon: HALOT
  rationale: La repetición del pronombre con waw vuelve a ser enfática. Repetir «yo mismo» mantiene el paralelismo y el énfasis de autoafirmación divina.
- source_word: אַרְבִּיצֵם
  english_pob_choice: will make them lie down
  chosen_spanish: los haré recostarse
  alternatives_spanish:
  - los haré descansar
  - los haré recostarse
  - los haré echarse
  lexicon: HALOT
  rationale: El hifil de רבץ expresa causar que se echen o se recuesten. «Los haré recostarse» es directo y conserva la imagen de reposo seguro; «descansar» explicita el efecto, pero es menos literal.
- source_word: נְאֻם
  english_pob_choice: declares
  chosen_spanish: declara
  alternatives_spanish:
  - dice
  - declara
  lexicon: HALOT
  rationale: La fórmula profética pide una equivalencia breve y solemne. «Declara» conserva el carácter de declaración autoritativa sin sonar arcaico.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord Yahweh
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Yahvé
  - el Señor Dios
  lexicon: HALOT
  rationale: 'Se preservan ambos elementos del título: אֲדֹנָי como «el Señor» y יְהוִה como «Yahvé», siguiendo el criterio del proyecto de no ocultar el nombre divino. «Señor Dios» perdería la forma del nombre propio.'
theological_decisions:
- issue: Tratamiento del nombre divino en אֲדֹנָי יְהוִה
  english_pob_reading: the Lord Yahweh
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahvé
  rationale: El hebreo contiene el Tetragrámaton de forma explícita. En español, «Yahvé» representa directamente ese nombre, mientras que «Señor» traduce אֲדֹנָי como título reverencial. Juntos conservan la distinción entre título y nombre.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'La revisión auditada sustituyó la convención inglesa «the Lord GOD» por «the Lord Yahweh» para representar más directamente יְהוִה. En español, la decisión se refleja de manera consistente con la política del proyecto: «el Señor Yahvé». No se introdujeron otras modificaciones sustantivas respecto del sentido del verso.'
  spanish_consistency_notes:
  - Se mantuvo la repetición enfática del sujeto con «yo mismo» en ambos miembros del verso.
  - «Rebaño» conserva el valor colectivo de צֹאן mejor que un singular más atomizado.
  - La fórmula profética «declara» preserva el registro solemne y breve de נְאֻם.
  - Se evitó «SEÑOR» como máscara del nombre divino para respetar la transliteración doctrinalmente adoptada por el proyecto.
