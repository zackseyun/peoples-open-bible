translation:
  language: es
  text: Cuando David llegó a su casa en Jerusalén, el rey tomó a las diez mujeres, las concubinas que había dejado para cuidar la casa, y las puso en custodia[a] y les dio sustento, pero no entró a ellas[b]. Así quedaron confinadas hasta el día de su muerte[c], viviendo como viudas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “una casa de custodia” o “confinamiento”; el hebreo dice literalmente “casa de custodia/guardia”.
    reason: lexical_alternative
  - marker: b
    text: “No entró a ellas” es un eufemismo hebreo para las relaciones sexuales.
    reason: cultural_note
  - marker: c
    text: Literalmente, “viudez de vida” o “viudez de vivientes”; es decir, vivieron como viudas aunque David seguía con vida.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּיתוֹ
  english_pob_choice: his house
  chosen_spanish: su casa
  alternatives_spanish:
  - su palacio
  - su hogar
  - su casa real
  lexicon: HALOT
  rationale: בַּיִת puede significar casa, palacio u hogar/linaje según el contexto. Aquí, al volver David a Jerusalén, “su casa” reproduce con naturalidad la imagen del texto y no introduce una especificación interpretativa como “palacio”.
- source_word: פִּלַגְשִׁים
  english_pob_choice: concubines
  chosen_spanish: concubinas
  alternatives_spanish:
  - esposas secundarias
  - mujeres del rey
  lexicon: HALOT
  rationale: El término describe mujeres con estatus conyugal reconocido pero inferior al de una esposa plena. “Concubinas” es el equivalente directo y conserva la fuerza social y legal del hebreo.
- source_word: הִנִּיחַ לִשְׁמֹר הַבַּיִת
  english_pob_choice: had left to keep the house
  chosen_spanish: había dejado para cuidar la casa
  alternatives_spanish:
  - había dejado para guardar la casa
  - había dejado a cargo de la casa
  lexicon: HALOT
  rationale: שׁמר con “casa” puede implicar guardar, vigilar o atender. “Cuidar la casa” comunica en español la responsabilidad de permanecer allí y velar por el lugar sin sonar forzado.
- source_word: בֵּית מִשְׁמֶרֶת
  english_pob_choice: custody
  chosen_spanish: custodia
  alternatives_spanish:
  - encierro
  - confinamiento
  - una casa de custodia
  lexicon: HALOT
  rationale: La expresión literalmente es “casa de custodia/guardia”. “Custodia” conserva el matiz de reclusión vigilada y es más natural en español que una traducción demasiado literal.
- source_word: וַיְכַלְכְּלֵם
  english_pob_choice: provided for them
  chosen_spanish: les dio sustento
  alternatives_spanish:
  - los sostuvo
  - les proveyó
  - los mantuvo
  lexicon: HALOT
  rationale: El verbo expresa sostener, mantener o proveer lo necesario. “Les dio sustento” mantiene la idea de provisión continua y evita reducirlo a un simple acto puntual.
- source_word: וַאֲלֵיהֶם לֹא בָא
  english_pob_choice: he did not go in to them
  chosen_spanish: no entró a ellas
  alternatives_spanish:
  - no tuvo relaciones con ellas
  - no se llegó a ellas
  lexicon: HALOT
  rationale: La locución hebrea es un eufemismo sexual. “No entró a ellas” preserva la forma idiomática y la tensión del texto; “no tuvo relaciones con ellas” explicita el sentido pero pierde el eufemismo.
- source_word: צְרֻרוֹת
  english_pob_choice: confined
  chosen_spanish: confinadas
  alternatives_spanish:
  - encerradas
  - recluidas
  - retenidas
  lexicon: HALOT
  rationale: El participio pasivo indica ser puestas aparte o encerradas. “Confinadas” refleja bien el estado resultante y armoniza con “custodia”.
- source_word: עַד יוֹם מֻתָן
  english_pob_choice: until the day of their death
  chosen_spanish: hasta el día de su muerte
  alternatives_spanish:
  - hasta el día en que murieron
  - hasta el día de su fallecimiento
  lexicon: HALOT
  rationale: La construcción hebrea es una forma nominal directa. “Hasta el día de su muerte” conserva esa estructura y el paralelismo con el resto de la frase.
- source_word: אַלְמְנוּת חַיּוּת
  english_pob_choice: living as widows
  chosen_spanish: viviendo como viudas
  alternatives_spanish:
  - en viudez viviente
  - como viudas vivas
  - en condición de viudas vivientes
  lexicon: HALOT
  rationale: 'La expresión es literalmente extraña: “viudez de vida/vivientes”. “Viviendo como viudas” comunica el contraste de manera clara y conserva la ironía trágica del hebreo sin suavizarla.'
theological_decisions:
- issue: Tratamiento de las concubinas por David y la desnudez moral del relato
  english_pob_reading: Translate descriptively without softening or justifying the action.
  chosen_spanish_reading: Traducir de manera descriptiva, sin justificar ni atenuar la acción de David ni el estado de las mujeres.
  alternative_spanish_readings:
  - Usar un lenguaje protector que suavice la reclusión
  - Agregar una valoración moral explícita que no está formulada en el verso
  rationale: 'El versículo narra hechos concretos: reclusión, provisión, ausencia de relaciones sexuales y viudez en vida. La versión española conserva esa sobriedad para no importar una evaluación ajena al texto, ni amortiguar su dureza narrativa.'
  doctrine_reference: Principios de fidelidad textual y transparencia del POB
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión inglesa más reciente: usa “custodia” y “confinadas” como opciones más naturales que equivalentes más pesados, pero mantiene la secuencia semántica completa del hebreo: llegada, toma de las mujeres, reclusión, provisión, ausencia de acceso sexual y estado de viudez en vida.'
  spanish_consistency_notes:
  - Se usa “Yahvé” solo cuando aparece el nombre divino; este versículo no lo contiene.
  - “Concubinas” se conserva por fuerza lexical y no se rebaja a un término genérico.
  - Se mantiene “custodia”/“confinadas” para reflejar el campo semántico de בֵּית מִשְׁמֶרֶת y צְרֻרוֹת.
  - La nota de la frase eufemística se deja en pie porque el español normal puede ocultar la expresión original si se explica solo en el cuerpo del texto.
  - “Viviendo como viudas” conserva la paradoja hebrea sin convertirla en una paráfrasis moralizada.
