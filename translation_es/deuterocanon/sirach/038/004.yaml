translation:
  language: es
  text: Dios creó remedios[b] de la tierra[a], y un hombre sensato no los despreciará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo tiene אל («Dios») como sujeto; el paralelo griego dice Κύριος («Señor»).
    reason: alternative_reading
  - marker: b
    text: La forma hebrea detrás de «creó» es difícil en esta tradición manuscrita; el paralelo griego apoya el sentido de que Dios es quien hace surgir los remedios de la tierra.
    reason: textual_variant
lexical_decisions:
- source_word: אל / Κύριος
  english_pob_choice: The Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Dios
  - el Señor
  lexicon: Hebrew source / Greek parallel; project default for יהוה
  rationale: El hebreo de la base tiene אל como sujeto divino, mientras que el paralelo griego lee Κύριος. En el proyecto, יהוה se vierte como «Yahvé»; aunque aquí no aparece el tetragrámaton explícito, la referencia a la acción creadora divina en Ben Sira y la elección del griego justifican un nombre divino explícito y no un título velado. «Yahvé» preserva la identidad divina sin borrar el matiz del paralelo.
- source_word: מארץ / ἐκ γῆς
  english_pob_choice: from the earth
  chosen_spanish: de la tierra
  alternatives_spanish:
  - desde la tierra
  - de la tierra/land
  lexicon: HALOT / Greek parallel
  rationale: «De la tierra» reproduce con naturalidad el origen material indicado por la preposición más הארץ y coincide con ἐκ γῆς. «Tierra» funciona bien en español bíblico y evita una literalidad extraña.
- source_word: מצוציא / ἔκτισεν
  english_pob_choice: created
  chosen_spanish: creó
  alternatives_spanish:
  - produjo
  - hizo surgir
  - originó
  lexicon: HALOT / Greek parallel
  rationale: La forma hebrea es difícil en esta tradición textual, pero el griego apoya claramente una acción creadora. «Creó» conserva la fuerza teológica de la originación divina y suena natural en español.
- source_word: תרופות
  english_pob_choice: medicines
  chosen_spanish: medicamentos
  alternatives_spanish:
  - remedios
  - medicinas
  - medios curativos
  lexicon: HALOT
  rationale: El término designa sustancias o recursos medicinales. «Medicamentos» es claro y preciso en español moderno; «remedios» sería posible, pero algo más amplio y menos específico.
- source_word: גבר מבין / ἀνὴρ φρόνιμος
  english_pob_choice: a sensible man
  chosen_spanish: un hombre sensato
  alternatives_spanish:
  - un hombre prudente
  - un hombre entendido
  - un hombre sabio
  lexicon: HALOT / Greek parallel
  rationale: מבין y φρόνιμος apuntan a discernimiento práctico, no solo a inteligencia abstracta. «Sensato» comunica bien esa prudencia concreta, y «hombre» conserva el referente masculino del texto.
- source_word: אל ימאס בם / οὐ προσοχθιεῖ αὐτοῖς
  english_pob_choice: will not despise them
  chosen_spanish: no los despreciará
  alternatives_spanish:
  - no los rechaza
  - no los tendrá por detestables
  - no los menospreciará
  lexicon: HALOT / Greek parallel
  rationale: מאס y el verbo griego expresan rechazo despectivo. «Despreciará» mantiene la fuerza evaluativa del original; el pronombre «los» se entiende por referencia a los medicamentos.
theological_decisions:
- issue: ¿Nombrar a Dios como «Yahvé» o usar un título genérico?
  english_pob_reading: The Lord created medicines from the earth
  chosen_spanish_reading: Yahvé creó medicamentos de la tierra
  alternative_spanish_readings:
  - Dios creó medicamentos de la tierra
  - El Señor creó medicamentos de la tierra
  rationale: 'Aunque el hebreo base tiene אל y el griego Κύριος, la política del proyecto evita el enmascaramiento sistemático con «SEÑOR». En una afirmación creadora como esta, «Yahvé» comunica con mayor transparencia la referencia divina sin alterar el sentido teológico central: Dios es el originador de los recursos curativos.'
  doctrine_reference: 'DOCTRINE.md: render divine names/titles transparently; prefer Yahvé for YHWH and avoid masking conventions.'
- issue: La dificultad textual de מצוציא frente al apoyo del griego ἔκτισεν
  english_pob_reading: the Lord brings medicines into being from the earth
  chosen_spanish_reading: creó medicamentos de la tierra
  alternative_spanish_readings:
  - hizo surgir medicamentos de la tierra
  - produjo medicamentos de la tierra
  rationale: La tradición hebrea transmite una forma problemática, pero el paralelo griego sostiene con claridad una acción de creación/origen. La traducción española debe reflejar esa tensión y no suavizarla en exceso; «creó» deja visible el contenido teológico del verso y respeta el apoyo del griego.
  doctrine_reference: 'DOCTRINE.md: use parallel source when Hebrew is difficult; do not erase documented textual tension.'
translation_notes:
  revision_awareness: La redacción sigue la lectura revisada del inglés POB, que pasó de «intelligent man» a «sensible man». En español se adoptó «hombre sensato» para reflejar mejor מבין / φρόνιμος como discernimiento práctico. También se mantuvo la tensión textual entre el hebreo (אל) y el griego (Κύριος), sin resolverla por medio de una paráfrasis difusa.
  spanish_consistency_notes:
  - Se preserva el referente masculino singular de גבר como «hombre», de acuerdo con la política de no neutralizar representaciones masculinas cuando el texto las usa.
  - «Medicamentos» se usa de modo concreto y moderno; no se sustituye por un término más eclesiástico o más general.
  - 'La estructura del versículo sigue de cerca el original: sujeto divino + verbo de creación + origen terrestre + sujeto humano sensato + negación de desprecio.'
