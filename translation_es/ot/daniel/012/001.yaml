    reason: lexical_alternative
  - marker: c
    text: O ‘será librado’.
    reason: lexical_alternative
  - marker: d
    text: O ‘todo el que se halle inscrito en el libro’.
    reason: lexical_alternative
  revision_rationale: Se corrigieron las notas para que cada alternativa quede anclada al elemento correcto del texto, se mejoró la naturalidad de הָעֹמֵד עַל con 'que está sobre', y se ajustó la última cláusula a un singular distributivo más fiel y natural en español. El sentido general del borrador era bueno; los cambios son de precisión y legibilidad.
