review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura del versículo: doble imperativo, referencia a la morada santa y gloriosa, pregunta sobre el celo y las obras poderosas de Dios, y el cierre sobre la compasión divina retenida. Sin embargo, hay ajustes necesarios: ''desde los cielos'' es posible pero menos natural que ''desde el cielo'' aquí; ''hazañas poderosas'' suena algo heroizante y menos fiel al sentido de גבורות como manifestaciones poderosas/obras poderosas; y la nota [a] está mal anclada y explica הַבֵּט en vez de preservar la alternativa/explicación documentada para וּרְאֵה o el giro general. La nota [b] no aporta una alternativa real distinta del texto principal. La línea final puede sonar más natural como ''se han contenido lejos de mí'' o ''me son retenidos'', pero conviene mantener el matiz reflexivo documentado.'
  spanish_quality_summary: El español es generalmente claro y digno. 'Mira desde los cielos y ve' funciona, aunque 'cielos' aquí resulta un poco menos idiomático en español bíblico general. 'Hazañas poderosas' no es incorrecto, pero suena más literario-épico que el hebreo. 'El movimiento de tus entrañas' preserva bien la imagen corporal, pero 'movimiento' es algo débil frente a הֲמוֹן como agitación/conmoción; 'agitación' expresa mejor la emoción interna. La frase final 'se han retraído de mí' es comprensible, aunque algo rígida; 'se han contenido lejos de mí' suena más natural y conserva el valor de autoretención.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. Se preserva correctamente el antropopatismo con 'entrañas' y קִנְאָה como 'celo'. La revisión propuesta mejora la correspondencia con las decisiones léxicas del POB para גבורות ('obras poderosas') y para הֲמוֹן ('agitación').
  issues:
  - severity: medium
    issue: '''hazañas poderosas'' para גְבוּרוֹתֶיךָ'
    rationale: Aunque comunica fuerza, 'hazañas' introduce un matiz heroico/épico que puede ir más allá de 'obras poderosas' o 'hechos poderosos', más cercanos a manifestaciones divinas de poder en contexto.
  - severity: medium
    issue: הֲמוֹן traducido como 'movimiento'
    rationale: '''Movimiento'' es demasiado neutro. El contexto idiomático con ''entrañas'' apunta a agitación, conmoción o hervir interior de compasión; conviene una palabra más emotiva.'
  - severity: low
    issue: '''desde los cielos'' en el texto principal'
    rationale: Es defendible por el plural morfológico hebreo, pero en español corriente y bíblico 'desde el cielo' es más idiomático sin pérdida de sentido.
  - severity: high
    issue: Aparato de notas desalineado con el texto y el expediente inglés
    rationale: La nota [a] comenta 'mira' en vez de una alternativa significativa preservada por el expediente; la [b] repite el texto principal como si fuera alternativa; y el conjunto no refleja de modo limpio las alternativas léxicas más pertinentes.
  revised_spanish_text: Mira desde el cielo y ve, desde tu santa y gloriosa morada. ¿Dónde están tu celo[a] y tus obras poderosas? La agitación de tus entrañas y tus compasiones se han contenido lejos de mí[b].
  revised_footnotes:
  - marker: a
    text: O 'tus celos'; aquí se refiere al celo apasionado de Dios por intervenir en favor de su pueblo.
    reason: lexical_alternative
  - marker: b
    text: O 'se han retenido de mí' o 'se han contenido de mí'; el verbo expresa que la compasión divina se frena o se guarda.
    reason: lexical_alternative
  revision_rationale: 'Se ajustó el texto para hacerlo más fiel al sentido del hebreo y al expediente POB: ''desde el cielo'' por naturalidad idiomática; ''obras poderosas'' en vez de ''hazañas poderosas'' para evitar un matiz épico añadido; ''agitación de tus entrañas'' para reflejar mejor הֲמוֹן como conmoción emocional interna; y ''se han contenido lejos de mí'' para conservar el valor de autoretención del verbo con español más natural. También se sustituyeron las notas por un aparato más útil y alineado con las alternativas léxicas relevantes.'
