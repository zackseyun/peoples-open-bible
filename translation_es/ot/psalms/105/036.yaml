translation:
  language: es
  text: Él golpeó a todo primogénito en su tierra, primicias[a] de toda su fuerza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la primera expresión de todo su vigor»; la expresión hebrea se refiere a la descendencia más temprana como la primera manifestación de fuerza.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּךְ
  english_pob_choice: He struck down
  chosen_spanish: Golpeó
  alternatives_spanish:
  - Hirió
  - Asestó un golpe a
  - Derrotó
  lexicon: HALOT
  rationale: El verbo נכה en este contexto expresa la acción divina contra los primogénitos. En español, «golpeó» conserva la idea básica de «struck» sin introducir más de lo que exige el hebreo; el resultado letal queda claro por el contexto inmediato del salmo y de las plagas.
- source_word: כָּל
  english_pob_choice: every
  chosen_spanish: todo
  alternatives_spanish:
  - cada
  - todo lo
  lexicon: HALOT
  rationale: Con un sustantivo singular distributivo («primogénito»), «todo» funciona naturalmente en español y preserva el alcance universal del hebreo.
- source_word: בְּכוֹר
  english_pob_choice: firstborn
  chosen_spanish: primogénito
  alternatives_spanish:
  - primera cría
  - hijo primogénito
  lexicon: HALOT
  rationale: «Primogénito» es el equivalente español preciso y estándar para בְּכוֹר en este contexto narrativo y litúrgico.
- source_word: בְּאַרְצָם
  english_pob_choice: in their land
  chosen_spanish: en su tierra
  alternatives_spanish:
  - en su país
  - en su territorio
  lexicon: HALOT
  rationale: ארץ con sufijo posesivo se rinde naturalmente como «tierra»; mantiene el marco geográfico de Egipto sin endurecerlo con un término más técnico.
- source_word: רֵאשִׁית
  english_pob_choice: the firstfruits
  chosen_spanish: primicias
  alternatives_spanish:
  - la primera parte
  - lo primero
  lexicon: HALOT
  rationale: «Primicias» recoge el valor de ראשית como lo primero/surgido al comienzo y, en español bíblico, conserva el matiz de producto inicial y selecto. Aunque en este versículo el sentido es metafórico, la palabra mantiene bien la relación con la idea de origen o primacía.
- source_word: לְכָל
  english_pob_choice: of all
  chosen_spanish: de toda
  alternatives_spanish:
  - de todo
  - de cada
  lexicon: HALOT
  rationale: La preposición ל aquí marca relación posesiva con el sintagma siguiente; «de toda» expresa mejor en español la dependencia de «primicias» respecto de «fuerza».
- source_word: אוֹנָם
  english_pob_choice: their strength
  chosen_spanish: su fuerza
  alternatives_spanish:
  - su vigor
  - su potencia generativa
  lexicon: HALOT
  rationale: און puede significar fuerza, vigor o potencia procreativa. «Fuerza» es la opción más natural y abarcadora en español; deja abierta la posible resonancia de vigor vital sin cargar el texto con una paráfrasis explícita.
theological_decisions:
- issue: Sujeto implícito del verbo
  english_pob_reading: He refers to God
  chosen_spanish_reading: Se sobreentiende que Dios es el sujeto
  alternative_spanish_readings:
  - Él golpeó
  - Dios golpeó
  rationale: El hebreo omite el sujeto explícito, pero el contexto de las plagas en el salmo lo identifica claramente. En español, un verbo en tercera persona singular sin sujeto expreso puede resultar menos claro; la formulación mantiene la referencia implícita sin añadir un nombre que el versículo no da.
  doctrine_reference: Narrativa de las plagas del Éxodo; soberanía divina en el juicio.
translation_notes:
  revision_awareness: 'El pasaje concuerda ampliamente con la auditoría inglesa y con la morfología hebrea. Se conserva el paralelismo breve del hebreo: acción divina sobre todo primogénito, seguida de una apposición metafórica sobre el primer producto de su fuerza. No hubo revisiones previas aplicadas en la fuente inglesa.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el hebreo lo exige explícitamente; aquí el versículo no lo nombra, por lo que el sujeto queda implícito en la forma verbal y en el contexto del salmo.
  - Se usa «primogénito» como término bíblico estándar y «primicias» para רֵאשִׁית, evitando sustituirlo por una paráfrasis más interpretativa.
  - «Fuerza» conserva la amplitud semántica de אוֹן sin restringirlo únicamente a vigor sexual o generativo.
