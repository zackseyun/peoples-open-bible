id: HOS.11.5
reference: Hosea 11:5
source:
  edition: WLC
  text: לֹ֤א יָשׁוּב֙ אֶל אֶ֣רֶץ מִצְרַ֔יִם וְ/אַשּׁ֖וּר ה֣וּא מַלְכּ֑/וֹ כִּ֥י מֵאֲנ֖וּ לָ/שֽׁוּב־׃
translation:
  text: He will not return to the land of Egypt[a], but Assyria will be his king[b], because they have refused to return.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'He will not return to the land of Egypt, but Assyria—he will be his king.' The Hebrew construction is compressed and can be represented more formally.
    reason: lexical_alternative
  - marker: b
    text: '''Return'' in the final clause may also carry the sense ''turn back'' or ''repent.'' The Hebrew preserves both physical and spiritual overtones.'
    reason: alternative_reading
lexical_decisions:
- source_word: לֹא יָשׁוּב
  chosen: He will not return
  alternatives:
  - He shall not return
  - He will not go back
  lexicon: HALOT
  rationale: Qal imperfect 3ms of שוב with negation. Rendered futurally as a prophetic statement. 'Return' preserves the lexical link with the later infinitive לָשׁוּב in the same verse.
- source_word: אֶל אֶרֶץ מִצְרַיִם
  chosen: to the land of Egypt
  alternatives:
  - to Egypt
  lexicon: HALOT
  rationale: More formally preserves both the preposition and the noun 'land,' which may echo Israel's earlier bondage and exodus history.
- source_word: וְאַשּׁוּר
  chosen: instead, Assyria
  alternatives:
  - but Assyria
  - and Assyria
  lexicon: HALOT
  rationale: 'The conjunction is rendered adversatively in context: not Egypt, but Assyria. ''Assyria'' is the standard transliteration of the place-name.'
- source_word: הוּא מַלְכּוֹ
  chosen: will be his king
  alternatives:
  - is his king
  - he—Assyria—is his king
  lexicon: HALOT
  rationale: Nominal clause with pronoun plus predicate. English future 'will be' fits the prophetic context. 'His king' is retained rather than smoothing to 'rule over him' in order to preserve the metaphor of foreign domination.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Introduces the reason for the announced judgment.
- source_word: מֵאֲנוּ
  chosen: they have refused
  alternatives:
  - they refused
  - they were unwilling
  lexicon: HALOT
  rationale: Perfect 3cp of מאן, referring to the people collectively. 'Have refused' communicates a settled refusal with present relevance.
- source_word: לָשׁוּב
  chosen: to return
  alternatives:
  - to turn back
  - to repent
  lexicon: HALOT
  rationale: The infinitive of שוב can denote physical return or covenantal turning back. 'Return' preserves the deliberate ambiguity and echoes the earlier יָשׁוּב. 'Repent' would over-interpret the term here.
