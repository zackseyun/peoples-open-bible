base_translation:
  language: en
  yaml_path: translation/ot/isaiah/050/011.yaml
  text: 'Look[a], all of you who kindle a fire, who gird yourselves with firebrands: walk in the light of your fire and among the brands you have kindled[b]. This has come to you from my hand: you will lie down in torment.'
  footnotes:
  - marker: a
    text: Or 'sparks' (also possibly 'firebrands' or 'flaming darts') for 'burning arrows.'
    reason: lexical_alternative
  - marker: b
    text: Or 'you will lie down in sorrow' or 'in anguish.'
    reason: lexical_alternative
