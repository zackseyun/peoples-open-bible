translation:
  language: es
  text: Así David persiguió, él y cuatrocientos hombres, mientras doscientos hombres se quedaron atrás, que estaban demasiado exhaustos[a] para cruzar el arroyo Besor[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que se fueron agotando» o «que se rezagaron por el cansancio» para la expresión hebrea.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «el arroyo Besor». נחל puede referirse a un arroyo, wadi o cauce estacional.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּרְדֹּף
  english_pob_choice: pursued
  chosen_spanish: persiguió
  alternatives_spanish:
  - fue en persecución de
  - siguió en persecución de
  - persiguió tras
  lexicon: HALOT
  rationale: רדף expresa perseguir en sentido activo, especialmente en contexto militar. «Persiguió» reproduce bien la acción narrativa breve y directa del hebreo, sin introducir un matiz excesivo.
- source_word: הוּא וְאַרְבַּע מֵאוֹת אִישׁ
  english_pob_choice: he and four hundred men
  chosen_spanish: él y cuatrocientos hombres
  alternatives_spanish:
  - con cuatrocientos hombres
  - él con cuatrocientos hombres
  lexicon: HALOT
  rationale: El pronombre enfático hebreo הוּא se conserva naturalmente con «él». «Hombres» refleja אִישׁ en expresión numérica militar, y el orden español mantiene la fuerza appositiva sin sonar forzado.
- source_word: וַיַּעַמְדוּ
  english_pob_choice: stayed behind
  chosen_spanish: se quedaron atrás
  alternatives_spanish:
  - permanecieron
  - se detuvieron
  lexicon: HALOT
  rationale: Aunque literalmente significa «se pusieron de pie / estuvieron», en este contexto narrativo expresa que no siguieron la marcha. «Se quedaron atrás» comunica bien la función del verbo sin perder la idea de separación del grupo que continúa.
- source_word: מָאתַיִם אִישׁ
  english_pob_choice: two hundred men
  chosen_spanish: doscientos hombres
  alternatives_spanish:
  - doscientos varones
  lexicon: HALOT
  rationale: La cifra es directa y «hombres» es el equivalente natural de אִישׁ en conteos de grupo o tropa.
- source_word: אֲשֶׁר פִּגְּרוּ
  english_pob_choice: who were too exhausted
  chosen_spanish: porque estaban demasiado exhaustos
  alternatives_spanish:
  - que estaban demasiado extenuados
  - que se habían quedado sin fuerzas
  lexicon: HALOT
  rationale: פִּגְּרוּ puede implicar agotamiento, desfallecimiento o quedar incapaces de seguir. En español, «demasiado exhaustos» preserva la tensión semántica de la incapacidad física sin decidir de manera demasiado estrecha entre «desfallecidos» y «rezagados».
- source_word: מֵעֲבֹר
  english_pob_choice: to cross
  chosen_spanish: para cruzar
  alternatives_spanish:
  - de cruzar
  - para pasar
  lexicon: HALOT
  rationale: La construcción con מן + infinitivo expresa aquí incapacidad para realizar la acción. «Para cruzar» suena natural en español y mantiene el valor final/limitativo del hebreo.
- source_word: נַחַל הַבְּשׂוֹר
  english_pob_choice: the Brook Besor
  chosen_spanish: el arroyo Besor
  alternatives_spanish:
  - el torrente Besor
  - el wadi Besor
  lexicon: HALOT
  rationale: נַחַל puede abarcar arroyo, torrente o cauce estacional. «Arroyo» es una opción clara y pública en español, y conserva la idea de un curso de agua sin imponer un tecnicismo geográfico.
translation_notes:
  revision_awareness: El testimonio inglés auditado muestra acuerdo alto y no registra revisiones aplicadas; se ha mantenido el sentido narrativo y la ambigüedad léxica relevante de פִּגְּרוּ mediante una nota alternativa en español.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - Se mantiene «hombres» para אִישׁ en el conteo militar, coherente con el patrón de la serie.
  - La nota sobre נַחַל preserva la posible amplitud semántica sin sustituir el topónimo Besor.
