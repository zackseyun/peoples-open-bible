  - marker: b
    text: El verbo griego es más literalmente «dispersamos» o «esparcimos»; aquí se refiere a apartar, suprimir o desmantelar sus prácticas legales.
    reason: lexical_alternative
  revision_rationale: Se ajusta la apertura para expresar de manera natural en español la idea de establecer una política que les permita vivir según sus leyes, sin el calco extraño «establezcamos... el andar». Se conserva el sentido del POB inglés y del griego, junto con las notas léxicas, pero se pule la nota b para evitar una palabra demasiado coloquial.
