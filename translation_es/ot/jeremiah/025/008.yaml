translation:
  language: es
  text: 'Por tanto, así dice Yahvé de los ejércitos: porque no han escuchado mis palabras[b],'
  philosophy: optimal-equivalence
  footnotes:
  - marker: b
    text: O «no han obedecido mis palabras». El verbo hebreo puede llevar el sentido de escuchar con respuesta obediente.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: La partícula expresa consecuencia respecto de la denuncia anterior; «Por tanto» conserva el valor inferencial con un tono formal y natural en español.
- source_word: כֹּה אָמַר
  english_pob_choice: thus says
  chosen_spanish: así ha dicho
  alternatives_spanish:
  - así dice
  - esto dice
  lexicon: HALOT
  rationale: La fórmula profética requiere solemnidad. «Así ha dicho» refleja bien la fórmula hebrea sin sonar artificiosamente arcaica, y mantiene la cadencia declarativa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino como transliteración del Tetragrámaton, conforme al criterio POB; «Yahvé» evita la sustitución por un título y es idiomático en español bíblico contemporáneo.
- source_word: צְבָא֑וֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de los ejércitos
  lexicon: HALOT
  rationale: En español, «ejércitos» comunica con mayor claridad la amplitud del título divino que «hosts», que no es natural para la mayoría de lectores. Mantiene el sentido de fuerzas celestiales y terrenales bajo su mando.
- source_word: שְׁמַעְתֶּם
  english_pob_choice: have not listened
  chosen_spanish: no han escuchado
  alternatives_spanish:
  - no han obedecido
  - no han oído
  lexicon: HALOT
  rationale: El verbo שׁמע incluye escuchar con respuesta obediente. «Han escuchado» sigue el sentido directo de oír/atender y deja visible la tensión con la posible idea de obedecer, sin forzarla en el texto principal.
- source_word: אֶת דְּבָרַי
  english_pob_choice: my words
  chosen_spanish: mis palabras
  alternatives_spanish:
  - mi palabra
  - lo que yo he dicho
  lexicon: HALOT
  rationale: «Palabras» reproduce con precisión דְּבָרַי y mantiene el plural del hebreo. En español, suena más natural que una singularización teológica aquí.
theological_decisions:
- issue: Tratamiento del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El versículo usa el Tetragrámaton. La política POB preserva el nombre propio divino en la traducción; «Yahvé» es la forma escogida para español, manteniendo la transparencia frente al texto fuente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh / transliteración del nombre divino'
- issue: Valor semántico de שׁמע en contexto de reproche profético
  english_pob_reading: have not listened
  chosen_spanish_reading: no han escuchado
  alternative_spanish_readings:
  - no han obedecido
  - no han oído
  rationale: El hebreo permite oír/escuchar con respuesta obediente. «No han escuchado» preserva el núcleo auditivo y deja implícita la desobediencia sin eliminar la tensión lexical que el inglés POB también retiene.
  doctrine_reference: Uso semántico de שׁמע en contextos de obediencia profética
- issue: Título יְהוָה צְבָאוֹת
  english_pob_reading: Yahweh of hosts
  chosen_spanish_reading: Yahvé de los ejércitos
  alternative_spanish_readings:
  - Yahvé de los ejércitos celestiales
  - Yahvé de los ejércitos del cielo
  rationale: «De los ejércitos» mantiene el título tradicional sin convertirlo en una paráfrasis interpretativa. En español, esta opción es más transparente que conservar «hosts» o reducir el sentido a «armadas».
  doctrine_reference: Lexical title usage in prophetic formulae
translation_notes:
  revision_awareness: El contexto de revisión indica alta concordancia y sin cambios necesarios en el paso más reciente; esta propuesta sigue el mismo contenido semántico del texto base y solo ajusta la forma al español con la terminología POB para el nombre divino y el matiz de שׁמע.
  spanish_consistency_notes:
  - Se mantiene la transliteración del nombre divino como «Yahvé» para coherencia con el proyecto.
  - «Ejércitos» se usa como equivalente español natural del título צְבָאוֹת en esta fórmula profética.
  - «Escuchado» conserva el campo semántico de שׁמע sin borrar la posible idea de obediencia implícita.
  - Se preserva el plural «palabras» para reflejar דְּבָרַי con fidelidad al hebreo.
