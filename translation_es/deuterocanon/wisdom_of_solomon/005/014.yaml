revisions:
- from: Porque la esperanza del impío es como la borra[a] llevada por el viento, y como la escarcha fina empujada por la tormenta, y como el humo dispersado por el viento, y pasa como el recuerdo de un huésped de un día.
  to: Porque la esperanza del impío es como la borra llevada por el viento, y como la escarcha fina arrastrada por la tormenta, y como el humo dispersado por el viento, y pasa como el recuerdo de un huésped de un día[a].
  rationale: Se reubicó la nota al segmento que realmente comenta, para cumplir con la disciplina de anclaje de notas. También se cambió «empujada» por «arrastrada» para reflejar mejor διωχθεῖσα en la imagen de la escarcha barrida por la tormenta. Se mantuvo «borra» como opción defendible para χνοῦς, aunque menos común que «pelusa».
