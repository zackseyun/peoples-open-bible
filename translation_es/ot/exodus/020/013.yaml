review_pass:
  verdict: revise
  source_alignment_summary: 'El hebreo לֹא תִּרְצָח es una prohibición breve y directa: «No ...» + verbo רצח, cuyo sentido aquí se alinea bien con «murder»/muerte ilícita más que con todo acto de matar. La nota alternativa inglesa preserva «kill» como opción más amplia. El borrador español acierta al evitar «matarás» como texto principal, pero «cometerás homicidio» añade un sustantivo derivado y una perífrasis más pesada que el verbo fuente no exige.'
  spanish_quality_summary: «No cometerás homicidio» es inteligible, pero suena más jurídico y menos natural/bíblico que una prohibición verbal simple. En español eclesial general, «No asesinarás» comunica mejor una prohibición directa y conserva la especificidad frente a «matar». La nota del borrador es clara y útil, aunque conviene ajustar ligeramente la redacción para que suene más natural en español.
  glossary_alignment: No hay términos del glosario mayor implicados salvo la exigencia de fidelidad léxica. La decisión central de la POB inglesa —traducir רצח como «murder» y no «kill»— debe mantenerse; «asesinar» lo refleja mejor que «cometer homicidio» por forma verbal, claridad y naturalidad. «No matarás» debe quedar en nota como alternativa tradicional pero más amplia.
  issues:
  - severity: medium
    issue: El texto principal usa «cometerás homicidio» en vez de un verbo simple.
    rationale: Aunque semánticamente defendible, introduce una formulación más técnica y pesada que el hebreo breve לֹא תִּרְצָח. Una prohibición verbal simple preserva mejor forma, fuerza y legibilidad en español.
  - severity: low
    issue: La nota puede pulirse estilísticamente.
    rationale: «no a toda forma de dar muerte» es correcto, pero «no a toda clase de muerte» o «no a todo acto de matar» puede leerse con más naturalidad; además conviene mantener explícita la relación con la ilicitud del acto.
  revised_spanish_text: No asesinarás[a].
