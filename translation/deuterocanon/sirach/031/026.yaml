theological_decisions:
- issue: Anthropological sense of נפש
  chosen_reading: life/self-presence rather than immaterial 'soul'
  alternative_readings:
  - soul is with him
  rationale: The Hebrew term is broader than the English theological term 'soul.' In this context, the line most naturally speaks of continued life or intact selfhood, not a doctrinal statement about the soul's nature.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than import doctrinal claims; readable modern English.'
- issue: Source divergence between Hebrew and Greek witnesses
  chosen_reading: main text follows the surviving Hebrew witness
  alternative_readings:
  - translate the Greek line instead
  rationale: Project policy for Sirach is to translate from the Hebrew where it survives, while using the Greek as an actual input and consistency check. Here the Greek parallel materially conflicts with the Hebrew, so the Hebrew governs and the Greek divergence is preserved in a footnote.
  doctrine_reference: 'PHILOSOPHY.md: Sefaria Ben Sira Hebrew is used where it survives; Swete LXX remains in view as Greek source for deuterocanonical books.'
