translation:
  language: es
  text: Consejero de iniquidad[a], tirano, no nos odies; más bien, ten misericordia de nosotros más que con ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego es muy comprimido: literalmente, algo como «Consejero, tirano de iniquidad, no odiándonos más que a ellos, ten misericordia de nosotros». La frase traducida «más que con ellos» también puede entenderse, con menor probabilidad, como «por causa de ellos».'
    reason: alternative_reading
lexical_decisions:
- source_word: σύμβουλε
  english_pob_choice: counselor
  chosen_spanish: Consejero
  alternatives_spanish:
  - consejero
  - asesor
  - cómplice
  lexicon: LSJ
  rationale: Es un vocativo directo. «Consejero» mantiene la relación de apelación personal y conserva el tono de reproche sin añadir matices no presentes.
- source_word: τύραννε
  english_pob_choice: tyrant
  chosen_spanish: tirano
  alternatives_spanish:
  - despota
  - gobernante
  lexicon: LSJ
  rationale: El vocativo acusa al interlocutor con fuerza política y moral. «Tirano» reproduce mejor esa carga negativa que «gobernante».
- source_word: παρανομίας
  english_pob_choice: lawless
  chosen_spanish: de iniquidad
  alternatives_spanish:
  - sin ley
  - ilegal
  - de maldad
  lexicon: LSJ
  rationale: El genitivo califica al vocativo previo. «De iniquidad» conserva la fuerza moral de transgresión/impiedad sin sonar torpemente literal en español. Evita «sin ley», que aquí puede sonar demasiado plano.
- source_word: μὴ ἡμᾶς μισῶν
  english_pob_choice: do not hate us
  chosen_spanish: no nos odies
  alternatives_spanish:
  - no nos aborrezcas
  - deja de odiarnos
  lexicon: BDAG
  rationale: El participio con μή en la exhortación se vierte naturalmente como prohibición en segunda persona. «Odiar» comunica la dureza del griego con claridad; «aborrecer» sería posible, pero menos directo en español actual.
- source_word: ὑπὲρ αὐτοὺς
  english_pob_choice: more than on them
  chosen_spanish: más que de ellos
  alternatives_spanish:
  - más que a ellos
  - por causa de ellos
  - en vez de ellos
  lexicon: BDAG
  rationale: El griego es comprimido y admite valor comparativo. En español, «más que de ellos» conserva la comparación entre «nosotros» y «ellos» y deja abierta la ambigüedad del texto transmitido sin forzar una paráfrasis explicativa.
- source_word: ἐλέα
  english_pob_choice: have mercy on
  chosen_spanish: ten misericordia de
  alternatives_spanish:
  - ten compasión de
  - apiádate de
  lexicon: BDAG
  rationale: El imperativo de ἐλεέω pide una forma verbal natural en español. «Ten misericordia de» es bíblico y preciso, y no suaviza la súplica.
theological_decisions:
- issue: Relación entre la comparación de ὑπὲρ αὐτούς y la súplica de misericordia
  english_pob_reading: The speaker asks the tyrant to show mercy to 'us' in comparison with 'them,' not merely to pity 'us because of them.'
  chosen_spanish_reading: El hablante pide misericordia para «nosotros» en comparación con «ellos»; no se explicita una causalidad («por causa de ellos») como lectura principal.
  alternative_spanish_readings:
  - no nos odies por causa de ellos; ten misericordia de nosotros
  - no nos odies por encima de ellos; ten misericordia de nosotros
  rationale: La preposición ὑπέρ con acusativo suele tener sentido comparativo. Como el griego es breve y algo abrupto, la traducción española debe mantener esa tensión sin resolverla de manera interpretativa excesiva.
  doctrine_reference: BDAG; comparación de ὑπέρ con acusativo en contexto comparativo
- issue: Orden de los vocativos iniciales
  english_pob_reading: Counselor of lawlessness, tyrant
  chosen_spanish_reading: Consejero de iniquidad, tirano
  alternative_spanish_readings:
  - tirano, consejero de iniquidad
  - consejero, tirano de iniquidad
  rationale: El griego presenta una serie de vocativos compacta. En español, colocar primero el sintagma calificativo y luego el vocativo principal refleja el orden y la fuerza acumulativa del original sin inventar una relación posesiva.
  doctrine_reference: LSJ; sintaxis vocativa del griego helenístico
translation_notes:
  revision_awareness: La versión inglesa revisada corrigió el arranque para reflejar mejor los dos vocativos («Counselor of lawlessness, tyrant»). La redacción española sigue esa revisión, preservando la estructura apelativa y la comparación ambigua de ὑπὲρ αὐτούς.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo exija; aquí no aparece el nombre divino.
  - Se usa «tirano» y no un término neutral como «gobernante», para conservar la fuerza acusatoria del original.
  - Se prefiere «ten misericordia de» por su correspondencia bíblica y porque no debilita el mandato griego.
  - La nota al pie marca la compresión sintáctica del griego, que el español no debe disolver por completo.
