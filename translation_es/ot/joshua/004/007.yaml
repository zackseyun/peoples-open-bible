    issue: Pronombre expreso «ella» en «Cuando ella cruzó el Jordán»
    rationale: El hebreo refiere al arca mediante sufijo, pero en español el sujeto puede omitirse naturalmente. «Ella» suena enfático y poco fluido, y no añade fidelidad real al texto.
  - severity: low
