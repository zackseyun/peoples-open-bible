base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/007/013.yaml
  text: And the sons of Israel who were from the captivity ate[a], all those who had separated themselves from the abominations of the nations of the land[b], seeking the Lord.
  footnotes:
  - marker: a
    text: That is, they ate the Passover meal; the object is implicit in the Greek from the preceding context.
    reason: cross_reference
  - marker: b
    text: Or 'the peoples of the land.' The phrase refers to the surrounding inhabitants whose practices were regarded as defiling.
    reason: lexical_alternative
