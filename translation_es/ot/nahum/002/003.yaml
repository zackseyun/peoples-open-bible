translation:
  language: es
  text: Porque Yahvé está restaurando[a] la majestad de Jacob como la majestad de Israel[b], aunque devastadores los han devastado[c] y han arruinado sus ramas de vid.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ha restaurado» o «restaurará»; el verbo hebreo puede expresar certeza profética.
    reason: lexical_alternative
  - marker: b
    text: O «el orgullo de Jacob, como el orgullo de Israel».
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «los que vacían los han vaciado»; es decir, saqueadores que los han despojado por completo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁב
  english_pob_choice: is restoring
  chosen_spanish: está restaurando
  alternatives_spanish:
  - ha restaurado
  - restaura
  - restaurará
  lexicon: HALOT
  rationale: El qatal de שוב puede funcionar con valor de pasado, presente de certeza o perfecto profético. En español, el presente progresivo comunica bien la acción profética en curso o inminente sin fijarla de manera demasiado rígida como pasado o futuro.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del Tetragrámaton, conforme a la convención del proyecto, en vez de sustituirlo por un título como «el SEÑOR».
- source_word: גְּאוֹן
  english_pob_choice: majesty
  chosen_spanish: majestad
  alternatives_spanish:
  - orgullo
  - excelencia
  - gloria
  lexicon: HALOT
  rationale: Aquí el contexto favorece un sentido positivo de dignidad/restauración para Jacob e Israel. «Majestad» preserva ese valor sin sugerir la carga negativa que puede tener «orgullo».
- source_word: כִּ/גְא֖וֹן
  english_pob_choice: like the majesty
  chosen_spanish: como la majestad
  alternatives_spanish:
  - como la majestad de
  - igual que la majestad
  lexicon: HALOT
  rationale: El prefijo comparativo כ se expresa naturalmente con «como» en español, manteniendo la relación paralela entre Jacob e Israel.
- source_word: בְקָקוּ/ם ... בֹּקְקִים
  english_pob_choice: destroyers have destroyed
  chosen_spanish: destructores los han destruido
  alternatives_spanish:
  - devastadores los han devastado
  - los han despojado
  - vaciarán/vacían
  lexicon: HALOT
  rationale: La construcción intensiva del hebreo apunta a agentes que arrasan o despojan. «Destructores» sigue de cerca la revisión inglesa, y «los han destruido» conserva la fuerza verbal sin introducir una imagen más específica que el contexto no exige.
- source_word: וּ/זְמֹרֵי/הֶם
  english_pob_choice: their vine branches
  chosen_spanish: sus ramas de vid
  alternatives_spanish:
  - sus sarmientos
  - sus ramas
  - sus vástagos de vid
  lexicon: HALOT
  rationale: זְמוֹרָה se refiere de manera concreta a ramas o sarmientos de vid. «Ramas de vid» mantiene la imagen agrícola y es claramente inteligible en español.
- source_word: שִׁחֵֽתוּ
  english_pob_choice: ruined
  chosen_spanish: han arruinado
  alternatives_spanish:
  - han destruido
  - han echado a perder
  - han devastado
  lexicon: HALOT
  rationale: «Arruinar» conserva el matiz de dañar/estropear que encaja con la imagen de las ramas de vid dañadas, sin perder la fuerza destructiva del verbo.
theological_decisions:
- issue: Sentido positivo de גְּאוֹן aplicado a Jacob/Israel
  english_pob_reading: positive dignity/majesty restored by God
  chosen_spanish_reading: dignidad/majestad positiva que Yahvé restaura a Jacob e Israel
  alternative_spanish_readings:
  - orgullo restaurado
  - la gloria de Jacob
  rationale: El contexto es restaurador y favorece un valor honorífico de גְּאוֹן. Traducirlo como «orgullo» podría sugerir arrogancia pecaminosa, algo no requerido por el pasaje. «Majestad» mantiene la tensión semántica sin neutralizarla.
  doctrine_reference: Nahum 2:3; HALOT גְּאוֹן
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail inglés al preferir una formulación que refleje mejor בָּקַק/בֹּקְקִים como acción de destruir o devastar, manteniendo la estructura paralela del versículo y la lectura profética de שָׁב como presente de restauración.
  spanish_consistency_notes:
  - Se preservó Yahvé para el Tetragrámaton, conforme a la terminología del proyecto.
  - Se usó «majestad» para גְּאוֹן por la valoración positiva del contexto.
  - Se mantuvo «ramas de vid» para זְמוֹרֵי, evitando generalizar a «ramas» sin la referencia agrícola explícita.
  - La nota de certeza profética se mantuvo porque el hebreo permite varias lecturas temporales en שָׁב.
