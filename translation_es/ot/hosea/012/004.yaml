  yaml_path: translation/ot/hosea/012/004.yaml
  text: In the womb he grasped his brother’s heel[b][a], and in his strength he contended with God.
  footnotes:
  - marker: a
    text: Or, 'he took his brother by the heel.' The Hebrew verb evokes Jacob’s birth narrative and can carry the extended sense of supplanting.
    reason: lexical_alternative
  - marker: b
    text: Or, 'he strove with a divine being'; the following verse identifies the figure as 'the angel,' so Hosea preserves the tension rather than flattening it.
    reason: alternative_reading
