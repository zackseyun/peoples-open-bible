translation:
  language: es
  text: El resto de los hechos de Manasés, y todo lo que hizo, y el pecado que cometió[a], ¿no están escritos en el libro de las Crónicas de los reyes de Judá[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el pecado que él cometió». El hebreo usa una construcción enfática de sustantivo + verbo de la misma raíz.
    reason: lexical_alternative
  - marker: b
    text: O «los anales de los reyes de Judá». La expresión hebrea se refiere a una fuente documental real.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֶתֶר
  english_pob_choice: Now the rest of
  chosen_spanish: Ahora, el resto de
  alternatives_spanish:
  - Y el resto de
  - Así mismo, el resto de
  lexicon: HALOT
  rationale: יֶׁתֶר introduce lo que queda por mencionar en un resumen regio. En español, «Ahora» conserva el valor discursivo de transición sin añadir contenido, y «el resto de» sigue el sentido básico de lo remanente.
- source_word: דִּבְרֵי
  english_pob_choice: acts
  chosen_spanish: hechos
  alternatives_spanish:
  - actos
  - asuntos
  - palabras
  lexicon: HALOT
  rationale: En esta fórmula de resumen real, דִּבְרֵי no se refiere a palabras habladas sino a lo registrado sobre la vida y acciones del rey. «Hechos» comunica mejor ese valor en español actual que un calco como «palabras».
- source_word: מְנַשֶּׁה
  english_pob_choice: Manasseh
  chosen_spanish: Manasés
  alternatives_spanish:
  - Manasés
  lexicon: Convención onomástica bíblica
  rationale: Se usa la forma bíblica usual en español para el nombre propio, manteniendo inteligibilidad e identificación canónica.
- source_word: וְכָל אֲשֶׁר עָשָׂה
  english_pob_choice: and all that he did
  chosen_spanish: y todo lo que hizo
  alternatives_spanish:
  - y todo cuanto hizo
  - y cuanto hizo
  lexicon: HALOT
  rationale: La cláusula relativa se vierte de forma directa y natural. «Todo lo que hizo» conserva la amplitud total del hebreo sin sobreexplicar.
- source_word: וְחַטָּאתוֹ אֲשֶׁר חָטָא
  english_pob_choice: and the sin that he committed
  chosen_spanish: y el pecado que cometió
  alternatives_spanish:
  - y su pecado que cometió
  - y la culpa que cometió
  - y el pecado que pecó
  lexicon: HALOT
  rationale: El hebreo presenta una construcción de sustantivo + verbo del mismo campo semántico. En español, «el pecado que cometió» preserva la fuerza moral-religiosa y evita un giro artificial como «el pecado que pecó».
- source_word: הֲלֹא
  english_pob_choice: are they not
  chosen_spanish: ¿no están
  alternatives_spanish:
  - ¿acaso no están?
  - ¿no es así que están?
  lexicon: HALOT
  rationale: La partícula retórica espera respuesta afirmativa. En español, la forma interrogativa negativa mantiene ese efecto con naturalidad.
- source_word: הֵם כְּתוּבִים
  english_pob_choice: are they not written
  chosen_spanish: están escritos
  alternatives_spanish:
  - están registrados
  - han sido escritos
  lexicon: HALOT
  rationale: En este contexto archivístico, «están escritos» reproduce de cerca la imagen de un registro ya existente. «Registrados» sería posible, pero desplaza un poco la metáfora del texto escrito.
- source_word: עַל סֵפֶר
  english_pob_choice: in the Book of
  chosen_spanish: en el Libro de
  alternatives_spanish:
  - en el rollo de
  - sobre el libro de
  lexicon: HALOT
  rationale: Aunque עַל es literalmente «sobre», la expresión idiomática española adecuada para un registro es «en el Libro de». «Libro» mantiene la convención comprensible del título de archivo.
- source_word: דִּבְרֵי הַיָּמִים
  english_pob_choice: the Chronicles
  chosen_spanish: las Crónicas
  alternatives_spanish:
  - los anales
  - los anales históricos
  lexicon: HALOT
  rationale: La frase funciona como designación de un registro real. «Crónicas» es el equivalente natural en español, y el artículo plural concuerda con el título tradicional del tipo de documento, no con el libro canónico específico.
- source_word: לְמַלְכֵי יְהוּדָה
  english_pob_choice: of the Kings of Judah
  chosen_spanish: de los reyes de Judá
  alternatives_spanish:
  - para los reyes de Judá
  - perteneciente a los reyes de Judá
  lexicon: HALOT
  rationale: La preposición לְ en esta fórmula de fuente documental se expresa mejor como «de», indicando pertenencia o relación con el registro de esos reyes.
translation_notes:
  revision_awareness: Se siguió de cerca el ajuste del audit trail inglés que cambió «his sin» por «the sin», evitando añadir posesivo en español. También se mantuvo la lectura archivística de la fórmula final, respetando la nota lexical inglesa sobre la fuente documental real.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma general del proyecto, aunque este versículo no contiene el Tetragrámaton.
  - «Crónicas» se usa como equivalente de archivo real, no como referencia al libro canónico de Crónicas.
  - Se evitó «pecó el pecado» por sonar forzado en español; la nota preserva la tensión morfológica del hebreo.
