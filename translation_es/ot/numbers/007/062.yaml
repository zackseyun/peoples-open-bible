translation:
  language: es
  text: una escudilla de oro de diez siclos[a], llena de incienso;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «una escudilla, diez de oro, llena de incienso»; la unidad de peso «siclos» se sobreentiende por la fórmula recurrente de las ofrendas en Números 7.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּף
  english_pob_choice: dish
  chosen_spanish: fuente
  alternatives_spanish:
  - plato
  - vasija
  - cuenco
  lexicon: HALOT
  rationale: En este inventario cultual, כַּף nombra un recipiente pequeño para la ofrenda de incienso. En español, «fuente» comunica con naturalidad un plato o recipiente ceremonal; «plato» es posible, pero «fuente» evita el matiz demasiado doméstico de «dish» y conserva la idea de un contenedor, no de una cuchara literal.
- source_word: אַחַת
  english_pob_choice: one
  chosen_spanish: una
  alternatives_spanish:
  - un
  - una sola
  lexicon: HALOT
  rationale: Concuerda con el sustantivo femenino implícito («fuente»). La forma cardinal simple es suficiente para el valor cuantitativo.
- source_word: עֲשָׂרָה
  english_pob_choice: ten
  chosen_spanish: diez
  alternatives_spanish:
  - diez siclos
  - diez
  lexicon: HALOT
  rationale: El hebreo expresa la cantidad de peso; en este contexto la unidad «siclos» se sobreentiende por la fórmula repetida de Números 7. En español, el número queda explícito y la unidad implícita se resuelve en nota.
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: de oro
  alternatives_spanish:
  - de oro puro
  - de oro
  lexicon: HALOT
  rationale: En español, la construcción posesiva/material más natural para un recipiente es «de oro». Mantiene el valor material del sustantivo hebreo sin forzar un adjetivo como «dorado».
- source_word: עֲשָׂרָה זָהָב
  english_pob_choice: ten shekels
  chosen_spanish: diez siclos
  alternatives_spanish:
  - diez siclos de oro
  - pesando diez siclos
  lexicon: HALOT
  rationale: Aunque שֶׁקֶל no aparece escrito en esta línea abreviada, la fórmula regular de Números 7 exige entender la unidad de peso. «Siclos» reproduce esa medida tradicional en español bíblico y hace auditable la elisión.
- source_word: מְלֵאָה
  english_pob_choice: full of
  chosen_spanish: llena de
  alternatives_spanish:
  - colmada de
  - repleta de
  lexicon: HALOT
  rationale: Adjetivo predicativo femenino que encaja con el recipiente. «Llena de» es claro, sobrio y fiel al hebreo.
- source_word: קְטֹרֶת
  english_pob_choice: incense
  chosen_spanish: incienso
  alternatives_spanish:
  - perfume para incienso
  lexicon: HALOT
  rationale: Término técnico del culto. «Incienso» es la equivalencia estándar y transparente en español.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios y mantiene el sentido estable del versículo; la versión española sigue de cerca la fórmula cultual abreviada, explicitando en nota la unidad de peso implícita.
  spanish_consistency_notes:
  - Se mantiene el estilo de inventario cultual breve, con sintaxis natural en español.
  - Se conserva la tensión auditada entre el hebreo abreviado y la unidad de peso implícita mediante la nota.
  - No se introduce vocabulario eclesiástico posterior; «incienso» y «siclos» corresponden al registro cultual bíblico.
