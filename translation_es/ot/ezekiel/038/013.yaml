translation:
  language: es
  text: 'Seba y Dedán y los mercaderes de Tarsis[a], con todos sus leoncillos, te dirán: «¿Has venido a tomar despojo? ¿Has reunido tu compañía para apoderarte de plata y oro, para tomar ganado y bienes, para tomar gran despojo?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'todos sus leones jóvenes', 'todas sus aldeas/colonias' o 'todos sus fuertes'. El hebreo dice literalmente 'todos sus leoncillos', probablemente como metáfora de los poderes o dependencias asociadas con Tarsis.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁבָא
  english_pob_choice: Sheba
  chosen_spanish: Seba
  alternatives_spanish:
  - Saba
  lexicon: HALOT
  rationale: Nombre propio transliterado al español con una forma estable y legible; la adaptación 'Seba' conserva la referencia geográfica sin depender de la ortografía inglesa.
- source_word: וּדְדָן
  english_pob_choice: Dedan
  chosen_spanish: Dedán
  alternatives_spanish:
  - Dedan
  lexicon: HALOT
  rationale: Nombre propio transliterado; el acento ayuda a la lectura en español y mantiene el carácter de topónimo.
- source_word: וְסֹחֲרֵי
  english_pob_choice: merchants of
  chosen_spanish: los mercaderes de
  alternatives_spanish:
  - los comerciantes de
  - los tratantes de
  lexicon: HALOT
  rationale: '''סֹחֲרֵי'' designa personas dedicadas al comercio; ''mercaderes'' es natural y conserva el matiz comercial del contexto.'
- source_word: תַרְשִׁישׁ
  english_pob_choice: Tarshish
  chosen_spanish: Tarsis
  alternatives_spanish:
  - Tarshish
  lexicon: HALOT
  rationale: Topónimo tradicionalmente adaptado en español como 'Tarsis'; se mantiene la identificación sin depender de la forma inglesa.
- source_word: כְּפִרֶיהָ
  english_pob_choice: all her young lions
  chosen_spanish: todos sus cachorros
  alternatives_spanish:
  - todos sus leoncillos
  - todas sus aldeas/colonias
  - todos sus fuertes
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'sus cachorros/leoncillos'. En español, 'cachorros' conserva la imagen zoológica transparente; se evita convertir de entrada la metáfora en una explicación interpretativa.
- source_word: יֹאמְרוּ לְךָ
  english_pob_choice: will say to you
  chosen_spanish: te dirán
  alternatives_spanish:
  - dirán a ti
  lexicon: HALOT
  rationale: Futuro simple natural en español para el imperfecto en este contexto de anuncio dirigido al interlocutor.
- source_word: הֲלִשְׁלֹל שָׁלָל
  english_pob_choice: Have you come to take spoil
  chosen_spanish: ¿Has venido a tomar despojo?
  alternatives_spanish:
  - ¿Has venido a tomar botín?
  - ¿Has venido a saquear?
  lexicon: HALOT
  rationale: Se conserva la construcción intensiva con cognado; 'despojo' mantiene la relación con שָׁלָל y suena más cercano al valor léxico del hebreo que un verbo general como 'saquear'.
- source_word: בָא
  english_pob_choice: have you come
  chosen_spanish: ¿Has venido
  alternatives_spanish:
  - ¿Vienes
  lexicon: HALOT
  rationale: La forma perfecta en la pregunta retórica se expresa mejor con 'has venido' en español.
- source_word: הֲלָבֹז בַּז
  english_pob_choice: Have you assembled your company to seize
  chosen_spanish: ¿Has reunido tu compañía para apoderarte
  alternatives_spanish:
  - ¿Has venido a despojar
  - ¿Has reunido tu asamblea para tomar
  lexicon: HALOT
  rationale: La secuencia expresa una segunda acusación retórica ligada al botín. 'Apoderarte' comunica el acto de capturar/obtener por fuerza sin repetir mecánicamente el mismo verbo del primer miembro.
- source_word: הִקְהַלְתָּ קְהָלֶךָ
  english_pob_choice: have you assembled your company
  chosen_spanish: ¿Has reunido tu compañía
  alternatives_spanish:
  - ¿Has congregado tu asamblea
  - ¿Has juntado tu multitud
  lexicon: HALOT
  rationale: Verbo + sustantivo cognado enfatizan el acto de reunir un grupo. 'Compañía' da un español idiomático y suficientemente amplio para un contingente congregado.
- source_word: לָשֵׂאת כֶּסֶף וְזָהָב
  english_pob_choice: to seize silver and gold
  chosen_spanish: para apoderarte de plata y oro
  alternatives_spanish:
  - para llevarte plata y oro
  - para tomar plata y oro
  lexicon: HALOT
  rationale: נשׂא literalmente 'llevar/cargar', pero en contexto de saqueo españoliza mejor como 'apoderarte de' para reflejar la acción predatoria sin sonar forzado.
- source_word: לָקַחַת מִקְנֶה וְקִנְיָן
  english_pob_choice: to take livestock and goods
  chosen_spanish: para tomar ganado y bienes
  alternatives_spanish:
  - para tomar ganado y posesiones
  - para llevar ganado y propiedad
  lexicon: HALOT
  rationale: '''מִקְנֶה'' suele denotar ganado/livestock; ''קִנְיָן'' apunta a bienes o posesiones. ''Ganado y bienes'' es claro, amplio y fiel al campo semántico.'
- source_word: לִשְׁלֹל שָׁלָל גָּדוֹל
  english_pob_choice: to take great spoil
  chosen_spanish: para tomar gran despojo
  alternatives_spanish:
  - para tomar gran botín
  - para apoderarte de gran despojo
  lexicon: HALOT
  rationale: La repetición cognada culmina la acusación. 'Gran despojo' preserva la relación formal con שָׁלָל y mantiene el tono bíblico sin depender de un calco mecánico.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del POB en inglés, que prefirió mantener 'spoil' para mayor consistencia con שָׁלָל en ambos usos. En español se eligió 'despojo' para sostener esa misma consistencia léxica y conservar el paralelismo intensivo del hebreo, mientras que la nota preserva la alternativa interpretativa de 'leones jóvenes' frente a otras lecturas posibles de כְּפִרֶיהָ.
  spanish_consistency_notes:
  - Se usa 'Seba', 'Dedán' y 'Tarsis' como adaptaciones españolas de los nombres propios.
  - Se mantiene la metáfora de כְּפִרֶיהָ con 'cachorros' y se documenta la lectura alternativa en nota.
  - Se preserva la repetición intensiva de שָׁלָל con 'despojo' en ambos miembros.
  - '''Compañía'' traduce de forma amplia קְהָלֶךָ sin imponer una lectura militar demasiado específica.'
