translation:
  language: es
  text: Porque tú le sales al encuentro con bendiciones de bien[a]; pones sobre su cabeza una corona de oro fino[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «te adelantas a él con bendiciones de bien» o «vas delante de él con bendiciones de bien». El verbo hebreo también puede dar la idea de salir al encuentro o de ir delante de alguien anticipadamente.
    reason: lexical_alternative
  - marker: b
    text: «Oro fino» también puede traducirse «oro puro» o «oro refinado».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Pues que
  - Porque
  lexicon: HALOT
  rationale: En este contexto poético, כִּי introduce la razón o fundamento de la afirmación anterior. «Porque» comunica bien esa relación causal en español sin añadir interpretación.
- source_word: תְקַדְּמֶנּוּ
  english_pob_choice: you meet him
  chosen_spanish: le sales al encuentro
  alternatives_spanish:
  - lo encuentras
  - sales a su encuentro
  - te adelantas a él
  lexicon: HALOT
  rationale: El verbo puede expresar ir al encuentro o preceder con algo. «Le sales al encuentro» conserva la iniciativa y suena natural en español, sin perder el matiz de anticipación.
- source_word: בִּרְכוֹת
  english_pob_choice: with blessings
  chosen_spanish: con bendiciones
  alternatives_spanish:
  - con bendiciones abundantes
  - con bendiciones de
  lexicon: HALOT
  rationale: Se mantiene el plural y la idea de acompañamiento instrumentado por la preposición. «Bendiciones» es la correspondencia directa y clara.
- source_word: טוֹב
  english_pob_choice: of good
  chosen_spanish: de bien
  alternatives_spanish:
  - de bondad
  - de cosas buenas
  - de prosperidad
  lexicon: HALOT
  rationale: La construcción hebrea es compacta y abierta. «De bien» conserva esa amplitud y evita concretar prematuramente en prosperidad material o en un valor meramente abstracto.
- source_word: תָּשִׁית
  english_pob_choice: you set
  chosen_spanish: pones
  alternatives_spanish:
  - colocas
  - pongo
  - pones sobre
  lexicon: HALOT
  rationale: Con un objeto como «corona», «poner» es el equivalente natural y digno en español; refleja la acción de colocar sin rebajar el tono real.
- source_word: לְרֹאשׁוֹ
  english_pob_choice: on his head
  chosen_spanish: sobre su cabeza
  alternatives_spanish:
  - en su cabeza
  - sobre la cabeza de él
  - en la cabeza
  lexicon: HALOT
  rationale: La preposición hebrea con verbos de colocar se expresa idiomáticamente en español con «sobre». Se conserva la imagen corporal directa del texto.
- source_word: עֲטֶרֶת
  english_pob_choice: a crown
  chosen_spanish: una corona
  alternatives_spanish:
  - una diadema
  - un adorno de cabeza
  lexicon: HALOT
  rationale: En un salmo real, «corona» expresa con naturalidad la dignidad regia del sustantivo hebreo.
- source_word: פָּז
  english_pob_choice: fine gold
  chosen_spanish: oro fino
  alternatives_spanish:
  - oro puro
  - oro refinado
  lexicon: HALOT
  rationale: «Oro fino» reproduce el valor elevado del término y sigue el registro poético; mantiene abierta la posibilidad de matices como pureza o refinamiento.
theological_decisions:
- issue: Alcance de «bendiciones de bien»
  english_pob_reading: Render the phrase broadly as divine favor and beneficence without specifying spiritual or material content.
  chosen_spanish_reading: «Bendiciones de bien» se deja deliberadamente amplio como favor y generosidad divinos, sin reducirlo a prosperidad material ni a bendición espiritual específica.
  alternative_spanish_readings:
  - bendiciones de bondad
  - bendiciones de prosperidad
  - bendiciones espirituales
  rationale: El hebreo es deliberadamente abierto. La traducción española conserva esa amplitud para no resolver una tensión que el texto no especifica.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'La redacción sigue el estado más reciente del audit trail: se conserva la frase breve y abierta equivalente a «blessings of good», evitando una expansión como «bondad»; asimismo, se refleja la elección de «fine gold» con una nota que preserva las alternativas documentadas.'
  spanish_consistency_notes:
  - Se prefirió «Porque» para la relación causal del hebreo כִּי, en lugar de una glosa más explicativa.
  - Se mantuvo la ambigüedad de טוֹב con «bien», porque el texto no exige especificar prosperidad, bondad moral o bien general.
  - Se eligió «le sales al encuentro» como equivalente idiomático del verbo de ir al encuentro, manteniendo la iniciativa divina.
  - «Oro fino» conserva el registro poético y permite las variantes documentadas sin sobretraducir.
  - La puntuación separa las dos cola poéticas de manera clara y publicable en español.
