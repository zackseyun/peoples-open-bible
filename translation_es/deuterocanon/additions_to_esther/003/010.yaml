revisions:
- from: Escucha mi súplica y sé favorable[a] a tu suerte, y vuelve nuestro duelo en alegría, para que, viviendo, cantemos alabanzas a tu nombre, oh Señor, y no destruyas la boca de los que te alaban. Y todo Israel clamó con todas sus fuerzas[b], porque la muerte estaba ante sus ojos.
  to: Escucha mi súplica y sé favorable[a] a tu heredad, y convierte nuestro duelo en alegría, para que, viviendo, cantemos alabanzas a tu nombre, oh Señor, y no destruyas la boca de los que te alaban[b]. Y todo Israel clamó con todas sus fuerzas, porque la muerte estaba ante sus ojos.
  rationale: Se corrige un error objetivo de notas, reubicando [b] en la frase que realmente explica el expediente inglés. Además, se reemplaza «tu suerte» por «tu heredad» para evitar la ambigüedad moderna de 'luck' y reflejar mejor κλῆρος como porción perteneciente a Dios, en línea con la justificación léxica y teológica del audit trail. También se suaviza «vuelve... en» a «convierte... en» por naturalidad española.
  reviewer_model: gpt-5.4
