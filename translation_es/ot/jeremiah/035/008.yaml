translation:
  language: es
  text: 'Así hemos obedecido la voz[a] de Jehonadab[b], hijo de Recab, nuestro padre, en todo lo que nos mandó: no beber vino todos nuestros días, nosotros, nuestras esposas, nuestros hijos y nuestras hijas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «La voz de» conserva el modismo hebreo בְּקוֹל, que aquí significa atender u obedecer la orden de una persona autorizada.
    reason: lexical_alternative
  - marker: b
    text: «Jehonadab» también se escribe «Jonadab» en algunas traducciones, como forma abreviada del mismo nombre.
    reason: alternative_reading
lexical_decisions:
- source_word: וַנִּשְׁמַע
  english_pob_choice: we have obeyed
  chosen_spanish: hemos obedecido
  alternatives_spanish:
  - obedecimos
  - hemos escuchado y obedecido
  lexicon: HALOT
  rationale: En español, «obedecer» comunica mejor que «escuchar» el valor idiomático de שׁמע con בְּקוֹל. El perfecto compuesto mantiene el sentido retrospectivo y el efecto vigente de la obediencia.
- source_word: בְּקוֹל
  english_pob_choice: the voice of
  chosen_spanish: la voz de
  alternatives_spanish:
  - el mandato de
  - la instrucción de
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de «voz», como en la decisión inglesa, porque en el contexto equivale a atender y obedecer una palabra autorizada sin perder el giro idiomático.
- source_word: יְהוֹנָדָב
  english_pob_choice: Jehonadab
  chosen_spanish: Jehonadab
  alternatives_spanish:
  - Jonadab
  lexicon: transliteration
  rationale: Se translitera el nombre propio. «Jehonadab» refleja con más precisión la forma hebrea plena de este versículo.
- source_word: בֶּן רֵכָב
  english_pob_choice: son of Rechab
  chosen_spanish: hijo de Recab
  alternatives_spanish:
  - hijo de Rechab
  lexicon: standard genealogical construction
  rationale: «Hijo de Recab» reproduce la construcción genealógica de forma natural en español y sigue el nombre propio en transliteración estándar.
- source_word: אָבִינוּ
  english_pob_choice: our father
  chosen_spanish: nuestro padre
  alternatives_spanish:
  - nuestro antepasado
  lexicon: HALOT
  rationale: Aunque se trata de un antepasado, «nuestro padre» conserva el giro bíblico y el tono de lealtad familiar del hebreo.
- source_word: לְכֹל אֲשֶׁר צִוָּנוּ
  english_pob_choice: in everything that he commanded us
  chosen_spanish: en todo lo que nos mandó
  alternatives_spanish:
  - según todo lo que nos mandó
  - en todo cuanto nos mandó
  lexicon: HALOT
  rationale: «En todo lo que nos mandó» expresa con naturalidad la fuerza inclusiva de לְכֹל אֲשֶׁר y mantiene la amplitud de la obediencia.
- source_word: לְבִלְתִּי שְׁתוֹת יַיִן
  english_pob_choice: not to drink wine
  chosen_spanish: no beber vino
  alternatives_spanish:
  - para no beber vino
  - no tomar vino
  lexicon: HALOT
  rationale: La construcción infinitiva se vierte de manera directa y sobria. «Vino» conserva el objeto explícito del mandato.
- source_word: כָּל יָמֵינוּ
  english_pob_choice: all our days
  chosen_spanish: todos nuestros días
  alternatives_spanish:
  - a lo largo de todos nuestros días
  - durante todos nuestros días
  lexicon: HALOT
  rationale: «Todos nuestros días» reproduce fielmente el alcance vitalicio de la prohibición y es idiomático en español.
- source_word: אֲנַחְנוּ נָשֵׁינוּ בָּנֵינוּ וּבְנֹתֵינוּ
  english_pob_choice: we, our wives, our sons, and our daughters
  chosen_spanish: nosotros, nuestras mujeres, nuestros hijos[b] y nuestras hijas
  alternatives_spanish:
  - nosotros, nuestras esposas, nuestros hijos e hijas
  - nosotros, nuestras mujeres, hijos e hijas
  lexicon: HALOT
  rationale: Se mantiene la lista apposicional completa para reflejar el énfasis en todo el hogar. «Mujeres» conserva la literalidad del hebreo נָשִׁים; en español bíblico puede ser menos marcado que «esposas» sin perder claridad.
translation_notes:
  revision_awareness: Se corrigió la validación anterior insertando los marcadores [a] y [b] exactamente en el texto español, junto a las palabras correspondientes. No se introdujeron notas sin anclaje en el texto.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se prefirió «obedecido» frente a una traducción meramente auditiva para reflejar el valor idiomático de שׁמע con בְּקוֹל.
  - «Jehonadab» y «Recab» mantienen transliteración coherente con el registro del texto base.
  - La lista familiar se dejó explícita para no diluir el alcance total del mandato.
