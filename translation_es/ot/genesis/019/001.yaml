translation:
  language: es
  text: Los dos ángeles llegaron a Sodoma[a] al atardecer, y Lot estaba sentado a la puerta de Sodoma[b]. Cuando Lot los vio, se levantó para salir a su encuentro y se inclinó con el rostro en tierra[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por la tarde». El hebreo marca el momento de llegada con una expresión temporal que puede abarcar el atardecer o la tarde avanzada.
    reason: lexical_alternative
  - marker: b
    text: «La puerta de Sodoma» designa el área de la puerta de la ciudad, un lugar público asociado con la vida cívica y judicial.
    reason: cultural_note
  - marker: c
    text: O «se postró con el rostro en tierra». El hebreo describe una reverencia o postración completa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  english_pob_choice: came
  chosen_spanish: llegaron
  alternatives_spanish:
  - vinieron
  - entraron
  lexicon: HALOT
  rationale: El wayyiqtol de בוא expresa llegada o arribo narrativo. «Llegaron» suena natural en español y conserva el movimiento hacia Sodoma sin forzar una idea de entrada que el hebreo no explicita.
- source_word: שְׁנֵי הַמַּלְאָכִים
  english_pob_choice: the two angels
  chosen_spanish: los dos ángeles
  alternatives_spanish:
  - los dos mensajeros
  lexicon: HALOT
  rationale: En este contexto los visitantes son seres celestiales, no simples mensajeros humanos. «Ángeles» comunica mejor el referente reconocido por la narración, como en la traducción inglesa auditada.
- source_word: סְדֹמָה
  english_pob_choice: to Sodom
  chosen_spanish: a Sodoma
  alternatives_spanish:
  - hacia Sodoma
  - hasta Sodoma
  lexicon: HALOT
  rationale: La forma direccional indica movimiento hacia el lugar. En español, «a Sodoma» es la manera más natural y precisa de expresar esa dirección.
- source_word: בָּעֶרֶב
  english_pob_choice: in the evening
  chosen_spanish: al atardecer
  alternatives_spanish:
  - por la tarde
  - en la noche
  lexicon: HALOT
  rationale: La expresión temporal marca la llegada en un momento tardío del día. «Al atardecer» es claro, digno y algo más flexible que un calco literal, sin perder el valor temporal.
- source_word: יֹשֵׁב
  english_pob_choice: was sitting
  chosen_spanish: estaba sentado
  alternatives_spanish:
  - se hallaba sentado
  - estaba viviendo
  lexicon: HALOT
  rationale: El participio presenta la postura como estado de fondo. «Estaba sentado» conserva el aspecto durativo mejor que un simple pretérito puntual.
- source_word: בְּשַׁעַר סְדֹם
  english_pob_choice: in the gate of Sodom
  chosen_spanish: a la puerta de Sodoma
  alternatives_spanish:
  - en la puerta de Sodoma
  - en la puerta de la ciudad de Sodoma
  lexicon: HALOT
  rationale: El hebreo puede referirse al ámbito de la puerta/portón como espacio cívico. «A la puerta» mantiene la imagen concreta y es idiomático en español; la nota explica su función pública sin recargar el texto principal.
- source_word: וַיַּרְא לוֹט
  english_pob_choice: When Lot saw them
  chosen_spanish: Cuando Lot los vio
  alternatives_spanish:
  - Y Lot los vio
  - Lot los vio
  lexicon: HALOT
  rationale: El hebreo presenta la acción de Lot viendo a los visitantes, con el objeto implícito por contexto. En español conviene explicitar «los» para claridad narrativa y mantener la secuencia temporal con «Cuando».
- source_word: וַיָּקָם לִקְרָאתָם
  english_pob_choice: he rose to meet them
  chosen_spanish: se levantó para recibirlos
  alternatives_spanish:
  - se levantó para salir a su encuentro
  - se puso de pie para recibirlos
  lexicon: HALOT
  rationale: La expresión combina levantarse con ir al encuentro de alguien. «Se levantó para recibirlos» recoge el gesto de honor y hospitalidad sin sonar rígidamente literal.
- source_word: וַיִּשְׁתַּחוּ
  english_pob_choice: bowed with his face to the ground
  chosen_spanish: se inclinó
  alternatives_spanish:
  - se postró
  - se postró en tierra
  lexicon: HALOT
  rationale: El verbo puede abarcar reverencia profunda o postración. Aquí conviene mantener la tensión entre respeto humano y posible gesto de homenaje, sin traducirlo directamente como «adoró», que añadiría una interpretación más fuerte de la requerida por el texto.
- source_word: אַפַּיִם אָרְצָה
  english_pob_choice: with his face to the ground
  chosen_spanish: rostro en tierra
  alternatives_spanish:
  - con el rostro en tierra
  - con la cara en tierra
  lexicon: HALOT
  rationale: El idiomático expresa una postración completa. «Rostro en tierra» es breve, solemne y comunica la intensidad del gesto con buena naturalidad en español bíblico contemporáneo.
theological_decisions:
- issue: Si la inclinación de Lot debe entenderse como adoración o como reverencia/prostración
  english_pob_reading: respectful prostration ('bowed with his face to the ground')
  chosen_spanish_reading: reverencia/prostración respetuosa ('se inclinó rostro en tierra')
  alternative_spanish_readings:
  - adoró
  - se postró para adorar
  rationale: El verbo hebreo שׁחה admite tanto adoración como reverencia ante personas de alto rango. En este relato, la acción de Lot encaja mejor como un gesto cultural de honor y hospitalidad hacia visitantes excelsos. La redacción española conserva la ambigüedad sin resolverla teológicamente en exceso.
  doctrine_reference: Preservar la tensión teológica cuando el texto no define de manera explícita el acto como adoración divina.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa más reciente, que afinó la frase idiomática de postración reduciendo redundancia. En español se optó por una formulación compacta y natural («se inclinó rostro en tierra») que conserva la totalidad del gesto sin duplicar la idea de descenso.
  spanish_consistency_notes:
  - Se mantuvo «ángeles» para reflejar el referente celestial del contexto narrativo, en línea con la decisión inglesa auditada.
  - Se tradujo el nombre divino no aplicable en este versículo; no hubo necesidad de resolver ningún caso de יהוה / κύριος.
  - Se preservó el registro bíblico digno y claro, evitando tanto arcaísmos rígidos como paráfrasis explicativas excesivas.
