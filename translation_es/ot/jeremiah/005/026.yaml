translation:
  language: es
  text: Porque se hallan entre mi pueblo hombres malvados; acechan como cazadores de aves[a]. Ponen una trampa[b]; atrapan a hombres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como cazadores de aves al acecho» / «como el acecho de cazadores de aves». El hebreo es difícil, pero la idea es de cazadores ocultos esperando para atrapar su presa.
    reason: lexical_alternative
  - marker: b
    text: O «un lazo». El sustantivo hebreo puede designar algo destructivo; aquí se refiere a un dispositivo puesto para capturar personas.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque, en efecto
  lexicon: HALOT
  rationale: Introduce una explicación causal o justificativa de la acusación anterior; «porque» conserva bien esa fuerza en español.
- source_word: נִמְצְאוּ
  english_pob_choice: are found
  chosen_spanish: se hallan
  alternatives_spanish:
  - son encontrados
  - están hallados
  lexicon: HALOT
  rationale: El nifal expresa presencia/resultativa dentro del grupo; «se hallan» suena natural y conserva la idea de estar presentes entre el pueblo.
- source_word: בְעַמִּי
  english_pob_choice: among my people
  chosen_spanish: entre mi pueblo
  alternatives_spanish:
  - en mi pueblo
  lexicon: HALOT
  rationale: «Entre» expresa mejor inclusión dentro de la comunidad que un simple «en».
- source_word: רְשָׁעִים
  english_pob_choice: wicked men
  chosen_spanish: hombres malvados
  alternatives_spanish:
  - hombres impíos
  - malvados
  lexicon: HALOT
  rationale: Mantiene el rasgo masculino plural con valor representativo y comunica la valoración moral fuerte del hebreo sin suavizarla.
- source_word: יָשׁוּר כְּשַׁךְ יְקוּשִׁים
  english_pob_choice: they lie in wait like fowlers
  chosen_spanish: acechan como cazadores de aves
  alternatives_spanish:
  - acechan como tramperos de aves
  - se esconden como cazadores de aves
  lexicon: HALOT
  rationale: La frase hebrea es difícil; la POB inglesa tomó la imagen de los cazadores/fowlers. En español, «acechan como cazadores de aves» preserva la comparación y la postura de emboscada sin añadir detalles no asegurados por el texto.
- source_word: הִצִּיבוּ
  english_pob_choice: They set
  chosen_spanish: Ponen
  alternatives_spanish:
  - Colocan
  - Tendieron
  lexicon: HALOT
  rationale: En el contexto de la trampa, «poner» transmite bien la acción de disponer un artefacto para atrapar.
- source_word: מַשְׁחִית
  english_pob_choice: a trap
  chosen_spanish: una trampa
  alternatives_spanish:
  - un lazo
  - una red
  lexicon: HALOT
  rationale: Aunque el sustantivo puede tener un matiz de algo destructor, en la metáfora inmediata se refiere a un dispositivo para capturar; «trampa» es claro y fiel al contexto.
- source_word: אֲנָשִׁים
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - personas
  - seres humanos
  lexicon: HALOT
  rationale: Conserva el sustantivo masculino plural del hebreo y el paralelismo con la traducción inglesa, sin neutralizar el término.
- source_word: יִלְכֹּדוּ
  english_pob_choice: they catch
  chosen_spanish: atrapan
  alternatives_spanish:
  - capturan
  - prenden
  lexicon: HALOT
  rationale: Verbo natural en español para el campo de caza/trampa; mantiene la imagen de capturar víctimas.
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada para eliminar «crouching», que no estaba claramente sustentado por el hebreo. La presente redacción española sigue esa revisión y evita añadir una postura corporal no segura, manteniendo la imagen de acecho y la secuencia de trampas/captura.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como término por defecto en el proyecto, pero este versículo no lo contiene.
  - Se preservó la metáfora de caza/trampa de forma consistente en todo el versículo.
  - Se eligió un español neutro y publicable, con registro bíblico moderno y sin calcos innecesarios.
