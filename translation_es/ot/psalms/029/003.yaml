translation:
  language: es
  text: La voz de Yahvé está sobre las aguas; el Dios de gloria[a] truena, Yahvé está sobre muchas aguas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el Dios glorioso'. El hebreo dice literalmente 'Dios de gloria'.
    reason: lexical_alternative
  - marker: b
    text: 'Traducción anterior: ''Yahvé sobre muchas aguas''.'
    reason: previous_rendering
lexical_decisions:
- source_word: ק֥וֹל
  english_pob_choice: voice
  chosen_spanish: voz
  alternatives_spanish:
  - sonido
  lexicon: HALOT
  rationale: En el paralelismo del Salmo 29, קוֹל יְהוָה funciona como 'la voz de Yahvé', con fuerza poética que evoca el trueno como expresión de la palabra poderosa de Dios. 'Voz' conserva mejor esa personificación que 'sonido'.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte con el nombre propio 'Yahvé', conforme al criterio del proyecto, para preservar el nombre del pacto en lugar de sustituirlo por un título.
- source_word: עַל
  english_pob_choice: over
  chosen_spanish: sobre
  alternatives_spanish:
  - encima de
  - por encima de
  lexicon: HALOT
  rationale: '''Sobre'' comunica con naturalidad la posición de la voz de Yahvé respecto de las aguas y mantiene la imaginería de la teofanía de tormenta sin sonar forzado en español.'
- source_word: הַמָּיִם
  english_pob_choice: the waters
  chosen_spanish: las aguas
  alternatives_spanish:
  - el agua
  lexicon: HALOT
  rationale: El plural hebreo se conserva con 'las aguas', que respeta el uso poético y la amplitud cósmica de la imagen.
- source_word: אֵל הַכָּבוֹד
  english_pob_choice: the God of glory
  chosen_spanish: el Dios de gloria
  alternatives_spanish:
  - el Dios glorioso
  - el glorioso Dios
  lexicon: HALOT
  rationale: La construcción de genitivo se traduce de forma directa como 'el Dios de gloria'. Esta versión conserva la relación nominal del hebreo sin convertirla en un adjetivo interpretativo.
- source_word: הִרְעִים
  english_pob_choice: thunders
  chosen_spanish: truena
  alternatives_spanish:
  - ha tronado
  - retumba
  lexicon: HALOT
  rationale: La raíz רעם expresa 'tronar'. En español, el presente 'truena' mantiene el valor descriptivo y vívido del perfecto hebreo en poesía, como hace el inglés POB con 'thunders'.
- source_word: מַיִם רַבִּים
  english_pob_choice: many waters
  chosen_spanish: muchas aguas
  alternatives_spanish:
  - aguas muchas
  - aguas grandes
  lexicon: HALOT
  rationale: '''Muchas aguas'' reproduce de manera transparente la expresión hebrea y preserva el plural poético sin desplazarlo a una paráfrasis.'
theological_decisions:
- issue: Traducción del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se sigue el principio del POB de transparentar el Nombre divino y no ocultarlo tras un sustituto litúrgico. 'Yahvé' es la forma establecida para el texto español del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Imagen poética del trueno como voz de Dios
  english_pob_reading: Retain 'voice' and 'thunders' without reducing the imagery to mere weather description
  chosen_spanish_reading: Mantener 'voz' y 'truena' como imágenes paralelas, sin reducir el verso a un simple fenómeno meteorológico
  alternative_spanish_readings:
  - la voz de Yahvé retumba sobre las aguas
  - el trueno de Yahvé está sobre las aguas
  rationale: El salmo identifica la voz de Yahvé con el trueno. 'Voz' y 'truena' conservan esa tensión teológica y poética, permitiendo leer la tormenta como manifestación de la presencia divina sin explicarla de más.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve the source text''s plain sense and theological tension'
translation_notes:
  revision_awareness: 'El contexto auditado en inglés mantiene tres cláusulas paralelas y conserva la imagen de la voz de Yahvé como trueno. La versión española sigue ese mismo diseño: una primera cláusula con ''está sobre las aguas'', una segunda con el verbo explícito ''truena'' y una tercera cláusula paralela que repite el Nombre divino y la imagen de las aguas. No se requiere ajuste adicional respecto de la revisión más reciente.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente con el criterio del proyecto para יְהוָה.
  - '''Aguas'' se mantiene en plural, conforme al hebreo y al inglés auditado.'
  - '''Voz'' y ''truena'' preservan la tensión entre lenguaje meteorológico y lenguaje teológico.'
  - La puntuación conserva la división de los miembros poéticos del verso.
