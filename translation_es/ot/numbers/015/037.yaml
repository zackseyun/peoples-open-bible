lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - y dijo
  lexicon: HALOT
  rationale: El hebreo narrativo וַיֹּאמֶר introduce una acción de habla en la secuencia del relato. En español, «habló» conserva la narración y evita la redundancia que produciría añadir una fórmula equivalente a «diciendo» en esta sola línea, ya que la cita continúa en el siguiente versículo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se preserva el nombre divino propio del Tetragrama con la forma española establecida en el proyecto, «Yahvé», en lugar de sustituirlo por un título devocional.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: La preposición marca el destinatario del acto de habla; en español natural se expresa con «a».
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Mose
  - Mosés
  lexicon: HALOT
  rationale: Nombre propio bíblico en su forma española habitual y reconocible.
theological_decisions:
- issue: Representación del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La línea editorial del proyecto evita la sustitución tradicional por un título enmascarador. «Yahvé» mantiene el nombre del pacto revelado a Israel, con equivalencia funcional al inglés POB «Yahweh».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El contexto inglés revisó una fórmula más larga a una forma más natural; en español también se evita una calca del tipo «y dijo» o «diciendo» cuando el hebreo introductorio ya queda bien cubierto por el verbo narrativo y la continuación de la cita ocurre en el versículo siguiente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma regular para יהוה en el texto principal.
  - No se añade «diciendo» porque la frase introductoria funciona de manera suficiente en español y la cita no aparece en este versículo.
  - Se usa «Moisés» como forma estándar del nombre propio bíblico.
