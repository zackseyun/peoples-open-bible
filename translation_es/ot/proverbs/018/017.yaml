translation:
  language: es
  text: El primero en presentar su caso parece tener la razón[a], hasta que viene la otra parte y lo examina.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El primero en su pleito parece justo, hasta que viene la otra parte y lo examina».'
    reason: lexical_alternative
lexical_decisions:
- source_word: צַדִּיק
  english_pob_choice: seems right
  chosen_spanish: parece tener la razón
  alternatives_spanish:
  - es justo
  - está en lo correcto
  - parece justo
  lexicon: HALOT
  rationale: En contexto forense de רִיב, el adjetivo no apunta principalmente a una cualidad moral abstracta, sino a la apariencia de estar en lo correcto en el litigio. «Parecer tener la razón» conserva esa tensión entre justicia aparente y verificación posterior.
- source_word: הָרִאשׁוֹן
  english_pob_choice: The first
  chosen_spanish: El primero
  alternatives_spanish:
  - Quien habla primero
  - El que llega primero
  - El primero en hablar
  lexicon: HALOT
  rationale: El hebreo marca al primero en la secuencia del pleito. «El primero» mantiene la concisión proverbial y deja abierto si se trata del primero en hablar o en presentar la causa.
- source_word: בְּרִיבוֹ
  english_pob_choice: to present his case
  chosen_spanish: en presentar su caso
  alternatives_spanish:
  - en su disputa
  - en su pleito
  - en su litigio
  lexicon: HALOT
  rationale: רִיב puede ser disputa, pleito o causa judicial. «Presentar su caso» expresa bien el sentido jurídico implícito sin volver el proverbio pesado o demasiado técnico en español.
- source_word: יָבֹא
  english_pob_choice: to present
  chosen_spanish: presentar
  alternatives_spanish:
  - venir
  - comparecer
  - acercarse
  lexicon: HALOT
  rationale: Aunque el verbo básico es «venir», en este contexto describe la llegada del litigante para exponer su causa. El español «presentar su caso» absorbe ese valor dinámico de manera natural.
- source_word: רֵעֵהוּ
  english_pob_choice: his neighbor
  chosen_spanish: su prójimo
  alternatives_spanish:
  - su vecino
  - la otra parte
  - su compañero
  lexicon: HALOT
  rationale: רֵעַ puede ser prójimo, vecino, compañero o asociado. «Prójimo» es amplio y elegante en español bíblico, y evita suponer amistad donde el contexto es confrontativo.
- source_word: וַחֲקָרוֹ
  english_pob_choice: examines him
  chosen_spanish: lo examina
  alternatives_spanish:
  - lo investiga
  - lo interroga
  - lo somete a examen
  lexicon: HALOT
  rationale: חקר significa examinar, investigar o escudriñar. «Lo examina» conserva la idea de escrutinio sobrio y corresponde bien al cierre del proverbio.
translation_notes:
  revision_awareness: Coincides closely with the source Hebrew and the English POB audit trail. The main adjustment is a Spanish phrasing that keeps the forensic sense of רִיב while sounding natural and publishable in modern Spanish.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» as default policy in view, but this verse does not contain יהוה.
  - Se evitó «SEÑOR» because no divine name occurs here.
  - «Prójimo» was chosen over «vecino» to preserve broad relational scope in wisdom literature.
