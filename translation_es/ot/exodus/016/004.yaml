translation:
  language: es
  text: 'Entonces Yahvé dijo a Moisés[a]: «Mira, estoy haciendo llover pan del cielo para ustedes; el pueblo saldrá y recogerá la porción de un día cada día[b], para que yo los pruebe, a ver si andan en mi ley o no[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Voy a hacer llover pan del cielo para ustedes». El participio hebreo puede traducirse con fuerza de futuro inminente.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «la porción de un día en su día», es decir, la ración necesaria para cada día, recogida ese mismo día.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «a ver si andan conforme a mi instrucción o no».'
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: conventional project default (no lexicon entry number invented)
  rationale: Se sigue el estándar del proyecto para el nombre divino, preservando el nombre del pacto sin sustituirlo por una máscara litúrgica.
- source_word: הִנְנִי
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Mira, aquí estoy
  lexicon: HALOT
  rationale: En español, 'Mira' introduce con naturalidad la declaración divina y conserva el tono de atención inmediata del hebreo sin sonar forzado.
- source_word: מַמְטִיר
  english_pob_choice: I am raining
  chosen_spanish: estoy haciendo llover
  alternatives_spanish:
  - haré llover
  - estoy lloviendo
  lexicon: HALOT
  rationale: El participio causativo hebreo expresa acción inminente o en curso; 'estoy haciendo llover' conserva la vividez e incluye la idea causativa que 'llover' solo no comunica.
- source_word: לֶחֶם מִן הַשָּׁמַיִם
  english_pob_choice: bread from heaven
  chosen_spanish: pan desde el cielo
  alternatives_spanish:
  - pan del cielo
  - alimento del cielo
  lexicon: HALOT
  rationale: '''Pan'' mantiene el sustantivo concreto del hebreo. ''Desde el cielo'' comunica bien el origen; ''del cielo'' también es posible, pero ''desde'' resalta el movimiento descendente que la imagen sugiere.'
- source_word: וְיָצָא הָעָם
  english_pob_choice: the people shall go out
  chosen_spanish: el pueblo saldrá
  alternatives_spanish:
  - y el pueblo irá afuera
  - el pueblo irá a recoger
  lexicon: HALOT
  rationale: '''Saldrá'' reproduce de forma directa el movimiento esperado. Se evita añadir ''a recoger'' antes de tiempo, porque el hebreo primero menciona la salida y luego la recolección.'
- source_word: וְלָקְטוּ
  english_pob_choice: and gather
  chosen_spanish: recogerá
  alternatives_spanish:
  - recolectará
  - juntará
  lexicon: HALOT
  rationale: Aunque el sujeto es colectivo, en español puede expresarse con singular genérico ('el pueblo... recogerá') para mantener fluidez. 'Recoger' conserva el acto ordinario de juntar el maná sin elevarlo a un registro demasiado técnico.
- source_word: דְּבַר יוֹם בְּיוֹמוֹ
  english_pob_choice: a day's portion each day
  chosen_spanish: una porción para cada día
  alternatives_spanish:
  - la medida de un día en su día
  - la porción diaria
  lexicon: HALOT
  rationale: 'Se vierte el modismo por su sentido distributivo: la cantidad correspondiente a cada día, tomada día por día. ''Porción'' comunica la asignación medida sin perder la referencia al sustento diario.'
- source_word: לְמַעַן אֲנַסֶּנּוּ
  english_pob_choice: so that I may test them
  chosen_spanish: para que yo los pruebe
  alternatives_spanish:
  - para ponerlos a prueba
  - a fin de probarlos
  lexicon: HALOT
  rationale: '''Probar'' preserva la idea de examen/refinamiento del hebreo. ''Poner a prueba'' sería más explícito, pero ''probar'' es más conciso y fiel a la fuerza verbal.'
- source_word: הֲיֵלֵךְ
  english_pob_choice: whether they will walk
  chosen_spanish: a ver si andan
  alternatives_spanish:
  - si caminarán
  - si vivirán
  lexicon: HALOT
  rationale: El hebreo usa la metáfora de caminar para conducta. En español, 'andar' conserva esa metáfora moral con naturalidad; se evita 'vivir' porque interpreta más de lo que el texto dice.
- source_word: בְּתוֹרָתִי
  english_pob_choice: in my law
  chosen_spanish: en mi ley
  alternatives_spanish:
  - en mi instrucción
  - en mi enseñanza
  lexicon: HALOT
  rationale: En este contexto de pacto, 'ley' conserva el peso normativo de תּוֹרָה y sigue la decisión auditada en inglés. 'Instrucción' o 'enseñanza' son posibles, pero suavizan el tono jurídico-covenantal.
theological_decisions:
- issue: Renderizado de תּוֹרָה en un contexto pre-sinaítico
  english_pob_reading: my law
  chosen_spanish_reading: mi ley
  alternative_spanish_readings:
  - mi instrucción
  - mi enseñanza
  rationale: Aunque todavía no se ha dado el Sinaí, el texto presenta el criterio divino que Israel debe seguir. 'Ley' mantiene la fuerza del mandato del pacto y anticipa el uso amplio de Torá; las alternativas quedan implícitamente disponibles, pero aquí 'ley' es la más adecuada por su carga normativa.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave) y §6 (español moderno legible)
- issue: Naturaleza del verbo de prueba
  english_pob_reading: so that I may test them
  chosen_spanish_reading: para que yo los pruebe
  alternative_spanish_readings:
  - para que yo los ponga a prueba
  - para que yo los examine
  rationale: El objetivo divino no es mera información, sino discernir y formar la obediencia de Israel. 'Probar' conserva la idea de examen real sin convertirla en una explicación más larga que el texto no exige.
  doctrine_reference: Exodus 16:4; cf. Deuteronomy 8:2 (prueba en el desierto)
- issue: Metáfora ética de caminar
  english_pob_reading: whether they will walk in my law or not
  chosen_spanish_reading: a ver si andan en mi ley o no
  alternative_spanish_readings:
  - si caminarán en mi ley o no
  - si obedecen mi ley o no
  rationale: '''Andar'' conserva la metáfora bíblica de conducta sin reducirla a una simple paráfrasis como ''obedecer''. El texto pregunta por el comportamiento continuo del pueblo conforme a la ley.'
  doctrine_reference: Biblical ethics of walking/conduct; cf. POB consistency on figurative 'walk' language
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del inglés POB, que prefirió una formulación más formal para הִנְנִי y ajustó el modismo de דְּבַר יוֹם בְּיוֹמוֹ hacia una expresión más natural. La redacción española refleja ese equilibrio: mantiene la inmediatez de la declaración divina, conserva la referencia al suministro diario y no amplía indebidamente el contenido del hebreo.'
  spanish_consistency_notes:
  - Se usa Yahvé para el nombre divino, conforme al estándar del proyecto.
  - Se mantiene 'ley' para תּוֹרָה por consistencia con la carga normativa del contexto.
  - Se conserva la metáfora de conducta 'andar' sin convertirla en una paráfrasis interpretativa.
  - La ración diaria se expresa de forma natural en español, pero con nota que preserva el modismo hebreo.
  - Los marcadores de nota a, b, c aparecen exactamente donde corresponden en el texto.
