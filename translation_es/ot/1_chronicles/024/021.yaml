translation:
  language: es
  text: En cuanto a Rehabías[a], de los hijos de Rehabías, el jefe fue Ishiías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «De Rehabías, de entre los hijos de Rehabías, Ishiías fue el jefe».'
