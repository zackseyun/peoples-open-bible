translation:
  language: es
  text: Y el límite[a] de Manasés era desde Aser hasta Micmetat, que está frente a Siquem[b]; y el límite se dirigía hacia el sur[c], hacia los habitantes de En-tapuaj[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «frontera» o «borde». Aquí גְבוּל se refiere a la línea demarcatoria del reparto tribal.
    reason: lexical_alternative
  - marker: b
    text: O «que está antes de Siquem» o «que mira hacia Siquem».
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «a la derecha». En descripciones de límites, esta expresión puede corresponder a una dirección geográfica, aquí entendida como «hacia el sur».
    reason: lexical_alternative
  - marker: d
    text: En-tapuaj significa «fuente de Tapuaj» o «manantial de Tapuaj».
    reason: cultural_note
lexical_decisions:
- source_word: גְבוּל
  english_pob_choice: border
  chosen_spanish: límite
  alternatives_spanish:
  - frontera
  - borde
  - territorio
  lexicon: HALOT
  rationale: En descripciones de reparto territorial, גְבוּל designa la línea o extensión delimitante. 'Límite' es natural en español bíblico moderno y conserva la idea de demarcación sin convertirla en 'territorio'.
- source_word: מֵאָשֵׁר
  english_pob_choice: from Asher
  chosen_spanish: desde Aser
  alternatives_spanish:
  - de Aser
  - desde el territorio de Aser
  - en dirección a Aser
  lexicon: HALOT
  rationale: La preposición מִן marca el punto de inicio del recorrido del límite. 'Desde Aser' reproduce bien ese punto de partida en español.
- source_word: הַמִּכְמְתָת
  english_pob_choice: Michmethath
  chosen_spanish: Micmetat
  alternatives_spanish:
  - Micmetá
  - Mikmetat
  lexicon: HALOT
  rationale: Es un nombre de lugar; se translitera. 'Micmetat' ajusta la forma al español, manteniendo identificable el topónimo.
- source_word: אֲשֶׁר עַל פְּנֵי שְׁכֶם
  english_pob_choice: which is opposite Shechem
  chosen_spanish: que está frente a Siquem
  alternatives_spanish:
  - que está opuesto a Siquem
  - que mira hacia Siquem
  - que está antes de Siquem
  lexicon: HALOT
  rationale: עַל־פְּנֵי puede expresar 'frente a', 'opuesto a' o 'ante'. 'Frente a' conserva la relación espacial sin forzar una dirección más específica que la que da el hebreo.
- source_word: וְהָלַךְ הַגְּבוּל
  english_pob_choice: then the border went
  chosen_spanish: y el límite se dirigía
  alternatives_spanish:
  - y el límite iba
  - entonces el límite iba
  - y el límite avanzaba
  lexicon: HALOT
  rationale: הלך en este contexto describe el curso del límite. 'Se dirigía' comunica el movimiento lineal del trazado y evita una literalidad incómoda en español.
- source_word: אֶל הַיָּמִין
  english_pob_choice: southward / to the right
  chosen_spanish: hacia el sur
  alternatives_spanish:
  - a la derecha
  - hacia la derecha
  - al sur
  lexicon: HALOT
  rationale: La revisión inglesa señaló que el giro idiomático puede equivaler a una orientación geográfica. En este contexto de linderos, 'hacia el sur' es la lectura contextual más natural para el español, sin perder la base literal del hebreo.
- source_word: יֹשְׁבֵי
  english_pob_choice: the inhabitants of
  chosen_spanish: los habitantes de
  alternatives_spanish:
  - los que habitaban en
  - los moradores de
  lexicon: HALOT
  rationale: El participio indica a quienes residen en un lugar. 'Los habitantes de' es idiomático, claro y suficientemente formal.
- source_word: עֵין תַּפּוּחַ
  english_pob_choice: En-tappuah
  chosen_spanish: En-tapuaj
  alternatives_spanish:
  - Fuente de Tapuaj
  - Manantial de Tapuaj
  lexicon: HALOT
  rationale: Es un topónimo transparente que incluye עֵין ('fuente/manantial'). En el texto principal se translitera como nombre propio; la forma 'Tapuaj' refleja el español del nombre. Se conserva la referencia geográfica sin traducir el topónimo.
translation_notes:
  revision_awareness: El texto inglés auditado pasó de «to the right» a «southward» en la revisión más reciente, señalando que el modismo direccional en contextos de límites se entiende mejor como orientación geográfica. La versión española adopta esa lectura contextual en el texto principal y conserva la literalidad subyacente en una nota.
  spanish_consistency_notes:
  - Se mantiene Yahvé como convención del proyecto cuando aparezca el Nombre divino; aquí no está presente.
  - Se eligió 'límite' para גְבוּל por coherencia con el contexto de repartición territorial, manteniendo el mismo valor en ambas apariciones del término.
  - 'Los topónimos se transliteran de modo consistente: Micmetat, Siquem, En-tapuaj.'
  - Se evita 'SEÑOR' y se evita una paráfrasis geográfica más explícita que el hebreo no exige en el texto principal.
