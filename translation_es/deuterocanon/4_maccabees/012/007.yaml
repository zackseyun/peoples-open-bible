lexical_decisions:
- source_word: δὲ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - ahora
  - pero
  lexicon: LSJ
  rationale: Aquí δέ funciona como un conector suave, no como una oposición fuerte; en español, «y» mantiene el flujo narrativo de modo natural.
- source_word: προτρεψαμένης
  english_pob_choice: had encouraged
  chosen_spanish: había animado
  alternatives_spanish:
  - había exhortado
  - había instado
  - había alentado
  lexicon: LSJ
  rationale: El participio expresa una acción de impulso o exhortación. «Había animado» preserva la fuerza de la acción con una formulación natural en español, en línea con la revisión inglesa que optó por un término más sobrio que «urged on».
- source_word: τῇ Ἑβραΐδι φωνῇ
  english_pob_choice: in the Hebrew language
  chosen_spanish: en la lengua hebrea
  alternatives_spanish:
  - en el idioma hebreo
  - en la lengua de los hebreos
  - en la habla hebrea
  lexicon: LSJ
  rationale: φωνή aquí significa habla o lengua, no simple sonido. «Lengua hebrea» es claro, digno y fiel al valor lingüístico del sintagma.
- source_word: ὡς ἐροῦμεν μετὰ μικρὸν ὕστερον
  english_pob_choice: as we will tell a little later
  chosen_spanish: como diremos un poco más adelante
  alternatives_spanish:
  - como contaremos un poco después
  - como diremos más tarde
  - como relataremos un poco después
  lexicon: LSJ
  rationale: La expresión es una nota narrativa autoral que promete una mención posterior. «Un poco más adelante» conserva la referencia prospectiva y el tono de inciso del griego.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió «encouraged» frente a «urged on», por lo que el español evita un verbo excesivamente fuerte y mantiene un tono natural sin perder la idea de exhortación activa.
  spanish_consistency_notes:
  - Se mantiene «lengua hebrea» para conservar la referencia idiomática del griego.
  - Se conserva el inciso narrativo en primera persona plural («como diremos») porque pertenece al hilo autoral del texto.
  - El orden español busca legibilidad sin añadir contenido ajeno al griego.
