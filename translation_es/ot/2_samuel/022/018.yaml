translation:
  language: es
  text: Él me rescató de mi enemigo[a] poderoso, de los que me odiaban, porque eran más fuertes que yo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo tiene un singular en la primera frase, seguido por un plural en la segunda.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַצִּילֵנִי
  english_pob_choice: He rescued me
  chosen_spanish: me rescató
  alternatives_spanish:
  - me libró
  - me salvó
  lexicon: HALOT
  rationale: El verbo hifil de נצל expresa sacar de un peligro o librar/rescatar. En español, "rescató" comunica bien la acción pasada y mantiene el matiz de ser sacado de la amenaza sin cargar hacia un registro demasiado eclesiástico.
- source_word: מֵאֹיְבִי
  english_pob_choice: from my enemy
  chosen_spanish: de mi enemigo
  alternatives_spanish:
  - de mis enemigos
  lexicon: HALOT
  rationale: La forma hebrea es singular con sufijo de primera persona; por eso se conserva el singular en el texto principal. No se armoniza al plural porque el hebreo distingue aquí entre "mi enemigo" y luego "los que me odiaban".
- source_word: עָז
  english_pob_choice: mighty
  chosen_spanish: poderoso
  alternatives_spanish:
  - fuerte
  - mighty
  lexicon: HALOT
  rationale: El adjetivo denota fuerza o poder. "Poderoso" funciona naturalmente con "enemigo" en español y conserva la idea de capacidad superior sin forzar un giro arcaico.
- source_word: מִשֹּׂנְאַי
  english_pob_choice: from those who hated me
  chosen_spanish: de los que me odiaban
  alternatives_spanish:
  - de mis odiadores
  - de los que me eran hostiles
  lexicon: HALOT
  rationale: El participio con sufijo es plural; por eso se traduce con una relativa plural natural en español. "Me odiaban" conserva la relación directa con el objeto pronominal y evita una expresión poco idiomática.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón del rescate. En español, "porque" es la conexión causal más clara y digna en este contexto poético.
- source_word: אָמְצוּ
  english_pob_choice: were too mighty
  chosen_spanish: eran demasiado fuertes
  alternatives_spanish:
  - eran demasiado poderosos
  - prevalecían
  lexicon: HALOT
  rationale: El verbo expresa ser fuerte o prevalecer. "Demasiado fuertes" transmite la relación comparativa con el verso siguiente y preserva el sentido de superioridad respecto del hablante.
- source_word: מִמֶּנִּי
  english_pob_choice: for me
  chosen_spanish: para mí
  alternatives_spanish:
  - más que yo
  - contra mí
  lexicon: HALOT
  rationale: Después de un verbo de fuerza, el hebreo expresa comparación o relación de superioridad. "Para mí" mantiene la fuerza idiomática del español y comunica bien la imposibilidad del hablante frente a ellos.
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail en inglés, conservando la distinción singular/plural entre "enemigo" y "los que me odiaban". La versión española evita una nivelación al plural y mantiene el tono poético y testimonial del versículo.
  spanish_consistency_notes:
  - Se mantiene "rescató" como equivalente principal de נצל en este contexto narrativo-poético.
  - Se conserva la diferencia entre el singular "enemigo" y el plural "los que me odiaban".
  - '"Demasiado fuertes para mí" refleja la comparación del hebreo sin introducir una explicación interpretativa adicional.'
  - El registro es bíblico pero moderno, sin depender de fórmulas litúrgicas tradicionales.
