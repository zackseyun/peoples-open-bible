lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: conector discursivo griego
  rationale: Introduce la explicación causal de manera natural en español y conserva el valor justificativo del griego.
- source_word: ἐποίησαν
  english_pob_choice: did not act
  chosen_spanish: no actuaron
  alternatives_spanish:
  - no hicieron
  - no obraron
  lexicon: LSJ
  rationale: Aunque el verbo significa literalmente 'hicieron', en español 'actuar' reproduce mejor la relación con el motivo expresado por los complementos preposicionales, sin concretar indebidamente el objeto de la acción.
- source_word: ζήλῳ
  english_pob_choice: zeal
  chosen_spanish: celo
  alternatives_spanish:
  - zeal
  - celos
  lexicon: LSJ
  rationale: '''Celo'' mantiene el matiz de impulso religioso o moral que el inglés POB preserva con ''zeal'', y evita el sentido de envidia o celos sentimentales.'
- source_word: ἐπιθυμίᾳ
  english_pob_choice: desire
  chosen_spanish: deseo
  alternatives_spanish:
  - apetito
  - codicia
  - concupiscencia
  lexicon: LSJ
  rationale: '''Deseo'' conserva el campo semántico general del término sin sexualizarlo ni volverlo más fuerte de lo que exige el contexto, aunque sigue siendo un deseo desordenado por contraste con ''celo''.'
- source_word: ψυχῆς
  english_pob_choice: their own desire
  chosen_spanish: su alma
  alternatives_spanish:
  - de su alma
  - de su propia alma
  - de sí mismos
  lexicon: LSJ
  rationale: La secuencia griega ἐπιθυμίᾳ ψυχῆς refleja un giro semítico que el audit trail inglés decidió preservar como 'of their soul'. En español, 'el deseo de su alma' sería la forma más explícita, pero en una línea tan breve 'el deseo de su alma' resulta plenamente natural; por economía y ritmo, la redacción principal mantiene la construcción 'de su alma' implícita dentro del sintagma para no perder el tono elevado.
translation_notes:
  revision_awareness: El texto inglés POB pasó por una revisión que inicialmente suavizó ψυχῆς como 'their own', pero el dictamen posterior restableció la fuerza idiomática de 'the desire of their soul'. La versión española sigue ese ajuste y evita reducir ψυχῆς a una simple idea de propiedad; por eso conserva el valor de 'alma' en la nota y una formulación principal que refleja el motivo interno.
  spanish_consistency_notes:
  - Se usa 'celo' para ζῆλος, conforme al valor moral/religioso del pasaje.
  - Se evita 'celos' para no introducir una connotación afectiva ajena al contexto.
  - La construcción con 'alma' preserva el trasfondo semítico de ψυχῆς sin volver la frase forzada en español.
  - Se mantiene 'actuaron' para reflejar el verbo de acción general sin especificar el objeto implícito.
