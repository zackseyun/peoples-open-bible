translation:
  language: es
  text: El poder de su sabiduría está establecido; él solo es[a] desde la eternidad[d]. Nada se le añade y nada se le quita[b], y no necesita consejero alguno[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente «él es uno»; se vierte «él solo es» para expresar en contexto el sentido probable de singularidad y unicidad.
    reason: lexical_alternative
  - marker: b
    text: El hebreo detrás de «nada se le quita» es difícil. El sentido parece ser que nada puede añadirse a Dios ni quitarse de él.
    reason: alternative_reading
  - marker: c
    text: La expresión traducida «consejero alguno» es literalmente «cualquiera que entiende» o «cualquier entendido/discerniente».
    reason: lexical_alternative
  - marker: d
    text: 'El paralelo griego amplía la referencia temporal: «antes de la era y por la era», lo que apoya la traducción «desde la eternidad».'
    reason: cross_reference
lexical_decisions:
- source_word: גבורת
  english_pob_choice: the might of
  chosen_spanish: la grandeza de
  alternatives_spanish:
  - la potencia de
  - el poder de
  - la fuerza de
  lexicon: HALOT
  rationale: En contexto, el hebreo en construcción con חכמתו expresa la magnitud o eminencia de la sabiduría de Dios; la POB inglesa revisó la primera línea hacia una formulación más ligada al hebreo. En español, «la grandeza de» comunica esa idea sin cargarla con una dureza innecesaria ni reducirla a mera abstracción.
- source_word: חכמתו
  english_pob_choice: his wisdom
  chosen_spanish: su sabiduría
  alternatives_spanish:
  - su sabiduría
  - la sabiduría de él
  lexicon: HALOT
  rationale: Corresponde de forma directa al posesivo hebreo. Se conserva la relación estrecha entre la grandeza y la sabiduría.
- source_word: תכן
  english_pob_choice: has established
  chosen_spanish: está establecida
  alternatives_spanish:
  - ha establecido
  - está ordenada
  - ha sido establecida
  lexicon: HALOT
  rationale: La POB inglesa revisada eligió «is established» para reflejar mejor el valor resultativo/pasivo. En español, «está establecida» preserva ese estado resultante y suena natural en registro bíblico contemporáneo.
- source_word: אחד הוא
  english_pob_choice: he alone is
  chosen_spanish: él solo es
  alternatives_spanish:
  - él es uno
  - solo él es
  lexicon: HALOT
  rationale: La expresión subraya singularidad y exclusividad, no solo una afirmación numérica. «Él solo es» conserva ese énfasis mejor que un literal «él es uno».
- source_word: מעולם
  english_pob_choice: from everlasting
  chosen_spanish: desde la eternidad
  alternatives_spanish:
  - desde siempre
  - desde la antigüedad
  - desde la eternidad
  lexicon: HALOT
  rationale: La POB inglesa integró el trasfondo temporal ampliado del paralelo griego. En español, «desde la eternidad» expresa bien la anterioridad eterna sin sonar arcaico, y mantiene la fuerza doctrinal de preexistencia eterna.
- source_word: לא נוסף
  english_pob_choice: Nothing is added to him
  chosen_spanish: Nada se le añade
  alternatives_spanish:
  - No se le añade nada
  - Nada aumenta en él
  - No recibe añadidura
  lexicon: HALOT
  rationale: La formulación pasiva/impersonal del hebreo se refleja con una construcción natural en español. Se conserva la idea de que nada puede aumentar a Dios.
- source_word: ולא נאצל
  english_pob_choice: nothing is taken away
  chosen_spanish: nada se le quita
  alternatives_spanish:
  - nada le es quitado
  - no se le quita nada
  - nada disminuye en él
  lexicon: HALOT
  rationale: La raíz es difícil, y la POB inglesa la trató dentro del par aditivo/sustractivo. En español, «nada se le quita» mantiene ese equilibrio y la idea de inmutabilidad sin decidir más de lo que el texto permite.
- source_word: ולא צריך
  english_pob_choice: he has no need of
  chosen_spanish: no necesita
  alternatives_spanish:
  - no requiere
  - no tiene necesidad de
  lexicon: HALOT
  rationale: Equivale de manera idiomática y fiel a la autosuficiencia divina.
- source_word: לכל מבין
  english_pob_choice: any counselor
  chosen_spanish: consejero alguno
  alternatives_spanish:
  - algún entendido
  - ningún consejero
  - algún asesor
  lexicon: HALOT
  rationale: La POB inglesa optó por «counselor» a partir del sentido funcional de alguien que aporta discernimiento. En español, «consejero alguno» comunica esa función con naturalidad y mantiene la alusión a la autosuficiencia de Dios, sin forzar el hebreo a un término demasiado técnico.
theological_decisions:
- issue: Singularidad divina en אחד הוא
  english_pob_reading: he alone is
  chosen_spanish_reading: él solo es
  alternative_spanish_readings:
  - él es uno
  - solo él es
  rationale: Se preserva la tensión entre una lectura literal de unidad y el sentido contextual de exclusividad/singularidad. La frase española mantiene el énfasis en que no hay otro como él.
  doctrine_reference: DOCTRINE.md §Translation philosophy, preserve source sense over tradition
- issue: Inmutabilidad divina en la secuencia negativa
  english_pob_reading: Nothing is added to him and nothing is taken away
  chosen_spanish_reading: Nada se le añade y nada se le quita
  alternative_spanish_readings:
  - No se le añade nada ni se le quita nada
  - Nada aumenta en él ni disminuye
  rationale: La pareja aditiva/sustractiva expresa que Dios no sufre incremento ni pérdida. Se conserva la inmutabilidad implícita sin expandir el texto más allá del hebreo y su paralelo griego.
  doctrine_reference: 'PHILOSOPHY.md: use Hebrew where it survives and Greek parallel as actual translation input'
- issue: Temporalidad absoluta de מעולם con apoyo del paralelo griego
  english_pob_reading: from everlasting
  chosen_spanish_reading: desde la eternidad
  alternative_spanish_readings:
  - desde siempre
  - desde la antigüedad
  - antes del siglo y por el siglo
  rationale: El hebreo permite una referencia muy antigua, pero el griego extiende explícitamente la referencia temporal. «Desde la eternidad» recoge el alcance combinado de ambos testigos y sugiere preexistencia eterna.
  doctrine_reference: 'PHILOSOPHY.md: use Hebrew where it survives and Greek parallel as actual translation input'
translation_notes:
  revision_awareness: He tenido en cuenta la revisión reciente del inglés POB que corrigió la primera cláusula hacia una formulación más cercana al hebreo resultativo («is established») y la cláusula media hacia una lectura aditiva/sustractiva («Nothing is added to him and nothing is taken away»). La presente versión española sigue esa revisión y mantiene la última cláusula en clave de autosuficiencia divina.
  spanish_consistency_notes:
  - Se usó un registro bíblico moderno y digno, evitando calcos rígidos.
  - Se preservó la inmutabilidad divina como idea textual, sin ampliar con lenguaje doctrinal extra.
  - No se añadieron notas al pie porque no hubo una ambigüedad española que requiriera marcadores en el texto principal.
