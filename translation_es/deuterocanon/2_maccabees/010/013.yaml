revisions:
- from: Pero, como no era insensato, sino que iba considerando dentro de sí la derrota que le había ocurrido, y había comprendido que los Hebreos eran invencibles, porque el Dios poderoso estaba combatiendo junto a ellos, envió por delante.
  to: Pero, como no era insensato, sino que iba considerando dentro de sí la derrota que le había sobrevenido, y había comprendido que los hebreos eran invencibles, porque el Dios poderoso estaba combatiendo junto a ellos, envió por delante.
  rationale: Se ajusta una expresión poco idiomática («le había ocurrido») a una formulación española natural y fiel («le había sobrevenido»), y se normaliza el gentilicio a minúscula («hebreos»). No hacen falta notas nuevas porque no se introduce ambigüedad adicional ni se pierde ninguna alternativa documentada esencial.
