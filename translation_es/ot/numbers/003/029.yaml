translation:
  language: es
  text: Los clanes de los hijos de Coat acamparán al lado sur del tabernáculo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los descendientes de Coat» o «los coatitas». El hebreo dice literalmente «los hijos de Coat».
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשְׁפְּחֹת
  english_pob_choice: clans
  chosen_spanish: familias
  alternatives_spanish:
  - clanes
  lexicon: HALOT
  rationale: En este contexto censal y de ordenamiento del campamento, el hebreo se refiere a subdivisiones de parentesco. En español, «familias» conserva la idea de grupo genealógico y suena natural; «clanes» es posible, pero menos usual en lectura bíblica general.
- source_word: בְּנֵי קְהָת
  english_pob_choice: the sons of Kohath
  chosen_spanish: los hijos de Coat
  alternatives_spanish:
  - los descendientes de Coat
  - los coatitas
  lexicon: HALOT
  rationale: Mantengo la expresión filial literal del hebreo, como en la base inglesa, para conservar la transparencia genealógica. «Coat» sigue la forma tradicional española del nombre propio bíblico.
- source_word: יַחֲנוּ
  english_pob_choice: shall camp
  chosen_spanish: acamparán
  alternatives_spanish:
  - acamparán allí
  - deben acampar
  lexicon: HALOT
  rationale: El imperfecto expresa una disposición normativa del campamento. «Acamparán» comunica bien el valor futuro prescriptivo sin sobrecargar el español con un «deberán» que añade matiz no explicitado por el hebreo.
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: al lado de
  alternatives_spanish:
  - sobre
  - en
  lexicon: HALOT
  rationale: Con יֶרֶךְ en una expresión locativa, la preposición marca posición junto a un costado. «Al lado de» expresa con naturalidad la relación espacial de campamento.
- source_word: יֶרֶךְ
  english_pob_choice: side
  chosen_spanish: lado
  alternatives_spanish:
  - flanco
  - costado
  lexicon: HALOT
  rationale: El sustantivo designa el lado o flanco de un objeto. «Lado» es claro y natural en español, y conserva la referencia espacial del texto.
- source_word: הַמִּשְׁכָּן
  english_pob_choice: the tabernacle
  chosen_spanish: el tabernáculo
  alternatives_spanish:
  - la morada
  - la tienda del santuario
  lexicon: HALOT
  rationale: En Números este término designa el santuario portátil. «Tabernáculo» es el equivalente español establecido y suficientemente preciso para este referente cultual.
- source_word: תֵּימָנָה
  english_pob_choice: south
  chosen_spanish: sur
  alternatives_spanish:
  - al sur
  - hacia el sur
  lexicon: HALOT
  rationale: La forma direccional se integra naturalmente en español como «sur» dentro de la construcción «lado sur». Evita una redundancia innecesaria y mantiene la ubicación exacta.
translation_notes:
  revision_awareness: La revisión más reciente no indicó cambios; el texto se mantiene alineado con el audit trail inglés y con la lectura hebrea directa, sin necesidad de ajustes textuales.
  spanish_consistency_notes:
  - Se usa «tabernáculo» de forma consistente con la tradición de traducción española para este término cultual específico.
  - Se conserva el nombre «Coat» en lugar de sustituirlo por una forma modernizada, para mantener continuidad bíblica en español.
  - La nota al pie refleja la alternativa de parentesco preservada en el inglés POB y explicita el hebreo literal.
