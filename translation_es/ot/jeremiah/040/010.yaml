base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/040/010.yaml
  text: As for me[a], behold, I am staying at Mizpah to stand before the Chaldeans who come to us. But you, gather wine, summer fruit, and oil, put them in your containers[b], and dwell in your cities that you have taken.
  footnotes:
