review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido global del hebreo y del POB inglés: mantiene el imperativo antropomórfico dirigido a Dios, la idea de ruinas duraderas y la devastación total del santuario. Sin embargo, «hasta las ruinas» introduce un matiz de límite/alcance menos directo que לְ y que la decisión auditada del POB («to the»). Además, la nota al pie omite la alternativa principal inglesa «desolaciones» / «devastaciones perpetuas» y solo conserva «tus pies».'
  spanish_quality_summary: El español es claro y digno, pero «Levanta tus pasos hasta las ruinas perpetuas» suena algo menos natural y menos preciso que «hacia las ruinas perpetuas» o «a las ruinas perpetuas». También conviene limpiar la redacción de la nota al pie para que sea idiomática en español bíblico moderno y preserve mejor el alcance de la nota inglesa.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Santuario» para בַּקֹּדֶשׁ, «el enemigo», y «ha devastado» están bien alineados. No aparecen términos sensibles como Yahvé/Mesías/esclavo. La principal corrección es preposicional y de conservación de alternativas léxicas en la nota.
  issues:
  - severity: medium
    issue: «hasta las ruinas» para לְמַשֻּׁאוֹת
    rationale: «Hasta» puede sugerir límite de recorrido más que dirección meta. El hebreo con לְ y la auditoría inglesa favorecen una meta directa («a/hacia las ruinas»). En español bíblico natural, «hacia» conserva mejor la imagen de avance sin sonar forzado.
  - severity: medium
    issue: La nota al pie no preserva la alternativa principal sobre «desolaciones»
    rationale: La nota inglesa documenta no solo «your feet» sino también «everlasting desolations». La nota española actual reduce indebidamente la evidencia léxica conservada por el POB.
  - severity: low
    issue: Redacción de nota con comilla inicial innecesaria
    rationale: '«''O: ...''» no es una formulación limpia en español editorial; conviene normalizarla.'
  revised_spanish_text: Levanta tus pasos hacia las ruinas perpetuas[a]; el enemigo ha devastado todo en el santuario.
  revised_footnotes:
