translation:
  language: es
  text: Sobre los camellos estaba Obil el ismaelita, y sobre las burras[a] estaba Jehdeías el meronotita.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las asnas». El hebreo se refiere específicamente a animales hembra.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל
  english_pob_choice: Over
  chosen_spanish: Sobre
  alternatives_spanish:
  - Encima de
  - Encargado de
  - A cargo de
  lexicon: HALOT
  rationale: En esta lista administrativa, el hebreo marca responsabilidad o supervisión. «Sobre» conserva la concisión del giro y refleja bien la relación de cargo sin añadir explicación innecesaria.
- source_word: הַגְּמַלִּים
  english_pob_choice: the camels
  chosen_spanish: los camellos
  alternatives_spanish:
  - los camellos
  lexicon: HALOT
  rationale: Es el sustantivo plural definido normal para camellos; no requiere adaptación adicional.
- source_word: אוֹבִיל
  english_pob_choice: Obil
  chosen_spanish: Obil
  alternatives_spanish:
  - Obil
  lexicon: Nombre propio
  rationale: Se translitera el nombre propio sin traducirlo.
- source_word: הַיִּשְׁמְעֵאלִי
  english_pob_choice: the Ishmaelite
  chosen_spanish: el ismaelita
  alternatives_spanish:
  - el descendiente de Ismael
  lexicon: HALOT
  rationale: La forma gentilicia en español natural es «ismaelita». Mantiene la identificación étnica o de clan del hebreo sin perífrasis.
- source_word: הָאֲתֹנוֹת
  english_pob_choice: the female donkeys
  chosen_spanish: las burras
  alternatives_spanish:
  - las asnas
  - las hembras de asno
  - los burros
  lexicon: HALOT
  rationale: אֲתוֹנוֹת designa específicamente animales hembra. «Burras» comunica esa especificidad en español actual y conserva el matiz lexical que el inglés POB hizo explícito con «female donkeys».
- source_word: יֶחְדְּיָהוּ
  english_pob_choice: Jehdeiah
  chosen_spanish: Jehdeías
  alternatives_spanish:
  - Jehdeía
  - Yejdeías
  lexicon: Nombre propio
  rationale: Se adapta la transliteración al patrón gráfico usual en español bíblico para nombres terminados en -iah/ -iahu, manteniendo la identidad del nombre propio.
- source_word: הַמֵּרֹנֹתִי
  english_pob_choice: the Meronothite
  chosen_spanish: el meronotita
  alternatives_spanish:
  - el de Meronot
  - el meronita
  lexicon: HALOT
  rationale: Se conserva el gentilicio como forma identificadora, equivalente al inglés POB. «Meronotita» suena natural en español y evita interpretar de más el posible origen toponímico.
translation_notes:
  revision_awareness: El inglés POB mantiene la relación administrativa con «Over» y hace explícita la especificidad lexical de הָאֲתֹנוֹת («female donkeys»). La versión española sigue esa misma distinción sin introducir cambios de sentido ni suavizar el oficio asignado a los personajes.
  spanish_consistency_notes:
  - Se mantiene la estructura paralela «Sobre... y sobre...», reflejando la lista de encargos.
  - Los nombres propios se transliteran de manera consistente con uso bíblico en español, sin sustituirlos por formas tradicionales no atestiguadas aquí.
  - «Ismaelita» y «meronotita» conservan el valor gentilicio del original.
  - La nota al pie preserva la alternativa lexical documentada para הָאֲתֹנוֹת.
