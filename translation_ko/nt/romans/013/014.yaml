id: ROM.13.14
reference: Romans 13:14
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἀλλὰ ἐνδύσασθε τὸν κύριον Ἰησοῦν Χριστόν, καὶ τῆς σαρκὸς πρόνοιαν μὴ ποιεῖσθε εἰς ἐπιθυμίας.
base_translation:
  language: en
  yaml_path: translation/nt/romans/013/014.yaml
  text: But put on the Lord Jesus Messiah, and make no provision for the flesh, for its desires.
translation:
  language: ko
  text: 도리어 주 예수 메시아를 입으십시오. 그리고 욕망을 위하여 육신을 돌볼 궁리[a]를 하지 마십시오.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「죄성을 위한 준비를 하지 말라」. 헬라어 σάρξ는 「육신」을 뜻하며, 바울은 자주 이 단어를 하나님의 인도와 대조되는 타락한 인간 충동을 가리키는 데 쓴다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνδύσασθε
  english_pob_choice: put on
  chosen_korean: 입으십시오
  alternatives_korean:
  - 옷처럼 입으십시오
  lexicon: BDAG
  rationale: 중간태 명령. 옷 입음의 은유로 정체성·삶의 양식을 채택함을 가리킨다. 13:12의 「입읍시다」와 어휘적으로 연결된다.
- source_word: κύριον
  english_pob_choice: Lord
  chosen_korean: 주
  alternatives_korean:
  - 주님
  lexicon: BDAG
  rationale: 정책 글로사리 κύριος(예수)→주.
- source_word: Χριστόν
  english_pob_choice: Messiah
  chosen_korean: 메시아
  alternatives_korean:
  - 그리스도
  lexicon: BDAG
  rationale: '정책 글로사리: 칭호로 기능하는 Χριστός→메시아. 영어 POB가 doctrine 정책에 따라 「Christ」 회귀를 되돌려 「Messiah」로 복원한 결정을 한국어에도 동일하게 적용한다.'
- source_word: πρόνοιαν ... ποιεῖσθε
  english_pob_choice: make provision
  chosen_korean: 돌볼 궁리를 하다
  alternatives_korean:
  - 미리 준비하다
  - 챙기다
  lexicon: BDAG
  rationale: πρόνοια는 미리 헤아려 준비함. 한국어 관용 「돌볼 궁리를 하다」가 「장차의 충족을 위한 준비」 의미를 자연스럽게 살린다.
- source_word: σάρξ
  english_pob_choice: flesh
  chosen_korean: 육신
  alternatives_korean:
  - 죄성
  - 본성
  lexicon: BDAG
  rationale: 정책에 따라 바울의 σάρξ는 「육신」으로 보존. 「죄성」으로의 좁힌 해석은 각주로 둔다.
- source_word: εἰς ἐπιθυμίας
  english_pob_choice: for its desires
  chosen_korean: 욕망을 위하여
  alternatives_korean:
  - 정욕을 위하여
  - 갈망을 채우려고
  lexicon: BDAG
  rationale: 목적·결과의 εἰς. 「욕망」으로 옮겨 정욕의 좁은 함의를 강제하지 않는다.
theological_decisions:
- issue: 도덕적 문맥의 σάρξ 번역
  chosen_reading: 육신
  alternative_readings:
  - 죄성
  rationale: 문맥은 윤리적이고 무질서한 인간 욕망을 가리키지만, σάρξ를 「죄성」으로 좁히면 바울의 인간학을 본문보다 더 체계화하게 된다. 본문에는 「육신」을 두고 해석적 대안은 각주로 보존한다.
  doctrine_reference: 'DOCTRINE.md: σάρξ 항목; 신학적 긴장을 보존하라'
