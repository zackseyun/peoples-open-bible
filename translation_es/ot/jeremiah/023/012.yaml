revisions:
- from: Por tanto, su camino les será como lugares resbaladizos en la oscuridad; serán arrastrados[a] y caerán en él, porque yo traeré sobre ellos calamidad en el año de su castigo, dice Yahvé.
  to: Por tanto, su camino les será como lugares resbaladizos en la oscuridad; serán arrastrados y caerán en ella, porque yo traeré sobre ellos calamidad en el año de su castigo[a], declara Yahvé.
  rationale: Se corrige el anclaje de la nota para que corresponda a שְׁנַת פְּקֻדָּתָם, se ajusta la concordancia pronominal a 'en ella' y se afina la fórmula profética a 'declara Yahvé'. No se requieren cambios doctrinales ni una adjudicación más alta.
