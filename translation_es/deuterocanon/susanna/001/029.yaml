base_translation:
  language: en
  yaml_path: translation/deuterocanon/susanna/001/029.yaml
  text: And it happened on the next day[a], when the people had gathered to her husband Joakim, that the two elders came, full of the lawless intent to put Susanna to death, and they said before the people, “Send for Susanna daughter of Hilkiah, who is the wife of Joakim.”
  footnotes:
  - marker: a
    text: Or 'full of lawless purpose' or 'filled with unlawful design.' The Greek emphasizes an inward plan or intention that is contrary to law.
    reason: lexical_alternative
