translation:
  language: es
  text: Pero comisiona a Josué[a], y fortalécelo[b] y anímalo[c], porque él cruzará delante de este pueblo, y él hará que hereden[d] la tierra que tú verás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Comisiona» refleja el encargo formal de liderazgo; también podría traducirse «manda» o «encarga».
    reason: lexical_alternative
  - marker: b
    text: «Fortalécelo» traduce el primer verbo de una pareja hebrea común que llama a la firmeza.
    reason: lexical_alternative
  - marker: c
    text: El segundo imperativo añade el matiz de dar ánimo o valor; también podría expresarse «hazlo valiente».
    reason: lexical_alternative
  - marker: d
    text: 'También: «y él les hará poseer la tierra como herencia». El hebreo usa un verbo causativo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְצַו
  english_pob_choice: commission
  chosen_spanish: comisiona
  alternatives_spanish:
  - manda
  - encarga
  lexicon: HALOT
  rationale: El imperativo piel de צוה aquí no expresa solo una orden genérica, sino un encargo oficial de responsabilidad. «Comisiona» conserva ese matiz formal de investidura y liderazgo, en línea con la decisión auditada del inglés POB.
- source_word: יְהוֹשֻׁעַ
  english_pob_choice: Joshua
  chosen_spanish: Josué
  alternatives_spanish:
  - Josué
  lexicon: convención bíblica española
  rationale: Nombre propio transliterado según el uso normal en español bíblico.
- source_word: וְחַזְּקֵהוּ
  english_pob_choice: strengthen him
  chosen_spanish: fortalécelo
  alternatives_spanish:
  - anímalo
  - hazlo fuerte
  lexicon: HALOT
  rationale: El piel de חזק significa fortalecer o hacer firme. «Fortalécelo» preserva la fuerza imperativa y suena natural en español.
- source_word: וְאַמְּצֵהוּ
  english_pob_choice: encourage him
  chosen_spanish: anímalo
  alternatives_spanish:
  - fortalécelo
  - hazlo valiente
  lexicon: HALOT
  rationale: En este paralelismo con חזק, אמץ aporta el matiz de robustecer el ánimo, dar valor o ánimo. «Anímalo» mantiene la diferencia funcional con el verbo anterior y refleja bien la exhortación a la valentía.
- source_word: כִּי הוּא יַעֲבֹר
  english_pob_choice: for he will cross over
  chosen_spanish: porque él cruzará
  alternatives_spanish:
  - porque pasará
  - porque irá al otro lado
  lexicon: HALOT
  rationale: עָבַר en este contexto de Deuteronomio alude al cruce del Jordán. «Cruzar» es idiomático en español y conserva la imagen concreta del original.
- source_word: לִפְנֵי הָעָם הַזֶּה
  english_pob_choice: before this people
  chosen_spanish: delante de este pueblo
  alternatives_spanish:
  - ante este pueblo
  - al frente de este pueblo
  lexicon: HALOT
  rationale: «Delante de» reproduce la imagen espacial de לִפְנֵי y sugiere liderazgo sin añadir una paráfrasis más interpretativa.
- source_word: וְהוּא יַנְחִיל אוֹתָם
  english_pob_choice: and he will cause them to inherit
  chosen_spanish: y él hará que ellos hereden[c]
  alternatives_spanish:
  - y él les dará como herencia
  - y él los llevará a heredar
  lexicon: HALOT
  rationale: 'El hiphil de נחל es causativo: Josué será el agente por medio del cual el pueblo reciba su herencia. «Hará que ellos hereden» mantiene ese valor causativo sin perder naturalidad en español.'
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el país
  lexicon: HALOT
  rationale: En Deuteronomio este término apunta a la tierra prometida. «La tierra» es la forma española más natural y suficientemente específica.
- source_word: אֲשֶׁר תִּרְאֶה
  english_pob_choice: that you will see
  chosen_spanish: que tú verás
  alternatives_spanish:
  - que verás
  - que tú vas a ver
  lexicon: HALOT
  rationale: El relativo retoma la tierra que Moisés solo podrá ver, no entrar. El futuro simple en español expresa adecuadamente el valor del imperfecto hebreo en este contexto.
translation_notes:
  revision_awareness: 'Coincide con el pasaje hebreo base y con el audit trail inglés: se preserva el tono exhortativo, el matiz formal de la comisión y la causatividad de ינחיל. No se documentan revisiones textuales adicionales en el expediente proporcionado.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto hebreo trae el nombre divino; aquí no aparece, así que no se introduce.
  - «Josué» mantiene la convención española estándar para el nombre propio.
  - 'Se conserva la distinción entre los dos verbos exhortativos: fortalecer y animar.'
  - «La tierra» se prefiere a «el país» por ser la formulación bíblica más natural en este contexto de herencia prometida.
