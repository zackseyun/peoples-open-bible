translation:
  language: es
  text: 'Así que pensé que debía informarte[a], diciendo: «Cómpralo en presencia de los que están sentados aquí y en presencia de los ancianos de mi pueblo. Si lo redimes, redímelo; pero si no,[b] dime, para que yo sepa, porque no hay nadie más que tú que lo redima, y yo voy después de ti». Y dijo: «Yo lo redimiré».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «descubrir tu oído», un modismo que significa «informarte» o «hacerte saber».'
    reason: lexical_alternative
  - marker: b
    text: El texto hebreo dice literalmente «si él no redime»; algunos entienden en este contexto «si tú no redimes», suavizando el cambio de tercera a segunda persona.
    reason: alternative_reading
lexical_decisions:
- source_word: אֶגְלֶה אָזְנְךָ
  english_pob_choice: inform you
  chosen_spanish: informarte
  alternatives_spanish:
  - descubrirte el oído
  - darte a conocer
  - hacerte saber
  lexicon: HALOT
  rationale: 'El hebreo es un modismo literal: «descubrir el oído». En español, «informarte» comunica el sentido idiomático sin perder la idea de comunicar algo privadamente.'
- source_word: קְנֵה
  english_pob_choice: Buy it
  chosen_spanish: Cómpralo
  alternatives_spanish:
  - Adquiérelo
  - Concrétalo como compra
  lexicon: HALOT
  rationale: En este contexto legal y patrimonial, el verbo apunta a una compra/redención de la propiedad. «Cómpralo» sigue la revisión del POB inglés y es natural en español, sin reducir indebidamente el campo semántico a una transacción comercial ordinaria.
- source_word: נֶגֶד הַיֹּשְׁבִים
  english_pob_choice: in the presence of those sitting here
  chosen_spanish: en presencia de los que están sentados aquí
  alternatives_spanish:
  - delante de los que están sentados aquí
  - ante los que están sentados aquí
  lexicon: HALOT
  rationale: נגד expresa publicidad/testimonio ante personas presentes. «En presencia de» preserva el valor formal y jurídico; «los que están sentados aquí» refleja directamente el participio hebreo.
- source_word: זִקְנֵי עַמִּי
  english_pob_choice: the elders of my people
  chosen_spanish: los ancianos de mi pueblo
  alternatives_spanish:
  - los ancianos de mi gente
  - los ancianos de mi comunidad
  lexicon: HALOT
  rationale: «Ancianos» es el equivalente directo de זקנים en el contexto de liderazgo comunitario. «Mi pueblo» mantiene la relación comunitaria sin estrecharla artificialmente a «clan».
- source_word: תִּגְאַל ... גְּאָל
  english_pob_choice: If you will redeem it, redeem it
  chosen_spanish: Si lo redimes, redímelo
  alternatives_spanish:
  - Si quieres redimirlo, redímelo
  - Si vas a redimirlo, redímelo
  lexicon: HALOT
  rationale: Se conserva la repetición enfática del verbo גאל. «Redimir» mantiene el término técnico-jurídico para la función del pariente-rescatador en este pasaje.
- source_word: וְאִם לֹא יִגְאַל
  english_pob_choice: but if not
  chosen_spanish: pero si no
  alternatives_spanish:
  - pero si él no lo redime
  - pero si no lo redime
  lexicon: HALOT
  rationale: La revisión del POB inglés decidió evitar una tercera persona explícita no garantizada por la construcción hebrea. «Pero si no» reproduce bien la forma breve y el contexto de conversación directa.
- source_word: הַגִּידָה לִּי
  english_pob_choice: tell me
  chosen_spanish: dime
  alternatives_spanish:
  - háblame
  - decláramelo
  lexicon: HALOT
  rationale: Imperativo directo y natural en español. «Dime» mantiene la inmediatez del diálogo sin perder formalidad.
- source_word: אֵין זוּלָתְךָ
  english_pob_choice: there is no one besides you
  chosen_spanish: no hay nadie fuera de ti
  alternatives_spanish:
  - no hay nadie más que tú
  - no hay otro además de ti
  lexicon: HALOT
  rationale: זוּלָת expresa exclusión. «Fuera de ti» conserva bien la exclusividad; «nadie» hace explícito el referente personal que el contexto exige.
- source_word: לִגְאֹל
  english_pob_choice: to redeem it
  chosen_spanish: que lo redima
  alternatives_spanish:
  - para redimirlo
  - para actuar como redentor
  lexicon: HALOT
  rationale: El infinitivo depende del contexto del objeto implícito. En español, «que lo redima» mantiene el valor funcional sin sobreexplicar.
- source_word: וְאָנֹכִי אַחֲרֶיךָ
  english_pob_choice: and I am after you
  chosen_spanish: y yo vengo después de ti
  alternatives_spanish:
  - y yo estoy después de ti
  - y yo soy el siguiente después de ti
  lexicon: HALOT
  rationale: La frase indica sucesión en el orden de derecho/obligación. «Vengo después de ti» suena natural en español y preserva la secuencia.
- source_word: אָנֹכִי אֶגְאָל
  english_pob_choice: I will redeem it
  chosen_spanish: Yo lo redimiré
  alternatives_spanish:
  - Yo redimiré
  - Yo actuaré como redentor
  lexicon: HALOT
  rationale: La respuesta acepta la obligación/derecho de redención. «Lo redimiré» mantiene el objeto contextual implícito y el verbo técnico ya establecido.
theological_decisions:
- issue: Traducción de גאל en contexto de redención familiar/legal
  english_pob_reading: redeem
  chosen_spanish_reading: redimir
  alternative_spanish_readings:
  - actuar como redentor
  - rescatar
  rationale: El pasaje trata de un derecho y deber de redención dentro del parentesco. «Redimir» conserva la carga legal y covenantal sin introducir una glosa interpretativa fija en el texto principal.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: Tratamiento del posible cambio de persona en וְאִם לֹא יִגְאַל
  english_pob_reading: but if not
  chosen_spanish_reading: pero si no
  alternative_spanish_readings:
  - pero si él no redime
  - pero si tú no redimes
  rationale: La lectura inglesa revisada evita imponer un tercer sujeto. El español sigue esa decisión y deja la referencia abierta según el contexto inmediato del diálogo.
  doctrine_reference: Revision-aware textual decision; compare English audit trail and MT context
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente cambió «Acquire it» por «Buy it» y ajustó «if he will not redeem it» a «if not». Esta versión española sigue esa revisión: usa «Cómpralo» y «pero si no», evitando un tercer sujeto no explícito y manteniendo el tono jurídico del intercambio.'
  spanish_consistency_notes:
  - Se mantiene «redimir» para גאל a lo largo del versículo para conservar consistencia terminológica.
  - Se prefirió un español natural y reverente sin calcar el hebreo de forma opaca.
  - Las notas al pie están ancladas únicamente donde aparecen sus marcadores en el texto principal.
