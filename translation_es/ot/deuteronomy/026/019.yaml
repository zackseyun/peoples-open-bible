revisions:
- from: y para ponerte en alto sobre todas las naciones que él ha hecho[a], para alabanza y para renombre y para gloria[b], y para que seas un pueblo santo para Yahvé tu Dios, como él ha hablado[c].
  to: y para ponerte en alto sobre todas las naciones que él ha hecho, para alabanza y para renombre y para gloria[a], y para que seas un pueblo santo consagrado a Yahvé tu Dios, como él ha hablado[b].
  rationale: 'Se ajusta «para Yahvé tu Dios» a «consagrado a Yahvé tu Dios» para expresar con más naturalidad y precisión en español la relación de pertenencia/consagración de לַיהוָה. Se eliminó la nota sobre «creó», ya que no aporta una alternativa necesaria según el expediente auditado y podía intensificar indebidamente עָשָׂה. Se conservan las decisiones principales del borrador: «Yahvé», «renombre», «gloria» y «como él ha hablado».'
