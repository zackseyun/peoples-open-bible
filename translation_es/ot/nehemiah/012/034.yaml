translation:
  language: es
  text: Judá[a], Benjamín, Semaías y Jeremías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Judá’ sigue aquí el valor de nombre tribal/personal del hebreo; no se entiende como el topónimo ‘Judea’.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judea
  lexicon: HALOT
  rationale: Aquí el término funciona como nombre propio de persona o de tribu dentro de una lista de participantes; en español, ‘Judá’ es la forma estándar y más transparente. ‘Judea’ sugeriría la región geográfica y no encaja tan bien con el contexto inmediato.
- source_word: בִנְיָמִן
  english_pob_choice: Benjamin
  chosen_spanish: Benjamín
  lexicon: HALOT
  rationale: Nombre propio en una lista coordinada; la transliteración bíblica habitual en español mantiene reconocimiento y fidelidad al hebreo.
- source_word: שְׁמַעְיָה
  english_pob_choice: Shemaiah
  chosen_spanish: Semaías
  alternatives_spanish:
  - Shemaías
  - Shemayá
  lexicon: HALOT
  rationale: Nombre propio hebreo. En español conviene la forma bíblica establecida ‘Semaías’, que conserva la identificación del nombre en lectura eclesial sin forzar una transliteración inglesa.
- source_word: יִרְמְיָה
  english_pob_choice: Jeremiah
  chosen_spanish: Jeremías
  alternatives_spanish:
  - Yirmeyah
  lexicon: HALOT
  rationale: Nombre propio bíblico con forma española asentada. ‘Jeremías’ es la forma más reconocible y fiel al uso bíblico en español.
- source_word: וְ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: Gramática del español
  rationale: La conjunción hebrea coordina una simple lista de nombres. En español, ‘y’ reproduce naturalmente la coordinación; ‘e’ no es necesaria porque la palabra siguiente no empieza con sonido /i/.
translation_notes:
  revision_awareness: El texto inglés auditado y el control de revisión coinciden en que no se requieren cambios sustantivos. La decisión principal en español es conservar nombres propios con equivalentes bíblicos establecidos, y mantener ‘Judá’ como nombre propio, no geográfico.
  spanish_consistency_notes:
  - Se mantuvo una puntuación simple de lista, acorde con la coordinación hebrea de nombres propios.
  - Se prefirió ‘Semaías’ y ‘Jeremías’ por ser las formas bíblicas asentadas en español, evitando transliteraciones híbridas.
  - La nota de pie distingue explícitamente la posibilidad semántica de ‘Judea’, pero confirma que el contexto favorece ‘Judá’.
