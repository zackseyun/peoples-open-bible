base_translation:
  language: en
  yaml_path: translation/ot/numbers/013/031.yaml
  text: But the men who had gone up with him said[a], “We are not able to go up against the people[b], because they are stronger than we are.”
  footnotes:
  - marker: a
    text: Hebrew literally, 'to go up to the people'; in context this means 'to go up against the people' in military confrontation.
    reason: lexical_alternative
  - marker: b
    text: Hebrew has singular, 'the people ... it/he is stronger than we'; English renders the collective sense as plural, 'they are stronger than we are.'
    reason: lexical_alternative
