revisions:
- from: Guardad mis sábados sagrados[a], y que sean una señal entre mí y vosotros, para que sepáis que yo soy Yahvé, vuestro Dios.
  to: Santifiquen mis sábados, y que sean una señal entre mí y ustedes, para que sepan que yo soy Yahvé, su Dios.[a]
  rationale: Se corrige la distribución semántica para que קַדֵּשׁוּ se exprese verbalmente ('Santifiquen') en vez de como adjetivo añadido al sustantivo. También se adapta la segunda persona plural al español neutral latinoamericano ('ustedes', 'sepan', 'su Dios'), manteniendo claridad, dignidad y fidelidad al hebreo. Se conserva 'Yahvé' conforme a la política terminológica del proyecto.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:37:20Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien el sentido básico del hebreo: santificar los sábados de Yahvé, que sean señal del pacto entre Dios y el pueblo, con el propósito de que reconozcan que él es Yahvé su Dios. Sin embargo, introduce una expansión no ideal en ''mis sábados sagrados'', donde ''sagrados'' ya incorpora el sentido verbal de קַדֵּשׁוּ y vuelve la frase menos fiel a la distribución del significado en el original.'
  spanish_quality_summary: 'El español es claro y digno, pero ''Guardad mis sábados sagrados'' suena algo forzado porque adjetiva ''sábados'' en vez de expresar verbalmente la santificación. Además, el uso de ''vosotros/sepáis/vuestro'' no encaja con el estilo objetivo de español neutro latinoamericano solicitado. Conviene pasar a un registro con ''ustedes'' y una formulación más natural: ''Santifiquen mis sábados'' o ''Guarden mis sábados como santos''.'
  glossary_alignment: Se alinea correctamente con la política del proyecto en 'Yahvé' para יְהוָה. 'Señal' para אוֹת y 'Dios' para אֱלֹהֵיכֶם son adecuados. La principal corrección terminológica es evitar desplazar el valor de קַדֵּשׁוּ al adjetivo 'sagrados' y mantenerlo como verbo en español.
  issues:
  - severity: medium
    issue: '''mis sábados sagrados'' añade una cualidad en el sustantivo que el hebreo expresa con el verbo קַדֵּשׁוּ'
    rationale: El original dice literalmente 'mis sábados santificad/mantened santos'. La redacción actual mezcla el objeto y la acción, reduciendo precisión léxica y naturalidad.
  - severity: medium
    issue: Registro pronominal peninsular ('vosotros', 'sepáis', 'vuestro')
    rationale: El encargo pide español neutral latinoamericano / ampliamente legible en iglesias. 'Ustedes' encaja mejor con esa meta sin perder dignidad bíblica.
  - severity: low
    issue: La nota al pie marcada como 'alternative_reading' no refleja realmente una alternativa textual significativa
    rationale: La nota explica la forma española elegida para YHWH más que una variante de traducción necesaria en este versículo. No es un error grave, pero tampoco aporta mucho; puede conservarse solo si el flujo editorial exige paralelismo con el inglés.
  revised_spanish_text: Santifiquen mis sábados, y que sean una señal entre mí y ustedes, para que sepan que yo soy Yahvé, su Dios.[a]
  revised_footnotes:
  - marker: a
    text: 'Hebreo: "YHWH"; el texto principal usa la forma española estándar del proyecto, "Yahvé".'
    reason: alternative_reading
  revision_rationale: Se corrige la distribución semántica para que קַדֵּשׁוּ se exprese verbalmente ('Santifiquen') en vez de como adjetivo añadido al sustantivo. También se adapta la segunda persona plural al español neutral latinoamericano ('ustedes', 'sepan', 'su Dios'), manteniendo claridad, dignidad y fidelidad al hebreo. Se conserva 'Yahvé' conforme a la política terminológica del proyecto.
