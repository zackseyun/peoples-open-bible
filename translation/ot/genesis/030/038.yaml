id: GEN.30.38
reference: Genesis 30:38
source:
  edition: WLC
  text: וַ/יַּצֵּ֗ג אֶת הַ/מַּקְלוֹת֙ אֲשֶׁ֣ר פִּצֵּ֔ל בָּ/רֳהָטִ֖ים בְּ/שִֽׁקֲת֣וֹת הַ/מָּ֑יִם אֲשֶׁר֩ תָּבֹ֨אןָ הַ/צֹּ֤אן לִ/שְׁתּוֹת֙ לְ/נֹ֣כַח הַ/צֹּ֔אן וַ/יֵּחַ֖מְנָה בְּ/בֹאָ֥/ן לִ/שְׁתּֽוֹת־׃
translation:
  text: He set the rods that he had peeled in the troughs[a], in the watering channels where the flock came to drink, in front of the flock[c][b]; and they mated when they came to drink.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they were in heat when they came to drink.' The Hebrew verb can refer more literally to the animals becoming heated/in heat, with mating implied by the context.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew uses two related location terms ('troughs' and 'water channels/drinking places'), likely to describe the watering area in fuller detail rather than two entirely separate places.
    reason: lexical_alternative
  - marker: c
    text: Or 'in front of the flock'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיַּצֵּג
  chosen: He set
  alternatives:
  - He placed
  - He stationed
  lexicon: HALOT
  rationale: The verb means to set/place something in position. 'Set' is concise and natural in English while preserving the concrete action.
- source_word: הַמַּקְלוֹת
  chosen: the rods
  alternatives:
  - the staffs
  - the sticks
  lexicon: HALOT
  rationale: Refers to the peeled branches/sticks Jacob prepared in the preceding context. 'Rods' fits the narrative and traditional livestock-setting context without sounding overly formal.
- source_word: אֲשֶׁר פִּצֵּל
  chosen: that he had peeled
  alternatives:
  - that he had striped
  - that he had split/peeled white streaks into
  lexicon: HALOT
  rationale: The verb in context refers to peeling bark to expose lighter wood. 'Had peeled' is the clearest base rendering; the striped result is implied from the prior verse.
- source_word: בָּרֳהָטִים
  chosen: in the troughs
  alternatives:
  - in the gutters
  - in the watering troughs
  lexicon: HALOT
  rationale: The term denotes channels or trough-like structures associated with watering animals. 'Troughs' is idiomatic and suits the pastoral setting.
- source_word: בְּשִׁקֲתוֹת הַמָּיִם
  chosen: in the water channels
  alternatives:
  - at the watering places
  - in the drinking troughs of water
  lexicon: HALOT
  rationale: This phrase overlaps semantically with the previous term and likely apposes or further specifies the location. 'Water channels' preserves the concrete imagery and avoids flattening the double description.
- source_word: אֲשֶׁר תָּבֹאןָ הַצֹּאן לִשְׁתּוֹת
  chosen: where the flock came to drink
  alternatives:
  - to which the flock came to drink
  - where the sheep/goats came to drink
  lexicon: HALOT
  rationale: צֹאן is a collective for small livestock, often sheep and goats together. 'Flock' is the best collective English equivalent.
- source_word: לְנֹכַח הַצֹּאן
  chosen: in front of the flock
  alternatives:
  - before the flock
  - opposite the flock
  lexicon: HALOT
  rationale: The preposition indicates placement directly before or opposite the animals. 'In front of' is natural modern English.
- source_word: וַיֵּחַמְנָה
  chosen: they mated
  alternatives:
  - they were in heat
  - they conceived
  lexicon: HALOT
  rationale: The verb refers to becoming hot/in heat, and in this breeding context it denotes mating behavior. 'They mated' communicates the narrative action more directly in English than the more literal but less clear 'were in heat.'
- source_word: בְּבֹאָן לִשְׁתּוֹת
  chosen: when they came to drink
  alternatives:
  - as they came to drink
  - upon their coming to drink
  lexicon: HALOT
  rationale: The infinitive construct with prefixed preposition expresses temporal circumstance. 'When they came to drink' is clear and faithful.
