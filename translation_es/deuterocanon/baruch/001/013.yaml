translation:
  language: es
  text: Y oren por nosotros a Yahvé nuestro Dios, porque hemos pecado contra Yahvé nuestro Dios, y la ira de Yahvé y su enojo no se han apartado de nosotros hasta este día.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: προσεύξασθε
  english_pob_choice: pray
  chosen_spanish: oren
  alternatives_spanish:
  - recen
  - hagan oración
  lexicon: BDAG
  rationale: El imperativo plural aoristo de petición intercesora se expresa de forma natural en español con «oren», que conserva el valor exhortativo directo sin sobrecarga explicativa.
- source_word: περὶ ἡμῶν
  english_pob_choice: for us
  chosen_spanish: por nosotros
  alternatives_spanish:
  - en favor de nosotros
  - acerca de nosotros
  lexicon: BDAG
  rationale: En contexto de oración, περί + genitivo pide una intercesión «por nosotros». «Por nosotros» es la forma española más idiomática y mantiene el sentido de mediación.
- source_word: Κύριον τὸν θεὸν ἡμῶν
  english_pob_choice: the Lord our God
  chosen_spanish: el Señor, nuestro Dios
  alternatives_spanish:
  - el Señor nuestro Dios
  - Yahvé, nuestro Dios
  lexicon: BDAG
  rationale: Se conserva «Señor» como equivalente contextual de κύριος en esta fórmula de dirección a Dios, con aposición clara en español mediante coma. No se usa «Yahvé» aquí porque el texto griego cita κύριος como título reverente en la fórmula establecida del pasaje.
- source_word: ἡμάρτομεν
  english_pob_choice: we have sinned
  chosen_spanish: hemos pecado
  alternatives_spanish:
  - pecamos
  lexicon: BDAG
  rationale: El perfecto español comunica bien una acción pasada con vigencia presente en este contexto penitencial. «Pecado» refleja el verbo sin añadir matiz no atestiguado.
- source_word: τῷ κυρίῳ θεῷ ἡμῶν
  english_pob_choice: against the Lord our God
  chosen_spanish: contra el Señor, nuestro Dios
  alternatives_spanish:
  - al Señor, nuestro Dios
  - frente al Señor, nuestro Dios
  lexicon: BDAG
  rationale: Aunque el griego usa dativo tras ἁμαρτάνω, el español requiere la construcción normal «pecar contra». Se mantiene la relación ofendida sin introducir nueva información.
- source_word: ὁ θυμὸς Κυρίου
  english_pob_choice: the anger of the Lord
  chosen_spanish: la ira del Señor
  alternatives_spanish:
  - el enojo del Señor
  - la furia del Señor
  lexicon: BDAG
  rationale: θυμός se rinde aquí como «ira», que conserva el nivel fuerte del término y funciona bien en paralelo con ὀργή. Se evita fusionar ambos términos en una sola palabra sin necesidad.
- source_word: ἡ ὀργὴ αὐτοῦ
  english_pob_choice: his wrath
  chosen_spanish: su enojo
  alternatives_spanish:
  - su ira
  - su indignación
  lexicon: BDAG
  rationale: Para preservar la pareja léxica del griego sin repetir exactamente «ira», se escoge «enojo» como equivalente cercano y comprensible en español. Así se mantiene la intensificación retórica de dos sustantivos distintos.
- source_word: ἀφʼ ἡμῶν
  english_pob_choice: from us
  chosen_spanish: de nosotros
  alternatives_spanish:
  - de en medio de nosotros
  - apartándose de nosotros
  lexicon: BDAG
  rationale: Con «se han apartado de nosotros» el complemento español queda natural y fiel al valor direccional de la preposición.
- source_word: ἕως τῆς ἡμέρας ταύτης
  english_pob_choice: to this day
  chosen_spanish: hasta este día
  alternatives_spanish:
  - hasta hoy
  - hasta el día de hoy
  lexicon: BDAG
  rationale: «Hasta este día» preserva la deixis temporal del griego y su fuerza de vigencia continua.
theological_decisions:
- issue: Cómo distinguir el par θυμός / ὀργή en español
  english_pob_reading: Translate distinctly as 'anger' and 'wrath'
  chosen_spanish_reading: Traducirlos de manera distinta como «ira» y «enojo»
  alternative_spanish_readings:
  - traducir ambos como «ira»
  - traducir ambos como «enojo»
  - usar «furor» y «ira»
  rationale: El griego usa dos términos cercanos en paralelismo enfático. En español conviene distinguirlos para no borrar la repetición retórica ni imponer una diferencia doctrinal artificial que el pasaje no explicita.
  doctrine_reference: DOCTRINE.md § Translation philosophy 5
- issue: Valor aspectual de los aoristos en un contexto penitencial
  english_pob_reading: Use present perfects ('we have sinned,' 'has not turned away')
  chosen_spanish_reading: Usar perfectos compuestos («hemos pecado», «no se han apartado»)
  alternative_spanish_readings:
  - usar pretéritos simples («pecamos», «no se apartaron»)
  - usar presentes de estado
  rationale: El español compuesto comunica mejor que la culpa y sus efectos siguen vigentes «hasta este día». Además, el plural del sujeto compuesto en la segunda cláusula exige concordancia natural en español.
  doctrine_reference: DOCTRINE.md § Translation philosophy 6
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado para concordancia verbal con sujeto compuesto en la segunda cláusula. La versión española refleja esa concordancia mediante «no se han apartado», manteniendo además el paralelismo de dos términos de ira divina en palabras distintas.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος en la fórmula de oración, coherente con el contexto inmediato y con el estándar del proyecto para esta clase de pasaje.
  - Se usa «Dios» solo dentro de la fórmula fija «nuestro Dios», sin sustituir el nombre divino por una máscara tipográfica.
  - Se conserva el tono penitencial y la relación de ofensa con la construcción española natural «pecar contra» sin ampliar el sentido del griego.
