base_translation:
  language: en
  yaml_path: translation/ot/numbers/010/035.yaml
  text: And whenever the ark set out[a], Moses said, “Rise up, O Yahweh, and let your enemies be scattered[b], and let those who hate you flee before you.”
  footnotes:
  - marker: a
    text: Or 'And it happened when the ark set out'; the Hebrew idiom can be rendered more formally, but here likely has the sense 'whenever the ark set out.'
    reason: lexical_alternative
  - marker: b
    text: '''Rise up'' is an appeal for the LORD to act in power, not a suggestion that God was literally inactive.'
    reason: cultural_note
