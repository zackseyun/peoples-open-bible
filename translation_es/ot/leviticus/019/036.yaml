  text: מֹ֧אזְנֵי צֶ֣דֶק אַבְנֵי צֶ֗דֶק אֵ֥יפַת צֶ֛דֶק וְ/הִ֥ין צֶ֖דֶק יִהְיֶ֣ה לָ/כֶ֑ם אֲנִי֙ יְהוָ֣ה אֱלֹֽהֵי/כֶ֔ם אֲשֶׁר הוֹצֵ֥אתִי אֶתְ/כֶ֖ם מֵ/אֶ֥רֶץ מִצְרָֽיִם־־׃
base_translation:
  language: en
  yaml_path: translation/ot/leviticus/019/036.yaml
  text: You shall have just scales[a], just weights, a just ephah, and a just hin. I am Yahweh your God[c][b], who brought you out of the land of Egypt.
  footnotes:
  - marker: a
    text: Or 'just scales, just weights'; the repeated Hebrew word is צֶדֶק, often 'righteousness' or 'justice,' here applied to commercial measures.
    reason: lexical_alternative
  - marker: b
    text: An ephah was an ancient dry measure.
    reason: cultural_note
  - marker: c
    text: A hin was an ancient liquid measure.
    reason: cultural_note
