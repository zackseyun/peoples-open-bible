revisions:
- from: Si un hombre entrega a su vecino dinero[a] o bienes[b] para guardarlos, y le son robados de la casa del hombre, si se encuentra al ladrón, pagará el doble[c].
  to: Si un hombre entrega a su vecino dinero[a] o bienes[b] para guardarlos, y estos son robados de la casa del hombre, si el ladrón es hallado, pagará el doble[c].
  rationale: Se ajusta la redacción para reflejar mejor el pasivo hebreo y mejorar la naturalidad jurídica en español. «Y estos son robados» evita el dativo añadido de «le son robados» y mantiene referencia a los bienes entregados. «Si el ladrón es hallado» preserva mejor el valor pasivo de נִמְצָא. La nota c se afina para expresar con más precisión la idea de restitución doble.
