translation:
  language: es
  text: Porque eres precioso[a] a mis ojos, eres estimado, y yo te amo; doy hombres a cambio de ti[b], y pueblos en lugar de tu vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «Porque eras precioso a mis ojos, eras estimado, y te he amado». Los verbos hebreos pueden entenderse con fuerza pasada o presente según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O, «daré hombres a cambio de ti, y pueblos en lugar de tu vida». El verbo hebreo puede leerse con fuerza futura en este contexto profético.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵאֲשֶׁר
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Ya que
  - Puesto que
  lexicon: HALOT
  rationale: La construcción causal introduce la razón de la acción salvadora de Yahvé. «Porque» es la equivalencia natural en español y conserva la relación lógica del hebreo.
- source_word: יָקַרְתָּ
  english_pob_choice: you are precious
  chosen_spanish: eres precioso
  alternatives_spanish:
  - eras precioso
  - eres valioso
  lexicon: HALOT
  rationale: El perfecto hebreo puede expresar una condición vigente en contexto. «Eres precioso» conserva el valor relacional y la fuerza de estima que el texto atribuye al destinatario.
- source_word: בְעֵינַי
  english_pob_choice: in my eyes
  chosen_spanish: a mis ojos
  alternatives_spanish:
  - en mis ojos
  - a mi vista
  lexicon: HALOT
  rationale: La idiomática hebrea de evaluación se vierte de manera natural como «a mis ojos», preservando la imagen de valoración personal sin sonar forzado en español.
- source_word: נִכְבַּדְתָּ
  english_pob_choice: honored
  chosen_spanish: eres honrado
  alternatives_spanish:
  - has sido honrado
  - eres glorioso
  lexicon: HALOT
  rationale: El nifal de כבד aquí expresa ser tenido en honor o estimado. En español, «eres honrado» mantiene el paralelismo con «precioso» y comunica bien la dignidad conferida.
- source_word: וַאֲנִי אֲהַבְתִּיךָ
  english_pob_choice: and I love you
  chosen_spanish: y yo te amo
  alternatives_spanish:
  - y te he amado
  - y te amé
  lexicon: HALOT
  rationale: El amor de Yahvé es covenantal y actual en el contexto. «Yo te amo» expresa la vigencia de ese amor con naturalidad en español, sin reducirlo a un acto pasado.
- source_word: וְאֶתֵּן
  english_pob_choice: I give
  chosen_spanish: doy
  alternatives_spanish:
  - daré
  - he dado
  lexicon: HALOT
  rationale: El yiqtol puede leerse con fuerza profética presente-futura. «Doy» reproduce el énfasis declarativo y la vivacidad del enunciado, y deja abierta la tensión temporal que el contexto admite.
- source_word: אָדָם
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - personas
  - humanidad
  lexicon: HALOT
  rationale: Aquí אָדָם funciona como colectivo humano contrastado con «pueblos». «Hombres» preserva la forma colectiva y la preferencia del proyecto por un renderizado gender-accurate, sin perder la referencia a seres humanos.
- source_word: תַּחְתֶּיךָ
  english_pob_choice: in exchange for you
  chosen_spanish: en trueque por ti
  alternatives_spanish:
  - en intercambio por ti
  - en lugar de ti
  lexicon: HALOT
  rationale: תחת expresa sustitución/intercambio. «En trueque por ti» comunica de forma clara la lógica sustitutiva y mantiene el matiz transaccional del hebreo.
- source_word: וּלְאֻמִּים
  english_pob_choice: and peoples
  chosen_spanish: y pueblos
  alternatives_spanish:
  - y naciones
  - y grupos de pueblos
  lexicon: HALOT
  rationale: «Pueblos» refleja el plural étnico y conserva la paridad con אָדָם en la línea anterior. Evita aplanar el paralelismo con un término demasiado abstracto.
- source_word: תַּחַת נַפְשֶׁךָ
  english_pob_choice: in place of your life
  chosen_spanish: en lugar de tu vida
  alternatives_spanish:
  - en sustitución de tu vida
  - por tu vida
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí se refiere a la vida/persona, no a «alma» en sentido posterior. «En lugar de tu vida» transmite con claridad la sustitución y evita cargar el texto con una antropología ajena al hebreo.
theological_decisions:
- issue: Ongoing divine love expressed with a Hebrew perfect plus context
  english_pob_reading: and I love you
  chosen_spanish_reading: y yo te amo
  alternative_spanish_readings:
  - y te he amado
  - y te amé
  rationale: La elección mantiene la vigencia del amor covenantal de Yahvé en el presente discursivo, sin negar que el hebreo permita un valor pasado. Se preserva así la tensión temporal documentada por la POB inglesa.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; covenantal divine love'
- issue: Rendering of אָדָם as collective humanity
  english_pob_reading: men
  chosen_spanish_reading: hombres
  alternative_spanish_readings:
  - personas
  - humanidad
  rationale: Se conserva la fuerza colectiva y la correspondencia formal del hebreo. «Hombres» sigue la línea de la POB inglesa al evitar neutralizar indebidamente el término y mantiene el contraste con «pueblos».
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; Contested terms table for אָדָם'
- issue: Rendering of נֶפֶשׁ in a substitution formula
  english_pob_reading: life
  chosen_spanish_reading: vida
  alternative_spanish_readings:
  - alma
  - ser
  rationale: «Vida» expresa el sentido concreto del hebreo en este contexto de intercambio/sustitución y evita importar una lectura dualista o technicalizada de «alma».
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; Original-language primacy over translation tradition'
translation_notes:
  revision_awareness: No se aplicaron revisiones posteriores; el control más reciente indicó que no había cambios necesarios y el consenso fue de alta concordancia con observaciones menores.
  spanish_consistency_notes:
  - Se mantiene Yahvé como nombre divino según el estándar del proyecto.
  - Se conserva la distinción entre «vida» y «alma» para נֶפֶשׁ.
  - «Hombres» y «pueblos» sostienen el paralelismo y la fuerza colectiva del hebreo.
  - La puntuación refleja una sola oración causal con dos miembros coordenados, en estilo bíblico claro y publicable.
