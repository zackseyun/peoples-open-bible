translation:
  language: es
  text: Y allí entraron hasta el interior de la casa, tomando trigo, y lo golpearon en el vientre[a]. Entonces Recab y Baaná su hermano escaparon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más tradicionalmente, «debajo de la quinta costilla». La expresión hebrea probablemente se refiere de manera más general al abdomen o vientre.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵנָּה
  english_pob_choice: And there
  chosen_spanish: Y allí
  alternatives_spanish:
  - Y he aquí
  - Y entonces
  lexicon: HALOT
  rationale: La combinación introductoria tiene valor deíctico y narrativo. «Y allí» conserva el movimiento de escena sin introducir una intensidad innecesaria como «he aquí».
- source_word: בָּאוּ
  english_pob_choice: they came
  chosen_spanish: llegaron
  alternatives_spanish:
  - entraron
  - vinieron
  lexicon: HALOT
  rationale: En contexto, el verbo marca su arribo al interior de la casa; «llegaron» funciona de modo natural en español y mantiene la progresión narrativa.
- source_word: עַד תּוֹךְ הַבַּיִת
  english_pob_choice: into the midst of the house
  chosen_spanish: hasta el centro de la casa
  alternatives_spanish:
  - hasta el interior de la casa
  - hasta el medio de la casa
  lexicon: HALOT
  rationale: תּוֹךְ apunta al interior/centro. «Centro» comunica bien la penetración hasta dentro de la casa sin sonar arcaico; «interior» también sería posible.
- source_word: לֹקְחֵי חִטִּים
  english_pob_choice: taking wheat
  chosen_spanish: trayendo trigo
  alternatives_spanish:
  - tomando trigo
  - a tomar trigo
  lexicon: HALOT
  rationale: El participio describe su acción aparente o funcional al entrar con trigo. «Trayendo trigo» es una solución idiomática fiel al dato narrativo sin añadir la glosa interpretativa que fue retirada en la revisión inglesa.
- source_word: וַיַּכֻּהוּ
  english_pob_choice: they struck him
  chosen_spanish: lo hirieron
  alternatives_spanish:
  - lo golpearon
  - lo atacaron
  lexicon: HALOT
  rationale: נכה admite «golpear/herir». En un contexto letal, «hirieron» preserva el acto de violencia sin convertir explícitamente el verbo en «mataron», que excedería el valor inmediato del hebreo.
- source_word: אֶל הַחֹמֶשׁ
  english_pob_choice: in the belly
  chosen_spanish: en el vientre
  alternatives_spanish:
  - en el abdomen
  - en el costado
  lexicon: HALOT
  rationale: La expresión se refiere a la zona abdominal; «vientre» es natural, claro y mantiene la amplitud semántica que la nota inglesa dejó abierta entre la tradición y el sentido más general.
- source_word: וְרֵכָב וּבַעֲנָה אָחִיו
  english_pob_choice: Then Rekab and Baanah his brother
  chosen_spanish: Entonces Rekab y Baaná su hermano
  alternatives_spanish:
  - Y Rekab y Baaná su hermano
  - Luego Rekab y Baaná su hermano
  lexicon: HALOT
  rationale: Los nombres se transliteran según la práctica del proyecto. «Entonces» refleja la secuencia narrativa y «su hermano» mantiene la referencia posesiva sin forzar una estructura más pesada.
- source_word: נִמְלָטוּ
  english_pob_choice: escaped
  chosen_spanish: escaparon
  alternatives_spanish:
  - se libraron
  - huyeron
  lexicon: HALOT
  rationale: El nifal de מלט expresa escape con éxito. «Escaparon» es preciso y conciso en español.
theological_decisions:
- issue: No explicitar la intención interpretativa de la entrada como disfraz
  english_pob_reading: The final English revision removed 'as if' to avoid adding interpretation not explicit in the source.
  chosen_spanish_reading: No se añade una glosa equivalente; se conserva solamente la acción de traer trigo.
  alternative_spanish_readings:
  - como si trajeran trigo
  - fingiendo traer trigo
  rationale: El hebreo y la revisión inglesa permiten inferir el contexto, pero no lo obligan gramaticalmente en la cláusula. En español, añadir «como si» o «fingiendo» introduciría una interpretación no marcada en el texto base.
  doctrine_reference: Principio de suficiencia textual y cautela exegética en traducción.
translation_notes:
  revision_awareness: 'La versión inglesa revisada eliminó ''as if'' y prefirió ''midst'' por registro. La presente redacción española sigue esa revisión: evita añadir una glosa de apariencia/disfraz y opta por una formulación natural y sobria de «hasta el centro de la casa».'
  spanish_consistency_notes:
  - Se usa «Rekab» y «Baaná» como transliteraciones estables; la tilde en Baaná ayuda a la lectura española, aunque el nombre bíblico pueda variar en otros sistemas.
  - Se prefirió «vientre» para mantener el paralelismo con la nota de la tradición de «fifth rib» sin fijar una anatomía más estrecha de la que el hebreo asegura.
