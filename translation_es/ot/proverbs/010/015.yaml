translation:
  language: es
  text: Las riquezas del rico son su ciudad fortificada[a]; la ruina de los pobres es su pobreza[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «su ciudad fuerte»; el hebreo dice literalmente «ciudad de su fuerza».'
    reason: lexical_alternative
  - marker: b
    text: «Ruina» también puede traducirse «destrucción» o, menos probablemente aquí, «terror» o «consternación».
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹן
  english_pob_choice: wealth
  chosen_spanish: riquezas
  alternatives_spanish:
  - riqueza
  - bienes
  lexicon: HALOT
  rationale: El sustantivo denota posesiones/materialidad de valor. «Riquezas» suena natural en español y conserva el contraste económico del proverbio.
- source_word: עָשִׁיר
  english_pob_choice: rich man’s
  chosen_spanish: del rico
  alternatives_spanish:
  - del hombre rico
  - del rico (persona rica)
  lexicon: HALOT
  rationale: El hebreo funciona como sustantivo adjetival. «Del rico» mantiene la referencia singular masculina y la relación posesiva sin volverlo innecesariamente largo.
- source_word: קִרְיַת
  english_pob_choice: city
  chosen_spanish: ciudad
  alternatives_spanish:
  - plaza
  - villa
  lexicon: HALOT
  rationale: La imagen básica es la de una ciudad; «ciudad» preserva el campo metafórico de seguridad urbana.
- source_word: עֻזּוֹ
  english_pob_choice: his fortified
  chosen_spanish: fortificada
  alternatives_spanish:
  - fuerte
  - de fortaleza
  - de su fuerza
  lexicon: HALOT
  rationale: Aunque literalmente apunta a «fuerza» o «fuerte», en construcción con «ciudad» el sentido es de defensa/seguridad. «Fortificada» transmite el valor idiomático en español sin borrar el trasfondo de fuerza.
- source_word: מְחִתַּת
  english_pob_choice: ruin
  chosen_spanish: ruina
  alternatives_spanish:
  - destrucción
  - terror
  - consternación
  lexicon: HALOT
  rationale: En paralelo con la primera línea y unido a la pobreza de los pobres, «ruina» comunica mejor el efecto devastador que la pobreza produce. Se mantiene la posibilidad semántica de desamparo/derribo sin forzar «terror» como lectura principal.
- source_word: דַּלִּים
  english_pob_choice: the poor
  chosen_spanish: los pobres
  alternatives_spanish:
  - los necesitados
  - los débiles
  lexicon: HALOT
  rationale: Designa a personas pobres o socialmente bajas. «Los pobres» es la forma más directa e idiomática en español.
- source_word: רֵישָׁם
  english_pob_choice: their poverty
  chosen_spanish: su pobreza
  alternatives_spanish:
  - su penuria
  - su indigencia
  lexicon: HALOT
  rationale: El sustantivo expresa pobreza o carencia. «Su pobreza» conserva la relación causal/explicativa del paralelismo y sigue siendo claro en español.
translation_notes:
  revision_awareness: El texto inglés POB revisado se mantuvo sin cambios sustantivos; la versión española sigue la misma lectura de equivalencia óptima y conserva la tensión léxica de עֻזּוֹ y מְחִתַּת mediante notas de alternativa.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque no aparece en este versículo.
  - Se prefirió «riquezas» para הוֹן y «pobreza» para רֵישָׁם para mantener el contraste económico directo.
  - La expresión «ciudad fortificada» busca una equivalencia natural en español sin perder el trasfondo literal «ciudad de su fuerza».
