translation:
  language: es
  text: Así fueron dispersadas por falta de pastor, y se volvieron alimento para toda bestia[a] del campo, y fueron dispersadas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'todo animal del campo'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתְּפוּצֶינָה
  english_pob_choice: they were scattered
  chosen_spanish: fueron dispersadas
  alternatives_spanish:
  - fueron esparcidas
  - fueron dispersadas
  lexicon: HALOT / פוץ
  rationale: El hebreo expresa una pasiva/resultativa del verbo פוץ. En español, 'fueron dispersadas' comunica bien la acción sufrida por el rebaño y conserva el sentido de dispersión sin endurecer el texto. En la repetición final se mantiene la misma decisión para respetar el énfasis del hebreo.
- source_word: מִבְּלִי
  english_pob_choice: for lack of
  chosen_spanish: por falta de
  alternatives_spanish:
  - sin
  - porque no había
  lexicon: HALOT / מבלי
  rationale: La construcción indica ausencia o privación. 'Por falta de' conserva la relación causal de manera natural en español y refleja mejor la idea de carencia que un simple 'sin'.
- source_word: רֹעֶה
  english_pob_choice: a shepherd
  chosen_spanish: pastor
  alternatives_spanish:
  - un pastor
  - uno que pastoreaba
  lexicon: HALOT / רעה
  rationale: El término hebreo designa al pastor literal y, por metáfora, al dirigente. 'Pastor' es el equivalente natural en español para mantener la imagen profética sin explicarla en exceso. El artículo indefinido no es necesario en español en esta construcción.
- source_word: וַתִּהְיֶינָה
  english_pob_choice: they became
  chosen_spanish: llegaron a ser
  alternatives_spanish:
  - se volvieron
  - fueron
  lexicon: HALOT / היה
  rationale: Aquí היה expresa un estado resultante. 'Llegaron a ser' comunica mejor el tránsito hacia la condición descrita por el predicado siguiente y evita la ambigüedad de un simple 'fueron'.
- source_word: לְאָכְלָה
  english_pob_choice: food
  chosen_spanish: alimento
  alternatives_spanish:
  - comida
  - presa
  lexicon: HALOT / אָכְלָה
  rationale: El sustantivo denota aquello que se come o devora. 'Alimento' es un equivalente formal y claro en español; 'presa' interpretaría demasiado la relación con los animales.
- source_word: לְכָל חַיַּת הַשָּׂדֶה
  english_pob_choice: for every beast of the field
  chosen_spanish: para todo animal del campo
  alternatives_spanish:
  - para toda bestia del campo
  - para cada bestia del campo
  lexicon: HALOT / חַיַּת הַשָּׂדֶה
  rationale: La frase hebrea nombra a los animales salvajes del campo. En español, 'animal del campo' mantiene la referencia y 'todo' reproduce la fuerza distributiva de כָל. Se evita 'bestia' como primera opción porque en español moderno puede sonar más tradicional o más cargado que el hebreo contextual exige, aunque sigue siendo una alternativa válida.
- source_word: וַתְּפוּצֶינָה
  english_pob_choice: and they were scattered
  chosen_spanish: y fueron dispersadas
  alternatives_spanish:
  - y fueron esparcidas
  - y se dispersaron
  lexicon: HALOT / פוץ
  rationale: Se conserva la repetición final del verbo, que en hebreo funciona como cierre enfático. La elección mantiene la misma raíz semántica y evita suavizar la estructura del verso.
theological_decisions:
- issue: Imagen pastoral de los dirigentes de Israel
  english_pob_reading: Retain 'shepherd' as the governing metaphor
  chosen_spanish_reading: Mantener 'pastor' como metáfora rectora
  alternative_spanish_readings:
  - líder
  - cuidador
  rationale: El versículo forma parte de la metáfora sostenida de Ezequiel 34, donde los gobernantes de Israel son pastores y el pueblo son ovejas. Traducir la imagen por un término explicativo borraría parte de la textura profética y teológica del pasaje.
  doctrine_reference: Principio de primacía del texto original; preservar la metáfora bíblica sin resolverla interpretativamente.
translation_notes:
  revision_awareness: El contexto inglés revisó 'wild animal of the field' hacia 'beast of the field' por mayor formalidad. En español se optó por 'animal del campo' en el texto principal por claridad y naturalidad, dejando 'bestia del campo' como alternativa en nota para reflejar la posibilidad más tradicional y el trasfondo léxico del hebreo.
  spanish_consistency_notes:
  - Se usa 'pastor' para רֹעֶה siguiendo la metáfora bíblica estándar en español y para conservar la coherencia con Ezequiel 34.
  - Se mantuvo la repetición final de 'fueron dispersadas' para reproducir el énfasis estructural del hebreo.
  - '''Alimento'' se eligió por su registro más formal que ''comida'', sin introducir la idea de ''presa'' que excede el hebreo.'
  - La expresión 'animal del campo' evita una sobreactualización estilística y sigue siendo compatible con la nota alternativa 'bestia del campo'.
