    text: Or 'with lye' or 'with alkali'; 'natron' refers to a mineral cleansing agent.
    reason: lexical_alternative
  - marker: b
    text: Or 'use much alkali'; the Hebrew refers to an ancient washing substance, not necessarily modern soap.
    reason: lexical_alternative
  - marker: c
    text: Or 'your iniquity is marked before me.'
    reason: lexical_alternative
