translation:
  language: es
  text: Y Jonatán incendió Azoto[a] y las ciudades de sus alrededores, y tomó el botín de ellas; y quemó el templo de Dagón y sus santuarios[b] con fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Azoto es la forma griega de Asdod.
    reason: lexical_alternative
  - marker: b
    text: 'El griego repite literalmente ''templo'': ''el templo de Dagón y su templo/templo de ella ... quemó con fuego''. Aquí se traduce ''sus santuarios'' para expresar ese segundo ἱερόν de manera clara en español, sin eliminar la repetición del texto fuente.'
    reason: textual_variant
lexical_decisions:
- source_word: Ἰωναθὰν
  english_pob_choice: Jonathan
  chosen_spanish: Jonatán
  alternatives_spanish:
  - Jonathan
  lexicon: transliteración bíblica tradicional
  rationale: Se conserva el nombre propio en forma española usual y plenamente reconocible, sin alterar el referente histórico.
- source_word: Ἄζωτον
  english_pob_choice: Azotus
  chosen_spanish: Azoto
  alternatives_spanish:
  - Azotus
  - Asdod
  lexicon: LSJ
  rationale: El griego usa la forma helenizada Ἄζωτος; en español, 'Azoto' mantiene esa forma sin perder inteligibilidad. 'Asdod' sería la forma hebrea más conocida, pero no refleja directamente el texto fuente.
- source_word: τὰς πόλεις τὰς κύκλῳ αὐτῆς
  english_pob_choice: the cities around it
  chosen_spanish: las ciudades alrededor de ella
  alternatives_spanish:
  - las ciudades circundantes
  - las ciudades que la rodeaban
  lexicon: LSJ
  rationale: κύκλῳ con genitivo expresa ubicación alrededor. En español, 'alrededor de ella' conserva la relación espacial y permite referir el pronombre a Azoto, como en el contexto griego.
- source_word: τὰ σκῦλα
  english_pob_choice: their spoil
  chosen_spanish: su botín
  alternatives_spanish:
  - el botín de ellos
  - su despojo
  lexicon: LSJ
  rationale: σκῦλα denota despojos de guerra. 'Botín' es natural y bíblicamente claro en español. Se usa singular colectivo para reproducir la función del sustantivo griego.
- source_word: τὸ ἱερὸν Δαγὼν
  english_pob_choice: the temple of Dagon
  chosen_spanish: el templo de Dagón
  alternatives_spanish:
  - el santuario de Dagón
  lexicon: LSJ
  rationale: ἱερόν aquí nombra un recinto sagrado o templo; 'templo' es la equivalencia más clara y fluida en español.
- source_word: τὸ ἱερὸν αὐτῆς
  english_pob_choice: its shrines
  chosen_spanish: sus santuarios
  alternatives_spanish:
  - su templo
  - sus templos
  lexicon: LSJ
  rationale: La repetición de ἱερόν en el griego, junto con la revisión inglesa, sugiere una referencia a santuarios o recintos sagrados vinculados a Azoto, no simplemente a un segundo 'templo'. 'Santuarios' preserva la pluralidad que la revisión quiso reflejar y evita una repetición torpe en español.
- source_word: ἐν πυρί
  english_pob_choice: with fire
  chosen_spanish: con fuego
  alternatives_spanish:
  - en fuego
  - mediante fuego
  lexicon: LSJ
  rationale: La expresión instrumental se vierte de modo natural en español con 'con fuego', manteniendo el énfasis del original en la acción incendiaria.
theological_decisions:
- issue: Repetición de ἱερόν y posible valor plural/recensional
  english_pob_reading: its shrines
  chosen_spanish_reading: sus santuarios
  alternative_spanish_readings:
  - su templo
  - sus templos
  rationale: La revisión inglesa dejó atrás 'its temple' para evitar una repetición extraña y reflejar un sentido plural o resumptivo en αὐτῆς. En español, 'sus santuarios' conserva esa resolución sin borrar la tensión textual entre singular griego y plural de sentido.
  doctrine_reference: Crítica textual y traducción de variantes; sin implicación doctrinal directa.
translation_notes:
  revision_awareness: La versión inglesa revisada cambió 'its temple' por 'its shrines' para reflejar el posible valor plural de αὐτῆς y evitar una repetición poco natural. La redacción española sigue esa revisión al usar 'sus santuarios', sin ocultar en la nota la repetición griega subyacente.
  spanish_consistency_notes:
  - Se mantiene 'Dagón' como transliteración del nombre divino/griego.
  - Se usa 'botín' para σκῦλα por claridad y naturalidad en español bíblico-histórico.
  - Se evita 'SEÑOR' o equivalentes de ocultamiento porque el verso no contiene el nombre divino.
  - La puntuación reproduce el paralelismo de la fuente y conserva la secuencia narrativa con dos acciones incendiarias.
