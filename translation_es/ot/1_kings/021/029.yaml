translation:
  language: es
  text: ¿Has visto que Acab se ha humillado delante de mí? Porque se ha humillado delante de mí, no traeré la calamidad[a] en sus días; en los días de su hijo traeré la calamidad sobre su casa[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desgracia»; el hebreo dice «el mal/la calamidad». En este contexto de juicio, la palabra se refiere a una calamidad punitiva, no a mal moral.
    reason: lexical_alternative
  - marker: b
    text: «Casa» puede significar su familia u hogar, o su casa real/dinastía.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲרָאִיתָ
  english_pob_choice: Have you seen
  chosen_spanish: ¿Has visto
  alternatives_spanish:
  - ¿Has notado
  - ¿Has observado
  lexicon: HALOT
  rationale: 'El perfectivo hebreo en una pregunta directa conserva mejor en español un perfecto compuesto: expresa una acción ya constatada con relevancia actual. «¿Has visto» suena natural y sigue de cerca el valor interrogativo de ראה.'
- source_word: נִכְנַע
  english_pob_choice: has humbled himself
  chosen_spanish: se ha humillado
  alternatives_spanish:
  - se ha sometido
  - ha mostrado humildad
  - se ha rebajado
  lexicon: HALOT
  rationale: El nifal de כנע aquí señala humillación voluntaria ante el juicio divino. «Se ha humillado» conserva la idea reflexiva sin añadir explícitamente «arrepentido», que el texto no dice de forma directa.
- source_word: מִלְּפָנַי / מִפָּנַי
  english_pob_choice: before me
  chosen_spanish: delante de mí
  alternatives_spanish:
  - en mi presencia
  - ante mí
  lexicon: HALOT
  rationale: La idiomática hebrea «de delante de / de mi presencia» se expresa naturalmente en español con «delante de mí», que mantiene la relación de postura ante Dios sin alargar innecesariamente la frase.
- source_word: יַעַן כִּי
  english_pob_choice: Because
  chosen_spanish: Por cuanto
  alternatives_spanish:
  - Porque
  - Puesto que
  lexicon: HALOT
  rationale: La combinación causal introduce la razón del aplazamiento del juicio. «Por cuanto» es una solución sobria y bíblica en español, sin quedar demasiado arcaica, y conserva el valor explicativo.
- source_word: לֹא אָבִיא
  english_pob_choice: I will not bring
  chosen_spanish: no traeré
  alternatives_spanish:
  - no haré venir
  - no causaré que venga
  lexicon: HALOT
  rationale: El hiphil de בוא con רָעָה como objeto transmite traer/introducir un desastre. «No traeré» es la forma más natural y fiel en español.
- source_word: הָרָעָה
  english_pob_choice: the disaster
  chosen_spanish: la calamidad
  alternatives_spanish:
  - el desastre
  - la desgracia
  lexicon: HALOT
  rationale: En este contexto judicial, רָעָה no significa mal moral en Dios, sino desgracia punitiva. «Calamidad» preserva ese valor sin cargar una implicación ética impropia.
- source_word: בְּיָמָיו
  english_pob_choice: in his days
  chosen_spanish: en sus días
  alternatives_spanish:
  - durante su vida
  - mientras viva
  lexicon: HALOT
  rationale: Se conserva el hebraísmo temporal de manera inteligible y breve. «En sus días» mantiene el paralelismo con la frase siguiente.
- source_word: בִּימֵי בְנוֹ
  english_pob_choice: in his son's days
  chosen_spanish: en los días de su hijo
  alternatives_spanish:
  - durante la vida de su hijo
  - cuando reine su hijo
  lexicon: HALOT
  rationale: La frase paralela reproduce la estructura hebrea y deja abierta la referencia temporal amplia, sin especificar de más.
- source_word: עַל בֵּיתוֹ
  english_pob_choice: on his house
  chosen_spanish: sobre su casa
  alternatives_spanish:
  - contra su casa
  - sobre su dinastía
  lexicon: HALOT
  rationale: «Casa» conserva el término concreto del hebreo y, en contexto real, puede implicar casa real o dinastía. Se evita expandirlo a «dinastía» en el texto principal para no resolver una amplitud semántica que el original deja abierta.
theological_decisions:
- issue: La respuesta de Acab y su relación con el arrepentimiento
  english_pob_reading: Render נכנע as 'has humbled himself' without explicitly calling it repentance.
  chosen_spanish_reading: Traducir נכנע como «se ha humillado» sin decir explícitamente que se ha arrepentido.
  alternative_spanish_readings:
  - se ha arrepentido
  - se ha sometido
  - ha hecho penitencia
  rationale: El versículo afirma humillación ante Dios y vincula esa actitud con el aplazamiento del juicio, pero no usa vocabulario técnico de arrepentimiento. La traducción conserva esa tensión y no la resuelve teológicamente de más.
  doctrine_reference: Preservar la tensión teológica en lugar de armonizarla prematuramente.
- issue: Sentido de הָרָעָה cuando la anuncia Dios
  english_pob_reading: Translate as 'disaster' rather than 'evil.'
  chosen_spanish_reading: Traducir הָרָעָה como «calamidad» y no como «mal».
  alternative_spanish_readings:
  - el mal
  - el desastre
  - la desgracia
  rationale: En un contexto de juicio, la palabra designa desgracia punitiva. «Calamidad» evita atribuir a Dios un «mal» moral y conserva el alcance judicial del anuncio.
  doctrine_reference: Distinguir entre mal moral y calamidad judicial.
- issue: Valor de 'casa' en un contexto real
  english_pob_reading: On his house can mean on his household or dynasty.
  chosen_spanish_reading: Mantener «su casa» sin explicitar «dinastía» en el texto principal.
  alternative_spanish_readings:
  - su familia
  - su dinastía
  - su casa real
  rationale: El hebreo permite una amplitud entre hogar, casa real y linaje. La versión principal mantiene esa elasticidad; el matiz dinástico queda sugerido, no cerrado.
  doctrine_reference: Respetar la amplitud semántica del texto hebreo.
translation_notes:
  revision_awareness: 'El control de revisión más reciente coincide en que no se requieren cambios: el pasaje se mantiene en alta concordancia con la versión inglesa auditada, sin revisiones aplicadas.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el hebreo presenta el nombre divino; en este versículo no aparece.
  - Se usa «calamidad» para רָעָה de acuerdo con el contexto judicial y la decisión inglesa de no traducirlo como «evil».
  - Se conserva «casa» como término abierto para בית, con nota aclaratoria sobre su posible sentido dinástico.
  - El tono es bíblico pero contemporáneo, evitando tanto calcos rígidos como parafraseo libre.
