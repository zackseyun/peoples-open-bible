review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del griego: señorío sobre la fuerza, juicio moderado, gobierno con restricción, y la cláusula final sobre la capacidad divina disponible según su voluntad. Sin embargo, varias elecciones españolas no reflejan con suficiente precisión las decisiones auditadas: la nota [a] está anclada al pronombre «tú» en vez de a la expresión correspondiente a ἐν ἐπιεικείᾳ; «mansedumbre» desplaza ἐπιείκεια hacia docilidad/humildad más que hacia gentileza o clemencia; «indulgencia» sobretraduce φειδώ hacia permisividad; y la nota [b] no corresponde al lugar del texto al que explica.'
  spanish_quality_summary: 'El español es generalmente legible, pero presenta dos problemas de naturalidad y precisión: el anclaje de notas es incorrecto, y algunas palabras suenan semánticamente desviadas para un registro bíblico claro. «Con gentileza» o «con clemencia» comunica mejor ἐν ἐπιεικείᾳ en este contexto; «con gran moderación» o «con mucha mesura» comunica mejor φειδώ que «indulgencia». La cláusula final se entiende, pero «cuando tú quieres» puede mejorarse a «cuando quieres» para mayor fluidez.'
  glossary_alignment: 'No hay conflicto con términos globales del proyecto. Las principales cuestiones son léxicas internas al versículo: mantener distinción entre ἰσχύς («fuerza») y τὸ δύνασθαι («capacidad»/«poder»), y reflejar ἐπιείκεια y φειδώ con matices de moderación y clemencia, no de docilidad o permisividad.'
  issues:
  - severity: high
    issue: La nota [a] está colocada sobre «tú» en lugar de la frase que traduce ἐν ἐπιεικείᾳ.
    rationale: El contenido de la nota explica una alternativa léxica para «con gentileza/clemencia», no para el pronombre. Esto incumple la disciplina de anclaje de notas.
  - severity: high
    issue: La nota [b] está colocada sobre «nos gobiernas» pero su contenido explica la cláusula final πάρεστιν γὰρ σοι...
    rationale: El marcador debe aparecer en la frase relevante del texto; de lo contrario, el lector asocia la aclaración al verbo equivocado.
  - severity: medium
    issue: «Mansedumbre» no es la mejor opción para ἐν ἐπιεικείᾳ.
    rationale: En español, «mansedumbre» suele evocar humildad o docilidad de carácter. El griego aquí apunta más a gentileza, clemencia o moderación justa en el juicio.
  - severity: medium
    issue: «Indulgencia» debilita y desplaza φειδώ.
    rationale: φειδώ es sparingness, restraint, forbearance. «Indulgencia» puede sugerir permisividad o tolerancia blanda, no la contención deliberada del juez soberano.
  - severity: low
    issue: «Cuando tú quieres» suena más pesado de lo necesario.
    rationale: El énfasis en la voluntad divina ya está claro con «cuando quieres» o «siempre que quieres»; el pronombre explícito no aporta mucho en español natural.
  revised_spanish_text: Pero tú, siendo dueño de la fuerza, juzgas con gentileza[a], y con gran moderación nos gobiernas; porque tuya es la capacidad[b] cuando quieres.
