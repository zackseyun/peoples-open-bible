    rationale: El hebreo dice «golpeó/struck»; aunque en contexto puede implicar lesión mortal, «golpeó» es más preciso y evita añadir un matiz no expreso en el verbo mismo.
  revised_spanish_text: Y si el vengador de la sangre lo persigue, no entregarán al homicida en su mano, porque golpeó a su prójimo sin intención y no le había odiado antes, de ayer o de anteayer[a].
