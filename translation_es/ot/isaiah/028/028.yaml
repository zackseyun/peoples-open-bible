- from: Pan para grano[a] es triturado, pero no para siempre se le sigue trillando; aunque la rueda de su carro y sus caballos[b] pasan retumbando sobre él, no lo tritura hasta hacerlo polvo.
  to: El grano para pan[a] es triturado, pero no se lo trilla para siempre; aunque la rueda de su carro y sus caballos[b] retumban sobre él, no lo tritura fino.
  rationale: Se corrige la inversión semántica de לֶחֶם con «grano para pan», se mejora la naturalidad del español en la cláusula de trillar continuo, y se ajusta la última frase para reflejar con más precisión la repetición de דקק sin sobreinterpretar. Se conservan las alternativas léxicas pertinentes en notas con anclajes correctos.
