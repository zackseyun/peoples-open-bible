translation:
  language: es
  text: Toma para ti[a] un rollo, y escribe en él todas las palabras que te he dicho acerca de Israel y acerca de Judá y acerca de todas las naciones, desde el día en que te hablé, desde los días de Josías hasta este día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «contra Israel y contra Judá y contra todas las naciones». La preposición hebrea puede expresar también oposición en contextos proféticos.'
    reason: alternative_reading
lexical_decisions:
- source_word: קַח לְךָ
  english_pob_choice: Take for yourself
  chosen_spanish: Toma para ti
  alternatives_spanish:
  - Toma
  - Consíguete
  lexicon: HALOT
  rationale: El imperativo con el dativo ético לְךָ expresa implicación personal. En español, 'Toma para ti' conserva esa fuerza sin sonar artificial.
- source_word: מְגִלַּת סֵפֶר
  english_pob_choice: a scroll
  chosen_spanish: un rollo de libro
  alternatives_spanish:
  - un rollo
  - un rollo de escritura
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente una construcción de 'rollo' y 'libro/escritura'. 'Rollo de libro' mantiene la transparencia del hebreo, aunque en español suena menos natural que solo 'rollo'.
- source_word: וְכָתַבְתָּ אֵלֶיהָ
  english_pob_choice: and write on it
  chosen_spanish: y escribe en él
  alternatives_spanish:
  - y escribirás en él
  - y escribe sobre él
  lexicon: HALOT
  rationale: El verbo se entiende como mandato secuencial; en español, el imperativo 'escribe' comunica bien la orden. 'En él' expresa la inscripción sobre el rollo sin cargar una metáfora innecesaria.
- source_word: אֵת כָּל הַדְּבָרִים
  english_pob_choice: all the words
  chosen_spanish: todas las palabras
  alternatives_spanish:
  - todas las cosas
  - todo lo que
  lexicon: HALOT
  rationale: דְּבָרִים en contexto profético apunta a palabras pronunciadas por Yahvé. 'Palabras' preserva mejor el énfasis verbal y revelatorio que 'cosas' o una paráfrasis totalizante.
- source_word: אֲשֶׁר דִּבַּרְתִּי אֵלֶיךָ
  english_pob_choice: that I have spoken to you
  chosen_spanish: que te he hablado
  alternatives_spanish:
  - que te hablé
  - que te he dicho
  lexicon: HALOT
  rationale: '''He hablado'' reproduce el valor de discurso ya dado con relevancia presente; ''hablado'' suena más propio del registro profético que el más genérico ''dicho''.'
- source_word: עַל יִשְׂרָאֵל וְעַל יְהוּדָה וְעַל כָּל הַגּוֹיִם
  english_pob_choice: concerning Israel and concerning Judah and concerning all the nations
  chosen_spanish: acerca de Israel y acerca de Judá y acerca de todas las naciones
  alternatives_spanish:
  - contra Israel y contra Judá y contra todas las naciones
  - sobre Israel y sobre Judá y sobre todas las naciones
  lexicon: HALOT
  rationale: עַל con דִּבֶּר puede ser 'acerca de' o 'contra'. Dado que el versículo resume todas las palabras dichas a Jeremías, 'acerca de' evita imponer una lectura exclusivamente judicial y sigue la decisión auditada del POB inglés.
- source_word: כָּל הַגּוֹיִם
  english_pob_choice: all the nations
  chosen_spanish: todas las naciones
  alternatives_spanish:
  - todos los pueblos
  - todos los gentiles
  lexicon: HALOT
  rationale: '''Naciones'' es el equivalente contextual habitual para גּוֹיִם en este tipo de listado histórico-profético; ''gentiles'' introduciría un contraste posterior no explícito aquí.'
- source_word: מִיּוֹם דִּבַּרְתִּי אֵלֶיךָ
  english_pob_choice: from the day I spoke to you
  chosen_spanish: desde el día en que te hablé
  alternatives_spanish:
  - desde el día que te hablé
  - desde que te hablé
  lexicon: HALOT
  rationale: La combinación temporal pide un punto inicial claro. 'Desde el día en que te hablé' conserva el arranque temporal y suena natural en español.
- source_word: מִימֵי יֹאשִׁיָּהוּ
  english_pob_choice: from the days of Josiah
  chosen_spanish: desde los días de Josías
  alternatives_spanish:
  - desde el tiempo de Josías
  - en los días de Josías
  lexicon: HALOT
  rationale: La forma plural marca un período histórico de comienzo. 'Desde los días de Josías' refleja ese rango mejor que una simple localización 'en los días'.
- source_word: וְעַד הַיּוֹם הַזֶּה
  english_pob_choice: until this day
  chosen_spanish: hasta este día
  alternatives_spanish:
  - hasta hoy
  - hasta el día de hoy
  lexicon: HALOT
  rationale: '''Hasta este día'' es una equivalencia directa y clara para el cierre del intervalo temporal.'
theological_decisions:
- issue: Valor de עַל en la serie Israel/Judá/naciones
  english_pob_reading: concerning Israel and concerning Judah and concerning all the nations
  chosen_spanish_reading: acerca de Israel y acerca de Judá y acerca de todas las naciones
  alternative_spanish_readings:
  - contra Israel y contra Judá y contra todas las naciones
  rationale: El hebreo permite ambas posibilidades. En este contexto, el versículo presenta el alcance total de las palabras habladas a Jeremías; por eso 'acerca de' evita reducir el contenido a juicio solamente, aunque esa dimensión siga siendo posible en pasajes concretos.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'El inglés POB fue revisado sin cambios: la solución base y las notas auditadas se mantuvieron estables (high_agreement, verdict agree). La versión española sigue esa lectura estable, preservando la ambigüedad de עַל sin forzar un sesgo judicial exclusivo.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' en el proyecto, pero en este versículo el tetragrámaton no aparece explícitamente.
  - '''Josías'' se adapta al nombre propio bíblico en español estándar.'
  - Se conserva la repetición de 'acerca de' para reflejar la cadencia de la enumeración hebrea.
  - El texto usa 'rollo de libro' por transparencia formal; si se buscara más naturalidad idiomática, 'un rollo' sería la alternativa principal.
