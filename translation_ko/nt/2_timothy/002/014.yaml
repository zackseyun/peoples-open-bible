id: 2TI.2.14
reference: 2 Timothy 2:14
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ταῦτα ὑπομίμνῃσκε, διαμαρτυρόμενος ἐνώπιον τοῦ ⸀κυρίου, μὴ λογομαχεῖν, ⸀ἐπ’ οὐδὲν χρήσιμον, ἐπὶ καταστροφῇ τῶν ἀκουόντων.
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/002/014.yaml
  text: Keep reminding them of these things, solemnly charging them before the Lord not to quarrel about words, which is useful for nothing and leads to the ruin of those who hear.
translation:
  language: ko
  text: 이 일들을 그들에게 계속 일깨워 주십시오. 주 앞에서 엄히 경고하여 말다툼을 벌이지 말게 하십시오. 그것은 아무 유익이 없고, 듣는 이들의 파멸로 이끌 뿐입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ταῦτα ὑπομίμνῃσκε
  english_pob_choice: Keep reminding them of these things
  chosen_korean: 이 일들을 그들에게 계속 일깨워 주십시오
  alternatives_korean:
  - 이러한 것들을 계속 상기시키십시오
  - 이 일을 늘 생각나게 하십시오
  lexicon: BDAG
  rationale: 현재 명령형의 지속성을 「계속 일깨워 주십시오」로 살린다. 1:6의 「일깨워 주다」(ἀναμιμνῄσκω)와 어휘를 통일한다.
- source_word: διαμαρτυρόμενος ἐνώπιον τοῦ κυρίου
  english_pob_choice: solemnly charging them before the Lord
  chosen_korean: 주 앞에서 엄히 경고하여
  alternatives_korean:
  - 주 앞에서 엄숙히 명하여
  - 주님 앞에서 단단히 경계하여
  lexicon: BDAG
  rationale: διαμαρτύρομαι는 「엄숙히 증언·경고」를 뜻한다. 4:1의 「엄숙히 경고하다」와 연결되는 어휘. 「엄히 경고하여」가 그 무게를 살린다.
- source_word: λογομαχεῖν
  english_pob_choice: to quarrel about words
  chosen_korean: 말다툼을 벌이지
  alternatives_korean:
  - 말로 싸우지
  - 말의 시비를 일으키지
  lexicon: BDAG
  rationale: 합성어 λογο-μαχέω의 「말로 싸움」을 「말다툼」으로 자연스럽게 옮긴다.
- source_word: ἐπὶ καταστροφῇ τῶν ἀκουόντων
  english_pob_choice: leads to the ruin of those who hear
  chosen_korean: 듣는 이들의 파멸로 이끌 뿐입니다
  alternatives_korean:
  - 듣는 자들을 파멸시킬 뿐입니다
  - 듣는 자들의 망함을 초래합니다
  lexicon: BDAG
  rationale: καταστροφή는 「뒤집어엎음·파멸」을 뜻한다. 「파멸로 이끈다」가 그 결과의 무게를 담는다.
