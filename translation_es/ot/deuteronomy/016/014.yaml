translation:
  language: es
  text: Y te alegrarás en tu fiesta[a] —tú, tu hijo y tu hija, tu esclavo y tu esclava, el levita, el forastero residente[b], el huérfano[c] y la viuda, que están dentro de tus puertas[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en tu festival». El hebreo חַג puede denotar una celebración festiva o una fiesta.
    reason: lexical_alternative
  - marker: b
    text: El hebreo גֵּר se refiere a un no israelita residente que vive entre Israel; alternativamente, «el residente extranjero».
    reason: lexical_alternative
  - marker: c
    text: O «el que no tiene padre». El hebreo destaca la condición social vulnerable atendida en la ley de la Torá.
    reason: lexical_alternative
  - marker: d
    text: «Dentro de tus puertas» es un modismo hebreo para los que viven dentro de tus ciudades o comunidad.
    reason: cultural_note
lexical_decisions:
- source_word: וְשָׂמַחְתָּ
  english_pob_choice: And you shall rejoice
  chosen_spanish: Y te alegrarás
  alternatives_spanish:
  - Y te gozarás
  - Y te regocijarás
  lexicon: HALOT
  rationale: El verbo qal expresa alegría como respuesta mandada en un contexto de pacto/fiesta. «Te alegrarás» comunica bien el imperativo-futuro y suena natural en español bíblico moderno sin perder la fuerza exhortativa.
- source_word: בְּחַגֶּךָ
  english_pob_choice: in your festival
  chosen_spanish: en tu fiesta
  alternatives_spanish:
  - en tu festival
  - durante tu fiesta
  lexicon: HALOT
  rationale: חַג designa una celebración festiva/peregrina. «Fiesta» mantiene el sentido celebrativo y es más natural en español que «festival», aunque ambas opciones existen; aquí se prioriza la inteligibilidad sin borrar el matiz cultual.
- source_word: אַתָּה
  english_pob_choice: you
  chosen_spanish: tú
  alternatives_spanish:
  - tú mismo
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis. El guion y la enumeración posterior permiten conservar ese énfasis con un «tú» explícito en español.
- source_word: וּבִנְךָ
  english_pob_choice: your son
  chosen_spanish: tu hijo
  alternatives_spanish:
  - tu hijo varón
  lexicon: HALOT
  rationale: Término filial directo; en español el masculino singular ya es claro sin añadir perífrasis.
- source_word: וּבִתֶּךָ
  english_pob_choice: your daughter
  chosen_spanish: tu hija
  alternatives_spanish:
  - tu hija mujer
  lexicon: HALOT
  rationale: Término filial directo y natural en español.
- source_word: וְעַבְדְּךָ
  english_pob_choice: your male slave
  chosen_spanish: tu esclavo varón
  alternatives_spanish:
  - tu siervo
  - tu servidor
  lexicon: HALOT
  rationale: Se conserva la fuerza social de עֶבֶד como condición de esclavitud dependiente, en línea con la política del POB. «Varón» distingue el término del siguiente femenino.
- source_word: וַאֲמָתֶךָ
  english_pob_choice: your female slave
  chosen_spanish: tu esclava
  alternatives_spanish:
  - tu sierva
  - tu criada
  lexicon: HALOT
  rationale: אָמָה designa esclava/sierva en condición dependiente. «Esclava» mantiene el paralelo con «esclavo varón» y no suaviza el estatus.
- source_word: וְהַלֵּוִי
  english_pob_choice: the Levite
  chosen_spanish: el levita
  alternatives_spanish:
  - el leví
  lexicon: HALOT
  rationale: Gentilicio/denominación tribal estándar; «levita» es la forma corriente y precisa en español.
- source_word: וְהַגֵּר
  english_pob_choice: the sojourner
  chosen_spanish: el forastero
  alternatives_spanish:
  - el forastero residente
  - el residente extranjero
  lexicon: HALOT
  rationale: גֵּר nombra al no israelita residente dentro de la comunidad. «Forastero» conserva la condición de no nativo; se evita «extranjero» como término demasiado moderno/político y «sojourner» como anglicismo conceptual.
- source_word: וְהַיָּתוֹם
  english_pob_choice: the fatherless
  chosen_spanish: el huérfano
  alternatives_spanish:
  - el desamparado
  - el huérfano de padre
  lexicon: HALOT
  rationale: Aunque el hebreo subraya la condición de «sin padre», «huérfano» es el equivalente natural en español y comunica la categoría vulnerable reconocida por la ley; el matiz social se conserva en la nota.
- source_word: וְהָאַלְמָנָה
  english_pob_choice: the widow
  chosen_spanish: la viuda
  alternatives_spanish:
  - la viuda desamparada
  lexicon: HALOT
  rationale: Término social vulnerable estándar; traducción directa y transparente.
- source_word: אֲשֶׁר בִּשְׁעָרֶיךָ
  english_pob_choice: who are within your gates
  chosen_spanish: que están dentro de tus puertas
  alternatives_spanish:
  - que están dentro de tus ciudades
  - que están dentro de tu comunidad
  lexicon: HALOT
  rationale: Se preserva el modismo hebreo de las «puertas» como metonimia de la población bajo tu jurisdicción. «Dentro de tus puertas» es comprensible en español bíblico y mantiene la imagen original.
theological_decisions:
- issue: Cómo rendir עֶבֶד / אָמָה en una lista social legal
  english_pob_reading: male slave / female slave
  chosen_spanish_reading: esclavo varón / esclava
  alternative_spanish_readings:
  - siervo / sierva
  - servidor / criada
  rationale: La lista incluye personas dependientes y vulnerables dentro del gozo del pacto. En español, «esclavo/esclava» preserva el estatus social marcado por el hebreo y evita atenuarlo con «siervo», que puede sonar demasiado honorable o eclesiástico.
  doctrine_reference: Translation philosophy; política léxica POB sobre términos de estatus dependiente
- issue: Cómo rendir גֵּר en un contexto de inclusión comunitaria
  english_pob_reading: the sojourner
  chosen_spanish_reading: el forastero
  alternative_spanish_readings:
  - el residente extranjero
  - el forastero residente
  rationale: El texto no trata de inmigración moderna sino de la inclusión del no israelita que vive entre el pueblo. «Forastero» conserva la alteridad sin imponer una categoría jurídica contemporánea; la nota aclara el matiz comunitario.
  doctrine_reference: HALOT; nota de inclusión social en la Torá
- issue: Cómo rendir יָתוֹם
  english_pob_reading: the fatherless
  chosen_spanish_reading: el huérfano
  alternative_spanish_readings:
  - el huérfano de padre
  - el desamparado
  rationale: El hebreo destaca la vulnerabilidad por ausencia de protección paterna. En español, «huérfano» es el término natural; la nota conserva que el énfasis bíblico es social y legal, no sólo afectivo.
  doctrine_reference: HALOT; contexto legal-social de la Torá
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una oscilación entre «feast» y «festival», y entre «slave» y «servant», con corrección final para restaurar «slave». La versión española sigue de cerca el hebreo y el estado final del POB: mantiene el carácter festivo de חַג sin adoptar una lectura más eclesiástica, y conserva la dureza social de עֶבֶד/אָמָה con «esclavo/esclava».'
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general en el proyecto, pero este versículo no contiene el nombre divino.
  - «Puertas» se conserva como modismo territorial, no como referencia arquitectónica estricta.
  - La enumeración mantiene el paralelismo inclusivo del hebreo sin añadir o quitar miembros.
  - Se evita «siervo» porque suaviza el estatuto social que el texto enumera expresamente.
