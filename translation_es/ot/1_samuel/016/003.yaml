review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el hebreo: «Invita a Isaí al sacrificio» corresponde adecuadamente a וְקָרָאתָ לְיִשַׁי בַּזָּבַח; «yo te haré saber lo que has de hacer» preserva el valor causativo de אוֹדִיעֲךָ y el sentido instructivo de אֵת אֲשֶׁר תַּעֲשֶׂה; «ungirás para mí al que yo te diga» transmite con fidelidad וּמָשַׁחְתָּ לִי אֵת אֲשֶׁר אֹמַר אֵלֶיךָ sin importar explícitamente la realeza. La única desalineación sustancial está en la nota c del borrador, donde «te nombre» introduce una idea más específica que el hebreo «te diga».'
  spanish_quality_summary: El español es claro, natural y digno. «Invita», «te haré saber», «has de hacer» y «ungirás para mí» son lecturas eclesialmente legibles y fieles. La puntuación funciona bien. Solo conviene corregir la nota c para que no estreche el sentido del verbo hebreo ni se aparte de la alternativa inglesa auditada.
  glossary_alignment: No hay conflictos con la terminología marco del proyecto. No aparece el nombre divino en este versículo. «Ungirás» conserva bien el valor técnico de משח. «Isaí» es una forma bíblica española estándar y adecuada. La decisión de no añadir «rey» concuerda con la racionalidad teológica documentada.
  issues:
  - severity: medium
    issue: La nota al pie c dice «al que yo te nombre».
    rationale: El hebreo אֹמַר אֵלֶיךָ y la auditoría inglesa favorecen «te diga / I tell you», mientras que «nombrar» añade una precisión interpretativa no exigida por el texto y más fuerte que la alternativa conservada en inglés.
  revised_spanish_text: Invita a Isaí al sacrificio[a], y yo te haré saber lo que has de hacer[b]; y ungirás para mí al que yo te diga[c].
  revised_footnotes:
  - marker: a
    text: O «llama a Isaí para el sacrificio».
    reason: lexical_alternative
  - marker: b
    text: O «te mostraré lo que has de hacer».
    reason: lexical_alternative
  - marker: c
    text: O «ungirás para mí a quien yo te diga».
    reason: lexical_alternative
  revision_rationale: Se mantiene el texto principal porque es fiel al hebreo y suena natural en español. Se corrige únicamente la nota c para alinear la alternativa con el verbo fuente «decir» y con la auditoría inglesa, evitando la interpretación más estrecha de «nombrar».
