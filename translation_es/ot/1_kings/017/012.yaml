  yaml_path: translation/ot/1_kings/017/012.yaml
  text: And she said[a], “As Yahweh your God lives, I have no bread-cake, only a handful of flour in the jar and a little oil in the jug. And look, I am gathering two sticks, so that I may go in and prepare it for myself and for my son, and we may eat it and die.”
