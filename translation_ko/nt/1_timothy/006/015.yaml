id: 1TI.6.15
reference: 1 Timothy 6:15
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἣν καιροῖς ἰδίοις δείξει ὁ μακάριος καὶ μόνος δυνάστης, ὁ βασιλεὺς τῶν βασιλευόντων καὶ κύριος τῶν κυριευόντων,
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/006/015.yaml
  text: which he will display in his own times—the blessed and only Sovereign[a], the King of those who reign and Lord of those who rule[b],
  footnotes:
  - marker: a
    text: Or “in his own times”; the phrase denotes the appointed times set by him.
    reason: lexical_alternative
  - marker: b
    text: 'Traditional rendering: “the King of kings and Lord of lords.” The Greek uses participles, literally “the King of those who reign and Lord of those who rule.”'
    reason: alternative_reading
translation:
  language: ko
  text: 정하신 때에[a] 그것을 보이실 분은 복되시고 유일하신 통치자, 다스리는 자들의 왕이시며 주관하는 자들의 주이십니다[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「자기의 때에」. 본 어구는 그분이 정해 두신 시간을 가리킨다.
    reason: lexical_alternative
  - marker: b
    text: 전통적 번역은 「왕의 왕, 주의 주」. 헬라어는 분사를 사용하여 직역하면 「다스리는 자들의 왕, 주관하는 자들의 주」가 된다.
    reason: alternative_reading
lexical_decisions:
- source_word: καιροῖς ἰδίοις
  english_pob_choice: in his own times
  chosen_korean: 정하신 때에
  alternatives_korean:
  - 자기의 때에
  - 정해진 시기에
  lexicon: BDAG
  rationale: 2:6과 일관 「정한 때」.
- source_word: ὁ μακάριος καὶ μόνος δυνάστης
  english_pob_choice: the blessed and only Sovereign
  chosen_korean: 복되시고 유일하신 통치자
  alternatives_korean:
  - 복되시며 홀로 한 분이신 통치자
  - 복된 유일 주권자
  lexicon: BDAG
  rationale: 1:11 μακάριος와 일관 「복되신」. δυνάστης의 「통치자·주권자」를 「통치자」로.
- source_word: ὁ βασιλεὺς τῶν βασιλευόντων καὶ κύριος τῶν κυριευόντων
  english_pob_choice: the King of those who reign and Lord of those who rule
  chosen_korean: 다스리는 자들의 왕이시며 주관하는 자들의 주
  alternatives_korean:
  - 왕의 왕, 주의 주
  - 왕들의 왕, 주들의 주
  lexicon: BDAG
  rationale: 헬라어는 분사형(다스리는 자들/주관하는 자들). 본문은 분사형의 본의를 살리고, 전통 표현 「왕의 왕, 주의 주」는 각주.
