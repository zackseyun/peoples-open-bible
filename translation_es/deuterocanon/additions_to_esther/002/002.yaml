translation:
  language: es
  text: El asunto se apresuraba aún en Susa; pero el rey y Amán estaban reclinados a la mesa de banquete[a], mientras la ciudad estaba en conmoción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estaban banqueteando» o «estaban celebrando un banquete». El verbo griego evoca específicamente el recostarse en divanes durante una comida formal.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐσπεύδετο
  english_pob_choice: was being hurried along
  chosen_spanish: se iba apresurando
  alternatives_spanish:
  - era apresurado
  - se apresuraba
  - iba siendo llevado con prisa
  lexicon: LSJ
  rationale: El imperfecto pasivo expresa un proceso en curso. «Se iba apresurando» conserva la idea de avance acelerado sin volver la frase rígida en español.
- source_word: τὸ πρᾶγμα
  english_pob_choice: the matter
  chosen_spanish: el asunto
  alternatives_spanish:
  - el asunto
  - el negocio
  - el decreto
  lexicon: LSJ
  rationale: «Asunto» mantiene la generalidad del griego mejor que «decreto», que sería demasiado específico. También suena natural en español actual.
- source_word: καὶ εἰς Σουσάν
  english_pob_choice: even in Susa
  chosen_spanish: aun en Susa
  alternatives_spanish:
  - también en Susa
  - incluso en Susa
  lexicon: LSJ
  rationale: La partícula marca extensión del movimiento a Susa. «Aun en Susa» reproduce esa idea de alcance adicional de modo natural.
- source_word: ἐκωθωνίζοντο
  english_pob_choice: were reclining at table
  chosen_spanish: estaban reclinados a la mesa
  alternatives_spanish:
  - estaban banqueteando
  - estaban celebrando un banquete
  - estaban comiendo reclinados
  lexicon: LSJ
  rationale: El verbo evoca la postura de recostarse en un banquete formal. «Estaban reclinados a la mesa» preserva la imagen concreta más que un resumen como «banqueteaban».
- source_word: ἐταράσσετο
  english_pob_choice: was in turmoil
  chosen_spanish: estaba en conmoción
  alternatives_spanish:
  - estaba perturbada
  - estaba en tumulto
  - estaba agitada
  lexicon: LSJ
  rationale: El imperfecto describe un estado continuo de agitación cívica. «En conmoción» comunica bien la perturbación pública sin perder la fuerza del contraste con la calma del rey.
- source_word: ἡ πόλις
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - la ciudad
  - la urbe
  lexicon: LSJ
  rationale: Es la equivalencia directa y suficiente para πόλις en este contexto, refiriéndose al cuerpo urbano/cívico de Susa.
translation_notes:
  revision_awareness: Se siguió el sentido del griego del texto base y el rastro auditado en inglés; no se requirieron revisiones textuales adicionales respecto del pasaje proporcionado.
