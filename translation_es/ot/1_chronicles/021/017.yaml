translation:
  language: es
  text: 'Entonces David dijo a Dios[a]: «¿No dije yo que se contara al pueblo? Yo soy el que ha pecado y ha hecho muy mal[b]. Pero estas ovejas[c], ¿qué han hecho? Yahvé, Dios mío, te ruego que tu mano sea contra mí y contra la casa de mi padre, pero no contra tu pueblo con una plaga[d]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dije que se contara al pueblo».
    reason: lexical_alternative
  - marker: b
    text: O «ha obrado muy perversamente».
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «estas ovejas», metáfora del pueblo.'
    reason: cultural_note
  - marker: d
    text: O «pero no sobre tu pueblo con una plaga».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: En vocativo directo, el artículo hebreo no obliga a traducir «el»; «Dios» es la forma natural y fiel en español.
- source_word: הֲלֹא
  english_pob_choice: Was it not
  chosen_spanish: ¿No fui yo quien...?
  alternatives_spanish:
  - ¿No era yo quien...?
  - ¿Acaso no fui yo quien...?
  lexicon: HALOT
  rationale: La fuerza retórica espera respuesta afirmativa. En español, la pregunta con «¿No...?» conserva bien esa función sin sonar rígida.
- source_word: אָמַרְתִּי לִמְנוֹת בָּעָם
  english_pob_choice: I said to count the people
  chosen_spanish: dijo que se contara al pueblo
  alternatives_spanish:
  - ordené que se contara al pueblo
  - dije que se numerara al pueblo
  lexicon: HALOT
  rationale: Sigo de cerca el giro hebreo «dije para contar»; en español, una subordinada con subjuntivo expresa la iniciativa de David sin imponer «ordené» como interpretación más fuerte.
- source_word: וַאֲנִי הוּא אֲשֶׁר
  english_pob_choice: I am the one who
  chosen_spanish: Yo soy el que
  alternatives_spanish:
  - Yo mismo soy el que
  - yo soy quien
  lexicon: HALOT
  rationale: La construcción es enfática. «Yo soy el que» reproduce la prominencia del sujeto y su responsabilidad personal en español natural.
- source_word: חָטָאתִי
  english_pob_choice: has sinned
  chosen_spanish: ha pecado
  alternatives_spanish:
  - pecó
  lexicon: HALOT
  rationale: En el discurso directo, el perfecto español comunica bien un acto completo con relevancia actual.
- source_word: וְהָרֵעַ הֲרֵעוֹתִי
  english_pob_choice: done very wickedly
  chosen_spanish: ha hecho muy mal
  alternatives_spanish:
  - ha hecho un gran mal
  - ha obrado muy perversamente
  lexicon: HALOT
  rationale: El hebreo intensifica la idea de hacer el mal. «Ha hecho muy mal» mantiene la intensidad con español claro y sobrio, evitando sobrecargar el verso con una abstracción demasiado técnica.
- source_word: הַצֹּאן
  english_pob_choice: these sheep
  chosen_spanish: estas ovejas
  alternatives_spanish:
  - este rebaño
  lexicon: HALOT
  rationale: Se conserva la metáfora pastoral explícita. «Ovejas» es el equivalente más directo y transparente en español.
- source_word: מֶה עָשׂוּ
  english_pob_choice: what have they done?
  chosen_spanish: ¿qué han hecho?
  alternatives_spanish:
  - ¿qué hicieron?
  lexicon: HALOT
  rationale: La pregunta retórica en español suena natural en perfecto compuesto y mantiene la inocencia de los referidos.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el Tetragrama, preservando el nombre divino en lugar de sustituirlo por un título.
- source_word: אֱלֹהַי
  english_pob_choice: my God
  chosen_spanish: Dios mío
  alternatives_spanish:
  - mi Dios
  lexicon: HALOT
  rationale: En invocación, «Dios mío» es la forma más idiomática y reverente en español, con sentido equivalente al posesivo hebreo.
- source_word: יָדְךָ
  english_pob_choice: your hand
  chosen_spanish: tu mano
  alternatives_spanish:
  - tu poder
  - tu mano de juicio
  lexicon: HALOT
  rationale: Se conserva el antropomorfismo hebreo. En español, «mano» mantiene la imagen de acción/poder sin explicitar más de lo que el texto dice.
- source_word: בִּי וּבְבֵית אָבִי
  english_pob_choice: against me and against my father’s house
  chosen_spanish: contra mí y contra la casa de mi padre
  alternatives_spanish:
  - sobre mí y sobre la casa de mi padre
  lexicon: HALOT
  rationale: «Contra» expresa con claridad la orientación de juicio implícita en el contexto. «Casa de mi padre» conserva el sentido familiar/dinástico del hebreo.
- source_word: וּבְעַמְּךָ לֹא לְמַגֵּפָה
  english_pob_choice: but not against your people with a plague
  chosen_spanish: pero no contra tu pueblo con una plaga
  alternatives_spanish:
  - pero no sobre tu pueblo con una plaga
  - pero que no venga una plaga sobre tu pueblo
  lexicon: HALOT
  rationale: «Con una plaga» sigue de cerca la relación preposicional del hebreo y coincide con la auditoría inglesa revisada; en español evita introducir una causalidad no expresada explícitamente.
theological_decisions:
- issue: Representación del Tetragrama יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo contiene el nombre propio divino, no un título. Se mantiene la política del proyecto de transliterarlo como «Yahvé», evitando la sustitución litúrgica por «el SEÑOR».
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: La frase metafórica הַצֹּאן
  english_pob_reading: these sheep — a metaphor for the people
  chosen_spanish_reading: estas ovejas
  alternative_spanish_readings:
  - este rebaño
  - estas ovejas — metáfora del pueblo
  rationale: Se preserva la metáfora pastoral en la línea principal, ya que el hebreo la usa de forma intencional para referirse al pueblo. No se neutraliza a «pueblo» en el texto principal para no perder la imagen.
  doctrine_reference: POB lexical policy on metaphor preservation
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la última revisión inglesa: conserva la pregunta retórica con «¿No...?» en lugar de una paráfrasis más fuerte; refleja la intensificación de וְהָרֵעַ הֲרֵעוֹתִי con «ha hecho muy mal»; y mantiene «con una plaga» para el cierre, alineándose con la auditoría más reciente. También preserva el nombre divino como «Yahvé», conforme a la política del proyecto para יְהוָה.'
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהִים y «Yahvé» para יְהוָה, siguiendo la distinción del proyecto.
  - Se conserva la metáfora de «ovejas» sin reemplazarla por «pueblo» en el texto principal.
  - Se mantiene el antropomorfismo «mano» para יָדְךָ y se deja la interpretación de juicio implícita al contexto.
  - «Casa de mi padre» se entiende en sentido familiar/dinástico, no meramente doméstico.
