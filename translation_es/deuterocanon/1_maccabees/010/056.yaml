translation:
  language: es
  text: Y ahora haré para ti lo que escribiste; pero encuéntrame en Ptolemaida, para que nos veamos, y me emparentaré contigo por matrimonio[a], como dijiste.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Haré una alianza matrimonial contigo». El verbo griego expresa el establecimiento de un vínculo por matrimonio; el contexto narrativo amplio muestra que se trata de una alianza dinástica.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ποιήσω
  english_pob_choice: I will do
  chosen_spanish: haré
  alternatives_spanish:
  - cumpliré
  - haré por ti
  lexicon: LSJ
  rationale: El verbo ποιέω aquí expresa realizar o llevar a cabo lo pedido en la carta. «Haré» conserva la amplitud y la naturalidad del español, sin concretar más de lo que el griego dice.
- source_word: ἃ ἔγραψας
  english_pob_choice: what you wrote
  chosen_spanish: lo que escribiste
  alternatives_spanish:
  - las cosas que escribiste
  - lo que pediste por escrito
  lexicon: LSJ
  rationale: La cláusula relativa remite de manera directa al contenido de la carta previa. «Lo que escribiste» es idiomático y fiel al sentido referencial.
- source_word: ἀπάντησον
  english_pob_choice: meet me
  chosen_spanish: encuéntrame
  alternatives_spanish:
  - ven a encontrarme
  - preséntate ante mí
  lexicon: LSJ
  rationale: El imperativo pide un encuentro en Ptolemaida. En español, «encuéntrame» comunica la invitación de manera clara y natural sin añadir contenido ajeno.
- source_word: εἰς Πτολεμαΐδα
  english_pob_choice: at Ptolemais
  chosen_spanish: en Ptolemaida
  alternatives_spanish:
  - a Ptolemaida
  lexicon: LSJ
  rationale: Aunque εἰς normalmente marca dirección, en este contexto el español pide una ubicación de encuentro. «En Ptolemaida» conserva el lugar señalado para la cita.
- source_word: ὅπως ἰδωμεν ἀλλήλους
  english_pob_choice: so that we may see one another
  chosen_spanish: para que nos veamos unos a otros
  alternatives_spanish:
  - para que nos veamos
  - para que nos encontremos
  lexicon: LSJ
  rationale: El griego habla literalmente de «vernos unos a otros». «Nos veamos unos a otros» preserva ese matiz de mutuo reconocimiento sin sustituirlo por un sentido más libre.
- source_word: ἐπιγαμβρεύσω
  english_pob_choice: I will become related by marriage to you
  chosen_spanish: me uniré a ti por alianza matrimonial
  alternatives_spanish:
  - contraeré alianza matrimonial contigo
  - me emparentaré contigo por matrimonio
  lexicon: LSJ
  rationale: El verbo indica entrar en una relación de afinidad por matrimonio. «Me uniré a ti por alianza matrimonial» mantiene el sentido de vínculo familiar sin imponer detalles no explícitos en este versículo.
- source_word: καθὼς εἴρηκας
  english_pob_choice: just as you said
  chosen_spanish: como dijiste
  alternatives_spanish:
  - tal como dijiste
  - como has dicho
  lexicon: LSJ
  rationale: La frase remite a la propuesta anterior. «Como dijiste» es natural en español y refleja adecuadamente la correspondencia con lo ya propuesto.
translation_notes:
  revision_awareness: Coincide con el testimonio griego de Swete (1909) y con el juicio de alta concordancia del paquete de auditoría en inglés; no se requirieron revisiones textuales adicionales.
  spanish_consistency_notes:
  - Se usa «Ptolemaida» como forma española estable del topónimo.
  - Se conserva la diferencia entre un encuentro físico («encuéntrame») y el propósito relacional («para que nos veamos unos a otros»).
  - Se evita traducir ἐπιγαμβρεύσω con un término eclesiástico tradicional; se opta por un giro explicativo fiel al vínculo por matrimonio.
