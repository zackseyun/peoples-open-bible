  - severity: medium
    issue: El marcador [a] debe moverse de «pozo» a «dinero».
    rationale: Si la nota trata de כֶּסֶף, el anclaje correcto en el texto español debe estar en «dinero[a]», no en «pozo[a]», para cumplir la disciplina de notas del proyecto.
