translation:
  language: es
  text: Amó la maldición[a], y ella vino sobre él; no se complació en la bendición[b], y estaba lejos de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «una maldición». El hebreo puede leerse como una categoría («maldición/maldecir») o como un caso concreto («una maldición»).'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no tuvo deleite en la bendición».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֶּאֱהַב
  english_pob_choice: he loved
  chosen_spanish: Amó
  alternatives_spanish:
  - amó
  - llegó a amar
  lexicon: HALOT
  rationale: El verbo אהב expresa amor o preferencia afectiva/volitiva. En español poético, «amó» conserva la fuerza directa del perfecto narrativo y no añade desarrollo temporal que el hebreo no exige.
- source_word: קְלָלָה
  english_pob_choice: cursing
  chosen_spanish: la maldición
  alternatives_spanish:
  - la maldición
  - el maldecir
  - una maldición
  lexicon: HALOT
  rationale: 'El sustantivo puede leerse como acto/estado («cursing») o como entidad concreta («a curse»). En español, «la maldición» mantiene esa ambivalencia: puede oírse como práctica maldiciente o como realidad de maldición, sin forzar una sola opción.'
- source_word: וַתְּבוֹאֵהוּ
  english_pob_choice: it came upon him
  chosen_spanish: vino sobre él
  alternatives_spanish:
  - vino sobre él
  - le vino encima
  - lo alcanzó
  lexicon: HALOT
  rationale: בא con sufijo objeto y sujeto femenino refiriéndose a la maldición expresa llegada/irrupción. «Vino sobre él» reproduce bien la imagen de algo hostil que cae o recae sobre la persona.
- source_word: חָפֵץ
  english_pob_choice: he did not delight in
  chosen_spanish: no se complació en
  alternatives_spanish:
  - no se complació en
  - no tuvo deleite en
  - no quiso
  lexicon: HALOT
  rationale: חפץ denota deleite, agrado o deseo. «No se complació en» conserva el matiz afectivo y la antítesis con «amó» mejor que un verbo meramente volitivo.
- source_word: בִּבְרָכָה
  english_pob_choice: blessing
  chosen_spanish: la bendición
  alternatives_spanish:
  - la bendición
  - una bendición
  lexicon: HALOT
  rationale: El singular anartro funciona naturalmente en español como noción o categoría. «La bendición» preserva el paralelismo antitético con «la maldición».
- source_word: וַתִּרְחַק מִמֶּנּוּ
  english_pob_choice: it was far from him
  chosen_spanish: estuvo lejos de él
  alternatives_spanish:
  - estuvo lejos de él
  - quedó lejos de él
  - permaneció lejos de él
  lexicon: HALOT
  rationale: רחק expresa lejanía/alejamiento. Dado que el sujeto sigue siendo femenino y remite a «la bendición», «estuvo lejos de él» suena natural en español y evita añadir una duración explícita que el hebreo aquí no desarrolla.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el estado final del audit trail inglés, especialmente la revisión que prefirió «it was far from him» sobre «it stayed far from him». Por eso se evitó introducir un matiz de duración continua y se optó por una formulación simple de distancia: «estuvo lejos de él».'
  spanish_consistency_notes:
  - Se preservó el paralelismo poético maldición/bendición con sustantivos definidos en español.
  - Se mantuvo el sujeto femenino implícito («la maldición», «la bendición») al reflejar los verbos en tercera persona femenina singular.
  - Se evitó «SEÑOR» u otras sustituciones no pertinentes, y no hay términos de pacto que requieran ajuste terminológico aquí.
  - «Complació» se eligió para reflejar el campo semántico de חפץ sin convertirlo en simple voluntad.
