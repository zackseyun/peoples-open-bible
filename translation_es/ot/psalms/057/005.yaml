translation:
  language: es
  text: Mi alma está en medio de leones; me acuesto entre los que están en llamas[b]—hijos de Adán[a], cuyos dientes son lanzas y flechas, y cuya lengua es una espada afilada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «seres humanos» o «hombres» para «hijos de Adán».'
    reason: lexical_alternative
  - marker: b
    text: «Los que están en llamas» también puede verterse «los ardientes» o «los que arden», describiendo la hostilidad feroz de los enemigos.
    reason: lexical_alternative
lexical_decisions:
- source_word: נַפְשִׁי
  english_pob_choice: My soul
  chosen_spanish: Mi alma
  alternatives_spanish:
  - yo
  - mi vida
  - mi ser
  lexicon: HALOT
  rationale: נֶפֶשׁ puede significar alma, vida, persona o yo mismo. Aquí conserva bien la imagen poética de una vida interior expuesta al peligro. "Mi alma" mantiene el registro y la metáfora sin aplanarla a "yo".
- source_word: בְּתוֹךְ
  english_pob_choice: in the midst of
  chosen_spanish: en medio de
  alternatives_spanish:
  - entre
  - en el centro de
  lexicon: HALOT
  rationale: La expresión señala encierro o rodeo por el peligro. "En medio de" es natural en español y conserva la idea de estar rodeado.
- source_word: לְבָאִם
  english_pob_choice: lions
  chosen_spanish: leones
  alternatives_spanish:
  - leonas
  - bestias
  lexicon: HALOT
  rationale: El sustantivo designa de forma directa a los leones. Se conserva la imagen sin explicarla en exceso.
- source_word: אֶשְׁכְּבָה
  english_pob_choice: I lie down
  chosen_spanish: me acuesto
  alternatives_spanish:
  - me tiendo
  - yazco
  - me acuesto a dormir
  lexicon: HALOT
  rationale: El verbo indica el acto concreto de echarse o acostarse. En español, "me acuesto" comunica con naturalidad la postura sin añadir elementos no presentes en el hebreo.
- source_word: לֹהֲטִים
  english_pob_choice: those who are aflame
  chosen_spanish: los que están en llamas
  alternatives_spanish:
  - los que arden
  - los ardientes
  - los que flamean
  lexicon: HALOT
  rationale: El participio evoca ardor, fuego o llama. "Los que están en llamas" conserva la imagen de hostilidad encendida sin resolverla a una paráfrasis psicológica.
- source_word: בְּנֵי אָדָם
  english_pob_choice: sons of man
  chosen_spanish: hijos de hombre
  alternatives_spanish:
  - seres humanos
  - hombres
  - hijos de Adán
  lexicon: HALOT
  rationale: La frase hebrea es masculinizada y poética. "Hijos de hombre" preserva esa forma y la tensión del texto; no se neutraliza en el cuerpo principal. Se deja la aclaración humana en nota.
- source_word: שִׁנֵּיהֶם
  english_pob_choice: whose teeth
  chosen_spanish: cuyos dientes
  alternatives_spanish:
  - sus dientes
  lexicon: HALOT
  rationale: El posesivo relativo en español conecta con naturalidad la imagen de los enemigos con sus dientes como armas, manteniendo la relación sintáctica del hebreo.
- source_word: חֲנִית וְחִצִּים
  english_pob_choice: spears and arrows
  chosen_spanish: lanzas y flechas
  alternatives_spanish:
  - lanzas y saetas
  - picas y flechas
  lexicon: HALOT
  rationale: Aunque el hebreo usa un singular colectivo para חֲנִית, en español "lanzas" y "flechas" suenan más fluidos y mantienen la fuerza bélica de la imagen. La variante singular no aporta claridad adicional aquí.
- source_word: וּלְשׁוֹנָם
  english_pob_choice: whose tongue
  chosen_spanish: y cuya lengua
  alternatives_spanish:
  - y su lengua
  lexicon: HALOT
  rationale: Se conserva el paralelismo con la cláusula anterior mediante una relativa posesiva natural en español.
- source_word: חֶרֶב חַדָּה
  english_pob_choice: a sharp sword
  chosen_spanish: una espada afilada
  alternatives_spanish:
  - una espada aguda
  - una espada filosa
  lexicon: HALOT
  rationale: El hebreo describe una espada intensamente cortante. "Afilada" es claro, digno y fiel al valor metafórico de la lengua dañina.
theological_decisions:
- issue: Conservar o resolver la imagen de leones/ardor y enemigos humanos
  english_pob_reading: Preserve the imagery as poetic description of human enemies without resolving it into a paraphrase.
  chosen_spanish_reading: 'Mantener la imagen poética: leones y gente en llamas, seguida por la identificación explícita de los agresores como hijos de hombre.'
  alternative_spanish_readings:
  - Convertirlo en una sola paráfrasis sobre enemigos violentos
  - Interpretar literalmente ambos grupos como animales y luego hombres
  rationale: El versículo conserva una tensión poética entre imágenes animales, fuego y humanidad. La traducción española no debe explicar ni reducir esa densidad; debe sostenerla para que el lector perciba el paralelo y la hostilidad vívida del texto.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it) and §1 (Original-language primacy).
- issue: Cómo rendir בְּנֵי אָדָם sin neutralizar el masculino hebreo
  english_pob_reading: sons of man
  chosen_spanish_reading: hijos de hombre
  alternative_spanish_readings:
  - seres humanos
  - hombres
  rationale: El hebreo es marcadamente masculino y poético. En el cuerpo principal se conserva esa forma; la nota aclara que el sentido abarca a seres humanos en general. Así se mantiene la decisión gender-accurate sin perder inteligibilidad.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral); Contested terms table for אָדָם.
translation_notes:
  revision_awareness: La última pasada de revisión quedó sin cambios y el resumen de verificación indicó alta concordancia con solo observaciones menores; esta versión conserva esa lectura general sin introducir novedades no justificadas por el texto fuente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en el proyecto cuando el texto lo requiera, pero este versículo no lo contiene.
  - Se usa «leones» y no una explicación figurada que borre la metáfora.
  - 'Se conserva el paralelismo sintáctico con relativas posesivas: «cuyos dientes» / «cuya lengua».'
  - Se evita "Cristo" o terminología cristológica, irrelevante para este versículo.
  - La nota [a] preserva la alternativa semántica de בְּנֵי אָדָם sin neutralizar el texto principal.
