  yaml_path: translation/deuterocanon/2_maccabees/013/015.yaml
  text: And after giving those around him the battle cry[a], “God’s Victory,” he attacked the royal court by night with the finest armed young men, struck down about two thousand men in the camp[b], and cut down the leading elephant together with its rider.
  footnotes:
  - marker: a
    text: Or “watchword” or “signal” for “battle cry.” The Greek term is a military password or signal; here it is expressed aloud as “God’s Victory.”
    reason: lexical_alternative
  - marker: b
    text: Literally “the one being in the house(-structure),” likely referring to the man riding in the elephant’s mounted tower or seat.
    reason: cultural_note
