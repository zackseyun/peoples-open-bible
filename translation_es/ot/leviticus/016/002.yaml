translation:
  language: es
  text: 'Y Yahvé dijo a Moisés: «Dile a Aarón tu hermano que no entre[a] al Lugar Santo, al interior del velo, delante de la cubierta de expiación[b] que está sobre el arca, no en cualquier momento, para que no muera. Porque en la nube me apareceré sobre la cubierta de expiación».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «no entre en todo tiempo»; el sentido es que no debe entrar de manera indiscriminada o cuando quiera.
    reason: alternative_reading
  - marker: b
    text: O «propiciatorio», la traducción tradicional de este término ritual.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: Éx 3:15 / uso POB del Nombre divino
  rationale: Se mantiene el Nombre divino como transliteración reverente y transparente. 'Yahvé' sigue el principio POB de no sustituir el Tetragrámaton por un título; 'el SEÑOR' ocultaría el nombre y 'Jehová' no refleja la opción terminológica base del proyecto.
- source_word: דַּבֵּר
  english_pob_choice: Tell
  chosen_spanish: Habla
  alternatives_spanish:
  - Di
  - Dile
  lexicon: HALOT
  rationale: El imperativo transmite la orden dirigida por Yahvé a Moisés. 'Habla' es natural en español y conserva la fuerza directiva sin añadir matices explicativos.
- source_word: אַהֲרֹן אָחִיךָ
  english_pob_choice: Aaron your brother
  chosen_spanish: Aarón, tu hermano
  alternatives_spanish:
  - tu hermano Aarón
  - Aarón, hermano tuyo
  lexicon: HALOT
  rationale: Se conserva la relación de parentesco y el nombre propio con puntuación natural en español. La coma evita ambigüedad y mantiene el énfasis relacional del hebreo.
- source_word: וְאַל יָבֹא
  english_pob_choice: he must not come
  chosen_spanish: que no entre
  alternatives_spanish:
  - no debe entrar
  - no ha de entrar
  lexicon: HALOT
  rationale: En español, una subordinada exhortativa/prohibitiva expresa mejor la jussiva negativa. 'Que no entre' preserva la prohibición con fluidez y sin perder el valor normativo.
- source_word: בְּכָל עֵת
  english_pob_choice: at just any time
  chosen_spanish: en ningún momento
  alternatives_spanish:
  - a cualquier hora
  - en cualquier momento
  - en todo momento
  lexicon: HALOT
  rationale: El sentido no es continuidad, sino acceso no autorizado e indiscriminado. 'En ningún momento' comunica la prohibición absoluta de entrar por iniciativa propia, aunque la idea contextual es 'no en cualquier momento'.
- source_word: הַקֹּדֶשׁ
  english_pob_choice: the Holy Place
  chosen_spanish: el Lugar Santo
  alternatives_spanish:
  - el santuario
  - el lugar santo
  lexicon: HALOT
  rationale: En el contexto del tabernáculo, 'Lugar Santo' es una designación precisa y ampliamente inteligible en español. Conserva el valor técnico del espacio sagrado sin volverlo explicativo en exceso.
- source_word: מִבֵּית לַפָּרֹכֶת
  english_pob_choice: inside the veil
  chosen_spanish: detrás del velo
  alternatives_spanish:
  - dentro del velo
  - al otro lado del velo
  lexicon: HALOT
  rationale: '''Detrás del velo'' comunica con claridad la ubicación espacial desde el punto de vista del lector y preserva la imagen del separador cultual. ''Dentro del velo'' suena poco natural en español.'
- source_word: אֶל פְּנֵי הַכַּפֹּרֶת
  english_pob_choice: before the atonement cover
  chosen_spanish: delante del propiciatorio
  alternatives_spanish:
  - ante el propiciatorio
  - frente al propiciatorio
  lexicon: HALOT
  rationale: '''Propiciatorio'' es el equivalente culto y tradicional en español para el término del arca, y en este contexto el valor posicional de ''delante de'' se expresa bien con ''delante del''. Se preserva el objeto ritual sin introducir una paráfrasis funcional ajena al registro bíblico.'
- source_word: הַכַּפֹּרֶת
  english_pob_choice: atonement cover
  chosen_spanish: propiciatorio
  alternatives_spanish:
  - cubierta de expiación
  - cubierta propiciatoria
  lexicon: HALOT
  rationale: Aunque el inglés POB opta por 'atonement cover' por transparencia, en español 'propiciatorio' es la forma bíblica y litúrgica establecida para este objeto. Se usa aquí por claridad receptor y por fidelidad al referente cultual ya asentado en español bíblico.
- source_word: הָאָרֹן
  english_pob_choice: the ark
  chosen_spanish: el arca
  alternatives_spanish:
  - el arca del pacto
  lexicon: HALOT
  rationale: El hebreo dice simplemente 'el arca'; 'el arca' respeta la concisión del texto. Añadir 'del pacto' introduciría material no presente en la frase.
- source_word: וְלֹא יָמוּת
  english_pob_choice: so that he may not die
  chosen_spanish: así no morirá
  alternatives_spanish:
  - para que no muera
  - y no morirá
  lexicon: HALOT
  rationale: La cláusula expresa finalidad/resultado del mandato prohibitivo. 'Así no morirá' reproduce de manera natural esa relación causal en español y evita el giro arcaico 'para que no muera' donde el contexto ya funciona como advertencia.
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la prohibición. 'Porque' es la equivalencia más directa y clara en español contemporáneo.
- source_word: בֶּעָנָן
  english_pob_choice: in the cloud
  chosen_spanish: en la nube
  alternatives_spanish:
  - en una nube
  - con la nube
  lexicon: HALOT
  rationale: Se conserva el artículo definido implícito en el contexto teofánico. 'La nube' remite a la manifestación divina sin oscurecer la imagen.
- source_word: אֵרָאֶה
  english_pob_choice: I will appear
  chosen_spanish: me manifestaré
  alternatives_spanish:
  - apareceré
  - me apareceré
  lexicon: HALOT
  rationale: En español, 'manifestarse' expresa con mayor naturalidad la auto-revelación divina que 'aparecerse', que puede sonar demasiado coloquial o ambiguo. No obstante, se conserva la idea de presencia visible dentro del marco teofánico.
- source_word: עַל הַכַּפֹּרֶת
  english_pob_choice: over the atonement cover
  chosen_spanish: sobre el propiciatorio
  alternatives_spanish:
  - encima del propiciatorio
  - por encima del propiciatorio
  lexicon: HALOT
  rationale: La preposición indica posición superior respecto del objeto ritual. 'Sobre el propiciatorio' es la forma más directa y natural en español.
theological_decisions:
- issue: Nombre divino en la cita introductoria
  english_pob_reading: Yahweh said to Moses
  chosen_spanish_reading: Yahvé dijo a Moisés
  alternative_spanish_readings:
  - el SEÑOR dijo a Moisés
  - Jehová dijo a Moisés
  rationale: Se preserva el Tetragrámaton como nombre propio revelado, conforme a la filosofía POB. Esto evita la sustitución por un título y mantiene la trazabilidad del texto fuente.
  doctrine_reference: Principio POB sobre el Nombre divino; transparencia textual
- issue: Terminología del objeto sobre el arca
  english_pob_reading: atonement cover
  chosen_spanish_reading: propiciatorio
  alternative_spanish_readings:
  - cubierta de expiación
  - cubierta propiciatoria
  rationale: Aunque el inglés POB privilegia una forma descriptiva, en español 'propiciatorio' es el término bíblico y eclesial más reconocible para el כפרת. Se adopta por inteligibilidad y continuidad terminológica, sin perder el referente ritual.
  doctrine_reference: Equivalencia funcional con tradición bíblica española; fidelidad al referente cultual
- issue: Fuerza de la prohibición temporal
  english_pob_reading: at just any time
  chosen_spanish_reading: en ningún momento
  alternative_spanish_readings:
  - en cualquier momento
  - a cualquier hora
  rationale: La advertencia no describe una frecuencia, sino la prohibición de acceso arbitrario al Lugar Santo. La formulación elegida intensifica la restricción en español de modo fiel al contexto de santidad y peligro de muerte.
  doctrine_reference: Contexto de santidad cultual en Levítico 16; prohibición de acceso no autorizado
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el estado de revisión más reciente: sin cambios necesarios y con alto acuerdo entre auditoría y texto fuente. La versión española ajusta la elección terminológica al uso bíblico español sin contradecir la decisión central del POB sobre transparencia del Nombre divino y del referente cultual.'
  spanish_consistency_notes:
  - Se conservó 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - Se optó por 'propiciatorio' como término bíblico español estable para כַּפֹּרֶת, dejando constancia de la alternativa descriptiva del inglés POB.
  - La prohibición temporal se expresó de forma idiomática en español sin diluir el valor restrictivo del hebreo.
  - Se mantuvo el registro reverente y culto propio de una traducción bíblica pública.
