translation:
  language: es
  text: El capitán de la guardia tomó a Seraías, el sacerdote principal[a], a Sofonías, el segundo sacerdote[b], y a los tres guardianes del umbral.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el sumo sacerdote». El hebreo dice literalmente «el sacerdote, el jefe/el principal».
    reason: lexical_alternative
  - marker: b
    text: O «el sacerdote suplente» o «el sacerdote de segundo rango». El hebreo dice literalmente «el sacerdote, el segundo».
    reason: lexical_alternative
lexical_decisions:
- source_word: רַב טַבָּחִים
  english_pob_choice: the captain of the guard
  chosen_spanish: el capitán de la guardia
  alternatives_spanish:
  - el jefe de los verdugos
  - el capitán de la escolta real
  lexicon: HALOT
  rationale: El hebreo compuesto alude al oficial babilónico Nebuzaradán; en contexto narrativo militar/cortesano, la equivalencia idiomática más clara en español es «capitán de la guardia», evitando una literalidad extraña como «jefe de los matadores/verdugos».
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - llevó
  - apresó
  lexicon: HALOT
  rationale: «Tomó» conserva la simplicidad del verbo hebreo לקח y deja que el contexto de captura y traslado dé el matiz coercitivo; «apresó» sería más interpretativo.
- source_word: כֹּהֵן הָרֹאשׁ
  english_pob_choice: the chief priest
  chosen_spanish: el sumo sacerdote
  alternatives_spanish:
  - el sacerdote principal
  - el sacerdote jefe
  lexicon: HALOT
  rationale: Aunque el inglés POB optó por «chief priest», en español «sumo sacerdote» es la forma más natural y fiel para el oficial sacerdotal principal en este contexto histórico; mantiene la jerarquía sin sonar forzado. Se conserva la equivalencia funcional sin negar la estructura hebrea de «sacerdote, el principal».
- source_word: כֹּהֵן מִשְׁנֶה
  english_pob_choice: the second priest
  chosen_spanish: el segundo sacerdote
  alternatives_spanish:
  - el sacerdote suplente
  - el sacerdote de segundo rango
  lexicon: HALOT
  rationale: «Segundo sacerdote» refleja directamente מִשְׁנֶה como rango secundario. Se evita «suplente» por ser más interpretativo que el hebreo.
- source_word: שֹׁמְרֵי הַסַּף
  english_pob_choice: keepers of the threshold
  chosen_spanish: guardianes del umbral
  alternatives_spanish:
  - guardianes del pórtico
  - porteros
  lexicon: HALOT
  rationale: «Umbral» mantiene la imagen concreta de סַף y traduce con naturalidad el sustantivo hebreo; «guardianes» conserva el sentido de custodia de שֹׁמְרֵי. «Porteros» es una alternativa contextual, pero reduce la fuerza literal del término.
- source_word: שְׁלֹשֶׁת
  english_pob_choice: the three
  chosen_spanish: los tres
  alternatives_spanish:
  - tres
  lexicon: HALOT
  rationale: El artículo definido resulta natural en español y refleja que se trata de un grupo ya delimitado en la frase.
- source_word: שְׂרָיָה
  english_pob_choice: Seraiah
  chosen_spanish: Seraías
  alternatives_spanish:
  - Seraías
  lexicon: Transliteración bíblica estándar en español
  rationale: Se usa la forma castellana habitual del nombre propio, con acento gráfico para la pronunciación española.
- source_word: צְפַנְיָהוּ
  english_pob_choice: Zephaniah
  chosen_spanish: Sofonías
  alternatives_spanish:
  - Zefo nías
  lexicon: Transliteración bíblica estándar en español
  rationale: Se adopta la forma tradicional española del nombre profético y personal, más reconocible para lectores bíblicos en español.
theological_decisions:
- issue: Título sacerdotal principal
  english_pob_reading: chief priest
  chosen_spanish_reading: sumo sacerdote
  alternative_spanish_readings:
  - sacerdote principal
  - sacerdote jefe
  rationale: No hay una disputa doctrinal explícita en el verso, pero sí una elección terminológica. «Sumo sacerdote» comunica con precisión la función suprema del cargo en español bíblico sin alterar el sentido jerárquico del hebreo.
  doctrine_reference: Función sacerdotal en el culto israelita; no aplica una doctrina polémica específica.
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando explícitamente las notas [a] y [b] en el texto traducido. La redacción española también ajusta nombres propios a formas bíblicas estándar en español y mantiene el registro narrativo sobrio del original.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no lo contiene.
  - Se conserva el patrón POB de reflejar rangos y cargos con terminología funcional y clara para el lector español.
  - Las notas al pie están ancladas únicamente donde existe alternativa lexical real en el audit trail inglés, evitando notas flotantes.
