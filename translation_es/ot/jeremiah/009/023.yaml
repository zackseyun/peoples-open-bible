translation:
  language: es
  text: 'Pero el que se gloría, gloríese en esto: que entiende y me conoce, que yo soy Yahvé, que practico amor leal[a], justicia y rectitud en la tierra[b]; porque en estas cosas me complazco —declara Yahvé.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Amor leal» traduce aquí חֶסֶד, un término rico en sentido pactual que también puede expresarse como «amor constante», «misericordia» o «fidelidad pactual» según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «en la tierra». El hebreo אֶרֶץ puede referirse tanto a la tierra en general como a una tierra o territorio concreto; aquí el sentido más amplio encaja mejor con la afirmación universal sobre el carácter de Yahvé.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Más bien
  - Pero más bien
  - Sino que
  lexicon: HALOT
  rationale: En este contexto contrastivo, después de lo que no debe ser motivo de gloria, la partícula introduce la alternativa positiva. «Pero» reproduce bien la fuerza adversativa en español sin forzar una perífrasis más pesada.
- source_word: בְּזֹאת
  english_pob_choice: in this
  chosen_spanish: en esto
  alternatives_spanish:
  - en esto solamente
  - en esta cosa
  - en ello
  lexicon: HALOT
  rationale: El demostrativo apunta a lo que sigue en la cláusula de contenido. «En esto» mantiene la relación directa con el verbo de gloriarse y conserva la economía del hebreo.
- source_word: יִתְהַלֵּל / הַמִּתְהַלֵּל
  english_pob_choice: let the one who boasts boast
  chosen_spanish: el que se gloría, gloríese
  alternatives_spanish:
  - el que se jacta, jactese
  - el que se gloria, gloríese
  - el que presume, presuma
  lexicon: HALOT
  rationale: El verbo hitpael expresa autoexaltación o jactancia. «Gloriarse» es una opción bíblica y comprensible en español que preserva el eco retórico de la repetición verbal sin reducirlo a mera vanagloria.
- source_word: הַשְׂכֵּל
  english_pob_choice: understands
  chosen_spanish: entiende
  alternatives_spanish:
  - tiene discernimiento
  - obra sabiamente
  - toma entendimiento
  lexicon: HALOT
  rationale: Aquí el participio causativo se une a «y conoce a mí», de modo que el matiz es cognitivo-relacional. «Entiende» comunica esa percepción correcta sin desbordar el sentido hacia una aplicación moral no explicitada.
- source_word: וְיָדֹעַ אוֹתִי
  english_pob_choice: and knows me
  chosen_spanish: y me conoce
  alternatives_spanish:
  - y me reconoce
  - y sabe de mí
  - y tiene conocimiento de mí
  lexicon: HALOT
  rationale: ידע normalmente implica conocimiento relacional, no mera información. «Me conoce» conserva esa cercanía personal y la conexión del verbo con el conocimiento del Yahvé que habla.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Siguiendo la norma del proyecto, el Tetragrámaton se traduce como «Yahvé» en el texto principal, preservando el nombre propio divino en lugar de sustituirlo por un título.
- source_word: עֹשֶׂה
  english_pob_choice: who practices
  chosen_spanish: que practico
  alternatives_spanish:
  - que hago
  - que ejerzo
  - que obro
  lexicon: HALOT
  rationale: En primera persona, el participio expresa acción característica y habitual. «Practico» comunica una conducta constante y suena natural en español para introducir las cualidades pactuales de Dios.
- source_word: חֶסֶד
  english_pob_choice: steadfast love
  chosen_spanish: misericordia
  alternatives_spanish:
  - amor constante
  - amor leal
  - fidelidad amorosa
  lexicon: HALOT
  rationale: Aunque el POB inglés opta por «steadfast love», en español «misericordia» es un equivalente reverente y ampliamente inteligible; sin embargo, se reconoce que חסד también incluye lealtad pactual. Se preserva así la tensión semántica sin imponer un solo equivalente demasiado técnico.
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: justicia
  alternatives_spanish:
  - juicio
  - derecho
  - recto juicio
  lexicon: HALOT
  rationale: En la tríada con חסד y צדקה, «justicia» es el equivalente más claro para el orden moral y el gobierno recto de Dios.
- source_word: וּצְדָקָה
  english_pob_choice: righteousness
  chosen_spanish: rectitud
  alternatives_spanish:
  - justicia
  - equidad
  - justeza
  lexicon: HALOT
  rationale: Para mantener la distinción con מִשְׁפָּט y evitar repetir «justicia» dos veces, «rectitud» comunica bien el valor de conducta y conformidad moral que tiene צדקה en este paralelismo.
- source_word: בָּאָרֶץ
  english_pob_choice: in the earth
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - en el mundo
  - en la tierra / en el país
  lexicon: HALOT
  rationale: El hebreo permite tanto «tierra» en sentido global como «país/territorio». Dado el alcance universal de la afirmación sobre el carácter de Yahvé, «en la tierra» conserva amplitud sin limitarse a una región específica.
- source_word: כִּי בְאֵלֶּה חָפַצְתִּי
  english_pob_choice: for in these I delight
  chosen_spanish: porque en estas cosas me complazco
  alternatives_spanish:
  - porque en ellas me deleito
  - pues en estas me agrado
  - porque en ellas me complazco
  lexicon: HALOT
  rationale: חפץ expresa deleite o complacencia. «Me complazco» es formal y fiel; se añade «cosas» por claridad referencial en español, manteniendo el nexo con las cualidades mencionadas.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  - afirma Yahvé
  lexicon: HALOT
  rationale: La fórmula profética se expresa de manera solemne y natural en español con «declara Yahvé», conservando el cierre oracular sin recurrir a una traducción excesivamente arcaica.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme a la terminología del proyecto, el nombre propio divino se representa como «Yahvé» para preservar transparencia y evitar la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de בָּאָרֶץ
  english_pob_reading: in the earth
  chosen_spanish_reading: en la tierra
  alternative_spanish_readings:
  - en el país
  - en la tierra / en el país
  rationale: La frase funciona como afirmación amplia del modo en que Yahvé actúa. «En la tierra» conserva el alcance general y no restringe el dicho al territorio de Judá, aunque el hebreo también podría sugerir «en el país» en contextos más localizados.
  doctrine_reference: Jeremiah 9:23 lexical scope note
- issue: Valor semántico de חֶסֶד y la tríada ética
  english_pob_reading: steadfast love, justice, and righteousness
  chosen_spanish_reading: misericordia, justicia y rectitud
  alternative_spanish_readings:
  - amor constante, justicia y justicia
  - amor leal, justicia y rectitud
  - misericordia, derecho y justicia
  rationale: El inglés POB subraya la riqueza pactual de חֶסֶד. En español, «misericordia» es una equivalencia reverente y clara, pero se reconoce que el término también porta fidelidad leal. «Rectitud» para צדקה ayuda a evitar que la tríada se vuelva redundante y mantiene la distinción conceptual del paralelismo.
  doctrine_reference: Jeremiah 9:23 semantic note on חסד/משפט/צדקה
translation_notes:
  revision_awareness: Se tuvo en cuenta el audit trail inglés y la última pasada de revisión, que no introdujo cambios. La versión española conserva la estructura retórica del hebreo, el nombre divino como Yahvé, y mantiene explícita la amplitud semántica de אֶרֶץ y חֶסֶד mediante notas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - Se traduce ידע con «conoce» para conservar el matiz relacional.
  - Se evita «SEÑOR» como sustituto del nombre divino.
  - Se distingue «justicia» de «rectitud» para reflejar el paralelismo hebreo.
  - La puntuación reproduce el contraste inicial y el cierre profético con un guion largo antes de la fórmula declarativa.
