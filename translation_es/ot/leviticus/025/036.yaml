translation:
  language: es
  text: No tomes de él[a] interés ni ganancia, sino teme a tu Dios[b], y deja que tu hermano viva contigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'aumento' o 'provecho' para 'ganancia'; el hebreo combina dos términos relacionados para el cobro de intereses extraídos de un prestatario pobre.
    reason: lexical_alternative
  - marker: b
    text: '''Tu hermano'' aquí significa un miembro de la comunidad del pacto, no necesariamente un hermano biológico.'
    reason: cultural_note
lexical_decisions:
- source_word: אַל תִּקַּח
  english_pob_choice: Do not take
  chosen_spanish: No tomes
  alternatives_spanish:
  - No tomarás
  lexicon: HALOT
  rationale: La forma con אַל más imperfecto expresa prohibición; en español, el imperativo negativo de segunda persona singular transmite de manera natural y fiel la fuerza directiva del hebreo.
- source_word: מֵאִתּוֹ
  english_pob_choice: from him
  chosen_spanish: de él
  alternatives_spanish:
  - de él como acreedor
  - de su parte
  lexicon: HALOT
  rationale: La frase señala a la persona pobre o necesitada como fuente de donde se extraería la ganancia prohibida. 'De él' conserva la relación directa sin añadir aclaraciones no explicitadas en el texto.
- source_word: נֶשֶׁךְ
  english_pob_choice: interest
  chosen_spanish: interés
  alternatives_spanish:
  - usura
  lexicon: HALOT
  rationale: El término designa el cobro de interés sobre un préstamo. 'Interés' es la equivalencia moderna más clara; 'usura' puede sonar más fuerte en español, pero en uso actual suele implicar interés excesivo y no siempre refleja el término léxico con precisión.
- source_word: וְתַרְבִּית
  english_pob_choice: profit
  chosen_spanish: ganancia
  alternatives_spanish:
  - aumento
  - provecho
  lexicon: HALOT
  rationale: El par con נֶשֶׁךְ apunta a una suma añadida o incremento exigido al prestatario pobre. 'Ganancia' comunica bien el valor económico y mantiene la tensión ética del pasaje; 'aumento' es posible, pero menos idiomático en esta construcción.
- source_word: וְיָרֵאתָ מֵאֱלֹהֶיךָ
  english_pob_choice: but fear your God
  chosen_spanish: sino teme a tu Dios
  alternatives_spanish:
  - y teme a tu Dios
  lexicon: HALOT
  rationale: 'El waw introduce un contraste ético: en lugar de aprovecharte de él, debes temer a Dios. ''Sino'' reproduce ese contraste mejor que ''y'' y hace más clara la lógica exhortativa en español.'
- source_word: וְחֵי
  english_pob_choice: and let your brother live
  chosen_spanish: y deja que tu hermano viva
  alternatives_spanish:
  - y que tu hermano viva
  - para que tu hermano viva
  lexicon: HALOT
  rationale: La forma funciona en contexto como expresión volitiva/resultativa. 'Deja que viva' conserva la fuerza práctica de la exhortación sin forzar explícitamente un propósito que el ajuste auditado del inglés decidió no marcar con 'so that'.
- source_word: אָחִיךָ
  english_pob_choice: your brother
  chosen_spanish: tu hermano
  alternatives_spanish:
  - tu compatriota
  - tu prójimo
  lexicon: HALOT
  rationale: Se mantiene el parentesco literal del hebreo, que en la legislación levítica suele abarcar a un miembro de la comunidad del pacto. La opción 'hermano' preserva la fuerza familiar y covenantal del término.
- source_word: עִמָּךְ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - junto a ti
  - en medio de ti
  lexicon: HALOT
  rationale: '''Contigo'' es el equivalente más natural y directo en español, y expresa la convivencia o permanencia al lado del destinatario sin añadir matices espaciales no requeridos.'
theological_decisions:
- issue: Alcance comunitario de אָחִיךָ en legislación de santidad
  english_pob_reading: your brother here means a fellow member of the covenant community, not necessarily a biological brother.
  chosen_spanish_reading: tu hermano aquí significa un miembro de la comunidad del pacto, no necesariamente un hermano biológico.
  alternative_spanish_readings:
  - tu compatriota
  - tu correligionario
  rationale: La traducción principal conserva 'hermano' porque es el vocablo del hebreo y mantiene el tono familiar del mandato. La nota aclara el alcance comunitario para evitar que se lea restrictivamente como relación biológica.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
translation_notes:
  revision_awareness: 'La revisión auditada en inglés sustituyó una formulación de finalidad (''so that'') por una coordinación más directa (''and let'') para no introducir un propósito no explícito. Por eso la versión española evita ''para que'' y conserva una coordinación exhortativa simple: ''y deja que tu hermano viva contigo''.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como terminología de proyecto solo cuando el Tetragrámaton aparezca; este versículo no lo contiene.
  - Se preservó el paralelismo económico 'interés ni ganancia' para reflejar el par léxico hebreo נֶשֶׁךְ / תַרְבִּית.
  - Se usó segunda persona singular para concordar con la forma hebrea dirigida al destinatario individual dentro de la ley, sin perder su aplicación comunitaria.
