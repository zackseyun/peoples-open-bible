translation:
  language: es
  text: Nosotros hemos transgredido y nos hemos rebelado; tú no has perdonado[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tú no indultaste». El verbo hebreo es el término común para el perdón divino.
    reason: lexical_alternative
lexical_decisions:
- source_word: נַחְנוּ
  english_pob_choice: We
  chosen_spanish: Nosotros
  alternatives_spanish:
  - Nosotros mismos
  - Nosotros, por nuestra parte
  lexicon: HALOT
  rationale: 'El pronombre independiente se conserva de manera explícita para reflejar el énfasis y el contraste del hebreo: «nosotros ...; tú ...». En español, «Nosotros» mantiene esa fuerza sin sonar artificial.'
- source_word: פָשַׁעְנוּ
  english_pob_choice: have transgressed
  chosen_spanish: hemos transgredido
  alternatives_spanish:
  - hemos pecado
  - hemos quebrantado
  - hemos rebelado
  lexicon: HALOT
  rationale: פשע expresa transgresión/traición contra la autoridad; «transgredido» conserva el matiz legal y pactal que la POB inglesa quiso preservar con «transgressed».
- source_word: וּמָרִינוּ
  english_pob_choice: and rebelled
  chosen_spanish: nos hemos rebelado
  alternatives_spanish:
  - y hemos sido rebeldes
  - y hemos desafiado
  - y nos hemos sublevado
  lexicon: HALOT
  rationale: מרה añade la idea de rebeldía abierta. En español, el verbo reflexivo «nos hemos rebelado» reproduce bien la acción personal y la intensificación paralela, sin diluir el sentido.
- source_word: אַתָּה
  english_pob_choice: you
  chosen_spanish: tú
  alternatives_spanish:
  - tú mismo
  - vos
  lexicon: HALOT
  rationale: El hebreo mantiene el pronombre de segunda persona masculina singular para contraste directo con el «nosotros». «Tú» es la forma natural y reverente en español bíblico moderno.
- source_word: לֹא
  english_pob_choice: not
  chosen_spanish: 'no'
  alternatives_spanish:
  - no has
  - jamás
  lexicon: HALOT
  rationale: La negación simple se expresa de forma directa en español, unida al verbo para producir una frase idiomática y fiel.
- source_word: סָלָחְתָּ
  english_pob_choice: have not forgiven
  chosen_spanish: has perdonado
  alternatives_spanish:
  - has pardonado
  - perdonaste
  - no has dado perdón
  lexicon: HALOT
  rationale: 'סלח es el término habitual para el perdón divino. «Has perdonado» es la forma más natural en español y conserva la tensión del lamento: la falta de perdón se afirma sin suavizarla ni explicarla.'
theological_decisions:
- issue: Afirmación directa de la no concesión de perdón divino
  english_pob_reading: you have not forgiven
  chosen_spanish_reading: tú no has perdonado
  alternative_spanish_readings:
  - tú no has pardonado
  - tú no perdonaste
  rationale: 'Se conserva la fuerza del texto: el lamento habla directamente a Dios y afirma la ausencia de perdón sin resolverla ni atenuarla. La elección de la forma compuesta en español mantiene el peso resultativo del perfecto hebreo en contexto de queja.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'Concordancia alta con el audit trail inglés: se preservan el pronombre enfático, el paralelismo de dos verbos de culpa y la afirmación directa de que Dios no ha perdonado. No se introducen suavizaciones interpretativas ni terminología eclesiástica ajena al hebreo.'
  spanish_consistency_notes:
  - Se mantiene la distinción entre transgredir y rebelarse, evitando fusionar ambos verbos en un solo matiz.
  - Se usa el pronombre explícito «Nosotros / tú» para reflejar el contraste retórico del hebreo.
  - La forma verbal compuesta («hemos... / has...») conserva la referencia resultativa del perfecto en un registro natural para el español bíblico contemporáneo.
