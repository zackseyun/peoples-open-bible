translation:
  language: es
  text: El justo vigila continuamente su casa[a], para quitar el mal en su transgresión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «inspecciona», «supervisa» o «cuida». El griego presenta al justo examinando activamente su propia casa y tratando con el pecado, no como alguien moralmente descuidado.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπισκέπτεται
  english_pob_choice: watches over
  chosen_spanish: vigila
  alternatives_spanish:
  - inspecciona
  - supervisa
  - cuida
  lexicon: LSJ
  rationale: El verbo griego aquí expresa vigilancia activa sobre la propia casa, no una simple visita. «Vigila» comunica la atención continua y responsable que requiere el contexto doméstico y moral.
- source_word: διὰ παντός
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - siempre
  - constantemente
  - sin cesar
  lexicon: LSJ
  rationale: La expresión indica acción habitual y durativa. «Continuamente» conserva ese valor de persistencia de modo natural en español.
- source_word: ὁ δίκαιος
  english_pob_choice: the righteous
  chosen_spanish: el justo
  alternatives_spanish:
  - el justo varón
  - el recto
  - el hombre justo
  lexicon: LSJ
  rationale: El artículo y el singular masculino describen al justo como sujeto ejemplar. «El justo» es fiel al griego y fluye mejor que una expansión innecesaria.
- source_word: τοῦ ἐξᾶραι
  english_pob_choice: to remove
  chosen_spanish: para quitar
  alternatives_spanish:
  - para remover
  - para arrancar
  - para extirpar
  lexicon: LSJ
  rationale: El infinitivo articular expresa propósito. «Para quitar» es claro y suficientemente cercano al sentido de eliminar o apartar la maldad.
- source_word: ἀδικίαν
  english_pob_choice: wrongdoing
  chosen_spanish: la maldad
  alternatives_spanish:
  - la injusticia
  - el mal
  - la injusticia cometida
  lexicon: LSJ
  rationale: En este contexto de revisión moral del hogar, el término apunta a lo malo o errado en general. «Maldad» transmite bien la amplitud moral sin restringirlo solo a injusticia social.
- source_word: ἐν παραπτώματι αὐτοῦ
  english_pob_choice: in his transgression
  chosen_spanish: en su transgresión
  alternatives_spanish:
  - en su falta
  - por causa de su transgresión
  - en su caída
  lexicon: LSJ
  rationale: La frase posesiva sugiere que la transgresión pertenece al mismo justo. «En su transgresión» mantiene esa tensión sin resolverla, y deja abierta la relación circunstancial del sintagma griego.
theological_decisions:
- issue: Si el justo puede incurrir en falta
  english_pob_reading: The verse allows that the righteous man may commit a trespass and then acts to remove wrongdoing.
  chosen_spanish_reading: La traducción deja abierto que el justo pueda incurrir en una transgresión y, en respuesta, quitar la maldad de su casa.
  alternative_spanish_readings:
  - Una lectura que presente al justo como moralmente impecable
  - Una lectura que opaque de quién es la transgresión
  rationale: El posesivo αὐτοῦ en παραπτώματι αὐτοῦ permite entender que la transgresión pertenece al justo. La redacción española preserva esa tensión teológica en vez de suavizarla.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla
- issue: Relación entre vigilancia doméstica y purificación moral
  english_pob_reading: The righteous man is actively examining his own household and dealing with sin.
  chosen_spanish_reading: El justo aparece como alguien que ejerce vigilancia activa sobre su casa para apartar el mal.
  alternative_spanish_readings:
  - El justo visita su casa
  - El justo observa su casa sin implicación moral
  rationale: La escena no describe una visita social, sino una supervisión moral del propio ámbito doméstico. «Vigila» conserva la dimensión de examen activo implícita en ἐπισκέπτεται.
  doctrine_reference: Cuidado moral del hogar y arrepentimiento práctico
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del texto inglés, que ajustó ἐπισκέπτεται a «watches over» y ἐν παραπτώματι αὐτοῦ a «in his transgression». La versión española refleja esas decisiones con «vigila continuamente» y «en su transgresión», manteniendo la tensión de quién padece o posee la falta.
  spanish_consistency_notes:
  - Se mantiene «justo» para ὁ δίκαιος, en paralelo con la preferencia inglesa por un singular masculino sin añadir «hombre» innecesariamente.
  - «Maldad» traduce ἀδικίαν como término moral amplio, sin reducirlo a injusticia social.
  - «Transgresión» conserva el matiz de falta personal y evita resolver la ambigüedad del posesivo griego.
  - Se evita «SEÑOR» u այլ terminología litúrgica porque no aparece aquí el nombre divino ni κύριος.
