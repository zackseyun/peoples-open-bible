translation:
  language: es
  text: Y Laban dio a Raquel, su hija, a Bilha[a], su sierva, como su sierva.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «criada» para ambas ocurrencias del hebreo שִׁפְחָה.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  english_pob_choice: gave
  chosen_spanish: dio
  alternatives_spanish:
  - entregó
  - dio en posesión
  lexicon: HALOT
  rationale: El verbo נתן en este contexto narrativo expresa una acción pasada simple; «dio» es la correspondencia más natural y directa en español, sin añadir matices que el hebreo no exige.
- source_word: לָבָן
  english_pob_choice: Laban
  chosen_spanish: Laban
  lexicon: convención onomástica
  rationale: Nombre propio transliterado de forma estándar.
- source_word: לְרָחֵל
  english_pob_choice: to Rachel
  chosen_spanish: a Raquel
  alternatives_spanish:
  - para Raquel
  lexicon: HALOT
  rationale: La preposición ל marca aquí destino/recipiento; en español, «a Raquel» refleja bien la relación sintáctica y el movimiento de la entrega.
- source_word: בִּתּוֹ
  english_pob_choice: his daughter
  chosen_spanish: su hija
  alternatives_spanish:
  - la hija de él
  lexicon: HALOT
  rationale: El sufijo posesivo de tercera persona se expresa de manera natural en español con «su hija», manteniendo la referencia a Laban.
- source_word: בִּלְהָה
  english_pob_choice: Bilhah
  chosen_spanish: Bilha
  alternatives_spanish:
  - Bilhá
  lexicon: convención onomástica
  rationale: Se translitera el nombre propio en forma española estándar y legible; se evita la acentuación no sustentada por el texto fuente.
- source_word: שִׁפְחָתוֹ / לְשִׁפְחָה
  english_pob_choice: his female servant / female servant
  chosen_spanish: su sierva / como su sierva
  alternatives_spanish:
  - su criada
  - su sirvienta
  - como criada
  lexicon: HALOT
  rationale: El inglés POB eligió «female servant» para preservar la fuerza léxica de שִׁפְחָה sin suavizarla. En español, «sierva» conserva esa fuerza con registro bíblico y claro. Mantengo la repetición del término en ambas apariciones para reflejar la reiteración del hebreo.
translation_notes:
  revision_awareness: La traducción española sigue de cerca el paquete fuente hebreo y el rastro de auditoría en inglés, sin cambios revisionales aplicados en el registro base; se conserva la repetición léxica de שִׁפְחָה y la estructura de destinatario + posesión + propósito.
  spanish_consistency_notes:
  - Se mantiene «Y» al inicio para reproducir la continuidad narrativa del hebreo.
  - «Sierva» se usa de forma consistente para שִׁפְחָה, evitando alternar con términos más suaves que diluirían la fuerza léxica.
  - Se preserva el orden natural del español sin perder la relación de entrega a Raquel ni la función duplicada del sustantivo final.
