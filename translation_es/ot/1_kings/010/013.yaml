translation:
  language: es
  text: Y el rey Salomón dio a la reina de Saba todo lo que ella deseaba, todo lo que pidió, además de lo que le dio conforme a la mano del rey Salomón[a]. Entonces se volvió y fue a su tierra, ella y sus siervos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «conforme a la mano del rey Salomón», expresión idiomática que indica según sus medios, capacidad o generosidad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נָתַן
  english_pob_choice: gave
  chosen_spanish: dio
  alternatives_spanish:
  - entregó
  - concedió
  lexicon: HALOT
  rationale: נָתַן es el verbo básico de dar; «dio» es la equivalencia directa y natural en español, adecuada para ambas ocurrencias del versículo.
- source_word: מַלְכַּת שְׁבָא
  english_pob_choice: the queen of Sheba
  chosen_spanish: la reina de Saba
  alternatives_spanish:
  - la reina de Sheba
  lexicon: HALOT
  rationale: Se conserva el título real y se hispaniza el topónimo conforme al uso bíblico en español, sin alterar el referente.
- source_word: כָּל חֶפְצָהּ
  english_pob_choice: all that she desired
  chosen_spanish: todo lo que ella deseaba
  alternatives_spanish:
  - toda su voluntad
  - todo su deseo
  lexicon: HALOT
  rationale: חֵפֶץ puede expresar deseo o aquello que se desea. La redacción elegida comunica el sentido de forma clara y natural sin perder el alcance total del hebreo.
- source_word: אֲשֶׁר שָׁאָלָה
  english_pob_choice: whatever she asked
  chosen_spanish: todo lo que pidió
  alternatives_spanish:
  - lo que pidió
  - cuanto pidió
  lexicon: HALOT
  rationale: שׁאל significa pedir o solicitar. «Todo lo que pidió» mantiene la amplitud del relativo y su fuerza comprehensiva.
- source_word: מִלְּבַד
  english_pob_choice: besides
  chosen_spanish: además de
  alternatives_spanish:
  - aparte de
  - sin contar
  lexicon: HALOT
  rationale: La partícula introduce adición/exceptuación. «Además de» es la opción más natural en español y conserva la relación sintáctica.
- source_word: כְּיַד הַמֶּלֶךְ שְׁלֹמֹה
  english_pob_choice: according to the hand of King Solomon
  chosen_spanish: conforme a la mano de rey Salomón
  alternatives_spanish:
  - según la mano del rey Salomón
  - según los medios del rey Salomón
  - conforme a la generosidad del rey Salomón
  lexicon: HALOT
  rationale: Se preserva la imagen hebrea «mano» sin expandirla interpretativamente. En español suena idiomático con «conforme a», y la nota explica el sentido de capacidad/generosidad implícito en el hebreo.
- source_word: וַתֵּפֶן
  english_pob_choice: she turned
  chosen_spanish: se volvió
  alternatives_spanish:
  - dio la vuelta
  - se giró
  lexicon: HALOT
  rationale: El verbo significa volverse/voltear. «Se volvió» conserva el movimiento narrativo sin forzar una interpretación adicional.
- source_word: וַתֵּלֶךְ לְאַרְצָהּ
  english_pob_choice: went to her own land
  chosen_spanish: fue a su tierra
  alternatives_spanish:
  - regresó a su tierra
  - volvió a su tierra
  lexicon: HALOT
  rationale: El hebreo indica movimiento hacia su país/tierra. «Su tierra» expresa el destino propio de manera breve y fiel; el verbo «fue» evita añadir explícitamente el matiz de retorno que el texto no dice de forma directa.
- source_word: וַעֲבָדֶיהָ
  english_pob_choice: her servants
  chosen_spanish: sus siervos
  alternatives_spanish:
  - sus servidores
  - sus criados
  lexicon: HALOT
  rationale: עֲבָדִים puede ser «siervos» o «esclavos» según contexto. Aquí, en un marco cortesano, «siervos» mantiene la referencia personal y subordinada sin imponer la dureza de «esclavos» como foco principal.
theological_decisions:
- issue: El valor de כְּיַד הַמֶּלֶךְ שְׁלֹמֹה
  english_pob_reading: according to the hand of King Solomon
  chosen_spanish_reading: conforme a la mano de rey Salomón
  alternative_spanish_readings:
  - según los medios del rey Salomón
  - según la generosidad del rey Salomón
  rationale: 'No es un asunto doctrinal, pero sí hermenéutico: la expresión hebrea es idiomática y señala capacidad, recursos o liberalidad. La traducción conserva la metáfora «mano» y deja el sentido explicativo en la nota para no borrar la tensión textual.'
  doctrine_reference: Translation philosophy §1, §6
- issue: El término עֲבָדֶיהָ en contexto real
  english_pob_reading: her servants
  chosen_spanish_reading: sus siervos
  alternative_spanish_readings:
  - sus servidores
  - sus acompañantes
  rationale: En este contexto narrativo la palabra describe al séquito de la reina. «Siervos» es suficientemente literal y no obliga a leer la relación social más allá de lo que el versículo afirma.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La versión española sigue el último estado revisado del POB en inglés, pero conserva la metáfora hebrea «la mano de rey Salomón» en lugar de una paráfrasis como «la generosidad de Salomón», para alinearse mejor con el audit trail que prefirió una lectura más literal y auditable. También se ajustó «went to her own land» a «fue a su tierra» para mantener naturalidad en español sin añadir más que el hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma por defecto cuando el texto lo requiera, pero este versículo no contiene el nombre divino.
  - Se emplea «siervos» para עֲבָדִים en contexto cortesano, coherente con el criterio del proyecto de no imponer «esclavos» cuando el contexto no lo exige.
  - Se conserva la imagen hebrea «mano» en la frase idiomática clave y se explica en nota para mantener transparencia textual.
