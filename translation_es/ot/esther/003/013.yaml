    reason: lexical_alternative
  - marker: c
    text: Or 'from young to old.' The Hebrew is literally 'from young man to old man,' used distributively for the whole population.
    reason: lexical_alternative
  - marker: d
    text: Or 'to seize their goods as plunder.'
    reason: lexical_alternative
