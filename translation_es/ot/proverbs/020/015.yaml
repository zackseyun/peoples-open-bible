translation:
  language: es
  text: Hay oro[a] y gran abundancia de perlas, pero los labios con conocimiento son una vasija preciosa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rubíes», «corales» o, en general, «gemas preciosas» para פְּנִינִים; el referente exacto es incierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵשׁ
  english_pob_choice: There is
  chosen_spanish: Hay
  alternatives_spanish:
  - Existe
  - Se encuentra
  lexicon: HALOT
  rationale: La partícula existencial se expresa de manera natural en español con «hay». Conserva la observación proverbial sin añadir matices que no están en el hebreo.
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - oro fino
  - metal precioso
  lexicon: HALOT
  rationale: Término material directo; «oro» es la equivalencia natural y fiel en español.
- source_word: וְרָב פְּנִינִים
  english_pob_choice: and an abundance of pearls
  chosen_spanish: y gran abundancia de perlas
  alternatives_spanish:
  - y muchas perlas
  - y abundancia de gemas preciosas
  lexicon: HALOT
  rationale: «רָב» expresa gran cantidad; «gran abundancia de» conserva el énfasis y suena idiomático. Para פְּנִינִים, «perlas» sigue la opción del POB inglés y mantiene la incertidumbre lexical sin forzar una identificación más específica.
- source_word: וּכְלִי יְקָר
  english_pob_choice: a precious vessel
  chosen_spanish: un vaso precioso
  alternatives_spanish:
  - un recipiente precioso
  - un objeto precioso
  - una pieza preciosa
  lexicon: HALOT
  rationale: '«כְלִי» tiene un campo amplio: vaso, recipiente, utensilio, objeto. En este proverbio la imagen concreta se conserva mejor con «vaso» que con una abstracción como «objeto», y «precioso» refleja יְקָר.'
- source_word: שִׂפְתֵי דָעַת
  english_pob_choice: lips of knowledge
  chosen_spanish: los labios de conocimiento
  alternatives_spanish:
  - labios conocedores
  - los labios que tienen conocimiento
  lexicon: HALOT
  rationale: 'Se mantiene la construcción genitiva hebrea para preservar la textura poética: no se suaviza a una paráfrasis como «palabras sabias». «Conocimiento» traduce דָעַת de forma directa.'
translation_notes:
  revision_awareness: El texto inglés del POB se mantuvo sin cambios en la revisión más reciente; la versión española sigue esa misma lectura y conserva la incertidumbre lexical señalada para פְּנִינִים mediante nota.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» solo cuando corresponde al Tetragrámaton; aquí no aparece.
  - Se conservó el paralelismo proverbial con una sintaxis breve y directa.
  - «Vaso» mantiene la imagen concreta de כְלִי sin introducir una interpretación excesiva.
