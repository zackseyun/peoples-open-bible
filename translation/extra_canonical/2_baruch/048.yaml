    After seven days, when the seventh day had passed, I prayed before the Mighty One and said:[a]
    
    “O Lord, you summon the coming of the times, and they stand before you. You shift the dominion of the ages, and they do not resist you. You arrange the order of the times, and they obey you. You alone know the span of the generations, and you do not reveal your mysteries to many. You make known the multitude of the fire, and you weigh the swiftness of the mighty wind. You search out the end of the times, and you examine the storehouses of deep darkness. You appoint the number of those who pass away and of those who are preserved, and you reveal the dwellings of those who are yet to be. You uncover the thought of the living creatures, and the things hidden from the ages do not escape you. You command the flames by a spirit of fear and indignation, and they are changed into winds. By your word you cause what did not exist to stand, and by the power of your understanding you hold fast what exists. By your sweetness you make wise the bitter things of your law.
    
    “Numberless are those who have abandoned them, and in their multitude they have gone down into destruction and have made themselves adversaries, because they forsook you and sought what was not for their good. But as for us, all the more as time passes, we know that we did not become like them, because they did not know your ways and were not able to understand your judgment. For what is our life? We have not forsaken our fathers who perished, nor have we turned aside to death and the end of all. Look upon this people that has been left to you, and save those who remain from among them for you. Do not shatter the hope of your people, and do not cut short the times of your help. For this is the people whom you chose, and this is the people for whom no equal can be found. But now I will speak before you, and I will say what my heart thinks. In you we trust, for behold, your law is with us, and we know that we shall not fall so long as we hold fast your statutes. We shall be blessed at least in this: that we have not been mixed with the nations. For we are one renowned people, who received one law from One; and the law that is among us will help us, and the surpassing wisdom that is in us will aid us.”
    
    When I had prayed and spoken these things, I was greatly weakened. And he answered and said to me:[b]
    
    “You have prayed plainly, O Baruch, and all your words have been heard. But my judgment claims its own, and my law claims its right. For from your own will you speak, and from your own mind you converse with me. For this is man, that he should not be anything that is corruptible, and men as those who are created from nothing. And my grace will not be broken, and the darkness will not help my spirit. Therefore you will surely be taken up, as I told you before. And I will show you what I told you. For the time of recompenses will come, and it will reveal itself with the outgoings of joys; but there will also be those who come in the deep darkness. In those days they will see one another amid many destructions, one upon another, because they did not know what was mine. For in that time not many wise will be found, and those who have understanding will be few; even those who know will keep silent. Many will die before their time, and untimely births will be seen, and firstborn children will be born before their time. Their sons will be empty, and their offspring will be marked out. People will become false, and some will die in faith under affliction, while others will prepare thanksgiving and then again be established in shame. Many sayings will be spoken by those who think themselves righteous, yet the mark of error will be shown upon those who had not expected it, and pain will seize those who had been at ease. Many will be seen in wrath, and by it they will be brought to ruin. Then the disclosure of those times will be revealed in the full measure of their sins, because those times had been prepared and were passing away, while they were perishing in their thoughts and did not perceive the torment of destruction. Therefore the fire consumed them. Yet for those who are truly mine there remains much hope; for though in the passing world in which you now live the gain is small and brief, in the world that has no end there is far more hope. They will inherit the great light.”[c]
