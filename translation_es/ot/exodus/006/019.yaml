translation:
  language: es
  text: 'Y los hijos de Merari: Mahli y Mushi. Estos son los clanes de Leví[a] según sus generaciones.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "las familias del levita" o "los clanes de Leví". El singular hebreo "el levita" probablemente funciona aquí de manera colectiva para la línea levítica.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְנֵ֥י
  english_pob_choice: And the sons of
  chosen_spanish: Y los hijos de
  alternatives_spanish:
  - Y los hijos de
  - Y los descendientes de
  - Y los hijos varones de
  lexicon: HALOT
  rationale: En genealogías, בְּנֵי suele introducir descendencia masculina o línea familiar. En español, 'hijos de' conserva el giro genealógico y el paralelismo de lista con la conjunción inicial.
- source_word: מְרָרִ֖י
  english_pob_choice: Merari
  chosen_spanish: Merari
  alternatives_spanish:
  - Merari
  lexicon: N/A nombre propio
  rationale: Nombre propio transliterado de forma estándar.
- source_word: מַחְלִ֣י
  english_pob_choice: Mahli
  chosen_spanish: Mahli
  alternatives_spanish:
  - Mahli
  lexicon: N/A nombre propio
  rationale: Nombre propio transliterado de forma estándar.
- source_word: וּ/מוּשִׁ֑י
  english_pob_choice: and Mushi
  chosen_spanish: y Mushi
  alternatives_spanish:
  - y Mushi
  lexicon: N/A nombre propio
  rationale: Nombre propio transliterado y unido con la conjunción española para mantener la estructura de lista.
- source_word: אֵ֛לֶּה
  english_pob_choice: These are
  chosen_spanish: Estos son
  alternatives_spanish:
  - Estos son
  - Son estos
  lexicon: HALOT
  rationale: El demostrativo introduce una cláusula identificativa. En español, la copulativa explícita es natural y fiel al valor identificador del hebreo.
- source_word: מִשְׁפְּחֹ֥ת
  english_pob_choice: the clans
  chosen_spanish: los clanes
  alternatives_spanish:
  - las familias
  - los clanes
  lexicon: HALOT
  rationale: En contexto genealógico/tribal, מִשְׁפָּחוֹת alude a subdivisiones de parentesco. 'Clanes' reproduce mejor el matiz técnico que 'familias'.
- source_word: הַ/לֵּוִ֖י
  english_pob_choice: of Levi
  chosen_spanish: de Leví
  alternatives_spanish:
  - de Leví
  - del levita
  - de los levitas
  lexicon: HALOT
  rationale: La revisión inglesa prefirió 'Levi' para reflejar el nombre propio hebreo. En español, 'Leví' evita la posible lectura de un individuo genérico ('el levita') y conserva la línea tribal.
- source_word: לְ/תֹלְדֹתָֽ/ם
  english_pob_choice: according to their generations
  chosen_spanish: según sus generaciones
  alternatives_spanish:
  - según sus generaciones
  - por sus generaciones
  - de acuerdo con sus generaciones
  lexicon: HALOT
  rationale: תּוֹלְדוֹת en fórmulas genealógicas expresa líneas de descendencia. 'Según sus generaciones' mantiene el registro formal y la relación genealógica sin sobreexplicar.
theological_decisions:
- issue: Referencia a Leví como nombre tribal frente a 'el levita'
  english_pob_reading: of Levi
  chosen_spanish_reading: de Leví
  alternative_spanish_readings:
  - del levita
  - de los levitas
  rationale: El hebreo usa el nombre propio con artículo, y la auditoría inglesa corrigió 'the Levite' para evitar una lectura individual. 'Leví' en español preserva el referente tribal y la tensión morfosintáctica sin desviarse al plural no marcado del contexto.
  doctrine_reference: Descendencia tribal/lineal de Israel; uso genealógico del nombre propio.
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó 'the Levite' por 'Levi' para ajustarse al nombre propio hebreo y evitar una lectura individual. La versión española sigue esa decisión con 'Leví' y mantiene el valor genealógico de מִשְׁפָּחוֹת como 'clanes'.
  spanish_consistency_notes:
  - Se conserva la conjunción inicial 'Y' para reflejar la secuencia genealógica del hebreo.
  - '''Leví'' se usa como nombre propio de la línea tribal, no como sustantivo genérico.'
  - '''Clanes'' se mantiene por coherencia con el valor técnico de מִשְׁפָּחוֹת en contextos genealógicos.'
  - La nota al pie recoge la alternativa 'familias' por ser la principal oscilación léxica del término en español.
