    text: Or, 'The LORD of hosts, the God of Israel, is Israel’s God.' The Hebrew reads more literally, 'is God for Israel.'
    reason: lexical_alternative
  - marker: b
    text: '''House'' here carries the sense of David’s royal house or dynasty.'
    reason: cultural_note
