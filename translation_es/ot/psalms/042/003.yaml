translation:
  language: es
  text: Mi alma tiene sed de Dios[a], del Dios vivo. ¿Cuándo vendré y me presentaré ante Dios?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «el rostro de Dios».
    reason: lexical_alternative
lexical_decisions:
- source_word: צָמְאָה
  english_pob_choice: thirsts
  chosen_spanish: tiene sed
  alternatives_spanish:
  - está sedienta
  - tiene sed intensa
  lexicon: HALOT
  rationale: El hebreo expresa la metáfora concreta de la sed; en español, «tiene sed» comunica de forma natural y fiel el deseo persistente sin perder la imagen corporal.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - yo
  - mi vida
  - mi ser
  lexicon: HALOT
  rationale: «נפשׁ» puede referirse al alma, la vida o la persona. En este lamento poético, «mi alma» preserva el foco interior y la idiomaticidad bíblica, en línea con el inglés POB.
- source_word: לֵאלֹהִים
  english_pob_choice: for God
  chosen_spanish: de Dios
  alternatives_spanish:
  - para Dios
  - hacia Dios
  lexicon: HALOT
  rationale: Con la metáfora de la sed, el hebreo marca el objeto del anhelo. En español, «tener sed de» expresa con naturalidad ese valor relacional y desiderativo mejor que una preposición más literal.
- source_word: לְאֵל חָי
  english_pob_choice: for the living God
  chosen_spanish: del Dios vivo
  alternatives_spanish:
  - del Dios viviente
  - de un Dios vivo
  - del Dios que vive
  lexicon: HALOT
  rationale: La expresión fija «אֵל חָי» se traduce de forma natural como «Dios vivo». Se conserva la definitud del inglés POB y la fuerza teológica de Dios como el que vive.
- source_word: מָתַי
  english_pob_choice: When
  chosen_spanish: ¿Cuándo
  alternatives_spanish:
  - ¿Hasta cuándo
  - ¿En qué momento
  lexicon: HALOT
  rationale: El interrogativo temporal pide en español la forma simple «¿Cuándo?». Aunque el tono es lamentativo, el matiz queda sostenido por el contexto completo.
- source_word: אָבוֹא
  english_pob_choice: shall I come
  chosen_spanish: vendré
  alternatives_spanish:
  - iré
  - podré venir
  - he de venir
  lexicon: HALOT
  rationale: El imperfecto en esta pregunta expresa expectativa futura. «Vendré» mantiene la orientación al acceso anhelado sin sobrecargar la frase con modalizaciones ajenas al hebreo.
- source_word: וְאֵרָאֶה
  english_pob_choice: and appear
  chosen_spanish: me presentaré
  alternatives_spanish:
  - apareceré
  - seré visto
  - me veré
  lexicon: HALOT
  rationale: El nifal de ראה en este contexto cultual indica presentarse ante la presencia divina. «Me presentaré» comunica el sentido de acceso reverente, evitando una ambigüedad innecesaria en español.
- source_word: פְּנֵי אֱלֹהִים
  english_pob_choice: before God
  chosen_spanish: ante Dios
  alternatives_spanish:
  - delante de Dios
  - ante el rostro de Dios
  - frente a Dios
  lexicon: HALOT
  rationale: La expresión literal es «el rostro de Dios», pero el sentido idiomático es estar en su presencia. «Ante Dios» preserva esa fuerza sin sugerir una visión física de la esencia divina.
theological_decisions:
- issue: Idioma cultual de «ver el rostro de Dios»
  english_pob_reading: before God
  chosen_spanish_reading: ante Dios
  alternative_spanish_readings:
  - ante el rostro de Dios
  - ver el rostro de Dios
  rationale: El versículo expresa anhelo de acceso a la presencia de Dios, probablemente en contexto de adoración/peregrinación. «Ante Dios» conserva el valor relacional y cultual del hebreo sin absolutizar una visión literal de la esencia divina.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios respecto al pasaje base; se mantiene la solución idiomática para פְּנֵי אֱלֹהִים con transparencia en nota.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים y «Dios vivo» para אֵל חָי, siguiendo el uso estable del proyecto.
  - La metáfora de la sed se conserva con una construcción natural en español («tiene sed de»), evitando una paráfrasis excesiva.
  - La nota al pie preserva la alternativa literal «rostro de Dios» para transparencia auditiva.
