lexical_decisions:
- source_word: קֶדֶשׁ
  english_pob_choice: Kedesh
  chosen_spanish: Quedés
  alternatives_spanish:
  - Kades
  - Kedés
  lexicon: HALOT
  rationale: Es un nombre propio de lugar en una lista geográfica; por eso se translitera. Se prefiere «Quedés» como adaptación española natural del valor vocálico y consonántico del hebreo, manteniendo la referencia nominal sin traducir su sentido léxico.
- source_word: חָצוֹר
  english_pob_choice: Hazor
  chosen_spanish: Hazor
  alternatives_spanish:
  - Jazor
  lexicon: HALOT
  rationale: Nombre propio de lugar; se conserva la transliteración estándar. No hay base contextual para verter el nombre por su posible significado léxico.
- source_word: יִתְנָן
  english_pob_choice: Ithnan
  chosen_spanish: Itnán
  alternatives_spanish:
  - Yitnán
  - Jitnán
  lexicon: HALOT
  rationale: Nombre propio de lugar; se translitera en forma reconocible para el lector hispano. «Itnán» refleja la adaptación moderna del hebreo con acento español, sin añadir contenido no presente en el texto.
- source_word: וְ
  english_pob_choice: and
  chosen_spanish: e
  alternatives_spanish:
  - y
  lexicon: Gramática del español
  rationale: La conjunción hebrea coordina una simple serie de nombres; en español, «e» es la forma eufónica correcta ante «Itnán».
