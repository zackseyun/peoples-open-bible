review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la sintaxis y el sentido general del hebreo: quitar/apartar la עולה para darla por divisiones de casas paternas a los hijos del pueblo, a fin de presentarla a Yahvé, conforme al libro de Moisés, y del mismo modo con el ganado vacuno. Sin embargo, hay dos ajustes importantes: (1) הָעֹלָה se entiende colectivamente, pero en español bíblico natural aquí conviene ''los holocaustos'' más que ''las ofrendas quemadas'', porque el contexto es técnico-sacrificial y la cláusula final ''y así también con el ganado'' presupone animales preparados para ofrecerse; (2) el pronombre de ''presentarlas'' queda algo ambiguo respecto del antecedente y puede simplificarse con ''para presentarlos''.'
  spanish_quality_summary: El español es claro y digno, pero 'ofrendas quemadas' suena algo perifrástico y menos idiomático en un contexto cultual del AT. 'Ellos' también es innecesario en español. 'Según las casas paternas' puede mantenerse, aunque 'por divisiones de las casas paternas' refleja mejor la cadena hebrea. La nota al pie está bien formulada y útil.
  glossary_alignment: Se mantiene correctamente 'Yahvé' para יהוה. La conservación de 'los hijos del pueblo' concuerda con la política de género-precisión y con la nota explicativa. No hay otros conflictos mayores de glosario; el ajuste principal es terminológico para עֹלָה, donde 'holocaustos' expresa mejor el término sacrificial establecido en español bíblico que 'ofrendas quemadas'.
  issues:
  - severity: medium
    issue: '''las ofrendas quemadas'' para הָעֹלָה'
    rationale: Aunque es comprensible, en español bíblico resulta menos natural y menos preciso que 'los holocaustos' en un contexto técnico-sacrificial. El hebreo עלה es el término sacrificial establecido y aquí funciona colectivamente.
  - severity: low
    issue: Pronombre en 'para presentarlas a Yahvé'
    rationale: El antecedente inmediato puede percibirse como 'las ofrendas', pero el flujo de la frase en español queda más limpio con 'para presentarlos a Yahvé' si se adopta 'los holocaustos'.
  - severity: low
    issue: '''Ellos'' explícito al inicio'
    rationale: No es incorrecto, pero en español narrativo bíblico suena más natural omitir el pronombre sujeto no enfático.
  revised_spanish_text: Apartaron los holocaustos, para darlos por divisiones de las casas paternas a los hijos del pueblo[a], para presentarlos a Yahvé, como está escrito en el libro de Moisés; y así también con el ganado.
  revised_footnotes:
  - marker: a
    text: O «al pueblo» o «a los laicos». El hebreo dice literalmente «a los hijos del pueblo», una expresión basada en clanes que distingue a la población general de los sacerdotes y levitas.
    reason: lexical_alternative
  revision_rationale: Se revisa para usar el término sacrificial español más natural y preciso ('holocaustos') para עֹלָה, mejorar levemente la sintaxis española ('de las casas paternas') y anclar correctamente la nota en 'los hijos del pueblo'. No se requiere adjudicación especial.
