translation:
  language: es
  text: Así que Isaac se fue de allí, acampó en el Valle de Gerar[a] y se estableció allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «wadi de Gerar». El término hebreo puede referirse a un cauce estacional, barranco o valle.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: went away
  chosen_spanish: se fue
  alternatives_spanish:
  - se marchó
  - partió
  lexicon: HALOT
  rationale: El hebreo narrativo indica salida o alejamiento del lugar anterior. «Se fue» es natural en español y comunica el movimiento de salida que la versión inglesa expresó con «went away».
- source_word: מִשָּׁם
  english_pob_choice: from there
  chosen_spanish: de allí
  alternatives_spanish:
  - desde allí
  - de ese lugar
  lexicon: HALOT
  rationale: La referencia deíctica es directa y simple. «De allí» conserva la relación con el lugar previo sin añadir matiz innecesario.
- source_word: וַיִּחַן
  english_pob_choice: camped
  chosen_spanish: acampó
  alternatives_spanish:
  - hizo campamento
  - puso su campamento
  lexicon: HALOT
  rationale: חנה significa establecer campamento. «Acampó» es la forma breve y moderna que mejor reproduce esa acción narrativa.
- source_word: בְּנַחַל גְּרָר
  english_pob_choice: in the Valley of Gerar
  chosen_spanish: en el Valle de Gerar
  alternatives_spanish:
  - en el wadi de Gerar
  - en el barranco de Gerar
  - en el cauce de Gerar
  lexicon: HALOT
  rationale: נחל puede referirse a wadi, cauce estacional, barranco o valle. En español, «Valle de Gerar» comunica bien un topónimo geográfico sin exigir un tecnicismo al lector general, aunque la nota conserva la alternativa semántica.
- source_word: וַיֵּשֶׁב
  english_pob_choice: settled
  chosen_spanish: se estableció
  alternatives_spanish:
  - se quedó
  - habitó
  - moró
  lexicon: HALOT
  rationale: ישב aquí expresa asentarse o tomar residencia después de acampar. «Se estableció» preserva esa progresión narrativa mejor que un simple «se quedó» y evita arcaísmos.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  lexicon: HALOT
  rationale: El adverbio locativo retoma el lugar mencionado. «Allí» es la correspondencia más natural y sobria en español.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca la lectura inglesa auditada y la fuente hebrea, sin cambios de revisión aplicados; se conserva la secuencia narrativa: salida, campamento y establecimiento.'
  spanish_consistency_notes:
  - Se mantiene «Isaac» para יִצְחָק, siguiendo la convención bíblica española estándar.
  - Se usa el tiempo narrativo pasado simple para corresponder al hebreo consecutivo en una narración histórica.
  - «Valle de Gerar» se eligió como solución principal legible; la nota preserva la ambigüedad léxica de נחל.
  - No se introduce terminología eclesiástica ni interpretativa ajena al texto.
