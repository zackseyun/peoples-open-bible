lexical_decisions:
- source_word: אַךְ
  english_pob_choice: Only
  chosen_spanish: Sólo
  alternatives_spanish:
  - Pero
  - Sin embargo
  - Únicamente
  lexicon: HALOT
  rationale: אַךְ restringe la condición del acuerdo; «Sólo» conserva la exclusividad y funciona con naturalidad en español.
- source_word: בְּזֹאת
  english_pob_choice: on this condition
  chosen_spanish: bajo esta condición
  alternatives_spanish:
  - en esto
  - por esto
  - con esta condición
  lexicon: HALOT
  rationale: La expresión introduce la estipulación específica para el consentimiento. «Bajo esta condición» comunica bien el valor idiomático sin volverlo áspero.
- source_word: נֵאוֹת
  english_pob_choice: will we agree
  chosen_spanish: estaremos de acuerdo
  alternatives_spanish:
  - consentiremos
  - aceptaremos
  - nos conformaremos
  lexicon: HALOT
  rationale: El verbo niphal expresa disposición/consentimiento; en español, «estar de acuerdo» es la formulación más natural en un contexto de negociación.
- source_word: לָכֶם
  english_pob_choice: with you
  chosen_spanish: con ustedes
  alternatives_spanish:
  - a ustedes
  - para ustedes
  lexicon: HALOT
  rationale: Aunque la forma hebrea es dativa, el español idiomático con «estar de acuerdo» pide «con ustedes» para expresar la relación interpersonal.
- source_word: אִם
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - en caso de que
  - provided that
  lexicon: HALOT
  rationale: Marca la condición requerida de forma directa y estándar.
- source_word: תִּהְיוּ כָמֹנוּ
  english_pob_choice: you become like us
  chosen_spanish: llegan a ser como nosotros
  alternatives_spanish:
  - se hacen como nosotros
  - serán como nosotros
  - se vuelven como nosotros
  lexicon: HALOT
  rationale: El hebreo expresa entrar en un estado bajo una condición. «Llegan a ser» mantiene el matiz de cambio de estado/práctica mejor que un simple «son».
- source_word: לְהִמֹּל
  english_pob_choice: by circumcising
  chosen_spanish: al circuncidar
  alternatives_spanish:
  - por circuncidar
  - mediante la circuncisión de
  lexicon: HALOT
  rationale: El infinitivo constructo explica el medio por el cual se cumpliría la condición. En español, «al circuncidar» conserva la función instrumental con naturalidad; evita el giro pasivo y mantiene el vínculo con la acción ritual.
- source_word: כָּל זָכָר
  english_pob_choice: every male among you
  chosen_spanish: todo varón entre ustedes
  alternatives_spanish:
  - cada varón entre ustedes
  - todo varón de entre ustedes
  - todos los varones entre ustedes
  lexicon: HALOT
  rationale: La combinación distributiva pide una expresión colectiva en español. «Todo varón entre ustedes» transmite el alcance sin añadir una lectura posesiva no explícita.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el análisis hebreo y la solución inglesa más reciente: אַךְ como restricción, בְּזֹאת como estipulación, נֵאוֹת como consentimiento y לְהִמֹּל como medio instrumental. Se evita una calca rígida y se preserva la exigencia de la circuncisión masculina como condición del acuerdo.'
  spanish_consistency_notes:
  - Se usa «Sólo» con acento por ser adverbio restrictivo.
  - Se mantiene «circuncidar» para reflejar el acto ritual exigido por el infinitivo hebreo.
  - Se prefiere «ustedes» para un español neutral y de lectura eclesial amplia.
  - No se introduce terminología eclesiástica ajena al pasaje; el texto conserva un tono narrativo directo.
