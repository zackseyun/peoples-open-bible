translation:
  language: es
  text: Josué[a], al cumplir la palabra[b], llegó a ser juez en Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuando cumplió la palabra» o «por cumplir la palabra». La construcción griega puede leerse con matiz temporal o instrumental.
    reason: alternative_reading
  - marker: b
    text: «La palabra» también puede entenderse como «el mandamiento», «la promesa» o «el asunto», según cómo se interprete la alusión a la fidelidad de Josué.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἰησοῦς
  english_pob_choice: Joshua
  chosen_spanish: Josué
  alternatives_spanish:
  - Jesús
  lexicon: LSJ
  rationale: En este resumen histórico el referente es Josué hijo de Nun, no Jesús de Nazaret. En español, 'Josué' identifica con claridad al personaje bíblico de Israel y evita ambigüedad.
- source_word: ἐν τῷ πληρῶσαι
  english_pob_choice: in fulfilling
  chosen_spanish: al cumplir
  alternatives_spanish:
  - cuando cumplió
  - cumpliendo
  lexicon: LSJ
  rationale: La construcción con infinitivo articular puede expresar circunstancia o medio. 'Al cumplir' conserva esa flexibilidad en español y suena natural sin cerrar la relación temporal o instrumental.
- source_word: λόγον
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mandamiento
  - la promesa
  - el asunto
  lexicon: LSJ
  rationale: '''La palabra'' conserva la brevedad del griego λόγον y mantiene abierta la posible alusión a una orden, promesa o declaración sin imponer una precisión que el texto no exige.'
- source_word: ἐγένετο
  english_pob_choice: became
  chosen_spanish: llegó a ser
  alternatives_spanish:
  - se hizo
  - fue hecho
  lexicon: LSJ
  rationale: '''Llegó a ser'' reproduce bien el sentido de entrar en un nuevo estado o función y resulta idiomático en español.'
- source_word: κριτὴς
  english_pob_choice: a judge
  chosen_spanish: juez
  alternatives_spanish:
  - un juez
  - líder
  lexicon: LSJ
  rationale: En español, el artículo indefinido puede omitirse de forma natural en predicados nominales; 'juez' conserva la categoría histórica y judicial del término griego.
- source_word: ἐν Ἰσραήλ
  english_pob_choice: in Israel
  chosen_spanish: en Israel
  alternatives_spanish:
  - sobre Israel
  - entre Israel
  lexicon: LSJ
  rationale: '''En'' sigue de cerca la preposición griega ἐν y no añade explícitamente un matiz de dominio o gobierno que el texto no expresa directamente.'
theological_decisions:
- issue: Alcance de 'la palabra' cumplida por Josué
  english_pob_reading: Rendered generically as 'the word' without specifying whether it is a divine command, promise, or matter.
  chosen_spanish_reading: Se mantiene genéricamente como 'la palabra'.
  alternative_spanish_readings:
  - el mandamiento
  - la promesa
  - el asunto
  rationale: El griego λόγον no obliga a especificar si se trata de una orden, promesa o asunto. Mantener 'la palabra' preserva la tensión interpretativa documentada y evita fijar una lectura no exigida por el versículo.
  doctrine_reference: Preservar la tensión interpretativa en lugar de resolverla.
translation_notes:
  revision_awareness: Coincide con el pasaje auditado en la revisión más reciente; no se registraron cambios en la última pasada y el veredicto de concordancia fue alto.
  spanish_consistency_notes:
  - Se conserva el nombre histórico 'Josué' para el referente de Ἰησοῦς, en armonía con el uso bíblico español estándar.
  - Se mantiene 'la palabra' sin especificación, en paralelo con la decisión inglesa de no forzar una glosa doctrinal.
  - La puntuación y el orden sintáctico buscan seguir de cerca el griego sin producir un calco excesivo en español.
