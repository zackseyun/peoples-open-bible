revisions:
- from: Solo los sacerdotes eran pocos, y no podían desollar todos los holocaustos, así que sus hermanos los levitas los sostuvieron[a] hasta que se terminó la obra y hasta que los sacerdotes se consagraron[b]. Porque los levitas eran más rectos de corazón para consagrarse que los sacerdotes.
  to: Solo los sacerdotes eran demasiado pocos, y no podían desollar todos los holocaustos, así que sus hermanos los levitas los apoyaron[a] hasta que se terminó la obra y hasta que los sacerdotes se consagraron. Porque los levitas eran más rectos de corazón[b] para consagrarse que los sacerdotes.
  rationale: Se ajusta «eran pocos» a «eran demasiado pocos» para reflejar la insuficiencia numérica del hebreo; se cambia «los sostuvieron» por «los apoyaron» por mayor naturalidad y para seguir la revisión inglesa final; y se corrige la nota b para que explique la expresión «más rectos de corazón», que es donde la auditoría documenta la alternativa léxica, no el verbo «se consagraron».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:10:11Z'
