translation:
  language: es
  text: 'Y les dije: «Las puertas de Jerusalén no deben abrirse hasta que el sol esté caliente[a]. Mientras ellos aún estén de guardia, que cierren las puertas y las sujeten bien[b]. Y designen guardias[c] de entre los habitantes de Jerusalén, cada uno en su puesto de guardia y cada uno frente a su propia casa».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hasta que el sol se caliente», es decir, no simplemente al salir el sol, sino más tarde en la mañana.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «agárrenlas» o «manténganlas sujetas»; en este contexto significa fijar o sujetar bien las puertas después de cerrarlas.
    reason: lexical_alternative
  - marker: c
    text: O «designen turnos de vigilancia entre los habitantes de Jerusalén». El término hebreo puede referirse tanto a guardias como a funciones o turnos de guardia.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא יִפָּתְחוּ
  english_pob_choice: must not be opened
  chosen_spanish: no se abrirán
  alternatives_spanish:
  - no deben abrirse
  - no se deben abrir
  lexicon: HALOT
  rationale: El imperfecto pasivo con la negación expresa una instrucción/prohibición en contexto. En español, «no se abrirán» mantiene la fuerza normativa sin sonar rígidamente mecánico.
- source_word: שַׁעֲרֵי יְרוּשָׁלִַם
  english_pob_choice: the gates of Jerusalem
  chosen_spanish: las puertas de Jerusalén
  alternatives_spanish:
  - las puertas de la ciudad de Jerusalén
  - los portones de Jerusalén
  lexicon: HALOT
  rationale: «Puertas» es el equivalente natural de שערים en este contexto urbano. «Portones» sería posible, pero «puertas» es más sobrio y claro en español bíblico contemporáneo.
- source_word: עַד חֹם הַשֶּׁמֶשׁ
  english_pob_choice: until the sun is hot
  chosen_spanish: hasta que el sol esté caliente
  alternatives_spanish:
  - hasta que el sol esté fuerte
  - hasta que el sol se caliente
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de calor/ardor del sol. «Caliente» refleja היטב el hebreo sin convertirlo en una paráfrasis como «a plena mañana» o «de día».
- source_word: וְעַד הֵם עֹמְדִים
  english_pob_choice: while they are still standing guard
  chosen_spanish: Mientras aún estén de guardia
  alternatives_spanish:
  - Mientras todavía estén en pie
  - Mientras permanezcan de guardia
  lexicon: HALOT
  rationale: El verbo עמד en contexto de vigilancia implica estar de servicio. «De guardia» comunica la función sin perder la idea de permanencia/posición.
- source_word: יָגִיפוּ
  english_pob_choice: let them shut
  chosen_spanish: que cierren
  alternatives_spanish:
  - que las cierren
  - que las echen
  - que las clausuren
  lexicon: HALOT
  rationale: El hebreo exige una acción de cerrar las puertas. En español, «que cierren» es natural; el objeto implícito se recupera por contexto. Se evita una traducción demasiado técnica o literal como «cerrar de golpe» sin necesidad textual.
- source_word: הַדְּלָת֖וֹת
  english_pob_choice: the doors
  chosen_spanish: las puertas
  alternatives_spanish:
  - las hojas de las puertas
  - los batientes
  lexicon: HALOT
  rationale: Aunque literalmente son «las puertas/hojas», en español la repetición de «puertas» funciona bien y no obliga a introducir un término más técnico.
- source_word: וֶאֱחֹזוּ
  english_pob_choice: fasten them
  chosen_spanish: las aseguren
  alternatives_spanish:
  - las aten
  - las cierren con seguro
  - las traben
  lexicon: HALOT
  rationale: El verbo אחז es «asir/aferrar» y, en este contexto, implica dejar las puertas firmes. «Aseguren» comunica la idea funcional de dejar cerradas y firmes, manteniendo un registro claro y bíblico.
- source_word: וְהַעֲמֵיד
  english_pob_choice: appoint
  chosen_spanish: se nombrarán
  alternatives_spanish:
  - se pondrán
  - se colocarán
  - se designarán
  lexicon: HALOT
  rationale: La forma causativa de עמד aquí implica establecer/asignar personas a una función. «Se nombrarán» refleja la asignación de guardias en un español natural y administrativo.
- source_word: מִשְׁמְרוֹת
  english_pob_choice: guards
  chosen_spanish: centinelas
  alternatives_spanish:
  - guardias
  - puestos de guardia
  - vigilias
  lexicon: HALOT
  rationale: El término puede denotar guardia/turno/función. En este punto, el paralelo con «cada uno en su guardia» y el contexto de vigilancia permiten «centinelas» como equivalente claro y digno, sin perder la idea de vigilancia organizada.
- source_word: יֹשְׁבֵי יְרוּשָׁלִַם
  english_pob_choice: from the inhabitants of Jerusalem
  chosen_spanish: de entre los habitantes de Jerusalén
  alternatives_spanish:
  - de los habitantes de Jerusalén
  - entre los habitantes de Jerusalén
  lexicon: HALOT
  rationale: 'Se expresa el valor partitivo implícito: los guardias se toman de entre los habitantes. «De entre» conserva mejor ese matiz que un simple genitivo.'
- source_word: אִישׁ בְּמִשְׁמָרוֹ
  english_pob_choice: each at his watch
  chosen_spanish: cada uno en su guardia
  alternatives_spanish:
  - cada uno en su puesto
  - cada uno en su turno de guardia
  lexicon: HALOT
  rationale: איש es distributivo («cada uno»). משמר puede ser guardia/turno/puesto; «su guardia» preserva la relación léxica con el mandato de vigilancia y su organización por turnos.
- source_word: וְאִישׁ נֶגֶד בֵּיתוֹ
  english_pob_choice: and each opposite his own house
  chosen_spanish: y cada uno frente a su casa
  alternatives_spanish:
  - y cada uno delante de su casa
  - y cada uno opuesto a su casa
  lexicon: HALOT
  rationale: נגד significa «frente a/opuesto a». «Frente a su casa» es la forma natural en español y deja la disposición espacial bien clara.
theological_decisions:
- issue: 'La duración del cierre: sentido de «hasta que el sol esté caliente»'
  english_pob_reading: until the sun is hot; not merely at sunrise but later in the morning
  chosen_spanish_reading: hasta que el sol esté caliente
  alternative_spanish_readings:
  - hasta que el sol se caliente
  - hasta más entrada la mañana
  rationale: Se mantiene la imagen concreta del texto hebreo sin resolverla prematuramente en una equivalencia interpretativa más abstracta. La nota opcional puede explicar que no se trata solo del amanecer.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto fuente hebreo y el hilo de auditoría en inglés. Se mantuvo la secuencia imperativa y la estructura distributiva; se conservó la imagen concreta del calor del sol; y se reflejó la ambigüedad de מִשְׁמְרוֹת con una solución contextual («centinelas» / «guardia») sin borrar el matiz de vigilancia organizada.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto cuando aparezca el tetragrámaton; en este versículo no ocurre.
  - Se prefirió «Mesías/Cristo» no relevante aquí.
  - Se mantuvo el lenguaje de vigilancia con «de guardia», «guardia» y «centinelas» para reflejar el campo semántico de משמר/משמרות.
  - Se evitó un calco excesivamente literal de «hold them»; la solución española busca claridad funcional sin perder el valor de sujeción de las puertas.
