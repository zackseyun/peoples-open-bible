translation:
  language: es
  text: 'Y la tribu de Neftalí[a], y el líder de los hijos de Neftalí: Ahira hijo de Enán.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «hijos de Neftalí», una designación tribal estándar; se refiere a los miembros o descendientes de la tribu.'
