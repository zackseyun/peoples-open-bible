review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: la expulsión de Abiatar, su remoción del sacerdocio ante Yahvé, y la conexión con el cumplimiento de la palabra divina pronunciada sobre la casa de Elí en Siló. Sin embargo, se aparta del matiz documentado del English POB en עַל בֵּית עֵלִי, donde la traducción base escogió ''concerning'' para no cerrar demasiado el valor preposicional. En español, ''contra la casa de Elí'' introduce una explicitación interpretativa más fuerte que la decisión auditada.'
  spanish_quality_summary: El español es claro, natural y digno. 'Expulsó', 'de ser sacerdote' y 'cumpliendo' funcionan bien. La frase completa lee con fluidez. El único ajuste recomendado es cambiar 'contra la casa de Elí' por 'acerca de la casa de Elí' o equivalente más neutral, para alinear mejor con la decisión fuente sin perder legibilidad.
  glossary_alignment: 'La terminología del proyecto está bien observada: יהוה -> ''Yahvé''; Abiathar -> ''Abiatar''; Eli -> ''Elí''; Shiloh -> ''Siló''. No hay conflictos con los defaults doctrinales o léxicos principales. ''Sacerdote de Yahvé'' es una adaptación española adecuada de כֹּהֵן לַיהוָה.'
  issues:
  - severity: medium
    issue: עַל בֵּית עֵלִי se tradujo como 'contra la casa de Elí' en vez de una formulación más neutral.
    rationale: Aunque 'contra' puede ser defendible por el contexto de juicio, el audit trail inglés documentó deliberadamente 'concerning the house of Eli' para conservar amplitud semántica y no resolver en exceso el valor de עַל. El español debería seguir esa racionalidad salvo necesidad fuerte, que aquí no existe.
  revised_spanish_text: Así Salomón expulsó a Abiatar de ser sacerdote de Yahvé[a][b], cumpliendo la palabra de Yahvé que había hablado acerca de la casa de Elí en Siló.
  revised_footnotes:
  - marker: a
    text: 'O: «para cumplir la palabra de Yahvé». El hebreo puede expresar propósito o resultado.'
    reason: alternative_reading
  - marker: b
    text: Véanse 1 Samuel 2:27–36 y 3:11–14 sobre la palabra pronunciada acerca de la casa de Elí.
    reason: cross_reference
  revision_rationale: Se ajusta 'contra' a 'acerca de' para preservar mejor la amplitud semántica de עַל y alinearse con la decisión léxica y teológica documentada en el English POB, sin afectar la claridad del español. También se armoniza la nota de referencia cruzada con esa misma elección.
