id: 1PE.2.24
reference: 1 Peter 2:24
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὃς τὰς ἁμαρτίας ἡμῶν αὐτὸς ἀνήνεγκεν ἐν τῷ σώματι αὐτοῦ ἐπὶ τὸ ξύλον, ἵνα ταῖς ἁμαρτίαις ἀπογενόμενοι τῇ δικαιοσύνῃ ζήσωμεν· οὗ τῷ μώλωπι ἰάθητε.
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/002/024.yaml
  text: 'He himself bore our sins in his body on the tree, so that, having died to sins, we might live to righteousness. By his wound you were healed.'
translation:
  language: ko
  text: '그분은 친히 우리의 죄를 자신의 몸에 짊어지시고 나무 위에 올리셨으니[a], 이는 우리가 죄들에 대해 죽은 자가 되어 의에 대해 살게 하려 하심입니다. 「그분의 채찍 자국으로 여러분이 나음을 얻었습니다」[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '「나무 위에」는 십자가를 가리킨다. 신 21:23(나무에 달린 자는 저주받은 자)을 환기한다.'
    reason: cross_reference
  - marker: b
    text: 이사야 53:5 인용 (LXX). 「고난받는 종」 노래.
    reason: ot_citation
lexical_decisions:
- source_word: ἀνήνεγκεν ἐν τῷ σώματι αὐτοῦ ἐπὶ τὸ ξύλον
  english_pob_choice: bore ... in his body on the tree
  chosen_korean: 자신의 몸에 짊어지시고 나무 위에 올리셨으니
  alternatives_korean:
  - 그의 몸으로 나무에 달려 짊어지셨으니
  - 자기 몸에 친히 지시고 나무에 못 박히셨으니
  lexicon: BDAG
  rationale: ἀναφέρω는 「위로 올림·짊어지고 가져감」 둘 다 함의. 제의적 「제단에 올림」 어감을 살려 「짊어지시고 ... 올리셨다」로 결합한다.
- source_word: ταῖς ἁμαρτίαις ἀπογενόμενοι
  english_pob_choice: having died to sins
  chosen_korean: 죄들에 대해 죽은 자가 되어
  alternatives_korean:
  - 죄에서 벗어나
  - 죄에 대해 죽고
  lexicon: BDAG
  rationale: ἀπογίνομαι의 「떨어져 나감, 죽어 떠남」을 「죽은 자가 되다」로 옮긴다 (롬 6:11과 유사 표현).
- source_word: τῇ δικαιοσύνῃ ζήσωμεν
  english_pob_choice: we might live to righteousness
  chosen_korean: 의에 대해 살게
  alternatives_korean:
  - 의를 위하여 살게
  - 의 안에서 살게
  lexicon: BDAG
  rationale: 죄/의의 대조 구조를 살리기 위해 「죄들에 대해 죽고 / 의에 대해 살게」로 평행시킨다.
- source_word: οὗ τῷ μώλωπι ἰάθητε
  english_pob_choice: By his wound you were healed
  chosen_korean: 그분의 채찍 자국으로 여러분이 나음을 얻었습니다
  alternatives_korean:
  - 그분의 상처로 너희가 치유함을 받았습니다
  - 그의 매 맞은 자국으로 너희가 나았습니다
  lexicon: BDAG
  rationale: 사 53:5 LXX 직접 인용. μώλωψ는 「매·채찍에 의한 자국」. 한국 성서 전통의 「채찍 자국」을 채택.
theological_decisions:
- issue: 사 53:5 인용 처리
  chosen_reading: '인용 부호와 OT citation 각주로 명시'
  alternative_readings:
  - 흐름에 흡수
  rationale: 본문은 사 53:5을 거의 글자 그대로 인용한다. 인용임을 표시한다.
  doctrine_reference: 'DOCTRINE.md: OT 인용 투명성'
