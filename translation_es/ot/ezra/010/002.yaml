translation:
  language: es
  text: 'Entonces Secanías, hijo de Jehiel, de los hijos de Elam, respondió y dijo a Esdras: «Nos hemos portado con infidelidad contra nuestro Dios y hemos tomado mujeres extranjeras de los pueblos de la tierra[a]. Y ahora hay esperanza para Israel respecto de esto».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hemos tomado por esposas a mujeres extranjeras de los pueblos de la tierra».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: HALOT
  rationale: El verbo narrativo de respuesta se expresa con naturalidad en español como «respondió». Mantiene el tono formal del relato y el movimiento discursivo del hebreo sin añadir intensidad innecesaria.
- source_word: שְׁכַנְיָה
  english_pob_choice: Shecaniah
  chosen_spanish: Secañías
  alternatives_spanish:
  - Secanías
  - Shecanías
  lexicon: transliteración estándar
  rationale: Se translitera el nombre propio al español con una forma natural y reconocible. «Secañías» refleja la pronunciación tradicional hispana de nombres bíblicos afines y evita una grafía demasiado anglicada.
- source_word: בֶן יְחִיאֵל
  english_pob_choice: son of Jehiel
  chosen_spanish: hijo de Jehiel
  alternatives_spanish:
  - hijo de Jehiel
  lexicon: relación filial
  rationale: «Hijo de» reproduce de forma directa la relación genealógica del hebreo.
- source_word: מִבְּנֵי עוֹלָם
  english_pob_choice: from the sons of Elam
  chosen_spanish: de los hijos de Elam
  alternatives_spanish:
  - de entre los hijos de Elam
  - de la casa de Elam
  lexicon: identificación clánica
  rationale: 'Se sigue la lectura auditada del POB: aquí עוֹלָם no se traduce como «mundo/eternidad», sino como un nombre propio, Elam. «De los hijos de Elam» conserva el sentido genealógico/clánico.'
- source_word: וַיֹּאמֶר לְעֶזְרָא
  english_pob_choice: said to Ezra
  chosen_spanish: dijo a Esdras
  alternatives_spanish:
  - habló a Esdras
  - dijo a Esdras
  lexicon: uso narrativo
  rationale: «Dijo a Esdras» es la equivalencia directa y más transparente para la fórmula narrativa.
- source_word: מָעַלְנוּ
  english_pob_choice: have acted unfaithfully
  chosen_spanish: nos hemos portado con infidelidad
  alternatives_spanish:
  - hemos sido infieles
  - hemos actuado infielmente
  - hemos cometido una infidelidad
  lexicon: HALOT
  rationale: Se conserva el peso de מעל como ruptura de fidelidad pactal. «Nos hemos portado con infidelidad» suena natural en español y no diluye la gravedad religiosa del término.
- source_word: בֵּאלֹהֵינוּ
  english_pob_choice: against our God
  chosen_spanish: contra nuestro Dios
  alternatives_spanish:
  - ante nuestro Dios
  - con respecto a nuestro Dios
  lexicon: preposición idiomática
  rationale: Con מעל, la preposición ב funciona idiomáticamente con sentido de ofensa o agravio. «Contra nuestro Dios» comunica bien esa relación de culpa.
- source_word: וַנֹּשֶׁב נָשִׁים נָכְרִיּוֹת
  english_pob_choice: have married foreign women
  chosen_spanish: hemos tomado mujeres extranjeras
  alternatives_spanish:
  - hemos tomado por esposas a mujeres extranjeras
  - hemos casado mujeres extranjeras
  lexicon: idioma matrimonial
  rationale: 'Se preserva la lectura del POB: el hebreo usa una construcción idiomática que apunta a matrimonio. «Hemos tomado mujeres extranjeras» es fiel y no obliga a introducir «esposas» si el sustantivo no lo dice explícitamente.'
- source_word: נָשִׁים נָכְרִיּוֹת
  english_pob_choice: foreign women
  chosen_spanish: mujeres extranjeras
  alternatives_spanish:
  - mujeres forasteras
  - esposas extranjeras
  lexicon: HALOT
  rationale: «Extranjeras» conserva la oposición étnica/covenantal del término sin volverlo peyorativo ni suavizarlo en exceso.
- source_word: מֵעַמֵּי הָאָרֶץ
  english_pob_choice: from the peoples of the land
  chosen_spanish: de los pueblos de la tierra
  alternatives_spanish:
  - de los pueblos de la tierra
  - de los pueblos del país
  lexicon: referencia sociopolítica
  rationale: La forma plural «pueblos» preserva עַמֵּי y evita reducirlo a un singular genérico. «Tierra» sigue bien el hebreo y mantiene el color bíblico del texto.
- source_word: וְעַתָּה
  english_pob_choice: Yet now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Pero ahora
  - Y ahora
  lexicon: turno discursivo
  rationale: El hebreo marca un giro retórico hacia la esperanza. «Y ahora» mantiene la transición sin cargarla con una adversativa más fuerte que la del texto base.
- source_word: יֵשׁ מִקְוֶה
  english_pob_choice: there is hope
  chosen_spanish: hay esperanza
  alternatives_spanish:
  - existe esperanza
  - hay un porvenir
  lexicon: HALOT
  rationale: «Esperanza» es el equivalente directo de מִקְוֶה en este contexto. La construcción impersonal «hay esperanza» es clara y fiel.
- source_word: לְיִשְׂרָאֵל
  english_pob_choice: for Israel
  chosen_spanish: para Israel
  alternatives_spanish:
  - para Israel
  lexicon: dativo de beneficio
  rationale: Se conserva el dativo benefactivo simple del hebreo con la preposición española «para».
- source_word: עַל זֹאת
  english_pob_choice: concerning this
  chosen_spanish: respecto de esto
  alternatives_spanish:
  - acerca de esto
  - concerning this
  lexicon: relación referencial
  rationale: La frase se vierte de manera referencial, sin interpretar más de lo que el hebreo exige. «Respecto de esto» refleja bien el alcance de עַל זֹאת en este contexto.
theological_decisions:
- issue: Fuerza covenantal de מָעַלְנוּ
  english_pob_reading: Rendered as 'have acted unfaithfully' rather than a flatter term like 'have sinned.'
  chosen_spanish_reading: «Nos hemos portado con infidelidad» en vez de un simple «hemos pecado».
  alternative_spanish_readings:
  - hemos pecado
  - hemos sido infieles
  - hemos cometido una falta
  rationale: El término hebreo expresa traición o ruptura de fidelidad, especialmente en relación con Dios. La formulación elegida conserva esa gravedad pactal sin introducir doctrina adicional.
  doctrine_reference: Translation philosophy §1, §5
- issue: Identificación de עוֹלָם como nombre propio en la línea genealógica
  english_pob_reading: '''from the sons of Elam'''
  chosen_spanish_reading: «de los hijos de Elam»
  alternative_spanish_readings:
  - de los hijos del mundo
  - de los hijos de la eternidad
  rationale: La evidencia del POB y del contexto muestran que aquí no se trata de «mundo» o «eternidad», sino del clan Elam. La traducción evita una lectura semánticamente errónea.
  doctrine_reference: Transparencia léxica y control de ambigüedad onomástica
- issue: Lectura de נָשִׁים נָכְרִיּוֹת
  english_pob_reading: Rendered as 'foreign women' in line with the text's ethnic/covenantal concern.
  chosen_spanish_reading: «mujeres extranjeras»
  alternative_spanish_readings:
  - esposas extranjeras
  - mujeres forasteras
  rationale: La mención tiene peso étnico y pactal, y el verbo matrimonial ya comunica la unión conyugal. Se evita sobrerrepresentar el sustantivo como «esposas» donde el hebreo no lo dice de forma explícita.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada del POB que ajustó 'in spite of this' a 'concerning this' por mayor cercanía a עַל זֹאת. En español se eligió «respecto de esto» para reflejar ese alcance referencial sin añadir una interpretación adversativa no explícita. También se preservó la lectura de עוֹלָם como Elam siguiendo el consenso del paquete fuente y del audit trail en inglés.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para אֱלֹהִים y no se usa un sustituto reverencial.
  - Se conserva el tono narrativo formal con verbos simples y directos.
  - No se introduce 'Cristo/Mesías' ni terminología ajena al versículo.
  - La elección 'mujeres extranjeras' mantiene la tensión étnica/covenantal sin moralizar el adjetivo.
  - Se evita traducir עוֹלָם como 'mundo' o 'eternidad' porque aquí funciona como nombre propio, Elam.
