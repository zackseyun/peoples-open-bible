translation:
  language: es
  text: Derrama tu ira sobre las naciones[a] que no te conocen, y sobre los reinos que no invocan tu nombre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'que no te reconocen'. El hebreo 'conocer' puede implicar reconocimiento relacional, no solo conocimiento intelectual.
    reason: lexical_alternative
  - marker: b
    text: O 'que no invocan tu nombre'. El modismo hebreo 'llamar sobre el nombre' alude a oración, apelación cultual o adoración.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁפֹךְ
  english_pob_choice: Pour out
  chosen_spanish: Derrama
  alternatives_spanish:
  - Vierte
  - Vacía
  - Derrama por completo
  lexicon: HALOT
  rationale: El imperativo de שפך en un contexto de juicio se expresa naturalmente en español con 'derramar'. Mantiene la imagen vívida de la ira como algo que se vierte sobre sus destinatarios.
- source_word: חֲמָתְךָ
  english_pob_choice: your wrath
  chosen_spanish: tu ira
  alternatives_spanish:
  - tu furia
  - tu enojo ardiente
  - tu cólera
  lexicon: HALOT
  rationale: '''Ira'' comunica con dignidad la intensidad de la غض怒 divina. ''Cólera'' o ''furia'' son posibles, pero ''ira'' es más clara y sobria en español bíblico contemporáneo.'
- source_word: הַגּוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los gentiles
  - los pueblos
  - las gentes
  lexicon: HALOT
  rationale: En este contexto, גּוֹיִם refiere a pueblos extranjeros frente a Israel. 'Naciones' es la equivalencia más neutral y menos cargada teológicamente.
- source_word: אֲשֶׁר לֹא יְדָעוּךָ
  english_pob_choice: that do not know you
  chosen_spanish: que no te conocen
  alternatives_spanish:
  - que no te han conocido
  - que no te reconocen
  - que no te reconocen ni te admiten
  lexicon: HALOT
  rationale: '''Conocer'' conserva el valor relacional de יָדַע sin resolverlo de antemano como mera información ni como una explicación más interpretativa como ''reconocer''.'
- source_word: מַמְלָכֹות
  english_pob_choice: the kingdoms
  chosen_spanish: los reinos
  alternatives_spanish:
  - los dominios
  - las monarquías
  - los reinos de la tierra
  lexicon: HALOT
  rationale: מַמְלָכֹות designa reinos o dominios políticos. 'Reinos' mantiene el paralelismo poético con 'naciones' y suena natural en español.
- source_word: אֲשֶׁר בְּשִׁמְךָ לֹא קָרָאוּ
  english_pob_choice: that do not call on your name
  chosen_spanish: que no invocan tu nombre
  alternatives_spanish:
  - que no llaman a tu nombre
  - que no oran a tu nombre
  - que no apelan a tu nombre
  lexicon: HALOT
  rationale: קרא בשם es un modismo de invocación cultual y oración. En español, 'invocar tu nombre' preserva mejor esa fuerza religiosa que una traducción más literal pero menos idiomática.
theological_decisions:
- issue: El sentido de 'conocer' a Dios en el paralelismo del versículo
  english_pob_reading: Rendered relationally as 'do not know you' without expanding to 'do not acknowledge/worship you' in the main text.
  chosen_spanish_reading: '''que no te conocen'' se mantiene sin ampliar el verbo en el texto principal.'
  alternative_spanish_readings:
  - que no te reconocen
  - que no te reconocen ni te adoran
  - que no te admiten como Dios
  rationale: El hebreo יָדַע puede implicar conocimiento relacional y reconocimiento del pacto, pero el versículo dice literalmente 'no te conocen'. Conservar esa formulación preserva la tensión teológica y deja que la segunda cláusula complemente el sentido con la idea de invocar el nombre.
  doctrine_reference: Preservar la tensión teológica sin resolverla prematuramente.
- issue: La traducción del modismo 'call on your name'
  english_pob_reading: that do not call on your name
  chosen_spanish_reading: '''que no invocan tu nombre'''
  alternative_spanish_readings:
  - que no llaman tu nombre
  - que no apelan a tu nombre
  - que no oran invocando tu nombre
  rationale: El modismo bíblico de llamar/invocar el nombre expresa oración, culto y dependencia. 'Invocan tu nombre' conserva esa densidad religiosa sin perder claridad en español.
  doctrine_reference: Mantener el valor cultual del nombre divino.
translation_notes:
  revision_awareness: Coincide con el pasaje base sin revisiones aplicadas; se ha mantenido la misma estructura paralela del hebreo y la lectura óptima del audit trail inglés, con adaptación natural al español.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' solo cuando el texto fuente lo exige; aquí no aparece el Tetragrámaton explícito, por lo que se traduce el pronombre divino con 'tu'.
  - Se mantiene el paralelismo poético 'naciones / reinos' y la repetición del relativo 'que' para reflejar la estructura del hebreo.
  - Se eligió 'invocan tu nombre' como equivalente idiomático de קרא בשם, evitando 'llaman sobre tu nombre' por sonar menos natural en español.
