    rationale: El hebreo dice literalmente que el nadador extiende algo (sus manos) para nadar. «Como se extiende el nadador para nadar» suena forzado en español y transforma el gesto en una especie de autoextensión, perdiendo la concreción de las manos del símil.
  - severity: low
    issue: La nota al pie no refleja del todo la relación entre texto principal y alternativas
    rationale: El texto principal usa «destreza», pero la nota ofrece primero «habilidad» como alternativa; conviene preservar más claramente las opciones negativas documentadas por el POB inglés («ardides/artimañas») junto con una glosa neutral como «habilidad».
  revised_spanish_text: Y extenderá sus manos en medio de él, como un nadador extiende las suyas para nadar, y abatirá su orgullo junto con la destreza de sus manos[a].
