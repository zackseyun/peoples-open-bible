translation:
  language: es
  text: No abandonó al justo cuando fue vendido[a], sino que lo libró del pecado[b];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La referencia más probable es José, vendido a Egipto (Gn 37:28).
    reason: cross_reference
  - marker: b
    text: 'O: "lo libró del pecado". La expresión puede referirse específicamente a que la Sabiduría lo preservó de caer en pecado, y no solo de las consecuencias del pecado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: αὕτη
  english_pob_choice: She
  chosen_spanish: No se explicita en el texto español; el referente queda implícito en el verbo
  alternatives_spanish:
  - Ella no lo abandonó
  - Esta no lo abandonó
  lexicon: LSJ
  rationale: El griego remite a la Sabiduría personificada, pero en español la repetición explícita del sujeto puede sonar pesada en una cláusula breve. Se conserva la referencia implícita mediante el contexto inmediato y la personificación del pasaje, sin perder el referente femenino del original.
- source_word: πραθέντα
  english_pob_choice: when he was sold
  chosen_spanish: cuando fue vendido
  alternatives_spanish:
  - habiendo sido vendido
  - vendido
  lexicon: BDAG
  rationale: El participio aoristo pasivo expresa una venta pasada que funciona temporalmente en la cláusula. "Cuando fue vendido" es natural en español y mantiene tanto la pasividad como la relación temporal.
- source_word: δίκαιον
  english_pob_choice: the righteous man
  chosen_spanish: al justo
  alternatives_spanish:
  - al hombre justo
  - al justo varón
  lexicon: BDAG
  rationale: El adjetivo sustantivado designa al personaje justo específico del contexto. "Al justo" conserva la fuerza sustantiva sin añadir una formulación demasiado explicativa.
- source_word: οὐκ ἐγκατέλιπεν
  english_pob_choice: did not abandon
  chosen_spanish: No abandonó
  alternatives_spanish:
  - No lo dejó
  - No lo desamparó
  lexicon: BDAG
  rationale: '"Abandonar" reproduce bien la fuerza de ἐγκαταλείπω en un español actual y claro. Se evita "desamparar" por ser más marcadamente tradicional y menos directo.'
- source_word: ἀλλὰ
  english_pob_choice: but
  chosen_spanish: sino que
  alternatives_spanish:
  - pero
  - antes bien
  lexicon: BDAG
  rationale: En español, la correlación negativa es más idiomática con "no... sino que..."; expresa el contraste adversativo del griego de manera fluida.
- source_word: ἐξ ἁμαρτίας
  english_pob_choice: from sin
  chosen_spanish: del pecado
  alternatives_spanish:
  - de pecado
  - de la culpa
  lexicon: BDAG
  rationale: La preposición marca salida o liberación desde una esfera. "Del pecado" preserva el término moral principal y suena natural en español eclesial; también deja abierta la lectura de preservación frente al mal moral, no solo de consecuencias externas.
- source_word: ἐρρύσατο
  english_pob_choice: delivered
  chosen_spanish: lo libró
  alternatives_spanish:
  - lo rescató
  - lo liberó
  lexicon: BDAG
  rationale: ῥύομαι significa rescatar/librar/liberar de peligro. "Libró" mantiene un registro digno y evita cargar el verbo con un matiz soteriológico más fuerte que el contexto inmediato no exige.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El pronombre de objeto directo se adapta naturalmente a la sintaxis española y retiene la referencia al justo/José implícito en el contexto.
theological_decisions:
- issue: Identificación del justo
  english_pob_reading: The verse refers to Joseph, though the translation leaves the name implicit as in Greek.
  chosen_spanish_reading: El texto español conserva la referencia implícita al justo, sin nombrar a José.
  alternative_spanish_readings:
  - Nombrar explícitamente a José
  - Usar una glosa interpretativa en el texto
  rationale: El contexto de Sabiduría 10 alude a figuras de la historia de Israel, y el detalle de haber sido vendido apunta con fuerza a José. Sin embargo, para respetar la estructura del griego y el enfoque del POB, se mantiene la mención implícita.
  doctrine_reference: Mantener la referencia contextual sin añadir explícitamente un nombre que el verso no da.
- issue: Sentido de "libró del pecado"
  english_pob_reading: Wisdom preserved Joseph from participating in sin.
  chosen_spanish_reading: La lectura principal sugiere preservación del pecado moral, no solo de una desgracia externa.
  alternative_spanish_readings:
  - Lo libró de las consecuencias del pecado
  - Lo libró de una situación asociada con el pecado
  rationale: ἐξ ἁμαρτίας puede señalar salida de la esfera del pecado o liberación desde el pecado mismo. En el contexto de José, la lectura moral encaja bien, pero el español mantiene la misma amplitud semántica sin cerrarla por completo.
  doctrine_reference: Preservar la tensión lexical sin resolverla de manera excesiva.
translation_notes:
  revision_awareness: 'El rastro en inglés registra una revisión reciente de "rescued" a "delivered" para un registro más formal. En español se eligió "libró", que conserva el valor de rescate/liberación de ῥύομαι con un tono sobrio y natural. Se mantuvo la ambigüedad del giro ἐξ ἁμαρτίας: la nota permite tanto la preservación del pecado moral como una lectura más amplia de liberación desde la esfera del pecado.'
  spanish_consistency_notes:
  - Se usa "justo" para δίκαιον, coherente con el valor sustantivado del griego.
  - '"Libró" se emplea como equivalente de ἐρρύσατο, evitando un tono excesivamente doctrinal o jurídico.'
  - La correlación negativa "no... sino que..." refleja mejor el contraste adversativo del griego en español.
  - Se conserva "pecado" en singular para respetar el término del original y la nota deja abierta la ambigüedad contextual.
