revisions:
- from: Así, los siervos del rey Ezequías fueron a Isaías.
  to: Entonces, los siervos del rey Ezequías fueron a Isaías.
  rationale: Se reemplaza «Así» por «Entonces» para expresar de manera más natural en español el avance narrativo del wayyiqtol, manteniendo intacto el contenido semántico del versículo. El resto del texto es fiel y claro.
  reviewer_model: gpt-5.4
