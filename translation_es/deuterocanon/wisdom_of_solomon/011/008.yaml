translation:
  language: es
  text: Les diste agua abundante de manera inesperada[a], mostrando por medio de la sed que tuvieron entonces cómo castigaste a sus adversarios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «más allá de la esperanza» o «cuando no tenían expectativa de ello» para ἀνελπίστως.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔδωκας
  english_pob_choice: You gave
  chosen_spanish: Les diste
  alternatives_spanish:
  - Les otorgaste
  - Les brindaste
  - Les proporcionaste
  lexicon: LSJ
  rationale: El aoristo de δίδωμι se rinde con el pasado simple más directo. «Dar» conserva la acción divina sin añadir matices no presentes en el griego.
- source_word: δαψιλὲς
  english_pob_choice: abundant
  chosen_spanish: abundante
  alternatives_spanish:
  - copiosa
  - abundante en gran medida
  - copioso
  lexicon: LSJ
  rationale: El adjetivo expresa provisión generosa o abundante. «Abundante» es natural en español y mantiene el valor de cantidad amplia sin exagerar.
- source_word: ὕδωρ
  english_pob_choice: water
  chosen_spanish: agua
  alternatives_spanish:
  - agua
  - líquido
  lexicon: LSJ
  rationale: El sustantivo es literal y no requiere ampliación.
- source_word: ἀνελπίστως
  english_pob_choice: unexpectedly
  chosen_spanish: inesperadamente
  alternatives_spanish:
  - sin esperanza
  - más allá de lo esperado
  - cuando no lo esperaban
  lexicon: LSJ
  rationale: El adverbio puede significar «contrario a la esperanza» o «sin expectativa». «Inesperadamente» preserva la sorpresa del don en un español fluido; la alternativa más literal se conserva en nota.
- source_word: δείξας
  english_pob_choice: showing
  chosen_spanish: mostrando
  alternatives_spanish:
  - demostrando
  - haciendo ver
  lexicon: LSJ
  rationale: El participio explica el modo o circunstancia del don. «Mostrando» conserva ese valor explicativo de manera natural.
- source_word: διὰ τοῦ τότε δίψους
  english_pob_choice: through their thirst at that time
  chosen_spanish: por su sed de aquel tiempo
  alternatives_spanish:
  - por la sed que tuvieron entonces
  - mediante la sed de aquel tiempo
  - a través de aquella sed
  lexicon: LSJ
  rationale: La frase remite a la sed previa como medio de contraste. «De aquel tiempo» mantiene τότε sin sobreespecificar el referente temporal.
- source_word: πῶς
  english_pob_choice: how
  chosen_spanish: cómo
  alternatives_spanish:
  - de qué manera
  lexicon: LSJ
  rationale: 'Introduce el contenido mostrado: la manera en que Dios castigó a los enemigos.'
- source_word: τοὺς ὑπεναντίους
  english_pob_choice: their adversaries
  chosen_spanish: a sus adversarios
  alternatives_spanish:
  - a sus enemigos
  - a los que se oponían
  lexicon: LSJ
  rationale: ὑπεναντίους designa a quienes están en oposición. «Adversarios» preserva el tono elevado y la relación de antagonismo del contexto.
- source_word: ἐκόλασας
  english_pob_choice: you punished
  chosen_spanish: castigaste
  alternatives_spanish:
  - puniste castigo a
  - afligiste
  - disciplinaste
  lexicon: LSJ
  rationale: κολάζω aquí tiene sentido punitivo. «Castigaste» es claro y directo en español, sin suavizar la acción judicial/divina.
theological_decisions:
- issue: Contraste entre los receptores del agua y sus adversarios
  english_pob_reading: '''Them'' refers to God''s people, and ''their adversaries'' refers to the Egyptians/opponents whom God punished.'
  chosen_spanish_reading: «Les» se refiere al pueblo de Dios, y «sus adversarios» a los egipcios u opositores castigados por Dios.
  alternative_spanish_readings:
  - Una oposición más general entre los justos y quienes se les oponen
  rationale: El contexto inmediato de Sabiduría 11 contrasta el socorro dado al pueblo con el castigo de sus enemigos. La traducción conserva el contraste sin añadir nombres que el verso no explicita.
  doctrine_reference: Sabiduría 11:1-8; Éxodo 17:1-7; Números 20:2-13
translation_notes:
  revision_awareness: 'Coincide con la última pasada revisada: no se requirieron cambios. Se mantuvo la lectura de alta concordancia y el valor adverbial de ἀνελπίστως como alternativa anotada.'
  spanish_consistency_notes:
  - Se mantuvo «Dios» implícito en la segunda persona del verbo, sin introducir sujeto explícito ajeno al griego.
  - «Adversarios» conserva el registro elevado que el español bíblico contemporáneo puede sostener sin caer en formulación eclesiástica arcaica.
  - Se evitó «SEÑOR» o «Cristo» porque el pasaje no contiene el Tetragrámaton ni lenguaje mesiánico.
