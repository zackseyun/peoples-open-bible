    rationale: El hebreo pone «su vida» y «su sangre» en aposición; la segunda «con» hace la explicación más pesada y ligeramente más interpretativa de lo necesario. «Con su vida, es decir, su sangre» preserva mejor la relación fuente.
  - severity: low
    issue: «No comerán» puede oírse en español contemporáneo como futuro descriptivo más que como prohibición.
    rationale: Aunque es defendible en registro bíblico, el futuro prohibitivo es menos transparente para algunos lectores modernos. No obstante, no exige adjudicación mayor, porque sigue siendo comprensible y solemne en contexto.
