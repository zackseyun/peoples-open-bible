translation:
  language: es
  text: Oigan esto, ustedes que pisotean[a] al necesitado y hacen desaparecer a los pobres de la tierra,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: “ustedes que anhelan con avidez al necesitado” o “ustedes que devoran al necesitado”. El participio hebreo conserva una imagen vívida de opresión codiciosa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ
  english_pob_choice: Hear
  chosen_spanish: Oigan
  alternatives_spanish:
  - Escuchen
  lexicon: HALOT
  rationale: El imperativo plural pide una convocatoria directa y profética. 'Oigan' conserva la fuerza inmediata de 'Hear' y suena natural en español contemporáneo; 'Escuchen' también sería posible, pero resulta un poco más suave.
- source_word: זֹאת
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - esta cosa
  lexicon: HALOT
  rationale: El demostrativo es objeto directo del imperativo y se traduce de forma simple y exacta como 'esto'.
- source_word: הַשֹּׁאֲפִים
  english_pob_choice: you who trample
  chosen_spanish: ustedes que pisotean
  alternatives_spanish:
  - ustedes que anhelan con avidez
  - ustedes que devoran
  - ustedes que trituran
  lexicon: HALOT
  rationale: El participio admite imágenes como 'jadear tras', 'devorar' o 'aplastar'. En este contexto de opresión económica, 'pisotean' comunica bien la violencia explotadora sin perder la fuerza del verbo. Se conserva la ambigüedad imagen/acción en nota.
- source_word: אֶבְיוֹן
  english_pob_choice: the needy
  chosen_spanish: al necesitado
  alternatives_spanish:
  - al pobre
  lexicon: HALOT
  rationale: '''Necesitado'' refleja bien el matiz socioeconómico de אֶבְיוֹן y distingue este término del siguiente ''pobres''.'
- source_word: וְלַשְׁבִּית
  english_pob_choice: and bring ... to an end
  chosen_spanish: y llevan ... a su fin
  alternatives_spanish:
  - y hacen cesar
  - y destruyen
  lexicon: HALOT
  rationale: El infinitivo causativo de שבת expresa hacer cesar. 'Llevan ... a su fin' mantiene la idea causativa con un español natural; 'hacen cesar' es más literal, y 'destruyen' sería más fuerte de lo que pide la forma verbal.
- source_word: ענוי
  english_pob_choice: the poor
  chosen_spanish: los pobres
  alternatives_spanish:
  - los afligidos
  - los humildes
  lexicon: HALOT
  rationale: En el contexto de Amós, el plural designa a los pobres socialmente vulnerables. 'Los pobres' es el equivalente más claro y coherente con la línea anterior.
- source_word: אָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - el territorio
  lexicon: HALOT
  rationale: En Amós, אָרֶץ suele tener sentido sociopolítico y local. 'La tierra' conserva el alcance concreto del texto mejor que 'el país' y evita una abstracción excesiva.
translation_notes:
  revision_awareness: Se siguió el pasaje hebreo de WLC y el trazo auditado en inglés. La revisión más reciente no indicó cambios; la traducción española mantiene el mismo sentido básico y conserva la tensión léxica del participio hebreo con una nota alternativa.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' no aplicable aquí porque el versículo no contiene el nombre divino.
  - Se distinguió 'necesitado' de 'pobres' para reflejar dos términos hebreos diferentes.
  - Se usó 'la tierra' para אָרֶץ en su sentido local/sociopolítico en Amós.
  - Se evitó 'SEÑOR' y se respetó la textura profética directa del mandato inicial.
