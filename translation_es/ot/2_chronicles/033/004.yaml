translation:
  language: es
  text: 'Edificó altares en la casa de Yahvé[a], de la que Yahvé había dicho[b]: «En Jerusalén mi nombre estará para siempre».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el templo de Yahvé». Literalmente, «en la casa de Yahvé».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «mi nombre estará para siempre»; compárese la fórmula bíblica común «mi nombre estará allí para siempre».'
    reason: cross_reference
lexical_decisions:
- source_word: וּבָנָה
  english_pob_choice: He built
  chosen_spanish: Él edificó
  alternatives_spanish:
  - Y edificó
  - Construyó
  lexicon: HALOT
  rationale: El verbo de construcción se vierte con el valor narrativo simple de 'edificó'. 'Construyó' también sería posible, pero 'edificó' mantiene un tono más bíblico y solemne sin salir del sentido básico.
- source_word: מִזְבְּחוֹת
  english_pob_choice: altars
  chosen_spanish: altares
  alternatives_spanish:
  - altares sacrificiales
  lexicon: HALOT
  rationale: El plural de מִזְבֵּחַ se traduce naturalmente como 'altares'. No es necesario explicitar 'sacrificiales' porque el término ya lo implica en este contexto.
- source_word: בְּבֵית יְהוָה
  english_pob_choice: in the house of Yahweh
  chosen_spanish: en la casa de Yahvé
  alternatives_spanish:
  - en el templo de Yahvé
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea 'casa' para no sustituirla por una equivalencia interpretativa. 'Templo' es una posibilidad contextual, pero 'casa de Yahvé' sigue más de cerca el hebreo y preserva la fórmula.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: ''Yahvé''. No se usa la sustitución tradicional ''SEÑOR'' porque el texto fuente nombra directamente al Dios de Israel.'
- source_word: אֲשֶׁר
  english_pob_choice: of which
  chosen_spanish: de la cual
  alternatives_spanish:
  - acerca de la cual
  - de quien
  lexicon: HALOT
  rationale: La relativa se adapta al antecedente femenino implícito en 'casa'. 'De la cual' conserva la relación sintáctica sin introducir una paráfrasis más libre.
- source_word: אָמַר יְהוָה
  english_pob_choice: Yahweh had said
  chosen_spanish: Yahvé había dicho
  alternatives_spanish:
  - Yahvé dijo
  lexicon: HALOT
  rationale: El pluscuamperfecto español expresa bien la anterioridad de la declaración divina respecto de la acción de Manasés. 'Había dicho' refleja la relación temporal que el audit trail inglés ya aclaraba.
- source_word: בִּירוּשָׁלִַם
  english_pob_choice: In Jerusalem
  chosen_spanish: En Jerusalén
  lexicon: HALOT
  rationale: Se mantiene el topónimo de forma directa y natural en español.
- source_word: יִהְיֶה שְּׁמִי
  english_pob_choice: my name will be
  chosen_spanish: mi nombre estará
  alternatives_spanish:
  - mi nombre será
  lexicon: HALOT
  rationale: Aquí el hebreo dice literalmente que el nombre 'será/estará'. En español, 'estará' conserva mejor la idea de presencia designada que 'será', y evita importar la ampliación 'allí' que no aparece en el hebreo de este versículo.
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: '''Para siempre'' es la forma natural y solemne en español para לְעוֹלָם. Mantiene el valor de duración indefinida y no introduce una tonalidad demasiado abstracta.'
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se preserva el nombre propio divino conforme a la política del proyecto y al testimonio del texto hebreo. 'Yahvé' comunica identidad personal del Dios de Israel sin sustituir el nombre por un título.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH → Yahvé'
- issue: Whether to expand the clause to include 'there'
  english_pob_reading: my name will be
  chosen_spanish_reading: mi nombre estará
  alternative_spanish_readings:
  - mi nombre estará allí
  - mi nombre será allí
  rationale: No se añade 'allí' porque el hebreo de este versículo no contiene שָׁם. La referencia a la presencia en el lugar queda implícita por el contexto inmediato y por la fórmula del templo, sin exceder el alcance del texto.
  doctrine_reference: 'DOCTRINE.md: original-language primacy; avoid importing wording from parallel texts'
translation_notes:
  revision_awareness: Se revisó el pasaje contra el hebreo de WLC y el audit trail inglés. No se introdujo 'allí' en el cuerpo principal, porque no está en el hebreo de este versículo. Se mantuvo la fórmula 'casa de Yahvé' y la designación divina 'Yahvé' conforme a la terminología del proyecto.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para יְהוָה, coherente con el estándar del proyecto.
  - Se preservó 'casa' y no 'templo' en el texto principal para respetar la metáfora hebrea.
  - '''Mi nombre estará'' refleja la literalidad del hebreo sin añadir elementos ausentes.'
  - La puntuación con dos puntos introduce correctamente la cita directa en español.
