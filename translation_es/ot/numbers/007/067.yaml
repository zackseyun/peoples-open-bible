translation:
  language: es
  text: Su ofrenda fue un plato[a] de plata, su peso era de ciento treinta siclos; un cuenco[b] de plata de setenta siclos, según el siclo del santuario[c]; ambos estaban llenos de flor de harina mezclada con aceite para una ofrenda de grano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'fuente' para קַעֲרָה, un recipiente poco profundo usado en el inventario de la ofrenda.
    reason: lexical_alternative
  - marker: b
    text: O 'tazón' para מִזְרָק, un recipiente ritual.
    reason: lexical_alternative
  - marker: c
    text: Es decir, según el patrón estándar de peso del santuario.
    reason: cultural_note
lexical_decisions:
- source_word: קָרְבָּנוֹ
  english_pob_choice: His offering was
  chosen_spanish: Su ofrenda fue
  alternatives_spanish:
  - Su presente fue
  - Su oblación fue
  lexicon: HALOT
  rationale: קָרְבָּן designa una ofrenda presentada en contexto cultual. 'Ofrenda' conserva la referencia sacrificial sin introducir un término más técnico o menos claro.
- source_word: קַעֲרַת כֶּסֶף אַחַת
  english_pob_choice: one silver plate
  chosen_spanish: una plat[a] de plata
  alternatives_spanish:
  - un plato de plata
  - un dish de plata
  lexicon: HALOT
  rationale: קַעֲרָה es un recipiente tipo plato/dish. 'Plata' mantiene la clase de material y 'plat[a]' comunica la forma de recipiente en español actual; se ancla con nota porque la palabra puede también entenderse como 'plato'.
- source_word: שְׁלֹשִׁים וּמֵאָה מִשְׁקָלָהּ
  english_pob_choice: its weight one hundred thirty shekels
  chosen_spanish: de peso de ciento treinta siclos
  alternatives_spanish:
  - con peso de ciento treinta siclos
  - pesaba ciento treinta siclos
  lexicon: HALOT
  rationale: El hebreo expresa literalmente el peso. 'De peso de' reproduce la estructura nominal sin perder naturalidad; 'siclos' traduce la unidad monetario-patrimonial usada como estándar de peso.
- source_word: מִזְרָק אֶחָד כֶּסֶף
  english_pob_choice: one silver basin
  chosen_spanish: un tazón de plata
  alternatives_spanish:
  - una palangana de plata
  - un cuenco de plata
  lexicon: HALOT
  rationale: מִזְרָק es un recipiente ritual para derramar o recibir líquidos. 'Tazón' es suficientemente amplio en español y evita la ambigüedad doméstica de 'cuenco' en este inventario; se conserva el material con 'de plata'.
- source_word: שִׁבְעִים שֶׁקֶל
  english_pob_choice: of seventy shekels
  chosen_spanish: de setenta siclos
  alternatives_spanish:
  - con peso de setenta siclos
  - de setenta pesos
  lexicon: HALOT
  rationale: La frase especifica el peso del segundo recipiente. 'De setenta siclos' sigue de cerca el hebreo y encaja en el registro inventarial del pasaje.
- source_word: בְּשֶׁקֶל הַקֹּדֶשׁ
  english_pob_choice: according to the shekel of the sanctuary
  chosen_spanish: según el siclo del santuario
  alternatives_spanish:
  - conforme al siclo del santuario
  - según el estándar del santuario
  lexicon: HALOT
  rationale: La expresión remite al patrón oficial de medida del santuario. 'Según' conserva el valor normativo/estándar reflejado en la revisión inglesa, y 'santuario' evita la sustitución por una glosa más interpretativa.
- source_word: שְׁנֵיהֶם מְלֵאִים
  english_pob_choice: both of them were full
  chosen_spanish: ambos estaban llenos
  alternatives_spanish:
  - los dos estaban llenos
  - ambos dos estaban llenos
  lexicon: HALOT
  rationale: La construcción hebrea subraya que los dos recipientes estaban llenos. 'Ambos estaban llenos' es natural y preserva la referencia dual.
- source_word: סֹלֶת
  english_pob_choice: fine flour
  chosen_spanish: flor de harina
  alternatives_spanish:
  - harina fina
  - harina selecta
  lexicon: HALOT
  rationale: '''סֹלֶת'' en ofrenda ritual se refiere a harina fina; en español bíblico ''flor de harina'' es la equivalencia tradicional y clara, adecuada al contexto sacrificial.'
- source_word: בְּלוּלָה בַשֶּׁמֶן
  english_pob_choice: mixed with oil
  chosen_spanish: mezclada con aceite
  alternatives_spanish:
  - amasada con aceite
  - mezclada en aceite
  lexicon: HALOT
  rationale: El participio pasivo indica harina preparada mediante mezcla con aceite. 'Mezclada con aceite' es preciso y fluido en español contemporáneo.
- source_word: לְמִנְחָה
  english_pob_choice: for a grain offering
  chosen_spanish: para una ofrenda vegetal
  alternatives_spanish:
  - para una ofrenda de cereal
  - para una ofrenda de harina
  lexicon: HALOT
  rationale: מִנְחָה en contexto priestly se refiere a la ofrenda de cereal/grano. 'Ofrenda vegetal' sigue el uso POB para el sacrificio sin restringir indebidamente a una planta específica; se deja constancia de la equivalencia cultual.
theological_decisions:
- issue: Equivalencia de מִנְחָה en contexto sacrificial
  english_pob_reading: for a grain offering
  chosen_spanish_reading: para una ofrenda vegetal
  alternative_spanish_readings:
  - para una ofrenda de cereal
  - para una ofrenda de grano
  rationale: El inglés POB opta por 'grain offering' para el rito levítico. En español, 'ofrenda vegetal' conserva el sentido técnico de una ofrenda no animal y evita una reducción a 'grano' que puede sonar menos litúrgica en este contexto.
  doctrine_reference: Levítico 2; Números 7
translation_notes:
  revision_awareness: La versión inglesa revisada cambió 'by the shekel of the sanctuary' a 'according to the shekel of the sanctuary' para un tono más natural. La traducción española refleja esa decisión con 'según el siclo del santuario', manteniendo el valor de norma o estándar de medida. No se observan otras divergencias sustantivas entre el hebreo y el audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' fuera de este versículo porque no aparece el nombre divino en el texto fuente.
  - '''Siclo'' se usa de forma consistente para la unidad de peso/valor del santuario.'
  - '''Ofrenda'' se conserva para קָרְבָּן y ''ofrenda vegetal'' para מִנְחָה, diferenciando el término general del término sacrificial específico.'
  - Se evitó 'SEÑOR' y otras sustituciones litúrgicas no presentes en el fuente.
  - 'El orden de los elementos sigue la lista inventarial hebrea: recipiente primero, peso, segundo recipiente, estándar de medida y contenido ritual.'
