base_translation:
  language: en
  yaml_path: translation/ot/exodus/037/017.yaml
  text: He made the lampstand of pure gold[a]. He made the lampstand of hammered work; its base and its shaft, its cups, its buds[b], and its blossoms were of one piece with it.
  footnotes:
