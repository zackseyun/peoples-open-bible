translation:
  language: es
  text: Que las palabras de mi boca y la meditación de mi corazón sean aceptables[a] delante de ti, Yahvé, mi roca y mi redentor[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a tu vista». El hebreo dice literalmente «delante de tu rostro/presencia».
    reason: lexical_alternative
  - marker: b
    text: «Redentor» traduce un término asociado con alguien que rescata o reclama de vuelta, a menudo con obligaciones de parentesco en la ley de Israel.
    reason: cultural_note
lexical_decisions:
- source_word: יִהְיוּ
  english_pob_choice: May ... be
  chosen_spanish: Que ... sean
  alternatives_spanish:
  - Sea que ...
  - Que lleguen a ser
  lexicon: HALOT
  rationale: En un contexto de oración y deseo, el imperfecto hebreo funciona de manera optativa. En español, «Que ... sean» expresa con naturalidad ese ruego sin perder la fuerza petitionaria.
- source_word: לְרָצוֹן
  english_pob_choice: acceptable
  chosen_spanish: aceptables
  alternatives_spanish:
  - agradables
  - del agrado de
  lexicon: HALOT
  rationale: El sustantivo con ל indica aceptación o favor ante Dios. «Aceptables» mantiene ese sentido cultual y evaluativo de forma idiomática en español.
- source_word: אִמְרֵי פִי
  english_pob_choice: the words of my mouth
  chosen_spanish: las palabras de mi boca
  alternatives_spanish:
  - los dichos de mi boca
  - las expresiones de mi boca
  lexicon: HALOT
  rationale: La construcción poseída se vierte con una frase natural en español que conserva la imagen concreta de lo que sale de la boca.
- source_word: הֶגְיוֹן לִבִּי
  english_pob_choice: the meditation of my heart
  chosen_spanish: la meditación de mi corazón
  alternatives_spanish:
  - la meditación de mi interior
  - el pensamiento de mi corazón
  lexicon: HALOT
  rationale: «Meditación» comunica bien el valor de reflexión/inward pondering y preserva el paralelismo con «las palabras de mi boca». Aunque «corazón» en hebreo incluye el centro interior de la persona, se mantiene por fidelidad poética y teológica.
- source_word: לְפָנֶיךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - en tu presencia
  - ante ti
  lexicon: HALOT
  rationale: La expresión hebrea literalmente señala estar delante del rostro/presencia de Dios. «Delante de ti» es claro, natural y conserva la relación evaluativa de la presencia divina.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el término de proyecto para el Tetragrámaton. «Yahvé» preserva el nombre personal divino sin sustituirlo por un título.
- source_word: צוּרִי
  english_pob_choice: my rock
  chosen_spanish: mi roca
  alternatives_spanish:
  - mi peña
  - mi refugio
  lexicon: HALOT
  rationale: Se conserva la metáfora directa del hebreo para Dios como firmeza y protección. «Roca» es fiel, transparente y plenamente comprensible en español.
- source_word: וְגֹאֲלִי
  english_pob_choice: and my redeemer
  chosen_spanish: y mi redentor
  alternatives_spanish:
  - y mi rescatador
  - y mi redentor por parentesco
  lexicon: HALOT
  rationale: «Redentor» es la equivalencia española estándar para גֹאֵל en este tipo de invocación poética. Mantiene la idea de rescate y reivindicación sin sobredeterminarla en el texto principal.
theological_decisions:
- issue: Renderizado del nombre divino יהוה
  english_pob_reading: O Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El verso usa directamente el Tetragrámaton, y la política del proyecto pide transliterarlo como nombre propio. «Yahvé» conserva el nombre revelado a Israel y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Imagen metafórica de צוּרִי
  english_pob_reading: my rock
  chosen_spanish_reading: mi roca
  alternative_spanish_readings:
  - mi refugio
  - mi peña
  rationale: Se mantiene la metáfora en lugar de explicarla, porque el texto poético presenta a Dios como roca firme. Esto conserva el tono y evita reducir la imagen a una sola implicación doctrinal.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: El pasaje coincide ampliamente con el auditorial inglés y no requiere revisión de contenido; la única adaptación principal es la normalización al español de los equivalentes ya decididos en el POB inglés.
  spanish_consistency_notes:
  - Se mantiene el paralelismo boca/corazón con un registro sobrio y litúrgicamente usable.
  - «Yahvé» se usa de forma consistente para יהוה, sin sustituirlo por un título.
  - «Mi roca» y «mi redentor» conservan las metáforas sin explicarlas dentro del texto principal.
  - La nota de a pie refleja la ambigüedad de לְפָנֶיךָ sin sobrecargar el verso.
