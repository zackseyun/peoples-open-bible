review_pass:
  verdict: revise
  source_alignment_summary: 'El griego καὶ ὑψώσον αὐτὸν ἰσχὺν τοῦ θραῦσαι ἄρχοντας ἀδίκους significa ''y exáltalo/levántalo en fuerza para hacer pedazos a gobernantes injustos''. El borrador español falla en el verbo principal: «hónralo» no conserva el sentido de elevación de ὑψώσον y además contradice su propia nota léxica. El resto del sentido está mayormente bien preservado.'
  spanish_quality_summary: El texto es legible, pero «Y hónralo con fuerza» suena semánticamente desviado y poco natural para este contexto. «Exáltalo con fuerza» o «levántalo en fuerza» preservan mejor el sentido. «Destrozar a gobernantes injustos» es natural y vigoroso en español.
  glossary_alignment: No hay términos del glosario principal en juego. La decisión léxica crítica es ὑψώσον, donde debe reflejarse elevación/exaltación, no honra. «Gobernantes injustos» alinea bien con ἄρχοντας ἀδίκους.
  issues:
  - severity: high
    issue: Mistraducción de ὑψώσον como «hónralo».
    rationale: ὑψώσον expresa elevar, exaltar o levantar, no simplemente honrar. «Honrar» pierde la imagen ascendente y altera el sentido de la petición.
  - severity: medium
    issue: Incoherencia entre el texto principal y la nota léxica.
    rationale: La nota ofrece «ensálzalo» y «levántalo», que sí corresponden al griego, mientras que el texto principal usa «hónralo», que no está justificado por la evidencia fuente.
  revised_spanish_text: Y exáltalo con fuerza para destrozar a gobernantes injustos[a][b].
  revised_footnotes:
  - marker: a
    text: 'O: «ensálzalo con fuerza» o «levántalo poderosamente».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y levántalo en fuerza».'
    reason: lexical_alternative
  revision_rationale: Se reemplaza «hónralo» por «exáltalo» para reflejar fielmente ὑψώσον, que comunica elevación o exaltación. Se mantiene «con fuerza» como equivalente natural de ἰσχὺν, y «destrozar a gobernantes injustos» preserva bien la fuerza de θραῦσαι ἄρχοντας ἀδίκους.
