translation:
  language: es
  text: Nadie empuja a su hermano; cada uno sigue su propio camino. Aunque caen por el arma[a], no se desbandan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo final es difícil de precisar. La lectura principal sigue el sentido contextual de un ejército que avanza sin perder su formación; también puede entenderse como «no son cortados» o «no son detenidos».
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ אָחִיו
  english_pob_choice: No man crowds his brother
  chosen_spanish: Nadie empuja a su hermano
  alternatives_spanish:
  - Ningún hombre aprieta a su hermano
  - Nadie presiona a su hermano
  lexicon: HALOT
  rationale: La expresión hebrea es distributiva y describe a cada miembro del grupo sin interferir con el otro. «Nadie» conserva bien el valor distributivo en español, y «empuja» comunica la idea de apretar o aglomerar sin volver la frase demasiado literal o extraña.
- source_word: יִדְחָקוּן
  english_pob_choice: crowds
  chosen_spanish: empuja
  alternatives_spanish:
  - aprieta
  - presiona
  - apiña
  lexicon: HALOT
  rationale: El verbo דחק expresa la acción de apretar o presionar. «Empuja» funciona naturalmente en español para una formación compacta y transmite la falta de desorden entre los miembros del grupo.
- source_word: גֶּבֶר
  english_pob_choice: each
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada hombre
  - cada guerrero
  lexicon: HALOT
  rationale: גֶּבֶר retoma el sentido distributivo del conjunto. «Cada uno» evita repetir «hombre» y conserva la individualidad de cada integrante de la fila o tropa.
- source_word: בִּמְסִלָּתוֹ
  english_pob_choice: on his own path
  chosen_spanish: su propio camino
  alternatives_spanish:
  - su propia calzada
  - su propia senda
  - su propio curso
  lexicon: HALOT
  rationale: מְסִלָּה puede referirse a un camino elevado, calzada o curso. En este contexto militar-poético, «su propio camino» expresa bien la marcha ordenada de cada uno sin sobrecargar el castellano.
- source_word: יֵלֵכוּן
  english_pob_choice: goes
  chosen_spanish: sigue
  alternatives_spanish:
  - va
  - avanza
  - marcha
  lexicon: HALOT
  rationale: 'El verbo הלך es genérico: ir, caminar, avanzar. «Sigue» mantiene la idea de proceder por su ruta asignada y suena natural en español dentro del cuadro de avance disciplinado.'
- source_word: וּבְעַד הַשֶּׁלַח
  english_pob_choice: through the weapon
  chosen_spanish: por la espada[a]
  alternatives_spanish:
  - a través del arma
  - por el arma
  - entre las armas
  lexicon: HALOT
  rationale: שֶׁלַח puede designar un arma lanzada o un arma en general; en este pasaje el contexto bélico hace natural concretarlo como «espada» para el lector español, aunque el hebreo no nombra un tipo específico con total precisión. El marcador remite a la alternativa lexical por la dificultad del término.
- source_word: יִפֹּלוּ
  english_pob_choice: they fall
  chosen_spanish: caen
  alternatives_spanish:
  - caen abatidos
  - se desploman
  - caen al pasar
  lexicon: HALOT
  rationale: נפל significa simplemente «caer». Se conserva ese valor básico en español, sin añadir más de lo que el hebreo dice explícitamente.
- source_word: לֹא יִבְצָעוּ
  english_pob_choice: they do not break ranks
  chosen_spanish: no se desbandan
  alternatives_spanish:
  - no se rompen las filas
  - no se apartan
  - no se detienen
  lexicon: HALOT
  rationale: בצע es una forma lexicamente difícil aquí. El contexto de una hueste firme y en avance permite expresar la idea de que su formación no se deshace. «No se desbandan» comunica con claridad esa cohesión militar, aunque el hebreo admite otras posibilidades.
translation_notes:
  revision_awareness: Se revisó el hebreo y el audio de la POB en inglés. La traducción española sigue de cerca el cuadro militar de avance ordenado, pero ajusta la imagen de «weapon» a «espada» por naturalidad contextual en español, dejando constancia de la dificultad lexical en la nota.
  spanish_consistency_notes:
  - Se mantuvo el tono poético-militar del versículo sin introducir explicación interpretativa en el cuerpo del texto.
  - «No se desbandan» fue elegido para representar la idea de no romper filas, de acuerdo con el contexto de disciplina en marcha.
  - Se usó puntuación española estándar y un registro bíblico moderno, claro y digno.
