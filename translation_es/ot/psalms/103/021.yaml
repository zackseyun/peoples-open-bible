translation:
  language: es
  text: Bendigan a Yahvé[a], todas sus huestes, sus ministros[b], los que hacen su voluntad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus ejércitos» o «su hueste celestial».
    reason: lexical_alternative
  - marker: b
    text: O «sus servidores» o «los que le sirven».
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּרֲכוּ
  english_pob_choice: Bless
  chosen_spanish: Bendigan
  alternatives_spanish:
  - Bendecid
  - Alaben
  lexicon: HALOT
  rationale: El imperativo plural pide una forma plural en español. «Bendigan» conserva el eco del estribillo del salmo y refleja la acción de bendecir dirigida a seres celestiales, sin reducirla a una mera alabanza general.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto de renderizar el Tetragrámaton como «Yahvé», preservando el nombre propio divino en vez de sustituirlo por un título.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todo
  lexicon: HALOT
  rationale: Concuerda con el sustantivo plural que sigue y expresa sin ambigüedad la totalidad del grupo convocado.
- source_word: צְבָאָיו
  english_pob_choice: his hosts
  chosen_spanish: sus ejércitos
  alternatives_spanish:
  - sus huestes
  - su ejército celestial
  lexicon: HALOT
  rationale: «צָבָא» admite el sentido de ejército/hueste. En español, «ejércitos» mantiene la amplitud semántica y permite la tensión contextual entre un sentido celestial y uno militar sin fijarlo de más en el texto principal.
- source_word: מְשָׁרְתָיו
  english_pob_choice: his ministers
  chosen_spanish: sus ministros
  alternatives_spanish:
  - sus servidores
  - los que le sirven
  lexicon: HALOT
  rationale: El término deriva de servir en un marco elevado o cultual. «Ministros» conserva el registro solemne que el inglés POB quiso mantener con «ministers», sin caer en un tecnicismo eclesiástico forzado.
- source_word: עֹשֵׂי
  english_pob_choice: who do
  chosen_spanish: los que hacen
  alternatives_spanish:
  - los que realizan
  - quienes cumplen
  lexicon: HALOT
  rationale: El participio funciona sustantivamente y se vierte naturalmente con una relativa. «Los que hacen» preserva la relación directa con el sustantivo siguiente y evita añadir matices no presentes en el hebreo.
- source_word: רְצוֹנוֹ
  english_pob_choice: his will
  chosen_spanish: su voluntad
  alternatives_spanish:
  - su deseo
  - lo que quiere
  lexicon: HALOT
  rationale: En este contexto, רָצוֹן expresa lo que Dios quiere o aprueba. «Voluntad» es el equivalente español más claro y teológicamente estable, sin perder el sentido de lo que le agrada o determina.
theological_decisions:
- issue: Alcance de «sus ejércitos» y «sus ministros»
  english_pob_reading: Seres celestiales/servidores angelicales están en vista, aunque el hebreo permite un enunciado amplio.
  chosen_spanish_reading: La formulación española mantiene abierta la referencia, pero el contexto inmediato sigue apuntando a huestes celestiales y ministros de Yahvé.
  alternative_spanish_readings:
  - Ángeles específicamente
  - servidores divinos en sentido amplio
  rationale: El verso anterior menciona explícitamente a sus ángeles; por eso conviene dejar que el contexto determine la identificación sin cerrar el sentido con una glosa interpretativa dentro del texto principal.
  doctrine_reference: Primacía del contexto canónico y de la transparencia de la traducción; preservar la tensión léxica sin resolverla artificialmente.
translation_notes:
  revision_awareness: Coincide con la última pasada del texto fuente en que no hubo cambios necesarios; la redacción española sigue de cerca el auditorio celestial implícito en el contexto y conserva la alternancia léxica del inglés POB para צְבָאָיו y מְשָׁרְתָיו.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para el Tetragrámaton.
  - Se evita «el Señor» como sustituto, para no borrar el nombre propio divino.
  - «Ministros» se usa en sentido funcional/solemne, no como referencia eclesiástica moderna.
  - La puntuación conserva la cadencia imperativa del verso y separa claramente la llamada inicial de la relativa final.
