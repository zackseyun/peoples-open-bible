translation:
  language: es
  text: 'Y Caleb, hijo de Hezrón, engendró hijos de Azubá, su esposa[a], y de Jeriot; y estos fueron los hijos de ella[b]: Jeser, Sobab y Ardón.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo es difícil. 'Jeriot' puede entenderse como una segunda mujer asociada con Caleb o como una expresión en aposición con Azubá en algunas interpretaciones.
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: ''los hijos de ella''. Algunos intérpretes entienden la genealogía de otra manera, pero el Texto Masorético tiene aquí un sufijo femenino singular.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכָלֵב בֶּן חֶצְר֗וֹן
  english_pob_choice: And Caleb son of Hezron
  chosen_spanish: Y Caleb, hijo de Hezrón
  alternatives_spanish:
  - Y Caleb, hijo de Hezrón
  - Caleb, hijo de Hezrón
  lexicon: HALOT
  rationale: Conservo el orden genealógico natural en español y mantengo el nombre propio sin ampliaciones. 'Hijo de' reproduce bien la relación patronímica del hebreo.
- source_word: הוֹלִיד
  english_pob_choice: fathered children by
  chosen_spanish: engendró hijos de
  alternatives_spanish:
  - engendró
  - fue padre de
  lexicon: HALOT
  rationale: El verbo causativo de ילד se expresa con fuerza genealógica en español con 'engendró'. Añadir 'hijos de' hace inteligible la relación con las mujeres nombradas sin forzar una paráfrasis excesiva.
- source_word: עֲזוּבָה אִשָּׁה
  english_pob_choice: Azubah his wife
  chosen_spanish: Azubá, su esposa
  alternatives_spanish:
  - Azubá, su mujer
  - Azubá, una mujer
  lexicon: HALOT
  rationale: En este contexto genealógico, אִשָּׁה se entiende naturalmente como 'esposa'. 'Su esposa' aclara la relación implícita que el hebreo no explicita con sufijo posesivo.
- source_word: וְאֶת יְרִיעוֹת
  english_pob_choice: and by Jerioth
  chosen_spanish: y de Jeriot
  alternatives_spanish:
  - y de Jeriot
  - y Jeriot
  lexicon: HALOT
  rationale: El nombre propio se translitera en forma española. Mantengo la coordinación difícil del hebreo con una construcción simple de origen ('de') que deja abierta la ambigüedad sintáctica.
- source_word: וְאֵלֶּה בָנֶיהָ
  english_pob_choice: and these were her sons
  chosen_spanish: y estos fueron sus hijos
  alternatives_spanish:
  - y estos fueron sus hijos
  - y estos fueron sus hijos / sus descendientes
  lexicon: HALOT
  rationale: Conservo el sufijo femenino singular con 'sus' en referencia a la mujer mencionada, sin resolver la tensión del texto. 'Hijos' mantiene el valor genealógico directo de בָנֶיהָ.
- source_word: יֵשֶׁר וְשׁוֹבָב וְאַרְדּוֹן
  english_pob_choice: Jesher, Shobab, and Ardon
  chosen_spanish: Jeser, Sobab y Ardón
  alternatives_spanish:
  - Jeser, Sobab y Ardón
  - Jesher, Shobab y Ardon
  lexicon: HALOT
  rationale: 'Los nombres propios se transliteran al español con ortografía naturalizada y consistente: Jeser, Sobab y Ardón.'
theological_decisions:
- issue: Ambigüedad genealógica de Azubá y Jeriot
  english_pob_reading: Caleb fathered children by Azubah his wife, and by Jerioth; the following names are presented as 'her sons' according to the feminine suffix in the MT.
  chosen_spanish_reading: Caleb engendró hijos de Azubá, su esposa, y de Jeriot; y estos fueron sus hijos.
  alternative_spanish_readings:
  - Caleb engendró a Azubá, su esposa, y a Jeriot
  - Caleb engendró hijos de Azubá y de Jeriot, sin precisar más la relación
  rationale: 'El hebreo presenta una sintaxis comprimida y difícil. La traducción conserva la ambigüedad sin imponer una reconstrucción: ''de Azubá, su esposa, y de Jeriot'' permite entender a Jeriot como otra mujer asociada con Caleb, mientras que la nota explica la posibilidad alternativa de una aposición con Azubá. Se mantiene además el valor gramatical femenino de ''sus hijos''.'
  doctrine_reference: Principio POB de preservar la tensión interpretativa cuando el texto fuente no la resuelve
translation_notes:
  revision_awareness: 'El pasaje se mantiene en alta concordancia con la revisión inglesa más reciente: no se requieren cambios adicionales respecto al sentido genealógico ni a la ambigüedad sintáctica del hebreo.'
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como estándar general del proyecto, aunque este versículo no contiene el nombre divino.
  - Se usa 'engendró' para reflejar el valor genealógico del verbo causativo sin sobrecargar el estilo.
  - Los nombres propios se transliteran con forma española estable y consistente.
  - Se mantiene la ambigüedad de Jeriot y el sufijo femenino de 'sus hijos' para no resolver el texto más allá de lo que permite el hebreo.
