  - severity: medium
    issue: Posible ambigüedad semántica de «nombre incomunicable» en español
    rationale: En español moderno puede entenderse como ‘que no puede expresarse/comunicarse’, mientras que el griego apunta a ‘no compartido/no atribuible a otros’. La nota actual mitiga bien esta ambigüedad, por lo que basta conservarla con la forma española corregida.
