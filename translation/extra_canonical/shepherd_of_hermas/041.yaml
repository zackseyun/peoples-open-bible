translation:
  text: |-
    He says to me: “Remove from yourself every evil desire[h], but clothe yourself with the desire that is good and dignified[a]; for when you are clothed with this desire, you will hate the evil desire and you will bridle[b] it as you wish.
    
    2. “For evil desire is wild and is hard to tame; for it is fearsome, and by its savagery it greatly consumes[c] people—especially if a slave of God falls into it and is not sensible, he is grievously consumed by it. It consumes such as these: those who do not have the garment of good desire, but are mixed up with this age[d]. These, therefore, it hands over to death.”
    
    3. “What deeds of evil desire,” I say, “hand people over to death, sir[e]? Make them known to me, so that I may keep away from them.” “Listen,” [he says][f], “by what deeds evil desire puts the slaves of God[g] to death.”
