review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del hebreo casuístico: condición legal con «si», «su esposo» por אִישָׁהּ, silencio del esposo, no anular el voto, y la vigencia continuada de votos y obligaciones. También mantiene la distinción entre נְדָרֶיהָ («votos») y אִסָּר («obligación vinculante»). Sin embargo, «la oye» suena menos natural y algo ambiguo en español; «oye» basta. Además, «que ella ha impuesto sobre sí misma» comunica el sentido, pero se aleja innecesariamente de la metáfora documentada de «atar/bind on herself» y resulta algo pesada. Una formulación como «con la que ella se ha ligado» conserva mejor la fuerza autoimpuesta y la naturalidad española.'
  spanish_quality_summary: El español es claro y digno, pero necesita un ajuste menor de naturalidad y precisión léxica. «Si su esposo la oye» debería ser «si su esposo oye» o «si su esposo se entera»; en este contexto legal, el objeto ya se sobreentiende. La doble secuencia «permanecerán firmes / permanecerá firme» es buena y mantiene el paralelismo. La frase relativa final puede simplificarse para sonar más idiomática sin perder fuerza jurídica.
  glossary_alignment: No hay conflicto con la terminología del proyecto. «Voto» y «obligación vinculante» están bien alineados con las decisiones auditadas. No intervienen términos sensibles del glosario principal (Yahvé, Mesías, etc.). El único ajuste recomendado es acercar mejor אֲשֶׁר אָסְרָה עַל נַפְשָׁהּ a la idea de auto-ligarse, en vez de «ha impuesto sobre sí misma», que aunque aceptable, es menos fiel a la racionalidad léxica documentada.
  issues:
  - severity: medium
    issue: «la oye» suena forzado y ambiguo en español
    rationale: El hebreo simplemente expresa que el esposo oye/se entera; en español, «oír a alguien» puede sugerir escuchar su voz, no necesariamente enterarse del voto. «Si su esposo oye» es más natural en esta construcción legal.
  - severity: medium
    issue: «que ella ha impuesto sobre sí misma» se aparta de la metáfora de ‘atar/ligar sobre sí’
    rationale: La auditoría inglesa documenta la importancia de preservar, en lo posible, la imagen de auto-vinculación. «Impuesto sobre sí misma» comunica autoasunción, pero debilita la metáfora y suena algo pesada. «Con la que ella se ha ligado» mantiene mejor el matiz legal y la idiomaticidad.
  revised_spanish_text: Y si su esposo oye y no le dice nada, y no anula su voto, entonces todos sus votos permanecerán firmes, y toda obligación vinculante con la que ella se ha ligado permanecerá firme.
  revision_rationale: Se corrige «la oye» a «oye» para una lectura jurídica más natural en español, y se reemplaza «que ella ha impuesto sobre sí misma» por «con la que ella se ha ligado» para reflejar mejor la metáfora hebrea de auto-vinculación sin perder claridad ni dignidad estilística.
