translation:
  language: es
  text: 'Así dice Yahvé[a], el que abre camino en el mar y senda en las aguas poderosas:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a través del mar» y «a través de las aguas poderosas». La preposición hebrea es literalmente «en», pero en español puede expresarse el sentido como movimiento por o a través de las aguas.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así ha dicho
  - De este modo dice
  lexicon: HALOT
  rationale: La fórmula profética en español suena natural y solemne con «Así dice». Mantiene el valor discursivo actual del hebreo, sin volverla más arcaica de lo necesario.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio del pacto con la forma estándar del proyecto en español, «Yahvé», en lugar de sustituirlo por un título.
- source_word: הַנּוֹתֵן
  english_pob_choice: who makes
  chosen_spanish: el que abre
  alternatives_spanish:
  - el que hace
  - el que da
  - el que prepara
  lexicon: HALOT
  rationale: En este contexto, el participio describe a Yahvé como el agente que hace posible el paso por el mar. «Abre camino» comunica bien la imagen sin perder la idea de acción efectiva sobre el mar.
- source_word: בַּיָּם
  english_pob_choice: in the sea
  chosen_spanish: en el mar
  alternatives_spanish:
  - por el mar
  - dentro del mar
  lexicon: HALOT
  rationale: Se conserva la preposición local «en», que refleja con fidelidad la forma hebrea y mantiene la imagen poética. «Mar» es más natural en español que «mar» con artículo definido en este contexto.
- source_word: דָּרֶךְ
  english_pob_choice: a way
  chosen_spanish: camino
  alternatives_spanish:
  - vía
  - ruta
  - senda
  lexicon: HALOT
  rationale: «Camino» es el equivalente más natural para la imagen de una vía abierta en el mar y encaja con el paralelismo poético del versículo.
- source_word: וּבְמַיִם עַזִּים
  english_pob_choice: in the mighty waters
  chosen_spanish: en las aguas poderosas
  alternatives_spanish:
  - en las aguas fuertes
  - en las aguas imponentes
  - en las aguas bravías
  lexicon: HALOT
  rationale: Se traduce עַזִּים con «poderosas» para conservar la fuerza del adjetivo sin añadir una connotación demasiado interpretativa como «bravías» o «agitadas».
- source_word: נְתִיבָה
  english_pob_choice: a path
  chosen_spanish: senda
  alternatives_spanish:
  - vereda
  - sendero
  - camino
  lexicon: HALOT
  rationale: «Senda» preserva el paralelismo con «camino» y distingue poéticamente נְתִיבָה de דָּרֶךְ, como hace el texto hebreo con dos términos cercanos pero no idénticos.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton; por coherencia con la práctica del proyecto, se conserva el nombre divino transliterado como «Yahvé» y no se sustituye por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor espacial de la preposición בְּ en בַּיָּם y בְמַיִם
  english_pob_reading: in the sea / in the mighty waters
  chosen_spanish_reading: en el mar / en las aguas poderosas
  alternative_spanish_readings:
  - por el mar / por las aguas poderosas
  - a través del mar / a través de las aguas poderosas
  rationale: El hebreo usa literalmente «en», aunque el movimiento implícito permite entender el paso «a través de». En español se mantiene «en» en el texto para no adelantar una interpretación que el hebreo no expresa de modo explícito.
  doctrine_reference: Principio de equivalencia semántica y preservación de la imagen poética del texto hebreo
translation_notes:
  revision_awareness: El control de revisión en inglés indica alta concordancia y ningún cambio necesario en la última pasada. Esta versión española sigue esa lectura estable, preservando la fórmula profética, el nombre divino y la imagen poética del paso abierto en el mar sin expandir el texto.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico digno y actual, evitando tanto arcaísmos innecesarios como paráfrasis.
  - «Camino» y «senda» reproducen el paralelismo hebreo entre דָּרֶךְ y נְתִיבָה.
  - Se eligió «en» en el cuerpo principal para reflejar la preposición hebrea, con nota de alternativa idiomática en español.
