translation:
  language: es
  text: 'Así dice Yahvé: «Se oye una voz en Ramá[b], lamentación y llanto amargo: Raquel llora por sus hijos; rehúsa ser consolada por sus hijos, porque ya no están[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'porque él ya no está'; el hebreo usa una forma singular en este modismo, aunque el contexto habla colectivamente de los hijos de Raquel.
    reason: lexical_alternative
  - marker: b
    text: Ramá era una ciudad asociada con el territorio de Benjamín; Raquel es presentada poéticamente como la matriarca que llora por sus descendientes.
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el nombre divino. 'Yahvé' conserva el referente del tetragrámaton sin ocultarlo bajo un título genérico.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Esto dice
  - Así ha dicho
  lexicon: HALOT
  rationale: La fórmula profética pide una cadencia formal y natural en español. 'Así dice' reproduce bien el valor mensajero sin sonar arcaico.
- source_word: ק֣וֹל
  english_pob_choice: A voice
  chosen_spanish: una voz
  alternatives_spanish:
  - un sonido
  - un clamor
  lexicon: HALOT
  rationale: '''Voz'' mantiene la imagen personificada que introduce el lamento, en línea con la lectura inglesa y el hebreo.'
- source_word: בְּרָמָה
  english_pob_choice: in Ramah
  chosen_spanish: en Ramá
  alternatives_spanish:
  - en Ramah
  - en la altura
  lexicon: HALOT
  rationale: Se conserva el topónimo transliterado. 'En' es la preposición locativa natural en español; 'Ramá' sigue la adaptación usual del nombre.
- source_word: נִשְׁמָע
  english_pob_choice: is heard
  chosen_spanish: se oye
  alternatives_spanish:
  - es oído
  - se escucha
  lexicon: HALOT
  rationale: En español, la pasiva refleja suena más natural que 'es oído' y conserva el valor perceptivo del hebreo.
- source_word: נְהִי
  english_pob_choice: lamentation
  chosen_spanish: lamentación
  alternatives_spanish:
  - llanto
  - lamento
  - plañido
  lexicon: HALOT
  rationale: '''Lamentación'' refleja el registro formal de duelo del término hebreo y empareja bien con el paralelismo siguiente.'
- source_word: בְּכִי תַמְרוּרִים
  english_pob_choice: bitter weeping
  chosen_spanish: llanto amarguísimo
  alternatives_spanish:
  - llanto amargo
  - llanto de amargura
  - lloriqueo amargo
  lexicon: HALOT
  rationale: Se conserva la intensificación del hebreo con un superlativo expresivo natural en español. 'Amarguísimo' transmite mejor el peso poético que una simple repetición adjetival.
- source_word: רָחֵל
  english_pob_choice: Rachel
  chosen_spanish: Raquel
  alternatives_spanish:
  - Ráquel
  lexicon: HALOT
  rationale: Se usa la forma española establecida del nombre propio bíblico.
- source_word: מְבַכָּה עַל בָּנֶיהָ
  english_pob_choice: weeping for her children
  chosen_spanish: llora por sus hijos
  alternatives_spanish:
  - llora sobre sus hijos
  - está llorando por sus hijos
  lexicon: HALOT
  rationale: '''Llora por'' reproduce el valor de duelo de עַל con בכה y fluye naturalmente en español; ''hijos'' mantiene el sentido colectivo de descendencia.'
- source_word: בָּנֶיהָ
  english_pob_choice: her children
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus niños
  - sus descendientes
  lexicon: HALOT
  rationale: En este contexto poético, 'hijos' comunica la referencia colectiva con naturalidad. El parentesco literal del hebreo se conserva sin forzar el género al español.
- source_word: מֵאֲנָה
  english_pob_choice: She refuses
  chosen_spanish: rehúsa
  alternatives_spanish:
  - se niega
  - rechaza
  lexicon: HALOT
  rationale: '''Rehúsa'' expresa la negativa firme del verbo hebreo con un tono más elevado que ''se niega'', adecuado al lamento poético.'
- source_word: לְהִנָּחֵם
  english_pob_choice: to be comforted
  chosen_spanish: ser consolada
  alternatives_spanish:
  - ser confortada
  - recibir consuelo
  lexicon: HALOT
  rationale: La pasiva conserva el matiz de receptividad del hebreo. En español, 'consolada' es la forma más natural en este contexto de duelo.
- source_word: כִּי אֵינֶנּוּ
  english_pob_choice: because they are no more
  chosen_spanish: porque ya no existen
  alternatives_spanish:
  - porque no están
  - porque ya no están
  - porque él ya no existe
  lexicon: HALOT
  rationale: Se mantiene la fuerza elegíaca de inexistencia/ausencia sin fijar innecesariamente muerte o exilio. 'Ya no existen' responde al plural contextual de 'sus hijos'.
theological_decisions:
- issue: Número y referencia en כִּי אֵינֶנּוּ tras 'sus hijos'
  english_pob_reading: 'Render idiomatically as plural: ''because they are no more.'''
  chosen_spanish_reading: porque ya no existen
  alternative_spanish_readings:
  - porque no está
  - porque ya no está
  - porque ya no existen
  rationale: El hebreo usa una forma singular idiomática, pero el antecedente inmediato es colectivo. En español, el plural explícito evita restringir el lamento a un solo hijo y preserva la amplitud poética del pasaje.
  doctrine_reference: Preservar la tensión gramatical y poética sin resolverla artificialmente; aquí la decisión es filológica, no doctrinal.
- issue: Referencia cultural de Ramá y Rachel
  english_pob_reading: Ramah was a town associated with the territory of Benjamin; Rachel is poetically portrayed as the matriarch mourning her descendants.
  chosen_spanish_reading: Ramá mantiene el topónimo, y Raquel queda como la matriarca que llora por sus hijos.
  alternative_spanish_readings:
  - Rama
  - la altura
  - Raquel como símbolo
  rationale: No se explicita en el texto principal la nota cultural, pero la traducción conserva el topónimo y la personificación para que la lectura siga siendo transparente al auditorio hispanohablante.
  doctrine_reference: Mantener la imagen poética y el trasfondo histórico sin expandir el texto más allá del alcance del hebreo.
translation_notes:
  revision_awareness: 'El borrador sigue el acuerdo alto del texto inglés auditado y no introduce cambios sustantivos de lectura. Se han ajustado solo las decisiones necesarias para un español natural: ''Así dice'', ''se oye'', ''llora por'', ''rehúsa'', ''ser consolada'' y el plural contextual en la cláusula final. No se añadieron lecturas doctrinales nuevas ni se suprimió la tensión gramatical del hebreo.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' conforme al estándar del proyecto para יְהוָה.
  - '''Raquel'' sigue la forma española bíblica usual; ''Ramá'' conserva el topónimo con transliteración estable.'
  - '''sus hijos'' traduce בָּנֶיהָ de modo colectivo, coherente con el contexto poético.'
  - '''amarguísimo'' refleja la intensificación de תַמְרוּרִים sin convertirla en paráfrasis extensa.'
  - La cláusula final usa plural por contexto, pero la nota preserva la observación sobre la forma singular del hebreo.
