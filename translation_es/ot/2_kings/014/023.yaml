translation:
  language: es
  text: En el decimoquinto año de Amazías[b] hijo de Joás, rey de Judá, Jeroboam hijo de Joás, rey de Israel, comenzó a reinar en Samaria, y reinó cuarenta y un años.
  philosophy: optimal-equivalence
  footnotes:
  - marker: b
    text: Se conserva «Amazías» como forma castellana del nombre; la relación gramatical de ל en la fórmula cronológica se vierte con «de».
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּ/שְׁנַת חֲמֵשׁ עֶשְׂרֵה שָׁנָה
  english_pob_choice: In the fifteenth year of
  chosen_spanish: En el año quince[a] de
  alternatives_spanish:
  - En el decimoquinto año de
  - En el año decimoquinto de
  lexicon: HALOT
  rationale: La fórmula regnal hebrea usa un numeral cardinal con שָׁנָה para indicar un año ordinal de reinado. En español, ‘en el año quince’ comunica esa función con naturalidad; ‘decimoquinto’ también es posible, pero la forma con numeral conserva la transparencia de la fórmula.
- source_word: לַ/אֲמַצְיָהוּ
  english_pob_choice: of Amaziah
  chosen_spanish: de Amazías[b]
  alternatives_spanish:
  - para Amazías
  - a Amazías
  lexicon: HALOT
  rationale: La preposición ל en esta fórmula cronológica señala la referencia al año de reinado de un rey. ‘De Amazías’ es la equivalencia idiomática más clara en español.
- source_word: בֶן יוֹאָשׁ
  english_pob_choice: son of Joash
  chosen_spanish: hijo de Joás
  alternatives_spanish:
  - descendiente de Joás
  lexicon: HALOT
  rationale: La relación patronímica se expresa de forma directa con ‘hijo de’.
- source_word: מֶלֶךְ יְהוּדָה
  english_pob_choice: king of Judah
  chosen_spanish: rey de Judá
  alternatives_spanish:
  - monarca de Judá
  lexicon: HALOT
  rationale: Cadena constructa de cargo y reino; ‘rey de Judá’ es la equivalencia natural y precisa.
- source_word: מָלַךְ
  english_pob_choice: became king
  chosen_spanish: comenzó a reinar
  alternatives_spanish:
  - se hizo rey
  - llegó a reinar
  lexicon: HALOT
  rationale: En las notas de acceso al trono, מלך introduce la entronización o inicio del reinado. ‘Comenzó a reinar’ distingue bien ese comienzo del dato posterior de duración.
- source_word: יָרָבְעָם
  english_pob_choice: Jeroboam
  chosen_spanish: Jeroboam
  alternatives_spanish:
  - Yeroboam
  lexicon: HALOT
  rationale: Se conserva el nombre propio con la transliteración castellana estándar ampliamente reconocible.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: king of Israel
  chosen_spanish: rey de Israel
  alternatives_spanish:
  - monarca de Israel
  lexicon: HALOT
  rationale: Cadena constructa que identifica cargo y reino; ‘rey de Israel’ mantiene la relación directa del hebreo.
- source_word: בְּ/שֹׁמְרוֹן
  english_pob_choice: in Samaria
  chosen_spanish: en Samaria
  alternatives_spanish:
  - en la ciudad de Samaria
  - en la capital Samaria
  lexicon: HALOT
  rationale: La locución locativa ב se traduce de manera simple con ‘en’. Samaria funciona aquí como lugar de reinado/acceso.
- source_word: אַרְבָּעִים וְאַחַת שָׁנָה
  english_pob_choice: forty-one years
  chosen_spanish: cuarenta y un años
  alternatives_spanish:
  - cuarenta y uno años
  lexicon: HALOT
  rationale: El numeral compuesto y שָׁנָה expresan duración. En español actual, ‘cuarenta y un años’ es la forma estándar y natural.
translation_notes:
  revision_awareness: El texto inglés POB presenta una sola solución sin notas y el control cruzado informa alta concordancia, sin revisiones aplicadas. La versión española sigue esa lectura y solo explicita en notas la transparencia de la fórmula cronológica y la equivalencia idiomática de los nombres y relaciones.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo lo exige; este versículo no lo contiene.
  - Se mantiene «rey de Judá / rey de Israel» de forma uniforme con la sintaxis del hebreo.
  - «Comenzó a reinar» se reserva para fórmulas de acceso al trono y no para la duración del reinado.
  - Se prefiere «Samaria» como topónimo estándar en español bíblico neutral.
