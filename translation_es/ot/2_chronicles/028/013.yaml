translation:
  language: es
  text: 'Y ellos les dijeron: «No traigan aquí a los cautivos, porque ustedes están proponiendo añadir a nuestros pecados y a nuestra culpa, trayendo sobre nosotros culpa de parte de Yahvé[a], pues nuestra culpa ya es grande, y hay ira ardiente[b] contra Israel».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porque hay culpa contra Yahvé sobre nosotros»; la expresión hebrea es compacta y puede enfatizar tanto culpa que viene por el juicio de Yahvé como culpa en relación con Yahvé.'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «ardor de ira», un modismo para una ira intensa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשִּׁבְיָה
  english_pob_choice: the captives
  chosen_spanish: los cautivos
  alternatives_spanish:
  - la cautividad
  - los prisioneros
  lexicon: HALOT
  rationale: El contexto de mando negativo con movimiento hacia el lugar de los hablantes exige el sentido concreto de personas cautivas, no el estado abstracto de cautividad. «Cautivos» conserva ese valor y suena natural en español.
- source_word: הֵנָּה
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - hasta aquí
  - para aquí
  lexicon: HALOT
  rationale: El adverbio deíctico indica movimiento hacia el lugar de los hablantes; en español, «aquí» es la forma más directa y natural después de «traigan».
- source_word: לְאַשְׁמַת יְהוָה עָלֵינוּ
  english_pob_choice: bringing guilt from Yahweh upon us
  chosen_spanish: trayendo sobre nosotros culpa de parte de Yahvé
  alternatives_spanish:
  - trayendo culpa del juicio de Yahvé sobre nosotros
  - para hacernos culpables delante de Yahvé
  lexicon: HALOT
  rationale: La frase es compacta y ambigua. Mantener «culpa de parte de Yahvé» conserva la tensión entre culpa que recae sobre ellos y relación con el juicio divino, sin resolverla de forma excesiva. «Sobre nosotros» refleja el עלֵינוּ.
- source_word: אַתֶּם אֹמְרִים לְהֹסִיף עַל
  english_pob_choice: you are proposing to add to
  chosen_spanish: ustedes están proponiendo añadir a
  alternatives_spanish:
  - ustedes dicen que añadirán a
  - ustedes pretenden aumentar
  lexicon: HALOT
  rationale: «Ustedes están proponiendo» traduce el valor deliberativo del participio en contexto. «Añadir a» conserva el paralelismo con los pecados y la culpa, como en la lectura auditada en inglés.
- source_word: חַטֹּאתֵינוּ
  english_pob_choice: our sins
  chosen_spanish: nuestros pecados
  alternatives_spanish:
  - nuestras faltas
  - nuestros delitos
  lexicon: HALOT
  rationale: «Pecados» es la equivalencia más directa y bíblica en español, y mantiene el plural del hebreo.
- source_word: וְעַל אַשְׁמָתֵינוּ
  english_pob_choice: and to our guilt
  chosen_spanish: y a nuestra culpa
  alternatives_spanish:
  - y a nuestra culpabilidad
  - y a nuestra deuda de culpa
  lexicon: HALOT
  rationale: «Culpa» distingue bien este sustantivo de חטאותינו y preserva la fuerza de responsabilidad/líabilidad que el hebreo tiene aquí.
- source_word: כִּי רַבָּה אַשְׁמָה לָנוּ
  english_pob_choice: because our guilt is already great
  chosen_spanish: pues nuestra culpa ya es grande
  alternatives_spanish:
  - porque nuestra culpa es muy grande
  - pues ya es mucha nuestra culpa
  lexicon: HALOT
  rationale: «Grande» conserva el sentido básico de רַבָּה; «ya» refleja la lógica argumental de acumulación, tal como lo hace la nota de revisión inglesa, sin forzar una paráfrasis.
- source_word: וַחֲרוֹן אָף
  english_pob_choice: fierce anger
  chosen_spanish: un ardor de ira
  alternatives_spanish:
  - una ira ardiente
  - un ardor de cólera
  lexicon: HALOT
  rationale: El hebreo es un modismo de «ardor/quemazón de ira». «Ardor de ira» preserva esa imagen idiomática mejor que «ira feroz», y es claro en español.
- source_word: עַל יִשְׂרָאֵל
  english_pob_choice: against Israel
  chosen_spanish: contra Israel
  alternatives_spanish:
  - sobre Israel
  - sobre el pueblo de Israel
  lexicon: HALOT
  rationale: En contexto de ira divina, על se entiende naturalmente como oposición activa. «Contra» comunica la relación de juicio sin suavizarla.
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El proyecto establece «Yahvé» como forma principal en español para יְהוָה. Se mantiene el nombre propio del pacto y no se lo reemplaza por una convención de ocultamiento.
  doctrine_reference: 'DOCTRINE.md: Contested terms — YHWH → Yahvé'
- issue: Relación entre culpa, pecado e ira divina en la frase compacta לְאַשְׁמַת יְהוָה עָלֵינוּ
  english_pob_reading: bringing guilt from Yahweh upon us
  chosen_spanish_reading: trayendo sobre nosotros culpa de parte de Yahvé
  alternative_spanish_readings:
  - trayendo sobre nosotros culpa delante de Yahvé
  - haciendo que recaiga sobre nosotros la culpa ante Yahvé
  rationale: La frase hebrea puede enfatizar culpa que proviene del juicio de Yahvé o culpa en relación con Yahvé. La versión española conserva esa ambigüedad sin decidirla del todo, siguiendo la cautela del texto auditado.
  doctrine_reference: Preservar tensión lexical y teológica cuando el hebreo es compacto y ambiguo
- issue: Identidad de «Israel»
  english_pob_reading: Israel
  chosen_spanish_reading: Israel
  alternative_spanish_readings:
  - Efraín
  - el reino del norte
  rationale: Se conserva el término canónico «Israel» en vez de estrecharlo interpretativamente. El contexto histórico permite inferir el referente inmediato sin perder la formulación original.
  doctrine_reference: Primacía del texto fuente y preservación de la tensión histórica
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión inglesa más reciente: reordena la cláusula central para reflejar que la propuesta es añadir a los pecados y a la culpa, mientras se entiende que eso trae culpa sobre el grupo. Se conserva la tensión del hebreo en la frase compacta sobre לְאַשְׁמַת יְהוָה עָלֵינוּ y el modismo de ira ardiente contra Israel.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para el tetragrama.
  - Se distingue «pecados» de «culpa» para reflejar חטאותינו / אשמתנו.
  - Se mantiene «Israel» sin reinterpretarlo como Efraín o reino del norte.
  - «Ardor de ira» preserva la imagen idiomática de חֲרוֹן אָף.
  - Los marcadores de nota [a], [b], [c] aparecen exactamente donde corresponden en el texto.
