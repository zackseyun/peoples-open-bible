translation:
  language: es
  text: Aun la cigüeña en los cielos conoce sus tiempos señalados, y la tórtola, la golondrina[a] y la grulla observan el tiempo de su llegada; pero mi pueblo no conoce el juicio de Yahvé[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse 'vencejo'; la identificación exacta de esta ave en hebreo es incierta.
    reason: lexical_alternative
  - marker: b
    text: También puede traducirse 'la ordenanza de Yahvé' o 'la justicia de Yahvé'.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲסִידָה
  english_pob_choice: stork
  chosen_spanish: cigüeña
  alternatives_spanish:
  - heron
  - ave migratoria
  lexicon: HALOT
  rationale: El término señala un ave migratoria concreta; en español, 'cigüeña' es el equivalente natural y reconocible para esta imagen. Mantiene el valor zoológico del pasaje y la relación con otras aves migratorias.
- source_word: בַשָּׁמַיִם
  english_pob_choice: in the heavens
  chosen_spanish: en los cielos
  alternatives_spanish:
  - en el cielo
  - en el aire
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente del ámbito celeste/areo. 'En los cielos' conserva la forma del original y suena natural en español sin convertirlo en una afirmación teológica ajena al contexto.
- source_word: יָדְעָה מוֹעֲדֶיהָ
  english_pob_choice: knows her appointed times
  chosen_spanish: conoce sus tiempos señalados
  alternatives_spanish:
  - conoce sus tiempos establecidos
  - conoce sus estaciones
  lexicon: HALOT
  rationale: '''מוֹעֵד'' comunica un tiempo fijado o señalado. ''Tiempos señalados'' preserva esa idea de orden y regularidad; ''señalados'' evita reducirlo a una mera noción general de estación.'
- source_word: תֹר
  english_pob_choice: turtledove
  chosen_spanish: tórtola
  alternatives_spanish:
  - paloma
  lexicon: HALOT
  rationale: El ave específica es la tórtola, no la paloma genérica. En español, 'tórtola' reproduce mejor la concreción del texto y la imagen migratoria.
- source_word: סוס
  english_pob_choice: swallow
  chosen_spanish: golondrina
  alternatives_spanish:
  - vencejo
  lexicon: HALOT
  rationale: La identificación exacta del ave es discutida; el audit trail inglés decidió 'swallow' para reflejar el valor más probable. En español, 'golondrina' corresponde a esa opción y es la forma idiomática más clara, sin pretender certeza absoluta sobre la especie.
- source_word: עָגוּר
  english_pob_choice: crane
  chosen_spanish: grulla
  alternatives_spanish:
  - ave migratoria
  - garza
  lexicon: HALOT
  rationale: '''Crane'' se expresa naturalmente en español como ''grulla''. Mantiene la imagen de ave migratoria grande y el paralelismo con las demás aves del versículo.'
- source_word: שָׁמְרוּ אֶת עֵת בֹּאָנָה
  english_pob_choice: keep the time of their coming
  chosen_spanish: guardan el tiempo de su venida
  alternatives_spanish:
  - observan la hora de su llegada
  - guardan el tiempo de su llegada
  lexicon: HALOT
  rationale: '''שׁמר'' aquí es guardar/observar cuidadosamente. ''Guardan el tiempo de su venida'' conserva la estructura y el sentido de regreso estacional, mientras ''venida'' mantiene un tono más bíblico sin ser arcaizante.'
- source_word: וְעַמִּי
  english_pob_choice: but my people
  chosen_spanish: pero mi pueblo
  alternatives_spanish:
  - y mi pueblo
  lexicon: HALOT
  rationale: Aunque la partícula es formalmente 'y', el contraste es adversativo. 'Pero' comunica mejor el giro retórico entre las aves y el pueblo.
- source_word: מִשְׁפַּט יְהוָה
  english_pob_choice: the judgment of Yahweh
  chosen_spanish: el juicio de Yahvé
  alternatives_spanish:
  - la sentencia de Yahvé
  - el derecho de Yahvé
  - la justicia de Yahvé
  lexicon: HALOT
  rationale: '''מִשְׁפָּט'' conserva aquí la fuerza de un juicio/orden normativo divino. ''Juicio'' mantiene la tensión profética y el sentido de que el pueblo no reconoce el proceder y la exigencia de Yahvé; se evita diluirlo en ''justicia'' o ''ordenanza''.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se traduce por el nombre propio 'Yahvé' según la terminología doctrinal del proyecto, conservando el nombre del pacto en lugar de sustituirlo por un título.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Nombre del pacto. El proyecto POB documenta 'Yahweh' en inglés; en español, 'Yahvé' preserva ese mismo valor transliterado y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de מִשְׁפַּט יְהוָה
  english_pob_reading: the judgment of Yahweh
  chosen_spanish_reading: el juicio de Yahvé
  alternative_spanish_readings:
  - la ordenanza de Yahvé
  - la justicia de Yahvé
  - el decreto de Yahvé
  rationale: El contexto contrapone el instinto ordenado de las aves con la incapacidad del pueblo para reconocer la norma/decisión divina. 'Juicio' conserva la carga profética de discernimiento, sentencia y orden de Yahvé sin borrar la ambigüedad semántica del hebreo.
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency of key terms, documented exception)
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail inglés, que reforzó 'swallow' frente a 'swift' para סוס. En español se optó por 'golondrina', que corresponde a esa decisión y es la opción idiomática estándar. También se mantuvo la resolución doctrinal de traducir יְהוָה por el nombre propio 'Yahvé'/'Yahvé' en lugar de 'el SEÑOR'.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo de aves migratorias con una estructura sencilla y publicable.
  - '''Cielos'' conserva el registro bíblico sin convertir la frase en una afirmación doctrinal independiente.'
  - '''Juicio de Yahvé'' preserva la tensión entre norma, sentencia y orden divino documentada por el audit trail inglés.'
  - Se evitó 'siervos' o términos eclesiásticos no presentes en el hebreo, y se conservaron nombres concretos de aves para la imagen poética.
