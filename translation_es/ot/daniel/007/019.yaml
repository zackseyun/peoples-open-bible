    text: Or 'to ascertain the truth about the fourth beast.' The Aramaic expression conveys a desire to know something with certainty.
    reason: lexical_alternative
  - marker: b
    text: Or 'nails of bronze.' The term can denote claws or nails; 'claws' was chosen to fit the beast imagery.
    reason: lexical_alternative
