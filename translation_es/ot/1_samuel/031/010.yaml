    issue: «colgaron» no corresponde bien a תָּקְעוּ
    rationale: El hebreo sugiere clavar, hincar, fijar o asegurar; «colgar» introduce la idea específica de suspensión, que no es la decisión documentada por el POB inglés ni la mejor representación del verbo.
  - severity: medium
    issue: La nota [c] está anclada a «cuerpo» en vez del verbo
    rationale: La variación textual y léxica trata del sentido de תָּקְעוּ (‘fijaron/impalaron/clavaron’), por lo que la marca debe ir en el verbo o frase verbal, no en «cuerpo».
  - severity: low
