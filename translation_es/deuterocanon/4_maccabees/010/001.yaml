  yaml_path: translation/deuterocanon/4_maccabees/010/001.yaml
  text: And after he had endured this death[a], worthy to be sung of, the third was led in[b], being urged much by many to save himself by tasting it.
  footnotes:
  - marker: a
    text: Or 'his celebrated death' or 'his renowned death.' The Greek adjective literally suggests a death 'sung of' or commemorated in praise.
    reason: lexical_alternative
  - marker: b
    text: That is, by tasting the forbidden food and so preserving his life.
    reason: cultural_note
