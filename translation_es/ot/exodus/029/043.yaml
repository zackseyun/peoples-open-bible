translation:
  language: es
  text: Allí me encontraré con los hijos de Israel[a], y ese lugar será santificado por mi gloria[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «los israelitas». El hebreo dice literalmente «los hijos de Israel», una expresión pactual estándar para el pueblo de Israel.'
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo dice: «y será santificado por mi gloria». El sujeto no se expresa explícitamente y puede referirse en general al área del santuario en vista, o más específicamente a la tienda de reunión o al altar.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְנֹעַדְתִּי
  english_pob_choice: I will meet with
  chosen_spanish: me encontraré con
  alternatives_spanish:
  - me reuniré con
  - tendré un encuentro con
  - me manifestaré a
  lexicon: HALOT
  rationale: El nifal de יעד en un contexto de santuario expresa un encuentro señalado o concertado. En español, «me encontraré con» conserva la reciprocidad del encuentro divino sin convertirlo en una simple localización.
- source_word: שָׁמָּה
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - allá
  - en ese lugar
  lexicon: HALOT
  rationale: Es un adverbio locativo que remite al lugar del santuario ya establecido. «Allí» es natural y preciso en español.
- source_word: לִבְנֵי יִשְׂרָאֵל
  english_pob_choice: with the sons of Israel
  chosen_spanish: con los hijos de Israel
  alternatives_spanish:
  - con los israelitas
  - para los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea de manera transparente. «Hijos de Israel» mantiene el paralelismo con el texto fuente y evita sustituirla sin necesidad por una forma más genérica.
- source_word: וְנִקְדַּשׁ
  english_pob_choice: it will be sanctified
  chosen_spanish: será santificado
  alternatives_spanish:
  - será hecho santo
  - será consagrado
  lexicon: HALOT
  rationale: 'El nifal de קדש expresa pasividad: algo queda hecho santo/consagrado. «Será santificado» sigue de cerca la elección revisada del POB en inglés y preserva la ambigüedad del sujeto implícito.'
- source_word: בִּכְבֹדִי
  english_pob_choice: by my glory
  chosen_spanish: por mi gloria
  alternatives_spanish:
  - con mi gloria
  - mediante mi gloria
  lexicon: HALOT
  rationale: כבוד aquí apunta a la gloria manifiesta de Yahvé. La preposición ב puede ser instrumental; «por mi gloria» comunica la agencia divina de modo natural en español.
theological_decisions:
- issue: Sujeto implícito de וְנִקְדַּשׁ
  english_pob_reading: The clause is rendered with an impersonal English subject ('it') referring to the sanctuary locale previously in view.
  chosen_spanish_reading: Se mantiene la pasiva impersonal «será santificado», sin especificar si el referente es el tabernáculo, el altar o el recinto santuario.
  alternative_spanish_readings:
  - será consagrado el tabernáculo
  - será consagrado el altar
  - será hecho santo
  rationale: El hebreo no explicita el sujeto. En el contexto inmediato hay varios referentes posibles, y conviene preservar esa tensión en lugar de resolverla prematuramente en la traducción.
  doctrine_reference: Translation philosophy §3; §5, preservar tensión/ambigüedad documentada.
- issue: Expresión covenantal בני ישראל
  english_pob_reading: sons of Israel
  chosen_spanish_reading: hijos de Israel
  alternative_spanish_readings:
  - israelitas
  - pueblo de Israel
  rationale: Se preserva la forma semitransparente del hebreo, en línea con la preferencia por precisión formal. «Israelitas» es idiomático, pero borra el eco nominal del original.
  doctrine_reference: Translation philosophy §4, precisión de género/forma sobre neutralización innecesaria.
- issue: Valor de כבוד en la clausula final
  english_pob_reading: by my glory
  chosen_spanish_reading: por mi gloria
  alternative_spanish_readings:
  - con mi gloria
  - mediante mi gloria
  rationale: No se trata solo de un atributo abstracto, sino de la gloria/presencia manifestada de Yahvé. La traducción conserva la fuerza causal/instrumental sin añadir explicación interpretativa excesiva.
  doctrine_reference: Translation philosophy §2, fidelidad semántica con claridad natural.
translation_notes:
  revision_awareness: La versión inglesa revisada cambió ‘made holy’ por ‘sanctified’ para reflejar con más formalidad נקדש; la redacción española sigue esa revisión con «será santificado», manteniendo además la pasiva impersonal y la ambigüedad del referente implícito.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» fuera del versículo porque el hebreo aquí usa pronombres posesivos de primera persona y no el nombre divino explícito.
  - Se evita «SEÑOR» como sustituto editorial porque el texto fuente no lo exige en este versículo.
  - Se conserva el registro reverente, pero con sintaxis española fluida y no arcaizante.
