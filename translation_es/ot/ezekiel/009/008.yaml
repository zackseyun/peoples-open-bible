  - severity: medium
    issue: «vas a destruir» tiene un registro demasiado coloquial
    rationale: Aunque comunica inminencia, en esta súplica solemne a Dios conviene una forma más digna y bíblicamente natural, como «¿destruirás…?».
  - severity: low
