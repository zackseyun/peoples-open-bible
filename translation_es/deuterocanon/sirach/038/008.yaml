translation:
  language: es
  text: para que no cese su obra, y venga el éxito[a] por medio de los hombres[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo תושיה es difícil aquí; puede sugerir solidez, éxito o ayuda eficaz. El paralelo griego lee: «y paz de él está sobre la faz de la tierra».'
    reason: alternative_reading
  - marker: b
    text: Aquí «hombres» traduce una expresión hebrea genérica que significa seres humanos, no solo varones.
    reason: lexical_alternative
lexical_decisions:
- source_word: למען
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - para que no
  lexicon: HALOT
  rationale: Introduce la idea de propósito/resultad​o de manera natural en español y conserva la fuerza final de la cláusula.
- source_word: לא ישבות
  english_pob_choice: may not cease
  chosen_spanish: no cese
  alternatives_spanish:
  - no se detenga
  - no llegue a cesar
  lexicon: HALOT
  rationale: שבת expresa cesar o dejar de actuar; 'no cese' es claro, formal y fiel al valor verbal continuo.
- source_word: מעשהו
  english_pob_choice: his work
  chosen_spanish: su obra
  alternatives_spanish:
  - su trabajo
  - su actividad
  lexicon: HALOT
  rationale: El sustantivo singular con sufijo apunta a la actividad productiva del artesano/unguentario; 'obra' preserva amplitud y dignidad en español.
- source_word: ותושיה
  english_pob_choice: success
  chosen_spanish: éxito
  alternatives_spanish:
  - solidez
  - acierto
  - bienestar
  lexicon: HALOT
  rationale: תושיה es difícil; el audit trail inglés pasó de 'well-being' a 'success'. 'Éxito' refleja mejor la eficacia/resultados positivos sin imponer una lectura demasiado técnica, manteniendo la tensión con el paralelo griego de paz.
- source_word: מבני אדם
  english_pob_choice: through men
  chosen_spanish: por medio de los hombres
  alternatives_spanish:
  - entre los seres humanos
  - por los hombres
  lexicon: HALOT
  rationale: La expresión hebrea es genérica y humana, no masculina exclusiva. 'Por medio de los hombres' sigue de cerca la forma semítica y permite la lectura de agencia o mediación social indicada por el contexto.
theological_decisions:
- issue: Relación entre el hebreo קשה/ambiguo ותושיה y el paralelo griego con εἰρήνη ('paz') sobre la tierra
  english_pob_reading: 'Render the Hebrew primarily, but allow the Greek to inform a broad, non-technical sense: ''success may come through men.'''
  chosen_spanish_reading: Traducir principalmente el hebreo con una noción de eficacia/éxito, sin borrar que el griego apunta a una amplitud más pacífica y terrenal.
  alternative_spanish_readings:
  - y bienestar venga por medio de los hombres
  - y paz venga por medio de los hombres
  - y acierto venga por medio de los hombres
  rationale: El hebreo conservado es la base primaria, pero el testimonio griego sugiere un efecto social amplio. 'Éxito' comunica la eficacia positiva del trabajo sin suprimir la tensión textual ni forzar 'paz' donde el hebreo no la dice explícitamente.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde subsiste; usar el paralelo griego como apoyo interpretativo real'
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: ambos marcadores de nota aparecen ahora anclados en el texto español. La redacción sigue la revisión más reciente del audit trail inglés (''success'' / ''through men'') y mantiene visible la tensión con el paralelo griego.'
  spanish_consistency_notes:
  - Se usa 'éxito' para תושיה siguiendo el tramo revisado del audit trail inglés.
  - Se conserva 'por medio de los hombres' para reflejar la expresión hebrea genérica y su posible matiz de mediación.
  - El texto principal evita 'paz' porque el hebreo conservado no la expresa de forma directa, aunque la nota recoge el paralelo griego.
  - Se mantiene un registro moderno y digno, apto para lectura eclesial en español neutro.
