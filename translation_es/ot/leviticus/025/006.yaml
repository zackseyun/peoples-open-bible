translation:
  language: es
  text: 'Y el producto sabático de la tierra será para ustedes como alimento: para ti, para tu esclavo, para tu esclava, para tu jornalero y para tu extranjero residente[a], que reside contigo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el sábado de la tierra». El hebreo dice literalmente «el sábado de la tierra», es decir, lo que la tierra produce durante su reposo sabático.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיְתָה
  english_pob_choice: shall be
  chosen_spanish: y será
  alternatives_spanish:
  - y estará
  - y llegará a ser
  lexicon: HALOT
  rationale: En legislación, el imperfecto narrativo/jurídico expresa una disposición futura o normativa. «Será» mantiene ese valor prescriptivo en español sin añadir matices causales que no están en el hebreo.
- source_word: שַׁבַּת הָאָרֶץ
  english_pob_choice: The Sabbath produce of the land
  chosen_spanish: el sábado de la tierra
  alternatives_spanish:
  - la producción sabática de la tierra
  - el producto sabático de la tierra
  - el reposo de la tierra
  lexicon: HALOT
  rationale: Sigo la forma hebrea compacta «sábado de la tierra», que preserva la conexión institucional con el año sabático. No incorporo «produce» en el texto principal porque el hebreo dice literalmente «sábado de la tierra»; el contexto de «para comer» ya aclara que se trata de lo que la tierra da.
- source_word: לָכֶם לְאָכְלָה
  english_pob_choice: for you for food
  chosen_spanish: para ustedes ... para comer
  alternatives_spanish:
  - para ustedes como alimento
  - para ustedes para alimento
  - para ustedes para comida
  lexicon: HALOT
  rationale: '«לְאָכְלָה» expresa finalidad: algo destinado a comerse. «Para comer» conserva ese propósito con español natural. Mantengo la primera persona plural de destinatarios en «ustedes» conforme al plural hebreo.'
- source_word: לְךָ
  english_pob_choice: for you
  chosen_spanish: para ti
  alternatives_spanish:
  - para usted
  - para ustedes
  lexicon: HALOT
  rationale: El hebreo pasa del plural al singular para iniciar la lista de beneficiarios. En español, «para ti» reproduce ese singular sin perder la función distributiva.
- source_word: עַבְדְּךָ
  english_pob_choice: your male slave
  chosen_spanish: tu esclavo varón
  alternatives_spanish:
  - tu esclavo
  - tu siervo
  - tu servidor
  lexicon: HALOT
  rationale: En este contexto jurídico la condición de esclavitud es la fuerza lexical principal; por eso uso «esclavo» y no «siervo». Añadí «varón» para reflejar la distinción del par masculino/femenino implícita en la secuencia con אֲמָה.
- source_word: אֲמָתֶךָ
  english_pob_choice: your female slave
  chosen_spanish: tu esclava
  alternatives_spanish:
  - tu sierva
  - tu criada
  lexicon: HALOT
  rationale: «Esclava» conserva la simetría con «esclavo varón» y refleja el valor social del término. Evito «sierva» porque suaviza la fuerza del original.
- source_word: שְׂכִירְךָ
  english_pob_choice: your hired worker
  chosen_spanish: tu jornalero
  alternatives_spanish:
  - tu trabajador asalariado
  - tu trabajador contratado
  - tu asalariado
  lexicon: HALOT
  rationale: El término designa a una persona contratada por salario, en contraste con los esclavos domésticos. «Jornalero» comunica bien el trabajo remunerado y distingue esta categoría socioeconómica.
- source_word: תוֹשָׁבְךָ
  english_pob_choice: your resident foreigner
  chosen_spanish: tu extranjero residente
  alternatives_spanish:
  - tu forastero residente
  - tu residente extranjero
  - tu sojourner
  lexicon: HALOT
  rationale: «תוֹשָׁב» nombra a una persona no israelita que vive de modo estable entre ellos. «Extranjero residente» es claro en español y preserva tanto la extranjería como la residencia.
- source_word: הַגָּרִים עִמָּךְ
  english_pob_choice: who dwells with you
  chosen_spanish: que habitan contigo
  alternatives_spanish:
  - que viven contigo
  - que residen contigo
  - que moran contigo
  lexicon: HALOT
  rationale: El participio plural describe a los que viven junto a la comunidad/household del destinatario. «Habitan contigo» mantiene la idea de convivencia estable y funciona bien con el antecedente colectivo «extranjero residente».
theological_decisions:
- issue: Distinción entre esclavo y jornalero en la ley del año sabático
  english_pob_reading: Differentiate bonded household slaves from hired workers by translating עבד/אמה as 'male slave/female slave' and שׂכיר as 'hired worker.'
  chosen_spanish_reading: 'Distinguir entre esclavos domésticos y jornalero remunerado: «esclavo varón / esclava» frente a «jornalero».'
  alternative_spanish_readings:
  - traducir todo como «siervo(s)»
  - usar «sirviente(s)» para suavizar la diferencia
  rationale: El versículo enumera categorías sociales distintas; fusionarlas borraría una diferencia jurídica real del hebreo. Mantener «esclavo» preserva la tensión léxica documentada por la POB y evita una domesticación que debilite el texto.
  doctrine_reference: Translation philosophy §1, §5
- issue: Cómo reflejar el singular del destinatario en una lista plural
  english_pob_reading: The list begins with singular 'for you' after a plural 'for you all.'
  chosen_spanish_reading: Conservar el paso de plural a singular con «ustedes ... para ti».
  alternative_spanish_readings:
  - nivelar todo en plural
  - nivelar todo en singular
  rationale: El hebreo alterna número con intención distributiva. Respetar ese cambio ayuda a transparentar la forma del texto y evita ocultar un rasgo sintáctico relevante.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: Tomé en cuenta la revisión del inglés POB que pasó de «The Sabbath of the land» a «The Sabbath produce of the land» para expresar el sentido contextual. En español, preservé la literalidad formal de «sábado de la tierra» en el texto principal porque el propio contexto inmediato («para comer») ya aclara que se trata de su producción; la nota recoge la alternativa más explicativa y la relación con el audit trail.
  spanish_consistency_notes:
  - Mantengo «Yahvé» como forma reservada para el nombre divino solo cuando aparece en el texto fuente; aquí no aparece.
  - Uso «esclavo/esclava» para עבד/אמה conforme a la preferencia del proyecto cuando la condición servil es lexicalmente central.
  - «Extranjero residente» sigue la terminología POB ya documentada para תוֹשָׁב, evitando «alien» o «sojourner» en español.
  - Conservo el valor legal del hebreo sin añadir explicaciones interpretativas en el cuerpo del versículo.
