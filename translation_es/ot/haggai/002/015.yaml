review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el rastro de auditoría en sus elementos principales: וְעַתָּה = «Y ahora», שִׂימוּ נָא לְבַבְכֶם conserva la imagen de «poner el corazón», מִן הַיּוֹם הַזֶּה וָמָעְלָה = «desde hoy en adelante», בְּהֵיכַל = «en el templo», e יְהוָה = «Yahvé». Sin embargo, la secuencia temporal queda menos fiel con «pongan su corazón en esto: desde hoy en adelante, antes de que...», porque en español suena como si el ‘desde hoy en adelante’ modificara la acción de considerar, mientras que en el hebreo introduce el marco temporal desde el cual deben reflexionar retrospectivamente sobre el tiempo anterior a la colocación de las piedras.'
  spanish_quality_summary: El español es claro y digno, pero «pongan su corazón en esto» resulta algo poco idiomático en español neutral eclesial. La nota ya preserva la literalidad, por lo que en el texto principal conviene una forma más natural como «presten atención a esto» o «tomen esto a pecho». Además, conviene reajustar la puntuación/orden para que «desde hoy en adelante» no se entienda como simple prospectiva desligada del «antes de».
  glossary_alignment: 'Cumple con el estándar del proyecto en «Yahvé» para יְהוָה y «templo» para הֵיכָל. No hay conflicto con otros términos doctrinales. La excepción recomendada es estilística: para שִׂימוּ נָא לְבַבְכֶם, puede preferirse una expresión española más natural en el texto principal, manteniendo en nota la literalidad «pongan su corazón».'
  issues:
  - severity: medium
    issue: La expresión «pongan su corazón en esto» suena poco natural en español contemporáneo neutral.
    rationale: Aunque refleja literalmente el hebreo, en español eclesial general no comunica con claridad inmediata el sentido exhortativo de atención/reflexión. La nota puede preservar la literalidad sin sacrificar legibilidad.
  - severity: medium
    issue: La relación temporal de «desde hoy en adelante» con «antes de que...» queda ambigua en el borrador.
    rationale: El hebreo llama a considerar, desde este día en adelante, el período anterior a la reconstrucción. Reordenar la frase ayuda a reflejar mejor ese marco temporal-retrospectivo.
  revised_spanish_text: 'Y ahora[a], por favor, presten atención a esto: desde hoy en adelante, antes de que se pusiera una piedra sobre otra en el templo de Yahvé,'
