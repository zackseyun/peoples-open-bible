translation:
  language: es
  text: Pero Macabeo accedió a todo lo que Lisias proponía[a], preocupándose por el bien común; pues cuanto Macabeo presentó por escrito a Lisias acerca de los judíos[b], el secretario lo aprobó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo que era provechoso» o «lo que era beneficioso». La expresión griega puede leerse de manera más general que «el bien común».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «escriba». El término griego designa a un funcionario administrativo o secretario.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπένευσε
  english_pob_choice: agreed
  chosen_spanish: accedió
  alternatives_spanish:
  - estuvo de acuerdo
  - consintió
  - asintió
  lexicon: LSJ
  rationale: El griego sugiere asentimiento o aceptación. En español, 'accedió' comunica un acuerdo efectivo y fluido en un contexto diplomático sin sonar excesivamente rígido.
- source_word: παρεκάλει
  english_pob_choice: proposed
  chosen_spanish: proponía
  alternatives_spanish:
  - planteaba
  - presentaba
  - suplicaba
  lexicon: LSJ
  rationale: Aquí παρακαλέω se entiende en el marco de negociaciones, como presentar o proponer medidas. 'Proponía' sigue ese sentido y evita un tono de ruego que no corresponde al contexto.
- source_word: τοῦ συμφέροντος φροντίζων
  english_pob_choice: being concerned for the common good
  chosen_spanish: buscando lo que convenía al bien común
  alternatives_spanish:
  - atendiendo al bien común
  - preocupado por lo que era provechoso
  - buscando lo beneficioso
  lexicon: LSJ
  rationale: La frase griega apunta a lo beneficioso o conveniente. 'Bien común' conserva la dimensión pública sugerida por la negociación, y 'lo que convenía' refleja el matiz de conveniencia/ventaja sin volverlo meramente utilitario.
- source_word: ἔδωκεν ... διὰ γραπτῶν
  english_pob_choice: submitted in writing
  chosen_spanish: puso por escrito y entregó
  alternatives_spanish:
  - presentó por escrito
  - envió por escrito
  - entregó por escrito
  lexicon: LSJ
  rationale: La construcción literalmente habla de dar 'por medio de escritos'. En español, 'puso por escrito y entregó' preserva la idea de comunicación formal escrita sin calcar torpemente la sintaxis griega.
- source_word: γραμματεύς
  english_pob_choice: secretary
  chosen_spanish: el secretario
  alternatives_spanish:
  - el escriba
  - el funcionario
  - el canciller
  lexicon: LSJ
  rationale: El término designa a un funcionario administrativo. 'Secretario' mantiene la función oficial y coincide con la decisión auditada de la POB en inglés, evitando reducirlo a 'escriba'.
- source_word: συνεχώρησεν
  english_pob_choice: approved
  chosen_spanish: lo aprobó
  alternatives_spanish:
  - lo concedió
  - asintió a ello
  - lo aceptó
  lexicon: LSJ
  rationale: El verbo puede significar conceder, permitir o aprobar. Dado que se trata de una respuesta oficial a lo presentado por escrito, 'lo aprobó' expresa bien la aceptación administrativa.
theological_decisions:
- issue: Matiz de τοῦ συμφέροντος entre beneficio, conveniencia y bien común
  english_pob_reading: rendered as 'the common good'
  chosen_spanish_reading: lo que convenía al bien común
  alternative_spanish_readings:
  - lo beneficioso
  - lo provechoso
  - lo que era conveniente
  rationale: No hay controversia doctrinal fuerte, pero sí un matiz semántico. La combinación elegida mantiene tanto la dimensión pública ('bien común') como la idea de conveniencia/ventaja implícita en el griego.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés auditado, que prefirió 'proposed' frente a 'urged' en un contexto diplomático. Por eso se eligió 'proponía' en lugar de un verbo de ruego o exhortación. También se mantuvo el valor administrativo de γραμματεύς como 'secretario'.
  spanish_consistency_notes:
  - Se conserva 'Macabeo' como nombre/título conforme al contexto del pasaje.
  - '''Judíos'' traduce τῶν Ἰουδαίων sin suavizar el referente colectivo.'
  - Se evita 'SEÑOR' u այլ masking; este verso no contiene el nombre divino.
  - La puntuación reproduce la relación causal del griego con 'pues'.
