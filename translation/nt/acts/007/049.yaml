id: ACT.7.49
reference: Acts 7:49
source:
  edition: SBLGNT
  text: Ὁ οὐρανός μοι θρόνος, ⸂ἡ δὲ⸃ γῆ ὑποπόδιον τῶν ποδῶν μου· ποῖον οἶκον οἰκοδομήσετέ μοι, λέγει κύριος, ἢ τίς τόπος τῆς καταπαύσεώς μου;
translation:
  text: Heaven is my throne[a], and the earth is the footstool for my feet. What kind of house will you build for me, says the Lord, or what is the place of my rest?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'the footstool of my feet.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐρανός
  chosen: Heaven
  alternatives:
  - the sky
  - heaven
  lexicon: BDAG
  rationale: In this Isaianic quotation, οὐρανός refers to the heavenly realm in contrast with earth, not merely the visible sky. Capitalized 'Heaven' reflects that cosmic/theological sense in readable English.
- source_word: θρόνος
  chosen: throne
  lexicon: BDAG
  rationale: Standard rendering for the seat of royal rule; the metaphor is transparent and should be preserved formally.
- source_word: γῆ
  chosen: the earth
  alternatives:
  - earth
  - land
  lexicon: BDAG
  rationale: Here γῆ is cosmic in scope, paired with heaven, so 'the earth' is preferable to 'land.'
- source_word: ὑποπόδιον
  chosen: the footstool for my feet
  alternatives:
  - footstool of my feet
  - footstool under my feet
  lexicon: BDAG
  rationale: A slightly smoother English rendering than the more literal 'footstool of my feet,' while preserving the image and the explicit mention of 'feet' present in the Greek.
- source_word: ποῖον
  chosen: What kind of
  alternatives:
  - What sort of
  - Which
  lexicon: BDAG
  rationale: ποῖος asks about quality or kind, not merely identity. 'What kind of' best captures the rhetorical force.
- source_word: οἶκον
  chosen: house
  alternatives:
  - temple
  - dwelling
  lexicon: BDAG
  rationale: The Greek says 'house.' Although the referent is temple-related in context, retaining 'house' preserves the wording of the quotation and lets the context supply the temple implication.
- source_word: οἰκοδομήσετέ
  chosen: will you build
  alternatives:
  - would you build
  lexicon: BDAG
  rationale: Future indicative in a rhetorical question; 'will you build' is the most direct equivalent.
- source_word: κύριος
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' Because λέγει κύριος functions as a quotation formula, 'says the Lord' is natural English and preserves the covenantal/theological force.
- source_word: τόπος
  chosen: place
  alternatives:
  - location
  lexicon: BDAG
  rationale: '''Place'' is the natural and sufficiently formal equivalent in this rhetorical parallelism.'
- source_word: καταπαύσεώς
  chosen: rest
  alternatives:
  - resting place
  - repose
  lexicon: BDAG
  rationale: The genitive construction 'place of my rest' is both natural and close to the Greek. 'Rest' preserves the theological resonance of divine resting without overexpanding to 'resting place' in the noun itself.
