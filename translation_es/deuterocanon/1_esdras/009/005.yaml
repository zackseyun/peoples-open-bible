translation:
  language: es
  text: Y los que eran de la tribu de Judá y de Benjamín se reunieron en Jerusalén dentro de tres días; era el mes noveno[a], el vigésimo día del mes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego tiene ''tribu'' en singular con ''Judá y Benjamín''; el sentido es el pueblo perteneciente a Judá y Benjamín. El paralelo hebreo de Esdras 10:9 dice: ''todos los hombres de Judá y Benjamín se reunieron en Jerusalén dentro de tres días''.'
    reason: cross_reference
lexical_decisions:
- source_word: ἐπισυνήχθησαν
  english_pob_choice: were gathered
  chosen_spanish: se reunieron
  alternatives_spanish:
  - fueron reunidos
  - se congregaron
  lexicon: BDAG
  rationale: El pasivo griego indica una reunión que efectivamente tuvo lugar; en español, 'se reunieron' conserva el valor intransitivo y natural sin añadir de más una agencia explícita.
- source_word: οἱ ἐκ τῆς φυλῆς Ἰούδα καὶ Βενιαμεὶν
  english_pob_choice: those from the tribe of Judah and Benjamin
  chosen_spanish: los que eran de la tribu de Judá y de Benjamín
  alternatives_spanish:
  - los de la tribu de Judá y de Benjamín
  - los hombres de Judá y de Benjamín
  lexicon: LSJ
  rationale: Se mantiene el sentido relacional de 'los que eran de' para reflejar el griego sin forzar 'hombres', que no está explícito. Aunque φυλή está en singular, el contexto apunta al conjunto de personas pertenecientes a Judá y Benjamín.
- source_word: ἐν τρισὶν ἡμέραις
  english_pob_choice: within three days
  chosen_spanish: dentro de tres días
  alternatives_spanish:
  - en tres días
  - al cabo de tres días
  lexicon: BDAG
  rationale: En este contexto de convocatoria, la expresión señala un lapso límite; 'dentro de tres días' comunica mejor ese plazo que una lectura temporal demasiado literal.
- source_word: εἰς Ἰερουσαλήμ
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - a Jerusalén
  - para Jerusalén
  lexicon: BDAG
  rationale: Aunque εἰς suele expresar dirección, en español 'se reunieron en Jerusalén' suena natural y refleja el resultado del movimiento colectivo. La decisión sigue la revisión inglesa que optó por 'in Jerusalem'.
- source_word: οὗτος ὁ μὴν ἔνατος
  english_pob_choice: it was the ninth month
  chosen_spanish: era el mes noveno
  alternatives_spanish:
  - era el noveno mes
  - esto era el noveno mes
  lexicon: LSJ
  rationale: La cláusula funciona como aviso cronológico; 'era el mes noveno' es idiomático y sobrio en español bíblico contemporáneo.
- source_word: τῇ εἰκάδι τοῦ μηνός
  english_pob_choice: on the twentieth day of the month
  chosen_spanish: el día veinte del mes
  alternatives_spanish:
  - a los veinte del mes
  - el veinte del mes
  lexicon: LSJ
  rationale: εἰκάδι indica el día veinte del mes. En español, 'el día veinte del mes' evita una estructura arcaica y conserva con claridad la datación.
theological_decisions:
- issue: Lectura de la expresión tribal singular/plural
  english_pob_reading: The Greek has the singular 'tribe' with 'Judah and Benjamin'; the sense is the people belonging to Judah and Benjamin.
  chosen_spanish_reading: Se traduce como una referencia a las personas que pertenecían a Judá y Benjamín, no como una corrección textual ni como dos tribus separadas en la sintaxis.
  alternative_spanish_readings:
  - los de la tribu de Judá y Benjamín
  - los hombres de Judá y Benjamín
  rationale: La tensión entre el singular griego y el referente plural se conserva sin 'normalizar' el texto. El español puede expresar el mismo valor colectivo de forma natural mediante 'los que eran de'.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La decisión sigue el eje del texto griego de Swete como ancla principal y toma en cuenta el aviso del paralelo hebreo, además de la revisión inglesa que ajustó la ubicación a una formulación más natural ('in Jerusalem'). No se introducen elementos ajenos al dato cronológico ni se resuelve artificialmente la tensión del singular 'tribu' frente al referente colectivo.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se evita 'Cristo/Mesías' porque no aparece en el pasaje.
  - Se mantiene un registro bíblico contemporáneo, claro y sobrio, sin arcaísmos innecesarios.
  - '''Se reunieron'' preserva el valor pasivo/colectivo del griego sin añadir sujetos implícitos no atestiguados.'
