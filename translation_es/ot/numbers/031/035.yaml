translation:
  language: es
  text: Y las personas de entre las mujeres que no habían conocido lecho de varón[a], en total, eran treinta y dos mil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''no habían conocido el lecho de varón'', un giro idiomático que significa que no habían tenido relaciones sexuales con un hombre.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶפֶשׁ אָדָם
  english_pob_choice: persons
  chosen_spanish: personas
  alternatives_spanish:
  - seres humanos
  - gente
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí designa individuos vivos, y con אָדָם especifica que se trata de personas humanas, no de ganado. 'Personas' conserva el valor de conteo y evita una expresión más interpretativa.
- source_word: מִן הַנָּשִׁים
  english_pob_choice: from the women
  chosen_spanish: de entre las mujeres
  alternatives_spanish:
  - de las mujeres
  - entre las mujeres
  lexicon: HALOT
  rationale: La preposición marca un subgrupo tomado del total de mujeres cautivas. 'De entre' expresa mejor en español la idea de extracción o selección del grupo.
- source_word: אֲשֶׁר לֹא יָדְעוּ
  english_pob_choice: who had not known
  chosen_spanish: que no habían conocido
  alternatives_spanish:
  - que no habían tenido relaciones con
  - que no habían experimentado
  lexicon: HALOT
  rationale: יָדַע es un eufemismo hebreo para relaciones sexuales; 'habían conocido' mantiene el giro del original sin perder inteligibilidad.
- source_word: מִשְׁכַּב זָכָר
  english_pob_choice: the bed of a male
  chosen_spanish: lecho de varón
  alternatives_spanish:
  - relaciones sexuales con un varón
  - lecho de un hombre
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea de 'lecho' para no borrar la forma del texto. 'Varón' da un registro bíblico claro y mantiene la referencia masculina del sustantivo זָכָר.
- source_word: כָּל נֶפֶשׁ
  english_pob_choice: all the persons
  chosen_spanish: todas las personas
  alternatives_spanish:
  - toda persona
  - el total de personas
  lexicon: HALOT
  rationale: La frase retoma y totaliza el conteo. 'Todas las personas' reproduce el valor distributivo-total sin sonar técnico.
- source_word: שְׁנַיִם וּשְׁלֹשִׁים אָלֶף
  english_pob_choice: thirty-two thousand
  chosen_spanish: treinta y dos mil
  alternatives_spanish:
  - '32.000'
  - treinta y dos millares
  lexicon: HALOT
  rationale: La secuencia numeral se expresa de forma estándar en español contemporáneo y transparente.
translation_notes:
  revision_awareness: 'El inglés POB mantuvo la formulación formal ''the persons ... who had not known the bed of a male'' y luego ajustó ''human persons'' a ''persons'' por naturalidad. El español sigue esa decisión: conserva ''personas'' y una metáfora equivalente (''lecho de varón'') sin explicitar el sentido en el texto principal.'
  spanish_consistency_notes:
  - Se usa 'personas' para נֶפֶשׁ אָדָם, en consonancia con el ajuste revisado del inglés POB desde 'human persons' a 'persons'.
  - '''Varón'' se usa para זָכָר porque en español bíblico es natural y mantiene la relación masculina del hebreo sin introducir una paráfrasis más moderna.'
  - La nota al pie preserva el sentido idiomático sexual que el inglés POB documentó, sin reemplazar la forma principal del texto.
