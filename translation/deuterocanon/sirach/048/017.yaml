id: SIR.48.17
reference: Sirach 48:17
source:
  edition: sefaria-ben-sira-kahana
  text: יחזקיהו חזק עירו, בהטות אל תוכה מים.<br><small>(יז)</small> ויחצב כנחשת צורים, ויחסום הרים מקוה.
  language: Hebrew
  pages:
  - 764
  confidence: high
  validation: minor_mismatch
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: Ἐζεκίας ὠχύρωσεν τὴν πόλιν αὐτοῦ, καὶ εἰσήγαγεν εἰς μέσον αὐτῶν τὸν Γώγ· ὤρυξεν σιδήρῳ ἀκρότομον, καὶ ᾠκοδόμησεν κρήνας εἰς ὕδατα.
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 48:17
translation:
  text: Hezekiah fortified his city[a], and brought water into its midst; he cut through rock like bronze[b], and dammed up a reservoir in the mountains.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'with bronze/copper' is difficult here; the Greek witness reads 'with iron,' which fits the context of cutting through rock and is followed in the main text.
    reason: textual_variant
  - marker: b
    text: The final Hebrew phrase is compressed and may also be understood as 'he blocked up a reservoir in the mountains' or, with the Greek, more generally 'he built water sources/reservoirs.'
    reason: alternative_reading
lexical_decisions:
- source_word: יחזקיהו
  chosen: Hezekiah
  rationale: Standard transliteration of the personal name.
- source_word: חזק
  chosen: fortified
  alternatives:
  - strengthened
  - made strong
  lexicon: HALOT
  rationale: In context of a city, the verb refers to strengthening defenses rather than general encouragement; the Greek ὠχύρωσεν supports a fortification sense.
- source_word: עירו
  chosen: his city
  alternatives:
  - his town
  lexicon: HALOT
  rationale: Straightforward possessive noun; 'city' best fits Jerusalem in this historical context.
- source_word: בהטות אל תוכה מים
  chosen: brought water into its midst
  alternatives:
  - diverted water into it
  - brought water into its interior
  lexicon: HALOT
  rationale: The Hebrew phrase points to directing water inward; the Greek εἰσήγαγεν εἰς μέσον ... supports 'brought into the midst/interior.' 'Its midst' preserves the concrete spatial sense.
- source_word: ויחצב
  chosen: he cut through
  alternatives:
  - he hewed
  - he quarried
  lexicon: HALOT
  rationale: The verb denotes cutting/hewing. 'Cut through' fits the engineering context of tunneling for water supply.
- source_word: כנחשת
  chosen: with iron
  alternatives:
  - with bronze
  lexicon: HALOT
  rationale: The Hebrew as transmitted is difficult, since נְחֹשֶׁת normally suggests bronze/copper, but the Greek parallel reads σιδήρῳ ('with iron'). Given the source validation note 'minor_mismatch' and the engineering context, 'with iron' is the most defensible main-text rendering while preserving the Hebrew-side alternative in a footnote.
- source_word: צורים
  chosen: rock
  alternatives:
  - rocks
  - cliffs
  lexicon: HALOT
  rationale: Plural in Hebrew, but English singular collective 'rock' reads naturally after 'cut through' and matches the sense of bedrock.
- source_word: ויחסום
  chosen: dammed up
  alternatives:
  - blocked up
  - stopped up
  lexicon: HALOT
  rationale: The verb conveys obstructing or shutting off. In a waterworks context, 'dammed up' is idiomatic and concrete.
- source_word: הרים מקוה
  chosen: pools in the mountains
  alternatives:
  - a reservoir in the mountains
  - mountain pools
  lexicon: HALOT
  rationale: The Hebrew order is somewhat compressed. 'Pools in the mountains' preserves the likely sense of stored water among the hills, while avoiding overconfidence in a singular/plural reconstruction. The Greek κρήνας εἰς ὕδατα points more generally to water sources/reservoir works, supporting a water-storage sense.
