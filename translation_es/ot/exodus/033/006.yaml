translation:
  language: es
  text: Entonces los hijos de Israel se quitaron sus adornos[a] desde el monte Horeb en adelante.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los israelitas se quitaron sus adornos en el monte Horeb». La expresión hebrea puede entenderse como una indicación de lugar o como el punto desde el cual dejaron de llevarlos.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּתְנַצְּלוּ
  english_pob_choice: stripped themselves of
  chosen_spanish: se quitaron
  alternatives_spanish:
  - se despojaron de
  - se quitaron de encima
  lexicon: HALOT
  rationale: 'El hitpael indica una acción reflexiva: retirar algo de uno mismo. En español, «se quitaron» comunica con naturalidad la remoción deliberada de ornamentos sin cargar de aspereza innecesaria el verbo.'
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva la formulación transparente del hebreo. «Hijos de Israel» refleja el plural masculino del original y mantiene el idiomario bíblico sin cambiarlo por una generalización más interpretativa.
- source_word: עֶדְיָם
  english_pob_choice: their ornaments
  chosen_spanish: sus ornamentos
  alternatives_spanish:
  - sus joyas
  - su adorno
  lexicon: HALOT
  rationale: «Ornamentos» es suficientemente amplio para abarcar adornos o joyas sin especificar más de lo que el hebreo exige. Además, encaja bien con el contexto de duelo o renuncia visible.
- source_word: מֵהַר חוֹרֵב
  english_pob_choice: from Mount Horeb onward
  chosen_spanish: desde el monte Horeb en adelante
  alternatives_spanish:
  - desde el monte Horeb
  - en el monte Horeb
  lexicon: HALOT
  rationale: La preposición puede marcar tanto el lugar como el punto de inicio de una acción continua. «Desde el monte Horeb en adelante» preserva esa ambigüedad reconocida por la POB inglesa y evita cerrarla indebidamente.
translation_notes:
  revision_awareness: La versión inglesa más reciente añadió explícitamente el matiz reflexivo («themselves») y mantuvo la lectura temporal/local de מֵהַר חוֹרֵב. La redacción española incorpora ambos elementos mediante «se quitaron» y «desde el monte Horeb en adelante».
  spanish_consistency_notes:
  - Se mantuvo «Horeb» como nombre propio, siguiendo la costumbre de la POB y el uso bíblico habitual en español.
  - «Ornamentos» se prefirió sobre «joyas» para conservar la amplitud semántica del hebreo.
  - No se introdujo terminología eclesiástica ajena al pasaje; la frase permanece cercana al relato narrativo del texto fuente.
