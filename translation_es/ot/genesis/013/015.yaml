translation:
  language: es
  text: Porque toda la tierra que ves[a], te la daré a ti y a tu descendencia para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a tu descendencia». El hebreo זֶרַע es un sustantivo colectivo que puede significar «semilla», «descendencia» u «offspring».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque, en efecto
  lexicon: HALOT
  rationale: El hebreo introduce aquí la base de la promesa dada en el contexto inmediato; «Porque» conserva la fuerza conectiva de כִּי de manera natural en español, sin volver causal lo que funciona como explicación/promesa.
- source_word: כָּל הָאָרֶץ
  english_pob_choice: all the land
  chosen_spanish: toda la tierra
  alternatives_spanish:
  - toda la región
  - la tierra entera
  - todo el país
  lexicon: HALOT
  rationale: «Tierra» comunica bien אֶרֶץ en un contexto de promesa territorial y mantiene el alcance total de כָּל con un sustantivo singular colectivo.
- source_word: אֲשֶׁר אַתָּה רֹאֶה
  english_pob_choice: that you see
  chosen_spanish: que ves
  alternatives_spanish:
  - que estás viendo
  - que contemplas
  - que miras
  lexicon: HALOT
  rationale: El participio presente hebreo se expresa de forma natural con el presente simple español. «Ves» preserva la referencia directa al territorio visible sin añadir matices excesivos.
- source_word: לְךָ
  english_pob_choice: to you
  chosen_spanish: te la
  alternatives_spanish:
  - para ti
  - a ti
  - para ti la
  lexicon: HALOT
  rationale: Con נתן, ל marca al receptor; en español, la duplicación pronominal «te la» suena natural y hace explícito el destinatario sin perder el sentido de dativo de beneficio/entrega.
- source_word: אֶתְּנֶנָּה
  english_pob_choice: I will give
  chosen_spanish: te la daré
  alternatives_spanish:
  - te la entregaré
  - te la concederé
  - te la concedo
  lexicon: HALOT
  rationale: El imperfecto de נתן expresa promesa futura. «Daré» es la equivalencia más directa y digna en español; se mantiene el futuro promesal del hebreo.
- source_word: וּלְזַרְעֲךָ
  english_pob_choice: and to your offspring
  chosen_spanish: y a tu descendencia
  alternatives_spanish:
  - y a tu simiente
  - y a tus hijos
  - y a tus descendientes
  lexicon: HALOT
  rationale: זֶרַע es un colectivo que puede abarcar descendencia/linaje. «Descendencia» conserva el valor colectivo y es más natural en español bíblico contemporáneo que «simiente», evitando restringirlo prematuramente a pluralización explícita.
- source_word: עַד עוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - por la eternidad
  - por un tiempo indefinido
  lexicon: HALOT
  rationale: En una promesa de pacto, עַד עוֹלָם se vierte de manera idiomática como «para siempre», preservando el alcance durativo sin resolver por anticipado la tensión teológica sobre el alcance exacto de la perpetuidad.
theological_decisions:
- issue: Duración de la promesa territorial en עַד עוֹלָם
  english_pob_reading: forever
  chosen_spanish_reading: para siempre
  alternative_spanish_readings:
  - por la eternidad
  - perpetuamente
  - por un tiempo indefinido
  rationale: La expresión hebrea señala una duración duradera, continua o perpetua. «Para siempre» mantiene la fuerza del texto en una promesa de Yahvé sin imponer una interpretación escatológica específica; así se preserva la tensión textual y teológica.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: El texto coincide sustancialmente con el auditable inglés POB y con la evaluación de alta concordancia; la única zona sensible es זֶרַע, donde el español debe decidir entre un colectivo natural («descendencia») y una opción más literal pero menos idiomática («simiente»). Se mantiene la ambigüedad de duración de עַד עוֹלָם sin explicarla en exceso.
  spanish_consistency_notes:
  - Se usa «Yahvé» cuando el contexto explícito identifica al hablante divino; aquí la forma no aparece en el versículo, pero la promesa procede de Yahvé en el contexto inmediato.
  - Se evita «SEÑOR» como sustituto automático del nombre divino.
  - Se conserva un estilo bíblico moderno y claro, sin arcaísmos innecesarios.
  - La duplicación pronominal «te la daré» ayuda a reflejar el objeto directo implícito en el hebreo y la relación dativa de לְךָ.
