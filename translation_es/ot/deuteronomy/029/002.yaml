translation:
  language: es
  text: las grandes pruebas que tus ojos vieron[a], aquellas grandes señales y maravillas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las grandes situaciones de prueba». Versiones más antiguas a veces tienen «las grandes tentaciones», pero aquí el sentido es prueba o comprobación, no incitación al pecado.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּסּוֹת
  english_pob_choice: the great trials
  chosen_spanish: las grandes pruebas
  alternatives_spanish:
  - las grandes pruebas
  - las grandes testificaciones
  - las grandes tentaciones
  lexicon: HALOT
  rationale: מַסּוֹת designa pruebas o hechos de prueba, no seducciones al pecado. En español, «pruebas» comunica con naturalidad el sentido de examen/confirmación que el contexto exige, sin cargar el término con la connotación engañosa de «tentaciones».
- source_word: הַגְּדֹלֹת
  english_pob_choice: great
  chosen_spanish: grandes
  alternatives_spanish:
  - grandes
  - múltiples
  - poderosas
  lexicon: HALOT
  rationale: El adjetivo intensifica la magnitud de las pruebas. «Grandes» reproduce esa fuerza de manera directa y natural en español.
- source_word: אֲשֶׁר רָאוּ עֵינֶיךָ
  english_pob_choice: that your eyes saw
  chosen_spanish: que tus ojos vieron
  alternatives_spanish:
  - que viste
  - que tú mismo viste
  lexicon: HALOT
  rationale: La expresión hebrea enfatiza la experiencia ocular directa. «Tus ojos vieron» conserva ese énfasis mejor que reducirlo a un simple «viste».
- source_word: הָאֹתֹת
  english_pob_choice: signs
  chosen_spanish: señales
  alternatives_spanish:
  - signos
  - prodigios
  lexicon: HALOT
  rationale: En este contexto, אוֹת se refiere a actos divinos como señales dadas por Dios. «Señales» es claro en español y mantiene ese valor contextual.
- source_word: וְהַמֹּפְתִים
  english_pob_choice: wonders
  chosen_spanish: maravillas
  alternatives_spanish:
  - prodigios
  - milagros
  lexicon: HALOT
  rationale: מוֹפְתִים se empareja con אוֹתֹת como «señales y maravillas». «Maravillas» preserva el paralelismo establecido y el sentido de actos extraordinarios sin precisar más de lo que el hebreo dice.
- source_word: הַגְּדֹלִים
  english_pob_choice: great
  chosen_spanish: grandes
  alternatives_spanish:
  - grandes
  - poderosas
  lexicon: HALOT
  rationale: Repite el énfasis de magnitud aplicado a las señales y maravillas. «Grandes» mantiene la correspondencia léxica y el tono solemne.
- source_word: הָהֵם
  english_pob_choice: those
  chosen_spanish: aquellas
  alternatives_spanish:
  - esas
  - las mencionadas
  lexicon: HALOT
  rationale: El demostrativo remite con fuerza a las señales y maravillas ya mencionadas. «Aquellas» conserva mejor la distancia anafórica y el carácter enfático del hebreo.
translation_notes:
  revision_awareness: El texto inglés POB sigue una equivalencia óptima y no requiere cambios de fondo; en español se ha conservado el paralelismo de «señales y maravillas» y el valor de prueba de מַסּוֹת, evitando «tentaciones» por su posible malentendido moderno.
  spanish_consistency_notes:
  - Se ha usado «Yahvé» para el nombre divino solo cuando aparezca en el pasaje; en este versículo no aparece.
  - Se ha preferido «señales y maravillas» para mantener el emparejamiento tradicional del hebreo אֹתֹת / מֹפְתִים sin sustituirlo por una formulación más interpretativa.
  - «Aquellas» conserva el apuntado retrospectivo del demostrativo final y evita ambigüedad con el antecedente inmediato.
