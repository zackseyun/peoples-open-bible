review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del hebreo: sujeto implícito, comisión a Josué hijo de Nun, exhortación fija y promesa de presencia divina. Sin embargo, introduce una adición semántica relevante en «que juré darles», porque el hebreo dice solo «que juré a ellos / que les juré», sin repetir «dar».'
  spanish_quality_summary: El español es claro y digno, pero «Y lo mandó a Josué» suena menos natural y algo ambiguo en español; «Y le ordenó a Josué» o «Y mandó a Josué» mejora la lectura. El resto del verso fluye bien. «Sé fuerte y valiente» es idiomático y adecuado.
  glossary_alignment: 'No aparece el nombre divino en este verso. «Josué», «los hijos de Israel» y «la tierra» están alineados con las decisiones del POB. La principal desalineación es lexical: el inglés auditado retiene «swore to them», mientras el español añade «darles».'
  issues:
  - severity: high
    issue: Adición de «darles» en la cláusula del juramento
    rationale: אֲשֶׁר נִשְׁבַּעְתִּי לָהֶם significa literalmente «que les juré / que juré a ellos». Añadir «darles» importa contenido no presente en el verso y se aparta de la decisión auditada del POB de no explicitar «to give».
  - severity: medium
    issue: «Y lo mandó a Josué» es poco natural y algo torpe
    rationale: Aunque intenta reflejar «he commanded», en español bíblico/narrativo «mandó a Josué» puede sugerir envío, y «lo mandó a Josué» suena forzado. «Le ordenó a Josué» preserva mejor la idea de comisión verbal dirigida a Josué.
  revised_spanish_text: 'Y le ordenó a Josué, hijo de Nun, y le dijo: «Sé fuerte y valiente, porque tú introducirás a los hijos de Israel[a] en la tierra que les juré, y yo estaré contigo».'
  revised_footnotes:
  - marker: a
    text: O «los israelitas» o «el pueblo de Israel». El hebreo dice literalmente «los hijos de Israel».
    reason: lexical_alternative
  revision_rationale: Se corrige una adición no presente en el hebreo («darles») para mantener fidelidad a la fuente y al rastro auditado del POB. También se mejora la naturalidad y precisión de la comisión verbal con «le ordenó a Josué». Se añade la nota alternativa para «los hijos de Israel», paralela a la nota del inglés POB y útil en español.
