lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los miembros de la familia de
  lexicon: HALOT
  rationale: En listas genealógicas, el plural constructo de בֵּן puede abarcar una línea familiar más amplia. En español, «los hijos de» conserva la fórmula genealógica de manera transparente y natural en este registro, sin perder la posibilidad de una descendencia amplia.
- source_word: גַזָּם
  english_pob_choice: Gazzam
  chosen_spanish: Gazzam
  lexicon: HALOT
  rationale: Nombre propio; se translitera para mantener la forma del hebreo en una lista nominal.
- source_word: עֻזָּא
  english_pob_choice: Uzza
  chosen_spanish: Uzza
  lexicon: HALOT
  rationale: Nombre propio; se conserva por transliteración estándar.
- source_word: פָסֵחַ
  english_pob_choice: Paseah
  chosen_spanish: Paseah
  alternatives_spanish:
  - Phaseah
  lexicon: HALOT
  rationale: Nombre propio; «Paseah» sigue una transliteración clara y de lectura moderna en español, equivalente a la opción inglesa preferida en el audit trail.
