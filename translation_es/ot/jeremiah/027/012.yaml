translation:
  language: es
  text: 'Y a Sedequías, rey de Judá, hablé todas estas palabras[a], diciendo: «Traigan sus cuellos bajo el yugo del rey de Babilonia, sírvanle a él y a su pueblo, y vivan[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Traigan sus cuellos al yugo del rey de Babilonia».'
    reason: lexical_alternative
  - marker: b
    text: '«Y vivan» también puede entenderse con sentido consecuencial: «y vivirán» o «para que vivan».'
    reason: lexical_alternative
lexical_decisions:
- source_word: צִדְקִיָּה
  english_pob_choice: Zedekiah
  chosen_spanish: Sedequías
  alternatives_spanish:
  - Sedecías
  lexicon: standard transliteration
  rationale: Se conserva el nombre propio con transliteración estándar en español bíblico, usando la forma más reconocible y sobria para lectura eclesial amplia.
- source_word: מֶלֶךְ יְהוּדָה
  english_pob_choice: king of Judah
  chosen_spanish: rey de Judá
  alternatives_spanish:
  - monarca de Judá
  lexicon: HALOT
  rationale: El sintagma constructo se vierte de modo directo y natural en español, sin ampliar ni reinterpretar el título.
- source_word: דִּבַּרְתִּי
  english_pob_choice: I spoke
  chosen_spanish: hablé
  alternatives_spanish:
  - dije
  lexicon: HALOT
  rationale: דבר en piel indica 'hablar'; 'hablé' conserva la distinción verbal frente a לֵאמֹר ('diciendo') mejor que 'dije'.
- source_word: כְּכָל הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: all these words
  chosen_spanish: todas estas palabras
  alternatives_spanish:
  - todas estas cosas
  - según todas estas palabras
  lexicon: HALOT
  rationale: Se mantiene la referencia explícita a 'palabras' de forma idiomática en español; la opción evita el calco pesado de 'según', que el POB inglés ya descartó en la revisión.
- source_word: הָבִיאוּ
  english_pob_choice: Bring
  chosen_spanish: Traigan
  alternatives_spanish:
  - Pongan
  - Metan
  lexicon: HALOT
  rationale: El imperativo hiphil de בוא puede expresarse como 'traer'; en español, 'traigan sus cuellos' conserva la imagen con gramática natural.
- source_word: צַוְּארֵיכֶם
  english_pob_choice: your necks
  chosen_spanish: sus cuellos
  alternatives_spanish:
  - sus cervices
  - sus pescuezos
  lexicon: HALOT
  rationale: El hebreo está en plural con sufijo de segunda persona plural. 'Cuellos' es el equivalente directo y respetuoso, manteniendo la imagen corporal sin vulgaridad.
- source_word: בְּעֹל מֶלֶךְ בָּבֶל
  english_pob_choice: under the yoke of the king of Babylon
  chosen_spanish: bajo el yugo del rey de Babilonia
  alternatives_spanish:
  - en el yugo del rey de Babilonia
  - dentro del yugo del rey de Babilonia
  lexicon: HALOT
  rationale: '''Bajo el yugo'' comunica naturalmente la idea de sujeción política que el hebreo imagina con עֹל, sin perder el símil de esclavitud/subyugación.'
- source_word: וְעִבְדוּ אֹתוֹ
  english_pob_choice: and serve him
  chosen_spanish: y sirvan a él
  alternatives_spanish:
  - y le sirvan
  - y estén sujetos a él
  lexicon: HALOT
  rationale: עבד aquí designa servicio político al rey de Babilonia. 'Sirvan a él' conserva la fuerza de obediencia y sujeción; se evita suavizarlo a un mero servicio general.
- source_word: וְעַמּוֹ
  english_pob_choice: and his people
  chosen_spanish: y a su pueblo
  alternatives_spanish:
  - y a su nación
  lexicon: HALOT
  rationale: Con el verbo 'servir', el complemento directo español requiere la preposición 'a'. 'Su pueblo' sigue de cerca el hebreo y respeta el paralelo del texto.
- source_word: וִחְיוּ
  english_pob_choice: and live
  chosen_spanish: y vivan
  alternatives_spanish:
  - y vivirán
  - para que vivan
  - y viviréis
  lexicon: HALOT
  rationale: Se conserva la concisión exhortativa del hebreo. El español permite un imperativo final breve sin forzar la relación causal que el contexto sugiere pero no explicita morfológicamente.
theological_decisions:
- issue: Lenguaje de sometimiento político a Babilonia
  english_pob_reading: Render the command in straightforward political terms without softening or theologizing it.
  chosen_spanish_reading: La orden se vierte como sometimiento político concreto bajo el dominio de Babilonia, sin espiritualizarla ni suavizar la imagen.
  alternative_spanish_readings:
  - hagan un acto de humildad espiritual
  - obedezcan en general a la autoridad
  rationale: El contexto profético-histórico exige mantener la dureza política del mandato. La traducción no debe resolver la tensión teológica ni convertirla en principio abstracto.
  doctrine_reference: Principio de primacía del texto original; preservar la tensión histórica y teológica sin armonizarla artificialmente.
translation_notes:
  revision_awareness: La redacción sigue el último pase de revisión del POB inglés, que retiró la formulación equivalente a 'según' para preferir una versión más natural de כְּכָל הַדְּבָרִים הָאֵלֶּה como 'all these words'. Se mantiene además la imagen completa de 'yugo', 'servir' y 'vivir' sin reinterpretaciones explicativas.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino cuando aparezca; este versículo no lo contiene.
  - Se emplea 'yugo' y no una paráfrasis abstracta para preservar la metáfora política.
  - '''Sirvan a él y a su pueblo'' mantiene la coordinación del hebreo y el complemento con ''a'' requerido por el español.'
  - La puntuación con comillas latinas y el marcador de nota sigue el estilo editorial del proyecto.
