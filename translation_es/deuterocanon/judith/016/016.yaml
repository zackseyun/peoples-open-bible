review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el contraste principal del griego: toda θυσία y toda grasa sacrificial son relativamente pequeñas frente a la grandeza del que teme al κύριος. También conserva correctamente el matiz de διὰ παντός como permanencia duradera. Sin embargo, hay dos desajustes relevantes: la nota al pie está mal anclada en el texto español, porque [a] aparece tras «agradable» aunque la variante corresponde a «para siempre»; y «víctima» para θυσία, aunque posible, suena menos natural y menos amplio que «sacrificio» en este contexto general.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «toda víctima para aroma agradable» resulta algo rígido y menos idiomático que «todo sacrificio para aroma agradable». La sintaxis global funciona bien. La corrección principal es mover el marcador de nota al segmento final y mejorar la naturalidad léxica en θυσία.
  glossary_alignment: No hay conflicto con la terminología mayor salvo κύριος, donde «Señor» es aceptable aquí porque el texto fuente inmediato es griego κύριον y no hay base suficiente en este versículo aislado para imponer «Yahvé». El resto de términos cultuales está bien encaminado, aunque «sacrificio» alinea mejor con la decisión inglesa documentada para θυσία que «víctima».
  issues:
  - severity: high
    issue: La nota al pie [a] está anclada en «agradable» pero su contenido explica «para siempre»/«siempre».
    rationale: Las instrucciones exigen que cada nota aparezca exactamente en la palabra o frase pertinente. Tal como está, el lector recibe una nota léxica en un lugar equivocado y engañoso.
  - severity: medium
    issue: «Víctima» para θυσία es menos natural y menos fiel al alcance básico del término que «sacrificio».
    rationale: θυσία es el término cultual general para sacrificio. «Víctima» en español puede restringir indebidamente el sentido al animal sacrificado y suena más técnico o forzado en esta máxima sapiencial.
  revised_spanish_text: Porque todo sacrificio para aroma agradable es cosa pequeña, y toda grasa para tu holocausto es muy poca; pero el que teme al Señor es grande para siempre[a].
  revised_footnotes:
  - marker: a
    text: O «siempre»; la expresión griega puede denotar duración continua o permanencia duradera.
    reason: lexical_alternative
  revision_rationale: Se reemplaza «víctima» por «sacrificio» para reflejar mejor θυσία y sonar más natural en español bíblico actual. Se mueve la nota [a] a «para siempre», que es el lugar correcto para la alternativa «siempre». No se requieren cambios doctrinales adicionales.
