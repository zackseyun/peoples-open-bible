lexical_decisions:
- source_word: ἐθεώρουν
  english_pob_choice: They were watching
  chosen_spanish: Lo observaban
  alternatives_spanish:
  - Lo estaban mirando
  - Lo contemplaban
  lexicon: LSJ
  rationale: El imperfecto expresa acción en curso; «lo observaban» conserva bien ese aspecto y suena natural en español formal.
- source_word: Ἀπάμην
  english_pob_choice: Apame
  chosen_spanish: Apame
  alternatives_spanish:
  - Apama
  lexicon: transliteración griega
  rationale: Se mantiene el nombre propio en forma transliterada, sin intentar españolizarlo más allá de lo necesario.
- source_word: θυγατέρα
  english_pob_choice: daughter
  chosen_spanish: hija
  alternatives_spanish:
  - nieta
  lexicon: LSJ
  rationale: Término de parentesco directo; «hija» es la equivalencia normal y precisa.
- source_word: Βαρτάκου
  english_pob_choice: Bartacus
  chosen_spanish: Bartaco
  alternatives_spanish:
  - Bartakes
  lexicon: transliteración griega
  rationale: Se conserva el nombre propio con una transliteración española directa desde el genitivo griego; se evita la forma inglesa del audit trail.
- source_word: τοῦ θαυμαστοῦ
  english_pob_choice: the admirable
  chosen_spanish: el admirable
  alternatives_spanish:
  - el ilustre
  - el famoso
  - el admirable
  lexicon: LSJ
  rationale: θαυμαστός puede expresar alguien digno de admiración o notable; «el admirable» reproduce la fuerza descriptiva sin añadir un título que el griego no exige.
- source_word: παλλακὴν
  english_pob_choice: concubine
  chosen_spanish: la concubina
  alternatives_spanish:
  - la amante
  - la manceba
  lexicon: LSJ
  rationale: El término designa una consorte secundaria; «concubina» es la correspondencia más directa y evita un matiz moderno o ambiguo.
- source_word: καθημένην
  english_pob_choice: sitting
  chosen_spanish: sentada
  alternatives_spanish:
  - sentada allí
  - sentada
  lexicon: LSJ
  rationale: El participio se vierte con un adjetivo participial natural en español, manteniendo la descripción de postura o ubicación.
- source_word: ἐν δεξιᾷ τοῦ βασιλέως
  english_pob_choice: at the king’s right hand
  chosen_spanish: a la derecha del rey
  alternatives_spanish:
  - a la diestra del rey
  - al lado derecho del rey
  lexicon: LSJ
  rationale: La expresión idiomática se entiende claramente en español como posición de honor; «a la derecha del rey» conserva el sentido sin arcaísmo excesivo.
- source_word: βασιλέως
  english_pob_choice: king
  chosen_spanish: rey
  alternatives_spanish:
  - monarca
  lexicon: LSJ
  rationale: Equivalencia estándar y adecuada al contexto narrativo.
theological_decisions:
- issue: Valor descriptivo de τοῦ θαυμαστοῦ unido a Bartaco
  english_pob_reading: treated as a descriptive epithet ('the admirable Bartacus') rather than omitted or converted into a formal title
  chosen_spanish_reading: se conserva como epíteto descriptivo («el admirable»), no como título oficial
  alternative_spanish_readings:
  - Bartaco el famoso
  - Bartaco el ilustre
  rationale: El adjetivo griego está presente y no debe omitirse. En español, «el admirable» mantiene el matiz de alguien digno de admiración sin convertirlo en una designación institucional.
  doctrine_reference: Translation philosophy §1, §5
- issue: Sujeto tácito de ἐθεώρουν
  english_pob_reading: left as 'They were watching' without specifying the subject
  chosen_spanish_reading: se mantiene sin explicitar el sujeto
  alternative_spanish_readings:
  - Los jóvenes lo observaban
  - Ellos lo observaban
  rationale: El griego presenta un plural sin sujeto explícito; el español permite conservar esa indeterminación sin importar contexto adicional.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión que prefirió una puntuación más natural en inglés; en español se adoptó una sola oración con comas, manteniendo la estructura appositiva del griego y el flujo narrativo. También se respetó la lectura del audit trail que conserva el epíteto descriptivo para θαυμαστός y la indeterminación del sujeto de ἐθεώρουν.
  spanish_consistency_notes:
  - Se usa «Yahvé» por norma general solo cuando el texto lo requiera; este versículo no lo contiene.
  - Se preserva la transliteración española de nombres propios sin depender de la forma inglesa del audit trail.
  - Se mantiene «concubina» para παλλακή, en línea con el valor léxico directo del término.
  - La expresión espacial «a la derecha del rey» se eligió por claridad, con nota alternativa para «a la diestra».
