- from: 'Estos fueron los hijos de Raquel, que nacieron para Jacob: en total, catorce personas[a].'
  to: 'Estos fueron los hijos de Raquel, que le nacieron a Jacob: catorce personas en total[a].'
  rationale: Se reemplaza «para Jacob» por «le nacieron a Jacob» para expresar con español natural la relación genealógica marcada por לְ. También se ajusta levemente la nota para que suene más idiomática en español, manteniendo la misma información léxica del rastro de auditoría inglés.
