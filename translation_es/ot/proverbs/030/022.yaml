    rationale: Aunque calca el inglés «under», en español bíblico y general la fórmula listada funciona mejor con «bajo», especialmente en una construcción elíptica como la de Proverbios 30:21–23.
  - severity: medium
    issue: «cuando reina» debilita el matiz de ascenso inesperado de יִמְלֹךְ en este contexto.
    rationale: 'La decisión inglesa documenta que el punto es la inversión social: no solo que ejerza reinado, sino que llegue a la posición de rey. «cuando llega a ser rey» preserva mejor ese foco.'
