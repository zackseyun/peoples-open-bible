review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del arameo y sigue de cerca la auditoría inglesa: mandato real, identificación de los acusadores de Daniel, inclusión explícita de hijos y esposas, ataque de los leones antes de tocar el fondo, y destrucción total de sus huesos. Sin embargo, hay dos desajustes menores: «esos hombres» suena algo proximal donde el referente narrativo previo se expresa mejor con «aquellos hombres», y «sus hijos» pierde la precisión de בְּנֵיהוֹן, que significa específicamente «sus hijos/sons», mejor como «sus hijos varones» o manteniendo una nota; además, la nota al pie usa singular («comió») cuando el sujeto es plural.'
  spanish_quality_summary: El texto es claro, natural y de registro digno. No obstante, «fueron traídos» resulta algo tieso en español bíblico actual frente a «hicieron traer» o «fueron llevados», aunque sigue siendo aceptable. La puntuación con punto y coma funciona, pero la raya reproduce mejor la aposición enfática del original/POB. «Se apoderaron de ellos» comunica el dominio, pero «los dominaron» o «los vencieron» es algo más directo; aun así no es un error. La mejora principal es precisión léxica y ajuste de la nota.
  glossary_alignment: No hay términos del glosario mayor en disputa aquí. El borrador respeta bien la decisión documentada de no suavizar el castigo corporativo. Conviene alinear mejor la precisión lexical de «sons» con «hijos varones» y corregir la nota del modismo arameo al plural.
  issues:
  - severity: medium
    issue: «sus hijos» no preserva la precisión de «their sons» / בְּנֵיהוֹן
    rationale: El proyecto documentó explícitamente que el texto dice «sons», no «children». En español «hijos» puede oírse genérico. «Sus hijos varones» preserva mejor la especificidad sin suavizar.
  - severity: low
    issue: El demostrativo «esos hombres» puede mejorarse a «aquellos hombres»
    rationale: El arameo señala un grupo previamente identificado y narrativamente más distal. «Aquellos hombres» suena más natural en este contexto bíblico que «esos hombres».
  - severity: low
    issue: La nota al pie dice «comió sus piezas» en singular
    rationale: El verbo arameo está en plural («comieron»). La nota debe reflejar correctamente la forma literal del modismo.
