translation:
  language: es
  text: Más fácil es llevar arena, sal y un trozo de hierro que a un hombre insensato[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un hombre sin entendimiento» o «un hombre necio».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄμμον
  english_pob_choice: sand
  chosen_spanish: arena
  alternatives_spanish:
  - arena fina
  - arena
  lexicon: LSJ
  rationale: El griego nombra el material concreto; en español, «arena» conserva el sustantivo de masa natural y el contraste con objetos pesados. «Arena fina» explicitaría de más.
- source_word: ἅλα
  english_pob_choice: salt
  chosen_spanish: sal
  alternatives_spanish:
  - sal
  - sal común
  lexicon: LSJ
  rationale: «Sal» reproduce el sustantivo colectivo del original y funciona de modo natural en la serie de cargas materiales.
- source_word: βῶλον σιδήρου
  english_pob_choice: a lump of iron
  chosen_spanish: un terrón de hierro
  alternatives_spanish:
  - un trozo de hierro
  - una masa de hierro
  - un bloque de hierro
  lexicon: LSJ
  rationale: βῶλος designa una masa o terrón; «terrón» conserva la imagen de un bulto compacto y pesado. Aunque «lump of iron» en inglés suena idiomático, en español «terrón» mantiene mejor la forma concreta del comparativo.
- source_word: εὔκοπον
  english_pob_choice: easier
  chosen_spanish: más fácil
  alternatives_spanish:
  - más llevadero
  - más sencillo
  lexicon: LSJ
  rationale: El adjetivo entra en una comparación explícita con ἢ; por eso en español conviene un comparativo natural («más fácil») y no solo «fácil».
- source_word: ὑπενεγκεῖν
  english_pob_choice: to carry
  chosen_spanish: llevar
  alternatives_spanish:
  - cargar
  - soportar
  - aguantar
  lexicon: LSJ
  rationale: Con objetos concretos enumerados, el verbo apunta primero al acto físico de transportar. «Llevar» preserva esa imagen sin perder el matiz de carga.
- source_word: ἄνθρωπον
  english_pob_choice: man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - un ser humano
  lexicon: LSJ
  rationale: El sustantivo griego es masculino singular y el proverbio contrasta objetos con un humano individual. «Un hombre» conserva la forma de género del original y la concreción proverbial.
- source_word: ἀσύνετον
  english_pob_choice: senseless
  chosen_spanish: insensato
  alternatives_spanish:
  - sin entendimiento
  - necio
  - falto de entendimiento
  lexicon: LSJ
  rationale: La revisión inglesa favorece «senseless» en registro bíblico formal. En español, «insensato» mantiene el tono sapiencial y evita una lectura moderna de capacidad intelectual, a la vez que refleja la falta de buen juicio del término griego.
theological_decisions:
- issue: Género de ἄνθρωπον
  english_pob_reading: man
  chosen_spanish_reading: un hombre
  alternative_spanish_readings:
  - una persona
  - un ser humano
  rationale: Se conserva la forma masculina singular del griego, en coherencia con la política de precisión formal del POB. El proverbio usa una figura humana concreta, no una neutralización universalizante.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Tono sapiencial de ἀσύνετον
  english_pob_reading: senseless
  chosen_spanish_reading: insensato
  alternative_spanish_readings:
  - necio
  - sin entendimiento
  rationale: El dicho pertenece a la literatura sapiencial y censura la falta de sensatez, no una condena moral técnica. «Insensato» conserva ese matiz proverbial y el registro bíblico sin intensificar el juicio.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 6
translation_notes:
  revision_awareness: La versión inglesa revisó «unintelligent» a «senseless» para evitar un matiz moderno de capacidad cognitiva; la redacción española sigue esa revisión con «insensato», y se mantiene la comparación explícita del griego entre cargas materiales y una persona sin juicio.
  spanish_consistency_notes:
  - Se evitó «Señor» u otro reemplazo devocional porque el versículo no contiene el nombre divino.
  - «Arena», «sal» y «terrón de hierro» preservan la secuencia concreta de objetos pesados del original.
  - La nota [a] está anclada en el texto y recoge alternativas semánticas reales del griego sin duplicar el significado principal.
