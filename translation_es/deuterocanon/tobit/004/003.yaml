translation:
  language: es
  text: 'Y llamándolo[a], le dijo: «Hijo, si yo muero, sepúltame, y no descuides a tu madre; hónrala todos los días de tu vida»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no la pases por alto» o «no la desatiendas»; la tradición semítica paralela tiene un sentido más fuerte, como «no la abandones».'
    reason: lexical_alternative
lexical_decisions:
- source_word: καλέσας
  english_pob_choice: calling
  chosen_spanish: llamándolo
  alternatives_spanish:
  - después de llamarlo
  - llamando a Tobías
  lexicon: BDAG
  rationale: El participio introduce el discurso de manera narrativa. «Llamándolo» conserva la secuencia y el matiz relacional sin volverlo rígido.
- source_word: Παιδίον
  english_pob_choice: Child
  chosen_spanish: Hijo
  alternatives_spanish:
  - Hijo mío
  - Niño
  - Muchacho
  lexicon: BDAG
  rationale: Aunque el griego dice literalmente «niño/pequeño», el contexto filial y la tradición semítica paralela muestran que se está dirigiendo a su hijo. «Hijo» es natural en español y preserva el vínculo, sin añadir innecesariamente «mío».
- source_word: ἐὰν ἀποθάνω
  english_pob_choice: if I die
  chosen_spanish: si yo muero
  alternatives_spanish:
  - cuando yo muera
  - si llego a morir
  lexicon: BDAG
  rationale: La condicional griega se mantiene como condicional. «Si yo muero» conserva la forma del original sin perder naturalidad en español.
- source_word: θάψον με
  english_pob_choice: bury me
  chosen_spanish: sepúltame
  alternatives_spanish:
  - entiérrame
  - dame sepultura
  lexicon: BDAG
  rationale: «Sepúltame» es un equivalente directo, solemne y claro. «Entiérrame» también es posible, pero «sepultar» mantiene mejor el tono literario del pasaje.
- source_word: μὴ ὑπερίδῃς
  english_pob_choice: do not neglect
  chosen_spanish: no descuides
  alternatives_spanish:
  - no pases por alto
  - no desatiendas
  - no ignores
  lexicon: BDAG
  rationale: El verbo puede significar pasar por alto o desatender. En este mandato filial, «no descuides» expresa bien la fuerza práctica y relacional, en línea con la tradición semítica más fuerte de no abandonarla.
- source_word: τίμα
  english_pob_choice: honor
  chosen_spanish: honrarla
  alternatives_spanish:
  - respétala
  - muéstrale honor
  lexicon: BDAG
  rationale: «Honrar» es la forma bíblica y ética más fiel al mandato. El enclítico «-la» queda claro y fluido en español.
- source_word: πάσας τὰς ἡμέρας τῆς ζωῆς σου
  english_pob_choice: all the days of your life
  chosen_spanish: todos los días de tu vida
  alternatives_spanish:
  - durante toda tu vida
  - mientras vivas
  lexicon: BDAG
  rationale: Es una equivalencia directa, solemne y natural que conserva el alcance total del mandato.
theological_decisions:
- issue: Relación entre el griego breve y la tradición semítica más amplia respecto a la madre
  english_pob_reading: The main text follows the Greek wording closely while allowing the Semitic witness to confirm the ethical force of 'do not neglect your mother.'
  chosen_spanish_reading: 'El texto principal sigue de cerca el griego, pero «no descuides» deja abierta la fuerza ética más fuerte que confirma la tradición semítica: no abandonarla ni desatenderla.'
  alternative_spanish_readings:
  - «no la abandones»
  - «no la ignores»
  - «no la desprecies»
  rationale: La versión griega citada es la base principal; no se deben importar cláusulas adicionales de la tradición semítica. Sin embargo, el verbo español debe poder abarcar la advertencia de no desatender ni abandonar a la madre.
  doctrine_reference: 'PHILOSOPHY.md: original-language primacy for deuterocanonical source text; derivative-work guardrails'
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador de nota [a] ahora aparece exactamente en el texto español, junto a la frase a la que se vincula.'
  spanish_consistency_notes:
  - Se mantiene el estilo bíblico moderno y digno, sin calco rígido.
  - Se conserva la tensión entre «no descuides» y la fuerza más fuerte de la tradición semítica en la nota.
  - «Hijo» se usa por el contexto filial, aunque el griego literal sea más general.
  - «Sepúltame» y «honrarla» preservan el tono solemne del mandato.
