translation:
  language: es
  text: 'Y haga Dios esto para tu exaltación eterna[a], para visitarte con bienes, porque no escatimaste tu vida por la humillación de nuestro pueblo, sino que saliste ante nuestra caída, habiendo caminado rectamente delante de nuestro Dios. Y todo el pueblo dijo: «Así sea, así sea».[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «altura eterna» u «honra eterna». El griego ὕψος conserva la imagen de elevación.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Amén, amén» o «Sea así, sea así». Griego: «Γένοιτο, γένοιτο».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ποιήσαι ... εἰς ὕψος αἰώνιον
  english_pob_choice: make this for you an everlasting exaltation
  chosen_spanish: haga Dios esto para ti en exaltación eterna
  alternatives_spanish:
  - haga Dios esto para ti en altura eterna
  - haga Dios esto para ti en honra eterna
  lexicon: LSJ
  rationale: El griego expresa un deseo/optativo con ποιέω + εἰς ὕψος; en español, «haga Dios esto para ti» conserva el valor de petición, y «exaltación eterna» mantiene la imagen de elevación sin volverla artificial.
- source_word: τοῦ ἐπισκέψασθαί σε ἐν ἀγαθοῖς
  english_pob_choice: to visit you with good things
  chosen_spanish: para visitarte con bienes
  alternatives_spanish:
  - para visitarte con cosas buenas
  - para mirarte con favor
  lexicon: LSJ
  rationale: ἐπισκέπτομαι conserva aquí el matiz de visitar/atender con benevolencia; «con bienes» reproduce de forma breve y natural la idea de beneficios recibidos, sin perder la referencia al acto de visitar.
- source_word: οὐκ ἐφείσω τῆς ψυχῆς σου
  english_pob_choice: you did not spare your life
  chosen_spanish: no perdonaste tu vida
  alternatives_spanish:
  - no escatimaste tu vida
  - no te reservaste la vida
  lexicon: LSJ
  rationale: ψυχή aquí vale por la vida en peligro mortal. «No perdonaste tu vida» es una forma natural en español bíblico contemporáneo y conserva el costo personal subrayado por el griego.
- source_word: διὰ τὴν ταπείνωσιν τοῦ γένους ἡμῶν
  english_pob_choice: because of the humiliation of our people
  chosen_spanish: por la humillación de nuestro pueblo
  alternatives_spanish:
  - por la aflicción de nuestra nación
  - por el abatimiento de nuestro linaje
  lexicon: LSJ
  rationale: ταπείνωσις aquí apunta a humillación/abatimiento público; «humillación» es la equivalencia más directa y clara. γένος se entiende colectivamente como «pueblo» en español actual.
- source_word: ἐπεξῆλθες πτώματι ἡμῶν
  english_pob_choice: went out before our fall
  chosen_spanish: saliste antes de nuestra ruina
  alternatives_spanish:
  - saliste antes de nuestra caída
  - saliste al encuentro de nuestra ruina
  lexicon: LSJ
  rationale: La revisión inglesa resolvió πτῶμα como «our fall»; en español, «ruina» comunica bien el estado de destrucción o caída. «Antes de» sigue la lectura revisada, sin forzar una relación más específica que el griego no exige.
- source_word: ἐπʼ εὐθεῖαν πορευθεῖσα
  english_pob_choice: having walked straight
  chosen_spanish: habiendo caminado rectamente
  alternatives_spanish:
  - habiendo andado por el camino recto
  - habiendo procedido con rectitud
  lexicon: LSJ
  rationale: La expresión conserva la imagen de caminar en línea recta y también el matiz moral. «Rectamente» es más fluido en español que un calco demasiado literal.
- source_word: Γένοιτο, γένοιτο
  english_pob_choice: So be it, so be it
  chosen_spanish: Así sea, así sea
  alternatives_spanish:
  - Amén, amén
  - Sea así, sea así
  lexicon: LSJ
  rationale: La respuesta litúrgica del pueblo se puede verter naturalmente como «Así sea». Se preserva la duplicación del original, manteniendo el tono de asentimiento comunitario.
theological_decisions:
- issue: Respuesta congregacional Γένοιτο, γένοιτο
  english_pob_reading: So be it, so be it
  chosen_spanish_reading: Así sea, así sea
  alternative_spanish_readings:
  - Amén, amén
  - Sea así, sea así
  rationale: No se debe imponer una formulación eclesiástica fija si el griego simplemente registra asentimiento coral. «Así sea» transmite el valor performativo y comunitario de la respuesta sin ocultar que el término griego es literalmente desiderativo.
  doctrine_reference: Principio POB de conservar alternativas relevantes cuando el griego admite una respuesta litúrgica no única.
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del contexto inglés: αὐτά se entiende de forma idiomática como «esto»; τοῦ ἐπισκέψασθαί σε se refleja como infinitivo de finalidad («para visitarte»); πτώματι ἡμῶν se vierte siguiendo la corrección a «before our fall»; y Γένοιτο se toma como respuesta litúrgica «Así sea», manteniendo la duplicación. También se evitó traducir mecánicamente desde una versión inglesa previa cuando el griego ofrecía una imagen más precisa.'
  spanish_consistency_notes:
  - Se usa «Dios» para ὁ θεός, conforme al estándar del proyecto.
  - Se mantiene «pueblo» para γένος en este contexto colectivo, evitando «raza» por carga moderna indebida.
  - «Exaltación» conserva la metáfora de altura sin sustituirla por un término eclesiástico no requerido.
  - La puntuación final y la duplicación responden al estilo bíblico en español moderno, no a una paráfrasis libre.
