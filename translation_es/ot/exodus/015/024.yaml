translation:
  language: es
  text: 'Y el pueblo[a] murmuró contra Moisés, diciendo: «¿Qué beberemos?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se quejó». El verbo hebreo expresa una queja comunitaria, especialmente en relatos del desierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּלֹּנוּ
  english_pob_choice: grumbled
  chosen_spanish: murmuró
  alternatives_spanish:
  - se quejó
  - refunfuñó
  lexicon: HALOT
  rationale: El verbo en este contexto de desierto expresa queja comunitaria contra una autoridad. «Murmuró» conserva ese valor colectivo y negativo sin sonar demasiado coloquial o interpretativo en español.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - el pueblo de Israel
  lexicon: HALOT
  rationale: El hebreo dice literalmente «el pueblo». En español bíblico contemporáneo «el pueblo» transmite bien el referente colectivo sin añadir «de Israel», que sería explicativo pero no está en el texto.
- source_word: עַל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - a
  - en contra de
  lexicon: HALOT
  rationale: Con verbos de queja, עַל introduce el blanco de la reclamación. «Contra Moisés» reproduce con naturalidad el valor adversativo.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: Nombre propio convencional
  rationale: Se mantiene la forma española estándar del nombre propio.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: La construcción introductoria del discurso se conserva con «diciendo», una solución directa y fiel al encadenamiento narrativo.
- source_word: מַה
  english_pob_choice: What
  chosen_spanish: ¿Qué
  alternatives_spanish:
  - ¿Qué es lo que
  lexicon: HALOT
  rationale: El interrogativo simple del hebreo se refleja con «¿Qué?» sin expandir el sentido.
- source_word: נִּשְׁתֶּה
  english_pob_choice: shall we drink
  chosen_spanish: beberemos
  alternatives_spanish:
  - hemos de beber
  - vamos a beber
  lexicon: HALOT
  rationale: El imperfecto 1cp de שׁתה aquí formula una pregunta urgente de necesidad inmediata. «¿Qué beberemos?» es natural en español y preserva la fuerza directa de la pregunta.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el acuerdo interrevisor fue alto y se mantuvo el sentido ya consensuado.
  spanish_consistency_notes:
  - Se conserva el registro bíblico sobrio y contemporáneo.
  - Se evita ampliar «el pueblo» a «el pueblo de Israel» porque el hebreo no lo explicita.
  - La pregunta se formula en plural de primera persona siguiendo el hebreo y la tradición del pasaje.
