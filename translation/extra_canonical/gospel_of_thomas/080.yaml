translation:
  text: Jesus said[a], “Whoever has come to know the world has found the body; and
    whoever has found the body[e][d][c][b], the world is not worthy of him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Coptic ⲡⲥⲱⲙⲁ can mean either ‘body’ or ‘corpse.’ ‘Corpse’ is chosen to preserve
      Thomas’s stark antithesis; ‘body’ is possible but blunter.
    reason: lexical_alternative
  - marker: b
    text: The verb ϩⲉ ‘find’ appears with ⲉ before its object here, a dialectal/orthographic
      trait in Nag Hammadi Coptic that does not change the verb’s sense.
    reason: dialect_note
  - marker: c
    text: 'The definite article with ⲥⲱⲙⲁ is rendered anaphorically: first mention
      as ‘a corpse,’ second as ‘the corpse,’ a common way to reflect Coptic generic
      + anaphoric definiteness in English.'
    reason: cultural_note
  - marker: d
    text: Compare Saying 56, which transmits a closely parallel maxim; Thomas preserves
      both forms without internal harmonization.
    reason: cross_reference
  - marker: e
    text: Or 'a corpse; and whoever has found the corpse'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲡⲉϫⲉ ⲓⲏⲥⲟⲩⲥ
  chosen: Jesus said
  alternatives:
  - Jesus says
  lexicon: Layton, Coptic Grammar; Lambdin, Introduction to Sahidic Coptic (on the
    narrative formula)
  rationale: Formulaic Thomasine speech-introduction. While ⲡⲉϫⲉ is formally present,
    English idiom and Thomasine convention render it as a past-tense quotation marker.
- source_word: ⲡⲉⲧⲉⲣⲉ … ⲥⲟⲟⲩⲛ
  chosen: whoever has come to know
  alternatives:
  - whoever has known
  - whoever has recognized
  lexicon: Crum s.v. ⲥⲟⲟⲩⲛ ‘to know’
  rationale: Relative perfect construction (ⲡⲉⲧⲉⲣⲉ + subject + verb) indicates completed
    action. “Come to know” captures perfect nuance without over-interpretation.
- source_word: ⲡⲕⲟⲥⲙⲟⲥ
  chosen: the world
  alternatives:
  - the cosmos
  - the ordered world
  lexicon: Crum s.v. ⲕⲟⲥⲙⲟⲥ
  rationale: Greek loan with broad semantic range; “world” is the established Thomasine
    diction and preserves ambiguity (cosmic order / human world).
- source_word: ϩⲉ (with ⲉ)
  chosen: has found
  alternatives:
  - has discovered
  - has come upon
  lexicon: Crum s.v. ϩⲉ ‘find’
  rationale: Basic sense is ‘find.’ The preposition ⲉ after ϩⲉ reflects dialectal
    usage; it does not change core meaning.
- source_word: ⲡⲥⲱⲙⲁ
  chosen: a corpse / the corpse
  alternatives:
  - a body / the body
  lexicon: Crum s.v. ⲥⲱⲙⲁ ‘body, corpse’
  rationale: While the lexical range includes ‘body,’ Thomas’s paradox sharpens if
    read ‘corpse.’ First mention rendered ‘a corpse’ (generic discovery); second is
    anaphoric ‘the corpse’ (Coptic definite article).
- source_word: ⲙⲡϣⲁ … ⲛⲛⲧⲟϥ ⲁⲛ
  chosen: is not worthy of him
  alternatives:
  - does not merit him
  - is unworthy of him
  lexicon: Crum s.v. ϣⲁ ‘to be worthy, worth’
  rationale: Idiomatically ‘be worthy of.’ Negative circumfix m—…—an conveyed by “not.”
    ‘Of him’ follows the Coptic pronominal complement.
- source_word: ⲇⲉ
  chosen: and
  alternatives:
  - but
  - now
  lexicon: Crum s.v. ⲇⲉ
  rationale: Simple connective; English ‘and’ keeps Thomas’s asyndetic/parallel punch
    without adding contrast not explicit in context.
textual_note: No lacunae are present in Dilley’s text for this saying. The codex’s
  phrase-joined transcription shows 1) ⲁϥϩⲉ ⲉⲡⲥⲱⲙⲁ in line 13, while the normalized
  lemma reads the expected relative perfect structure ⲡⲉⲧⲉⲣⲉⲁⲛⲧⲟϥ ϩⲉ ⲉⲡⲥⲱⲙⲁ; this
  reflects orthographic compression of the relative clause in the manuscript. 2) The
  object of ‘be worthy of’ appears as ⲙ̄ⲙⲟϥ in the manuscript but is normalized to
  ⲛⲛⲧⲟϥ; both constructions are attested for expressing ‘of him’ with this predicate.
  The use of ⲉ after ϩⲉ (‘find’) is a known dialectal/orthographic feature in NH II
  (Lycopolitan influence) and does not affect the meaning.
