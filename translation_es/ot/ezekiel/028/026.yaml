review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la secuencia principal del hebreo: habitar en la tierra, construir casas, plantar viñas, habitar con seguridad, juicios divinos contra los hostiles circundantes y el reconocimiento de Yahvé como su Dios. También preserva correctamente la repetición de «habitarán ... con seguridad» y usa «Yahvé» conforme al proyecto. Sin embargo, la nota al pie está mal anclada y explica una alternativa para «los tratan con desprecio» aunque el ancla aparece en «con seguridad». Además, la colocación «sobre todos los que, alrededor de ellos, los desprecian» es comprensible pero menos natural que una reordenación más fluida.'
  spanish_quality_summary: El español es generalmente claro y digno, pero la frase relativa con inciso «, alrededor de ellos,» suena algo trabada. Una redacción como «sobre todos los que están alrededor de ellos y los desprecian» o «sobre todos los que los desprecian, los que están alrededor de ellos» sería más natural. También conviene ajustar la puntuación final a «Yahvé su Dios» sin coma, por ser la construcción bíblica normal en español y reflejar mejor la aposición posesiva del hebreo.
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יְהוָה → «Yahvé»; שְׁפָטִים → «juicios»; preservación de la repetición de seguridad. No hay conflictos doctrinales. La principal desviación es técnica/editorial: la nota léxica sobre שָׁאט está asociada al lugar equivocado del texto.'
  issues:
  - severity: medium
    issue: Nota al pie mal anclada
    rationale: La nota [a] aparece en «con seguridad[a]», pero su contenido trata la alternativa léxica de «los desprecian / los escarnecen» para שָׁאט. Esto rompe la correspondencia obligatoria entre marcador y palabra/frase anotada.
  - severity: low
    issue: Orden de la frase relativa poco natural
    rationale: «sobre todos los que, alrededor de ellos, los desprecian» refleja los elementos hebreos, pero en español suena más rígido de lo necesario. Puede mejorarse sin perder sentido.
  - severity: low
    issue: Coma innecesaria en «Yahvé, su Dios»
    rationale: En esta fórmula profética, «Yahvé su Dios» fluye mejor y se ajusta más de cerca al hebreo אֱלֹהֵיהֶם sin pausar entre nombre y posesivo.
  revised_spanish_text: Habitarán en ella con seguridad, construirán casas y plantarán viñas. Habitarán con seguridad cuando yo ejecute juicios sobre todos los que están alrededor de ellos y los desprecian[a]. Entonces sabrán que yo soy Yahvé su Dios.
  revised_footnotes:
