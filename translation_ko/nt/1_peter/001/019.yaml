  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τιμίῳ αἵματι
  english_pob_choice: the precious blood
  chosen_korean: 보배로운 피
  alternatives_korean:
  - 값진 피
  - 귀한 피
  lexicon: BDAG
  rationale: τίμιος의 「값진·귀한」 의미를 한국 성서 전통의 「보배로운」으로 옮긴다.
- source_word: ἀμνοῦ ἀμώμου καὶ ἀσπίλου
  english_pob_choice: a lamb without blemish and without spot
  chosen_korean: 흠 없고 점 없는 어린 양
  alternatives_korean:
  - 흠도 없고 티도 없는 어린 양
  lexicon: BDAG
  rationale: ἄμωμος(흠 없는, 제의적 결격이 없는) + ἄσπιλος(점 없는, 도덕적 흠 없는)를 두 짝으로 보존한다. 출 12:5 유월절 어린 양과 사 53장의 메시아 심상을 함께 환기한다.
- source_word: Χριστοῦ
  english_pob_choice: of Messiah
  chosen_korean: 메시아의
  alternatives_korean:
  - 그리스도의
  lexicon: BDAG
  rationale: 칭호로서 「메시아」 유지.
theological_decisions:
- issue: 출 12장 유월절 어린 양 심상의 보존
  chosen_reading: '「흠 없고 점 없는 어린 양」으로 옮겨 유월절·이사야 53장 두 심상을 모두 환기'
  alternative_readings:
  - 「제물 양」으로 한 줄 요약
  rationale: 베드로전서는 유월절 출애굽 모티프를 1:13(허리 동임)부터 1:18-19(구속·어린 양 피)까지 일관되게 깔고 있다. 두 형용사를 그대로 보존하여 그 신학적 함의를 살린다.
  doctrine_reference: 'DOCTRINE.md: OT 심상 보존'
