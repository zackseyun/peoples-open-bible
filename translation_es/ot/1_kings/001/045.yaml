translation:
  language: es
  text: Y Sadoc el sacerdote y Natán el profeta lo han ungido rey en Gihón, y han subido de allí gozosos, y la ciudad está alborotada[a]. Ese es el sonido[b] que oyeron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la ciudad resuena» o «la ciudad fue conmovida»; el hebreo expresa una conmoción ruidosa.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «ruido»; el hebreo también puede referirse al estruendo o ruido producido por la conmoción.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּמְשְׁחוּ אֹתוֹ
  english_pob_choice: have anointed him
  chosen_spanish: lo han ungido
  alternatives_spanish:
  - lo ungieron
  - lo han consagrado
  lexicon: HALOT
  rationale: En contexto real-monárquico, משׁח se refiere a ungir para una función real. En español, «ungir» conserva el sentido técnico sin perder naturalidad; el perfecto compuesto refleja bien el efecto vigente del acto en el relato.
- source_word: צָדוֹק הַכֹּהֵן
  english_pob_choice: Zadok the priest
  chosen_spanish: Sadoc el sacerdote
  alternatives_spanish:
  - Sadoc, el sacerdote
  - Sadoc el sacerdote principal
  lexicon: Transliteración tradicional con título común
  rationale: Se translitera el nombre propio al español como «Sadoc». Se traduce הַכֹּהֵן por «el sacerdote», que es el equivalente directo y claro en español bíblico contemporáneo.
- source_word: וְנָתָן הַנָּבִיא
  english_pob_choice: Nathan the prophet
  chosen_spanish: Natán el profeta
  alternatives_spanish:
  - Natán, el profeta
  lexicon: Transliteración tradicional con título común
  rationale: «Natán» es la forma española habitual del nombre. «Profeta» mantiene el título sin introducir matices ajenos al hebreo נָבִיא.
- source_word: לְמֶלֶךְ
  english_pob_choice: king
  chosen_spanish: rey
  alternatives_spanish:
  - como rey
  - para rey
  lexicon: HALOT
  rationale: La frase señala la investidura en la función real; en español, «lo han ungido rey» es directo, idiomático y fiel. «Como rey» sería posible, pero menos natural en este contexto.
- source_word: בְּגִחֹון
  english_pob_choice: at Gihon
  chosen_spanish: en Gihón
  alternatives_spanish:
  - a Gihón
  lexicon: Topónimo hebreo
  rationale: Se conserva el nombre del lugar como topónimo bíblico conocido en español. La preposición «en» es la más natural para ubicar la acción.
- source_word: וַיַּעֲלוּ מִשָּׁם
  english_pob_choice: they have come up from there
  chosen_spanish: han subido de allí
  alternatives_spanish:
  - subieron de allí
  - vinieron de allí
  lexicon: HALOT
  rationale: עלה expresa literalmente «subir/ascender». «Han subido de allí» reproduce el movimiento sin añadir interpretación. El compuesto mantiene la conexión con el presente narrativo del contexto explicado por el hablante.
- source_word: שְׂמֵחִים
  english_pob_choice: rejoicing
  chosen_spanish: gozosos
  alternatives_spanish:
  - alegres
  - con gozo
  lexicon: HALOT
  rationale: El participio describe su actitud al subir. «Gozosos» transmite alegría visible y solemne sin caer en una paráfrasis excesiva; «con gozo» sería más explícito, pero menos compacto.
- source_word: וַתֵּהֹם הַקִּרְיָה
  english_pob_choice: the city is in an uproar
  chosen_spanish: la ciudad está alborotada
  alternatives_spanish:
  - la ciudad se conmueve
  - la ciudad está en tumulto
  - la ciudad resuena
  lexicon: HALOT
  rationale: הום indica ruido, conmoción y agitación. «Está alborotada» recoge tanto el desorden sonoro como la perturbación social. Frente a «resuena», preserva mejor la tensión semántica que el inglés POB también dejó abierta.
- source_word: הוּא הַקּוֹל אֲשֶׁר שְׁמַעְתֶּם
  english_pob_choice: That is the sound that you heard
  chosen_spanish: Ese es el sonido que oíste
  alternatives_spanish:
  - Ese es el ruido que oíste
  - Ese es el sonido que habéis oído
  lexicon: HALOT
  rationale: קוֹל puede ser «sonido», «voz» o «ruido»; aquí, por el contexto de la explicación sobre el alboroto, «sonido» es amplio y fiel. Se mantiene el demostrativo «Ese» para reflejar היטב el הוּא. Se usa el singular porque el hebreo también lo hace.
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado solo para añadir «that» en la última cláusula por naturalidad formal. La presente traducción refleja esa misma estructura explicativa final («Ese es el sonido que oíste») sin introducir cambios de sentido ni tensiones nuevas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» fuera de este versículo porque no aparece el nombre divino en el texto fuente.
  - 'Se transliteran los nombres propios al uso español bíblico habitual: Sadoc, Natán, Gihón.'
  - Se conserva el matiz de resultado actual con el perfecto compuesto («han ungido», «han subido»), acorde con el encuadre explicativo del hablante.
  - Se traduce הַקִּרְיָה de forma funcional como «la ciudad», siguiendo el valor contextual de urbe/ciudad, no como un nombre propio.
