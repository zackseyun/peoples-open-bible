translation:
  language: es
  text: Probémoslo con insolencia[a] y tortura, para que conozcamos su mansedumbre y probemos su tolerancia al mal[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ultraje» o «abuso». El término griego puede referirse a trato insolente y ofensivo, no solo a una simple falta de respeto.
    reason: lexical_alternative
  - marker: b
    text: O «su paciencia para soportar agravios». El término final se refiere específicamente a soportar el daño o la injuria sin devolver mal por mal.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὕβρει
  english_pob_choice: with insolence
  chosen_spanish: con insolencia
  alternatives_spanish:
  - con insulto
  - con ultraje
  - con abuso
  lexicon: LSJ
  rationale: ὕβρις aquí expresa trato abusivo, insolente o ultrajante; «insolencia» conserva el matiz de arrogancia ofensiva y encaja bien en español moderno sin suavizar el abuso.
- source_word: βασάνῳ
  english_pob_choice: torture
  chosen_spanish: tortura
  alternatives_spanish:
  - tormento
  - suplicio
  - prueba dolorosa
  lexicon: LSJ
  rationale: βάσανος puede referirse a tortura o tormento severo usado como medio de prueba. «Tortura» preserva la concreción del medio hostil, en paralelo con la idea de probar.
- source_word: ἐτάσωμεν
  english_pob_choice: test
  chosen_spanish: Probémoslo
  alternatives_spanish:
  - Examinémoslo
  - Pongámoslo a prueba
  lexicon: LSJ
  rationale: 'El subjuntivo exhortativo pide una propuesta: «probemos». En español, el clítico «lo» mantiene el objeto directo y el verbo conserva el valor de poner a prueba.'
- source_word: ἐπιείκειαν
  english_pob_choice: gentleness
  chosen_spanish: mansedumbre
  alternatives_spanish:
  - clemencia
  - amabilidad
  - gentileza
  lexicon: LSJ
  rationale: ἐπιείκεια designa una disposición suave, moderada y clemente. «Mansedumbre» es una opción bíblica y clara en español para esa virtud, sin perder el tono ético del contexto.
- source_word: δικάσωμεν
  english_pob_choice: test
  chosen_spanish: probemos
  alternatives_spanish:
  - juzguemos
  - examinemos
  - pongamos a prueba
  lexicon: LSJ
  rationale: Aunque literalmente puede significar «juzgar», aquí el contexto paralela el primer verbo de prueba. Por eso se traduce con otro «probemos», evitando una lectura forense demasiado fuerte.
- source_word: ἀνεξικακίαν
  english_pob_choice: forbearance
  chosen_spanish: paciencia al soportar el agravio
  alternatives_spanish:
  - forbearancia
  - longanimidad
  - paciencia en el agravio
  lexicon: LSJ
  rationale: ἀνεξικακία es paciencia en soportar daño sin devolver mal. La frase elegida explicita ese sentido para el lector español, manteniendo la idea de resistencia moral ante la injuria.
theological_decisions:
- issue: Dos virtudes distintas en paralelo
  english_pob_reading: 'Render ἐπιείκεια and ἀνεξικακία as distinct virtues: ''gentleness'' and ''forbearance''.'
  chosen_spanish_reading: 'Mantener dos cualidades distintas: «mansedumbre» y «paciencia al soportar el agravio».'
  alternative_spanish_readings:
  - «mansedumbre» y «forbearancia»
  - «clemencia» y «longanimidad»
  - «gentileza» y «paciencia»
  rationale: El verso contrapone dos rasgos relacionados pero no idénticos. La primera virtud describe la disposición suave; la segunda, la capacidad de soportar daño sin retaliación. La formulación española conserva esa distinción sin borrar la tensión semántica.
  doctrine_reference: DOCTRINE.md § Translation philosophy 5
- issue: Sentido de δικάζω en contexto de prueba
  english_pob_reading: '''test his forbearance'' rather than a judicial verdict.'
  chosen_spanish_reading: Traducir δικάσωμεν como una acción de probar/poner a prueba, no como dictar sentencia.
  alternative_spanish_readings:
  - «juzguemos su paciencia»
  - «examinemos su paciencia»
  - «pongamos a prueba su paciencia»
  rationale: Aunque δικάζω puede tener valor judicial, aquí corre en paralelo con ἐτάσωμεν. La elección evita forzar una escena de tribunal y conserva el sentido de observación bajo hostigamiento.
  doctrine_reference: DOCTRINE.md § Translation philosophy 5
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente reemplazó «insult» por «insolence» para ὕβρις y prefirió «test» en lugar de «judge» para δικάσωμεν. La redacción española sigue esa revisión: usa «insolencia» y evita un verbo forense en la segunda mitad, manteniendo el paralelismo con «probemos».'
  spanish_consistency_notes:
  - Se usa «mansedumbre» para ἐπιείκεια como virtud moral reconocible en español bíblico, sin recurrir a «gentileza» por posible ambigüedad de registro.
  - Se evita «SEÑOR» y otros términos no pertinentes; el verso no contiene el nombre divino.
  - «Paciencia al soportar el agravio» explicita ἀνεξικακία para lectores que podrían no reconocer «forbearancia», pero la nota ofrece esa alternativa técnica.
