translation:
  language: es
  text: Y también haré del hijo de la esclava[a] una nación, porque él es tu descendencia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el hijo de la esclava»; también, «el hijo de la sierva».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  english_pob_choice: And I will also
  chosen_spanish: Y también
  alternatives_spanish:
  - Y además
  - Pero también
  lexicon: HALOT
  rationale: וְגַם añade continuidad e intensidad. En español, «y también» conserva el valor aditivo sin forzar un orden verbal poco natural.
- source_word: אֶת בֶּן הָאָמָה
  english_pob_choice: the son of the slave woman
  chosen_spanish: al hijo de la esclava
  alternatives_spanish:
  - al hijo de la sierva
  - al hijo de la criada
  lexicon: HALOT
  rationale: אָמָה señala una mujer de condición servil; «esclava» preserva mejor el peso social del término que opciones más suavizadas como «sierva» o «criada». En esta construcción, el artículo y la preposición se integran naturalmente como «al hijo de la esclava».
- source_word: לְגוֹי
  english_pob_choice: into a nation
  chosen_spanish: haré una nación
  alternatives_spanish:
  - lo haré nación
  - lo constituiré en nación
  lexicon: HALOT
  rationale: 'Con שׂים + לְגוֹי el sentido es resultativo: Dios lo constituirá como nación. En español, «haré una nación» comunica ese resultado de manera clara y fiel sin calcar la preposición del inglés.'
- source_word: אֲשִׂימֶנּוּ
  english_pob_choice: I will make
  chosen_spanish: haré
  alternatives_spanish:
  - pondré
  - constituiré
  lexicon: HALOT
  rationale: שׂים admite «poner/establecer/hacer». Aquí el contexto de destino y constitución favorece «haré», que mantiene la fuerza causal y resulta idiomático en español.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: כִּי introduce la razón de la promesa; «porque» expresa de forma directa la relación causal en español contemporáneo.
- source_word: זַרְעֲךָ
  english_pob_choice: your offspring
  chosen_spanish: tu descendencia
  alternatives_spanish:
  - tu simiente
  - tu linaje
  lexicon: HALOT
  rationale: זֶרַע puede ser «simiente/descendencia/descendientes». «Descendencia» preserva el sentido genealógico y es claro para el lector moderno, sin depender de un arcaísmo.
- source_word: הוּא
  english_pob_choice: he is
  chosen_spanish: es
  alternatives_spanish:
  - él es
  - él mismo es
  lexicon: HALOT
  rationale: El hebreo presenta un énfasis pronominal; en español basta con la cópula implícita en «es» para una frase natural, sin sobrecargar el énfasis.
theological_decisions:
- issue: Renderizar אָמָה con fuerza social explícita
  english_pob_reading: slave woman
  chosen_spanish_reading: esclava
  alternative_spanish_readings:
  - sierva
  - criada
  rationale: La POB inglesa eligió una forma que preserva la condición de servidumbre. «Esclava» mantiene esa tensión social y evita suavizarla, en línea con la política terminológica del proyecto.
  doctrine_reference: Translation philosophy §1; criterio terminológico POB para δοῦλος/estatus de servidumbre.
translation_notes:
  revision_awareness: El texto español sigue la revisión sin cambios indicada en el expediente inglés; no se introdujeron ajustes textuales adicionales, solo decisiones de equivalencia y estilo para la versión en español.
  spanish_consistency_notes:
  - Se mantuvo «esclava» para reflejar la condición servil con la misma fuerza que el inglés POB.
  - Se evitó «Cristo/SEÑOR» u otras sustituciones no pertinentes; el verso no contiene término divino explícito.
  - «Descendencia» se eligió por claridad moderna, conservando la referencia colectiva de זֶרַע.
