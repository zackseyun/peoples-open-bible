  to: Entonces David se levantó y llegó al lugar donde Saúl había acampado, y David vio el lugar donde Saúl yacía, y a Abner, hijo de Ner, comandante de su ejército. Saúl estaba acostado dentro del círculo del campamento[a], y la gente estaba acampada alrededor de él.
  rationale: Se movió la nota al segmento correcto para que explique בַּמַּעְגָּל en vez de חָנָה, y se ajustó la última cláusula a un español más natural y más fiel al valor descriptivo del participio plural hebreo.
