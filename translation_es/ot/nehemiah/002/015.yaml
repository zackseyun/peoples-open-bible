base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/002/015.yaml
  text: So I went up by the wadi at night and inspected the wall[a]. Then I turned back and entered by the Valley Gate[b], and returned.
  footnotes:
  - marker: a
    text: Or 'was examining' or 'was surveying' the wall. The Hebrew verb here normally means 'breaking,' but in this context it is widely understood to describe Nehemiah's inspection of the damaged wall.
    reason: lexical_alternative
  - marker: b
    text: '''Wadi'' refers to a ravine or seasonal watercourse; some translations render it ''valley'' or ''brook.'''
    reason: cultural_note
