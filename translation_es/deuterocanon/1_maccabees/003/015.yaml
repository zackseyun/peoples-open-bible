translation:
  language: es
  text: Y se le añadió y subió con él una fuerte fuerza de impíos[a], para ayudarle y ejecutar venganza[b] sobre los hijos de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un fuerte campamento de impíos se le añadió y subió con él». El griego παρεμβολή puede denotar un campamento o un ejército.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «para hacer la venganza sobre/en los hijos de Israel»; aquí la idea es una acción punitiva dirigida contra Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσεθέτο
  english_pob_choice: was added
  chosen_spanish: se añadió
  alternatives_spanish:
  - se unió
  - fue agregado
  lexicon: LSJ
  rationale: La forma media/pasiva expresa incorporación a un grupo ya en marcha. «Se añadió» conserva esa idea de adición sin forzar un sujeto agente explícito.
- source_word: ἀνέβη
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - marchó
  - ascendió
  lexicon: LSJ
  rationale: «Subió» es el equivalente directo y natural de ἀνέβη, y mantiene el movimiento narrativo sin añadir matiz militar que el griego no exige por sí solo.
- source_word: παρεμβολὴ
  english_pob_choice: camp
  chosen_spanish: campamento
  alternatives_spanish:
  - ejército
  - hueste
  - campamento militar
  lexicon: LSJ
  rationale: El término puede significar campamento o ejército. En español, «campamento» conserva la cercanía formal al griego; el contexto bélico y el modificador siguiente ya aportan la fuerza militar.
- source_word: ἀσεβῶν
  english_pob_choice: ungodly men
  chosen_spanish: impíos
  alternatives_spanish:
  - malvados
  - sin Dios
  - inicuos
  lexicon: LSJ
  rationale: «Impíos» preserva la carga religiosa y moral de ἀσεβής mejor que una traducción puramente ética como «malvados». En español, el plural sustantivado funciona naturalmente dentro de la frase.
- source_word: ἰσχυρὰ
  english_pob_choice: strong
  chosen_spanish: fuerte
  alternatives_spanish:
  - poderoso
  - mighty
  - numeroso
  lexicon: LSJ
  rationale: «Fuerte» reproduce de manera directa la idea de vigor o capacidad del grupo. «Poderoso» sería más interpretativo.
- source_word: βοηθῆσαι
  english_pob_choice: to help him
  chosen_spanish: para ayudarle
  alternatives_spanish:
  - para asistirle
  - para apoyarle
  lexicon: LSJ
  rationale: La infinitiva expresa propósito. «Ayudarle» es claro, preciso y corresponde bien al valor básico de βοηθέω.
- source_word: ποιῆσαι τὴν ἐκδίκησιν
  english_pob_choice: to execute vengeance
  chosen_spanish: ejecutar venganza
  alternatives_spanish:
  - llevar a cabo venganza
  - hacer venganza
  - ejercer venganza
  lexicon: LSJ
  rationale: La expresión conserva el tono formal y retributivo del sustantivo ἐκδίκησις. «Ejecutar» mantiene la fuerza de acción consumada que el POB inglés quiso retener.
- source_word: ἐν υἱοῖς Ἰσραήλ
  english_pob_choice: on the sons of Israel
  chosen_spanish: sobre los hijos de Israel
  alternatives_spanish:
  - contra los hijos de Israel
  - en los hijos de Israel
  - sobre el pueblo de Israel
  lexicon: LSJ
  rationale: «Hijos de Israel» sigue de cerca la expresión bíblica tradicional y mantiene el eco del griego. «Sobre» comunica correctamente el golpe punitivo dirigido hacia ellos.
theological_decisions:
- issue: Caracterización moral y religiosa de ἀσεβῶν
  english_pob_reading: ungodly men
  chosen_spanish_reading: impíos
  alternative_spanish_readings:
  - malvados
  - inicuos
  - sin Dios
  rationale: La elección conserva la dimensión teológica del término, no solo una valoración moral genérica. En este contexto bélico, el griego marca oposición a Dios y al orden del pacto.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; readable modern Spanish'
- issue: Designación étnica/covenantal de υἱοῖς Ἰσραήλ
  english_pob_reading: sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: Se mantiene la forma bíblica masculina del original, porque funciona como designación colectiva histórica y no como mera referencia genérica a personas.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando cada nota al texto con [a] y [b]. La redacción conserva la ambigüedad léxica documentada para παρεμβολὴ y ἐκδίκησιν, sin borrar la fuerza retributiva del pasaje.
  spanish_consistency_notes:
  - Se mantuvo «hijos de Israel» para conservar la fórmula bíblica del original y la política de fidelidad al género gramatical del griego.
  - Se prefirió un español claro y litúrgicamente legible, evitando calcos innecesarios salvo donde el paralelismo con el griego aporta valor auditivo o exegético.
  - «Impíos» se usa como equivalente de ἀσεβῶν por su carga religioso-moral, coherente con el audit trail en inglés.
  - «Campamento» y no «ejército» en el texto principal deja abierta la alternativa documentada en la nota, siguiendo el criterio POB de no cerrar indebidamente una tensión léxica.
