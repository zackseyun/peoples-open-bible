review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo y del POB inglés: la deposición de Joacaz, la localización en Jerusalén y la imposición de una exacción monetaria con medidas antiguas conservadas. Sin embargo, dos elecciones españolas debilitan la fidelidad contextual: ''la tierra'' suena menos natural y más ambigua en español aquí que ''el país'' o ''la tierra de Judá'', y ''sobre la tierra'' calca innecesariamente la preposición inglesa; en español histórico-bíblico fluye mejor ''al país''.'
  spanish_quality_summary: El texto es claro, pero 'impuso sobre la tierra un tributo' suena algo rígido y poco idiomático. 'Impuso al país un tributo' mejora la naturalidad sin alejarse del hebreo. Las notas son buenas y útiles; conviene ajustar la nota b para que corresponda al nuevo anclaje. El resto del español es digno, moderno y legible.
  glossary_alignment: No hay términos teológicos de proyecto en juego. 'Lo depuso' corresponde bien a la revisión inglesa. 'Talentos' preserva correctamente la medida antigua. La única desviación práctica es preferir 'el país' para הָאָרֶץ en este contexto narrativo, ya que en español 'la tierra' puede sugerir suelo/territorio físico más que el reino como entidad política.
  issues:
  - severity: medium
    issue: '''sobre la tierra'' es un giro poco natural en español para una carga fiscal'
    rationale: Aunque calca aceptablemente el inglés, en español bíblico contemporáneo 'impuso al país un tributo' transmite mejor la idea de exacción financiera sobre Judá como entidad política.
  - severity: medium
    issue: '''la tierra'' resulta ambigua en este contexto'
    rationale: הָאָרֶץ aquí se refiere al territorio/reino de Judá. 'La tierra' es posible, pero 'el país' comunica con mayor claridad ese referente político en español moderno.
  revised_spanish_text: Y el rey de Egipto lo depuso en Jerusalén e impuso al país un tributo de cien talentos de plata y un talento de oro[a][b][c].
  revised_footnotes:
  - marker: a
    text: O ‘lo destituyó’; el verbo hebreo puede significar quitar a alguien de un cargo o simplemente apartarlo.
    reason: alternative_reading
  - marker: b
    text: O ‘impuso una multa al país’; el verbo expresa la imposición de una pena monetaria.
    reason: lexical_alternative
  - marker: c
    text: Un talento era una unidad antigua de peso; se conserva la medida del texto en vez de convertirla.
    reason: cultural_note
  revision_rationale: Se ajusta 'sobre la tierra' a 'al país' para reflejar mejor הָאָרֶץ como el reino/territorio de Judá y para lograr un español más natural en contexto de tributación. También se armoniza la nota b con esa mejora. Lo demás puede mantenerse.
