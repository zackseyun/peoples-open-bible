- from: 'Y dijo Dios[a]: «Haya lumbreras en la expansión de los cielos para separar el día de la noche, y sean para señales, para tiempos señalados[d][c][b], para días y años».'
  to: 'Y dijo Dios: «Haya luces[b] en la expansión[c] de los cielos para separar el día de la noche, y sean para señales, para tiempos señalados[a][d], para días y años».'
  rationale: Se corrige el anclaje de la nota sobre מוֹעֲדִים para que aparezca en «tiempos señalados», y se ajusta מְאֹרֹת a «luces» para seguir la decisión principal auditada del POB inglés, dejando «lumbreras» como alternativa en nota. También se distribuyen las notas en los términos correspondientes para mayor claridad sin cambiar el sentido.
