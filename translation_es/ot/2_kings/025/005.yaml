translation:
  language: es
  text: Pero el ejército de los caldeos[b] persiguió al rey y lo alcanzó en las llanuras[a] de Jericó, y todo su ejército se dispersó y lo abandonó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “las estepas de Jericó”.
    reason: lexical_alternative
  - marker: b
    text: O “el ejército de los babilonios”. El hebreo dice “caldeos”, el término usado en este contexto para las fuerzas de Babilonia.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֵיל כַּשְׂדִּים
  english_pob_choice: the army of the Chaldeans
  chosen_spanish: el ejército de los caldeos
  alternatives_spanish:
  - las fuerzas de los caldeos
  - el ejército babilónico
  lexicon: HALOT
  rationale: חֵיל en contexto militar narra una fuerza armada o ejército; por eso “ejército” comunica bien el colectivo militar. כַּשְׂדִּים se conserva como “caldeos”, siguiendo la designación más directa del texto hebreo; “babilónico” sería una aclaración contextual posible, pero no la forma más ajustada al término fuente.
- source_word: וַיִּרְדְּפוּ
  english_pob_choice: pursued
  chosen_spanish: persiguió
  alternatives_spanish:
  - lo siguió en persecución
  - fue tras
  lexicon: HALOT
  rationale: רדף en narrativa militar se rinde naturalmente por “perseguir”. En español, el singular concuerda con “el ejército” como colectivo, manteniendo el sentido de acción militar continua.
- source_word: אַחַר הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: al rey
  alternatives_spanish:
  - tras el rey
  - después del rey
  lexicon: HALOT
  rationale: Como en el audit trail inglés, אחרי en este contexto de persecución se integra de forma natural con el verbo; “persiguió al rey” evita un calco torpe y conserva la fuerza del hebreo.
- source_word: וַיַּשִּׂגוּ אֹתוֹ
  english_pob_choice: overtook him
  chosen_spanish: lo alcanzó
  alternatives_spanish:
  - lo sobrepasó y tomó
  - lo dio alcance
  lexicon: HALOT
  rationale: נשׂג expresa alcanzar o dar alcance. “Lo alcanzó” es idiomático en español y preserva la idea de captura dentro de la persecución militar.
- source_word: בְּעַרְבוֹת יְרֵחוֹ
  english_pob_choice: in the plains of Jericho
  chosen_spanish: en las llanuras de Jericó
  alternatives_spanish:
  - en las estepas de Jericó
  - en la llanura de Jericó
  lexicon: HALOT
  rationale: עֲרָבוֹת refiere una región de llanura/estepa. “Llanuras” da una lectura clara y natural en español; “estepas” sería más técnico, pero menos transparente para un público amplio.
- source_word: וְכָל חֵילוֹ
  english_pob_choice: all his army
  chosen_spanish: todo su ejército
  alternatives_spanish:
  - todas sus fuerzas
  - todo su ejército de él
  lexicon: HALOT
  rationale: El hebreo usa el mismo término militar con sufijo posesivo. “Todo su ejército” mantiene la referencia colectiva y suena natural en español.
- source_word: נָפֹצוּ
  english_pob_choice: was scattered
  chosen_spanish: se dispersó
  alternatives_spanish:
  - fue dispersado
  - se esparció
  lexicon: HALOT
  rationale: El verbo indica dispersión o desbandada. En español, “se dispersó” conserva el matiz intransitivo y reproduce bien el sentido colectivo del hebreo sin forzar una pasiva innecesaria.
- source_word: מֵעָלָיו
  english_pob_choice: from him
  chosen_spanish: de él
  alternatives_spanish:
  - alejándose de él
  - lejos de él
  lexicon: HALOT
  rationale: La expresión marca separación respecto del rey. “De él” es breve y fiel; evita añadir interpretación espacial no explícita en el hebreo.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el paquete fuente hebreo y concuerda con el audit trail inglés: mantiene “caldeos” como designación principal, traduce עֲרָבוֹת con una opción natural (“llanuras”), y conserva la progresión narrativa de persecución, alcance y dispersión. No se registraron revisiones aplicadas en el audit trail inglés.'
  spanish_consistency_notes:
  - Se mantiene “caldeos” en el texto principal por fidelidad al hebreo, con nota alternativa para “babilonios”.
  - “Llanuras de Jericó” ofrece una lectura más natural que “estepas”, pero se preserva la alternativa porque el término hebreo admite ambas matizaciones.
  - Se evita “SEÑOR” u այլ terminología no presente en el versículo.
  - La concordancia en español trata “el ejército” como colectivo singular, reflejando el uso hebreo aunque el verbo plural subyacente esté en el original.
