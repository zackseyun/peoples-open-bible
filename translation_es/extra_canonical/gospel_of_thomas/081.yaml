translation:
  language: es
  text: 'Jesús dijo[a]: «Quien se haya hecho rico, que sea rey; y quien tenga poder[b], que renuncie a él[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ⲣⲣⲣⲟ puede traducirse también «reine» o «gobierne»; «que sea rey» conserva el matiz verbal ligado a «rey» y la dureza sentenciosa de Tomás.
    reason: lexical_alternative
  - marker: b
    text: ⲇⲩⲛⲁⲙⲓⲥ (préstamo griego) también puede significar «fuerza», «capacidad» o, en ciertos contextos, «poder milagroso»; se mantiene «poder» por amplitud y paralelismo.
    reason: lexical_alternative
  - marker: c
    text: El objeto de ⲁⲣⲛⲁ es implícito en copto; en español se explicita con «a él», refiriéndose al poder mencionado inmediatamente antes, porque «renunciar» normalmente exige esa construcción.
    reason: source_note
lexical_decisions:
- source_word: ⲡⲉϫⲉ ⲓⲏⲥⲟⲩⲥ
  english_pob_choice: Jesus said
  chosen_spanish: Jesús dijo
  alternatives_spanish:
  - Jesús dice
  - Jesús habló
  lexicon: Crum s.v. ⲡⲉϫⲉ; Layton (Grammar) on narrative quotative verb usage
  rationale: El verbo quotativo se vierte con el pasado natural del discurso directo en español. Mantiene la tersura característica de Tomás sin añadir subordinación explicativa.
- source_word: ⲡⲉⲧⲉⲣⲉ ⲁⲛⲧⲟϥ ⲣⲣⲙⲙⲁⲟ
  english_pob_choice: Whoever has become rich
  chosen_spanish: Quien se haya hecho rico
  alternatives_spanish:
  - Quien se haya enriquecido
  - El que se haya hecho rico
  lexicon: Crum s.v. ⲣⲣⲙⲙⲁⲟ; Layton (Grammar) on relative perfect ⲡⲉⲧⲉⲣⲉ + dependent pronoun
  rationale: La construcción relativa perfecta expresa a la persona que ‘ha llegado a ser’ rica. ‘Hacerse rico’ conserva el matiz de cambio de estado mejor que un adjetivo estático.
- source_word: ⲙⲁⲣⲉⲛⲧⲟϥ ⲣⲣⲣⲟ
  english_pob_choice: let him be king
  chosen_spanish: que sea rey
  alternatives_spanish:
  - que reine
  - que gobierne
  lexicon: Crum s.v. ⲣⲣⲣⲟ; Layton (Grammar) on jussive ⲙⲁⲣⲉ-
  rationale: El jussivo pide una exhortación en español. ‘Ser rey’ refleja el valor verbal ligado a ‘rey’ y conserva la formulación tajante del dicho; ‘reine’ es posible, pero pierde parte de la equivalencia directa con el sustantivo subyacente.
- source_word: ⲁⲩⲱ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  - además
  lexicon: Crum s.v. ⲁⲩⲱ
  rationale: Conectivo simple; ‘y’ reproduce la coordinación breve del original sin expansión retórica.
- source_word: ⲡⲉⲧⲉⲣⲉ ⲟⲩⲛⲧⲁ ⲛⲧⲟϥ ⲛⲟⲩⲇⲩⲛⲁⲙⲓⲥ
  english_pob_choice: whoever has power
  chosen_spanish: quien tenga poder
  alternatives_spanish:
  - quien posea poder
  - quien tenga una fuerza/poder
  lexicon: Crum s.v. ⲟⲩⲛ̄; Crum s.v. ⲇⲩⲛⲁⲙⲓⲥ; Layton (Grammar) on possession construction
  rationale: La posesión se expresa de forma natural con ‘tener’. ‘Poder’ mantiene la amplitud semántica del préstamo griego sin forzar una precisión que el texto no exige.
- source_word: ⲙⲁⲣⲉⲛⲧⲟϥ ⲁⲣⲛⲁ
  english_pob_choice: let him renounce it
  chosen_spanish: que lo renuncie
  alternatives_spanish:
  - que lo niegue
  - que renuncie a ello
  - que lo rechace
  lexicon: Crum s.v. ⲁⲣⲛⲁ
  rationale: ⲁⲣⲛⲁ cubre ‘negar/renunciar’. En español, ‘renunciarlo’ no es idiomático; se opta por un objeto directo anticipado ‘lo’ para conservar el objeto implícito de la fuerza del dicho, entendido como el poder mencionado antes.
translation_notes:
  revision_awareness: Pasaje revisado con alta concordancia en el control más reciente; no se aplicaron cambios respecto del texto auditado, y la versión española sigue de cerca la sintaxis breve del original copto.
  spanish_consistency_notes:
  - Se mantiene «Jesús» como forma fija del nombre propio.
  - Se conserva «poder» para ⲇⲩⲛⲁⲙⲓⲥ por amplitud semántica, sin estrecharlo a «fuerza» o «milagro».
  - Se traduce la secuencia jussiva con «que...», preservando el tono exhortativo.
  - Se explicita el objeto implícito de «renunciar» para mantener la paralelidad del dicho.
