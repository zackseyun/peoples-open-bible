  - severity: low
    issue: Redacción de la nota léxica
    rationale: La nota actual dice «O “líderes” o “oficiales” para ‘jefes’», pero el audit trail inglés presenta alternativas para el concepto base ‘leaders’. Es mejor reestructurar la nota para que las alternativas españolas cuelguen de «líderes».
  revised_spanish_text: 'Para Dan: Azarel hijo de Jeroham. Estos eran los líderes[a] de las tribus de Israel.'
