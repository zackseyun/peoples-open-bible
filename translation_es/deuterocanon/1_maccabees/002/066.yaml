revisions:
- from: Y Judas Macabeo mismo[a], fuerte en poder desde su juventud, será para ustedes el caudillo del ejército, y ustedes harán la guerra contra las naciones.
  to: Y Judas Macabeo mismo[a], fuerte en poder desde su juventud, será para ustedes el comandante del ejército, y ustedes pelearán la guerra contra las naciones.
