- from: Pero ellos no hacían caso[a], porque habían hecho una entrada oculta debajo de la mesa, y por ella solían entrar.
  to: Pero ellos no se preocupaban[a], porque habían hecho una entrada oculta bajo la mesa, y por ella solían entrar.
  rationale: Se ajusta únicamente κατεφρόνουν a 'no se preocupaban' para expresar con más naturalidad en español la despreocupación confiada que muestra el contexto, manteniendo en la nota las alternativas más fuertes ('lo despreciaban') o más idiomáticas ('lo tomaban a la ligera'). También se simplifica 'debajo de la mesa' a 'bajo la mesa' por fluidez, sin cambio de sentido. No se requieren cambios doctrinales ni adjudicación adicional.
