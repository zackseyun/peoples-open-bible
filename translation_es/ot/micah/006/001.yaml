translation:
  language: es
  text: 'Oigan ahora lo que Yahvé dice: Levántate[a], contiende ante los montes, y que las colinas oigan tu voz.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entra en pleito ante los montes» o «presenta tu caso ante los montes». El verbo hebreo tiene matiz de disputa legal; aquí los montes probablemente son convocados como testigos en la demanda de pacto de Yahvé.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ נָא
  english_pob_choice: Hear now
  chosen_spanish: Oigan ahora
  alternatives_spanish:
  - Escuchen ahora
  - Oigan, por favor
  lexicon: HALOT
  rationale: שׁמע en imperativo exige atención; נָא añade urgencia o ruego. «Oigan ahora» conserva ese llamado solemne y natural en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino personal revelado en el texto hebreo. En la norma terminológica del proyecto, יְהוָה se vierte como «Yahvé» en el texto principal, no como sustitución titulada.
- source_word: אֹמֵר
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - está diciendo
  - habla
  lexicon: HALOT
  rationale: El participio introduce una locución profética presente o inminente. «Dice» es la forma más natural y fiel en español.
- source_word: ק֚וּם
  english_pob_choice: Arise
  chosen_spanish: Levántate
  alternatives_spanish:
  - Alzate
  - Ponte en pie
  lexicon: HALOT
  rationale: El imperativo convoca a actuar. En español, «Levántate» comunica bien el llamado sin perder fuerza exhortativa.
- source_word: רִ֣יב
  english_pob_choice: contend
  chosen_spanish: entra en pleito
  alternatives_spanish:
  - contiende
  - litiga
  - presenta tu caso
  lexicon: HALOT
  rationale: ריב tiene matiz forense. «Entra en pleito» preserva la imagen legal de disputa/proceso sin añadir explícitamente «defender» o «argumentar».
- source_word: אֶת הֶהָרִים
  english_pob_choice: before the mountains
  chosen_spanish: ante los montes
  alternatives_spanish:
  - con los montes
  - contra los montes
  lexicon: HALOT
  rationale: Como en el contexto del litigio profético los montes funcionan como escenario o testigos, «ante los montes» evita convertirlos en adversarios directos y conserva la escena judicial.
- source_word: וְתִשְׁמַעְנָה
  english_pob_choice: and let ... hear
  chosen_spanish: y que ... oigan
  alternatives_spanish:
  - y que ... escuchen
  - y permitan que ... oigan
  lexicon: HALOT
  rationale: La forma imperfecta con waw tras imperativos tiene fuerza jussiva. «Y que ... oigan» reproduce esa continuación exhortativa de manera natural.
- source_word: הַגְּבָעוֹת
  english_pob_choice: the hills
  chosen_spanish: las colinas
  alternatives_spanish:
  - los cerros
  - los montes bajos
  lexicon: HALOT
  rationale: «Colinas» es un equivalente geográfico claro y paralelo a «montes» en español, manteniendo el paralelismo poético sin perder la referencia topográfica.
- source_word: קוֹלֶךָ
  english_pob_choice: your voice
  chosen_spanish: tu voz
  alternatives_spanish:
  - tu sonido
  - lo que dices
  lexicon: HALOT
  rationale: קוֹל en contexto de discurso directo significa «voz». «Tu voz» es la equivalencia más literal e idiomática.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo contiene el Tetragrama. Conforme a la convención terminológica del proyecto, se conserva el nombre divino en español como «Yahvé», evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Forensic force of רִיב in a covenant-lawsuit scene
  english_pob_reading: contend before the mountains
  chosen_spanish_reading: entra en pleito ante los montes
  alternative_spanish_readings:
  - contiende ante los montes
  - litiga ante los montes
  - presenta tu caso ante los montes
  rationale: La escena es jurídica y profética. «Entra en pleito» conserva el matiz forense de רִיב sin diluirlo en una simple conversación o debate.
  doctrine_reference: Poetic/prophetic covenant-lawsuit context as reflected in the source and audit trail
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente afinó el registro de «Rise» a «Arise» y de «plead your case» a «contend» para reflejar con mayor precisión רִיב. La redacción española sigue esa misma línea: adopta una exhortación formal («Levántate») y una opción forense directa («entra en pleito») sin expandir innecesariamente el sentido.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en lugar de un reemplazo titulada como «el SEÑOR», conforme a la política del proyecto.
  - «Montes» y «colinas» conservan el paralelismo hebreo de montañas/hills de forma clara y publicable.
  - No se suaviza el tono judicial de רִיב; la elección española intenta preservar la tensión jurídica del pasaje.
