translation:
  language: es
  text: y desde Hesbón hasta Ramat-mispé y Betonim[a], y desde Mahanáim hasta el límite de Debir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hasta el límite hacia Debir». La construcción hebrea también puede expresar dirección; «el límite de Debir» es una forma más fluida en español dentro de una lista territorial.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מֵ/חֶשְׁבּוֹן
  english_pob_choice: and from Heshbon
  chosen_spanish: y desde Hesbón
  alternatives_spanish:
  - desde Hesbón
  lexicon: HALOT
  rationale: El hebreo combina conjunción y preposición de origen/extensión; en español territorial, «y desde» conserva la sucesión de lindes. El nombre propio se translitera como «Hesbón».
- source_word: עַד
  english_pob_choice: to
  chosen_spanish: hasta
  alternatives_spanish:
  - a
  - así como hasta
  lexicon: HALOT
  rationale: En listas fronterizas, עַד marca alcance o límite; «hasta» es la equivalencia natural y precisa en español.
- source_word: רָמַת הַמִּצְפֶּה
  english_pob_choice: Ramath-mizpeh
  chosen_spanish: Ramat-mispé
  alternatives_spanish:
  - la altura del atalaya
  - Ramat-Mizpé
  lexicon: HALOT
  rationale: Aunque el componente es transparente como «altura de la atalaya/atalaya de observación», el conjunto funciona como topónimo. Se mantiene transliteración parcial/normalizada en español para conservar el carácter de nombre propio sin perder la base hebrea.
- source_word: וּ/בְטֹנִים
  english_pob_choice: and Betonim
  chosen_spanish: y Betonim
  alternatives_spanish:
  - y Betonim
  lexicon: HALOT
  rationale: Nombre de lugar propio; se conserva transliterado y con conjunción coordinante.
- source_word: וּ/מִֽ/מַּחֲנַיִם
  english_pob_choice: and from Mahanaim
  chosen_spanish: y desde Mahanáim
  alternatives_spanish:
  - desde Mahanáim
  lexicon: HALOT
  rationale: El hebreo tiene conjunción más preposición de procedencia. «Desde» expresa bien la extensión del territorio; se conserva el nombre propio con acento gráfico español.
- source_word: גְּב֥וּל
  english_pob_choice: the border
  chosen_spanish: el borde
  alternatives_spanish:
  - la frontera
  - el límite
  lexicon: HALOT
  rationale: En listas de lindes, גְּבוּל puede ser «border/boundary». «Borde» comunica el sentido espacial de delimitación sin cargar un matiz administrativo moderno demasiado fuerte.
- source_word: לִדְבִר
  english_pob_choice: of Debir
  chosen_spanish: de Debir
  alternatives_spanish:
  - hacia Debir
  - al borde de Debir
  lexicon: HALOT
  rationale: Se adopta la relación genitiva más lisa en español, como hizo la POB inglesa, manteniendo abierta la posibilidad direccional que el hebreo permite en el pie de nota.
translation_notes:
  revision_awareness: Se sigue de cerca el texto hebreo masorético del versículo y la solución inglesa auditada; no se detectan revisiones aplicadas en el pass más reciente, y la única tensión relevante es la relación genitiva/direccional de לִדְבִר, preservada en la nota.
  spanish_consistency_notes:
  - Se usa «y desde» para reflejar la secuencia de límites del hebreo.
  - Se transliteran los topónimos de forma uniforme y con acentuación española cuando ayuda a la lectura.
  - «Borde» se reserva para גְּבוּל por fidelidad al sentido geográfico del pasaje.
