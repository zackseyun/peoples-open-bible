translation:
  language: es
  text: El pórtico que estaba delante de la casa tenía veinte codos de largo, igual al ancho de la casa; y su altura era de ciento veinte codos[a]; y revistió su interior con oro puro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo afirma que la altura del pórtico era “ciento veinte codos”. Un pasaje paralelo en 1 Reyes 6:3 describe la longitud y el ancho del pórtico, pero no esta altura, y algunos intérpretes sospechan una dificultad textual; aquí se sigue el Texto Masorético tal como se conserva.
    reason: textual_variant
lexical_decisions:
- source_word: הָאוּלָם
  english_pob_choice: the portico
  chosen_spanish: el pórtico
  alternatives_spanish:
  - el vestíbulo
  - el pórtico de entrada
  - el portal
  lexicon: HALOT
  rationale: אוּלָם designa una construcción de acceso o estancia frontal al edificio principal. "Pórtico" conserva el valor arquitectónico y la relación espacial con la casa/templo sin sonar tan arcaico como "portal" ni tan restrictivo como "vestíbulo".
- source_word: אֲשֶׁר עַל־פְּנֵי
  english_pob_choice: that was in front of
  chosen_spanish: que estaba delante de
  alternatives_spanish:
  - que estaba frente a
  - que se hallaba ante
  lexicon: HALOT
  rationale: La expresión marca ubicación espacial anterior o frontal. "Delante de" es natural en español y no añade una orientación interpretativa innecesaria.
- source_word: הָאֹרֶךְ עַל־פְּנֵי רֹחַב הַבַּיִת
  english_pob_choice: twenty cubits long, corresponding to the width of the house
  chosen_spanish: veinte codos de largo, correspondiente al ancho de la casa
  alternatives_spanish:
  - de largo, a lo ancho de la casa
  - veinte codos de longitud, frente al ancho de la casa
  lexicon: HALOT
  rationale: El hebreo es comprimido y relaciona la longitud del pórtico con el ancho de la casa. "Correspondiente al ancho de la casa" mantiene esa relación sin convertirla en una explicación más amplia de la que permite el texto.
- source_word: אַמּוֹת עֶשְׂרִים / וְעֶשְׂרִים
  english_pob_choice: twenty cubits / one hundred and twenty cubits
  chosen_spanish: veinte codos / ciento veinte codos
  alternatives_spanish:
  - veinte medidas de codo / ciento veinte medidas de codo
  - veinte codos / ciento veinte
  lexicon: HALOT
  rationale: '"Codos" es el equivalente estándar de אַמּוֹת y preserva la unidad antigua. En la altura se explicita "codos" para reflejar el valor del texto hebreo y la decisión revisada del POB inglés.'
- source_word: וְהַגֹּבַהּ מֵאָה וְעֶשְׂרִים
  english_pob_choice: and its height was one hundred and twenty cubits
  chosen_spanish: y su altura era de ciento veinte codos
  alternatives_spanish:
  - y su altura era ciento veinte codos
  - y la altura de él era de ciento veinte codos
  lexicon: HALOT
  rationale: La longitud nominal con verbo de estado se vierte de forma idiomática en español. Añadir "codos" en la altura sigue el texto hebreo y la corrección del audit trail inglés.
- source_word: וַיְצַפֵּהוּ
  english_pob_choice: and he overlaid
  chosen_spanish: y lo revistió
  alternatives_spanish:
  - y lo recubrió
  - y lo forró
  lexicon: HALOT
  rationale: צפה en este contexto arquitectónico significa cubrir con una lámina o recubrimiento. "Revestir" conserva la idea de cubrir con material precioso y suena natural en español bíblico contemporáneo.
- source_word: מִפְּנִימָה
  english_pob_choice: its interior
  chosen_spanish: por dentro
  alternatives_spanish:
  - en su interior
  - desde el interior
  lexicon: HALOT
  rationale: El adverbio indica la cara interior. "Por dentro" mantiene el sentido sin hacer demasiado técnico el español; el referente ya queda claro por el objeto del revestimiento.
- source_word: זָהָב טָהוֹר
  english_pob_choice: pure gold
  chosen_spanish: oro puro
  alternatives_spanish:
  - oro refinado
  - oro puro y fino
  lexicon: HALOT
  rationale: La combinación nominal se vierte de modo directo. "Oro puro" es preciso, transparente y fiel al material precioso del texto.
theological_decisions:
- issue: Unidad de medida explícita en la altura
  english_pob_reading: The Hebrew text supplies the height as 'one hundred and twenty cubits,' following the Masoretic Text as preserved.
  chosen_spanish_reading: Su altura era de ciento veinte codos.
  alternative_spanish_readings:
  - Su altura era de ciento veinte.
  - Su altura era de ciento veinte codos, según el texto masorético.
  rationale: Se mantiene la unidad en la altura para reflejar el hebreo y no dejar una cifra ambigua en español. No se intenta resolver la posible dificultad textual; se traduce el texto recibido.
  doctrine_reference: Textual criticism / Masoretic Text preservation
- issue: Posible tensión con 1 Reyes 6:3
  english_pob_reading: A parallel description in 1 Kings 6:3 gives the portico's length and width but not this height, and some interpreters suspect a textual difficulty here; the translation follows the Masoretic Text as preserved.
  chosen_spanish_reading: El texto se traduce tal como está preservado, sin armonizarlo aquí con el pasaje paralelo.
  alternative_spanish_readings:
  - Se omite la altura para evitar la tensión con 1 Reyes 6:3.
  - Se ajusta la altura por armonización con 1 Reyes 6:3.
  rationale: La POB inglesa conserva la tensión textual sin resolverla por vía interpretativa. En español se preserva la misma cautela, dejando al lector ver que la traducción sigue el texto masorético tal como está.
  doctrine_reference: Textual criticism / canonical parallels
translation_notes:
  revision_awareness: El último pase de revisión del POB inglés añadió explícitamente 'cubits' a la altura ('one hundred and twenty cubits'). La versión española refleja esa corrección y mantiene la misma decisión de seguir el Texto Masorético preservado, sin armonización con 1 Reyes 6:3.
  spanish_consistency_notes:
  - Se usa "pórtico" de manera consistente para הָאוּלָם, en lugar de "vestíbulo" o "porche", por su naturalidad arquitectónica en español y su proximidad al valor del término hebreo.
  - Se mantiene "codos" para אַמּוֹת tanto en la longitud como en la altura, evitando convertir la medida o dejarla implícita.
  - '"Lo revistió" conserva el valor arquitectónico de צפה sin perder la referencia al recubrimiento interior de oro.'
  - No se introduce "Señor" ni otras sustituciones teológicas no presentes en el verso.
  - La puntuación separa claramente la relación de medidas y la cláusula final, siguiendo el flujo sintáctico del hebreo y del POB inglés.
