theological_decisions:
- issue: Lista de nombres propios en un registro de pacto
  english_pob_reading: These are names in a list of those associated with the covenant; the Hebrew preserves them as proper nouns rather than translating them as common words.
  chosen_spanish_reading: Son nombres en una lista de personas asociadas con el pacto; el hebreo los preserva como nombres propios, no como palabras comunes.
  alternative_spanish_readings:
