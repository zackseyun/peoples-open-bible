translation:
  language: es
  text: 'Y le ordenó a Josué, hijo de Nun, y le dijo: «Sé fuerte y valiente, porque tú introducirás a los hijos de Israel[a] en la tierra que les juré, y yo estaré contigo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas» o «el pueblo de Israel». El hebreo dice literalmente «los hijos de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַו
  english_pob_choice: he commanded
  chosen_spanish: lo mandó
  alternatives_spanish:
  - lo ordenó
  - le mandó
  lexicon: HALOT / BDB
  rationale: En español, «mandar» comunica bien la acción de dar una comisión o mandato solemne. «Lo mandó» conserva el sujeto implícito del hebreo sin introducirlo explícitamente, y mantiene el tono narrativo breve del verso.
- source_word: יְהוֹשֻׁעַ בִּן נוּן
  english_pob_choice: Joshua son of Nun
  chosen_spanish: Josué, hijo de Nun
  alternatives_spanish:
  - Josué hijo de Nun
  - Josué, el hijo de Nun
  lexicon: Nombres propios / uso bíblico
  rationale: «Josué» es la forma asentada en español bíblico. Se conserva el patronímico con «hijo de Nun» por transparencia y fidelidad al hebreo.
- source_word: חֲזַק וֶאֱמָץ
  english_pob_choice: Be strong and courageous
  chosen_spanish: Sé fuerte y valiente
  alternatives_spanish:
  - Sé fuerte y esforzado
  - Sé fuerte y resuelto
  lexicon: HALOT
  rationale: La pareja hebrea expresa fortaleza y valentía/ánimo firme. «Valiente» comunica en español la fuerza de ánimo que requiere el contexto de comisión, sin volverlo demasiado literal o artificial.
- source_word: תָּבִיא
  english_pob_choice: you will bring
  chosen_spanish: introducirás
  alternatives_spanish:
  - llevarás
  - traerás
  lexicon: HALOT
  rationale: El causativo de בוא aquí tiene sentido de hacer entrar. «Introducirás» preserva esa idea mejor que «llevarás», y evita una ambigüedad que «traerás» no tendría en español narrativo.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la imagen filial/covenantal del hebreo con «hijos de Israel». Es una alternativa natural en español y mantiene la decisión del inglés POB de no neutralizar el sintagma.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la tierra prometida
  lexicon: HALOT
  rationale: En este contexto de promesa pactal, «la tierra» reproduce la referencia territorial del hebreo sin añadir «prometida», que no aparece en la cláusula.
- source_word: אֲשֶׁר נִשְׁבַּעְתִּי לָהֶם
  english_pob_choice: that I swore to them
  chosen_spanish: que juré darles
  alternatives_spanish:
  - que juré a ellos
  - que les juré
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «que juré a ellos», en español el verbo «jurar» suele requerir el complemento implícito de lo prometido para sonar natural. «Darles» explicita el contenido implícito que el contexto del pacto ya presupone, sin apartarse del sentido.
- source_word: וְאָנֹכִי אֶהְיֶה עִמָּךְ
  english_pob_choice: and I will be with you
  chosen_spanish: y yo estaré contigo
  alternatives_spanish:
  - y estaré contigo
  - y yo mismo estaré contigo
  lexicon: HALOT
  rationale: Se conserva la promesa bíblica reconocible «estaré contigo». El pronombre «yo» refleja el énfasis de אָנֹכִי sin sobrecargar la frase.
theological_decisions:
- issue: Sujeto implícito de la acción y la palabra
  english_pob_reading: And he commanded ... and said
  chosen_spanish_reading: Y lo mandó ... y le dijo
  alternative_spanish_readings:
  - Y mandó a Josué ... y dijo
  - Y el Señor lo mandó ... y le dijo
  rationale: El hebreo no expresa el sujeto por nombre en este verso, aunque el contexto inmediato lo identifica. En español se preserva esa economía narrativa con un sujeto implícito, sin introducir «el Señor» dentro del verso como si fuera explícito en el hebreo.
  doctrine_reference: DOCTRINE.md Translation philosophy §1
- issue: Renderización de בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: Se mantiene la forma masculina y familiar del hebreo, coherente con la decisión del inglés POB de conservar la textura genealógica/covenantal del sintagma. No se neutraliza a «el pueblo» porque eso debilitaría la correspondencia formal.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: Se corrigió la validación anterior eliminando la nota sin ancla. Esta versión no incluye notas al pie, de modo que no hay marcadores huérfanos ni discrepancias entre el texto y el aparato.
  spanish_consistency_notes:
  - Se usa «Josué» como forma bíblica estándar en español.
  - 'Se conserva el paralelismo de comisión: mandato, exhortación y promesa.'
  - Se evita «SEÑOR» como sustituto reverencial; el verso no contiene el Tetragrámaton explícito en la superficie, aunque el sujeto se entiende por contexto.
  - «Hijos de Israel» mantiene la elección del inglés POB para el sintagma masculino plural.
