base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/006/010.yaml
  text: To whom shall I speak and give warning[a], that they may hear? Look, their ear is uncircumcised, and they are not able to listen. Look, the word of Yahweh has become a reproach to them[b]; they take no delight in it.
  footnotes:
