    rationale: El expediente auditado eligió «falsely» como texto principal y reservó «without cause» como alternativa léxica. «Sin motivo» es posible, pero es más interpretativo que «falsamente» y reduce la conexión explícita con el sustantivo hebreo «falsehood/lie».
