translation:
  language: es
  text: Efraín se alimenta de viento y persigue el viento del oriente[b] todo el día[a]; multiplica mentiras y destrucción[c]. Hacen un pacto con Asiria[d], y se lleva aceite a Egipto[e].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "pastorea el viento"; el verbo hebreo es literalmente "apacentar/alimentar/pastorear".'
    reason: lexical_alternative
  - marker: b
    text: El "viento del oriente" se asociaba con una fuerza abrasadora y destructiva; la frase puede sugerir tanto inutilidad como daño.
    reason: cultural_note
  - marker: c
    text: 'O: "falsedad y devastación" / "engaño y destrucción".'
    reason: lexical_alternative
  - marker: d
    text: 'Hebreo: "cortar un pacto", un modismo estándar para hacer un pacto o tratado.'
    reason: lexical_alternative
  - marker: e
    text: Probablemente aceite enviado como tributo o pago diplomático a Egipto.
    reason: cultural_note
lexical_decisions:
- source_word: אֶפְרַיִם
  english_pob_choice: Ephraim
  chosen_spanish: Efraín
  alternatives_spanish:
  - Israel
  lexicon: HALOT
  rationale: Se conserva el nombre propio del texto hebreo. Aunque funciona metonímicamente para el reino del norte, la forma explícita es Efraín y debe mantenerse.
- source_word: רֹעֶה רוּחַ
  english_pob_choice: feeds on wind
  chosen_spanish: se alimenta de viento
  alternatives_spanish:
  - apacienta el viento
  - pastorea el viento
  lexicon: HALOT
  rationale: רעה literalmente tiene el campo de 'apacentar/alimentar/pastorear'. 'Se alimenta de viento' preserva la imagen idiomática en español natural sin perder la vaciedad e inutilidad del acto.
- source_word: וְרֹדֵף קָדִים
  english_pob_choice: and pursues the east wind
  chosen_spanish: y persigue el viento del oriente
  alternatives_spanish:
  - y corre tras el viento del oriente
  - y persigue el viento oriental
  lexicon: HALOT
  rationale: Se mantiene la imagen concreta del viento del oriente, asociada a fuerza ardiente y destructiva, con un verbo claro en español.
- source_word: כָּל הַיּוֹם
  english_pob_choice: all day long
  chosen_spanish: todo el día
  alternatives_spanish:
  - durante todo el día
  lexicon: HALOT
  rationale: Expresa continuidad de manera idiomática y fiel.
- source_word: כָּזָב וָשֹׁד
  english_pob_choice: lies and destruction
  chosen_spanish: mentiras y destrucción
  alternatives_spanish:
  - engaño y destrucción
  - mentiras y devastación
  lexicon: HALOT
  rationale: כָּזָב se rinde bien como 'mentiras'; שֹׁד incluye devastación, despojo y destrucción. 'Destrucción' conserva mejor el ajuste revisado en el audit trail que 'violencia'.
- source_word: יַרְבֶּה
  english_pob_choice: he multiplies
  chosen_spanish: multiplica
  alternatives_spanish:
  - aumenta
  - hace abundar
  lexicon: HALOT
  rationale: El verbo en hebreo está en singular y concuerda con Efraín como sujeto colectivo singular. 'Multiplica' conserva esa forma y el matiz de incremento.
- source_word: וּבְרִית עִם אַשּׁוּר יִכְרֹתוּ
  english_pob_choice: They make a covenant with Assyria
  chosen_spanish: Hacen un pacto con Asiria
  alternatives_spanish:
  - Cortan un pacto con Asiria
  - Hacen una alianza con Asiria
  lexicon: HALOT
  rationale: כרת ברית es el modismo 'cortar un pacto/alianza'. 'Hacen un pacto' es más natural en español contemporáneo y conserva el valor formal-político del acuerdo. Se mantiene el plural del hebreo.
- source_word: וְשֶׁמֶן לְמִצְרַיִם יוּבָל
  english_pob_choice: and oil is carried to Egypt
  chosen_spanish: y se lleva aceite a Egipto
  alternatives_spanish:
  - y el aceite es llevado a Egipto
  - y se transporta aceite a Egipto
  lexicon: HALOT
  rationale: 'יוּבָל es pasivo impersonal: ''se lleva'' expresa bien la acción sin añadir sujeto. ''Aceite'' evita sobreespecificar, aunque probablemente sea aceite de oliva como tributo o pago diplomático.'
theological_decisions:
- issue: Preservación de la metáfora del viento
  english_pob_reading: Retain the wind/east wind imagery as metaphor for futile and destructive policy rather than paraphrasing it into an interpretive explanation.
  chosen_spanish_reading: Conservar la imagen del viento y del viento del oriente como metáfora de búsqueda vana y destructiva.
  alternative_spanish_readings:
  - Efraín persigue la nada y la ruina todo el día
  - Efraín busca lo inútil y lo destructivo todo el día
  rationale: La fuerza profética está en la metáfora misma. Traducirla de forma demasiado explicativa debilitaría el efecto acusatorio y la textura poética del hebreo.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Cambio de número de singular a plural
  english_pob_reading: Use singular for Ephraim's actions and plural for the later verb to reflect the Hebrew shift.
  chosen_spanish_reading: Mantener el singular en las primeras acciones de Efraín y el plural en 'Hacen un pacto' para reflejar el cambio hebreo.
  alternative_spanish_readings:
  - Homogeneizar todo en singular
  - Homogeneizar todo en plural
  rationale: El texto hebreo pasa del singular colectivo a un plural; conservarlo ayuda a que el lector perciba la estructura original y evita suavizar una señal textual significativa.
  doctrine_reference: Translation philosophy §1, §5
- issue: Sentido de שֹׁד
  english_pob_reading: lies and destruction
  chosen_spanish_reading: mentiras y destrucción
  alternative_spanish_readings:
  - mentiras y violencia
  - mentiras y devastación
  rationale: שֹׁד abarca despojo, devastación y destrucción. 'Destrucción' responde mejor al ajuste revisado del audit trail y evita endurecer el término hacia 'violencia' sin necesidad.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: La versión inglesa fue revisada de 'violence' a 'destruction' para reflejar mejor שֹׁד. La redacción española adopta esa revisión con 'destrucción' y conserva el resto del sentido auditado, incluyendo la metáfora del viento, el plural de 'Hacen', y el pasivo impersonal de 'se lleva'.
  spanish_consistency_notes:
  - Se mantiene 'Efraín' como nombre propio metonímico, no 'Israel'.
  - Se usa 'Asiria' y no 'Asur' para una lectura más fluida en español, sin perder la referencia histórica.
  - Se evita 'SEÑOR' u otros sustitutos teológicos porque el versículo no contiene el nombre divino.
  - '''Aceite'' permanece genérico, acorde con el inglés auditado; no se explicita ''aceite de oliva'' en el texto principal.'
