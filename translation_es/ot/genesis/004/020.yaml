translation:
  language: es
  text: Ada dio a luz a Jabal[a]; él fue el padre de los que habitan en tiendas y tienen ganado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el padre de los habitantes de tiendas y pastores de ganado». El hebreo «padre de» puede significar antepasado, fundador u originador arquetípico de un modo de vida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּלֶד
  english_pob_choice: bore
  chosen_spanish: dio a luz
  alternatives_spanish:
  - parió
  - engendró
  lexicon: HALOT / uso narrativo genealógico
  rationale: En español, "dio a luz" transmite de forma natural y digna el acto de parto en una nota genealógica. "Parió" es más literal pero más crudo; "engendró" suele sonar demasiado masculino o genealógico-formal para una madre en este contexto.
- source_word: עָדָה
  english_pob_choice: Adah
  chosen_spanish: Ada
  alternatives_spanish:
  - Adá
  lexicon: transliteración estándar al español
  rationale: Se adapta el nombre propio a la grafía usual en español bíblico, sin añadir vocales o acentos que no exige el uso corriente.
- source_word: יָבָל
  english_pob_choice: Jabal
  chosen_spanish: Jabal
  alternatives_spanish:
  - Yabal
  lexicon: transliteración estándar al español
  rationale: Se conserva la forma tradicional en español para el nombre propio, coherente con el patrón bíblico hispanohablante.
- source_word: ה֣וּא הָיָ֔ה
  english_pob_choice: he was
  chosen_spanish: él fue
  alternatives_spanish:
  - él era
  - llegó a ser
  lexicon: HALOT / predicación identificativa
  rationale: El hebreo presenta una identificación de rol, no un desarrollo narrativo. "Él fue" mantiene la relación predicativa sin introducir matiz de cambio que el texto no exige.
- source_word: אֲבִי
  english_pob_choice: the father of
  chosen_spanish: el padre de
  alternatives_spanish:
  - ancestro de
  - fundador de
  lexicon: HALOT
  rationale: '"Padre de" conserva la metáfora hebrea de progenitor/originador de un grupo o estilo de vida. En una nota puede explicarse que también puede implicar antepasado o fundador.'
- source_word: יֹשֵׁב אֹהֶל
  english_pob_choice: those who dwell in tents
  chosen_spanish: los que habitan en tiendas
  alternatives_spanish:
  - los que viven en tiendas
  - tenderos
  lexicon: HALOT
  rationale: '"Habitan en tiendas" refleja la imagen semítica de residencia nómada con un registro claro en español. "Tiendas" es el equivalente habitual de אֹהֶל en contexto pastoral; "habitan" sostiene el valor de residencia estable dentro de un estilo de vida móvil.'
- source_word: וּ/מִקְנֶה
  english_pob_choice: have livestock
  chosen_spanish: tienen ganado
  alternatives_spanish:
  - poseen ganado
  - crían ganado
  - tienen rebaños
  lexicon: HALOT
  rationale: El sustantivo מִקְנֶה nombra el ganado/livestock como posesión o riqueza pastoral. "Tienen ganado" sigue la revisión inglesa que evita añadir la idea interpretativa de "cuidar/criar" y conserva una frase natural en español.
theological_decisions:
- issue: Alcance de "padre de" como progenitor literal o fundador/arquetipo de un modo de vida
  english_pob_reading: The Hebrew 'father of' can mean ancestor, founder, or archetypal originator of a way of life.
  chosen_spanish_reading: '"Padre de" se mantiene en el texto principal, dejando abierta la posibilidad de antepasado, fundador u originador arquetípico.'
  alternative_spanish_readings:
  - ancestro de
  - fundador de
  - originador de
  rationale: El hebreo genealogico usa אָב con flexibilidad semántica. Traducirlo de manera estrecha borraría una tensión documentada por el propio aparato inglés. La nota preserva esa amplitud sin abandonar la formulación directa del texto.
  doctrine_reference: Génesis 4:20; uso semántico de אָב en contextos genealógico-culturales
- issue: Relación entre "tiendas" y "ganado" como descripción de un estilo de vida pastoral
  english_pob_reading: those who dwell in tents and have livestock
  chosen_spanish_reading: los que habitan en tiendas y tienen ganado
  alternative_spanish_readings:
  - los que viven en tiendas y poseen ganado
  - tenderos y ganaderos
  rationale: La traducción debe conservar la yuxtaposición hebrea sin convertirla en una definición social más explicita de la que el texto ofrece. "Habitan en tiendas y tienen ganado" reproduce la doble característica sin sobreinterpretar el oficio exacto.
  doctrine_reference: Génesis 4:20; descripción etnográfica/genealógica
- issue: Uso de "tiendas" en vez de una paráfrasis como "campamentos"
  english_pob_reading: dwell in tents
  chosen_spanish_reading: habitan en tiendas
  alternative_spanish_readings:
  - viven en tiendas
  - viven en campamentos
  rationale: '"Tiendas" es la imagen concreta del hebreo אֹהֶל. "Campamentos" suaviza la imagen y desplaza el referente hacia un asentamiento militar o colectivo que no está presente en el texto.'
  doctrine_reference: Génesis 4:20; fidelidad imagística
- issue: Elección verbal para וַתֵּלֶד
  english_pob_reading: bore
  chosen_spanish_reading: dio a luz
  alternative_spanish_readings:
  - parió
  - engendró
  rationale: En español bíblico actual, "dio a luz" comunica la acción con claridad y sin aspereza innecesaria. Se evita un calco rígido y también un verbo demasiado técnico o masculino como "engendró".
  doctrine_reference: Génesis 4:20; narrativa genealógica
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste más reciente del audit trail inglés: se evita introducir una idea interpretativa de "criar/guardar" ganado y se refleja de manera más directa la relación hebrea entre habitar en tiendas y tener ganado. También se mantiene el valor amplio de "padre de" documentado por la nota inglesa.'
  spanish_consistency_notes:
  - Se usó "Ada" y "Jabal" conforme a transliteración española habitual en textos bíblicos.
  - Se prefirió "habitan en tiendas" frente a "viven en tiendas" para conservar un tono ligeramente más formal y bíblico sin arcaísmo.
  - '"Ganado" funciona como equivalente amplio de מִקְנֶה y evita restringir el sentido a bovinos.'
  - La nota al pie se ancla en "padre de" porque allí aparece la tensión léxica documentada por la fuente inglesa.
