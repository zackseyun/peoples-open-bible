review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: causa del enojo divino, golpe/punición, ocultamiento divino, repetición del enojo y persistencia del hombre en su propio camino. También conserva adecuadamente la nota léxica sobre בִּצְעוֹ y la alternativa relacionada con הַסְתֵּר. Sin embargo, hay pequeños puntos de fidelidad y estilo que conviene ajustar.'
  spanish_quality_summary: El texto es claro y legible en español general, pero «su injusta ganancia» suena algo forzado; «su ganancia injusta» o «su lucro injusto» sería más idiomático. Además, «lo herí» puede sonar más a resultado de herida que al acto punitivo de נכה; «lo golpeé» o «lo castigué con golpe» refleja mejor el verbo. La nota b no representa bien la alternativa inglesa documentada, que es «oculté mi rostro».
  glossary_alignment: No hay conflicto con los términos doctrinales principales del proyecto. La decisión de no añadir «rostro» al texto principal está bien alineada con la auditoría inglesa, pero la alternativa debe preservarse explícitamente en nota. «Apartándose» para שׁוֹבָב es aceptable como equivalente contextual de backsliding en español.
  issues:
  - severity: medium
    issue: «su injusta ganancia» suena poco idiomático
    rationale: Aunque semánticamente comprensible, en español natural suele preferirse «su ganancia injusta» o «su lucro injusto». El ajuste mejora legibilidad sin perder la concreción moral/económica de בִּצְעוֹ.
  - severity: medium
    issue: «lo herí» debilita el matiz de golpe punitivo de וְאַכֵּהוּ
    rationale: נכה en hiphil aquí apunta a un acto de castigo/impacto. «Lo golpeé» comunica mejor la acción concreta que «lo herí», que en español puede enfocarse más en la consecuencia que en el acto.
  - severity: medium
    issue: La nota b no preserva con precisión la alternativa auditada
    rationale: La auditoría inglesa conserva explícitamente la opción «I hid my face and was angry». La nota española actual habla de repetición paralela y de no añadir «rostro», pero no da claramente la alternativa «oculté mi rostro», que debe constar.
  revised_spanish_text: Por la iniquidad de su ganancia injusta me enojé[a], y lo golpeé; me oculté y me enojé[b], y siguió apartándose en el camino de su corazón.
  revised_footnotes:
  - marker: a
    text: O «su codicia». El término hebreo puede referirse tanto al deseo codicioso como a la ganancia obtenida por la codicia.
    reason: lexical_alternative
  - marker: b
    text: O «oculté mi rostro y me enojé». «Oculté mi rostro» refleja un modismo bíblico común, aunque «rostro» no aparece explícitamente en el hebreo aquí.
    reason: alternative_reading
  revision_rationale: 'Se hicieron reparaciones menores para mejorar la naturalidad del español y alinear con mayor precisión la auditoría inglesa: «su ganancia injusta» suena más idiomático que «su injusta ganancia»; «lo golpeé» refleja mejor el valor punitivo de נכה; y la nota b ahora preserva explícitamente la alternativa documentada «oculté mi rostro».'
