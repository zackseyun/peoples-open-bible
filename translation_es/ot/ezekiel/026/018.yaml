    reason: lexical_alternative
  revision_rationale: Se reemplaza «serán aterradas» por «quedarán aterradas» para un español más natural y fiel al sentido de alarma intensa. Se cambia «por tu desaparición» a «por tu salida» para conservar la base léxica del hebreo y dejar la interpretación contextual en la nota, en línea con la auditoría inglesa. También se simplifican las notas para que sean correctas y claras.
