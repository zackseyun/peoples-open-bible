revisions:
- from: 'Y dijo delante de sus hermanos y del ejército de Samaria[a]: «¿Qué están haciendo estos judíos débiles? ¿Lo dejarán para sí mismos? ¿Sacrificarán? ¿Terminarán en un día? ¿Harán revivir las piedras de entre los montones de polvo, aunque estén quemadas?»'
  to: 'Y dijo delante de sus hermanos y del ejército de Samaria[a]: «¿Qué están haciendo estos judíos débiles? ¿Lo restaurarán para sí mismos? ¿Sacrificarán? ¿Terminarán en un día? ¿Revivirán las piedras de entre los montones de polvo, aunque estén quemadas?»'
  rationale: 'Se revisa la cláusula difícil הֲיַעַזְבוּ לָהֶם para alinear el texto principal español con la decisión principal del POB inglés: una lectura contextual de restauración/reconstrucción, no la opción más opaca como texto base. Se conserva la dificultad léxica en nota. Además, se pule «harán revivir» a «revivirán» por mejor fluidez en español sin cambiar el sentido.'
  reviewer_model: gpt-5.4
