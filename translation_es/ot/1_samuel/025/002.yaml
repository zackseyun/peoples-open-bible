    text: Or 'whose work/property was in Carmel.' The Hebrew term can refer broadly to a person's work, affairs, or holdings.
    reason: lexical_alternative
  - marker: b
    text: Or 'the man was very great,' that is, socially or economically prominent.
    reason: lexical_alternative
