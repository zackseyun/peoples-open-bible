translation:
  language: es
  text: Pero si no hace la paz contigo[a], sino que te hace la guerra[b], entonces la sitiarás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «si no pacta paz contigo». El hebreo puede expresar la idea de concluir una relación pacífica.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «te declara guerra» o «te combate». La expresión hebrea es literalmente «te hace guerra».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַשְׁלִים
  english_pob_choice: make peace
  chosen_spanish: hace paz
  alternatives_spanish:
  - hacer las paces
  - buscar la paz
  - concertar paz
  lexicon: HALOT
  rationale: El hebreo en hifil expresa entrar en relaciones pacíficas o concluir la paz. «Hace paz» conserva la acción verbal y la sencillez del original, sin añadir la idea más interpretativa de «buscar» o «concertar» paz.
- source_word: עִמָּךְ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - con usted
  - con vosotros
  lexicon: HALOT
  rationale: La preposición con sufijo de 2ª persona singular se rinde naturalmente como «contigo». Mantiene la relación directa del pacto/disputa sin introducir distancia formal innecesaria.
- source_word: וְעָשְׂתָה ... מִלְחָמָה
  english_pob_choice: makes war against you
  chosen_spanish: te hace guerra
  alternatives_spanish:
  - te declara guerra
  - te da guerra
  - te combate
  lexicon: HALOT
  rationale: La expresión hebrea עשה מלחמה es idiomática y literalmente significa «hacer guerra». «Te hace guerra» conserva ese paralelismo léxico con «hace paz» en la línea anterior, como lo hace la POB inglesa, sin perder claridad en español.
- source_word: וְצַרְתָּ
  english_pob_choice: you shall besiege
  chosen_spanish: la sitiarás
  alternatives_spanish:
  - la cercarás
  - pondrás sitio a ella
  - la asediarás
  lexicon: HALOT
  rationale: צור en este contexto militar significa poner sitio/sitiar. «La sitiarás» es la forma más natural y precisa en español bíblico contemporáneo.
theological_decisions:
- issue: Contraste adversativo entre paz y guerra
  english_pob_reading: But if it does not make peace with you, but makes war against you, then you shall besiege it.
  chosen_spanish_reading: Pero si no hace paz contigo, sino que te hace guerra, entonces la sitiarás.
  alternative_spanish_readings:
  - Pero si no hace paz contigo, y te hace guerra, entonces la sitiarás.
  - Pero si no pacta paz contigo, sino que te combate, entonces la sitiarás.
  rationale: 'El hebreo presenta una transición adversativa: si no entra en paz, entonces entra en guerra. «Sino que» refleja mejor esa oposición que un simple «y», y evita suavizar el contraste lógico del texto.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Se siguió el trazado de la POB inglesa: se mantuvo el contraste adversativo («but ... but ...») y la idiomaticidad de «make war»/«besiege», evitando una traducción más libre que perdiera la repetición de acción verbal del hebreo. La revisión inglesa sustituyó «and» por «but» para resaltar la oposición; el español adopta explícitamente «sino que» por la misma razón.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usa «sitiar» en sentido militar, coherente con el valor de צור en contexto de asedio.
  - Se conserva la estructura breve y legal del mandamiento, sin añadir sujetos implícitos ni explicaciones interpretativas.
