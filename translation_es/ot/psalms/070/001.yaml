translation:
  language: es
  text: Para el director del coro[a]. De David. Para el recuerdo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para el memorial», «para traer a la memoria» o posiblemente una indicación litúrgica vinculada con el recuerdo conmemorativo.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Para el director del coro
  alternatives_spanish:
  - Para el maestro de coro
  - Para el líder musical
  - Para el director musical
  lexicon: HALOT
  rationale: El término de la superscripción apunta al responsable musical o litúrgico. «Director del coro» conserva la función musical sin forzar una formulación más eclesiástica que podría sonar menos natural en español actual. «Para» refleja el valor del ל en encabezamientos.
- source_word: לְדָוִד
  english_pob_choice: Of David
  chosen_spanish: De David
  alternatives_spanish:
  - Para David
  - Por David
  - Perteneciente a David
  lexicon: HALOT
  rationale: El ל en los títulos de salmos puede marcar autoría, asociación o dedicación. «De David» mantiene esa ambigüedad mejor que una lectura más cerrada como «Por David».
- source_word: לְהַזְכִּיר
  english_pob_choice: For remembrance
  chosen_spanish: Para hacer recordar
  alternatives_spanish:
  - Para memorial
  - Para recordar
  - Para traer a la memoria
  lexicon: HALOT
  rationale: El hifil de זכר expresa causar que se recuerde o traer a la memoria. En español, «Para hacer recordar» conserva el valor verbal y la posible función litúrgica sin decidir si el recuerdo es de Dios, del adorador o del rito mismo.
theological_decisions:
- issue: Función exacta de לְהַזְכִּיר en la superscripción
  english_pob_reading: A purpose label rendered neutrally as 'For remembrance'
  chosen_spanish_reading: 'Una indicación funcional y neutra: «Para hacer recordar»'
  alternative_spanish_readings:
  - Una fórmula de memorial
  - Para que Dios recuerde
  - Para que el adorador recuerde
  rationale: El hebreo no especifica de quién es el recuerdo ni cuál es el referente exacto del acto de recordar. Conviene preservar esa tensión en vez de resolverla hacia una interpretación litúrgica o devocional única.
  doctrine_reference: Preservar la tensión textual y no cerrar indebidamente la ambigüedad.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el paquete fuente hebreo y coincide con la lectura inglesa auditada: superscripción funcional, ambigua y litúrgico-musical; no se introducen cambios respecto del último pase, que quedó marcado como sin modificaciones necesarias.'
  spanish_consistency_notes:
  - Se mantiene «David» sin artículo para reflejar la forma de encabezamiento.
  - Se evita «SEÑOR» para no ocultar el valor del hebreo en una superscripción que no contiene el tetragrámaton.
  - «Director del coro» conserva un registro claro y publicable, con función musical explícita.
  - La frase final mantiene la ambigüedad de finalidad de לְהַזְכִּיר sin interpretarla de manera más específica.
