    text: O «ha asignado» o «ha distribuido». El hebreo dice que Yahvé «ha repartido» estas cosas a todos los pueblos; la redacción en sí no dice que él apruebe que las adoren.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «debajo de todos los cielos». Muchas versiones expresan este modismo como «bajo todo el cielo».'
    reason: lexical_alternative
  revision_rationale: La revisión corrige la ubicación de las notas para que coincidan con las decisiones léxicas auditadas, ajusta «entre» a «a» para reflejar mejor el hebreo distributivo, y mejora la naturalidad de «ejército del cielo» sin alterar el sentido. No se requiere rehacer la traducción, solo un ajuste preciso.
