translation:
  language: es
  text: una fuente de oro[a], diez siclos[b], llena de incienso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «una fuente de oro, diez [de] oro, llena de incienso»; «siclos» se explicita en español porque la expresión es una fórmula abreviada de peso en este contexto.'
    reason: lexical_alternative
  - marker: b
    text: O «plato», «recipiente» o, tradicionalmente, «cuchara» para el utensilio.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּף
  english_pob_choice: dish
  chosen_spanish: fuente
  alternatives_spanish:
  - plato
  - recipiente
  - copa
  lexicon: HALOT
  rationale: En el contexto de la ofrenda del tabernáculo, כַּף designa un recipiente ritual pequeño, no la mano. «Fuente» comunica bien la pieza de vajilla/ofrenda en español y evita la posible confusión de «cuchara», que en español moderno sugiere un utensilio doméstico.
- source_word: אַחַת
  english_pob_choice: one
  chosen_spanish: una
  alternatives_spanish:
  - uno
  lexicon: HALOT
  rationale: Número cardinal femenino que modifica el sustantivo implícito; en español concuerda naturalmente con «fuente».
- source_word: עֲשָׂרָה
  english_pob_choice: ten
  chosen_spanish: diez
  alternatives_spanish:
  - '10'
  lexicon: HALOT
  rationale: Cardinal que forma parte de la fórmula de peso.
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: de oro
  alternatives_spanish:
  - dorada
  - de oro fino
  lexicon: HALOT
  rationale: El hebreo usa el material de modo atributivo. En español, «fuente de oro» suena natural y conserva la idea material sin forzar un adjetivo menos preciso.
- source_word: עֲשָׂרָה זָהָב
  english_pob_choice: ten shekels
  chosen_spanish: diez siclos
  alternatives_spanish:
  - diez siclos de oro
  - diez siclos de peso
  lexicon: HALOT
  rationale: En esta fórmula abreviada de Números 7, el valor subyacente es una medida de peso; en español conviene explicitar «siclos» por claridad, como hace el POB en inglés con «shekels». El sustantivo queda en la forma más directa del contexto, sin añadir más especificación que la necesaria.
- source_word: מְלֵאָה
  english_pob_choice: full of
  chosen_spanish: llena de
  alternatives_spanish:
  - colmada de
  - llena con
  lexicon: HALOT
  rationale: Adjetivo predicativo que describe el contenido del recipiente. «Llena de» es la opción más natural y fiel.
- source_word: קְטֹרֶת
  english_pob_choice: incense
  chosen_spanish: incienso
  alternatives_spanish:
  - perfume aromático
  - aroma
  lexicon: HALOT
  rationale: Término estándar para la sustancia aromática de la ofrenda cultual.
translation_notes:
  revision_awareness: Se siguió el texto hebreo masorético de Números 7:38 y el audit trail inglés. No se registran revisiones posteriores que alteren la lectura; la decisión principal es explicitar en español la medida de peso implícita en la fórmula abreviada y conservar el carácter ritual del recipiente.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponde al nombre divino; este versículo no lo contiene.
  - Se prefirió «siclos» para mantener la equivalencia funcional con el inglés POB «shekels» en la fórmula de peso.
  - Se evitó «cuchara» en el texto principal por posible ambigüedad moderna; quedó como alternativa en nota.
