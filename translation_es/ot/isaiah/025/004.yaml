  yaml_path: translation/ot/isaiah/025/004.yaml
  text: For you have been a stronghold to the poor[a], a stronghold to the needy in his distress, a refuge from the storm, a shade from the heat[b]; for the breath of the ruthless is like a storm against a wall.
