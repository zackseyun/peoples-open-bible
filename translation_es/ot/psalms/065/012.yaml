    rationale: La alternativa lexical «tracks» corresponde a וּמַעְגָּלֶיךָ, por lo que debe anclarse en «sendas» o frase equivalente para mantener correspondencia editorial exacta.
  - severity: low
    issue: La redacción de la nota a comienza con una comilla innecesaria antes de O:.
    rationale: '«''O: ...» es tipográficamente torpe en español; conviene normalizarla a «O bien: ...» o «O: ...».'
