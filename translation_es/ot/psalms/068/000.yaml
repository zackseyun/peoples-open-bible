translation:
  language: es
  text: Para el director del coro[a][b]. De David. Salmo. Cántico.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por David»; la preposición hebrea en encabezamientos de salmos puede indicar autoría, dedicación o asociación.
    reason: alternative_reading
  - marker: b
    text: «Para el director del coro» también puede verterse «Para el director de música» o «Para el maestro de coro».
    reason: lexical_alternative
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choir director
  chosen_spanish: Para el director del coro
  alternatives_spanish:
  - Para el director de música
  - Para el maestro de coro
  - Para el líder
  lexicon: HALOT
  rationale: En encabezamientos de salmos, el término señala a la persona encargada de la ejecución musical. «Director del coro» comunica bien esa función en español moderno sin perder el marco litúrgico-musical.
- source_word: לְדָוִד
  english_pob_choice: Of David
  chosen_spanish: De David
  alternatives_spanish:
  - Por David
  - Para David
  - Perteneciente a David
  lexicon: HALOT
  rationale: La preposición hebrea es amplia y puede indicar autoría, dedicación o asociación. «De David» conserva mejor esa ambigüedad que una opción más interpretativa.
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Canto
  - Composición musical
  - Salmo musical
  lexicon: HALOT
  rationale: «Salmo» es la equivalencia natural y tradicional para el género indicado, y en español no requiere artículo para sonar fluido en un encabezamiento breve.
- source_word: שִׁיר
  english_pob_choice: A song
  chosen_spanish: Cántico
  alternatives_spanish:
  - Canción
  - Canto
  lexicon: HALOT
  rationale: Aunque el inglés POB dice «A song», en español «cántico» comunica mejor el registro bíblico y evita la resonancia demasiado moderna de «canción» en un título litúrgico.
translation_notes:
  revision_awareness: El paquete de revisión más reciente indica que no se requirieron cambios y que la concordancia general es alta; por eso se mantiene la estructura breve del encabezamiento y solo se ajusta el español para naturalidad y precisión léxica.
  spanish_consistency_notes:
  - Se conserva la ambigüedad de לְדָוִד con «De David», en línea con el POB en inglés.
  - Se evita «SEÑOR» porque aquí no aparece el nombre divino; el texto es solo un encabezamiento de salmo.
  - «Salmo» y «cántico» se mantienen como dos etiquetas genéricas distintas, reflejando el paralelismo del hebreo.
