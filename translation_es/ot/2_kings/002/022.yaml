translation:
  language: es
  text: Así quedaron sanadas las aguas hasta hoy[a], conforme a la palabra que habló Eliseo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘fueron restauradas’ o ‘se hicieron saludables’. El verbo hebreo es el término usual para ‘sanar’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרָפוּ
  english_pob_choice: were healed
  chosen_spanish: quedaron sanadas
  alternatives_spanish:
  - fueron sanadas
  - fueron restauradas
  - quedaron restauradas
  lexicon: HALOT / רפא
  rationale: El hebreo usa el verbo usual para ‘sanar’. En español, ‘sanadas’ conserva la imagen de una acción reparadora sin forzar una lectura mecánica. ‘Quedaron’ expresa bien el estado resultante en narración pasada y suena natural en este contexto.
- source_word: הַמַּיִם
  english_pob_choice: the waters
  chosen_spanish: las aguas
  alternatives_spanish:
  - el agua
  lexicon: HALOT / מַיִם
  rationale: El hebreo emplea forma plural; ‘las aguas’ preserva mejor la forma fuente y funciona bien en español para este relato sobre un manantial o suministro de agua.
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: to this day
  chosen_spanish: hasta hoy
  alternatives_spanish:
  - hasta el día de hoy
  - hasta este día
  lexicon: HALOT
  rationale: Es un modismo narrativo que señala continuidad hasta el presente del narrador. ‘Hasta hoy’ es breve, natural y fiel al valor idiomático.
- source_word: כִּדְבַר
  english_pob_choice: according to the word
  chosen_spanish: conforme a la palabra
  alternatives_spanish:
  - según la palabra
  - de acuerdo con la palabra
  lexicon: HALOT / דָּבָר
  rationale: ‘Palabra’ mantiene el vínculo concreto entre el decir profético y su cumplimiento. ‘Conforme a’ expresa adecuadamente la dependencia de la realización respecto de esa declaración.
- source_word: אֱלִישָׁע
  english_pob_choice: Elisha
  chosen_spanish: Eliseo
  alternatives_spanish:
  - Elisha
  lexicon: Nombre propio tradicional
  rationale: ‘Eliseo’ es la forma establecida y ampliamente reconocible en español bíblico.
- source_word: אֲשֶׁר דִּבֵּר
  english_pob_choice: that Elisha spoke
  chosen_spanish: que habló
  alternatives_spanish:
  - que él habló
  - que había hablado
  lexicon: HALOT / דָּבַר
  rationale: La cláusula relativa identifica la palabra pronunciada por Elseo. ‘Que habló’ es el equivalente más directo y natural; no añade matices temporales que el hebreo no exige aquí.
theological_decisions:
- issue: Mantener el verbo de sanidad aplicado al agua
  english_pob_reading: 'Retain the healing metaphor in the main text: ''the waters were healed.'''
  chosen_spanish_reading: 'Mantener la metáfora de sanidad en el texto principal: ‘las aguas quedaron sanadas’.'
  alternative_spanish_readings:
  - las aguas fueron restauradas
  - las aguas se hicieron saludables
  rationale: El hebreo usa רפא, el verbo corriente para ‘sanar’. Traducir con ‘sanadas’ preserva la imagen bíblica de una acción reparadora y evita aplanar el lenguaje a una mera mejora utilitaria. La lectura sigue el auditoría inglesa y mantiene la tensión metafórica sin explicarla de más.
  doctrine_reference: Principio de primacía del original y preservación de la metáfora textual; no resolver la tensión léxica más allá de lo que el hebreo permite.
translation_notes:
  revision_awareness: 'El texto coincide con la revisión más reciente: no se requirieron cambios respecto del pasaje inglés auditado; se mantuvo la elección léxica de sanidad para רפא y la fórmula idiomática de continuidad temporal.'
  spanish_consistency_notes:
  - Se evitó ‘SEÑOR’ porque no aparece el tetragrámaton en este versículo.
  - ‘Aguas’ conserva el plural hebreo מַיִם, como en la decisión inglesa.
  - ‘Conforme a la palabra’ mantiene el nexo entre profecía y cumplimiento sin introducir ‘promesa’.
  - Se usó ‘Eliseo’ como forma española estándar del nombre propio.
