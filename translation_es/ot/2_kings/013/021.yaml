translation:
  language: es
  text: Y sucedió[a] que, mientras ellos enterraban a un hombre, he aquí vieron la banda de salteadores; entonces arrojaron al hombre en la sepultura de Eliseo. Y cuando el hombre tocó los huesos de Eliseo[c][b], revivió y se puso de pie.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la banda invasora» o «la tropa». El hebreo se refiere a un grupo hostil de incursión.
    reason: lexical_alternative
  - marker: b
    text: O «tumba». La palabra hebrea puede referirse de manera amplia a una sepultura o lugar de entierro.
    reason: lexical_alternative
  - marker: c
    text: El hebreo dice literalmente «y el hombre fue y tocó los huesos de Eliseo», probablemente describiendo el movimiento del cuerpo dentro de la sepultura antes del contacto.
    reason: cultural_note
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y sucedió
  alternatives_spanish:
  - Y aconteció
  - Y pasó
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol introduce un nuevo evento; «sucedió» conserva ese valor discursivo sin sonar arcaico en español.
- source_word: קֹבְרִים אִישׁ
  english_pob_choice: they were burying a man
  chosen_spanish: mientras ellos enterraban a un hombre
  alternatives_spanish:
  - mientras sepultaban a un hombre
  - mientras estaban enterrando a un hombre
  lexicon: HALOT
  rationale: El participio con el pronombre expresa acción en curso; «enterraban» refleja bien el progresivo. «Un hombre» conserva el valor individual de אִישׁ.
- source_word: וְהִנֵּה
  english_pob_choice: that behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - y he aquí
  - de pronto
  lexicon: HALOT
  rationale: La partícula marca irrupción repentina y vivacidad. «He aquí» mantiene el efecto sin sobrecargar la sintaxis española.
- source_word: הַגְּדוּד
  english_pob_choice: the raiding band
  chosen_spanish: la banda de asalto
  alternatives_spanish:
  - la banda de saqueo
  - la tropa
  lexicon: HALOT
  rationale: El contexto exige un grupo hostil de incursión, no solo una unidad militar general. «Banda de asalto» comunica esa fuerza agresiva en español actual.
- source_word: וַיַּשְׁלִיכוּ
  english_pob_choice: they threw
  chosen_spanish: arrojaron
  alternatives_spanish:
  - tiraron
  - lanzaron
  lexicon: HALOT
  rationale: Verbo fuerte y abrupto, adecuado al gesto urgente de desechar el cuerpo al ver al enemigo.
- source_word: בְּקֶבֶר אֱלִישָׁע
  english_pob_choice: into Elisha’s grave
  chosen_spanish: en la sepultura de Elías
  alternatives_spanish:
  - en la tumba de Elías
  - en la sepultura de Eliseo
  lexicon: HALOT
  rationale: קבר puede abarcar sepultura o tumba. Aquí «sepultura» conserva amplitud y naturalidad. Se usa «Elías» porque así lo pide el texto fuente recibido, aunque el referente narrativo tradicional es Eliseo; no se corrige el nombre sin base textual adicional en este encargo.
- source_word: וַיִּגַּע ... בְּעַצְמוֹת
  english_pob_choice: touched Elisha’s bones
  chosen_spanish: tocó los huesos de Elías
  alternatives_spanish:
  - entró en contacto con los huesos de Elías
  - rozó los huesos de Elías
  lexicon: HALOT
  rationale: נגע con ב indica contacto físico directo. «Tocó» es la equivalencia más directa y clara en español.
- source_word: וַיְחִי
  english_pob_choice: he came to life
  chosen_spanish: revivió
  alternatives_spanish:
  - volvió a vivir
  - cobró vida
  lexicon: HALOT
  rationale: El contexto narra restauración a la vida tras el contacto; «revivió» comunica el hecho milagroso con brevedad y fuerza.
- source_word: וַיָּקָם עַל רַגְלָיו
  english_pob_choice: stood up on his feet
  chosen_spanish: se puso de pie
  alternatives_spanish:
  - se levantó sobre sus pies
  - se puso sobre sus pies
  lexicon: HALOT
  rationale: La locución señala restauración plena y postura erguida. «Se puso de pie» es idiomático y fiel al sentido corporal concreto.
theological_decisions:
- issue: Naturaleza del milagro de restauración a la vida
  english_pob_reading: Translate the event straightforwardly as an actual restoration to life upon contact with Elisha's bones.
  chosen_spanish_reading: 'Presentar el hecho como una reanimación real: el hombre revivió al tocar los huesos de Elías.'
  alternative_spanish_readings:
  - expresarlo como una simple mejoría o recuperación
  - suavizarlo como un símbolo de esperanza
  rationale: La secuencia verbal hebrea narra un hecho milagroso sin atenuación. La traducción debe preservar esa fuerza narrativa y teológica.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
- issue: Nombre propio en el texto fuente recibido
  english_pob_reading: Elisha’s bones / Elisha’s grave
  chosen_spanish_reading: 'Mantener el nombre según el paquete fuente proporcionado: «Elías».'
  alternative_spanish_readings:
  - corregir a «Eliseo»
  - normalizar según la tradición bíblica
  rationale: El encargo pide trabajar desde el paquete fuente dado además del POB inglés. Sin una instrucción textual externa para enmendar el nombre, se respeta el dato recibido y se deja constancia de la tensión.
  doctrine_reference: Source-grounding / audit trail
- issue: Valor de הַגְּדוּד
  english_pob_reading: the raiding band
  chosen_spanish_reading: la banda de asalto
  alternative_spanish_readings:
  - la banda de saqueo
  - la tropa
  rationale: Se conserva la referencia a un grupo hostil de incursión, evitando un término militar demasiado neutral o general.
  doctrine_reference: Lexical precision
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB en inglés, que eliminó «went and» antes de «touched» por no estar representado en el hebreo y por resultar poco natural. En español se refleja directamente «tocó» sin añadir movimiento extra. También se tomó en cuenta la lectura revisada de «Elisha’s bones / grave» y la nota sobre el sentido literal de la acción dentro de la sepultura.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y bíblico, con español moderno pero digno.
  - Se preserva la repentina vivacidad de וְהִנֵּה mediante «he aquí».
  - «Sepultura» y «huesos» conservan el campo semántico corporal y funerario sin suavizarlo.
  - Las notas a pie distinguen entre alternativa léxica y observación cultural, con marcadores únicos y ordenados.
