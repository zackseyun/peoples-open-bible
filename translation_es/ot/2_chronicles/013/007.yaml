translation:
  language: es
  text: Y se agruparon en torno a él hombres indignos, hijos de Belial[a], y se fortalecieron contra Roboam hijo de Salomón; y Roboam era joven y de corazón débil, y no se había fortalecido delante de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sinvergüenzas» o «hombres sin valor» para «hijos de Belial».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקָּבְצוּ עָלָיו
  english_pob_choice: gathered around him
  chosen_spanish: se juntaron contra él
  alternatives_spanish:
  - se reunieron alrededor de él
  - se congregaron contra él
  - se agruparon en torno a él
  lexicon: WLC / HALOT; audited against English POB
  rationale: En español, ‘se juntaron’ mantiene la idea de reunión colectiva, y ‘contra él’ explicita la hostilidad que el contexto político requiere. Evita una calca de ‘alrededor de él’ que sonaría ambigua en español.
- source_word: אֲנָשִׁים רֵקִים
  english_pob_choice: worthless men
  chosen_spanish: hombres vacíos
  alternatives_spanish:
  - hombres inútiles
  - hombres sin valor
  - hombres vacíos de contenido
  lexicon: WLC / HALOT; audited against English POB
  rationale: רֵקִים significa literalmente ‘vacíos’; por eso ‘hombres vacíos’ conserva la metáfora primaria y evita cerrar demasiado pronto el matiz moral. El inglés POB optó por ‘worthless men’; el español conserva la tensión entre vaciedad e indignidad.
- source_word: בְּנֵי בְלִיַּעַל
  english_pob_choice: sons of Belial
  chosen_spanish: hijos de Belial
  alternatives_spanish:
  - hijos del mal
  - hombres perversos
  - sinvergüenzas
  lexicon: WLC / HALOT; audited against English POB
  rationale: Se mantiene la forma literal para preservar la posible función de nombre propio o de término personificado. Esto sigue la decisión auditada del POB inglés de no resolver prematuramente la expresión en un equivalente interpretativo.
- source_word: וַיִּתְאַמְּצוּ עַל
  english_pob_choice: strengthened themselves against
  chosen_spanish: se fortalecieron contra
  alternatives_spanish:
  - se mostraron más fuertes que
  - se afirmaron contra
  - se impusieron sobre
  lexicon: WLC / HALOT; audited against English POB
  rationale: El hitpael de אמץ expresa un fortalecerse en oposición. ‘Se fortalecieron contra’ reproduce la repetición léxica del hebreo sin perder naturalidad en español.
- source_word: נַעַר
  english_pob_choice: young
  chosen_spanish: joven
  alternatives_spanish:
  - un muchacho
  - un muchacho joven
  - de poca edad
  lexicon: WLC / HALOT; audited against English POB
  rationale: ‘Joven’ es el equivalente más natural y suficientemente amplio para el sentido relativo de inmadurez política; evita sugerir que Roboam fuera un niño literal.
- source_word: רַךְ לֵבָב
  english_pob_choice: fainthearted
  chosen_spanish: de corazón tierno
  alternatives_spanish:
  - de corazón débil
  - de ánimo flojo
  - pusilánime
  lexicon: WLC / HALOT; audited against English POB
  rationale: Aunque el contexto apunta a falta de firmeza, el hebreo dice literalmente ‘tierno/blando de corazón’. ‘De corazón tierno’ preserva la imagen verbal y deja que el contexto militar/político determine el matiz de debilidad.
- source_word: לֹא הִתְחַזַּק לִפְנֵיהֶם
  english_pob_choice: had not strengthened himself against them
  chosen_spanish: no se había fortalecido delante de ellos
  alternatives_spanish:
  - no se había hecho fuerte frente a ellos
  - no pudo resistirlos
  - no se había afirmado ante ellos
  lexicon: WLC / HALOT; audited against English POB
  rationale: Se conserva la estructura del hebreo y la reiteración del verbo ‘fortalecer/se fuerte’. ‘Delante de ellos’ es una equivalencia literal de לִפְנֵיהֶם y mantiene la relación auditable con el texto fuente.
theological_decisions:
- issue: Tratamiento de בְּנֵי בְלִיַּעַל
  english_pob_reading: sons of Belial
  chosen_spanish_reading: hijos de Belial
  alternative_spanish_readings:
  - hijos del mal
  - hombres perversos
  - sinvergüenzas
  - hijos del diablo
  rationale: Se preserva la ambigüedad histórica y teológica del término, que puede leerse como nombre personificado o como expresión de vileza moral. El lector en español recibe el mismo punto de tensión que el texto y el audit trail ingleses mantienen.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Relación entre ‘se fortalecieron’ y ‘no se había fortalecido’
  english_pob_reading: strengthened themselves against / had not strengthened himself against them
  chosen_spanish_reading: se fortalecieron contra / no se había fortalecido delante de ellos
  alternative_spanish_readings:
  - se impusieron contra / no pudo resistirles
  - se hicieron fuertes contra / no se había hecho fuerte ante ellos
  rationale: 'La repetición del mismo campo verbal en hebreo es relevante y se conserva en español para no perder el contraste retórico: los atacantes sí ‘se fortalecen’, mientras Roboam no ‘se fortalece’ ante ellos.'
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el único marcador de nota [a] aparece explícitamente en el texto principal junto a ‘hijos de Belial’. La redacción conserva la repetición del verbo ‘fortalecer’ que la revisión inglesa destacó, y evita resolver prematuramente la expresión bíblica ‘Belial’.
  spanish_consistency_notes:
  - Se usa ‘Dios/Yahvé’ según corresponda en el proyecto; aquí no aparece ninguna forma divina.
  - Se conservó la repetición léxica de ‘fortalecer’ para reflejar el paralelismo del hebreo.
  - ‘Belial’ se mantiene sin domesticar por coherencia con la política terminológica del POB y la nota alternativa.
  - El registro es bíblico y publicable, pero evita arcaísmos innecesarios.
  - La nota [a] está anclada exactamente en el texto principal y no se dejan notas huérfanas.
