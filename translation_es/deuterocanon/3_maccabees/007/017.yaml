  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia básica del griego: llegada a Ptolemaida, epíteto descriptivo, espera de la flota por siete días y decisión compartida. Sin embargo, «allí la flota los esperó» debilita la relación relativa de ἐν ᾗ («donde / en la cual») y la ubicación de «por decisión común de ellos» queda menos claramente ligada a la espera misma. Además, la nota al pie no preserva bien la alternativa inglesa, porque repite «Portadora de rosas» en lugar de ofrecer la opción más literal paralela a ''bearing roses''.'
  spanish_quality_summary: El español es generalmente claro y natural, pero puede mejorarse para sonar más fluido y más ajustado a la sintaxis del original. «Donde la flota los esperó» lee mejor que «allí la flota los esperó». También conviene «por acuerdo común» o «por decisión común» sin el añadido pesado «de ellos».
  glossary_alignment: No hay términos teológicos sensibles aquí. La transliteración «Ptolemaida» es defendible en español. El epíteto ῥοδοφόρον puede mantenerse como «Portadora de rosas», pero la nota debe reflejar la alternativa «que lleva rosas» o equivalente, en vez de duplicar la forma principal.
  issues:
  - severity: medium
    issue: «allí» en lugar de una relativa locativa para ἐν ᾗ
    rationale: El griego retoma la ciudad con una relativa locativa clara («donde / en la cual»). «Allí» no es incorrecto, pero afloja la conexión sintáctica y resulta menos fiel al flujo del original.
  - severity: low
    issue: «por decisión común de ellos» suena algo pesado en español
    rationale: La idea de κατὰ κοινὴν αὐτῶν βουλήν se expresa de modo más idiomático con «por acuerdo común» o «por decisión común», sin necesidad de «de ellos», que es redundante en español.
  - severity: medium
    issue: La nota al pie no ofrece una alternativa real al texto principal
    rationale: La nota dice «O “Portadora de rosas”», que repite esencialmente la misma opción ya usada en el texto. Debe preservar una alternativa como «que lleva rosas» para reflejar el audit trail inglés.
  revised_spanish_text: Cuando llegaron a Ptolemaida[a], que se llama Portadora de rosas por la naturaleza del lugar, donde la flota los esperó durante siete días por decisión común,
  revised_footnotes:
