base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/024/003.yaml
  text: and the latter man hates her[a], and writes her a certificate of divorce, and puts it into her hand, and sends her out of his house, or if the latter man dies[c][b], who took her as his wife—
  footnotes:
  - marker: a
    text: Or, 'comes to hate her.' The Hebrew perfect can be rendered in a simple past-like legal sequence, but the sense is that the latter man develops hostility toward her and proceeds to divorce her.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'a book/document of cutting off.' This is a formal written notice dissolving the marriage.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'took her to himself as a wife,' that is, 'married her.'
    reason: lexical_alternative
