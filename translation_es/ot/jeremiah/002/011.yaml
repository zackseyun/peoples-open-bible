translation:
  language: es
  text: ¿Ha cambiado una nación sus dioses, aunque no son dioses? Sin embargo, mi pueblo ha cambiado su gloria[a][b][c] por lo que no sirve de nada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «ha intercambiado» o «ha reemplazado»; el hebreo admite la idea de cambio, intercambio o sustitución.
    reason: lexical_alternative
  - marker: b
    text: «Su gloria» probablemente alude a Yahvé, la gloria de Israel, mediante una metonimia o título reverencial, aunque el texto no lo explicita.
    reason: theological_note
  - marker: c
    text: 'También: «por lo que es inútil» o «por lo que no ayuda»; el hebreo expresa algo sin provecho.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵימִיר
  english_pob_choice: changed
  chosen_spanish: ha cambiado
  alternatives_spanish:
  - ha intercambiado
  - ha reemplazado
  lexicon: HALOT
  rationale: El verbo hebreo puede expresar cambiar, intercambiar o sustituir. «Ha cambiado» es natural en español y conserva la idea de sustituir un objeto de lealtad por otro sin añadir una paráfrasis más fuerte de la que el hebreo exige.
- source_word: גּוֹי
  english_pob_choice: nation
  chosen_spanish: nación
  alternatives_spanish:
  - pueblo
  - gentil nación
  lexicon: HALOT
  rationale: Aquí el término designa una entidad nacional en contraste retórico con Israel. «Nación» reproduce bien esa fuerza y mantiene el paralelismo con el versículo.
- source_word: אֱלֹהִים
  english_pob_choice: gods
  chosen_spanish: dioses
  alternatives_spanish:
  - deidades
  lexicon: HALOT
  rationale: El plural se refiere a los supuestos dioses de las naciones. «Dioses» es la equivalencia española más clara y directa.
- source_word: וְהֵמָּה לֹא אֱלֹהִים
  english_pob_choice: though they are not gods
  chosen_spanish: aunque no son dioses
  alternatives_spanish:
  - pero no son dioses
  - y no son dioses
  lexicon: HALOT
  rationale: El hebreo tiene una fuerza concesiva. «Aunque no son dioses» preserva ese matiz en español sin convertirlo en una simple coordinación adversativa.
- source_word: וְעַמִּי
  english_pob_choice: Yet my people
  chosen_spanish: Sin embargo, mi pueblo
  alternatives_spanish:
  - Pero mi pueblo
  - Y mi pueblo
  lexicon: HALOT
  rationale: '«Sin embargo» reproduce el contraste e ironía del paralelismo: las naciones conservan sus dioses falsos, pero el pueblo de Yahvé abandona su verdadera gloria.'
- source_word: כְּבוֹדוֹ
  english_pob_choice: their glory
  chosen_spanish: su gloria
  alternatives_spanish:
  - su honor
  - su Gloria
  lexicon: HALOT
  rationale: El posesivo singular hebreo puede referirse metonímicamente a Yahvé, la verdadera gloria de Israel. En español, «su gloria» conserva la ambigüedad y no fuerza una identificación explícita en el cuerpo del texto, siguiendo la cautela revisada del audit trail inglés.
- source_word: בְּלֹא יוֹעִיל
  english_pob_choice: for what does not profit
  chosen_spanish: por lo que no aprovecha
  alternatives_spanish:
  - por lo que no sirve
  - por lo que no beneficia
  lexicon: HALOT
  rationale: La expresión denota algo que no produce beneficio. «No aprovecha» es idiomático en español bíblico contemporáneo y conserva la idea de inutilidad o falta de provecho sin exceder el hebreo.
theological_decisions:
- issue: Referente de «su gloria» (כבודו)
  english_pob_reading: A reverential title/metonymy for the LORD as the one who is Israel's glory
  chosen_spanish_reading: Una metonimia reverente para Yahvé, la gloria de Israel, sin explicitarlo en la línea principal
  alternative_spanish_readings:
  - la gloria de Israel como abstracción
  - su honor
  rationale: El contexto contrapone los dioses de las naciones con el Dios verdadero de Israel. La traducción principal conserva la expresión hebrea y deja que el lector perciba la tensión teológica sin resolverla de manera explicativa, en línea con la política de POB de no borrar la ambigüedad documentada.
  doctrine_reference: Preservar la tensión textual y la primacía del original; evitar una glosa que sustituya al hebreo
- issue: Valor de la cláusula final «בְּלֹא יוֹעִיל»
  english_pob_reading: for what does not profit / what is useless / that which does not help
  chosen_spanish_reading: Algo que no aprovecha, es decir, no produce beneficio alguno
  alternative_spanish_readings:
  - lo inútil
  - lo que no ayuda
  rationale: La frase puede leerse como una caracterización funcional de aquello que Israel eligió en lugar de su gloria. «Por lo que no aprovecha» mantiene el golpe profético y la falta de ganancia, sin introducir un matiz doctrinal nuevo.
  doctrine_reference: Fidelidad semántica al hebreo y mantenimiento del paralelismo retórico
translation_notes:
  revision_awareness: El texto inglés revisado bajó «Glory» a «glory» para evitar una implicación tipográfica de título explícito; la versión española sigue esa cautela con «su gloria» en minúscula y conserva la ambigüedad interpretativa documentada. La decisión mantiene el contraste retórico del original sin sobre-explicarlo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como terminología POB para el nombre divino cuando el contexto lo requiere implícitamente en la referencia teológica de «su gloria».
  - Se conserva el plural «dioses» para אֱלֹהִים en ambos miembros del paralelismo.
  - «Nación» se usa con valor colectivo-rhetórico, paralelo al «mi pueblo» del segundo colon.
  - La puntuación con raya reproduce el quiebre retórico del hebreo y del audit trail inglés.
