translation:
  language: es
  text: 'Acerca de Cedar y de los reinos de Hazor, que Nabucodonosor[b], rey de Babilonia, derrotó: Así dice Yahvé: Levántense, suban contra Cedar y saqueen a la gente del oriente[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «hijos del oriente», un modismo para pueblos del desierto oriental.'
    reason: lexical_alternative
  - marker: b
    text: La grafía hebrea aquí se acerca más a «Nabucodrezar»; la forma castellana tradicional es «Nabucodonosor».
    reason: lexical_alternative
lexical_decisions:
- source_word: לְקֵדָר
  english_pob_choice: Concerning Kedar
  chosen_spanish: Acerca de Cadar
  alternatives_spanish:
  - Contra Cadar
  - A Cadar
  lexicon: HALOT
  rationale: El ל inicial en encabezamientos proféticos introduce con frecuencia el asunto del oráculo; por eso «Acerca de» preserva el valor de tópico mejor que una dirección literal. «Cadar» mantiene la forma del nombre propio con adaptación española clara.
- source_word: וּלְמַמְלְכֹת חָצוֹר
  english_pob_choice: and the kingdoms of Hazor
  chosen_spanish: y de los reinos de Jazor
  alternatives_spanish:
  - y contra los reinos de Jazor
  - y los reinos de Jazor
  lexicon: HALOT
  rationale: Se conserva el plural «reinos» para reflejar מַמְלְכֹת. «De Jazor» reproduce la relación constructa sin forzar una idea direccional que el hebreo no exige aquí.
- source_word: אֲשֶׁר הִכָּה
  english_pob_choice: which ... struck down
  chosen_spanish: que ... derrotó
  alternatives_spanish:
  - que ... hirió
  - que ... golpeó
  lexicon: HALOT
  rationale: En contexto militar, הִכָּה implica golpear/derrotar. «Derrotó» comunica el resultado bélico con naturalidad en español sin perder la fuerza del verbo.
- source_word: נבוכדראצור
  english_pob_choice: Nebuchadnezzar
  chosen_spanish: Nabucodonosor
  alternatives_spanish:
  - Nabucodrezer
  lexicon: HALOT
  rationale: Se adopta la forma castellana tradicional y reconocible del nombre propio. La variante hebrea más cercana al sonido, documentada en el audit trail inglés, se conserva como alternativa transliterada, pero no es necesaria en el texto principal.
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Así ha dicho Yahvé
  - Así dice el Señor
  lexicon: HALOT
  rationale: Se mantiene la fórmula profética directa. YHWH se traduce por «Yahvé» según la norma del proyecto, no por una sustitución reverencial genérica.
- source_word: קוּמוּ
  english_pob_choice: Rise up
  chosen_spanish: Levantaos
  alternatives_spanish:
  - Levantad
  - Poneos en marcha
  lexicon: HALOT
  rationale: El imperativo plural exhortativo se expresa con «Levantaos», que conserva la energía del mandato y su tono militar/literario.
- source_word: עֲלוּ אֶל קֵדָר
  english_pob_choice: go up against Kedar
  chosen_spanish: subid contra Cadar
  alternatives_spanish:
  - subid a Cadar
  - avanzad contra Cadar
  lexicon: HALOT
  rationale: El עלה en contexto bélico requiere una dirección hostil; «contra» preserva ese matiz. «Subid» mantiene la imagen de avance militar sin sobreexplicar.
- source_word: וְשָׁדְד֖וּ
  english_pob_choice: and plunder
  chosen_spanish: y saquead
  alternatives_spanish:
  - y despojad
  - y devastad
  lexicon: HALOT
  rationale: שׁדד es el verbo típico de expolio bélico. «Saquead» es el equivalente español más directo y conserva la acción concreta de despojar.
- source_word: בְּנֵי קֶדֶם
  english_pob_choice: the people of the east
  chosen_spanish: a los hijos del oriente
  alternatives_spanish:
  - al pueblo del oriente
  - a los hombres del oriente
  lexicon: HALOT
  rationale: Se mantiene la metáfora literal «hijos del oriente» porque el hebreo usa una expresión idiomática etnogeográfica. El lector español puede entenderla, y la nota aclara el sentido colectivo.
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El paquete fuente y la política del proyecto favorecen la restitución del nombre divino en español como «Yahvé». Se evita la sustitución litúrgica por «el SEÑOR» para no borrar el dato teológico explícito del hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de בְּנֵי קֶדֶם
  english_pob_reading: the people of the east
  chosen_spanish_reading: los hijos del oriente
  alternative_spanish_readings:
  - la gente del oriente
  - los pueblos del oriente
  rationale: Se conserva la imagen idiomática del hebreo. Aunque en español puede sonar más literal, no se pierde el sentido colectivo y se evita diluir el tropo original antes de que una nota lo explique.
  doctrine_reference: HALOT; audit trail de POB inglés sobre la expresión idiomática
translation_notes:
  revision_awareness: El rastro inglés muestra acuerdo alto y sin revisiones pendientes; se conservaron las decisiones léxicas principales, especialmente el nombre divino, el valor militar de עלה + אֶל y la frase idiomática בני קדם, adaptándolas a un español natural pero auditable.
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera consistente con la política terminológica del proyecto.
  - 'Se mantuvo el paralelismo del oráculo: encabezamiento, fórmula profética y mandato militar.'
  - «Cadar» y «Jazor» siguen una adaptación española coherente de los nombres propios, sin introducir formas eclesiásticas que oculten el hebreo.
