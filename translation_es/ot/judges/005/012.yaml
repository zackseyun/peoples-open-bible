translation:
  language: es
  text: ¡Despierta[a], despierta, Débora! ¡Despierta, despierta, canta una canción! Levántate, Barac, y toma cautivos tus cautivos[b], hijo de Abinoam.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «di un canto». El verbo hebreo es literalmente «hablar/decir», lo que puede preservar de forma intencional la fuerza poética del llamado.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «toma cautivos tus cautivos», un giro hebreo para expresar la victoria sobre los enemigos al hacerlos prisioneros.
    reason: lexical_alternative
lexical_decisions:
- source_word: עוּרִי
  english_pob_choice: Awake
  chosen_spanish: Despierta
  alternatives_spanish:
  - Despabílate
  - Levántate
  lexicon: HALOT
  rationale: Imperativo femenino singular repetido cuatro veces para urgencia poética. «Despierta» es natural en español y conserva la súplica exhortativa sin añadir interpretación.
- source_word: דְּבוֹרָה
  english_pob_choice: Deborah
  chosen_spanish: Débora
  alternatives_spanish:
  - Debora
  lexicon: Transliteración bíblica estándar
  rationale: Nombre propio de la jueza y profetisa; se conserva en forma española usual con tilde prosódica.
- source_word: דַּבְּרִי שִׁיר
  english_pob_choice: sing a song
  chosen_spanish: canta un canto
  alternatives_spanish:
  - habla un canto
  - pronuncia un canto
  lexicon: HALOT
  rationale: El verbo hebreo subyacente es «hablar/decir», pero el contexto poético y la revisión inglesa prefieren una formulación más natural que mantenga la orden de componer/proferir poesía. «Canta un canto» conserva el efecto poético sin borrar el matiz verbal.
- source_word: קוּם
  english_pob_choice: Rise up
  chosen_spanish: Levántate
  alternatives_spanish:
  - Rise up
  - Ponte en pie
  lexicon: HALOT
  rationale: Imperativo masculino singular dirigido a Barac. «Levántate» comunica el llamado marcial y encaja bien con el paralelismo del verso.
- source_word: בָּרָק
  english_pob_choice: Barak
  chosen_spanish: Barac
  alternatives_spanish:
  - Barak
  lexicon: Transliteración bíblica estándar
  rationale: Nombre propio; en español bíblico se adapta normalmente como «Barac».
- source_word: וּשֲׁבֵה שֶׁבְיְךָ
  english_pob_choice: take captive your captives
  chosen_spanish: toma cautivos a tus cautivos
  alternatives_spanish:
  - lleva cautivos a tus cautivos
  - captura a tus cautivos
  lexicon: HALOT
  rationale: Se conserva el giro idiomático hebreo de triunfo militar. «Toma cautivos a tus cautivos» refleja la fuerza literal y la victoria sobre los enemigos sin convertirlo en una paráfrasis explicativa.
- source_word: בֶּן אֲבִינֹעַם
  english_pob_choice: son of Abinoam
  chosen_spanish: hijo de Abinoam
  alternatives_spanish:
  - hijo de Abinóam
  lexicon: Nombre patronímico
  rationale: Fórmula identificadora conservada de manera formal; «Abinoam» es la transliteración más habitual en español bíblico.
theological_decisions:
- issue: Imperativos poéticos repetidos como exhortación profética a Débora y Barac
  english_pob_reading: Awake... Awake... Rise up...
  chosen_spanish_reading: ¡Despierta... despierta...! ¡Levántate...!
  alternative_spanish_readings:
  - ¡Despierta, Débora! ¡Alzaos!
  - ¡Aflórate, Débora!
  rationale: El verso mantiene el tono de llamada urgente, no solo descriptiva. La repetición en español reproduce la intensificación retórica del hebreo sin suavizarla.
  doctrine_reference: Poética bíblica / exhortación profética
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa que prefirió «sing a song» sobre «speak a song». Por eso el español evita la literalidad «habla un canto» y opta por una forma natural que preserve el impulso poético. También se preservó el idiomatismo «take captive your captives» mediante una construcción española equivalente y auditable.
  spanish_consistency_notes:
  - Se usó «Débora» y «Barac» con transliteración española habitual, consistente con la práctica bíblica en español.
  - Se mantuvo el paralelismo y la repetición intensificadora de los imperativos, clave del hebreo.
  - No se sustituyó el giro militar por una explicación interpretativa más larga; se conservó su tensión idiomática.
  - La puntuación exclamativa refleja la fuerza exhortativa del verso poético.
