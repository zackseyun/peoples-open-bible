translation:
  language: es
  text: 'Y Dios llamó a la expansión Cielo[a]. Y hubo tarde, y hubo mañana: el segundo día.[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cielo» o «los cielos». El hebreo שָׁמַיִם puede referirse al cielo o a los cielos; aquí es el nombre que Dios da a la expansión.
    reason: lexical_alternative
  - marker: b
    text: O «firmamento» (tradicional) o «bóveda». El hebreo רָקִיעַ se refiere a algo extendido; «expansión» se usa aquí como una traducción equilibrada.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - llamó a
  - nombró
  lexicon: HALOT
  rationale: קרא con ל introduce un acto de nombrar o designar. En español, «llamó» reproduce con naturalidad el valor de nombrar sin perder el movimiento narrativo del hebreo.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: En Génesis 1, אֱלֹהִים lleva verbo singular y se refiere al único Creador. «Dios» es la equivalencia directa y natural en español.
- source_word: לָרָקִיעַ
  english_pob_choice: the expanse
  chosen_spanish: al firmamento
  alternatives_spanish:
  - a la expansión
  - a la bóveda
  lexicon: HALOT
  rationale: El sustantivo רָקִיעַ alude a algo extendido o desplegado. Se conserva «firmamento» por ser la solución tradicional en español bíblico y porque en este contexto funciona como nombre del elemento creado; «expansión» sería más interpretativo y menos asentado.
- source_word: שָׁמָיִם
  english_pob_choice: Heaven
  chosen_spanish: Cielos
  alternatives_spanish:
  - Cielo
  - los cielos
  - cielo
  lexicon: HALOT
  rationale: Aquí שָׁמַיִם es el nombre que Dios da al firmamento. Se eligió el plural «Cielos» para conservar el valor del hebreo plural y el tono elevado del acto de nombrar; «cielo» podría sonar más limitado al espacio visible.
- source_word: וַיְהִי
  english_pob_choice: there was
  chosen_spanish: hubo
  alternatives_spanish:
  - y hubo
  - y fue
  - y llegó a haber
  lexicon: HALOT
  rationale: En la fórmula recurrente de los días de la creación, «hubo» expresa de forma idiomática la secuencia narrativa y el surgimiento del estado descrito.
- source_word: עֶרֶב
  english_pob_choice: evening
  chosen_spanish: tarde
  alternatives_spanish:
  - anochecer
  - atardecer
  lexicon: HALOT
  rationale: Para la secuencia litúrgico-narrativa del día de la creación, «tarde» es una solución concisa y natural que mantiene el paralelismo con «mañana». Se reconoce que el hebreo puede abarcar el comienzo del período nocturno; por eso se preserva una nota alternativa.
- source_word: בֹקֶר
  english_pob_choice: morning
  chosen_spanish: mañana
  alternatives_spanish:
  - alba
  - amanecer
  lexicon: HALOT
  rationale: «Mañana» es la correspondencia directa y funciona bien en la fórmula fija de Génesis 1, manteniendo el paralelismo con «tarde».
- source_word: יוֹם שֵׁנִי
  english_pob_choice: the second day
  chosen_spanish: el segundo día
  alternatives_spanish:
  - día segundo
  - un segundo día
  lexicon: HALOT
  rationale: En español, el ordinal con artículo es la forma idiomática para el encadenamiento de los días de la creación. Se conserva el orden natural del español sin perder el valor secuencial del hebreo.
theological_decisions:
- issue: Cómo traducir שָׁמַיִם cuando es el nombre dado al firmamento
  english_pob_reading: Heaven
  chosen_spanish_reading: Cielos
  alternative_spanish_readings:
  - Cielo
  - los cielos
  - firmamento
  rationale: El versículo no solo describe un objeto, sino que reporta el acto de nombrarlo. «Cielos» mantiene el eco plural del hebreo y evita reducir el término a un simple fenómeno atmosférico, a la vez que conserva la solemnidad del relato creador.
  doctrine_reference: Génesis 1:8; acto de nominación en la creación
- issue: Elección de «firmamento» para רָקִיעַ frente a alternativas modernas
  english_pob_reading: expanse
  chosen_spanish_reading: firmamento
  alternative_spanish_readings:
  - expansión
  - bóveda
  - expanse
  rationale: Aunque «firmamento» es más tradicional que la solución inglesa «expanse», en español es un término bíblico reconocido y preciso dentro de la historia de la recepción. No se usa para imponer una cosmología, sino para mantener la correspondencia lexicográfica con el elemento extendido designado por Dios.
  doctrine_reference: Génesis 1:6-8; terminología de la creación
- issue: Orden y puntuación del refrán creador
  english_pob_reading: And there was evening, and there was morning—the second day.
  chosen_spanish_reading: 'Y hubo tarde, y hubo mañana: el segundo día.'
  alternative_spanish_readings:
  - Y hubo tarde y hubo mañana, el segundo día
  - 'Y fue tarde, y fue mañana: el segundo día'
  rationale: La puntuación con dos puntos comunica bien que la fórmula concluye en la identificación del día. Se conserva el paralelismo y el ritmo del refrán sin introducir elementos ajenos al hebreo.
  doctrine_reference: Génesis 1:5, 8; fórmula literaria de los días
translation_notes:
  revision_awareness: Se tuvo en cuenta el texto hebreo directo y el audit trail inglés. La solución inglesa usa «Heaven» para שָׁמַיִם y «expanse» para רָקִיעַ; en español se evaluó si conservar esa diferenciación o seguir la tradición bíblica hispana. Se optó por «firmamento» con nota explicativa para רָקִיעַ y por «Cielos» para שָׁמַיִם, preservando el acto de nombrar y el plural hebreo sin perder inteligibilidad.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para אֱלֹהִים en sentido singular creador.
  - Se evitó «SEÑOR» porque el hebreo aquí dice אֱלֹהִים, no יהוה.
  - Se conservó el paralelismo repetido «Y hubo… y hubo…» propio de la fórmula de la creación.
  - Se usó mayúscula inicial en «Cielos» por tratarse del nombre dado en el versículo.
