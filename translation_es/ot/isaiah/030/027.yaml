review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido central del hebreo: mantiene «el nombre de Yahvé» como sujeto, respeta «viene de lejos», expresa la ira ardiente, retiene la imagen difícil de humo denso y preserva las metáforas de labios llenos de ira y lengua como fuego consumidor. Sin embargo, la puntuación y capitalización iniciales hacen menos natural la lectura en español, y la nota al pie no refleja la alternativa principal documentada en la auditoría inglesa para la frase difícil.'
  spanish_quality_summary: En general el español es claro, digno y natural. «Yahvé», «viene de lejos», «densa humareda» y «fuego consumidor» funcionan bien. Pero «¡Mira!» seguido de mayúscula inicial en «El» resulta tipográficamente torpe; además, en este contexto profético «Miren» o «Mira» puede integrarse mejor sin signo de cierre exclamativo separado del resto. Conviene también ajustar la nota para reflejar la alternativa sobre «y humo denso» / «pesadez de elevación».
  glossary_alignment: 'Alinea bien con la terminología del proyecto: יְהוָה -> «Yahvé»; preserva «nombre»; no introduce sustituciones doctrinalmente problemáticas. No hay conflicto relevante con otros términos de glosario.'
  issues:
  - severity: medium
    issue: 'Puntuación y capitalización poco naturales al inicio: «¡Mira![a] El nombre...»'
    rationale: 'En español, tras una interjección exclamativa cerrada, la mayúscula en «El» es posible pero aquí produce una cadencia brusca. Es más natural integrar el llamado de atención con coma: «¡Mira[a], el nombre de Yahvé...!», o usar «Miren». Esto mejora legibilidad sin alterar el sentido.'
  - severity: medium
    issue: La nota al pie solo ofrece la alternativa para הִנֵּה y omite la ambigüedad principal conservada en la POB inglesa para וְכֹבֶד מַשָּׂאָה
    rationale: La auditoría inglesa preserva una nota por la dificultad de la frase «and dense smoke» / «heaviness of lifting up». Dado que el español adopta «densa humareda», debe conservar una nota equivalente para documentar la alternativa y la incertidumbre textual/lexical.
  - severity: low
    issue: «Humareda» es válido, pero «humo denso» se alinea más transparentemente con la POB inglesa revisada
    rationale: «Humareda» comunica bien la imagen, pero también puede sonar algo más idiomática o expansiva. «Humo denso» refleja con mayor cercanía la formulación auditada «dense smoke». No es un error grave, pero una ligera revisión mejora la trazabilidad.
