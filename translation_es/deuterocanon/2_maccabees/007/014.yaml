translation:
  language: es
  text: 'Y cuando estaba a punto de morir, dijo esto: «Es preferible, cuando se muere a manos de hombres, aguardar las esperanzas dadas por Dios: ser levantado otra vez por él[a]. Pero para ti no habrá resurrección a vida[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «Es mejor, cuando se es puesto a muerte por hombres, esperar de Dios la esperanza de ser resucitado otra vez».
    reason: lexical_alternative
  - marker: b
    text: La expresión «no habrá resurrección a vida» puede implicar exclusión de una resurrección bendita, más que negar explícitamente toda resurrección.
    reason: alternative_reading
lexical_decisions:
- source_word: γενόμενος πρὸς τῷ τελευτᾷν
  english_pob_choice: when he was about to die
  chosen_spanish: cuando estaba a punto de morir
  alternatives_spanish:
  - cuando llegaba a su fin
  - cuando estaba al borde de la muerte
  lexicon: LSJ
  rationale: La expresión griega indica inminencia; «estaba a punto de morir» conserva ese valor temporal en español natural y digno.
- source_word: οὕτως ἔφη
  english_pob_choice: he said this
  chosen_spanish: dijo esto
  alternatives_spanish:
  - habló así
  - dijo
  lexicon: LSJ
  rationale: Es una fórmula introductoria simple. «Dijo esto» conserva el deíctico de οὕτως sin sonar forzado.
- source_word: Αἱρετὸν
  english_pob_choice: It is preferable
  chosen_spanish: Es preferible
  alternatives_spanish:
  - Es mejor
  - Es digno de elección
  lexicon: LSJ
  rationale: El adjetivo expresa algo que merece ser escogido o preferido; «es preferible» mantiene ese matiz evaluativo con buena naturalidad en español.
- source_word: μεταλλάσσοντας ἀπὸ ἀνθρώπων
  english_pob_choice: when dying at the hands of men
  chosen_spanish: cuando se muere a manos de hombres
  alternatives_spanish:
  - cuando se muere por obra de hombres
  - cuando se es puesto a muerte por hombres
  lexicon: LSJ
  rationale: La frase señala muerte causada por agentes humanos en contexto martirial. «A manos de hombres» preserva la agencia humana de forma idiomática y fiel.
- source_word: τὰς ὑπὸ τοῦ θεοῦ προσδοκᾷν ἐλπίδας
  english_pob_choice: to await the hopes given by God
  chosen_spanish: esperar las esperanzas dadas por Dios
  alternatives_spanish:
  - aguardar las esperanzas de Dios
  - esperar las esperanzas prometidas por Dios
  lexicon: LSJ
  rationale: Se conserva la rareza del plural «esperanzas», que el griego presenta con fuerza propia. «Dadas por Dios» refleja la relación ὑπὸ τοῦ θεοῦ sin convertirla en una promesa que el texto no dice explícitamente.
- source_word: πάλιν ἀναστήσεσθαι ὑπʼ αὐτοῦ
  english_pob_choice: that one will be raised again by him
  chosen_spanish: de que uno será resucitado de nuevo por él
  alternatives_spanish:
  - de que uno volverá a levantarse por él
  - de que uno será levantado otra vez por él
  lexicon: LSJ
  rationale: El infinitivo pasivo expresa ser levantado/resucitado por Dios. «Será resucitado de nuevo» retiene la pasiva y la reiteración de πάλιν, aunque resulte más intensa que una simple redundancia estilística.
- source_word: ἀνάστασις εἰς ζωὴν
  english_pob_choice: resurrection to life
  chosen_spanish: resurrección para vida
  alternatives_spanish:
  - resurrección hacia la vida
  - resurrección a vida
  lexicon: LSJ
  rationale: «Para vida» preserva el valor direccional de εἰς ζωὴν y mantiene el contraste teológico sin suavizarlo a una frase más explicativa.
theological_decisions:
- issue: La promesa de resurrección para el mártir y la negación para el perseguidor
  english_pob_reading: The verse affirms that God will raise the martyr again, while declaring that the addressee will have no resurrection to life.
  chosen_spanish_reading: El versículo afirma que Dios resucitará de nuevo al mártir, mientras declara que para el destinatario no habrá resurrección para vida.
  alternative_spanish_readings:
  - El destinatario no tendrá ninguna resurrección
  - El destinatario no participará en la resurrección que lleva a la vida
  rationale: 'Se conserva la tensión del texto: la negación está calificada por εἰς ζωὴν. No se absolutiza como ausencia de toda resurrección, sino como exclusión de la resurrección que conduce a la vida.'
  doctrine_reference: Preservar la tensión teológica y la restricción semántica de εἰς ζωὴν.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto se mantiene alineado con el alto acuerdo del cotejo y con la nota de matiz sobre la negación de la resurrección para vida.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y «resucitado» para ἀναστήσεσθαι, sin recurrir a «SEÑOR» como máscara.
  - Se conserva el plural «esperanzas» porque el griego usa ἐλπίδας; no se singulariza para evitar aplanar el énfasis.
  - «A manos de hombres» preserva la agencia humana del martirio sin añadir interpretaciones.
  - La traducción adopta un registro formal, claro y apto para lectura pública.
