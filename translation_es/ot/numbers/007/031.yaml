    reason: lexical_alternative
  - marker: c
    text: Es decir, conforme al patrón oficial de peso del santuario.
    reason: cultural_note
  revision_rationale: Se corrige la nota [a] para reflejar una alternativa léxica real en español sin repetir la lectura principal ni introducir una opción no sustentada; se reubica [c] al sintagma completo 'el siclo del santuario' para anclar mejor la nota cultural; y se cambia 'ofrenda vegetal' por 'ofrenda de cereal' para mayor precisión semántica y mejor alineación con מִנְחָה / 'grain offering'.
