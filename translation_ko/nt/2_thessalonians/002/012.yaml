id: 2TH.2.12
reference: 2 Thessalonians 2:12
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἵνα κριθῶσιν ⸀πάντες οἱ μὴ πιστεύσαντες τῇ ἀληθείᾳ ἀλλὰ εὐδοκήσαντες ⸀τῇ ἀδικίᾳ.
base_translation:
  language: en
  yaml_path: translation/nt/2_thessalonians/002/012.yaml
  text: so that all may be judged who did not believe the truth but took pleasure in unrighteousness[a].
translation:
  language: ko
  text: 이는 진리를 믿지 않고 도리어 불의를 기뻐한 모든 자들이 심판받게[a] 하기 위함입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「정죄받게」. 헬라어 κρίνω는 본문 정황상 불리한 심판을 함의하나 더 문자적으로는 「심판받다」를 뜻한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  english_pob_choice: so that
  chosen_korean: ~하기 위함입니다
  alternatives_korean:
  - ~하도록
  - 그래서 ~
  lexicon: BDAG
  rationale: 목적/결과 절을 자연스럽게 「~하기 위함입니다」로 종결한다.
- source_word: κριθῶσιν
  english_pob_choice: may be judged
  chosen_korean: 심판받게
  alternatives_korean:
  - 정죄받게
  - 재판받게
  lexicon: BDAG
  rationale: κρίνω의 기본 의미는 「심판하다」. 본문 정황은 불리한 심판이지만 직역을 보존하여 본문 진술을 넘어선 해석을 도입하지 않는다.
- source_word: πάντες
  english_pob_choice: all
  chosen_korean: 모든 자들이
  alternatives_korean:
  - 모두가
  - 누구나
  lexicon: BDAG
  rationale: 주격 복수의 전체성을 「모든 자들이」로 표현.
- source_word: οἱ μὴ πιστεύσαντες
  english_pob_choice: who did not believe
  chosen_korean: 믿지 않고
  alternatives_korean:
  - 믿지 아니한 자들
  - 신뢰하지 않은
  lexicon: BDAG
  rationale: 분사를 자연스러운 연결 어미로 표현하여 흐름을 매끄럽게 한다.
- source_word: τῇ ἀληθείᾳ
  english_pob_choice: the truth
  chosen_korean: 진리를
  alternatives_korean:
  - 그 진리를
  - 진실을
  lexicon: BDAG
  rationale: 정관사는 복음의 진리를 가리킨다. 한국어 「진리를 믿다」 구조에서 자연스럽다.
- source_word: ἀλλὰ
  english_pob_choice: but
  chosen_korean: 도리어
  alternatives_korean:
  - 오히려
  - 그러나
  lexicon: BDAG
  rationale: 진리 거부와 불의 환영의 강한 대조를 「도리어」로 살린다.
- source_word: εὐδοκήσαντες
  english_pob_choice: took pleasure in
  chosen_korean: 기뻐한
  alternatives_korean:
  - 즐거워한
  - 좋아한
  lexicon: BDAG
  rationale: εὐδοκέω의 의지적·정서적 동의를 「기뻐하다」로 옮긴다. 단순 「승인」보다 정황에 적절하다.
- source_word: τῇ ἀδικίᾳ
  english_pob_choice: unrighteousness
  chosen_korean: 불의를
  alternatives_korean:
  - 악을
  - 부정을
  lexicon: BDAG
  rationale: 도덕·신학적 무게를 「불의」로 보존하며, 「악」은 일반 도덕어로 약하다.
theological_decisions:
- issue: κριθῶσιν의 어조 — 「심판받다」 vs 「정죄받다」
  chosen_reading: 심판받게
  alternative_readings:
  - 정죄받게
  rationale: 본문 정황은 불리한 결과를 함의하지만 헬라어 κρίνω 자체는 더 폭넓다. 본문이 명시한 것 이상의 신학적 결정을 도입하지 않기 위해 「심판받게」를 본문에 둔다. 정황적 정죄의 결과는 문맥에서 충분히 드러난다.
  doctrine_reference: 'Translation philosophy: Preserve theological tension'
