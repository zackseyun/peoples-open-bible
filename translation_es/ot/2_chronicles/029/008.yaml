translation:
  language: es
  text: Entonces la ira de Yahvé vino sobre[a] Judá y Jerusalén, y los convirtió en horror, en desolación y en objeto de silbidos[b], como ustedes ven con sus propios ojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'cayó sobre'; el hebreo expresa la irrupción del juicio divino sobre Judá y Jerusalén.
    reason: alternative_reading
  - marker: b
    text: O 'objeto de escarnio mediante silbidos'; el hebreo alude al silbido burlón o de desprecio de los observadores ante la devastación.
    reason: lexical_alternative
lexical_decisions:
- source_word: קֶצֶף
  english_pob_choice: wrath
  chosen_spanish: ira
  alternatives_spanish:
  - furor
  - indignación
  lexicon: HALOT
  rationale: En español, 'ira' comunica con naturalidad la intensidad del juicio divino. 'Furor' puede sonar más literario o más arcaico, y 'indignación' atenúa la fuerza afectiva que el texto subraya.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el nombre divino. 'Yahvé' mantiene la referencia explícita al nombre propio sin ocultarla tras una sustitución convencional.
- source_word: וַיְהִי ... עַל
  english_pob_choice: came upon
  chosen_spanish: vino sobre
  alternatives_spanish:
  - estuvo sobre
  - cayó sobre
  lexicon: HALOT
  rationale: El giro hebreo expresa la irrupción del juicio sobre Judá y Jerusalén. 'Vino sobre' preserva ese comienzo efectivo del castigo en español natural.
- source_word: וַיִּתְּנֵם
  english_pob_choice: he made them
  chosen_spanish: los hizo
  alternatives_spanish:
  - los entregó a
  - los puso como
  lexicon: HALOT
  rationale: 'El verbo con ל indica resultado: quedaron constituidos en un estado visible. ''Los hizo'' refleja esa relación causal y resulta fluido en español, aunque conserva la idea de que Dios los constituyó en ese estado.'
- source_word: לְזוֹעָה
  english_pob_choice: a horror
  chosen_spanish: un horror
  alternatives_spanish:
  - un objeto de terror
  - algo que hace estremecer
  lexicon: HALOT
  rationale: El sustantivo denota algo que provoca horror o estremecimiento. 'Un horror' sigue de cerca la revisión final inglesa y mantiene la fuerza sustantiva del hebreo.
- source_word: לְשַׁמָּה
  english_pob_choice: desolation
  chosen_spanish: una desolación
  alternatives_spanish:
  - ruina
  - destrucción
  lexicon: HALOT
  rationale: '''Desolación'' es el equivalente más estable para este término de juicio en español bíblico y conserva la idea de devastación visible.'
- source_word: וְלִשְׁרֵקָה
  english_pob_choice: an object of hissing
  chosen_spanish: un objeto de silbidos
  alternatives_spanish:
  - objeto de burla
  - objeto de silbido burlón
  lexicon: HALOT
  rationale: '''Silbidos'' conserva la imagen concreta de la reacción pública de escarnio. Aunque en español ''hissing'' puede sonar extraño, la imagen se entiende en contexto como silbido de desprecio; por eso se mantiene de forma relativamente literal.'
- source_word: כַּאֲשֶׁר אַתֶּם רֹאִים בְּעֵינֵיכֶם
  english_pob_choice: as you see with your own eyes
  chosen_spanish: como ustedes ven con sus propios ojos
  alternatives_spanish:
  - como ustedes mismos ven
  - como ustedes están viendo
  lexicon: HALOT
  rationale: La frase enfatiza evidencia directa y presente. 'Con sus propios ojos' preserva esa apelación enfática y suena natural en español moderno.
theological_decisions:
- issue: Lenguaje fuerte del juicio divino sin suavización
  english_pob_reading: The wrath of Yahweh came upon Judah and Jerusalem, and he made them a horror, a desolation, and an object of hissing
  chosen_spanish_reading: La ira de Yahvé vino sobre Judá y Jerusalén, y los hizo un horror, una desolación y un objeto de silbidos
  alternative_spanish_readings:
  - La ira de Yahvé estuvo contra Judá y Jerusalén, y los entregó a horror, desolación y escarnio
  - La ira de Yahvé cayó sobre Judá y Jerusalén, y los convirtió en una ruina y burla
  rationale: Se preserva la severidad del juicio pactual sin explicarlo ni mitigarlo. La formulación mantiene la progresión de estado resultante y la vergüenza pública reflejada por las tres expresiones sustantivas.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it; Original-language primacy over translation tradition.'
translation_notes:
  revision_awareness: La redacción sigue la revisión final del audit trail inglés, que prefirió mantener la serie nominal 'a horror, a desolation, and an object of hissing' y la imagen concreta del silencio o silbido despectivo. También respeta la decisión de no suavizar el lenguaje de juicio divino, conservando el paralelismo y la progresión semántica del hebreo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' según el estándar del proyecto para el nombre divino.
  - Se usa 'ira' para קֶצֶף, evitando una atenuación semántica.
  - Se conserva la secuencia nominal tripartita ('horror', 'desolación', 'objeto de silbidos') para reflejar la estructura hebrea.
  - '''Silbidos'' se deja como imagen concreta y se aclara en nota su sentido de burla/desprecio.'
  - La forma verbal 'los hizo' refleja el resultado causado por Dios sin introducir una paráfrasis más interpretativa.
