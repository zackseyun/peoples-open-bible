translation:
  language: es
  text: La bendición de Dios es la suerte de los justos[a], y en el tiempo de su esperanza[b] florecerá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''La bendición de Dios es la suerte de los justos, y en el tiempo de su esperanza florecerá''. El paralelo griego dice algo muy diferente: ''Una hora mala trae olvido del lujo, y en el fin de un hombre hay revelación de sus obras''. Esto sugiere una tradición textual divergente para este versículo.'
    reason: textual_variant
  - marker: b
    text: O 'su esperanza florecerá'. El verbo hebreo puede entenderse con 'la bendición' o con 'su esperanza' como su referente.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּרְכַּת
  english_pob_choice: the blessing of
  chosen_spanish: la bendición de
  alternatives_spanish:
  - una bendición de
  - bendición de
  lexicon: HALOT
  rationale: Se conserva el sentido de constructo y la referencia general a una bendición divina. En español, el artículo definido ayuda a expresar la verdad proverbial sin añadir matices ajenos.
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios Altísimo
  - el Poderoso
  lexicon: HALOT
  rationale: אֵל es el título divino común; 'Dios' es la equivalencia directa y más natural en español para este contexto sapiencial.
- source_word: גּוֹרָל
  english_pob_choice: the lot
  chosen_spanish: la porción
  alternatives_spanish:
  - la suerte
  - la herencia
  - el destino
  lexicon: HALOT
  rationale: Aunque 'גורל' puede ser literalmente 'lote/suerte', en este dicho sapiencial 'porción' comunica mejor la idea de lo asignado o adjudicado. Se evita 'destino', que interpretaría demasiado.
- source_word: צַדִּיק
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - el justo
  lexicon: HALOT
  rationale: El plural sustantivado mantiene la categoría moral general. 'Justos' es el equivalente más natural y fiel a la fuerza genérica del hebreo.
- source_word: וּבְעֵת
  english_pob_choice: and in the time of
  chosen_spanish: y en el tiempo de
  alternatives_spanish:
  - y en la hora de
  - y cuando
  lexicon: HALOT
  rationale: Se conserva la frase temporal explícita sin simplificarla a una cláusula más libre.
- source_word: תִּקְוָתוֹ
  english_pob_choice: his hope
  chosen_spanish: su esperanza
  alternatives_spanish:
  - su expectativa
  - lo que espera
  lexicon: HALOT
  rationale: '''Esperanza'' reproduce el sustantivo hebreo de modo claro y bíblico. El posesivo mantiene la referencia al sujeto humano del proverbio.'
- source_word: תִּפְרָח
  english_pob_choice: it will blossom
  chosen_spanish: florecerá
  alternatives_spanish:
  - brotará
  - prosperará
  lexicon: HALOT
  rationale: El verbo de פרח expresa la imagen vegetal de florecer/renacer. 'Florecerá' conserva la metáfora con buena naturalidad en español.
theological_decisions:
- issue: Texto hebreo frente al paralelo griego muy divergente
  english_pob_reading: The Hebrew text is primary, while the Greek parallel reads a substantially different verse.
  chosen_spanish_reading: Se sigue el hebreo como texto principal y se mantiene la lectura proverbial sobre la bendición del justo.
  alternative_spanish_readings:
  - Un dicho sobre la vanidad de la prosperidad y el desvelamiento de las obras humanas, según el griego.
  - Una lectura mixta que intentara armonizar ambos testigos.
  rationale: El testimonio griego de Sirácides 11:27 difiere radicalmente del hebreo. En una edición con trazabilidad, la solución correcta es respetar el texto hebreo transmitido y documentar la divergencia, no fusionar tradiciones distintas en una sola paráfrasis.
  doctrine_reference: Primacía del testimonio textual base; preservar variantes significativas sin resolverlas artificialmente.
- issue: Referente de la metáfora de florecimiento
  english_pob_reading: 'The verb refers to ''the blessing of God'' as the subject: ''it will blossom.'''
  chosen_spanish_reading: '''Florecerá'' se entiende ante todo de ''la bendición de Dios'', sin excluir la vinculación cercana con ''su esperanza''.'
  alternative_spanish_readings:
  - '''Su esperanza florecerá.'''
  - '''La bendición de Dios florecerá.'''
  rationale: El hebreo permite más de un anclaje cercano para el verbo. La traducción española mantiene esa relación sin cerrarla de modo innecesario, conservando la tensión léxica documentada por el audit trail.
  doctrine_reference: Mantener ambigüedad textual cuando el original la permite; no sobreespecificar el referente.
translation_notes:
  revision_awareness: La redacción sigue la revisión que prefirió 'en el tiempo de' frente a 'al tiempo de', y conserva la lectura hebrea como texto principal. Se añadió la marcación de nota en el texto para anclar las observaciones textuales y léxicas.
  spanish_consistency_notes:
  - '''Dios'' se usa para אֵל conforme al estándar del proyecto.'
  - '''Justos'' mantiene el sustantivo colectivo del hebreo.'
  - '''Florecerá'' conserva la metáfora vegetal sin volverla abstracta.'
  - Se evita 'SEÑOR' porque el hebreo aquí dice אֵל, no el Tetragrámaton.
