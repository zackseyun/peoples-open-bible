translation:
  language: es
  text: Quien guarda la ley guarda su vida[a], y quien confía en Yahvé no será avergonzado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo griego en este versículo es sustancialmente distinto: «hasta que recompense al hombre conforme a sus obras, y las obras de los hombres conforme a sus pensamientos». El texto principal sigue el testimonio hebreo conservado.'
    reason: textual_variant
lexical_decisions:
- source_word: נוצר
  english_pob_choice: keeps
  chosen_spanish: guarda
  alternatives_spanish:
  - observa
  - cumple
  lexicon: HALOT
  rationale: נצר expresa la idea de guardar, custodiar o preservar. En español, «guarda» comunica bien la noción de vigilancia fiel sobre la ley sin sonar mecánico.
- source_word: תורה
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la instrucción
  - la enseñanza
  lexicon: HALOT
  rationale: En este contexto sapiencial, תּוֹרָה tiene fuerza normativa y religiosa. «La ley» es la forma más natural y fiel en español para ese uso, manteniendo el matiz de instrucción pactal.
- source_word: שומר נפשו
  english_pob_choice: guards his life
  chosen_spanish: guarda su vida
  alternatives_spanish:
  - preserva su vida
  - guarda su alma
  lexicon: HALOT
  rationale: נפש aquí se entiende mejor como «vida» o «vida propia», no como «alma» en sentido moderno. «Guarda su vida» conserva la imagen hebrea y la relación verbal con el primer hemistiquio.
- source_word: ובוטח ביהוה
  english_pob_choice: and he who trusts in the LORD
  chosen_spanish: y quien confía en Yahvé
  alternatives_spanish:
  - y el que confía en Yahvé
  - y quien pone su confianza en Yahvé
  lexicon: HALOT
  rationale: El verbo בטח se rinde con «confiar», que expresa dependencia y seguridad. Se mantiene «Yahvé» según la terminología española del proyecto, en lugar de una sustitución por «SEÑOR».
- source_word: לא יבוש
  english_pob_choice: will not be put to shame
  chosen_spanish: no será avergonzado
  alternatives_spanish:
  - no quedará avergonzado
  - no será puesto en vergüenza
  lexicon: HALOT
  rationale: בוש puede significar quedar avergonzado, defraudado o confundido. «No será avergonzado» es una solución breve y natural en español que conserva el sentido de fracaso público o deshonra implícito en la confianza.
theological_decisions:
- issue: Rendering of יהוה in Spanish
  english_pob_reading: the LORD
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El proyecto español pide «Yahvé» como forma principal para יהוה. Aquí no hay necesidad de seguir la convención inglesa de máscara reverencial; mantener el nombre propio preserva la referencia directa del hebreo.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Primary-source tension between Hebrew and Greek parallel
  english_pob_reading: Main text follows the extant Hebrew witness; the Greek parallel differs substantially and is preserved in a footnote.
  chosen_spanish_reading: La traducción principal sigue el hebreo conservado, con nota textual sobre el griego paralelo notablemente distinto.
  alternative_spanish_readings:
  - 'Harmonizar el texto con el griego: «hasta que recompense al hombre conforme a sus obras…»'
  - Suprimir la diferencia textual
  rationale: Sirácides presenta aquí una discrepancia importante entre el hebreo existente y el griego paralelo. Para no borrar esa tensión documentada, el texto español sigue el hebreo como base y deja constancia del griego en nota textual.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use parallel Greek as actual input'
translation_notes:
  revision_awareness: 'No se requirieron cambios sustanciales respecto del último pase de revisión: la concordancia general es alta y la decisión principal sigue siendo la prioridad del hebreo conservado, con el paralelo griego documentado en nota textual.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al estándar español del proyecto.
  - Se prefirió «la ley» para תורה por naturalidad y precisión contextuales.
  - Se evitó «alma» para נפש porque el hebreo aquí apunta a la vida de la persona.
  - Se conservó una estructura breve y proverbial acorde con el hebreo sapiencial.
  - La nota textual distingue claramente el hebreo principal del griego paralelo sin armonizarlos.
