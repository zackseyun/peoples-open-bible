translation:
  language: es
  text: 'Sobre los montes de Israel caerás: tú y todos tus escuadrones, y los pueblos que están contigo[b][a]. Te he dado como alimento para toda clase de ave de rapiña y para los animales silvestres del campo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «todas tus alas»; probablemente una metáfora de las divisiones, flancos o destacamentos militares de Gog.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «para aves de rapiña de todo ala»; el hebreo enfatiza la totalidad de las aves carroñeras o rapaces.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּפּוֹל
  english_pob_choice: you will fall
  chosen_spanish: caerás
  alternatives_spanish:
  - caerás abatido
  - perecerás
  lexicon: HALOT
  rationale: El hebreo נפל significa literalmente “caer”. En este contexto de juicio implica derrota y muerte, pero “caerás” conserva la imagen concreta sin explicitar más de lo que el texto dice.
- source_word: אֲגַפֶּיךָ
  english_pob_choice: your troops
  chosen_spanish: tus escuadrones
  alternatives_spanish:
  - tus tropas
  - tus divisiones
  - tus alas
  lexicon: HALOT
  rationale: El término puede aludir literalmente a “alas”, pero en contexto militar funciona como metáfora de alas, flancos o divisiones del ejército. “Escuadrones” comunica ese sentido colectivo y militar en español sin perder del todo la fuerza figurada.
- source_word: עַמִּים אֲשֶׁר אִתָּךְ
  english_pob_choice: the peoples who are with you
  chosen_spanish: los pueblos que están contigo
  alternatives_spanish:
  - las naciones que están contigo
  - los pueblos contigo
  lexicon: HALOT
  rationale: עַמִּים es más amplio que una sola unidad militar y puede referirse a pueblos o naciones. “Los pueblos que están contigo” preserva el plural étnico y la relación de acompañamiento.
- source_word: לְעֵיט צִפּוֹר כָּל כָּנָף
  english_pob_choice: to every kind of bird of prey
  chosen_spanish: para toda clase de ave de rapiña
  alternatives_spanish:
  - para aves de rapiña de todo tipo
  - para todo ave de rapiña
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y expansiva, combinando un término para ave/carroñera con “ave de todo ala”. “Toda clase de ave de rapiña” comunica la totalidad de aves carroñeras o rapaces de manera natural en español.
- source_word: חַיַּת הַשָּׂדֶה
  english_pob_choice: the wild animals of the field
  chosen_spanish: los animales del campo
  alternatives_spanish:
  - las fieras del campo
  - los animales silvestres del campo
  lexicon: HALOT
  rationale: Es una expresión hebrea habitual para animales terrestres salvajes. “Animales del campo” mantiene la imagen bíblica y resulta natural; el matiz de salvaje queda reforzado por el contexto de juicio.
- source_word: נְתַתִּיךָ לְאָכְלָה
  english_pob_choice: I have given you as food
  chosen_spanish: te he dado como alimento
  alternatives_spanish:
  - te he dado para comida
  - te he entregado para ser comido
  lexicon: HALOT
  rationale: La construcción expresa entregar a alguien como algo que será comido. “Como alimento” es idiomático y conserva el imaginería severa del juicio sin suavizarla.
theological_decisions:
- issue: Tiempo verbal perfecto en profecía de juicio
  english_pob_reading: I have given you as food
  chosen_spanish_reading: Te he dado como alimento
  alternative_spanish_readings:
  - Te daré como alimento
  rationale: El hebreo usa un perfecto 1cs (נְתַתִּיךָ). En discurso profético puede expresar una acción futura decretada con certeza. Conservar el perfecto en español mantiene la fuerza de juicio ya establecido por Dios, aun cuando el cumplimiento esté por venir.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se revisó el texto conforme al contexto de Ezequiel 39:4 y al audit trail inglés. No se consideraron cambios de crítica textual; la redacción sigue el hebreo masorético y mantiene la tensión entre el literalismo de las imágenes y la claridad natural en español.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como terminología estándar del proyecto solo cuando el versículo lo requiera explícitamente; aquí no aparece el Tetragrámaton.
  - Se eligió «escuadrones» para preservar el matiz militar de אֲגַפֶּיךָ sin usar «alas» en el texto principal, aunque esa lectura queda documentada en nota.
  - Se usó «te he dado» en perfecto para reflejar el valor profético del hebreo, evitando convertirlo en un simple futuro.
  - «Ave de rapiña» y «animales del campo» conservan el tono de juicio y el paralelismo del hebreo sin introducir especies concretas no mencionadas.
