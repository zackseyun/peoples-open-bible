    text: 'Hebreo: ‘tres cabezas’, un modismo para tres divisiones o compañías.'
    reason: lexical_alternative
  - marker: b
    text: O ‘en la guardia de la mañana’. Esto se refiere al período temprano de vigilancia militar, cerca del amanecer.
    reason: cultural_note
  - marker: c
    text: O ‘hasta que el día se puso caliente’, probablemente hacia el mediodía.
    reason: lexical_alternative
  revision_rationale: 'La revisión realinea el español con la evidencia hebrea y con el audit trail inglés: restaura la nota cultural sobre la guardia de la mañana, conserva la imagen ‘calor del día’, elimina una nota innecesaria sobre ‘dispersados’, y mejora la claridad militar de וַיַּכּוּ con ‘derrotaron a Amón’. También hace el español más natural sin apartarse del sentido fuente.'
