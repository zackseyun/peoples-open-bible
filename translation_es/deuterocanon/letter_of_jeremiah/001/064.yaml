translation:
  language: es
  text: Por tanto, sabiendo que no son dioses[a], no los teman.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que no son dioses»; también puede expresarse idiomáticamente: «que no son dioses en absoluto». El griego dice literalmente: «no son dioses».'
    reason: lexical_alternative
lexical_decisions:
- source_word: γνόντες
  english_pob_choice: knowing
  chosen_spanish: sabiendo
  alternatives_spanish:
  - habiendo sabido
  - al saber
  lexicon: BDAG
  rationale: El participio aoristo de γινώσκω expresa una base circunstancial/causal para el mandato. En español, 'sabiendo' transmite con naturalidad esa relación lógica sin volver la frase pesada.
- source_word: οὖν
  english_pob_choice: therefore
  chosen_spanish: por tanto
  alternatives_spanish:
  - entonces
  - así que
  lexicon: BDAG
  rationale: Marca inferencia. 'Por tanto' conserva el valor conclusivo de forma clara y digna en español bíblico moderno.
- source_word: οὐκ εἰσὶν θεοί
  english_pob_choice: they are not gods
  chosen_spanish: no son dioses
  alternatives_spanish:
  - no son dioses verdaderos
  - no son divinidades
  lexicon: BDAG
  rationale: '''Dioses'' corresponde directamente a θεοί y mantiene la acusación anti-idolátrica sin suavizarla. Se evita ''SEÑOR'' o una paráfrasis explicativa porque el griego niega de manera simple la condición divina de los ídolos.'
- source_word: μὴ φοβῆσθε
  english_pob_choice: do not fear
  chosen_spanish: no los teman
  alternatives_spanish:
  - no teman a ellos
  - no les tengan miedo
  lexicon: BDAG
  rationale: El imperativo prohibitivo se expresa bien con 'no los teman'. Esta forma conserva el objeto directo y suena natural en español reverente.
- source_word: αὐτούς
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  - los ídolos
  lexicon: BDAG
  rationale: El pronombre remite a los ídolos mencionados antes. 'Los' reproduce el referente sin introducir un sustantivo interpretativo en el texto principal.
theological_decisions:
- issue: Cómo verter θεοί en contexto de polémica contra ídolos
  english_pob_reading: gods
  chosen_spanish_reading: dioses
  alternative_spanish_readings:
  - divinidades
  - seres divinos
  - no son nada
  rationale: 'La traducción conserva la fuerza lexical directa de θεοί y mantiene la tensión teológica del texto: los ídolos son llamados ''dioses'' solo en sentido polémico, mientras el versículo los desautoriza como tales.'
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'Coincide con el testimonio griego de Swete LXX 1909 y con el audit trail inglés: οὖν se traduce como conclusión; γνόντες funciona causal/circunstancialmente; θεοί se mantiene como ''dioses'' para no borrar la polémica anti-idolátrica. No se registran revisiones textuales divergentes en el paquete proporcionado.'
  spanish_consistency_notes:
  - Se usa 'dioses' en minúscula por tratarse de falsos dioses/ídolos, no del nombre divino.
  - Se prefirió 'no los teman' para conservar el mandato directo y evitar una perífrasis más larga.
  - La nota al pie preserva la alternativa literal sin desplazar el texto principal.
