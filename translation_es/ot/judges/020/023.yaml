translation:
  language: es
  text: 'Entonces los hijos de Israel subieron y lloraron delante de Yahvé hasta la tarde; y consultaron a Yahvé, diciendo: «¿Seguiremos acercándonos[a] para la batalla contra los hijos de Benjamín, mi hermano?». Y Yahvé dijo: «Suban contra él».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo puede entenderse como «¿Seguiremos acercándonos para la batalla…?» o «¿Volveremos a acercarnos para la batalla…?». El verbo puede sugerir continuar o repetir la acción, y la preposición עִם funciona aquí en sentido adversativo.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Mantiene el paralelismo familiar/corporativo del hebreo sin neutralizarlo. En español, «hijos de Israel» conserva el eco idiomático y es natural en registro bíblico.
- source_word: וַיַּעֲלוּ
  english_pob_choice: went up
  chosen_spanish: subieron
  alternatives_spanish:
  - ascendieron
  - fueron
  lexicon: HALOT
  rationale: עלה en narrativa expresa movimiento ascendente o desplazamiento hacia un lugar más alto o relevante; «subieron» es directo y fiel.
- source_word: וַיִּבְכּוּ
  english_pob_choice: wept
  chosen_spanish: lloraron
  alternatives_spanish:
  - se lamentaron
  - crujeron en llanto
  lexicon: HALOT
  rationale: «Lloraron» comunica la acción visible y el tono de duelo ante Dios sin añadir matices no presentes en el hebreo.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: 'HALOT; DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se conserva el nombre divino «Yahvé» según el criterio del proyecto, y לִפְנֵי se vierte con la preposición natural «delante de».
- source_word: עַד הָעֶרֶב
  english_pob_choice: until evening
  chosen_spanish: hasta la tarde
  alternatives_spanish:
  - hasta el anochecer
  - hasta la noche
  lexicon: HALOT
  rationale: «Hasta la tarde» reproduce el límite temporal de manera clara y sobria, sin sobreespecificar el momento.
- source_word: וַיִּשְׁאֲלוּ בַיהוָה
  english_pob_choice: they inquired of Yahweh
  chosen_spanish: inquirieron de Yahvé
  alternatives_spanish:
  - consultaron a Yahvé
  - preguntaron a Yahvé
  lexicon: HALOT
  rationale: «Inquirieron de» preserva el sentido oracular/religioso del verbo mejor que una pregunta genérica.
- source_word: הַאוֹסִיף לָגֶשֶׁת
  english_pob_choice: Shall we continue to draw near
  chosen_spanish: ¿Seguiremos acercándonos
  alternatives_spanish:
  - ¿Volveremos a acercarnos
  - ¿Continuaremos acercándonos
  lexicon: HALOT
  rationale: El hebreo puede implicar continuar o repetir la acción; «seguiremos acercándonos» comunica bien esa posibilidad sin forzar la decisión a un solo matiz.
- source_word: לַמִּלְחָמָה
  english_pob_choice: for battle
  chosen_spanish: para la batalla
  alternatives_spanish:
  - para pelear
  - para la guerra
  lexicon: HALOT
  rationale: «Para la batalla» mantiene el sustantivo militar concreto y el valor final de la construcción.
- source_word: עִם בְּנֵי בִנְיָמִן
  english_pob_choice: against the sons of Benjamin
  chosen_spanish: contra los hijos de Benjamín
  alternatives_spanish:
  - con los hijos de Benjamín
  - frente a los hijos de Benjamín
  lexicon: HALOT
  rationale: Aunque עִם es literalmente «con», en este contexto bélico la relación es adversativa; «contra» expresa el sentido contextual que la POB inglesa también destacó.
- source_word: אָחִי
  english_pob_choice: my brother
  chosen_spanish: mi hermano
  alternatives_spanish:
  - mi pariente
  - mi hermano de sangre
  lexicon: HALOT
  rationale: Conserva la apelación fraternal directa, importante teológicamente para el reconocimiento de Benjamín como parte de Israel.
- source_word: עֲלוּ אֵלָיו
  english_pob_choice: Go up against him
  chosen_spanish: Suban contra él
  alternatives_spanish:
  - Suban hacia él
  - Ataquen a él
  lexicon: HALOT
  rationale: La orden divina retiene el verbo de ascenso y el valor hostil contextual. «Contra él» deja clara la dirección adversativa sin perder la imagen verbal.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El proyecto pide transliterar el Tetragrama como «Yahvé» en el texto principal. Se conserva así la identidad del nombre pactal sin mascarlo con un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Lectura de עִם בְּנֵי בִנְיָמִן en contexto de guerra
  english_pob_reading: against the sons of Benjamin
  chosen_spanish_reading: contra los hijos de Benjamín
  alternative_spanish_readings:
  - con los hijos de Benjamín
  - ante los hijos de Benjamín
  rationale: Aunque la preposición hebrea es formalmente «con», el contexto narrativo de combate exige explicitar la oposición. Mantener «contra» evita una ambigüedad engañosa y preserva la tensión militar del pasaje.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: 'Pluralidad de la consulta: הַאוֹסִיף'
  english_pob_reading: Shall we continue
  chosen_spanish_reading: ¿Seguiremos acercándonos?
  alternative_spanish_readings:
  - ¿Seguiré acercándome?
  - ¿Volveremos a acercarnos?
  rationale: La forma verbal y el sujeto en el contexto son plurales; por eso se evita una lectura singular. Esto sigue la corrección revisada del audit trail inglés.
  doctrine_reference: applied_revision / latest_revision_pass
translation_notes:
  revision_awareness: 'La versión inglesa auditada corrigió el sujeto de singular a plural («we») y refinó la expresión militar de «go near for battle with» a «draw near for battle against». La redacción española sigue esa revisión: usa plural en la consulta, expresa continuidad con «seguiremos acercándonos» y hace explícita la oposición bélica con «contra».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma uniforme para יְהוָה.
  - «Hijos de Israel» y «hijos de Benjamín» conservan el tono genealógico/corporativo del hebreo.
  - La construcción de consulta usa plural coherente con וַיִּשְׁאֲלוּ y הַאוֹסִיף.
  - La nota [a] está anclada en el texto en «tarde[a]» y no se dejan notas sin anclaje.
