review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: imperativo de evitar la μάχη seguido por un futuro de resultado, y mantiene ἁμαρτίας en plural. Sin embargo, «disminuirás los pecados» suena menos natural en español porque puede insinuar que uno reduce los pecados en general, no primariamente los propios actos pecaminosos como resultado de evitar la contienda. La idea resultativa se expresa mejor con «pecarás menos», que comunica con claridad el efecto práctico del dicho sapiencial.'
  spanish_quality_summary: «Apártate de la contienda» es digno, claro y fiel. El punto débil es «disminuirás los pecados», que es gramatical pero poco idiomático en español bíblico moderno. La revisión mejora la legibilidad sin apartarse del sentido. No se requieren notas al pie.
  glossary_alignment: No hay términos del glosario mayor en juego. «Contienda» representa bien μάχης en contexto sapiencial, y la revisión de ἐλαττώσεις + ἁμαρτίας a «pecarás menos» conserva la relación causal documentada en la auditoría inglesa, aunque no reproduzca de forma mecánica el sustantivo «pecados». Esto es una excepción estilística justificada por la naturalidad del español y por la explicación teológica ya documentada.
  issues:
  - severity: medium
    issue: «disminuirás los pecados» es poco natural en español
    rationale: Aunque formalmente posible, en español suena torpe y semánticamente impreciso para un proverbio sapiencial. «Pecarás menos» expresa de manera más idiomática que evitar la contienda resulta en menos actos de pecado.
  revised_spanish_text: Apártate de la contienda, y pecarás menos;
  revision_rationale: 'Se conserva el imperativo exhortativo y el sentido de disputa interpersonal de μάχης con «Apártate de la contienda». Se revisa la cláusula resultativa para expresar en español natural el efecto de ἐλαττώσεις ἁμαρτίας: evitar la contienda lleva a cometer menos pecados. «Pecarás menos» transmite fielmente la enseñanza sapiencial sin la rigidez poco idiomática de «disminuirás los pecados».'
