translation:
  language: es
  text: Pero el pueblo no volvió[a] a quien los hirió, ni buscaron a Yahvé de los Ejércitos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «al que los golpeó».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָעָם
  english_pob_choice: But the people
  chosen_spanish: Pero el pueblo
  alternatives_spanish:
  - Y el pueblo
  - Y sin embargo el pueblo
  lexicon: HALOT
  rationale: El וְ inicial tiene aquí fuerza adversativa en el contexto de juicio; por eso 'Pero' comunica mejor el contraste que una simple coordinación. 'El pueblo' refleja הָעָם de manera natural en español.
- source_word: לֹא שָׁב
  english_pob_choice: did not return
  chosen_spanish: no volvió
  alternatives_spanish:
  - no se volvió
  - no regresó
  - no se arrepintió
  lexicon: HALOT
  rationale: שׁוּב conserva el sentido básico de 'volver/retornar'. 'No volvió' mantiene esa ambigüedad útil sin convertirlo explícitamente en arrepentimiento interior, aunque el contexto lo implica.
- source_word: עַד הַמַּכֵּהוּ
  english_pob_choice: to him who struck them
  chosen_spanish: al que los hirió
  alternatives_spanish:
  - al que los golpeó
  - a quien los hirió
  - a su heridor
  lexicon: HALOT
  rationale: El hebreo presenta a Dios como el agente personal del golpe/jucio. En español, 'hirió' conserva el valor de castigo con tono bíblico y naturalidad; 'al que' mantiene la referencia personal, y el plural 'los' refleja el sustantivo colectivo 'el pueblo'.
- source_word: וְאֶת
  english_pob_choice: nor
  chosen_spanish: ni
  alternatives_spanish:
  - y no
  - y tampoco
  lexicon: HALOT
  rationale: Con el verbo negado siguiente, 'ni' coordina con naturalidad la segunda negación en español, reproduciendo la relación negativa del hebreo.
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: Yahweh of Armies
  chosen_spanish: Yahvé de los Ejércitos
  alternatives_spanish:
  - Yahvé de los Armados
  - Yahvé de los Ejércitos celestiales
  - el Señor de los Ejércitos
  lexicon: HALOT
  rationale: Se conserva el nombre divino como 'Yahvé' según el criterio del proyecto. צְבָאוֹת se vierte literalmente como 'de los Ejércitos', que es comprensible y mantiene la imagen militar/cósmica sin recurrir a la forma tradicional 'Señor'.
- source_word: לֹא דָרָשׁוּ
  english_pob_choice: did they seek
  chosen_spanish: no buscó
  alternatives_spanish:
  - no buscaron
  - no consultaron
  - no acudieron
  lexicon: HALOT
  rationale: דָרַשׁ en este contexto significa buscar a Dios con orientación relacional y cultual. 'Buscó' reproduce bien la idea de dirigirse a Yahvé; el singular concuerda con el colectivo 'pueblo' entendido como unidad.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El proyecto español usa 'Yahvé' para reflejar el Tetragrama sin ocultarlo con una sustitución tradicional. Esto preserva la transparencia textual y la identidad del nombre del pacto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
- issue: צְבָאוֹת en el título divino
  english_pob_reading: of Armies
  chosen_spanish_reading: de los Ejércitos
  alternative_spanish_readings:
  - de los Ejércitos celestiales
  - de los Hosts
  rationale: '''Ejércitos'' es la equivalencia transparente y auditable del hebreo צְבָאוֹת. ''Hosts'' no es idiomático en español moderno, y ''Ejércitos celestiales'' añade más de lo que el texto dice.'
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6
- issue: Valor de שׁוּב en contexto de culpa y juicio
  english_pob_reading: did not return
  chosen_spanish_reading: no volvió
  alternative_spanish_readings:
  - no se arrepintió
  - no se convirtió
  rationale: Aunque el contexto sugiere falta de arrepentimiento, el verbo hebreo es literalmente 'volver'. 'No volvió' mantiene la tensión entre retorno físico/relacional y arrepentimiento sin resolverla demasiado pronto.
  doctrine_reference: Lexical decision on שׁוּב in prophetic judgment contexts
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que ajustó 'the one who struck them' a 'him who struck them'. En español se mantuvo una referencia personal directa ('al que los hirió') sin rebajarla a una abstracción, conservando la relación causal y judicial del hebreo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' en lugar de una sustitución reverencial, conforme al estándar del proyecto.
  - '''Ejércitos'' conserva el contenido de צְבָאוֹת con transparencia léxica.'
  - La segunda cláusula usa 'ni' para reflejar adecuadamente la coordinación negativa.
  - '''Pueblo'' funciona como colectivo singular, por eso el verbo se integra en singular en la segunda cláusula.'
