translation:
  language: es
  text: Está quemado con fuego; está cortado[b]; por la reprensión de tu rostro[a] perecen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «por la reprensión de tu presencia perecen». Hebreo literalmente: «de la reprensión de tu rostro».'
    reason: lexical_alternative
  - marker: b
    text: El hebreo pasa de descripciones en femenino singular («quemada», «cortada») a un verbo en masculino plural («perecen»), una construcción poética comprimida que puede abarcar tanto la devastación de la vid como la suerte de quienes la destruyen.
    reason: alternative_reading
lexical_decisions:
- source_word: שְׂרֻפָה
  english_pob_choice: Burned
  chosen_spanish: está quemado
  alternatives_spanish:
  - está ardido
  - está quemado por el fuego
  lexicon: HALOT
  rationale: El hebreo es un participio pasivo con fuerza descriptiva. En español, «está quemado» conserva el valor resultativo y suena natural; «ardido» es posible pero menos transparente. Se mantiene la pasividad sin convertirlo en una narración más libre.
- source_word: בָאֵשׁ
  english_pob_choice: with fire
  chosen_spanish: por el fuego
  alternatives_spanish:
  - con fuego
  - en fuego
  - por medio del fuego
  lexicon: HALOT
  rationale: La preposición ב admite varios matices. Aquí la idea es el medio o instrumento de destrucción; «por el fuego» comunica bien esa causalidad en español y evita la extrañeza de «con fuego».
- source_word: כְּסוּחָה
  english_pob_choice: cut down
  chosen_spanish: está cortado
  alternatives_spanish:
  - está derribado
  - está talado
  - está segado
  lexicon: HALOT
  rationale: El verbo כסח se usa para cortar vegetación. «Está cortado» conserva la imagen vegetal y la brevedad poética; «talado» sería más específico, pero más estrecho y menos inclusivo de la imagen general.
- source_word: מִגַּעֲרַת
  english_pob_choice: at the rebuke
  chosen_spanish: ante la reprensión
  alternatives_spanish:
  - por la reprensión
  - a causa de la reprensión
  - ante el reproche
  lexicon: HALOT
  rationale: El מן marca origen o causa. «Ante la reprensión» refleja el efecto devastador provocado por la reprensión divina sin forzar una explicación causal demasiado pesada; además mantiene una cadencia poética cercana al hebreo.
- source_word: פָּנֶיךָ
  english_pob_choice: of your face
  chosen_spanish: de tu rostro
  alternatives_spanish:
  - de tu presencia
  - de tu faz
  - ante ti
  lexicon: HALOT
  rationale: El hebreo dice literalmente «tu rostro». Se prefirió «rostro» sobre «presencia» para mantener la transparencia al original y no neutralizar la metáfora antropomórfica documentada por el audit trail.
- source_word: יֹאבֵדוּ
  english_pob_choice: they perish
  chosen_spanish: perecen
  alternatives_spanish:
  - desaparecen
  - se pierden
  - mueren
  lexicon: HALOT
  rationale: El imperfecto de אבד en poesía puede expresar resultado inmediato o presente vívido. «Perecen» reproduce la concisión y la solemnidad del hebreo sin fijar más tiempo verbal del que el texto exige.
theological_decisions:
- issue: Desplazamiento de número y sujeto implícito en el poema
  english_pob_reading: The verse continues the vine imagery from the surrounding context and describes the vine/enemies in poetic compression without making the referent explicit in English.
  chosen_spanish_reading: 'El verso conserva la compresión poética: primero imágenes en singular femenino («está quemado», «está cortado») y luego un verbo plural («perecen»), sin explicitar un sujeto que el hebreo deja implícito.'
  alternative_spanish_readings:
  - La vid está quemada y cortada; ante la reprensión de tu rostro, los que la destruyen perecen.
  - Está quemada con fuego; está cortada; ante la reprensión de tu rostro, ellos perecen.
  rationale: La tensión formal del hebreo no debe resolverse añadiendo un sujeto explícito que no está en el texto. La traducción conserva la secuencia comprimida y deja abierta la referencia, como hace el audit trail inglés.
  doctrine_reference: Preservar la tensión textual y no armonizar indebidamente el poema.
- issue: Rostro/presencia divina en la reprensión
  english_pob_reading: Hebrew literally, 'from the rebuke of your face.'
  chosen_spanish_reading: Se traduce literalmente «tu rostro» en vez de suavizarlo a «tu presencia», aunque ambas lecturas son posibles.
  alternative_spanish_readings:
  - tu presencia
  - tu faz
  rationale: En español «presencia» explicaría el sentido, pero perdería la señal concreta del hebreo. «Rostro» mantiene la antropomorfía y la auditable relación con פניו/פָּנֶיךָ, sin negar el sentido de presencia implícito.
  doctrine_reference: Mantener la transparencia al antropomorfismo bíblico sin confundirlo con corporalidad humana.
translation_notes:
  revision_awareness: Se tomó como base el hebreo masorético (WLC) y se comparó con el hilo auditado en inglés. El ajuste principal respecto del inglés fue evitar el calco excesivo de «with fire» y «rebuke of your face» cuando el español pide una relación más natural sin perder la literalidad auditable. También se conservó la tensión de número/sujeto implícito indicada en la revisión inglesa reciente.
  spanish_consistency_notes:
  - Se usó «rostro» para פָּנֶיךָ, en coherencia con el principio de transparencia al original.
  - Se optó por «perecen» para mantener el valor poético del imperfecto hebreo sin añadir tiempo futuro innecesario.
  - La forma verbal «está quemado / está cortado» preserva el carácter descriptivo de los participios hebreos.
  - No se introdujo «Cristo», «SEÑOR» ni terminología eclesiástica ajena al hebreo de este verso.
