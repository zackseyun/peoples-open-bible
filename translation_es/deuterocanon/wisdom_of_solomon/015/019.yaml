translation:
  language: es
  text: ni es tan hermoso, ante la vista de los seres vivientes, como para ser deseado[a]; pero ha quedado sin la alabanza de Dios y su bendición[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ni siquiera alcanza tanto como para ser deseado». La frase griega con «vista/apariencia» admite más de una construcción.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «ha escapado la alabanza de Dios y su bendición»; es decir, las ha perdido o no las ha recibido.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδʼ ὅσον
  english_pob_choice: nor does it attain as much
  chosen_spanish: ni siquiera alcanza tanto como
  alternatives_spanish:
  - ni hasta tanto
  - ni alcanza siquiera tanto
  lexicon: LSJ
  rationale: La negación comparativa pide una formulación española que exprese insuficiencia de grado; «ni siquiera alcanza tanto como» comunica que no llega al nivel requerido para ser deseado.
- source_word: ἐπιποθῆσαι
  english_pob_choice: to be desired
  chosen_spanish: ser deseado
  alternatives_spanish:
  - ser anhelado
  - que se lo desee
  lexicon: LSJ
  rationale: En este contexto el infinitivo expresa aquello que merece atraer deseo; la pasiva española evita un giro forzado y conserva la fuerza evaluativa del griego.
- source_word: ὡς ἐν ζῴων ὄψει
  english_pob_choice: in the sight of living creatures
  chosen_spanish: ante la vista de los seres vivientes
  alternatives_spanish:
  - a los ojos de los seres vivientes
  - en la apariencia de los animales
  lexicon: LSJ
  rationale: «ὄψις» permite la idea de apariencia/vista. «Ante la vista de los seres vivientes» mantiene la relación visual sin volverlo demasiado técnico; «seres vivientes» deja abierta la referencia amplia de ζῴων.
- source_word: καλὰ τυγχάνει
  english_pob_choice: attain ... beauty
  chosen_spanish: es hermoso
  alternatives_spanish:
  - tiene belleza
  - resulta hermoso
  lexicon: LSJ
  rationale: El griego evalúa la apariencia; en español, «es hermoso» transmite con naturalidad la cualidad apreciativa sin introducir una noción ajena de 'alcanzar belleza'.
- source_word: ἐκπέφευγεν
  english_pob_choice: has escaped
  chosen_spanish: ha escapado a
  alternatives_spanish:
  - ha quedado fuera de
  - ha quedado sin
  lexicon: LSJ
  rationale: 'Se conserva el valor de perfectivo resultativo, pero en español se completa con régimen verbal para indicar privación: no ha recibido ni quedado dentro de la alabanza y bendición divinas.'
- source_word: τὸν τοῦ θεοῦ ἔπαινον
  english_pob_choice: the praise of God
  chosen_spanish: la alabanza de Dios
  alternatives_spanish:
  - el elogio de Dios
  - la aprobación de Dios
  lexicon: LSJ
  rationale: «ἔπαινος» se vierte mejor como «alabanza» en español bíblico contemporáneo. La genitivo puede leerse como procedencia o posesión; aquí se mantiene la forma directa sin forzar una interpretación más específica.
- source_word: τὴν εὐλογίαν αὐτοῦ
  english_pob_choice: his blessing
  chosen_spanish: su bendición
  alternatives_spanish:
  - la bendición de él
  - su benevolencia
  lexicon: LSJ
  rationale: «εὐλογία» corresponde de modo natural a «bendición». El posesivo remite a Dios por el contexto inmediato, preservando la continuidad con la frase anterior.
theological_decisions:
- issue: Referencia del sujeto implícito
  english_pob_reading: The verse continues the critique of crafted animal images/idols and speaks of their lack of beauty and divine commendation.
  chosen_spanish_reading: La traducción mantiene el referente implícito de la imagen/idolillo u objeto fabricado criticado en el contexto, sin explicitarlo en exceso dentro del verso.
  alternative_spanish_readings:
  - hablar del animal representado
  - nombrar directamente al ídolo
  rationale: El contexto cercano controla el referente, pero el verso por sí solo no lo nombra. La versión española conserva esa ambigüedad controlada para no introducir una precisión que el texto aquí no formula.
  doctrine_reference: Preservar la ambigüedad textual controlada por el contexto
- issue: Fuerza de 'ha escapado' respecto de la alabanza y bendición divinas
  english_pob_reading: 'Negative privation: the object has missed or failed to receive God’s praise and blessing.'
  chosen_spanish_reading: '«Ha escapado a» se entiende como privación: no ha recibido la alabanza ni la bendición de Dios.'
  alternative_spanish_readings:
  - ha evitado la alabanza de Dios
  - se ha librado de la bendición de Dios
  rationale: En español, «escapar a» puede sugerir quedar fuera de algo. Se conserva la imagen verbal del original, pero la formulación de la frase hace claro que no se trata de una evasión voluntaria sino de una falta o privación.
  doctrine_reference: Lectura privativa del verbo en contexto
translation_notes:
  revision_awareness: Se revisó la cláusula inicial para evitar un calco rígido y reflejar la comparación negativa del griego con una construcción española natural. También se mantuvo la lectura privativa de «ha escapado» para no sugerir una evasión intencional.
  spanish_consistency_notes:
  - Se usa «Dios» para θεός, conforme al estándar del proyecto.
  - Se optó por «bendición» para εὐλογία y «alabanza» para ἔπαινος, manteniendo el paralelismo del original.
  - El verso conserva una ambigüedad referencial controlada, ya que el sujeto implícito depende del contexto inmediato más amplio.
