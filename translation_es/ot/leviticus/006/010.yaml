translation:
  language: es
  text: No se horneará con levadura[a]. Yo la he dado como su porción de mis ofrendas de alimento. Es santísimo, como la ofrenda por el pecado y la ofrenda por la culpa[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “de mis ofrendas hechas por fuego”.
    reason: lexical_alternative
  - marker: b
    text: O “la ofrenda de reparación” o, tradicionalmente, “la ofrenda por la transgresión”.
    reason: lexical_alternative
lexical_decisions:
- source_word: תֵאָפֶה
  english_pob_choice: shall not be baked
  chosen_spanish: No se horneará
  alternatives_spanish:
  - No debe hornearse
  - No será cocido al horno
  lexicon: HALOT
  rationale: El nifal expresa pasivo/resultativo; en español, el futuro pasivo refleja bien la prohibición normativa del texto legal sin volverlo demasiado rígido.
- source_word: חָמֵץ
  english_pob_choice: with leaven
  chosen_spanish: con levadura
  alternatives_spanish:
  - como pan leudado
  - leudado
  lexicon: HALOT
  rationale: El sustantivo se refiere a levadura o masa fermentada; 'con levadura' es natural en español y mantiene la ambigüedad del ámbito de aplicación sin sobreespecificar pan.
- source_word: חֶלְקָם
  english_pob_choice: their portion
  chosen_spanish: su porción
  alternatives_spanish:
  - su parte
  - su ración
  lexicon: HALOT
  rationale: '''Porción'' conserva el sentido de asignación cultual y la idea de reparto sacerdotal; el posesivo en singular refleja el colectivo implícito del hebreo.'
- source_word: נָתַתִּי אֹתָהּ
  english_pob_choice: I have given it
  chosen_spanish: Yo lo he dado
  alternatives_spanish:
  - Yo se lo he asignado
  - Yo lo asigné
  lexicon: HALOT
  rationale: El perfecto hebreo indica una entrega ya establecida con vigencia actual; 'he dado' mantiene ese valor y respeta el tono jurídico-divino.
- source_word: מֵאִשַּׁי
  english_pob_choice: from my food offerings
  chosen_spanish: de mis ofrendas encendidas
  alternatives_spanish:
  - de mis ofrendas hechas por fuego
  - de mis ofrendas de fuego
  lexicon: HALOT
  rationale: Se conserva el matiz técnico del término sacrificial con una expresión transparente en español. 'Encendidas' comunica el aspecto de fuego sin depender de una fórmula arcaica; se mantiene la referencia posesiva a Yahvé.
- source_word: קֹדֶשׁ קָדָשִׁים
  english_pob_choice: most holy
  chosen_spanish: santísimo
  alternatives_spanish:
  - santo de santos
  - de santidad suma
  lexicon: HALOT
  rationale: La construcción superlativa hebrea se vuelve de modo natural a un superlativo absoluto en español. 'Santísimo' es idiomático y comunica la máxima consagración del sacrificio.
- source_word: כַּחַטָּאת
  english_pob_choice: like the sin offering
  chosen_spanish: como la ofrenda por el pecado
  alternatives_spanish:
  - como la expiación por el pecado
  - como el sacrificio por el pecado
  lexicon: HALOT
  rationale: Se preserva la comparación ('como') y se traduce el término sacrificial con una expresión clara y ampliamente entendible en español, sin reducirlo a una idea meramente moral.
- source_word: וְכָאָשָׁם
  english_pob_choice: and the guilt offering
  chosen_spanish: y como la ofrenda por la culpa
  alternatives_spanish:
  - y como la ofrenda de reparación
  - y como la ofrenda por el agravio
  lexicon: HALOT
  rationale: אָשָׁם puede referirse al sacrificio de culpa o de reparación; 'ofrenda por la culpa' conserva la lectura POB y evita imponer una sola explicación doctrinal. Se mantiene la coordinación comparativa implícita en el hebreo.
theological_decisions:
- issue: Renderización de אִשֶּׁה en lenguaje sacrificial
  english_pob_reading: food offerings
  chosen_spanish_reading: ofrendas encendidas
  alternative_spanish_readings:
  - ofrendas hechas por fuego
  - ofrendas de fuego
  rationale: '''Ofrendas encendidas'' preserva el carácter técnico del término y hace visible el fuego como rasgo sacrificial, sin sonar tan arcaico como una fórmula tradicional fija.'
  doctrine_reference: Translation philosophy §6 (readable modern Spanish) y §1 (primacía del original frente a la tradición de traducción)
- issue: Tratamiento de אָשָׁם
  english_pob_reading: guilt offering
  chosen_spanish_reading: ofrenda por la culpa
  alternative_spanish_readings:
  - ofrenda de reparación
  - ofrenda por el agravio
  rationale: La frase mantiene la ambigüedad histórica del término y evita cerrar el sentido a una sola teoría. 'Por la culpa' es transparente y compatible con el uso sacrificial del pasaje.
  doctrine_reference: Translation philosophy §6 (legibilidad moderna) y el principio de no borrar tensiones léxicas documentadas
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y el rastro auditado en inglés: conserva la pasiva legal, la comparación repetida con las otras ofrendas y la ambigüedad controlada de los términos sacrificiales. No se detectaron revisiones aplicadas en el paquete fuente; por eso no se incorporan cambios de última hora ni notas de variante textual.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el sujeto implícito en la frase 'mis ofrendas', en coherencia con el estándar del proyecto aunque aquí no aparezca el nombre divino explícito.
  - Se mantiene 'ofrenda' para los términos sacrificiales para conservar claridad en español y consistencia interna con el registro cultual.
  - Se evita 'SEÑOR' como sustituto del nombre divino, porque en este versículo la referencia está mediada por el posesivo 'mis'.
