revisions:
- from: Mira[a], cuando estaba íntegro, no se hacía para ningún trabajo. ¡Cuánto menos[b], cuando el fuego lo ha consumido y está quemado[c], puede aún hacerse para ningún trabajo?
  to: Mira[a], cuando estaba íntegro, no se hacía para ningún trabajo. Cuánto menos[b], cuando el fuego lo ha consumido y está chamuscado[c], ¿puede todavía hacerse para trabajo alguno?
  rationale: Se ajustó la cláusula final a un español natural sin perder la pregunta retórica ni el sentido de inutilidad para trabajo alguno; se cambió «quemado» por «chamuscado» para reflejar mejor el matiz de וַיֵּחָר documentado en el expediente; y se suavizó la puntuación para una lectura más fluida en español.
