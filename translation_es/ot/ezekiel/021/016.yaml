    text: Or 'burnished' for 'polished' (Hebrew מרט), emphasizing the gleaming preparation of the blade.
    reason: lexical_alternative
  - marker: b
    text: Literally 'in the palm.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the slayer.'
    reason: lexical_alternative
