review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite correctamente la superscripción לִשְׁלֹמֹה y la oración principal: Dios debe dar su justicia al rey y su justicia/rectitud al hijo del rey. Sin embargo, el vocativo español «Oh Dios» no es la forma más natural ni digna en español bíblico actual; «Oh» además suele escribirse sin hache en interjección, pero aquí conviene evitarlo del todo. También conviene ajustar la decisión sobre צִדְקָתְךָ para alinearla mejor con la nota inglesa documentada.'
  spanish_quality_summary: El texto es claro y legible, pero «Oh Dios» suena algo forzado en español eclesial contemporáneo. «Rectitud» es comprensible, aunque en este contexto regio-jurídico «justicia» refleja mejor צִדְקָה y además coincide con la alternativa documentada por el POB inglés. La repetición de «justicia» en español es aceptable y más fiel al paralelismo hebreo.
  glossary_alignment: 'No hay conflicto con términos troncales del proyecto. La principal cuestión léxica es צִדְקָתְךָ: el borrador usa «rectitud» para diferenciar, pero la documentación inglesa favorece «righteousness» con nota de alternativa «justice». En español, «tu justicia» preserva mejor el campo semántico pactal/jurídico del par מִשְׁפָּט / צְדָקָה, y la nota puede conservar «rectitud» como alternativa si se desea distinguir.'
  issues:
  - severity: medium
    issue: Vocativo «Oh Dios» poco natural en español objetivo
    rationale: Aunque el hebreo tiene vocativo directo, en español neutral y digno «Dios, da...» suena más natural que «Oh Dios, da...». Evita además una interjección innecesaria no exigida por la fuente.
  - severity: medium
    issue: «Rectitud» para צִדְקָתְךָ debilita el matiz jurídico-regio
    rationale: En Salmo 72:1, el paralelismo regio favorece «justicia» también para צִדְקָה. La documentación inglesa incluso nota que «your righteousness» puede renderizarse «your justice». En español, la repetición es preferible a introducir un matiz más moral-individual con «rectitud».
  - severity: low
    issue: La nota [b] debería corresponder a la nueva decisión léxica
    rationale: Si el texto principal se corrige a «tu justicia», la nota debe ofrecer la alternativa «rectitud» o equivalente, no repetir el contenido actual en sentido inverso.
  revised_spanish_text: De Salomón.[a] Dios, da tu justicia al rey, y tu justicia[b] al hijo del rey.
  revised_footnotes:
