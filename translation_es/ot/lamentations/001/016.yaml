  text: עַל אֵ֣לֶּה אֲנִ֣י בוֹכִיָּ֗ה עֵינִ֤/י עֵינִ/י֙ יֹ֣רְדָה מַּ֔יִם כִּֽי רָחַ֥ק מִמֶּ֛/נִּי מְנַחֵ֖ם מֵשִׁ֣יב נַפְשִׁ֑/י הָי֤וּ בָנַ/י֙ שֽׁוֹמֵמִ֔ים כִּ֥י גָבַ֖ר אוֹיֵֽב־׀׀־׃ס
base_translation:
  language: en
  yaml_path: translation/ot/lamentations/001/016.yaml
  text: For these things I am weeping; my eye[a], my eye runs down with water, because the comforter who restores my soul is far from me. My children have become desolate, because the enemy has prevailed.
  footnotes:
  - marker: a
    text: Or 'who restores my soul.' Hebrew nephesh can mean 'life,' 'self,' or 'soul' depending on context.
    reason: lexical_alternative
