translation:
  language: es
  text: Yo también andaré en oposición a ellos[a], y los llevaré a la tierra de sus enemigos;[b] o entonces[c] su corazón incircunciso[d] será humillado, y entonces aceptarán el castigo por su iniquidad.[e]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «incluso yo». El hebreo añade énfasis a la acción recíproca de Dios.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «andar con ellos en hostilidad» o «andar en oposición a ellos»; esto repite el lenguaje de maldición del pacto de este capítulo.
    reason: lexical_alternative
  - marker: c
    text: Hebreo «o entonces»; la frase es difícil y puede introducir el momento en que su corazón es humillado.
    reason: alternative_reading
  - marker: d
    text: Literalmente, «su corazón incircunciso», una metáfora pactal de terquedad interior e impureza.
    reason: cultural_note
  - marker: e
    text: O «harán reparaciones por su iniquidad» o «su iniquidad será pagada». El hebreo expresa aceptar o cargar la consecuencia debida de la culpa.
    reason: alternative_reading
lexical_decisions:
- source_word: אַף אֲנִי
  english_pob_choice: I too
  chosen_spanish: Yo también
  alternatives_spanish:
  - también yo
  - incluso yo
  lexicon: HALOT
  rationale: אַף con el pronombre independiente añade énfasis y correspondencia. "Yo también" conserva la reciprocidad enfática de manera natural en español.
- source_word: אֵלֵךְ עִמָּם בְּקֶרִי
  english_pob_choice: will walk contrary to them
  chosen_spanish: caminaré en oposición a ellos
  alternatives_spanish:
  - caminaré contrariamente a ellos
  - caminaré en hostilidad hacia ellos
  lexicon: HALOT
  rationale: El hebreo expresa la idea idiomática de ir/andar con hostilidad o en oposición dentro del marco de las maldiciones del pacto. "Caminaré en oposición a ellos" comunica esa relación sin sonar forzado en español.
- source_word: וְהֵבֵאתִי אֹתָם בְּאֶרֶץ אֹיְבֵיהֶם
  english_pob_choice: and bring them into the land of their enemies
  chosen_spanish: y los llevaré a la tierra de sus enemigos
  alternatives_spanish:
  - y los traeré a la tierra de sus enemigos
  - y los llevaré a la tierra de sus adversarios
  lexicon: HALOT
  rationale: El Hiphil de בוא se expresa naturalmente con "llevar"/"traer" en español. Se eligió "llevaré" para mantener fluidez y la idea de traslado al exilio.
- source_word: אוֹ אָז
  english_pob_choice: or then
  chosen_spanish: o entonces
  alternatives_spanish:
  - o quizá entonces
  - o si entonces
  lexicon: HALOT
  rationale: La construcción hebrea es difícil y puede introducir el punto de giro o posibilidad posterior. "O entonces" conserva la disyunción y la transición sin suavizarla demasiado.
- source_word: יִכָּנַע
  english_pob_choice: will be humbled
  chosen_spanish: será humillado
  alternatives_spanish:
  - será abatido
  - se humillará
  lexicon: HALOT
  rationale: El nifal de כנע con "corazón" como sujeto apunta a un abajamiento interior. "Será humillado" mantiene la pasiva y el efecto de quebrantamiento interior, sin convertirlo en un acto voluntario del sujeto.
- source_word: לְבָבָם הֶעָרֵל
  english_pob_choice: their uncircumcised heart
  chosen_spanish: su corazón incircunciso
  alternatives_spanish:
  - su corazón sin circuncidar
  - su corazón incircunciso y obstinado
  lexicon: HALOT
  rationale: Se retiene la metáfora pactal literal del hebreo para no diluir su peso teológico. "Incircunciso" mantiene el vínculo con el lenguaje del pacto y su carga moral.
- source_word: וְאָז יִרְצוּ אֶת עֲוֺנָם
  english_pob_choice: and then they will accept the punishment for their iniquity
  chosen_spanish: y entonces aceptarán el castigo por su iniquidad
  alternatives_spanish:
  - y entonces harán expiación por su iniquidad
  - y entonces pagarán por su iniquidad
  lexicon: HALOT
  rationale: רצה con עון aquí expresa aceptar o soportar las consecuencias debidas de la culpa. "Aceptarán el castigo" preserva el sentido judicial sin importar una expiación meritoria ajena al contexto.
theological_decisions:
- issue: Metáfora del corazón הֶעָרֵל
  english_pob_reading: Retain the covenantal metaphor as 'uncircumcised heart'
  chosen_spanish_reading: Retener la metáfora pactal como "corazón incircunciso"
  alternative_spanish_readings:
  - corazón obstinado
  - corazón impuro
  rationale: El texto usa una metáfora cargada de pacto, no solo una descripción genérica de terquedad. Mantenerla en español preserva las conexiones intertextuales y la tensión teológica del pasaje.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Sentido de יִרְצוּ אֶת עֲוֺנָם
  english_pob_reading: They accept the punishment/consequences of their iniquity
  chosen_spanish_reading: Aceptarán el castigo/consecuencias de su iniquidad
  alternative_spanish_readings:
  - harán expiación por su iniquidad
  - su iniquidad será pagada
  rationale: La frase no enseña autoexpiación meritoria, sino reconocimiento y aceptación de la pena del pacto. La redacción elegida deja visible el sentido jurídico del hebreo.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: No se aplicaron revisiones posteriores; la versión más reciente permaneció sin cambios, y el contexto de auditoría muestra acuerdo moderado con solo observaciones menores.
  spanish_consistency_notes:
  - Se mantuvo "Yahvé" según la norma del proyecto cuando el versículo no contiene el Tetragrámaton explícito en esta forma española, pero el contenido refleja la voz divina del texto del pacto.
  - Se conservó la metáfora "corazón incircunciso" para no aplanar la carga pactal del hebreo.
  - '"Aceptar el castigo" se eligió para mantener el sentido judicial del idiomático hebreo sin introducir una formulación expiatoria técnica no requerida por el contexto.'
  - '"Caminaré en oposición a ellos" busca reflejar la fórmula de maldición del pacto sin perder naturalidad en español.'
