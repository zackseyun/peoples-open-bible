revisions:
- from: Ustedes y su casa pueden comerlo en cualquier lugar, porque es su salario en compensación por su servicio en la tienda del encuentro.
  to: Ustedes y su hogar[b] pueden comerlo en cualquier lugar,[c][a] porque es su salario[c] en compensación por su servicio en la tienda del encuentro.
  rationale: 'Se ajusta «su casa» a «su hogar» para preservar el sentido de unidad doméstica de ביתכם con mejor claridad en español. También se restituyen las notas significativas del expediente inglés: alternativa verbal del hebreo legal, aclaración cultural sobre el hogar, y alternativas léxicas para שָׂכָר. El resto del borrador puede mantenerse por ser fiel y natural.'
