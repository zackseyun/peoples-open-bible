translation:
  language: es
  text: Y tomó las cartas y salió a Babilonia, y anunció a todos sus hermanos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'se lo anunció a todos sus parientes'; el griego dice literalmente 'a todos sus hermanos'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλαβεν
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - recibió
  - llevó
  lexicon: BDAG
  rationale: ἔλαβεν es aoristo de λαμβάνω; en este contexto narrativo, 'tomó' comunica la recepción y el acto de hacerse con las cartas de manera natural en español.
- source_word: τὰς ἐπιστολάς
  english_pob_choice: the letters
  chosen_spanish: las cartas
  alternatives_spanish:
  - los documentos
  - las misivas
  lexicon: BDAG
  rationale: ἐπιστολή significa una carta o comunicación escrita; 'cartas' es directo, claro y fiel al registro narrativo.
- source_word: ἐξῆλθεν εἰς Βαβυλῶνα
  english_pob_choice: went out to Babylon
  chosen_spanish: salió a Babilonia
  alternatives_spanish:
  - partió para Babilonia
  - fue a Babilonia
  lexicon: BDAG
  rationale: ἐξέρχομαι contiene la idea de salir o partir. 'Salió' conserva esa dirección verbal sin sonar forzado en español, y 'a Babilonia' expresa la meta.
- source_word: ἀπήγγειλεν
  english_pob_choice: reported
  chosen_spanish: lo anunció
  alternatives_spanish:
  - lo reportó
  - lo comunicó
  - lo dio a conocer
  lexicon: BDAG
  rationale: ἀπαγγέλλω puede significar reportar o anunciar. Como el griego no expresa objeto directo, 'lo' mantiene el sentido de que transmitió el contenido de las cartas sin añadir un sujeto implícito.
- source_word: τοῖς ἀδελφοῖς αὐτοῦ πᾶσιν
  english_pob_choice: to all his brothers
  chosen_spanish: a todos sus hermanos
  alternatives_spanish:
  - a todos sus parientes
  - a todos sus hermanos de sangre
  lexicon: BDAG
  rationale: ἀδελφοῖς es masculino plural y, según la norma del proyecto, se preserva como 'hermanos'. 'Todos' traduce πᾶσιν de forma explícita.
theological_decisions:
- issue: Sentido colectivo de ἀδελφοῖς
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - parientes
  - compatriotas
  rationale: La forma griega es masculina plural; el texto no introduce una expansión inclusiva. Mantener 'hermanos' conserva la forma del original y deja abierto el posible sentido comunitario o étnico sin explicitarlo más allá del griego.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó el objeto explícito 'it' porque el griego solo dice que él 'reportó/anunció a todos sus hermanos'. La traducción española sigue esa corrección y no añade un objeto más específico que no esté en el original.
  spanish_consistency_notes:
  - Se preserva 'Babilonia' como topónimo directo, sin ajuste interpretativo.
  - '''Hermanos'' mantiene la forma masculina plural del griego, coherente con la política de precisión de género del proyecto.'
  - '''Lo anunció'' refleja el verbo de comunicación sin sobreespecificar el contenido, en línea con la revisión auditada.'
