translation:
  language: es
  text: Y cuando Yahvé tu Dios te dé descanso de todos tus enemigos a tu alrededor, en la tierra que Yahvé tu Dios te da como herencia para poseerla, borrarás la memoria[a] de Amalec de debajo del cielo. No olvides.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el recuerdo de Amalec».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Y será que cuando
  - Entonces, cuando
  lexicon: HALOT
  rationale: El hebreo introduce una circunstancia temporal futura; en español, «Y cuando» conserva esa relación sin volverse artificial.
- source_word: בְּהָנִיחַ
  english_pob_choice: gives you rest
  chosen_spanish: te dé descanso
  alternatives_spanish:
  - te haya dado descanso
  - te haga descansar
  lexicon: HALOT
  rationale: El infinitivo con ב expresa el momento de «cuando... dé descanso». «Te dé descanso» mantiene el valor causativo y suena natural en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: El nombre divino יְהוָה se vierte según el estándar del proyecto como «Yahvé», preservando el nombre propio del pacto y no sustituyéndolo por un título.
- source_word: מִכָּל אֹיְבֶיךָ מִסָּבִיב
  english_pob_choice: from all your enemies around you
  chosen_spanish: de todos tus enemigos en derredor
  alternatives_spanish:
  - de todos tus enemigos alrededor de ti
  - de todos tus enemigos por todas partes
  lexicon: HALOT
  rationale: La frase incluye totalidad («todos») y la idea espacial de cercanía/circunferencia. «En derredor» conserva el matiz bíblico y es comprensible en español culto.
- source_word: בָּאָרֶץ אֲשֶׁר ... נֹתֵן לְךָ
  english_pob_choice: in the land that Yahweh your God is giving you
  chosen_spanish: en la tierra que Yahvé tu Dios te da
  alternatives_spanish:
  - en la tierra que Yahvé tu Dios te está dando
  - en la tierra que Yahvé tu Dios te entrega
  lexicon: HALOT
  rationale: El participio נֹתֵן puede expresar acción en curso o inminente; «te da» transmite bien la idea continua/futura en español sin sobrecargar la frase.
- source_word: נַחֲלָה
  english_pob_choice: as an inheritance
  chosen_spanish: como herencia
  alternatives_spanish:
  - como posesión
  - como heredad
  lexicon: HALOT
  rationale: «Herencia» comunica el valor covenantal del término y es más natural en español moderno que una glosa más pesada.
- source_word: לְרִשְׁתָּהּ
  english_pob_choice: to possess
  chosen_spanish: para poseerla
  alternatives_spanish:
  - para tomar posesión de ella
  - para heredarla
  lexicon: HALOT
  rationale: El verbo ירשׁ aquí remite a tomar posesión de la tierra; «poseerla» es breve, fiel y gramaticalmente natural.
- source_word: תִּמְחֶה
  english_pob_choice: you shall blot out
  chosen_spanish: borrarás
  alternatives_spanish:
  - extinguirás
  - borrarás de la memoria
  lexicon: HALOT
  rationale: מחה puede significar borrar, borrar por completo o borrar de un registro. Dado que el complemento es «la memoria», «borrarás» preserva la fuerza idiomática sin redundancia excesiva.
- source_word: זֵכֶר
  english_pob_choice: the remembrance
  chosen_spanish: la memoria
  alternatives_spanish:
  - el recuerdo
  - la remembranza
  lexicon: HALOT
  rationale: «Memoria» reproduce la alternativa léxica documentada en inglés y resulta natural en español. La nota conserva la posibilidad de «recuerdo».
- source_word: עֲמָלֵק
  english_pob_choice: Amalek
  chosen_spanish: Amalec
  alternatives_spanish:
  - Amalek
  lexicon: HALOT
  rationale: El nombre propio se adapta a la forma usual en español bíblico, manteniendo la identificación del referente.
- source_word: מִתַּחַת הַשָּׁמָיִם
  english_pob_choice: from under heaven
  chosen_spanish: de debajo del cielo
  alternatives_spanish:
  - de debajo de los cielos
  - de la faz de la tierra
  lexicon: HALOT
  rationale: La imagen hebrea se conserva de manera directa en español. «Debajo del cielo» mantiene el alcance cósmico sin reinterpretarlo.
- source_word: לֹא תִּשְׁכָּח
  english_pob_choice: Do not forget
  chosen_spanish: No olvides
  alternatives_spanish:
  - No te olvides
  - No olvidarás
  lexicon: HALOT
  rationale: La prohibición se expresa de modo natural en español. «No olvides» conserva el tono imperativo y exhortativo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo emplea directamente el Tetragrámaton. En español del proyecto se usa «Yahvé» como forma principal para preservar el nombre del pacto y evitar la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de זֵכֶר עֲמָלֵק
  english_pob_reading: the remembrance of Amalek
  chosen_spanish_reading: la memoria de Amalec
  alternative_spanish_readings:
  - el recuerdo de Amalec
  - la remembranza de Amalec
  rationale: La expresión puede referir tanto a memoria como a remembranza/recuerdo. «Memoria» mantiene el peso solemne del mandato y permite conservar la alternativa sin forzar una sola interpretación.
  doctrine_reference: Lexical ambiguity, no doctrinal deviation
translation_notes:
  revision_awareness: 'El pasaje muestra concordancia alta con la revisión inglesa más reciente: no hay cambios textuales relevantes que requieran ajuste adicional; se mantiene la decisión de rendir el nombre divino como Yahvé y el mandato final en forma breve e imperativa.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - «Amalec» sigue la forma española bíblica común del nombre propio.
  - La frase «de debajo del cielo» conserva el hebraísmo sin convertirlo en una paráfrasis geográfica.
  - La estructura condicional-temporal «Y cuando...» refleja el hebreo וְהָיָה בְּהָנִיחַ sin añadir elementos interpretativos.
