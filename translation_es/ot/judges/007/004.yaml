  text: Then Yahweh said to Gideon[a], “The people are still too many. Bring them down to the water, and there I will test them for you. And it shall be that the one of whom I say to you, ‘This one shall go with you,’ he shall go with you; and everyone of whom I say to you, ‘This one shall not go with you,’ he shall not go.”
