- from: Y escribió que se diera sustento a los levitas hasta el día en que se terminara la casa[a] y Jerusalén fuera construida[b].
  to: Y escribió que se diera sustento a los levitas hasta el día en que se terminara la casa[a] y Jerusalén fuera edificada[b].
  rationale: 'Se hace una reparación menor de estilo y naturalidad: «edificada» representa bien οἰκοδομηθῆναι, suena más idiomático en este contexto y mejora el paralelismo con «se terminara», sin apartarse de la decisión inglesa de no forzar explícitamente la idea de ‘re-’ en el texto principal.'
