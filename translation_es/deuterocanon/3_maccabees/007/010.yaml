revisions:
- from: Pero cuando recibieron esta carta[a], no se apresuraron inmediatamente para la partida; al contrario, pidieron al rey que los que eran del linaje de los judíos[b], los que habían transgredido voluntariamente la ley del Dios santo, recibieran por medio de ellos[c] el castigo que se debía.
  to: Pero cuando recibieron esta carta, no se apresuraron inmediatamente para la partida[a], sino que instaron al rey a que los del linaje de los judíos[b] que habían transgredido voluntariamente la ley del Dios santo recibieran por medio de ellos[c] el castigo debido.
  rationale: Se corrige el error principal de anclaje de nota, moviendo [a] a «partida», que es donde corresponde la alternativa léxica de ἄφοδος. También se fortalece «pidieron» a «instaron» para reflejar mejor προσηξίωσαν, se alisa la sintaxis eliminando la repetición innecesaria de «los que», y se mejora la naturalidad con «castigo debido». No se requieren cambios doctrinales ni adjudicación compleja.
