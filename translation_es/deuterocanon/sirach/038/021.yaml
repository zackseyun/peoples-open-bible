translation:
  language: es
  text: No sigas recordándolo[a], porque no tiene esperanza; ¿de qué servirá? Y te harás daño a ti mismo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «porque no tiene esperanza»; el griego paralelo lee: «porque no hay regreso».'
    reason: alternative_reading
lexical_decisions:
- source_word: אל תזכרנו / μὴ ἐπιλάθῃ
  english_pob_choice: Do not keep remembering him
  chosen_spanish: No sigas recordándolo
  alternatives_spanish:
  - No lo recuerdes
  - No sigas trayéndolo a la memoria
  lexicon: HALOT; LXX μιμνῄσκομαι / ἐπιλανθάνομαι usage
  rationale: La forma negativa en contexto de duelo no prohíbe toda memoria, sino la fijación prolongada en el fallecido. «No sigas recordándolo» conserva esa fuerza aspectual y suena natural en español.
- source_word: כי אין לו תקוה / οὐ γάρ ἐστιν ἐπάνοδος
  english_pob_choice: for he has no hope / for there is no return
  chosen_spanish: porque no hay regreso
  alternatives_spanish:
  - porque no tiene esperanza
  - porque no hay esperanza para él
  - porque no hay vuelta
  lexicon: HALOT; LSJ; LXX parallel
  rationale: 'Se mantiene la tensión fuente-a-fuente: el hebreo dice literalmente que no tiene esperanza, mientras que el griego expresa que no hay regreso. «No hay regreso» traduce con claridad el sentido práctico del contexto funerario y deja visible la alternativa hebrea en nota.'
- source_word: מה תועיל
  english_pob_choice: what will it benefit?
  chosen_spanish: ¿qué provecho tendrás?
  alternatives_spanish:
  - ¿qué beneficio habrá?
  - ¿de qué servirá?
  lexicon: HALOT
  rationale: La pregunta retórica apunta a la inutilidad de seguir con ese lamento. En español, «¿qué provecho tendrás?» mantiene el giro interrogativo y evita añadir un objeto no explícito en el hebreo.
- source_word: ולך תרע / σεαυτὸν κακώσεις
  english_pob_choice: You will harm yourself
  chosen_spanish: te harás daño a ti mismo
  alternatives_spanish:
  - te dañarás
  - te perjudicarás a ti mismo
  lexicon: HALOT; Greek reflexive κακόω
  rationale: El hebreo y el griego coinciden en la idea de daño para el doliente. «Te harás daño a ti mismo» expresa bien el valor reflexivo sin sonar excesivamente literal o forzado.
theological_decisions:
- issue: Tensión entre el hebreo «no hay esperanza» y el griego «no hay regreso»
  english_pob_reading: English revised to 'for he has no hope' with a note preserving the Greek parallel 'there is no return.'
  chosen_spanish_reading: porque no hay regreso
  alternative_spanish_readings:
  - porque no tiene esperanza
  - porque no hay esperanza para él
  rationale: La fuente hebrea es primaria, pero el griego paralelo también es parte del expediente textual. Para un texto español publicable y fiel al conjunto de testigos, se adopta el sentido contextual de irreversibilidad («no hay regreso») y se deja constancia de la lectura hebrea literal en la nota.
  doctrine_reference: Principio de primacía del original con consulta de paralelos; preservación de variantes significativas en nota.
- issue: A quién beneficia o daña la conducta del doliente
  english_pob_reading: what will it benefit? You will harm yourself.
  chosen_spanish_reading: ¿qué provecho tendrás? ... te harás daño a ti mismo
  alternative_spanish_readings:
  - ¿qué beneficio habrá?
  - te perjudicarás
  rationale: El hebreo formula una pregunta retórica y termina con un aviso de daño personal. La versión española conserva ambas ideas sin introducir una interpretación doctrinal ajena al contexto.
  doctrine_reference: Lectura pragmática del consejo sapiencial/funerario, sin ampliación dogmática.
translation_notes:
  revision_awareness: Tomé en cuenta la última revisión inglesa, que prefirió reflejar más de cerca el hebreo en 'he has no hope' y la pregunta retórica 'what will it benefit?'. En español, opté por una solución que conserva la advertencia sapiencial y, al mismo tiempo, deja visible en nota la tensión entre el hebreo y el griego. También evité una paráfrasis que explicara demasiado el objeto de la acción, para no borrar la concisión del original.
  spanish_consistency_notes:
  - Usé «regreso» para reflejar el valor contextual de ἐπάνοδος y mantener una nota que preserve la lectura hebrea de «esperanza».
  - Mantuve un registro sobrio y bíblico, pero con sintaxis natural en español contemporáneo.
  - Preferí «te harás daño a ti mismo» por la claridad del reflexivo y su correspondencia con el griego.
