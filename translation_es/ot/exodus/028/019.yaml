translation:
  language: es
  text: 'y la tercera fila: jacinto[a], ágata[b], y amatista.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La identificación precisa de las piedras nombradas aquí es incierta; «jacinto» traduce לֶשֶׁם, tradicionalmente renderizado como «ligurio».
    reason: lexical_alternative
  - marker: b
    text: O posiblemente «ónice» para שְׁבוֹ; los términos antiguos para gemas no siempre coinciden con precisión con los nombres minerales modernos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַטּוּר
  english_pob_choice: and the ... row
  chosen_spanish: y la ... fila
  alternatives_spanish:
  - y la ... hilera
  - y la ... fila de piedras
  lexicon: HALOT
  rationale: En este contexto de piedras engastadas del pectoral, טּוּר se refiere a una disposición lineal; en español, «fila» comunica con naturalidad la idea de una serie ordenada sin añadir connotaciones técnicas innecesarias. Mantengo la conjunción inicial para conservar la continuación del listado.
- source_word: הַשְּׁלִישִׁי
  english_pob_choice: third
  chosen_spanish: tercera
  alternatives_spanish:
  - tercer
  lexicon: HALOT
  rationale: El ordinal concuerda con «fila» en género femenino y expresa de manera directa la secuencia del texto.
- source_word: לֶשֶׁם
  english_pob_choice: jacinth
  chosen_spanish: jacinto
  alternatives_spanish:
  - ligurio
  - ámbar
  lexicon: HALOT
  rationale: El nombre preciso de la piedra es incierto. «Jacinto» es la aproximación española más transparente y corresponde al criterio del POB en inglés de usar un término moderno reconocible, manteniendo la reserva sobre la identificación exacta.
- source_word: שְׁבוֹ
  english_pob_choice: agate
  chosen_spanish: ágata
  alternatives_spanish:
  - ónice
  - ágata bandeada
  lexicon: HALOT
  rationale: «Ágata» es la equivalencia española común y reconocible para esta gema, aunque la identificación exacta sigue siendo incierta; por eso se preserva la cautela léxica sin forzar una precisión mineral que el hebreo no garantiza.
- source_word: וְאַחְלָמָה
  english_pob_choice: and amethyst
  chosen_spanish: y amatista
  lexicon: HALOT
  rationale: «Amatista» es el equivalente español estándar de אַחְלָמָה y transmite adecuadamente la identificación tradicional de la piedra.
translation_notes:
  revision_awareness: 'El pasaje coincide con el texto fuente y con la auditoría inglesa: no hubo revisiones aplicadas y el criterio de equivalencia óptima se mantiene, conservando las dos notas de incertidumbre léxica sobre las piedras.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este versículo no contiene el tetragrámaton ni requiere ajuste.
  - Se evita «piedra» porque el hebreo enumera nombres de gemas sin un sustantivo explícito; la enumeración española sigue el patrón del inglés auditado.
  - Se conserva la incertidumbre terminológica mediante notas a pie, en paralelo con la auditoría inglesa, sin añadir interpretaciones mineralógicas no sustentadas.
