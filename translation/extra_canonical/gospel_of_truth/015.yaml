    reason: previous_rendering
lexical_decisions:
- source_word: ⲁⲃⲁⲗ
  chosen: openly (context 1); alone (context 2); manifestly (nuance)
  alternatives:
  - outside
  - by itself
  - publicly
  lexicon: Crum; Layton
  rationale: Sahidic ⲁⲃⲁⲗ primarily ‘outside/outwardly’ → ‘openly’ suits the initial
    clause. In ⲡⲉⲧϫⲏⲕ ⲁⲃⲁⲗ, the sense ‘alone/by itself’ is contextually expected (awaiting
    the Complete One alone). Elsewhere it can carry an intensifying ‘manifestly’ nuance
    modifying ‘complete.’
- source_word: ϣⲱⲱⲧ
  chosen: exalt
  alternatives:
  - lift up
  - boast
  lexicon: Crum
  rationale: In evaluative contexts, ϣⲱⲱⲧ often means ‘to exalt’ oneself; fits the
    negative series (‘neither…nor’).
- source_word: ⲥⲁϣ
  chosen: harsh
  alternatives:
  - severe
  - hard
  lexicon: Crum
  rationale: Crum glosses ⲥⲁϣ as ‘hard/harsh/bitter’; ‘harsh’ fits the triad of misconceptions
    about the Father.
- source_word: ⲃⲁⲗⲕⲉ
  chosen: wrathful
  alternatives:
  - irascible
  - furious
  lexicon: Crum; context-driven
  rationale: Rare term; in this semantic field it contrasts with ‘sweet’ and ‘without
    evil’; ‘wrathful’ preserves the moral quality opposed here.
- source_word: ⲁⲧⲡⲉⲑⲁⲩ
  chosen: without evil
  alternatives:
  - sinless
  - without malice
  lexicon: Crum
  rationale: Privative ⲁⲧ- + ⲡⲉⲑⲁⲩ (‘evil’). ‘Without evil’ preserves the privative
    force.
- source_word: ⲁⲧϣⲧⲁⲣⲧⲣ
  chosen: unperturbed
  alternatives:
  - without agitation
  - undisturbed
  lexicon: Crum; Layton
  rationale: Privative form with nuance ‘free of disturbance/turmoil’; ‘unperturbed’
    renders both negation and affective domain.
- source_word: ⲟⲩϩⲗⲟϭ
  chosen: sweet
  alternatives:
  - gracious
  - pleasant
  lexicon: Crum
  rationale: Common adjectival ‘sweet/pleasant’; paired antithetically with ‘wrathful’
    and ‘without evil’ here.
- source_word: ⲣⲭⲣⲓⲁ (χρεία)
  chosen: need
  alternatives:
  - necessity
  - requirement
  lexicon: Greek loan; Crum
  rationale: 'Greek χρεία regularly ‘need’; negated here: ‘has no need.’'
- source_word: ⲙⲛⲧⲛⲁϭ ⲁⲧϣⲓⲧⲥ
  chosen: immeasurable Greatness
  alternatives:
  - boundless greatness
  - measureless greatness
  lexicon: Crum; Layton
  rationale: Abstract ⲙⲛⲧⲛⲁϭ ‘greatness’ modified by privative ⲁⲧϣⲓⲧⲥ ‘without measure’;
    capitalizing ‘Greatness’ signals a recognized Valentinian abstraction.
- source_word: ⲡⲉⲧϫⲏⲕ
  chosen: the Complete One
  alternatives:
  - the Perfect One
  lexicon: Crum; Thomassen (conceptual)
  rationale: ϫⲏⲕ ‘complete/perfect.’ We prefer ‘Complete One’ to foreground pleromatic
    wholeness; footnote preserves ‘Perfect One.’
- source_word: ⲙⲁⲩ
  chosen: Mother
  alternatives: []
  lexicon: Crum
  rationale: Plain familial title; here an honorific for the Complete One’s nurturing
    function.
- source_word: ⲫⲑⲟⲛⲟⲥ (φθόνος)
  chosen: envy
  alternatives:
  - jealousy
  lexicon: Greek loan; Crum
  rationale: Standard rendering of φθόνος as ‘envy.’
- source_word: ⲁϣⲉϩⲁⲙ
  chosen: groaning
  alternatives:
  - lament
  - sighing
  lexicon: Crum
  rationale: Commonly ‘to groan’; pairs with ‘death’ and ‘envy’ as absent afflictions.
- source_word: ⲙⲟⲩⲛ
  chosen: death
  alternatives: []
  lexicon: Crum
  rationale: Basic noun ‘death.’
- source_word: ⲙⲁⲧⲛ
  chosen: rest
  alternatives:
  - repose
  lexicon: Crum; Valentinian usage
  rationale: Key soteriological term; ‘rest’ preserves technical resonance.
- source_word: ϩⲁⲥⲓⲉ
  chosen: striving
  alternatives:
  - toiling
  - being agitated
  lexicon: Crum
  rationale: Verbal field of effort/disturbance; ‘striving’ contrasts with ‘rest.’
- source_word: ϭⲁⲙⲗⲁⲙ
  chosen: writhing
  alternatives:
  - twisting about
  - being in turmoil
  lexicon: Crum (rare); context
  rationale: Rare verb likely denotes ‘wriggling/writhing’; traditional translations
    render the pair as ‘striving and [being] in confusion.’ ‘Writhing’ keeps the visceral
    imagery.
- source_word: ⲣⲙⲡⲕⲱⲧⲉ
  chosen: search
  alternatives:
  - seeking out
  - investigation
  lexicon: Crum
  rationale: Nominalized pursuit; ‘search’ succinctly signals the act toward the Truth.
- source_word: ⲧⲙⲏⲉ
  chosen: Truth
  alternatives:
  - truth
  lexicon: Valentinian technical term
  rationale: Capitalized to mark the reified aeonic entity (often paired with ‘Plērōma’).
- source_word: ⲧⲏⲕ
  chosen: complete
  alternatives:
  - perfect
  lexicon: Crum
  rationale: Adjectival predicate denoting the state ‘complete/whole’; harmonized
    with ‘Complete One.’
- source_word: ⲗⲏⲕ
  chosen: refreshed (cooled)
  alternatives:
  - cooled
  - revived
  lexicon: Crum
  rationale: Literal ‘coolness’; idiomatically ‘refreshment.’ We retain ‘refreshed’
    and note the underlying ‘cooled’ metaphor.
- source_word: ⲛⲟⲩⲛⲉ
  chosen: root
  alternatives: []
  lexicon: Crum; Valentinian usage
  rationale: Technical image for pleromatic origin/source; keep as ‘root.’
- source_word: ⲥⲣϥⲉ
  chosen: devote themselves
  alternatives:
  - busy themselves with
  - apply themselves
  lexicon: Crum
  rationale: Middle/reflexive nuance of engagement fits ‘to the things found in their
    root.’
- source_word: ⲁⲣⲁⲩ
  chosen: find
  alternatives:
  - discover
  lexicon: Crum
  rationale: Common verb ‘to find’; plain rendering.
- source_word: ϭⲛ
  chosen: be taken up / be lifted
  alternatives:
  - ascend
  - be raised
  lexicon: Crum
  rationale: Elsewhere in the section family it marks the upward movement toward the
    Father; retained as ‘lifted’ when context requires (allusion remains here).
- source_word: ⲯⲩⲭⲏ (psyche)
  chosen: soul
  alternatives: []
  lexicon: Greek loan; standard
  rationale: Conventional ‘soul’ preserves anthropological nuance.
- source_word: ⲧⲟⲡⲟⲥ (topos) ⲙⲁⲕⲁⲣⲓⲟⲥ
  chosen: place of the blessed
  alternatives:
  - blessed place
  lexicon: Greek loans; standard
  rationale: Set phrase retaining ‘place’ for the spatial/ontological locus of rest.
- source_word: ⲁⲇⲏⲥ (Hades) [as implied]
  chosen: Hades
  alternatives:
  - the underworld
  - hell
  lexicon: Greek conceptual; context
  rationale: We transliterate ‘Hades’ to avoid conflation with later ‘hell’ concepts
    and preserve second-temple cosmology.
technical_vocabulary_note: 'Key reified terms are retained with capitalization where
  the Valentinian context warrants: Father, Truth, Spirit, Complete One, Good One,
  and Place (of the blessed). ‘Rest’ is preserved as a technical soteriological state
  rather than softened to ‘peace.’ ‘Root’ remains as the metaphysical source/origin
  image. ‘Hades’ is transliterated rather than rendered ‘hell.’ ‘Refreshed in the
  Spirit’ keeps the underlying cooling metaphor while using a natural English idiom.'
textual_note: 'This draft is translated directly from the Codex I (NHC I, Gospel of
  Truth) facsimile OCR for p. 42. Lineation and punctuation follow sense rather than
  manuscript breaks. Several rare or opaque lexemes are contextually constrained:
  ⲃⲁⲗⲕⲉ is rendered ‘wrathful’ in parallel with ‘harsh’ and ‘sweet’; ⲁⲧⲡⲉⲑⲁⲩ is ‘without
  evil’; ⲁⲧϣⲧⲁⲣⲧⲣ as ‘unperturbed.’ The adverb ⲁⲃⲁⲗ is rendered ‘openly’ at the start,
  and as ‘alone’ with ⲡⲉⲧϫⲏⲕ to reflect the idiom ‘the Complete One alone’; near ‘being
  complete’ it likely has an intensifying/manifestive force not easily carried into
  English. The pair ϩⲁⲥⲓⲉ/ϭⲁⲙⲗⲁⲙ is translated ‘striving / writhing’ to preserve the
  vivid contrast with ‘rest.’ The phrase ‘refreshed in the Spirit’ reflects ⲗⲏⲕ (‘coolness’)
  as an idiom for refreshment. Where the manuscript’s discourse presupposes earlier
  statements (e.g., ‘neither…nor’ series), the English is started with ‘For…’ to maintain
  flow without importing absent material.'
