  text: כִּי֩ הָמָ֨ן בֶּֽן הַמְּדָ֜תָא הָֽ/אֲגָגִ֗י צֹרֵר֙ כָּל הַ/יְּהוּדִ֔ים חָשַׁ֥ב עַל הַ/יְּהוּדִ֖ים לְ/אַבְּדָ֑/ם וְ/הִפִּ֥יל פּוּר֙ ה֣וּא הַ/גּוֹרָ֔ל לְ/הֻמָּ֖/ם וּֽ/לְ/אַבְּדָֽ/ם־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/esther/009/024.yaml
  text: For Haman son of Hammedatha the Agagite[a], the enemy of all the Jews, had plotted against the Jews to destroy them, and had cast Pur—that is[b], the lot—to crush them and to destroy them.
  footnotes:
  - marker: a
    text: Hebrew Pur is a loanword explained in the text itself as 'the lot'; retaining it preserves the connection to the name Purim in the surrounding passage.
    reason: cultural_note
  - marker: b
    text: Or 'to throw them into panic' / 'to confound them' for 'to throw them into confusion.'
    reason: lexical_alternative
