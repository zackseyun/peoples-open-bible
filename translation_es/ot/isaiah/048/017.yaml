translation:
  language: es
  text: 'Así dice Yahvé, tu Redentor, el Santo de Israel: Yo soy Yahvé tu Dios, el que te enseña para tu provecho[a], el que te guía por el camino por donde has de andar[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, «el que te enseña para tu provecho».
    reason: lexical_alternative
  - marker: b
    text: O «el que te guía por el camino por donde vas»; el hebreo puede leerse de manera más descriptiva («por donde vas») o más instructiva («por donde has de andar»).
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto para el nombre divino, manteniendo la forma propia y evitando la sustitución por un título en mayúsculas. 'Yahvé' es el equivalente español más natural y auditable del inglés 'Yahweh'.
- source_word: גֹּאַלְךָ
  english_pob_choice: your Redeemer
  chosen_spanish: tu Redentor
  alternatives_spanish:
  - tu rescatador
  - el que te redime
  - tu pariente redentor
  lexicon: HALOT
  rationale: El participio funciona aquí como título de Yahvé. 'Redentor' conserva la fuerza salvífica y de pacto del término, con una forma breve y natural en español; 'pariente redentor' sería más explícito pero sobrecarga el título en este contexto.
- source_word: קְדוֹשׁ יִשְׂרָאֵל
  english_pob_choice: the Holy One of Israel
  chosen_spanish: el Santo de Israel
  alternatives_spanish:
  - el Santo de Israel
  - el Santo de Israel
  lexicon: HALOT
  rationale: Es un título isaiano fijo y tradicional. 'El Santo de Israel' reproduce bien el valor nominal del hebreo y coincide con el registro reverente del texto.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios
  - tu Dios poderoso
  lexicon: HALOT
  rationale: En contexto de pacto y con sufijo de segunda persona, 'tu Dios' es la traducción directa y clara. No se añade matiz de poder que el hebreo aquí no exige.
- source_word: מְלַמֶּדְךָ
  english_pob_choice: who teaches you
  chosen_spanish: el que te enseña
  alternatives_spanish:
  - el que te instruye
  - quien te enseña
  lexicon: HALOT
  rationale: El participio expresa acción característica continua. La relativa nominal 'el que te enseña' suena natural en español y preserva el sentido de instrucción divina.
- source_word: לְהוֹעִיל
  english_pob_choice: to profit
  chosen_spanish: para tu provecho
  alternatives_spanish:
  - para que te aproveche
  - para tu beneficio
  - para que saques provecho
  lexicon: HALOT
  rationale: En español, 'para tu provecho' comunica el valor benefactivo del infinitivo con dignidad y naturalidad. Evita el arcaísmo o la dureza de 'para lucrar', y conserva la idea de utilidad real.
- source_word: מַדְרִיכֲךָ
  english_pob_choice: who leads you
  chosen_spanish: el que te guía
  alternatives_spanish:
  - el que te conduce
  - el que te encamina
  lexicon: HALOT
  rationale: '''Guiar'' es el equivalente más idiomático para la imagen de dirección en un camino, sin perder el valor de conducir por un rumbo definido.'
- source_word: בְּדֶרֶךְ
  english_pob_choice: in the way
  chosen_spanish: por el camino
  alternatives_spanish:
  - en el camino
  - por la senda
  lexicon: HALOT
  rationale: Con el verbo de movimiento, 'por el camino' preserva la imagen vial y suena más natural en español que una calca rígida de 'en el camino'.
- source_word: תֵּלֵךְ
  english_pob_choice: you should go
  chosen_spanish: por donde has de andar
  alternatives_spanish:
  - por donde debes ir
  - por donde debes andar
  - por donde irás
  lexicon: HALOT
  rationale: El imperfecto final tiene un matiz orientador/instructivo; 'has de andar' expresa mejor en español la trayectoria debida o apropiada sin reducirlo a un futuro simple. Mantiene la tensión entre descripción del camino y orientación divina.
theological_decisions:
- issue: Mantener el nombre divino con forma directa en español
  english_pob_reading: Thus says Yahweh ... I am Yahweh your God
  chosen_spanish_reading: Así dice Yahvé ... Yo soy Yahvé tu Dios
  alternative_spanish_readings:
  - Así dice el SEÑOR ... Yo soy el SEÑOR tu Dios
  rationale: La línea del proyecto requiere transparentar el tetragrámaton como nombre propio, no como máscara litúrgica. Por eso se usa 'Yahvé' de manera consistente en ambas apariciones, conservando la autoidentificación enfática del texto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Conservar el sentido benefactivo de la instrucción divina sin estrecharlo demasiado
  english_pob_reading: who teaches you to profit ... who leads you in the way you should go
  chosen_spanish_reading: el que te enseña para tu provecho ... el que te guía por el camino por donde has de andar
  alternative_spanish_readings:
  - el que te enseña para que aproveches
  - el que te enseña para tu beneficio ... el que te guía por el camino que debes seguir
  rationale: El hebreo une enseñanza y utilidad, no mera información. 'Para tu provecho' preserva ese sentido benefactivo sin convertirlo en un tecnicismo ni borrar la relación entre enseñanza y bien concreto. 'Has de andar' conserva la dirección normativa del final sin volverlo excesivamente mecánico o determinista.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; Readable modern Spanish, not archaic or academic'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el paquete fuente hebreo y la auditoría inglesa: conserva la doble autoidentificación con Yahvé, mantiene los títulos fijos de Isaías y refleja la pareja enseñanza/utilidad y guía/camino. Se evitó una traducción mecánica que oscurezca el matiz benefactivo de להועיל o que sustituya el nombre divino por una máscara litúrgica.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' en ambas ocurrencias del nombre divino, en coherencia con los defaults del proyecto.
  - '''Redentor'' se conserva como título teológico compacto; no se expande a ''pariente redentor'' porque el contexto isaiano funciona como designación titulada.'
  - '''Provecho'' se eligió para לְהוֹעִיל por su cercanía semántica y por su registro sobrio en español bíblico moderno.'
  - La clausula final 'por donde has de andar' intenta reflejar la orientación normativa del imperfecto hebreo sin perder la imagen del camino.
