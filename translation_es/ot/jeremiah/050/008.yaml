translation:
  language: es
  text: Huyan de en medio de Babilonia, y salgan de la tierra de los caldeos; y sean como machos cabríos[a] delante del rebaño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O más literalmente, «sean como machos cabríos delante del rebaño».
    reason: lexical_alternative
lexical_decisions:
- source_word: נֻדוּ
  english_pob_choice: Flee
  chosen_spanish: Huyan
  alternatives_spanish:
  - Aléjense
  - Escapen
  - Huyan lejos
  lexicon: HALOT
  rationale: El imperativo comunica urgencia de salir inmediatamente de una ciudad destinada al juicio. En español, «huyan» conserva esa urgencia con naturalidad y sin debilitar la fuerza exhortativa.
- source_word: מִתּוֹךְ
  english_pob_choice: from the midst of
  chosen_spanish: del medio de
  alternatives_spanish:
  - de en medio de
  - desde el interior de
  lexicon: HALOT
  rationale: La expresión hebrea subraya la salida desde dentro mismo de Babilonia. «Del medio de» mantiene la imagen espacial con buena fluidez en español.
- source_word: בָּבֶל
  english_pob_choice: Babylon
  chosen_spanish: Babilonia
  alternatives_spanish:
  - Babilón
  lexicon: N/A
  rationale: El nombre propio se conserva con la forma española usual y transparente.
- source_word: וּמֵאֶרֶץ כַּשְׂדִּים
  english_pob_choice: and go out from the land of the Chaldeans
  chosen_spanish: y salgan de la tierra de los caldeos
  alternatives_spanish:
  - y salgan de la tierra de Caldea
  - y abandonen la tierra de los caldeos
  lexicon: HALOT
  rationale: «Tierra de los caldeos» refleja de cerca el hebreo. Se prefiere «caldeos» sobre «Caldea» porque el texto nombra al pueblo/territorio en esa forma explícita, y «salgan» encaja con la secuencia imperativa.
- source_word: יצאו
  english_pob_choice: go out
  chosen_spanish: salgan
  alternatives_spanish:
  - vayan fuera
  - salgan afuera
  lexicon: HALOT
  rationale: Aunque la forma hebrea es no imperativa en la morfología dada, el contexto la hace funcionar como continuación exhortativa. «Salgan» traduce naturalmente esa fuerza de mandato.
- source_word: וִהְי֕וּ
  english_pob_choice: be
  chosen_spanish: sean
  alternatives_spanish:
  - estén
  - lleguen a ser
  lexicon: HALOT
  rationale: En la comparación exhortativa, «sean» reproduce el valor de ser/comportarse como en la analogía hebrea.
- source_word: כְּעַתּוּדִים
  english_pob_choice: like male goats
  chosen_spanish: como machos cabríos
  alternatives_spanish:
  - como cabros machos
  - como cabríos
  lexicon: HALOT
  rationale: El sustantivo designa machos de cabra. «Machos cabríos» es preciso y suficientemente idiomático en español bíblico contemporáneo.
- source_word: לִפְנֵי צֹאן
  english_pob_choice: before the flock
  chosen_spanish: delante del rebaño
  alternatives_spanish:
  - ante el rebaño
  - frente al rebaño
  lexicon: HALOT
  rationale: La revisión inglesa prefirió una forma más literal que evitara ampliar el sentido a «guiando». «Delante del rebaño» conserva la imagen de ir primero, sin añadir interpretación.
- source_word: צֹאן
  english_pob_choice: the flock
  chosen_spanish: el rebaño
  alternatives_spanish:
  - el ganado menor
  - las ovejas
  lexicon: HALOT
  rationale: צֹאן nombra ganado menor en forma colectiva. «Rebaño» es una opción natural en español y mantiene el valor colectivo del hebreo.
theological_decisions:
- issue: La secuencia de mandatos de salida desde Babilonia y la tierra de los caldeos
  english_pob_reading: The verse is an urgent call to leave Babylon and the land of the Chaldeans.
  chosen_spanish_reading: El versículo se entiende como un llamado urgente a salir de Babilonia y de la tierra de los caldeos.
  alternative_spanish_readings:
  - Una exhortación general a apartarse simbólicamente del mal
  - Una referencia meramente geográfica sin tono de urgencia
  rationale: La fuerza imperativa está apoyada por el hebreo y por la lectura inglesa auditada. La traducción española debe conservar esa urgencia sin convertirla en paráfrasis moralizante ni en un dato meramente informativo.
  doctrine_reference: Jeremías 50:8; cf. el contexto de juicio sobre Babilonia en Jeremías 50
- issue: La comparación con machos cabríos delante del rebaño
  english_pob_reading: The simile should remain concrete and not be expanded interpretively.
  chosen_spanish_reading: 'La comparación se mantiene concreta: machos cabríos delante del rebaño.'
  alternative_spanish_readings:
  - machos cabríos guiando el rebaño
  - machos cabríos al frente del rebaño como líderes
  rationale: El audit trail inglés corrigió una expansión interpretativa («leading») a una forma más literal («before»). En español se conserva la imagen sin añadir la idea de liderazgo.
  doctrine_reference: Jeremías 50:8; revisión auditada del POB inglés
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión auditada del POB inglés: se evita una expansión interpretativa en la última comparación y se conserva la secuencia de mandatos con un equivalente español natural. El giro final se mantiene literal («delante del rebaño») para reflejar con precisión la corrección aplicada en la última pasada.'
  spanish_consistency_notes:
  - Se usa «Babilonia» para el nombre propio y «caldeos» para כַּשְׂדִּים, siguiendo el valor histórico-geográfico del texto.
  - Se conserva la fuerza imperativa con verbos en plural de mandato («huyan», «salgan», «sean»).
  - «Machos cabríos» mantiene el sentido zoológico específico de עַתּוּדִים y evita confundirlo con ovejas o carneros.
  - Se prefiere «rebaño» como colectivo natural para צֹאן, sin introducir una lectura más pastoral de la que da el hebreo.
