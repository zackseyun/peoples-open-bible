translation:
  language: es
  text: Le instó a casarse y tener hijos; él se casó, se asentó y participó en la vida común[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Participó en la vida común» procura reflejar el giro idiomático ἐκοινώνησεν βίου. También podría traducirse «compartió la vida común» o «participó en la vida»; la frase apunta a una inserción en la vida doméstica y social normal.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρεκάλεσεν
  english_pob_choice: urged
  chosen_spanish: lo exhortó
  alternatives_spanish:
  - lo urgió
  - le instó
  - lo persuadió
  lexicon: BDAG
  rationale: El verbo expresa una insistencia persuasiva y no una simple solicitud. «Lo exhortó» comunica bien la presión moral o exhortativa del contexto narrativo sin sonar excesivamente coloquial.
- source_word: γῆμαι
  english_pob_choice: to marry
  chosen_spanish: casarse
  alternatives_spanish:
  - contraer matrimonio
  - tomar esposa
  lexicon: LSJ
  rationale: El infinitivo aoristo significa casarse. «Casarse» es natural en español actual y no añade un matiz de género más específico que el griego por sí mismo.
- source_word: παιδοποιήσασθαι
  english_pob_choice: have children
  chosen_spanish: tener hijos
  alternatives_spanish:
  - procrear hijos
  - engendrar hijos
  lexicon: LSJ
  rationale: El verbo alude a producir descendencia. «Tener hijos» mantiene el sentido amplio y resulta idiomático en español moderno.
- source_word: ἐγάμησεν
  english_pob_choice: he married
  chosen_spanish: se casó
  alternatives_spanish:
  - tomó esposa
  - contrajo matrimonio
  lexicon: BDAG
  rationale: La forma narrativa de γαμέω se traduce con claridad como «se casó». Es más natural que una calca y conserva el hecho de la acción completa.
- source_word: εὐστάθησεν
  english_pob_choice: settled down
  chosen_spanish: se estableció
  alternatives_spanish:
  - adquirió estabilidad
  - se afirmó
  lexicon: LSJ
  rationale: El verbo sugiere volverse estable o establecido. «Se estableció» conserva la idea de asentarse en una vida doméstica y social estable, sin forzar un tono demasiado interpretativo.
- source_word: ἐκοινώνησεν βίου
  english_pob_choice: shared in common life
  chosen_spanish: participó en la vida común
  alternatives_spanish:
  - participó de la vida
  - compartió la vida común
  - entró en la vida ordinaria
  lexicon: LSJ
  rationale: κοινωνέω con βίος expresa participación en el curso común de la vida. «Vida común» mantiene la correspondencia léxica con el audit trail inglés y sugiere vida social/doméstica normal sin introducir una glosa ajena.
translation_notes:
  revision_awareness: 'La revisión inglesa reciente sustituyó «ordinary life» por «common life» para acercarse más a ἐκοινώνησεν βίου. La versión española sigue esa decisión con «vida común», evitando una paráfrasis más libre y manteniendo el orden narrativo: exhortación, matrimonio, establecimiento y participación en la vida común.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» por norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evita «siervo»/«esclavo» porque no interviene δοῦλος en este pasaje.
  - No se introduce terminología eclesiástica ajena; el verso describe una secuencia doméstica y social con léxico directo.
