id: ZEP.1.9
reference: Zephaniah 1:9
source:
  edition: WLC
  text: וּ/פָקַדְתִּ֗י עַ֧ל כָּל הַ/דּוֹלֵ֛ג עַל הַ/מִּפְתָּ֖ן בַּ/יּ֣וֹם הַ/ה֑וּא הַֽ/מְמַלְאִ֛ים בֵּ֥ית אֲדֹנֵי/הֶ֖ם חָמָ֥ס וּ/מִרְמָֽה־־׃ס
translation:
  text: And on that day I will punish all who leap over the threshold[b][a], who fill their masters’ house with violence and deceit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who skip over the threshold.' The phrase may refer to a known ritual or superstitious practice, possibly echoing the threshold taboo in 1 Samuel 5:5; others take it more figuratively of aggressive intruders.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'their masters’ house'; some translations read 'their lord’s house.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפָקַדְתִּי
  chosen: I will punish
  alternatives:
  - I will visit judgment on
  - I will attend to
  lexicon: HALOT
  rationale: In prophetic judgment contexts, פקד commonly carries the sense of calling to account or punishing. 'Punish' makes the judicial force clear in natural English.
- source_word: הַדּוֹלֵג עַל הַמִּפְתָּן
  chosen: who leaps over the threshold
  alternatives:
  - who skips over the threshold
  - who jumps over the threshold
  lexicon: HALOT
  rationale: דָּלַג means to leap or spring. The phrase is likely a concrete practice alluding to superstitious or cultic behavior, so the vivid literal image should be preserved rather than interpreted away.
- source_word: הַמִּפְתָּן
  chosen: the threshold
  alternatives:
  - the doorstep
  - the sill
  lexicon: HALOT
  rationale: מִפְתָּן denotes a threshold or doorway sill. 'Threshold' is the standard and most precise English equivalent.
- source_word: בַּיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - in that day
  lexicon: HALOT
  rationale: Standard prophetic temporal formula. 'On that day' is idiomatic modern English and preserves the eschatological/judgment tone.
- source_word: הַמְמַלְאִים
  chosen: those who fill
  alternatives:
  - who are filling
  lexicon: HALOT
  rationale: The participle functions substantivally, identifying the people characterized by this action. 'Those who fill' captures the ongoing/habitual sense.
- source_word: בֵּית אֲדֹנֵיהֶם
  chosen: their masters’ house
  alternatives:
  - the house of their lord
  - their lord's house
  lexicon: HALOT
  rationale: אֲדֹנֵיהֶם is plural in form with 3mp suffix, naturally rendered 'their masters.' This likely refers to social superiors whom these agents enrich by wrongdoing. 'Masters' better reflects the plural morphology than the singular 'lord.'
- source_word: חָמָס
  chosen: violence
  alternatives:
  - wrongdoing
  - oppression
  lexicon: HALOT
  rationale: חָמָס often denotes violent wrongdoing or ruthless injustice. 'Violence' is the most direct and common rendering, while still allowing moral breadth.
- source_word: מִרְמָה
  chosen: deceit
  alternatives:
  - fraud
  - treachery
  lexicon: HALOT
  rationale: מִרְמָה denotes deceit, fraud, or treachery. 'Deceit' pairs well with 'violence' and preserves the moral category without over-specifying the mechanism.
