  chosen_spanish: y Mesulam
  alternatives_spanish:
  - Meshullam
  lexicon: HALOT
  rationale: La conjunción וּ se conserva como «y» para cerrar la serie nominal. מְשֻׁלָּם es un nombre propio y se translitera al español como Mesulam.
