translation:
  language: es
  text: y que él les conceda un corazón fiel[a] para adorarlo y para hacer su voluntad, con un gran corazón y con un alma dispuesta;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un corazón de fe» o «un corazón creyente». La expresión griega καρδίαν πίστιν puede entenderse como énfasis en la fe o en la fidelidad; el texto principal opta por «corazón fiel» porque el contexto subraya la adoración y la obediencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: δοίη
  english_pob_choice: may he give
  chosen_spanish: que él les conceda
  alternatives_spanish:
  - que les dé
  - quiera darles
  - pueda darles
  lexicon: LSJ
  rationale: El optativo expresa deseo o plegaria; en español, «que él les conceda» comunica bien la petición benedictoria sin añadir un sujeto explícito distinto del contexto. «Conceder» conserva el matiz de favor otorgado en una súplica.
- source_word: καρδίαν πίστιν
  english_pob_choice: a faithful heart
  chosen_spanish: un corazón fiel
  alternatives_spanish:
  - un corazón de fe
  - un corazón creyente
  - un corazón fiel y creyente
  lexicon: LSJ
  rationale: La combinación une καρδίαν con πίστιν en un sentido que puede ser fidelidad, fe o creencia. Dado que el contexto inmediato habla de adorar y cumplir la voluntad divina, «corazón fiel» preserva la fuerza de lealtad/constancia que el inglés POB documenta, mientras mantiene abiertas las otras lecturas en la nota.
- source_word: σέβεσθαι
  english_pob_choice: to worship
  chosen_spanish: adorarlo
  alternatives_spanish:
  - venerarlo
  - rendirle culto
  - reverenciarlo
  lexicon: LSJ
  rationale: En este contexto de oración y devoción religiosa, el verbo se entiende como culto reverente. «Adorarlo» es la equivalencia española más clara y natural para la acción religiosa requerida.
- source_word: τὰ θελήματα
  english_pob_choice: his will
  chosen_spanish: su voluntad
  alternatives_spanish:
  - sus voluntades
  - lo que él quiere
  - sus deseos
  lexicon: LSJ
  rationale: Aunque el griego está en plural, en español el colectivo singular «su voluntad» es idiomático para la voluntad divina y evita una rigidez artificial. Se conserva el sentido general de lo que Dios quiere.
- source_word: καρδίᾳ μεγάλῃ
  english_pob_choice: with a great heart
  chosen_spanish: con un gran corazón
  alternatives_spanish:
  - con un corazón grande
  - con un corazón noble
  - de todo corazón
  lexicon: LSJ
  rationale: La imagen de amplitud o grandeza del corazón se puede verter de modo bastante literal. «Con un gran corazón» suena natural en español y conserva la metáfora sin reemplazarla por un modismo distinto como «de todo corazón».
- source_word: ψυχῇ βουλομένῃ
  english_pob_choice: a willing soul
  chosen_spanish: con un alma dispuesta
  alternatives_spanish:
  - con un alma dispuesta a querer
  - con un espíritu dispuesto
  - con una voluntad dispuesta
  lexicon: LSJ
  rationale: βουλομένῃ expresa disposición, voluntad o intención. «Alma dispuesta» conserva el campo antropológico de ψυχή y traduce bien la actitud voluntariosa requerida; el añadido de «con» mantiene el paralelo con la frase anterior.
theological_decisions:
- issue: Valor de πίστις en un contexto de obediencia religiosa
  english_pob_reading: faithful heart
  chosen_spanish_reading: corazón fiel
  alternative_spanish_readings:
  - corazón de fe
  - corazón creyente
  rationale: La lectura inglesa privilegia la fidelidad/constancia porque el versículo une la disposición interior con adorar y obedecer. En español, «corazón fiel» preserva esa tensión entre fe y lealtad sin reducir πίστις a mero asentimiento mental.
  doctrine_reference: 'DOCTRINE.md: πίστις-family contested terms; translation philosophy on preserving semantic range'
- issue: Plural griego τὰ θελήματα y singular idiomático español
  english_pob_reading: his will
  chosen_spanish_reading: su voluntad
  alternative_spanish_readings:
  - sus voluntades
  - lo que él quiere
  rationale: El plural griego puede reflejar un estilo semítico o enfatizar diversos actos de querer, pero en español el singular colectivo comunica la idea con naturalidad. Se mantiene la referencia al querer divino sin introducir una pluralidad que resultaría extraña.
  doctrine_reference: Principios de equivalencia óptima; uso idiomático español en expresiones de voluntad divina
translation_notes:
  revision_awareness: Pasaje revisado con atención al contexto devocional del griego y al audit trail inglés; no se requieren cambios ulteriores respecto al pass más reciente, pero el cierre mantiene explícita la alternancia semántica de πίστις para evitar aplanar la tensión entre fe y fidelidad.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto base lo exige; aquí no aparece el nombre divino explícito, por lo que se mantiene el pronombre implícito del contexto.
  - Se conserva «corazón» y «alma» como antropología diferenciada, sin normalizarlas a un solo término.
  - Se evita «Cristo»/«Mesías» porque el versículo no contiene Χριστός ni lenguaje mesiánico explícito.
  - La puntuación y el orden buscan una cadencia oracional natural en español sin perder la estructura paralela del griego.
