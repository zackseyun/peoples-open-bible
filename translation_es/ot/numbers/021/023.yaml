- from: Pero Sihón no permitió a Israel pasar por su territorio[a]. Así que Sihón reunió a todo su pueblo y salió al encuentro de Israel en el desierto[b]. Llegó a Jahaz[c] y peleó contra Israel.
  to: Pero Sihón no permitió a Israel pasar por su territorio[a]. Así que Sihón reunió a todo su pueblo[b] y salió al encuentro de Israel en el desierto. Vino a Jahaz[c] y peleó contra Israel.
  rationale: Se eliminó la nota innecesaria sobre «en el desierto» y se restauró la nota importante sobre «todo su pueblo», en línea con el rastro auditado inglés y con el hebreo. También se reancló correctamente la nota del topónimo Jahaz. Se mantuvo «territorio» y «peleó contra Israel» por fidelidad y naturalidad; se ajustó «Llegó» a «Vino» para reflejar más de cerca וַיָּבֹא sin volver el español artificioso.
