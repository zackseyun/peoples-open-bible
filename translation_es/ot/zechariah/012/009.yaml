translation:
  language: es
  text: Y en aquel día buscaré destruir a todas las naciones que vengan contra Jerusalén[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «me dispondré a destruir». El verbo hebreo puede enfatizar una intención decidida, no solo la idea de buscar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And ... it will happen / And ... it will be
  chosen_spanish: Y acontecerá
  alternatives_spanish:
  - Y será
  - Y sucederá
  lexicon: HALOT
  rationale: La fórmula profética introduce un evento futuro. «Acontecerá» preserva ese valor formulístico en español con dignidad y naturalidad, sin sonar tan arcaico como «sucederá» ni tan abstracto como «será».
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - aquel día
  lexicon: HALOT
  rationale: La expresión temporal profética se rinde de forma estable con «en aquel día». Mantiene la referencia escatológica/retórica sin precisar más de lo que el hebreo dice.
- source_word: אֲבַקֵּשׁ
  english_pob_choice: I will seek
  chosen_spanish: me dispondré a
  alternatives_spanish:
  - buscaré
  - me propondré
  lexicon: HALOT
  rationale: Aquí בקש en piel expresa determinación dirigida a una acción, no solo «buscar» en sentido literal. «Me dispondré a» conserva la idea de intención resuelta que el audit trail inglés destacó con «set myself to».
- source_word: לְהַשְׁמִיד
  english_pob_choice: to destroy
  chosen_spanish: destruir
  alternatives_spanish:
  - aniquilar
  - exterminar
  lexicon: HALOT
  rationale: El infinitivo causativo de שׁמד denota destrucción contundente. «Destruir» es la opción más natural y fiel en español; «aniquilar» o «exterminar» intensifican más de lo que el texto exige.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todas
  alternatives_spanish:
  - todos los
  - cada una de las
  lexicon: HALOT
  rationale: Con «las naciones», el plural colectivo se expresa naturalmente como «todas». Conserva el alcance total del hebreo.
- source_word: הַגּוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - las naciones gentiles
  lexicon: HALOT
  rationale: En este contexto bélico y nacional, «naciones» reproduce bien גוים sin introducir el contraste técnico posterior de «gentiles».
- source_word: הַבָּאִים
  english_pob_choice: that come
  chosen_spanish: que vengan
  alternatives_spanish:
  - que vienen
  - que están viniendo
  lexicon: HALOT
  rationale: El participio describe a las naciones por su movimiento hostil hacia Jerusalén. En español, una relativa con subjuntivo («que vengan») expresa bien ese rasgo de acción dirigida en este contexto.
- source_word: עַל יְרוּשָׁלִָם
  english_pob_choice: against Jerusalem
  chosen_spanish: contra Jerusalén
  alternatives_spanish:
  - sobre Jerusalén
  - hacia Jerusalén
  lexicon: HALOT
  rationale: Con verbos de movimiento hostil, עַל tiene fuerza adversativa. «Contra Jerusalén» hace explícita esa hostilidad de modo natural en español.
theological_decisions:
- issue: Voz divina en primera persona
  english_pob_reading: 'First-person divine speech is preserved directly: ''I will seek to destroy.'''
  chosen_spanish_reading: 'La primera persona divina se mantiene directamente: «me dispondré a destruir».'
  alternative_spanish_readings:
  - «yo buscaré destruir»
  - «yo me propondré destruir»
  rationale: El hebreo presenta a Yahvé como hablante y agente del juicio. El español conserva esa agencia explícita, sin convertirla en un giro impersonal ni suavizar el verbo de propósito.
  doctrine_reference: Translation philosophy §1, §3
- issue: Fórmula profética/escatológica
  english_pob_reading: Rendered as 'on that day' without expanding its referent.
  chosen_spanish_reading: Se mantiene la fórmula profética «en aquel día» sin precisar su cumplimiento.
  alternative_spanish_readings:
  - «en ese día»
  rationale: La frase tiene carga profética, pero el texto no define cronología. Se conserva la ambigüedad productiva del hebreo sin imponer un esquema escatológico particular.
  doctrine_reference: Affirmations; Translation philosophy §3
translation_notes:
  revision_awareness: El texto base en inglés fue revisado y quedó sin cambios; la presente propuesta sigue ese estado estable y traslada sus decisiones léxicas principales al español con adaptación natural.
  spanish_consistency_notes:
  - Se usó «Yahvé» para la voz divina según los defaults del proyecto, aunque en este versículo el nombre no aparece explícitamente.
  - Se mantuvo el valor colectivo de «las naciones» sin introducir «gentiles», que sería una carga posterior no exigida por el hebreo.
  - El participio hebreo se resolvió con relativa en subjuntivo («que vengan») para conservar el matiz descriptivo y hostil en español.
  - «Contra Jerusalén» comunica mejor la fuerza adversativa de עַל en este contexto militar.
