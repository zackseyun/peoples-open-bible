revisions:
- from: Hijos e hijas estaban en cautiverio malo[a], su cuello en un sello[b], con una marca entre las naciones.
  to: Hijos e hijas estaban en cautiverio funesto[a], sus cuellos bajo sello[b], con una marca entre las naciones.
  rationale: Se ajusta el español para equilibrar fidelidad y legibilidad. «Funesto» evita el calco poco natural «malo» sin resolver excesivamente πονηρᾷ como «cruel». «Sus cuellos bajo sello» conserva la imagen condensada de ἐν σφραγῖδι y mejora la inteligibilidad frente a «su cuello en un sello». Se pluraliza «cuellos» por naturalidad española, en línea con el referente plural del verso.
