translation:
  language: es
  text: Bendita sea la gloria del Señor, porque él mismo es nuestro rey.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εὐλογημένη
  english_pob_choice: Blessed be
  chosen_spanish: Bendita sea
  alternatives_spanish:
  - Bendecida sea
  - Alabada sea
  lexicon: BDAG
  rationale: La forma griega funciona como fórmula de bendición/doxología con cópula implícita. En español, «Bendita sea» reproduce bien ese valor benedictorio sin sonar forzado, y mantiene el tono litúrgico natural.
- source_word: δόξα
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - majestad
  - honor
  lexicon: BDAG
  rationale: «Gloria» es el equivalente directo y más estable en español para δόξα en este contexto de alabanza y esplendor divino.
- source_word: Κυρίου
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - el Señor Dios
  lexicon: BDAG
  rationale: Aquí el texto griego dice κύριος; siguiendo el audit trail inglés, se conserva «Señor» como renderización de κύριος, no como sustituto tipográfico del nombre divino hebreo.
- source_word: ὅτι
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: En español, «porque» expresa con claridad la relación explicativa/causal que el inglés POB da con «for».
- source_word: αὐτὸς
  english_pob_choice: he himself
  chosen_spanish: él mismo
  alternatives_spanish:
  - él
  - él solo
  lexicon: BDAG
  rationale: El pronombre es intensivo; «él mismo» preserva ese énfasis sin añadir una exclusividad no explicitada en el griego.
- source_word: βασιλεὺς
  english_pob_choice: king
  chosen_spanish: rey
  alternatives_spanish:
  - gobernante
  - monarca
  lexicon: BDAG
  rationale: «Rey» es la traducción primaria y más natural en español para βασιλεὺς, y mantiene la confesión real del versículo.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés están en alta concordancia; no se registran revisiones textuales ni decisiones de variante. La versión española conserva el paralelismo doxológico y la fuerza intensiva de αὐτὸς.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος, conforme al audit trail inglés y sin introducir la convención de pequeñas mayúsculas.
  - Se conserva el tono de bendición con una estructura natural en español («Bendita sea...»).
  - No se añade puntuación interpretativa más allá de la coma causal del griego.
