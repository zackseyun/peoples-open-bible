review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura principal del hebreo: fórmula de nombramiento, topónimo transliterado, causalidad con כי, y el nombre divino como Yahvé. Sin embargo, añade indebidamente ‘allí’, que no está en el texto fuente, y la secuencia ‘Así llamó el nombre de aquel lugar’ suena calcada y poco natural en español. También la nota ‘ardor o quemazón’ se aleja del sentido más directo de ‘burning/arder’.'
  spanish_quality_summary: El español es generalmente claro, pero la frase inicial necesita naturalización sin perder la fórmula hebrea. ‘Le puso a aquel lugar el nombre de...’ preserva mejor el sentido formal de nombrar y suena idiomático. Debe eliminarse ‘allí’ por ser una adición. La nota puede simplificarse para reflejar mejor la relación con ‘arder’ o ‘incendio’.
  glossary_alignment: Alineado con la terminología del proyecto en el uso de ‘Yahvé’. El topónimo transliterado ‘Taberá’ es aceptable en español. No hay conflictos con otros términos doctrinales. La nota debe reflejar con más precisión el juego léxico con el verbo בער (‘arder/quemarse’).
  issues:
  - severity: medium
    issue: Adición de ‘allí’
    rationale: El hebreo no contiene un adverbio locativo equivalente; la cláusula dice simplemente que el fuego de Yahvé ardió entre ellos.
  - severity: medium
    issue: 'Inicio demasiado calcado: ‘Así llamó el nombre de aquel lugar’'
    rationale: Aunque intenta preservar la fórmula hebrea, en español resulta poco natural. Puede mantenerse la formalidad con ‘Le puso a aquel lugar el nombre de...’ sin perder fidelidad.
  - severity: low
    issue: Nota al pie con ‘ardor o quemazón’
    rationale: La documentación inglesa habla de ‘burning’. En español, ‘suena como “arder”’ o ‘“incendio”’ comunica mejor el vínculo léxico sin sobreexplicar.
  revised_spanish_text: Así le puso a aquel lugar el nombre de Taberá[a], porque el fuego de Yahvé ardió entre ellos.
