translation:
  language: es
  text: Aram desde el oriente y los filisteos desde el occidente[a] devoraron a Israel a boca llena[b]. Con todo esto, su ira no se ha apartado, y su mano todavía está extendida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo 'desde atrás'; en este contexto, emparejado con 'desde el oriente', probablemente significa 'desde el occidente'.
    reason: lexical_alternative
  - marker: b
    text: O 'a boca llena'; la expresión hebrea comunica voracidad o consumo total.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲרָם
  english_pob_choice: Aram
  chosen_spanish: Aram
  alternatives_spanish:
  - Siria
  lexicon: HALOT
  rationale: Se conserva el nombre propio transliterado para reflejar directamente el etnónimo hebreo y mantener la transparencia del texto fuente.
- source_word: מִקֶּדֶם
  english_pob_choice: from the east
  chosen_spanish: desde el oriente
  alternatives_spanish:
  - desde el este
  - desde el este/este lado
  lexicon: HALOT
  rationale: En este paralelismo geográfico con 'desde el occidente', 'oriente' expresa naturalmente la dirección y mantiene la relación semántica con קדם.
- source_word: פְלִשְׁתִּים
  english_pob_choice: the Philistines
  chosen_spanish: los filisteos
  alternatives_spanish:
  - los filisteos
  lexicon: HALOT
  rationale: Nombre étnico estándar en español bíblico; no requiere transliteración.
- source_word: מֵאָחוֹר
  english_pob_choice: from the west
  chosen_spanish: desde el occidente
  alternatives_spanish:
  - desde atrás
  - desde la retaguardia
  - desde el oeste
  lexicon: HALOT
  rationale: Aunque el hebreo significa literalmente 'desde atrás', en el paralelismo con 'desde el oriente' el sentido direccional es occidental. 'Occidente' preserva esa relación y suena natural en español bíblico.
- source_word: וַיֹּאכְלוּ
  english_pob_choice: devoured
  chosen_spanish: devoraron
  alternatives_spanish:
  - se comieron
  - consumieron
  lexicon: HALOT
  rationale: El verbo es metafórico para una destrucción hostil; 'devoraron' conserva la fuerza imagética sin volver el español torpe o demasiado literal.
- source_word: בְּכָל פֶּה
  english_pob_choice: with full mouth
  chosen_spanish: con boca llena
  alternatives_spanish:
  - con toda la boca
  - con plena voracidad
  - con boca abierta
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y sugiere voracidad/completitud. 'Con boca llena' mantiene la imagen y comunica bien el valor intensivo, sin explicitar demasiado una interpretación.
- source_word: בְּכָל זֹאת
  english_pob_choice: For all this
  chosen_spanish: Con todo esto
  alternatives_spanish:
  - A pesar de todo esto
  - Pese a todo esto
  lexicon: HALOT
  rationale: Fórmula discursiva de reproche/jucio que introduce la persistencia del castigo. 'Con todo esto' es natural y fiel al enlace argumental.
- source_word: לֹא שָׁב אַפּוֹ
  english_pob_choice: his anger has not turned away
  chosen_spanish: su ira no se ha apartado
  alternatives_spanish:
  - su furor no se ha apartado
  - su ira no se ha vuelto atrás
  lexicon: HALOT
  rationale: אַף se entiende idiomáticamente como 'ira'. 'Se ha apartado' conserva la imagen de 'volver atrás' sin caer en un calco poco natural. 'Ira' comunica el juicio divino con claridad.
- source_word: וְעוֹד יָדוֹ נְטוּיָה
  english_pob_choice: and his hand is still stretched out
  chosen_spanish: y su mano todavía está extendida
  alternatives_spanish:
  - y su mano sigue extendida
  - y su mano aún está extendida
  lexicon: HALOT
  rationale: La imagen profética de la mano extendida indica acción/juicio continuado. 'Todavía está extendida' es claro y formal, y conserva la metáfora.
theological_decisions:
- issue: Referente implícito de 'su' en la frase del juicio
  english_pob_reading: The pronouns refer to God, expressing continuing divine judgment against Israel.
  chosen_spanish_reading: Los posesivos 'su' remiten implícitamente a Dios, expresando la continuidad del juicio divino contra Israel.
  alternative_spanish_readings:
  - Dejar el referente más implícito sin precisar el sentido teológico.
  - Sustituir por 'la ira de Yahvé' en el texto principal.
  rationale: El contexto del refrán en Isaías 9 apunta claramente a la persistencia de la ira y la mano de Yahvé. Mantener los posesivos concuerda con el hebreo y conserva el patrón refránico sin sobreexplicar en el texto principal.
  doctrine_reference: Isaías 9:12, 17, 21; juicio divino reiterado en el refrán profético.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el último pasaje auditado en inglés: conserva la lectura direccional de ''from the east / from the west'', la metáfora de ''devoured'' y el refrán final con ''his anger has not turned away, and his hand is still stretched out''. Se adapta al español con equivalencias naturales (''oriente/occidente'', ''devoraron'', ''su ira no se ha apartado'').'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' en la serie POB cuando el texto lo requiera, pero en este versículo el hebreo usa posesivos implícitos; por eso no se explicita el nombre en el cuerpo del versículo.
  - '''Occidente'' se usa como equivalente contextual de ''from the west'' para conservar el paralelismo geográfico con ''oriente''.'
  - '''Boca llena'' preserva la metáfora idiomática sin reemplazarla por una explicación extensa en el texto principal.'
  - La puntuación reproduce el tono sentencioso del refrán profético con dos miembros coordinados por 'y'.
