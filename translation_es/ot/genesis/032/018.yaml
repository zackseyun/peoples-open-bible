    issue: La tercera pregunta vierte וּלְמִי como «de quién son» en vez de conservar la construcción dativa de pertenencia.
    rationale: Aunque «de quién son» expresa posesión, el hebreo repite לְמִי y el POB en inglés decidió reflejar esa forma con «to whom ... belong». En español, «¿a quién pertenecen estos...?» preserva mejor la repetición y el paralelismo.
  - severity: low
    issue: «que van delante de ti» añade un matiz verbal no explícito.
    rationale: לְפָנֶיךָ significa literalmente «delante de ti / ante ti». La nota ya puede explicar el sentido contextual de preceder; no hace falta introducir «van» en el texto principal.
