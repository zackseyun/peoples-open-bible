translation:
  language: es
  text: Desde el día en que saqué a mi pueblo Israel de Egipto, no he escogido una ciudad de entre todas las tribus de Israel para edificar una casa para que mi nombre esté allí[a]; pero[b] escogí a David para estar al frente de mi pueblo Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Una casa para que mi nombre esté allí» reproduce un modismo hebreo para un santuario asociado con el nombre y la presencia de Yahvé; es decir, el templo.
    reason: cultural_note
  - marker: b
    text: 'O, «y escogí a David». La conjunción hebrea puede leerse de manera coordinada, pero el contexto favorece el contraste: no se había escogido ninguna ciudad, mientras que sí se había escogido a David.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹצֵאתִי
  english_pob_choice: I brought ... out
  chosen_spanish: saqué
  alternatives_spanish:
  - hice salir
  - saqué fuera
  lexicon: HALOT
  rationale: El הִפְעִיל de יצא expresa causar salida; en español, 'saqué' comunica con naturalidad la acción causativa del éxodo sin perder el sentido del original.
- source_word: עַמִּי אֶת־יִשְׂרָאֵל
  english_pob_choice: my people Israel
  chosen_spanish: mi pueblo Israel
  alternatives_spanish:
  - mi pueblo, Israel
  - mi pueblo, es decir, Israel
  lexicon: HALOT
  rationale: La apposición identifica a Israel como el pueblo perteneciente a Yahvé. 'Mi pueblo Israel' conserva esa relación compacta y el tono de pacto del hebreo.
- source_word: בָחַרְתִּי
  english_pob_choice: I chose
  chosen_spanish: he escogido / escogí
  alternatives_spanish:
  - he elegido
  - elegí
  lexicon: HALOT
  rationale: בחר expresa elección/electividad divina. En la primera cláusula el perfecto español ('no he escogido') refleja bien el valor resultante desde aquel día; en la cláusula final, el aoristo contextualizado ('escogí') mantiene la contraposición con David.
- source_word: בְעִיר מִכֹּל שִׁבְטֵי יִשְׂרָאֵל
  english_pob_choice: no city from all the tribes of Israel
  chosen_spanish: una ciudad de entre todas las tribus de Israel
  alternatives_spanish:
  - una ciudad entre todas las tribus de Israel
  - una ciudad de cualquiera de las tribus de Israel
  lexicon: HALOT
  rationale: La construcción hebrea es comprimida y relaciona 'ciudad' con 'de entre todas las tribus'. 'De entre' preserva mejor la selección excluyente que un simple 'entre'.
- source_word: לִבְנוֹת בַּיִת
  english_pob_choice: to build a house
  chosen_spanish: para edificar una casa
  alternatives_spanish:
  - para construir una casa
  - para edificar un templo
  lexicon: HALOT
  rationale: בַּיִת significa literalmente 'casa'. 'Edificar una casa' conserva el idioma bíblico y evita sustituirlo por 'templo' en el cuerpo del texto.
- source_word: לִהְיוֹת שְׁמִי שָׁם
  english_pob_choice: for my name to be there
  chosen_spanish: para que mi nombre esté allí
  alternatives_spanish:
  - para que mi nombre permanezca allí
  - para que allí esté mi nombre
  lexicon: HALOT
  rationale: El infinitivo con היה se expresa de manera natural con subjuntivo final en español. 'Mi nombre esté allí' conserva la idiomática hebrea sin explicar de más la noción de presencia.
- source_word: וָאֶבְחַר בְּדָוִד
  english_pob_choice: but I chose David
  chosen_spanish: pero escogí a David
  alternatives_spanish:
  - y escogí a David
  - sino que escogí a David
  lexicon: HALOT
  rationale: El waw se entiende mejor en contexto como adversativo, en contraste con la no elección de una ciudad. 'Pero' reproduce esa relación discursiva de forma natural.
- source_word: לִהְיוֹת עַל־עַמִּי יִשְׂרָאֵל
  english_pob_choice: to be over my people Israel
  chosen_spanish: para que estuviera sobre mi pueblo Israel
  alternatives_spanish:
  - para gobernar sobre mi pueblo Israel
  - para estar al frente de mi pueblo Israel
  lexicon: HALOT
  rationale: La expresión 'estar sobre' conserva la literalidad del hebreo y evita introducir 'gobernar' como precisión interpretativa no explícita en la forma verbal.
theological_decisions:
- issue: ‘Casa para mi nombre’ como idiomático del santuario
  english_pob_reading: Retain the Hebrew idiom 'house for my name' rather than substituting 'temple' or expanding to a theological paraphrase.
  chosen_spanish_reading: Conservar 'una casa para que mi nombre esté allí' y no reemplazarlo por 'templo'.
  alternative_spanish_readings:
  - una casa para mi nombre
  - un templo para mi nombre
  - una casa donde habite mi nombre
  rationale: La frase refleja el patrón veterotestamentario del lugar donde Yahvé pone su nombre y su presencia pactal. Mantener 'casa' preserva la tensión entre la literalidad del sustantivo y el sentido cultual, sin borrar el matiz teológico documentado por la POB inglesa.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Contraste entre la no elección de una ciudad y la elección de David
  english_pob_reading: Render waw before 'I chose David' as adversative 'but.'
  chosen_spanish_reading: Usar 'pero' para marcar el contraste entre la falta de elección de una ciudad y la elección de David.
  alternative_spanish_readings:
  - y escogí a David
  - sin embargo, escogí a David
  rationale: 'El versículo contrapone dos actos divinos: todavía no se había elegido una ciudad, pero David sí había sido elegido. ''Pero'' hace explícita la relación de contraste sin añadir contenido doctrinal ajeno al texto.'
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y coincide con la revisión del POB inglés que cambió una negación absoluta de elección por la forma más precisa 'no he escogido una ciudad'. También conserva el contraste discursivo entre la no elección de una ciudad y la elección de David, y mantiene el idioma 'casa para mi nombre' sin sustituirlo por una paráfrasis de 'templo'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino cuando aparezca en contextos equivalentes, aunque en este versículo el hebreo presenta la expresión de 'mi nombre'.
  - '''Casa'' se usa aquí en sentido cultual, no doméstico; la nota aclara el posible equivalente ''templo''.'
  - '''Escogí'' y ''he escogido'' se distribuyen según el tiempo/aspecto español para reflejar la continuidad del primer enunciado y la clausura contrastiva del segundo.'
