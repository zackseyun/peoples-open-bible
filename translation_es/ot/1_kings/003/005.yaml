translation:
  language: es
  text: 'En Gabaón Yahvé se apareció a Salomón en un sueño de noche[a], y Dios dijo: «Pide qué debo darte».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «en el sueño de la noche»; es decir, en un sueño ocurrido durante la noche.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/גִבְע֗וֹן
  english_pob_choice: At Gibeon
  chosen_spanish: En Gabaón
  alternatives_spanish:
  - En Gibeón
  lexicon: HALOT
  rationale: La preposición ב indica ubicación. En español, la forma toponímica más natural y reconocible es «Gabaón», manteniendo el valor locativo sin forzar una construcción inglesa.
- source_word: נִרְאָ֧ה
  english_pob_choice: appeared
  chosen_spanish: se apareció
  alternatives_spanish:
  - apareció
  - se reveló
  lexicon: HALOT
  rationale: El nifal de ראה aquí es la fórmula habitual para una aparición divina. «Se apareció» conserva ese valor teofánico en español con naturalidad.
- source_word: יְהֹוָ֛ה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el valor del nombre propio divino YHWH conforme al criterio del proyecto en español: «Yahvé». No se enmascara con «SEÑOR».'
- source_word: אֶל שְׁלֹמֹ֖ה
  english_pob_choice: to Solomon
  chosen_spanish: a Salomón
  alternatives_spanish:
  - hacia Salomón
  - ante Salomón
  lexicon: HALOT
  rationale: אֶל marca dirección/recipiente de la aparición. «A Salomón» reproduce esa relación de manera directa y natural.
- source_word: בַּ/חֲל֣וֹם הַ/לָּ֑יְלָה
  english_pob_choice: in a dream at night
  chosen_spanish: en un sueño de noche
  alternatives_spanish:
  - en un sueño nocturno
  - en el sueño de la noche
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «en el sueño de la noche». «De noche» preserva mejor la relación genitiva y el sabor semítico que «at night», sin perder inteligibilidad en español.
- source_word: וַ/יֹּ֣אמֶר
  english_pob_choice: and ... said
  chosen_spanish: y ... dijo
  alternatives_spanish:
  - entonces ... dijo
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración. «Y ... dijo» es suficiente y no añade matiz temporal extra.
- source_word: אֱלֹהִ֔ים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - el Señor
  lexicon: HALOT
  rationale: Se conserva el cambio léxico desde YHWH a אֱלֹהִים, distinguiendo la designación de «Yahvé» de la siguiente mención como «Dios».
- source_word: שְׁאַ֖ל
  english_pob_choice: Ask
  chosen_spanish: Pide
  alternatives_spanish:
  - Pregunta
  - Pide lo que quieras
  lexicon: HALOT
  rationale: El imperativo admite «pedir/solicitar» en español cuando sigue un complemento de objeto. «Pide» mantiene la apertura de la invitación divina y funciona con naturalidad antes de la cláusula siguiente.
- source_word: מָ֥ה אֶתֶּן לָֽ/ךְ
  english_pob_choice: what I should give you
  chosen_spanish: lo que yo te daré
  alternatives_spanish:
  - qué te daré
  - lo que yo te dé
  lexicon: HALOT
  rationale: El hebreo dice literalmente «qué te daré». En español, tras «Pide», «lo que yo te daré» conserva la estructura de objeto pedido y la promesa de concesión sin volverla demasiado forzada.
theological_decisions:
- issue: Renderización del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente יהוה. En español POB se evita la sustitución por un título en versales y se preserva el nombre propio divino como «Yahvé» según la directriz del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Mantener el cambio léxico de יהוה a אֱלֹהִים dentro del mismo versículo
  english_pob_reading: Render יהוה as 'the LORD' and אֱלֹהִים as 'God'
  chosen_spanish_reading: Yahvé ... Dios
  alternative_spanish_readings:
  - Dios ... Dios
  - Yahvé ... Yahvé
  rationale: La alternancia entre dos designaciones divinas está presente en el hebreo y no debe armonizarse. «Yahvé» y «Dios» conservan esa tensión lexical y permiten auditar la transición sin suavizarla.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de «by night» a «at night» por naturalidad. En español se optó por «de noche», que conserva mejor la estructura semítica del hebreo («en el sueño de la noche») y sigue siendo idiomático. Se mantuvo además la distinción entre יהוה y אֱלֹהִים, tal como refleja el audit trail.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה conforme al estándar del proyecto en español.
  - Se conserva «Dios» para אֱלֹהִים para reflejar el cambio léxico del hebreo.
  - «Gabaón» mantiene el topónimo bíblico en su forma española habitual.
  - La frase «sueño de noche» queda anclada con nota para transparentar el hebraísmo subyacente.
  - Se evita la forma «SEÑOR» para el nombre divino, por consistencia con la política del proyecto.
