translation:
  language: es
  text: 'Para el maestro de coro: según «Lirio del Testimonio»[a]. Mictam[b] de David[c], para enseñar.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente: «al tono de “Lirio del Testimonio”». El hebreo probablemente conserva un título musical o litúrgico, pero su sentido exacto es incierto.'
    reason: lexical_alternative
  - marker: b
    text: «Mictam» es un rótulo de género hebreo de sentido incierto; algunos lo toman como designación musical o literaria más que como palabra traducible.
    reason: lexical_alternative
  - marker: c
    text: «De David» también puede significar «por David» o «para David»; la construcción hebrea puede indicar autoría, asociación o dedicación.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Para el maestro de coro
  alternatives_spanish:
  - Para el director de música
  - Para el líder del coro
  lexicon: HALOT
  rationale: En los encabezamientos de los salmos, el término señala al responsable musical o litúrgico. «Maestro de coro» conserva la función de dirección y suena natural en español bíblico actual.
- source_word: עַל
  english_pob_choice: according to
  chosen_spanish: según
  alternatives_spanish:
  - al tono de
  - con la melodía de
  - sobre
  lexicon: HALOT
  rationale: En una superscripción, la preposición puede introducir una melodía, indicación musical o título. «Según» reproduce con sobriedad esa relación sin fijar indebidamente si se trata de melodía o de rúbrica.
- source_word: שׁוּשַׁן עֵדוּת
  english_pob_choice: Lily of Testimony
  chosen_spanish: «Lirio del Testimonio»
  alternatives_spanish:
  - «Lirio del testimonio»
  - «Lirio del testimonio» como título musical
  - «Lirios del testimonio»
  lexicon: HALOT
  rationale: La expresión parece ser una designación musical o litúrgica de sentido incierto. «Lirio» conserva el valor nominal singular del hebreo, y el genitivo «del Testimonio» mantiene la estructura del título sin resolver su referencia.
- source_word: מִכְתָּם
  english_pob_choice: miktam
  chosen_spanish: Mictam
  alternatives_spanish:
  - miktam
  - inscripción
  - canto de oro
  lexicon: HALOT
  rationale: El significado del término es incierto y funciona como rótulo genérico o de género. La transliteración «Mictam» es más transparente que un glosado especulativo.
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - por David
  - para David
  lexicon: HALOT
  rationale: La construcción hebrea puede indicar autoría, asociación o dedicación. «De David» conserva esa ambigüedad mejor que decidirla en una sola dirección.
- source_word: לְלַמֵּד
  english_pob_choice: for teaching
  chosen_spanish: para enseñar
  alternatives_spanish:
  - para instrucción
  - a fin de enseñar
  - para dar enseñanza
  lexicon: HALOT
  rationale: El infinitivo expresa finalidad; «para enseñar» es la forma más directa y natural en español, y conserva el propósito didáctico del encabezamiento.
translation_notes:
  revision_awareness: 'El texto sigue el acuerdo alto del control cruzado y mantiene sin cambios la solución auditada: encabezamiento musical, título incierto «Lirio del Testimonio», transliteración de מִכְתָּם y ambigüedad de לְדָוִד. No se documentaron revisiones posteriores que alteren el sentido.'
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto en el proyecto, pero este versículo no contiene el nombre divino en el texto base.
  - Se conserva la ambigüedad de la superscripción sin forzar una lectura exclusivamente musical o exclusivamente autoral.
  - 'La puntuación reproduce la función de dos segmentos: indicación al maestro de coro y subtítulos/etiquetas del salmo.'
