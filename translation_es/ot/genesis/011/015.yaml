translation:
  language: es
  text: Y Selaj vivió 403 años después de haber engendrado a Éber[a], y engendró hijos e hijas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Selaj vivió, después de haber engendrado a Éber, 403 años».'
    reason: alternative_word_order
lexical_decisions:
- source_word: וַיְחִי
  english_pob_choice: lived
  chosen_spanish: vivió
  alternatives_spanish:
  - estuvo vivo
  - vivió durante
  lexicon: HALOT
  rationale: En las fórmulas genealógicas, חיה expresa la duración de la vida; «vivió» es la equivalencia natural en español y conserva el sentido sin volverse arcaico.
- source_word: שֶׁלַח
  english_pob_choice: Shelah
  chosen_spanish: Selaj
  alternatives_spanish:
  - Sela
  - Salah
  lexicon: HALOT
  rationale: El nombre se translitera de la forma hebrea; «Selaj» refleja la consonancia hebrea más directamente que formas tradicionales de otras tradiciones.
- source_word: אַחֲרֵי הוֹלִידוֹ
  english_pob_choice: after he fathered
  chosen_spanish: después de haber engendrado
  alternatives_spanish:
  - después de haber sido padre de
  - después de haber engendrado a
  lexicon: HALOT
  rationale: En contexto genealógico, הוליד significa engendrar/fathered. «Engendrado» conserva el valor genealógico y evita un giro demasiado abstracto.
- source_word: אֶת עֵבֶר
  english_pob_choice: Eber
  chosen_spanish: Éber
  alternatives_spanish:
  - Eber
  - Heber
  lexicon: HALOT
  rationale: Se mantiene la transliteración del nombre hebreo con acento gráfico español para facilitar la lectura, sin alterar la forma básica del nombre.
- source_word: שָׁלֹשׁ שָׁנִים וְאַרְבַּע מֵאוֹת שָׁנָה
  english_pob_choice: 403 years
  chosen_spanish: 403 años
  alternatives_spanish:
  - cuatrocientos tres años
  - tres años y cuatrocientos años
  lexicon: HALOT
  rationale: La expresión hebrea es un cardinal idiomático que suma 403; el número arábigo comunica con claridad el valor sin perder precisión.
- source_word: וַיּוֹלֶד
  english_pob_choice: and he fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - engendró hijos e hijas
  - fue padre de
  lexicon: HALOT
  rationale: En la clausula final genealógica, ילד con sujeto masculino se traduce mejor como «engendró», que preserva la fuerza genealógica y la concordancia con el resto del verso.
- source_word: בָּנִים וּבָנוֹת
  english_pob_choice: sons and daughters
  chosen_spanish: hijos e hijas
  alternatives_spanish:
  - varones y mujeres
  - niños y niñas
  lexicon: HALOT
  rationale: El hebreo especifica ambos sexos; «hijos e hijas» es la equivalencia natural y conserva el paralelismo inclusivo del original.
theological_decisions:
- issue: Genealogical formula and temporal ordering
  english_pob_reading: And Shelah lived 403 years after he fathered Eber, and he fathered sons and daughters.
  chosen_spanish_reading: Y vivió Selaj 403 años después de haber engendrado a Éber, y engendró hijos e hijas.
  alternative_spanish_readings:
  - Y vivió Selaj después de haber engendrado a Éber, 403 años, y engendró hijos e hijas.
  - Y Selaj vivió 403 años tras engendrar a Éber, y engendró hijos e hijas.
  rationale: Se conserva la secuencia genealógica y la duración post-engendramiento tal como la presenta el hebreo y la POB en inglés, sin reinterpretarla ni armonizarla con otras fórmulas.
  doctrine_reference: Génesis 11:15; genealogías del AT
- issue: Naming of the patriarch
  english_pob_reading: Shelah
  chosen_spanish_reading: Selaj
  alternative_spanish_readings:
  - Salah
  - Shelah
  rationale: No hay motivo contextual para sustituir la transliteración hebrea por una forma tradicional castellana que oscurezca la cercanía al texto fuente.
  doctrine_reference: Transliteración de nombres propios bíblicos
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español, vinculado a la alternativa de ordenamiento temporal que el auditor inglés preservó como lectura posible.
  spanish_consistency_notes:
  - Se usó «engendró» para reflejar el valor genealógico de הוליד/ויולד, evitando «tuvo» por ser demasiado vago.
  - Se mantuvo «Éber» con acento gráfico por legibilidad en español, sin cambiar el nombre bíblico.
  - La cifra se normalizó como 403 años porque el hebreo expresa el total mediante suma idiomática.
  - No se introdujo «SEÑOR» ni terminología litúrgica ajena, ya que el verso no contiene el Tetragrámaton.
