reference: Testament of Joseph 6
source:
  edition: Charles 1908 Greek Versions (pages 256-287, Joseph pilot)
  text: VI. ¹Καὶ μετὰ τοῦτο¹¹ ἀποστέλλει² μοι βρῶμα ἐν γοητείᾳ πεφυρμένον³. 2. *Ὡς δὲ⁴ ἦλθεν ὁ⁵ εὐνοῦχος ὁ κομίζων αὐτό⁶, *ἀνέβλεψα καὶ⁷ εἶδον *φοβερὸν ἄνδρα⁸ ἐπιδιδόντα μοι *μετὰ τοῦ τρυβλίου⁹ μάχαιραν· καὶ συνῆκα ὅτι¹⁰ *περιέργεια ἐστὶν εἰς ἀποπλάνησίν μου¹¹. 3. Καὶ ⸀ἐξελθόντος αὐτοῦ¹²⸀ *ἔκλαιον¹³, *μὴ γευσάμενος μήτε ἐκείνου μήτε ἄλλου τῶν ἐδεσμάτων αὐτῆς¹⁴. 4. *Μετὰ δὲ¹⁵ μίαν ἡμέραν ἐλθοῦσα¹⁶ πρός με¹⁷ *καὶ ἐπιγνοῦσα τὸ βρῶμα¹⁸ λέγει¹⁹ μοι²⁰· Τί τοῦτο ὅτι οὐκ ἔφαγες²¹ *τοῦ βρώματος²²; 5. Καὶ εἶπον *πρὸς αὐτήν²³· Ὅτι²⁴ ἐπλήρωσας αὐτὸ ⸀γοητείας⸀²⁵ θανάτου²⁶. καὶ *πῶς εἶπας²⁷ ὅτι Οὐ προσεγγίζω²⁸ τοῖς²⁹ εἰδώλοις³⁰ ἀλλὰ τῷ³¹ Κυρίῳ³² ⸀μόνῳ⸀³³; 6. Νῦν οὖν γνῶθι³⁴, ὅτι ὁ³⁵ Θεὸς *τοῦ πατρός³⁶ μου *δι’ ἀγγέλου αὐτοῦ³⁷ ἀπεκάλυψέ³⁸ μοι τὴν κακίαν σου³⁹, καὶ *ἐν τούτῳ ἐφύλαξα⁴⁰ αὐτὸ⁴¹ εἰς ἔλεγχόν σου, *εἴπως ἄρα⁴² ἰδοῦσα⁴³ μετανοήσεις⁴⁴. 7. *Ἵνα δὲ⁴⁵ μάθῃς⁴⁶, ὅτι⁴⁷ τῶν⁴⁸ ἐν σωφροσύνῃ θεοσεβούντων⁴⁹ οὐ κατισχύσει⁵⁰ κακία⁵¹ *τῶν ἀσεβούντων⁵². ⌈Ἰδοὺ⌉⁵³ λαβὼν⁵⁴ *ἐξ αὐτοῦ ἐνώπιόν σου ἐσθίων. Καὶ τοῦτο εἰπὼν εἶπον οὕτως⁵⁵. Ὁ Θεὸς τῶν πατέρων μου καὶ ὁ ἄγγελος Ἀβραὰμ⁵⁶ *ἔσται μετ᾽ ἐμοῦ⁵⁷. ⌈Ἔφαγον⌉⁵⁸. 8. Ἡ δὲ ⌈Ἰδοῦσα τοῦτο⌉⁵⁸ *ἔπεσεν⁵⁹ *ἐπὶ πρόσωπον αὐτῆς⁶⁰ *εἰς τοὺς πόδας μου⁶¹ κλαίουσα⁶², καὶ ἀναστήσας⁶³ αὐτὴν ἐνουθέτησα. 9. *ἡ δὲ⁶⁴ συνεθέτό μου⁶⁵ τοῦ⁶⁶ *μηκέτι ποιῆσαι⁶⁷ τὴν ἀσέβειαν ταύτην⁶⁸.
