translation:
  language: es
  text: En todas tus obras sé preeminente[a]; no pongas una mancha en tu honor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no causes un reproche a tu reputación»; aquí δόξα probablemente significa «honor» o «buen nombre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν πᾶσι τοῖς ἔργοις σου
  english_pob_choice: In all your works
  chosen_spanish: En todas tus obras
  alternatives_spanish:
  - En todo lo que hagas
  - En todas tus acciones
  lexicon: LSJ
  rationale: Ἔργα se refiere a obras o hechos; 'obras' mantiene el vínculo léxico y suena natural en español bíblico contemporáneo.
- source_word: γίνου
  english_pob_choice: be
  chosen_spanish: sé
  alternatives_spanish:
  - vuélvete
  - muéstrate
  lexicon: LSJ
  rationale: El imperativo medio presente de γίνομαι funciona aquí como exhortación de conducta; en español, 'sé' expresa mejor una llamada estable al modo de ser que 'vuélvete'.
- source_word: ὑπεράγων
  english_pob_choice: preeminent
  chosen_spanish: preeminente
  alternatives_spanish:
  - sobresaliente
  - excelso
  - superior
  lexicon: LSJ
  rationale: El participio/adjetivo expresa excelencia que sobresale sobre lo común. 'Preeminente' conserva el tono formal y la fuerza comparativa del griego.
- source_word: μὴ δῷς
  english_pob_choice: do not give
  chosen_spanish: no des
  alternatives_spanish:
  - no causes
  - no pongas
  lexicon: LSJ
  rationale: La prohibición se traduce de manera directa; 'no des' mantiene la estructura imperativa negativa del original.
- source_word: μῶμον
  english_pob_choice: a blemish
  chosen_spanish: un defecto
  alternatives_spanish:
  - una mancha
  - un reproche
  - una falta
  lexicon: LSJ
  rationale: μῶμος/μῶμον puede significar culpa, mancha o reproche. 'Defecto' conserva la idea de algo desmerecedor sin volver la frase demasiado idiomática o severa.
- source_word: ἐν τῇ δόξῃ σου
  english_pob_choice: to your honor
  chosen_spanish: a tu honor
  alternatives_spanish:
  - en tu gloria
  - a tu reputación
  - a tu buen nombre
  lexicon: LSJ
  rationale: En este contexto sapiencial, δόξα apunta al honor o buena fama, no a 'gloria' en sentido doxológico. 'A tu honor' reproduce la relación idiomática de perjuicio o deshonra.
theological_decisions:
- issue: Sentido de δόξα en contexto sapiencial
  english_pob_reading: honor
  chosen_spanish_reading: honor
  alternative_spanish_readings:
  - gloria
  - reputación
  - buen nombre
  rationale: La advertencia ética trata de evitar el deshonor público y moral. 'Honor' es la mejor equivalencia para conservar el sentido social-ético sin importar un uso teológico de 'gloria'.
  doctrine_reference: 'Translation philosophy: primacía del original; equivalencia óptima; evitar sobrecargar con terminología litúrgica ajena al contexto.'
translation_notes:
  revision_awareness: La revisión inglesa final sustituyó 'outstanding' por 'preeminent' para reflejar con mayor formalidad ὑπεράγων. La versión española adopta 'preeminente' para alinearse con esa decisión revisada y mantiene el resto del sentido sin expansión interpretativa.
  spanish_consistency_notes:
  - Se mantiene 'obras' para ἔργα, en coherencia con el audit trail inglés.
  - Se evita 'gloria' en el texto principal porque el contexto sapiencial pide honor/reputación/buen nombre, no una doxología.
  - El tono es formal y publicable, pero no arcaizante; 'sé preeminente' conserva la exhortación directa del griego.
