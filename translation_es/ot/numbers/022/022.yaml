translation:
  language: es
  text: Pero la ira de Dios se encendió porque él iba en camino, y el ángel de Yahvé se puso en el camino como adversario para oponérsele. Él iba montado en su asna[a], y sus dos criados estaban con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘su burra’; el hebreo especifica una hembra de asno.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּחַר אַף
  english_pob_choice: anger burned
  chosen_spanish: la ira ... se encendió
  alternatives_spanish:
  - la ira ... ardió
  - se encendió la ira
  lexicon: HALOT
  rationale: El hebreo usa un modismo corporal de ira ‘ardiente’. En español, ‘se encendió’ conserva la imagen de fuego sin sonar forzado; ‘ardió’ es posible, pero ‘se encendió’ resulta más natural y mantiene la fuerza idiomática.
- source_word: אֱלֹהִים
  english_pob_choice: God’s
  chosen_spanish: de Dios
  alternatives_spanish:
  - de Dios mismo
  - de Dios (en sentido singular)
  lexicon: HALOT
  rationale: Aquí אֱלֹהִים se refiere inequívocamente al Dios de Israel en sentido singular. ‘De Dios’ comunica la relación posesiva de manera natural en español sin introducir una forma menos idiomática.
- source_word: כִּי הוֹלֵךְ הוּא
  english_pob_choice: because he was going
  chosen_spanish: porque él iba en camino
  alternatives_spanish:
  - porque iba
  - porque estaba yendo
  lexicon: HALOT
  rationale: El participio expresa acción en curso; ‘iba en camino’ reproduce el valor progresivo y el contexto narrativo. ‘Estaba yendo’ sería más literal pero menos natural en español.
- source_word: וַיִּתְיַצֵּב
  english_pob_choice: took his stand
  chosen_spanish: se puso
  alternatives_spanish:
  - tomó su puesto
  - se plantó
  lexicon: HALOT
  rationale: El hitpael indica colocarse deliberadamente. ‘Se puso’ es breve y natural; el complemento ‘en el camino’ completa la idea de posicionamiento intencional. ‘Se plantó’ sería más enfático pero algo coloquial.
- source_word: מַלְאַךְ יְהוָה
  english_pob_choice: the angel of Yahweh
  chosen_spanish: el ángel de Yahvé
  alternatives_spanish:
  - el mensajero de Yahvé
  - el ángel de Yahveh
  lexicon: HALOT
  rationale: Se mantiene la terminología del proyecto para יְהוָה como ‘Yahvé’ y el sustantivo ‘ángel’ por el contexto narrativo de un ser celestial. ‘Mensajero’ es posible, pero menos usual en este pasaje.
- source_word: בַּדֶּרֶךְ
  english_pob_choice: in the road
  chosen_spanish: en el camino
  alternatives_spanish:
  - en la ruta
  - en el camino
  lexicon: HALOT
  rationale: ‘En el camino’ es el equivalente natural en español para la imagen de obstaculizar el paso. ‘En la carretera’ o ‘en la ruta’ serían demasiado específicos para el hebreo.
- source_word: לְשָׂטָן לוֹ
  english_pob_choice: as an adversary to him
  chosen_spanish: como adversario contra él
  alternatives_spanish:
  - para oponerse a él
  - como enemigo de él
  lexicon: HALOT
  rationale: El término שָׂטָן aquí funciona como sustantivo común, no como nombre propio. ‘Adversario’ preserva esa fuerza lexical; ‘contra él’ refuerza la oposición sin importar una lectura demonológica ajena al contexto.
- source_word: וְהוּא רֹכֵב
  english_pob_choice: He was riding
  chosen_spanish: Él iba montado
  alternatives_spanish:
  - él montaba
  - iba cabalgando
  lexicon: HALOT
  rationale: El participio describe la escena de fondo. ‘Iba montado’ es natural y conserva la simultaneidad narrativa mejor que un simple pasado puntual.
- source_word: אֲתֹנוֹ
  english_pob_choice: his donkey
  chosen_spanish: su asna
  alternatives_spanish:
  - su burra
  - su asna hembra
  lexicon: HALOT
  rationale: El hebreo especifica una hembra de asno; ‘asna’ conserva ese dato léxico mejor que ‘burra’ en español bíblico contemporáneo. Se evita una perífrasis más pesada.
- source_word: שְׁנֵי נְעָרָיו
  english_pob_choice: his two young men
  chosen_spanish: sus dos jóvenes
  alternatives_spanish:
  - sus dos servidores
  - sus dos acompañantes
  lexicon: HALOT
  rationale: נְעָרִים puede significar jóvenes, servidores o acompañantes. ‘Jóvenes’ sigue de cerca el valor léxico y funciona bien en la secuencia narrativa; el contexto ya deja claro que acompañan a Balaam.
- source_word: עִמּוֹ
  english_pob_choice: were with him
  chosen_spanish: lo acompañaban
  alternatives_spanish:
  - estaban con él
  - iban con él
  lexicon: HALOT
  rationale: El hebreo indica compañía concomitante; en español, ‘lo acompañaban’ integra naturalmente la relación sin añadir pesadez verbal. ‘Estaban con él’ sería más literal, pero menos fluido.
theological_decisions:
- issue: Sentido de שָׂטָן en este versículo
  english_pob_reading: 'common noun: ''adversary'''
  chosen_spanish_reading: 'sustantivo común: ''adversario'''
  alternative_spanish_readings:
  - 'nombre propio: ''Satanás'''
  - '''satan'' transliterado'
  rationale: El contexto y la forma hebrea favorecen una lectura común, no un nombre propio. Traducirlo como ‘Satanás’ introduciría una identificación teológica posterior que el texto no exige. Se mantiene, por tanto, la tensión lexical sin resolverla prematuramente.
  doctrine_reference: Preservar la tensión teológica del texto; no importar una identificación posterior donde el hebreo presenta un sustantivo común.
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: ‘Yahvé’. Esto conserva el nombre propio del pacto y evita la sustitución por un título genérico en el texto principal.'
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH → Yahvé'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que eliminó ‘Now’ para un registro más formal. Por ello, el español usa una transición directa con ‘Él iba montado...’ sin marcador discursivo adicional, manteniendo el tono formal y el flujo narrativo del original.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - Se eligió ‘adversario’ para שָׂטָן, evitando ‘Satanás’ porque el contexto requiere un sustantivo común.
  - ‘Asna’ preserva el matiz de sexo del animal que el hebreo sí expresa.
  - Se mantuvo un registro formal y bíblico sin caer en calcos rígidos del inglés.
