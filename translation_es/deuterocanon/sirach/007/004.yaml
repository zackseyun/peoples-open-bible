translation:
  language: es
  text: No te justifiques delante de un rey, ni hagas alarde de entendimiento delante de un rey.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego dice: «No busques dominio del Señor, ni un asiento de gloria de parte de un rey». El testimonio hebreo seguido aquí difiere sustancialmente.'
    reason: textual_variant
lexical_decisions:
- source_word: אַל תִּצְטַדֵּק
  english_pob_choice: Do not justify yourself
  chosen_spanish: No te justifiques
  alternatives_spanish:
  - No busques justificartе
  - No te vindiques
  - No te hagas pasar por justo
  lexicon: HALOT
  rationale: 'El hitpael de צדק conserva un valor reflexivo: presentarse como justo o justificarse a uno mismo. «No te justifiques» reproduce bien esa fuerza y suena natural en español sin perder la advertencia social del proverbio.'
- source_word: לִפְנֵי מֶלֶךְ
  english_pob_choice: before a king
  chosen_spanish: delante de un rey
  alternatives_spanish:
  - ante un rey
  - frente a un rey
  lexicon: HALOT
  rationale: La preposición לִפְנֵי se expresa con naturalidad como «delante de» o «ante». «Delante de» mantiene el sentido espacial y ceremonial, y es idiomático en español bíblico contemporáneo.
- source_word: וּמִפְּנֵי מֶלֶךְ
  english_pob_choice: and in the presence of a king
  chosen_spanish: ni ... delante de un rey
  alternatives_spanish:
  - ni ... ante un rey
  - ni ... en presencia de un rey
  lexicon: HALOT
  rationale: El hebreo repite la misma idea con una segunda fórmula preposicional. En español se conserva la repetición y el paralelismo con «delante de un rey», sin introducir una diferencia de sentido no apoyada por el hebreo.
- source_word: תִּתְבּוֹנֵן
  english_pob_choice: show understanding
  chosen_spanish: muestres entendimiento
  alternatives_spanish:
  - te hagas listo
  - demuestres discernimiento
  - te pongas a presumir de inteligencia
  lexicon: HALOT
  rationale: El hitbonen puede apuntar a discernimiento o a exhibir capacidad mental. «Mostrar entendimiento» sigue la decisión auditada del inglés POB y mantiene el matiz social de aparentar suficiencia ante la realeza.
theological_decisions:
- issue: Divergencia entre el hebreo y el griego en Sirach 7:4
  english_pob_reading: 'Translate the extant Hebrew as primary: a warning against self-justifying or displaying understanding before a king.'
  chosen_spanish_reading: 'Traducir como texto principal el hebreo conservado: una advertencia contra justificarse o mostrarse entendido delante de un rey.'
  alternative_spanish_readings:
  - No busques dominio del Señor, ni un trono de gloria de parte de un rey.
  - No busques soberanía de parte del Señor, ni asiento de gloria de parte de un rey.
  rationale: La política del proyecto da primacía al hebreo cuando está preservado. El griego presenta una formulación sustancialmente distinta, por lo que se documenta como variante textual en nota y no reemplaza al testimonio hebreo.
  doctrine_reference: 'PHILOSOPHY.md: traducir Sirácida desde el hebreo cuando existe; usar el griego como control/variante textual'
translation_notes:
  revision_awareness: 'Ajustado para corregir la validación anterior: la nota [a] ahora aparece anclada exactamente en el texto español. Se mantiene la primacía del hebreo con documentación explícita de la variante griega.'
  spanish_consistency_notes:
  - Se mantiene «rey» con artículo indefinido implícito, como en el hebreo sin artículo.
  - «No te justifiques» conserva el valor reflexivo del hitpael.
  - La repetición de «delante de un rey» preserva el paralelismo del hebreo.
  - Se evita introducir léxico eclesiástico no motivado por el texto.
