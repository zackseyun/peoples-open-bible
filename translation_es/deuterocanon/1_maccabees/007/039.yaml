translation:
  language: es
  text: Y Nicanor salió de Jerusalén y acampó en Bet-Jorón[a], y una fuerza de Siria se encontró con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Bet Horón».
    reason: alternative_reading
lexical_decisions:
- source_word: ἐξῆλθεν
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - partió
  - salió de
  lexicon: LSJ
  rationale: El verbo griego indica movimiento hacia afuera desde un lugar. «Salió» comunica de forma natural y directa ese desplazamiento sin añadir matiz militar que el verbo por sí solo no exige.
- source_word: παρενέβαλεν
  english_pob_choice: camped
  chosen_spanish: acampó
  alternatives_spanish:
  - acamparon
  - hizo campamento
  lexicon: LSJ
  rationale: En contexto militar, el verbo significa instalar un campamento. «Acampó» es la equivalencia española más clara y conserva el sentido bélico del pasaje.
- source_word: Βεθωρών
  english_pob_choice: Beth-horon
  chosen_spanish: Bet-Jorón
  alternatives_spanish:
  - Beth-Jorón
  - Beth Horón
  lexicon: transliteración estándar
  rationale: Es un nombre propio geográfico. «Bet-Jorón» respeta la forma tradicional en español sin traducir el topónimo, manteniendo identificable el lugar.
- source_word: συνήντησεν αὐτῷ
  english_pob_choice: met him
  chosen_spanish: se le enfrentó
  alternatives_spanish:
  - lo encontró
  - se encontró con él
  - lo enfrentó
  lexicon: LSJ
  rationale: Aunque el verbo básico es «encontrar/ir al encuentro», el contexto militar favorece un encuentro hostil. «Se le enfrentó» expresa el contacto bélico sin convertir explícitamente el verbo en una afirmación más fuerte de la que el griego garantiza.
- source_word: δύναμις Συρίας
  english_pob_choice: a force of Syria
  chosen_spanish: una fuerza de Siria
  alternatives_spanish:
  - un ejército de Siria
  - una fuerza siria
  lexicon: LSJ
  rationale: δύναμις puede designar una fuerza militar o un ejército. Como el sustantivo es anartro, «una fuerza de Siria» reproduce bien la indefinición del griego y evita cerrar demasiado la referencia con «el ejército».
theological_decisions:
- issue: Lectura militar de συνήντησεν αὐτῷ
  english_pob_reading: met him
  chosen_spanish_reading: se le enfrentó
  alternative_spanish_readings:
  - lo encontró
  - se encontró con él
  rationale: 'No hay una cuestión doctrinal directa, pero sí una tensión semántica: el contexto narrativo sugiere hostilidad. Se optó por una formulación española que refleje ese matiz sin afirmar más que el texto griego en sí.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «a force from Syria» a «a force of Syria» para reflejar mejor el genitivo Συρίας. La redacción española conserva esa relación genitiva con «una fuerza de Siria» y mantiene el valor militar del sustantivo δύναμις. También se tuvo en cuenta que el inglés fijó «Beth-horon» y una nota sobre la amplitud de δύναμις, lo que en español se refleja mediante el topónimo y una traducción no excesivamente cerrada de la fuerza enemiga.
  spanish_consistency_notes:
  - Se mantiene «Bet-Jorón» como topónimo transliterado, no traducido.
  - «Fuerza» conserva la amplitud semántica de δύναμις y evita identificar de manera absoluta un “ejército” si el griego no lo especifica.
  - El verbo «se le enfrentó» busca preservar el matiz militar del contexto sin añadir un sujeto ni una acción que el griego no explicita.
