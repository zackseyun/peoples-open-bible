translation:
  language: es
  text: Y Saúl acampó en la colina de Hachilá[a], que está frente a Jesimón, junto al camino. Y David estaba en el desierto, y vio que Saúl había venido tras él al desierto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Jesimón también puede entenderse de manera genérica como «el erial» o «el desierto».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּחַן
  english_pob_choice: camped
  chosen_spanish: acampó
  alternatives_spanish:
  - hizo campamento
  - levantó campamento
  lexicon: HALOT
  rationale: חנה en contexto de desplazamiento militar significa acampar o establecer campamento. «Acampó» es natural en español y conserva el valor concreto de la acción.
- source_word: בְּגִבְעַת הַחֲכִילָה
  english_pob_choice: on the hill of Hachilah
  chosen_spanish: en el collado de Hachilá
  alternatives_spanish:
  - en la colina de Hachilá
  - en Gibeat-Hachilá
  lexicon: HALOT
  rationale: גִּבְעָה es «colina» o «collado». Se traslada el nombre propio חֲכִילָה como «Hachilá» y se traduce el sustantivo común para mantener la referencia topográfica.
- source_word: אֲשֶׁר עַל פְּנֵי הַיְשִׁימֹן
  english_pob_choice: which is opposite Jeshimon
  chosen_spanish: que está frente a Jesimón
  alternatives_spanish:
  - que mira hacia Jesimón
  - que está opuesto a Jesimón
  lexicon: HALOT
  rationale: עַל־פְּנֵי expresa posición frontal u opuesta. Se conserva Jesimón como nombre geográfico, siguiendo la decisión inglesa de transliterarlo en vez de convertirlo en un término genérico.
- source_word: עַל הַדָּרֶךְ
  english_pob_choice: by the road
  chosen_spanish: junto al camino
  alternatives_spanish:
  - al lado del camino
  - por el camino
  lexicon: HALOT
  rationale: Aunque עַל puede ser «sobre», aquí indica cercanía topográfica. «Junto al camino» evita sugerir que Saúl estaba literalmente encima de la vía y suena natural en español.
- source_word: יֹשֵׁב
  english_pob_choice: was staying
  chosen_spanish: permanecía
  alternatives_spanish:
  - estaba morando
  - estaba sentado
  lexicon: HALOT
  rationale: El participio destaca una condición durativa. «Permanecía» comunica continuidad de estancia sin perder la fuerza narrativa; «moraba» sería más marcado y menos natural aquí.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto/erial
  - en la estepa
  lexicon: HALOT
  rationale: Aunque «wilderness» puede traducirse por «desierto», en este contexto geográfico español «desierto» comunica mejor el lugar árido y abierto. Se evita «naturaleza salvaje», que sería demasiado interpretativo.
- source_word: וַיַּרְא כִּי בָא שָׁאוּל אַחֲרָיו
  english_pob_choice: and he saw that Saul had come after him
  chosen_spanish: y vio que Saúl había venido tras él
  alternatives_spanish:
  - y vio que Saúl lo seguía
  - y se dio cuenta de que Saúl venía tras él
  lexicon: HALOT
  rationale: בוא + אַחֲרֵי expresa llegada con idea de seguimiento. «Había venido tras él» conserva el movimiento y la relación de persecución sin añadir una terminología más técnica que el hebreo no exige.
- source_word: הַמִּדְבָּרָה
  english_pob_choice: into the wilderness
  chosen_spanish: al desierto
  alternatives_spanish:
  - hacia el desierto
  - en dirección al desierto
  lexicon: HALOT
  rationale: El he direccional indica movimiento hacia el lugar. En español, «al desierto» transmite de forma compacta esa orientación y evita repetir innecesariamente «en el desierto».
theological_decisions:
- issue: Topónimo Jeshimon/Jesimón frente a sentido genérico de "wasteland/desert"
  english_pob_reading: Jeshimon may also be understood generically as 'the wasteland' or 'the desert.'
  chosen_spanish_reading: Jesimón puede entenderse también de manera genérica como «el erial» o «el desierto».
  alternative_spanish_readings:
  - «el wasteland»
  - «la soledad»
  rationale: El hebreo permite leer הַיְשִׁימֹן como nombre propio o como apelativo geográfico común. Mantener Jesimón en el texto principal preserva el referente local; la nota recoge la ambigüedad sin resolverla prematuramente.
  doctrine_reference: Principio de fidelidad al texto y preservación de ambigüedades geográficas del original
translation_notes:
  revision_awareness: La versión española sigue de cerca el paquete fuente hebreo y el POB inglés auditado. Se respetó la distinción entre el topónimo Jesimón y su posible sentido genérico, y se mantuvo la relación espacial de Saúl «frente a» la zona de Hachilá, con una formulación natural en español.
  spanish_consistency_notes:
  - Se usó «Hachilá» para el nombre propio y se conservó «Jesimón» como transliteración estable.
  - «Desierto» se emplea de modo coherente para מִדְבָּר en ambos miembros del versículo.
  - «Acampó» y «permanecía» mantienen la diferencia verbal entre acción puntual y estado durativo.
  - No se introdujo lenguaje interpretativo adicional sobre la intención de Saúl; se dejó el simple valor de movimiento y localización.
