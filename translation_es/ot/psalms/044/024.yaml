translation:
  language: es
  text: ¡Despierta! ¿Por qué duermes, Señor? Despiértate; no nos rechaces[a] para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nos deseches para siempre».
    reason: lexical_alternative
lexical_decisions:
- source_word: ע֤וּרָה
  english_pob_choice: Awake!
  chosen_spanish: ¡Despierta!
  alternatives_spanish:
  - ¡Despiértate!
  - ¡Levántate!
  lexicon: HALOT
  rationale: Imperativo directo de עור. En español, «¡Despierta!» mantiene el golpe exhortativo y el paralelo con el segundo mandato sin sonar artificial.
- source_word: לָמָּה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Con qué motivo
  - ¿Para qué
  lexicon: HALOT
  rationale: Interrogativo estándar que introduce la queja del salmo con naturalidad en español.
- source_word: תִישַׁן
  english_pob_choice: do you sleep
  chosen_spanish: duermes
  alternatives_spanish:
  - estás durmiendo
  - duermes tú
  lexicon: HALOT
  rationale: El hebreo usa una pregunta retórica en imperfecto; «duermes» conserva el valor idiomático sin volver la línea pesada o demasiado progresiva.
- source_word: אֲדֹנָי
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - mi Señor
  - Soberano
  lexicon: HALOT
  rationale: Título divino vocativo. «Señor» es el equivalente natural y reverente en español para este address directo a Dios.
- source_word: הָקִיצָה
  english_pob_choice: Rouse yourself
  chosen_spanish: Despiértate
  alternatives_spanish:
  - ¡Rómpete el sueño!
  - ¡Espabílate!
  lexicon: HALOT
  rationale: Segundo imperativo de despertar, con fuerza paralela pero distinta de עוּרָה. «Despiértate» preserva la intensificación sin calco rígido.
- source_word: תִּזְנַח
  english_pob_choice: reject us
  chosen_spanish: nos rechaces
  alternatives_spanish:
  - nos abandones
  - nos arrojes
  lexicon: HALOT
  rationale: זנח en este contexto expresa rechazo o repudio. La forma negativa con subjuntivo español refleja bien la prohibición implícita de אַל.
- source_word: לָנֶצַח
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  lexicon: HALOT
  rationale: Modismo de duración permanente; «para siempre» es la opción más idiomática y clara en español.
theological_decisions:
- issue: Lenguaje antropomórfico de Dios durmiendo y despertando
  english_pob_reading: Retain the psalm's direct anthropomorphic imagery in translation
  chosen_spanish_reading: Mantener la imagen directa de Dios durmiendo y siendo llamado a despertar
  alternative_spanish_readings:
  - Suavizarlo como «¿por qué pareces inactivo, Señor?»
  - Interpretarlo de modo abiertamente explicativo
  rationale: La POB inglesa preserva la tensión teológica y la audacia del lamento. El español sigue esa decisión sin resolver la metáfora ni convertirla en explicación doctrinal.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador [a] aparezca en el texto principal junto al punto de anclaje correspondiente.
  spanish_consistency_notes:
  - Se mantuvo el trato reverente directo a Dios con «Señor».
  - «Para siempre» conserva el valor idiomático de לָנֶצַח.
  - La duplicación de imperativos de despertar se preserva con dos verbos distintos en español para reflejar el paralelismo hebreo.
