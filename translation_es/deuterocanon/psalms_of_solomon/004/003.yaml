revisions:
- from: Y su mano estuvo primero contra él[a], como si fuera por celo[b], pero él mismo es culpable en una variedad de actos pecaminosos[c][d], en actos de desenfreno.
  to: Y su mano está entre las primeras contra él[a], como si actuara con celo[b], pero él mismo es culpable de una variedad de actos pecaminosos[c][d], en actos de desenfreno.
  rationale: Se ajusta ἐν πρώτοις a «entre las primeras» para reflejar la decisión auditada de prioridad entre los primeros en actuar/acusar, no mera secuencia temporal. Se pasa a presente para corresponder mejor al tono del original y del English POB. Se mejora «como si fuera por celo» a «como si actuara con celo» por naturalidad idiomática sin perder el matiz de celo aparente. Se corrige la clasificación de la nota d y se afina la nota c para evitar «de los pecados», que no representa bien la adjudicación vigente.
