translation:
  language: es
  text: 'Los hijos de Zofah: Suah[a], Harnefer, Sual, Beri e Imrah.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «descendientes de Zofah». En listas genealógicas, בְּנֵי puede designar una línea familiar más amplia, aunque «hijos de» es la traducción más directa.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Los descendientes de
  lexicon: HALOT
  rationale: En listas genealógicas, בְּנֵי puede introducir tanto hijos inmediatos como miembros de una línea familiar. En español, «hijos de» es la forma más directa y natural, conservando la relación genealógica sin ampliar innecesariamente el alcance.
- source_word: צוֹפָח
  english_pob_choice: Zophah
  chosen_spanish: Zofá
  alternatives_spanish:
  - Zofa
  lexicon: HALOT
  rationale: Nombre propio transliterado. «Zofá» sigue de cerca la vocalización hebrea y adapta la forma al español con acento gráfico para reflejar el acento final natural en lectura pública.
- source_word: סוּחַ
  english_pob_choice: Suah
  chosen_spanish: Súa
  alternatives_spanish:
  - Suaj
  - Suá
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se opta por «Súa» para una representación breve y pronunciable en español, manteniendo la cercanía fonética con la forma hebrea sin forzar una transliteración técnica.
- source_word: חַרְנֶפֶר
  english_pob_choice: Harnepher
  chosen_spanish: Harnefer
  alternatives_spanish:
  - Jarnefer
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se suaviza la forma inglesa a una grafía española más transparente («Harnefer») sin añadir elementos inexistentes en el texto fuente.
- source_word: שׁוּעָל
  english_pob_choice: Shual
  chosen_spanish: Sual
  alternatives_spanish:
  - Shual
  lexicon: HALOT
  rationale: Aunque el hebreo puede corresponder a un nombre propio en este contexto, el español debe evitar la transliteración inglesa con «sh» cuando no es necesaria. «Sual» conserva el valor nominal y se lee con naturalidad en español.
- source_word: בֵרִי
  english_pob_choice: Beri
  chosen_spanish: Beri
  alternatives_spanish:
  - Beeri
  lexicon: HALOT
  rationale: Nombre propio transliterado de forma directa. Se conserva «Beri» porque sigue la vocalización de este versículo y evita mezclarlo con otras formas nominales cercanas.
- source_word: יִמְרָה
  english_pob_choice: Imrah
  chosen_spanish: Imrá
  alternatives_spanish:
  - Jimrá
  lexicon: HALOT
  rationale: Nombre propio transliterado. «Imrá» mantiene la forma breve del hebreo y usa acento gráfico para facilitar la lectura en español sin introducir una consonante inicial que no está exigida por el texto.
theological_decisions:
- issue: Alcance de בְּנֵי en lista genealógica
  english_pob_reading: The sons of... with a footnote allowing "descendants of" as an alternative in genealogical lists.
  chosen_spanish_reading: Los hijos de... con nota que permite «descendientes de» como alternativa.
  alternative_spanish_readings:
  - Los descendientes de...
  rationale: 'La forma principal mantiene la lectura más directa del hebreo, mientras la nota preserva la tensión documentada: en genealogías, בְּנֵי puede abarcar más que hijos biológicos inmediatos. El español conserva así el matiz sin ocultarlo.'
  doctrine_reference: Hermenéutica de genealogías en el AT; uso amplio de lenguaje de parentesco en listas genealógicas.
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con la revisión auditada en inglés; no se registran cambios sustantivos. La única decisión relevante es la adaptación española de nombres propios y la preservación de la alternativa genealógica para בְּנֵי.
  spanish_consistency_notes:
  - Se mantiene el orden del listado genealógico del hebreo y del texto inglés auditado.
  - Los nombres propios se transliteran de manera consistente en español, evitando traducciones interpretativas.
  - Se conserva una nota única para el posible alcance ampliado de בְּנֵי, sin crear notas innecesarias para cada nombre.
