translation:
  language: es
  text: Ahora, el resto de los hechos de Ela, y todo lo que hizo, ¿no están escritos en el libro de los anales[a] de los reyes de Israel?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'las crónicas'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֶתֶר
  english_pob_choice: Now the rest of
  chosen_spanish: Ahora, el resto de
  alternatives_spanish:
  - Y el resto de
  - La restante parte de
  lexicon: HALOT
  rationale: יֶתֶר expresa ‘resto’ o ‘remainder’. El וְ inicial funciona aquí como transición narrativa; por eso ‘Ahora, el resto de’ conserva el giro formulaico sin sonar rígido en español.
- source_word: דִּבְרֵי
  english_pob_choice: acts
  chosen_spanish: hechos
  alternatives_spanish:
  - actos
  - palabras
  - asuntos
  - obras
  lexicon: HALOT
  rationale: En esta fórmula regia, דִּבְרֵי no se lee simplemente como ‘palabras’, sino como el conjunto de lo que el rey hizo y dejó registrado. ‘Hechos’ comunica bien ese valor histórico sin forzar una paráfrasis.
- source_word: אֵלָה
  english_pob_choice: Elah
  chosen_spanish: Ela
  alternatives_spanish:
  - Elá
  lexicon: Convención onomástica
  rationale: Los nombres propios se transliteran. ‘Ela’ es la forma natural en español bíblico para este nombre.
- source_word: וְכָל אֲשֶׁר עָשָׂה
  english_pob_choice: and all that he did
  chosen_spanish: y todo lo que hizo
  alternatives_spanish:
  - y todo lo que realizó
  - y cuanto hizo
  lexicon: HALOT
  rationale: La cláusula relativa es directa y amplia; ‘hizo’ reproduce el verbo עשה en un español natural y fiel al sentido general del pasaje.
- source_word: הֲלוֹא
  english_pob_choice: are they not
  chosen_spanish: ¿no
  alternatives_spanish:
  - ¿acaso no
  - ¿no es cierto que
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica que espera afirmación. En español, ‘¿no…?’ conserva ese tono sin añadir matices no presentes en el hebreo.
- source_word: הֵם כְּתוּבִים
  english_pob_choice: are they not written
  chosen_spanish: están escritos
  alternatives_spanish:
  - están registrados
  - están consignados
  lexicon: HALOT
  rationale: El pasivo participial mantiene la idea de registro documental. ‘Están escritos’ es la forma más sobria y formulaica en español para este tipo de cierre regnal.
- source_word: עַל סֵפֶר
  english_pob_choice: in the Book
  chosen_spanish: en el Libro
  alternatives_spanish:
  - en el libro
  - sobre el libro
  - en el rollo
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente ‘sobre un libro/rollo’, la referencia es a un documento archivístico. ‘En el Libro’ reproduce la función del título textual en español y mantiene el carácter de registro.
- source_word: דִּבְרֵי הַיָּמִים
  english_pob_choice: the Chronicles
  chosen_spanish: de los Anales
  alternatives_spanish:
  - de las Crónicas
  - de los sucesos
  lexicon: HALOT
  rationale: El inglés opta por ‘Chronicles’, pero en español ‘Anales’ expresa muy bien el sentido de registro histórico oficial. Se evita ‘Crónicas’ para no confundirlo con el libro canónico de Crónicas cuando aquí se trata de un archivo/regesta.
- source_word: לְמַלְכֵי יִשְׂרָאֵל
  english_pob_choice: of the Kings of Israel
  chosen_spanish: de los reyes de Israel
  alternatives_spanish:
  - para los reyes de Israel
  - de los monarcas de Israel
  lexicon: HALOT
  rationale: La relación del complemento es posesiva/titulativa, no final. ‘De los reyes de Israel’ preserva la referencia al archivo vinculado con la monarquía israelita.
translation_notes:
  revision_awareness: El texto sigue de cerca la fórmula regia hebrea y coincide sustancialmente con el audit trail inglés; se ajustó el español para sonar natural sin perder el matiz archivístico del original.
  spanish_consistency_notes:
  - Se usó ‘Ela’ para el nombre propio y ‘hechos/hizo’ para la fórmula histórica, manteniendo la cadencia regia.
  - Se prefirió ‘Anales’ como equivalente funcional de דִּבְרֵי הַיָּמִים en español, con nota alternativa para ‘anales/crónicas’.
  - Se mantuvo la pregunta retórica con ‘¿no…?’ para reflejar הֲלוֹא sin intensificarla.
