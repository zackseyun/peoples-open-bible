translation:
  language: es
  text: Porque Yahvé conoce el camino de los justos[a], pero el camino de los impíos perecerá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vigila sobre»; el hebreo «conoce» puede implicar cuidado relacional o aprobación, no mera información.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón o fundamento del contraste anterior; «Porque» conserva bien el valor explicativo causal y suena natural en español bíblico contemporáneo.
- source_word: יוֹדֵעַ
  english_pob_choice: knows
  chosen_spanish: conoce
  alternatives_spanish:
  - sabe
  - vigila sobre
  lexicon: HALOT
  rationale: El participio ידע se expresa de forma directa con «conoce», preservando el lexema de conocer sin cerrar la amplitud relacional que el contexto puede implicar. «Vigila sobre» interpretaría demasiado el verbo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - SEÑOR
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el nombre divino, manteniendo la referencia pactual y evitando la sustitución por una convención de ocultamiento.
- source_word: דֶּרֶךְ
  english_pob_choice: way
  chosen_spanish: camino
  alternatives_spanish:
  - sendero
  - conducta
  - curso
  lexicon: HALOT
  rationale: «Camino» es la equivalencia natural y amplia en español, apta para la metáfora sapiencial de modo de vida o curso de acción.
- source_word: צַדִּיקִים
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los justos
  lexicon: HALOT
  rationale: El adjetivo funciona sustantivado; «los justos» preserva la categoría moral de forma idiomática en español. «Rectos» es posible, pero menos estable en este contexto.
- source_word: וְ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - y
  - mas
  lexicon: HALOT
  rationale: Aunque la forma es «y», el paralelismo es claramente adversativo; «pero» comunica con claridad la oposición entre ambos caminos.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los perversos
  lexicon: HALOT
  rationale: El sustantivo/adjetivo plural designa a los culpables o moralmente torcidos. «Impíos» es una opción bíblica comprensible en español y mantiene el contraste sapiencial con «los justos».
- source_word: תֹּאבֵד
  english_pob_choice: will perish
  chosen_spanish: perecerá
  alternatives_spanish:
  - se perderá
  - será destruido
  lexicon: HALOT
  rationale: El verbo אבד es intransitivo aquí y expresa perecer/venir a ruina. Como su sujeto es «camino», la forma en singular «perecerá» conserva la imagen del curso de vida que termina en ruina.
theological_decisions:
- issue: Alcance de «conoce» respecto al conocimiento de Yahvé
  english_pob_reading: Relational, approving knowledge is implied, but the main text retains the more literal 'knows.'
  chosen_spanish_reading: Relacional y aprobador en sentido implícito, mientras el texto principal conserva «conoce».
  alternative_spanish_readings:
  - Yahvé vigila sobre el camino de los justos
  - Yahvé aprueba el camino de los justos
  rationale: El hebreo יָדַע puede implicar más que información mental, especialmente en contexto pactual; sin embargo, la traducción principal debe conservar la forma verbal explícita y dejar la implicación teológica para el lector y para la nota.
  doctrine_reference: Salmos 1; uso pactual de ידע
- issue: Sentido de la antítesis final y del sujeto «camino»
  english_pob_reading: the way of the wicked will perish
  chosen_spanish_reading: el camino de los impíos perecerá
  alternative_spanish_readings:
  - la conducta de los impíos perecerá
  - el camino de los impíos será destruido
  rationale: Se mantiene la imagen hebrea del camino/caminar como curso de vida. «Perecerá» sigue el valor intransitivo de אבד sin convertir innecesariamente la cláusula en pasiva.
  doctrine_reference: Sabiduría bíblica; contraste de dos caminos
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios y el control cruzado reporta alta concordancia; por eso el borrador español conserva el mismo sentido base sin ampliar interpretativamente el verbo «conoce».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino según el estándar del proyecto.
  - Se usa «los justos» y «los impíos» como sustantivos plurales naturales y consistentes con la poesía sapiencial.
  - «Perecerá» conserva la imagen del camino como sujeto gramatical singular, en paralelo con el hebreo.
