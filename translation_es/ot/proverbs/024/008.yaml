    rationale: Aunque intenta reflejar בַּעַל como «master of», en español «maestro de intrigas» no es una designación idiomática clara y puede sonar literaria o incluso elogiosa. El hebreo apunta a alguien caracterizado por maquinaciones maliciosas.
  - severity: low
    issue: La construcción «a ese lo llamarán» es correcta pero algo redundante
    rationale: Refleja bien לוֹ, pero en español puede expresarse con mayor fluidez como «lo llamarán» sin pérdida del sentido, o mantenerse si la frase resultante mejora. Aquí la revisión propuesta mantiene claridad y naturalidad.
  - severity: low
    issue: La nota alternativa mejora el sentido más que el texto principal
    rationale: Cuando la alternativa española («intrigante») o una forma semejante expresa mejor el sentido del original, conviene trasladar esa fuerza al texto principal y dejar en nota una variante realmente alternativa.
  revised_spanish_text: Quien planea hacer el mal[a], lo llamarán maquinador.
