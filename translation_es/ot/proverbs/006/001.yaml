translation:
  language: es
  text: Hijo mío[a], si has salido fiador por tu prójimo, si has estrechado tus manos en prenda[b] a un extraño,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «si te has hecho garante por tu prójimo».'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «si has estrechado tus manos a un extraño»; es decir, has sellado una garantía mediante un apretón de manos.'
    reason: cultural_note
lexical_decisions:
- source_word: בְּנִי
  english_pob_choice: My son
  chosen_spanish: Hijo mío
  alternatives_spanish:
  - Hijo mío,
  - Hijo
  lexicon: HALOT
  rationale: El hebreo es un vocativo paternal/maestro dirigido a un varón singular. «Hijo mío» conserva el tono directo y natural en español, equivalente a «My son» en la POB inglesa.
- source_word: אִם
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - cuando
  lexicon: HALOT
  rationale: La partícula introduce una cláusula condicional. «Si» reproduce con precisión el valor condicional del hebreo.
- source_word: עָרַבְתָּ
  english_pob_choice: have gone surety
  chosen_spanish: has salido fiador
  alternatives_spanish:
  - te has hecho garante
  - has dado garantía
  - te has comprometido como fiador
  lexicon: HALOT
  rationale: El verbo en este contexto apunta a asumir responsabilidad financiera por otro. «Salir fiador» es una expresión española clara y fiel al matiz legal/económico, sin perder la idea de garantía personal.
- source_word: לְרֵעֶךָ
  english_pob_choice: for your neighbor
  chosen_spanish: por tu prójimo
  alternatives_spanish:
  - por tu amigo
  - por tu vecino
  - por tu compañero
  lexicon: HALOT
  rationale: רֵעַ puede abarcar asociado, compañero o prójimo. «Prójimo» conserva el alcance relacional amplio y suena natural en español bíblico contemporáneo.
- source_word: תָּקַעְתָּ
  english_pob_choice: have struck
  chosen_spanish: has dado tu mano
  alternatives_spanish:
  - has golpeado
  - has estrechado la mano
  - has juntado las manos
  lexicon: HALOT
  rationale: La imagen hebrea es la de un gesto manual que sella el compromiso. «Has dado tu mano» comunica el acto sin forzar una traducción demasiado literal que sería opaca en español.
- source_word: לַזָּר
  english_pob_choice: to a stranger
  chosen_spanish: para un extraño
  alternatives_spanish:
  - a un extraño
  - para un outsider
  lexicon: HALOT
  rationale: זָר designa a un forastero, extraño u outsider. «Extraño» preserva la amplitud semántica y mantiene el contraste con el círculo de relaciones esperado.
- source_word: כַּפֶּיךָ
  english_pob_choice: your hands in pledge
  chosen_spanish: tu mano en prenda
  alternatives_spanish:
  - tus manos en prenda
  - tu palma en prenda
  - tu mano como garantía
  lexicon: HALOT
  rationale: כַּף puede referirse a la palma o mano, pero en español el singular colectivo funciona bien dentro del modismo. «En prenda» explicita el gesto de compromiso/garantía que la POB inglesa también deja claro con su nota cultural.
translation_notes:
  revision_awareness: 'El pasaje coincide en sentido general con la POB inglesa: vocativo, condicional legal y gesto manual de garantía. La revisión más reciente indica que no hubo cambios necesarios; por eso se mantiene una formulación española idiomática que preserva la tensión entre la imagen literal de la mano y su valor jurídico.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque no aparece el nombre divino en este versículo.
  - Se mantiene «prójimo» para רֵעַ por su amplitud relacional, en lugar de restringirlo a «amigo».
  - «Salir fiador» comunica mejor la obligación legal que una traducción más mecánica como «haber ido por fianza».
  - La nota al pie conserva la alternativa semántica relevante para la cláusula de fiador.
  - No se usa «Cristo/Mesías» ni terminología teológica adicional porque el texto no la requiere.
