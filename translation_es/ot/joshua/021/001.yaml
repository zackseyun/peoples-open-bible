translation:
  language: es
  text: Entonces se acercaron los jefes de las casas paternas de los levitas[a] a Eleazar el sacerdote, a Josué hijo de Nun, y a los jefes de las casas paternas de las tribus de los hijos de Israel[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «jefes de las casas ancestrales» / «jefes de familia». El hebreo alude a agrupaciones domésticas y de clan bajo liderazgo paterno.
    reason: lexical_alternative
  - marker: b
    text: O «los israelitas». Literalmente, «los hijos de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגְּשׁוּ
  english_pob_choice: came near
  chosen_spanish: se acercaron
  alternatives_spanish:
  - vinieron cerca
  - se aproximaron
  lexicon: HALOT
  rationale: El verbo expresa aproximación al llegar ante autoridades; «se acercaron» conserva el movimiento narrativo y suena natural en español sin perder el matiz formal del contexto administrativo.
- source_word: רָאשֵׁי אֲבוֹת
  english_pob_choice: the heads of the fathers’ houses
  chosen_spanish: los jefes de las casas paternas
  alternatives_spanish:
  - los jefes de las casas de los padres
  - los jefes de los linajes paternos
  lexicon: HALOT
  rationale: La expresión hebrea apunta a jefes de clanes o unidades domésticas paternas. «Casas paternas» mantiene visible la estructura social del hebreo con una formulación comprensible en español.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levitas
  lexicon: HALOT
  rationale: Es el equivalente estándar del grupo tribal/religioso לְוִיִּם y funciona de forma natural en español.
- source_word: אֶלְעָזָר הַכֹּהֵן
  english_pob_choice: Eleazar the priest
  chosen_spanish: Eleazar el sacerdote
  alternatives_spanish:
  - Eleazar el sacerdote
  lexicon: HALOT
  rationale: כֹּהֵן se traduce de manera directa como «sacerdote». En español bíblico y eclesial es claro, y evita expandir el texto más allá del hebreo.
- source_word: יְהוֹשֻׁעַ בִּן נוּן
  english_pob_choice: Joshua son of Nun
  chosen_spanish: Josué hijo de Nun
  alternatives_spanish:
  - Josué, hijo de Nun
  lexicon: HALOT
  rationale: La construcción patronímica se expresa naturalmente con «hijo de». «Josué» es la forma usual en español para יְהוֹשֻׁעַ.
- source_word: רָאשֵׁי אֲבוֹת הַמַּטּוֹת
  english_pob_choice: the heads of the fathers’ houses of the tribes
  chosen_spanish: los jefes de las casas paternas de las tribus
  alternatives_spanish:
  - los jefes de las casas ancestrales de las tribus
  - los jefes de los linajes de las tribus
  lexicon: HALOT
  rationale: 'Se conserva la doble estructura hebrea: primero las casas paternas, luego las tribus. Así se mantiene la organización interna de liderazgo que el texto resalta.'
- source_word: לִבְנֵי יִשְׂרָאֵל
  english_pob_choice: of the sons of Israel
  chosen_spanish: de los hijos de Israel
  alternatives_spanish:
  - de los israelitas
  - del pueblo de Israel
  lexicon: HALOT
  rationale: «Hijos de Israel» reproduce con fidelidad el giro idiomático hebreo y preserva la relación familiar/covenantal que el texto usa.
theological_decisions:
- issue: Término kinésico-tribal masculino en la estructura de Israel
  english_pob_reading: Retain 'fathers’ houses' and 'sons of Israel' in the main text
  chosen_spanish_reading: Retener 'casas paternas' e 'hijos de Israel' en el texto principal
  alternative_spanish_readings:
  - casas ancestrales
  - israelitas
  - pueblo de Israel
  rationale: El hebreo emplea fórmulas de parentesco masculinas que designan estructuras representativas de clan y pacto, no simples referencias genéricas a población. La traducción española conserva esa forma para no borrar la organización social del pasaje.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
translation_notes:
  revision_awareness: Coincide con el pasaje base sin revisiones aplicadas en el audit trail; se ha mantenido la alta concordancia con la lectura inglesa y la transparencia del hebreo.
  spanish_consistency_notes:
  - Se mantuvo «casas paternas» de forma consistente para רָאשֵׁי אֲבוֹת, evitando alternar con «linajes» en el texto principal.
  - Se eligió «hijos de Israel» como equivalente literal de בְנֵי יִשְׂרָאֵל, con nota opcional para la forma idiomática «israelitas».
  - «Sacerdote» se usó para כֹּהֵן por claridad y fidelidad directa al término hebreo.
