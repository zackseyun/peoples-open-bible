lexical_decisions:
- source_word: עָזִּי
  english_pob_choice: my strength
  chosen_spanish: mi fuerza
  alternatives_spanish:
  - mi poder
  - mi fortaleza
  lexicon: HALOT
  rationale: עֹז/עָז puede expresar fuerza, vigor o poder. En español, «mi fuerza» conserva la naturalidad poética y refleja bien la confesión de dependencia personal del hebreo.
- source_word: וְזִמְרָת
  english_pob_choice: and song
  chosen_spanish: y mi cántico
  alternatives_spanish:
  - y canción
  - y alabanza
  - y melodía
  lexicon: HALOT
  rationale: La POB inglesa opta por «song» en este giro fijo. En español, «cántico» comunica mejor el registro poético y cultual que «canción», sin alejarse del valor léxico de זִמְרָה/זִמְרַת.
- source_word: יָהּ
  english_pob_choice: Yah
  chosen_spanish: Yah
  alternatives_spanish:
  - el SEÑOR
  - Yavé
  lexicon: HALOT
  rationale: El texto hebreo usa la forma corta del nombre divino, no el tetragrámaton completo. Por fidelidad al término fuente, se mantiene «Yah» y no se lo normaliza a una forma de sustitución.
- source_word: וַיְהִי
  english_pob_choice: has become
  chosen_spanish: se ha vuelto
  alternatives_spanish:
  - ha llegado a ser
  - se convirtió
  lexicon: HALOT
  rationale: El valor resultativo de וַיְהִי en esta confesión poética se expresa bien con «se ha vuelto», que suena natural en español y conserva la idea de resultado presente.
- source_word: לִי
  english_pob_choice: my
  chosen_spanish: mi
  alternatives_spanish:
  - para mí
  - a mí
  lexicon: HALOT
  rationale: Aunque literalmente significa «para mí / a mí», en esta construcción posesiva de español resulta más idiomático y fiel al sentido de apropiación personal decir «mi salvación».
- source_word: לִישׁוּעָה
  english_pob_choice: salvation
  chosen_spanish: salvación
  alternatives_spanish:
  - liberación
  - rescate
  - victoria
  lexicon: HALOT
  rationale: יׁשׁוּעָה puede abarcar salvación, rescate o liberación. «Salvación» es la opción más amplia y coherente con el uso bíblico y con la elección inglesa de la POB.
theological_decisions:
- issue: Representación de la forma corta del nombre divino יָהּ
  english_pob_reading: Yah
  chosen_spanish_reading: Yah
  alternative_spanish_readings:
  - el SEÑOR
  - Yavé
  rationale: La decisión inglesa preserva la forma abreviada del nombre divino en lugar de sustituirla por una convención de lectura. En español se mantiene la misma solución para no borrar la distinción textual entre יָהּ y יהוה.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for יְהוָה'
translation_notes:
  revision_awareness: Se siguió el estado más reciente del audit trail, que indica alta concordancia y ningún cambio requerido en la revisión final.
  spanish_consistency_notes:
  - Se conserva la estructura poética paralela del hebreo con dos miembros coordinados.
  - Se evita reemplazar el nombre divino abreviado por una convención litúrgica de sustitución.
  - «Cántico» se eligió por su registro bíblico y poético; no pretende introducir una paráfrasis interpretativa.
  - «Se ha vuelto» preserva el resultado perfectivo del verbo hebreo sin forzar una simple cópula.
