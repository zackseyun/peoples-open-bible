  text: 'No household servant can serve two masters; for either he will hate the one and love the other[a], or he will be devoted to one and despise the other. You cannot serve God and Mammon.'
  footnotes:
  - marker: a
    text: 'Or ''wealth'' or ''money.'' The Greek uses Mammon, a term for riches treated here as a rival master.'
