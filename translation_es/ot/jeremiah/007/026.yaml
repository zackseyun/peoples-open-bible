revisions:
- from: Pero no me escucharon ni inclinaron su oído; endurecieron su cerviz, y se portaron peor que sus padres.
  to: Pero no me escucharon ni inclinaron su oído; endurecieron su cerviz y obraron peor que sus padres[a].
  rationale: Se revisa la cláusula final para reflejar mejor la fuerza moral de הֵרֵעוּ con 'obraron peor', manteniendo un español digno y natural. Se añade la nota alternativa para 'padres/antepasados' en conformidad con el expediente inglés y las instrucciones de preservación de alternativas léxicas significativas. No se requiere adjudicación adicional.
