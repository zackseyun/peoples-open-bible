translation:
  language: es
  text: todas las ciudades de la llanura[a], y todo Galaad, y todo Basán, hasta Salecá y Edrei[b], ciudades del reino de Og en Basán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la meseta' o 'el altiplano' para el término hebreo. El vocablo se refiere a la región elevada y nivelada al este del Jordán.
    reason: lexical_alternative
  - marker: b
    text: Salecá también puede transcribirse 'Salca' o 'Salka'.
    reason: alternative_reading
lexical_decisions:
- source_word: כֹּל
  english_pob_choice: all
  chosen_spanish: todas / todo
  alternatives_spanish:
  - toda
  - todos
  lexicon: HALOT
  rationale: 'El cuantificador abarca el conjunto completo de las ciudades y territorios enumerados. En español conviene concordar por nombre: ''todas las ciudades'' y ''todo Galaad'', ''todo Basán''.'
- source_word: עָרֵי
  english_pob_choice: cities
  chosen_spanish: ciudades
  alternatives_spanish:
  - poblados
  - towns
  lexicon: HALOT
  rationale: En contexto territorial y político, 'ciudades' conserva mejor el matiz geográfico-administrativo que 'poblados'.
- source_word: הַמִּישֹׁר
  english_pob_choice: the plain
  chosen_spanish: la llanura
  alternatives_spanish:
  - el llano
  - la meseta
  lexicon: HALOT
  rationale: El inglés POB optó por 'plain' en la revisión más reciente, aunque la nota reconoce el sentido de región elevada y nivelada. En español 'llanura' comunica con naturalidad la extensión abierta, mientras la nota preserva la tensión topográfica con 'meseta' / 'altiplanicie' implícita en el término hebreo.
- source_word: הַגִּלְעָד
  english_pob_choice: Gilead
  chosen_spanish: Galaad
  alternatives_spanish:
  - Gilead
  lexicon: HALOT
  rationale: 'Se mantiene el nombre propio bíblico en transliteración habitual al español: ''Galaad''.'
- source_word: הַבָּשָׁן
  english_pob_choice: Bashan
  chosen_spanish: Basán
  alternatives_spanish:
  - Basan
  lexicon: HALOT
  rationale: Nombre propio regional; 'Basán' es la forma española más estable y legible.
- source_word: עַד
  english_pob_choice: as far as
  chosen_spanish: hasta
  alternatives_spanish:
  - hasta llegar a
  - hasta
  lexicon: HALOT
  rationale: Para límites territoriales, 'hasta' es la forma natural y fiel en español.
- source_word: סַלְכָה
  english_pob_choice: Salecah
  chosen_spanish: Salca
  alternatives_spanish:
  - Salecá
  - Salka
  lexicon: HALOT
  rationale: Nombre propio; se adapta a la ortografía española con terminación simple, sin forzar una forma ajena al sistema del español.
- source_word: אֶדְרֶעִי
  english_pob_choice: Edrei
  chosen_spanish: Edrei
  alternatives_spanish:
  - Edreí
  lexicon: HALOT
  rationale: Nombre propio preservado como transliteración estándar y reconocible en español.
- source_word: עָרֵי מַמְלֶכֶת
  english_pob_choice: cities of the kingdom
  chosen_spanish: ciudades del reino
  alternatives_spanish:
  - ciudades reales
  - ciudades del dominio
  lexicon: HALOT
  rationale: La cadena constructa expresa pertenencia/adscripción al reino; 'ciudades del reino' refleja de manera transparente la relación sin introducir un matiz no atestiguado.
- source_word: עוֹג
  english_pob_choice: Og
  chosen_spanish: Og
  alternatives_spanish:
  - Og
  lexicon: HALOT
  rationale: Nombre propio personal conservado.
theological_decisions:
- issue: Alcance territorial de 'הַמִּישֹׁר'
  english_pob_reading: the plain / the tableland (with note recognizing the level upland east of the Jordan)
  chosen_spanish_reading: la llanura (con nota que reconoce el sentido de meseta/altiplano)
  alternative_spanish_readings:
  - la meseta
  - el altiplano
  - la llanura
  rationale: El hebreo admite tensión entre una traducción más idiomática y la referencia topográfica más precisa. Se conserva una forma natural en el cuerpo y se explicita en nota la posibilidad de una región elevada y nivelada al este del Jordán, siguiendo el audit trail inglés.
  doctrine_reference: Topografía bíblica / geografía histórica
- issue: Relación apposicional de 'עָרֵי מַמְלֶכֶת עוֹג'
  english_pob_reading: cities of the kingdom of Og in Bashan
  chosen_spanish_reading: ciudades del reino de Og en Basán
  alternative_spanish_readings:
  - las ciudades del reino de Og en Basán
  - ciudades reales de Og en Basán
  rationale: La apposición final identifica las ciudades como pertenecientes al reino de Og y localizadas en Basán. Se evita añadir un artículo que en español suene más pesado que el hebreo y se mantiene la estructura condensada del original.
  doctrine_reference: Syntaxis descriptiva del texto hebreo
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió 'plain' sobre 'tableland' y ajustó la apposición final a 'cities of the kingdom of Og in Bashan'. La versión española sigue esa revisión en la sintaxis general, pero conserva en nota la tensión lexical del hebreo para הַמִּישֹׁר, evitando ocultar el matiz geográfico señalado en el audit trail.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' cuando corresponda en otros versículos; aquí no aparece el tetragrámaton.
  - Se usa la transliteración española estable 'Galaad', 'Basán' y 'Og'.
  - Se evita 'reino de Og' como posesión absoluta del personaje más allá de lo que exige la sintaxis; se conserva la formulación descriptiva del hebreo.
  - La puntuación reproduce el ritmo enumerativo del original con comas y la pausa final antes de la apposición.
