translation:
  language: es
  text: En toda su obra dio gracias a Dios Altísimo con palabras de gloria[a]; con todo su corazón amó a su Hacedor[b], y cada día le dio gracias con cantos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «con palabras de gloria»; el griego también dice, de forma equivalente, «con una palabra de gloria».'
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo dice: «y cada día le dio gracias con cantos». El paralelo griego, en cambio, lee: «cantó alabanza y amó al que lo hizo», sin la frase explícita «cada día».'
    reason: alternative_reading
lexical_decisions:
- source_word: בכל מעשהו / ἐν παντὶ ἔργῳ αὐτοῦ
  english_pob_choice: In all his work
  chosen_spanish: En toda su obra
  alternatives_spanish:
  - En todos sus hechos
  - En todo lo que hizo
  lexicon: HALOT
  rationale: La frase hebrea es colectiva y abarca la totalidad de la actividad de David. «Obra» conserva ese valor global de manera natural en español, sin fragmentar la idea en «hechos» aislados.
- source_word: נתן הודות / ἔδωκεν ἐξομολόγησιν
  english_pob_choice: he gave thanks
  chosen_spanish: dio gracias
  alternatives_spanish:
  - ofreció acción de gracias
  - dio alabanza
  lexicon: HALOT
  rationale: El hebreo expresa literalmente la idea de «dar gracias/acciones de gracias». «Dio gracias» es la equivalencia española más directa y idiomática; «alabanza» sería más amplia y menos precisa aquí.
- source_word: לאל עליון / ἁγίῳ Ὑψίστῳ
  english_pob_choice: to God Most High
  chosen_spanish: a Dios Altísimo
  alternatives_spanish:
  - al Dios Altísimo
  - a Dios, el Altísimo
  lexicon: HALOT
  rationale: Se conserva el título divino con la estructura natural del español. «Altísimo» reproduce el epíteto sin reemplazarlo por una fórmula eclesiástica más cerrada.
- source_word: באמרי כבוד / ῥήματι δόξης
  english_pob_choice: with words of glory
  chosen_spanish: con palabras de gloria
  alternatives_spanish:
  - con palabras gloriosas
  - con palabras de honor
  lexicon: HALOT
  rationale: El hebreo y el griego sostienen la imagen de palabras relacionadas con «gloria». «Palabras de gloria» mantiene la relación léxica sin suavizarla excesivamente.
- source_word: בכל לבו / ἐν πάσῃ καρδίᾳ αὐτοῦ
  english_pob_choice: with all his heart
  chosen_spanish: con todo su corazón
  alternatives_spanish:
  - de todo corazón
  - con su corazón entero
  lexicon: HALOT
  rationale: Es un modismo hebreo de entrega interior total. «Con todo su corazón» es una equivalencia española clara y fiel.
- source_word: אוהב / ἠγάπησεν
  english_pob_choice: he loved
  chosen_spanish: amó
  alternatives_spanish:
  - amaba
  - amó profundamente
  lexicon: HALOT
  rationale: El contexto verbal favorece un pasado finito. El griego también apoya esa lectura; «amó» conserva la secuencia narrativa y la fuerza plena del verbo.
- source_word: עשהו / τὸν ποιήσαντα αὐτόν
  english_pob_choice: his Maker
  chosen_spanish: su Hacedor
  alternatives_spanish:
  - el que lo hizo
  - su Creador
  lexicon: HALOT
  rationale: «Hacedor» conserva el matiz personal y relacional del participio sustantivado, cercano a «the one who made him». «Creador» sería correcto pero más abstracto.
- source_word: וכבל יום / om. in Greek parallel
  english_pob_choice: and every day
  chosen_spanish: y cada día
  alternatives_spanish:
  - y día tras día
  - y a diario
  lexicon: HALOT
  rationale: Se mantiene la lectura hebrea, aunque el paralelo griego no la explicite. «Cada día» reproduce el valor distributivo de forma natural en español.
- source_word: הודה לו בזמירות / ὕμνησεν
  english_pob_choice: he gave thanks to him with songs
  chosen_spanish: le dio gracias con cantos
  alternatives_spanish:
  - le alabó con cantos
  - le dio gracias con salmos
  lexicon: HALOT
  rationale: «Cantos» traduce bien זמירות como cantos o canciones de alabanza. Se evita «salmos» por ser más específico de lo que exige el término.
theological_decisions:
- issue: Título divino עליון / Ὑψιστος
  english_pob_reading: God Most High
  chosen_spanish_reading: Dios Altísimo
  alternative_spanish_readings:
  - el Dios Altísimo
  - Dios, el Altísimo
  rationale: No se introduce una glosa doctrinal; se conserva el epíteto divino como título reverente y transparente. «Altísimo» funciona de modo estable para el hebreo y el griego.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names'
translation_notes:
  revision_awareness: El borrador sigue el consenso alto entre el hebreo base y el paralelo griego. Se preserva la lectura hebrea en la frase temporal «cada día», mientras la nota registra la divergencia del griego. No hubo revisiones aplicadas en el pase más reciente, y el estado de concordancia fue alto.
  spanish_consistency_notes:
  - Se mantuvo «Dios Altísimo» como título divino y no como una sustitución por «Señor».
  - Se eligió «Hacedor» para conservar el matiz personal del participio hebreo/griego.
  - «Dio gracias» y «le dio gracias con cantos» preservan la repetición del lenguaje de agradecimiento del verso.
  - La puntuación divide las dos mitades del versículo de acuerdo con el paralelo semítico y la cadencia castellana.
