revisions:
- from: 'Y uno dijo[a]: «Ten ánimo, hermano», mientras otro dijo: «Resiste noblemente».'
  to: 'Y uno dijo[a]: «Ten valor, hermano»; y otro dijo: «Resiste noblemente».'
  rationale: Se reemplaza «mientras» por una coordinación simple para reflejar mejor la estructura distributiva ὁ μέν ... ὁ δέ sin insinuar simultaneidad. Se cambia «Ten ánimo» por «Ten valor» por mayor naturalidad e impacto exhortativo en español, manteniendo el sentido de Θάρρει. Se conserva «Resiste noblemente», que representa bien Εὐγενῶς καρτέρησον.
