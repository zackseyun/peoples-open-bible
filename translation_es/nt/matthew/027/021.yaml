translation:
  language: es
  text: 'Pero el gobernador les respondió: «¿A cuál de los dos quieren que les deje en libertad?» Y ellos dijeron: «A Barrabás».'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ἀποκριθεὶς
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - les respondió
  lexicon: BDAG
  rationale: El participio aoristo funciona de manera idiomática como introducción a la respuesta del gobernador. En español, «respondió» comunica esa función de manera natural y concisa.
- source_word: ὁ ἡγεμὼν
  english_pob_choice: the governor
  chosen_spanish: el gobernador
  alternatives_spanish:
  - el gobernante
  - el magistrado
  lexicon: BDAG
  rationale: En este contexto, ἡγεμών designa al gobernador romano, es decir, Pilato. «Gobernador» conserva la precisión contextual y es el término más claro en español.
- source_word: Τίνα
  english_pob_choice: Which
  chosen_spanish: ¿A cuál
  alternatives_spanish:
  - ¿Cuál de los dos?
  - ¿A cuál de ellos?
  lexicon: BDAG
  rationale: La pregunta pide escoger entre dos personas ya mencionadas. «¿A cuál de los dos?» expresa bien la selección; se usa «a» por el verbo implícito de soltar/liberar que gobierna al complemento directo humano.
- source_word: θέλετε
  english_pob_choice: do you want
  chosen_spanish: quieren
  alternatives_spanish:
  - desean
  - quieren ustedes
  lexicon: BDAG
  rationale: El verbo expresa preferencia o deseo. En español, «quieren» es directo y natural en este intercambio judicial y evita una formulación rígida.
- source_word: ἀπὸ τῶν δύο
  english_pob_choice: of the two
  chosen_spanish: de los dos
  alternatives_spanish:
  - entre los dos
  - de esos dos
  lexicon: BDAG
  rationale: 'La expresión es partitiva: uno elegido de entre dos candidatos. «De los dos» mantiene esa relación de selección sin sobrecargar el español.'
- source_word: ἀπολύσω
  english_pob_choice: me to release for you
  chosen_spanish: que les suelte
  alternatives_spanish:
  - que les libere
  - que les deje libre
  lexicon: BDAG
  rationale: ἀπολύω en este contexto legal es «liberar / dejar en libertad / soltar». Se eligió «suelte» porque en español puede reflejar la liberación de un preso de forma breve y viva; «libere» también sería posible, pero suena más técnico. Aquí se preserva la fuerza forense del acto de poner en libertad.
- source_word: ὑμῖν
  english_pob_choice: for you
  chosen_spanish: les
  alternatives_spanish:
  - para ustedes
  - a ustedes
  lexicon: BDAG
  rationale: El dativo expresa beneficio respecto de la liberación solicitada. En español, ese matiz se absorbe naturalmente en el clítico «les»; se evita añadir una preposición que haría más pesada la frase.
- source_word: οἱ δὲ εἶπαν
  english_pob_choice: And they said
  chosen_spanish: Y ellos dijeron
  alternatives_spanish:
  - Pero ellos dijeron
  - Entonces dijeron
  lexicon: BDAG
  rationale: La partícula δέ marca avance narrativo con leve transición. «Y ellos dijeron» reproduce la continuidad de la escena sin exagerar el contraste.
- source_word: Τὸν Βαραββᾶν
  english_pob_choice: Barabbas
  chosen_spanish: Barrabás
  alternatives_spanish:
  - Barabás
  lexicon: BDAG
  rationale: Los nombres propios se transliteran según uso español. Se adopta «Barrabás», forma asentada y reconocible en castellano bíblico.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la estructura del griego y coincide con la lectura inglesa auditada en sentido y función discursiva: introducción del gobernador, pregunta de selección entre dos, petición de liberación y respuesta con el nombre propio. Se ajustó la sintaxis al español para evitar calcos como «¿Cuál de los dos quieren que yo libere para ustedes?» y mantener fluidez sin perder la relación entre el verbo de liberar y el dativo benefactivo.'
  spanish_consistency_notes:
  - Se mantuvo «gobernador» para ἡγεμών, en línea con la decisión inglesa y con el contexto romano.
  - Se usó «Barrabás» como transliteración estándar en español.
  - Se optó por «suelte» para ἀπολύσω, conservando el matiz de liberar a un preso en un registro natural.
  - La pregunta se formuló con complemento preposicional («¿A cuál de los dos?») para reflejar el objeto humano de la liberación en español.
  - La puntuación dialogal española se ajustó con comillas angulares para lectura pública.
