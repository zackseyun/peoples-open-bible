revisions:
- from: 'Y dijo[a]: «Canaán está maldito[b]; será esclavo[c] de esclavos para sus hermanos».'
  to: 'Y dijo: «Canaán está maldito[a]; será para sus hermanos un esclavo de esclavos[b]».'
  rationale: 'Se reestructura la cláusula final para expresar de manera natural en español la relación marcada por לְאֶחָיו sin perder el sentido de subordinación: «será para sus hermanos un esclavo de esclavos». También se coloca «esclavo de esclavos» en el texto principal, conforme al hebreo y a la decisión léxica del proyecto, y se eliminan notas no esenciales.'
  reviewer_model: gpt-5.4
