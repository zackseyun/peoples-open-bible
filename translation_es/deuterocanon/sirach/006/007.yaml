translation:
  language: es
  text: Si adquieres un amigo[a], adquiérelo mediante una prueba, y no confíes en él demasiado pronto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «gánalo mediante una prueba»; el hebreo y el griego emplean un verbo de «adquirir/obtener», que puede sonar más transaccional que el español idiomático «hacer un amigo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: קָנִיתָ / קְנֵהוּ / εἰ κτᾶσαι φίλον ... κτῆσαι αὐτόν
  english_pob_choice: acquire / acquire him
  chosen_spanish: adquieres / adquiérelo
  alternatives_spanish:
  - ganas / gánalo
  - obtienes / obténlo
  - haces tu amigo / hazlo tu amigo
  lexicon: HALOT; LXX κτάομαι
  rationale: El verbo hebreo קנה y el griego κτάομαι apuntan a adquirir, obtener o ganar algo/persona; no a 'hacer' un amigo. 'Adquieres/adquiérelo' conserva el matiz algo transaccional y sigue de cerca la imagen original sin volverla idiomática en exceso.
- source_word: אוֹהֵב / φίλον
  english_pob_choice: friend
  chosen_spanish: amigo
  alternatives_spanish:
  - amante
  - compañero
  - el que ama
  lexicon: HALOT; LXX φίλος
  rationale: En este contexto sapiencial, אוֹהֵב y φίλος designan una relación personal de amistad. 'Amigo' es la equivalencia natural en español y evita el sentido erótico de 'amante' o la literalidad poco idiomática de 'el que ama'.
- source_word: בְּנִסָּיוֹן / ἐν πειρασμῷ
  english_pob_choice: through testing
  chosen_spanish: mediante prueba
  alternatives_spanish:
  - por medio de prueba
  - a través de prueba
  - en prueba
  lexicon: HALOT; léxico del NT/LXX para πειρασμός
  rationale: La idea es someter la relación a una prueba para verificar su confiabilidad. 'Mediante prueba' expresa el medio o ámbito de verificación y suena natural en español, manteniendo el valor de 'testing/trial' sin suavizarlo.
- source_word: וְאַל תְּמַהֵר
  english_pob_choice: do not quickly
  chosen_spanish: no confíes ... con rapidez
  alternatives_spanish:
  - no te apresures
  - no te apresures a confiar
  - no seas rápido para confiar
  lexicon: HALOT
  rationale: El hebreo advierte contra la prisa. En español, la prohibición se expresa con mayor naturalidad como 'no confíes ... con rapidez', que conserva la cautela del original y el matiz adverbial de מהר.
- source_word: לִבְטוֹחַ עָלָיו / ἐμπιστεύσῃς αὐτῷ
  english_pob_choice: trust him
  chosen_spanish: confíes en él
  alternatives_spanish:
  - le tengas confianza
  - te fíes de él
  - depongas tu confianza en él
  lexicon: HALOT; LXX ἐμπιστεύομαι
  rationale: בטח con על y el griego ἐμπιστεύομαι expresan confiar en alguien o depositar confianza en él. 'Confiar en él' es claro y fiel en español; evita la rigidez de 'poner tu confianza' y conserva el tono exhortativo.
theological_decisions:
- issue: Tratamiento del sujeto genérico masculino singular
  english_pob_reading: Retain singular masculine pronouns ('him')
  chosen_spanish_reading: Mantener el singular masculino ('él')
  alternative_spanish_readings:
  - neutralizar con 'le' o 'ellos'
  - usar 'la persona'
  rationale: El hebreo y el griego usan singular masculino; en una sentencia sapiencial genérica, conservar 'él' respeta la forma del fuente y el registro auditado por la POB en vez de neutralizar la referencia.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Valor semántico de 'testing/trial'
  english_pob_reading: acquire him through testing
  chosen_spanish_reading: adquiérelo mediante prueba
  alternative_spanish_readings:
  - adquiérelo por medio de tentación
  - adquiérelo en la prueba
  rationale: '''Prueba'' mantiene la ambigüedad controlada de נסיון / πειρασμός entre examen y prueba, sin forzar ''tentación'', que en español restringiría indebidamente el sentido.'
  doctrine_reference: Lexical-theological note on testing/trial in wisdom literature
translation_notes:
  revision_awareness: El inglés auditado fue revisado desde 'put your trust in him' a 'trust him' para mayor naturalidad. La redacción española sigue esa simplificación con 'confiar en él', manteniendo el carácter directo y exhortativo del original. También se alineó con la preferencia de la POB por preservar el matiz de 'acquire' frente a una paráfrasis como 'hacer un amigo'.
  spanish_consistency_notes:
  - 'Se conserva el paralelismo de dos imperativos con cautela: adquirir/adquirido por prueba y no confiar con rapidez.'
  - '''Amigo'' se usa como equivalente estable de אוֹהֵב / φίλος en este contexto.'
  - '''Prueba'' evita decidir de forma prematura entre ''prueba'' y ''tentación'', dejando visible la tensión semántica del término original.'
  - Se mantiene el pronombre masculino singular 'él' conforme al hebreo y al griego.
