translation:
  language: es
  text: Traigan todo el diezmo al depósito[a], para que haya alimento en mi casa. Y pónganme a prueba ahora en esto —dice Yahvé de los ejércitos—, si no les abriré las ventanas[b] de los cielos y derramaré para ustedes bendición[c] hasta que no haya más necesidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el diezmo entero' o 'todo el diezmo'. 'Depósito' traduce el lugar de almacenamiento del templo; tradicionalmente, 'alfolí'.
    reason: lexical_alternative
  - marker: b
    text: O 'las compuertas de los cielos'. El hebreo dice literalmente 'las ventanas de los cielos'.
    reason: lexical_alternative
  - marker: c
    text: El modismo hebreo expresa abundancia más allá de la suficiencia; tradicionalmente, 'hasta que no haya más lugar' o 'sin medida'.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָבִיאוּ
  english_pob_choice: Bring
  chosen_spanish: Traigan
  alternatives_spanish:
  - Lleven
  - Traigan adentro
  lexicon: HALOT
  rationale: El imperativo plural en español natural pide un verbo directo y en segunda persona plural. 'Traigan' preserva la fuerza exhortativa y evita una calca poco idiomática.
- source_word: כָּל הַמַּעֲשֵׂר
  english_pob_choice: the full tithe
  chosen_spanish: todo el diezmo
  alternatives_spanish:
  - el diezmo completo
  - el total del diezmo
  lexicon: HALOT
  rationale: כָּל con el sustantivo singular expresa totalidad. 'Todo el diezmo' comunica con claridad que se exige la totalidad, sin forzar una formulación más técnica.
- source_word: בֵּית הָאוֹצָר
  english_pob_choice: the storehouse
  chosen_spanish: alfolí
  alternatives_spanish:
  - depósito
  - almacén
  lexicon: HALOT
  rationale: '''Alfolí'' es el equivalente tradicional en español para un depósito de provisiones, y conserva el matiz de lugar de resguardo del templo. Se mantiene como término entendible en registro bíblico.'
- source_word: וִיהִי טֶרֶף בְּבֵיתִי
  english_pob_choice: so that there may be food in my house
  chosen_spanish: para que haya alimento en mi casa
  alternatives_spanish:
  - para que haya comida en mi casa
  - para que haya provisión en mi casa
  lexicon: HALOT
  rationale: טֶרֶף aquí no se entiende como 'presa' sino como sustento/provisión. 'Alimento' conserva el sentido de provisión necesaria para la casa de Dios sin sobreinterpretar.
- source_word: בְּבֵיתִי
  english_pob_choice: in my house
  chosen_spanish: en mi casa
  alternatives_spanish:
  - en mi templo
  lexicon: HALOT
  rationale: Se conserva la literalidad de 'mi casa', que mantiene el lenguaje del pacto y no especifica más de lo que el hebreo dice.
- source_word: וּבְחָנוּנִי נָא בָּזֹאת
  english_pob_choice: test me now in this
  chosen_spanish: pónganme a prueba ahora en esto
  alternatives_spanish:
  - pruébenme ahora en esto
  - testéenme ahora en esto
  lexicon: HALOT
  rationale: בחן significa examinar o probar. 'Pónganme a prueba' es una forma natural y reverente en español para conservar la invitación divina inusual.
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: Yahweh of hosts
  chosen_spanish: Yahvé de los ejércitos
  alternatives_spanish:
  - Yahvé de los ejércitos celestiales
  - Yahvé de los ejércitos
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para יְהוָה como 'Yahvé'. צְבָאוֹת se vierte como 'de los ejércitos' para conservar el título teológico y su fuerza marcial/cósmica.
- source_word: אִם לֹא אֶפְתַּח לָכֶם
  english_pob_choice: whether I will not open for you
  chosen_spanish: a ver si no les abro
  alternatives_spanish:
  - si no les abro
  - si no les abriré
  lexicon: HALOT
  rationale: La construcción hebrea plantea una prueba con tono retórico y fuertemente afirmativo. 'A ver si no' reproduce ese desafío en español sin volverlo una negación ordinaria.
- source_word: אֲרֻבּוֹת הַשָּׁמַיִם
  english_pob_choice: the windows of heaven
  chosen_spanish: las ventanas de los cielos
  alternatives_spanish:
  - las compuertas de los cielos
  - las ventanas del cielo
  lexicon: HALOT
  rationale: '''Ventanas'' sigue el sentido literal de אֲרֻבּוֹת. ''De los cielos'' conserva el plural hebreo y la resonancia bíblica, aunque en español también podría leerse singularmente según estilo.'
- source_word: וַהֲרִיקֹתִי
  english_pob_choice: pour out
  chosen_spanish: derramo
  alternatives_spanish:
  - vaciaré
  - derramaré
  lexicon: HALOT
  rationale: El verbo expresa vaciar o derramar abundantemente. 'Derramo' en presente profético suena natural en español y retiene la imagen de abundancia desbordante.
- source_word: בְּרָכָה
  english_pob_choice: blessing
  chosen_spanish: bendición
  alternatives_spanish:
  - bendición abundante
  - favor
  lexicon: HALOT
  rationale: '''Bendición'' es el equivalente más directo y amplio para בְּרָכָה. Se evita restringirla a prosperidad material, como indica el audit trail inglés.'
- source_word: עַד בְּלִי דָי
  english_pob_choice: until there is no more need
  chosen_spanish: hasta que no haya más necesidad
  alternatives_spanish:
  - hasta no caber más
  - hasta que sobre
  lexicon: HALOT
  rationale: El modismo hebreo denota abundancia más que suficiente. 'Hasta que no haya más necesidad' transmite esa suficiencia desbordante sin introducir la imagen espacial de 'lugar' o 'espacio'.
theological_decisions:
- issue: Traducción del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme a la política del proyecto, se debe preservar el nombre del pacto como 'Yahvé' y no ocultarlo tras un título en mayúsculas.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de la promesa de bendición
  english_pob_reading: general 'blessing' without specifying material prosperity alone
  chosen_spanish_reading: bendición sin precisar prosperidad material
  alternative_spanish_readings:
  - prosperidad
  - abundancia material
  rationale: El sustantivo בְּרָכָה es amplio. La traducción mantiene esa amplitud y no reduce la promesa a una sola dimensión económica o agrícola.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Never import doctrinal claims the text does not make'
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión del audit trail: se conserva el orden natural de ''pónganme a prueba ahora en esto'' y se mantiene la estructura retórica del hebreo con una formulación española formal y publicable.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יהוה conforme al estándar del proyecto.
  - Se mantiene una distinción entre 'alfolí' como término bíblico tradicional y 'alimento' como provisión contextual.
  - La frase 'las ventanas de los cielos' conserva la imagen hebrea y admite la nota alternativa sobre 'compuertas'.
  - '''Hasta que no haya más necesidad'' busca reflejar el hebreo idiomático sin importar una lectura doctrinal estrecha.'
