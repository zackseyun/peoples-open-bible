translation:
  language: es
  text: Y en los días de Enemessar hacía muchas obras de misericordia[a] para mis hermanos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'limosnas' o 'actos de caridad'; el término griego suele referirse a actos concretos de misericordia, especialmente ayuda a los necesitados.
    reason: lexical_alternative
  - marker: b
    text: '''Mis hermanos'' puede referirse ampliamente a los compatriotas o parientes de Tobit, no solo a hermanos biológicos.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν ταῖς ἡμέραις
  english_pob_choice: in the days of
  chosen_spanish: en los días de
  alternatives_spanish:
  - en tiempo de
  - durante el reinado de
  lexicon: LSJ
  rationale: La locución temporal griega se conserva con una fórmula natural en español. 'En los días de' mantiene el valor idiomático y la cercanía formal del original sin forzar una interpretación histórica más específica que la del texto.
- source_word: Ἐνεμεσσάρου
  english_pob_choice: Enemessar
  chosen_spanish: Enemesar
  alternatives_spanish:
  - Enemessar
  - Enemessaro
  lexicon: transliteración del genitivo griego
  rationale: Se translitera el nombre propio para conservar la referencia histórica. La forma española 'Enemesar' busca ser legible y estable en castellano, manteniendo la base auditiva del nombre griego documentado en el audit trail inglés.
- source_word: ἐλεημοσύνας
  english_pob_choice: acts of mercy
  chosen_spanish: obras de misericordia
  alternatives_spanish:
  - limosnas
  - actos de misericordia
  - deeds of mercy
  lexicon: LSJ
  rationale: El término puede abarcar limosna, caridad o actos concretos de compasión. 'Obras de misericordia' preserva el sentido de acciones concretas de ayuda y su amplitud semántica, sin reducirlo solo a una donación monetaria.
- source_word: πολλὰς
  english_pob_choice: many
  chosen_spanish: muchas
  alternatives_spanish:
  - numerosas
  - muchísimas
  lexicon: LSJ
  rationale: Se traduce de forma directa como plural concordante con 'obras'. No añade intensidad interpretativa más allá de la cantidad señalada por el griego.
- source_word: ἐποίουν
  english_pob_choice: I did
  chosen_spanish: hacía
  alternatives_spanish:
  - realizaba
  - practicaba
  - hice
  lexicon: LSJ
  rationale: El imperfecto expresa acción habitual o repetida en ese marco narrativo. 'Hacía' reproduce esa aspectualidad en español mejor que un perfecto puntual.
- source_word: τοῖς ἀδελφοῖς μου
  english_pob_choice: for my brothers
  chosen_spanish: para mis hermanos
  alternatives_spanish:
  - para mis hermanos de raza
  - para mis parientes
  - para mis compatriotas
  lexicon: LSJ
  rationale: '''ἀδελφοί'' puede indicar hermanos literales o, en contexto judío, correligionarios/compatriotas. Se conserva ''hermanos'' para no cerrar el alcance del término, y ''para'' refleja bien el sentido benefactivo del texto.'
theological_decisions:
- issue: Alcance de 'mis hermanos'
  english_pob_reading: my brothers may refer broadly to Tobit's fellow Israelites or kinsmen, not only biological brothers.
  chosen_spanish_reading: mis hermanos puede referirse en sentido amplio a sus correligionarios o compatriotas, no solo a hermanos biológicos.
  alternative_spanish_readings:
  - mis parientes
  - mis compatriotas
  - mis hermanos de sangre
  rationale: El griego dice literalmente 'mis hermanos'. En el contexto de Tobit, el término puede abarcar a miembros del pueblo, no únicamente a hermanos carnales. La redacción principal conserva la literalidad y deja abierta la amplitud semántica documentada.
  doctrine_reference: DOCTRINE.md §§1, 4
- issue: Naturaleza de ἐλεημοσύνας
  english_pob_reading: acts of mercy / alms / charitable deeds
  chosen_spanish_reading: obras de misericordia
  alternative_spanish_readings:
  - limosnas
  - obras caritativas
  - actos de misericordia
  rationale: La palabra griega no se limita a una limosna aislada; puede expresar actos concretos de ayuda. 'Obras de misericordia' comunica bien esa dimensión práctica y mantiene abierta la tensión entre caridad material y compasión activa.
  doctrine_reference: LSJ; DOCTRINE.md §§1, 4
translation_notes:
  revision_awareness: La versión inglesa reciente permanece sin cambios tras revisión; la forma española se alinea con ese estado estable, conservando la literalidad del nombre propio y la amplitud semántica de ἐλεημοσύνας sin introducir armonizaciones posteriores.
  spanish_consistency_notes:
  - Se mantiene 'hermanos' en lugar de 'compatriotas' o 'parientes' para preservar la literalidad del griego.
  - Se evita 'SEÑOR' u otra convención no pertinente porque el versículo no contiene el nombre divino.
  - Se elige un español moderno y sobrio, con sintaxis breve y lectura litúrgica clara.
