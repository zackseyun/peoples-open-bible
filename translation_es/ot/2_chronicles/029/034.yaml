base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/029/034.yaml
  text: Only the priests were too few[a], and they were not able to skin all the burnt offerings, so their brothers the Levites supported them until the work was finished and until the priests had consecrated themselves[b]. For the Levites were more upright in heart to consecrate themselves than the priests.
  footnotes:
  - marker: a
    text: Or 'helped them'; the Hebrew verb is literally 'strengthened them.'
    reason: lexical_alternative
  - marker: b
    text: Or 'more wholehearted' or 'upright of heart'; the Hebrew emphasizes inner sincerity or rectitude.
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
