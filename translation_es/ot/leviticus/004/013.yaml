    text: 'Hebreo: ‘y el asunto queda oculto de los ojos de la asamblea’, un giro idiomático que indica que el hecho pasó inadvertido para la comunidad.'
    reason: lexical_alternative
  revision_rationale: Se ajusta יִשְׁגּוּ a ‘peca involuntariamente’ para preservar la categoría legal-teológica central de Levítico 4 con claridad en español moderno. Se reaprovecha la nota [a] para incluir tanto la alternativa léxica de עֲדָה como la explicación necesaria sobre la involuntariedad del verbo, siguiendo mejor el expediente inglés. También se mejora la naturalidad jurídica de וְאָשֵׁמוּ con ‘se hacen culpables’. Se conserva ‘Yahvé’, así como la distinción ‘congregación’ / ‘asamblea’.
