translation:
  language: es
  text: En todos tus hechos, guárdate[a], porque el que hace esto guarda el mandamiento[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «guarda tu alma» o «guarda tu vida». En hebreo, נפש puede significar «yo mismo», «vida» o «alma».
    reason: lexical_alternative
  - marker: b
    text: O «quien hace esto guarda un mandamiento». El singular puede entenderse de manera genérica.
    reason: lexical_alternative
lexical_decisions:
- source_word: בכל
  english_pob_choice: In all
  chosen_spanish: En todos
  alternatives_spanish:
  - Con todos
  - En cada
  lexicon: HALOT
  rationale: La preposición ב con כל expresa el ámbito total en que aplica la exhortación. «En todos» conserva ese alcance comprehensivo en un español natural y apto para la instrucción sapiencial.
- source_word: מעשיך
  english_pob_choice: your deeds
  chosen_spanish: tus hechos
  alternatives_spanish:
  - tus acciones
  - tus obras
  lexicon: HALOT
  rationale: מעשים apunta a actos concretos de conducta. «Hechos» mantiene el peso moral sin sonar tan técnico como «obras» ni tan neutro como «acciones».
- source_word: שמור
  english_pob_choice: guard
  chosen_spanish: cuida de
  alternatives_spanish:
  - guarda
  - vela por
  - vigila
  lexicon: HALOT
  rationale: El imperativo שמר puede significar guardar, vigilar o cuidar. Aquí, con נפש en una exhortación sapiencial, «cuida de» transmite vigilancia atenta y prudente sin sonar rígido o demasiado literal en español.
- source_word: נפשך
  english_pob_choice: yourself
  chosen_spanish: ti mismo
  alternatives_spanish:
  - tu alma
  - tu vida
  - tu persona
  lexicon: HALOT
  rationale: נפש puede significar alma, vida o self/persona. En este contexto ético, la idea es el autocuidado integral; «ti mismo» comunica bien esa fuerza idiomática sin imponer una antropología dualista.
- source_word: כי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque en efecto
  lexicon: HALOT
  rationale: Aquí introduce la razón de la exhortación. «Porque» es la equivalencia más clara y natural en español.
- source_word: עושה זה
  english_pob_choice: the one who does this
  chosen_spanish: el que hace esto
  alternatives_spanish:
  - quien hace esto
  - quien así obra
  lexicon: HALOT
  rationale: La construcción participial con demostrativo tiene fuerza genérica. «El que hace esto» preserva el valor representativo y suena fluido en español bíblico contemporáneo.
- source_word: שומר מצוה
  english_pob_choice: keeps the commandment
  chosen_spanish: guarda el mandamiento
  alternatives_spanish:
  - cumple el mandamiento
  - guarda un mandamiento
  - obedece el mandamiento
  lexicon: HALOT
  rationale: שמר enlaza con el verbo inicial y conserva la idea de observancia fiel. «El mandamiento» refleja la forma singular del hebreo, entendida de modo genérico como en el audit trail inglés.
theological_decisions:
- issue: Sentido de נפש en una exhortación sapiencial
  english_pob_reading: yourself
  chosen_spanish_reading: ti mismo
  alternative_spanish_readings:
  - tu alma
  - tu vida
  rationale: La POB inglesa opta por una lectura integral de נפש como self/persona, no como «alma» en sentido dualista. «Ti mismo» mantiene ese énfasis práctico en el comportamiento y evita cargar el texto con una antropología posterior.
  doctrine_reference: Translation philosophy §1, §6
- issue: Valor genérico del singular en עושה זה
  english_pob_reading: the one who does this
  chosen_spanish_reading: el que hace esto
  alternative_spanish_readings:
  - quien hace esto
  - el que así obra
  rationale: El singular masculino hebreo funciona de manera genérica. En español, «el que» mantiene esa generalidad con naturalidad; no se pretende restringirlo a varones.
  doctrine_reference: Translation philosophy §4
- issue: Singular de מצוה
  english_pob_reading: the commandment
  chosen_spanish_reading: el mandamiento
  alternative_spanish_readings:
  - un mandamiento
  - el precepto
  rationale: El hebreo es singular y el audit trail inglés conserva «the commandment» como genérico. En español, «el mandamiento» transmite mejor esa fuerza colectiva que «un mandamiento», sin precisar indebidamente cuál.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia entre el hebreo suministrado y el audit trail inglés. La versión española sigue la línea del texto hebreo de sabiduría y conserva la ambigüedad léxica principal en נפש mediante nota, así como la posible lectura genérica del singular en מצוה.
  spanish_consistency_notes:
  - Se mantiene «mandamiento» para reflejar la singularidad del hebreo y la elección auditada en inglés.
  - Se usa «ti mismo» para נפש, evitando «alma» en el texto principal por la ambigüedad antropológica documentada.
  - El imperativo «cuida de» comunica el sentido de vigilancia de שמר sin perder naturalidad en español.
  - El registro es sobrio y bíblico, pero evita arcaísmos innecesarios.
