translation:
  language: es
  text: ¿Disputaría con palabras vanas[a], o con discurso que no hace ningún bien?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Razonaría con palabras sin provecho, o con palabras con las que no puede hacer ningún bien?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹכֵחַ
  english_pob_choice: argue
  chosen_spanish: disputaría
  alternatives_spanish:
  - razonaría
  - argüiría
  - reprendería
  lexicon: HALOT
  rationale: En el contexto de disputa de Job, הוֹכֵחַ expresa contienda verbal o debate. «Disputaría» conserva la idea de confrontación argumentativa sin introducir un matiz jurídico más fuerte de lo que exige el texto.
- source_word: בְּדָבָר
  english_pob_choice: with ... words
  chosen_spanish: con palabras
  alternatives_spanish:
  - con una palabra
  - con un asunto
  - con discurso
  lexicon: HALOT
  rationale: דָבָר puede significar «palabra», «asunto» o «cosa», pero aquí el paralelismo con מִלִּים indica habla. «Palabras» preserva ese paralelismo en español natural.
- source_word: לֹא יִסְכּוֹן
  english_pob_choice: useless
  chosen_spanish: vanas
  alternatives_spanish:
  - inútiles
  - sin provecho
  - sin valor
  lexicon: HALOT
  rationale: El verbo comunica falta de utilidad o provecho. «Vanas» mantiene la idea de inutilidad y suena idiomático en español bíblico sin volverlo demasiado coloquial.
- source_word: וּמִלִּים
  english_pob_choice: or with speech
  chosen_spanish: con discurso
  alternatives_spanish:
  - con palabras
  - o con palabras
  - con habla
  lexicon: HALOT
  rationale: מִלִּים son «palabras», pero «discurso» evita una repetición pesada de «palabras» y conserva la sinonimia poética del hebreo.
- source_word: לֹא יוֹעִיל בָּם
  english_pob_choice: that does no good
  chosen_spanish: que no aprovecha
  alternatives_spanish:
  - que no hace bien
  - que no sirve
  - que no da provecho
  lexicon: HALOT
  rationale: יוֹעִיל expresa beneficio o provecho; «no aprovecha» reproduce esa noción con claridad y mantiene la relación con el antecedente implícito en español.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la lectura aprobada en inglés: dos miembros paralelos que cuestionan la eficacia de la الكلام/wording de Job. Se ajustó el español para mantener el paralelismo y la acusación de inutilidad sin endurecer innecesariamente el matiz legal de הוֹכֵחַ.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u otra terminología de sustitución porque el versículo no contiene el Tetragrámaton.
  - Se prefirió «palabras/discurso» para reflejar el paralelismo de דָבָר y מִלִּים sin calco mecánico.
  - «Vanas» y «no aprovecha» conservan la fuerza de inutilidad/provecho del hebreo y del inglés auditado.
  - El marcador [a] está anclado en la frase «palabras vanas» para señalar la alternativa de traducción sin sobrecargar el texto principal.
