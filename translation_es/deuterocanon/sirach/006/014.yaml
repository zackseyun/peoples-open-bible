translation:
  language: es
  text: Un amigo fiel es un fuerte refugio[a], y el que lo encuentra ha encontrado un tesoro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo conservado aquí es difícil y difiere notablemente del testimonio griego. Más literalmente del hebreo transmitido: «Un amante de la fidelidad [es/ama] la fuerza, y quien la halla ha encontrado riqueza». El texto principal sigue el sentido más claro del paralelo griego: «Un amigo fiel es un fuerte refugio».'
    reason: textual_variant
lexical_decisions:
- source_word: φίλος πιστὸς / אוֹהֵב אֱמוּנָה
  english_pob_choice: a faithful friend
  chosen_spanish: un amigo fiel
  alternatives_spanish:
  - uno que ama la fidelidad
  - un amigo de la fidelidad
  lexicon: HALOT; LXX φίλος πιστός
  rationale: El paralelo griego presenta claramente φίλος πιστός, por lo que en español la formulación natural y fiel es 'amigo fiel'. La alternativa hebrea literal 'uno que ama la fidelidad' conservaría más de cerca la sintaxis del hebreo transmitido, pero resultaría menos proverbial y menos clara en español.
- source_word: σκέπη κραταιά / תְּקוֹף
  english_pob_choice: strong refuge
  chosen_spanish: refugio fuerte
  alternatives_spanish:
  - refugio seguro
  - amparo fuerte
  - protección firme
  lexicon: HALOT; LXX σκέπη κραταιά
  rationale: '''Refugio'' sigue la decisión inglesa revisada (''refuge'') y expresa la imagen de cobertura/protección de σκέπη. ''Fuerte'' refleja κραταιά y preserva el énfasis en solidez. ''Amparo'' o ''protección'' serían posibles, pero ''refugio'' mantiene mejor el carácter proverbial de la metáfora.'
- source_word: ὁ δὲ εὑρὼν αὐτόν / וּמוֹצְאוֹ
  english_pob_choice: whoever finds one
  chosen_spanish: el que lo encuentra
  alternatives_spanish:
  - quien lo encuentra
  - y quien lo encuentra
  - el que encuentra a ese amigo
  lexicon: LXX αὐτόν; HALOT
  rationale: Aunque el griego usa un pronombre masculino y el hebreo un sufijo singular, el español puede recuperar el antecedente implícito con 'lo' sin perder claridad. 'El que lo encuentra' suena natural en español y evita una construcción más rígida como 'quien encuentra a ese amigo'.
- source_word: θησαυρόν / הוֹן
  english_pob_choice: a treasure
  chosen_spanish: un tesoro
  alternatives_spanish:
  - riqueza
  - riquezas
  - un bien valioso
  lexicon: LSJ; HALOT
  rationale: El griego θησαυρόν apoya con claridad 'tesoro', y esa palabra conserva el valor proverbial y concreto de la sentencia. 'Riqueza' sería una posible lectura del hebreo, pero 'tesoro' sigue mejor el paralelo griego adoptado por la POB en el texto principal.
theological_decisions:
- issue: Manejo de la divergencia entre el hebreo transmitido y el paralelo griego
  english_pob_reading: 'The main text follows the clearer sense of the Greek parallel: ''A faithful friend is a strong shelter/refuge.'''
  chosen_spanish_reading: 'El texto principal sigue el sentido claro del paralelo griego: ''Un amigo fiel es un refugio fuerte.'''
  alternative_spanish_readings:
  - Un amante de la fidelidad ama la fuerza, y el que lo encuentra ha encontrado riqueza.
  - Un amigo fiel es un amparo fuerte, y el que lo encuentra ha encontrado un bien valioso.
  rationale: La evidencia recibida marca una discrepancia importante entre los testigos. Para Sirácides, la política del proyecto da peso real al hebreo conservado, pero también usa el griego como insumo de traducción. Aquí el griego produce una sentencia proverbial coherente y estable, mientras que el hebreo transmitido es sintácticamente difícil. Por eso el texto principal adopta el sentido griego y conserva en la nota la posibilidad más literal del hebreo.
  doctrine_reference: 'PHILOSOPHY.md: para Sirácides, traducir desde el hebreo donde se conserve y usar el paralelo griego como insumo real de traducción; documentar honestamente la incertidumbre del testimonio.'
translation_notes:
  revision_awareness: Se incorporó la revisión reciente del auditorio inglés que sustituyó 'shelter' por 'refuge'; por ello el español usa 'refugio' y no 'amparo' o 'shelter'. También se mantuvo el cierre con 'un tesoro' conforme a la tradición POB y al griego θησαυρόν.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma por defecto en la serie, aunque este versículo no la contiene.
  - Se conserva 'amigo fiel' en lugar de una paráfrasis más amplia para respetar el paralelo griego φίλος πιστός.
  - '''Refugio fuerte'' sigue el registro formal de la revisión inglesa y evita una domesticación excesiva.'
  - La nota distingue con cuidado entre la traducción principal y la lectura más literal del hebreo transmitido, sin borrar la tensión textual.
