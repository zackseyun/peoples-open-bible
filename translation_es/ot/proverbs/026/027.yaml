translation:
  language: es
  text: Quien cava una fosa caerá en ella, y el que hace rodar una piedra, esta volverá sobre él.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y el que hace rodar una piedra, esta volverá a él»
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּרֶה
  english_pob_choice: Whoever digs
  chosen_spanish: Quien cava
  alternatives_spanish:
  - El que cava
  - Quien está cavando
  lexicon: HALOT
  rationale: El participio hebreo funciona de modo genérico y proverbial. «Quien» conserva esa fuerza universal en español sin volver la frase rígida; «cava» mantiene el verbo concreto y natural para el refrán.
- source_word: שַּׁחַת
  english_pob_choice: a pit
  chosen_spanish: una fosa
  alternatives_spanish:
  - un hoyo
  - un pozo
  - una trampa
  lexicon: HALOT
  rationale: «Fosa» comunica bien una cavidad cavada y puede sugerir el peligro del dicho. «Hoyo» es posible, pero menos solemne; «trampa» añade una noción no explícita en el hebreo.
- source_word: בָּהּ
  english_pob_choice: into it
  chosen_spanish: en ella
  alternatives_spanish:
  - dentro de ella
  - en eso
  lexicon: HALOT
  rationale: El pronombre femenino remite a «fosa». En español, con «caer» resulta natural «caer en ella»; conserva el referente sin forzar una construcción menos idiomática.
- source_word: יִפֹּל
  english_pob_choice: will fall
  chosen_spanish: caerá
  alternatives_spanish:
  - va a caer
  - cae
  lexicon: HALOT
  rationale: El imperfecto hebreo expresa consecuencia segura y proverbial. El futuro castellano transmite bien esa certeza gnómica en una formulación fluida.
- source_word: וְגֹלֵל
  english_pob_choice: and he who rolls
  chosen_spanish: y el que revuelve
  alternatives_spanish:
  - y el que rueda
  - y el que hace rodar
  lexicon: HALOT
  rationale: Para אבן, «revuelve» intenta captar la acción de poner la piedra en movimiento con algo de amplitud semántica; «rueda» puede sonar menos natural con una piedra en algunos contextos, aunque es una alternativa válida. Se conserva el paralelismo con «el que».
- source_word: אֶבֶן
  english_pob_choice: a stone
  chosen_spanish: una piedra
  alternatives_spanish:
  - una roca
  - una piedra grande
  lexicon: HALOT
  rationale: «Piedra» es la opción más natural y fiel en español. En este proverbio no hace falta especificar tamaño; «roca» endurecería la imagen.
- source_word: אֵלָיו
  english_pob_choice: on him
  chosen_spanish: a él
  alternatives_spanish:
  - sobre él
  - contra él
  lexicon: HALOT
  rationale: El hebreo indica retorno hacia la persona que inició la acción. En español, con la pasiva refleja «se le volverá», «a él» marca claramente el receptor del retorno sin añadir una preposición más interpretativa.
- source_word: תָּשׁוּב
  english_pob_choice: it will come back
  chosen_spanish: se le volverá
  alternatives_spanish:
  - volverá sobre él
  - regresará a él
  lexicon: HALOT
  rationale: «Volver» recoge היטב la idea de retorno/reversión del proverbio. La construcción impersonal «se le volverá» conserva el sentido de reflujo dañino y evita atribuir un sujeto explícito que el hebreo no desarrolla en esta cláusula.
theological_decisions:
- issue: Consequence proverb with reciprocal retribution imagery
  english_pob_reading: Whoever digs a pit will fall into it, and he who rolls a stone, it will come back on him.
  chosen_spanish_reading: Quien cava una fosa caerá en ella, y el que revuelve una piedra, a él se le volverá.
  alternative_spanish_readings:
  - Quien cava una fosa caerá en ella, y el que revuelve una piedra, la piedra le volverá.
  - Quien cava una fosa caerá en ella, y el que hace rodar una piedra, ésta volverá sobre él.
  rationale: 'El texto presenta una sabiduría proverbial de retribución por reversión: la acción dañina regresa al agente. La redacción española mantiene esa tensión sin explicitar más de lo que el hebreo dice, y conserva el paralelo entre las dos mitades del proverbio.'
  doctrine_reference: Sabiduría proverbial; principio de retribución/reciprocidad en literatura sapiencial (cf. Prov. 26:27)
- issue: Implicit subject in the second colon
  english_pob_reading: he who rolls a stone, it will come back on him
  chosen_spanish_reading: el que revuelve una piedra, a él se le volverá
  alternative_spanish_readings:
  - el que revuelve una piedra, volverá sobre él
  - el que revuelve una piedra, la piedra volverá a él
  rationale: El hebreo omite un sujeto explícito para el verbo final y deja que el objeto (la piedra) sea el que ‘vuelva’. En español, la pasiva refleja impersonal preserva esa ambigüedad y el efecto proverbial sin sobrecargar la sintaxis.
  doctrine_reference: Poética hebrea; paralelismo sintético y elipsis verbal
translation_notes:
  revision_awareness: 'El audit trail inglés se mantuvo muy cercano al hebreo: participios genéricos («whoever/he who»), retorno recíproco («come back/return»), y una nota alternativa para el segundo colon. La versión española adopta una equivalencia óptima: conserva el proverbio y su simetría, pero ajusta la sintaxis a un español natural. No se introdujeron decisiones doctrinales nuevas; solo se resolvió la referencia del retorno con una pasiva refleja.'
  spanish_consistency_notes:
  - Se emplea «fosa» para שַׁחַת conforme al registro proverbial, sin convertirlo en «trampa» o «pozo» de manera interpretativa.
  - Se mantiene «Yahvé» como convención del proyecto solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se prefieren construcciones genéricas con «quien / el que» para reflejar participios hebreos substantivados.
  - La nota al pie marca la alternativa de género/correferencia en la segunda mitad, preservando la posibilidad de leer el objeto («piedra») como el sujeto implícito del retorno.
