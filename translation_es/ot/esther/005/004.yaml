translation:
  language: es
  text: 'Esther dijo[a]: «Si le place al rey, que vengan hoy el rey y Amán al banquete que he preparado para él[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si le agrada al rey».'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «para él», aparentemente refiriéndose específicamente al rey, aunque también se invita a Amán.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם עַל הַמֶּלֶךְ טוֹב
  english_pob_choice: If it pleases the king
  chosen_spanish: Si le place al rey
  alternatives_spanish:
  - Si parece bien al rey
  - Si le agrada al rey
  lexicon: HALOT
  rationale: La fórmula hebrea es una petición deferente de aprobación real. «Le place al rey» conserva el tono cortesano y la evaluación favorable implicada por טוֹב sin sonar arcaizante en español. «Si parece bien al rey» también sería posible, pero «le place» es más natural en un registro formal.
- source_word: יָבֹוא
  english_pob_choice: let ... come
  chosen_spanish: que vengan
  alternatives_spanish:
  - que venga
  - pueda venir
  lexicon: HALOT
  rationale: Aunque la forma hebrea es imperfecta 3ms, aquí funciona con valor volitivo/jusivo dentro de una invitación respetuosa. En español, el plural «vengan» refleja con naturalidad la coordinación «el rey y Haman» y expresa la petición implícita de manera idiomática.
- source_word: הַמֶּלֶךְ וְהָמָן
  english_pob_choice: the king and Haman
  chosen_spanish: el rey y Haman
  alternatives_spanish:
  - el rey Ahasuero y Haman
  - el rey y Amán
  lexicon: HALOT
  rationale: El hebreo repite «el rey» en vez de usar el nombre personal. Se conserva el título, como en el fuente, sin suplir un nombre que aquí no aparece. Se mantiene «Haman» siguiendo la forma usada en el contexto inglés auditado; en español también es reconocible.
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  lexicon: HALOT
  rationale: «Hoy» es el equivalente natural y conserva la inmediatez temporal de la invitación.
- source_word: הַמִּשְׁתֶּה
  english_pob_choice: the banquet
  chosen_spanish: el banquete
  alternatives_spanish:
  - la fiesta
  - el festín
  lexicon: HALOT
  rationale: מִשְׁתֶּה suele designar un banquete o festín, a menudo con bebida, pero «banquete» es la opción española más idiomática y adecuada al ambiente real.
- source_word: אֲשֶׁר עָשִׂיתִי לוֹ
  english_pob_choice: that I have prepared for him
  chosen_spanish: que he preparado para él
  alternatives_spanish:
  - que he hecho para él
  - que preparé para él
  lexicon: HALOT
  rationale: עָשָׂה literalmente es «hacer», pero en el contexto de un banquete el sentido idiomático es «preparar». Se conserva el singular de לוֹ con «para él», como en el texto auditado, porque el referente más natural es el rey, aunque también se invite a Haman.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo de Esther 5:4 y toma como guía el criterio POB de equivalencia óptima observado en el inglés auditado. Se preserva la formulación deferente de la petición, el valor volitivo del verbo, la repetición titulada de «el rey», la referencia temporal inmediata y el singular de לוֹ, manteniendo la tensión referencial documentada en la nota del texto fuente.
  spanish_consistency_notes:
  - Se usa «Haman» sin adaptación acentual para mantener consistencia con el contexto POB auditado y con el nombre tal como circula ampliamente en español bíblico.
  - Se prefiere «banquete» sobre «fiesta» o «festín» por su adecuación al contexto cortesano.
  - Se conserva la estructura de invitación respetuosa sin expandir el texto más allá de lo que permite el hebreo.
