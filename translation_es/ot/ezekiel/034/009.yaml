translation:
  language: es
  text: 'Por tanto, pastores del rebaño, oigan la palabra de Yahvé:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Expresa con naturalidad en español la consecuencia lógica del juicio anterior, manteniendo el tono profético-formal del inicio inglés 'Therefore'.
- source_word: הָרֹעִים
  english_pob_choice: shepherds
  chosen_spanish: pastores
  alternatives_spanish:
  - pastores de rebaños
  - pastores/guardianes
  lexicon: HALOT
  rationale: El hebreo literal es 'pastores'. En español, 'pastores' conserva la metáfora pastoral del capítulo; 'pastores' también es el equivalente más directo y comprensible para un destinatario eclesial, sin convertirlo en una paráfrasis como 'líderes'.
- source_word: שִׁמְעוּ
  english_pob_choice: hear
  chosen_spanish: oigan
  alternatives_spanish:
  - escuchen
  - atiendan
  lexicon: HALOT
  rationale: El imperativo plural de שׁמע llama a recibir con obediencia la palabra profética. 'Oigan' conserva la fuerza del mandato y el registro solemne mejor que un coloquial 'escuchen'.
- source_word: דְּבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - la palabra profética
  lexicon: HALOT
  rationale: En la fórmula profética דְּבַר יְהוָה, 'la palabra' es la correspondencia más transparente y estable en español. 'Mensaje' suaviza demasiado el valor técnico de la expresión.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del POB en español de rendir el Tetragrámaton como 'Yahvé'. Es la forma de nombre divino más establecida en español para preservar el nombre propio del pacto, no un sustituto titular como 'SEÑOR'.
theological_decisions:
- issue: Preservar la metáfora pastoral en הָרֹעִים
  english_pob_reading: shepherds
  chosen_spanish_reading: pastores
  alternative_spanish_readings:
  - líderes
  - gobernantes
  rationale: El contexto de Ezequiel 34 desarrolla de manera sostenida la imagen de pastores para los responsables de Israel. Traducirlo por 'líderes' aclararía la referencia, pero borraría una metáfora estructural del pasaje; por eso se conserva.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy; preserve source meaning unless context demands otherwise'
- issue: Rendir el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: La forma española 'Yahvé' preserva el nombre personal de Dios revelado en el texto hebreo y evita la sustitución por un título. Mantiene la decisión doctrinal del POB de transparentar el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El texto y la decisión léxica siguen de cerca la lectura inglesa auditada y no requieren revisión adicional; el pasaje es breve, estable y con concordancia alta en la auditoría.
  spanish_consistency_notes:
  - 'Se mantuvo el orden discursivo simple del hebreo: conector, vocativo, imperativo, objeto.'
  - '''Yahvé'' se usa de manera consistente con la terminología base del proyecto en español.'
  - No se añadió glosa interpretativa como 'líderes' para no debilitar la metáfora central de 'pastores'.
