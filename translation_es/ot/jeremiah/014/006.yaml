  verdict: revise
  source_alignment_summary: 'El borrador capta bien la escena general del hebreo: animales salvajes en alturas desoladas, respiración desesperada y falta de hierba. Sin embargo, hay dos problemas de fidelidad/claridad: (1) עָמְדוּ se refleja mejor como «están de pie» o «se quedan parados» que como «se detienen», que introduce una noción de movimiento previo; (2) la nota c está mal anclada y duplicada, porque el texto principal ya dice «como chacales» y la nota también ofrece «como chacales» como alternativa, cuando la alternativa real documentada es la lectura antigua «como dragones».'
  spanish_quality_summary: El español es generalmente claro y digno, pero «jadéan por aire» suena algo forzado; «jadean en busca de aire» resulta más natural sin perder la imagen. «Los asnos salvajes» y «las alturas peladas» son aceptables. «Sus ojos se apagan» es una buena solución idiomática para כָּלוּ עֵינֵיהֶם.
  glossary_alignment: No hay términos del glosario principal en disputa aquí. La elección «chacales» sigue correctamente la decisión léxica inglesa para תַּנִּים. «Asnos salvajes» también está alineado con la preferencia de registro bíblico frente a opciones más coloquiales.
  issues:
  - severity: medium
    issue: «se detienen» para עָמְדוּ
    rationale: El hebreo describe la postura/ubicación de los animales en la escena; «se detienen» sugiere que venían moviéndose y luego paran, matiz no presente en el original.
  - severity: medium
    issue: «jadéan por aire» suena poco natural
    rationale: Aunque busca reflejar la idea de aspirar viento/aire, en español eclesial general suena extraño. «jadean en busca de aire» o «jadean por falta de aire» comunica mejor la imagen.
  - severity: high
    issue: Nota c mal formulada y redundante con el texto principal
    rationale: La nota c dice «O “como chacales”» cuando el texto ya tiene «como chacales». Debe conservar la alternativa documentada («como dragones») y la explicación contextual, no repetir la lectura principal.
  revised_spanish_text: Los asnos salvajes[a] están de pie en las alturas peladas; jadean en busca de aire[b], como chacales[c]. Sus ojos se apagan, porque no hay hierba.
