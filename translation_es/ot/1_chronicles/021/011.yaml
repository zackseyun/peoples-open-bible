translation:
  language: es
  text: 'Entonces Gad vino a David y le dijo[a]: «Así dice Yahvé: “Elige para ti—”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «Recibe para ti—»; el sentido en el contexto es una instrucción para escoger entre las opciones que aparecen en el versículo siguiente.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - fue
  lexicon: HALOT
  rationale: El hebreo narrativo expresa movimiento hacia David. En español, «vino» conserva la perspectiva de acercamiento y suena natural en un relato, con un matiz cercano al inglés POB «came».
- source_word: גָד
  english_pob_choice: Gad
  chosen_spanish: Gad
  lexicon: nombre propio
  rationale: Nombre propio transliterado de manera estándar.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: La preposición indica dirección hacia una persona; «a» es la opción natural en español.
- source_word: דָּוִיד
  english_pob_choice: David
  chosen_spanish: David
  lexicon: nombre propio
  rationale: Nombre propio transliterado de manera estándar.
- source_word: וַיֹּאמֶר לוֹ
  english_pob_choice: said to him
  chosen_spanish: le dijo
  alternatives_spanish:
  - le habló
  - dijo a él
  lexicon: HALOT
  rationale: אמר con pronombre dativo se rinde de forma directa como «le dijo», que comunica la relación interlocutiva sin sonar forzado.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así ha dicho
  - Esto dice
  lexicon: HALOT
  rationale: 'La fórmula profética/mensajera se expresa mejor en español con presente: «Así dice», equivalente funcional de la fórmula fija del hebreo y del inglés POB.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: La política española del proyecto pide «Yahvé» para el Tetragrámaton. Mantiene el nombre divino personal sin sustituirlo por un título.
- source_word: קַבֶּל
  english_pob_choice: Choose
  chosen_spanish: Elige
  alternatives_spanish:
  - Acepta
  - Recibe
  lexicon: HALOT
  rationale: El POB inglés opta por un sentido contextual de elección. En español, «Elige» conserva esa fuerza interpretativa, mientras que «Acepta/Recibe» quedan como alternativas más literales del verbo en este contexto.
- source_word: לָךְ
  english_pob_choice: for yourself
  chosen_spanish: para ti
  alternatives_spanish:
  - para ti mismo
  - por ti
  lexicon: HALOT
  rationale: La partícula pronominal con el imperativo se expresa naturalmente con «para ti», que comunica la implicación personal de la acción.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton; el proyecto en español establece «Yahvé» como forma principal. Se conserva el nombre propio divino, no una sustitución honorífica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El texto inglés POB ya había fijado la lectura contextual de קבל como «Choose» con nota sobre el sentido más literal «Accept/Receive». La versión española conserva esa tensión: se mantiene la lectura contextual «Elige» y se ancla una nota que ofrece la alternativa más literal sin borrar la ambigüedad lexical del hebreo.'
  spanish_consistency_notes:
  - Se usó «Yahvé» conforme al estándar español del proyecto para יהוה.
  - Se evitó «Señor» como sustituto del nombre divino, para conservar la distinción entre nombre propio y título.
  - «Elige para ti» reproduce la decisión contextual del POB inglés y la nota preserva la alternativa literal «Recibe» / «Acepta».
  - La colocación de la nota en «le dijo[a]» sigue el patrón del audit trail inglés, donde la observación léxica afecta a toda la cláusula final.
