translation:
  language: es
  text: En la mano de Dios está el dominio de todo hombre[a], y delante del legislador pone su honor[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «En la mano del Señor está la autoridad de la tierra, y al útil lo levantará a su tiempo sobre ella». El griego refleja una segunda línea sustancialmente distinta y probablemente otra Vorlage hebrea o un desarrollo interpretativo.'
    reason: alternative_reading
  - marker: b
    text: O «su majestad» o «su esplendor».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּיַד / ἐν χειρὶ
  english_pob_choice: in the hand of
  chosen_spanish: en la mano de
  alternatives_spanish:
  - bajo la mano de
  - bajo el control de
  lexicon: HALOT / uso idiomático bíblico
  rationale: Conservo el valor idiomático de posesión, poder y control sin volverlo una paráfrasis abstracta. 'En la mano de' es una expresión natural en español bíblico y refleja el hebreo y el griego.
- source_word: אֱלֹהִים / Κυρίου
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Señor
  lexicon: HALOT; el griego paralelo usa κύριος
  rationale: El hebreo leído en el texto base dice אֱלֹהִים, por lo que 'Dios' es la correspondencia directa. Aunque el griego paralelo tiene 'del Señor', la tradición principal aquí es hebrea; por eso no se sustituye por 'Señor' en el texto principal.
- source_word: מֶמְשֶׁלֶת
  english_pob_choice: the rule
  chosen_spanish: el gobierno
  alternatives_spanish:
  - el dominio
  - la autoridad
  - el poder
  lexicon: HALOT
  rationale: El sustantivo expresa potestad o dominio de gobierno. 'Gobierno' comunica bien la idea en español sin cargarla con un matiz eclesiástico ni suavizar la fuerza política del término.
- source_word: כָּל גֶּבֶר
  english_pob_choice: every man
  chosen_spanish: todo hombre
  alternatives_spanish:
  - toda persona
  - cada hombre
  lexicon: HALOT
  rationale: Mantengo el sustantivo masculino singular representativo, como en la elección inglesa. 'Todo hombre' preserva la referencia humana general y el valor masculino del hebreo sin neutralizarlo.
- source_word: וְלִפְנֵי
  english_pob_choice: and before
  chosen_spanish: y delante de
  alternatives_spanish:
  - y en presencia de
  lexicon: HALOT
  rationale: '''Delante de'' expresa con naturalidad la relación espacial/relacional del hebreo y se ajusta mejor al español que un calco rígido.'
- source_word: מְחוֹקֵק
  english_pob_choice: the lawgiver
  chosen_spanish: el legislador
  alternatives_spanish:
  - el gobernador
  - el que decreta
  lexicon: HALOT
  rationale: '''Legislador'' conserva la fuerza de uno que dicta leyes o decreta. En español suena más natural y preciso que ''lawgiver'' calcado como ''dador de ley''.'
- source_word: יָשִׁית
  english_pob_choice: he sets
  chosen_spanish: pone
  alternatives_spanish:
  - coloca
  - establece
  lexicon: HALOT
  rationale: El verbo שׂים admite 'poner/colocar/establecer'. 'Pone' es breve, directo y fiel al valor verbal activo del hebreo.
- source_word: הוֹדוֹ
  english_pob_choice: his honor
  chosen_spanish: su honor
  alternatives_spanish:
  - su majestad
  - su esplendor
  - su gloria
  lexicon: HALOT
  rationale: Sigo la revisión inglesa más reciente que corrigió 'splendor' a 'honor'. En español, 'honor' preserva el rango de dignidad, prestigio o honorabilidad que puede expresar הוֹד sin introducir un matiz más teológico de 'gloria'.
theological_decisions:
- issue: Soberanía divina sobre el gobierno humano
  english_pob_reading: The verse states that human rule is under God's control, without specifying a full doctrine of kingship or providence.
  chosen_spanish_reading: El versículo afirma que el gobierno humano está en la mano de Dios, sin definir el modo exacto en que Dios dispone los cargos o gobernantes.
  alternative_spanish_readings:
  - Dios nombra directamente a cada gobernante.
  - El versículo habla solo del poder político sobre la tierra.
  rationale: La línea hebrea afirma soberanía real de Dios sobre la autoridad humana, pero no detalla el mecanismo. Conservo esa tensión sin convertirla en una doctrina más específica de nombramiento directo ni reducirla a una observación política vacía.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del contexto inglés, que prefirió 'honor' para הוֹד en lugar de 'splendor'. También toma en cuenta que el hebreo base es la referencia principal, mientras que el griego paralelo se conserva como alternativa significativa en nota.
  spanish_consistency_notes:
  - Se mantuvo 'Dios' para אֱלֹהִים, coherente con el texto hebreo base y con el criterio del proyecto.
  - Se eligió 'el legislador' para מְחוֹקֵק, evitando reemplazarlo por 'Señor' o 'rey' sin base en el hebreo.
  - '''En la mano de'' conserva la metáfora semítica y no la aplana a una simple idea de control.'
  - '''Honor'' traduce הוֹד de manera compatible con la revisión inglesa más reciente y con el rango semántico del término.'
