translation:
  language: es
  text: 'Entonces David dijo a Urías: «Quédate aquí hoy también, y mañana te enviaré[a].» Así que Urías se quedó en Jerusalén aquel día y al día siguiente.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y mañana te despacharé» o «y mañana te mandaré de vuelta».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: La forma narrativa consecutiva introduce una acción que avanza la historia; «Entonces» conserva la secuencia y suena natural en español.
- source_word: שֵׁב
  english_pob_choice: Stay
  chosen_spanish: Quédate
  alternatives_spanish:
  - Permanece
  - Quédate aquí
  lexicon: HALOT
  rationale: El imperativo de ישׁב aquí pide permanecer temporalmente en un lugar; «Quédate» reproduce el tono directo y natural del mandato.
- source_word: בָּזֶה
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - en este lugar
  - en esto
  lexicon: HALOT
  rationale: 'La expresión es idiomática: la referencia es espacial inmediata. «Aquí» comunica bien el lugar presente sin sobrecargar la frase.'
- source_word: גַּם הַיּוֹם
  english_pob_choice: today also
  chosen_spanish: hoy también
  alternatives_spanish:
  - también hoy
  - este día también
  lexicon: HALOT
  rationale: «También» preserva el matiz aditivo de גַּם y «hoy» mantiene la referencia temporal directa con fluidez natural.
- source_word: וּמָחָר
  english_pob_choice: and tomorrow
  chosen_spanish: y mañana
  alternatives_spanish:
  - y al día siguiente
  - y para mañana
  lexicon: HALOT
  rationale: El valor temporal es adyacente a la orden y a la promesa; «y mañana» conserva la sencillez del hebreo.
- source_word: אֲשַׁלְּחֶךָּ
  english_pob_choice: I will send you away
  chosen_spanish: te enviaré
  alternatives_spanish:
  - te mandaré
  - te despacharé
  lexicon: HALOT
  rationale: El verbo שׁלח significa enviar/despachar; en español, el contexto ya sugiere salida de Jerusalén, por lo que «te enviaré» es suficiente y no añade una idea extra. La dirección implícita queda clara por el contexto narrativo.
- source_word: וַיֵּשֶׁב
  english_pob_choice: So ... stayed
  chosen_spanish: se quedó
  alternatives_spanish:
  - permaneció
  - estuvo
  lexicon: HALOT
  rationale: Se mantiene la correspondencia con el mandato anterior de «quedarse» y se expresa la consecuencia narrativa de manera natural.
- source_word: בִּירוּשָׁלִַם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la ciudad de Jerusalén
  lexicon: HALOT
  rationale: Traducción estándar y precisa del topónimo con la preposición locativa.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: that day
  chosen_spanish: aquel día
  alternatives_spanish:
  - ese día
  - en aquel día
  lexicon: HALOT
  rationale: «Aquel día» conserva la referencia temporal demostrativa con tono natural en español.
- source_word: וּמִמָּחֳרָת
  english_pob_choice: and the next day
  chosen_spanish: y el siguiente
  alternatives_spanish:
  - y al día siguiente
  - y al otro día
  lexicon: HALOT
  rationale: La secuencia temporal final se expresa de forma clara y breve. «El siguiente» evita redundancia y se entiende por el antecedente «día».
translation_notes:
  revision_awareness: Se ajustó la referencia temporal final para evitar una nota sin anclaje y para mantener una sola observación léxica anclada en la forma verbal «te enviaré». También se preservó la progresión narrativa y la repetición de «quedarse»/«se quedó» como eco léxico del hebreo.
  spanish_consistency_notes:
  - Se mantuvo el nombre propio «Urías» y el topónimo «Jerusalén» con ortografía española estándar.
  - Se conservó el valor aspectual-narrativo de la cadena con «Entonces ... dijo» y «Así que ... se quedó».
  - Se evitó el calco «mandar lejos»; la salida queda implícita en el contexto narrativo, como en el audit trail inglés.
