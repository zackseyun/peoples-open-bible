    rationale: El audit trail inglés usa «Shimei» y hasta reconoce «Shimi» solo como alternativa; en español bíblico general «Simei» preserva mejor la forma reconocible del nombre que «Simi», que simplifica demasiado el diptongo/vocalización.
  - severity: medium
    issue: «Quelías» para קֵלָיָה
    rationale: La forma propuesta introduce una terminación -ías que no corresponde bien al nombre hebreo tal como aparece ni al análisis inglés «Keliah». En español conviene una transliteración más cercana como «Kelías», manteniendo además la conexión visible con «Kelita» en la nota explicativa.
  - severity: low
    issue: Inconsistencia en transliteración de nombres
    rationale: El borrador mezcla criterios («Jozabad», «Simi», «Quelías», «Petahías»). Conviene uniformar hacia formas españolas legibles pero cercanas al hebreo y alineadas con el audit trail.
