translation:
  language: es
  text: Pues nuestros guardias están sobre nosotros no para un tirano[a], sino al servicio de la ley divina; por esta razón poseemos una razón invencible.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nuestra razón es invencible» o «poseemos una razón invencible». En 4 Macabeos, λογισμός es un término clave para la facultad racional.
    reason: lexical_alternative
lexical_decisions:
- source_word: τυράννου
  english_pob_choice: tyrant
  chosen_spanish: tirano
  alternatives_spanish:
  - rey
  - gobernante
  lexicon: LSJ
  rationale: «τύραννος» en este contexto conserva una carga negativa de poder opresivo. «Tirano» mantiene esa fuerza moral mejor que opciones neutras como «rey» o «gobernante».
- source_word: θείου νόμου
  english_pob_choice: divine law
  chosen_spanish: ley divina
  alternatives_spanish:
  - ley de Dios
  - la ley de Dios
  lexicon: LSJ
  rationale: La construcción griega significa literalmente «ley divina». «Ley divina» sigue de cerca el original y mantiene la referencia a una ley con autoridad de Dios sin añadir formulaciones más interpretativas.
- source_word: προεστήκασιν
  english_pob_choice: stand over
  chosen_spanish: están puestos sobre
  alternatives_spanish:
  - están al frente de
  - tienen autoridad sobre
  - presiden sobre
  lexicon: LSJ
  rationale: El perfecto de προΐστημι expresa estar colocados en una posición de supervisión o autoridad. «Están puestos sobre» conserva la imagen de autoridad ejercida sobre otros en un español natural.
- source_word: οἱ δορυφόροι
  english_pob_choice: guards
  chosen_spanish: guardias
  alternatives_spanish:
  - escoltas
  - soldados
  - hombres armados
  lexicon: LSJ
  rationale: Aunque literalmente es «portadores de lanza», el contexto apunta a los asistentes armados del tirano. «Guardias» comunica bien su función sin sobredeterminar el detalle militar.
- source_word: ἀνίκητον
  english_pob_choice: undefeated
  chosen_spanish: invencible
  alternatives_spanish:
  - inconquistable
  - inalcanzable por la derrota
  lexicon: LSJ
  rationale: «Ἀνίκητος» significa no vencido o no superado. En español, «invencible» es la forma más natural y fiel para expresar esa cualidad.
- source_word: λογισμόν
  english_pob_choice: reason
  chosen_spanish: razón
  alternatives_spanish:
  - razonamiento
  - facultad racional
  - pensamiento
  lexicon: LSJ
  rationale: En 4 Macabeos «λογισμός» es un término clave para la facultad racional. «Razón» es breve y coherente con el uso filosófico del libro, preservando la idea de una razón firme e inquebrantable.
- source_word: διὰ τοῦτο
  english_pob_choice: for this reason
  chosen_spanish: por esta razón
  alternatives_spanish:
  - por eso
  - por tanto
  lexicon: LSJ
  rationale: La frase introduce una inferencia directa del argumento previo. «Por esta razón» reproduce con claridad ese enlace causal e inferencial.
theological_decisions:
- issue: Contraste entre servicio a un gobernante humano y lealtad a la ley de Dios
  english_pob_reading: not for a tyrant, but for divine law
  chosen_spanish_reading: no para un tirano, sino para la ley divina
  alternative_spanish_readings:
  - no bajo un tirano, sino bajo la ley divina
  - no en favor de un tirano, sino de la ley divina
  rationale: El griego contrapone la autoridad bajo la cual actúan los guardias con la ley divina. La traducción elegida conserva la antítesis sin ampliar indebidamente el alcance doctrinal del versículo.
  doctrine_reference: 'DOCTRINE.md: preservar tensiones teológicas y priorizar el primado del original.'
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del texto inglés: el cierre final se expresa en orden natural como «razón invencible», preservando el sentido de λογισμός y evitando una construcción poco española. También se mantuvo la antítesis entre un tirano humano y la ley divina, sin resolverla hacia una formulación doctrinal más amplia.'
  spanish_consistency_notes:
  - Se usó «tirano» para τύραννος conforme al valor negativo documentado.
  - Se prefirió «ley divina» para θείου νόμου, manteniendo cercanía léxica al griego.
  - «Razón» traduce λογισμός con el mismo alcance filosófico que en el POB inglés, y la nota conserva alternativas legítimas.
  - La puntuación separa la primera causalidad con punto y coma, siguiendo el paralelismo del griego y la claridad del español.
