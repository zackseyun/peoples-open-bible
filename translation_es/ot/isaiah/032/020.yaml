review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: bienaventuranza dirigida a los sembradores en lugares abundantes en agua, seguida por la imagen idiomática de soltar a los animales. Sin embargo, ''dejan suelto el pie del buey y del asno'' suena poco natural en español y puede inducir una lectura excesivamente literal y confusa. El hebreo מְשַׁלְּחֵי רֶגֶל sí incluye ''pie'', y la auditoría inglesa lo conservó, pero en español conviene pluralizar y formularlo de manera más idiomática sin perder la imagen.'
  spanish_quality_summary: 'La redacción es en general clara y digna, pero hay dos puntos mejorables: (1) ''Bienaventurados'' sin ''ustedes'' o una estructura equivalente pierde algo del valor directo de segunda persona de אַשְׁרֵיכֶם; (2) ''dejan suelto el pie'' es gramaticalmente extraño y poco legible. ''Dejan libres los pies del buey y del asno'' conserva la imaginería y mejora la naturalidad. La nota al pie sigue siendo útil para explicar el modismo.'
  glossary_alignment: No hay términos del glosario principal en disputa. 'Buey' para הַשּׁוֹר y 'asno' para וְהַחֲמוֹר son adecuados y de buen registro bíblico. 'Bienaventurados' es aceptable para אַשְׁרֵיכֶם, pero conviene añadir 'ustedes' para reflejar mejor la segunda persona plural del hebreo y del inglés auditado.
  issues:
  - severity: medium
    issue: La segunda persona plural de אַשְׁרֵיכֶם no queda explícita.
    rationale: El hebreo dice literalmente 'bienaventurados ustedes'. 'Bienaventurados los que...' comunica la idea general, pero convierte la frase en una declaración menos directa.
  - severity: high
    issue: '''dejan suelto el pie del buey y del asno'' es una formulación poco natural y potencialmente confusa en español.'
    rationale: Aunque רֶגֶל está presente en el hebreo, el singular 'el pie' con dos animales suena extraño. Una formulación como 'dejan libres los pies del buey y del asno' preserva mejor tanto la imagen como la legibilidad.
  revised_spanish_text: Bienaventurados ustedes, los que siembran junto a todas las aguas, los que dejan libres los pies del buey y del asno.[a]
  revised_footnotes:
  - marker: a
    text: 'Literalmente: «los que envían el pie del buey y del asno», un modismo para dejarlos pastar o moverse libremente.'
    reason: lexical_alternative
  revision_rationale: Se ajusta la primera cláusula para reflejar explícitamente la segunda persona plural del hebreo ('ustedes') y se reescribe la imagen idiomática final para un español más natural ('dejan libres los pies') sin omitir el elemento 'pie/pies' que la auditoría inglesa decidió conservar. La nota al pie mantiene la alternativa más literal y explica el sentido idiomático.
