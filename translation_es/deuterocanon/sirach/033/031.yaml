translation:
  language: es
  text: Si tienes un esclavo[a], que sea como tú[b], porque lo adquiriste con sangre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También podría entenderse “siervo” o “sirviente doméstico”. El griego οἰκέτης suele referirse a personal de la casa, pero aquí el contexto de adquisición hace más prominente la condición de esclavo.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, “porque con sangre lo adquiriste”. La expresión probablemente indica una adquisición costosa, sin precisar cuya sangre se tiene en vista.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἰκέτης
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - criado de la casa
  - sirviente doméstico
  lexicon: BDAG
  rationale: El griego οἰκέτης puede referirse a un miembro del servicio doméstico, pero aquí el contexto de adquisición (ἐκτήσω) hace saliente la condición de propiedad o sujeción. Como el audit trail inglés conserva 'slave' por esa fuerza contextual, 'esclavo' preserva mejor la realidad social que 'siervo' o 'sirviente'.
- source_word: ἔστω ὡς σύ
  english_pob_choice: let him be as yourself
  chosen_spanish: que sea como tú
  alternatives_spanish:
  - trátalo como a ti mismo
  - que sea igual que tú
  lexicon: LSJ
  rationale: 'La construcción griega es directa: ''que sea como tú''. En español, ''que sea como tú'' mantiene la cercanía sintáctica sin añadir una interpretación más explicativa como ''trátalo como a ti mismo''.'
- source_word: ἐν αἵματι
  english_pob_choice: with blood
  chosen_spanish: con sangre
  alternatives_spanish:
  - al precio de sangre
  - con tu sangre
  - a costo de sangre
  lexicon: LSJ
  rationale: '''Con sangre'' conserva la imagen literal y la tensión del griego sin especificar indebidamente de quién es la sangre. Las alternativas son posibles, pero introducen una interpretación más definida que el texto no exige.'
- source_word: ἐκτήσω
  english_pob_choice: you acquired
  chosen_spanish: lo adquiriste
  alternatives_spanish:
  - lo compraste
  - lo obtuviste
  - lo ganaste
  lexicon: BDAG
  rationale: '''Adquiriste'' corresponde bien a κτάομαι: es amplio, apto para el contexto de posesión, y no fuerza un matiz comercial explícito que el griego no expresa de manera directa.'
theological_decisions:
- issue: Termino de servidumbre con fuerza social fuerte
  english_pob_reading: slave
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - siervo
  - sirviente doméstico
  rationale: La POB inglesa documenta que, por el contexto de adquisición y pertenencia, la lectura fuerte de esclavitud es la más fiel. Mantener 'esclavo' evita suavizar una tensión social y lexical presente en el texto.
  doctrine_reference: 'DOCTRINE.md: términos controvertidos; principio de mantener la fuerza contextual de los términos de esclavitud/servidumbre'
- issue: Sentido de 'con sangre'
  english_pob_reading: because you acquired him with blood
  chosen_spanish_reading: porque lo adquiriste con sangre
  alternative_spanish_readings:
  - porque lo adquiriste al precio de sangre
  - porque lo adquiriste con tu sangre
  rationale: 'Se conserva la ambigüedad del griego y de la nota inglesa: la frase probablemente expresa adquisición costosa, no necesariamente especifica cuya sangre está en vista. ''Con sangre'' deja abierta esa tensión.'
  doctrine_reference: Nota léxica de la POB inglesa sobre ἐν αἵματι; principio de no resolver indebidamente una ambigüedad textual
translation_notes:
  revision_awareness: El inglés audit trail osciló entre 'slave' y 'servant' en una pasada de revisión, pero la restauración posterior volvió a 'slave' conforme a la política doctrinal del proyecto. En la adaptación española se siguió la lectura final más fuerte y contextual, sin suavizarla.
  spanish_consistency_notes:
  - Se mantuvo 'esclavo' en lugar de 'siervo' para conservar la fuerza social del término según el registro auditado.
  - '''Con sangre'' evita añadir ''tu'' o una paráfrasis explicativa que cerraría indebidamente la ambigüedad del griego.'
  - El tono es formal y bíblico, pero con español moderno y natural para lectura pública.
