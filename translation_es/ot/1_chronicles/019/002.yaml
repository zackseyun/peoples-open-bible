translation:
  language: es
  text: 'David dijo: «Mostraré bondad a Hanún hijo de Najás, porque su padre me mostró bondad». Entonces David envió mensajeros para consolarlo[a] por su padre. Y los siervos de David llegaron a la tierra de los amonitas, a Hanún, para consolarlo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para consolarlo acerca de su padre» o «por la muerte de su padre»; la expresión hebrea indica que el consuelo estaba motivado por la muerte de su padre.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֶסֶד
  english_pob_choice: kindness
  chosen_spanish: misericordia
  alternatives_spanish:
  - bondad
  - lealtad
  - favor
  lexicon: HALOT
  rationale: En este contexto interpersonal y político, חֶסֶד expresa un acto benévolo de lealtad práctica. En español, «misericordia» comunica bien esa benevolencia dada a otro, sin limitarla a una emoción. «Bondad» es posible, pero resulta más general; «lealtad» y «favor» captan aspectos parciales, no el alcance completo del término aquí.
- source_word: עִם
  english_pob_choice: to
  chosen_spanish: con
  alternatives_spanish:
  - a
  lexicon: HALOT
  rationale: El hebreo usa la construcción עשה חסד עם, literalmente «hacer bondad/misericordia con». En español, la frase natural es «hacer misericordia con», que conserva la relación marcada por עִם sin forzar la sintaxis.
- source_word: מַלְאָכִים
  english_pob_choice: messengers
  chosen_spanish: mensajeros
  alternatives_spanish:
  - enviados
  - embajadores
  lexicon: HALOT
  rationale: Se trata de representantes humanos enviados por David. «Mensajeros» es la equivalencia más directa y amplia; «embajadores» añade un matiz diplomático más fuerte del que el texto exige.
- source_word: לְנַחֲמוֹ
  english_pob_choice: to comfort him
  chosen_spanish: para consolarlo
  alternatives_spanish:
  - para confortarlo
  - para confortarle
  lexicon: HALOT
  rationale: נחם en este contexto de duelo expresa consuelo por una pérdida. «Consolar» es el verbo natural y exacto en español. «Confortar» es posible, pero menos común; «confortarle» es demasiado arcaizante para este registro.
- source_word: עַל אָבִיו
  english_pob_choice: concerning his father
  chosen_spanish: por su padre
  alternatives_spanish:
  - con respecto a su padre
  - sobre su padre
  lexicon: HALOT
  rationale: La expresión hebrea indica que la consolación se relaciona con la muerte del padre. En español, «por su padre» comunica de manera breve y natural la ocasión del consuelo. «Con respecto a su padre» es más literal, pero menos idiomático; «sobre su padre» suena menos natural.
- source_word: אֶרֶץ בְּנֵי עַמּוֹן
  english_pob_choice: the land of the Ammonites
  chosen_spanish: la tierra de los amonitas
  alternatives_spanish:
  - el país de los amonitas
  - la tierra de los hijos de Amón
  lexicon: HALOT
  rationale: «Amonitas» es el etnónimo natural en español. «Tierra» conserva el sentido geográfico de אֶרֶץ. «Los hijos de Amón» sería más literal, pero menos idiomático; «país» altera el matiz territorial.
- source_word: בֶּן נָחָשׁ
  english_pob_choice: son of Nahash
  chosen_spanish: hijo de Najás
  alternatives_spanish:
  - hijo de Najas
  - hijo de Nahás
  lexicon: HALOT
  rationale: Los nombres propios se transliteran en español de forma consistente. «Najás» preserva la consonancia del nombre hebreo y evita confusión con formas tradicionales variables.
- source_word: וַיֹּאמֶר ... וַיִּשְׁלַח ... וַיָּבֹאוּ
  english_pob_choice: And David said ... So David sent ... And David’s servants came
  chosen_spanish: Entonces David dijo ... Y David envió ... Y los siervos de David llegaron
  alternatives_spanish:
  - Y David dijo ... Y David envió ... Y los siervos de David vinieron
  - Entonces David dijo ... Así que David envió ... Y los siervos de David llegaron
  lexicon: HALOT
  rationale: La secuencia narrativa hebrea marca acciones sucesivas. «Entonces» y «Y» mantienen el flujo sin sobrecargar el español. «Llegaron» es una forma natural para expresar el arribo al territorio.
- source_word: עַבְדֵי דָוִיד
  english_pob_choice: David’s servants
  chosen_spanish: los siervos de David
  alternatives_spanish:
  - los servidores de David
  - los oficiales de David
  lexicon: HALOT
  rationale: עבדים designa a quienes están al servicio de David. «Siervos» preserva el valor lexical y es tradicionalmente comprensible en español bíblico; aquí no hace falta elevarlo a «oficiales», porque el contexto no lo exige de manera clara.
theological_decisions:
- issue: Sentido de חֶסֶד en un contexto interpersonal y de honor entre reyes
  english_pob_reading: kindness
  chosen_spanish_reading: misericordia
  alternative_spanish_readings:
  - bondad
  - lealtad
  - amor fiel
  rationale: El texto no usa חֶסֶד aquí como fórmula abstracta de amor pactual, sino como benevolencia concreta entre David y la casa de Najás. «Misericordia» conserva la idea de un acto favorable y generoso sin borrar el peso relacional del término. No se traduce por «amor fiel» porque eso inclinaría el verso hacia una formulación más teológica de la que el contexto inmediato requiere.
  doctrine_reference: HALOT; uso contextual de חֶסֶד en narrativa histórica
- issue: Valor de לְנַחֲמוֹ עַל אָבִיו en relación con duelo y muerte
  english_pob_reading: to comfort him concerning his father
  chosen_spanish_reading: para consolarlo por su padre
  alternative_spanish_readings:
  - para consolarlo acerca de su padre
  - para consolarlo sobre su padre
  - para confortarlo por su padre
  rationale: La frase hebrea indica que el envío de mensajeros tenía como ocasión la muerte del padre. «Por su padre» expresa en español la causa u ocasión del consuelo de forma concisa y natural, sin perder el sentido funerario que el audit trail documenta.
  doctrine_reference: HALOT; nota inglesa sobre el valor ocasional de עַל en contexto de duelo
translation_notes:
  revision_awareness: Se siguió el acuerdo alto del control cruzado y no se introdujeron cambios sustanciales respecto del trazo inglés auditado. La revisión inglesa permaneció sin cambios y el contenido español conserva la misma segmentación narrativa, la misma relación causal de duelo y la misma elección funcional para חֶסֶד, מַלְאָכִים y לְנַחֲמוֹ.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiere; en este versículo no aparece el Tetragrámaton.
  - Se prefiere «misericordia» para חֶסֶד en esta escena histórica, evitando una traducción litúrgica rígida.
  - «Siervos» refleja el valor de עבדים en el contexto de servicio a David y mantiene consistencia con el registro bíblico.
  - Los nombres propios se transliteran de manera uniforme y legible para lectores hispanohablantes.
