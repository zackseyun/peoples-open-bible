  text: But you are not to be called ‘Rabbi,’ for one is your teacher[b][a], and you are all brothers.
  footnotes:
  - marker: a
    text: Or 'Teacher.' The Greek title 'Rabbi' carries the sense of a teacher, but the transliteration preserves the Jewish setting and avoids collapsing it with the later word 'teacher' in the verse.
    reason: lexical_alternative
  - marker: b
    text: '''Brothers'' renders the masculine plural ἀδελφοί. In context it can refer to fellow disciples collectively.'
    reason: lexical_alternative
