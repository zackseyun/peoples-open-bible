translation:
  language: es
  text: Si el enojo del gobernante se alza contra ti[a], no dejes tu lugar[b], porque la calma[c] aplaca grandes ofensas[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el espíritu del gobernante' o 'el temperamento del gobernante'. El hebreo רוּחַ significa literalmente 'espíritu' o 'viento', y aquí probablemente se refiere a una disposición airada.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'tu lugar'.
    reason: lexical_alternative
  - marker: c
    text: O 'curación' o 'gentileza'. El hebreo מַרְפֵּא transmite la idea de una respuesta que sosiega o sana.
    reason: lexical_alternative
  - marker: d
    text: O 'grandes pecados'.
    reason: lexical_alternative
lexical_decisions:
- source_word: רוּחַ
  english_pob_choice: anger
  chosen_spanish: espíritu
  alternatives_spanish:
  - enojo
  - temperamento
  - furia
  lexicon: HALOT
  rationale: El hebreo רוּחַ conserva aquí su sentido literal de 'espíritu' pero, en contexto, alude al estado interior o disposición emocional del gobernante. En español, 'espíritu' deja visible la imagen original y permite la ambigüedad controlada que el audit trail inglés resuelve como ira/temperamento.
- source_word: הַמּוֹשֵׁל
  english_pob_choice: the ruler
  chosen_spanish: el gobernante
  alternatives_spanish:
  - el jefe
  - el que gobierna
  - el soberano
  lexicon: HALOT
  rationale: El participio denota a quien ejerce autoridad. 'Gobernante' es natural en español y mantiene la amplitud de 'ruler' sin estrecharlo a una figura más específica.
- source_word: תַּעֲלֶה עָלֶיךָ
  english_pob_choice: rises against you
  chosen_spanish: se alza contra ti
  alternatives_spanish:
  - se levanta contra ti
  - sube contra ti
  - se enfurece contra ti
  lexicon: HALOT
  rationale: La combinación verbal-preposicional expresa ascenso hostil dirigido a la persona. 'Se alza contra ti' conserva la imagen de elevación/hostilidad y suena idiomático en español.
- source_word: מְקוֹמְךָ
  english_pob_choice: your place
  chosen_spanish: tu lugar
  alternatives_spanish:
  - tu puesto
  - tu posición
  lexicon: HALOT
  rationale: La traducción más directa es 'tu lugar'. Mantiene la correspondencia léxica con el hebreo y evita interpretar demasiado como 'puesto' o 'posición' sin necesidad.
- source_word: אַל תַּנַּח
  english_pob_choice: do not leave
  chosen_spanish: no dejes
  alternatives_spanish:
  - no abandones
  - no sueltes
  - no renuncies
  lexicon: HALOT
  rationale: El verbo en este contexto comunica no soltar/abandonar la propia ubicación. 'No dejes' es breve, natural y fiel a la instrucción proverbial.
- source_word: מַרְפֵּא
  english_pob_choice: calmness
  chosen_spanish: la calma
  alternatives_spanish:
  - la quietud
  - la serenidad
  - la mansedumbre
  - el remedio
  lexicon: HALOT
  rationale: El sustantivo puede sugerir 'curación', 'suavidad' o algo que alivia. 'La calma' comunica bien el valor pragmático del proverbio y conserva la idea de un efecto apaciguador sin volverlo demasiado abstracto.
- source_word: יַנִּיחַ
  english_pob_choice: lays ... to rest
  chosen_spanish: aplaca
  alternatives_spanish:
  - hace cesar
  - pone en descanso
  - hace reposar
  lexicon: HALOT
  rationale: El verbo causativo tiene la idea de hacer cesar, dejar descansar o posar. 'Aplaca' funciona en español para un contexto de conflicto y refleja el efecto de calmar lo perturbado.
- source_word: חֲטָאִים גְּדוֹלִים
  english_pob_choice: great offenses
  chosen_spanish: grandes ofensas
  alternatives_spanish:
  - grandes pecados
  - graves faltas
  - grandes errores
  lexicon: HALOT
  rationale: Aunque חֲטָאִים suele ser 'pecados', en este contexto sapiencial-administrativo el alcance puede ser de faltas u ofensas serias. 'Grandes ofensas' conserva el peso moral y la aplicabilidad interpersonal que destacó la POB en inglés.
theological_decisions:
- issue: Sentido de רוּחַ aplicado al gobernante
  english_pob_reading: '''the ruler’s anger'' with a note preserving ''spirit'' and ''temper'' as alternatives'
  chosen_spanish_reading: '''el espíritu del gobernante'' con nota que abre la lectura a disposición iracunda'
  alternative_spanish_readings:
  - '''el enojo del gobernante'''
  - '''el temperamento del gobernante'''
  rationale: La POB inglesa opta por 'anger' en el texto y conserva alternativas literales en nota. En español, mantener 'espíritu' en el cuerpo permite auditar la metáfora hebrea y evita borrar la tensión lexical, mientras la nota aclara el sentido de disposición airada.
  doctrine_reference: Sapiencial / lexical; no doctrinal
- issue: Valor de חֲטָאִים גְּדוֹלִים en contexto político-social
  english_pob_reading: '''great offenses'' rather than only ''great sins'''
  chosen_spanish_reading: '''grandes ofensas'''
  alternative_spanish_readings:
  - '''grandes pecados'''
  - '''graves faltas'''
  rationale: Se sigue la decisión inglesa de no restringir el término a pecado religioso estricto. 'Ofensas' en español conserva la gravedad moral y encaja con el marco relacional y cortesano del proverbio.
  doctrine_reference: Sapiencial / ética relacional
translation_notes:
  revision_awareness: La POB inglesa revisó 'your post' a 'your place' para acercarse más a מְקוֹמְךָ y mantuvo 'anger' para רוּחַ con nota. Esta versión española sigue esa revisión usando 'tu lugar' en lugar de 'tu puesto', y conserva una redacción que permite leer la imagen original de 'espíritu' con una nota de sentido contextual.
  spanish_consistency_notes:
  - Se usa 'Yahvé' por defecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - '''Gobernante'' se mantiene para הַמּוֹשֵׁל como término amplio y legible.'
  - '''Calma'' y ''aplaca'' reproducen el valor práctico del proverbio sin agregar contenido no sustentado por el hebreo.'
  - Se evita 'siervo'/'esclavo' porque no hay δοῦλος en este pasaje.
