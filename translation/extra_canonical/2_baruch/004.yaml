theological_decisions:
- issue: Identity of the city
  chosen_reading: The passage distinguishes the presently visible Jerusalem from a city prepared beforehand by God and later to be revealed.
  alternative_readings:
  - The text refers only to the earthly city in idealized terms
  - The line speaks merely of Jerusalem’s rebuilding after exile
  rationale: The Syriac contrast between ‘this building now in your midst’ and the city ‘prepared beforehand’ points to a transcendent or pre-prepared reality, not simply the current ruined city.
  doctrine_reference: heavenly/prepared Jerusalem motif
- issue: Scope of divine judgment
  chosen_reading: Jerusalem’s fall and the people’s captivity are temporary acts of judgment, not the undoing of creation or covenant history.
  alternative_readings:
  - The destruction implies total cosmic abandonment
  - The exile is final and unqualified
  rationale: ‘For a time’ and ‘the world will not be forgotten’ frame the catastrophe as severe but not ultimate.
  doctrine_reference: divine judgment with remembered mercy
