base_translation:
  language: en
  yaml_path: translation/deuterocanon/4_maccabees/018/009.yaml
  text: But when these sons had reached adulthood[a], their father died. Blessed was that man, for after seeing the life of having good children[b], he did not suffer the time of childlessness.
  footnotes:
  - marker: a
    text: Or, 'after knowing the life of fruitful offspring.' The Greek εὐτεκνία can emphasize being blessed with children, even many children, and carries a positive evaluative sense.
    reason: lexical_alternative
  - marker: b
    text: That is, he died before he had to endure the anguish of being left childless after the deaths of his sons.
    reason: cross_reference
