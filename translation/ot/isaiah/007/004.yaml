id: ISA.7.4
reference: Isaiah 7:4
source:
  edition: WLC
  text: וְ/אָמַרְתָּ֣ אֵ֠לָי/ו הִשָּׁמֵ֨ר וְ/הַשְׁקֵ֜ט אַל תִּירָ֗א וּ/לְבָבְ/ךָ֙ אַל יֵרַ֔ךְ מִ/שְּׁנֵ֨י זַנְב֧וֹת הָ/אוּדִ֛ים הָ/עֲשֵׁנִ֖ים הָ/אֵ֑לֶּה בָּ/חֳרִי אַ֛ף רְצִ֥ין וַ/אֲרָ֖ם וּ/בֶן רְמַלְיָֽהוּ־־־־׃
translation:
  text: and say to him[a], ‘Be careful and stay calm. Do not fear, and do not let your heart be faint because of these two smoldering stubs of firebrands—because of the burning anger of Rezin and Aram, and the son of Remaliah.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'two tails of these smoking firebrands.' The expression pictures Rezin and the son of Remaliah as the burnt ends of sticks that still smoke but are close to going out.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִשָּׁמֵר
  chosen: Be careful
  alternatives:
  - Take heed
  - Watch yourself
  - Be on guard
  lexicon: HALOT
  rationale: Niphal imperative of שׁמר here functions as an exhortation to be cautious/attentive rather than a command to guard something specific. 'Be careful' is natural modern English and preserves the imperative force.
- source_word: וְהַשְׁקֵט
  chosen: stay calm
  alternatives:
  - be quiet
  - be at rest
  - be undisturbed
  lexicon: HALOT
  rationale: Imperative from שׁקט can mean be quiet, undisturbed, or at rest. In this context of political threat and fear, 'stay calm' best conveys the intended sense without sounding merely about silence.
- source_word: אַל תִּירָא
  chosen: Do not fear
  alternatives:
  - Do not be afraid
  lexicon: HALOT
  rationale: Standard negative imperative from ירא. 'Do not fear' is concise and preserves the biblical register while remaining readable.
- source_word: וּלְבָבְךָ אַל יֵרַךְ
  chosen: do not let your heart grow faint
  alternatives:
  - do not let your heart be timid
  - do not let your heart lose courage
  - let not your heart be soft
  lexicon: HALOT
  rationale: The idiom uses לבב with רך ('be soft/weak') to express loss of courage. 'Grow faint' communicates discouragement and inner weakening in idiomatic English.
- source_word: מִשְּׁנֵי זַנְבוֹת
  chosen: because of these two ... stubs
  alternatives:
  - from these two tails
  - because of these two tail-ends
  lexicon: HALOT
  rationale: זנבות literally means 'tails,' but in the metaphor of burnt sticks it refers to the ends/remnants. 'Stubs' communicates the image in natural English while preserving the contemptuous diminishment of the enemies.
- source_word: הָאוּדִים הָעֲשֵׁנִים
  chosen: smoldering stubs of firebrands
  alternatives:
  - smoking firebrands
  - smoldering brands
  - smoking sticks
  lexicon: HALOT
  rationale: אוּד is a burning stick/firebrand; עֲשֵׁנִים means smoking/smoldering. The phrase depicts nearly spent threats. 'Smoldering stubs of firebrands' keeps both the metaphor and the sense that they are almost burned out.
- source_word: בָּחֳרִי אַף
  chosen: because of the burning anger
  alternatives:
  - in the heat of anger
  - because of the fierce anger
  - at the burning of anger
  lexicon: HALOT
  rationale: The construct with חֳרִי ('burning, heat') and אַף ('anger') forms an idiom for fierce anger. 'Because of the burning anger' preserves the fire imagery that matches the preceding metaphor.
- source_word: רְצִין וַאֲרָם וּבֶן רְמַלְיָהוּ
  chosen: Rezin and Aram, and the son of Remaliah
  alternatives:
  - Rezin, Aram, and the son of Remaliah
  lexicon: HALOT
  rationale: The Hebrew names the coalition members with Rezin, Aram, and Pekah indirectly as 'the son of Remaliah.' Retaining 'the son of Remaliah' preserves Isaiah's dismissive way of referring to Pekah rather than supplying his personal name.
