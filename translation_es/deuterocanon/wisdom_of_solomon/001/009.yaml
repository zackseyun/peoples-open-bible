translation:
  language: es
  text: Pues en los planes del impío[a] habrá investigación, y el informe de sus palabras[b] llegará al Señor para la exposición[c] de sus hechos sin ley[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'deliberaciones', 'consejos' o 'maquinaciones' para διαβουλίοις.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'oído' o 'audición'; el sentido es que lo que dice llega ante el Señor como informe.
    reason: lexical_alternative
  - marker: c
    text: O 'reprensión' o 'convicción'; el griego también puede expresar la idea de poner en evidencia.
    reason: lexical_alternative
  - marker: d
    text: 'La expresión griega es concreta y forense: actos contrarios a la ley.'
    reason: source_note
lexical_decisions:
- source_word: διαβουλίοις
  english_pob_choice: schemes
  chosen_spanish: planes
  alternatives_spanish:
  - counsejos
  - deliberaciones
  - maquinaciones
  lexicon: LSJ
  rationale: διαβουλίοις nombra decisiones o deliberaciones previas; en español, 'planes' comunica bien la idea de propósitos formados de antemano sin añadir una carga más acusatoria que la que el contexto exige. Se evita 'maquinaciones' por ser más interpretativo.
- source_word: ἀσεβοῦς
  english_pob_choice: the ungodly
  chosen_spanish: el impío
  alternatives_spanish:
  - el inicuo
  - el malvado
  - el irreligioso
  lexicon: LSJ
  rationale: El singular genérico de ἀσεβοῦς se conserva con 'el impío', que mantiene el matiz religioso-moral de la raíz y suena natural en registro bíblico en español.
- source_word: ἐξέτασις
  english_pob_choice: an inquiry
  chosen_spanish: investigación
  alternatives_spanish:
  - examen
  - indagación
  - escrutinio
  lexicon: LSJ
  rationale: ἐξέτασις expresa examen o investigación. 'Investigación' preserva la idea de examen formal y judicial, y funciona bien en español contemporáneo.
- source_word: λόγων
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - dichos
  - declaraciones
  - expresiones
  lexicon: LSJ
  rationale: '''Palabras'' es la equivalencia más directa y amplia para λόγων aquí, manteniendo el paralelo con lo que se oye y luego es llevado ante el Señor.'
- source_word: ἀκοὴ
  english_pob_choice: a report
  chosen_spanish: el informe
  alternatives_spanish:
  - la noticia
  - el reporte
  - la audiencia
  lexicon: LSJ
  rationale: Aunque literalmente puede ser 'oír' o 'audición', aquí el sentido es aquello que llega a oídos del Señor. 'El informe' expresa bien el contenido comunicado y conserva la imagen de algo que se presenta ante Dios.
- source_word: Κύριον
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor Yahvé
  - Yahvé
  - el Dueño
  lexicon: LSJ
  rationale: El contexto griego usa Κύριον sin apoyo inmediato a una cita explícita del nombre divino; siguiendo el uso del POB, 'el Señor' comunica la referencia reverente y mantiene la forma establecida para κύριος.
- source_word: ἔλεγχον
  english_pob_choice: the exposing
  chosen_spanish: la reprobación
  alternatives_spanish:
  - la reprensión
  - la exposición
  - la convicción
  lexicon: LSJ
  rationale: '''ἔλεγχον'' puede ser exposición, refutación, reprensión o convicción. Como resultado de que el informe llegue al Señor, el español ''reprobación'' conserva la fuerza de veredicto adverso y encaja con la dimensión judicial del pasaje.'
- source_word: ἀνομημάτων
  english_pob_choice: lawless deeds
  chosen_spanish: hechos sin ley
  alternatives_spanish:
  - actos sin ley
  - iniquidades
  - transgresiones
  lexicon: LSJ
  rationale: ἀνομημάτων designa actos contrarios a la ley. 'Hechos sin ley' mantiene la concreción del plural y refleja de manera transparente la composición del término sin suavizar su fuerza.
theological_decisions:
- issue: Singular genérico en ἀσεβοῦς y posesivos asociados
  english_pob_reading: Render with singular masculine-generic language ('the ungodly ... his words ... his lawless deeds').
  chosen_spanish_reading: 'Se mantiene el singular genérico: ''el impío ... sus palabras ... sus hechos sin ley''.'
  alternative_spanish_readings:
  - '''los impíos ... sus palabras ... sus hechos sin ley'''
  - '''la persona impía ... sus palabras ... sus hechos sin ley'''
  rationale: El griego usa formas singulares con valor genérico. El español puede mantener ese singular sin implicar exclusión de mujeres; además, 'el impío' conserva mejor el paralelismo y la personalización del texto que una pluralización.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Sentido de ἔλεγχον entre exposición, reprensión y convicción
  english_pob_reading: the exposing of his lawless deeds
  chosen_spanish_reading: la reprobación de sus hechos sin ley
  alternative_spanish_readings:
  - '''la exposición de sus hechos sin ley'''
  - '''la reprensión de sus hechos sin ley'''
  - '''la convicción de sus hechos sin ley'''
  rationale: El pasaje describe un proceso judicial o forense en el que lo dicho es llevado ante el Señor y desemboca en una decisión adversa respecto de los actos. 'Reprobación' sostiene ese matiz de fallo o censura sin borrar la relación con la exposición de la culpa.
  doctrine_reference: LSJ, ἔλεγχος/ἔλεγχον; DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alta concordancia y no requieren una revisión sustantiva. La principal decisión fue preservar el registro forense del versículo en español sin mecanizar 'schemes' como un calco demasiado fuerte ni diluir ἔλεγχον en una paráfrasis vaga. También se mantuvo el singular genérico del griego.
  spanish_consistency_notes:
  - Se usa 'el Señor' para Κύριον, coherente con el uso del POB para κύριος en contextos reverentes.
  - Se conserva 'el impío' en singular genérico, coherente con la lectura inglesa y con el valor singular del griego.
  - '''Hechos sin ley'' mantiene la concreción del plural ἀνομημάτων y evita reemplazarlo por una abstracción más débil.'
  - La puntuación separa con claridad las dos cláusulas coordinadas y conserva el tono judicial del original.
