translation:
  language: es
  text: Ella se levantó y se postró con el rostro en tierra, y dijo:[a] «He aquí, tu esclava[b] es una sierva para lavar los pies de los siervos de mi señor».[c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se levantó y se inclinó rostro en tierra». La expresión describe una reverencia profunda; también puede entenderse como «se postró».
    reason: lexical_alternative
  - marker: b
    text: O «tu sierva es una sierva». El hebreo usa dos términos femeninos de servidumbre estrechamente relacionados, y la traducción procura conservar esa variación.
    reason: lexical_alternative
  - marker: c
    text: «Los siervos de mi señor» refleja el contexto cortesano de los asistentes de David; otra posibilidad sería «los servidores de mi señor».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּקָם
  english_pob_choice: She rose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - se puso de pie
  lexicon: HALOT
  rationale: El wayyiqtol de קום expresa una acción narrativa simple y secuencial. «Se levantó» es natural en español y conserva el avance de la escena sin agregar interpretación.
- source_word: וַתִּשְׁתַּחוּ אַפַּיִם אָרְצָה
  english_pob_choice: bowed with her face to the ground
  chosen_spanish: se inclinó rostro en tierra
  alternatives_spanish:
  - se postró rostro en tierra
  - se postró con el rostro en tierra
  lexicon: HALOT
  rationale: La combinación hebrea indica una reverencia profunda. «Se inclinó rostro en tierra» preserva la postura sin forzar un giro excesivamente explicativo; mantiene la tensión entre inclinación y postración.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - Miren
  lexicon: HALOT
  rationale: Es una interjección deíctica y formal en un discurso de humillación. «He aquí» conserva el tono elevado y es más fiel al registro del hebreo que una forma demasiado coloquial.
- source_word: אֲמָתְךָ
  english_pob_choice: your slave / your female servant
  chosen_spanish: tu esclava
  alternatives_spanish:
  - tu sierva
  - tu servidora
  lexicon: HALOT
  rationale: אמה es un término femenino de servidumbre que puede abarcar esclava/sierva. Aquí Abigail se presenta con extrema deferencia; «tu esclava» refleja mejor la fuerza lexical que «sierva», aunque se conserva «sierva» en la frase siguiente para mostrar la segunda forma hebrea.
- source_word: לְשִׁפְחָה
  english_pob_choice: a maidservant
  chosen_spanish: una sierva
  alternatives_spanish:
  - una esclava
  - una criada
  lexicon: HALOT
  rationale: שפחה es otro término femenino de servidumbre, distinto de אמה. «Una sierva» mantiene el paralelismo y evita suavizar innecesariamente el estatus servil; en español suena más natural que una repetición directa de «esclava» en esta estructura.
- source_word: לִרְחֹץ
  english_pob_choice: to wash
  chosen_spanish: para lavar
  alternatives_spanish:
  - para que lave
  - a lavar
  lexicon: HALOT
  rationale: El infinitivo con לְ expresa finalidad. «Para lavar» comunica con claridad la función de servicio sin añadir matices ausentes en el hebreo.
- source_word: רַגְלֵי
  english_pob_choice: the feet of
  chosen_spanish: los pies de
  alternatives_spanish:
  - los pies
  - a los pies de
  lexicon: HALOT
  rationale: La construcción de estado constructo introduce el objeto del lavado. «Los pies de» es la equivalencia directa y clara en español.
- source_word: עַבְדֵי
  english_pob_choice: the servants of
  chosen_spanish: los esclavos de
  alternatives_spanish:
  - los siervos de
  - los servidores de
  lexicon: HALOT
  rationale: En este contexto, עבד mantiene la fuerza de dependencia personal. Dado que la POB en inglés corrigió una tendencia a suavizar el término, «esclavos» preserva esa fuerza lexical; el contexto cortesano no elimina necesariamente la carga servil.
- source_word: אֲדֹנִי
  english_pob_choice: my lord
  chosen_spanish: mi señor
  alternatives_spanish:
  - mi señor dueño
  - mi amo
  lexicon: HALOT
  rationale: Es un tratamiento honorífico hacia David. «Mi señor» refleja el registro respetuoso de la expresión y evita la dureza de «mi amo».
theological_decisions:
- issue: Diferenciar dos términos femeninos de servidumbre en la autohumillación de Abigail
  english_pob_reading: Differentiate אמה as 'female servant/slave' and שפחה as 'maidservant' to preserve rhetorical intensification.
  chosen_spanish_reading: Distinguir «tu esclava» y «una sierva» para reflejar la intensificación de humildad y no borrar la variación léxica.
  alternative_spanish_readings:
  - «tu sierva» y «una criada»
  - «tu esclava» y «una esclava»
  rationale: El hebreo usa dos sustantivos afines pero no idénticos. Mantener una diferencia en español ayuda a no aplanar el discurso de humildad de Abigail. La opción elegida conserva la relación semántica y permite percibir la intensificación retórica sin sonar artificial.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: 'La versión inglesa auditada pasó por una revisión que osciló entre «Look/Behold» y entre distintas formas de traducir los dos términos femeninos de servidumbre, además de una corrección final que restauró «slave» para δοῦλος. Esta propuesta en español sigue esa cautela: preserva la distinción léxica de אמה/שפחה, mantiene el tono elevado de הִנֵּה con «He aquí» y retiene «esclavos» para עבד, evitando suavizar la carga servil que el expediente auditado marcó como significativa.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma por defecto cuando corresponda, aunque este versículo no la contiene.
  - Se mantiene «esclava/sierva/esclavos» para reflejar la fuerza servil del hebreo, en coherencia con la preferencia del proyecto por no diluir δοῦλος/עבד cuando el contexto lo exige.
  - «Mi señor» conserva el registro honorífico y evita una lectura demasiado moderna o demasiado dura.
