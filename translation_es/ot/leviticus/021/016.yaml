translation:
  language: es
  text: 'Yahvé habló a Moisés[a], diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; tradicionalmente se vierte «el SEÑOR».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: En la fórmula narrativa de introducción del discurso, דִבֵּר expresa el acto de hablar de Yahvé. En español, 'habló' conserva el registro formal y natural de una intervención divina; 'dijo' es posible, pero atenúa el matiz de introducción solemne del habla.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del texto hebreo. 'Yahvé' sigue la terminología POB en español y evita sustituir el nombre por un título genérico. 'El SEÑOR' ocultaría el Tetragrámaton; 'Jehová' no es la forma preferida por la base POB.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: La preposición marca el destinatario del habla. En español, 'a' es la equivalencia directa y natural para introducir el complemento indirecto.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moses
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español.
- source_word: לֵּאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  lexicon: HALOT
  rationale: En la fórmula hebrea de introducción del discurso, לֵאמֹר señala que lo que sigue es el contenido de la palabra. 'Diciendo' conserva la estructura formal; 'para decir' es posible, pero menos ajustado a esta fórmula fija.
theological_decisions:
- issue: Nombre divino YHWH en la fórmula de revelación
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. Se mantiene el nombre propio en español para preservar la identidad personal y covenantal del Dios de Israel, conforme a la práctica POB y sin adoptar la sustitución tradicional de título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El pasaje coincide con el texto hebreo y con el audit trail inglés; no se requieren ajustes de revisión. Se mantiene la fórmula introductoria solemne con el nombre divino visible en español.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se conserva el tono de fórmula narrativa bíblica con «habló... diciendo».
  - La puntuación introduce la cita siguiente sin añadir contenido no presente en el versículo.
