review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del griego: dos vocativos seguidos por una prohibición y una súplica de misericordia. También conserva adecuadamente la nota sobre la compresión textual y la posible lectura alternativa de ὑπὲρ αὐτούς. Sin embargo, la frase principal «ten misericordia de nosotros más que de ellos» no es idiomática en español para expresar comparación de destinatarios; el griego comparativo se representa mejor como «más que de ellos» solo en una glosa, no en el texto principal.'
  spanish_quality_summary: El español es en general claro y digno, pero presenta una torpeza importante en «más que de ellos», que suena antinatural y confusa. «Antes» también es posible, pero «más bien» fluye mejor en registro actual. «Consejero de iniquidad» es aceptable, aunque «de iniquidad» suena algo abstracto; no obstante, no requiere cambio obligatorio. La revisión propuesta mejora naturalidad sin alejarse del griego ni del audit trail inglés.
  glossary_alignment: No hay términos del glosario de proyecto en conflicto. «Tirano», «misericordia» y «Consejero» están bien alineados. «Iniquidad» es defendible para παρανομίας por su carga moral, aunque el matiz de 'ilegalidad/violación de la ley' podría expresarse también como «maldad» o «desprecio por la ley»; no es un problema mayor aquí.
  issues:
  - severity: medium
    issue: La expresión «más que de ellos» en el texto principal es poco idiomática en español.
    rationale: Aunque intenta seguir de cerca el comparativo griego, en español suena forzada y puede resultar ambigua. «Más que con ellos» o una reestructuración equivalente comunica mejor la comparación sin perder fidelidad.
  - severity: low
    issue: «Antes» es menos natural que «más bien» en esta coordinación adversativa/exhortativa.
    rationale: No es incorrecto, pero «más bien» suena más claro y contemporáneo en español bíblico moderno.
  revised_spanish_text: Consejero de iniquidad[a], tirano, no nos odies; más bien, ten misericordia de nosotros más que con ellos.
  revised_footnotes:
  - marker: a
    text: 'El griego es muy comprimido: literalmente, algo como «Consejero, tirano de iniquidad, no odiándonos más que a ellos, ten misericordia de nosotros». La frase traducida «más que con ellos» también puede entenderse, con menor probabilidad, como «por causa de ellos».'
    reason: alternative_reading
  revision_rationale: Se ajusta la comparación final para que el español sea inteligible y natural, manteniendo la lectura comparativa principal del griego y preservando la alternativa en nota. También se reemplaza «antes» por «más bien» para mejorar la fluidez sin cambiar el sentido.
