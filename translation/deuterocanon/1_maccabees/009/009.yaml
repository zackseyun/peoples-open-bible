translation:
  text: But they turned away from him[a], saying, “We certainly cannot do it. Instead, let us save our own lives for now. Let us return with our brothers and fight against them[b], but we are few.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they rejected him,' since the Greek expression can imply refusing his counsel rather than merely physically turning away.
    reason: lexical_alternative
  - marker: b
    text: '''Lives'' translates Greek ''souls'' (psychas), a common idiom for preserving one''s life in danger.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστρεψαν αὐτόν
  chosen: they turned away from him
  alternatives:
  - they turned him back
  - they rejected him
  lexicon: LSJ
  rationale: The phrase idiomatically conveys refusing or turning back from Judas's proposal. 'Turned away from him' preserves the relational sense without overinterpreting as formal rejection.
- source_word: Οὐ μὴ δυνώμεθα
  chosen: We certainly cannot do it
  alternatives:
  - We cannot
  - By no means are we able
  lexicon: BDAG
  rationale: οὐ μή with the subjunctive/intensive form expresses strong negation. 'Certainly cannot' captures the emphatic refusal in natural English.
- source_word: σώσωμεν τὰς ἑαυτῶν ψυχὰς
  chosen: let us save our own lives
  alternatives:
  - let us save our own souls
  - let us preserve ourselves
  lexicon: BDAG
  rationale: In this military context ψυχή refers to life rather than 'soul' in a theological sense. 'Our own lives' is the clearest contextual rendering.
- source_word: τὸ νῦν
  chosen: for now
  alternatives:
  - at present
  - just now
  lexicon: LSJ
  rationale: The phrase marks immediate practical action in the present crisis. 'For now' is concise and idiomatic.
- source_word: ἐπιστρέψωμεν
  chosen: let us return
  alternatives:
  - let us turn back
  lexicon: BDAG
  rationale: Given the following phrase 'with our brothers,' the sense is returning to rejoin them. 'Return' reads naturally in English.
- source_word: μετὰ τῶν ἀδελφῶν ἡμῶν
  chosen: with our brothers
  alternatives:
  - to our brothers
  - along with our brothers
  lexicon: BDAG
  rationale: μετά with the genitive normally means 'with.' Per project philosophy, ἀδελφῶν is rendered 'brothers' rather than neutralized, while the context may include compatriots more broadly.
- source_word: πολεμήσωμεν πρὸς αὐτούς
  chosen: let us fight against them
  alternatives:
  - let us make war on them
  - let us fight them
  lexicon: LSJ
  rationale: The phrase denotes armed conflict directed against the enemy. 'Fight against them' is clear and suitably direct.
- source_word: ἡμεῖς δὲ ὀλίγοι
  chosen: but we are few
  alternatives:
  - for we are few
  - since we are few in number
  lexicon: BDAG
  rationale: This clause gives the reason for their proposed withdrawal. 'But we are few' preserves the adversative δέ and the terse force of the Greek.
