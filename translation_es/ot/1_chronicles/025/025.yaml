lexical_decisions:
- source_word: לִשְׁמוֹנָה עָשָׂר
  english_pob_choice: For the eighteenth
  chosen_spanish: Para el decimoctavo
  alternatives_spanish:
  - Para el decimoctavo lote
  - El decimoctavo
  lexicon: HALOT
  rationale: El prefijo ל marca asignación o destino (“para/al”), y el numeral ordinal debe mantenerse en español con naturalidad. Se evita añadir “lote”, porque no está expresado en el hebreo de este verso, aunque el contexto del capítulo lo implique.
- source_word: לַחֲנָנִי
  english_pob_choice: Hanani
  chosen_spanish: Hananí
  alternatives_spanish:
  - Hanani
  lexicon: HALOT
  rationale: Es nombre propio. Se translitera al español con acentuación prosódica natural para lectura pública, sin alterar la forma base del nombre.
- source_word: בָּנָיו
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus hijos
  lexicon: HALOT
  rationale: El hebreo dice literalmente “sus hijos”. En español, “hijos” comunica de forma natural la relación filial sin forzar una explicitación de género que el contexto genealógico ya determina.
- source_word: וְאֶחָיו
  english_pob_choice: and his brothers
  chosen_spanish: y sus hermanos
  alternatives_spanish:
  - y sus parientes
  - y sus hermanos
  lexicon: HALOT
  rationale: La opción básica y más transparente es “hermanos”. Aunque en algunos contextos podría ampliarse a parientes, aquí la fórmula del registro exige conservar el parentesco directo.
- source_word: שְׁנֵים עָשָׂר
  english_pob_choice: twelve
  chosen_spanish: doce
  alternatives_spanish:
  - doce
  lexicon: HALOT
  rationale: Es el número cardinal que cierra la lista. No requiere ampliación, y en español “doce” mantiene la concisión del hebreo.
translation_notes:
  revision_awareness: Se sigue el estado de alta concordancia del control cruzado y no se registran revisiones aplicadas; la redacción española conserva el patrón formulístico del hebreo sin añadir léxico no expresado.
  spanish_consistency_notes:
  - Se mantiene el nombre propio en forma española Hananí, sin reemplazarlo por una forma tradicional diferente.
  - Se conserva la estructura breve y enumerativa del versículo, acorde con una lista de asignaciones.
  - No se introduce “lote” en el texto principal para respetar la diferencia entre lo explícito y lo implícito en el hebreo.
