- from: Efraín me ha rodeado[a] con mentiras, y la casa de Israel con engaño[b]; pero Judá todavía anda errante con Dios y es fiel con el Santo.
  to: Efraín me ha rodeado[a] con mentiras, y la casa de Israel con engaño[b]; pero Judá todavía anda con Dios[c] y es fiel con el Santo[d].
  rationale: Se reemplazó «anda errante con Dios» por «anda con Dios» para evitar en español un matiz de extravío que distorsiona la lectura positiva adoptada por el POB. Como esa solución suaviza la extrañeza del hebreo difícil, se añadieron notas que preservan la alternativa negativa de la cláusula y la alternativa léxica «con los santos», en línea con el audit trail inglés.
