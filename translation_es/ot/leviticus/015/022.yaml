translation:
  language: es
  text: Y todo el que toque cualquier objeto[a] sobre el cual ella se haya sentado lavará sus vestidos y se bañará en agua, y será impuro hasta la tarde.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cualquier utensilio» o «cualquier artículo». El hebreo כְּלִי es un término amplio para un objeto o utensilio.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכָל
  english_pob_choice: And everyone
  chosen_spanish: Y todo el que
  alternatives_spanish:
  - Y cualquiera que
  - Y toda persona que
  lexicon: HALOT
  rationale: El hebreo introduce una clase universal con valor genérico. «Todo el que» conserva esa amplitud de manera natural en español y mantiene el tono legal de la instrucción.
- source_word: הַנֹּגֵעַ
  english_pob_choice: who touches
  chosen_spanish: toque
  alternatives_spanish:
  - toca
  - toque el que toca
  lexicon: HALOT
  rationale: El participio funciona de forma sustantiva y general. En español, el subjuntivo en «todo el que toque» expresa bien la generalidad normativa sin volver la frase pesada.
- source_word: בְּכָל כְּלִי
  english_pob_choice: any object
  chosen_spanish: cualquier objeto
  alternatives_spanish:
  - cualquier utensilio
  - cualquier artículo
  - cualquier vaso
  lexicon: HALOT
  rationale: כְּלִי es amplio y puede abarcar objeto, utensilio o recipiente. «Objeto» reproduce esa amplitud con naturalidad; se evita «vaso» por ser demasiado estrecho y «utensilio» por sonar más técnico de lo necesario en este contexto.
- source_word: אֲשֶׁר תֵּשֵׁב עָלָיו
  english_pob_choice: on which she sits
  chosen_spanish: sobre el que ella se siente
  alternatives_spanish:
  - en el que ella se sienta
  - sobre el cual se sienta ella
  lexicon: HALOT
  rationale: La cláusula relativa modifica al sustantivo anterior y remite a la mujer del contexto precedente. «Sobre el que ella se siente» preserva la referencia y el matiz locativo de עַל.
- source_word: יְכַבֵּס בְּגָדָיו
  english_pob_choice: shall wash his clothes
  chosen_spanish: lavará sus vestidos
  alternatives_spanish:
  - lavará sus ropas
  - deberá lavar sus vestidos
  lexicon: HALOT
  rationale: כִּבֵּס se refiere a lavar ropa, no solo enjuagarla. «Vestidos» mantiene el lenguaje bíblico amplio para la prenda o conjunto de prendas, y el futuro simple puede funcionar en español jurídico-bíblico como mandato/instrucción.
- source_word: וְרָחַץ בַּמַּיִם
  english_pob_choice: and bathe in water
  chosen_spanish: se bañará en agua
  alternatives_spanish:
  - se lavará en agua
  - se bañará con agua
  lexicon: HALOT
  rationale: רָחַץ en legislación de pureza normalmente implica lavarse el cuerpo. «Bañarse en agua» comunica ese acto corporal de manera clara y evita reducirlo a un lavado genérico.
- source_word: וְטָמֵא
  english_pob_choice: and he shall be unclean
  chosen_spanish: será impuro
  alternatives_spanish:
  - quedará impuro
  - será inmundo
  lexicon: HALOT
  rationale: El término designa impureza ritual, no culpa moral. «Impuro» preserva la categoría cultual y evita el lenguaje de «inmundo», que en español puede sugerir connotaciones morales más fuertes o menos precisas.
- source_word: עַד הָעָרֶב
  english_pob_choice: until the evening
  chosen_spanish: hasta la tarde
  alternatives_spanish:
  - hasta el anochecer
  - hasta la noche
  lexicon: HALOT
  rationale: La expresión marca la duración de la impureza ritual. «Hasta la tarde» sigue de cerca el hebreo y es comprensible en español bíblico; se evita «anochecer» porque puede sonar más interpretativo que la simple referencia horaria.
theological_decisions:
- issue: Naturaleza de la impureza en la ley de pureza
  english_pob_reading: Render טָמֵא as ritual 'unclean' without importing moral guilt language.
  chosen_spanish_reading: Traducir טָמֵא como «impuro» en sentido ritual, sin introducir culpa moral.
  alternative_spanish_readings:
  - inmundo
  - contaminado
  rationale: El pasaje trata de impurificación ceremonial por contacto. «Impuro» conserva la categoría legal de Levítico y evita una lectura moralizante que el hebreo aquí no exige.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El texto inglés y el control cruzado muestran alta concordancia y ninguna revisión pendiente; la versión española sigue esa lectura estable sin añadir expansiones interpretativas.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando aparece explícitamente el nombre divino; aquí no aparece ningún término que requiera esa convención.
  - Se conservó la distinción cultual de pureza con «impuro», no con lenguaje moral.
  - «Vestidos» y «bañarse» mantienen un registro bíblico claro y natural en español, alineado con la función legal del verso.
