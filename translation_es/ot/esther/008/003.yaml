revisions:
- from: Entonces Ester habló de nuevo delante del rey. Se postró a los pies de él[a], lloró y le rogó que apartara la maldad[b] de Amán el agagueo y el plan que había tramado contra los judíos.
  to: Entonces Ester habló de nuevo delante del rey. Cayó a sus pies[a], lloró y le rogó que apartara el plan malvado[b] de Amán el agagueo y el plan que había tramado contra los judíos.
  rationale: Se ajustó la frase de postración para reflejar mejor וַתִּפֹּל y sonar natural en español («Cayó a sus pies»). También se revisó רָעַת הָמָן a «el plan malvado de Amán» para seguir la decisión contextual documentada en la auditoría inglesa y mantener el sentido de amenaza/complot, sin colapsarlo del todo con la segunda expresión sobre el plan tramado.
  reviewer_model: gpt-5.4
