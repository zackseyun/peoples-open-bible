revisions:
- from: Y traeremos la primicia de nuestra masa[a], nuestras ofrendas, el fruto de todo árbol, el mosto y el aceite, a los sacerdotes, a las cámaras de la casa de nuestro Dios, y el diezmo de nuestra tierra a los levitas; porque ellos, los levitas[b], son los que recaudan los diezmos en todas las ciudades de nuestro trabajo[c].
  to: Y traeremos la primera porción de nuestra masa[a], nuestras contribuciones, el fruto de todo árbol, el vino nuevo, y el aceite a los sacerdotes, a las habitaciones[b] de la casa de nuestro Dios, y el diezmo de nuestra tierra a los levitas; porque ellos, los levitas, son los que recaudan los diezmos en todas las ciudades donde trabajamos[c].
  rationale: 'Se corrigieron los anclajes de las notas para que coincidan exactamente con las palabras o frases explicadas. También se ajustó el léxico para alinearlo mejor con las decisiones auditadas del POB inglés: ''contribuciones'' para תְּרוּמֹתֵינוּ, ''vino nuevo'' para תִּירוֹשׁ, una opción más natural para לִשְׁכוֹת, y una reformulación más idiomática de בְּכָל עָרֵי עֲבֹדָתֵנוּ como ''donde trabajamos''.'
