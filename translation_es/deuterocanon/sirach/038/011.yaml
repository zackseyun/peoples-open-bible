base_translation:
  language: en
  yaml_path: translation/deuterocanon/sirach/038/011.yaml
  text: Present a memorial offering of soothing aroma[b][a], and enrich the arranged offering with the best of your wealth.
  footnotes:
  - marker: a
    text: Hebrew literally, 'Present a pleasing memorial offering, and enrich the arranged fat with the wings of your wealth.' The phrase 'with the wings of your wealth' is idiomatic and likely means giving from the choicest or fullest extent of one's means.
    reason: lexical_alternative
  - marker: b
    text: The Greek parallel reads, 'Give a fragrance and a memorial of fine flour, and make the offering rich, as one who does not exist'—a substantially different final phrase. The Hebrew witness is followed here, with the Greek used as a consistency check for the sacrificial sense.
    reason: alternative_reading
