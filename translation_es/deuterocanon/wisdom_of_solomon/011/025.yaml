translation:
  language: es
  text: ¿Cómo podría haber permanecido algo, si tú no hubieras querido? ¿O cómo podría haberse conservado lo que no había sido llamado[a] por ti?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más explícitamente: «lo que no había sido llamado a existir por ti». El griego dice simplemente «llamado», pero en contexto puede aludir al llamado creador de Dios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πῶς
  english_pob_choice: how could
  chosen_spanish: ¿Cómo podría...
  alternatives_spanish:
  - ¿De qué manera podría...
  - ¿Cómo sería posible que...
  lexicon: LSJ
  rationale: La pregunta retórica expresa imposibilidad aparte de la voluntad divina; «¿Cómo podría...?» conserva ese matiz de imposibilidad en español natural.
- source_word: ἔμεινεν
  english_pob_choice: have remained
  chosen_spanish: haber permanecido
  alternatives_spanish:
  - seguir existiendo
  - haber continuado
  lexicon: LSJ
  rationale: El verbo apunta a continuar en existencia o persistir; «haber permanecido» mantiene el sentido sin sobreexplicar.
- source_word: ἄν τι
  english_pob_choice: anything
  chosen_spanish: algo
  alternatives_spanish:
  - cualquier cosa
  - nada
  lexicon: LSJ
  rationale: En esta construcción retórica, «algo» funciona bien en español para expresar la posibilidad mínima de existencia; el contexto deja claro el alcance universal.
- source_word: ἠθέλησας
  english_pob_choice: had not willed
  chosen_spanish: no lo hubieras querido
  alternatives_spanish:
  - no lo hubieras querido hacer
  - no lo hubieras deseado
  - no lo hubieras dispuesto
  lexicon: LSJ
  rationale: «Querer» en español puede expresar voluntad decidida; en segunda persona divina, «hubieras querido» comunica intención soberana sin rigidez excesiva.
- source_word: τὸ μὴ κληθέν
  english_pob_choice: what had not been called
  chosen_spanish: lo que no había sido llamado
  alternatives_spanish:
  - lo que no había sido convocado
  - lo que no había sido nombrado
  - lo que no había sido llamado a existir
  lexicon: LSJ
  rationale: «Llamado» conserva el valor literal de κληθέν. Se evita añadir «a existir» al texto principal, porque el griego no lo dice de forma explícita.
- source_word: ὑπὸ σοῦ
  english_pob_choice: by you
  chosen_spanish: por ti
  alternatives_spanish:
  - de ti
  - por ti mismo
  lexicon: LSJ
  rationale: La preposición indica agencia directa; «por ti» es la equivalencia natural en español y mantiene el referente divino.
- source_word: διετηρήθη
  english_pob_choice: have been preserved
  chosen_spanish: se hubiera conservado
  alternatives_spanish:
  - habría sido preservado
  - se habría mantenido
  - habría permanecido
  lexicon: LSJ
  rationale: El verbo expresa haber sido mantenido o preservado. En la pregunta retórica, el pluscuamperfecto de subjuntivo español suena natural y conserva la dependencia del acto divino.
theological_decisions:
- issue: Si hacer explícita la idea de creación/existencia en τὸ μὴ κληθέν
  english_pob_reading: Retain the more literal 'what had not been called' in the main text; the stronger 'called into being' reading stays in a note
  chosen_spanish_reading: Mantener «lo que no había sido llamado» en el texto principal
  alternative_spanish_readings:
  - lo que no había sido llamado a existir
  - lo que no había sido llamado a ser
  - lo que no había sido llamado por ti a existir
  rationale: La lectura del contexto permite una alusión creadora, pero el griego solo dice «llamado». Por fidelidad al texto fuente, la ampliación interpretativa no entra en el cuerpo principal.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; Preserve theological tension rather than resolve it'
- issue: Cómo reflejar el tono de dependencia absoluta de todo lo creado respecto de la voluntad divina
  english_pob_reading: Anything would not have remained if you had not willed it
  chosen_spanish_reading: Toda existencia queda dependiente de la voluntad divina, sin suavizar la fuerza retórica
  alternative_spanish_readings:
  - Toda cosa depende de tu voluntad
  - Nada podría existir sin tu querer
  rationale: El pasaje formula una imposibilidad total ante la voluntad de Dios. La redacción española mantiene esa dependencia universal con una pregunta retórica clara y reverente.
  doctrine_reference: Wisdom 11:25 context; divine sovereignty and sustaining will
translation_notes:
  revision_awareness: No se requirieron cambios según el último paso de revisión; la versión inglesa quedó estable y en alto acuerdo, así que el español mantiene la misma distinción entre el texto literal y la posible lectura creadora implícita.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto solo cuando aparezca el nombre divino; aquí el texto usa segunda persona y no requiere sustitución.
  - Se mantuvo «llamado» en el cuerpo principal para respetar la ambigüedad semántica de κληθέν.
  - La nota a pie de página amplía la posible lectura creadora sin introducirla en la línea principal.
  - El registro es sobrio y litúrgicamente inteligible, sin calcos excesivos del inglés.
