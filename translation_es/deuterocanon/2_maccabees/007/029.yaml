  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Verdugo», «misericordia», «hermanos» y «muerte» están bien alineados con las decisiones auditadas. La única mejora léxica importante es ajustar γενόμενος a «llegando a ser digno» o equivalente.
