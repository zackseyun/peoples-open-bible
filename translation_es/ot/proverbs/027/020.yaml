translation:
  language: es
  text: Seol y Abadón[a] nunca se sacian, y los ojos del hombre[b] nunca se sacian.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘Destrucción’. El hebreo Abadón puede denotar destrucción o el lugar/personificación de la destrucción.
    reason: lexical_alternative
  - marker: b
    text: ‘Hombre’ aquí es genérico y se refiere a los seres humanos en general.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁאוֹל
  english_pob_choice: Sheol
  chosen_spanish: Seol
  alternatives_spanish:
  - el sepulcro
  - el reino de los muertos
  - infierno
  lexicon: HALOT
  rationale: Se conserva el término técnico por transliteración para no reducirlo a un equivalente español más estrecho que el hebreo; ‘Seol’ mantiene el alcance de ‘Sheol’ como ámbito de los muertos.
- source_word: אֲבַדָּה
  english_pob_choice: Abaddon
  chosen_spanish: Abadón
  alternatives_spanish:
  - Destrucción
  - lugar de destrucción
  lexicon: HALOT
  rationale: Se translitera como nombre propio/termo casi propio, en paralelo con ‘Seol’, para conservar su fuerza personificada o cuasi local sin forzar una sola paráfrasis.
- source_word: לֹא תִשְׂבַּעְנָה
  english_pob_choice: are never satisfied
  chosen_spanish: nunca se sacian
  alternatives_spanish:
  - no se satisfacen
  - nunca quedan satisfechos
  - nunca se llenan
  lexicon: HALOT
  rationale: ‘Saciarse’ reproduce bien la idea de quedar plenamente satisfecho o lleno; con ‘nunca’ se preserva el valor proverbial de negación repetida.
- source_word: עֵינֵי
  english_pob_choice: the eyes of
  chosen_spanish: los ojos de
  alternatives_spanish:
  - ojos
  lexicon: HALOT
  rationale: Se conserva la imagen concreta del hebreo, donde el deseo se expresa mediante ‘los ojos’ y su relación posesiva/constructa.
- source_word: הָאָדָם
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la humanidad
  - las personas
  - el ser humano
  lexicon: HALOT
  rationale: Se mantiene el singular genérico masculino del hebreo para reflejar la forma del texto fuente; en español, ‘el hombre’ conserva la fórmula proverbial y el paralelismo con la primera línea.
- source_word: לֹא תִשְׂבַּעְנָה
  english_pob_choice: are never satisfied
  chosen_spanish: nunca se sacian
  alternatives_spanish:
  - no se sacian
  - nunca están satisfechos
  lexicon: HALOT
  rationale: Se repite la misma solución verbal para mantener el paralelismo hebreo entre ambas mitades del versículo.
theological_decisions:
- issue: Ámsterdam genericidad de אָדָם en proverbio
  english_pob_reading: man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - la humanidad
  - el ser humano
  rationale: El hebreo usa אָדָם en singular con valor genérico; se conserva la forma masculina genérica para respetar la estructura y el paralelismo del proverbio, sin perder que el referente es colectivo.
  doctrine_reference: DOCTRINE.md §Translation philosophy, punto 4; tabla de términos controvertidos para אָדָם
- issue: Conservación de términos del ámbito de los muertos
  english_pob_reading: Sheol / Abaddon
  chosen_spanish_reading: Seol / Abadón
  alternative_spanish_readings:
  - sepulcro / destrucción
  - reino de los muertos / lugar de destrucción
  rationale: No se sustituyen por equivalentes doctrinalmente cargados como ‘infierno’, porque el hebreo distingue ambos términos y el POB inglés preserva esa distinción mediante transliteración.
  doctrine_reference: DOCTRINE.md §Terminología y equivalencias controladas; notas léxicas sobre שְׁאוֹל y אבדון
translation_notes:
  revision_awareness: El expediente inglés indica acuerdo alto y ningún cambio en la revisión más reciente; por eso esta propuesta conserva las decisiones léxicas auditadas (transliteración de Sheol/Abaddon, paralelo verbal y genericidad de אָדָם) sin introducir alternativas no respaldadas por la fuente.
  spanish_consistency_notes:
  - Se usa ‘Seol’ y ‘Abadón’ como transliteraciones consistentes con el tratamiento POB de términos técnicos del hebreo.
  - Se preserva la repetición de ‘nunca se sacian’ para reflejar el paralelismo del hebreo.
  - Se mantiene ‘el hombre’ como genérico singular, con nota aclaratoria para lectura inclusiva.
  - La puntuación y el orden siguen una cadencia proverbial natural en español sin añadir contenido interpretativo.
