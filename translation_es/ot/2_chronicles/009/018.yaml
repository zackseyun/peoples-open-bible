    text: O posiblemente «una rampa/escalinata de oro unida al trono». La palabra hebrea כבשׁ puede entenderse de otra manera, aunque «escabel» encaja bien en el contexto del trono.
    reason: lexical_alternative
  revision_rationale: Se conserva la traducción base porque es fiel al hebreo y al audit trail del POB. Se corrige el error gramatical de la nota al pie y se ajusta levemente la frase bilateral para una lectura más natural en español sin alejarse del texto fuente.
