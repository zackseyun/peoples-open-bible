review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo: movimiento hostil de Zérah contra Judá, fuerza militar numerosa, trescientos carros y avance hasta Maresá. También conserva acertadamente la literalidad de אֶלֶף אֲלָפִים mediante una nota. Sin embargo, falta la nota etnolingüística que el English POB preservó para כּוּשִׁי.'
  spanish_quality_summary: El español es claro y natural. No obstante, «mil millares» suena algo menos idiomático en español bíblico moderno que «mil miles», y la ausencia de nota en «cusita» pierde información auditada. El resto fluye bien y mantiene tono digno.
  glossary_alignment: No hay términos de glosario mayor implicados aparte de la etnodenominación כּוּשִׁי, para la cual «cusita» está bien alineado con la preferencia del proyecto por preservar el término etnogeográfico en vez de interpretarlo como «etíope».
  issues:
  - severity: medium
    issue: Falta la nota lexical sobre «cusita».
    rationale: El English POB conserva explícitamente la alternativa tradicional «Ethiopian». Dado que el español usa «cusita», conviene mantener una nota equivalente para preservar la trazabilidad lexical y ayudar a lectores familiarizados con «etíope».
  - severity: low
    issue: «Mil millares» es correcto pero menos natural que «mil miles».
    rationale: Ambas opciones buscan reflejar la literalidad de אֶלֶף אֲלָפִים. En español, «mil miles» suele sonar más transparente como calco literal breve; aun así, no es un error grave. Se recomienda ajustar para legibilidad sin perder la nota explicativa.
  revised_spanish_text: Zérah el cusita[a] salió contra ellos con un ejército de mil miles[b] y trescientos carros de guerra, y llegó hasta Maresá.
  revised_footnotes:
