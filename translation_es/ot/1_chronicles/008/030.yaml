lexical_decisions:
- source_word: וּבְנוֹ
  english_pob_choice: His ... son
  chosen_spanish: Su hijo
  alternatives_spanish:
  - Y su hijo
  - Ahora, su hijo
  lexicon: HALOT
  rationale: El hebreo enlaza con la genealogía anterior; en español, «su hijo» conserva el sentido posesivo natural y evita un calco innecesario del ו inicial.
- source_word: הַבְּכוֹר
  english_pob_choice: firstborn
  chosen_spanish: primogénito
  alternatives_spanish:
  - primero en nacer
  - primero
  lexicon: HALOT
  rationale: «Primogénito» es el equivalente bíblico y genealógico más natural en español para el hijo nacido primero.
- source_word: עַבְדּוֹן
  english_pob_choice: Abdon
  chosen_spanish: Abdón
  alternatives_spanish:
  - Abdon
  lexicon: Transliteración estándar de nombre propio
  rationale: Se mantiene el nombre propio con acentuación española para lectura fluida; no se traduce ni se interpreta el nombre.
- source_word: וְצ֥וּר
  english_pob_choice: then Zur
  chosen_spanish: y luego Zur
  alternatives_spanish:
  - y Zur
  - entonces Zur
  lexicon: Transliteración estándar de nombre propio
  rationale: En una lista genealógica, «y luego» reproduce de forma natural la sucesión de nombres sin perder el valor conjuntivo de וְ.
- source_word: וְקִ֖ישׁ
  english_pob_choice: Kish
  chosen_spanish: Quis
  alternatives_spanish:
  - Kish
  lexicon: Transliteración estándar de nombre propio
  rationale: Se adopta la forma española habitual «Quis» para el nombre אישי, preservando la identificación del personaje.
- source_word: וּבַעַל
  english_pob_choice: Baal
  chosen_spanish: Baal
  alternatives_spanish:
  - Baal
  lexicon: Transliteración estándar de nombre propio
  rationale: Aquí funciona como nombre propio en una genealogía; se conserva sin reemplazarlo por un término descriptivo o teológico.
- source_word: וְנָדָב
  english_pob_choice: Nadab
  chosen_spanish: Nadab
  alternatives_spanish:
  - Nadab
  lexicon: Transliteración estándar de nombre propio
  rationale: Nombre propio transliterado de manera estándar, sin expansión interpretativa.
translation_notes:
  revision_awareness: Se siguió el texto hebreo consonántico/vocalizado del versículo, que presenta una breve cláusula genealógica con serie de nombres propios. La edición inglesa POB resolvió el flujo con una cláusula natural; en español se mantuvo el sentido genealógico directo sin añadir contenido no atestiguado. No se detectaron revisiones sustantivas en el pasaje base.
  spanish_consistency_notes:
  - Se usó «Abdón» y «Quis» por consistencia con la ortografía española de nombres bíblicos, manteniendo transliteración y legibilidad.
  - Se conservó la enumeración con comas y la conjunción final «y» para reflejar la lista nominal del hebreo.
  - La nota al pie marca la alternativa formal preservada por la POB inglesa, útil para lectores que prefieran una estructura más cercana al hebreo.
