base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/001/022.yaml
  text: From the blood of the slain[a], from the fat of the mighty, Jonathan’s bow did not turn back[b], and Saul’s sword did not return empty.
  footnotes:
  - marker: a
    text: Or 'did not draw back.' The Hebrew verb can convey withdrawing or turning back.
    reason: lexical_alternative
  - marker: b
    text: '''Fat'' may also suggest the choicest or richest part, intensifying the image of battlefield success.'
    reason: lexical_alternative
