lexical_decisions:
- source_word: טוּר
  english_pob_choice: row
  chosen_spanish: fila
  alternatives_spanish:
  - hilera
  - curso
  - borde
  lexicon: HALOT
  rationale: El término parece designar un elemento arquitectónico continuo que rodea el conjunto. «Fila» comunica bien la idea de una serie o curso alrededor de las cámaras, sin forzar un sentido más técnico de muro o enclosures.
- source_word: סָבִיב ... סָבִיב
  english_pob_choice: around ... all around
  chosen_spanish: alrededor ... todo alrededor
  alternatives_spanish:
  - en torno ... en torno
  - por todas partes
  - rodeando ... por todos lados
  lexicon: HALOT
  rationale: La repetición se conserva para reflejar el énfasis hebreo en la circunferencia completa. «Alrededor» y «todo alrededor» mantienen la duplicación con naturalidad en español.
- source_word: בָּהֶם
  english_pob_choice: within them
  chosen_spanish: de ellos
  alternatives_spanish:
  - dentro de ellos
  - en ellos
  - en su interior
  lexicon: HALOT
  rationale: En español, con el verbo «haber» y la estructura de la frase, «de ellos» funciona más naturalmente para expresar la relación espacial con las cámaras del contexto inmediato. La idea de interioridad queda reforzada por «alrededor de los cuatro» y por el conjunto arquitectónico.
- source_word: לְאַרְבַּעְתָּם
  english_pob_choice: all four of them
  chosen_spanish: de los cuatro
  alternatives_spanish:
  - para los cuatro
  - los cuatro
  - de cada uno de los cuatro
  lexicon: HALOT
  rationale: La frase distributiva se entiende en contexto como referencia a las cuatro cámaras o patios mencionados antes. «De los cuatro» es breve y idiomático en español, sin perder la referencia totalizante.
- source_word: מְבַשְּׁלוֹת
  english_pob_choice: hearths
  chosen_spanish: fogones
  alternatives_spanish:
  - hornos
  - braseros
  - lugares para cocinar
  lexicon: HALOT
  rationale: El campo semántico apunta a instalaciones de cocción. «Fogones» es un equivalente natural y suficientemente concreto para un dispositivo de cocina/hearth en contexto de templo, sin sobreespecificar su forma exacta.
- source_word: עָשׂוּי
  english_pob_choice: had been made
  chosen_spanish: se habían hecho
  alternatives_spanish:
  - habían sido hechos
  - estaban hechos
  - se habían construido
  lexicon: HALOT
  rationale: La forma pasiva/resultativa del hebreo se expresa bien con una construcción pasiva refleja. «Se habían hecho» mantiene el estado resultante de la instalación ya concluida.
- source_word: מִתַּחַת
  english_pob_choice: beneath
  chosen_spanish: debajo de
  alternatives_spanish:
  - bajo
  - por debajo de
  - bajo las
  lexicon: HALOT
  rationale: «Debajo de» es la opción más clara y natural en español para la relación espacial arquitectónica.
- source_word: הַטִּירוֹת
  english_pob_choice: the rows
  chosen_spanish: las filas
  alternatives_spanish:
  - los enrejados
  - las hiladas
  - las paredes
  lexicon: HALOT
  rationale: Se mantiene la correspondencia con la elección principal para טוּר, preservando la relación entre ambos términos. Dado que el sentido arquitectónico exacto es incierto, «filas» conserva la referencia sin imponer una solución más interpretativa.
