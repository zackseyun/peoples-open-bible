translation:
  language: es
  text: Pues había entrado en la llamada Persépolis, e intentó saquear el templo[a] y apoderarse de la ciudad; por eso, cuando las multitudes se lanzaron, recurrieron a la defensa armada[b], y sucedió que Antíoco, puesto en fuga por los habitantes del lugar, hizo una retirada vergonzosa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cometer un saqueo sacrílego del templo». El verbo griego ἱεροσυλεῖν señala específicamente despojar un lugar sagrado.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «a la ayuda de las armas»; es decir, recurrieron a la defensa armada.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσεληλύθει
  english_pob_choice: had entered
  chosen_spanish: había entrado
  alternatives_spanish:
  - había ido a
  - había llegado a
  lexicon: LSJ
  rationale: El pluperfecto griego marca una acción anterior a la secuencia narrativa; en español, «había entrado» conserva con claridad ese valor temporal.
- source_word: τὴν λεγομένην Περσέπολιν
  english_pob_choice: the so-called Persepolis
  chosen_spanish: la llamada Persépolis
  alternatives_spanish:
  - la así llamada Persépolis
  - la ciudad llamada Persépolis
  lexicon: LSJ
  rationale: λεγoμένην debe quedar visible; «la llamada» reproduce de forma natural la indicación explícita de denominación sin añadir duda sobre el nombre.
- source_word: ἐπεχείρησεν
  english_pob_choice: attempted
  chosen_spanish: había intentado
  alternatives_spanish:
  - intentó
  - se propuso
  lexicon: LSJ
  rationale: El verbo expresa tentativa, no logro; el pluscuamperfecto en español encaja con la anterioridad narrativa y mantiene el matiz de intento.
- source_word: ἱεροσυλεῖν
  english_pob_choice: to plunder the temple
  chosen_spanish: saquear el templo
  alternatives_spanish:
  - despojar el templo
  - cometer sacrilegio robando el templo
  lexicon: LSJ
  rationale: El término designa saqueo sacrílego de un lugar sagrado; «saquear el templo» es claro y conserva el objeto sagrado explícito. Se evita «robó» por ser menos formal aquí.
- source_word: συνέχειν
  english_pob_choice: take control of
  chosen_spanish: tomar control de
  alternatives_spanish:
  - apoderarse de
  - ocupar
  lexicon: LSJ
  rationale: En contexto militar-político con «la ciudad», la idea es dominarla; «tomar control de» es natural y fiel, sin reducirlo a mera ocupación física.
- source_word: τῶν πληθῶν ὁρμησάντων
  english_pob_choice: when the crowds rushed forth
  chosen_spanish: cuando las multitudes se lanzaron
  alternatives_spanish:
  - cuando la gente se lanzó
  - cuando las masas irrumpieron
  lexicon: LSJ
  rationale: El genitivo absoluto señala el impulso súbito de la multitud; «se lanzaron» transmite bien el ímpetu de ὁρμάω en español actual.
- source_word: ἐπὶ τὴν τῶν ὅπλων βοήθειαν
  english_pob_choice: to the defense of arms
  chosen_spanish: a la defensa de las armas
  alternatives_spanish:
  - al auxilio de las armas
  - al recurso de las armas
  lexicon: LSJ
  rationale: La frase es idiomática y alude a defensa armada. Se conserva la imagen de «las armas» como medio de defensa, como en el audit trail inglés, en lugar de suavizarla a «defensa armada».
- source_word: ἐτράπησαν
  english_pob_choice: they turned to the defense of arms
  chosen_spanish: acudieron
  alternatives_spanish:
  - se volvieron
  - recurrrieron
  lexicon: LSJ
  rationale: El verbo señala un giro hacia una respuesta concreta; «acudieron» enlaza con la idea de recurrir a la defensa armada y mantiene el movimiento narrativo.
- source_word: τροπωθέντα
  english_pob_choice: put to flight
  chosen_spanish: puesto en fuga
  alternatives_spanish:
  - rendido
  - derrotado
  lexicon: LSJ
  rationale: El participio indica derrota/rutina de huida; «puesto en fuga» conserva bien el sentido militar de ser expulsado o hecho huir.
- source_word: τῶν ἐγχωρίων
  english_pob_choice: by the local inhabitants
  chosen_spanish: por los habitantes del lugar
  alternatives_spanish:
  - por los lugareños
  - por los pobladores locales
  lexicon: LSJ
  rationale: La referencia es a la población de ese sitio; «habitantes del lugar» es neutral, claro y evita connotaciones potencialmente anacrónicas de «nativos».
- source_word: αἰσχύμονα τὴν ἀναζυγὴν ποιήσασθαι
  english_pob_choice: made a shameful retreat
  chosen_spanish: hizo una retirada vergonzosa
  alternatives_spanish:
  - se retiró avergonzado
  - hizo una retirada deshonrosa
  lexicon: LSJ
  rationale: La expresión combina retirada con deshonra; «retirada vergonzosa» conserva ambas piezas en un español formal y transparente.
theological_decisions:
- issue: ἱεροσυλεῖν como profanación sacrílega del templo
  english_pob_reading: attempted to plunder the temple
  chosen_spanish_reading: saquear el templo
  alternative_spanish_readings:
  - despojar el templo
  - cometer sacrilegio robando el templo
  rationale: 'No hay doctrina explícita en el verso, pero sí una carga cultual fuerte: el verbo griego señala despojo sacrílego de un lugar santo. La traducción española debe conservar esa gravedad sin moralizar más allá del texto.'
  doctrine_reference: No aplica; decisión lexical-cultual del pasaje.
translation_notes:
  revision_awareness: 'La versión inglesa más reciente ajustó ἱεροσυλεῖν de «rob the temple» a «plunder the temple» y refinó ἐπὶ τὴν τῶν ὅπλων βοήθειαν hacia una expresión que preserve mejor la defensa armada. La redacción española refleja esos ajustes: mantiene el saqueo sacrílego, expresa el giro hacia la defensa de las armas y conserva el resultado de fuga y retirada vergonzosa.'
  spanish_consistency_notes:
  - Se usa «Persépolis» como nombre propio transliterado habitual en español, con el matiz de «la llamada» para reflejar λεγομένην.
  - Se conserva «Yahvé»/«Mesías» en otros pasajes según la pauta del proyecto; este versículo no los contiene.
  - «Habitantes del lugar» se prefirió a «nativos» para evitar connotaciones modernas no presentes en el griego.
  - 'La estructura del verso en español mantiene la progresión causal: entrada -> intento sacrílego -> reacción multitudinaria -> defensa armada -> fuga -> retirada vergonzosa.'
