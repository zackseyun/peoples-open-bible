review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español preserva bien la secuencia agrícola concreta del hebreo: trilla/vendimia/siembra, comer pan en abundancia y habitar seguros en la tierra. También mantiene el énfasis pactual en la tierra. Sin embargo, «el trillar» no es la opción más natural ni clara en español general para דַּיִשׁ; el sentido fuente se expresa mejor con «la trilla», que sigue siendo concreto y fiel.'
  spanish_quality_summary: 'La redacción es mayormente clara y digna, pero «Y el trillar alcanzará...» suena menos idiomático en español e introduce una sustantivación verbal algo forzada. «La trilla» mejora la legibilidad sin perder precisión. El resto del verso fluye bien: «la vendimia», «la siembra», «hasta saciarse», «habitarán con seguridad en su tierra».'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Tierra» refleja bien בְּאַרְצְכֶם; no hay nombres divinos ni títulos mesiánicos en juego. La decisión de conservar «pan» es correcta. La única mejora léxica recomendable es דַּיִשׁ -> «la trilla» en lugar de «el trillar».
  issues:
  - severity: medium
    issue: «el trillar» suena poco natural para דַּיִשׁ
    rationale: Aunque puede defenderse como sustantivación verbal, en español bíblico y general «la trilla» comunica con más naturalidad el proceso/temporada de threshing y evita una formulación rígida o extraña para lectores amplios.
  - severity: low
    issue: La nota al pie repite la misma redacción sin aportar una alternativa real
    rationale: La nota dice «más literalmente» pero no diferencia el texto principal. Conviene reflejar la alternativa documentada de «sobrepasará»/«alcanzará» para que la nota tenga valor léxico real en español.
  revised_spanish_text: Y la trilla alcanzará la vendimia[a], y la vendimia alcanzará la siembra; comerán su pan hasta saciarse y habitarán con seguridad en su tierra.
  revised_footnotes:
  - marker: a
    text: 'O, más literalmente: «La trilla sobrepasará la vendimia, y la vendimia sobrepasará la siembra».'
    reason: lexical_alternative
  revision_rationale: Se cambia «el trillar» por «la trilla» para mejorar la naturalidad y claridad del español sin alterar el sentido fuente. También se ajusta la nota para que preserve una alternativa léxica real y útil, en línea con la auditoría inglesa que conserva el matiz más literal de ‘overtake’.
