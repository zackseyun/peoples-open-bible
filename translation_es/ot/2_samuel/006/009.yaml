translation:
  language: es
  text: 'David temió a Yahvé aquel día[a], y dijo: “¿Cómo puede venir a mí el arca de Yahvé?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «¿Cómo vendrá a mí el arca de Yahvé?». La formulación puede expresar tanto una incertidumbre práctica como un sentimiento de indignidad o temor tras la muerte de Uza.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרָא
  english_pob_choice: feared
  chosen_spanish: temió
  alternatives_spanish:
  - tuvo miedo de
  - reverenció
  lexicon: HALOT
  rationale: En este contexto narrativo, después de la muerte de Uza, el verbo expresa una reacción real de temor ante Yahvé. «Temió» conserva esa fuerza sin suavizarla hacia una mera reverencia, y encaja bien con el objeto directo de la construcción hebrea.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el Tetragrámaton directamente, y la política de la POB en español es preservarlo como nombre divino. «Yahvé» reproduce esa decisión, evitando la sustitución por un título y manteniendo la transparencia con el original.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: that day
  chosen_spanish: aquel día
  alternatives_spanish:
  - ese día
  - en aquel día
  lexicon: HALOT
  rationale: Es una expresión temporal idiomática. «Aquel día» es natural en español y conserva la referencia puntual sin añadir rigidez innecesaria.
- source_word: אֵיךְ
  english_pob_choice: How can
  chosen_spanish: ¿Cómo puede
  alternatives_spanish:
  - ¿Cómo podrá?
  - ¿Cómo va a?
  lexicon: HALOT
  rationale: La pregunta hebrea expresa posibilidad o conveniencia bajo la impresión del juicio recién ocurrido. «¿Cómo puede...?» transmite mejor esa inquietud que una simple referencia al futuro.
- source_word: יָבֹא
  english_pob_choice: come
  chosen_spanish: venir
  alternatives_spanish:
  - entrar
  - ser traído
  lexicon: HALOT
  rationale: El verbo básico בוא significa «venir/ir/entrar» según contexto. Aquí, el sujeto es el arca; «venir» respeta la forma verbal y evita introducir una pasiva no presente en el hebreo.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - hasta mí
  - a mi casa
  lexicon: HALOT
  rationale: La forma con sufijo de primera persona simplemente expresa dirección hacia la persona del hablante. «A mí» es la equivalencia directa y no sobreinterpreta el lugar.
- source_word: אֲרוֹן יְהוָה
  english_pob_choice: the ark of Yahweh
  chosen_spanish: el arca de Yahvé
  alternatives_spanish:
  - el arca de Yahvé Dios
  - el arca del Yahvé
  lexicon: HALOT
  rationale: La construcción posesiva se traduce de manera transparente. «Arca» conserva el objeto sagrado, y el genitivo con el nombre divino mantiene la relación sin desplazarla a un título tradicional.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La lectura inglesa del POB preserva el nombre propio divino y no la sustitución litúrgica. En español, «Yahvé» es la forma coherente con esa decisión y con la política del proyecto de hacer visible el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of David’s response after Uza’s death
  english_pob_reading: fear/unworthiness tension
  chosen_spanish_reading: temió
  alternative_spanish_readings:
  - se atemorizó
  - reverenció
  rationale: El contexto admite tanto temor práctico como un sentido de aprensión reverente, pero la reacción primaria es de miedo real. «Temió» mantiene esa tensión sin resolverla en una sola interpretación más débil.
  doctrine_reference: Narrative context of 2 Samuel 6:6-9; lexical alternative preserved in footnote
translation_notes:
  revision_awareness: 'El borrador sigue el estado final del audit trail inglés: sin cambios revisados después del pase más reciente, con acuerdo alto entre revisores y sin correcciones pendientes. Se conserva la tensión lexical documentada en la pregunta de David mediante una nota que no decide en exceso entre posibilidad e indignidad.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera uniforme para יְהוָה en el texto y en la nota.
  - Se mantiene un registro formal y bíblico, pero con sintaxis española natural.
  - No se introduce «SEÑOR» ni una pasiva para el arca, siguiendo la transparencia del original.
  - La nota a pie conserva la alternativa semántica documentada en el audit trail inglés.
