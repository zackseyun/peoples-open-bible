  yaml_path: translation/nt/luke/012/053.yaml
  text: 'They will be divided: father against son and son against father[a], mother against daughter and daughter against mother[c][b], mother-in-law against her daughter-in-law and daughter-in-law against her mother-in-law.'
  footnotes:
  - marker: a
    text: 'Or ''will be split apart.'' The Greek verb emphasizes division within a group or household.'
    reason: lexical_alternative
  - marker: b
    text: 'The Greek word for ''daughter-in-law'' can also mean ''bride'' in other contexts, but here the family pairing with ''mother-in-law'' favors ''daughter-in-law.'''
    reason: lexical_alternative
  - marker: c
    text: 'Or ''and daughter-in-law against mother-in-law''.'
    reason: previous_rendering
translation:
  language: ko
  text: 「아버지가 아들에 대하여, 아들이 아버지에 대하여, 어머니가 딸에 대하여, 딸이 어머니에 대하여, 시어머니가 며느리에 대하여, 며느리가 시어머니에 대하여 분쟁할 것이다.」
  philosophy: optimal-equivalence
