    rationale: Aunque existe en algunas tradiciones, 'Quedar' es la forma más esperable y transparente en español bíblico para Kedar y armoniza mejor con la transliteración del proyecto al español.
  - severity: low
    issue: Frase final 'en estos comerciaban contigo'
    rationale: Reproduce de cerca la preposición hebrea, pero en español suena forzado al referirse a animales. 'Con ellos comerciaban contigo' expresa con más naturalidad que esos eran los bienes de intercambio, sin pérdida de sentido.
  revised_spanish_text: Arabia y todos los príncipes de Quedar[a]—ellos eran tus comerciantes[b]; con corderos, carneros y machos cabríos comerciaban contigo.
