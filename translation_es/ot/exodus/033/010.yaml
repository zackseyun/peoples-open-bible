translation:
  language: es
  text: Cuando todo el pueblo vio la columna de nube de pie[a] a la entrada de la tienda, todo el pueblo se levantó y adoró, cada uno a la entrada de su tienda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en pie'. Más adelante, 'adoró' puede traducirse también 'se inclinó' o 'se postró'; el verbo hebreo se refiere a un acto corporal de reverencia y a menudo funciona como acto de adoración.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָאָה
  english_pob_choice: When ... saw
  chosen_spanish: Cuando ... veía
  alternatives_spanish:
  - y ... veía
  - entonces ... veía
  lexicon: HALOT
  rationale: La secuencia narrativa con waw-consecutivo avanza la acción; en español, 'Cuando' conserva bien la relación temporal con las acciones siguientes y suena natural en contexto narrativo.
- source_word: כָל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - todo el pueblo de Israel
  - el pueblo entero
  lexicon: HALOT
  rationale: La referencia es colectiva y no añade 'de Israel' porque no está explícito en el versículo. 'Todo el pueblo' es natural y fiel.
- source_word: עַמּוּד הֶעָנָן
  english_pob_choice: the pillar of cloud
  chosen_spanish: el pilar de nube
  alternatives_spanish:
  - la columna de nube
  - el pilar de la nube
  lexicon: HALOT
  rationale: '''Pilar de nube'' mantiene la imagen concreta del signo visible de la presencia divina. ''Pilar'' corresponde bien al sustantivo hebreo y evita suavizar la metáfora.'
- source_word: עֹמֵד
  english_pob_choice: standing
  chosen_spanish: de pie
  alternatives_spanish:
  - en pie
  - estando de pie
  lexicon: HALOT
  rationale: En español, 'de pie' expresa de forma natural la postura visible del pilar. No se pierde la idea de permanencia/posición que transmite el participio.
- source_word: פֶּתַח הָאֹהֶל
  english_pob_choice: at the entrance of the tent
  chosen_spanish: a la entrada de la tienda
  alternatives_spanish:
  - en la entrada de la tienda
  - junto a la entrada de la tienda
  lexicon: HALOT
  rationale: '''Entrada'' traduce פֶּתַח de manera clara; ''tienda'' conserva el sustantivo del texto sin añadir ''de reunión'', que no aparece en este versículo.'
- source_word: וְקָם
  english_pob_choice: rose
  chosen_spanish: se levantaba
  alternatives_spanish:
  - se ponía de pie
  - se alzaba
  lexicon: HALOT
  rationale: '''Se levantaba'' comunica el gesto de ponerse en pie con naturalidad en español y mantiene el movimiento de respuesta del pueblo.'
- source_word: וְהִשְׁתַּחֲוּוּ
  english_pob_choice: worshiped
  chosen_spanish: se postraba
  alternatives_spanish:
  - adoraba
  - se inclinaba
  lexicon: HALOT
  rationale: El verbo hebreo tiene un contenido corporal fuerte; 'se postraba' preserva ese gesto reverente. La opción 'adoraba' sería interpretativa; aquí se conserva la acción física que puede implicar adoración.
- source_word: אִישׁ
  english_pob_choice: each man
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada hombre
  - cada persona
  lexicon: HALOT
  rationale: El hebreo es distributivo singular; en español, 'cada uno' reproduce esa distribución sin forzar un masculino genérico donde el punto del texto es la individualidad.
- source_word: פֶּתַח אָהֳלֽוֹ
  english_pob_choice: at the entrance of his tent
  chosen_spanish: a la entrada de su tienda
  alternatives_spanish:
  - en la entrada de su tienda
  - junto a la entrada de su tienda
  lexicon: HALOT
  rationale: Se conserva la repetición del lugar y el sufijo posesivo; el singular distributivo queda claro en español con 'su tienda'.
theological_decisions:
- issue: Cómo traducir la respuesta reverente del pueblo
  english_pob_reading: worshiped
  chosen_spanish_reading: se postraba
  alternative_spanish_readings:
  - adoraba
  - se inclinaba
  rationale: La escena describe una reacción corporal de reverencia ante la manifestación divina. 'Se postraba' mantiene el componente físico y evita reducir el gesto a una abstracción devocional; la nota preserva que el verbo puede funcionar como acto de adoración.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: No hubo revisiones aplicadas en el registro inglés; se conservó la lectura auditada del texto fuente y la única tensión lexical importante se resolvió en español manteniendo el gesto corporal del verbo de reverencia.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' solo cuando no aparece en este versículo, por lo que aquí no fue necesario.
  - '''Pueblo'' y ''tienda'' siguen el contexto inmediato sin expandir innecesariamente a ''tienda de reunión''.'
  - Se preservó la repetición de 'a la entrada' para reflejar el paralelismo del hebreo.
