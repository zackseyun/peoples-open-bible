translation:
  language: es
  text: ¿Cómo fue contado[a] entre los hijos de Dios, y su suerte[b] está entre los santos?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entre los hijos de Dios». El griego dice «hijos de Dios».
    reason: lexical_alternative
  - marker: b
    text: O «su porción está entre los santos».
    reason: lexical_alternative
lexical_decisions:
- source_word: πῶς
  english_pob_choice: How
  chosen_spanish: ¿Cómo
  alternatives_spanish:
  - ¿Por qué
  lexicon: LSJ
  rationale: La pregunta expresa asombro ante el giro inesperado del destino del justo; en español, «¿Cómo…?» conserva mejor ese tono admirativo que una causal como «¿Por qué…?».
- source_word: κατελογίσθη
  english_pob_choice: was counted
  chosen_spanish: fue contado
  alternatives_spanish:
  - fue considerado
  - fue computado
  - fue catalogado
  lexicon: LSJ
  rationale: El pasivo comunica inclusión o adscripción a un grupo. «Fue contado» conserva la imagen de ser incluido o numerado entre otros, sin añadir interpretación.
- source_word: ἐν υἱοῖς θεοῦ
  english_pob_choice: among the sons of God
  chosen_spanish: entre los hijos de Dios
  alternatives_spanish:
  - entre los hijos varones de Dios
  - entre los hijos de Dios y las hijas de Dios
  lexicon: LSJ
  rationale: 'La preposición ἐν con dativo expresa pertenencia o asociación: «entre». «Hijos de Dios» mantiene el plural masculino del griego y reproduce el lenguaje de estatus sin neutralizarlo.'
- source_word: ἅγιοις
  english_pob_choice: the holy ones
  chosen_spanish: los santos
  alternatives_spanish:
  - los santos hombres
  - los consagrados
  - los justos
  lexicon: LSJ
  rationale: En este contexto ἅγιοι designa personas santas. «Los santos» es la forma más natural y fiel en español bíblico, y aquí no fuerza una traducción eclesiástica ajena al sentido.
- source_word: κλῆρος
  english_pob_choice: lot
  chosen_spanish: suerte
  alternatives_spanish:
  - porción
  - lote
  - heredad
  lexicon: LSJ
  rationale: Aunque «lot» en inglés preserva la idea de asignación, en español «suerte» comunica de manera natural la porción asignada o el destino asignado; se mantiene la noción de reparto sin sonar artificial.
- source_word: αὐτοῦ ἐστιν
  english_pob_choice: his lot is
  chosen_spanish: su suerte está
  alternatives_spanish:
  - su porción es
  - le corresponde su suerte
  - le toca su porción
  lexicon: LSJ
  rationale: La estructura posesiva y copulativa griega se vuelve natural en español con «su suerte está», que preserva la pertenencia y el estado sin introducir glosa excesiva.
theological_decisions:
- issue: υἱοῖς θεοῦ como lenguaje de estatus y no neutralización inclusiva
  english_pob_reading: sons of God
  chosen_spanish_reading: hijos de Dios
  alternative_spanish_readings:
  - hijos e hijas de Dios
  - personas de Dios
  - hijos/niños de Dios
  rationale: El griego es explícitamente masculino plural y funciona como título de pertenencia/estatus. Mantener «hijos» conserva la forma del original y la tensión de género del texto, en línea con la decisión POB de no neutralizar salvo necesidad contextual.
  doctrine_reference: DOCTRINE.md §§3-4
- issue: ἅγιοις como grupo humano consagrado
  english_pob_reading: the holy ones
  chosen_spanish_reading: los santos
  alternative_spanish_readings:
  - los consagrados
  - los justos
  - los santos de Dios
  rationale: «Santos» preserva el referente a personas consagradas a Dios y evita una paráfrasis más explicativa que añadiría contenido no presente en el griego.
  doctrine_reference: LSJ; uso bíblico de ἅγιοι
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con el audio/trazado inglés POB: la pregunta retórica de asombro, el pasivo de inclusión en un grupo, y la equivalencia entre κλῆρος y una porción asignada. Se adoptó una solución española más idiomática para κλῆρος («suerte») sin perder la idea de asignación; también se mantuvo la distinción masculina del griego en «hijos de Dios» con nota alternativa.'
  spanish_consistency_notes:
  - Se conserva el tono interrogativo admirativo del original.
  - «Entre» traduce correctamente la relación de membresía de ἐν + dativo.
  - No se usa «SEÑOR» ni otras sustituciones no pertinentes; el verso no contiene el Tetragrámaton.
  - «Santos» se emplea en sentido bíblico de personas santas, no como título eclesiástico técnico.
