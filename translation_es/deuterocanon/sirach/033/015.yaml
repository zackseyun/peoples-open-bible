translation:
  language: es
  text: 'Y así, mira todas las obras del Altísimo: dos por dos, una frente a la otra[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «correspondientes la una a la otra». El griego puede expresar oposición o correspondencia emparejada; el contexto de pares favorece la traducción principal.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔμβλεψον
  english_pob_choice: look at
  chosen_spanish: mira
  alternatives_spanish:
  - observa
  - considera
  - contémplalas
  lexicon: LSJ
  rationale: El imperativo pide atención dirigida. «Mira» es natural en español moderno y conserva la fuerza visual/examinadora sin volverse arcaico como «contempla» en este contexto.
- source_word: πάντα τὰ ἔργα
  english_pob_choice: all the works
  chosen_spanish: todas las obras
  alternatives_spanish:
  - todas las obras hechas
  - todos los hechos
  - todas las acciones
  lexicon: LSJ
  rationale: ἔργα abarca las obras o producciones del Altísimo. «Obras» mantiene la amplitud del término y encaja bien con el lenguaje sapiencial sobre el orden creado y las acciones divinas.
- source_word: τοῦ ὑψίστου
  english_pob_choice: of the Most High
  chosen_spanish: del Altísimo
  alternatives_spanish:
  - del Más Alto
  - del Supremo
  lexicon: LSJ
  rationale: ὁ ὕψιστος es un título divino estándar. «Altísimo» es el equivalente natural y reverente en español, sin añadir matices doctrinales extra.
- source_word: δύο δύο
  english_pob_choice: two by two
  chosen_spanish: dos por dos
  alternatives_spanish:
  - en parejas
  - dos y dos
  lexicon: LSJ
  rationale: La repetición distributiva se expresa de forma idiomática como «dos por dos». Conserva el patrón reiterativo y la idea de apareamiento.
- source_word: ἓν κατέναντι τοῦ ἑνός
  english_pob_choice: one opposite the other
  chosen_spanish: una frente a la otra
  alternatives_spanish:
  - una opuesta a la otra
  - una correspondiente a la otra
  - una enfrente de la otra
  lexicon: LSJ
  rationale: κατέναντι puede indicar oposición o correspondencia. «Una frente a la otra» mantiene esa disposición antitética/pareada de manera natural en español, sin cerrar innecesariamente la posibilidad de correspondencia.
theological_decisions:
- issue: Título divino ὁ ὕψιστος
  english_pob_reading: the Most High
  chosen_spanish_reading: el Altísimo
  alternative_spanish_readings:
  - el Más Alto
  - el Supremo
  rationale: En literatura sapiencial judía, ὁ ὕψιστος funciona como título divino convencional. «Altísimo» preserva la elevación del título en español bíblico corriente y evita paraphrasear el nombre/título.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names'
translation_notes:
  revision_awareness: 'Coincide con el griego de Swete y con el criterio auditado del POB en inglés: mantener el imperativo visual, el lenguaje sapiencial de «obras», el título divino «Altísimo» y la imagen de disposición en pares con una posible lectura alternativa de correspondencia.'
  spanish_consistency_notes:
  - Se mantiene «Altísimo» como título divino, en paralelo con el criterio del POB en inglés para «Most High».
  - «Dos por dos» conserva la repetición distributiva del griego sin introducir una idea ajena de simple enumeración.
  - La nota de pie conserva la tensión semántica entre oposición y correspondencia, sin resolverla de manera reductiva.
  - El texto principal usa español moderno y sobrio, evitando calcos innecesarios pero sin ampliar el sentido del original.
