translation:
  language: es
  text: En el día de mi angustia busqué al Señor[a]; mi mano estuvo extendida en la noche y no desfalleció; mi alma se negó a ser consolada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mi mano fluyó en la noche y no se aflojó». La imagen hebrea es difícil; el texto principal adopta el sentido de una mano extendida en oración persistente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּיוֹם
  english_pob_choice: In the day of
  chosen_spanish: En el día de
  alternatives_spanish:
  - En el tiempo de
  - En el día
  lexicon: HALOT
  rationale: La construcción temporal ב + יוֹם se conserva como expresión de tiempo. «En el día de» mantiene el sabor hebreo y sigue siendo natural en español bíblico contemporáneo.
- source_word: צָרָתִי
  english_pob_choice: my distress
  chosen_spanish: mi angustia
  alternatives_spanish:
  - mi aflicción
  - mi tribulación
  - mi dificultad
  lexicon: HALOT
  rationale: צָרָה puede expresar angustia, aflicción o trouble. «Angustia» comunica bien el tono de lamento y la presión interior del contexto poético.
- source_word: אֲדֹנָי
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Señor
  lexicon: HALOT
  rationale: 'Aquí el hebreo es אֲדֹנָי, no el nombre divino YHWH. En español se traduce como título con artículo definido: «el Señor».'
- source_word: דָּרָשְׁתִּי
  english_pob_choice: I sought
  chosen_spanish: busqué
  alternatives_spanish:
  - quise conocer
  - inquirí de
  - busqué al
  lexicon: HALOT
  rationale: דרשׁ en relación con Dios significa «buscar» con sentido de acudir a él. «Busqué» es directo y fiel al giro hebreo.
- source_word: יָדִי
  english_pob_choice: my hand
  chosen_spanish: mi mano
  alternatives_spanish:
  - mi mano derecha
  - mi brazo
  lexicon: HALOT
  rationale: Se preserva el singular del hebreo. «Mano» es la correspondencia natural en español para mantener la imagen corporal de oración insistente.
- source_word: לַיְלָה
  english_pob_choice: in the night
  chosen_spanish: en la noche
  alternatives_spanish:
  - de noche
  - por la noche
  lexicon: HALOT
  rationale: El valor adverbial de tiempo se expresa de forma natural con «en la noche», manteniendo el paralelismo poético.
- source_word: נִגְּרָה
  english_pob_choice: was stretched out
  chosen_spanish: estuvo extendida
  alternatives_spanish:
  - se derramó
  - corrió
  - se vació
  lexicon: HALOT
  rationale: El verbo נגר con «mano» es imaginería difícil. La POB inglesa opta por una mano extendida en oración persistente; «estuvo extendida» refleja esa lectura sin borrar la ambigüedad literal de fluir/ser derramada.
- source_word: וְלֹא תָפוּג
  english_pob_choice: and did not grow numb
  chosen_spanish: y no se relajó
  alternatives_spanish:
  - y no se agotó
  - y no cedió
  - y no se debilitó
  lexicon: HALOT
  rationale: פוג puede significar aflojarse, desfallecer o quedar sin vigor. «No se relajó» comunica la idea de no aflojarse ni ceder, y permite la imagen de una mano mantenida extendida.
- source_word: מֵאֲנָה
  english_pob_choice: refused
  chosen_spanish: se negó
  alternatives_spanish:
  - rehusó
  - no quiso
  lexicon: HALOT
  rationale: מאן expresa rechazo o negativa. «Se negó» es idiomático en español y conserva la fuerza personal del verbo.
- source_word: הִנָּחֵם
  english_pob_choice: to be comforted
  chosen_spanish: a ser consolada
  alternatives_spanish:
  - a ser confortada
  - a recibir consuelo
  lexicon: HALOT
  rationale: El nifal de נחם aquí indica recibir consuelo. En español «ser consolada» es natural; se elige la forma femenina por concordancia con נַפְשִׁי («mi alma»).
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - mi ser
  - mi interior
  - mi vida
  lexicon: HALOT
  rationale: נפשׁ puede ser alma, vida o ser interior. En poesía de lamento, «mi alma» preserva el registro poético y la profundidad personal del hebreo.
theological_decisions:
- issue: Distinción entre אֲדֹנָי y YHWH
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Señor
  rationale: El texto hebreo usa el título אֲדֹנָי, no el Tetragrámaton. Por eso se traduce con un título y no con una forma reservada al nombre divino. No se introduce «Yahvé» porque no aparece en este versículo.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; YHWH rendered as Yahvé only when the source is the divine name'
translation_notes:
  revision_awareness: El audit trail inglés muestra un único punto fuerte de ambigüedad en נִגְּרָה / תָפוּג. Se conserva en español la decisión principal de una mano extendida en oración, pero con una nota que reconoce la alternativa literal de «derramada/derramó» para no borrar la tensión léxica. No hay revisiones posteriores que cambien el sentido base.
  spanish_consistency_notes:
  - Se mantiene «el Señor» para אֲדֹנָי, de acuerdo con la distinción doctrinal entre título y nombre divino.
  - Se usa «mi alma» para נַפְשִׁי, manteniendo el registro poético y la correspondencia con el texto fuente.
  - Se evita introducir «Yahvé» porque el hebreo aquí no contiene el nombre YHWH.
  - La forma «a ser consolada» conserva el infinitivo de pasiva del hebreo y se adapta al español con concordancia femenina implícita con «alma».
