lexical_decisions:
- source_word: אַל תִּטֹּשׁ / Do not abandon
  english_pob_choice: Do not abandon
  chosen_spanish: No abandones
  alternatives_spanish:
  - No dejes
  - No abandones a
  lexicon: sentido contextual del hebreo y del inglés POB
  rationale: El hebreo conservado en el expediente lee una prohibición directa de abandonar; en español, el imperativo negativo de segunda persona singular transmite con naturalidad esa fuerza.
- source_word: אוֹהֵב יָשָׁן / old friend
  english_pob_choice: old friend
  chosen_spanish: un amigo antiguo
  alternatives_spanish:
  - un amigo viejo
  - un amigo de antaño
  lexicon: uso contextual del hebreo
  rationale: ‘Antiguo’ conserva la idea de relación establecida desde hace tiempo sin la posible ambigüedad de ‘viejo’ aplicada a personas.
- source_word: חָדָשׁ / new one
  english_pob_choice: a new one
  chosen_spanish: uno nuevo
  alternatives_spanish:
  - un nuevo amigo
  - uno reciente
  lexicon: uso contextual del hebreo
  rationale: Mantiene el contraste breve del hebreo entre la relación antigua y la nueva, sin añadir especificaciones que el texto no da.
- source_word: לֹא יִדְמֶה לוֹ / will not compare with him
  english_pob_choice: will not compare with him
  chosen_spanish: no se le comparará
  alternatives_spanish:
  - no se le igualará
  - no será comparable con él
  lexicon: uso contextual del hebreo
  rationale: La forma pronominal refleja el valor comparativo de יִדְמֶה לוֹ y suena natural en español; conserva la tensión de superioridad implícita sin exagerarla.
theological_decisions:
- issue: Base textual for Sirach 9:13 given a major mismatch between the Hebrew witness and the Greek parallel
  english_pob_reading: 'The English POB footnote preserves the Hebrew saying: ''Do not abandon an old friend, for a new one will not compare with him,'' while acknowledging the Greek tradition reads a different warning.'
  chosen_spanish_reading: Seguir el testimonio hebreo preservado en el paquete de fuente principal, dejando constancia de que el griego transmite otra sentencia.
  alternative_spanish_readings:
  - 'Seguir el griego: ''Mantente lejos de un hombre que tiene autoridad para matar, y no temas la muerte.'''
  rationale: El expediente de revisión indica que la redacción debe ajustarse al hebreo atestiguado y que el desacuerdo con el griego es importante. Para la publicación española se prioriza la lectura hebrea, pero la conciencia del paralelo griego se mantiene en las decisiones editoriales.
  doctrine_reference: 'PHILOSOPHY.md: en Sirácida, traducir del hebreo donde sobreviva y reconocer honestamente las diferencias con el griego paralelo cuando las haya.'
translation_notes:
  revision_awareness: 'El borrador fue corregido para alinearse con la revisión más reciente: la redacción anterior seguía el griego, pero el expediente final exige la sentencia hebrea atestiguada. Por eso el texto español ahora refleja el hebreo y la nota conserva la alternativa griega como información transparente.'
  spanish_consistency_notes:
  - Usé «amigo antiguo» para evitar el posible matiz despectivo de «viejo» aplicado a una persona.
  - Conservé «no se le comparará» para mantener el valor comparativo sin forzar una paráfrasis.
  - El marcador [a] aparece exactamente en el texto principal y la nota correspondiente queda anclada correctamente.
