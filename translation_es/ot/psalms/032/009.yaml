translation:
  language: es
  text: No sean como el caballo o como la mula, sin entendimiento, cuyos arreos son el freno y la brida para sujetarlos, o de otro modo no se acercarán a ti.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para que no se acerquen a ti». El final del hebreo es difícil y puede entenderse de más de una manera: como que el animal no se acerca sin ser sujetado, o como que se lo sujeta para evitar que se acerque precipitadamente.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תִּהְיוּ
  english_pob_choice: Do not be
  chosen_spanish: No sean
  alternatives_spanish:
  - No lleguen a ser
  - No se comporten como
  lexicon: HALOT
  rationale: La forma prohibitiva con היה se expresa de modo natural en español con una negación directa en presente exhortativo. 'No sean' conserva el valor de mandato y evita una paráfrasis innecesaria.
- source_word: כְּסוּס
  english_pob_choice: like a horse
  chosen_spanish: como el caballo
  alternatives_spanish:
  - como un caballo
  lexicon: HALOT
  rationale: '''Caballo'' es el equivalente natural en español y mantiene la imagen singular colectiva del hebreo.'
- source_word: כְּפֶרֶד
  english_pob_choice: like a mule
  chosen_spanish: como la mula
  alternatives_spanish:
  - como una mula
  lexicon: HALOT
  rationale: '''Mula'' corresponde directamente a פֶרֶד y es el término claro y corriente en español.'
- source_word: אֵין הָבִין
  english_pob_choice: without understanding
  chosen_spanish: sin entendimiento
  alternatives_spanish:
  - sin discernimiento
  - que no entienden
  lexicon: HALOT
  rationale: La construcción negativa describe carencia de entendimiento/discernimiento; 'sin entendimiento' es fiel, idiomático y conserva el tono moral-intellectual.
- source_word: בְּמֶתֶג וָרֶסֶן
  english_pob_choice: bit and bridle
  chosen_spanish: el freno y el cabestro
  alternatives_spanish:
  - el freno y la brida
  - el bocado y el cabestro
  lexicon: HALOT
  rationale: En español, 'freno' y 'cabestro' comunican de manera comprensible el equipo de control animal. 'Cabestro' ayuda a cubrir el campo semántico de רֶסֶן/מֶתֶג sin perder la imagen de sujeción.
- source_word: עֶדְי֣וֹ
  english_pob_choice: whose trappings are
  chosen_spanish: cuyas trillas son
  alternatives_spanish:
  - cuyos aperos son
  - cuyos adornos son
  lexicon: HALOT
  rationale: El contexto de caballos y mulas sugiere arreos/aperos; sin embargo, el hebreo usa un sustantivo de adorno/aderezo aplicado a la montura. 'Trillas' intenta reflejar el conjunto de aparejos, aunque es una solución interpretativa para hacer la frase inteligible en español.
- source_word: לִבְלֹם
  english_pob_choice: to restrain it
  chosen_spanish: para sujetarlos
  alternatives_spanish:
  - para refrenarlos
  - para contenerlos
  lexicon: HALOT
  rationale: El verbo indica restringir o frenar; 'sujetarlos' es claro en español y mantiene el sentido de control mediante el equipo mencionado.
- source_word: בַּל קְרֹב אֵלֶיךָ
  english_pob_choice: or else it will not come near you
  chosen_spanish: o de otro modo no se acercarán a ti
  alternatives_spanish:
  - o no se acercarán a ti
  - de otro modo no se acercará a ti
  lexicon: HALOT
  rationale: La cláusula final es difícil en hebreo. La lectura tomada en inglés POB entiende que sin la sujeción no se acercarán; el español mantiene esa solución y conserva la ambigüedad básica del cierre.
theological_decisions:
- issue: Imagen de reprensión frente a docilidad animal
  english_pob_reading: Do not be like a horse or like a mule, without understanding, whose trappings are bit and bridle to restrain them, or else they will not come near you.
  chosen_spanish_reading: No sean como el caballo o como la mula, sin entendimiento, cuyas trillas son el freno y el cabestro para sujetarlos, o de otro modo no se acercarán a ti.
  alternative_spanish_readings:
  - No sean como el caballo o como la mula, sin entendimiento, cuyo freno y cabestro los sujetan, o de otro modo no se acercarán a ti.
  - No sean como el caballo o como la mula, sin entendimiento; con freno y cabestro se les refrena, o de otro modo no se acercarán a ti.
  rationale: 'El versículo usa una comparación moral: personas que carecen de entendimiento y necesitan control externo. El español conserva la amonestación y la metáfora sin suavizarla a una exhortación más genérica.'
  doctrine_reference: Sabiduría bíblica y corrección moral; no aplica una doctrina dogmática específica.
translation_notes:
  revision_awareness: La redacción española se preparó a partir del hebreo masorético de Salmos 32:9 y del auditoría en inglés POB. Se preservó la dificultad final del hebreo con una nota alternativa, evitando una simplificación que borre la ambigüedad reconocida en el texto fuente. También se mantuvo la comparación singular colectiva entre caballo y mula, y se escogió una formulación española natural para la prohibición y la sujeción animal.
  spanish_consistency_notes:
  - Se usó 'no sean' para reflejar la prohibición hebrea con un español natural y sobrio.
  - '''Caballo'' y ''mula'' reproducen la imaginería animal de manera directa.'
  - '''Freno y cabestro'' comunica el campo semántico del hebreo para aparejos de control, aunque con ajuste idiomático español.'
  - Se mantuvo una nota de pie para el cierre difícil, conforme al audit trail en inglés POB.
  - Se evitó introducir terminología eclesiástica ajena al contexto sapiencial del versículo.
