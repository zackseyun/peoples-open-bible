review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: juicio por דֶּבֶר, pérdida de posesión/herencia por ירשׁ, y la promesa de hacer de Moisés una nación comparativamente mayor y más poderosa. También conserva adecuadamente la nota alternativa para ירשׁ. Sin embargo, «desposeeré» no es la mejor forma verbal en español general para este contexto; «despojaré de su herencia» o «desheredaré» serían más transparentes, y la opción más fiel y natural aquí es «los desheredaré» con nota alternativa. Además, «te convertiré» suena algo interpretativo frente al más directo «haré de ti».'
  spanish_quality_summary: 'El texto es legible y digno, pero puede sonar algo poco natural en dos puntos: «desposeeré» es raro y puede percibirse como tecnicismo o formación poco idiomática; «te convertiré en una nación» funciona, pero «haré de ti una nación» es más bíblico-natural y más cercano a la construcción hebrea. «Más grande y más fuerte» es aceptable; «más grande y más poderosa» refleja mejor עָצוּם en una comparación de naciones.'
  glossary_alignment: No hay conflictos con la terminología del proyecto. No aparece Yahvé en este versículo. «Nación» para גּוֹי es correcto. La decisión sobre los pronombres plurales es aceptable para el español, aunque el hebreo use singular colectivo; no requiere nota adicional.
  issues:
  - severity: medium
    issue: «desposeeré» es poco idiomático en español bíblico común
    rationale: Aunque intenta reflejar 'dispossess', en español general suena técnico o forzado. El verbo hebreo ירשׁ aquí activa con naturalidad «desheredar» en español, con una nota para el matiz de despojo/posesión.
  - severity: low
    issue: «te convertiré» es menos directo que la construcción hebrea
    rationale: וְאֶעֱשֶׂה אֹתְךָ לְ... se vierte más naturalmente como «haré de ti una nación» o «te haré una nación». «Te convertiré» no es incorrecto, pero añade un matiz transformacional menos necesario.
  - severity: low
    issue: «más fuerte» puede sonar algo físico para una nación
    rationale: עָצוּם en este contexto nacional compara poder/fuerza colectiva. «Más poderosa» suena más natural para una nación sin perder el sentido.
  revised_spanish_text: Yo los heriré con la peste y los desheredaré[a], y haré de ti una nación más grande y más poderosa que ellos.
  revised_footnotes:
  - marker: a
    text: 'O: «los despojaré de su herencia» o «los despojaré de su posesión». El verbo hebreo puede expresar quitar la posesión o la herencia.'
    reason: lexical_alternative
  revision_rationale: Se ajusta el texto para mejorar la fidelidad léxica y la naturalidad del español. «Desheredaré» comunica con claridad el matiz de ירשׁ en este contexto y conserva en nota la alternativa de despojo/posesión. «Haré de ti» reproduce más directamente la construcción hebrea, y «más poderosa» encaja mejor con una nación que «más fuerte».
