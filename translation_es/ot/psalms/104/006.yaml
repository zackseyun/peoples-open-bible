translation:
  language: es
  text: La cubriste con el abismo[a] como con un vestido; las aguas se alzaban sobre los montes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «el abismo» traduce תְּהוֹם; también puede entenderse como «las profundidades» o «el abismo primigenio».
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּהוֹם
  english_pob_choice: the deep
  chosen_spanish: el abismo
  alternatives_spanish:
  - las profundidades
  - el océano primigenio
  - la hondura
  lexicon: HALOT
  rationale: תְּהוֹם nombra la masa abisal de las aguas. En español, «el abismo» comunica esa profundidad primordial con fuerza poética y mantiene la amplitud del término sin convertirlo en una explicación interpretativa cerrada. «Las profundidades» es posible, pero pierde algo de la concreción singular del hebreo.
- source_word: כַּ/לְּבוּשׁ
  english_pob_choice: as with a garment
  chosen_spanish: como con un vestido
  alternatives_spanish:
  - como un vestido
  - como con un manto
  - como un atuendo
  lexicon: HALOT
  rationale: La preposición comparativa כ־ pide un símil. «Como con un vestido» conserva el valor comparativo y la idea de cobertura. «Vestido» funciona en español bíblico y poético; «manto» sería más interpretativo.
- source_word: כִּסִּית֑/וֹ
  english_pob_choice: You covered it
  chosen_spanish: Tú cubriste eso
  alternatives_spanish:
  - Él cubrió eso
  - Tú lo cubriste
  - lo cubriste
  lexicon: HALOT
  rationale: La forma verbal hebrea es segunda masculina singular, por lo que se mantiene la dirección al Yahvé del contexto. «Eso» refleja el objeto pronominal sin forzar una identificación explícita que el verso no desarrolla en esta línea. El orden español se ajusta para una lectura natural.
- source_word: עַל
  english_pob_choice: above
  chosen_spanish: sobre
  alternatives_spanish:
  - encima de
  - por encima de
  - sobre y por encima de
  lexicon: HALOT
  rationale: עַל indica ubicación superior con respecto a los montes. «Sobre» es la forma más directa y natural en español para este contexto poético.
- source_word: הָרִים
  english_pob_choice: the mountains
  chosen_spanish: los montes
  alternatives_spanish:
  - las montañas
  - los cerros
  lexicon: HALOT
  rationale: «Montes» reproduce bien el registro poético y el alcance elevado de הָרִים. «Montañas» sería correcto, pero menos bíblico-poético en español.
- source_word: יַעַמְדוּ
  english_pob_choice: stood
  chosen_spanish: estaban
  alternatives_spanish:
  - se mantenían
  - permanecían
  - estuvieron
  lexicon: HALOT
  rationale: עָמַד puede expresar estar de pie, permanecer o mantenerse. En relación con las aguas sobre los montes, «estaban» da una lectura natural del estado descrito; «permanecían» sería más literal pero más pesado. Se conserva la imagen de quietud sin añadir una idea no explícita.
- source_word: מָיִם
  english_pob_choice: the waters
  chosen_spanish: las aguas
  alternatives_spanish:
  - aguas
  - las aguas del abismo
  lexicon: HALOT
  rationale: El plural hebreo y el contexto poético favorecen «las aguas». La traducción mantiene el paralelismo con «el abismo» y suena natural en español.
theological_decisions:
- issue: Segunda persona en el verbo
  english_pob_reading: 'Direct address to God: ''You covered it'''
  chosen_spanish_reading: 'Se mantiene la segunda persona: «Tú cubriste…»'
  alternative_spanish_readings:
  - Él cubrió…
  - Dios cubrió…
  rationale: La morfología hebrea exige segunda persona masculina singular y el contexto inmediato es de alabanza dirigida a Yahvé. Mantener la segunda persona preserva la relación orante del salmo y evita suavizar la sintaxis original.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se tomó en cuenta que el audit trail inglés conserva la segunda persona del verbo y nota la ambigüedad lexical de תְּהוֹם. La versión española mantiene esa decisión de persona y resuelve el término con un equivalente poético y transparente. No se detectaron revisiones posteriores que alteren el sentido base.
  spanish_consistency_notes:
  - Se usa «Yahvé» cuando el contexto habla directamente del Señor del salmo, pero en este versículo no hace falta introducir el nombre explícito.
  - Se preserva el tono poético sin caer en un calco rígido; «como con un vestido» reproduce la comparación del hebreo.
  - «Montes» se eligió por su registro bíblico-poético, coherente con el paralelismo del verso.
