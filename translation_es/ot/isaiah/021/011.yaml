translation:
  language: es
  text: 'Oráculo sobre Dumá[a]: alguien me llama desde Seír: «centinela, ¿qué hay de la noche? centinela[b], ¿qué hay de la noche?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Dumá puede también evocar la palabra hebrea para «silencio», y algunos intérpretes la relacionan con Edom porque la línea siguiente menciona Seír.
    reason: lexical_alternative
  - marker: b
    text: 'O: «¿Cuánto va avanzada la noche?». El hebreo pregunta por el estado o el transcurso de la noche.'
    reason: alternative_reading
lexical_decisions:
- source_word: מַשָּׂא
  english_pob_choice: oracle
  chosen_spanish: oráculo
  alternatives_spanish:
  - carga
  - pronunciamiento
  lexicon: HALOT
  rationale: En encabezamientos proféticos, el hebreo מַשָּׂא introduce un dicho u oráculo profético. «Oráculo» conserva el tono formal y la función introductoria del hebreo, sin arrastrar la imagen más literal pero menos natural de «carga».
- source_word: דּוּמָה
  english_pob_choice: Dumah
  chosen_spanish: Dumá
  alternatives_spanish:
  - silencio
  lexicon: HALOT
  rationale: Se mantiene como nombre propio en la línea principal, porque el formato del encabezamiento favorece una designación geográfica o étnica. Se adapta a la acentuación del español con tilde final por tratarse de palabra aguda terminada en vocal. La posible resonancia con «silencio» queda preservada como alternativa, no absorbida en el texto principal.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: HALOT
  rationale: En español, el clítico «me» ya expresa con naturalidad el movimiento dirigido hacia la primera persona en esta construcción, sin necesidad de una perífrasis más pesada. «A mí» es posible, pero menos fluido en el verso.
- source_word: קֹרֵא
  english_pob_choice: One calls
  chosen_spanish: uno me llama
  alternatives_spanish:
  - alguien me llama
  - me llama
  lexicon: HALOT
  rationale: El participio hebreo es indefinido y no explicita sujeto. «Uno me llama» conserva esa indefinición mejor que un sujeto más concreto, aunque en español suene algo marcado; se prefiere para mantener el valor impersonal que el inglés POB también preserva.
- source_word: מִשֵּׂעִיר
  english_pob_choice: from Seir
  chosen_spanish: desde Seír
  alternatives_spanish:
  - de Seír
  lexicon: HALOT
  rationale: Se translitera el topónimo y se usa «desde» para reflejar el matiz de procedencia del hebreo, manteniendo la procedencia espacial más viva que un simple «de».
- source_word: שֹׁמֵר
  english_pob_choice: Watchman
  chosen_spanish: Centinela
  alternatives_spanish:
  - Vigía
  - Guarda
  lexicon: HALOT
  rationale: «Centinela» comunica bien el vocativo de vigilancia nocturna en español moderno y es suficientemente solemne. Evita la posible ambigüedad de «guarda» y la fuerte marca militar de «vigía» en algunos registros.
- source_word: מַה מִלַּיְלָה / מַה מִלֵּיל
  english_pob_choice: what of the night?
  chosen_spanish: ¿qué hay de la noche?
  alternatives_spanish:
  - ¿cuánto falta de la noche?
  - ¿cómo va la noche?
  lexicon: HALOT
  rationale: La pregunta hebrea es idiomática y pide el estado o progreso de la noche, no solo la identificación del término «noche». «¿Qué hay de la noche?» mantiene la fuerza interrogativa breve y la repetición retórica sin forzar una paráfrasis interpretativa demasiado explícita.
theological_decisions:
- issue: Identidad de Dumah en el encabezamiento
  english_pob_reading: Proper name 'Dumah' in the main text, with a note on possible echo of 'silence' and connection to Seir/Edom
  chosen_spanish_reading: Nombre propio «Dumá» en el texto principal, con nota sobre la posible resonancia con «silencio»
  alternative_spanish_readings:
  - «Silencio» como lectura principal
  - «Edom» en lugar de Dumá
  rationale: El formato del oráculo favorece tratar דּוּמָה como nombre propio, sin resolver de antemano su identificación histórica. La nota permite conservar la tensión lexical con «silencio» y la posible relación con Edom/Seír, en lugar de sustituirla por una interpretación cerrada.
  doctrine_reference: 'Translation philosophy: trasladar títulos como títulos, nombres como nombres, y preservar tensiones interpretativas donde el texto las deja abiertas.'
- issue: Sentido idiomático de la pregunta sobre la noche
  english_pob_reading: '''what of the night?'' as a question about the state or progress of the night'
  chosen_spanish_reading: «¿qué hay de la noche?» como pregunta por el estado o avance de la noche
  alternative_spanish_readings:
  - «¿cuánto falta de la noche?»
  - «¿qué hora de la noche es?»
  rationale: La formulación española conserva la brevedad poética y la repetición del hebreo. Aunque otras paráfrasis explicitan el sentido, «¿qué hay de la noche?» deja abierta la imagen y sigue la auditable decisión del texto base de no convertirla en una frase más explicativa.
  doctrine_reference: 'Principio de equivalencia óptima: mantener la ambigüedad poética cuando es parte del efecto del original.'
translation_notes:
  revision_awareness: El texto sigue de cerca el audit trail inglés y no introduce cambios de revisión adicionales; se mantiene la solución estable para מַשָּׂא, דּוּמָה, el sujeto indefinido de קֹרֵא y la pregunta idiomática sobre la noche.
  spanish_consistency_notes:
  - Se usa «Yahvé» en este registro por norma del proyecto, pero este versículo no contiene el tetragrámaton ni requiere ajuste al respecto.
  - Se translitera Seir como «Seír» para adecuar la acentuación española sin alterar el referente geográfico.
  - Se prefiere «Centinela» de manera consistente para el vocativo שֹׁמֵר.
  - La puntuación reproduce el paralelismo y la repetición retórica del original, con dos preguntas consecutivas dirigidas al mismo vocativo.
