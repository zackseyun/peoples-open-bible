translation:
  language: es
  text: Déjame en paz[a], para que yo los destruya y borre su nombre de debajo de los cielos[b]; y haré de ti una nación más poderosa y más numerosa que ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Déjame solo, y yo los destruiré y borraré su nombre de debajo de los cielos».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «de debajo de los cielos»; la expresión significa ser quitados de la tierra, es decir, de la memoria y existencia humanas.'
    reason: cultural_note
lexical_decisions:
- source_word: הֶרֶף מִמֶּנִּי
  english_pob_choice: Leave me alone
  chosen_spanish: Déjame
  alternatives_spanish:
  - Déjame en paz
  - Apártate de mí
  - Déjame solo
  lexicon: HALOT
  rationale: El imperativo de רפה con מן + pronombre expresa la idea idiomática de cesar o desistir. En español, «Déjame» es natural, directo y conserva el tono urgente del hebreo sin añadir matices ajenos.
- source_word: וְאַשְׁמִידֵם
  english_pob_choice: so that I may destroy them
  chosen_spanish: para que yo los destruya
  alternatives_spanish:
  - y los destruiré
  - y los destruyera
  - para destruirlos
  lexicon: HALOT
  rationale: שׁמד denota destruir o aniquilar. El valor consecutivo/final del waw se expresa bien con «para que», manteniendo el flujo de la frase y la fuerza del juicio sin suavizarla.
- source_word: וְאֶמְחֶה אֶת שְׁמָם
  english_pob_choice: and blot out their name
  chosen_spanish: y borre su nombre
  alternatives_spanish:
  - y borre el recuerdo de su nombre
  - y quite su nombre
  - y elimine su nombre
  lexicon: HALOT
  rationale: מחה en esta construcción alude a borrar/erosionar la memoria o la mención de una persona o pueblo. «Borre su nombre» reproduce esa imagen bíblica de eliminación de memoria de modo claro en español.
- source_word: מִתַּחַת הַשָּׁמָיִם
  english_pob_choice: from under the heavens
  chosen_spanish: de debajo de los cielos
  alternatives_spanish:
  - de debajo de los cielos
  - de debajo del cielo
  - de la tierra
  lexicon: HALOT
  rationale: El hebreo es literalmente plural («los cielos»). Se conserva la forma plural en español para reflejar mejor el texto fuente, manteniendo a la vez una expresión inteligible.
- source_word: וְאֶעֱשֶׂה אֹתְךָ לְגוֹי
  english_pob_choice: and I will make you into a nation
  chosen_spanish: y a ti te haré un pueblo
  alternatives_spanish:
  - y te haré una nación
  - y te convertiré en un pueblo
  - y haré de ti un pueblo
  lexicon: HALOT
  rationale: עָשָׂה + objeto + ל expresa transformación en algo. «Haré un pueblo» conserva la idea de constitución/formación; «a ti te haré» mantiene el contraste enfático con los demás.
- source_word: עָצ֥וּם וָרָב
  english_pob_choice: mightier and more numerous
  chosen_spanish: grande y más numeroso
  alternatives_spanish:
  - poderoso y más numeroso
  - más fuerte y más numeroso
  - grande y abundante
  lexicon: HALOT
  rationale: עָצוּם y רָב aquí describen magnitud y cantidad en paralelo con la comparación implícita. «Grande y más numeroso» transmite la doble idea de tamaño/masa y número con un español natural; se evita forzar un comparativo donde el hebreo no lo marca en el primer término.
- source_word: מִמֶּנּוּ
  english_pob_choice: than they are
  chosen_spanish: que ellos
  alternatives_spanish:
  - que ese pueblo
  - que ellos son
  - que aquella nación
  lexicon: HALOT
  rationale: El sufijo singular puede referirse colectivamente al pueblo. En español, el comparativo «más numeroso que ellos» comunica la relación sin sobrecargar la frase ni alterar el referente colectivo.
theological_decisions:
- issue: Declaración divina de juicio y promesa de formar un nuevo pueblo a partir de Moisés
  english_pob_reading: Render the statement straightforwardly as a real declaration within the narrative, without softening the threat or importing later theological explanations about testing Moses.
  chosen_spanish_reading: Traducir la declaración con toda su fuerza narrativa, sin atenuar la amenaza ni convertirla en una explicación interpretativa.
  alternative_spanish_readings:
  - Tratar la frase como una mera hipérbole sin valor declarativo
  - Suavizar el juicio para armonizarlo con lecturas teológicas posteriores
  rationale: El hebreo presenta discurso directo de Yahvé con juicio real y una oferta concreta. La traducción debe preservar esa tensión narrativa y no resolverla en el texto principal.
  doctrine_reference: Preservar la tensión teológica sin resolverla en la traducción principal.
translation_notes:
  revision_awareness: 'El borrador sigue el pasaje hebreo con alta concordancia con el audit trail en inglés: conserva el imperativo idiomático, el consecutivo final de la destrucción, la imagen de borrar el nombre y el plural «los cielos», sin introducir glosas doctrinales en el cuerpo principal.'
  spanish_consistency_notes:
  - Se prefirió «Déjame» por naturalidad y fidelidad idiomática al imperativo hebreo.
  - Se mantuvo «los cielos» para reflejar el plural del hebreo, aunque el español común suele usar «cielo» en singular.
  - Se usó «nombre» en singular para reproducir el idiomático hebreo sobre la eliminación de memoria y reputación.
  - «Pueblo» se eligió sobre «nación» para un español bíblico amplio y claro, sin perder la idea de colectividad.
  - La comparación final se expresó con «más numeroso que ellos» para mantener el referente colectivo del sufijo hebreo.
