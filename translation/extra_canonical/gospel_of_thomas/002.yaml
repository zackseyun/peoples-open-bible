greek_overlap_decision:
  witness: poxy654_greek
  agreement: substantive_divergence
  chosen_basis: coptic
  rationale: 'POxy 654 (Sayings 1–7) reconstructs: ‘…when he finds, he will be astounded,
    and having been astounded, he will reign, and having reigned, he will rest.’ The
    Coptic instead has two distinct steps—‘he will be disturbed’ then ‘he will marvel’—and
    lacks any final ‘he will rest.’ Translating from the Coptic base, we retain its
    twofold sequence and do not add ‘rest.’ The divergence may reflect either redactional
    variation or loss in transmission, but we privilege the extant Coptic reading
    while noting the Greek form.'
synoptic_parallel_check:
  parallels:
  - Matt 7:7–8; Luke 11:9–10 (seek and you will find)
  handling: context_only
  rationale: Only the opening motif echoes Synoptic phrasing; the subsequent ‘disturbed
    → marvel → reign (→ rest in Greek)’ sequence is distinctively Thomasine. We avoided
    harmonizing to canonical cadence.
revision_risk_note: 'Key review points: (1) lexical choice ‘be disturbed’ for ϣⲧⲟⲣⲧⲣ
  versus ‘be astonished’; (2) decision to omit the final ‘rest’ following the Coptic
  witness despite its presence in POxy 654; (3) rendering ⲉⲣⲉ ⲛⲧⲟϥ ϣⲓⲛⲉ as ‘keep seeking’—verify
  this does not over-interpret the aspect; (4) capitalizing ‘All’ to signal Thomasine
  idiom.'
