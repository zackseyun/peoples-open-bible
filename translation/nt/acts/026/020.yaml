id: ACT.26.20
reference: Acts 26:20
source:
  edition: SBLGNT
  text: ἀλλὰ τοῖς ἐν Δαμασκῷ πρῶτόν ⸀τε καὶ Ἱεροσολύμοις, ⸀πᾶσάν τε τὴν χώραν τῆς Ἰουδαίας, καὶ τοῖς ἔθνεσιν ⸀ἀπήγγελλον μετανοεῖν καὶ ἐπιστρέφειν ἐπὶ τὸν θεόν, ἄξια τῆς μετανοίας ἔργα πράσσοντας.
translation:
  text: but first to those in Damascus[a], then also in Jerusalem, and throughout all the region of Judea, and to the Gentiles, I proclaimed that they should repent and turn to God[b], doing works worthy of repentance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the nations.' Here the term refers to non-Jewish peoples, so 'Gentiles' is used in the main text.
    reason: lexical_alternative
  - marker: b
    text: Or 'deeds worthy of repentance' or 'works fitting repentance.' The phrase refers to actions that appropriately accompany repentance.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  chosen: but
  alternatives:
  - rather
  - instead
  lexicon: BDAG
  rationale: Marks contrast with the preceding denial of disobedience; 'but' is the natural English adversative here.
- source_word: τοῖς ἐν Δαμασκῷ
  chosen: to those in Damascus
  alternatives:
  - to the people in Damascus
  lexicon: BDAG
  rationale: The dative plural with ἐν + place refers to the people located there. 'Those in Damascus' is concise and preserves the indirect-object force with ἀπήγγελλον.
- source_word: πρῶτόν τε καὶ Ἱεροσολύμοις
  chosen: first ... then also in Jerusalem
  alternatives:
  - first both in Damascus and in Jerusalem
  - first to Damascus and Jerusalem
  lexicon: BDAG
  rationale: 'The sequence πρῶτον ... τε καὶ naturally marks order and addition. English requires smoothing: Paul first proclaimed in Damascus, then also in Jerusalem. This avoids the awkward impression that ''first'' modifies both locations equally.'
- source_word: πᾶσάν τε τὴν χώραν τῆς Ἰουδαίας
  chosen: throughout all the region of Judea
  alternatives:
  - in all the country of Judea
  - throughout the whole countryside of Judea
  lexicon: BDAG
  rationale: χώρα can mean region, country, or countryside. 'Region' is broad and natural in modern English, fitting the geographic sense without over-specifying rural areas.
- source_word: τοῖς ἔθνεσιν
  chosen: to the Gentiles
  alternatives:
  - to the nations
  lexicon: BDAG
  rationale: In Acts, ἔθνη in contrast to Judea/Jerusalem commonly refers to non-Jews. 'Gentiles' best conveys the ethnic-religious contrast in context.
- source_word: ἀπήγγελλον
  chosen: I proclaimed
  alternatives:
  - I reported
  - I announced
  - I declared
  lexicon: BDAG
  rationale: Though ἀπαγγέλλω can mean report or announce, in this missionary context 'proclaimed' captures public heralding without becoming overly formal.
- source_word: μετανοεῖν
  chosen: change their thinking
  alternatives:
  - change their minds
  - turn in repentance
  lexicon: BDAG
  rationale: μετανοέω in this context denotes repentance before God, not merely mental reconsideration. 'Repent' is the standard and theologically weighty rendering.
- source_word: ἐπιστρέφειν ἐπὶ τὸν θεόν
  chosen: turn to God
  alternatives:
  - return to God
  - turn toward God
  lexicon: BDAG
  rationale: ἐπιστρέφω with ἐπί + accusative expresses turning toward/in the direction of God, idiomatically 'turn to God.' 'Return' could imply prior covenant membership, which would be too narrow given the inclusion of Gentiles.
- source_word: ἄξια τῆς μετανοίας ἔργα
  chosen: works worthy of that change
  alternatives:
  - deeds worthy of repentance
  - works fitting repentance
  lexicon: BDAG
  rationale: ἄξια means worthy/fitting; ἔργα are works/deeds. 'Works worthy of repentance' preserves the close lexical relation and moral evidential sense.
- source_word: πράσσοντας
  chosen: doing
  alternatives:
  - practicing
  - performing
  lexicon: BDAG
  rationale: Present participle expressing the manner or accompanying evidence of repentance and turning. 'Doing' is natural English and keeps the ongoing practical sense.
