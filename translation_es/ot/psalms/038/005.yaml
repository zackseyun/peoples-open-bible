translation:
  language: es
  text: Porque mis iniquidades[a] han sobrepasado mi cabeza; como una pesada carga, son demasiado pesadas para mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi culpa»; la palabra hebrea puede denotar tanto la iniquidad como la culpa que resulta de ella.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón o fundamento de la lamentación. «Porque» conserva el valor explicativo de כִּי y suena natural en español poético sin añadir una causalidad más fuerte de la que exige el hebreo.
- source_word: עֲוֺנֹתַי
  english_pob_choice: my iniquities
  chosen_spanish: mis iniquidades
  alternatives_spanish:
  - mis pecados
  - mi culpa
  lexicon: HALOT
  rationale: עוֹן puede abarcar iniquidad, culpa o la carga derivada del pecado. «Iniquidades» preserva el peso moral de los actos y mantiene la tensión semántica que el POB inglés documenta con la nota alternativa «my guilt».
- source_word: עָבְרוּ רֹאשִׁי
  english_pob_choice: have gone over my head
  chosen_spanish: han pasado sobre mi cabeza
  alternatives_spanish:
  - han sobrepasado mi cabeza
  - me han sobrepasado
  lexicon: HALOT
  rationale: La imagen concreta se conserva de manera directa en español. «Han pasado sobre mi cabeza» mantiene la metáfora de desbordamiento o abrumamiento sin convertirla en una paráfrasis abstracta.
- source_word: כְּמַשָּׂא
  english_pob_choice: like a burden
  chosen_spanish: como una pesada carga
  alternatives_spanish:
  - como un peso
  - como un fardo
  lexicon: HALOT
  rationale: מַשָּׂא es una carga o peso. «Pesada carga» transmite bien la imagen y prepara la repetición del campo semántico de «pesadas» en la línea siguiente.
- source_word: כָבֵד
  english_pob_choice: heavy
  chosen_spanish: pesada
  alternatives_spanish:
  - grave
  - de gran peso
  lexicon: HALOT
  rationale: El adjetivo refuerza la idea física de peso. En español, «pesada» conserva la concordancia natural con «carga» y mantiene el paralelismo con el verbo siguiente.
- source_word: יִכְבְּד֥וּ מִמֶּנִּי
  english_pob_choice: they are too heavy for me
  chosen_spanish: son demasiado pesadas para mí
  alternatives_spanish:
  - me pesan demasiado
  - son más pesadas que yo puedo soportar
  lexicon: HALOT
  rationale: El hebreo continúa la metáfora de peso y añade comparación. «Son demasiado pesadas para mí» mantiene el sentido relacional de מִן y la progresión poética sin perder claridad en español.
theological_decisions:
- issue: Rango semántico de עָוֹן en un contexto penitencial
  english_pob_reading: Rendered as 'iniquities' referring primarily to the psalmist's moral offenses
  chosen_spanish_reading: «Iniquidades» como referencia principal a los actos ofensivos del salmista, sin excluir la culpa resultante
  alternative_spanish_readings:
  - «culpa» enfatizando la responsabilidad o el estado derivado
  - «pecados» con un tono más general
  rationale: El hebreo admite tanto las faltas como la culpa que producen. La traducción principal sigue la línea del POB inglés y conserva el foco en las ofensas, mientras que la nota permite la alternativa semántica sin resolverla artificialmente.
  doctrine_reference: Preservar la tensión léxica documentada; no simplificar el término a un solo matiz cuando el hebreo lo amplía.
translation_notes:
  revision_awareness: El pasaje fue revisado en la fuente inglesa más reciente sin cambios sustanciales; el consenso de revisión mantiene la lectura optimizada y no requiere ajuste adicional en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» por norma del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se conserva «iniquidades» para alinearse con el valor moral del hebreo y con la decisión inglesa documentada.
  - 'La metáfora del peso se mantiene coherente en toda la línea: «carga / pesadas / pesadas para mí».'
  - La nota a pie preserva la alternativa semántica relevante sin introducir glosas doctrinales adicionales.
