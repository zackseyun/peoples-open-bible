revisions:
- from: Benaía, hijo de Joyadá, estaba sobre los quereteos y los peleteos, y los hijos de David eran sacerdotes.[a]
  to: Benaía, hijo de Joyadá, estaba a cargo de los quereteos y los peleteos, y los hijos de David eran sacerdotes.[a]
  rationale: Se hace una corrección menor de naturalidad en español («estaba a cargo de» en vez de «estaba sobre») y se pule la redacción de la nota, manteniendo intactas las decisiones léxicas y teológicas del POB.
