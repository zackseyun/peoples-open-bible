translation:
  language: es
  text: La rectitud de mi corazón está en mis palabras, y mis labios expresan conocimiento claramente[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mis labios pronuncian conocimiento puro» o «mis labios hablan con claridad lo que conocen». El término hebreo traducido «claramente» también puede sugerir pureza o llaneza.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֹשֶׁר
  english_pob_choice: uprightness
  chosen_spanish: rectitud
  alternatives_spanish:
  - integridad
  - rectitud moral
  lexicon: HALOT
  rationale: El hebreo denota rectitud o lo enderezado en sentido moral. «Rectitud» comunica bien la cualidad ética de la afirmación de Eliú y suena natural en español bíblico contemporáneo.
- source_word: לִבִּי
  english_pob_choice: my heart
  chosen_spanish: mi corazón
  alternatives_spanish:
  - mi mente
  - mi interior
  lexicon: HALOT
  rationale: Se conserva el antropologismo hebreo «corazón» para el centro interior de pensamiento y voluntad, en paralelo con el uso poético del versículo.
- source_word: אֲמָרַי
  english_pob_choice: my words
  chosen_spanish: mis palabras
  alternatives_spanish:
  - mis dichos
  - lo que digo
  lexicon: HALOT
  rationale: El plural apunta a las expresiones o dichos de Eliú. «Mis palabras» es el equivalente directo y mantiene la concreción del hebreo.
- source_word: וְדַעַת
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - entendimiento
  - saber
  lexicon: HALOT
  rationale: «Conocimiento» refleja de manera directa el sustantivo y conserva la idea de contenido verdadero e informado en la segunda cola del paralelismo.
- source_word: שְׂפָתַי
  english_pob_choice: my lips
  chosen_spanish: mis labios
  alternatives_spanish:
  - mi boca
  - yo
  lexicon: HALOT
  rationale: Se retiene la metonimia corporal del hebreo. «Mis labios» preserva el paralelismo poético con «mi corazón» y evita aplanar la imagen.
- source_word: בָּרוּר
  english_pob_choice: clearly
  chosen_spanish: claramente
  alternatives_spanish:
  - pura
  - con claridad
  lexicon: HALOT
  rationale: El término puede expresar claridad, pureza o lo manifiesto. En español, «claramente» reproduce mejor el valor adverbial del contexto, sin eliminar la posible resonancia de pureza que queda en nota.
- source_word: מִלֵּלוּ
  english_pob_choice: speak
  chosen_spanish: hablan
  alternatives_spanish:
  - pronuncian
  - dicen
  lexicon: HALOT
  rationale: El verbo significa hablar/decir y, en este enunciado gnómico, puede vertirse en presente para reflejar la afirmación inmediata de Eliú. «Hablan» mantiene el sujeto metonímico «mis labios».
translation_notes:
  revision_awareness: La redacción sigue de cerca la sintaxis hebrea, como en la revisión inglesa que mantuvo la rectitud del corazón como sujeto implícito de la relación con las palabras. Se evitó introducir ideas de procedencia («provienen de») que el texto no expresa. La ambigüedad de בָּרוּר se conserva en nota como claridad/pureza.
  spanish_consistency_notes:
  - Se usó «corazón» para לֵב con valor antropológico amplio, coherente con el uso bíblico.
  - Se prefirió «conocimiento» en lugar de «entendimiento» para conservar el sustantivo concreto del paralelo.
  - Se mantuvo la metonimia «labios» para no reemplazarla por una paráfrasis más abstracta.
  - No se empleó «SEÑOR» ni terminología tradicional no presente en el versículo.
