revisions:
- from: la bendición[a], si escuchan los mandamientos de Yahvé, su Dios[b], que yo les estoy mandando hoy.
  to: la bendición[a], si prestan oído a los mandamientos de Yahvé su Dios[b], que yo les estoy mandando hoy.
  rationale: Se revisa 'escuchan los mandamientos' a 'prestan oído a los mandamientos' para preservar la decisión del POB inglés de no convertir el verbo principal en 'obedecer', pero con una expresión española más natural y fiel al matiz de oír atentamente con obediencia implicada. También se elimina la coma en 'Yahvé su Dios' para mejorar la fluidez y ajustarse mejor al sintagma posesivo en español.
