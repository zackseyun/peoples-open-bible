review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el rastro del POB inglés en los puntos principales: conserva ''subieron'' para וַיַּעַל, expresa el sentido militar de וַיִּפְשְׁטוּ con ''hicieron incursiones'', mantiene los tres etnónimos, el demostrativo en כִּי הֵנָּה, el valor temporal de מֵעוֹלָם y el límite geográfico hasta Egipto. Sin embargo, ''al ir tú a Shur'' suena innecesariamente marcado en español y no es la mejor manera de reflejar la fórmula geográfica convencional; además, la nota [b] no corresponde bien al lugar donde está anclada ni aporta una alternativa realmente distinta del texto principal.'
  spanish_quality_summary: El texto es generalmente claro y digno, pero requiere un ajuste menor para mayor naturalidad y legibilidad eclesial. 'Entonces David y sus hombres subieron e hicieron incursiones...' funciona bien. Los etnónimos son legibles, aunque 'gesureos' puede resultar menos común que 'guesureos'; no es un error suficiente para exigir cambio. El principal problema de estilo es 'al ir tú a Shur', que introduce un 'tú' enfático poco natural en una descripción territorial. También conviene revisar la nota [b] para que preserve la alternativa del inglés ('hasta/as far as') frente al texto principal revisado.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen Yahvé, Mesías, Espíritu, etc. Los etnónimos y la geografía están tratados de forma consistente con el POB inglés. La decisión de mantener 'girzitas' con nota alternativa es apropiada dada la incertidumbre textual/tradicional.
  issues:
  - severity: medium
    issue: La expresión 'al ir tú a Shur' es poco natural en español.
    rationale: Aunque el hebreo tiene sufijo de 2ms, en español una fórmula geográfica como בּוֹאֲךָ שׁוּרָה se entiende mejor como 'camino a Shur' o 'cuando se va hacia Shur'. Mantener 'tú' vuelve la frase rígida sin añadir fidelidad real.
  - severity: medium
    issue: La nota [b] no está bien calibrada respecto del texto español.
    rationale: El texto principal ya dice 'hasta la tierra de Egipto', de modo que la nota 'O “hasta la tierra de Egipto”' no ofrece alternativa. Debe reflejar la otra posibilidad preservada en inglés, idealmente contrastando con una redacción principal como 'camino a Shur, hasta la tierra de Egipto'.
  revised_spanish_text: Entonces David y sus hombres subieron e hicieron incursiones contra los gesureos[a], los girzitas y los amalecitas, porque estos eran los habitantes de la tierra desde tiempos antiguos, camino a Shur[b], hasta la tierra de Egipto.
  revised_footnotes:
  - marker: a
    text: O “los gezritas”. El etnónimo hebreo aquí es textualmente incierto en la tradición de transliteración; esta versión sigue la forma consonántica representada en el texto dado como “girzitas”.
    reason: lexical_alternative
  - marker: b
    text: O “al ir a Shur”.
    reason: lexical_alternative
  revision_rationale: Se hace una reparación menor para mejorar la naturalidad del español sin perder el sentido del hebreo ni el rastro del POB inglés. 'Camino a Shur' expresa mejor la fórmula geográfica convencional que 'al ir tú a Shur'. La nota [b] se corrige para ofrecer una alternativa real vinculada a esa frase, en vez de repetir 'hasta la tierra de Egipto'.
