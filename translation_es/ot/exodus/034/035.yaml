base_translation:
  language: en
  yaml_path: translation/ot/exodus/034/035.yaml
  text: And the sons of Israel saw Moses’ face[a], that the skin of Moses’ face shone[c][b]; and Moses would put the veil back over his face until he went in to speak with him.
  footnotes:
  - marker: a
    text: Hebrew 'the sons of Israel'; also commonly rendered 'the Israelites.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew verb means 'shone' or 'sent out rays'; the traditional rendering 'was horned' reflects an old misunderstanding of the term.
    reason: lexical_alternative
  - marker: c
    text: '''With him'' refers to the LORD from the immediate context.'
    reason: cross_reference
