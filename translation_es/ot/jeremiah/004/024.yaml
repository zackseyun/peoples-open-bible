translation:
  language: es
  text: Miré las montañas[a], y he aquí, temblaban, y todas las colinas[b] fueron sacudidas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Vi las montañas; y he aquí, temblaban». También puede traducirse «los montes», pero «montañas» expresa con más claridad la distinción con «colinas».
    reason: lexical_alternative
  - marker: b
    text: «Colinas» traduce גְּבָעוֹת de modo distinto de «montañas», para mantener el paralelismo y la gradación topográfica del hebreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאִיתִי
  english_pob_choice: I looked
  chosen_spanish: Miré
  alternatives_spanish:
  - Vi
  lexicon: HALOT
  rationale: El hebreo es perfecto qal de ראה; en esta secuencia profética la idea es percepción directa y contemplativa. «Miré» conserva el matiz de observación del inglés POB y suena natural en español.
- source_word: הֶהָרִים
  english_pob_choice: the mountains
  chosen_spanish: los montes
  alternatives_spanish:
  - las montañas
  lexicon: HALOT
  rationale: הָרִים suele referirse a montes/montañas. «Montes» mantiene la distinción con גְּבָעוֹת, que se vierte como «colinas»; así se conserva el paralelismo topográfico del hebreo.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y he aquí que
  lexicon: HALOT
  rationale: Es un marcador discursivo de atención súbita. «Y he aquí» es la fórmula española más fiel y solemne para ese golpe de visión profética.
- source_word: רֹעֲשִׁים
  english_pob_choice: quaking
  chosen_spanish: temblaban
  alternatives_spanish:
  - estremecían
  - vibraban
  lexicon: HALOT
  rationale: El participio expresa sacudida violenta, a menudo sísmica. «Temblaban» conserva la imagen dinámica sin volver la frase forzada en español.
- source_word: הַגְּבָעוֹת
  english_pob_choice: the hills
  chosen_spanish: las colinas
  alternatives_spanish:
  - los cerros
  lexicon: HALOT
  rationale: גְּבָעוֹת designa elevaciones menores que הָרִים. «Colinas» preserva el contraste con «montes» y resulta claro para el lector español.
- source_word: הִתְקַלְקָלוּ
  english_pob_choice: were shaken
  chosen_spanish: fueron sacudidas
  alternatives_spanish:
  - estaban sacudiéndose
  - se tambalearon
  - fueron trastornadas
  lexicon: HALOT
  rationale: La forma verbal comunica una pasividad/resultatividad de ser violentamente afectadas. «Fueron sacudidas» sigue de cerca el sentido del pasivo reflejado en la revisión inglesa, sin perder naturalidad.
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió el final de «were shaking» a «were shaken» para reflejar mejor el sentido pasivo del hebreo. El español adopta ese ajuste con «fueron sacudidas».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque no aparece en el texto hebreo de esta unidad.
  - Se prefirió un registro bíblico sobrio y moderno, evitando calcos excesivamente literales cuando el español natural exige una forma más idiomática.
  - 'Se conservaron dos pares topográficos distintos: «montes»/«colinas», para reflejar הָרִים/גְּבָעוֹת.'
