translation:
  language: es
  text: Yo sanaré su apostasía; los amaré libremente, porque mi ira se ha apartado de él[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «de él»; algunas traducciones suavizan el cambio de número a «de ellos».
    reason: alternative_reading
lexical_decisions:
- source_word: אֶרְפָּא
  english_pob_choice: I will heal
  chosen_spanish: Yo sanaré
  alternatives_spanish:
  - Yo curaré
  - Yo restauraré
  lexicon: HALOT
  rationale: רפא en qal expresa sanar o curar. «Sanaré» es natural en español y conserva la imagen de restauración sin añadir explicación ajena al texto.
- source_word: מְשׁוּבָתָם
  english_pob_choice: their apostasy
  chosen_spanish: su apostasía
  alternatives_spanish:
  - su rebelión
  - su apartamiento
  lexicon: HALOT
  rationale: מְשׁוּבָה denota apartarse, infidelidad o apostasía. «Apostasía» comunica con claridad el sentido pactual y la gravedad del alejamiento en Oseas.
- source_word: אֹהֲבֵם
  english_pob_choice: I will love them
  chosen_spanish: los amaré
  alternatives_spanish:
  - los amaré con amor
  - les mostraré amor
  lexicon: HALOT
  rationale: אהב significa «amar». En español, el objeto directo plural «los» refleja con naturalidad el sufijo plural y el verbo simple mantiene fidelidad al enunciado.
- source_word: נְדָבָה
  english_pob_choice: freely
  chosen_spanish: de buena voluntad
  alternatives_spanish:
  - libremente
  - voluntariamente
  - como don gratuito
  lexicon: HALOT
  rationale: נְדָבָה tiene el valor de voluntariedad, ofrenda libre o disposición espontánea. «De buena voluntad» comunica en español una acción no forzada y benevolente, sin sonar mecánico.
- source_word: שָׁב
  english_pob_choice: has turned away
  chosen_spanish: se ha apartado
  alternatives_spanish:
  - ha retrocedido
  - se ha retirado
  lexicon: HALOT
  rationale: שׁוּב aquí describe el cambio o alejamiento de la ira divina. «Se ha apartado» conserva la idea idiomática de retirada y es más natural en español que una traducción literal rígida.
- source_word: אַפִּי
  english_pob_choice: my anger
  chosen_spanish: mi ira
  alternatives_spanish:
  - mi enojo
  - mi furor
  lexicon: HALOT
  rationale: אַף es literalmente «nariz» y por extensión «ira». «Ira» expresa el sentido idiomático con el nivel adecuado de solemnidad y fuerza.
- source_word: מִמֶּנּוּ
  english_pob_choice: from them
  chosen_spanish: de ellos
  alternatives_spanish:
  - de él
  lexicon: HALOT
  rationale: Aunque la forma consonántica puede reflejar un sufijo singular masculino, el contexto inmediato y la revisión auditada favorecen un referente plural. «De ellos» preserva la lectura revisada y evita una discordancia innecesaria en español.
theological_decisions:
- issue: Tensión de número en el pronombre final
  english_pob_reading: The audit trail initially preserved the singular 'from him' but the latest revision changed it to 'from them' to match the plural antecedent.
  chosen_spanish_reading: «de ellos»
  alternative_spanish_readings:
  - «de él»
  rationale: En español, la lectura plural encaja con los antecedentes plurales del verso y sigue la revisión más reciente del expediente. La alternativa singular se reconoce como posibilidad textual, pero no se adopta en el texto principal porque produciría una tensión no resuelta para el lector español.
  doctrine_reference: Principio de primacía del hebreo y coherencia textual en la traducción
- issue: Valor de נְדָבָה aplicado al amor divino
  english_pob_reading: I will love them freely
  chosen_spanish_reading: los amaré de buena voluntad
  alternative_spanish_readings:
  - los amaré libremente
  - los amaré voluntariamente
  rationale: La expresión debe comunicar que el amor de Yahvé no está forzado ni condicionado por mérito previo. «De buena voluntad» conserva esa gratuidad relacional sin introducir una idea ajena al hebreo.
  doctrine_reference: Teología bíblica del amor gratuito de Yahvé
translation_notes:
  revision_awareness: 'El expediente inglés muestra una revisión reciente que corrigió el pronombre final de singular a plural para concordar con el antecedente plural. La redacción española sigue esa decisión revisada y conserva el resto de las equivalencias léxicas principales: sanar/апostasía/amar de modo voluntario/ira apartada.'
  spanish_consistency_notes:
  - Se mantiene el nombre divino Yahvé donde corresponda en el proyecto, pero en este versículo el texto hebreo usa un pronombre posesivo implícito en la primera persona («mi ira»), no el tetragrámaton explícito.
  - «Apostasía» se usa por su transparencia semántica y por conservar el matiz de ruptura de pacto.
  - No se suaviza la clausula final a una formulación impersonal; se conserva el referente plural auditado en la revisión más reciente.
