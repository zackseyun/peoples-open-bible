- from: Él fundó la tierra sobre sus cimientos[a]; no será sacudida jamás y para siempre.
  to: Él fundó la tierra sobre sus cimientos[a]; no será sacudida por siempre y para siempre.
  rationale: Se conserva la traducción principal del verso y la nota léxica, pero se corrige la expresión final para reflejar con mayor fidelidad e idiomaticidad el sentido intensificado de עוֹלָם וָעֶד. «Por siempre y para siempre» reproduce mejor la duración enfática que «jamás y para siempre».
