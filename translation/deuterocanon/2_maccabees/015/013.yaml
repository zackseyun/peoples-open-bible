theological_decisions:
- issue: Nature of the visionary figure's description
  chosen_reading: Rendered the language phenomenologically as an appearance of a dignified man, without identifying him in the verse itself.
  alternative_readings:
  - Interpreting the description more explicitly as a heavenly or glorified figure
  rationale: The Greek in this verse describes appearance, age-marked dignity, and surrounding grandeur, but does not itself name the figure. The translation preserves the text's restraint and does not import identification from surrounding verses into this line.
  doctrine_reference: Preserve theological tension rather than resolve it.
