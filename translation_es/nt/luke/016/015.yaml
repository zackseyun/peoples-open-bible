translation:
  language: es
  text: 'Y les dijo[a]: «Ustedes son los que se justifican delante de los hombres, pero Dios conoce sus corazones. Porque lo que es exaltado entre los hombres[b] es detestable delante de Dios[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ante la gente»; el griego dice literalmente «delante de los hombres», con un término genérico para los seres humanos.
    reason: lexical_alternative
  - marker: b
    text: O «lo que es altamente estimado entre los hombres».
    reason: alternative_reading
  - marker: c
    text: O «una abominación delante de Dios».
    reason: lexical_alternative
lexical_decisions:
- source_word: δικαιοῦντες
  english_pob_choice: justify
  chosen_spanish: se justifican
  alternatives_spanish:
  - se declaran justos
  - se vindican
  lexicon: BDAG
  rationale: El participio presente con objeto reflexivo expresa aquí la acción de presentarse como justos o reivindicados. «Se justifican» conserva el vínculo léxico con δικαιόω y suena natural en español bíblico sin ampliar indebidamente el sentido.
- source_word: ἐνώπιον τῶν ἀνθρώπων
  english_pob_choice: before men
  chosen_spanish: delante de los hombres
  alternatives_spanish:
  - ante la gente
  - a la vista de los hombres
  lexicon: BDAG
  rationale: ἐνώπιον significa «delante de / en presencia de». «Delante de los hombres» mantiene la forma de contraste con la evaluación divina y conserva el matiz generérico humano del griego, usando un español claro y solemne.
- source_word: γινώσκει τὰς καρδίας ὑμῶν
  english_pob_choice: knows your hearts
  chosen_spanish: conoce sus corazones
  alternatives_spanish:
  - conoce sus interioridades
  - conoce sus corazones a fondo
  lexicon: BDAG
  rationale: «Conoce sus corazones» reproduce la antropología bíblica de «corazón» como centro de motivos, pensamiento y voluntad. «Conoce» es preferible a una expansión explicativa; el pronombre de cortesía no corresponde aquí, porque el texto se dirige a un grupo.
- source_word: τὸ ἐν ἀνθρώποις ὑψηλὸν
  english_pob_choice: what is exalted among men
  chosen_spanish: lo que es exaltado entre los hombres
  alternatives_spanish:
  - lo que es muy estimado entre los hombres
  - la cosa elevada entre los hombres
  lexicon: BDAG
  rationale: 'El neutro articular funciona sustantivamente: «la cosa/lo que es alto o exaltado entre los hombres». «Lo que es exaltado» preserva la metáfora de altura y no reduce el sentido a mera valoración social; la alternativa interpretativa se deja implícita sin imponerla en el texto principal.'
- source_word: βδέλυγμα
  english_pob_choice: detestable
  chosen_spanish: detestable
  alternatives_spanish:
  - abominación
  - abominable
  lexicon: BDAG
  rationale: βδέλυγμα denota algo aborrecible o repugnante ante Dios. «Detestable» es fuerte, natural y fiel; «abominación» queda como alternativa formal más tradicional, pero en español actual puede sonar más pesada o eclesiástica de lo necesario.
- source_word: ἐνώπιον τοῦ θεοῦ
  english_pob_choice: before God
  chosen_spanish: delante de Dios
  alternatives_spanish:
  - ante Dios
  - a la vista de Dios
  lexicon: BDAG
  rationale: Se mantiene la misma preposición espacial-relacional que en la primera cláusula para conservar el contraste entre la evaluación humana y la divina. «Delante de Dios» es idiomático y paralelo a «delante de los hombres».
theological_decisions:
- issue: Uso genérico de ἀνθρώπων
  english_pob_reading: men
  chosen_spanish_reading: los hombres
  alternative_spanish_readings:
  - la gente
  - las personas
  - los seres humanos
  rationale: El griego usa ἀνθρώπων en sentido genérico para el contraste entre juicio humano y juicio divino. Se conserva «los hombres» por fidelidad al registro del texto y para mantener el paralelismo con la cláusula final; una nota preserva la posibilidad inclusiva para lectores modernos.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Fuerza semántica de τὸ ἐν ἀνθρώποις ὑψηλὸν
  english_pob_reading: what is exalted among men
  chosen_spanish_reading: lo que es exaltado entre los hombres
  alternative_spanish_readings:
  - lo que es altamente estimado entre los hombres
  - lo que los hombres consideran elevado
  rationale: La frase puede referirse a lo socialmente elevado, admirado o estimado. «Exaltado» conserva la metáfora de altura del griego y evita estrechar el sentido solo a valoración; la alternativa interpretativa queda señalada en nota.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 5
- issue: βδέλυγμα y el tono de rechazo divino
  english_pob_reading: detestable before God
  chosen_spanish_reading: detestable delante de Dios
  alternative_spanish_readings:
  - abominación delante de Dios
  - abominable delante de Dios
  rationale: Se mantiene un término fuerte y directo que exprese rechazo divino real, sin suavizarlo. «Detestable» comunica bien la carga ética y cultual del término griego, y evita introducir un tecnicismo tradicional donde el español contemporáneo puede entenderlo con menos esfuerzo.
  doctrine_reference: BDAG; Levítico 18:22; Proverbios 15:8
translation_notes:
  revision_awareness: El contexto inglés de la POB ya fue revisado y quedó sin cambios en el último pase; la redacción española sigue de cerca esas decisiones léxicas y no introduce nuevas variantes textuales. Se preservó el paralelismo de ἐνώπιον con «delante de» en ambas cláusulas y la tensión semántica de βδέλυγμα como rechazo divino fuerte, sin atenuarlo a una mera desaprobación.
  spanish_consistency_notes:
  - Se mantuvo «delante de» en ambas ocurrencias de ἐνώπιον para reforzar el contraste entre evaluación humana y divina.
  - Se eligió «los hombres» en el texto principal por coherencia con el audit trail, y la nota a aclara el valor genérico inclusivo.
  - «Se justifican» conserva el campo semántico de δικαιόω sin pasar a una paráfrasis interpretativa más amplia.
  - Se evitó «Cristo», «SEÑOR» u otras terminologías no pertinentes al versículo.
  - Las comillas angulares se usan de manera uniforme en el discurso directo.
