translation:
  language: es
  text: Hijo mío, en tu enfermedad no la desatiendas[a]; ora a Dios[b], porque él te sanará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no la descuides» o «no la pases por alto»; el paralelo griego apoya el sentido de no desatender la enfermedad.
    reason: lexical_alternative
  - marker: b
    text: El paralelo griego dice «al Señor». El testimonio hebreo aquí dice «a Dios».
    reason: alternative_reading
lexical_decisions:
- source_word: בני / τέκνον
  english_pob_choice: My son
  chosen_spanish: Hijo mío
  alternatives_spanish:
  - Hijo
  - Mi hijo
  - Niño
  lexicon: HALOT; LXX τέκνον
  rationale: El hebreo vocativo בני conserva la forma afectuosa e instructiva de un padre a un hijo; el griego τέκνον amplía el matiz a 'niño/hijo', pero en español 'Hijo mío' reproduce bien la cercanía paternal sin perder la dignidad sapiencial del pasaje.
- source_word: בחולי / ἐν ἀρρωστήματί σου
  english_pob_choice: in your sickness
  chosen_spanish: en tu enfermedad
  alternatives_spanish:
  - cuando estés enfermo
  - en tu dolencia
  - en tu padecimiento
  lexicon: HALOT; BDAG
  rationale: La construcción preposicional expresa estado o circunstancia. 'En tu enfermedad' suena natural en español y preserva la imagen de encontrarse dentro de una condición de enfermedad, sin introducir una paráfrasis más libre que el hebreo y el griego.
- source_word: על תתעבר / μὴ παράβλεπε
  english_pob_choice: do not be negligent
  chosen_spanish: no la desatiendas
  alternatives_spanish:
  - no seas negligente
  - no la descuides
  - no la pases por alto
  lexicon: HALOT; LSJ/BDAG
  rationale: La forma hebrea es idiomática y el paralelo griego apunta a no pasar por alto ni descuidar la enfermedad. En español, 'desatender' conserva la idea de no darle la atención debida y permite un objeto implícito claro ('la' = la enfermedad), reflejando la tensión textual sin suavizarla demasiado.
- source_word: התפלל / εὔξαι
  english_pob_choice: pray
  chosen_spanish: ora
  alternatives_spanish:
  - reza
  - suplica
  - haz oración
  lexicon: HALOT; LSJ
  rationale: התפלל y εὔξαι expresan la acción de orar o suplicar a Dios. 'Ora' es la forma más natural y reverente en español bíblico contemporáneo, y evita el tono más coloquial de 'rezar' o el más perifrástico de 'haz oración'.
- source_word: אל אל / Κυρίῳ
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - al Señor
  - al Dios
  lexicon: HALOT; LXX Κυρίῳ
  rationale: El hebreo conservado dice explícitamente 'a Dios', mientras que el griego paralelo presenta 'al Señor'. En el texto principal se mantiene 'a Dios' siguiendo el testimonio hebreo; esta preferencia respeta la primacía del testimonio original disponible sin borrar la variante griega significativa.
- source_word: כי הוא ירפא / καὶ αὐτὸς ἰάσεταί σε
  english_pob_choice: for he will heal you
  chosen_spanish: porque él te sanará
  alternatives_spanish:
  - pues él te curará
  - porque él te curará
  - y él te sanará
  lexicon: HALOT; BDAG
  rationale: El verbo ירפא e ἰάσεταί connotan curación/sanidad. 'Sanará' mantiene el registro bíblico natural en español y refleja bien el objeto explícito del griego ('te') y el sentido contextual del hebreo.
theological_decisions:
- issue: Título divino en la cláusula de oración
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - el Señor
  rationale: Siguiendo el testimonio hebreo conservado, el destinatario de la oración se traduce como 'Dios'. La variante griega 'al Señor' se reconoce como lectura paralela importante, pero no desplaza el texto base hebreo en el cuerpo principal.
  doctrine_reference: Translation philosophy §1; tratamiento de κύριος/YHWH en POB
- issue: Valor de la advertencia sobre la enfermedad
  english_pob_reading: do not be negligent / do not overlook it
  chosen_spanish_reading: no la desatiendas
  alternative_spanish_readings:
  - no la descuides
  - no seas negligente
  rationale: La advertencia apunta a no ignorar la enfermedad y a responder adecuadamente ante ella. 'No la desatiendas' preserva ese valor exhortativo sin convertirlo en una formulación demasiado técnica o demasiado interpretativa.
  doctrine_reference: Sabiduría práctica en Sirácida; equivalencia óptima
translation_notes:
  revision_awareness: Se mantuvo la lectura hebrea principal para el destinatario de la oración ('a Dios') y se preservó la variante griega en nota. La cláusula exhortativa se ajustó al español natural con objeto explícito ('no la desatiendas'), reflejando la ambigüedad del hebreo y la claridad del griego sin añadir contenido ajeno.
  spanish_consistency_notes:
  - Se usó 'Hijo mío' para conservar el vocativo sapiencial y la relación paterno-didáctica del hebreo.
  - '''Dios'' se mantuvo como término principal del texto, en coherencia con el testimonio hebreo; la variante ''Señor'' queda documentada en nota.'
  - '''Sanará'' se eligió por su registro bíblico natural en español y porque mantiene la fuerza de curación del verbo original.'
  - La nota sobre 'no la desatiendas' preserva la tensión entre el hebreo idiomático y el paralelo griego más explícito.
