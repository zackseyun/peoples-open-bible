    issue: הַלְּבוֹנָה fue traducido como «incienso».
    rationale: El hebreo designa específicamente frankincense/olíbano, no incienso en general. «Incienso» diluye la precisión cultual que el original y el POB inglés preservan.
  - severity: medium
    issue: La frase principal «todos los utensilios del santuario» adopta en el texto una alternativa que el POB inglés relegó a nota.
    rationale: El hebreo permite «utensilios sagrados» de manera más directa; «del santuario» es válida como alternativa, pero conviene preservarla en nota para seguir mejor el expediente auditado.
  - severity: medium
