translation:
  language: es
  text: Ahora[a], hijo mío, que Yahvé esté contigo, y que prosperes y construyas la casa de Yahvé tu Dios[b], como él ha hablado acerca de ti[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y ahora». El hebreo introduce la frase con una partícula temporal/discursiva que puede traducirse de varias maneras naturales.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el templo de Yahvé tu Dios». Literalmente: «la casa de Yahvé tu Dios».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «como él ha prometido respecto de ti». El hebreo dice más literalmente: «como él ha hablado acerca de ti».'
    reason: alternative_reading
lexical_decisions:
- source_word: עַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Pues ahora
  - Ahora bien
  lexicon: HALOT
  rationale: Marca temporal y discursiva que introduce la exhortación de David; «Ahora» es natural, digno y fiel al inicio del enunciado.
- source_word: בְנִי
  english_pob_choice: my son
  chosen_spanish: hijo mío
  alternatives_spanish:
  - mi hijo
  lexicon: HALOT
  rationale: Conserva el apelativo paternal directo del hebreo con naturalidad en español y sin perder la relación afectiva y de autoridad.
- source_word: יְהִי יְהוָה עִמָּךְ
  english_pob_choice: may Yahweh be with you
  chosen_spanish: que Yahvé esté contigo
  alternatives_spanish:
  - que Yahvé sea contigo
  - que Yahvé esté a tu lado
  lexicon: HALOT
  rationale: El jussivo expresa deseo/bendición; en español, «que Yahvé esté contigo» transmite esa fuerza benedictoria de manera fluida. Se mantiene «Yahvé» conforme al criterio del proyecto.
- source_word: וְהִצְלַחְתָּ
  english_pob_choice: and may you prosper
  chosen_spanish: y que prosperes
  alternatives_spanish:
  - y que tengas éxito
  - y que tengas prosperidad
  lexicon: HALOT
  rationale: El verbo puede significar «prosperar» o «tener éxito». Aquí la mejor equivalencia es «prosperes», que conserva amplitud semántica y encaja con la bendición previa.
- source_word: וּבָנִיתָ
  english_pob_choice: and build
  chosen_spanish: y construyas
  alternatives_spanish:
  - y edifiques
  - y edificarás
  lexicon: HALOT
  rationale: El contexto bendicional favorece fuerza modal en español; «construyas» mantiene el paralelismo con el deseo sobre el éxito y suena natural en una exhortación.
- source_word: בֵּית יְהוָה אֱלֹהֶיךָ
  english_pob_choice: the house of Yahweh your God
  chosen_spanish: la casa de Yahvé tu Dios
  alternatives_spanish:
  - el templo de Yahvé tu Dios
  - la casa de Yahvé, tu Dios
  lexicon: HALOT
  rationale: «Casa» preserva la literalidad y la resonancia del hebreo; «templo» sería interpretativo. Se mantiene la relación posesiva «tu Dios» sin expandir el texto.
- source_word: כַּאֲשֶׁר דִּבֶּר עָלֶיךָ
  english_pob_choice: as he has spoken concerning you
  chosen_spanish: como él ha hablado acerca de ti
  alternatives_spanish:
  - como él ha dicho de ti
  - como él ha hablado sobre ti
  - como él ha prometido respecto de ti
  lexicon: HALOT
  rationale: «Hablar acerca de» preserva el sentido más literal de דבר + על sin convertirlo de forma obligatoria en «prometer». Se mantiene la referencia a una palabra previa de Yahvé.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se usa la forma de nombre divino establecida para el proyecto en español, conservando el Tetragrámaton como nombre propio y no como sustituto reverente.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto contiene el Tetragrámaton יְהוָה. Conforme a la política del proyecto, se vierte como «Yahvé» para preservar el nombre personal del Dios del pacto en lugar de reemplazarlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fuerza de la secuencia verbal en la bendición de David
  english_pob_reading: A blessing/wish leading into expected fulfillment
  chosen_spanish_reading: 'Una bendición: «que Yahvé esté contigo, y que prosperes y construyas»'
  alternative_spanish_readings:
  - 'Una predicción: «Yahvé estará contigo, y prosperarás y construirás»'
  - Una exhortación directa sin valor benedictorio
  rationale: El jussivo inicial exige lectura benedictoria. El español mantiene esa fuerza con «que» y evita transformar el pasaje en una simple predicción o mandato.
  doctrine_reference: Gramática hebrea del jussivo en contexto benedictorio
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que cada marcador de nota [a], [b] y [c] aparezca exactamente en el texto español. Además, se evitó el calco desde el inglés manteniendo la fuerza benedictoria del jussivo hebreo y la literalidad de «casa de Yahvé tu Dios» con una alternativa explicada en nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - Se usa «casa» en el texto principal y «templo» solo como alternativa anotada.
  - El paralelismo de bendición se conserva con «que... y que...».
  - Las notas están ancladas correctamente en el texto con los marcadores [a], [b] y [c].
