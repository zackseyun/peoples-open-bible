  glossary_alignment: No hay conflicto con la terminología troncal del proyecto. 'Dios' y 'casa de Dios' están bien. 'Midrash' se conserva correctamente con nota cultural. La decisión sobre מַשָּׂא debe seguir siendo amplia; 'pronunciamientos' alinea mejor con la revisión inglesa final que 'declaraciones'.
