  text: Remet[a], En-gannim, En-haddah, y Beth-pazzez.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Nombres de lugar hebreos: «En-gannim» probablemente significa «manantial de jardines»; «En-haddah» comienza con «manantial»; y «Beth-pazzez» comienza con «casa de». El texto principal los translitera porque aquí funcionan como nombres de ciudades.'
