    rationale: Aunque comunica la idea general, suena elíptica y algo forzada. El griego expresa la postura de caer sobre el rostro; en español una forma más natural y fiel es «cayeron sobre sus rostros».
  revised_spanish_text: Y se turbaron los dos, y cayeron sobre sus rostros, porque tuvieron miedo.
  revision_rationale: Se mantiene la estructura y el sentido del borrador, pero se reemplaza «cayeron rostro en tierra» por «cayeron sobre sus rostros» para reflejar mejor el griego ἔπεσον ἐπὶ πρόσωπον, sonar más natural en español y evitar un calco poco idiomático. No se requieren notas.
