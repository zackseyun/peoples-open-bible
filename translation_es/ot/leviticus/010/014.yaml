revisions:
- from: Y ustedes, y sus hijos y sus hijas con ustedes, comerán el pecho de la ofrenda mecida[a] y la pierna de la ofrenda alzada[b], en un lugar limpio, porque han sido dados como su porción y la porción de sus hijos, de los sacrificios de las ofrendas de paz[c] de los hijos de Israel.
  to: Y tú, y tus hijos y tus hijas contigo, comerán la pechuga de la ofrenda mecida[a] y el muslo de la contribución[b] en un lugar limpio, porque les han sido dados como tu porción y la porción de tus hijos, de los sacrificios de las ofrendas de paz[c] de los hijos de Israel.
  rationale: Se ajustó la segunda persona a singular para reflejar el hebreo y mejorar la naturalidad; se cambió 'pecho' por 'pechuga' y 'pierna' por 'muslo' por precisión e idiomaticidad sacrificial; se restauró en b una alternativa léxica real alineada con la auditoría inglesa ('contribución' / 'ofrenda alzada'); y se suavizó la cláusula final para un español más claro sin perder el pasivo-resultativo del original.
