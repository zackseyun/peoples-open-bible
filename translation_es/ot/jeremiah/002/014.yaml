translation:
  language: es
  text: ¿Es Israel un esclavo, o un siervo nacido en casa[a]? ¿Por qué, entonces, se ha vuelto botín[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «¿Es Israel un siervo, o uno nacido en la casa?». La expresión hebrea se refiere a alguien nacido dentro de la casa o del hogar de un amo.
    reason: lexical_alternative
  - marker: b
    text: O, «presa».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַעֶבֶד
  english_pob_choice: a slave
  chosen_spanish: un esclavo
  alternatives_spanish:
  - un siervo
  - el esclavo
  lexicon: HALOT
  rationale: En este contexto retórico la condición de sometimiento es central, así que «esclavo» conserva la fuerza social del hebreo עֶבֶד mejor que «siervo». Se evita suavizar el contraste entre la identidad de Israel y su reducción a despojo.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - el pueblo de Israel
  lexicon: convención onomástica estándar
  rationale: Es nombre propio y se mantiene sin alterar.
- source_word: אִם
  english_pob_choice: or
  chosen_spanish: o
  alternatives_spanish:
  - si
  - ya sea
  lexicon: HALOT
  rationale: En esta pregunta retórica introduce una alternativa entre dos estados posibles; «o» reproduce mejor esa relación que «si» en español.
- source_word: יְלִיד בַּיִת
  english_pob_choice: a homeborn servant
  chosen_spanish: un siervo nacido en casa
  alternatives_spanish:
  - uno nacido en la casa
  - un esclavo nacido en casa
  - un doméstico
  lexicon: HALOT
  rationale: La expresión hebrea alude literalmente a alguien nacido dentro de la casa o del hogar de un amo. «Nacido en casa» conserva la imagen; «siervo» mantiene cierta ambigüedad del término inglés auditado y evita forzar una sola etiqueta social donde el énfasis principal del miembro paralelo ya está en עֶבֶד.
- source_word: הוּא
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - eso
  lexicon: HALOT
  rationale: Israel está personificado; en español el pronombre masculino singular «él» es natural y fiel al hebreo.
- source_word: מַדּוּעַ
  english_pob_choice: Why then
  chosen_spanish: ¿Por qué, entonces,
  alternatives_spanish:
  - ¿Por qué
  - ¿Entonces por qué
  lexicon: HALOT
  rationale: «Entonces» reproduce el matiz inferencial del audit trail inglés, enlazando la pregunta con la condición previamente planteada sin agregar contenido ajeno.
- source_word: הָיָה
  english_pob_choice: has become
  chosen_spanish: se ha vuelto
  alternatives_spanish:
  - ha llegado a ser
  - fue
  lexicon: HALOT
  rationale: 'El qatal expresa un estado resultante: Israel no solo «fue» botín, sino que ha llegado a esa condición. «Se ha vuelto» comunica bien ese resultado en español.'
- source_word: לָבַז
  english_pob_choice: plunder
  chosen_spanish: botín
  alternatives_spanish:
  - presa
  - despojo
  lexicon: HALOT
  rationale: «Botín» corresponde al campo semántico de ביז/בַּז como algo capturado y repartido por vencedores. En español mantiene el valor de despojo de guerra con buena naturalidad.
theological_decisions:
- issue: rango semántico de עֶבֶד en un interrogante de humillación nacional
  english_pob_reading: Translate with slavery language ('slave') rather than the softer 'servant' in the first clause
  chosen_spanish_reading: Traducir con «esclavo» en la primera cláusula, no con el más suave «siervo»
  alternative_spanish_readings:
  - Traducir ambas cláusulas con «siervo»
  - usar «sirviente»
  rationale: La pregunta profética denuncia la degradación de Israel. Mantener «esclavo» preserva el peso social y teológico del término, mientras que «siervo» atenuaría innecesariamente la acusación implícita en el verso.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; criterio POB sobre términos de vínculo y sometimiento
- issue: relación entre la primera y la segunda imagen social
  english_pob_reading: The verse contrasts Israel's status with the condition of being reduced to spoil
  chosen_spanish_reading: El verso contrasta la dignidad histórica de Israel con la posibilidad de haber quedado reducido a botín
  alternative_spanish_readings:
  - El verso contrasta dos posibles estados domésticos
  - El verso solo enumera dos metáforas equivalentes
  rationale: La segunda cláusula no repite simplemente la primera; intensifica la humillación con la imagen de ser botín. La traducción conserva esa progresión retórica.
  doctrine_reference: Jeremías 2:14 en su marco profético de reprensión y deshonra nacional
translation_notes:
  revision_awareness: Alineado con la revisión auditada más reciente, que no requirió cambios. El español sigue el sentido del hebreo y del registro inglés POB sin introducir suavizaciones ni ampliar el texto.
  spanish_consistency_notes:
  - Se usa «Yahvé» según la norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se preserva «esclavo» para עֶבֶד en la primera pregunta, de acuerdo con la decisión auditada sobre estatus de sometimiento.
  - «Botín» se mantiene para לָבַז por corresponder al despojo de guerra, evitando términos más débiles como «presa» salvo en nota de alternativa.
  - La puntuación reproduce la cadencia interrogativa doble del hebreo y del inglés auditado.
