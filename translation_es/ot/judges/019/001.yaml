revisions:
- from: Y aconteció en aquellos días[a], cuando no había rey en Israel, que un hombre levita estaba viviendo en las partes remotas[a] de la región montañosa de Efraín; y tomó para sí una mujer, una concubina[b], de Belén de Judá.
  to: Y aconteció en aquellos días, cuando no había rey en Israel[a], que un hombre levita habitaba en las partes remotas de la región montañosa de Efraín, y tomó para sí una mujer, una concubina[b], de Belén de Judá.
  rationale: Se corrige el problema principal de anclaje y reutilización de notas, colocando [a] en la cláusula a la que realmente corresponde y eliminando su repetición indebida. Además, se mejora la naturalidad y dignidad del español con «habitaba» y se alisa la puntuación sin alterar el sentido fuente ni las decisiones léxicas documentadas.
