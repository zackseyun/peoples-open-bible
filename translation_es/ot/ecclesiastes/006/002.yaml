review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo y conserva la mayoría de las decisiones del POB: observación proverbial con singular representativo, lista de bienes, el modismo de ''comer de'' como disfrutar, y el cierre con ''vanidad'' y ''un mal grave''. Sin embargo, la nota al pie está mal anclada: el marcador [a] aparece en el primer ''hombre'' pero la nota explica אִישׁ נָכְרִי (''un extranjero/forastero''), que ocurre más adelante. Además, en español suena más natural ''de ellos'' y ''los come'' para referirse al conjunto de bienes, en línea con la decisión inglesa de pluralizar por claridad.'
  spanish_quality_summary: 'El texto es mayormente claro y digno, pero tiene una torpeza de legibilidad y coherencia referencial: ''comer de ello'' seguido de ''lo come'' trata la serie plural como singular colectivo de forma algo rígida en español. ''Para sí'' es aceptable, aunque ''para sí mismo'' sería más explícito; no es necesario cambiarlo. La principal reparación es mover el pie de nota al lugar correcto y ajustar los pronombres a plural para una lectura más natural.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Dios', 'vanidad' y 'honor' están alineados. No hay ocurrencias de Yahvé, Mesías, Espíritu, etc. La elección 'mal grave' sigue la revisión inglesa documentada para וָחֳלִי רָע.
  issues:
  - severity: high
    issue: Marcador de nota al pie anclado en la palabra equivocada
    rationale: La nota [a] explica אִישׁ נָכְרִי ('un extranjero/forastero'), pero está colocada en 'hombre' al inicio del versículo, que corresponde a אִישׁ אֲשֶׁר. Esto desinforma al lector y rompe la trazabilidad con la evidencia fuente y el audit trail inglés.
  - severity: medium
    issue: Pronombres singulares algo forzados para un referente semánticamente plural
    rationale: El hebreo usa sufijo singular colectivo, pero el POB inglés explicitó plural ('them') por claridad. En español, 'comer de ello' y 'lo come' suenan más rígidos que 'comer de ellos' y 'los come' al retomar 'riqueza, posesiones y honor'.
  revised_spanish_text: Hay un hombre a quien Dios da riqueza, posesiones y honor, y no le falta nada para sí de todo lo que desea; pero Dios no le concede comer de ellos, porque un extranjero[a] los come. Esto es vanidad y un mal grave.
  revised_footnotes:
  - marker: a
    text: O ‘un forastero’. El hebreo dice literalmente ‘un hombre extranjero’.
    reason: lexical_alternative
  revision_rationale: Se corrigió el anclaje de la nota al lugar correspondiente a אִישׁ נָכְרִי y se ajustaron los pronombres a plural para una referencia más natural en español al conjunto de bienes, sin perder la imagen concreta de 'comer'.
