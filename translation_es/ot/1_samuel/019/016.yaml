translation:
  language: es
  text: Cuando entraron los mensajeros, he aquí, el terafim[a] estaba en la cama, y un cobertor[b] de pelo de cabra estaba a su cabecera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, “el ídolo doméstico” o “la imagen idolátrica”. El hebreo terafim se refiere a una imagen cultual doméstica.
    reason: lexical_alternative
  - marker: b
    text: El término hebreo traducido “cobertor” es raro y puede referirse más generalmente a una cobertura tejida; “cobertor de pelo de cabra” refleja aquí su probable función.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּלְאָכִים
  english_pob_choice: the messengers
  chosen_spanish: los mensajeros
  alternatives_spanish:
  - los agentes
  - los enviados
  lexicon: HALOT
  rationale: En este contexto narrativo se trata de personas enviadas por Saúl; “mensajeros” conserva el valor humano del término sin sugerir seres angelicales.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - y he aquí
  lexicon: HALOT
  rationale: Reproduce el golpe de vista narrativo y el matiz de descubrimiento súbito del hebreo.
- source_word: הַתְּרָפִים
  english_pob_choice: the teraphim
  chosen_spanish: el terafim
  alternatives_spanish:
  - el ídolo doméstico
  - la imagen idolátrica
  lexicon: HALOT
  rationale: Se mantiene la transliteración para preservar la especificidad cultural del término y no imponer una interpretación demasiado cerrada; en español el singular concuerda con el uso narrativo del objeto como un solo decoy.
- source_word: אֶל הַמִּטָּה
  english_pob_choice: in the bed
  chosen_spanish: en la cama
  alternatives_spanish:
  - sobre la cama
  - en el lecho
  lexicon: HALOT
  rationale: 'Aunque אֶל suele ser “a/hacia”, en esta escena la idea locativa es la natural en español: el objeto estaba colocado allí como sustituto de un cuerpo.'
- source_word: וּכְבִיר
  english_pob_choice: the quilt
  chosen_spanish: una cubierta
  alternatives_spanish:
  - una colcha
  - un cobertor
  lexicon: HALOT
  rationale: El término es raro y denota un elemento de cobertura; “cubierta” comunica la función sin comprometerse más de lo que el hebreo permite.
- source_word: הָעִזִּים
  english_pob_choice: of goats’ hair
  chosen_spanish: de pelo de cabra
  alternatives_spanish:
  - de lana de cabra
  - de pelo de las cabras
  lexicon: HALOT
  rationale: El contexto apunta al material del cobertor, no a la propiedad de cabras; “pelo de cabra” expresa la materia de forma natural en español.
- source_word: מְרַאֲשֹׁתָיו
  english_pob_choice: at its head
  chosen_spanish: a su cabecera
  alternatives_spanish:
  - junto a su cabeza
  - en la cabecera
  lexicon: HALOT
  rationale: “Cabecera” en español transmite bien la ubicación al extremo de la cama y evita ambigüedad sobre un cuerpo humano real en el lecho.
theological_decisions:
- issue: Tratamiento de תְּרָפִים como objeto cultual sin forzar una traducción interpretativa
  english_pob_reading: the teraphim
  chosen_spanish_reading: el terafim
  alternative_spanish_readings:
  - el ídolo doméstico
  - la imagen idolátrica
  rationale: La frase hebrea nombra el objeto sin comentario explícito; la transliteración preserva la tensión entre término técnico y posible función idolátrica, dejando la aclaración para nota.
  doctrine_reference: Principio de primacía del texto original y preservación de ambigüedad cuando el hebreo no la resuelve.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y la decisión auditada del POB inglés: transliterar תְּרָפִים, conservar el valor deíctico de וְהִנֵּה y expresar el material del cobertor como una cobertura de pelo de cabra. No se adoptaron revisiones posteriores porque el registro indicado aparece estable y sin cambios.'
  spanish_consistency_notes:
  - Se usa “Yahvé” solo cuando el hebreo lo exige explícitamente; este versículo no lo contiene.
  - Se prefirió “el terafim” en singular por la concordancia narrativa del objeto visible en la escena, manteniendo la transliteración como en el POB inglés.
  - “He aquí” conserva un tono bíblico claro sin arcaizar en exceso.
  - “Cabecera” evita introducir una lectura antropomórfica o un detalle ajeno al hebreo.
