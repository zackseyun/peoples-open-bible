review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del hebreo: bienaventuranza, disciplina correctiva, nombre divino en vocativo y enseñanza procedente de la torá. Sin embargo, no preserva adecuadamente una distinción importante del texto fuente y del rastro auditado: el hebreo usa יָהּ, la forma breve poética del nombre divino, y el inglés POB la mantuvo de forma explícita como ''Yah''. El borrador la nivela a ''Yahvé'', lo que borra una diferencia léxica real del original. Además, ''desde tu ley'' suena menos natural en español para מִן en este contexto que ''de tu ley'' o ''de tu instrucción''.'
  spanish_quality_summary: 'El español es claro y digno, pero tiene dos asperezas: ''desde tu ley'' suena poco idiomático en un contexto de enseñanza, y la nota de ''Bienaventurado'' no coincide con el marcador alternativo inglés, pues debería decir ''O «Dichoso»'' en vez de repetir la forma principal. También conviene añadir notas para el valor representativo de ''el hombre'', para la forma breve ''Yah'', y para la alternativa ''instrucción'' de torá, ya que el inglés POB documentó esas decisiones y siguen siendo relevantes en español.'
  glossary_alignment: Alineación parcial. 'Bienaventurado', 'el hombre', 'disciplinas' y 'ley' encajan bien con las decisiones fuente y el estilo del proyecto. Pero la política del proyecto para YHWH -> 'Yahvé' no autoriza a borrar aquí la forma abreviada יָהּ; en este versículo corresponde distinguirla como 'Yah'.
  issues:
  - severity: high
    issue: Se traduce יָּהּ como 'Yahvé' en vez de distinguir la forma breve 'Yah'.
    rationale: El hebreo no tiene el tetragrama completo sino la forma poética corta יָהּ. El inglés POB la preserva expresamente y la documentación teológica subraya que no debe aplanarse a otra forma.
  - severity: medium
    issue: '''desde tu ley'' es poco natural para וּמִתּוֹרָתְךָ en español bíblico claro.'
    rationale: Aunque מִן marca origen, en español 'enseñar desde tu ley' suena forzado; 'enseñas de tu ley' comunica mejor la relación fuente-contenido sin perder sentido.
  - severity: medium
    issue: Faltan en español varias notas significativas preservadas por el inglés POB.
    rationale: El audit trail inglés conserva alternativas para אַשְׁרֵי, הַגֶּבֶר, יָּהּ y תּוֹרָה. Son pertinentes también en español y ayudan a no perder matices.
  - severity: low
    issue: La nota [a] dice 'O «bienaventurado»' pero esa es la forma principal ya usada en el texto.
    rationale: La alternativa real en español es 'Dichoso' o similar; la nota actual está internamente incoherente.
  revised_spanish_text: Bienaventurado[a] el hombre[b] a quien tú disciplinas, Yah[c], y le enseñas de tu ley[d].
  revised_footnotes:
  - marker: a
