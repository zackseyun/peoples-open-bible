translation:
  language: es
  text: 'Y he aquí[a], Saúl venía del campo detrás del ganado, y Saúl dijo: «¿Qué le pasa al pueblo, que llora?». Y le contaron las palabras[b] de los hombres de Jabes.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Y mira». El hebreo וְהִנֵּה marca una transición enfática de escena.
    reason: alternative_reading
  - marker: b
    text: O «mensaje». Literalmente, «las palabras de los hombres de Jabes».
    reason: alternative_reading
lexical_decisions:
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí[a]
  alternatives_spanish:
  - Y he aquí
  - Y mira
  - Y resulta que
  lexicon: HALOT
  rationale: Conserva la función discursiva de הִנֵּה como giro de escena y llamada de atención. «He aquí» es una equivalencia reverente y natural en español bíblico, y el marcador se usa para reflejar la nota de alternativa sobre el valor enfático del hebreo.
- source_word: בָּא
  english_pob_choice: was coming
  chosen_spanish: venía
  alternatives_spanish:
  - venía llegando
  - venía
  - llegaba
  lexicon: HALOT
  rationale: El participio hebreo presenta la acción en curso de fondo. «Venía» reproduce bien esa continuidad sin sobrerinterpretar un pasado simple puntual.
- source_word: אַחֲרֵי הַבָּקָר
  english_pob_choice: behind the cattle
  chosen_spanish: detrás del ganado
  alternatives_spanish:
  - detrás de los bueyes
  - siguiendo el ganado
  - tras el ganado
  lexicon: HALOT
  rationale: «אַחֲרֵי» expresa posición/seguimiento espacial; «detrás del ganado» mantiene la imagen concreta. «Ganado» es más amplio que «bueyes» y evita restringir sin base suficiente.
- source_word: מִן הַשָּׂדֶה
  english_pob_choice: from the field
  chosen_spanish: del campo
  alternatives_spanish:
  - desde el campo
  - del terreno
  - del sembrado
  lexicon: HALOT
  rationale: El hebreo marca origen. «Del campo» es el equivalente natural en español y conserva la procedencia sin añadir movimiento no explícito.
- source_word: מַה לָּעָם
  english_pob_choice: What is wrong with the people
  chosen_spanish: ¿Qué le pasa al pueblo?
  alternatives_spanish:
  - ¿Qué le sucede al pueblo?
  - ¿Qué tiene el pueblo?
  - ¿Qué le ocurre al pueblo?
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y pregunta por la condición del pueblo. «¿Qué le pasa al pueblo?» comunica bien el sentido natural en español sin perder la pregunta sobre su estado.
- source_word: כִּי יִבְכּוּ
  english_pob_choice: that they are weeping
  chosen_spanish: que llora
  alternatives_spanish:
  - que están llorando
  - que lloran
  - por qué lloran
  lexicon: HALOT
  rationale: El כִּי introduce el contenido de la pregunta. En español, la cláusula queda mejor integrada como «que llora», manteniendo el presente continuo/actual de la escena; el singular colectivo «el pueblo» permite esta concordancia natural.
- source_word: וַיְסַפְּרוּ לוֹ
  english_pob_choice: And they told him
  chosen_spanish: Y le contaron
  alternatives_spanish:
  - Y le dijeron
  - Y le relataron
  - Y le informaron
  lexicon: HALOT
  rationale: Verbo narrativo básico. «Contaron» es natural y suficientemente formal, y conserva la idea de transmisión de información sin sobredramatizar.
- source_word: דִּבְרֵי אַנְשֵׁי יָבֵישׁ
  english_pob_choice: the words of the men of Jabesh
  chosen_spanish: las palabras de los hombres de Jabes[b]
  alternatives_spanish:
  - el mensaje de los hombres de Jabes
  - lo que dijeron los hombres de Jabes
  - las palabras de los varones de Jabes
  lexicon: HALOT
  rationale: Se mantiene la literalidad de דִּבְרֵי como «palabras» para no diluir el vínculo con el discurso reportado. «Jabes» reproduce el topónimo de manera usual en español bíblico; el marcador remite a la nota sobre la posibilidad de entenderlo dinámicamente como «mensaje».
theological_decisions:
- issue: Uso del nombre divino
  english_pob_reading: No aparece en el versículo; no aplica la convención de Yahvé.
  chosen_spanish_reading: No se introduce ninguna sustitución teológica ni mayúscula especial.
  alternative_spanish_readings:
  - —
  rationale: El versículo no contiene יהוה ni κύριος en un sentido relevante, así que no hay decisión teológica adicional que registrar.
  doctrine_reference: N/A
- issue: Carácter del sustantivo colectivo en la pregunta de Saúl
  english_pob_reading: “the people” is rendered as a natural collective in the question about weeping.
  chosen_spanish_reading: «el pueblo» como colectivo singular en la pregunta.
  alternative_spanish_readings:
  - «la gente»
  - «el pueblo» en plural implícito
  rationale: El hebreo puede referirse al conjunto como entidad colectiva. En español, «el pueblo» conserva mejor el matiz corporativo y mantiene la forma de la pregunta sin forzar un plural inexistente.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la revisión más reciente del audit trail: mantiene «from the field» como procedencia simple y conserva la lectura formal de «the words of the men of Jabesh/Jabes» sin convertirla por defecto en «mensaje». En español se ajusta la fluidez con un colectivo singular («el pueblo») y con una coordinación narrativa natural («Y le contaron»).'
  spanish_consistency_notes:
  - Se usa «Y he aquí» para reflejar la función discursiva de וְהִנֵּה con la convención POB de no ocultar el giro narrativo.
  - Se prefiere «Jabes» como forma española del topónimo; la nota preserva la alternativa interpretativa «mensaje».
  - «Ganado» se mantiene amplio para no restringir בָּקָר a «bueyes» sin necesidad textual.
  - La concordancia singular de «el pueblo» con «llora» es una adaptación gramatical española para un colectivo, no una reinterpretación del hebreo.
