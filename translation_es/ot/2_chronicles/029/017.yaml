translation:
  language: es
  text: Comenzaron a consagrar el primer día del primer mes, y el octavo día del mes llegaron al vestíbulo[a] de Yahvé. Entonces consagraron la casa de Yahvé en ocho días, y el día dieciséis del primer mes terminaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Vestíbulo» traduce el espacio frontal del templo; también puede verterse «pórtico» o «porche».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּחֵלּוּ
  english_pob_choice: they began
  chosen_spanish: comenzaron
  alternatives_spanish:
  - empezaron
  - dieron comienzo
  lexicon: HALOT
  rationale: El verbo hebreo expresa inicio de una acción en secuencia narrativa. «Comenzaron» es natural en español y conserva el valor aspectual de inicio sin añadir matices ajenos.
- source_word: לְקַדֵּשׁ
  english_pob_choice: to consecrate
  chosen_spanish: consagrar
  alternatives_spanish:
  - santificar
  - hacer santo
  lexicon: HALOT
  rationale: En este contexto de purificación y dedicación del templo, «consagrar» reproduce bien la idea de separar para uso sagrado. «Santificar» suena más abstracto en español y puede ser menos claro aquí.
- source_word: בְּאֶחָד לַחֹדֶשׁ הָרִאשׁוֹן
  english_pob_choice: on the first day of the first month
  chosen_spanish: el primer día del primer mes
  alternatives_spanish:
  - el día uno del primer mes
  - en el día primero del primer mes
  lexicon: HALOT
  rationale: La construcción idiomática hebrea se entiende en español como fecha calendárica. «El primer día del primer mes» es fluido y fiel al sentido.
- source_word: בָּאוּ לְאוּלָם יְהוָה
  english_pob_choice: they came to the vestibule of Yahweh
  chosen_spanish: llegaron al vestíbulo de Yahvé
  alternatives_spanish:
  - llegaron al pórtico de Yahvé
  - llegaron al portal de Yahvé
  lexicon: HALOT
  rationale: אולם designa el espacio frontal del templo; «vestíbulo» mantiene precisión arquitectónica y buena inteligibilidad. «Llegaron a» conserva el sentido direccional del hebreo sin implicar necesariamente entrada plena.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se sigue la convención del POB para el nombre divino, en forma española «Yahvé», preservando el nombre propio del pacto en lugar de sustituirlo por un título.
- source_word: וַיְקַדְּשׁוּ אֶת בֵּית יְהוָה
  english_pob_choice: Then they consecrated the house of Yahweh
  chosen_spanish: Entonces consagraron la casa de Yahvé
  alternatives_spanish:
  - Entonces santificaron la casa de Yahvé
  - Entonces dedicaron la casa de Yahvé
  lexicon: HALOT
  rationale: «Casa de Yahvé» reproduce la expresión estable del templo como «casa» del Dios del pacto. «Consagraron» mantiene la misma raíz conceptual que el primer verbo de la versículo para conservar cohesión léxica.
- source_word: לְיָמִים שְׁמוֹנָה
  english_pob_choice: in eight days
  chosen_spanish: en ocho días
  alternatives_spanish:
  - por ocho días
  - durante ocho días
  lexicon: HALOT
  rationale: La frase señala la duración del proceso hasta completarse. «En ocho días» es la equivalencia más concisa y natural en español, coherente con la secuencia cronológica del versículo.
- source_word: וּבְיוֹם שִׁשָּׁה עָשָׂר לַחֹדֶשׁ הָרִאשׁוֹן
  english_pob_choice: and on the sixteenth day of the first month
  chosen_spanish: el día dieciséis del primer mes
  alternatives_spanish:
  - el dieciséis del primer mes
  - en el día dieciséis del primer mes
  lexicon: HALOT
  rationale: Se conserva la fórmula de fecha hebrea de modo idiomático en español. «Día dieciséis» evita una traducción rígida y sigue el patrón calendárico del versículo.
- source_word: כִּלּוּ
  english_pob_choice: they finished
  chosen_spanish: terminaron
  alternatives_spanish:
  - acabaron
  - completaron
  lexicon: HALOT
  rationale: El verbo culmina la acción iniciada al comienzo del versículo. «Terminaron» es natural y transmite con claridad el cierre del proceso ritual.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La lectura del POB preserva el nombre divino como nombre propio. En español, «Yahvé» es la forma estándar del proyecto para reflejar el Tetragrama sin convertirlo en una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Elección de «consagrar» para קדשׁ
  english_pob_reading: to consecrate / consecrated
  chosen_spanish_reading: consagrar / consagraron
  alternative_spanish_readings:
  - santificar / santificaron
  - dedicar / dedicaron
  rationale: La acción descrita es la preparación ritual del templo para uso sagrado. «Consagrar» conserva mejor ese matiz institucional y ceremonial que «santificar», que en español puede sonar más moral o abstracto.
  doctrine_reference: HALOT; contexto cultual de 2 Crónicas 29
- issue: «Casa de Yahvé» como designación del templo
  english_pob_reading: the house of Yahweh
  chosen_spanish_reading: la casa de Yahvé
  alternative_spanish_readings:
  - el templo de Yahvé
  - la casa del Señor
  rationale: Se mantiene la expresión bíblica «casa de Yahvé» porque el hebreo usa בֵּית יְהוָה. «Templo» sería correcto por sentido, pero altera la imagen textual establecida en el pasaje.
  doctrine_reference: Uso contextual de בֵּית יְהוָה en Crónicas
translation_notes:
  revision_awareness: El contexto inglés presenta alta concordancia con el hebreo y no requiere revisión sustantiva. Se mantuvo la secuencia temporal exacta del versículo, la cohesión léxica de קדשׁ con «consagrar», y la convención del POB para el nombre divino en español como «Yahvé».
  spanish_consistency_notes:
  - Se mantuvo el mismo verbo («consagrar») para ambas ocurrencias de קדשׁ, como en el audit trail inglés.
  - «Yahvé» se usó de forma consistente para יְהוָה en todo el versículo.
  - 'La cronología se preservó sin ampliar ni reducir la duración indicada: inicio el día 1, llegada el día 8, finalización el día 16.'
  - «Casa de Yahvé» conserva la formulación bíblica del templo y evita sustituirla por un término más interpretativo.
