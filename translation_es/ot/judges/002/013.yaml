translation:
  language: es
  text: Abandonaron a Yahvé y sirvieron a Baal y a las Ashtorets[a][b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desampararon a Yahvé».
    reason: lexical_alternative
  - marker: b
    text: O «adoraron a Baal y a las Ashtorets».
    reason: lexical_alternative
  - marker: c
    text: El hebreo dice «las Ashtorets», una forma plural; puede referirse a múltiples manifestaciones o imágenes de la diosa también conocida como Astarté o Ashtóret.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעַזְבוּ
  english_pob_choice: abandoned
  chosen_spanish: abandonaron
  alternatives_spanish:
  - dejaron
  - desampararon
  - desertaron
  lexicon: HALOT
  rationale: עזב expresa dejar, abandonar o forsake. En español, «abandonaron» comunica con claridad la deslealtad del pacto sin sonar arcaico. «Dejaron» es más débil; «desampararon» y «desertaron» no son tan naturales aquí.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como «Yahvé» conforme al criterio confesional y de transparencia textual del proyecto. Se evita la sustitución por un título como «el SEÑOR» para mantener el nombre propio divino del hebreo.
- source_word: וַיַּעַבְדוּ
  english_pob_choice: served
  chosen_spanish: sirvieron
  alternatives_spanish:
  - adoraron
  - rindieron culto a
  lexicon: HALOT
  rationale: עבד en contextos cultuales puede significar servir o rendir culto. «Sirvieron» conserva la amplitud semántica y sigue de cerca el verbo hebreo; el sentido idolátrico se entiende por el contexto y los objetos mencionados.
- source_word: לַבַּעַל
  english_pob_choice: Baal
  chosen_spanish: Baal
  alternatives_spanish:
  - el Baal
  lexicon: HALOT
  rationale: Aunque el hebreo lleva artículo, en español el nombre propio se expresa naturalmente como «Baal». Mantener «el Baal» sonaría forzado y no aporta claridad.
- source_word: וְלָעַשְׁתָּרֽוֹת
  english_pob_choice: the Ashtoreths
  chosen_spanish: las Astartes
  alternatives_spanish:
  - las Ashtarot
  - las Astorets
  - las Ashtoreths
  lexicon: HALOT
  rationale: El hebreo está en plural; «las Astartes» preserva esa pluralidad y remite al conjunto de figuras/cultos asociados con Ashtoreth/Astarté. En español, esta forma es más inteligible que transliteraciones más rígidas, sin borrar el plural del original.
theological_decisions:
- issue: Plural de עשתרות
  english_pob_reading: the Ashtoreths
  chosen_spanish_reading: las Astartes
  alternative_spanish_readings:
  - Ashtoreth
  - las Ashtarot
  - las Ashtoreths
  rationale: Se mantiene la fuerza polémica del plural hebreo y no se reduce a una sola diosa. «Las Astartes» comunica una pluralidad de manifestaciones, imágenes o cultos vinculados a la misma deidad, en línea con la nota inglesa.
  doctrine_reference: Translation philosophy §3, §5
- issue: Valor cultual de עבד con deidades paganas
  english_pob_reading: served
  chosen_spanish_reading: sirvieron
  alternative_spanish_readings:
  - adoraron
  - rindieron culto
  rationale: «Sirvieron» conserva el alcance léxico de עבד y evita introducir una glosa más estrecha que el hebreo no exige. La lectura idolátrica queda garantizada por el objeto del verbo.
  doctrine_reference: 'Translation philosophy: optimal equivalence; original-language primacy'
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del expediente, que precisó el equivalente plural de עשתרות y mantuvo la lectura directa del verbo cultual. En español se conserva esa decisión, evitando singularizar la referencia y preservando la diferencia entre «sirvieron» y una paráfrasis más interpretativa como «adoraron».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como equivalente del Nombre divino, en coherencia con el estándar del proyecto.
  - Se conserva «Baal» sin artículo para respetar el uso nominal natural en español.
  - Se refleja el plural hebreo de עשתרות con «las Astartes», y la nota explica la posible referencia colectiva.
  - El verbo «sirvieron» conserva la ambigüedad cultual del hebreo, sin forzar una equivalencia exclusivamente devocional.
