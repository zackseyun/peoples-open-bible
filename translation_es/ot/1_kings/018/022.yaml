translation:
  language: es
  text: 'Entonces Elías dijo al pueblo: «Yo, yo solo, he quedado como profeta de Yahvé[a], pero los profetas de Baal son cuatrocientos cincuenta hombres».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Yo solo permanezco como profeta de Yahvé». La afirmación de Elías refleja su situación pública presente en esta confrontación, aunque en otras partes del relato se menciona que Abdías había escondido a otros profetas (1 R. 18:4, 13).'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «Entonces» reproduce bien ese avance en español sin forzar un calco.
- source_word: אֵלִיָּהוּ
  english_pob_choice: Elijah
  chosen_spanish: Elías
  alternatives_spanish:
  - Elias
  lexicon: convención bíblica hispana
  rationale: El nombre propio se vierte con la forma bíblica estándar en español, clara y reconocible para la lectura eclesial.
- source_word: אֶל הָעָם
  english_pob_choice: to the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - al pueblo reunido
  - a la gente
  lexicon: HALOT
  rationale: En este contexto histórico, הָעָם se refiere al pueblo de Israel reunido; «pueblo» es más preciso y natural que «gente».
- source_word: אֲנִי
  english_pob_choice: I
  chosen_spanish: Yo, yo
  alternatives_spanish:
  - Yo
  - Yo mismo
  lexicon: HALOT
  rationale: La repetición conserva el énfasis del pronombre explícito hebreo y refleja la revisión inglesa que duplicó «I» para marcar la fuerza enfática.
- source_word: נוֹתַרְתִּי
  english_pob_choice: am left
  chosen_spanish: he quedado
  alternatives_spanish:
  - permanezco
  - he sido dejado
  lexicon: HALOT
  rationale: El verbo expresa el estado de quedar/ser dejado; «he quedado» comunica con naturalidad el resultado presente sin perder el sentido de remanencia.
- source_word: נָבִיא לַיהוָה
  english_pob_choice: as a prophet of Yahweh
  chosen_spanish: como profeta de Yahvé
  alternatives_spanish:
  - como profeta para Yahvé
  - como el profeta de Yahvé
  lexicon: HALOT
  rationale: «Como profeta de Yahvé» mantiene la relación de pertenencia y representación profética; «de Yahvé» sigue el valor del hebreo y el estándar POB para el nombre divino.
- source_word: לְבַדִּי
  english_pob_choice: alone
  chosen_spanish: solo
  alternatives_spanish:
  - solamente
  - por mí solo
  lexicon: HALOT
  rationale: «Solo» preserva la idea de aislamiento de manera directa y idiomática en español.
- source_word: וּנְבִיאֵי הַבַּעַל
  english_pob_choice: but the prophets of Baal
  chosen_spanish: pero los profetas de Baal
  alternatives_spanish:
  - y los profetas de Baal
  lexicon: HALOT
  rationale: El valor contrastivo del contexto se expresa mejor con «pero», como en la versión inglesa, sin añadir interpretación extra al texto hebreo.
- source_word: אַרְבַּע מֵאוֹת וַחֲמִשִּׁים אִישׁ
  english_pob_choice: four hundred and fifty men
  chosen_spanish: cuatrocientos cincuenta hombres
  alternatives_spanish:
  - 450 hombres
  - cuatrocientos cincuenta varones
  lexicon: HALOT
  rationale: Se conserva el conteo completo con el sustantivo humano explícito; «hombres» es la forma natural y fiel para אִישׁ en este pasaje.
theological_decisions:
- issue: Traducción del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el nombre divino propio; la política POB en español pide «Yahvé» para preservar ese nombre en vez de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Afirmación de exclusividad profética de Elías
  english_pob_reading: I, I alone, am left as a prophet of Yahweh
  chosen_spanish_reading: Yo, yo solo, he quedado como profeta de Yahvé
  alternative_spanish_readings:
  - Yo solo he quedado como profeta de Yahvé
  - Yo, yo solo, permanezco como profeta de Yahvé
  rationale: Se preserva la afirmación tal como se pronuncia en la escena, sin armonizarla con 1 Reyes 18:4, 13; así se conserva la tensión documental reconocida por la tradición auditada.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La versión inglesa revisada añadió la repetición enfática de «I»; el español la refleja con «Yo, yo» para conservar la intensidad del hebreo. También se mantuvo la lectura divina «Yahvé» según la política POB española y se conservó la tensión narrativa sobre la aparente soledad profética de Elías.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - «Profeta» se mantiene para נָבִיא; no se sustituye por un término eclesiástico más interpretativo.
  - «Baal» permanece sin transliteración adicional, siguiendo el uso bíblico habitual.
  - La numeración se expresa con palabras, en estilo bíblico natural para español publicado.
  - La nota al pie marca la posible lectura de «pueblo» sin alterar el texto principal.
