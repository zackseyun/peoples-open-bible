translation:
  language: es
  text: Demolieron delante de él los altares de los Baales, y cortó los altares de incienso[a] que estaban encima de ellos. Quebró y desmenuzó los Aserim[b], las imágenes talladas y las imágenes fundidas, y los esparció sobre las sepulturas de los que les habían sacrificado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los pilares solares». El término hebreo es incierto y puede referirse a pilares cultuales asociados con la adoración del sol.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «los postes de Asera».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְנַתְּצוּ
  english_pob_choice: they tore down
  chosen_spanish: demolieron
  alternatives_spanish:
  - derribaron
  - destruyeron
  lexicon: HALOT
  rationale: נתץ expresa derribar o hacer caer una estructura. «Demolieron» comunica bien la acción violenta y conserva el carácter plural del verbo hebreo, sin forzar un calco torpe en español.
- source_word: לְפָנָיו
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - en su presencia
  lexicon: HALOT
  rationale: La expresión indica que la acción ocurrió ante Josías. «Delante de él» es natural en español y mantiene la relación espacial/presencial del hebreo.
- source_word: מִזְבְּחוֹת הַבְּעָלִים
  english_pob_choice: the altars of the Baals
  chosen_spanish: los altares de los Baales
  alternatives_spanish:
  - los altares de Baal
  lexicon: HALOT
  rationale: El plural hebreo בְּעָלִים se refleja mejor con «Baales», preservando la idea de múltiples manifestaciones o señores cultuales, no un singular genérico.
- source_word: וְהַחַמָּנִים
  english_pob_choice: the incense altars
  chosen_spanish: los altares de incienso
  alternatives_spanish:
  - los pilares solares
  - los postes solares
  lexicon: HALOT
  rationale: Aunque el término es incierto, en este contexto de reforma cultual «altares de incienso» funciona con naturalidad en español y conserva la función cultual propuesta por la lectura principal en inglés.
- source_word: אֲשֶׁר לְמַעְלָה מֵעֲלֵיהֶם
  english_pob_choice: that were above them
  chosen_spanish: que estaban encima de ellos
  alternatives_spanish:
  - que estaban sobre ellos
  lexicon: HALOT
  rationale: La cláusula relativa describe su ubicación. «Encima de ellos» reproduce de forma clara la relación espacial sin añadir interpretación.
- source_word: גִּדֵּעַ
  english_pob_choice: he cut down
  chosen_spanish: cortó
  alternatives_spanish:
  - derribó
  - cortó de raíz
  lexicon: HALOT
  rationale: גדע se usa para cortar o talar cultos y objetos. «Cortó» es breve y permite que el contexto complete el sentido de tala o abatimiento.
- source_word: הָאֲשֵׁרִים
  english_pob_choice: the Asherim
  chosen_spanish: los Aserim
  alternatives_spanish:
  - los postes de Asera
  - las Aseras
  lexicon: HALOT
  rationale: Se conserva la transliteración para mantener la ambigüedad léxica del hebreo entre objetos de culto y su asociación con Asera, tal como hace la POB en inglés.
- source_word: הַפְּסִלִים
  english_pob_choice: the carved images
  chosen_spanish: las imágenes talladas
  alternatives_spanish:
  - los ídolos tallados
  - las figuras talladas
  lexicon: HALOT
  rationale: פסילים son imágenes esculpidas o talladas para culto. «Imágenes talladas» es preciso y entendible, sin reducirlo prematuramente a «ídolos».
- source_word: הַמַּסֵּכוֹת
  english_pob_choice: the metal images
  chosen_spanish: las imágenes fundidas
  alternatives_spanish:
  - las imágenes de metal
  - las estatuas fundidas
  lexicon: HALOT
  rationale: מסכות alude a ídolos fundidos. «Imágenes fundidas» preserva el procedimiento de fabricación y resulta más fiel que una generalización solo material.
- source_word: שִׁבַּר
  english_pob_choice: he shattered
  chosen_spanish: quebró
  alternatives_spanish:
  - hizo pedazos
  - destrozó
  lexicon: HALOT
  rationale: שבר expresa romper con fuerza. «Quebró» es un equivalente directo y digno; luego se refuerza con los verbos siguientes para conservar la intensidad.
- source_word: וְהֵדַק
  english_pob_choice: and crushed
  chosen_spanish: desmenuzó
  alternatives_spanish:
  - pulverizó
  - moli ó
  lexicon: HALOT
  rationale: הדק indica reducir a fragmentos finos o polvo. «Desmenuzó» comunica ese proceso mejor que un simple «rompió» y mantiene la progresión de destrucción.
- source_word: וַיִּזְרֹק
  english_pob_choice: and scattered them
  chosen_spanish: esparció
  alternatives_spanish:
  - arrojó
  - dispersó
  lexicon: HALOT
  rationale: זרק puede significar arrojar o esparcir. Como el objeto ya ha sido quebrado y desmenuzado, «esparció» recoge bien el resultado de la acción.
- source_word: עַל פְּנֵי הַקְּבָרִים
  english_pob_choice: over the graves
  chosen_spanish: sobre la superficie de las sepulturas
  alternatives_spanish:
  - sobre las sepulturas
  - encima de las tumbas
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «sobre el rostro/superficie de». «Sobre la superficie de las sepulturas» preserva esa imagen con claridad, sin perder el matiz físico del hebreo.
- source_word: הַזֹּבְחִים לָהֶם
  english_pob_choice: those who had sacrificed to them
  chosen_spanish: de los que les habían sacrificado
  alternatives_spanish:
  - de los que sacrificaban a ellos
  - de los que les sacrificaron
  lexicon: HALOT
  rationale: El participio identifica a personas ligadas al culto idolátrico; el perfecto compuesto español comunica que eran quienes habían ofrecido sacrificios a esos ídolos, en armonía con la lectura inglesa.
theological_decisions:
- issue: 'הַחַמָּנִים: término cultual incierto'
  english_pob_reading: the incense altars
  chosen_spanish_reading: los altares de incienso
  alternative_spanish_readings:
  - los pilares solares
  - los postes solares
  rationale: El hebreo es lexicográficamente incierto. La lectura principal en español sigue la decisión contextual del inglés, pero se conserva la alternativa más tradicional en nota para no borrar la tensión léxica.
  doctrine_reference: Terminología cultual y principio de transparencia textual
- issue: 'הָאֲשֵׁרִים: ambigüedad entre objetos y asociación a Asera'
  english_pob_reading: the Asherim
  chosen_spanish_reading: los Aserim
  alternative_spanish_readings:
  - los postes de Asera
  - las Aseras
  rationale: La transliteración mantiene la ambigüedad del término hebreo, evitando imponer una reconstrucción interpretativa más cerrada de lo que el texto permite.
  doctrine_reference: Transparencia léxica y cautela exegética
translation_notes:
  revision_awareness: Se tomó como base la decisión auditada del inglés POB (traducción óptima con notas de alternativa) y no se detectaron revisiones posteriores con cambios; la versión española conserva esa misma distribución de claridad principal y alternativa lexical en nota.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque no aparece el tetragrámaton en este texto.
  - Se conservó la pluralidad cultual en «Baales» y «Aserim» para reflejar el hebreo plural.
  - Se eligieron verbos intensivos en serie («quebró, desmenuzó y esparció») para reproducir la secuencia de destrucción del original.
  - «Sepulturas» se usa como equivalente amplio y digno de קְבָרִים, compatible con el contexto narrativo.
