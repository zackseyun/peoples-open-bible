    text: Or 'My Spirit will not abide/remain in man forever'; the Hebrew verb is difficult and may carry the sense of remaining rather than contending.
    reason: alternative_reading
  - marker: b
    text: '''Man'' here translates Hebrew adam, a singular term used generically for humankind.'
    reason: lexical_alternative
  - marker: c
    text: Or 'because he also is flesh'.
    reason: previous_rendering
