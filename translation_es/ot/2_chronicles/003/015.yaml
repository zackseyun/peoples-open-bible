translation:
  language: es
  text: Delante de la casa hizo dos columnas, de treinta y cinco codos de altura[b], y el capitel que estaba sobre la parte superior[a] de cada una medía cinco codos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «sobre su cabeza». El sufijo singular probablemente se entiende distributivamente: sobre la cabeza de cada una de las columnas.'
    reason: lexical_alternative
  - marker: b
    text: El texto hebreo dice literalmente «treinta y cinco codos de longitud». El pasaje paralelo de 1 Reyes 7:15 da dieciocho codos para la altura de cada columna, lo que lleva a algunos a entender aquí una medida combinada o a reconocer una dificultad textual.
    reason: cross_reference
lexical_decisions:
- source_word: לִפְנֵי הַבַּיִת
  english_pob_choice: In front of the house
  chosen_spanish: Delante de la casa
  alternatives_spanish:
  - en frente de la casa
  - ante la casa
  - delante del templo
  lexicon: HALOT
  rationale: לִפְנֵי expresa ubicación frontal, y en español 'delante de' reproduce con naturalidad ese valor. 'Casa' conserva el término del hebreo y evita introducir 'templo', que sería más interpretativo.
- source_word: עַמּוּדִים שְׁנַיִם
  english_pob_choice: two pillars
  chosen_spanish: dos columnas
  alternatives_spanish:
  - dos pilares
  - dos soportes arquitectónicos
  lexicon: HALOT
  rationale: Aunque 'pilares' es posible, 'columnas' es una equivalencia arquitectónica natural en español y encaja bien en este contexto del edificio sagrado. Mantiene el carácter estructural del hebreo sin sonar áspera.
- source_word: אַמּוֹת שְׁלֹשִׁים וְחָמֵשׁ אֹרֶךְ
  english_pob_choice: thirty-five cubits high
  chosen_spanish: de treinta y cinco codos de altura
  alternatives_spanish:
  - de treinta y cinco codos de alto
  - treinta y cinco codos de altura
  lexicon: HALOT
  rationale: La revisión inglesa aclara que la medida se refiere a la altura, no solo a una longitud abstracta. En español, 'de treinta y cinco codos de altura' comunica bien la medida preservando la unidad antigua.
- source_word: הַצֶּפֶת
  english_pob_choice: the capital
  chosen_spanish: el capitel
  alternatives_spanish:
  - la corona
  - la pieza superior
  - el remate
  lexicon: HALOT
  rationale: En lenguaje arquitectónico español, 'capitel' es el equivalente preciso de la parte ornamental superior de una columna. Es más exacto que una paráfrasis como 'pieza superior'.
- source_word: אֲשֶׁר עַל רֹאשׁוֹ
  english_pob_choice: that was on the top of each
  chosen_spanish: que estaba sobre la cabeza de cada una
  alternatives_spanish:
  - que estaba sobre su cabeza
  - que estaba sobre el remate de cada una
  lexicon: HALOT
  rationale: El hebreo usa un sufijo singular con sentido distributivo, como señala la nota inglesa. 'De cada una' conserva esa distribución. 'Cabeza' mantiene el literal hebreo de רֹאשׁ, aunque en español arquitectónico también podría decirse 'sobre la parte superior'.
- source_word: אַמּוֹת חָמֵשׁ
  english_pob_choice: five cubits
  chosen_spanish: medía cinco codos
  alternatives_spanish:
  - era de cinco codos
  - tenía cinco codos
  lexicon: HALOT
  rationale: La frase final describe la medida del capitel. 'Medía cinco codos' es natural en español y reproduce el dato dimensional sin añadir interpretación.
theological_decisions:
- issue: Tratamiento del nombre divino en un versículo puramente arquitectónico
  english_pob_reading: No appears in the verse; no masking needed
  chosen_spanish_reading: No aparece en el versículo; no se requiere ninguna convención de ocultamiento
  alternative_spanish_readings:
  - usar 'SEÑOR' por convención general
  - introducir 'Yahvé' sin base textual
  rationale: El hebreo de este versículo no contiene el nombre divino. Por tanto, no hay motivo para introducir 'Yahvé' ni para usar una convención de sustitución. Se conserva la descripción arquitectónica sin carga teológica añadida.
  doctrine_reference: No aplica; decisión de fidelidad textual
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que cambió 'long' por 'high' para las columnas, por considerar que la medida se refiere a su altura en contexto. La versión española sigue esa corrección y también conserva la nota de dificultad con 1 Reyes 7:15. Además, se mantuvo la lectura distributiva del sufijo singular en 'cada una'.
  spanish_consistency_notes:
  - Se mantiene 'codos' como unidad de medida antigua, sin conversión a unidades modernas.
  - Se preserva el paralelismo entre la medida de las columnas y la del capitel.
  - '''Casa'' se conserva como traducción de הַבַּיִת para no interpretar prematuramente como ''templo''.'
  - '''Capitel'' queda como término técnico arquitectónico estándar en español.'
  - No hay vocabulario del pacto o del nombre divino en este versículo, por lo que la terminología teológica de POB no necesita activación aquí.
