revisions:
- from: 'David dijo a Mical[a]: «Fue delante de Yahvé, quien me escogió en lugar de tu padre y en lugar de toda su casa, para designarme gobernante sobre el pueblo de Yahvé, sobre Israel; y danzaré[b] delante de Yahvé».'
  to: 'David dijo a Mical: «Fue ante Yahvé, quien me escogió en lugar de tu padre y en lugar de toda su casa, para designarme gobernante sobre el pueblo de Yahvé, sobre Israel; y dancé[a] ante Yahvé».'
  rationale: Se corrigió el verbo final de futuro a pasado para reflejar fielmente וְשִׂחַקְתִּי. Se eliminó la nota innecesaria sobre «Mical». También se ajustó «delante de» a «ante» por mayor naturalidad, manteniendo el mismo sentido y la repetición enfática del hebreo.
