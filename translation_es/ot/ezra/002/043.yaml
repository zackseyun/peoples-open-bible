translation:
  language: es
  text: 'Los servidores del templo: los hijos de Ziha[a], los hijos de Hasufa[c][b], los hijos de Tabbaot.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los netinim»; tradicionalmente se translitera en lugar de traducirse. El término se refiere a una clase de servidores vinculados al servicio del templo.'
    reason: lexical_alternative
  - marker: b
    text: O «descendientes de» en cada repetición de «hijos de»; la fórmula genealógica hebrea puede designar una línea familiar o clan, no solo hijos inmediatos.
    reason: lexical_alternative
  - marker: c
    text: Hasufa también puede transliterarse «Hashufa».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנְּתִינִים
  english_pob_choice: the temple servants
  chosen_spanish: los sirvientes del templo
  alternatives_spanish:
  - los netinim
  - los dados
  - los servidores del templo
  lexicon: HALOT
  rationale: El hebreo designa una clase reconocida asociada al servicio del santuario; en español, 'sirvientes del templo' comunica esa función con claridad sin ocultar el valor histórico del término. Se evita transliterar como forma principal porque el texto apunta a una lista funcional, no a un tecnicismo conocido por el lector general.
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - la familia de
  lexicon: HALOT
  rationale: En listas genealógicas, בְּנֵי puede señalar linaje o clan. 'Los hijos de' conserva la fórmula repetida del hebreo y coincide con el registro formal del pasaje.
- source_word: צִיחָא
  english_pob_choice: Ziha
  chosen_spanish: Ziha
  alternatives_spanish:
  - Ziha
  lexicon: transliteración estándar
  rationale: Es un nombre propio; se mantiene transliterado para preservar la identificación del grupo en la lista.
- source_word: חֲשׂוּפָא
  english_pob_choice: Hasupha
  chosen_spanish: Hasufa
  alternatives_spanish:
  - Hashufa
  lexicon: transliteración estándar
  rationale: Se translitera el nombre propio. En español se prefiere 'Hasufa' para una forma más natural y legible, aunque se reconoce la variante inglesa 'Hashupha'.
- source_word: טַבָּעוֹת
  english_pob_choice: Tabbaoth
  chosen_spanish: Tabbaot
  alternatives_spanish:
  - Tabbaot
  lexicon: transliteración estándar
  rationale: Se trata de un nombre de clan en este contexto, no de un sustantivo común. En español se conserva la forma transliterada, adaptando la terminación gráfica al uso hispano ('Tabbaot').
translation_notes:
  revision_awareness: La comparación con la traducción inglesa auditada muestra alto acuerdo y ninguna revisión aplicada; se mantiene la misma estructura genealógica y la decisión léxica de interpretar הַנְּתִינִים como una clase de servicio del templo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto cuando aparezca el Tetragrámaton, aunque este versículo no lo contiene.
  - Se usa 'sirvientes del templo' para reflejar la función cultual de הַנְּתִינִים, evitando una transliteración opaca en el texto principal.
  - Se conserva la repetición de 'los hijos de' para respetar la forma genealógica del hebreo.
  - Los nombres propios se transliteran de forma consistente y se deja constancia de variantes ortográficas cuando el audit trail las documenta.
