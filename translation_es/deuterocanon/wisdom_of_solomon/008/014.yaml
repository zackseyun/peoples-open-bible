translation:
  language: es
  text: Yo gobernaré a los pueblos, y las naciones me estarán sujetas;
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: διοικήσω
  english_pob_choice: I will govern
  chosen_spanish: gobernaré
  alternatives_spanish:
  - administraré
  - reinaré
  lexicon: LSJ
  rationale: διοικέω expresa dirigir, administrar o gobernar. «Gobernaré» conserva el sentido político de liderazgo sobre pueblos sin reducirlo a gestión burocrática ni intensificarlo innecesariamente con «reinaré».
- source_word: λαούς
  english_pob_choice: peoples
  chosen_spanish: a los pueblos
  alternatives_spanish:
  - a la gente
  - a las naciones
  lexicon: LSJ
  rationale: La pluralidad de λαούς se refleja mejor con «los pueblos», que mantiene el valor colectivo plural. «Naciones» se reserva para ἔθνη en la segunda cláusula, preservando la distinción léxica.
- source_word: ἔθνη
  english_pob_choice: nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los gentiles
  - los pueblos
  lexicon: LSJ
  rationale: En este contexto político, ἔθνη se traduce naturalmente como «naciones». «Gentiles» introduciría una oposición religiosa que el griego no exige aquí.
- source_word: ὑποταγήσεταί
  english_pob_choice: will be subject
  chosen_spanish: me estarán sujetas
  alternatives_spanish:
  - se someterán a mí
  - me serán sometidas
  lexicon: LSJ
  rationale: La forma futura pasiva/média de ὑποτάσσω se vierte con una construcción natural en español que expresa subordinación. «Me estarán sujetas» conserva el matiz de sujeción sin cargar tanto como «me serán sometidas» ni desplazar el énfasis hacia la voluntad con «se someterán a mí».
- source_word: μοι
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  - ante mí
  lexicon: LSJ
  rationale: El dativo se expresa de modo idiomático con el clítico «me» en español; mantiene la relación de subordinación personal marcada por el griego.
translation_notes:
  revision_awareness: El texto griego coincide con el pasaje auditado del override normalizado, y la versión inglesa POB confirma una lectura política de gobierno y sujeción sin variantes textuales relevantes.
