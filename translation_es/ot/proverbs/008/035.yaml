translation:
  language: es
  text: Pues quien me encuentra, encuentra la vida y obtiene favor de Yahvé.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación o fundamento de la exhortación anterior. «Porque» conserva bien la relación causal/discursiva en español sin sonar forzado.
- source_word: מֹצְאִי
  english_pob_choice: whoever finds me
  chosen_spanish: el que me encuentra
  alternatives_spanish:
  - quien me encuentra
  - quienquiera que me encuentre
  lexicon: HALOT
  rationale: La forma hebrea expresa al hallador en singular genérico referido a la Sabiduría personificada. «El que me encuentra» refleja esa construcción de modo natural en español y mantiene la referencia singular sin limitarla al masculino biológico.
- source_word: חַיִּים
  english_pob_choice: life
  chosen_spanish: la vida
  alternatives_spanish:
  - vida
  - las vidas
  lexicon: HALOT
  rationale: Aunque la forma es plural, en este contexto sapiencial funciona idiomáticamente como «vida». En español, el singular con artículo definido comunica con claridad ese valor.
- source_word: וַיָּפֶק
  english_pob_choice: obtains
  chosen_spanish: obtiene
  alternatives_spanish:
  - consigue
  - recibe
  - alcanza
  lexicon: HALOT
  rationale: El verbo puede expresar obtener o sacar/traer. Aquí el paralelismo con «favor de Yahvé» favorece un verbo que indique resultado adquirido; «obtiene» es natural y suficientemente cercano al sentido léxico.
- source_word: רָצוֹן
  english_pob_choice: favor
  chosen_spanish: favor
  alternatives_spanish:
  - benevolencia
  - agrado
  - buena voluntad
  lexicon: HALOT
  rationale: En este contexto denota benevolencia o favor divino concedido por Yahvé. «Favor» es breve, idiomático y preserva la relación personal implícita.
- source_word: מֵיְהוָה
  english_pob_choice: from Yahweh
  chosen_spanish: de Yahvé
  alternatives_spanish:
  - de parte de Yahvé
  - procedente de Yahvé
  lexicon: HALOT
  rationale: 'La preposición marca procedencia: el favor viene de Yahvé. Siguiendo el criterio terminológico del proyecto, se usa «Yahvé» en el texto principal, no una sustitución por «SEÑOR».'
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: from Yahweh
  chosen_spanish_reading: de Yahvé
  alternative_spanish_readings:
  - del SEÑOR
  - de Jehová
  rationale: El hebreo contiene el Tetragrámaton יְהוָה. En coherencia con las normas del proyecto, se translitera como «Yahvé» en el texto principal para no ocultar el nombre pactal divino.
  doctrine_reference: Project terminology default for יהוה / YHWH
- issue: Sujeto genérico singular en sabiduría personificada
  english_pob_reading: whoever finds me
  chosen_spanish_reading: el que me encuentra
  alternative_spanish_readings:
  - quien me encuentra
  - quienquiera que me encuentre
  rationale: El hebreo usa un singular genérico. «El que» conserva la estructura singular y resulta natural en español bíblico contemporáneo, sin introducir una restricción de género que el original no impone.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
translation_notes:
  revision_awareness: El texto inglés POB leído para este versículo ya muestra un acuerdo alto y no presenta notas textuales ni revisiones aplicadas. La versión española sigue ese mismo estado de alta concordancia, conservando el sentido causal inicial, el sujeto genérico singular, el valor idiomático de חַיִּים como «vida», y el nombre divino como Yahvé.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de manera consistente para יהוה.
  - Se evita «Cristo/Mesías» porque no aparece en el versículo.
  - No se añade nota de pie porque el versículo no presenta variante textual ni alternativa lexical que requiera anclaje explícito.
  - El paralelismo semántico entre «vida» y «favor de Yahvé» queda claro en español sin necesidad de ampliación interpretativa.
