  - severity: low
    issue: '''Sea tenido por bosque'' suena algo forzado en español actual'
    rationale: Aunque es defendible, 'sea considerado bosque' o 'sea considerado como bosque' comunica mejor el valor de יֵחָשֵׁב sin rigidez innecesaria.
