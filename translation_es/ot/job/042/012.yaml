translation:
  language: es
  text: Yahvé bendijo el último tramo de la vida de Job[a] más que su principio. Y tuvo catorce mil ovejas, seis mil camellos, mil yuntas de bueyes[b] y mil asnas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el último de Job más que su principio».'
    reason: lexical_alternative
  - marker: b
    text: O «mil pares de ganado» o «mil equipos de bueyes».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: DOCTRINE.md / YHWH
  rationale: El nombre divino aparece explícitamente en el hebreo; en español, la política del proyecto pide conservarlo como 'Yahvé' en lugar de ocultarlo tras una convención litúrgica.
- source_word: בֵּרַךְ
  english_pob_choice: blessed
  chosen_spanish: bendijo
  alternatives_spanish:
  - prosperó
  - favoreció
  lexicon: HALOT
  rationale: El verbo expresa bendición divina real, no solo éxito material. 'Bendijo' mantiene el sujeto teológico de la acción y sigue siendo natural en español.
- source_word: אַחֲרִית אִיּוֹב
  english_pob_choice: the latter days of Job
  chosen_spanish: el último tramo de la vida de Job
  alternatives_spanish:
  - los últimos días de Job
  - el final de Job
  lexicon: HALOT
  rationale: אַחֲרִית puede referirse al período posterior o desenlace; en español, 'último tramo de la vida' comunica esa etapa final sin reducirla solo a los días postreros.
- source_word: מֵרֵאשִׁיתוֹ
  english_pob_choice: more than his beginning
  chosen_spanish: más que su principio
  alternatives_spanish:
  - más que al principio
  - más que su estado anterior
  lexicon: HALOT
  rationale: La comparación con la condición inicial de Job se conserva con una formulación breve y fiel. 'Principio' reproduce bien el contraste con רֵאשִׁית.
- source_word: וַיְהִי לוֹ
  english_pob_choice: he had
  chosen_spanish: tuvo
  alternatives_spanish:
  - había para él
  - le pertenecieron
  lexicon: HALOT
  rationale: La construcción existencial hebrea se vierte de modo idiomático con 'tuvo', manteniendo el sentido de posesión o disponibilidad sin forzar el español.
- source_word: אַרְבָּעָה עָשָׂר אֶלֶף צֹאן
  english_pob_choice: fourteen thousand sheep
  chosen_spanish: catorce mil ovejas
  alternatives_spanish:
  - catorce mil cabezas de ganado menor
  - catorce mil animales menores
  lexicon: HALOT
  rationale: צֹאן es un colectivo de ganado menor; en este contexto 'ovejas' es la forma más natural y tradicionalmente entendible en español, sin perder la referencia al rebaño.
- source_word: שֵׁשֶׁת אֲלָפִים גְּמַלִּים
  english_pob_choice: six thousand camels
  chosen_spanish: seis mil camellos
  alternatives_spanish:
  - seis mil dromedarios
  lexicon: HALOT
  rationale: Correspondencia directa y transparente con el término hebreo.
- source_word: אֶלֶף צֶמֶד בָּקָר
  english_pob_choice: a thousand yoke of oxen
  chosen_spanish: mil yuntas de bueyes
  alternatives_spanish:
  - mil pares de bueyes
  - mil equipos de bueyes
  lexicon: HALOT
  rationale: צֶמֶד designa un yugo o par apareado; 'yuntas de bueyes' comunica bien el sentido agrícola y conserva la imagen de trabajo en pareja.
- source_word: אֶלֶף אֲתוֹנוֹת
  english_pob_choice: a thousand female donkeys
  chosen_spanish: mil asnas
  alternatives_spanish:
  - mil burras
  - mil asnas hembras
  lexicon: HALOT
  rationale: אֲתוֹנוֹת nombra específicamente asnas hembra. 'Asnas' es el equivalente breve y exacto en español.
theological_decisions:
- issue: Nombre divino יהוה / YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se preserva el nombre propio del pacto en lugar de una sustitución reverencial. La forma 'Yahvé' es la decisión de la serie para español y mantiene trazabilidad con el hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH'
- issue: La bendición de Yahvé como restauración concreta
  english_pob_reading: blessed
  chosen_spanish_reading: bendijo
  alternative_spanish_readings:
  - prosperó
  - favoreció
  rationale: La bendición divina aquí se manifiesta en bienes concretos, pero el verbo sigue siendo teológico y no meramente económico. 'Bendijo' conserva esa tensión sin reducirla.
  doctrine_reference: Job 42:12 context within Job 1:3 and restoration motif
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión más reciente del POB inglés: se mantuvo el equivalente dinámico para אַחֲרִית como una referencia al período final de la vida de Job, y se conservó la cifra y la lista de bienes como en el texto hebreo. La adaptación española evita el calco torpe de ''the latter part'' y conserva la transparencia audit-able del cambio de ''LORD'' a ''Yahweh''.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יהוה de manera consistente con el proyecto en español.
  - Se traduce צֹאן como 'ovejas' en este contexto, siguiendo la lectura contextual de ganado menor y la lista de restauración.
  - Se mantiene 'bueyes' en 'yuntas de bueyes' para reflejar el sentido agrícola de צֶמֶד בָּקָר.
  - Se emplea 'asnas' para אֲתוֹנוֹת, preservando el rasgo de femenino explícito.
  - La nota [a] está anclada al segmento 'Job[a]' y la nota [b] a 'bueyes[b]', sin marcadores sueltos.
