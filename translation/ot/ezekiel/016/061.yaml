id: EZK.16.61
reference: Ezekiel 16:61
source:
  edition: WLC
  text: וְ/זָכַ֣רְתְּ אֶת דְּרָכַיִ/ךְ֮ וְ/נִכְלַמְתְּ֒ בְּ/קַחְתֵּ֗/ךְ אֶת אֲחוֹתַ֨יִ/ךְ֙ הַ/גְּדֹל֣וֹת מִמֵּ֔/ךְ אֶל הַ/קְּטַנּ֖וֹת מִמֵּ֑/ךְ וְ/נָתַתִּ֨י אֶתְ/הֶ֥ן לָ֛/ךְ לְ/בָנ֖וֹת וְ/לֹ֥א מִ/בְּרִיתֵֽ/ךְ־־־׃
translation:
  text: Then you will remember your ways and be ashamed when you receive your sisters[a], those older than you along with those younger than you; and I will give them to you as daughters[b], but not because of your covenant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'when you take your sisters, those older than you and those younger than you.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'not because of your covenant' indicates that this restoration does not arise from Jerusalem's own covenantal claim or merit.
    reason: cross_reference
lexical_decisions:
- source_word: וְזָכַרְתְּ
  chosen: Then you will remember
  alternatives:
  - And you will remember
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic discourse often carries a future/result sense in context. 'Then' brings out the consequential force from the preceding restoration context, while 'remember' preserves the core lexical meaning of זכר.
- source_word: דְּרָכַיִךְ
  lemma: דֶּרֶךְ
  chosen: your ways
  alternatives:
  - your conduct
  - your behavior
  lexicon: HALOT
  rationale: דֶּרֶךְ literally means 'way,' and in moral contexts refers to one's conduct. 'Your ways' preserves the Hebrew metaphor and is idiomatic in prophetic rebuke.
- source_word: וְנִכְלַמְתְּ
  chosen: and be ashamed
  alternatives:
  - and be humiliated
  - and be disgraced
  lexicon: HALOT
  rationale: נכלם denotes shame or humiliation. 'Be ashamed' is the most natural English rendering here and fits the inward moral response emphasized in the context.
- source_word: בְּקַחְתֵּךְ
  chosen: when you receive
  alternatives:
  - when you take
  - in your taking
  lexicon: HALOT
  rationale: 'The infinitive construct with ב can be temporal here: ''when you take/receive.'' ''Receive'' fits the relational-restorative context better than the more wooden ''take'' without over-paraphrasing.'
- source_word: אֲחוֹתַיִךְ
  chosen: your sisters
  lexicon: HALOT
  rationale: Literal familial language is central to the allegory of Jerusalem, Samaria, and Sodom in this chapter, so 'your sisters' should be retained.
- source_word: הַגְּדֹלוֹת מִמֵּךְ אֶל הַקְּטַנּוֹת מִמֵּךְ
  chosen: those older than you along with those younger than you
  alternatives:
  - those greater than you to those smaller than you
  - your older sisters and your younger sisters
  lexicon: HALOT
  rationale: The adjectives literally mean 'greater' and 'smaller,' but in the sibling metaphor they naturally denote older and younger sisters. Rendering both groups explicitly clarifies the idiom while preserving the familial imagery. 'Along with' reflects אֶל here as joining the two groups.
- source_word: וְנָתַתִּי אֶתְהֶן לָךְ לְבָנוֹת
  chosen: and I will give them to you as daughters
  alternatives:
  - and I will give them to you for daughters
  lexicon: HALOT
  rationale: The idiom לְבָנוֹת is best rendered 'as daughters' in contemporary English. This preserves the metaphor of dependent incorporation under Jerusalem.
- source_word: וְלֹא מִבְּרִיתֵךְ
  chosen: but not because of your covenant
  alternatives:
  - but not from your covenant
  - and not by your covenant
  lexicon: HALOT
  rationale: The phrase denies that this gift arises from Jerusalem's covenant. 'Because of' communicates source/ground clearly in English. The adversative 'but' makes the contrast explicit and natural.
