translation:
  language: es
  text: Sión oyó y se alegró; y las hijas[a] de Judá exultaron por causa de tus juicios, oh Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las ciudades de Judá» o «las aldeas de Judá»; el hebreo dice literalmente «las hijas de Judá», una expresión poética que puede referirse a las comunidades vecinas de Judá.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמְעָה
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - ha oído
  - escuchó
  lexicon: HALOT
  rationale: El verbo שׁמע aquí expresa una acción completa en el poema. En español, el pretérito simple «oyó» conserva esa idea de pasado puntual y encaja bien con la secuencia poética.
- source_word: וַתִּשְׂמַח
  english_pob_choice: and rejoiced
  chosen_spanish: y se alegró
  alternatives_spanish:
  - y se regocijó
  - y se gozó
  lexicon: HALOT
  rationale: שׂמח comunica alegría/rejozo. «Se alegró» es natural en español y mantiene el valor verbal sin cargarlo con un tono más interpretativo que el hebreo.
- source_word: צִיּוֹן
  english_pob_choice: Zion
  chosen_spanish: Sion
  alternatives_spanish:
  - Zión
  - Zion
  lexicon: HALOT
  rationale: Se conserva el nombre propio bíblico en forma usual en español («Sion»), en lugar de traducirlo o explicarlo dentro del texto.
- source_word: וַתָּגֵלְנָה
  english_pob_choice: exulted
  chosen_spanish: exultaron
  alternatives_spanish:
  - se regocijaron
  - saltaron de gozo
  lexicon: HALOT
  rationale: גיל suele expresar un gozo más exuberante que שׂמח. «Exultaron» preserva esa intensidad y evita repetir simplemente «se alegró».
- source_word: בְּנוֹת יְהוּדָה
  english_pob_choice: the daughters of Judah
  chosen_spanish: las hijas de Judá
  alternatives_spanish:
  - las ciudades de Judá
  - las aldeas de Judá
  - las mujeres de Judá
  lexicon: HALOT
  rationale: La expresión se mantiene literalmente en el texto principal para no borrar la forma poética hebrea ni resolver de antemano su posible sentido idiomático/geográfico.
- source_word: לְמַעַן
  english_pob_choice: because of
  chosen_spanish: por causa de
  alternatives_spanish:
  - porque
  - a causa de
  - por
  lexicon: HALOT
  rationale: En este contexto introduce la razón del gozo. «Por causa de» comunica la relación causal de manera fiel y suficientemente natural en español.
- source_word: מִשְׁפָּטֶיךָ
  english_pob_choice: your judgments
  chosen_spanish: tus juicios
  alternatives_spanish:
  - tu justicia
  - tus decisiones judiciales
  - tus sentencias
  lexicon: HALOT
  rationale: מִשְׁפָּט puede abarcar juicios, decisiones judiciales o actos de justicia. «Juicios» conserva la amplitud del término y se ajusta bien al paralelismo del salmo.
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: oh Yahvé
  alternatives_spanish:
  - oh Yahweh
  - oh el SEÑOR
  lexicon: HALOT
  rationale: Se translitera el nombre divino como «Yahvé», conforme a la política terminológica del proyecto, preservando el nombre propio del pacto en vez de sustituirlo por un título.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: O Yahweh
  chosen_spanish_reading: oh Yahvé
  alternative_spanish_readings:
  - oh Yahweh
  - oh el SEÑOR
  rationale: El hebreo usa el Tetragrámaton directamente. La forma «Yahvé» mantiene el nombre divino revelado y evita el sustituto tradicional «SEÑOR», en línea con la doctrina del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Whether בְּנוֹת יְהוּדָה should be taken literally or as a geographic idiom
  english_pob_reading: the daughters of Judah
  chosen_spanish_reading: las hijas de Judá
  alternative_spanish_readings:
  - las ciudades de Judá
  - las aldeas de Judá
  rationale: Se conserva la lectura literal en el texto principal por transparencia poética, mientras la ambigüedad idiomática queda resguardada mediante la nota. Así no se borra la tensión documentada por el POB inglés.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: El borrador sigue el texto hebreo masorético y concuerda con el audit trail inglés del POB. No se registran revisiones posteriores que alteren la lectura; el pasaje quedó marcado como unchanged en la última pasada de revisión.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para el nombre divino.
  - 'Se conserva el paralelismo verbal con dos verbos de gozo: «se alegró» / «exultaron».'
  - La nota de pie preserva la ambigüedad de בְּנוֹת יְהוּדָה sin resolverla en el cuerpo principal.
  - El registro evita calco excesivo y usa español natural sin perder la literalidad de los rasgos clave.
