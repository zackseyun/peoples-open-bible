translation:
  language: es
  text: Y plantó un tamarisco en Beerseba[a], y allí invocó a Yahvé, el Dios eterno[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «allí proclamó el nombre de Yahvé» o «allí invocó el nombre de Yahvé». El modismo hebreo puede abarcar tanto proclamación como invocación en un contexto de adoración.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Dios eterno».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּטַּע
  english_pob_choice: planted
  chosen_spanish: plantó
  alternatives_spanish:
  - sembró
  - estableció
  lexicon: HALOT
  rationale: נטע en qal normalmente significa plantar. En español, «plantó» es la equivalencia natural y directa para un árbol.
- source_word: אֶשֶׁל
  english_pob_choice: tamarisk tree
  chosen_spanish: tamarisco
  alternatives_spanish:
  - árbol de tamarisco
  - tamarisco (árbol)
  - grove
  lexicon: HALOT
  rationale: El término apunta probablemente al tamarisco; en español «tamarisco» transmite la especificidad léxica sin sobredescribir. Añadir «árbol» sería redundante en el contexto.
- source_word: בִּבְאֵר שָׁבַע
  english_pob_choice: in Beersheba
  chosen_spanish: en Beerseba
  alternatives_spanish:
  - en Beerseba
  - en Beerseba
  lexicon: HALOT
  rationale: La preposición ב con topónimo se expresa naturalmente con «en». «Beerseba» sigue la transliteración bíblica usual en español.
- source_word: וַיִּקְרָא שָׁם בְּשֵׁם
  english_pob_choice: there he called on the name of
  chosen_spanish: allí invocó el nombre de
  alternatives_spanish:
  - allí proclamó el nombre de
  - allí llamó sobre el nombre de
  lexicon: HALOT
  rationale: La fórmula קרא בשם en contexto de Génesis puede implicar invocación y proclamación cultual. «Invocó el nombre de» preserva mejor esa ambigüedad teológica que una sola lectura más estrecha.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - Jehová
  lexicon: HALOT
  rationale: Según el criterio del proyecto, el Tetragrama se vierte como «Yahvé», preservando el nombre divino personal en lugar de sustituirlo por un título.
- source_word: אֵל עוֹלָם
  english_pob_choice: the Everlasting God
  chosen_spanish: Dios eterno
  alternatives_spanish:
  - el Dios eterno
  - el Dios perpetuo
  - Dios de eternidad
  lexicon: HALOT
  rationale: אֵל es «Dios» y עוֹלָם aquí expresa permanencia duradera. «Dios eterno» reproduce con naturalidad la fuerza atributiva del hebreo en español.
theological_decisions:
- issue: Fórmula cultual קרא בשם יהוה
  english_pob_reading: called on the name of Yahweh; alternative proclamation/invocation notes preserved
  chosen_spanish_reading: invocó el nombre de Yahvé
  alternative_spanish_readings:
  - proclamó el nombre de Yahvé
  - clamó al nombre de Yahvé
  rationale: El hebreo admite tanto la invocación como la proclamación en un marco de culto. «Invocó» conserva la orientación devocional sin eliminar la posibilidad de proclamación implícita.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
- issue: Traducción del Tetragrama
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - Jehová
  rationale: Se conserva el nombre propio divino conforme a la política del proyecto, evitando la sustitución por una designación genérica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Título divino אֵל עוֹלָם
  english_pob_reading: the Everlasting God / the Eternal God
  chosen_spanish_reading: Dios eterno
  alternative_spanish_readings:
  - el Dios eterno
  - el Dios perpetuo
  rationale: La construcción hebrea funciona como título atributivo. En español, «Dios eterno» comunica la misma idea sin forzar un giro demasiado literal.
  doctrine_reference: 'DOCTRINE.md: preserve lexical force without unnecessary abstraction'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios y el cotejo cruzado reportó alta concordancia; por eso este borrador sigue de cerca la lectura auditada, preservando la ambigüedad de קרא בשם y el tratamiento del Nombre divino.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del Tetragrama en todo el texto.
  - «Dios eterno» se usa como título final breve y natural en español.
  - Se evita «el SEÑOR» para no sustituir el Nombre divino revelado.
  - El verbo «invocó» preserva la tensión entre oración y proclamación presente en el hebreo.
