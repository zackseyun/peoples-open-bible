id: GEN.35.16
reference: Genesis 35:16
source:
  edition: WLC
  text: וַ/יִּסְעוּ֙ מִ/בֵּ֣ית אֵ֔ל וַֽ/יְהִי ע֥וֹד כִּבְרַת הָ/אָ֖רֶץ לָ/ב֣וֹא אֶפְרָ֑תָה וַ/תֵּ֥לֶד רָחֵ֖ל וַ/תְּקַ֥שׁ בְּ/לִדְתָּֽ/הּ־־׃
translation:
  text: Then they journeyed from Bethel[a], and when there was still some distance to go before reaching Ephrath, Rachel gave birth, and she had difficulty in childbirth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Ephrathah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְעוּ
  chosen: they journeyed
  alternatives:
  - they set out
  - they traveled
  lexicon: HALOT
  rationale: נסע in the wayyiqtol narrative sequence commonly denotes breaking camp and traveling onward. 'Journeyed' preserves the travel sense in readable modern English.
- source_word: מִבֵּית אֵל
  chosen: from Bethel
  alternatives:
  - from Beth-el
  lexicon: HALOT
  rationale: Proper place name is transliterated by standard English convention as 'Bethel' rather than a more literal segmented form.
- source_word: וַיְהִי עוֹד כִּבְרַת הָאָרֶץ
  chosen: when there was still some distance
  alternatives:
  - while there was still a stretch of land
  - when there was still some way
  lexicon: HALOT
  rationale: The idiom combines היה with עוד and כברת הארץ to indicate that a remaining distance still lay ahead. 'Some distance' communicates the idiomatic sense without over-literal awkwardness.
- source_word: כִּבְרַת הָאָרֶץ
  chosen: some distance
  alternatives:
  - a stretch of land
  - a measure of land
  lexicon: HALOT
  rationale: This expression is rare and its exact measure is uncertain. Rendering it as 'some distance' preserves the idea of remaining travel without implying a precise unit not recoverable from the Hebrew.
- source_word: לָבוֹא אֶפְרָתָה
  chosen: to go before reaching Ephrath
  alternatives:
  - to come to Ephrath
  - before they came to Ephrath
  lexicon: HALOT
  rationale: The infinitive construct with ל marks destination or impending arrival. In English, 'before reaching Ephrath' fits the preceding idiom naturally and preserves the sense that they had not yet arrived.
- source_word: אֶפְרָתָה
  chosen: Ephrath
  alternatives:
  - Ephrathah
  lexicon: HALOT
  rationale: The Hebrew form here is אֶפְרָתָה. 'Ephrath' is a standard concise transliteration in English, while the longer 'Ephrathah' remains a viable alternative worth preserving in a footnote.
- source_word: וַתֵּלֶד רָחֵל
  chosen: Rachel gave birth
  alternatives:
  - Rachel bore a child
  lexicon: HALOT
  rationale: ילד in the Qal with a female subject means to give birth. 'Gave birth' is clear modern English.
- source_word: וַתְּקַשׁ בְּלִדְתָּהּ
  chosen: she had difficulty in her labor
  alternatives:
  - her labor was hard
  - she suffered hard labor
  - she had a difficult childbirth
  lexicon: HALOT
  rationale: קשה here conveys severe difficulty or hardship in the process of giving birth. 'She had difficulty in her labor' is natural English and preserves the focus on the hardship of childbirth without adding details not explicit in the text.
