  spanish_consistency_notes:
  - Se mantiene la transliteración de nombres propios de manera uniforme.
  - Se conserva ‘hijo de’ como fórmula genealógica estándar y fiel.
  - La puntuación final en español refleja una oración nominal breve, equivalente al hebreo listado genealógico.
