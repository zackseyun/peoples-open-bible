    text: O, “el ídolo doméstico” o “la imagen idolátrica”. El hebreo terafim se refiere a una imagen cultual doméstica.
    reason: lexical_alternative
  - marker: b
    text: El término hebreo traducido “cobertor” es raro y puede referirse más generalmente a una cobertura tejida; “cobertor de pelo de cabra” refleja aquí su probable función.
    reason: lexical_alternative
  revision_rationale: La revisión conserva el sentido del hebreo y la decisión principal del POB de transliterar תְּרָפִים, pero reubica y corrige las notas para que sigan el rastro auditado en inglés. También mejora la naturalidad de “cubierta” a “cobertor” sin perder cautela lexical.
