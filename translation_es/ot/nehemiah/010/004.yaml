  spanish_consistency_notes:
  - Se mantiene el orden de los tres nombres tal como aparece en el hebreo y en el POB inglés.
  - No se introduce puntuación adicional más allá de la enumeración mínima.
  - Se usa transliteración uniforme de nombres propios, evitando traducción interpretativa.
