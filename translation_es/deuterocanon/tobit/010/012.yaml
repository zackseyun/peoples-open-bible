    rationale: Aunque intenta mantener el valor causativo de λυπέω, en español estándar la construcción correcta y natural sería «no la entristezcas», «no la aflijas» o «no le causes tristeza». La forma actual afecta la legibilidad y dignidad del texto.
  - severity: low
    issue: «una buena noticia de ti» puede sonar más a novedad puntual que a informe/reputación.
    rationale: ἀκούσαιμί σου ἀκοὴν καλήν expresa oír bien de alguien. «Un buen informe acerca de ti» o «buenas noticias de ti» capta mejor el sentido, aunque la versión actual no es una infidelidad grave.
