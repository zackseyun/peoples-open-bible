revisions:
- from: Las calzadas quedan desoladas[a]; el transitante ha cesado de la senda. Ha quebrantado el pacto, ha despreciado las ciudades[b] y no ha estimado a nadie.
  to: Las calzadas quedan desoladas; el viajero ha dejado de pasar por el camino. Ha quebrantado el pacto, ha despreciado las ciudades[a] y no ha tenido en cuenta al hombre[b].
  rationale: Se corrigen los anclajes de las notas para que coincidan con sus referentes reales. Se mejora la naturalidad del español con «el viajero ha dejado de pasar por el camino». Se ajusta la última cláusula a «no ha tenido en cuenta al hombre[b]» para preservar mejor el singular genérico אֱנוֹשׁ, en línea con la justificación léxica auditada, sin perder claridad para el lector hispanohablante.
