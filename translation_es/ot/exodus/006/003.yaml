translation:
  language: es
  text: Y me aparecí a Abraham[a], a Isaac y a Jacob como Dios Todopoderoso[b], pero por mi nombre, Yahvé, no fui conocido por ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No me di a conocer a ellos por mi nombre, Yahvé». El hebreo puede referirse no a ignorancia del nombre divino en sí, sino a no conocer todavía toda su significación pactal.'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «El Shaddai»; tradicionalmente se traduce «Dios Todopoderoso».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֵרָא
  english_pob_choice: And I appeared
  chosen_spanish: Y me aparecí
  alternatives_spanish:
  - Y me revelé
  - Y aparecí
  lexicon: HALOT
  rationale: El nifal de ראה se expresa de manera directa con «me aparecí». Conserva el sentido de teofanía sin añadir una paráfrasis más interpretativa que el hebreo no exige.
- source_word: אֶל ... אֶל ... וְאֶל
  english_pob_choice: to Abraham, to Isaac, and to Jacob
  chosen_spanish: a Abraham, a Isaac y a Jacob
  alternatives_spanish:
  - a Abraham, Isaac y Jacob
  lexicon: HALOT
  rationale: Reproduzco la repetición preposicional del hebreo con «a» para mantener el ritmo y la énfasis distributiva del original, como hace la versión inglesa auditada.
- source_word: בְּאֵל שַׁדָּי
  english_pob_choice: as God Almighty
  chosen_spanish: como Dios Todopoderoso
  alternatives_spanish:
  - como El Shaddai
  - como Dios Shaddai
  lexicon: HALOT
  rationale: Sigo la decisión léxica de traducir el título por su valor semántico en español. «Dios Todopoderoso» comunica el sentido tradicionalmente asociado a El Shaddai sin obligar a transliterar en el texto principal.
- source_word: וּשְׁמִי יְהוָה
  english_pob_choice: but by my name, Yahweh
  chosen_spanish: pero por mi nombre, Yahvé
  alternatives_spanish:
  - pero por mi nombre, Yahweh
  - pero por mi nombre, YHWH
  lexicon: HALOT
  rationale: 'Para el Tetragrámaton sigo el principio del proyecto: «Yahvé» en el texto principal, no la sustitución litúrgica «SEÑOR». Conservo «por mi nombre» para respetar la construcción hebrea.'
- source_word: לֹא נוֹדַעְתִּי לָהֶם
  english_pob_choice: I was not known to them
  chosen_spanish: no fui conocido por ellos
  alternatives_spanish:
  - no me di a conocer a ellos
  - no fui dado a conocer por ellos
  lexicon: HALOT
  rationale: 'La pasiva refleja española reproduce de forma bastante transparente el valor del nifal de ידע. Mantiene abierta la tensión interpretativa: puede referirse a no ser conocido en la plenitud de su significación pactal, no necesariamente a ignorancia absoluta del nombre.'
theological_decisions:
- issue: Alcance de la afirmación sobre el nombre divino frente a los patriarcas
  english_pob_reading: Retain the formal wording 'I was not known to them' without resolving whether this means absolute non-disclosure of the name or non-disclosure of its full covenantal significance.
  chosen_spanish_reading: Mantener «no fui conocido por ellos» sin decidir si la frase niega el conocimiento fonético del nombre o más bien la plenitud de su significado pactal.
  alternative_spanish_readings:
  - no me di a conocer a ellos por mi nombre, Yahvé
  - no fui conocido por ellos como Yahvé en el sentido pleno del pacto
  rationale: El hebreo y la nota inglesa permiten una tensión real que no debe resolverse en la traducción principal. La forma elegida preserva esa apertura y evita importar una explicación interpretativa al cuerpo del versículo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La revisión inglesa más reciente solo añadió comas alrededor de la frase appositiva «the LORD» para claridad. En español, la equivalencia se refleja manteniendo el inciso «Yahvé» entre comas y con la preposición «por mi nombre», sin necesidad de modificar la estructura básica.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para el Tetragrámaton.
  - «Dios Todopoderoso» traduce el título funcionalmente, como en la auditoría inglesa.
  - La pasiva «no fui conocido por ellos» conserva la tensión semántica del hebreo y la nota alternativa.
  - Las marcas de nota [a], [b] y [c] aparecen exactamente en el texto principal y corresponden a las notas listadas.
