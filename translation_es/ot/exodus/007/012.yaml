translation:
  language: es
  text: Y cada hombre arrojó su vara[a], y se convirtieron en serpientes; pero la vara de Aarón se tragó las varas de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dragones» o «grandes reptiles»; el hebreo tannin puede designar una criatura serpentiforme más amplia que la palabra usual para «serpiente».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁלִיכוּ
  english_pob_choice: threw down
  chosen_spanish: arrojó
  alternatives_spanish:
  - tiró
  - arrojó hacia abajo
  - echó
  lexicon: HALOT
  rationale: El hebreo indica un acto de lanzar o echar con fuerza el objeto al suelo o delante de alguien. «Arrojó» comunica el gesto narrativo con naturalidad en español y conserva la dirección descendente implícita sin sonar artificial.
- source_word: אִישׁ
  english_pob_choice: each man
  chosen_spanish: cada hombre
  alternatives_spanish:
  - cada uno
  - cada hombre de ellos
  lexicon: HALOT
  rationale: El valor distributivo de אִישׁ aquí señala que uno por uno actuaron con su propia vara. «Cada hombre» mantiene ese reparto individual y la referencia masculina explícita del hebreo, de modo equivalente al inglés auditado.
- source_word: מַטֵּהוּ / מַטֵּה / מַטֹּתָם
  english_pob_choice: staff / staff / staffs
  chosen_spanish: vara / vara / varas
  alternatives_spanish:
  - bastón / bastón / bastones
  - cetro / cetro / cetros
  lexicon: HALOT
  rationale: 'מַטֶּה puede significar ‘vara’ o ‘bastón’. En este contexto narrativo, «vara» es claro, concreto y apropiado para el objeto usado en la señal. Se conserva la distinción singular/plural: vara de cada uno, vara de Aarón y varas de ellos.'
- source_word: וַיִּהְיוּ
  english_pob_choice: they became
  chosen_spanish: se convirtieron
  alternatives_spanish:
  - llegaron a ser
  - se hicieron
  lexicon: HALOT
  rationale: El verbo expresa un cambio de estado. «Se convirtieron» transmite bien la transformación sin agregar una interpretación más fuerte de la necesaria.
- source_word: לְתַנִּינִם
  english_pob_choice: serpents
  chosen_spanish: serpientes
  alternatives_spanish:
  - dragones
  - grandes reptiles
  - monstruos marinos
  lexicon: HALOT
  rationale: תַּנִּין posee un campo semántico amplio, como refleja la nota auditada en inglés. En este relato de señales, «serpientes» es la opción más natural y contextual en español, sin perder de vista que el término hebreo puede abarcar una criatura serpentiforme más amplia.
- source_word: וַיִּבְלַע
  english_pob_choice: swallowed up
  chosen_spanish: devoró
  alternatives_spanish:
  - se tragó
  - engulló
  - tragó
  lexicon: HALOT
  rationale: בָּלַע significa ‘tragar’ o ‘devorar’. En español, «devoró» comunica la total absorción del objeto vencido y suena idiomático en la escena; mantiene la fuerza narrativa de la victoria de la vara de Aarón.
- source_word: אֶת
  english_pob_choice: '[direct object marker not translated]'
  chosen_spanish: '[marcador de objeto directo no traducido]'
  lexicon: HALOT
  rationale: El hebreo usa אֶת como marcador de objeto directo definido; no tiene equivalente léxico en español y se refleja solo en la sintaxis.
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia y no registra revisiones aplicadas; por eso esta versión sigue de cerca la lectura aprobada, preservando la ambigüedad léxica de tannin en una nota y evitando expandir el sentido más allá del relato.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero en este versículo no aparece el tetragrámaton.
  - Se usó «vara» de forma consistente para מַטֶּה, en concordancia con la decisión inglesa «staff».
  - Se eligió «serpientes» en el texto principal y se preservó la amplitud semántica de תַּנִּין en la nota al pie.
  - La puntuación sigue el castellano estándar con punto y coma para marcar la oposición entre la acción de los magos y la de Aarón.
