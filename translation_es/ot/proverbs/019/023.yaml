review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: יִרְאַת יְהוָה como ''El temor de Yahvé'', לְחַיִּים como resultado (''lleva a la vida''), וְשָׂבֵעַ יָלִין como reposo satisfecho, y בַּל יִפָּקֶד רָע como ausencia de visitación adversa. Sin embargo, la cláusula final en español usa ''el mal'', que en español se presta más que ''harm'' a una lectura moral o demasiado amplia, mientras que el expediente inglés y la nota léxica especifican calamidad/daño.'
  spanish_quality_summary: El español es claro y digno. La única reparación necesaria es mejorar la naturalidad y precisión semántica de la última cláusula. 'No será visitado por el mal' es comprensible, pero suena menos idiomático y puede sugerir 'mal' moral. 'No será visitado por daño' preserva la metáfora pero suena algo rígido; 'no será visitado por ningún daño' o 'no le sobrevendrá daño' serían más naturales. Dado que el rastro POB privilegia conservar 'be visited', conviene mantener 'visitado' pero con 'daño'.
  glossary_alignment: 'Alineación correcta con los términos del proyecto: יהוה -> ''Yahvé''; יִרְאַת -> ''temor''; חַיִּים -> ''vida''. La desviación principal está en רָע, donde el expediente inglés eligió ''harm'' precisamente para evitar ''evil''; por tanto, en español conviene ''daño'' o ''desgracia'' en el texto principal, dejando ''mal'' como alternativa en nota, no como lectura principal.'
  issues:
  - severity: medium
    issue: La expresión principal 'no será visitado por el mal' puede leerse como mal moral en vez de calamidad/daño.
    rationale: El hebreo רָע aquí, según el expediente inglés y el contexto sapiencial, denota adversidad, no mal moral. En español, 'el mal' activa con más fuerza una lectura ética o absoluta. Esto debilita la precisión semántica buscada por el POB.
  - severity: low
    issue: La nota c actualmente pone 'no lo visitará el mal' como alternativa, pero esa alternativa no mejora la ambigüedad semántica del texto principal.
    rationale: Si el texto principal se corrige a 'daño', la nota debe conservar las alternativas relevantes, incluyendo 'mal' solo como posibilidad más literal pero menos clara, y destacar 'desgracia' como opción contextual.
  revised_spanish_text: El temor de Yahvé lleva a la vida[a], y quien lo tiene descansará satisfecho[b]; no será visitado por ningún daño[c].
  revised_footnotes:
  - marker: a
    text: 'O: "es para vida"; el hebreo es muy conciso y puede traducirse de manera más literal.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "pasará la noche satisfecho" o "dormirá satisfecho".'
    reason: lexical_alternative
  - marker: c
    text: 'O: "no lo visitará el mal" o "no le sobrevendrá desgracia". Aquí "mal" se refiere a calamidad o daño, no a mal moral.'
    reason: lexical_alternative
  revision_rationale: Se ajusta solo la cláusula final para alinear mejor el español con la decisión léxica documentada para רָע ('harm') y evitar que 'el mal' se entienda como mal moral. Se mantiene la metáfora de 'ser visitado' para respetar יִפָּקֶד, y se conserva 'mal' como alternativa más literal en la nota.
