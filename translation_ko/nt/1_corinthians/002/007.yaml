  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἀλλὰ λαλοῦμεν ⸂θεοῦ σοφίαν⸃ ἐν μυστηρίῳ, τὴν ἀποκεκρυμμένην, ἣν προώρισεν ὁ θεὸς πρὸ τῶν αἰώνων εἰς δόξαν ἡμῶν·
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/002/007.yaml
  text: 'But we speak God''s wisdom in a mystery[c][b][a], the hidden wisdom that God predestined before the ages for our glory.'
  footnotes:
  - marker: a
    text: 'Or "in secret"; the Greek uses "mystery," a term Paul often uses for God''s once-hidden plan now revealed.'
    reason: lexical_alternative
  - marker: b
    text: 'Or "foreordained" or "decided beforehand."'
    reason: lexical_alternative
  - marker: c
    text: 'Or "before all ages."'
    reason: lexical_alternative
translation:
  language: ko
  text: 오히려 우리는 비밀 가운데 있는 하나님의 지혜, 곧 감추어졌던 지혜를 말합니다. 이는 하나님께서 우리의 영광을 위하여 영원 전에 미리 정하신 지혜입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: θεοῦ σοφίαν ἐν μυστηρίῳ
  english_pob_choice: God’s wisdom in a mystery
  chosen_korean: 비밀 가운데 있는 하나님의 지혜
  alternatives_korean:
  - 신비 가운데 있는 하나님의 지혜
  lexicon: BDAG
  rationale: μυστήριον는 종말론적으로 감추어졌다가 드러나는 하나님의 경륜. 「비밀」을 기본으로 옮긴다.
- source_word: τὴν ἀποκεκρυμμένην
  english_pob_choice: the hidden wisdom
  chosen_korean: 감추어졌던 지혜
  alternatives_korean:
  - 숨겨졌던 지혜
  lexicon: BDAG
  rationale: 완료 수동 분사 — 종말의 때까지 감추어졌던 상태.
- source_word: προώρισεν … πρὸ τῶν αἰώνων
  english_pob_choice: predestined before the ages
  chosen_korean: 영원 전에 미리 정하신
  alternatives_korean:
  - 만세 전에 미리 정하신
  lexicon: BDAG
  rationale: προορίζω의 「미리 정하다」 + 「세대들 이전」.
- source_word: εἰς δόξαν ἡμῶν
  english_pob_choice: for our glory
  chosen_korean: 우리의 영광을 위하여
  alternatives_korean:
  - 우리에게 영광이 되게
  lexicon: BDAG
  rationale: εἰς의 목적.
