translation:
  language: es
  text: Pero de repente cayó al suelo[a] y quedó envuelto en profunda oscuridad; y lo levantaron y lo pusieron en una camilla,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El texto griego de Swete presenta γῆν tres veces seguidas («al suelo suelo suelo» o, más literalmente, «a tierra tierra tierra»), lo que casi con toda seguridad refleja una repetición de copia o transcripción, no un sentido buscado. La traducción sigue el significado claro de la frase: «al suelo».'
    reason: textual_variant
lexical_decisions:
- source_word: αἴφνω
  english_pob_choice: suddenly
  chosen_spanish: de repente
  alternatives_spanish:
  - súbitamente
  - repentinamente
  lexicon: LSJ
  rationale: La idea es de una caída inesperada e inmediata; «de repente» es natural en español moderno y conserva el valor adverbial sin endurecer el estilo.
- source_word: πεσόντα
  english_pob_choice: fell
  chosen_spanish: cayó
  alternatives_spanish:
  - se desplomó
  - cayendo
  lexicon: LSJ
  rationale: El participio aoristo expresa el hecho de la caída; en español, «cayó» reproduce con claridad la acción principal.
- source_word: πρὸς τὴν γῆν
  english_pob_choice: to the ground
  chosen_spanish: a tierra
  alternatives_spanish:
  - al suelo
  - al piso
  lexicon: LSJ
  rationale: «Tierra» mantiene el sentido de descenso al suelo y permite un registro sobrio; «al suelo» también sería válido, pero menos cercano al giro bíblico.
- source_word: πολλῷ σκότει
  english_pob_choice: deep darkness
  chosen_spanish: profunda oscuridad
  alternatives_spanish:
  - gran oscuridad
  - mucha oscuridad
  lexicon: LSJ
  rationale: La construcción comunica una oscuridad abundante y envolvente; «profunda oscuridad» es idiomática en español y preserva el peso descriptivo.
- source_word: περιχυθέντα
  english_pob_choice: enveloped
  chosen_spanish: fue envuelto
  alternatives_spanish:
  - fue cubierto
  - fue rodeado
  - fue sumergido
  lexicon: LSJ
  rationale: El participio pasivo sugiere que la oscuridad se derramó alrededor de él; «fue envuelto» conserva esa imagen de cobertura total.
- source_word: συναρπάσαντες
  english_pob_choice: picked him up
  chosen_spanish: lo levantaron
  alternatives_spanish:
  - lo alzaron
  - lo recogieron
  - lo tomaron apresuradamente
  lexicon: LSJ
  rationale: El verbo indica que los acompañantes lo tomaron rápidamente para cargarlo; «lo levantaron» es natural y encaja con el movimiento previo a colocarlo en la camilla.
- source_word: φορεῖον
  english_pob_choice: stretcher
  chosen_spanish: camilla
  alternatives_spanish:
  - parihuela
  - litter
  - parihuela de transporte
  lexicon: LSJ
  rationale: «Camilla» es el equivalente más claro para un lector hispanohablante moderno; «parihuela» es correcto pero menos transparente en la lectura pública.
- source_word: ἐνθέντες
  english_pob_choice: put him on
  chosen_spanish: lo pusieron en
  alternatives_spanish:
  - lo colocaron en
  - lo tendieron en
  lexicon: LSJ
  rationale: El participio final indica la colocación sobre el medio de transporte; «lo pusieron en» es preciso y fluido en la secuencia narrativa.
theological_decisions:
- issue: Repetición griega de γῆν en el texto de Swete
  english_pob_reading: The English POB follows the clear meaning 'to the ground' and notes the triple repetition as almost certainly scribal/transcriptional.
  chosen_spanish_reading: «a tierra» sin reproducir la repetición
  alternative_spanish_readings:
  - «a la tierra»
  - «a tierra tierra tierra»
  rationale: La repetición no parece semánticamente intencional; por eso el español sigue el sentido claro, sin introducir una duplicación artificial en el texto principal.
  doctrine_reference: Textual criticism / translation method
translation_notes:
  revision_awareness: 'La versión inglesa auditada fue revisada para convertir la secuencia participial en una construcción más natural: «and was enveloped». La versión española sigue ese ajuste con una pasiva perifrástica («fue envuelto») que conserva el sentido del griego y su fluidez narrativa.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el contexto lo requiera; aquí no aparece.
  - Se evita «Cristo»/«Mesías» porque el pasaje no contiene esa terminología.
  - «Camilla» se eligió por claridad moderna; no implica un matiz funerario como podría sugerir «bier».
  - La pasiva perifrástica ayuda a reflejar el participio griego sin forzar un calco.
