    text: Or 'where you vowed a vow to me.' The Hebrew uses a verb-noun combination for emphasis.
    reason: lexical_alternative
  - marker: b
    text: '''Bethel'' means ''house of God,'' but here it is the place name.'
    reason: cultural_note
