translation:
  language: es
  text: el turbante de lino fino[a], los gorros ornamentales de lino fino y las prendas interiores de lino, de lino fino torcido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «las prendas interiores de lino, de lino fino torcido». El orden del hebreo permite oír la expresión final especialmente con la última prenda, aunque también retoma la descripción del material usada en las vestiduras sacerdotales.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמִּצְנֶפֶת
  english_pob_choice: the turban
  chosen_spanish: el turbante
  alternatives_spanish:
  - el tocado
  - la prenda para la cabeza
  lexicon: HALOT
  rationale: En este contexto sacerdotal, מִצְנֶפֶת nombra el cubrecabeza del sumo sacerdote. «Turbante» conserva el valor cultual y resulta claro en español contemporáneo sin perder precisión.
- source_word: שֵׁשׁ
  english_pob_choice: fine linen
  chosen_spanish: lino fino
  alternatives_spanish:
  - lino
  - lino fino de calidad
  lexicon: HALOT
  rationale: שֵׁשׁ designa un lino de calidad, no simplemente la fibra en general. «Lino fino» mantiene la cualidad del material de manera natural en español.
- source_word: פַּאֲרֵי הַמִּגְבָּעֹת
  english_pob_choice: the ornate caps
  chosen_spanish: las coletas ornamentales
  alternatives_spanish:
  - los adornos de los gorros
  - las gorras ornamentales
  - los gorros ornamentales
  lexicon: HALOT
  rationale: El hebreo presenta una construcción compacta de adorno + prenda. En español, «coletas ornamentales» intenta reflejar el elemento de ornamento unido a la prenda, aunque sigue siendo una zona léxica difícil. Se evita «cap» por sonar poco natural; se preserva la idea de piezas bellas/ornamentales de las cubiertas de cabeza sacerdotales.
- source_word: מִכְנְסֵי הַבָּד
  english_pob_choice: the undergarments of linen
  chosen_spanish: los calzoncillos de lino
  alternatives_spanish:
  - los calzoncillos de lino
  - las prendas interiores de lino
  - los pantalones interiores de lino
  lexicon: HALOT
  rationale: מִכְנָסַיִם se refiere a la prenda interior que cubre la parte inferior del cuerpo. «Calzoncillos» es la opción más cercana y concreta en español moderno para una prenda interior masculina, aunque se reconoce que el término puede sonar más específico o coloquial que el hebreo. Por eso se mantiene el matiz funcional de vestidura interior.
- source_word: מָשְׁזָר
  english_pob_choice: finely twisted
  chosen_spanish: de fino tejido retorcido
  alternatives_spanish:
  - finamente torcido
  - de hilo finamente torcido
  - de fino hilo retorcido
  lexicon: HALOT
  rationale: מָשְׁזָר describe el hilo o la confección torcidos/retorcidos. «De fino tejido retorcido» busca conservar el dato técnico de la fabricación textil y, al mismo tiempo, sonar natural en español. La expresión puede leerse con la frase final o con el conjunto del material, como permite el hebreo.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo de Éxodo 39:28 y la auditoría inglesa. Se conserva la secuencia de tres piezas de vestimenta y la ambigüedad final sobre si «de fino tejido retorcido» modifica sobre todo la última prenda o también reitera la descripción material del conjunto. No se adoptan términos eclesiásticos tradicionales sin base textual; se privilegian equivalentes españoles modernos que preservan la función cultual y la textura del original.
  spanish_consistency_notes:
  - Se usa «lino fino» para שֵׁשׁ conforme al valor material del término.
  - 'Se mantiene el orden enumerativo del hebreo: turbante, cubrecabeza ornamentado, y prenda interior.'
  - La nota al pie conserva la ambigüedad lexical sobre mָשְׁזָר, alineada con la nota inglesa.
  - No se introduce «SEÑOR» ni «Cristo», porque el versículo no contiene lenguaje del nombre divino ni del Mesías.
