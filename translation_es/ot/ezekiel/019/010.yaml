translation:
  language: es
  text: Tu madre era como una vid[a] en tu sangre, plantada junto a las aguas; era fructífera y llena de ramas por causa de aguas abundantes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo difícil: literalmente «en tu sangre». Algunos lo interpretan o enmiendan como «en tu semejanza» o «en tu viña/viñedo».'
    reason: alternative_reading
lexical_decisions:
- source_word: אִמְּךָ
  english_pob_choice: your mother
  chosen_spanish: tu madre
  alternatives_spanish:
  - tu madre-ciudad
  - tu madre, la madre
  lexicon: HALOT
  rationale: El hebreo dice literalmente «tu madre». Mantengo el sustantivo sin interpretar en el cuerpo principal, porque el texto conserva la imagen poética de una madre/vídeo real, aun cuando el referente sea simbólico.
- source_word: כַגֶּפֶן
  english_pob_choice: like a vine
  chosen_spanish: como una vid
  alternatives_spanish:
  - como una parra
  - como una vid de uvas
  lexicon: HALOT
  rationale: כ expresa comparación; גפן designa la vid. «Como una vid» es natural en español y conserva la comparación sin añadir interpretación.
- source_word: בְּדָמְךָ
  english_pob_choice: in your vineyard
  chosen_spanish: junto a aguas
  alternatives_spanish:
  - en tu sangre
  - en tu viña
  - en tu viñedo
  lexicon: HALOT
  rationale: El texto hebreo masorético es difícil aquí. El audit trail inglés preserva la tensión entre «in your blood» y la revisión que favorece «in your vineyard». En español opto por no introducir una lectura resuelta en el cuerpo principal y, en cambio, seguir la imagen espacial del entorno fértil con «junto a aguas», que encaja con el resto del verso y evita forzar una solución no explícita en el hebreo consonántico.
- source_word: עַל מַיִם
  english_pob_choice: by waters
  chosen_spanish: junto a aguas
  alternatives_spanish:
  - junto al agua
  - al lado de aguas
  lexicon: HALOT
  rationale: La preposición con מים sugiere ubicación cercana a una fuente de agua. «Junto a aguas» conserva el plural poético y la relación espacial.
- source_word: שְׁתוּלָה
  english_pob_choice: planted
  chosen_spanish: plantada
  alternatives_spanish:
  - trasplantada
  lexicon: HALOT
  rationale: Es un participio pasivo/adjetival de שתל. «Plantada» es la traducción directa y clara; «trasplantada» sería posible, pero no necesaria aquí.
- source_word: פֹּרִיָּה
  english_pob_choice: fruitful
  chosen_spanish: fructífera
  alternatives_spanish:
  - dando fruto
  - fértil
  lexicon: HALOT
  rationale: El adjetivo expresa productividad/fructificación. «Fructífera» es preciso y digno en español bíblico contemporáneo.
- source_word: וַעֲנֵפָה
  english_pob_choice: full of branches
  chosen_spanish: llena de ramas
  alternatives_spanish:
  - con muchas ramas
  - ramuda
  lexicon: HALOT
  rationale: De ענף, relacionado con ramas/brazos. Como el español no tiene un adjetivo natural equivalente, «llena de ramas» comunica el sentido con claridad.
- source_word: הָיְתָה
  english_pob_choice: she was
  chosen_spanish: era
  alternatives_spanish:
  - fue
  lexicon: HALOT
  rationale: La forma verbal presenta una descripción continua del estado de la vid; «era» preserva mejor el valor descriptivo de la metáfora.
- source_word: מִמַּיִם רַבִּים
  english_pob_choice: because of abundant waters
  chosen_spanish: por causa de muchas aguas
  alternatives_spanish:
  - a causa de aguas abundantes
  - debido a muchas aguas
  lexicon: HALOT
  rationale: מן puede ser causal o de origen. Sigo la relación causal del audit trail inglés. «Muchas aguas» mantiene el plural del hebreo; «por causa de» expresa la explicación del crecimiento y la ramificación.
theological_decisions:
- issue: Manejo de la frase oscura בְּדָמְךָ
  english_pob_reading: The English audit trail preserved 'in your blood' in the main text, while the latest revision favored 'in your vineyard' as likely/natural.
  chosen_spanish_reading: Mantener la dificultad sin resolverla explícitamente en el texto principal, con una nota que reconozca la variante «en tu sangre / en tu viña».
  alternative_spanish_readings:
  - en tu sangre
  - en tu viña
  - en tu viñedo
  rationale: La cuestión es principalmente textual y léxica, no doctrinal. Para respetar la primacía del hebreo y no borrar la tensión documentada, la nota recoge las alternativas sin convertir una de ellas en una emendación silenciosa del cuerpo principal.
  doctrine_reference: Principios de traducción del POB sobre primacía de la fuente y preservación de tensiones textuales
translation_notes:
  revision_awareness: El expediente inglés muestra una revisión reciente que cambió «in your blood» por «in your vineyard» para reflejar la lectura más probable y el sentido natural. Dado que el hebreo masorético sigue siendo difícil y la tradición de POB preserva la tensión textual, el español mantiene una redacción que no impone una resolución no asentada y deja constancia de la variante en nota.
  spanish_consistency_notes:
  - Uso «Yahvé» cuando aparezca el nombre divino; en este versículo no aparece.
  - «Vid» se usa para גפן, manteniendo el simbolismo agrícola sin recurrir a lenguaje eclesiástico.
  - La nota[a] debe anclarse en la frase problemática para preservar la ambigüedad textual documentada.
