translation:
  language: es
  text: Y él, siendo carne, guarda rencor; ¿quién entonces hará expiación por sus pecados?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: αὐτὸς
  english_pob_choice: He
  chosen_spanish: Él
  alternatives_spanish:
  - Él mismo
  - Y él
  lexicon: BDAG
  rationale: El griego subraya el sujeto personal; en español, 'Él' conserva la referencia directa sin añadir énfasis innecesario. La coordinación inicial 'Y' mantiene el arranque discursivo del versículo.
- source_word: σὰρξ ὢν
  english_pob_choice: being flesh
  chosen_spanish: siendo carne
  alternatives_spanish:
  - siendo mortal
  - siendo sólo carne
  lexicon: BDAG
  rationale: '''Carne'' preserva el valor antropológico concreto de σάρξ sin imponer una paráfrasis doctrinal como ''naturaleza humana''. ''Siendo carne'' mantiene la tensión bíblica y la sobriedad del griego.'
- source_word: διατηρεῖ μῆνιν
  english_pob_choice: keeps wrath
  chosen_spanish: guarda rencor
  alternatives_spanish:
  - mantiene ira
  - conserva ira
  lexicon: BDAG
  rationale: En español, el giro natural para una ira retenida y persistente es 'guardar rencor'. Comunica la idea de sostener resentimiento sin suavizarla a mera irritación.
- source_word: τίς ἐξιλάσεται
  english_pob_choice: who then will make atonement
  chosen_spanish: ¿quién entonces hará expiación
  alternatives_spanish:
  - ¿quién entonces hará atonamiento
  - ¿quién entonces perdonará
  lexicon: BDAG
  rationale: '''Expiación'' conserva el registro cultual de ἐξιλάσκομαι mejor que ''perdonar'', que sería más débil y menos preciso. ''Entonces'' traduce el matiz discursivo de la pregunta sin sobrecargarla.'
- source_word: τὰς ἁμαρτίας αὐτοῦ
  english_pob_choice: for his sins
  chosen_spanish: por sus pecados
  alternatives_spanish:
  - por sus faltas
  - por sus ofensas
  lexicon: BDAG
  rationale: '''Pecados'' es la correspondencia directa y transparente para ἁμαρτίας. ''Por'' expresa adecuadamente el complemento de la expiación.'
theological_decisions:
- issue: σάρξ en un dicho sapiencial
  english_pob_reading: being flesh
  chosen_spanish_reading: siendo carne
  alternative_spanish_readings:
  - siendo mortal
  - siendo sólo carne
  rationale: Aquí σάρξ no exige la carga paulina de 'naturaleza pecaminosa'. 'Siendo carne' respeta la fragilidad humana implícita y deja abierta la tensión del texto entre corporalidad y condición mortal.
  doctrine_reference: 'DOCTRINE.md: σάρξ = ''flesh'' literal / contextual, no automáticamente ''sinful nature'''
- issue: ἐξιλάσεται y el lenguaje de atonement
  english_pob_reading: make atonement
  chosen_spanish_reading: hará expiación
  alternative_spanish_readings:
  - perdonará
  - hará propiciación
  rationale: '''Expiación'' conserva el valor sacrificial/cultual del verbo y evita reducirlo a simple perdón interpersonal. Así se preserva la pregunta retórica del verso sobre la culpa y la ira retenida.'
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica del texto sin resolverla por paráfrasis'
translation_notes:
  revision_awareness: El último pase editorial del contexto inglés sustituyó una lectura previa no pertinente por una traducción basada en el hebreo conservado; sin embargo, el paralelo griego sigue siendo un control útil para este versículo, y por eso la presente redacción se alinea con el sentido griego conservando el registro sapiencial y el léxico de expiación.
  spanish_consistency_notes:
  - Se usó 'carne' para σάρξ, no 'naturaleza humana', para mantener el valor bíblico concreto.
  - Se prefirió 'expiación' a 'perdón' para no perder el matiz cultual del verbo griego.
  - Se evitó 'Señor' u otras sustituciones litúrgicas porque no aparecen en este versículo.
  - El orden y la puntuación siguen un español natural, pero conservan la estructura de afirmación seguida de pregunta retórica.
