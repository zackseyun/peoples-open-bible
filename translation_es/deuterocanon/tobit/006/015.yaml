  yaml_path: translation/deuterocanon/tobit/006/015.yaml
  text: And now I am my father's only son[a], and I am afraid that if I go in, I will die, just as the former ones did, because a demon loves her, and it harms no one except those who come to her. And now I am afraid that I may die and bring down the life of my father and my mother in grief because of me to their grave[c][b]; and they have no other son who will bury them.
  footnotes:
