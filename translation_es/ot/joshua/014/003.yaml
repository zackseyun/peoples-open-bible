translation:
  language: es
  text: Porque Moisés había dado la heredad de las dos tribus y de la media tribu al otro lado del Jordán[a]; pero a los levitas no les dio heredad entre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «más allá del Jordán».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Puesto que
  lexicon: HALOT
  rationale: Introduce la base explicativa de lo dicho antes. En español, «Porque» mantiene bien la relación causal o explicativa sin sonar forzado.
- source_word: נָתַן
  english_pob_choice: had given
  chosen_spanish: había dado
  alternatives_spanish:
  - dio
  - había asignado
  lexicon: HALOT
  rationale: El pluscuamperfecto conserva la anterioridad de la asignación de Moisés respecto al momento narrativo, como en el inglés POB.
- source_word: נַחֲלַת
  english_pob_choice: the inheritance
  chosen_spanish: la heredad
  alternatives_spanish:
  - la herencia
  - la asignación
  lexicon: HALOT
  rationale: «Heredad» comunica el campo de sentido territorial y de posesión asignada que está en juego aquí; además evita reducirlo a herencia en sentido meramente familiar.
- source_word: שְׁנֵי הַמַּטּוֹת
  english_pob_choice: the two tribes
  chosen_spanish: las dos tribus
  alternatives_spanish:
  - los dos grupos tribales
  - las dos varas
  lexicon: HALOT
  rationale: En este contexto de repartición territorial, מַטֶּה designa tribu, no «vara». «Las dos tribus» refleja el valor contextual preciso.
- source_word: וַחֲצִי הַמַּטֶּה
  english_pob_choice: and the half-tribe
  chosen_spanish: la media tribu
  alternatives_spanish:
  - la mitad de la tribu
  lexicon: HALOT
  rationale: «Media tribu» es la forma natural y fiel en español para la unidad tribal parcial, aquí la media tribu de Manasés.
- source_word: מֵעֵבֶר לַיַּרְדֵּן
  english_pob_choice: beyond the Jordan
  chosen_spanish: de este lado del Jordán
  alternatives_spanish:
  - más allá del Jordán
  - al otro lado del Jordán
  lexicon: HALOT
  rationale: El hebreo expresa una orientación espacial relativa. Siguiendo la nota inglesa de alternativa geográfica, «de este lado del Jordán» conserva la referencia desde la perspectiva narrativa sin imponer una sola dirección en la traducción principal.
- source_word: וְלַלְוִיִּם
  english_pob_choice: but to the Levites
  chosen_spanish: pero a los levitas
  alternatives_spanish:
  - y a los levitas
  lexicon: HALOT
  rationale: Aunque la conjunción básica es «y», el contraste con las tribus hace natural «pero» en español, como ya reflejaba el POB inglés.
- source_word: לֹא נָתַן נַחֲלָה
  english_pob_choice: he gave no inheritance
  chosen_spanish: no les dio heredad
  alternatives_spanish:
  - no les dio una heredad
  - no les asignó heredad
  lexicon: HALOT
  rationale: Mantiene la negación directa y el mismo campo léxico de «heredad». «Les» explicita el objeto indirecto ya implicado por el contexto.
- source_word: בְּתוֹכָם
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - en medio de ellos
  - dentro de ellos
  lexicon: HALOT
  rationale: «Entre ellos» conserva la idea de no recibir una porción territorial dentro del conjunto de las tribus, con un español claro y natural.
theological_decisions:
- issue: Alcance de la no-heredad de los levitas
  english_pob_reading: The verse denies the Levites a territorial tribal inheritance among the other tribes, not all provision for Levi.
  chosen_spanish_reading: El versículo niega a los levitas una heredad territorial entre las tribus, no toda provisión para Leví.
  alternative_spanish_readings:
  - Los levitas no recibieron heredad.
  - No hubo heredad para los levitas.
  rationale: 'La frase final «entre ellos» mantiene el límite de la negación: no se trata de una negación absoluta de todo bien o sustento, sino de la ausencia de reparto tribal de tierra.'
  doctrine_reference: Números 18:20; Deuteronomio 10:9; Josué 13:14, 33
translation_notes:
  revision_awareness: La revisión más reciente del texto base quedó sin cambios; el POB inglés fue confirmado con alto acuerdo. La versión española sigue esa lectura estable y conserva la única alternativa geográfica documentada en la nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma POB cuando aparezca el nombre divino; aquí no ocurre.
  - Se usa «heredad» para conservar el lenguaje de asignación territorial, coherente con el campo semántico de נַחֲלָה en este contexto.
  - 'Se evita sobregeneralizar la cláusula sobre los levitas: la redacción española preserva la restricción territorial del pasaje.'
