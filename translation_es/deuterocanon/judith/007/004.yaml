translation:
  language: es
  text: 'Pero los hijos de Israel, al ver su gran número, se turbaron mucho, y cada uno dijo a su vecino: «Ahora estos hombres lamerán[a] toda la faz de la tierra[b], y ni las altas montañas ni los barrancos ni las colinas soportarán su peso».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de forma más interpretativa, «devorarán» o «consumirán»; el verbo griego significa literalmente «lamer», preservando la imagen de devorar extendiéndose sobre la tierra.
    reason: lexical_alternative
  - marker: b
    text: «La faz de la tierra» es un modismo literal para la superficie o extensión de la tierra.
    reason: cultural_note
lexical_decisions:
- source_word: οἱ δὲ υἱοὶ Ἰσραήλ
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: LSJ
  rationale: Conservo el giro genealógico/covenantal del griego. En español, «hijos de Israel» suena natural y mantiene la correspondencia formal mejor que «israelitas», que suaviza el sintagma.
- source_word: ὡς ἴδον αὐτῶν τὸ πλῆθος
  english_pob_choice: when they saw their great number
  chosen_spanish: al ver su gran número
  alternatives_spanish:
  - cuando vieron su gran multitud
  - cuando vieron cuán numerosos eran
  lexicon: LSJ
  rationale: «Gran número» expresa bien τὸ πλῆθος sin volverlo demasiado abstracto. La construcción «al ver» reproduce el valor temporal inmediato del griego.
- source_word: ἐταράχθησαν σφόδρα
  english_pob_choice: were greatly troubled
  chosen_spanish: se turbaron mucho
  alternatives_spanish:
  - se inquietaron mucho
  - quedaron muy turbados
  lexicon: LSJ
  rationale: El pasivo de ταράσσω comunica agitación interior más que terror absoluto. «Se turbaron mucho» mantiene esa tensión emocional sin exagerarla.
- source_word: ἕκαστος πρὸς τὸν πλησίον αὐτοῦ
  english_pob_choice: each said to his neighbor
  chosen_spanish: cada uno dijo a su vecino
  alternatives_spanish:
  - cada uno dijo a su prójimo
  - cada uno dijo al que tenía cerca
  lexicon: LSJ
  rationale: «Vecino» funciona aquí como equivalente idiomático de πλησίον, en sentido de persona cercana o compañera, sin cargarlo con un matiz exclusivamente religioso.
- source_word: Νῦν ἐκλείξουσιν οὗτοι
  english_pob_choice: Now these men will lick up
  chosen_spanish: Ahora estos hombres lamerán
  alternatives_spanish:
  - Ahora estos hombres devorarán
  - Ahora estos hombres consumirán
  lexicon: LSJ
  rationale: Sigo la imagen vívida de ἐκλείχω con «lamerán», como hizo el inglés POB con «lick up». Aunque resulte chocante, preserva la metáfora de consumo total extendida sobre la tierra.
- source_word: τὸ πρόσωπον τῆς γῆς πάσης
  english_pob_choice: the whole face of the land
  chosen_spanish: toda la superficie de la tierra
  alternatives_spanish:
  - el rostro de toda la tierra
  - toda la faz de la tierra
  lexicon: LSJ
  rationale: «Superficie de la tierra» transmite el modismo semítico sin forzar una imagen poco natural en español. «Tierra» aquí conserva el alcance amplio del griego mejor que limitarlo a «país».
- source_word: οὔτε τὰ ὄρη τὰ ὑψηλά οὔτε αἱ φάραγγες οὔτε οἱ βουνοί
  english_pob_choice: neither the high mountains nor the ravines nor the hills
  chosen_spanish: ni las altas montañas ni los barrancos ni las colinas
  alternatives_spanish:
  - ni los altos montes ni los barrancos ni los collados
  - ni las montañas elevadas ni las gargantas ni las colinas
  lexicon: LSJ
  rationale: Mantengo la triple distinción del paisaje. «Barrancos» representa φάραγγες con claridad para el español general, aunque «gargantas» o «ravines» serían alternativas más cercanas según el registro.
- source_word: ὑποστήσονται τὸ βάρος αὐτῶν
  english_pob_choice: will bear their weight
  chosen_spanish: soportarán su peso
  alternatives_spanish:
  - sostendrán su peso
  - resistirán su peso
  lexicon: LSJ
  rationale: «Soportarán su peso» reproduce la idea de aguantar bajo carga, manteniendo el sentido figurado de un ejército tan numeroso que la tierra misma parecería ceder.
theological_decisions:
- issue: Tratamiento del nombre divino y del lenguaje de pacto
  english_pob_reading: No aparece el nombre divino en este versículo; la frase "sons of Israel" se conserva como formulación bíblica tradicional.
  chosen_spanish_reading: No aparece el nombre divino; conservo «los hijos de Israel» como fórmula de pacto y pertenencia.
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: No hay decisión sobre YHWH en este versículo, pero sí sobre el registro bíblico de identidad colectiva. «Hijos de Israel» retiene mejor la resonancia del griego y del contexto narrativo.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El texto griego y el contexto del audit trail inglés muestran alta concordancia y no requieren correcciones textuales. La principal decisión revisada es mantener la metáfora fuerte de ἐκλείχω («lamerán») en el cuerpo del versículo, como hizo el POB inglés, con nota explicativa para lectores hispanos.
  spanish_consistency_notes:
  - Se mantuvo «los hijos de Israel» para coherencia con el registro bíblico y con la preferencia formal del POB.
  - Se evitó «SEÑOR» u otra sustitución no presente en el versículo.
  - 'Se conservaron imágenes corporales y espaciales del original: lamer, superficie, peso.'
  - Se usó puntuación española con comillas angulares implícitas convertidas a comillas españolas cerradas de estilo editorial simple.
