base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/017/008.yaml
  text: If a matter for judgment is too difficult for you—between bloodshed and bloodshed[a], between one legal claim and another, and between one injury and another[d][c][b], matters of dispute within your gates—then you shall arise and go up to the place that Yahweh your God will choose.
  footnotes:
  - marker: a
    text: 'Hebrew: ''between blood and blood.'' The phrase refers to distinguishing one bloodshed case from another, likely including homicide or bloodguilt cases.'
    reason: lexical_alternative
  - marker: b
    text: Or 'between one legal case and another.'
    reason: lexical_alternative
  - marker: c
    text: Or 'between one affliction and another' or 'between one plague and another.'
    reason: lexical_alternative
  - marker: d
    text: '''Within your gates'' refers to the local town courts, since city gates were customary places of judgment.'
    reason: cultural_note
