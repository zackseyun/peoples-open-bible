revisions:
- from: Pero el rey perdonó a Mefiboset[a], hijo de Jonatán, hijo de Saúl, por el juramento de Yahvé que había entre ellos, entre David y Jonatán, hijo de Saúl.
  to: Pero el rey le perdonó la vida a Mefiboset[a], hijo de Jonatán, hijo de Saúl, por el juramento de Yahvé que había entre ellos, entre David y Jonatán, hijo de Saúl.
  rationale: Se reemplaza 'perdonó' por 'le perdonó la vida' para reflejar con mayor precisión el sentido de חמל/'spared' en contexto de posible ejecución. Se conserva la estructura genealógica y 'Yahvé'. La nota se corrige para ofrecer una alternativa y aclaración reales sobre 'juramento de Yahvé', sin repetir mecánicamente el texto principal.
