revisions:
- from: Los que los hacen llegan a ser[a] como ellos, y así también todo el que confía en ellos.
  to: Los que los hacen llegan a ser[a] como ellos mismos[b], y así también todo el que confía en ellos.
  rationale: Se mantiene la traducción básica del borrador porque es fiel y natural, pero se añade la nota contextual presente en la auditoría inglesa y se ajusta levemente la redacción a «como ellos mismos» para hacer más clara la referencia a los ídolos en español sin introducir paráfrasis excesiva.
