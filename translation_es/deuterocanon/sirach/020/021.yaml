  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. «Pecar», «pobreza», «descanso» y «remordimiento» están bien escogidos. La nota sobre el matiz literal de κατανυγήσεται es útil. La única excepción necesaria es estilística: preferir una forma pasiva más idiomática en español.'
