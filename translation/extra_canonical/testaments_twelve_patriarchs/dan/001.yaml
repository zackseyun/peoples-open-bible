translation:
  text: 'In the fifth year of his life[a], Dan called together his family and said:


    2. “Hear my words, sons of Dan, and pay attention to the words of your father.

    3. I have tested in my heart, and in all my life, that truth with righteous conduct is good and pleasing to God, and that falsehood and anger are evil, teaching a person every wickedness.

    4. So I confess to you today, my children, that in my heart I resolved concerning the death of Joseph my brother, that good and true man.

    5. And I rejoiced over his being sold, because his father loved him more than us.

    6. For the spirit of jealousy and of arrogance kept saying to me, ‘You yourself also are his son.’

    7. And one of the spirits of Beliar was working with me, saying, ‘Take this sword and kill Joseph, and your father will love you when he is dead.’

    8. Now this was the spirit of anger persuading me, that just as a leopard devours a young goat, so I too should destroy Joseph.

    9. But the God of my fathers did not give him into my hands[b], so that I might find him alone and kill him and commit this lawless deed[c], lest two tribes be destroyed from Israel.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The opening chronological notice is terse in the Greek witness and likely means 'in the fifth year of his life' in the testamentary framework.
    reason: textual_variant
    anchor_ref: '1:1'
  - marker: b
    text: The Greek image is textually difficult. Some witnesses preserve a more graphic predatory metaphor; the main text renders the sense without overstating a corrupt detail.
    reason: textual_variant
    anchor_ref: '1:8'
  - marker: c
    text: Some witness forms read 'the God of my father Jacob' rather than 'the God of my fathers.'
    reason: alternative_reading
    anchor_ref: '1:9'
lexical_decisions:
- source_word: προσέχετε
  chosen: pay attention
  alternatives:
  - give heed
  - listen carefully
  lexicon: BDAG
  rationale: Imperatival exhortation in a father-to-sons testament. 'Pay attention' is strong and readable without sounding archaic.
- source_word: ἀλήθεια
  chosen: truth
  alternatives:
  - truthfulness
  lexicon: BDAG
  rationale: The chapter contrasts moral truth with falsehood as ethical dispositions, and 'truth' preserves the broad moral sense.
- source_word: δικαιοπραστογία
  chosen: righteous conduct
  alternatives:
  - doing what is right
  - righteous practice
  lexicon: LSJ
  rationale: The compound points to the practice of righteousness, not merely an abstract quality. 'Righteous conduct' keeps the ethical force and parallelism with 'truth.'
- source_word: ψεῦδος
  chosen: falsehood
  alternatives:
  - lie
  - lying
  lexicon: BDAG
  rationale: The abstract noun pairs well with 'truth' and suits the vice catalogue style better than the narrower singular 'lie.'
- source_word: θυμός
  chosen: anger
  alternatives:
  - wrath
  - rage
  lexicon: BDAG
  rationale: A key vice term in this testament. 'Anger' is the most natural stable gloss, while still allowing the moral intensity of the passage.
- source_word: ζῆλος
  chosen: jealousy
  alternatives:
  - envy
  - zeal
  lexicon: BDAG
  rationale: In context Dan resents Joseph because of paternal favoritism. 'Jealousy' best fits the relational and possessive nuance here.
- source_word: ἀλαζονεία
  chosen: arrogance
  alternatives:
  - boastfulness
  - pride
  lexicon: BDAG
  rationale: The term denotes self-exalting conceit. 'Arrogance' captures the vice clearly in contemporary English.
- source_word: πνεύματα τοῦ Βελίαρ
  chosen: spirits of Beliar
  alternatives:
  - spirits of Belial
  lexicon: LSJ
  rationale: The Greek witness has the proper name in this form. Retaining 'Beliar' reflects the source text rather than normalizing to the more familiar 'Belial.'
- source_word: ἄνελε
  chosen: kill
  alternatives:
  - slay
  - do away with
  lexicon: BDAG
  rationale: The command is blunt and murderous. 'Kill' preserves the directness without archaizing.
- source_word: πεῖθόν με
  chosen: persuading me
  alternatives:
  - urging me
  - convincing me
  lexicon: BDAG
  rationale: The participle shows ongoing inward pressure from the spirit of anger. 'Persuading me' preserves that process.
- source_word: πάρδαλις
  chosen: leopard
  alternatives:
  - panther
  lexicon: LSJ
  rationale: The standard animal reference is 'leopard'; it preserves the vivid predatory image.
- source_word: ἔριφον
  chosen: young goat
  alternatives:
  - kid
  lexicon: BDAG
  rationale: '''Young goat'' is transparent to modern readers; ''kid'' could sound too colloquial in this solemn context.'
- source_word: ἐκμυζῆσαι
  chosen: destroy
  alternatives:
  - tear apart
  - devour
  lexicon: LSJ
  rationale: The textual form is difficult and metaphorical in context. 'Destroy' communicates the intended murderous force without overcommitting to a specific zoological image that the corrupt text may not securely support.
- source_word: ἀνόμημα
  chosen: lawless deed
  alternatives:
  - crime
  - wicked act
  lexicon: BDAG
  rationale: The term marks the contemplated murder as transgression, not merely wrongdoing. 'Lawless deed' preserves that moral-legal weight.
- source_word: λυθῶσι δύο φυλαί
  chosen: two tribes be destroyed
  alternatives:
  - two tribes be undone
  - two tribes be dissolved
  lexicon: BDAG
  rationale: The clause is difficult, but the sense is that this act would bring ruin affecting Israel's tribal integrity. 'Be destroyed' communicates the gravity clearly.
