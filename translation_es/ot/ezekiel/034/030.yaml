review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: futuro resultativo («sabrán»), contenido introducido por «que», nombre divino «Yahvé», presencia pactual «estoy con ellos», fórmula «mi pueblo» y la expresión profética «la casa de Israel». También preserva la nota alternativa para אִתָּם. El único desajuste importante está en la cláusula final אֲדֹנָי יְהוִה, donde «el Señor Yahvé» introduce una mezcla menos natural y menos alineada con la decisión auditada en inglés para el título compuesto.'
  spanish_quality_summary: El español es claro y bien leído. Sin embargo, «declara el Señor Yahvé» suena algo forzado en español eclesial general. «Declara el Señor Dios» transmite mejor el título compuesto אֲדֹנָי יְהוִה en esta posición formulaica y evita la combinación poco idiomática de título + nombre propio aquí. El resto del verso es natural y digno.
  glossary_alignment: 'Se cumple la política principal de usar «Yahvé» para יְהוָה en el texto principal («yo…, Yahvé, su Dios»). La excepción contextual en אֲדֹנָי יְהוִה debe explicarse: cuando Adonai precede al Tetragrámaton, el proyecto auditado en inglés usa una forma compuesta equivalente a «Lord GOD» para evitar una secuencia torpe. En español, «el Señor Dios» es la mejor correspondencia funcional en este contexto, sin negar la política general sobre Yahvé.'
  issues:
  - severity: medium
    issue: Renderizado de אֲדֹנָי יְהוִה como «el Señor Yahvé»
    rationale: Aunque es comprensible, en esta fórmula profética resulta menos idiomático y menos alineado con la decisión documentada del audit trail, que evita una secuencia incómoda cuando Adonai precede a YHWH. «El Señor Dios» funciona mejor en español para el título compuesto al final del versículo.
  revised_spanish_text: Y sabrán que yo[a], Yahvé, su Dios, estoy con ellos, y que ellos, la casa de Israel, son mi pueblo, declara el Señor Dios.
  revised_footnotes:
  - marker: a
    text: O «entre ellos».
    reason: lexical_alternative
  revision_rationale: Se mantiene intacto casi todo el borrador porque es fiel al hebreo y al razonamiento auditado. Solo se ajusta la fórmula final אֲדֹנָי יְהוִה a «el Señor Dios», que es más natural en español y mejor corresponde a la decisión contextual ya documentada para el título compuesto, mientras se preserva «Yahvé» donde aparece יְהוָה de forma simple en el cuerpo del versículo.
