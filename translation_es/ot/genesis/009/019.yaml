translation:
  language: es
  text: Estos tres eran los hijos de Noé, y de estos fue poblada[a] toda la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «y de estos toda la tierra fue dispersada» o «esparcida».
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁלֹשָׁה אֵלֶּה
  english_pob_choice: These three
  chosen_spanish: Estos tres
  alternatives_spanish:
  - Estos son los tres
  - Los tres
  lexicon: HALOT
  rationale: La construcción hebrea es nominal y enfática; en español, «Estos tres» conserva la demostración y suena natural sin añadir un verbo inexistente en el original.
- source_word: בְּנֵי נֹחַ
  english_pob_choice: were the sons of Noah
  chosen_spanish: eran los hijos de Noé
  alternatives_spanish:
  - fueron los hijos de Noé
  - son los hijos de Noé
  lexicon: HALOT
  rationale: El hebreo no tiene verbo finito; en narración española, «eran» comunica de forma fluida la relación identificadora sin forzar un pretérito puntual.
- source_word: וּמֵאֵלֶּה
  english_pob_choice: and from these
  chosen_spanish: y de estos
  alternatives_spanish:
  - y de ellos
  - y a partir de estos
  lexicon: HALOT
  rationale: «מִן» con demostrativo se expresa de manera natural como «de estos»; mantiene el enlace estrecho con los tres hijos mencionados.
- source_word: נָפְצָה
  english_pob_choice: was populated
  chosen_spanish: fue poblada
  alternatives_spanish:
  - se pobló
  - fue dispersada
  lexicon: HALOT
  rationale: En este contexto genealógico, el verbo admite la idea de propagación o distribución de población. «Fue poblada» conserva esa lectura contextual sin perder la tensión con el sentido más literal de dispersión.
- source_word: כָל הָאָרֶץ
  english_pob_choice: the whole earth
  chosen_spanish: toda la tierra
  alternatives_spanish:
  - toda la tierra habitada
  - toda la tierra entera
  lexicon: HALOT
  rationale: Dado el contexto posterior al diluvio y la genealogía de naciones, «toda la tierra» comunica bien la amplitud universal del hebreo; «tierra» es una opción española natural para אֶרֶץ en este marco.
theological_decisions:
- issue: Alcance de הָאָרֶץ en el contexto postdiluviano
  english_pob_reading: the whole earth
  chosen_spanish_reading: toda la tierra
  alternative_spanish_readings:
  - toda la tierra habitada
  - todo el país
  rationale: El verso resume el origen de la población humana posterior al diluvio, por lo que el alcance universal es el más probable. En español, «toda la tierra» conserva esa amplitud sin convertir el término en una localización restringida.
  doctrine_reference: Contexto narrativo de Génesis 9–10; sin conflicto doctrinal directo.
translation_notes:
  revision_awareness: Se siguió el contexto hebreo directo y el rastro auditado en inglés. No hubo revisiones aplicadas en el inglés POB; por eso la decisión española conserva la misma tensión léxica entre «poblada» y el sentido más literal de dispersión/esparcimiento en la nota.
  spanish_consistency_notes:
  - Se mantiene «Noé» con tilde conforme al uso español estándar.
  - Se prefirió «tierra» para אֶרֶץ por fluidez y amplitud contextual, sin introducir «mundo» o «país».
  - La nota de pie preserva la alternativa literal de dispersión para no borrar la tensión léxica documentada.
