  text: And he sent to him Athenobius[a], one of his Friends, to confer with him, saying, “You are holding Joppa and Gazara and the citadel in Jerusalem[b], cities of my kingdom.”
  footnotes:
  - marker: a
    text: Or “the Acra in Jerusalem.” The Greek word means “citadel” or “fortress,” but it can also function here as the established name of Jerusalem’s Seleucid stronghold.
    reason: lexical_alternative
  - marker: b
    text: Gazara is the Greek place-name form; the site is commonly identified with Gezer.
    reason: cross_reference
