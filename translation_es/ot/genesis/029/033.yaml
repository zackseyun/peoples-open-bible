revisions:
- from: 'Entonces concibió de nuevo y dio a luz un hijo[a], y dijo: «Porque Yahvé ha escuchado que yo soy odiada[b], me ha dado también a este». Así llamó su nombre Simeón.'
  to: 'Entonces concibió de nuevo y dio a luz un hijo, y dijo: «Porque Yahvé ha escuchado que yo soy odiada[a], me ha dado también a este». Por eso lo llamó[b] Simeón.'
  rationale: 'Se corrige el aparato de notas para alinearlo con el POB inglés y con la evidencia hebrea: la nota léxica se mueve a «odiada», se elimina la nota irrelevante sobre «un hijo» y se añade la nota sobre el juego de palabras de «Simeón». Además, se reemplaza «Así llamó su nombre» por una formulación española más natural sin perder el sentido narrativo.'
