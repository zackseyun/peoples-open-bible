translation:
  language: es
  text: Sus caballos son más veloces que los leopardos, y más feroces que los lobos al anochecer. Sus jinetes se dispersan; sus jinetes vienen de lejos. Vuelan como un águila[a] que se apresura a devorar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como un buitre». נֶשֶׁר puede designar de manera más amplia un gran ave carroñera o rapaz, no necesariamente el águila moderna.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְקַלּוּ
  english_pob_choice: are swifter
  chosen_spanish: son más ligeros
  alternatives_spanish:
  - son más rápidos
  - son más veloces
  lexicon: HALOT
  rationale: El hebreo expresa ligereza/rapidez comparativa. «Más ligeros» conserva la imagen física de movimiento ágil sin forzar un término demasiado técnico; también deja espacio a la metáfora de caballo veloz.
- source_word: מִנְּמֵרִים
  english_pob_choice: than leopards
  chosen_spanish: que los leopardos
  alternatives_spanish:
  - que los panteras
  lexicon: HALOT
  rationale: «Leopardos» es el equivalente español más directo y reconocible para נמרים, manteniendo la comparación con un depredador veloz.
- source_word: חַדּוּ
  english_pob_choice: fiercer
  chosen_spanish: más feroces
  alternatives_spanish:
  - más agudos
  - más voraces
  lexicon: HALOT
  rationale: El campo semántico apunta a intensidad/aspereza/ferocidad. En contexto de animales depredadores, «más feroces» comunica mejor la comparación que un calco como «más agudos».
- source_word: מִזְּאֵבֵי עֶרֶב
  english_pob_choice: than wolves at dusk
  chosen_spanish: que los lobos al anochecer
  alternatives_spanish:
  - que los lobos de la tarde
  - que los lobos vespertinos
  lexicon: HALOT
  rationale: La expresión temporal se vierte de modo natural como «al anochecer», conservando la imagen de lobos activos en ese tiempo y evitando una formulación menos idiomática en español.
- source_word: וּפָשׁוּ
  english_pob_choice: spread out
  chosen_spanish: se dispersan
  alternatives_spanish:
  - se extienden
  - se despliegan
  lexicon: HALOT
  rationale: El verbo puede sugerir expansión o dispersión militar. «Se dispersan» es claro en español y mantiene la idea de movimiento amplio sin sobreespecificar la táctica.
- source_word: פָּרָשָׁיו
  english_pob_choice: his horsemen
  chosen_spanish: sus jinetes
  alternatives_spanish:
  - sus caballeros
  - su caballería
  lexicon: HALOT
  rationale: פָּרָשׁ alude a jinetes/caballería montada. «Jinetes» preserva la concreción de los hombres montados y evita el término más abstracto «caballería».
- source_word: מֵרָחוֹק יָבֹאוּ
  english_pob_choice: come from far away
  chosen_spanish: vienen de lejos
  alternatives_spanish:
  - vienen desde muy lejos
  - vienen de afar
  lexicon: HALOT
  rationale: La dirección espacial queda bien expresada con «de lejos», una fórmula natural y fiel al valor del hebreo.
- source_word: יָעֻפוּ
  english_pob_choice: They fly
  chosen_spanish: Vuelan
  alternatives_spanish:
  - Soplan
  - Se lanzan
  lexicon: HALOT
  rationale: El verbo mantiene la imagen de desplazamiento rápido por el aire. «Vuelan» sigue el sentido básico y prepara la comparación final.
- source_word: כְּנֶשֶׁר
  english_pob_choice: like an eagle
  chosen_spanish: como un águila
  alternatives_spanish:
  - como un buitre
  lexicon: HALOT
  rationale: Se conserva «águila» en el texto principal por ser la opción tradicional y coherente con la imaginería de rapidez y fuerza; el sentido más amplio del término se mantiene en nota.
- source_word: חָשׁ לֶאֱכֹל
  english_pob_choice: hurrying to devour
  chosen_spanish: que se apresura a devorar
  alternatives_spanish:
  - que se da prisa en comer
  - que corre a devorar
  lexicon: HALOT
  rationale: El participio y el infinitivo expresan prisa orientada a presa/alimento. «Se apresura a devorar» refleja bien la urgencia y el tono depredador del hebreo.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y coincide en lo esencial con el audit trail inglés: comparación con leopardos y lobos al anochecer, movimiento expansivo de los jinetes, procedencia lejana y la imagen final de un ave rapaz que se apresura a devorar. Se mantiene la decisión revisada en inglés de expresar el final con una forma de urgencia («se apresura») en lugar de una mera velocidad genérica.'
  spanish_consistency_notes:
  - Se usa «jinetes» para פָּרָשָׁיו de manera consistente en ambas apariciones.
  - Se mantiene la comparación zoológica con «leopardos» y «lobos» sin suavizarla.
  - La nota sobre נֶשֶׁר preserva la tensión entre «águila» y el posible valor más amplio de ave rapaz/carroñera, como en el inglés POB.
  - El texto evita mayúsculas litúrgicas innecesarias y conserva un registro bíblico claro y moderno.
