translation:
  language: es
  text: Que Dios te dé del rocío del cielo[a], y de la riqueza de la tierra, y abundancia de grano y vino nuevo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'del rocío de los cielos ... de la gordura de la tierra'. El hebreo usa imágenes de fertilidad y abundancia agrícola.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיִתֶּן
  english_pob_choice: May ... give
  chosen_spanish: Que ... conceda
  alternatives_spanish:
  - Y que ... dé
  - Que ... dé
  lexicon: HALOT
  rationale: En este contexto de bendición, el hebreo expresa un deseo volitivo; en español, 'Que ... conceda' comunica bien la fuerza benedictoria sin sonar forzado. 'Dar' también sería posible, pero 'conceder' mantiene el tono elevado de la bendición.
- source_word: הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: Aquí el artículo hebreo funciona como título definido, por lo que en español natural y fiel se traduce simplemente 'Dios'. 'El Dios' suena menos idiomático en esta bendición.
- source_word: מִטַּל הַשָּׁמַיִם
  english_pob_choice: of the dew of heaven
  chosen_spanish: del rocío de los cielos
  alternatives_spanish:
  - del rocío del cielo
  - del rocío de los cielos
  lexicon: HALOT
  rationale: Se conserva el sentido partitivo de מִן con 'del' y la imagen agrícola de 'rocío'. 'Cielos' refleja mejor el plural hebreo הַשָּׁמַיִם que el singular 'cielo', aunque ambas formas son posibles en español.
- source_word: וּמִשְׁמַנֵּי הָאָרֶץ
  english_pob_choice: and of the richness of the earth
  chosen_spanish: y de la riqueza de la tierra
  alternatives_spanish:
  - y de la gordura de la tierra
  - y de la fertilidad de la tierra
  lexicon: HALOT
  rationale: שְׁמַנֵּי literalmente se relaciona con 'grasa/fatness', pero en lenguaje de bendición agrícola el sentido es abundancia o riqueza productiva. 'Riqueza' comunica esa idea con claridad en español moderno sin perder el trasfondo de fertilidad.
- source_word: וְרֹב
  english_pob_choice: and abundance of
  chosen_spanish: abundancia de
  alternatives_spanish:
  - gran abundancia de
  - mucho
  lexicon: HALOT
  rationale: רֹב expresa abundancia/plenitud. En español, 'abundancia de' reproduce bien la estructura y el tono solemne del hebreo, sin añadir un artículo innecesario.
- source_word: דָּגָן
  english_pob_choice: grain
  chosen_spanish: grano
  alternatives_spanish:
  - grano cereal
  - cereal
  lexicon: HALOT
  rationale: דָּגָן es un término general para el producto cereal. 'Grano' es la equivalencia más clara y comprensible en español actual; 'cereal' suena más técnico o menos bíblico.
- source_word: וְתִירֹשׁ
  english_pob_choice: and new wine
  chosen_spanish: y vino nuevo
  alternatives_spanish:
  - y mosto
  - y vino fresco
  lexicon: HALOT
  rationale: תִּירוֹשׁ designa el vino nuevo o recién producido, no simplemente vino en general. 'Vino nuevo' conserva esa distinción y suena natural para lectores bíblicos en español.
theological_decisions:
- issue: Forma de la bendición
  english_pob_reading: A benedictory wish ('May God give you') rather than a bare prediction.
  chosen_spanish_reading: Una bendición optativa ('Que Dios te conceda') y no una simple predicción.
  alternative_spanish_readings:
  - Dios te dará
  - Dios te dará de...
  rationale: El valor jussivo del verbo en este contexto de bendición paterna pide una formulación volitiva en español. 'Que Dios te conceda' preserva mejor el acto de bendecir que una afirmación futura neutra.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve the source text''s performative blessing force.'
translation_notes:
  revision_awareness: 'La versión española sigue la revisión más reciente del inglés POB: mantiene el sentido partitivo de las frases con מִן sin añadir ''algo de'' o ''unos'', conserva la imagen agrícola y evita suavizar ''abundancia de grano y vino nuevo'' con un giro más interpretativo.'
  spanish_consistency_notes:
  - Se usa 'Dios' sin artículo por naturalidad y fidelidad al uso titular hebreo.
  - '''Cielos'' conserva el plural del hebreo; no se ha uniformado a ''cielo'' para no borrar la forma original.'
  - '''Rocío'', ''riqueza'' y ''vino nuevo'' mantienen el registro de bendición agrícola sin reemplazarlos por vocabulario eclesiástico tradicional.'
