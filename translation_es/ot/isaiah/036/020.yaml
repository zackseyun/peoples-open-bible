translation:
  language: es
  text: ¿Quién entre todos los dioses de estas tierras ha librado su tierra de mi mano, que Yahvé[a] libre Jerusalén de mi mano?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Yahvé» representa el nombre divino יְהוָה; no se sustituye por una forma de título como «SEÑOR».
    reason: theological_note
lexical_decisions:
- source_word: מִי
  english_pob_choice: Who
  chosen_spanish: ¿Quién
  alternatives_spanish:
  - ¿Cuál
  - ¿Quién es el que
  lexicon: HALOT
  rationale: El interrogativo introduce una burla retórica; «¿Quién» mantiene la fuerza natural del desafío sin volverlo artificial.
- source_word: בְּכָל אֱלֹהֵי הָאֲרָצוֹת הָאֵלֶּה
  english_pob_choice: among all the gods of these lands
  chosen_spanish: entre todos los dioses de estas tierras
  alternatives_spanish:
  - entre todos los dioses de estos países
  - de todos los dioses de estas tierras
  lexicon: HALOT
  rationale: «Entre» comunica bien el valor distributivo de בְּכָל con este sustantivo colectivo. «Tierras» conserva el matiz territorial concreto de אֲרָצוֹת en un contexto de dominio político-militar.
- source_word: הִצִּילוּ
  english_pob_choice: has delivered
  chosen_spanish: ha librado
  alternatives_spanish:
  - ha rescatado
  - ha salvado
  - ha liberado
  lexicon: HALOT
  rationale: El verbo נצל puede abarcar rescatar/librar. En este reto militar, «ha librado» expresa bien la idea de sacar de la mano enemiga o del poder del agresor, y conserva la imagen de acción eficaz de rescate.
- source_word: אַרְצָם
  english_pob_choice: their land
  chosen_spanish: su tierra
  alternatives_spanish:
  - su país
  - la tierra de ellos
  lexicon: HALOT
  rationale: El sufijo plural puede entenderse de forma colectiva; en español «su tierra» suena natural y mantiene la referencia al territorio propio de cada dios o pueblo bajo amenaza.
- source_word: מִיָּדִי
  english_pob_choice: from my hand
  chosen_spanish: de mi mano
  alternatives_spanish:
  - de mi poder
  - de mi mano
  lexicon: HALOT
  rationale: Se conserva la metáfora concreta de poder/control con «mano», que es transparente en español y coincide con la formulación auditada en inglés.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: para que
  alternatives_spanish:
  - que
  - de modo que
  lexicon: HALOT
  rationale: 'Aquí la partícula introduce la expectativa retórica del hablante: «para que Yahvé libre...». En español, «para que» reproduce con claridad la ironía del desafío sin forzar una causalidad simple.'
- source_word: יַצִּיל
  english_pob_choice: should deliver
  chosen_spanish: libre
  alternatives_spanish:
  - librará
  - pueda librar
  lexicon: HALOT
  rationale: El imperfecto en esta pregunta burlona funciona con valor volitivo o hipotético; el subjuntivo presente «libre» comunica la supuesta posibilidad desde la perspectiva del hablante.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: La convención del proyecto para el Tetragrama es «Yahvé» en español. Se evita la sustitución por «SEÑOR» para preservar el nombre divino revelado en el texto.
- source_word: יְרוּשָׁלַםִ
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalén
  lexicon: HALOT
  rationale: Topónimo estándar en español bíblico, sin necesidad de transliteración alternativa.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrama. La política del proyecto en español es transliterarlo como «Yahvé», manteniendo visible el nombre propio de Dios y no una sustitución tradicional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rhetorical force of the taunt
  english_pob_reading: that Yahweh should deliver Jerusalem from my hand
  chosen_spanish_reading: para que Yahvé libre Jerusalén de mi mano
  alternative_spanish_readings:
  - que Yahvé libre Jerusalén de mi mano
  - para que Yahvé pudiera librar Jerusalén de mi mano
  rationale: La frase expresa burla y desafío, no una mera afirmación informativa. El subjuntivo en español mantiene ese valor hipotético/retador sin añadir interpretación doctrinal ajena al contexto.
  doctrine_reference: Isaías 36:20; discurso desafiante de Senaquerib
translation_notes:
  revision_awareness: 'Coincide sustancialmente con el último pase de revisión: no se detectaron cambios sustantivos respecto del sentido básico del verso. La única decisión sensible es la formulación española del desafío retórico y la representación del Tetragrama con la convención del proyecto.'
  spanish_consistency_notes:
  - Se mantiene «mano» para מִיָּדִי en ambos casos.
  - «Tierras» reproduce el plural territorial de אֲרָצוֹת sin volverlo geopolíticamente moderno en exceso.
  - Se usa «Yahvé» conforme a la convención española del proyecto para יְהוָה.
  - El registro es bíblico y publicable, con sintaxis española natural y sin calco rígido.
