translation:
  language: es
  text: Revistió la casa con oro[a]—las vigas, los umbrales, sus muros y sus puertas— y grabó querubines sobre los muros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el templo» para «la casa». El hebreo dice literalmente «la casa», una designación común del templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְחַף
  english_pob_choice: he overlaid
  chosen_spanish: cubrió ... con oro
  alternatives_spanish:
  - forró ... con oro
  - recubrió ... con oro
  lexicon: HALOT
  rationale: El verbo describe recubrir una estructura con un material aplicado sobre ella. En español, «cubrió ... con oro» comunica de manera natural la misma acción arquitectónica sin perder el sentido de revestimiento.
- source_word: הַבַּיִת
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el templo
  - la casa del templo
  lexicon: HALOT
  rationale: El hebreo dice literalmente «la casa». En este contexto se entiende como el templo, pero «la casa» preserva la formulación original y sigue siendo clara en el pasaje.
- source_word: הַקֹּרוֹת
  english_pob_choice: the beams
  chosen_spanish: las vigas
  alternatives_spanish:
  - las maderas
  - las traviesas
  lexicon: HALOT
  rationale: El sustantivo designa piezas estructurales de madera. «Vigas» es el equivalente natural y claro en español para ese elemento arquitectónico.
- source_word: הַסִּפִּים
  english_pob_choice: the thresholds
  chosen_spanish: los umbrales
  alternatives_spanish:
  - los dinteles
  - los postes de la puerta
  - los umbrales de la puerta
  lexicon: HALOT
  rationale: El término puede referirse al área del umbral o a partes del vano. «Umbrales» conserva el valor arquitectónico general sin forzar una precisión que el hebreo no exige.
- source_word: קִירוֹתָיו
  english_pob_choice: its walls
  chosen_spanish: sus paredes
  alternatives_spanish:
  - sus muros
  - sus paredes interiores
  lexicon: HALOT
  rationale: La forma plural con sufijo indica las paredes de la casa. «Paredes» es la opción más natural en español; «muros» también sería posible, pero «paredes» funciona mejor en este contexto descriptivo.
- source_word: דַלְתוֹתָיו
  english_pob_choice: its doors
  chosen_spanish: sus puertas
  alternatives_spanish:
  - sus hojas de puerta
  - sus batientes
  lexicon: HALOT
  rationale: El sustantivo se refiere a puertas o paneles de puerta. «Puertas» es la traducción más clara y comunicativa en español.
- source_word: זָהָב
  english_pob_choice: with gold
  chosen_spanish: con oro
  alternatives_spanish:
  - de oro
  - en oro
  lexicon: HALOT
  rationale: Aunque el hebreo coloca simplemente «oro» al final de la lista, el español requiere explicitar el medio de cobertura. «Con oro» mantiene la relación instrumental del revestimiento.
- source_word: וּפִתַּח
  english_pob_choice: and he engraved
  chosen_spanish: y grabó
  alternatives_spanish:
  - y engravó
  - y talló
  - y cinceló
  lexicon: HALOT
  rationale: El verbo describe la ejecución ornamental de figuras sobre una superficie. «Grabó» transmite bien la idea de inscribir o trabajar decorativamente, y evita un término demasiado técnico o poco natural.
- source_word: כְּרוּבִים
  english_pob_choice: cherubim
  chosen_spanish: querubines
  alternatives_spanish:
  - querubines alados
  - querubines
  lexicon: HALOT
  rationale: En español bíblico, «querubines» preserva el término técnico y cultual. No se sustituye por una imagen más popularizada, para no diluir la referencia del templo.
- source_word: עַל הַקִּירוֹת
  english_pob_choice: on the walls
  chosen_spanish: sobre las paredes
  alternatives_spanish:
  - en las paredes
  - en los muros
  lexicon: HALOT
  rationale: La preposición indica ubicación de la decoración tallada o grabada. «Sobre las paredes» conserva esa relación espacial con naturalidad en español.
theological_decisions:
- issue: Nombre de la estructura sagrada
  english_pob_reading: the house is retained literally rather than normalized to 'temple'
  chosen_spanish_reading: se conserva «la casa» en vez de normalizarlo a «el templo»
  alternative_spanish_readings:
  - el templo
  - la casa del templo
  rationale: El hebreo usa la expresión literal «la casa». Mantenerla preserva la formulación del texto y la conexión con el uso bíblico convencional, sin impedir que el contexto identifique que se trata del templo.
  doctrine_reference: Uso bíblico del templo como «casa» de Yahvé; cf. terminología cultual del AT.
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del inglés POB, que prefirió «engraved» sobre «carved» para la acción sobre los querubines. En español se refleja con «grabó», manteniendo el cambio de precisión sin perder naturalidad.
  spanish_consistency_notes:
  - Se mantuvo «la casa» como reflejo literal de הַבַּיִת, con nota alternativa por claridad contextual.
  - Se eligió «grabó» para la ornamentación final, en línea con la revisión inglesa a «engraved».
  - Se usó «querubines» como término técnico estable, no «querubines» en sentido popularizado o «ángeles».
  - Se evitó «SEÑOR» porque el versículo no contiene el nombre divino ni una sustitución por κύριος.
