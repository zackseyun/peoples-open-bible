revisions:
- from: Y murió en el año ciento cuarenta y seis[a], y sus hijos lo sepultaron en los sepulcros de sus padres en Modeín, y todo Israel lo lloró con gran llanto.
  to: Y murió en el año ciento cuarenta y seis[a], y sus hijos lo sepultaron en los sepulcros de sus antepasados en Modeín, y todo Israel hizo gran duelo por él.
  rationale: Se revisa el posesivo para eliminar una ambigüedad seria de referente en español y se mejora la naturalidad de la cláusula final conservando el sentido de duelo intensificado del griego. También se normaliza la acentuación de «seléucida».
