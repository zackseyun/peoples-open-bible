translation:
  language: es
  text: Cuando Toú[a], rey de Hamat, oyó que David había abatido a todo el ejército de Hadadézer, rey de Zobá,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Tou»; el pasaje paralelo en 2 Samuel 8:9 tiene «Toi».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׁמַע
  english_pob_choice: When ... heard
  chosen_spanish: Cuando ... oyó
  alternatives_spanish:
  - Y ... oyó
  - Ahora ... oyó
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; en español, 'Cuando' expresa de forma natural el valor temporal de introducción de la escena, sin perder el enlace narrativo.
- source_word: תֹּעוּ
  english_pob_choice: Tou
  chosen_spanish: Toú
  alternatives_spanish:
  - Toi
  lexicon: HALOT
  rationale: Es un nombre propio y debe transliterarse. Se conserva la forma de Crónicas 'Tou'; se añade tilde por ajuste ortográfico del español para guiar la pronunciación sin cambiar la base textual.
- source_word: מֶלֶךְ חֲמָת
  english_pob_choice: king of Hamath
  chosen_spanish: rey de Hamat
  alternatives_spanish:
  - monarca de Hamat
  - rey de Jamat
  lexicon: HALOT
  rationale: La cadena constructa identifica cargo y territorio. 'Rey de Hamat' es directa y transparente; se evita una adaptación menos estándar como 'Jamat' porque la transliteración usual en español bíblico admite 'Hamat'.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  lexicon: HALOT
  rationale: Aquí introduce el contenido de lo oído, no la causa; 'que' reproduce bien la subordinación completiva en español.
- source_word: הִכָּה
  english_pob_choice: had struck down
  chosen_spanish: había derrotado
  alternatives_spanish:
  - había golpeado
  - había derribado
  lexicon: HALOT
  rationale: En contexto militar, el verbo 'hika' puede implicar vencer/abatir. 'Había derrotado' transmite el resultado bélico con naturalidad en español; 'había golpeado' sería demasiado literal y menos claro.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todo
  alternatives_spanish:
  - todo el
  - la totalidad de
  lexicon: HALOT
  rationale: Se conserva la cuantificación plena; en español 'todo el ejército' expresa adecuadamente la totalidad del sustantivo colectivo.
- source_word: חֵיל
  english_pob_choice: army
  chosen_spanish: ejército
  alternatives_spanish:
  - fuerza
  - hueste
  lexicon: HALOT
  rationale: En este contexto militar, el término alude a las tropas armadas. 'Ejército' es la equivalencia más clara y natural en español contemporáneo.
- source_word: הֲדַדְעֶזֶר
  english_pob_choice: Hadadezer
  chosen_spanish: Hadadézer
  alternatives_spanish:
  - Hadarezer
  lexicon: HALOT
  rationale: Se translitera el nombre propio. Se conserva la forma de Crónicas, con acento gráfico para adecuación fonológica del español.
- source_word: מֶלֶךְ צוֹבָה
  english_pob_choice: king of Zobah
  chosen_spanish: rey de Zobá
  alternatives_spanish:
  - rey de Soba
  - rey de Zobá
  lexicon: HALOT
  rationale: Se mantiene el topónimo bíblico con transliteración estándar adaptada al español; el acento ayuda a la pronunciación y evita lectura anglicada.
translation_notes:
  revision_awareness: Se siguió la lectura hebrea de Crónicas para los nombres propios y se mantuvo la subordinación causal/contenutiva del hebreo con una estructura natural en español. No se aplicaron revisiones textuales adicionales; el único punto de variante relevante es el nombre propio paralelo Tou/Toi, ya señalado en nota.
  spanish_consistency_notes:
  - Se prefirió 'Yahvé' como forma estándar del proyecto, pero este versículo no contiene el tetragrámaton.
  - '''Derrotado'' se usa aquí por el valor bélico de נכה; no implica suavizar el golpe semántico, sino expresar el resultado en español idiomático.'
  - Se mantuvo el orden narrativo del original con una apertura temporal única, sin añadir elementos interpretativos.
