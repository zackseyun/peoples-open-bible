  yaml_path: translation/deuterocanon/sirach/023/014.yaml
  text: Remember your father and your mother[a], for you sit in the midst of great men; lest you be forgotten before them, and by your habit become foolish, and wish that you had not been born[b], and curse the day of your birth.
