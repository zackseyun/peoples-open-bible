translation:
  language: es
  text: y tomó sus despojos[a], y quemó el templo de Dagón y su templo[b] con fuego. Y los que habían caído a espada
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El fragmento griego conservado para este versículo parece incompleto tanto al comienzo como al final. Por eso la traducción sigue solo el texto transmitido aquí, y la última cláusula queda cortada después de «los que habían caído a espada».
    reason: textual_variant
  - marker: b
    text: O «su templo» para «su templo»; el griego usa un pronombre femenino, probablemente referido a un antecedente femenino como la ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλαβεν
  english_pob_choice: he took
  chosen_spanish: tomó
  alternatives_spanish:
  - se apoderó de
  - capturó
  lexicon: LSJ
  rationale: El aoristo de λαμβάνω aquí expresa la acción narrativa de tomar; «tomó» es natural en español y conserva la sobriedad del relato.
- source_word: τὰ σκῦλα
  english_pob_choice: their spoils
  chosen_spanish: sus despojos
  alternatives_spanish:
  - el botín
  - el saqueo
  lexicon: LSJ
  rationale: «Despojos» mantiene el sentido militar de bienes tomados en guerra y conserva el tono bíblico sin volverse demasiado arcaico.
- source_word: ἱερὸν Δαγὼν
  english_pob_choice: the temple of Dagon
  chosen_spanish: el templo de Dagón
  alternatives_spanish:
  - el santuario de Dagón
  - la casa de Dagón
  lexicon: LSJ
  rationale: ἱερόν se refiere aquí a un templo o recinto sagrado pagano; «templo de Dagón» es claro e idiomático en español.
- source_word: τὸ ἱερὸν αὐτῆς
  english_pob_choice: her temple
  chosen_spanish: su templo
  alternatives_spanish:
  - su santuario
  - su templo
  lexicon: LSJ
  rationale: El griego usa αὐτῆς, femenino, probablemente referido a la ciudad mencionada implícitamente en el contexto. En español, «su templo» comunica esa referencia sin forzar un posesivo femenino personal que sonaría extraño.
- source_word: ἐνεπύρισεν ἐν πυρί
  english_pob_choice: he burned ... with fire
  chosen_spanish: quemó ... con fuego
  alternatives_spanish:
  - prendió fuego a ...
  - lo incendió
  lexicon: LSJ
  rationale: La combinación verbal y preposicional intensifica la acción de incendiar; «quemó ... con fuego» conserva esa fuerza y sigue de cerca la estructura griega.
- source_word: οἱ πεπτωκότες
  english_pob_choice: those who had fallen
  chosen_spanish: los que habían caído
  alternatives_spanish:
  - los caídos
  - los que cayeron
  lexicon: LSJ
  rationale: El participio perfecto expresa un estado resultante; «los que habían caído» lo refleja con naturalidad en español.
- source_word: μαχαίρᾳ
  english_pob_choice: by the sword
  chosen_spanish: a espada
  alternatives_spanish:
  - por la espada
  - con la espada
  lexicon: LSJ
  rationale: Es el giro idiomático normal en español para muerte violenta en combate; mantiene el valor instrumental/causal del griego.
translation_notes:
  revision_awareness: 'El inglés auditado pasó por una revisión que cambió «her temple» por «its temple» por razones de naturalidad referencial, y eliminó «came to» al reconocer que el griego conservado se corta de forma incompleta. La versión española refleja esa misma cautela: mantiene el final truncado y evita añadir material no atestiguado.'
  spanish_consistency_notes:
  - Se mantiene «Dagón» como transliteración del nombre propio del ídolo, en consonancia con el contexto bíblico.
  - Se usa un tono formal y sobrio, adecuado para un texto deuterocanónico de lectura pública.
  - La clausura del versículo queda abierta, porque el griego fuente también se interrumpe bruscamente.
