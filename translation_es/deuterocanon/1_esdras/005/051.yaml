translation:
  language: es
  text: Y después de estas cosas, las ofrendas regulares[a],[b] y los sacrificios de los sábados y de las lunas nuevas y de todas las fiestas consagradas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «continuas». El término griego puede referirse a ofrendas hechas de manera continua o en una base fija y recurrente.
    reason: lexical_alternative
  - marker: b
    text: El paralelo hebreo en Esdras enfatiza la ofrenda quemada «día tras día, conforme al número requerido para cada día». Aquí 1 Esdras ofrece un resumen más amplio del calendario sagrado regular.
    reason: cross_reference
lexical_decisions:
- source_word: μετὰ ταῦτα
  english_pob_choice: after these
  chosen_spanish: después de estas
  alternatives_spanish:
  - después de esto
  - luego de estas
  lexicon: LSJ
  rationale: El plural ταῦτα se conserva naturalmente con un demostrativo femenino plural implícito por el contexto de las acciones u ofrendas mencionadas antes. «Después de estas» reproduce la transición temporal sin endurecer el español.
- source_word: προσφορὰς
  english_pob_choice: offerings
  chosen_spanish: ofrendas
  alternatives_spanish:
  - oblaciones
  - presentaciones
  lexicon: LSJ
  rationale: «Ofrendas» es el equivalente natural y amplio para προσφοραί, adecuado para un contexto cultual sin cargar la frase con arcaísmo.
- source_word: ἐνδελεχισμοῦ
  english_pob_choice: regular
  chosen_spanish: regulares
  alternatives_spanish:
  - continuas
  - perpetuas
  - diarias
  lexicon: LSJ
  rationale: El término expresa continuidad o recurrencia prescrita. «Regulares» comunica bien la idea de un patrón fijo y recurrente, manteniendo la amplitud del griego y la nota de la traducción inglesa.
- source_word: θυσίας
  english_pob_choice: sacrifices
  chosen_spanish: sacrificios
  alternatives_spanish:
  - ofrendas
  - oblaciones
  lexicon: LSJ
  rationale: Se preserva la distinción léxica entre προσφοραί (ofrendas) y θυσίαι (sacrificios), como en el inglés auditado.
- source_word: σαββάτων
  english_pob_choice: Sabbaths
  chosen_spanish: los sábados
  alternatives_spanish:
  - los días de sábado
  - los días de reposo
  lexicon: LSJ
  rationale: Aunque «Sábados» sería posible, en español bíblico puede sonar nominalizado o técnico; «los sábados» comunica con claridad las observancias sabáticas plurales. Se mantiene la referencia calendárica del griego.
- source_word: νουμηνιῶν
  english_pob_choice: new moons
  chosen_spanish: las lunas nuevas
  alternatives_spanish:
  - las novilunios
  - las fiestas de luna nueva
  lexicon: LSJ
  rationale: «Lunas nuevas» es la forma bíblica clara y natural en español para las observancias mensuales de novilunio. Preserva el sentido festivo/calendárico sin sobreexplicar.
- source_word: ἑορτῶν
  english_pob_choice: feasts
  chosen_spanish: las fiestas
  alternatives_spanish:
  - los festivales
  - las solemnidades
  lexicon: LSJ
  rationale: En el registro bíblico español, «fiestas» mantiene la dimensión litúrgica y calendárica mejor que una traducción más moderna como «festivales».
- source_word: πασῶν ἡγιασμένων
  english_pob_choice: all the consecrated
  chosen_spanish: de todas las fiestas consagradas
  alternatives_spanish:
  - de todas las fiestas santificadas
  - de todas las fiestas santas
  lexicon: LSJ
  rationale: El participio indica que las fiestas han sido apartadas/consagradas. «Consagradas» conserva ese valor cultual más precisamente que «santas» en español, que puede volverse más genérico.
theological_decisions:
- issue: Lista cultual comprimida y relación con el paralelo hebreo
  english_pob_reading: 'Rendered as a broad sacred-calendar list: ''the regular offerings, and the sacrifices for Sabbaths and new moons and all the consecrated feasts.'''
  chosen_spanish_reading: 'Se vierte como una lista de observancias cultuales prescritas: «las ofrendas regulares, y los sacrificios de los sábados y de las lunas nuevas y de todas las fiestas consagradas».'
  alternative_spanish_readings:
  - «las ofrendas continuas»
  - «las fiestas señaladas»
  rationale: El griego es la fuente primaria y presenta una enumeración cultual abreviada. La versión española sigue esa secuencia sin armonizar en exceso con el paralelo hebreo, que funciona solo como verificación secundaria. Se conserva la tensión entre continuidad ritual y calendario festivo.
  doctrine_reference: Primacía del texto griego; los paralelos hebreos en 1 Esdras son controles secundarios, no determinantes.
translation_notes:
  revision_awareness: La redacción sigue el pasaje griego de Swete con alta concordancia y no requiere cambios respecto del último control revisado; se mantiene la distinción léxica entre ofrendas y sacrificios, y la nota de la traducción inglesa sobre la posible lectura de continuidad para ἐνδελεχισμοῦ.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el Tetragrámaton o una cita directa que lo requiera; este verso no lo contiene.
  - «Ofrendas» y «sacrificios» se mantienen distintos para reflejar la distinción del griego.
  - «Fiestas consagradas» conserva el matiz de algo apartado/culto, sin sustituirlo por terminología eclesial posterior.
