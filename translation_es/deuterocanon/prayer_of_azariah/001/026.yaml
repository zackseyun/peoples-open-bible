revisions:
- from: Pero el ángel de Yahvé descendió al horno junto con los que estaban alrededor de Azarías[a], y arrojó la llama del fuego fuera del horno,
  to: Pero el ángel de Yahvé descendió al horno junto con los que rodeaban a Azarías[a], y expulsó del horno la llama del fuego,
  rationale: Se ajusta ἐξετίναξεν ... ἐκ τῆς καμίνου a «expulsó del horno» para reflejar mejor la remoción enérgica desde dentro, y se mejora la fluidez de τοῖς περὶ τὸν Ἀζαρίαν con «los que rodeaban a Azarías», conservando en nota la alternativa más idiomática y la literalidad del griego.
