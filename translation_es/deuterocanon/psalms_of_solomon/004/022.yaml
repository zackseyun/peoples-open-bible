  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: una imprecación en optativo dirigida contra los ὑποκρινομένων, con la imagen violenta de κόρακες que sacan los ὀφθαλμούς. Sin embargo, el verbo español ''saquen los ojos'' queda algo menos preciso y menos idiomáticamente ligado a ἐκκόψαισαν que ''arranquen/saque[n] de cuajo''; además, una nota introduce una alternativa incorrecta en español.'
  spanish_quality_summary: La línea es clara y natural en español, con buena fuerza poética. 'Que los cuervos...' reproduce bien el valor desiderativo. No obstante, la nota b contiene 'pretendientes', que en español suele significar 'suitors/aspirantes amorosos', no 'pretenders', y por tanto desorienta. Conviene corregir la nota y afinar levemente el verbo principal para mayor viveza y fidelidad.
  glossary_alignment: No hay términos de glosario mayor implicados. 'Cuervos' es una decisión aceptable para κόρακες en español general, aunque el inglés especifica 'ravens'; la nota a lo justifica adecuadamente. 'Hipócritas' para ὑποκρινομένων concuerda con la decisión auditada, pero la alternativa española debe ser 'pretensores' o mejor 'los que fingen/disimulan', no 'pretendientes'.
  issues:
  - severity: medium
    issue: La nota b usa 'pretendientes' como alternativa de ὑποκρινομένων.
    rationale: '''Pretendientes'' en español moderno normalmente no significa ''pretenders'' sino ''suitors/aspirantes'', creando una falsa lectura. Debe sustituirse por ''pretensores'' o, mejor, por una perífrasis clara como ''los que fingen'' o ''los que disimulan''.'
  - severity: low
    issue: '''Saquen los ojos'' es comprensible, pero menos preciso que una opción más fuerte para ἐκκόψαισαν.'
    rationale: El griego expresa una acción violenta de arrancar/pluck out. 'Arranquen los ojos' suena más natural y vívido en español, sin sobretraducir, y preserva mejor la imagen imprecatoria.
  revised_spanish_text: Que los cuervos[a] arranquen los ojos de los hipócritas[b].
