translation:
  language: es
  text: Y su rey irá al destierro[a], él y sus oficiales juntos, dice Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Milcom», el dios amonita; algunos entienden la línea en el sentido de que el dios de Amón irá al destierro junto con sus sacerdotes u কর্মকর্তas.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָלַךְ
  english_pob_choice: shall go
  chosen_spanish: irá
  alternatives_spanish:
  - irá a
  - saldrá hacia
  lexicon: HALOT
  rationale: En el discurso profético, el perfecto con waw suele tener valor futuro; en español, el futuro simple comunica bien el anuncio judicial sin forzar un calco del hebreo.
- source_word: מַלְכָּם
  english_pob_choice: their king
  chosen_spanish: su rey
  alternatives_spanish:
  - Milcom
  - su Moloc
  lexicon: HALOT
  rationale: La forma con sufijo posesivo se entiende naturalmente como un rey humano en este contexto; 'su rey' mantiene la relación posesiva y evita resolver en el texto principal la lectura alternativa del nombre divino/ídolo.
- source_word: בַּגּוֹלָה
  english_pob_choice: into exile
  chosen_spanish: al destierro
  alternatives_spanish:
  - al exilio
  - en destierro
  lexicon: HALOT
  rationale: '''Destierro'' expresa de manera natural en español la idea de deportación forzada y conserva la dirección implícita del movimiento que comunica la preposición.'
- source_word: הוּא
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - él mismo
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis; 'él' reproduce ese énfasis de forma natural en español.
- source_word: וְשָׂרָיו
  english_pob_choice: and his officials
  chosen_spanish: y sus oficiales
  alternatives_spanish:
  - y sus príncipes
  - y sus gobernantes
  lexicon: HALOT
  rationale: שָׂרִים puede referirse a príncipes, jefes u oficiales. 'Oficiales' es claro en español moderno y funciona bien en un contexto de corte y gobierno.
- source_word: יַחְדָּו
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - todos juntos
  - a la vez
  lexicon: HALOT
  rationale: El adverbio subraya la deportación conjunta del rey y sus oficiales; 'juntos' es la opción más directa y natural en español.
- source_word: אָמַר יְהוָה
  english_pob_choice: says Yahweh
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - declara Yahvé
  - dice el Señor
  lexicon: HALOT
  rationale: Se conserva el nombre divino 'Yahvé' conforme al estándar del proyecto; 'dice' reproduce la fórmula profética en presente, con tono bíblico y claro.
theological_decisions:
- issue: 'מַלְכָּם: lectura de rey humano o del dios amonita Milcom/Moloc'
  english_pob_reading: 'human ruler: ''their king'''
  chosen_spanish_reading: 'rey humano: ''su rey'''
  alternative_spanish_readings:
  - Milcom
  - Moloc
  rationale: La puntuación hebrea y la sintaxis inmediata favorecen un sustantivo común con sufijo posesivo. Sin embargo, la lectura alternativa como deidad amonita sigue siendo relevante y no debe borrarse; por eso se preserva como nota alternativa en lugar de incorporarla al texto principal.
  doctrine_reference: Primacía del texto original; preservar tensiones léxicas sin resolverlas artificialmente
translation_notes:
  revision_awareness: El texto sigue de cerca el sentido y la estructura del hebreo de WLC, en línea con la lectura auditada de la POB inglesa. No hay revisiones aplicadas en el pasaje fuente; se mantiene la tensión interpretativa sobre מַלְכָּם mediante nota, sin alterar la opción principal de 'su rey'.
  spanish_consistency_notes:
  - Se usó 'Yahvé' para יְהוָה, conforme al estándar del proyecto.
  - Se prefirió 'destierro' sobre 'exilio' por naturalidad en español, sin cambiar el sentido judicial/deportativo.
  - '''Oficiales'' mantiene la amplitud de שָׂרִים sin cargar innecesariamente una jerarquía monárquica específica.'
