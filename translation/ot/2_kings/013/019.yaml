theological_decisions:
- issue: Whether to preserve the symbolic connection between striking the ground and striking Aram
  chosen_reading: Retain 'strike' for both actions, while supplying 'the ground' in the first clause from context.
  alternative_readings:
  - Use 'hit the ground' and 'defeat Aram' for smoother English
  rationale: 'The narrative depends on the prophetic sign-act: the king''s repeated striking symbolically corresponds to the number of victories over Aram. Preserving the same English verb helps readers see the connection without importing extra theology.'
  doctrine_reference: 'Translation philosophy #1 and #5'
- issue: How strongly to render עַד כַּלֵּה
  chosen_reading: Render as 'until it was finished' rather than an explicit 'until you had destroyed it completely.'
  alternative_readings:
  - until you had destroyed Aram completely
  - until complete destruction
  rationale: The Hebrew conveys totality/completion, but a less expanded rendering better matches optimal equivalence and avoids overstating beyond the text's own idiom. The context still clearly implies a complete military end.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
