base_translation:
  language: en
  yaml_path: translation/ot/genesis/016/002.yaml
  text: Then Sarai said to Abram[a], “Look now, Yahweh has kept me from bearing children. Please go in to my female slave; perhaps I will be built up through her.” And Abram listened to the voice of Sarai.
  footnotes:
