id: JDG.13.5
reference: Judges 13:5
source:
  edition: WLC
  text: כִּי֩ הִנָּ֨/ךְ הָרָ֜ה וְ/יֹלַ֣דְתְּ בֵּ֗ן וּ/מוֹרָה֙ לֹא יַעֲלֶ֣ה עַל רֹאשׁ֔/וֹ כִּֽי נְזִ֧יר אֱלֹהִ֛ים יִהְיֶ֥ה הַ/נַּ֖עַר מִן הַ/בָּ֑טֶן וְ/ה֗וּא יָחֵ֛ל לְ/הוֹשִׁ֥יעַ אֶת יִשְׂרָאֵ֖ל מִ/יַּ֥ד פְּלִשְׁתִּֽים־־־־־׃
translation:
  text: For behold[a], you are pregnant and will bear a son. No razor shall come upon his head, for the boy shall be a Nazirite of God from the womb, and he will begin to save Israel from the hand of the Philistines.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to deliver Israel.' The Hebrew verb can mean 'save' or 'deliver' depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנָּךְ
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: HALOT
  rationale: Deictic particle marking emphatic announcement. 'Behold' preserves the solemn, attention-directing force better than flatter modern options.
- source_word: הָרָה
  chosen: pregnant
  alternatives:
  - with child
  - conceiving
  lexicon: HALOT
  rationale: Predicate adjective describing present condition. 'Pregnant' is clear modern English and fits the immediate context.
- source_word: וְיֹלַדְתְּ בֵּן
  chosen: will bear a son
  alternatives:
  - and give birth to a son
  - and you shall bear a son
  lexicon: HALOT
  rationale: Future sense in context of annunciation. 'Bear a son' is idiomatic and sufficiently formal without sounding archaic.
- source_word: מוֹרָה
  chosen: razor
  alternatives:
  - shaving blade
  lexicon: HALOT
  rationale: In Naziriteship context the noun refers specifically to a razor. This is the standard and most precise rendering.
- source_word: לֹא יַעֲלֶה עַל רֹאשׁוֹ
  chosen: shall come upon his head
  alternatives:
  - shall touch his head
  - shall be used on his head
  lexicon: HALOT
  rationale: More literal to the Hebrew idiom 'go up upon his head' while remaining natural English. It preserves the formal prohibition without over-paraphrase.
- source_word: נְזִיר אֱלֹהִים
  chosen: a Nazirite of God
  alternatives:
  - God's Nazirite
  - one consecrated to God
  lexicon: HALOT
  rationale: '''Nazirite'' is the established rendering for נְזִיר in this technical vow/consecration context. Retaining ''of God'' reflects the genitive explicitly and avoids flattening the formal designation into mere paraphrase.'
- source_word: הַנַּעַר
  chosen: the boy
  alternatives:
  - the child
  - the young man
  lexicon: HALOT
  rationale: At this stage the referent is the promised male child. 'Boy' fits the birth context better than 'young man' and is more specific than 'child' while remaining natural.
- source_word: מִן הַבָּטֶן
  chosen: from the womb
  alternatives:
  - from birth
  - from his mother's womb
  lexicon: HALOT
  rationale: Literal rendering preserves the prenatal consecration emphasis. 'From birth' would weaken the explicit womb language.
- source_word: יָחֵל
  chosen: will begin
  alternatives:
  - shall begin
  lexicon: HALOT
  rationale: Hiphil of חלל/יחל here means 'begin.' This is important narratively because Samson initiates deliverance but does not complete it fully.
- source_word: לְהוֹשִׁיעַ
  chosen: to save
  alternatives:
  - to deliver
  lexicon: HALOT
  rationale: The verb often carries the sense 'save/deliver.' 'Save' is chosen as the default rendering, with 'deliver' preserved as a viable contextual alternative.
- source_word: מִיַּד פְּלִשְׁתִּים
  chosen: from the hand of the Philistines
  alternatives:
  - from the power of the Philistines
  lexicon: HALOT
  rationale: The idiom 'from the hand of' is common in Hebrew for hostile power/control. Retaining 'hand' preserves the imagery and biblical diction while remaining understandable.
