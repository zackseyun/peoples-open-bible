revisions:
- from: Él da fuerza al cansado[a], y al que no tiene vigor le aumenta la fortaleza.
  to: Él da fuerza al cansado, y al que no tiene vigor le aumenta la fuerza.[a]
  rationale: Se corrige la nota para alinearla con la alternativa documentada en el expediente inglés y se sustituye 'fortaleza' por 'fuerza' para mayor fidelidad semántica y naturalidad en español, preservando el paralelismo poético del hebreo.
