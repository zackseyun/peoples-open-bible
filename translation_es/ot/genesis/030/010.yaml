translation:
  language: es
  text: Y Zilpa[a], la esclava de Lea, dio a luz a Jacob un hijo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «criada» o «sirvienta». El hebreo שִׁפְחָה designa a una mujer de condición doméstica subordinada; «esclava» conserva mejor esa fuerza léxica.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּלֶד
  english_pob_choice: And ... bore
  chosen_spanish: dio a luz
  alternatives_spanish:
  - parió
  - engendró
  lexicon: HALOT
  rationale: El wayyiqtol de ילד introduce una acción narrativa sucesiva; en español, «dio a luz» es la equivalencia idiomática natural para un parto, sin perder el valor eventivo del verbo.
- source_word: זִלְפָּה
  english_pob_choice: Zilpah
  chosen_spanish: Zilpa
  alternatives_spanish:
  - Zilpá
  lexicon: transliteración
  rationale: Se mantiene el nombre propio con transliteración al español; «Zilpa» es una forma clara y natural en español bíblico.
- source_word: שִׁפְחַת
  english_pob_choice: female servant
  chosen_spanish: la esclava
  alternatives_spanish:
  - la sierva
  - la criada
  - la sirvienta
  lexicon: HALOT
  rationale: שִׁפְחָה designa una mujer de condición servil/subordinada. «Esclava» conserva mejor esa fuerza léxica que «sierva» o «criada», que pueden suavizar el estatus social.
- source_word: לֵאָה
  english_pob_choice: Leah's
  chosen_spanish: de Lea
  alternatives_spanish:
  - de la casa de Lea
  lexicon: relación constructa
  rationale: La relación constructa se expresa de forma natural con «de Lea»; el sentido posesivo/relacional se mantiene sin sobrecargar el español.
- source_word: לְיַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: a Jacob
  alternatives_spanish:
  - para Jacob
  lexicon: HALOT
  rationale: Con ילד, la preposición ל marca al beneficiario o destinatario del nacimiento; en español se expresa de manera idiomática con «a Jacob».
- source_word: בֵּן
  english_pob_choice: a son
  chosen_spanish: un hijo
  alternatives_spanish:
  - un varón
  lexicon: HALOT
  rationale: El sustantivo indefinido singular se vierte naturalmente como «un hijo»; en español bíblico, esto comunica de forma directa el resultado del nacimiento.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador [a] ahora aparece en el texto español junto al nombre propio, y la nota anclada corresponde exactamente a esa decisión léxica.'
  spanish_consistency_notes:
  - Se mantiene un español bíblico claro y actual, evitando arcaísmos innecesarios.
  - «Dio a luz» preserva el evento narrativo mejor que una paráfrasis más libre.
  - «Esclava» se usa aquí por la fuerza lexical de שִׁפְחָה, coherente con la auditoría del inglés POB.
  - La estructura final respeta el orden natural del español sin perder la relación original de sujeto-verbo-objeto/dativo.
