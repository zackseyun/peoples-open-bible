id: 1TH.2.14
reference: 1 Thessalonians 2:14
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὑμεῖς γὰρ μιμηταὶ ἐγενήθητε, ἀδελφοί, τῶν ἐκκλησιῶν τοῦ θεοῦ τῶν οὐσῶν ἐν τῇ Ἰουδαίᾳ ἐν Χριστῷ Ἰησοῦ, ὅτι τὰ αὐτὰ ἐπάθετε καὶ ὑμεῖς ὑπὸ τῶν ἰδίων συμφυλετῶν καθὼς καὶ αὐτοὶ ὑπὸ τῶν Ἰουδαίων
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/002/014.yaml
  text: For you became imitators[a], brothers, of the churches of God that are in Judea in Messiah Jesus, because you also suffered the same things from your own countrymen[c][b], just as they did from the Jews.
  footnotes:
  - marker: a
    text: Or 'Christ Jesus.' The Greek title Χριστός is rendered 'Messiah' here to preserve its meaning.
    reason: alternative_reading
  - marker: b
    text: Or 'the Judeans.' The Greek Ἰουδαίων can denote either Jews or Judeans depending on context.
    reason: lexical_alternative
  - marker: c
    text: Or 'your own fellow countrymen'.
    reason: previous_rendering
translation:
  language: ko
  text: 형제 여러분, 여러분은 메시아[a] 예수 안에서 유대에 있는 하나님의 회중들[d]을 본받는 자가 되었습니다. 그들이 유대인들[b]에게서 당한 것과 마찬가지로, 여러분도 여러분 자신의 동족[c]에게서 같은 일들을 당하였기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「그리스도 예수」. 헬라어 칭호 Χριστός는 본 번역에서 「메시아」로 옮긴다.
    reason: alternative_reading
  - marker: b
    text: 또는 「유대 지역 사람들」. 헬라어 Ἰουδαίων은 문맥에 따라 유대인 혹은 유대 지역 거주민을 가리킬 수 있다.
    reason: lexical_alternative
  - marker: c
    text: 또는 「여러분의 동족 사람들」.
    reason: previous_rendering
  - marker: d
    text: 또는 「교회들」. 헬라어 ἐκκλησία는 모인 신앙 공동체를 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: μιμηταὶ ἐγενήθητε
  english_pob_choice: became imitators
  chosen_korean: 본받는 자가 되었습니다
  alternatives_korean:
  - 모방자가 되었습니다
  - 본받는 이들이 되었습니다
  lexicon: BDAG
  rationale: 1:6의 동일 어휘와 일관되게 「본받는 자」로 옮긴다.
- source_word: τῶν ἐκκλησιῶν τοῦ θεοῦ
  english_pob_choice: of the churches of God
  chosen_korean: 하나님의 회중들
  alternatives_korean:
  - 하나님의 교회들
  - 하나님의 모임들
  lexicon: BDAG
  rationale: 1:1과 일관되게 ἐκκλησία를 「회중」으로 옮긴다. 「교회들」 대안을 각주에 둔다.
- source_word: ἐν Χριστῷ Ἰησοῦ
  english_pob_choice: in Messiah Jesus
  chosen_korean: 메시아 예수 안에서
  alternatives_korean:
  - 메시아 예수 안에 있는
  - 메시아 예수께 속한
  lexicon: BDAG
  rationale: 바울의 정형 표현. 「안에서」로 처소격을 보존한다.
- source_word: τῶν ἰδίων συμφυλετῶν
  english_pob_choice: your own countrymen
  chosen_korean: 여러분 자신의 동족
  alternatives_korean:
  - 같은 민족 사람들
  - 동향 사람들
  lexicon: BDAG
  rationale: συμφυλέτης는 같은 부족·민족 구성원. 데살로니가는 헬라계 도시이므로 「동족」이 자연스럽다.
- source_word: τῶν Ἰουδαίων
  english_pob_choice: the Jews
  chosen_korean: 유대인들
  alternatives_korean:
  - 유대 지역 사람들
  - 유대인
  lexicon: BDAG
  rationale: 한국 교회 전통의 「유대인」을 본문에 두되, 본 문맥이 특정 박해 집단을 가리키며 모든 시대의 유대 민족 전체를 가리키지 않음을 본 절 흐름과 다음 절의 한정으로 분명히 한다.
theological_decisions:
- issue: τῶν Ἰουδαίων의 지시 범위
  chosen_reading: 유대인들 (본 절 흐름 안에서 14-16절의 특정 박해 집단을 가리킴)
  alternative_readings:
  - 유대 지역 사람들
  - 모든 유대 민족
  rationale: 본 절은 문법적으로 직전에 언급된 박해 집단을 이어 가리키며, 모든 시대의 유대 민족 전체에 대한 포괄적 진술로 읽혀서는 안 된다. 영어 POB의 문맥 해석(15절 각주 c)을 따른다.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension; avoid anti-Judaic readings of context-bound polemic'
