translation:
  language: es
  text: De la porción de los hijos de Judá vino la herencia de los hijos de Simeón[a], porque la porción de los hijos de Judá era demasiado grande para ellos[b]; así los hijos de Simeón recibieron su herencia dentro de la herencia de Judá[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «del territorio de los hijos de Judá». El hebreo חֶבֶל puede designar una porción medida o una región de tierra.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «los hijos de Judá» y «los hijos de Simeón», designación tribal literal que también puede expresarse como «la tribu de Judá» y «la tribu de Simeón».'
    reason: lexical_alternative
  - marker: c
    text: Es decir, la heredad asignada a Simeón quedó situada dentro del territorio asignado a Judá.
    reason: cultural_note
lexical_decisions:
- source_word: מֵ/חֶ֨בֶל֙
  english_pob_choice: from the portion
  chosen_spanish: de la porción
  alternatives_spanish:
  - del territorio
  - del tramo
  - de la región
  lexicon: HALOT
  rationale: En contextos de reparto territorial, חֶבֶל puede señalar una porción o franja de tierra delimitada. «Porción» conserva la idea de un reparto concreto y suena natural en español, sin perder el matiz geográfico.
- source_word: נַחֲלַ֖ת
  english_pob_choice: the inheritance
  chosen_spanish: la herencia
  alternatives_spanish:
  - la heredad
  - el reparto
  - la posesión
  lexicon: HALOT
  rationale: נַחֲלָה en Josué suele referirse a una heredad territorial recibida por asignación. «Herencia» mantiene esa carga de derecho recibido y funciona bien en español bíblico contemporáneo.
- source_word: בְּנֵ֣י יְהוּדָ֔ה
  english_pob_choice: the sons of Judah
  chosen_spanish: los hijos de Judá
  alternatives_spanish:
  - el pueblo de Judá
  - la tribu de Judá
  lexicon: HALOT
  rationale: Se conserva la designación literal tribal del hebreo. «Tribu de Judá» sería más idiomático, pero «hijos de Judá» es más transparente y respeta la forma del texto fuente.
- source_word: בְּנֵ֣י שִׁמְע֑וֹן
  english_pob_choice: the sons of Simeon
  chosen_spanish: los hijos de Simeón
  alternatives_spanish:
  - el pueblo de Simeón
  - la tribu de Simeón
  lexicon: HALOT
  rationale: Igual que con Judá, se retiene la designación tribal literal para mantener la correspondencia con el hebreo y la consistencia interna del pasaje.
- source_word: כִּֽי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - puesto que
  lexicon: HALOT
  rationale: Introduce la razón de la asignación territorial. «Porque» expresa de forma clara y directa la relación causal en español moderno.
- source_word: חֵ֤לֶק
  english_pob_choice: the share
  chosen_spanish: la porción
  alternatives_spanish:
  - la parte
  - la cuota
  - el reparto
  lexicon: HALOT
  rationale: Aquí חֵלֶק se acerca a una porción asignada. «Porción» enlaza bien con חֶבֶל al inicio y evita una traducción demasiado administrativa.
- source_word: רַ֣ב מֵ/הֶ֔ם
  english_pob_choice: was too large for them
  chosen_spanish: era demasiado grande para ellos
  alternatives_spanish:
  - era mayor de lo que ellos necesitaban
  - era demasiado para ellos
  - era más grande que la de ellos
  lexicon: HALOT
  rationale: La comparación expresa que la asignación de Judá excedía lo apropiado para ellos. «Demasiado grande para ellos» reproduce bien el sentido relacional de רַב con מִן sin añadir interpretación innecesaria.
- source_word: וַ/יִּנְחֲל֥וּ
  english_pob_choice: received their inheritance
  chosen_spanish: recibieron su herencia
  alternatives_spanish:
  - heredaron
  - tomaron como herencia
  - obtuvieron su herencia
  lexicon: HALOT
  rationale: En este contexto, נחל denota entrar en posesión de una heredad asignada. «Recibieron su herencia» es claro y conserva la idea de recepción por distribución.
- source_word: בְּ/ת֥וֹךְ
  english_pob_choice: within
  chosen_spanish: dentro de
  alternatives_spanish:
  - en medio de
  - dentro de los límites de
  - en
  lexicon: HALOT
  rationale: Marca ubicación interna dentro del territorio de Judá. «Dentro de» es natural en español y preserva la relación espacial del hebreo.
- source_word: נַחֲלָתָֽ/ם
  english_pob_choice: their inheritance
  chosen_spanish: la herencia de Judá
  alternatives_spanish:
  - su herencia
  - su heredad
  lexicon: HALOT
  rationale: El sufijo retoma a Judá en el contexto; por eso se explicita «de Judá» para evitar ambigüedad en español. Esta decisión sigue la revisión inglesa que aclaró el antecedente final.
theological_decisions:
- issue: Designación tribal literal frente a equivalentes más idiomáticos
  english_pob_reading: the sons of Judah / the sons of Simeon
  chosen_spanish_reading: los hijos de Judá / los hijos de Simeón
  alternative_spanish_readings:
  - la tribu de Judá / la tribu de Simeón
  - el pueblo de Judá / el pueblo de Simeón
  rationale: El texto hebreo usa una fórmula tribal literal. Mantenerla preserva la transparencia del original y evita sustituirla por una interpretación más libre, aunque «tribu» sea una posibilidad legítima de lectura.
  doctrine_reference: transparencia textual y precisión histórico-territorial
- issue: Aclaración del antecedente final de 'su herencia'
  english_pob_reading: within Judah's inheritance
  chosen_spanish_reading: dentro de la herencia de Judá
  alternative_spanish_readings:
  - dentro de su herencia
  - dentro de la heredad de ellos
  rationale: El hebreo final remite al territorio de Judá; explicitarlo en español evita ambigüedad referencial y sigue la revisión auditada del texto inglés, sin alterar el sentido.
  doctrine_reference: coherencia referencial y claridad exegética
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente, que aclaró el antecedente final como «within Judah's inheritance» para evitar ambigüedad. La versión española refleja esa misma aclaración con «dentro de la herencia de Judá», manteniendo el registro formal y la estructura del versículo.
  spanish_consistency_notes:
  - Se conservó «hijos de» como reflejo literal de בְּנֵי, en línea con la transparencia del POB.
  - Se usó «herencia» para נַחֲלָה a lo largo del versículo para mantener consistencia terminológica.
  - Se evitó «SEÑOR» o sustituciones teológicas no presentes en este versículo.
  - No hay términos como יהוה, Cristo/Mesías, o Espíritu en este versículo; no se añadieron decisiones ajenas al texto.
