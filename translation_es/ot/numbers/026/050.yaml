revisions:
- from: Estas son las familias de Neftalí[a], y los registrados de ellos[b] fueron cuarenta y cinco mil cuatrocientos.
  to: Estos son los clanes de Neftalí, por sus clanes[a], y los registrados de entre ellos[b] fueron cuarenta y cinco mil cuatrocientos.
  rationale: Se cambia «familias» por «clanes» para alinearse con la decisión léxica del POB en un contexto de censo tribal. Se reubica la nota [a] para que explique correctamente לְמִשְׁפְּחֹתָם. Se suaviza «de ellos» a «de entre ellos» para un español más natural sin perder el sentido colectivo-partitivo de וּפְקֻדֵיהֶם.
