  text: וְ/עָֽנְתָה בִּ֤/י צִדְקָתִ/י֙ בְּ/י֣וֹם מָחָ֔ר כִּֽי תָב֥וֹא עַל שְׂכָרִ֖/י לְ/פָנֶ֑י/ךָ כֹּ֣ל אֲשֶׁר אֵינֶ/נּוּ֩ נָקֹ֨ד וְ/טָל֜וּא בָּֽ/עִזִּ֗ים וְ/חוּם֙ בַּ/כְּשָׂבִ֔ים גָּנ֥וּב ה֖וּא אִתִּֽ/י־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/genesis/030/033.yaml
  text: 'So my righteousness will answer for me later[a], when you come concerning my wages before you: every goat that is not speckled and spotted, and every lamb that is not dark[e][d][c][b], is stolen if it is found with me.'
  footnotes:
  - marker: a
    text: Or 'my righteousness' or 'my integrity will answer for me.' Here the Hebrew term refers to Jacob's demonstrable uprightness in the wage arrangement.
    reason: lexical_alternative
  - marker: b
    text: Literally 'on the day tomorrow'; the phrase may mean 'tomorrow' or more generally 'at a later time' when Laban examines the flock.
    reason: lexical_alternative
  - marker: c
    text: Or 'brown' among the sheep/lambs; the Hebrew term denotes a dark-colored animal.
    reason: lexical_alternative
  - marker: d
    text: Or 'every one among the goats that is not speckled or spotted, and among the lambs that is not dark-colored'.
    reason: previous_rendering
  - marker: e
    text: Or 'when you come to inspect my wages before you'.
    reason: previous_rendering
