translation:
  language: es
  text: '«Hijo de hombre, dile a ella: “Tú eres una tierra no purificada y sin lluvia[a] en el día de la indignación[b]”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión hebrea es rara y también puede entenderse como «no rociada» o «no llovida» en el día de la ira.
    reason: lexical_alternative
  - marker: b
    text: 'O: «en el día de la ira».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  english_pob_choice: Son of man
  chosen_spanish: Hijo de hombre
  alternatives_spanish:
  - Hombre mortal
  - Ser humano
  lexicon: HALOT
  rationale: Conservo la forma profética e idiomática del hebreo, como hace la traducción inglesa auditada. En español, «Hijo de hombre» mantiene el registro y la ambigüedad convencional mejor que una paráfrasis explicativa.
- source_word: אֱמָר לָהּ
  english_pob_choice: say to her
  chosen_spanish: dile a ella
  alternatives_spanish:
  - háblale
  - dile
  lexicon: HALOT
  rationale: La forma imperativa con sufijo pronominal se expresa de manera directa en español. «Dile a ella» conserva la referencia explícita al destinatario femenino del pueblo/territorio, aunque en estilo fluido también podría decirse simplemente «dile».
- source_word: אַתְּ אֶרֶץ
  english_pob_choice: You are a land
  chosen_spanish: Tú eres una tierra
  alternatives_spanish:
  - Eres una tierra
  - Tú eres la tierra
  lexicon: HALOT
  rationale: El pronombre enfático y el sustantivo identifican al destinatario como tierra en sentido metafórico. «Tierra» funciona mejor que «país» para no estrechar el campo semántico del hebreo.
- source_word: לֹא מְטֹהָרָה
  english_pob_choice: not cleansed
  chosen_spanish: no purificada
  alternatives_spanish:
  - no limpiada
  - no limpia
  - no purificada
  lexicon: HALOT
  rationale: La forma pasiva participial sugiere estado de no haber sido hecha limpia/pura. En español, «purificada» preserva mejor el matiz ritual-moral que «limpia», y evita una lectura meramente higiénica.
- source_word: לֹא גֻשְׁמָהּ
  english_pob_choice: not rained on
  chosen_spanish: no regada
  alternatives_spanish:
  - no llovida
  - no rociada
  - no bañada por la lluvia
  lexicon: HALOT
  rationale: Sigo la lectura de acción pasiva relacionada con lluvia/aguacero. «Regada» es idiomática en español y puede sugerir la lluvia como riego; además mantiene la posible ambigüedad preservada por la nota inglesa sobre el hebreo raro.
- source_word: בְּיוֹם זָעַם
  english_pob_choice: in the day of indignation
  chosen_spanish: en el día de la indignación
  alternatives_spanish:
  - en el día de la ira
  - en el día del enojo
  lexicon: HALOT
  rationale: «Indignación» traduce de manera digna el campo semántico de זעם y sigue la decisión inglesa. Mantiene el tono profético-jurídico sin forzar una identificación explícita adicional en el verso.
theological_decisions:
- issue: Estado de impureza / purificación de la tierra
  english_pob_reading: The verse describes the land as uncleansed and lacking rain in a time of judgment, without specifying a doctrinal mechanism beyond prophetic condemnation.
  chosen_spanish_reading: El versículo describe a la tierra como no purificada y sin lluvia, dentro del marco de un juicio profético, sin reducir la imagen a un solo sentido ritual o meteorológico.
  alternative_spanish_readings:
  - La tierra está ritualmente impura
  - La tierra solo sufre sequía
  rationale: 'Mantengo la tensión interpretativa del hebreo: la falta de purificación y la falta de lluvia pueden leerse juntas como imagen profética de juicio. No cierro el sentido hacia un mecanismo exclusivamente ritual ni exclusivamente climático.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del texto inglés, que unió los dos predicados con «and» para reflejar mejor la estructura doble del hebreo: «not cleansed and not rained on». En español se refleja con «y»/«no purificada y no regada», manteniendo ambos rasgos como predicados coordinados.'
  spanish_consistency_notes:
  - Se usa «Hijo de hombre» para conservar la convención profética del hebreo y la decisión auditada en inglés.
  - Se usa «Yahvé» no aplica en este versículo; no hay tetragrámaton en el texto.
  - «Tierra» se mantiene para אֶרֶץ por su valor metafórico general y para no limitar el referente a un territorio político.
  - Se preserva la posible ambigüedad de גשם mediante «regada» y la nota, sin resolverla de forma excesiva.
