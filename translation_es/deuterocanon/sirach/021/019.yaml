revisions:
- from: La instrucción es como grilletes[a] en los pies de los insensatos, y como esposas en la mano derecha.
  to: La instrucción[a] es grilletes en los pies de los insensatos, y como esposas en la mano derecha.
  rationale: Se elimina «como» de la primera cláusula para ajustarse a la metáfora identificativa del griego, y se reubica la nota al pie en «instrucción», donde realmente corresponde la alternativa «disciplina». La nota también conserva la alternativa inglesa de frase completa con «manillas» para χειροπέδαι, sin sobrecargar el texto principal. No se requiere adjudicación adicional.
