translation:
  language: es
  text: 'Entonces se dijeron unos a otros: «En verdad, somos culpables con respecto a nuestro hermano, porque vimos la angustia de su alma[a] cuando nos rogaba, y no escuchamos[b]. Por eso ha venido sobre nosotros esta angustia».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su angustia». El hebreo dice literalmente «la angustia de su alma», una expresión de profunda angustia personal.
    reason: lexical_alternative
  - marker: b
    text: El hebreo usa la misma raíz para la «angustia» de José y la «angustia» presente de sus hermanos, enlazando su crueldad pasada con su sufrimiento actual.
    reason: cross_reference
lexical_decisions:
- source_word: וַיֹּאמְרוּ אִישׁ אֶל־אָחִיו
  english_pob_choice: Then they said to one another
  chosen_spanish: Entonces se dijeron uno al otro
  alternatives_spanish:
  - Y se dijeron uno a otro
  - Y se hablaron entre sí
  lexicon: HALOT
  rationale: La expresión distributiva indica habla recíproca entre los hermanos. «Uno al otro» conserva esa reciprocidad de manera natural en español; «entonces» refleja el waw narrativo sin forzar una fórmula mecánica.
- source_word: אֲבָל
  english_pob_choice: Indeed
  chosen_spanish: En verdad
  alternatives_spanish:
  - De veras
  - Ciertamente
  - En efecto
  lexicon: HALOT
  rationale: Aquí no introduce contraste principal, sino una confesión enfática. «En verdad» transmite bien ese peso solemne y confesional en español bíblico contemporáneo.
- source_word: אֲשֵׁמִים אֲנַחְנוּ
  english_pob_choice: we are guilty
  chosen_spanish: somos culpables
  alternatives_spanish:
  - somos culpables
  - estamos en falta
  - somos reos
  lexicon: HALOT
  rationale: El adjetivo expresa culpa o responsabilidad moral/judicial. «Somos culpables» es claro y fiel al tono de reconocimiento de culpa del pasaje.
- source_word: עַל־אָחִינוּ
  english_pob_choice: concerning our brother
  chosen_spanish: con respecto a nuestro hermano
  alternatives_spanish:
  - acerca de nuestro hermano
  - en cuanto a nuestro hermano
  - contra nuestro hermano
  lexicon: HALOT
  rationale: La preposición señala el ámbito de la culpa. «Con respecto a» mantiene la precisión sin cargar de antemano una hostilidad más fuerte que la expresada explícitamente.
- source_word: צָרַת נַפְשׁוֹ
  english_pob_choice: the distress of his soul
  chosen_spanish: la angustia de su alma
  alternatives_spanish:
  - su angustia
  - el dolor de su alma
  - la angustia de su vida
  lexicon: HALOT
  rationale: La fórmula hebrea es literalmente «la angustia de su alma/vida». «Angustia de su alma» conserva la imagen y la intensidad interna del original; además permite mantener el vínculo léxico con la angustia final del versículo.
- source_word: בְּהִתְחַנְנוֹ אֵלֵינוּ
  english_pob_choice: when he pleaded with us
  chosen_spanish: cuando nos rogaba
  alternatives_spanish:
  - cuando nos suplicaba
  - mientras nos imploraba
  - al rogarnos
  lexicon: HALOT
  rationale: El hitpael de חנן expresa súplica insistente. «Nos rogaba» comunica la acción continua y el apremio de la petición sin añadir contenido ajeno al texto.
- source_word: וְלֹא שָׁמָעְנוּ
  english_pob_choice: and we did not listen
  chosen_spanish: y no escuchamos
  alternatives_spanish:
  - y no oímos
  - pero no quisimos escuchar
  - y no le hicimos caso
  lexicon: HALOT
  rationale: שׁמע aquí implica oír con atención y responder. «No escuchamos» preserva ese sentido de no prestar oído ni atender a su ruego.
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Por consiguiente
  - Así que
  lexicon: HALOT
  rationale: La frase introduce consecuencia. «Por eso» es natural en español y mantiene el vínculo causal sin perder la formalidad del registro.
- source_word: בָּאָה אֵלֵינוּ הַצָּרָה הַזֹּאת
  english_pob_choice: this distress has come upon us
  chosen_spanish: ha venido sobre nosotros esta angustia
  alternatives_spanish:
  - nos ha sobrevenido esta angustia
  - ha caído sobre nosotros esta angustia
  - esta desgracia ha venido sobre nosotros
  lexicon: HALOT
  rationale: Se conserva el paralelismo léxico con צָרַת mediante «angustia», y el giro «venir sobre» refleja el hebreo idiomáticamente. «Angustia» también ayuda a reproducir la repetición conceptual entre el sufrimiento de José y el de ellos.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del audit trail: se prefirió un equivalente formal para אֲבָל y una marca causal formal para עַל־כֵּן. En español se reflejó con «En verdad» y «Por eso», manteniendo el nivel de registro y la claridad narrativa. También se conservó la repetición léxica de צָרָה/צָרַת con «angustia» para preservar el juego de palabras auditado.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque no aparece en el texto fuente.
  - «Angustia» se usó de forma consistente para צָרַת/הַצָּרָה a fin de preservar la conexión léxica interna.
  - No se introdujo «Cristo/Mesías» ni terminología doctrinal ajena al pasaje.
  - El tono es formal y publicación-readable, sin calco excesivamente rígido.
