review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del hebreo y sigue de cerca las decisiones del POB en inglés: interioridad de בְּמַדָּעֲךָ, anartro de מֶלֶךְ como «un rey», prohibición con «maldigas», privacidad idiomática de בְחַדְרֵי מִשְׁכָּבְךָ, y la advertencia proverbial sobre la difusión de palabras privadas. Sin embargo, «llevar la voz» se aparta de la elección auditada «carry the sound» y en español suena menos natural y algo ambiguo; conviene ajustar a una formulación más fiel y clara. También hay un pequeño problema formal en la nota c, que abre con una comilla innecesaria.'
  spanish_quality_summary: El español es claro y digno, con buen registro e inteligibilidad eclesial amplia. «En tu dormitorio» funciona muy bien. «Un rico» es comprensible, aunque algo más brusco/nominalizado que «un hombre rico»; aun así, no requiere cambio. El principal reto de fluidez está en «puede llevar la voz», que no es la forma más idiomática en este contexto. La puntuación y estructura general son buenas.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. Las decisiones léxicas principales son coherentes con el rastro del POB, salvo que para קוֹל es preferible mantener «sonido» o una formulación equivalente más cercana al inglés auditado que «voz».
  issues:
  - severity: medium
    issue: «puede llevar la voz» para יוֹלִיךְ אֶת־הַקּוֹל
    rationale: Aunque קוֹל puede significar «voz», el POB auditado escogió «may carry the sound» para preservar la imagen más literal. En español, «llevar la voz» puede sugerir liderazgo o una locución fija, y no comunica tan claramente la idea de transmitir lo oído/dicho. «puede llevar el sonido» o «puede llevar lo dicho» sería más fiel; dado el rastro auditado, «el sonido» es la reparación mínima preferible.
  - severity: low
    issue: Comilla sobrante en la nota c
    rationale: La nota c comienza con una comilla simple antes de «Hebreo», lo cual es un error tipográfico y debe corregirse.
  revised_spanish_text: Aun en tus pensamientos[a], no maldigas a un rey, y en tu dormitorio[b] no maldigas a un rico, porque un ave de los cielos[c] puede llevar el sonido, y un ser alado puede dar a conocer el asunto.
  revised_footnotes:
  - marker: a
    text: O «en tu mente».
    reason: alternative_reading
  - marker: b
    text: Literalmente, «en las cámaras de tu lecho»; es decir, en la privacidad de tu dormitorio.
    reason: cultural_note
  - marker: c
    text: 'Hebreo: «ave de los cielos»; compárese el modismo detrás de la expresión «un pajarito me lo contó».'
    reason: cross_reference
  revision_rationale: 'Se hace una reparación pequeña pero importante: «llevar el sonido» sigue mejor la elección auditada «carry the sound» y evita la ambigüedad idiomática de «llevar la voz». También se corrige la comilla errónea en la nota c. El resto del versículo puede mantenerse tal como está.'
