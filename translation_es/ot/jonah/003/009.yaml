translation:
  language: es
  text: ¿Quién sabe? Dios puede volverse y desistir[a], y volverse del ardor de su ira[b], para que no perezcamos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Desistir» también podría traducirse «cambiar de parecer» o «volverse atrás». Aquí se refiere a que Dios retire el juicio anunciado.
    reason: alternative_reading
  - marker: b
    text: O «de su ira ardiente». El hebreo literalmente habla del «ardor» o «quemadura» de su ira.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי יוֹדֵעַ
  english_pob_choice: Who knows?
  chosen_spanish: ¿Quién sabe?
  alternatives_spanish:
  - ¿Quién puede saberlo?
  - Quizá
  lexicon: HALOT
  rationale: La expresión es idiomática y retórica; «¿Quién sabe?» conserva mejor la incertidumbre esperanzada que una versión más explicativa.
- source_word: יָשׁוּב
  english_pob_choice: may turn
  chosen_spanish: puede volverse
  alternatives_spanish:
  - puede volver
  - volverá
  lexicon: HALOT
  rationale: El valor aquí es de posibilidad tras una pregunta retórica, no de certeza. «Volverse» mantiene el verbo שוב con naturalidad en español.
- source_word: וְנִחַם
  english_pob_choice: and relent
  chosen_spanish: y arrepentirse[b]
  alternatives_spanish:
  - y desistir
  - y ceder
  - y cambiar de parecer
  lexicon: HALOT
  rationale: En referencia a Dios, נחם expresa la idea de apartarse del juicio anunciado. «Arrepentirse» es una equivalencia posible en español bíblico, pero puede sonar más fuerte; por eso se acompaña con nota para preservar la tensión semántica que el inglés POB marcó con «relent».
- source_word: הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - el verdadero Dios
  lexicon: HALOT
  rationale: El sustantivo definido se refiere al Dios de Israel en el contexto narrativo; «Dios» es la forma natural y fiel en español.
- source_word: וְשָׁב
  english_pob_choice: and turn
  chosen_spanish: y volverse
  alternatives_spanish:
  - y volver
  - y apartarse
  lexicon: HALOT
  rationale: Se conserva la repetición de שוב con el mismo verbo español, para reflejar la estructura hebrea y su paralelismo.
- source_word: מֵחֲרוֹן אַפּוֹ
  english_pob_choice: from the burning of his anger
  chosen_spanish: del ardor de su ira[c]
  alternatives_spanish:
  - de su ira ardiente
  - del fuego de su ira
  - del ardor de su enojo
  lexicon: HALOT
  rationale: La expresión idiomática hebrea literalmente habla del «ardor/quemadura» de la ira. «Ardor de su ira» preserva mejor la imagen de calor que «ira furiosa» o «ira intensa».
- source_word: וְלֹא נֹאבֵד
  english_pob_choice: so that we do not perish
  chosen_spanish: para que no perezcamos
  alternatives_spanish:
  - y no perezcamos
  - para no perecer
  lexicon: HALOT
  rationale: La frase expresa el resultado esperado de la respuesta divina; «para que no perezcamos» comunica bien la finalidad y mantiene la primera persona plural.
theological_decisions:
- issue: נחם aplicado a Dios
  english_pob_reading: God may 'relent' rather than 'change his mind' or 'be sorry'
  chosen_spanish_reading: Dios puede «arrepentirse» en el sentido de apartarse del juicio anunciado
  alternative_spanish_readings:
  - Dios puede «relentizar»/«ceder» (no idiomático)
  - Dios puede «cambiar de parecer»
  rationale: La traducción debe preservar la tensión bíblica sin resolverla filosóficamente. En español, «arrepentirse» puede sugerir remordimiento humano; por eso la nota aclara que aquí se trata de retirarse del castigo anunciado, no de una falla moral o ignorancia en Dios.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El pasaje sigue de cerca la lectura consolidada del audit trail inglés: se preserva la pregunta retórica, la repetición de שוב con «volverse», y la tensión semántica de נחם aplicada a Dios. No se introdujeron cambios textuales ni decisiones divergentes respecto del estado revisado más reciente.'
  spanish_consistency_notes:
  - Se mantiene «Dios» sin mayúsculas adicionales ni sustitución por títulos eclesiásticos.
  - Se conserva la repetición verbal hebrea con «volverse» para ambas instancias de שוב.
  - La nota de «arrepentirse» distingue entre el valor bíblico de apartarse del juicio y el sentido moral de remordimiento.
  - «Ira» se usa para evitar un tono excesivamente interpretativo como «enojo» o «furor», aunque ambos quedan en las alternativas.
  - El resultado final usa un registro bíblico claro y contemporáneo, sin calco rígido del inglés.
