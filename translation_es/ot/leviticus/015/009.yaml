revisions:
- from: Y todo lo que monta el [a] manchado con flujo será inmundo.
  to: Y toda montura sobre la cual monte el hombre con flujo será inmunda[a].
  rationale: Se corrige la sintaxis para reflejar correctamente 'sobre la cual monte', se reemplaza la formulación inadecuada 'lo que monta' por 'montura', y se usa 'el hombre con flujo' para representar con claridad y dignidad הַזָּב. La nota al pie preserva la amplitud léxica documentada por el POB en un español natural.
