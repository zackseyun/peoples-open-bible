translation:
  language: es
  text: Por eso su nombre fue Babel[a], porque allí Yahvé confundió la lengua de toda la tierra, y desde allí Yahvé los dispersó sobre la faz de toda la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Babel suena como el verbo hebreo balal, «confundir» o «mezclar», lo cual explica el nombre en este versículo.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Entonces
  - Así que
  lexicon: HALOT
  rationale: La frase introduce la conclusión causal de la explicación del nombre. «Por eso» comunica bien la relación inferencial en español sin sonar pesado ni demasiado formal.
- source_word: קָרָא שְׁמָהּ
  english_pob_choice: its name was called
  chosen_spanish: se llamó su nombre
  alternatives_spanish:
  - se le puso nombre
  - fue llamado su nombre
  - lo nombraron
  lexicon: HALOT
  rationale: El hebreo conserva una fórmula nominal de nombramiento. «Se llamó su nombre» mantiene ese sabor formal mejor que una paráfrasis más libre, y evita introducir un sujeto no explícito.
- source_word: בָּבֶל
  english_pob_choice: Babel
  chosen_spanish: Babel
  alternatives_spanish:
  - Babilonia
  lexicon: HALOT
  rationale: Es nombre propio y debe transliterarse. «Babel» permite conservar el juego verbal del versículo con בלל en la nota.
- source_word: כִּי שָׁם
  english_pob_choice: because there
  chosen_spanish: porque allí
  alternatives_spanish:
  - pues allí
  - ya que allí
  lexicon: HALOT
  rationale: La partícula causal explica el nombre. «Porque allí» es natural en español y conserva la referencia locativa inmediata.
- source_word: בָּלַל
  english_pob_choice: confused
  chosen_spanish: confundió
  alternatives_spanish:
  - mezcló
  - confabuló
  lexicon: HALOT
  rationale: En este contexto el verbo expresa el desorden y la mezcla de las lenguas. «Confundió» es la equivalencia más clara y idiomática en español, preservando el sentido narrativo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: Siguiendo el criterio del proyecto para el Tetragrámaton, se usa el nombre divino «Yahvé» en lugar de una sustitución por título. Esto conserva la identificación directa del nombre personal de Dios en el texto fuente.
- source_word: שְׂפַת כָּל הָאָרֶץ
  english_pob_choice: the language of all the earth
  chosen_spanish: la lengua de toda la tierra
  alternatives_spanish:
  - el idioma de toda la tierra
  - la habla de toda la tierra
  lexicon: HALOT
  rationale: שָׂפָה literalmente es «labio», pero aquí funciona idiomáticamente como «lengua/idioma». «La lengua» conserva la concreción semítica y suena natural en español bíblico.
- source_word: וּמִשָּׁם
  english_pob_choice: and from there
  chosen_spanish: y desde allí
  alternatives_spanish:
  - y de allí
  - y desde ese lugar
  lexicon: HALOT
  rationale: Mantiene el enlace narrativo con el lugar anterior. «Desde allí» es fluido y preciso en español.
- source_word: הֱפִיצָם
  english_pob_choice: scattered them
  chosen_spanish: los dispersó
  alternatives_spanish:
  - los esparció
  - los repartió
  lexicon: HALOT
  rationale: El hiphil de פוץ indica hacer que se esparzan. «Dispersó» comunica bien el acto de distribuirlos por la tierra, con un registro digno y claro.
- source_word: עַל פְּנֵי כָּל הָאָרֶץ
  english_pob_choice: over the face of all the earth
  chosen_spanish: sobre la faz de toda la tierra
  alternatives_spanish:
  - sobre toda la tierra
  - por la superficie de toda la tierra
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de «la faz» para mantener la fuerza idiomática y el paralelismo del versículo, a la vez que resulta comprensible en español.
theological_decisions:
- issue: Nombre divino יְהוָה en un versículo con relato etiológico
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton, no un título sustitutivo. Por fidelidad al criterio del proyecto y para preservar la presencia del nombre propio de Dios en el relato, se usa «Yahvé».
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Juego de palabras entre Babel y בָּלַל
  english_pob_reading: Babel sounds like the Hebrew verb for 'confused' or 'mixed' (balal), which explains the name in this verse.
  chosen_spanish_reading: Babel[a] con nota explicativa del vínculo con בלל
  alternative_spanish_readings:
  - Babel sin nota
  - Babel, que suena como 'mezcló'
  rationale: El español no puede reproducir plenamente el juego fonético dentro del flujo principal. Se conserva el nombre propio y se documenta la relación etimológica/etiológica en la nota para no perder la tensión lexical del texto.
  doctrine_reference: Nota lexical del propio versículo; sin controversia doctrinal
translation_notes:
  revision_awareness: 'La base inglesa y el audit trail permanecen estables en la última revisión: no hubo cambios aplicados y el veredicto de revisión fue de alta concordancia. La redacción española sigue esa línea, conservando el nombre propio, la causalidad del hebreo y el nombre divino según el criterio actualizado.'
  spanish_consistency_notes:
  - Se mantuvo el nombre divino «Yahvé» de manera consistente con el estándar del proyecto para יְהוָה.
  - Se conservó la repetición de «toda la tierra» y la imagen de «la faz» para reflejar la estructura hebrea.
  - No se suavizó la explicación etimológica de Babel; se dejó en nota para respetar el juego de palabras del original.
  - Se evitó «SEÑOR» como sustitución del nombre divino, conforme a la política terminológica del proyecto.
