translation:
  language: es
  text: Yo era íntegro[a] delante de él, y me guardé de mi iniquidad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “completo” o “íntegro en su totalidad”. El hebreo puede resaltar integridad o plenitud, no solo ausencia de acusación.
    reason: lexical_alternative
  - marker: b
    text: O “de mi pecado” o “de mi culpa”. La palabra hebrea puede significar iniquidad, culpa o pecado según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶהְיֶה
  english_pob_choice: I was
  chosen_spanish: Yo era
  alternatives_spanish:
  - Y era
  - Yo fui
  lexicon: HALOT
  rationale: El verbo היה en esta forma narrativa expresa estado/condición pasada; en español, 'era' comunica mejor una condición continua o habitual que 'fui', que podría sonar más puntual. Se añade 'Yo' para mantener la fuerza enfática del sujeto implícito.
- source_word: תָמִים
  english_pob_choice: blameless
  chosen_spanish: íntegro
  alternatives_spanish:
  - irreprensible
  - intachable
  - completo
  lexicon: HALOT
  rationale: '''Íntegro'' conserva la idea de integridad moral/totalidad sin sugerir necesariamente ausencia absoluta de pecado. En español, ''blameless'' suele quedar mejor como ''íntegro'' cuando el contexto enfatiza rectitud e integridad de carácter.'
- source_word: ל֑וֹ
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - ante él
  - para él
  - con él
  lexicon: HALOT
  rationale: La relación es evaluativa y relacional; 'delante de él' reproduce de forma natural la idea de estar en la presencia o a la vista de Dios, sin forzar una traducción literal como 'a él'.
- source_word: וָאֶשְׁתַּמְּרָה
  english_pob_choice: I kept myself
  chosen_spanish: me guardé
  alternatives_spanish:
  - me cuidé
  - me mantuve en guardia
  - me preservé
  lexicon: HALOT
  rationale: El hitpael expresa auto-guardia/reflexividad. 'Me guardé' es una solución breve y fiel que conserva el matiz de vigilancia sobre uno mismo.
- source_word: מֵעֲוֺנִי
  english_pob_choice: from my iniquity
  chosen_spanish: de mi iniquidad
  alternatives_spanish:
  - de mi culpa
  - de mi pecado
  lexicon: HALOT
  rationale: '''Iniquidad'' mantiene el peso moral del término עָוֹן y preserva la gama semántica documentada por la POB inglesa. Se evita reducirlo solo a ''pecado'' o ''culpa''.'
theological_decisions:
- issue: ¿La afirmación implica perfección sin pecado?
  english_pob_reading: A claim of covenantal integrity/blamelessness in context, not absolute sinlessness
  chosen_spanish_reading: Una afirmación de integridad delante de Dios, no de impecabilidad absoluta
  alternative_spanish_readings:
  - Una afirmación de perfección moral absoluta
  - Una autodeclaración de inocencia total
  rationale: '''Íntegro'' y ''delante de él'' conservan la tensión bíblica: el hablante afirma integridad real ante Dios sin exigir que el verso enseñe impecabilidad absoluta. Esto sigue la lectura auditada de la POB inglesa.'
  doctrine_reference: 'Translation philosophy #3: Preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: Pasaje revisado con alta concordancia respecto del audit trail inglés; no se detectaron cambios sustantivos en la revisión más reciente.
  spanish_consistency_notes:
  - Se mantiene 'Dios' implícito en el pronombre 'él' conforme al contexto del verso y del capítulo.
  - '''Íntegro'' se usa para conservar el campo semántico de תָמִים sin caer en un calco rígido.'
  - '''Me guardé'' refleja la reflexividad del hebreo y evita una formulación demasiado interpretativa.'
