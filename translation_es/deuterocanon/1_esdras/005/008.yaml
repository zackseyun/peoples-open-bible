  revised_footnotes:
  - marker: a
    text: Varios nombres de esta lista difieren en su forma respecto del paralelo hebreo aproximado en Esdras/Nehemías. La traducción sigue el texto griego de 1 Esdras y no normaliza esos nombres a las formas hebreas.
    reason: alternative_reading
  revision_rationale: Se conserva la sintaxis clara del borrador, pero se corrigen varios nombres para alinearlos mejor con la decisión documentada de seguir las formas griegas distintivas de 1 Esdras en vez de normalizarlas a formas hebreas o españolas más conocidas. También se ajusta 'sus dirigentes' a 'sus líderes' por mayor naturalidad contextual.
