  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del griego: εἰδότες se vierte naturalmente como «Porque sabemos» en continuidad con v. 3; ἀδελφοὶ se conserva como «hermanos»; ἠγαπημένοι ὑπὸ θεοῦ como «amados por Dios»; y τὴν ἐκλογὴν ὑμῶν como «su elección». Sin embargo, la nota a del borrador no preserva fielmente la alternativa del POB inglés: debería indicar «hermanos y hermanas», no «hermanas».'
  spanish_quality_summary: 'El español es claro, digno y natural. «Porque sabemos, hermanos amados por Dios, su elección» suena bien y conserva el peso teológico de «elección». El único problema real es de nota explicativa: «O “hermanas”» es engañoso, porque no corresponde a la alternativa auditada ni al valor inclusivo señalado. El resto está bien; «su elección» es aceptable en español neutro aunque algo potencialmente ambiguo fuera de contexto, pero aquí el referente plural es suficientemente claro.'
  glossary_alignment: 'Alineación buena con los términos del proyecto: θεοῦ -> «Dios»; ἀδελφοὶ -> «hermanos» con nota inclusiva; ἐκλογή -> «elección», preservando la carga léxica y teológica sin estrecharla. No hay conflicto con los glosarios mayores del proyecto.'
