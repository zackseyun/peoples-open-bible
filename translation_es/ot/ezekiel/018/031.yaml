revisions:
- from: ¡Arrojad de sobre vosotros todos vuestros pecados[a], con los que habéis pecado, y haceos un corazón nuevo y un espíritu nuevo! ¿Por qué habríais de morir, casa de Israel?
  to: Arrojen de sobre ustedes todas sus transgresiones[a] con las cuales han transgredido, y háganse un corazón nuevo y un espíritu nuevo. ¿Por qué habrían de morir, casa de Israel?
  rationale: 'Se revisa para alinear mejor el español con el hebreo y con las decisiones auditadas del POB inglés: se reemplaza «pecados» por «transgresiones» y «han transgredido» para conservar la repetición cognada de פשע; se actualiza el texto a un español neutral latinoamericano usando formas de ustedes; y se mantiene la fuerza del mandato y la tensión teológica de «háganse un corazón nuevo y un espíritu nuevo» sin suavizarla. La nota también se ajusta para reflejar la alternativa «rebeliones» conservando la misma repetición léxica.'
  reviewer_model: gpt-5.4
