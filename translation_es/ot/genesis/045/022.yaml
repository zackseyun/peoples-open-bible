translation:
  language: es
  text: A cada uno de ellos le dio una muda de ropa, pero a Benjamín le dio trescientas piezas de plata[a] y cinco mudas de ropa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «trescientos plata»; no se especifica la unidad monetaria, por eso se traduce «piezas de plata» y no un término más específico como «siclos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְכֻלָּם
  english_pob_choice: to each of them
  chosen_spanish: a todos
  alternatives_spanish:
  - a cada uno de ellos
  - a todos ellos
  lexicon: HALOT
  rationale: El hebreo marca un reparto distributivo hacia todo el grupo; en español, «a todos» comunica de forma natural esa distribución sin añadir información inexistente. Mantiene el contraste con la ofrenda especial a Benjamín.
- source_word: נָתַן
  english_pob_choice: he gave
  chosen_spanish: les dio
  alternatives_spanish:
  - les entregó
  - les otorgó
  lexicon: HALOT
  rationale: En un contexto narrativo de obsequios, «dio» es el equivalente más directo y sobrio. Conserva el valor simple del verbo hebreo sin elevar innecesariamente el registro.
- source_word: חֲלִפוֹת שְׂמָלֹת
  english_pob_choice: a change of clothes
  chosen_spanish: una muda de ropa
  alternatives_spanish:
  - un cambio de ropa
  - un juego de ropa
  - unas vestiduras
  lexicon: HALOT
  rationale: La expresión hebrea designa un conjunto de ropa de reemplazo. «Muda de ropa» es natural en español y refleja bien la idea de una sola unidad para cada hermano; «vestiduras» sería más solemne, pero menos transparente aquí.
- source_word: לְבִנְיָמִן
  english_pob_choice: but to Benjamin
  chosen_spanish: pero a Benjamín
  alternatives_spanish:
  - y a Benjamín
  - en cambio, a Benjamín
  lexicon: HALOT
  rationale: El hebreo introduce un contraste claro entre el reparto común y el regalo excepcional para Benjamín. «Pero» preserva ese giro contrastivo de manera directa.
- source_word: שְׁלֹשׁ מֵאוֹת כֶּסֶף
  english_pob_choice: three hundred pieces of silver
  chosen_spanish: trescientos siclos de plata
  alternatives_spanish:
  - trescientas piezas de plata
  - trescientos de plata
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «trescientos plata» y no nombra la unidad, el POB inglés evita especificar «shekels» por falta de respaldo explícito. En español, «siclos de plata» comunica una suma monetaria natural y tradicional; no obstante, dado que la unidad no está expresada en el hebreo, esta decisión conserva la tensión solo si se entiende como una convención de equivalencia monetaria histórica. La alternativa más estrictamente formal sería «trescientas piezas de plata», pero suena menos natural en español.
- source_word: וְחָמֵשׁ חֲלִפֹת שְׂמָלֹת
  english_pob_choice: and five changes of clothes
  chosen_spanish: y cinco mudas de ropa
  alternatives_spanish:
  - y cinco cambios de ropa
  - y cinco juegos de ropa
  - y cinco vestiduras
  lexicon: HALOT
  rationale: Se mantiene la misma expresión que antes para conservar la coherencia léxica y el paralelismo del versículo. El número se expresa de forma literal y natural.
theological_decisions:
- issue: Alcance distributivo del regalo inicial
  english_pob_reading: To each of them he gave
  chosen_spanish_reading: A todos les dio una muda de ropa
  alternative_spanish_readings:
  - A cada uno de ellos les dio una muda de ropa
  - Les dio a cada uno una muda de ropa
  rationale: No hay tensión doctrinal, pero sí una cuestión de énfasis distributivo. El hebreo combina un plural total y una forma singular distributiva para subrayar que cada hermano recibió una prenda. El español lo expresa de manera fluida sin perder la distribución individual.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El texto español sigue el ajuste del audit trail inglés que pasó de una construcción distributiva más pesada a una formulación más natural («to each of them he gave»), y conserva la equivalencia general del regalo singular para cada hermano y la dádiva excepcional para Benjamín. También toma en cuenta la decisión de no forzar una unidad monetaria inexistente en el hebreo, aunque el español tradicional puede optar por una moneda histórica equivalente.
  spanish_consistency_notes:
  - Se mantuvo «muda de ropa» de manera uniforme para traducir חֲלִפוֹת שְׂמָלֹת en ambos miembros del versículo.
  - Se usó «Benjamín» con ortografía española estándar y el registro bíblico habitual.
  - Se preservó el contraste con «pero» para reflejar la estructura adversativa del hebreo y del audit trail inglés.
  - Se evitó un calco como «cambios de vestidos» por sonar poco natural en español.
  - Se dejó explícita la diferencia entre el regalo común y el regalo especial a Benjamín.
