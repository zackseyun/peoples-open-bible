lexical_decisions:
- source_word: וַנְיָה
  english_pob_choice: Vaniah
  chosen_spanish: Vanías
  alternatives_spanish:
  - Vania
  - Vaniá
  lexicon: HNp
  rationale: Es un nombre propio personal; se translitera en lugar de traducirse. Se adapta a la ortografía española con acento final para reflejar la pronunciación aguda y mantener legibilidad en español.
- source_word: מְרֵמוֹת
  english_pob_choice: Meremoth
  chosen_spanish: Meremot
  alternatives_spanish:
  - Meremoth
  lexicon: HNp
  rationale: Nombre propio personal; se conserva en transliteración. En español, la terminación -ot resulta más natural que -th y sigue siendo reconocible como el mismo nombre bíblico.
- source_word: אֶלְיָשִׁיב
  english_pob_choice: Eliashib
  chosen_spanish: Eliasib
  alternatives_spanish:
  - Eliasib
  - Elyasib
  lexicon: HNp
  rationale: Nombre propio personal; se translitera. Se usa 's' en lugar de 'sh' para una representación más natural en español, sin alterar la identificación del nombre.
theological_decisions:
- issue: La forma de los nombres propios en una lista genealógica.
  english_pob_reading: These are personal names in a list of men; the Hebrew contains no verb in this verse.
  chosen_spanish_reading: Son nombres personales en una lista de varones; el hebreo no contiene verbo en este versículo.
  alternative_spanish_readings:
  - Vanías, Meremot, Eliasib.
  - Vania, Meremot, Eliasib.
  rationale: No hay acción verbal ni afirmación teológica explícita; por eso el texto español debe conservar el carácter nominal seco de la lista. La nota aclara que el versículo no debe leerse como oración completa con verbo implícito.
  doctrine_reference: N/A
