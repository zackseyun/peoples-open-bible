translation:
  language: es
  text: 'y su contingente[a], es decir, los contados de entre ellos: cincuenta y tres mil cuatrocientos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su hueste» o «su ejército»; el término hebreo puede tener matices militares para un contingente tribal organizado.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּצְבָאוֹ
  english_pob_choice: and his company
  chosen_spanish: y su contingente
  alternatives_spanish:
  - y su host
  - y su ejército
  lexicon: HALOT
  rationale: צָבָא puede denotar un conjunto organizado, un hoste o un ejército. En el contexto de Números 2, donde se describe la disposición tribal para el campamento, “contingente” conserva la idea de una unidad organizada sin sugerir de forma excesiva combate activo.
- source_word: וּפְקֻדֵיהֶם
  english_pob_choice: even those numbered of them
  chosen_spanish: y los inscritos de ellos
  alternatives_spanish:
  - y los contados de ellos
  - y los mustrados de ellos
  lexicon: HALOT
  rationale: פָּקַד en este uso censal remite a los registrados o contados para el censo. “Inscritos” comunica bien el valor administrativo del término en español y evita añadir “varones” o “soldados” que el hebreo de esta cláusula no explicita.
- source_word: שְׁלֹשָׁה וַחֲמִשִּׁים אֶלֶף וְאַרְבַּע מֵאוֹת
  english_pob_choice: fifty-three thousand four hundred
  chosen_spanish: cincuenta y tres mil cuatrocientos
  alternatives_spanish:
  - tres y cincuenta mil y cuatrocientos
  lexicon: HALOT
  rationale: El número cardinal se expresa en español con el orden idiomático natural, preservando exactamente la cifra total del hebreo.
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo y refleja el contexto censal y organizativo de Números 2, en línea con la decisión inglesa de “company” para צָבָא y “those numbered of them” para פְקֻדֵיהֶם, sin añadir elementos militares o de género no presentes explícitamente.
  spanish_consistency_notes:
  - Se evitó “SEÑOR” porque no aparece el Tetragrámaton en este versículo.
  - “Contingente” mantiene el matiz organizativo del término hebreo sin forzar el sentido bélico.
  - “Inscritos” se eligió por su naturalidad en un censo y su cercanía a la idea de registro/cómputo.
