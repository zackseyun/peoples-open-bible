revisions:
- from: Y disciplina en la justicia[a], para que uno sea justo en todos los asuntos de conducta, y enseña piedad[b], para que uno adore solamente al Dios que verdaderamente existe con majestad debida.
  to: Y forma en la rectitud[a], para que uno actúe con equidad en todos los asuntos de conducta, y enseña piedad, para que uno adore solamente al Dios que verdaderamente existe[b] con debida majestad.
