review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la escena general: el agua circunda el altar y además llena la zanja. Sin embargo, «rodeó por completo el altar» cambia ligeramente el perfil verbal del hebreo, que presenta el movimiento del agua alrededor del altar más que una acción transitiva directa de ‘rodear’. Una formulación como «fue/corrió/fluyó alrededor del altar» o «corrió por todo alrededor del altar» preserva mejor וַיֵּלְכוּ + סָבִיב. También conviene reflejar la alternativa léxica para תְּעָלָה, ya que el inglés auditado conservó nota para ‘channel/ditch/trench’.'
  spanish_quality_summary: El español es claro y natural, pero «rodeó por completo el altar» suena algo interpretativo y menos visual que una expresión de movimiento. «Corrió alrededor del altar» o «fue alrededor del altar» sería más cercano al original; para buena legibilidad en español bíblico moderno, «corrió alrededor del altar» funciona bien. «Zanja» es legible y adecuada.
  glossary_alignment: No hay términos teológicos sensibles aquí. «Zanja» alinea bien con «trench». Se debe conservar en nota la alternativa de «canal» o «foso/zanja» para reflejar la documentación léxica del POB. No hay conflicto con la terminología base del proyecto.
  issues:
  - severity: medium
    issue: «rodeó por completo el altar» reexpresa el verbo hebreo como acción transitiva de circundar.
    rationale: El hebreo dice literalmente que ‘el agua fue/anduvo’ alrededor del altar; aunque el sentido resultante es de circunvalación, «rodeó» reduce el matiz de movimiento del agua y añade una interpretación más compacta que la formulación auditada en inglés.
  - severity: low
    issue: Falta nota léxica para «zanja».
    rationale: El English POB preservó alternativas para תְּעָלָה (‘channel’ / ‘ditch’). Conviene mantener una nota española equivalente porque la alternativa es significativa y natural en español.
  - severity: low
    issue: Falta nota léxica sobre el verbo de movimiento del agua.
    rationale: El English POB preservó la alternativa literal ‘went/flowed’. En español, una nota breve ayuda a documentar que «corrió» traduce un verbo literalmente ‘fue/anduvo’, usado del movimiento del agua.
  revised_spanish_text: Y el agua corrió alrededor del altar[a], y también llenó la zanja[b] con agua.
  revised_footnotes:
  - marker: a
    text: O «fue alrededor del altar» o «fluyó alrededor del altar». El verbo hebreo es literalmente «fue/anduvo», usado aquí para el movimiento del agua.
    reason: lexical_alternative
  - marker: b
    text: O «canal» o «foso» para «zanja».
    reason: lexical_alternative
