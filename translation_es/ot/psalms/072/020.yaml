translation:
  language: es
  text: Las oraciones de David, hijo de Isaí, han terminado[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «están terminadas» o «han llegado a su fin».
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּלּוּ
  english_pob_choice: are ended
  chosen_spanish: han terminado
  alternatives_spanish:
  - están terminadas
  - han llegado a su fin
  lexicon: HALOT
  rationale: El verbo hebreo comunica conclusión/completamiento. En español, «han terminado» conserva el valor de perfecto con sentido de cierre y suena natural en una nota conclusiva. «Están terminadas» es posible, pero resulta más estático; «han llegado a su fin» explicita más de lo que el hebreo dice.
- source_word: תְפִלּוֹת
  english_pob_choice: prayers
  chosen_spanish: oraciones
  alternatives_spanish:
  - plegarias
  - peticiones
  lexicon: HALOT
  rationale: El sustantivo plural designa oraciones plegadas a Dios. «Oraciones» es el equivalente más transparente y amplio en español; «plegarias» es también válido, pero más literario y menos directo; «peticiones» estrecha el sentido.
- source_word: דָּוִד
  english_pob_choice: David
  chosen_spanish: David
  alternatives_spanish:
  - —
  lexicon: Nombre propio estándar
  rationale: Se conserva el nombre propio en su forma usual en español.
- source_word: בֶּן יִשָׁי
  english_pob_choice: son of Jesse
  chosen_spanish: hijo de Isaí
  alternatives_spanish:
  - el hijo de Isaí
  lexicon: HALOT
  rationale: La cadena constructa identifica a David por linaje. «Hijo de Isaí» reproduce fielmente la relación de filiación; el artículo no es necesario en español y puede omitirse sin pérdida de sentido.
theological_decisions:
- issue: Función del versículo como colofón editorial o como cierre del contenido oracional
  english_pob_reading: Render as a straightforward statement marking the conclusion of David's prayers
  chosen_spanish_reading: 'Se presenta como una afirmación sencilla de conclusión: las oraciones de David han terminado.'
  alternative_spanish_readings:
  - Tratarlo explícitamente como una nota editorial posterior
  - Entenderlo como parte de la oración misma
  rationale: 'El hebreo es una cláusula declarativa simple y no obliga a convertirla en una nota crítica más fuerte ni a integrarla artificialmente como petición. La traducción conserva esa tensión: suena a cierre textual, pero sin añadir comentarios históricos no expresados por el verso.'
  doctrine_reference: Primacía del texto fuente y preservación de la tensión interpretativa sin sobreexplicación.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el juicio auditado del POB en inglés. Se mantiene la lectura conclusiva de כָּלּוּ y el valor simple de תְפִלּוֹת, sin introducir expansión interpretativa ni resolver de antemano la cuestión editorial del verso.
  spanish_consistency_notes:
  - Se usa un español neutral, digno y publicable.
  - «Isaí» sigue la forma hispana habitual del nombre propio.
  - La nota al pie marca solo la alternativa léxica que el POB inglés también preserva.
