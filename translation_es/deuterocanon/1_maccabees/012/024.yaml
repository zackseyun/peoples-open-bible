translation:
  language: es
  text: Y Jonatán oyó que los comandantes de Demetrio habían regresado con una fuerza mucho mayor que antes, para hacer guerra contra él.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἤκουσεν
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - escuchó
  - se enteró
  lexicon: BDAG
  rationale: El griego expresa recepción de noticia en una narración; «oyó» conserva la inmediatez del informe sin añadir una interpretación más fuerte como «se enteró», y es natural en español bíblico actual.
- source_word: οἱ ἄρχοντες Δημητρίου
  english_pob_choice: Demetrius’s commanders
  chosen_spanish: los jefes de Demetrio
  alternatives_spanish:
  - los comandantes de Demetrio
  - los dirigentes de Demetrio
  - los oficiales de Demetrio
  lexicon: LSJ
  rationale: En este contexto militar, ἄρχοντες funciona como quienes están al mando o en posición de liderazgo. «Jefes» comunica la función de mando sin forzar una connotación política de «gobernantes», y evita un tecnicismo militar demasiado estrecho.
- source_word: ἐπέστρεψαν
  english_pob_choice: had returned
  chosen_spanish: habían regresado
  alternatives_spanish:
  - regresaron
  - habían vuelto
  - volvieron
  lexicon: BDAG
  rationale: El valor básico es de regreso/retorno. El pluscuamperfecto español refleja bien la relación temporal con el acto de oír de Jonathan, como en la decisión inglesa, y suena natural en narrativa.
- source_word: μετὰ δυνάμεως πολλῆς
  english_pob_choice: with a much larger force
  chosen_spanish: con una fuerza mucho mayor
  alternatives_spanish:
  - con una gran fuerza
  - con mucha fuerza
  - con un ejército más grande
  lexicon: LSJ
  rationale: Aquí δύναμις tiene sentido militar concreto. «Fuerza» preserva esa amplitud sin reducirla necesariamente a «ejército», y el comparativo «mucho mayor» reproduce ὑπὲρ τὸ πρότερον de forma idiomática.
- source_word: ὑπὲρ τὸ πρότερον
  english_pob_choice: than before
  chosen_spanish: que antes
  alternatives_spanish:
  - que anteriormente
  - más que antes
  - que en el pasado
  lexicon: LSJ
  rationale: La comparación contrasta con una fuerza previa. «Que antes» es la forma española más natural y fiel para expresar el aumento relativo sin recargar el verso.
- source_word: τοῦ πολεμῆσαι πρὸς αὐτόν
  english_pob_choice: to make war against him
  chosen_spanish: para hacer guerra contra él
  alternatives_spanish:
  - para guerrear contra él
  - para combatir contra él
  - para pelear contra él
  lexicon: BDAG
  rationale: El infinitivo articular de propósito requiere una finalidad. «Hacer guerra» conserva la fuerza bélica de πολεμέω mejor que un simple «combatir» o «pelear», y mantiene el tono militar del contexto.
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego de Swete y la solución inglesa auditada, manteniendo la secuencia narrativa y la comparación militar sin añadir matices no atestiguados. No se documentaron revisiones previas en este versículo, y el texto inglés final ya mostraba acuerdo alto.
  spanish_consistency_notes:
  - Se usa «Y Jonathan» para reflejar el comienzo coordinado del griego; el nombre propio se mantiene en forma castellana habitual para el personaje bíblico.
  - Se prefiere «fuerza» y no «poder» porque el contexto es de tropas y capacidad militar concreta, no de autoridad abstracta.
  - Se evita «SEÑOR» u այլ terminología cultual porque el versículo no contiene el nombre divino ni títulos teológicos.
  - La sintaxis mantiene una sola oración fluida, acorde con el movimiento narrativo breve del original.
