translation:
  text: A poor man totters[a]; he speaks, and they cry, “Away, away!”; but an intelligent man speaks[b], and there is no place for him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Hebrew phrase rendered “Away, away!” is terse and idiomatic; it conveys a repeated cry of dismissal or rebuke. The Greek parallel expands the sense: when the lowly fail, people reproach them.'
    reason: lexical_alternative
  - marker: b
    text: Or “he is given no hearing.” Literally, “there is no place for him,” meaning his insightful words receive no social room or acceptance.
    reason: alternative_reading
lexical_decisions:
- source_word: דַּל
  chosen: a poor man
  alternatives:
  - the poor
  - a lowly man
  lexicon: HALOT
  rationale: דל denotes one who is poor, weak, or socially low. The singular is retained. 'A poor man' matches the individualized proverb style and preserves the social contrast seen in the Greek parallel with ταπεινός/ἀπόρος language.
- source_word: נָמוֹט
  chosen: totters
  alternatives:
  - slips
  - stumbles
  - is shaken
  lexicon: HALOT
  rationale: The verb מוט commonly conveys slipping, tottering, or being destabilized. 'Totters' preserves the image of precariousness and aligns with the Greek parallel ἔσφαλεν/'suffered a fall, erred' without over-specifying whether the failure is moral or circumstantial.
- source_word: מְדַבֵּר
  chosen: he speaks
  alternatives:
  - he says
  - speaking
  lexicon: HALOT
  rationale: A simple finite sense fits the proverb's sequence. 'He speaks' is idiomatic and leaves open whether the speech is defense, explanation, or ordinary comment.
- source_word: גָּע גָּע
  chosen: “Away, away!”
  alternatives:
  - '''Out, out!'''
  - '''Begone, begone!'''
  - a cry of rebuke/rejection
  lexicon: HALOT
  rationale: The doubled interjection is abrupt and dismissive. Because the exact force is idiomatic and somewhat uncertain, 'Away, away!' captures the repeated rejection without adding too much interpretation. The Greek parallel instead expands the idea as reproach against the lowly, supporting a hostile response.
- source_word: יִשֶּׂא
  chosen: they cry
  alternatives:
  - he receives
  - one raises
  - it is uttered
  lexicon: HALOT
  rationale: The Hebrew is terse and somewhat difficult in isolation. In context with the repeated interjection, the sense is that such a cry is raised against him. English supplies an impersonal plural, 'they cry,' to make the proverb readable while reflecting the social reaction implied by both Hebrew and Greek.
- source_word: וְדִבֶּר
  chosen: but a discerning man speaks
  alternatives:
  - and he spoke
  - and one spoke
  lexicon: HALOT
  rationale: The conjunction is rendered adversatively because the line contrasts two cases. The verb is coordinated with the following noun phrase in a compressed Hebrew style; English unpacks it for clarity.
- source_word: מַשְׂכִּיל
  chosen: a discerning man
  alternatives:
  - a wise man
  - one with insight
  - an intelligent man
  lexicon: HALOT
  rationale: משכיל emphasizes insight or understanding rather than merely accumulated wisdom. 'Discerning man' preserves that nuance and fits the Greek σύνεσιν ('understanding') in the parallel tradition.
- source_word: וְאֵין לוֹ מָקוֹם
  chosen: there is no place for him
  alternatives:
  - he has no standing
  - he is given no room
  - there is no opportunity for him
  lexicon: HALOT
  rationale: Literally 'there is no place for him.' In context this means his wise speech finds no hearing or social standing. The more literal wording is retained, with the idiomatic implication left for readers to infer; the Greek parallel explicitly says 'no place was given to him.'
