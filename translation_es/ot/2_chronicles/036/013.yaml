  text: וְ֠/גַם בַּ/מֶּ֤לֶךְ נְבֽוּכַדְנֶאצַּר֙ מָרָ֔ד אֲשֶׁ֥ר הִשְׁבִּיע֖/וֹ בֵּֽ/אלֹהִ֑ים וַ/יֶּ֤קֶשׁ אֶת עָרְפּ/וֹ֙ וַ/יְאַמֵּ֣ץ אֶת לְבָב֔/וֹ מִ/שּׁ֕וּב אֶל יְהוָ֖ה אֱלֹהֵ֥י יִשְׂרָאֵֽל־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/036/013.yaml
  text: He also rebelled against King Nebuchadnezzar[a], who had made him swear by God; he stiffened his neck and hardened his heart from turning to Yahweh[b], the God of Israel.
  footnotes:
  - marker: a
    text: Or, 'who had bound him by an oath before God.' The Hebrew can emphasize either the act of making him swear or the solemn setting of the oath in relation to God.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew idiom: ''stiffened his neck,'' a figure for stubborn resistance.'
    reason: cultural_note
  ai_draft:
