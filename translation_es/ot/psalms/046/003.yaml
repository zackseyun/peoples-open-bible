review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: inferencia («עַל כֵּן»), resolución confiada («לֹא נִירָא»), cambio/desestabilización de la tierra («בְּהָמִיר אָרֶץ») y colapso de los montes hacia el interior de los mares («וּבְמוֹט הָרִים בְּלֵב יַמִּים»). Sin embargo, la ubicación de las notas no sigue el patrón semántico del English POB: la nota [b] en inglés corresponde a la alternativa de «slip/totter» para los montes, no a «seas», mientras que en español quedó anclada a «mares». También conviene ajustar el texto de la nota [a] para conservar la doble alternativa documentada en inglés («aunque/cuando» y la posibilidad pasiva «sea cambiada»), no solo «cuando».'
  spanish_quality_summary: 'El español es claro, natural y digno. «Por eso no temeremos» funciona bien; «la tierra cambie» preserva la sobriedad del audit trail revisado; «los montes se deslicen» es legible. «Hasta el corazón de los mares» suena aceptable, aunque «al corazón de los mares» refleja mejor el movimiento direccional. La principal corrección necesaria es técnica y de fidelidad editorial: reubicar la nota [b] al verbo/frase pertinente y pulir las notas para que reproduzcan con precisión las alternativas preservadas.'
  glossary_alignment: No hay términos del glosario de alto impacto en este versículo. Las decisiones «la tierra», «montes», «corazón», «mares» son compatibles con la línea del proyecto. No hay conflicto terminológico teológico.
  issues:
  - severity: medium
    issue: La nota [b] está anclada a «mares» en vez de al segmento verbal de los montes.
    rationale: En el English POB, la nota b preserva la alternativa de «though the mountains totter...», o sea, modifica la acción de los montes («slip/totter»), no el sustantivo «seas». En español, el marcador debe aparecer junto a «se deslicen» o junto a toda la cláusula correspondiente.
  - severity: low
    issue: La nota [a] no conserva plenamente las alternativas documentadas en inglés.
    rationale: El audit trail inglés registra «though the earth changes» / «when the earth is changed». La nota española ofrece solo «cuando la tierra cambie» y una explicación general, pero omite la alternativa más cercana a «sea cambiada/alterada».
  - severity: low
    issue: «Hasta el corazón de los mares» puede mejorarse a «al corazón de los mares».
    rationale: «Al corazón de» suena más directo e idiomático para movimiento hacia un interior, y se ajusta bien al valor espacial de בְּלֵב en este contexto poético.
  revised_spanish_text: Por eso no temeremos aunque la tierra cambie[a], aunque los montes se deslicen[b] al corazón de los mares.
  revised_footnotes:
