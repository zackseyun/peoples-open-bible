revisions:
- from: Espinas y lazos[a] hay en el camino[b] del perverso[c]; el que guarda su vida[d] se alejará de ellos.
  to: Espinas y lazos[a] hay en el camino[b] del torcido[c]; el que guarda su vida[d] se mantiene lejos de ellos.
  rationale: Se revisa la traducción principal de עִקֵּשׁ para preservar en español la metáfora concreta de torsión moral que el original hebreo y el audit trail inglés priorizan. También se ajusta el verbo final a un presente gnómico más idiomático y más cercano al sentido proverbial de יִרְחַק. Las notas se simplifican para mantener alternativas léxicas reales sin expandir innecesariamente la interpretación.
