translation:
  language: es
  text: Y en el año decimoséptimo ordenó sus tropas para la batalla contra el rey Arfaxad, y prevaleció en su guerra, y puso en fuga[a] toda la fuerza de Arfaxad, toda su caballería y todos sus carros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hizo huir». El verbo griego puede expresar hacer retroceder o poner en fuga a un ejército derrotado.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρετάξατο
  english_pob_choice: drew up his forces for battle
  chosen_spanish: ordenó sus tropas para la batalla
  alternatives_spanish:
  - dispuso sus fuerzas para la batalla
  - se alineó en orden de combate
  lexicon: LSJ
  rationale: El verbo militar expresa poner las tropas en formación de combate. En español, «ordenó sus tropas para la batalla» comunica de modo natural la preparación táctica sin perder el sentido bélico del griego.
- source_word: ἐν τῇ δυνάμει αὐτοῦ
  english_pob_choice: his forces
  chosen_spanish: sus tropas
  alternatives_spanish:
  - su fuerza
  - su ejército
  lexicon: LSJ
  rationale: Aquí δύναμις se refiere a fuerza militar concreta, no a poder abstracto. «Sus tropas» evita el sentido demasiado genérico de «fuerza» y conserva el matiz militar del contexto.
- source_word: ἐκραταιώθη
  english_pob_choice: he prevailed
  chosen_spanish: prevaleció
  alternatives_spanish:
  - fue fortalecido
  - se hizo fuerte
  - tomó ventaja
  lexicon: LSJ
  rationale: Aunque la forma literal apunta a fortalecimiento, en este informe de guerra el resultado es superioridad militar. «Prevaleció» mantiene ese valor idiomático y la concisión del relato.
- source_word: ἀνέστρεψεν
  english_pob_choice: routed
  chosen_spanish: dispersó
  alternatives_spanish:
  - hizo huir
  - derrotó
  - puso en fuga
  lexicon: LSJ
  rationale: En contexto bélico, el verbo comunica hacer retroceder al enemigo en derrota. «Dispersó» conserva la acción de desbaratar y desordenar las fuerzas enemigas, aunque también podría entenderse como hacerlas huir.
- source_word: πᾶσαν τὴν δύναμιν Ἀρφαξὰδ
  english_pob_choice: all the force of Arphaxad
  chosen_spanish: toda la fuerza de Arfaxad
  alternatives_spanish:
  - todo el ejército de Arfaxad
  - todas las fuerzas de Arfaxad
  lexicon: LSJ
  rationale: Se mantiene «fuerza» para reflejar de cerca δύναμις, como en el inglés POB, y para no sustituir sin base textual por «ejército». El singular colectivo conserva el tono del original.
- source_word: πᾶσαν τὴν ἵππον αὐτοῦ
  english_pob_choice: all his cavalry
  chosen_spanish: toda su caballería
  alternatives_spanish:
  - todos sus jinetes
  - todo su cuerpo de caballería
  lexicon: LSJ
  rationale: ἵππος en singular colectivo designa la caballería. «Caballería» es la equivalencia española más natural y exacta para tropas montadas.
- source_word: πάντα τὰ ἅρματα αὐτοῦ
  english_pob_choice: all his chariots
  chosen_spanish: todos sus carros
  alternatives_spanish:
  - todos sus carros de guerra
  - todo su carro
  lexicon: LSJ
  rationale: ἅρματα significa carros, y en este contexto, carros de guerra. «Carros» es fiel y comprensible en español; el contexto militar ya delimita el sentido.
translation_notes:
  revision_awareness: El texto inglés POB se mantuvo sin cambios en su revisión más reciente; no hay revisiones aplicadas ni observaciones textuales que requieran ajuste adicional. La versión española sigue esa lectura estable y reproduce el mismo perfil militar del pasaje.
  spanish_consistency_notes:
  - Se conserva el nombre «Arfaxad» de forma consistente con la tradición del pasaje y el audit trail inglés.
  - Se mantiene el registro militar del versículo con términos concretos y no eclesiásticos.
  - Se evita traducir δύναμις como «poder» para no perder el sentido de fuerza militar en este contexto.
