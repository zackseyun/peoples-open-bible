review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo: negación inicial, oposición exitosa ante Josué, duración vitalicia, comparación con Moisés, promesa de presencia y doble negación final. Sin embargo, dos notas están mal ancladas o mal formuladas respecto al audit trail inglés: la nota [c] fue puesta sobre ''estaré contigo'' aunque su contenido corresponde a ''No te dejaré'', y la nota [a] se ancla tanto a ''Ningún hombre'' como a ''se mantendrá'', mezclando dos asuntos distintos. Además, ''No te dejaré'' es comprensible, pero en español puede sonar más a ''no me iré de ti'' que a ''no te soltaré / no te fallaré''; conviene afinarlo para reflejar mejor רפה sin perder naturalidad.'
  spanish_quality_summary: El español es generalmente claro y digno, pero hay detalles mejorables. 'Ningún hombre se mantendrá delante de ti' suena algo rígido; 'podrá mantenerse frente a ti' o la formulación base con nota alternativa sería más natural, aunque no es obligatorio cambiarlo. Lo principal es corregir las notas para evitar confusión semántica. 'No te dejaré ni te abandonaré' es legible, pero 'No te soltaré ni te abandonaré' o 'No te fallaré ni te abandonaré' refleja mejor el contraste léxico del hebreo; entre ambas, 'soltaré' conserva mejor la imagen de no aflojar el apoyo.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. No aparece el nombre divino ni otros términos clave del glosario. La decisión de conservar 'hombre' por אִישׁ es defendible si se aclara con nota. Conviene distinguir mejor אַרפך de אעזבך en español para respetar la rationale léxica documentada.
  issues:
  - severity: high
    issue: La nota [c] está colocada en 'estaré contigo', pero explica el verbo אַרפך ('no te soltaré/no te fallaré').
    rationale: Esto altera la relación entre texto y nota, y hace que el lector atribuya a 'estaré contigo' un matiz que pertenece a la cláusula final.
  - severity: high
    issue: La nota [a] se usa para dos anclajes distintos en el texto.
    rationale: Las instrucciones exigen marcadores únicos; no se debe reutilizar el mismo marcador para dos notas o dos anclajes diferentes en un mismo registro.
  - severity: medium
    issue: '''No te dejaré'' debilita o vuelve ambiguo el matiz de רפה en español.'
    rationale: Puede entenderse como simple separación o partida, mientras que el hebreo sugiere no soltar, no aflojar el sostén, no dejar caer. Debe distinguirse mejor de 'abandonaré'.
  - severity: low
    issue: '''se mantendrá delante de ti'' suena algo tieso en español contemporáneo.'
    rationale: Es comprensible y cercano al hebreo, pero una leve mejora estilística puede sonar más natural sin perder la imagen adversativa.
