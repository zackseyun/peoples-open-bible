translation:
  language: es
  text: Pero la sabiduría, ¿de dónde viene?[a] ¿Y dónde está el lugar del entendimiento?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «¿De dónde viene la sabiduría, y dónde está el lugar del entendimiento?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַחָכְמָה
  english_pob_choice: But wisdom
  chosen_spanish: Pero la sabiduría
  alternatives_spanish:
  - Y la sabiduría
  - Ahora bien, la sabiduría
  lexicon: HALOT
  rationale: חָכְמָה se traduce naturalmente como «sabiduría». El prefijo conjuntivo puede ser simple «y», pero en el contexto poético introduce un giro retórico; «pero» transmite bien esa transición sin añadir contenido ajeno al hebreo.
- source_word: מֵאַיִן
  english_pob_choice: from where
  chosen_spanish: ¿de dónde viene?
  alternatives_spanish:
  - ¿de dónde?
  - ¿de dónde procede?
  lexicon: HALOT
  rationale: La construcción con מ־ y אַיִן expresa origen o procedencia. En español, «¿de dónde viene?» comunica de forma idiomática la idea de procedencia mejor que una traducción más literal y menos natural.
- source_word: תָּבוֹא
  english_pob_choice: does it come
  chosen_spanish: viene
  alternatives_spanish:
  - vendrá
  - llega
  lexicon: HALOT
  rationale: El imperfecto qal 3fs con sujeto abstracto puede expresar una pregunta gnómica. En español, el presente interrogativo «viene» conserva el carácter general de la pregunta sobre el origen de la sabiduría.
- source_word: וְאֵי זֶה
  english_pob_choice: And where is
  chosen_spanish: ¿Y cuál es
  alternatives_spanish:
  - ¿Y dónde está
  - ¿Y dónde se halla
  lexicon: HALOT
  rationale: אֵי זֶה aquí introduce una pregunta de localización ligada a מְקוֹם. «Cuál es el lugar» mantiene el sustantivo explícito y refleja el valor locativo sin convertirlo en una paráfrasis más libre.
- source_word: מְקוֹם
  english_pob_choice: the place
  chosen_spanish: el lugar
  alternatives_spanish:
  - la sede
  - el sitio
  lexicon: HALOT
  rationale: מָקוֹם / מְקוֹם significa «lugar». «El lugar» es el equivalente directo y claro en español, adecuado al registro poético.
- source_word: בִּינָה
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - discernimiento
  - comprensión
  lexicon: HALOT
  rationale: 'בִּינָה denota entendimiento/discernimiento. «Entendimiento» mantiene una correspondencia sobria y amplia; «comprensión» o «discernimiento» son posibles, pero «entendimiento» conserva mejor la pareja sapiencial con «sabiduría». '
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; este borrador sigue el sentido hebreo y el audit trail inglés, ajustando la puntuación para un español fluido y conservando la pregunta retórica doble del versículo.
  spanish_consistency_notes:
  - Se mantuvo «sabiduría» para חָכְמָה, en coherencia con la terminología sapiencial del proyecto.
  - Se usó «entendimiento» para בִּינָה, preservando la distinción tradicional entre sabiduría y entendimiento.
  - La nota al pie conserva la alternativa más formal documentada en el audit trail inglés.
  - La inversión poética del hebreo se suavizó levemente en español sin perder la doble interrogación ni el énfasis en el origen y la localización.
