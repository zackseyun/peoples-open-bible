source:
  edition: WLC
  text: כִּ֤י בְעַד אִשָּׁ֥ה זוֹנָ֗ה עַֽד כִּכַּ֫ר לָ֥חֶם וְ/אֵ֥שֶׁת אִ֑ישׁ נֶ֖פֶשׁ יְקָרָ֣ה תָצֽוּד־־׃פ
base_translation:
  language: en
  yaml_path: translation/ot/proverbs/006/026.yaml
  text: For because of a prostitute one is reduced to a loaf of bread[c][b][a], but a married woman hunts a precious life.
  footnotes:
  - marker: a
    text: Or, more literally, 'For on account of a prostitute, unto a loaf of bread; and a married woman hunts a precious soul/life.' The Hebrew is compressed, and many understand the first line to mean that a man is reduced to poverty.
    reason: lexical_alternative
  - marker: b
    text: '''A married woman'' is literally ''the wife of a man''; in context it refers to an adulterous liaison with another man''s wife.'
    reason: lexical_alternative
  - marker: c
    text: Or 'a precious soul.' The Hebrew word can mean 'soul,' 'self,' or 'life'; here 'life' best fits the warning context.
    reason: lexical_alternative
