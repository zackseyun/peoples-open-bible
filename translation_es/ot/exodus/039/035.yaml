translation:
  language: es
  text: el arca del testimonio[a], sus varas y el propiciatorio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la cubierta de expiación». El hebreo se refiere a la cubierta del arca y lleva asociaciones de expiación.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲרֹן
  english_pob_choice: ark
  chosen_spanish: arca
  alternatives_spanish:
  - arca sagrada
  - cofre
  lexicon: HALOT
  rationale: En el contexto tabernacular, אֲרֹן designa el recipiente sagrado; en español, «arca» es el equivalente natural y establecido, y preserva el referente cultual sin añadir explicación innecesaria.
- source_word: הָעֵדֻת
  english_pob_choice: of the testimony
  chosen_spanish: del testimonio
  alternatives_spanish:
  - del pacto
  - del testimonio y del pacto
  lexicon: HALOT
  rationale: עֵדוּת se refiere aquí a «testimonio» en relación con las tablas depositadas en el arca. Mantengo la relación nominal directa, como en el inglés auditado, sin convertirla en una paráfrasis interpretativa como «del pacto».
- source_word: בַּדָּיו
  english_pob_choice: its poles
  chosen_spanish: sus varas
  alternatives_spanish:
  - sus postes
  - sus barras de transporte
  lexicon: HALOT
  rationale: En contexto de objetos sagrados transportables, בַּדִּים son las varas para cargar el arca. «Varas» es claro y natural en español; «barras de transporte» explicita la función, pero suena más explicativo que el hebreo.
- source_word: הַכַּפֹּרֶת
  english_pob_choice: the mercy seat
  chosen_spanish: el propiciatorio
  alternatives_spanish:
  - la cubierta de expiación
  - la tapa de expiación
  - la cubierta
  lexicon: HALOT
  rationale: Opto por «propiciatorio» porque en español bíblico nombra tradicionalmente el cubrimiento del arca con connotación expiatoria, y conserva la tensión lexical entre la pieza física y su asociación cultual. «Cubierta de expiación» es más descriptiva, pero menos idiomática.
theological_decisions:
- issue: Rendering of כַּפֹּרֶת in a cultic furnishing context
  english_pob_reading: mercy seat
  chosen_spanish_reading: propiciatorio
  alternative_spanish_readings:
  - cubierta de expiación
  - cubierta
  - silla de misericordia
  rationale: El término designa la tapa del arca con asociación expiatoria. En español, «propiciatorio» comunica mejor esa función cultual que una traducción literal de «misericordia», y evita introducir una imagen ajena al objeto. La decisión conserva la resonancia sacrificial sin sobreexplicar el texto.
  doctrine_reference: Equivalencia óptima; precisión cultual sin doctrinalizar más allá del pasaje
translation_notes:
  revision_awareness: El expediente inglés mantiene alta concordancia y sin revisiones aplicadas; la versión española sigue el mismo perfil de estabilidad, conservando la estructura nominal simple del hebreo y la ambigüedad cultual de כַּפֹּרֶת dentro de una opción española idiomática.
  spanish_consistency_notes:
  - He mantenido «arca» para אֲרֹן y «testimonio» para עֵדֻת, en línea con la terminología bíblica estándar y con el audit trail inglés.
  - He elegido «propiciatorio» como equivalente español funcional de mercy seat, pero añadí nota para preservar la alternativa descriptiva «cubierta de expiación».
  - «Sus varas» refleja el posesivo enclítico del hebreo y evita una expansión innecesaria.
