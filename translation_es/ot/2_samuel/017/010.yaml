translation:
  language: es
  text: Hasta el hombre valiente[a], cuyo corazón es como el corazón de un león, se derretirá por completo[b]; porque todo Israel sabe que tu padre es un hombre valiente, y que los hombres que están con él son hombres valientes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Alternativa posible: ''hombre de valor'' o ''hombre poderoso'' para ambas expresiones basadas en חַיִל de este versículo.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''se derretirá, se derretirá''; construcción enfática que significa ''se derretirá por completo'' o ''sin duda perderá el ánimo''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן חַיִל
  english_pob_choice: valiant man
  chosen_spanish: hombre valiente
  alternatives_spanish:
  - hombre de valor
  - hombre poderoso
  - guerrero valiente
  lexicon: HALOT
  rationale: El hebreo es un modismo de capacidad y valor militar, no solo una cualidad moral. 'Hombre valiente' conserva el referente personal singular y suena natural en español; 'hombre de valor' también sería posible, pero aquí 'valiente' comunica mejor el carácter de combatiente del contexto.
- source_word: לִבּוֹ כְּלֵב הָאַרְיֵה
  english_pob_choice: whose heart is like a lion’s heart
  chosen_spanish: cuyo corazón es como el corazón de un león
  alternatives_spanish:
  - de corazón como león
  - corazón de león
  - cuya valentía es como la de un león
  lexicon: HALOT
  rationale: Se conserva la imagen comparativa del hebreo en vez de condensarla en un adjetivo idiomático. 'Corazón' mantiene el centro de la metáfora de valor/coraje, y 'león' preserva la fuerza imagética del texto fuente.
- source_word: הִמֵּס יִמָּס
  english_pob_choice: will utterly melt
  chosen_spanish: se derretirá
  alternatives_spanish:
  - se derretirá por completo
  - se deshará
  - perderá el ánimo
  lexicon: HALOT
  rationale: El verbo hebreo מסס con infinitivo absoluto intensifica la idea de derretirse o desmoronarse. 'Se derretirá' mantiene la metáfora; la intensificación se deja implícita en el contexto, ya que el español no requiere forzar un adverbio para expresar la fuerza retórica.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque, en efecto
  lexicon: HALOT
  rationale: Aquí introduce la razón de la afirmación anterior; 'porque' es la causal más directa y clara en español.
- source_word: יֹדֵעַ כָּל יִשְׂרָאֵל
  english_pob_choice: all Israel knows
  chosen_spanish: todo Israel sabe
  alternatives_spanish:
  - todo Israel lo sabe
  - Israel entero sabe
  - todo Israel bien sabe
  lexicon: HALOT
  rationale: '''Sabe'' comunica conocimiento general y establecido, y ''todo Israel'' conserva el alcance colectivo del hebreo sin añadir matices no presentes en el texto.'
- source_word: גִבּוֹר
  english_pob_choice: a mighty man
  chosen_spanish: un hombre valiente
  alternatives_spanish:
  - un hombre poderoso
  - un guerrero
  - un hombre fuerte
  lexicon: HALOT
  rationale: En este contexto, el término describe a un hombre de fuerza y valor militar. 'Hombre valiente' mantiene la conexión lexical con בֶּן חַיִל y resulta idiomático en español; 'hombre poderoso' podría sonar más general o político que bélico.
- source_word: וּבְנֵי חַיִל
  english_pob_choice: the men with him are valiant men
  chosen_spanish: los hombres que están con él son hombres valientes
  alternatives_spanish:
  - los hombres con él son hombres de valor
  - sus acompañantes son hombres valientes
  - los que están con él son valientes
  lexicon: HALOT
  rationale: La construcción hebrea equivale a 'hijos de valor' y en español se expresa con naturalidad como 'hombres valientes'. Se conserva el paralelismo con el primer 'hombre valiente' para reflejar la repetición del campo semántico de חַיִל.
- source_word: אֲשֶׁר אִתּוֹ
  english_pob_choice: with him
  chosen_spanish: que están con él
  alternatives_spanish:
  - que van con él
  - a su lado
  - con él
  lexicon: HALOT
  rationale: El relativo hebreo modifica a 'los hombres'; en español, 'que están con él' hace explícita la relación sin perder el sentido breve del original. 'Con él' sería más corto, pero menos transparente sintácticamente en esta construcción.
