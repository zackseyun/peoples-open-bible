id: LEV.20.4
reference: Leviticus 20:4
source:
  edition: WLC
  text: וְ/אִ֡ם הַעְלֵ֣ם יַעְלִימֽוּ֩ עַ֨ם הָ/אָ֜רֶץ אֶת עֵֽינֵי/הֶם֙ מִן הָ/אִ֣ישׁ הַ/ה֔וּא בְּ/תִתּ֥/וֹ מִ/זַּרְע֖/וֹ לַ/מֹּ֑לֶךְ לְ/בִלְתִּ֖י הָמִ֥ית אֹתֽ/וֹ־־׃
translation:
  text: But if the people of the land deliberately close their eyes to that man when he gives some of his offspring to Molech[a], so as not to put him to death[c][b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ignore that man completely'; the Hebrew idiom is literally 'hide their eyes from that man.'
    reason: lexical_alternative
  - marker: b
    text: '''Offspring'' is literally ''seed,'' here referring to his children.'
    reason: lexical_alternative
  - marker: c
    text: Molech may refer to a deity or a type of child-sacrifice rite; alternatively, some have read 'to the king.'
    reason: alternative_reading
lexical_decisions:
- source_word: הַעְלֵם יַעְלִימוּ
  chosen: deliberately close their eyes
  alternatives:
  - surely hide
  - completely ignore
  - conceal their eyes
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the action. With אֶת עֵינֵיהֶם ('their eyes') the idiom means to deliberately ignore or shut one's eyes to something. 'Deliberately close their eyes' preserves both the Hebrew idiom and the emphatic force.
- source_word: עַם הָאָרֶץ
  chosen: the people of the land
  alternatives:
  - the people of the country
  - the common people
  lexicon: HALOT
  rationale: In this legal context the phrase refers to the populace of the land/community, not specifically a socioeconomic class. 'The people of the land' is a transparent and established rendering.
- source_word: אֶת עֵינֵיהֶם מִן הָאִישׁ הַהוּא
  chosen: their eyes to that man
  alternatives:
  - their eyes from that man
  - that man
  lexicon: HALOT
  rationale: The Hebrew literally says 'their eyes from that man,' an idiom for refusing to notice or act against him. English expresses this naturally as 'close their eyes to that man.'
- source_word: בְּתִתּוֹ מִזַּרְעוֹ
  chosen: when he gives some of his offspring
  alternatives:
  - when he gives from his seed
  - in giving some of his descendants
  lexicon: HALOT
  rationale: מִן with זֶרַע here is partitive, indicating some of his children/offspring rather than necessarily all. 'Offspring' is clear modern English and fits the sacrificial context.
- source_word: לַמֹּלֶךְ
  chosen: to Molech
  alternatives:
  - to the Molech
  - to Milcom
  lexicon: HALOT
  rationale: The proper name is best transliterated as 'Molech,' the conventional rendering in this cultic context. The prefixed article is absorbed in the established name in English.
- source_word: לְבִלְתִּי הָמִית אֹתוֹ
  chosen: so as not to put him to death
  alternatives:
  - without putting him to death
  - by not killing him
  lexicon: HALOT
  rationale: 'The construction expresses purpose/result: their ignoring him has the effect or intent of not executing the prescribed penalty. ''Put him to death'' is the standard legal idiom in English and matches the judicial setting.'
