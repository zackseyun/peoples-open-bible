    reason: lexical_alternative
  - marker: c
    text: O «cuando va delante de Yahvé» / «cuando se presenta delante de Yahvé». El hebreo expresa el momento de la entrada de Aarón en la presencia divina.
    reason: alternative_reading
  revision_rationale: Se corrigen los anclajes de notas para que cada marcador corresponda a la palabra o frase explicada, y se añade la nota léxica documentada en el expediente inglés para «pectoral del juicio». El texto principal no requiere cambios sustantivos de traducción.
