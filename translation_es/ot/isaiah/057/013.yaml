translation:
  language: es
  text: Cuando clames[a], ¡que te rescaten tus ídolos reunidos! Pero el viento se los llevará a todos; un soplo[b] los arrebatará. Pero el que se refugia en mí heredará la tierra[c] y poseerá mi santo monte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tus reunidos», posiblemente refiriéndose a ídolos, aliados u otros objetos de falsa confianza.
    reason: lexical_alternative
  - marker: b
    text: En hebreo, «viento» y «soplo/aliento» forman un par poético que subraya cuán fácilmente desaparecen estas cosas.
    reason: cultural_note
  - marker: c
    text: O «el país» o «la tierra». El hebreo puede referirse a la tierra o al mundo, pero aquí el contexto de Sion favorece «la tierra».
    reason: alternative_reading
lexical_decisions:
- source_word: בְּזַעֲקֵךְ
  english_pob_choice: When you cry out
  chosen_spanish: Cuando clames
  alternatives_spanish:
  - Al clamar
  - Cuando grites
  lexicon: HALOT
  rationale: La preposición ב con este infinitivo/forma verbal expresa sentido temporal. «Cuando clames» conserva el valor de momento y el tono profético de desafío sin sonar forzado en español.
- source_word: יַצִּילֻךְ
  english_pob_choice: let ... rescue you
  chosen_spanish: que te rescaten
  alternatives_spanish:
  - que te rescate
  - que te salven
  lexicon: HALOT
  rationale: En contexto funciona como reto irónico, no como simple futuro. En español, «que te rescaten» reproduce mejor la fuerza exhortativa/taunt que un futuro plano.
- source_word: קִבּוּצַיִךְ
  english_pob_choice: your gathered idols
  chosen_spanish: tus cosas reunidas
  alternatives_spanish:
  - tus ídolos reunidos
  - tus reuniones
  lexicon: HALOT
  rationale: El sustantivo denota cosas reunidas o juntadas. En español, «cosas reunidas» mantiene la literalidad básica y deja visible la ambigüedad contextual que el inglés POB resolvió explícitamente como ídolos; aquí se evita imponer una glosa demasiado interpretativa en el texto principal.
- source_word: רוּחַ
  english_pob_choice: the wind will carry ... off
  chosen_spanish: el viento se los llevará
  alternatives_spanish:
  - el viento los arrebatará
  - un viento se los llevará
  lexicon: HALOT
  rationale: רוּחַ puede ser viento, aliento o espíritu. Aquí el paralelismo con הָבֶל favorece «viento». «Se los llevará» fluye naturalmente en español y conserva la idea de alejarlos.
- source_word: הָבֶל
  english_pob_choice: a breath will take them away
  chosen_spanish: un soplo los arrebatará
  alternatives_spanish:
  - un aliento los llevará
  - un vapor los arrebatará
  lexicon: HALOT
  rationale: 'En el paralelismo poético, הָבֶל funciona como imagen de algo tenue e inestable: soplo, aliento, vapor. «Un soplo» es natural en español y preserva la fragilidad imaginada por el hebreo.'
- source_word: וְהַחוֹסֶה בִי
  english_pob_choice: whoever takes refuge in me
  chosen_spanish: el que se refugia en mí
  alternatives_spanish:
  - quien se refugia en mí
  - el que busca refugio en mí
  lexicon: HALOT
  rationale: El participio expresa una postura continua de confianza/protección. «El que se refugia en mí» conserva el sentido representativo singular y evita una perífrasis más pesada.
- source_word: יִנְחַל אֶרֶץ
  english_pob_choice: will inherit the land
  chosen_spanish: heredará la tierra
  alternatives_spanish:
  - heredará la tierra prometida
  - recibirá la tierra como herencia
  lexicon: HALOT
  rationale: נחל transmite la idea de heredar o recibir como posesión. «Heredará la tierra» refleja bien el hebreo y mantiene el matiz de posesión covenantal sin añadir palabras no presentes.
- source_word: וְיִירַשׁ הַר קָדְשִׁי
  english_pob_choice: and possess my holy mountain
  chosen_spanish: y poseerá mi santo monte
  alternatives_spanish:
  - y heredará mi santo monte
  - y tomará posesión de mi santo monte
  lexicon: HALOT
  rationale: ירשׁ puede significar heredar o poseer. Para evitar la repetición inmediata de «heredará» y conservar el paralelo semántico, «poseerá» es una solución clara y fiel. «Santo monte» mantiene la referencia a Sion sin explicitarla en el texto.
theological_decisions:
- issue: Referente de קִבּוּצַיִךְ / «your gathered items»
  english_pob_reading: understood as gathered idols/objects of false trust
  chosen_spanish_reading: «tus cosas reunidas» en el texto, con la referencia a objetos de falsa confianza implícita en el contexto
  alternative_spanish_readings:
  - «tus ídolos reunidos»
  - «tus aliados reunidos»
  rationale: El contexto de Isaías 57 denuncia la idolatría y los refugios falsos. Sin embargo, en el texto español principal se preserva la ambigüedad léxica básica del hebreo; la interpretación idolátrica queda disponible por el contexto y puede explicarse en nota o decisión lexical.
  doctrine_reference: Isaías 57; crítica profética de la idolatría
- issue: Sentido de אֶרֶץ
  english_pob_reading: the land
  chosen_spanish_reading: la tierra
  alternative_spanish_readings:
  - la tierra prometida
  - el país
  - la tierra/territorio
  rationale: El contexto de Sion favorece el sentido de tierra heredada, no una universalización a «mundo». «La tierra» reproduce el alcance concreto del hebreo y encaja con el monte santo que sigue.
  doctrine_reference: Covenant land / Sion context in Isaiah
- issue: Imagen de רוּחַ + הָבֶל
  english_pob_reading: wind / breath-vapor poetic pair emphasizing disappearance
  chosen_spanish_reading: viento / soplo
  alternative_spanish_readings:
  - viento / aliento
  - viento / vapor
  rationale: La pareja poética debe seguir sonando frágil y efímera en español. «Soplo» comunica bien esa evanescencia sin perder la fuerza imagística del hebreo.
  doctrine_reference: Poetic parallelism in Hebrew prophecy
translation_notes:
  revision_awareness: 'La versión actual conserva el juicio revisado de alta concordancia del audit trail: no se requieren cambios sustanciales. Se mantiene la lectura taunt en la primera línea, la pareja poética viento/soplo y el cierre con herencia de la tierra y posesión del santo monte.'
  spanish_consistency_notes:
  - Se usa «Yahvé» por norma del proyecto cuando el texto lo requiera explícitamente; este versículo no contiene el Tetragrámaton en la forma superficial hebrea.
  - «Tierra» se mantiene en minúscula por tratarse de la posesión concreta del contexto, no de un nombre propio.
  - «Santo monte» conserva el paralelismo con el monte de Sion sin añadir glosa interpretativa en el cuerpo del texto.
  - Se evita «SEÑOR» y se conserva el tono profético directo del hebreo.
