translation:
  language: es
  text: Cuando un hombre tenga en la piel de su cuerpo una hinchazón, o una costra, o una mancha brillante, y llegue a ser en la piel de su cuerpo una infección de lepra[a], será llevado a Aarón el sacerdote, o a uno de sus hijos sacerdotes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Tradicionalmente, «una infección de lepra» o «una enfermedad de lepra». El hebreo צָרָעַת designa una categoría más amplia de afección cutánea y no debe identificarse automáticamente con la lepra moderna (enfermedad de Hansen).
    reason: alternative_reading
lexical_decisions:
- source_word: אָדָם
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: HALOT
  rationale: El hebreo introduce un caso legal con un singular genérico. «Un hombre» conserva esa forma y funciona naturalmente en español jurídico-bíblico.
- source_word: בְּעוֹר בְּשָׂרוֹ
  english_pob_choice: on the skin of his body
  chosen_spanish: en la piel de su cuerpo
  alternatives_spanish:
  - sobre la piel de su cuerpo
  - en su piel
  lexicon: HALOT
  rationale: «Piel» comunica con claridad el referente corporal y evita el calco más duro de «flesh», que en español sonaría menos natural aquí. Se conserva la repetición anatómica del hebreo.
- source_word: שְׂאֵת
  english_pob_choice: a swelling
  chosen_spanish: una hinchazón
  alternatives_spanish:
  - una elevación
  - un bulto
  lexicon: HALOT
  rationale: El término designa una elevación en la piel. «Hinchazón» es claro, concreto y compatible con el registro moderno sin perder la imagen física.
- source_word: סַפַּחַת
  english_pob_choice: a scab
  chosen_spanish: una costra
  alternatives_spanish:
  - una erupción
  - un sarpullido
  lexicon: HALOT
  rationale: La referencia exacta es incierta, pero se trata de una lesión cutánea concreta. «Costra» es una equivalencia breve y reconocible en español.
- source_word: בַּהֶרֶת
  english_pob_choice: a bright spot
  chosen_spanish: una mancha brillante
  alternatives_spanish:
  - una mancha clara
  - una mancha blanca
  lexicon: HALOT
  rationale: «Mancha brillante» mantiene la amplitud semántica del hebreo, que puede aludir a una marca clara o pálida sin fijar de más el diagnóstico.
- source_word: לְנֶגַע צָרָעַת
  english_pob_choice: an infection of leprosy
  chosen_spanish: una infección de lepra
  alternatives_spanish:
  - una afección de lepra
  - un caso de lepra
  - una afección cutánea
  lexicon: HALOT
  rationale: La redacción inglesa adoptó «leprosy» en la revisión final; el español sigue esa decisión para conservar el registro formal. «Infección» rinde נֶגַע como lesión o afección dañina en el contexto legal.
- source_word: וְהוּבָא
  english_pob_choice: he shall be brought
  chosen_spanish: será llevado
  alternatives_spanish:
  - deberá ser llevado
  - será traído
  lexicon: HALOT
  rationale: La pasiva legal se expresa de manera natural con «será llevado», conservando la fuerza procedimental del mandato.
- source_word: אַהֲרֹן הַכֹּהֵן
  english_pob_choice: Aaron the priest
  chosen_spanish: Aarón el sacerdote
  alternatives_spanish:
  - Aarón, el sacerdote
  lexicon: HALOT
  rationale: Construcción directa de nombre + título, fiel al hebreo y plenamente idiomática en español bíblico.
- source_word: אַחַד מִבָּנָיו הַכֹּהֲנִים
  english_pob_choice: one of his sons the priests
  chosen_spanish: uno de sus hijos, los sacerdotes
  alternatives_spanish:
  - uno de sus hijos sacerdotes
  - uno de sus hijos, los sacerdotes
  lexicon: HALOT
  rationale: Se conserva la identificación familiar y sacerdotal. El giro con coma refleja el apposicional hebreo sin volverlo más explicativo de lo que el texto permite.
theological_decisions:
- issue: Qué hacer con צָרָעַת
  english_pob_reading: leprosy
  chosen_spanish_reading: lepra
  alternative_spanish_readings:
  - enfermedad de la piel
  - afección cutánea
  - tzaraat
  rationale: La POB inglesa revisó el pasaje hacia «leprosy» para reflejar más directamente צָרָעַת y preservar el registro formal. En español se siguió esa línea, manteniendo además la nota explicativa para no identificar automáticamente la condición bíblica con la lepra moderna.
  doctrine_reference: 'Principio POB: primacía del idioma original con transparencia sobre la tradición interpretativa, preservando la tensión entre el término bíblico y su equivalencia histórica.'
translation_notes:
  revision_awareness: La base inglesa pasó por una revisión que cambió «skin disease» a «leprosy» para reflejar más directamente צָרָעַת y mantener el registro formal. Esta versión española sigue esa revisión, pero conserva en nota la advertencia semántica tradicional de la POB sobre la amplitud del término hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se usa «Aarón» y «sacerdote/sacerdotes» de forma consistente con el hebreo, sin introducir lenguaje eclesiástico ajeno.
  - «Lepra» se emplea por fidelidad a la revisión inglesa, pero la nota evita una identificación médica simplista.
  - La repetición de «en la piel de su cuerpo» se preserva parcialmente para reflejar la estructura hebrea y su tono legal.
