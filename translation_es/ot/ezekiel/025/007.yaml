revisions:
- from: Por tanto[a], he aquí, he extendido mi mano contra ti, y te daré como botín a las naciones. Te cortaré de entre los pueblos y te destruiré de entre las tierras; te aniquilaré, y sabrás que yo soy Yahvé.
  to: Por tanto[a], he aquí, he extendido mi mano contra ti, y te daré como botín a las naciones. Te eliminaré de entre los pueblos y te destruiré de las tierras; te aniquilaré, y sabrás que yo soy Yahvé.
  rationale: Se conservaron el sentido del hebreo y las decisiones teológicas del POB, pero se corrigieron dos calcos poco naturales en español («te cortaré de entre» y «te destruiré de entre las tierras») y se tradujo la nota al pie al español. Los cambios son menores y no requieren adjudicación adicional.
