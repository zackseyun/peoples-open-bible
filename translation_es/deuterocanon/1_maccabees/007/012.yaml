translation:
  language: es
  text: Y una asamblea[a] de escribas se reunió con Alcimo y Bacquides para buscar justicia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «congregación» o «reunión». El griego expresa un cuerpo reunido de escribas, no un edificio o institución religiosa.
    reason: lexical_alternative
  - marker: b
    text: O «lo justo» o «lo que es justo». El griego δίκαια puede abarcar justicia legal y rectitud moral.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπισυνήχθησαν
  english_pob_choice: gathered
  chosen_spanish: se reunieron
  alternatives_spanish:
  - se juntaron
  - fueron reunidos
  lexicon: LSJ
  rationale: El pasivo/aoristo de ἐπισυνάγω expresa una reunión colectiva; en español, «se reunieron» comunica de forma natural la acción grupal sin perder el matiz de congregación.
- source_word: πρὸς
  english_pob_choice: to
  chosen_spanish: con
  alternatives_spanish:
  - a
  - ante
  lexicon: LSJ
  rationale: Con nombres de personas y un verbo de reunión, πρὸς puede expresar relación o dirección hacia ellas. En español, «con» suena más natural para una asamblea que se reúne en torno a Alcimo y Bacquides, sin forzar una idea espacial demasiado rígida.
- source_word: συναγωγὴ
  english_pob_choice: assembly
  chosen_spanish: asamblea
  alternatives_spanish:
  - reunión
  - congregación
  lexicon: LSJ
  rationale: Aquí no se trata del edificio ni de la institución sinagogal, sino de un cuerpo reunido. «Asamblea» conserva el carácter formal del grupo y evita la carga eclesiástica de «sinagoga».
- source_word: γραμματέων
  english_pob_choice: of scribes
  chosen_spanish: de escribas
  alternatives_spanish:
  - de secretarios
  - de letrados
  lexicon: LSJ
  rationale: «Escribas» es el equivalente más transparente para γραμματεύς en contexto judío y helenístico. «Secretarios» o «letrados» serían posibles, pero menos precisos aquí.
- source_word: ἐκζητῆσαι
  english_pob_choice: to seek
  chosen_spanish: para buscar
  alternatives_spanish:
  - para procurar
  - para inquirir
  lexicon: LSJ
  rationale: La infinitiva final pide una frase de propósito. «Buscar» reproduce bien la acción dirigida y permite que el objeto moral-jurídico de δίκαια quede abierto en español.
- source_word: δίκαια
  english_pob_choice: justice
  chosen_spanish: justicia
  alternatives_spanish:
  - lo justo
  - lo que es justo
  lexicon: LSJ
  rationale: δίκαια es neutro plural y puede implicar tanto justicia legal como rectitud moral. «Justicia» mantiene la fuerza formal que el revisado inglés adoptó, sin cerrar del todo esa amplitud; «lo justo» seguiría siendo una alternativa válida si se quisiera enfatizar el sentido adjetival.
- source_word: Ἄλκιμον
  english_pob_choice: Alcimus
  chosen_spanish: Alcimo
  alternatives_spanish:
  - Alcimos
  lexicon: transliteration
  rationale: Se adapta el nombre al uso español normal de nombres propios antiguos. «Alcimo» es la forma más natural y legible en español bíblico.
- source_word: Βακχίδην
  english_pob_choice: Bacchides
  chosen_spanish: Bacquides
  alternatives_spanish:
  - Bákquides
  - Bacides
  lexicon: transliteration
  rationale: Se conserva el nombre propio con transliteración española estable y pronunciable. «Bacquides» evita un calco inglés innecesario y mantiene la identidad del personaje.
theological_decisions:
- issue: Alcance de δίκαια en un contexto político-jurídico
  english_pob_reading: justice
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - lo justo
  - lo que es justo
  rationale: El griego permite tanto una referencia jurídica concreta como una noción más general de rectitud. «Justicia» preserva esa amplitud y no obliga al lector español a decidir prematuramente entre reclamo legal, equidad o rectitud moral.
  doctrine_reference: 'DOCTRINE.md: Preservar la tensión semántica donde el texto no la resuelve; equivalencia óptima.'
translation_notes:
  revision_awareness: La redacción inglesa pasó de «to seek what is right» a «to seek justice» para reflejar δίκαια con mayor formalidad. En español, se adoptó «justicia» como equivalente principal, manteniendo la amplitud semántica con nota alternativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evita «sinagoga» porque συναγωγὴ aquí describe una asamblea de personas, no un lugar de culto.
  - Se conserva una sintaxis sobria y directa, adecuada para lectura bíblica pública.
