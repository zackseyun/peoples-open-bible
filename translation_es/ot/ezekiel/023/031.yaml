translation:
  language: es
  text: Has andado por el camino de tu hermana[a]; por eso, pondré su copa en tu mano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, la copa asignada a tu hermana como figura de juicio.
    reason: cultural_note
lexical_decisions:
- source_word: בְּדֶרֶךְ
  english_pob_choice: in the way
  chosen_spanish: en el camino
  alternatives_spanish:
  - en la senda
  - en la vía
  lexicon: HALOT
  rationale: דֶּרֶךְ puede significar camino, senda o curso de conducta. En este contexto profético funciona de manera metafórica para la conducta, y «en el camino» conserva esa imagen con español natural y bíblico.
- source_word: אֲחוֹתֵךְ
  english_pob_choice: your sister
  chosen_spanish: tu hermana
  alternatives_spanish:
  - tu hermana mayor
  - tu pariente
  lexicon: HALOT
  rationale: Se mantiene el término de parentesco literal, porque el hebreo lo usa como metáfora directa dentro del oráculo. No se explicita en el texto principal la identificación alegórica de la hermana.
- source_word: הָלָכְתְּ
  english_pob_choice: you have walked
  chosen_spanish: has caminado
  alternatives_spanish:
  - caminaste
  - has ido
  lexicon: HALOT
  rationale: הלך en qal puede significar andar o comportarse. «Has caminado» conserva el valor de conducta consumada con relevancia presente y suena natural en español.
- source_word: וְנָתַתִּי
  english_pob_choice: so I will put
  chosen_spanish: así que pondré
  alternatives_spanish:
  - y pondré
  - por tanto pondré
  lexicon: HALOT
  rationale: נתן tiene un rango amplio de dar/poner/colocar. Con «copa» y «en tu mano», «poner» expresa bien la acción de colocar algo en posesión del receptor. «Así que» refleja la fuerza consecuencial sin recargarla.
- source_word: כוֹסָהּ
  english_pob_choice: her cup
  chosen_spanish: su copa
  alternatives_spanish:
  - la copa de ella
  - la copa que le corresponde
  lexicon: HALOT
  rationale: Se conserva la metáfora de la copa sin explicarla en el cuerpo del texto. «Su copa» reproduce la brevedad hebrea y deja intacta la imagen de juicio.
- source_word: בְּיָדֵךְ
  english_pob_choice: into your hand
  chosen_spanish: en tu mano
  alternatives_spanish:
  - dentro de tu mano
  - en tus manos
  lexicon: HALOT
  rationale: Aunque la preposición es literalmente «en», en español la expresión normal es «poner en la mano». Se evita «en tu mano» como calco duro si no fuera por la construcción con poner; aquí se mantiene por fidelidad a la imagen de entrega directa.
theological_decisions:
- issue: Metáfora de la copa de juicio
  english_pob_reading: Retain the metaphor 'her cup' without explicating it as wrath in the main text.
  chosen_spanish_reading: Conservar «su copa» sin añadir en el texto principal que es copa de juicio o castigo.
  alternative_spanish_readings:
  - su copa de juicio
  - su copa de castigo
  rationale: El hebreo dice solo «su copa». El contexto profético sí sugiere juicio, pero no se debe resolver esa tensión en la línea principal. La nota puede aclarar la imagen sin sustituirla.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; never paraphrase beyond what the source text warrants.'
translation_notes:
  revision_awareness: El texto sigue de cerca el paquete fuente hebreo y coincide en sustancia con la solución inglesa auditada; no se identificaron cambios de revisión aplicables.
  spanish_consistency_notes:
  - Se usa «Yahvé» como convención general del proyecto, pero en este versículo no aparece el nombre divino.
  - Se prefirió «su copa» para mantener la metáfora y no convertirla en una explicación interpretativa en el cuerpo del texto.
  - La secuencia «pondré ... en tu mano» refleja bien נתן + בְּיָדֵךְ en español bíblico claro.
