revisions:
- from: Ellos son vanidad[a], una obra de delirio[b]; al tiempo de su castigo perecerán.
  to: Ellos son vanidad[a], una obra de engaño; al tiempo de su castigo[b] perecerán.
  rationale: Se reemplaza «delirio» por «engaño» porque comunica mejor el valor contextual de תַּעְתֻּעִים y suena natural en español neutro. Se elimina la nota defectuosa sobre «delusión» y se conserva en cambio la alternativa documentada para פְּקֻדָּתָם («visitación»), ya presente en la auditoría inglesa. El resto del texto es fiel y natural.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:40:35Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite correctamente la estructura y el sentido general del hebreo: los ídolos son vacíos, producto de engaño/delusión, y perecerán cuando llegue su castigo. Sin embargo, hay dos desajustes importantes con la evidencia y la auditoría inglesa: (1) «delirio» no refleja bien תַּעְתֻּעִים en este contexto, donde la línea auditada ya fijó «delusion» en vez de «mockery»; en español «delirio» sugiere más estado mental desordenado que engaño o ilusión engañosa. (2) la nota [b] usa «delusión», forma poco natural en español general; «engaño» o «ilusión engañosa» funcionan mejor. Además, la alternativa inglesa conservada para פְּקֻדָּתָם (''their visitation'') no aparece en nota española, aunque la justificación léxica dice que debía preservarse.'
  spanish_quality_summary: El texto es legible y de registro bíblico sobrio. «Vanidad» y «perecerán» son adecuados. «Al tiempo de su castigo» es entendible, aunque «al tiempo de su castigo» suena algo rígido; no obstante, sigue siendo aceptable y cercano al original. La principal debilidad de calidad es «una obra de delirio», que suena poco idiomático y semánticamente impreciso en español eclesial general. La puntuación y el estilo son correctos.
  glossary_alignment: 'No hay conflicto con los términos doctrinales globales del proyecto. Las decisiones clave deberían alinearse así: הֶבֶל -> «vanidad» está bien; תַּעְתֻּעִים debería ir como «engaño» o «ilusión engañosa» antes que «delirio»; פְּקֻדָּתָם -> «castigo» es válido, pero conviene conservar en nota la alternativa «visitación» por fidelidad a la auditoría inglesa.'
  issues:
  - severity: medium
    issue: «delirio» para תַּעְתֻּעִים es semánticamente inexacto
    rationale: La decisión inglesa revisada fijó «delusion» con sentido de engaño/ilusión engañosa. En español, «delirio» normalmente denota trastorno mental o habla desordenada, no una cualidad engañosa del objeto fabricado.
  - severity: medium
    issue: La nota [b] usa «delusión», forma poco natural en español general
    rationale: Aunque existe en algunos registros, no es la opción más clara ni la más ampliamente legible en español neutro. El proyecto pide español moderno y claro.
  - severity: low
    issue: Falta en nota la alternativa para פְּקֻדָּתָם equivalente a «visitación»
    rationale: La auditoría inglesa preserva explícitamente «at the time of their visitation». Dado que la decisión léxica española también la menciona, conviene conservarla en una nota para mantener la trazabilidad.
  revised_spanish_text: Ellos son vanidad[a], una obra de engaño; al tiempo de su castigo[b] perecerán.
  revised_footnotes:
