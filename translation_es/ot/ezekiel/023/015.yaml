  source_alignment_summary: 'El borrador español sigue de cerca la estructura hebrea y las decisiones del POB en casi todos los segmentos: cinturones ceñidos, turbantes en la cabeza, apariencia de oficiales, la semejanza de los hijos de Babilonia, caldeos, y la tierra de su nacimiento. Sin embargo, «a sus cinturas» resulta poco natural y ligeramente redundante con «cinturones ceñidos»; además, «turbantes sueltos» atenúa el matiz de algo colgante o fluido presente en סְרוּחֵי. También conviene corregir la nota b, cuyo anclaje explica «hijos de Babilonia» más que «caldeos».'
