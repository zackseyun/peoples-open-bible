    changes_summary: Changed 'plunder' to 'prey' to better reflect the sense of the source term for what is caught in a snare/net. Kept the second clause unchanged as a natural rendering of the Hebrew sense.
translation:
  language: es
  text: El malvado desea la presa de los hombres malvados[a], pero la raíz de los justos da fruto[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Presa’ refleja la decisión inglesa más reciente para מְצוֹד y conserva la posibilidad de una imagen de captura; otras lecturas posibles son ‘red’, ‘lazo’ o ‘botín’.
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: ‘la raíz de los justos da’. Se explicita ‘fruto’ para hacer claro el sentido agrícola probable del hebreo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חָמַד
  english_pob_choice: desires
  chosen_spanish: desea
  alternatives_spanish:
  - codicia
  - ansía
  lexicon: HALOT
  rationale: El verbo expresa un deseo fuerte. 'Desea' conserva esa amplitud sin convertirlo automáticamente en un deseo ilícito más técnico como 'codicia', aunque el contexto del malvado le da una carga negativa.
- source_word: רָשָׁע
  english_pob_choice: a wicked man
  chosen_spanish: el malvado
  alternatives_spanish:
  - un malvado
  - un hombre malvado
  lexicon: HALOT
  rationale: El hebreo usa un adjetivo sustantivado en singular con valor genérico. 'El malvado' mantiene la fuerza proverbial y evita añadir innecesariamente 'hombre', que no está explícito en el hebreo.
- source_word: מְצוֹד
  english_pob_choice: the prey
  chosen_spanish: la presa
  alternatives_spanish:
  - la red
  - el lazo
  - el botín
  lexicon: HALOT
  rationale: Siguiendo la revisión inglesa más reciente y el valor contextual de lo capturado en una trampa o red, 'presa' conserva la idea de algo que se busca o se obtiene por captura. 'Red' o 'lazo' serían posibles, pero nombran más el medio que el objeto deseado.
- source_word: רָעִים
  english_pob_choice: of evil men
  chosen_spanish: de los hombres malvados
  alternatives_spanish:
  - de los malvados
  - de los malhechores
  lexicon: HALOT
  rationale: El plural adjetival funciona como sustantivo. 'Hombres malvados' mantiene el paralelismo con el singular genérico del primer hemistiquio y hace explícita la referencia personal que el español suele requerir.
- source_word: שֹׁרֶשׁ
  english_pob_choice: the root
  chosen_spanish: la raíz
  alternatives_spanish:
  - el tronco
  - el retoño
  lexicon: HALOT
  rationale: La imagen botánica debe preservarse. 'Raíz' es la equivalencia directa y prepara la imagen de fertilidad o productividad del segundo miembro.
- source_word: צַדִּיקִים
  english_pob_choice: of the righteous
  chosen_spanish: de los justos
  alternatives_spanish:
  - de los rectos
  - de los justos hombres
  lexicon: HALOT
  rationale: El plural sustantivado se refleja naturalmente como 'los justos'. 'Rectos' también sería posible, pero 'justos' es el término bíblico más estable en español para esta categoría.
- source_word: יִתֵּן
  english_pob_choice: yields fruit
  chosen_spanish: da fruto
  alternatives_spanish:
  - produce fruto
  - da
  lexicon: HALOT
  rationale: El verbo hebreo literalmente significa 'da'. En español, con 'raíz' como sujeto, 'da fruto' hace explícito el sentido agrícola implícito sin sobretraducir más allá de la imagen del texto.
translation_notes:
  revision_awareness: La traducción española sigue la revisión inglesa más reciente que prefirió 'prey' frente a 'plunder' para מְצוֹד, y conserva la segunda cola con una explicitación agrícola equivalente a la del audit trail inglés ('yields fruit' a partir de 'gives').
  spanish_consistency_notes:
  - Se mantuvo 'justos' para צַדִּיקִים, coherente con la terminología POB para la categoría moral/covenantal.
  - Se evitó 'SEÑOR' u otras convenciones de sustitución porque no aparece el Tetragrámaton en este versículo.
  - La versión usa un español neutral y proverbial, sin añadir elementos interpretativos que no estén sugeridos por el hebreo o por el audit trail inglés.
