revisions:
- from: Así hablé al pueblo por la mañana[a], y mi esposa murió en la tarde. Luego, por la mañana, hice como me había sido mandado.
  to: Entonces hablé al pueblo por la mañana[a], y mi esposa murió al atardecer. Luego, por la mañana, hice como me había sido mandado.
  rationale: Se ajusta «Así hablé» a «Entonces hablé» para evitar un matiz modal no presente en el hebreo y mejorar la naturalidad del español narrativo. Se cambia «en la tarde» por «al atardecer» para reflejar mejor בָּעָרֶב y mantener un contraste temporal más claro con «por la mañana». El resto del texto y la nota son fieles y adecuados.
