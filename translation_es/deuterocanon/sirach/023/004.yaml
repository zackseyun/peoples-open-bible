translation:
  language: es
  text: Señor[a], Padre y Dios de mi vida, no me des ojos altivos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse más literalmente como «ojos inquietos» o «agitación de los ojos»; el griego admite la lectura de altivez o de movimiento/restlessness.
    reason: lexical_alternative
lexical_decisions:
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: LSJ
  rationale: Vocativo dirigido a Dios en oración. «Señor» es el equivalente natural en español y conserva el valor reverencial del griego sin volverlo más litúrgico de lo necesario.
- source_word: πάτερ
  english_pob_choice: Father
  chosen_spanish: Padre
  alternatives_spanish:
  - Papá
  - Padre mío
  lexicon: LSJ
  rationale: Vocativo directo y sobrio. «Padre» reproduce la relación de oración con claridad y sin añadir afecto no explícito en el texto.
- source_word: θεὲ ζωῆς μου
  english_pob_choice: God of my life
  chosen_spanish: Dios de mi vida
  alternatives_spanish:
  - Dios que me da la vida
  - Dios de mi vivir
  lexicon: LSJ
  rationale: Se conserva la construcción genitiva de modo compacto y natural en español. «De mi vida» mantiene la relación posesiva/relacional sin explicarla más de lo que el griego exige.
- source_word: μετεωρισμὸν ὀφθαλμῶν
  english_pob_choice: haughty eyes
  chosen_spanish: ojos altivos
  alternatives_spanish:
  - ojos arrogantes
  - ojos soberbios
  - inquietud de los ojos
  lexicon: LSJ
  rationale: La POB inglesa opta por el sentido moral de orgullo, aunque reconoce la posibilidad más literal de movimiento/inquietud. En español, «altivos» comunica bien la soberbia visual y conserva la imagen de los ojos como sede del vicio; «ojos altivos» evita una paráfrasis excesiva.
- source_word: μὴ δῷς μοι
  english_pob_choice: do not give me
  chosen_spanish: no me des
  alternatives_spanish:
  - no me concedas
  - no me otorgues
  lexicon: LSJ
  rationale: Imperativo prohibitivo directo y natural en español. «No me des» sigue de cerca la forma verbal del griego y funciona bien en la oración.
theological_decisions:
- issue: Sentido moral de μετεωρισμὸν ὀφθαλμῶν
  english_pob_reading: an idiom for proud or haughty eyes
  chosen_spanish_reading: un modismo para ojos soberbios o altivos
  alternative_spanish_readings:
  - ojos inquietos
  - ojos errantes
  rationale: En este contexto sapiencial de plegaria, el giro apunta con más probabilidad a una actitud de soberbia expresada por la mirada. Se mantiene la elección moral principal, pero la nota preserva la tensión con la lectura más literal que la POB documenta.
  doctrine_reference: Preservar la tensión léxica sin resolverla de manera artificial; documentar la variación contextual de los términos clave.
translation_notes:
  revision_awareness: El texto griego y la audit trail inglesa muestran acuerdo alto y no registran revisiones aplicadas. La versión española sigue ese estado estable, conservando la ambigüedad documentada de μετεωρισμὸν ὀφθαλμῶν en una nota breve.
  spanish_consistency_notes:
  - Se usa «Señor» para Κύριε, en consonancia con la oración dirigida a Dios y con el estilo bíblico del proyecto.
  - Se mantiene «Dios de mi vida» como sintagma compacto, evitando expandirlo a una explicación interpretativa.
  - «ojos altivos» refleja el matiz de orgullo sin perder la imagen corporal original.
  - La nota marca la alternativa literal documentada para no borrar la tensión semántica del griego.
