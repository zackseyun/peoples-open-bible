    text: 'O: «hijos» puede entenderse más ampliamente como «hijos e hijas» o «descendientes», aunque el griego más literalmente dice «hijos/sons».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «en la tierra», si γῆ se toma en un sentido más local.'
    reason: alternative_reading
  revision_rationale: Se corrige la sintaxis española para que suene natural y fiel; se repara la dirección de las notas léxicas; se elimina la nota c impropia del borrador y se restablece una nota útil sobre υἱοὶ; y se conserva «sobre la tierra» con nota alternativa «en la tierra», en línea con el expediente inglés, aunque reconociendo la ambigüedad de γῆ. No hace falta adjudicación adicional porque la revisión es directa a partir del source packet y del audit trail.
