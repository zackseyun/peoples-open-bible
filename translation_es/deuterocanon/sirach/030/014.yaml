translation:
  language: es
  text: Mejor es un hombre pobre que vive y está bien, que un hombre rico afligido en su carne[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «Mejor es un pobre, sano y fuerte en su constitución, que un rico azotado en su cuerpo». El testimonio hebreo es más breve y dice literalmente «vivo en sí mismo» y «herido en su carne».'
    reason: alternative_reading
lexical_decisions:
- source_word: טוב / κρείσσων
  english_pob_choice: Better is
  chosen_spanish: Mejor es
  alternatives_spanish:
  - Es mejor
  - Más vale
  lexicon: HALOT; LXX κρείσσων
  rationale: La frase sapiencial comparativa se expresa de forma natural en español con «Mejor es». Conserva el valor comparativo sin volverla una afirmación meramente adjetival.
- source_word: מסכן
  english_pob_choice: poor man
  chosen_spanish: un hombre pobre
  alternatives_spanish:
  - un pobre
  - un hombre necesitado
  - un hombre indigente
  lexicon: HALOT
  rationale: El hebreo presenta un masculino singular representativo; «un hombre pobre» mantiene ese perfil y suena natural en español bíblico actual.
- source_word: וחי
  english_pob_choice: who is alive
  chosen_spanish: sano
  alternatives_spanish:
  - que está vivo
  - vivo
  - con vida
  lexicon: HALOT; Greek parallel ὑγιής
  rationale: Aunque el hebreo dice literalmente «y vive», la tradición griega añade la idea de bienestar corporal. Siguiendo el ajuste revisado del POB inglés, «sano» comunica la vida conservada en contraste con la lesión física sin perder del todo el anclaje corporal.
- source_word: בעצמו
  english_pob_choice: in himself
  chosen_spanish: en su estado
  alternatives_spanish:
  - en sí mismo
  - por sí mismo
  - en su persona
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática. «En su estado» evita el calco duro de «en sí mismo» y transmite la idea de encontrarse íntegro o en buena condición, en línea con la revisión inglesa «alive and well».
- source_word: מעשיר
  english_pob_choice: than a rich man
  chosen_spanish: que un hombre rico
  alternatives_spanish:
  - que el rico
  - que un rico
  lexicon: HALOT
  rationale: El contraste requiere «que». «Un hombre rico» mantiene la simetría con «un hombre pobre» y conserva el estilo proverbial masculino singular.
- source_word: ונגע
  english_pob_choice: afflicted / stricken
  chosen_spanish: azotado
  alternatives_spanish:
  - afligido
  - herido
  - golpeado
  lexicon: HALOT; LXX μεμαστιγωμένος
  rationale: El hebreo indica ser tocado/afectado por una lesión o golpe, y el griego intensifica con la idea de ser «azotado». «Azotado» capta bien esa fuerza corporal sin suavizarla demasiado.
- source_word: בבשרו
  english_pob_choice: in his flesh
  chosen_spanish: en su cuerpo
  alternatives_spanish:
  - en su carne
  - en su propia carne
  lexicon: HALOT
  rationale: Aunque «carne» es literal, en español «en su cuerpo» comunica mejor la lesión física al lector moderno. Se preserva así la concreción corporal del hebreo y del paralelo griego.
theological_decisions:
- issue: Concreción corporal frente a abstracción de salud
  english_pob_reading: Retain the concrete expression and avoid smoothing everything into generic health language.
  chosen_spanish_reading: Conservar un contraste corporal concreto, sin convertirlo en una frase general sobre bienestar económico o moral.
  alternative_spanish_readings:
  - '...un hombre pobre que vive y está bien...'
  - '...un hombre rico enfermo...'
  rationale: Sirácides 30:14 es un proverbio sobre condición corporal, no una tesis doctrinal. La redacción española mantiene ese ámbito concreto y evita ampliar indebidamente el sentido.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Masculino singular representativo
  english_pob_reading: Use 'poor man' and 'rich man.'
  chosen_spanish_reading: Usar «un hombre pobre» y «un hombre rico».
  alternative_spanish_readings:
  - persona pobre / persona rica
  - el pobre / el rico
  rationale: El hebreo usa formas masculinas singulares típicas de la sabiduría proverbial. En español, esa forma conserva la correspondencia gramatical sin perder inteligibilidad.
  doctrine_reference: Translation philosophy §4
- issue: Mediación entre hebreo breve y paralelo griego más explícito
  english_pob_reading: Main text stays anchored in Hebrew, with a note acknowledging the Greek parallel.
  chosen_spanish_reading: Mantener el texto principal breve y añadir nota para el paralelo griego más explícito.
  alternative_spanish_readings:
  - integrar directamente el paralelo griego en el texto principal
  - omitir la diferencia textual
  rationale: El testimonio hebreo es más breve («vivo en sí / en su estado»; «herido en su carne»), mientras que el griego aclara con salud, fuerza y azote corporal. La nota preserva esa tensión documentada sin resolverla artificialmente.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: La redacción española sigue la revisión inglesa más reciente al evitar un literalismo duro para בעצמו y al expresar la condición corporal de forma natural. También refleja la tensión entre el hebreo breve y el paralelo griego más desarrollado, sin nivelarlos.
  spanish_consistency_notes:
  - Se mantiene «hombre» para reproducir el singular masculino representativo del hebreo sapiencial.
  - Se usa «cuerpo» en el texto principal para una lectura publicable y clara, mientras la nota conserva «carne» como eco del hebreo literal.
  - «Azotado» refleja con mayor fuerza el paralelo griego, pero el lenguaje sigue siendo comprensible y sobrio en español bíblico moderno.
  - No se introduce «Mesías», «SEÑOR» ni otros términos no pertinentes al versículo.
