translation:
  language: es
  text: 'Pero ella le dijo: “¿Es poca cosa que hayas tomado a mi marido? ¿También vas a tomar las mandrágoras[a] de mi hijo?”. Raquel dijo: “Entonces podrá acostarse contigo esta noche a cambio de las mandrágoras de tu hijo.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'manzanas de amor'. El término hebreo se refiere a las mandrágoras, una planta tradicionalmente asociada con la fertilidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמְעַט
  english_pob_choice: Was it a small thing
  chosen_spanish: ¿Es poca cosa
  alternatives_spanish:
  - ¿Fue poca cosa
  - ¿No es suficiente
  lexicon: HALOT
  rationale: La pregunta retórica expresa reproche; en español, “¿Es poca cosa...?” conserva bien ese tono sin sonar artificioso. Evita una paráfrasis más libre como “¿No te basta...?”, que añade sentido no explicitado.
- source_word: קַחְתֵּךְ ... אֶת אִישִׁי
  english_pob_choice: you have taken my husband
  chosen_spanish: que hayas tomado a mi marido
  alternatives_spanish:
  - que tomaste a mi marido
  - que hayas quitado a mi marido
  lexicon: HALOT
  rationale: El perfecto hebreo en contexto narrativo-dialogal se vierte naturalmente con subjuntivo perfecto tras la pregunta indirecta. “Marido” refleja אִישִׁי con el sentido relacional de esposo.
- source_word: וְלָקַחַת גַּם
  english_pob_choice: Would you also take
  chosen_spanish: ¿Y también tomarías
  alternatives_spanish:
  - ¿Y también tomarías a
  - ¿Y también querrías tomar
  lexicon: HALOT
  rationale: 'El infinitivo con waw añade una segunda queja, con fuerza retórica. El condicional en español comunica la recriminación: “¿tomarías también...?” sin volverlo una simple afirmación futura.'
- source_word: דּוּדָאֵי
  english_pob_choice: mandrakes
  chosen_spanish: mandrágoras
  alternatives_spanish:
  - love-apples
  lexicon: HALOT
  rationale: “Mandrágoras” es el equivalente técnico en español para el término botánico tradicionalmente identificado con דּוּדָאֵי. Mantiene el referente y evita una glosa interpretativa no necesaria en el cuerpo del texto.
- source_word: יִשְׁכַּב עִמָּךְ הַלַּיְלָה
  english_pob_choice: he may lie with you tonight
  chosen_spanish: él se acostará contigo esta noche
  alternatives_spanish:
  - él yacerá contigo esta noche
  - él dormirá contigo esta noche
  lexicon: HALOT
  rationale: En este contexto matrimonial, שׁכב con עִם implica relación sexual; “se acostará contigo” preserva el sentido idiomático en español de manera sobria. Se evita “dormirá”, que podría suavizar demasiado el matiz.
- source_word: תַּחַת
  english_pob_choice: in exchange for
  chosen_spanish: a cambio de
  alternatives_spanish:
  - en lugar de
  - por
  lexicon: HALOT
  rationale: Aquí תַּחַת expresa compensación en un arreglo negociado. “A cambio de” comunica el valor transaccional de forma natural y fiel.
theological_decisions:
- issue: La intensidad del reclamo de Lea frente al intercambio propuesto
  english_pob_reading: Was it a small thing that you have taken my husband? Would you also take my son’s mandrakes?
  chosen_spanish_reading: ¿Es poca cosa que hayas tomado a mi marido? ¿Y también tomarías a mi hijo sus mandrágoras?
  alternative_spanish_readings:
  - ¿No fue suficiente que hayas tomado a mi marido?
  - ¿Y también te llevarías las mandrágoras de mi hijo?
  rationale: 'No hay una doctrina en juego, pero sí una tensión retórica importante: el reproche de Lea debe permanecer fuerte sin exagerarlo. La formulación elegida conserva la indignación y la estructura de dos preguntas.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo y el audit trail inglés: mantiene las dos preguntas de Lea separadas, conserva el valor transaccional de תַּחַת como “a cambio de” y traduce דּוּדָאֵי con el término español estándar “mandrágoras”, sin añadir nota porque no es necesaria para la publicación de este versículo.'
  spanish_consistency_notes:
  - Se usa “Yahvé” solo cuando aparece el nombre divino; aquí no aplica.
  - Se mantiene “marido” por el sentido directo de אִישִׁי en la queja de Lea.
  - “Se acostará contigo” conserva el eufemismo hebreo con claridad pastoral.
  - No se introducen notas al pie porque no hay marcador anclado en el texto y no se requiere variante textual o léxica adicional.
