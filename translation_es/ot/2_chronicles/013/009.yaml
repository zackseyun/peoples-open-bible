translation:
  language: es
  text: ¿No han expulsado ustedes a los sacerdotes de Yahvé, a los hijos de Aarón y a los levitas, y han nombrado sacerdotes para ustedes, como los pueblos de las tierras? Todo el que viene a llenar su mano[a] con un novillo y siete carneros llega a ser sacerdote de lo que no son dioses[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «llenar su mano», expresión técnica para la investidura u ordenación sacerdotal.'
    reason: lexical_alternative
  - marker: b
    text: O «para no-dioses» o «de falsos dioses»; el hebreo niega literalmente que esos objetos de culto sean verdaderamente dioses.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Yahvéh
  lexicon: YHWH
  rationale: El texto hebreo usa directamente el nombre del pacto. En español, el estándar del proyecto es 'Yahvé', que conserva el nombre divino sin sustituirlo por un título de máscara como 'SEÑOR'.
- source_word: הִדַּחְתֶּם
  english_pob_choice: driven out
  chosen_spanish: han expulsado
  alternatives_spanish:
  - han echado
  - han desterrado
  lexicon: HALOT
  rationale: El verbo expresa remoción forzada. 'Expulsado' comunica mejor la fuerza del acto que una formulación más débil, y encaja con el tono de reprensión.
- source_word: כֹּהֲנֵי יְהוָה
  english_pob_choice: the priests of Yahweh
  chosen_spanish: los sacerdotes de Yahvé
  alternatives_spanish:
  - los sacerdotes de Yahvé
  - los sacerdotes de Yahvé, el Dios de Israel
  lexicon: HALOT
  rationale: '''Sacerdotes'' es la forma natural en español para כֹּהֲנִים. Se mantiene el nombre divino en genitivo de relación sin añadir explicaciones no presentes en el hebreo.'
- source_word: בְּנֵי אַהֲרֹן
  english_pob_choice: the sons of Aaron
  chosen_spanish: los hijos de Aarón
  alternatives_spanish:
  - los hijos de Aarón
  - los descendientes de Aarón
  lexicon: HALOT
  rationale: Se conserva la expresión genealógica/cultual del hebreo. 'Hijos de Aarón' es la correspondencia directa y mantiene el vínculo de legitimidad sacerdotal.
- source_word: וְהַלְוִיִּם
  english_pob_choice: and the Levites
  chosen_spanish: y a los levitas
  alternatives_spanish:
  - y los levitas
  - junto con los levitas
  lexicon: HALOT
  rationale: Se mantiene la coordinación con el objeto precedente y el carácter de grupo distinto junto a los sacerdotes aarónicos.
- source_word: וַתַּעֲשׂוּ לָכֶם כֹּהֲנִים
  english_pob_choice: and made priests for yourselves
  chosen_spanish: y se han hecho sacerdotes para ustedes
  alternatives_spanish:
  - y se han nombrado sacerdotes para ustedes
  - y han establecido sacerdotes para ustedes
  lexicon: HALOT
  rationale: La construcción refleja la autoasignación de un cargo. 'Se han hecho sacerdotes para ustedes' conserva la acusación de iniciativa propia y el matiz reflexivo del texto.
- source_word: כְּעַמֵּי הָאֲרָצוֹת
  english_pob_choice: like the peoples of the lands
  chosen_spanish: como los pueblos de las tierras
  alternatives_spanish:
  - como los pueblos de los territorios
  - como las naciones de las tierras
  lexicon: HALOT
  rationale: Se conserva la expresión sociopolítica del hebreo sin convertirla en un término interpretativo como 'paganos'. 'Tierras' reproduce el plural concreto del original.
- source_word: כָּל הַבָּא
  english_pob_choice: Whoever comes
  chosen_spanish: Todo el que viene
  alternatives_spanish:
  - Quienquiera que venga
  - Todo el que se presenta
  lexicon: HALOT
  rationale: La construcción general en singular se vierte de manera idiomática en español. 'Todo el que viene' preserva el alcance abierto de la crítica.
- source_word: לְמַלֵּא יָדוֹ
  english_pob_choice: to fill his hand
  chosen_spanish: a llenar su mano
  alternatives_spanish:
  - a llenar su mano en servicio
  - a completar su investidura
  lexicon: HALOT
  rationale: Se preserva la expresión técnica 'llenar la mano', evitando reemplazarla por una explicación interpretativa en el cuerpo del texto. La frase es comprensible en español bíblico y mantiene la tensión léxica documentada.
- source_word: בְּפַר בֶּן בָּקָר
  english_pob_choice: with a young bull
  chosen_spanish: con un novillo
  alternatives_spanish:
  - con un toro joven
  - con un becerro
  lexicon: HALOT
  rationale: '''Novillo'' transmite bien la idea de un toro joven apto para sacrificio. Es una equivalencia natural y precisa en español cultual.'
- source_word: וְאֵילִם שִׁבְעָה
  english_pob_choice: and seven rams
  chosen_spanish: y siete carneros
  alternatives_spanish:
  - y siete borregos
  - y siete machos ovinos
  lexicon: HALOT
  rationale: '''Carneros'' es el equivalente estándar y claro para אֵילִם. Mantiene la referencia sacrificial sin ambigüedad.'
- source_word: וְהָיָה כֹהֵן
  english_pob_choice: becomes a priest
  chosen_spanish: llega a ser sacerdote
  alternatives_spanish:
  - se convierte en sacerdote
  - queda como sacerdote
  lexicon: HALOT
  rationale: La forma resultativa expresa el cambio de estatus que produce el rito. 'Llega a ser sacerdote' suena natural y conserva el valor de resultado.
- source_word: לְלֹא אֱלֹהִים
  english_pob_choice: of what are not gods
  chosen_spanish: de lo que no son dioses
  alternatives_spanish:
  - de no-dioses
  - de falsos dioses
  lexicon: HALOT
  rationale: Se mantiene la negación polemológica del hebreo sin suavizarla a una etiqueta teológica tradicional. La formulación española conserva el rechazo a su divinidad real.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahvéh
  rationale: El proyecto español usa 'Yahvé' para reflejar el Tetragrama sin ocultarlo tras un título. En este versículo la referencia es directa, así que no se recurre a una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido polémico de לְלֹא אֱלֹהִים
  english_pob_reading: of what are not gods
  chosen_spanish_reading: de lo que no son dioses
  alternative_spanish_readings:
  - de falsos dioses
  - de no-dioses
  rationale: 'Se preserva la negación ontológica del texto: no afirma simplemente que sean ''falsos dioses'', sino que niega que sean dioses en absoluto. Esa tensión es importante y debe quedar audible en español.'
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail que prefirió una traducción más literal de לְמַלֵּא יָדוֹ ('fill his hand') en lugar de una paráfrasis interpretativa. También se respetó la decisión teológica de no suavizar לְלֹא אֱלֹהִים a 'ídolos' o 'falsos dioses' en el texto principal.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - '''Sacerdotes'' se mantiene para כֹּהֲנִים; no se reemplaza por ''curas'' ni ''ministros''.'
  - '''Levitas'' se conserva como término técnico del culto israelita.'
  - '''Llenar su mano'' se preserva en el texto para reflejar la idiomática hebrea y su carga ritual.'
  - '''De lo que no son dioses'' mantiene la fuerza negativa del hebreo sin domesticarla en el cuerpo principal.'
