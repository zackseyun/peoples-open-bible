translation:
  language: es
  text: Cualquier herida[a], pero no la herida de los que odian; y cualquier venganza[b], pero no la venganza de los enemigos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'aflicción'. El sustantivo griego puede entenderse más ampliamente como daño o aflicción infligida, no solo como herida física.
    reason: lexical_alternative
  - marker: b
    text: El griego es un proverbio elíptico, literalmente 'cualquier herida ... y no la herida de los que odian; y cualquier venganza ... y no la venganza de los enemigos', que expresa que tal hostilidad es peor que otras heridas.
    reason: cultural_note
lexical_decisions:
- source_word: πᾶσαν
  english_pob_choice: any
  chosen_spanish: todo
  alternatives_spanish:
  - cualquier
  - toda
  lexicon: LSJ
  rationale: El uso distributivo del griego aquí expresa una oposición proverbial entre cualquier caso ordinario y un caso especialmente odioso. En español, "todo" mantiene la generalidad sin forzar una perífrasis artificial; "cualquier" también sería posible, pero suena menos sentencioso en esta construcción.
- source_word: ἐπαγωγήν
  english_pob_choice: wound
  chosen_spanish: agravio
  alternatives_spanish:
  - herida
  - aflicción
  - daño
  - ataque
  lexicon: LSJ
  rationale: El sustantivo es difícil y puede abarcar una lesión, daño o aflicción infligida. Dado el paralelismo con "venganza" y la estructura proverbial, "agravio" conserva el sentido de daño sufrido y funciona con naturalidad en español sin reducirse solo a una herida física.
- source_word: μισούντων
  english_pob_choice: those who hate
  chosen_spanish: los que odian
  alternatives_spanish:
  - los que aborrecen
  - los odiadores
  lexicon: LSJ
  rationale: Es un participio sustantivado. "Los que odian" preserva el sentido activo y resulta claro y neutral en español; evita el sustantivo comprimido "odiadores", que suena menos bíblico y más marcado estilísticamente.
- source_word: ἐκδίκησιν
  english_pob_choice: vengeance
  chosen_spanish: venganza
  alternatives_spanish:
  - retribución
  - castigo
  - represalia
  lexicon: LSJ
  rationale: El término expresa retribución retaliatoria. "Venganza" es el equivalente más directo y fuerte en español, y conserva el paralelismo con el primer hemistiquio.
- source_word: ἐχθρῶν
  english_pob_choice: enemies
  chosen_spanish: enemigos
  alternatives_spanish:
  - adversarios
  - foes
  lexicon: LSJ
  rationale: El genitivo plural se rinde con el plural habitual "enemigos", que es claro, natural y fiel a la relación de hostilidad personal del texto.
theological_decisions:
- issue: Lectura elíptica y proverbial de la comparación
  english_pob_reading: 'The verse is rendered as an implied preference: one could bear any wound or any vengeance rather than the especially painful wound of haters or vengeance of enemies.'
  chosen_spanish_reading: 'La línea se entiende como una comparación implícita: mejor soportar cualquier agravio o cualquier venganza que el agravio de los que odian o la venganza de los enemigos.'
  alternative_spanish_readings:
  - 'Tomarla como exclamación: ''No hay agravio como el agravio de quien odia, ni venganza como la venganza de los enemigos.'''
  - 'Explicitar más el verbo: ''Toda clase de agravio...'''
  - Usar 'aflicción' en vez de 'agravio' en el texto principal.
  rationale: El griego es elíptico y proverbial, con paralelismo marcado por πᾶσαν... καὶ μὴ... La versión española debe conservar esa concisión sin añadir una paráfrasis explicativa al cuerpo del texto. 'Agravio' permite mantener la ambigüedad entre daño, lesión y ofensa, que el contexto admite.
  doctrine_reference: 'Principio POB: preservar la ambigüedad real y documentar decisiones léxicas significativas.'
translation_notes:
  revision_awareness: El auditorio inglés más reciente mantiene sin cambios la opción principal y solo documenta una alternativa léxica amplia para ἐπαγωγή; por ello, el español conserva la misma línea interpretativa, pero elige un término más natural y suficientemente amplio ('agravio') para reflejar la ambigüedad sin perder el tono proverbial.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' u otras convenciones de sustitución, porque el versículo no contiene el nombre divino.
  - Se mantiene 'venganza' para ἐκδίκησις por coherencia con el valor retaliatorio del término en el paralelo.
  - Se conserva la estructura bimembre y la repetición de 'pero no' para reflejar la elipsis del griego.
  - El marcador [a] aparece junto a la palabra principal para señalar la alternativa semántica sin interrumpir la fluidez del verso.
