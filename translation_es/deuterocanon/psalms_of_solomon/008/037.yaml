translation:
  language: es
  text: Y tú eres nuestro Dios desde el principio, y nuestra esperanza está en ti, Señor.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καὶ σὺ
  english_pob_choice: And you
  chosen_spanish: Y tú
  alternatives_spanish:
  - Y tú mismo
  - Y en cuanto a ti
  lexicon: BDAG
  rationale: Conserva la fuerza enfática del pronombre personal griego sin añadir contraste que el texto no exige.
- source_word: ὁ θεὸς ἡμῶν
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - Dios nuestro
  - nuestro Dios
  lexicon: BDAG
  rationale: La construcción predicativa del griego se entiende naturalmente en español como 'tú eres nuestro Dios', manteniendo la relación de pacto afirmada por la cláusula.
- source_word: ἀπʼ ἀρχῆς
  english_pob_choice: from the beginning
  chosen_spanish: desde el principio
  alternatives_spanish:
  - desde el comienzo
  - desde antiguo
  lexicon: BDAG
  rationale: '''Desde el principio'' reproduce de manera clara y digna la referencia temporal primordial del griego y coincide con la lectura revisada del inglés POB.'
- source_word: ἐλπὶς
  english_pob_choice: hope
  chosen_spanish: esperanza
  alternatives_spanish:
  - confianza
  - expectativa
  lexicon: BDAG
  rationale: '''Esperanza'' es la opción más natural en español e incluye la confianza orientada hacia Dios que expresa el sustantivo griego.'
- source_word: ἐπὶ σέ
  english_pob_choice: our hope is in you
  chosen_spanish: en ti está nuestra esperanza
  alternatives_spanish:
  - nuestra esperanza está en ti
  - sobre ti está nuestra esperanza
  lexicon: BDAG
  rationale: La preposición con acusativo conserva bien en español la idea de apoyo y dirección de la esperanza hacia Dios; 'en ti' comunica esa relación de forma idiomática y fiel.
- source_word: Κύριε
  english_pob_choice: O Lord
  chosen_spanish: oh Señor
  alternatives_spanish:
  - Señor
  - oh Señor
  lexicon: BDAG
  rationale: Se mantiene el vocativo de dirección a Dios. 'Señor' corresponde al uso tradicional de κύριος, y 'oh' hace explícita la llamada sin forzar el tono.
theological_decisions:
- issue: Sintaxis de cláusula sin verbo con σὺ + ὁ θεὸς ἡμῶν
  english_pob_reading: And you are our God from the beginning
  chosen_spanish_reading: Y tú eres nuestro Dios desde el principio
  alternative_spanish_readings:
  - Y tú, oh nuestro Dios, eres desde el principio
  - Y tú eres Dios nuestro desde el principio
  rationale: 'Se sigue la adjudicación revisada del inglés POB: la frase nominativa es predicado, no vocativo. Esto preserva el sentido de pacto—Dios ha sido ''nuestro Dios'' desde el principio—más que una simple afirmación de eternidad.'
  doctrine_reference: Grammar/revision note in applied_revisions (2026-04-22T22:52:43Z)
- issue: Doble apelación a Dios como θεὸς y Κύριος
  english_pob_reading: our God ... O Lord
  chosen_spanish_reading: nuestro Dios ... oh Señor
  alternative_spanish_readings:
  - nuestro Dios ... Señor
  - oh Dios nuestro ... oh Señor
  rationale: Se conservan ambas formas de dirección divina, sin fusionarlas, para respetar la fuerza litúrgica y la distinción verbal del griego.
  doctrine_reference: 'Contested terms table: κύριος → Lord'
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del inglés POB: la cláusula se entiende como predicado (''you are our God from the beginning'') y la esperanza se formula de modo natural como ''our hope is in you''. No se conserva la antigua nota inglesa de lectura alternativa porque el español adoptado ya refleja la sintaxis revisada sin necesidad de marcar una ambigüedad residual.'
  spanish_consistency_notes:
  - Se usa 'Dios' para θεός y 'Señor' para κύριος, conforme al criterio del proyecto.
  - '''Desde el principio'' conserva el matiz temporal primordial de ἀπʼ ἀρχῆς sin añadir una paráfrasis interpretativa.'
  - '''Esperanza'' mantiene el sustantivo griego y la dirección relacional se expresa idiomáticamente con ''en ti''.'
  - No se emplea 'Cristo' ni terminología cristológica ajena al texto.
  - La puntuación busca un tono de oración pública, claro y sobrio.
