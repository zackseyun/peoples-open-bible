  - severity: high
    issue: La nota [a] está anclada en 'ovejas escogidas' pero su contenido trata de 'el pan del gobernador'.
    rationale: Las instrucciones requieren que cada nota aparezca exactamente en el lugar relevante del texto. Aquí el anclaje es incorrecto y produce confusión.
  - severity: medium
