translation:
  language: es
  text: Los que los hacen llegan a ser[a] como ellos mismos[b], y así también todo el que confía en ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «serán como ellos». El verbo hebreo puede traducirse «ser» o «llegar a ser»; aquí «llegan a ser» destaca el sentido de resultado.
    reason: lexical_alternative
  - marker: b
    text: 'Es decir, como los ídolos: mudos, sin ver, sin oír e impotentes, como se describe en los versículos anteriores.'
    reason: cross_reference
lexical_decisions:
- source_word: כְּמוֹהֶם
  english_pob_choice: like them
  chosen_spanish: como ellos
  alternatives_spanish:
  - iguales a ellos
  - semejantes a ellos
  lexicon: HALOT
  rationale: La partícula comparativa con sufijo pronominal expresa semejanza directa; «como ellos» es natural en español y conserva la comparación con los ídolos del contexto previo.
- source_word: יִהְיוּ
  english_pob_choice: will become
  chosen_spanish: llegan a ser
  alternatives_spanish:
  - serán
  - serán como ellos
  lexicon: HALOT
  rationale: El hebreo permite «ser» o «llegar a ser»; aquí el contexto favorece la idea de resultado, por lo que «llegan a ser» comunica mejor la transformación implícita sin volverlo innecesariamente interpretativo.
- source_word: עֹשֵׂיהֶם
  english_pob_choice: those who make them
  chosen_spanish: los que los hacen
  alternatives_spanish:
  - sus hacedores
  - los que los fabrican
  lexicon: HALOT
  rationale: El participio señala a los agentes humanos que fabrican los ídolos. «Los que los hacen» es claro, fiel y evita un giro más técnico o más solemne de lo que el hebreo exige.
- source_word: כֹּל אֲשֶׁר
  english_pob_choice: everyone who
  chosen_spanish: todo el que
  alternatives_spanish:
  - todos los que
  - cualquiera que
  lexicon: HALOT
  rationale: La construcción expresa universalidad condicional. «Todo el que» conserva el alcance general y funciona bien en español moderno.
- source_word: בֹּטֵחַ
  english_pob_choice: trusts
  chosen_spanish: confía
  alternatives_spanish:
  - pone su confianza
  - se fía
  lexicon: HALOT
  rationale: בטח denota confiar/poner confianza; «confía» es la opción más directa y digna en español para este contexto de dependencia religiosa.
- source_word: בָּהֶם
  english_pob_choice: in them
  chosen_spanish: en ellos
  alternatives_spanish:
  - sobre ellos
  - en esos ídolos
  lexicon: HALOT
  rationale: Con בטח, la preposición ב marca el objeto de confianza. «En ellos» sigue el uso normal del español y conserva la referencia a los ídolos sin añadir explicación al texto principal.
theological_decisions:
- issue: Alcance de la semejanza con los ídolos
  english_pob_reading: The verse states that idol-makers and idol-trusters become like the idols in their impotence and spiritual senselessness, without specifying the mechanism in the translation itself.
  chosen_spanish_reading: El versículo afirma la semejanza con los ídolos sin detallar en el texto principal en qué aspecto exacto se produce.
  alternative_spanish_readings:
  - se vuelven moralmente como los ídolos
  - se hacen espiritualmente insensibles como ellos
  rationale: El hebreo afirma la similitud, pero no explicita todos sus rasgos. La traducción principal preserva la advertencia sin resolver la tensión interpretativa ni añadir una glosa doctrinal al cuerpo del versículo.
  doctrine_reference: Preservar la tensión teológica sin resolverla de más.
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión más reciente del inglés POB, que ajustó el verbo al presente y reforzó la fluidez de la cláusula final; en español se refleja ese mismo equilibrio entre correspondencia formal y naturalidad.
  spanish_consistency_notes:
  - Se mantiene «ellos» para el referente de los ídolos, sin sustituirlo por «ídolos» en el cuerpo del versículo, porque el antecedente inmediato ya lo establece.
  - Se evita «SEÑOR» o equivalentes porque el versículo no contiene el nombre divino.
  - 'Se conserva el paralelismo entre los dos miembros: fabricantes y confiantes comparten el mismo destino de semejanza.'
