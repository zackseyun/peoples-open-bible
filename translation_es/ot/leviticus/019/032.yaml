review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: levantarse ante la canicie, honrar al anciano, temer a Dios, y cerrar con el nombre divino Yahvé. También preserva correctamente la concreción de שֵׂיבָה como «canas», la forma masculina singular de זָקֵן como «anciano», y el peso teológico de «temerás». Sin embargo, la nota b no conserva adecuadamente la alternativa del POB inglés: en vez de ofrecer la alternativa interpretativa «honra la presencia de un anciano», repite esencialmente la lectura literal ya puesta en el texto principal.'
  spanish_quality_summary: El español es claro y digno, pero «Te levantarás delante de las canas» suena algo rígido y personifica de manera extraña «las canas» en español. «Te pondrás de pie ante las canas» mejora la naturalidad manteniendo la imagen concreta. Además, la puntuación con punto y coma tras «un anciano» no es necesaria y entorpece el fluir. La nota b debe corregirse para que aporte una alternativa real y útil.
  glossary_alignment: 'Alineación general buena con la terminología del proyecto: «Yahvé» para יהוה, «Dios» para אֱלֹהִים, y «temerás» para ירא. También se mantiene acertadamente «anciano» para זָקֵן en vez de neutralizar el género. La única desalineación relevante con el rastro auditado del POB está en la nota b, que no transmite la alternativa documentada «presence of an elder / presencia de un anciano».'
  issues:
  - severity: medium
    issue: La nota b no corresponde a la alternativa preservada por el POB inglés.
    rationale: El inglés ofrece como alternativa «honor the presence of an elder», mientras que la nota española repite «el rostro de un anciano» y añade «la cara de un viejo/anciano», lo cual no aporta la alternativa interpretativa documentada.
  - severity: low
    issue: «Te levantarás delante de las canas» suena poco idiomático en español.
    rationale: Aunque es fiel, la combinación puede sonar extraña porque «las canas» funciona como metonimia. «Te pondrás de pie ante las canas» conserva la imagen hebrea y suena más natural en registro bíblico actual.
  - severity: low
    issue: Puntuación algo pesada con punto y coma intermedio.
    rationale: La coordinación fluye mejor con comas en español moderno y digno, sin pérdida de estructura.
  revised_spanish_text: Te pondrás de pie ante las canas[a], y honrarás el rostro de un anciano[b], y temerás a tu Dios; yo soy Yahvé.
