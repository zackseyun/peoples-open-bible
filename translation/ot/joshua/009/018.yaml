id: JOS.9.18
reference: Joshua 9:18
source:
  edition: WLC
  text: וְ/לֹ֤א הִכּוּ/ם֙ בְּנֵ֣י יִשְׂרָאֵ֔ל כִּֽי נִשְׁבְּע֤וּ לָ/הֶם֙ נְשִׂיאֵ֣י הָֽ/עֵדָ֔ה בַּֽ/יהוָ֖ה אֱלֹהֵ֣י יִשְׂרָאֵ֑ל וַ/יִּלֹּ֥נוּ כָל הָ/עֵדָ֖ה עַל הַ/נְּשִׂיאִֽים־־־׃
translation:
  text: But the sons of Israel did not strike them[a], because the leaders of the congregation had sworn to them by Yahweh, the God of Israel[c][b]. And all the congregation grumbled against the leaders.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites.' The Hebrew reads 'the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'did not attack them' or 'did not kill them.' The Hebrew verb can denote striking with lethal force depending on context.
    reason: lexical_alternative
  - marker: c
    text: Or 'all the assembly murmured against the leaders.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִכּוּם
  chosen: strike them down
  alternatives:
  - attack them
  - kill them
  lexicon: HALOT
  rationale: The verb נכה commonly means 'strike, smite,' and in military/judicial contexts can imply killing. Here the context is Israel refraining from violent action against the Gibeonites; 'strike them down' preserves the concrete force without over-specifying the outcome as necessarily 'kill.'
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the people of Israel
  lexicon: HALOT
  rationale: A formally transparent rendering of the Hebrew idiom. Because the source is explicitly 'sons of,' this keeps the wording gender-accurate per project philosophy while remaining natural enough in context.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason Israel did not attack them. 'Because' is clearer in modern English than the more formal 'for.'
- source_word: נִשְׁבְּעוּ לָהֶם
  chosen: had sworn to them
  alternatives:
  - swore to them
  - had taken an oath to them
  lexicon: HALOT
  rationale: The Niphal of שׁבע means 'swear, take an oath.' English past perfect fits the narrative sequence, since the oath preceded the present refusal to attack.
- source_word: נְשִׂיאֵי הָעֵדָה
  chosen: the leaders of the congregation
  alternatives:
  - the chiefs of the assembly
  - the princes of the congregation
  lexicon: HALOT
  rationale: נְשִׂיאִים denotes recognized leaders or chiefs. 'Leaders' is clear modern English. עֵדָה is rendered 'congregation' here to reflect the covenant community gathered as a body, while remaining understandable.
- source_word: בַּיהוָה
  chosen: by the LORD
  alternatives:
  - in the LORD
  - by Yahweh
  lexicon: HALOT
  rationale: With שׁבע, the preposition marks the one by whom the oath is sworn. Per doctrine, יְהוָה is rendered 'the LORD,' not transliterated.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Standard construct phrase identifying the covenant God; straightforwardly rendered.
- source_word: וַיִּלֹּנוּ
  chosen: grumbled
  alternatives:
  - murmured
  - complained
  lexicon: HALOT
  rationale: לון in this stem often denotes communal murmuring or grumbling against leaders, especially in wilderness narratives. 'Grumbled' captures both the collective dissatisfaction and the biblical resonance better than the flatter 'complained.'
- source_word: כָל הָעֵדָה
  chosen: all the congregation
  alternatives:
  - the whole congregation
  - all the assembly
  lexicon: HALOT
  rationale: Retains the collective force of כָל with עֵדָה and matches the earlier rendering for consistency.
- source_word: עַל הַנְּשִׂיאִים
  chosen: against the leaders
  alternatives:
  - about the leaders
  - against the chiefs
  lexicon: HALOT
  rationale: עַל after לון marks the object of complaint. 'Against the leaders' best reflects the adversative sense in context.
