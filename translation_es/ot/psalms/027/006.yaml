    unchanged: false
    changes_summary: Changed 'sacrifice' to 'offer' for more natural English with the object 'sacrifices,' while preserving the Hebrew sense. No other changes needed.
translation:
  language: es
  text: Y ahora mi cabeza se alzará por encima de mis enemigos que me rodean, y ofreceré en su tienda[a] sacrificios de júbilo[b]; cantaré, sí, haré música a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «en su tienda»; el posesivo se refiere de la manera más natural a Yahvé.'
    reason: alternative_reading
  - marker: b
    text: 'O: «sacrificios con gritos de júbilo». La frase hebrea puede destacar ya sea el carácter de los sacrificios o la aclamación que los acompaña.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  - Y ahora bien
  lexicon: HALOT
  rationale: Conserva la fuerza conectiva de la conjunción ו más el valor temporal de עַתָּה, introduciendo un giro presente/en curso de la situación.
- source_word: יָרוּם רֹאשִׁי
  english_pob_choice: my head will be lifted up
  chosen_spanish: se levantará mi cabeza
  alternatives_spanish:
  - será levantada mi cabeza
  - mi cabeza se alzará
  lexicon: HALOT
  rationale: En español, una construcción activa/reflexiva resulta más natural que el pasivo literal, pero conserva la imagen de exaltación/honor de 'cabeza'.
- source_word: עַל אֹיְבַי סְבִיבוֹתַי
  english_pob_choice: above my enemies around me
  chosen_spanish: sobre mis enemigos alrededor de mí
  alternatives_spanish:
  - por encima de mis enemigos que me rodean
  - sobre mis enemigos que me cercan
  lexicon: HALOT
  rationale: Mantiene tanto la idea de superioridad ('sobre') como la de cercanía envolvente ('alrededor de mí') sin añadir interpretación ajena al texto.
- source_word: וְאֶזְבְּחָה
  english_pob_choice: and I will offer
  chosen_spanish: y ofreceré
  alternatives_spanish:
  - y sacrificaré
  - y presentaré
  lexicon: HALOT
  rationale: En español, 'ofrecer' con 'sacrificios' suena más natural y sigue la corrección auditada de la versión inglesa; evita una repetición dura sin perder el sentido cultual.
- source_word: בְאָהֳלוֹ
  english_pob_choice: in his tent
  chosen_spanish: en su tienda
  alternatives_spanish:
  - en su tabernáculo
  - en su tienda del santuario
  lexicon: HALOT
  rationale: '''Tienda'' reproduce con transparencia la imaginería del hebreo y evita imponer una terminología eclesiástica posterior; el posesivo permanece ambiguo como en la fuente, aunque el contexto favorece referirlo a Yahvé.'
- source_word: זִבְחֵי תְרוּעָה
  english_pob_choice: sacrifices of joyful shouting
  chosen_spanish: sacrificios de aclamación gozosa
  alternatives_spanish:
  - sacrificios con gritos de gozo
  - sacrificios de júbilo
  lexicon: HALOT
  rationale: '''תרועה'' puede denotar grito, aclamación o clamor jubiloso; ''aclamación gozosa'' preserva el componente audible y celebrativo sin reducirlo a una sola matiz.'
- source_word: אָשִׁירָה
  english_pob_choice: I will sing
  chosen_spanish: cantaré
  alternatives_spanish:
  - cantaré con gozo
  - cantaré alabanzas
  lexicon: HALOT
  rationale: Corresponde de forma directa al verbo hebreo y encaja con el paralelismo poético de la línea siguiente.
- source_word: וַאֲזַמְּרָה
  english_pob_choice: yes, I will make music
  chosen_spanish: sí, entonaré salmos
  alternatives_spanish:
  - sí, haré música
  - sí, cantaré alabanzas
  lexicon: HALOT
  rationale: '''זמר'' suele implicar cantar con música/acompañamiento; ''entonar salmos'' conserva el matiz de canto cultual. El ''sí'' refleja el énfasis escalonado del hebreo y de la auditoría inglesa.'
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - al Yahvé
  lexicon: HALOT
  rationale: 'Sigue el estándar del proyecto para יהוה en español: ''Yahvé''. En este contexto de alabanza cultual, la preposición ''a'' funciona naturalmente en español.'
theological_decisions:
- issue: Nombre divino יהוה / YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el Tetragrámaton y el proyecto pide preservarlo como nombre propio. 'Yahvé' sigue el estándar español del proyecto, sin ocultarlo tras una sustitución reverencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Referente del posesivo en בְאָהֳלוֹ
  english_pob_reading: his tent = the LORD's tent
  chosen_spanish_reading: su tienda = la tienda de Yahvé
  alternative_spanish_readings:
  - su tienda = la tienda del salmista
  - su tienda = su propio campamento
  rationale: La traducción conserva el posesivo sin resolverlo en el texto principal, pero el contexto inmediato de sacrificio y alabanza favorece entender que se trata de la tienda/santuario de Yahvé. La nota puede explicitar esa lectura sin borrar la ambigüedad legítima.
  doctrine_reference: 'DOCTRINE.md: Pronoun reference and sanctuary language in Psalms'
translation_notes:
  revision_awareness: La base inglesa fue revisada de «I will sacrifice» a «I will offer» para hacer más natural la relación con «sacrifices». También se mantuvo la decisión de traducir el Tetragrámaton como nombre propio y no como una sustitución reverencial. La versión española sigue esa línea revisada y conserva la ambigüedad del posesivo en בְאָהֳלוֹ con una nota explicativa.
  spanish_consistency_notes:
  - He usado 'Yahvé' de manera consistente para יהוה, conforme al estándar del proyecto.
  - He preferido 'tienda' frente a 'tabernáculo' por transparencia léxica y fidelidad a la imaginería hebrea.
  - '''Aclamación gozosa'' mantiene el campo semántico de תרועה sin forzar una interpretación litúrgica cerrada.'
  - '''Entonaré salmos'' conserva el matiz musical/cultual de אזמרה dentro de un español natural.'
