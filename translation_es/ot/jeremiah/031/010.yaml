base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/031/010.yaml
  text: Hear the word of Yahweh[a], O nations, and declare it in the distant coastlands; say[b], “He who scattered Israel will gather him and keep him as a shepherd keeps his flock.”
  footnotes:
  - marker: a
    text: Or “in the distant islands”; the Hebrew term can refer broadly to far-off maritime lands or coastlands.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “will gather him … will keep him,” with “him” referring to Israel as a collective singular.
    reason: lexical_alternative
