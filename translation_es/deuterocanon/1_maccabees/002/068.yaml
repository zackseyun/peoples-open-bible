translation:
  language: es
  text: Den a las naciones su recompensa[a], y presten atención a los mandatos de la ley.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Den a los gentiles su recompensa». El griego usa una expresión cognada; literalmente, «devuelvan devolución/repago», para dar énfasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνταποδίδοτε
  english_pob_choice: Repay
  chosen_spanish: Pagad
  alternatives_spanish:
  - Repagad
  - Devolved
  lexicon: LSJ
  rationale: Es un imperativo plural de ἀνταποδίδωμι con fuerza de devolver en correspondencia. En español, «pagad» conserva la idea de dar en respuesta y funciona de modo natural en un mandato colectivo; «repagad» suena menos idiomático, y «devolved» debilita el matiz de correspondencia.
- source_word: ἀνταπόδομα
  english_pob_choice: recompense
  chosen_spanish: retribución
  alternatives_spanish:
  - recompensa
  - requerimiento
  lexicon: LSJ
  rationale: El sustantivo cognado intensifica la idea de devolución recíproca. «Retribución» mantiene el peso formal y la correspondencia del griego sin añadir por sí misma una interpretación más dura que «recompensa»; esta última puede sonar demasiado positiva en español.
- source_word: τοῖς ἔθνεσιν
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los gentiles
  - los pueblos
  lexicon: LSJ
  rationale: En este contexto de lucha nacional, «las naciones» conserva el sentido geopolítico amplio del griego y evita restringir innecesariamente el referente a un uso específicamente neotestamentario de «gentiles».
- source_word: προσέχετε
  english_pob_choice: pay attention to
  chosen_spanish: estad atentos a
  alternatives_spanish:
  - prestad atención a
  - fijaos en
  lexicon: LSJ
  rationale: El imperativo plural pide atención cuidadosa y vigilancia. «Estad atentos a» comunica ese sentido de atención continua con un registro digno y claro; «prestad atención a» es también posible, pero ligeramente más explicativo.
- source_word: προστάγματα
  english_pob_choice: commands
  chosen_spanish: preceptos
  alternatives_spanish:
  - mandamientos
  - mandatos
  - ordenanzas
  lexicon: LSJ
  rationale: προστάγματα son órdenes, disposiciones o mandatos. «Preceptos» mantiene un tono bíblico sobrio y abarca la idea normativa sin sonar tan institucional como «ordenanzas»; «mandamientos» podría sugerir un eco más tradicional que el griego no exige.
- source_word: τοῦ νόμου
  english_pob_choice: of the law
  chosen_spanish: de la ley
  alternatives_spanish:
  - de la Ley
  - de la Torá
  lexicon: LSJ
  rationale: νόμος aquí se refiere a la ley judía/covenantal. «Ley» es claro y fiel; no se capitaliza porque el español bíblico moderno no lo requiere para expresar esa referencia contextual, y «Torá» sería más técnico de lo necesario en el texto principal.
theological_decisions:
- issue: Si ἀνταπόδομα debe sonar más punitivo o más neutral en español
  english_pob_reading: recompense
  chosen_spanish_reading: retribución
  alternative_spanish_readings:
  - recompensa
  - repago
  - requital
  rationale: El contexto es exhortativo y de conflicto, pero el audit trail inglés corrigió «retribution» hacia «recompense» para no cargar demasiado el sentido. «Retribución» conserva la relación de correspondencia del cognado sin forzar una lectura excesivamente punitiva; evita también «recompensa», que en español puede sonar meritoria o positiva.
  doctrine_reference: 'Translation philosophy: optimal-equivalence; preservar la gravedad del texto sin sobredeterminarla.'
- issue: Si τοῖς ἔθνεσιν debe limitarse a 'gentiles' o mantenerse como referencia amplia a pueblos/naciones
  english_pob_reading: the nations
  chosen_spanish_reading: las naciones
  alternative_spanish_readings:
  - los gentiles
  - los pueblos
  rationale: El griego puede referirse a no judíos, pero aquí el marco es político-militar. «Las naciones» conserva la amplitud del término y no introduce una categoría más estrecha que la del texto fuente.
  doctrine_reference: 'Translation philosophy: primacía del original, con claridad contextual.'
translation_notes:
  revision_awareness: Tomé en cuenta la revisión inglesa que movió ἀνταπόδομα de «retribution» a «recompense» para evitar una carga punitiva excesiva. En español, «retribución» conserva el paralelismo cognado y la formalidad, pero se entiende aquí como devolución correspondiente, no como castigo añadido. También mantuve «las naciones» siguiendo el audit trail inglés y el contexto nacional del pasaje.
  spanish_consistency_notes:
  - Usé «Yahvé» como forma estándar cuando no aparece el tetragrámaton en este versículo, por lo que no fue necesario insertarlo aquí.
  - 'Mantuve terminología sobria y bíblica: «ley», «preceptos», «naciones», evitando reemplazos tradicionales no requeridos por el griego.'
  - No usé «Cristo» ni otros términos cristológicos porque el versículo no los contiene.
