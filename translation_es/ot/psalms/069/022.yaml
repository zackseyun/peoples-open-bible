translation:
  language: es
  text: Me dieron veneno[a] para mi comida, y para mi sed me dieron a beber vinagre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hiel». El hebreo רֹאשׁ aquí se refiere a una sustancia venenosa o amarga; «hiel» es la traducción tradicional.
    reason: lexical_alternative
  - marker: b
    text: O «vino agrio». El hebreo חֹמֶץ puede denotar vino agrio o vinagre.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְּנוּ
  english_pob_choice: They gave
  chosen_spanish: Les dieron
  alternatives_spanish:
  - me dieron
  - dieron
  lexicon: HALOT
  rationale: El verbo נתן en este contexto expresa la acción de dar/entregar. En español, «les dieron» conserva la forma narrativa simple y respeta el paralelismo del hebreo sin calcar el orden inglés.
- source_word: בְּבָרוּתִי
  english_pob_choice: for my food
  chosen_spanish: para mi comida
  alternatives_spanish:
  - en mi comida
  - para mi alimento
  - para mi alimento/comida
  lexicon: HALOT
  rationale: La expresión nombra el ámbito de la comida o sustento. «Para mi comida» es natural en español y refleja la idea de algo puesto como alimento, sin forzar un giro demasiado literal.
- source_word: רֹאשׁ
  english_pob_choice: poison
  chosen_spanish: veneno
  alternatives_spanish:
  - hiel
  - gall
  - veneno amargo
  lexicon: HALOT
  rationale: En poesía hebrea רֹאשׁ puede designar una sustancia amarga o tóxica. «Veneno» comunica mejor ese valor semántico que una traducción tradicional como «hiel», que en español puede sugerir bilis más que toxicidad. Mantengo la nota para la alternativa tradicional por su peso intertextual.
- source_word: וְלִצְמָאִי
  english_pob_choice: and for my thirst
  chosen_spanish: y para mi sed
  alternatives_spanish:
  - y en mi sed
  - y cuando tenía sed
  lexicon: HALOT
  rationale: La preposición con צָמָא se entiende de modo natural como referencia a la condición de sed. «Para mi sed» conserva el paralelismo con la primera cola y su valor circunstancial.
- source_word: יַשְׁקוּנִי
  english_pob_choice: they gave me ... to drink
  chosen_spanish: me dieron a beber
  alternatives_spanish:
  - me hicieron beber
  - me dieron de beber
  lexicon: HALOT
  rationale: El hiphil de שקה significa causar a beber o dar de beber. «Me dieron a beber» mantiene la acción verbal sin perder el sentido idiomático; es una solución más sobria que «me hicieron beber».
- source_word: חֹמֶץ
  english_pob_choice: vinegar
  chosen_spanish: vinagre
  alternatives_spanish:
  - vino agrio
  - vino avinagrado
  lexicon: HALOT
  rationale: חֹמֶץ puede significar vinagre o vino agrio. «Vinagre» es la equivalencia amplia y comprensible en español, mientras que «vino agrio» queda como alternativa relevante por su matiz histórico y su resonancia intertextual.
theological_decisions:
- issue: Tensión intertextual con los relatos de la pasión
  english_pob_reading: Translate according to the Hebrew psalm's own lexical sense without importing New Testament wording into the main text.
  chosen_spanish_reading: Traducir según el sentido léxico del hebreo de Salmo 69, sin introducir en el texto principal el lenguaje tradicional de los evangelios.
  alternative_spanish_readings:
  - usar «hiel» para רֹאשׁ
  - usar «vino agrio» para חֹמֶץ
  rationale: La prioridad del texto fuente exige reflejar el salmo en sus propios términos. Sin embargo, se conserva en nota la alternativa tradicional y la posibilidad de lectura intertextual, porque esa tensión forma parte de la recepción bíblica del verso.
  doctrine_reference: Translation philosophy §1, §3
- issue: Valor semántico de רֹאשׁ en un contexto poético
  english_pob_reading: '''Poison'' best captures the Hebrew sense here without importing the more tradition-bound ''gall.'''
  chosen_spanish_reading: «Veneno» comunica el valor tóxico o amargo del término sin depender de una equivalencia eclesiástica fija.
  alternative_spanish_readings:
  - hiel
  - gall
  - amargura
  rationale: La palabra hebrea no obliga a una sola sustancia fisiológica; puede designar algo amargo o dañino. «Veneno» preserva esa fuerza semántica y evita estrechar el sentido a bilis o hiel.
  doctrine_reference: HALOT; translation philosophy §1
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente que buscó una sintaxis más directa y natural, manteniendo los dos miembros paralelos del hebreo. También conserva la decisión revisada de no forzar una lectura tradicional en el texto principal, pero sí documentarla en nota cuando aporta valor histórico e intertextual.
  spanish_consistency_notes:
  - Se mantiene «para mi comida» para reflejar el valor de sustento/alimento sin cargar la frase con una literalidad extraña.
  - Se usa «veneno» en el cuerpo y se documenta «hiel» en nota para preservar la tensión léxica del hebreo y su recepción tradicional.
  - Se usa «me dieron a beber» para reflejar el hiphil de שקה de forma natural en español.
  - Se usa «vinagre» como término amplio y comprensible, con «vino agrio» en nota por su matiz semántico e intertextual.
