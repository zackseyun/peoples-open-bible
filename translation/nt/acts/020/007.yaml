  from: Paul was speaking with them, since he was about to depart the next day, and he prolonged the message until midnight.
  to: Paul was speaking with them and prolonged the message until midnight, since he was about to depart the next day.
  rationale: The current syntax places the causal clause ('since he was about to depart...') between the two main actions ('was speaking' and 'prolonged'). This is slightly awkward and obscures the fact that the impending departure is the specific reason for the *prolongation* of the speech. Moving the causal clause to the end of the sentence clarifies this logical connection, which is inherent in the Greek structure where the participle 'μέλλων' provides the context for the verb 'παρέτεινεν'.
