translation:
  language: es
  text: Anduvo en todo el camino que había andado su padre, y sirvió a los ídolos[a] que su padre había servido, y se postró ante ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo גִּלֻּלִים es un término despectivo para ídolos; también puede rendirse como ‘ídolos de estiércol’ o ‘ídolos detestables’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: He walked
  chosen_spanish: Anduvo
  alternatives_spanish:
  - Fue
  - Caminó
  - Siguió
  lexicon: HALOT
  rationale: הלך puede significar ir, andar o caminar. En la construcción idiomática ‘en todo el camino’, ‘anduvo’ conserva la imagen de conducta o manera de vivir, en paralelo con el inglés POB ‘walked’, y suena natural en español bíblico actual.
- source_word: בְּכָל הַדֶּרֶךְ אֲשֶׁר
  english_pob_choice: in all the way that
  chosen_spanish: en todo el camino que
  alternatives_spanish:
  - en toda la senda que
  - en cada camino que
  - en todo el modo en que
  lexicon: HALOT
  rationale: La frase hebrea es idiomática para conducta o forma de proceder. ‘En todo el camino que’ mantiene el sustantivo singular ‘camino’ y reproduce la relación relativa con claridad en español.
- source_word: אָבִיו
  english_pob_choice: his father
  chosen_spanish: su padre
  alternatives_spanish:
  - su padre
  lexicon: HALOT
  rationale: 'Referencia filial directa y repetida. Se conserva la repetición del hebreo para mantener el énfasis comparativo: el hijo siguió exactamente el patrón del padre.'
- source_word: וַיַּעֲבֹד
  english_pob_choice: he served
  chosen_spanish: sirvió
  alternatives_spanish:
  - adoró
  - prestó culto a
  lexicon: HALOT
  rationale: עבד conserva el valor general de ‘servir’; en contexto cultual refiere devoción a ídolos. ‘Sirvió’ mantiene la distinción lexical respecto de ‘se postró’ y evita fusionar dos actos distintos.
- source_word: הַגִּלֻּלִים
  english_pob_choice: the idols
  chosen_spanish: los ídolos
  alternatives_spanish:
  - los ídolos despreciables
  - los ídolos-desecho
  - los ídolos inmundos
  lexicon: HALOT
  rationale: גִּלֻּלִים es un término despectivo para ídolos. La traducción principal ‘ídolos’ es la más clara y fiel para el lector moderno; el matiz peyorativo se conserva en nota, como hace el POB en inglés.
- source_word: וַיִּשְׁתַּחוּ לָהֶם
  english_pob_choice: and bowed down to them
  chosen_spanish: y se postró ante ellos
  alternatives_spanish:
  - y se inclinó ante ellos
  - y los adoró
  - y se prosternó ante ellos
  lexicon: HALOT
  rationale: El verbo indica postración o inclinación reverente. ‘Se postró ante ellos’ preserva la acción física sin convertirla en un simple equivalente culto como ‘adoró’, que podría duplicar ‘sirvió’.
theological_decisions:
- issue: Término despectivo גִּלֻּלִים para objetos de idolatría
  english_pob_reading: the idols
  chosen_spanish_reading: los ídolos
  alternative_spanish_readings:
  - los ídolos despreciables
  - ídolos de estiércol
  - los ídolos abominables
  rationale: El hebreo contiene una carga de desprecio que el inglés POB señala en nota. En el texto principal, ‘los ídolos’ comunica el referente de manera precisa y legible; la nota preserva la tensión semántica sin sobrecargar el verso.
  doctrine_reference: Translation philosophy §6; consistency of key terms
translation_notes:
  revision_awareness: 'El texto sigue el estado final del audit trail inglés: no hubo revisiones aplicadas y el revisor de control cruzado marcó alta concordancia; por eso no se introducen cambios interpretativos adicionales ni se suaviza el paralelo triple del hebreo.'
  spanish_consistency_notes:
  - 'Se mantiene la tripleta verbal hebrea: anduvo / sirvió / se postró.'
  - ‘Ídolos’ se usa como término base consistente para גִּלֻּלִים, con nota para el matiz peyorativo.
  - ‘Ante ellos’ refleja el complemento dativo plural sin añadir elementos interpretativos.
  - Se evita ‘adoró’ para no confundir la postración con el servicio cultual previo.
