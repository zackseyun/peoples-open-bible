translation:
  language: es
  text: La podredumbre y los gusanos lo heredarán, y un alma temeraria[a] será quitada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un alma atrevida» o «una persona presumida»; el adjetivo griego puede tener un matiz negativo de audacia imprudente en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: σήπη
  english_pob_choice: rot
  chosen_spanish: podredumbre
  alternatives_spanish:
  - corrupción
  - descomposición
  lexicon: LSJ
  rationale: σήπη expresa rottenness/decay. En español, «podredumbre» comunica bien la corrupción física con un tono sobrio y claro, equivalente al valor imagístico del texto.
- source_word: σκώληκες
  english_pob_choice: worms
  chosen_spanish: gusanos
  alternatives_spanish:
  - lombrices
  - larvas
  lexicon: LSJ
  rationale: El plural se refiere de manera amplia a criaturas asociadas con la descomposición. «Gusanos» es el término general más natural en español y evita precisar demasiado la especie.
- source_word: κληρονομήσουσιν
  english_pob_choice: will inherit
  chosen_spanish: heredarán
  alternatives_spanish:
  - poseerán
  - tomarán como herencia
  lexicon: LSJ
  rationale: «Heredarán» conserva la metáfora fuerte de posesión/recepción como herencia y refleja el verbo griego sin diluir su extrañeza retórica.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a ese hombre
  - a él
  lexicon: Greek grammar
  rationale: El pronombre masculino singular se expresa de forma directa con «lo», manteniendo la referencia personal y singular del griego.
- source_word: ψυχὴ
  english_pob_choice: soul
  chosen_spanish: alma
  alternatives_spanish:
  - vida
  - persona
  lexicon: LSJ
  rationale: «Alma» preserva el peso antropológico y moral de ψυχή. «Vida» o «persona» suavizarían el alcance del contraste final.
- source_word: τολμηρὰ
  english_pob_choice: reckless
  chosen_spanish: temeraria
  alternatives_spanish:
  - atrevida
  - osada
  - presumida
  lexicon: LSJ
  rationale: El adjetivo puede ser positivo o negativo, pero aquí el contexto lo vuelve moralmente desfavorable. «Temeraria» expresa bien la audacia imprudente sin perder naturalidad en español.
- source_word: ἐξαρθήσεται
  english_pob_choice: will be taken away
  chosen_spanish: será quitada
  alternatives_spanish:
  - será removida
  - será arrebatada
  - será llevada
  lexicon: LSJ
  rationale: El futuro pasivo comunica ser apartada/eliminada. «Será quitada» es claro y natural en español, y mantiene la idea general de remoción sin forzar un mecanismo específico.
theological_decisions:
- issue: Valor moral de τολμηρά en ψυχὴ τολμηρά
  english_pob_reading: a reckless soul
  chosen_spanish_reading: un alma temeraria
  alternative_spanish_readings:
  - un alma atrevida
  - un alma osada
  - una persona presumida
  rationale: Se conserva la lectura negativa documentada en el audit trail, evitando una traducción elogiosa que desharía la advertencia sapiencial del contexto.
  doctrine_reference: Preservar la tensión léxica y moral del pasaje; no neutralizar el juicio implícito.
translation_notes:
  revision_awareness: El texto inglés de referencia pasó de «bold soul» a «reckless soul» en una revisión posterior para reflejar mejor τολμηρά en contexto. La versión española sigue esa revisión y evita una lectura elogiosa.
  spanish_consistency_notes:
  - «Yahvé» no aparece en este versículo.
  - Se mantiene «alma» para ψυχή, conforme al peso antropológico del griego.
  - «Heredarán» conserva la metáfora de posesión hereditaria del verbo griego.
  - El par «podredumbre... gusanos» reproduce la imagen de corrupción corporal sin ampliar el sentido más allá del original.
