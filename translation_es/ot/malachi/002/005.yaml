  text: בְּרִיתִ֣/י הָיְתָ֣ה אִתּ֗/וֹ הַֽ/חַיִּים֙ וְ/הַ֨/שָּׁל֔וֹם וָ/אֶתְּנֵֽ/ם ל֥/וֹ מוֹרָ֖א וַ/יִּֽירָאֵ֑/נִי וּ/מִ/פְּנֵ֥י שְׁמִ֖/י נִחַ֥ת הֽוּא׀־׃
base_translation:
  language: en
  yaml_path: translation/ot/malachi/002/005.yaml
  text: My covenant with him was one of life and peace[a], and I gave them to him; this called for reverence, and he revered me[b], and he stood in awe before my name.
  footnotes:
  - marker: a
    text: Or 'for fear' or 'for reverence'; the Hebrew syntax after 'I gave them to him' is compressed.
    reason: lexical_alternative
  - marker: b
    text: Or 'he was humbled,' 'he trembled,' or 'he was dismayed' before my name.
    reason: lexical_alternative
