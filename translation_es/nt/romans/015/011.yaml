translation:
  language: es
  text: 'Y otra vez: «Alaben al Señor[a], todas las naciones[b], y alábenlo todos los pueblos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «alaben a Yahvé», reflejando la fuente hebrea de la cita, donde el nombre divino aparece representado en griego por κύριος («Señor»).
    reason: alternative_reading
  - marker: b
    text: O «todos los gentiles». El griego ἔθνη puede significar «naciones» o «gentiles»; aquí la cita tiene un sentido universal y, al mismo tiempo, encaja con el argumento de Pablo acerca de los gentiles.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ πάλιν
  english_pob_choice: And again
  chosen_spanish: Y otra vez
  alternatives_spanish:
  - Y de nuevo
  - Y otra vez, además
  lexicon: BDAG
  rationale: La fórmula introduce otra cita bíblica dentro de la cadena de pruebas. En español, «Y otra vez» conserva el enlace discursivo de καὶ πάλιν sin sonar forzado.
- source_word: Αἰνεῖτε
  english_pob_choice: Praise
  chosen_spanish: Alaben
  alternatives_spanish:
  - Den alabanza a
  - Exalten
  lexicon: BDAG
  rationale: El imperativo plural se expresa naturalmente en español con «Alaben», que conserva el tono exhortativo y la fuerza directa de la cita.
- source_word: πάντα τὰ ἔθνη
  english_pob_choice: all the nations
  chosen_spanish: todas las naciones
  alternatives_spanish:
  - todos los gentiles
  - todos los pueblos
  lexicon: BDAG
  rationale: ἔθνη puede significar «naciones» o «gentiles». En esta cita el sentido es universal y colectivo; «naciones» mantiene esa amplitud y el paralelo con λαοί. Se preserva «gentiles» como alternativa interpretativa.
- source_word: τὸν κύριον
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el SEÑOR
  - el Maestro
  lexicon: BDAG
  rationale: κύριος se traduce aquí con el valor doctrinal normal «Señor». Aunque la cita del Antiguo Testamento remite a Yahvé, el griego de la cita tiene κύριον, y en una cita del Nuevo Testamento «Señor» es la forma más directa y transparente.
- source_word: ἐπαινεσάτωσαν
  english_pob_choice: let ... praise
  chosen_spanish: alábenlo
  alternatives_spanish:
  - que lo alaben
  - que lo ensalcen
  lexicon: BDAG
  rationale: El aoristo imperativo de tercera persona plural se vierte de modo natural como exhortación impersonal en español. «Alábenlo» mantiene la fuerza de mandato sin añadir perífrasis innecesaria.
- source_word: αὐτὸν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  - al Señor
  lexicon: BDAG
  rationale: El pronombre retoma a «el Señor». En español, «lo» es la forma más natural para conservar el referente y evitar repetición.
- source_word: πάντες οἱ λαοί
  english_pob_choice: all the peoples
  chosen_spanish: todos los pueblos
  alternatives_spanish:
  - todas las gentes
  - todos los pueblos de la tierra
  lexicon: BDAG
  rationale: λαοί se distingue de ἔθνη; «pueblos» preserva ese paralelismo lexical y evita aplanar ambos términos en una sola palabra.
theological_decisions:
- issue: Uso de «Señor» en una cita del Antiguo Testamento donde κύριος representa el nombre divino
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el SEÑOR
  - Yahvé
  rationale: Se mantiene la convención POB para κύριος en el texto principal, dado que el griego de la cita presenta ese término. La referencia al nombre divino hebreo se conserva como trasfondo interpretativo, no como sustitución gráfica en el versículo principal.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord; יְהוָה → the LORD'
- issue: Diferencia entre ἔθνη y λαοί en la cita
  english_pob_reading: all the nations ... all the peoples
  chosen_spanish_reading: todas las naciones ... todos los pueblos
  alternative_spanish_readings:
  - todos los gentiles ... todas las gentes
  - todos los pueblos ... todos los pueblos
  rationale: Se conserva la distinción entre los dos sustantivos griegos. «Naciones» para ἔθνη y «pueblos» para λαοί reflejan mejor la paralelidad del texto y la amplitud universal de la alabanza.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el estado revisado más reciente del expediente inglés: no hay cambios aplicados, y la revisión final fue confirmada como estable y de alta concordancia. La redacción española conserva las dos tensiones documentadas en el archivo inglés: ἔθνη/λαοί y κύριος como cita del texto griego de la Escritura.'
  spanish_consistency_notes:
  - Se mantiene el paralelismo entre «naciones» y «pueblos» para reflejar ἔθνη y λαοί.
  - Se usa «Señor» en el texto principal y se reserva «SEÑOR» para la nota textual/alternativa.
  - 'El imperativo plural se conserva con verbos en plural: «Alaben» y «alábenlo».'
  - La puntuación reproduce la función introductoria de καὶ πάλιν con dos puntos y comillas de cita.
