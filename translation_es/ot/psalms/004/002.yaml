translation:
  language: es
  text: Cuando llamo[a], respóndeme, oh Dios de mi justicia. En la angustia me has dado espacio[b]. Muéstrame tu favor y oye mi oración.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Cuando clamo»; el hebreo literalmente dice «cuando llamo».'
    reason: alternative_reading
  - marker: b
    text: 'O: «me has aliviado»; la imagen hebrea es espacial: «me has dado espacio» frente a la angustia o estrechez.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּקָרְאִי
  english_pob_choice: When I call
  chosen_spanish: Cuando te llamo
  alternatives_spanish:
  - Cuando clamo
  - Al llamarte
  lexicon: HALOT
  rationale: El valor temporal del prefijo ב con el infinitivo constructo y sufijo de 1.ª persona se expresa naturalmente en español con 'cuando'. 'Llamo' sigue de cerca קרא en contexto de oración; 'clamo' sería posible, pero introduce un matiz más emotivo que el hebreo no exige.
- source_word: עֲנֵנִי
  english_pob_choice: answer me
  chosen_spanish: respóndeme
  alternatives_spanish:
  - contéstame
  - óyeme
  lexicon: HALOT
  rationale: ענה en este contexto de oración significa 'responder'. 'Respóndeme' mantiene la forma directa y natural en español. 'Óyeme' se acerca al verso final y no distingue bien la respuesta solicitada aquí.
- source_word: אֱלֹהֵי צִדְקִי
  english_pob_choice: O God of my righteousness
  chosen_spanish: oh Dios de mi justicia
  alternatives_spanish:
  - oh mi Dios justo
  - oh Dios que me vindica
  lexicon: HALOT
  rationale: La cadena constructa se conserva como 'Dios de mi justicia', que es la forma más cercana al hebreo. 'Mi justicia' puede entenderse como justicia que me pertenece, que proviene de Dios, o como mi vindicación; se preserva así la tensión semántica documentada por el POB inglés sin resolverla interpretativamente.
- source_word: בַּצָּר
  english_pob_choice: In distress
  chosen_spanish: En la angustia
  alternatives_spanish:
  - En la aflicción
  - En la estrechez
  lexicon: HALOT
  rationale: צַר abarca angustia, aflicción o estrechez. 'Angustia' es una opción natural y digna en español bíblico contemporáneo, y conserva la idea de presión o constricción.
- source_word: הִרְחַבְתָּ לִּי
  english_pob_choice: you have made room for me
  chosen_spanish: me has dado espacio
  alternatives_spanish:
  - me has ensanchado
  - me has librado de estrechez
  lexicon: HALOT
  rationale: El verbo רחב en hiphil conserva la imagen espacial de ensanchar o hacer amplio. 'Me has dado espacio' suena natural en español y mantiene la metáfora de pasar de estrechez a amplitud. 'Me has librado de estrechez' explicita el efecto, pero pierde la imagen.
- source_word: חָנֵּנִי
  english_pob_choice: Be gracious to me
  chosen_spanish: Sé bondadoso conmigo
  alternatives_spanish:
  - Ten gracia de mí
  - Sé gracioso conmigo
  lexicon: HALOT
  rationale: חנן expresa favor o gracia. En español, 'sé bondadoso conmigo' comunica la petición de favor de manera comprensible y reverente; 'sé gracioso conmigo' sería poco natural y 'ten gracia de mí' es menos idiomático. Se conserva la dimensión de favor divino, aunque no se fuerza una fórmula tradicional.
- source_word: וּשְׁמַע
  english_pob_choice: and hear
  chosen_spanish: y oye
  alternatives_spanish:
  - y escucha
  - y atiende
  lexicon: HALOT
  rationale: שׁמע en lenguaje de oración implica oír con atención. 'Oye' es conciso y apropiado en español bíblico; 'escucha' y 'atiende' son alternativas válidas pero más marcadas o explicativas.
- source_word: תְּפִלָּתִי
  english_pob_choice: my prayer
  chosen_spanish: mi oración
  alternatives_spanish:
  - mi súplica
  - mi ruego
  lexicon: HALOT
  rationale: תְּפִלָּה es el término común para oración. 'Mi oración' es la equivalencia directa y clara en español.
theological_decisions:
- issue: Sentido de 'Dios de mi justicia'
  english_pob_reading: Retain the formal phrase 'God of my righteousness' in the main text
  chosen_spanish_reading: Conservar 'Dios de mi justicia' en el texto principal
  alternative_spanish_readings:
  - mi Dios justo
  - Dios que me vindica
  rationale: 'La construcción hebrea no obliga a una sola interpretación. Mantener la forma posesiva-presupositiva preserva la ambigüedad teológica: puede referirse a Dios como fuente de la justicia del orante o como quien lo vindica. No se resuelve la tensión con una paráfrasis interpretativa.'
  doctrine_reference: 'Principio POB: preservar tensión teológica y sintáctica cuando el hebreo no la resuelve de manera explícita.'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el consenso de auditoría es alto y se mantiene la solución formal-equivalente con preservación de la metáfora espacial y de la tensión de 'Dios de mi justicia'.
  spanish_consistency_notes:
  - Se usó 'Yahvé' para el nombre divino en el proyecto, pero aquí el hebreo es אֱלֹהֵי, por lo que corresponde 'Dios'.
  - Se evitó 'SEÑOR' por convención de máscara; la referencia explícita es a אֱלֹהִים.
  - Se mantuvo 'justicia' para צִדְקִי, conforme al valor constructo y a la tensión documentada por el POB en inglés.
  - '''Angustia'' conserva el campo semántico de presión/estrechez sin volverlo demasiado abstracto.'
  - '''Me has dado espacio'' preserva la imagen de expansión frente a la opresión, coherente con la nota auditada del inglés POB.'
