revisions:
- from: La sabiduría y el conocimiento te son dados[a], y yo te daré riquezas, posesiones y honor, como no lo ha habido para los reyes que estuvieron antes de ti ni después de ti lo habrá.
  to: La sabiduría y el conocimiento te son dados, y yo te daré riquezas, posesiones y honor, como no los ha tenido ningún rey antes de ti, ni los tendrá después de ti[a].
  rationale: Se ajusta la cláusula comparativa para reflejar con más naturalidad y precisión el hebreo y la decisión del inglés POB, evitando la formulación poco idiomática «para los reyes». También se reemplaza la nota al pie por la alternativa literal documentada en el audit trail, anclándola en la cláusula pertinente. No se requieren cambios de terminología teológica ni léxica principal.
