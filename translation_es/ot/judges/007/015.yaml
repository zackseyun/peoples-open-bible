translation:
  language: es
  text: 'Y cuando Gedeón oyó el relato del sueño y su interpretación[a], se postró en adoración. Luego volvió al campamento de Israel y dijo: «Levántense, porque Yahvé ha entregado el campamento de Madián en sus manos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “el recuento del sueño y su interpretación”.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִסְפַּר הַחֲלוֹם
  english_pob_choice: the telling of the dream
  chosen_spanish: el relato del sueño
  alternatives_spanish:
  - el recuento del sueño
  - la narración del sueño
  - el informe del sueño
  lexicon: HALOT
  rationale: En este giro, מִסְפַּר no expresa solo “número”, sino la manera en que el sueño fue contado o referido. “Relato” comunica bien ese valor narrativo en español sin volverlo pesado ni técnico.
- source_word: שִׁבְרוֹ
  english_pob_choice: its interpretation
  chosen_spanish: su interpretación
  alternatives_spanish:
  - su explicación
  - su sentido
  - su desentrañamiento
  lexicon: HALOT
  rationale: El contexto inmediato trata de la explicación del sueño, no de un “quebrantamiento” literal. “Interpretación” mantiene la decisión auditada en inglés y es la opción más natural y precisa en español.
- source_word: וַיִּשְׁתָּחוּ
  english_pob_choice: he bowed down in worship
  chosen_spanish: se postró en adoración
  alternatives_spanish:
  - se inclinó en adoración
  - se postró
  - se inclinó y adoró
  lexicon: HALOT
  rationale: El verbo puede describir la postración física y, por contexto, un acto de reverencia/adoración. “Se postró en adoración” conserva ambas dimensiones, como en el texto base en inglés.
- source_word: מַחֲנֵה יִשְׂרָאֵל
  english_pob_choice: the camp of Israel
  chosen_spanish: el campamento de Israel
  alternatives_spanish:
  - el campamento israelita
  - el campamento de los israelitas
  lexicon: HALOT
  rationale: “Campamento” es la forma más natural en español para este constructo militar. “Israel” se mantiene sin expansión, siguiendo la concreción del hebreo y la lectura auditada.
- source_word: קוּמוּ
  english_pob_choice: Arise
  chosen_spanish: Levantaos
  alternatives_spanish:
  - Levantaos y marchad
  - Poneos de pie
  - Alzaos
  lexicon: HALOT
  rationale: El imperativo plural convoca a la acción. En español, “Levantaos” preserva el tono formal y exhortativo que el inglés revisado prefirió con “Arise”, evitando una paráfrasis más libre.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: 'Se sigue el principio del proyecto para el Nombre divino: usar la transliteración “Yahvé” en lugar de una sustitución titulada. Esto mantiene la huella del nombre propio revelado en el hebreo.'
- source_word: נָתַן ... בְּיֶדְכֶם
  english_pob_choice: has given ... into your hand
  chosen_spanish: ha entregado ... en vuestra mano
  alternatives_spanish:
  - ha dado ... en vuestra mano
  - ha puesto ... en vuestra mano
  - ha entregado ... en poder de ustedes
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y comunica entrega/cesión efectiva al poder de alguien. “Ha entregado ... en vuestra mano” reproduce bien ese valor en español y sigue de cerca la formulación del audit trail.
- source_word: מַחֲנֵה מִדְיָן
  english_pob_choice: the camp of Midian
  chosen_spanish: el campamento de Madián
  alternatives_spanish:
  - el campamento madianita
  - el ejército de Madián
  lexicon: HALOT
  rationale: El hebreo dice literalmente “campamento”, y el contexto militar ya aporta la fuerza del grupo. “Madián” conserva el nombre propio con la forma usual en español bíblico.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrama. Conforme a la pauta del proyecto y a la lectura auditada en inglés, se preserva el Nombre propio divino con “Yahvé”, evitando una sustitución por título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of Gideon’s response to the dream report
  english_pob_reading: he bowed down in worship
  chosen_spanish_reading: se postró en adoración
  alternative_spanish_readings:
  - se inclinó
  - adoró
  rationale: La escena combina reacción física de reverencia con reconocimiento religioso. La redacción española mantiene esa tensión sin reducirla solo a un gesto corporal ni solo a un acto interior.
  doctrine_reference: HALOT / narrative context in Judges 7:15
translation_notes:
  revision_awareness: 'El borrador español incorpora la revisión auditada del inglés más reciente: se mantiene el registro formal de la orden plural con “Levantaos/Arise” y se conserva la decisión de traducir יְהוָה como el Nombre propio divino. No se detectan otras revisiones textuales relevantes para este versículo.'
  spanish_consistency_notes:
  - Se usa “Yahvé” de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - Se prefiere “campamento” para מַחֲנֶה por consistencia con el contexto militar del relato.
  - “Madián” sigue la forma bíblica usual en español para el gentilicio/topónimo.
  - La segunda persona plural peninsular no se usa; se opta por “vuestra mano” y “Levantaos” dentro de un registro bíblico formal, coherente con el español bíblico neutral de la serie.
