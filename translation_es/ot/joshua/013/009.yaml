translation:
  language: es
  text: desde Aroer, que está a la orilla del valle del Arnón[a], y la ciudad que está en medio del valle, y toda la meseta[b] desde Medeba hasta Dibón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el uadi del Arnón». El hebreo נחל suele referirse a un valle torrentoso o uadi, más que a un río caudaloso permanente.
    reason: lexical_alternative
  - marker: b
    text: O «la meseta alta» / «el altiplano». El hebreo מישור designa una región elevada y relativamente llana; «meseta» fue elegido por claridad topográfica.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵ/עֲרוֹעֵר
  english_pob_choice: from Aroer
  chosen_spanish: desde Aroer
  alternatives_spanish:
  - de Aroer
  - a partir de Aroer
  lexicon: HALOT
  rationale: El prefijo מ indica punto de partida en una lista territorial; en español, «desde» expresa con naturalidad ese inicio de delimitación.
- source_word: שְׂפַת
  english_pob_choice: bank of
  chosen_spanish: a la orilla de
  alternatives_spanish:
  - en la ribera de
  - al borde de
  lexicon: HALOT
  rationale: «שׂפת» es literalmente «labio/orilla/borde». Como el contexto es un נחל, «a la orilla de» conserva la relación topográfica sin sugerir un río permanente.
- source_word: נַחַל אַרְנוֹן
  english_pob_choice: the Arnon Valley
  chosen_spanish: el valle del Arnón
  alternatives_spanish:
  - el uadi del Arnón
  - el valle torrencial del Arnón
  lexicon: HALOT
  rationale: El audit trail inglés eligió «Valley» para evitar una traducción demasiado técnica de נחל como «wadi»; en español, «valle del Arnón» comunica de forma clara y natural el accidente geográfico sin perder la referencia al cauce/valle.
- source_word: וְ/הָ/עִיר
  english_pob_choice: and the city
  chosen_spanish: y la ciudad
  alternatives_spanish:
  - y la urbe
  lexicon: HALOT
  rationale: Se mantiene el sustantivo definido de manera directa; no hay razón contextual para diversificar el término.
- source_word: בְּ/תוֹךְ הַ/נַּחַל
  english_pob_choice: in the middle of the valley
  chosen_spanish: que está en medio del valle
  alternatives_spanish:
  - que está dentro del valle
  - que está en medio del uadi
  lexicon: HALOT
  rationale: «בְּתוֹךְ» expresa interioridad/medio. «En medio del valle» reproduce bien la idea de localización central y suena natural en español.
- source_word: הַ/מִּישֹׁר
  english_pob_choice: the tableland
  chosen_spanish: la meseta
  alternatives_spanish:
  - la llanura alta
  - el altiplano
  lexicon: HALOT
  rationale: El término denota una región elevada y relativamente nivelada. «Meseta» es una equivalencia clara en español para esa topografía; se evita «llanura» por posible pérdida de la idea de elevación.
- source_word: מֵידְבָא
  english_pob_choice: from Medeba
  chosen_spanish: desde Medeba
  alternatives_spanish:
  - de Medeba
  lexicon: HALOT
  rationale: Se conserva la marca de punto de partida del límite territorial con «desde», en paralelo con el inicio del versículo.
- source_word: עַד דִּיבוֹן
  english_pob_choice: to Dibon
  chosen_spanish: hasta Dibón
  alternatives_spanish:
  - a Dibón
  - así como Dibón
  lexicon: HALOT
  rationale: «עַד» marca el término de la extensión geográfica. «Hasta» reproduce de manera precisa el cierre de la delimitación.
translation_notes:
  revision_awareness: 'Se tomó como base la última revisión inglesa: «bank of the Arnon Valley» en lugar de «edge of», manteniendo la precisión topográfica. También se conservó la consistencia del tramo delimitado «from Medeba to Dibon» con una formulación española igualmente territorial.'
  spanish_consistency_notes:
  - Se mantiene el patrón territorial de inicio y fin con «desde ... hasta ...».
  - «Valle del Arnón» se usa de forma consistente para נחל אַרְנוֹן, evitando alternar con «uadi» en el texto principal.
  - Se conserva el nombre propio «Dibón» con acentuación española, mientras «Medeba» queda sin adaptación gráfica por ser la forma usual del topónimo en español bíblico.
