translation:
  language: es
  text: Tus ojos miren de frente, y tus párpados[a] se dirijan delante de ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Tus párpados estén rectos delante de ti». El verbo hebreo también puede expresar más literalmente la idea de rectitud.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵינֶיךָ
  english_pob_choice: your eyes
  chosen_spanish: tus ojos
  alternatives_spanish:
  - tu ojo
  lexicon: HALOT
  rationale: El hebreo usa plural con sufijo de 2ms; en español, el plural 'ojos' conserva la imagen corporal natural y la fuerza idiomática del texto.
- source_word: לְנֹכַח
  english_pob_choice: straight ahead
  chosen_spanish: de frente
  alternatives_spanish:
  - derecho adelante
  - directamente delante
  lexicon: HALOT
  rationale: '''De frente'' expresa de manera natural la dirección recta hacia delante, sin añadir intensidad innecesaria y manteniendo el tono sapiencial de enfoque y rectitud.'
- source_word: יַבִּיטוּ
  english_pob_choice: look
  chosen_spanish: miren
  alternatives_spanish:
  - vean
  - contemplen
  lexicon: HALOT
  rationale: De נבט, 'mirar' / 'observar'. 'Miren' comunica la acción con claridad y en imperativo/jussivo resulta natural en español.
- source_word: וְעַפְעַפֶּיךָ
  english_pob_choice: your eyelids
  chosen_spanish: tus párpados
  alternatives_spanish:
  - tus pestañas
  - tu mirada
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'párpados', en español 'párpados' conserva la concreción del paralelismo poético mejor que una paráfrasis como 'mirada'.
- source_word: יַיְשִׁרוּ
  english_pob_choice: be directed before you
  chosen_spanish: se dirijan
  alternatives_spanish:
  - se mantengan rectos
  - vayan rectos
  lexicon: HALOT
  rationale: De ישר, con sentido de estar/enderezarse rectamente. 'Se dirijan' transmite la orientación hacia delante sin perder la idea de rectitud implícita.
- source_word: נֶגְדֶּךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - frente a ti
  - ante ti
  lexicon: HALOT
  rationale: La expresión indica lo que está delante/opuesto a alguien. 'Delante de ti' es claro, natural y fiel al paralelismo con 'de frente'.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo poético: conserva el paralelismo entre ''ojos'' y ''párpados'' y traduce לְנֹכַח / נֶגְדֶּךָ con dos expresiones españolas que mantienen la imagen de orientación recta hacia delante. Se tomó en cuenta la revisión inglesa que eliminó la repetición de ''let'' y prefirió ''before you'' por cercanía léxica.'
  spanish_consistency_notes:
  - Se evita 'SEÑOR' porque el versículo no contiene el nombre divino.
  - Se mantiene 'párpados' para preservar el paralelismo concreto con 'ojos'.
  - '''De frente'' y ''delante de ti'' se coordinan para reflejar la doble referencia espacial del hebreo sin sobreexplicar.'
