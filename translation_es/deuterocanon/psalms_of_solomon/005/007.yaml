review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido global del griego: aflicción, invocación por ayuda, no rechazo de la petición y fundamento causal en que Dios es su Dios. Sin embargo, en οὐκ ἀποστρέψῃ el griego y el inglés auditado preservan la imagen de ''no apartar/no volver atrás'' más que ''no rechazar'', por lo que conviene ajustar para mayor fidelidad al matiz verbal.'
  spanish_quality_summary: El español es claro, natural y de buen registro bíblico. 'Cuando estemos afligidos' y 'nuestra súplica' funcionan bien. El principal ajuste necesario es sustituir 'no rechazarás' por una formulación que conserve mejor la imagen de 'no apartar' sin sonar forzada; 'no apartarás de nosotros nuestra súplica' sería menos natural, pero 'no apartarás nuestra súplica' tampoco suena ideal. La opción más idiomática y cercana es 'no te apartarás de nuestra súplica', aunque cambia levemente la estructura; mejor aún, 'no apartarás nuestra súplica de ti' mantiene el objeto y la imagen.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. θεός está bien como 'Dios'. No aparecen términos sensibles del glosario principal. La decisión 'súplica' para δέησις está bien alineada con la auditoría inglesa.
  issues:
  - severity: medium
    issue: '''no rechazarás'' atenúa la imagen verbal de οὐκ ἀποστρέψῃ'
    rationale: El verbo griego significa literalmente 'volver aparte/apartar/turn away'. La auditoría inglesa lo conservó como 'you will not turn away'. 'Rechazarás' comunica el resultado pragmático, pero pierde la imaginería relacional que el proyecto quiso mantener.
  - severity: low
    issue: La nota [b] omite 'súplica' frente a las alternativas inglesas documentadas
    rationale: La nota inglesa dice que 'our plea' también puede traducirse 'our supplication' o 'our petition'. En español, como el texto principal ya usa 'súplica', conviene ofrecer alternativas distintas y claras; 'plegaria' es posible, pero 'ruego' se acerca mejor a la urgencia de δέησις.
  revised_spanish_text: Cuando estemos afligidos[a], clamaremos por ayuda, y tú no apartarás nuestra súplica de ti, porque tú eres nuestro Dios.
  revised_footnotes:
  - marker: a
    text: 'O: «En nuestra aflicción, clamaremos a ti por ayuda».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «nuestra petición» o «nuestro ruego».'
    reason: lexical_alternative
  revision_rationale: Se revisa οὐκ ἀποστρέψῃ para preservar mejor la imagen de 'apartar/volver aparte' presente en el griego y mantenida en la auditoría inglesa. El resto del versículo está bien resuelto en español. Se conserva la nota [a]. La nota [b] se ajusta léxicamente; al no anclarse en el texto revisado, debe omitirse para cumplir la disciplina de marcadores.
