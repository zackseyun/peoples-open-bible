review_pass:
  verdict: revise
  source_alignment_summary: El borrador español refleja bien la estructura del encabezado epistolar griego y mantiene correctamente 'lector' para ἀναγνώστῃ frente al paralelo hebreo 'escriba'. También conserva adecuadamente 'saludos' para χαίρειν. Sin embargo, el nombre Ἔσρᾳ corresponde al personaje conocido en el audit trail y en el paralelo como Ezra/Esdras del libro canónico; en este contexto, usar 'Esdras' dentro 1 Esdras puede generar confusión entre el personaje y el título del libro, y se aparta sin necesidad del razonamiento documentado de la POB inglesa.
  spanish_quality_summary: 'El español es claro y natural. La puntuación y la sintaxis son buenas. La única mejora importante es sustituir ''Esdras'' por ''Esdrá'' o preferiblemente ''Ezra'' para evitar ambigüedad y ajustarse mejor al referente personal. Además, puede aligerarse el artículo inicial en estilo epistolar: ''Rey Artajerjes...'' suena algo más cercano a la fórmula de carta, aunque ''El rey Artajerjes...'' no es incorrecto.'
  glossary_alignment: Buen ajuste general con la terminología del proyecto salvo en el nombre personal Ἔσρᾳ, donde conviene seguir el referente personal 'Ezra' en vez de 'Esdras'. La elección 'del Señor' para Κυρίου es aceptable aquí porque el source es griego κύριος y el audit trail inglés lo documenta así; no hay base para imponer 'Yahvé' en el texto principal de este verso.
  issues:
  - severity: medium
    issue: Nombre personal Ἔσρᾳ vertido como 'Esdras'
    rationale: Aunque 'Esdras' existe en uso bíblico español, en 1 Esdras puede confundirse con el título del libro. El audit trail inglés documenta explícitamente la preferencia por el nombre personal 'Ezra' frente a 'Esdras'. En español, 'Ezra' es claro, reconocible y preserva mejor la distinción entre personaje y libro.
  - severity: low
    issue: Artículo inicial 'El rey' en encabezado epistolar
    rationale: El griego epistolar anartro se puede reflejar más limpiamente en español como 'Rey Artajerjes...'. No es un error grave, pero la fórmula sin artículo suena más directa y propia de un encabezado de carta.
  revised_spanish_text: Rey Artajerjes, a Ezra el sacerdote y lector de la ley del Señor[a], saludos.
  revised_footnotes:
  - marker: a
    text: El griego dice “lector de la ley del Señor”; el paralelo hebreo de Esdras 7:12 tiene “escriba de la ley del Dios del cielo”.
    reason: alternative_reading
  revision_rationale: Se ajusta el nombre personal a 'Ezra' para seguir la primacía del referente personal documentada en el audit trail y evitar confusión con el título del libro 'Esdras'. También se pule la fórmula epistolar suprimiendo el artículo inicial, lo que refleja mejor el encabezado griego sin cambiar el sentido. El resto del verso y la nota están bien alineados con la evidencia fuente.
