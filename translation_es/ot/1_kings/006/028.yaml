translation:
  language: es
  text: Y recubrió los querubines con oro[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cubrió los querubines con oro» o «los placó con oro».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַף
  english_pob_choice: overlaid
  chosen_spanish: recubrió
  alternatives_spanish:
  - cubrió
  - forró
  - placó
  lexicon: HALOT
  rationale: En este contexto de acabado del templo, el verbo expresa aplicar una capa de metal sobre una figura u objeto. «Recubrió» comunica bien la idea de cubrir con una capa material sin sonar tan técnico como «placó», y evita la ambigüedad de «cubrió», que puede resultar demasiado general.
- source_word: אֶת
  english_pob_choice: the direct-object marker is untranslated
  chosen_spanish: —
  lexicon: función gramatical
  rationale: El marcador de objeto directo no se traduce en español; su función queda absorbida por el orden y la estructura de la oración.
- source_word: הַכְּרוּבִים
  english_pob_choice: the cherubim
  chosen_spanish: los querubines
  alternatives_spanish:
  - los querubines celestiales
  - los querubes
  lexicon: HALOT
  rationale: «Querubines» conserva el término bíblico establecido para כְּרוּבִים y mantiene el referente sagrado e iconográfico del templo. «Querubes» es posible, pero suena menos preciso en español bíblico moderno; añadir calificativos no está justificado por el hebreo.
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - con oro
  - de oro
  lexicon: HALOT
  rationale: El hebreo nombra el material; en español, «recubrió ... con oro» expresa de forma natural la relación instrumental/material. «De oro» sería más adjetival y menos fiel a la construcción verbal de recubrimiento.
theological_decisions:
- issue: Término angelológico/templeológico כְּרוּבִים
  english_pob_reading: the cherubim
  chosen_spanish_reading: los querubines
  alternative_spanish_readings:
  - los querubes
  rationale: No hay motivo textual para suavizar o reinterpretar la figura. Se conserva el término técnico tradicional en español bíblico, que identifica a los seres/figuras del santuario sin introducir una equivalencia informal o degradada.
  doctrine_reference: Éxodo 25:18-20; 1 Reyes 6:23-35
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el texto hebreo masorético citado y con la lectura de la POB inglesa; la única variación relevante es la elección del verbo español para expresar el recubrimiento metálico, manteniendo el sentido material y ornamental sin añadir información.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando aparezca en el contexto, pero aquí no está presente.
  - Se conserva el plural bíblico «querubines» para armonizar con el uso estándar en la obra.
  - «Oro» se usa como material de recubrimiento, no como adjetivo ornamental, para reflejar la construcción verbal hebrea.
