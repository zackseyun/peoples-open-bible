translation:
  language: es
  text: Y pondrá su mano sobre la cabeza del holocausto[a], y será aceptado a su favor, para hacer expiación por él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «y él será aceptado»; el pasivo hebreo puede entenderse más directamente del oferente que de la ofrenda.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְסָמַךְ
  english_pob_choice: And he shall lay
  chosen_spanish: Y apoyará
  alternatives_spanish:
  - y pondrá
  - y colocará
  - y extenderá
  lexicon: HALOT
  rationale: En contexto sacrificial, סמך expresa la acción ritual de poner o presionar la mano sobre la víctima. «Apoyará» conserva la idea física de contacto y resulta natural en español; evita un calco rígido y también evita perder el gesto ritual.
- source_word: יָדוֹ
  english_pob_choice: his hand
  chosen_spanish: su mano
  alternatives_spanish:
  - la mano de él
  lexicon: HALOT
  rationale: El posesivo singular se mantiene de forma directa. «Su mano» es la forma natural en español y conserva el referente individual del oferente.
- source_word: עַל רֹאשׁ
  english_pob_choice: on the head of
  chosen_spanish: sobre la cabeza de
  alternatives_spanish:
  - encima de la cabeza de
  - sobre el cabeza de
  lexicon: HALOT
  rationale: «Sobre la cabeza de» reproduce con claridad la relación espacial del gesto. Es más natural que un calco pesado y mantiene la imagen corporal del rito.
- source_word: הָעֹלָה
  english_pob_choice: the burnt offering
  chosen_spanish: el holocausto
  alternatives_spanish:
  - la ofrenda quemada
  - la ofrenda de ascensión
  lexicon: HALOT
  rationale: Para עֹלָה, «holocausto» es el equivalente cultual tradicional y preciso en español bíblico para la ofrenda totalmente quemada. «Ofrenda de ascensión» sería más etimológica, pero menos transparente aquí.
- source_word: וְנִרְצָה
  english_pob_choice: and it shall be accepted
  chosen_spanish: y será aceptado
  alternatives_spanish:
  - y la ofrenda será aceptada
  - y él será aceptado
  lexicon: HALOT
  rationale: El nifal de רצה admite una lectura pasiva. En español, «será aceptado» conserva esa pasividad y deja abierta la tensión interpretativa entre la aceptación de la ofrenda y la del oferente, como en el auditorio inglés.
- source_word: לוֹ
  english_pob_choice: for him
  chosen_spanish: para él
  alternatives_spanish:
  - en favor de él
  - en su beneficio
  lexicon: HALOT
  rationale: La preposición indica beneficio o destinatario. «Para él» es breve y fiel; evita sobreexplicar la relación sacrificial.
- source_word: לְכַפֵּר
  english_pob_choice: to make atonement
  chosen_spanish: para hacer expiación
  alternatives_spanish:
  - para expiar
  - para realizar expiación
  lexicon: HALOT
  rationale: כפר es un término sacrificial clave. «Hacer expiación» mantiene el peso cultual del término en español bíblico sin imponer una teoría más estrecha del sacrificio.
- source_word: עָלָיו
  english_pob_choice: on his behalf
  chosen_spanish: por él
  alternatives_spanish:
  - en favor de él
  - a su favor
  lexicon: HALOT
  rationale: En el giro final con כפר, על expresa el objeto beneficiario de la expiación. «Por él» comunica el beneficio sacrificial de manera natural y evita la repetición de «para él».
theological_decisions:
- issue: Alcance del verbo pasivo וְנִרְצָה
  english_pob_reading: the offering is accepted
  chosen_spanish_reading: será aceptado
  alternative_spanish_readings:
  - la ofrenda será aceptada
  - él será aceptado
  rationale: El hebreo permite una lectura pasiva con ambigüedad sobre el referente preciso. Se conserva esa tensión en español con «será aceptado», sin resolverla de manera definitiva. El contexto inmediato favorece la ofrenda, pero la alternativa referente al oferente sigue siendo posible y debe permanecer visible.
  doctrine_reference: Preservar la tensión interpretativa sin cerrarla.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el ajuste auditado del inglés POB: se mantiene la secuencia ritual mano/cabeza/holocausto y se conserva la ambigüedad de וְנִרְצָה. En el tramo final, «por él» refleja la función beneficiaria de עָלָיו sin perder la relación sacrificial.'
  spanish_consistency_notes:
  - Se mantiene «holocausto» para הָעֹלָה, conforme al uso cultual estándar en español.
  - Se usa «expiación» para כפר, evitando sustituir el término por una paráfrasis más débil.
  - Se conserva el pasivo en «será aceptado» para no decidir prematuramente entre la ofrenda y el oferente.
  - La nota al pie marca explícitamente la lectura alternativa del pasivo, siguiendo el audit trail inglés.
