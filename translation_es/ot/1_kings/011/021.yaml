revisions:
- from: 'Y Hadad oyó en Egipto que David había yacido con sus padres y que Joab, el comandante del ejército, había muerto. Entonces Hadad dijo a Faraón: «Despídeme[a], para que yo vaya a mi propia tierra».'
  to: 'Y Hadad oyó en Egipto que David había yacido con sus padres[a] y que Joab, el comandante del ejército, había muerto[b]. Entonces Hadad dijo a Faraón: «Déjame partir, para que vaya a mi propia tierra».'
  rationale: La revisión mantiene el modismo hebreo para la muerte de David con su nota explicativa, restaura la nota alternativa para מֵת según el rastro inglés y reemplaza «Despídeme» por «Déjame partir», que suena más natural y expresa mejor la solicitud de ser dejado ir. También se alisa la sintaxis española al quitar el pronombre innecesario en «para que vaya».
