    issue: «ese es su nombre» suena menos natural y no refleja de la mejor manera la referencia a la ciudad.
    rationale: Aunque no es incorrecto, en español el referente inmediato es femenino («ciudad»), y la construcción con «ese» resulta algo tiesa. «Ese sigue siendo su nombre hasta hoy» mantiene el valor demostrativo de הוּא שְׁמָהּ y enlaza mejor con עַד הַיּוֹם הַזֶּה.
