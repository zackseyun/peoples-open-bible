translation:
  language: es
  text: Sigue, pues, tirano; y si nos quitas la vida[a] por causa de la piedad, no pienses que, al torturarnos, nos haces daño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nuestras almas»; el griego ψυχάς puede significar también «almas», pero aquí el sentido se refiere a la vida física.
    reason: lexical_alternative
lexical_decisions:
- source_word: πεῖραζε
  english_pob_choice: Go on
  chosen_spanish: Sigue, pues
  alternatives_spanish:
  - Adelante
  - Inténtalo
  lexicon: LSJ
  rationale: El imperativo tiene fuerza de desafío provocador; «Sigue, pues» conserva ese tono de reto natural en español sin volverlo mecánico.
- source_word: τύραννε
  english_pob_choice: tyrant
  chosen_spanish: tirano
  alternatives_spanish:
  - despot
  - opresor
  lexicon: LSJ
  rationale: Es el vocativo directo para un gobernante cruel e ilegítimo. «Tirano» es el equivalente transparente y fiel en español.
- source_word: ψυχάς
  english_pob_choice: souls
  chosen_spanish: almas
  alternatives_spanish:
  - vidas
  - almas/vidas
  lexicon: LSJ
  rationale: El griego puede significar «vida» en este contexto de martirio, pero la revisión inglesa fijó «souls». En español, «almas» conserva mejor la correspondencia léxica con ψυχαί, aunque el contexto sigue siendo la vida física expuesta a la muerte.
- source_word: θανατώσεις
  english_pob_choice: kill
  chosen_spanish: mates
  alternatives_spanish:
  - das muerte a
  - ejecutas
  lexicon: LSJ
  rationale: El futuro de θανατόω se expresa de forma directa y natural con «mates»; mantiene la inmediatez de la amenaza.
- source_word: διὰ τὴν εὐσέβειαν
  english_pob_choice: because of godliness
  chosen_spanish: por causa de la piedad
  alternatives_spanish:
  - por causa de la devoción
  - por causa de la reverencia a Dios
  lexicon: LSJ
  rationale: εὐσέβεια en 4 Macabeos es una virtud programática de fidelidad reverente a Dios. «Piedad» preserva ese campo semántico en español sin imponer una paráfrasis devocional moderna.
- source_word: μὴ νομίσῃς
  english_pob_choice: do not suppose
  chosen_spanish: no pienses
  alternatives_spanish:
  - no supongas
  - no imagines
  lexicon: LSJ
  rationale: La prohibición corrige una falsa conclusión del tirano. «No pienses» suena natural en español; «no supongas» sería más cercano al matiz de inferencia.
- source_word: βλάπτειν
  english_pob_choice: harming
  chosen_spanish: nos haces daño
  alternatives_spanish:
  - nos dañas
  - nos perjudicas
  lexicon: LSJ
  rationale: βλάπτω expresa causar daño. «Nos haces daño» comunica bien el sentido relacional y evita sonar técnico.
- source_word: βασανίζων
  english_pob_choice: by torturing
  chosen_spanish: al torturarnos
  alternatives_spanish:
  - mientras nos torturas
  - torturándonos
  lexicon: LSJ
  rationale: El participio expresa medio o circunstancia concomitante. «Al torturarnos» reproduce bien la relación instrumental en español.
theological_decisions:
- issue: Sentido de ψυχή en contexto de martirio
  english_pob_reading: The English revision chose 'souls' over 'lives' for closer lexical accuracy, while the earlier audit note recognized the physical-life sense in context.
  chosen_spanish_reading: Se mantuvo «almas» en el texto principal, pero la nota reconoce que el sentido contextual apunta a la vida física expuesta a muerte.
  alternative_spanish_readings:
  - vidas
  - almas/vidas
  rationale: En español, «almas» preserva la tensión léxica de ψυχή y sigue la revisión inglesa, mientras que la nota evita resolver el pasaje de manera demasiado estrecha. Así se mantiene la ambigüedad documentada entre alma y vida.
  doctrine_reference: Preservar la tensión textual documentada; primacía del idioma original sobre una normalización doctrinal o interpretativa.
- issue: εὐσέβεια como virtud teológica
  english_pob_reading: Rendered as 'godliness' to preserve reverent fidelity toward God.
  chosen_spanish_reading: «Piedad» como equivalente principal, con el sentido de reverencia fiel a Dios.
  alternative_spanish_readings:
  - devoción
  - reverencia a Dios
  rationale: «Piedad» es el equivalente más establecido y amplio para εὐσέβεια en español. Aunque puede sonar más tradicional, aquí conserva mejor el peso teológico del término que una expresión más explicativa.
  doctrine_reference: Consistencia terminológica con una virtud programática de fidelidad a Dios; evitar reducir εὐσέβεια a mero sentimiento religioso.
translation_notes:
  revision_awareness: El expediente inglés pasó de «lives» a «souls» en la revisión más reciente para acercarse más a ψυχάς, aunque el audit trail mantiene la observación de que en este contexto el sentido inmediato es la vida física. La redacción española refleja esa tensión conservando «almas» en el texto y aclarando la alternativa «vidas» en la nota.
  spanish_consistency_notes:
  - Se mantuvo «tirano» para τύραννε en concordancia con el POB inglés.
  - Se usó «piedad» para εὐσέβεια por su valor teológico estable en español.
  - 'La sintaxis española conserva el paralelismo del original: desafío, condición, corrección final.'
  - No se introdujo «Cristo», «SEÑOR» ni terminología eclesiástica ajena al pasaje.
