translation:
  language: es
  text: Entonces confesarán el pecado que han cometido, y él hará restitución íntegra por su culpa[a], añadiendo un quinto a ello, y lo dará a aquel con quien tenía esa deuda[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Aquí «por su culpa» traduce אָשָׁם en sentido de responsabilidad o deuda reparable, no de «ofrenda por la culpa». La frase hebrea se refiere a restituir el principal completo, no a un sacrificio.
    reason: theological_note
  - marker: b
    text: O, más idiomáticamente, «a la persona que perjudicó». El hebreo literalmente identifica al destinatario como aquel respecto de quien él incurrió en culpa o responsabilidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִתְוַדּוּ
  english_pob_choice: then they shall confess
  chosen_spanish: entonces confesarán
  alternatives_spanish:
  - y confesarán
  - deberán confesar
  lexicon: HALOT
  rationale: El hitpael de ידה en este contexto legal exige confesar/acknowledge culpabilidad. «Entonces» conserva la secuencia del waw en el contexto de restitución, y el futuro simple mantiene el tono prescriptivo sin añadir obligación ajena al texto.
- source_word: חַטָּאתָם אֲשֶׁר עָשׂוּ
  english_pob_choice: the sin that they have committed
  chosen_spanish: el pecado[a] que han cometido
  alternatives_spanish:
  - su pecado que hicieron
  - el mal que han hecho
  lexicon: HALOT
  rationale: «Pecado» cubre el objeto de la confesión y «han cometido» es un equivalente idiomático de עשה con pecado. Se conserva la referencia al acto realizado sin suavizarla excesivamente.
- source_word: וְהֵשִׁיב
  english_pob_choice: he shall make restitution
  chosen_spanish: restituirá íntegramente
  alternatives_spanish:
  - devolverá
  - hará restitución
  lexicon: HALOT
  rationale: En un contexto de compensación legal, שוב en hiphil expresa restitución o repago. «Restituirá» es el equivalente más directo y «íntegramente» recoge el valor del complemento siguiente («en full») sin perder la base económica de la frase.
- source_word: אֶת אֲשָׁמוֹ
  english_pob_choice: for his guilt
  chosen_spanish: su culpa
  alternatives_spanish:
  - su deuda por culpa
  - su responsabilidad
  lexicon: HALOT
  rationale: Aquí אָשָׁם denota culpa/liabilidad en un marco de reparación, no el sacrificio expiatorio. En español, «su culpa» mantiene la conexión con la responsabilidad moral-jurídica sin introducir la noción de ofrenda.
- source_word: בְּרֹאשׁוֹ
  english_pob_choice: in full
  chosen_spanish: íntegramente
  alternatives_spanish:
  - en pleno
  - como principal
  lexicon: HALOT
  rationale: La imagen hebrea alude al principal o suma base. En español, «íntegramente» comunica la idea de restitución completa de manera natural y evita una literalidad opaca.
- source_word: וַחֲמִישִׁתוֹ יֹסֵף עָלָיו
  english_pob_choice: adding a fifth to it
  chosen_spanish: añadiendo un quinto sobre ello
  alternatives_spanish:
  - añadiendo la quinta parte
  - con un quinto adicional
  lexicon: HALOT
  rationale: La construcción indica un veinte por ciento adicional sobre el principal. «Un quinto» es fiel al hebreo y «sobre ello» conserva la referencia al monto restituido.
- source_word: וְנָתַן
  english_pob_choice: and give it
  chosen_spanish: y lo dará
  alternatives_spanish:
  - y lo entregará
  - y lo pagará
  lexicon: HALOT
  rationale: נתן conserva el gesto concreto de transferencia. «Lo dará» mantiene el enlace directo con el objeto de la restitución sin sobreexplicar el acto.
- source_word: לַאֲשֶׁר אָשַׁם לוֹ
  english_pob_choice: to the one to whom he was guilty
  chosen_spanish: al que fue objeto de su culpa
  alternatives_spanish:
  - al que él perjudicó
  - a quien quedó en falta
  lexicon: HALOT
  rationale: El hebreo identifica al destinatario como la persona respecto de la cual incurrió en culpa o responsabilidad. «Objeto de su culpa» conserva esa relación sin convertirla en una expresión menos precisa como «perjudicado»; a la vez, evita una construcción española forzada.
theological_decisions:
- issue: Sentido de אָשָׁם en este versículo
  english_pob_reading: non-sacrificial guilt/liability leading to restitution
  chosen_spanish_reading: culpa/liabilidad que exige restitución
  alternative_spanish_readings:
  - ofrenda por la culpa
  - culpa sacrificial
  rationale: El contexto inmediato habla de confesión, devolución del principal y adición de un quinto al afectado. Por eso, el texto español no introduce lenguaje de sacrificio expiatorio donde el versículo describe una reparación civil-jurídica.
  doctrine_reference: Principio de primacía del texto original y de no importar terminología cultual no exigida por el contexto.
translation_notes:
  revision_awareness: Se siguió la última revisión del audit trail, que ajustó la clausula final hacia una relación más literal y natural («to whom he was guilty»). En español se optó por una solución equivalente que preserve la relación entre el responsable y la persona afectada sin introducir ambigüedad legal ajena al hebreo.
  spanish_consistency_notes:
  - Se conservó «Yahvé» como norma de la serie sólo cuando el texto lo requiera; este versículo no contiene el Tetragrámaton.
  - Se mantuvo «culpa» para אָשָׁם en sentido de liability/restution, evitando «ofrenda por la culpa».
  - «Un quinto» se usó para reflejar la adición del 20% sin tecnicismos innecesarios.
  - 'La puntuación sigue el español moderno y la sintaxis mantiene el orden lógico de la restitución: confesión, devolución, incremento, entrega.'
