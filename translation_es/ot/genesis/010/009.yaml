    issue: Marcador de nota mal ubicado
    rationale: La nota [a] explica una lectura alternativa de לִפְנֵי יְהוָה («en desafío a Yahvé»), no del adjetivo «poderoso». En el texto actual, el anclaje en «poderoso[a]» induce a error exegético y editorial.
  - severity: low
