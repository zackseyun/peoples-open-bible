translation:
  language: es
  text: Cuando tienen un asunto[a], ese asunto viene a mí, y yo juzgo entre un hombre y su prójimo[b], y doy a conocer los estatutos de Dios y sus leyes[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «caso» para דָּבָר. El término hebreo es amplio: puede significar «asunto», «caso» o «cuestión».'
    reason: lexical_alternative
  - marker: b
    text: 'Expresión hebrea masculina singular representativa: «entre un hombre y su prójimo».'
    reason: cultural_note
  - marker: c
    text: O «sus instrucciones» para תּוֹרֹתָיו. En este contexto legal, «leyes» comunica mejor la fuerza normativa del término.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Porque
  - Siempre que
  lexicon: HALOT
  rationale: Introduce la circunstancia temporal que explica la práctica de Moisés; «Cuando» reproduce bien ese valor en español sin volver la frase forzada.
- source_word: יִהְיֶה לָהֶם דָּבָר
  english_pob_choice: they have a matter
  chosen_spanish: tienen un asunto
  alternatives_spanish:
  - tienen un caso
  - les surge un asunto
  lexicon: HALOT
  rationale: דָּבָר es amplio; en contexto judicial puede ser «caso» o «asunto». «Asunto» conserva la amplitud semántica y es natural en español. El sujeto plural se mantiene como en el inglés POB, aunque el sustantivo es singular.
- source_word: בָּא אֵלַי
  english_pob_choice: it comes to me
  chosen_spanish: viene a mí
  alternatives_spanish:
  - llega a mí
  - viene a mí ese asunto
  lexicon: HALOT
  rationale: La revisión inglesa corrige el sujeto al singular implícito del hebreo. En español, «viene a mí» permite que el sujeto entendido sea el «asunto», manteniendo la relación con el antecedente sin añadir más de lo que el texto exige.
- source_word: וְשָׁפַטְתִּי
  english_pob_choice: I judge
  chosen_spanish: yo juzgo
  alternatives_spanish:
  - yo doy juicio
  - yo pronuncio sentencia
  lexicon: HALOT
  rationale: שׁפט aquí es acción judicial. «Juzgo» es directo, claro y fiel al sentido forense.
- source_word: בֵּין אִישׁ וּבֵין רֵעֵהוּ
  english_pob_choice: between a man and his neighbor
  chosen_spanish: entre un hombre y su prójimo
  alternatives_spanish:
  - entre un hombre y su vecino
  - entre una persona y su prójimo
  lexicon: HALOT
  rationale: Se conserva la expresión masculina singular representativa. «Prójimo» comunica bien רֵעַ en contexto relacional y legal; «vecino» sería posible, pero menos amplio.
- source_word: וְהוֹדַעְתִּי
  english_pob_choice: I make known
  chosen_spanish: doy a conocer
  alternatives_spanish:
  - hago saber
  - les doy a conocer
  lexicon: HALOT
  rationale: 'El hifil de ידע es causativo: hacer conocer. «Doy a conocer» expresa esa fuerza con buen español.'
- source_word: חֻקֵּי הָאֱלֹהִים
  english_pob_choice: the statutes of God
  chosen_spanish: los estatutos de Dios
  alternatives_spanish:
  - los decretos de Dios
  - las normas de Dios
  lexicon: HALOT
  rationale: חֻקִּים se refiere a estatutos u ordenanzas fijadas. «Estatutos» conserva fuerza jurídica y es el equivalente más estable en español bíblico.
- source_word: תּוֹרֹתָיו
  english_pob_choice: his laws
  chosen_spanish: sus leyes
  alternatives_spanish:
  - sus instrucciones
  - sus enseñanzas
  lexicon: HALOT
  rationale: En paralelo con «estatutos» y en marco judicial, «leyes» expresa bien la fuerza normativa. Se mantiene el pronombre posesivo «sus» como en el hebreo.
theological_decisions:
- issue: Lenguaje masculino representativo en אִישׁ ... רֵעֵהוּ
  english_pob_reading: a man and his neighbor
  chosen_spanish_reading: un hombre y su prójimo
  alternative_spanish_readings:
  - un hombre y su vecino
  - una persona y su prójimo
  rationale: Se preserva la forma masculina singular del hebreo como expresión representativa, sin neutralizarla, en continuidad con la política de precisión de género del POB.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Sentido de תּוֹרֹתָיו en un contexto legal
  english_pob_reading: his laws
  chosen_spanish_reading: sus leyes
  alternative_spanish_readings:
  - sus instrucciones
  - sus enseñanzas
  rationale: Aunque תּוֹרָה puede significar «instrucción», el contexto inmediato es legal y de adjudicación. «Leyes» transmite mejor la fuerza normativa sin negar la amplitud del término.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada que corrigió el sujeto de «they come to me» a «it comes to me», reflejando que el hebreo presenta «asunto» como sujeto singular. La redacción española evita volver al plural y conserva la relación lógica entre el asunto y la llegada a Moisés.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparece; en este versículo no aparece.
  - Se mantiene un registro bíblico moderno y claro, evitando calcos innecesarios.
  - «Prójimo» se emplea para רֵעַ por ser más amplio y natural en contexto ético-jurídico que «vecino».
  - «Leyes» se eligió para תּוֹרֹתָיו por el marco judicial, pero la nota preserva la alternativa «instrucciones».
