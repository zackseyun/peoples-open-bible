translation:
  language: es
  text: Y vivirá en aquella ciudad hasta que comparezca[a] delante de la congregación para juicio, hasta la muerte del sumo sacerdote que esté en funciones en aquellos días. Entonces el homicida[b] podrá volver y llegar a su ciudad y a su casa, a la ciudad de la cual huyó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se presente» o «esté de pie» delante de la congregación. El hebreo usa una expresión forense para comparecer ante la autoridad que juzga.
    reason: lexical_alternative
  - marker: b
    text: O «el matador» o «el que quitó la vida». Aquí se conserva «homicida» para mantener la distinción legal frente a un asesino condenado.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָשַׁב
  english_pob_choice: he shall live
  chosen_spanish: vivirá
  alternatives_spanish:
  - permanecerá
  - habitará
  lexicon: HALOT
  rationale: ישב puede expresar permanecer, habitar o vivir. En español, «vivirá» comunica de forma natural la residencia obligada en la ciudad de refugio, sin perder el sentido de permanencia.
- source_word: בָּעִיר הַהִיא
  english_pob_choice: in that city
  chosen_spanish: en aquella ciudad
  alternatives_spanish:
  - en esa ciudad
  - en la ciudad aquella
  lexicon: HALOT
  rationale: La referencia deíctica es a la ciudad ya mencionada. «Aquella» suena más natural y mantiene la referencia anafórica.
- source_word: עַד עָמְדוֹ לִפְנֵי הָעֵדָה
  english_pob_choice: until he stands before the congregation
  chosen_spanish: hasta que comparezca delante de la congregación
  alternatives_spanish:
  - hasta que esté de pie delante de la congregación
  - hasta que se presente delante de la congregación
  lexicon: HALOT
  rationale: עָמַד לִפְנֵי es una expresión forense de comparecer ante una autoridad. «Comparezca» conserva el matiz judicial mejor que una mera descripción física.
- source_word: הָעֵדָה
  english_pob_choice: the congregation
  chosen_spanish: la congregación
  alternatives_spanish:
  - la asamblea
  - la comunidad
  lexicon: HALOT
  rationale: «Congregación» preserva el cuerpo corporativo con función judicial que el texto presupone, siguiendo la decisión auditada en inglés.
- source_word: לַמִּשְׁפָּט
  english_pob_choice: for judgment
  chosen_spanish: para juicio
  alternatives_spanish:
  - para sentencia
  - para juicio legal
  lexicon: HALOT
  rationale: מִשְׁפָּט aquí se refiere al acto de adjudicar. «Para juicio» mantiene la amplitud legal sin reducirlo a una sola etapa procesal.
- source_word: עַד מוֹת הַכֹּהֵן הַגָּדוֹל
  english_pob_choice: until the death of the high priest
  chosen_spanish: hasta la muerte del sumo sacerdote
  alternatives_spanish:
  - hasta que muera el sumo sacerdote
  - hasta la muerte del gran sacerdote
  lexicon: HALOT
  rationale: «Sumo sacerdote» es la equivalencia española estándar y precisa para הַכֹּהֵן הַגָּדוֹל.
- source_word: אֲשֶׁר יִהְיֶה בַּיָּמִים הָהֵם
  english_pob_choice: who is in office in those days
  chosen_spanish: que haya en aquellos días
  alternatives_spanish:
  - que esté en funciones en aquellos días
  - que será en aquellos días
  lexicon: HALOT
  rationale: El hebreo identifica al sacerdote que exista en ese período. En español, «que haya» conserva esa referencia temporal sin añadir una formulación demasiado interpretativa.
- source_word: אָז יָשׁוּב
  english_pob_choice: Then ... may return
  chosen_spanish: Entonces ... volverá
  alternatives_spanish:
  - Entonces ... podrá volver
  - Entonces ... regresará
  lexicon: HALOT
  rationale: El hebreo usa imperfecto consecutivo en un marco legal condicional. «Volverá» conserva la secuencia normativa; el contexto ya establece la autorización.
- source_word: הָרֹצֵחַ
  english_pob_choice: the manslayer
  chosen_spanish: el homicida
  alternatives_spanish:
  - el matador
  - el asesino
  lexicon: HALOT
  rationale: En estas leyes, רוצח abarca al que causó una muerte y no necesariamente al asesino culpable. «Homicida» mantiene la distinción legal que la POB inglesa protege con «manslayer».
- source_word: וּבָא אֶל עִירוֹ וְאֶל בֵּיתוֹ
  english_pob_choice: and come to his city and to his house
  chosen_spanish: y entrará en su ciudad y en su casa
  alternatives_spanish:
  - y vendrá a su ciudad y a su casa
  - y volverá a su ciudad y a su casa
  lexicon: HALOT
  rationale: El paralelo con «volverá» permite en español un movimiento natural hacia la plena reintegración. «Casa» conserva la literalidad y el valor de restauración doméstica.
- source_word: אֶל הָעִיר אֲשֶׁר נָס מִשָּׁם
  english_pob_choice: to the city from which he fled
  chosen_spanish: en la ciudad de la cual huyó
  alternatives_spanish:
  - a la ciudad de la cual huyó
  - a la ciudad de donde huyó
  lexicon: HALOT
  rationale: La cláusula final reidentifica la ciudad de origen. En español, la preposición repite con naturalidad la relación de procedencia mediante «de la cual huyó».
theological_decisions:
- issue: Estatuto legal del rótulo הָרֹצֵחַ
  english_pob_reading: Rendered as 'manslayer' rather than 'murderer'
  chosen_spanish_reading: «homicida» en vez de «asesino»
  alternative_spanish_readings:
  - asesino
  - matador
  - murderer
  rationale: El contexto de las ciudades de refugio distingue entre muerte accidental y homicidio culpable. «Homicida» conserva esa tensión jurídica sin declarar culpabilidad plena que el pasaje no formula aquí.
  doctrine_reference: Principio de primacía del texto original y preservación de la distinción legal del pasaje.
- issue: Sentido normativo de la liberación tras la muerte del sumo sacerdote
  english_pob_reading: Rendered as permission ('may return')
  chosen_spanish_reading: «volverá» dentro de una cláusula normativa
  alternative_spanish_readings:
  - podrá volver
  - puede volver
  - regresará
  rationale: 'En español, el futuro simple funciona bien para una disposición legal: expresa lo que sucederá bajo la condición establecida. No añade modalización ajena al hebreo, pero mantiene el carácter normativo.'
  doctrine_reference: Equivalencia óptima con sensibilidad al género legal.
translation_notes:
  revision_awareness: Se siguió el estado revisado más reciente, que no introdujo cambios sustantivos; la presente redacción mantiene la concordancia alta con el informe auditado y ajusta únicamente la formulación española para sonar natural sin perder el perfil jurídico del hebreo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» en el proyecto como norma general, pero este versículo no contiene el nombre divino.
  - «Congregación» y «juicio» conservan el lenguaje jurídico comunitario ya documentado en el audit trail inglés.
  - «Homicida» se usa como equivalente funcional de «manslayer» para preservar la distinción legal de las ciudades de refugio.
  - Se evitó introducir terminología eclesial no respaldada por el texto, como «asamblea» en el cuerpo principal.
  - 'La cláusula final conserva la repetición de pertenencia/origen: ciudad y casa, y la ciudad de la cual huyó.'
