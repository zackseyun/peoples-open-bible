translation:
  language: es
  text: 'Cuando el faraón dejó salir al pueblo, Dios no los condujo por el camino de la tierra de los filisteos[a], aunque estaba cerca; porque Dios dijo[b]: «No sea que el pueblo cambie de parecer cuando vean la guerra y vuelvan a Egipto»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «porque estaba cerca». El hebreo puede entenderse aquí de manera causal o concesiva; en el texto principal se sigue la lectura concesiva por su mejor fluidez en contexto.
    reason: lexical_alternative
  - marker: b
    text: O «cambie de opinión», «se arrepienta» o «desista». El verbo hebreo expresa un cambio de mente o resolución ante la guerra, no arrepentimiento moral.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּשַׁלַּח
  english_pob_choice: when Pharaoh let ... go
  chosen_spanish: Cuando el faraón dejó salir al pueblo
  alternatives_spanish:
  - cuando el faraón envió al pueblo
  - después de que el faraón liberó al pueblo
  lexicon: HALOT
  rationale: El infinitivo constructo con בְּ expresa circunstancia temporal. En contexto, la acción sobre el pueblo es liberarlos / dejarlos salir. «Dejó salir» conserva el matiz narrativo y evita un calco rígido de «envió».
- source_word: נָחָם
  english_pob_choice: lead
  chosen_spanish: condujo
  alternatives_spanish:
  - guio
  - llevó
  lexicon: HALOT
  rationale: Aunque la raíz hebrea aquí corresponde al verbo de conducir por un camino, en español «condujo» expresa con naturalidad la idea de guiar por una ruta. Mantiene el sentido de desplazamiento sin perder la relación con el itinerario.
- source_word: דֶּרֶךְ אֶרֶץ פְּלִשְׁתִּים
  english_pob_choice: by the way of the land of the Philistines
  chosen_spanish: por el camino de la tierra de los filisteos
  alternatives_spanish:
  - por la ruta por la tierra de los filisteos
  - por el camino de Filistea
  lexicon: HALOT
  rationale: 'Se preserva la construcción geográfica del hebreo: «camino de la tierra de los filisteos». «Filisteos» conserva el pueblo mencionado en el texto, no una abstracción geopolítica no explicitada.'
- source_word: כִּי קָרוֹב הוּא
  english_pob_choice: though it was near
  chosen_spanish: aunque era cercano
  alternatives_spanish:
  - porque era cercano
  - pues era cercano
  lexicon: HALOT
  rationale: 'כִּי puede ser causal o concesivo. Siguiendo la lectura de la POB en inglés, «aunque» expresa mejor la lógica: el camino era corto, pero no fue el elegido.'
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - quizá no
  lexicon: HALOT
  rationale: פֶּן introduce prevención o temor ante un resultado no deseado. «No sea que» es una solución natural en español para este valor negativo de finalidad/aprehensión.
- source_word: יִנָּחֵם
  english_pob_choice: change their minds
  chosen_spanish: cambie de parecer
  alternatives_spanish:
  - se arrepienta
  - se desanime
  - se retracte
  lexicon: HALOT
  rationale: El Niphal de נחם aquí describe un cambio de disposición al enfrentar la guerra, no arrepentimiento moral. «Cambie de parecer» conserva esa fuerza mental/volitiva sin teologizar indebidamente el verbo.
- source_word: בִּרְאֹתָם מִלְחָמָה
  english_pob_choice: when they see war
  chosen_spanish: cuando vea la guerra
  alternatives_spanish:
  - cuando vean la guerra
  - al ver la guerra
  - cuando presencien guerra
  lexicon: HALOT
  rationale: El hebreo tiene sujeto colectivo singular («el pueblo»), por eso el singular verbal en español es posible y fluido. «La guerra» reproduce el sustantivo general מִלְחָמָה con el artículo natural del español.
- source_word: וְשָׁבוּ מִצְרָיְמָה
  english_pob_choice: and return to Egypt
  chosen_spanish: y vuelva a Egipto
  alternatives_spanish:
  - y regresen a Egipto
  - y vuelvan a Egipto
  - y regresara a Egipto
  lexicon: HALOT
  rationale: Como continuación de la cláusula de temor con «no sea que», el español pide subjuntivo. «Vuelva» mantiene el sentido de retorno de שׁוב y el movimiento direccional hacia Egipto.
theological_decisions:
- issue: Motivo divino para no tomar la ruta filistea
  english_pob_reading: The verse presents God's decision as a prudent accommodation to the people's likely fear and reversal, without implying error or ignorance in God.
  chosen_spanish_reading: El versículo presenta la decisión de Dios como una consideración prudente ante la probable reacción del pueblo, sin implicar error ni ignorancia en Dios.
  alternative_spanish_readings:
  - El texto muestra una decisión reactiva de Dios
  - El narrador sugiere una corrección de plan por parte de Dios
  rationale: 'La traducción conserva la causa explícita del texto («porque Dios dijo») y la tensión narrativa: Dios evita un camino más corto por lo que el pueblo podría hacer al ver guerra. No se añade una explicación doctrinal que resuelva más de lo que el versículo dice.'
  doctrine_reference: Preservar la tensión teológica sin forzar una armonización
translation_notes:
  revision_awareness: 'Se siguió el testimonio del texto hebreo y la pauta auditada de la POB en inglés: valor concesivo de כִּי, matiz preventivo de פֶּן, y sentido de cambio de mente para יִנָּחֵם. La redacción española se ajustó para sonar natural sin perder la estructura causal y la cita directa de Dios.'
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהִים, conforme al estándar del proyecto.
  - Se mantiene «faraón» en minúscula por uso común en español cuando no actúa como nombre propio formal.
  - Se prefiere «filisteos» frente a «Filistea» para conservar el genitivo de pueblo del hebreo.
  - La subordinación con «no sea que» y subjuntivo reproduce bien el valor de פֶּן.
  - No se introdujo «SEÑOR» ni «Cristo», porque no corresponden a este versículo.
