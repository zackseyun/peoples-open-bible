  to: Y preguntaba por qué razón nadie entre los presentes le había impedido entrar en cualquier santuario[a].
  rationale: Se ajustó «se preguntaba» a «preguntaba» para reflejar mejor la idea de indagar, se corrigió la construcción verbal a «le había impedido entrar» para un español natural y digno, y se sustituyó «de los presentes» por «entre los presentes» para expresar mejor el partitivo griego. Se conservó «cualquier santuario» con la nota léxica ya justificada.
