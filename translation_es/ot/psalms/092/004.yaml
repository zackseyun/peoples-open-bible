translation:
  language: es
  text: Con el instrumento de diez cuerdas y con el arpa[a], con melodía[b] en la lira.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La identificación exacta de los instrumentos hebreos de cuerda es incierta. נָבֶל puede traducirse también «lira» o «laúd», y כִּנּוֹר a veces se vierte «arpa».
    reason: lexical_alternative
  - marker: b
    text: 'O: «con meditación en la lira». הִגָּיוֹן puede denotar meditación, murmullo o un sonido musical resonante; aquí el sentido musical encaja mejor con el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲלֵי
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - en
  - con
  lexicon: HALOT
  rationale: El hebreo עַל en esta construcción musical introduce el acompañamiento instrumental; en español, «sobre» conserva la repetición poética de la preposición sin sonar tan forzado como un calco literal.
- source_word: עָשׂוֹר
  english_pob_choice: the ten-stringed instrument
  chosen_spanish: el instrumento de diez cuerdas
  alternatives_spanish:
  - el instrumento de diez cuerdas
  - el laúd de diez cuerdas
  - las diez cuerdas
  lexicon: HALOT
  rationale: El término designa un instrumento de cuerdas de diez órdenes, no solo el número diez. «Instrumento de diez cuerdas» mantiene la claridad y evita identificarlo de forma más precisa de lo que el hebreo permite.
- source_word: נָבֶל
  english_pob_choice: the harp
  chosen_spanish: el arpa
  alternatives_spanish:
  - el laúd
  - la cítara
  lexicon: HALOT
  rationale: POB mantiene «harp» con nota de incertidumbre; en español «arpa» conserva esa tradición de traducción, aunque el instrumento exacto sea incierto y pudiera corresponder también a otro cordófono.
- source_word: הִגָּיוֹן
  english_pob_choice: melody
  chosen_spanish: melodía
  alternatives_spanish:
  - meditación
  - sonoridad
  - música resonante
  lexicon: HALOT
  rationale: En este contexto musical, el término no apunta primariamente a meditación interior sino a un efecto sonoro o ejecución musical. «Melodía» comunica bien ese sentido y mantiene la fluidez en español.
- source_word: בְּכִנּוֹר
  english_pob_choice: on the lyre
  chosen_spanish: en el laúd
  alternatives_spanish:
  - con el laúd
  - en la cítara
  - con la lira
  lexicon: HALOT
  rationale: כִּנּוֹר es un cordófono distinto de נָבֶל. Como el español «lira» puede ser menos claro en lectura general, se eligió «laúd» como término amplio y legible, sin pretender identificar con exactitud el instrumento; la preposición «en» refleja el uso instrumental poético.
translation_notes:
  revision_awareness: El pasaje fue revisado recientemente sin cambios sustanciales; se mantiene el consenso alto del cotejo, con la misma resolución musical del hemistiquio y la misma nota de incertidumbre lexical sobre los instrumentos de cuerda y הִגָּיוֹן.
  spanish_consistency_notes:
  - Se preserva la estructura paralela de la enumeración instrumental del hebreo.
  - Se evita una equivalencia demasiado precisa para los instrumentos, porque el propio audit trail documenta incertidumbre lexical.
  - «Melodía» se usa para הִגָּיוֹן por el contexto musical; la nota conserva la alternativa de lectura «meditación».
  - «Arpa» se mantiene por tradición de traducción, pero queda explícita su incertidumbre en la nota.
  - No se usa «SEÑOR» ni terminología teológica ajena al verso, porque el texto no contiene el tetragrámaton ni lenguaje doctrinal desarrollado.
