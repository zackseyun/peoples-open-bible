translation:
  language: es
  text: 'Por tanto, diles: «Así dice el Señor Dios Yahvé: Ya no se demorará más ninguna de mis palabras[a], sino que la palabra que yo hable se cumplirá», declara el Señor Dios Yahvé.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «ya no se prolongará» o «ya no se alargará más».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Introduce la conclusión del oráculo con una inferencia natural en español, manteniendo el valor consecutivo sin añadir interpretación.
- source_word: אֱמֹר אֲלֵיהֶם
  english_pob_choice: say to them
  chosen_spanish: diles
  alternatives_spanish:
  - di a ellos
  - háblales
  lexicon: HALOT
  rationale: El mandato profético directo en segunda persona funciona de manera más natural y concisa como 'diles', conservando el destinatario explícito.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así ha dicho
  - Esto dice
  lexicon: HALOT
  rationale: Fórmula mensajera profética convencional; 'Así dice' preserva su solemnidad y su carácter de cita introductoria.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahweh
  lexicon: HALOT; doctrina del nombre divino
  rationale: Se conserva el título compuesto y se expresa el nombre divino como 'Yahvé', conforme al estándar del proyecto para יְהוָה, evitando la convención de ocultarlo con 'SEÑOR'.
- source_word: לֹא תִמָּשֵׁךְ עוֹד
  english_pob_choice: will be delayed any longer
  chosen_spanish: ya no se demorará más
  alternatives_spanish:
  - ya no se prolongará más
  - ya no se alargará más
  lexicon: HALOT
  rationale: El nifal de משׁך aquí señala prolongación/demora; 'se demorará' comunica bien la idea de que la acción anunciada no seguirá aplazándose.
- source_word: כָּל דְּבָרַי
  english_pob_choice: None of my words
  chosen_spanish: ninguna de mis palabras
  alternatives_spanish:
  - ninguna palabra mía
  - ni una sola de mis palabras
  lexicon: HALOT
  rationale: 'La negación con ''todo/all my words'' se vierte idiomáticamente como total exclusión: ''ninguna de mis palabras'', preservando el alcance distributivo.'
- source_word: אֲשֶׁר אֲדַבֵּר
  english_pob_choice: that I speak
  chosen_spanish: que yo hable
  alternatives_spanish:
  - que yo diga
  - que pronuncie
  lexicon: HALOT
  rationale: El imperfecto tiene sentido general/promisorio; 'hable' mantiene el acto de habla divino sin forzar un tiempo excesivamente mecánico.
- source_word: דָּבָר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - la declaración
  - el dicho
  lexicon: HALOT
  rationale: Se mantiene la singularidad enfática del término hebreo como 'palabra', que en este contexto equivale al dicho divino eficaz.
- source_word: וְיֵעָשֶׂה
  english_pob_choice: will be done
  chosen_spanish: se cumplirá
  alternatives_spanish:
  - será hecho
  - se realizará
  lexicon: HALOT
  rationale: El pasivo/nifal de עשה expresa realización efectiva; 'se cumplirá' comunica en español la consumación de la palabra profética con buena naturalidad.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  english_pob_choice: declares the Lord GOD
  chosen_spanish: declara el Señor Yahvé
  alternatives_spanish:
  - oráculo del Señor Yahvé
  - dice el Señor Yahvé
  lexicon: HALOT
  rationale: '''Declara'' reproduce la fórmula profética נְאֻם con tono solemne y actual. Se conserva el nombre divino ''Yahvé'' por coherencia terminológica del proyecto.'
theological_decisions:
- issue: Representación del Tetragrámaton en el título אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - Señor Yahvé
  rationale: La lectura inglesa usa 'Lord GOD' para distinguir el título compuesto. En español, 'Señor Yahvé' conserva tanto el título como el nombre divino revelado sin recurrir a la máscara litúrgica tradicional.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH → Yahvé'
- issue: Fuerza de cumplimiento de la palabra divina
  english_pob_reading: None of my words will be delayed any longer, but the word that I speak will be done
  chosen_spanish_reading: ya no se demorará más ninguna de mis palabras, sino que la palabra que yo hable se cumplirá
  alternative_spanish_readings:
  - ya no se prolongará más ninguna de mis palabras, sino que la palabra que yo diga se realizará
  - ninguna de mis palabras tardará más, sino que la palabra que yo pronuncie se hará
  rationale: Se conserva la tensión entre demora temporal y cumplimiento efectivo. 'Demorarse' expresa la no postergación; 'cumplirá' mantiene la certeza de realización sin suavizar el énfasis profético.
  doctrine_reference: Fidelidad divina y eficacia de la palabra profética (cf. Is 55:11)
translation_notes:
  revision_awareness: El texto base y el audit trail inglés muestran alta concordancia; no se requieren cambios revisivos sustanciales. Se mantuvo la fórmula profética y la equivalencia semántica principal, con adaptación española natural y coherente con el uso del nombre divino como Yahvé.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה, conforme al estándar del proyecto.
  - Se evita 'SEÑOR' como sustituto del nombre divino, salvo dentro del título compuesto expresado en español como 'Señor Yahvé'.
  - '''Palabras'' y ''palabra'' reproducen la alternancia hebrea entre plural total y singular enfático sin neutralizarla.'
  - '''Se cumplirá'' conserva la idea de realización efectiva de la palabra profética.'
