translation:
  language: es
  text: Tú has derribado todos sus muros[a]; has hecho de sus fortalezas[b] una ruina[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «has abierto brecha en todos sus cercos»; o «en todos sus vallados». El hebreo puede referirse ampliamente a defensas o cerramientos.
    reason: lexical_alternative
  - marker: b
    text: O «sus fortines».
    reason: lexical_alternative
  - marker: c
    text: O «destrucción» o «espanto». El sustantivo hebreo puede denotar ruina o derrumbe, y en algunos contextos también terror.
    reason: lexical_alternative
lexical_decisions:
- source_word: פָּרַ֥צְתָּ
  english_pob_choice: have broken down
  chosen_spanish: has derribado
  alternatives_spanish:
  - has quebrado
  - has abierto brecha en
  - has roto
  lexicon: HALOT
  rationale: El verbo hebreo expresa la idea de romper o abrir paso con fuerza. En español, «derribar» comunica con naturalidad la acción destructiva sobre una barrera sin endurecer el texto con una imagen militar más específica de la que exige el hebreo.
- source_word: כָל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - cada uno de
  - la totalidad de
  lexicon: HALOT
  rationale: Mantiene la idea de totalidad y corresponde de forma directa al hebreo.
- source_word: גְּדֵרֹתָיו
  english_pob_choice: his walls
  chosen_spanish: sus muros
  alternatives_spanish:
  - sus barreras
  - sus cercas
  - sus vallados
  lexicon: HALOT
  rationale: El término hebreo puede abarcar cercas, vallados, barreras o muros. En paralelo con «fortalezas», «muros» ofrece en español una equivalencia defensiva clara y digna, sin reducir indebidamente el campo semántico del hebreo.
- source_word: שַׂ֖מְתָּ
  english_pob_choice: have made
  chosen_spanish: has hecho de
  alternatives_spanish:
  - has puesto
  - has convertido en
  - has dejado
  lexicon: HALOT
  rationale: La construcción hebrea con el predicado nominal pide en español una forma que exprese transformación de estado. «Has hecho de» conserva bien esa fuerza y suena natural en poesía bíblica.
- source_word: מִבְצָרָיו
  english_pob_choice: his strongholds
  chosen_spanish: sus fortalezas
  alternatives_spanish:
  - sus fortines
  - sus plazas fuertes
  - sus lugares fortificados
  lexicon: HALOT
  rationale: «Fortalezas» reproduce el sentido de lugar fortificado sin perder claridad ni solemnidad. Es un equivalente idiomático y cercano al sustantivo hebreo.
- source_word: מְחִתָּה
  english_pob_choice: a ruin
  chosen_spanish: una ruina
  alternatives_spanish:
  - destrucción
  - desolación
  - espanto
  lexicon: HALOT
  rationale: En este contexto, el sustantivo apunta a un estado de ruina o derrumbe de las defensas. «Una ruina» preserva esa lectura física y estructural, como en la traducción inglesa auditada.
theological_decisions:
- issue: Referencia del sufijo masculino singular («sus / his») en un lamento sobre la caída del ungido davídico
  english_pob_reading: Retain the masculine singular pronoun 'his' without explicating the referent in the main text.
  chosen_spanish_reading: Conservar «sus» sin precisar en el texto principal si se refiere al rey, a la ciudad o a la figura representada por el lamento.
  alternative_spanish_readings:
  - los muros del rey
  - los muros de Jerusalén
  - sus muros, es decir, los de Sion
  rationale: El hebreo conserva sufijos masculinos singulares y el contexto poético permite una referencia deliberadamente abierta. En español, «sus» mantiene esa ambigüedad teológica y literaria sin introducir una glosa interpretativa.
  doctrine_reference: Preservar la tensión textual en lugar de resolverla.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y coincide con la solución estable del audit trail inglés. No se reportan revisiones posteriores ni cambios aplicados en el historial reciente.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» como norma del proyecto solo cuando corresponde al Tetragrámaton; este versículo no lo contiene.
  - Se mantuvo el posesivo de tercera persona singular en español («sus») para reflejar el sufijo hebreo y conservar la ambigüedad contextual.
  - «Muros» y «fortalezas» forman un paralelo defensivo natural en español, equivalente al campo semántico de las dos expresiones hebreas.
  - La nota c ancla la ambigüedad de מְחִתָּה sin forzar un solo matiz, tal como permite el hebreo.
