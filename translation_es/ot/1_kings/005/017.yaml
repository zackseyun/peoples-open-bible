review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del hebreo y del POB inglés: David no pudo construir una casa para el nombre de Yahvé debido a la guerra que lo rodeaba, hasta que Yahvé sometió a sus enemigos. Sin embargo, hay un desajuste menor en el tiempo verbal de «los puso», que en español suena pasado puntual, mientras que el hebreo con עַד + infinitivo y el inglés POB «until Yahweh put them» en esta construcción dentro del discurso reportado se expresa más naturalmente como pluscuamperfecto: «había puesto».'
  spanish_quality_summary: El español es claro, digno y legible. «Edificar», «para el nombre de Yahvé» y «debajo de las plantas de sus pies» son adecuados. La frase mejora en fluidez narrativa si se cambia «hasta que Yahvé los puso» por «hasta que Yahvé los había puesto», que además evita una leve aspereza temporal. El resto está bien puntuado y suena natural para un registro bíblico moderno.
  glossary_alignment: 'Se alinea correctamente con la terminología del proyecto: יְהוָה = «Yahvé», בַּיִת = «casa», y la imagen de sometimiento se conserva con «debajo de las plantas de sus pies». No hay conflicto doctrinal ni léxico serio. La nota al pie está bien anclada y mantiene la alternativa abreviada.'
  issues:
  - severity: medium
    issue: Tiempo verbal de «hasta que Yahvé los puso»
    rationale: En español, dentro de «no pudo... hasta que...», el pretérito simple suena menos natural para una acción anterior/completada que resolvió la imposibilidad. «Había puesto» representa mejor la relación temporal implícita y evita una lectura secuencial tosca.
  revised_spanish_text: Tú sabes que David, mi padre, no pudo edificar una casa para el nombre de Yahvé, su Dios, por causa de la guerra que lo rodeaba[a], hasta que Yahvé los había puesto debajo de las plantas de sus pies.
  revised_footnotes:
  - marker: a
    text: O «bajo sus pies». El hebreo dice más plenamente «debajo de las plantas de sus pies», una imagen de sometimiento.
    reason: lexical_alternative
  revision_rationale: 'Se hace una reparación menor de estilo y relación temporal en español: «había puesto» expresa más naturalmente la acción completada que permitió luego la construcción. Se conserva todo el contenido fuente, la terminología del proyecto y la nota léxica existente.'
