base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/019/029.yaml
  text: For all my father's house were nothing but men deserving death before my lord the king[a], yet you set your servant among those who eat at your table. So what further right do I have[b], that I should cry out any more to the king?
  footnotes:
