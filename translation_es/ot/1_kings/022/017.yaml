translation:
  language: es
  text: 'Y dijo: «Vi a todo Israel disperso por los montes, como ovejas que no tienen pastor. Y Yahvé dijo: “Estos no tienen jefe[a]; que cada hombre vuelva a su casa en paz[b]”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Estos no tienen señores» o «Estos no tienen amos», con el plural que refleja la forma hebrea; en contexto se refiere a Israel sin su cabeza gobernante.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «que cada uno vuelva a su casa en paz».'
    reason: lexical_alternative
lexical_decisions:
- source_word: נְפֹצִים
  english_pob_choice: scattered
  chosen_spanish: disperso
  alternatives_spanish:
  - esparcido
  - dispersado
  lexicon: HALOT
  rationale: El participio de פוץ expresa estar esparcido o disperso. En español, «disperso» conserva la imagen de un pueblo desunido y desordenado sin sonar forzado.
- source_word: אֶל הֶהָרִים
  english_pob_choice: on the mountains
  chosen_spanish: en los montes
  alternatives_spanish:
  - sobre los montes
  - por los montes
  lexicon: HALOT
  rationale: Aunque אֶל suele indicar movimiento hacia, aquí funciona locativamente en la visión. «En los montes» mantiene la escena natural en español.
- source_word: כַּצֹּאן אֲשֶׁר אֵין לָהֶם רֹעֶה
  english_pob_choice: like sheep that have no shepherd
  chosen_spanish: como ovejas que no tienen pastor
  alternatives_spanish:
  - como un rebaño sin pastor
  - como ovejas sin pastor
  lexicon: HALOT
  rationale: Se conserva la comparación bíblica de manera directa. «Ovejas» comunica con claridad צאן en este contexto, y «no tienen pastor» preserva la fuerza existencial de אֵין.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como el nombre propio divino «Yahvé», no como un sustituto reverencial genérico. Esto mantiene el nombre del pacto en el texto español.
- source_word: אֲדֹנִים
  english_pob_choice: master
  chosen_spanish: amos
  alternatives_spanish:
  - señores
  - dueños
  - gobernantes
  lexicon: HALOT
  rationale: La forma hebrea es plural. En español, «amos» conserva mejor la pluralidad léxica que «señor», y además evita confusión con el título divino. El contexto apunta al jefe gobernante ausente, sin borrar la tensión del plural.
- source_word: יָשׁוּבוּ אִישׁ לְבֵיתוֹ
  english_pob_choice: let each man return to his house
  chosen_spanish: que cada hombre vuelva a su casa
  alternatives_spanish:
  - que cada uno vuelva a su casa
  - que cada varón vuelva a su casa
  lexicon: HALOT
  rationale: El imperfecto tiene fuerza yusiva en el discurso divino. «Que cada hombre vuelva» comunica la orden y conserva el distributivo אִישׁ sin neutralizarlo.
- source_word: בְּשָׁלוֹם
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - con paz
  - sanos y salvos
  lexicon: HALOT
  rationale: «En paz» es la equivalencia española natural de la expresión idiomática y preserva también el matiz irónico de despedir a un ejército derrotado sin combate.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el nombre del pacto. En español se mantiene la transliteración reverente «Yahvé» para no ocultar el Tetragrámaton tras un título, en línea con la política de la POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido plural de אֲדֹנִים
  english_pob_reading: These have no master
  chosen_spanish_reading: Estos no tienen amos
  alternative_spanish_readings:
  - Estos no tienen señor
  - Estos no tienen gobernante
  rationale: El hebreo es plural y la POB inglesa conserva esa tensión con una nota. En español se mantiene el plural «amos» para reflejar la forma léxica, sin perder el sentido contextual de autoridad ausente.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
- issue: Distribución de אִישׁ
  english_pob_reading: let each man return to his house
  chosen_spanish_reading: que cada hombre vuelva a su casa
  alternative_spanish_readings:
  - que cada uno vuelva a su casa
  - que todo hombre vuelva a su casa
  rationale: Se conserva el valor distributivo masculino singular de אִישׁ, siguiendo la política de precisión de género cuando el hebreo lo expresa explícitamente.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios y el consenso de auditoría fue de alta concordancia; por eso la redacción española sigue de cerca la decisión inglesa sin añadir paráfrasis ni atenuar el plural de אֲדֹנִים.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente con la política del proyecto para יְהוָה.
  - Se conserva el lenguaje concreto de «ovejas» y «pastor» por ser la imagen bíblica directa y natural en español.
  - La nota [a] acompaña el plural de «amos» para no borrar la tensión documental del hebreo.
  - La formulación «cada hombre» preserva el distributivo masculino de אִישׁ sin neutralizarlo.
