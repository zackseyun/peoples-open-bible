translation:
  language: es
  text: Y después de haber sido disciplinados[a] un poco, recibirán gran bien[b], porque Dios los probó y los halló dignos de él[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por un poco de tiempo», o «aunque fueron disciplinados solo un poco». El griego ὀλίγα puede indicar poca duración o poca medida.
    reason: lexical_alternative
  - marker: b
    text: O «recibirán grandes bienes» o «serán grandemente beneficiados». El griego habla literalmente de recibir gran beneficio.
    reason: lexical_alternative
  - marker: c
    text: O «los halló dignos para sí». La frase subraya que fueron hallados aptos en relación con Dios mismo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀλίγα
  english_pob_choice: a little
  chosen_spanish: por un poco
  alternatives_spanish:
  - por poco tiempo
  - por un breve tiempo
  - en poca medida
  lexicon: LSJ
  rationale: El griego neutro plural puede indicar poca cantidad o poca duración. «Por un poco» conserva esa ambigüedad en español y suena natural en el flujo de la frase.
- source_word: παιδευθέντες
  english_pob_choice: after being disciplined
  chosen_spanish: haber sido disciplinados
  alternatives_spanish:
  - haber sido instruidos
  - haber sido corregidos
  - haber sido castigados
  lexicon: BDAG
  rationale: En este contexto, παιδεύω combina corrección y formación mediante prueba. «Disciplinados» preserva ese valor mejor que «castigados», que sería demasiado estrecho, o «instruidos», que suavizaría la dimensión correctiva.
- source_word: μεγάλα
  english_pob_choice: great good
  chosen_spanish: gran beneficio
  alternatives_spanish:
  - grandes bienes
  - gran bien
  - grandes beneficios
  lexicon: LSJ
  rationale: Como complemento de εὐεργετηθήσονται, la idea es de beneficios abundantes recibidos. «Gran beneficio» mantiene la fuerza positiva y evita una expresión demasiado abstracta o redundante en español.
- source_word: εὐεργετηθήσονται
  english_pob_choice: they will receive great good
  chosen_spanish: recibirán gran beneficio
  alternatives_spanish:
  - serán grandemente beneficiados
  - recibirán grandes bienes
  - serán favorecidos grandemente
  lexicon: LSJ
  rationale: El futuro pasivo comunica beneficio otorgado. En español, una construcción activa con «recibirán» conserva la pasiva semántica sin sonar forzada.
- source_word: ἐπείρασεν
  english_pob_choice: tested
  chosen_spanish: probó
  alternatives_spanish:
  - testó
  - los puso a prueba
  - los examinó
  lexicon: BDAG
  rationale: «Probar» expresa la idea de verificar la calidad o fidelidad de alguien. En español bíblico y moderno, comunica mejor la prueba de carácter que «tentó», que sugeriría inducción al mal.
- source_word: ἀξίους
  english_pob_choice: worthy
  chosen_spanish: dignos
  alternatives_spanish:
  - aptos
  - merecedores
  - dignos y aptos
  lexicon: BDAG
  rationale: «Dignos» conserva el juicio evaluativo del texto. En español, también enlaza bien con el resultado de la prueba divina.
- source_word: ἑαυτοῦ
  english_pob_choice: of himself
  chosen_spanish: de él
  alternatives_spanish:
  - para sí
  - para sí mismo
  - de sí mismo
  lexicon: BDAG
  rationale: El genitivo reflexivo apunta a la relación con Dios mismo. «De él» es conciso y natural en español; en la nota se preserva la alternativa relacional más literal de «para sí».
theological_decisions:
- issue: Naturaleza de la prueba divina en relación con el sufrimiento
  english_pob_reading: God tested them
  chosen_spanish_reading: Dios los probó
  alternative_spanish_readings:
  - Dios los tentó
  - Dios los puso a prueba
  - Dios los examinó
  rationale: «Probó» mantiene la idea de una prueba que revela y confirma valor, sin introducir la connotación negativa de «tentar». Conserva la tensión teológica del texto sin resolverla en una doctrina más amplia.
  doctrine_reference: Preservar la tensión teológica del sufrimiento como prueba divina sin convertirla en tentación al mal.
translation_notes:
  revision_awareness: El texto base y el audit trail inglés están en alto acuerdo; no se requieren revisiones adicionales. Se conservó la ambigüedad de ὀλίγα y la fuerza relacional de ἑαυτοῦ sin resolverlas de forma excesiva.
  spanish_consistency_notes:
  - Se usó «Dios» para θεός conforme al estándar del proyecto.
  - Se evitó «Cristo» o formulaciones tradicionales no presentes en el original.
  - «Disciplinados» conserva el matiz correctivo/formativo de παιδεύω.
  - «Probar» se eligió para ἐπείρασεν, no «tentar», para evitar una lectura doctrinalmente engañosa.
  - La estructura general sigue de cerca el griego sin calcos innecesarios.
