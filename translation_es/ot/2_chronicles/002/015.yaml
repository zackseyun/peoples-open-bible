translation:
  language: es
  text: Y cortaremos madera del Líbano, según todo lo que necesites, y te la traeremos en balsas[a] por mar hasta Jope[b]; y tú la subirás a Jerusalén[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «te la traeremos como balsas» o «te la traeremos como flotadores».'
    reason: lexical_alternative
  - marker: b
    text: Jope es el puerto conocido más tarde como Jaffa.
    reason: cultural_note
  - marker: c
    text: 'Hebreo: «la harás subir a Jerusalén»; «subir» refleja la mayor elevación de Jerusalén.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נִכְרֹת
  english_pob_choice: we will cut
  chosen_spanish: cortaremos
  alternatives_spanish:
  - cortaremos la madera
  - tallaremos
  lexicon: HALOT
  rationale: El verbo expresa la acción de cortar árboles para obtener material; en español, «cortaremos» conserva la acción directa sin añadir especificación innecesaria.
- source_word: עֵצִים
  english_pob_choice: timber
  chosen_spanish: madera
  alternatives_spanish:
  - madera para construcción
  - troncos
  lexicon: HALOT
  rationale: En contexto de abastecimiento para obra, el sentido es material leñoso útil para construcción. «Madera» es natural en español y mantiene la amplitud del término sin forzar «árboles».
- source_word: מִן הַלְּבָנוֹן
  english_pob_choice: from Lebanon
  chosen_spanish: del Líbano
  alternatives_spanish:
  - desde el Líbano
  lexicon: HALOT
  rationale: La preposición hebrea indica procedencia; «del Líbano» es la formulación natural en español y conserva el topónimo sin artículo especial.
- source_word: כְּכָל צָרְכֶּךָ
  english_pob_choice: as much as you need
  chosen_spanish: conforme a toda tu necesidad
  alternatives_spanish:
  - según toda tu necesidad
  - según todo lo que necesites
  lexicon: HALOT
  rationale: La construcción hebrea es literal en el sentido de medida ajustada a lo requerido. «Conforme a toda tu necesidad» preserva la amplitud y el matiz de adecuación.
- source_word: וּנְבִיאֵם לְךָ
  english_pob_choice: and bring it to you
  chosen_spanish: y te la llevaremos
  alternatives_spanish:
  - y te las llevaremos
  - y te la traeremos
  lexicon: HALOT
  rationale: El sufijo plural retoma las piezas de madera, pero en español puede tratarse colectivamente como femenino singular («la madera»). «Llevaremos» mantiene el movimiento hacia el destinatario.
- source_word: רַפְסֹדוֹת
  english_pob_choice: as rafts
  chosen_spanish: en balsas
  alternatives_spanish:
  - como balsas
  - en rafts
  lexicon: HALOT
  rationale: El sustantivo designa conjuntos flotantes de madera atada. «En balsas» es el equivalente español más claro y natural para el medio de transporte.
- source_word: עַל יָם יָפוֹ
  english_pob_choice: by sea to Joppa
  chosen_spanish: por mar hasta Jope
  alternatives_spanish:
  - por mar a Jope
  - por el mar hasta Jope
  lexicon: HALOT
  rationale: La expresión señala transporte marítimo con destino a la ciudad portuaria. «Por mar hasta Jope» reproduce bien la relación de movimiento y llegada.
- source_word: יָפוֹ
  english_pob_choice: Joppa
  chosen_spanish: Jope
  alternatives_spanish:
  - Joppa
  - Jaffa
  lexicon: HALOT
  rationale: Se usa la forma bíblica tradicional en español, «Jope», por ser reconocible en lectura bíblica y adecuada para la ciudad costera mencionada.
- source_word: תַּעֲלֶה אֹתָם
  english_pob_choice: you will take it up
  chosen_spanish: la harás subir
  alternatives_spanish:
  - las harás subir
  - la subirás
  lexicon: HALOT
  rationale: עלָה conserva el sentido direccional de subir hacia Jerusalén. En español, «la harás subir» mantiene el movimiento ascendente y puede funcionar con el colectivo femenino singular.
- source_word: יְרוּשָׁלִָם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalem
  lexicon: HALOT
  rationale: Se emplea la forma establecida en español bíblico y contemporáneo.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto inglés auditado quedó confirmado como estable (sin modificaciones).
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - «Madera» se usa como término colectivo funcional para עֵצִים en contexto de transporte y construcción.
  - Se conserva la indicación direccional de «subir» asociada a Jerusalén, evitando neutralizarla con un verbo genérico de transporte.
