translation:
  language: es
  text: Ellos son vanidad[a], una obra de ilusión; al tiempo de su castigo[b], perecerán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vaciedad», «futilidad» o «mero aliento».
    reason: lexical_alternative
  - marker: b
    text: O «al tiempo de su visitación». Aquí «visitación» se refiere al momento cuando el juicio viene sobre ellos.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶבֶל
  english_pob_choice: vanity
  chosen_spanish: vanidad
  alternatives_spanish:
  - vaciedad
  - futilidad
  - mera neblina
  lexicon: HALOT
  rationale: הֶבֶל expresa vacuidad, inutilidad o falta de sustancia. «Vanidad» comunica bien esa idea en español bíblico y conserva el tono polémico contra los ídolos sin reducirlo a una imagen física como «aliento».
- source_word: הֵמָּה
  english_pob_choice: They are
  chosen_spanish: Ellos son
  alternatives_spanish:
  - Estos son
  - Son
  lexicon: HALOT
  rationale: El pronombre independiente intensifica la predicación. En español, «Ellos son» reproduce con naturalidad ese énfasis y evita perder la fuerza enfática del hebreo.
- source_word: מַעֲשֵׂה
  english_pob_choice: a work of
  chosen_spanish: una obra de
  alternatives_spanish:
  - un trabajo de
  - una hechura de
  - una producción de
  lexicon: HALOT
  rationale: 'El constructo describe lo que esos ídolos llegan a ser: una obra resultante de algo. «Obra de» mantiene la estructura breve y el sustantivo singular del hebreo.'
- source_word: תַּעְתֻּעִים
  english_pob_choice: delusion
  chosen_spanish: ilusión
  alternatives_spanish:
  - engaño
  - ilusión engañosa
  - mofa
  lexicon: HALOT
  rationale: El campo semántico incluye engaño, extravío y efecto ilusorio. «Ilusión» funciona en español como sustantivo abstracto y conserva la idea de irrealidad engañosa sin volver la frase demasiado explicativa. Se evita una traducción mecánica que suene más dura o más técnica de lo que el verso exige.
- source_word: בְּעֵת
  english_pob_choice: at the time of
  chosen_spanish: al tiempo de
  alternatives_spanish:
  - en el tiempo de
  - cuando
  lexicon: HALOT
  rationale: La expresión temporal se vierte de forma formal y natural. «Al tiempo de» preserva la estructura del hebreo y mantiene el registro profético.
- source_word: פְּקֻדָּתָם
  english_pob_choice: their punishment
  chosen_spanish: su castigo
  alternatives_spanish:
  - su visitación
  - su juicio
  - su retribución
  lexicon: HALOT
  rationale: פְּקֻדָּה puede significar visitación, inspección o castigo según el contexto. Aquí el paralelismo con el juicio contra los ídolos favorece el sentido punitivo. «Castigo» explicita la fuerza del contexto, mientras la nota conserva la alternativa tradicional «visitación».
- source_word: יֹאבֵדוּ
  english_pob_choice: they will perish
  chosen_spanish: perecerán
  alternatives_spanish:
  - morirán
  - serán destruidos
  - desaparecerán
  lexicon: HALOT
  rationale: De אבד, expresa perecer o ser arruinado. «Perecerán» conserva el valor intransitivo y el tono solemne del profeta.
theological_decisions:
- issue: Sentido polémico contra los ídolos
  english_pob_reading: The verse speaks of idols as worthless and deceptive objects that will themselves perish under divine judgment.
  chosen_spanish_reading: El verso presenta a los ídolos como realidades vacías y engañosas que desaparecerán bajo el juicio de Dios.
  alternative_spanish_readings:
  - Los ídolos son motivo de burla y serán eliminados en el juicio.
  - Los ídolos son obras engañosas que acabarán por destruirse.
  rationale: 'El contexto inmediato de Jeremías 51 mantiene la crítica antiidolátrica: los ídolos no tienen consistencia real y quedan expuestos cuando llega el juicio. La redacción española conserva esa tensión entre vacuidad e ilusión sin añadir una paráfrasis doctrinal innecesaria.'
  doctrine_reference: Jeremías 10:15; Jeremías 51:17-18
translation_notes:
  revision_awareness: La base inglesa fue revisada de «a work of delusions» a «a work of delusion» para naturalizar el abstracto singular; la versión española sigue esa misma decisión al usar «una obra de ilusión», manteniendo el singular abstracto y el tono formal.
  spanish_consistency_notes:
  - Se mantiene «vanidad» para הֶבֶל, conforme al valor poético-profético del término.
  - Se evita «SEÑOR» o cualquier sustitución equivalente, pues el versículo no contiene el tetragrámaton.
  - «Castigo» traduce el sentido contextual de פְּקֻדָּה sin borrar la alternativa tradicional «visitación».
  - 'El español usa un orden sintáctico natural, pero conserva la secuencia semántica del hebreo: vacuidad → obra ilusoria → tiempo de juicio → perecer.'
