  to: 'Y entre los hijos de los sacerdotes que habían tomado[a] mujeres extranjeras, fueron hallados de entre los hijos de Jesúa hijo de Josadac y sus hermanos: Maasías, Eliezer, Jarib y Gedalías.'
  rationale: Se ajusta el verbo principal a un plural existencial natural en español para concordar con la lista de hombres hallados, en línea con la decisión auditada del inglés. También se cambia el segundo 'entre' por 'de entre' para reflejar mejor el valor de subgrupo de מִבְּנֵי. Se mantiene 'mujeres extranjeras' en el texto principal por su cercanía al hebreo, mientras la nota aclara la alternativa matrimonial de forma más idiomática.
