translation:
  language: es
  text: Tus dientes son como un rebaño de ovejas esquiladas que salen del lavado, todas ellas con mellizos[a], y no hay entre ellas ninguna que haya perdido su cría[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La imagen de crías gemelas comunica plenitud y correspondencia perfecta; también puede entenderse como «bien emparejadas».
    reason: cultural_note
  - marker: b
    text: 'O: «y ninguna de ellas está privada de cría» o «y ninguna de ellas es estéril». El hebreo conserva la imagen de las ovejas en vez de afirmar directamente que no falta ningún diente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁנַּיִךְ
  english_pob_choice: your teeth
  chosen_spanish: tus dientes
  alternatives_spanish:
  - tus dientes de marfil
  lexicon: HALOT
  rationale: El hebreo habla de los dientes de la amada sin añadir adorno; en español basta con «tus dientes». Se evita «de marfil» porque no está en el hebreo y endurece innecesariamente la imagen.
- source_word: כְּעֵדֶר
  english_pob_choice: like a flock
  chosen_spanish: como un rebaño
  alternatives_spanish:
  - como un flock
  - como un hato
  lexicon: HALOT
  rationale: עֵדֶר es un conjunto de ganado menor; en español «rebaño» comunica mejor la escena pastoril que «hato» y mantiene la naturalidad del símil.
- source_word: הַקְּצוּבוֹת
  english_pob_choice: of shorn ewes
  chosen_spanish: de ovejas esquiladas
  alternatives_spanish:
  - de ovejas trasquiladas
  - de ovejas recién esquiladas
  lexicon: HALOT
  rationale: El participio pasivo indica animales ya esquilados. «Esquiladas» conserva el rasgo concreto sin añadir «recién», que no está expresado explícitamente.
- source_word: שֶׁעָלוּ מִן הָרַחְצָה
  english_pob_choice: that have come up from the washing
  chosen_spanish: que suben del lavado
  alternatives_spanish:
  - que han subido del lavado
  - que vienen del lavado
  - que han salido del lavado
  lexicon: HALOT
  rationale: El hebreo mantiene la imagen concreta de ovejas que suben desde el lugar o acto del lavado. «Del lavado» conserva el sustantivo con artículo sin convertirlo en una paráfrasis más explicativa.
- source_word: שֶׁכֻּלָּם
  english_pob_choice: all of them
  chosen_spanish: todas ellas
  alternatives_spanish:
  - todas
  - todas mismas
  lexicon: HALOT
  rationale: El totalizador se integra de manera natural con el referente femenino plural de las ovejas; en la metáfora, «todas ellas» conserva la referencia sin sobrecargar el español.
- source_word: מַתְאִימוֹת
  english_pob_choice: bearing twins
  chosen_spanish: pariendo mellizos
  alternatives_spanish:
  - con mellizos
  - criando mellizos
  - gemelas
  lexicon: HALOT
  rationale: La forma sugiere pares correspondidos y, en la imagen ovina, el sentido de tener crías gemelas. «Pariendo mellizos» preserva la fuerza imagética y la idea de completitud/pareja que el POB explicó en nota.
- source_word: וְשַׁכֻּלָה אֵין בָּהֶם
  english_pob_choice: and none among them has lost her young
  chosen_spanish: y no hay entre ellas ninguna que haya perdido su cría
  alternatives_spanish:
  - y ninguna de ellas está privada de cría
  - y no hay entre ellas ninguna berefta
  - y ninguna está sin cría
  lexicon: HALOT
  rationale: שַׁכֻּלָה expresa luto o privación por pérdida de cría. En español, «haber perdido su cría» conserva la imagen pastoral y evita esconder el valor metafórico del hebreo con una simple abstracción como «estar berefta».
translation_notes:
  revision_awareness: Se siguió el estado de revisión más reciente (sin cambios) y el dictamen de alta concordancia; no se incorporaron revisiones pendientes. La formulación española se mantiene cercana al hebreo y conserva la metáfora pastoril, como en el texto auditado en inglés.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como terminología de proyecto solo cuando corresponda; este versículo no contiene el Tetragrámaton.
  - Se usó un registro poético claro y contemporáneo, sin recurrir a equivalentes eclesiásticos tradicionales que no añade el hebreo.
  - Se conservó la metáfora de ovejas para no sustituirla por una glosa abstracta sobre dientes.
  - «Mellizos» se eligió para reflejar la idea de pares y completar el símil; no pretende introducir información biológica no expresada de forma explícita.
