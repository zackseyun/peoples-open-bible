    rationale: La evidencia y la auditoría inglesa escogen 'restore the fortunes' como lectura principal por el alcance amplio del oráculo. El español actual prioriza una lectura más literal que la POB dejó para nota, alterando el énfasis semántico del texto principal.
  - severity: medium
    issue: «Los edificaré» es menos natural y menos preciso contextualmente que «los reconstruiré».
    rationale: Aunque בנה puede ser 'edificar', la propia auditoría inglesa explicita 'rebuild' por el contexto de restauración tras devastación. En español, con Judá e Israel como objeto, «reconstruiré» comunica mejor la restauración nacional.
  - severity: low
    issue: La nota a usa una formulación útil pero debería quedar subordinada a un texto principal idiomático.
    rationale: La alternativa literal debe conservarse, pero como nota, no como redacción principal.
