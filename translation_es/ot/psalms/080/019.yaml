translation:
  language: es
  text: Entonces no nos apartaremos de ti; revívenos[a], e invocaremos tu nombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «presérvanos con vida» o «haznos vivir». El hebreo también puede significar «revívenos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלֹא / Then ... not
  english_pob_choice: Then we will not turn back from you
  chosen_spanish: Entonces no nos apartaremos de ti
  alternatives_spanish:
  - Y no nos apartaremos de ti
  - Así no nos apartaremos de ti
  lexicon: HALOT
  rationale: La conjunción וְ aquí introduce consecuencia o resultado, y el negativo niega el acto de retirarse. En español, 'entonces' comunica bien ese valor resultativo. 'Apartarnos de ti' expresa con naturalidad la idea de retroceder o retirarse de Dios sin forzar un calco literal.
- source_word: נָסוֹג
  english_pob_choice: turn back
  chosen_spanish: nos apartaremos
  alternatives_spanish:
  - volveremos atrás
  - retrocederemos
  - nos volveremos atrás
  lexicon: HALOT
  rationale: El verbo sugiere retirada o vuelta atrás. 'Apartarnos' es idiomático en español bíblico y moderno, y conserva la fuerza relacional de alejarse de Yahvé sin introducir el matiz más técnico o más coloquial de 'volver atrás'.
- source_word: תְּחַיֵּנוּ
  english_pob_choice: revive us
  chosen_spanish: avívanos
  alternatives_spanish:
  - revívenos
  - danos vida
  - presérvanos con vida
  lexicon: HALOT
  rationale: El pi'el de חיה puede significar 'revivir', 'dar vida' o 'preservar con vida'. 'Avívanos' mantiene la amplitud semántica y, en español, deja abierta la tensión documentada entre renovación vital y preservación de la vida, como hace el audit trail inglés.
- source_word: וּבְשִׁמְךָ
  english_pob_choice: and we will call on your name
  chosen_spanish: y llamaremos tu nombre
  alternatives_spanish:
  - e invocaremos tu nombre
  - y llamaremos sobre tu nombre
  - e imploraremos tu nombre
  lexicon: HALOT
  rationale: Con קרא + בְּשֵׁם el sentido es invocar o llamar sobre el nombre divino. En español, 'llamaremos tu nombre' suena incompleto; por fidelidad idiomática conviene entenderlo como 'invocar'. La lectura del nombre posesivo 'tu nombre' conserva el vínculo personal con Dios.
- source_word: נִקְרָא
  english_pob_choice: we will call on
  chosen_spanish: llamaremos
  alternatives_spanish:
  - invocaremos
  - clamaremos
  - proclamaremos
  lexicon: HALOT
  rationale: Para conservar una frase fluida y religiosa en español, se eligió 'llamaremos' con el complemento ya fijado por el contexto de nombre divino. Sin embargo, la forma plena en sentido explicativo queda reflejada en la nota textual, porque el hebreo puede entenderse específicamente como 'invocar'.
theological_decisions:
- issue: 'Alcance de תְּחַיֵּנוּ: revivificación, preservación o dar vida'
  english_pob_reading: The Hebrew can also mean 'preserve us alive' or 'make us live.' The translation 'revive us' was chosen to more naturally reflect the context while preserving formal tone.
  chosen_spanish_reading: avívanos
  alternative_spanish_readings:
  - danos vida
  - presérvanos con vida
  - revívenos
  rationale: 'La forma española ''avívanos'' conserva la tensión teológica documentada: puede leerse como renovación de vida, reanimación espiritual o preservación vital. No se reduce el sentido a una sola opción, y se mantiene la petición dependiente de Dios que conduce inmediatamente a la fidelidad del pueblo.'
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La redacción sigue de cerca el último estado del audit trail inglés, que prefirió «revive us» para תְּחַיֵּנוּ. La versión española adopta un equivalente natural («avívanos») que conserva la amplitud semántica señalada por las revisiones y mantiene el tono formal del salmo.
  spanish_consistency_notes:
  - Se usó «Yahvé» en el texto base del proyecto sólo cuando el nombre divino aparece explícitamente; aquí el versículo no contiene el Tetragrámaton, por lo que no se introduce.
  - Se evitó «Cristo» y otros equivalentes no presentes en el versículo.
  - «Llamaremos tu nombre» se entiende en la nota como invocación del nombre, siguiendo el valor idiomático de קרא con בְּשֵׁם.
  - 'La sintaxis mantiene el paralelismo del hebreo: negación de apartarse, petición de vida, y respuesta de invocación.'
