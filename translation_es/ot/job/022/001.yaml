  text: 'Entonces Elifaz el temanita respondió y dijo:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió y dijo
  lexicon: HALOT
  rationale: El hebreo narrativo introduce una intervención de habla. En español, «respondió» conserva la fuerza dialógica de la fórmula y resulta natural en este contexto. Aunque el inglés POB eligió «answered», el español «respondió» evita una calca innecesaria y mantiene el valor discursivo.
- source_word: אֱלִיפַז
  english_pob_choice: Eliphaz
  chosen_spanish: Elifaz
  alternatives_spanish:
  - Elifaz
  lexicon: transliteración estándar
  rationale: Nombre propio transliterado al español con la grafía usual «Elifaz», ajustada a la ortografía castellana sin alterar la identidad del personaje.
- source_word: הַתֵּמָנִי
  english_pob_choice: the Temanite
  chosen_spanish: el temanita
  alternatives_spanish:
  - el de Temán
  - el hombre de Temán
  lexicon: HALOT
  rationale: El adjetivo gentilicio se vierte con el sustantivo gentilicio español «temanita», que conserva la referencia geográfica/étnica de manera breve y natural. Se evita expandirlo innecesariamente, aunque «el de Temán» sigue siendo una alternativa válida.
- source_word: וַיֹּאמַר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  lexicon: HALOT
  rationale: «Dijo» es el verbo de habla más directo e idiomático para la fórmula narrativa hebrea. Mantiene la secuencia estereotipada «respondió y dijo» sin cargar el español con una literalidad excesiva.
- source_word: וַ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  lexicon: conector narrativo
  rationale: El waw inicial marca progresión narrativa. «Entonces» reproduce mejor en español la transición secuencial que «Y», y corresponde al valor discursivo que el audit trail inglés ya identificó.
translation_notes:
  revision_awareness: El pasaje y el rastro auditado muestran una fórmula narrativa estable sin revisiones textuales ni cambios de sentido relevantes; la versión española sigue de cerca el hebreo y armoniza con la decisión inglesa de leer la secuencia como introducción de discurso.
  spanish_consistency_notes:
  - Se mantiene una fórmula narrativa breve y sobria, adecuada para un encabezado de discurso en Job.
  - No se añade puntuación interpretativa ni expansiones explicativas más allá de lo warrantado por el hebreo.
  - La combinación «respondió y dijo» se conserva como construcción idiomática de habla, mientras que «Entonces» refleja el avance narrativo del waw consecutivo.
