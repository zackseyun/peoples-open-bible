  glossary_alignment: 'No hay términos teológicos de proyecto en juego. Las decisiones léxicas principales están bien encaminadas: «un poco de» para מְעַט y «sueño» para שֵׁנוֹת funcionan bien. Recomiendo «somnolencia» para תְּנוּמוֹת por mejor legibilidad proverbial, y mantener «recostarse» para לִשְׁכָּב con la nota alternativa «descansar».'
