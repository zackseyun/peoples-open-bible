translation:
  language: es
  text: Porque tu sabiduría no se hizo evidente solo hoy; antes bien, desde el comienzo de tus días todo el pueblo ha conocido tu entendimiento, porque la disposición[a] de tu corazón es buena.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la formación / inclinación de tu corazón es buena'. La expresión griega es algo literal y alude al sesgo interior o a la configuración del corazón.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ ἐν τῇ σήμερον
  english_pob_choice: not only today
  chosen_spanish: no se hizo evidente solo hoy
  alternatives_spanish:
  - no es evidente hoy
  - no quedó manifiesta solo hoy
  lexicon: LSJ
  rationale: La expresión contrasta el presente con una reputación ya conocida desde antes. En español, 'no se hizo evidente solo hoy' conserva la idea de manifestación reciente negada, con un matiz natural y no mecánico.
- source_word: ἡ σοφία σου πρόδηλός ἐστιν
  english_pob_choice: your wisdom did not become evident
  chosen_spanish: tu sabiduría no se hizo evidente
  alternatives_spanish:
  - tu sabiduría no es evidente
  - tu sabiduría no quedó manifiesta
  lexicon: LSJ
  rationale: πρόδηλος significa claro, patente, evidente. 'Se hizo evidente' refleja bien la manifestación perceptible sin forzar una lectura técnica; además preserva la relación temporal con 'hoy'.
- source_word: ἀλλʼ ἀπʼ ἀρχῆς ἡμερῶν σου
  english_pob_choice: rather, from the beginning of your days
  chosen_spanish: antes bien, desde el comienzo de tus días
  alternatives_spanish:
  - sino desde el principio de tus días
  - más bien, desde el principio de tus días
  lexicon: LSJ
  rationale: '''Antes bien'' comunica con claridad la corrección contrastiva del griego ἀλλʼ. ''Desde el comienzo de tus días'' mantiene la imagen idiomática sin sobrerreformularla.'
- source_word: ἔγνω πᾶς ὁ λαὸς
  english_pob_choice: all the people have known
  chosen_spanish: todo el pueblo ha conocido
  alternatives_spanish:
  - todo el pueblo conoció
  - todo el pueblo ha sabido
  lexicon: LSJ
  rationale: El aoristo puede expresarse en español con perfecto para señalar una fama establecida que perdura hasta el presente. 'Todo el pueblo' refleja πᾶς ὁ λαός de modo natural.
- source_word: τὴν σύνεσίν σου
  english_pob_choice: your understanding
  chosen_spanish: tu entendimiento
  alternatives_spanish:
  - tu discernimiento
  - tu inteligencia
  lexicon: LSJ
  rationale: σύνεσις denota comprensión, juicio o discernimiento. 'Entendimiento' es amplio, sobrio y mantiene la distinción con 'sabiduría'.
- source_word: καθότι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - puesto que
  lexicon: LSJ
  rationale: La conjunción introduce la razón por la cual el pueblo ha reconocido su entendimiento. 'Porque' es la equivalencia más directa y clara en español.
- source_word: τὸ πλάσμα τῆς καρδίας σου
  english_pob_choice: the disposition of your heart
  chosen_spanish: la disposición de tu corazón
  alternatives_spanish:
  - la formación de tu corazón
  - la inclinación de tu corazón
  - el molde de tu corazón
  lexicon: LSJ
  rationale: πλάσμα alude a algo formado o modelado; en este contexto, la imagen se refiere al sesgo interno o configuración moral del corazón. 'Disposición' comunica bien esa forma interior sin borrar la metáfora bíblica del corazón.
- source_word: ἀγαθόν
  english_pob_choice: is good
  chosen_spanish: es buena
  alternatives_spanish:
  - es buena y recta
  - es noble
  lexicon: LSJ
  rationale: ἀγαθός expresa una valoración moral amplia. 'Buena' es la forma más directa y menos interpretativa, además de concordar con 'disposición' en femenino.
theological_decisions:
- issue: 'Antropología bíblica: el ''corazón'' como centro interior'
  english_pob_reading: Retained 'heart' literally in 'the disposition of your heart'
  chosen_spanish_reading: Se conserva 'corazón' literalmente en 'la disposición de tu corazón'
  alternative_spanish_readings:
  - la disposición de tu mente
  - tu carácter es bueno
  rationale: El versículo usa el lenguaje bíblico convencional del corazón como centro de inclinación y juicio. Mantener 'corazón' preserva ese marco antropológico, mientras 'disposición' ayuda a explicitar el sentido.
  doctrine_reference: 'DOCTRINE.md: Preserve source meaning and avoid paraphrase beyond what the text warrants.'
translation_notes:
  revision_awareness: Seguí la revisión inglesa más reciente, que prefirió una formulación más natural en tiempo pasado simple ('did not become evident') sin cambiar el sentido. En español, 'no se hizo evidente' mantiene ese ajuste de fluidez y el contraste temporal establecido por el griego.
  spanish_consistency_notes:
  - Se mantuvo 'sabiduría' para σοφία y 'entendimiento' para σύνεσις para no colapsar dos términos distintos.
  - Se eligió 'corazón' como término antropológico estable, evitando sustituirlo por 'mente' o 'carácter' salvo en la nota explicativa.
  - Se usó 'antes bien' para reflejar mejor el giro contrastivo de ἀλλʼ que un simple 'sino' en este contexto.
