  - Se usa «amor leal» para חסד, evitando sustituirlo por términos eclesiásticos menos transparentes.
  - Se conserva «verdad» en el texto principal para אמת, con nota de la alternativa «fidelidad».
  - La puntuación reproduce el paralelismo y la vocación directa del verso en español natural.
