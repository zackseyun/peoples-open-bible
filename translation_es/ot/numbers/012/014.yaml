revisions:
- from: 'Y Yahvé dijo a Moisés[a]: «Si su padre le hubiera escupido en el rostro, ¿no quedaría avergonzada por siete días? Que quede encerrada fuera del campamento por siete días[b], y después será traída de nuevo al campamento».'
  to: 'Y Yahvé dijo a Moisés: «Si su padre le hubiera escupido en el rostro, ¿no quedaría deshonrada[a] por siete días? Que quede encerrada fuera del campamento por siete días[b], y después será readmitida».'
  rationale: Se corrige el anclaje de la nota [a] para que corresponda al término derivado de תִכָּלֵם, y se ajusta «avergonzada» a «deshonrada» en el texto principal para reflejar mejor el matiz social de desgracia señalado en el rastro inglés, dejando «avergonzada» como alternativa válida en nota. Además, se mejora la cláusula final con «será readmitida», que suena más natural en español y conserva mejor la idea de restauración comunitaria implícita en תֵּאָסֵף. La nota [b] se mantiene como alternativa más literal de ‘reunida’.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:32:33Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del hebreo y del rastro POB en los puntos principales: Yahvé, la condición hipotética del padre que escupe, la vergüenza/deshonra por siete días, el encierro fuera del campamento y la reintegración posterior. Sin embargo, hay dos desajustes menores: el marcador [a] está mal anclado en «Moisés» aunque la nota trata la alternativa de תִכָּלֵם, y la cláusula final «será traída de nuevo al campamento» es fiel pero puede alinearse mejor con el pasivo/restaurativo de תֵּאָסֵף con una formulación más natural como «será readmitida».'
  spanish_quality_summary: El español es claro, digno y ampliamente legible. «En el rostro», «fuera del campamento» y «Que quede encerrada» funcionan bien. La frase final del borrador suena algo mecánica; «será readmitida» o «será recibida de nuevo» expresa mejor la restauración comunitaria en español bíblico natural. También debe corregirse la colocación de la nota [a] para evitar confusión editorial.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה -> «Yahvé» correctamente; el resto del léxico principal está bien representado. No hay conflicto con glosario teológico. La alternativa de תֵּאָסֵף puede conservarse en nota como «será reunida de nuevo», pero el texto principal conviene ajustarlo a una forma más idiomática de reintegración.'
  issues:
  - severity: medium
    issue: El marcador de nota [a] está colocado en «Moisés» en vez de en la expresión correspondiente a תִכָּלֵם.
    rationale: La nota [a] ofrece la alternativa «¿no quedaría avergonzada por siete días?», por lo que debe anclarse en «avergonzada»/«deshonrada», no en el nombre propio. Así se preserva la trazabilidad entre nota y decisión léxica.
  - severity: low
    issue: La cláusula final «será traída de nuevo al campamento» es comprensible pero algo rígida en español.
    rationale: El hebreo תֵּאָסֵף apunta a ser recogida/recibida de nuevo en la comunidad. «Será readmitida» expresa con más naturalidad la restauración comunitaria sin perder el pasivo ni el contexto de reingreso.
