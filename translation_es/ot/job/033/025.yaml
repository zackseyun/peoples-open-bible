translation:
  language: es
  text: Su carne se vuelve más lozana que en su juventud[a]; vuelve a los días de su vigor juvenil[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su carne se hace lozana como la de un muchacho» o «su carne se vuelve más lozana que la de un joven». El verbo hebreo es raro, y la comparación con la juventud puede entenderse de maneras ligeramente distintas.
    reason: lexical_alternative
  - marker: b
    text: O «vuelve a los días de su juventud». El sustantivo hebreo puede denotar la juventud misma o el vigor asociado con ella.
    reason: lexical_alternative
lexical_decisions:
- source_word: רֻטֲפַשׁ
  english_pob_choice: becomes fresher
  chosen_spanish: se vuelve más fresca
  alternatives_spanish:
  - es hecha fresca
  - se renueva
  - se vuelve juvenil
  lexicon: HALOT
  rationale: El verbo raro expresa que la carne vuelve a quedar fresca o turgente. «Se vuelve más fresca» conserva el sentido físico concreto y la idea de recuperación de vigor sin introducir una interpretación más abstracta como «se renueva».
- source_word: בְּשָׂרוֹ
  english_pob_choice: his flesh
  chosen_spanish: su carne
  alternatives_spanish:
  - su cuerpo
  lexicon: HALOT
  rationale: «Carne» es el equivalente directo y mantiene el énfasis corporal del hebreo. «Cuerpo» suaviza el tono y pierde parte de la concreción léxica.
- source_word: מִנֹּעַר
  english_pob_choice: than in youth
  chosen_spanish: que en su juventud
  alternatives_spanish:
  - desde su juventud
  - más que la de un muchacho
  lexicon: HALOT
  rationale: En contexto comparativo, la frase expresa que su carne está más fresca que en la juventud. «Que en su juventud» transmite esa comparación con naturalidad en español.
- source_word: יָשׁוּב
  english_pob_choice: he returns
  chosen_spanish: vuelve
  alternatives_spanish:
  - regresa
  - se restaura
  lexicon: HALOT
  rationale: El verbo puede referirse al sujeto personal en continuidad con el contexto. «Vuelve» es breve, natural y fiel; evita convertir el verso en una formulación más interpretativa como «se restaura».
- source_word: לִימֵי
  english_pob_choice: to the days of
  chosen_spanish: a los días de
  alternatives_spanish:
  - para los días de
  lexicon: HALOT
  rationale: La construcción constructa se vierte de forma directa como «a los días de», preservando la imagen temporal del hebreo.
- source_word: עֲלוּמָיו
  english_pob_choice: his youthful vigor
  chosen_spanish: su vigor juvenil
  alternatives_spanish:
  - su juventud
  - su mocedad
  lexicon: HALOT
  rationale: El sustantivo no señala solo la edad cronológica, sino la condición o energía de la juventud. «Vigor juvenil» comunica esa fuerza vital con claridad en español.
translation_notes:
  revision_awareness: El texto inglés POB mantiene dos notas alternativas por la rareza del verbo y por la amplitud semántica de עֲלוּמָיו; la versión española conserva esas tensiones con notas equivalentes y evita resolverlas de manera excesivamente interpretativa.
  spanish_consistency_notes:
  - Se mantiene «carne» para בשר por consistencia con el valor físico concreto del hebreo.
  - «Vigor juvenil» reproduce la decisión inglesa de no reducir עֲלוּמָיו a mera cronología.
  - La puntuación con dos cláusulas separadas por punto y coma refleja bien el paralelismo del hebreo y facilita lectura litúrgica o devocional.
