translation:
  language: es
  text: No permitió que ningún hombre los oprimiera; reprendió a reyes por causa de ellos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por ellos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנִּיחַ
  english_pob_choice: allowed
  chosen_spanish: permitió
  alternatives_spanish:
  - dejó
  - consintió
  - autorizó
  lexicon: HALOT
  rationale: 'El causativo de נוח expresa aquí la idea de permitir o dejar que ocurra algo. «Permitió» es natural en español y conserva la negativa del hebreo: Dios no dio permiso para que sucediera la opresión.'
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: ningún hombre
  alternatives_spanish:
  - nadie
  - ninguna persona
  - ningún ser humano
  lexicon: HALOT
  rationale: El hebreo usa un singular genérico. «Ningún hombre» mantiene ese valor representativo y sigue la decisión inglesa de conservar la singularidad genérica, sin volverlo colectivo.
- source_word: לְעָשְׁקָם
  english_pob_choice: to oppress them
  chosen_spanish: los oprimiera
  alternatives_spanish:
  - los maltratara
  - los explotara
  - les hiciera injusticia
  lexicon: HALOT
  rationale: עָשַׁק denota opresión o trato abusivo. «Oprimiera» conserva la fuerza semántica general y encaja de manera directa con la construcción negativa del verso.
- source_word: וַיּוֹכַח
  english_pob_choice: he rebuked
  chosen_spanish: reprendió
  alternatives_spanish:
  - reprochó
  - corrigió
  - censuró
  lexicon: HALOT
  rationale: יכח aquí apunta a una reprensión verbal dirigida a reyes. «Reprendió» es idiomático, fuerte y fiel al valor de censura del verbo.
- source_word: עֲלֵיהֶם
  english_pob_choice: on their account
  chosen_spanish: por causa de ellos
  alternatives_spanish:
  - por su causa
  - a favor de ellos
  - en atención a ellos
  lexicon: HALOT
  rationale: La preposición עַל con sufijo puede expresar relación causal o referencial. «Por causa de ellos» mantiene esa relación sin forzar una sola paráfrasis interpretativa.
- source_word: מְלָכִים
  english_pob_choice: kings
  chosen_spanish: reyes
  alternatives_spanish:
  - monarcas
  - gobernantes
  lexicon: HALOT
  rationale: El sustantivo significa literalmente reyes. «Reyes» es la equivalencia directa y más transparente en español.
translation_notes:
  revision_awareness: Se corrigió la validación anterior incorporando el marcador [a] directamente en el texto español, en el lugar correspondiente a la alternativa semántica de עֲלֵיהֶם.
  spanish_consistency_notes:
  - Se conservó el singular genérico de אָדָם con «ningún hombre», en línea con la lectura auditada.
  - Se evitó «SEÑOR» para el nombre divino porque este versículo no contiene el Tetragrámaton ni una cita explícita del mismo.
  - El cierre «por causa de ellos» mantiene abierta la alternativa causal («por su causa») señalada en la nota.
