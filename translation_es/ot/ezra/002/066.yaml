lexical_decisions:
- source_word: סוּסֵיהֶם
  english_pob_choice: their horses
  chosen_spanish: sus caballos
  alternatives_spanish:
  - sus caballos
  - los caballos de ellos
  lexicon: HALOT
  rationale: סוּס designa 'caballo'; el sufijo plural de 3.ª persona indica posesión. En español, 'sus caballos' es la forma natural y exacta para expresar esa relación sin añadir énfasis innecesario.
- source_word: שְׁבַע מֵאוֹת שְׁלֹשִׁים וְשִׁשָּׁה
  english_pob_choice: seven hundred thirty-six
  chosen_spanish: setecientos treinta y seis
  alternatives_spanish:
  - setecientos y treinta y seis
  lexicon: sistema numeral hebreo
  rationale: La secuencia numeral hebrea expresa el total 736. En español, la forma estándar y clara es 'setecientos treinta y seis', sin 'y' entre centenas y decenas.
- source_word: פִּרְדֵיהֶם
  english_pob_choice: their mules
  chosen_spanish: sus mulos
  alternatives_spanish:
  - sus mulas de carga
  - sus animales de carga
  lexicon: HALOT
  rationale: פֶּרֶד significa 'mulo'. 'Mulos' conserva la correspondencia léxica precisa; las alternativas amplían o suavizan indebidamente el término.
- source_word: מָאתַיִם אַרְבָּעִים וַחֲמִשָּׁה
  english_pob_choice: two hundred forty-five
  chosen_spanish: doscientos cuarenta y cinco
  alternatives_spanish:
  - doscientos y cuarenta y cinco
  lexicon: sistema numeral hebreo
  rationale: La cadena numeral hebrea indica el total 245. En español, 'doscientos cuarenta y cinco' es la formulación natural y fiel.
