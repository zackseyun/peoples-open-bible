translation:
  text: And do what is pleasing to her[a], and do not grieve her. Remember, child, that she faced many dangers because of you while you were in the womb; when she dies[b], bury her beside me in one grave.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'she has seen many dangers because of you in the womb,' an idiom referring to the dangers she underwent during pregnancy and childbirth.
    reason: lexical_alternative
  - marker: b
    text: Or 'in the same tomb.'
    reason: alternative_reading
lexical_decisions:
- source_word: ποίηει τὸ ἀρεστὸν αὐτῇ
  chosen: do what is pleasing to her
  alternatives:
  - do what pleases her
  - do what is acceptable to her
  lexicon: BDAG
  rationale: ἀρεστός denotes what is pleasing or acceptable. The dative αὐτῇ indicates the mother as the one pleased. 'Do what is pleasing to her' is natural English while staying close to the Greek.
- source_word: μὴ λυπήσῃς αὐτήν
  chosen: do not grieve her
  alternatives:
  - do not sadden her
  - do not distress her
  lexicon: BDAG
  rationale: λυπέω commonly means to cause sorrow, grief, or distress. 'Grieve' preserves the emotional weight and works idiomatically in direct exhortation.
- source_word: μνήσθητι, παιδίον
  chosen: Remember, child
  alternatives:
  - Remember, my child
  - Remember, son
  lexicon: BDAG
  rationale: παιδίον is a tender address meaning child or little child. Since the Greek here lacks an explicit possessive, 'child' is the most textually restrained rendering; 'my child' is possible by implication, and 'son' would over-specify gender beyond the lexical form.
- source_word: πολλοὺς κινδύνους ἑόρακεν
  chosen: she faced many dangers
  alternatives:
  - she has seen many dangers
  - she endured many dangers
  lexicon: BDAG
  rationale: Literally 'she has seen many dangers,' but in context the idiom points to undergoing or encountering dangers in pregnancy and childbirth. 'Faced many dangers' preserves the sense without wooden literalism.
- source_word: ἐπὶ σοὶ ἐν τῇ κοιλίᾳ
  chosen: because of you while you were in the womb
  alternatives:
  - on your account in the womb
  - for you in the belly
  lexicon: BDAG
  rationale: ἐπὶ σοὶ here is best taken causally, 'because of you' or 'on your account,' and ἐν τῇ κοιλίᾳ refers to the womb. The phrase recalls the dangers the mother experienced during pregnancy.
- source_word: ὅταν ἀποθάνῃ
  chosen: when she dies
  alternatives:
  - whenever she dies
  lexicon: BDAG
  rationale: ὅταν with the subjunctive expresses a future contingency. In English, 'when she dies' is the natural equivalent in this context of anticipated future death.
- source_word: θάψον αὐτὴν παρʼ ἐμοὶ
  chosen: bury her beside me
  alternatives:
  - bury her by me
  - bury her near me
  lexicon: BDAG
  rationale: παρά with the dative here indicates proximity. In burial context, 'beside me' clearly conveys interment next to the speaker.
- source_word: ἐν ἑνὶ τάφῳ
  chosen: in one grave
  alternatives:
  - in the same tomb
  - in a single grave
  lexicon: BDAG
  rationale: The phrase explicitly says 'in one grave/tomb,' emphasizing shared burial. 'One grave' is direct and clear; 'same tomb' is a valid interpretive alternative.
