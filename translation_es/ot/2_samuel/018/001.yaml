translation:
  language: es
  text: Entonces David pasó revista al pueblo[a] que estaban con él y puso sobre ellos jefes de mil y jefes de cien.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «el pueblo»; aquí se refiere a la fuerza que estaba con David. El verbo «pasó revista» también puede entenderse como «contó» o «revisó» en sentido militar, no solo como un simple conteo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפְקֹד
  english_pob_choice: mustered
  chosen_spanish: pasó revista
  alternatives_spanish:
  - musteró
  - contó
  - revisó
  lexicon: HALOT
  rationale: En contexto militar, פקד puede expresar revisar, pasar revista u organizar tropas, no solo contar. «Pasó revista» conserva el matiz militar-administrativo con naturalidad en español.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - las tropas
  - el ejército
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «el pueblo». Aunque se refiere a la fuerza de David, «el pueblo» mantiene el wording del hebreo y sigue siendo comprensible en contexto.
- source_word: אֲשֶׁר אִתּוֹ
  english_pob_choice: who were with him
  chosen_spanish: que estaba con él
  alternatives_spanish:
  - que estaban con él
  - que lo acompañaban
  - bajo su mando
  lexicon: HALOT
  rationale: La cláusula relativa se vierte de forma directa. «Que estaba con él» reproduce la relación de compañía sin añadir estructura jerárquica que el hebreo no explicita aquí.
- source_word: וַיָּשֶׂם עֲלֵיהֶם
  english_pob_choice: appointed over them
  chosen_spanish: puso sobre ellos
  alternatives_spanish:
  - nombró sobre ellos
  - los puso al mando
  - los estableció sobre ellos
  lexicon: HALOT
  rationale: שׂים con עַל puede significar poner o designar a alguien sobre otros. «Puso sobre ellos» refleja de manera cercana el hebreo; el contexto militar aclara que se trata de asignación de autoridad.
- source_word: שָׂרֵי
  english_pob_choice: commanders
  chosen_spanish: jefes
  alternatives_spanish:
  - comandantes
  - capitanes
  - oficiales
  lexicon: HALOT
  rationale: שׂר denota un líder o funcionario. Aquí, «jefes» funciona bien en español para el paralelismo militar y evita una posible sobreespecificación moderna; «comandantes» queda como alternativa más explícita.
- source_word: אֲלָפִים
  english_pob_choice: thousands
  chosen_spanish: de mil
  alternatives_spanish:
  - de millares
  - de mil hombres
  - de unidades de mil
  lexicon: HALOT
  rationale: En esta fórmula militar fija, el hebreo usa el numeral plural «mil». «Jefes de mil» reproduce la estructura de manera transparente y reconocible en español.
- source_word: מֵאוֹת
  english_pob_choice: hundreds
  chosen_spanish: de cien
  alternatives_spanish:
  - de centenas
  - de cien hombres
  - de unidades de cien
  lexicon: HALOT
  rationale: Se conserva el paralelismo con «mil». «Jefes de cien» refleja la expresión militar-administrativa del hebreo sin necesidad de ampliar el texto.
translation_notes:
  revision_awareness: Se revisó el sentido militar de פקד a la luz del contexto inmediato y del audit trail inglés, manteniendo la fórmula hebrea de «jefes de mil» y «jefes de cien» sin introducir una paráfrasis más amplia.
  spanish_consistency_notes:
  - Se mantiene «David» como nombre propio y la sintaxis narrativa simple del hebreo.
  - Se conservó el paralelismo numérico «mil / cien» para reflejar la estructura del original.
  - Se evitó «SEÑOR» u otras sustituciones no pertinentes porque este versículo no contiene el nombre divino.
