translation:
  language: es
  text: '1[a]. Ahora pues, hijos míos, también ustedes amen a Yahvé, el Dios del cielo y de la tierra, y guarden sus mandamientos, imitando al hombre bueno y piadoso José. 2. Y que su mente esté puesta en lo que es bueno, como me conocen. Porque el que tiene la mente recta lo ve todo rectamente. 3. Teman a Yahvé y amen al prójimo; y si los espíritus de Beliar los empujan a toda aflicción mala, ciertamente no los dominarán, así como no dominaron a José mi hermano. 4. Cuántos hombres quisieron matarlo, y Dios lo amparó[b]. Pues el que teme a Dios y ama a su prójimo no puede ser herido por el espíritu de Beliar, estando amparado por el temor de Dios. 5. Y no puede ser sometido por las intrigas de hombres ni por fieras, siendo ayudado por el Señor mediante el amor que tiene hacia su prójimo. 6. Pues también José rogó a nuestro padre que orase por sus hermanos, para que el Señor no les imputara pecado, porque habían obrado mal contra él. 7. Y así clamó Jacob: «Oh hijo bueno, has conmovido las
    entrañas de Jacob tu padre»; y abrazándolo, lo seguía besando por dos horas, diciendo: 8. «Se cumplirá sobre ti la profecía celestial».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos testigos amplían el v. 5 con redacción sobre fieras o un 'espíritu aéreo', reflejando inestabilidad textual en la descripción de los poderes hostiles.
    reason: textual_variant
  - marker: b
    text: O 'Se cumplirá la profecía del cielo respecto a ti'. La preposición varía ligeramente en los testigos.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀγαπήσατε
  english_pob_choice: love
  chosen_spanish: amar
  alternatives_spanish:
  - mostrar amor a
  lexicon: BDAG
  rationale: Imperativo estándar de ἀγαπάω; 'amar' conserva la fuerza ética y del pacto sin paráfrasis.
- source_word: φυλάξατε ἐντολάς
  english_pob_choice: keep his commandments
  chosen_spanish: guardar sus mandamientos
  alternatives_spanish:
  - observar sus mandamientos
  - cumplir sus mandamientos
  lexicon: BDAG
  rationale: '''Guardar'' es idiomático y fiel para el lenguaje de mandamiento en contextos exhortativos.'
- source_word: μιμούμενοι
  english_pob_choice: imitating
  chosen_spanish: imitando
  alternatives_spanish:
  - siguiendo el ejemplo de
  lexicon: BDAG
  rationale: Conserva el sentido participial y la fuerza parenética de la imitación moral.
- source_word: διάνοια
  english_pob_choice: mind
  chosen_spanish: mente
  alternatives_spanish:
  - entendimiento
  - disposición
  lexicon: BDAG
  rationale: En este capítulo el término denota orientación moral-intelectual; 'mente' mantiene estable el hilo temático repetido.
- source_word: εἰς τὸ ἀγαθόν
  english_pob_choice: set on what is good
  chosen_spanish: puesta en lo que es bueno
  alternatives_spanish:
  - hacia el bien
  - para lo bueno
  lexicon: BDAG
  rationale: Una traducción algo idiomática que conserva el sentido direccional siendo natural en exhortación.
- source_word: ὀρθὴν ... ὀρθῶς
  english_pob_choice: right mind ... rightly
  chosen_spanish: mente recta ... rectamente
  alternatives_spanish:
  - mente correcta ... correctamente
  lexicon: BDAG
  rationale: Conserva la repetición retórica entre adjetivo y adverbio.
- source_word: πλησίον
  english_pob_choice: neighbor
  chosen_spanish: prójimo
  alternatives_spanish:
  - el cercano
  lexicon: BDAG
  rationale: Término ético establecido con fuerte resonancia escritural; mejor encaja con el contexto parenético.
- source_word: τὰ πνεύματα τοῦ Βελίαρ
  english_pob_choice: the spirits of Beliar
  chosen_spanish: los espíritus de Beliar
  alternatives_spanish:
  - los espíritus de Belial
  lexicon: BDAG
  rationale: El testimonio griego tiene el nombre propio Βελίαρ; transcribir conserva el idioma testamentario-apocalíptico.
- source_word: ἐκστήσωσι
  english_pob_choice: drive
  chosen_spanish: empujan
  alternatives_spanish:
  - arrojan
  - trastornan
  lexicon: LSJ
  rationale: En contexto de presión espiritual hostil hacia la maldad, 'empujan' mejor capta el movimiento coercitivo sin sobreinterpretar el matiz psicológico.
- source_word: κατακυριεύσωσιν
  english_pob_choice: rule over
  chosen_spanish: dominarán
  alternatives_spanish:
  - sojuzgarán
  - se enseñorearán de
  lexicon: BDAG
  rationale: Transmite señorío hostil siendo legible; la negación enfática se traduce 'ciertamente no'.
- source_word: ἐσκέπασεν
  english_pob_choice: sheltered
  chosen_spanish: amparó
  alternatives_spanish:
  - cubrió
  - protegió
  lexicon: BDAG
  rationale: Coincide con la imaginería protectora y mantiene coherencia con el motivo repetido de amparo.
- source_word: πληγῆναι
  english_pob_choice: be struck
  chosen_spanish: ser herido
  alternatives_spanish:
  - ser golpeado
  - ser herido
  lexicon: BDAG
  rationale: Conserva la fuerza verbal pasiva y el sentido de ser golpeado por poder hostil.
- source_word: σκεπαζόμενος
  english_pob_choice: being sheltered
  chosen_spanish: estando amparado
  alternatives_spanish:
  - siendo cubierto
  - siendo protegido
  lexicon: BDAG
  rationale: Conserva el vínculo participial con el cobijo protector de Dios.
- source_word: ἐπιβουλή
  english_pob_choice: plots
  chosen_spanish: intrigas
  alternatives_spanish:
  - maquinaciones
  - asechanzas
  lexicon: BDAG
  rationale: '''Intrigas'' encaja con la intención humana hostil en un contexto de advertencia testamentaria.'
- source_word: κατακυριευθῆναι
  english_pob_choice: be mastered
  chosen_spanish: ser sometido
  alternatives_spanish:
  - ser dominado
  - ser sojuzgado
  lexicon: BDAG
  rationale: Variado ligeramente del v. 3 por estilo en español manteniendo el campo semántico de dominación.
- source_word: ἐδεήθη
  english_pob_choice: begged
  chosen_spanish: rogó
  alternatives_spanish:
  - imploró
  - suplicó
  lexicon: BDAG
  rationale: Capta la petición ferviente con la fuerza emocional propia de la intercesión de José.
- source_word: λογίσηται ... ἁμαρτίαν
  english_pob_choice: reckon sin
  chosen_spanish: imputara pecado
  alternatives_spanish:
  - contara como pecado
  - tuviera por pecado
  lexicon: BDAG
  rationale: '''Imputar'' conserva la metáfora contable de λογίζομαι sin importar excesivamente jerga teológica posterior.'
- source_word: σπλάγχνα
  english_pob_choice: inward affection
  chosen_spanish: entrañas
  alternatives_spanish:
  - afecto entrañable
  - compasión
  - el corazón
  lexicon: BDAG
  rationale: El término denota afecto visceral profundo; 'entrañas' conserva ese sentido emocional encarnado mejor que la traducción más plana 'corazón'.
- source_word: περιλαβών
  english_pob_choice: embracing
  chosen_spanish: abrazándolo
  alternatives_spanish:
  - tomándolo en sus brazos
  lexicon: BDAG
  rationale: Traducción simple y fiel del gesto físico.
- source_word: κατεφίλει
  english_pob_choice: kept kissing
  chosen_spanish: seguía besándolo
  alternatives_spanish:
  - lo besaba repetidamente
  - lo cubría de besos
  lexicon: BDAG
  rationale: El sentido imperfecto/intensivo es importante; 'seguía besándolo' conserva la acción repetida.
- source_word: προφητεία οὐράνιος
  english_pob_choice: the heavenly prophecy
  chosen_spanish: la profecía celestial
  alternatives_spanish:
  - la profecía del cielo
  - el oráculo celestial
  lexicon: BDAG
  rationale: Traducción formal que conserva el registro testamentario elevado y el tono profético.
theological_decisions:
- issue: Referente de la agencia protectora en v. 4
  chosen_reading: El que teme a Dios y ama al prójimo está protegido del espíritu de Beliar por el temor de Dios como poder amparador.
  alternative_readings:
  - El temor de Dios es solo reverencia subjetiva
  - El texto se refiere a un espíritu aéreo en una variante
  rationale: La línea griega principal subraya estar 'amparado por el temor de Dios'; se conserva como idioma teológico propio del texto, no reducido a mera psicología.
  doctrine_reference: Conservar la tensión teológica antes que resolverla.
- issue: Lenguaje de intercesión en v. 6
  chosen_reading: José pide que el Señor no impute pecado a sus hermanos.
  alternative_readings:
  - José mismo perdona directamente sin referencia a la imputación divina
  - La línea es una expansión armonizadora posterior
  rationale: El testimonio griego enmarca explícitamente la misericordia de José como oración intercesora respecto a la imputación divina; se traduce honestamente sin armonización.
translation_notes:
  revision_awareness: El POB inglés fue revisado de 'mine has been' a 'mine is' (v. 2) para alinear con οἴδατε en presente. La versión española sigue 'está la mía'.
  spanish_consistency_notes:
  - Βελίαρ → 'Beliar'
  - Ἰωσήφ → 'José'
  - Ἰακώβ → 'Jacob'
  - διάνοια → 'mente'
  - πλησίον → 'prójimo'
  - σπλάγχνα → 'entrañas'
  - ἁμαρτία (λογίζομαι) → 'imputar pecado'
