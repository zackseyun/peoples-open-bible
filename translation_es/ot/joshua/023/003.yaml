- from: Y ustedes mismos han visto todo lo que Yahvé su Dios ha hecho a todas estas naciones delante de ustedes[a], porque Yahvé su Dios es quien ha peleado por ustedes.
  to: Y ustedes mismos han visto todo lo que Yahvé su Dios ha hecho a todas estas naciones de delante de ustedes[a], porque Yahvé su Dios es quien ha combatido por ustedes.
  rationale: Se ajusta «delante de ustedes» a «de delante de ustedes» para conservar mejor el matiz espacial-expulsivo de מִפְּנֵיכֶם, ya documentado en la auditoría inglesa y en la nota. También se mejora «ha peleado» a «ha combatido» por registro más digno y natural en español bíblico moderno, sin cambiar el sentido.
