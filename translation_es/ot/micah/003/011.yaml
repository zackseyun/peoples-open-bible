translation:
  language: es
  text: 'Sus líderes juzgan por un soborno, y sus sacerdotes enseñan por un precio, y sus profetas practican adivinación por dinero; sin embargo, se apoyan[a] en Yahvé, diciendo: «¿No está Yahvé en medio de nosotros? No vendrá sobre nosotros ningún desastre[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «confían en Yahvé». El hebreo lleva la imagen de apoyarse en alguien para recibir sostén.
    reason: lexical_alternative
  - marker: b
    text: O «No vendrá sobre nosotros la calamidad». El hebreo puede significar «mal» en sentido amplio, pero aquí se refiere al desastre o juicio que se acerca.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאשֶׁיהָ
  english_pob_choice: her leaders
  chosen_spanish: sus líderes
  alternatives_spanish:
  - sus jefes
  - sus cabezas
  - sus principales
  lexicon: HALOT
  rationale: El plural constructo con sufijo femenino se refiere a las autoridades dirigentes de la ciudad o comunidad. «Líderes» transmite el sentido idiomático con naturalidad en español y conserva la idea de autoridad política/judicial.
- source_word: בְּשֹׁחַד
  english_pob_choice: for a bribe
  chosen_spanish: por un soborno
  alternatives_spanish:
  - por cohecho
  - a cambio de soborno
  - por una coima
  lexicon: HALOT
  rationale: La preposición con שֹׁחַד expresa el motivo corruptor de su juicio. «Por un soborno» es claro, digno y conserva la fuerza de la venalidad.
- source_word: יִשְׁפֹּטוּ
  english_pob_choice: judge
  chosen_spanish: juzgan
  alternatives_spanish:
  - dictan sentencia
  - dan juicio
  - administran justicia
  lexicon: HALOT
  rationale: El verbo שׁפט aquí se refiere a decisiones judiciales de los dirigentes. «Juzgan» es conciso y fiel al contexto.
- source_word: כֹהֲנֶיהָ
  english_pob_choice: her priests
  chosen_spanish: sus sacerdotes
  alternatives_spanish:
  - sus sacerdotes
  - los sacerdotes de ella
  lexicon: HALOT
  rationale: La referencia pronominal femenina se mantiene de forma natural en español con «sus sacerdotes», conservando el paralelismo con los otros miembros corruptos.
- source_word: בִּמְחִיר
  english_pob_choice: for a price
  chosen_spanish: por un precio
  alternatives_spanish:
  - a cambio de pago
  - por paga
  - por remuneración
  lexicon: HALOT
  rationale: מְחִיר indica precio o pago. «Por un precio» conserva el tono comercial de la corrupción sacerdotal y sigue de cerca la estructura hebrea.
- source_word: יוֹרוּ
  english_pob_choice: teach
  chosen_spanish: enseñan
  alternatives_spanish:
  - instruyen
  - dan instrucción
  - enseñan la ley
  lexicon: HALOT
  rationale: El causativo de ירה tiene aquí el sentido de instruir, especialmente en materia sacerdotal. «Enseñan» es natural en español y no fuerza una especificación mayor que el texto no exige.
- source_word: נְבִיאֶיהָ
  english_pob_choice: her prophets
  chosen_spanish: sus profetas
  alternatives_spanish:
  - los profetas de ella
  lexicon: HALOT
  rationale: Traducción directa del sustantivo con sufijo, manteniendo la tríada de oficios corruptos.
- source_word: בְּכֶסֶף
  english_pob_choice: for silver
  chosen_spanish: por dinero
  alternatives_spanish:
  - por plata
  - a cambio de dinero
  lexicon: HALOT
  rationale: כֶּסֶף literalmente es «plata», pero en español bíblico contemporáneo «por dinero» comunica mejor la idea sin perder el valor monetario. Se preserva la progresión de soborno/precio/dinero.
- source_word: יִקְסֹמוּ
  english_pob_choice: practice divination
  chosen_spanish: practican adivinación
  alternatives_spanish:
  - adivinan
  - hacen adivinación
  - practican encantamientos
  lexicon: HALOT
  rationale: קסם designa adivinación ilícita. «Practican adivinación» evita la ambigüedad de «adivinan» y mantiene la explicitud del acto denunciado.
- source_word: וְעַל־יְהוָה יִשָּׁעֵנוּ
  english_pob_choice: yet they lean on Yahweh
  chosen_spanish: sin embargo, se apoyan en Yahvé
  alternatives_spanish:
  - y se apoyan en Yahvé
  - pero confían en Yahvé
  - y se recuestan en Yahvé
  lexicon: HALOT
  rationale: El niphal de שׁען conserva la imagen de apoyarse/recostarse sobre alguien para sostén. «Se apoyan» preserva la metáfora; «sin embargo» expresa el contraste irónico con su corrupción.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: El Tetragrámaton se rinde como «Yahvé» conforme al criterio del proyecto para preservar el nombre divino y no sustituirlo por un título.
- source_word: הֲלוֹא
  english_pob_choice: Is not
  chosen_spanish: ¿No está...?
  alternatives_spanish:
  - ¿Acaso no está...?
  - ¿No es verdad que...?
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica de falsa seguridad. En español, «¿No está...?» reproduce bien esa forma interrogativa.
- source_word: בְּקִרְבֵּנוּ
  english_pob_choice: in our midst
  chosen_spanish: en medio de nosotros
  alternatives_spanish:
  - entre nosotros
  - en nuestra presencia
  lexicon: HALOT
  rationale: La expresión idiomática comunica mejor el sentido comunitario y de presencia que una versión más literal pero menos natural.
- source_word: לֹא תָבוֹא עָלֵינוּ רָעָה
  english_pob_choice: No disaster will come upon us
  chosen_spanish: No vendrá sobre nosotros el desastre
  alternatives_spanish:
  - No nos sobrevendrá calamidad
  - No vendrá sobre nosotros el mal
  - No nos alcanzará desastre
  lexicon: HALOT
  rationale: רָעָה aquí alude a calamidad o juicio inminente, no a mal moral. «Desastre» comunica con claridad el sentido profético de amenaza y juicio.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. Se mantiene el nombre propio divino como «Yahvé», siguiendo la decisión doctrinal del proyecto y evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido final de רָעָה
  english_pob_reading: disaster
  chosen_spanish_reading: el desastre
  alternative_spanish_readings:
  - la calamidad
  - el mal
  - la desgracia
  rationale: La negación se refiere al juicio o catástrofe venidera, no al mal moral. «Desastre» preserva el contenido profético y evita una lectura teológica inapropiada.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'Se siguió de cerca el paquete fuente hebreo y el audit trail en inglés, sin cambios respecto a la última revisión registrada: el consenso de revisión es alto y no se reportaron problemas. Se preservó la tensión lexical entre apoyo confiado y falsa seguridad en Yahvé, así como el valor de רָעָה como desastre/calamidad en contexto de juicio.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para el Tetragrámaton.
  - 'Se traduce la tríada paralela con sustantivos claros y registros congruentes: líderes / sacerdotes / profetas.'
  - 'Se conserva la progresión semántica de corrupción mediante dinero: soborno / precio / dinero.'
  - Se usa «se apoyan en» para reflejar la metáfora verbal de שׁען sin borrarla.
  - El cierre interrogativo se conserva como pregunta retórica con comillas y puntuación estándar del español.
