translation:
  language: es
  text: y en Hazar-sual, y en Beerseba[a] y sus aldeas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «y sus hijas», un modismo para las aldeas o asentamientos dependientes de una ciudad.
