review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: una selección deliberada de sacerdotes caracterizados por ἀμώμους y θελητὰς νόμου. Sin embargo, «celosos de la ley» no preserva tan bien como debería la decisión auditada del POB («devoted to the law») ni la nota inglesa que presenta «zealous for the law» como alternativa, no como elección principal. El resto del contenido está alineado con la fuente.'
  spanish_quality_summary: El español es claro y natural, pero «celosos de la ley» suena menos idiomático en este contexto que «devotos a la ley» o «entregados a la ley», y además puede sugerir defensa celosa más que adhesión voluntaria. «Sin mancha» es comprensible y digno; conviene ajustar la nota para reflejar mejor la doble posibilidad léxica de ἀμώμους y el valor alternativo de θελητὰς.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. «Sacerdotes» y «la ley» están bien. La principal cuestión léxica es θελητὰς: el POB inglés privilegia «devoted to», por lo que en español conviene una opción equivalente como «devotos a la ley», dejando «celosos de la ley» como alternativa en nota.'
  issues:
  - severity: medium
    issue: θελητὰς se tradujo como «celosos de» en el texto principal.
    rationale: El expediente inglés escogió «devoted to» como lectura principal y dejó «zealous for» como alternativa. «Celosos de» adelanta una alternativa en lugar de la opción principal auditada y desplaza el matiz de voluntad/adhesión a uno de fervor.
  - severity: low
    issue: La nota al pie no refleja con precisión la estructura de alternativas del POB inglés.
    rationale: 'La nota actual repite casi el texto principal («celosos de la ley») dentro de la alternativa. Conviene preservar mejor la alternativa doble: «sacerdotes sin defecto, celosos por la ley» o formulación equivalente, y explicar que el griego puede enfatizar tanto ausencia de defecto como compromiso ferviente.'
  revised_spanish_text: Y escogió sacerdotes sin mancha[a], devotos a la ley.
  revised_footnotes:
  - marker: a
    text: O «sacerdotes sin defecto, celosos por la ley». El griego puede enfatizar tanto la ausencia de defecto como el compromiso ferviente.
    reason: lexical_alternative
  revision_rationale: Se cambia «celosos de la ley» por «devotos a la ley» para seguir más de cerca la decisión principal del POB inglés para θελητὰς («devoted to»), manteniendo «celosos por la ley» como alternativa en la nota. Se conserva «sin mancha» porque representa bien ἀμώμους con su posible matiz ritual y moral.
