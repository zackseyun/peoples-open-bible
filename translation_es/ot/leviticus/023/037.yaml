review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura hebrea y conserva adecuadamente los términos clave: מוֹעֲדֵי = ''tiempos señalados'', יְהוָה = ''Yahvé'', תִּקְרְאוּ אֹתָם = ''proclamarán'', מִקְרָאֵי קֹדֶשׁ = ''convocaciones santas'', y la lista sacrificial básica. Sin embargo, ''ofrenda encendida'' no representa con suficiente precisión אִשֶּׁה, que aquí se refiere a una ofrenda hecha por fuego, no simplemente ''encendida''. Además, el pie de nota [a] está mal anclado en ''Yahvé'' en vez de la frase sacrificial correspondiente. La cola idiomática דְּבַר יוֹם בְּיוֹמוֹ está razonablemente captada, pero puede afinarse para reflejar mejor la idea de lo prescrito o correspondiente para cada día.'
  spanish_quality_summary: 'El español es claro y digno, pero hay dos mejoras importantes de legibilidad y precisión: mover la nota [a] al término correcto y sustituir ''ofrenda encendida'' por una formulación más fiel y natural, como ''ofrenda hecha por fuego''. También conviene suavizar ''la porción de cada día en su día'' a ''lo correspondiente a cada día en su día'' o equivalente, porque ''porción'' puede sonar demasiado material y menos prescriptivo que el hebreo.'
  glossary_alignment: Alineación fuerte con el glosario del proyecto en 'Yahvé', 'holocausto', 'ofrenda de grano' y 'libaciones'. La principal desviación es אִשֶּׁה, donde el rastro inglés revisado favorece 'offering by fire'; en español 'ofrenda hecha por fuego' preserva mejor esa decisión que 'ofrenda encendida'. No hay conflicto teológico que requiera adjudicación adicional.
  issues:
  - severity: high
    issue: La nota [a] está anclada a 'Yahvé' en lugar de a la expresión que traduce אִשֶּׁה.
    rationale: El contenido de la nota explica una alternativa para la ofrenda hecha por fuego, no para el nombre divino. Esto viola la disciplina de anclaje de notas y puede confundir al lector.
  - severity: high
    issue: '''Ofrenda encendida'' no refleja con suficiente precisión אִשֶּׁה.'
    rationale: El término hebreo denota una ofrenda presentada por medio del fuego. 'Encendida' puede sugerir solo que está ardiendo, sin expresar claramente la categoría sacrificial. 'Ofrenda hecha por fuego' o 'ofrenda por fuego' es más fiel.
  - severity: medium
    issue: '''La porción de cada día en su día'' suena algo opaco y material para דְּבַר יוֹם בְּיוֹמוֹ.'
    rationale: El modismo apunta a lo que corresponde o se requiere para cada día. 'Porción' no es imposible, pero 'lo correspondiente a cada día en su día' comunica mejor el valor prescriptivo del hebreo en español natural.
  revised_spanish_text: 'Estos son los tiempos señalados de Yahvé, que ustedes proclamarán como convocaciones santas, para presentar una ofrenda hecha por fuego[a] a Yahvé: un holocausto y una ofrenda de grano, un sacrificio y libaciones, lo correspondiente a cada día en su día[b].'
  revised_footnotes:
