revisions:
- from: Y sus habitantes estaban sin fuerzas[a]; quedaron atemorizados y avergonzados. Eran como la hierba del campo y el verdor tierno, como la hierba de los terrados[b], y como un campo antes de la espiga[c].
  to: Y sus habitantes estaban sin fuerzas[a]; quedaron consternados[b] y avergonzados. Eran como la hierba del campo y el verdor tierno, como la hierba de los terrados[c], y como un campo antes de que la mies esté en pie[d].
  rationale: Se corrige el anclaje de notas para que cada una corresponda al término fuente pertinente, se restaura la nota del modismo hebreo «cortos de mano», y se ajusta la última comparación para reflejar mejor «antes de la mies/grano en pie». También se suaviza «atemorizados» a «consternados», más cercano al POB inglés «dismayed» y al campo semántico documentado de חתו sin limitarlo al miedo.
  reviewer_model: gpt-5.4
