review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura escalonada del hebreo: acercarse por tribus, luego clan, luego casa, y finalmente individuo masculino. Conserva correctamente Yahvé para יְהוָה. Sin embargo, ''por casas'' debilita el sentido de בָּתִּים como unidades domésticas y puede leerse como edificios; además, el juego léxico documentado en el inglés sobre יִלְכְּדֶנּוּ/נָּה (''selects'' con nota alternativa ''takes/captures'') no está bien preservado en español, porque ''tome'' suena menos natural en esta secuencia y la nota alternativa inglesa no fue trasladada. También falta la nota sobre ''hombre por hombre'' que el rastro de auditoría inglés preserva expresamente.'
  spanish_quality_summary: 'La redacción es generalmente clara y digna, pero requiere pequeños ajustes para mayor naturalidad y precisión: ''por hogares'' o mejor ''por casas'' no basta; ''por hogares'' suena algo doméstico-moderno, mientras ''por familias'' confundiría con מִשְׁפָּחוֹת. ''Por casas'' es ambiguo. ''Escoja'' o ''seleccione'' es más natural que ''tome'' en español bíblico contemporáneo para contexto de señalamiento divino por sorteo. También conviene evitar una nota aislada sobre Yahvé, ya que no añade información necesaria al lector frente a la política del proyecto, mientras sí hace falta una nota léxica donde el inglés la documenta.'
  glossary_alignment: 'Alineado en lo principal con la terminología del proyecto: יְהוָה -> ''Yahvé'' correcto; מִשְׁפָּחוֹת -> ''clanes'' correcto; לַגְּבָרִים -> ''hombre por hombre'' aceptable y fiel al masculino distributivo. Debe ajustarse בָּתִּים a ''hogares'' o ''casas de familia/households''; se recomienda ''hogares'' en el texto para evitar lectura física. Para יִלְכְּדֶנּוּ/נָּה, mejor ''escoja'' con nota que preserve la alternativa ''tome''/''capture'' documentada.'
  issues:
