  to: 'Pero su esposa le dijo: «Si Yahvé hubiera tenido la intención de matarnos, no habría aceptado[a] de nuestra mano un holocausto y una ofrenda de cereal[b], ni nos habría mostrado todas estas cosas, ni ahora nos habría dicho cosas como estas».'
  rationale: Se elimina la nota [a] original porque no preserva una alternativa significativa del hebreo y no corresponde a una ambigüedad real en español. Se conserva la nota sobre «aceptado» como alternativa cultual de «tomar». Se añade la nota requerida para minḥah, siguiendo la auditoría inglesa. En el texto principal, se simplifica «tales cosas como estas» a «cosas como estas» para una lectura española más natural, manteniendo el sentido argumentativo del original.
