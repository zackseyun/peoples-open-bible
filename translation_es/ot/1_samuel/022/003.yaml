base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/022/003.yaml
  text: Then David went from there to Mizpeh of Moab[a], and he said to the king of Moab[b], “Please let my father and my mother come out and stay with you until I know what God will do for me.”
  footnotes:
  - marker: a
    text: Or 'Please let my father and my mother come out to you' or 'go out to you'; the Hebrew verb is literally 'go out/come out,' but the sense here is that they remain under the king of Moab's care.
    reason: lexical_alternative
  - marker: b
    text: Or 'what God will do to me' or 'what God will do with me.'
    reason: lexical_alternative
