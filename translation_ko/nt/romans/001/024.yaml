  chosen_korean: 욕되게 하도록
  alternatives_korean:
  - 욕보이도록
  lexicon: BDAG
  rationale: 명예 박탈의 함의를 「욕되게 하다」로 보존한다.
theological_decisions:
- issue: 1:24-27 단락의 강도 보존 — 완곡어법 회피
  chosen_reading: 정욕, 부정함, 욕되게 함의 직설적 어휘
  alternative_readings:
  - 욕망, 더러움, 명예롭지 못함의 완곡한 어휘
  rationale: 북성 원칙(DOCTRINE.md §1+§5)에 따라 1:24-27의 충격적 강도를 완곡화하지 않는다. 본문이 도덕적 진단을 직설적으로 내리는 부분이므로, 한국 전통 번역의 부드러운 어법보다 강한 어휘를 택한다.
  doctrine_reference: 'DOCTRINE.md §1+§5 — Rom 1:18-32 wrath: preserve specificity and force; do not euphemize'
