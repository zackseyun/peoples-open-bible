translation:
  language: es
  text: ¿Por qué tu corazón te arrebata, y por qué tus ojos fulguran[a]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «guiñan», «hacen señas» o quizá «ruedan» los ojos; el verbo hebreo es raro y su matiz preciso es incierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Qué
  lexicon: HALOT
  rationale: En este reproche retórico, la partícula interrogativa no pide información sino causa o motivo; «¿Por qué» conserva ese valor idiomático en español mejor que «¿Qué».
- source_word: יִקָּחֲךָ
  english_pob_choice: does ... carry you away
  chosen_spanish: te arrebata
  alternatives_spanish:
  - te toma
  - te lleva
  - te arrastra
  lexicon: HALOT
  rationale: El verbo base es «tomar/recibir», pero con «tu corazón» como sujeto expresa la idea figurada de que el corazón domina o se apodera de la persona. «Te arrebata» comunica bien ese movimiento interno y la fuerza del impulso sin volverlo mecánico.
- source_word: לִבֶּךָ
  english_pob_choice: your heart
  chosen_spanish: tu corazón
  alternatives_spanish:
  - tu mente
  - tu interior
  lexicon: HALOT
  rationale: Se preserva «corazón» porque en hebreo designa el centro interior de pensamiento y voluntad, no solo emoción. En español es transparente y mantiene la metáfora corporal.
- source_word: וּמַה
  english_pob_choice: and why
  chosen_spanish: y por qué
  alternatives_spanish:
  - y qué
  lexicon: HALOT
  rationale: 'La conjunción con la interrogativa funciona de modo idiomático como continuación del reproche: «y por qué». Traducir «y qué» perdería la fuerza causal del paralelo.'
- source_word: יִרְזְמוּן
  english_pob_choice: do ... flash
  chosen_spanish: parpadean
  alternatives_spanish:
  - guiñan
  - señalan
  - ruedan
  lexicon: HALOT
  rationale: El verbo es raro y su matiz preciso es incierto. En español, «parpadean» conserva la imagen ocular y admite el abanico semántico de un movimiento rápido de los ojos, sin fijar indebidamente un sentido demasiado específico.
- source_word: עֵינֶיךָ
  english_pob_choice: your eyes
  chosen_spanish: tus ojos
  alternatives_spanish:
  - tus miradas
  lexicon: HALOT
  rationale: Se mantiene el plural concreto «ojos» para conservar la imaginería física del hebreo y la acusación directa del verso.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y el audit trail inglés: conserva el paralelismo interrogativo, mantiene «corazón» como metáfora del interior humano y registra en nota la incertidumbre léxica del verbo raro sobre los ojos. No se aplicaron revisiones posteriores al pasaje en el paquete fuente.'
  spanish_consistency_notes:
  - Se usa «corazón» en sentido antropológico hebreo, no como mero afecto.
  - Se eligió un equivalente español idiomático para la pregunta causal sin perder el tono de reproche.
  - La ambigüedad del verbo ocular se preserva mediante una nota, evitando cerrar el sentido más de lo que permite la fuente.
