translation:
  language: es
  text: ¡Alaba a Yahvé[a], oh Jerusalén; alaba a tu Dios, oh Sion!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Yahvé». La traducción inglesa base usa una nota por el nombre divino; aquí se conserva el nombre en el texto principal, así que la nota sirve como referencia fuente/audit trail.'
    reason: source_note
lexical_decisions:
- source_word: שַׁבְּחִי
  english_pob_choice: Praise
  chosen_spanish: ¡Alaba!
  alternatives_spanish:
  - ¡Alabad!
  - ¡Glorifica!
  - ¡Exalta!
  lexicon: HALOT
  rationale: Imperativo femenino singular dirigido a Jerusalén personificada. En español, «alaba» expresa con naturalidad la exhortación poética y preserva el valor de alabanza del hebreo sin volverlo explicativo.
- source_word: יְרוּשָׁלִַם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Yerushaláyim
  lexicon: nombre propio
  rationale: Nombre propio bíblico con forma estándar en español, claro y reconocible para lectura eclesial.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: El nombre divino aparece explícitamente en el hebreo; en español se adopta la forma normalizada del proyecto, «Yahvé», para conservar el nombre del pacto sin enmascararlo con un título.
- source_word: הַֽלְלִ֖י
  english_pob_choice: praise
  chosen_spanish: alaba
  alternatives_spanish:
  - alabad
  - celebra
  - exalta
  lexicon: HALOT
  rationale: Verbo imperativo femenino singular en paralelismo con שַׁבְּחִי. Se repite «alaba» para sostener la sinonimia poética y una sintaxis fluida en español.
- source_word: אֱלֹהַ֣יִ/ךְ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Diosa
  - tu divinidad
  lexicon: HALOT
  rationale: La forma hebrea posee sufijo de 2.ª persona femenina singular y función singular referida al Dios de Israel. «Tu Dios» comunica ese valor con claridad y sin introducir matices ajenos.
- source_word: צִיּֽוֹן
  english_pob_choice: Zion
  chosen_spanish: Sion
  alternatives_spanish:
  - Zion
  lexicon: nombre propio
  rationale: Nombre propio bíblico en forma española tradicional y ampliamente entendida, adecuada al paralelismo con Jerusalén.
theological_decisions:
- issue: Renderización del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El hebreo usa יְהוָה directamente; por fidelidad auditada al texto fuente y coherencia con la política del proyecto, se conserva el nombre divino en español como «Yahvé».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el contexto auditado en inglés: dos imperativos femeninos singulares en paralelismo, dirigidos a Jerusalén/Sion personificadas, y el Tetragrámaton explícito. No se documentan revisiones pendientes ni tensiones textuales adicionales en el paquete fuente.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en el texto principal, conforme a la política española del proyecto, en lugar de «SEÑOR».
  - Se usan «Jerusalén» y «Sion» como nombres propios españoles estándar para conservar el tono bíblico y la inteligibilidad.
  - El paralelismo verbal se preserva con la repetición de «alaba».
