translation:
  language: es
  text: Así los llevó a su santa frontera,[a] esta montaña[b] que su mano derecha adquirió.[c][d]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «límite», «territorio» o «región». גְּבוּל puede referirse a una frontera, un límite o un territorio; aquí se ha optado por «frontera» en el texto principal.
    reason: lexical_alternative
  - marker: b
    text: O «monte». La expresión hebrea probablemente alude a la región montañosa dada a Israel y, en el contexto más amplio, puede evocar también Sion.
    reason: alternative_reading
  - marker: c
    text: O «compró», «poseyó» o «ganó». El verbo puede abarcar varios matices relacionados; aquí describe lo que la mano derecha de Dios aseguró.
    reason: lexical_alternative
  - marker: d
    text: O «Así los llevó a su territorio santo, esta montaña que su mano derecha adquirió».
    reason: previous_rendering
lexical_decisions:
- source_word: וַיְבִיאֵם
  english_pob_choice: So he brought them
  chosen_spanish: Y los llevó
  alternatives_spanish:
  - Y los trajo
  - Así los llevó
  lexicon: HALOT
  rationale: El hiphil de בוא expresa hacer venir o llevar. En español, «llevar» comunica bien el movimiento causado por Dios sin forzar una fórmula demasiado mecánica; el «Y» conserva la secuencia narrativa/poética del hebreo.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: hasta
  alternatives_spanish:
  - a
  - hacia
  lexicon: HALOT
  rationale: Aquí la preposición marca destino; «hasta» transmite con naturalidad la llegada al límite señalado y funciona bien con la imagen espacial del versículo.
- source_word: גְּבוּל
  english_pob_choice: border
  chosen_spanish: límite
  alternatives_spanish:
  - frontera
  - territorio
  - borde
  lexicon: HALOT
  rationale: גְּבוּל puede significar borde, límite, frontera o territorio. En español, «límite» preserva la idea de demarcación sin inclinarse demasiado hacia una lectura administrativa o moderna de frontera; se mantiene la tensión semántica del hebreo.
- source_word: קָדְשׁוֹ
  english_pob_choice: his holy
  chosen_spanish: santo
  alternatives_spanish:
  - de su santidad
  - sagrado
  - santo de
  lexicon: HALOT
  rationale: El hebreo forma la expresión «límite de su santidad» o «límite santo». En español, «su santo límite» reproduce de manera natural la relación posesiva y el rasgo de santidad sin añadir una explicación interpretativa en el cuerpo del texto.
- source_word: הַר זֶה
  english_pob_choice: this mountain
  chosen_spanish: esta montaña
  alternatives_spanish:
  - este monte
  - este cerro
  - esta colina
  lexicon: HALOT
  rationale: «Esta montaña» conserva el deíctico del hebreo y evita especificar en el texto principal si se trata de Sion, la región montañosa o el monte particular aludido por el salmo.
- source_word: קָנְתָה
  english_pob_choice: acquired
  chosen_spanish: adquirió
  alternatives_spanish:
  - compró
  - poseyó
  - ganó
  lexicon: HALOT
  rationale: קנה puede abarcar adquirir, comprar o poseer. «Adquirió» expresa la idea de obtención/posesión lograda sin restringir el verbo a un sentido comercial ni perder la fuerza de la acción divina.
- source_word: יְמִינוֹ
  english_pob_choice: his right hand
  chosen_spanish: su mano derecha
  alternatives_spanish:
  - su diestra
  - su brazo derecho
  lexicon: HALOT
  rationale: El hebreo dice literalmente «su mano derecha»; se conserva la imagen antropomórfica de poder y victoria en una forma clara y pública para el español moderno.
theological_decisions:
- issue: Referencia de «esta montaña»
  english_pob_reading: Retain the literal phrase 'this mountain' without specifying Zion or Canaan in the main text.
  chosen_spanish_reading: Mantener «esta montaña» sin identificarla explícitamente como Sion o Canaán en el texto principal.
  alternative_spanish_readings:
  - Sion
  - la región montañosa de Canaán
  - el monte heredado por Israel
  rationale: El hebreo no nombra de forma explícita el referente; el salmo puede evocar tanto la tierra como Sion. La traducción conserva la ambigüedad textual en vez de resolverla interpretativamente.
  doctrine_reference: Preservar la tensión interpretativa del texto fuente.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del audit trail que aclaró la estructura appositiva del verso y la última preferencia inglesa por «border» frente a «territory». La versión española evita duplicar preposiciones, conserva la apposición entre «su santo límite» y «esta montaña», y deja abierta la referencia de la montaña tal como lo hace el hebreo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se preservó el paralelismo poético con un enunciado breve y directo.
  - Se evitó sustituir el campo semántico de גְּבוּל por un término excesivamente técnico o eclesiástico.
  - Se usó lenguaje neutro y público, apto para lectura congregacional.
