revisions:
- from: Entonces el nazareo[a] se rasurará la cabeza de su consagración a la entrada de la tienda de reunión, y tomará el cabello de la cabeza de su consagración y lo pondrá sobre el fuego que está debajo del sacrificio de paz[b].
  to: Entonces el nazareo[a] se rasurará la cabeza de su consagración a la entrada de la tienda de reunión, y tomará el cabello de la cabeza de su consagración y lo pondrá sobre el fuego que está debajo del sacrificio de las ofrendas de paz[b].
  rationale: Se corrige 'del sacrificio de paz' a 'del sacrificio de las ofrendas de paz' para reflejar fielmente זֶבַח הַשְּׁלָמִים y la auditoría inglesa, que preservan la categoría sacrificial en plural. También se reescribe la nota [a] para que explique el término técnico 'nazareo' en vez de repetirlo como si fuera alternativa.
