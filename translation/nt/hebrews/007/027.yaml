id: HEB.7.27
reference: Hebrews 7:27
source:
  edition: SBLGNT
  text: ὃς οὐκ ἔχει καθ’ ἡμέραν ἀνάγκην, ὥσπερ οἱ ἀρχιερεῖς, πρότερον ὑπὲρ τῶν ἰδίων ἁμαρτιῶν θυσίας ἀναφέρειν, ἔπειτα τῶν τοῦ λαοῦ (τοῦτο γὰρ ἐποίησεν ἐφάπαξ ἑαυτὸν ἀνενέγκας)·
translation:
  text: who has no need[a], day after day, like the high priests, to offer up sacrifices first for his own sins and then for those of the people[d][c][b], for this he did once for all when he offered up himself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'daily.' The Greek idiom means 'day after day.'
    reason: lexical_alternative
  - marker: b
    text: 'Or ''the sins of the people.'' The Greek is elliptical: literally ''then those of the people,'' with ''sins'' understood from the previous phrase.'
    reason: lexical_alternative
  - marker: c
    text: Or 'once and for all.'
    reason: lexical_alternative
  - marker: d
    text: Or 'by offering himself' or 'having offered himself.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καθ’ ἡμέραν
  chosen: day after day
  alternatives:
  - daily
  - every day
  lexicon: BDAG
  rationale: The idiom expresses repeated daily necessity. 'Day after day' preserves the iterative force more naturally than a bare 'daily' while remaining readable modern English.
- source_word: ἀνάγκην
  chosen: need
  alternatives:
  - necessity
  - obligation
  lexicon: BDAG
  rationale: '''Need'' is the most natural English equivalent here and fits the construction ἔχει ἀνάγκην (''has need''). ''Necessity'' is more formal but less idiomatic in contemporary English.'
- source_word: ὥσπερ οἱ ἀρχιερεῖς
  chosen: like the high priests
  alternatives:
  - as the high priests
  lexicon: BDAG
  rationale: This marks comparison with the Levitical high priests. 'Like' is clear and idiomatic; the plural 'high priests' reflects the Greek.
- source_word: πρότερον ... ἔπειτα
  chosen: first ... and then
  alternatives:
  - first ... afterward
  - formerly ... then
  lexicon: BDAG
  rationale: The pair marks sequence in sacrificial order. 'First ... and then' is the clearest contemporary rendering.
- source_word: ὑπὲρ τῶν ἰδίων ἁμαρτιῶν
  chosen: for his own sins
  alternatives:
  - on behalf of his own sins
  - concerning his own sins
  lexicon: BDAG
  rationale: ὑπέρ with sacrificial language commonly means 'for/on behalf of.' 'For his own sins' is concise and idiomatic in context.
- source_word: θυσίας ἀναφέρειν
  chosen: to offer sacrifices
  alternatives:
  - to bring up sacrifices
  - to present sacrifices
  lexicon: BDAG
  rationale: In cultic contexts ἀναφέρω with θυσία means to offer sacrificially. 'Offer sacrifices' is the standard and accurate English rendering.
- source_word: τῶν τοῦ λαοῦ
  chosen: those of the people
  alternatives:
  - the sins of the people
  - those belonging to the people
  lexicon: BDAG
  rationale: The genitive phrase is elliptical, with 'sins' understood from the previous clause. Rendering 'those of the people' preserves the Greek ellipsis while remaining intelligible in English through the antecedent 'sins.'
- source_word: τοῦτο γὰρ ἐποίησεν
  chosen: for he did this
  alternatives:
  - for this he did
  - for he accomplished this
  lexicon: BDAG
  rationale: The clause refers back to the whole sacrificial action just described. 'He did this' is straightforward and preserves the anaphoric force of τοῦτο.
- source_word: ἐφάπαξ
  chosen: once for all
  alternatives:
  - once
  - once and for all
  lexicon: BDAG
  rationale: ἐφάπαξ emphasizes the singular, definitive character of Messiah's self-offering. 'Once for all' is both accurate and established in Hebrews; 'once and for all' is possible but slightly more interpretive in tone.
- source_word: ἑαυτὸν ἀνενέγκας
  chosen: when he offered up himself
  alternatives:
  - by offering up himself
  - having offered himself
  lexicon: BDAG
  rationale: The aorist participle is most naturally rendered as attendant circumstance or temporal means relative to the main verb. 'When he offered up himself' reads smoothly and preserves the sacrificial nuance of ἀναφέρω. 'Offered up' is retained because the object is himself, making the sacrificial self-giving explicit.
