translation:
  language: es
  text: Y Sebuel, hijo de Gersón, hijo de Moisés, fue jefe de las tesorerías[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tesoros» o «depósitos». El hebreo puede referirse a los lugares donde se guardan bienes valiosos o a los bienes mismos, según el contexto; aquí probablemente señala las tesorerías bajo supervisión administrativa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/שְׁבֻאֵל
  english_pob_choice: And Shebuel
  chosen_spanish: Y Sebuel
  alternatives_spanish:
  - Ahora Sebuel
  - Sebuel
  lexicon: HALOT
  rationale: Se conserva la conjunción narrativa inicial con «Y» para reflejar la cadena genealógica/administrativa del texto. El nombre propio se translitera al español como «Sebuel», forma más natural en español que una transliteración más rígida.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: En este contexto genealógico, בן expresa filiación directa; «hijo de» es la forma natural y fiel en español.
- source_word: גֵּרְשׁוֹם
  english_pob_choice: Gershom
  chosen_spanish: Gersón
  alternatives_spanish:
  - Gershom
  lexicon: HALOT
  rationale: Se usa la forma española tradicional del nombre bíblico, sin alterar la identidad del referente. Aunque el inglés conserva «Gershom», en español «Gersón» es más reconocido y lectoramente transparente.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: HALOT
  rationale: Nombre propio bíblico con forma española estándar.
- source_word: נָגִיד
  english_pob_choice: chief
  chosen_spanish: jefe
  alternatives_spanish:
  - líder
  - gobernante
  - príncipe
  - supervisor
  lexicon: HALOT
  rationale: נָגִיד señala a alguien puesto en autoridad. «Jefe» comunica bien la función de supervisión administrativa en español moderno sin introducir matices de realeza que «príncipe» podría sugerir, ni agregar «oficial» donde el hebreo no lo dice.
- source_word: עַל
  english_pob_choice: over
  chosen_spanish: sobre
  alternatives_spanish:
  - encargado de
  - al frente de
  lexicon: HALOT
  rationale: La preposición conserva la relación de autoridad/supervisión con una forma breve y natural en español.
- source_word: הָ/אֹצָרוֹת
  english_pob_choice: the treasuries
  chosen_spanish: los tesoros
  alternatives_spanish:
  - las tesorerías
  - los almacenes
  lexicon: HALOT
  rationale: אֹצָרוֹת puede referirse a lugares de depósito o a las riquezas depositadas. En español, «los tesoros» mantiene esa amplitud semántica sin forzar un tecnicismo administrativo. Dado el contexto de custodia de bienes, es una traducción aceptable y clara.
theological_decisions:
- issue: Rango de נָגִיד en una lista administrativa
  english_pob_reading: chief
  chosen_spanish_reading: jefe
  alternative_spanish_readings:
  - líder
  - supervisor
  - príncipe
  rationale: No se debe intensificar ni debilitar indebidamente el cargo. «Jefe» mantiene la idea de autoridad delegada y evita implicaciones monárquicas o eclesiásticas ajenas al contexto.
  doctrine_reference: Lexical semantics; no doctrinal dispute
- issue: Sentido de אֹצָרוֹת
  english_pob_reading: treasuries
  chosen_spanish_reading: tesoros
  alternative_spanish_readings:
  - tesorerías
  - almacenes
  - depósitos
  rationale: El hebreo admite tanto el lugar como el contenido almacenado. «Tesoros» conserva la ambigüedad útil sin imponer una interpretación demasiado técnica.
  doctrine_reference: Lexical semantics; context of temple administration
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa que ajustó «chief officer» a «chief» para mayor precisión léxica. En español, esto se refleja con «jefe», evitando añadir «oficial». También se respetó la decisión inglesa de mantener una relación genealógica directa y la ambigüedad de אֹצָרוֹת.
  spanish_consistency_notes:
  - Se prefirió «Y» para la conjunción narrativa inicial, consistente con el tono genealógico.
  - Se empleó una forma española estándar de nombres bíblicos cuando ayuda a la legibilidad («Gersón», «Moisés»).
  - No se añadió vocabulario eclesiástico posterior; el cargo se mantuvo en términos administrativos neutrales.
  - La nota al pie se ancla únicamente en el nombre donde existe una alternativa transliterada viable.
