translation:
  language: es
  text: De los animales limpios y de los animales que no son limpios[a], y de las aves y de todo lo que se arrastra sobre el suelo—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que son impuros». El hebreo dice más literalmente: «que no son limpios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִן
  english_pob_choice: from
  chosen_spanish: de
  alternatives_spanish:
  - desde
  - entre
  lexicon: HALOT
  rationale: La preposición marca procedencia o inclusión en una categoría. En español, ‘de’ reproduce bien la repetición catalogal del hebreo sin sonar forzado.
- source_word: בְּהֵמָה
  english_pob_choice: animals
  chosen_spanish: animales
  alternatives_spanish:
  - ganado
  - bestias
  lexicon: HALOT
  rationale: Aquí בְּהֵמָה funciona como categoría amplia en contraste con aves y seres que se arrastran. ‘Animales’ mantiene esa amplitud; ‘ganado’ sería demasiado específico.
- source_word: טְּהוֹרָה
  english_pob_choice: clean
  chosen_spanish: limpios
  alternatives_spanish:
  - puros
  lexicon: HALOT
  rationale: En este contexto ritual, ‘limpio’ es la equivalencia bíblica más natural en español. ‘Puros’ es posible, pero menos idiomático para la clasificación de animales.
- source_word: אֲשֶׁר אֵינֶנָּה טְהֹרָה
  english_pob_choice: that are not clean
  chosen_spanish: que no son limpios
  alternatives_spanish:
  - que son impuros
  - que no están limpios
  lexicon: HALOT
  rationale: El hebreo expresa la negación analíticamente (‘que no es/son limpio[s]’). Conservé esa forma para reflejar mejor la estructura del original; ‘impuros’ es más interpretativo.
- source_word: עוֹף
  english_pob_choice: birds
  chosen_spanish: aves
  alternatives_spanish:
  - pájaros
  - aves voladoras
  lexicon: HALOT
  rationale: ‘Aves’ es el equivalente general y más formal en español bíblico contemporáneo. ‘Pájaros’ suena más restringido y coloquial.
- source_word: כֹּל אֲשֶׁר רֹמֵשׂ
  english_pob_choice: everything that creeps
  chosen_spanish: todo lo que se arrastra
  alternatives_spanish:
  - todo ser que se arrastra
  - toda criatura que se arrastra
  lexicon: HALOT
  rationale: La imagen verbal del hebreo es importante; ‘se arrastra’ comunica el movimiento de pequeñas criaturas terrestres sin añadir taxonomía ajena al texto.
- source_word: עַל הָאֲדָמָה
  english_pob_choice: on the ground
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre el suelo
  - en la tierra
  lexicon: HALOT
  rationale: אֲדָמָה puede referirse a tierra/suelo como superficie habitada por estas criaturas. ‘Sobre la tierra’ conserva el alcance amplio y suena natural en español bíblico.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo y coincide con el auditoría inglesa en mantener la clasificación triple: animales limpios, animales no limpios, aves y todo lo que se arrastra sobre la tierra. Se conserva también la negación analítica del hebreo para no aplanar la distinción lexical.'
  spanish_consistency_notes:
  - Se usa ‘limpios’/‘no son limpios’ de manera consistente con la terminología ritual bíblica.
  - Se evita ‘ganado’ para בְּהֵמָה por ser demasiado estrecho en este contexto.
  - Se mantiene ‘aves’ para עוֹף y ‘se arrastra’ para רֹמֵשׂ, preservando el paralelismo de la lista.
