translation:
  language: es
  text: Y cuando se burlaron de él[a], le quitaron la púrpura y le pusieron sus propias ropas. Y lo sacaron para crucificarlo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la prenda púrpura» o «el manto púrpura». El griego dice simplemente «la púrpura», y la clase de prenda se entiende por el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «para que lo crucificaran». El griego usa una cláusula de propósito.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνέπαιξαν
  english_pob_choice: had mocked
  chosen_spanish: se burlaron de él
  alternatives_spanish:
  - lo ridiculizaron
  - lo escarnecieron
  lexicon: BDAG
  rationale: El verbo expresa trato burlón o despectivo. En español, «se burlaron de él» comunica bien la acción con un tono narrativo natural y solemne; «ridiculizaron» y «escarnecieron» son posibles, pero la primera puede sonar más interpretativa y la segunda más marcada por registro tradicional.
- source_word: ἐξέδυσαν
  english_pob_choice: stripped ... off
  chosen_spanish: le quitaron
  alternatives_spanish:
  - lo desnudaron de
  - le arrancaron
  lexicon: BDAG
  rationale: El verbo indica despojar de ropa. «Le quitaron» es idiomático en español y, con el complemento «la púrpura», conserva la idea de remover la prenda sin forzar una construcción pesada. «Lo desnudaron de» sería más literal pero menos natural; «le arrancaron» añade fuerza no exigida por el texto.
- source_word: πορφύραν
  english_pob_choice: the purple robe
  chosen_spanish: la púrpura
  alternatives_spanish:
  - el manto púrpura
  - la ropa púrpura
  lexicon: BDAG
  rationale: El griego dice literalmente «la púrpura», con la prenda entendida por el contexto. Para mantener esa tensión lexical sin resolverla de forma prematura, se conserva «la púrpura»; así no se impone «manto» o «ropa» donde el original no lo explicita.
- source_word: ἐνέδυσαν
  english_pob_choice: put ... on
  chosen_spanish: le pusieron
  alternatives_spanish:
  - lo vistieron
  - le colocaron
  lexicon: BDAG
  rationale: El verbo significa vestir o poner ropa a alguien. «Le pusieron» funciona naturalmente con «sus propias ropas» y reproduce la acción de revestirlo tras quitarle la púrpura. «Lo vistieron» también sería posible, pero puede sonar menos concreto en contraste con el despojo previo.
- source_word: τὰ ἱμάτια τὰ ἴδια
  english_pob_choice: his own clothes
  chosen_spanish: sus propias ropas
  alternatives_spanish:
  - sus propias vestiduras
  - sus ropas
  lexicon: BDAG
  rationale: ἱμάτια abarca ropa/vestiduras, y τὰ ἴδια añade posesión enfatizada. «Sus propias ropas» preserva ese énfasis de pertenencia sin volverlo litúrgico ni demasiado arcaico; «vestiduras» sería más elevado, pero menos inmediato para español moderno.
- source_word: ἐξάγουσιν
  english_pob_choice: they led him out
  chosen_spanish: lo sacaron
  alternatives_spanish:
  - lo llevaron afuera
  - lo condujeron
  lexicon: BDAG
  rationale: El presente histórico del griego se expresa de forma natural en pasado en español narrativo. «Lo sacaron» transmite la salida forzada hacia el lugar de ejecución; «lo condujeron» es más formal y «lo llevaron afuera» resulta menos preciso en el contexto.
- source_word: ἵνα σταυρώσωσιν αὐτόν
  english_pob_choice: to crucify him
  chosen_spanish: para crucificarlo
  alternatives_spanish:
  - a fin de crucificarlo
  - para que lo crucificaran
  lexicon: BDAG
  rationale: ἵνα con subjuntivo expresa finalidad. En español, «para crucificarlo» refleja esa finalidad de modo natural y mantiene la fuerza del propósito; «para que lo crucificaran» también es posible, pero suena un poco más explicativo y menos directo.
- source_word: σταυρόω
  english_pob_choice: crucify
  chosen_spanish: crucificar
  alternatives_spanish:
  - ejecutar en una cruz
  lexicon: BDAG
  rationale: El verbo nombra específicamente la ejecución por crucifixión. «Crucificar» es el equivalente directo y más preciso en español.
theological_decisions:
- issue: Descripción narrativa de la humillación de Jesús antes de la crucifixión
  english_pob_reading: Render the actions straightforwardly as historical mockery, removal of the mock royal garment, restoration of his own clothes, and leading him out for crucifixion.
  chosen_spanish_reading: Presentar las acciones de manera directa como burla, despojo de la púrpura, restitución de sus propias ropas y salida hacia la crucifixión.
  alternative_spanish_readings:
  - Introducir una paráfrasis explícita de humillación
  - Atenuar la violencia del despojo
  rationale: El versículo narra la humillación de forma sobria y concreta. La traducción debe conservar esa secuencia sin añadir interpretación devocional ni suavizar el acto de despojo o el propósito de ejecución.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §§1, 3, 6'
translation_notes:
  revision_awareness: La versión inglesa revisó «lead» a «led» para corregir el pasado narrativo; la redacción española ya usa pasado simple («sacaron») y conserva esa corrección temporal. También se mantuvo la decisión de expresar el propósito final con una construcción natural en español.
  spanish_consistency_notes:
  - Se preserva el contraste entre el despojo de la púrpura y la restitución de sus propias ropas.
  - «La púrpura» conserva la tensión lexical del griego sin resolver explícitamente la prenda, como en el audit trail inglés.
  - 'El pasado narrativo se mantiene uniforme: «se burlaron», «le quitaron», «le pusieron», «sacaron».'
  - El infinitivo final «crucificarlo» reproduce la finalidad de ἵνα sin calco duro.
