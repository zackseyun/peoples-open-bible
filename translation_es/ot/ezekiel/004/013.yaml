translation:
  language: es
  text: 'Y Yahvé dijo: «Así comerán los hijos de Israel su pan impuro[a] entre las naciones donde yo los expulsaré[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «inmundo». El término conserva el matiz de impureza ritual, especialmente en el contexto del exilio entre las naciones.
    reason: lexical_alternative
  - marker: b
    text: O «yo los desterraré» o «yo los dispersaré». El verbo expresa expulsión forzada; «expulsaré» conserva bien esa fuerza en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: Tetragrámaton / nombre divino
  rationale: Se mantiene el nombre propio del pacto con una forma española estable y reverente. "Yahvé" conserva la referencia directa al nombre divino sin recurrir al sustituto tradicional "SEÑOR".
- source_word: כָּכָה
  english_pob_choice: Thus
  chosen_spanish: Así
  alternatives_spanish:
  - De este modo
  - Así pues
  lexicon: HALOT
  rationale: La partícula introduce el modo o resultado de lo dicho. "Así" es natural en español y conserva la fuerza deíctica/formal del original sin sonar forzado.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión familiar y corporativa del hebreo. Aunque podría neutralizarse, "los hijos de Israel" refleja mejor la forma del texto fuente y su valor colectivo.
- source_word: לַחְמָם
  english_pob_choice: their bread
  chosen_spanish: su pan
  alternatives_spanish:
  - su alimento
  lexicon: HALOT
  rationale: '"Pan" reproduce el sustantivo concreto del hebreo y mantiene la imagen del acto simbólico. "Alimento" sería más general de lo que el contexto requiere.'
- source_word: טָמֵא
  english_pob_choice: unclean
  chosen_spanish: impuro
  alternatives_spanish:
  - inmundo
  - contaminado
  - defilecido
  lexicon: HALOT
  rationale: En español, "impuro" comunica bien la impureza ritual/covenantal de Ezequiel y evita la carga arcaica de "inmundo". La tensión entre impureza ritual y condición de exilio se preserva.
- source_word: בַּגּוֹיִם
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los pueblos
  - en medio de las naciones
  lexicon: HALOT
  rationale: La preposición y el sustantivo se expresan con una locución española natural que conserva el sentido de ubicación dispersa entre naciones extranjeras. "Entre las naciones" mantiene la referencia exílica sin introducir asociaciones posteriores.
- source_word: אַדִּיחֵם
  english_pob_choice: I will drive them
  chosen_spanish: yo los arrojaré
  alternatives_spanish:
  - yo los expulsaré
  - yo los dispersaré
  - yo los apartaré
  lexicon: HALOT
  rationale: El verbo causativo expresa expulsión/alejamiento forzado. "Arrojar" mantiene esa fuerza de desplazamiento decidido; "expulsar" también es posible, pero "arrojar" sigue de cerca la imagen verbal del envío lejos del lugar propio.
- source_word: שָׁם
  english_pob_choice: where
  chosen_spanish: a donde
  alternatives_spanish:
  - donde
  lexicon: HALOT
  rationale: Aunque literalmente es "allí", en español la relación con el verbo de expulsión se vuelve más natural con "a donde", sin perder el valor locativo del hebreo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se preserva el nombre propio del pacto, en coherencia con la política del proyecto de no enmascarar el Tetragrámaton. "Yahvé" es la forma española más asentada para este uso en el registro bíblico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Expresión corporativa בְנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: Se mantiene la forma masculina plural del hebreo, conservando la expresión corporativa y su tono genealógico/covenantal. No se neutraliza a "pueblo" porque el texto fuente usa una designación familiar específica.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Impureza ritual en contexto de exilio
  english_pob_reading: unclean
  chosen_spanish_reading: impuro
  alternative_spanish_readings:
  - inmundo
  - defilecido
  - contaminado
  rationale: '"Impuro" comunica la categoría ritual sin exagerar hacia una lectura meramente moral. En Ezequiel, la impureza está vinculada al exilio y a la vida entre naciones extranjeras, y la traducción conserva esa tensión.'
  doctrine_reference: Lexical theology of ritual impurity in Ezekiel
translation_notes:
  revision_awareness: El borrador inglés revisado cambió «So» por «Thus» para un registro más formal. La versión española adopta «Así», que conserva ese tono formal y la relación inferencial/manner del hebreo כָּכָה. También se ha mantenido la concreción de «bread/pan» y la fuerza verbal de «drive/arrojar» en coherencia con la revisión y el audit trail.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma española del nombre divino, coherente con el proyecto.
  - Se conserva «los hijos de Israel» para reflejar la expresión hebrea literal y su valor corporativo.
  - «Impuro» se usa en sentido ritual/covenantal, no meramente higiénico o moral.
  - «Entre las naciones» mantiene el marco exílico y evita sustituciones interpretativas.
  - La puntuación y las comillas siguen convenciones españolas; el discurso directo conserva el tono solemne del texto profético.
