revisions:
- from: Moisés, mi esclavo, ha muerto. Así que ahora[a], levántate, cruza este Jordán—tú y todo este pueblo—hacia la tierra que yo les doy, a los hijos de Israel.
  to: Moisés, mi siervo, ha muerto. Así que ahora, levántate, cruza este Jordán —tú y todo este pueblo— a la tierra que yo les estoy dando, a los hijos[a] de Israel.
  rationale: Se corrige 'mi esclavo' a 'mi siervo' para seguir la rationale contextual del POB y mantener un español bíblico natural. Se cambia 'hacia la tierra' por 'a la tierra' para reflejar mejor el ingreso tras cruzar el Jordán. Se ajusta 'les doy' a 'les estoy dando' para conservar el matiz del participio hebreo. Se reubica la nota al pie al sintagma 'hijos de Israel', que es el elemento realmente comentado.
  reviewer_model: gpt-5.4
