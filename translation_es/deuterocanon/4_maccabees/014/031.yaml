review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura distributiva/colectiva del griego: la madre exhorta a cada hijo y también a todos juntos, con dirección hacia la muerte. Sin embargo, «Pero también» sobretraduce el inglés auditado «But» y puede sonar pesado; además, la nota [b] está anclada en «todos juntos» aunque su contenido explica εὐσέβεια, por lo que el anclaje no corresponde al término pertinente.'
  spanish_quality_summary: El español es mayormente claro y digno, pero «uno por uno» tras «a cada hijo» resulta algo redundante; aun así es defendible por la fuerza distributiva y puede mantenerse con nota alternativa. La mejora principal es hacer más natural la apertura («Pero») y colocar la nota teológica en «piedad», donde realmente aclara el término griego.
  glossary_alignment: No hay conflicto con los términos de proyecto principales. «Piedad» para εὐσέβεια es aceptable en este libro si se preserva la nota que explicita la orientación hacia Dios; aun así, la traducción debe mantener la explicación en el lugar correcto. «Hijo» para παῖδα, «la madre», «exhortaba» y «hacia la muerte» están bien alineados con la evidencia fuente y la auditoría inglesa.
  issues:
  - severity: medium
    issue: «Pero también» añade énfasis no retenido en la revisión inglesa auditada
    rationale: El griego ἀλλὰ καὶ permite «pero también», pero la auditoría eligió simplemente «But» por naturalidad discursiva. En español, «Pero» reproduce mejor ese giro sin cargar innecesariamente el inicio del versículo.
  - severity: medium
    issue: La nota [b] está colocada en «todos juntos» pero explica «piedad»/εὐσέβεια
    rationale: Las instrucciones exigen que el marcador aparezca en la palabra o frase pertinente. El contenido de la nota trata del término griego εὐσέβεια, no de ὁμοῦ πάντας.
  - severity: low
    issue: La alternancia de notas no refleja de forma óptima la evidencia inglesa
    rationale: La nota inglesa [a] corresponde a toda la expresión distributiva/colectiva («one by one ... and all together»). En español puede mantenerse una nota léxica solo sobre «uno por uno», pero conviene que la otra nota quede exclusivamente con «piedad».
  revised_spanish_text: Pero la madre exhortaba a cada hijo, uno por uno[a], y a todos juntos, hacia la muerte por causa de la piedad[b].
  revised_footnotes:
  - marker: a
    text: O «cada uno por separado».
    reason: lexical_alternative
  - marker: b
    text: O «por piedad». El término griego denota devoción reverente y fiel hacia Dios.
    reason: lexical_alternative
