id: REV.3.10
reference: 'Revelation 3:10'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὅτι ἐτήρησας τὸν λόγον τῆς ὑπομονῆς μου, κἀγώ σε τηρήσω ἐκ τῆς ὥρας τοῦ πειρασμοῦ τῆς μελλούσης ἔρχεσθαι ἐπὶ τῆς οἰκουμένης ὅλης, πειράσαι τοὺς κατοικοῦντας ἐπὶ τῆς γῆς.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/003/010.yaml
  text: 'Because you have kept my word of endurance[a], I also will keep you from the hour of testing that is about to come upon the whole inhabited world[b], to test those who dwell on the earth.'
  footnotes:
  - marker: a
    text: Or 'the word about my endurance' or 'my message calling for endurance.' The Greek phrase can be understood in more than one closely related way.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will preserve you through the hour of testing' or 'I will keep you out of the hour of testing.' The Greek says 'keep ... from' and does not by itself settle later theological debates about how this protection occurs.
    reason: alternative_reading
translation:
  language: ko
  text: '네가 내 인내의 말씀[a]을 지켰으므로, 나도 너를 장차 온 세상에 임할 시험의 때에서[b] 지키리니, 이는 땅에 거하는 자들을 시험하기 위함이다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '또는 「내 인내에 관한 말씀」 혹은 「인내를 부르는 내 말」. 헬라어는 비슷한 여러 의미로 읽힐 수 있다.'
    reason: lexical_alternative
  - marker: b
    text: '또는 「내가 너를 시험의 때를 통과하여 보존하리라」 혹은 「내가 너를 시험의 때 밖에서 지키리라」. 헬라어 「~로부터 지키다」는 후대의 신학 논쟁을 본문 자체가 해소하지 않는다.'
    reason: alternative_reading
