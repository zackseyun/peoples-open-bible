theological_decisions:
- issue: Narrative tense of וַיִּצֶר in relation to Genesis 1 creation order
  chosen_reading: Rendered as English past perfect ('had formed')
  alternative_readings:
  - Rendered as simple past ('formed')
  rationale: The Hebrew wayyiqtol itself does not morphologically mark pluperfect, but context can justify an English past perfect. Here this preserves coherence with the broader creation narrative without altering the lexical sense of the verb. This is a translation-level discourse decision, not a doctrinal harmonization imposed against the text.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering הָאָדָם as common noun or proper name
  chosen_reading: the man
  alternative_readings:
  - Adam
  rationale: The Hebrew form with article naturally reads as 'the man.' Given the wordplay with אֲדָמָה in the immediate context, retaining the common-noun sense better reflects the source text. The proper name sense is possible in English tradition, so it is preserved in a footnote.
  doctrine_reference: Translation philosophy §4, §5
