translation:
  language: es
  text: Y tú, hijo de hombre, eleva[a] una lamentación sobre Tiro,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «levanta una lamentación sobre Tiro» o «entona una lamentación sobre Tiro». El verbo hebreo literalmente significa «levantar» y es un modismo habitual para comenzar una lamentación.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַתָּה
  english_pob_choice: And you,
  chosen_spanish: Y tú,
  alternatives_spanish:
  - Ahora tú,
  - Y usted,
  lexicon: HALOT
  rationale: La partícula conjuntiva con pronombre independiente introduce una transición discursiva y una llamada directa. «Y tú» conserva ese flujo hebreo sin añadir matices no presentes en el texto.
- source_word: בֶן אָדָם
  english_pob_choice: son of man
  chosen_spanish: hijo de hombre
  alternatives_spanish:
  - ser humano
  - mortal
  lexicon: HALOT
  rationale: En Ezequiel es una fórmula estable de خطاب divino al profeta. «Hijo de hombre» mantiene la correspondencia idiomática con el hebreo y evita borrar la forma heredada del vocativo.
- source_word: שָׂא
  english_pob_choice: raise
  chosen_spanish: eleva
  alternatives_spanish:
  - levanta
  - toma
  - alza
  lexicon: HALOT
  rationale: El verbo literalmente significa «levantar/alzar», pero en contextos de lamentación introduce idiomáticamente el acto de pronunciarla. «Eleva» conserva la imagen verbal con registro digno en español.
- source_word: עַל
  english_pob_choice: over
  chosen_spanish: sobre
  alternatives_spanish:
  - acerca de
  - contra
  lexicon: HALOT
  rationale: Con lenguaje de lamentación, la preposición marca el objeto de duelo. «Sobre» es la opción más natural en español y evita la hostilidad que sugeriría «contra».
- source_word: צֹר
  english_pob_choice: Tyre
  chosen_spanish: Tiro
  alternatives_spanish:
  - Tiria
  lexicon: HALOT
  rationale: Nombre propio tradicional en español para la ciudad fenicia. «Tiro» es la forma usual y transparente en la recepción bíblica hispana.
- source_word: קִינָה
  english_pob_choice: lamentation
  chosen_spanish: lamentación
  alternatives_spanish:
  - lamento
  - endecha
  lexicon: HALOT
  rationale: El sustantivo designa una lamentación o endecha formal. «Lamentación» conserva el registro profético elevado y corresponde bien al valor léxico del hebreo.
translation_notes:
  revision_awareness: 'El pasaje muestra alto acuerdo entre la traducción inglesa auditada y la fuente hebrea: la construcción vocativa, el verbo idiomático de lamentación y el complemento preposicional se reflejan sin cambios sustanciales. No se detectaron revisiones textuales que exigieran notas de variante.'
  spanish_consistency_notes:
  - Se mantiene el vocativo profético «hijo de hombre» como fórmula estable de Ezequiel.
  - Se prefiere «Tiro» como forma española estándar del topónimo.
  - La puntuación con coma final deja el verso abierto, como en el hebreo, para enlazar con el contenido de la lamentación.
