  yaml_path: translation/ot/1_samuel/014/047.yaml
  text: 'Now Saul had taken the kingship over Israel[a], and he fought against all his enemies on every side: against Moab, against the Ammonites, against Edom, against the kings of Zobah, and against the Philistines. Wherever he turned, he inflicted punishment.'
  footnotes:
