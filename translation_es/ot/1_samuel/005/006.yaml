translation:
  language: es
  text: Y la mano de Yahvé pesó sobre la gente de Asdod[a]; los devastó y los hirió con tumores, a Asdod y a su territorio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con hinchazones»; tradicionalmente, algunos lo traducen más específicamente como «con hemorroides».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּכְבַּד יַד יְהוָה
  english_pob_choice: the hand of Yahweh was heavy
  chosen_spanish: la mano de Yahvé se agravó
  alternatives_spanish:
  - la mano de Yahvé fue pesada
  - la mano de Yahvé pesó fuertemente
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de "mano" y el valor idiomático de peso/opresión. "Se agravó" comunica en español la fuerza de juicio o presión sin perder la metáfora.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms'
  rationale: 'Se sigue el principio del proyecto para el Tetragrámaton: transliterar el nombre divino como "Yahvé" y no sustituirlo por un título.'
- source_word: אֶל הָאַשְׁדּוֹדִים
  english_pob_choice: against the people of Ashdod
  chosen_spanish: contra los hombres de Asdod
  alternatives_spanish:
  - contra los asdoditas
  - sobre Asdod
  lexicon: HALOT
  rationale: El plural con artículo apunta a los habitantes, no solo al lugar. "Hombres de Asdod" conserva esa referencia personal y el matiz hostil de אֶל en este contexto.
- source_word: וַיְשִׁמֵּם
  english_pob_choice: he devastated them
  chosen_spanish: los devastó
  alternatives_spanish:
  - los arrasó
  - los desoló
  lexicon: HALOT
  rationale: '"Devastar" expresa bien la ruina provocada por el castigo divino y mantiene el tono fuerte del verbo hebreo.'
- source_word: וַיַּךְ אֹתָם
  english_pob_choice: he struck them
  chosen_spanish: los hirió
  alternatives_spanish:
  - los golpeó
  - los castigó
  lexicon: HALOT
  rationale: En español bíblico, "herir" puede funcionar como verbo de juicio y evita una literalidad física que aquí podría sonar demasiado limitada; aun así conserva la idea de golpe/daño.
- source_word: בַּעֳפָלִים
  english_pob_choice: with tumors
  chosen_spanish: con tumores
  alternatives_spanish:
  - con swellings
  - con hemorroides
  lexicon: HALOT
  rationale: '"Tumores" es la traducción más amplia y prudente para el término, sin cerrar innecesariamente el sentido a una afección específica que el hebreo no precisa de manera inequívoca.'
- source_word: אֶת אַשְׁדּוֹד וְאֶת גְּבוּלֶיהָ
  english_pob_choice: Ashdod and its territory
  chosen_spanish: Asdod y su territorio
  alternatives_spanish:
  - Asdod y sus confines
  - Asdod y su región
  lexicon: HALOT
  rationale: 'Se conserva el paralelismo del texto: la ciudad y la extensión de su dominio o zona circundante. "Territorio" es claro y natural en español.'
theological_decisions:
- issue: Traducción del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La lectura del proyecto distingue el Nombre propio del Señor de títulos sustitutivos; por eso se mantiene "Yahvé" en el cuerpo del texto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Alcance de la plaga/jucio sobre Asdod
  english_pob_reading: against the people of Ashdod ... Ashdod and its territory
  chosen_spanish_reading: contra los hombres de Asdod ... Asdod y su territorio
  alternative_spanish_readings:
  - sobre Asdod ... y su región
  - contra los asdoditas ...
  rationale: El hebreo incluye tanto a los habitantes como a la ciudad y su entorno; la formulación española conserva ambos niveles sin reducir el juicio solo al lugar ni solo a la población.
  doctrine_reference: Contexto narrativo de juicio en 1 Samuel 5
translation_notes:
  revision_awareness: 'El audit trail inglés mantiene sin cambios la estructura básica de juicio: mano pesada de Yahvé, devastación, herida con tumores y extensión del castigo a la ciudad y su territorio. La revisión reciente solo eliminó un guion antes de la frase apposicional; en español se sigue esa misma fluidez sin marcar un corte fuerte innecesario.'
  spanish_consistency_notes:
  - Se usa "Yahvé" de forma consistente para יְהוָה.
  - Se mantiene "Asdod" como forma española del topónimo.
  - '"Tumores" se reserva para בַּעֳפָלִים, con nota alternativa para el sentido tradicional.'
  - 'La secuencia verbal conserva la progresión del hebreo: mano pesada -> devastación -> herida -> alcance geográfico del juicio.'
