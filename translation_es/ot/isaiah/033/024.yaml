review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del hebreo: negación enfática futura, discurso directo de enfermedad, y la segunda cláusula sobre el pueblo que habita allí. Sin embargo, la frase final no preserva fielmente el sentido idiomático de נְשֻׂא עָוֺן en español natural, y además contiene una intrusión en inglés (''away''). El sentido documentado por la auditoría inglesa es ''son perdonados de su iniquidad'', con nota para las alternativas literales ''su culpa es llevada/quedó removida''.'
  spanish_quality_summary: 'La primera mitad es clara y natural: «Y ningún habitante dirá[a]: “Estoy enfermo”». La segunda mitad, «tiene su iniquidad llevada away», es inaceptable en español por mezcla de idiomas y por sintaxis poco idiomática. «El pueblo que habita allí es perdonado de su iniquidad» o «tiene perdonada su iniquidad» comunica bien el modismo hebreo con dignidad y claridad.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Iniquidad» corresponde bien a עָוֺן. La decisión clave es usar una formulación principal de perdón en vez de una reproducción demasiado literal de נשֻׂא que en español suena torpe; las alternativas literales deben conservarse en nota, como ya hace la auditoría inglesa.
  issues:
  - severity: high
    issue: 'La frase final contiene una palabra inglesa: «away».'
    rationale: Esto hace que el texto español sea defectuoso y no publicable.
  - severity: high
    issue: «tiene su iniquidad llevada away» no es español natural ni refleja adecuadamente el modismo hebreo en el texto principal.
    rationale: נשא עון es un modismo bien atestiguado de remoción/perdón de culpa. La auditoría inglesa opta por 'are forgiven' en el texto principal y reserva la literalidad para nota.
  - severity: medium
    issue: La nota al pie usa «levantado» para pecado, que suena menos natural que «alzado» o mejor la formulación ya documentada de 'llevado'/'removido'.
    rationale: 'Conviene alinear la nota con la explicación auditada: el hebreo habla de iniquidad cargada/llevada/removida.'
  revised_spanish_text: 'Y ningún habitante dirá[a]: «Estoy enfermo»; el pueblo que habita allí es perdonado de su iniquidad.'
  revised_footnotes:
  - marker: a
    text: O, «su culpa es llevada» o «su pecado es removido». El modismo hebreo habla literalmente de que la iniquidad es cargada o quitada.
    reason: lexical_alternative
  revision_rationale: 'Se corrige un error evidente de mezcla de idiomas y se reemplaza una formulación poco idiomática por una principal que refleja el sentido del hebreo según la auditoría inglesa: el pueblo recibe perdón/remoción de su iniquidad. Se conserva en nota la imagen literal de cargar/quitar la culpa, para no perder el trasfondo léxico-teológico de נשֻׂא עָוֺן.'
