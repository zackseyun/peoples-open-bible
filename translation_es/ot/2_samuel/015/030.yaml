  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: David asciende llorando, con la cabeza cubierta y descalzo; el grupo con él también cubre su cabeza y sube llorando. Sin embargo, hay dos pérdidas importantes de matiz: «por la subida» suena torpe y duplica de forma poco idiomática el ascenso topográfico, y «cubría cada uno su cabeza» no reproduce bien el perfecto plural hebreo ni el singular distributivo con español natural. Además, la nota [a] está colocada en el topónimo, pero explica la repetición de «subiendo», por lo que el anclaje no corresponde al lugar relevante del texto.'
  spanish_quality_summary: 'El texto es mayormente comprensible, pero tiene giros poco naturales: «la subida del monte de los Olivos» puede mejorarse a «la cuesta del monte de los Olivos» y «cubría cada uno su cabeza» debe reformularse como «cada uno se cubrió la cabeza» para sonar idiomático y claro. También conviene simplificar «y él iba descalzo» a «e iba descalzo».'
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. El topónimo «monte de los Olivos» es adecuado en español eclesial general. Las elecciones «llorando», «cabeza cubierta» y «descalzo» concuerdan bien con la evidencia léxica.
  issues:
  - severity: medium
    issue: Anclaje incorrecto de la nota [a]
    rationale: La nota explica la repetición hebrea de «subiendo», pero el marcador está en «Olivos», no en la frase repetida.
  - severity: medium
    issue: «por la subida del monte de los Olivos» es poco idiomático
    rationale: Aunque semánticamente cercano, en español suena forzado; «por la cuesta del monte de los Olivos» o «por la subida al monte de los Olivos» expresa mejor el valor topográfico de מַעֲלֵה.
  - severity: medium
    issue: «cubría cada uno su cabeza» no es natural y desajusta el aspecto verbal
    rationale: El hebreo presenta la acción del grupo en secuencia narrativa; en español suena mejor «cada uno se cubrió la cabeza», que además refleja con claridad el distributivo singular אִישׁ.
  revised_spanish_text: Y David subía por la cuesta del monte de los Olivos, subiendo[a] y llorando, con la cabeza cubierta, e iba descalzo. Y todo el pueblo que estaba con él, cada uno se cubrió la cabeza[b], y subían, llorando mientras iban[c].
  revised_footnotes:
