revisions:
- from: 'Que se muestre a todas las naciones que tú estás con nosotros[a], Señor, y que no has apartado tu rostro de nosotros; pero, así como dijiste: «Ni aun estando en la tierra de sus enemigos los pasé por alto», así hazlo[b], Señor.'
  to: 'Que se muestre a todas las naciones que tú estás con nosotros[a], Señor, y que no has apartado tu rostro de nosotros; pero, así como dijiste: «Ni siquiera cuando estaban en la tierra de sus enemigos los desatendí», así llévalo a cabo[b], Señor.'
  rationale: Reemplacé «los pasé por alto» por «los desatendí» para reflejar mejor el valor contextual de ὑπεριδον sin introducir la carga más fuerte de «desprecié». Cambié «Ni aun estando...» por «Ni siquiera cuando estaban...» para una sintaxis más natural en español. También ajusté «así hazlo» a «así llévalo a cabo» para preservar mejor la fuerza de ἐπίτελεσον como llevar a realización lo dicho previamente.
