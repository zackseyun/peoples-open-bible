reference: Testament of Gad 4:5
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 232-243, Gad pilot)
  text: 5. *Τῷ γὰρ φθόνῳ συνεργεῖ τὸ μῖσος¹⁹, καὶ²⁰ κατὰ τῶν εὐπραγούντων· *ἐν προκοπῇ²¹ ἀκούων καὶ²² ὁρῶν πάντοτε ἀσθενεῖ.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/gad/004/005.yaml
  text: For envy, hatred works together against those who prosper, hearing and seeing progress always weakens it.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:55Z'
    unchanged: false
    changes_summary: Adjusted the clause order to reflect the Greek more closely, kept 'envy' and 'hatred' as distinct terms, rendered 'ἐν προκοπῇ' more directly as 'progress,' and corrected the final sense from passive weakening to active weakening of hatred.
translation:
  language: es
  text: Pues para la envidia, el odio coopera contra los que prosperan; al oír y al ver el progreso, siempre se debilita.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: φθόνῳ
  english_pob_choice: envy
  chosen_spanish: envidia
  alternatives_spanish:
  - celos
  - resentimiento
  lexicon: φθόνος
  rationale: ‘Envidia’ expresa con más precisión el vicio nombrado por el griego y conserva la distinción con ‘odio’ que la revisión inglesa mantuvo.
- source_word: μῖσος
  english_pob_choice: hatred
  chosen_spanish: odio
  alternatives_spanish:
  - aborrecimiento
  - rencor
  lexicon: μῖσος
  rationale: ‘Odio’ es la correspondencia directa y natural en español, y mantiene la fuerza moral del término sin suavizarlo.
- source_word: συνεργεῖ
  english_pob_choice: works together
  chosen_spanish: coopera
  alternatives_spanish:
  - trabaja junto con
  - obra juntamente con
  lexicon: συνεργέω
  rationale: ‘Coopera’ comunica bien la idea de actuación conjunta entre odio y envidia; evita la rigidez de una calca y preserva la relación de alianza hostil del contexto.
- source_word: τῶν εὐπραγούντων
  english_pob_choice: those who prosper
  chosen_spanish: los que prosperan
  alternatives_spanish:
  - los que están en prosperidad
  - los que les va bien
  lexicon: εὐπραγέω
  rationale: La forma sustantivada en español más directa y fiel es ‘los que prosperan’; conserva el sentido de bienestar/suceso favorable sin expandirlo.
- source_word: ἐν προκοπῇ
  english_pob_choice: progress
  chosen_spanish: el progreso
  alternatives_spanish:
  - el avance
  - la prosperidad
  lexicon: προκοπή
  rationale: ‘Progreso’ sigue de cerca la revisión inglesa y refleja la idea de avance observable; además enlaza naturalmente con ‘al oír y al ver’.
- source_word: ἀκούων καὶ ὁρῶν
  english_pob_choice: hearing and seeing
  chosen_spanish: al oír y al ver
  alternatives_spanish:
  - oyendo y viendo
  - cuando oye y ve
  lexicon: ἀκούω / ὁράω
  rationale: La construcción con gerundio preposicional en español expresa simultaneidad y conserva la acción continua del griego.
- source_word: ἀσθενεῖ
  english_pob_choice: weakens it
  chosen_spanish: se debilita
  alternatives_spanish:
  - debilita
  - se debilita siempre
  lexicon: ἀσθενέω
  rationale: El griego presenta al sujeto implícito como debilitándose ante la noticia y la visión del progreso; ‘se debilita’ mantiene ese valor intransitivo que la revisión inglesa corrigió.
theological_decisions:
- issue: Distinción entre envidia y odio como vicios relacionados pero no idénticos
  english_pob_reading: For envy, hatred works together against those who prosper
  chosen_spanish_reading: Pues para la envidia, el odio coopera contra los que prosperan
  alternative_spanish_readings:
  - Pues el odio coopera con la envidia contra los que prosperan
  - Porque la envidia y el odio obran juntos contra los que prosperan
  rationale: La sintaxis española conserva dos términos distintos, como lo hace la lectura inglesa revisada, y evita fusionarlos en una sola noción moral.
  doctrine_reference: ética bíblica sobre pecados del corazón
- issue: Relación entre oír/ver el progreso y la debilitación del odio
  english_pob_reading: hearing and seeing progress always weakens it
  chosen_spanish_reading: al oír y al ver el progreso, siempre se debilita
  alternative_spanish_readings:
  - el oír y ver el progreso siempre lo debilita
  - al oír y ver el progreso, el odio siempre se debilita
  rationale: 'Se mantiene la dependencia directa del resultado: el hecho de percibir el progreso del otro afecta al odio. La forma pronominal evita introducir un objeto no explicitado en el griego y deja claro que el debilitado es el odio.'
  doctrine_reference: antropología moral y dinámica de las pasiones
translation_notes:
  revision_awareness: La revisión inglesa reciente corrigió la relación entre envidia y odio, hizo explícita la oposición ‘contra los que prosperan’, y ajustó el final para que el debilitamiento sea activo/intransitivo (‘is weakened’/‘se debilita’) en lugar de una formulación pasiva o transitiva más libre. La versión española sigue esa lectura revisada y conserva la secuencia observación → debilitación.
  spanish_consistency_notes:
  - Se usa ‘progres[o]’ para ἐν προκοπῇ siguiendo la revisión inglesa y sin cargarlo con matices técnicos ajenos.
  - Se evita ‘SEÑOR’ u otra terminología no presente en el verso.
  - La frase inicial ‘Pues para la envidia’ reproduce el dativo causal/relacional sin sobrerrepresentarlo con una paráfrasis larga.
  - No se introducen notas al pie porque no hay una alternativa textual o lexical que requiera anclaje explícito en este verso.
