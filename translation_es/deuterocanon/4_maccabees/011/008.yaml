review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura y el sentido general del griego: νῦν ἰδὲ como llamado de atención presente, ἀλλότριος ὢν θεοῦ como separación relacional respecto de Dios, πολεμεῖς con fuerza de hostilidad activa, y τοὺς εὐσεβοῦντας εἰς τὸν θεόν como quienes muestran devoción hacia Dios. Sin embargo, dos elecciones españolas suenan poco naturales o algo mecánicas frente al registro buscado.'
  spanish_quality_summary: «Siendo ajeno a Dios» es defendible y claro. Pero «haces guerra contra» y especialmente «devotos hacia Dios» suenan calcados y poco idiomáticos en español bíblico natural. Una formulación como «haces guerra a» y «los que son devotos de Dios» conserva mejor el sentido con mayor legibilidad.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Dios» está bien. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La decisión teológica sobre ἀλλότριος se preserva adecuadamente con «ajeno a Dios».
  issues:
  - severity: medium
    issue: «devotos hacia Dios» es poco natural en español
    rationale: Aunque intenta reflejar εἰς direccionalmente, en español «devoto hacia» no es idiomático. «Devotos de Dios» o «piadosos para con Dios» comunican mejor la relación sin perder el referente.
  - severity: low
    issue: «haces guerra contra» puede mejorarse a una forma más idiomática
    rationale: La expresión es entendible, pero «hacer guerra a» es más natural en español y mantiene la intensidad bélica de πολεμεῖς sin sonar forzada.
  - severity: low
    issue: La nota al pie usa «alejado de Dios», que conviene suavizar a «apartado de Dios» o mantener alternativas más cercanas al inglés auditado
    rationale: «Alejado de Dios» es comprensible, pero no refleja tan directamente la idea de extrañeza/ajenidad como las alternativas documentadas «extraño» o «apartado/ajeno».
  revised_spanish_text: 'Ahora, mira: siendo ajeno[a] a Dios, haces guerra a los que son devotos de Dios.'
  revised_footnotes:
  - marker: a
    text: 'También: «siendo extraño a Dios» o «siendo apartado de Dios».'
    reason: lexical_alternative
  revision_rationale: 'Se hicieron ajustes menores de naturalidad y estilo sin alterar el sentido del griego ni las decisiones del POB: «haces guerra a» por mejor español idiomático, y «devotos de Dios» para evitar un calco poco natural de εἰς τὸν θεόν. Se mantuvo «ajeno a Dios» porque preserva bien la fuerza relacional de ἀλλότριος θεοῦ.'
