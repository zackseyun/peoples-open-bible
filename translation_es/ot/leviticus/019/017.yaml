revisions:
- from: No odiarás a tu hermano en tu corazón. Reprenderás[a] ciertamente a tu prójimo, y no cargarás sobre él pecado.
  to: No odiarás a tu hermano en tu corazón. Ciertamente reprenderás[a] a tu prójimo, y no incurrirás en pecado por causa de él.
  rationale: Se mantiene el contenido y la fuerza del original, pero se corrige la última cláusula para expresar en español natural el valor idiomático de נשׂא חטא con עָלָיו. «Incurrirás en pecado por causa de él» preserva la causalidad y evita la falsa impresión de imputarle pecado al prójimo. También se reordena el énfasis a «Ciertamente reprenderás» para sonar más natural en español sin perder la intensificación hebrea.
