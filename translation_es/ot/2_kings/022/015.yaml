review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: Huldá habla a la delegación, usa la fórmula profética, nombra a Yahvé como Dios de Israel y manda hablar al hombre que los envió a ella. Sin embargo, no preserva plenamente la decisión léxica española documentada para יְהוָה, porque el texto principal dice «Yahvé» mientras la decisión inglesa y la doctrina exigen el equivalente español de «Yahweh» según la guía del proyecto: «Yahvé».'
  spanish_quality_summary: 'El español es claro y digno, pero hay dos detalles mejorables: 1) inconsistencia entre el texto principal («Yahvé») y la decisión léxica declarada; 2) uso de «os/envió» y «Decid», que suena peninsular, no neutral latinoamericano, contrario al estilo objetivo del proyecto. También conviene simplificar las comillas anidadas para mayor naturalidad tipográfica en español bíblico.'
  glossary_alignment: Alineación parcial. «el Dios de Israel» y «al hombre» están bien. El nombre divino debe aparecer como «Yahvé» en el texto principal para ajustarse al glosario del proyecto. Además, para español neutral latinoamericano, el imperativo plural debe preferir «Digan» y el pronombre «los», no «Decid/os».
  issues:
  - severity: high
    issue: El texto principal usa «Yahvé» en vez de la forma de proyecto «Yahvé».
    rationale: La instrucción del proyecto para español establece explícitamente יהוה / YHWH -> «Yahvé» en el texto principal. La coherencia terminológica es obligatoria.
  - severity: medium
    issue: Registro pronominal peninsular («Decid», «os envió») no encaja con español neutral latinoamericano.
    rationale: La guía de estilo pide español neutral LATAM/broadly church-readable. «Digan» y «los envió» son más naturales y ampliamente comprensibles.
  - severity: low
    issue: Puntuación con comillas anidadas innecesarias.
    rationale: Solo hay un discurso directo en español; no hace falta abrir comillas españolas y luego inglesas internas. Una sola capa mejora legibilidad.
  revised_spanish_text: 'Y ella les dijo: «Así dice Yahvé, el Dios de Israel: “Digan al hombre que los envió a mí”».'
  revision_rationale: Se corrige el nombre divino para ajustarlo al glosario del proyecto y se actualiza el registro al español neutral latinoamericano con «Digan» y «los». Se mantiene el sentido exacto del hebreo y la fórmula profética, sin necesidad de notas.
