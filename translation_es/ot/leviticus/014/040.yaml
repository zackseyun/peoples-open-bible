review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia y el sentido del hebreo: el sacerdote da la orden, se quitan las piedras afectadas, y se arrojan fuera de la ciudad a un lugar ritualmente impuro. También conserva adecuadamente la alternativa locativa de אֲשֶׁר בָּהֵן הַנָּגַע mediante nota. Sin embargo, hay un problema de concordancia modal/temporal en español: «mandará que saquen ... y las arrojarán» hace que el segundo verbo suene como futuro independiente de sujeto ambiguo. El hebreo coordina las acciones ordenadas; en español conviene mantener ambas dentro del ámbito de la orden.'
  spanish_quality_summary: El español es claro y digno, pero la coordinación verbal actual no es natural. «Mandará que saquen ... y las arrojen» o «mandará que saquen ... y las arrojen» mantiene la dependencia sintáctica. Además, para alinearse mejor con la decisión teológica auditada de English POB, «lugar impuro» debería cambiarse a «lugar inmundo» o mejor «lugar impuro/ritualmente impuro»; pero dado que el proyecto inglés fijó 'unclean' y el glosario español no impone una forma única para טָמֵא, el asunto es menor. Aun así, «lugar impuro» es aceptable; el cambio necesario es el verbo final.
  glossary_alignment: No hay conflicto con los términos de proyecto principales. «Infección» para נֶגַע sigue el expediente auditado. «Sacerdote» es correcto para כֹּהֵן. Para טָמֵא, el inglés auditado prefirió 'unclean'; el español «impuro» es defendible y legible en contexto levítico, aunque se aleja levemente del equivalente más tradicional. No requiere adjudicación mayor.
  issues:
  - severity: medium
    issue: Concordancia verbal defectuosa en «mandará que saquen ... y las arrojarán»
    rationale: 'Tras «mandará que», la coordinación natural en español pide subjuntivo también en la segunda acción ordenada: «y las arrojen». El futuro «arrojarán» introduce un cambio sintáctico no motivado por el hebreo y puede sugerir un enunciado separado.'
  - severity: low
    issue: «Impuro» frente a la decisión inglesa 'unclean'
    rationale: «Impuro» es comprensible y cultualmente adecuado, pero «unclean» en Levítico suele corresponder más transparentemente a «inmundo» o a una formulación explícitamente ritual. No obstante, no es un error grave ni exige adjudicación.
  revised_spanish_text: Entonces el sacerdote mandará que saquen las piedras en las que está la infección[a], y las arrojen fuera de la ciudad, a un lugar impuro.
  revised_footnotes:
  - marker: a
    text: 'O: «las piedras que tienen la infección en ellas». La frase hebrea dice literalmente: «las piedras en las que la infección está».'
    reason: lexical_alternative
  revision_rationale: Se corrige la sintaxis española para que ambas acciones dependan de la orden del sacerdote, como en el hebreo procedural. Se conserva el resto del texto porque refleja bien el sentido fuente y la nota léxica auditada.
