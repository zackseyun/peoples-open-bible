translation:
  language: es
  text: Y tomó consigo a sus parientes[a], y lo persiguió por siete días de camino[d], y lo alcanzó[c] en la región montañosa de Galaad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sus hermanos'; el hebreo puede referirse a hermanos en sentido más estricto o a parientes del clan en sentido más amplio.
    reason: lexical_alternative
  - marker: b
    text: O 'el monte de Galaad'; el hebreo puede referirse a una montaña específica o a la región montañosa de Galaad.
    reason: lexical_alternative
  - marker: c
    text: O 'le dio alcance'; el verbo hebreo puede entenderse como 'alcanzó' u 'overtook', es decir, llegó hasta él en la persecución.
    reason: lexical_alternative
  - marker: d
    text: O 'por un viaje de siete días'; el hebreo usa 'camino' para indicar la extensión del trayecto.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶחָיו
  english_pob_choice: his kinsmen
  chosen_spanish: sus parientes
  alternatives_spanish:
  - sus hermanos
  - sus familiares
  lexicon: HALOT
  rationale: El hebreo puede significar 'hermanos' en sentido estrecho o parientes del clan en sentido más amplio. En este contexto, Laban reúne a miembros de su grupo familiar; 'parientes' conserva ese alcance sin restringirlo a hermanos biológicos.
- source_word: וַיִּרְדֹּף אַחֲרָיו
  english_pob_choice: pursued after him
  chosen_spanish: lo persiguió
  alternatives_spanish:
  - lo persiguió tras él
  - fue tras él
  lexicon: HALOT
  rationale: En español, 'perseguir' ya incluye la idea de ir tras alguien; añadir una preposición equivalente a 'after' resultaría redundante. La construcción conserva el sentido de búsqueda y persecución del hebreo.
- source_word: דֶּרֶךְ שִׁבְעַת יָמִים
  english_pob_choice: for seven days' journey
  chosen_spanish: por siete días de camino
  alternatives_spanish:
  - durante siete días
  - por una jornada de siete días
  lexicon: HALOT
  rationale: La expresión hebrea usa 'camino' para indicar la extensión de viaje. 'Por siete días de camino' mantiene esa imagen y su valor idiomático, sin reducirla a un simple período temporal.
- source_word: וַיַּדְבֵּק אֹתוֹ
  english_pob_choice: overtook him
  chosen_spanish: lo alcanzó
  alternatives_spanish:
  - lo sobrepasó y alcanzó
  - lo dio alcance
  lexicon: HALOT
  rationale: El verbo en este contexto expresa alcanzar a alguien en una persecución. 'Lo alcanzó' es natural en español y conserva la idea de llegar hasta él, sin introducir un matiz ajeno.
- source_word: בְּהַר הַגִּלְעָד
  english_pob_choice: in the hill country of Gilead
  chosen_spanish: en la región montañosa de Galaad
  alternatives_spanish:
  - en el monte de Galaad
  - en los montes de Galaad
  lexicon: HALOT
  rationale: Aunque 'har' puede significar 'monte', el contexto favorece una referencia regional más que a una cumbre específica. 'Región montañosa' transmite ese valor colectivo y evita imponer una localización más precisa de lo que el hebreo exige.
translation_notes:
  revision_awareness: 'Se siguió la línea del audit trail inglés que favorece ''kinsmen'', ''overtook/caught up with him'' y una lectura regional de ''hill country of Gilead''. Para el español, se optó por formas naturales pero cercanas al hebreo: ''parientes'', ''lo persiguió'', ''siete días de camino'' y ''región montañosa de Galaad''. Se mantuvo la ambigüedad lexical relevante mediante notas, sin cerrar indebidamente las alternativas del hebreo.'
  spanish_consistency_notes:
  - '''Galaad'' se usa como forma española estándar del topónimo.'
  - Se evitó 'SEÑOR' u otras sustituciones no presentes en el versículo.
  - No hay términos teológicos mayores en este versículo; la principal cuestión es léxica y topográfica.
  - El orden de los miembros de la oración sigue de cerca el hebreo para preservar la secuencia narrativa.
