base_translation:
  language: en
  yaml_path: translation/ot/ruth/001/021.yaml
  text: I went away full[a], but Yahweh has brought me back empty. Why do you call me Naomi[b], when Yahweh has testified against me and the Almighty has brought calamity on me?
  footnotes:
