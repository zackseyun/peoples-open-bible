translation:
  language: es
  text: El perverso es un rescate[a] para el justo, y el traicionero en lugar de los rectos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «El perverso sirve como sustituto para el justo, y el traicionero para los rectos».
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּפֶר
  english_pob_choice: a ransom
  chosen_spanish: rescate
  alternatives_spanish:
  - precio de rescate
  - pago de rescate
  - rescate expiatorio
  lexicon: HALOT
  rationale: כֹּפֶר designa un precio de rescate o compensación sustitutiva. En español, «rescate» comunica bien la idea de pago/sustitución sin forzar una lectura teológica más específica que el proverbio no explicita.
- source_word: לַצַּדִּיק
  english_pob_choice: for the righteous
  chosen_spanish: para el justo
  alternatives_spanish:
  - para el recto
  - para un justo
  - en favor del justo
  lexicon: HALOT
  rationale: La ל expresa relación de beneficio o referencia. «Para el justo» conserva el sentido proverbial genérico y evita añadir matices ajenos al paralelo hebreo.
- source_word: רָשָׁע
  english_pob_choice: the wicked
  chosen_spanish: el perverso
  alternatives_spanish:
  - el impío
  - el malvado
  - el culpable
  lexicon: HALOT
  rationale: Aunque el hebreo es singular, funciona de modo genérico. «Perverso» mantiene el contraste moral fuerte con «justo» y evita suavizar el término. «Impío» podría sonar más religioso que ético en este contexto.
- source_word: וְתַחַת
  english_pob_choice: and ... in place of
  chosen_spanish: en lugar de
  alternatives_spanish:
  - y en lugar de
  - y en vez de
  - en sustitución de
  lexicon: HALOT
  rationale: תַּחַת aquí expresa sustitución. En español, «en lugar de» es la forma más natural y preserva la relación paralela con כֹּפֶר.
- source_word: יְשָׁרִים
  english_pob_choice: the upright
  chosen_spanish: los rectos
  alternatives_spanish:
  - los justos
  - los íntegros
  - los honrados
  lexicon: HALOT
  rationale: יָׁשָׁרִים describe personas moralmente rectas. «Los rectos» conserva la imagen ética y la simetría con «el justo».
- source_word: בּוֹגֵד
  english_pob_choice: the treacherous one
  chosen_spanish: el traicionero
  alternatives_spanish:
  - el traidor
  - el infiel
  - el pérfido
  lexicon: HALOT
  rationale: בּוֹגֵד implica traición/falsedad de conducta. «Traicionero» mantiene el valor adjetival sustantivado y el tono sapiencial sin limitarlo a una sola clase de traición.
translation_notes:
  revision_awareness: 'La versión sigue de cerca el hebreo: mantiene el paralelismo sustitutivo de כֹּפֶר / תַּחַת y conserva el contraste moral generalizador entre categorías de personas. No se introducen términos doctrinales ajenos al proverbio.'
  spanish_consistency_notes:
  - Se usó «Yahvé» en otros contextos cuando el hebreo lo exige, pero este versículo no contiene el nombre divino.
  - Se prefirió «justo/rectos» para conservar el paralelismo sapiencial y evitar una traducción excesivamente confesional.
  - La nota al pie preserva la alternativa sustitutiva documentada en el audit trail inglés.
