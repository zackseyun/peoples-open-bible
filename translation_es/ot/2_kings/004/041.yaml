revisions:
- from: 'Entonces él dijo: «Traigan algo de harina». Y la echó en la olla y dijo: «[a]Viértanla[b] para el pueblo, para que coman». Y no hubo nada dañino en la olla.'
  to: 'Entonces él dijo: «Traigan algo de harina». Y la echó en la olla y dijo: «Sírvanlo[a] al pueblo, para que coman». Y no hubo nada dañino en la olla.'
