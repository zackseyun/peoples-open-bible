id: JOS.7.10
reference: Joshua 7:10
source:
  edition: WLC
  text: וַ/יֹּ֧אמֶר יְהוָ֛ה אֶל יְהוֹשֻׁ֖עַ קֻ֣ם לָ֑/ךְ לָ֣/מָּה זֶּ֔ה אַתָּ֖ה נֹפֵ֥ל עַל פָּנֶֽי/ךָ־־׃
translation:
  text: Yahweh said to Joshua[a], “Get up[b]. Why are you falling on your face?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or simply, “Why are you falling on your face?” The Hebrew includes an emphatic “this” (לָמָּה זֶּה), which may be smoothed in English.
    reason: lexical_alternative
  - marker: b
    text: Or 'Why is this that'.
    reason: previous_rendering
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - the Lord
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר is most naturally rendered 'said' in English narrative.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Simple directional preposition introducing the addressee.
- source_word: יְהוֹשֻׁעַ
  chosen: Joshua
  lexicon: HALOT
  rationale: Personal name is transliterated by standard English convention, consistent with translation philosophy.
- source_word: קֻם
  chosen: Get up
  alternatives:
  - Rise
  - Stand up
  lexicon: HALOT
  rationale: Imperative of קום. 'Get up' is natural modern English and fits the immediate command to stop prostrating himself.
- source_word: לָךְ
  chosen: —
  alternatives:
  - for yourself
  lexicon: HALOT
  rationale: The pronominal element after the imperative is idiomatic and not normally carried into English. Rendering it explicitly would sound unnatural without adding meaning.
- source_word: לָמָּה זֶּה
  chosen: Why is this
  alternatives:
  - Why
  - Why this
  lexicon: HALOT
  rationale: The combination literally includes both 'why' and 'this.' 'Why is this' preserves the slight emphasis better than a bare 'why' while remaining readable.
- source_word: אַתָּה
  chosen: you
  lexicon: HALOT
  rationale: Explicit pronoun retained for emphasis in English because the Hebrew includes it overtly.
- source_word: נֹפֵל
  chosen: are falling
  alternatives:
  - have fallen
  - lie fallen
  - fall
  lexicon: HALOT
  rationale: The participle depicts Joshua in the act/state of prostration. 'Are falling' preserves the vivid present-like force in direct speech, though contextually it refers to his current posture.
- source_word: עַל־פָּנֶיךָ
  chosen: on your face
  alternatives:
  - on your faces
  - face down
  lexicon: HALOT
  rationale: Hebrew idiom for prostration or lying facedown. Singular suffix requires 'your face'; this is the most direct and idiomatic English equivalent.
