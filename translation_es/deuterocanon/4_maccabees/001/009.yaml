translation:
  language: es
  text: Pues todos estos, al haber hecho caso omiso del dolor hasta la muerte[a], demostraron que la razón domina sobre las pasiones[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «al haber hecho caso omiso del dolor incluso hasta la muerte»'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el juicio racional domina sobre las pasiones»'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἅπαντες
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  - todos estos
  lexicon: LSJ
  rationale: ἅπαντες expresa totalidad; en español, «todos» es la forma más natural y fiel. Con οὗτοι, el sentido demostrativo queda suficientemente indicado por el contexto.
- source_word: οὗτοι
  english_pob_choice: these
  chosen_spanish: estos
  alternatives_spanish:
  - ellos
  - estas personas
  lexicon: LSJ
  rationale: El demostrativo οὗτοι aporta referencia contextual. «Estos» conserva esa deixis sin sobrecargar el verso.
- source_word: πόνον
  english_pob_choice: pain
  chosen_spanish: dolor
  alternatives_spanish:
  - sufrimiento
  - pena
  - aflicción
  lexicon: LSJ
  rationale: En este contexto martirial, πόνον alude al sufrimiento padecido. «Dolor» es claro, natural y mantiene la intensidad física y moral del término.
- source_word: ἕως θανάτου
  english_pob_choice: even unto death
  chosen_spanish: hasta la muerte
  alternatives_spanish:
  - incluso hasta la muerte
  - hasta morir
  lexicon: LSJ
  rationale: La frase intensifica el sufrimiento hasta el extremo de la muerte. «Hasta la muerte» es idiomático en español y conserva la fuerza del griego.
- source_word: ὑπεριδόντες
  english_pob_choice: having disregarded
  chosen_spanish: al haber despreciado
  alternatives_spanish:
  - al haber desestimado
  - al haber hecho caso omiso de
  lexicon: LSJ
  rationale: El participio sugiere pasar por encima o no conceder peso a algo. «Despreciado» mantiene la idea de considerar el dolor como incapaz de dominarles, sin perder el matiz de menosprecio implícito.
- source_word: ἐπεδείξαντο
  english_pob_choice: demonstrated
  chosen_spanish: demostraron
  alternatives_spanish:
  - mostraron
  - probaron
  lexicon: LSJ
  rationale: El verbo presenta su conducta como evidencia. «Demostraron» conserva el tono argumentativo del libro.
- source_word: περικρατεῖ
  english_pob_choice: rules over
  chosen_spanish: domina sobre
  alternatives_spanish:
  - tiene dominio sobre
  - prevalece sobre
  lexicon: LSJ
  rationale: El verbo expresa superioridad y control efectivo. «Domina sobre» resulta natural en español y mantiene la idea de gobierno o preponderancia.
- source_word: τῶν παθῶν
  english_pob_choice: the passions
  chosen_spanish: las pasiones
  alternatives_spanish:
  - los impulsos
  - las emociones
  - los afectos
  lexicon: LSJ
  rationale: En 4 Macabeos, πάθη es un término técnico para las pasiones irracionales que la razón gobierna. «Las pasiones» preserva ese sentido filosófico.
- source_word: ὁ λογισμός
  english_pob_choice: reason
  chosen_spanish: la razón
  alternatives_spanish:
  - el juicio racional
  - la facultad de razonar
  - el razonamiento
  lexicon: LSJ
  rationale: λογισμός es un término central de la argumentación de 4 Macabeos sobre la primacía de la razón disciplinada. «La razón» es la equivalencia más clara y sobria en español.
theological_decisions:
- issue: Cómo traducir ὁ λογισμός sin introducir categorías cristianas posteriores ajenas al argumento filosófico del libro
  english_pob_reading: reason
  chosen_spanish_reading: la razón
  alternative_spanish_readings:
  - el juicio racional
  - la razón razonada
  rationale: 'El contexto de 4 Macabeos es ético-filosófico: la razón domina las pasiones. «La razón» comunica esa tesis sin desplazarla hacia nociones devocionales o doctrinales posteriores.'
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Cómo reflejar la intensidad de ἕως θανάτου πόνον sin explicitar más de lo que dice el griego
  english_pob_reading: the pain even unto death
  chosen_spanish_reading: el dolor hasta la muerte
  alternative_spanish_readings:
  - el dolor incluso hasta la muerte
  - el dolor mortal
  rationale: El griego marca el extremo del dolor, no añade una glosa interpretativa. «Hasta la muerte» mantiene esa intensidad y deja que el contexto martirial haga su labor.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión del inglés POB que prefirió «having disregarded» por ser más natural y más cercano a ὑπεριδόντες, y «even unto death» para ἕως θανάτου. La versión española sigue esa misma línea semántica con una formulación idiomática y sobria.
  spanish_consistency_notes:
  - Se mantuvo «razón» para λογισμός, coherente con el tratamiento filosófico del libro.
  - Se conservó «pasiones» para πάθη por ser el término técnico preferido en 4 Macabeos.
  - Se eligió «hasta la muerte» como equivalente natural de la intensificación temporal/extrema del griego.
  - El demostrativo «estos» queda implícito en el contexto de la referencia y en la construcción española sin necesidad de sobreexplicación adicional.
