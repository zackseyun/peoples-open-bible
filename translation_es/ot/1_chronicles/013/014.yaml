translation:
  language: es
  text: Y el arca de Dios permaneció con la familia de Obed-edom[a], en su casa, durante tres meses. Yahvé bendijo a la familia de Obed-edom y todo lo que le pertenecía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la casa de Obed-edom» en ambas ocurrencias; el hebreo בֵּית puede referirse tanto a una casa física como a una casa u hogar en el sentido de familia o unidad doméstica.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּשֶׁב
  english_pob_choice: remained
  chosen_spanish: permaneció
  alternatives_spanish:
  - estuvo
  - habitó
  - se quedó
  lexicon: HALOT
  rationale: El verbo hebreo puede significar sentarse, habitar o permanecer. En este contexto, donde el arca está temporalmente alojada, «permaneció» transmite continuidad de presencia sin sugerir de manera excesiva residencia permanente.
- source_word: אֲרוֹן הָאֱלֹהִים
  english_pob_choice: the ark of God
  chosen_spanish: el arca de Dios
  alternatives_spanish:
  - el arca del pacto de Dios
  - el arca de Yahvé
  lexicon: HALOT
  rationale: El hebreo dice literalmente «el arca de Dios», no la fórmula ampliada «del pacto». La traducción conserva la expresión exacta del verso.
- source_word: עִם בֵּית עֹבֵד אֱדֹם
  english_pob_choice: with the household of Obed-edom
  chosen_spanish: con la casa de Obed-edom
  alternatives_spanish:
  - con el hogar de Obed-edom
  - con la familia de Obed-edom
  lexicon: HALOT
  rationale: בֵּית puede referirse a una casa física o a un grupo doméstico. Aquí, como el versículo más adelante repite el sentido en relación con la casa concreta, «casa» mantiene la posibilidad semántica sin forzar una paráfrasis.
- source_word: בְּבֵיתוֹ
  english_pob_choice: in his house
  chosen_spanish: en su casa
  alternatives_spanish:
  - en su hogar
  lexicon: HALOT
  rationale: Esta segunda ocurrencia señala el lugar físico. «En su casa» conserva el sentido concreto y distingue bien este uso del anterior.
- source_word: שְׁלֹשָׁה חֳדָשִׁים
  english_pob_choice: for three months
  chosen_spanish: durante tres meses
  alternatives_spanish:
  - por tres meses
  lexicon: HALOT
  rationale: La duración en español se expresa de forma natural con «durante». No se añade información interpretativa más allá del lapso indicado.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para representar el Nombre divino como «Yahvé», manteniendo la forma reverente y transparente del tetragrámaton.
- source_word: וַיְבָרֶךְ
  english_pob_choice: blessed
  chosen_spanish: bendijo
  alternatives_spanish:
  - hizo bien a
  - favoreció
  lexicon: HALOT
  rationale: El verbo ברך expresa aquí una acción de favor divino y se traduce de forma directa por «bendijo», el equivalente más claro y fiel en español.
- source_word: אֶת בֵּית עֹבֵד אֱדֹם
  english_pob_choice: the household of Obed-edom
  chosen_spanish: la casa de Obed-edom
  alternatives_spanish:
  - el hogar de Obed-edom
  - la familia de Obed-edom
  lexicon: HALOT
  rationale: Aunque «casa» también puede incluir la unidad doméstica, el hebreo permite esa amplitud. Se conserva el término literal, que el contexto amplía al incluir sus bienes.
- source_word: וְאֶת כָּל אֲשֶׁר לֽוֹ
  english_pob_choice: and all that belonged to him
  chosen_spanish: y todo lo que tenía
  alternatives_spanish:
  - y todo lo que le pertenecía
  - y todo cuanto era suyo
  lexicon: HALOT
  rationale: La expresión hebrea abarca posesiones y cuanto estaba bajo su pertenencia. «Todo lo que tenía» es natural en español y conserva ese alcance amplio sin volverse rígido.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El verso usa directamente el tetragrámaton. Conforme a la política del proyecto, no se lo enmascara con «SEÑOR»; se lo vierte como «Yahvé» para preservar la transparencia del texto fuente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sense of בֵּית in the repeated phrase about Obed-edom
  english_pob_reading: household / house
  chosen_spanish_reading: casa
  alternative_spanish_readings:
  - familia
  - hogar
  - casa/casa doméstica
  rationale: El hebreo admite tanto la idea de edificio como la de unidad doméstica. En español, «casa» permite mantener esa ambigüedad productiva, y el segundo miembro del versículo —«en su casa»— ayuda a precisar el sentido sin perder la amplitud del original.
  doctrine_reference: 'DOCTRINE.md: Lexical transparency and contextual nouns'
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo y concuerda con el audit trail inglés. Se adoptó «Yahvé» por coherencia con la política del proyecto, sustituyendo la forma inglesa «Yahweh» sin cambiar el referente. También se mantuvo la alternancia semántica de בֵּית con una traducción literal y una nota que preserva la ambigüedad documentada.
  spanish_consistency_notes:
  - Se mantiene «arca de Dios» para reflejar el hebreo literal, sin ampliar a «arca del pacto».
  - «Casa de Obed-edom» y «en su casa» distinguen la posible unidad doméstica del lugar físico.
  - «Todo lo que tenía» cubre posesiones y pertenencias personales de manera idiomática.
  - Se usa puntuación española estándar y capitalización reverente para el Nombre divino.
