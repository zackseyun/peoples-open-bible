translation:
  language: es
  text: Pero él pasó[a], y, he aquí, ya no estaba; lo busqué, pero no fue hallado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "pasó por allí". El verbo hebreo puede significar pasar por o pasar de largo; aquí describe la desaparición del impío de la vista.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲבֹר
  english_pob_choice: passed by
  chosen_spanish: pasó
  alternatives_spanish:
  - pasó de largo
  - pasó por allí
  - pasó y siguió
  lexicon: HALOT
  rationale: El hebreo עבר admite la idea de 'pasar' o 'pasar de largo'. En este contexto, el movimiento se describe como una desaparición de la vista, pero la forma española más sobria y fiel es 'pasó', que no fuerza la lectura de muerte y deja abierta la ambigüedad documentada por la auditoría inglesa.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: he aquí que
  alternatives_spanish:
  - y he aquí
  - y mira
  - entonces he aquí
  lexicon: HALOT
  rationale: הִנֵּה introduce una sorpresa o giro llamativo. 'He aquí que' conserva el tono retórico y la interjección de atención sin volver el verso coloquial.
- source_word: אֵינֶנּוּ
  english_pob_choice: he was no more
  chosen_spanish: ya no estaba
  alternatives_spanish:
  - no estaba más
  - había desaparecido
  - ya no era visible
  lexicon: HALOT
  rationale: La expresión idiomática hebrea indica ausencia o desaparición. 'Ya no estaba' transmite la abrupta no-presencia de forma natural en español, sin implicar necesariamente aniquilación o muerte.
- source_word: וָאֲבַקְשֵׁהוּ
  english_pob_choice: I sought him
  chosen_spanish: lo busqué
  alternatives_spanish:
  - lo busqué con cuidado
  - lo procuré
  - lo anduve buscando
  lexicon: HALOT
  rationale: בקשׁ significa 'buscar' o 'buscar con empeño'. 'Lo busqué' es conciso y claro en español moderno, y mantiene la acción personal del salmista sin añadir matices no presentes en el hebreo.
- source_word: וְלֹא נִמְצָא
  english_pob_choice: but he could not be found
  chosen_spanish: pero no fue hallado
  alternatives_spanish:
  - y no fue hallado
  - pero no se lo encontró
  - y no pudo ser hallado
  lexicon: HALOT
  rationale: La forma nifal de מצא expresa 'ser hallado'. 'No fue hallado' conserva la pasiva bíblica de modo natural en español; el 'pero' refleja el contraste adversativo de la frase previa.
translation_notes:
  revision_awareness: 'La auditoría inglesa revisó una lectura más interpretativa (''passed away'') y la corrigió a una más cercana al hebreo (''passed by''). La versión española sigue esa misma cautela: evita leer muerte explícita y conserva la escena de desaparición observada desde el punto de vista del hablante.'
  spanish_consistency_notes:
  - Se mantuvo una estructura breve y paralela, apta para un salmo poético.
  - Se prefirió el pronombre enclítico 'lo' para reproducir la referencia masculina singular sin sobrecargar el verso.
  - No se tradujo 'Yahvé' porque este versículo no contiene el tetragrámaton ni un título divino directo.
