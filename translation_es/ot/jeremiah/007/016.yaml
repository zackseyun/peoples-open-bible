base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/007/016.yaml
  text: But as for you[a], do not pray for this people, and do not lift up a cry or prayer on their behalf, and do not intercede with me[b], for I am not listening to you.
  footnotes:
