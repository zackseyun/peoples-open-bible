translation:
  language: es
  text: Dios dio a Salomón sabiduría y gran entendimiento, y anchura de corazón[a] como la arena que está en la orilla del mar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «anchura de corazón». En hebreo, «corazón» puede referirse también a la mente, al entendimiento o al centro interior de la persona.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  english_pob_choice: gave
  chosen_spanish: dio
  alternatives_spanish:
  - otorgó
  - concedió
  lexicon: HALOT
  rationale: El verbo נתן se rinde de forma directa con «dar»; en español, «dio» conserva la acción simple y narrativa sin añadir matices de favor jurídico que no exige el contexto.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Dios
  lexicon: HALOT
  rationale: Aunque el hebreo usa אֱלֹהִים con sentido singular, el contexto inmediato de Reyes refiere al Dios de Israel. En la línea terminológica del proyecto, el nombre divino se expresa como «Yahvé» cuando el referente es el Dios del pacto, evitando la máscara «SEÑOR».
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - prudencia
  - sapiencia
  lexicon: HALOT
  rationale: «Sabiduría» es el equivalente español estándar para חָכְמָה y conserva la amplitud sapiencial del término en contexto salomónico.
- source_word: לִשְׁלֹמֹה
  english_pob_choice: Solomon
  chosen_spanish: Salomón
  lexicon: standard proper-name convention
  rationale: Nombre propio bíblico en su forma española usual y ampliamente reconocible.
- source_word: וּתְבוּנָה
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - discernimiento
  - insight
  lexicon: HALOT
  rationale: תְבוּנָה abarca comprensión, discernimiento e inteligencia práctica. «Entendimiento» mantiene un registro natural en español y dialoga bien con «sabiduría» sin reducir indebidamente el campo semántico.
- source_word: הַרְבֵּה מְאֹד
  english_pob_choice: very great
  chosen_spanish: muy grande
  alternatives_spanish:
  - en gran manera
  - en extremo grande
  lexicon: HALOT
  rationale: La intensificación hebrea se expresa de manera idiomática y clara con «muy grande», evitando un calco poco natural y manteniendo el énfasis del original.
- source_word: וְרֹחַב לֵב
  english_pob_choice: breadth of heart
  chosen_spanish: anchura de corazón
  alternatives_spanish:
  - anchura de mente
  - amplitud de corazón
  lexicon: HALOT
  rationale: El hebreo dice literalmente «anchura de corazón». En español, «corazón» puede incluir la sede de pensamiento y voluntad, pero para no borrar la imagen hebrea se conserva la metáfora. «Anchura» refleja רֹחַב con fidelidad léxica.
- source_word: כַּחוֹל
  english_pob_choice: like the sand
  chosen_spanish: como la arena
  alternatives_spanish:
  - como la arena del mar
  lexicon: HALOT
  rationale: «Arena» es el equivalente español natural de חוֹל en este símil bíblico; transmite correctamente la comparación de abundancia innumerable.
- source_word: אֲשֶׁר עַל שְׂפַת הַיָּם
  english_pob_choice: that is on the seashore
  chosen_spanish: que está a la orilla del mar
  alternatives_spanish:
  - que está sobre la orilla del mar
  - que está en la playa
  lexicon: HALOT
  rationale: La cláusula relativa identifica la arena del mar. «A la orilla del mar» es una solución española natural y precisa que conserva el valor descriptivo del hebreo.
theological_decisions:
- issue: Sentido antropológico de לֵב
  english_pob_reading: breadth of heart
  chosen_spanish_reading: anchura de corazón
  alternative_spanish_readings:
  - anchura de mente
  - amplitud de corazón
  rationale: El hebreo לֵב puede referirse al centro de pensamiento, discernimiento y voluntad, no solo a la emoción. Se mantiene «corazón» para no perder el idiomatismo bíblico; la nota explica que el término incluye la dimensión mental/intelectiva. Esta opción sigue la revisión del POB que volvió de 'mind' a 'heart' por mayor ajuste al hebreo.
  doctrine_reference: Translation philosophy §1, §6
- issue: Uso del nombre divino
  english_pob_reading: God
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Dios
  rationale: En un pasaje de historia deuteronomista, el referente es el Dios de Israel; el proyecto español pide no enmascarar el nombre divino bajo una convención de mayúsculas. Por eso se usa «Yahvé» como forma principal.
  doctrine_reference: Project-level Spanish terminology defaults
translation_notes:
  revision_awareness: 'El audit trail inglés mostró una revisión importante: la frase pasó de «breadth of mind» a «breadth of heart» para reflejar con más precisión לֵב. La versión española adopta directamente la solución final «anchura de corazón» y conserva la nota explicativa sobre el valor semántico de לֵב, sin suavizar la imagen hebrea.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como traducción del referente divino, de acuerdo con las normas del proyecto.
  - Se evita «Cristo» porque no aparece ningún término mesiánico en el versículo.
  - «Entendimiento» se usa como equivalente natural de תְבוּנָה, sin sobreespecificar a 'discernimiento'.
  - La metáfora final permanece íntegra y no se sustituye por una paráfrasis abstracta.
