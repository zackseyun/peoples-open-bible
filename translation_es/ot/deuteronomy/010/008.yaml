translation:
  language: es
  text: En aquel tiempo Yahvé apartó la tribu de Leví para llevar el arca del pacto de Yahvé, para estar delante de Yahvé, para ministrarle y para bendecir en su nombre, hasta el día de hoy.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: הִבְדִּיל
  english_pob_choice: set apart
  chosen_spanish: apartó
  alternatives_spanish:
  - separó
  - puso aparte
  lexicon: HALOT
  rationale: El hebreo expresa una separación con propósito. En español, «apartó» comunica bien esa designación especial sin volver la frase pesada; «puso aparte» también sería posible, pero «apartó» es más directo y natural.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: La política española del proyecto pide «Yahvé» para el Tetragrámaton. Conserva el nombre divino personal y evita la sustitución por un título.
- source_word: שֵׁבֶט הַלֵּוִי
  english_pob_choice: the tribe of Levi
  chosen_spanish: la tribu de Leví
  alternatives_spanish:
  - la tribu de los levitas
  - la tribu levita
  lexicon: HALOT
  rationale: La construcción hebrea se rinde de forma transparente como «la tribu de Leví», preservando el nombre tribal singular y el vínculo genealógico.
- source_word: לָשֵׂאת
  english_pob_choice: to carry
  chosen_spanish: para llevar
  alternatives_spanish:
  - para cargar
  - para portar
  lexicon: HALOT
  rationale: «Llevar» es la opción más natural en español para el deber de transportar el arca. «Cargar» puede sonar más físico y áspero; «portar» es posible, pero menos común.
- source_word: אֲרוֹן בְּרִית יְהוָה
  english_pob_choice: the ark of the covenant of Yahweh
  chosen_spanish: el arca del pacto de Yahvé
  alternatives_spanish:
  - el arca del pacto de Yahvé
  - el arca del pacto de Yahvé
  lexicon: HALOT
  rationale: Se conserva la cadena nominal completa con «arca del pacto de Yahvé». «Pacto» corresponde al vínculo covenantal del hebreo בְּרִית y mantiene la referencia explícita al nombre divino.
- source_word: לַעֲמֹד לִפְנֵי יְהוָה
  english_pob_choice: to stand before Yahweh
  chosen_spanish: para estar en pie delante de Yahvé
  alternatives_spanish:
  - para presentarse delante de Yahvé
  - para estar ante Yahvé
  lexicon: HALOT
  rationale: «Estar en pie delante de» conserva la imagen idiomática y el matiz de servicio cultual. «Delante de» evita suavizar la localización relacional del hebreo.
- source_word: לְשָׁרְתוֹ
  english_pob_choice: to minister to him
  chosen_spanish: para ministrarle
  alternatives_spanish:
  - para servirle
  - para ejercer ministerio ante él
  lexicon: HALOT
  rationale: En contexto cultual, «ministrarle» conserva la noción de servicio sagrado sin convertirla en un término eclesiástico ajeno al texto. «Servirle» sería más general.
- source_word: וּלְבָרֵךְ בִּשְׁמוֹ
  english_pob_choice: and to bless in his name
  chosen_spanish: y para bendecir en su nombre
  alternatives_spanish:
  - y para bendecir por su nombre
  - y para pronunciar bendición en su nombre
  lexicon: HALOT
  rationale: «En su nombre» sigue de cerca el hebreo y expresa autorización/representación. «Bendecir» preserva el acto verbal sin amplificación interpretativa.
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: to this day
  chosen_spanish: hasta el día de hoy
  alternatives_spanish:
  - hasta hoy
  - hasta este día
  lexicon: HALOT
  rationale: La locución idiomática española natural es «hasta el día de hoy», equivalente a la fórmula narrativa de vigencia continua.
theological_decisions:
- issue: Uso del nombre divino en una afirmación cultual deuteronómica
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente יְהוָה. La traducción mantiene el nombre propio «Yahvé» para preservar la identificación del Dios del pacto sin sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de לְשָׁרְתוֹ en contexto levítico
  english_pob_reading: to minister to him
  chosen_spanish_reading: para ministrarle
  alternative_spanish_readings:
  - para servirle
  - para atenderle
  rationale: La frase describe un servicio cultual, no un ministerio eclesial posterior. «Ministrarle» retiene esa función sagrada y evita importar estructuras doctrinales ajenas al pasaje.
  doctrine_reference: 'Translation philosophy: preserve source meaning without importing doctrinal claims'
translation_notes:
  revision_awareness: El texto inglés auditado usa una equivalencia óptima estable; la versión española sigue esa misma lectura, pero ajusta la sintaxis al español natural y adopta la terminología del proyecto («Yahvé», «pacto», «ministrarle») sin añadir notas porque no surgieron variantes textuales ni ambigüedades nuevas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - Se conserva «pacto» para בְּרִית, coherente con el léxico del proyecto.
  - «Ministrarle» se usa en sentido cultual y no denominacional.
  - La estructura final replica las cuatro cláusulas infinitivas del hebreo con paralelismo claro en español.
