  glossary_alignment: Se respeta correctamente «Yahvé» para יְהוָה, «Urías el hitita» para אוּרִיָּה הַחִתִּי, y la excepción explícita del texto. No hay conflicto doctrinal. La principal mejora es estilística e idiomática, no terminológica.
