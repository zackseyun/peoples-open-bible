translation:
  language: es
  text: Sus polluelos chupan[a] sangre, y donde están los caídos[b], allí está.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sorben' o 'lamen'. El verbo hebreo es vívido y puede sugerir chupar, sorber con avidez o lamer.
    reason: lexical_alternative
  - marker: b
    text: O 'los muertos' o 'los cadáveres'. El hebreo dice 'los caídos' o 'los muertos violentamente', enfatizando muerte violenta.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶפְרֹחָיו
  english_pob_choice: its young ones
  chosen_spanish: sus polluelos
  alternatives_spanish:
  - sus crías
  - sus pichones
  - sus jóvenes
  lexicon: HALOT
  rationale: En el contexto de un ave rapaz, 'polluelos' expresa con naturalidad sus crías o crías del nido. Es más preciso y más idiomático en español que el general 'jóvenes', y evita la ambigüedad de 'crías'.
- source_word: יְעַלְעוּ
  english_pob_choice: suck up
  chosen_spanish: chupan
  alternatives_spanish:
  - succionan
  - engullen
  - lamean
  lexicon: HALOT
  rationale: El verbo hebreo es vívido y puede sugerir succionar, tragar con avidez o lamer. En español, 'chupan' conserva la fuerza corporal e inmediata de la imagen sin sonar artificioso. Se evita 'lamean' por ser demasiado específico y menos natural aquí.
- source_word: דָם
  english_pob_choice: blood
  chosen_spanish: sangre
  alternatives_spanish:
  - sangre derramada
  lexicon: HALOT
  rationale: El sentido léxico es directo. 'Sangre' mantiene la concisión poética y no atenúa la imagen violenta.
- source_word: וּבַאֲשֶׁר
  english_pob_choice: and where
  chosen_spanish: y donde
  alternatives_spanish:
  - y adonde
  - y en donde
  lexicon: HALOT
  rationale: La construcción relativa de lugar se expresa de forma natural con 'y donde' en español, conservando el enlace coordinante del hebreo.
- source_word: חֲלָלִים
  english_pob_choice: the slain
  chosen_spanish: los muertos
  alternatives_spanish:
  - los caídos
  - los abatidos
  - los asesinados
  lexicon: HALOT
  rationale: Aunque 'los muertos' es menos específico que 'los caídos' o 'los abatidos', en español fluye mejor en el paralelismo y no pierde el contexto de muerte violenta. Se mantiene una alternativa más literal en la nota textual.
- source_word: שָׁם הוּא
  english_pob_choice: there it is
  chosen_spanish: allí está él
  alternatives_spanish:
  - allí está
  - allí se encuentra
  lexicon: HALOT
  rationale: El pronombre hebreo vuelve sobre el ave descrita. En español, 'él' puede funcionar para conservar la referencia personal/generizada del sujeto animal en el poema, aunque 'allí está' sería más neutral. Se conserva la localización enfática 'allí'.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y el juicio auditado en inglés: mantiene la imagen vívida de las crías del ave que beben sangre y la cláusula locativa final. Se corrigió la validación anterior anclando todas las notas al texto con marcas visibles [a] y [b].'
  spanish_consistency_notes:
  - Se prefirió 'polluelos' como equivalente natural de las crías del ave en contexto poético.
  - Se conservó el paralelismo de dos miembros sin añadir interpretaciones no respaldadas por el hebreo.
  - Se evitó 'SEÑOR' u otra convención no aplicable, y no hay términos teológicos especiales en este versículo.
