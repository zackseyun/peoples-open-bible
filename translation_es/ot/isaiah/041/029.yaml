translation:
  language: es
  text: ¡Miren![a] Todos ellos son nada; sus obras son nada. Sus imágenes fundidas[b] son viento y vacío.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «He aquí»; la expresión hebrea introduce una afirmación enfática y llamativa.
    reason: lexical_alternative
  - marker: b
    text: O «sus imágenes fundidas» puede expresarse también como «sus imágenes de metal fundido».
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  english_pob_choice: Look
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - ¡Miren!
  - He aquí
  lexicon: HALOT
  rationale: La forma hebrea introduce una conclusión enfática y llama la atención. «¡Mira!» conserva la fuerza deíctica en un español natural y digno; «He aquí» sería más tradicional, pero menos natural en el registro moderno.
- source_word: כֻּלָּם
  english_pob_choice: all of them
  chosen_spanish: Todos ellos
  alternatives_spanish:
  - Todos
  - Todos juntos
  lexicon: HALOT
  rationale: El pronombre explícito se conserva para no diluir el alcance colectivo del reproche. «Todos ellos» suena claro y mantiene la referencia abierta al sistema idolátrico del contexto.
- source_word: אָוֶן
  english_pob_choice: nothing
  chosen_spanish: nada
  alternatives_spanish:
  - vacío
  - vanidad
  lexicon: HALOT
  rationale: En este contexto polémico contra los ídolos, el término apunta a inutilidad y carencia real de valor. «Nada» reproduce bien la fuerza predicativa del hebreo y sigue la revisión inglesa que prefirió una forma más directa que «nothingness».
- source_word: אֶפֶס
  english_pob_choice: nothing
  chosen_spanish: nada
  alternatives_spanish:
  - nada en absoluto
  - cero
  lexicon: HALOT
  rationale: Se mantiene la intensificación paralela con אָוֶן mediante «nada». En español, repetir «nada» preserva la cadencia enfática del hebreo sin sonar artificial.
- source_word: מַעֲשֵׂיהֶם
  english_pob_choice: their works
  chosen_spanish: sus obras
  alternatives_spanish:
  - sus hechos
  - lo que hacen
  lexicon: HALOT
  rationale: «Obras» conserva el valor amplio de las acciones/productos asociados con la idolatría y respeta la formulación bíblica sin restringir demasiado el sentido.
- source_word: רוּחַ
  english_pob_choice: wind
  chosen_spanish: viento
  alternatives_spanish:
  - aliento
  - espíritu
  lexicon: HALOT
  rationale: Aquí el contraste retórico exige una imagen de insustancialidad, no un sentido espiritual. «Viento» comunica bien la fugacidad y el vacío de los ídolos.
- source_word: תֹהוּ
  english_pob_choice: emptiness
  chosen_spanish: vacío
  alternatives_spanish:
  - vaciedad
  - caos
  lexicon: HALOT
  rationale: «Vacío» expresa la idea de futilidad y carencia de contenido en el paralelismo con «viento». «Caos» sería demasiado específico para este contexto de denuncia de ídolos.
- source_word: נִסְכֵּיהֶם
  english_pob_choice: their cast images
  chosen_spanish: sus imágenes fundidas
  alternatives_spanish:
  - sus ídolos fundidos
  - sus imágenes moldeadas
  lexicon: HALOT
  rationale: La forma nominal relacionada con el fundir/verter metales apunta a imágenes hechas por fundición. «Imágenes fundidas» es fiel y reconocible en español bíblico; también deja visible el vínculo con la alternativa inglesa «molten images».
theological_decisions:
- issue: Alcance del juicio contra la idolatría
  english_pob_reading: The verse condemns idols and the products associated with them as worthless and unreal.
  chosen_spanish_reading: El versículo condena a los ídolos y a lo que se hace para ellos como algo sin valor y sin realidad.
  alternative_spanish_readings:
  - El versículo condena solo a las imágenes idolátricas
  - El versículo condena también a los fabricantes de ídolos
  rationale: El hebreo y el contexto inmediato permiten una referencia amplia al sistema idolátrico. La traducción española mantiene esa amplitud sin cerrarse indebidamente a un solo referente.
  doctrine_reference: Isaías 41:21-29; Jeremías 10:14-15
translation_notes:
  revision_awareness: La versión inglesa revisada prefirió «nothing» en lugar de «nothingness» para אָוֶן/אֶפֶס, conservando el paralelismo directo. En español se reflejó esa revisión con «nada» repetido, y se mantuvo la imagen final de «viento y vacío» para רוּחַ וָתֹהוּ.
  spanish_consistency_notes:
  - Se mantiene «ídolos/imágenes fundidas» en un registro bíblico claro y no se sustituye por terminología eclesiástica no motivada por el hebreo.
  - Se conserva la duplicación de «nada» para reproducir el énfasis paralelo del original.
  - «Viento y vacío» evita espiritualizar רוּחַ y respeta la oposición poética con תֹהוּ.
