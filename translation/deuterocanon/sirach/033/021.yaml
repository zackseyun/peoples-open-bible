translation:
  text: As long as you are still alive and breath is in you[a], do not give yourself over to any flesh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not hand yourself over to anyone' or 'do not submit yourself to any person.' The Greek literally says 'to any flesh.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕως ἔτι ζῇς
  chosen: As long as you are still alive
  alternatives:
  - while you still live
  - so long as you live
  lexicon: LSJ
  rationale: 'ἕως with ἔτι and the present verb ζῇς gives a temporal limit: during the time you continue living. ''As long as you are still alive'' is natural English and preserves the emphatic sense of continued life.'
- source_word: πνοὴ
  chosen: breath
  alternatives:
  - spirit
  - life-breath
  lexicon: LSJ
  rationale: πνοή most directly denotes breath or breathing. In this context paired with 'in you,' it refers to ongoing life. 'Breath' is the clearest and least interpretively loaded rendering.
- source_word: μὴ ἀλλάξῃς
  chosen: do not give yourself over
  alternatives:
  - do not change
  - do not hand yourself over
  - do not submit yourself
  lexicon: LSJ
  rationale: Although ἀλλάσσω commonly means 'change' or 'exchange,' the construction ἀλλάξῃς σεαυτόν with a dative ('to/for any flesh') is awkward if rendered woodenly as 'do not change yourself to.' The sense is that one should not yield or transfer oneself into another's control. 'Give yourself over' captures the idiomatic force in readable English while remaining anchored to the underlying idea of handing oneself across.
- source_word: σεαυτόν
  chosen: yourself
  lexicon: LSJ
  rationale: Reflexive direct object; the warning concerns one's own person, not merely one's status or opinion.
- source_word: πάσῃ σαρκί
  chosen: to any flesh
  alternatives:
  - to anyone
  - to any person
  - to any mortal
  lexicon: LSJ
  rationale: σάρξ literally means 'flesh.' Here it functions idiomatically for human beings/mortals. Because the phrase is striking and the project prefers preserving key terms where possible, 'any flesh' is retained in the main text rather than flattened to 'anyone.'
