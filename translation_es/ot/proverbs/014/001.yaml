review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del hebreo y sigue de cerca las decisiones auditadas en inglés: lectura superlativa/genericizable de חַכְמוֹת נָשִׁים, presente gnómico para בָּנְתָה, mantenimiento de la imagen de «casa», personalización de אִוֶּלֶת como mujer necia/insensata, y contraste construir/derribar. Sin embargo, hay un problema de forma importante en el aparato: la nota b introduce «familia/establecimiento familiar», pero en los metadatos aparece una contaminación en inglés («establishment familiar»), y conviene normalizarla en español. Además, la ancla [a] está puesta sobre «mujeres», cuando semánticamente la alternativa afecta a toda la expresión inicial; puede mantenerse, pero es mejor anclarla tras la frase completa para mayor claridad.'
  spanish_quality_summary: La redacción principal es natural, digna y clara en español. «Edifica» y «derriba» funcionan bien en registro proverbial. «La más sabia de las mujeres» es comprensible, aunque algo más idiomático en español sería «La más sabia entre las mujeres» o simplemente mantener la actual. La única reparación necesaria es pulir las notas para español más limpio y coherente, y ajustar la colocación de [a] para que corresponda mejor al alcance de la nota.
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé, Mesías, esclavo, etc. Las decisiones léxicas están alineadas con el audit trail: «casa» preserva בַּיִת; «insensata» comunica bien אִוֶּלֶת; «con sus propias manos» transmite el énfasis instrumental de בְּיָדֶיהָ.'
  issues:
  - severity: medium
    issue: La nota b contiene formulación poco pulida y una contaminación léxica en la documentación asociada («familia/establecimiento familiar»; en metadatos incluso aparece 'establishment').
    rationale: 'Debe normalizarse a español natural y eclesialmente legible: «hogar» o «familia/establecimiento familiar» puede expresarse mejor como «hogar» o «ámbito familiar», o «establecimiento familiar» sin barras innecesarias.'
  - severity: low
    issue: La ubicación de la marca [a] sobre «mujeres» no refleja con precisión que la alternativa afecta a toda la expresión inicial.
    rationale: La nota explica una lectura alternativa de toda la construcción חַכְמוֹת נָשִׁים, no solo del sustantivo «mujeres». Anclarla al final de la frase mejora la correspondencia entre texto y nota.
  revised_spanish_text: La más sabia de las mujeres[a] edifica su casa[b], pero la mujer insensata la derriba con sus propias manos.
  revised_footnotes:
  - marker: a
    text: 'O: «Toda mujer sabia». El hebreo inicial puede entenderse de manera genérica como una afirmación de clase, y no solo como una expresión superlativa.'
    reason: lexical_alternative
  - marker: b
    text: «Casa» también puede incluir el sentido de «hogar» o «ámbito familiar», no solo la vivienda física.
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel al hebreo y al audit trail inglés. Se revisan las notas para español más natural y preciso, eliminando formulaciones híbridas o torpes, y se mantiene el anclaje [a] al final de la expresión inicial para que corresponda a toda la unidad semántica.
