    rationale: En este contexto de batalla, el hebreo probablemente usa 'cipreses' por las astas/lanzas de ciprés. El inglés POB adoptó esa lectura en el texto principal y dejó la literalidad en nota. En español, 'los cipreses son blandidos' suena impropio y puede malinterpretarse como árboles agitándose.
