translation:
  language: es
  text: Pero él, escogiendo la muerte con honor antes que una vida con impureza, se acercó de su propia voluntad al potro[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «al tímpano», un instrumento de tortura; tradicionalmente también se ha traducido más literalmente como «tambor», aunque el aparato exacto es incierto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μετʼ εὐκλείας
  english_pob_choice: with honor
  chosen_spanish: con honor
  alternatives_spanish:
  - con buena reputación
  - con gloria
  - con noble renombre
  lexicon: LSJ
  rationale: εὐκλεία expresa buena fama, honor o gloria. «Con honor» es natural en español y conserva el contraste con la vida deshonrosa o manchada que sigue.
- source_word: θάνατον
  english_pob_choice: death
  chosen_spanish: la muerte
  alternatives_spanish:
  - muerte
  lexicon: LSJ
  rationale: Es el sustantivo directo y claro del texto griego.
- source_word: μᾶλλον ἢ
  english_pob_choice: rather than
  chosen_spanish: antes que
  alternatives_spanish:
  - más que
  - en vez de
  lexicon: LSJ
  rationale: La comparación de preferencia se expresa con naturalidad en español como «antes que», manteniendo el contraste de elección.
- source_word: μετὰ μύσους βίον
  english_pob_choice: a life with defilement
  chosen_spanish: una vida con mancha
  alternatives_spanish:
  - una vida con defilement
  - una vida con contaminación
  - una vida deshonrosa
  lexicon: LSJ
  rationale: μῦσος suele implicar contaminación ritual o moral. «Mancha» comunica la idea de impureza/contaminación de forma idiomática en español sin perder la tensión moral-ritual del contexto.
- source_word: ἀναδεξάμενος
  english_pob_choice: choosing
  chosen_spanish: escogiendo
  alternatives_spanish:
  - eligiendo
  - aceptando
  - tomando para sí
  lexicon: LSJ
  rationale: El participio indica una decisión asumida deliberadamente. «Escogiendo» refleja bien la agencia voluntaria que la auditoría inglesa resaltó con «choosing».
- source_word: αὐθαιρέτως
  english_pob_choice: of his own accord
  chosen_spanish: de su propia voluntad
  alternatives_spanish:
  - voluntariamente
  - por su propia cuenta
  - de buen grado
  lexicon: LSJ
  rationale: El adverbio subraya la iniciativa personal. «De su propia voluntad» preserva esa fuerza con un registro digno y claro.
- source_word: ἐπὶ τὸ τύμπανον
  english_pob_choice: to the rack
  chosen_spanish: al tímpano[a]
  alternatives_spanish:
  - al rack
  - al instrumento de tortura
  - al tambor
  lexicon: LSJ
  rationale: τύμπανον designa aquí un aparato de tortura; el POB inglés optó por «rack» como equivalente funcional, pero el español puede mantener el término más literal «tímpano» con nota para evitar la falsa lectura de un órgano anatómico moderno o de un tambor musical.
- source_word: προσῆγεν
  english_pob_choice: went
  chosen_spanish: se acercó
  alternatives_spanish:
  - avanzó
  - fue
  - se presentó
  lexicon: LSJ
  rationale: Con αὐθαιρέτως, el sentido es que él mismo se dirigió hacia el suplicio. «Se acercó» comunica ese movimiento intencional sin introducir pasividad.
theological_decisions:
- issue: μύσος como impureza moral/ritual
  english_pob_reading: defilement
  chosen_spanish_reading: mancha
  alternative_spanish_readings:
  - contaminación
  - impureza
  - deshonra
  rationale: En el contexto martirial, el contraste no es meramente estético sino de fidelidad frente a profanación. «Mancha» mantiene la carga de impureza moral/ritual sin volver el verso demasiado técnico.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than flattening lexical force.'
- issue: τύμπανον como instrumento de tortura
  english_pob_reading: rack
  chosen_spanish_reading: tímpano
  alternative_spanish_readings:
  - instrumento de tortura
  - rueca de tortura
  - rack
  rationale: El contexto narrativo exige un instrumento de suplicio, no un tambor. Se conserva el término más cercano al griego con una nota explicativa para no perder la referencia histórica ni la incertidumbre sobre el aparato exacto.
  doctrine_reference: 'Translation philosophy: readable modern Spanish while preserving source transparency and lexical uncertainty.'
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa, que prefirió «choosing» en lugar de «welcoming» para ἀναδεξάμενος, y conserva la solución funcional para τύμπανον con nota. El español intenta reflejar esa decisión sin mecanicismo, manteniendo el paralelismo entre una muerte honorable y una vida manchada.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto base lo requiera; aquí no aplica.
  - Se evitó «SEÑOR» o fórmulas eclesiásticas no presentes en el original.
  - «Tímpano» se mantiene con nota para transparentar la tensión entre literalidad y función.
  - «Mancha» fue elegido por ser natural en español y suficientemente amplio para el matiz de μῦσος.
