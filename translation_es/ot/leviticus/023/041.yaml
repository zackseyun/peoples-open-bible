translation:
  language: es
  text: Lo celebraréis como fiesta para Yahvé[a] durante siete días en el año. Será estatuto permanente[b] por todas sus generaciones; en el séptimo mes lo celebraréis.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a Yahvé».
    reason: lexical_alternative
  - marker: b
    text: O «estatuto perpetuo» o «estatuto eterno».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְחַגֹּתֶם / תָּחֹגּוּ
  english_pob_choice: you shall celebrate
  chosen_spanish: lo celebraréis
  alternatives_spanish:
  - lo festejaréis
  - lo observaréis como fiesta
  lexicon: HALOT
  rationale: El verbo חָגַג comunica la acción de celebrar una fiesta de peregrinación o festiva. En español, «celebraréis» conserva el sentido natural y solemne sin introducir una paráfrasis más amplia que el hebreo.
- source_word: אֹתוֹ
  english_pob_choice: it
  chosen_spanish: lo
  alternatives_spanish:
  - esta fiesta
  - este festejo
  lexicon: HALOT
  rationale: El pronombre retoma la fiesta mencionada por el contexto. «Lo» mantiene la referencia pronominal sin añadir un sustantivo que el texto no expresa.
- source_word: חַג
  english_pob_choice: a feast
  chosen_spanish: fiesta
  alternatives_spanish:
  - fiesta solemne
  - festival
  lexicon: HALOT
  rationale: חַג designa una celebración cultual/festiva. «Fiesta» es natural en español y conserva la relación con el campo semántico de celebración ritual.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - para el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como «Yahvé» según la norma del proyecto. La preposición ל admite valor de dedicación; en español, «para Yahvé» comunica bien que la fiesta está consagrada a él.
- source_word: שִׁבְעַת יָמִים
  english_pob_choice: for seven days
  chosen_spanish: durante siete días
  alternatives_spanish:
  - por siete días
  - siete días
  lexicon: HALOT
  rationale: La expresión indica duración. «Durante siete días» expresa mejor la vigencia temporal en español que un calco más rígido.
- source_word: בַּשָּׁנָה
  english_pob_choice: in the year
  chosen_spanish: en el año
  alternatives_spanish:
  - cada año
  - anualmente
  lexicon: HALOT
  rationale: El hebreo dice literalmente «en el año», y el contexto cultual lo entiende como observancia anual. Se conserva la cercanía al texto fuente.
- source_word: חֻקַּת עוֹלָם
  english_pob_choice: a permanent statute
  chosen_spanish: estatuto permanente
  alternatives_spanish:
  - estatuto perpetuo
  - estatuto eterno
  lexicon: HALOT
  rationale: חֻקָּה es una disposición normativa; עוֹלָם en este marco legal expresa duración continua dentro del pacto. «Permanente» evita cargar el término con una lectura filosófica de eternidad absoluta.
- source_word: לְדֹרֹתֵיכֶם
  english_pob_choice: throughout your generations
  chosen_spanish: por vuestras generaciones
  alternatives_spanish:
  - a través de vuestras generaciones
  - para vuestras generaciones
  lexicon: HALOT
  rationale: La fórmula hebrea indica continuidad intergeneracional. «Por vuestras generaciones» es fiel y natural en registro bíblico-español.
- source_word: בַּחֹדֶשׁ הַשְּׁבִיעִי
  english_pob_choice: in the seventh month
  chosen_spanish: en el séptimo mes
  alternatives_spanish:
  - durante el séptimo mes
  lexicon: HALOT
  rationale: Es una indicación temporal directa y transparente; no requiere expansión interpretativa.
theological_decisions:
- issue: Representación del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: El hebreo usa el Tetragrama de manera directa. Conforme a la política del proyecto, se mantiene el nombre pactal en español como «Yahvé», no como sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Alcance de עוֹלָם en legislación cultual
  english_pob_reading: permanent statute
  chosen_spanish_reading: estatuto permanente
  alternative_spanish_readings:
  - estatuto perpetuo
  - estatuto eterno
  rationale: En legislación del pacto, עוֹלָם expresa vigencia duradera y obligatoria, no necesariamente una afirmación metafísica sobre infinitud absoluta. «Permanente» preserva ese alcance.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve the source''s plain sense without importing doctrinal claims'
translation_notes:
  revision_awareness: 'El pasaje coincide con la revisión más reciente sin cambios: la lectura auditada mantiene alta concordancia y no requiere ajustes adicionales.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente con la política del proyecto para el nombre divino.
  - «Fiesta» traduce aquí el valor cultual de חַג sin introducir términos eclesiásticos ajenos.
  - Se conserva el paralelismo verbal del hebreo con dos ocurrencias de «celebraréis» implícitas en la misma forma verbal, resueltas de manera natural en español sin perder la repetición conceptual.
  - «Estatuto permanente» refleja el valor legal de חֻקַּת עוֹלָם sin sobrerinterpretar «eterno».
