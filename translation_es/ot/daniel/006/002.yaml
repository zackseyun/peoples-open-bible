translation:
  language: es
  text: A Darío le pareció bien nombrar sobre el reino ciento veinte sátrapas[a], que estuvieran en todo el reino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «gobernadores provinciales» para «sátrapas», funcionarios administrativos persas de alto rango.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁפַר
  english_pob_choice: It seemed good
  chosen_spanish: le pareció bien
  alternatives_spanish:
  - le agradó
  - le pareció adecuado
  lexicon: HALOT
  rationale: La expresión aramea es idiomática y evalúa favorablemente la acción. «Le pareció bien» conserva ese juicio de conveniencia o aprobación sin introducir emoción no explicitada.
- source_word: קֳדָם
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: HALOT
  rationale: 'Con este giro, la relación con Darío se expresa de manera natural en español: «a Darío». Evita un calco innecesario de «ante» que sonaría más pesado en este contexto administrativo.'
- source_word: וַהֲקִים
  english_pob_choice: to appoint
  chosen_spanish: nombrar
  alternatives_spanish:
  - designar
  - establecer
  lexicon: HALOT
  rationale: En contexto administrativo, el verbo no describe una colocación física sino la instalación en un cargo. «Nombrar» comunica con claridad la acción de investir oficiales.
- source_word: עַל מַלְכוּתָא
  english_pob_choice: over the kingdom
  chosen_spanish: sobre el reino
  alternatives_spanish:
  - sobre el reino de éste
  - sobre la administración del reino
  lexicon: HALOT
  rationale: «Reino» reproduce el término básico מַלְכוּתָא. «Sobre» mantiene la idea de jurisdicción o supervisión administrativa sin añadir especificaciones que el texto no explicita.
- source_word: אֲחַשְׁדַּרְפְּנַיָּא
  english_pob_choice: satraps
  chosen_spanish: sátrapas
  alternatives_spanish:
  - gobernadores provinciales
  lexicon: HALOT
  rationale: Se conserva el término técnico persa tradicionalmente usado en español. Es preciso históricamente y mantiene el matiz oficial del cargo; la alternativa explicativa queda disponible para lectores que necesiten aclaración.
- source_word: מְאָה וְעֶשְׂרִין
  english_pob_choice: one hundred and twenty
  chosen_spanish: ciento veinte
  alternatives_spanish:
  - '120'
  lexicon: HALOT
  rationale: El cardinal se traduce en palabras para un registro bíblico fluido y solemne en español, sin cambiar el valor numérico.
- source_word: דִּי לֶהֱוֺן
  english_pob_choice: who would be
  chosen_spanish: que estuvieran
  alternatives_spanish:
  - que fuesen
  - para que estuvieran
  lexicon: HALOT
  rationale: La forma prospectiva del arameo expresa destino o disposición futura de los funcionarios. «Que estuvieran» transmite esa función y resulta natural en español; no se requiere forzar un infinitivo castellano.
- source_word: בְּכָל מַלְכוּתָא
  english_pob_choice: throughout the whole kingdom
  chosen_spanish: en todo el reino
  alternatives_spanish:
  - por todo el reino
  - a lo largo de todo el reino
  lexicon: HALOT
  rationale: La frase indica distribución administrativa en la totalidad del territorio. «En todo el reino» comunica adecuadamente el alcance completo; «en» evita sobreexplicar con una preposición de recorrido que el hebreo/arameo no exige.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el valor idiomático del arameo según el audit trail inglés: שְׁפַר como aprobación o conveniencia, וַהֲקִים como nombramiento administrativo, y בְּכָל מַלְכוּתָא como alcance territorial total. No se detectaron revisiones aplicadas en el expediente inglés, por lo que se mantiene una solución estable y auditable.'
  spanish_consistency_notes:
  - Se usa «reino» como equivalente constante de מַלְכוּתָא.
  - Se mantiene «sátrapas» por ser el término técnico histórico, con alternativa explicativa en nota.
  - Se evita «SEÑOR» u otra sustitución reverencial, pues aquí no aparece el Tetragrámaton ni un uso divino del título.
  - El número se escribe con letras, acorde con el registro bíblico en español.
  - La sintaxis intenta ser natural sin apartarse del valor administrativo y prospectivo del arameo.
