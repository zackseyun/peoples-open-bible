review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el hebreo: mantiene la secuencia narrativa («Entonces»), el nombre divino «Yahvé», el imperativo de retorno, «la tierra de tus padres» y la promesa «estaré contigo». La única falla relevante está en la nota: repite «tu parentela» como variante de una lectura ya adoptada y omite la alternativa geográfica más específica preservada en el rastro inglés.'
  spanish_quality_summary: El texto principal es natural, digno y claro en español eclesial. «Regresa» y «parentela» son legibles; no hay calcos torpes. La puntuación y el estilo son adecuados.
  glossary_alignment: 'Alineado con la terminología del proyecto: יְהוָה → «Yahvé». No hay conflicto con otros términos doctrinales. «Parentela» es una buena opción para מוֹלַדְתֶּךָ en contexto, pero la nota debe explicar mejor la alternativa «parientes / lugar de origen» sin redundancia.'
  issues:
  - severity: medium
    issue: La nota al pie está mal formulada
    rationale: Dice «O “tu parentela”», que no ofrece una alternativa real porque esa es exactamente la lectura del texto principal. Debe reflejar alternativas significativas del hebreo, como «tus parientes» o «tu lugar de origen / tierra natal», conforme al audit trail inglés.
  revised_spanish_text: 'Entonces Yahvé dijo a Jacob[a]: «Regresa a la tierra de tus padres y a tu parentela, y yo estaré contigo».'
  revised_footnotes:
  - marker: a
    text: O «tus parientes»; el hebreo puede referirse al grupo de parientes o al lugar de origen («tierra natal»), según el contexto.
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel al hebreo y suena natural en español. Solo se corrige la nota al pie para que presente alternativas reales y preserve mejor la justificación léxica documentada para מוֹלַדְתֶּךָ.
