translation:
  language: es
  text: Así que salí de noche por la Puerta del Valle, hacia la Fuente del Dragón[a] y hacia la Puerta del Estercolero; e inspeccioné[b] los muros de Jerusalén, que habían sido derribados, y sus puertas, que habían sido consumidas por el fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Fuente del Dragón» traduce el topónimo con el valor amplio de תַּנִּין; también podrían entenderse «Fuente de la Serpiente» o «Fuente del Chacal», según el rango semántico del término hebreo.
    reason: lexical_alternative
  - marker: b
    text: La expresión hebrea tradicionalmente entendida como «vi» o «contemplé» es literalmente más difícil; aquí se entiende en contexto como «inspeccioné» los muros dañados.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֵצְאָה
  english_pob_choice: So I went out
  chosen_spanish: Así que salí
  alternatives_spanish:
  - Y salí
  - Entonces salí
  lexicon: HALOT
  rationale: La forma narrativa en español suele expresar mejor la secuencia con «Así que» o «Entonces»; «salí» conserva el valor de wayyiqtol en primera persona sin añadir interpretación.
- source_word: בְּשַׁעַר הַגַּיְא
  english_pob_choice: through the Valley Gate
  chosen_spanish: por la Puerta del Valle
  alternatives_spanish:
  - a través de la Puerta del Valle
  - por la puerta del valle
  lexicon: HALOT
  rationale: En español, «por» comunica un movimiento de paso de manera natural. «Puerta del Valle» mantiene el nombre topográfico tradicional sin forzar una glosa.
- source_word: לַיְלָה
  english_pob_choice: by night
  chosen_spanish: de noche
  alternatives_spanish:
  - por la noche
  - en la noche
  lexicon: HALOT
  rationale: «De noche» es idiomático en español para tiempo adverbial y conserva la sencillez del hebreo.
- source_word: עֵין הַתַּנִּין
  english_pob_choice: Dragon Spring
  chosen_spanish: Fuente del Dragón
  alternatives_spanish:
  - Fuente del Serpiente
  - Fuente del Monstruo Marino
  lexicon: HALOT
  rationale: עין en este contexto es «fuente». Para תַּנִּין, «dragón» preserva el rango semántico sin reducirlo a una sola criatura; en un topónimo, la forma natural en español es «Fuente del Dragón».
- source_word: שַׁעַר הָאַשְׁפֹּת
  english_pob_choice: the Dung Gate
  chosen_spanish: Puerta del Estercolero
  alternatives_spanish:
  - Puerta del Dung
  - Puerta del Basurero
  lexicon: HALOT
  rationale: אַשְׁפֹּת se refiere a desechos/estiércol. «Estercolero» conserva el contenido material del término y evita un falso refinamiento; es más transparente en español que una transliteración.
- source_word: שֹׂבֵר
  english_pob_choice: I inspected
  chosen_spanish: inspeccioné
  alternatives_spanish:
  - examiné
  - observé
  lexicon: HALOT
  rationale: Aunque el lexema base puede asociarse a «romper», en este contexto el inglés POB entiende la acción como una inspección atenta de las grietas. «Inspeccioné» refleja esa decisión contextual sin perder la idea de examen cuidadoso.
- source_word: בְּחוֹמֹת יְרוּשָׁלִַם
  english_pob_choice: the walls of Jerusalem
  chosen_spanish: los muros de Jerusalén
  alternatives_spanish:
  - las murallas de Jerusalén
  - los muros de la ciudad de Jerusalén
  lexicon: HALOT
  rationale: «Muros» funciona bien en español y es suficientemente literal; «murallas» sería posible, pero «muros» deja más abierta la referencia arquitectónica del hebreo.
- source_word: הַמְּפֹרָצִים
  english_pob_choice: that had been broken down
  chosen_spanish: que habían sido derribados
  alternatives_spanish:
  - que estaban en ruinas
  - que habían sido brechados
  lexicon: HALOT
  rationale: El participio pasivo expresa muros abiertos o rotos. «Derribados» comunica bien el daño estructural en español y mantiene la fuerza del estado resultante.
- source_word: וּשְׁעָרֶיהָ אֻכְּלוּ בָאֵשׁ
  english_pob_choice: and its gates that had been consumed by fire
  chosen_spanish: y sus puertas, que habían sido consumidas por el fuego
  alternatives_spanish:
  - y sus puertas, que habían sido quemadas por el fuego
  - y sus puertas, que habían sido devoradas por el fuego
  lexicon: HALOT
  rationale: «Consumidas por el fuego» conserva la imagen verbal del hebreo y sigue de cerca la solución inglesa. «Quemadas» sería más llano, pero menos fiel a la metáfora de אכל.
translation_notes:
  revision_awareness: Seguí de cerca la revisión más reciente del audit trail inglés, que reemplazó «I was inspecting» por una forma más directa. Por eso opté por «inspeccioné» en vez de una perífrasis progresiva, manteniendo el valor de observación cuidadosa del contexto.
  spanish_consistency_notes:
  - Usé «Puerta del Valle» y «Puerta del Estercolero» como nombres topográficos consistentes con el estilo POB de no ocultar los nombres propios del texto.
  - Mantuve «Yahvé» no porque aparezca en este versículo, sino para coherencia terminológica general del proyecto; aquí no era necesario.
  - Elegí «muros» y no «murallas» para no introducir un matiz demasiado interpretativo; el contexto de Jerusalén y sus defensas queda claro por sí mismo.
  - Conservé la metáfora de «consumidas por el fuego» para respetar la imagen verbal del hebreo y el audit trail inglés.
