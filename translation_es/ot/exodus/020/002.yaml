translation:
  language: es
  text: Yo soy Yahvé[a], tu Dios, que te saqué de la tierra de Egipto, de la casa de esclavitud[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo YHWH; tradicionalmente se traducía ‘el SEÑOR’. Aquí se translitera como ‘Yahvé’ para preservar el nombre divino.
    reason: alternative_reading
  - marker: b
    text: La expresión hebrea es literalmente ‘de la casa de esclavos’; aquí se vierte de forma más idiomática como ‘de la casa de esclavitud’.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָֽנֹכִ֖י
  english_pob_choice: I am
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Yo
  lexicon: HALOT
  rationale: El pronombre independiente enfatiza la autoidentificación solemne; en español, una cláusula copulativa natural y digna es 'Yo soy', que conserva el peso enfático del hebreo sin sonar forzada.
- source_word: יְהוָ֣ה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte con el nombre propio divino 'Yahvé' según la terminología del proyecto, preservando el nombre personal revelado y evitando la sustitución por un título.
- source_word: אֱלֹהֶ֑י/ךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tus dioses
  lexicon: HALOT
  rationale: Aunque la forma hebrea es morfológicamente plural, aquí tiene referencia singular con sufijo de segunda persona singular; 'tu Dios' refleja correctamente ese sentido singular e idiomático en español.
- source_word: הוֹצֵאתִ֛י/ךָ
  english_pob_choice: brought you out
  chosen_spanish: te saqué
  alternatives_spanish:
  - te hice salir
  - te conduje fuera
  lexicon: HALOT
  rationale: El Hifil de יצא expresa sacar/hacer salir; en español, 'te saqué' es la equivalencia más directa y natural, manteniendo el motivo del éxodo sin calco innecesario.
- source_word: מֵ/אֶ֥רֶץ מִצְרַ֖יִם
  english_pob_choice: from the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - de la tierra de Egipto
  - de Egipto
  lexicon: HALOT
  rationale: La preposición מִן marca origen; 'de la tierra de Egipto' conserva la estructura formal del hebreo y la expresión geográfica completa.
- source_word: מִ/בֵּ֥ית עֲבָדִֽים
  english_pob_choice: out of the house of slavery
  chosen_spanish: de la casa de esclavos
  alternatives_spanish:
  - de la casa de esclavitud
  - de la casa de servidumbre
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'de la casa de esclavos'. Dado que עֲבָדִים señala esclavos/bondados y el proyecto privilegia la fuerza léxica, se conserva 'esclavos' en vez de suavizarlo a 'servidumbre'.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La lectura del texto fuente es el nombre propio del pacto, no un título. 'Yahvé' preserva esa identificación personal y sigue el estándar del proyecto en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de בֵּית עֲבָדִים
  english_pob_reading: house of slavery
  chosen_spanish_reading: casa de esclavos
  alternative_spanish_readings:
  - casa de esclavitud
  - casa de servidumbre
  rationale: El contexto es la liberación de una condición de bondage nacional y laboral; la referencia concreta a 'esclavos' mantiene la intensidad del hebreo y no diluye la imagen en un abstracto.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; bonded-status language principle
translation_notes:
  revision_awareness: La revisión inglesa más reciente prefería la forma idiomática 'out of the house of slavery' frente a 'out from' y mantenía el valor concreto de la expresión. En español, se refleja con una construcción natural ('de la casa de esclavos') sin perder la literalidad subyacente del hebreo. También se respetó el nombre divino como 'Yahvé' conforme al audit trail.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma estándar para יְהוָה en el texto principal, coherente con el proyecto.
  - Se conserva el tratamiento singular 'tu Dios' para אֱלֹהֶיךָ.
  - Se opta por 'esclavos' por la fuerza léxica del hebreo, evitando la suavización a 'servidumbre'.
  - La sintaxis procura ser solemne y bíblica sin depender de calcos arcaizantes.
