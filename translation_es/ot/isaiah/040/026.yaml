translation:
  language: es
  text: 'Alcen sus ojos a lo alto y vean: ¿quién creó estas? El que hace salir su hueste[b] por número[a], llamando a todas por nombre. Por la grandeza de su poder y la fuerza de su poder[c], no falta ni una[d].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «llama a cada una por nombre».
    reason: lexical_alternative
  - marker: b
    text: «Su hueste» se refiere a la multitud ordenada de los cuerpos celestes.
    reason: cultural_note
  - marker: c
    text: O «la fuerza de su vigor». La expresión hebrea intensifica la idea de fuerza.
    reason: lexical_alternative
  - marker: d
    text: Literalmente, «no falta un hombre». Es un giro distributivo hebreo que significa que ninguna de ellas falta.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂאוּ
  english_pob_choice: Lift up
  chosen_spanish: Alcen
  alternatives_spanish:
  - Levanten
  - Elevan
  lexicon: HALOT
  rationale: El imperativo plural pide una acción dirigida a varios; «alcen» conserva el impulso físico ascendente de נשׂא y suena natural en español.
- source_word: מָרוֹם
  english_pob_choice: on high
  chosen_spanish: a lo alto
  alternatives_spanish:
  - en lo alto
  - hacia lo alto
  lexicon: HALOT
  rationale: La dirección espacial hacia el cielo se expresa de modo claro y natural con «a lo alto», manteniendo el sentido locativo/adverbial.
- source_word: עֵינֵיכֶם
  english_pob_choice: your eyes
  chosen_spanish: sus ojos
  alternatives_spanish:
  - los ojos de ustedes
  - vuestros ojos
  lexicon: HALOT
  rationale: Se conserva el objeto directo del mandato. «Sus ojos» resulta neutro y ampliamente readable en español bíblico contemporáneo.
- source_word: וּרְאוּ
  english_pob_choice: and see
  chosen_spanish: y vean
  alternatives_spanish:
  - y miren
  - y contemplen
  lexicon: HALOT
  rationale: «Vean» corresponde bien al paralelo con el imperativo anterior y mantiene el llamado a observar con atención.
- source_word: מִי בָרָא אֵלֶּה
  english_pob_choice: who created these?
  chosen_spanish: ¿quién creó estas cosas?
  alternatives_spanish:
  - ¿quién creó éstas?
  - ¿quién creó esto?
  lexicon: HALOT
  rationale: «Estas cosas» explicita el referente celestial sin añadir una identificación más precisa de la que el hebreo demanda en la línea principal.
- source_word: הַמּוֹצִיא
  english_pob_choice: He who brings out
  chosen_spanish: Él es quien saca
  alternatives_spanish:
  - Quien saca
  - El que saca
  lexicon: HALOT
  rationale: El participio sustantivado se vierte de modo fluido en español con una relativa explícita. «Saca» conserva la idea de sacar/poner fuera, y «Él es quien» ayuda a enlazar la referencia a Dios.
- source_word: בְמִסְפָּר
  english_pob_choice: by number
  chosen_spanish: por número
  alternatives_spanish:
  - según número
  - contando
  lexicon: HALOT
  rationale: «Por número» preserva la noción de enumeración ordenada sin convertirla en un comentario interpretativo adicional.
- source_word: צְבָאָם
  english_pob_choice: their host
  chosen_spanish: su ejército
  alternatives_spanish:
  - su hueste
  - su multitud
  lexicon: HALOT
  rationale: En este contexto astral, el término puede referir al conjunto ordenado de los cuerpos celestes. «Ejército» retiene la imagen colectiva fuerte del hebreo, aunque es una elección más marcada que «hueste».
- source_word: לְכֻלָּם בְּשֵׁם יִקְרָא
  english_pob_choice: calling all of them by name
  chosen_spanish: a todos ellos llama por nombre
  alternatives_spanish:
  - llamando a todos por nombre
  - llama a cada uno por nombre
  lexicon: HALOT
  rationale: Se mantiene la estructura del hebreo con el énfasis distributivo en «a todos ellos». «Por nombre» refleja la expresión idiomática sin suavizar el acto de nombrar.
- source_word: מֵרֹב אוֹנִים
  english_pob_choice: Because of the greatness of his might
  chosen_spanish: Por la grandeza de su poder
  alternatives_spanish:
  - A causa de la abundancia de su vigor
  - Por la multitud de su fuerza
  lexicon: HALOT
  rationale: «Grandeza de su poder» traduce con naturalidad el valor causal y la idea de energía/fortaleza de אוֹנִים en un registro digno.
- source_word: וְאַמִּיץ כֹּחַ
  english_pob_choice: and the strength of his power
  chosen_spanish: y la fuerza de su vigor
  alternatives_spanish:
  - y la fortaleza de su poder
  - y su poder vigoroso
  lexicon: HALOT
  rationale: Se preserva el paralelismo semántico con una segunda expresión intensiva. «Vigor» ayuda a reflejar אָמִּיץ/אוֹנִים sin repetir exactamente «poder».
- source_word: אִישׁ לֹא נֶעְדָּר
  english_pob_choice: not one is missing
  chosen_spanish: no falta ni uno
  alternatives_spanish:
  - ninguno falta
  - no se ausenta ni uno
  lexicon: HALOT
  rationale: 'La expresión distributiva se vuelve idiomática en español para expresar el sentido: ninguno de los miembros del conjunto está ausente.'
theological_decisions:
- issue: Referente de «estas cosas» y de «su ejército»
  english_pob_reading: The verse refers to the heavenly bodies/stars as the created host brought out and named by God.
  chosen_spanish_reading: La línea principal conserva una referencia abierta a los cuerpos celestes como conjunto creado, sin forzar en el texto principal la palabra «estrellas».
  alternative_spanish_readings:
  - Las estrellas
  - los astros
  - la hueste celestial
  rationale: El contexto apunta al cielo nocturno y al orden de los astros, pero el hebreo mantiene una formulación amplia y retórica. «Su ejército» conserva la imagen colectiva del original, aunque en español admite un matiz astral que se entiende por el contexto inmediato.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Valor distributivo de אִישׁ
  english_pob_reading: Translate idiomatically as 'not one is missing' rather than woodenly as 'not a man is lacking.'
  chosen_spanish_reading: «No falta ni uno» expresa el valor distributivo sin imponer un masculino humano literal.
  alternative_spanish_readings:
  - no se pierde ninguno
  - ninguno falta
  - no falta ningún miembro
  rationale: El hebreo usa אִישׁ de modo representativo para señalar ausencia de ninguno en el conjunto. La forma española idiomática evita una lectura antropomórfica o masculina innecesaria.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Causalidad de «por la grandeza de su poder y la fuerza de su vigor»
  english_pob_reading: Because of the greatness of his might and the strength of his power
  chosen_spanish_reading: La frase se mantiene causal, atribuyendo el orden y el nombramiento al poder soberano de Dios.
  alternative_spanish_readings:
  - Debido a la grandeza de su poder
  - por su gran poder y su fuerza
  rationale: La coordinación de dos expresiones intensivas en hebreo refuerza la soberanía divina. La traducción conserva esa motivación causal sin convertirla en una explicación doctrinal añadida.
  doctrine_reference: DOCTRINE.md §Translation philosophy 2
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del inglés POB: el participio se expresa de manera más directa («Él es quien saca»), y se mantiene el cierre distributivo como ausencia de uno solo. También toma en cuenta que el inglés prefirió una lectura más formal y participial en la cláusula central, por lo que el español evita una paráfrasis excesiva.'
  spanish_consistency_notes:
  - Se conserva «Dios» implícito en la referencia al sujeto divino sin introducir un nombre explícito no presente en el versículo.
  - «Poder» y «fuerza/vigor» intentan reproducir la doble intensificación del hebreo sin borrar la repetición semántica.
  - La puntuación reproduce el tono exhortativo y retórico del original con dos preguntas/mandatos consecutivos.
  - Se opta por un español bíblico moderno, no arcaizante, pero suficientemente solemne para lectura eclesial.
