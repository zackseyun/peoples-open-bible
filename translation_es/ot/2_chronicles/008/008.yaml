translation:
  language: es
  text: De entre sus descendientes, que quedaron después de ellos en la tierra[a] —a quienes los hijos de Israel no habían destruido—, Salomón los reclutó para trabajo forzado[b], hasta el día de hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el país». El hebreo dice literalmente «en la tierra», una fórmula bíblica habitual para el territorio del relato.
    reason: alternative_reading
  - marker: b
    text: O «para leva laboral». El hebreo se refiere a una obligación de trabajo impuesta por el estado.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִן בְּנֵיהֶם
  english_pob_choice: From their descendants
  chosen_spanish: De los descendientes de ellos
  alternatives_spanish:
  - De sus hijos
  - De sus hijos descendientes
  lexicon: HALOT
  rationale: בְּנֵי puede ser literalmente «hijos», pero en un contexto genealógico o nacional el sentido natural es «descendientes». En español, «de los descendientes de ellos» conserva ese alcance amplio sin forzar una lectura biológica estrecha.
- source_word: אֲשֶׁר נוֹתְרוּ אַחֲרֵיהֶם
  english_pob_choice: who were left after them
  chosen_spanish: que quedaron después de ellos
  alternatives_spanish:
  - que permanecieron después de ellos
  - que sobrevivieron a ellos
  lexicon: HALOT
  rationale: נוֹתְרוּ expresa la idea de quedar/restar. «Que quedaron después de ellos» preserva el matiz resultativo y la relación temporal con אַחֲרֵיהֶם de manera natural en español.
- source_word: בָּאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - en la tierra prometida
  lexicon: HALOT
  rationale: Aquí «la tierra» comunica mejor el trasfondo histórico-covenantal del texto que «el país», que suena más general y menos bíblico.
- source_word: אֲשֶׁר לֹא כִלּוּם בְּנֵי יִשְׂרָאֵל
  english_pob_choice: those whom the sons of Israel had not destroyed
  chosen_spanish: a quienes los hijos de Israel no habían destruido
  alternatives_spanish:
  - a quienes los israelitas no habían destruido
  - a quienes los hijos de Israel no habían exterminado
  lexicon: HALOT
  rationale: כִלּוּם en este contexto de conquista/consolidación puede traducirse como «destruir». Mantener «los hijos de Israel» sigue de cerca la formulación fuente y conserva la designación nacional.
- source_word: וַיַּעֲלֵם
  english_pob_choice: conscripted them
  chosen_spanish: los sometió
  alternatives_spanish:
  - los conscribió
  - los hizo servir
  - los puso bajo tributo
  lexicon: HALOT
  rationale: El verbo עלה con לְמַס en este contexto administrativo apunta a imponer una obligación estatal. «Los sometió» necesita el complemento «a trabajo forzado» para expresar correctamente la acción total. Evita la literalidad opaca de «los hizo subir».
- source_word: לְמַס
  english_pob_choice: for forced labor
  chosen_spanish: a trabajo forzado
  alternatives_spanish:
  - a tributo de trabajo
  - a corvea
  lexicon: HALOT
  rationale: מַס denota servicio laboral obligatorio. «Trabajo forzado» es la equivalencia clara y contemporánea; «corvea» sería más preciso técnicamente, pero menos accesible para una lectura general.
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: to this day
  chosen_spanish: hasta el día de hoy
  alternatives_spanish:
  - hasta hoy
  - hasta este día
  lexicon: HALOT
  rationale: Es la equivalencia idiomática natural en español y conserva el valor de continuidad hasta el presente del narrador.
theological_decisions:
- issue: Tratamiento de la denominación nacional «בְּנֵי יִשְׂרָאֵל»
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: Se conserva la designación fuente-near para no aplanar la formulación hebrea. En español, «los hijos de Israel» es inteligible y refleja la categoría nacional/étnica del original sin sustituirla por una paráfrasis más interpretativa.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se revisó el flujo sintáctico para mantener el orden y las relaciones del hebreo sin sonar calcado en español. En particular, se eligió una construcción natural para מִן בְּנֵיהֶם / אֲשֶׁר נוֹתְרוּ אַחֲרֵיהֶם y se resolvió וַיַּעֲלֵם לְמַס con una frase administrativa comprensible. El cierre «hasta el día de hoy» conserva el idiomismo temporal del original y coincide con el audit trail en inglés.
  spanish_consistency_notes:
  - Se mantuvo «los hijos de Israel» para preservar la fórmula nacional fuente-near.
  - Se usó «tierra» en sentido bíblico, no como simple geografía.
  - Se evitó «SEÑOR» y cualquier sustitución teológica no presente en este versículo.
  - Se escogió «trabajo forzado» como equivalente natural de לְמַס, con nota para la alternativa más técnica.
