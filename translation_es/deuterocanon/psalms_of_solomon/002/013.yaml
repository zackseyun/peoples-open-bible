  yaml_path: translation/deuterocanon/psalms_of_solomon/002/013.yaml
  text: They made the sons of Jerusalem a mockery[a], like prostitutes within her; everyone passing by would enter in broad daylight[c][b]; they mocked them with their lawless deeds.
  footnotes:
