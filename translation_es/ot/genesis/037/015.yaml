translation:
  language: es
  text: 'Un hombre lo encontró, y vio que estaba vagando en el campo. El hombre le preguntó, diciendo: «¿Qué buscas?[a]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «¿Qué estás buscando?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּמְצָאֵהוּ
  english_pob_choice: found him
  chosen_spanish: lo encontró
  alternatives_spanish:
  - lo halló
  - se topó con él
  lexicon: HALOT
  rationale: מצא en Qal expresa hallar/encontrar. «Lo encontró» es directo, natural en español y conserva la acción narrativa sin añadir matices no presentes en el hebreo.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: Un hombre
  alternatives_spanish:
  - Un varón
  - Alguien
  lexicon: HALOT
  rationale: איש designa aquí a un individuo masculino concreto. «Un hombre» mantiene el valor concreto y la referencia singular del hebreo.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y de pronto
  lexicon: HALOT
  rationale: הנה introduce una presentación vivida o repentina. «Y he aquí» conserva ese golpe narrativo y corresponde bien al tono del pasaje.
- source_word: תֹעֶה
  english_pob_choice: wandering
  chosen_spanish: andaba vagando
  alternatives_spanish:
  - andaba perdido
  - deambulaba
  lexicon: HALOT
  rationale: El participio de תעה expresa ir errante o vagar. «Andaba vagando» conserva la idea de movimiento sin forzar todavía el sentido de estar totalmente perdido.
- source_word: בַּשָּׂדֶה
  english_pob_choice: in the field
  chosen_spanish: en el campo
  alternatives_spanish:
  - en el campo abierto
  - en la llanura
  lexicon: HALOT
  rationale: שדה es el término ordinario para campo/tierra abierta. «En el campo» es la equivalencia más clara y natural en español.
- source_word: וַיִּשְׁאָלֵהוּ
  english_pob_choice: asked him
  chosen_spanish: le preguntó
  alternatives_spanish:
  - le inquirió
  - le consultó
  lexicon: HALOT
  rationale: שאל significa preguntar/inquirir. «Le preguntó» es idiomático en español y conserva el sentido narrativo inmediato.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: La fórmula לֵאמֹר introduce el discurso directo. «Diciendo» refleja la convención hebrea y encaja en español sin alterar el contenido.
- source_word: מַה תְּבַקֵּשׁ
  english_pob_choice: What are you seeking?
  chosen_spanish: ¿Qué buscas?
  alternatives_spanish:
  - ¿Qué estás buscando?
  - ¿Qué buscas hallar?
  lexicon: HALOT
  rationale: בקש significa buscar/andar en busca de. En español, la pregunta breve «¿Qué buscas?» comunica de forma natural la acción presente sin perder la fuerza del verbo hebreo. La alternativa «¿Qué estás buscando?» explicita el aspecto progresivo, pero no es necesaria.
translation_notes:
  revision_awareness: 'Se tomó en cuenta el audit trail inglés y su nota léxica sobre מַה תְּבַקֵּשׁ. No se requieren revisiones textuales adicionales: el hebreo y el inglés coinciden en sentido y tono, y la versión española conserva la presentación narrativa, la particula de énfasis y la pregunta directa.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo donde el texto lo requiera; este versículo no contiene el Nombre divino.
  - Se preservó el tono narrativo con «y he aquí», evitando paráfrasis explicativas.
  - Se optó por «buscar»/«buscas» para בקש, coherente con la nota alternativa inglesa.
  - Se usó puntuación española con comillas angulares para el discurso directo y marcación de nota al pie en el sustantivo ambiguo.
