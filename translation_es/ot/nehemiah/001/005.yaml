revisions:
- from: 'Y dije[a]: «Por favor, Yahvé, Dios del cielo, el gran y asombroso Dios[b], que guarda el pacto y la misericordia para los que lo aman y guardan sus mandamientos»'
  to: 'Y dije[a]: «Por favor, Yahvé, Dios del cielo, el gran y temible Dios[b], que guarda el pacto y el amor fiel[c] para los que lo aman y guardan sus mandamientos»'
  rationale: Se reemplaza «asombroso» por «temible» para conservar mejor el sentido de reverente temor en וְהַנּוֹרָא. Se reemplaza «misericordia» por «amor fiel» para reflejar con mayor precisión חֶסֶד en contexto de pacto, en línea con la documentación del POB inglés. Se añade una nota para transparentar las alternativas léxicas de חֶסֶד.
  reviewer_model: gpt-5.4
