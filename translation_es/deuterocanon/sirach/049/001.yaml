translation:
  language: es
  text: El nombre de Josías es como incienso mezclado[a], elaborado por obra de un perfumista; su recuerdo es dulce como miel al paladar[b], y como música en un banquete de vino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo subraya 'nombre' al inicio; el griego paralelo pone 'recuerdo' o 'remembranza'. Se conserva 'nombre' en el texto principal por fidelidad al testimonio hebreo, sin perder la dimensión memorial.
    reason: alternative_reading
  - marker: b
    text: También puede entenderse 'como un canto'. El hebreo מזמור admite esa posibilidad, pero el paralelo griego favorece la lectura más amplia de 'música'.
    reason: lexical_alternative
lexical_decisions:
- source_word: שם / μνημόσυνον
  english_pob_choice: The name / remembrance
  chosen_spanish: El nombre / su recuerdo
  alternatives_spanish:
  - su memoria
  - su remembranza
  lexicon: HALOT; LXX μνημόσυνον
  rationale: El hebreo pone en primer plano 'nombre', mientras el griego destaca 'recuerdo' o 'memorial'. En español, 'nombre' conserva el hebreo, y 'su recuerdo' mantiene explícito el valor memorial del segundo hemistiquio sin borrar la tensión textual.
- source_word: כקטורת סמים / σύνθεσιν θυμιάματος
  english_pob_choice: like blended incense
  chosen_spanish: como incienso mezclado
  alternatives_spanish:
  - como incienso compuesto
  - como incienso aromático mezclado
  lexicon: HALOT; σύνθεσις θυμιάματος
  rationale: '''Incienso mezclado'' comunica la idea de un preparado compuesto de aromas o especias. Es natural en español y mantiene la correspondencia con el griego, que habla de una composición de incienso.'
- source_word: מעשה רוקח / ἐσκευασμένον ἔργῳ μυρεψοῦ
  english_pob_choice: the work of a perfumer
  chosen_spanish: la obra de un perfumista
  alternatives_spanish:
  - el trabajo de un perfumista
  - obra de un artesano de perfumes
  lexicon: HALOT; μυρεψός
  rationale: '''Perfumista'' es el equivalente moderno más claro para quien compone perfumes o aromas. ''Obra de'' reproduce el carácter de producto preparado o elaborado que sugieren el hebreo y el griego.'
- source_word: בחך / ἐν παντὶ στόματι
  english_pob_choice: to the mouth / in every mouth
  chosen_spanish: para la boca
  alternatives_spanish:
  - en toda boca
  - al paladar
  lexicon: HALOT; στόμα
  rationale: El hebreo literalmente alude al paladar o a la boca, y el griego dice 'en toda boca'. 'Para la boca' conserva la imagen gustativa sin sonar forzado en español, y permite mantener abierta la lectura de recepción amplia.
- source_word: כדבש ימתיק / ὡς μέλι γλυκανθήσεται
  english_pob_choice: is sweet as honey
  chosen_spanish: es dulce como miel
  alternatives_spanish:
  - se endulza como miel
  - será dulce como miel
  lexicon: HALOT; γλυκαίνω
  rationale: 'El valor gnómico/descriptivo del imperfecto se expresa mejor en español con presente: ''es dulce''. ''Dulce como miel'' sigue la imagen bíblica de sabor agradable y evita un futurismo innecesario.'
- source_word: וכמזמור / ὡς μουσικὰ
  english_pob_choice: like music
  chosen_spanish: como música
  alternatives_spanish:
  - como un canto
  - como un salmo
  lexicon: HALOT; μουσικά
  rationale: El griego amplía el sentido a 'música', y el hebreo admite canto o salmo. 'Como música' preserva la amplitud y se adapta bien al marco festivo del banquete de vino.
- source_word: על משתה היין / ἐν συμποσίῳ οἴνου
  english_pob_choice: at a banquet of wine
  chosen_spanish: en un banquete de vino
  alternatives_spanish:
  - en un banquete con vino
  - en un festín de vino
  lexicon: HALOT; συμπόσιον
  rationale: '''Banquete de vino'' reproduce de modo transparente la escena festiva del hebreo y del griego. Se añade ''en'' para reflejar la relación locativa del griego y mantener fluidez en español.'
translation_notes:
  revision_awareness: 'El draft sigue la revisión más reciente del audit trail al expresar el valor gnómico con presente: ''es dulce'', no con futuro. También toma en cuenta la preferencia del POB inglés por mantener la tensión entre ''name'' (hebreo) y ''remembrance'' (griego), reflejada aquí con ''nombre'' y ''recuerdo''.'
  spanish_consistency_notes:
  - Se mantiene 'Josías' para el nombre propio.
  - Se usa 'incienso' en lugar de 'perfume' o 'aroma' para conservar el campo semántico del מקור/θυμιάματος.
  - '''Perfumista'' se emplea como término moderno y claro, evitando el arcaísmo ''aromático'' o ''boticario''.'
  - '''Música'' se prefiere sobre ''canción'' por el apoyo del griego y por la amplitud del término en español.'
  - Se conserva una sintaxis solemne pero natural para lectura pública.
