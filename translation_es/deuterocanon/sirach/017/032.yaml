translation:
  language: es
  text: Él mismo vigila la hueste[a] del alto cielo, y todos los hombres[b] son tierra y ceniza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «poder». El griego δύναμιν puede significar «poder», pero en uso bíblico también puede referirse a una hueste o realidad celestial colectiva.
    reason: lexical_alternative
  - marker: b
    text: «Todos los hombres» aquí significa todos los seres humanos.
    reason: lexical_alternative
lexical_decisions:
- source_word: δύναμιν
  english_pob_choice: host
  chosen_spanish: hostia
  alternatives_spanish:
  - poder
  - millares
  - hueste
  lexicon: LSJ
  rationale: El audit trail inglés entiende δύναμιν en sentido colectivo/cósmico, como una realidad celestial numerosa. En español, «hostia» es una opción tradicional para un conjunto militar o celestial, pero es menos natural hoy; por eso se prefiere «hueste» como equivalente idiomático y bíblicamente claro. Se conserva la tensión entre el valor literal posible de «poder» y el sentido colectivo adoptado por la POB inglesa.
- source_word: ὕψους οὐρανοῦ
  english_pob_choice: the height of heaven
  chosen_spanish: del alto cielo
  alternatives_spanish:
  - de la altura del cielo
  - del cielo en lo alto
  - del más alto cielo
  lexicon: LSJ
  rationale: La frase griega es descriptiva y no introduce un título divino. «Del alto cielo» mantiene el registro elevado y evita convertir la expresión en un nombre propio o en una paráfrasis demasiado libre.
- source_word: ἐπισκέπτεται
  english_pob_choice: watches over
  chosen_spanish: vigila
  alternatives_spanish:
  - cuida
  - visita
  - atiende
  lexicon: BDAG
  rationale: El verbo puede significar visitar, cuidar o atender. Aquí, con sujeto divino y objeto celestial, «vigila» comunica supervisión activa y continua, en línea con la decisión inglesa de evitar la mera idea de una visita momentánea.
- source_word: οἱ ἄνθρωποι πάντες
  english_pob_choice: all men
  chosen_spanish: todos los hombres
  alternatives_spanish:
  - todas las personas
  - todos los seres humanos
  lexicon: BDAG
  rationale: El griego usa masculino plural con valor genérico. Se mantiene «todos los hombres» para conservar la formulación antropológica de contraste con la línea anterior, entendida representativamente como toda la humanidad.
- source_word: γῆ καὶ σποδός
  english_pob_choice: earth and ashes
  chosen_spanish: tierra y ceniza
  alternatives_spanish:
  - polvo y ceniza
  - suelo y ceniza
  lexicon: LSJ
  rationale: La POB inglesa preserva «earth» en vez de sustituirlo por la fórmula más familiar «dust». En español, «tierra y ceniza» mantiene ese valor literal y el paralelismo con la fragilidad humana.
theological_decisions:
- issue: Sentido de δύναμιν en el ámbito celestial
  english_pob_reading: host
  chosen_spanish_reading: hueste
  alternative_spanish_readings:
  - poder
  - millares
  rationale: La decisión inglesa busca una lectura colectiva/cósmica acorde con el contexto. En español, «hueste» transmite mejor esa colectividad celestial sin reducirla a «poder» ni sonar forzado como «hostia».
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
- issue: Valor genérico de οἱ ἄνθρωποι πάντες
  english_pob_reading: all men
  chosen_spanish_reading: todos los hombres
  alternative_spanish_readings:
  - todas las personas
  - todos los seres humanos
  rationale: Se conserva la forma masculina genérica del griego, como en la POB inglesa, sin perder el sentido inclusivo representativo de toda la humanidad.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el expediente; el pass más reciente indica que el texto quedó sin cambios y con alta concordancia con la fuente griega.
  spanish_consistency_notes:
  - Se mantiene el paralelo entre la esfera celestial y la condición humana mortal.
  - Se evita traducir ἐπισκέπτεται como una visita puntual; el sentido es de vigilancia/oversight continuos.
  - Se conserva «tierra y ceniza» para respetar el léxico de la fuente y la decisión inglesa de no nivelar a la expresión más común «polvo y ceniza».
