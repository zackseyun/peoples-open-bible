  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. ''Israel'' y ''amorreos'' están bien. La decisión clave es estilística/lexical: para ישׁב, ''vivió'' en el texto y ''habitó'' en nota reproduce mejor la relación entre traducción principal y alternativa formal del POB inglés.'
