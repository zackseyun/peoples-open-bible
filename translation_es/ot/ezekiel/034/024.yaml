translation:
  language: es
  text: Y yo, Yahvé, seré su Dios, y mi siervo David[a] será príncipe entre ellos. Yo, Yahvé, he hablado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Mi siervo David» puede referirse tipológica o proféticamente al futuro gobernante davídico, es decir, al Mesías; el texto hebreo dice literalmente «David».
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino personal mediante transliteración usual en español bíblico académico y eclesial. Se evita la sustitución por un título, en coherencia con el audit trail en inglés.
- source_word: אֶהְיֶה
  english_pob_choice: will be
  chosen_spanish: seré
  alternatives_spanish:
  - estaré
  - seré para
  lexicon: HALOT
  rationale: El imperfecto expresa relación futura de pacto; en español, 'seré para ellos Dios' reproduce con naturalidad la idea de relación covenantal sin añadir paráfrasis.
- source_word: לֵאלֹהִים
  english_pob_choice: their God
  chosen_spanish: Dios
  alternatives_spanish:
  - su Dios
  - Dios para ellos
  lexicon: HALOT
  rationale: La construcción hebrea 'ser + a + Dios' se vierte de forma idiomática en español con 'seré ... Dios'; el sentido posesivo implícito se mantiene por el contexto de 'para ellos'.
- source_word: עַבְדִּי
  english_pob_choice: my servant
  chosen_spanish: mi siervo
  alternatives_spanish:
  - mi esclavo
  - mi servidor
  lexicon: HALOT
  rationale: Aquí el término funciona como título honorífico davídico en contexto real y profético. 'Siervo' conserva la dignidad relacional y evita una carga semántica excesiva de 'esclavo' en este pasaje.
- source_word: דָוִד
  english_pob_choice: David
  chosen_spanish: David
  lexicon: HALOT
  rationale: Se mantiene el nombre propio tal como aparece en el hebreo. No se resuelve en el texto principal la lectura mesiánica o tipológica.
- source_word: נָשִׂיא
  english_pob_choice: prince
  chosen_spanish: príncipe
  alternatives_spanish:
  - líder
  - gobernante
  lexicon: HALOT
  rationale: '''Príncipe'' preserva la terminología característica de Ezequiel y evita convertir el término en una explicación interpretativa más amplia.'
- source_word: בְּתוֹכָם
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - en medio de ellos
  lexicon: HALOT
  rationale: '''Entre ellos'' comunica bien la localización relacional y comunitaria del hebreo, con español natural y sobrio.'
- source_word: דִּבַּרְתִּי
  english_pob_choice: have spoken
  chosen_spanish: he hablado
  alternatives_spanish:
  - hablé
  - he dicho
  lexicon: HALOT
  rationale: El perfecto funciona como fórmula solemne de declaración divina; 'he hablado' conserva el peso y la resolución del enunciado.
theological_decisions:
- issue: Identidad de 'David' en 'mi siervo David'
  english_pob_reading: Retain 'David' in the main text without interpretive expansion; note messianic/typological possibility in a footnote.
  chosen_spanish_reading: Mantener 'David' en el texto principal y señalar en nota que puede entenderse tipológica o proféticamente del futuro gobernante davídico, es decir, el Mesías.
  alternative_spanish_readings:
  - el Mesías
  - un rey davídico
  - el David histórico resucitado
  rationale: El hebreo nombra a 'David' y no debe sustituirse por una interpretación en el cuerpo del texto. La nota preserva la tensión interpretativa reconocida por el POB en inglés sin resolverla de manera unilateral.
  doctrine_reference: Translation philosophy §§1, 3 y 5; cristología bíblica y lectura tipológica dentro de la ortodoxia histórica.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior anclando la nota [a] en el texto principal junto a «Yahvé». No se introdujeron cambios de fondo respecto del sentido fuente; solo se hizo visible la única nota permitida.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como nombre divino principal, no «SEÑOR».
  - Se eligió «siervo» para עבד por el contexto davídico honorífico.
  - Se conservó «príncipe» para נָשִׂיא por consistencia con Ezequiel.
  - La nota de alternativa interpreta 'David' sin reemplazarlo en el texto principal.
