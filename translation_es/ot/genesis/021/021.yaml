translation:
  language: es
  text: Y habitó en el desierto de Parán[a], y su madre tomó para él una esposa[b] de la tierra de Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «vivió en el desierto de Parán».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «su madre consiguió para él una mujer de la tierra de Egipto»; el contexto indica un arreglo matrimonial, por eso el texto principal usa «esposa».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּשֶׁב
  english_pob_choice: He lived
  chosen_spanish: habitó
  alternatives_spanish:
  - vivió
  - se estableció
  - residió
  lexicon: HALOT
  rationale: יׁשב puede significar habitar, morar o permanecer. En este contexto narrativo, “habitó” conserva el valor de residencia con un registro bíblico natural en español, sin forzar una idea de asentamiento más fuerte de la que exige el hebreo.
- source_word: בְּמִדְבַּר פָּארָן
  english_pob_choice: in the wilderness of Paran
  chosen_spanish: en el desierto de Parán
  alternatives_spanish:
  - en el desierto de Paran
  - en la región desértica de Parán
  - en la estepa de Parán
  lexicon: HALOT
  rationale: מִדְבָּר admite “desierto” o “región despoblada”. “Desierto” es claro y natural en español bíblico. “Parán” se translitera como topónimo, manteniendo la referencia geográfica.
- source_word: וַתִּקַּח
  english_pob_choice: took
  chosen_spanish: le tomó
  alternatives_spanish:
  - tomó
  - consiguió para él
  - le procuró
  lexicon: HALOT
  rationale: לקח en contextos matrimoniales puede expresar la acción de conseguir o tomar una mujer para alguien. “Le tomó” reproduce bien la construcción hebrea y permite entender el arreglo matrimonial sin añadir explicación ajena al texto.
- source_word: לוֹ
  english_pob_choice: for him
  chosen_spanish: le
  alternatives_spanish:
  - para él
  - para su hijo
  - a él
  lexicon: HALOT
  rationale: El sufijo pronominal con ל indica relación de beneficio o destino. En español, el dativo “le” suena natural unido a “tomó”, y conserva la idea de que la acción se hizo en favor de él.
- source_word: אִמּוֹ
  english_pob_choice: his mother
  chosen_spanish: su madre
  alternatives_spanish:
  - la madre de él
  - su propia madre
  lexicon: HALOT
  rationale: Es una posesión sencilla y directa; “su madre” es la forma más natural y fiel en español.
- source_word: אִשָּׁה
  english_pob_choice: a wife
  chosen_spanish: una esposa
  alternatives_spanish:
  - una mujer
  - una mujer como esposa
  - una esposa para él
  lexicon: HALOT
  rationale: Aunque אִשָּׁה puede significar “mujer” o “esposa”, el contexto matrimonial pide “esposa”. Se evita “mujer” en el texto principal porque en español aquí sería más ambiguo.
- source_word: מֵאֶרֶץ מִצְרָיִם
  english_pob_choice: from the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - desde la tierra de Egipto
  - de Egipto
  lexicon: HALOT
  rationale: El hebreo incluye explícitamente “tierra”; “de la tierra de Egipto” conserva esa plenitud expresiva. “Egipto” solo sería más breve, pero perdería el matiz del original.
translation_notes:
  revision_awareness: El registro inglés presenta acuerdo alto con la versión más reciente y no registra revisiones aplicadas; esta propuesta sigue ese estado estable, manteniendo las decisiones léxicas auditadas y sin introducir variantes textuales.
  spanish_consistency_notes:
  - Se conserva la transliteración “Parán” para el topónimo.
  - Se usa “desierto” como equivalente amplio de מִדְבָּר, acorde con el uso bíblico y con el español natural.
  - Se mantiene “esposa” en el texto principal por el contexto matrimonial, dejando en nota la alternativa literal “mujer”.
  - No se introduce “SEÑOR” ni terminología doctrinal ajena, ya que el versículo no contiene el Tetragrámaton ni un término cristológico.
