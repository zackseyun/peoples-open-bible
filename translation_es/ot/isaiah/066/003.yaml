base_translation:
  language: en
  yaml_path: translation/ot/isaiah/066/003.yaml
  text: The one who slaughters an ox is like one who strikes down a man[a]; the one who sacrifices a lamb, like one who breaks a dog’s neck; the one who offers a grain offering, like one who offers pig’s blood; the one who makes a memorial offering of frankincense, like one who blesses wickedness. They too have chosen their own ways[b], and their soul delights in their abominations.
  footnotes:
  - marker: a
    text: Or 'like one who blesses an idol' for 'like one who blesses wickedness'; the Hebrew word can denote evil, iniquity, or idolatrous wickedness.
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally 'their soul delights,' with a singular noun and verb used collectively for the people.
    reason: lexical_alternative
