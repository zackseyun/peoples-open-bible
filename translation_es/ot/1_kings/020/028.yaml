revisions:
- from: 'Entonces el hombre de Dios se acercó y dijo al rey de Israel: «Así dice Yahvé: “Porque Aram ha dicho: ‘Yahvé es un dios de los montes, pero no es un dios de los valles’, yo entregaré toda esta gran multitud[a] en tu mano[b], y sabrás[c] que yo soy Yahvé”».'
  to: 'Entonces el hombre de Dios se acercó y dijo al rey de Israel: «Así dice Yahvé: “Porque Aram ha dicho: ‘Yahvé es un dios de los montes, pero no es un dios de los valles’, yo entregaré toda esta gran multitud[a] en tu mano[b], y ustedes sabrán que yo soy Yahvé”».'
