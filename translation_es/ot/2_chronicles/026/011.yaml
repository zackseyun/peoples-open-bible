translation:
  language: es
  text: Y Uzías tenía un ejército apto para la guerra, que salía al combate por divisiones, según el número de su registro[a], bajo la dirección de Jeiel[b], el escriba, y de Maaseías, el oficial, bajo la autoridad de Hananías, uno de los comandantes del rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «según el número de su revista». El hebreo se refiere a un conteo oficial o registro de tropas.'
    reason: lexical_alternative
  - marker: b
    text: El nombre hebreo aquí es יעואל; en algunas tradiciones aparece como «Jiel» o «Jeuel».
    reason: lexical_alternative
lexical_decisions:
- source_word: חַיִל
  english_pob_choice: army
  chosen_spanish: ejército
  alternatives_spanish:
  - fuerza
  - milicia
  - armado
  lexicon: HALOT
  rationale: En este contexto militar, חַיִל se refiere a una fuerza organizada para la guerra. 'Ejército' comunica bien esa entidad institucional en español sin perder el valor militar del término.
- source_word: עֹשֵׂה מִלְחָמָה
  english_pob_choice: fit for war
  chosen_spanish: apto para la guerra
  alternatives_spanish:
  - haciendo guerra
  - listo para la batalla
  - preparado para la guerra
  lexicon: HALOT
  rationale: El participio describe capacidad o aptitud bélica. 'Apto para la guerra' conserva el sentido de preparación/capacidad sin una paráfrasis demasiado libre.
- source_word: יוֹצְאֵי צָבָא
  english_pob_choice: going out to battle
  chosen_spanish: saliendo para el combate
  alternatives_spanish:
  - yendo a la batalla
  - salían a la guerra
  - saliendo para servicio militar
  lexicon: HALOT
  rationale: El giro expresa salida organizada hacia acción militar. 'Saliendo para el combate' sigue de cerca el sentido y suena natural en español contemporáneo.
- source_word: לִגְדוּד
  english_pob_choice: by divisions
  chosen_spanish: por divisiones
  alternatives_spanish:
  - por tropas
  - en bandas
  - por destacamentos
  lexicon: HALOT
  rationale: En el contexto de organización y recuento de tropas, el sustantivo apunta a unidades militares. 'Divisiones' mantiene el valor estructural del texto.
- source_word: בְּמִסְפַּר פְּקֻדָּתָם
  english_pob_choice: according to the number of their enrollment
  chosen_spanish: según el número de su enrolamiento
  alternatives_spanish:
  - según el número de su alistamiento
  - conforme al número de su revista
  - según el número de su muster
  lexicon: HALOT
  rationale: פְּקֻדָּה aquí denota un conteo oficial, un registro o enrolamiento militar. 'Enrolamiento' preserva la idea administrativa y militar, y mantiene la posible tensión con 'muster' sin imponer una sola equivalencia demasiado moderna.
- source_word: בְּיַד
  english_pob_choice: under the direction of
  chosen_spanish: bajo la dirección de
  alternatives_spanish:
  - por mano de
  - bajo la supervisión de
  - a cargo de
  lexicon: HALOT
  rationale: El idiomático בְּיַד comunica supervisión/gestión. 'Bajo la dirección de' expresa esa agencia administrativa de manera clara en español.
- source_word: הַסּוֹפֵר
  english_pob_choice: the scribe
  chosen_spanish: el escriba
  alternatives_spanish:
  - el secretario
  - el escribiente
  - el registrador
  lexicon: HALOT
  rationale: סֹפֵר designa un funcionario de escritura/registro; 'escriba' es la opción más transparente y coherente con el contexto administrativo.
- source_word: הַשּׁוֹטֵר
  english_pob_choice: the officer
  chosen_spanish: el oficial
  alternatives_spanish:
  - el supervisor
  - el inspector
  - el funcionario
  lexicon: HALOT
  rationale: שֹׁטֵר es un cargo oficial en contexto administrativo-militar. 'Oficial' reproduce esa función sin forzar un rango moderno específico.
- source_word: עַל יַד
  english_pob_choice: under the authority of
  chosen_spanish: bajo la autoridad de
  alternatives_spanish:
  - bajo la supervisión de
  - al mando de
  - por autoridad de
  lexicon: HALOT
  rationale: La expresión marca un nivel superior de control o responsabilidad. 'Bajo la autoridad de' refleja la jerarquía del texto con naturalidad en español.
- source_word: מִשָּׂרֵי הַמֶּלֶךְ
  english_pob_choice: one of the king’s commanders
  chosen_spanish: uno de los comandantes del rey
  alternatives_spanish:
  - uno de los príncipes del rey
  - uno de los oficiales del rey
  - uno de los jefes del rey
  lexicon: HALOT
  rationale: שָׂר puede significar príncipe, jefe o comandante. Aquí el contexto militar favorece 'comandantes', que capta mejor la función descrita en el pasaje.
theological_decisions:
- issue: Jerarquía administrativa y militar sin sobretraducir títulos
  english_pob_reading: under the direction of ... under the authority of ... one of the king’s commanders
  chosen_spanish_reading: bajo la dirección de ... bajo la autoridad de ... uno de los comandantes del rey
  alternative_spanish_readings:
  - a cargo de ... bajo la supervisión de ... uno de los jefes del rey
  - bajo la mano de ... bajo la potestad de ... uno de los príncipes del rey
  rationale: El versículo presenta una cadena de supervisión oficial. La traducción conserva la progresión jerárquica sin convertir los cargos en equivalentes eclesiásticos o cortesanos no sustentados por el contexto.
  doctrine_reference: Ninguna; decisión de estructura administrativa y léxica.
translation_notes:
  revision_awareness: La base inglesa revisada cambió de «going out for military service» a «going out to battle» para hacer más natural la expresión militar. En español se reflejó directamente esa preferencia con «saliendo para el combate», manteniendo el tono organizativo del texto y la cadena de cargos oficiales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparezca el nombre divino; en este versículo no aparece.
  - «Jeiel» se conserva como forma principal siguiendo el texto hebreo auditado y se anota la variación tradicional en nota.
  - Se evita «SEÑOR» como sustituto de YHWH porque el versículo no contiene el nombre divino y el texto habla de autoridades humanas.
  - La puntuación y la sintaxis buscan una lectura pública fluida sin perder la estructura de las cláusulas hebreas.
