base_translation:
  language: en
  yaml_path: translation/deuterocanon/judith/011/019.yaml
  text: And I will lead you through the midst of Judea until you come opposite Jerusalem[a], and I will set your chariot in her midst, and you will drive them like sheep that have no shepherd, and not even a dog will growl with its tongue against you; for these things were spoken to me according to my foreknowledge, and they were reported to me[c][b], and I was sent to tell you.
  footnotes:
  - marker: a
    text: Or 'before Jerusalem' / 'facing Jerusalem' for 'opposite Jerusalem.'
    reason: lexical_alternative
  - marker: b
    text: The Greek says 'not even a dog will growl with its tongue against you,' an idiom expressing complete lack of resistance.
    reason: cultural_note
  - marker: c
    text: '''Foreknowledge'' here likely means prior knowledge or advance awareness, not necessarily a technical theological claim.'
    reason: lexical_alternative
