translation:
  language: es
  text: Miraron hacia él[a] y resplandecieron[b], y sus rostros no fueron humillados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La tradición de lectura hebrea aquí oscila entre «hacia él» y «hacia mí». El texto principal sigue la lectura de tercera persona por contexto; la alternativa de primera persona se conserva como posibilidad textual.
    reason: textual_variant
  - marker: b
    text: O «brillaron». El verbo hebreo puede expresar brillo o resplandor en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִבִּיטוּ
  english_pob_choice: looked
  chosen_spanish: miraron
  alternatives_spanish:
  - miraron atentamente
  - fijaron la vista
  lexicon: HALOT
  rationale: El verbo apunta a dirigir la mirada hacia alguien. «Miraron» es natural en español y conserva la dirección del acto sin sobrecargarlo con intensidad no exigida por el hebreo.
- source_word: אֵלָיו / אֵלַי
  english_pob_choice: to him
  chosen_spanish: hacia él
  alternatives_spanish:
  - hacia mí
  lexicon: HALOT
  rationale: La lectura principal sigue la tercera persona que encaja con el contexto y con el plural del verbo. En español, «hacia él» mantiene abierta la relación direccional del original sin fijar innecesariamente una formulación más interpretativa.
- source_word: וְנָהָרוּ
  english_pob_choice: were radiant
  chosen_spanish: resplandecieron
  alternatives_spanish:
  - brillaron
  - irradiaron
  lexicon: HALOT
  rationale: El verbo puede expresar volverse brillantes o radiantes; «resplandecieron» comunica bien el efecto poético y la imagen de brillo, sin perder la fuerza verbal del hebreo.
- source_word: וּפְנֵיהֶם
  english_pob_choice: their faces
  chosen_spanish: sus rostros
  alternatives_spanish:
  - sus caras
  lexicon: HALOT
  rationale: «Rostros» conserva la imagen concreta y es más digno y literario en español bíblico que «caras», aunque ambas serían posibles.
- source_word: יֶחְפָּרוּ
  english_pob_choice: be put to shame
  chosen_spanish: fueron avergonzados
  alternatives_spanish:
  - quedaron avergonzados
  - fueron puestos en vergüenza
  - fueron humillados
  lexicon: HALOT
  rationale: El campo semántico incluye vergüenza pública y deshonra. «Fueron avergonzados» mantiene el pasivo de resultado y el paralelismo del verso; se evita suavizarlo a una mera emoción interna.
theological_decisions:
- issue: Lectura textual de אֵלָי/ו
  english_pob_reading: to him, with 'to me' preserved as an alternative reading
  chosen_spanish_reading: hacia él, con la posibilidad textual implícita de «hacia mí»
  alternative_spanish_readings:
  - hacia mí
  - a mí
  rationale: La tradición de lectura está dividida entre una forma de tercera persona y otra de primera persona. El texto principal sigue la lectura contextual de tercera persona, mientras que la alternativa primera persona se preserva como tensión textual real sin borrarla.
  doctrine_reference: 'Translation philosophy §3: preservar ambigüedad/tensión textual genuina'
- issue: Matiz de vergüenza pública en יֶחְפָּרוּ
  english_pob_reading: be put to shame
  chosen_spanish_reading: no fueron avergonzados
  alternative_spanish_readings:
  - no fueron puestos en vergüenza
  - no quedaron avergonzados
  - no fueron humillados
  rationale: La forma pasiva expresa un resultado de deshonra pública más que una emoción subjetiva. «No fueron avergonzados» conserva ese valor de resultado en una estructura natural para el español bíblico.
  doctrine_reference: Doctrine of honor/shame imagery in wisdom poetry
translation_notes:
  revision_awareness: Se siguió el ajuste reciente del inglés POB que corrigió el tiempo verbal a un pasado («were not put to shame»), evitando un futuro o una generalización no apoyada por el hebreo. También se mantuvo la tensión textual de אֵלָי/ו mediante una nota, en lugar de resolverla silenciosamente.
  spanish_consistency_notes:
  - Se usó «Yahvé» cuando el referente divino es explícito en el contexto mayor, pero en este versículo el hebreo no nombra el tetragrámaton en la línea citada; por eso no se insertó aquí ninguna sustitución reverencial.
  - Se prefirió «rostros» por coherencia con el hebreo y con el registro poético bíblico.
  - Se evitó «Cristo» o terminología cristológica porque el versículo no lo requiere y el contexto es poético/sapiencial.
  - 'La estructura del verso mantiene el paralelismo: mirar → resplandecer → no ser avergonzados.'
