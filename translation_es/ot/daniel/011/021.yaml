  glossary_alignment: 'No hay conflictos con los términos teológicos de proyecto. El punto principal es léxico: mantener la fuerza de הוֹד מַלְכוּת como dignidad real/reinado, y conservar la alternativa de בַּחֲלַקְלַקּוֹת en nota como «por lisonjas».'
