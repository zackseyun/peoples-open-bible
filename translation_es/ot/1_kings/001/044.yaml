translation:
  language: es
  text: Y el rey envió con él a Sadoc el sacerdote, a Natán el profeta, a Benaía hijo de Joyadá, y a los quereteos y los peleteos; y lo montaron sobre la mula del rey[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más específica, «sobre la mula hembra del rey». El sustantivo hebreo puede designar una mula de sexo femenino.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: HALOT
  rationale: El wayyiqtol de שׁלח expresa una acción narrativa pasada simple. En español, «envió» es natural, directo y conserva el valor básico del verbo sin añadir matices más marcados como «despachó».
- source_word: אִתּוֹ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto con él
  lexicon: HALOT
  rationale: La preposición con sufijo indica acompañamiento. «Con él» es la forma más directa y natural en español.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: El hebreo usa el título definido, no el nombre propio. «El rey» preserva ese rasgo y es la forma más natural en español.
- source_word: צָדוֹק הַכֹּהֵן
  english_pob_choice: Zadok the priest
  chosen_spanish: Sadoc el sacerdote
  alternatives_spanish:
  - Sadoc el sumo sacerdote
  lexicon: HALOT
  rationale: Se translitera el nombre propio y se traduce el título. «Sacerdote» corresponde a כֹּהֵן; no se introduce «sumo» porque el texto no lo dice.
- source_word: נָתָן הַנָּבִיא
  english_pob_choice: Nathan the prophet
  chosen_spanish: Natán el profeta
  alternatives_spanish:
  - Natán el vidente
  lexicon: HALOT
  rationale: Se mantiene la transliteración del nombre y la traducción literal del título. «Profeta» refleja נָבִיא con fidelidad.
- source_word: בְּנָיָהוּ בֶּן יְהוֹיָדָע
  english_pob_choice: Benaiah son of Jehoiada
  chosen_spanish: Benaía hijo de Joyadá
  alternatives_spanish:
  - Benaía, hijo de Joyadá
  lexicon: HALOT
  rationale: El patronímico se expresa de forma natural con «hijo de». Se conserva la secuencia nominal sin añadir artículos innecesarios.
- source_word: הַכְּרֵתִי
  english_pob_choice: the Cherethites
  chosen_spanish: los quereteos
  alternatives_spanish:
  - los cereteos
  lexicon: HALOT
  rationale: Se conserva el nombre del grupo mediante transliteración adaptada al español. «Quereteos» mantiene el carácter étnico/nominativo del término mejor que una glosa interpretativa.
- source_word: הַפְּלֵתִי
  english_pob_choice: the Pelethites
  chosen_spanish: los peleteos
  alternatives_spanish:
  - los peletitas
  lexicon: HALOT
  rationale: Se sigue el mismo criterio de transliteración adaptada para el segundo grupo, preservando el paralelismo con «quereteos».
- source_word: וַיַּרְכִּבוּ
  english_pob_choice: they mounted him
  chosen_spanish: lo montaron
  alternatives_spanish:
  - lo hicieron montar
  - lo pusieron sobre
  lexicon: HALOT
  rationale: 'El hifil de רכב tiene sentido causativo: «hacer montar». En español, «lo montaron» conserva brevedad y la fuerza causal implícita, evitando una perífrasis pesada.'
- source_word: עַל פִּרְדַּת הַמֶּלֶךְ
  english_pob_choice: on the king’s mule
  chosen_spanish: sobre la mula del rey
  alternatives_spanish:
  - sobre la mula hembra del rey
  - sobre la mula del rey
  lexicon: HALOT
  rationale: פִּרְדָּה puede designar específicamente una mula hembra. El español permite «mula» de modo idiomático; la precisión sexual queda como alternativa, no obligatoria, porque el contexto no exige enfatizarla.
translation_notes:
  revision_awareness: 'El texto sigue la base hebrea WLC y concuerda con el audit trail inglés: se mantiene la coordinación de nombres y cargos, la causalidad de וַיַּרְכִּבוּ y la ambigüedad léxica de פִּרְדָּה mediante nota. No hay revisiones aplicadas en el paso inglés, y el cierre coincide con el consenso de alta concordancia.'
  spanish_consistency_notes:
  - Se usa «Y» al inicio por estilo bíblico natural en español, manteniendo el orden narrativo.
  - 'Los nombres propios se adaptan a formas españolas habituales: Sadoc, Natán, Benaía, Joyadá.'
  - 'Se preserva la lista de grupos con paralelismo sintáctico: «los quereteos y los peleteos».'
  - «Mula» se mantiene como término principal; la nota recoge la precisión alternativa sin sobrecargar el texto principal.
