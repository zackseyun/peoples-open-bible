translation:
  language: es
  text: Pero cuando Alcimo vio que Judas y los que estaban con él se habían fortalecido, y comprendió que no podía hacerles frente[a], volvió al rey y presentó acusaciones maliciosas contra ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego transmitido, tal como está impreso aquí, puede leerse literalmente como «sabía que podía hacerles frente»; pero el contexto favorece claramente el sentido contrario: «no podía hacerles frente».'
    reason: textual_variant
lexical_decisions:
- source_word: ὡς δὲ ἴδεν
  english_pob_choice: But when ... saw
  chosen_spanish: Pero cuando ... vio
  alternatives_spanish:
  - Y cuando ... vio
  - Ahora cuando ... vio
  lexicon: LSJ
  rationale: ὡς con aoristo introduce una acción temporal; δέ aporta transición adversativa leve. En español, «Pero cuando» conserva el giro narrativo sin endurecerlo en exceso.
- source_word: ἐνίσχυσεν
  english_pob_choice: had grown strong
  chosen_spanish: se habían fortalecido
  alternatives_spanish:
  - habían crecido en fuerza
  - se habían hecho fuertes
  - habían prevalecido
  lexicon: LSJ
  rationale: El verbo expresa la adquisición de fuerza o robustecimiento. El perfecto compuesto español mantiene el estado resultante de Judas y su grupo en el contexto narrativo.
- source_word: οἱ μετ’ αὐτοῦ
  english_pob_choice: those with him
  chosen_spanish: los que estaban con él
  alternatives_spanish:
  - sus compañeros
  - los hombres con él
  lexicon: LSJ
  rationale: La frase griega es relacional y no especifica sexo en sí misma; «los que estaban con él» es natural en español y evita añadir precisión no presente en el griego.
- source_word: ἔγνω
  english_pob_choice: realized
  chosen_spanish: comprendió
  alternatives_spanish:
  - reconoció
  - se dio cuenta
  lexicon: LSJ
  rationale: Aquí marca una percepción inferida de la situación. «Comprendió» mantiene el matiz cognitivo y encaja bien con el desarrollo inmediato.
- source_word: δύναται ὑποστῆναι αὐτούς
  english_pob_choice: he was not able to withstand them
  chosen_spanish: no podía hacerles frente
  alternatives_spanish:
  - no podía resistirlos
  - no era capaz de sostenerse contra ellos
  - podía hacerles frente
  lexicon: LSJ
  rationale: Aunque el texto griego transmitido lee literalmente una forma afirmativa, el contexto exige la negación, como ya señala el audit trail inglés. En español se preserva la lectura contextual clara sin ocultar la tensión textual.
- source_word: ἐπέστρεψεν πρὸς τὸν βασιλέα
  english_pob_choice: he returned to the king
  chosen_spanish: volvió al rey
  alternatives_spanish:
  - regresó al rey
  - volvió ante el rey
  - fue de nuevo al rey
  lexicon: LSJ
  rationale: ἐπιστρέφω aquí tiene sentido de volver/retornar. «Volvió al rey» es breve y natural en español bíblico contemporáneo.
- source_word: κατηγόρησεν αὐτῶν πονηρά
  english_pob_choice: brought wicked charges against them
  chosen_spanish: los acusó maliciosamente
  alternatives_spanish:
  - les hizo acusaciones perversas
  - presentó contra ellos acusaciones malignas
  - los denunció con maldad
  lexicon: LSJ
  rationale: κατηγορέω es acusar, y πονηρά califica la acusación como mala/maligna. «Los acusó maliciosamente» conserva el tono hostil y el carácter moral de las imputaciones sin sonar arcaico.
theological_decisions:
- issue: Valor de δύναται ὑποστῆναι αὐτούς frente al contexto narrativo
  english_pob_reading: 'Render the clause as inability: ''he was not able to withstand them.'''
  chosen_spanish_reading: «no podía hacerles frente»
  alternative_spanish_readings:
  - «podía hacerles frente» (lectura literal diplomática)
  - «no podía resistirlos»
  rationale: La secuencia narrativa —Alcimo observa la fortaleza de Judas, se retira y acusa ante el rey— favorece claramente la idea de incapacidad. La traducción refleja esa lectura contextual y deja constancia de la alternativa literal implícita en el texto transmitido.
  doctrine_reference: Primacía de la evidencia textual y del contexto inmediato; documentación transparente de variantes o tensiones no resueltas.
translation_notes:
  revision_awareness: El pasaje concuerda en alto grado con el control cruzado y no requiere cambios respecto al último pase; se mantiene la decisión contextual sobre la negación implícita en δύναται ὑποστῆναι αὐτούς.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - Se evita «Cristo»/«Mesías» porque el pasaje no contiene cristología.
  - «Hacerles frente» preserva el valor de oposición personal de ὑφίστημι sin sobrerretrotraerlo a un calco rígido.
  - «Los acusó maliciosamente» conserva el matiz jurídico y moral de κατηγόρησεν αὐτῶν πονηρά.
