translation:
  language: es
  text: en la talla de piedras para engaste, y en el tallado de madera, para hacer toda clase de trabajo hábil[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «toda clase de obra diseñada» o «toda clase de obra artística». El término hebreo lleva la idea de trabajo hecho con planificación, diseño o habilidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבַחֲרֹשֶׁת
  english_pob_choice: in the cutting / in the carving
  chosen_spanish: en la talla / en el tallado
  alternatives_spanish:
  - en el trabajo
  - en la artesanía
  - en el tallado artístico
  lexicon: HALOT
  rationale: חֲרֹשֶׁת nombra un trabajo de artesanía especializada. En español, «talla» y «tallado» comunican bien el trabajo técnico con piedra y madera, y mantienen la variación material que el POB inglés hizo con «cutting» y «carving».
- source_word: אֶבֶן
  english_pob_choice: stones
  chosen_spanish: piedras
  alternatives_spanish:
  - piedra
  lexicon: HALOT
  rationale: 'Aunque el hebreo está en singular, el contexto artesanal pide un plural genérico en español: se trata de la labor con piedras en general, no de una piedra específica.'
- source_word: לְמַלֹּאת
  english_pob_choice: for setting
  chosen_spanish: para engaste
  alternatives_spanish:
  - para colocar
  - para montar
  - para incrustación
  lexicon: HALOT
  rationale: En este contexto de joyería o labor ornamental, el sentido es poner la piedra en su montaje o asiento. «Engaste» expresa con precisión el valor técnico de la acción y evita la vaguedad de «llenar».
- source_word: עֵץ
  english_pob_choice: wood
  chosen_spanish: madera
  alternatives_spanish:
  - leño
  - madera como material
  lexicon: HALOT
  rationale: Aquí עֵץ designa el material para trabajar, no un árbol vivo. «Madera» es la equivalencia natural y clara en español.
- source_word: לַעֲשׂוֹת
  english_pob_choice: to do
  chosen_spanish: para hacer
  alternatives_spanish:
  - para realizar
  - para efectuar
  - para fabricar
  lexicon: HALOT
  rationale: «Hacer» sigue de cerca el verbo amplio עשה y encaja naturalmente con la frase que sigue sobre todo tipo de trabajo.
- source_word: בְּכָל מְלֶאכֶת
  english_pob_choice: every kind of work
  chosen_spanish: toda clase de trabajo
  alternatives_spanish:
  - toda clase de obra
  - todo tipo de trabajo
  - toda obra
  lexicon: HALOT
  rationale: La frase es distributiva e idiomática. «Toda clase de trabajo» comunica la amplitud de las tareas artesanales sin sonar rígido.
- source_word: מַחֲשָׁבֶת
  english_pob_choice: skillful
  chosen_spanish: hábil
  alternatives_spanish:
  - artístico
  - diseñado
  - ingenioso
  - hecho con diseño
  lexicon: HALOT
  rationale: מַחֲשָׁבֶת puede referirse a lo ideado, planeado o artísticamente concebido. En este contexto de destreza artesanal, «hábil» transmite bien la idea de trabajo hecho con pericia. Se conserva la tensión entre habilidad y diseño mediante la nota de pie.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo y el criterio óptimo del POB inglés. Se mantiene la distinción material entre piedra y madera, y se conserva la amplitud semántica de מַחֲשָׁבֶת con una nota alternativa sin convertirla en paráfrasis.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - «Talla/tallado» se eligieron para reproducir el valor artesanal de חֲרֹשֶׁת sin caer en un calco duro.
  - «Engaste» refleja el contexto técnico de piedras preparadas para su montaje.
  - «Hábil» mantiene la cualidad de destreza señalada por el inglés POB y la ambigüedad creativa del hebreo.
