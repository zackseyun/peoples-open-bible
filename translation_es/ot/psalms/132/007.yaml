    issue: «Entremos» estrecha el sentido de נָב֥וֹאָה
    rationale: El hebreo cohortativo de בוא expresa «vayamos»/«vamos» con sentido general de movimiento; «entremos» es posible, pero corresponde más a una alternativa documentada que a la elección principal auditada.
  - severity: medium
    issue: «Estrado» no es la mejor opción para הֲדֹם
    rationale: Aunque léxicamente defendible, en español general «estrado» suele evocar una plataforma o tarima. «Escabel» representa mejor un apoyo para los pies y se alinea más directamente con «footstool».
  - severity: low
    issue: La nota b presenta «escabel» como alternativa cuando debería ser la opción principal
    rationale: Dado que «escabel» es más preciso y natural aquí, conviene promoverlo al texto principal y dejar la explicación de la postura física en la nota.
