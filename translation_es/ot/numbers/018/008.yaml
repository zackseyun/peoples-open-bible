revisions:
- from: 'Entonces Yahvé habló a Aarón: «Y yo, mira, te he dado la custodia de mis ofrendas[a], de todos los dones sagrados de los hijos de Israel. Te los he dado para un derecho por tu unción[b], y para tus hijos, como estatuto perpetuo».'
  to: 'Entonces Yahvé habló a Aarón: «Y yo, mira, te he dado el encargo de mis ofrendas[a], de todos los dones sagrados de los hijos[c] de Israel. Te los he dado como porción de unción[b], y a tus hijos, como estatuto perpetuo».'
  rationale: 'La revisión es pequeña pero necesaria: reemplaza ''custodia'' por ''encargo'' para reflejar mejor מִשְׁמֶרֶת; cambia ''para un derecho por tu unción'' por ''como porción de unción'' para acercarse al hebreo y dejar la interpretación explicativa en la nota; y ajusta ''para tus hijos'' a ''a tus hijos'' por naturalidad. También se añade la nota cultural que el audit trail inglés preserva para ''hijos de Israel''.'
  reviewer_model: gpt-5.4
