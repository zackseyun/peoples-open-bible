    text: O 'la expresión de tus labios' o 'lo que procede de tus labios'.
    reason: lexical_alternative
  - marker: b
    text: O 'ofrenda de libre voluntad'. El término hebreo se refiere a una ofrenda dada libremente y no por obligación.
    reason: lexical_alternative
  revision_rationale: La revisión corrige el matiz de voto explícito en נָדַרְתָּ mediante 'votaste', mejora la naturalidad de la primera cláusula al quitar el perfecto de subjuntivo, y preserva las alternativas léxicas documentadas en el inglés POB con notas españolas claras.
