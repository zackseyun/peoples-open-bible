  source_alignment_summary: 'El borrador sigue bien el hebreo: dos vocativos paralelos («Yahvé», «Dios»), dos imperativos («Levántate», «alza tu mano») y la prohibición final («No olvides» / «No te olvides de») con el objeto «los afligidos». Sin embargo, la nota al pie está anclada en «Levántate[a]» cuando en realidad explica עניים («los afligidos»).'
  spanish_quality_summary: El español es claro y digno. «Levántate, Yahvé; oh Dios, alza tu mano» suena natural, aunque «oh» puede capitalizarse o integrarse sin problema. El punto principal a corregir es la ubicación de la nota al pie. Además, «No olvides de» no sería correcto, así que conviene mantener «No te olvides de» o reformular a «No olvides a».
  glossary_alignment: 'Alineado con la terminología del proyecto: יְהוָה → «Yahvé», אֵל → «Dios», y se conserva la imagen concreta de «tu mano». La elección «los afligidos» concuerda con la decisión inglesa para עניים y con la nota de alternativas léxicas.'
  issues:
