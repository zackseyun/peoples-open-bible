translation:
  language: es
  text: Pues la sabiduría es mejor que las joyas[a], y ninguna cosa deseable se le puede comparar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «perlas» o «rubíes» para «joyas»; el término hebreo se refiere en general a gemas preciosas.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón o fundamento de lo dicho antes; en español, 'Porque' conserva con naturalidad esa función explicativa sin añadir matices innecesarios.
- source_word: טוֹבָה
  english_pob_choice: is better
  chosen_spanish: es mejor
  alternatives_spanish:
  - es buena
  - es más valiosa
  lexicon: HALOT
  rationale: Con la idea comparativa ya presente en el hebreo, 'es mejor' expresa el valor relativo de la sabiduría de forma clara y directa.
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: la sabiduría
  alternatives_spanish:
  - sabiduría
  lexicon: HALOT
  rationale: '''Sabiduría'' es el equivalente estándar y preserva el tema personificado de Proverbios 8.'
- source_word: מִפְּנִינִים
  english_pob_choice: than jewels
  chosen_spanish: que las joyas
  alternatives_spanish:
  - que las perlas
  - que los rubíes
  - que las piedras preciosas
  lexicon: HALOT
  rationale: פְּנִינִים designa gemas o piedras preciosas en general. 'Joyas' evita precisar indebidamente una gema concreta y mantiene el valor de objetos preciosos, como hace la nota inglesa.
- source_word: וְכָל
  english_pob_choice: and all
  chosen_spanish: y todas
  alternatives_spanish:
  - y todo
  - y cada
  lexicon: HALOT
  rationale: Reproduce el alcance totalizador del hebreo con una forma natural en español.
- source_word: חֲפָצִים
  english_pob_choice: desirable things
  chosen_spanish: las cosas deseables
  alternatives_spanish:
  - las cosas apetecibles
  - las cosas agradables
  - las cosas preciosas
  lexicon: HALOT
  rationale: La expresión abarca cosas deseadas o apreciadas; 'las cosas deseables' mantiene ese campo semántico sin reducirlo a placer, lujo o utilidad.
- source_word: לֹא יִשְׁווּ בָהּ
  english_pob_choice: cannot compare with her
  chosen_spanish: no se le pueden comparar
  alternatives_spanish:
  - no son comparables con ella
  - no igualan a ella
  - no se le igualan
  lexicon: HALOT
  rationale: שׁוה con ב expresa igualdad o comparabilidad. 'No se le pueden comparar' es idiomático en español y conserva el matiz comparativo sin perder la personificación femenina de la sabiduría.
theological_decisions:
- issue: Personificación de la sabiduría
  english_pob_reading: retain feminine personal reference ('her')
  chosen_spanish_reading: mantener referencia personal femenina implícita en el verbo pronominal ('se le')
  alternative_spanish_readings:
  - neutralizar a 'se puede comparar'
  - usar 'con ella' de forma explícita
  rationale: El hebreo concluye con un sufijo femenino singular (בָהּ), coherente con la personificación de la Sabiduría en Proverbios 8. El español mantiene ese referente mediante 'se le', sin forzar una reinterpretación impersonal.
  doctrine_reference: Proverbios 8; Translation philosophy §3, §6
- issue: Valor de פְּנִינִים
  english_pob_reading: than jewels
  chosen_spanish_reading: que las joyas
  alternative_spanish_readings:
  - que las perlas
  - que los rubíes
  - que las gemas
  rationale: Como en la nota inglesa, el término hebreo es general para piedras preciosas o joyas, no para una gema específica. 'Joyas' conserva la amplitud lexical y evita una especificación no garantizada por el texto.
  doctrine_reference: HALOT; nota textual/lexical POB
translation_notes:
  revision_awareness: El control de revisión disponible indica alta concordancia y ningún cambio requerido en la pasada más reciente; por eso se mantiene una formulación directa, con la única nota lexical necesaria para פְּנִינִים.
  spanish_consistency_notes:
  - Se conserva el registro bíblico moderno y digno, evitando calcos ingleses como 'comparar con ella' donde el español idiomático permite 'no se le pueden comparar'.
  - '''Sabiduría'' se mantiene en minúscula porque aquí funciona como cualidad/personificación literaria dentro del verso; no se introduce mayúscula teológica adicional.'
  - El conjunto del verso conserva la comparación de valor del hebreo sin ampliar el sentido a metáforas distintas no presentes en el texto.
