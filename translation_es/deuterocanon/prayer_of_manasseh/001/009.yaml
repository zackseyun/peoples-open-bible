revisions:
- from: Porque he pecado más allá del número de la arena del mar. Se han multiplicado mis actos sin ley[a], Yahvé; se han multiplicado mis actos sin ley, y no soy digno de mirar fijamente y ver la altura del cielo a causa de la multitud de mis actos injustos.
  to: Porque he pecado más allá del número de la arena del mar. Se han multiplicado mis transgresiones, Señor; se han multiplicado mis transgresiones, y no soy digno de mirar fijamente[a] y ver la altura del cielo a causa de la multitud de mis actos injustos.
  rationale: Se corrige el anclaje de la nota al verbo que realmente comenta. Se cambia «Yahvé» por «Señor» para reflejar con más fidelidad el κύριε griego de la evidencia inmediata. Se mejora «actos sin ley» a «transgresiones», que suena más natural en español bíblico y sigue preservando la distinción frente a «actos injustos».
  reviewer_model: gpt-5.4
