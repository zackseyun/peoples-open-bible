review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: persecución de los enemigos, caída delante del pueblo, y el complemento bélico final. Sin embargo, el verbo inicial וּרְדַפְתֶּם es segunda persona plural (''ustedes perseguirán''), no tercera persona plural. Ese desajuste gramatical afecta la fidelidad básica del texto. El resto de los elementos principales (''sus enemigos'', ''caerán delante de ustedes'', ''a espada'') están razonablemente alineados con la evidencia fuente y con la auditoría inglesa.'
  spanish_quality_summary: El español es generalmente claro y natural, pero 'Perseguirán a sus enemigos' introduce una discordancia con el resto de la oración ('de ustedes'). Para un español eclesial claro y coherente, debe decir 'Ustedes perseguirán a sus enemigos' o simplemente 'Perseguirán a sus enemigos' con el referente correcto; dado el contexto aislado, conviene explicitar 'Ustedes'. Además, el pie de nota puede mejorar levemente con 'caerán delante de ustedes por la espada' como alternativa más idiomática que 'a la espada' en español.
  glossary_alignment: No hay términos del glosario de proyecto especialmente controvertidos en este versículo. La elección 'enemigos' corresponde bien a אֹיְבֵיכֶם. 'Caerán' preserva adecuadamente נפל. 'A espada' es aceptable como equivalente español de לֶחָרֶב, aunque la nota debe presentar una alternativa idiomática española clara.
  issues:
  - severity: high
    issue: 'El verbo principal está en persona incorrecta: ''Perseguirán'' en lugar de ''Ustedes perseguirán''.'
    rationale: וּרְדַפְתֶּם es 2mp ('ustedes perseguirán'), no 3mp ('ellos perseguirán'). En el texto español actual, la forma verbal sola se interpreta naturalmente como tercera persona plural, lo que contradice el hebreo y el inglés POB.
  - severity: low
    issue: La nota alternativa usa 'a la espada', que suena menos natural en español contemporáneo que 'por la espada' o 'a espada'.
    rationale: La auditoría inglesa conserva la alternativa 'to the sword'. En español, conviene expresar esa alternativa de forma idiomática y clara, sin forzar un calco poco natural.
  revised_spanish_text: Ustedes perseguirán a sus enemigos[a], y caerán delante de ustedes a espada.
  revised_footnotes:
  - marker: a
    text: O «caerán delante de ustedes por la espada». El hebreo permite más de una forma idiomática de expresar este giro en español.
    reason: lexical_alternative
