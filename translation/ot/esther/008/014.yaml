id: EST.8.14
reference: Esther 8:14
source:
  edition: WLC
  text: הָ/רָצִ֞ים רֹכְבֵ֤י הָ/רֶ֨כֶשׁ֙ הָֽ/אֲחַשְׁתְּרָנִ֔ים יָֽצְא֛וּ מְבֹהָלִ֥ים וּ/דְחוּפִ֖ים בִּ/דְבַ֣ר הַ/מֶּ֑לֶךְ וְ/הַ/דָּ֥ת נִתְּנָ֖ה בְּ/שׁוּשַׁ֥ן הַ/בִּירָֽה׃פ
translation:
  text: The couriers[a], mounted on the royal steeds, went out hastened and pressed on by the king’s command, and the decree was issued in Susa the citadel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mounted on the steeds, the royal stud horses'; the Hebrew terms for the animals are rare and their precise identification is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרָצִים
  chosen: the couriers
  alternatives:
  - the runners
  - the messengers
  lexicon: HALOT
  rationale: Though literally related to 'runners,' in Persian imperial context this refers to royal dispatch riders/couriers. 'Couriers' communicates function in natural English without losing the official sense.
- source_word: רֹכְבֵי
  chosen: mounted on
  alternatives:
  - riding
  lexicon: HALOT
  rationale: A participial form describing the couriers as riders. 'Mounted on' fits smoothly in English and preserves the image of mounted dispatch.
- source_word: הָרֶכֶשׁ
  chosen: the royal steeds
  alternatives:
  - the steeds
  - the mules
  - the post-horses
  lexicon: HALOT
  rationale: The term denotes animals used for swift transport, likely in royal service. 'Royal steeds' captures both the elevated/official context and the equine sense better than the overly specific 'mules,' which is uncertain.
- source_word: הָאֲחַשְׁתְּרָנִים
  chosen: the swift horses
  alternatives:
  - the bred horses
  - the royal stud horses
  - the dromedaries
  lexicon: HALOT
  rationale: This rare Persian loanword is uncertain. In context it modifies the transport animals used by the couriers and likely refers to a select class of fast royal horses. 'Swift horses' conveys the functional sense while avoiding overclaiming a precise zoological identification.
- source_word: יָצְאוּ
  chosen: went out
  alternatives:
  - set out
  - went forth
  lexicon: HALOT
  rationale: Standard rendering of יצא. 'Went out' is straightforward and preserves the narrative movement.
- source_word: מְבֹהָלִים
  chosen: hastened
  alternatives:
  - in haste
  - hurried
  lexicon: HALOT
  rationale: The passive/participle conveys being hurried or alarmed into speed. 'Hastened' gives concise idiomatic English in coordination with the next participle.
- source_word: וּדְחוּפִים
  chosen: pressed on
  alternatives:
  - driven on
  - impelled
  lexicon: HALOT
  rationale: This term intensifies the urgency. 'Pressed on' preserves the sense of external compulsion and rapid movement.
- source_word: בִּדְבַר הַמֶּלֶךְ
  chosen: by the king’s command
  alternatives:
  - at the king's word
  - because of the king's order
  lexicon: HALOT
  rationale: דבר here means authoritative word/order. 'By the king’s command' is idiomatic and reflects the causal/instrumental force of בְּ.
- source_word: וְהַדָּת
  chosen: the decree
  alternatives:
  - the edict
  - the law
  lexicon: HALOT
  rationale: In Esther, דת often refers to an official imperial decree/edict. 'Decree' is clear modern English and suits this immediate context of promulgation.
- source_word: נִתְּנָה
  chosen: was issued
  alternatives:
  - was given
  - was promulgated
  lexicon: HALOT
  rationale: Although literally 'was given,' in administrative context the sense is publication or official issuance. 'Was issued' best matches English legal-administrative style.
- source_word: בְּשׁוּשַׁן הַבִּירָה
  chosen: in Susa the citadel
  alternatives:
  - in the citadel of Susa
  - in Susa the fortress
  lexicon: HALOT
  rationale: Standard place-name plus appositional designation. 'Citadel' is the conventional and accurate rendering of הבירה in this context.
