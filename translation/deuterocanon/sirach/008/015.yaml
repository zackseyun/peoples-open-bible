theological_decisions:
- issue: Use of Hebrew primary witness despite a syntactically difficult clause
  chosen_reading: Translate the Hebrew clause conservatively and let the Greek parallel inform, but not replace, the sense.
  alternative_readings:
  - 'Follow the Greek more freely: ''Do not travel on the road with a reckless man, lest he weigh heavily against you...'''
  - Emend the Hebrew toward a smoother hostile warning
  rationale: For Sirach, surviving Hebrew is primary where extant. This verse's second colon is awkward in Hebrew, but not so corrupt as to justify replacing it with the Greek. The Greek confirms the general warning about a dangerous, self-willed person, so the English keeps the Hebrew imagery while acknowledging the difficulty in a footnote.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use Greek parallel as actual input without displacing the primary witness.'
