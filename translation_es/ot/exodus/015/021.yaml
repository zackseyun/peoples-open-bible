translation:
  language: es
  text: 'Y Miriam les respondió: «Canten a Yahvé[a], porque ha triunfado gloriosamente[b]; al caballo y a su jinete los lanzó al mar».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Miriam les cantó en respuesta», reflejando el verbo «respondió» en un contexto musical o antifonal.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «se ha exaltado mucho» o «es muy exaltado»; en este canto de victoria, «ha triunfado gloriosamente» expresa el sentido idiomático.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - les respondió
  - cantó de respuesta
  lexicon: HALOT
  rationale: ענה en este contexto conserva su sentido base de responder; el marco de canto permite una resonancia responsorial, pero en español ‘respondió’ mantiene la relación directa con el hebreo sin perder la escena musical.
- source_word: לָהֶם
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - a ellos y ellas
  lexicon: HALOT
  rationale: El sufijo pronominal se refleja naturalmente con un dativo clítico en español. Se mantiene la pluralidad sin especificar más de lo que el hebreo exige.
- source_word: מִרְיָם
  english_pob_choice: Miriam
  chosen_spanish: Miriam
  alternatives_spanish:
  - María
  lexicon: convención onomástica
  rationale: Se conserva la transliteración estándar del nombre bíblico para respetar la forma del texto fuente.
- source_word: שִׁירוּ
  english_pob_choice: Sing
  chosen_spanish: Canten
  alternatives_spanish:
  - Canten alabanzas
  - Canten a
  lexicon: HALOT
  rationale: El imperativo plural de שׁיר se traduce de manera directa como ‘canten’. No se añade ‘alabanzas’ porque el verbo por sí solo no lo requiere.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahweh
  - al Señor
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se mantiene el nombre divino como ‘Yahvé’, según la terminología base del proyecto en español, en lugar de ocultarlo con un título genérico.
- source_word: גָאֹה גָּאָה
  english_pob_choice: he has triumphed gloriously
  chosen_spanish: se ha engrandecido gloriosamente
  alternatives_spanish:
  - ha triunfado gloriosamente
  - se ha exaltado grandemente
  - ha sido altamente exaltado
  lexicon: HALOT
  rationale: La duplicación intensiva del hebreo expresa exaltación/enaltecimiento máximo. En español, ‘se ha engrandecido gloriosamente’ preserva esa tensión léxica sin reducirla solo a triunfo militar; además refleja la dimensión de exaltación que el inglés auditado también reconoce.
- source_word: סוּס
  english_pob_choice: horse
  chosen_spanish: al caballo
  alternatives_spanish:
  - el caballo
  - al caballo de guerra
  lexicon: HALOT
  rationale: El sustantivo singular funciona de manera colectiva/genérica; con el verbo ‘lanzó’ en español, el complemento directo con ‘al’ resulta natural y fluido.
- source_word: וְרֹכְבוֹ
  english_pob_choice: and its rider
  chosen_spanish: y a su jinete
  alternatives_spanish:
  - y su jinete
  - y al que lo montaba
  lexicon: HALOT
  rationale: ‘Jinete’ comunica bien la relación montado-montura en español y permite conservar la referencia posesiva del sufijo. ‘Su’ evita sobreinterpretar género del referente humano, como hace el inglés auditado con ‘its rider’.
- source_word: רָמָה
  english_pob_choice: he has thrown
  chosen_spanish: los lanzó
  alternatives_spanish:
  - los arrojó
  - los echó
  - los tiró
  lexicon: HALOT
  rationale: El verbo expresa arrojar/castar con fuerza. En español, ‘lanzó’ es natural y enérgico en este contexto poético. Se integra con el objeto dual de la expresión («caballo y jinete») y con la imagen de juicio en el mar.
- source_word: בַיָּם
  english_pob_choice: into the sea
  chosen_spanish: al mar
  alternatives_spanish:
  - en el mar
  - dentro del mar
  lexicon: HALOT
  rationale: Con un verbo de movimiento violento, español prefiere ‘al mar’ para el destino resultante del lanzamiento. ‘Mar’ mantiene la fuerza poética del hebreo sin añadir explicaciones.
theological_decisions:
- issue: Rendering of the divine name יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el Señor
  rationale: El texto hebreo usa el Tetragrámaton directamente. La línea base del proyecto en español establece ‘Yahvé’ como forma principal; se conserva el nombre propio del pacto en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Nature of גָאֹה גָּאָה as exaltation/triumph
  english_pob_reading: he has triumphed gloriously
  chosen_spanish_reading: se ha engrandecido gloriosamente
  alternative_spanish_readings:
  - ha triunfado gloriosamente
  - se ha exaltado grandemente
  - ha sido altamente exaltado
  rationale: La construcción hebrea intensifica la idea de exaltación. El español elegido conserva la ambigüedad productiva entre exaltación y victoria, sin borrar la tensión léxica que el audit trail inglés también documenta.
  doctrine_reference: 'POB lexical decision: גאה as intensification in victory-song context'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el inglés auditado, pero vuelve al hebreo para decisiones clave: preserva el valor responsorial de וַתַּעַן, mantiene el nombre divino como Yahvé y traduce la intensificación גָאֹה גָּאָה con una fórmula española que conserva la exaltación victoriosa sin borrar la tensión entre exaltación y triunfo.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ para יהוה conforme al estándar español del proyecto.
  - Se mantiene el nombre propio ‘Miriam’ sin adaptar a ‘María’.
  - Se prefiere ‘canten’ como imperativo plural natural y reverente.
  - ‘Jinete’ se usa para conservar el vínculo con el caballo sin añadir interpretación.
  - Se evita la frase tradicional ‘echó en el mar’ porque ‘lanzó al mar’ refleja mejor רָמָה en este contexto poético.
