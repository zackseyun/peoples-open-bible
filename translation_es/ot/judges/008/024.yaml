translation:
  language: es
  text: 'Entonces Gedeón les dijo: «Permítanme hacerles una petición: que cada uno me dé un pendiente[a] de su botín». Pues tenían pendientes de oro, porque eran ismaelitas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «anillo»; el término hebreo puede referirse a una pieza llevada en la oreja o en la nariz, pero aquí «pendiente» encaja mejor con el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶשְׁאֲלָה ... שְׁאֵלָה
  english_pob_choice: Let me make one request of you
  chosen_spanish: Les hago una petición
  alternatives_spanish:
  - Les hago una sola petición
  - Permítanme hacer una petición
  - Les pido una petición
  lexicon: HALOT
  rationale: El hebreo usa un verbo de pedir con un sustantivo cognado para reforzar la idea. En español, «les hago una petición» conserva el valor enfático sin sonar forzado, y evita una duplicación demasiado mecánica.
- source_word: אִישׁ
  english_pob_choice: each man
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada hombre
  - cada varón
  - cada quien
  lexicon: HALOT
  rationale: El sentido distributivo exige que el pedido recaiga sobre cada individuo. «Cada uno» mantiene esa distribución de forma natural en español, sin perder la referencia al singular masculino del hebreo.
- source_word: נֶזֶם
  english_pob_choice: earring
  chosen_spanish: aro
  alternatives_spanish:
  - pendiente
  - arete
  - anillo
  lexicon: HALOT
  rationale: El término hebreo puede referirse a una pieza para la oreja o la nariz. Dado que el contexto inmediato habla de «aros de oro», «aro» preserva la amplitud léxica del original y evita decidir prematuramente entre «oreja» y «nariz».
- source_word: שְׁלָל
  english_pob_choice: spoil
  chosen_spanish: botín
  alternatives_spanish:
  - despojo
  - presa
  - plunder
  lexicon: HALOT
  rationale: «Botín» es el equivalente más natural y fiel en español para el material tomado en guerra. Mantiene el valor colectivo/distributivo del sustantivo con sufijo.
- source_word: נִזְמֵי זָהָב
  english_pob_choice: gold earrings
  chosen_spanish: aros de oro
  alternatives_spanish:
  - pendientes de oro
  - aretes de oro
  - aros dorados
  lexicon: HALOT
  rationale: El plural constructo con «oro» describe el objeto de manera general. «Aros de oro» sigue de cerca la forma hebrea y preserva la posibilidad semántica del término sin estrecharlo innecesariamente.
- source_word: כִּי ... כִּי
  english_pob_choice: For ... because
  chosen_spanish: Pues ... porque
  alternatives_spanish:
  - Porque ... porque
  - Ya que ... porque
  - Pues ... ya que
  lexicon: HALOT
  rationale: Las dos partículas introducen primero la explicación del pedido y luego la razón del dato cultural. «Pues ... porque» reproduce esa secuencia lógica en un español claro y bíblico.
- source_word: יִשְׁמְעֵאלִים
  english_pob_choice: Ishmaelites
  chosen_spanish: ismaelitas
  alternatives_spanish:
  - descendientes de Ismael
  - hijos de Ismael
  lexicon: HALOT
  rationale: La transliteración etnónima estándar en español es directa y mantiene la conexión narrativa y cultural del texto.
theological_decisions:
- issue: Tratamiento del masculino singular distributivo en אִישׁ
  english_pob_reading: each man
  chosen_spanish_reading: cada uno
  alternative_spanish_readings:
  - cada hombre
  - cada varón
  rationale: El hebreo emplea un singular masculino con fuerza distributiva. En español, «cada uno» comunica con precisión la distribución sin introducir una formulación más marcada que pueda sonar redundante en la frase.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Posible ambigüedad de נֶזֶם entre aro de oreja y aro de nariz
  english_pob_reading: earring
  chosen_spanish_reading: aro
  alternative_spanish_readings:
  - arete
  - pendiente
  - anillo
  rationale: 'La nota inglesa preserva la tensión léxica: el término puede referirse a un anillo para la oreja o la nariz. En español, «aro» conserva esa amplitud; el contexto de «aros de oro» permite leerlo naturalmente sin cerrar la posibilidad semántica del hebreo.'
  doctrine_reference: POB lexical policy on source-visible ambiguity
translation_notes:
  revision_awareness: La redacción inglesa revisada pasó de «Let me ask one request of you» a «Let me make one request of you» por mayor naturalidad. La versión española sigue esa mejora con una formulación idiomática («Les hago una petición») y conserva la explicación de la pieza de adorno y del motivo étnico.
  spanish_consistency_notes:
  - Se mantiene «Gedeón» para el nombre propio y «ismaelitas» para el etnónimo.
  - Se evita «SEÑOR» u otras sustituciones porque el versículo no contiene el tetragrámaton ni un uso de κύριος.
  - Se conserva un estilo bíblico moderno y claro, sin arcaísmos innecesarios.
  - «Botín» refleja el valor militar del sustantivo hebreo con sufijo distributivo.
