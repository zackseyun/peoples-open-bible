translation:
  language: es
  text: Porque la sabiduría[c] abrió las bocas de los mudos[a], y puso elocuentes[b] las lenguas de los pequeños.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las bocas de los sordos», pues la palabra griega puede referirse tanto a quienes no oyen como a quienes no hablan; aquí «mudos» encaja mejor con el contexto del habla.
    reason: lexical_alternative
  - marker: b
    text: O «articuladas» / «claras». El griego describe una forma de hablar clara y distinta.
    reason: lexical_alternative
  - marker: c
    text: La sabiduría está personificada en todo este pasaje; algunas traducciones la escriben con mayúscula como «Sabiduría».
    reason: alternative_reading
lexical_decisions:
- source_word: σοφία
  english_pob_choice: wisdom
  chosen_spanish: la sabiduría
  alternatives_spanish:
  - la Sabiduría
  lexicon: LSJ
  rationale: La palabra griega puede entenderse como abstracción y también como personificación. En español, «la sabiduría» conserva el sentido léxico y permite percibir la personificación por el contexto sin imponerla tipográficamente.
- source_word: ἤνοιξεν
  english_pob_choice: opened
  chosen_spanish: abrió
  alternatives_spanish:
  - abrió de par en par
  lexicon: LSJ
  rationale: Es el equivalente natural y fiel de ἀνοίγω en pasado. Mantiene la imagen concreta de habilitar la խոս speech.
- source_word: στόμα κωφῶν
  english_pob_choice: the mouths of the mute
  chosen_spanish: la boca de los mudos
  alternatives_spanish:
  - la boca de los sordos
  - la boca de los que no podían hablar
  lexicon: LSJ
  rationale: Como el contexto habla de boca y lengua, «mudos» refleja mejor la incapacidad de hablar que «sordos». Se conserva el singular colectivo habitual en español para la imagen del texto.
- source_word: γλώσσας
  english_pob_choice: the tongues
  chosen_spanish: las lenguas
  alternatives_spanish:
  - las lenguas
  - las palabras
  lexicon: LSJ
  rationale: «Lenguas» conserva la imagen corporal del griego y su paralelo con «boca». No se sustituye por «palabras» para no diluir la metáfora.
- source_word: νηπίων
  english_pob_choice: of infants
  chosen_spanish: de los niños pequeñas
  alternatives_spanish:
  - de los infantes
  - de los pequeños
  lexicon: LSJ
  rationale: El griego sugiere niños muy pequeños, aún inmaduros para hablar con soltura. En español, «niños pequeñas» no es idiomático; se ajusta a «niños pequeños» para expresar esa idea sin perder el matiz de edad temprana.
- source_word: ἔθηκεν τρανάς
  english_pob_choice: made the tongues of infants eloquent
  chosen_spanish: puso ... elocuentes
  alternatives_spanish:
  - hizo ... claras
  - hizo ... articuladas
  - las volvió elocuentes
  lexicon: LSJ
  rationale: τρανάς significa «claras, distintas, articuladas, elocuentes». «Elocuentes» comunica bien el resultado de habla clara y fluida en español formal; se mantiene la fuerza idiomática del efecto verbal sin traducir mecánicamente como «claras».
theological_decisions:
- issue: Personificación de la sabiduría
  english_pob_reading: Rendered as 'wisdom' without capitalization in the main text
  chosen_spanish_reading: «la sabiduría» sin mayúscula especial en el cuerpo del texto
  alternative_spanish_readings:
  - «la Sabiduría» con mayúscula
  rationale: El texto presenta a la sabiduría actuando como agente, pero el español no necesita capitalizarla para que se entienda la personificación. Se preserva así la tensión literaria entre cualidad divina y figura personificada sin resolverla de antemano.
  doctrine_reference: DOCTRINE.md §Translation philosophy, original-language primacy; preserve theological tension rather than over-resolve
translation_notes:
  revision_awareness: La versión inglesa más reciente sustituyó «speak clearly» por «eloquent» para reflejar mejor τρανάς ('clear/distinct, eloquent'). La redacción española sigue esa misma decisión con «elocuentes», manteniendo el registro formal y la imagen de habla habilitada por la sabiduría.
  spanish_consistency_notes:
  - Se mantiene «sabiduría» en minúscula para no sobrecargar la interpretación con una mayúscula devocional no exigida por el griego.
  - Se conserva la metáfora corporal boca/lenguas para respetar el paralelismo del texto.
  - La elección de «mudos» sigue la justificación contextual dada en el audit trail inglés.
  - «Elocuentes» recoge mejor el valor de τρανάς que un simple «claras» en español bíblico contemporáneo.
  - La construcción del verso busca ser publicable y natural en español sin abandonar la cercanía al original.
