translation:
  language: es
  text: Entonces Yahvé habló a Moisés[a], diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: YHWH; transliterado de forma habitual en español como «Yahvé»; también puede aparecer «Jehová».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: El verbo en forma narrativa con waw consecutiva avanza la acción. En español, «habló» comunica de manera natural la introducción de discurso divino y conserva mejor el acto de habla que una simple paraphrase.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre propio divino, siguiendo la decisión doctrinal del POB de no sustituirlo por un título. «Yahvé» es la forma española estándar en este proyecto para יְהוָה.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: La preposición marca el destinatario del discurso; en español, «a» es la equivalencia más natural y precisa.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - para decir
  lexicon: HALOT
  rationale: La fórmula de introducción de discurso se conserva con el gerundio «diciendo», que reproduce la función del infinitivo constructo sin expandir innecesariamente el hebreo.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrama directamente. Se preserva el nombre divino como nombre propio en español, siguiendo la doctrina del proyecto y evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Se corrigió la falta de anclaje del marcador de nota: el marcador [a] ahora aparece explícitamente junto a «Moisés» en el texto español. No se introdujeron cambios de contenido adicionales respecto al borrador previo.'
  spanish_consistency_notes:
  - Se mantuvo la fórmula narrativa breve y directa del hebreo.
  - «Yahvé» se usa como nombre propio, no como sustituto reverencial.
  - «Diciendo» conserva la función introductoria de לֵאמֹר sin añadir contenido.
