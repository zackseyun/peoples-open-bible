translation:
  language: es
  text: Y entró en el santuario[a] con arrogancia, y tomó el altar de oro, y el candelero de la luz con todos sus utensilios,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el lugar santo». El griego ἁγίασμα puede verterse más específicamente, pero se eligió «santuario» para no sobreespecificar la cámara exacta más allá de lo que exige la frase.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἁγίασμα
  english_pob_choice: sanctuary
  chosen_spanish: santuario
  alternatives_spanish:
  - lugar santo
  - santuario sagrado
  lexicon: LSJ
  rationale: ἁγίασμα designa un lugar sagrado o santuario. En español, «santuario» transmite de manera natural el ámbito sagrado del templo sin precisar más de lo que el griego dice sobre la cámara exacta.
- source_word: ἐν ὑπερηφανίᾳ
  english_pob_choice: in arrogance
  chosen_spanish: en arrogancia
  alternatives_spanish:
  - con orgullo
  - en orgullo
  lexicon: LSJ
  rationale: La construcción con sustantivo conserva mejor la fuerza moral de ὑπερηφανία y la manera expresiva del griego que un adverbio más suave como «orgullosamente».
- source_word: θυσιαστήριον τὸ χρυσοῦν
  english_pob_choice: the golden altar
  chosen_spanish: el altar de oro
  alternatives_spanish:
  - el altar dorado
  - el altar de oro puro
  lexicon: LSJ
  rationale: El griego usa un sintagma nominal con artículo y adjetivo; «altar de oro» es natural en español y conserva la referencia material sin introducir una descripción más precisa de la que ofrece el texto.
- source_word: λυχνίαν τοῦ φωτός
  english_pob_choice: the lampstand of the light
  chosen_spanish: el candelabro de la luz
  alternatives_spanish:
  - el candelabro de la luz
  - el candelabro para la luz
  - la lámpara de la luz
  lexicon: LSJ
  rationale: «Candelabro» es el equivalente español más claro y bíblicamente reconocible para λυχνία en este contexto del templo. Se mantiene el genitivo como «de la luz» para reflejar el vínculo léxico de τοῦ φωτός sin omitirlo.
- source_word: σκεύη
  english_pob_choice: utensils
  chosen_spanish: utensilios
  alternatives_spanish:
  - vasijas
  - implementos
  - objetos
  lexicon: LSJ
  rationale: Aquí σκεύη se refiere a los objetos asociados al candelabro y al culto. «Utensilios» es concreto, comprensible y suficientemente amplio sin estrechar indebidamente el sentido a «vasijas».
theological_decisions:
- issue: Si ἁγίασμα debe concretarse como una estancia técnica del templo («lugar santo»)
  english_pob_reading: sanctuary
  chosen_spanish_reading: santuario
  alternative_spanish_readings:
  - lugar santo
  - santuario sagrado
  rationale: La POB en inglés evita especificar una cámara técnica que el griego no nombra explícitamente. «Santuario» preserva el sentido sagrado general y no fuerza una identificación arquitectónica mayor que la del texto fuente.
  doctrine_reference: 'Principio de fidelidad semántica: no importar precisión interpretativa no exigida por el texto.'
translation_notes:
  revision_awareness: La revisión inglesa final cambió «lampstand for the light» a «lampstand of the light» para ajustarse más de cerca a τοῦ φωτός; la versión española conserva ese vínculo con «de la luz».
  spanish_consistency_notes:
  - Se prefirió «Y» inicial para reflejar el enlace narrativo del griego καὶ.
  - 'Se mantuvo el orden acumulativo de objetos: altar, candelabro y utensilios, siguiendo la secuencia del texto fuente.'
  - No se usó «SEÑOR» ni terminología de sustitución, porque este versículo no contiene el nombre divino.
