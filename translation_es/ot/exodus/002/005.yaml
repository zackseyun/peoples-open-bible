    reason: lexical_alternative
  - marker: b
    text: Hebreo 'su sirvienta'; tradicionalmente, algunos traducen 'su brazo'.
    reason: alternative_reading
  - marker: c
    text: El hebreo usa el mismo término que en Génesis 6–9 para el 'arca' de Noé.
    reason: cross_reference
  revision_rationale: 'Se corrigen los anclajes de notas para que correspondan exactamente a las palabras o expresiones que explican: [a] en ''en medio'', [b] en ''su sirvienta'', y [c] en ''canasta/juncos'' como nota de término relacionado. También se pule la redacción de la nota [a] para un español editorial más natural. No se requieren cambios sustanciales de traducción.'
