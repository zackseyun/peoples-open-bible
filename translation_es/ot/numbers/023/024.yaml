review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y la imaginería del hebreo: הֶן como llamada de atención, עָם como colectivo, la distinción entre לָבִיא y אֲרִי con «leona/león», los verbos de alzarse/levantarse, y la imagen fuerte de no acostarse hasta comer la presa y beber sangre. Sin embargo, «los muertos» no preserva con suficiente precisión חֲלָלִים, que en este contexto bélico significa más específicamente «los caídos» o «los muertos en combate / los abatidos / los atravesados», no simplemente cualquier muertos.'
  spanish_quality_summary: 'El español es claro, natural y digno. «Mira» funciona bien para הֶן y «no se echará» encaja bien con la imagen animal. La única mejora necesaria es léxica y estilística en la última cláusula: «la sangre de los caídos» suena más idiomático en contexto poético-bélico que «la sangre de los muertos» y corresponde mejor al matiz del hebreo.'
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Se preserva adecuadamente la distinción léxica «leona/león». La decisión principal a corregir es חֲלָלִים: conviene «caídos» en lugar de «muertos» para mantener el valor bélico/violento documentado por el POB inglés («the slain»).'
  issues:
  - severity: medium
    issue: «los muertos» debilita el matiz de חֲלָלִים
    rationale: En este contexto de imaginería militar, חֲלָלִים corresponde mejor a «los caídos» o «los abatidos» que a «los muertos». «Los muertos» es demasiado general y pierde la connotación de personas muertas por violencia/combate que el POB inglés preservó con «the slain».
  revised_spanish_text: Mira[a], un pueblo se levanta como una leona, y se alza como un león; no se echará hasta que coma la presa y beba la sangre de los caídos.
  revised_footnotes:
  - marker: a
    text: O «He aquí». La partícula hebrea introduce una observación enfática; «Mira» conserva el tono directo y vivo.
    reason: lexical_alternative
