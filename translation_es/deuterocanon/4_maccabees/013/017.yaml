  lexicon: LSJ
  rationale: El adverbio introduce la relación de modo o resultado; «así» conserva la fuerza breve y conectiva del griego sin añadir explicación.
- source_word: παθόντας
  english_pob_choice: have suffered
  chosen_spanish: haber sufrido
  alternatives_spanish:
