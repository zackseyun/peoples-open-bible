  rationale: Se reubica la nota al término pertinente («Huram-abi») y se mejora la naturalidad del español con «sabio y entendido», que preserva la idea de חָכָם יוֹדֵעַ בִּינָה sin rigidez innecesaria. La transliteración «Huram-abi» se mantiene conforme a la decisión léxica y teológica documentada.
