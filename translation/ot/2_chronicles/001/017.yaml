id: 2CH.1.17
reference: 2 Chronicles 1:17
source:
  edition: WLC
  text: וַֽ֠/יַּעֲלוּ וַ/יּוֹצִ֨יאוּ מִ/מִּצְרַ֤יִם מֶרְכָּבָה֙ בְּ/שֵׁ֣שׁ מֵא֣וֹת כֶּ֔סֶף וְ/ס֖וּס בַּ/חֲמִשִּׁ֣ים וּ/מֵאָ֑ה וְ֠/כֵן לְ/כָל מַלְכֵ֧י הַֽ/חִתִּ֛ים וּ/מַלְכֵ֥י אֲרָ֖ם בְּ/יָדָ֥/ם יוֹצִֽיאוּ־׃
translation:
  text: They imported from Egypt a chariot for six hundred shekels of silver[a], and a horse for one hundred fifty[c][b]; and so they exported them to all the kings of the Hittites and the kings of Aram.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'They brought up and brought out from Egypt.' The Hebrew uses ordinary motion verbs in a trade context; 'imported'/'exported' renders the commercial sense.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Aram'; traditionally 'Syria.'
    reason: alternative_reading
  - marker: c
    text: Hebrew 'by their hand,' an idiom meaning 'through them' or 'through their agents.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲלוּ
  chosen: They imported
  alternatives:
  - They brought up
  - They went up
  lexicon: HALOT
  rationale: The verb literally means 'went up' or 'brought up,' but in this commercial context with goods coming from Egypt, idiomatic English 'imported' best captures the sense of bringing goods up/out from Egypt into Israel. This also matches the paired trade language of the verse.
- source_word: וַיּוֹצִיאוּ
  chosen: imported
  alternatives:
  - brought out
  - exported
  lexicon: HALOT
  rationale: Although the verb literally means 'brought out,' with מִמִּצְרַיִם ('from Egypt') and the pricing formula, the sense is that Solomon's traders brought these items out of Egypt for purchase; 'imported' communicates the commercial action clearly in modern English.
- source_word: מֶרְכָּבָה
  chosen: a chariot
  alternatives:
  - chariot
  lexicon: HALOT
  rationale: Singular collective/commercial item; rendered as an individual unit in keeping with the price per item.
- source_word: בְּשֵׁשׁ מֵאוֹת כֶּסֶף
  chosen: for six hundred shekels of silver
  alternatives:
  - at six hundred silver pieces
  - for six hundred silver
  lexicon: HALOT
  rationale: The Hebrew states the amount of silver; 'shekels' is supplied in English as the standard implied weight/currency unit for clarity.
- source_word: וְסוּס
  chosen: and a horse
  alternatives:
  - and a stallion
  lexicon: HALOT
  rationale: The ordinary sense is 'horse'; nothing in the context requires the more specific 'stallion.'
- source_word: בַּחֲמִשִּׁים וּמֵאָה
  chosen: for one hundred fifty
  alternatives:
  - for a hundred and fifty
  - at one hundred fifty shekels
  lexicon: HALOT
  rationale: The Hebrew number is literally 'in fifty and a hundred,' i.e., 150. 'Shekels' is implied from the previous price expression and may be supplied for clarity, but omitted here to avoid overloading the line since 'of silver' has already established the unit.
- source_word: וְכֵן
  chosen: and so
  alternatives:
  - and likewise
  - thus
  lexicon: HALOT
  rationale: This connective marks continuation of the same trading pattern from Solomon's merchants to other kings; 'and so' is natural English.
- source_word: לְכָל מַלְכֵי הַחִתִּים וּמַלְכֵי אֲרָם
  chosen: to all the kings of the Hittites and the kings of Aram
  alternatives:
  - for all the kings of the Hittites and the kings of Syria
  lexicon: HALOT
  rationale: Aram is best transliterated rather than rendered 'Syria,' in keeping with the philosophy of transliterating names. 'Kings of the Hittites' reflects the Hebrew straightforwardly.
- source_word: בְּיָדָם
  chosen: by their hand
  alternatives:
  - through them
  - through their agents
  lexicon: HALOT
  rationale: The idiom literally means 'by their hand,' indicating agency or instrumentality. Retaining the idiom in slightly naturalized English preserves the source texture while remaining understandable.
- source_word: יוֹצִיאוּ
  chosen: they exported them
  alternatives:
  - they brought them out
  - they supplied them
  lexicon: HALOT
  rationale: 'In the second half of the verse the same root shifts to the opposite side of the trade flow: Solomon''s agents sent the horses and chariots onward to foreign kings. ''Exported them'' makes the commercial sense explicit and balances ''imported'' earlier.'
