review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: ayuda recibida en batalla, derrota de los hagritas, clamor a Dios, y respuesta divina por la confianza en él. Sin embargo, el anclaje de notas está desalineado con el contenido: la nota [a] está puesta sobre «contra ellos» pero habla de una variante del etnónimo; y hay dos notas distintas para el mismo asunto léxico de הַהַגְרִיאִים, creando redundancia y confusión. También conviene mejorar ligeramente la naturalidad de «fueron entregados en su mano» en español manteniendo la nota idiomática.'
  spanish_quality_summary: 'El español es claro y digno. «Recibieron ayuda» y «clamaron a Dios» son buenas soluciones. El principal problema es editorial y de legibilidad: notas mal ubicadas y duplicadas. Además, «fueron entregados en su mano» suena algo rígido en español; «fueron entregados en sus manos» preserva la imagen bíblica con mejor naturalidad.'
  glossary_alignment: 'No hay conflicto con la terminología del proyecto: אֱלֹהִים se traduce correctamente como «Dios». No aparecen términos sensibles como Yahvé, Mesías, Espíritu, etc. La transliteración «hagritas» es aceptable, con «hageritas» como alternativa en nota.'
  issues:
  - severity: medium
    issue: La nota [a] está anclada a «contra ellos» pero su contenido trata del nombre étnico.
    rationale: Las notas deben anclarse exactamente en la palabra o frase pertinente. Aquí el lector recibe una nota sobre el etnónimo en un lugar incorrecto.
  - severity: medium
    issue: Hay dos notas separadas sobre הַהַגְרִיאִים («hagritas/hageritas»), una redundante.
    rationale: El expediente inglés conserva una sola alternativa para el etnónimo. Duplicarla en español añade ruido innecesario y debilita la disciplina de notas.
  - severity: low
    issue: «Fueron entregados en su mano» resulta algo forzado en español.
    rationale: Aunque es fiel al hebreo, el plural «en sus manos» suena más idiomático en español sin perder la imagen; la nota puede conservar la explicación del modismo militar.
  revised_spanish_text: Recibieron ayuda contra ellos, y los hagritas[a] y todos los que estaban con ellos fueron entregados en sus manos[b], porque clamaron a Dios en la batalla, y él les respondió porque confiaron en él.
  revised_footnotes:
