lexical_decisions:
- source_word: στραφεὶς
  english_pob_choice: turned
  chosen_spanish: se volvió
  alternatives_spanish:
  - se volvió alrededor
  - habiéndose vuelto
  lexicon: BDAG / uso narrativo del participio aoristo de στρέφω
  rationale: El participio aoristo describe una acción previa y simultánea al verbo principal, con valor narrativo natural en español. "Se volvió" comunica el giro físico hacia ellos sin calco pesado ni pérdida del movimiento previo.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ introduce contraste narrativo suave. "Pero" es la forma más natural en español para reflejar ese contraste inmediato con el contexto anterior.
- source_word: ἐπετίμησεν
  english_pob_choice: rebuked
  chosen_spanish: los reprendió
  alternatives_spanish:
  - los reprendió severamente
  - los censuró
  lexicon: BDAG
  rationale: ἐπιτιμάω expresa reprensión verbal fuerte. "Reprendió" conserva la fuerza correctiva del verbo sin elevarlo a un registro más artificial; el objeto directo explícito es natural en español.
- source_word: αὐτοῖς
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - les
  lexicon: BDAG
  rationale: Aunque el griego usa dativo, en español el verbo "reprender" suele tomar complemento directo de persona. "Los" mantiene la referencia a los discípulos y suena idiomático en la oración.
theological_decisions:
- issue: Variante textual larga en manuscritos posteriores
  english_pob_reading: 'Translate only the SBLGNT text: ''But he turned and rebuked them.'''
  chosen_spanish_reading: 'Traducir solo el texto corto: «Pero él se volvió y los reprendió».'
  alternative_spanish_readings:
  - '«Pero él se volvió y los reprendió, y dijo: “No saben de qué espíritu son; porque el Hijo del Hombre no ha venido a destruir las vidas de los hombres, sino a salvarlas”».'
  rationale: El testimonio base aquí es el texto corto de SBLGNT; la expansión posterior no debe entrar en el cuerpo principal. Como se trata de una variante conocida y sustancial, se conserva en nota para transparencia textual.
  doctrine_reference: Primacía del texto original y preservación de variantes textuales relevantes en nota.
translation_notes:
  revision_awareness: El borrador sigue el texto breve de SBLGNT y mantiene la variante larga únicamente en nota, en consonancia con el audio de revisión de alta concordancia y sin cambios necesarios.
  spanish_consistency_notes:
  - Se conserva el registro narrativo sobrio y publicable.
  - No se introduce «Señor» ni otras convenciones de enmascaramiento del nombre divino porque no aparecen en este versículo.
  - La solución «se volvió» + «los reprendió» reproduce bien el orden y la fuerza del griego sin sobreexplicar.
