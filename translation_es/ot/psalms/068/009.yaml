  text: אֶ֤רֶץ רָעָ֨שָׁה אַף שָׁמַ֣יִם נָטְפוּ֮ מִ/פְּנֵ֪י אֱלֹ֫הִ֥ים זֶ֥ה סִינַ֑י מִ/פְּנֵ֥י אֱ֝לֹהִ֗ים אֱלֹהֵ֥י יִשְׂרָאֵֽל׀־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/068/009.yaml
  text: The earth quaked[a]; even the heavens dripped before God—Sinai itself—before God[b], the God of Israel.
  footnotes:
