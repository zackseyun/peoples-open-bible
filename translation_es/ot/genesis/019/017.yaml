revisions:
- from: 'Y sucedió que, cuando los sacaron afuera[a], él dijo: «Escapa por tu vida. No mires detrás de ti, y no te detengas en toda la llanura. Escapa a los montes[b], no sea que seas arrastrado[c]».'
  to: 'Y sucedió que, cuando los sacaron fuera[a], él dijo: «Escapa por tu vida. No mires detrás de ti, y no te detengas en ningún lugar de la llanura. Escapa a los montes[b], no sea que seas arrastrado[c]».'
  rationale: 'Se hicieron dos ajustes menores: (1) «fuera» en lugar de «afuera» para mejorar la fluidez tras «sacaron»; (2) «en ningún lugar de la llanura» para expresar con más claridad el sentido distributivo de la prohibición. El resto del texto es fiel al hebreo, al audit trail inglés y a un español claro y digno.'
