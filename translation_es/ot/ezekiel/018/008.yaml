review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido básico del hebreo y del POB inglés: prohibición de prestar con interés, rechazo de ganancia adicional, abstenerse de la injusticia y practicar justicia judicial verdadera entre dos partes. Sin embargo, hay un desajuste importante en la primera cláusula: יִתֵּן con בַּנֶּשֶׁךְ es idiomáticamente ''prestar'', no simplemente ''dar''. En español, «no dará a interés» suena menos natural y menos preciso que «no prestará a interés / con interés».'
  spanish_quality_summary: El español es generalmente claro y digno, pero «No dará a interés» resulta poco idiomático en registro bíblico moderno. «Apartará su mano de la injusticia» es aceptable, aunque «aparta su mano» sería más directo si se quisiera un presente gnómico; no es necesario cambiarlo. Las demás cláusulas son legibles y fieles. La nota [a] mezcla alternativas para dos términos hebreos distintos; conviene aclarar que «a usura» corresponde a la primera expresión y «con incremento» a la segunda.
  glossary_alignment: No hay conflicto con la terminología central del proyecto. La elección de «ganancia» para תַרְבִּית y «verdadera justicia» para מִשְׁפַּט אֱמֶת es defendible. Se mantiene adecuadamente el modismo masculino «entre un hombre y otro».
  issues:
  - severity: medium
    issue: «No dará a interés» no refleja con suficiente naturalidad el valor idiomático de יִתֵּן + בַּנֶּשֶׁךְ.
    rationale: Aunque el hebreo usa literalmente «dar», en esta colocación significa dar en préstamo con interés. El propio expediente léxico inglés reconoce «lend». En español, «prestará» transmite mejor el sentido fuente sin añadir paráfrasis indebida.
  - severity: low
    issue: La nota [a] formula alternativas de manera ambigua.
    rationale: '«O “a usura” o “con incremento”» puede hacer pensar que ambas alternativas corresponden a la misma expresión. En realidad reflejan los dos miembros hebreos emparejados: נֶשֶׁךְ / תַרְבִּית.'
  revised_spanish_text: No prestará a interés ni tomará ganancia[a]; apartará su mano de la injusticia[b]; ejecutará verdadera justicia entre un hombre y otro[c].
  revised_footnotes:
  - marker: a
    text: O «no prestará a usura ni tomará incremento».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «hará volver su mano de la injusticia».
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «entre hombre y hombre», un modismo legal para juzgar justamente entre dos partes.'
    reason: cultural_note
  revision_rationale: 'Se corrige la primera cláusula para reflejar el sentido idiomático de יִתֵּן con בַּנֶּשֶׁךְ en español natural y fiel: «prestar» en vez de «dar». Se ajusta también la nota [a] para que represente claramente la alternativa completa preservada por el POB inglés.'
