    text: 'O: «que no pueda ser alterado». El arameo enfatiza que el edicto escrito no debe cambiarse.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no puede ser anulada». Literalmente: «no pasa», un modismo de irrevocabilidad legal.'
    reason: lexical_alternative
  revision_rationale: Se reemplaza «decreto» por «prohibición» para reflejar mejor el valor semántico de אֱסָרָא en contexto. Se ajusta «no pueda ser cambiado» a «no pueda cambiarse» por naturalidad en español. Se reformula la cláusula final con «según la cual» para evitar que «revocada» parezca concordar con «la ley» como referente principal, preservando a la vez la idea de irrevocabilidad legal. Se corrige además la puntuación del vocativo y se afina la nota [b] para español jurídico más natural.
