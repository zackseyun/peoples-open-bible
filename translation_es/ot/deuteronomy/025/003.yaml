    text: 'O: «cuarenta azotes» o «cuarenta golpes». El hebreo especifica el número cuarenta; no se nombra aquí el instrumento ni la forma exacta de cada golpe.'
    reason: lexical_alternative
  - marker: b
    text: «Tu hermano» aquí designa a un miembro de la comunidad del pacto; la ley limita el castigo para que no sea tratado como despreciable.
    reason: cultural_note
