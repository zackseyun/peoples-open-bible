base_translation:
  language: en
  yaml_path: translation/ot/leviticus/025/011.yaml
  text: It is a Jubilee[a]; the fiftieth year shall be for you. You shall not sow, and you shall not reap its volunteer growth[c][b], and you shall not gather the grapes of its unpruned vines.
