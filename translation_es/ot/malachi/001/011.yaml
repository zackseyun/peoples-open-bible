translation:
  language: es
  text: Porque desde la salida del sol hasta su ocaso[a], grande es mi nombre entre las naciones[b], y en todo lugar se ofrece incienso y se presenta una ofrenda pura[d] a mi nombre; porque grande es mi nombre[c] entre las naciones, dice Yahvé de los ejércitos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'desde el oriente hasta el occidente'; literalmente, 'desde la salida del sol hasta su ocaso'.
    reason: lexical_alternative
  - marker: b
    text: O 'entre los gentiles'.
    reason: lexical_alternative
  - marker: c
    text: El hebreo puede leerse como realidad presente, presente profético o certeza futura; la traducción conserva la forma del hebreo sin decidir el tiempo.
    reason: alternative_reading
  - marker: d
    text: '''Ofrenda pura'' traduce el hebreo minchah, término que puede designar una ofrenda en general y, en contextos sacrificiales, con frecuencia una ofrenda de cereal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִמִּזְרַח שֶׁמֶשׁ וְעַד מְבוֹאוֹ
  english_pob_choice: from the rising of the sun to its setting
  chosen_spanish: desde el nacimiento del sol hasta su ocaso
  alternatives_spanish:
  - desde el oriente hasta el occidente
  - desde la salida del sol hasta su puesta
  lexicon: HALOT
  rationale: Conserva el idiomatismo cósmico del hebreo y su alcance total. 'Nacimiento' y 'ocaso' suenan naturales en español y mantienen la imagen solar sin reducirla a una simple dirección geográfica.
- source_word: גָּדוֹל שְׁמִי
  english_pob_choice: my name is great
  chosen_spanish: grande es mi nombre
  alternatives_spanish:
  - mi nombre es grande
  - mi nombre es excelso
  lexicon: HALOT
  rationale: La construcción predicativa hebrea se refleja bien con inversión natural en español. 'Nombre' mantiene el valor de reputación/honor sin diluirlo en una paráfrasis.
- source_word: בַּגּוֹיִם
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los gentiles
  - entre las naciones de la tierra
  lexicon: HALOT
  rationale: '''Naciones'' reproduce el término amplio de גוים sin restringirlo al uso eclesiástico de ''gentiles''. ''Entre'' conserva la esfera relacional del hebreo.'
- source_word: וּבְכָל מָקוֹם
  english_pob_choice: and in every place
  chosen_spanish: y en todo lugar
  alternatives_spanish:
  - y en cada lugar
  - y por todas partes
  lexicon: HALOT
  rationale: '''En todo lugar'' comunica el distributivo del hebreo de manera fluida y formal, sin perder la amplitud universal.'
- source_word: מֻקְטָר
  english_pob_choice: incense is offered
  chosen_spanish: se ofrece incienso
  alternatives_spanish:
  - se quema incienso
  - sube incienso
  lexicon: HALOT
  rationale: El pasivo verbal expresa la acción cultual de manera idiomática en español. 'Ofrecer' evita reducir el rito a la combustión física y preserva su sentido sacrificial.
- source_word: מֻגָּשׁ לִשְׁמִי
  english_pob_choice: is brought / offered to my name
  chosen_spanish: se presenta una ofrenda pura, a mi nombre
  alternatives_spanish:
  - se ofrece una ofrenda pura a mi nombre
  - se trae una ofrenda pura para mi nombre
  lexicon: HALOT
  rationale: '''Presentar'' reproduce bien la idea de llevar algo ante Dios en contexto sacrificial. Se mantiene ''a mi nombre'' de modo literal para conservar la expresión teológica del hebreo. La coma ayuda a que la frase final sea legible sin ocultar la relación sintáctica.'
- source_word: וּמִנְחָה טְהוֹרָה
  english_pob_choice: and a pure offering
  chosen_spanish: una ofrenda pura
  alternatives_spanish:
  - una ofrenda limpia
  - una ofrenda de cereal pura
  lexicon: HALOT
  rationale: '''Ofrenda'' preserva la amplitud de מִנְחָה sin cerrarla prematuramente a ''ofrenda vegetal'' o ''de cereal''. ''Pura'' mantiene el matiz ritual de טְהוֹרָה.'
- source_word: אָמַר יְהוָה צְבָאוֹת
  english_pob_choice: says Yahweh of hosts
  chosen_spanish: dice Yahvé de los ejércitos
  alternatives_spanish:
  - dice Yahvé de los ejércitos celestiales
  - ha dicho Yahvé de los ejércitos
  lexicon: HALOT
  rationale: Se mantiene 'Yahvé' conforme al criterio del proyecto para יהוה. 'De los ejércitos' traduce צבאות de forma directa y conserva su densidad bélica/cósmica.
theological_decisions:
- issue: Tiempos verbales de las participios y la posible lectura profética
  english_pob_reading: The translation preserves the Hebrew wording without resolving the timing.
  chosen_spanish_reading: 'Se conservan presentes e impersonales: ''es grande'', ''se ofrece'', ''se presenta'', sin marcar futuridad explícita.'
  alternative_spanish_readings:
  - será grande... será ofrecido
  - es grande... será ofrecido
  rationale: El hebreo permite una lectura de presente, presente profético o certeza futura. La redacción española mantiene esa tensión sin resolverla de antemano.
  doctrine_reference: Preservar la tensión interpretativa del texto.
- issue: Alcance del lenguaje sacrificial en relación con las naciones
  english_pob_reading: Retain the cultic terms 'incense' and 'offering' without interpretive expansion.
  chosen_spanish_reading: Se conservan 'incienso' y 'ofrenda' como vocabulario cultual directo.
  alternative_spanish_readings:
  - oración y adoración
  - culto espiritual
  rationale: El hebreo usa terminología sacrificial explícita. Traducirla de forma directa evita importar una interpretación que el versículo no formula por sí mismo.
  doctrine_reference: No añadir una explicación doctrinal ajena al texto.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión del inglés POB que clarificó la coordinación de los participios del centro del versículo (''incense is offered, and a pure offering is brought, to my name''). La versión española refleja esa coordinación con dos acciones paralelas: ''se ofrece incienso, y se presenta una ofrenda pura, a mi nombre''.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יהוה conforme al estándar del proyecto.
  - Se usa 'naciones' en vez de 'gentiles' en el texto principal por amplitud profética; se deja la alternativa en nota.
  - Se conserva el orden retórico del versículo con 'Porque' al inicio y la repetición final de la cláusula causal.
  - '''Incienso'' y ''ofrenda'' se mantienen como términos cultuales concretos, sin espiritualización interpretativa.'
