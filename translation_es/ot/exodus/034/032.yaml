revisions:
- from: Después, se acercaron[a] todos los hijos de Israel, y les mandó todo lo que Yahvé había hablado con él en el monte Sinaí.
  to: Después, se acercaron[a] todos los hijos de Israel, y les ordenó todo lo que Yahvé había hablado con él en el monte Sinaí.
  rationale: Se hace una reparación pequeña para mejorar la claridad y naturalidad del verbo que traduce וַיְצַוֵּם. «Les ordenó» preserva mejor la fuerza de mandato de צוה en español sin alterar el sentido ni la estructura del original. El resto del versículo puede mantenerse.
