    rationale: El hebreo expresa progresión, pero en español la doble presencia de «todavía» en la misma cláusula suena torpe. «Aún verás abominaciones todavía mayores» o «Sin embargo, verás abominaciones aún mayores» transmite mejor la escalada.
  - severity: low
