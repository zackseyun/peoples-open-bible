review_pass:
  verdict: revise
  source_alignment_summary: El borrador español preserva bien la estructura comparativa del hebreo, el nombre divino Yahvé, la imagen del racimo y la lógica teológica de preservación parcial por causa de los siervos. También mantiene adecuadamente el objeto implícito final mediante 'los'. Sin embargo, 'mosto' para תִּירוֹשׁ introduce un matiz más estrecho que el documentado en el POB inglés ('vino nuevo' con alternativa 'wine/fresh wine') y puede chocar con 'en un racimo', ya que el mosto normalmente es jugo ya exprimido. Conviene usar 'vino nuevo' en el texto principal y dejar 'mosto' como alternativa de nota.
  spanish_quality_summary: El español es claro y digno. No obstante, 'por amor de mis siervos' suena algo más tradicional/solemne de lo necesario frente al más directo 'por causa de' o 'por el bien de'; aun así no es incorrecto. El problema principal de legibilidad e imagen está en 'mosto en un racimo'. Ajustar a 'vino nuevo' mejora la naturalidad sin perder precisión. El resto del verso fluye bien.
  glossary_alignment: Alinea correctamente Yahvé para יְהוָה y 'siervos' para עֲבָדַי según la razón contextual documentada. No hay conflicto con otros términos del glosario. La única desalineación relevante es que el POB inglés privilegió 'new wine' para תִּירוֹשׁ, mientras que el español elevó 'mosto' al texto principal; eso conviene corregirse para seguir la decisión auditada y evitar estrechamiento semántico.
  issues:
  - severity: medium
    issue: '''mosto'' como texto principal para תִּירוֹשׁ'
    rationale: Aunque puede ser una alternativa válida, el registro auditado favorece 'vino nuevo'. En español, 'mosto en un racimo' suena menos natural porque 'mosto' suele referirse al jugo ya exprimido o en fermentación, no a lo hallado dentro del racimo.
  - severity: low
    issue: Nota a sobrecarga la explicación hacia 'mosto'
    rationale: La nota actual defiende la elección discutible del texto principal. Si se cambia a 'vino nuevo', la nota puede presentar 'mosto' y 'vino fresco' como alternativas sin tensionar la imagen agrícola.
  revised_spanish_text: 'Así dice Yahvé: Como cuando se halla vino nuevo[a] en un racimo, y se dice: «No lo destruyas, porque hay bendición en él», así actuaré yo por causa de mis siervos, para no destruirlos a todos[b].'
  revised_footnotes:
  - marker: a
    text: O ‘mosto’ o ‘vino fresco’. תִּירוֹשׁ se refiere específicamente a vino nuevo, no al vino en sentido genérico.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, ‘para no destruir todo’; el hebreo deja implícito el objeto. En español se hace explícito con ‘los’ para reflejar el grupo aludido.
    reason: lexical_alternative
  revision_rationale: Se cambia 'mosto' por 'vino nuevo' para ajustarse mejor a la decisión léxica documentada del POB inglés y para evitar una imagen menos natural en español con 'en un racimo'. También se suaviza 'por amor de' a 'por causa de' por mayor naturalidad contemporánea, sin alterar el sentido.
