revisions:
- from: Y Joroboam se acostó con sus padres[a], con los reyes de Israel[b], y Zacarías, su hijo, reinó en su lugar.
  to: Y Joroboam durmió con sus padres[a], con los reyes de Israel[b], y Zacarías, su hijo, reinó en su lugar.
  rationale: Se reemplaza «se acostó» por «durmió» para preservar mejor en español la fórmula bíblica convencional de la muerte de un rey, manteniendo a la vez la cercanía al hebreo y al POB inglés («slept»). Se conserva «con los reyes de Israel» por fidelidad al doble עִם, y se ajusta la nota a para que ofrezca una alternativa real.
