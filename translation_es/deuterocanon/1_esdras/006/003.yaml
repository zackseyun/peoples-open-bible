translation_notes:
  revision_awareness: La traducción sigue el sentido del griego de Swete 1909 como texto primario, teniendo en cuenta el audit trail inglés. Se retiene la atribución singular del discurso en la frase final, coherente con la revisión inglesa que explica el sujeto más probable del verbo singular.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - «Gobernador» se mantiene como término administrativo claro para ἔπαρχος.
  - Se preserva la secuencia narrativa con un español fluido, sin eliminar la ambigüedad sobre el sujeto implícito del verbo final.
