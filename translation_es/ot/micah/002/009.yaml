translation:
  language: es
  text: Ustedes expulsan a las mujeres[a] de mi pueblo de sus casas agradables; de sus niños les quitan mi esplendor[b] para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘las esposas de mi pueblo’. El hebreo puede referirse tanto a mujeres en general como a esposas específicamente.
    reason: lexical_alternative
  - marker: b
    text: O ‘mi gloria’ para ‘mi esplendor’. El término hebreo puede denotar esplendor, gloria, majestad u honor.
    reason: lexical_alternative
lexical_decisions:
- source_word: נְשֵׁי עַמִּי
  english_pob_choice: the women of my people
  chosen_spanish: las mujeres de mi pueblo
  alternatives_spanish:
  - las esposas de mi pueblo
  lexicon: HALOT
  rationale: נְשֵׁי puede significar ‘mujeres’ o ‘esposas’. Sigo la lectura amplia del POB inglés porque el contexto profético apunta a mujeres vulnerables como grupo social, no solo a un estado civil específico.
- source_word: תְּגָרְשׁוּן
  english_pob_choice: you drive out
  chosen_spanish: expulsan
  alternatives_spanish:
  - echan
  - destierran
  lexicon: HALOT
  rationale: גרש en piel expresa expulsión forzada. ‘Expulsan’ conserva la fuerza coercitiva y suena natural en español bíblico contemporáneo.
- source_word: מִבֵּית תַּעֲנֻגֶיהָ
  english_pob_choice: from their delightful houses
  chosen_spanish: de sus casas agradables
  alternatives_spanish:
  - de sus casas deleitosas
  - de sus hogares placenteros
  lexicon: HALOT
  rationale: בַּיִת es ‘casa/hogar’ y תַּעֲנֻגִים denota deleite, placer o cosas agradables. ‘Casas agradables’ mantiene el matiz de comodidad y seguridad sin sonar forzado en español.
- source_word: מֵעַל עֹלָלֶיהָ
  english_pob_choice: from their children
  chosen_spanish: a sus niños
  alternatives_spanish:
  - de sobre sus niños
  - de sus pequeños niños
  - de sus infantes
  lexicon: HALOT
  rationale: עוֹלָל se refiere a niños pequeños o infantes. La expresión hebrea literalmente es ‘de sobre’, pero en contexto comunica despojo o separación; por eso el español lo expresa como afectación directa con ‘a sus niños’ dentro de la cláusula de despojo.
- source_word: תִּקְחוּ
  english_pob_choice: you take away
  chosen_spanish: les quitan
  alternatives_spanish:
  - les arrebatan
  - toman
  lexicon: HALOT
  rationale: לקח normalmente significa ‘tomar’, pero aquí tiene sentido de privar o despojar. ‘Les quitan’ reproduce esa pérdida injusta de manera clara y idiomática.
- source_word: הֲדָרִי
  english_pob_choice: my splendor
  chosen_spanish: mi esplendor
  alternatives_spanish:
  - mi gloria
  - mi majestad
  - mi honor
  lexicon: HALOT
  rationale: הָדָר puede ser esplendor, gloria, majestad u honor. ‘Esplendor’ sigue la elección del POB inglés y preserva el registro elevado sin cargar de inmediato con asociaciones teológicas más técnicas de ‘gloria’.
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - permanentemente
  lexicon: HALOT
  rationale: עוֹלָם expresa duración indefinida o perdurable. ‘Para siempre’ es la forma más natural en español moderno para una denuncia profética.
theological_decisions:
- issue: Referencia del ‘mi’ en ‘mi pueblo’ y ‘mi esplendor’
  english_pob_reading: The speaker is the LORD, so 'my people' and 'my splendor' are retained as divine first-person speech.
  chosen_spanish_reading: 'Se conserva la primera persona divina: ‘mi pueblo’ y ‘mi esplendor’.'
  alternative_spanish_readings:
  - ‘su pueblo’ y ‘su esplendor’ entendidos como el pueblo y su dignidad
  - ‘mi esplendor’ reinterpretado como la dignidad dada por Dios
  rationale: En el contexto profético la voz divina sigue activa; por eso conviene mantener ‘mi’ sin suavizarlo. Esto preserva la tensión teológica del texto entre la gloria de Yahvé y la dignidad concedida a su pueblo.
  doctrine_reference: Preservar la tensión teológica sin resolverla interpretativamente.
translation_notes:
  revision_awareness: La revisión más reciente indica que no se hicieron cambios sustanciales; el borrador español sigue de cerca la decisión léxica y teológica ya auditada.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ donde el contexto lo requiera en otros pasajes, pero aquí la voz divina se expresa implícitamente en la primera persona sin añadir un nombre no presente en el versículo.
  - Se conserva ‘esplendor’ para הָדָר por consistencia con la elección del POB inglés.
  - Se evita ‘siervas’ o ‘esposas’ como opción principal para no estrechar indebidamente el alcance semántico de נְשֵׁי.
  - La cláusula final mantiene ‘para siempre’ para reflejar la duración indefinida de לְעוֹלָם.
