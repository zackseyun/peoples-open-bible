theological_decisions:
- issue: Referent of κύριος
  chosen_reading: the Lord
  alternative_readings:
  - God
  - the risen Jesus
  rationale: The Greek uses κύριος without explicit clarification. In Acts, divine agency may be expressed with some fluidity, and the text does not require a more specific identification here. Rendering simply 'the Lord' preserves the wording and theological tension rather than resolving it.
  doctrine_reference: 'DOCTRINE.md: Contested terms (κύριος → Lord); Preserve theological tension rather than resolve it.'
