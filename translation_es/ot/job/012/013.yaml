translation:
  language: es
  text: Con él están la sabiduría y el poder[a]; de él son el consejo y el entendimiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «En él están la sabiduría y el poder; de él son el consejo y el entendimiento».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עִמּוֹ
  english_pob_choice: With him
  chosen_spanish: Con él
  alternatives_spanish:
  - En él
  - Junto a él
  lexicon: HALOT
  rationale: La preposición עִם con sufijo pronominal expresa asociación o compañía; en español, «Con él» comunica de forma natural esa relación y mantiene la cercanía del hebreo sin volver la frase innecesariamente interpretativa.
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - sapiencia
  - prudencia
  lexicon: HALOT
  rationale: «Sabiduría» es el equivalente normal y más transparente para חָכְמָה; conserva el valor de insight hábil y entendimiento verdadero que exige el contexto poético.
- source_word: וּגְבוּרָה
  english_pob_choice: and might
  chosen_spanish: y el poder
  alternatives_spanish:
  - y la fuerza
  - y la potencia
  lexicon: HALOT
  rationale: גְבוּרָה puede ser fuerza, poder o might. «El poder» transmite bien la capacidad efectiva y encaja con el paralelismo elevado junto a «sabiduría»; se evita «fuerza» por sonar más físico que el matiz de autoridad eficaz aquí.
- source_word: לוֹ
  english_pob_choice: to him belong
  chosen_spanish: suyo son
  alternatives_spanish:
  - le pertenecen
  - son de él
  lexicon: HALOT
  rationale: El ל con sufijo marca posesión en una oración nominal. «Suyo son» preserva esa fuerza posesiva en español con concisión poética, sin añadir un verbo que no está en el hebreo.
- source_word: עֵצָה
  english_pob_choice: counsel
  chosen_spanish: el consejo
  alternatives_spanish:
  - el plan
  - la deliberación
  lexicon: HALOT
  rationale: «Consejo» reproduce el sentido de deliberación, planificación o consejo prudente de עֵצָה y mantiene el registro bíblico-literario del verso.
- source_word: תְבוּנָה
  english_pob_choice: understanding
  chosen_spanish: el entendimiento
  alternatives_spanish:
  - la inteligencia
  - la discernimiento
  lexicon: HALOT
  rationale: תְבוּנָה denota entendimiento, discernimiento o insight. «Entendimiento» preserva la pareja clásica con «sabiduría» y «consejo» y evita reducirla a mera capacidad intelectual.
theological_decisions:
- issue: Referencia de los sufijos pronominales
  english_pob_reading: The pronouns refer to God, continuing Job's description of divine wisdom and power.
  chosen_spanish_reading: Los sufijos se entienden como referencia a Dios; la traducción mantiene el pronombre implícito en «él» y la posesión en «suyo» sin nombrar a Dios explícitamente.
  alternative_spanish_readings:
  - Con Dios están la sabiduría y el poder; de él son el consejo y el entendimiento.
  - Con él está la sabiduría y el poder; de él son el consejo y el entendimiento.
  rationale: El contexto inmediato identifica a Dios como el sujeto implícito, pero el hebreo conserva la forma pronominal. La versión española mantiene esa economía textual y deja que el contexto haga la identificación, como en el audit trail inglés.
  doctrine_reference: Sabiduría y poder divinos; lectura contextual de los pronombres en poesía sapiencial
- issue: Equivalencia de גְבוּרָה
  english_pob_reading: and might
  chosen_spanish_reading: y el poder
  alternative_spanish_readings:
  - y la fuerza
  - y el poderío
  rationale: No se debe perder la tensión entre fuerza, capacidad y autoridad implícita en גְבוּרָה. «Poder» funciona bien en español bíblico actual y conserva un alcance suficientemente amplio sin estrechar el campo semántico.
  doctrine_reference: Atributos divinos en lenguaje sapiencial
- issue: Posesión en la segunda cola
  english_pob_reading: to him belong counsel and understanding.
  chosen_spanish_reading: suyo son el consejo y el entendimiento.
  alternative_spanish_readings:
  - le pertenecen el consejo y el entendimiento
  - de él son el consejo y el entendimiento
  rationale: La construcción posesiva evita una traducción meramente mecánica de ל־ con sufijo y reproduce la relación de pertenencia de manera idiomática. «Suyo son» conserva el paralelismo poético de una cláusula nominal breve.
  doctrine_reference: Sintaxis posesiva en poesía hebrea
translation_notes:
  revision_awareness: El inglés POB mantuvo una nota alternativa entre «With him» y «In him», además de la lectura posesiva («to him belong» / «his are»). La versión española conserva esa misma tensión mediante una cláusula con «Con él» y una posesión nominal («suyo son»), sin necesidad de introducir una nota textual adicional más allá de la alternativa principal para «En él».
  spanish_consistency_notes:
  - Se usa «sabiduría» para חָכְמָה, «consejo» para עֵצָה y «entendimiento» para תְבוּנָה siguiendo la red semántica clásica del verso.
  - Se evita «SEÑOR» porque el verso no contiene el Tetragrámaton; el referente divino se infiere por el contexto sapiencial inmediato.
  - «Poder» se prefiere a «fuerza» para conservar un registro más inclusivo de capacidad/autoridad en la paralela con sabiduría.
