translation:
  language: es
  text: El que sea hallado con tus dioses no vivirá[a]. Delante de nuestros hermanos[b], identifica lo que es tuyo y que está conmigo, y tómalo para ti. Jacob no sabía que Raquel los había robado[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más formal: «con quien encuentres a tus dioses».'
    reason: lexical_alternative
  - marker: b
    text: «Hermanos» puede referirse al grupo más amplio de parientes o varones del clan presentes, no necesariamente solo a hermanos de sangre.
    reason: cultural_note
  - marker: c
    text: Es decir, que Raquel había robado los dioses domésticos de Labán.
    reason: cross_reference
lexical_decisions:
- source_word: עִם אֲשֶׁר תִּמְצָא
  english_pob_choice: whoever is found with
  chosen_spanish: el que sea hallado con
  alternatives_spanish:
  - quien sea encontrado con
  - el que encuentres con
  lexicon: HALOT
  rationale: 'La construcción hebrea funciona de modo indefinido: apunta a cualquier persona en cuya posesión aparezcan los dioses. En español, ''el que sea hallado con'' conserva bien ese valor sin forzar una traducción mecánica del sujeto de segunda persona.'
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your gods
  chosen_spanish: tus dioses
  alternatives_spanish:
  - tus dioses domésticos
  - tus imágenes divinas
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'tus dioses'. Aunque el contexto narrativo muestra que se trata de ídolos del hogar, aquí no aparece el término técnico para ellos; por eso se mantiene la forma directa 'tus dioses'.
- source_word: לֹא יִחְיֶה
  english_pob_choice: shall not live
  chosen_spanish: no vivirá
  alternatives_spanish:
  - no debe vivir
  - que no viva
  lexicon: HALOT
  rationale: La frase expresa una sentencia o maldición formulada de manera tajante. 'No vivirá' preserva esa fuerza formal en español natural.
- source_word: נֶגֶד אַחֵינוּ
  english_pob_choice: In the presence of our brothers
  chosen_spanish: Delante de nuestros hermanos
  alternatives_spanish:
  - En presencia de nuestros hermanos
  - Ante nuestros parientes
  lexicon: HALOT
  rationale: נֶגֶד significa 'delante de / en presencia de'. 'Hermanos' se conserva porque refleja el término hebreo y puede abarcar parientes o miembros del grupo, no solo hermanos biológicos.
- source_word: הַכֶּר
  english_pob_choice: identify
  chosen_spanish: identifica
  alternatives_spanish:
  - reconoce
  - examina
  lexicon: HALOT
  rationale: El imperativo de נכר aquí pide reconocer o determinar cuál de los objetos es de Laban. 'Identifica' expresa bien la acción de inspeccionar y discernir propiedad en un español claro.
- source_word: מָה עִמָּדִי
  english_pob_choice: what of yours is with me
  chosen_spanish: lo que es tuyo y que está conmigo
  alternatives_spanish:
  - lo que está conmigo
  - lo que entre mis cosas es tuyo
  lexicon: HALOT
  rationale: El hebreo es elíptico; el valor posesivo se completa por el contexto y por 'tómalo para ti'. La formulación elegida hace explícita esa relación sin añadir contenido ajeno.
- source_word: וְקַח לָךְ
  english_pob_choice: and take it for yourself
  chosen_spanish: y tómalo para ti
  alternatives_spanish:
  - y tómalo
  - y llévatelo
  lexicon: HALOT
  rationale: El dativo aporta interés personal. 'Para ti' conserva ese matiz, y el objeto implícito se recupera por el contexto inmediato.
- source_word: וְלֹא יָדַע יַעֲקֹב
  english_pob_choice: Jacob did not know
  chosen_spanish: Jacob no sabía
  alternatives_spanish:
  - Y Jacob no sabía
  - Jacob no lo sabía
  lexicon: HALOT
  rationale: La cláusula narrativa se expresa con naturalidad en pasado imperfectivo en español. Se mantiene el sentido de ignorancia mientras se evita una calca rígida.
- source_word: רָחֵל גְּנָבָתַם
  english_pob_choice: Rachel had stolen them
  chosen_spanish: Raquel los había robado
  alternatives_spanish:
  - Raquel los robó
  - Raquel se los había llevado
  lexicon: HALOT
  rationale: El sufijo pronominal plural se refiere a los dioses mencionados antes; por eso se usa 'los'. El pluscuamperfecto refleja bien el trasfondo explicativo de la cláusula en el relato.
translation_notes:
  revision_awareness: 'Coincide con el pasaje base y con el último pase de revisión: no se requirieron cambios posteriores; se conserva la lectura de ''tus dioses'' y la nota cultural sobre ''hermanos''.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva 'dioses' en vez de suavizar a 'ídolos' para respetar la literalidad del hebreo; la nota explica el referente contextual.
  - '''Hermanos'' se usa en sentido amplio de parentesco/clan, coherente con el audit trail inglés.'
