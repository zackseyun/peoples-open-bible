revisions:
- from: La ofrenda de grano y la ofrenda de libación han sido cortadas de la casa de Yahvé[a]; los sacerdotes hacen duelo[b], los ministros de Yahvé[c].
  to: La ofrenda de grano y la ofrenda de libación han sido suprimidas de la casa de Yahvé[a]; los sacerdotes están de duelo, los ministros[b] de Yahvé.
  rationale: Se corrige el calco poco natural 'han sido cortadas' por 'han sido suprimidas', que preserva mejor la idea de interrupción cultual en español. Se mejora 'hacen duelo' a 'están de duelo' por naturalidad y dignidad. Se simplifican y realinean las notas para que reflejen alternativas reales y necesarias, evitando una nota redundante sobre el verbo de lamento.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:35:06Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido básico del hebreo: la cesación de la ofrenda de cereal y de la libación desde la casa de Yahvé, y el lamento de los sacerdotes que sirven a Yahvé. También mantiene correctamente ''casa de Yahvé'' y el nombre divino ''Yahvé''. Sin embargo, ''han sido cortadas'' suena poco idiomático en español para la cesación de ofrendas, y ''de la casa de Yahvé'' debería ser ''de/desde la casa de Yahvé'' con una formulación más natural de privación o interrupción cultual.'
  spanish_quality_summary: 'La redacción es comprensible, pero presenta dos giros mejorables para español bíblico natural: ''han sido cortadas'' es demasiado calco y algo torpe; ''hacen duelo'' es entendible pero menos natural que ''están de duelo'' o ''se lamentan''. ''Ofrenda de libación'' y ''ministros de Yahvé'' son aceptables y dignos.'
  glossary_alignment: 'Alineación general buena: יְהוָה → ''Yahvé'' correctamente; מִנְחָה → ''ofrenda de grano'' es aceptable; נֶסֶךְ → ''ofrenda de libación'' preserva precisión cultual; מְשָׁרְתֵי יְהוָה → ''ministros de Yahvé'' coincide con la rationale auditada. La principal corrección es estilística-lexical en הָכְרַת y אָבְלוּ para un español más fiel y natural.'
  issues:
  - severity: medium
    issue: '''han sido cortadas'' para הָכְרַת'
    rationale: Aunque refleja literalmente 'cut off', en español suena forzado para ofrendas. El hebreo expresa cesación/interrupción cultual; 'han sido suprimidas' o 'han cesado' comunica mejor el resultado pasivo sin calco duro.
  - severity: medium
    issue: '''hacen duelo'' para אָבְלוּ'
    rationale: Es comprensible, pero menos idiomático que 'están de duelo' o 'se lamentan'. Dado el tono de lamento ritual, 'están de duelo' mantiene solemnidad y naturalidad.
  - severity: low
    issue: Nota al pie a no refleja una alternativa real en español revisado
    rationale: La nota actual repite casi la misma formulación del texto y además depende de 'cortadas', que conviene corregir. Debe ajustarse a una alternativa significativa, por ejemplo variación aspectual.
  revised_spanish_text: La ofrenda de grano y la ofrenda de libación han sido suprimidas de la casa de Yahvé[a]; los sacerdotes están de duelo, los ministros[b] de Yahvé.
  revised_footnotes:
  - marker: a
    text: 'O: «La ofrenda de grano y la ofrenda de libación son suprimidas de la casa de Yahvé» o «han cesado en la casa de Yahvé».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «los que sirven a Yahvé».'
    reason: lexical_alternative
  revision_rationale: Se corrige el calco poco natural 'han sido cortadas' por 'han sido suprimidas', que preserva mejor la idea de interrupción cultual en español. Se mejora 'hacen duelo' a 'están de duelo' por naturalidad y dignidad. Se simplifican y realinean las notas para que reflejen alternativas reales y necesarias, evitando una nota redundante sobre el verbo de lamento.
