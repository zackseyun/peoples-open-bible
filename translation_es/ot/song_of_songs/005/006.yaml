  glossary_alignment: No hay términos del glosario mayor en juego salvo opciones poéticas. «Amado» para דוֹד y «alma» para נֶפֶשׁ están bien alineados con el racional documentado. No hay conflictos teológicos ni terminológicos de proyecto.
