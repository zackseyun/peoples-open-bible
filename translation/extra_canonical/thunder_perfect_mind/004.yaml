lexical_decisions:
- source_word: ⲁⲩⲱ
  chosen: and
  alternatives:
  - also
  - now
  lexicon: Crum, Coptic Dictionary
  rationale: Standard Sahidic connective continuing the admonitory sequence; retaining
    initial "And" preserves cadence.
- source_word: ⲙⲡⲣⲧⲣⲉ
  chosen: do not (prohibitive)
  alternatives:
  - do not let
  - do not cause
  lexicon: Layton, Coptic Grammar §36 (negative imperative with ⲙⲡⲣ- ⲧⲣⲉ)
  rationale: Marks a negative exhortation; rendering as a direct prohibition fits
    the poem’s imperative voice.
- source_word: ⲥⲱⲧⲙ
  chosen: hear
  alternatives:
  - listen
  lexicon: Crum, Coptic Dictionary
  rationale: The verb plainly means "hear"/"listen"; the line’s thrust is about awareness
    of the speaker.
- source_word: ⲕⲁⲧⲁ
  chosen: in
  alternatives:
  - according to
  - with respect to
  lexicon: Crum; Greek loan preposition
  rationale: Here functions as a distributive preposition introducing spheres (place/time);
    English "in" is idiomatic.
- source_word: ⲙⲁ
  chosen: place
  alternatives:
  - location
  - spot
  lexicon: Crum, Coptic Dictionary
  rationale: Common noun for place; keeps the spatial half of the pair explicit.
- source_word: ⲟⲩⲙⲉⲩⲉ
  chosen: time
  alternatives:
  - hour
  - moment
  lexicon: Crum, Coptic Dictionary
  rationale: Literal "hour" is possible, but idiomatic English favors "time" in this
    distributive pairing.
- source_word: ⲛⲕⲉ-
  chosen: any/other
  alternatives:
  - another
  - different
  lexicon: Crum, Coptic Dictionary
  rationale: 'ⲕⲉ- means "other"; with distributive sense it conveys indefiniteness:
    any (other) time.'
parallelism_check: The line balances two parallel spheres—place and time—linked by
  "or." Retaining "anywhere / at any time" preserves the distributive parallelism
  and cadence.
voice_check: Maintains the direct imperative voice of the speaker, preserving the
  commanding, admonitory tone within the introduction.
