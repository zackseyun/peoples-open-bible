    rationale: τοὺς ἀσεβήσαντας es participio aoristo; el español imperfecto «actuaban» sugiere acción en desarrollo o habitual. «Actuaron impíamente» conserva mejor la referencia a una acción consumada sin perder el matiz verbal.
  - severity: low
