translation:
  language: es
  text: La vaca y la osa pacerán[a] juntas; sus crías yacerán, y el león, como el buey[b], comerá paja.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pastarán». El verbo hebreo puede entenderse de manera más general como «alimentarse», aunque «pacerán» conserva bien la imagen animal.
    reason: lexical_alternative
  - marker: b
    text: O «como ganado». בָּקָר puede referirse colectivamente al ganado, además de un bovino individual.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/פָרָה
  english_pob_choice: the cow
  chosen_spanish: la vaca
  alternatives_spanish:
  - la ternera
  - la hembra bovina
  lexicon: HALOT
  rationale: פָּרָה designa una vaca; «vaca» es el equivalente natural en español y conserva la imagen concreta del animal.
- source_word: וָ/דֹב
  english_pob_choice: the bear
  chosen_spanish: la osa
  alternatives_spanish:
  - el oso
  lexicon: HALOT
  rationale: El hebreo usa sustantivo femenino para el par con פָּרָה; «osa» refleja mejor la concordancia de género del texto que «oso».
- source_word: תִּרְעֶינָה
  english_pob_choice: will graze
  chosen_spanish: pacerán
  alternatives_spanish:
  - comerán
  - se alimentarán
  lexicon: HALOT
  rationale: De רעה en contexto animal. «Pacerán» mantiene el matiz concreto de pastar/comer hierba y suena natural en español bíblico contemporáneo.
- source_word: יַחְדָּו
  english_pob_choice: together
  chosen_spanish: juntas
  alternatives_spanish:
  - juntos
  - a la vez
  lexicon: HALOT
  rationale: «Juntas» concuerda con los sustantivos femeninos y traduce la idea de simultaneidad sin forzar una fórmula más abstracta.
- source_word: יִרְבְּצוּ
  english_pob_choice: will lie down
  chosen_spanish: yacerán
  alternatives_spanish:
  - se echarán
  - reposarán
  lexicon: HALOT
  rationale: רבץ describe a animales echados/echándose. «Yacerán» preserva el gesto corporal y funciona bien con el paralelismo poético.
- source_word: יַלְדֵי/הֶן
  english_pob_choice: their young
  chosen_spanish: sus crías
  alternatives_spanish:
  - sus pequeños
  - su descendencia
  lexicon: HALOT
  rationale: Aunque literalmente es «sus hijos/jóvenes», para animales «crías» es la opción idiomática y más precisa en español.
- source_word: וְ/אַרְיֵה
  english_pob_choice: and the lion
  chosen_spanish: y el león
  alternatives_spanish:
  - y el león macho
  lexicon: HALOT
  rationale: אַרְיֵה se traduce de manera directa como «león»; no hay razón para añadir especificación de sexo en español.
- source_word: כַּ/בָּקָר
  english_pob_choice: like the ox
  chosen_spanish: como el buey
  alternatives_spanish:
  - como ganado
  - como los bueyes
  lexicon: HALOT
  rationale: בָּקָר puede referirse al ganado en conjunto, pero el singular comparativo del contexto poético se expresa con naturalidad como «el buey», siguiendo la decisión inglesa de evitar una construcción colectiva torpe.
- source_word: יֹֽאכַל
  english_pob_choice: will eat
  chosen_spanish: comerá
  alternatives_spanish:
  - se alimentará
  lexicon: HALOT
  rationale: El imperfecto profético se vierte en futuro simple, «comerá», que es claro y natural en español.
- source_word: תֶּֽבֶן
  english_pob_choice: straw
  chosen_spanish: paja
  alternatives_spanish:
  - heno
  - rastrojo
  lexicon: HALOT
  rationale: תֶּבֶן denota paja/entrefino vegetal usado como alimento. «Paja» es la equivalencia más directa y común en español.
theological_decisions:
- issue: Alcance de la imagen de paz entre animales
  english_pob_reading: Render the verse as a concrete depiction of reconciled creation without specifying whether the fulfillment is literal, symbolic, or both.
  chosen_spanish_reading: Presentar el verso como una imagen concreta de creación reconciliada, sin decidir si el cumplimiento es literal, simbólico o ambos.
  alternative_spanish_readings:
  - una alegoría exclusiva de paz humana
  - una transformación zoológica estrictamente literal
  rationale: El hebreo ofrece la escena con fuerza imagística, pero no obliga a resolver el modo de cumplimiento. La traducción conserva esa tensión teológica sin interpretarla de antemano.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: 'La versión inglesa auditada se mantuvo sin cambios sustanciales en la última revisión (pass #2, unchanged=true). Esta propuesta sigue esa base, ajustando solo la formulación al español y preservando las alternativas léxicas documentadas en el aparato inglés.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se usa «pacerán» en lugar de un calco más general para conservar el matiz zoológico de רעה.
  - Se traduce «yacerán» para רבץ por ser un verbo idiomático y poético en español, sin perder la imagen de animales echados.
  - Se elige «crías» para יַלְדֵיהֶן por tratarse de animales, evitando el literalismo «hijos» que sonaría impropio en español.
  - 'Se conserva el paralelismo de las dos imágenes: animales herbívoros juntos y el león comiendo paja como el ganado.'
