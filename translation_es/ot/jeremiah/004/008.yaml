translation:
  language: es
  text: Por causa de esto[a], vístanse de cilicio; hagan duelo y giman[b], porque el ardor de la ira de Yahvé no se ha apartado de nosotros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ceñíos de cilicio».
    reason: lexical_alternative
  - marker: b
    text: O «aúllen».
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל זֹאת
  english_pob_choice: Because of this
  chosen_spanish: Por causa de esto
  alternatives_spanish:
  - Por esto
  - A causa de esto
  - Por ello
  lexicon: HALOT
  rationale: La construcción preposicional introduce la razón u ocasión de los imperativos. «Por causa de esto» conserva el valor causal con un registro natural en español y refleja bien el matiz del inglés POB.
- source_word: חִגְרוּ שַׂקִּים
  english_pob_choice: put on sackcloth
  chosen_spanish: cíñanse de cilicio
  alternatives_spanish:
  - pónganse cilicio
  - vístanse de cilicio
  - átense cilicio
  lexicon: HALOT
  rationale: El verbo hebreo significa literalmente «ceñir» o «atar»; con sackcloth, la imagen es la de vestirse de ropa de duelo. «Cíñanse de cilicio» conserva la fuerza verbal y la imaginería, mientras sigue siendo comprensible en español bíblico contemporáneo.
- source_word: סִפְדוּ
  english_pob_choice: mourn
  chosen_spanish: hagan duelo
  alternatives_spanish:
  - laméntense
  - lloren de duelo
  - hagan lamentación
  lexicon: HALOT
  rationale: El verbo expresa lamento funerario o de duelo. «Hagan duelo» mantiene el sentido de lamentación ritual o comunitaria y evita repetir innecesariamente el énfasis de la siguiente expresión.
- source_word: וְהֵילִילוּ
  english_pob_choice: and wail
  chosen_spanish: y aúllen
  alternatives_spanish:
  - y giman
  - y clamen
  - y lloren
  lexicon: HALOT
  rationale: El verbo denota un clamor fuerte y audible de dolor. «Aúllen» conserva la intensidad sonora del término, aunque suene más marcada que opciones más suaves; aquí esa aspereza corresponde al hebreo.
- source_word: חֲרוֹן אַף
  english_pob_choice: the burning anger
  chosen_spanish: el ardor de la ira
  alternatives_spanish:
  - la ira ardiente
  - el ardor de su ira
  - la furia ardiente
  lexicon: HALOT
  rationale: La expresión hebrea combina «ardor/burning» con «nariz/ira» como idiomático de ira intensa. «El ardor de la ira» preserva el calor metafórico y evita reducir el giro a un simple «enojo».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: El nombre propio divino se mantiene como «Yahvé», conforme al criterio proyectual en español. No se sustituye por un título, para preservar el nombre del pacto en la lectura española.
- source_word: מִמֶּנּוּ
  english_pob_choice: from us
  chosen_spanish: de nosotros
  alternatives_spanish:
  - de parte de nosotros
  - de nosotros mismos
  lexicon: HALOT
  rationale: El sufijo es de primera persona plural y el contexto incluye al pueblo bajo juicio. «De nosotros» es la forma natural y fiel en español para expresar el alejamiento de la ira respecto del grupo.
theological_decisions:
- issue: Cómo renderizar el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: La tradición de este proyecto exige preservar el nombre divino en transliteración, no ocultarlo tras una sustitución honorífica. «Yahvé» mantiene la referencia personal del texto hebreo y es una forma ya reconocible en español bíblico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el audit trail inglés: conserva la causalidad de עַל זֹאת, la imaginería de «ceñirse» sackcloth/cilicio, el paralelismo de duelo + clamor, y la lectura del nombre divino como Yahvé. No se aplicaron revisiones posteriores en el paquete fuente; el estado de alta concordancia respalda mantener la solución base.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - «Cilicio» comunica el sackcloth bíblico en español sin perder el matiz de vestidura de duelo.
  - «Hagan duelo» y «aúllen» mantienen la progresión de lamento intenso del hebreo.
  - La primera persona plural en «de nosotros» refleja que el hablante se incluye con la comunidad.
