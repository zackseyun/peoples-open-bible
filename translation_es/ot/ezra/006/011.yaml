translation:
  language: es
  text: 'Y de mi parte se emite un decreto: si alguno altera este edicto, de su casa se arrancará una viga[a][b], y será empalado en ella; y su casa será convertida en un montón de inmundicia[c] por causa de esto.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «será colgado en ella».'
    reason: alternative_reading
  - marker: b
    text: Literalmente, «una viga/madero será arrancado de su casa».
    reason: lexical_alternative
  - marker: c
    text: Tradicionalmente, «estercolero».
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׂים טְעֵם
  english_pob_choice: a decree is issued
  chosen_spanish: se emite un decreto
  alternatives_spanish:
  - se establece un decreto
  - se da una orden
  lexicon: HALOT
  rationale: 'La expresión aramea tiene sentido administrativo-real: “poner/establecer” un decreto. En español, “se emite un decreto” comunica con naturalidad la acción oficial sin perder el tono jurídico del original.'
- source_word: יְהַשְׁנֵא
  english_pob_choice: alters
  chosen_spanish: altera
  alternatives_spanish:
  - cambia
  - adultera
  lexicon: HALOT
  rationale: El verbo aquí apunta a modificar o manipular el contenido de un edicto. “Altera” preserva esa idea de intervención sobre el documento oficial, no solo desobediencia general.
- source_word: פִּתְגָמָא
  english_pob_choice: edict
  chosen_spanish: edicto
  alternatives_spanish:
  - decreto
  - mandato
  - palabra
  lexicon: HALOT
  rationale: En contexto imperial, el término es una disposición oficial. “Edicto” mantiene el carácter administrativo y coincide con el valor que el inglés POB fijó para distinguirlo de una mera “palabra” o “orden” informal.
- source_word: יִתְנְסַח אָע מִן בַּיְתֵהּ
  english_pob_choice: a beam shall be pulled out from his house
  chosen_spanish: de su casa se arrancará una viga
  alternatives_spanish:
  - de su casa se sacará un madero
  - de su casa se quitará un leño
  lexicon: HALOT
  rationale: El hebreo/arameo describe la extracción de una pieza de madera de la casa del culpable. “Viga” es concreta y suficientemente amplia para reflejar el madero/timber del texto, mientras “se arrancará” conserva la fuerza del verbo.
- source_word: וּזְקִיף יִתְמְחֵא עֲלֹהִי
  english_pob_choice: he shall be impaled on it
  chosen_spanish: será empalado en ella
  alternatives_spanish:
  - será colgado en ella
  - será fijado en ella
  lexicon: HALOT
  rationale: La imagen es de ser levantado/suspendido sobre la pieza de madera extraída. “Empalado” comunica mejor la severidad y el modo antiguo del castigo que “colgado”, aunque ese valor tradicional queda preservado en una nota.
- source_word: נְוָלוּ
  english_pob_choice: refuse heap
  chosen_spanish: un montón de inmundicia
  alternatives_spanish:
  - un estercolero
  - un montón de basura
  - un montón de estiércol
  lexicon: HALOT
  rationale: El término designa un montón de desecho o ruina vergonzosa. “Inmundicia” evita el arcaísmo de “dunghill” y el lenguaje demasiado coloquial de “basura”, manteniendo la idea de degradación pública.
- source_word: יִתְעֲבֵד
  english_pob_choice: shall be made
  chosen_spanish: será hecha
  alternatives_spanish:
  - se hará
  - será convertida
  lexicon: HALOT
  rationale: La forma impersonal/pasiva expresa el destino impuesto a la casa por la sanción. “Será hecha” refleja bien esa construcción legal sin añadir un agente explícito.
- source_word: כָל אֱנָשׁ
  english_pob_choice: any man
  chosen_spanish: si alguno
  alternatives_spanish:
  - cualquier hombre
  - quienquiera
  lexicon: HALOT
  rationale: El original usa un singular genérico masculino. En español, “si alguno” expresa ese valor inclusivo y legal con mayor naturalidad que una repetición explícita de “hombre”.
theological_decisions:
- issue: Forma del castigo capital y su posible traducción
  english_pob_reading: Render the punishment as 'impaled on it' in the main text, with 'hanged on it' in a note
  chosen_spanish_reading: “será empalado en ella” en el texto principal, con “será colgado en ella” en nota
  alternative_spanish_readings:
  - será colgado en ella
  - será clavado en ella
  rationale: El arameo permite una imagen de suspensión sobre el madero; “empalado” conserva la violencia y el contexto antiguo sin trasladarlo a una forma moderna de ejecución. A la vez, la nota preserva la lectura tradicional “colgado”.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el acuerdo alto del control cruzado y la última pasada sin cambios: no se introdujeron revisiones sustantivas respecto del POB inglés, solo se ajustó la formulación al español natural manteniendo las tensiones léxicas documentadas (edicto/decreto, empalado/colgado, refuse heap/inmundicia).'
  spanish_consistency_notes:
  - Se mantiene Yahvé para el nombre divino cuando aparezca en el contexto general, conforme al criterio del proyecto.
  - “Edicto” conserva el registro administrativo del arameo פִּתְגָמָא sin sustituirlo por un término eclesiástico.
  - “Empalado” se usa por su valor descriptivo y se conserva la alternativa tradicional en nota.
  - “Montón de inmundicia” evita el arcaísmo de “dunghill” y mantiene la idea de deshonra pública.
  - La pasiva refleja/impersonal se usa donde el arameo presenta un decreto sancionador sin agente explícito.
