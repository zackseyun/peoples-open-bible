translation:
  language: es
  text: Vigila los asuntos de su hogar[a], y no come el pan de la ociosidad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los caminos de su casa». El hebreo literalmente habla de «los caminos/idas de su casa», es decir, la marcha o los asuntos de su hogar.'
    reason: lexical_alternative
  - marker: b
    text: «El pan de la ociosidad» es un modismo hebreo para vivir en la pereza o alimentarse de una comodidad improductiva.
    reason: cultural_note
lexical_decisions:
- source_word: צ֭וֹפִיָּה
  english_pob_choice: watches over
  chosen_spanish: vigila
  alternatives_spanish:
  - vigila atentamente
  - está atenta a
  - observa
  lexicon: HALOT
  rationale: El participio qal femenino singular expresa una vigilancia continua y activa. «Vigila» comunica bien en español la idea de cuidado atento y sostenido sin sonar forzado.
- source_word: הֲלִיכוֹת
  english_pob_choice: the ways
  chosen_spanish: los caminos
  alternatives_spanish:
  - los asuntos
  - las idas
  - las conductas
  lexicon: HALOT
  rationale: El hebreo literalmente habla de los ‘ir/andar’ de la casa. «Caminos» mantiene la metáfora espacial y concreta del original; «asuntos» sería más interpretativo.
- source_word: בֵּיתָהּ
  english_pob_choice: her household
  chosen_spanish: su casa
  alternatives_spanish:
  - su hogar
  - su familia
  lexicon: HALOT
  rationale: Aquí בַּיִת puede referirse al hogar/casa como unidad doméstica. «Su casa» conserva la imagen básica del texto hebreo y funciona naturalmente en español.
- source_word: לֶחֶם
  english_pob_choice: bread
  chosen_spanish: el pan
  alternatives_spanish:
  - la comida
  lexicon: HALOT
  rationale: Se conserva la imagen literal de «pan», que sostiene el modismo hebreo y su fuerza proverbial.
- source_word: עַצְלוּת
  english_pob_choice: idleness
  chosen_spanish: ociosidad
  alternatives_spanish:
  - pereza
  - laziedad
  - holgazanería
  lexicon: HALOT
  rationale: El sustantivo denota inactividad perezosa. «Ociosidad» mantiene el tono proverbial y la idea de una vida improductiva sin cargar demasiado el registro.
- source_word: לֹא תֹאכֵל
  english_pob_choice: does not eat
  chosen_spanish: no come
  alternatives_spanish:
  - no comerá
  - nunca come
  lexicon: HALOT
  rationale: El imperfecto expresa acción habitual en estilo proverbial. «No come» transmite esa conducta característica de manera natural en español.
translation_notes:
  revision_awareness: 'El texto inglés auditado mantiene una lectura proverbial y literal a la vez: conserva ‘bread’ e interpreta ‘ways of her household’ como supervisión doméstica continua. La versión española sigue esa misma línea sin suavizar el modismo ni desplazarlo a una paráfrasis más abstracta.'
  spanish_consistency_notes:
  - Se conserva el paralelismo del hebreo con dos cláusulas coordinadas.
  - «Casa» y «caminos» se mantienen para reflejar la imagen doméstica original.
  - «Ociosidad» reproduce el matiz moral de עַצְלוּת en un registro bíblico natural para el español.
  - No se introduce terminología eclesiástica ajena al texto.
