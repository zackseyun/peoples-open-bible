  rationale: 'Se corrigieron las notas para alinearlas con el expediente inglés y con las ambigüedades reales del hebreo: la alternativa léxica se trasladó a «líderes», y se añadió la nota de lectura alternativa para la cláusula final. También se suavizó «les gritó» a «llamó» para reflejar mejor וַיִּקְרָא, y se ajustó la puntuación para un español más natural y fiel al flujo narrativo.'
