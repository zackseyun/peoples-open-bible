review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: χάρις/ἔλεος como benevolencia divina, ἐκλεκτοῖς como «escogidos», y ἐπισκοπή en sentido positivo por el paralelismo con «gracia y misericordia». Sin embargo, «están sobre» suena menos natural en español y omite el verbo en la segunda cola; además, «santos» para ὁσίοις introduce con más fuerza matices eclesiales que el inglés auditado procuró evitar.'
  spanish_quality_summary: La redacción es comprensible, pero algo rígida. «Porque gracia y misericordia están sobre...» es poco idiomático; «reposan sobre» o «están sobre» puede funcionar, pero conviene repetir el verbo o construir la segunda mitad para que no quede demasiado elíptica. «Sus santos» suena más técnico/tradicional que «sus consagrados» o «sus piadosos»; dado el rationale auditado, conviene una opción menos cargada.
  glossary_alignment: 'No hay conflicto con la terminología troncal del proyecto. «Gracia», «misericordia» y «escogidos» están bien. La principal desviación es ὁσίοις: según la auditoría, debe evitarse una forma con sobretonos eclesiásticos posteriores; en español «santos» tiende más hacia ese registro, por lo que «consagrados» preserva mejor la cercanía semántica sin ese peso. «Visitación» se puede conservar con nota, tal como hizo el POB inglés.'
  issues:
  - severity: medium
    issue: «están sobre» resulta poco natural en español en este contexto
    rationale: Aunque «sobre» reproduce la relación de ἐν según la auditoría inglesa, la frase nominal con «están sobre» suena rígida. «Reposan sobre» expresa con más naturalidad que la gracia y la misericordia recaen favorablemente sobre ellos.
  - severity: medium
    issue: «sus santos» carga ὁσίοις con resonancias eclesiales que la auditoría quiso evitar
    rationale: El POB inglés eligió «holy ones» explícitamente para no forzar «saints». En español, «santos» suele activar más fuertemente ese campo semántico. «Consagrados» conserva la idea de pertenencia/santidad sin ese matiz posterior.
  - severity: low
    issue: La segunda cola carece de verbo explícito
    rationale: El griego permite la elipsis, pero en español una repetición verbal mejora la claridad y la dignidad del estilo sin añadir significado.
  revised_spanish_text: Porque la gracia y la misericordia reposan sobre sus escogidos[a], y la visitación sobre sus consagrados.
  revised_footnotes:
