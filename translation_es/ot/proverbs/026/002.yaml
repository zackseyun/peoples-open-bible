translation:
  language: es
  text: Como un gorrión en su vagar, como una golondrina[a] en su vuelo, así la maldición sin causa[b] no llega a posarse[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "como un vencejo" para el segundo término de ave.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: "una maldición sin causa"; es decir, una maldición infundada o inmerecida.'
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente: "no llega". La imagen sugiere que no aterriza ni surte efecto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּצִּפּוֹר
  english_pob_choice: Like a sparrow
  chosen_spanish: Como un pájaro
  alternatives_spanish:
  - Como un gorrión
  - Como un ave
  lexicon: HALOT
  rationale: צִפּוֹר puede referirse a un ave pequeña en general. En español, 'pájaro' conserva esa amplitud natural y mantiene la comparación proverbial sin forzar una especie más precisa que el hebreo no exige. 'Gorrión' sería más específico, pero añade una precisión no necesaria.
- source_word: לָנוּד
  english_pob_choice: in its wandering
  chosen_spanish: en su vagar
  alternatives_spanish:
  - en su deambular
  - cuando vaga
  - en su andar errante
  lexicon: HALOT
  rationale: נוּד expresa movimiento inquieto, errante o de vaivén. 'Vagar' comunica bien esa idea en español y preserva el sustantivo verbal paralelo al primer miembro de la comparación.
- source_word: כַּדְּרוֹר
  english_pob_choice: like a swallow
  chosen_spanish: como una golondrina
  alternatives_spanish:
  - como un vencejo
  lexicon: HALOT
  rationale: דְּרוֹר suele entenderse tradicionalmente como 'golondrina', aunque existe la alternativa zoológica 'vencejo'. Se mantiene 'golondrina' por ser la equivalencia más reconocible y acorde con la imagen proverbial; la alternativa queda implícitamente reconocida en la historia de traducción.
- source_word: לָעוּף
  english_pob_choice: in its flying
  chosen_spanish: en su vuelo
  alternatives_spanish:
  - al volar
  - en su volar
  lexicon: HALOT
  rationale: עוּף denota volar. 'En su vuelo' reproduce con naturalidad la construcción paralela del primer hemistiquio y mantiene la imagen en forma nominal, como en el inglés auditado.
- source_word: קִלְלַת
  english_pob_choice: curse
  chosen_spanish: la maldición
  alternatives_spanish:
  - una maldición
  lexicon: HALOT
  rationale: El sustantivo en construcción con חִנָּם requiere un referente definido en español para sonar natural. 'Maldición' conserva la fuerza lexical de curse sin suavizarla.
- source_word: חִנָּם
  english_pob_choice: undeserved
  chosen_spanish: sin causa
  alternatives_spanish:
  - inmerecida
  - sin motivo
  - gratuita
  lexicon: HALOT
  rationale: חִנָּם significa 'sin causa', 'gratuitamente' o 'sin motivo'. 'Sin causa' sigue de cerca el hebreo y preserva la tensión entre una maldición real y la ausencia de fundamento.
- source_word: לֹא תָבֹא
  english_pob_choice: does not come to rest
  chosen_spanish: no llega a posarse
  alternatives_spanish:
  - no llega
  - no se posa
  - no cae sobre su blanco
  lexicon: HALOT
  rationale: בוא literalmente significa 'venir/llegar', pero en esta imagen de aves el sentido es que la maldición no aterriza ni se fija en su objetivo. 'No llega a posarse' expresa esa imagen sin exagerar más allá del hebreo.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y que el acuerdo con la auditoría inglesa es alto; se ha mantenido la estructura poética y la tensión lexical principal entre 'maldición' y 'sin causa'.
  spanish_consistency_notes:
  - Se conservó el paralelismo de dos miembros con la misma preposición comparativa 'como'.
  - Se evitó 'SEÑOR' u otras sustituciones teológicas porque el versículo no contiene nombres divinos.
  - 'Se prefirió una solución idiomática pero cercana al hebreo para חִנָּם: ''sin causa''.'
  - Se mantuvo la imagen de movimiento y aterrizaje sugerida por לָנוּד / לָעוּף / לֹא תָבֹא, sin convertirla en una paráfrasis extensa.
