  text: כְּ/מַעֲשֵׂ֧ה אֶֽרֶץ מִצְרַ֛יִם אֲשֶׁ֥ר יְשַׁבְתֶּם בָּ֖/הּ לֹ֣א תַעֲשׂ֑וּ וּ/כְ/מַעֲשֵׂ֣ה אֶֽרֶץ כְּנַ֡עַן אֲשֶׁ֣ר אֲנִי֩ מֵבִ֨יא אֶתְ/כֶ֥ם שָׁ֨מָּ/ה֙ לֹ֣א תַעֲשׂ֔וּ וּ/בְ/חֻקֹּתֵי/הֶ֖ם לֹ֥א תֵלֵֽכוּ־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/leviticus/018/003.yaml
  text: You shall not do according to the deeds of the land of Egypt[a], in which you lived, and you shall not do according to the deeds of the land of Canaan, where I am bringing you[b]. And you shall not walk in their statutes.
  footnotes:
  - marker: a
    text: Or 'according to the practices of the land of Egypt ... and according to the practices of the land of Canaan.' The Hebrew idiom literally speaks of the 'deeds' or 'practices' of the land.
    reason: lexical_alternative
  - marker: b
    text: Or 'You shall not follow their customs/ordinances.'
    reason: lexical_alternative
