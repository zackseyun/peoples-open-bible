review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente el sentido básico del hebreo: la autoafirmación enfática («וַאֲנִי»), el pasado reflexivo («אָמַרְתִּי»), el estado de bienestar/seguridad («בְשַׁלְוִי») y la negación enfática de inestabilidad futura («בַּל אֶמּוֹט לְעוֹלָם»). Sin embargo, «seré ... sacudido» es menos natural y menos preciso en español para el modismo de מוט que «seré conmovido» o «seré movido».'
  spanish_quality_summary: El español es claro y digno, pero «No seré jamás sacudido» suena algo forzado y poco idiomático en registro bíblico natural. «Jamás seré conmovido» suena más fluido y preserva mejor la metáfora de estabilidad. También conviene ajustar la nota literal para corresponder exactamente a la nueva redacción.
  glossary_alignment: No hay conflictos con la terminología del proyecto. El verso no contiene nombres divinos ni términos doctrinales sensibles. La elección de «prosperidad» es aceptable con nota alternativa que preserve «sosiego/seguridad».
  issues:
