translation:
  language: es
  text: Y él mismo echó la suerte[a] a ellas, y su mano la repartió a ellos con cordel; la poseerán para siempre[b]; de generación en generación habitarán en ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con la línea de medir».
    reason: lexical_alternative
  - marker: b
    text: O «la heredarán».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוּא
  english_pob_choice: And he himself
  chosen_spanish: Y él mismo
  alternatives_spanish:
  - Y él
  - Él
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis; «él mismo» conserva mejor ese énfasis que un simple «él».
- source_word: הִפִּיל
  english_pob_choice: has cast
  chosen_spanish: echó
  alternatives_spanish:
  - tiró
  - arrojó
  lexicon: HALOT
  rationale: Con גּוֹרָל, el giro idiomático expresa echar/cast la suerte. «Echó» es natural en español y conserva la imagen del sorteo.
- source_word: לָהֶן
  english_pob_choice: for them
  chosen_spanish: para ellos
  alternatives_spanish:
  - a ellos
  - para estas
  lexicon: HALOT
  rationale: La referencia vuelve al grupo colectivo del contexto inmediato; en español, «para ellos» transmite bien la asignación por sorteo.
- source_word: גּוֹרָל
  english_pob_choice: the lot
  chosen_spanish: la suerte
  alternatives_spanish:
  - el lote
  - la porción
  lexicon: HALOT
  rationale: «Suerte» es el equivalente español más natural para el sorteo por asignación; mantiene el valor lexical de גּוֹרָל sin perder la imagen.
- source_word: וְיָדוֹ
  english_pob_choice: and his hand
  chosen_spanish: y su mano
  alternatives_spanish:
  - y con su mano
  - y la mano de él
  lexicon: HALOT
  rationale: Conserva la imagen antropomórfica de la agencia divina y la coordinación con el miembro siguiente de la frase.
- source_word: חִלְּקַתָּה
  english_pob_choice: has apportioned it
  chosen_spanish: la repartió
  alternatives_spanish:
  - la dividió
  - la distribuyó
  lexicon: HALOT
  rationale: En contexto de distribución territorial, «repartió» comunica mejor el sentido de asignación medida que «dividió».
- source_word: לָהֶם
  english_pob_choice: to them
  chosen_spanish: para ellos
  alternatives_spanish:
  - a ellos
  lexicon: HALOT
  rationale: Después de un verbo de asignación, «para ellos» refleja con naturalidad el dativo de destino o beneficio.
- source_word: בַּקָּו
  english_pob_choice: by line
  chosen_spanish: con la línea
  alternatives_spanish:
  - por la línea
  - con cordel
  lexicon: HALOT
  rationale: קו es la línea de medición usada al medir tierras; «con la línea» conserva la referencia instrumental y deja visible la metáfora de agrimensura.
- source_word: עַד עוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  lexicon: HALOT
  rationale: Es la forma idiomática y clara en español para una duración indefinida y continua.
- source_word: יִֽירָשׁ֔וּ/הָ
  english_pob_choice: they will possess it
  chosen_spanish: la poseerán
  alternatives_spanish:
  - la heredarán
  - tomarán posesión de ella
  lexicon: HALOT
  rationale: Aquí ירשׁ puede ser «heredar» o «poseer»; «poseerán» evita forzar una metáfora hereditaria en un contexto de reparto territorial, aunque la alternativa «heredarán» sigue siendo viable.
- source_word: לְדוֹר וָדוֹר
  english_pob_choice: from generation to generation
  chosen_spanish: de generación en generación
  alternatives_spanish:
  - por generación y generación
  - a través de todas las generaciones
  lexicon: HALOT
  rationale: Es la expresión distributiva estándar en español y reproduce bien la continuidad temporal del hebreo.
- source_word: יִשְׁכְּנוּ בָהּ
  english_pob_choice: they will dwell in it
  chosen_spanish: habitarán en ella
  alternatives_spanish:
  - morarán en ella
  - vivirán en ella
  lexicon: HALOT
  rationale: «Habitarán» preserva el tono solemne de שׁכן y sugiere residencia estable, no mera estancia.
theological_decisions:
- issue: Referente de los pronombres en la imagen de reparto
  english_pob_reading: The verse speaks of God assigning the devastated land to the wild creatures named in the immediate context.
  chosen_spanish_reading: El verso presenta a Dios asignando la tierra devastada a los animales salvajes nombrados en el contexto inmediato.
  alternative_spanish_readings:
  - Los pronombres podrían entenderse de manera más general, como habitantes desolados sin especificar criaturas.
  - Podría dejarse el referente implícito sin explicitarlo en español.
  rationale: El contexto literario cercano enumera animales del desierto y aves ocupando la región; por eso, la lectura colectiva de los pronombres es la más sólida. La traducción mantiene los pronombres sin introducir sustantivos ajenos al verso, aunque la nota puede orientar al lector.
  doctrine_reference: Contexto literario inmediato de Isaías 34:11, 13–15
translation_notes:
  revision_awareness: Pasaje revisado con alta concordancia en el control cruzado; no se registraron cambios sustantivos en la última pasada de revisión.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» como norma del proyecto solo cuando el texto lo requiere; aquí no aparece el Tetragrámaton.
  - Se mantuvo «la suerte» para גּוֹרָל y «la línea» para קָו, conservando la tensión entre sorteo y medición territorial.
  - «Poseerán» se eligió como lectura principal, pero se preservó «heredarán» como alternativa válida por la amplitud semántica de ירשׁ.
