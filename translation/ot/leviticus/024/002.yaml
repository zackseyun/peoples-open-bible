id: LEV.24.2
reference: Leviticus 24:2
source:
  edition: WLC
  text: צַ֞ו אֶת בְּנֵ֣י יִשְׂרָאֵ֗ל וְ/יִקְח֨וּ אֵלֶ֜י/ךָ שֶׁ֣מֶן זַ֥יִת זָ֛ךְ כָּתִ֖ית לַ/מָּא֑וֹר לְ/הַעֲלֹ֥ת נֵ֖ר תָּמִֽיד־׃
translation:
  text: Command the sons of Israel that they bring to you pure oil of beaten olives for the light[b][a], to keep a lamp burning continually.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites' / 'the people of Israel.' The Hebrew reads 'the sons of Israel,' a conventional covenantal designation.
    reason: lexical_alternative
  - marker: b
    text: Or 'olive oil, pure, beaten.' The Hebrew specifies oil from olives that is pure and produced by beating/crushing.
    reason: lexical_alternative
lexical_decisions:
- source_word: צַו
  chosen: Command
  alternatives:
  - Order
  - Instruct
  lexicon: HALOT
  rationale: Imperative of צוה, a direct command formula. 'Command' is the most straightforward and preserves the authoritative force without sounding overly harsh.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' In keeping with the gender-accurate philosophy, the main text preserves the formal expression. 'Israelites' is idiomatic but less transparent to the Hebrew wording.
- source_word: וְיִקְחוּ אֵלֶיךָ
  chosen: that they bring to you
  alternatives:
  - and let them take to you
  - and they shall bring to you
  lexicon: HALOT
  rationale: Though לקח commonly means 'take,' in this construction with 'to you' the sense is effectively 'bring to you/provide for you.' This is a standard optimal-equivalence rendering that reflects the action intended in context.
- source_word: שֶׁמֶן זַיִת
  chosen: oil of beaten olives
  alternatives:
  - olive oil
  lexicon: HALOT
  rationale: The phrase denotes oil from olives. Because כָּתִית follows and specifies the production method, rendering the whole phrase as 'oil of beaten olives' keeps both the source material and the process visible. 'Olive oil' is idiomatic but can obscure the following adjective.
- source_word: זָךְ
  chosen: pure
  alternatives:
  - clear
  - clean
  lexicon: HALOT
  rationale: זך in cultic/material contexts denotes purity or cleanness of the oil. 'Pure' is the most natural English equivalent here.
- source_word: כָּתִית
  chosen: beaten
  alternatives:
  - crushed
  - pressed
  lexicon: HALOT
  rationale: This adjective refers to oil produced by beating/crushing rather than ordinary pressing. 'Beaten' is traditional and closely reflects the Hebrew form; 'crushed' is possible but less established in this cultic phrase.
- source_word: לַמָּאוֹר
  chosen: for the light
  alternatives:
  - for lighting
  - for the lampstand
  lexicon: HALOT
  rationale: The noun מָאוֹר refers to light/illumination. 'For the light' is formally close and fits the tabernacle-lighting context. 'For lighting' is smoother but slightly more interpretive.
- source_word: לְהַעֲלֹת נֵר
  chosen: to keep a lamp burning
  alternatives:
  - to cause a lamp to go up
  - to set up a lamp
  lexicon: HALOT
  rationale: The idiom 'cause a lamp to ascend' means to light or maintain a lamp. 'Keep a lamp burning' best captures the ongoing function in natural English, especially with תָּמִיד following.
- source_word: נֵר
  chosen: a lamp
  alternatives:
  - the lamp
  - lamplight
  lexicon: HALOT
  rationale: נֵר is a lamp, not specifically a candle. The singular is retained as in Hebrew; in context it can function collectively or represent the lamp-lighting duty.
- source_word: תָּמִיד
  chosen: continually
  alternatives:
  - regularly
  - continually before me
  lexicon: HALOT
  rationale: In priestly texts תָּמִיד often denotes regular continuality in cultic practice. 'Continually' is the standard and least interpretive rendering here.
