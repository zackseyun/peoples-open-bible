translation:
  language: es
  text: no sea que despedace mi alma[a] como un león, y la haga pedazos, sin que haya quien la rescate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'mi vida' para נַפְשִׁי; aquí el sentido es la vida o el yo mismo del salmista, amenazado de destrucción.
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: para que no
  alternatives_spanish:
  - no sea que
  - para que no suceda que
  lexicon: HALOT
  rationale: Introduce la consecuencia temida de forma natural en español y conserva el valor preveniente/negativo de פֶּן sin volverla una simple afirmación.
- source_word: יִטְרֹף
  english_pob_choice: tear
  chosen_spanish: despedace
  alternatives_spanish:
  - desgarre
  - destroce
  - haga pedazos
  lexicon: HALOT
  rationale: טרף evoca la acción de un depredador que destroza a la presa; 'despedace' comunica esa violencia con claridad en español y deja espacio para la intensificación siguiente.
- source_word: כְּאַרְיֵה
  english_pob_choice: like a lion
  chosen_spanish: como un león
  alternatives_spanish:
  - como león
  - cual león
  lexicon: HALOT
  rationale: La comparación con el león se mantiene de manera directa y natural en español, preservando la imagen depredadora.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi vida
  alternatives_spanish:
  - mi alma
  - mi ser
  - mi propia persona
  lexicon: HALOT
  rationale: Aunque el texto inglés revisó a 'my soul' por cercanía formal, נֶפֶשׁ aquí señala la vida, el yo o la persona en peligro. 'Mi vida' evita restringirlo indebidamente a un sentido inmortalista de 'alma' y sigue la fuerza contextual del peligro mortal.
- source_word: פֹּרֵק
  english_pob_choice: rending it apart
  chosen_spanish: despedazándola
  alternatives_spanish:
  - rasgándola
  - haciéndola pedazos
  - destrozándola
  lexicon: HALOT
  rationale: El participio intensifica la imagen de violencia. 'Despedazándola' reproduce esa acción continuada y cruel en un español idiomático; el pronombre femenino concuerda con 'vida'.
- source_word: וְאֵין מַצִּיל
  english_pob_choice: with no one to rescue
  chosen_spanish: y no haya quien la rescate
  alternatives_spanish:
  - sin que nadie la rescate
  - y no hay quien la rescate
  - sin rescatador
  lexicon: HALOT
  rationale: מַצִּיל procede de נצל en sentido de rescatar/liberar. 'Rescate' conserva la imagen de auxilio en peligro inmediato y hace fluida la clausula negativa en español.
theological_decisions:
- issue: Sentido de נֶפֶשׁ en un contexto de amenaza mortal
  english_pob_reading: my soul, with a footnote noting the sense of life/self under threat
  chosen_spanish_reading: mi vida, con una nota que reconoce la posible traducción 'mi alma'
  alternative_spanish_readings:
  - mi alma
  - mi ser
  - mi persona
  rationale: El hebreo נֶפֶשׁ no obliga aquí a una antropología dualista; el contexto es el de una presa a punto de ser destruida. Por fidelidad semántica y claridad pastoral, el cuerpo principal dice 'mi vida', mientras la nota conserva la alternativa formal 'mi alma'.
  doctrine_reference: Antropología bíblica; uso contextual de נֶפֶשׁ en Salmos
- issue: Imagen predatoria y culpa implícita del perseguidor
  english_pob_reading: a lion tearing and rending, with no rescuer
  chosen_spanish_reading: un león que despedaza y deja sin rescate
  alternative_spanish_readings:
  - un león que devora
  - un león que hiere
  rationale: La fuerza del verso está en la violencia del depredador y la ausencia total de auxilio. Mantener esa imagen evita suavizar la gravedad del peligro y preserva el tono de súplica implícita del salmo.
  doctrine_reference: Lectura literaria de los Salmos; metáfora de amenaza y opresión
translation_notes:
  revision_awareness: El borrador sigue el último ajuste inglés que prefirió 'my soul' por cercanía formal a נַפְשִׁי, pero en español se optó por 'mi vida' por claridad semántica y porque el contexto inmediato describe peligro mortal. También se conservó la intensificación verbal mediante un participio ('despedazándola') que corresponde al valor de פֹּרֵק.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para el Tetragrámaton en todo el proyecto, aunque este versículo no lo contiene.
  - Se usó 'rescate' en sentido verbal, coherente con la preferencia del proyecto por 'rescatar' para נצל en contextos de peligro.
  - No se introdujo 'alma' en el cuerpo principal para evitar una lectura técnica ajena al contexto; la alternativa queda documentada en nota.
