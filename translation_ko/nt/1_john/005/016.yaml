id: 1JN.5.16
reference: 1 John 5:16
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἐάν τις ἴδῃ τὸν ἀδελφὸν αὐτοῦ ἁμαρτάνοντα ἁμαρτίαν μὴ πρὸς θάνατον, αἰτήσει, καὶ δώσει αὐτῷ ζωήν, τοῖς ἁμαρτάνουσιν μὴ πρὸς θάνατον. ἔστιν ἁμαρτία πρὸς θάνατον· οὐ περὶ ἐκείνης λέγω ἵνα ἐρωτήσῃ.
base_translation:
  language: en
  yaml_path: translation/nt/1_john/005/016.yaml
  text: If anyone sees his brother committing a sin not leading to death[a], he shall ask, and God will give him life—to those committing sins not leading to death. There is sin leading to death[c][b]; I am not saying that he should ask about that.
  footnotes:
  - marker: a
    text: Or, 'There is a sin unto death.' The Greek does not specify whether 'death' here is physical death, spiritual death, or final condemnation.
    reason: alternative_reading
  - marker: b
    text: '''Brother'' is singular masculine in Greek and likely refers to a fellow believer; the term may include a fellow Christian more broadly in context.'
    reason: cultural_note
  - marker: c
    text: The Greek simply says 'and he will give him life'; the translation makes 'God' explicit because the giver is understood from the context of prayer.
    reason: lexical_alternative
translation:
  language: ko
  text: 만일 누가 자기 형제가 죽음에 이르지 않는 죄를 짓고 있는 것을 보면, 그는 구하십시오. 그러면 하나님께서 그에게 — 곧 죽음에 이르지 않는 죄를 짓는 자들에게 — 생명을 주실 것입니다. 죽음에 이르는 죄가 있습니다. 그것에 관하여 구하라고 말하는 것이 아닙니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἁμαρτία πρὸς θάνατον
  english_pob_choice: sin leading to death
  chosen_korean: 죽음에 이르는 죄
  alternatives_korean:
  - 사망에 이르는 죄
  lexicon: BDAG
  rationale: πρὸς + 대격으로 「향하여·이르는」 — 결과·종착의 함의. 「죽음에 이르는 죄」가 한국어에서 그 종착의 무게를 담는다.
