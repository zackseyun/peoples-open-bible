translation:
  language: es
  text: También había prostitutos de culto[a] en la tierra. Hicieron conforme a todas las abominaciones de las naciones que Yahvé había expulsado de delante de los hijos de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "prostituto de culto" o "prostituto de templo". El hebreo קָדֵשׁ se refiere a una persona asociada con práctica sexual cultual ilícita.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  english_pob_choice: There were also
  chosen_spanish: También había
  alternatives_spanish:
  - Y también había
  - Había además
  lexicon: HALOT
  rationale: La combinación aditiva con la cláusula existencial se vierte de forma natural en español con 'También había', conservando el añadido de un nuevo delito sin cargar la frase con un calco excesivo.
- source_word: קָדֵשׁ
  english_pob_choice: cult prostitutes
  chosen_spanish: '[a]'
  alternatives_spanish:
  - prostitutos de culto
  - prostituto de culto
  - prostitutas de culto
  - personas vinculadas al culto ilícito
  lexicon: HALOT
  rationale: 'El hebreo usa un sustantivo singular con valor colectivo/existencial. En español, la forma más fiel y legible es una nota lexical que preserve la tensión: puede referirse a un varón prostituto de culto o, de manera más amplia, a una persona asociada con práctica sexual cultual ilícita. Se evita ''sodomita'' por ser engañoso e importar una tradición interpretativa ajena al término.'
- source_word: הָיָה בָאָרֶץ
  english_pob_choice: were in the land
  chosen_spanish: había en la tierra
  alternatives_spanish:
  - estaba en la tierra
  - existía en la tierra
  lexicon: HALOT
  rationale: Se mantiene el valor existencial de היה con complemento locativo. En español, el singular impersonal 'había' expresa mejor la presencia de esa práctica/personas en el país o la tierra.
- source_word: עָשׂוּ
  english_pob_choice: They did
  chosen_spanish: Hicieron
  alternatives_spanish:
  - Practicaron
  - Obraron
  lexicon: HALOT
  rationale: Se conserva el verbo amplio del hebreo sin explicitar de más; el contexto siguiente define el contenido de lo hecho. 'Hicieron' permite que la comparación lleve la carga semántica principal.
- source_word: כְּכֹל
  english_pob_choice: according to all
  chosen_spanish: conforme a todas
  alternatives_spanish:
  - según todas
  - de acuerdo con todas
  lexicon: HALOT
  rationale: '''Conforme a'' expresa bien la conformidad plena con el conjunto total de prácticas indicadas por el texto, sin sonar tan mecánico como un calco literal.'
- source_word: הַתּוֹעֲבֹת
  english_pob_choice: the abominations
  chosen_spanish: las abominaciones
  alternatives_spanish:
  - las prácticas abominables
  - las cosas detestables
  lexicon: HALOT
  rationale: Se conserva el término bíblico fuerte y ya asentado para actos moral-religiosos gravemente rechazados en este contexto.
- source_word: הַגּוֹיִם
  english_pob_choice: the nations
  chosen_spanish: de las naciones
  alternatives_spanish:
  - de los pueblos
  - de los gentiles
  lexicon: HALOT
  rationale: En este contexto histórico-histórico, 'naciones' mantiene la referencia a los pueblos no israelitas de Canaán sin introducir connotaciones posteriores del Nuevo Testamento.
- source_word: הוֹרִישׁ
  english_pob_choice: had driven out
  chosen_spanish: había expulsado
  alternatives_spanish:
  - había echado
  - había desalojado
  - había desposeído
  lexicon: HALOT
  rationale: El Hifil de ירשׁ aquí señala hacer perder el territorio y remover de la presencia divina. 'Había expulsado' es idiomático en español y conserva el matiz de remoción forzada; 'desposeído' sería más técnico pero menos natural.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: 'Contested terms table: יְהוָה YHWH'
  rationale: Se sigue el estándar del proyecto para el nombre divino, evitando el reemplazo por 'SEÑOR' y manteniendo transparencia respecto del hebreo.
- source_word: מִפְּנֵי
  english_pob_choice: before
  chosen_spanish: de delante de
  alternatives_spanish:
  - de la presencia de
  - frente a
  lexicon: HALOT
  rationale: La expresión hebrea idiomática de remoción desde delante/presencia se vierte con una construcción española natural y reverente, preservando la escena de expulsión.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva el giro familiar y masculino del hebreo, coherente con la línea del proyecto de mantener la forma fuente cuando no perjudica la inteligibilidad.
theological_decisions:
- issue: Sentido de קָדֵשׁ en contexto de culto ilícito y sexualidad ritual
  english_pob_reading: cult prostitutes
  chosen_spanish_reading: prostitutos/prostitutas de culto; persona asociada con práctica sexual cultual ilícita
  alternative_spanish_readings:
  - prostituto de culto
  - prostituta de culto
  - sodomita
  rationale: El hebreo señala una categoría ligada a prácticas sexuales cultuales prohibidas. El español necesita una nota para no fijar de manera indebida un solo género o una identificación moralizante posterior. Se evita 'sodomita' porque no traduce bien el término y carga asociaciones históricas no exigidas por el texto.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Expresión 'los hijos de Israel'
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: Se preserva la formulación masculina del hebreo, siguiendo la política del proyecto de no neutralizar automáticamente formas representativas del original.
  doctrine_reference: Translation philosophy §4
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: Se mantiene la transliteración base del proyecto para el nombre del pacto, en lugar de enmascararlo con un título genérico.
  doctrine_reference: 'Contested terms table: יְהוָה YHWH'
translation_notes:
  revision_awareness: El texto inglés auditado usa una lectura colectiva/existencial de קָדֵשׁ, opta por 'cult prostitutes' para evitar 'sodomite' y mantiene 'the sons of Israel' de forma gender-accurate. La versión española sigue esa misma línea, pero adapta la sintaxis al español con 'También había' e incorpora una nota para conservar la ambigüedad lexical del hebreo en castellano.
  spanish_consistency_notes:
  - Se usa 'Yahvé' conforme al estándar del proyecto para יהוה.
  - Se conserva 'los hijos de Israel' para reflejar el hebreo masculino plural.
  - '''Las abominaciones'' reproduce el campo semántico moral-religioso de תועבות sin suavizarlo.'
  - La nota sobre קָדֵשׁ evita una solución cerrada y mantiene abierta la alternativa lexical documentada por el audit trail inglés.
