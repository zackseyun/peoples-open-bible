    rationale: El inglés conserva una alternativa del verbo de movimiento de la cabeza («wag their heads»). La nota española propone «menean sus cabezas», que desplaza el foco a una variante sintáctica menos relevante y suena menos natural que una alternativa verbal como «sacuden la cabeza».
  revised_spanish_text: Y yo he llegado a ser un oprobio a ellos; cuando me ven[a], menean la cabeza.
