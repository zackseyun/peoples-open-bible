translation:
  language: es
  text: 'Tú devuelves al hombre al polvo[a], y dices: «Vuelvan[b], hijos de Adán».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a una condición aplastada» o «a lo triturado»; el término hebreo denota lo que está aplastado o reducido a polvo. «Al polvo» expresa mejor el sentido en este contexto.
    reason: lexical_alternative
  - marker: b
    text: O «Regresen» o «Vuélvanse». El hebreo dice literalmente «hijos de Adán/hombre».
    reason: alternative_reading
lexical_decisions:
- source_word: תָּשֵׁב
  english_pob_choice: you return
  chosen_spanish: Tú vuelves
  alternatives_spanish:
  - Tú haces volver
  - Tú restituyes
  lexicon: HALOT
  rationale: El hebreo es hiphil de שוב con sentido causativo. En español, «vuelves» conserva la acción divina de hacer regresar y mantiene la concisión poética sin imponer una explicación más larga.
- source_word: אֱנוֹשׁ
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el mortal
  - la humanidad
  lexicon: HALOT
  rationale: אֱנוֹשׁ enfatiza la fragilidad humana. «El hombre» conserva el valor colectivo y antropológico del paralelo sin sobretraducir a una paráfrasis abstracta.
- source_word: עַד
  english_pob_choice: to
  chosen_spanish: hasta
  alternatives_spanish:
  - a
  - al
  lexicon: HALOT
  rationale: Aquí עַד marca el límite o estado resultante. «Hasta» expresa bien la transición final hacia la condición de polvo.
- source_word: דַּכָּא
  english_pob_choice: dust
  chosen_spanish: el polvo
  alternatives_spanish:
  - la condición aplastada
  - lo triturado
  - el quebranto
  lexicon: HALOT
  rationale: Aunque el término hebreo denota lo aplastado o reducido a polvo, en contexto poético la imagen de retorno a la tierra se comunica naturalmente con «el polvo». Conserva el eco de Génesis 3:19 sin perder claridad en español.
- source_word: וַתֹּאמֶר
  english_pob_choice: and say
  chosen_spanish: y dices
  alternatives_spanish:
  - y dices así
  - y declaras
  lexicon: HALOT
  rationale: La forma waw-consecutiva enlaza la acción con la cláusula siguiente. En español, el presente «dices» funciona con naturalidad en el discurso poético dirigido a Dios.
- source_word: שׁוּבוּ
  english_pob_choice: Return
  chosen_spanish: Vuelvan
  alternatives_spanish:
  - Regresen
  - Vuélvanse
  lexicon: HALOT
  rationale: Imperativo plural de שוב. «Vuelvan» mantiene la fuerza de mandato y el paralelismo verbal con «vuelves».
- source_word: בְנֵי אָדָם
  english_pob_choice: sons of man
  chosen_spanish: hijos del hombre
  alternatives_spanish:
  - hijos de Adán
  - humanidad
  lexicon: HALOT
  rationale: La expresión hebrea dice literalmente «hijos de אדם». Dado que la revisión inglesa reciente optó por una forma más natural que preserve el valor genérico, «hijos del hombre» mantiene la literalidad poética, el paralelismo con אֱנוֹשׁ/אָדָם y la comprensibilidad en español.
theological_decisions:
- issue: Cómo rendir la imagen de retorno a polvo / condición de polvo
  english_pob_reading: dust as a natural English equivalent for what is crushed or reduced to powder
  chosen_spanish_reading: el polvo
  alternative_spanish_readings:
  - lo aplastado
  - la condición aplastada
  - el quebranto
  rationale: La nota inglesa preserva la tensión entre el sentido léxico de דַּכָּא (lo aplastado/reducido a polvo) y la imagen contextual de mortalidad. En español, «el polvo» comunica esa imagen bíblica de manera clara y poética, sin ocultar la base semántica del término hebreo.
  doctrine_reference: 'DOCTRINE.md: mantener la tensión léxica cuando el contexto poético la resuelve por imagen'
- issue: Decisión sobre בְנֵי אָדָם
  english_pob_reading: sons of man
  chosen_spanish_reading: hijos del hombre
  alternative_spanish_readings:
  - hijos de Adán
  - humanos
  - humanidad
  rationale: La expresión hebrea conserva una forma masculina plural con אָדָם. «Hijos del hombre» reproduce el paralelo formal y la personificación poética, y evita aplanar la referencia antropológica a un abstracto impersonal.
  doctrine_reference: 'DOCTRINE.md: género-accurate over gender-neutral when representative force is present'
translation_notes:
  revision_awareness: La revisión inglesa más reciente prefirió «sons of man» por ser más natural que «sons of Adam» y mantener el paralelismo con אֱנוֹשׁ/אָדָם. La presente redacción española sigue esa decisión revisada con «hijos del hombre», conservando la naturalidad y el tono poético, y evita introducir «Adán» donde la revisión audita una preferencia por una forma más idiomática.
  spanish_consistency_notes:
  - Se mantiene «tú» para Dios en concordancia con el estilo poético directo del verso.
  - Se preserva el paralelismo verbal entre «vuelves» y «Vuelvan».
  - «Polvo» se usa como equivalente contextual de דַּכָּא, no como sustitución mecánica del sentido lexical básico.
  - La frase «hijos del hombre» se eligió por claridad y naturalidad en español, sin borrar el trasfondo antropológico de אָדָם.
