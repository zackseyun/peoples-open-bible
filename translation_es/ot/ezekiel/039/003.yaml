translation:
  language: es
  text: Y heriré tu arco de tu mano izquierda, y haré caer[a] tus flechas de tu mano derecha.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «haré que tus flechas caigan de tu mano derecha».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִכֵּיתִי
  english_pob_choice: And I will strike
  chosen_spanish: Y heriré
  alternatives_spanish:
  - Y golpearé
  - Y derribaré
  lexicon: HALOT
  rationale: El verbo נכה en este contexto expresa golpear un arma para inutilizarla o hacerla caer. «Heriré» conserva ese valor de golpe y funciona de manera natural en español bíblico sin sonar arcaico en exceso.
- source_word: קַשְׁתְּךָ
  english_pob_choice: your bow
  chosen_spanish: tu arco
  alternatives_spanish:
  - tu ballesta
  lexicon: HALOT
  rationale: קֶשֶׁת es el arma «arco»; la forma con sufijo de 2ms se expresa naturalmente con «tu». No se justifica «ballesta».
- source_word: מִיַּד שְׂמֹאולֶךָ
  english_pob_choice: from your left hand
  chosen_spanish: de tu mano izquierda
  alternatives_spanish:
  - de la mano izquierda
  - fuera de tu mano izquierda
  lexicon: HALOT
  rationale: La construcción hebrea literalmente dice «de la mano de tu izquierda». En español, «de tu mano izquierda» preserva la imagen corporal y el paralelismo con la siguiente línea.
- source_word: וְחִצֶּיךָ
  english_pob_choice: and your arrows
  chosen_spanish: y tus flechas
  alternatives_spanish:
  - y tus saetas
  lexicon: HALOT
  rationale: חִצִּים son «flechas». «Saetas» es posible, pero «flechas» es más claro y corriente en español moderno.
- source_word: מִיַּד יְמִינְךָ
  english_pob_choice: from your right hand
  chosen_spanish: de tu mano derecha
  alternatives_spanish:
  - fuera de tu mano derecha
  - de la mano derecha
  lexicon: HALOT
  rationale: Se mantiene la simetría con la primera cláusula y el lenguaje concreto del hebreo, sin forzar una paráfrasis.
- source_word: אַפִּיל
  english_pob_choice: I will make ... fall
  chosen_spanish: haré caer
  alternatives_spanish:
  - haré que caigan
  - causaré que caigan
  - derribaré
  lexicon: HALOT
  rationale: El Hiphil de נפל tiene valor causativo. «Haré caer» reproduce bien la causalidad y el movimiento de las flechas que se sueltan o caen de la mano.
theological_decisions:
- issue: Imagen de desarme divino
  english_pob_reading: God disables the enemy by striking weapon and arrows from the hands.
  chosen_spanish_reading: Dios desarma al enemigo al golpear el arco y hacer caer las flechas de sus manos.
  alternative_spanish_readings:
  - Dios destruye el arma
  - Dios hace inservibles el arco y las flechas
  - Dios simplemente derriba las armas
  rationale: El texto describe una acción de desarme, no necesariamente la destrucción física del arma. La traducción conserva la tensión entre golpe y caída, y evita añadir un resultado no explicitado.
  doctrine_reference: Acción soberana de Yahvé en juicio; imagen de desarme en el contexto del oráculo contra Gog.
translation_notes:
  revision_awareness: 'Coincide con la lectura inglesa auditada: strike = herir/golpear; Hiphil de נפל = haré caer / haré que caigan. No se introdujeron cambios textuales ni reinterpretaciones doctrinales.'
  spanish_consistency_notes:
  - Se mantiene Yahvé en el marco del proyecto, pero en este versículo el hebreo no contiene el tetragrámaton explícito; por ello no se inserta aquí.
  - «Arco» y «flechas» preservan el campo bélico concreto del hebreo.
  - La nota al pie conserva la alternativa formal documentada en el POB inglés.
