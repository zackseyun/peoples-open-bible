revisions:
- from: Y era muy hermosa en apariencia y encantadora de ver[a]; y Manasés, su marido, le había dejado oro y plata, y siervos varones y siervas, y ganado y campos[b]; y ella permanecía sobre ellos.
  to: Y era muy hermosa en apariencia y hermosa de ver; y Manasés, su marido, le había dejado oro y plata, y siervos y siervas[a], y ganado y campos; y ella seguía al frente de ellos[b].
  rationale: La revisión conserva el sentido del original y del expediente inglés, pero mejora la naturalidad del español. Se simplifica «siervos varones y siervas» a «siervos y siervas», se reemplaza el calco poco idiomático «permanecía sobre ellos» por «seguía al frente de ellos» con nota que preserva la ambigüedad griega, y se reubica la nota léxica útil al sintagma de dependientes domésticos. También se normaliza la primera descripción estética con una formulación más transparente en español.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:48:42Z'
