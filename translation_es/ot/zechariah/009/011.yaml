translation:
  language: es
  text: También a ti, por la sangre de tu pacto[a], he sacado a tus prisioneros del pozo[b] en que no hay agua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mediante la sangre de tu pacto». El hebreo puede entenderse de modo causal o instrumental.
    reason: lexical_alternative
  - marker: b
    text: '«Pozo» también puede entenderse como «cisterna», «foso» o «mazmorra»: un lugar de retención sin agua.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם / also
  english_pob_choice: also
  chosen_spanish: También
  alternatives_spanish:
  - Incluso
  - Además
  lexicon: HALOT
  rationale: El adverbio añade y enlaza la promesa con el contexto anterior. «También» conserva ese valor aditivo sin forzar un énfasis excesivo.
- source_word: בְּדַם
  english_pob_choice: because of the blood
  chosen_spanish: por la sangre
  alternatives_spanish:
  - a causa de la sangre
  - mediante la sangre
  lexicon: HALOT
  rationale: La preposición hebrea admite lectura instrumental o causal. En español, «por la sangre» mantiene esa ambigüedad útil y suena natural; la nota preserva la alternativa «mediante la sangre».
- source_word: בְּרִיתֵךְ
  english_pob_choice: your covenant
  chosen_spanish: tu pacto
  alternatives_spanish:
  - tu alianza
  - tu convenio
  lexicon: HALOT
  rationale: «Pacto» es el equivalente bíblico usual en español para בְּרִית y conserva el peso teológico y jurídico del término. «Alianza» es posible, pero aquí puede sonar menos técnico en registro bíblico.
- source_word: שִׁלַּחְתִּי
  english_pob_choice: I have sent out
  chosen_spanish: he sacado
  alternatives_spanish:
  - he enviado fuera
  - he liberado
  - he dejado salir
  lexicon: HALOT
  rationale: Aunque el verbo base admite «enviar», el contexto de salir del pozo con prisión favorece el sentido de liberación. «He sacado» comunica con naturalidad la acción resultante sin perder la idea de extracción del lugar de cautiverio.
- source_word: אֲסִירַיִךְ
  english_pob_choice: your prisoners
  chosen_spanish: tus prisioneros
  alternatives_spanish:
  - tus cautivos
  - los que están presos
  lexicon: HALOT
  rationale: «Prisioneros» conserva la referencia directa a personas retenidas; «cautivos» es posible, pero aquí el contexto del pozo encaja mejor con la imagen de prisioneros.
- source_word: מִבּוֹר
  english_pob_choice: from the pit
  chosen_spanish: del pozo
  alternatives_spanish:
  - de la cisterna
  - del foso
  - de la mazmorra
  lexicon: HALOT
  rationale: «Pozo» mantiene la imagen amplia del hebreo בּוֹר y resulta claro en español. Otras opciones son viables, pero «pozo» preserva bien el contraste con la ausencia de agua.
- source_word: אֵין מַיִם בּוֹ
  english_pob_choice: in which there is no water
  chosen_spanish: en que no hay agua
  alternatives_spanish:
  - donde no hay agua
  - que no tiene agua
  lexicon: HALOT
  rationale: La construcción existencial se vuelve natural en español con «en que no hay agua». Evita sobreexplicar y conserva la descripción esencial del lugar.
theological_decisions:
- issue: Valor de la frase «por la sangre de tu pacto»
  english_pob_reading: Retained as covenantal language without specifying a particular covenant in the main text.
  chosen_spanish_reading: Se conserva el lenguaje de pacto sin identificar en el texto principal un momento histórico o tipológico concreto.
  alternative_spanish_readings:
  - por la sangre de tu alianza
  - a causa de la sangre de tu pacto, con referencia explícita al Sinaí
  - por la sangre de tu pacto, anticipando el nuevo pacto
  rationale: El hebreo afirma una base de liberación ligada a sangre y pacto, pero no nombra de manera explícita cuál pacto. La traducción mantiene la tensión teológica y evita imponer una identificación doctrinal más estrecha que la del texto.
  doctrine_reference: Preservar la tensión teológica sin resolverla de antemano.
translation_notes:
  revision_awareness: El texto español sigue el estado revisado más reciente del POB inglés, que permaneció sin cambios tras la última pasada. Se mantuvo la lectura auditada de 'because of/by the blood of your covenant' como ambigua en español mediante la nota a, y se conservó la imagen amplia de בּוֹר con 'pozo', respaldada por la nota b.
  spanish_consistency_notes:
  - Se usó «pacto» de forma consistente con la terminología bíblica del proyecto.
  - Se preservó la ambigüedad causal/instrumental del hebreo בְּדַם en la nota, mientras el texto principal queda fluido en español.
  - Se evitó traducir mecánicamente «I have sent out»; el contexto de liberación justifica «he sacado» en español.
  - Se mantuvo «prisioneros» para reflejar la retención física y la imagen del pozo sin agua.
