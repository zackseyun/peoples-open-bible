translation:
  language: es
  text: Y el que mate a un animal hará restitución por él, pero el que mate a un hombre[a] será condenado a muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el que mate a un ser humano será condenado a muerte». אָדָם puede referirse a un ser humano en general, aunque aquí se conserva «hombre» para reflejar la formulación masculina singular del caso legal.'
    reason: alternative_reading
lexical_decisions:
- source_word: מַכֵּה
  english_pob_choice: whoever strikes down
  chosen_spanish: el que hiera
  alternatives_spanish:
  - quien golpee
  - el que golpee
  - el que hiera de muerte
  lexicon: HALOT
  rationale: El participio hebreo en esta ley expresa al responsable del acto con fuerza causal. En español, "el que hiera" conserva el valor jurídico de caso legal y, por el contexto de las consecuencias, comunica una acción grave sin añadir una paráfrasis excesiva. "Golpear" sería más literal pero menos natural en este pasaje; "hiera de muerte" explicita más de lo que el hebreo dice directamente.
- source_word: בְהֵמָה
  english_pob_choice: animal
  chosen_spanish: animal
  alternatives_spanish:
  - bestia
  - ganado
  lexicon: HALOT
  rationale: '"Animal" reproduce bien el alcance general del término en este contexto legal. "Ganado" estrecha demasiado el sentido, y "bestia" suena arcaico o degradante en español contemporáneo.'
- source_word: יְשַׁלְּמֶנָּה
  english_pob_choice: shall make restitution for it
  chosen_spanish: hará restitución por él
  alternatives_spanish:
  - lo pagará
  - lo repondrá
  - hará compensación por él
  lexicon: HALOT
  rationale: El verbo en piel comunica compensación legal. "Hará restitución" preserva ese matiz jurídico. El pronombre español "él" sigue el antecedente inmediato "animal"; aunque el hebreo tenga sufijo femenino por בְהֵמָה, en español el antecedente es masculino gramatical por "animal". "Compensación" sería válido, pero "restitución" mantiene mejor la formulación legal del original.
- source_word: אָדָם
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - un ser humano
  - una persona
  lexicon: HALOT
  rationale: La forma hebrea es masculina singular y funciona aquí en contraste legal con "animal". "Un hombre" sigue de cerca esa formulación y preserva la fuerza formal del texto. "Un ser humano" aclara el sentido general, pero diluye la formulación masculina del hebreo; "una persona" introduce un giro más moderno que no está exigido por el contexto.
- source_word: יוּמָת
  english_pob_choice: shall be put to death
  chosen_spanish: será muerto
  alternatives_spanish:
  - será puesto a muerte
  - será ejecutado
  - morirá
  lexicon: HALOT
  rationale: El pasivo causativo hebreo apunta a muerte judicial. "Será muerto" es la forma más directa y fiel al hebreo y al registro legal bíblico. "Será ejecutado" interpreta con más especificidad jurídica moderna; "morirá" debilita el pasivo judicial.
theological_decisions:
- issue: Renderización de אָדָם en contraste con בְהֵמָה
  english_pob_reading: a man
  chosen_spanish_reading: un hombre
  alternative_spanish_readings:
  - un ser humano
  - una persona
  rationale: Se mantiene el valor masculino singular del hebreo en una formulación casuística. En este contraste legal, "hombre" comunica tanto la referencia individual como la correspondencia formal con el texto fuente, sin borrar la tensión documentada entre el sentido genérico posible y la forma gramatical masculina.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; Contested terms table for אָדָם'
- issue: Tipo de muerte expresado por יוּמָת
  english_pob_reading: shall be put to death
  chosen_spanish_reading: será muerto
  alternative_spanish_readings:
  - será puesto a muerte
  - será ejecutado
  - morirá
  rationale: El hebreo expresa una pasiva judicial, no simplemente una muerte natural. "Será muerto" preserva el peso jurídico y la ambigüedad controlada del original sin reemplazarla por una formulación más técnica que no aparece en el hebreo.
  doctrine_reference: HALOT; observación gramatical del Hophal
translation_notes:
  revision_awareness: 'La versión inglesa auditada permanece sin cambios en la última revisión. La traducción española sigue esa lectura estable: mantiene el contraste legal entre animal y hombre, conserva la fuerza restitutiva de שלם en piel y refleja el pasivo judicial de יוּמָת sin introducir cambios interpretativos no respaldados por el expediente.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exige; este versículo no contiene el nombre divino.
  - Se mantiene un registro legal sobrio y directo, sin sustituir la formulación masculina de אָדָם por neutralizaciones no justificadas.
  - «Restitución» se conserva como término jurídico coherente con el resto del proyecto para שלם en contextos legales.
  - No se introduce «Cristo», «SEÑOR» ni otras convenciones de masking que no corresponden al hebreo de este versículo.
