translation:
  language: es
  text: Yahvé nos mandó cumplir todos estos estatutos, a temer a Yahvé nuestro Dios, para nuestro bien todos nuestros días[a], para mantenernos con vida, como sucede hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «todos los días».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del Tetragrámaton con la forma ya establecida en el proyecto en español. Evita la sustitución por un título y mantiene la transparencia auditiva del texto base.
- source_word: וַיְצַוֵּנוּ
  english_pob_choice: commanded us
  chosen_spanish: nos mandó
  alternatives_spanish:
  - nos ordenó
  - nos dio mandato
  lexicon: HALOT
  rationale: El verbo expresa una orden autoritativa. En español, 'mandó' comunica con naturalidad la fuerza de mandato sin perder el valor imperativo del hebreo.
- source_word: לַעֲשׂוֹת
  english_pob_choice: to do
  chosen_spanish: a cumplir
  alternatives_spanish:
  - a hacer
  - a obedecer
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'hacer', en combinación con 'estatutos' el español 'cumplir' expresa de forma natural la ejecución obediente de mandamientos legales sin añadir interpretación excesiva.
- source_word: הַחֻקִּים
  english_pob_choice: statutes
  chosen_spanish: estatutos
  alternatives_spanish:
  - decretos
  - ordenanzas
  lexicon: HALOT
  rationale: '''Estatutos'' preserva el sentido jurídico-covenantal de חֻקִּים con un término bíblico claro y tradicionalmente inteligible en español.'
- source_word: לְיִרְאָה
  english_pob_choice: to fear
  chosen_spanish: a temer
  alternatives_spanish:
  - a reverenciar
  - para temer
  lexicon: HALOT
  rationale: Se mantiene 'temer' para no suavizar la tensión teológica del texto. El contexto incluye reverencia, pero el hebreo usa el lenguaje de temor, que conviene conservar.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - el Dios nuestro
  - nuestro Dios
  lexicon: HALOT
  rationale: Construcción natural en español que conserva la relación de pacto implícita en el posesivo.
- source_word: לְטוֹב לָנוּ
  english_pob_choice: for our good
  chosen_spanish: para nuestro bien
  alternatives_spanish:
  - para nuestro provecho
  - para nuestro beneficio
  lexicon: HALOT
  rationale: '''Bien'' expresa adecuadamente la finalidad beneficiosa del mandato, con tono más bíblico y menos utilitario que ''beneficio''.'
- source_word: כָּל הַיָּמִים
  english_pob_choice: all our days
  chosen_spanish: todos nuestros días
  alternatives_spanish:
  - todos los días
  - siempre
  lexicon: HALOT
  rationale: Se sigue la revisión del POB inglés que prefirió la literalidad de 'all our days'. En español, 'todos nuestros días' conserva esa temporalidad sin volverlo meramente adverbial.
- source_word: לְחַיֹּתֵנוּ
  english_pob_choice: to keep us alive
  chosen_spanish: para preservarnos la vida
  alternatives_spanish:
  - para mantenernos con vida
  - para mantenernos vivos
  lexicon: HALOT
  rationale: La forma causativa del verbo sugiere preservar vida. 'Preservarnos la vida' mantiene el matiz de conservación continua y suena más formal que una perífrasis más coloquial.
- source_word: כְּהַיּוֹם הַזֶּה
  english_pob_choice: as it is this day
  chosen_spanish: como hasta hoy
  alternatives_spanish:
  - como en este día
  - como hoy
  lexicon: HALOT
  rationale: La frase idiomática apunta al estado presente y observable. 'Como hasta hoy' es idiomática en español y conserva la referencia al presente sin expandir innecesariamente el hebreo.
theological_decisions:
- issue: ירא en contexto de pacto
  english_pob_reading: to fear Yahweh our God
  chosen_spanish_reading: a temer a Yahvé nuestro Dios
  alternative_spanish_readings:
  - a reverenciar a Yahvé nuestro Dios
  - a tener reverencia por Yahvé nuestro Dios
  rationale: Se preserva el lenguaje de temor para no diluir la fuerza bíblica del término. La reverencia está implícita en el contexto, pero no se reemplaza el lexema principal por una paráfrasis más suave.
  doctrine_reference: Translation philosophy §3
- issue: Secuencia finalidad/resultados del versículo
  english_pob_reading: obedience, fear, good, and preservation of life
  chosen_spanish_reading: cumplir estatutos, temer a Yahvé, para nuestro bien, para preservarnos la vida
  alternative_spanish_readings:
  - obedecer por nuestro bien y para que vivamos
  - cumplir para nuestra bendición
  rationale: El versículo enlaza obediencia, temor reverente, bienestar y preservación de la vida. La redacción española mantiene esa progresión sin convertirla en una explicación doctrinal posterior.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB inglés que prefirió 'all our days' frente a 'always' para reflejar con más precisión כָּל־הַיָּמִים, y se mantuvo la misma decisión en español con 'todos nuestros días'. También se conservó la coma antes de 'como hasta hoy' para claridad de lectura.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה, conforme a la terminología del proyecto.
  - '''Estatutos'' se mantiene como término legal-covenantal y no se reemplaza por ''mandamientos'' porque el hebreo distingue חֻקִּים.'
  - Se conserva el lenguaje de 'temer' para ירא, evitando una atenuación interpretativa.
  - La nota al pie recoge la alternativa más literal de 'todos los días' para transparentar el valor temporal del hebreo.
  - '''Como hasta hoy'' mantiene el tono idiomático del presente efectivo sin introducir una glosa explicativa.'
