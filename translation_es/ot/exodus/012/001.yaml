translation:
  language: es
  text: 'Yahvé[a] dijo a Moisés y a Aarón en la tierra de Egipto, diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; aquí se translitera «Yahvé».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - y dijo
  lexicon: HALOT
  rationale: El verbo narrativo introduce una nueva sección. En español, «habló» comunica con naturalidad el acto de comunicación formal sin forzar una repetición innecesaria de «dijo», y mantiene el avance narrativo del waw consecutivo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se traduce con el nombre propio divino, no con una sustitución titulada. «Yahvé» es la forma estable del proyecto en español y preserva el nombre personal del pacto.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  - hacia
  lexicon: HALOT
  rationale: La preposición direccional se expresa de forma natural y precisa con «a» en español cuando introduce destinatarios del habla.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: standard proper name
  rationale: Nombre propio bíblico estándar en español.
- source_word: וְאֶל
  english_pob_choice: and to
  chosen_spanish: y a
  alternatives_spanish:
  - y
  - a
  lexicon: HALOT
  rationale: El hebreo repite la preposición para Aarón; «y a» conserva la coordinación de ambos destinatarios con fluidez natural en español.
- source_word: אַהֲרֹן
  english_pob_choice: Aaron
  chosen_spanish: Aarón
  alternatives_spanish:
  - Aarón
  lexicon: standard proper name
  rationale: Nombre propio bíblico estándar en español.
- source_word: בְּאֶרֶץ מִצְרַיִם
  english_pob_choice: in the land of Egypt
  chosen_spanish: en la tierra de Egipto
  alternatives_spanish:
  - en el país de Egipto
  - en Egipto
  lexicon: HALOT
  rationale: Se conserva explícitamente «tierra» porque el hebreo dice «en la tierra de Egipto», no solo «en Egipto». Esto mantiene el alcance formal y geográfico del original.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - 'así:'
  - para decir
  lexicon: HALOT
  rationale: El infinitivo introductorio conecta con el discurso siguiente. «Diciendo» mantiene la fórmula bíblica sin añadir contenido interpretativo.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: La política del proyecto pide preservar el nombre divino revelado en el texto hebreo. En español, «Yahvé» es la forma tradicional y legible para esa transliteración, evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior incorporando el marcador [a] directamente en el texto principal junto al nombre divino. La redacción sigue el hebreo con una coordinación natural en español y conserva la fórmula introductoria final.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma del nombre divino, conforme al estándar del proyecto.
  - Se conserva «la tierra de Egipto» para reflejar el sintagma hebreo completo.
  - La puntuación con dos puntos al final prepara adecuadamente la cita directa que continúa en el versículo siguiente.
