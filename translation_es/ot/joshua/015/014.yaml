review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo: Caleb como sujeto, וַיֹּרֶשׁ con sentido de expulsar/desalojar, מִשָּׁם como «de allí», y la doble identificación genealógica de los tres hombres. Sin embargo, no preserva del todo la evidencia auditada en dos puntos: omite las notas léxicas que el POB inglés conservó para ירשׁ y para la duplicación «hijos de Anac» / «nacidos de Anac», y la repetición exacta «los hijos de Anac» en la segunda frase aplana el matiz de יְלִידֵי («nacidos de / descendientes nacidos de»).'
  spanish_quality_summary: El español es claro y legible, pero «Y Caleb» al inicio suena algo calcado; «Caleb» basta en español narrativo. «Expulsó» es natural. Los nombres y «Anac» son aceptables en registro bíblico español. Conviene mejorar la segunda expresión genealógica a «los nacidos de Anac» y explicarla en nota, para evitar repetición rígida y a la vez preservar la distinción del hebreo.
  glossary_alignment: No hay conflictos con terminología teológica de proyecto. La transliteración «Anac» es una opción bíblica española válida. «Expulsó» concuerda con la decisión inglesa «drove out». La principal mejora requerida es reflejar mediante nota la alternativa «desposeyó» para ירשׁ y la relación entre «hijos de Anac» e «hombres nacidos de Anac».
  issues:
  - severity: medium
    issue: Faltan las notas léxicas preservadas por el POB inglés.
    rationale: El registro inglés incluye una nota para וַיֹּרֶשׁ («desposeyó») y otra para la doble expresión genealógica. La revisión española debe conservar esas alternativas significativas.
  - severity: medium
    issue: La segunda frase «los hijos de Anac» no distingue יְלִידֵי הָעֲנָק de בְּנֵי הָעֲנָק.
    rationale: Aunque la repetición formal no es imposible, el hebreo usa dos expresiones emparentadas pero no idénticas. En español, «los nacidos de Anac» preserva mejor esa diferencia sin perder claridad.
  - severity: low
    issue: La conjunción inicial «Y» resulta innecesariamente calcada.
    rationale: En español bíblico contemporáneo, iniciar con «Caleb» suena más natural sin alterar el sentido narrativo.
  revised_spanish_text: 'Caleb expulsó de allí a los tres hijos de Anac: Sesai, Ahimán y Talmai[a], los nacidos de Anac[b].'
  revised_footnotes:
  - marker: a
    text: O «desposeyó de allí a los tres hijos de Anac». El verbo hebreo puede enfatizar tomar posesión al expulsar a los ocupantes anteriores.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «hijos de Anac» ... «nacidos de Anac». El versículo usa dos expresiones genealógicas relacionadas para el mismo grupo.
    reason: lexical_alternative
  revision_rationale: Se ajustó el texto para sonar más natural en español («Caleb» en vez de «Y Caleb»), se preservó mejor la distinción del hebreo entre בְּנֵי y יְלִידֵי con «hijos» / «nacidos», y se restauraron las notas léxicas significativas presentes en la auditoría inglesa.
