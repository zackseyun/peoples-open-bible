translation:
  language: es
  text: Y murió Job, anciano y lleno[a] de días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «satisfecho de días» o «habiendo tenido su lleno de días»; modismo hebreo para una vida completa.
