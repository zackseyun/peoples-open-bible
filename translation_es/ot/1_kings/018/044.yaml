base_translation:
  language: en
  yaml_path: translation/ot/1_kings/018/044.yaml
  text: And it happened on the seventh time that he said[a], “Look, a small cloud, like a man’s palm, is rising from the sea.” Then he said, “Go up, say to Ahab, ‘Harness your chariot and go down[c][b], so that the rain does not stop you.’”
  footnotes:
  - marker: a
    text: Or “like the palm of a man’s hand.”
    reason: lexical_alternative
  - marker: b
    text: “Harness up” refers to hitching or preparing the chariot/team for travel.
    reason: cultural_note
  - marker: c
    text: Or “lest the rain detain you” or “hold you back.”
    reason: lexical_alternative
