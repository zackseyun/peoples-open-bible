    text: O «y sus hijos y su esposa». La conjunción hebrea puede reflejarse más literalmente, aunque en español suele expresarse la compañía con «con».
    reason: lexical_alternative
  - marker: b
    text: Es decir, «el monte de Dios», una designación asociada con Sinaí/Horeb.
    reason: cross_reference
