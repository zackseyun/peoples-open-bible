revisions:
- from: Entonces el Espíritu de Yahvé[a] vino con poder sobre él, y lo despedazó como se despedaza un cabrito[b], aunque no tenía nada en su mano. Pero no les contó a su padre ni a su madre lo que había hecho.
  to: Entonces el Espíritu de Yahvé[a] irrumpió sobre él, y lo despedazó como se despedaza un cabrito[b], aunque no tenía nada en su mano. Pero no les contó a su padre ni a su madre lo que había hecho.
  rationale: Se revisa la cláusula inicial para reflejar mejor el valor súbito y enérgico de וַתִּצְלַח עָלָיו, en línea con el expediente lexical del POB inglés. 'Irrumpió sobre él' preserva mejor la fuerza narrativa que 'vino con poder sobre él' sin volverse antinatural en español. Se mantienen el resto de las decisiones porque son fieles, claras y acordes con la terminología del proyecto.
  reviewer_model: gpt-5.4
