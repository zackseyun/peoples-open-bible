review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura general y la terminología principal del hebreo: «ofrenda de primicias», «Yahvé», la prohibición respecto del altar y la fórmula «aroma agradable». Sin embargo, no preserva fielmente el pronombre plural אֹתָם / el verbo plural יַעֲלוּ, porque cambia indebidamente a singular («la presentaréis») mientras luego mantiene el plural («no subirán»). El hebreo y el inglés auditado hablan de «ellos/ellas» refiriéndose a los elementos del v. 11; en español debe mantenerse el plural para coherencia y fidelidad.'
  spanish_quality_summary: 'El español es claro y digno, pero hay un problema de concordancia y referencia: «Como una ofrenda de primicias, la presentaréis…; pero no subirán…» mezcla singular y plural de forma confusa. Además, «sobre el altar» suena menos natural que «al altar» con «subir», y la nota ya refleja esa formulación literal. Una leve revisión produce una redacción más natural y precisa.'
  glossary_alignment: 'Buena alineación con el glosario del proyecto: יהוה -> «Yahvé» correctamente; קָרְבַּן -> «ofrenda»; רֵאשִׁית -> «primicias»; לְרֵיחַ נִיחֹחַ -> «como aroma agradable» es aceptable. No hay conflicto doctrinal. La única desviación relevante es lexical/gramatical en אֹתָם, que no debe reducirse a singular colectivo aquí.'
  issues:
  - severity: high
    issue: Cambio injustificado de plural a singular en el objeto directo
    rationale: אֹתָם es plural («ellos/ellas», refiriéndose a los elementos del versículo anterior), y el inglés POB mantiene «them». «La presentaréis» altera el referente y crea discordancia con «no subirán».
  - severity: medium
    issue: Inconsistencia interna de concordancia
    rationale: El texto combina «la presentaréis» con «no subirán», lo que dificulta la lectura y debilita la precisión formal del mandato legal.
  - severity: low
    issue: «Sobre el altar» es menos idiomático que «al altar» con «subir»
    rationale: En español bíblico natural, «no subirán al altar» refleja mejor el giro verbal y coincide con la explicación de la nota literal.
  revised_spanish_text: Como una ofrenda de primicias[a], los presentaréis a Yahvé; pero no subirán al altar como aroma agradable[b].
  revised_footnotes:
  - marker: a
    text: 'También: «como una ofrenda primicial».'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «no subirán al altar para un aroma agradable», un modismo que indica que no deben ser ofrecidos allí como ofrenda aceptable.'
    reason: lexical_alternative
