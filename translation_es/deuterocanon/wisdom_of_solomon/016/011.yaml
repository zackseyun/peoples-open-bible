translation:
  language: es
  text: Pues eran punzados para recordarles tus palabras[a], y eran librados con rapidez, para que no, después de caer en un profundo olvido, llegaran a quedar apartados de tu bondad bienhechora[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tus oráculos» o «tus palabras». El griego λόγια suele referirse a palabras u oráculos divinos.
    reason: lexical_alternative
  - marker: b
    text: O «para que no... llegaran a quedar separados de tu bondad bienhechora»; o «...quedaran distraídos de tu bondad». El adjetivo griego es difícil y puede sugerir no ser apartados ni distraídos del obrar benéfico de Dios.
    reason: alternative_reading
lexical_decisions:
- source_word: ὑπόμνησιν
  english_pob_choice: a reminder
  chosen_spanish: un recordatorio
  alternatives_spanish:
  - un recuerdo
  - una advertencia
  - una rememoración
  lexicon: LSJ
  rationale: ὑπόμνησιν expresa la idea de traer algo a la mente; «recordatorio» es natural en español y conserva la función causal del pasaje.
- source_word: λογίων
  english_pob_choice: your words
  chosen_spanish: tus palabras
  alternatives_spanish:
  - tus oráculos
  - tus dichos
  lexicon: LSJ
  rationale: λόγια puede referirse a palabras divinas u oráculos. «Tus palabras» conserva la referencia a la խոսa divina sin cargar el término con tecnicismo innecesario.
- source_word: ἐνεκεντρίζοντο
  english_pob_choice: were being pricked
  chosen_spanish: eran pinchados
  alternatives_spanish:
  - eran picados
  - eran punzados
  - eran traspasados
  lexicon: LSJ
  rationale: El verbo es literalmente de ser pinchado o aguijoneado; «eran pinchados» mantiene la imagen corporal y el valor de recordatorio del dolor.
- source_word: ὀξέως
  english_pob_choice: quickly
  chosen_spanish: con rapidez
  alternatives_spanish:
  - rápidamente
  - pronto
  - al instante
  lexicon: LSJ
  rationale: Adverbio de velocidad; «con rapidez» suena fluido y formal en español bíblico contemporáneo.
- source_word: διεσώζοντο
  english_pob_choice: were delivered
  chosen_spanish: eran librados
  alternatives_spanish:
  - eran rescatados
  - eran salvados
  - eran preservados
  lexicon: LSJ
  rationale: El verbo compuesto indica ser llevado a salvo o preservado; «eran librados» conserva el tono formal de liberación de peligro.
- source_word: βαθεῖαν λήθην
  english_pob_choice: deep forgetfulness
  chosen_spanish: un profundo olvido
  alternatives_spanish:
  - un olvido profundo
  - un profundo olvido interior
  - un gran olvido
  lexicon: LSJ
  rationale: La expresión es metafórica; «profundo olvido» transmite la intensidad del olvido sin endurecerlo con una paráfrasis excesiva.
- source_word: ἀπερίσπαστοι
  english_pob_choice: cut off
  chosen_spanish: apartados
  alternatives_spanish:
  - separados
  - desprendidos
  - privados
  lexicon: LSJ
  rationale: El adjetivo es difícil y puede sugerir no ser distraídos ni apartados. «Apartados» mantiene la tensión semántica sin resolverla demasiado pronto; se complementa con la nota de posible lectura alternativa.
- source_word: εὐεργεσίας
  english_pob_choice: beneficence
  chosen_spanish: beneficencia
  alternatives_spanish:
  - bondad
  - benevolencia
  - bienhechuría
  lexicon: LSJ
  rationale: El sustantivo apunta a un bienhecho activo de Dios; «beneficencia» conserva el registro elevado y la idea de acción benefactora.
theological_decisions:
- issue: Sentido de τῶν λογίων σου
  english_pob_reading: your words
  chosen_spanish_reading: tus palabras
  alternative_spanish_readings:
  - tus oráculos
  - tus dichos
  rationale: El contexto habla de palabras divinas que sirven de advertencia y memoria; «tus palabras» es claro y no impone una forma profética más específica de la que el texto exige.
  doctrine_reference: Transparencia semántica; evitar tecnicismos no requeridos por el texto.
- issue: Sentido de ἀπερίσπαστοι γένωνται τῆς σῆς εὐεργεσίας
  english_pob_reading: they might not become cut off from your beneficence
  chosen_spanish_reading: no llegaran a quedar apartados de tu beneficencia
  alternative_spanish_readings:
  - no llegaran a ser separados de tu beneficencia
  - no quedaran distraídos de tu bondad
  rationale: La construcción final expresa el temor de quedar fuera del bien eficaz de Dios. «Apartados» conserva esa pérdida relacional sin borrar la ambigüedad del adjetivo griego.
  doctrine_reference: Preservar la tensión léxica en vez de resolverla unilateralmente.
translation_notes:
  revision_awareness: 'Esta versión toma en cuenta la revisión inglesa más reciente: el giro final se mantiene con valor relacional y se conserva la secuencia del griego, mientras que λογίων se vierte como «palabras» en el texto principal para mayor naturalidad y formalidad.'
  spanish_consistency_notes:
  - Se usa «Dios»/«tu» implícito por el contexto divino del texto, sin introducir títulos no presentes.
  - Se conserva el paralelismo narrativo con imperfectos pasivos («eran pinchados», «eran librados») para reflejar la acción continua del griego.
  - Se mantiene «beneficencia» como término elevado y consistente con la política POB para εὐεργεσία, evitando «bondad» como único equivalente principal.
