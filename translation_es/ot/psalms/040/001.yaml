translation:
  language: es
  text: Para el director del coro[a]. De David. Un salmo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Por David» o «Para David»; el encabezado hebreo puede indicar autoría, asociación o dedicación.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Para el director del coro
  alternatives_spanish:
  - Para el maestro de coro
  - Para el líder musical
  - Al director
  lexicon: HALOT
  rationale: El término de superscripción apunta al responsable de la ejecución musical. «Director del coro» comunica bien esa función en español actual y conserva el valor directivo del ל prefijado como «para».
- source_word: לְדָוִד
  english_pob_choice: Of David
  chosen_spanish: De David
  alternatives_spanish:
  - Por David
  - Para David
  - Perteneciente a David
  lexicon: HALOT
  rationale: La preposición ל en los encabezados de salmos puede indicar autoría, asociación o dedicación. «De David» preserva esa amplitud sin decidir más de lo que exige el hebreo.
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Un salmo
  alternatives_spanish:
  - Un canto
  - Una melodía
  - Un poema
  lexicon: HALOT
  rationale: מִזְמוֹר funciona como rótulo genérico de género. «Salmo» es el equivalente más natural y reconocido en español, sin añadir paráfrasis.
theological_decisions:
- issue: Ambigüedad de la superscripción davídica
  english_pob_reading: Render לְדָוִד as 'Of David'
  chosen_spanish_reading: «De David»
  alternative_spanish_readings:
  - «Por David»
  - «Para David»
  rationale: La línea no obliga a fijar autoría estricta. «De David» conserva la tensión interpretativa del hebreo y evita sobreespecificar una relación que el texto no define por completo.
  doctrine_reference: Primacía del texto original; conservar ambigüedad histórica donde el hebreo la permite.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el estado de acuerdo es alto y el dictamen fue de concordancia, por lo que se mantiene la solución estable del pasaje.
  spanish_consistency_notes:
  - Se usa «salmo» como término de género, coherente con el inglés POB y con el uso bíblico estándar en español.
  - Se evita «SEÑOR» o una glosa teológica innecesaria, porque este versículo es una superscripción literaria, no una afirmación directa sobre el nombre divino.
  - «Director del coro» mantiene un registro claro y público; no se opta por formas más técnicas o arcaizantes sin ganancia semántica.
