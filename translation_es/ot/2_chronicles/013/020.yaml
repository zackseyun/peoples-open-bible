translation:
  language: es
  text: Jeroboam ya no mantuvo su poder en los días de Abías[a], y Yahvé lo hirió, y murió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «Yahvé lo afligió» o «Yahvé lo plagó». El hebreo solo dice que Yahvé «hirió» a Jeroboam y no especifica el medio exacto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָצַר כֹּחַ
  english_pob_choice: retained strength
  chosen_spanish: conservó su fuerza
  alternatives_spanish:
  - retuvo su fuerza
  - mantuvo su fuerza
  - preservó su vigor
  lexicon: HALOT
  rationale: עָצַר con כֹּחַ expresa la idea de retener o mantener fuerza; en español, "conservó su fuerza" preserva esa relación verbal sin introducir una victoria militar que el hebreo no explicita.
- source_word: עוֹד
  english_pob_choice: no longer
  chosen_spanish: ya no
  alternatives_spanish:
  - no más
  - no siguió
  - todavía no
  lexicon: HALOT
  rationale: En combinación con la negación, עוֹד funciona idiomáticamente como "ya no". Es la forma más natural y fiel en español actual.
- source_word: בִּימֵי אֲבִיָּהוּ
  english_pob_choice: in the days of Abijah
  chosen_spanish: en los días de Abías
  alternatives_spanish:
  - durante los días de Abías
  - en tiempo de Abías
  - mientras Abías vivía
  lexicon: HALOT
  rationale: La expresión temporal hebrea se conserva con un giro idiomático claro en español. "En los días de" mantiene el paralelismo bíblico sin sonar forzado.
- source_word: וַיִּגְּפֵהוּ
  english_pob_choice: struck him
  chosen_spanish: lo hirió
  alternatives_spanish:
  - lo golpeó
  - lo afligió
  - lo hirió con una plaga
  lexicon: HALOT
  rationale: נגף puede abarcar golpe, plaga o derrota. "Lo hirió" comunica una acción divina real sin especificar el medio, preservando la tensión lexical del hebreo y del audit trail inglés.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: "Yahvé" en lugar de la sustitución tradicional. Esto mantiene el nombre divino explícito en el texto español.'
- source_word: וַיָּמֹת
  english_pob_choice: and he died
  chosen_spanish: y murió
  alternatives_spanish:
  - y falleció
  - y expiró
  lexicon: HALOT
  rationale: 'El wayyiqtol de מות se vierte de manera directa y narrativa: "y murió". Es preciso, sobrio y fiel al cierre del versículo.'
theological_decisions:
- issue: Naturaleza de la acción divina en וַיִּגְּפֵהוּ יְהוָה
  english_pob_reading: The verse states directly that Yahweh struck Jeroboam, resulting in his death, without specifying the means.
  chosen_spanish_reading: El versículo afirma directamente que Yahvé hirió a Jeroboam y que de ello resultó su muerte, sin especificar el medio.
  alternative_spanish_readings:
  - Yahvé lo castigó con una enfermedad
  - Yahvé lo abatió en batalla
  - Yahvé lo plagó
  rationale: La traducción mantiene la atribución directa a Yahvé y no resuelve el mecanismo del juicio. Esto conserva la tensión teológica del hebreo y evita estrechar el sentido más allá de la evidencia textual.
  doctrine_reference: Preservar la tensión teológica y la indeterminación del medio de juicio.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requerían cambios tras el pase final, y el inglés auditado mantiene alta concordancia con el hebreo base.'
  spanish_consistency_notes:
  - Se mantiene "Yahvé" de forma consistente para el nombre divino.
  - Se usa "Abías" para el nombre propio según la forma castellana habitual, sin alterar el referente del hebreo אֲבִיָּהוּ.
  - Se conserva un registro bíblico sobrio y directo, sin añadir explicaciones interpretativas al cuerpo del versículo.
  - La nota al pie marca explícitamente la indeterminación del verbo נגף, como en el audit trail inglés.
