translation:
  language: es
  text: Tú eres el rey, que te has engrandecido y te has hecho fuerte; tu grandeza ha crecido y ha llegado hasta el cielo, y tu dominio hasta el fin de la tierra[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hasta los confines de la tierra».
    reason: lexical_alternative
lexical_decisions:
- source_word: אַנְתָּה הוּא
  english_pob_choice: You are
  chosen_spanish: Tú eres
  alternatives_spanish:
  - Eres tú
  - Tú mismo eres
  lexicon: HALOT
  rationale: La forma enfática aramea se conserva con un sujeto explícito en español. «Tú eres» es natural, directo y mantiene la identificación enfática sin forzar un calco rígido.
- source_word: מַלְכָּא
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - rey
  - oh rey
  lexicon: HALOT
  rationale: El sustantivo definido se traduce de manera natural como «el rey». «Oh rey» introduciría un matiz vocativo que aquí no domina la cláusula identificadora.
- source_word: רְבַית
  english_pob_choice: has grown great
  chosen_spanish: has crecido
  alternatives_spanish:
  - ha crecido en grandeza
  - te has hecho grande
  lexicon: HALOT
  rationale: El verbo expresa aumento o crecimiento. En español, «has crecido» transmite el desarrollo sin añadir más de lo que el hebreo/arameo afirma.
- source_word: וּתְקֵפְתְּ
  english_pob_choice: and strong
  chosen_spanish: te has fortalecido
  alternatives_spanish:
  - y has sido fortalecido
  - y eres fuerte
  lexicon: HALOT
  rationale: La raíz comunica fortalecerse o volverse fuerte/poderoso. Elegí un verbo verbalizado para conservar la progresión de acciones y el paralelismo con «has crecido».
- source_word: וּרְבוּתָךְ
  english_pob_choice: your greatness
  chosen_spanish: tu grandeza
  alternatives_spanish:
  - tu magnitud
  - tu majestad
  lexicon: HALOT
  rationale: «Grandeza» reproduce con transparencia el sustantivo derivado de רבה y mantiene la repetición lexical con el verbo anterior, como en el texto fuente.
- source_word: רְבָת
  english_pob_choice: has become great
  chosen_spanish: ha crecido
  alternatives_spanish:
  - se ha engrandecido
  - ha aumentado
  lexicon: HALOT
  rationale: La repetición del campo semántico de רבה se preserva con «ha crecido», evitando que la redundancia del original se pierda en una sola abstracción.
- source_word: וּמְטָת לִשְׁמַיָּא
  english_pob_choice: and reached to heaven
  chosen_spanish: y ha llegado hasta el cielo
  alternatives_spanish:
  - y ha alcanzado los cielos
  - y ha llegado al cielo
  lexicon: HALOT
  rationale: «Ha llegado» expresa el movimiento culminante del verbo. «Hasta el cielo» conserva el límite de extensión y usa una forma comprensible en español para la pluralidad idiomática de «los cielos».
- source_word: וְשָׁלְטָנָךְ
  english_pob_choice: and your dominion
  chosen_spanish: y tu dominio
  alternatives_spanish:
  - y tu soberanía
  - y tu gobierno
  lexicon: HALOT
  rationale: «Dominio» mantiene el registro regio y corresponde bien al sustantivo de autoridad gobernante sin desplazarlo a un término más interpretativo.
- source_word: לְסוֹף אַרְעָא
  english_pob_choice: to the end of the earth
  chosen_spanish: hasta el fin de la tierra
  alternatives_spanish:
  - hasta los confines de la tierra
  - hasta el extremo de la tierra
  lexicon: HALOT
  rationale: La preposición direccional y el sustantivo final se expresan de modo idiomático con «hasta el fin de la tierra». Mantiene la extensión universal de la frase y deja abierta la misma tensión hiperbólica del original.
theological_decisions:
- issue: Extensión universal del dominio real
  english_pob_reading: hyperbolic universal royal dominion rendered as 'to the end of the earth'
  chosen_spanish_reading: hipérbole real universal expresada como «hasta el fin de la tierra»
  alternative_spanish_readings:
  - dominio literalmente mundial
  - simple alcance imperial local
  rationale: El texto usa lenguaje real hiperbólico para una extensión máxima del dominio. La traducción no intenta resolver históricamente el alcance, sino preservar la fuerza declarativa del pasaje.
  doctrine_reference: Preservar la tensión textual sin armonizarla indebidamente.
translation_notes:
  revision_awareness: La redacción sigue el estado más reciente del apunte inglés, que no requirió cambios sustanciales, y conserva su énfasis en la repetición de רבה y en la amplitud hiperbólica del dominio.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando aparece el nombre divino; aquí no aplica.
  - Se evitó «SEÑOR» y se mantuvo el léxico real concreto («rey», «dominio», «grandeza»).
  - Se conservó la repetición semántica del original con «crecido / fortalecido / grandeza / ha crecido».
  - El marcador de nota a está anclado en «tierra» para señalar la alternativa de pluralidad espacial sin duplicar notas.
