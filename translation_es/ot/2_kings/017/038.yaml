translation:
  language: es
  text: Y el pacto[a] que hice con ustedes no olviden[b], ni teman a otros dioses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: "el pacto que corté con ustedes". "Hice" traduce de manera natural en español el modismo hebreo de hacer un pacto.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "no olvidarán". La forma hebrea puede traducirse en español como prohibición directa o como instrucción formulada con futuro.'
    reason: alternative_reading
lexical_decisions:
- source_word: הַבְּרִית
  english_pob_choice: the covenant
  chosen_spanish: el pacto
  alternatives_spanish:
  - el convenio
  - la alianza
  lexicon: HALOT
  rationale: ברית puede expresarse en español como 'pacto' o 'alianza'. Aquí 'pacto' conserva mejor el tono jurídico-relacional y suena natural en español, sin perder el peso teológico del vínculo establecido por Yahvé.
- source_word: אֲשֶׁר כָּרַתִּי אִתְּכֶם
  english_pob_choice: that I made with you
  chosen_spanish: que hice con ustedes
  alternatives_spanish:
  - que corté con ustedes
  - que establecí con ustedes
  lexicon: HALOT
  rationale: El hebreo usa el modismo literal 'cortar un pacto'. En español, 'hice con ustedes' comunica el sentido de manera idiomática y fiel. Se evitó 'corté' en el texto principal porque suena chocante en español, aunque permanece como trasfondo reconocible del modismo.
- source_word: לֹא תִשְׁכָּחוּ
  english_pob_choice: you shall not forget
  chosen_spanish: no lo olvidarán
  alternatives_spanish:
  - no olviden
  - no deberán olvidar
  lexicon: HALOT
  rationale: El imperfecto con לֹא funciona aquí como prohibición/instrucción. 'No lo olvidarán' mantiene el valor exhortativo en un español natural y solemne; 'no olviden' sería también posible, pero menos alineado con el tono directivo mantenido por la POB inglesa.
- source_word: וְלֹא תִירְאוּ
  english_pob_choice: and you shall not fear
  chosen_spanish: y no temerán
  alternatives_spanish:
  - y no tendrán temor de
  - y no reverenciarán
  lexicon: HALOT
  rationale: יָרֵא puede significar 'temer' o 'reverenciar' según el contexto. La lectura de la POB inglesa conserva 'fear'; en español, 'temer' expresa mejor tanto temor como lealtad religiosa potencialmente desviada, sin suavizar la prohibición.
- source_word: אֱלֹהִים אֲחֵרִים
  english_pob_choice: other gods
  chosen_spanish: otros dioses
  alternatives_spanish:
  - dioses ajenos
  - otras deidades
  lexicon: HALOT
  rationale: '''Otros dioses'' es la correspondencia más directa y bíblica en español, y preserva la fórmula de exclusividad del pacto. ''Dioses ajenos'' sería posible, pero introduce un matiz más interpretativo.'
theological_decisions:
- issue: Forma de la prohibición
  english_pob_reading: '''you shall not forget'' / ''you shall not fear'' as covenantal instruction'
  chosen_spanish_reading: '''no lo olvidarán'' / ''no temerán'' como instrucción de pacto'
  alternative_spanish_readings:
  - '''no olviden'' / ''no teman'' como imperativo directo'
  - '''no deberán olvidar'' / ''no deberán temer'''
  rationale: La estructura hebrea permite un valor exhortativo/prohibitivo. El español elegido conserva ese tono sin añadir explicaciones. Mantiene el carácter de obligación pactal, no solo una recomendación moral.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Relación con Yahvé implícita en el pacto
  english_pob_reading: covenant language without replacing the divine name
  chosen_spanish_reading: '''pacto'' con referencia implícita a Yahvé'
  alternative_spanish_readings:
  - '''alianza'' con referencia implícita a Yahvé'
  - '''convenio'' con referencia implícita a Yahvé'
  rationale: Aunque el versículo no nombra a Yahvé, el pacto bíblico presupone su autoría. 'Pacto' mantiene esa relación sin introducir una glosa innecesaria ni reemplazar el trasfondo teológico del texto.
  doctrine_reference: 'Contested terms: ברית; covenant theology in the source context'
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior anclando cada nota al texto principal: [a] en ''pacto'' y [b] en ''olvidarán''. La redacción se mantiene alineada con el audit trail inglés y con el hebreo, sin calcar de forma rígida.'
  spanish_consistency_notes:
  - Se conserva 'pacto' como término principal para בְּרִית.
  - Se usa 'otros dioses' para אֱלֹהִים אֲחֵרִים, en línea con la POB inglesa.
  - Se evita 'SEÑOR' porque este versículo no contiene el Tetragrámaton en el texto hebreo dado.
  - El español mantiene registro bíblico moderno y comprensible, sin arcaísmos innecesarios.
