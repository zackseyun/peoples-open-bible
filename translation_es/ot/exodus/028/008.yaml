base_translation:
  language: en
  yaml_path: translation/ot/exodus/028/008.yaml
  text: 'And the skillfully woven band of his ephod[a], which is on it, shall be like its workmanship, of one piece with it: gold, blue, and purple, and scarlet yarn[b], and fine twisted linen.'
  footnotes:
  - marker: a
    text: Or 'of the same workmanship as it; from it it shall be'—the Hebrew emphasizes that the band was to match the ephod's workmanship and be made integrally with it, not as a separate piece.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'blue, purple, and scarlet' refers to dyed textile materials used in the tabernacle and priestly garments.
    reason: cultural_note
