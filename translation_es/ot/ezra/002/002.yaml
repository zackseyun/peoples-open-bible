translation:
  language: es
  text: 'los que vinieron con Zorobabel: Jesúa, Nehemías, Seraías, Reelaías[a], Mardoqueo, Bilsán, Mispar[b], Bigvai, Rehum[c] y Baaná. El número de los hombres del pueblo de Israel[d]:'
  philosophy: optimal-equivalence
  footnotes:
