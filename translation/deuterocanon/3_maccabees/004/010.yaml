  text: ἔτι καὶ τῷ καθύπερθε πυκνῷ σανιδώματι διακειμένῳ, ὅπως πάντοθεν ἐσκοτισμένοι τοὺς ὀφθαλμοὺς, ἀγωγὴν ἐπιβόλων ἐν παντὶ τῷ κατάπλῳ λαμβάνωσιν.
