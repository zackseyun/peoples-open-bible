translation:
  language: es
  text: Que tus misericordias se adelanten pronto a nosotros[a]; y pon alabanza en la boca de los que han caído y cuyas almas[b] están quebrantadas, habiéndonos dado paz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «nos precedan pronto». El verbo griego puede significar «venir antes» o «ir delante», con la idea de anticipar la necesidad.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «que han caído y han sido quebrantados en sus almas». El griego usa ψυχή, por lo que «almas» conserva la referencia explícita.'
    reason: lexical_alternative
lexical_decisions:
- source_word: προκαταλαβέτωσαν
  english_pob_choice: come before us
  chosen_spanish: nos salgan pronto al encuentro
  alternatives_spanish:
  - nos precedan
  - vayan delante de nosotros
  - se adelanten a nosotros
  lexicon: LSJ
  rationale: El verbo griego puede significar anticipar o ir delante. En español, "salgan pronto al encuentro" conserva la idea de que las misericordias de Dios lleguen antes de la necesidad, con un matiz más natural que un calco como "venir antes".
- source_word: οἰκτιρμοί
  english_pob_choice: mercies
  chosen_spanish: misericordias
  alternatives_spanish:
  - compasiones
  - piedades
  lexicon: LSJ
  rationale: El plural griego queda bien reflejado con "misericordias" en español y mantiene el tono de súplica. "Compasiones" también es posible, pero suena menos directo en este contexto oracional.
- source_word: αἰνέσεις
  english_pob_choice: praise
  chosen_spanish: alabanza
  alternatives_spanish:
  - alabanzas
  - cánticos de alabanza
  lexicon: LSJ
  rationale: Aunque el griego está en plural, en español "poner alabanza en la boca" es idiomático y transparente. Se conserva la imagen sin forzar un plural innecesario en el texto principal.
- source_word: καταπεπτωκότων
  english_pob_choice: those who have fallen
  chosen_spanish: de los que han caído
  alternatives_spanish:
  - de los caídos
  - de los abatidos
  lexicon: LSJ
  rationale: El participio perfecto indica un estado resultante de caída o abatimiento. "Los que han caído" preserva el valor verbal y evita reducirlo solo a una etiqueta estática.
- source_word: συντετριμμένων τὰς ψυχάς
  english_pob_choice: whose souls are crushed
  chosen_spanish: cuyas almas están quebrantadas
  alternatives_spanish:
  - cuyas almas están aplastadas
  - quebrantados en el alma
  - cuyos espíritus están quebrantados
  lexicon: LSJ
  rationale: '"Almas" reproduce ψυχαί de forma directa. "Quebrantadas" conserva la imagen de ser triturados o destrozados; "espíritus" sería más suave, pero desplaza el término original.'
- source_word: ποιήσας ἡμῖν εἰρήνην
  english_pob_choice: having made peace for us
  chosen_spanish: habiendo hecho paz para nosotros
  alternatives_spanish:
  - habiendo establecido paz para nosotros
  - después de haber hecho paz para nosotros
  - tras hacer paz para nosotros
  lexicon: LSJ
  rationale: La construcción aorística se refleja con un participio español anterior que expresa acción completada. "Paz" conserva el sustantivo del griego; "hacer paz" es menos idiomático que "dar paz", pero más cercano al texto.
theological_decisions:
- issue: Uso de ψυχή
  english_pob_reading: souls
  chosen_spanish_reading: almas
  alternative_spanish_readings:
  - vidas
  - ser interior
  rationale: Se mantiene el término explícito del griego para no diluir la antropología del texto. "Almas" es la opción más transparente y coincide con el registro devocional de la súplica.
  doctrine_reference: Translation philosophy §1, §5
- issue: Imagen de Dios concediendo alabanza en medio del abatimiento
  english_pob_reading: put praise in the mouth of those who have fallen and whose souls are crushed
  chosen_spanish_reading: pon alabanza en la boca de los que han caído y cuyas almas están quebrantadas
  alternative_spanish_readings:
  - pon alabanzas en la boca
  - haz brotar alabanza de los abatidos
  rationale: Se conserva la imagen corporal de la boca y la tensión entre ruina y alabanza. No se suaviza a una paráfrasis más general para mantener la fuerza del ruego original.
  doctrine_reference: Translation philosophy §6
- issue: Participio aoristo ποιήσας
  english_pob_reading: having made peace for us
  chosen_spanish_reading: habiendo hecho paz para nosotros
  alternative_spanish_readings:
  - después de haber hecho paz para nosotros
  - una vez hecho paz para nosotros
  rationale: Se expresa como acción previa/completa, en línea con la revisión inglesa que corrigió "making" a "having made". No se interpreta como una promesa futura ni como una mera petición abstracta.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó «making peace for us» a «having made peace for us» para reflejar mejor el participio aoristo ποιήσας como acción completada. La redacción española sigue ese mismo criterio con «habiendo hecho paz para nosotros».
  spanish_consistency_notes:
  - Se mantuvo «misericordias» para οἰκτιρμοί, coherente con el valor plural del griego.
  - Se evitó «SEÑOR» porque el texto no contiene el tetragrámaton; aquí se dirige a Dios con un posesivo implícito, «tus».
  - Se eligió «alabanza» en singular colectivo, aunque el griego usa plural, para una construcción española natural sin perder el sentido.
  - Se usó «almas» en lugar de «espíritus» para preservar ψυχαί y la precisión antropológica del original.
