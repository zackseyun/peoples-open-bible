translation:
  language: es
  text: Y la luna también marca las estaciones que vuelven[c][a], el dominio del fin[b] y una señal para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo griego dice: ''la luna en todo para su tiempo, una manifestación de los tiempos y una señal para siempre''. El hebreo, en cambio, dice ''las estaciones que vuelven'' y ''el dominio del fin''.'
    reason: alternative_reading
  - marker: b
    text: La expresión hebrea 'el dominio del fin' es compacta y puede referirse al gobierno de la luna sobre el cierre del mes o sobre un límite fijado.
    reason: lexical_alternative
  - marker: c
    text: 'La tradición de Masada preserva para este versículo una lectura distinta de la hebrea de la Genizá: ''porque el gran Señor la hizo''.'
    reason: textual_variant
lexical_decisions:
- source_word: וגם
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - y también
  - además
  lexicon: HALOT
  rationale: Conserva el valor aditivo del hebreo y suena natural en español; corresponde al 'also' de la auditoría inglesa.
- source_word: ירח
  english_pob_choice: the moon
  chosen_spanish: la luna
  alternatives_spanish:
  - la luna
  - el astro lunar
  lexicon: HALOT
  rationale: El sustantivo designa claramente el cuerpo celeste; 'la luna' es la forma más natural y fiel en español.
- source_word: עתות שבות
  english_pob_choice: the returning seasons
  chosen_spanish: las estaciones que vuelven
  alternatives_spanish:
  - los tiempos que vuelven
  - las estaciones recurrentes
  - los tiempos señalados que retornan
  lexicon: HALOT
  rationale: El hebreo combina tiempos/estaciones con la idea de retorno cíclico. 'Estaciones que vuelven' mantiene la repetición sin convertirlo en una paráfrasis más larga.
- source_word: ממשלת
  english_pob_choice: a ruler of
  chosen_spanish: un gobernante de
  alternatives_spanish:
  - un soberano de
  - dominio sobre
  - quien gobierna
  lexicon: HALOT
  rationale: La forma sustantiva de 'gobernante' conserva la personificación poética y evita imponer una abstracción que el hebreo no exige.
- source_word: קץ
  english_pob_choice: the end
  chosen_spanish: el fin
  alternatives_spanish:
  - el límite
  - el término
  - la consumación
  lexicon: HALOT
  rationale: '''Fin'' reproduce el sustantivo compacto del hebreo y deja abierta la referencia temporal o de límite, como indica la auditoría.'
- source_word: ואות עולם
  english_pob_choice: and a sign forever
  chosen_spanish: y una señal para siempre
  alternatives_spanish:
  - y una señal eterna
  - y una señal perpetua
  - y una señal del siglo
  lexicon: HALOT
  rationale: '''Señal'' traduce אות de manera directa; ''para siempre'' conserva el alcance durativo de עולם sin forzar un tecnicismo.'
theological_decisions:
- issue: Peso relativo del hebreo y del paralelo griego en una discrepancia menor
  english_pob_reading: Follow the extant Hebrew as primary while consulting the Greek for calendrical sense
  chosen_spanish_reading: Seguir el hebreo conservado como base, dejando que el paralelo griego confirme el sentido calendárico
  alternative_spanish_readings:
  - 'Traducir más cerca del griego: ''la luna en todo, para su tiempo, una manifestación de los tiempos y una señal para siempre'''
  - Hacer explícita la diferencia textual dentro del texto principal
  rationale: La política del proyecto da primacía al hebreo cuando está preservado. Aquí el griego desarrolla el valor temporal de la luna, pero el hebreo habla de estaciones que vuelven y del límite/fin; por eso el texto principal sigue el hebreo y solo refleja la idea calendárica en 'estaciones que vuelven'.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use Greek parallel as actual input'
- issue: Lectura de ממשלת קץ como personificación poética
  english_pob_reading: a ruler of the end
  chosen_spanish_reading: un gobernante del fin
  alternative_spanish_readings:
  - un dominio sobre el fin
  - una gobernación del fin
  - un gobernante del límite
  rationale: La poesía sapiencial personifica los astros. Mantener un sujeto agente preserva esa fuerza retórica y la tensión semántica entre fin mensual, límite y consumación.
  doctrine_reference: Poética sapiencial / lectura contextual del hebreo
translation_notes:
  revision_awareness: Se revisó el pasaje y no hubo cambios en la última pasada editorial; el borrador mantiene la decisión de seguir el hebreo conservado, con apoyo del griego para el trasfondo temporal.
  spanish_consistency_notes:
  - Se usa 'la luna' para el astro y no 'luna' sin artículo, siguiendo el español natural y la precisión del sustantivo definido.
  - '''Señal'' se mantiene como traducción constante de אות, evitando términos eclesiásticos no requeridos por el hebreo.'
  - '''Fin'' conserva la ambigüedad semántica señalada en la auditoría inglesa y no se explicita dentro del texto principal.'
  - La puntuación conserva el paralelismo poético con una sola pausa fuerte antes del segundo hemistiquio.
