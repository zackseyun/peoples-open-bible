translation:
  language: es
  text: Porque, si alguien era agricultor, o pastor, o trabajador en el desierto, una vez apresado[a], permanecía bajo la necesidad inescapable.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una vez alcanzado, permanecía bajo una compulsión inevitable». El participio griego y el sustantivo pueden expresar tanto la imagen de ser apresado como la de ser alcanzado por la necesidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἴ τε γὰρ
  english_pob_choice: For if
  chosen_spanish: Porque, ya fuera que
  alternatives_spanish:
  - Porque si
  - Y si
  lexicon: LSJ
  rationale: La construcción introduce una explicación condicional-disyuntiva. «Porque, ya fuera que» conserva el matiz de explicación y la serie de posibilidades sin sonar forzada en español.
- source_word: γεωργὸς
  english_pob_choice: farmer
  chosen_spanish: agricultor
  alternatives_spanish:
  - campesino
  - labrador
  lexicon: LSJ
  rationale: «Agricultor» comunica de manera natural y precisa la labor agrícola del término griego, manteniendo el registro sobrio del pasaje.
- source_word: ποιμὴν
  english_pob_choice: shepherd
  chosen_spanish: pastor
  alternatives_spanish:
  - pastor de ovejas
  - pastor de ganado
  lexicon: LSJ
  rationale: El sentido básico es el de cuidador de rebaños; «pastor» es la equivalencia natural en español y funciona bien junto con los otros oficios enumerados.
- source_word: τῶν κατʼ ἐρημίαν ἐργάτης μόχθων
  english_pob_choice: a worker laboring in the wilderness
  chosen_spanish: trabajador que laboraba en el desierto
  alternatives_spanish:
  - obrero que trabajaba en lugares desolados
  - trabajador de faenas en el desierto
  lexicon: LSJ
  rationale: La frase griega es idiomática y conserva tanto el ámbito locativo como el esfuerzo físico. «Trabajador que laboraba en el desierto» sigue de cerca la imagen sin volverla artificial en español.
- source_word: προλημφθεὶς
  english_pob_choice: once seized
  chosen_spanish: una vez [a] sorprendido
  alternatives_spanish:
  - una vez tomado por sorpresa
  - una vez atrapado
  lexicon: LSJ
  rationale: El participio puede expresar la idea de ser tomado de manera súbita u overtaken. «Sorprendido» mantiene el matiz de irrupción repentina; el anclaje de nota permite explicitar la alternativa de «tomado por sorpresa».
- source_word: τὴν δυσάλυκτον ... ἀνάγκην
  english_pob_choice: the inescapable necessity
  chosen_spanish: la necesidad inescapable
  alternatives_spanish:
  - la compulsión inevitable
  - la constricción ineludible
  lexicon: LSJ
  rationale: «Necesidad inescapable» preserva la fuerza opresiva de ἀνάγκη y el valor de δυσάλυκτος como aquello de lo que no se puede escapar.
- source_word: ἔμενεν
  english_pob_choice: he remained under
  chosen_spanish: quedaba bajo
  alternatives_spanish:
  - permanecía bajo
  - seguía bajo
  lexicon: LSJ
  rationale: El imperfecto marca estado continuado; «quedaba bajo» expresa de forma natural la permanencia bajo esa condición de necesidad.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español. La redacción conserva la secuencia condicional-disyuntiva y la fuerza de la necesidad inevitable, siguiendo el auditoría inglesa pero con español natural.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque no aparece en el texto fuente.
  - «Necesidad inescapable» conserva el campo semántico de ἀνάγκη sin diluirlo en una mera obligación abstracta.
  - La nota [a] está anclada en «sorprendido» para reflejar la alternativa léxica documentada.
