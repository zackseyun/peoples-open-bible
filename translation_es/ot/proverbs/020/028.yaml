  - Se evitó la fórmula eclesiástica «Señor» o una paráfrasis doctrinal, porque el versículo es sapiencial y no contiene el Tetragrámaton.
  - El registro es sobrio y proverbial, adecuado para una traducción pública de estilo bíblico moderno.
