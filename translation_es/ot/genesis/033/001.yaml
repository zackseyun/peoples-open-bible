review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva en general la secuencia y el sentido del hebreo: Jacob levanta la vista, mira, Esaú se acerca, viene acompañado por cuatrocientos hombres, y Jacob distribuye a los niños según los grupos de mujeres. Sin embargo, la cláusula española «Esaú venía con él, y cuatrocientos hombres» no representa fielmente וְעִמּוֹ אַרְבַּע מֵאוֹת אִישׁ; suena incompleta y ambiguamente coordinada, cuando el sentido es «y con él estaban/venían cuatrocientos hombres». También falta reflejar en notas la alternativa inglesa para וְהִנֵּה.'
  spanish_quality_summary: 'El español es mayormente claro y de registro bíblico legible, pero presenta dos problemas de naturalidad y precisión: la nota [a] está invertida respecto del texto principal, y la frase «venía con él, y cuatrocientos hombres» es poco idiomática. «He aquí» es aceptable en este registro. «Niños» funciona, aunque «hijos» también sería posible; no requiere cambio. La puntuación puede mejorarse para fluidez.'
  glossary_alignment: No hay términos del glosario mayor afectados. «Siervas» es defendible para שְׁפָחוֹת en este contexto, aunque «sirvientas» es una alternativa útil en nota. El borrador sigue razonablemente la justificación léxica inglesa salvo en la representación defectuosa de וְעִמּוֹ אַרְבַּע מֵאוֹת אִישׁ y en la nota alternativa de la primera expresión.
  issues:
  - severity: high
    issue: La frase «Esaú venía con él, y cuatrocientos hombres» es gramaticalmente defectuosa y no expresa bien «y con él [venían/estaban] cuatrocientos hombres».
    rationale: וְעִמּוֹ אַרְבַּע מֵאוֹת אִישׁ indica claramente que Esaú iba acompañado por cuatrocientos hombres. El borrador deja la segunda parte colgando y puede confundir el referente de «él».
  - severity: medium
    issue: La nota [a] no corresponde a la decisión léxica documentada.
    rationale: El texto principal ya dice «alzó sus ojos»; la alternativa documentada en inglés es «looked up», que en español correspondería a «alzó la mirada» o «levantó la vista», no a «levantó los ojos».
  - severity: low
    issue: Falta una nota para el valor discursivo de «he aquí».
    rationale: El rastro de auditoría inglés conservó una nota sobre וְהִנֵּה como marcador vívido. No es indispensable, pero conviene preservarla para alineación completa.
  revised_spanish_text: Entonces Jacob alzó sus ojos y miró[a], y he aquí[b], Esaú venía, y con él cuatrocientos hombres. Así dividió a los niños entre Lea, Raquel y las dos siervas[c].
  revised_footnotes:
  - marker: a
    text: O «alzó la mirada» o «levantó la vista».
    reason: lexical_alternative
  - marker: b
    text: Hebreo «he aquí», un marcador vívido que llama la atención a la llegada de Esaú.
    reason: lexical_alternative
  - marker: c
    text: O «las dos sirvientas»; el hebreo se refiere a las dos servidoras de la casa.
    reason: lexical_alternative
  revision_rationale: Se corrige la cláusula central para expresar con naturalidad y fidelidad que Esaú venía acompañado por cuatrocientos hombres. Se ajusta la nota [a] para que sea una verdadera alternativa al giro principal, y se añade la nota sobre «he aquí» para reflejar la decisión discursiva documentada en el POB inglés. El resto del texto puede mantenerse.
