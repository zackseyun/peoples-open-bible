    rationale: יֻקַּח es pasivo/jusivo (‘sea traída / se traiga’). Aunque una activa impersonal puede ser idiomática, aquí puede conservarse una pasiva natural en español sin torpeza excesiva.
  - severity: medium
    issue: La nota [a] está asociada a «agua» pero comenta la voz verbal de «sea traída»
    rationale: El anclaje de nota debe aparecer en la palabra o frase relevante. Aquí la observación trata sobre el verbo de traer, no sobre «agua» en sí.
  - severity: medium
