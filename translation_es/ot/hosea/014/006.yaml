translation:
  language: es
  text: Seré como el rocío para Israel[a]; él florecerá como el lirio[b], y echará raíces como el Líbano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «será como el rocío para Israel». El hebreo presenta a Israel como un colectivo singular.'
    reason: lexical_alternative
  - marker: b
    text: «Líbano» evoca firmeza y grandeza, probablemente por sus árboles de profundas raíces; el hebreo no dice explícitamente «cedros».
    reason: cultural_note
lexical_decisions:
- source_word: אֶהְיֶה
  english_pob_choice: I will be
  chosen_spanish: Seré
  alternatives_spanish:
  - Estaré
  lexicon: HALOT
  rationale: El imperfecto 1cs de היה en un contexto de promesa se expresa naturalmente en futuro en español. «Seré» conserva la declaración divina de lo que Yahvé será para Israel.
- source_word: כַטַּל
  english_pob_choice: like the dew
  chosen_spanish: como el rocío
  alternatives_spanish:
  - como la escarcha
  - como el dew
  lexicon: HALOT
  rationale: La comparación con el rocío reproduce la imagen agrícola de humedad vivificante. «Rocío» es la forma natural y fiel en español.
- source_word: לְיִשְׂרָאֵל
  english_pob_choice: to Israel
  chosen_spanish: para Israel
  alternatives_spanish:
  - a Israel
  lexicon: HALOT
  rationale: La preposición ל admite sentido de beneficio o dirección. En español, «para Israel» comunica mejor el efecto benéfico de la imagen sin alterar el vínculo del verso.
- source_word: יִפְרַח
  english_pob_choice: he will blossom
  chosen_spanish: él florecerá
  alternatives_spanish:
  - él brotará
  - él prosperará
  lexicon: HALOT
  rationale: El verbo hebreo encaja con la imagen floral inmediata; «florecerá» preserva ese campo semántico y funciona de manera natural en español.
- source_word: כַשּׁוֹשַׁנָּה
  english_pob_choice: like the lily
  chosen_spanish: como el lirio
  alternatives_spanish:
  - como la azucena
  - como un lirio
  lexicon: HALOT
  rationale: שׁוֹשַׁנָּה se traduce comúnmente como «lirio»; el masculino singular con artículo mantiene el giro poético sin forzar una naturalización excesiva.
- source_word: וְיַךְ שָׁרָשָׁיו
  english_pob_choice: and he will take root
  chosen_spanish: y echará raíces
  alternatives_spanish:
  - y pondrá raíces
  - y arraigará
  lexicon: HALOT
  rationale: La imagen hebrea describe raíces que se establecen con firmeza. En español, «echará raíces» es el equivalente idiomático más claro y fiel al sentido de arraigo.
- source_word: כַלְּבָנוֹן
  english_pob_choice: like Lebanon
  chosen_spanish: como el Líbano
  alternatives_spanish:
  - como el monte Líbano
  - como los cedros del Líbano
  lexicon: HALOT
  rationale: El texto menciona directamente a Líbano, no a sus cedros. Mantener «como el Líbano» conserva la imagen original de firmeza y grandeza sin añadir elementos interpretativos al texto principal.
theological_decisions:
- issue: Israel como colectivo singular con verbos y pronombres masculinos singulares
  english_pob_reading: 'Render Israel as a singular collective with masculine singular verbs/pronoun: ''he will blossom ... his roots.'''
  chosen_spanish_reading: 'Mantener a Israel como colectivo singular masculino: «él florecerá ... echará raíces».'
  alternative_spanish_readings:
  - «florecerá ... echará raíces» sin pronombre explícito
  - «ellos florecerán ... echarán raíces»
  rationale: El hebreo usa formas singulares masculinas para Israel como entidad colectiva. En español, conservar «él» preserva esa concordancia y la personificación del pueblo sin neutralizarla en plural.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Imagen de Líbano sin especificar cedros
  english_pob_reading: Keep the comparison as 'like Lebanon' without specifying cedars.
  chosen_spanish_reading: Conservar «como el Líbano» sin introducir «cedros».
  alternative_spanish_readings:
  - «como los cedros del Líbano»
  - «como el Líbano, famoso por sus cedros»
  rationale: El hebreo nombra Líbano directamente. Aunque la asociación con sus árboles es legítima, el texto no la explicita; por eso se preserva la comparación abierta en el cuerpo principal.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del audit trail al preferir una traducción idiomática para la imagen de raíces: en español, «echar raíces» comunica de forma natural el sentido de arraigo firme que el inglés revisado expresa con «take root». También se mantuvo la decisión auditada de no importar «cedros» al texto principal.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino en la edición española del proyecto cuando corresponda en el contexto, aunque este versículo no lo menciona explícitamente.
  - «Israel» se trata como colectivo singular masculino para reflejar la morfología hebrea.
  - «Líbano» se conserva sin glosa interpretativa en el texto principal.
  - La puntuación sigue el español estándar con punto y coma para separar las dos imágenes paralelas.
