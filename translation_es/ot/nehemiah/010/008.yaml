  rationale: Nombre propio hebreo con elemento teofórico. En español bíblico la forma ‘Abías’ es clara y reconocible, y preserva el valor nominal sin traducir el nombre.
- source_word: מִיָּמִן
  english_pob_choice: Mijamin
  chosen_spanish: Mijamín
  alternatives_spanish:
  - Miamín
  - Miniamín
  lexicon: nombre propio
  rationale: Nombre propio en una lista de personas; se translitera en español con acentuación gráfica para reflejar la pronunciación natural. ‘Mijamín’ conserva la forma del hebreo de manera transparente.
translation_notes:
  revision_awareness: El texto hebreo y la auditoría inglesa coinciden plenamente en que se trata de una simple lista de nombres propios sin variación textual ni decisión teológica adicional; por eso la versión española mantiene transliteración directa y una única nota de alternativas gráficas.
  spanish_consistency_notes:
  - Se conservó el orden de los tres nombres tal como aparece en el texto fuente.
  - No se añadió verbo ni conector, porque el hebreo presenta solo una lista nominal.
  - La nota al pie marca solo la variación de transliteración, ya que no hay tensión semántica o textual en este versículo.
