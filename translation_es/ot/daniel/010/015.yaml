  glossary_alignment: 'No hay términos del glosario mayor en juego. Las decisiones léxicas principales están bien alineadas con el rastro inglés y la evidencia hebrea. La única corrección recomendada es ajustar וְנֶאֱלָמְתִּי a un español menos rígido: «me quedé sin habla».'
