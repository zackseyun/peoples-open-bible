translation:
  language: es
  text: 'El hombre dijo: «Se han ido de aquí, porque oí que decían[b]: “Vayamos a Dotán[a]”». Entonces José fue tras sus hermanos y los encontró en Dotán.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo usa en el nombre del lugar una terminación direccional, literalmente algo como «hacia Dotán». El español lo expresa simplemente con «a Dotán».
    reason: cultural_note
  - marker: b
    text: 'O: «oí decir».'
    reason: lexical_alternative
lexical_decisions:
- source_word: נָסְעוּ
  english_pob_choice: have moved on
  chosen_spanish: se han ido
  alternatives_spanish:
  - han partido
  - se han marchado
  - han seguido adelante
  lexicon: HALOT
  rationale: נסע en contexto narrativo expresa que una caravana o grupo levanta campamento y se va. En español, «se han ido» comunica el desplazamiento sin introducir la imagen de campamento que el texto no explicita en esta frase.
- source_word: מִזֶּה
  english_pob_choice: from here
  chosen_spanish: de aquí
  alternatives_spanish:
  - de este lugar
  - de acá
  lexicon: HALOT
  rationale: El deíctico apunta al lugar inmediato. «De aquí» es natural, directo y conserva la referencia espacial presente en el hebreo.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  lexicon: HALOT
  rationale: Aquí introduce la razón de la afirmación del hombre. «Porque» expresa con claridad la fuerza causal.
- source_word: שָׁמַעְתִּי אֹמְרִים
  english_pob_choice: I heard them saying
  chosen_spanish: oí que decían
  alternatives_spanish:
  - los oí decir
  - oí decir
  lexicon: HALOT
  rationale: La construcción hebrea combina oír con un participio de habla. «Oí que decían» mantiene el contenido reportado de forma natural en español y evita forzar un calco poco idiomático.
- source_word: נֵלְכָה
  english_pob_choice: Let us go
  chosen_spanish: Vayamos
  alternatives_spanish:
  - Vayamos allá
  - Vamos a ir
  lexicon: HALOT
  rationale: El cohortativo plural transmite una invitación/propuesta conjunta. «Vayamos» conserva bien ese matiz deliberativo en español.
- source_word: דֹּתָיְנָה
  english_pob_choice: to Dothan
  chosen_spanish: a Dotán
  alternatives_spanish:
  - hacia Dotán
  - para Dotán
  lexicon: HALOT
  rationale: El sufijo direccional hebreo indica movimiento hacia el lugar. En español se expresa naturalmente con «a Dotán»; la forma «Dotán» conserva el topónimo bíblico en transliteración.
- source_word: אַחַר אֶחָיו
  english_pob_choice: after his brothers
  chosen_spanish: tras sus hermanos
  alternatives_spanish:
  - detrás de sus hermanos
  - en pos de sus hermanos
  lexicon: HALOT
  rationale: אַחַר indica seguimiento. «Tras sus hermanos» suena natural y preserva la idea de ir detrás de ellos sin añadir connotaciones de persecución.
- source_word: וַיִּמְצָאֵם
  english_pob_choice: found them
  chosen_spanish: los encontró
  alternatives_spanish:
  - dio con ellos
  - los halló
  lexicon: HALOT
  rationale: מצא en narrativa se traduce normalmente como «encontrar». «Los encontró» es claro, idiomático y fiel al valor verbal del hebreo.
- source_word: בְּדֹתָן
  english_pob_choice: at Dothan
  chosen_spanish: en Dotán
  alternatives_spanish:
  - en la ciudad de Dotán
  - allí en Dotán
  lexicon: HALOT
  rationale: Para una ubicación de lugar, el español suele usar «en». Aunque el inglés audit trail opta por «at» como localización puntual, el hebreo solo sitúa a los hermanos en la localidad; «en Dotán» es la forma más natural y precisa.
translation_notes:
  revision_awareness: El borrador sigue de cerca el hebreo y el audit trail inglés, sin cambios de sentido respecto de la última revisión; mantiene la progresión narrativa, el matiz causal de כִּי y la dirección hacia Dotán sin sobreinterpretar el movimiento.
  spanish_consistency_notes:
  - Se mantiene «Dotán» como transliteración del topónimo, coherente con el conjunto bíblico en español del proyecto.
  - Se usa «José» para יוֹסֵף y «sus hermanos» para אֶחָיו, en concordancia con la práctica estándar del POB.
  - No se introduce terminología eclesiástica ni se añade información ausente del texto fuente.
