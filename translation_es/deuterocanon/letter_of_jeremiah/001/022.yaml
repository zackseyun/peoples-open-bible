translation:
  language: es
  text: Por tanto, sabrán que no son dioses[a]; por tanto, no los teman.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «no son dioses»; los pronombres se refieren a las imágenes idolátricas en discusión y, por extensión, a los supuestos dioses que representan.'
