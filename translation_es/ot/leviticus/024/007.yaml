translation:
  language: es
  text: Y pondrás sobre cada hilera[a] olíbano puro, y será para el pan como porción memorial[b], una ofrenda por fuego para Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el arreglo»; en este contexto se refiere a las hileras ordenadas del pan.
    reason: lexical_alternative
  - marker: b
    text: O «una ofrenda alimentaria».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתָּ
  english_pob_choice: And you shall put
  chosen_spanish: Y pondrás
  alternatives_spanish:
  - Y colocarás
  - Y colocarás sobre
  lexicon: HALOT
  rationale: La forma verbal en contexto instructivo tiene valor de mandato. «Pondrás» es natural en español y conserva la instrucción ritual sin añadir paráfrasis.
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - encima de
  - sobre la
  lexicon: HALOT
  rationale: El hebreo indica colocación encima de algo. «Sobre» comunica con claridad la relación espacial y ritual.
- source_word: הַמַּעֲרֶכֶת
  english_pob_choice: each row
  chosen_spanish: la hilera
  alternatives_spanish:
  - el arreglo
  - la disposición
  - cada fila
  lexicon: HALOT
  rationale: En el contexto del pan de la Presencia, el término se refiere a la disposición ordenada de los panes. «Hilera» conserva la imagen de orden lineal y suena natural en español; el matiz distributivo queda implícito por el contexto inmediato.
- source_word: לְבֹנָה זַכָּה
  english_pob_choice: pure frankincense
  chosen_spanish: incienso puro
  alternatives_spanish:
  - लबano puro
  - olíbano puro
  - incienso limpio
  lexicon: HALOT
  rationale: «לבונה» es la resina aromática usada cultualmente; en español bíblico comúnmente se vierte «incienso» cuando el contexto es sacrificial. «Puro» conserva זַכָּה como pureza ritual.
- source_word: וְהָיְתָה
  english_pob_choice: and it shall be
  chosen_spanish: y será
  alternatives_spanish:
  - y servirá
  - y quedará
  lexicon: HALOT
  rationale: La cópula expresa función/resultación del incienso respecto del pan. «Será» mantiene la sencillez del hebreo.
- source_word: לַלֶּחֶם
  english_pob_choice: for the bread
  chosen_spanish: para el pan
  alternatives_spanish:
  - para el pan de la Presencia
  - para el pan
  - para los panes
  lexicon: HALOT
  rationale: El singular hebreo puede referirse colectivamente al pan de la proposición. «Pan» preserva el término base sin imponer una expansión explicativa en el texto principal.
- source_word: לְאַזְכָּרָה
  english_pob_choice: as a memorial portion
  chosen_spanish: como porción memorial
  alternatives_spanish:
  - como memorial
  - como recuerdo
  - como porción para memoria
  lexicon: HALOT
  rationale: El sustantivo cultual tiene sentido representativo ante Dios. «Porción memorial» conserva el valor sacrificial y la idea de una porción asignada a la conmemoración ritual.
- source_word: אִשֶּׁה
  english_pob_choice: a food offering
  chosen_spanish: ofrenda encendida
  alternatives_spanish:
  - ofrenda por fuego
  - ofrenda ígnea
  - ofrenda consumida por el fuego
  lexicon: HALOT
  rationale: El término técnico sacerdotal alude a una ofrenda hecha por fuego. «Ofrenda encendida» mantiene la relación con el fuego sin caer en una construcción demasiado pesada. Se conserva la alternativa más literal en nota.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - de Yahvé
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Nombre divino: «Yahvé». «Para» encaja con el lenguaje sacrificial de destino/ofrecimiento.'
theological_decisions:
- issue: Representación del Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo contiene el Tetragrámaton directamente, y la política del proyecto pide verterlo como «Yahvé». Se evita el enmascaramiento litúrgico, manteniendo la identificación del Nombre del pacto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido cultual de לְאַזְכָּרָה
  english_pob_reading: as a memorial portion
  chosen_spanish_reading: como porción memorial
  alternative_spanish_readings:
  - como memorial
  - como porción para memoria
  rationale: Se preserva la tensión entre recuerdo y función litúrgica representativa. «Porción memorial» no reduce el término a una mera evocación psicológica.
  doctrine_reference: Levitical sacrificial terminology; cultic memorial function
- issue: Valor técnico de אִשֶּׁה
  english_pob_reading: a food offering
  chosen_spanish_reading: ofrenda encendida
  alternative_spanish_readings:
  - ofrenda por fuego
  - ofrenda ígnea
  rationale: El término designa una ofrenda presentada por fuego a Dios. La redacción española mantiene el referente sacrificial sin perder legibilidad, y la nota conserva la alternativa más literal.
  doctrine_reference: Priestly offering terminology
translation_notes:
  revision_awareness: Concordancia alta con el expediente inglés y sin revisiones aplicadas en la pasada más reciente; se mantiene la lectura óptima y se preservan en nota las alternativas léxicas significativas.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה, conforme a la terminología del proyecto.
  - Se mantiene «ofrenda encendida» para אִשֶּׁה, con nota que preserva la alternativa literal.
  - Se evita expandir «pan» a «pan de la Presencia» en el texto principal para no añadir interpretación no explicitada en el hebreo de este versículo.
  - El orden de los complementos sigue de cerca el hebreo para conservar la relación ritual entre el incienso, el pan y la porción memorial.
