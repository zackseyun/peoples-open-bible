translation:
  language: es
  text: Tarsis era tu[a] socio comercial por causa de tu abundante riqueza; con plata, hierro, estaño y plomo pagaron por tus mercaderías[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Tarsis puede referirse a una región comercial lejana, identificada por algunos con Tartesos en España.
    reason: cultural_note
  - marker: b
    text: 'O: «dieron por tus mercaderías». El hebreo dice simplemente «dieron», pero aquí funciona en contexto comercial.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «tu mercancía» o «tus bienes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּרְשִׁישׁ
  english_pob_choice: Tarshish
  chosen_spanish: Tarsis
  alternatives_spanish:
  - Tartesos
  lexicon: HALOT
  rationale: Se conserva el nombre propio como topónimo transliterado, siguiendo la decisión auditada del inglés. En español, «Tarsis» es la forma breve y reconocible; «Tartesos» queda como posible identificación cultural, no como traducción del nombre.
- source_word: סֹחַרְתֵּךְ
  english_pob_choice: your trader
  chosen_spanish: tu comerciante
  alternatives_spanish:
  - tu mercader
  - tu socio comercial
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo singular femenino con sufijo de 2.ª persona singular, referido a Tiro personificada. «Comerciante» conserva la fuerza mercantil sin forzar plural ni suavizar el sentido comercial.
- source_word: מֵרֹב כָּל הוֹן
  english_pob_choice: because of your abundant wealth
  chosen_spanish: por causa de tu abundante riqueza
  alternatives_spanish:
  - a causa de tu gran riqueza
  - por la abundancia de toda riqueza
  lexicon: HALOT
  rationale: La preposición y el contexto indican causalidad/explanación. «Riqueza» comunica היטב הוֹן; «abundante» mantiene la intensificación de רֹב sin volverlo redundante.
- source_word: בְּכֶסֶף בַּרְזֶל בְּדִיל וְעוֹפֶרֶת
  english_pob_choice: with silver, iron, tin, and lead
  chosen_spanish: con plata, hierro, estaño y plomo
  alternatives_spanish:
  - en plata, hierro, estaño y plomo
  lexicon: HALOT
  rationale: La serie de instrumentos/medios de pago se expresa naturalmente en español con «con», como en un intercambio comercial. Se conserva la enumeración material sin explicitar más de lo que el hebreo permite.
- source_word: נָתְנוּ
  english_pob_choice: they paid
  chosen_spanish: pagaron
  alternatives_spanish:
  - dieron
  - entregaron en pago
  lexicon: HALOT
  rationale: El verbo básico es «dar», pero aquí funciona en un contexto mercantil. «Pagaron» conserva el valor comercial que el inglés audita, sin perder la simplicidad verbal del hebreo.
- source_word: עִזְבוֹנָיִךְ
  english_pob_choice: your wares
  chosen_spanish: tus mercaderías
  alternatives_spanish:
  - tus bienes
  - tu mercancía
  lexicon: HALOT
  rationale: El término designa artículos de comercio. «Mercaderías» es preciso, pluralizable y natural en español bíblico contemporáneo; evita la posible estrechez de «bienes» y la singularidad algo menos idiomática de «mercancía».
theological_decisions:
- issue: Lectura comercial de נָתְנוּ en un contexto de intercambio
  english_pob_reading: they paid
  chosen_spanish_reading: pagaron
  alternative_spanish_readings:
  - dieron
  - entregaron en pago
  rationale: No se atenúa la transacción a un «dar» genérico, porque el contexto de Ezequiel 27 es una lista de comercio internacional. «Pagaron» hace explícita la función económica sin añadir contenido ajeno.
  doctrine_reference: n/a
translation_notes:
  revision_awareness: Se siguió el pasaje base sin cambios de revisión recientes; la redacción española mantiene el acuerdo alto del control de revisión, conservando el sentido mercantil y el topónimo transliterado.
  spanish_consistency_notes:
  - Se mantuvo la distinción entre nombre propio («Tarsis») y función comercial («tu comerciante»).
  - Se prefirió «mercaderías» para עִזְבוֹנָיִךְ por ser un término comercial natural en español y coherente con el contexto de intercambio.
  - Se usó puntuación española y se preservó la cadencia enumerativa del hebreo.
