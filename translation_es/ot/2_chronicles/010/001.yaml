translation:
  language: es
  text: Roboam fue a Siquem, pues todo Israel habían venido a Siquem para hacerlo rey.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - fue
  - se dirigió
  - partió
  lexicon: HALOT
  rationale: El wayyiqtol de הלך avanza la narración con el sentido simple de movimiento. En español, «fue» es la equivalencia más natural y directa, sin añadir matiz no explícito en el hebreo.
- source_word: רְחַבְעָם
  english_pob_choice: Rehoboam
  chosen_spanish: Robam
  alternatives_spanish:
  - Roboam
  - Rehoboam
  lexicon: convención española bíblica / transliteración
  rationale: Se translitera el nombre propio en forma breve y readable para español bíblico. «Robam» refleja la forma acostumbrada en español sin cargar una vocalización ajena al registro receptor.
- source_word: שְׁכֶמָה
  english_pob_choice: to Shechem
  chosen_spanish: a Siquem
  alternatives_spanish:
  - a Siquem
  - hacia Siquem
  lexicon: HALOT
  rationale: El he direccional señala destino. En español, «a Siquem» comunica la misma dirección de manera idiomática y natural.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: pues
  alternatives_spanish:
  - pues
  - porque
  - ya que
  lexicon: HALOT
  rationale: Aquí כִּי introduce la razón de la acción. «Pues» conserva el vínculo causal con un registro formal y no demasiado explicativo.
- source_word: שְׁכֶם
  english_pob_choice: to Shechem
  chosen_spanish: Siquem
  alternatives_spanish:
  - Siquem
  - la ciudad de Siquem
  lexicon: HALOT
  rationale: La repetición del topónimo en hebreo se entiende por el contexto de movimiento y llegada. En español no es necesario duplicar la preposición; basta con el nombre de lugar como complemento natural dentro de la cláusula causal.
- source_word: בָּאוּ
  english_pob_choice: had come
  chosen_spanish: había venido
  alternatives_spanish:
  - había venido
  - habían llegado
  lexicon: HALOT
  rationale: El qatal en la cláusula causal refiere una acción anterior a «fue». «Había venido» conserva la anterioridad sin sobrecargar el texto; «habían llegado» sería posible, pero añade una matización de arribo más específica.
- source_word: כָל יִשְׂרָאֵל
  english_pob_choice: all Israel
  chosen_spanish: todo Israel
  alternatives_spanish:
  - todo Israel
  - todo el Israel
  lexicon: HALOT
  rationale: La expresión colectiva mantiene el alcance nacional/covenantal. «Todo Israel» es la forma más idiomática y conserva la fuerza de totalidad del hebreo.
- source_word: לְהַמְלִיךְ
  english_pob_choice: to make him king
  chosen_spanish: para hacerlo rey
  alternatives_spanish:
  - para hacerlo rey
  - para proclamarlo rey
  - para coronarlo rey
  lexicon: HALOT
  rationale: El hiphil de מלך expresa causar que alguien reine. «Hacerlo rey» reproduce bien esa fuerza causal sin añadir ceremonia implícita. Se evita «coronarlo» y «proclamarlo» por ser más específicos que el hebreo.
- source_word: אֹתוֹ
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - lo
  - a él
  lexicon: pronombre objeto directo
  rationale: El pronombre objeto directo en español se integra de forma natural en «hacerlo rey», preservando la referencia a Robam/Rehoboam sin redundancia.
theological_decisions:
- issue: Relación causal entre la llegada de Israel y la ida de Robam/Rehoboam
  english_pob_reading: for all Israel had come to Shechem to make him king
  chosen_spanish_reading: pues todo Israel había venido a Siquem para hacerlo rey
  alternative_spanish_readings:
  - porque todo Israel había venido a Siquem para hacerlo rey
  - ya que todo Israel había venido a Siquem para hacerlo rey
  rationale: El hebreo כִּי marca la razón de la acción. «Pues» mantiene una causalidad sencilla y formal, en línea con la revisión inglesa que prefirió «for» por su tono directo.
  doctrine_reference: Ninguna; decisión discursiva y sintáctica.
translation_notes:
  revision_awareness: La redacción sigue el ajuste del audit trail inglés desde una causalidad más explicativa hacia una forma más formal y sobria («for» -> «pues»). También conserva la secuencia temporal anterior con pluscuamperfecto («había venido»), como hizo la POB inglesa con «had come».
  spanish_consistency_notes:
  - Se mantiene el topónimo «Siquem» de forma consistente en ambas menciones.
  - Se conserva un registro bíblico moderno y formal, sin calcos innecesarios.
  - La cláusula final reproduce el valor causativo del infinitivo hiphil con «hacerlo rey», evitando añadir una imagen de coronación no presente en el hebreo.
