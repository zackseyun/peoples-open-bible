translation:
  language: es
  text: En el noveno año de Zedequías, rey de Judá, en el décimo mes, llegó Nabucodonosor[a], rey de Babilonia, con todo su ejército a Jerusalén, y sitiaron la ciudad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Nebucadrezar»; tradicionalmente se lo traduce como «Nabucodonosor» en español.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּשָּׁנָה הַתְּשִׁעִית
  english_pob_choice: In the ninth year
  chosen_spanish: En el noveno año
  alternatives_spanish:
  - En el año nueve
  lexicon: HALOT
  rationale: La expresión temporal hebrea se vierte de forma natural y formal en español como «en el noveno año», conservando el valor ordinal del texto fuente.
- source_word: לְצִדְקִיָּהוּ
  english_pob_choice: of Zedekiah
  chosen_spanish: de Zedequías
  alternatives_spanish:
  - de Sedecías
  lexicon: HALOT
  rationale: Se translitera el nombre propio con la forma habitual en español bíblico moderno, «Zedequías», manteniendo la identificación histórica sin latinizarlo innecesariamente.
- source_word: מֶלֶךְ יְהוּדָה
  english_pob_choice: king of Judah
  chosen_spanish: rey de Judá
  alternatives_spanish:
  - monarca de Judá
  lexicon: HALOT
  rationale: La cadena constructa se reproduce con el título real directo y transparente «rey de Judá».
- source_word: בַּחֹדֶשׁ הָעֲשִׂרִי
  english_pob_choice: in the tenth month
  chosen_spanish: en el décimo mes
  alternatives_spanish:
  - en el mes décimo
  lexicon: HALOT
  rationale: «Décimo mes» conserva el ordinal y resulta idiomático y claro en español.
- source_word: בָּא
  english_pob_choice: came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - arribó
  lexicon: HALOT
  rationale: Aunque el verbo básico puede traducirse como «vino» o «llegó», aquí «llegó» suena natural en español sin perder el valor de movimiento de entrada a la escena.
- source_word: נְבוּכַדְרֶאצַּר
  english_pob_choice: Nebuchadnezzar
  chosen_spanish: Nabucodonosor
  alternatives_spanish:
  - Nabucodrézor
  lexicon: HALOT
  rationale: Se adopta la forma española tradicional y ampliamente reconocible «Nabucodonosor», en continuidad con la práctica bíblica estándar en español, aunque el hebreo se acerque más a una forma con -dr-.
- source_word: מֶלֶךְ בָּבֶל
  english_pob_choice: king of Babylon
  chosen_spanish: rey de Babilonia
  alternatives_spanish:
  - monarca de Babilonia
  lexicon: HALOT
  rationale: Se conserva la construcción titulativa directa «rey de Babilonia».
- source_word: וְכָל חֵילוֹ
  english_pob_choice: with all his army
  chosen_spanish: con todo su ejército
  alternatives_spanish:
  - y todo su ejército
  - con todas sus fuerzas
  lexicon: HALOT
  rationale: חֵיל en contexto militar se vierte por «ejército». La preposición «con» refleja la compañía o acompañamiento del ejército en la marcha hacia Jerusalén.
- source_word: אֶל יְרוּשָׁלִַם
  english_pob_choice: to Jerusalem
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - contra Jerusalén
  lexicon: HALOT
  rationale: Se mantiene el valor básico direccional de אֶל como «a», sin introducir hostilidad en esta preposición, ya que el acto bélico se expresa en la cláusula siguiente.
- source_word: וַיָּצֻרוּ עָלֶיהָ
  english_pob_choice: and they laid siege to it
  chosen_spanish: y la sitiaron
  alternatives_spanish:
  - y pusieron sitio a ella
  - y la cercaron
  lexicon: HALOT
  rationale: El verbo de sitio se traduce con el verbo español directo «sitió/sitiaron», que preserva con claridad la acción militar y su sentido técnico.
theological_decisions:
- issue: Forma del nombre divino en este versículo
  english_pob_reading: No occurrence in the verse; the source has the historical king names and titles only.
  chosen_spanish_reading: No aparece el nombre divino en este versículo; no se introduce ninguna forma como Yahvé.
  alternative_spanish_readings:
  - No aplica
  rationale: No hay decisión teológica directa en el texto porque no contiene el tetragrámaton ni un título divino; por tanto, no se añade ni se sustituye nada.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El texto base inglés no requirió correcciones en la auditoría más reciente; la traducción española sigue directamente el hebreo WLC y el audit trail inglés sin cambios textuales añadidos por revisión.
  spanish_consistency_notes:
  - Se mantiene «rey de Judá» y «rey de Babilonia» como títulos regios directos y consistentes.
  - Se usa «Nabucodonosor» por forma española establecida, aun reconociendo en la auditoría inglesa la cercanía del hebreo a «Nebuchadrezzar».
  - No se recurre a «SEÑOR» ni a otras sustituciones teológicas porque el versículo no contiene referencia al nombre divino.
  - 'La sintaxis española conserva el orden temporal del hebreo de manera natural: fecha del año, mes, llegada, y luego el sitio.'
