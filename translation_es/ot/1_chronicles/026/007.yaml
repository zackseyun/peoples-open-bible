  - hombres valientes
  - hombres aptos
  rationale: No se fuerza un sentido militar donde el contexto es una lista de levitas/genealogía de servicio. «Hombres capaces» mantiene la amplitud semántica de חָיִל y el énfasis funcional del contexto.
