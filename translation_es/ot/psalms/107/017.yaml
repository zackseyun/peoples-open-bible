    rationale: La auditoría inglesa conserva alternativas relevantes para las preposiciones causales («de/des­de»), para «transgression/rebellion» y para «iniquities/sins/guilt». El borrador español solo anota «necios», omitiendo alternativas significativas que podrían ayudar al lector y a la trazabilidad editorial.
