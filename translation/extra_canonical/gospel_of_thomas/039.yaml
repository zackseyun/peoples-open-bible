greek_overlap_decision:
  witness: POxy 655 (fr. B, col. right)
  agreement: minor_divergence
  chosen_basis: coptic
  rationale: 'The Greek witness aligns in substance (‘received the keys… hid them;
    neither entered nor permitted those who would enter; become wise as serpents and
    guileless as doves’). The main difference is number in the simile: Greek presents
    plurals (‘serpents/doves’), while Coptic uses generic singular (‘the serpent/the
    dove’). The draft follows the Coptic generic singular to preserve Thomas’ diction,
    noting the Greek plural in a footnote.'
