id: 1CLEM.09
reference: 1 Clement 9
unit: chapter
book: 1 Clement
source:
  edition: Funk 1901 (normalized OCR)
  text: Διὸ ὑπακούσωμεν τῇ μεγαλοπρεπεῖ καὶ ἐνδόξῳ βουλήσει αὐτοῦ, καὶ ἱκέται γενόμενοι τοῦ ἐλέους καὶ τῆς χρηστότητος αὐτοῦ προσπέσωμεν καὶ ἐπιστρέψωμεν ἐπὶ τοὺς οἰκτιρμοὺς αὐτοῦ, ἀπολιπόντες τὴν ματαιοπονίαν τήν τε ἔριν καὶ τὸ εἰς θάνατον ἄγον ζῆλος. 2. ἀτενίσωμεν εἰς τοὺς τελείως λειτουργήσαντας τῇ μεγαλοπρεπεῖ δόξῃ αὐτοῦ. 3. λάβωμεν Ἐνώχ, ὃς ἐν ὑπακοῇ δικαίως εὑρεθεὶς μετετέθη, καὶ οὐχ εὑρέθη αὐτοῦ θάνατος. 4. Νῶε πιστὸς εὑρεθεὶς διὰ τῆς λειτουργίας αὐτοῦ παλιγγενεσίαν κόσμῳ ἐκήρυξεν, καὶ διέσωσεν δι’ αὐτοῦ ὁ δεσπότης τὰ εἰσελθόντα ἐν ὁμοίᾳ ζῷα εἰς τὴν κιβωτόν.
  language: Greek
  pages:
  - 273
  note: This chapter comes from the normalized Funk 1901 OCR layer.
translation:
  text: 'Therefore let us obey his majestic and glorious purpose[a], and, becoming suppliants of his mercy and kindness, let us fall before him and turn to his compassions, leaving behind fruitless labor, as well as strife and the jealousy that leads to death.


    Let us fix our gaze on those who ministered perfectly to his majestic glory.


    Let us take Enoch, who, having been found righteous in obedience, was taken up, and his death was not found.


    Noah, having been found faithful, through his ministry proclaimed regeneration to the world[b][c][d][d][d], and through him the Master saved the animals that entered the ark in pairs.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The wording 'his death was not found' closely follows the Greek's unusual expression and echoes scriptural language about Enoch rather than paraphrasing the sense.
    reason: lexical_alternative
    anchor_ref: '9:3'
  - marker: d
    text: Or 'renewal' or 'new beginning' for 'regeneration.' The Greek term is παλιγγενεσία, a weighty word for rebirth or renewal.
    reason: lexical_alternative
    anchor_ref: '9:4'
  - marker: d
    text: '''The Master'' renders δεσπότης, a term of absolute authority distinct from κύριος (''Lord'').'
    reason: lexical_alternative
    anchor_ref: '9:4'
  - marker: d
    text: The final phrase refers to the animals entering the ark as corresponding pairs; compare the flood narrative in Genesis 6–7.
    reason: cross_reference
    anchor_ref: '9:4'
  - marker: c
    text: Or 'was transferred'.
    reason: previous_rendering
  - marker: b
    text: Or 'in harmony, two by two'.
    reason: previous_rendering
lexical_decisions:
- source_word: βουλήσει
  chosen: purpose
  alternatives:
  - counsel
  - plan
  - will
  lexicon: LSJ
  rationale: βουλή can denote counsel, resolve, or purpose. 'Purpose' preserves both deliberateness and divine intentionality in idiomatic English without sounding overly abstract.
- source_word: ἱκέται
  chosen: suppliants
  alternatives:
  - petitioners
  - beggars
  lexicon: LSJ
  rationale: The term carries a formal sense of one seeking mercy from a superior. 'Suppliants' preserves the elevated paraenetic and liturgical tone better than the flatter 'petitioners.'
- source_word: προσπέσωμεν
  chosen: let us fall before him
  alternatives:
  - let us prostrate ourselves
  - let us fall down
  lexicon: LSJ
  rationale: The verb suggests falling before someone in entreaty. 'Fall before him' keeps the bodily and reverential force while remaining readable.
- source_word: ἐπιστρέψωμεν ἐπὶ τοὺς οἰκτιρμοὺς αὐτοῦ
  chosen: turn to his compassions
  alternatives:
  - return to his mercies
  - turn toward his pity
  lexicon: BDAG
  rationale: οἰκτιρμοί is plural and concrete in force. 'Compassions' preserves the plural and the affective sense better than the more generalized 'mercy'.
- source_word: ματαιοπονίαν
  chosen: fruitless toil
  alternatives:
  - vain labor
  - futility
  lexicon: LSJ
  rationale: The compound suggests labor that comes to nothing, not mere abstract vanity. 'Fruitless toil' captures both effort and emptiness.
- source_word: ζῆλος
  chosen: jealousy
  alternatives:
  - zeal
  - envy
  lexicon: BDAG
  rationale: In this moral context, especially with 'leading to death,' the negative sense is intended. 'Jealousy' fits the paraenetic warning better than the more ambiguous 'zeal.'
- source_word: τελείως λειτουργήσαντας
  chosen: ministered perfectly
  alternatives:
  - served fully
  - performed sacred service completely
  lexicon: LSJ
  rationale: λειτουργέω can denote service, often with cultic or public overtones. 'Ministered' preserves ecclesial texture; 'perfectly' reflects τελείως without overexpansion.
- source_word: δόξῃ
  chosen: glory
  alternatives:
  - majesty
  - splendor
  lexicon: BDAG
  rationale: '''Glory'' is the standard theological rendering and fits the elevated style, while ''majestic'' already renders μεγαλοπρεπεῖ.'
- source_word: μετετέθη
  chosen: was transferred
  alternatives:
  - was taken up
  - was removed
  lexicon: BDAG
  rationale: The verb means to transfer or remove. 'Was transferred' stays close to the Greek and avoids importing later interpretive language beyond the text.
- source_word: οὐχ εὑρέθη αὐτοῦ θάνατος
  chosen: his death was not found
  alternatives:
  - death was not found for him
  - he did not experience death
  lexicon: LSJ
  rationale: The Greek is unusual and allusive. This rendering preserves the wording's strangeness and scriptural cadence rather than resolving it interpretively.
- source_word: πιστὸς
  chosen: faithful
  alternatives:
  - trustworthy
  - believing
  lexicon: BDAG
  rationale: For Noah, 'faithful' best captures covenantal reliability and obedience without narrowing the term to inward belief alone.
- source_word: λειτουργίας
  chosen: ministry
  alternatives:
  - service
  - priestly service
  lexicon: BDAG
  rationale: The noun carries service with possible sacred/public resonance. 'Ministry' preserves ecclesial texture and links with the previous λειτουργήσαντας.
- source_word: παλιγγενεσίαν
  chosen: regeneration
  alternatives:
  - new birth
  - renewal
  - rebirth
  lexicon: BDAG
  rationale: The term is theologically weighty and likely refers to the world's renewal through the flood. 'Regeneration' preserves that weight and leaves the precise nuance open for readers and later annotation.
- source_word: δεσπότης
  chosen: the Master
  alternatives:
  - the Lord
  - the Sovereign
  lexicon: BDAG
  rationale: δεσπότης is distinct from κύριος and denotes absolute authority. 'The Master' preserves that distinction in English.
- source_word: ἐν ὁμοίᾳ ζῷα
  chosen: the living creatures that entered the ark in harmony, two by two
  alternatives:
  - the animals that entered in pairs
  - the creatures of matching kind
  lexicon: LSJ
  rationale: The phrase is compressed and refers to the paired entry of animals. 'In harmony, two by two' preserves something of ὁμοίᾳ while making the sense intelligible in English.
theological_decisions:
- issue: Meaning of παλιγγενεσίαν κόσμῳ ἐκήρυξεν in Noah clause
  chosen_reading: Noah proclaimed regeneration to the world
  alternative_readings:
  - Noah proclaimed a new beginning to the world
  - Noah heralded renewal for the world
  rationale: The Greek uses the theologically charged παλιγγενεσία. Retaining 'regeneration' preserves lexical transparency and allows later readers to assess whether Clement intends cosmic renewal, a fresh start after judgment, or a broader theological motif.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering of μετετέθη for Enoch
  chosen_reading: was transferred
  alternative_readings:
  - was taken up
  - was removed
  rationale: The text echoes scriptural language about Enoch without explicitly specifying the mode. A less interpretive rendering best preserves the source's restraint.
  doctrine_reference: Original-language primacy over translation tradition.
