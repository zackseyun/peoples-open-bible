    text: Or 'he sent messengers to meet them'; the Hebrew does not state the object explicitly, though messengers are naturally implied.
    reason: lexical_alternative
  - marker: b
    text: '''Greatly humiliated'' could also be rendered ''deeply ashamed'' or ''utterly disgraced.'''
    reason: lexical_alternative
