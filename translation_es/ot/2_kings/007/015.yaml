translation:
  language: es
  text: Fueron tras ellos hasta el Jordán, y he aquí que todo el camino estaba lleno de vestiduras y enseres[a] que Aram había arrojado en su huida apresurada. Entonces los mensajeros[b] volvieron e informaron al rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo כֵלִים, término amplio que puede significar «enseres», «implementos», «equipo», «artículos» o «provisiones», según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «los exploradores volvieron»; hebreo מַלְאָכִים significa literalmente «mensajeros», pero en este contexto son los hombres enviados a investigar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלְכוּ
  english_pob_choice: So they went
  chosen_spanish: Así fueron
  alternatives_spanish:
  - Y fueron
  - Entonces fueron
  lexicon: HALOT
  rationale: La forma narrativa consecutiva requiere una transición natural en español. «Así fueron» conserva la secuencia sin añadir matices ajenos.
- source_word: אַחֲרֵיהֶם
  english_pob_choice: after them
  chosen_spanish: tras ellos
  alternatives_spanish:
  - detrás de ellos
  - en persecución de ellos
  lexicon: HALOT
  rationale: «Tras ellos» reproduce de forma breve y natural la idea de seguir/perseguir sin volverla más interpretativa que el hebreo.
- source_word: עַד הַיַּרְדֵּן
  english_pob_choice: as far as the Jordan
  chosen_spanish: hasta el Jordán
  alternatives_spanish:
  - hasta el río Jordán
  - a Jordán
  lexicon: HALOT
  rationale: עַד marca límite de alcance; «hasta el Jordán» comunica bien ese límite en español y mantiene la referencia geográfica directa.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí que
  alternatives_spanish:
  - y mira
  - y he aquí
  lexicon: HALOT
  rationale: «Y he aquí que» preserva el giro discursivo de atención y sorpresa del hebreo, con una forma aún reconocible en español bíblico contemporáneo.
- source_word: כָל הַדֶּרֶךְ
  english_pob_choice: the whole road
  chosen_spanish: todo el camino
  alternatives_spanish:
  - todo el रास्तo
  - toda la ruta
  lexicon: HALOT
  rationale: En contexto narrativo, «camino» es la forma más natural para el trayecto de persecución, equivalente al hebreo sin sobrecargarlo.
- source_word: מְלֵאָה
  english_pob_choice: was full of
  chosen_spanish: estaba lleno de
  alternatives_spanish:
  - estaba colmado de
  - estaba repleto de
  lexicon: HALOT
  rationale: La construcción española reproduce el estado resultante de manera idiomática y fiel.
- source_word: בְגָדִים
  english_pob_choice: garments
  chosen_spanish: vestidos
  alternatives_spanish:
  - ropas
  - prendas
  lexicon: HALOT
  rationale: «Vestidos» mantiene una referencia concreta a prendas de vestir y funciona bien en español bíblico sin sonar arcaico.
- source_word: וְכֵלִים
  english_pob_choice: equipment
  chosen_spanish: objetos[b]
  alternatives_spanish:
  - utensilios
  - implementos
  - equipo
  lexicon: HALOT
  rationale: כֵלִים es un término amplio; en español, «objetos» conserva esa amplitud. La nota explica la gama posible y evita restringirlo demasiado a «equipo» o «utensilios».
- source_word: אֲשֶׁר הִשְׁלִיכוּ
  english_pob_choice: that ... had thrown away
  chosen_spanish: que ... había arrojado
  alternatives_spanish:
  - que ... habían arrojado
  - que ... lanzaron
  lexicon: HALOT
  rationale: El verbo expresa echar/arrojar fuera; el pluscuamperfecto español («había arrojado») refleja el valor anterior al hallazgo.
- source_word: אֲרָם
  english_pob_choice: Aram
  chosen_spanish: Aram
  alternatives_spanish:
  - los arameos
  - Siria
  lexicon: HALOT
  rationale: Se conserva el nombre del texto fuente, siguiendo la decisión auditada de no sustituirlo por equivalentes tradicionales posteriores.
- source_word: בְּחָפְזָם
  english_pob_choice: in their haste
  chosen_spanish: en su prisa
  alternatives_spanish:
  - con apresuramiento
  - en su premura
  lexicon: HALOT
  rationale: «Prisa» expresa bien el estado de urgencia sin añadir la idea de pánico que el hebreo no exige.
- source_word: וַיָּשֻׁבוּ הַמַּלְאָכִים
  english_pob_choice: Then the messengers returned
  chosen_spanish: Entonces los mensajeros volvieron
  alternatives_spanish:
  - Entonces los enviados regresaron
  - Luego los mensajeros regresaron
  lexicon: HALOT
  rationale: «Mensajeros» sigue la equivalencia lexical auditada; «volvieron» reproduce el retorno narrativo con naturalidad.
- source_word: וַיַּגִּדוּ לַמֶּלֶךְ
  english_pob_choice: and reported to the king
  chosen_spanish: e informaron al rey
  alternatives_spanish:
  - y dijeron al rey
  - y dieron aviso al rey
  lexicon: HALOT
  rationale: נגד en hiphil tiene sentido de comunicar/informar; «informaron al rey» es claro y preserva el valor de reporte.
translation_notes:
  revision_awareness: 'Concordancia alta con la edición inglesa auditada; se conservan las decisiones principales: Aram como nombre fuente, מַלְאָכִים como «mensajeros» con alternativa contextual, y כֵלִים como término amplio con nota léxica. No se registran revisiones posteriores que alteren el contenido base.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» reservado para pasajes donde aparezca el tetragrámaton; aquí no aplica.
  - Se evita «SEÑOR» y también se evita introducir una lectura teológica no presente en el versículo.
  - «Jordán» y «Aram» se conservan como nombres propios transliterados de forma estable.
  - La puntuación con dos frases sigue la segmentación narrativa del hebreo y del inglés auditado.
