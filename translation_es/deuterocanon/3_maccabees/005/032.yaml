    reason: lexical_alternative
  - marker: b
    text: La expresión también puede entenderse como «y la necesidad».
    reason: lexical_alternative
  revision_rationale: Se reemplaza «agrupamiento» por «reunión» para mejorar la naturalidad del español sin perder el rango semántico documentado para συστροφή, preservando la alternativa «multitud» en nota. Se ajusta «y la necesidad» a «y por la necesidad» para reflejar con más claridad la causalidad y el paralelismo de la construcción griega.
