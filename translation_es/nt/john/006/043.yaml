review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura griega: «respondió y les dijo» refleja ἀπεκρίθη ... καὶ εἶπεν, y «entre ustedes» transmite adecuadamente μετ’ ἀλλήλων. Sin embargo, la nota sobre γογγύζω contiene un error interno porque repite «murmuren» como alternativa, y la nota de «entre ustedes» explica mal la literalidad griega.'
  spanish_quality_summary: El texto principal es claro, natural y de registro bíblico legible. «No murmuren» funciona bien en español e incluso preserva mejor que «gruñan» o «se quejen» la resonancia bíblica. La puntuación y el estilo son adecuados. Solo hace falta corregir las notas para claridad y precisión.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Jesús» es correcto. No aparece vocabulario teológicamente cargado que requiera ajuste adicional.
  issues:
  - severity: medium
    issue: La nota [a] repite «murmuren» como lectura principal y como alternativa.
    rationale: 'La nota dice: «también podría traducirse “murmuren” o “se quejen”», lo que vuelve incoherente la explicación léxica. Debe ofrecer alternativas reales como «refunfuñen» o «se quejen», o explicar por qué se prefiere «murmuren».'
  - severity: low
    issue: 'La nota [b] da una literalidad imprecisa: «con unos a otros».'
    rationale: μετ’ ἀλλήλων significa «unos con otros» / «con uno otro» en sentido recíproco. La formulación actual suena poco natural y gramaticalmente defectuosa en español.
  revised_spanish_text: 'Jesús respondió y les dijo: «No murmuren[a] entre ustedes[b]».'
  revised_footnotes:
  - marker: a
    text: El verbo también puede traducirse «refunfuñen» o «se quejen», pero «murmuren» preserva mejor su resonancia bíblica aquí.
    reason: lexical_alternative
  - marker: b
    text: O «unos con otros»; la idea es una acción recíproca dentro del grupo.
    reason: lexical_alternative
  revision_rationale: El texto principal puede mantenerse. Se revisan únicamente las notas para corregir una alternativa léxica duplicada y una explicación literal poco natural, alineándolas mejor con la evidencia griega y el rastro de auditoría en inglés.
