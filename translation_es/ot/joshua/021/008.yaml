review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: los hijos de Israel dieron a los levitas las ciudades y sus terrenos adyacentes, conforme al mandato previo de Yahvé mediado por Moisés, y la asignación fue por sorteo/lote. Sin embargo, hay dos puntos mejorables para mayor fidelidad al audit trail: (1) la nota al pie está anclada en «pastizales», pero el contenido de la nota explica «por la mano de Moisés»; el anclaje debe ir en la frase correspondiente; (2) «por sorteo» es comprensible, pero «por suertes» preserva mejor el modismo bíblico de בַּגּוֹרָל en contexto de reparto tribal sin modernizar demasiado el procedimiento.'
  spanish_quality_summary: El español es claro, natural y de registro bíblico moderno. «Los hijos de Israel», «Yahvé» y «por medio de Moisés» funcionan bien. «Pastizales» es legible, aunque algo estrecho frente al sentido de terrenos abiertos alrededor de las ciudades; aun así, no exige corrección. El problema principal de calidad formal es la ubicación incorrecta de la nota al pie.
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יְהוָה -> «Yahvé» correctamente; בְנֵי יִשְׂרָאֵל conservado como «los hijos de Israel» según el POB; לַלְוִיִּם -> «a los levitas» correcto. Para בְּיַד מֹשֶׁה, «por medio de Moisés» es una excepción estilísticamente justificada y además ya contemplada en la nota. Para בַּגּוֹרָל, recomiendo «por suertes» en vez de «por sorteo» por mejor correspondencia bíblica y contextual.'
  issues:
  - severity: medium
    issue: La nota al pie está anclada en «pastizales[a]», pero su contenido se refiere a «por la mano de Moisés».
    rationale: Esto crea una discordancia formal entre texto y nota y puede confundir al lector. El marcador debe colocarse junto a «por medio de Moisés» o frase equivalente.
  - severity: low
    issue: «Por sorteo» moderniza ligeramente בַּגּוֹרָל en un contexto clásico de reparto tribal.
    rationale: Aunque no es incorrecto, «por suertes» refleja mejor el lenguaje bíblico de asignación por lotes y se alinea más estrechamente con «by lot» del POB.
  revised_spanish_text: Así, los hijos de Israel dieron a los levitas estas ciudades con sus pastizales, como Yahvé había mandado por medio de Moisés[a], por suertes.
  revised_footnotes:
  - marker: a
    text: O «por la mano de Moisés», hebraísmo que expresa agencia mediada.
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota para que corresponda al hebraísmo בְּיַד מֹשֶׁה y se ajusta «por sorteo» a «por suertes» para reflejar mejor בַּגּוֹרָל en registro bíblico español, sin alterar el sentido del borrador.
