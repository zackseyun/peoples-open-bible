    text: Or “pressed him” for “urged him strongly”; the Hebrew idiom conveys strong insistence.
    reason: lexical_alternative
  - marker: b
    text: Literally, “he listened to their voice.”
    reason: lexical_alternative
  - marker: c
    text: “Bed” may also refer to a couch or divan in this setting.
    reason: cultural_note
