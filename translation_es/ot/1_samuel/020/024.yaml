translation:
  language: es
  text: Entonces David se escondió en el campo. Cuando llegó la luna nueva, el rey se sentó a comer la comida[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «se sentó sobre el pan para comer»; aquí «pan» representa la comida.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסָּתֵר
  english_pob_choice: hid himself
  chosen_spanish: se escondió
  alternatives_spanish:
  - se ocultó
  - se escondió a sí mismo
  lexicon: HALOT
  rationale: 'El nifal de סתר en este contexto es reflexivo/intransitivo: David toma la acción de ocultarse. «Se escondió» es natural en español y conserva mejor la intención del sujeto que una pasiva.'
- source_word: בַּשָּׂדֶה
  english_pob_choice: in the field
  chosen_spanish: en el campo
  alternatives_spanish:
  - en el campo abierto
  - en la campiña
  lexicon: HALOT
  rationale: שָׂדֶה significa normalmente «campo». «En el campo» es la correspondencia más directa y clara en español.
- source_word: וַיְהִי הַחֹדֶשׁ
  english_pob_choice: When the new moon came
  chosen_spanish: Cuando llegó la luna nueva
  alternatives_spanish:
  - Cuando vino la luna nueva
  - Cuando fue la luna nueva
  - Cuando comenzó el mes
  lexicon: HALOT
  rationale: En este contexto narrativo, הַחֹדֶשׁ designa la ocasión de la luna nueva, no solo el mes como abstracción. «Llegó la luna nueva» mantiene el valor temporal/eventual de la frase y suena natural en español.
- source_word: וַיֵּשֶׁב
  english_pob_choice: sat down
  chosen_spanish: se sentó
  alternatives_spanish:
  - tomó asiento
  - se puso a sentarse
  lexicon: HALOT
  rationale: ישב en contexto de comida se expresa de forma natural como «se sentó». Conserva la acción de tomar asiento para la comida.
- source_word: עַל הַלֶּחֶם
  english_pob_choice: at the meal
  chosen_spanish: para comer el pan
  alternatives_spanish:
  - a comer el pan
  - sobre el pan
  - en la comida
  lexicon: HALOT
  rationale: 'La POB inglesa documenta la metáfora: literalmente «sobre el pan»; aquí «pan» funciona metonímicamente por la comida. En español, «para comer el pan» mantiene la referencia literal mínima y la finalidad del sentarse, sin perder la tensión entre pan y comida.'
- source_word: לֶאֱכֹל
  english_pob_choice: to eat
  chosen_spanish: comer
  alternatives_spanish:
  - para comer
  - a comer
  lexicon: HALOT
  rationale: El infinitivo de propósito se expresa de manera natural con «para comer» en la construcción completa, ya integrada en la frase final.
- source_word: דָּוִד
  english_pob_choice: David
  chosen_spanish: David
  lexicon: Convención onomástica estándar
  rationale: Nombre propio transliterado en forma habitual en español bíblico.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  - el rey Saúl
  lexicon: HALOT
  rationale: El hebreo usa el título definido; en contexto se refiere a Saúl, pero el texto aquí lo presenta como «el rey». Mantener el título evita suplir el nombre donde el hebreo no lo da.
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó el final a «to eat the meal» para un orden más natural, conservando la idea de sentarse a comer. La versión española sigue esa lectura comunicativa, pero mantiene «el pan» para reflejar la metáfora hebrea documentada en la nota inglesa y no borrar la tensión léxica entre pan y comida.
  spanish_consistency_notes:
  - Usé «luna nueva» para הַחֹדֶשׁ en coherencia con el valor calendárico/ritual del contexto.
  - Mantuve «el rey» en lugar de «Saúl» porque el hebreo dice el título definido.
  - Conservé «pan» en el texto principal para respetar la metonimia hebrea explicada en la tradición POB; la nota aclara su sentido de comida.
  - El estilo general procura ser bíblico y claro, sin caer en calcos innecesarios.
