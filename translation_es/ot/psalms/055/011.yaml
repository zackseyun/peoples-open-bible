review_pass:
  verdict: revise
  source_alignment_summary: 'La estructura básica del hebreo está bien seguida: el par temporal continuo, el verbo de movimiento alrededor de la ciudad, la referencia a sus muros y la condición interna de la ciudad personificada. Sin embargo, el borrador español se aparta de la decisión léxica auditada en el sintagma אָוֶן וְעָמָל al escoger «maldad y afán». «Maldad» inclina demasiado el primer término hacia culpa moral, donde el POB inglés eligió deliberadamente «trouble» para conservar también el efecto destructivo/social; y «afán» no comunica con suficiente claridad «misery/oppression/trouble» en español actual y puede sugerir mero empeño o ansiedad.'
  spanish_quality_summary: El texto es mayormente legible, pero «andan alrededor de ella sobre sus muros» suena algo tosco; aun así es aceptable y preserva el movimiento del verbo. El problema principal de calidad es «afán», que en español moderno neutral eclesial resulta ambiguo y poco natural en este contexto. «Problemas y miseria» o similar comunica mejor el estado interno de la ciudad sin perder dignidad.
  glossary_alignment: 'No hay conflicto con términos doctrinales mayores del glosario del proyecto. La revisión necesaria es de precisión semántica: mantener la amplitud de אָוֶן y עָמָל conforme al rastro auditado del POB. También conviene alinear la nota b con el texto anclado correcto; en el borrador actual el marcador [b] aparece sobre «afán», pero la nota trata el par completo.'
  issues:
  - severity: high
    issue: «Maldad» para אָוֶן estrecha indebidamente el sentido
    rationale: El audit trail inglés escogió «trouble» precisamente para no limitar el término al mal moral. «Maldad» elimina parte del campo semántico de daño/opresión/desorden que el verso describe dentro de la ciudad.
  - severity: high
    issue: «Afán» para עָמָל es semánticamente débil y poco claro
    rationale: En español actual, «afán» suele sugerir empeño, ansiedad o diligencia más que miseria/opresión/aflicción. No preserva bien la elección inglesa «misery» ni la alternativa documentada de opresión.
  - severity: medium
    issue: La nota [b] está anclada solo al segundo término aunque explica el binomio completo
    rationale: El pie de nota trata «maldad y afán»/el par hebreo, por lo que el marcador debe colocarse en la frase completa relevante, no únicamente sobre el segundo sustantivo.
  - severity: low
    issue: «Sobre sus muros» es algo rígido en español
    rationale: Es fiel a עַל חוֹמֹתֶיהָ y no necesita cambio obligatorio. Se puede mantener por cercanía al hebreo, aunque la construcción completa sigue siendo algo pesada.
