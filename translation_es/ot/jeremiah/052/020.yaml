translation:
  language: es
  text: En cuanto a las dos columnas[a], el Mar[b], y los doce bueyes de bronce que estaban debajo de los soportes, que el rey Salomón había hecho para la casa de Yahvé, no había peso[c] para el bronce de todos estos utensilios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los dos pilares».
    reason: lexical_alternative
  - marker: b
    text: Hebreo «el Mar, uno»; «Mar» es el nombre técnico del gran depósito del templo.
    reason: lexical_alternative
  - marker: c
    text: Hebreo «no había peso para su bronce»; es decir, el bronce de todos estos utensilios no se pesó o era demasiado para calcularlo.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעַמּוּדִים שְׁנַיִם
  english_pob_choice: the two pillars
  chosen_spanish: las dos columnas
  alternatives_spanish:
  - las dos pilastras
  - los dos pilares
  lexicon: HALOT
  rationale: עַמּוּדִים designa elementos estructurales; en español, 'columnas' es natural y fiel en este contexto del templo. 'Pilares' también sería posible, pero 'columnas' comunica mejor la función arquitectónica.
- source_word: הַיָּם אֶחָד
  english_pob_choice: the one Sea
  chosen_spanish: el único mar
  alternatives_spanish:
  - el mar, uno
  - la tina o mar del templo
  lexicon: HALOT
  rationale: Aquí יָם es el nombre técnico del gran recipiente del templo. Se conserva 'mar' para no perder el rasgo terminológico; 'único' refleja el valor inventarial de אֶחָד.
- source_word: וְהַבָּקָר שְׁנֵים עָשָׂר נְחֹשֶׁת
  english_pob_choice: and the twelve bronze oxen
  chosen_spanish: y los doce bueyes de bronce
  alternatives_spanish:
  - y los doce bueyes broncíneos
  - y los doce toros de bronce
  lexicon: HALOT
  rationale: בָּקָר puede referirse a ganado/oxen; en este contexto del templo, 'bueyes' es el equivalente más claro y fiel. 'Toros' es posible, pero 'bueyes' mantiene mejor la referencia funcional y tradicional en español.
- source_word: אֲשֶׁר תַּחַת הַמְּכֹנוֹת
  english_pob_choice: that were under the stands
  chosen_spanish: que estaban debajo de los soportes
  alternatives_spanish:
  - que estaban bajo las bases
  - que estaban debajo de las plataformas
  lexicon: HALOT
  rationale: מְכֹנוֹת se refiere a los soportes/bases asociados con los utensilios del templo. 'Soportes' es amplio pero comprensible; evita restringir indebidamente el término a una forma particular.
- source_word: אֲשֶׁר עָשָׂה הַמֶּלֶךְ שְׁלֹמֹה
  english_pob_choice: which King Solomon had made
  chosen_spanish: que el rey Salomón había hecho
  alternatives_spanish:
  - que hizo el rey Salomón
  - que el rey Salomón hizo
  lexicon: HALOT
  rationale: El pluscuamperfecto español reproduce bien la anterioridad de la fabricación respecto al saqueo narrado. 'Había hecho' conserva la relación temporal con naturalidad.
- source_word: לְבֵית יְהוָה
  english_pob_choice: for the house of Yahweh
  chosen_spanish: para la casa de Yahvé
  alternatives_spanish:
  - para la casa de Yahweh
  - para el templo de Yahvé
  lexicon: HALOT
  rationale: 'Se sigue el convenio del proyecto: יְהוָה se vierte ''Yahvé'' en el texto principal. ''Casa'' preserva el idiomatismo hebreo frente a ''templo'', que sería más interpretativo.'
- source_word: לֹא הָיָה מִשְׁקָל
  english_pob_choice: there was no weighing
  chosen_spanish: no había peso
  alternatives_spanish:
  - no se podía pesar
  - no se pudo pesar
  lexicon: HALOT
  rationale: La expresión hebrea dice literalmente 'no había peso', que en contexto implica que no se pesó o que su peso era incalculable. Se mantiene esa formulación breve, cercana al hebreo, sin perder inteligibilidad.
- source_word: לִנְחֻשְׁתָּם
  english_pob_choice: the bronze of them
  chosen_spanish: para el bronce de ellos
  alternatives_spanish:
  - del bronce de ellos
  - de su bronce
  lexicon: HALOT
  rationale: El sufijo remite a los objetos enumerados. En español, la construcción 'para el bronce de ellos' conserva la relación semántica del hebreo con mínima expansión.
- source_word: כָּל הַכֵּלִים הָאֵלֶּה
  english_pob_choice: all these vessels
  chosen_spanish: todos estos utensilios
  alternatives_spanish:
  - todos estos vasos
  - todos estos objetos
  lexicon: HALOT
  rationale: כֵּלִים es un término amplio para objetos/utensilios/vajilla sagrada. 'Utensilios' funciona bien en español cultual e inventarial y evita limitar el sentido a 'vasos'.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: 'Se adopta el equivalente editorial del proyecto en español: ''Yahvé'' para el Tetragrámaton. Se evita ''el SEÑOR'' porque la línea editorial pide transparencia del nombre divino en el texto principal.'
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH → Yahvé'
- issue: Sentido de לֹא הָיָה מִשְׁקָל
  english_pob_reading: there was no weighing / no weight
  chosen_spanish_reading: no había peso
  alternative_spanish_readings:
  - no se pesó
  - no había manera de pesar
  rationale: 'Se conserva la tensión del hebreo: la frase puede significar que no se pesó o que el peso era incalculable. La redacción española mantiene esa ambigüedad sin resolverla demasiado.'
  doctrine_reference: 'DOCTRINE.md: Principio de ambigüedad controlada en fórmulas inventariales'
- issue: Término del objeto del templo יָם
  english_pob_reading: the one Sea
  chosen_spanish_reading: el único mar
  alternative_spanish_readings:
  - el Mar
  - la gran vasija
  rationale: Se conserva 'mar' como nombre del objeto ritual, ya que el texto no explica el referente y la POB inglesa también retiene el término técnico. Esto evita sustituirlo por una paráfrasis interpretativa.
  doctrine_reference: 'DOCTRINE.md: Terminología cultual y nombres técnicos'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios sustanciales frente al texto inglés auditado; por eso esta propuesta sigue de cerca la estructura y las decisiones léxicas aprobadas, adaptándolas al español con transparencia terminológica.
  spanish_consistency_notes:
  - Se mantuvo el nombre divino como «Yahvé» en lugar de una sustitución reverencial genérica.
  - Se preservó el término técnico cultual «mar» para הַיָּם y no se lo interpretó como una simple vasija.
  - Se evitó «siervos» o términos no pertinentes; el pasaje es inventarial y de mobiliario del templo.
  - La expresión final conserva la ambigüedad del hebreo sobre el peso del bronce.
