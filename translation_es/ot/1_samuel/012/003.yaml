base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/012/003.yaml
  text: 'Here I am[a]; testify against me before Yahweh and before his anointed: whose ox have I taken, or whose donkey have I taken? Whom have I oppressed? Whom have I mistreated? From whose hand have I taken a bribe[b], that I should hide my eyes with it? I will restore it to you.'
  footnotes:
  - marker: a
    text: Or, 'Whom have I wronged?' The Hebrew verb rendered 'have I crushed' is difficult and may broadly denote mistreating or abusing someone.
    reason: lexical_alternative
  - marker: b
    text: '''Bribe'' could also be rendered ''ransom'' or ''payment,'' but the context of ''hiding my eyes'' favors a corrupt payment that perverts justice.'
    reason: lexical_alternative
