translation:
  language: es
  text: Ella es como barcos mercantes[a]; desde lejos trae su alimento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su pan».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָיְתָה
  english_pob_choice: She is
  chosen_spanish: Ella es
  alternatives_spanish:
  - Ella fue
  - Ella ha llegado a ser
  lexicon: HALOT
  rationale: El perfecto qal 3fs de היה puede expresar en poesía sapiencial una caracterización habitual o proverbial. En español, el presente «es» comunica mejor ese valor gnómico que un pasado, y conserva el sentido descriptivo del hebreo y de la traducción inglesa auditada.
- source_word: כָּאֳנִיּוֹת סוֹחֵר
  english_pob_choice: like merchant ships
  chosen_spanish: como barcos mercantes
  alternatives_spanish:
  - como barcos de comercio
  - como naves mercantes
  lexicon: HALOT
  rationale: El prefijo כ marca comparación y אֳנִיּוֹת son «barcos/naves». סוֹחֵר indica actividad comercial, por lo que «mercantes» integra naturalmente la idea de comercio sin añadir una explicación ajena al hebreo. «Barcos mercantes» mantiene la imagen y suena más natural en español bíblico que una traducción demasiado literal.
- source_word: מִמֶּרְחָק
  english_pob_choice: from far away
  chosen_spanish: desde lejos
  alternatives_spanish:
  - desde lejos
  - desde una gran distancia
  lexicon: HALOT
  rationale: La preposición מִן con מֶרְחָק expresa origen en un lugar distante. «Desde lejos» conserva la distancia con fluidez en español moderno y reproduce bien la fuerza del hebreo.
- source_word: תָּבִיא
  english_pob_choice: she brings
  chosen_spanish: trae
  alternatives_spanish:
  - lleva
  - trae consigo
  lexicon: HALOT
  rationale: El hiphil 3fs de בוא aquí significa «traer». «Trae» es el equivalente más natural en español y conserva la acción de proveer o procurar alimentos.
- source_word: לַחְמָהּ
  english_pob_choice: her food
  chosen_spanish: su alimento
  alternatives_spanish:
  - su pan
  - su comida
  lexicon: HALOT
  rationale: לֶחֶם puede significar literalmente «pan», pero también «alimento/provisiones». Dado el contexto de abastecimiento del hogar, «alimento» comunica el sentido amplio que la POB inglesa expresó con «food», sin perder la posibilidad literal preservada en la nota.
translation_notes:
  revision_awareness: El texto hebreo y la auditoría inglesa coinciden en una lectura proverbial y estable del verso; no se detectaron revisiones sustantivas aplicadas. La versión española sigue esa misma lectura con equivalencia óptima, manteniendo el matiz de comparación y la amplitud semántica de לֶחֶם mediante nota.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó «SEÑOR» y otras sustituciones no motivadas por el texto.
  - «Barcos mercantes» preserva la imagen comparativa y el rasgo comercial indicado por סוֹחֵר.
  - La nota a conserva la alternativa literal «pan», coherente con la auditoría inglesa.
