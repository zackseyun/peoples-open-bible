base_translation:
  language: en
  yaml_path: translation/ot/joshua/018/017.yaml
  text: Then it curved northward and went out to En-shemesh[a], and went out to Geliloth, which is opposite the Ascent of Adummim[c][b], and it went down to the stone of Bohan son of Reuben.
  footnotes:
  - marker: a
    text: En-shemesh means 'Spring of the Sun,' but the place name is transliterated in the main text.
    reason: lexical_alternative
  - marker: b
    text: Geliloth may be understood lexically as 'circles' or 'districts,' but here it is treated as a place name.
    reason: lexical_alternative
  - marker: c
    text: Or 'the Pass of Adummim.'
    reason: lexical_alternative
