  text: μεμφόμενος γὰρ ⸀αὐτοὺς λέγει· Ἰδοὺ ἡμέραι ἔρχονται, λέγει κύριος, καὶ συντελέσω ἐπὶ τὸν οἶκον Ἰσραὴλ καὶ ἐπὶ τὸν οἶκον Ἰούδα διαθήκην καινήν,
base_translation:
  language: en
  yaml_path: translation/nt/hebrews/008/008.yaml
  text: For in finding fault with them he says, “Look, days are coming, says the Lord, when I will establish a new covenant with the house of Israel and with the house of Judah,”
translation:
  language: ko
  text: '그분이 그들을 책망하시며 말씀하십니다: 「보라, 날들이 이르리니, 야훼께서 말씀하신다, 그때에 내가 이스라엘 집과 유다 집과 더불어 새 언약을 맺으리라.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 여기서부터 12절까지는 예레미야 31:31-34의 인용이며, 본문은 신구약 언약 대조의 신학적 핵심이다. 칠십인역의 κύριος는 히브리어 본문의 יהוה를 가리키므로 「야훼」로 옮긴다.
    reason: ot_citation
lexical_decisions:
- source_word: κύριος
  english_pob_choice: the Lord
  chosen_korean: 야훼
  alternatives_korean:
  - 주
  lexicon: BDAG
  rationale: 본 절은 예레미야 31:31의 인용이며 κύριος는 히브리어 본문의 יהוה에 대응한다. 본 번역의 원칙에 따라 「야훼」로 옮긴다.
- source_word: διαθήκην καινήν
  english_pob_choice: a new covenant
  chosen_korean: 새 언약
  alternatives_korean:
  - 새 계약
  lexicon: BDAG
  rationale: 예레미야 31:31의 בְּרִית חֲדָשָׁה를 정확히 반영하는 표현이다.
theological_decisions:
- issue: 예레미야 31:31 인용에서 κύριος를 「야훼」로 번역
  chosen_reading: 야훼
  alternative_readings:
  - 주
  - 여호와
  rationale: 히브리서 8:8-12은 예레미야 31:31-34 새 언약 약속의 직접 인용이며, 본문의 κύριος는 히브리어 원문의 יהוה를 가린 칠십인역 관습에서 비롯한다. 본 번역의 원칙에 따라 구약 인용의 κύριος는 「야훼」로 복원하여 인용의 원천을 드러낸다.
  doctrine_reference: 'DOCTRINE.md: Divine name policy; OT citation handling'
