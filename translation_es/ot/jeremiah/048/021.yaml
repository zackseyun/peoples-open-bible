translation:
  language: es
  text: Y el juicio[a] ha llegado sobre la tierra de la meseta[b], sobre Holón, y sobre Jahzah[c], y sobre Mefaat.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'justicia' o 'sentencia'. Aquí 'juicio' expresa mejor el acto judicial de Dios en un oráculo de condena.
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse 'la tierra de la llanura' o 'la tierra del altiplano'. El hebreo alude a una región elevada y nivelada.
    reason: lexical_alternative
  - marker: c
    text: También se encuentra la forma 'Jahaz' en algunas traducciones.
    reason: alternative_reading
lexical_decisions:
- source_word: וּמִשְׁפָּט
  english_pob_choice: And judgment
  chosen_spanish: Y el juicio
  alternatives_spanish:
  - Y la justicia
  - Y el castigo
  lexicon: HALOT
  rationale: מִשְׁפָּט puede significar 'juicio', 'justicia' o 'sentencia'. En este anuncio de desastre contra Moab, 'juicio' conserva el valor jurídico de la acción divina y la idea de sentencia ya en marcha, sin diluirla en una noción más abstracta de justicia.
- source_word: בָּא
  english_pob_choice: has come
  chosen_spanish: ha llegado
  alternatives_spanish:
  - ha venido
  - vino
  lexicon: HALOT
  rationale: El perfecto hebreo transmite una certeza profética de acción ya cumplida en la palabra anunciada. 'Ha llegado' preserva ese valor de certeza y suena natural en español bíblico moderno.
- source_word: אֶרֶץ הַמִּישֹׁר
  english_pob_choice: the land of the plateau
  chosen_spanish: la tierra de la meseta
  alternatives_spanish:
  - la tierra de la llanura
  - la tierra del altiplano
  - la tierra de la planicie
  lexicon: HALOT
  rationale: מִישׁוֹר designa tierra nivelada, meseta o altiplano. 'Meseta' comunica bien el relieve transjordano y evita la posible ambigüedad de 'llanura', que en español puede sugerir terreno bajo y no elevación.
- source_word: חֹלֹן
  english_pob_choice: Holon
  chosen_spanish: Holón
  alternatives_spanish:
  - Holon
  lexicon: HALOT
  rationale: Es un nombre propio de lugar. Se mantiene transliterado; se acentúa gráficamente en español para facilitar la lectura sin alterar la identificación del topónimo.
- source_word: יַהְצָה
  english_pob_choice: Jahzah
  chosen_spanish: Jahzah
  alternatives_spanish:
  - Jahaz
  - Jahaza
  lexicon: HALOT
  rationale: La forma hebrea aquí se refleja mejor con 'Jahzah', como indica el audit trail inglés. Se conserva la transliteración para no perder la relación con las variantes tradicionales del topónimo.
- source_word: מופעת
  english_pob_choice: Mephaath
  chosen_spanish: Mefaat
  alternatives_spanish:
  - Mefaat
  - Mefaat
  lexicon: HALOT
  rationale: Es otro nombre propio de lugar. 'Mefaat' mantiene la transliteración directa y resulta más natural en español que la forma inglesa con 'ph', que no corresponde al sistema ortográfico español.
- source_word: וְעַל
  english_pob_choice: and upon
  chosen_spanish: y sobre
  alternatives_spanish:
  - y contra
  - y sobre la
  lexicon: HALOT
  rationale: La serie enumera destinos del juicio. 'Sobre' reproduce la carga de caída/incidencia del juicio y permite mantener el paralelismo con el inicio del versículo en español natural.
translation_notes:
  revision_awareness: Se siguió de cerca el texto hebreo masorético y el audit trail inglés. No se introdujeron cambios textuales ni se añadieron glosas que no estuvieran respaldadas por las decisiones léxicas documentadas. El orden de la enumeración y el paralelismo preposicional se conservaron.
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se prefirió 'juicio' para מִשְׁפָּט, conforme al valor judicial del contexto.
  - Los topónimos se transliteran de forma consistente y con adaptación ortográfica española cuando ayuda a la lectura.
