translation:
  language: es
  text: Él hirió a Moab y los midió con una cuerda[a], haciéndolos tenderse en tierra. Midió dos medidas de cuerda para matar y una medida completa de cuerda para dejar con vida. Así Moab llegó a ser siervo[b] de David, trayendo tributo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con un cordel» o «con una cuerda de medir».
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo describe a David midiendo a los moabitas mientras yacían en el suelo: dos porciones medidas fueron asignadas «para muerte» y una porción completa «para vida», lo que implica que algunos fueron ejecutados y otros perdonados.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּךְ
  english_pob_choice: He struck
  chosen_spanish: Él hirió
  alternatives_spanish:
  - Él golpeó
  - Él derrotó
  lexicon: HALOT
  rationale: El verbo נכה tiene un sentido concreto de herir/golpear en contexto militar. "Hirió" conserva la fuerza física sin suavizarla a una derrota más interpretativa.
- source_word: מוֹאָב
  english_pob_choice: Moab
  chosen_spanish: Moab
  lexicon: HALOT
  rationale: Nombre propio transliterado de forma estándar.
- source_word: וַיְמַדְּדֵם
  english_pob_choice: and measured them
  chosen_spanish: los midió
  alternatives_spanish:
  - los midió con una medida
  - los midió cuidadosamente
  lexicon: HALOT
  rationale: El piel de מדד significa medir. "Los midió" mantiene la acción directa y permite que el instrumento se especifique con la cuerda.
- source_word: בַּחֶבֶל
  english_pob_choice: with a line
  chosen_spanish: con una cuerda
  alternatives_spanish:
  - con una línea
  - con una cuerda de medir
  lexicon: HALOT
  rationale: חבל puede ser cuerda, cordel o línea de medir. "Cuerda" es natural en español y conserva la ambigüedad útil del término; el contexto de medición la aclara.
- source_word: הַשְׁכֵּב אוֹתָם אַרְצָה
  english_pob_choice: making them lie down on the ground
  chosen_spanish: haciéndolos acostarse en tierra
  alternatives_spanish:
  - haciéndolos tenderse en el suelo
  - haciéndolos recostarse en tierra
  lexicon: HALOT
  rationale: La construcción causativa describe cómo se realizó la medición. "Haciéndolos acostarse en tierra" reproduce la acción con naturalidad y mantiene la dureza del procedimiento.
- source_word: שְׁנֵי חֲבָלִים
  english_pob_choice: two lengths of line
  chosen_spanish: dos cuerdas
  alternatives_spanish:
  - dos medidas de cuerda
  - dos largos de cuerda
  lexicon: HALOT
  rationale: La expresión se refiere a dos porciones medidas por la cuerda. En español, "dos cuerdas" es más breve, pero el contexto de medir evita ambigüedad; se conserva la imagen material del original.
- source_word: לְהָמִית
  english_pob_choice: to put to death
  chosen_spanish: para hacer morir
  alternatives_spanish:
  - para matar
  - para dar muerte
  lexicon: HALOT
  rationale: El infinitivo expresa propósito. "Para hacer morir" refleja la intención del hebreo sin convertirlo en un sustantivo abstracto ni debilitar la crudeza del texto.
- source_word: וּמְלֹא הַחֶבֶל
  english_pob_choice: a full length of line
  chosen_spanish: una cuerda completa
  alternatives_spanish:
  - un largo completo de cuerda
  - la cuerda completa
  lexicon: HALOT
  rationale: מְלֹא expresa plenitud o medida completa. "Una cuerda completa" comunica la porción íntegra en contraste con las dos porciones anteriores.
- source_word: לְהַחֲיוֹת
  english_pob_choice: to keep alive
  chosen_spanish: para hacer vivir
  alternatives_spanish:
  - para dejar vivir
  - para mantener con vida
  lexicon: HALOT
  rationale: La forma causativa pide una traducción activa. "Para hacer vivir" mantiene el paralelismo con "para hacer morir" y conserva la tensión del original.
- source_word: נֹשְׂאֵי מִנְחָה
  english_pob_choice: bringing tribute
  chosen_spanish: trayendo tributo
  alternatives_spanish:
  - llevando tributo
  - aportando tributo
  lexicon: HALOT
  rationale: En contexto real-político, מִנְחָה es tributo, no ofrenda cultual. "Trayendo tributo" expresa la obligación vasallática de manera natural en español.
theological_decisions:
- issue: Descripción del trato de David a Moab mediante medición y asignación de vida o muerte
  english_pob_reading: Retain the literal measuring imagery and the death/life allocation without softening or reconstructing beyond the Hebrew.
  chosen_spanish_reading: Mantener la imagen literal de la medición y la asignación para muerte y para vida, sin suavizarla ni reconstruirla más allá del hebreo.
  alternative_spanish_readings:
  - Interpretar la cuerda de forma figurada como mera subyugación
  - Explicitar en el texto principal una fracción exacta de muertos y sobrevivientes
  rationale: 'El hebreo presenta una acción concreta y severa: se mide a los moabitas y se asignan porciones para morir y para vivir. La traducción conserva esa dureza y la estructura paralela, evitando introducir una paráfrasis interpretativa en el texto principal.'
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La redacción sigue de cerca el último estado revisado del POB en inglés, que ajustó la finalidad de las frases a “para hacer morir” / “para hacer vivir”. Se conserva la imaginería de la cuerda y la estructura paralela, pero se adapta al español con una sintaxis más natural y sin perder la dureza del procedimiento descrito.
  spanish_consistency_notes:
  - Se usa "Yahvé" cuando corresponda al tetragrámaton; en este versículo no aparece.
  - '"Moab" se mantiene como nombre propio transliterado.'
  - '"esclavos" se conserva para reflejar la fuerza de עֲבָדִים en el contexto de subyugación política, aunque en español bíblico a veces podría sonar más natural "siervos"; aquí se prefiere la fuerza léxica del original.'
  - Las notas a y b preservan la alternativa léxica y la explicación contextual del acto de medición.
