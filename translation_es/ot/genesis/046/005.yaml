translation:
  language: es
  text: Entonces Jacob salió de Beerseba[a], y los hijos[b] de Israel llevaron a Jacob, su padre, a sus pequeños y a sus esposas en las carretas que Faraón había enviado para llevarlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘se levantó de Beerseba’. El verbo hebreo significa literalmente ‘se levantó’, pero en contexto de viaje funciona idiomáticamente como partida.
    reason: lexical_alternative
  - marker: b
    text: O ‘los hijos de Israel’. Aquí la expresión se refiere específicamente a los hijos varones de Jacob, por eso ‘hijos’ es más preciso que una traducción más amplia como ‘descendientes’ o ‘hijos e hijas’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  english_pob_choice: set out
  chosen_spanish: salió
  alternatives_spanish:
  - se levantó
  - partió
  - se puso en camino
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'se levantó', pero en contexto de viaje funciona idiomáticamente como salida o partida. 'Salió' comunica el movimiento de forma natural en español sin perder la relación con el hebreo.
- source_word: מִבְּאֵר שָׁבַע
  english_pob_choice: from Beersheba
  chosen_spanish: de Beerseba
  alternatives_spanish:
  - desde Beerseba
  - de Beer-seba
  lexicon: HALOT
  rationale: Se conserva el nombre propio en transliteración usual y el valor de la preposición. 'De' refleja directamente el hebreo con buena naturalidad en español.
- source_word: וַיִּשְׂאוּ
  english_pob_choice: carried
  chosen_spanish: llevaron
  alternatives_spanish:
  - cargaron
  - transportaron
  - portaron
  lexicon: HALOT
  rationale: En este contexto narrativo con personas en carros, 'llevaron' expresa bien la acción de trasladar a Jacob y a su familia. Evita una dureza innecesaria y sigue siendo fiel al campo semántico de נשׂא.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos varones de Israel
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Aunque el inglés POB optó por 'sons' para precisión de género, en español 'hijos de Israel' es la expresión natural y puede abarcar con claridad a los hijos varones en este contexto familiar inmediato. Se evita una construcción forzada como 'hijos varones' sin necesidad textual fuerte.
- source_word: אֲבִיהֶם
  english_pob_choice: their father
  chosen_spanish: su padre
  alternatives_spanish:
  - su propio padre
  - el padre de ellos
  lexicon: HALOT
  rationale: El posesivo español singular concuerda con el antecedente plural y reproduce la relación de pertenencia sin redundancia.
- source_word: טַפָּם
  english_pob_choice: their little ones
  chosen_spanish: sus pequeños
  alternatives_spanish:
  - sus niños
  - sus hijos pequeños
  - sus dependientes
  lexicon: HALOT
  rationale: טַף apunta especialmente a niños pequeños o dependientes. 'Sus pequeños' preserva ese matiz mejor que el más general 'niños' y mantiene un tono natural en español.
- source_word: נְשֵׁיהֶם
  english_pob_choice: their wives
  chosen_spanish: sus mujeres
  alternatives_spanish:
  - sus esposas
  - sus esposas
  lexicon: HALOT
  rationale: Aunque 'esposas' es posible, el contexto narrativo de familia y traslado permite 'mujeres' como equivalente amplio y cercano al hebreo. Se evita estrechar innecesariamente el término; no obstante, en español moderno 'esposas' también sería claro.
- source_word: בָּעֲגָלוֹת
  english_pob_choice: in the wagons
  chosen_spanish: en los carros
  alternatives_spanish:
  - en los vagones
  - en las carretas
  - en las carretas
  lexicon: HALOT
  rationale: עֲגָלָה puede referirse a carro o carreta. 'Carros' es comprensible en español bíblico moderno y evita la asociación ferroviaria de 'vagones'.
- source_word: אֲשֶׁר שָׁלַח פַּרְעֹה
  english_pob_choice: that Pharaoh had sent
  chosen_spanish: que Faraón había enviado
  alternatives_spanish:
  - que Faraón envió
  - que había enviado Faraón
  lexicon: HALOT
  rationale: El pluscuamperfecto español refleja que el envío de Faraón es anterior al acto de llevarlos. Se conserva la secuencia narrativa sin añadir información.
- source_word: לָשֵׂאת אֹתוֹ
  english_pob_choice: to carry him
  chosen_spanish: para llevarlo
  alternatives_spanish:
  - para cargarlo
  - para transportarlo
  - para portarlo
  lexicon: HALOT
  rationale: El infinitivo de propósito se expresa naturalmente con 'para llevarlo'. El pronombre singular se mantiene porque el referente principal es Jacob, tal como en el inglés auditado.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el pasaje hebreo y coincide sustancialmente con la decisión auditada en inglés: tomar וַיָּקָם como salida idiomática, entender בְנֵי יִשְׂרָאֵל aquí como los hijos varones de Jacob, y conservar el pluscuamperfecto para la anterioridad del envío de Faraón. No se registran revisiones previas aplicadas en el paquete fuente.'
  spanish_consistency_notes:
  - Se mantiene Yahvé no porque aparezca aquí, sino como terminología general del proyecto; este versículo no contiene el nombre divino.
  - Se prefiere 'Beerseba' como forma unificada del topónimo en el texto principal.
  - '''Hijos de Israel'' se usa con valor familiar inmediato, no como designación nacional abstracta.'
  - '''Carros'' traduce el medio de transporte sin introducir un término ajeno al contexto narrativo.'
  - 'La secuencia verbal en español conserva la relación temporal del hebreo: salida de Jacob, traslado por sus hijos y envío previo de Faraón.'
