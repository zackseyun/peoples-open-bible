review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien el imperfecto de ἔλεγεν con «seguía diciendo» y mantiene la fuerza de σφαγιασθῆναι con un verbo fuerte. Sin embargo, «de dónde están» no es español natural ni expresa fielmente πόθεν ἐστέ en este contexto; en español debe decirse «de dónde son» o similar. Además, «por la mano de qué padre» es torpe; el griego τίνος πατρὸς pide una referencia posesiva/identificadora mejor expresada como «por la mano de qué padre» o, más naturalmente en el conjunto, «a manos de qué padre».
  spanish_quality_summary: El texto es generalmente claro, pero «Acuérdense de dónde están» suena antinatural y puede entenderse como ubicación presente, no origen. También conviene evitar el futuro perifrástico «van a ser degollados» si una construcción más directa mejora la dignidad del registro. «Recuerden» y «serán degollados» o «han de ser degollados» leen mejor en español bíblico moderno.
  glossary_alignment: No hay conflicto con la terminología troncal del proyecto. La nota léxica sobre πόθεν debe conservar la ambigüedad entre procedencia y linaje, pero en el texto principal el español debe usar una formulación idiomática. «Degollados» es una opción fuerte y aceptable para σφαγιασθῆναι.
  issues:
  - severity: high
    issue: «de dónde están» es un calco no idiomático
    rationale: πόθεν ἐστέ expresa origen/procedencia, no ubicación presente. En español neutral, «estar de dónde» no funciona; produce confusión semántica y baja legibilidad.
  - severity: medium
    issue: La construcción «por la mano de qué padre» resulta pesada
    rationale: Aunque «mano» preserva χείρ, en español la frase completa suena forzada. Una leve reparación puede mantener la imagen sin perder naturalidad.
  - severity: low
    issue: «Acuérdense» y «van a ser degollados» son menos dignos que alternativas más sobrias
    rationale: No son incorrectos, pero «Recuerden» y «serán degollados» encajan mejor con el registro moderno y digno solicitado.
