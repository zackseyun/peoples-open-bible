  source_alignment_summary: El borrador refleja bien la estructura básica del hebreo y preserva correctamente «Yahvé» y la repetición de «casa de». Sin embargo, «los que están» debilita demasiado el valor de עֹמְדִים («los que están de pie/los que sirven de pie») y «patios» es menos preciso que el equivalente cultual esperado para חַצְרוֹת en este contexto del templo.
  spanish_quality_summary: 'El español es claro, pero puede mejorarse en fidelidad y registro bíblico-natural. «Los que están» suena incompleto en español para este contexto; «los que están de pie» es más fiel y natural. También conviene alinear la nota alternativa con el término principal: si el texto usa «atrios», la alternativa puede ser «patios».'
  glossary_alignment: Correcto en «Yahvé» y «Dios». La elección «atrios» alinea mejor con la decisión inglesa «courts» y con el lenguaje de culto en español; «patios» puede quedar como alternativa léxica en nota.
  issues:
  - severity: medium
    issue: «los que están» para שֶׁעֹמְדִים
    rationale: El hebreo participial describe a quienes «están de pie» en el servicio/adoración. «Están» solo en español pierde el componente espacial/postural presente en עמד y suena elíptico.
  - severity: medium
    issue: «patios» para בְּחַצְרוֹת
    rationale: Aunque posible, «patios» es menos preciso en contexto cultual. «Atrios» comunica mejor los recintos del templo y corresponde mejor a «courts», mientras que «patios» puede conservarse como alternativa en nota.
  - severity: low
    issue: Distribución de notas al pie
    rationale: La nota cultural está anclada al final con marcador b mientras la nota léxica a «Yahvé» no corresponde semánticamente a ese término. Conviene anclar la nota cultural en «casa de Yahvé» y la alternativa léxica en «atrios».
