  to: 'Diles[a]: «Así dice el Señor Dios, Yahvé: Este oráculo[b] trata del príncipe en Jerusalén y de toda la casa de Israel que están en medio de ella».'
  rationale: Se corrige la construcción española para expresar el sentido completo de הַמַּשָּׂא הַזֶּה mediante «trata de». Se mejora la naturalidad de אֱמֹר אֲלֵיהֶם con «Diles». Se ajusta אֲדֹנָי יְהוִה a «el Señor Dios, Yahvé» para conservar tanto el título como el nombre divino conforme a la política del proyecto.
  reviewer_model: gpt-5.4
