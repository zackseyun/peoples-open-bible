translation:
  language: es
  text: 'Hay una vanidad[a] que sucede en la tierra: hay justos a quienes les sucede según las obras de los impíos, y hay impíos a quienes les sucede según las obras de los justos. Dije que también esto es vanidad.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'futilidad' o 'vapor'. El hebreo הֶבֶל es un término clave en Eclesiastés para lo pasajero, elusivo o desconcertantemente incongruente.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶבֶל
  english_pob_choice: vanity
  chosen_spanish: vanidad
  alternatives_spanish:
  - futilidad
  - vapor
  - inutilidad
  lexicon: HALOT
  rationale: POB mantiene el término programático de Eclesiastés con 'vanity'. En español, 'vanidad' conserva el registro tradicional y la fuerza de algo fugaz, desconcertante o incongruente; aunque puede sonar más moral en otros contextos, aquí reproduce bien el refrán de Qohelet.
- source_word: נַעֲשָׂה
  english_pob_choice: is done
  chosen_spanish: se hace
  alternatives_spanish:
  - acontece
  - ocurre
  - se realiza
  lexicon: HALOT
  rationale: El nifal expresa algo que sucede o se lleva a cabo. 'Se hace' sigue de cerca el hebreo y funciona naturalmente en español sin perder la idea de un hecho que acontece en el mundo.
- source_word: עַל הָאָרֶץ
  english_pob_choice: on the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - en el mundo
  lexicon: HALOT
  rationale: '''Sobre la tierra'' refleja la imagen espacial literal del hebreo y mantiene el alcance general de la observación, sin restringirla a ''la tierra'' como territorio concreto.'
- source_word: צַדִּיקִים
  english_pob_choice: righteous people
  chosen_spanish: justos
  alternatives_spanish:
  - personas justas
  - los justos
  lexicon: HALOT
  rationale: El adjetivo sustantivado puede traducirse de forma breve y natural como 'justos'. En este contexto, el contraste con 'impíos' queda claro y no exige explicitar 'personas'.
- source_word: מַגִּיעַ אֲלֵהֶם
  english_pob_choice: it happens to them
  chosen_spanish: les sucede
  alternatives_spanish:
  - les acontece
  - les llega
  - les sobreviene
  lexicon: HALOT
  rationale: El verbo con אליהם comunica lo que les alcanza o les toca como experiencia o destino. 'Les sucede' es idiomático en español y preserva el sentido de resultado que el POB inglés expresó con 'it happens to them'.
- source_word: כְּמַעֲשֵׂה
  english_pob_choice: according to the deeds of
  chosen_spanish: según las obras de
  alternatives_spanish:
  - conforme a las obras de
  - como las obras de
  lexicon: HALOT
  rationale: '''Según'' expresa bien la correspondencia o medida implícita en el comparativo. ''Obras'' refleja מַעֲשֶׂה en su sentido de acciones/conducta, y en español mantiene el paralelismo moral.'
- source_word: הָרְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los injustos
  lexicon: HALOT
  rationale: '''Impíos'' es el equivalente bíblico más estable para רשעים en un contraste sapiencial con ''justos''. Conserva el tono moral-religioso del hebreo y del POB inglés.'
- source_word: רְשָׁעִים
  english_pob_choice: wicked people
  chosen_spanish: impíos
  alternatives_spanish:
  - personas impías
  - los impíos
  lexicon: HALOT
  rationale: Se mantiene la misma categoría léxica para conservar el paralelismo con 'justos'. En español, el adjetivo sustantivado es claro y evita redundancia.
- source_word: הַצַּדִּיקִים
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los rectos de corazón
  lexicon: HALOT
  rationale: En la frase comparativa final, 'los justos' es más natural y más directamente contrastivo con 'los impíos'. Preserva el valor substantivado del plural con artículo.
- source_word: אָמַרְתִּי
  english_pob_choice: I said
  chosen_spanish: dije
  alternatives_spanish:
  - afirmé
  - concluí
  - pensé
  lexicon: HALOT
  rationale: Se conserva la sobriedad del verbo hebreo. 'Dije' deja abierta la fuerza reflexiva del enunciado, como en el POB inglés.
- source_word: שֶׁגַּם זֶה הָבֶל
  english_pob_choice: that this too is vanity
  chosen_spanish: que también esto es vanidad
  alternatives_spanish:
  - que también esto es futilidad
  - que aun esto es vanidad
  lexicon: HALOT
  rationale: '''También esto'' reproduce el גם con el valor de inclusión/reiteración. La frase mantiene la cadencia del refrán y la continuidad temática del libro.'
theological_decisions:
- issue: Sentido de הֶבֶל en un caso de aparente injusticia moral
  english_pob_reading: vanity
  chosen_spanish_reading: vanidad
  alternative_spanish_readings:
  - futilidad
  - vapor
  - sin sentido
  rationale: 'No se atenúa el choque moral del versículo. ''Vanidad'' conserva la tensión documentada por el POB: la vida presenta resultados incongruentes, fugaces y frustrantes, sin resolver el problema en la traducción.'
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave)
- issue: Equivalencia de la distribución de resultados entre justos e impíos
  english_pob_reading: there are righteous people to whom it happens according to the deeds of the wicked, and there are wicked people to whom it happens according to the deeds of the righteous
  chosen_spanish_reading: hay justos a quienes les sucede según las obras de los impíos, y hay impíos a quienes les sucede según las obras de los justos
  alternative_spanish_readings:
  - hay personas justas a quienes les acontece conforme a las obras de los malvados
  - hay los justos a quienes les sobrevive el trato de los impíos
  rationale: Se conserva el paralelismo del hebreo y la idea de una correspondencia invertida entre conducta y desenlace. La formulación evita suavizar la paradoja, que es el punto retórico del versículo.
  doctrine_reference: Eclesiastés 8:14; coherencia con la lectura sapiencial del libro
translation_notes:
  revision_awareness: 'Se siguió el acuerdo alto del último control de revisión, sin cambios sustantivos respecto al sentido base: se mantuvo el refrán de הֶבֶל y el paralelismo moral entre justos e impíos, con una formulación española natural y auditably cercana al hebreo.'
  spanish_consistency_notes:
  - Se usa 'vanidad' de manera consistente para הֶבֶל, como en el POB inglés.
  - Se traduce צדיקים / הצדיקים con 'justos' y רשעים con 'impíos' para mantener el contraste sapiencial.
  - '''Se hace sobre la tierra'' se convirtió en ''se hace sobre la tierra'' / ''se hace sobre la tierra'' conceptualizado como ''se hace sobre la tierra'' en sentido de acontecer, sin introducir ''bajo el sol''.'
  - No se añadió ninguna nota teológica no respaldada por el texto; la única nota es léxica sobre הֶבֶל.
  - La puntuación reproduce el paralelismo y la pausa del original con dos puntos tras la primera proposición.
