review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del hebreo: toma de mujeres moabitas, fórmula de nombres en paralelo y residencia allí por aproximadamente diez años. También conserva correctamente la nota de alternativa léxica sobre el modismo ''tomar mujeres''. Sin embargo, ''se tomaron para sí mujeres moabitas'' suena poco natural e incluso ambiguo en español moderno; además, omite el matiz de ''wives'' que el inglés POB decidió conservar en el texto principal. El hebreo נָשִׁים en este modismo sí apunta a mujeres como esposas, no meramente ''mujeres''.'
  spanish_quality_summary: La frase inicial necesita ajuste por naturalidad y claridad. 'Tomaron para sí mujeres moabitas' es comprensible pero todavía algo rígido; 'se tomaron para sí mujeres moabitas' resulta peor en español. El resto del versículo es claro y digno. 'Orfa' y 'Rut' son formas españolas publicables; 'habitaron allí unos diez años' es aceptable, aunque 'vivieron allí' sería más llano. No hace falta cambiar lo demás.
  glossary_alignment: No hay términos del glosario maestro especialmente controvertidos aquí. La principal cuestión léxica es mantener el valor matrimonial de נָשִׁים dentro del modismo נָשָׂא + נשים. Para alinearse mejor con la decisión documentada del POB ('Moabite wives'), conviene usar 'esposas moabitas' en el texto principal, dejando 'se casaron con mujeres moabitas' como alternativa en nota.
  issues:
  - severity: high
    issue: La expresión 'se tomaron para sí mujeres moabitas' es poco natural en español y puede sonar reflexiva de manera incorrecta.
    rationale: El hebreo expresa un modismo matrimonial; en español, el clítico 'se' con 'tomaron para sí' produce una construcción forzada. Conviene conservar la literalidad razonable sin sacrificar inteligibilidad.
  - severity: medium
    issue: '''mujeres moabitas'' debilita el sentido de ''wives'' que el POB inglés preservó deliberadamente.'
    rationale: Aunque נָשִׁים puede ser 'mujeres', en este giro idiomático significa mujeres como esposas. 'Esposas moabitas' o 'mujeres moabitas' con nota puede funcionar, pero aquí el texto principal debería reflejar mejor la decisión auditada.
  - severity: low
    issue: La redacción de la nota al pie tiene comillas y puntuación poco pulidas.
    rationale: Puede normalizarse para una presentación editorial más limpia en español.
  revised_spanish_text: Y tomaron para sí esposas moabitas. El nombre de una era Orfa[a], y el nombre de la otra era Rut. Y habitaron allí unos diez años.
  revised_footnotes:
  - marker: a
    text: 'O, ''se casaron con mujeres moabitas''. El hebreo dice literalmente: ''tomaron para sí esposas moabitas''.'
    reason: lexical_alternative
  revision_rationale: Se elimina el 'se' inicial para evitar una construcción antinatural en español, y se cambia 'mujeres moabitas' por 'esposas moabitas' para reflejar mejor el valor matrimonial del modismo hebreo y la decisión léxica del POB. Se conserva la estructura del resto del versículo y la nota de alternativa, con redacción editorialmente más limpia.
