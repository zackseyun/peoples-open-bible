translation:
  language: es
  text: Cuando iban[a], iban hacia cualquiera de sus cuatro direcciones; no se volvían al ir, porque al lugar adonde se volvía la cabeza, iban tras ella[b]; no se volvían al ir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'hacia sus cuatro lados' o 'hacia sus cuatro cuartos'.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''la cabeza''; probablemente se refiere a la orientación principal o frontal en la visión.'
    reason: cultural_note
lexical_decisions:
- source_word: בְּלֶכְתָּם
  english_pob_choice: when they went / as they went
  chosen_spanish: Cuando iban
  alternatives_spanish:
  - Mientras iban
  - Al ir
  lexicon: HALOT
  rationale: La construcción temporal con ב + infinitivo de הלך expresa simultaneidad o temporalidad en la acción. En español, 'Cuando iban' comunica con naturalidad la repetición de la escena sin perder el valor descriptivo habitual.
- source_word: אֶל אַרְבַּעַת רִבְעֵיהֶם
  english_pob_choice: toward any of their four directions
  chosen_spanish: hacia cualquiera de sus cuatro direcciones
  alternatives_spanish:
  - hacia cualquiera de sus cuatro lados
  - hacia cualquiera de sus cuatro cuartos
  lexicon: HALOT
  rationale: רבע puede denotar lado, cuarto o dirección. En este contexto visionario, 'direcciones' es la opción más clara en español; 'cualquiera de' conserva el matiz distributivo que el inglés POB explicitó.
- source_word: יֵלֵכוּ
  english_pob_choice: they would go
  chosen_spanish: iban
  alternatives_spanish:
  - irían
  - seguían
  lexicon: HALOT
  rationale: El imperfecto describe una acción característica o repetida en la visión. 'Iban' fluye bien en español y mantiene el valor habitual sin introducir un futuro que suene menos natural.
- source_word: לֹא יִסַּבּוּ
  english_pob_choice: they did not turn
  chosen_spanish: no se volvían
  alternatives_spanish:
  - no giraban
  - no se apartaban
  lexicon: HALOT
  rationale: נסב en este contexto indica cambiar de dirección o girar. 'No se volvían' conserva la imagen de movimiento recto y funciona mejor en español que una calca demasiado técnica.
- source_word: הַמָּקוֹם
  english_pob_choice: the place
  chosen_spanish: el lugar
  alternatives_spanish:
  - la dirección
  - el sitio
  lexicon: HALOT
  rationale: El sustantivo literalmente es 'lugar'. Aunque el sentido roza 'dirección', mantener 'lugar' evita alejarse del hebreo y sigue siendo inteligible en español.
- source_word: יִפְנֶה
  english_pob_choice: faced
  chosen_spanish: se dirigía
  alternatives_spanish:
  - miraba
  - se volvía
  lexicon: HALOT
  rationale: De פנה, 'volverse, dirigirse, mirar'. Con 'la cabeza' como sujeto funcional, 'se dirigía' expresa orientación sin forzar una imagen corporal literal ajena al contexto visionario.
- source_word: הָרֹאשׁ
  english_pob_choice: the head
  chosen_spanish: la cabeza
  alternatives_spanish:
  - el jefe
  - el frente
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'la cabeza'. Aunque aquí probablemente designa la orientación frontal o principal, conviene conservar la imagen literal en el texto principal.
- source_word: אַחֲרָיו
  english_pob_choice: after it
  chosen_spanish: tras ella
  alternatives_spanish:
  - después de ella
  - detrás de ella
  lexicon: HALOT
  rationale: El sufijo se refiere gramaticalmente a 'la cabeza', que en español es femenino. 'Tras ella' mantiene la relación de seguimiento con un español natural y conciso.
- source_word: יֵלֵכוּ ... אַחֲרָיו יֵלֵכוּ
  english_pob_choice: they would go after it
  chosen_spanish: iban tras ella
  alternatives_spanish:
  - iban detrás de ella
  - seguían tras ella
  lexicon: HALOT
  rationale: El hebreo repite הלך con אַחֲרָיו. Repetir 'iban' en español preserva el paralelismo y el énfasis de la estructura sin añadir una paráfrasis excesiva.
theological_decisions:
- issue: Sentido de 'la cabeza' en la visión
  english_pob_reading: Hebrew 'the head'; this likely refers to the leading or frontward orientation in the vision.
  chosen_spanish_reading: '''la cabeza'' se mantiene literalmente, con el sentido probable de la orientación frontal o principal en la visión.'
  alternative_spanish_readings:
  - '''el frente'''
  - '''la parte delantera'''
  rationale: No hay razón textual para sustituir el término literal por una interpretación cerrada en el cuerpo del texto. La nota preserva la tensión entre la imagen concreta y su función direccional en la visión.
  doctrine_reference: Hermenéutica visionaria / imagen profética
translation_notes:
  revision_awareness: 'El inglés de referencia fue revisado para acercarse más al hebreo: ''toward any of their four directions'' y ''would go after it'' reflejan mejor la repetición de הלך. La versión española sigue esa revisión, manteniendo la repetición verbal, la imagen de movimiento recto y el paralelo final.'
  spanish_consistency_notes:
  - Se usa 'iban' para reflejar el imperfecto descriptivo del hebreo, de modo consistente en ambas cláusulas principales.
  - Se conserva la repetición de 'no se volvían al ir' para reproducir el énfasis paralelístico del texto.
  - '''La cabeza'' se mantiene literal en el texto, con aclaración en nota para no borrar la ambigüedad visionaria.'
  - '''Direcciones'' se elige como término principal en coherencia con el contexto espacial y la opción inglesa revisada.'
