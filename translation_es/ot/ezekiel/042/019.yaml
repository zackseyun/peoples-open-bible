translation:
  language: es
  text: Se volvió hacia el lado occidental y midió quinientas cañas con la caña de medir[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «hacia la dirección del mar»; en hebreo, esa forma de expresión señala el oeste.
    reason: cultural_note
  - marker: b
    text: Algunas interpretaciones y versiones leen «codos» en este contexto de medición, pero el hebreo aquí dice «cañas».
    reason: alternative_reading
lexical_decisions:
- source_word: סָבַב
  english_pob_choice: He turned
  chosen_spanish: Se volvió
  alternatives_spanish:
  - Giró
  - Se volvió hacia
  lexicon: HALOT
  rationale: El verbo expresa un cambio de dirección dentro de la secuencia de medición. En español, «se volvió» comunica ese giro sin añadir la idea de desplazamiento completo.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: hacia
  alternatives_spanish:
  - a
  - hacia el
  lexicon: HALOT
  rationale: La preposición marca dirección. «Hacia» conserva el sentido direccional y suena natural con el verbo de giro.
- source_word: רוּחַ הַיָּם
  english_pob_choice: the west side
  chosen_spanish: el lado del oeste
  alternatives_spanish:
  - el oeste
  - el lado occidental
  - la dirección del mar
  lexicon: HALOT
  rationale: La expresión hebrea dice literalmente «la dirección del mar», pero en este contexto topográfico indica el oeste. Se mantiene el valor direccional sin ocultar el trasfondo idiomático.
- source_word: מָדַד
  english_pob_choice: measured
  chosen_spanish: midió
  alternatives_spanish:
  - tomó medida de
  - calculó
  lexicon: HALOT
  rationale: Es el verbo normal de medición en este pasaje técnico de dimensiones del templo.
- source_word: חֲמֵשׁ מֵאוֹת
  english_pob_choice: five hundred
  chosen_spanish: quinientas
  alternatives_spanish:
  - cincocientos
  lexicon: HALOT
  rationale: Se traduce el numeral cardinal de modo directo y concordado con el sustantivo femenino implícito «cañas».
- source_word: קָנִים
  english_pob_choice: reeds
  chosen_spanish: cañas
  alternatives_spanish:
  - reeds
  - varas
  lexicon: HALOT
  rationale: En español, «cañas» reproduce bien el instrumento de medida y evita la ambigüedad de «cubitós», que no corresponde al hebreo aquí.
- source_word: בִּקְנֵה הַמִּדָּה
  english_pob_choice: with the measuring reed
  chosen_spanish: con la caña de medir
  alternatives_spanish:
  - con la caña de la medida
  - usando la caña de medir
  lexicon: HALOT
  rationale: El sintagma instrumental se vierte de forma natural en español. «Caña de medir» conserva el sentido de instrumento estándar de medición.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo y el audit trail inglés: mantiene el valor direccional idiomático de «la dirección del mar» como oeste, y conserva «cañas»/«caña de medir» frente a la lectura alternativa «codos» documentada en la tradición interpretativa. No se reportan revisiones aplicadas en el expediente inglés.'
  spanish_consistency_notes:
  - Se usó «caña» para el objeto de medida porque el hebreo distingue claramente קָנִים de קְנֵה; en español ambas formas se resuelven naturalmente con el mismo lexema, diferenciadas por número y construcción.
  - Se evitó «SEÑOR» o equivalentes porque no aparece el tetragrámaton en este versículo.
  - La expresión «lado del oeste» busca ser inteligible sin borrar el trasfondo semítico de «la dirección del mar».
