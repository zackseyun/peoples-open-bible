revisions:
- from: Daré gracias a Yahvé[a] con toda mi boca; en medio de muchos lo alabaré[b].
  to: Daré muchas gracias a Yahvé con mi boca; en medio de muchos[a] lo alabaré.
  rationale: 'Se corrige una desviación semántica menor pero real: מְאֹד modifica el acto de dar gracias, no ''mi boca''. ''Daré muchas gracias a Yahvé con mi boca'' preserva mejor el hebreo y suena natural en español. Se conserva la nota cultural sobre la dimensión pública de ''en medio de muchos'' y se elimina la nota innecesaria sobre ''Yahvé''.'
