translation:
  language: es
  text: 'Y Aarón les dijo[a]: «Quítenles los anillos de oro que están en las orejas a sus esposas, a sus hijos varones y a sus hijas, y tráiganmelos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Arránquenles los anillos de oro …». El verbo hebreo puede sugerir una extracción forzada o un desprendimiento brusco de las joyas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y ... dijo
  alternatives_spanish:
  - Entonces ... dijo
  - Y ... habló
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutiva avanza la acción; en español, «Y ... dijo» conserva esa fluidez sin añadir interpretación temporal excesiva.
- source_word: אֲלֵהֶם
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - al pueblo
  lexicon: HALOT
  rationale: El pronombre explícito se mantiene de manera natural en el dativo español, sin sustituirlo por un sustantivo interpretativo.
- source_word: אַהֲרֹן
  english_pob_choice: Aaron
  chosen_spanish: Aarón
  alternatives_spanish:
  - Aaron
  lexicon: HALOT
  rationale: Se usa la forma española estándar del nombre propio.
- source_word: פָּרְקוּ
  english_pob_choice: Take off
  chosen_spanish: Quítense
  alternatives_spanish:
  - Quítenlos
  - Arránquense
  - Despréndanlos
  lexicon: HALOT
  rationale: El verbo puede sugerir quitar, arrancar o romper. En español, «Quítense» es la opción más natural para la acción sobre adornos, pero deja intacta la tensión semántica documentada por la POB inglesa.
- source_word: נִזְמֵי
  english_pob_choice: rings
  chosen_spanish: anillos
  alternatives_spanish:
  - aros
  - aretes
  - anillos/aros
  lexicon: HALOT
  rationale: El sustantivo hebreo puede referirse a varios tipos de aros o anillos. Como el contexto inmediato aclara que van «en las orejas», «anillos» reproduce el valor general sin forzar un tipo moderno específico.
- source_word: הַזָּהָב
  english_pob_choice: the gold / rings of gold
  chosen_spanish: de oro
  alternatives_spanish:
  - de el oro
  - de oro fino
  lexicon: HALOT
  rationale: La construcción posesiva/hebraica se vierte de forma natural como «de oro», manteniendo la relación material del sintagma.
- source_word: אֲשֶׁר בְּאָזְנֵי
  english_pob_choice: that are in the ears of
  chosen_spanish: que están en las orejas de
  alternatives_spanish:
  - que están en los oídos de
  - que están en las orejas/orejas
  lexicon: HALOT
  rationale: «Orejas»/«orejas de» es más natural en español cuando se habla de joyas colocadas en la parte externa; además evita una equivalencia demasiado literal con «oídos».
- source_word: נְשֵׁיכֶם
  english_pob_choice: your wives
  chosen_spanish: sus esposas
  alternatives_spanish:
  - sus mujeres
  lexicon: HALOT
  rationale: El contexto doméstico hace que «esposas» comunique con precisión la relación familiar implicada por el hebreo.
- source_word: בְּנֵיכֶם
  english_pob_choice: your sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus varones
  - sus muchachos
  lexicon: HALOT
  rationale: En español, «hijos» funciona de manera inclusiva y natural para este paralelo familiar; aunque el hebreo dice literalmente «hijos varones», la forma española no pierde la simetría del listado.
- source_word: וּבְנֹתֵיכֶם
  english_pob_choice: and your daughters
  chosen_spanish: y de sus hijas
  alternatives_spanish:
  - y de sus muchachas
  lexicon: HALOT
  rationale: Se conserva el paralelismo explícito con «sus hijos» y el complemento genitivo fluye naturalmente en español.
- source_word: וְהָבִיאוּ אֵלַי
  english_pob_choice: and bring them to me
  chosen_spanish: y tráiganmelos
  alternatives_spanish:
  - y llévenlos a mí
  - y tráiganlos a mí
  lexicon: HALOT
  rationale: El objeto retomado en español puede expresarse pronominalmente para evitar repetición pesada. «Tráiganmelos» mantiene la referencia a los anillos y el movimiento hacia Aarón.
translation_notes:
  revision_awareness: La redacción española sigue de cerca el texto hebreo y el ajuste revisado de la POB inglesa que prefiere «rings of gold» frente a una simple inversión adjetival. Se conserva la alternativa verbal documentada para פָּרְקוּ, pero se integra en una forma española natural.
  spanish_consistency_notes:
  - Se mantiene «Aarón» como nombre propio estándar en español.
  - Se preserva la tensión lexical de פָּרְקוּ mediante nota, sin eliminar la posibilidad de un gesto más brusco que «quitar».
  - «Sus hijos» se usa como equivalente natural y fluido del hebreo paralelo, sin añadir un término colectivo no presente en el texto.
