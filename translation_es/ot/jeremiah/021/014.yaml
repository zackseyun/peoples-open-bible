base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/021/014.yaml
  text: And I will punish you according to the fruit of your deeds[a], declares Yahweh, and I will kindle a fire in her forest[b], and it will consume all that is around her.
  footnotes:
  - marker: a
    text: Or 'I will attend to you' or 'I will visit upon you'; the Hebrew verb can have a broader sense than punitive action, though here it clearly occurs in a judgment context.
    reason: lexical_alternative
  - marker: b
    text: '''Her forest'' likely refers poetically to Jerusalem or her royal/palace complex; some understand ''forest'' metaphorically as a thicket of buildings or defenses.'
    reason: cultural_note
