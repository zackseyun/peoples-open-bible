translation:
  language: es
  text: El rey no se salva por un gran ejército[a]; un guerrero[b] no se libra por mucha fuerza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por mucha fuerza»; el hebreo de חָיִל también puede denotar fuerza o recursos militares más ampliamente.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «un hombre poderoso» para «un guerrero».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵין
  english_pob_choice: is not
  chosen_spanish: no es
  alternatives_spanish:
  - no hay
  - no es que
  lexicon: HALOT
  rationale: La negación existencial/estativa del hebreo se expresa de manera natural en español con "no es" ante el predicado pasivo, conservando el sentido general sin forzar una construcción demasiado literal.
- source_word: הַמֶּלֶךְ
  english_pob_choice: The king
  chosen_spanish: El rey
  alternatives_spanish:
  - Un rey
  lexicon: HALOT
  rationale: El artículo definido está presente en hebreo; por eso "El rey" mantiene la generalización proverbial del enunciado.
- source_word: נוֹשָׁע
  english_pob_choice: saved
  chosen_spanish: es salvado
  alternatives_spanish:
  - es librado
  - es rescatado
  lexicon: HALOT
  rationale: El nifal de ישׁע comunica ser salvado/deliverado. "Es salvado" conserva el vínculo léxico bíblico con la salvación sin perder el matiz pasivo.
- source_word: בְּרָב
  english_pob_choice: by a great
  chosen_spanish: por un gran
  alternatives_spanish:
  - por mucha
  - mediante una gran
  lexicon: HALOT
  rationale: La preposición בְּ aquí indica medio; en español, "por un gran..." expresa esa instrumentalidad de forma idiomática.
- source_word: חָיִל
  english_pob_choice: army
  chosen_spanish: ejército
  alternatives_spanish:
  - fuerza
  - poderío militar
  - tropa
  lexicon: HALOT
  rationale: Aunque el hebreo puede abarcar fuerza, recursos o fuerza militar, en este contexto real y bélico el sentido concreto de fuerzas militares es el más probable; "ejército" comunica ese valor de manera clara en español. La nota conserva la alternativa semántica más amplia.
- source_word: גִּבּוֹר
  english_pob_choice: a warrior
  chosen_spanish: un guerrero
  alternatives_spanish:
  - un poderoso
  - un valiente
  - un héroe
  lexicon: HALOT
  rationale: '"Guerrero" reproduce el perfil marcial del término y su paralelismo con la primera cola; es más natural en español contemporáneo que "hombre poderoso" o "héroe".'
- source_word: יִנָּצֵל
  english_pob_choice: is not delivered
  chosen_spanish: es librado
  alternatives_spanish:
  - es rescatado
  - escapa
  - es salvado
  lexicon: HALOT
  rationale: El nifal de נצל significa ser librado/rescatado. "Es librado" mantiene el paralelismo con "es salvado" y evita repetir exactamente el mismo verbo sin necesidad.
- source_word: כֹּחַ
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - poder
  - energía
  - fortaleza
  lexicon: HALOT
  rationale: '"Fuerza" es el equivalente más directo y natural para כֹּחַ en este contexto de capacidad militar o física.'
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés presentan alta concordancia y no registran revisiones aplicadas; la versión española sigue esa lectura estable, preservando el paralelismo poético y las alternativas léxicas documentadas.
  spanish_consistency_notes:
  - Se mantiene la estructura paralela de dos miembros con negación pasiva en ambas colas.
  - '"Ejército" y "fuerza" reflejan el campo semántico militar de חָיִל y כֹּחַ sin borrar la amplitud posible del primer término.'
  - '"Guerrero" conserva el matiz de גִּבּוֹר como combatiente valiente, más que un título heroico abstracto.'
  - Se usa "librado" en el segundo miembro para mantener variación estilística sin cambiar el sentido de rescate/deliverance.
