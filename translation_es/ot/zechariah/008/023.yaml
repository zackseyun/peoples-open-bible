translation:
  language: es
  text: 'Así dice Yahvé de los Ejércitos:[a] En aquellos días, diez hombres de todas las lenguas de las naciones se asirán del borde[b] del vestido de un hombre judío[c], diciendo: «Vayamos con ustedes, porque hemos oído que Dios está con ustedes».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “Yahvé de las Huestes”.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, “el borde” o “la esquina” del vestido.
    reason: lexical_alternative
  - marker: c
    text: O “un hombre de Judá”.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: Yahweh of Armies
  chosen_spanish: Yahvé de los Ejércitos
  alternatives_spanish:
  - Yahvé de los Ejércitos celestiales
  - el SEÑOR de los Ejércitos
  lexicon: HALOT
  rationale: Se conserva el nombre divino explícito como 'Yahvé', conforme al criterio del proyecto; צְבָאוֹת se vierte 'de los Ejércitos' para mantener el valor concreto de la expresión y una dignidad bíblica natural en español.
- source_word: בַּיָּמִים הָהֵמָּה
  english_pob_choice: In those days
  chosen_spanish: En aquellos días
  alternatives_spanish:
  - En esos días
  - En aquel tiempo
  lexicon: HALOT
  rationale: La expresión temporal idiomática se reproduce de forma natural en español sin perder el paralelismo profético del hebreo.
- source_word: יַחֲזִיקוּ ... וְהֶחֱזִיקוּ
  english_pob_choice: will take hold—yes, they will take hold
  chosen_spanish: tomarán —sí, tomarán—
  alternatives_spanish:
  - se aferrarán —sí, se aferrarán—
  - agarrarán —sí, agarrarán—
  lexicon: HALOT
  rationale: Se conserva la repetición enfática del verbo hebreo. 'Tomar' no es literal en sentido físico, pero en español puede expresar la acción de asirse; la repetición con inciso reproduce la fuerza intensiva del original y del audit trail inglés.
- source_word: עֲשָׂרָה אֲנָשִׁים
  english_pob_choice: ten men
  chosen_spanish: diez hombres
  alternatives_spanish:
  - diez personas
  - diez varones
  lexicon: HALOT
  rationale: Se mantiene el masculino plural del hebreo, que en este contexto representa varones de las naciones que se acercan al judío.
- source_word: מִכֹּל לְשֹׁנוֹת הַגּוֹיִם
  english_pob_choice: from all the languages of the nations
  chosen_spanish: de todas las lenguas de las naciones
  alternatives_spanish:
  - de todos los idiomas de las naciones
  - de todas las lenguas entre las naciones
  lexicon: HALOT
  rationale: '''Lenguas'' conserva el valor semítico de לְשׁוֹנוֹת y suena natural en español bíblico; el plural ''de todas'' refleja mejor la pluralidad del hebreo que una forma singularizante.'
- source_word: בִּכְנַף
  english_pob_choice: of the edge of the garment
  chosen_spanish: del borde
  alternatives_spanish:
  - del extremo
  - del ala
  lexicon: HALOT
  rationale: כָּנָף puede significar borde, esquina o ala; aquí se opta por 'borde' por ser claro y no sobreespecificar una prenda distinta de la que dice el texto. El artículo implícito del contexto se resuelve en la frase 'del borde del vestido'.
- source_word: אִישׁ יְהוּדִי
  english_pob_choice: a Jewish man
  chosen_spanish: un hombre judío
  alternatives_spanish:
  - un judío
  - un hombre de Judá
  - un varón judío
  lexicon: HALOT
  rationale: '''Hombre judío'' conserva tanto אִישׁ como יְהוּדִי y resulta más transparente que un simple ''judío''. ''Judeano'' es posible, pero aquí el sentido étnico-covenantal es el que mejor comunica el pasaje en español.'
- source_word: נֵלְכָה עִמָּכֶם
  english_pob_choice: Let us go with you
  chosen_spanish: Iremos con ustedes
  alternatives_spanish:
  - Vayamos con ustedes
  - Déjennos ir con ustedes
  lexicon: HALOT
  rationale: El cohortativo hebreo expresa intención/resolución o invitación; 'Iremos' comunica con naturalidad esa determinación en español sin forzar una fórmula demasiado imperativa.
- source_word: אֱלֹהִים עִמָּכֶם
  english_pob_choice: God is with you
  chosen_spanish: Dios está con ustedes
  alternatives_spanish:
  - Dios está entre ustedes
  - Dios está con vosotros
  lexicon: HALOT
  rationale: Se traduce la preposición עִם de manera directa y sobria; 'está con ustedes' es la forma más clara en español contemporáneo para la presencia divina afirmada por el texto.
theological_decisions:
- issue: Nombre divino en יְהוָה צְבָאוֹת
  english_pob_reading: Yahweh of Armies
  chosen_spanish_reading: Yahvé de los Ejércitos
  alternative_spanish_readings:
  - el SEÑOR de los Ejércitos
  - Yahvé de los Ejércitos celestiales
  rationale: Se mantiene el Tetragrámaton como nombre propio divino, no enmascarado por un título reverencial. 'Ejércitos' conserva el valor de צְבָאוֹת sin convertirlo en una paráfrasis más interpretativa.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de אִישׁ יְהוּדִי
  english_pob_reading: a Jewish man
  chosen_spanish_reading: un hombre judío
  alternative_spanish_readings:
  - un judío
  - un hombre de Judá
  rationale: En este anuncio profético, el referente es una persona representativa del pueblo de Judá. 'Hombre judío' evita reducirlo a mera geografía y conserva el valor étnico-identitario del término.
  doctrine_reference: Translation philosophy §1, §4
- issue: Colectivo de las naciones acercándose a Sion
  english_pob_reading: ten men from all the languages of the nations
  chosen_spanish_reading: diez hombres de todas las lenguas de las naciones
  alternative_spanish_readings:
  - diez hombres de todos los pueblos
  - diez hombres de todas las naciones
  rationale: La formulación mantiene el alcance universal del oráculo sin borrar la concreción de 'lenguas', que subraya la procedencia multicultural de los que se aferran al judío.
  doctrine_reference: Isaías 2:2-3; Zacarías 8:20-23
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la última redacción inglesa revisada, pero ajusta el registro al español natural: ''de todas las lenguas'' para reflejar el plural hebreo, y ''del borde del vestido'' para conservar la imagen concreta de כָּנָף sin introducir una prenda no explicitada. También se conserva la repetición enfática del verbo con un inciso español equivalente.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino conforme al estándar del proyecto.
  - '''Ejércitos'' se prefiere a ''huestes'' o ''hosts'' por claridad contemporánea.'
  - '''Lenguas'' traduce לְשׁוֹנוֹת para mantener el matiz de idiomas, no solo de pueblos.'
  - '''Hombre judío'' conserva el componente אישי/identitario de אִישׁ יְהוּדִי.'
  - Las notas al pie se anclan exactamente en 'tomarán[a]', 'borde[b]' y 'judío[c]' para corresponder a las alternativas documentadas.
