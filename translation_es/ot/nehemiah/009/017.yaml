revisions:
- from: Pero ellos se negaron a escuchar y no recordaron tus maravillas que habías hecho entre ellos. Endurecieron su cerviz y nombraron un jefe para volver a su esclavitud en su rebelión. Pero tú eres un Dios de perdón[a], clemente y compasivo, lento para la ira y abundante en misericordia[b], y no los abandonaste.
  to: Pero ellos se negaron a escuchar y no recordaron tus maravillas que habías hecho entre ellos. Endurecieron su cerviz y designaron un jefe[b] para volver a su esclavitud en su rebelión. Pero tú eres un Dios de perdón[a], clemente y compasivo, tardo para la ira y abundante en amor fiel, y no los abandonaste.
  rationale: Se corrigió la principal desalineación léxico-teológica cambiando 'abundante en misericordia' por 'abundante en amor fiel' para reflejar mejor חֶסֶד como amor leal/de pacto. También se reparó la nota [b], moviéndola al segmento 'designaron un jefe' para conservar la alternativa literal del hebreo 'pusieron una cabeza', en conformidad con la auditoría inglesa. Se mantuvo 'Dios de perdón' con nota por el plural intensivo hebreo, y se ajustó 'lento para la ira' a 'tardo para la ira' por mejor naturalidad bíblica en español.
