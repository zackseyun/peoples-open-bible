base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/014/029.yaml
  text: And the Levite shall come[a], because he has no portion or inheritance with you, and the sojourner, the fatherless, and the widow who are within your gates, and they shall eat and be satisfied[b], so that Yahweh your God may bless you in all the work of your hands that you do.
  footnotes:
  - marker: a
    text: Or 'the resident foreigner' for 'the sojourner.' The Hebrew term refers to a non-Israelite living among Israel.
    reason: lexical_alternative
  - marker: b
    text: Literally 'within your gates,' an idiom for those living within your towns or local community.
    reason: cultural_note
