translation:
  language: es
  text: Y tú, hijo de hombre, prepárate[a] equipaje para el exilio, y ve al destierro de día delante de sus ojos. Irás al destierro de tu lugar a otro lugar delante de sus ojos. Quizá vean[b], pues son una casa rebelde.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «enseres para el exilio» o «artículos de destierro». El hebreo se refiere a las pertenencias que un desterrado llevaría consigo.
    reason: lexical_alternative
  - marker: b
    text: O «Quizá entiendan»; el verbo hebreo dice literalmente «ver», pero puede extenderse a percepción o reconocimiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶן אָדָם
  english_pob_choice: son of man
  chosen_spanish: hijo de hombre
  alternatives_spanish:
  - mortal
  - ser humano
  lexicon: HALOT
  rationale: Conserva el valor idiomático y la dirección profética del hebreo sin neutralizar la fórmula ni convertirla en una paráfrasis.
- source_word: עֲשֵׂה לְךָ
  english_pob_choice: prepare for yourself
  chosen_spanish: hazte
  alternatives_spanish:
  - prepárate
  - haz para ti
  lexicon: HALOT
  rationale: El verbo עשה es amplio; en este contexto de acto simbólico con objetos para el destierro, «hazte» sigue de cerca la forma verbal y suena natural en español, con el complemento aclarado por el sintagma siguiente.
- source_word: כְּלֵי גוֹלָה
  english_pob_choice: baggage for exile
  chosen_spanish: útiles para el exilio
  alternatives_spanish:
  - bienes para el exilio
  - equipaje para el exilio
  - enseres del destierro
  lexicon: HALOT
  rationale: כְּלִי puede abarcar artículos, implementos o enseres; «útiles» evita reducirlo solo a equipaje y conserva el carácter de objetos necesarios para una partida de destierro.
- source_word: וּגְלֵה יוֹמָם
  english_pob_choice: go into exile by day
  chosen_spanish: sal de día
  alternatives_spanish:
  - ve al destierro de día
  - destiérrate de día
  lexicon: HALOT
  rationale: Se preserva la visibilidad pública del acto. «Sal de día» comunica el movimiento visible sin forzar una construcción menos natural en español, y el contexto ya aclara que se trata del exilio.
- source_word: לְעֵינֵיהֶם
  english_pob_choice: before their eyes
  chosen_spanish: delante de sus ojos
  alternatives_spanish:
  - a la vista de ellos
  - en presencia de ellos
  lexicon: HALOT
  rationale: Es una equivalencia directa y vívida para la insistencia del texto en la observación pública.
- source_word: וְגָלִיתָ מִמְּקוֹמְךָ אֶל מָקוֹם אַחֵר
  english_pob_choice: You shall go into exile from your place to another place
  chosen_spanish: Saldrás de tu lugar a otro lugar
  alternatives_spanish:
  - Te irás de tu lugar a otro lugar
  - Serás llevado de tu lugar a otro lugar
  lexicon: HALOT
  rationale: La repetición de גלה se mantiene con el verbo de movimiento en español, aunque aquí se evita repetir «exilio» de manera rígida; el acto sigue siendo el de una salida/departida simbólica a otro lugar.
- source_word: אוּלַי יִרְאוּ
  english_pob_choice: Perhaps they will see
  chosen_spanish: Quizá vean
  alternatives_spanish:
  - Tal vez vean
  - Quizá entiendan
  lexicon: HALOT
  rationale: «Ver» conserva el verbo literal y la tensión entre visión física y percepción espiritual, sin resolverla anticipadamente como «entender».
- source_word: בֵּית מְרִי
  english_pob_choice: a rebellious house
  chosen_spanish: una casa rebelde
  alternatives_spanish:
  - una casa de rebeldía
  - un pueblo rebelde
  lexicon: HALOT
  rationale: La fórmula característica de Ezequiel se conserva casi literalmente, manteniendo el matiz corporativo y pactual de «casa».
theological_decisions:
- issue: Valor de אָדָם en el vocativo profético
  english_pob_reading: son of man
  chosen_spanish_reading: hijo de hombre
  alternative_spanish_readings:
  - mortal
  - ser humano
  rationale: La fórmula profética se preserva literalmente para mantener la resonancia intertextual y la dignidad del llamado, sin suavizarla a una expresión más general.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy 4; Contested terms: אָדָם'
- issue: Sentido de יִרְאוּ en el acto-signo
  english_pob_reading: see
  chosen_spanish_reading: vean
  alternative_spanish_readings:
  - entiendan
  - perciban
  rationale: El énfasis del pasaje está en la visibilidad pública del acto repetida por dos veces «delante de sus ojos»; «vean» conserva la ambigüedad entre observación y comprensión sin anularla.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Interpretación de כִּי en la cláusula final
  english_pob_reading: for they are a rebellious house
  chosen_spanish_reading: pues son una casa rebelde
  alternative_spanish_readings:
  - porque son una casa rebelde
  - ya que son una casa rebelde
  rationale: Se evita una lectura concesiva («aunque») y se refleja la relación explicativa que el audit trail inglés corrigió a partir del hebreo.
  doctrine_reference: DOCTRINE.md §Discourse particles; כִּי
- issue: Naturaleza de כְּלֵי גוֹלָה
  english_pob_reading: baggage for exile
  chosen_spanish_reading: útiles para el exilio
  alternative_spanish_readings:
  - equipaje para el exilio
  - enseres del destierro
  rationale: Se preserva la posibilidad de entender objetos o enseres del destierro sin restringir el hebreo a una sola categoría moderna de viaje.
  doctrine_reference: DOCTRINE.md §Lexical nuance; כְּלִי
translation_notes:
  revision_awareness: La redacción sigue la revisión final del audit trail inglés, que mantuvo la repetición de la visibilidad pública y corrigió la última cláusula a un valor explicativo de כִּי («pues»). Se conservó la tensión entre ver y comprender en el verbo final, sin resolverla en una sola interpretación.
  spanish_consistency_notes:
  - Se usó «Yahvé» no porque aparezca en este versículo, sino como norma general del proyecto cuando corresponda.
  - «Hijo de hombre» se mantiene como vocativo técnico-profético, no como mera referencia biológica.
  - «Exilio»/«destierro» se trata como un campo semántico único; aquí se eligió «exilio» en la nota y «útiles para el exilio» en el texto por claridad.
  - La duplicación de «delante de sus ojos» conserva el énfasis retórico del hebreo.
  - No se introdujo «Cristo» ni terminología eclesiástica ajena al pasaje.
