translation:
  language: es
  text: Reuniré a todas las naciones y las haré descender al valle de Josafat[a], y allí entraré en juicio con ellas acerca de mi pueblo y mi heredad, Israel[b], a quien dispersaron entre las naciones y repartieron mi tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El «valle de Josafat» es un nombre de lugar; el nombre mismo puede evocar la idea de que «Yahvé juzga».
    reason: cultural_note
  - marker: b
    text: O «por causa de mi pueblo y mi heredad, Israel» o «acerca de mi pueblo y mi heredad, Israel». La preposición hebrea puede entenderse en más de un sentido judicial estrechamente relacionado.
    reason: alternative_reading
lexical_decisions:
- source_word: קִבַּצְתִּי
  english_pob_choice: I will gather
  chosen_spanish: Reuniré
  alternatives_spanish:
  - Juntaré
  - Agruparé
  lexicon: HALOT
  rationale: קבץ expresa reunir o juntar. «Reuniré» suena natural en español y conserva la idea de convocación escatológica para juicio.
- source_word: כָּל הַגּוֹיִם
  english_pob_choice: all the nations
  chosen_spanish: todas las naciones
  alternatives_spanish:
  - todos los pueblos
  - todos los gentiles
  lexicon: HALOT
  rationale: Aquí גּוֹיִם designa a las naciones en conjunto. «Naciones» evita el sentido más técnico de «gentiles» y sigue de cerca el valor contextual.
- source_word: וְהוֹרַדְתִּים
  english_pob_choice: bring them down
  chosen_spanish: las haré descender
  alternatives_spanish:
  - las bajaré
  - las conduciré hacia abajo
  lexicon: HALOT
  rationale: El hifil de ירד es causativo. «Las haré descender» preserva esa causatividad sin perder naturalidad en español.
- source_word: עֵמֶק יְהוֹשָׁפָט
  english_pob_choice: the Valley of Jehoshaphat
  chosen_spanish: el valle de Josafat
  alternatives_spanish:
  - el valle de Jehoshaphat
  - el valle donde Yahvé juzga
  lexicon: HALOT
  rationale: Se mantiene el topónimo como nombre propio, siguiendo la decisión POB de tratarlo como lugar. «Josafat» es la forma más usual y legible en español bíblico.
- source_word: וְנִשְׁפַּטְתִּי עִמָּם
  english_pob_choice: I will enter into judgment with them
  chosen_spanish: entraré en juicio con ellas
  alternatives_spanish:
  - litigaré con ellas
  - me pondré en juicio con ellas
  lexicon: HALOT
  rationale: La forma niphal con עִם expresa contienda/juicio legal, no solo sentencia. «Entraré en juicio con ellas» conserva el matiz jurídico y refleja bien la lectura auditada en inglés.
- source_word: עַל
  english_pob_choice: concerning
  chosen_spanish: acerca de
  alternatives_spanish:
  - por causa de
  - en cuanto a
  lexicon: HALOT
  rationale: En este contexto judicial, la preposición puede introducir el asunto o base del juicio. «Acerca de» comunica el referente del litigio sin resolver en exceso la tensión semántica.
- source_word: עַמִּי וְנַחֲלָתִי יִשְׂרָאֵל
  english_pob_choice: my people and my inheritance, Israel
  chosen_spanish: mi pueblo y de mi heredad, Israel
  alternatives_spanish:
  - mi pueblo y mi heredad, Israel
  - mi pueblo y mi posesión, Israel
  - mi pueblo y mi herencia, Israel
  lexicon: HALOT
  rationale: נַחֲלָה tiene fuerza de posesión heredada/covenantal. «Heredad» conserva ese peso bíblico y permite mantener el paralelismo con «mi pueblo». Se evita «herencia» por sonar más abstracta en español moderno.
- source_word: פִּזְּרוּ
  english_pob_choice: they scattered
  chosen_spanish: dispersaron
  alternatives_spanish:
  - esparcieron
  - desparramaron
  lexicon: HALOT
  rationale: פזר significa dispersar o esparcir. «Dispersaron» es el equivalente más claro y sobrio en español bíblico contemporáneo.
- source_word: בַגּוֹיִם
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los pueblos
  - en medio de las naciones
  lexicon: HALOT
  rationale: La idea es dispersión en medio de múltiples naciones. «Entre» mantiene la relación distributiva y evita una lectura excesivamente local.
- source_word: אַרְצִי
  english_pob_choice: my land
  chosen_spanish: mi tierra
  alternatives_spanish:
  - mi país
  - mi territorio
  lexicon: HALOT
  rationale: אֶרֶץ aquí remite a la tierra perteneciente a Yahvé en contexto pactal. «Mi tierra» conserva la fuerza territorial y teológica.
- source_word: חִלֵּקוּ
  english_pob_choice: divided
  chosen_spanish: repartieron
  alternatives_spanish:
  - dividieron
  - apropiaron por partes
  lexicon: HALOT
  rationale: El piel de חלק implica dividir/aportar porciones. «Repartieron» expresa la acción concreta de distribuir la tierra en porciones, con un matiz más directo que «dividieron».
theological_decisions:
- issue: Referencia al nombre divino en un dicho profético con topónimo teológico
  english_pob_reading: The Valley of Jehoshaphat is a place name; the name itself may echo the idea 'the LORD judges.'
  chosen_spanish_reading: el valle de Josafat, tratado como topónimo sin explicitar en el texto principal su sentido etimológico
  alternative_spanish_readings:
  - el valle donde Yahvé juzga
  - el valle de Yahvé juzga
  rationale: El hebreo presenta el nombre como lugar. Mantenerlo como topónimo preserva la lectura auditada y evita convertir el nombre en una glosa interpretativa dentro del versículo.
  doctrine_reference: Translation philosophy §3 (preserve textual tensions and avoid over-explanation in the main text)
- issue: Fuerza de עַל en la cláusula judicial
  english_pob_reading: concerning my people and my inheritance, Israel
  chosen_spanish_reading: acerca de mi pueblo y de mi heredad, Israel
  alternative_spanish_readings:
  - por causa de mi pueblo y de mi heredad, Israel
  - con respecto a mi pueblo y de mi heredad, Israel
  rationale: La preposición admite un rango entre causa, asunto y base del litigio. «Acerca de» conserva esa ambigüedad funcional en un español claro y no interpretativo.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
- issue: Valor pactal de נַחֲלָה
  english_pob_reading: my inheritance
  chosen_spanish_reading: mi heredad
  alternative_spanish_readings:
  - mi herencia
  - mi posesión
  rationale: «Heredad» mantiene el peso de posesión recibida y pertenencia pactal, más cercano a la carga bíblica de נַחֲלָה que «herencia» en el español actual.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la lectura inglesa auditada, pero ajusta varios puntos para el español: se optó por «Reuniré» y «las haré descender» para mantener el tono profético; «entraré en juicio con ellas» conserva el matiz legal de וְנִשְׁפַּטְתִּי עִמָּם; «acerca de» refleja la ambigüedad de עַל sin cerrarla; y se prefirió «heredad» para נַחֲלָה y «repartieron» para חִלֵּקוּ, en línea con la revisión inglesa más formal.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando aparezca explícitamente en notas o referencias explicativas, aunque en este versículo el texto principal usa el topónimo tradicional.
  - Se preserva la distinción entre «pueblo» y «heredad» para reflejar el paralelismo hebreo.
  - Se evita «gentiles» porque גּוֹיִם aquí habla de naciones colectivas, no de una categoría religiosa técnica.
  - El marcador de nota [a] aparece solo en el topónimo y corresponde a una única observación cultural/toponímica.
