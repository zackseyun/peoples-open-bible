translation:
  language: es
  text: ¿No es mucha tu maldad[a], y no hay fin para tus iniquidades[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu mal». El hebreo רָעָה puede significar también «calamidad» en otros contextos, pero aquí el paralelismo con «tus iniquidades» señala el sentido moral.
    reason: lexical_alternative
  - marker: b
    text: O «y no hay límite para tus iniquidades».
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  english_pob_choice: Is not
  chosen_spanish: ¿No es... ?
  alternatives_spanish:
  - ¿Acaso no es... ?
  - ¿No es cierto que... ?
  lexicon: HALOT
  rationale: Conserva el valor retórico de pregunta que espera respuesta afirmativa. En español, la inversión con «¿No es...?» reproduce bien la fuerza acusatoria sin añadir matices que el hebreo no exige.
- source_word: רָעָתְךָ
  english_pob_choice: your evil
  chosen_spanish: tu maldad
  alternatives_spanish:
  - tu mal
  - tu maldad/iniquidad
  - tu perversidad
  lexicon: HALOT
  rationale: El contexto paralelo con «tu iniquidad» muestra que aquí se trata de culpa moral, no de calamidad. «Maldad» comunica esa carga con naturalidad en español; «mal» sería más general y «perversidad» más interpretativo.
- source_word: רַבָּה
  english_pob_choice: abundant
  chosen_spanish: grande
  alternatives_spanish:
  - abundante
  - mucha
  - extensa
  lexicon: HALOT
  rationale: El adjetivo expresa magnitud. En español, «grande» funciona con «maldad» de manera natural y cercana al valor cuantitativo/intensivo del hebreo; «abundante» suena menos idiomático con este sustantivo.
- source_word: וְאֵין
  english_pob_choice: and there is no
  chosen_spanish: y no hay
  alternatives_spanish:
  - y no existe
  - y no hay fin
  - y no tiene
  lexicon: HALOT
  rationale: La construcción hebrea introduce de forma directa la negación del límite. «Y no hay» permite una estructura fluida en español y conserva el encadenamiento del original.
- source_word: קֵץ
  english_pob_choice: end
  chosen_spanish: fin
  alternatives_spanish:
  - límite
  - término
  - final
  lexicon: HALOT
  rationale: «Fin» es el equivalente más natural en la expresión «no tiene fin», que refleja bien la idea de ausencia de límite o conclusión.
- source_word: לַעֲוֺנֹתֶיךָ
  english_pob_choice: to your iniquities
  chosen_spanish: tu iniquidad
  alternatives_spanish:
  - tus iniquidades
  - tu culpa
  - tus pecados
  lexicon: HALOT
  rationale: El hebreo está en plural («tus iniquidades»), pero el español puede agrupar el plural como una noción colectiva en singular para evitar una formulación pesada. Aun así, la nota de alternativa preserva la lectura más literal plural y la fuerza moral de עוון.
theological_decisions:
- issue: ¿Rָעָתְךָ debe leerse como mal moral o calamidad?
  english_pob_reading: moral evil/wickedness
  chosen_spanish_reading: maldad moral
  alternative_spanish_readings:
  - calamidad
  - desgracia
  - aflicción
  rationale: La paridad con «tu iniquidad» hace que el sentido moral sea claramente primario. Traducirlo como calamidad desharía la acusación de Elifaz y desplazaría el peso del versículo hacia el sufrimiento, algo que el hebreo aquí no sostiene.
  doctrine_reference: Principio POB de primacía del texto original y preservación del sentido llano del paralelo poético
- issue: ¿Conviene mantener el plural de לַעֲוֺנֹתֶיךָ o recogerlo como singular colectivo?
  english_pob_reading: to your iniquities
  chosen_spanish_reading: tu iniquidad (colectivo)
  alternative_spanish_readings:
  - tus iniquidades
  - tu culpa acumulada
  rationale: El plural hebreo puede expresarse en español como un singular colectivo sin perder el valor acumulativo. Se deja constancia de la alternativa plural porque es la forma más cercana al original y puede ser preferida en una edición más formal.
  doctrine_reference: Principio de transparencia textual y preservación de la tensión entre literalidad y naturalidad en poesía hebrea
translation_notes:
  revision_awareness: Se revisó el borrador a la luz del audit trail inglés y del hebreo. Se mantuvo la lectura moral de רָעָה por el paralelismo con עוֹן, y se ajustó la segunda cola para sonar natural en español sin perder la idea de ausencia de límite. La única tensión explícita conservada es el singular colectivo frente al plural hebreo de עֲוֺנֹתֶיךָ, marcada en nota.
  spanish_consistency_notes:
  - Se usa «maldad» para רָעָה en sentido moral, en línea con el contexto acusatorio del versículo.
  - Se usa «iniquidad» para עוון, siguiendo el tono fuerte del original y del POB inglés.
  - Se evita «Señor»/«SEÑOR» porque no aparece el nombre divino en este versículo.
  - La puntuación mantiene el paralelismo poético y la fuerza de la pregunta retórica.
