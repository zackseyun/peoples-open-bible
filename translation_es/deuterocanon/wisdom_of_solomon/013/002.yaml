translation:
  language: es
  text: En cambio, consideraron[a] o bien fuego, o bien viento, o bien aire veloz, o bien el círculo de las estrellas[b], o bien agua violenta, o bien los luceros del cielo como dioses[c], gobernantes del mundo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «espíritu» para πνεῦμα; aquí el contexto de fenómenos naturales favorece «viento».
    reason: lexical_alternative
  - marker: b
    text: O «el circuito de las estrellas» para «el círculo de las estrellas».
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente, «presidentes/gobernantes del mundo»; el griego presenta una construcción appositiva: «dioses, gobernantes del mundo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλʼ ἢ
  english_pob_choice: Instead, ... either
  chosen_spanish: En cambio, ... o bien
  alternatives_spanish:
  - Pero ... o bien
  - Más bien, ... o bien
  lexicon: LSJ
  rationale: La partícula adversativa introduce contraste con el versículo anterior; «En cambio» conserva ese giro natural en español y «o bien» mantiene la serie disyuntiva repetida del griego.
- source_word: πῦρ
  english_pob_choice: fire
  chosen_spanish: fuego
  alternatives_spanish:
  - fuego elemental
  lexicon: LSJ
  rationale: Término elemental directo; no requiere ampliación.
- source_word: πνεῦμα
  english_pob_choice: wind
  chosen_spanish: viento
  alternatives_spanish:
  - espíritu
  - aliento
  lexicon: LSJ
  rationale: En este catálogo de fenómenos naturales, «viento» expresa mejor el referente físico y evita introducir una acepción personal o teológica que el contexto no pide.
- source_word: ταχινὸν ἀέρα
  english_pob_choice: swift air
  chosen_spanish: aire veloz
  alternatives_spanish:
  - aire rápido
  - aire que corre
  lexicon: LSJ
  rationale: Conserva la distinción entre πνεῦμα y ἀήρ, y reproduce el valor de rapidez de ταχινὸν sin añadir interpretación cosmológica excesiva.
- source_word: κύκλον ἄστρων
  english_pob_choice: the circle of the stars
  chosen_spanish: el círculo de las estrellas
  alternatives_spanish:
  - el circuito de las estrellas
  - la esfera de las estrellas
  lexicon: LSJ
  rationale: Mantiene la imagen espacial/circular del griego y la opción conservadora del audit trail inglés, sin decidir entre varias reconstrucciones astronómicas posibles.
- source_word: βίαιον ὕδωρ
  english_pob_choice: violent water
  chosen_spanish: agua violenta
  alternatives_spanish:
  - agua impetuosa
  - agua furiosa
  lexicon: LSJ
  rationale: Traduce literalmente la fuerza del adjetivo y conserva el sentido de elemento destructivo o desbordado.
- source_word: φωστῆρας οὐρανοῦ
  english_pob_choice: the lights of heaven
  chosen_spanish: los luceros del cielo
  alternatives_spanish:
  - las luminarias del cielo
  - las luces del cielo
  lexicon: LSJ
  rationale: «Luceros» es idiomático en español para astros brillantes y mantiene el registro elevado; «del cielo» reproduce οὐρανοῦ.
- source_word: θεοὺς ἐνόμισαν
  english_pob_choice: they considered ... to be gods
  chosen_spanish: como dioses
  alternatives_spanish:
  - por dioses
  - que eran dioses
  lexicon: LSJ
  rationale: La estructura griega expresa que los tuvieron por dioses; en español, «como dioses» transmite esa valoración sin forzar una perífrasis más pesada en la cláusula principal.
- source_word: πρυτάνεις κόσμου
  english_pob_choice: rulers of the world
  chosen_spanish: presidiendo el mundo
  alternatives_spanish:
  - gobernantes del mundo
  - regentes del mundo
  lexicon: LSJ
  rationale: «πρυτάνεις» sugiere quienes presiden o ejercen autoridad. En español, «presidiendo el mundo» conserva la función descriptiva/appositiva del griego y evita una redundancia demasiado dura tras «como dioses».
theological_decisions:
- issue: Sentido de πνεῦμα en un catálogo de fenómenos naturales
  english_pob_reading: wind
  chosen_spanish_reading: viento
  alternative_spanish_readings:
  - espíritu
  - aliento
  rationale: El contexto enumera elementos celestes y naturales idolatrados; «viento» preserva ese marco y evita sugerir una entidad espiritual personal.
  doctrine_reference: Principio de primacía del original y coherencia contextual anti-idolátrica.
- issue: Relación entre θεοὺς y πρυτάνεις κόσμου
  english_pob_reading: to be gods, rulers of the world
  chosen_spanish_reading: como dioses, presidiendo el mundo
  alternative_spanish_readings:
  - como dioses, gobernantes del mundo
  - como dioses, regentes del mundo
  rationale: El griego une la acusación de divinización con una descripción de función cósmica. «Como dioses, presidiendo el mundo» intenta preservar esa tensión sin borrar la estructura appositiva ni convertirla en una simple afirmación de poder abstracto.
  doctrine_reference: Respeto por la sintaxis y la teología implícita del texto sapiencial.
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego de Swete 1909 y el audit trail inglés, pero ajusta la última frase para conservar en español la relación appositiva entre «dioses» y «presidiendo el mundo».
  spanish_consistency_notes:
  - Se usa «viento» para πνεῦμα conforme al contexto natural y en coherencia con la decisión inglesa.
  - Se conserva la distinción entre πνεῦμα y ἀήρ mediante «viento» y «aire veloz».
  - «Luceros del cielo» mantiene el registro elevado de φωστῆρας οὐρανοῦ sin recurrir a una terminología técnica innecesaria.
  - La puntuación busca reflejar la serie disyuntiva griega y la apposición final del original.
