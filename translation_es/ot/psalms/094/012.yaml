    reason: lexical_alternative
  - marker: b
    text: Hebreo «el hombre»; el singular masculino aquí probablemente tiene sentido representativo y se refiere a la persona que recibe la disciplina y enseñanza del Señor.
    reason: lexical_alternative
  - marker: c
    text: Hebreo «Yah», la forma poética abreviada del nombre divino, distinta del tetragrama completo YHWH, que normalmente se traduce «Yahvé».
    reason: lexical_alternative
  - marker: d
    text: O «de tu instrucción». El hebreo torá puede significar «ley» o, más ampliamente, «instrucción».
    reason: lexical_alternative
