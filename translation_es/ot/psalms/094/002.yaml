translation:
  language: es
  text: ¡Levántate[a], Juez de la tierra; dales[b] a los soberbios lo que merecen!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Álzate»; el verbo hebreo también puede entenderse más literalmente como un llamado a que Dios «se levante» o «sea exaltado».
    reason: lexical_alternative
  - marker: b
    text: O «retribuye a los soberbios» o «devuelve retribución sobre los soberbios».
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנָּשֵׂא
  english_pob_choice: Rise up
  chosen_spanish: ¡Levántate!
  alternatives_spanish:
  - ¡Alzate!
  - ¡Ensalzate!
  - ¡Levántate sobre tus enemigos!
  lexicon: HALOT
  rationale: El hebreo es un imperativo con matiz reflexivo/intransitivo que llama a Dios a actuar y salir en defensa. «Levántate» es idiomático en español bíblico actual y conserva la fuerza de una súplica urgente; «ensalzate» sonaría más estático y menos natural en esta petición.
- source_word: שֹׁפֵט
  english_pob_choice: Judge
  chosen_spanish: Juez
  alternatives_spanish:
  - el que juzga
  - Juez que juzga
  lexicon: HALOT
  rationale: El participio funciona como título sustantivado para Dios. «Juez» conserva la concisión y el valor forense del término sin volverlo explicativo de más.
- source_word: הָאָרֶץ
  english_pob_choice: of the earth
  chosen_spanish: de la tierra
  alternatives_spanish:
  - de la tierra habitada
  - del mundo
  lexicon: HALOT
  rationale: En español, «tierra» comunica bien el alcance universal y mantiene la imagen poética del original. «Mundo» puede sonar más interpretativo; «tierra habitada» sería más explícito de lo que exige el verso.
- source_word: הָשֵׁב
  english_pob_choice: repay
  chosen_spanish: paga
  alternatives_spanish:
  - recompensa
  - devuelve
  - retribuye
  lexicon: HALOT
  rationale: El הִפעיל imperativo de שוב con גמול expresa hacer volver la retribución, es decir, pagar o retribuir. «Paga» es natural en español y mantiene el sentido judicial de retribución.
- source_word: גְּמוּל
  english_pob_choice: what they deserve
  chosen_spanish: lo que merecen
  alternatives_spanish:
  - su retribución
  - su pago
  - su recompensa
  lexicon: HALOT
  rationale: גְּמוּל denota recompensa, paga o retribución debida. «Lo que merecen» reproduce el sentido sin rigidez, y conserva la idea de debido castigo/recompensa implícita en el contexto.
- source_word: גֵּאִים
  english_pob_choice: the proud
  chosen_spanish: los soberbios
  alternatives_spanish:
  - los orgullosos
  - los arrogantes
  lexicon: HALOT
  rationale: El término describe a personas moralmente altivas y presuntuosas. «Soberbios» es una equivalencia bíblica sólida en español y encaja con el tono de juicio del salmo; «orgullosos» es posible pero algo más general, y «arrogantes» es más interpretativo.
theological_decisions:
- issue: La petición combina exaltación divina y juicio retributivo
  english_pob_reading: A plea for God, as universal Judge, to act in retributive justice against arrogant evildoers.
  chosen_spanish_reading: Una súplica para que Dios, como Juez universal, se levante y ejerza justicia retributiva contra los soberbios.
  alternative_spanish_readings:
  - Una súplica principalmente para que Dios manifieste su majestad.
  - Una llamada a que Dios simplemente se exalte.
  rationale: La doble estructura imperativa y el vocabulario judicial («Juez», «paga», «merecen») muestran que el centro del verso es la intervención judicial de Dios. La traducción conserva también el matiz de exaltación implícito en «Levántate» sin reducir el verso solo a majestad.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense without importing doctrinal claims.'
translation_notes:
  revision_awareness: No se aplicaron revisiones en el pasaje base; la concordancia con el texto fuente y con el audit trail inglés es alta, y la versión española conserva el paralelismo, el tono de súplica y la carga judicial del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Dios» implícito por el vocativo «Juez de la tierra», como en el original.
  - «Levántate» conserva el matiz dinámico del imperativo hebreo sin introducir una paráfrasis explicativa.
  - «Soberbios» se usa por consistencia con el registro bíblico y la carga moral del término.
  - «Tierra» mantiene el alcance universal de la línea y evita la restricción territorial de «país» o «tierra de Judá».
