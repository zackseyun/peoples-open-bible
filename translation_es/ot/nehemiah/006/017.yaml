    text: 'Hebreo literalmente: «sus cartas iban a Tobías, y las que eran de Tobías venían a ellos». La segunda cláusula probablemente presupone «cartas» por paralelismo con la primera.'
    reason: lexical_alternative
  revision_rationale: Se corrige la nota para reflejar con precisión la sintaxis y el sentido del hebreo documentado en la auditoría inglesa, evitando el matiz partitivo indebido. Además, se aligera el español narrativo usando imperfectos iterativos ('enviaban', 'les llegaban'), que preservan mejor la acción repetida sin rigidez.
