revisions:
- from: Así que Moisés extendió su vara hacia el cielo[a], y Yahvé envió truenos y granizo, y fuego descendió a la tierra. Yahvé hizo llover granizo sobre la tierra de Egipto.
  to: Entonces Moisés extendió su vara hacia el cielo, y Yahvé envió truenos y granizo, y fuego[a] descendió a la tierra. Yahvé hizo llover granizo sobre la tierra de Egipto.
  rationale: Se movió la nota al término correcto ('fuego') para que corresponda con la alternativa lexical preservada por el inglés POB. También se cambió 'Así que' por 'Entonces' para un español narrativo más natural y más cercano al valor del hebreo, sin alterar el sentido. No se requieren cambios doctrinales ni léxicos mayores.
  reviewer_model: gpt-5.4
