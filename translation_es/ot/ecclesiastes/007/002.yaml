review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura comparativa y causal del hebreo: «Mejor es… que… porque…». «Casa de duelo» y «casa de banquete» son opciones fieles para בֵּית אֵבֶל / בֵּית מִשְׁתֶּה, y «el fin de toda persona» transmite adecuadamente el valor genérico de הָאָדָם, con nota alternativa apropiada. La principal debilidad está en יִתֵּן אֶל לִבּוֹ: «ponerlo en su corazón» es demasiado literal y menos idiomático en español para el sentido sapiencial de interiorizar/reflexionar seriamente.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «debe ponerlo en su corazón» suena forzado y poco natural en registro bíblico moderno. «Debe tomarlo a pecho» o «debe tomar esto en serio» comunicarían mejor el modismo. Además, «el que vive» funciona, pero «los que viven» o «los vivos» suena más natural para el colectivo genérico; aun así, no es un error grave. Conviene una reparación menor para mejorar legibilidad sin perder fidelidad.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías, δοῦλος, etc. La decisión sobre אָדָם como referencia genérica está bien alineada con la revisión inglesa hacia «every person» y con una nota que preserve la alternativa inclusiva más amplia.
  issues:
  - severity: medium
    issue: Modismo hebreo יִתֵּן אֶל לִבּוֹ traducido como «debe ponerlo en su corazón»
    rationale: Aunque conserva la imagen literal, en español contemporáneo resulta poco idiomático y menos claro que una expresión equivalente como «debe tomarlo a pecho», que comunica mejor la idea de asumir seriamente la realidad de la muerte.
  - severity: low
    issue: «el que vive» es menos natural que un colectivo plural
    rationale: וְהַחַי tiene valor genérico-colectivo. «Los que viven» o «los vivos» suena más natural en español. No obstante, «el que vive» sigue siendo entendible y no distorsiona el sentido.
  revised_spanish_text: Mejor es ir a una casa de duelo que ir a una casa de banquete[a], porque ese es el fin de toda persona, y los que viven deben tomarlo a pecho.
  revised_footnotes:
  - marker: a
    text: 'O: «el fin de toda la humanidad». Hebreo «אָדָם» se usa aquí de manera genérica para la humanidad.'
    reason: alternative_reading
  revision_rationale: Se revisa únicamente la última cláusula para reemplazar un calco poco natural («ponerlo en su corazón») por un modismo español claro y fiel al sentido de interiorizar seriamente la lección. También se ajusta el sujeto genérico a «los que viven» para una lectura más natural en español, manteniendo el sentido colectivo de וְהַחַי. La nota se conserva y se pule levemente para mayor claridad.
