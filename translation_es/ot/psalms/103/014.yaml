revisions:
- from: Porque él conoce nuestra condición[a]; se acuerda de que somos polvo.
  to: Porque él conoce nuestra hechura[a]; se acuerda de que somos polvo.
  rationale: Se reemplaza «nuestra condición» por «nuestra hechura» para reflejar mejor el hebreo יִצְרֵנוּ y la decisión léxica auditada («our frame»), preservando la imagen de la humanidad como formada o modelada. El resto del versículo ya es fiel, natural y teológicamente adecuado.
