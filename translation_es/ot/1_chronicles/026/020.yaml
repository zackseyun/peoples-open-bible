    reason: alternative_reading
  - marker: b
    text: O «las cosas santas» o «las cosas dedicadas», refiriéndose a elementos apartados para uso sagrado.
    reason: lexical_alternative
  revision_rationale: Se mantiene la estructura y sentido del hebreo, pero se añade la nota léxica requerida por la auditoría inglesa para הַקֳּדָשִׁים y se ajusta levemente la expresión principal a 'cosas consagradas', que en español suena más natural y aclara mejor el sentido cultual sin perder amplitud semántica.
