    text: Or 'play the prostitute after him.' The Hebrew uses the verb for sexual unfaithfulness metaphorically for idolatrous apostasy.
    reason: lexical_alternative
  - marker: b
    text: '''Cut off'' is a covenant-judgment expression; the text does not specify here whether this occurs by death, expulsion, or another form of divine removal.'
    reason: lexical_alternative
