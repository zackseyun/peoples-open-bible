translation:
  language: es
  text: Así que Moisés tomó los carros y el ganado, y se los dio a los levitas[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «carretas» para «carros».
    reason: lexical_alternative
  - marker: b
    text: Hebreo «ganado»; el contexto del capítulo especifica bueyes.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - recibió
  lexicon: HALOT
  rationale: El verbo qal wayyiqtol de לקח expresa tomar o tomar posesión. Aquí Moisés recibe y dispone de los objetos, por lo que «tomó» conserva el sentido directo y natural del hebreo.
- source_word: הָעֲגָלֹת
  english_pob_choice: the carts
  chosen_spanish: los carros
  alternatives_spanish:
  - los carromatos
  - las carretas
  lexicon: HALOT
  rationale: El término designa vehículos de transporte dados para el servicio del tabernáculo. «Carros» comunica bien la función en español actual sin cargar demasiado el texto; «carretas» o «carromatos» también son posibles, pero menos neutros aquí.
- source_word: הַבָּקָר
  english_pob_choice: the cattle
  chosen_spanish: el ganado
  alternatives_spanish:
  - los bueyes
  - el hato
  lexicon: HALOT
  rationale: בקר es un sustantivo colectivo. «Ganado» preserva ese valor general mejor que una especificación como «bueyes»; aunque el contexto del capítulo aclara que se trata de bueyes, el versículo mismo usa un término más amplio.
- source_word: וַיִּתֵּן
  english_pob_choice: gave
  chosen_spanish: se los dio
  alternatives_spanish:
  - los dio
  - los entregó
  lexicon: HALOT
  rationale: נתן en wayyiqtol significa «dar». En español, «se los dio» expresa con naturalidad el traspaso de posesión a los levitas e integra el doble complemento implícito en el hebreo.
- source_word: אֹתָם
  english_pob_choice: them
  chosen_spanish: se los
  alternatives_spanish:
  - los
  lexicon: HALOT
  rationale: El pronombre masculino plural retoma colectivamente los carros y el ganado. «Se los» conserva la referencia plural y hace fluida la relación indirecta en español.
- source_word: אֶל־הַלְוִיִּם
  english_pob_choice: to the Levites
  chosen_spanish: a los levitas
  alternatives_spanish:
  - para los levitas
  lexicon: HALOT
  rationale: La preposición אֶל indica dirección o transferencia. «A los levitas» refleja mejor el movimiento de entrega que una formulación finalista como «para los levitas».
translation_notes:
  revision_awareness: La versión inglesa auditada permanece sin cambios en esta pasada (high_agreement; no revisions aplicadas). La redacción española sigue el mismo juicio léxico general, adaptándolo a una sintaxis natural en español y preservando la distinción entre el término colectivo hebreo y la precisión contextual de «bueyes» en el capítulo.
  spanish_consistency_notes:
  - Se conserva «Moisés» y «levitas» como nombres propios/comunes estables en la serie.
  - Se usa «ganado» para mantener el valor colectivo de בקר sin cerrar prematuramente la especificación contextual.
  - La estructura «se los dio» permite una entrega natural en español sin perder el sentido de transferencia del hebreo.
