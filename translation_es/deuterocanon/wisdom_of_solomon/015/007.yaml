translation:
  language: es
  text: Porque un alfarero, amasando con trabajo la tierra blanda, moldea cada vasija para nuestro servicio; pero del mismo barro formó tanto las vasijas para usos puros[a] como las de uso contrario, todas de igual modo. Y cuál sea el uso de cada una, el alfarero es quien decide.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «las vasijas esclavas de usos puros». El griego usa δοῦλα de modo metafórico para indicar función asignada.
    reason: lexical_alternative
lexical_decisions:
- source_word: κεραμεύς
  english_pob_choice: potter
  chosen_spanish: alfarero
  alternatives_spanish:
  - barrotero
  - potero
  lexicon: LSJ
  rationale: Designa al artesano que trabaja el barro; en español, «alfarero» es el equivalente natural y preciso. «Barrotero» sería poco común y «potero» no es idiomático.
- source_word: ἁπαλὴν γῆν
  english_pob_choice: soft earth
  chosen_spanish: tierra blanda
  alternatives_spanish:
  - barro blando
  - tierra suave
  lexicon: LSJ
  rationale: La expresión es literalmente «tierra blanda». Se conserva «tierra» en la primera mención, antes de que el texto pase a πηλός/«barro». «Barro blando» adelantaría innecesariamente el material técnico.
- source_word: θλίβων ἐπίμοχθον
  english_pob_choice: kneading soft earth with toil
  chosen_spanish: amasando con trabajo
  alternatives_spanish:
  - apretando con esfuerzo
  - trabajando con fatiga
  lexicon: LSJ
  rationale: El griego combina la idea de presión/esfuerzo con fatiga. En español, «amasando con trabajo» comunica el acto de dar forma con esfuerzo sin sonar forzado; se evita una calca demasiado técnica.
- source_word: πλάσσει
  english_pob_choice: molds
  chosen_spanish: moldea
  alternatives_spanish:
  - forma
  - modela
  lexicon: LSJ
  rationale: Verbo normal para dar forma al barro. «Moldea» mantiene la imagen artesanal y la naturalidad en español.
- source_word: πρὸς ὑπηρεσίαν ἡμῶν
  english_pob_choice: for our service
  chosen_spanish: para nuestro servicio
  alternatives_spanish:
  - para nuestro uso
  - para servirnos
  lexicon: LSJ
  rationale: Se conserva la noción de utilidad/servicio, no solo uso mecánico. «Para nuestro servicio» refleja bien la orientación práctica del texto.
- source_word: ἕκαστον
  english_pob_choice: each vessel
  chosen_spanish: cada vasija
  alternatives_spanish:
  - cada una
  - cada objeto
  lexicon: LSJ
  rationale: El contexto cerámico permite explicitar el objeto implícito. «Vasija» corresponde bien al recipiente moldeado.
- source_word: πηλοῦ
  english_pob_choice: clay
  chosen_spanish: barro
  alternatives_spanish:
  - arcilla
  - lodo
  lexicon: LSJ
  rationale: Aunque «arcilla» es técnica, «barro» funciona mejor en español bíblico y conserva la imagen material del texto. No se pierde el contraste con «tierra blanda».
- source_word: ἀνεπλάσατο
  english_pob_choice: he formed
  chosen_spanish: formó
  alternatives_spanish:
  - moldeó
  - dio forma a
  lexicon: LSJ
  rationale: Resume la acción de modelar desde el mismo material. «Formó» evita una repetición pesada de «moldea» y sigue siendo fiel al sentido.
- source_word: τὰ τῶν καθαρῶν ἔργων δοῦλα σκεύη
  english_pob_choice: the vessels that are slaves to clean uses
  chosen_spanish: las vasijas para usos puros
  alternatives_spanish:
  - las vasijas esclavas de usos puros
  - las vasijas destinadas a usos puros
  - las vasijas sometidas a usos puros
  lexicon: LSJ
  rationale: El inglés POB mantiene en nota la tensión de δοῦλα, pero en español una repetición literal de «esclavas de» sonaría muy dura y poco natural en este símil. Se opta por «para usos puros» en el texto, preservando la función asignada sin eliminar la posibilidad interpretativa que queda explicada en la nota.
- source_word: τὰ ἐναντία
  english_pob_choice: those for the contrary
  chosen_spanish: las opuestas
  alternatives_spanish:
  - las contrarias
  - las de uso contrario
  lexicon: LSJ
  rationale: «Las opuestas» conserva el contraste directo del griego sin introducir una especificación moral no explícita. «Contrarias» también sería posible, pero «opuestas» suena más natural con «vasijas».
- source_word: πάνθʼ ὁμοίως
  english_pob_choice: all alike
  chosen_spanish: todas de igual modo
  alternatives_spanish:
  - todas por igual
  - todas igualmente
  lexicon: LSJ
  rationale: Expresa la similitud de manufactura con un giro claro y sobrio. «Todas de igual modo» mantiene el énfasis en la misma manera de ser hechas.
- source_word: χρῆσις
  english_pob_choice: use
  chosen_spanish: uso
  alternatives_spanish:
  - función
  - destino
  lexicon: LSJ
  rationale: «Uso» es el equivalente directo y mantiene la idea de finalidad práctica del recipiente.
- source_word: κριτὴς ὁ πηλουργός
  english_pob_choice: the potter is the judge
  chosen_spanish: el alfarero lo juzga
  alternatives_spanish:
  - el alfarero es el juez
  - el alfarero decide
  lexicon: LSJ
  rationale: 'El griego es elíptico: «juez es el alfarero». En español, «lo juzga» conserva la función decisoria sobre el uso de cada vasija sin sonar rígido; «es el juez» también sería posible, pero menos fluido aquí.'
theological_decisions:
- issue: δοῦλα aplicado metafóricamente a las vasijas
  english_pob_reading: POB English preserves the metaphor in the text and notes a smoother alternative ('the vessels for clean uses').
  chosen_spanish_reading: Se neutraliza en el cuerpo principal como «vasijas para usos puros», con nota que recuerda la alternativa más literal.
  alternative_spanish_readings:
  - vasijas esclavas de usos puros
  - vasijas sometidas a usos puros
  - vasijas destinadas a usos puros
  rationale: En español, una literalidad como «esclavas de» mantiene la fuerza léxica pero puede sonar abrupta y oscurecer el símil artesanal. La redacción principal evita perder inteligibilidad, mientras la nota conserva la tensión léxica y la posibilidad de lectura más literal.
  doctrine_reference: 'DOCTRINE.md: contested terms for δοῦλος; translation philosophy on preserving lexical tensions when warranted'
- issue: Relación entre καθαρῶν ἔργων y πρὸς ὑπηρεσίαν ἡμῶν
  english_pob_reading: English distinguishes 'clean uses' from 'our service'.
  chosen_spanish_reading: «Usos puros» mantiene la idea de finalidad limpia/pura, no solo moral abstracta; «para nuestro servicio» queda aparte como función práctica humana.
  alternative_spanish_readings:
  - usos limpios
  - usos puros
  - funciones puras
  rationale: El contexto de vasijas favorece una lectura funcional, pero el adjetivo conserva una connotación de pureza. «Usos puros» permite mantener ese matiz sin convertirlo en una abstracción extraña en español.
  doctrine_reference: Lexical-theological handling of καθαρός in context; interpretive caution on purity language
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego y la auditoría inglesa, pero adapta la sintaxis al español para evitar calcos pesados. Se mantuvo la secuencia de imágenes: alfarero, tierra blanda/barro, dos clases de vasijas, y el juicio final sobre su uso. Se preservó la tensión léxica de δοῦλα mediante una nota, aunque el cuerpo principal la expresa de forma más natural.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto solo cuando aparezca el nombre divino; en este versículo no interviene.
  - «Alfarero» se mantiene coherente para κεραμεύς y πηλουργός, porque ambos términos designan al artesano del barro; no se forzó una distinción artificial en español.
  - Se prefirió «barro» para πηλός y «tierra blanda» para γῆς, conservando la diferencia material que el griego marca entre ambos términos.
  - «Uso»/«usos» traduce χρῆσις/ἔργα en sentido funcional, no doctrinal; la nota preserva la alternativa más literal donde el inglés POB también marcó tensión léxica.
