base_translation:
  language: en
  yaml_path: translation/ot/judges/019/001.yaml
  text: And it happened in those days[a], when there was no king in Israel, that a Levite man was dwelling in the remote parts of the hill country of Ephraim, and he took for himself a woman, a concubine[b], from Bethlehem in Judah.
  footnotes:
  - marker: a
    text: Or, 'and there was no king in Israel.' The Hebrew uses a coordinate clause that can be rendered either as a separate statement or as temporal background.
    reason: alternative_reading
  - marker: b
    text: '''Concubine'' refers to a woman in a recognized union of lower social status than a wife, not merely a casual partner.'
    reason: cultural_note
