review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el griego en la mayor parte: conserva la procedencia «de entre ellos», mantiene la metáfora vegetal de ῥίζα, traduce correctamente ὅμηρα como «rehén», y reproduce adecuadamente la fórmula cronológica y «reinó». Sin embargo, «raíz pecadora» suena menos natural y menos idiomático en español bíblico que «raíz de pecado» o «raíz malvada», y además una alternativa lexical listada en los metadatos («una raíz sin pecado») es errónea frente al griego ἁμαρτωλός.'
  spanish_quality_summary: 'El texto es claro y legible, pero requiere un ajuste menor de estilo y fidelidad idiomática: «una raíz pecadora» no es la mejor solución en español para una metáfora moral aplicada a una persona/linaje. «Una raíz malvada» suena más natural, aunque se pierde la cercanía con «sinful»; «una raíz de pecado» preserva mejor el vínculo semántico con ἁμαρτωλός y mantiene la fuerza metafórica. También conviene corregir la nota para que la alternativa no principal no repita la misma expresión y eliminar la opción imposible «sin pecado» de la documentación implícita mediante la revisión del texto/nota.'
  glossary_alignment: 'No hay términos del glosario maestro especialmente implicados salvo la política general de preservar metáforas y no aplanar el texto. La revisión propuesta mantiene esa política. Nombres propios están bien: «Antíoco Epífanes». No hay conflicto con Yahvé/Mesías/Cristo/etc.'
  issues:
  - severity: medium
    issue: «una raíz pecadora» es poco idiomático en español para esta metáfora
    rationale: Aunque es comprensible y cercano al inglés auditado, en español suena algo forzado al atribuir «pecadora» a «raíz». Una formulación como «una raíz de pecado» preserva mejor la metáfora y el juicio moral con mejor naturalidad.
  - severity: medium
    issue: La nota [a] no refleja óptimamente la relación entre la opción principal y las alternativas
    rationale: Si el texto principal se ajusta, la nota debe conservar «raíz» como metáfora literal y ofrecer alternativas plausibles. La actual mezcla una opción principal discutible con alternativas adecuadas.
  - severity: low
    issue: 'Hay una alternativa léxica errónea en los metadatos: «una raíz sin pecado»'
    rationale: Contradice directamente ἁμαρτωλός («pecador, malvado»). Aunque no aparece en el texto corrido, confirma la necesidad de revisión menor para evitar arrastre de un error lexical.
  revised_spanish_text: Y de entre ellos salió una raíz de pecado[a], Antíoco Epífanes, hijo del rey Antíoco, que había sido rehén en Roma[b]. Y reinó en el año ciento cuarenta y siete del reino de los griegos.
  revised_footnotes:
