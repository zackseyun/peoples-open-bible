  language: en
  yaml_path: translation/ot/jeremiah/023/038.yaml
  text: 'But if you say[a], ‘The burden of Yahweh,’ therefore this is what Yahweh says: Because you have said this word, ‘The burden of Yahweh,’ though I sent to you, saying, ‘You shall not say, “The burden of Yahweh,”’'
  footnotes:
