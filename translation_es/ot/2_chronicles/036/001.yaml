translation:
  language: es
  text: Entonces el pueblo de la tierra tomó a Joacaz, hijo de Josías, y lo hizo rey en Jerusalén, en lugar de su padre[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el pueblo común'. La expresión hebrea 'el pueblo de la tierra' puede denotar a la población del país y, en algunos contextos, a un grupo social particular dentro de ella.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְחוּ
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - agarró
  - apresó
  lexicon: HALOT
  rationale: En este contexto narrativo, לקח expresa que el grupo se hizo con Joacaz para proceder a su entronización; en español, 'tomó' conserva el sentido de acción sin añadir una coerción que el hebreo no especifica.
- source_word: עַם הָאָרֶץ
  english_pob_choice: the people of the land
  chosen_spanish: el pueblo de la tierra
  alternatives_spanish:
  - la gente de la tierra
  - los habitantes del país
  lexicon: HALOT
  rationale: Se preserva la expresión hebrea de forma transparente y literal, como en el POB inglés, sin estrecharla prematuramente a una clase social específica. El matiz social o colectivo queda disponible para nota.
- source_word: יְהוֹאָחָז
  english_pob_choice: Jehoahaz
  chosen_spanish: Joacaz
  alternatives_spanish:
  - Jehoacaz
  lexicon: convención onomástica bíblica en español
  rationale: Se adopta la forma usual en español bíblico 'Joacaz', equivalente de Jehoahaz, para mayor legibilidad y reconocimiento eclesial.
- source_word: בֶּן יֹאשִׁיָּהוּ
  english_pob_choice: son of Josiah
  chosen_spanish: hijo de Josías
  alternatives_spanish:
  - hijo de Josiah
  lexicon: uso bíblico español
  rationale: La genealogía se expresa de manera directa e idiomática en español con los nombres bíblicos habituales.
- source_word: וַיַּמְלִיכֻהוּ
  english_pob_choice: made him king
  chosen_spanish: lo hizo rey
  alternatives_spanish:
  - lo proclamó rey
  - lo coronó rey
  lexicon: HALOT
  rationale: El causativo de מלך se rinde con 'lo hizo rey', que reproduce la idea de entronizar o establecer como rey sin añadir la ceremonia específica de 'coronó'.
- source_word: תַּחַת אָבִיו
  english_pob_choice: in place of his father
  chosen_spanish: en lugar de su padre
  alternatives_spanish:
  - en vez de su padre
  - bajo su padre
  lexicon: HALOT
  rationale: תחת indica sustitución/sucesión; 'en lugar de' comunica mejor el relevo real que una traducción espacial como 'bajo'.
- source_word: בִּירוּשָׁלִָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la ciudad de Jerusalén
  lexicon: topónimo bíblico estándar
  rationale: Se mantiene el nombre propio con la preposición natural del español, sin añadir especificación innecesaria.
translation_notes:
  revision_awareness: No se requirieron revisiones posteriores; la versión inglesa auditada permanece sin cambios y la concordancia con el hebreo masorético es alta.
  spanish_consistency_notes:
  - Se conserva la secuencia narrativa con 'Entonces' para reflejar el valor discursivo de וַ- en contexto.
  - Se mantiene 'pueblo de la tierra' como calco controlado para preservar la expresión hebrea documentada.
  - Se usa 'lo hizo rey' para el causativo de מלך, evitando sobreespecificar el acto como coronación.
  - La nota al pie aclara el posible rango semántico de עַם הָאָרֶץ sin imponer una lectura sociológica única.
