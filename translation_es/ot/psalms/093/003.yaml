  yaml_path: translation/ot/psalms/093/003.yaml
  text: The rivers have lifted up[a], O Yahweh; the rivers have lifted up their voice[b]; the rivers lift up their pounding waves.
  footnotes:
  - marker: a
    text: Or 'floods' instead of 'rivers'; many translations choose this to emphasize the chaotic waters, but the Hebrew noun more literally means 'rivers.'
    reason: lexical_alternative
  - marker: b
    text: Or 'their breakers' or 'their crashing.' The final noun is rare and denotes the pounding or crashing force of the waters.
    reason: lexical_alternative
