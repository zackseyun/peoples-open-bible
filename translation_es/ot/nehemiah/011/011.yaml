    issue: Los marcadores de notas [a] y [b] están anclados a las palabras equivocadas.
    rationale: En el audit trail inglés, la nota léxica corresponde a נְגִיד («leader/chief/overseer») y la nota cultural corresponde a «house of God» = templo. En el borrador español, [a] aparece en «jefe» pero la nota b está en «Dios», invirtiendo la relación esperada para «casa de Dios».
  - severity: low
