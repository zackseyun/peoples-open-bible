base_translation:
  language: en
  yaml_path: translation/ot/hosea/002/014.yaml
  text: And I will lay waste her vine and her fig tree[a], of which she said, ‘These are my wages that my lovers gave me.’ I will make them a forest, and the wild animals of the field will devour them.
  footnotes:
