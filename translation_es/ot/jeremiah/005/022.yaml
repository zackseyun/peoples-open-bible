base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/005/022.yaml
  text: Do you not fear me? declares Yahweh[a]. Do you not tremble before me, who set the sand as a boundary for the sea, an everlasting decree that it cannot pass? Though its waves toss, they cannot prevail; though they roar[b], they cannot pass over it.
  footnotes:
  - marker: a
    text: Or, 'I who set the sand as a boundary for the sea.' The Hebrew relative clause can be rendered more directly in the first person.
    reason: lexical_alternative
  - marker: b
    text: Or, 'Though they rage, they cannot prevail.' The Hebrew verb can emphasize surging or raging.
    reason: lexical_alternative
