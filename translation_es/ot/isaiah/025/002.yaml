translation:
  language: es
  text: Porque has hecho de la ciudad un montón[a], de la ciudad fortificada una ruina; el palacio de extranjeros[b] ya no es ciudad, nunca será reconstruido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un montón de ruinas». El hebreo puede evocar más específicamente un montón de escombros o ruinas.
    reason: lexical_alternative
  - marker: b
    text: O «el palacio de extranjeros no es ciudad». El hebreo es muy comprimido y puede significar que la fortaleza o palacio de extranjeros ha dejado de tener estatus de ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׂמְתָּ
  english_pob_choice: have made
  chosen_spanish: has hecho
  alternatives_spanish:
  - has puesto
  - has convertido
  lexicon: HALOT
  rationale: En esta construcción resultativa, שׂוּם expresa la idea de causar un estado nuevo; en español, «has hecho de» comunica de forma natural la transformación sin perder la fuerza causativa.
- source_word: מֵעִיר
  english_pob_choice: the city
  chosen_spanish: de la ciudad
  alternatives_spanish:
  - a la ciudad
  - desde la ciudad
  lexicon: HALOT
  rationale: El prefijo מִן funciona aquí en sentido resultativo/transformativo dentro del giro «hacer de X Y». «De la ciudad» conserva la relación de origen sin sonar forzado en español.
- source_word: לַגָּל
  english_pob_choice: a heap
  chosen_spanish: un montón
  alternatives_spanish:
  - un montículo
  - un montón de ruinas
  lexicon: HALOT
  rationale: גַּל denota un montón o montón de ruinas/piedras. «Un montón» es breve y mantiene la imagen de desolación; el contexto ya especifica la ruina urbana.
- source_word: קִרְיָה בְצוּרָה
  english_pob_choice: the fortified town
  chosen_spanish: la villa fortificada
  alternatives_spanish:
  - la ciudad fortificada
  - la ciudad amurallada
  lexicon: HALOT
  rationale: קִרְיָה es un término urbano algo menos común que עִיר; «villa» ayuda a variar el paralelismo sin perder el sentido. «Fortificada» reproduce בְצוּרָה con claridad.
- source_word: לְמַפֵּלָה
  english_pob_choice: a ruin
  chosen_spanish: una ruina
  alternatives_spanish:
  - un derrumbe
  - una caída
  lexicon: HALOT
  rationale: El sustantivo indica ruina o derrumbe. «Una ruina» es la correspondencia más directa y natural en español.
- source_word: אַרְמוֹן
  english_pob_choice: palace
  chosen_spanish: palacio
  alternatives_spanish:
  - fortaleza
  - alcázar
  lexicon: HALOT
  rationale: אַרְמוֹן suele referirse a un palacio o residencia fortificada. «Palacio» preserva el matiz de edificio señorial; el contexto bélico admite el eco de fortaleza sin necesidad de explicitarlo.
- source_word: זָרִים
  english_pob_choice: foreigners’
  chosen_spanish: de extranjeros
  alternatives_spanish:
  - de forasteros
  - de gente extraña
  lexicon: HALOT
  rationale: זָרִים significa extranjeros/extraños. «De extranjeros» es claro y neutro; evita arcaísmos y mantiene el genitivo del original.
- source_word: מֵעִיר
  english_pob_choice: is no city
  chosen_spanish: ya no es ciudad
  alternatives_spanish:
  - no es ya ciudad
  - ha dejado de ser ciudad
  lexicon: HALOT
  rationale: El hebreo es comprimido y expresa pérdida de estatus urbano. «Ya no es ciudad» reproduce esa idea con naturalidad y sin sobreexplicar.
- source_word: לְעוֹלָם לֹא יִבָּנֶה
  english_pob_choice: it will never be rebuilt
  chosen_spanish: nunca será reconstruido
  alternatives_spanish:
  - no será construido jamás
  - por siempre no será reconstruido
  lexicon: HALOT
  rationale: La negación con לְעוֹלָם funciona idiomáticamente como «nunca». Dado el contexto de destrucción, «reconstruido» expresa mejor la implicación que «construido».
translation_notes:
  revision_awareness: La redacción sigue de cerca el juicio final del POB en inglés, especialmente la lectura resultativa de שׂוּם, la compresión de מֵעִיר/לָגָּל y la nota sobre el giro «ya no es ciudad»; se preserva también la fuerza temporal de לְעוֹלָם como negación idiomática de duración ilimitada.
  spanish_consistency_notes:
  - Se mantiene «Dios»/«Yahvé» según el proyecto, aunque este versículo no los menciona.
  - Se usa «extranjeros» para זָרִים conforme al POB en inglés, evitando «forasteros» por posible ambigüedad estilística.
  - «Villa fortificada» evita la repetición de «ciudad» y refleja la variación léxica del original, sin cambiar el sentido.
  - Se prefirió «reconstruido» sobre «construido» por el contexto de devastación y por la lectura auditada del inglés POB.
