translation:
  language: es
  text: Bendito eres en el templo de tu santa gloria, y sumamente alabado y sumamente glorificado por siempre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εὐλογημένος
  english_pob_choice: Blessed
  chosen_spanish: Bendito eres
  alternatives_spanish:
  - Alabado eres
  - Bendito seas
  lexicon: BDAG
  rationale: En una doxología dirigida a Dios, «bendito» conserva bien la fuerza reverente de εὐλογημένος y la segunda persona de εἶ. «Alabado» sería posible, pero desplaza el matiz de bendición; «bendito seas» suena más exhortativo que declarativo.
- source_word: ἐν τῷ ναῷ
  english_pob_choice: in the temple
  chosen_spanish: en el templo
  alternatives_spanish:
  - en el santuario
  - dentro del templo
  lexicon: BDAG
  rationale: «Templo» es la equivalencia más clara y estándar para ναός en este contexto cultual/doxológico. «Santuario» es viable, pero más específico o menos natural para el lector general; «dentro del templo» agrega una precisión no requerida.
- source_word: τῆς ἁγίας δόξης σου
  english_pob_choice: of your holy glory
  chosen_spanish: de tu santa gloria
  alternatives_spanish:
  - de tu gloriosa santidad
  - de tu gloriosa majestad
  lexicon: BDAG
  rationale: 'La traducción conserva ambos sustantivos y su relación: δόξης como «gloria» y ἁγίας como «santa». «Santa gloria» mantiene visible la tensión semántica sin reinterpretarla como «majestad», que ya sería más explicativo que el griego.'
- source_word: ὑπερυμνητός
  english_pob_choice: highly praised
  chosen_spanish: altamente alabado
  alternatives_spanish:
  - sumamente alabado
  - muy alabado
  lexicon: LEH
  rationale: El compuesto intensifica la alabanza; «altamente alabado» comunica esa elevación de forma natural en español. «Sumamente alabado» es también posible, pero «altamente» encaja mejor con el paralelismo de la línea.
- source_word: ὑπερένδοξος
  english_pob_choice: highly glorified
  chosen_spanish: altamente glorificado
  alternatives_spanish:
  - sumamente glorificado
  - excesivamente glorificado
  lexicon: LEH
  rationale: La revisión inglesa optó por mantener el campo de la glorificación; en español «altamente glorificado» reproduce esa decisión sin perder la intensificación del compuesto. «Sumamente glorificado» sería equivalente, pero algo más pesado.
- source_word: εἰς τοὺς αἰῶνας
  english_pob_choice: forever
  chosen_spanish: por los siglos
  alternatives_spanish:
  - para siempre
  - por los siglos de los siglos
  lexicon: BDAG
  rationale: En doxología, «por los siglos» conserva el valor idiomático de duración continua y evita forzar una fórmula más larga que no está en el texto. «Para siempre» también sería natural, pero el plural temporal refleja mejor el griego.
theological_decisions:
- issue: Cómo reflejar la doxología directa a Dios sin neutralizar el segundo persona
  english_pob_reading: Blessed are you...
  chosen_spanish_reading: Bendito eres...
  alternative_spanish_readings:
  - Bendito sea Dios...
  - Eres bendito...
  rationale: El griego dirige la bendición a «tú» (εἶ, σου). «Bendito eres» mantiene la alabanza en segunda persona y evita convertirla en una declaración impersonal sobre Dios. «Bendito sea Dios» pierde la forma de address; «Eres bendito» suena menos litúrgico en español.
  doctrine_reference: Forma doxológica de alabanza directa a Dios; respeto a la deixis del texto fuente.
translation_notes:
  revision_awareness: 'La base inglesa de audición muestra una pequeña revisión de estilo en la segunda mitad: de un giro más interpretativo («exceedingly glorious») a uno más alineado con la pareja adjetival griega («highly glorified»). La versión española sigue esa línea de mantener dos predicados intensificadores paralelos, sin fusionarlos en una sola idea ni introducir un nuevo matiz.'
  spanish_consistency_notes:
  - Se mantiene «Dios» implícito por la segunda persona del texto, sin añadir el nombre divino porque el griego aquí no lo expresa explícitamente.
  - Se eligió «altamente» para ambos adjetivos intensificadores a fin de conservar el paralelismo del griego y la consistencia con la revisión inglesa.
  - «Por los siglos» conserva el tono litúrgico y la duración continua sin introducir una fórmula más larga que altere el ritmo del verso.
