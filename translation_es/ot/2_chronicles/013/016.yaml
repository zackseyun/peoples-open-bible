revisions:
- from: Y los hijos de Israel huyeron delante de Judá[a], y Dios los entregó en su mano[b].
  to: Y los hijos de Israel huyeron delante de Judá, y Dios los entregó en manos de Judá[a].
  rationale: Se elimina la nota redundante sobre «los hijos de Israel» porque el texto principal ya conserva esa formulación. Se sustituye «en su mano» por «en manos de Judá» para evitar ambigüedad referencial en español y mantener el sentido del modismo hebreo en contexto militar. La nota restante preserva la forma hebrea más literal.
