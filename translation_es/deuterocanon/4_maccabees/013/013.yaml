base_translation:
  language: en
  yaml_path: translation/deuterocanon/4_maccabees/013/013.yaml
  text: Because of godliness Isaac endured[a]. And each one, looking at the others, all together cheerful and very courageous, said[c][b], “Let us dedicate ourselves to God with our whole heart—to the one who gave us our souls—and let us employ our bodies in guarding the law.”
  footnotes:
  - marker: a
    text: Or 'Because of piety Isaac endured.' The Greek εὐσέβεια can be rendered 'godliness' or 'piety.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'to the one who gave [us] the souls/lives.' Greek ψυχή can mean either 'soul' or 'life'; here the sense is likely 'life.'
    reason: lexical_alternative
  - marker: c
    text: Or 'let us use our bodies for guarding the law.' The Greek keeps the imagery of watchful guarding rather than using a simpler term like 'obey.'
    reason: lexical_alternative
