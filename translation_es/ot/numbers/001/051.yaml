  - marker: b
    text: O «la persona no autorizada»; el hebreo se refiere a alguien que no tiene permiso para acercarse al santuario.
    reason: lexical_alternative
  revision_rationale: Se ajusta «extraño» a «forastero» para evitar ambigüedad y acercarse mejor al sentido de alguien ajeno/no autorizado en contexto cultual, preservando la alternativa explicativa en nota. Se cambia «será muerto» por «será puesto a muerte» para expresar de manera idiomática la pasiva judicial de יוּמָת. También se aligera la primera cláusula y se mejora la precisión práctica de la segunda con «lo instalarán».
