review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo: sentido iterativo de לַבְּקָרִים, destrucción judicial de אַצְמִית, propósito en לְהַכְרִית, y preserva correctamente «Yahvé» para יְהוָה. Sin embargo, se aparta del rastro auditado en dos puntos relevantes: traduce אָרֶץ como «tierra», cuando el English POB documentó y escogió contextualmente «land» por el marco real-administrativo; y la nota [a] introduce una alternativa imprecisa («haré destruir») que no refleja bien el valor del hiphil en primera persona.'
  spanish_quality_summary: El español es claro y digno. «Mañana tras mañana» y «de la ciudad de Yahvé» son naturales. No obstante, «de la tierra» suena más amplio/cósmico de lo que pide el contexto, y «los que hacen iniquidad» es aceptable pero algo más débil que una formulación que preserve mejor la colación moral de «workers of iniquity».
  glossary_alignment: Alinea bien con la convención del proyecto en «Yahvé». No hay conflicto con otros términos doctrinales. Conviene ajustar אָרֶץ a «del país» o «de la tierra» según la decisión auditada; aquí «del país» refleja mejor la elección contextual de «land».
  issues:
  - severity: medium
    issue: «de la tierra» no refleja la decisión auditada de אָרֶץ como «land» en contexto real
    rationale: Aunque «tierra» es lexicalmente posible, el English POB justificó «land» por el marco de gobierno del salmo. En español, «del país» comunica mejor ese ámbito administrativo que «de la tierra», que suena más universal.
  - severity: medium
    issue: La nota [a] sobre אַצְמִית es léxicamente defectuosa
    rationale: «Haré destruir» no corresponde bien al hiphil aquí; el sujeto mismo ejecuta la acción causativa de hacer perecer/destruir. La nota debería ofrecer alternativas como «haré perecer» o «pondré fin a».
  - severity: low
    issue: «los que hacen iniquidad» preserva el sentido, pero puede fortalecerse
    rationale: Una expresión como «los que practican la iniquidad» suena más idiomática en español bíblico moderno y mantiene mejor el peso moral habitual de פֹּעֲלֵי אָוֶן.
  revised_spanish_text: Mañana tras mañana destruiré[a] a todos los impíos del país[b], para eliminar de la ciudad de Yahvé a todos los que practican la iniquidad.
  revised_footnotes:
  - marker: a
    text: El hebreo también puede expresarse como «haré perecer» o «pondré fin a».
    reason: lexical_alternative
  - marker: b
    text: La palabra hebrea אֶרֶץ puede significar «tierra» o «mundo». Aquí se traduce «país» porque el marco real del salmo apunta al territorio bajo gobierno, aunque «tierra» o «mundo» son posibilidades léxicas en otros contextos.
    reason: lexical_alternative
  revision_rationale: Se ajusta אָרֶץ a «país» para seguir la decisión contextual auditada de «land», se corrige la nota de אַצְמִית para evitar una alternativa inexacta, y se mejora levemente la naturalidad/precisión moral de la última frase con «practican la iniquidad».
