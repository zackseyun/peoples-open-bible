translation:
  language: es
  text: Así que tomaron lo que había hecho Micaías, junto con el sacerdote que le pertenecía, y vinieron contra Lais, contra un pueblo tranquilo y seguro. Los atacaron con el filo de la espada[a], e incendiaron la ciudad con fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «con la boca de la espada», un modismo que significa «con el filo de la espada».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵמָּה
  english_pob_choice: So they
  chosen_spanish: Así que
  alternatives_spanish:
  - Y ellos
  - Entonces ellos
  lexicon: HALOT
  rationale: La forma pronominal independiente añade énfasis y continuidad narrativa. «Así que» mantiene el avance del relato en un español natural sin borrar el sujeto explícito.
- source_word: לָקְחוּ
  english_pob_choice: took
  chosen_spanish: tomaron
  alternatives_spanish:
  - se llevaron
  - arrebataron
  lexicon: HALOT
  rationale: «Tomaron» es una equivalencia amplia y sobria para לקח en este contexto narrativo; evita especificar demasiado el modo de la acción.
- source_word: אֵת אֲשֶׁר עָשָׂה מִיכָה
  english_pob_choice: what Micah had made
  chosen_spanish: lo que había hecho Micaías
  alternatives_spanish:
  - las cosas que Micaías había hecho
  - lo que Micaías hizo
  lexicon: HALOT
  rationale: La construcción relativa se vierte de manera idiomática. «Había hecho» conserva el valor de acción previa y mantiene el referente cultual del contexto sin añadir palabras no sustentadas.
- source_word: וְאֶת הַכֹּהֵן אֲשֶׁר הָיָה לוֹ
  english_pob_choice: along with the priest who belonged to him
  chosen_spanish: junto con el sacerdote que le pertenecía
  alternatives_spanish:
  - y el sacerdote que era suyo
  - y el sacerdote que estaba con él
  lexicon: HALOT
  rationale: El hebreo literalmente expresa una relación posesiva/adscrita («era para/de él»). «Le pertenecía» refleja esa dependencia sin convertirla necesariamente en propiedad servil; conserva el matiz auditado por la POB en inglés.
- source_word: וַיָּבֹאוּ עַל לַיִשׁ
  english_pob_choice: came against Laish
  chosen_spanish: llegaron contra Lais
  alternatives_spanish:
  - vinieron contra Lais
  - se acercaron contra Lais
  - atacaron a Lais
  lexicon: HALOT
  rationale: Con בוא + עַל en contexto militar, el valor es hostil. «Llegaron contra» conserva el giro y prepara la acción violenta siguiente sin fusionar cláusulas.
- source_word: עַל עַם שֹׁקֵט וּבֹטֵחַ
  english_pob_choice: against a people quiet and secure
  chosen_spanish: contra un pueblo tranquilo y seguro
  alternatives_spanish:
  - contra un pueblo quieto y seguro
  - contra un pueblo en paz y confiado
  - contra un pueblo tranquilo e indefenso
  lexicon: HALOT
  rationale: '«Tranquilo y seguro» reproduce con claridad los dos rasgos semánticos: quietud/paz y seguridad/confianza. «Indefenso» sería interpretativo y se deja como alternativa no principal.'
- source_word: וַיַּכּוּ אוֹתָם
  english_pob_choice: They struck them
  chosen_spanish: Los hirieron
  alternatives_spanish:
  - Los golpearon
  - Los derrotaron
  - Los mataron
  lexicon: HALOT
  rationale: נכה es amplio. Dado que el miembro siguiente especifica el instrumento («el filo de la espada»), «los hirieron» es una formulación española natural que mantiene la amplitud sin precisar más de lo que el hebreo exige.
- source_word: לְפִי חָרֶב
  english_pob_choice: with the edge of the sword
  chosen_spanish: con el filo de la espada
  alternatives_spanish:
  - con la boca de la espada
  - con la espada
  lexicon: HALOT
  rationale: Se conserva el idiomático sentido de «la boca de la espada» mediante la equivalencia estable «el filo de la espada», fiel y comprensible en español.
- source_word: וְאֶת הָעִיר שָׂרְפוּ בָאֵשׁ
  english_pob_choice: and burned the city with fire
  chosen_spanish: y la ciudad la incendiaron con fuego
  alternatives_spanish:
  - y quemaron la ciudad con fuego
  - e incendiaron la ciudad
  - y prendieron fuego a la ciudad
  lexicon: HALOT
  rationale: El hebreo enfatiza explícitamente el fuego como medio. «La incendiaron con fuego» conserva esa duplicación enfática y el objeto directo anticipado por «la ciudad», sin perder naturalidad en español.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la lectura auditada del POB en inglés y mantiene sus decisiones clave: valor hostil de עַל con בוא, traducción idiomática de לְפִי חָרֶב, y la relación posesiva del sacerdote con Micaías. No se detectaron revisiones aplicadas en el pass más reciente; el borrador se alinea con el estado de alta concordancia.'
  spanish_consistency_notes:
  - Se usa «Lais» como forma breve y diacríticamente simple para el topónimo Laish.
  - Se mantiene «Micaías» como forma hispana del nombre, consistente con la transliteración bíblica habitual y legible para audiencia eclesial.
  - «Sacerdote» se emplea en sentido funcional, sin introducir terminología eclesiástica posterior.
  - La puntuación separa las cláusulas narrativas conforme al flujo del hebreo y al patrón de la POB en inglés.
