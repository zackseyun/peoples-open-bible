translation:
  language: es
  text: y las vestiduras finamente tejidas[a], y las vestiduras santas para Aarón el sacerdote, y las vestiduras de sus hijos para ejercer el sacerdocio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las vestiduras para el ministerio», «las vestiduras de servicio» o «las vestiduras tejidas» para בִּגְדֵי הַשְּׂרָד; el término hebreo es difícil y puede destacar tanto su confección como su uso en el servicio del tabernáculo.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּגְדֵי הַשְּׂרָד
  english_pob_choice: the finely woven garments
  chosen_spanish: las vestiduras de hilo fino
  alternatives_spanish:
  - las vestiduras para el ministerio
  - las vestiduras de servicio
  - las vestiduras tejidas
  lexicon: HALOT
  rationale: בִּגְדֵי es “vestiduras/ropas”; el sustantivo קשה de שְׂרָד es difícil. La elección en español intenta reflejar el posible énfasis en la confección especial del tejido, sin decidir demasiado fuertemente por una lectura funcional. “Hilo fino” comunica una prenda trabajada con esmero y mantiene la tensión entre materia y uso.
- source_word: בִּגְדֵי הַקֹּדֶשׁ
  english_pob_choice: the holy garments
  chosen_spanish: las vestiduras santas
  alternatives_spanish:
  - las vestiduras sagradas
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente “vestiduras de santidad/vestiduras santas”. En español, “santas” mantiene la relación directa con la raíz de santidad y es plenamente comprensible en registro bíblico.
- source_word: לְאַהֲרֹן הַכֹּהֵן
  english_pob_choice: for Aaron the priest
  chosen_spanish: para Aarón el sacerdote
  alternatives_spanish:
  - para Aarón, el sacerdote
  - para Aarón, el sacerdote principal
  lexicon: HALOT
  rationale: La preposición לְ aquí indica destinación o asignación. “El sacerdote” reproduce el título apposicional de manera natural y fiel; no se requiere una expansión interpretativa.
- source_word: בִּגְדֵי בָנָיו
  english_pob_choice: the garments of his sons
  chosen_spanish: las vestiduras de sus hijos
  alternatives_spanish:
  - las vestiduras de los hijos de Aarón
  - sus vestiduras
  lexicon: HALOT
  rationale: La forma constructa con sufijo posesivo apunta claramente a los hijos de Aarón. “Sus hijos” conserva el vínculo referencial del hebreo y la estructura del original.
- source_word: לְכַהֵן
  english_pob_choice: for serving as priests
  chosen_spanish: para ejercer el sacerdocio
  alternatives_spanish:
  - para ministrar como sacerdotes
  - para servir como sacerdotes
  - para oficiar como sacerdotes
  lexicon: HALOT
  rationale: El infinitivo de כהן expresa ejercer el oficio sacerdotal. “Ejercer el sacerdocio” es una manera digna y precisa en español, y evita reducir el sentido a un simple servicio genérico.
- source_word: וְאֵת / וְאֶת
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - y también
  lexicon: Sintaxis hebrea
  rationale: Los marcadores objeto no se traducen; la conjunción se representa con “y” para conservar la lista coordinada del hebreo sin sobrecargar el castellano.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el audit trail; el inglés POB quedó sin cambios en el último pase y muestra alta concordancia con la revisión externa.
  spanish_consistency_notes:
  - Se mantiene “Yahvé” como norma del proyecto solo cuando aparece el Tetragrámaton; este versículo no lo contiene.
  - Se usa “sacerdote/sacerdocio” de forma consistente para כהן/כהן־־, evitando “ministerio” como traducción principal porque el hebreo apunta al oficio sacerdotal.
  - “Vestiduras” se prefiere a “ropas” por el registro cultual del contexto.
  - La nota al pie preserva la ambigüedad lexical del término problemático sin resolverla de manera excesiva.
