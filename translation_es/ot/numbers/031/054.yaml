translation:
  language: es
  text: Entonces Moisés y Eleazar el sacerdote tomaron el oro de los comandantes de los millares y de los centenares[a], y lo llevaron a la tienda de reunión, como memorial para los hijos de Israel delante de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'para los israelitas'. El hebreo dice literalmente 'para los hijos de Israel', una designación pactual convencional.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomaron
  alternatives_spanish:
  - recibieron
  - llevaron
  lexicon: HALOT
  rationale: El verbo לקח en narración consecutiva expresa una acción directa de tomar; en español, 'tomaron' conserva ese sentido básico y fluye naturalmente en la frase.
- source_word: הַזָּהָב
  english_pob_choice: the gold
  chosen_spanish: el oro
  alternatives_spanish:
  - oro
  lexicon: HALOT
  rationale: El hebreo lleva artículo definido, así que 'el oro' refleja mejor el referente específico ya mencionado en el contexto.
- source_word: מֵאֵת
  english_pob_choice: from
  chosen_spanish: de
  alternatives_spanish:
  - de parte de
  - desde
  lexicon: HALOT
  rationale: La preposición marca procedencia. En español, 'de' comunica con naturalidad la fuente del oro.
- source_word: שָׂרֵי הָאֲלָפִים וְהַמֵּאוֹת
  english_pob_choice: the commanders of thousands and of hundreds
  chosen_spanish: los comandantes de los millares y de los centenares
  alternatives_spanish:
  - los oficiales sobre los millares y sobre los centenares
  - los líderes de los millares y de los centenares
  lexicon: HALOT
  rationale: En este contexto militar, שָׂרִים son mandos o comandantes. 'Millares' y 'centenares' conserva la estructura administrativa del hebreo sin convertirla en una simple cifra literal.
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: la tienda del encuentro
  alternatives_spanish:
  - el tabernáculo del encuentro
  - la tienda de reunión
  lexicon: HALOT
  rationale: '''Tienda del encuentro'' es un equivalente transparente y fiel para אֹהֶל מוֹעֵד; mantiene el carácter de lugar de reunión señalado por el texto.'
- source_word: זִכָּרוֹן
  english_pob_choice: as a memorial
  chosen_spanish: como memorial
  alternatives_spanish:
  - como recordatorio
  - como recuerdo
  lexicon: HALOT
  rationale: El sustantivo designa un objeto o acto de conmemoración cultual. 'Como memorial' preserva ese valor técnico y solemne.
- source_word: לִבְנֵי יִשְׂרָאֵל
  english_pob_choice: for the sons of Israel
  chosen_spanish: para los hijos de Israel
  alternatives_spanish:
  - para los hijos de Israel,
  - para los israelitas
  lexicon: HALOT
  rationale: Se conserva la formulación covenantal y masculina plural del hebreo. 'Hijos de Israel' es la forma más fiel y reconocible en español bíblico.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: 'La expresión indica estar en la presencia cultual de YHWH. Se sigue el estándar del proyecto para el Nombre divino: ''Yahvé''.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se traduce por el nombre divino 'Yahvé', no por una sustitución titulada, para preservar el nombre propio del pacto.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El hebreo contiene el Nombre personal de Dios. La forma 'Yahvé' conserva ese referente y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: בני ישראל como designación pactual
  english_pob_reading: sons of Israel
  chosen_spanish_reading: hijos de Israel
  alternative_spanish_readings:
  - israelitas
  - pueblo de Israel
  rationale: La expresión es una fórmula pactual convencional con plural masculino. En español, 'hijos de Israel' mantiene la correspondencia formal y el peso histórico-teológico del hebreo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios; esta propuesta mantiene esa lectura alta de acuerdo y conserva las decisiones ya auditadas en el contexto inglés.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - Se conserva 'hijos de Israel' para reflejar la fórmula covenantal y la fuerza masculina plural del hebreo.
  - '''Tienda del encuentro'' evita la transliteración litúrgica rígida y sigue el sentido descriptivo del hebreo.'
