    rationale: Aunque no es incorrecto, «quedaron asombrados ante lo sucedido» expresa con más naturalidad la reacción al hecho acontecido y se alinea mejor con «at what had happened».
  revised_spanish_text: Y cuando los que estaban en las tiendas[a] oyeron, quedaron asombrados ante lo sucedido,
