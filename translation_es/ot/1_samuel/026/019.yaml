    text: Or, more literally, 'may he smell an offering,' an idiom for accepting a sacrifice or gift offering.
    reason: lexical_alternative
  - marker: b
    text: Or 'from joining myself to the LORD’s inheritance.' The Hebrew expression can emphasize being attached to or included within the LORD’s allotted people/land.
    reason: lexical_alternative
