translation:
  language: es
  text: Entonces degollará el cordero de la ofrenda por la culpa[b], y el sacerdote tomará de la sangre de la ofrenda por la culpa y la pondrá sobre el lóbulo[a] de la oreja derecha del que está siendo purificado, y sobre el pulgar de su mano derecha, y sobre el dedo gordo de su pie derecho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la punta de la oreja derecha». El término hebreo se refiere a la extremidad externa de la oreja.
    reason: lexical_alternative
  - marker: b
    text: Tradicionalmente, «ofrenda por la transgresión»; también, «ofrenda de reparación».
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁחַט
  english_pob_choice: shall slaughter
  chosen_spanish: degollará
  alternatives_spanish:
  - sacrificará
  - matará
  lexicon: HALOT
  rationale: En contexto cultual, el verbo describe la acción técnica de sacrificar por degüello; «degollar» evita el sentido demasiado general de «matar» y mantiene la precisión ritual.
- source_word: כֶּבֶשׂ הָאָשָׁם
  english_pob_choice: the guilt-offering lamb
  chosen_spanish: el carnero de la ofrenda por la culpa
  alternatives_spanish:
  - el cordero de la ofrenda por la culpa
  - el cordero de la expiación por la culpa
  lexicon: HALOT
  rationale: La POB inglesa preserva la relación constructa entre el animal y la ofrenda. En español, «carnero» refleja el animal del texto con mayor naturalidad en este contexto ritual, y «ofrenda por la culpa» sigue la decisión léxica para אָשָׁם sin recurrir a «trespaso».
- source_word: אָשָׁם
  english_pob_choice: guilt offering
  chosen_spanish: ofrenda por la culpa
  alternatives_spanish:
  - ofrenda de culpa
  - ofrenda de reparación
  - ofrenda por la transgresión
  lexicon: HALOT
  rationale: Se mantiene el valor sacrificial específico del término, no una culpa abstracta. «Por la culpa» conserva la relación funcional del sacrificio y suena más natural que un calco rígido.
- source_word: מִדַּם הָאָשָׁם
  english_pob_choice: some of the blood of the guilt offering
  chosen_spanish: de la sangre de la ofrenda por la culpa
  alternatives_spanish:
  - de parte de la sangre de la ofrenda por la culpa
  - tomará un poco de la sangre de la ofrenda por la culpa
  lexicon: HALOT
  rationale: El partitivo de מִן queda implícito en español con «de la sangre» dentro del acto ritual; «tomará de» comunica suficientemente que no se trata de toda la sangre.
- source_word: תְּנוּךְ אֹזֶן
  english_pob_choice: the lobe of the right ear
  chosen_spanish: el lóbulo de la oreja derecha
  alternatives_spanish:
  - la punta de la oreja derecha
  - el extremo de la oreja derecha
  lexicon: HALOT
  rationale: La POB inglesa opta por «lobe» y nota la alternativa «tip». En español, «lóbulo» es el término anatómico más claro y natural; «oreja» mantiene la referencia externa visible mejor que «oído».
- source_word: הַמִּטַּהֵר
  english_pob_choice: the one being cleansed
  chosen_spanish: el que se está limpiando
  alternatives_spanish:
  - el que está siendo limpiado
  - el que se purifica
  lexicon: HALOT
  rationale: Se conserva la idea procesual del participio hitpael. «Limpiando» es menos técnico que «purificando», pero en este rito funciona bien en español y evita añadir una abstracción no explícita en la forma verbal.
- source_word: הַיְמָנִית
  english_pob_choice: right
  chosen_spanish: derecha
  alternatives_spanish:
  - del lado derecho
  lexicon: HALOT
  rationale: Adjetivo simple y natural en español, coherente con oreja, mano y pie.
- source_word: בֹּהֶן יָדוֹ
  english_pob_choice: the thumb of his right hand
  chosen_spanish: el pulgar de su mano derecha
  alternatives_spanish:
  - el dedo gordo de su mano derecha
  lexicon: HALOT
  rationale: «Pulgar» es el equivalente anatómico preciso para la mano y corresponde a la elección inglesa.
- source_word: בֹּהֶן רַגְלוֹ
  english_pob_choice: the big toe of his right foot
  chosen_spanish: el dedo gordo de su pie derecho
  alternatives_spanish:
  - el dedo mayor de su pie derecho
  lexicon: HALOT
  rationale: «Dedo gordo» es la forma española más clara y corriente para el hallux, y sigue la elección inglesa de «big toe».
- source_word: וְ
  english_pob_choice: Then / and
  chosen_spanish: Entonces / y
  alternatives_spanish:
  - y
  - luego
  lexicon: HALOT
  rationale: El valor secuencial se marca con «Entonces» al inicio; las demás uniones se mantienen con «y» para conservar el flujo ritual.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote oficiante
  lexicon: HALOT
  rationale: «Sacerdote» es el equivalente directo y estándar para el oficiante cultual.
theological_decisions:
- issue: Sentido de אָשָׁם como término sacrificial específico
  english_pob_reading: guilt offering
  chosen_spanish_reading: ofrenda por la culpa
  alternative_spanish_readings:
  - ofrenda de culpa
  - ofrenda de reparación
  - ofrenda por la transgresión
  rationale: La traducción conserva la categoría sacrificial concreta y evita reducir el término a un estado emocional o moral. Se evita también «trespass offering» por ser menos transparente en español moderno.
  doctrine_reference: Consistencia terminológica POB para los sacrificios levíticos; precisión léxica antes que tradición litúrgica
- issue: La frase הַמִּטַּהֵר en un rito de purificación
  english_pob_reading: the one being cleansed
  chosen_spanish_reading: el que se está limpiando
  alternative_spanish_readings:
  - el que está siendo limpiado
  - el que se purifica
  rationale: No se introduce una lectura más teológica de la que exige el participio. La forma española conserva el proceso en curso sin convertirlo en un estado abstracto.
  doctrine_reference: Leviticus 14 ritual purity context; participial aspect preservation
- issue: 'Órgano de la oreja: ''lobe'' versus ''tip'''
  english_pob_reading: the lobe of the ... ear
  chosen_spanish_reading: el lóbulo de la oreja derecha
  alternative_spanish_readings:
  - la punta de la oreja derecha
  - el extremo de la oreja derecha
  rationale: La POB inglesa ya documenta la alternativa. En español, «lóbulo» da una imagen anatómica precisa y evita la ambigüedad de «punta», que puede sonar más figurativa que descriptiva.
  doctrine_reference: Nota lexical, no doctrinal
translation_notes:
  revision_awareness: 'Se siguió el contexto auditado en inglés sin traducir mecánicamente: se conservaron la secuencia ritual, la terminología sacrificial específica de אָשָׁם y la nota alternativa para el término anatómico de la oreja. No hubo revisiones aplicadas en la fuente inglesa reciente, por lo que la formulación española se alinea con el estado estable del texto auditado.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en lugar de «SEÑOR» cuando corresponda; en este versículo no aparece el tetragrámaton.
  - Se mantiene «ofrenda por la culpa» para אָשָׁם con el fin de ser consistente con el término sacrificial del corpus.
  - Se prefiere un registro bíblico claro y moderno, evitando arcaísmos innecesarios.
  - La secuencia ritual se marca con «Entonces» al inicio y con «y» en las acciones subsiguientes.
