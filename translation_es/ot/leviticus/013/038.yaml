translation:
  language: es
  text: Y si un hombre o una mujer tiene manchas brillantes[a] en la piel del cuerpo, manchas blancas brillantes,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O bien, “manchas blancas brillantes”.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אִישׁ ... אִשָּׁה
  english_pob_choice: a man or a woman
  chosen_spanish: un hombre o una mujer
  alternatives_spanish:
  - un hombre o mujer
  - cualquier hombre o mujer
  lexicon: HALOT
  rationale: El hebreo nombra explícitamente ambos sexos en una formulación legal indefinida. En español, 'un hombre o una mujer' reproduce con claridad esa inclusión sin añadir matices ajenos.
- source_word: כִּי יִהְיֶה
  english_pob_choice: if ... has
  chosen_spanish: si ... tiene
  alternatives_spanish:
  - cuando ... tenga
  - si ... hay
  lexicon: HALOT
  rationale: En contexto legal/diagnóstico, la partícula condicional se vierte naturalmente como 'si'. 'Tiene' comunica de forma idiomática la presencia de la afección en la persona, sin perder el valor circunstancial del hebreo.
- source_word: בְּעוֹר בְּשָׂרָם
  english_pob_choice: on the skin of the body
  chosen_spanish: en la piel del cuerpo
  alternatives_spanish:
  - sobre la piel de la carne
  - en la piel de su cuerpo
  lexicon: HALOT
  rationale: '''עוֹר'' es ''piel'' y ''בָּשָׂר'' aquí funciona como referencia corporal general. Se conserva la literalidad suficiente con una sintaxis natural en español, evitando una calca difícil como ''carne'' cuando el referente es médico/diagnóstico.'
- source_word: בֶּהָרֹת
  english_pob_choice: bright spots
  chosen_spanish: manchas brillantes
  alternatives_spanish:
  - manchas claras
  - manchas resplandecientes
  lexicon: HALOT
  rationale: El término describe marcas claras o brillantes en la piel. 'Manchas brillantes' sigue de cerca la solución del POB en inglés y mantiene el valor descriptivo sin interpretarlo como un diagnóstico más específico que el texto permite.
- source_word: בֶּהָרֹת לְבָנֹת
  english_pob_choice: white bright spots
  chosen_spanish: manchas brillantes blancas
  alternatives_spanish:
  - manchas blancas brillantes
  - manchas de brillo blanco
  lexicon: HALOT
  rationale: Se preserva la repetición del sustantivo y el adjetivo de color. El orden 'brillantes blancas' suena más natural en español que una secuencia literalmente replicada y mantiene la precisión diagnóstica del hebreo.
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió 'their body' por 'the body' para reflejar más literalmente el singular hebreo; el español sigue esa misma cautela con 'el cuerpo' en lugar de una posesión distributiva, y conserva la formulación diagnóstica sin añadir interpretación.
  spanish_consistency_notes:
  - Se mantiene 'Y' al inicio para reflejar el encadenamiento narrativo/legal hebreo.
  - No se usa 'carne' en el verso principal porque en español podría sonar menos claro en este contexto médico, aunque el término hebreo subyacente sí es corporal y concreto.
  - Se conserva la repetición de 'manchas brillantes' para reflejar la repetición hebrea de בֶּהָרֹת.
  - La nota al pie ofrece la alternativa de orden adjetival, ya que el español admite ambas disposiciones sin cambiar el sentido.
