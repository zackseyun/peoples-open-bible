lexical_decisions:
- source_word: παλαιαὶ
  english_pob_choice: ancient
  chosen_spanish: antiguas
  alternatives_spanish:
  - viejas
  - de larga data
  - antiguas y arraigadas
  lexicon: LSJ
  rationale: El adjetivo expresa algo de larga trayectoria o antigüedad establecida. En español, 'antiguas' conserva esa idea con naturalidad y sin rebajar el tono filosófico del pasaje.
- source_word: περὶ τὴν ἡδονὴν καὶ τὸν πόνον
  english_pob_choice: concerning pleasure and pain
  chosen_spanish: en relación con el placer y el dolor
  alternatives_spanish:
  - acerca del placer y del dolor
  - con respecto al placer y al dolor
  - sobre el placer y el dolor
  lexicon: LSJ
  rationale: El preposición περὶ con acusativo aquí marca referencia o esfera. 'En relación con' comunica esa referencia de manera idiomática en español, sin forzar una interpretación causal o temática más fuerte.
- source_word: παθῶν
  english_pob_choice: of passions
  chosen_spanish: de las pasiones
  alternatives_spanish:
  - de las emociones
  - de los afectos
  - de los sufrimientos
  lexicon: LSJ
  rationale: En este contexto filosófico, πάθη se refiere a impulsos o pasiones del alma. 'Pasiones' preserva mejor ese matiz técnico que opciones más generales como 'emociones'.
- source_word: ἀκολουθίαι
  english_pob_choice: sequences
  chosen_spanish: secuencias
  alternatives_spanish:
  - sucesiones
  - series
  - encadenamientos
  lexicon: LSJ
  rationale: El sustantivo indica algo que sigue ordenadamente. 'Secuencias' mantiene esa idea de orden sucesivo con claridad y un registro adecuado para español moderno.
theological_decisions:
- issue: Sentido antropológico-filosófico de πάθη
  english_pob_reading: passions
  chosen_spanish_reading: pasiones
  alternative_spanish_readings:
  - emociones
  - afectos
  rationale: El libro usa vocabulario filosófico helenístico para los impulsos irracionales sujetos a la razón. 'Pasiones' conserva mejor ese valor técnico y evita suavizar el argumento.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de 'concerned with' a 'concerning' para reflejar con más formalidad περὶ. En español se optó por 'en relación con' para conservar la referencia del sintagma sin añadir una tonalidad excesivamente literal.
  spanish_consistency_notes:
  - Se mantiene 'pasiones' para πάθη por coherencia con el contexto filosófico del libro.
  - Se traduce περὶ con una construcción relacional natural en español, no con una calca preposicional rígida.
  - '''Antiguas'' conserva el matiz de larga permanencia que el inglés auditado resolvió con ''ancient''.'
