theological_decisions:
- issue: Whether ἀπὸ Κυρίου should be rendered as simple source ('from the Lord') or relational separation ('away from the Lord')
  chosen_reading: 'relational separation: ''away from the Lord'''
  alternative_readings:
  - from the Lord
  - apart from the Lord
  rationale: In context the line warns of spiritual peril connected with distancing from the Lord, not mere origin. 'Away from' better preserves that tension without adding doctrine beyond the text.
  doctrine_reference: Original-language primacy over translation tradition; preserve theological tension rather than resolve it.
