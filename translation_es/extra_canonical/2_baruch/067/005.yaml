review_pass:
  verdict: revise
  source_alignment_summary: El borrador español refleja bien la estructura básica del siriaco y corrige el error previo del inglés truncado. Sin embargo, omite el matiz adversativo de 'Yet' y la elección 'serán alcanzados por la tribulación' suaviza el valor de ser tomados/apresados por la aflicción. El resto —'en la dispersión entre las naciones', 'habitarán en vergüenza', 'en todo lugar'— está sustancialmente alineado con la evidencia y el audit trail.
  spanish_quality_summary: El español es claro y digno, pero '[a] alcanzados' con nota crea una pausa poco natural y 'alcanzados por la tribulación' suena algo débil para un contexto apocalíptico. 'Pero después de estas cosas' mejora la transición, y 'serán apresados por la tribulación' comunica mejor la pasividad y fuerza del original sin volverse ininteligible.
  glossary_alignment: No hay términos del glosario mayor en juego. La revisión propuesta respeta el principio de no paraprasear y de mantener la fuerza léxica documentada en el inglés POB cuando este eligió 'be seized'.
  issues:
  - severity: medium
    issue: Se suaviza el verbo principal con 'serán alcanzados por la tribulación'.
    rationale: El siriaco, según el audit trail, expresa que serán 'seized/caught' por la tribulación. 'Alcanzados' puede significar simplemente que la tribulación les llega, mientras que el original enfatiza quedar prendidos o tomados por ella.
  - severity: low
    issue: Se omite el matiz adversativo de apertura.
    rationale: El inglés POB conserva 'Yet', y aunque en español a veces puede omitirse, aquí 'Pero después de estas cosas' preserva mejor la transición discursiva sin sonar forzado.
  - severity: low
    issue: La nota léxica no es necesaria si se adopta una formulación más fuerte en el texto principal.
    rationale: La nota actual compensa una elección más suave; al ajustar el texto principal, se elimina una nota que añade complejidad sin necesidad.
  revised_spanish_text: Pero después de estas cosas, serán apresados por la tribulación en la dispersión entre las naciones, y habitarán en vergüenza en todo lugar.
  revision_rationale: Se restituye el matiz adversativo inicial y se fortalece el verbo principal para reflejar mejor el sentido de 'be seized' documentado en el audit trail. No se requieren notas porque la redacción revisada expresa el sentido fuente con claridad natural en español.
