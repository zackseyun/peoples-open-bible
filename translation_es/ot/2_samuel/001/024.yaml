translation:
  language: es
  text: Hijas de Israel[a], lloren por Saúl, que las vestía de escarlata con lujos[b], que ponía ornamentos de oro sobre sus vestidos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘mujeres de Israel’. Se conserva ‘hijas’ para mantener el vocativo poético del hebreo.
    reason: lexical_alternative
  - marker: b
    text: O ‘deleites’, ‘finuras’ o ‘adornos’ para la expresión traducida aquí como ‘lujos’.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנוֹת יִשְׂרָאֵל
  english_pob_choice: Daughters of Israel
  chosen_spanish: Hijas de Israel
  alternatives_spanish:
  - Mujeres de Israel
  lexicon: HALOT
  rationale: Mantiene el vocativo poético y la imagen idiomática de ‘hijas’ mejor que una generalización a ‘mujeres’, en paralelo con la decisión inglesa de conservar el tono del hebreo.
- source_word: אֶל שָׁאוּל
  english_pob_choice: over Saul
  chosen_spanish: por Saúl
  alternatives_spanish:
  - sobre Saúl
  - por causa de Saúl
  - acerca de Saúl
  lexicon: HALOT
  rationale: En español, en un llamado de lamento, ‘llorar por’ expresa naturalmente el objeto del duelo. ‘Sobre Saúl’ sería más literal pero menos idiomático; se conserva la relación de lamentación sin perder el contexto funerario.
- source_word: בְּכֶינָה
  english_pob_choice: weep
  chosen_spanish: lloren
  alternatives_spanish:
  - lloren en duelo
  - laméntense
  - lloren y giman
  lexicon: HALOT
  rationale: El imperativo plural en español se expresa con ‘lloren’, que comunica tanto llanto como lamento en un contexto fúnebre. ‘Lloren’ es sobrio y fiel al tono del texto.
- source_word: הַמַּלְבִּשְׁכֶם
  english_pob_choice: who clothed you
  chosen_spanish: que las vestía
  alternatives_spanish:
  - que las vestía de ropa
  - que las adornaba
  - que las cubría
  lexicon: HALOT
  rationale: El participio con artículo funciona como relativa referida a Saúl. ‘Vestía’ reproduce la acción sin endurecer el español; el clítico ‘las’ mantiene la referencia a las hijas de Israel.
- source_word: שָׁנִי
  english_pob_choice: scarlet
  chosen_spanish: escarlata
  alternatives_spanish:
  - carmesí
  - de escarlata
  - rojo escarlata
  lexicon: HALOT
  rationale: ‘Escarlata’ es el equivalente bíblico y estilísticamente adecuado para la tela o color teñido, coherente con la elección inglesa.
- source_word: עִם עֲדָנִים
  english_pob_choice: with luxuries
  chosen_spanish: con lujos
  alternatives_spanish:
  - con deleites
  - con finuras
  - con adornos
  lexicon: HALOT
  rationale: Se conserva la tensión léxica del hebreo. ‘Lujos’ puede sonar inusual en español aplicado a ropa, pero refleja mejor la amplitud semántica de עֲדָנִים que una reducción a ‘adornos’ o ‘finuras’.
- source_word: הַמַּעֲלֶה
  english_pob_choice: who put
  chosen_spanish: que ponía
  alternatives_spanish:
  - que colocaba
  - que ponía sobre
  - que levantaba
  lexicon: HALOT
  rationale: El participio de עלה aquí se entiende como ‘poner/colocar sobre’. ‘Ponía’ conserva la naturalidad española y evita una traducción etimológica forzada como ‘subía’.
- source_word: עֲדִי זָהָב
  english_pob_choice: ornaments of gold
  chosen_spanish: ornamentos de oro
  alternatives_spanish:
  - joyas de oro
  - adornos de oro
  - ornamentación de oro
  lexicon: HALOT
  rationale: ‘Ornamentos de oro’ preserva la relación constructa y la dignidad poética. ‘Joyas de oro’ es posible, pero estrecha el sentido de עֲדִי hacia joyería.
- source_word: עַל לְבוּשְׁכֶן
  english_pob_choice: on your clothing
  chosen_spanish: sobre su ropa
  alternatives_spanish:
  - sobre vuestra ropa
  - sobre sus vestidos
  - encima de su ropa
  lexicon: HALOT
  rationale: ‘Sobre su ropa’ ofrece lectura fluida en español y evita una segunda persona que podría sonar inconsistente en la versión receptora; el referente sigue siendo el grupo femenino convocado.
theological_decisions:
- issue: Registro de lamento fúnebre y vocativo colectivo
  english_pob_reading: Daughters of Israel, weep over Saul
  chosen_spanish_reading: Hijas de Israel, lloren por Saúl
  alternative_spanish_readings:
  - Mujeres de Israel, lloren por Saúl
  - Hijas de Israel, laméntense por Saúl
  rationale: Se conserva el tono de duelo público y la apelación poética al grupo de mujeres de Israel. ‘Hijas’ retiene la imagen bíblica específica; ‘lloren’ comunica el lamento sin añadir una carga interpretativa excesiva.
  doctrine_reference: No aplica; decisión poética y retórica del lamento histórico.
translation_notes:
  revision_awareness: El control de revisión más reciente indica que no hubo cambios necesarios y que el estado quedó estable; este borrador sigue esa línea de alta concordancia con el hebreo y con la auditoría inglesa, ajustando solo la naturalidad del español en el vocativo, el lamento y la frase de ornamentos.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma del proyecto cuando aparezca el Tetragrámaton; en este versículo no aplica.
  - Se usa ‘escarlata’ para שָׁנִי, en consonancia con el registro bíblico.
  - Se evita ‘SEÑOR’ como máscara y también se evita ‘Cristo’ o terminología cristológica no presente aquí.
  - ‘Lloren por Saúl’ conserva el sentido de lamento sobre/por el difunto sin sobredeterminar la preposición.
  - La segunda persona posesiva del hebreo se vierte aquí con concordancia contextual en español para evitar aspereza, manteniendo el referente colectivo femenino.
