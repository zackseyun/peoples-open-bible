translation:
  language: es
  text: Y el hombre puso nombres a todo el ganado[a], a las aves de los cielos y a todo animal del campo; pero para el hombre no se halló una ayuda que le correspondiera[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Adán puso nombres ... pero para Adán no se halló una ayuda que le correspondiera».'
    reason: alternative_reading
  - marker: b
    text: 'O: «una ayuda adecuada para él».'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «no halló»; también puede verterse de modo activo: «pero el hombre no halló una ayuda que le correspondiera».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאָדָם / לְאָדָם
  english_pob_choice: the man / for the man
  chosen_spanish: el hombre / para el hombre
  alternatives_spanish:
  - Adán
  - la humanidad
  lexicon: HALOT
  rationale: En este contexto narrativo, אָדָם se refiere al ser humano individual ya presente en el jardín, no a la humanidad en abstracto. El español 'el hombre' conserva ese valor referencial inmediato y mantiene la progresión del relato. 'Adán' es posible como lectura casi nominal, pero aquí el sentido común sustantivo sigue siendo primario.
- source_word: וַיִּקְרָא ... שֵׁמוֹת
  english_pob_choice: gave names
  chosen_spanish: puso nombres
  alternatives_spanish:
  - llamó nombres
  - nombró
  lexicon: HALOT
  rationale: La expresión hebrea significa asignar nombres. 'Puso nombres' reproduce la acción concreta de manera natural en español y refleja bien el plural שֵׁמוֹת. 'Nombró' es posible, pero puede sonar más general y menos transparente al gesto de asignación.
- source_word: הַבְּהֵמָה
  english_pob_choice: the livestock
  chosen_spanish: el ganado
  alternatives_spanish:
  - los animales domésticos
  - las bestias domesticadas
  lexicon: HALOT
  rationale: בְּהֵמָה aquí designa animales domesticados. 'El ganado' es breve, claro y adecuado en español bíblico contemporáneo; mantiene la idea de animales de cría o domesticados frente a aves y animales del campo.
- source_word: עוֹף הַשָּׁמַיִם
  english_pob_choice: the birds of the sky
  chosen_spanish: las aves de los cielos
  alternatives_spanish:
  - las aves del cielo
  - las aves del firmamento
  lexicon: HALOT
  rationale: עוף se refiere a criaturas voladoras, aquí aves. 'Las aves de los cielos' conserva el giro bíblico y es plenamente comprensible en español. 'Del cielo' también sería válido, pero el plural 'cielos' sigue mejor la forma hebrea.
- source_word: כֹּל חַיַּת הַשָּׂדֶה
  english_pob_choice: every wild animal
  chosen_spanish: todo animal del campo
  alternatives_spanish:
  - toda bestia del campo
  - todo animal salvaje
  lexicon: HALOT
  rationale: La frase contrasta con el ganado domesticado. 'Todo animal del campo' conserva el ámbito espacial del hebreo y evita la dureza de 'bestia' en español moderno. 'Animal salvaje' aclara el contraste, pero introduce un matiz más interpretativo.
- source_word: עֵזֶר
  english_pob_choice: helper
  chosen_spanish: una ayuda
  alternatives_spanish:
  - un ayudante
  - una auxiliadora
  - una ayuda idónea
  lexicon: HALOT
  rationale: עזר denota ayuda o apoyo. En español, 'una ayuda' mantiene el sustantivo abstracto y evita reducir el término a una función subordinada. 'Ayuda idónea' es tradicional, pero 'idónea' ya interpreta la relación; 'ayudante' podría sonar demasiado personal o funcional.
- source_word: כְּנֶגְדּוֹ
  english_pob_choice: corresponding to him
  chosen_spanish: que le correspondiera
  alternatives_spanish:
  - que fuera adecuada para él
  - que estuviera frente a él
  - que le fuera correspondiente
  lexicon: HALOT
  rationale: כְּנֶגְדּוֹ expresa correspondencia/complementariedad, literalmente algo como 'frente a él' o 'correspondiente a él'. 'Que le correspondiera' preserva esa relación sin sobrecargar el español con un calco extraño. 'Adecuada para él' sería más interpretativo.
- source_word: לֹא מָצָא
  english_pob_choice: was found
  chosen_spanish: no se halló
  alternatives_spanish:
  - no encontró
  - no fue hallada
  lexicon: HALOT
  rationale: El hebreo está en 3ms, pero el español idiomático permite una construcción impersonal/pasiva para destacar el resultado de la búsqueda entre los animales. 'No se halló' refleja bien la ausencia de la ayuda buscada y mantiene el foco en el hallazgo, no en el agente.
theological_decisions:
- issue: Cómo renderizar אָדָם en Génesis 2:20
  english_pob_reading: the man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - Adán
  - la humanidad
  rationale: La escena trata del ser humano individual en el relato del jardín antes de la creación de la mujer. 'El hombre' conserva el valor contextual inmediato y evita adelantar una lectura de nombre propio o de humanidad genérica. 'Adán' se reserva como posibilidad de lectura, pero aquí todavía predomina el sustantivo común.
  doctrine_reference: 'Contested terms: אָדָם adam | Default Spanish: el hombre / la humanidad (según contexto)'
translation_notes:
  revision_awareness: 'Revisión más reciente: sin cambios necesarios; se mantiene alta concordancia con el control cruzado. Se ha conservado la lectura contextual de אָדָם como ''el hombre'' y la equivalencia relacional de כְּנֶגְדּוֹ como ''que le correspondiera''.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como convención general del proyecto, aunque este versículo no contiene el nombre divino.
  - '''Ganado'' traduce el grupo domesticado de בְּהֵמָה; ''aves de los cielos'' conserva el giro bíblico sin archaizar en exceso.'
  - La impersonal 'no se halló' refleja bien el resultado narrativo y deja abierta la nota alternativa activa.
