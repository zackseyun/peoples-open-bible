review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura general del hebreo: sujeto metafórico (''oído''), participación receptiva (''que escucha''), ubicación ''entre los sabios'' y el sentido figurado de תָלִין. Sin embargo, ''la corrección de la vida'' suena menos natural en español y puede sugerir ''la corrección que hace la vida'' más que ''la reprensión/corrección que conduce a la vida''. Además, la nota a ancla la alternativa en el verbo, pero en el texto alternativo también conviene mantener la opción más documentada por el POB inglés.'
  spanish_quality_summary: El español es claro pero algo rígido. 'Morará' es comprensible, aunque 'permanecerá' suena más natural en español moderno y refleja mejor el valor figurado ya documentado. 'La corrección de la vida' es gramatical, pero no es la formulación más idiomática ni la más transparente para lectores generales. 'Reprensión que da vida' comunica mejor el sentido principal sin perder dignidad.
  glossary_alignment: No hay conflictos con la terminología mayor del proyecto. La decisión sobre תּוֹכַחַת debería acercarse más a la fuerza de 'rebuke'; en este contexto 'reprensión' preserva mejor el matiz sapiencial que 'corrección'. Para חַיִּים, el texto principal puede seguir la lectura interpretativa ya adoptada por el POB inglés ('que da vida'), dejando las alternativas más literales en nota.
  issues:
  - severity: medium
    issue: La expresión 'la corrección de la vida' es ambigua de manera poco útil en español.
    rationale: Aunque intenta preservar la ambigüedad hebrea, en español puede sonar opaca o sugerir un genitivo distinto al sentido documentado por el POB inglés. La traducción principal debe ser legible y fiel, con la ambigüedad residual explicada en nota.
  - severity: medium
    issue: '''Corrección'' suaviza el matiz de תּוֹכַחַת más de lo deseable.'
    rationale: El POB inglés eligió 'rebuke' por su fuerza sapiencial. En español, 'reprensión' conserva mejor ese tono moral sin volverse ininteligible.
  - severity: low
    issue: '''Morará'' es aceptable pero menos natural que ''permanecerá'' en español contemporáneo.'
    rationale: El hebreo literal es 'alojarse/pasar la noche', usado figuradamente. 'Permanecerá' comunica mejor ese sentido metafórico para lectores modernos, mientras la nota puede conservar el literal.
  revised_spanish_text: El oído que escucha la reprensión que da vida[a][b] permanecerá entre los sabios.
  revised_footnotes:
