translation:
  language: es
  text: Por esta razón nuestros padres fueron entregados a la espada y al saqueo, y cayeron como una gran matanza[a] delante de nuestros enemigos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente algo como «un gran cuerpo caído» o «un gran cadáver»; es un modismo que expresa una gran cantidad de muertos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὧν χάριν
  english_pob_choice: For this reason
  chosen_spanish: Por esta razón
  alternatives_spanish:
  - por lo cual
  - por eso
  - por esta causa
  lexicon: LSJ
  rationale: La expresión griega es causal e idiomática; en español, «Por esta razón» transmite con naturalidad la relación de causa y efecto sin debilitar el vínculo lógico del texto.
- source_word: ἐδόθησαν
  english_pob_choice: were handed over
  chosen_spanish: fueron entregados
  alternatives_spanish:
  - fueron entregados en manos de
  - fueron puestos bajo
  - fueron dados
  lexicon: LSJ
  rationale: El pasivo aquí implica ser entregados a poder hostil o a juicio, no una entrega neutra. «Fueron entregados» conserva ese valor y suena natural en español bíblico contemporáneo.
- source_word: εἰς ῥομφαίαν
  english_pob_choice: to the sword
  chosen_spanish: a la espada
  alternatives_spanish:
  - a la espada afilada
  - al filo de la espada
  lexicon: LSJ
  rationale: La imagen idiomática de muerte violenta se conserva con la formulación directa «a la espada», que es clara y fiel al griego.
- source_word: εἰς διαρπαγήν
  english_pob_choice: to plundering
  chosen_spanish: al saqueo
  alternatives_spanish:
  - al despojo
  - al pillaje
  - a ser saqueados
  lexicon: LSJ
  rationale: El sustantivo griego nombra la acción de ser despojados. «Al saqueo» mantiene el sustantivo abstracto y encaja con el paralelismo de la frase.
- source_word: οἱ πατέρες ἡμῶν
  english_pob_choice: our fathers
  chosen_spanish: nuestros padres
  alternatives_spanish:
  - nuestros antepasados
  lexicon: LSJ
  rationale: El griego usa el término masculino plural y el contexto es histórico-covenantal. «Nuestros padres» preserva esa forma sin neutralizarla, siguiendo la preferencia de precisión de género cuando el original la tiene.
- source_word: ἔπεσον
  english_pob_choice: they fell
  chosen_spanish: cayeron
  alternatives_spanish:
  - fueron derribados
  - perecieron
  lexicon: LSJ
  rationale: «Cayeron» reproduce el verbo de caída/muerte en combate de manera natural en español. Mantiene la imagen de abatimiento sin añadir interpretación.
- source_word: πτῶμα μέγα
  english_pob_choice: as a great slaughter
  chosen_spanish: como un gran matadero
  alternatives_spanish:
  - como una gran matanza
  - como un gran montón de cadáveres
  - como una gran caída
  lexicon: LSJ
  rationale: El griego es comprimido y literalmente extraño. La combinación sugiere una gran cantidad de muertos/caídos; «como un gran matadero» preserva la fuerza imagística de muerte masiva y la comparación introducida por ὡς/implícita en la revisión inglesa, aunque en español resulta más natural que una literalidad opaca.
- source_word: ἐνώπιον τῶν ἐχθρῶν ἡμῶν
  english_pob_choice: before our enemies
  chosen_spanish: delante de nuestros enemigos
  alternatives_spanish:
  - ante nuestros enemigos
  - en presencia de nuestros enemigos
  lexicon: LSJ
  rationale: «Delante de» reproduce el valor espacial/escénico de ἐνώπιον con buena fluidez. Es formal y claramente inteligible en español.
theological_decisions:
- issue: Tratamiento del lenguaje ancestral masculino
  english_pob_reading: our fathers
  chosen_spanish_reading: nuestros padres
  alternative_spanish_readings:
  - nuestros antepasados
  rationale: Se conserva el referente masculino plural porque el griego lo presenta así y el marco narrativo es histórico-identitario. No se neutraliza a «antepasados» como forma principal, aunque sigue siendo una alternativa posible para suavizar el español.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
- issue: Interpretación de πτῶμα μέγα
  english_pob_reading: they fell as a great slaughter
  chosen_spanish_reading: cayeron como un gran matadero
  alternative_spanish_readings:
  - cayeron como una gran matanza
  - cayeron como un gran montón de cadáveres
  - cayeron en una gran matanza
  rationale: El griego expresa una caída masiva y el inglés auditado opta por un equivalente que preserve la fuerza idiomática. En español, «como un gran matadero» intenta conservar la imagen de muerte multitudinaria sin ocultar el carácter figurado; se evita una paráfrasis doctrinal o moralizante.
  doctrine_reference: DOCTRINE.md §1 Original-language primacy; §6 Readable modern Spanish
translation_notes:
  revision_awareness: La versión inglesa revisó «in a great slaughter» a «as a great slaughter» para acercarse más a ἔπεσον πτῶμα μέγα. La redacción española intenta reflejar esa misma compresión imagística, manteniendo el valor figurado y el tono narrativo formal.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exija directamente; aquí no aparece.
  - «Espada» y «saqueo» conservan el paralelismo de violencia y despojo del griego.
  - Se mantiene el plural masculino «nuestros padres» conforme al original.
  - La comparación de πτῶμα μέγα queda señalada con nota para no borrar la tensión léxica del griego.
