id: PSA.104.24
reference: Psalms 104:24
source:
  edition: WLC
  text: מָֽה רַבּ֬וּ מַעֲשֶׂ֨י/ךָ יְֽהוָ֗ה כֻּ֭לָּ/ם בְּ/חָכְמָ֣ה עָשִׂ֑יתָ מָלְאָ֥ה הָ֝/אָ֗רֶץ קִנְיָנֶֽ/ךָ־׀׃
translation:
  text: How many are your works[a], O Yahweh! In wisdom you have made them all; the earth is full of your creatures.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the earth is full of your creatures' or 'what belongs to you.' The Hebrew term can denote what one possesses or acquires; in context it may refer broadly to the things God has made.
    reason: lexical_alternative
lexical_decisions:
- source_word: מָה
  chosen: How many
  alternatives:
  - How great
  - How manifold
  lexicon: HALOT
  rationale: In exclamatory usage with רַבּוּ, מָה introduces an exclamation of abundance. 'How many' best captures the sense of multiplicity in natural modern English. 'How manifold' is traditional but less accessible; 'How great' shifts toward magnitude rather than number/variety.
- source_word: רַבּוּ
  chosen: are
  alternatives:
  - are many
  - are numerous
  lexicon: HALOT
  rationale: The verb conveys becoming/multiplicity ('are many'). In English exclamatory style, 'How many are your works' naturally carries the sense without needing an additional 'many' after 'How many.'
- source_word: מַעֲשֶׂיךָ
  chosen: your works
  alternatives:
  - your deeds
  - what you have made
  lexicon: HALOT
  rationale: '''Works'' is the most direct rendering of מעשה here and fits the creation context. ''Deeds'' can sound more like acts in history; ''what you have made'' is interpretive expansion.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כֻּלָּם
  chosen: them all
  alternatives:
  - all of them
  - all
  lexicon: HALOT
  rationale: Refers back to 'your works.' 'Them all' is idiomatic and preserves the totalizing force.
- source_word: בְּחָכְמָה
  chosen: In wisdom
  alternatives:
  - wisely
  - with wisdom
  lexicon: HALOT
  rationale: The prepositional phrase is best kept as 'In wisdom,' preserving the noun and the poetic/theological emphasis on wisdom as the mode or sphere of God's creative activity.
- source_word: עָשִׂיתָ
  chosen: you have made
  alternatives:
  - you made
  - you fashioned
  lexicon: HALOT
  rationale: '''You have made'' is a natural perfect rendering in English and fits the psalm''s praise of completed creation. ''Fashioned'' is possible but more interpretive.'
- source_word: מָלְאָה
  chosen: is full of
  alternatives:
  - is filled with
  - has been filled with
  lexicon: HALOT
  rationale: Though formally a perfect, in context it expresses the present resultant state of the earth. 'Is full of' is the most natural English expression.
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: In this creation hymn the global sense is intended, so 'the earth' is preferable to the more localized 'land.'
- source_word: קִנְיָנֶךָ
  chosen: your possessions
  alternatives:
  - your creatures
  - what belongs to you
  - your acquisitions
  lexicon: HALOT
  rationale: The noun denotes that which is acquired/possessed. 'Your possessions' preserves the ownership sense most directly. 'Your creatures' fits the context of creation but narrows the term interpretively; 'what belongs to you' is accurate but less concise.
