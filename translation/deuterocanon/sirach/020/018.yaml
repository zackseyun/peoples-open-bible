id: SIR.20.18
reference: Sirach 20:18
source:
  edition: lxx-swete-1909
  text: Ὀλίσθημα ἀπὸ ἐδάφους μᾶλλον ἢ ἀπὸ γλώσσης, οὕτως πτῶσις κακῶν κατὰ σπουδὴν ἥξει.
