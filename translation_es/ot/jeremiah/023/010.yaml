    rationale: Aunque el hebreo es elíptico, en español «no es así» queda demasiado oscuro y no expresa de manera suficiente la negación moral documentada en el POB ('is not right'). Una forma como «no es recto» preserva la elipsis mejor que una paráfrasis larga y sigue la nota inglesa.
