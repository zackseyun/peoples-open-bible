  to: Los reyes de la tierra se levantan[a], y los gobernantes se reúnen juntos[b] contra Yahvé y contra su Ungido.
  rationale: Se ajusta יִתְיַצְּבוּ a se levantan para expresar mejor una toma de postura deliberada y confrontativa, y se incorpora juntos en el texto principal para reflejar יָחַד. También se pulen las notas para que suenen más naturales en español y conserven las alternativas documentadas en la auditoría inglesa.
