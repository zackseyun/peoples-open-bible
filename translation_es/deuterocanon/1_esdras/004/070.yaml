translation:
  language: es
  text: Y escribió cartas a todos los gobernantes locales[a] en Celesiria y Fenicia, y a los del Líbano, para traer madera de cedro del Líbano a Jerusalén, a fin de que edificaran la ciudad con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'gobernantes de distrito'; griego 'toparcas', es decir, gobernantes sobre distritos locales.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοπάρχαις
  english_pob_choice: local rulers
  chosen_spanish: gobernantes locales
  alternatives_spanish:
  - gobernantes de distrito
  - toparcas
  lexicon: LSJ
  rationale: τοπάρχης designa a un gobernante de una localidad o distrito. 'Gobernantes locales' comunica bien la función administrativa sin depender de una transliteración opaca como 'toparcas'.
- source_word: ἐν κοίλῃ Συρίᾳ
  english_pob_choice: in Coele-Syria
  chosen_spanish: en Celesiria
  alternatives_spanish:
  - en la Siria Hueca
  - en Siria
  lexicon: LSJ
  rationale: Se trata de un nombre geográfico histórico de uso helenístico. 'Celesiria' conserva mejor el topónimo que una paráfrasis descriptiva o una generalización a 'Siria'.
- source_word: ἐπιστολάς
  english_pob_choice: letters
  chosen_spanish: cartas
  alternatives_spanish:
  - cartas escritas
  - epístolas
  lexicon: LSJ
  rationale: ἐπιστολή significa carta escrita. 'Cartas' es el equivalente natural en español y mantiene la sencillez del texto griego.
- source_word: μεταφέρειν
  english_pob_choice: to bring
  chosen_spanish: traer
  alternatives_spanish:
  - transportar
  - llevar
  lexicon: LSJ
  rationale: '''Traer'' expresa naturalmente el movimiento del material hacia Jerusalén en español, sin volver técnico el infinitivo de propósito.'
- source_word: ξύλα κέδρινα
  english_pob_choice: cedar timber
  chosen_spanish: madera de cedro
  alternatives_spanish:
  - madera de cedro para construcción
  - troncos de cedro
  lexicon: LSJ
  rationale: La expresión apunta a material de construcción. 'Madera de cedro' conserva el valor material sin forzar una especificación que el griego no da.
- source_word: ἀπὸ τοῦ Λιβάνου εἰς Ἰερουσαλήμ
  english_pob_choice: from Lebanon to Jerusalem
  chosen_spanish: del Líbano a Jerusalén
  alternatives_spanish:
  - desde el Líbano hasta Jerusalén
  lexicon: LSJ
  rationale: 'La preposición de origen y destino se expresa de forma directa y natural en español: ''del... a...''.'
- source_word: οἰκοδομήσωσιν
  english_pob_choice: they might build
  chosen_spanish: edifiquen
  alternatives_spanish:
  - construyan
  - edifiquen la ciudad
  lexicon: LSJ
  rationale: El subjuntivo de propósito pide una forma natural en español. 'Edifiquen' mantiene el tono más bíblico y no limita innecesariamente el acto a mera edificación material.
- source_word: τὴν πόλιν
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - la urbe
  - Jerusalén
  lexicon: LSJ
  rationale: El griego dice 'la ciudad' y no nombra de nuevo a Jerusalén en esta cláusula. Se conserva el objeto explícito sin armonizarlo a un referente más interpretativo.
theological_decisions:
- issue: Objeto del proyecto de construcción
  english_pob_reading: the text says the city, not specifically the temple
  chosen_spanish_reading: el texto dice la ciudad, no específicamente el templo
  alternative_spanish_readings:
  - el templo
  - la casa de Dios
  rationale: Aunque el cedro del Líbano suele asociarse en otros pasajes con construcción sagrada, aquí el griego termina en τὴν πόλιν. La traducción preserva ese objeto explícito y no lo redefine como templo.
  doctrine_reference: Translation philosophy §1, §3
- issue: Topónimos helenísticos
  english_pob_reading: Coele-Syria is a historical place-name
  chosen_spanish_reading: Celesiria como nombre histórico geográfico
  alternative_spanish_readings:
  - Siria Hueca
  - Siria
  rationale: Mantener el nombre propio histórico evita borrar una referencia administrativa/geográfica concreta del período helenístico.
  doctrine_reference: Translation philosophy §1, §2
translation_notes:
  revision_awareness: La versión inglesa fue revisada para añadir el segundo 'to' antes de 'those in Lebanon', reflejando con más claridad la repetición griega del dativo. La redacción española ya expresa esa repetición con 'y a los que estaban en el Líbano', sin requerir cambio adicional.
  spanish_consistency_notes:
  - Se usó 'Yahvé' según la norma del proyecto cuando corresponda; aquí no aparece el nombre divino.
  - Se prefirió 'Celesiria' como topónimo histórico consistente con el tratamiento del inglés POB.
  - Se mantuvo 'madera de cedro' para conservar el sentido de material de construcción sin sobrerinterpretación.
  - Se conservó el objeto 'la ciudad' en vez de armonizarlo a 'templo'.
