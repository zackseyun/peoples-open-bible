  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: Nebuzaradán deporta a tres grupos: el resto del pueblo que permanecía en la ciudad, los que se pasaron al rey de Babilonia, y el resto de la multitud. También reproduce adecuadamente el valor idiomático de הַנֹּפְלִים ... נָפְלוּ עַל como defección política, no caída literal, y traduce רַב טַבָּחִים funcionalmente como un título oficial.'
  spanish_quality_summary: El español es claro y natural. Sin embargo, hay un pequeño problema de concordancia/aspecto en «el resto del pueblo que había quedado», donde el singular verbal suena menos fluido con «pueblo» entendido colectivamente y además debilita el vínculo con el participio plural hebreo. «que habían quedado» suena más natural aquí. También conviene ajustar la nota [a], porque la alternativa actual repite en parte la traducción principal en vez de reflejar mejor la opción alternativa documentada en inglés.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé/Mesías ni otros términos sensibles. «capitán de la guardia» para רַב טַבָּחִים está bien justificado como equivalente funcional. «multitud» preserva adecuadamente הָמוֹן, con alternativas en nota.
  issues:
  - severity: medium
    issue: «que había quedado» suena menos natural y menos alineado con el participio plural hebreo
    rationale: הַנִּשְׁאָרִים es plural («los que quedaron / permanecieron»). Aunque «pueblo» pueda llevar verbo singular, en esta construcción relativa española resulta más natural «el resto del pueblo que habían quedado en la ciudad» o una reformulación equivalente. Mantener el plural refleja mejor el hebreo y evita rigidez.
  - severity: low
    issue: La nota [a] no refleja de la mejor manera la alternativa auditada en inglés
    rationale: La nota inglesa contrasta «who remained» con «who were left/left behind». La nota española actual ofrece «que habían sido dejados» pero luego llama literal a «los que habían quedado», que es básicamente la traducción principal. Conviene aclarar la alternativa sin confundirla con la base.
  revised_spanish_text: Nebuzaradán, el capitán de la guardia, llevó al exilio al resto del pueblo que habían quedado[a] en la ciudad, a los desertores que se habían pasado[b] al rey de Babilonia, y al resto de la multitud[c].
  revised_footnotes:
  - marker: a
    text: O «que habían sido dejados allí» o «que habían sido dejados atrás».
    reason: alternative_reading
  - marker: b
    text: O «que habían caído ante»; el hebreo literalmente dice «los que habían caído sobre/al lado de» el rey de Babilonia, un modismo de defección o de pasarse al bando de alguien.
    reason: alternative_reading
  - marker: c
    text: O «el resto de la gente» o «el resto de la población» para «el resto de la multitud».
    reason: lexical_alternative
  revision_rationale: Se hace una reparación menor para alinear mejor la relativa con el plural hebreo y mejorar la naturalidad contextual, y se ajusta la nota [a] para que preserve con mayor fidelidad la alternativa documentada en la auditoría inglesa.
