translation:
  language: es
  text: 'Entonces los hombres de Jabes dijeron[a]: «Mañana saldremos a encontrarnos con ustedes, y podrán hacer con nosotros según todo lo que les parezca bueno».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «saldremos adonde están ustedes»; el hebreo no dice explícitamente «rendirnos», aunque el contexto lo sugiere.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  english_pob_choice: So ... said
  chosen_spanish: Entonces ... dijeron
  alternatives_spanish:
  - Y ... dijeron
  - Luego ... dijeron
  lexicon: WLC/HALOT
  rationale: El waw consecutivo marca avance narrativo; «Entonces» reproduce bien la secuencia y suena natural en español sin perder el enlace con lo anterior.
- source_word: אַנְשֵׁי יָבֵישׁ
  english_pob_choice: the men of Jabesh
  chosen_spanish: los hombres de Jabes
  alternatives_spanish:
  - los habitantes de Jabes
  - los hombres de Jabes-galaad
  lexicon: WLC/HALOT
  rationale: אַנְשֵׁי es literalmente «hombres de». Se mantiene «Jabes» porque el hebreo de este versículo nombra así el lugar; la identificación más amplia con Galaad pertenece al contexto, no a la forma explícita del verso.
- source_word: מָחָר
  english_pob_choice: Tomorrow
  chosen_spanish: Mañana
  alternatives_spanish:
  - Al día siguiente
  lexicon: WLC/HALOT
  rationale: Adverbio temporal directo; «Mañana» conserva la inmediatez del hebreo.
- source_word: נֵצֵא אֲלֵיכֶם
  english_pob_choice: we will come out to you
  chosen_spanish: saldremos hacia ustedes
  alternatives_spanish:
  - saldremos a ustedes
  - iremos a ustedes
  lexicon: WLC/HALOT
  rationale: יצא significa «salir / salir hacia». En español, «saldremos hacia ustedes» mantiene el movimiento de salida sin añadir explícitamente la idea de rendición, que el hebreo no dice de forma abierta.
- source_word: וַעֲשִׂיתֶם לָּנוּ
  english_pob_choice: and you may do to us
  chosen_spanish: harán con nosotros
  alternatives_spanish:
  - podrán hacer con nosotros
  - y harán con nosotros
  lexicon: WLC/HALOT
  rationale: La construcción expresa lo que los otros harán una vez que ellos salgan. En español, el giro directo «harán con nosotros» transmite el sentido sin introducir una modalidad que el hebreo no explicita.
- source_word: כְּכָל הַטּוֹב בְּעֵינֵיכֶם
  english_pob_choice: whatever seems good in your eyes
  chosen_spanish: según todo lo que les parezca bueno en sus ojos
  alternatives_spanish:
  - como todo lo bueno que les parezca
  - según lo que les parezca bueno
  lexicon: WLC/HALOT
  rationale: Se conserva el modismo hebreo «bueno en sus ojos» mediante una construcción española natural que mantiene la imagen y el matiz de criterio/percepción del destinatario.
theological_decisions:
- issue: El posible matiz de rendición implícita en «salir hacia ustedes»
  english_pob_reading: The Hebrew does not explicitly say 'surrender,' though the context implies submission.
  chosen_spanish_reading: «Saldremos hacia ustedes» conserva el dato textual abierto, sin añadir «rendirnos» en el cuerpo del versículo.
  alternative_spanish_readings:
  - «Saldremos a rendirnos ante ustedes»
  - «Nos entregaremos a ustedes»
  rationale: 'La decisión sigue la cautela auditada del POB inglés: no insertar en la línea principal una interpretación que el hebreo no formula. El contexto narrativo sí puede sugerir sumisión, pero la traducción principal debe mantener la literalidad semántica del verbo de salida.'
  doctrine_reference: Principio de transparencia textual y de no sobreinterpretar el alcance léxico del verbo יצא
translation_notes:
  revision_awareness: El cotejo de revisión indica alta concordancia y ningún cambio pendiente; por eso el borrador sigue de cerca el sentido auditado del inglés POB, pero lo reexpresa en español natural y transparente.
  spanish_consistency_notes:
  - Se mantiene «Jabes» como forma breve del topónimo, en paralelo con el inglés auditado.
  - Se conserva la imagen idiomática de «en sus ojos» para reflejar כְּכָל הַטּוֹב בְּעֵינֵיכֶם sin sustituirla por una paráfrasis como «les parezca bien» en exceso interpretativa.
  - No se introduce «rendirse» en el texto principal, respetando la tensión lexical documentada en el audit trail.
