revisions:
- from: 'Pero Joás dijo a todos los que se habían puesto contra él: “¿Van ustedes a contender por Baal? ¿Lo van a salvar? El que contienda por él será muerto antes de mañana. Si es un dios, que contienda por sí mismo, porque su altar ha sido derribado.”'
  to: 'Pero Joás dijo a todos los que se habían puesto contra él: «¿Van ustedes a contender por Baal? ¿Lo van a salvar? El que contienda por él será ejecutado para mañana. Si es un dios, que contienda por sí mismo, porque su altar ha sido derribado.»'
  rationale: Se ajusta «será muerto» a «será ejecutado» para un español más natural que aún preserve el valor pasivo judicial de יוּמַת, y «antes de mañana» a «para mañana» para reflejar mejor el plazo de עַד הַבֹּקֶר. No se añaden notas porque el pasivo final ya conserva la ambigüedad del sujeto de manera adecuada en español.
  reviewer_model: gpt-5.4
