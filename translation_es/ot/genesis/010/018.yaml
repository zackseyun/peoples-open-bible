review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la lista de gentilicios y la cláusula final de dispersión, pero se aparta del rastro auditado del POB en dos puntos importantes: traduce מִשְׁפְּחוֹת como «familias» en vez de la opción preferida contextual «clanes», y añade una nota [a] sobre «arvaditas» que no preserva la alternativa significativa del inglés, que era el singular colectivo «el arvadita» / «la gente de Arvad», no una repetición de la forma principal.'
  spanish_quality_summary: El español es claro y legible, pero «fueron dispersadas» suena algo más forzado que «fueron dispersados» con sujeto masculino («los clanes») o «se dispersaron». Además, «las familias de los cananeos» es menos natural y menos preciso en contexto etnográfico que «los clanes de los cananeos».
  glossary_alignment: No hay términos teológicos mayores en juego. Los etnónimos plurales «arvaditas / zemaritas / hamatitas / cananeos» se alinean bien con la decisión contextual colectiva. La principal desalineación léxica es מִשְׁפְּחוֹת, donde debe mantenerse «clanes» como en el POB inglés por el contexto de la Tabla de las Naciones.
  issues:
  - severity: medium
    issue: מִשְׁפְּחוֹת fue traducido como «familias» en el texto principal.
    rationale: El rastro auditado del POB prefirió «clans» por el contexto genealógico-etnográfico. En español, «clanes» comunica mejor grupos de parentesco amplios que «familias».
  - severity: medium
    issue: La nota [a] no conserva la alternativa significativa documentada en el POB inglés.
    rationale: La nota inglesa registra la posibilidad del singular colectivo («the Arvadite») o «the people of Arvad». La nota española actual solo repite la forma principal y explica su función, sin ofrecer la alternativa léxica relevante.
  - severity: low
    issue: La construcción «las familias de los cananeos fueron dispersadas» es menos idiomática que la opción revisada.
    rationale: Con «clanes» el conjunto suena más natural y preciso; además evita la sensación de una pasiva pesada con un sustantivo menos contextual.
  revised_spanish_text: y los arvaditas, los zemaritas y los hamatitas. Después, los clanes[a] de los cananeos fueron dispersados.
  revised_footnotes:
  - marker: a
    text: O «las familias del cananeo». El hebreo usa un gentilicio singular colectivo («el cananeo») para referirse al pueblo en conjunto.
    reason: lexical_alternative
  revision_rationale: 'Se revisa para alinearse con la decisión léxica auditada del POB: «clanes» en vez de «familias» para מִשְׁפְּחוֹת en contexto etnográfico, y una única nota que preserva la alternativa significativa documentada para la expresión final con el gentilicio colectivo singular hebreo. Se elimina la nota innecesaria sobre «arvaditas», porque el inglés no pedía nota allí como alternativa principal sino solo una explicación léxica ya resuelta en el texto.'
