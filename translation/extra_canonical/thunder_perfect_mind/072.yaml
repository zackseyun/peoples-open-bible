- source_word: ⲉⲃⲟⲗ ϩⲓⲧⲙ̄ ⲡϣⲟϫⲛⲉ
  chosen: go out by means of the voice
  alternatives:
  - proceed by the voice
  - are proclaimed through the voice
  lexicon: Coptic ⲉⲃⲟⲗ (out), ϩⲓⲧⲙ̄ (by means of), ⲡϣⲟϫⲛⲉ (voice/sound)
  rationale: Literal prepositional phrase retained to preserve the image of procession
    through utterance.
- source_word: ⲡⲛⲁ
  chosen: mind
  alternatives:
  - spirit
  - intellect
  lexicon: Coptic ⲛⲁ (mind, thought)
  rationale: In collocation with “of humans,” “mind” fits the cognitive field; “spirit”
    is possible but more ambiguous.
- source_word: ⲛ̄ⲣⲱⲙⲉ
  chosen: humans
  alternatives:
  - men
  - people
  lexicon: Coptic ⲣⲱⲙⲉ (human, man)
  rationale: Chosen inclusive rendering; semantics are generic for humankind in context.
- source_word: ⲛⲓⲙⲉⲧϣⲟⲟⲡ
  chosen: the beings that exist
  alternatives:
  - the existing ones
  - the things that are
  lexicon: Coptic ⲙⲉⲧϣⲟⲟⲡ (being, that-which-is)
  rationale: Compound read across the line break; keeps ontological feel consistent
