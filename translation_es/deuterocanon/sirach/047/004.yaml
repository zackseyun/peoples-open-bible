translation:
  language: es
  text: En su juventud derribó a un guerrero y quitó la deshonra perpetua[a]; cuando alzó la mano con la honda[b], quebrantó la gloria de Goliat.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego dice: «y quitó el reproche del pueblo». El hebreo preservado dice «deshonra perpetua».'
    reason: alternative_reading
  - marker: b
    text: El griego dice explícitamente «gigante» y habla de arrojar abajo «la jactancia» o «el orgullo» de Goliat, aclarando que el versículo se refiere a David y Goliat.
    reason: lexical_alternative
lexical_decisions:
- source_word: בנעוריו
  english_pob_choice: In his youth
  chosen_spanish: En su juventud
  alternatives_spanish:
  - Cuando era joven
  - En su juventud temprana
  lexicon: HALOT
  rationale: La expresión hebrea señala el período juvenil de David. «En su juventud» es natural en español y conserva el valor temporal sin añadir precisión innecesaria.
- source_word: הכה גבור
  english_pob_choice: he struck down a warrior
  chosen_spanish: mató a un guerrero
  alternatives_spanish:
  - derribó a un guerrero
  - mató a un hombre poderoso
  lexicon: HALOT
  rationale: El hebreo dice literalmente «golpeó a un guerrero/hombre valiente». «Guerrero» conserva el sentido léxico de גבור, y «mató» expresa el resultado letal que el contexto exige. Se evita «gigante» en el texto principal porque el hebreo preservado no lo dice, aunque el griego lo explicita.
- source_word: ויסר חרפת עולם
  english_pob_choice: and removed everlasting disgrace
  chosen_spanish: y quitó la deshonra perpetua
  alternatives_spanish:
  - y apartó el oprobio eterno
  - y removió el reproche perpetuo
  lexicon: HALOT
  rationale: Se conserva עולם como una deshonra duradera o perpetua. «Deshonra» transmite bien el campo semántico de חרפה en español contemporáneo, sin perder la fuerza del sustantivo.
- source_word: בהניפו ידו
  english_pob_choice: when he raised his hand
  chosen_spanish: cuando alzó la mano
  alternatives_spanish:
  - cuando levantó la mano
  - al alzar la mano
  lexicon: HALOT
  rationale: La construcción circunstancial se vierte en una forma natural de español. «Alzó la mano» mantiene la imagen de preparación para la acción con la honda.
- source_word: על קלע
  english_pob_choice: with the sling
  chosen_spanish: con la honda
  alternatives_spanish:
  - con la honda de piedra
  - con la honda lanzadera
  lexicon: HALOT
  rationale: «Honda» es el equivalente español estándar y claro. Se evita sobreexplicar el instrumento, aunque el griego menciona la piedra de la honda, porque el hebreo habla de la acción con la honda.
- source_word: וישבר תפארת גלית
  english_pob_choice: he shattered the glory of Goliath
  chosen_spanish: quebrantó la gloria de Goliat
  alternatives_spanish:
  - quebrantó el orgullo de Goliat
  - derribó el esplendor de Goliat
  lexicon: HALOT
  rationale: תפארת puede significar gloria, esplendor o orgullo. Se mantiene «gloria» siguiendo la decisión auditada del POB inglés, con un verbo fuerte («quebrantó») que conserva el tono humillante y destructivo del pasaje.
theological_decisions:
- issue: Desacuerdo hebreo-griego sobre la deshonra removida
  english_pob_reading: Follow the surviving Hebrew 'removed everlasting disgrace' in the main text
  chosen_spanish_reading: 'Seguir el hebreo preservado: «quitó la deshonra perpetua»'
  alternative_spanish_readings:
  - «quitó el reproche del pueblo»
  - «quitó la vergüenza del pueblo»
  rationale: En Sirácides, cuando el hebreo sobreviviente está disponible, debe tener primacía. El griego aporta una lectura interpretativa/complementaria, pero el texto principal en español refleja la forma hebrea atestiguada.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where Sirach Hebrew survives; use Greek parallel as actual input while keeping Hebrew primary.'
translation_notes:
  revision_awareness: La revisión más reciente indica que no se necesitaban cambios; la propuesta mantiene esa línea y conserva la primacía del hebreo donde sobrevive, usando el griego solo como apoyo para la identificación narrativa y la nota alternativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el pasaje lo exija; aquí no aparece.
  - Se usa «Goliat» de forma consistente como nombre propio tradicional e inequívoco.
  - No se introduce «Cristo/Mesías» porque el versículo no lo requiere.
  - «Gloria» se conserva como traducción auditable de תפארת, con nota sobre la posible fuerza de «orgullo/jactancia» en el griego.
  - «Honda» reproduce el instrumento de forma natural en español sin calco excesivo.
