id: JOS.18.8
reference: Joshua 18:8
source:
  edition: WLC
  text: וַ/יָּקֻ֥מוּ הָ/אֲנָשִׁ֖ים וַ/יֵּלֵ֑כוּ וַ/יְצַ֣ו יְהוֹשֻׁ֡עַ אֶת הַ/הֹלְכִים֩ לִ/כְתֹּ֨ב אֶת הָ/אָ֜רֶץ לֵ/אמֹ֗ר לְ֠כוּ וְ/הִתְהַלְּכ֨וּ בָ/אָ֜רֶץ וְ/כִתְב֤וּ אוֹתָ/הּ֙ וְ/שׁ֣וּבוּ אֵלַ֔/י וּ֠/פֹה אַשְׁלִ֨יךְ לָ/כֶ֥ם גּוֹרָ֛ל לִ/פְנֵ֥י יְהוָ֖ה בְּ/שִׁלֹֽה־־׃
translation:
  text: So the men arose and went[a], and Joshua commanded those who were going to write down the land, saying, “Go and walk through the land, and write it down, and return to me; and here I will cast lots for you before Yahweh in Shiloh.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “record/describe the land”; the Hebrew is literally “write the land,” referring to making a written survey for allotment.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקֻמוּ
  chosen: arose
  alternatives:
  - got up
  - set out
  lexicon: HALOT
  rationale: Qal wayyiqtol of קום commonly marks the beginning of action sequence. 'Arose' preserves the narrative cadence without overinterpreting it as mere departure.
- source_word: הָאֲנָשִׁים
  chosen: the men
  alternatives:
  - the people
  lexicon: HALOT
  rationale: אַנָשִׁים is grammatically and lexically 'men,' not a gender-neutral collective here. This follows the gender-accurate principle.
- source_word: וַיֵּלֵכוּ
  chosen: went
  alternatives:
  - departed
  lexicon: HALOT
  rationale: Simple narrative motion verb; 'went' is the most natural modern equivalent.
- source_word: וַיְצַו
  chosen: commanded
  alternatives:
  - instructed
  - charged
  lexicon: HALOT
  rationale: צוה denotes giving a directive with authority. 'Commanded' best reflects Joshua's leadership role and the imperative force of the following speech.
- source_word: הַהֹלְכִים
  chosen: those who were going
  alternatives:
  - the ones going
  - the travelers
  lexicon: HALOT
  rationale: The participle identifies the men by their assigned action. 'Those who were going' preserves the participial sense in idiomatic English.
- source_word: לִכְתֹּב אֶת הָאָרֶץ
  chosen: to write down the land
  alternatives:
  - to describe the land
  - to record the land
  - to map the land
  lexicon: HALOT
  rationale: כתב literally means 'write.' In this context of surveying tribal allotments, the sense is recording a description of the land. 'Write down the land' keeps the literal core while remaining intelligible.
- source_word: לְכוּ
  chosen: Go
  alternatives:
  - Proceed
  lexicon: HALOT
  rationale: Direct imperative of הלך; 'Go' is straightforward and natural.
- source_word: וְהִתְהַלְּכוּ בָאָרֶץ
  chosen: walk through the land
  alternatives:
  - travel through the land
  - move about in the land
  lexicon: HALOT
  rationale: The hitpael of הלך conveys moving about or traversing. 'Walk through' captures the surveying action without sounding overly technical.
- source_word: וְכִתְבוּ אוֹתָהּ
  chosen: write it down
  alternatives:
  - record it
  - describe it in writing
  lexicon: HALOT
  rationale: The pronoun refers back to the land. 'Write it down' is a natural English equivalent that preserves the written-record sense.
- source_word: וְשׁוּבוּ אֵלַי
  chosen: return to me
  alternatives:
  - come back to me
  lexicon: HALOT
  rationale: שוב is standard for returning. 'Return to me' fits the formal tone of Joshua's instruction.
- source_word: וּפֹה
  chosen: here
  alternatives:
  - then here
  - at this place
  lexicon: HALOT
  rationale: Adverb of place pointing to Joshua's present location. 'Here' is sufficient and direct.
- source_word: אַשְׁלִיךְ לָכֶם גּוֹרָל
  chosen: I will cast the lot for you
  alternatives:
  - I will cast lots for you
  - I will throw the lot for you
  lexicon: HALOT
  rationale: The idiom with גורל refers to allotment by lot. Singular 'the lot' reflects the Hebrew singular while still idiomatically expressing the procedure.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: Standard covenantal phrase for action performed in God's presence. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּשִׁלֹה
  chosen: in Shiloh
  alternatives:
  - at Shiloh
  lexicon: HALOT
  rationale: Place name is transliterated, not translated. 'In Shiloh' is a natural locative rendering.
