    rationale: El hebreo usa la misma preposición dos veces, pero el español puede mantener ambos valores locativos con mejor fluidez usando 'junto a' y luego 'junto al' o 'en el manantial/ junto al manantial' según estructura; una leve reordenación mejora la lectura.
