translation:
  language: es
  text: Y se abstuvo de venir con una gran fuerza[a], y envió en secreto cartas a todos sus aliados que estaban en Judea, para que prendieran a Jonatán y a los que estaban con él; pero no pudieron[b], porque su plan fue descubierto por ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «desistió de venir» o «se contuvo de venir». La frase griega puede expresar retirada o desistimiento de la acción de venir.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no pudo», si el verbo singular se refiere al principal conspirador. La cláusula final significa que la conspiración fue descubierta por Jonatán y los que estaban con él.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπῆρεν τοῦ ἐλθεῖν
  english_pob_choice: refrained from coming
  chosen_spanish: se apartó de venir
  alternatives_spanish:
  - se abstuvo de venir
  - se retiró de venir
  - desistió de venir
  lexicon: LSJ
  rationale: La construcción expresa apartarse o desistir de la acción de venir. «Se apartó de venir» conserva la idea de retirada/abstención sin añadir motivos que el griego no explicita.
- source_word: μετὰ δυνάμεως πολλῆς
  english_pob_choice: with a large force
  chosen_spanish: con una gran fuerza
  alternatives_spanish:
  - con un gran ejército
  - con mucha fuerza
  lexicon: LSJ
  rationale: δύναμις aquí tiene valor militar. «Gran fuerza» preserva amplitud semántica y evita concretar innecesariamente «ejército», que sería más específico de lo que exige el griego.
- source_word: ἐπιστολὰς λάθρᾳ
  english_pob_choice: secretly sent letters
  chosen_spanish: envió en secreto cartas
  alternatives_spanish:
  - envió cartas secretamente
  - envió cartas a escondidas
  lexicon: LSJ
  rationale: λάθρᾳ modifica el envío como acto oculto. En español, colocar «en secreto» con el verbo suena natural y mantiene el matiz de clandestinidad.
- source_word: πᾶσι τοῖς συμμάχοις αὐτοῦ
  english_pob_choice: to all his allies
  chosen_spanish: a todos sus aliados
  alternatives_spanish:
  - a todos sus confederados
  - a todos sus partidarios
  lexicon: LSJ
  rationale: σύμμαχος se traduce mejor por «aliados» en sentido político o militar. Es la opción más directa y transparente para el lector español.
- source_word: τοῖς ἐν τῇ Ἰουδαίᾳ
  english_pob_choice: in Judea
  chosen_spanish: que estaban en Judea
  alternatives_spanish:
  - en Judea
  - los que estaban en Judea
  lexicon: LSJ
  rationale: El griego identifica la ubicación de esos aliados. Añadir «que estaban» hace natural la relación en español sin alterar el contenido.
- source_word: ὅπως συλλάβωσι
  english_pob_choice: so that they might seize
  chosen_spanish: para que prendieran
  alternatives_spanish:
  - para que aprehendieran
  - para que capturaran
  lexicon: LSJ
  rationale: συλλαμβάνω aquí significa prender o capturar. «Prendieran» refleja bien la acción violenta de apoderarse de una persona y es idiomático en español narrativo.
- source_word: τοὺς σὺν αὐτῷ
  english_pob_choice: those with him
  chosen_spanish: a los que estaban con él
  alternatives_spanish:
  - a sus compañeros
  - a los hombres con él
  lexicon: LSJ
  rationale: La frase es general; «los que estaban con él» conserva la amplitud del griego mejor que «compañeros», que puede sonar más interpretativo.
- source_word: οὐκ ἠδύνατο
  english_pob_choice: they were not able
  chosen_spanish: no pudieron
  alternatives_spanish:
  - no pudieron hacerlo
  - no fue posible
  lexicon: LSJ
  rationale: Sigo la lectura colectiva reflejada en la POB inglesa, donde el singular griego se entiende en conjunto por el contexto y los pronombres plurales adyacentes.
- source_word: ἔγνωσθη αὐτοῖς ἡ βουλὴ αὐτῶν
  english_pob_choice: their plan became known to them
  chosen_spanish: su plan les fue dado a conocer
  alternatives_spanish:
  - su plan llegó a ser conocido por ellos
  - su consejo les fue conocido
  lexicon: LSJ
  rationale: βουλή puede ser «plan» o «consejo». En este contexto de conspiración, «plan» es la lectura más natural; la pasiva se expresa con una construcción española clara y pasiva de resultado.
theological_decisions:
- issue: Valor del singular ἠδύνατο frente al plural contextual
  english_pob_reading: Although the singular form could be rendered 'he was not able,' the following plural αὐτοῖς and αὐτῶν makes the plural sense natural in English, referring to the conspirators collectively.
  chosen_spanish_reading: «no pudieron» refiere al grupo de conspiradores de manera colectiva.
  alternative_spanish_readings:
  - «no pudo» referido al principal conspirador
  - «no fue capaz» con sujeto singular implícito
  rationale: La puntuación y los pronombres plurales del contexto favorecen entender el verbo colectivamente. Mantener el plural evita introducir una lectura singular no requerida por el flujo narrativo.
  doctrine_reference: Narrative syntax and pronoun agreement; no doctrinal issue.
- issue: Sentido de ἔγνωσθη αὐτοῖς ἡ βουλὴ αὐτῶν
  english_pob_reading: their plan became known to them
  chosen_spanish_reading: su plan les fue dado a conocer
  alternative_spanish_readings:
  - su plan se hizo conocido para ellos
  - su complot fue descubierto
  rationale: 'El griego indica exposición de la conspiración. «Les fue dado a conocer» mantiene la pasiva y permite la ambigüedad responsable: no especifica si el conocimiento llegó por revelación interna o por descubrimiento externo, pero sí afirma que el plan quedó expuesto.'
  doctrine_reference: Historical narrative semantics; no doctrinal issue.
translation_notes:
  revision_awareness: Se ha seguido el sentido del texto griego de 1 Macabeos 9:60 y la decisión auditada en la POB inglesa, manteniendo la ambigüedad controlada del verbo final y la fuerza militar de δύναμις sin sobrerregularizarla como «ejército». No se incorporaron revisiones posteriores porque el expediente indica que no hubo cambios en el último pase.
  spanish_consistency_notes:
  - Se usa «Judea» para el topónimo, no una forma transliterada.
  - «Prendieran» conserva el tono narrativo de captura y evita un tecnicismo legal innecesario.
  - Se mantiene «plan» para βουλή por el contexto de conspiración.
  - Se evita «Cristo/Mesías» o terminología doctrinal porque el versículo no la contiene.
  - La construcción final en voz pasiva española respeta la exposición del complot sin forzar el agente.
