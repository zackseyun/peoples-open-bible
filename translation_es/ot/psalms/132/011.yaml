translation:
  language: es
  text: 'Yahvé juró a David un juramento seguro[a][b]; no se retractará de él: «Del fruto de tu vientre pondré uno sobre tu trono».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «verdad», «un juramento verdadero»; el hebreo usa «verdad» para subrayar la firmeza y certeza del juramento.
    reason: lexical_alternative
  - marker: b
    text: Es decir, uno de los propios descendientes de David. Compárese 2 Samuel 7:12 y Hechos 2:30 para el uso pactual y, más tarde, mesiánico de esta promesa.
    reason: cross_reference
lexical_decisions:
- source_word: נִשְׁבַּע
  english_pob_choice: swore
  chosen_spanish: juró
  alternatives_spanish:
  - ha jurado
  - hizo un juramento
  lexicon: HALOT
  rationale: El nifal de שבע expresa aquí prestar juramento. En español, «juró» conserva la fuerza solemne y poética del acto, sin alargar innecesariamente la frase.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino propio según el criterio del proyecto, no una sustitución por título. «Yahvé» es la forma editorial establecida en el texto español.
- source_word: אֱמֶת
  english_pob_choice: a sure oath
  chosen_spanish: con verdad
  alternatives_spanish:
  - como un juramento seguro
  - con fidelidad
  - en verdad
  lexicon: HALOT
  rationale: Aquí אֱמֶת califica el juramento con el matiz de firmeza/certidumbre. «Con verdad» conserva el núcleo léxico y deja visible la tensión entre ‘verdad’ y ‘seguridad’ que el inglés POB resuelve como ‘sure oath’.
- source_word: לֹא יָשׁוּב מִמֶּנָּה
  english_pob_choice: he will not turn back from it
  chosen_spanish: no se volverá de ello
  alternatives_spanish:
  - no se retractará
  - no volverá atrás de ello
  - no se apartará de ello
  lexicon: HALOT
  rationale: שוב con מן mantiene la imagen de volver atrás o retirarse. «No se volverá de ello» preserva el giro figurado y la referencia al juramento/compromiso sin explicitar más de lo que el hebreo exige.
- source_word: מִפְּרִי בִטְנְךָ
  english_pob_choice: From the fruit of your womb
  chosen_spanish: Del fruto de tu vientre
  alternatives_spanish:
  - De tu descendencia
  - Del fruto de tu cuerpo
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de descendencia física. «Vientre» mantiene el paralelismo tradicional del hebreo, mientras que «descendencia» sería más explicativo pero menos cercano al original.
- source_word: אָשִׁית
  english_pob_choice: I will set
  chosen_spanish: pondré
  alternatives_spanish:
  - estableceré
  - colocaré
  - sentaré
  lexicon: HALOT
  rationale: שית significa poner/colocar/establecer. «Pondré» es natural en español y funciona bien con el contexto de entronización; evita sobrecargar el verso con una formulación demasiado interpretativa.
- source_word: לְכִסֵּא
  english_pob_choice: on a throne / on your throne
  chosen_spanish: sobre tu trono
  alternatives_spanish:
  - en tu trono
  - en un trono
  - sobre un trono
  lexicon: HALOT
  rationale: El hebreo con לְכִסֵּא señala la ubicación o colocación en el trono. Dado el pronombre de destino «para ti», la versión española opta por «sobre tu trono», que refleja el sentido contextual dinástico y la revisión auditada del inglés POB.
- source_word: לָךְ
  english_pob_choice: for you
  chosen_spanish: tu
  alternatives_spanish:
  - para ti
  - a ti
  - de ti
  lexicon: HALOT
  rationale: El sufijo de segunda persona se integra naturalmente en español como posesivo («tu»), tal como la revisión inglesa cerró en «your throne». Esto evita una redundancia poco natural en castellano y mantiene la relación directa con David.
theological_decisions:
- issue: Alcance dinástico y mesianismo implícito
  english_pob_reading: Render the verse as a promise concerning David's physical descendant(s) without making the messianic fulfillment explicit in the main text.
  chosen_spanish_reading: Presentar el versículo como una promesa dinástica a David acerca de su descendencia, sin explicitar en el texto principal su cumplimiento mesiánico.
  alternative_spanish_readings:
  - Leerlo ya como una promesa directamente mesiánica en la redacción principal
  - Incluir una paráfrasis cristológica en la línea principal
  rationale: 'El hebreo declara el juramento en términos histórico-covenantales: un descendiente de David sobre su trono. La redacción española conserva ese nivel textual y no adelanta la interpretación canónica posterior, que queda para notas o lectura teológica.'
  doctrine_reference: Preservar la tensión teológica sin resolverla en la traducción principal; la interpretación mesiánica pertenece a la lectura canónica, no a una expansión del versículo.
translation_notes:
  revision_awareness: La base inglesa fue revisada para cerrar el final en «on your throne», con mayor precisión respecto de לְכִסֵּא לָךְ. La línea española sigue esa revisión auditada al usar «sobre tu trono», evitando una formulación más vaga como «para tu trono».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del nombre divino en todo el proyecto.
  - Se conserva la imaginería corporal de «fruto de tu vientre», coherente con otros pasajes davídicos de promesa dinástica.
  - «No se volverá de ello» conserva el valor figurado de שוב con מן sin explicitar innecesariamente el objeto del retorno.
  - El pronombre posesivo «tu» está integrado de forma idiomática en español para reflejar el sufijo hebreo de segunda persona.
