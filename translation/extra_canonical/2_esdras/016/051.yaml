id: 2ES.16.51
reference: 2 Esdras 16:51
unit: verse
book: 2 Esdras
appendix: true
compositional_layer: 6 Ezra
source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: zelatur fornicariam mulierem idonea et bona ualde, Sic zela bitur iusticia iniquitatem cum exornat se, et accusat eam in faciem, cum uenerit qui defendat exquirentem omnem peccatum super terram. Propterea nolite similari eam nec operibus eius.
  language: Latin
translation:
  text: As a respectable and very beautiful woman is indignant toward a prostitute[a], so righteousness will be indignant toward iniquity when it adorns itself, and will accuse it to its face when he comes who defends the one who searches out every sin upon the earth[b]. Therefore do not be like it or its works.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Latin here is difficult and compressed. The imagery appears to compare righteousness and iniquity under the figure of a respectable woman and a prostitute, with righteousness exposing iniquity openly when the divine investigator comes.
    reason: textual_variant
    anchor_ref: '16:51'
  - marker: b
    text: Or 'As a respectable and very beautiful woman hates a prostitute, so righteousness will hate iniquity when she adorns herself, and will accuse her to her face when he comes who defends the one who searches out every sin upon the earth.'.
    reason: previous_rendering
