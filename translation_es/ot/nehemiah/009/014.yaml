- from: Hiciste conocer a ellos tu santo sábado, y les mandaste mandamientos, estatutos y una ley[a] por medio de Moisés, tu siervo.
  to: Les diste a conocer tu santo sábado, y les mandaste mandamientos, estatutos y una ley[a] por medio de Moisés, tu siervo[b].
  rationale: Se ajusta la primera cláusula a un español más natural ('Les diste a conocer') sin perder el valor causativo de הוֹדַעַתָ. También se añade la nota faltante para בְּיַד, ya preservada en el audit trail inglés y pertinente para la fidelidad idiomática. El resto de la terminología y estructura se mantiene.
