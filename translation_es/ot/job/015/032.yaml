translation:
  language: es
  text: Se cumplirá antes de su día[a], y su rama[b] no permanecerá verde.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «antes de su tiempo». El hebreo permite entender la expresión temporal como referencia al día propio de alguien o a su tiempo señalado.
    reason: lexical_alternative
  - marker: b
    text: O «su rama de palmera» o «su brote superior». El término hebreo describe una parte vegetal en forma de rama o punta de planta.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּלֹא יוֹמוֹ
  english_pob_choice: before his day / before his time
  chosen_spanish: antes de su día
  alternatives_spanish:
  - antes de su tiempo
  - no en su día
  lexicon: HALOT
  rationale: La construcción con ב + לֹא + יוֹם con sufijo posesivo expresa una referencia temporal negativa, idiomáticamente 'antes de su día/tiempo'. 'Antes de su día' conserva el paralelismo y la ambigüedad del hebreo, sin forzar una paráfrasis demasiado explicativa.
- source_word: תִּמָּלֵא
  english_pob_choice: will be fulfilled
  chosen_spanish: será cumplido
  alternatives_spanish:
  - será cumplido/llenado
  - será completado
  - será colmado
  lexicon: HALOT
  rationale: El nifal de מלא literalmente comunica 'ser llenado/estar lleno'. En este contexto, la traducción debe preservar la idea de cumplimiento plenitud sin importar un sentido financiero o demasiado libre. 'Será cumplido' refleja bien la noción de realización plena.
- source_word: כִפָּתוֹ
  english_pob_choice: his branch
  chosen_spanish: su rama
  alternatives_spanish:
  - su rama de palmera
  - su brote superior
  - su copa
  lexicon: HALOT
  rationale: El término probablemente designa una parte vegetal semejante a una rama o brote. 'Su rama' mantiene el campo botánico abierto y evita especificar 'palmera' o 'copa' sin base suficiente.
- source_word: לֹא רַעֲנָנָה
  english_pob_choice: will not stay green
  chosen_spanish: no permanecerá verde
  alternatives_spanish:
  - no seguirá verde
  - no florecerá
  - no estará lozana
  lexicon: HALOT
  rationale: רענן comunica frescura, verdor o lozanía vegetal. 'No permanecerá verde' conserva la imagen concreta de vegetación y mantiene una correspondencia natural en español.
translation_notes:
  revision_awareness: La redacción sigue el último ajuste del inglés POB, que prefirió 'fulfilled' sobre una formulación financiera. En español se evitó 'pagado en pleno' para no importar un matiz ajeno al hebreo מלא, y se conservó la imagen vegetal de la segunda cola con una opción amplia y natural.
  spanish_consistency_notes:
  - Se mantuvo 'verde' para רענן, en coherencia con el valor botánico del término.
  - Se usó 'rama' en vez de un equivalente más interpretativo para respetar el paralelismo imagético.
  - La forma verbal 'será cumplido' sigue una sintaxis sobria y publicable; la nota a permite la alternativa temporal más explícita sin perder la tensión del original.
