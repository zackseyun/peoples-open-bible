translation:
  language: es
  text: Entonces el rey de Asiria hizo venir gente de Babilonia, de Cutá, de Avva[a], de Hamat y de Sefarvaim, y los estableció en las ciudades de Samaria, en lugar de los hijos de Israel[b]. Tomaron posesión de Samaria y habitaron en sus ciudades.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Avva también puede escribirse «Awwa» en la transliteración.
    reason: lexical_alternative
  - marker: b
    text: O «en lugar de los israelitas» o «en vez del pueblo de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֵא
  english_pob_choice: brought people
  chosen_spanish: hizo venir gente
  alternatives_spanish:
  - trajo gente
  - hizo que vinieran
  lexicon: HALOT
  rationale: 'El hebreo en hifil expresa causación: el rey mandó traer o hizo venir a los pobladores. En español, ''hizo venir gente'' conserva el valor causativo sin añadir más contenido del necesario.'
- source_word: מֶלֶךְ אַשּׁוּר
  english_pob_choice: the king of Assyria
  chosen_spanish: el rey de Asiria
  alternatives_spanish:
  - Asiria, su rey
  lexicon: HALOT
  rationale: Es un giro posesivo normal en español y refleja con naturalidad el constructo hebreo.
- source_word: מִבָּבֶל ... וּסְפַרְוַיִם
  english_pob_choice: from Babylon, Cuthah, Avva, Hamath, and Sepharvaim
  chosen_spanish: de Babilonia, de Cutá, de Avva, de Hamat y de Sefarvaim
  alternatives_spanish:
  - de Babilonia, de Cuta, de Awa, de Hamat y de Sefarvaim
  lexicon: HALOT
  rationale: Se conservan los nombres propios como topónimos. 'Cutá' refleja mejor la adaptación española corriente del nombre que 'Cuthah'; 'Avva' se mantiene conforme al valor transliterado del hebreo.
- source_word: וַיֹּשֶׁב
  english_pob_choice: settled them
  chosen_spanish: la asentó
  alternatives_spanish:
  - los asentó
  - los hizo habitar
  lexicon: HALOT
  rationale: El hifil de ישׁב es causativo. En español, 'asentar' funciona bien para instalar pobladores y mantiene la idea de establecerlos en un lugar.
- source_word: בְּעָרֵי שֹׁמְרוֹן
  english_pob_choice: in the cities of Samaria
  chosen_spanish: en las ciudades de Samaria
  alternatives_spanish:
  - en las ciudades de Samaría
  - en las ciudades samarias
  lexicon: HALOT
  rationale: Se conserva el plural de 'ciudades'. 'Samaria' se usa como nombre geográfico comprensible en español bíblico; 'Samaría' es una variante posible, pero 'Samaria' mantiene la forma estándar más reconocible en este contexto histórico.
- source_word: תַּחַת בְּנֵי יִשְׂרָאֵל
  english_pob_choice: in place of the sons of Israel
  chosen_spanish: en lugar de los hijos de Israel
  alternatives_spanish:
  - en lugar de los israelitas
  - en vez del pueblo de Israel
  lexicon: HALOT
  rationale: '''תחת'' significa ''en lugar de / en vez de''. ''Hijos de Israel'' conserva la fuerza literal del hebreo; ''israelitas'' sería una equivalencia idiomática válida, pero menos cercana al formulismo original.'
- source_word: וַיִּרְשׁוּ אֶת שֹׁמְרוֹן
  english_pob_choice: They took possession of Samaria
  chosen_spanish: Tomaron posesión de Samaria
  alternatives_spanish:
  - poseyeron Samaria
  - heredaron Samaria
  lexicon: HALOT
  rationale: En contexto de conquista y reasentamiento, ירשׁ expresa la toma de posesión territorial. 'Tomaron posesión de' es el equivalente natural y preciso en español.
- source_word: וַיֵּשְׁבוּ בְּעָרֶיהָ
  english_pob_choice: and lived in its cities
  chosen_spanish: y habitaron en sus ciudades
  alternatives_spanish:
  - y vivieron en sus ciudades
  - y se establecieron en sus ciudades
  lexicon: HALOT
  rationale: El verbo ישׁב aquí es intransitivo ('vivir/habitar'). 'Habitaron' conserva un registro bíblico claro sin volverse arcaizante en exceso.
theological_decisions:
- issue: Expresión étnica masculina בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: Se mantiene la forma literal del hebreo para no borrar la formulación representativa masculina del texto. Al mismo tiempo, el sentido en español sigue siendo étnico/colectivo, no restrictivamente masculino.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: La revisión automática indicó alta concordancia y no registró cambios necesarios; la presente redacción sigue la lectura final acordada del POB inglés y ajusta los nombres propios y la sintaxis al español bíblico natural sin introducir paráfrasis.
  spanish_consistency_notes:
  - Se conservó 'Asiria' y no 'Siria', porque el referente histórico es ברור/Asiria en el contexto del capítulo.
  - '''Samaria'' se mantiene como forma geográfica estándar en español bíblico; no se fuerza una distinción entre ciudad y región más allá de la requerida por el plural ''ciudades''.'
  - Se eligió 'habitaron' para mantener registro bíblico claro y paralelo a 'Tomaron posesión'.
