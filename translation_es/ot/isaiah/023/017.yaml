revisions:
- from: Y sucederá que al cabo de setenta años Yahvé atenderá a Tiro[a][b], y ella volverá a su salario y se prostituirá con todos los reinos de la tierra sobre la faz de la tierra[c].
  to: Y sucederá que al cabo de setenta años Yahvé se ocupará de Tiro[a][b], y ella volverá a su salario y se prostituirá con todos los reinos de la tierra sobre la faz de la tierra[c].
  rationale: Se ajusta יִפְקֹד de «atenderá a Tiro» a «se ocupará de Tiro» para lograr un español más idiomático y mantener la neutralidad semántica de la intervención divina. También se corrige la nota [c] para que explique de verdad la distinción hebrea entre אָרֶץ y אֲדָמָה, ya que la versión inglesa revisada y el español natural prefieren «tierra» en ambos casos.
  reviewer_model: gpt-5.4
