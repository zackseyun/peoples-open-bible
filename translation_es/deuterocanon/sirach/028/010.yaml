review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura comparativa del griego y conserva adecuadamente las decisiones auditadas clave: ὕλην como «combustible», ἰσχὺν como «fuerza», πλοῦτον como «riqueza», y στερέωσιν τῆς μάχης como «intensidad del conflicto». También mantiene la diferenciación entre θυμός e ὀργή mediante «ira» y «enojo». Sin embargo, «será encendido» resulta menos natural en español para ἐκκαυθήσεται en este contexto proverbial, especialmente en la primera y última cláusulas, donde el referente implícito es la ira/conflicto en imagen de fuego; «arderá» preserva mejor la metáfora y mejora la legibilidad sin traicionar el sentido. Además, el pronombre explícito «él» es innecesario y poco idiomático.'
  spanish_quality_summary: 'El texto es generalmente claro y digno, pero suena algo calcado del inglés/griego en «será encendido» y en «él levantará su enojo». La sintaxis mejora notablemente con una formulación más natural y fluida en español: «arderá» y la omisión de «él». El resto del registro es adecuado para un español bíblico moderno y ampliamente legible.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La distinción léxica entre «ira» y «enojo» es defendible y coherente con la rationale documentada. «Combustible» con nota alternativa «leña» también está bien alineado. La revisión propuesta no altera decisiones teológicas ni terminológicas del proyecto, solo mejora la naturalidad española y la correspondencia idiomática del verbo de combustión.
  issues:
