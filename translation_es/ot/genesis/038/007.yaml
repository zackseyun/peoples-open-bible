translation:
  language: es
  text: Er[a], el primogénito de Judá, era malvado a los ojos de Yahvé, y Yahvé lo hizo morir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más formal: «y Yahvé causó su muerte».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Now ... was
  chosen_spanish: Ahora ... era
  alternatives_spanish:
  - Y ... era
  - Entonces ... era
  lexicon: HALOT
  rationale: El waw consecutivo sobre היה introduce la acción en la narración. En español, «Ahora» funciona de modo natural para abrir el nuevo evento/personaje sin perder el valor copulativo simple de «era».
- source_word: עֵר
  english_pob_choice: Er
  chosen_spanish: Er
  lexicon: Nombre propio (transliteración)
  rationale: El nombre אישי se translitera sin traducir.
- source_word: בְּכוֹר יְהוּדָה
  english_pob_choice: Judah’s firstborn
  chosen_spanish: el primogénito de Judá
  alternatives_spanish:
  - el primer hijo de Judá
  - el primero nacido de Judá
  lexicon: HALOT
  rationale: La cadena constructa expresa filiación y orden de nacimiento. «Primogénito» preserva el valor técnico y es idiomático en español bíblico contemporáneo.
- source_word: רַע
  english_pob_choice: evil
  chosen_spanish: malo
  alternatives_spanish:
  - malvado
  - maligno
  - mal
  lexicon: HALOT
  rationale: Aquí רַע describe evaluación moral ante Yahvé. «Malo» mantiene la valoración negativa sin cargar más de lo que el hebreo exige; «malvado» sería más interpretativo y «mal» suena menos personal.
- source_word: בְּעֵינֵי יְהוָה
  english_pob_choice: in the sight of Yahweh
  chosen_spanish: a los ojos de Yahvé
  alternatives_spanish:
  - a la vista de Yahvé
  - delante de Yahvé
  lexicon: HALOT
  rationale: Se conserva el modismo hebreo de evaluación desde la perspectiva divina. «A los ojos de Yahvé» es claro, natural en español y mantiene la imagen original.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: Transliteración del Tetragrámaton
  rationale: Se sigue la pauta del proyecto de rendir יְהוָה como «Yahvé», preservando el nombre propio del pacto en lugar de sustituirlo por un título.
- source_word: וַיְמִתֵהוּ
  english_pob_choice: put him to death
  chosen_spanish: lo hizo morir
  alternatives_spanish:
  - lo mató
  - lo causó a morir
  lexicon: HALOT
  rationale: El hiphil de מות es causativo. «Lo hizo morir» conserva la agencia directa divina y evita tanto la dureza más coloquial de «lo mató» como la literalidad poco natural de «lo causó a morir».
theological_decisions:
- issue: Rendición del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. La traducción mantiene el nombre personal de Dios como «Yahvé», conforme a la norma del proyecto y sin sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Agencia divina en la muerte de Er
  english_pob_reading: and Yahweh put him to death
  chosen_spanish_reading: y Yahvé lo hizo morir
  alternative_spanish_readings:
  - y Yahvé lo mató
  - y Yahvé causó su muerte
  rationale: El hebreo atribuye de forma directa la muerte a Yahvé mediante un verbo causativo. «Lo hizo morir» conserva esa agencia soberana sin suavizarla ni introducir explicaciones ajenas al texto.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
translation_notes:
  revision_awareness: El texto coincide con el sentido y la estructura del audit trail en inglés; no se detectaron revisiones aplicadas en la última pasada, y la presente redacción conserva la misma valoración moral y la misma agencia divina directas.
  spanish_consistency_notes:
  - Se mantiene el nombre divino como «Yahvé» de forma consistente con la política del proyecto.
  - Se preserva el modismo hebreo evaluativo «a los ojos de Yahvé» para no diluir la perspectiva divina.
  - El verbo causativo de מות se expresa con una formulación natural en español que sigue siendo explícita respecto de la acción de Dios.
