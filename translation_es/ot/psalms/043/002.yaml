translation:
  language: es
  text: Porque tú eres el Dios de mi refugio[a]; ¿por qué me has rechazado? ¿Por qué ando en luto[b] bajo la opresión del enemigo?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el Dios de mi fortaleza» o «el Dios de mi baluarte». El sustantivo hebreo puede denotar refugio, fortaleza o fuerza según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «en oscuridad»; el hebreo literalmente habla de ir “oscurecido”, un modismo de duelo.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la base del lamento y su relación causal con la apelación anterior. «Porque» conserva el valor explicativo/causal de כִּי y suena natural en español bíblico actual.
- source_word: אֱלֹהֵי מָעוּזִּי
  english_pob_choice: the God of my refuge
  chosen_spanish: el Dios de mi refugio
  alternatives_spanish:
  - el Dios de mi fortaleza
  - el Dios de mi baluarte
  - el Dios de mi fuerza
  lexicon: HALOT
  rationale: מָעוֹז puede expresar refugio, fortaleza o fuerza según el contexto. Aquí el paralelismo del lamento favorece la imagen de protección; «mi refugio» preserva la relación constructa y el matiz de amparo sin volver la frase menos natural en español.
- source_word: לָמָה
  english_pob_choice: why
  chosen_spanish: por qué
  alternatives_spanish:
  - por qué razón
  - cómo
  lexicon: HALOT
  rationale: Interrogativo directo y repetido para el énfasis retórico del lamento. «Por qué» reproduce con claridad la pregunta acusatoria sin añadir explicaciones.
- source_word: זְנַחְתָּנִי
  english_pob_choice: have you rejected me
  chosen_spanish: me has rechazado
  alternatives_spanish:
  - me has desechado
  - me has echado de ti
  - me has abandonado
  lexicon: HALOT
  rationale: זנח expresa rechazo o desecho. «Rechazado» es la opción más clara y sobria en español; mantiene la tensión del lamento sin suavizarla ni convertirla en una paráfrasis más fuerte de lo que el hebreo exige.
- source_word: קֹדֵר
  english_pob_choice: mourning
  chosen_spanish: en luto
  alternatives_spanish:
  - en tristeza
  - en oscuridad
  - con el rostro sombrío
  lexicon: HALOT
  rationale: El participio alude a estar oscurecido como señal de duelo. «En luto» comunica ese estado de duelo de manera idiomática en español, preservando el sentido figurado sin depender de un calco como «oscurecido».
- source_word: אֶתְהַלֵּךְ
  english_pob_choice: do I go about
  chosen_spanish: ando
  alternatives_spanish:
  - camino
  - voy de un lado a otro
  - me conduzco
  lexicon: HALOT
  rationale: El hitpael imperfecto expresa una conducta continua o un estado de vida. «Ando» funciona bien en español para esa continuidad y evita introducir matices de obligación que el hebreo no requiere.
- source_word: בְּלַחַץ
  english_pob_choice: under the oppression
  chosen_spanish: bajo la opresión
  alternatives_spanish:
  - bajo presión
  - por la opresión
  - en la opresión
  lexicon: HALOT
  rationale: לַחַץ denota opresión o presión. «Bajo la opresión» conserva el valor circunstancial del prefijo בְּ y mantiene la fuerza del sufrimiento padecido.
- source_word: אוֹיֵב
  english_pob_choice: the enemy
  chosen_spanish: del enemigo
  alternatives_spanish:
  - de un enemigo
  - del adversario
  - del rival
  lexicon: HALOT
  rationale: El singular puede tener valor colectivo o representar al adversario principal. «Del enemigo» reproduce el carácter definido del hebreo y suena natural en el cierre del lamento.
theological_decisions:
- issue: Lenguaje de rechazo divino en un salmo de lamento
  english_pob_reading: Retain the psalmist's direct complaint 'why have you rejected me?' without softening.
  chosen_spanish_reading: 'Mantener la queja directa: «¿por qué me has rechazado?»'
  alternative_spanish_readings:
  - ¿por qué me has abandonado?
  - ¿por qué me has desechado?
  rationale: 'El hebreo presenta una tensión teológica real: el orante percibe rechazo divino y lo verbaliza sin resolverlo. La traducción debe conservar esa franqueza, no suavizarla con explicaciones devocionales ni sustituirla por un término menos incisivo.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Esta redacción sigue de cerca el paquete fuente hebreo y el rastro auditado en inglés, sin cambios necesarios respecto de la decisión vigente de la POB. Se conserva la tensión del lamento y la ambigüedad léxica de מָעוֹז mediante nota alternativa.
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהִים y «enemigo» para אוֹיֵב, conforme al registro bíblico natural del proyecto.
  - Se mantiene «Yahvé» como norma del proyecto, pero en este versículo el texto fuente hebreo contiene אֱלֹהִים, no el nombre divino.
  - «Refugio» se eligió por claridad y por su compatibilidad con el paralelismo de amparo/abandono del salmo.
  - «En luto» preserva el valor idiomático de קֹדֵר sin volverlo una descripción psicológica moderna excesiva.
