translation:
  language: es
  text: 'A espada morirán todos los pecadores de mi pueblo, los que dicen[a]: «La calamidad no nos alcanzará ni nos saldrá al encuentro».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La desgracia no se nos acercará ni nos confrontará». Los dos verbos hebreos describen el avance del juicio, y en español es difícil reproducir con concisión la diferencia exacta entre «acercarse/alcanzar» y «salir al encuentro/confrontar».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּחֶרֶב
  english_pob_choice: By the sword
  chosen_spanish: A espada
  alternatives_spanish:
  - Por la espada
  - Con la espada
  lexicon: HALOT
  rationale: El beth instrumental expresa medio o instrumento de muerte. «A espada» es natural en español bíblico y conserva la imagen de juicio sin volverla mecánica.
- source_word: יָמוּתוּ
  english_pob_choice: will die
  chosen_spanish: morirán
  alternatives_spanish:
  - han de morir
  - van a morir
  lexicon: HALOT
  rationale: El futuro verbal transmite la profecía de juicio de forma directa y digna.
- source_word: כֹּל חַטָּאֵי עַמִּי
  english_pob_choice: all the sinners of my people
  chosen_spanish: todos los pecadores de mi pueblo
  alternatives_spanish:
  - todos los pecadores de mi gente
  - los pecadores de mi pueblo, todos ellos
  lexicon: HALOT
  rationale: «Pecadores» conserva la fuerza lexical de חַטָּאֵי; «de mi pueblo» reproduce el constructo y la pertenencia al grupo del profeta.
- source_word: הָאֹמְרִים
  english_pob_choice: those who say
  chosen_spanish: los que dicen
  alternatives_spanish:
  - aquellos que dicen
  - quienes dicen
  lexicon: HALOT
  rationale: El participio sustantivado introduce una subcategoría identificable; «los que dicen» es claro y natural en español.
- source_word: תַגִּישׁ
  english_pob_choice: will overtake
  chosen_spanish: se nos acercará
  alternatives_spanish:
  - nos alcanzará
  - se nos aproximará
  lexicon: HALOT
  rationale: La raíz sugiere acercamiento/arribo de la desgracia. «Se nos acercará» preserva el movimiento sin decidir prematuramente entre alcance físico o figurado.
- source_word: וְתַקְדִּים
  english_pob_choice: or confront
  chosen_spanish: ni nos confrontará
  alternatives_spanish:
  - ni nos saldrá al encuentro
  - ni nos hará frente
  lexicon: HALOT
  rationale: El paralelo con el verbo anterior y con קדם permite una respuesta en términos de encuentro/afronto. «Confrontará» mantiene la tensión del encuentro hostil sin exagerar.
- source_word: בַּעֲדֵינוּ
  english_pob_choice: against us
  chosen_spanish: nos
  alternatives_spanish:
  - contra nosotros
  - delante de nosotros
  lexicon: HALOT
  rationale: La preposición es difícil; en este contexto el sentido de hostilidad o impacto recae sobre el sujeto de la desgracia. El español puede naturalizarse con el clítico de objeto y el verbo 'confrontará'.
- source_word: הָרָעָה
  english_pob_choice: the disaster
  chosen_spanish: la desgracia
  alternatives_spanish:
  - la calamidad
  - el mal
  lexicon: HALOT
  rationale: En contexto de juicio profético, רָעָה designa calamidad inminente, no mal moral. «Desgracia» es un equivalente idiomático que evita atribuir maldad ética a Dios.
theological_decisions:
- issue: Sustantivo רָעָה en contexto de juicio divino
  english_pob_reading: the disaster
  chosen_spanish_reading: la desgracia
  alternative_spanish_readings:
  - la calamidad
  - el mal
  rationale: La referencia es al juicio anunciado, no a un atributo moral de Dios. «Desgracia» comunica la inminencia del castigo y preserva la distinción entre desastre y maldad ética.
  doctrine_reference: Principio de fidelidad semántica y cuidado doctrinal en textos proféticos de juicio.
translation_notes:
  revision_awareness: La redacción sigue el texto hebreo directamente y toma como guía el audit trail inglés, incluyendo la revisión final que prefirió una forma de encuentro/confrontación más cercana al segundo verbo. Se evitó una traducción mecánica del inglés en favor de un español bíblico natural con el mismo contraste semántico.
  spanish_consistency_notes:
  - Se mantiene «Dios/juicio» implícitos sin añadir sujeto no expresado.
  - «A espada» conserva el instrumento de muerte con registro bíblico natural.
  - Se eligió «desgracia» para רָעָה por coherencia con el contexto de juicio y para evitar «mal» en sentido moral.
  - El par verbal se refleja con «acercará / confrontará», manteniendo la tensión de los dos verbos hebreos.
