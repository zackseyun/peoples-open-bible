translation:
  language: es
  text: La primogénita dio a luz un hijo y le puso por nombre Moab[a]; él es el padre de Moab hasta hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el padre de los moabitas hasta hoy». El hebreo dice literalmente «el padre de Moab», usando el nombre del antepasado para los descendientes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּלֶד
  english_pob_choice: bore
  chosen_spanish: dio a luz
  alternatives_spanish:
  - parió
  - engendró
  lexicon: HALOT
  rationale: El verbo ילד en este contexto narrativo de nacimiento se expresa naturalmente en español como 'dio a luz'. Mantiene el sentido directo de alumbramiento sin volverlo demasiado técnico o arcaizante.
- source_word: הַבְּכִירָה
  english_pob_choice: The firstborn
  chosen_spanish: la primogénita
  alternatives_spanish:
  - la primera hija
  - la mayor
  lexicon: HALOT
  rationale: El sustantivo/adjetivo femenino señala a la hija mayor. 'Primogénita' conserva el valor de prioridad de nacimiento y funciona bien en español bíblico sin perder inteligibilidad.
- source_word: בֵּן
  english_pob_choice: a son
  chosen_spanish: un hijo
  alternatives_spanish:
  - un varón
  - un niño
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'un hijo'. En español, 'hijo' reproduce el parentesco de forma directa y natural; 'varón' sería más interpretativo.
- source_word: וַתִּקְרָא שְׁמוֹ
  english_pob_choice: called his name
  chosen_spanish: le puso por nombre
  alternatives_spanish:
  - lo llamó
  - nombró
  lexicon: HALOT
  rationale: La fórmula hebrea es literalmente 'llamó su nombre', pero en español bíblico contemporáneo 'le puso por nombre' comunica el acto de nombrar con naturalidad y sin perder la función narrativa de la fórmula.
- source_word: מוֹאָב
  english_pob_choice: Moab
  chosen_spanish: Moab
  lexicon: HALOT
  rationale: Nombre propio transliterado de manera estándar en español.
- source_word: ה֥וּא
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - ese hijo
  - él mismo
  lexicon: HALOT
  rationale: El pronombre retoma al hijo recién nombrado; 'él' es la forma más natural y fiel en español.
- source_word: אֲבִי מוֹאָב
  english_pob_choice: the father of Moab
  chosen_spanish: el padre de Moab
  alternatives_spanish:
  - el antepasado de Moab
  - el padre de los moabitas
  lexicon: HALOT
  rationale: Se mantiene la literalidad de 'padre de Moab' como en la POB inglesa, preservando el uso hebreo del nombre del antepasado para el pueblo descendiente. La alternativa étnica queda indicada en nota.
- source_word: עַד הַיּוֹם
  english_pob_choice: to this day
  chosen_spanish: hasta este día
  alternatives_spanish:
  - hasta el día de hoy
  - hasta hoy
  lexicon: HALOT
  rationale: La locución temporal hebrea se expresa de manera idiomática en español como 'hasta este día', equivalente directo de la fórmula narrativa.
theological_decisions:
- issue: Uso del nombre ancestral como designación del pueblo descendiente
  english_pob_reading: the father of Moab; note that the Hebrew literally says 'the father of Moab,' using the ancestor's name for the people descended from him
  chosen_spanish_reading: el padre de Moab, entendiendo el nombre como designación del pueblo descendiente
  alternative_spanish_readings:
  - el padre de los moabitas
  - el antepasado de Moab
  rationale: No hay una afirmación doctrinal controvertida, pero sí una ambigüedad genealógico-ethnónica. La traducción principal conserva la literalidad y la nota aclara que el hebreo puede referirse al antepasado del pueblo moabita, tal como lo indica la auditoría inglesa.
  doctrine_reference: Uso bíblico de nombres ancestrales para designar pueblos; cf. lectura genealógica del texto
translation_notes:
  revision_awareness: El control cruzado en inglés señala alta concordancia y no introduce cambios respecto de la versión auditada. Esta propuesta sigue de cerca la lectura hebrea y conserva la nota sobre la posible referencia colectiva de 'Moab'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, pero este versículo no la requiere.
  - '''Primogénita'' se usa aquí para reflejar הַבְּכִירָה en un registro bíblico natural; no se eligió ''la mayor'' para conservar la noción de primacía de nacimiento.'
  - La nota al pie está anclada en 'Moab' porque allí surge la posible alternativa semántica de referencia al pueblo descendiente.
