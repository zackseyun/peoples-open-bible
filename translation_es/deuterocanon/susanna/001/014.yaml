translation:
  language: es
  text: 'Uno le dijo al otro[a]: «Vamos ahora a casa[b], porque ya es hora de la comida del mediodía».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente «uno al otro» y expresa la reciprocidad entre los dos; en español se explicita con un verbo de habla para que la narración suene natural.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «vamos ahora a la casa», pero aquí el sentido contextual es el de regresar al hogar.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕτερος τῷ ἑτέρῳ
  english_pob_choice: one said to the other
  chosen_spanish: uno le decía al otro
  alternatives_spanish:
  - uno al otro
  - uno dijo al otro
  lexicon: LSJ
  rationale: La expresión griega marca una interacción recíproca entre los dos varones. En español, «le decía al otro» comunica naturalmente el intercambio discursivo sin añadir más de lo que el contexto exige.
- source_word: Πορευθῶμεν δὴ
  english_pob_choice: Let us go now
  chosen_spanish: Vamos ahora
  alternatives_spanish:
  - Vayamos ahora
  - Vamos ya
  lexicon: BDAG
  rationale: El subjuntivo exhortativo con δή pide una propuesta inmediata. «Vamos ahora» mantiene el impulso exhortativo y la urgencia de forma natural en español.
- source_word: εἰς οἶκον
  english_pob_choice: home
  chosen_spanish: a casa
  alternatives_spanish:
  - a la casa
  - a nuestro hogar
  lexicon: LSJ
  rationale: En este contexto, la frase idiomática se entiende como retorno al hogar; «a casa» es la equivalencia española más natural y no sobrecarga el texto con literalidad innecesaria.
- source_word: ἀρίστου
  english_pob_choice: the midday meal
  chosen_spanish: la comida del mediodía
  alternatives_spanish:
  - el almuerzo
  - la comida de mediodía
  - el mediodía
  lexicon: LSJ
  rationale: ἄριστον designa la comida temprana del día, frecuentemente al mediodía. «La comida del mediodía» conserva el registro formal de la revisión inglesa y evita el posible sesgo regional de «almuerzo».
- source_word: ὥρα ἐστίν
  english_pob_choice: it is time
  chosen_spanish: ya es hora
  alternatives_spanish:
  - es hora
  - ya es tiempo
  lexicon: BDAG
  rationale: La fórmula griega es idiomática para indicar el momento oportuno. «Ya es hora» suena natural en español y conserva la idea de inmediatez.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés, que sustituyó «lunch» por «the midday meal» para conservar el registro formal y la referencia temporal precisa de ἀρίστου. La versión española evita una modernización demasiado regional y mantiene esa misma precisión con «la comida del mediodía».
  spanish_consistency_notes:
  - Se usa «casa» en sentido idiomático de regreso al hogar, no como edificio específico.
  - Se evita «SEÑOR» o terminología no pertinente; el texto no contiene vocabulario teológico que requiera adaptación especial.
  - La puntuación y las comillas siguen la convención española.
  - «Ya es hora» conserva la inmediatez de δή sin añadir matices interpretativos.
