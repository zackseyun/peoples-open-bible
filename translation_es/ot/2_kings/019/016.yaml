translation:
  language: es
  text: Inclina tu oído, oh Yahvé, y oye; abre tus ojos, oh Yahvé, y mira; y oye las palabras de Senaquerib, que él ha enviado para reprochar[a] al Dios vivo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "para desafiar al Dios vivo"; el verbo hebreo puede expresar burla, vituperio o desafío.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַטֵּה
  english_pob_choice: Incline
  chosen_spanish: Inclina
  alternatives_spanish:
  - Vuelve
  - Dobla
  lexicon: HALOT
  rationale: El imperativo idiomático con 'oído' pide una acción de atención. 'Inclina' conserva el tono orante y la imagen bíblica sin sonar forzado en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como forma transliterada del Tetragrama, según la convención del proyecto, evitando la sustitución por un título.
- source_word: אָזְנְךָ
  english_pob_choice: your ear
  chosen_spanish: tu oído
  alternatives_spanish:
  - tu oreja
  lexicon: HALOT
  rationale: Aunque el hebreo dice singular, en español 'oído' suena más natural y conserva la singularidad idiomática de la petición.
- source_word: וּשֲׁמָע
  english_pob_choice: and hear
  chosen_spanish: y oye
  alternatives_spanish:
  - y escucha
  lexicon: HALOT
  rationale: '''Oye'' reproduce el imperativo de שמע y mantiene el paralelismo con la segunda petición y la repetición posterior.'
- source_word: פְּקַח
  english_pob_choice: open
  chosen_spanish: abre
  alternatives_spanish:
  - descubre
  - despierta
  lexicon: HALOT
  rationale: Con 'ojos', el equivalente más natural y directo en español es 'abre'; comunica el sentido idiomático de la petición sin perder solemnidad.
- source_word: עֵינֶיךָ
  english_pob_choice: your eyes
  chosen_spanish: tus ojos
  alternatives_spanish:
  - tus ojos
  lexicon: HALOT
  rationale: El plural hebreo se conserva de manera transparente con 'ojos'.
- source_word: וּרְאֵה
  english_pob_choice: and see
  chosen_spanish: y mira
  alternatives_spanish:
  - y ve
  lexicon: HALOT
  rationale: '''Mira'' funciona de modo natural en español como imperativo solemne y mantiene el paralelismo de la oración.'
- source_word: דִּבְרֵי
  english_pob_choice: the words
  chosen_spanish: las palabras
  alternatives_spanish:
  - las palabras
  - el mensaje
  lexicon: HALOT
  rationale: El constructo plural de דבר se vierte de forma directa como 'palabras', apropiado para el discurso ofensivo citado en el contexto.
- source_word: סַנְחֵרִיב
  english_pob_choice: Sennacherib
  chosen_spanish: Senaquerib
  alternatives_spanish:
  - Sennáquerib
  lexicon: N/A
  rationale: Se adopta la forma española bíblica habitual del nombre propio, manteniendo identificable al rey asirio.
- source_word: אֲשֶׁר שְׁלָחוֹ
  english_pob_choice: which he has sent
  chosen_spanish: que él ha enviado
  alternatives_spanish:
  - que envió
  - que mandó
  lexicon: HALOT
  rationale: Se conserva la relación relativa con 'palabras' y el valor de acción completada con relevancia presente en la súplica.
- source_word: לְחָרֵף
  english_pob_choice: to reproach
  chosen_spanish: para reprochar
  alternatives_spanish:
  - para desafiar
  - para ultrajar
  - para vituperar
  lexicon: HALOT
  rationale: '''Reprochar'' preserva el valor de insulto/afrenta sin cerrar el rango semántico hebreo, que puede incluir burla, desprecio o desafío.'
- source_word: אֱלֹהִים חָי
  english_pob_choice: the living God
  chosen_spanish: al Dios vivo
  alternatives_spanish:
  - al Dios viviente
  lexicon: HALOT
  rationale: La expresión fija bíblica se vierte naturalmente como 'Dios vivo'; el artículo contráctil 'al' fluye mejor en español y conserva el contraste con los ídolos sin vida.
theological_decisions:
- issue: Nombre divino del Tetragrama
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se preserva el nombre personal de Dios en vez de sustituirlo por un título. Esto sigue la práctica auditada del POB y evita borrar la referencia explícita al Tetragrama.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Nuance of לְחָרֵף against God
  english_pob_reading: to reproach the living God
  chosen_spanish_reading: para reprochar al Dios vivo
  alternative_spanish_readings:
  - para desafiar al Dios vivo
  - para ultrajar al Dios vivo
  - para vituperar al Dios vivo
  rationale: '''Reprochar'' mantiene la afrenta verbal y no reduce el sentido a una sola idea como ''desafiar''. Se conserva la tensión entre burla, ofensa y confrontación que el hebreo permite.'
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el pasaje quedó confirmado como de alta concordancia, con solo observaciones menores. Se mantuvo la decisión de traducir el nombre divino como Yahvé y de conservar la ambigüedad de לְחָרֵף mediante un verbo español de afrenta verbal.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - 'Se conserva el paralelismo imperativo: ''inclina... oye; abre... mira; y oye...''.'
  - '''Senaquerib'' sigue la forma española bíblica común para el nombre propio.'
  - '''Dios vivo'' mantiene la expresión bíblica fija y la oposición implícita con los ídolos sin vida.'
