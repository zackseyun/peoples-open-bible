  glossary_alignment: No hay conflicto con los términos base del proyecto. «Dios Todopoderoso» alinea correctamente con la decisión auditada para אֵל שַׁדַּי. «Querubines» también es correcto. La única desalineación menor es preferir «atrio» para חָצֵר en contexto cultual.
