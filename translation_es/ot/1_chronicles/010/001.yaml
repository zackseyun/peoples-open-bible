translation:
  language: es
  text: Y los filisteos pelearon contra Israel[a], y los hombres de Israel huyeron de delante de los filisteos y cayeron muertos en el monte Gilboa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: “cada hombre de Israel huyó”; el singular “hombre” funciona aquí de manera colectiva.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפְלִשְׁתִּים
  english_pob_choice: Now the Philistines
  chosen_spanish: Ahora los filisteos
  alternatives_spanish:
  - Y los filisteos
  - Los filisteos
  lexicon: HALOT
  rationale: El ו inicial funciona como enlace narrativo; “Ahora” comunica con naturalidad el inicio de una nueva unidad sin perder el valor conjuntivo. “Filisteos” mantiene el nombre étnico transliterado de forma estándar en español bíblico.
- source_word: נִלְחֲמוּ בְיִשְׂרָאֵל
  english_pob_choice: fought against Israel
  chosen_spanish: pelearon contra Israel
  alternatives_spanish:
  - hicieron guerra contra Israel
  - pelearon con Israel
  lexicon: HALOT
  rationale: La forma nifal con ב en este contexto expresa hostilidad militar. “Pelearon contra” refleja bien el sentido adversativo y suena natural en español; “hacer guerra” sería más explícito pero menos directo.
- source_word: וַיָּנָס אִישׁ יִשְׂרָאֵל
  english_pob_choice: the men of Israel fled
  chosen_spanish: los hombres de Israel huyeron
  alternatives_spanish:
  - cada hombre de Israel huyó
  - el hombre de Israel huyó
  lexicon: HALOT
  rationale: Aunque אִישׁ es singular en forma, aquí funciona colectivamente. “Los hombres de Israel” conserva el matiz masculino y el valor colectivo; “huyeron” corresponde al verbo de escape en contexto de batalla.
- source_word: מִפְּנֵי פְלִשְׁתִּים
  english_pob_choice: from before the Philistines
  chosen_spanish: de delante de los filisteos
  alternatives_spanish:
  - de la presencia de los filisteos
  - ante los filisteos
  lexicon: HALOT
  rationale: La locución hebrea literalmente indica movimiento “desde delante/de la presencia de”. “De delante de” preserva el giro semítico con buena inteligibilidad en español.
- source_word: וַיִּפְּלוּ חֲלָלִים
  english_pob_choice: fell slain
  chosen_spanish: cayeron muertos
  alternatives_spanish:
  - cayeron heridos de muerte
  - cayeron como muertos
  lexicon: HALOT
  rationale: חֲלָלִים en contexto bélico alude a muertos o caídos por la espada. “Cayeron muertos” comunica el resultado sin agregar un giro más interpretativo como “estrictamente asesinados”; POB inglés opta por una equivalencia concisa similar.
- source_word: בְּהַר גִּלְבֹּעַ
  english_pob_choice: on Mount Gilboa
  chosen_spanish: en el monte Gilboa
  alternatives_spanish:
  - sobre el monte Gilboa
  - en el monte de Gilboa
  lexicon: HALOT
  rationale: En español, “en el monte Gilboa” es la forma natural para el topónimo con הַר. “Monte Gilboa” preserva la referencia geográfica sin necesidad de desarrollar la preposición hebrea.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el texto hebreo y el criterio POB en inglés, conservando la imagen narrativa y la tensión del singular colectivo אִישׁ sin diluirla. No se requieren revisiones textuales adicionales: el versículo presenta alta concordancia entre hebreo y audit trail inglés.'
  spanish_consistency_notes:
  - Se mantiene “filisteos” con minúscula como nombre común de pueblo, según uso bíblico en español.
  - Se usa pasado narrativo simple para la secuencia hebrea waw-consecutiva.
  - No se introduce ninguna palabra teológica ajena al versículo.
  - La nota al pie explica el singular colectivo sin alterar el texto principal.
