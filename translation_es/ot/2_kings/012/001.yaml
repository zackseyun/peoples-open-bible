lexical_decisions:
- source_word: בֶּן ... שָׁנִים
  english_pob_choice: was ... years old
  chosen_spanish: tenía ... años
  alternatives_spanish:
  - era de ... años
  - era ... años de edad
  lexicon: HALOT
  rationale: La fórmula hebrea de edad בֶּן + número + שָׁנִים es idiomática; en español natural se expresa con 'tener ... años'. Mantiene el sentido de edad sin calcar 'hijo de'.
- source_word: שֶׁבַע
  english_pob_choice: seven
  chosen_spanish: siete
  alternatives_spanish:
  - '7'
  lexicon: HALOT
  rationale: El numeral cardinal corresponde directamente al hebreo y conserva la información cronológica del pasaje.
- source_word: יְהוֹאָשׁ
  english_pob_choice: Jehoash
  chosen_spanish: Joás
  alternatives_spanish:
  - Jehoás
  - Jehoash
  lexicon: HALOT
  rationale: En español bíblico y eclesial, 'Joás' es la forma establecida y más reconocible para este nombre, aunque el hebreo refleja con más transparencia 'Jehoash'.
- source_word: בְּמָלְכוֹ
  english_pob_choice: when he began to reign
  chosen_spanish: cuando comenzó a reinar
  alternatives_spanish:
  - cuando empezó a reinar
  - al reinar
  - cuando llegó a reinar
  lexicon: HALOT
  rationale: La construcción temporal con ב + infinitivo de מלך expresa el inicio del reinado. 'Comenzó a reinar' reproduce bien el valor aspectual y la fórmula histórica en español.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés coinciden con alta concordancia; no se requieren revisiones textuales ni decisiones de variante.
  spanish_consistency_notes:
  - Se prefiere 'Joás' por uso bíblico en español, aunque se conserva la nota al pie para la forma hebrea más cercana.
  - La estructura verbal 'comenzó a reinar' mantiene el sentido narrativo y evita una calca rígida.
