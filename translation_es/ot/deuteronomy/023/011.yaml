translation:
  language: es
  text: Si hay entre ustedes un hombre que esté impuro[a] a causa de una emisión nocturna, saldrá afuera del campamento; no entrará en medio del campamento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «un acontecimiento de la noche», un modismo para una emisión nocturna.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  - Porque
  lexicon: HALOT
  rationale: En este contexto legal casuístico, la partícula introduce una situación hipotética; «si» comunica mejor esa fuerza condicional que una lectura temporal o explicativa.
- source_word: יִהְיֶה בְךָ אִישׁ
  english_pob_choice: there is among you a man
  chosen_spanish: hay entre ustedes un hombre
  alternatives_spanish:
  - si hubiera entre ustedes un hombre
  - si se encuentra entre ustedes un hombre
  lexicon: HALOT
  rationale: Se mantiene el valor existencial de היה con בך y el marco comunitario de «entre ustedes». «Hombre» conserva la referencia masculina concreta del caso legal.
- source_word: אֲשֶׁר לֹא יִהְיֶה טָהוֹר
  english_pob_choice: who is not clean
  chosen_spanish: que no esté limpio
  alternatives_spanish:
  - que no sea limpio
  - que esté impuro
  lexicon: HALOT
  rationale: «Limpio» conserva en español la categoría ritual sin cargar de inmediato la idea de culpa moral. «Impuro» es posible, pero puede sonar más técnico o más marcado; «no esté limpio» sigue de cerca la oposición ritual del pasaje.
- source_word: מִקְּרֵה לָיְלָה
  english_pob_choice: because of a nocturnal emission
  chosen_spanish: a causa de una emisión nocturna
  alternatives_spanish:
  - a causa de un acontecimiento de la noche
  - a causa de una emisión seminal nocturna
  lexicon: HALOT
  rationale: El hebreo usa un eufemismo idiomático, literalmente «un acontecimiento de la noche». La frase española conserva el sentido corporal y nocturno sin volverlo innecesariamente clínico, manteniendo la transparencia semántica del original.
- source_word: וְיָצָא אֶל מִחוּץ לַמַּחֲנֶה
  english_pob_choice: he shall go outside the camp
  chosen_spanish: saldrá fuera del campamento
  alternatives_spanish:
  - irá fuera del campamento
  - saldrá al exterior del campamento
  lexicon: HALOT
  rationale: «Salir fuera del campamento» reproduce de manera natural el movimiento ordenado por el hebreo y evita una formulación pesada. «Campamento» es el equivalente contextual normal para מַחֲנֶה.
- source_word: לֹא יָבֹא אֶל תּוֹךְ הַמַּחֲנֶה
  english_pob_choice: he shall not come into the midst of the camp
  chosen_spanish: no entrará en medio del campamento
  alternatives_spanish:
  - no vendrá al interior del campamento
  - no entrará en el campamento
  lexicon: HALOT
  rationale: «En medio del campamento» preserva la fuerza de תּוֹךְ como interior o centro, no solo como entrada general al campamento. «Entrará» da una fluidez natural en español y mantiene el alcance de la prohibición.
theological_decisions:
- issue: Naturaleza de la impureza
  english_pob_reading: Render the impurity as ritual/ceremonial uncleanness rather than moral defilement.
  chosen_spanish_reading: Presentar la condición como falta de limpieza ritual, no como culpa moral.
  alternative_spanish_readings:
  - presentarla como impureza moral
  - traducirla simplemente como contaminación
  rationale: El mandato pertenece a regulaciones de santidad del campamento y a una impureza corporal temporal. Por eso «no esté limpio» y la nota explicativa evitan sugerir pecado personal donde el texto no lo afirma.
  doctrine_reference: 'Principio de traducción POB: preservar el sentido llano del texto sin importar una valoración doctrinal que el pasaje no expresa.'
translation_notes:
  revision_awareness: 'El pasaje concuerda ampliamente con la auditoría inglesa: se conserva el valor casuístico de la partícula inicial, la referencia comunitaria de «entre ustedes», el matiz ritual de טָהוֹר, la idiomaticidad de מִקְּרֵה לָיְלָה y la oposición espacial entre «fuera del campamento» y «en medio del campamento». No se registran revisiones adicionales en la fuente auditada.'
  spanish_consistency_notes:
  - Se usa «campamento» para מַחֲנֶה en coherencia con el contexto del desierto y la formulación inglesa auditada.
  - Se prefiere «limpio» para טָהוֹר en este caso ritual, reservando «impuro» para contextos donde la carga técnica o contrastiva en español sea necesaria.
  - Se mantiene un estilo jurídico claro y sobrio, adecuado para una traducción de equivalencia óptima y lectura pública.
