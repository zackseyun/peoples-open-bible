translation:
  language: es
  text: aceite para la luz, especias para el aceite de la unción y para el incienso de especias[a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «incienso aromático». La frase hebrea dice literalmente «incienso de las especias/sustancias aromáticas».
    reason: lexical_alternative
lexical_decisions:
- source_word: שֶׁמֶן
  english_pob_choice: oil
  chosen_spanish: aceite
  alternatives_spanish:
  - aceite de oliva
  lexicon: HALOT
  rationale: שֶׁמֶן designa de forma general 'aceite'. En el contexto del tabernáculo probablemente es aceite de oliva, pero el hebreo no lo especifica; por eso 'aceite' conserva la amplitud del original sin sobreprecisar.
- source_word: לַמָּאוֹר
  english_pob_choice: for the light
  chosen_spanish: para la luz
  alternatives_spanish:
  - para la lámpara
  - para alumbrar
  lexicon: HALOT
  rationale: מָאוֹר se refiere a una fuente de luz o iluminación. 'Para la luz' reproduce con naturalidad la brevedad del hebreo y evita imponer un objeto específico que el texto no dice explícitamente.
- source_word: בְּשָׂמִים
  english_pob_choice: spices
  chosen_spanish: especias
  alternatives_spanish:
  - aromáticos
  - especias aromáticas
  lexicon: HALOT
  rationale: El plural alude a sustancias aromáticas usadas en la preparación sagrada. 'Especias' es claro en español y mantiene bien el valor material del término.
- source_word: לְשֶׁמֶן הַמִּשְׁחָה
  english_pob_choice: for the anointing oil
  chosen_spanish: para el aceite de la unción
  alternatives_spanish:
  - para el aceite de consagración
  - para ungir
  lexicon: HALOT
  rationale: 'La construcción expresa finalidad: especias destinadas a preparar el aceite sagrado. ''Aceite de la unción'' conserva el artículo y el valor cultual específico del hebreo.'
- source_word: קְטֹרֶת
  english_pob_choice: incense
  chosen_spanish: incienso
  alternatives_spanish:
  - ofrenda de humo
  - fumigación
  lexicon: HALOT
  rationale: En contexto tabernacular, קְטֹרֶת es 'incienso', no un quemado general. 'Incienso' es la equivalencia natural y precisa en español.
- source_word: הַסַּמִּים
  english_pob_choice: of spices
  chosen_spanish: de especias
  alternatives_spanish:
  - aromático
  - de aromas
  lexicon: HALOT
  rationale: El constructo קְטֹרֶת הַסַּמִּים significa literalmente 'incienso de las especias/aromáticos'. 'De especias' mantiene la construcción y evita añadir un adjetivo interpretativo no explícito.
translation_notes:
  revision_awareness: La revisión inglesa reciente sustituyó 'fragrant incense' por 'incense of spices' para ceñirse más a la construcción hebrea. La traducción española sigue esa decisión y evita 'incienso fragante' por ser interpretativo.
  spanish_consistency_notes:
  - Se mantiene 'aceite' sin añadir 'de oliva', porque el hebreo no lo explicita.
  - Se conserva la estructura de finalidad con 'para' para reflejar las construcciones hebreas de destino.
  - '''Incienso de especias'' reproduce la relación genitiva del original y deja visible la alternativa en nota.'
  - El registro es sobrio y publicable, sin arcaísmos innecesarios.
