review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura imperativa plural del hebreo y preserva correctamente el nombre divino como «Yahvé». También mantiene la amplitud teológica de זִבְחֵי צֶדֶק mediante nota. Sin embargo, la elección principal «de justicia» no sigue de cerca la decisión auditada del POB («of righteousness») ni su rationale preferente, y en español suena menos natural en esta colocación que «de rectitud».
  spanish_quality_summary: El texto es claro y digno, pero «Ofreced / confiad» usa el plural peninsular, mientras la guía pide español neutral latinoamericano y ampliamente eclesial. «Ofrezcan / confíen» lee mejor para el público meta. Además, «sacrificios de justicia» es entendible, pero «sacrificios de rectitud» preserva mejor la cualidad moral/covenantal sin sugerir tan fuertemente justicia judicial o social.
  glossary_alignment: «Yahvé» está correctamente alineado con la política del proyecto. No hay otros términos del glosario mayor implicados. Para צֶדֶק, la preferencia por «rectitud» aquí encaja mejor con la decisión inglesa principal y mantiene «justicia» como alternativa en nota.
  issues:
  - severity: medium
    issue: 'Registro pronominal no neutral: «Ofreced ... confiad»'
    rationale: Aunque gramaticalmente correcto, el voseo plural peninsular no es la opción más natural para español neutral latinoamericano solicitado por el proyecto. «Ofrezcan ... confíen» preserva el imperativo plural sin marcar región.
  - severity: medium
    issue: Renderizado principal de צֶדֶק como «justicia»
    rationale: El POB inglés privilegia «righteousness» y deja «justice» como alternativa. En español bíblico amplio, «rectitud» representa mejor esa elección principal y deja abierta la dimensión ética/cultual sin arrastrar tanto la lectura jurídico-social de «justicia».
  revised_spanish_text: Ofrezcan sacrificios de rectitud[a], y confíen en Yahvé.
