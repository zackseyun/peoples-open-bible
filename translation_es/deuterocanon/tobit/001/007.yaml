translation:
  language: es
  text: Y yo daba estas cosas a los sacerdotes, los hijos de Aarón, para el altar, del producto; daba la décima parte[a] a los hijos de Leví que ministraban en Jerusalén, y vendía la segunda décima parte y iba y la gastaba allí[b] cada año.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más idiomáticamente, «el diezmo» y «el segundo diezmo». El griego dice literalmente «la décima parte» y «la segunda décima parte».
    reason: lexical_alternative
  - marker: b
    text: El verbo traducido «vendía» también puede entenderse como convertir la segunda décima parte en dinero antes de ir a Jerusalén para gastarlo allí.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐδίδουν
  english_pob_choice: I would give
  chosen_spanish: yo les daba
  alternatives_spanish:
  - yo daba
  - solía dar
  lexicon: BDAG
  rationale: El imperfecto expresa acción habitual en el pasado. En español, «les daba» conserva ese valor repetido y suena natural; el pronombre «les» retoma los dones/títulos implícitos por el contexto sin forzar una paráfrasis.
- source_word: αὐτὰς
  english_pob_choice: them
  chosen_spanish: las
  alternatives_spanish:
  - las cosas
  - estos dones
  lexicon: BDAG
  rationale: El pronombre femenino plural remite a los diezmos/ofrendas del contexto. «Las» mantiene la referencia sin introducir un sustantivo no explícito en el griego.
- source_word: τοῖς ἱερεῦσιν τοῖς υἱοῖς Ἀαρών
  english_pob_choice: to the priests, the sons of Aaron
  chosen_spanish: a los sacerdotes, los hijos de Aarón
  alternatives_spanish:
  - a los sacerdotes aarónicos
  lexicon: BDAG
  rationale: Se conserva la apposición explícita del griego para mantener visible la línea sacerdotal. «Sacerdotes» es el equivalente directo de ἱερεῦσιν; la paráfrasis «aarónicos» comprime demasiado la estructura.
- source_word: πρὸς τὸ θυσιαστήριον τῶν γενημάτων
  english_pob_choice: for the altar, from the produce
  chosen_spanish: para el altar, de los productos
  alternatives_spanish:
  - para el altar, de la cosecha
  - para el altar, de lo producido
  lexicon: BDAG
  rationale: El griego es compacto y vincula los dones con el uso cultual y con su origen agrícola. «De los productos» conserva esa relación sin explicar más de lo que dice el texto.
- source_word: τὴν δεκάτην
  english_pob_choice: the tenth
  chosen_spanish: el diezmo
  alternatives_spanish:
  - la décima parte
  - el décimo
  lexicon: BDAG
  rationale: Aunque literalmente es «la décima», en español bíblico «diezmo» comunica con claridad la práctica aludida. Aquí se elige el término idiomático porque no borra la referencia numérica y evita una expresión poco natural.
- source_word: τοῖς υἱοῖς Λευεὶ
  english_pob_choice: to the sons of Levi
  chosen_spanish: a los hijos de Leví
  alternatives_spanish:
  - a los levitas
  lexicon: BDAG
  rationale: El griego dice literalmente «hijos de Leví». Se conserva la formulación formal porque el texto la usa de manera explícita, aunque refiere a los levitas.
- source_word: τοῖς θεραπεύουσιν εἰς Ἱερουσαλήμ
  english_pob_choice: who minister in Jerusalem
  chosen_spanish: que ministraban en Jerusalén
  alternatives_spanish:
  - que servían en Jerusalén
  - que prestaban servicio en Jerusalén
  lexicon: BDAG
  rationale: En contexto cultual, θεραπεύω señala servicio sagrado/ministerio. «Ministraban» preserva ese matiz litúrgico mejor que un verbo más general, sin desplazar el marco de Jerusalén.
- source_word: τὴν δευτέραν δεκάτην
  english_pob_choice: the second tenth
  chosen_spanish: el segundo diezmo
  alternatives_spanish:
  - la segunda décima
  - el segundo diezmo
  lexicon: BDAG
  rationale: Se adopta una forma idiomática en español que mantiene la distinción del griego y refleja la práctica de un segundo diezmo. «Segundo diezmo» es más transparente que una traducción calcada de «segunda décima».
- source_word: ἀπεπρατιζόμην
  english_pob_choice: I would sell
  chosen_spanish: vendía
  alternatives_spanish:
  - lo vendía
  - lo convertía en dinero
  lexicon: LSJ
  rationale: El verbo indica vender o disponer mediante venta. En español, «vendía» conserva la habitualidad del imperfecto y permite entender naturalmente la secuencia con el gasto posterior.
- source_word: ἐδαπάνων αὐτὰ
  english_pob_choice: spend it
  chosen_spanish: lo gastaba
  alternatives_spanish:
  - lo consumía
  - gastaba ese dinero
  lexicon: BDAG
  rationale: Tras la venta, el referente pasa al producto de la venta entendido como monto disponible; por eso «lo» en singular es natural en español. Se evita una explicación añadida que no está en el griego.
- source_word: καθʼ ἕκαστον ἐνιαυτόν
  english_pob_choice: each year
  chosen_spanish: cada año
  alternatives_spanish:
  - todos los años
  - anualmente
  lexicon: BDAG
  rationale: Es una correspondencia directa y clara del distributivo griego, adecuada para un registro bíblico moderno.
theological_decisions:
- issue: Terminología del diezmo doble en una práctica cultual judía
  english_pob_reading: Retain the literal expressions 'the tenth' and 'the second tenth' in the main text, with a note that these correspond idiomatically to 'the tithe' and 'the second tithe.'
  chosen_spanish_reading: Usar «el diezmo» y «el segundo diezmo» en el texto principal, sin explicar en el cuerpo que son equivalentes idiomáticos a una formulación más literal.
  alternative_spanish_readings:
  - «la décima» y «la segunda décima»
  - «la décima parte» y «la segunda décima parte»
  rationale: En español, «diezmo» es la manera más inteligible de nombrar la práctica cultual aludida y no borra la fuerza numérica subyacente. Mantener la distinción entre el primer y el segundo diezmo evita diluir la especificidad del texto.
  doctrine_reference: 'DOCTRINE.md: original-language primacy; preserve contextual cultic terminology without unnecessary paraphrase.'
- issue: Sentido de ἀπεπρατιζόμην en la secuencia de ir a Jerusalén y gastar allí
  english_pob_reading: Translate as 'I would sell the second tenth' with the note that it can also mean converting it into money before spending it in Jerusalem.
  chosen_spanish_reading: Traducir con «vendía» y luego «lo gastaba», dejando implícita la conversión en dinero que el verbo sugiere.
  alternative_spanish_readings:
  - «lo vendía»
  - «lo convertía en dinero»
  rationale: La secuencia griega ya sugiere una conversión por venta seguida de gasto en Jerusalén. «Vendía» conserva el valor verbal sin sobreexplicar; el contexto inmediato hace inteligible el resultado económico.
  doctrine_reference: 'DOCTRINE.md: never paraphrase beyond what the source warrants; preserve lexical force while maintaining natural Spanish.'
translation_notes:
  revision_awareness: El texto inglés revisado añadió una coma después de «altar» y eliminó una coma innecesaria antes de «and go» para mejorar la fluidez. En español, esa claridad se refleja con la coma tras «altar» y con una coordinación fluida sin coma antes de «y iba»; además, se optó por un orden natural de los complementos sin alterar la secuencia del griego.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» no pertinente aquí porque el verso no contiene el nombre divino explícito en el texto griego aportado.
  - Se conserva la distinción entre cultic service y simple service mediante «ministraban».
  - «Diezmo» y «segundo diezmo» se usan de forma consistente como equivalentes idiomáticos de las expresiones literales griegas, con nota sobre la literalidad.
  - El singular de «lo gastaba» refleja el valor de monto/provecho de la venta en español, en línea con el contexto griego.
  - No se introduce vocabulario eclesiástico posterior que no esté sustentado por el texto.
