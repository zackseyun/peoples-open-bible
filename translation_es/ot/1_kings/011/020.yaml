translation:
  language: es
  text: Y la hermana de Tahpenés dio a luz a Genubat, su hijo[a], y Tahpenés lo destetó[b] dentro de la casa de Faraón; y Genubat estuvo en la casa de Faraón entre los hijos de Faraón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la hermana de Tahpenés dio a luz a su hijo, Genubat». El hebreo permite reflejar el orden de las palabras de más de una manera en español, sin cambiar el sentido.'
    reason: lexical_alternative
  - marker: b
    text: «Lo destetó» se refiere a que el niño dejó de mamar; después de eso permaneció en la casa de Faraón.
    reason: cultural_note
lexical_decisions:
- source_word: וַתֵּלֶד לּוֹ
  english_pob_choice: bore him
  chosen_spanish: dio a luz a
  alternatives_spanish:
  - engendró para él
  - parió a
  lexicon: HALOT
  rationale: En español, «dio a luz a» expresa con naturalidad el nacimiento y conserva la relación indirecta marcada por לּוֹ sin forzar un calco. «Parió» es más duro; «engendró para él» suena demasiado interpretativo.
- source_word: אֲחוֹת תַּחְפְּנֵיס
  english_pob_choice: the sister of Tahpenes
  chosen_spanish: la hermana de Tahpenés
  alternatives_spanish:
  - Tahpenés, su hermana
  lexicon: HALOT
  rationale: La relación de constructo se mantiene de forma clara en español con «la hermana de Tahpenés». Se evita una inversión menos natural en la narrativa.
- source_word: גְּנֻבַת
  english_pob_choice: Genubath
  chosen_spanish: Genubat
  alternatives_spanish:
  - Genubat
  lexicon: HALOT
  rationale: Se translitera el nombre propio de forma consistente en español. La forma «Genubat» respeta mejor la grafía esperable para el final hebreo en contextos bíblicos en español.
- source_word: בְּנוֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - un hijo
  lexicon: HALOT
  rationale: El sufijo posesivo se expresa naturalmente con «su hijo». En español, el poseedor ya queda claro por el contexto inmediato, por lo que no es necesario repetir «de él».
- source_word: וַתִּגְמְלֵהוּ
  english_pob_choice: weaned him
  chosen_spanish: lo crió hasta destetarlo
  alternatives_spanish:
  - lo destetó
  - lo amamantó hasta el destete
  lexicon: HALOT
  rationale: «Destetar» comunica el sentido central del hebreo, pero «lo crió hasta destetarlo» hace explícita la acción completa que el contexto supone y resulta más transparente para lectores actuales. Mantiene la referencia cultural sin diluirla.
- source_word: בְּתוֹךְ בֵּית פַּרְעֹה
  english_pob_choice: within Pharaoh’s house
  chosen_spanish: dentro de la casa de Faraón
  alternatives_spanish:
  - en la casa de Faraón
  - dentro del palacio de Faraón
  lexicon: HALOT
  rationale: «Dentro de la casa de Faraón» reproduce el valor locativo y la imagen social de בַּיִת sin convertirla automáticamente en «palacio». «Casa» deja abierto el matiz de residencia y hogar real.
- source_word: וַיְהִי
  english_pob_choice: was
  chosen_spanish: estuvo
  alternatives_spanish:
  - fue
  - era
  lexicon: HALOT
  rationale: En el cierre narrativo, «estuvo» comunica mejor la permanencia o ubicación de Genubat en el ámbito real. Es una equivalencia idiomática más precisa que un simple «era».
- source_word: בֵּית פַּרְעֹה
  english_pob_choice: Pharaoh’s house
  chosen_spanish: la casa de Faraón
  alternatives_spanish:
  - la casa del Faraón
  - el palacio de Faraón
  lexicon: HALOT
  rationale: Se conserva la imagen repetida del hebreo con «la casa de Faraón». «Palacio» sería una explicación posible, pero adelanta una interpretación no obligatoria del término.
- source_word: בְּתוֹךְ בְּנֵי פַרְעֹה
  english_pob_choice: among the sons of Pharaoh
  chosen_spanish: entre los hijos de Faraón
  alternatives_spanish:
  - entre los hijos varones de Faraón
  - entre los hijos de Faraón
  lexicon: HALOT
  rationale: «Hijos» es la correspondencia más directa para בְּנֵי en este contexto. «Entre» mantiene la idea de pertenencia al grupo sin insistir en una localización física exclusiva.
translation_notes:
  revision_awareness: El contexto en inglés fue revisado y quedó en alta concordancia; no se registraron cambios sustantivos en la última pasada. La presente redacción sigue esa línea, manteniendo la estructura narrativa y las decisiones léxicas auditadas, con adaptación natural al español.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como terminología general del proyecto, pero en este versículo no aparece el nombre divino.
  - «Faraón» se mantiene como nombre/título propio consistente con el registro bíblico en español.
  - Se prefiere «casa» frente a «palacio» para respetar la imagen hebrea repetida en el versículo.
  - El verbo final «estuvo» busca reflejar la permanencia en el entorno real sin añadir información no presente en el hebreo.
