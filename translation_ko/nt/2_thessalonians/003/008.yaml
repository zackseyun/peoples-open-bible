id: 2TH.3.8
reference: 2 Thessalonians 3:8
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: οὐδὲ δωρεὰν ἄρτον ἐφάγομεν παρά τινος, ἀλλ’ ἐν κόπῳ καὶ μόχθῳ ⸂νυκτὸς καὶ ἡμέρας⸃ ἐργαζόμενοι πρὸς τὸ μὴ ἐπιβαρῆσαί τινα ὑμῶν·
base_translation:
  language: en
  yaml_path: translation/nt/2_thessalonians/003/008.yaml
  text: nor did we eat bread from anyone free of charge[a], but with labor and hardship, working night and day so as not to burden any of you.
translation:
  language: ko
  text: 또한 누구에게서든 거저 음식을[a] 받아 먹지 않았고, 도리어 여러분 중 누구에게도 짐이 되지 않으려고 밤낮으로 수고와 고됨 가운데 일했습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어는 문자적으로 「빵」. 본 정황에서는 일반적인 양식·생계의 환유로 쓰인다.
    reason: lexical_alternative
lexical_decisions:
- source_word: δωρεὰν
  english_pob_choice: free of charge
  chosen_korean: 거저
  alternatives_korean:
  - 값 없이
  - 무상으로
  lexicon: BDAG
  rationale: 「거저」가 한국 성경 전통의 자연스러운 표현이며 의미가 명료하다.
- source_word: ἄρτον
  english_pob_choice: bread
  chosen_korean: 음식을
  alternatives_korean:
  - 빵을
  - 양식을
  lexicon: BDAG
  rationale: 본 정황의 환유적 의미(생계 일반)를 한국어 현대 독자에게 명료하게 옮기되, 직역 「빵」은 각주.
- source_word: παρά τινος
  english_pob_choice: from anyone
  chosen_korean: 누구에게서든
  alternatives_korean:
  - 누구의 손에서도
  lexicon: BDAG
  rationale: 부정 정황의 폭넓은 의미.
- source_word: ἐν κόπῳ καὶ μόχθῳ
  english_pob_choice: with labor and hardship
  chosen_korean: 수고와 고됨 가운데
  alternatives_korean:
  - 수고와 고난 가운데
  - 노고와 고생 속에
  lexicon: BDAG
  rationale: κόπος + μόχθος의 강도 높은 노력을 「수고와 고됨」으로 자연스럽게 표현한다.
- source_word: νυκτὸς καὶ ἡμέρας
  english_pob_choice: night and day
  chosen_korean: 밤낮으로
  alternatives_korean:
  - 밤과 낮으로
  lexicon: BDAG
  rationale: 시간 속격의 정형 표현 「밤낮으로」.
- source_word: ἐργαζόμενοι
  english_pob_choice: working
  chosen_korean: 일했습니다
  alternatives_korean:
  - 노동하며
  - 일하며
  lexicon: BDAG
  rationale: 분사를 한국어 종결 흐름에 맞춰 본동사로 정리한다.
- source_word: πρὸς τὸ μὴ ἐπιβαρῆσαί
  english_pob_choice: so as not to burden
  chosen_korean: 짐이 되지 않으려고
  alternatives_korean:
  - 부담이 되지 않도록
  - 짐을 지우지 않으려고
  lexicon: BDAG
  rationale: 목적 구문의 자연스러운 표현.
- source_word: τινα ὑμῶν
  english_pob_choice: any of you
  chosen_korean: 여러분 중 누구에게도
  alternatives_korean:
  - 여러분 가운데 어느 한 사람에게도
  lexicon: BDAG
  rationale: 분배적 의미를 자연스럽게 보존.
