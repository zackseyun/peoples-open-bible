id: REV.1.8
reference: 'Revelation 1:8'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ἐγώ εἰμι τὸ Ἄλφα καὶ τὸ Ὦ, λέγει κύριος, ὁ θεός, ὁ ὢν καὶ ὁ ἦν καὶ ὁ ἐρχόμενος, ὁ παντοκράτωρ.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/001/008.yaml
  text: '“I am the Alpha and the Omega,” says the Lord God[a], “the one who is and who was and who is coming, the Almighty.”'
  footnotes:
  - marker: a
    text: Or, “the one who is and who was and who is to come.”
    reason: lexical_alternative
translation:
  language: ko
  text: '「나는 알파요 오메가이다」 하고 주 하나님께서 말씀하십니다. 「이제도 있고 전에도 있었으며 장차 오실 분, 전능하신 분이다.」'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: παντοκράτωρ
  english_pob_choice: the Almighty
  chosen_korean: 전능하신 분
  alternatives_korean:
  - 전능자
  lexicon: BDAG
  rationale: 'LXX에서 צְבָאוֹת/שַׁדַּי를 옮기는 정형. 한국어 「전능하신 분」으로 일관되게 옮긴다.'
- source_word: Ἄλφα καὶ τὸ Ὦ
  english_pob_choice: the Alpha and the Omega
  chosen_korean: 알파와 오메가
  alternatives_korean:
  - 처음과 끝
  lexicon: BDAG
  rationale: 헬라 문자명을 음역으로 보존해 본문의 시각적 이미지를 유지한다.
theological_decisions:
- issue: '1:8의 신적 자기 호칭에서 1:4 정형(이제도/전에도/장차 오실)을 그대로 보존'
  chosen_reading: 이제도 있고 전에도 있었으며 장차 오실 분
  alternative_readings:
  - 계시고 계셨고 오실 자
  rationale: '1:4과 4:8의 운율을 일관되게 살리되, 본 절에서 직접 인용 화법임을 살려 「있고/있었으며」로 약간 변형.'
