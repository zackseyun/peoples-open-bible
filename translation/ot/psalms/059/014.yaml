theological_decisions:
- issue: Imprecatory language directed toward enemies
  chosen_reading: Retain the direct petition for their complete destruction without softening it.
  alternative_readings:
  - Consume them partially or merely restrain them
  - Interpret as hyperbole and paraphrase away the destruction
  rationale: The Hebrew repeats the imperative and explicitly asks that they be brought to the point of being 'no more.' Optimal equivalence requires preserving the severity of the psalm's appeal rather than muting it for modern sensibilities.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Never paraphrase beyond what the source text warrants.'
- issue: Scope of divine rule in relation to Jacob and the nations
  chosen_reading: Render both God's rule 'in Jacob' and its recognition 'to the ends of the earth.'
  alternative_readings:
  - Limit the statement to Israel alone
  - Translate in a way that collapses 'Jacob' into a purely universal statement
  rationale: The verse holds together God's particular covenantal rule in Jacob with universal recognition extending to the ends of the earth. The translation preserves that theological tension rather than resolving it into either merely national or merely universal terms.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it.'
