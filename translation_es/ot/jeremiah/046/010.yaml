translation:
  language: es
  text: Aquel día pertenece a Yahvé Dios de los Ejércitos[a], día de venganza, para vengarse de sus enemigos. La espada devorará, se saciará y beberá hasta saciarse de su sangre, porque Yahvé Dios de los Ejércitos tiene un sacrificio[b] en la tierra del norte, junto al río Éufrates.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Tradicionalmente: «Yahvé de las huestes». «De los Ejércitos» hace explícito el sentido militar de צְבָאוֹת.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «porque hay un sacrificio para Yahvé Dios de los Ejércitos». El hebreo puede entenderse como una cláusula existencial más que como «tiene un sacrificio».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַיּוֹם הַהוּא
  english_pob_choice: That day
  chosen_spanish: Aquel día
  alternatives_spanish:
  - Ese día
  - Y aquel día
  lexicon: HALOT
  rationale: La frase deíctica introduce un momento específico y solemne. «Aquel» conserva la distancia retórica de «that day» sin volver la frase pesada en español.
- source_word: לַאדֹנָי יְהוִה צְבָאוֹת
  english_pob_choice: belongs to the Lord GOD of Armies
  chosen_spanish: pertenece a Yahvé Dios de los Ejércitos
  alternatives_spanish:
  - es de Yahvé Dios de los Ejércitos
  - corresponde a Yahvé Dios de los Ejércitos
  lexicon: HALOT
  rationale: El prefijo ל indica pertenencia o relación. En español, «pertenece a» expresa bien esa relación sin perder el matiz de posesión del día por parte de Yahvé.
- source_word: יְהוִה
  english_pob_choice: GOD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - el Señor
  lexicon: HALOT
  rationale: Se conserva el nombre divino de forma transparente según la pauta del proyecto, en lugar de ocultarlo con una convención tipográfica.
- source_word: צְבָאוֹת
  english_pob_choice: of Armies
  chosen_spanish: de los Ejércitos
  alternatives_spanish:
  - de los ejércitos
  - de las huestes
  lexicon: HALOT
  rationale: «Ejércitos» comunica con claridad el sentido militar del título en este contexto de guerra y juicio, y mantiene la transparencia buscada por el POB.
- source_word: יוֹם נְקָמָה
  english_pob_choice: a day of vengeance
  chosen_spanish: día de venganza
  alternatives_spanish:
  - día de retribución
  - día de desquite
  lexicon: HALOT
  rationale: «Venganza» reproduce con fidelidad el sustantivo נְקָמָה y mantiene la fuerza judicial del pasaje.
- source_word: לְהִנָּקֵם מִצָּרָיו
  english_pob_choice: to avenge himself on his foes
  chosen_spanish: para vengarse de sus enemigos
  alternatives_spanish:
  - para tomar venganza de sus adversarios
  - para ajusticiar a sus enemigos
  lexicon: HALOT
  rationale: El infinitivo nifal tiene aquí sentido reflexivo/activo en contexto. «Vengarse de» es natural en español y conserva el valor de retribución contra los adversarios.
- source_word: וְאָכְלָה חֶרֶב
  english_pob_choice: The sword will devour
  chosen_spanish: La espada devorará
  alternatives_spanish:
  - La espada consumirá
  - La espada comerá
  lexicon: HALOT
  rationale: Se mantiene la personificación y la imagen violenta del verbo «devorar», como en el inglés auditado.
- source_word: וְשָׂבְעָה
  english_pob_choice: and be satisfied
  chosen_spanish: se saciará
  alternatives_spanish:
  - quedará satisfecha
  - quedará harta
  lexicon: HALOT
  rationale: «Saciarse» preserva la idea de estar plenamente colmada, en paralelo con la imagen de la espada que devora.
- source_word: וְרָוְתָה מִדָּמָם
  english_pob_choice: and drink its fill of their blood
  chosen_spanish: y se hartará de su sangre
  alternatives_spanish:
  - y beberá hasta saciarse de su sangre
  - y se embriagará con su sangre
  lexicon: HALOT
  rationale: El hebreo usa una imagen de saturación/beber hasta el colmo. «Hartarse de su sangre» conserva el efecto idiomático y poético en español, aunque atenúa la metáfora explícita de beber; se mantiene en paralelo con el contexto de la espada personificada.
- source_word: כִּי זֶבַח
  english_pob_choice: for ... has a sacrifice
  chosen_spanish: porque ... tiene un sacrificio
  alternatives_spanish:
  - porque hay un sacrificio
  - porque le pertenece un sacrificio
  lexicon: HALOT
  rationale: Se conserva la lectura posesiva/relacional de la construcción con ל. «Tiene un sacrificio» refleja la opción idiomática del audit trail y permite también la lectura existencial implícita.
- source_word: בְּאֶרֶץ צָפוֹן
  english_pob_choice: in the land of the north
  chosen_spanish: en la tierra del norte
  alternatives_spanish:
  - en el país del norte
  - en la tierra septentrional
  lexicon: HALOT
  rationale: «Tierra del norte» es claro y cercano al hebreo, sin introducir una explicación geográfica que el texto no da explícitamente.
- source_word: אֶל נְהַר פְּרָת
  english_pob_choice: by the Euphrates River
  chosen_spanish: junto al río Éufrates
  alternatives_spanish:
  - al río Éufrates
  - cerca del río Éufrates
  lexicon: HALOT
  rationale: La preposición אֶל puede ser direccional o locativa según el contexto. «Junto al» expresa bien la localización del sacrificio/batalla sin forzar una dirección.
theological_decisions:
- issue: Tratamiento del Tetragrámaton en una fórmula compuesta
  english_pob_reading: Lord GOD
  chosen_spanish_reading: Yahvé Dios
  alternative_spanish_readings:
  - el Señor Dios
  - Yahvé Señor
  rationale: Se sigue la norma del proyecto de traducir יְהוָה como «Yahvé». En la combinación con אֲדֹנָי, «Yahvé Dios» evita la repetición extraña de «Señor SEÑOR» y mantiene la referencia al nombre divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Sentido de צְבָאוֹת en un oráculo de juicio militar
  english_pob_reading: of Armies
  chosen_spanish_reading: de los Ejércitos
  alternative_spanish_readings:
  - de los ejércitos
  - de las huestes
  rationale: En este contexto bélico, «Ejércitos» comunica de manera transparente el título divino y evita la opacidad de «huestes».
  doctrine_reference: DOCTRINE.md Translation philosophy §2, §6
- issue: Posible lectura existencial de כִּי זֶבַח
  english_pob_reading: for ... has a sacrifice
  chosen_spanish_reading: porque ... tiene un sacrificio
  alternative_spanish_readings:
  - porque hay un sacrificio
  - porque es un sacrificio
  rationale: Se conserva la tensión auditada entre lectura posesiva e impersonal. «Tiene un sacrificio» deja abierta la posibilidad de la construcción existencial sin borrarla.
  doctrine_reference: 'DOCTRINE.md: preserve documented lexical/theological tension'
translation_notes:
  revision_awareness: La revisión más reciente del audit trail no introdujo cambios; el texto inglés quedó confirmado como estable. La presente versión española mantiene esas decisiones, pero adapta algunos giros para que el verso suene natural en español sin perder la tensión entre posesión y existencia en כִּי זֶבַח.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוִה conforme a la pauta del proyecto.
  - Se traduce צְבָאוֹת como «los Ejércitos» para conservar transparencia semántica en un contexto de juicio militar.
  - Se conserva la personificación de la espada y la secuencia verbal intensiva del hebreo.
  - Se evita «SEÑOR» como máscara tipográfica, salvo en citas tradicionales no usadas aquí.
  - La nota sobre זֶבַח preserva la alternativa existencial documentada en el audit trail.
