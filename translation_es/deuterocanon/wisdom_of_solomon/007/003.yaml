    text: Or 'the air shared by all.' The Greek phrase emphasizes that the speaker entered the same human life as everyone else.
    reason: lexical_alternative
  - marker: b
    text: The adjective rendered 'that suffers alike with all' can also mean 'subject to the same experiences' or 'of like condition.'
    reason: lexical_alternative
