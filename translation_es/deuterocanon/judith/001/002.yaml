translation:
  language: es
  text: Y edificó alrededor de Ecbatana[b] murallas de piedra labrada, de tres codos de ancho y seis codos de largo, y hizo la muralla de setenta codos de alto y su[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El texto griego proporcionado para este versículo está truncado después de «καὶ τὸ». Por eso la traducción conserva un final incompleto en vez de reconstruir las palabras faltantes.
    reason: textual_variant
  - marker: b
    text: También puede entenderse «en Ecbatana». La construcción preposicional griega es algo condensada, aunque el contexto describe la fortificación de la ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: ᾠκοδόμησεν
  english_pob_choice: built
  chosen_spanish: edificó
  alternatives_spanish:
  - construyó
  - levantó
  lexicon: LSJ
  rationale: El aoristo de οἰκοδομέω se refiere a la acción de construir o edificar. «Edificó» conserva un registro formal y bíblico sin sonar arcaico; «construyó» sería posible, pero «edificó» refleja mejor el matiz arquitectónico del contexto.
- source_word: ἐπʼ Ἐκβατάνων
  english_pob_choice: around Ecbatana
  chosen_spanish: alrededor de Ecbatana
  alternatives_spanish:
  - en Ecbatana
  - sobre Ecbatana
  lexicon: LSJ
  rationale: 'La combinación con καὶ κύκλῳ τείχη favorece una lectura locativa/fortificadora: no solo «en» la ciudad, sino rodeándola. «Alrededor de Ecbatana» reproduce el valor contextual que el audit trail inglés ya defendió.'
- source_word: κύκλῳ τείχη
  english_pob_choice: walls
  chosen_spanish: murallas
  alternatives_spanish:
  - muros
  - paredes
  lexicon: LSJ
  rationale: En español, «murallas» comunica de inmediato la idea de una defensa perimetral urbana; «muros» sería más genérico. El contexto de fortificación justifica esta precisión sin añadir contenido ajeno.
- source_word: λίθων λελαξευμένων
  english_pob_choice: cut stone
  chosen_spanish: piedra labrada
  alternatives_spanish:
  - piedra tallada
  - piedra hewn
  lexicon: LSJ
  rationale: El participio describe piedras trabajadas/cortadas. «Piedra labrada» es natural en español bíblico y conserva la idea de piedra trabajada por artesanos. «Piedra tallada» también es posible, pero «labrada» es más idiomática aquí.
- source_word: εἰς πλάτος πηχῶν τριῶν
  english_pob_choice: three cubits wide
  chosen_spanish: de tres codos de ancho
  alternatives_spanish:
  - con una anchura de tres codos
  - a un ancho de tres codos
  lexicon: LSJ
  rationale: La frase mide la anchura de las piedras o del tramo constructivo. «De tres codos de ancho» es claro y fluido en español, manteniendo la unidad de medida sin explicitar de más el referente.
- source_word: εἰς μῆκος πηχῶν ἕξ
  english_pob_choice: six cubits long
  chosen_spanish: de seis codos de largo
  alternatives_spanish:
  - con una longitud de seis codos
  - a un largo de seis codos
  lexicon: LSJ
  rationale: Paralelo a la medida anterior, «de seis codos de largo» conserva la estructura y el sentido dimensional del texto griego.
- source_word: ἐποίησεν τὸ ὕψος τοῦ τείχους πηχῶν ἑβδομήκοντα
  english_pob_choice: he made the wall seventy cubits high
  chosen_spanish: hizo la muralla de setenta codos de alto
  alternatives_spanish:
  - hizo la altura de la muralla de setenta codos
  - levantó la muralla a setenta codos de alto
  lexicon: LSJ
  rationale: El griego usa una construcción de medida con ἐποίησεν; en español, «hizo la muralla de setenta codos de alto» transmite el resultado constructivo de forma natural. «Levantó» sería posible, pero «hizo» sigue más de cerca la estructura verbal del original y el audit trail inglés.
- source_word: καὶ τὸ
  english_pob_choice: and its
  chosen_spanish: y su
  alternatives_spanish:
  - y el
  - y la
  lexicon: Greek text
  rationale: El texto griego suministrado está truncado después de καὶ τὸ. Para respetar esa truncación, el español debe también quedar abierto e incompleto. «Y su» refleja la sintaxis suspendida sin inventar la continuación.
translation_notes:
  revision_awareness: 'El contexto auditado en inglés no requiere cambios de fondo: se mantiene la solución óptima ya validada, incluida la conservación del final truncado del versículo y la lectura locativa de la expresión con Ecbatana.'
  spanish_consistency_notes:
  - Se mantiene «codos» como equivalente estable de πηχῶν, en paralelo con el inglés «cubits».
  - Se usa «murallas»/«muralla» para reflejar el sentido defensivo urbano del pasaje.
  - La traducción conserva el carácter incompleto del versículo según el texto griego transmitido.
  - No se introduce «SEÑOR» ni otro término teológico ajeno, porque aquí no aparece el Tetragrámaton ni una cita divina explícita.
