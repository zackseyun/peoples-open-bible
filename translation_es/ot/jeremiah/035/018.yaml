translation:
  language: es
  text: 'Y a la casa de los Recabitas dijo Jeremías[a]: «Así dice Yahvé de los ejércitos, el Dios de Israel: Porque han obedecido el mandato de Jehonadab, su padre, y han guardado todos sus mandamientos, y han hecho conforme a todo lo que les mandó»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo Jehonadab; en español también es posible encontrar la forma Jonadab.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְבֵית הָרֵכָבִים
  english_pob_choice: And to the house of the Rechabites
  chosen_spanish: Y al בית de los recabitas
  alternatives_spanish:
  - Y a la casa de los recabitas
  - Y a la familia de los recabitas
  - Y al linaje de los recabitas
  lexicon: HALOT
  rationale: בַּיִת puede referirse a casa, familia o casa/linaje en sentido genealógico. En español, «casa» o «familia» son naturales, pero el sentido aquí es corporativo y ancestral. «de los recabitas» conserva la referencia étnico-familiar; se mantiene la preposición con artículo para reflejar la construcción hebrea, aunque «casa» también sería viable.
- source_word: אָמַר יִרְמְיָהוּ
  english_pob_choice: Jeremiah said
  chosen_spanish: dijo Jeremías
  alternatives_spanish:
  - habló Jeremías
  - respondió Jeremías
  lexicon: HALOT
  rationale: El verbo narrativo simple se traduce con el español natural «dijo». Mantiene el tono directo del informe profético sin añadir matiz no presente en el hebreo.
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así ha dicho Yahvé
  alternatives_spanish:
  - Así dice Yahvé
  - Esto ha dicho Yahvé
  lexicon: HALOT
  rationale: La fórmula profética se expresa con un registro solemne y claro. «Así ha dicho» preserva la cadencia tradicional sin volverla arcaica en exceso. «Yahvé» mantiene el nombre divino según la norma del proyecto.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de las huestes
  lexicon: HALOT
  rationale: Aunque el inglés POB usa «hosts», en español «ejércitos» comunica bien el título divino sin sonar forzado. «Huestes» sería más tradicional, pero menos transparente para lectores amplios.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  - el Dios de Israel
  lexicon: HALOT
  rationale: La construcción posesiva se mantiene de forma directa. «Dios de Israel» es la equivalencia más natural y exacta.
- source_word: יַעַן אֲשֶׁר
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Puesto que
  - Ya que
  lexicon: HALOT
  rationale: La doble partícula causal introduce la razón de la declaración. «Porque» reproduce el valor causal de manera sencilla y fiel.
- source_word: שְׁמַעְתֶּם עַל מִצְוַת
  english_pob_choice: you have obeyed the command of
  chosen_spanish: obedecieron el mandato de
  alternatives_spanish:
  - oyeron el mandato de
  - atendieron al mandato de
  lexicon: HALOT
  rationale: Con שׁמע + עַל el sentido es obedecer, no simplemente oír. «Mandato» refleja bien מִצְוָה en este contexto de autoridad paterna y obediencia concreta.
- source_word: יְהוֹנָדָב אֲבִיכֶם
  english_pob_choice: Jehonadab your father
  chosen_spanish: Jehonadab, su padre
  alternatives_spanish:
  - Jehonadab, vuestro padre
  - Jehonadab, el padre de ustedes
  lexicon: HALOT
  rationale: El pronombre sufijo plural se vuelve «su» en español para un sujeto colectivo. Se conserva «Jehonadab» según la forma hebrea documentada en el texto base.
- source_word: וַתִּשְׁמְרוּ אֶת כָּל מִצְוֺתָיו
  english_pob_choice: and have kept all his commands
  chosen_spanish: y guardaron todos sus mandamientos
  alternatives_spanish:
  - y observaron todos sus mandamientos
  - y conservaron todos sus mandamientos
  lexicon: HALOT
  rationale: שׁמר aplicado a preceptos se traduce naturalmente como «guardar/observar». Aquí «mandamientos» refleja el plural intensivo de מִצְוֺתָיו en un contexto legal-covenantal; «mandatos» también sería posible, pero «mandamientos» suena más establecido en español bíblico.
- source_word: וַתַּעֲשׂוּ כְּכֹל אֲשֶׁר צִוָּה אֶתְכֶם
  english_pob_choice: and have done according to all that he commanded you
  chosen_spanish: y hicieron conforme a todo lo que les mandó
  alternatives_spanish:
  - y hicieron según todo lo que les mandó
  - y actuaron conforme a todo lo que les mandó
  lexicon: HALOT
  rationale: 'כְּכֹל expresa conformidad exacta: «conforme a todo». «Mandó» conserva el verbo de autoridad en forma directa y natural en español. El plural colectivo se mantiene en tercera persona plural.'
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: El texto hebreo usa el Tetragrama de forma explícita. Siguiendo la convención del proyecto, se translitera como «Yahvé» en lugar de sustituirlo por un título. En español, esta forma es la más estable dentro del POB y conserva el nombre propio del pacto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Título divino צְבָאוֹת
  english_pob_reading: of hosts
  chosen_spanish_reading: de los ejércitos
  alternative_spanish_readings:
  - de las huestes
  - de los ejércitos celestiales
  rationale: El hebreo expresa el título de Yahvé de manera honorífica y militar. En español, «de los ejércitos» comunica mejor que «de los hosts» y evita una transliteración semántica opaca. No se pierde el carácter majestuoso del título.
  doctrine_reference: Uso bíblico tradicional y claridad receptora
- issue: Sentido de מִצְוָה en la obediencia filial
  english_pob_reading: command/commands
  chosen_spanish_reading: mandato / mandamientos
  alternative_spanish_readings:
  - orden / órdenes
  - precepto / preceptos
  rationale: El contexto combina autoridad paterna y obediencia concreta. «Mandato» funciona para el singular de la orden inicial; «mandamientos» funciona para el plural de los preceptos mantenidos. Se conserva así la diferencia de número y la fuerza normativa del hebreo.
  doctrine_reference: Lexical coherence in legal-covenantal language
translation_notes:
  revision_awareness: El antecedente inglés está en filosofía optimal-equivalence y no requiere cambios textuales; la versión española sigue de cerca el valor semántico del hebreo y conserva la fórmula profética, el nombre divino y la estructura causal sin añadir contenido interpretativo.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה, conforme al estándar del proyecto.
  - Se evita «Señor» como sustituto del nombre divino.
  - Se mantiene el sentido colectivo de «la casa de los recabitas» con una formulación que suene natural en español.
  - Se conserva el contraste entre singular («mandato») y plural («mandamientos») donde el hebreo lo marca.
  - La nota al nombre propio cubre la variante conocida Jehonadab/Jonadab sin alterar el texto principal.
