    issue: «y no mueran» no refleja bien וְלֹא תָמֻתוּ
    rationale: 'El hebreo usa coordinación con valor de consecuencia/garantía: «y no morirán». En español, el subjuntivo «mueran» queda absorbido por «para que» y cambia el matiz hacia finalidad.'
  - severity: low
    issue: «traigan ... a mí» es menos idiomático que «tráiganme»
    rationale: «A mí» preserva directamente אֵלַי, pero en español natural el clítico («tráiganme») expresa la misma dirección con mejor fluidez. Es un ajuste estilístico, no una corrección obligatoria de sentido.
