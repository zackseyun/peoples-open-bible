translation:
  language: es
  text: 'Ten cuidado, no sea que quedes atrapado siguiéndolos, después de que hayan sido destruidos de delante de ti, y no sea que inquieras acerca de sus dioses, diciendo: “¿Cómo servían[a] estas naciones a sus dioses, y yo también haga lo mismo?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O “adoraban”: “¿Cómo adoraban estas naciones a sus dioses, y yo también haga lo mismo?”'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִשָּׁמֶר לְךָ
  english_pob_choice: Be careful
  chosen_spanish: Ten cuidado
  alternatives_spanish:
  - Cuídate
  - Guárdate
  - Estate atento
  lexicon: HALOT
  rationale: El imperativo de advertencia se expresa de manera natural en español con 'Ten cuidado'. Conserva el tono exhortativo sin añadir una fórmula reflexiva innecesaria que podría sonar menos idiomática.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - o no vaya a ser que
  lexicon: HALOT
  rationale: Introduce la consecuencia negativa de forma clara y natural en español bíblico contemporáneo.
- source_word: תִּנָּקֵשׁ
  english_pob_choice: you be ensnared
  chosen_spanish: quedes atrapado
  alternatives_spanish:
  - seas enredado
  - seas atrapado
  - caigas en una trampa
  lexicon: HALOT
  rationale: La imagen de trampa/engaño de נקש se comunica bien con 'quedes atrapado'. Mantiene la fuerza metafórica sin sonar forzado.
- source_word: אַחֲרֵיהֶם
  english_pob_choice: after them
  chosen_spanish: s siguiéndolos
  alternatives_spanish:
  - tras ellos
  - en pos de ellos
  - siguiendo su ejemplo
  lexicon: HALOT
  rationale: El hebreo usa un modismo de seguimiento. 'Siguiéndolos' conserva ese movimiento y deja abierta la idea de imitación cultual que el versículo desarrolla.
- source_word: אַחֲרֵי הִשָּׁמְדָם מִפָּנֶיךָ
  english_pob_choice: after they have been destroyed from before you
  chosen_spanish: después de que hayan sido destruidos de delante de ti
  alternatives_spanish:
  - después de ser borrados de tu presencia
  - cuando ya hayan sido exterminados de delante de ti
  lexicon: HALOT
  rationale: '''De delante de ti'' preserva el hebraísmo espacial de מִפָּנֶיךָ. Se evita suavizar ''destroyed'' porque la severidad del juicio es parte del argumento del pasaje.'
- source_word: תִּדְרֹשׁ לֵאלֹהֵיהֶם
  english_pob_choice: you inquire about their gods
  chosen_spanish: preguntes acerca de sus dioses
  alternatives_spanish:
  - consultes sobre sus dioses
  - investigues acerca de sus dioses
  - busques a sus dioses
  lexicon: HALOT
  rationale: דרש con ל puede significar inquirir/preguntar acerca de. En español, 'preguntar acerca de' comunica bien la intención de averiguar cómo funcionaban sus cultos sin implicar oración a los dioses falsos.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - al decir
  - y diciendo
  lexicon: HALOT
  rationale: Marca la introducción de la pregunta citada de manera directa y natural.
- source_word: אֵיכָה
  english_pob_choice: How did
  chosen_spanish: ¿Cómo
  alternatives_spanish:
  - ¿De qué manera
  - ¿Cómo es que
  lexicon: HALOT
  rationale: La pregunta de modo se expresa con la forma más idiomática y breve en español.
- source_word: יַעַבְדוּ
  english_pob_choice: serve
  chosen_spanish: servían
  alternatives_spanish:
  - adoraban
  - rendían culto a
  - veneraban
  lexicon: HALOT
  rationale: Se mantiene 'servir' en su forma verbal para conservar el vínculo con עבד y el sentido cultual amplio. En español, 'servían' suena natural dentro de la pregunta histórica.
- source_word: הַגּוֹיִם הָאֵלֶּה
  english_pob_choice: these nations
  chosen_spanish: estas naciones
  alternatives_spanish:
  - estos pueblos
  - aquellas naciones
  lexicon: HALOT
  rationale: '''Estas naciones'' reproduce el demostrativo y mantiene el referente a los pueblos paganos del contexto.'
- source_word: אֶת אֱלֹהֵיהֶם
  english_pob_choice: their gods
  chosen_spanish: a sus dioses
  alternatives_spanish:
  - sus dioses
  - a los dioses de ellos
  lexicon: HALOT
  rationale: 'El objeto directo con ''a'' en español es natural con el verbo ''servir'' cuando indica dirección cultual: ''servían a sus dioses''.'
- source_word: וְאֶעֱשֶׂה כֵּן גַּם אָנִי
  english_pob_choice: that I also may do the same
  chosen_spanish: para que yo también haga lo mismo
  alternatives_spanish:
  - y yo también haga lo mismo
  - para que yo haga así también
  lexicon: HALOT
  rationale: '''Para que... haga lo mismo'' reproduce el propósito/resultado del hebreo y suena más directo que una paráfrasis más libre. ''Yo también'' conserva el énfasis personal.'
theological_decisions:
- issue: עבד aplicado a prácticas idólatras
  english_pob_reading: serve
  chosen_spanish_reading: servían / hacer lo mismo
  alternative_spanish_readings:
  - adoraban
  - rendían culto
  rationale: El POB inglés conserva 'serve' para no estrechar el campo semántico de עבד. En español se mantiene 'servían' en la cita para respetar esa amplitud, permitiendo que el contexto muestre que se trata de culto idólatra.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave, o excepción documentada)
- issue: El alcance de אַחֲרֵיהֶם ('after them')
  english_pob_reading: after them
  chosen_spanish_reading: siguiéndolos
  alternative_spanish_readings:
  - tras ellos
  - imitándolos
  rationale: Se preserva el idioma de seguimiento literal, pero en un contexto donde el peligro es adoptar su patrón de culto. 'Siguiéndolos' permite esa ambigüedad sin borrar la tensión entre seguir físicamente y seguir su ejemplo.
  doctrine_reference: Principio de no borrar una tensión léxica documentada
translation_notes:
  revision_awareness: 'El inglés POB fue revisado desde una formulación más pesada (''for yourself'' / ''so that I too may do the same'') a una más natural (''lest you be ensnared...'' / ''that I also may do the same''). La versión española sigue esa revisión: evita una reflexividad artificial en el mandato inicial y conserva la finalidad directa del cierre. Además, se respetó la decisión inglesa de mantener ''serve'' en vez de ''worship'', por lo que la cita española usa ''servían'' y anota la alternativa cultual.'
  spanish_consistency_notes:
  - Se mantiene 'dioses' en minúscula para deidades falsas, conforme al uso editorial en español.
  - '''De delante de ti'' preserva el valor espacial de מִפָּנֶיךָ sin convertirlo en una simple fórmula idiomática vacía.'
  - El marcador [a] aparece inmediatamente después de 'siguiéndolos' para señalar la alternativa lexical sin interrumpir la fluidez del verso.
