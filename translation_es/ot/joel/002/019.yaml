base_translation:
  language: en
  yaml_path: translation/ot/joel/002/019.yaml
  text: Then Yahweh answered and said to his people[a], “Behold, I am sending to you the grain, the new wine, and the oil, and you will be satisfied with it[b]; and I will no longer make you a reproach among the nations.”
  footnotes:
  - marker: a
    text: Or “the oil,” likely olive oil; the Hebrew term refers to fresh oil as part of the standard agricultural triad of grain, wine, and oil.
    reason: lexical_alternative
  - marker: b
    text: Or “I will no longer make you an object of scorn among the nations.”
    reason: alternative_reading
