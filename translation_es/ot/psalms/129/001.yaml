translation:
  language: es
  text: Cántico de las subidas[a]. Mucho[b] me han afligido desde mi juventud—diga ahora Israel—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Cántico para las subidas». El hebreo מַעֲלוֹת puede referirse a subidas literales o funcionar como fórmula tradicional del título.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Muchas veces». El hebreo רַבַּת puede expresar tanto gran intensidad como repetición frecuente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁיר הַמַּעֲלוֹת
  english_pob_choice: A Song of Ascents
  chosen_spanish: Un cántico de ascensiones
  alternatives_spanish:
  - Un cántico de los ascensos
  - Un cántico de peregrinación
  lexicon: HALOT
  rationale: Conservo la fórmula tradicional del encabezamiento y el sustantivo plural 'ascensiones' para reflejar מַעֲלוֹת de manera literal y auditable. 'Peregrinación' explicita la función, pero va más allá del hebreo explícito.
- source_word: רַבַּת
  english_pob_choice: Greatly
  chosen_spanish: Mucho
  alternatives_spanish:
  - Grandemente
  - Muchas veces
  lexicon: HALOT
  rationale: El hebreo puede expresar intensidad o frecuencia repetida. 'Mucho' permite esa amplitud semántica en español sin decidir de antemano entre cantidad e intensidad; 'muchas veces' sería más interpretativo.
- source_word: צְרָר֣וּ/נִי
  english_pob_choice: they have afflicted me
  chosen_spanish: me han afligido
  alternatives_spanish:
  - me han oprimido
  - me han acosado
  lexicon: HALOT
  rationale: '''Afligido'' mantiene el registro lamentativo y no limita el verbo a opresión política o militar. Es una opción amplia, fiel al sentido hostil del verbo en este contexto.'
- source_word: מִ/נְּעוּרַ֑/י
  english_pob_choice: from my youth
  chosen_spanish: desde mi juventud
  alternatives_spanish:
  - desde mis años mozos
  - desde que era joven
  lexicon: HALOT
  rationale: Es la forma más natural y directa en español, y conserva el punto de inicio temporal del hebreo.
- source_word: יֹֽאמַר נָ֝א
  english_pob_choice: let Israel now say
  chosen_spanish: diga ahora Israel
  alternatives_spanish:
  - que diga ahora Israel
  - diga Israel, por favor
  lexicon: HALOT
  rationale: El imperativo/jusivo con נָא funciona como exhortación litúrgica. 'Ahora' transmite el valor discursivo de urgencia o inmediatez mejor que 'por favor', que sonaría cortés de manera engañosa.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  lexicon: HALOT
  rationale: Se conserva el nombre propio sin adaptación, como sujeto corporativo convocado en la confesión.
theological_decisions:
- issue: Voz individual y convocatoria comunitaria
  english_pob_reading: 'The psalmist''s first-person complaint is taken up as a communal/liturgical summons: ''let Israel now say.'''
  chosen_spanish_reading: La primera persona del lamento se mantiene, pero la cláusula final convoca a Israel como comunidad a decirlo.
  alternative_spanish_readings:
  - Resolver la voz como un individuo aislado
  - Explicar explícitamente la identificación comunitaria en el cuerpo del texto
  rationale: La línea hebrea conserva la tensión entre experiencia personal y apropiación corporativa. La traducción la deja visible sin resolverla en paráfrasis ni con nota explicativa innecesaria.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Se revisó el encabezamiento para conservar la fórmula tradicional sin forzar una explicación interpretativa en el texto principal; también se mantuvo abierta la ambigüedad de רַבַּת como intensidad o frecuencia, conforme al audit trail inglés.
  spanish_consistency_notes:
  - Se usa 'Israel' como nombre propio y sujeto colectivo, en paralelo al inglés POB.
  - Se mantiene 'afligido' en registro de lamento, evitando reducir el verbo a una sola forma de hostilidad.
  - '''Desde mi juventud'' sigue la preposición temporal del hebreo sin ampliación interpretativa.'
