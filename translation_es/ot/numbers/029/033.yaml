translation:
  language: es
  text: y su ofrenda de cereal y sus libaciones para los toros, para los carneros y para los corderos, según su número, según la ordenanza[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «según la norma prescrita» o «según la ordenanza para ellos».
    reason: lexical_alternative
lexical_decisions:
- source_word: מִנְחָתָם
  english_pob_choice: their grain offering
  chosen_spanish: su ofrenda vegetal
  alternatives_spanish:
  - su ofrenda de cereal
  - su ofrenda de grano
  - su oblación
  lexicon: HALOT
  rationale: En este contexto sacrificial, מִנְחָה designa la ofrenda acompañante de grano. «Ofrenda vegetal» preserva el valor cultual tradicional y evita restringir innecesariamente el material a «grano» cuando el español bíblico puede comunicar la ofrenda cereal/vegetal de manera clara.
- source_word: נִסְכֵּיהֶם
  english_pob_choice: their drink offerings
  chosen_spanish: sus libaciones
  alternatives_spanish:
  - sus ofrendas de bebida
  - sus derramamientos
  lexicon: HALOT
  rationale: נֶסֶךְ se refiere a una ofrenda derramada. «Libaciones» es el equivalente español culto y preciso; mantiene el sentido ritual sin perder naturalidad.
- source_word: לַפָּרִים
  english_pob_choice: for the bulls
  chosen_spanish: para los toros
  alternatives_spanish:
  - para los bueyes
  - para los novillos
  lexicon: HALOT
  rationale: פָּרִים aquí nombra el animal sacrificial. «Toros» es un equivalente natural en español bíblico para el plural de פָּר, y conserva la fuerza del listado sacrificial sin añadir el matiz de edad que no está explicitado en el hebreo.
- source_word: לָאֵילִם
  english_pob_choice: for the rams
  chosen_spanish: para los carneros
  alternatives_spanish:
  - para los ramos
  lexicon: HALOT
  rationale: אַיִל en este contexto sacrificial se traduce con precisión como «carnero». Es el término más natural y exacto en español para el animal del sacrificio.
- source_word: וְלַכְּבָשִׂים
  english_pob_choice: and for the lambs
  chosen_spanish: y para los corderos
  alternatives_spanish:
  - y para los borregos
  - y para los corderos machos
  lexicon: HALOT
  rationale: כֶּבֶשׂ se expresa bien en español como «cordero». Aunque el animal sacrificial puede ser macho, el hebreo no lo explicita aquí, así que no se sobreespecifica.
- source_word: בְּמִסְפָּרָם
  english_pob_choice: according to their number
  chosen_spanish: según su número
  alternatives_spanish:
  - conforme a su número
  - de acuerdo con su número
  lexicon: HALOT
  rationale: La frase indica correspondencia con la cantidad prescrita. «Según su número» conserva el paralelismo formal del hebreo y suena natural en español.
- source_word: כְּמִשְׁפָּטָם
  english_pob_choice: according to the ordinance
  chosen_spanish: según la ordenanza
  alternatives_spanish:
  - según el decreto
  - conforme al precepto
  - según la norma prescrita
  lexicon: HALOT
  rationale: מִשְׁפָּט aquí tiene sentido legal-cultual de norma establecida. «Ordenanza» preserva ese peso técnico mejor que «costumbre», y el singular refleja la revisión auditada del inglés POB, que entendió el sufijo como referido a la regla prescrita.
theological_decisions:
- issue: Sentido cultual de מִנְחָה y מִשְׁפָּט en una lista ritual
  english_pob_reading: grain offering ... according to the ordinance
  chosen_spanish_reading: ofrenda vegetal ... según la ordenanza
  alternative_spanish_readings:
  - ofrenda de cereal ... según el precepto
  - oblación ... conforme a la norma prescrita
  rationale: No se introduce una paráfrasis devocional amplia; se mantiene el carácter técnico de la secuencia ritual. «Ordenanza» conserva la dimensión prescrita/legal del texto, coherente con la lectura revisada del POB en inglés.
  doctrine_reference: Números 28–29; ley cultual de las ofrendas
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada en la frase final de «according to their ordinance» a «according to the ordinance», porque el sufijo hebreo singular se entiende como referido a la regla prescrita y no a los animales. La redacción española refleja esa revisión con «según la ordenanza» en singular, sin añadir un posesivo que no está respaldado por la revisión.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» fuera de este versículo porque no aparece el nombre divino en el hebreo de 29:33.
  - 'Se preserva el orden enumerativo del hebreo: ofrenda, libaciones, toros, carneros, corderos, número, ordenanza.'
  - Se usa un registro bíblico claro y contemporáneo, evitando arcaísmos innecesarios.
  - La nota al pie conserva la alternativa interpretativa documentada para מִשְׁפָּט, sin diluir el sentido técnico.
