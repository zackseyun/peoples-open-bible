  source_alignment_summary: 'El borrador sigue bien el griego en su estructura básica: διῆλθεν = «pasó por», πόλεσιν Ἰούδα = «las ciudades de Judá», ἐξωλόθρευσεν = «destruyó», ἀσεβεῖς = «los impíos», y ἀπέστρεψεν ὀργὴν ἀπὸ Ἰσραήλ = «apartó la ira de Israel». Sin embargo, la colocación de las notas no preserva fielmente la lógica del expediente inglés: la nota [a] se ancla en «Judá» pero en realidad comenta una alternativa para πόλεσιν («ciudades/poblaciones»), y la nota [b] se ancla en «ella» aunque comenta ἀσεβεῖς («impíos»). Además, falta la nota teológica sobre «ira», presente en el POB inglés.'
