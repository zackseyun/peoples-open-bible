revisions:
- from: 'Pero la casa de Israel se rebeló contra mí en el desierto. No anduvieron en mis estatutos, y rechazaron mis juicios[a], en los cuales si un hombre[b] los hace, vivirá por ellos[c]. Profanaron mucho mis sábados. Entonces dije: Derramaré mi furor sobre ellos en el desierto, para acabarlos.'
  to: Pero la casa de Israel se rebeló contra mí en el desierto. No anduvieron en mis estatutos, y rechazaron mis juicios[a], los cuales, si una persona los pone por obra, vivirá por ellos[b]. Profanaron gravemente mis sábados. Entonces dije que derramaría mi furor sobre ellos en el desierto[b], para ponerles fin.
  rationale: La revisión corrige la cláusula central para reflejar con fidelidad el hebreo y sonar natural en español, alineándose además con la revisión inglesa auditada que usa 'a person'. También restaura la sintaxis de intención reportada en 'Entonces dije que derramaría...' y eleva el registro de la frase final con 'para ponerles fin'. Se conserva la nota léxica sobre 'juicios' y la referencia intertextual a Levítico 18:5, anclada en la expresión de vida por obediencia.
  reviewer_model: gpt-5.4
