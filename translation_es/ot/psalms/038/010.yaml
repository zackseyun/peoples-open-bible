review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: vocativo divino con אֲדֹנָי, totalidad de «todo», exposición «delante de ti», y la idea de que el gemido no está escondido de Dios. Sin embargo, las notas al pie están mal ancladas: [a] en el texto va con «Señor», pero la nota correspondiente en inglés y en la evidencia léxica alternativa pertenece a תַּאֲוָתִי («mi deseo / mi anhelo»). Asimismo, [b] en el texto aparece tras «ti», pero la alternativa inglesa correspondiente es para וְאַנְחָתִי («mi gemido / mi suspirar»), no para נֶגְדְּךָ. También conviene ajustar «no te es oculto» a una formulación más directa y natural: «no está escondido de ti» o «no está oculto para ti»; esto preserva mejor la construcción מִמְּךָ + נִסְתָּרָה sin ambigüedad.'
  spanish_quality_summary: El español es claro y digno, pero la colocación de las notas crea confusión semántica. «Señor» y «todo mi deseo está delante de ti» son adecuados. «Mi gemido no te es oculto» es aceptable, pero suena algo más literario-forzado que «mi gemido no está escondido de ti», que además calca menos la estructura inglesa y se entiende mejor en español eclesial contemporáneo.
  glossary_alignment: 'Buen alineamiento general con la terminología del proyecto: אֲדֹנָי se traduce correctamente como «Señor» y no como «Yahvé». No hay conflicto con otros términos doctrinales clave. La principal falta no es terminológica sino de manejo de notas léxicas: debe preservarse la alternativa para «mi deseo» como «mi anhelo» y para «mi gemido» como «mi suspirar» o mejor «mi suspiro», con anclajes correctos.'
  issues:
  - severity: high
    issue: Las notas al pie están ancladas a las palabras equivocadas.
    rationale: La nota [a] en inglés corresponde a «my desire» (תַּאֲוָתִי), no a «Lord». La nota [b] corresponde a «my groaning» (וְאַנְחָתִי), no a «before you». Esto altera la trazabilidad del expediente POB y debe corregirse.
  - severity: medium
    issue: La redacción «no te es oculto» es menos natural y menos transparente que una construcción con «de ti/para ti».
    rationale: Aunque es defendible, el hebreo מִמְּךָ con נִסְתָּרָה se refleja más claramente con «no está escondido de ti» o «no está oculto para ti». Esto evita una formulación algo rígida y mantiene el sentido pasivo.
  - severity: low
    issue: La alternativa española «mi suspirar» no es la opción más natural para una nota léxica.
    rationale: Si se conserva una alternativa para וְאַנְחָתִי, «mi suspiro» suena más idiomático que «mi suspirar» en español general.
  - severity: low
    issue: 'Hay un error tipográfico/lingüístico en la justificación léxica: «адресо».'
    rationale: No afecta el texto bíblico, pero sí la calidad del registro explicativo.
  revised_spanish_text: Señor, todo mi deseo[a] está delante de ti, y mi gemido[b] no está escondido de ti.
