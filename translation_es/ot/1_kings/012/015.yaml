base_translation:
  language: en
  yaml_path: translation/ot/1_kings/012/015.yaml
  text: So the king did not listen to the people[a], for it was a turn of events from Yahweh[b], in order to establish his word that Yahweh had spoken by the hand of Ahijah the Shilonite to Jeroboam son of Nebat.
  footnotes:
  - marker: a
    text: Or 'for the cause was from the LORD.' The Hebrew סִבָּה can mean 'cause,' 'reason,' or a turn in circumstances.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'by the hand of Ahijah the Shilonite,' an idiom meaning 'through Ahijah the Shilonite.'
    reason: lexical_alternative
