base_translation:
  language: en
  yaml_path: translation/ot/lamentations/002/022.yaml
  text: You summoned my terrors from every side as on an appointed day[a], and on the day of Yahweh’s anger there was no survivor or remnant. Those whom I nurtured and raised[b], my enemy destroyed them.
  footnotes:
  - marker: a
    text: Or 'as on a feast day' / 'like a festival day'; the Hebrew compares the gathering of terrors to the assembling of people on an appointed festival occasion.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'my terrors from every side'; some understand this more broadly as 'those who terrorize me on every side.'
    reason: lexical_alternative
