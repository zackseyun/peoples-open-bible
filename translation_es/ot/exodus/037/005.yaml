translation:
  language: es
  text: Y puso las varas[a] en los anillos de los costados del arca, para llevar el arca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Varas» traduce el instrumento de transporte del arca; en español bíblico también puede decirse «barras» o «varales», pero «varas» conserva una buena combinación de claridad y familiaridad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֵא
  english_pob_choice: put
  chosen_spanish: puso
  alternatives_spanish:
  - introdujo
  - metió
  lexicon: HALOT
  rationale: En este contexto, el verbo no describe venir o traer, sino colocar físicamente las varas en los anillos. «Puso» conserva la acción concreta con un español natural y fiel.
- source_word: הַבַּדִּים
  english_pob_choice: the poles
  chosen_spanish: las varas[a]
  alternatives_spanish:
  - los postes
  - los palos de carga
  lexicon: HALOT
  rationale: Para los elementos de transporte del arca, «varas» es una opción bíblica y clara en español. Mantiene la función de carga sin sonar tan técnica o tan moderna como «postes».
- source_word: בַּטַּבָּעֹת
  english_pob_choice: into the rings
  chosen_spanish: en los anillos
  alternatives_spanish:
  - dentro de los anillos
  - en los aros
  lexicon: HALOT
  rationale: El hebreo usa la preposición ב con idea de inserción. En español, «en los anillos» comunica el lugar de colocación de manera natural; «anillos» reproduce el objeto metálico sin cambiar el sentido.
- source_word: עַל צַלְעֹת הָאָרֹן
  english_pob_choice: on the sides of the ark
  chosen_spanish: sobre los lados del arca
  alternatives_spanish:
  - a lo largo de los lados del arca
  - sobre los costados del arca
  lexicon: HALOT
  rationale: צלעות se refiere aquí a las partes laterales del arca. «Lados» es el equivalente más directo y claro; «costados» también sería posible, pero «lados» mantiene mejor la transparencia.
- source_word: הָאָרֹן
  english_pob_choice: the ark
  chosen_spanish: el arca
  alternatives_spanish:
  - el arca sagrada
  - el cofre
  lexicon: HALOT
  rationale: «Arca» es el término consagrado y preciso para este objeto del tabernáculo. «Cofre» sería menos técnico y menos estable en este contexto.
- source_word: לָשֵׂאת
  english_pob_choice: to carry
  chosen_spanish: para llevar
  alternatives_spanish:
  - para cargar
  - para portar
  lexicon: HALOT
  rationale: 'La forma infinitiva expresa finalidad: las varas se colocaron para que el arca pudiera transportarse. «Para llevar» es claro y natural en español; «portar» sería más formal, pero menos idiomático aquí.'
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y que existe alta concordancia con la fuente y la auditoría inglesa; por eso no se introducen variantes textuales ni ajustes interpretativos adicionales.
  spanish_consistency_notes:
  - Se mantiene el lenguaje concreto del objeto del arca y sus piezas de transporte sin sustituirlo por terminología eclesiástica ajena al texto.
  - «Arca» y «varas» conservan la correspondencia con el léxico del tabernáculo sin cargar el verso con glosas innecesarias.
  - El verbo «puso» preserva la acción idiomática de insertar/colocar sin sobretraducir el movimiento.
