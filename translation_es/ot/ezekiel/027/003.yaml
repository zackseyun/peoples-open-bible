translation:
  language: es
  text: 'Y di a Tiro, que habita en las entradas del mar, mercader de los pueblos a muchas costas[a]: Así dice el Señor Yahvé: Tiro, tú has dicho: «Yo soy perfecta en hermosura».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a muchas islas». El término hebreo puede referirse a islas o, más ampliamente, a tierras costeras marítimas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַרְתָּ לְצֹר
  english_pob_choice: and say to Tyre
  chosen_spanish: Y di a Tiro
  alternatives_spanish:
  - Y dirás a Tiro
  - Y dile a Tiro
  lexicon: HALOT
  rationale: El imperativo profético se expresa naturalmente con «di». Mantengo el nombre propio «Tiro» para la ciudad-persona del oráculo.
- source_word: הַיֹּשֶׁבֶת עַל מְבוֹאֹת יָם
  english_pob_choice: who dwells at the entrances of the sea
  chosen_spanish: que habita en las entradas del mar
  alternatives_spanish:
  - que vive en las entradas del mar
  - que está asentada en las entradas del mar
  - que mora en las entradas del mar
  lexicon: HALOT
  rationale: «Habita» conserva el valor durativo del participio y el sujeto femenino de Tiro. «Entradas del mar» mantiene la imagen concreta de accesos marítimos sin suavizarla a una mera ubicación general.
- source_word: רֹכֶלֶת הָעַמִּים
  english_pob_choice: trader of the peoples
  chosen_spanish: mercader de los pueblos
  alternatives_spanish:
  - comerciante de los pueblos
  - traficante de los pueblos
  lexicon: HALOT
  rationale: «Mercader» comunica la actividad comercial con dignidad literaria en español y corresponde al participio femenino. «De los pueblos» conserva el sentido étnico-plural de עַמִּים.
- source_word: אֶל אִיִּים רַבִּים
  english_pob_choice: to many coastlands
  chosen_spanish: hacia muchas costas
  alternatives_spanish:
  - a muchas islas
  - hacia muchas islas
  - a muchas costas
  lexicon: HALOT
  rationale: Opto por «costas» para reflejar el amplio horizonte marítimo del término, siguiendo la alternativa contextual de «coastlands». «Hacia» preserva el valor direccional del hebreo.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: Yahvé, el Señor
  alternatives_spanish:
  - el Señor Yahvé
  - Yahvé Dios
  - el Señor Dios
  lexicon: HALOT
  rationale: Se preserva el nombre divino Yahvé según la terminología del proyecto, y «el Señor» refleja el título אֲדֹנָי. La combinación evita la repetición artificial y mantiene la distinción entre título y nombre.
- source_word: כְּלִילַת יֹפִי
  english_pob_choice: perfect in beauty
  chosen_spanish: perfecta en hermosura
  alternatives_spanish:
  - la perfección de la hermosura
  - completa en hermosura
  - perfecta en belleza
  lexicon: HALOT
  rationale: «Perfecta en hermosura» conserva el sentido de culminación estética y la autodeclaración orgullosa del texto. «Hermosura» suena más literario en español bíblico que «belleza» y evita una formulación demasiado abstracta.
theological_decisions:
- issue: Renderización del Tetragrámaton en la fórmula אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: Yahvé, el Señor
  alternative_spanish_readings:
  - el Señor Yahvé
  - Yahvé el Señor
  rationale: El hebreo distingue entre el título אֲדֹנָי y el nombre propio יְהוִה. En español, «Yahvé, el Señor» conserva ambos elementos y evita la convención de ocultar el nombre divino bajo una máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de אִיִּים רַבִּים en contexto profético-marítimo
  english_pob_reading: many coastlands
  chosen_spanish_reading: muchas costas
  alternative_spanish_readings:
  - muchas islas
  - costas marítimas
  rationale: El hebreo permite tanto «islas» como un sentido más amplio de territorios costeros. «Costas» conserva esa amplitud geográfica y evita restringir indebidamente el oráculo a islas literales.
  doctrine_reference: 'HALOT: אִיִּים como islas / tierras costeras'
- issue: 'Autopresentación de Tiro: «I am perfect in beauty»'
  english_pob_reading: I am perfect in beauty
  chosen_spanish_reading: Yo soy perfecta en hermosura
  alternative_spanish_readings:
  - Soy perfecta en belleza
  - Yo soy la perfección de la hermosura
  rationale: Se mantiene el tono de jactancia y la primera persona del texto. «Perfecta en hermosura» preserva la afirmación absoluta sin añadir matices interpretativos.
  doctrine_reference: 'HALOT: כְּלִילַת יֹפִי'
translation_notes:
  revision_awareness: 'La redacción sigue el texto hebreo masorético y toma en cuenta el audit trail inglés: se conserva el movimiento direccional de אֶל, la lectura amplia de אִיִּים como costas/islas, y la fórmula divina con el nombre Yahvé en lugar de una máscara litúrgica. También se refleja la revisión inglesa que prefería un sustantivo comercial más natural sin perder la fuerza del participio femenino.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוִה, acorde con la política del proyecto.
  - Se mantuvo la personificación femenina de Tiro mediante «habita» y «perfecta».
  - «Mercader» se emplea como término comercial bíblico natural en español, sin rebajar el valor semántico de רֹכֶלֶת.
  - «Costas» preserva la amplitud semántica de אִיִּים mejor que una restricción exclusiva a «islas».
