  lexicon: número cardinal
  rationale: Corresponde al valor cardinal directo del hebreo.
- source_word: מִכְסָם
  english_pob_choice: their tribute
  chosen_spanish: su tributo
  alternatives_spanish:
  - su contribución
  - su impuesto
  - su cuota
  lexicon: HALOT
  rationale: En este contexto es la porción tasada del botín apartada para Yahvé. «Tributo» es idiomático en español y mantiene la idea de porción asignada.
- source_word: לַיהוָה
  english_pob_choice: for Yahweh
  chosen_spanish: para Yahvé
