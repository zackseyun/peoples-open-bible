base_translation:
  language: en
  yaml_path: translation/ot/leviticus/019/029.yaml
  text: Do not profane your daughter by making her a prostitute[c][b][a], lest the land become prostituted and the land be filled with depravity.
  footnotes:
  - marker: a
    text: Or, 'by prostituting her' or 'to make her commit prostitution.' The Hebrew verb is causative.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'lest the land commit prostitution.' The phrase speaks metaphorically of the community becoming corrupted.
    reason: lexical_alternative
  - marker: c
    text: Or, 'lewdness' or 'wickedness.' The Hebrew term denotes outrageous moral depravity, often in a sexual context.
    reason: lexical_alternative
