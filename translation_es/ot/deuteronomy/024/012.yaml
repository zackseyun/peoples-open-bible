translation:
  language: es
  text: Y si es un hombre pobre[a], no te dormirás con su prenda en tu poder.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no te acostarás con su prenda», es decir, no debes retener durante la noche el objeto que él entregó como seguridad de un préstamo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: And if
  chosen_spanish: Y si
  alternatives_spanish:
  - Pero si
  - Si
  lexicon: HALOT
  rationale: La conjunción hebrea mantiene la continuidad condicional. En español, 'Y si' conserva mejor esa unión con la instrucción anterior sin volver la frase rígida.
- source_word: אִישׁ
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - persona
  lexicon: HALOT
  rationale: El hebreo es masculino singular. 'Hombre' reproduce ese rasgo léxico y sigue la decisión de no neutralizar innecesariamente el referente.
- source_word: עָנִי
  english_pob_choice: poor
  chosen_spanish: pobre
  alternatives_spanish:
  - necesitado
  - afligido
  lexicon: HALOT
  rationale: En este contexto legal, el término señala pobreza o vulnerabilidad económica. 'Pobre' es la opción más natural y directa en español.
- source_word: לֹא תִשְׁכַּב
  english_pob_choice: you shall not sleep
  chosen_spanish: no te acostarás
  alternatives_spanish:
  - no dormirás
  - no te echarás
  lexicon: HALOT
  rationale: El verbo hebreo puede expresar acostarse/irse a dormir. En español legal y bíblico, 'no te acostarás' conserva el sentido de pasar la noche y suena más natural que 'dormirás' en una prohibición de este tipo.
- source_word: בַּעֲבֹטוֹ
  english_pob_choice: with his pledge
  chosen_spanish: con su prenda
  alternatives_spanish:
  - con su garantía
  - con su colateral
  - con lo que dio en prenda
  lexicon: HALOT
  rationale: עֲבוֹט es el objeto tomado en garantía de un préstamo. 'Prenda' comunica bien la idea jurídica en español y evita el tecnicismo menos transparente de 'colateral'.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo masorético y refleja el audit trail inglés: el condicional se mantiene, el sujeto masculino singular no se neutraliza y el objeto legal se expresa con un término español claro para ''prenda''. No se detectaron revisiones sustantivas en el pasaje de referencia.'
  spanish_consistency_notes:
  - Se mantuvo la terminología jurídica con 'prenda' para עֲבוֹט, coherente con el valor de seguridad/garantía del contexto.
  - Se preservó el matiz condicional inicial con 'Y si', equivalente natural de וְאִם.
  - La prohibición se formuló con 'no te acostarás' para reflejar una acción nocturna sin introducir elementos no presentes en el hebreo.
