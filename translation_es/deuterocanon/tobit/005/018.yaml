translation:
  language: es
  text: 'Pero Ana, su madre, lloró y le dijo a Tobit: «¿Por qué mandaste lejos a nuestro hijo? ¿No es él el bastón de nuestra mano[a] cuando entra y sale delante de nosotros?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de modo más interpretativo, «nuestro apoyo» para «el bastón de nuestra mano». El texto principal conserva la metáfora del griego.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔκλαυσεν
  english_pob_choice: wept
  chosen_spanish: lloró
  alternatives_spanish:
  - lloró amargamente
  - sollozó
  lexicon: BDAG
  rationale: El aoristo de κλαίω expresa llanto/lamento. En español, «lloró» comunica de forma natural la aflicción materna sin añadir intensidad no explicitada por el griego.
- source_word: ἐξαπέστειλας
  english_pob_choice: send ... away
  chosen_spanish: enviaste lejos
  alternatives_spanish:
  - enviaste away
  - despediste
  - mandaste lejos
  lexicon: BDAG
  rationale: El compuesto indica enviar fuera o lejos de uno. «Enviaste lejos» conserva la idea de alejamiento y evita un calco rígido.
- source_word: τὸ παιδίον ἡμῶν
  english_pob_choice: our child
  chosen_spanish: nuestro niño
  alternatives_spanish:
  - nuestro hijo
  - nuestro pequeño
  lexicon: BDAG
  rationale: παιδίον puede referirse a niño/niño pequeño. «Nuestro niño» mantiene el tono afectivo de la madre sin especificar más de lo que el sustantivo exige.
- source_word: ῥάβδος τῆς χειρὸς ἡμῶν
  english_pob_choice: the staff of our hand
  chosen_spanish: el bastón de nuestra mano
  alternatives_spanish:
  - el bastón de nuestras manos
  - el apoyo de nuestra mano
  lexicon: LSJ
  rationale: La expresión es metafórica. «Bastón» conserva la imagen de sostén que muestra el griego; «de nuestra mano» mantiene la construcción concreta sin sustituirla por una paráfrasis interpretativa.
- source_word: ἐν τῷ εἰσπορεύεσθαι αὐτὸν καὶ ἐκπορεύεσθαι
  english_pob_choice: as he goes in and goes out
  chosen_spanish: cuando entra y sale
  alternatives_spanish:
  - en su entrar y salir
  - al entrar y salir
  - cuando va y viene
  lexicon: BDAG
  rationale: La construcción infinitiva expresa movimiento habitual. «Cuando entra y sale» reproduce el sentido idiomático con fluidez natural en español.
- source_word: ἐνώπιον ἡμῶν
  english_pob_choice: before us
  chosen_spanish: delante de nosotros
  alternatives_spanish:
  - ante nosotros
  - en nuestra presencia
  lexicon: BDAG
  rationale: «Delante de nosotros» conserva el valor espacial/relacional de la expresión y suena natural en español contemporáneo.
translation_notes:
  revision_awareness: 'La versión española sigue la lectura revisada del inglés auditado: se evita añadir puntuación que rompa la unidad del símil final y se mantiene la metáfora de la «mano»/«bastón» en lugar de suavizarla.'
  spanish_consistency_notes:
  - Se mantuvo el tono afectivo y lamentativo del contexto con léxico natural en español.
  - Se preservó la metáfora central sin convertirla en paráfrasis explicativa en el cuerpo principal.
  - La secuencia verbal «entra y sale» refleja el idioma bíblico del movimiento habitual de manera clara para lectores hispanohablantes.
