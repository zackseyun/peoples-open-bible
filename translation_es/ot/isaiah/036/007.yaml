translation:
  language: es
  text: 'Pero si me dices: “En Yahvé nuestro Dios confiamos”, ¿no es él aquel cuyos lugares altos y cuyos altares Ezequías ha quitado, y dijo a Judá y a Jerusalén: “Ante este altar se postrarán[a]”?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más interpretativa, “adorarán ante este altar”. El verbo hebreo denota específicamente postrarse o inclinarse.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Mas si
  lexicon: HALOT
  rationale: En este discurso de desafío, la conjunción introduce una réplica condicional con matiz adversativo; “Pero si” conserva mejor esa fuerza que un simple “Y si”.
- source_word: תֹאמַר אֵלַי
  english_pob_choice: you say to me
  chosen_spanish: me dices
  alternatives_spanish:
  - me dices a mí
  - me respondes
  lexicon: HALOT
  rationale: La forma breve “me dices” expresa de manera natural la amenaza directa del hablante, sin perder el valor de hablar dirigido a él.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como transliteración de YHWH, conforme al criterio del proyecto, en vez de sustituirlo por un título.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - el Dios nuestro
  - nuestro Dios y Padre
  lexicon: HALOT
  rationale: La construcción posesiva de primera persona plural se vierte de modo directo y natural en español.
- source_word: בָּטָחְנוּ
  english_pob_choice: we trust
  chosen_spanish: confiamos
  alternatives_spanish:
  - hemos confiado
  - nos apoyamos
  lexicon: HALOT
  rationale: Aunque el hebreo está en perfecto, en el discurso directo el presente español transmite mejor la confianza alegada por los hablantes.
- source_word: הֲלוֹא
  english_pob_choice: is it not
  chosen_spanish: ¿no es
  alternatives_spanish:
  - ¿acaso no es
  - ¿no es acaso
  lexicon: HALOT
  rationale: La pregunta retórica se conserva con la forma usual en español, manteniendo la expectativa de respuesta afirmativa.
- source_word: הוּא אֲשֶׁר
  english_pob_choice: he whose
  chosen_spanish: quien
  alternatives_spanish:
  - el que
  - aquel que
  lexicon: HALOT
  rationale: En español, la relación se expresa más naturalmente con un relativo simple; el posesivo se recupera en las frases siguientes (“sus lugares altos”, “sus altares”).
- source_word: הֵסִיר
  english_pob_choice: has removed
  chosen_spanish: ha quitado
  alternatives_spanish:
  - ha removido
  - ha apartado
  lexicon: HALOT
  rationale: “Ha quitado” comunica la acción de retirar de forma clara y natural; conserva el efecto polémico del discurso del asirio.
- source_word: בָּמֹתָיו
  english_pob_choice: his high places
  chosen_spanish: sus lugares altos
  alternatives_spanish:
  - sus altos lugares
  - sus santuarios en las alturas
  lexicon: HALOT
  rationale: “Lugares altos” es el término estable para במה en contexto cultual; “sus” reproduce el sufijo posesivo del hebreo y del inglés auditado.
- source_word: מִזְבְּחֹתָיו
  english_pob_choice: his altars
  chosen_spanish: sus altares
  alternatives_spanish:
  - sus sacrificaderos
  lexicon: HALOT
  rationale: La traducción estándar de מזבח es “altar”, y el posesivo mantiene el paralelo con “sus lugares altos”.
- source_word: וַיֹּאמֶר
  english_pob_choice: and said
  chosen_spanish: y dijo
  alternatives_spanish:
  - y habló
  - y ordenó
  lexicon: HALOT
  rationale: Se sigue la revisión auditada que prefirió un verbo finito; “y dijo” refleja la secuencia narrativa con mayor fidelidad formal que un participio.
- source_word: לִיהוּדָה וְלִירוּשָׁלַם
  english_pob_choice: to Judah and to Jerusalem
  chosen_spanish: a Judá y a Jerusalén
  alternatives_spanish:
  - para Judá y para Jerusalén
  - a Judá y Jerusalén
  lexicon: HALOT
  rationale: Se conserva la doble destinación con una preposición natural en español, sin recargar innecesariamente la frase.
- source_word: לִפְנֵי הַמִּזְבֵּחַ הַזֶּה
  english_pob_choice: before this altar
  chosen_spanish: delante de este altar
  alternatives_spanish:
  - ante este altar
  - en presencia de este altar
  lexicon: HALOT
  rationale: “Delante de” reproduce bien la idea espacial de לפני y, en contexto de postración, resulta idiomático en español.
- source_word: תִּשְׁתַּחֲוּ
  english_pob_choice: you shall bow down
  chosen_spanish: se postrarán
  alternatives_spanish:
  - se inclinarán
  - adorarán
  lexicon: HALOT
  rationale: El verbo hebreo denota inclinarse/prosternarse; “postrarse” preserva el gesto físico que el auditable inglés conservó con “bow down”. El plural español sigue el destinatario colectivo (“Judá y Jerusalén”).
theological_decisions:
- issue: La acusación de Senaquerib/Rabsaces sobre la reforma de Ezequías
  english_pob_reading: Render the speech as the Assyrian spokesman's polemical characterization; the removed sites are framed as 'his high places and his altars' in the quoted accusation, not as an endorsement by the narrator.
  chosen_spanish_reading: 'Mantener la cita como una acusación hostil: “sus lugares altos y sus altares” pertenece al discurso del asirio, no a una evaluación del narrador.'
  alternative_spanish_readings:
  - 'Suavizar la posesión y volverla impersonal: “los lugares altos y los altares”'
  - Expresar la acción como si el texto aprobara la reforma
  rationale: La voz citada debe conservar su carga polémica sin resolver la tensión teológica. El español mantiene los posesivos para reflejar el hebreo y deja claro que se trata de una réplica adversaria.
  doctrine_reference: Preserve theological tension rather than resolve it; do not import doctrinal claims the text does not make.
- issue: Cita del verbo de postración en contexto de adoración
  english_pob_reading: The Hebrew verb specifically denotes bowing down/prostrating oneself; English keeps 'bow down' and notes the interpretive option 'worship'.
  chosen_spanish_reading: Usar “se postrarán” en el texto principal, con la comprensión física/cultual del gesto.
  alternative_spanish_readings:
  - adorarán
  - se inclinarán
  rationale: En español, “postrarse” conserva mejor la concreción del verbo original y evita cerrar prematuramente la alternativa interpretativa de “adorar”.
  doctrine_reference: Preserve lexical tension; do not flatten physical prostration into a merely abstract worship term.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador [a] aparezca exactamente en el texto español anclado en la frase correspondiente. La formulación principal sigue de cerca el registro formal auditado y la nota preserva la alternativa interpretativa documentada por el POB inglés.
  spanish_consistency_notes:
  - Se usa Yahvé para YHWH conforme al criterio del proyecto.
  - Se mantiene “Dios” para אֱלֹהִים y “altar/altares” para מִזְבֵּחַ/מִזְבְּחֹת.
  - 'Se conserva el paralelismo posesivo de la acusación: “sus lugares altos... sus altares”.'
  - El plural “se postrarán” concuerda con el destinatario colectivo ‘Judá y Jerusalén’.
