revisions:
- from: Así que Lot escogió para sí toda la llanura del Jordán[a], y Lot se fue hacia el oriente; y se separaron el uno del otro.
  to: Así Lot escogió para sí toda la llanura del Jordán[a], y Lot partió hacia el oriente; y se separaron cada uno de su hermano.
  rationale: Se ajusta «se fue» a «partió» para reflejar mejor נסע en un registro bíblico natural, y se sustituye «el uno del otro» por «cada uno de su hermano» para conservar la fuerza distributiva y el lenguaje de parentesco del hebreo, en línea con las decisiones léxicas y teológicas documentadas. La nota sobre «desde el oriente» se mantiene sin cambios porque está bien formulada y correctamente anclada.
