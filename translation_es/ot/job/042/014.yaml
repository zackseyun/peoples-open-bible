translation:
  language: es
  text: Nombró a la primera Jemimá, a la segunda Quezia y a la tercera Keren-hapuc[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El nombre probablemente significa «cuerno de antimonio» o «cuerno de pintura para ojos», en referencia a un recipiente cosmético o a un pigmento cosmético.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: He named
  chosen_spanish: Llamó
  alternatives_spanish:
  - Nombró
  - Puso por nombre
  lexicon: HALOT
  rationale: En español, en este contexto de asignación de nombres a hijas, «llamó» reproduce de manera natural la acción de dar nombre sin sonar forzado. «Nombró» también es posible, pero «llamó» conserva mejor el giro bíblico breve del hebreo.
- source_word: שֵׁם
  english_pob_choice: named
  chosen_spanish: Llamó ... a
  alternatives_spanish:
  - Puso nombre a
  - Nombró a
  lexicon: HALOT
  rationale: El hebreo usa la construcción con «nombre»; en español, la estructura verbal con complemento introducido por «a» es la forma más idiomática para expresar esa acción.
- source_word: הָאַחַת
  english_pob_choice: the first
  chosen_spanish: la primera
  alternatives_spanish:
  - la una
  - la primera hija
  lexicon: HALOT
  rationale: En una lista ordinal, «la primera» es la correspondencia natural y precisa para la secuencia de nombres.
- source_word: יְמִימָה
  english_pob_choice: Jemimah
  chosen_spanish: Jemimá
  alternatives_spanish:
  - Yemimá
  - Yemimah
  lexicon: transliteración de nombre propio
  rationale: Es un nombre propio; se translitera, y se adapta la acentuación al español para facilitar la lectura. La forma tradicional inglesa es reconocible, pero en español la tilde ayuda a la pronunciación.
- source_word: הַשֵּׁנִית
  english_pob_choice: the second
  chosen_spanish: la segunda
  alternatives_spanish:
  - la otra
  - la segunda hija
  lexicon: HALOT
  rationale: Es una ordinal simple en la serie nominal, por lo que «la segunda» es la opción directa y clara.
- source_word: קְצִיעָה
  english_pob_choice: Keziah
  chosen_spanish: Quezia
  alternatives_spanish:
  - Kezía
  - Cezía
  lexicon: transliteración de nombre propio
  rationale: Es un nombre propio; se translitera. «Quezia» conserva el sonido aproximado y evita una forma demasiado anglicizada, manteniéndose legible en español.
- source_word: הַשְּׁלִישִׁית
  english_pob_choice: the third
  chosen_spanish: la tercera
  alternatives_spanish:
  - la última
  - la tercera hija
  lexicon: HALOT
  rationale: La ordinal del hebreo se expresa de forma natural con «la tercera».
- source_word: קֶרֶן הַפּוּךְ
  english_pob_choice: Keren-happuch
  chosen_spanish: Cuerno de antimonio
  alternatives_spanish:
  - Cuerno de pintura para ojos
  - Keren-hapuc
  lexicon: HALOT
  rationale: 'Aquí la evidencia léxica permite traducir el sentido transparente del compuesto, no solo transliterarlo. Dado que el propio audit trail inglés preserva en nota la posibilidad de «horn of antimony» / «horn of eye paint», el español publica el valor semántico más claro: un recipiente o contenedor de cosmético, aquí expresado como «cuerno de antimonio».'
- source_word: קֶרֶן
  english_pob_choice: horn
  chosen_spanish: Cuerno
  alternatives_spanish:
  - Cuerno de
  - Corneta
  lexicon: HALOT
  rationale: El sustantivo básico significa «cuerno»; en compuestos nominales se conserva su valor literal.
- source_word: הַפּוּךְ
  english_pob_choice: antimony / eye paint
  chosen_spanish: de antimonio
  alternatives_spanish:
  - de pintura para ojos
  - de cosmético
  lexicon: HALOT
  rationale: El término apunta al material o pigmento cosmético. «De antimonio» mantiene la concreción histórica y la nota semántica del original, sin sobreexplicar en el texto principal.
theological_decisions:
- issue: Tratamiento del nombre compuesto final frente a transliteración pura
  english_pob_reading: Keren-happuch likely means 'horn of antimony' or 'horn of eye paint,' referring to a cosmetic container or cosmetic pigment.
  chosen_spanish_reading: Cuerno de antimonio
  alternative_spanish_readings:
  - Keren-hapuc
  - Cuerno de pintura para ojos
  rationale: 'No hay una tensión doctrinal, pero sí una decisión semántica relevante: el hebreo ofrece un nombre con sentido transparente. Dado que la POB inglesa deja abierta la nota léxica, el español puede reflejar el significado del compuesto en el texto principal y no solo en transliteración. La opción elegida conserva el valor literal y el referente cosmético sugerido por la nota.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El texto base y la revisión más reciente muestran acuerdo alto y sin cambios necesarios; por eso se mantiene la estructura del verso y solo se adapta la formulación al español con decisiones léxicas explícitas. No se introducen cambios textuales adicionales respecto del contenido hebreo o del audit trail inglés, salvo la elección de traducir el sentido del último nombre en lugar de transliterarlo.
  spanish_consistency_notes:
  - Se usa un español neutral y readable para iglesia, evitando calcos como «él nombró el nombre de».
  - Los nombres propios se transliteran con una forma española legible cuando no hay una convención estable distinta.
  - La nota al pie se ancla en el último nombre porque ahí se concentra la ambigüedad léxica preservada por la POB inglesa.
