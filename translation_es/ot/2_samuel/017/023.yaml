base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/017/023.yaml
  text: When Ahithophel saw that his counsel had not been followed[a], he saddled his donkey, arose, and went to his house in his city. He set his house in order, then hanged himself and died[c][b]; and he was buried in his father's tomb.
  footnotes:
  - marker: a
    text: Or 'his counsel had not been carried out.' The Hebrew is literally 'his counsel was not done.'
    reason: lexical_alternative
  - marker: b
    text: Or 'He set his house in order.' The Hebrew more literally says 'he gave orders to his house/household.'
    reason: lexical_alternative
  - marker: c
    text: Or 'strangled himself.' The verb can denote death by hanging or strangling; in context it describes Ahithophel's suicide.
    reason: lexical_alternative
