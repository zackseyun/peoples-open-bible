revisions:
- from: Así que ella lo hizo dormir sobre sus rodillas[a], y llamó a un hombre[b], y le rapó las siete trenzas de su cabeza[c]. Entonces comenzó a afligirlo, y se le fue la fuerza.
  to: Entonces ella lo hizo dormir sobre sus rodillas[a], y llamó a un hombre[b], y le rapó los siete mechones de la cabeza[c]. Entonces comenzó a afligirlo, y se le fue la fuerza.
  rationale: Se corrige la inconsistencia de la nota b, se reemplaza «trenzas» por «mechones» para reflejar mejor la amplitud léxica de מַחְלְפוֹת conforme al POB inglés, y se suaviza «Así que» a «Entonces» para un flujo narrativo más fiel y natural en español.
