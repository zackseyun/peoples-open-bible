translation:
  language: es
  text: Y es como un esposo que sale de su cámara nupcial[a]; se alegra como un guerrero al correr una ruta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "de su dosel" o "de su cámara nupcial". El hebreo חֻפָּה puede referirse a un dosel de bodas o a una cámara nupcial.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוּא
  english_pob_choice: And it is
  chosen_spanish: Y es
  alternatives_spanish:
  - Y él es
  - Y está
  lexicon: WLC/HALOT
  rationale: El pronombre retoma al sol del versículo anterior. En español, un sujeto neutro explícito como "es" comunica mejor el referente impersonal sin forzar "él"; se conserva la conjunción inicial "Y".
- source_word: כְּחָתָן
  english_pob_choice: like a bridegroom
  chosen_spanish: como un novio
  alternatives_spanish:
  - como un esposo en bodas
  - como un desposado
  lexicon: HALOT
  rationale: חָתָן denota al hombre en relación con la boda; "novio" es natural y digno en español, y expresa la imagen festiva con claridad. "Novio" también evita un arcaísmo innecesario.
- source_word: יֹצֵא
  english_pob_choice: coming out
  chosen_spanish: que sale
  alternatives_spanish:
  - que está saliendo
  - que emerge
  lexicon: HALOT
  rationale: El participio expresa acción vivida y presente. "Que sale" reproduce bien esa inmediatez sin añadir matiz interpretativo; encaja con la estructura poética española.
- source_word: מֵחֻפָּתוֹ
  english_pob_choice: from his wedding chamber
  chosen_spanish: de su cámara nupcial
  alternatives_spanish:
  - de su pabellón nupcial
  - de su lecho nupcial
  - de su dosel
  lexicon: HALOT
  rationale: חֻפָּה puede referir al dosel/canopia matrimonial o a la cámara nupcial. Elegí "cámara nupcial" por ser una solución comprensible y digna en español, manteniendo abierta la ambigüedad del hebreo entre espacio y cobertura ceremonial.
- source_word: יָשִׂישׂ
  english_pob_choice: it rejoices
  chosen_spanish: se alegra
  alternatives_spanish:
  - se regocija
  - se goza
  lexicon: HALOT
  rationale: El verbo expresa júbilo exuberante. "Se alegra" es idiomático y suficientemente fuerte; preserva el tono celebrativo sin inflar el registro.
- source_word: כְּגִבּוֹר
  english_pob_choice: like a warrior
  chosen_spanish: como un guerrero
  alternatives_spanish:
  - como un héroe
  - como un valiente
  lexicon: HALOT
  rationale: גִּבּוֹר puede ser guerrero, fuerte o héroe poderoso. "Guerrero" conserva la imagen vigorosa y atlética que prepara la comparación con correr un recorrido, y evita volverla meramente moral o abstracta.
- source_word: לָרוּץ
  english_pob_choice: to run
  chosen_spanish: para correr
  alternatives_spanish:
  - a correr
  - para ir corriendo
  lexicon: HALOT
  rationale: El infinitivo simple de רוץ es "correr". "Para correr" transmite la finalidad del movimiento y mantiene la construcción natural en español.
- source_word: אֹרַח
  english_pob_choice: a course
  chosen_spanish: una carrera
  alternatives_spanish:
  - un camino
  - una senda
  - un recorrido
  lexicon: HALOT
  rationale: אֹרַח significa senda, camino o curso. Dado el contexto del sol atravesando el cielo, "una carrera" comunica de manera idiomática el trayecto dinámico sin imponer la posesión que el hebreo no explicita. Aunque "curso" sería más literal, en español puede sonar menos natural aquí.
theological_decisions:
- issue: Metáfora del sol como corredor/guerrero
  english_pob_reading: The sun is compared to a bridegroom and to a warrior running a course.
  chosen_spanish_reading: El sol es comparado con un novio que sale de su cámara nupcial y con un guerrero que corre una carrera.
  alternative_spanish_readings:
  - El sol se compara con un novio...
  - El sol sale como un guerrero...
  rationale: Conservar ambas imágenes mantiene la fuerza poética del hebreo y la continuidad con el contexto astronómico del salmo. No se suaviza la metáfora ni se convierte en una paráfrasis más general.
  doctrine_reference: Salmo 19:1-6; poesía sapiencial sobre la creación
translation_notes:
  revision_awareness: 'La redacción inglesa revisada cambió "its course" por "a course" para evitar un posesivo no presente en el hebreo. Por eso el español evita también cualquier posesivo añadido y usa una construcción abierta: "una carrera".'
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - '"Novio" se usa aquí como equivalente de חָתָן por claridad y naturalidad poética; no implica una decisión doctrinal distinta.'
  - '"Cámara nupcial" preserva la ambigüedad de חֻפָּה entre espacio y dosel ceremonial; la nota explica la alternativa sin fijarla como única.'
  - La comparación final se traduce con un sustantivo genérico de trayecto/curso para respetar el hebreo sin introducir posesión inexistente.
