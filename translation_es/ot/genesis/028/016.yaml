translation:
  language: es
  text: 'Entonces Jacob despertó de su sueño y dijo: «Ciertamente[a] Yahvé está en este lugar, y yo no lo sabía».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Ciertamente Yahvé está en este lugar». La frase expresa el reconocimiento repentino de Jacob de la presencia de Yahvé allí.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּיקַץ
  english_pob_choice: awoke
  chosen_spanish: despertó
  alternatives_spanish:
  - se despertó
  - despertó de su sueño
  lexicon: HALOT
  rationale: El verbo expresa que Jacob pasa del sueño a la vigilia. En español, «despertó» es natural, solemne y fiel; «se despertó» es posible, pero menos conciso. Se mantiene la idea narrativa de despertar del sueño sin añadir matices.
- source_word: מִשְּׁנָתוֹ
  english_pob_choice: from his sleep
  chosen_spanish: de su sueño
  alternatives_spanish:
  - de su dormir
  - de su descanso
  lexicon: HALOT
  rationale: El sustantivo significa sueño/sleep. «De su sueño» reproduce el sentido de manera clara y idiomática en español. «Descanso» sería demasiado interpretativo.
- source_word: אָכֵן
  english_pob_choice: Surely
  chosen_spanish: ¡Ciertamente!
  alternatives_spanish:
  - ¡En verdad!
  - ¡De veras!
  lexicon: HALOT
  rationale: La partícula marca reconocimiento repentino y enfático. «Ciertamente» conserva la fuerza afirmativa sin exagerar ni suavizar el impacto de la reacción de Jacob.
- source_word: יֵשׁ
  english_pob_choice: is
  chosen_spanish: está
  alternatives_spanish:
  - hay
  - existe
  lexicon: HALOT
  rationale: Aquí la partícula existencial comunica presencia real. En español, «está» comunica mejor la presencia de Yahvé en el lugar que un simple «hay».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del hebreo, conforme al criterio del proyecto. «Yahvé» mantiene la transparencia auditiva y evita la sustitución por un título.
- source_word: בַּמָּקוֹם הַזֶּה
  english_pob_choice: in this place
  chosen_spanish: en este lugar
  alternatives_spanish:
  - en este sitio
  - aquí
  lexicon: HALOT
  rationale: La frase señala el lugar concreto donde Jacob dormía y recibió el sueño. «En este lugar» es claro, natural y suficientemente preciso.
- source_word: וְאָנֹכִי
  english_pob_choice: and I
  chosen_spanish: y yo
  alternatives_spanish:
  - pero yo
  - yo, en cambio
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis y contraste con la presencia de Yahvé. «Y yo» preserva esa simpleza enfática sin introducir una oposición más fuerte de la que exige el texto.
- source_word: לֹא יָדָעְתִּי
  english_pob_choice: I did not know it
  chosen_spanish: no lo sabía
  alternatives_spanish:
  - no lo conocía
  - no me daba cuenta
  lexicon: HALOT
  rationale: El hebreo expresa falta de conocimiento o conciencia previa; en contexto, se refiere a que Jacob no había percibido la presencia de Yahvé allí. «No lo sabía» comunica esa ignorancia previa de forma natural y fiel.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se sigue la decisión doctrinal del POB de transliterar el Tetragrama en vez de sustituirlo por un título. En español, «Yahvé» conserva el nombre propio y la transparencia del texto original.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de presencia divina en יֵשׁ יְהוָה בַּמָּקוֹם הַזֶּה
  english_pob_reading: Yahweh is in this place
  chosen_spanish_reading: Yahvé está en este lugar
  alternative_spanish_readings:
  - Yahvé existe en este lugar
  - en este lugar está Yahvé
  rationale: El texto expresa una toma de conciencia repentina de la presencia real de Yahvé en ese lugar. «Está» conserva la presencia efectiva sin convertir la frase en una mera afirmación abstracta de existencia.
  doctrine_reference: 'DOCTRINE.md: Presence language — keep concrete locative force where the source indicates it'
translation_notes:
  revision_awareness: El contexto inglés muestra alta concordancia y sin cambios recientes. La presente versión sigue la lectura auditada «Yahweh is in this place» con la decisión española equivalente «Yahvé está en este lugar», manteniendo el énfasis de reconocimiento repentino y la referencia explícita al nombre divino.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה conforme al criterio del proyecto.
  - 'Se mantiene el tono narrativo sobrio con verbos simples: «despertó», «dijo», «sabía».'
  - La frase «no lo sabía» conserva la referencia implícita a la presencia de Yahvé sin añadir explicación interpretativa en el texto principal.
  - La nota al pie marca la alternativa hebrea para clarificar el matiz de reconocimiento súbito sin alterar la traducción principal.
