translation:
  language: es
  text: ¡Ah, Señor Yahvé[b]! He aquí, tú mismo hiciste los cielos y la tierra con tu gran poder y con tu brazo extendido. Nada hay demasiado difícil para ti[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «Nada hay demasiado maravilloso para ti». El verbo hebreo puede expresar algo extraordinario o fuera de la capacidad de alguien.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «Señor Yahvé». Se mantiene «Señor Yahvé» para conservar ambos títulos divinos de forma transparente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲהָהּ
  english_pob_choice: Ah
  chosen_spanish: ¡Ah!
  alternatives_spanish:
  - ¡Ay!
  - ¡Ah, Señor!
  lexicon: HALOT
  rationale: Es una interjección de emoción intensa en la oración. «¡Ah!» conserva el tono exclamativo sin cargarlo específicamente con lamento.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: Lord GOD
  chosen_spanish: Señor Yahvé
  alternatives_spanish:
  - Señor Dios
  - Señor Yahvéh
  lexicon: HALOT
  rationale: El hebreo combina el título אֲדֹנָי con el nombre divino יְהוִה. En español, «Señor Yahvé» preserva ambos elementos de manera transparente y evita el enmascaramiento litúrgico de YHWH.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Mira bien
  lexicon: HALOT
  rationale: La partícula llama la atención sobre lo que sigue. «Mira» es natural en español moderno y mantiene el impulso deíctico sin sonar arcaizante.
- source_word: אַתָּה
  english_pob_choice: you yourself
  chosen_spanish: tú mismo
  alternatives_spanish:
  - tú
  - tú mismo, precisamente
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis junto al verbo. «Tú mismo» reproduce ese énfasis de forma natural en español.
- source_word: עָשִׂיתָ
  english_pob_choice: made
  chosen_spanish: hiciste
  alternatives_spanish:
  - has hecho
  - creaste
  lexicon: HALOT
  rationale: El verbo básico es «hacer». Aquí el perfecto simple español transmite bien la acción creadora realizada por Dios sin forzar el léxico a «crear».
- source_word: הַשָּׁמַיִם וְאֶת הָאָרֶץ
  english_pob_choice: the heavens and the earth
  chosen_spanish: los cielos y la tierra
  alternatives_spanish:
  - el cielo y la tierra
  - los cielos y la tierra
  lexicon: HALOT
  rationale: Se conserva el merismo bíblico de totalidad cósmica con el plural «los cielos», que sigue de cerca la forma hebrea y es inteligible en español.
- source_word: בְּכֹחֲךָ הַגָּדוֹל
  english_pob_choice: by your great power
  chosen_spanish: con tu gran poder
  alternatives_spanish:
  - por tu gran poder
  - mediante tu gran poder
  lexicon: HALOT
  rationale: La preposición בְּ aquí expresa medio o instrumento. «Con tu gran poder» es idiomático en español y mantiene la fuerza instrumental.
- source_word: וּבִזְרֹעֲךָ הַנְּטוּיָה
  english_pob_choice: by your outstretched arm
  chosen_spanish: con tu brazo extendido
  alternatives_spanish:
  - con tu brazo tendido
  - por tu brazo extendido
  lexicon: HALOT
  rationale: La imagen antropomórfica bíblica del poder divino se expresa de forma clara y reconocible en español como «brazo extendido».
- source_word: לֹא יִפָּלֵא מִמְּךָ כָּל דָּבָר
  english_pob_choice: Nothing is too difficult for you
  chosen_spanish: Nada hay demasiado difícil para ti
  alternatives_spanish:
  - Nada te es imposible
  - Nada es demasiado maravilloso para ti
  - No hay cosa que te sea difícil
  lexicon: HALOT
  rationale: El nifal de פלא puede sugerir algo extraordinario, difícil o fuera del alcance de alguien. En este contexto, la idea es que ningún asunto está más allá del poder de Dios; «demasiado difícil» comunica bien ese sentido en español sin borrar la posible tensión semántica con «maravilloso/extraordinario».
theological_decisions:
- issue: Tratamiento del nombre divino יְהוִה dentro del compuesto אֲדֹנָי יְהוִה
  english_pob_reading: Lord GOD
  chosen_spanish_reading: Señor Yahvé
  alternative_spanish_readings:
  - Señor Dios
  - Señor el SEÑOR
  rationale: La política del proyecto pide renderizar יהוה como «Yahvé» en el texto principal. Aquí, al aparecer unido a אֲדֹנָי, mantener «Señor Yahvé» preserva la doble designación divina sin recurrir a una sustitución opaca.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahweh'
- issue: Sentido de לֹא יִפָּלֵא מִמְּךָ כָּל דָּבָר
  english_pob_reading: Nothing is too difficult for you
  chosen_spanish_reading: Nada hay demasiado difícil para ti
  alternative_spanish_readings:
  - Nada te es imposible
  - Nada es demasiado maravilloso para ti
  rationale: La afirmación sostiene la omnipotencia de Yahvé en el marco de la oración de Jeremías. «Demasiado difícil» es una equivalencia clara y a la vez conserva la amplitud del hebreo sin reducirlo a una formulación más filosófica.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #3'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió un registro más formal para הִנֵּה; por eso se eligió «Mira» en lugar de una paráfrasis más libre, y se mantuvo la estructura breve y solemne del enunciado. También se integró la decisión auditada de conservar la idea de «too difficult» en vez de neutralizarla por completo con una simple imposibilidad.
  spanish_consistency_notes:
  - Se usa «Yahvé» en lugar de «SEÑOR» para el Tetragrama, conforme al estándar del proyecto.
  - Se conserva el merismo «los cielos y la tierra» para mantener el alcance total de la creación.
  - «Brazo extendido» sigue el campo bíblico tradicional sin sustituirlo por una expresión más explicativa.
  - La exclamación inicial se mantiene breve para respetar el tono orante del hebreo.
