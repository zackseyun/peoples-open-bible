  yaml_path: translation/ot/psalms/109/014.yaml
  text: May the guilt of his fathers be remembered before Yahweh[c][b][a], and may the sin of his mother not be blotted out.
  footnotes:
  - marker: a
    text: Or 'the iniquity of his fathers.' The Hebrew עָוֹן can mean iniquity, guilt, or the liability arising from sin.
    reason: lexical_alternative
  - marker: b
    text: Or 'his forefathers' or 'his ancestors'; Hebrew literally 'his fathers.'
    reason: lexical_alternative
  - marker: c
    text: Or 'may the sin of his mother not be erased.'
    reason: lexical_alternative
