    rationale: En español, «despojar» puede entenderse como quitar pertenencias, mientras que el contexto y la auditoría inglesa apuntan a desposeer/expulsar/apoderarse de ellos en sentido de conquista. «Los desposeerá» refleja mejor la decisión principal.
  - severity: low
