revisions:
- from: Pero ustedes se han levantado contra la casa de mi padre hoy[a], y han matado a sus hijos, setenta hombres, sobre una sola piedra, y han hecho rey a Abimelec, el hijo de su sierva[b], sobre los dirigentes de Siquem, porque él es su hermano.
  to: Pero ustedes se han levantado contra la casa de mi padre hoy, y han matado a sus hijos, setenta hombres, sobre una sola piedra, y han hecho a Abimelec, el hijo de su sierva[a], rey sobre los dirigentes de Siquem, porque él es su hermano.
  rationale: Se elimina la nota mal anclada e innecesaria, se conserva la nota léxica importante sobre אֲמָתוֹ, y se suaviza la construcción de entronización para que suene más natural en español sin apartarse del hebreo ni del POB inglés.
