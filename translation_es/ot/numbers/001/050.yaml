review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido global del hebreo: contraste inicial («Pero tú»), comisión de los levitas, responsabilidad sobre el tabernáculo, sus objetos y todo lo asociado, transporte del tabernáculo, servicio cultual y campamento alrededor. Sin embargo, «ministrarán a él» no suena natural en español y no expresa bien el objeto/sentido locativo del hebreo כפי שרתו; en español debe reformularse como servicio prestado al tabernáculo con una expresión idiomática y cultualmente adecuada.'
  spanish_quality_summary: La redacción es mayormente clara y digna, pero «pon a los levitas sobre» es algo torpe en español, y «ministrarán a él» es poco idiomático. «Utensilios» es aceptable, aunque algo más estrecho que «enseres» o «objetos». Conviene una reparación menor para mejorar naturalidad sin perder la literalidad ni la terminología cultual.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Tabernáculo» para מִשְׁכָּן es correcto. No aparecen términos como Yahvé/Mesías que activen otras reglas. La decisión cultual sobre שרת debe mantenerse con «ministrar» o equivalente de servicio sagrado, pero en un giro español natural.
  issues:
  - severity: medium
    issue: «ministrarán a él» es antinatural en español bíblico contemporáneo
    rationale: Aunque intenta conservar el sufijo objeto, en español esa construcción suena forzada. El hebreo יְשָׁרְתֻהוּ expresa servicio cultual prestado respecto del tabernáculo; «ministrarán en él» o «lo atenderán» comunican mejor el sentido sin perder el matiz sagrado.
  - severity: low
    issue: «pon a los levitas sobre» es menos natural que «pon a los levitas a cargo de»
    rationale: La repetición de עַל sí marca esfera de responsabilidad, pero en español «poner sobre» aplicado a personas y responsabilidad suena rígido. «Pon a los levitas a cargo del tabernáculo..., de todos sus utensilios...» conserva bien la función administrativa.
  revised_spanish_text: Pero tú, pon a los levitas a cargo del tabernáculo[a] del testimonio, y de todos sus utensilios, y de todo lo que le pertenece. Ellos llevarán el tabernáculo y todos sus utensilios, y ministrarán en él[b], y acamparán alrededor del tabernáculo.
  revised_footnotes:
