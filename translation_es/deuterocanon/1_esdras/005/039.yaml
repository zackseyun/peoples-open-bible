translation:
  language: es
  text: Y fue llamado por su nombre[a]. Y entre estos[b], los que buscaron su registro genealógico en el registro y no fue hallado, fueron excluidos de servir como sacerdotes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fue nombrado por su nombre». La cláusula griega es breve y el referente inmediato no queda completamente explicitado solo en este versículo.
    reason: lexical_alternative
  - marker: b
    text: Es decir, entre los que estaban verificando su genealogía en el registro oficial; al no encontrarse allí, quedaron descalificados para el servicio sacerdotal.
    reason: cultural_note
lexical_decisions:
- source_word: ἐκλήθη
  english_pob_choice: was called
  chosen_spanish: fue llamado
  alternatives_spanish:
  - fue nombrado
  - fue designado
  lexicon: LSJ
  rationale: El pasivo de καλέω con la frase siguiente sobre el nombre indica identificación por nombre, no convocatoria. «Fue llamado» conserva la relación directa con el griego y es natural en español.
- source_word: ἐπὶ τῷ ὀνόματι αὐτοῦ
  english_pob_choice: by his name
  chosen_spanish: por su nombre
  alternatives_spanish:
  - en su nombre
  - después de su nombre
  lexicon: LSJ
  rationale: La construcción expresa que fue identificado o nombrado en relación con su nombre. «Por su nombre» mantiene la concisión del griego y evita una paráfrasis excesiva.
- source_word: ἐζητήθησαν
  english_pob_choice: were searched for
  chosen_spanish: buscaron
  alternatives_spanish:
  - fueron buscados
  - fueron investigados
  lexicon: LSJ
  rationale: El contexto exige que ellos mismos buscaran en el registro su genealogía; por eso el español activo refleja mejor la revisión documental que el pasivo inglés, sin perder el sentido de búsqueda/consulta.
- source_word: τῆς γενικῆς γραφῆς
  english_pob_choice: the genealogical record
  chosen_spanish: su registro genealógico
  alternatives_spanish:
  - el registro genealógico
  - el documento genealógico
  lexicon: LSJ
  rationale: γραφῆ aquí apunta a un documento o registro genealógico en el contexto sacerdotal. «Registro genealógico» es preciso y claro; el posesivo «su» enlaza naturalmente con «los que buscaron».
- source_word: ἐν τῷ καταλοχισμῷ
  english_pob_choice: in the enrollment
  chosen_spanish: en el enrolamiento
  alternatives_spanish:
  - en la inscripción
  - en el registro
  lexicon: LSJ
  rationale: καταλοχισμός describe la acción de inscribir o enrolar en una lista. «Enrolamiento» conserva el valor administrativo del término sin volverlo militar en exceso.
- source_word: μὴ εὑρεθείσης
  english_pob_choice: was not found
  chosen_spanish: no fue hallado
  alternatives_spanish:
  - no se encontró
  - no fue encontrado
  lexicon: LSJ
  rationale: La forma impersonal/pasiva se expresa de modo fluido en español. «No fue hallado» mantiene la idea de que el registro no apareció al verificarlo.
- source_word: ἐχωρίσθησαν
  english_pob_choice: were excluded
  chosen_spanish: fueron excluidos
  alternatives_spanish:
  - fueron separados
  - fueron apartados
  lexicon: LSJ
  rationale: En este contexto administrativo-genealógico el verbo describe descalificación para el servicio sacerdotal. «Fueron excluidos» comunica con claridad el efecto práctico.
- source_word: τοῦ ἱερατεύειν
  english_pob_choice: from serving as priests
  chosen_spanish: de servir como sacerdotes
  alternatives_spanish:
  - del sacerdocio
  - de ministrar como sacerdotes
  lexicon: LSJ
  rationale: El infinitivo expresa función/servicio sacerdotal más que solo estatus abstracto. «Servir como sacerdotes» conserva ese matiz funcional.
theological_decisions:
- issue: Naturaleza de la exclusión sacerdotal
  english_pob_reading: administrative-genealogical disqualification, not a doctrinal statement about priesthood in general
  chosen_spanish_reading: descalificación administrativa y genealógica para el servicio sacerdotal
  alternative_spanish_readings:
  - expulsión definitiva del sacerdocio
  - separación ritual del sacerdocio
  rationale: El texto trata de la verificación de un registro genealógico y de la consecuencia administrativa de no hallarlo. No debe ampliarse a una afirmación doctrinal más fuerte que la del pasaje.
  doctrine_reference: Preservar la tensión textual; no introducir conclusiones doctrinales que el versículo no afirma.
translation_notes:
  revision_awareness: He seguido el pasaje griego como ancla principal y he tenido en cuenta la revisión del inglés que ajustó el sujeto a quienes buscaban el registro genealógico, no a quienes eran buscados. Por eso el español mantiene el matiz activo de la búsqueda y la consecuencia administrativa de no hallar el registro.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general cuando corresponda en otros textos, pero este versículo no contiene el nombre divino.
  - Se mantiene «sacerdotes» para ἱερατεύειν porque el infinitivo describe el servicio sacerdotal, no simplemente el cargo abstracto.
  - «Enrolamiento» se eligió por su valor administrativo; en contextos militares futuros podría preferirse otra solución si el griego lo exigiera.
