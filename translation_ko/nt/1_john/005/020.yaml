id: 1JN.5.20
reference: 1 John 5:20
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: οἴδαμεν δὲ ὅτι ὁ υἱὸς τοῦ θεοῦ ἥκει, καὶ δέδωκεν ἡμῖν διάνοιαν ἵνα ⸀γινώσκωμεν τὸν ἀληθινόν· καὶ ἐσμὲν ἐν τῷ ἀληθινῷ, ἐν τῷ υἱῷ αὐτοῦ Ἰησοῦ Χριστῷ. οὗτός ἐστιν ὁ ἀληθινὸς θεὸς καὶ ζωὴ αἰώνιος.
base_translation:
  language: en
  yaml_path: translation/nt/1_john/005/020.yaml
  text: And we know that the Son of God has come and has given us understanding so that we may know the True One; and we are in the True One[a], in his Son Jesus Messiah. This one is the true God and eternal life.
  footnotes:
  - marker: a
    text: Or, 'This one is the true God and eternal life.' The demonstrative may refer specifically to Jesus Messiah, though some understand it to refer to 'the True One' (the Father) in the preceding clause.
    reason: alternative_reading
translation:
  language: ko
  text: 그리고 우리는 압니다 — 하나님의 아들이 오셨고, 우리에게 깨달음을 주셔서 우리가 참되신 분을 알게 하셨다는 것을. 그리고 우리는 참되신 분 안에 있으니, 곧 그분의 아들 예수 메시아 안에 있습니다. 이분이 참 하나님이시며 영원한 생명이십니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: διάνοιαν
  english_pob_choice: understanding
  chosen_korean: 깨달음
  alternatives_korean:
  - 분별
  - 지각
  - 이해
  lexicon: BDAG
  rationale: διάνοια는 「사고·이해·분별의 능력」. 본 문맥에서 영적 분별을 가리키므로 「깨달음」으로 옮긴다.
- source_word: ὁ ἀληθινός
  english_pob_choice: the True One
  chosen_korean: 참되신 분
  alternatives_korean:
  - 참되신 자
  - 진실하신 분
  lexicon: BDAG
  rationale: ἀληθινός는 「원형적·실재적」 — 거짓 신들과 대비되는 참 신. 「참되신 분」으로 칭호적 무게를 살린다.
