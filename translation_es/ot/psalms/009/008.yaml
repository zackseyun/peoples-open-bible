translation:
  language: es
  text: Pero Yahvé está entronizado para siempre[a]; ha establecido su trono para juicio[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «se sienta»; la traducción «está entronizado» hace explícita la fuerza real del verbo en contexto de trono.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «ha establecido su trono para justicia».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיהוָה
  english_pob_choice: But Yahweh
  chosen_spanish: Pero Yahvé
  alternatives_spanish:
  - Yahvé
  - Mas Yahvé
  lexicon: WLC/HALOT
  rationale: El hebreo abre con un giro adversativo marcado por וַ; en español, «Pero» conserva el contraste con el contexto inmediato. Se mantiene «Yahvé» según la terminología del proyecto para el nombre divino, en lugar de ocultarlo con un título genérico.
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  lexicon: HALOT
  rationale: La expresión denota duración perpetua. «Para siempre» es la forma natural y fiel en español contemporáneo, sin debilitar la idea de permanencia continua.
- source_word: יֵשֵׁב
  english_pob_choice: sits enthroned
  chosen_spanish: reina
  alternatives_spanish:
  - está sentado en su trono
  - se sienta entronizado
  - está entronizado
  lexicon: HALOT
  rationale: El verbo literalmente es «sentarse», pero en contexto de trono expresa realeza en ejercicio. «Reina» comunica la función real sin volver torpe la frase; se conserva la idea de entronización en el conjunto de la línea con «su trono».
- source_word: כּוֹנֵן
  english_pob_choice: has established
  chosen_spanish: ha establecido
  alternatives_spanish:
  - ha preparado
  - ha afirmado
  - estableció
  lexicon: HALOT
  rationale: El verbo indica hacer firme o fijar. El perfecto «ha establecido» refleja una acción ya realizada con efecto permanente, como en el audit trail inglés.
- source_word: לַמִּשְׁפָּט
  english_pob_choice: for judgment
  chosen_spanish: para juicio
  alternatives_spanish:
  - para justicia
  - para el juicio
  lexicon: HALOT
  rationale: מִשְׁפָּט admite «juicio» y «justicia». Aquí el trono aparece como sede de acción judicial, por lo que «para juicio» preserva ese sentido legal inmediato; no se absorbe la ambigüedad, porque el inglés POB también la documenta.
- source_word: כִּסְאוֹ
  english_pob_choice: his throne
  chosen_spanish: su trono
  alternatives_spanish:
  - el trono de él
  - su asiento real
  lexicon: HALOT
  rationale: Se traduce directamente el posesivo y el sustantivo. «Su trono» es claro, natural y mantiene la imagen regia del hebreo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahveh
  rationale: El texto hebreo usa el Tetragrámaton directamente; según la pauta del proyecto, se debe preservar como «Yahvé» en el texto principal, no enmascararlo con «SEÑOR».
  doctrine_reference: 'Project terminology defaults: יהוה / YHWH -> "Yahvé" in the main Spanish text'
- issue: Valor semántico de יֵשֵׁב en contexto de trono
  english_pob_reading: sits enthroned
  chosen_spanish_reading: reina
  alternative_spanish_readings:
  - está sentado en su trono
  - está entronizado
  rationale: La imagen hebrea es la de realeza estable y activa. «Reina» es una equivalencia funcional que comunica el sentido real sin perder la referencia al trono, especialmente al ir acompañada de «su trono».
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence'
- issue: 'Ambigüedad משפט: juicio/justicia'
  english_pob_reading: for judgment
  chosen_spanish_reading: para juicio
  alternative_spanish_readings:
  - para justicia
  rationale: El inglés POB documenta la alternativa «for justice». En español, «juicio» conserva la función judicial del verso y mantiene visible la tensión semántica con «justicia», que sigue siendo una lectura posible pero menos inmediata en este contexto.
  doctrine_reference: HALOT; English POB footnote b
translation_notes:
  revision_awareness: Se siguió el texto hebreo WLC con apoyo del audit trail inglés. No se aplicaron revisiones posteriores al pasaje; el inglés vigente permanece sin cambios, con acuerdo alto entre controles. La versión española conserva la alternancia semántica documentada entre «juicio» y «justicia» mediante nota, y explicita la fuerza regia de יֵשֵׁב sin depender de una traducción mecánica.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme a la terminología del proyecto para el Tetragrámaton.
  - «Para siempre» mantiene el valor durativo de לְעוֹלָם en registro natural.
  - «Juicio» se eligió por el contexto forense del trono; la alternativa «justicia» queda documentada en nota.
  - El estilo es sobrio y bíblico, pero en español moderno, evitando calcos innecesarios.
