    rationale: διεγείρασα rige directamente «el razonamiento femenino»; el añadido «en sí» no está en el griego ni en el inglés auditado, y en español endurece innecesariamente la frase.
  - severity: low
    issue: «les decía» puede debilitar la transición narrativa inmediata
    rationale: λέγουσα πρὸς αὐτούς introduce el discurso subsiguiente; en este contexto «les dijo» suena más natural y más ceñido a la secuencia puntual del relato.
