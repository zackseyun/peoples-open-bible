review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja correctamente la secuencia narrativa hebrea: Moisés tomó la mitad de la sangre, la puso en recipientes y la otra mitad la lanzó contra el altar. Conserva bien la fuerza de זָרַק con «arrojó ... contra el altar» y respeta el sentido partitivo de חֲצִי הַדָּם.'
  spanish_quality_summary: El texto es claro y legible, pero «vasijas» es demasiado amplio para בָּאַגָּנֹת en este contexto ritual y pierde la precisión lograda por el inglés «basins». «Cuencos» o «tazones» serían posibles, pero «vasijas» puede evocar recipientes de muy diversa clase y forma. Además, «la otra mitad de la sangre» introduce «otra», ausente en el hebreo, aunque no altera gravemente el sentido.
  glossary_alignment: 'No hay términos del glosario mayor implicados aquí. La decisión clave es lexical: mantener un verbo fuerte para זָרַק y usar un término español más preciso para אַגָּנֹת. «Arrojó contra el altar» está bien alineado con la justificación auditada; «vasijas» no representa tan bien el valor de recipiente/bacín/cuenco para líquidos en contexto sacrificial.'
  issues:
  - severity: medium
    issue: «vasijas» es demasiado general para בָּאַגָּנֹת
    rationale: El inglés auditado eligió «basins» por adecuación contextual. En español, «vasijas» puede referirse a casi cualquier recipiente, incluso de almacenaje, y no comunica bien el tipo de recipiente usado para recoger/contener sangre en un rito. «Lebrillos» sería regional; «cuencos» o «tazones» son más naturales; «recipientes» es claro pero algo genérico. «Cuencos» ofrece mejor equilibrio entre precisión y legibilidad.
  - severity: low
    issue: «la otra mitad de la sangre» añade un matiz no expreso
    rationale: El hebreo repite «y la mitad de la sangre». «La otra mitad» es comprensible y natural, pero añade una relación contrastiva implícita. Puede simplificarse a «y la mitad de la sangre» sin perder naturalidad.
  revised_spanish_text: Moisés tomó la mitad de la sangre y la puso en cuencos[a], y la mitad de la sangre la arrojó contra el altar.
  revised_footnotes:
  - marker: a
    text: O «tazones». El hebreo אַגָּנֹת designa recipientes para contener líquido; «cuencos» se eligió como término claro y natural en este contexto ritual.
    reason: lexical_alternative
  revision_rationale: Se revisa «vasijas» a «cuencos» para reflejar mejor אַגָּנֹת en contexto sacrificial y acercarse a la precisión del audit trail inglés («basins») sin usar un término poco natural o regional. También se elimina «otra» para seguir más de cerca la repetición hebrea.
