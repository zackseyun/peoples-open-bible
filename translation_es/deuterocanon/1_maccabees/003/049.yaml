translation:
  language: es
  text: Y trajeron las vestiduras sacerdotales, las primicias y los diezmos; y presentaron a los nazireos[a], que habían cumplido sus días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que habían cumplido el tiempo de su voto». El griego dice literalmente: «que habían cumplido los días», un idiomatismo para terminar el período prescrito del voto nazareo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤνεγκαν
  english_pob_choice: they brought
  chosen_spanish: trajeron
  alternatives_spanish:
  - llevaron
  - presentaron
  lexicon: LSJ
  rationale: El aoristo de φέρω aquí expresa llevar algo a un lugar o hacer que llegue allí. «Trajeron» es natural en español y conserva el sentido de traslado hacia una مقصد cultual sin introducir matices ceremoniales no explícitos.
- source_word: τὰ ἱμάτια τῆς ἱερωσύνης
  english_pob_choice: the priestly garments
  chosen_spanish: las vestiduras del sacerdocio
  alternatives_spanish:
  - las vestiduras sacerdotales
  - las prendas del sacerdocio
  lexicon: LSJ
  rationale: La expresión se refiere a prendas vinculadas con el servicio sacerdotal. «Vestiduras del sacerdocio» mantiene el carácter técnico y resulta más natural que un calco rígido; además evita el tono excesivamente eclesiástico de «vestimentas».
- source_word: τὰ πρωτογεννήματα
  english_pob_choice: the firstfruits
  chosen_spanish: las primicias
  alternatives_spanish:
  - los primeros frutos
  - la primera cosecha
  lexicon: LSJ
  rationale: En contexto cultual junto con diezmos, el término apunta a las ofrendas de primer producto dedicadas a Dios. «Primicias» es el equivalente bíblico establecido en español y conserva el valor cultual.
- source_word: τὰς δεκάτας
  english_pob_choice: the tithes
  chosen_spanish: los diezmos
  alternatives_spanish:
  - las décimas partes
  lexicon: LSJ
  rationale: «Diezmos» es el término bíblico estándar para δεκάται y comunica con claridad la ofrenda del diez por ciento.
- source_word: ἤγειραν
  english_pob_choice: they brought forward
  chosen_spanish: trajeron delante
  alternatives_spanish:
  - presentaron
  - sacaron a relucir
  - hicieron comparecer
  lexicon: LSJ
  rationale: Literalmente el verbo puede ser «levantar», pero con personas en este contexto indica hacerlas aparecer o presentarlas públicamente. «Trajeron delante» preserva la acción de ponerlas a la vista sin sugerir resurrección ni simple despertar.
- source_word: τοὺς Ναζιραίους
  english_pob_choice: the Nazirites
  chosen_spanish: los nazireos
  alternatives_spanish:
  - los nazareos
  - los que habían hecho voto de nazireato
  lexicon: LSJ
  rationale: Se conserva el término técnico transliterado para preservar la categoría religiosa específica. «Nazireos» es comprensible en español bíblico y evita reemplazar el término por una paráfrasis explicativa en el texto principal.
- source_word: οἳ ἐπλήρωσαν τὰς ἡμέρας
  english_pob_choice: who had completed their days
  chosen_spanish: que habían cumplido sus días
  alternatives_spanish:
  - que habían completado sus días
  - que habían cumplido el tiempo de su voto
  lexicon: LSJ
  rationale: La frase griega es un idiomatismo para haber terminado el período prescrito del voto nazareo. «Cumplido sus días» conserva la cercanía formal al griego y funciona en español; la nota explica el sentido idiomático.
theological_decisions:
- issue: Término técnico Ναζιραίους y su relación con el voto nazareo
  english_pob_reading: Nazirites
  chosen_spanish_reading: nazireos
  alternative_spanish_readings:
  - los que habían hecho voto de nazireato
  rationale: La referencia es a una categoría ritual específica de la Torá, no a una descripción genérica. Mantener la transliteración preserva la institución histórica-religiosa y evita perder la fuerza técnica del término.
  doctrine_reference: Números 6; principio POB de primacía del texto original y conservación de términos técnicos cuando aportan precisión histórica y cultual.
translation_notes:
  revision_awareness: 'Coincide con el audit trail inglés: se conservan las ofrendas cultuales en términos bíblicos claros, se traduce el verbo de forma idiomática en español y se mantiene la categoría técnica de los nazireos sin sobreexplicar en el cuerpo principal. No se detectan revisiones textuales alternativas en el paquete fuente.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera explícitamente; en este versículo no aparece.
  - «Primicias» y «diezmos» mantienen el registro cultual estándar del español bíblico.
  - «Nazireos» se eligió como transliteración consistente con la categoría técnica, en lugar de una paráfrasis extensa en el texto principal.
  - La nota a pie de página preserva la tensión entre la literalidad griega («sus días») y el sentido idiomático del voto completado.
