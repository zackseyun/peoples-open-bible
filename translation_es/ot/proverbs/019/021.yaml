translation:
  language: es
  text: Muchos son los planes en el corazón de un hombre[a], pero el consejo de Yahvé permanecerá firme.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pensamientos» o «intenciones» para «planes».
    reason: lexical_alternative
lexical_decisions:
- source_word: רַבּוֹת
  english_pob_choice: Many are
  chosen_spanish: Muchos son
  alternatives_spanish:
  - Numerosos son
  - Son muchos
  lexicon: HALOT
  rationale: El hebreo abre con el adjetivo en posición enfática; «Muchos son» conserva ese arranque proverbial y resulta natural en español.
- source_word: מַחֲשָׁבוֹת
  english_pob_choice: plans
  chosen_spanish: planes
  alternatives_spanish:
  - pensamientos
  - intenciones
  - proyectos
  lexicon: HALOT
  rationale: En contexto sapiencial, el término apunta a ideas, designios o planes elaborados; «planes» expresa bien esa dimensión de propósito sin perder el contraste con el consejo divino.
- source_word: בְּלֶב אִישׁ
  english_pob_choice: in a man's heart
  chosen_spanish: en el corazón de un hombre
  alternatives_spanish:
  - en el corazón de una persona
  - dentro del corazón del hombre
  lexicon: HALOT
  rationale: לֵב en antropología hebrea es el centro interior de pensar y querer; «corazón» es la equivalencia estable. Se mantiene «un hombre» por el valor representativo del singular masculino del hebreo.
- source_word: וַעֲצַת
  english_pob_choice: but the counsel of
  chosen_spanish: pero el consejo de
  alternatives_spanish:
  - y el consejo de
  - pero el designio de
  lexicon: HALOT
  rationale: Aunque la conjunción es literalmente «y», el paralelismo es contrastivo; «pero» comunica mejor la oposición. «Consejo» preserva el sentido de designio deliberado o propósito establecido.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la norma del proyecto para el nombre divino, manteniendo la referencia explícita al Tetragrámaton en vez de ocultarla bajo una convención de sustitución.
- source_word: הִיא
  english_pob_choice: it
  chosen_spanish: —
  alternatives_spanish:
  - ella
  - eso
  lexicon: HALOT
  rationale: El pronombre hebreo concuerda con el sustantivo femenino «consejo», pero en español la construcción verbal ya expresa la idea; omitirlo evita una redundancia poco natural y no altera el sentido.
- source_word: תָקוּם
  english_pob_choice: will stand
  chosen_spanish: permanecerá
  alternatives_spanish:
  - se mantendrá
  - quedará en pie
  - será հաստատado
  lexicon: HALOT
  rationale: La idea es que el consejo de Yahvé se mantiene firme y se cumple; «permanecerá» comunica esa estabilidad en español natural, sin añadir un matiz técnico ajeno al proverbio.
theological_decisions:
- issue: Relación entre los planes humanos y el consejo divino
  english_pob_reading: Many human plans exist, but the counsel of Yahweh is what ultimately stands.
  chosen_spanish_reading: Hay muchos planes humanos, pero el consejo de Yahvé permanece.
  alternative_spanish_readings:
  - Solo se cumple el plan de Dios
  - El consejo de Yahvé prevalece inevitablemente
  rationale: El hebreo contrapone la multiplicidad de planes humanos con la firme eficacia del consejo de Yahvé. Se conserva esa tensión sapiencial sin convertir el proverbio en una paráfrasis determinista más fuerte que el texto.
  doctrine_reference: Preservar la tensión textual; no sobreespecificar causalidad providencial más allá del proverbio.
translation_notes:
  revision_awareness: 'La redacción sigue la lectura auditada de la POB inglesa, pero adapta la sintaxis a un español más natural: conserva la inversión enfática inicial («Muchos son») y mantiene el contraste con «pero». También se armoniza el nombre divino con el estándar español del proyecto: Yahvé.'
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para יהוה.
  - Se eligió «planes» como equivalente principal de מַחֲשָׁבוֹת en contexto sapiencial.
  - Se evitó neutralizar «un hombre» para respetar el singular representativo del hebreo y la política del proyecto cuando no hay razón textual para cambiarlo.
  - «Permanecerá» comunica la firmeza de תָקוּם sin introducir un matiz más técnico que el del proverbio.
