translation:
  language: es
  text: 'Entonces la palabra de Yahvé vino a Jeremías en Tafnes[a], diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Y aconteció, la palabra de Yahvé vino ...».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Then ... came
  chosen_spanish: Entonces ... vino
  alternatives_spanish:
  - Y aconteció
  - Y sucedió
  lexicon: HALOT
  rationale: La forma waw-consecutiva introduce un nuevo evento narrativo. En español, «Entonces ... vino» conserva el movimiento de transición sin recurrir a una fórmula arcaizante como «aconteció».
- source_word: דְבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mensaje de Yahvé
  - la palabra del Señor
  lexicon: HALOT
  rationale: «Palabra» conserva el valor profético-formal del hebreo y la conexión con la fórmula profética estándar. Se mantiene «Yahvé» para el nombre divino conforme a la guía del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como «Yahvé», transliteración del nombre divino, en lugar de sustituirlo por un título como «Señor».
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: La preposición marca al destinatario de la palabra divina; en español natural, «a Jeremías» expresa con claridad esa relación.
- source_word: יִרְמְיָהוּ
  english_pob_choice: Jeremiah
  chosen_spanish: Jeremías
  alternatives_spanish:
  - Jirmeyahu
  lexicon: HALOT
  rationale: Nombre propio bíblico adaptado a la forma española usual y reconocible.
- source_word: בְּתַחְפַּנְחֵס
  english_pob_choice: in Tahpanhes
  chosen_spanish: en Tafnes
  alternatives_spanish:
  - en Tahpanhes
  lexicon: HALOT
  rationale: Se adopta «Tafnes», forma española asentada del topónimo, que comunica mejor al lector hispanohablante sin alterar la referencia geográfica.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: «Diciendo» reproduce la función introductoria del infinitivo hebreo de forma directa y natural en la narrativa profética.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. La forma española del proyecto es «Yahvé», que preserva el nombre propio del pacto en vez de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La redacción sigue de cerca la fórmula profética hebrea y la decisión de la POB inglesa de mantener el nombre divino como nombre propio. Se ajustó el topónimo al uso español tradicional «Tafnes» para mayor legibilidad, sin perder la identificación con Tahpanhes.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - Se usa «palabra» y no «mensaje» para conservar la fórmula profética.
  - «Diciendo» se conserva como marcador de discurso introductorio, no como contenido autónomo.
  - El topónimo se normaliza a «Tafnes» por uso español, aunque la fuente inglesa usa «Tahpanhes».
