  text: Y su compañía, es decir, los registrados de ella, eran cuarenta y seis mil quinientos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: צְבָאוֹ
  english_pob_choice: his company
  chosen_spanish: su campamento
  alternatives_spanish:
  - su división
  - su hueste
  - su compañía
  lexicon: HALOT
  rationale: En el contexto censal y de ordenamiento tribal de Números, צָבָא designa una formación organizada, de tono militar, más cercana a un campamento o contingente que a una “compañía” en sentido moderno. “Campamento” conserva bien el marco de Números 2 sin forzar una lectura bélica activa.
- source_word: פְקֻדָיו
  english_pob_choice: those numbered from it
  chosen_spanish: los registrados en él
  alternatives_spanish:
  - los contados de él
  - sus enumerados
  - los inscritos en él
  lexicon: HALOT
  rationale: El término proviene de פקד en sentido censal. “Registrados” comunica el resultado del censo de forma natural en español y evita la repetición mecánica de ‘sus’ o una calca demasiado dura; el complemento ‘en él’ conserva la referencia al conjunto tribal.
- source_word: שִׁשָּׁה וְאַרְבָּעִים אֶלֶף וַחֲמֵשׁ מֵאוֹת
  english_pob_choice: forty-six thousand five hundred
  chosen_spanish: cuarenta y seis mil quinientos
  alternatives_spanish:
  - seis y cuarenta mil y quinientos
  lexicon: HALOT
  rationale: Se expresa el total en el orden numérico natural del español moderno, sin perder el valor exacto del cardinal hebreo.
translation_notes:
  revision_awareness: La redacción sigue de cerca el ajuste más reciente del inglés POB, que prefirió ‘company’ sobre ‘division’ por alineación léxica con צְבָא y adoptó una apposición natural (‘even’). En español se resolvió esa apposición con ‘es decir’, manteniendo el paralelismo censal sin añadir explicación interpretativa.
  spanish_consistency_notes:
  - Se evita ‘SEÑOR’ porque no aparece el nombre divino en este versículo.
  - Se mantiene el tono censal y organizativo del pasaje, sin introducir vocabulario eclesiástico posterior.
  - ‘Registrados’ se usa como solución idiomática para el campo semántico de contar/enumerar en un contexto de censo.
