translation:
  language: es
  text: 'Ve a Media, hijo mío, porque estoy convencido de que se cumplirá lo que habló Jonás, el profeta, acerca de Nínive: será derribada. Pero en Media habrá paz por un tiempo[a]. Y nuestros hermanos serán dispersados de la buena tierra, y Jerusalén quedará desolada, y la casa de Dios en ella será quemada[b], y quedará desolada hasta cierto tiempo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «habrá más bien paz hasta un tiempo». El griego incluye un comparativo (μᾶλλον) que puede sugerir una seguridad relativa más que una paz absoluta.'
    reason: lexical_alternative
  - marker: b
    text: «La casa de Dios» se refiere al templo de Jerusalén.
    reason: cross_reference
lexical_decisions:
- source_word: ἄπελθε
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Vete
  - Anda
  lexicon: LSJ
  rationale: El imperativo aoristo de ἀπέρχομαι pide una orden/directiva breve. «Ve» es natural en español y conserva el movimiento hacia Media sin añadir matiz innecesario.
- source_word: Μηδείαν
  english_pob_choice: Media
  chosen_spanish: Media
  alternatives_spanish:
  - la tierra de los medos
  lexicon: LSJ
  rationale: Se mantiene el nombre geográfico estándar, claro y reconocible en español.
- source_word: τέκνον
  english_pob_choice: my child
  chosen_spanish: hijo mío
  alternatives_spanish:
  - hijo
  - niño mío
  - hija mía
  lexicon: LSJ
  rationale: El vocativo expresa afecto. «Hijo mío» conserva la ternura familiar y encaja con el contexto de Tobías, sin forzar una sobretraducción literal de «child».
- source_word: πέπεισμαι
  english_pob_choice: I am convinced
  chosen_spanish: estoy convencido
  alternatives_spanish:
  - estoy persuadido
  - estoy seguro
  lexicon: LSJ
  rationale: El perfecto expresa un estado presente de convicción resultado de una persuasión previa. «Estoy convencido» reproduce bien ese valor aspectual y es idiomático en español.
- source_word: ὅσα ἐλάλησεν
  english_pob_choice: what ... spoke
  chosen_spanish: lo que habló
  alternatives_spanish:
  - lo que dijo
  - todo lo que proclamó
  lexicon: LSJ
  rationale: La construcción neutra plural introduce el contenido del anuncio profético. «Lo que habló» mantiene cercanía al verbo del griego y al tono profético, sin volverlo más interpretativo de lo necesario.
- source_word: περὶ Νινευὴ
  english_pob_choice: concerning Nineveh
  chosen_spanish: acerca de Nínive
  alternatives_spanish:
  - sobre Nínive
  lexicon: LSJ
  rationale: «Acerca de» conserva el registro formal y la relación temática del anuncio profético.
- source_word: καταστραφήσεται
  english_pob_choice: it will be overthrown
  chosen_spanish: será destruida
  alternatives_spanish:
  - será derribada
  - será arrasada
  lexicon: LSJ
  rationale: El futuro pasivo de καταστρέφω implica ruina/judgment. «Será destruida» es una equivalencia natural en español; «arrasada» podría intensificar el matiz, pero «destruida» queda más general y fiel al griego en este contexto.
- source_word: ἔσται εἰρήνη μᾶλλον ἕως καιροῦ
  english_pob_choice: there will be peace for a while
  chosen_spanish: habrá paz por un tiempo
  alternatives_spanish:
  - habrá más bien paz hasta un tiempo
  - habrá relativa paz hasta el momento oportuno
  lexicon: LSJ
  rationale: La construcción expresa paz/seguridad temporales y comparativas. «Habrá paz por un tiempo» comunica el sentido principal con naturalidad; se deja constancia en nota de la posible fuerza comparativa de μᾶλλον y del límite temporal de ἕως καιροῦ.
- source_word: οἱ ἀδελφοὶ ἡμῶν
  english_pob_choice: our brothers
  chosen_spanish: nuestros hermanos
  alternatives_spanish:
  - nuestros parientes
  - nuestros hermanos de sangre
  lexicon: LSJ
  rationale: El plural masculino funciona representativamente para el pueblo de Israel. «Nuestros hermanos» sigue el griego y mantiene el lenguaje de parentesco colectivo.
- source_word: σκορπισθήσονται
  english_pob_choice: will be scattered
  chosen_spanish: serán dispersados
  alternatives_spanish:
  - serán esparcidos
  - serán dispersados entre las naciones
  lexicon: LSJ
  rationale: El futuro pasivo indica dispersión/exilio. «Serán dispersados» es la forma más natural y conserva la pasividad del verbo.
- source_word: ἀπὸ τῆς ἀγαθῆς γῆς
  english_pob_choice: from the good land
  chosen_spanish: de la buena tierra
  alternatives_spanish:
  - de la tierra buena
  - de la tierra fértil
  lexicon: LSJ
  rationale: «Buena tierra» preserva la literalidad y el eco bíblico de la tierra como don/campo благополучия, sin sustituirlo por una interpretación más específica.
- source_word: Ἰεροσόλυμα ἔσται ἔρημος
  english_pob_choice: Jerusalem will be desolate
  chosen_spanish: Jerusalén quedará desolada
  alternatives_spanish:
  - Jerusalén será desolada
  - Jerusalén quedará en ruinas
  lexicon: LSJ
  rationale: ἔρημος aquí señala devastación/desolación, no necesariamente un desierto literal. «Quedará desolada» refleja ese estado resultante con buen español.
- source_word: ὁ οἶκος τοῦ θεοῦ
  english_pob_choice: the house of God
  chosen_spanish: la casa de Dios
  alternatives_spanish:
  - el templo de Dios
  - la casa de Yahvé
  lexicon: LSJ
  rationale: Se sigue la formulación del griego. Aunque en este corpus se prefiere «Yahvé» para יהוה, aquí el original dice θεοῦ; por eso «Dios» es la correspondencia directa y evita introducir un nombre divino que el versículo no usa.
- source_word: κατακαήσεται
  english_pob_choice: will be burned down
  chosen_spanish: será quemada
  alternatives_spanish:
  - será incendiada
  - será consumida por el fuego
  lexicon: LSJ
  rationale: El futuro pasivo de κατακαίω indica quema destructiva. «Será quemada» es claro y fiel; el contexto ya sugiere la destrucción total.
- source_word: μέχρι χρόνου
  english_pob_choice: until a time
  chosen_spanish: hasta un tiempo
  alternatives_spanish:
  - por un tiempo
  - hasta cierto tiempo
  lexicon: LSJ
  rationale: La expresión marca duración limitada e indefinida. «Hasta un tiempo» conserva la apertura temporal del griego y suena más cercano al original que una reformulación más idiomática.
theological_decisions:
- issue: Cómo traducir el anuncio de Jonás sobre Nínive sin perder la fuerza profética de juicio
  english_pob_reading: 'what Jonah the prophet spoke concerning Nineveh will happen: it will be overthrown'
  chosen_spanish_reading: 'se cumplirá lo que habló Jonás, el profeta, acerca de Nínive: será destruida'
  alternative_spanish_readings:
  - 'lo que Jonás, el profeta, habló acerca de Nínive ocurrirá: será derribada'
  - cumpliráse lo que Jonás profetizó acerca de Nínive
  rationale: El griego combina una afirmación de convicción con el contenido profético. La redacción española explicita el cumplimiento sin suavizar el juicio anunciado. «Será destruida» mantiene la sentencia de ruina sin introducir un matiz más técnico que el texto no exige.
  doctrine_reference: Translation philosophy §1, §6
- issue: Cómo reflejar la posible fuerza comparativa de μᾶλλον en la paz de Media
  english_pob_reading: there will be peace for a while
  chosen_spanish_reading: habrá paz por un tiempo
  alternative_spanish_readings:
  - habrá más bien paz hasta un tiempo
  - habrá más paz por un tiempo
  rationale: El griego puede implicar no paz absoluta sino una relativa mayor seguridad. En español, «por un tiempo» comunica la temporalidad con naturalidad, y la nota conserva la alternativa comparativa para no borrar la tensión semántica.
  doctrine_reference: Translation philosophy §1, §6
- issue: Identificación de «la casa de Dios»
  english_pob_reading: The house of God refers to the temple in Jerusalem.
  chosen_spanish_reading: la casa de Dios [b]
  alternative_spanish_readings:
  - el templo de Dios
  - la casa del Señor
  rationale: Se mantiene la expresión literal del griego y se aclara en nota su referente histórico-templario. No se sustituye por «templo» en el texto principal para no perder la formulación original.
  doctrine_reference: Translation philosophy §2, §6
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió una duración temporal más natural («for a while») sin abandonar el matiz comparativo de μᾶλλον. La versión española adopta una solución equivalente («por un tiempo») y conserva el matiz alternativo en nota. También se respetó la decisión revisada de mantener la temporalidad abierta de μέχρι χρόνου en la cláusula final.
  spanish_consistency_notes:
  - Se conservó «Media» como topónimo en toda la línea.
  - Se evitó «SEÑOR» porque el versículo griego usa θεοῦ, no el nombre divino.
  - 'Se mantuvo la imagen de juicio y ruina con verbos directos: «destruida», «dispersados», «desolada», «quemada».'
  - La puntuación sigue el flujo del período griego con dos puntos tras «Nínive».
