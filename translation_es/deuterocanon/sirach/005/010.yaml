translation:
  language: es
  text: No te demores en volver a él[b], y no lo postergues[a] de un día para otro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no lo postergues de un día para otro». El segundo hemistiquio usa un verbo hebreo difícil, pero el contexto apunta con claridad a un aplazamiento repetido.'
    reason: lexical_alternative
  - marker: b
    text: «Volver a él» probablemente alude a volver a Dios en arrepentimiento, aunque el hebreo dice simplemente «a él».
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תְּאַחֵר
  english_pob_choice: Do not delay
  chosen_spanish: No te demores
  alternatives_spanish:
  - No tardes
  - No retrases
  lexicon: HALOT
  rationale: El hebreo expresa una prohibición contra posponer; «demorarse» comunica bien esa idea en español natural y mantiene el tono exhortativo.
- source_word: לָשׁוּב
  english_pob_choice: to return
  chosen_spanish: volver
  alternatives_spanish:
  - regresar
  - volver a
  lexicon: HALOT
  rationale: El verbo שוב suele significar volver/retornar. «Volver» es la opción más natural y fiel aquí, sin sobrecargar con lenguaje doctrinal no explícito en la línea.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - al Señor
  - a Dios
  lexicon: HALOT
  rationale: El pronombre hebreo es explícito pero su antecedente queda implícito. Se conserva esa indefinición en el cuerpo del texto, como en la fuente.
- source_word: תִּתְעַבֵּר
  english_pob_choice: put it off
  chosen_spanish: lo vayas dejando
  alternatives_spanish:
  - lo postergues
  - lo dejes para después
  lexicon: HALOT
  rationale: La forma hebrea es difícil; el contexto de repetición temporal exige una idea de aplazamiento. «Lo vayas dejando» expresa con claridad la acción repetida de diferirla.
- source_word: מִיּוֹם אֶל יוֹם
  english_pob_choice: from day to day
  chosen_spanish: de un día para otro
  alternatives_spanish:
  - día tras día
  - de día en día
  lexicon: HALOT
  rationale: Se trata de un modismo de postergación reiterada. «De un día para otro» es una equivalencia idiomática clara en español moderno.
theological_decisions:
- issue: Explicitar o no que el retorno es arrepentimiento hacia Dios
  english_pob_reading: 'Keep the text''s implicit wording: ''returning to him'''
  chosen_spanish_reading: 'Mantener la referencia implícita: «volver a él»'
  alternative_spanish_readings:
  - volver al Señor
  - arrepentirte y volver a él
  rationale: La fuente hebrea dice simplemente «a él». Aunque el contexto sugiere a Dios y puede implicar arrepentimiento, el texto no lo formula de manera explícita; por eso se preserva la reserva teológica de la línea.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Cómo reflejar el verbo difícil del segundo hemistiquio
  english_pob_reading: Render contextually as 'do not put it off'
  chosen_spanish_reading: Renderizar contextualmente como «no lo vayas dejando»
  alternative_spanish_readings:
  - no lo pospongas
  - no lo retrases
  rationale: El hebreo y el contexto favorecen la idea de aplazamiento reiterado. La opción elegida mantiene ese matiz progresivo y evita resolver con demasiada certeza una forma verbal difícil.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: Se tomó como base la última revisión inglesa que ajustó 'in returning' a 'to return' por naturalidad, y se mantuvo el sentido contextual del segundo hemistiquio como un aplazamiento repetido. La versión griega paralela se consideró solo como control secundario, no como base principal, dado que el paquete fuente hebreo está en alta concordancia y es el texto rector aquí.
  spanish_consistency_notes:
  - Se mantuvo el pronombre implícito de la fuente («a él») en la nota, sin sustituirlo por un título divino en el texto principal.
  - Se evitó 'Cristo' o 'SEÑOR' porque no están en la línea hebrea transmitida para este verso.
  - El español conserva la fuerza exhortativa del prohibitivo hebreo con un registro digno y contemporáneo.
  - La segunda cláusula usa una equivalencia idiomática española para el modismo de postergación reiterada, sin perder el valor semántico central.
