review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura exclamativa del hebreo, la personificación femenina de Moab, el modismo ''volver la espalda'' y el resultado de burla/horror. Sin embargo, presenta dos problemas de fidelidad/forma: ''Aullad'' tiende a sonar zoomórfico y menos natural que un imperativo de duelo como ''Lamenten'', y la nota [b] está anclada en la frase equivocada, pues explica parcialmente el giro idiomático ''volver la espalda'' pero se coloca sobre ''los que la rodean''.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero '¡Cómo Moab ha vuelto...!' suena menos natural en español que '¡Cómo volvió...!' o '¡Cómo ha vuelto...!'. Además, 'ha sido quebrantada' es comprensible, aunque algo rígido; 'ha quedado destrozada' suena más natural, pero no es imprescindible. La corrección principal necesaria es mejorar la naturalidad del verbo de duelo y reubicar la nota para evitar confusión lectora.
  glossary_alignment: 'No hay términos de glosario mayor en juego como Yahvé/Mesías. Las decisiones léxicas principales están razonablemente alineadas con el rastro auditado: חַתָּה ≈ ''quebrantada'', הִפְנָה עֹרֶף ≈ ''volvió la espalda'', לִשְׂחֹק ≈ ''objeto de burla'', לִמְחִתָּה ≈ ''horror''. La excepción es הֵילִילוּ, donde ''Lamenten'' encaja mejor con el valor de duelo y con la legibilidad eclesial del español neutral.'
  issues:
  - severity: medium
    issue: '''Aullad'' es poco natural y puede desviar el sentido de duelo humano.'
    rationale: Aunque puede usarse en contexto de lamento, en español moderno neutral suele asociarse más fuertemente con un aullido animal o con un registro muy enfático. 'Lamenten' o 'Giman' comunica mejor el imperativo plural de duelo para lectura eclesial amplia.
  - severity: high
    issue: La nota [b] está anclada en un lugar incorrecto del texto.
    rationale: La nota explica el idiomático hebreo de 'volver la espalda' y no la expresión 'para todos los que la rodean'. El anclaje actual induce a error y no cumple bien la disciplina de notas.
  - severity: low
    issue: La sintaxis '¡Cómo Moab ha vuelto la espalda avergonzada!' suena algo calcada.
    rationale: En español exclamativo es más natural '¡Cómo volvió Moab la espalda, avergonzada!' o '¡Cómo ha vuelto Moab la espalda en vergüenza!'. Conviene suavizar el orden para legibilidad sin perder fidelidad.
  revised_spanish_text: ¡Cómo ha sido quebrantada! ¡Lamenten! ¡Cómo Moab volvió[b] la espalda, avergonzada! Moab se ha convertido en objeto de burla y en horror[a] para todos los que la rodean.
  revised_footnotes:
  - marker: a
    text: «Horror» refleja la revisión auditada del POB inglés frente a opciones como «terror» u «objeto de consternación».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «volvió la espalda/el cuello»; el hebreo usa este giro idiomático para expresar retirada o apartamiento en vergüenza.
    reason: lexical_alternative
  revision_rationale: Se reemplaza 'Aullad' por 'Lamenten' para un español más natural y eclesialmente legible, se mejora levemente el orden de la cláusula exclamativa, y se reubica la nota [b] al giro idiomático que realmente explica. Se conserva 'quebrantada', 'objeto de burla' y 'horror' por fidelidad al hebreo y al rastro auditado.
