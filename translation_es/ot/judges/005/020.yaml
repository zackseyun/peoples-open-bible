    text: O ‘desde sus caminos’, ‘desde sus trayectorias’ o ‘desde sus sendas’; el término hebreo puede referirse a rutas o cursos, y aquí probablemente a las trayectorias asignadas de las estrellas en el cielo.
    reason: lexical_alternative
  - marker: b
    text: Hebreo ‘con Sísara’; en contextos de combate esta construcción suele significar ‘contra Sísara’.
    reason: lexical_alternative
