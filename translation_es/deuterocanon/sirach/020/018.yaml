translation:
  language: es
  text: Un resbalón del suelo es mejor que uno de la lengua[a]; así la caída de los malvados vendrá pronto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la caída de los males vendrá pronto»; el griego κακῶν puede entenderse de modo abstracto («males») o personal («malvados»).
    reason: alternative_reading
lexical_decisions:
- source_word: Ὀλίσθημα
  english_pob_choice: a slip
  chosen_spanish: un resbalón
  alternatives_spanish:
  - un desliz
  - una caída
  - un tropiezo
  lexicon: LSJ
  rationale: Ὀλίσθημα expresa una resbaladura o deslizamiento. «Resbalón» conserva la imagen física y suena natural en español; «tropiezo» podría insinuar un obstáculo más que una resbaladura.
- source_word: ἀπὸ ἐδάφους
  english_pob_choice: from the ground
  chosen_spanish: desde el suelo
  alternatives_spanish:
  - del suelo
  - desde la tierra
  - de la superficie
  lexicon: LSJ
  rationale: La imagen apunta al apoyo material donde ocurre el resbalón. «Desde el suelo» mantiene la relación con ἀπό y resulta idiomático en español.
- source_word: μᾶλλον ἢ ἀπὸ γλώσσης
  english_pob_choice: is better ... than from the tongue
  chosen_spanish: es mejor ... que desde la lengua
  alternatives_spanish:
  - más bien que desde la lengua
  - antes que desde la lengua
  - que de la lengua
  lexicon: LSJ
  rationale: El griego es elíptico; en español conviene suplir «es mejor» para dar sentido al proverbio. «Lengua» conserva la metáfora concreta del habla.
- source_word: γλώσσης
  english_pob_choice: the tongue
  chosen_spanish: la lengua
  alternatives_spanish:
  - la boca
  - el habla
  - la palabra
  lexicon: LSJ
  rationale: «Lengua» reproduce la imagen figurada de la facultad de hablar y preserva el paralelismo sapiencial.
- source_word: πτῶσις
  english_pob_choice: the fall
  chosen_spanish: la caída
  alternatives_spanish:
  - el derrumbe
  - la ruina
  - el desplome
  lexicon: LSJ
  rationale: En el segundo miembro, πτῶσις designa caída o desplome. «Caída» es el equivalente más directo y transparente en español.
- source_word: κακῶν
  english_pob_choice: the wicked
  chosen_spanish: de los malvados
  alternatives_spanish:
  - de los malos
  - de los impíos
  - de los perversos
  lexicon: LSJ
  rationale: El genitivo puede leerse abstractamente («males») o personalmente («malvados»). Siguiendo la lectura personal de la POB inglesa, «malvados» mantiene el contraste moral del proverbio.
- source_word: κατὰ σπουδὴν
  english_pob_choice: quickly
  chosen_spanish: pronto
  alternatives_spanish:
  - rápidamente
  - con prisa
  - de inmediato
  lexicon: LSJ
  rationale: La expresión indica rapidez o premura. «Pronto» es natural en español y conserva la brevedad proverbial.
- source_word: ἥξει
  english_pob_choice: will come
  chosen_spanish: vendrá
  alternatives_spanish:
  - llegará
  - sobrevendrá
  - ocurrirá
  lexicon: LSJ
  rationale: ἥξει es futuro de venir/llegar. «Vendrá» es sencillo y se integra bien con «la caída».
theological_decisions:
- issue: 'Sentido de κακῶν: abstracto o personal'
  english_pob_reading: 'personal: ''the wicked'''
  chosen_spanish_reading: 'personal: ''los malvados'''
  alternative_spanish_readings:
  - 'abstracto: ''los males'''
  - '''las malas cosas'''
  rationale: Aunque la forma permite una lectura abstracta, el contexto sapiencial favorece una referencia a personas perversas cuya caída llega con rapidez. La traducción personal conserva esa tensión interpretativa sin ocultarla por completo.
  doctrine_reference: Sabiduría ética/proverbial; juicio sobre los malvados
translation_notes:
  revision_awareness: La POB inglesa revisó la clausula final desde «downfall» a «fall» y desde «in haste» a «quickly» para acercarse más a πτῶσις y a κατὰ σπουδήν. La versión española sigue esa decisión con «caída» y «pronto», evitando una intensificación innecesaria.
  spanish_consistency_notes:
  - Se mantiene «lengua» para γλώσσης por la metáfora sapiencial del habla.
  - Se prefirió «malvados» para κακῶν siguiendo la lectura personal documentada en la POB inglesa, con nota alternativa para la lectura abstracta.
  - El tono es sobrio y proverbial, sin recurrir a formulaciones eclesiásticas no respaldadas por el griego.
