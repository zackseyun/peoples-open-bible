  to: 'Entonces nuestros ancianos y todos los habitantes de nuestra tierra nos dijeron: «Tomen provisiones en su mano para el camino, y vayan al encuentro de ellos. Y díganles: “Nosotros somos sus siervos[a]”; y ahora hagan un pacto con nosotros[b]”».'
  rationale: Se corrige «sus esclavos» a «sus siervos» para seguir la decisión contextual documentada por el POB inglés sobre lenguaje diplomático deferente. También se reubica la nota literal para que ancle correctamente en «hagan un pacto con nosotros», que es la expresión que explica. El resto del versículo puede mantenerse porque representa adecuadamente el hebreo en español natural y digno.
