translation:
  language: es
  text: ¿Qué te dará[a], y qué más te añadirá, lengua engañosa?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «¿Qué te hará, y qué más te hará, lengua engañosa?». El sujeto implícito puede entenderse de manera general, aunque muchos intérpretes lo refieren al juicio de Dios en el contexto.'
    reason: alternative_reading
lexical_decisions:
- source_word: מַה
  english_pob_choice: What
  chosen_spanish: ¿Qué...?
  alternatives_spanish:
  - ¿Cómo...?
  - ¿Cuánto...?
  lexicon: HALOT
  rationale: La partícula interrogativa introduce una pregunta retórica; «qué» conserva la fuerza directa y natural del hebreo.
- source_word: יִתֵּן
  english_pob_choice: will he give
  chosen_spanish: te dará
  alternatives_spanish:
  - te podrá dar
  - te querrá dar
  lexicon: HALOT
  rationale: El imperfecto hebreo funciona aquí de modo prospectivo en la pregunta retórica. En español, el futuro simple mantiene esa apertura y el paralelismo con el segundo hemistiquio.
- source_word: לְךָ
  english_pob_choice: to you
  chosen_spanish: te
  alternatives_spanish:
  - a ti
  - para ti
  lexicon: HALOT
  rationale: El complemento con lamed + sufijo se naturaliza como pronombre enclítico en español. La lectura de segunda persona singular se conserva sin forzar un calco.
- source_word: וּמַה
  english_pob_choice: and what more
  chosen_spanish: y qué más
  alternatives_spanish:
  - y qué
  - y cuánto más
  lexicon: HALOT
  rationale: La conjunción más la interrogativa añade progresión al paralelismo; «qué más» refleja mejor el valor aditivo que una simple repetición de «qué».
- source_word: יֹסִיף
  english_pob_choice: will he add
  chosen_spanish: te añadirá
  alternatives_spanish:
  - te sumará
  - te volverá a dar
  lexicon: HALOT
  rationale: El hiphil de יסף expresa añadir o hacer algo de nuevo. «Añadirá» preserva la fuerza verbal y la correspondencia con «dar» del primer cola.
- source_word: לָךְ
  english_pob_choice: to you
  chosen_spanish: te
  alternatives_spanish:
  - a ti
  - para ti
  lexicon: HALOT
  rationale: Aunque la morfología apunta a forma femenina, el destinatario inmediato es la «lengua» personificada, un sustantivo femenino; el español puede repetir el objeto indirecto sin marcar género personal.
- source_word: לָשׁוֹן
  english_pob_choice: tongue
  chosen_spanish: lengua
  alternatives_spanish:
  - labio
  - palabra
  - lenguaje
  lexicon: HALOT
  rationale: «Lengua» reproduce el término corporal y su valor metonímico para el habla, manteniendo la imagen poética bíblica en español.
- source_word: רְמִיָּה
  english_pob_choice: deceitful
  chosen_spanish: engañosa
  alternatives_spanish:
  - mentirosa
  - fraudulenta
  - traicionera
  lexicon: HALOT
  rationale: El adjetivo señala engaño/astucia moral. «Engañosa» es natural con «lengua» y conserva el juicio ético sin intensificar más allá del hebreo.
theological_decisions:
- issue: Sujeto implícito de los verbos retóricos
  english_pob_reading: The implied subject may be understood generally, though many interpreters take it to refer to God’s judgment in context.
  chosen_spanish_reading: El sujeto queda implícito y la pregunta puede entenderse en sentido general; en contexto, también puede aludir al juicio de Dios.
  alternative_spanish_readings:
  - ¿Qué te dará Dios...?
  - ¿Qué te hará el Señor...?
  rationale: El hebreo no expresa sujeto. Mantener la impersonalidad retórica evita cerrar la ambigüedad que el propio texto deja abierta, a la vez que permite la lectura contextual de juicio divino indicada por la nota inglesa.
  doctrine_reference: Salmo 120:3; cf. contexto de juicio en el salmo
translation_notes:
  revision_awareness: El texto inglés POB ya quedó estable sin revisiones aplicadas; la presente versión española sigue su lectura principal y conserva la alternativa nota sobre el sujeto implícito.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el hebreo o el griego lo exijan explícitamente; este versículo no lo contiene.
  - Se usa «lengua» como metonimia del habla engañosa, en paralelo con la opción inglesa literal.
  - Se conserva la ambigüedad del sujeto verbal en una nota, sin introducir un nombre divino en el cuerpo del versículo.
