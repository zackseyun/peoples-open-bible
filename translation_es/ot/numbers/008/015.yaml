translation:
  language: es
  text: Y después de eso, los levitas vendrán para servir en la tienda de reunión, y los purificarás[a] y los mecerás[b] como ofrenda mecida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los limpiarás ritualmente». El verbo hebreo se usa para una purificación ceremonial.
    reason: lexical_alternative
  - marker: b
    text: Es decir, los presentarás ceremonialmente ante Yahvé como ofrenda mecida.
    reason: cultural_note
lexical_decisions:
- source_word: וְאַֽחֲרֵי כֵן
  english_pob_choice: And after that
  chosen_spanish: Y después de eso
  alternatives_spanish:
  - Y después
  - Entonces, después de eso
  lexicon: HALOT
  rationale: La expresión marca secuencia temporal explícita; «Y después de eso» conserva la progresión natural del hebreo sin volverla demasiado literal o pesada en español.
- source_word: יָבֹ֣אוּ
  english_pob_choice: shall come
  chosen_spanish: vendrán
  alternatives_spanish:
  - se acercarán
  - habrán de venir
  lexicon: HALOT
  rationale: En contexto instruccional/futuro, «vendrán» comunica la llegada de los levitas al lugar de servicio de manera clara y natural.
- source_word: הַ/לְוִיִּ֔ם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levitas
  lexicon: HALOT
  rationale: Es el equivalente directo del grupo tribal consagrado al servicio del tabernáculo.
- source_word: לַ/עֲבֹ֖ד
  english_pob_choice: to serve
  chosen_spanish: para servir
  alternatives_spanish:
  - para hacer servicio
  - para ministrar
  lexicon: HALOT
  rationale: «Servir» reproduce bien el sentido cultual de עבד sin introducir un matiz eclesiástico posterior. La preposición «para» expresa finalidad en español.
- source_word: אֶת אֹ֣הֶל מוֹעֵ֑ד
  english_pob_choice: at the tent of meeting
  chosen_spanish: en la Tienda de Reunión
  alternatives_spanish:
  - junto a la Tienda de Reunión
  - en el Tabernáculo de Reunión
  lexicon: HALOT
  rationale: Se conserva el nombre técnico tradicional en el ámbito bíblico español, pero con «Tienda de Reunión» para reflejar directamente אֹהֶל מוֹעֵד. «En» expresa con naturalidad el ámbito de servicio indicado por el hebreo y la lectura auditada en inglés.
- source_word: וְ/טִֽהַרְתָּ֣ אֹתָ֔/ם
  english_pob_choice: and you shall cleanse them
  chosen_spanish: y los purificarás
  alternatives_spanish:
  - y los limpiarás ritualmente
  - y los purificarás ceremonialmente
  lexicon: HALOT
  rationale: טהר aquí tiene valor ritual; «purificar» mantiene la fuerza técnica sin reducirla a limpieza física. Es más preciso que un genérico «limpiar» y preserva la tensión cultual señalada por la POB inglesa.
- source_word: וְ/הֵנַפְתָּ֥ אֹתָ֖/ם תְּנוּפָֽה
  english_pob_choice: and wave them as a wave offering
  chosen_spanish: y los presentarás como ofrenda mecida
  alternatives_spanish:
  - y los mecerás como ofrenda mecida
  - y los ofrecerás como ofrenda mecida
  lexicon: HALOT
  rationale: תְּנוּפָה es la ofrenda mecida; en español bíblico, «presentar» ayuda a expresar el rito sin que «mecer» suene extraño cuando el objeto son personas. Se conserva la imagen sacrificial indicada por el texto y por la nota cultural del original inglés.
theological_decisions:
- issue: Rito de consagración de los levitas
  english_pob_reading: Retain explicit cultic terminology ('cleanse,' 'wave offering') rather than paraphrasing into generic commissioning language.
  chosen_spanish_reading: Mantener el lenguaje ritual explícito («purificarás», «ofrenda mecida») en vez de reformularlo como simple nombramiento o comisión.
  alternative_spanish_readings:
  - los apartarás para el servicio
  - los consagrarás
  rationale: El versículo describe actos rituales concretos, no solo una designación funcional. La redacción española conserva esa estructura cultual y evita borrar el carácter ceremonial del texto.
  doctrine_reference: Numbers 8:15; Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El texto inglés auditado ya fue revisado y se mantuvo sin cambios; la versión española sigue esa lectura sin introducir enmiendas textuales adicionales.
  spanish_consistency_notes:
  - «Tienda de Reunión» se usa de forma consistente para אֹהֶל מוֹעֵד.
  - «Purificar» se reserva para טהר en contexto ritual, para no diluir el sentido ceremonial.
  - «Ofrenda mecida» conserva el término cultual estándar y evita sustituirlo por una paráfrasis devocional.
