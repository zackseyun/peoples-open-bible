translation:
  language: es
  text: 'Entonces dijo a todo Israel[a]: «Ustedes estarán de un lado, y yo y Jonatán mi hijo estaremos del otro lado». Y el pueblo dijo a Saúl: «Haz lo que te parezca bien[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «estén de un lado ... estén del otro lado». El hebreo usa el verbo «ser/estar» con «a/de un lado», un modismo para tomar posición en contraste con otra parte.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «lo bueno en/a tus ojos». Es un modismo hebreo para lo que te parece bueno, adecuado o correcto.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְעֵבֶר אֶחָד
  english_pob_choice: on one side
  chosen_spanish: de un lado
  alternatives_spanish:
  - a un lado
  - en un lado
  lexicon: HALOT
  rationale: עֵבֶר expresa lado o región al otro lado/de este lado; en este contexto de distribución por bandos, 'de un lado' conserva la oposición espacial sin sobrecargar el español con una perífrasis poco natural.
- source_word: תִּהְיוּ
  english_pob_choice: be
  chosen_spanish: estarán
  alternatives_spanish:
  - serán
  - estén
  lexicon: HALOT
  rationale: El hebreo usa el verbo 'ser/estar' con un complemento de posición; en español, 'estarán de un lado' comunica la colocación asignada en el sorteo de manera natural y fiel al sentido situacional.
- source_word: נִהְיֶה
  english_pob_choice: be
  chosen_spanish: estaremos
  alternatives_spanish:
  - seremos
  - estemos
  lexicon: HALOT
  rationale: Mantiene el paralelismo con תִּהְיוּ y el contraste entre el pueblo y Saúl con Jonatán, sin introducir 'ponerse' o 'colocarse', que agregarían acción no explícita.
- source_word: כָּל יִשְׂרָאֵל
  english_pob_choice: all Israel
  chosen_spanish: todo Israel
  alternatives_spanish:
  - todo el Israel
  - la totalidad de Israel
  lexicon: HALOT
  rationale: Expresa el colectivo completo de forma idiomática en español, conservando el valor de asamblea nacional sin perder la concisión del hebreo.
- source_word: בְּנִי
  english_pob_choice: my son
  chosen_spanish: mi hijo
  alternatives_spanish:
  - mi hijo amado
  - mi muchacho
  lexicon: HALOT
  rationale: Designación filial directa y sin matiz afectivo añadido; se conserva como apposición para mantener el parentesco explícito.
- source_word: הַטּוֹב בְּעֵינֶיךָ
  english_pob_choice: what seems good in your eyes
  chosen_spanish: lo que sea bueno a tus ojos
  alternatives_spanish:
  - lo que te parezca bien
  - lo que sea agradable a tus ojos
  lexicon: HALOT
  rationale: Se preserva el hebraísmo 'a tus ojos' para mantener la imagen idiomática del texto. 'Bueno' traduce הַטּוֹב sin diluir la valoración; 'lo que sea' refleja la apertura de la fórmula imperativa.
- source_word: עֲשֵׂה
  english_pob_choice: Do
  chosen_spanish: Haz
  alternatives_spanish:
  - Hazlo
  - Actúa
  lexicon: HALOT
  rationale: Imperativo simple y directo, coherente con la breve respuesta del pueblo a Saúl.
- source_word: וַיֹּאמֶר / וַיֹּאמְרוּ
  english_pob_choice: Then he said / And the people said
  chosen_spanish: Entonces dijo / Y el pueblo dijo
  alternatives_spanish:
  - Entonces habló / Y dijeron
  lexicon: HALOT
  rationale: Se conserva la secuencia narrativa con un conector natural en español; el verbo 'dijo' reproduce la forma de habla reportada sin añadir énfasis interpretativo.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el auditor inglés más reciente, pero vuelve al valor verbal básico del hebreo en la primera mitad: en vez de introducir ''ponerse'' o ''pararse'', conserva ''ser/estar'' con un complemento de lugar, tal como exige el original. También mantiene la fórmula idiomática ''a tus ojos'', que el inglés explicó como equivalente a una valoración personal.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma por defecto en esta traducción, pero este versículo no contiene el nombre divino.
  - Se mantiene 'Jonatán' como forma estable del nombre propio.
  - La alternancia 'de un lado / del otro lado' conserva el paralelismo espacial del hebreo y evita una paráfrasis más interpretativa.
