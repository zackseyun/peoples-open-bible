translation:
  language: es
  text: un toro del ganado[a], un carnero, un cordero macho de un año, para holocausto;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «un toro, hijo del ganado». La expresión es un modismo que clasifica al animal como bovino; por eso también puede traducirse «un toro del ganado» o «un novillo».
    reason: lexical_alternative
lexical_decisions:
- source_word: פַּר
  english_pob_choice: bull
  chosen_spanish: toro
  alternatives_spanish:
  - buey
  - novillo
  lexicon: HALOT
  rationale: פַּר designa un toro o novillo en lenguaje sacrificial. En español, 'toro' comunica bien el animal macho adulto sin sonar técnico en exceso, y encaja con la serie de ofrendas.
- source_word: בֶּן בָּקָר
  english_pob_choice: from the herd
  chosen_spanish: '[a]'
  alternatives_spanish:
  - del ganado
  - de la vacada
  - de la res
  lexicon: HALOT
  rationale: 'La expresión hebrea es idiomática: literalmente ''hijo del ganado'', pero funciona como clasificador del animal. Siguiendo el juicio auditable del POB en inglés, se evita una literalidad dura dentro del texto principal y se conserva la aclaración en nota.'
- source_word: אַיִל
  english_pob_choice: ram
  chosen_spanish: carnero
  alternatives_spanish:
  - macho cabrío
  - macho de oveja
  lexicon: HALOT
  rationale: אַיִל es el macho adulto de la oveja. 'Carnero' es el equivalente natural y preciso en español para contextos sacrificiales.
- source_word: כֶּבֶשׂ
  english_pob_choice: male lamb
  chosen_spanish: cordero macho
  alternatives_spanish:
  - cordero
  - borrego macho
  lexicon: HALOT
  rationale: El hebreo refiere a un cordero usado en ofrenda; el POB explicita el sexo por el contexto. 'Cordero macho' preserva esa precisión sin perder naturalidad.
- source_word: בֶּן שְׁנָתוֹ
  english_pob_choice: a year old
  chosen_spanish: de un año
  alternatives_spanish:
  - de un año de edad
  - en su primer año
  lexicon: HALOT
  rationale: La locución idiomática señala edad exacta. 'De un año' es la forma natural en español y reproduce la restricción de edad requerida.
- source_word: לְעֹלָה
  english_pob_choice: for a burnt offering
  chosen_spanish: para holocausto
  alternatives_spanish:
  - como holocausto
  - para ofrenda quemada
  lexicon: HALOT
  rationale: עֹלָה es el sacrificio totalmente quemado. 'Holocausto' es el término tradicional y comprensible en español bíblico, adecuado para una lista litúrgica de ofrendas.
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el texto hebreo y con el juicio auditado del POB en inglés; no se requieren revisiones textuales ni cambios de sentido.
  spanish_consistency_notes:
  - Se mantiene un registro sacrificial claro y sobrio, adecuado para listas de ofrendas.
  - Se conserva la precisión zoológica sin sobrecargar el verso con literalismos hebraizantes.
  - '''Holocausto'' se emplea aquí en su valor bíblico-sacrificial, no en sentido moderno no religioso.'
