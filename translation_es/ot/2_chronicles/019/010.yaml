translation:
  language: es
  text: Y toda disputa que venga ante ustedes de sus hermanos que habitan en sus ciudades—sea entre sangre y sangre[a], entre ley y mandamiento, estatutos y juicios—ustedes los amonestarán, para que no incurran en culpa delante de Yahvé; de lo contrario, vendrá ira sobre ustedes y sobre sus hermanos. Hagan esto, y no incurrirán en culpa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: “entre sangre y sangre”, probablemente refiriéndose a casos de derramamiento de sangre o homicidio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רִיב
  english_pob_choice: dispute
  chosen_spanish: disputa
  alternatives_spanish:
  - caso
  - controversia
  - litigio
  lexicon: HALOT
  rationale: En contexto judicial, רִיב alude a una controversia o pleito. 'Disputa' mantiene el sentido jurídico sin volverlo innecesariamente técnico.
- source_word: יָבֹוא עֲלֵיכֶם
  english_pob_choice: comes before you
  chosen_spanish: venga ante ustedes
  alternatives_spanish:
  - llegue ante ustedes
  - se presente ante ustedes
  - venga sobre ustedes
  lexicon: HALOT
  rationale: El contexto es de resolución judicial; en español, 'venir ante ustedes' comunica bien la idea de un caso llevado al tribunal o autoridad sin calcar de forma rígida.
- source_word: מֵאֲחֵיכֶם
  english_pob_choice: from your brothers
  chosen_spanish: de parte de sus hermanos
  alternatives_spanish:
  - de sus hermanos
  - de sus parientes
  - de sus compatriotas
  lexicon: HALOT
  rationale: Se conserva el parentesco/cercanía del hebreo 'hermanos'. 'De parte de' aclara que la disputa proviene de ellos, no que ustedes son sus hermanos.
- source_word: הַיֹּשְׁבִים בְּעָרֵיהֶם
  english_pob_choice: who live in their cities
  chosen_spanish: que habitan en sus ciudades
  alternatives_spanish:
  - que viven en sus ciudades
  - que moran en sus ciudades
  lexicon: HALOT
  rationale: '''Habitan'' es natural, digno y cercano al valor de participio estable del hebreo; mantiene el matiz de residencia estable.'
- source_word: בֵּין דָּם לְדָם
  english_pob_choice: between blood and blood
  chosen_spanish: entre sangre y sangre
  alternatives_spanish:
  - entre derramamiento de sangre y derramamiento de sangre
  - en casos de sangre
  - entre un caso de sangre y otro
  lexicon: HALOT
  rationale: La expresión hebrea es breve y técnica. Se conserva en forma literal para no borrar la tensión interpretativa documentada por el POB; la nota aclara que probablemente remite a casos de derramamiento de sangre o homicidio.
- source_word: תּוֹרָה
  english_pob_choice: law
  chosen_spanish: ley
  alternatives_spanish:
  - instrucción
  - torá
  - norma
  lexicon: HALOT
  rationale: Aunque תּוֹרָה puede abarcar instrucción, aquí el POB opta por 'law' en un marco forense. 'Ley' es el equivalente español más natural y mantiene el registro jurídico.
- source_word: מִצְוָה
  english_pob_choice: commandment
  chosen_spanish: mandamiento
  alternatives_spanish:
  - precepto
  - mandato
  - orden
  lexicon: HALOT
  rationale: '''Mandamiento'' preserva el componente de orden vinculante y corresponde bien al paralelismo con ''ley''.'
- source_word: חֻקִּים
  english_pob_choice: statutes
  chosen_spanish: estatutos
  alternatives_spanish:
  - decretos
  - ordenanzas
  - preceptos
  lexicon: HALOT
  rationale: '''Estatutos'' refleja la categoría fija de disposiciones normativas sin perder el plural hebreo.'
- source_word: מִשְׁפָּטִים
  english_pob_choice: judgments
  chosen_spanish: juicios
  alternatives_spanish:
  - sentencias
  - ordenanzas
  - decretos
  lexicon: HALOT
  rationale: '''Juicios'' conserva el paralelismo con el inglés POB ''judgments'' y el campo semántico de decisiones legales; en español suena menos moderno que ''sentencias'', pero es más fiel al término bíblico.'
- source_word: וְהִזְהַרְתֶּם אֹתָם
  english_pob_choice: you shall warn them
  chosen_spanish: ustedes los amonestarán
  alternatives_spanish:
  - ustedes los advertirán
  - ustedes los exhortarán
  - ustedes los advertirán con firmeza
  lexicon: HALOT
  rationale: '''Amonestar'' comunica la idea de advertir para prevenir culpa o error; en español bíblico conserva la fuerza correctiva del hifil de זהר.'
- source_word: יֶאְשְׁמוּ לַיהוָה
  english_pob_choice: incur guilt before Yahweh
  chosen_spanish: incurran en culpa delante de Yahvé
  alternatives_spanish:
  - se hagan culpables ante Yahvé
  - incurran en culpa contra Yahvé
  - queden culpables delante de Yahvé
  lexicon: HALOT
  rationale: El verbo אשׁם expresa quedar o incurrir en culpa. 'Delante de Yahvé' mantiene la referencia de responsabilidad ante Dios y evita ocultar el nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Siguiendo el estándar del proyecto, el Tetragrámaton se translitera como 'Yahvé' en el texto principal, en vez de sustituirlo por un título.
- source_word: קֶצֶף
  english_pob_choice: wrath
  chosen_spanish: indignación
  alternatives_spanish:
  - ira
  - furor
  - ira ardiente
  lexicon: HALOT
  rationale: '''Indignación'' comunica la respuesta judicial/covenantal de Dios o la reacción de juicio mencionada en el contexto; evita suavizar el término, aunque ''ira'' también sería posible.'
- source_word: כֹּה תַעֲשׂוּן
  english_pob_choice: Do this
  chosen_spanish: Hagan esto
  alternatives_spanish:
  - Así hagan
  - Obren así
  - Esto hagan
  lexicon: HALOT
  rationale: La forma resume la instrucción anterior. 'Hagan esto' es una imperativa natural en español y mantiene la referencia anafórica.
- source_word: תֶאְשָׁמוּ
  english_pob_choice: you will not incur guilt
  chosen_spanish: no incurrirán en culpa
  alternatives_spanish:
  - no serán culpables
  - no quedarán culpables
  - no se harán culpables
  lexicon: HALOT
  rationale: Se mantiene la misma raíz conceptual de אשׁם que en la cláusula anterior para preservar la cohesión semántica del versículo.
theological_decisions:
- issue: Tratamiento del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa el Tetragrámaton directamente. Conforme a la política del proyecto, se translitera el nombre divino en lugar de reemplazarlo por una sustitución reverencial como 'el Señor'.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
- issue: Lenguaje de culpa ante Dios
  english_pob_reading: incur guilt before Yahweh
  chosen_spanish_reading: incurran en culpa delante de Yahvé
  alternative_spanish_readings:
  - se hagan culpables ante Yahvé
  - queden culpables delante de Yahvé
  rationale: אשׁם no describe solo una emoción sino una condición de culpa o responsabilidad jurídica ante Dios. 'Delante de Yahvé' conserva el carácter teológico y judicial de la advertencia.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Expresión 'entre sangre y sangre'
  english_pob_reading: between blood and blood
  chosen_spanish_reading: entre sangre y sangre
  alternative_spanish_readings:
  - entre derramamiento de sangre y derramamiento de sangre
  - en casos de sangre
  rationale: Se preserva la literalidad en el texto principal para no borrar la tensión interpretativa ya documentada por el POB. La ambigüedad parece referirse a casos de derramamiento de sangre o homicidio, pero el texto no la explicita.
  doctrine_reference: DOCTRINE.md Source transparency and lexical tension
translation_notes:
  revision_awareness: Alineado con el último pase de revisión, que marcó alta concordancia y sin cambios necesarios; se conservan las decisiones auditadas del POB en torno a רִיב, la frase בין דם לדם, אשׁם y el Tetragrámaton.
  spanish_consistency_notes:
  - Se mantuvo Yahvé para יהוה, conforme al estándar del proyecto.
  - Se conservó la raíz conceptual de אשׁם con 'incurrir en culpa' para ambas ocurrencias del versículo.
  - Se respetó la tensión léxica de 'entre sangre y sangre' con nota explicativa, sin resolverla en exceso dentro del texto principal.
  - El paralelismo legal 'ley y mandamiento, estatutos y juicios' sigue de cerca la estructura del hebreo y el audit trail inglés.
