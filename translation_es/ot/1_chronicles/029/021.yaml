translation:
  language: es
  text: 'Sacrificaron sacrificios a Yahvé y ofrecieron holocaustos a Yahvé al día siguiente de aquel día[a]: mil toros, mil carneros, mil corderos y sus libaciones[b], y sacrificios en abundancia para todo Israel[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más fluidamente: «al día siguiente». El hebreo dice literalmente: «al día siguiente de aquel día».'
    reason: lexical_alternative
  - marker: b
    text: «Libaciones» se refiere a ofrendas líquidas derramadas junto con los sacrificios; alternativamente, «ofrendas de bebida».
    reason: cultural_note
  - marker: c
    text: O, «en favor de todo Israel».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּזְבְּחוּ
  english_pob_choice: They sacrificed
  chosen_spanish: Sacrificaron
  alternatives_spanish:
  - Ofrecieron sacrificios
  - Sacrificaron como ofrenda
  lexicon: HALOT
  rationale: זבח en contexto cultual expresa la acción sacrificial. «Sacrificaron» mantiene la fuerza verbal y evita una paráfrasis más débil.
- source_word: זְבָחִים
  english_pob_choice: sacrifices
  chosen_spanish: sacrificios
  alternatives_spanish:
  - ofrendas sacrificiales
  - sacrificios rituales
  lexicon: HALOT
  rationale: El sustantivo repite la raíz verbal y en español «sacrificios» conserva esa conexión léxica que el inglés también retuvo.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  lexicon: HALOT
  rationale: 'La preposición marca dirección/dedicación de la ofrenda. Se conserva el nombre divino según el criterio del proyecto: «Yahvé».'
- source_word: עֹלוֹת
  english_pob_choice: burnt offerings
  chosen_spanish: holocaustos
  alternatives_spanish:
  - ofrendas totalmente quemadas
  - ofrendas quemadas
  lexicon: HALOT
  rationale: En español bíblico y cultual, «holocaustos» es el término tradicional y preciso para ofrendas totalmente quemadas. Se usa sin diluir el valor técnico del hebreo.
- source_word: לְמָחֳרַת הַיּוֹם הַהוּא
  english_pob_choice: on the next day after that day
  chosen_spanish: al día siguiente de aquel día
  alternatives_spanish:
  - el día siguiente de aquel día
  - al siguiente día de aquel día
  lexicon: HALOT
  rationale: La frase hebrea es enfática y algo redundante; el español reproduce esa secuencia sin sonar forzado. Se mantiene la relación temporal exacta que el POB inglés documenta.
- source_word: פָּרִים אֶלֶף
  english_pob_choice: one thousand bulls
  chosen_spanish: mil toros
  alternatives_spanish:
  - mil novillos
  - mil toros de sacrificio
  lexicon: HALOT
  rationale: פָּרִים son bovinos adultos aptos para sacrificio; «toros» es una equivalencia directa y natural en español.
- source_word: אֵילִים אֶלֶף
  english_pob_choice: one thousand rams
  chosen_spanish: mil carneros
  alternatives_spanish:
  - mil machos carneros
  lexicon: HALOT
  rationale: אֵילִים designa carneros, no ovejas genéricas. Se preserva la distinción sacrificial entre especies.
- source_word: כְּבָשִׂים אֶלֶף
  english_pob_choice: one thousand lambs
  chosen_spanish: mil corderos
  alternatives_spanish:
  - mil ovejas jóvenes
  lexicon: HALOT
  rationale: En contexto sacrificial, כְּבָשִׂים se traduce bien como «corderos». Es claro y mantiene el matiz cultual de animales jóvenes.
- source_word: וְנִסְכֵּיהֶם
  english_pob_choice: and their drink offerings
  chosen_spanish: y sus libaciones
  alternatives_spanish:
  - y sus ofrendas de bebida
  lexicon: HALOT
  rationale: נסכים son ofrendas líquidas derramadas junto con los sacrificios. «Libaciones» conserva la precisión técnica y evita una perífrasis larga.
- source_word: וּזְבָחִים לָרֹב
  english_pob_choice: and sacrifices in abundance
  chosen_spanish: y sacrificios en abundancia
  alternatives_spanish:
  - y muchos sacrificios
  - y sacrificios en gran número
  lexicon: HALOT
  rationale: לָרֹב comunica abundancia o gran cantidad. La frase resume ofrendas adicionales más allá de la lista numérica.
- source_word: לְכָל יִשְׂרָאֵל
  english_pob_choice: for all Israel
  chosen_spanish: para todo Israel
  alternatives_spanish:
  - en favor de todo Israel
  - por todo Israel
  lexicon: HALOT
  rationale: La preposición ל admite un sentido amplio de destinatario/beneficio. «Para todo Israel» es fiel y no sobrerrepresenta la dimensión representativa.
theological_decisions:
- issue: Cómo renderizar el nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: El texto hebreo usa el Tetragrámaton directamente; el proyecto pide «Yahvé» como forma principal en español. Se evita el sustituto litúrgico «SEÑOR» para mantener la trazabilidad al nombre propio.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de לְכָל יִשְׂרָאֵל
  english_pob_reading: for all Israel
  chosen_spanish_reading: para todo Israel
  alternative_spanish_readings:
  - en favor de todo Israel
  - a favor de todo Israel
  rationale: La preposición puede expresar destino o beneficio sin exigir una formulación doctrinal más fuerte. «Para todo Israel» conserva el alcance comunitario sin añadir una interpretación expiatoria explícita.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente sin cambios sustanciales: el texto base se mantiene conforme al expediente inglés, con ajuste natural al español y preservación de las distinciones cultuales y temporales documentadas.'
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para יהוה.
  - Se conserva la distinción entre «sacrificios», «holocaustos» y «libaciones» para reflejar los distintos términos hebreos.
  - «Toros», «carneros» y «corderos» mantienen la enumeración sacrificial sin generalizar las especies.
  - La frase temporal mantiene el énfasis hebreo sin convertirla en una paráfrasis más libre.
