review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: mantiene la fórmula profética ''בֶּן אָדָם'', la referencia masculina ''estos hombres'', los ídolos ''en su corazón'', el ''tropiezo de su iniquidad'' y la pregunta retórica final con expectativa negativa. Sin embargo, en español hay dos desajustes importantes con el texto y la auditoría inglesa: el marcador [a] está mal anclado, porque la nota trata de גִלּוּלִים (''ídolos'') y no de ''Hijo de hombre''; y ''delante de su rostro'' suena menos natural que una formulación plural que refleje mejor ''before their faces''.'
  spanish_quality_summary: El español es mayormente claro y digno, pero requiere pulido para naturalidad y precisión editorial. 'Hijo de hombre' funciona en Ezequiel, aunque 'delante de su rostro' resulta algo rígido y menos idiomático que 'delante de sus rostros'. Además, las notas deben anclarse exactamente donde corresponden según la política del proyecto.
  glossary_alignment: 'La terminología principal está alineada con las decisiones del POB: ''Hijo de hombre'', ''estos hombres'', ''ídolos'', ''iniquidad''. No hay términos del glosario mayor (Yahvé, Mesías, etc.) en este versículo. La cláusula final necesita conservar el matiz de consulta divina; ''¿Acaso debería ser consultado por ellos?'' es aceptable, aunque ''¿Acaso he de dejar que me consulten?'' reflejaría mejor el ''let myself be consulted'' del inglés auditado.'
  issues:
  - severity: high
    issue: El marcador de la nota [a] está colocado en 'Hijo de hombre' en lugar de en 'ídolos'.
    rationale: La nota explica el término hebreo גִלּוּלִים, que corresponde a 'ídolos'. Según las reglas del proyecto, el marcador debe aparecer exactamente en la palabra o frase relevante del texto español.
  - severity: medium
    issue: '''Delante de su rostro'' no refleja con naturalidad ni número la imagen hebrea ''before their faces''.'
    rationale: El hebreo tiene plural con sufijo plural ('sus rostros/caras'). En español, 'delante de sus rostros' o 'delante de sus caras' preserva mejor la vividez espacial y evita una singularización innecesaria.
  - severity: medium
    issue: La cláusula final podría alinearse mejor con la decisión inglesa 'let myself be consulted'.
    rationale: '''Ser consultado por ellos'' comunica el sentido básico, pero atenúa el matiz permisivo/reflexivo que el POB inglés quiso destacar. ''¿Acaso he de dejar que me consulten?'' conserva mejor esa racionalidad sin sobretraducir.'
  revised_spanish_text: Hijo de hombre, estos hombres han puesto sus ídolos[a] en su corazón y han colocado el tropiezo de su iniquidad delante de sus rostros[b]. ¿Acaso he de dejar que me consulten?
  revised_footnotes:
