translation:
  language: es
  text: Y el pueblo se levantó todo aquel día y toda aquella noche y todo el día siguiente, y recogieron las codornices. El que recogió menos, recogió diez homeres[a]; y las extendieron para ellos mismos por todo alrededor del campamento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Un homer era una gran medida para productos secos. Su equivalente moderno exacto es incierto; la idea es que aun el que recogió menos reunió una cantidad muy grande. O bien, «diez cargas de asno», si חֳמָרִים se entiende por su asociación etimológica en vez de como la medida estándar de capacidad «homer».
    reason: Combina la nota cultural auditada con la alternativa léxica preservada por el POB inglés.
lexical_decisions:
- source_word: וַיָּקָם
  english_pob_choice: rose up
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - se puso en pie
  lexicon: HALOT
  rationale: El hebreo introduce una acción enérgica y narrativa. En español, «se levantó» conserva el impulso idiomático de קום sin sonar forzado.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - el pueblo de Israel
  lexicon: HALOT
  rationale: En este contexto colectivo, «el pueblo» es natural en español bíblico moderno y mantiene el referente comunitario de עם.
- source_word: כָּל הַיּוֹם הַהוּא וְכָל הַלַּיְלָה וְכֹל יוֹם הַמָּחֳרָת
  english_pob_choice: all that day and all that night and all the next day
  chosen_spanish: todo aquel día y toda aquella noche y todo el día siguiente
  alternatives_spanish:
  - todo aquel día, toda aquella noche y todo el día siguiente
  - todo aquel día y toda la noche y todo el día siguiente
  lexicon: HALOT
  rationale: La secuencia hebrea enfatiza duración ininterrumpida. «Aquel/ aquella» refleja bien הַהוּא, y «día siguiente» es una forma natural de מָחֳרָת.
- source_word: וַיַּאַסְפוּ אֶת־הַשְּׂלָו
  english_pob_choice: and they gathered the quail
  chosen_spanish: y recogieron las codornices
  alternatives_spanish:
  - y juntaron las codornices
  - y reunieron las codornices
  lexicon: HALOT
  rationale: שְׂלָו designa las codornices; «recogieron» comunica bien אָסַף en el contexto de tomar lo provisto. Uso plural para concordar con el español natural del sustantivo colectivo en este pasaje.
- source_word: הַמַּמְעִיט
  english_pob_choice: the one who gathered the least
  chosen_spanish: el que recogió menos
  alternatives_spanish:
  - el que menos recogió
  - el más pobre en la recolección
  lexicon: HALOT
  rationale: El participio intensivo/causativo de מעט expresa al que quedó en el mínimo de la recolección. «El que recogió menos» es claro y evita sobreexplicar.
- source_word: אָסַף עֲשָׂרָה חֳמָרִים
  english_pob_choice: gathered ten homers
  chosen_spanish: recogió diez homer
  alternatives_spanish:
  - recogió diez medidas homer
  - recogió diez cargas de asno
  lexicon: HALOT
  rationale: Conservé el término técnico «homer» sin pluralizarlo en español, para mantener la unidad de medida tradicional y la cautela del POB ante equivalencias modernas inciertas. No se adopta «cargas de asno» por ser una posibilidad etimológica menos segura.
- source_word: וַיִּשְׁטְחוּ לָהֶם שָׁטוֹחַ
  english_pob_choice: and they spread them out for themselves
  chosen_spanish: y las extendieron para sí
  alternatives_spanish:
  - y las tendieron para sí
  - y las dispusieron para sí
  lexicon: HALOT
  rationale: El verbo שטח con infinitivo cognado da idea de extender o tender. «Las extendieron para sí» mantiene la acción sin añadir una finalidad no explicitada.
- source_word: סְבִיבוֹת הַמַּחֲנֶה
  english_pob_choice: all around the camp
  chosen_spanish: todo alrededor del campamento
  alternatives_spanish:
  - alrededor del campamento
  - en derredor del campamento
  lexicon: HALOT
  rationale: «Todo alrededor» expresa היטב el sentido distributivo de סְבִיבוֹת y suena natural en español actual.
theological_decisions:
- issue: Valor del término de medida חֳמָרִים y su posible lectura etimológica
  english_pob_reading: homer as a large dry measure; alternative 'ten donkey-loads' noted as lexical possibility
  chosen_spanish_reading: homer como medida tradicional, sin equivalencia moderna precisa
  alternative_spanish_readings:
  - diez cargas de asno
  - diez medidas de capacidad
  rationale: El texto resalta una cantidad enorme, no una equivalencia metrológica exacta. Mantener «homer» preserva la cautela auditada por el POB y evita una precisión engañosa.
  doctrine_reference: No aplica; decisión de metrología textual.
translation_notes:
  revision_awareness: El auditorio inglés mantiene «all that night» tras la revisión más reciente por ser más natural; el español refleja esa misma naturalidad con «toda aquella noche». No se introdujeron cambios de sentido respecto del hebreo ni del registro auditado del POB.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando el pasaje lo requiera explícitamente; en este versículo no aparece el nombre divino.
  - «Homer» se conserva como término técnico transliterado, en consonancia con la cautela del POB frente a equivalencias modernas inciertas.
  - Se eligió un español sobrio y bíblico, evitando calcos innecesarios pero sin expandir el sentido del hebreo.
