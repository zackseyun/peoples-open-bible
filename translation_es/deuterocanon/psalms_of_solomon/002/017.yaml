translation:
  language: es
  text: Porque tú retribuiste a los pecadores[a] conforme a sus obras[b], y conforme a sus pecados sumamente malos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los pecadores» puede entenderse simplemente como «pecadores»; aquí se mantiene el artículo por el valor definido del griego.
    reason: previous_rendering
  - marker: b
    text: O «hechos».
    reason: lexical_alternative
  - marker: c
    text: O «muy malos».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέδωκας
  english_pob_choice: repaid
  chosen_spanish: recompensaste
  alternatives_spanish:
  - pagaste de vuelta
  - retribuiste
  - restituiste
  lexicon: BDAG
  rationale: El verbo expresa dar de vuelta lo que correspondía, con sentido de retribución judicial. «Recompensaste» comunica bien esa idea en español sin sonar forzado.
- source_word: τοῖς ἁμαρτωλοῖς
  english_pob_choice: the sinners
  chosen_spanish: los pecadores
  alternatives_spanish:
  - los pecadores culpables
  - los malvados
  - los que pecan
  lexicon: BDAG
  rationale: «Pecadores» es el equivalente directo y conserva el valor de grupo designado por el artículo definido en el contexto auditado. No se desplaza a un término más interpretativo.
- source_word: ἔργα
  english_pob_choice: deeds
  chosen_spanish: obras
  alternatives_spanish:
  - acciones
  - hechos
  - obras realizadas
  lexicon: BDAG
  rationale: Aunque el inglés POB prefirió «deeds», en español «obras» mantiene de forma natural la correspondencia con τὰ ἔργα y conserva el registro moral/judicial del pasaje.
- source_word: ἁμαρτίας
  english_pob_choice: sins
  chosen_spanish: pecados
  alternatives_spanish:
  - faltas
  - transgresiones
  - ofensas
  lexicon: BDAG
  rationale: «Pecados» es la equivalencia más directa y mantiene la repetición conceptual del griego entre ἁμαρτωλοῖς y ἁμαρτίας.
- source_word: πονηρὰς σφόδρα
  english_pob_choice: exceedingly evil
  chosen_spanish: sumamente malos
  alternatives_spanish:
  - muy malos
  - sumamente perversos
  - extremadamente malos
  lexicon: BDAG
  rationale: La combinación conserva el intensificador σφόδρα y el valor moral de πονηράς. «Sumamente malos» es natural en español y suficientemente fuerte para el contraste.
theological_decisions:
- issue: Alcance de «los pecadores» como etiqueta de grupo
  english_pob_reading: the sinners designates a specific historical and sociological faction, not a generic moral category.
  chosen_spanish_reading: «los pecadores» conserva la etiqueta de grupo sin convertirla en una categoría moral más general o abstracta.
  alternative_spanish_readings:
  - los pecadores en general
  - los malvados
  - los que pecan
  rationale: El artículo definido y el sustantivo común mantienen la referencia grupal advertida por el audit trail, sin añadir explicación interpretativa al texto principal.
  doctrine_reference: Sentido histórico-literario del Salterio de Salomón; coherencia contextual del grupo nominal definido.
translation_notes:
  revision_awareness: El auditor inglés corrigió una omisión de la conjunción y reafirmó que τοῖς ἁμαρτωλοῖς funciona como etiqueta definida de un grupo histórico; la versión española conserva esa definitud con «los pecadores» y reproduce la doble correspondencia causal «conforme a... y conforme a...».
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque no hay Tetragrámaton ni κύριος en el versículo.
  - Se mantiene un orden español natural, pero sin borrar la repetición del griego entre obras y pecados.
  - «Recompensaste» expresa retribución; no suaviza el carácter judicial del verbo.
  - «Pecados» conserva el paralelismo con «pecadores» sin diluir la carga moral.
