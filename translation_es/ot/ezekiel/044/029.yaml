translation:
  language: es
  text: Ellos comerán la ofrenda de cereal, la ofrenda por el pecado y la ofrenda por la culpa, y todo lo dedicado[a] en Israel será de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘todo lo consagrado irrevocablemente a Dios’. La palabra hebrea חֵרֶם se refiere a algo apartado de manera definitiva para Dios; en otros contextos puede llevar el matiz de ‘dedicado a destrucción’.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמִּנְחָה
  english_pob_choice: the grain offering
  chosen_spanish: la ofrenda vegetal
  alternatives_spanish:
  - la ofrenda de grano
  - la ofrenda de cereal
  lexicon: HALOT
  rationale: En contexto sacerdotal, מִנְחָה designa la ofrenda sacrificial de productos vegetales, no una ofrenda genérica. ‘Vegetal’ comunica en español la distinción cultual frente a las otras ofrendas del verso y evita un calco demasiado moderno o ambiguo.
- source_word: הַחַטָּאת
  english_pob_choice: the sin offering
  chosen_spanish: la ofrenda por el pecado
  alternatives_spanish:
  - la ofrenda por el pecado y la purificación
  - la ofrenda de purificación
  lexicon: HALOT
  rationale: El término puede referirse al pecado o a la ofrenda asociada con la purificación del pecado. En esta lista de porciones sacerdotales, el sentido sacrificial es el requerido; ‘ofrenda por el pecado’ mantiene la categoría tradicional sin borrar la posibilidad léxica de purificación, que queda implícita en la nota alternativa.
- source_word: הָאָשָׁם
  english_pob_choice: the guilt offering
  chosen_spanish: la ofrenda por la culpa
  alternatives_spanish:
  - la ofrenda de reparación
  - la ofrenda de compensación
  lexicon: HALOT
  rationale: אָשָׁם nombra una ofrenda vinculada con la culpa o la responsabilidad legal. ‘Ofrenda por la culpa’ conserva esa relación de manera natural en español y evita desplazar el énfasis hacia una sola idea de restitución.
- source_word: הֵמָּה יֹאכְל֑וּם
  english_pob_choice: They shall eat
  chosen_spanish: Ellos comerán
  alternatives_spanish:
  - Comerán ellos
  - Ellos mismos comerán
  lexicon: HALOT
  rationale: 'El hebreo es enfático: ‘ellos’ y el sufijo objeto ‘-las/-los’ (implícito en el verbo) indican que esas porciones pertenecen al consumo sacerdotal. En español, el objeto puede omitirse porque ya quedó expresado por la serie de ofrendas; ‘Ellos comerán’ conserva la fuerza distributiva y evita una repetición torpe.'
- source_word: חֵרֶם
  english_pob_choice: every devoted thing
  chosen_spanish: toda cosa dedicada
  alternatives_spanish:
  - todo lo dedicado
  - toda cosa consagrada
  lexicon: HALOT
  rationale: חֵרֶם es técnico y puede abarcar algo irrevocablemente apartado para Dios; en otros contextos puede tener el matiz de destrucción. Aquí el contexto es de pertenencia y asignación sacerdotal, por lo que ‘dedicada’ preserva el sentido cultual sin introducir innecesariamente la idea bélica.
- source_word: בְּיִשְׂרָאֵל
  english_pob_choice: in Israel
  chosen_spanish: en Israel
  alternatives_spanish:
  - entre Israel
  lexicon: HALOT
  rationale: La expresión delimita el ámbito donde aparecen esas cosas dedicadas. ‘En Israel’ es la solución más natural y suficiente en español.
- source_word: לָהֶם יִהְיֶה
  english_pob_choice: shall be theirs
  chosen_spanish: será de ellos
  alternatives_spanish:
  - les pertenecerá
  - será suyo
  lexicon: HALOT
  rationale: El hebreo expresa posesión o derecho de asignación. ‘Será de ellos’ conserva el giro legal y la relación de pertenencia de forma clara y sobria en español.
theological_decisions:
- issue: Distinción de categorías sacrificiales
  english_pob_reading: Use established cultic terms ('grain offering,' 'sin offering,' 'guilt offering') rather than flattening them into generic offerings.
  chosen_spanish_reading: 'Conservar las tres categorías como ofrendas distintas: ofrenda vegetal, ofrenda por el pecado y ofrenda por la culpa.'
  alternative_spanish_readings:
  - usar términos más genéricos como 'ofrenda' en los tres casos
  - reemplazar por 'ofrenda de purificación' y 'ofrenda de reparación'
  rationale: El verso enumera porciones sacerdotales específicas dentro del sistema sacrificial. Mantener la distinción evita borrar la estructura legal-cúltica del pasaje y respeta la tensión lexical entre categorías emparentadas pero no idénticas.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Sentido de חֵרֶם en este contexto
  english_pob_reading: Render as 'devoted thing' in the main text.
  chosen_spanish_reading: Traducirlo como 'cosa dedicada' en el texto principal.
  alternative_spanish_readings:
  - '''cosa devota'''
  - '''cosa dedicada a destrucción'''
  rationale: Aquí no se trata de guerra ni de destrucción, sino de bienes que pasan a una esfera de pertenencia sagrada. 'Dedicada' conserva la idea de apartamiento irrevocable sin inducir un matiz incorrecto.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: El pasaje fue revisado en el flujo inglés y quedó sin cambios sustantivos; la equivalencia alta confirma que no hay variantes textuales ni decisiones de revisión que requieran ajuste adicional en español.
  spanish_consistency_notes:
  - Se mantiene Yahvé en la serie POB cuando el texto hebreo requiera el nombre divino; este versículo no lo contiene.
  - Se evita 'SEÑOR' como sustituto de YHWH porque no aparece aquí y no corresponde a una máscara de nombre divino.
  - '''ofrenda vegetal'' sigue la decisión POB de no colapsar מִנְחָה en una ofrenda genérica.'
  - '''ofrenda por la culpa'' conserva el paralelo con ''ofrenda por el pecado'' y no introduce un vocabulario litúrgico más técnico de lo que exige el verso.'
