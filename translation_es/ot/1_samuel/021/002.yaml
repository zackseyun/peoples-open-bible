  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia narrativa y la mayor parte de las decisiones léxicas del hebreo: David va a Nob, Ahimelec el sacerdote reacciona con temor, y pregunta por qué David está solo. Sin embargo, en la última cláusula neutraliza אִישׁ como «nadie» en el texto principal, cuando la evidencia fuente y la decisión teológica documentada favorecen conservar el referente masculino en la traducción principal, dejando la opción más general como alternativa si se desea.'
  spanish_quality_summary: El español es natural y legible, con buen registro narrativo. «Tembló al encontrarse con David» funciona, aunque «al encuentro con David» o «al salir al encuentro de David» sería algo más cercano al valor de לִקְרַאת; no es un problema grave. El ajuste principal necesario es «no hay nadie contigo» -> «no hay ningún hombre contigo» o equivalente, para alinear mejor fuente, política del proyecto y claridad española.
  glossary_alignment: No hay términos del glosario mayor en juego salvo la política de precisión de género. «El sacerdote» y «tembló» están bien alineados. La desviación importante es וְאִישׁ אֵין אִתָּךְ, donde el texto español debería conservar «hombre» en vez de neutralizarlo a «nadie», ya que el expediente inglés documenta explícitamente esa fuerza léxica y teológica.
  issues:
  - severity: high
    issue: Neutralización de אִישׁ en el texto principal
    rationale: El hebreo dice explícitamente אִישׁ, y la decisión teológica/lexical documentada del proyecto favorece mantener «man» en el texto principal por el contexto de acompañantes varones de David. «Nadie» borra ese matiz y contradice la razón documentada, aunque aparezca como alternativa en la auditoría inglesa.
  - severity: low
    issue: Matiz de לִקְרַאת algo suavizado
    rationale: «Al encontrarse con David» es idiomático, pero desplaza levemente la idea de reacción al encuentro/venida de David. No exige cambio obligatorio, porque sigue dentro del sentido permitido por la evidencia y suena natural en español.
  revised_spanish_text: 'David llegó a Nob[a], a Ahimelec, el sacerdote. Ahimelec tembló al encontrarse con David y le dijo: «¿Por qué estás solo, y no hay ningún hombre contigo?[a]»'
  revised_footnotes:
  - marker: a
    text: 'O: «y no hay nadie contigo». El hebreo dice más específicamente «no hay hombre contigo».'
    reason: lexical_alternative
