theological_decisions:
- issue: Rendering the familial address παιδίον
  chosen_reading: child
  alternative_readings:
  - my child
  - son
  rationale: The Greek term is affectionate but not explicitly possessive here, and it does not itself require 'son.' 'Child' preserves the tenderness without adding information not present in the wording.
  doctrine_reference: DOCTRINE.md §Translation philosophy, gender-accurate over gender-neutral
- issue: Idiomatic force of 'she has seen many dangers'
  chosen_reading: she faced many dangers because of you while you were in the womb
  alternative_readings:
  - she has seen many dangers on your account in the womb
  rationale: A more literal rendering could sound opaque in English. The chosen wording preserves the maternal-risk sense implied by the Greek while remaining readable and faithful.
  doctrine_reference: DOCTRINE.md §Translation philosophy, optimal equivalence
