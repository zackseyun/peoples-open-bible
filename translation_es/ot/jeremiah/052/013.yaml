translation:
  language: es
  text: Quemó la casa de Yahvé[a], la casa del rey[b], y todas las casas de Jerusalén; cada casa grande[c] la quemó con fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el templo de Yahvé». El hebreo dice literalmente «la casa de Yahvé».
    reason: lexical_alternative
  - marker: b
    text: O «el palacio del rey». El hebreo dice literalmente «la casa del rey».
    reason: lexical_alternative
  - marker: c
    text: O «cada casa grande/importante». El hebreo dice literalmente «cada casa grande».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׂרֹף
  english_pob_choice: He burned
  chosen_spanish: Quemó
  alternatives_spanish:
  - Y quemó
  - Incendió
  - Prendió fuego a
  lexicon: HALOT
  rationale: El verbo qal wayyiqtol de שׂרף introduce la acción narrativa de manera directa. En español, «quemó» comunica el hecho con naturalidad y sin añadir matiz interpretativo. «Incendió» o «prendió fuego a» serían posibles, pero desplazan el énfasis o vuelven más perifrástica la frase.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa del SEÑOR
  - la casa de Yahweh
  lexicon: HALOT
  rationale: La frase hebrea dice literalmente «casa de YHWH». Se conserva el sustantivo «casa» para mantener el paralelismo del versículo y el nombre divino «Yahvé» conforme al criterio del proyecto. «Templo» interpreta la expresión y se deja solo como alternativa.
- source_word: בֵּית הַמֶּלֶךְ
  english_pob_choice: the house of the king
  chosen_spanish: la casa del rey
  alternatives_spanish:
  - el palacio del rey
  - el palacio real
  lexicon: HALOT
  rationale: El hebreo dice literalmente «casa del rey». Aunque se refiere al palacio, se mantiene «casa» para reproducir la estructura repetida del original y su paralelismo con «la casa de Yahvé». «Palacio» es correcto en sentido referencial, pero más interpretativo.
- source_word: כָּל בָּתֵּי יְרוּשָׁלִַם
  english_pob_choice: all the houses of Jerusalem
  chosen_spanish: todas las casas de Jerusalén
  alternatives_spanish:
  - todas las casas en Jerusalén
  - todos los edificios de Jerusalén
  lexicon: HALOT
  rationale: La expresión corresponde de manera directa a «todas las casas de Jerusalén». Se conserva el genitivo hebreo con una construcción natural en español. «Edificios» ampliaría indebidamente el alcance, y «en Jerusalén» debilita la relación posesiva o local del original.
- source_word: כָּל בֵּית הַגָּדוֹל
  english_pob_choice: every great house
  chosen_spanish: toda casa grande
  alternatives_spanish:
  - toda casa importante
  - todas las casas grandes
  - cada casa grande
  lexicon: HALOT
  rationale: El hebreo usa un singular distributivo tras כָּל, por lo que «toda casa grande» refleja mejor la forma original que una pluralización. «Grande» conserva la conexión léxica con גָּדוֹל; «importante» sería una interpretación semántica posible, pero menos literal.
- source_word: שָׂרַף בָּאֵשׁ
  english_pob_choice: he burned with fire
  chosen_spanish: la quemó con fuego
  alternatives_spanish:
  - la incendió
  - la consumió con fuego
  - la quemó en el fuego
  lexicon: HALOT
  rationale: La repetición del verbo de quemar junto con «con fuego» es enfática en hebreo. En español, «la quemó con fuego» conserva esa intensificación sin sonar artificial. Se evita colapsar el énfasis en un solo giro idiomático como «la incendió».
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahweh
  rationale: El texto hebreo usa directamente el Tetragrámaton, y el criterio del proyecto establece «Yahvé» como forma principal en español. Se evita el mascaramiento litúrgico «SEÑOR» para conservar la transparencia textual y la audibilidad del nombre del pacto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: Revisión basada en el audit trail en inglés y el hebreo WLC; se conserva el paralelismo repetido de בֵּית («casa») y el énfasis final de שָׂרַף בָּאֵשׁ con una duplicación semántica visible en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto en español.
  - Se conserva «casa» en las dos primeras ocurrencias para reflejar el paralelismo del hebreo, aun cuando una de ellas pueda referirse al palacio.
  - Se traduce גָּדוֹל por «grande» y no por «importante» para no suavizar el vínculo léxico con el hebreo.
  - 'La estructura del cierre mantiene la idea de acción intensiva: «quemó... con fuego».'
