translation:
  language: es
  text: Y toda deuda real[a] y los ingresos reales venideros, desde ahora y por todo tiempo, te sean remitidos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los futuros tributos reales» o «lo que habrá de ingresar al rey». El griego no especifica con exactitud la categoría fiscal, sino que habla de aquello que, por su carácter real, está por acumularse.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶν
  english_pob_choice: every
  chosen_spanish: toda
  alternatives_spanish:
  - cada
  - todo
  lexicon: LSJ
  rationale: El griego distributivo con ὀφείλημα singular pide incluir cada partida; en español, «toda» conserva esa amplitud en un registro natural y evita una construcción demasiado dura como «cada deuda».
- source_word: ὀφείλημα
  english_pob_choice: debt
  chosen_spanish: deuda
  alternatives_spanish:
  - lo debido
  - obligación
  - adeudo
  lexicon: LSJ
  rationale: En un contexto fiscal y decretal, el sentido básico es algo debido. «Deuda» es la equivalencia más directa y transparente en español.
- source_word: βασιλικὸν
  english_pob_choice: royal
  chosen_spanish: real
  alternatives_spanish:
  - regio
  - del rey
  - de la corona
  lexicon: LSJ
  rationale: «Real» comunica naturalmente lo perteneciente al rey o a la administración real en español, y conserva el valor político-administrativo del adjetivo griego.
- source_word: τὰ ἐσόμενα βασιλικά
  english_pob_choice: the royal revenues yet to come
  chosen_spanish: los ingresos reales venideros
  alternatives_spanish:
  - los futuros tributos reales
  - las futuras rentas reales
  - lo que habrá de ingresar al rey
  lexicon: LSJ
  rationale: El participio futuro con neutro plural indica cantidades que todavía han de entrar/afluir al tesoro real. «Ingresos reales venideros» mantiene el carácter prospectivo sin precisar indebidamente una categoría fiscal concreta.
- source_word: ἀπὸ τοῦ νῦν
  english_pob_choice: from now on
  chosen_spanish: desde ahora
  alternatives_spanish:
  - de aquí en adelante
  - desde el presente
  - en adelante
  lexicon: LSJ
  rationale: La frase temporal idiomática se expresa de manera clara y natural con «desde ahora», que mantiene el inicio inmediato de la exención.
- source_word: εἰς τὸν ἅπαντα χρόνον
  english_pob_choice: for all time
  chosen_spanish: para todo tiempo
  alternatives_spanish:
  - por todo tiempo
  - para siempre
  - por siempre
  lexicon: LSJ
  rationale: «Para todo tiempo» reproduce la amplitud indefinida del griego sin imponer una paráfrasis más idiomática pero menos transparente como «para siempre».
- source_word: ἀφέσθω
  english_pob_choice: be remitted
  chosen_spanish: queden remitidos
  alternatives_spanish:
  - sean condonados
  - sean cancelados
  - queden perdonados
  lexicon: LSJ
  rationale: En contexto legal-fiscal, ἀφίημι expresa remisión/cancelación de una obligación. «Queden remitidos» conserva ese matiz formal y evita el sesgo moral de «perdonados».
- source_word: σοι
  english_pob_choice: to you
  chosen_spanish: para ti
  alternatives_spanish:
  - a ti
  - para vosotros
  lexicon: LSJ
  rationale: El dativo señala al beneficiario de la remisión. «Para ti» suena natural en español y refleja el efecto favorable de la medida; el singular concuerda con la dirección directa del decreto.
translation_notes:
  revision_awareness: El texto español sigue de cerca el griego de 1 Maccabees 15:8 y el audit trail inglés, manteniendo la ambigüedad fiscal del original sin concretarla más de lo que permite la fuente. No se aplicaron revisiones previas en el paso actual; el pasaje se encuentra en acuerdo alto con el control de calidad inglés.
  spanish_consistency_notes:
  - Se prefirió «real» para βασιλικός en sentido administrativo, en línea con el valor político del término y sin introducir «del rey» en el texto principal.
  - Se mantuvo «remitidos» para ἀφέσθω por su fuerza jurídico-contable; en notas se preserva la alternativa fiscal más específica sin cerrar el alcance del griego.
  - Se evitó «para siempre» en el cuerpo principal para no perder la estructura semántica de εἰς τὸν ἅπαντα χρόνον, que literalmente habla de duración total sin forzar un giro idiomático adicional.
