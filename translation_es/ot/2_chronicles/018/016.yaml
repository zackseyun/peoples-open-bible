    text: 'O, de manera más idiomática: «como ovejas sin pastor».'
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice literalmente «estos no tienen señores». Algunas traducciones suavizan el plural a «no tienen amo» o «no tienen señor».
    reason: lexical_alternative
  revision_rationale: Se revisa la cláusula sobre אֲדֹנִים para reflejar fielmente el plural hebreo y evitar el añadido interpretativo «un solo». Se escoge «señores» por ser más natural en español para autoridad/gobierno en este contexto que «amo». También se corrige la nota para que describa con precisión el número y las alternativas.
