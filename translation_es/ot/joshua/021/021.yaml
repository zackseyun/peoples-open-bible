base_translation:
  language: en
  yaml_path: translation/ot/joshua/021/021.yaml
  text: They gave them Shechem with its pasturelands in the hill country of Ephraim[a], the city of refuge for the manslayer[b], and Gezer with its pasturelands.
  footnotes:
  - marker: a
    text: Or, more literally, 'the city of refuge for the killer.' The Hebrew legal term here refers to one who has caused a death and may flee for asylum pending judgment, not necessarily a convicted murderer.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Mount Ephraim'; that is, the hill country of Ephraim.
    reason: lexical_alternative
