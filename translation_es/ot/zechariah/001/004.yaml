review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo: prohibición de asemejarse a las generaciones previas, referencia a los profetas anteriores, llamado a volverse de caminos y obras malas, y cierre con la acusación de no escuchar ni atender a Yahvé. También mantiene correctamente Yahvé por יְהוָה. Sin embargo, hay dos ajustes menores para mayor fidelidad y naturalidad: (1) en español es mejor repetir la preposición antes de “sus malas obras” para reflejar con claridad מִן gobernando ambos complementos; (2) la puntuación española pide el punto dentro de las comillas antes del verbo de habla en este caso.'
  spanish_quality_summary: El texto es claro, digno y ampliamente legible en español eclesial neutral. “No sean”, “los profetas anteriores”, “Vuélvanse, por favor” y “ni me prestaron atención” son buenas decisiones. Los cambios propuestos son pequeños y estilísticos, no reescrituras mayores.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה -> “Yahvé”; שוב -> “Vuélvanse”; מַעֲלָלִים -> “obras”. La nota sobre “padres/antepasados” preserva adecuadamente la alternativa léxica documentada. No hay conflictos relevantes con el glosario.'
  issues:
  - severity: low
    issue: Preposición omitida antes de “sus malas obras”
    rationale: El hebreo שׁוּבוּ נָא מִדַּרְכֵיכֶם הָרָעִים וּמַעֲלִילֵיכֶם הָרָעִים implica “de/desde” para ambos elementos. Aunque el español puede elidirla, repetir “de” mejora claridad y paralelismo.
  - severity: low
    issue: Puntuación de cierre de cita mejorable
    rationale: 'En español, con una cita completa seguida de verbo introductor pospuesto, resulta más natural: “... malas obras”. Pero ellos... / o mantener la cita con su puntuación interna antes del cierre. El borrador coloca la comilla antes del punto, lo que no sigue la convención española recomendada.'
  revised_spanish_text: 'No sean como sus padres[a], a quienes los profetas anteriores proclamaron, diciendo: “Así dice Yahvé de los ejércitos: Vuélvanse, por favor, de sus malos caminos y de sus malas obras”. Pero ellos no escucharon ni me prestaron atención, declara Yahvé.'
  revised_footnotes:
  - marker: a
    text: O “antepasados”. El hebreo dice literalmente “sus padres”, refiriéndose a generaciones anteriores.
    reason: lexical_alternative
  revision_rationale: 'Se hacen solo ajustes menores de claridad y puntuación: se repite “de” antes de “sus malas obras” para reflejar mejor la estructura hebrea y se normaliza la puntuación de la cita en español. El resto del borrador es fiel y natural.'
