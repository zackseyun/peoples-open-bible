revisions:
- from: Ningún arma formada contra ti prosperará[a], y toda lengua que se levante contra ti en juicio, tú la condenarás. Esta es la herencia de los esclavos de Yahvé, y su justicia[b] procede de mí, declara Yahvé.
  to: Ningún arma formada contra ti prosperará, y toda lengua que se levante contra ti en juicio, tú la condenarás[a]. Esta es la herencia de los siervos de Yahvé, y su justicia[b] procede de mí, declara Yahvé.
  rationale: Se corrige la ubicación y redacción de la nota lexical alternativa para que corresponda al verbo hebreo תַרְשִׁיעִי, y se reemplaza 'esclavos' por 'siervos' para seguir la justificación contextual ya establecida en el audit trail inglés para עַבְדֵי יְהוָה. El resto del versículo puede mantenerse porque refleja adecuadamente el sentido fuente y suena natural en español eclesial contemporáneo.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:28:08Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del hebreo: niega la eficacia de cualquier arma formada contra Sion, presenta el marco forense de la lengua que se levanta en juicio, y conserva la cláusula final sobre la herencia de los siervos de Yahvé y la procedencia divina de su justicia/vindicación. Sin embargo, el borrador altera dos decisiones auditadas importantes: (1) la nota [a] está mal anclada semánticamente, porque la alternativa ''declarar culpable'' corresponde a תַרְשִׁיעִי (''condenarás''), no a ''prosperará''; y (2) ''esclavos de Yahvé'' no sigue la justificación contextual del inglés POB para עַבְדֵי, donde se documentó específicamente ''servants'' por tratarse de un título de pacto.'
  spanish_quality_summary: El español es claro y digno en general. 'Ningún arma formada contra ti prosperará' y 'toda lengua que se levante contra ti en juicio' suenan naturales. No obstante, conviene mover la nota [a] a 'condenarás' para evitar confusión, y cambiar 'esclavos' por 'siervos' o 'servidores'; en este contexto bíblico-pactual, 'siervos de Yahvé' es la opción más fiel y legible. También es preferible mantener 'Yahvé' de forma uniforme en todo el texto y las fórmulas.
  glossary_alignment: 'Alineación parcial. Se cumple la política de יהוה -> ''Yahvé'' y se maneja bien צִדְקָתָם como ''justicia'' con nota alternativa ''vindicación''. Pero el borrador no respeta la excepción contextual ya documentada para עַבְדֵי: aquí debe seguirse ''siervos/servidores'', no ''esclavos''.'
  issues:
  - severity: high
    issue: La nota [a] está colocada sobre 'prosperará' pero explica el verbo 'condenarás'.
    rationale: En el hebreo, la alternativa 'probar culpable / declarar culpable' corresponde a תַרְשִׁיעִי, no a יִצְלָח. Tal como está, la nota induce a pensar erróneamente que 'prosperará' puede significar 'te declararás culpable'.
  - severity: high
    issue: '''Los esclavos de Yahvé'' contradice la decisión contextual auditada del POB para עַבְדֵי en este versículo.'
    rationale: El inglés POB documentó explícitamente 'servants' por tratarse de un título de pacto, no de un énfasis en condición servil. La revisión española debe preservar esa razón documentada; 'siervos de Yahvé' es más fiel al audit trail y más natural en registro bíblico.
  - severity: medium
    issue: La nota [a] dice 'te declararás culpable', formulación reflexiva incorrecta para el objeto de la condena.
    rationale: El hebreo significa 'declarar culpable a alguien' o 'condenar'. En contexto, el objeto es 'toda lengua', por lo que la alternativa correcta sería 'la declararás culpable' o impersonal 'probarás culpable'.
  revised_spanish_text: Ningún arma formada contra ti prosperará, y toda lengua que se levante contra ti en juicio, tú la condenarás[a]. Esta es la herencia de los siervos de Yahvé, y su justicia[b] procede de mí, declara Yahvé.
  revised_footnotes:
  - marker: a
    text: O ‘la declararás culpable’. El verbo hebreo puede significar declarar a alguien culpable o condenarlo en sentido jurídico.
    reason: lexical_alternative
  - marker: b
    text: O ‘su vindicación procede de mí’. El hebreo puede tener un sentido forense en este contexto legal.
    reason: alternative_reading
  revision_rationale: Se corrige la ubicación y redacción de la nota lexical alternativa para que corresponda al verbo hebreo תַרְשִׁיעִי, y se reemplaza 'esclavos' por 'siervos' para seguir la justificación contextual ya establecida en el audit trail inglés para עַבְדֵי יְהוָה. El resto del versículo puede mantenerse porque refleja adecuadamente el sentido fuente y suena natural en español eclesial contemporáneo.
