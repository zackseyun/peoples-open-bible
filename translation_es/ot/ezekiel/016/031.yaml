translation:
  language: es
  text: Cuando edificaste tu montículo al comienzo de cada camino y levantaste tu lugar alto en cada plaza, no fuiste como una prostituta, porque despreciabas el pago[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, a diferencia de una prostituta común, Jerusalén no actuaba por paga; los versículos siguientes explican que ella daba regalos en vez de recibirlos.
    reason: cross_reference
lexical_decisions:
- source_word: בִּבְנוֹתַיִךְ
  english_pob_choice: when you built
  chosen_spanish: Cuando edificaste
  alternatives_spanish:
  - cuando construías
  - al edificar
  lexicon: HALOT
  rationale: El hebreo con ב + infinitivo constructo expresa una circunstancia temporal; «Cuando edificaste» conserva esa relación con español natural y digno.
- source_word: גַּבֵּךְ
  english_pob_choice: your mound
  chosen_spanish: tu montículo
  alternatives_spanish:
  - tu plataforma elevada
  - tu tarima sagrada
  lexicon: HALOT
  rationale: «Montículo» conserva la imagen concreta de algo elevado sin definir de más la forma arquitectónica; mantiene el valor simbólico del término en este pasaje.
- source_word: בְּרֹאשׁ כָּל דֶּרֶךְ
  english_pob_choice: at the head of every road
  chosen_spanish: al comienzo de cada camino
  alternatives_spanish:
  - en la cabeza de cada camino
  - en cada esquina de la calle
  lexicon: HALOT
  rationale: «Cabeza» en hebreo funciona como inicio o punto principal; «al comienzo de cada camino» preserva la metáfora espacial y sugiere prominencia pública sin perder claridad en español.
- source_word: וְרָמָתֵךְ
  english_pob_choice: your high place
  chosen_spanish: tu lugar alto
  alternatives_spanish:
  - tu altura
  - tu santuario elevado
  lexicon: HALOT
  rationale: En contexto cultual, רָמָה alude a un lugar alto de culto. «Lugar alto» conserva el término bíblico reconocido y evita suavizar la referencia idolátrica.
- source_word: עשיתי
  english_pob_choice: made
  chosen_spanish: levantaste
  alternatives_spanish:
  - hiciste
  - construiste
  lexicon: HALOT
  rationale: Aunque el verbo básico es «hacer», aquí el objeto es una estructura elevada; «levantaste» transmite bien la acción de erigirla en español, sin apartarse del valor constructivo del verbo.
- source_word: בְּכָל רְחוֹב
  english_pob_choice: in every square
  chosen_spanish: en cada plaza
  alternatives_spanish:
  - en cada espacio abierto
  - en cada calle
  lexicon: HALOT
  rationale: רְחוֹב suele referirse a un espacio público amplio, no a una calle estrecha. «Plaza» comunica mejor ese espacio abierto y público en español contemporáneo.
- source_word: וְלֹא הָיִית כַּזּוֹנָה
  english_pob_choice: you were not like a prostitute
  chosen_spanish: no fuiste como una prostituta
  alternatives_spanish:
  - no eras como una prostituta
  - no actuaste como una prostituta
  lexicon: HALOT
  rationale: Se conserva la metáfora sexual directa, como hace el POB inglés, porque es central al choque retórico de Ezequiel y no debe diluirse en lenguaje meramente religioso.
- source_word: לְקַלֵּס
  english_pob_choice: in that you scorned
  chosen_spanish: en que despreciabas
  alternatives_spanish:
  - al desdeñar
  - porque despreciabas
  - en despreciar
  lexicon: HALOT
  rationale: El infinitivo expresa la razón o modo de la comparación. «Despreciabas» recoge el matiz de tratar algo con desdén; «en que» sigue la revisión inglesa más formal que evita un causalismo demasiado fuerte.
- source_word: אֶתְנָן
  english_pob_choice: payment
  chosen_spanish: el pago
  alternatives_spanish:
  - la paga
  - la recompensa
  - el salario
  lexicon: HALOT
  rationale: En la imagen de prostitución, אֶתְנָן es el pago recibido. «El pago» es claro, sobrio y reproduce bien la relación económica sin introducir un tono demasiado técnico.
theological_decisions:
- issue: Metáfora sexual de la infidelidad de Jerusalén
  english_pob_reading: Retain the sexualized metaphor directly rather than softening it into purely religious language.
  chosen_spanish_reading: 'Mantener la metáfora sexual de manera directa: «prostituta», «pago».'
  alternative_spanish_readings:
  - idólatra
  - mujer infiel
  rationale: Ezequiel usa a propósito un lenguaje chocante para denunciar la infidelidad del pacto. Suavizarlo disminuiría la fuerza profética del pasaje y oscurecería la estrategia retórica del texto.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Sentido de la cláusula final
  english_pob_reading: Render the clause as Jerusalem being unlike a normal prostitute because she despised payment.
  chosen_spanish_reading: Traducir la cláusula como que Jerusalén no actuó como una prostituta común, en el sentido de que despreciaba el pago.
  alternative_spanish_readings:
  - no fuiste como una prostituta que buscaba pago
  - no fuiste como una prostituta que aceptaba salario
  rationale: El contexto inmediato contrasta a Jerusalén con prostitutas ordinarias porque ella daba regalos en vez de recibirlos en los vv. 32–34. «En que despreciabas» conserva esa ironía y prepara la continuación.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: He seguido la revisión más reciente del POB inglés, que sustituyó «because» por «in that» para hacer la cláusula final más formal y menos causal. En español, «en que» reproduce ese matiz con naturalidad. También tomé en cuenta el cierre del audit trail, que mantiene la alta concordancia textual sin más cambios sustantivos.
  spanish_consistency_notes:
  - Conservo «Yahvé» como término por defecto cuando aparezca el nombre divino en este proyecto; aquí no se presenta.
  - Uso «prostituta» de forma directa por la fuerza metafórica del hebreo y en continuidad con el POB inglés.
  - «Lugar alto» se mantiene como término cultual bíblico reconocido, no como simple referencia topográfica.
  - La elección de «plaza» para רְחוֹב sigue la amplitud semántica de espacio público abierto, frente a «calle» que sería más estrecha.
  - «No fuiste» refleja el valor narrativo del perfecto hebreo y su tono acusatorio sin volverlo más literal de lo necesario.
