translation:
  language: es
  text: Tengan mucho cuidado por ustedes mismos[a], para amar a Yahvé su Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por sus propias personas», «por sus vidas» o, de manera más tradicional, «por sus almas». El sustantivo hebreo puede referirse al yo, la vida o el alma según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנִשְׁמַרְתֶּם
  english_pob_choice: be careful
  chosen_spanish: Cuídense
  alternatives_spanish:
  - Guárdense
  - Tengan cuidado
  - Estén atentos a sí mismos
  lexicon: HALOT
  rationale: 'El nifal exhortativo tiene sentido reflexivo: vigilarse/guardarse a sí mismos. En español, «cuídense» comunica de forma natural la advertencia y conserva la fuerza imperativa sin sonar rígido.'
- source_word: מְאֹד
  english_pob_choice: very
  chosen_spanish: mucho
  alternatives_spanish:
  - grandemente
  - sumamente
  - en gran manera
  lexicon: HALOT
  rationale: El adverbio intensifica el mandato. «Mucho» mantiene la intensificación de manera fluida en español moderno.
- source_word: לְנַפְשֹׁתֵיכֶם
  english_pob_choice: for your own selves
  chosen_spanish: de ustedes mismos
  alternatives_spanish:
  - para ustedes mismos
  - por sus vidas
  - por sus almas
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí apunta al yo completo, no específicamente al alma como entidad separable. «De ustedes mismos» hace visible el valor reflexivo que el contexto exige.
- source_word: לְאַהֲבָה
  english_pob_choice: to love
  chosen_spanish: para amar
  alternatives_spanish:
  - para que amen
  - con el fin de amar
  lexicon: HALOT
  rationale: El infinitivo expresa propósito. «Para amar» es la forma más natural y fiel en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino revelado en el texto hebreo como «Yahvé», conforme a la terminología del proyecto y para no sustituirlo por un título.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su propio Dios
  - el Dios de ustedes
  lexicon: HALOT
  rationale: El sufijo plural de segunda persona establece relación de pacto; en español, «su Dios» comunica la pertenencia covenantal de forma breve y natural.
theological_decisions:
- issue: Sentido de נֶפֶשׁ en una exhortación de pacto
  english_pob_reading: self-reflexive sense ('for your own selves') rather than 'souls'
  chosen_spanish_reading: 'sentido reflexivo: «de ustedes mismos»'
  alternative_spanish_readings:
  - «por sus vidas»
  - «por sus almas»
  - «para ustedes mismos»
  rationale: El hebreo exhorta a una vigilancia integral de la propia persona para permanecer en amor leal a Yahvé. Traducirlo como «almas» introduciría una antropología más específica de la que el verso demanda.
  doctrine_reference: Principio de primacía del idioma original; precisión teológica sin sobreinterpretación antropológica.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto mantiene el sentido y la decisión lexical del borrador inglés auditado, con adaptación natural al español y preservación del valor reflexivo de נֶפֶשׁ.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrámaton, en coherencia con el estándar del proyecto.
  - Se evita «alma» en el cuerpo principal porque el contexto favorece el sentido de la persona completa.
  - «Cuídense» reproduce la exhortación reflexiva de forma idiomática en español, equivalente a «be careful» en el inglés auditado.
