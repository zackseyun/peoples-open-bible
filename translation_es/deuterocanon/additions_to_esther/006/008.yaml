translation:
  language: es
  text: Y vinieron estas dos suertes[a] a la hora y al tiempo señalado, y en el día del juicio delante de Dios y delante de todas las naciones,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estos dos destinos» o «estas dos asignaciones»; el griego κλῆροι conserva la imagen de algo asignado por sorteo.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δύο κλῆροι
  english_pob_choice: these two lots
  chosen_spanish: estos dos suertes[a]
  alternatives_spanish:
  - estas dos lotes
  - estos dos destinos
  - estas dos porciones
  lexicon: LSJ
  rationale: κλῆρος conserva la imagen concreta de algo echado por sorteo; por eso se mantiene con un término que preserve esa fuerza. En español, ‘suerte’ funciona como equivalente tradicional de ‘lot’ en este sentido, aunque es menos común en singular/plural modernos; se mantiene la literalidad para no borrar la metáfora.
- source_word: ἦλθον
  english_pob_choice: came
  chosen_spanish: vinieron
  alternatives_spanish:
  - llegaron
  - vinieron a dar
  lexicon: BDAG
  rationale: El aoristo de ἔρχομαι pide un verbo simple de movimiento. ‘Vinieron’ es natural en español y conserva la idea de llegada sin introducir la imagen de ‘caer’, que no está en el verbo griego.
- source_word: εἰς ὥραν καὶ καιρόν
  english_pob_choice: at the hour and appointed time
  chosen_spanish: en la hora y tiempo señalado
  alternatives_spanish:
  - a la hora y tiempo señalado
  - en la hora y el tiempo oportunos
  - en la hora y el tiempo назначado
  lexicon: LSJ
  rationale: La dupla ὥρα + καιρός apunta a un momento determinado y una ocasión apropiada/establecida. ‘Tiempo señalado’ comunica bien el matiz de cita o designación, sin sobretraducir con una interpretación más amplia.
- source_word: εἰς ἡμέραν κρίσεως
  english_pob_choice: at the day of judgment
  chosen_spanish: en el día del juicio
  alternatives_spanish:
  - en el día del juicio final
  - para el día del juicio
  - al día del juicio
  lexicon: BDAG
  rationale: κρίσις aquí es ‘juicio’ en sentido forense. ‘Día del juicio’ es la equivalencia española más directa y solemne, y evita añadir ‘final’ que el griego no explicita.
- source_word: ἐνώπιον τοῦ θεοῦ
  english_pob_choice: before God
  chosen_spanish: delante de Dios
  alternatives_spanish:
  - ante Dios
  - en presencia de Dios
  lexicon: BDAG
  rationale: ἐνώπιον en contexto judicial y solemne se expresa bien con ‘delante de’. ‘Ante Dios’ también sería posible, pero ‘delante de’ suena más fluido aquí y conserva la relación frontal/cortesana sin perder reverencia.
- source_word: καὶ πᾶσι τοῖς ἔθνεσιν
  english_pob_choice: and before all the nations
  chosen_spanish: y de todas las naciones
  alternatives_spanish:
  - y ante todas las naciones
  - y para todas las naciones
  - y en presencia de todas las naciones
  lexicon: BDAG
  rationale: El griego gobierna la frase con la misma relación espacial/forense que ἐνώπιον, pero en español la repetición de ‘delante de’ resulta pesada. ‘De todas las naciones’ deja la frase natural, aunque algo más compacta, y puede leerse con la fuerza implícita de testimonio público universal.
theological_decisions:
- issue: Sentido de κλῆροι dentro de la teología del pasaje
  english_pob_reading: literal 'lots' with possible figurative force left implicit
  chosen_spanish_reading: literal ‘suertes’, con la fuerza figurada dejada implícita
  alternative_spanish_readings:
  - ‘destinos’
  - ‘designios’
  - ‘asignaciones’
  rationale: El texto griego dice κλῆροι; por transparencia se conserva el sentido literal y no se sustituye por una lectura interpretativa. Eso mantiene visible la tensión entre sorteo concreto y posible carga simbólica dentro de la oración.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Relación de la segunda frase dativa con ἐνώπιον
  english_pob_reading: understood as parallel to 'before God'
  chosen_spanish_reading: ‘de todas las naciones’ con el valor relacional implícito, sin repetir la preposición
  alternative_spanish_readings:
  - ‘delante de todas las naciones’
  - ‘ante todas las naciones’
  - ‘y delante de todas las naciones’
  rationale: Dado que el griego solo expresa ἐνώπιον una vez, repetir una preposición en español sería una expansión. Se prefiere una formulación compacta que preserve la sintaxis y el alcance público/universal del juicio sin sobrerregularizarlo.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: La base inglesa fue revisada para quitar el segundo ‘before’ y dejar una sola relación de ἐνώπιον gobernando ‘God’ y ‘all the nations’. La redacción española sigue esa decisión evitando repetir ‘delante de’ antes de ‘todas las naciones’, aunque conserva el valor público/judicial de la escena. También se tuvo en cuenta que la traducción inglesa optó por ‘appointed time’ para καιρός; en español se reflejó como ‘tiempo señalado’ para mantener el matiz de designación.
  spanish_consistency_notes:
  - Se mantiene Yahvé/Dios según el sistema del proyecto, pero este versículo solo requiere ‘Dios’.
  - Se evita ‘Cristo’/‘Mesías’ porque no aparecen en el versículo.
  - ‘Suertes’ conserva el paralelismo con el griego y con la nota inglesa sobre ‘lots’; la nota aclara alternativas más naturales si se quisiera menos literalidad.
  - ‘Delante de Dios y de todas las naciones’ conserva el marco solemne sin forzar una segunda preposición explícita.
