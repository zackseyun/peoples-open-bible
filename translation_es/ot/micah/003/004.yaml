    rationale: Intenta preservar la causatividad de הֵרֵעוּ con objeto explícito, pero el resultado no es idiomático. Conviene mantener la relación causativa y el objeto de forma más natural en español.
  revised_spanish_text: Entonces clamarán a Yahvé[a], pero él no les responderá; les ocultará su rostro en aquel tiempo, porque hicieron malas sus obras.
