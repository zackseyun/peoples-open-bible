translation:
  language: es
  text: Porque mi vida se consume[a] con aflicción, y mis años con gemidos; mi fuerza ha fallado[b] a causa de mi iniquidad, y mis huesos se consumen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con tristeza»; el hebreo יָגוֹן puede referirse a aflicción, tristeza o pesar profundo.
    reason: lexical_alternative
  - marker: b
    text: O «ha tropezado» o «se ha tambaleado»; el verbo hebreo es literalmente «tropezar/tambalearse», usado aquí de manera metafórica.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la relación causal o explicativa del lamento anterior. «Porque» conserva la fuerza causal de כִּי en español y suena natural al inicio de una línea poética.
- source_word: כָלוּ
  english_pob_choice: is spent
  chosen_spanish: se consume
  alternatives_spanish:
  - se acaba
  - está consumida
  - se agota
  lexicon: HALOT
  rationale: El verbo expresa consumirse, acabarse o quedar agotado. «Se consume» mantiene la imagen de una vida gastada hasta el desgaste, sin volverla excesivamente interpretativa.
- source_word: בְיָגוֹן
  english_pob_choice: with grief
  chosen_spanish: en dolor
  alternatives_spanish:
  - con dolor
  - en tristeza
  - con aflicción
  lexicon: HALOT
  rationale: יָגוֹן abarca dolor, tristeza o aflicción. En español, «en dolor» funciona bien con «se consume» y conserva el tono poético; «con dolor» también es viable, pero menos fluido en esta línea.
- source_word: חַיַּי
  english_pob_choice: my life
  chosen_spanish: mi vida
  alternatives_spanish:
  - mis vidas
  lexicon: HALOT
  rationale: Aunque la forma hebrea es plural, el sentido idiomático es singular. «Mi vida» es la manera natural y fiel de expresar el valor semántico en español.
- source_word: וּשְׁנוֹתַי
  english_pob_choice: and my years
  chosen_spanish: y mis años
  lexicon: HALOT
  rationale: Corresponde directamente al plural con sufijo de primera persona. Se mantiene el paralelismo poético con «mi vida».
- source_word: בַּאֲנָחָה
  english_pob_choice: with sighing
  chosen_spanish: en gemido
  alternatives_spanish:
  - con gemido
  - en suspiros
  - con suspiros
  lexicon: HALOT
  rationale: אֲנָחָה puede significar gemido o suspiro. «En gemido» preserva el paralelismo con el primer hemistiquio y mantiene la intensidad del lamento; se prefiere esta forma al más suavizado «suspiro».
- source_word: כָּשַׁל
  english_pob_choice: has failed
  chosen_spanish: ha fallado
  alternatives_spanish:
  - se ha tambaleado
  - ha tropezado
  - se ha debilitado
  lexicon: HALOT
  rationale: El hebreo literalmente puede ser «tropezar/tambalearse», pero el contexto metafórico apunta a fracaso o colapso de la fuerza. «Ha fallado» sigue la revisión inglesa y comunica la pérdida de vigor sin borrar del todo la imagen de colapso.
- source_word: בַּעֲוֺנִי
  english_pob_choice: because of my iniquity
  chosen_spanish: a causa de mi iniquidad
  alternatives_spanish:
  - por mi iniquidad
  - a causa de mi culpa
  - por mi culpa
  lexicon: HALOT
  rationale: עָוֹן puede denotar iniquidad, culpa o la consecuencia de la culpa. «Iniquidad» conserva el peso moral; «a causa de» expresa claramente la relación causal sin resolver la tensión teológica entre culpa y consecuencias.
- source_word: כֹחִי
  english_pob_choice: my strength
  chosen_spanish: mi fuerza
  alternatives_spanish:
  - mi vigor
  - mi poder
  lexicon: HALOT
  rationale: כֹּחַ se refiere a fuerza o vigor. «Mi fuerza» es la equivalencia más directa y natural para el español bíblico contemporáneo.
- source_word: וַעֲצָמַי
  english_pob_choice: and my bones
  chosen_spanish: y mis huesos
  lexicon: HALOT
  rationale: La imagen corporal se conserva literalmente para mantener la fuerza poética y física del texto.
- source_word: עָשֵׁשׁוּ
  english_pob_choice: waste away
  chosen_spanish: se debilitan
  alternatives_spanish:
  - se consumen
  - se marchitan
  - se desgastan
  lexicon: HALOT
  rationale: El verbo expresa languidecer, desvanecerse o volverse débil. «Se debilitan» es claro en español y mantiene la imagen de deterioro corporal; evita una expresión demasiado clínica o demasiado ornamental.
theological_decisions:
- issue: Sentido de עָוֹן en la autodescripción del salmista
  english_pob_reading: because of my iniquity
  chosen_spanish_reading: a causa de mi iniquidad
  alternative_spanish_readings:
  - a causa de mi culpa
  - por el castigo de mi iniquidad
  - por mi iniquidad
  rationale: El sustantivo puede abarcar iniquidad, culpa o las consecuencias de la culpa. Se conserva «iniquidad» para mantener el sentido moral directo y se evita especificar «castigo» porque el hebreo no obliga a esa precisión. La formulación deja abierta la tensión teológica que el hebreo permite.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: La revisión más reciente del texto inglés prefirió «has failed» en lugar de «has stumbled» para כָּשַׁל, por considerarlo más natural y exacto en contexto. La versión española sigue esa decisión con «ha fallado», sin perder la metáfora subyacente de colapso o debilidad.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni una referencia directa a él.
  - Se preserva «iniquidad» para עָוֹן, porque el audit trail inglés retiene la ambigüedad entre maldad, culpa y consecuencias de la culpa.
  - Se evita introducir un tono doctrinal más específico que el hebreo; el verso expresa lamento y deterioro corporal vinculados moralmente al pecado, sin explicitar el mecanismo causal.
