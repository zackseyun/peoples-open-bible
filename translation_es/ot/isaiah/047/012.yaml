translation:
  language: es
  text: Ponte ahora en pie con tus encantamientos[a] y con la multitud de tus hechicerías, en las que te has fatigado desde tu juventud; quizá podrás sacar provecho, quizá podrás infundir terror[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con tus sortilegios»; la palabra hebrea puede referirse a prácticas mágicas o incantaciones.
    reason: lexical_alternative
  - marker: b
    text: O «quizá podrás prevalecer»; el verbo hebreo también puede sugerir causar temor o sobrecoger a un adversario.
    reason: lexical_alternative
lexical_decisions:
- source_word: עִמְדִי נָא
  english_pob_choice: Stand now
  chosen_spanish: Estate ahora
  alternatives_spanish:
  - Párate ahora
  - Permanece ahora
  - Ponerte de pie ahora
  lexicon: HALOT
  rationale: El imperativo femenino singular de עמד con נָא conserva un tono exhortativo e irónico. «Estate ahora» mantiene la imagen concreta de estar en pie y suena natural en español bíblico contemporáneo sin perder la fuerza retadora.
- source_word: בַחֲבָרַיִךְ
  english_pob_choice: with your enchantments
  chosen_spanish: con tus encantamientos
  alternatives_spanish:
  - con tus hechicerías
  - con tus sortilegios
  - con tus conjuros
  lexicon: HALOT
  rationale: En este contexto, חֲבָרִים apunta a prácticas mágicas/incantatorias. «Encantamientos» sigue la decisión revisada del inglés POB y evita estrechar demasiado el sentido hacia una sola técnica mágica.
- source_word: וּבְרֹב כְּשָׁפַיִךְ
  english_pob_choice: and with your many sorceries
  chosen_spanish: y con la multitud de tus hechicerías
  alternatives_spanish:
  - y con tus muchas hechicerías
  - y con la abundancia de tus hechicerías
  - y con tus múltiples sortilegios
  lexicon: HALOT
  rationale: רֹב expresa abundancia o multitud, y כְּשָׁפִים se refiere a prácticas de hechicería/sortilegio. «Multitud de tus hechicerías» conserva el plural y el matiz de acumulación sin sonar excesivamente técnico.
- source_word: בַּאֲשֶׁר יָגַעַתְּ
  english_pob_choice: in which you have labored
  chosen_spanish: en las cuales te has fatigado
  alternatives_spanish:
  - en las cuales has trabajado
  - con las cuales te has esforzado
  - en las que has trabajado hasta cansarte
  lexicon: HALOT
  rationale: יָגַע connota trabajar hasta el cansancio. «Te has fatigado» recoge mejor la idea de esfuerzo desgastante que un simple «trabajado».
- source_word: מִנְּעוּרַיִךְ
  english_pob_choice: from your youth
  chosen_spanish: desde tu juventud
  alternatives_spanish:
  - desde tus días de juventud
  - desde tu adolescencia
  lexicon: HALOT
  rationale: Expresión temporal estándar; «desde tu juventud» es idiomática, clara y fiel al alcance durativo del hebreo.
- source_word: אוּלַי תּוּכְלִי הוֹעִיל
  english_pob_choice: perhaps you may be able to profit
  chosen_spanish: quizá podrás sacar provecho
  alternatives_spanish:
  - quizá podrás beneficiarte
  - quizá podrás tener ventaja
  - quizá podrás lograr algún beneficio
  lexicon: HALOT
  rationale: La secuencia verbal expresa posibilidad de obtener beneficio/ventaja. «Sacar provecho» comunica bien el sentido de הוֹעִיל sin introducir una lectura más abstracta que el hebreo.
- source_word: אוּלַי תַּעֲרֽוֹצִי
  english_pob_choice: perhaps you may inspire terror
  chosen_spanish: quizá podrás infundir terror
  alternatives_spanish:
  - quizá podrás causar temor
  - quizá podrás hacer temblar
  - quizá podrás amedrentar
  lexicon: HALOT
  rationale: ערץ puede implicar provocar terror o sobrecoger. «Infundir terror» preserva la fuerza causativa y encaja con el tono de burla del oráculo.
theological_decisions:
- issue: Tono irónico del oráculo contra Babilonia
  english_pob_reading: Render the imperatives and 'perhaps' clauses as ironic taunt rather than sincere counsel, without adding interpretive wording to the main text.
  chosen_spanish_reading: Mantener los imperativos y los «quizá» como desafío irónico, sin explicitar la ironía dentro del cuerpo del versículo.
  alternative_spanish_readings:
  - Una exhortación neutral sin matiz irónico explícito
  - Una paráfrasis que añada 'a ver si' o 'tal vez' con énfasis burlón
  rationale: El contexto de juicio contra Babilonia da el tono de burla, pero el versículo mismo debe conservar su forma. La traducción española mantiene la literalidad funcional y deja que la ironía emerja del contexto, no de una glosa intrusiva.
  doctrine_reference: Principio de fidelidad al sentido llano del texto y al efecto retórico del oráculo sin añadir comentario exegético al versículo.
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió 'spells' por 'enchantments' para חֲבָרַיִךְ, y esa decisión se reflejó en español con «encantamientos». Se mantuvo el resto del verso con equivalencias léxicas consistentes y registro bíblico moderno.
  spanish_consistency_notes:
  - Se conservó «Yahvé» no aplicable en este versículo; no hay mención del nombre divino.
  - Se prefirió «encantamientos» para reflejar el ajuste revisado del audit trail inglés y evitar un tecnicismo excesivo.
  - «Hechicerías» se usó para mantener el paralelismo con כְּשָׁפַיִךְ y la acumulación de prácticas mágicas.
  - Los dos «quizá» reproducen la doble marca de posibilidad del hebreo (אוּלַי ... אוּלַי).
