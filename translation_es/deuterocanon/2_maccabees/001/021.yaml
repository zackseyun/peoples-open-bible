revisions:
- from: Cuando nos informaron que no habían hallado fuego[a], sino agua espesa, les ordenó que, al tomarla, la llevaran. Y, cuando fueron llevados los elementos de los sacrificios[b], Nehemías ordenó a los sacerdotes rociar el agua sobre la leña y sobre lo que estaba encima de ella.
  to: Cuando nos informaron que no habían hallado fuego[a], sino agua espesa, les ordenó que sacaran un poco y lo llevaran. Y, cuando se habían traído los elementos para los sacrificios[b], Nehemías ordenó a los sacerdotes rociar el agua sobre la leña y sobre lo que estaba encima de ella.
  rationale: Se ajusta la frase sobre ἀποβλίψαντας φέρειν para expresar con más naturalidad y precisión la idea de extraer una porción del líquido y traerla. También se suaviza la construcción pasiva de τὰ τῶν θυσιῶν con una formulación más idiomática en español, conservando la amplitud semántica de la expresión griega y la nota explicativa.
