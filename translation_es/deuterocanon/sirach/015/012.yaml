translation:
  language: es
  text: 'No digas[a][b]: «Él me hizo tropezar», porque no tiene necesidad de hombres violentos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «me extravió / me apartó del camino», con un sentido más amplio que el hebreo «me hizo tropezar».'
    reason: alternative_reading
  - marker: b
    text: El paralelo griego dice «hombre pecador» donde el hebreo conserva «hombres violentos».
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶּן
  english_pob_choice: Do not
  chosen_spanish: No digas
  alternatives_spanish:
  - No sea que digas
  - No digas, pues
  lexicon: HALOT
  rationale: En una advertencia sapiencial, פן + imperfecto funciona como prohibición práctica. En español, «No digas» comunica de modo natural la fuerza del mandato sin volverlo artificial con «no sea que».
- source_word: תֹּאמַר
  english_pob_choice: say
  chosen_spanish: digas
  alternatives_spanish:
  - digas
  - afirmes
  - declares
  lexicon: HALOT
  rationale: El verbo introduce habla directa y una recriminación hipotética; «decir» en segunda persona del singular mantiene el tono sencillo del hebreo sin añadir énfasis interpretativo.
- source_word: הוּא
  english_pob_choice: He
  chosen_spanish: Él
  alternatives_spanish:
  - él mismo
  - Dios
  lexicon: HALOT
  rationale: El pronombre apunta a Dios por contexto. «Él» conserva la referencia sin reemplazarla por un nombre explícito que el texto no da en esta línea.
- source_word: הִתְקִילָנִי
  english_pob_choice: made me stumble
  chosen_spanish: me hizo tropezar
  alternatives_spanish:
  - me hizo caer
  - me hizo vacilar
  - me desvió
  lexicon: HALOT
  rationale: El hebreo usa una imagen concreta de tropiezo/caída. «Hizo tropezar» conserva esa metáfora y evita suavizarla hacia un sentido más abstracto como «desvió».
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque en efecto
  lexicon: HALOT
  rationale: La conjunción introduce la razón de la prohibición. «Porque» es la opción más clara y directa en español.
- source_word: אֵין צֹרֶךְ
  english_pob_choice: has no need
  chosen_spanish: no tiene necesidad
  alternatives_spanish:
  - no necesita
  - no requiere
  - no tiene necesidad
  lexicon: HALOT
  rationale: La locución expresa falta de necesidad. «No tiene necesidad» conserva la formulación del hebreo y el paralelo griego χρείαν ἔχει.
- source_word: בְּאַנְשֵׁי
  english_pob_choice: of men
  chosen_spanish: de hombres
  alternatives_spanish:
  - de personas
  - de gente
  - de varones
  lexicon: HALOT
  rationale: El sustantivo masculino plural mantiene la referencia genérica a personas varones como categoría social del hebreo. «Hombres» reproduce ese valor sin neutralizarlo indebidamente.
- source_word: חָמָס
  english_pob_choice: violent
  chosen_spanish: violentos
  alternatives_spanish:
  - violencia
  - malvados
  - perversos
  lexicon: HALOT
  rationale: חָמָס denota violencia o conducta violenta. «Violentos» conserva la fuerza concreta del término y evita diluirlo en una generalidad moral como «malvados».
theological_decisions:
- issue: Cómo reflejar el sujeto implícito del primer miembro sin introducir explícitamente el nombre divino
  english_pob_reading: He made me stumble
  chosen_spanish_reading: Él me hizo tropezar
  alternative_spanish_readings:
  - Dios me hizo tropezar
  - Él me desvió
  rationale: El contexto identifica al referente como Dios, pero el hebreo solo usa el pronombre. En español, «Él» mantiene esa referencia implícita y evita una explicitación que el texto no formula en esta línea.
  doctrine_reference: 'PHILOSOPHY.md: respeto del sujeto implícito y de la evidencia textual sin sobreexplicar'
- issue: Si el segundo hemistiquio debe suavizarse hacia «pecadores» siguiendo el paralelo griego
  english_pob_reading: violent men
  chosen_spanish_reading: hombres violentos
  alternative_spanish_readings:
  - hombre pecador
  - pecadores
  - gente pecadora
  rationale: La lectura hebrea conservada es más específica que el griego paralelo. «Hombres violentos» preserva la tensión lexical entre el hebreo y el griego sin borrar la concreción del hebreo.
  doctrine_reference: 'DOCTRINE.md: primacía de la fuente original conservada con preservación de variantes significativas'
translation_notes:
  revision_awareness: 'Coincide con la evaluación más reciente: el hebreo conservado es de alta confianza y no requiere cambios. Se mantiene el sentido concreto de «tropezar» y la expresión específica «hombres violentos», registrando en notas la alternativa griega sin desplazar el texto principal.'
  spanish_consistency_notes:
  - Se conserva la advertencia sapiencial en segunda persona singular.
  - Se mantiene el pronombre divino implícito como «Él» en vez de sustituirlo por un nombre explícito.
  - Se preserva la metáfora concreta de tropezar/caer.
  - Se retiene la especificidad moral de «violentos» frente a una generalización a «pecadores».
  - Se usa puntuación española con comillas angulares para el discurso directo.
