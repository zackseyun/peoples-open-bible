translation:
  language: es
  text: el rey de Dor en Nafat-dor[a], uno; el rey de Goiim[b] en Gilgal, uno;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el rey de Dor en la región/distrito de Dor». El hebreo לְנָפַת puede entenderse como una referencia territorial, no solo como un topónimo fijo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el rey de las naciones en Gilgal, uno». El hebreo גּוֹיִם suele significar «naciones» o «pueblos», pero aquí también puede funcionar como nombre de lugar o etiqueta territorial.'
    reason: alternative_reading
lexical_decisions:
- source_word: מֶלֶךְ
  english_pob_choice: the king of
  chosen_spanish: el rey de
  alternatives_spanish:
  - rey de
  lexicon: HALOT
  rationale: En una lista de reyes derrotados, el hebreo usa la relación constructa «rey de...». En español, «el rey de» conserva la función catalogal y suena natural en una enumeración histórica.
- source_word: דּוֹר
  english_pob_choice: Dor
  chosen_spanish: Dor
  alternatives_spanish:
  - Dór
  lexicon: HALOT
  rationale: Es un nombre propio de lugar. Se translitera sin traducir, manteniendo la forma toponímica del texto fuente.
- source_word: לְנָפַת
  english_pob_choice: in Naphath-dor
  chosen_spanish: en Nafat-dor
  alternatives_spanish:
  - en la región de Dor
  - en el distrito de Dor
  - en Nafat
  lexicon: HALOT
  rationale: El audit trail inglés corrigió una lectura más interpretativa («the heights of Dor») a la forma más precisa del nombre geográfico. En español se conserva como topónimo transliterado para no borrar la tensión entre posible descripción territorial y nombre propio.
- source_word: אֶחָד
  english_pob_choice: one
  chosen_spanish: uno
  alternatives_spanish:
  - un rey
  - uno solo
  lexicon: HALOT
  rationale: Aquí funciona como marcador de recuento tras cada rey vencido. «Uno» reproduce la tersa cadencia enumerativa del hebreo sin añadir sustantivos.
- source_word: גּוֹיִם
  english_pob_choice: Goiim
  chosen_spanish: Goiim
  alternatives_spanish:
  - naciones
  lexicon: HALOT
  rationale: Aunque normalmente significa «naciones», en esta lista puede ser un nombre de lugar o designación territorial. Se translitera en el texto principal para no decidir prematuramente entre etnónimo y topónimo.
- source_word: לְגִלְגָּל
  english_pob_choice: in Gilgal
  chosen_spanish: en Gilgal
  alternatives_spanish:
  - de Gilgal
  - junto a Gilgal
  lexicon: HALOT
  rationale: La preposición ל en estas fórmulas de localización puede indicar asociación o pertenencia a un lugar. «En Gilgal» es una solución natural en español y mantiene explícita la referencia geográfica.
theological_decisions:
- issue: גּוֹיִם como nombre común o topónimo
  english_pob_reading: The Hebrew גּוֹיִם usually means 'nations' or 'peoples,' but here it may function as a place-name or territorial label.
  chosen_spanish_reading: Goiim como topónimo posible, sin traducirlo como «naciones» en el texto principal.
  alternative_spanish_readings:
  - el rey de las naciones en Gilgal
  - el rey de los pueblos en Gilgal
  rationale: La lista de Josué 12 es un registro geográfico-histórico de reyes vencidos. Traducirlo como «naciones» introduciría una decisión interpretativa que el audit trail no cierra. Por eso se preserva la ambigüedad en el cuerpo del texto y se explica en nota.
  doctrine_reference: Principios de transparencia textual y prudencia exegética en toponimia ambigua.
- issue: Naphath-dor como nombre propio frente a descripción de región
  english_pob_reading: The phrase rendered 'in the heights of Dor' may also be understood more generally as 'in the district/region of Dor.'
  chosen_spanish_reading: Nafat-dor como transliteración del término geográfico, no como «las alturas de Dor» en el texto principal.
  alternative_spanish_readings:
  - en las alturas de Dor
  - en el distrito de Dor
  - en la región de Dor
  rationale: El pasaje no obliga a una sola traducción descriptiva. La forma transliterada preserva mejor la precisión del nombre y evita imponer una interpretación topográfica donde el hebreo puede estar funcionando como designación regional.
  doctrine_reference: Criterios de fidelidad lexical y no sobreinterpretación del término geográfico.
translation_notes:
  revision_awareness: El borrador sigue el último pase de revisión del inglés POB, que sustituyó «the heights of Dor» por «Naphath-dor» para mayor precisión léxica. En español se conserva esa precisión mediante transliteración, manteniendo además la ambigüedad controlada de גּוֹיִם que el audit trail no resuelve definitivamente.
  spanish_consistency_notes:
  - Se usa «uno» como marcador de conteo, en paralelo al estilo telegráfico del hebreo y del inglés POB.
  - Se transliteran los topónimos inciertos en vez de traducirlos de forma cerrada, para preservar la transparencia auditada del proyecto.
  - Se mantiene «rey de» para reflejar el patrón constructo repetido de la lista.
  - La puntuación con punto y coma imita la estructura enumerativa breve del versículo.
