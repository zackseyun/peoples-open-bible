translation:
  language: es
  text: mientras las fuerzas estaban aún dispersas del campamento[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hasta que las fuerzas todavía estaban dispersas del campamento». El griego ἕως ἔτι es compacto; aquí se entiende idiomáticamente como una cláusula temporal de simultaneidad («mientras ... aún»).'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕως ἔτι
  english_pob_choice: while ... still
  chosen_spanish: mientras ... aún
  alternatives_spanish:
  - hasta que todavía
  - mientras todavía
  lexicon: LSJ
  rationale: La combinación griega expresa una relación temporal con valor de simultaneidad y continuidad. «Mientras ... aún» reproduce con naturalidad en español la idea de que la acción ocurre durante ese estado persistente, sin convertirlo en un límite final como «hasta que».
- source_word: αἱ δυνάμεις
  english_pob_choice: the forces
  chosen_spanish: las fuerzas
  alternatives_spanish:
  - el ejército
  - las tropas
  - las fuerzas militares
  lexicon: LSJ
  rationale: δυνάμεις puede referirse a fuerzas militares; «las fuerzas» conserva el plural griego y evita especificar una unidad táctica no indicada por el texto.
- source_word: ἐσκορπισμέναι
  english_pob_choice: scattered
  chosen_spanish: dispersas
  alternatives_spanish:
  - esparcidas
  - desperdigadas
  lexicon: LSJ
  rationale: El participio expresa que las fuerzas no estaban reunidas. «Dispersas» es un equivalente natural y preciso en español para un contexto militar.
- source_word: ἀπὸ τῆς παρεμβολῆς
  english_pob_choice: from the camp
  chosen_spanish: desde el campamento
  alternatives_spanish:
  - del campamento
  - fuera del campamento
  - desde el campamento militar
  lexicon: LSJ
  rationale: παρεμβολή significa «campamento» o «campamento militar» en contexto bélico. «Desde el campamento» conserva la fuerza separativa de ἀπό y suena más fluido que un calco rígido.
translation_notes:
  revision_awareness: Se siguió el sentido revisado del inglés POB, que eliminó «away» como innecesario. La versión española evita ese añadido y conserva la relación temporal idiomática de ἕως ἔτι con una construcción natural.
  spanish_consistency_notes:
  - Se mantiene «campamento» para παρεμβολή, coherente con el contexto militar.
  - Se usa «fuerzas» en plural para reflejar αἱ δυνάμεις sin sobredeterminar la estructura del grupo.
  - «Aún» se coloca junto a «mientras» para preservar el matiz de continuidad señalado en el audit trail inglés.
