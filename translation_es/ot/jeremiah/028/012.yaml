translation:
  language: es
  text: 'Entonces la palabra de Yahvé vino a Jeremías, después de que Hananías el profeta había roto el yugo[a] de sobre el cuello de Jeremías el profeta, diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el yugo»; el sustantivo puede referirse más específicamente a la barra de madera o travesaño del yugo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דְבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mensaje de Yahvé
  lexicon: HALOT
  rationale: «Palabra» conserva la fórmula profética y el peso revelatorio del hebreo דְבַר mejor que una paráfrasis como «mensaje». Se mantiene «Yahvé» para reproducir el nombre divino según la guía del proyecto.
- source_word: וַיְהִי
  english_pob_choice: Then ... came
  chosen_spanish: Entonces ... vino
  alternatives_spanish:
  - Y aconteció ...
  - Y llegó ...
  lexicon: HALOT
  rationale: La secuencia narrativa pide un marcador temporal natural en español. «Entonces» comunica el avance del relato sin caer en una fórmula arcaica.
- source_word: אֶל יִרְמְיָה
  english_pob_choice: to Jeremiah
  chosen_spanish: a Jeremías
  alternatives_spanish:
  - a Jeremías,
  - para Jeremías
  lexicon: HALOT
  rationale: La preposición simple «a» expresa con claridad el destinatario de la palabra y se ajusta al español bíblico moderno.
- source_word: אַחֲרֵי שְׁב֞וֹר
  english_pob_choice: after ... had broken
  chosen_spanish: después que ... había roto
  alternatives_spanish:
  - después de haber roto
  - luego de que ... rompió
  lexicon: HALOT
  rationale: El infinitivo constructo después de אַחֲרֵי indica anterioridad respecto del verbo principal; el pluscuamperfecto español mantiene esa relación temporal con precisión.
- source_word: חֲנַנְיָה הַנָּבִיא
  english_pob_choice: Hananiah the prophet
  chosen_spanish: Hananías el profeta
  alternatives_spanish:
  - Hananías, el profeta
  lexicon: HALOT
  rationale: Se conserva la identificación appositiva directa del hebreo. En español, el artículo no necesita coma para funcionar con naturalidad.
- source_word: הַמּוֹטָה
  english_pob_choice: the yoke
  chosen_spanish: el yugo
  alternatives_spanish:
  - la vara del yugo
  - la barra del yugo
  lexicon: HALOT
  rationale: El contexto señala el yugo profético de Jeremías; «yugo» es la forma más clara e idiomática en español. No se fuerza una especificación física que el verso no exige explícitamente.
- source_word: מֵעַל צַוַּאר
  english_pob_choice: from off the neck of
  chosen_spanish: de sobre el cuello de
  alternatives_spanish:
  - del cuello de
  - de encima del cuello de
  lexicon: HALOT
  rationale: La expresión duplicada subraya remoción desde arriba del cuello. «De sobre» conserva mejor esa fuerza que un simple «del».
- source_word: יִרְמְיָה הַנָּבִיא
  english_pob_choice: Jeremiah the prophet
  chosen_spanish: Jeremías el profeta
  alternatives_spanish:
  - Jeremías, el profeta
  lexicon: HALOT
  rationale: Se repite el título para reflejar el hebreo y mantener el contraste narrativo entre Hananías y Jeremías. La repetición no se suaviza porque forma parte del estilo del versículo.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - al decir
  - y dijo
  lexicon: HALOT
  rationale: «Diciendo» introduce correctamente el discurso citado que continúa en el siguiente versículo y mantiene la transición verbal del hebreo.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. En español se adopta «Yahvé» como equivalente del nombre divino, en línea con la política del proyecto y sin sustituirlo por un título ocultante.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Coincido con el último pase de revisión: no se reportan cambios necesarios y el acuerdo de revisión fue alto. La redacción española sigue el sentido temporal, la repetición formal y la terminología auditada del original sin introducir paráfrasis adicionales.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - Se eligió «yugo» por ser la equivalencia más natural y la más fiel al uso contextual del signo profético.
  - Se conservó la doble referencia «Jeremías el profeta» al final, por correspondencia formal con el hebreo.
  - La puntuación española sigue el flujo narrativo y el inicio de cita con coma antes de «diciendo».
