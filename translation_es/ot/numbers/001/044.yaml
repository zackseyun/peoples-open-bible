translation:
  language: es
  text: Estos son los que fueron contados[a], a quienes contaron Moisés y Aarón, y los líderes de Israel —doce hombres[b], cada uno por la casa de sus padres— estaban con ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los numerados». El hebreo puede enfatizar tanto a las personas contadas como el acto mismo del censo.
    reason: lexical_alternative
  - marker: b
    text: «Casa de sus padres» se refiere a la unidad familiar o clan ancestral dentro de la organización tribal de Israel.
    reason: cultural_note
lexical_decisions:
- source_word: הַפְּקֻדִים
  english_pob_choice: the ones counted
  chosen_spanish: los contados
  alternatives_spanish:
  - los que fueron contados
  - los numerados
  - los enrolados
  lexicon: HALOT
  rationale: En este contexto censal, el participio pasivo de פקד designa a las personas que fueron contadas o registradas. ‘Los contados’ conserva la referencia personal y suena natural en español, sin borrar la posible resonancia de ‘numerados’.
- source_word: פָּקַד
  english_pob_choice: counted
  chosen_spanish: contaron
  alternatives_spanish:
  - numeraron
  - registraron
  - musteraron
  lexicon: HALOT
  rationale: El verbo se usa consistentemente en Números para el censo. ‘Contaron’ es claro y fiel; ‘registraron’ sería posible, pero reduce un poco la idea de conteo censal.
- source_word: נְשִׂיאֵי יִשְׂרָאֵל
  english_pob_choice: the leaders of Israel
  chosen_spanish: los líderes de Israel
  alternatives_spanish:
  - los jefes de Israel
  - los príncipes de Israel
  lexicon: HALOT
  rationale: נָשִׂיא aquí se refiere a líderes tribales. ‘Líderes’ evita la posible carga monárquica de ‘príncipes’ y comunica bien la función social.
- source_word: שְׁנֵים עָשָׂר אִישׁ
  english_pob_choice: twelve men
  chosen_spanish: doce hombres
  alternatives_spanish:
  - doce varones
  - doce personas
  lexicon: HALOT
  rationale: El hebreo usa explícitamente אִישׁ en masculino. ‘Hombres’ mantiene ese rasgo de género y el valor numérico del grupo.
- source_word: אִישׁ אֶחָד
  english_pob_choice: each one
  chosen_spanish: cada uno
  alternatives_spanish:
  - uno por uno
  - cada hombre
  lexicon: HALOT
  rationale: La expresión distributiva pide una equivalencia idiomática. ‘Cada uno’ preserva el sentido de ‘uno apiece’ sin forzar el español.
- source_word: לְבֵית אֲבֹתָיו
  english_pob_choice: for his fathers’ house
  chosen_spanish: por la casa de sus padres
  alternatives_spanish:
  - para la casa de sus padres
  - según la casa de sus padres
  - por su casa paterna
  lexicon: HALOT
  rationale: La frase remite a la unidad clánica/ancestral patrilineal. ‘Casa de sus padres’ conserva el idioma bíblico y su trasfondo social; ‘por’ refleja la función representativa de cada hombre.
- source_word: הָיוּ
  english_pob_choice: were
  chosen_spanish: estuvieron
  alternatives_spanish:
  - eran
  - fueron
  lexicon: HALOT
  rationale: El copulativo final completa la oración en español. ‘Estuvieron’ refleja bien la presencia/participación de los líderes junto con los contados, en línea con la revisión inglesa que hace explícita su relación con ‘them’.
theological_decisions:
- issue: Función de los jefes de tribu dentro del censo
  english_pob_reading: the leaders of Israel—twelve men, each one for his fathers’ house—were with them
  chosen_spanish_reading: 'y los líderes de Israel: doce hombres, cada uno por la casa de sus padres—estuvieron con ellos'
  alternative_spanish_readings:
  - y los líderes de Israel estaban con ellos
  - y los líderes de Israel, doce hombres, cada uno por la casa de sus padres
  rationale: 'La redacción española conserva la coordinación que resulta del ajuste revisado en inglés: los líderes no quedan sólo como acompañantes vagos, sino como participantes vinculados al censo y a la representación de cada casa paterna. No se explicita más de lo que permite el hebreo, pero tampoco se pierde la relación sintáctica final.'
  doctrine_reference: Números 1:44; estructura tribal/censal de Israel
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente, que hizo a los líderes de Israel un sujeto coordinado y añadió la idea final de ‘were with them’ para reflejar הָיוּ. La versión española reproduce esa completitud sintáctica sin apartarse del valor censal del hebreo. También se evitó suavizar el masculino explícito de אִישׁ y se mantuvo el idioma de ‘casa de sus padres’ como unidad tribal.
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni un equivalente directo.
  - Se usó ‘líderes’ para נְשִׂיאִים por fidelidad contextual y claridad en español.
  - Se preservó el plural masculino ‘hombres’ para reflejar אִישׁ en el hebreo.
  - La puntuación con raya larga busca reflejar la incisión del original y la estructura revisada del inglés POB.
