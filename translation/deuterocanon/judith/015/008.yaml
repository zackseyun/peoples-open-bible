reference: Judith 15:8
source:
  edition: lxx-swete-1909
  text: Καὶ Ἰωακειὶμ ὁ ἱερεὺς ὁ μέγας καὶ ἡ γερουσία τῶν υἱῶν Ἰσραὴλ οἱ κατοικοῦντες ἐν Ἰερουσαλὴμ ἦλθον τοῦ θεάσασθαι τὰ ἀγαθὰ ἃ ἐποίησεν Κύριος τῷ Ἰσραήλ, καὶ τοῦ ἰδεῖν τὴν Ἰουδεὶθ καὶ λαλῆσαι μετʼ αὐτῆς εἰρήνην.
  language: Greek
