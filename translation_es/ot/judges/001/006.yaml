    issue: La frase «los pulgares de las manos y los de los pies» distorsiona el referente hebreo.
    rationale: En español, «pulgares de los pies» no es la forma normal ni precisa; el hebreo se refiere a los pulgares y a los dedos gordos de los pies. El texto principal debe ser idiomático y exacto, como en el POB inglés.
  - severity: medium
    issue: La grafía «Adoni-bezec» no sigue la forma auditada «Adoni-bezek».
    rationale: El rastro inglés documenta una transliteración estable del nombre propio. Sin justificación adicional del proyecto para cambiarla en español, conviene conservar «Adoni-bezek» para consistencia interlingüística y fidelidad al audit trail.
  - severity: low
    issue: La nota al pie puede formularse con español más natural.
    rationale: 'La nota actual comunica bien la idea, pero puede simplificarse levemente: «Hebreo literalmente...» sin comillas innecesarias y con puntuación más fluida.'
  revised_spanish_text: Pero Adoni-bezek huyó[a], y ellos lo persiguieron, lo capturaron y le cortaron los pulgares y los dedos gordos de los pies.
  revised_footnotes:
