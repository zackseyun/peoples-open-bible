    reason: lexical_alternative
  revision_rationale: Se corrige la sintaxis de la frase sobre las gradas para que el español sea natural y fiel al sentido de ascenso hacia el vestíbulo. También se sustituye «los lados» por «muros laterales» para reflejar mejor el valor arquitectónico probable de אֵילִים sin eliminar la incertidumbre, que sigue documentada en nota. Finalmente, se mueve el marcador [a] a «vestíbulo», que es el término explicado por la nota.
