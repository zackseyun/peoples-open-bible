source:
  edition: SBLGNT
  text: Οἶδά ⸀σου τὴν θλῖψιν καὶ τὴν πτωχείαν, ἀλλὰ πλούσιος εἶ, καὶ τὴν βλασφημίαν ἐκ τῶν λεγόντων Ἰουδαίους εἶναι ἑαυτούς, καὶ οὐκ εἰσίν, ἀλλὰ συναγωγὴ τοῦ Σατανᾶ.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/002/009.yaml
  text: 'I know your affliction and your poverty—but you are rich—and the slander of those who say that they are Jews and are not[b][a], but are a synagogue of Satan.'
  footnotes:
  - marker: a
    text: Or 'blasphemy.' Here the sense is hostile defamatory speech against the believers, so 'slander' is used in the main text.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'a synagogue of Satan' is retained literally. 'Synagogue' can also mean 'assembly' or 'gathering.'
    reason: lexical_alternative
translation:
  language: ko
  text: '내가 너의 환난과 가난을 안다—그러나 너는 부요한 자이다—. 또 유대인이라 자칭하나 유대인이 아니요, 도리어 사탄의 회당[a]에 속한 자들의 비방을 안다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '「사탄의 회당」은 본문 그대로의 표현이다. 헬라어 συναγωγή는 「모임」이나 「회중」을 가리킬 수도 있다.'
    reason: lexical_alternative
