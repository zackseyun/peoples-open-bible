translation:
  language: es
  text: Su ofrenda fue un plato[a] de plata, de ciento treinta siclos de peso; un tazón[b] de plata de setenta siclos, según el siclo del santuario[c]; ambos estaban llenos de flor de harina mezclada con aceite, para una ofrenda de cereal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O también «fuente» para קַעֲרָה; aquí se entiende como un recipiente ritual.
    reason: lexical_alternative
  - marker: b
    text: O también «cuenco» para מִזְרָק; se trata de un recipiente usado en el servicio sacrificial.
    reason: lexical_alternative
  - marker: c
    text: Es decir, conforme al patrón oficial de peso del santuario.
    reason: cultural_note
lexical_decisions:
- source_word: קָרְבָּנוֹ
  english_pob_choice: His offering was
  chosen_spanish: Su ofrenda fue
  alternatives_spanish:
  - Su ofrenda era
  - Su presente fue
  lexicon: HALOT
  rationale: קָרְבָּן es una ofrenda presentada en contexto cultual. «Ofrenda» conserva el sentido sacrificial y es el equivalente más claro y natural en español.
- source_word: קַעֲרַת כֶּסֶף אַחַת
  english_pob_choice: one silver plate
  chosen_spanish: un plato de plata
  alternatives_spanish:
  - un dish de plata
  - un cuenco de plata
  lexicon: HALOT
  rationale: קַעֲרָה designa un recipiente ritual tipo plato/disco. «Plato» comunica mejor la forma probable y mantiene la nota de recipiente litúrgico; «cuenco» suena menos probable para este objeto.
- source_word: שְׁלֹשִׁים וּמֵאָה מִשְׁקָלָהּ
  english_pob_choice: its weight one hundred thirty shekels
  chosen_spanish: de ciento treinta siclos de peso
  alternatives_spanish:
  - pesando ciento treinta siclos
  - cuyo peso era de ciento treinta siclos
  lexicon: HALOT
  rationale: El hebreo expresa literalmente el peso. En español, «de ciento treinta siclos de peso» conserva la estructura nominal sin perder naturalidad.
- source_word: מִזְרָק אֶחָד כֶּסֶף
  english_pob_choice: one silver basin
  chosen_spanish: un tazón de plata
  alternatives_spanish:
  - un cuenco de plata
  - un recipiente de plata
  lexicon: HALOT
  rationale: מִזְרָק es un recipiente ritual para uso sacrificial. «Tazón» evita la posible ambigüedad de «cuenco» o la domesticidad de «bowl», aunque mantiene la idea de vaso ritual.
- source_word: שִׁבְעִים שֶׁקֶל
  english_pob_choice: of seventy shekels
  chosen_spanish: de setenta siclos
  alternatives_spanish:
  - que pesaba setenta siclos
  - de un peso de setenta siclos
  lexicon: HALOT
  rationale: La frase especifica el peso del recipiente. «De setenta siclos» es conciso y fiel al patrón del versículo anterior.
- source_word: בְּשֶׁקֶל הַקֹּדֶשׁ
  english_pob_choice: according to the sanctuary shekel
  chosen_spanish: según el siclo del santuario
  alternatives_spanish:
  - conforme al siclo del santuario
  - según el peso del santuario
  lexicon: HALOT
  rationale: La expresión fija un patrón de medida cultual. «Siclo del santuario» conserva el término técnico y «según» refleja bien el valor normativo de la fórmula.
- source_word: שְׁנֵיהֶם
  english_pob_choice: both of them
  chosen_spanish: ambos
  alternatives_spanish:
  - los dos
  - ambos recipientes
  lexicon: HALOT
  rationale: El pronombre dual/plural se refiere a los dos recipientes. «Ambos» es breve y mantiene la referencia explícita.
- source_word: מְלֵאִים
  english_pob_choice: were full of
  chosen_spanish: estaban llenos de
  alternatives_spanish:
  - estaban colmados de
  - eran llenos de
  lexicon: HALOT
  rationale: Se trata de un predicativo estado del contenido. «Estaban llenos de» es la forma natural y fiel en español.
- source_word: סֹלֶת
  english_pob_choice: fine flour
  chosen_spanish: flor de harina
  alternatives_spanish:
  - harina fina
  - harina selecta
  lexicon: HALOT
  rationale: סֹלֶת es el término técnico de la harina fina usada en ofrendas. «Flor de harina» es la equivalencia tradicional y precisa en español bíblico.
- source_word: בְּלוּלָה בַשֶּׁמֶן
  english_pob_choice: mixed with oil
  chosen_spanish: mezclada con aceite
  alternatives_spanish:
  - mezclada en aceite
  - amasada con aceite
  lexicon: HALOT
  rationale: El participio pasivo indica que la harina fue combinada con aceite. «Mezclada con aceite» es claro y transmite el mismo contenido sin forzar la imagen.
- source_word: לְמִנְחָה
  english_pob_choice: for a grain offering
  chosen_spanish: para una ofrenda vegetal
  alternatives_spanish:
  - para una ofrenda de cereal
  - para una oblación
  lexicon: HALOT
  rationale: מִנְחָה en contexto sacerdotal puede referirse a la ofrenda de cereal/grano. «Ofrenda vegetal» preserva el sentido cultual y evita ambigüedad con «ofrenda» en general.
theological_decisions:
- issue: Naturaleza de מִנְחָה en contexto sacrificial
  english_pob_reading: grain offering
  chosen_spanish_reading: ofrenda vegetal
  alternative_spanish_readings:
  - ofrenda de cereal
  - oblación
  rationale: El hebreo de Levítico/Números usa מִנְחָה para una ofrenda no sangrienta de harina y aceite. «Ofrenda vegetal» comunica el contraste con sacrificios animales sin perder el carácter cultual.
  doctrine_reference: Oferta no sanguínea / ofrenda de cereal en la legislación cultual
translation_notes:
  revision_awareness: El audit trail inglés revisó la fórmula de peso de «by the sanctuary shekel» a «according to the sanctuary shekel» para mayor naturalidad y precisión. Por eso se reflejó en español con «según el siclo del santuario». También se respetó la elección cultual de «grain offering», pero en español se optó por «ofrenda vegetal» por claridad y fidelidad al contexto sacerdotal.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» donde corresponda en el proyecto, aunque este versículo no lo contiene.
  - «Siclo» se usa de manera uniforme para la unidad de peso cultual.
  - Se conservó el paralelismo de las dos vasijas y su contenido en una sola oración coordinada.
  - Las notas preservan alternativas léxicas reales sin introducir interpretaciones ajenas al hebreo.
