revisions:
- from: Entonces la ira de Dios se levantó contra ellos[a], e hirió a los más robustos[b] de entre ellos; abatió a los jóvenes de Israel.
  to: Entonces la ira de Dios se levantó contra ellos, y mató a los más robustos[a] de entre ellos; abatió a los jóvenes de Israel.
  rationale: Se corrige ‘hirió’ a ‘mató’ para reflejar fielmente וַיַּהֲרֹג. Se conserva ‘se levantó contra ellos’ por su buena correspondencia con el antropopatismo hebreo. Se mantiene ‘los más robustos’ como solución española natural para בְּמִשְׁמַנֵּיהֶם, pero se reubica y simplifica la nota léxica para que quede anclada correctamente y sin duplicación. No se requiere adjudicación adicional.
