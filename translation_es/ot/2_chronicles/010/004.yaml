  rationale: 'Se hicieron dos ajustes menores: 1) «hizo más pesado» para un español más natural que aún conserva la fuerza causativa y la imagen del yugo; 2) «la dura servidumbre que impuso tu padre» para eliminar la ambigüedad posesiva y expresar con claridad la labor obligatoria bajo el rey. Se mantuvieron la metáfora de «yugo», la estructura del versículo y las notas del POB.'
