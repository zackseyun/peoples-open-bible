translation:
  language: es
  text: Los demás hechos de Baasá[a], y lo que hizo, y su poder, ¿no están escritos en el libro de las crónicas de los reyes de Israel?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el libro de los anales de los reyes de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֶתֶר
  english_pob_choice: Now the rest of
  chosen_spanish: Ahora, el resto de
  alternatives_spanish:
  - Y el resto de
  - Ahora bien, lo demás de
  lexicon: HALOT
  rationale: La fórmula introductoria de los relatos regios pide en español un marcador discursivo natural. «Resto» conserva el sentido de lo que queda por mencionar, sin añadir contenido.
- source_word: דִּבְרֵי
  english_pob_choice: acts
  chosen_spanish: hechos
  alternatives_spanish:
  - actos
  - acciones
  - obras
  lexicon: HALOT
  rationale: En esta fórmula, דִּבְרֵי no significa meramente «palabras», sino la materia histórica registrada sobre el rey. «Hechos» transmite mejor el valor de acciones o acontecimientos narrados.
- source_word: בַעְשָׁא
  english_pob_choice: Baasha
  chosen_spanish: Baasá
  alternatives_spanish:
  - Baasa
  - Baása
  lexicon: convención transliterativa
  rationale: Se translitera el nombre propio en forma española natural y reconocible. Se mantiene la identificación del personaje sin sustituirlo por una forma tradicional menos transparente.
- source_word: וַאֲשֶׁר עָשָׂה
  english_pob_choice: and what he did
  chosen_spanish: y lo que hizo
  alternatives_spanish:
  - y todo lo que hizo
  - y lo que realizó
  lexicon: HALOT
  rationale: La cláusula relativa se vierte de manera directa y sin intensificación añadida. «Lo que hizo» conserva la amplitud del hebreo sin imponer un «todo» que el texto no expresa.
- source_word: וּגְבוּרָתוֹ
  english_pob_choice: and his might
  chosen_spanish: y su poder
  alternatives_spanish:
  - y su fuerza
  - y sus hazañas
  - y su valentía
  lexicon: HALOT
  rationale: גְּבוּרָה puede referirse a fuerza, poder o proezas. Aquí, en una fórmula de anales reales, «su poder» conserva el sentido abstracto de capacidad/fortaleza manifestada, sin forzar «hazañas» como lectura interpretativa.
- source_word: הֲלֹא הֵם כְּתוּבִים
  english_pob_choice: are they not written
  chosen_spanish: ¿no están escritos
  alternatives_spanish:
  - ¿acaso no están escritos
  - ¿no se hallan escritos
  lexicon: HALOT
  rationale: La pregunta retórica se mantiene casi literalmente, preservando el tono formulaico de la fuente. «Están escritos» funciona naturalmente en español para registros documentales.
- source_word: עַל סֵפֶר
  english_pob_choice: in the Book
  chosen_spanish: en el libro
  alternatives_spanish:
  - en el escrito
  - en el rollo
  lexicon: HALOT
  rationale: Aunque la preposición hebrea es literalmente «sobre», el español idiomático requiere «en» para un documento escrito. «Libro» conserva la referencia archivística general sin exagerar la forma material.
- source_word: סֵפֶר דִּבְרֵי הַיָּמִים
  english_pob_choice: the Book of the Chronicles
  chosen_spanish: el libro de las Crónicas
  alternatives_spanish:
  - el libro de los anales
  - el libro de las memorias
  lexicon: HALOT
  rationale: La expresión designa una obra de registro histórico/annalístico. «Crónicas» es el equivalente más transparente y tradicional en español para este título de archivo, sin perder el carácter documental.
- source_word: לְמַלְכֵי יִשְׂרָאֵל
  english_pob_choice: of the Kings of Israel
  chosen_spanish: de los reyes de Israel
  alternatives_spanish:
  - de los monarcas de Israel
  - para los reyes de Israel
  lexicon: HALOT
  rationale: La relación posesiva/titular se expresa naturalmente con «de». Se conserva el referente dinástico e histórico sin añadir una interpretación funcional distinta.
translation_notes:
  revision_awareness: 'Se siguió de cerca el texto hebreo y el audit trail inglés: fórmula regia, valor histórico de דִּבְרֵי, y la referencia documental final se mantienen sin expansión interpretativa. No hubo revisiones aplicadas en el material de referencia; la versión española refleja el estado estable del expediente.'
  spanish_consistency_notes:
  - Se mantiene «Baasá» para el nombre propio, con transliteración coherente y pronunciable en español.
  - «Crónicas» se usa como equivalente documental estándar, con nota alternativa que preserva la opción «anales» documentada en el auditrail inglés.
  - La puntuación con raya conserva el relieve retórico del hebreo y el inglés POB.
  - No se introduce lenguaje teológico ajeno al versículo; el registro permanece histórico y formulaico.
