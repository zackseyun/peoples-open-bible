    text: O ‘con escarnio en el alma’, ‘con desprecio desde el corazón’. La expresión hebrea combina desprecio con una disposición interior y total de la persona.
    reason: lexical_alternative
  - marker: b
    text: O ‘con enemistad antigua’ o ‘con hostilidad perpetua’. עוֹלָם puede denotar antigüedad prolongada o perpetuidad duradera según el contexto.
    reason: lexical_alternative
  revision_rationale: 'Se ajusta únicamente la fórmula divina para reflejar mejor אֲדֹנָי יְהוִה en español del proyecto: se conserva el título (''Señor''), se expresa el componente divino (''Dios'') y se mantiene explícito el nombre del pacto (''Yahvé''). No se cambian las demás decisiones léxicas porque son fieles al hebreo y suficientemente naturales en español bíblico moderno.'
