translation:
  language: es
  text: En cuanto al resto de las bestias[a], se les quitó su dominio; pero les fue dada una prolongación de vida por un tiempo y una sazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hasta un tiempo y una sazón». La expresión aramea también puede entenderse como el límite de la prolongación concedida a ellas.'
    reason: alternative_reading
lexical_decisions:
- source_word: וּשְׁאָר
  english_pob_choice: As for the rest of
  chosen_spanish: En cuanto al resto de
  alternatives_spanish:
  - Y el resto de
  - Por lo que toca al resto de
  - En cuanto a las demás
  lexicon: HALOT
  rationale: La expresión introduce un cambio discursivo respecto de la bestia anterior. «En cuanto a» comunica bien ese giro tópico en español sin perder el sentido de «el resto».
- source_word: חֵיוָתָא
  english_pob_choice: the beasts
  chosen_spanish: las bestias
  alternatives_spanish:
  - los animales
  - las criaturas vivientes
  lexicon: HALOT
  rationale: En Daniel 7 se trata de las bestias simbólicas de la visión; «bestias» conserva el valor apocalíptico del término.
- source_word: הֶעְדִּיו
  english_pob_choice: was taken away
  chosen_spanish: se les quitó
  alternatives_spanish:
  - les fue quitado
  - fue removido
  - se les removió
  lexicon: HALOT
  rationale: El verbo expresa quitar o remover. La pasiva refleja en español mantiene la pasividad del sujeto y suena natural.
- source_word: שָׁלְטָנְהוֹן
  english_pob_choice: their dominion
  chosen_spanish: su dominio
  alternatives_spanish:
  - su poder
  - su autoridad
  - su soberanía
  lexicon: HALOT
  rationale: «Dominio» reproduce el vocabulario político-apocalíptico del pasaje y sigue de cerca la decisión inglesa.
- source_word: וְאַרְכָה
  english_pob_choice: but an extension
  chosen_spanish: pero una prolongación
  alternatives_spanish:
  - pero una extensión
  - pero una prolongación de
  - y una prolongación
  lexicon: HALOT
  rationale: El sustantivo denota alargamiento o prolongación. «Pero» refleja el matiz adversativo que contrasta con la pérdida del dominio.
- source_word: בְחַיִּין
  english_pob_choice: of life
  chosen_spanish: de vida
  alternatives_spanish:
  - en vida
  - de sus vidas
  lexicon: HALOT
  rationale: La construcción con ארכה indica prolongación de vida; «de vida» es idiomático en español y conserva la relación genitiva.
- source_word: יְהִיבַת לְהוֹן
  english_pob_choice: was given to them
  chosen_spanish: les fue dada
  alternatives_spanish:
  - se les dio
  - les fue concedida
  lexicon: HALOT
  rationale: La pasiva conserva el foco en lo recibido, sin especificar innecesariamente al dador.
- source_word: עַד זְמַן וְעִדָּן
  english_pob_choice: for a time and a season
  chosen_spanish: por un tiempo y una temporada
  alternatives_spanish:
  - hasta un tiempo y una temporada
  - por un tiempo y un período
  - por un tiempo y una época
  lexicon: HALOT
  rationale: La pareja temporal conserva la idea de duración limitada y determinada. «Temporada» mantiene la distinción entre los dos sustantivos sin imponer un esquema técnico adicional.
theological_decisions:
- issue: Cómo expresar la duración limitada concedida a las bestias tras perder su dominio
  english_pob_reading: for a time and a season
  chosen_spanish_reading: por un tiempo y una temporada
  alternative_spanish_readings:
  - hasta un tiempo y una temporada
  - por un tiempo y un período
  - por un tiempo determinado
  rationale: El arameo subraya que la vida se prolonga solo por un lapso limitado. La redacción principal preserva esa limitación sin resolver de antemano la tensión temporal del texto.
  doctrine_reference: Preservar la tensión interpretativa; no sobre-especificar el marco escatológico.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; el testimonio de concordancia alta confirma la estabilidad de la lectura base. La traducción española sigue esa lectura sin añadir matices no presentes en el arameo.
  spanish_consistency_notes:
  - Se mantiene «bestias» para el simbolismo de Daniel 7.
  - Se conserva «dominio» en lugar de «reino» o «poder» para seguir el léxico del audit trail.
  - La nota explica la ambigüedad temporal de עַד זְמַן וְעִדָּן sin decidirla unilateralmente.
  - Se evita «SEÑOR» u otra sustitución devocional, pues el versículo no contiene el Tetragrámaton.
