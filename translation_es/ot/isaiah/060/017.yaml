translation:
  language: es
  text: En lugar de bronce traeré oro, y en lugar de hierro traeré plata; en lugar de madera, bronce, y en lugar de piedras, hierro. Y haré que la paz sea tu gobernante[a], y la justicia tu regidora[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu administración» / «tus oficiales». El hebreo puede referirse a la supervisión, al cargo o a quienes lo ejercen.
    reason: lexical_alternative
  - marker: b
    text: O «tu gobernante» / «tus opresores» / «tus exactores». El hebreo puede designar a quien gobierna o a quien impone cargas; también, «justicia» puede traducirse «rectitud» según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּחַת
  english_pob_choice: instead of
  chosen_spanish: en lugar de
  alternatives_spanish:
  - en vez de
  - en sustitución de
  lexicon: HALOT
  rationale: En este contexto de reemplazo de materiales, la preposición expresa sustitución, no posición espacial. «En lugar de» es la equivalencia natural y fiel en español.
- source_word: נְחֹשֶׁת
  english_pob_choice: bronze
  chosen_spanish: bronce
  alternatives_spanish:
  - cobre
  - latón
  lexicon: HALOT
  rationale: El término hebreo puede abarcar cobre/bronce, pero en una lista de materiales de construcción «bronce» es la opción contextual más adecuada y evita la imprecisión de «latón».
- source_word: אָבִיא
  english_pob_choice: I will bring
  chosen_spanish: traeré
  alternatives_spanish:
  - haré venir
  - llevaré
  lexicon: HALOT
  rationale: El hifil de בוא aquí comunica provisión o introducción de materiales superiores. «Traeré» conserva el sentido y suena natural en español.
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: oro
  lexicon: HALOT
  rationale: Término material directo.
- source_word: בַּרְזֶל
  english_pob_choice: iron
  chosen_spanish: hierro
  lexicon: HALOT
  rationale: Término material directo.
- source_word: כֶסֶף
  english_pob_choice: silver
  chosen_spanish: plata
  alternatives_spanish:
  - dinero
  lexicon: HALOT
  rationale: En paralelo con oro/bronce/hierro, el valor metálico es inequívoco; «plata» mantiene la serie de materiales.
- source_word: עֵצִים
  english_pob_choice: wood
  chosen_spanish: madera
  alternatives_spanish:
  - leña
  - madero
  - maderas
  lexicon: HALOT
  rationale: En un listado de materiales de construcción, «madera» es la equivalencia más natural y colectiva en español.
- source_word: אֲבָנִים
  english_pob_choice: stones
  chosen_spanish: piedras
  alternatives_spanish:
  - piedra
  - rocas
  lexicon: HALOT
  rationale: En contexto constructivo, «piedras» comunica el material con claridad y conserva el plural del hebreo.
- source_word: שַׂמְתִּי
  english_pob_choice: I will make
  chosen_spanish: pondré
  alternatives_spanish:
  - haré
  - estableceré
  - nombraré
  lexicon: HALOT
  rationale: El verbo introduce una transformación del orden cívico; «pondré» permite expresar de forma idiomática que la paz ocupa el lugar rector.
- source_word: פְקֻדָּתֵךְ
  english_pob_choice: your overseer
  chosen_spanish: tu administración
  alternatives_spanish:
  - tu supervisión
  - tus gobernantes
  - tu gobierno
  lexicon: HALOT
  rationale: El sustantivo puede denotar supervisión, cargo u oficiales. Dado el paralelismo con el siguiente cola y el valor abstracto posible, «tu administración» preserva la tensión entre el orden mismo y quienes lo ejercen.
- source_word: שָׁלוֹם
  english_pob_choice: peace
  chosen_spanish: la paz
  alternatives_spanish:
  - bienestar
  - plenitud
  lexicon: HALOT
  rationale: «Paz» es la equivalencia central y reconocible; en esta visión de restauración cívica incluye bienestar, pero no conviene diluir el término.
- source_word: נֹגְשַׂיִךְ
  english_pob_choice: your ruler
  chosen_spanish: tus gobernantes
  alternatives_spanish:
  - tus opresores
  - tus taskmasters
  - tus exactores
  lexicon: HALOT
  rationale: El término puede referirse a quienes ejercen presión o coerción. «Gobernantes» mantiene la referencia personal, aunque en contexto connota una autoridad transformada por la justicia.
- source_word: צְדָקָה
  english_pob_choice: righteousness
  chosen_spanish: la justicia
  alternatives_spanish:
  - la rectitud
  - la justicia/rectitud
  lexicon: HALOT
  rationale: Aunque también puede ser «rectitud», aquí el paralelo con paz y el marco de orden público hacen que «justicia» sea la opción más natural y amplia en español. Se preserva así la posible fuerza legal y moral del término.
theological_decisions:
- issue: Cómo traducir la cláusula final sobre el orden cívico transformado
  english_pob_reading: A future restoration in which peace and righteousness characterize Jerusalem's governing authorities.
  chosen_spanish_reading: Una restauración futura en la que la paz y la justicia caracterizan el orden de Jerusalén.
  alternative_spanish_readings:
  - Una restauración futura en la que la paz y la justicia caracterizan a sus autoridades.
  - Paz como administración, y justicia como gobernantes.
  rationale: 'El hebreo admite tanto una lectura abstracta del gobierno como una personificación de sus agentes. La redacción española conserva esa tensión: «administración» sugiere el orden institucional, mientras «gobernantes» mantiene la personificación implícita sin resolverla en exceso.'
  doctrine_reference: 'Translation philosophy #3: preservar la tensión teológica y poética cuando el texto fuente la permite'
- issue: Si traducir פְקֻדָּתֵךְ y נֹגְשַׂיִךְ con términos administrativos o personales
  english_pob_reading: your overseer / your ruler
  chosen_spanish_reading: tu administración / tus gobernantes
  alternative_spanish_readings:
  - tu supervisión / tus opresores
  - tu gobierno / tus taskmasters
  rationale: El inglés POB documenta la ambigüedad entre cargo, administración y personas. En español, «administración» expresa bien el cargo u orden, y «gobernantes» mantiene la dimensión personal del segundo miembro; así se evita una traducción demasiado técnica o demasiado eclesiástica.
  doctrine_reference: 'Translation philosophy #3: preservar la ambigüedad significativa del original'
translation_notes:
  revision_awareness: La revisión más reciente del POB en inglés ajustó la cláusula final hacia una lectura más natural y singular/collective, moviendo «overseers» a «overseer» y «taskmasters» a «ruler». En español, esa dinámica se refleja de manera no forzada mediante «tu administración» y «tus gobernantes», evitando una singularización artificial y conservando la tensión entre cargo y personas. Además, la tradición POB de notas alternativas para צְדָקָה, פְקֻדָּתֵךְ y נֹגְשַׂיִךְ se preserva en notas españolas equivalentes.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» implícito en la primera persona divina sin añadirlo, porque el hebreo usa discurso directo.
  - Se usa «bronce» para נְחֹשֶׁת en la serie de materiales, conforme al valor contextual del término.
  - Se elige «justicia» para צְדָקָה, reservando «rectitud» como alternativa notada.
  - La puntuación reproduce el paralelismo del hebreo con dos miembros iniciales y una clausula final de gobierno transformado.
  - El marcador de nota en el texto debe corresponder con las notas; si se prefiere evitar marcar la primera nota en el texto, puede dejarse sin anclaje, pero aquí se ancla en el primer material reemplazado por coherencia editorial.
