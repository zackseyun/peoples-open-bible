  yaml_path: translation/ot/leviticus/006/002.yaml
  text: 'Command Aaron and his sons[a], saying, This is the law of the burnt offering: the burnt offering itself shall remain on its hearth on the altar all night until the morning[b], and the fire of the altar shall be kept burning on it.'
