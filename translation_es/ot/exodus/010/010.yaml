translation:
  language: es
  text: 'Y él les dijo[a]: «Que Yahvé esté con ustedes, si alguna vez los dejo salir a ustedes y a sus pequeños. Miren[b], porque el mal está ante ustedes».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Que Yahvé esté con ustedes cuando yo los deje salir a ustedes y a sus pequeños», probablemente dicho con sarcasmo.'
    reason: alternative_reading
  - marker: b
    text: 'El hebreo es ambiguo: puede significar «el desastre está delante de ustedes» o «ustedes tienen el mal en mente».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el término propio del proyecto para el nombre divino en español, manteniendo la forma auditable y evitando la sustitución por una convención de máscara litúrgica.
- source_word: יְהִי כֵן
  english_pob_choice: May Yahweh indeed be with you
  chosen_spanish: Que Yahvé esté con ustedes
  alternatives_spanish:
  - Ojalá Yahvé esté con ustedes
  - Que en verdad Yahvé esté con ustedes
  lexicon: HALOT
  rationale: El jussivo expresa deseo/ironía en el discurso de Faraón. En español, «Que ... esté» conserva el valor optativo sin forzar una paráfrasis excesiva; «en verdad» queda implícito por el contexto irónico, y puede aclararse en nota.
- source_word: כַּאֲשֶׁר אֲשַׁלַּח אֶתְכֶם
  english_pob_choice: if I ever send you ... out
  chosen_spanish: si alguna vez los envío a ustedes ... fuera
  alternatives_spanish:
  - cuando los envíe
  - si los mando
  lexicon: HALOT
  rationale: En el contexto hostil, el valor condicional/irónico de כַּאֲשֶׁר se preserva mejor con «si alguna vez». «Fuera» explicita el movimiento implícito de שׁלח en este pasaje.
- source_word: טַפְּכֶם
  english_pob_choice: your little ones
  chosen_spanish: sus pequeñitos
  alternatives_spanish:
  - sus niños
  - sus pequeños
  lexicon: HALOT
  rationale: טַף alude a los niños pequeños, no simplemente a descendencia en general. «Pequeñitos» conserva el matiz afectivo y la referencia a niños pequeños.
- source_word: רְא֕וּ
  english_pob_choice: See / Look out
  chosen_spanish: Miren
  alternatives_spanish:
  - Vean
  - Fíjense
  - Cuidado
  lexicon: HALOT
  rationale: El imperativo funciona como advertencia más que como mera percepción visual. «Miren» es natural en español y puede sostener el tono retador de Faraón sin introducir una fórmula demasiado interpretativa.
- source_word: כִּ֥י רָעָ֖ה נֶ֥גֶד פְּנֵיכֶֽם
  english_pob_choice: for evil is before your faces
  chosen_spanish: porque algo malo está delante de sus rostros
  alternatives_spanish:
  - porque el mal está delante de ustedes
  - porque el desastre está ante ustedes
  - porque el mal está en su mente
  lexicon: HALOT
  rationale: La frase hebrea es ambigua. «Algo malo» conserva la amplitud de רָעָה (mal, daño, desastre) sin resolver la lectura. «Delante de sus rostros» mantiene la imagen de נֶגֶד פְּנֵיכֶם; «sus rostros» puede sonar más literal, pero se conserva para no perder el eco hebreo.
theological_decisions:
- issue: Nombre divino YHWH en la boca de Faraón
  english_pob_reading: May Yahweh indeed be with you
  chosen_spanish_reading: Que Yahvé esté con ustedes
  alternative_spanish_readings:
  - Que el SEÑOR esté con ustedes
  - Que Jehová esté con ustedes
  rationale: Se mantiene Yahvé como forma del nombre divino según el criterio del proyecto. No se usa «SEÑOR» porque en este marco se evita la sustitución tipográfica del nombre propio, y «Jehová» no es la forma preferida del registro español del POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Preservación de la ironía y de la ambigüedad en la advertencia final
  english_pob_reading: See, for evil is before your faces
  chosen_spanish_reading: Miren, porque algo malo está delante de sus rostros
  alternative_spanish_readings:
  - Vean, porque el mal está delante de ustedes
  - Miren, porque el desastre está ante ustedes
  - Miren, porque tienen el mal en mente
  rationale: El hebreo permite entender tanto un peligro externo como una evaluación del intento de Faraón sobre el mal inminente. La frase elegida no decide entre «mal», «desastre» o «intención mala»; conserva la tensión semántica que el POB inglés documenta.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que afinó la relación entre רְאוּ y רָעָה נֶגֶד פְּנֵיכֶם para acercarla más al hebreo sin perder el tono irónico. También se consideró el ajuste en la ubicación de 'if ever' para reflejar mejor el valor condicional de כַּאֲשֶׁר.
  spanish_consistency_notes:
  - Se usa Yahvé de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - Se conserva la ambigüedad de רָעָה con «algo malo» en vez de resolverla como «desastre» o «maldad» en el cuerpo principal.
  - «Sus rostros» mantiene la imaginería hebrea de פְּנֵיכֶם, aunque en español pueda sonar más literal que idiomático.
  - La voz y el tono procuran ser bíblicos y publicables sin volver al registro arcaizante de Reina-Valera.
