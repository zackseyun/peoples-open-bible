translation:
  language: es
  text: 'Dije[a]: «Ellos dirigen sus caminos en justicia». Consideré los juicios de Dios desde la creación del cielo y de la tierra[b][c][d]; declaré justo a Dios en sus juicios desde antiguo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ellos dirigen sus caminos en justicia».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «sus juicios desde la eternidad».'
    reason: alternative_reading
  - marker: c
    text: 'O: «justifiqué a Dios en sus juicios».'
    reason: lexical_alternative
  - marker: d
    text: 'O: «vindiqué a Dios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Κατευθύνουσιν
  english_pob_choice: direct
  chosen_spanish: enderezan
  alternatives_spanish:
  - dirigen
  - enderezan sus caminos
  lexicon: LSJ
  rationale: El verbo griego tiene la idea de hacer recto u orientar correctamente un camino. En español, «enderezan» conserva mejor la imagen de caminos rectificados que un simple «dirigen», y mantiene la fuerza moral del pasaje.
- source_word: ὁδοὺς
  english_pob_choice: ways
  chosen_spanish: caminos
  alternatives_spanish:
  - sendas
  - vías
  lexicon: LSJ
  rationale: «Caminos» es natural en español bíblico y conserva la metáfora de la conducta o el andar humano.
- source_word: δικαιοσύνῃ
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia recta
  lexicon: LSJ
  rationale: Aquí el contexto describe conducta conforme al orden recto; «justicia» es el término más claro y fiel en español, sin borrar el matiz moral/covenantal.
- source_word: ἀνελογισάμην
  english_pob_choice: considered
  chosen_spanish: consideré
  alternatives_spanish:
  - reflexioné sobre
  - medité
  lexicon: LSJ
  rationale: El aoristo medio expresa reflexión deliberada; «consideré» reproduce bien esa acción mental ponderada.
- source_word: κρίματα
  english_pob_choice: judgments
  chosen_spanish: juicios
  alternatives_spanish:
  - sentencias
  - decretos
  lexicon: LSJ
  rationale: «Juicios» cubre tanto decisiones judiciales como actos de juzgar, y funciona bien con Dios como sujeto implícito del juicio.
- source_word: ἐδικαίωσα
  english_pob_choice: declared God righteous
  chosen_spanish: declaré justo a Dios
  alternatives_spanish:
  - justifiqué a Dios
  - vindiqué a Dios
  lexicon: LSJ
  rationale: El griego conserva el juego de raíces δικαι- y en español «declaré justo a Dios» mantiene ese nexo con δικαιοσύνη/justo sin sugerir que el hablante le otorgue justicia a Dios. «Vindiqué» sonaría menos transparente en un texto bíblico español.
- source_word: τοῖς ἀπʼ αἰῶνος
  english_pob_choice: from of old
  chosen_spanish: desde antiguo
  alternatives_spanish:
  - desde la eternidad
  - de antiguo
  lexicon: LSJ
  rationale: La expresión puede indicar antigüedad o un alcance eterno. «Desde antiguo» preserva esa amplitud sin forzar una lectura metafísica más específica de la que exige el contexto.
theological_decisions:
- issue: Relación entre δικαιοσύνη / ἐδικαίωσα / δίκαια y el énfasis teológico del versículo
  english_pob_reading: The verse emphasizes God’s righteousness in his judgments from of old; the translation should preserve the lexical thread and the evaluation that God is in the right.
  chosen_spanish_reading: El versículo enfatiza la justicia de Dios en sus juicios desde antiguo; la traducción conserva el hilo léxico y la evaluación de que Dios está en lo justo.
  alternative_spanish_readings:
  - declaré a Dios justo en sus juicios
  - vindiqué a Dios en sus juicios
  rationale: La repetición del campo léxico de justicia es importante para la teología del pasaje. «Declaré justo a Dios» mantiene la afirmación evaluativa sin suavizarla ni resolverla con una fórmula doctrinal ajena al griego.
  doctrine_reference: Preservar la tensión léxica y teológica del texto sin armonizarla prematuramente.
- issue: Alcance de τοῖς ἀπʼ αἰῶνος respecto de los juicios de Dios
  english_pob_reading: his judgments from of old
  chosen_spanish_reading: sus juicios desde antiguo
  alternative_spanish_readings:
  - sus juicios eternos
  - sus juicios de eternidad
  rationale: El griego admite una referencia a juicios antiquísimos o a juicios eternos. «Desde antiguo» deja abierta esa tensión, como hace la traducción inglesa auditada.
  doctrine_reference: Preservar la tensión histórica/eternidad sin sobreinterpretar.
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «vindicated God» a «declared God righteous» para preservar el juego léxico δικαι-. La redacción española sigue esa revisión con «declaré justo a Dios», manteniendo también la imagen de caminos enderezados y la ambigüedad controlada de «desde antiguo».
  spanish_consistency_notes:
  - Se usa «Dios» para θεός conforme al estándar del proyecto.
  - Se traduce δικαιοσύνη por «justicia» en este contexto de conducta recta.
  - Se conserva el paralelismo léxico de justicia/justo en «justicia» y «justo».
  - «Desde antiguo» evita cerrar indebidamente la posible referencia a eternidad.
  - La puntuación con comillas españolas y marcador [a] sigue el estilo de publicación en español.
