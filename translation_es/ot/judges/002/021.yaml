translation:
  language: es
  text: Yo también ya no expulsaré de delante de ellos a ninguna de las naciones que Josué dejó cuando murió[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Yo también ya no expulsaré de delante de ellos ni a una sola de las naciones que Josué dejó, y murió». El hebreo más literalmente dice: «y murió»; «cuando murió» expresa el sentido temporal con más naturalidad en español.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם אֲנִי
  english_pob_choice: I also
  chosen_spanish: Yo también
  alternatives_spanish:
  - También yo
  - Yo asimismo
  lexicon: HALOT
  rationale: גַּם con el pronombre independiente añade énfasis y continuidad; en español, «Yo también» conserva ese matiz con naturalidad y sin perder la primera persona enfática.
- source_word: לֹא אוֹסִיף
  english_pob_choice: will no longer
  chosen_spanish: no seguiré
  alternatives_spanish:
  - ya no seguiré
  - no volveré a
  lexicon: HALOT
  rationale: El hebreo expresa cese de una acción continuada; «no seguiré» transmite bien la idea de no continuar haciendo algo, en un español fluido. Se evita añadir un verbo redundante que oscurezca la fuerza aspectual del original.
- source_word: לְהוֹרִישׁ
  english_pob_choice: to drive out
  chosen_spanish: expulsando
  alternatives_spanish:
  - desposeyendo
  - echando fuera
  lexicon: HALOT
  rationale: En contextos de conquista, הורישׁ significa remover a los habitantes de la tierra. «Expulsar» comunica esa acción de manera natural en español y mantiene el sentido direccional de sacar de delante.
- source_word: אִישׁ
  english_pob_choice: any
  chosen_spanish: ninguno
  alternatives_spanish:
  - ni uno
  - ni una sola persona
  lexicon: HALOT
  rationale: 'En esta construcción distributiva, אִישׁ intensifica la negación: no «ni uno». «Ninguno» expresa con claridad la idea de exclusión total, aunque en el trasfondo está el valor de «ni una sola persona».'
- source_word: מִפְּנֵיהֶם
  english_pob_choice: before them
  chosen_spanish: de delante de ellos
  alternatives_spanish:
  - de su presencia
  - ante ellos
  lexicon: HALOT
  rationale: La locución idiomática indica ser removido de la presencia de alguien. «De delante de ellos» conserva la imagen hebrea y funciona bien con «expulsar».
- source_word: מִן הַגּוֹיִם
  english_pob_choice: any of the nations
  chosen_spanish: de las naciones
  alternatives_spanish:
  - de entre las naciones
  - ninguna de las naciones
  lexicon: HALOT
  rationale: 'Con אִישׁ, la frase es partitiva: ni uno de entre las naciones. En español, «de las naciones» es suficientemente claro en el flujo de la negación, aunque el sentido distributivo queda reforzado por «ninguno».'
- source_word: אֲשֶׁר עָזַב יְהוֹשֻׁעַ
  english_pob_choice: that Joshua left
  chosen_spanish: que Josué dejó
  alternatives_spanish:
  - que Josué había dejado
  - que Josué permitió que quedaran
  lexicon: HALOT
  rationale: עָזַב aquí significa dejar/abandonar. «Que Josué dejó» sigue de cerca el valor léxico básico y evita sobreespecificar con una paráfrasis que el hebreo no exige.
- source_word: וַיָּמֹת
  english_pob_choice: when he died
  chosen_spanish: cuando murió
  alternatives_spanish:
  - y murió
  - al morir
  lexicon: HALOT
  rationale: La relación temporal se expresa con naturalidad mediante «cuando murió», reflejando el sentido consecutivo del hebreo sin volverlo pesado en español.
theological_decisions:
- issue: Sujeto divino implícito en primera persona
  english_pob_reading: The speaker remains first-person singular ('I'), with no expansion to 'the LORD' in the verse text.
  chosen_spanish_reading: Se mantiene la primera persona singular («Yo») sin añadir «Yahvé» al texto del versículo.
  alternative_spanish_readings:
  - «Yahvé también no seguirá expulsando...»
  - «El SEÑOR también...»
  rationale: El hebreo conserva la voz en primera persona y no repite el nombre divino en esta línea. Dado que el contexto ya identifica al hablante, añadir «Yahvé» al versículo sería ir más allá del texto fuente. En el texto principal se preserva la voz directa.
  doctrine_reference: Primacía del texto original; no introducir palabras ausentes del hebreo por tradición de lectura.
translation_notes:
  revision_awareness: El borrador sigue la revisión final del audit trail inglés, que descartó una redacción redundante tipo «continuar a» y prefirió una forma más natural para expresar cese con לֹא אוֹסִיף. En español se refleja ese mismo ajuste evitando una perífrasis innecesaria. También se conserva la tensión del hebreo entre la literalidad de «y murió» y la suavidad temporal de «cuando murió» mediante una nota alternativa.
  spanish_consistency_notes:
  - Se mantiene «Yo» en primera persona, conforme al hablante implícito del contexto.
  - Se prefirió «Yahvé» como término base del proyecto, pero aquí no se inserta en el versículo porque el hebreo no lo repite.
  - «Expulsar» se usa para l/הוריש en sentido de expulsar/remover habitantes de la tierra, no como simple acción de desalojar.
  - La construcción negativa se hace idiomática en español sin perder el carácter totalizador del hebreo.
