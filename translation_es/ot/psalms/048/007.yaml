translation:
  language: es
  text: El temblor se apoderó de ellos allí, angustia como la de una mujer en parto[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «retorcimiento como el de una mujer en labor»; el sustantivo hebreo חִיל puede enfatizar tanto el dolor convulsivo como la angustia resultante.
    reason: lexical_alternative
lexical_decisions:
- source_word: רְעָדָה
  english_pob_choice: Trembling
  chosen_spanish: Temblor
  alternatives_spanish:
  - Tremor
  - Tembor
  - Trepidación
  lexicon: HALOT
  rationale: El sustantivo nombra sacudida o temblor; «temblor» conserva la imagen física concreta y es natural en español bíblico contemporáneo.
- source_word: אֲחָזָתַם
  english_pob_choice: seized them
  chosen_spanish: se apoderó de ellos
  alternatives_spanish:
  - los tomó
  - los agarró
  - los asió
  lexicon: HALOT
  rationale: El verbo expresa el tomar posesión súbita y abrumadora; en español, «se apoderó de ellos» transmite esa fuerza más idiomáticamente que una simple captura manual.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: HALOT
  rationale: Adverbio locativo directo; «allí» mantiene la referencia espacial del verso y el tono narrativo-visual.
- source_word: חִיל
  english_pob_choice: anguish
  chosen_spanish: angustia
  alternatives_spanish:
  - dolor
  - retorcimiento
  - parto
  lexicon: HALOT
  rationale: El término puede abarcar dolor convulso, retorcimiento o angustia; «angustia» comunica el impacto sufrido sin duplicar demasiado la imagen del símil siguiente.
- source_word: כַּיּוֹלֵדָה
  english_pob_choice: like a woman in labor
  chosen_spanish: como de mujer en parto
  alternatives_spanish:
  - como mujer que da a luz
  - como una mujer de parto
  - como de parturienta
  lexicon: HALOT
  rationale: El comparativo apunta a la mujer en trabajo de parto. «Como de mujer en parto» preserva la fuerza del símil y suena natural en español; evita añadir una perífrasis más interpretativa.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo de WLC y mantiene el paralelismo del verso. La redacción española conserva la secuencia imagen física + irrupción súbita + angustia comparativa, en línea con la lectura estable del audit trail inglés; no se aplicaron revisiones posteriores sustantivas.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque este verso no contiene el nombre divino.
  - «Temblor» y «angustia» mantienen la distinción entre la sacudida externa y la aflicción interna.
  - La nota al pie conserva la ambigüedad documentada de חִיל sin resolverla por paráfrasis.
