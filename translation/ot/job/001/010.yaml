id: JOB.1.10
reference: Job 1:10
source:
  edition: WLC
  text: הֲ/לֹֽא את שַׂ֣כְתָּ בַעֲד֧/וֹ וּ/בְעַד בֵּית֛/וֹ וּ/בְעַ֥ד כָּל אֲשֶׁר ל֖/וֹ מִ/סָּבִ֑יב מַעֲשֵׂ֤ה יָדָי/ו֙ בֵּרַ֔כְתָּ וּ/מִקְנֵ֖/הוּ פָּרַ֥ץ בָּ/אָֽרֶץ־־־־׃
translation:
  text: Have you not put a hedge around him and around his house and around all that he has[a], on every side? You have blessed the work of his hands[b], and his livestock has spread throughout the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hedged him in' / 'fenced him about.' The Hebrew uses a concrete image of protective enclosure.
    reason: lexical_alternative
  - marker: b
    text: Or 'has increased greatly in the land.' The Hebrew verb literally suggests breaking out or bursting forth.
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׂכְתָּ
  lemma: שׂוּךְ
  chosen: put a hedge around
  alternatives:
  - hedged in
  - fenced about
  - protected
  lexicon: HALOT
  rationale: The verb from שׂוּךְ in this context denotes enclosing/protecting. 'Put a hedge around' preserves the concrete metaphor and the protective sense better than the more abstract 'protected.'
- source_word: בַעֲדוֹ / וּבְעַד בֵּיתוֹ / וּבְעַד כָּל אֲשֶׁר לוֹ
  chosen: around him and around his house and around all that he has
  alternatives:
  - for him ... for his house ... for all that is his
  lexicon: HALOT
  rationale: בְעַד can mean 'around, about, for the protection of.' Here, with שַׂכְתָּ and מִסָּבִיב, the spatial-protective sense is primary, so 'around' is preferable.
- source_word: מִסָּבִיב
  chosen: on every side
  alternatives:
  - all around
  - round about
  lexicon: HALOT
  rationale: This adverb intensifies the image of complete encirclement. 'On every side' is idiomatic modern English and preserves the totality.
- source_word: מַעֲשֵׂה יָדָיו
  chosen: the work of his hands
  alternatives:
  - everything his hands have made
  - his handiwork
  lexicon: HALOT
  rationale: A common Hebrew idiom for a person's labor or productive activity. 'The work of his hands' keeps the idiom transparent and natural in English.
- source_word: בֵּרַכְתָּ
  chosen: have blessed
  alternatives:
  - blessed
  - prospered
  lexicon: HALOT
  rationale: The verb ברך is literally 'bless.' Although the effect is prosperity, the text attributes that prosperity to divine blessing, so the theological wording should be retained.
- source_word: מִקְנֵהוּ
  chosen: his livestock
  alternatives:
  - his possessions
  - his cattle
  - his herds
  lexicon: HALOT
  rationale: מִקְנֶה commonly refers to acquired animals/herds rather than possessions in general. 'Livestock' is broad and accurate in modern English.
- source_word: פָּרַץ
  chosen: has spread
  alternatives:
  - has increased greatly
  - has broken out
  - has multiplied
  lexicon: HALOT
  rationale: The verb literally conveys breaking out/bursting forth. In context of livestock and land, 'has spread' preserves the vivid expansion imagery without becoming awkward. 'Has increased greatly' is possible but less concrete.
- source_word: בָּאָרֶץ
  chosen: throughout the land
  alternatives:
  - in the land
  - across the הארץ
  lexicon: HALOT
  rationale: With פָּרַץ, the phrase suggests expansion across the territory, not mere location within it. 'Throughout the land' captures the distributive sense in idiomatic English.
- source_word: הֲלֹא
  chosen: Have you not
  alternatives:
  - Is it not that you
  - Surely you have
  lexicon: HALOT
  rationale: This introduces Satan's rhetorical question. 'Have you not' preserves the interrogative force and accusation.
