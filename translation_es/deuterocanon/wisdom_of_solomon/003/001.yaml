translation:
  language: es
  text: Pero las almas de los justos están en la mano de Dios, y ningún tormento[a] las tocará jamás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ninguna aflicción las tocará jamás». El griego βάσανος puede denotar sufrimiento severo o tormento.
    reason: lexical_alternative
lexical_decisions:
- source_word: Δικαίων
  english_pob_choice: of the righteous
  chosen_spanish: de los justos
  alternatives_spanish:
  - de los rectos
  - de los justos y rectos
  lexicon: LSJ
  rationale: El genitivo plural sustantivado de δίκαιος se vierte de modo natural en español como 'los justos'. 'Rectos' es posible, pero 'justos' preserva mejor la categoría moral y bíblica usada por la POB inglesa.
- source_word: ψυχαὶ
  english_pob_choice: souls
  chosen_spanish: almas
  alternatives_spanish:
  - vidas
  - personas
  lexicon: LSJ
  rationale: '''Almas'' corresponde directamente a ψυχαί y conserva la fuerza antropológica y escatológica del pasaje. ''Vidas'' o ''personas'' suavizan esa tensión y desplazan el matiz del griego.'
- source_word: ἐν χειρὶ θεοῦ
  english_pob_choice: in the hand of God
  chosen_spanish: en la mano de Dios
  alternatives_spanish:
  - bajo el cuidado de Dios
  - bajo la protección de Dios
  lexicon: LSJ
  rationale: Se conserva la imagen idiomática literal del griego. 'En la mano de Dios' es plenamente comprensible en español y mantiene la metáfora de posesión y resguardo sin reducirla a una explicación interpretativa.
- source_word: οὐ μὴ ἅψηται
  english_pob_choice: will ever touch
  chosen_spanish: no tocará jamás
  alternatives_spanish:
  - nunca tocará
  - de ninguna manera tocará
  lexicon: LSJ
  rationale: La negación enfática οὐ μή con subjuntivo aoristo se expresa de forma natural con 'no ... jamás'. 'Tocar' reproduce ἅπτομαι; 'jamás' comunica la fuerza absoluta de la negación sin sonar arcaico.
- source_word: βάσανος
  english_pob_choice: torment
  chosen_spanish: tormento
  alternatives_spanish:
  - aflicción
  - dolor
  - prueba
  lexicon: LSJ
  rationale: '''Tormento'' refleja mejor la intensidad de βάσανος en este contexto. ''Aflicción'' sería más general y ''prueba'' debilitaría el contraste de consuelo del versículo.'
theological_decisions:
- issue: Valor de ψυχαί respecto de la existencia posterior a la muerte
  english_pob_reading: Retain 'souls' in the main text
  chosen_spanish_reading: Mantener 'almas' en el texto principal
  alternative_spanish_readings:
  - vidas
  - personas
  rationale: '''Almas'' preserva la referencia al sujeto humano más allá de la mera vida biológica y deja intacta la tensión escatológica del pasaje. No se resuelve ni se amplía más allá de lo que el griego afirma.'
  doctrine_reference: Preservar la tensión teológica en vez de resolverla; primacía del original sobre una paráfrasis doctrinal.
- issue: Fuerza de la idiomática ἐν χειρὶ θεοῦ
  english_pob_reading: Translate the idiom literally as 'in the hand of God'
  chosen_spanish_reading: 'Traducir literalmente: ''en la mano de Dios'''
  alternative_spanish_readings:
  - bajo la protección de Dios
  - bajo el cuidado de Dios
  rationale: La imagen bíblica de la 'mano de Dios' es inteligible en español y conserva el alcance de protección, posesión y poder sin limitar el sentido a una sola interpretación.
  doctrine_reference: Equivalencia óptima; no paraphrase beyond what the source warrants.
translation_notes:
  revision_awareness: El griego de Swete 1909 coincide con el texto de trabajo adjudicado; la revisión más reciente indicó que no eran necesarios cambios, y la concordancia cruzada fue alta (acuerdo total).
  spanish_consistency_notes:
  - Se mantiene 'Dios' para θεοῦ, sin introducir 'SEÑOR'.
  - Se conserva el lenguaje directo y sobrio de la POB, evitando paráfrasis explicativas.
  - '''Tormento'' se eligió para βάσανος, pero se documenta la alternativa ''aflicción'' porque el campo semántico del término es más amplio.'
