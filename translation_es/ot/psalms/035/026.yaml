  text: יֵ֘בֹ֤שׁוּ וְ/יַחְפְּר֨וּ יַחְדָּו֮ שְׂמֵחֵ֪י רָעָ֫תִ֥/י יִֽלְבְּשׁוּ בֹ֥שֶׁת וּ/כְלִמָּ֑ה הַֽ/מַּגְדִּילִ֥ים עָלָֽ/י׀־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/035/026.yaml
  text: Let those who rejoice at my harm be put to shame and humiliated together[a]; let those who magnify themselves against me be clothed with shame and disgrace.
