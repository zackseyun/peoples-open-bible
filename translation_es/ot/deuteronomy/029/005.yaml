revisions:
- from: No han comido pan[a] ni han bebido vino ni bebida fuerte, para que sepan que yo soy Yahvé, su Dios.
  to: No comieron pan ni bebieron vino ni bebida fuerte[a], para que sepan que yo soy Yahvé su Dios.
  rationale: Se cambia al pretérito simple para una recapitulación histórica más natural y fiel en español, y se reubica la nota léxica al término «bebida fuerte», que es el elemento que la nota explica. También se elimina la coma antes de «su Dios» para una lectura más fluida en aposición identificativa.
