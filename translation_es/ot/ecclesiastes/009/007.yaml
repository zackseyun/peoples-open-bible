    rationale: La nota lexical_alternative documenta alternativas para רָצָה ('ha aprobado / ha aceptado / se complace en'), pero el marcador [a] está puesto sobre 'corazón alegre', que traduce בְלֶב טוֹב. Esto rompe la trazabilidad entre fuente, decisión léxica y nota.
  - severity: low
    issue: Alternativa de nota 'tus hechos' suena menos natural y menos alineada con el audit trail
    rationale: El inglés ofrece 'your deeds' como alternativa a 'your works'. En español, 'tus hechos' es posible pero menos idiomático aquí que 'tus acciones' o simplemente mantener 'tus obras' en la tercera alternativa. Conviene usar una opción más natural sin cambiar el sentido.
  revised_spanish_text: Anda, come tu pan con alegría, y bebe tu vino con un corazón alegre, porque Dios ya ha aprobado[a] tus obras.
