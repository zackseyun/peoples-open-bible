    text: 'O: «con su poder» o «en su poder»; el hebreo puede leerse de forma más literal, pero el contexto destaca la ironía de que su fuerza no impidió su caída.'
    reason: lexical_alternative
  - marker: b
    text: «Pozo» es una imagen hebrea común para el reino de los muertos o la tumba.
    reason: cultural_note
  revision_rationale: 'Se hicieron ajustes menores de precisión y estilo: «muertos por la espada» refleja mejor חַלְלֵי חָרֶב en español; se omitió «Ellos» por redundante; y se mantuvieron las notas con anclajes coherentes al texto revisado. El resto del borrador es fiel al hebreo y a las decisiones del POB inglés.'
