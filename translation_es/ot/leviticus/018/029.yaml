translation:
  language: es
  text: Porque cualquiera que haga alguna de todas estas abominaciones[a], las personas que las hacen serán cortadas de entre su pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «serán ejecutadas» o «serán excluidas de la comunidad»; el hebreo dice «serán cortadas», sin especificar el modo exacto del juicio.'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: La partícula introduce la razón o consecuencia de la prohibición anterior. «Porque» reproduce bien esa relación explicativa en español sin forzar una lectura causal excesiva.
- source_word: כָּל אֲשֶׁר
  english_pob_choice: whoever
  chosen_spanish: cualquiera que
  alternatives_spanish:
  - quienquiera que
  - todo el que
  lexicon: HALOT
  rationale: La construcción hebrea expresa un relativo universal indefinido. «Cualquiera que» suena natural en español y conserva el alcance general del texto.
- source_word: יַעֲשֶׂה
  english_pob_choice: does
  chosen_spanish: haga
  alternatives_spanish:
  - hiciere
  - cometa
  lexicon: HALOT
  rationale: El verbo básico es «hacer». En español, dentro de este contexto jurídico-moral, el subjuntivo en una relativa indefinida («cualquiera que haga») comunica bien la generalidad sin estrechar el sentido a un tecnicismo.
- source_word: מִכֹּל הַתּוֹעֵבוֹת הָאֵלֶּה
  english_pob_choice: any of all these abominations
  chosen_spanish: cualquiera de todas estas abominaciones
  alternatives_spanish:
  - alguna de todas estas abominaciones
  - cualquiera de estas abominaciones
  lexicon: HALOT
  rationale: Se conserva el valor partitivo de מִן y la fuerza inclusiva de כֹּל. «Abominaciones» mantiene el peso léxico y moral de תּוֹעֵבוֹת en este contexto de santidad legal.
- source_word: תּוֹעֵבוֹת
  english_pob_choice: abominations
  chosen_spanish: abominaciones
  alternatives_spanish:
  - actos detestables
  - cosas abominables
  lexicon: HALOT
  rationale: «Abominaciones» es el equivalente español usual para este término en contextos cultuales y morales, y preserva la gravedad del original.
- source_word: וְנִכְרְתוּ
  english_pob_choice: shall be cut off
  chosen_spanish: serán cortadas
  alternatives_spanish:
  - serán eliminadas
  - serán excluidas
  lexicon: HALOT
  rationale: El idiomático hebreo כרת en pasivo legal se conserva con «ser cortadas». Aunque en español puede sonar vívido, refleja mejor la fórmula legal-teológica que una interpretación cerrada del tipo de pena.
- source_word: הַנְּפָשׁוֹת
  english_pob_choice: the persons
  chosen_spanish: las personas
  alternatives_spanish:
  - las almas
  - los individuos
  lexicon: HALOT
  rationale: En contexto legal, נֶפֶשׁ designa a las personas concretas afectadas. «Personas» evita connotaciones dualistas de «almas» y resulta claro para el lector actual.
- source_word: הָעֹשֹׂת
  english_pob_choice: who do them
  chosen_spanish: que las hacen
  alternatives_spanish:
  - que las practican
  - que cometen esas cosas
  lexicon: HALOT
  rationale: El participio identifica a quienes realizan las acciones mencionadas. «Las hacen» mantiene la referencia directa a las abominaciones sin añadir más contenido del requerido por el hebreo.
- source_word: מִקֶּרֶב עַמָּם
  english_pob_choice: from among their people
  chosen_spanish: de en medio de su pueblo
  alternatives_spanish:
  - de entre su pueblo
  - de la comunidad
  lexicon: HALOT
  rationale: La fórmula comunitaria se expresa de modo bastante literal. «De en medio de su pueblo» conserva la imagen espacial del hebreo y el carácter de exclusión/jucio del pasaje.
theological_decisions:
- issue: Alcance de la pena en וְנִכְרְתוּ ... מִקֶּרֶב עַמָּם
  english_pob_reading: shall be cut off from among their people
  chosen_spanish_reading: serán cortadas de en medio de su pueblo
  alternative_spanish_readings:
  - serán ejecutadas
  - serán excluidas de la comunidad
  rationale: El hebreo no especifica aquí si la fórmula implica muerte, exclusión o juicio divino directo. Se mantiene la expresión ambigua «serán cortadas» para no resolver la tensión legal-teológica que el texto deja abierta.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Coincide con la última pasada de revisión: no se requieren cambios sustantivos respecto del análisis auditado; se preserva la ambigüedad legal de la fórmula de ‘cortar’ y la amplitud universal de la relativa indefinida.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el tetragrámaton aparece explícitamente; en este versículo no aparece.
  - Se mantiene «abominaciones» como término técnico coherente con Levítico.
  - «Serán cortadas» conserva la fórmula legal tradicional sin sustituirla por una interpretación cerrada.
  - «Personas» se eligió por el valor legal de נֶפֶשׁ en este contexto.
