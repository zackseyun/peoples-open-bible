id: GEN.44.15
reference: Genesis 44:15
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר לָ/הֶם֙ יוֹסֵ֔ף מָֽה הַ/מַּעֲשֶׂ֥ה הַ/זֶּ֖ה אֲשֶׁ֣ר עֲשִׂיתֶ֑ם הֲ/ל֣וֹא יְדַעְתֶּ֔ם כִּֽי נַחֵ֧שׁ יְנַחֵ֛שׁ אִ֖ישׁ אֲשֶׁ֥ר כָּמֹֽ/נִי־־׃
translation:
  text: And Joseph said to them[a], “What is this deed that you have done? Did you not know that a man like me indeed practices divination?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “surely divines,” “would certainly find out by divination,” or “can surely discover such things.” The Hebrew uses an intensified form of the verb from the root for divination.
    reason: lexical_alternative
lexical_decisions:
- source_word: מָה הַמַּעֲשֶׂה הַזֶּה
  chosen: What is this deed
  alternatives:
  - What is this thing
  - What is this act
  lexicon: HALOT
  rationale: מַעֲשֶׂה denotes a deed, act, or action. 'Deed' preserves the moral weight of Joseph's rebuke better than the flatter 'thing,' while remaining natural English.
- source_word: עֲשִׂיתֶם
  chosen: you have done
  alternatives:
  - you did
  lexicon: HALOT
  rationale: The perfect verb in direct speech is naturally rendered in English as 'you have done' here, matching the present relevance of the accusation.
- source_word: הֲלוֹא יְדַעְתֶּם
  chosen: Did you not know
  alternatives:
  - Surely you knew
  - Did you not realize
  lexicon: HALOT
  rationale: The interrogative with negation expects an affirmative answer. 'Did you not know' preserves the rhetorical force without over-paraphrasing.
- source_word: נַחֵשׁ יְנַחֵשׁ
  chosen: can indeed practice divination
  alternatives:
  - surely divines
  - can certainly divine
  - uses divination
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the verbal idea. Because English lacks a direct cognate verb in common usage, 'can indeed practice divination' conveys both the action and the emphasis in readable modern English. This also avoids overstating the narrative as an endorsement of actual occult practice; Joseph is speaking within his Egyptian persona.
- source_word: אִישׁ אֲשֶׁר כָּמֹנִי
  chosen: a man like me
  alternatives:
  - such a man as I
  - someone like me
  lexicon: HALOT
  rationale: אִישׁ is singular and generic here. 'A man like me' is the most direct and idiomatic rendering, preserving the masculine singular form in line with the gender-accurate policy.
- source_word: יוֹסֵף
  chosen: Joseph
  rationale: Personal name transliterated by standard English convention.
