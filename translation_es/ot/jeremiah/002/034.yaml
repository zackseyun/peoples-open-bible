  glossary_alignment: No hay conflictos con los términos teológicos por defecto del proyecto. No aparecen Yahvé, Mesías, etc. La decisión sobre מַחְתֶּרֶת necesita mejor ajuste léxico al valor de 'robo por perforación/boquete' documentado en la auditoría inglesa.
