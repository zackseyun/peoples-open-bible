translation:
  language: es
  text: Pero a la tierra a la cual ellos alzan su alma para volver[a], allí no volverán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «a la tierra a la cual alzan su alma para volver allí». El modismo hebreo «alzar el alma» expresa un deseo intenso o anhelo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל
  english_pob_choice: But to
  chosen_spanish: Pero a
  alternatives_spanish:
  - Y acerca de
  - Pero respecto de
  lexicon: HALOT
  rationale: El hebreo introduce una frase contrastiva y topical, ligada al versículo anterior. En español, «Pero a» conserva el giro directo y el contraste sin añadir una explicación no requerida por el texto.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la tierra prometida
  lexicon: HALOT
  rationale: En este contexto de destierro y regreso, אֶרֶץ apunta a un territorio o patria concreta. «La tierra» es natural en español bíblico y no fuerza una interpretación más específica que la del hebreo.
- source_word: אֲשֶׁר
  english_pob_choice: to which
  chosen_spanish: a la cual
  alternatives_spanish:
  - que
  - donde
  lexicon: HALOT
  rationale: El relativo depende del movimiento implícito de לָשׁוּב. «A la cual» reproduce bien la relación direccional del hebreo y suena claro en español.
- source_word: מְנַשְּׂאִים אֶת־נַפְשָׁם
  english_pob_choice: they lift up their soul
  chosen_spanish: levantan su alma
  alternatives_spanish:
  - levantan su vida
  - anhelan
  - desean intensamente
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea central «levantar el alma», porque el POB inglés optó por reflejarla abiertamente tras revisar una paráfrasis más interpretativa. En español, «levantan su alma» mantiene la metáfora y evita borrar la tensión idiomática.
- source_word: נַפְשָׁם
  english_pob_choice: their soul
  chosen_spanish: su alma
  alternatives_spanish:
  - su vida
  - su ser
  - su deseo
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí forma parte del modismo y puede traducirse literalmente sin oscurecer el sentido. «Alma» preserva la imagen y corresponde al énfasis del texto fuente.
- source_word: לָשׁוּב
  english_pob_choice: to return
  chosen_spanish: para volver
  alternatives_spanish:
  - para regresar
  - para retornar
  lexicon: HALOT
  rationale: El verbo שׁוּב se mantiene con «volver», un equivalente directo y idiomático en español. «Para volver» expresa bien la finalidad del movimiento deseado.
- source_word: שָׁם / שָׁמָּה
  english_pob_choice: there / there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - allá
  lexicon: HALOT
  rationale: El hebreo repite el adverbio locativo con énfasis. En español, una sola repetición está bien servida por «allí» en la cláusula principal; el sentido de destino permanece claro sin forzar una duplicación poco natural.
- source_word: לֹא יָשׁוּבוּ
  english_pob_choice: they will not return
  chosen_spanish: no volverán
  alternatives_spanish:
  - no regresarán
  - no retornarán
  - no volverán jamás
  lexicon: HALOT
  rationale: La negación simple del futuro comunica fielmente el hebreo. «No volverán» es natural, sobrio y no intensifica indebidamente el alcance temporal.
theological_decisions:
- issue: El modismo hebreo «levantar el alma» puede suavizarse en español o conservarse de forma literal.
  english_pob_reading: The Hebrew idiom 'lift up the soul' expresses strong desire or longing.
  chosen_spanish_reading: «Levantan su alma» conserva la imagen del original y permite que el lector perciba el modismo, mientras el sentido de anhelo queda claro por el contexto.
  alternative_spanish_readings:
  - «anhelan volver»
  - «desean volver»
  - «levantan su corazón para volver»
  rationale: Dado que el POB inglés decidió no ocultar la metáfora hebrea, la versión española debe retenerla en vez de reemplazarla por una paráfrasis que borre el color semítico del texto. La claridad se mantiene por la sintaxis simple y el paralelismo del versículo.
  doctrine_reference: Principio de transparencia textual y conservación de imágenes bíblicas cuando el idioma receptor las soporta sin ambigüedad doctrinal.
translation_notes:
  revision_awareness: El inglés POB revisó una paráfrasis más interpretativa («long to return») para restituir el modismo literal «lift up their soul to return». La propuesta española sigue esa revisión y conserva la metáfora en lugar de reemplazarla por una equivalencia explicativa.
  spanish_consistency_notes:
  - Se mantiene «alma» como equivalente de נֶפֶשׁ en el modismo, no como referencia doctrinal separada.
  - Se usa «la tierra» en singular porque el contexto apunta a una patria concreta, no a la tierra en sentido cósmico.
  - «Volver» se repite en ambas cláusulas para reflejar la raíz שׁוב del hebreo.
  - No se introduce «SEÑOR» ni otra sustitución reverencial, porque el versículo no contiene el nombre divino.
