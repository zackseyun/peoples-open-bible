translation:
  language: es
  text: Y lloró[a] en voz alta, y los egipcios[b] oyeron, y la casa de Faraón[c] oyó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'dio su voz en llanto', un modismo hebreo que significa que lloró en voz alta.
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse 'Egipto', tomado colectivamente; sin embargo, el verbo plural favorece 'los egipcios'.
    reason: lexical_alternative
  - marker: c
    text: '''La casa de Faraón'' también puede traducirse ''la familia real de Faraón'' o, por extensión, ''la corte de Faraón''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן אֶת־קֹלוֹ
  english_pob_choice: he wept aloud
  chosen_spanish: lloró en alta voz
  alternatives_spanish:
  - alz&oacute; la voz llorando
  - dio su voz en llanto
  lexicon: HALOT
  rationale: El hebreo expresa literalmente 'dio su voz' con la idea de un llanto audible; en contexto, la equivalencia natural en español es 'lloró en alta voz', que conserva el valor idiomático y la intensidad sonora sin volverse calcada.
- source_word: בִּבְכִי
  english_pob_choice: wept
  chosen_spanish: lloró
  alternatives_spanish:
  - en llanto
  - con llanto
  lexicon: HALOT
  rationale: La frase preposicional indica el modo del acto. En español, el verbo 'llorar' integra de forma natural la idea de 'weeping', por lo que evita una redundancia rígida y mantiene el sentido contextual.
- source_word: וַיִּשְׁמְעוּ
  english_pob_choice: heard
  chosen_spanish: oyeron
  alternatives_spanish:
  - escucharon
  lexicon: HALOT
  rationale: Aquí se trata de percepción auditiva, no de atención obediente. 'Oyeron' reproduce con claridad ese sentido básico y conserva el paralelismo del versículo.
- source_word: מִצְרַיִם
  english_pob_choice: the Egyptians
  chosen_spanish: los egipcios
  alternatives_spanish:
  - Egipto
  lexicon: HALOT
  rationale: La forma puede entenderse colectivamente como 'Egipto', pero el verbo plural apoya una referencia personal colectiva. En español, 'los egipcios' expresa mejor ese matiz que una personificación del país.
- source_word: בֵּית פַּרְעֹה
  english_pob_choice: Pharaoh’s household
  chosen_spanish: la casa de Faraón
  alternatives_spanish:
  - la casa de Faraón
  - el palacio de Faraón
  - la corte de Faraón
  lexicon: HALOT
  rationale: '''Casa'' en hebreo puede abarcar la casa como hogar, la casa real o el conjunto de personas del establecimiento real. ''La casa de Faraón'' mantiene cercanía con el hebreo y preserva esa amplitud; ''corte'' o ''palacio'' estrecharían o desplazarían el referente.'
translation_notes:
  revision_awareness: El texto sigue de cerca el expediente inglés POB, manteniendo la misma valoración idiomática de וַיִּתֵּן אֶת־קֹלוֹ como llanto audible, la lectura colectiva plural de מִצְרַיִם y la amplitud semántica de בֵּית פַּרְעֹה. No se documentaron revisiones posteriores que alteren estas decisiones.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' u otras sustituciones teológicas no pertinentes al versículo.
  - Se conservó la distinción entre el colectivo humano 'los egipcios' y 'la casa de Faraón'.
  - La puntuación y el orden de la cláusula siguen el paralelismo del hebreo sin forzar una sintaxis rígida.
