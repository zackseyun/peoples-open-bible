review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la secuencia de acciones y los contrastes principales del griego: quitarse el cilicio, dejar la ropa de viudez, lavarse, ungirse, arreglarse el cabello, ponerse un adorno en la cabeza y vestirse de gala. Sin embargo, hay fallas de anclaje y correspondencia en las notas, además de varias decisiones léxicas poco naturales o erróneas para el español: la nota [a] está puesta sobre «cilicio» pero su contenido corresponde a μύρῳ παχεῖ; «mītra» no es forma española aceptable en texto principal; y «vestiduras de su alegría» y «perfume rico» suenan demasiado calcados.'
  spanish_quality_summary: La legibilidad general es aceptable, pero el texto necesita pulido para español eclesial natural y digno. «Perfume rico» suena impropio; «ordenó el cabello de su cabeza» es comprensible pero rígido; «mītra» introduce un grafema ajeno al español; y las notas están desordenadas respecto de sus anclajes. Una revisión menor deja el versículo fiel y mucho más idiomático.
  glossary_alignment: No hay conflictos con terminología doctrinal del proyecto. «Cilicio» está bien para σάκκον. «Vestiduras de su viudez» preserva bien τὰ ἱμάτια τῆς χηρεύσεως. Para μίτραν conviene usar una forma española clara en texto principal, como «diadema», y conservar en nota la alternativa «turbante/tocado». Para τὰ ἱμάτια τῆς εὐφροσύνης αὐτῆς, «vestiduras festivas» refleja mejor la decisión POB documentada que «vestiduras de su alegría».
  issues:
  - severity: high
    issue: Las notas al pie están mal ancladas y desalineadas con el texto.
    rationale: '[a] aparece en «cilicio» pero la nota trata de «ungüento rico»; [b] aparece en «perfume rico» pero la nota trata de μίτραν; [c] aparece en «mītra» pero la nota trata de la frase literal final; [d] añade una nota innecesaria sobre Manasés. Esto incumple el requisito de que cada marcador corresponda exactamente al lugar pertinente.'
  - severity: high
    issue: «mītra» no es una forma española adecuada en el texto principal.
    rationale: La transliteración con macrón no es ortografía española ni una solución documentada por el POB inglés. El original pide un tocado/banda para la cabeza; en español conviene una equivalencia comprensible en texto y una nota con alternativas.
  - severity: medium
    issue: «Perfume rico» es poco natural en español.
    rationale: Aunque sigue de cerca el inglés revisado, en español suena extraño. «Perfume abundante» o «ungüento perfumado» serían opciones, pero dada la nota alternativa inglesa, «se ungió con perfume[a]» permite texto natural y nota léxica suficiente.
  - severity: medium
