revisions:
- from: 'Y dirás a ellos[a]: «Esta es la ofrenda encendida que ofrecerán a Yahvé: dos corderos machos de un año, sin defecto, cada día, como holocausto perpetuo».'
  to: 'Y les dirás[a]: «Esta es la ofrenda de alimento que presentarán a Yahvé: dos corderos machos de un año, sin defecto, cada día, como holocausto regular».'
