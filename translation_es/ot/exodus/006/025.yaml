translation:
  language: es
  text: Y Eleazar, hijo de Aarón, tomó para sí una mujer de entre las hijas de Putiel[a], y ella le dio a luz a Finees. Estos son los jefes de las casas paternas[b] de los levitas, según sus clanes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "una de las hijas de Putiel". La expresión hebrea puede indicar matrimonio dentro de la familia de Putiel sin especificar cuál hija.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, "cabezas de casas de padres", una expresión de parentesco para los jefes de hogares ancestrales dentro de los clanes levitas.
    reason: cultural_note
lexical_decisions:
- source_word: לָקַח לּוֹ ... לְאִשָּׁה
  english_pob_choice: took for himself a wife
  chosen_spanish: tomó para sí una mujer
  alternatives_spanish:
  - tomó una mujer para sí
  - se casó
  lexicon: HALOT
  rationale: Conserva el giro idiomático hebreo de 'tomar ... por esposa' sin reducirlo al verbo interpretativo 'se casó'. En español, 'tomó para sí una mujer' mantiene la forma semítica con naturalidad suficiente para un registro bíblico moderno.
- source_word: מִבְּנוֹת פּוּטִיאֵל
  english_pob_choice: from the daughters of Putiel
  chosen_spanish: de entre las hijas de Putiel
  alternatives_spanish:
  - de las hijas de Putiel
  - de una de las hijas de Putiel
  lexicon: HALOT
  rationale: '''De entre'' refleja bien el valor de pertenencia/origen del hebreo מִן con plural de parentesco, sin decidir más de lo que el texto dice sobre si fue una hija concreta o una integrante de ese grupo familiar.'
- source_word: וַתֵּלֶד לוֹ אֶת־פִּינְחָס
  english_pob_choice: and she bore him Phinehas
  chosen_spanish: y ella le dio a luz a Finés
  alternatives_spanish:
  - y dio a luz a Finés para él
  - y le dio a luz a Finés
  lexicon: HALOT
  rationale: '''Dar a luz'' preserva el sujeto femenino y la relación de beneficio/dativo expresada por לוֹ. Se usa ''Finés'' como forma española tradicional y clara del nombre propio, manteniendo la transliteración funcional en español.'
- source_word: אֵלֶּה
  english_pob_choice: These are
  chosen_spanish: Estos son
  alternatives_spanish:
  - Estas son
  - Éstos son
  lexicon: HALOT
  rationale: La fórmula conclusiva de identificación genealógica se vierte de manera directa y natural en español como introducción resumidora.
- source_word: רָאשֵׁי אֲבוֹת
  english_pob_choice: the heads of the fathers’ houses
  chosen_spanish: los jefes de las casas paternas
  alternatives_spanish:
  - los cabezas de las casas paternas
  - los jefes de los hogares paternos
  lexicon: HALOT
  rationale: '''Casas paternas'' conserva el valor técnico genealógico de אֲבוֹת como unidades de parentesco/linaje. ''Jefes'' comunica la función de liderazgo sin forzar una expresión arcaica.'
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los descendientes de Leví
  lexicon: HALOT
  rationale: En este contexto tribal-genealógico, 'levitas' es la forma natural y precisa en español, equivalente al grupo descendiente de Leví.
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: by their clans
  chosen_spanish: según sus clanes
  alternatives_spanish:
  - por sus clanes
  - según sus familias
  lexicon: HALOT
  rationale: '''Clanes'' reproduce bien el sentido genealógico de מִשְׁפָּחָה en listas tribales. ''Según'' refleja el valor organizador del hebreo en la clasificación.'
- source_word: פּוּטִיאֵל / פִּינְחָס / אֶלְעָזָר / אַהֲרֹן
  english_pob_choice: Putiel / Phinehas / Eleazar / Aaron
  chosen_spanish: Putiel / Finés / Eleazar / Aarón
  alternatives_spanish:
  - Putiel / Finees / Eleazar / Aarón
  lexicon: standard transliteration conventions
  rationale: Se conservan los nombres propios con adaptación española usual. 'Finés' es una forma establecida y clara en español bíblico; 'Finees' queda como variante posible, pero 'Finés' resulta más breve y reconocible.
translation_notes:
  revision_awareness: El testimonio auditado en inglés mantiene la lectura genealógica estándar y no registra revisiones textuales o cambios interpretativos. La versión española sigue de cerca esa decisión, conservando el giro matrimonial idiomático, la posible ambigüedad de 'de entre las hijas de Putiel' y la fórmula de cierre genealógico.
  spanish_consistency_notes:
  - Se mantuvo el registro genealógico-formal del verso, evitando simplificaciones como 'se casó' que borrarían el idiomatismo hebreo.
  - Se prefirió 'casas paternas' para reflejar la estructura social de linaje, coherente con el audit trail inglés.
  - Se usó 'levitas' y 'clanes' como términos técnicos bíblicos en español, en paralelo con la lectura inglesa auditada.
  - Los nombres propios siguen adaptación española coherente y consistente con el uso bíblico en español.
