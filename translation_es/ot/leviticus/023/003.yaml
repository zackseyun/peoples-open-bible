translation:
  language: es
  text: Durante seis días se puede hacer trabajo, pero en el séptimo día es un sábado de completo reposo[a], una asamblea santa. No harán ningún trabajo; es un sábado para Yahvé en todas sus moradas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un sábado de reposo solemne» o «un sábado de descanso completo». La frase hebrea intensifica la idea de reposo sabático.
    reason: lexical_alternative
  - marker: b
    text: O «en todos sus lugares de residencia» o «en todos sus asentamientos». El hebreo puede referirse a moradas o comunidades establecidas.
    reason: lexical_alternative
lexical_decisions:
- source_word: תֵּעָשֶׂה
  english_pob_choice: may be done
  chosen_spanish: se puede hacer
  alternatives_spanish:
  - se hará
  - puede hacerse
  lexicon: HALOT
  rationale: El nifal imperfecto aquí expresa voz pasiva con fuerza general/gnómica. «Se puede hacer» conserva esa pasividad y la idea de que el trabajo queda permitido durante seis días, sin volverlo una orden rígida que el hebreo no formula.
- source_word: מְלָאכָה
  english_pob_choice: work
  chosen_spanish: trabajo
  alternatives_spanish:
  - labor
  - obra
  lexicon: HALOT
  rationale: En legislación sabática, מְלָאכָה designa el trabajo ordinario o labor. «Trabajo» es natural en español y mantiene el alcance general del término.
- source_word: שַׁבַּת שַׁבָּתוֹן
  english_pob_choice: a Sabbath of complete rest
  chosen_spanish: un sábado de completo reposo
  alternatives_spanish:
  - un sábado de reposo absoluto
  - un sábado de descanso completo
  - un sábado de solemne reposo
  lexicon: HALOT
  rationale: La repetición intensifica la idea de cesación total. «Completo reposo» refleja esa intensificación sin añadir conceptos ajenos; se conserva la tensión entre el día como sábado y su carácter de reposo pleno.
- source_word: מִקְרָא קֹדֶשׁ
  english_pob_choice: a holy convocation
  chosen_spanish: una asamblea santa
  alternatives_spanish:
  - una convocación santa
  - una reunión santa
  lexicon: HALOT
  rationale: מִקְרָא implica una reunión convocada; en español «asamblea» comunica mejor la reunión congregada que «convocación», sin perder el carácter formal y sagrado. «Santa» conserva קֹדֶשׁ.
- source_word: לֹא תַעֲשׂוּ
  english_pob_choice: You shall do no work
  chosen_spanish: No harán ningún trabajo
  alternatives_spanish:
  - No deberán hacer trabajo alguno
  - No harán obra alguna
  lexicon: HALOT
  rationale: La prohibición plural directa se expresa con claridad en español mediante futuro de mandato. Se mantiene el foco en la prohibición de toda clase de trabajo, como en el hebreo y en el inglés POB.
- source_word: שַׁבָּת הִוא לַֽיהוָה
  english_pob_choice: it is a Sabbath to Yahweh
  chosen_spanish: es un sábado para Yahvé
  alternatives_spanish:
  - es un sábado de Yahvé
  - es el sábado de Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino «Yahvé» conforme al criterio POB, y la preposición לַ conserva la orientación/dedicación del día a Yahvé sin convertirla en una posesión idiomática distinta no requerida por el texto.
- source_word: בְּכֹל מוֹשְׁבֹתֵיכֶם
  english_pob_choice: in all your dwellings
  chosen_spanish: en todas sus moradas
  alternatives_spanish:
  - en todos sus lugares de residencia
  - en todos sus asentamientos
  lexicon: HALOT
  rationale: מוֹשָׁב puede referirse a lugares donde uno habita. «Moradas» es breve, idiomático y apto para un registro bíblico moderno; conserva el alcance de residencia/domicilio sin forzar la idea de «asentamientos».
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. La línea editorial POB pide transliterarlo en vez de sustituirlo por un título, y en español la forma establecida aquí es «Yahvé».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fuerza de שַׁבַּת שַׁבָּתוֹן
  english_pob_reading: a Sabbath of complete rest
  chosen_spanish_reading: un sábado de completo reposo
  alternative_spanish_readings:
  - un sábado de reposo solemne
  - un sábado de reposo absoluto
  - un sábado de descanso completo
  rationale: La frase intensifica el reposo sabático. «Completo reposo» mantiene la fuerza intensiva sin suavizarla ni convertirla en una explicación extensa.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve source meaning without paraphrase'
- issue: Convocación santa / asamblea santa
  english_pob_reading: a holy convocation
  chosen_spanish_reading: una asamblea santa
  alternative_spanish_readings:
  - una convocación santa
  - una reunión santa
  rationale: No se trata solo de santidad abstracta, sino de una reunión convocada. «Asamblea» preserva el carácter colectivo y oficial; «santa» traduce קֹדֶשׁ. Se evita una fórmula eclesiástica que pudiera sonar más técnica que el hebreo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve cultic terms with intelligible modern Spanish'
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo de Levítico 23:3 y se alinea con la decisión editorial inglesa de usar la idea de «complete rest» y el nombre divino «Yahweh/Yahvé». No se detectaron cambios en la última revisión; la versión está en alto acuerdo con el audit trail y solo requiere ajustes de naturalidad en español.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como equivalente de יְהוָה, coherente con el proyecto POB.
  - Se usó «sábado» para שַׁבָּת por su claridad bíblica en español, aunque el término hebreo subyace al concepto.
  - «Asamblea santa» preserva el valor cultual de מִקְרָא קֹדֶשׁ sin añadir explicaciones no presentes en el verso.
  - «Moradas» mantiene la amplitud semántica de מוֹשְׁבֹתֵיכֶם y evita limitarlo indebidamente a una sola clase de residencia.
