review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura y el sentido básico del hebreo: prohibición de oprimir al גֵר, apelación a la experiencia propia de Israel, y razón histórica en Egipto. También refleja el modismo de נֶפֶשׁ con nota explicativa. Sin embargo, hay dos problemas de fidelidad/forma: (1) ‘forastero’ no es la mejor opción para גֵר en español bíblico general, porque suele sugerir visitante o alguien de fuera de la localidad más que residente vulnerable entre un pueblo; ‘extranjero’ funciona mejor en registro e inteligibilidad, con nota que preserve la categoría social. (2) ‘porque forasteros fueron’ omite innecesariamente el sujeto explícito y suena poco natural; debe ser ‘porque ustedes fueron extranjeros’ o equivalente.'
  spanish_quality_summary: 'El texto es comprensible, pero tiene cierta rigidez y una formulación poco natural al final. ‘No oprimirás al forastero’ es posible, pero ‘No oprimirás al extranjero’ suena más claro y más ampliamente legible en español eclesial. La secuencia de tres notas es redundante: no hace falta repetir una nota léxica idéntica en el segundo uso del término. El resto del registro es digno y moderno.'
  glossary_alignment: 'No hay términos del glosario mayor en conflicto directo, pero la decisión para גֵר debería alinearse mejor con la racionalidad del POB: una persona no nativa que reside entre el pueblo. En español, ‘extranjero’ con nota explicativa o ‘residente extranjero’ en contextos más técnicos suele representar mejor esa categoría que ‘forastero’. ‘Alma’ es aceptable aquí porque el audit trail inglés revisado volvió a ‘soul’ y la nota ya aclara el modismo.'
  issues:
  - severity: medium
    issue: ‘forastero’ para גֵר es menos preciso y menos natural que ‘extranjero’ en este contexto legal.
    rationale: גֵר no es simplemente alguien ‘de fuera’ de paso; es un no nativo residente y vulnerable. ‘Forastero’ en español común puede sugerir visitante o alguien ajeno al lugar, mientras que ‘extranjero’ es más claro para lectura bíblica general. La nota puede conservar el matiz de residente vulnerable.
  - severity: medium
    issue: La frase final ‘porque forasteros fueron’ suena forzada y omite de forma poco elegante el sujeto explícito.
    rationale: 'El hebreo incluye ‘ustedes’ de forma clara en la cláusula anterior y el español pide una formulación más natural y transparente: ‘porque ustedes fueron extranjeros en la tierra de Egipto’.'
  - severity: low
    issue: La nota [c] repite innecesariamente la misma alternativa léxica del primer uso.
    rationale: La repetición no añade información nueva. Basta una sola nota en la primera ocurrencia, salvo que el segundo uso requiera una aclaración distinta, lo cual aquí no sucede.
  revised_spanish_text: No oprimirás al extranjero[a], y ustedes mismos conocen el alma[b] del extranjero, porque ustedes fueron extranjeros en la tierra de Egipto.
  revised_footnotes:
  - marker: a
    text: O ‘forastero’, ‘residente extranjero’ o ‘extraño’. El hebreo ger se refiere a una persona no nativa que vive entre un pueblo, a menudo en situación social vulnerable.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, ‘conocen el alma del extranjero’; es un modismo que expresa conocimiento de primera mano de la vida interior o de la condición vivida del extranjero.
    reason: lexical_alternative
  revision_rationale: Se reemplazó ‘forastero’ por ‘extranjero’ para representar mejor גֵר en español amplio y eclesial, sin perder el matiz mediante la nota. Se corrigió la cláusula final para una sintaxis natural y plenamente explícita en español. Se eliminaron notas redundantes y se conservaron las aclaraciones necesarias sobre ger y el modismo con נֶפֶשׁ.
