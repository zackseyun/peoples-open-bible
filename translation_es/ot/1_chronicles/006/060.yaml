lexical_decisions:
- source_word: חוּקֹק
  english_pob_choice: Hukok
  chosen_spanish: Hukok
  alternatives_spanish:
  - Helcat
  lexicon: HALOT
  rationale: Es un nombre propio de lugar; en español se translitera como nombre propio, no se traduce. Se conserva la lectura de Crónicas, mientras que 'Helcat' se deja como alternativa textual relacionada con el paralelo de Josué 21:31.
- source_word: מִגְרָשֶׁיהָ
  english_pob_choice: its pasturelands
  chosen_spanish: sus pastizales
  alternatives_spanish:
  - sus tierras de pasto
  - sus terrenos circundantes
  - sus tierras comunes
  lexicon: HALOT
  rationale: El término designa el terreno abierto asociado a una ciudad, usado para pastoreo y uso común. 'Pastizales' comunica bien esa función concreta en español y mantiene la relación posesiva con la ciudad.
- source_word: רְחֹב
  english_pob_choice: Rehob
  chosen_spanish: Rehob
  alternatives_spanish:
  - Rejob
  lexicon: HALOT
  rationale: Nombre propio de lugar. Se conserva la forma transliterada estándar, ya que no corresponde traducirlo.
- source_word: וְאֶת
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - con
  lexicon: sintaxis de lista hebrea
  rationale: En esta enumeración, el marcador de objeto con conjunción se vierte naturalmente con 'y' en español. La relación entre cada ciudad y sus terrenos se expresa por la coordinación y la posesión implícita, como en la POB inglesa.
translation_notes:
  revision_awareness: La base inglesa POB mantiene 'Hukok' en el texto principal y anota 'Helkath' como variante del paralelo de Josué 21:31; la presente versión española sigue esa decisión textual y conserva el nombre propio sin armonizarlo con el paralelo.
  spanish_consistency_notes:
  - Se mantiene la transliteración de nombres propios de lugar sin castellanizarlos.
  - '''Pastizales'' se usa aquí para reflejar el campo abierto asociado a una ciudad levítica, no ''pasturas'' o ''tierras circundantes'' de forma más vaga.'
  - No hay decisiones doctrinales en este versículo; el trabajo es léxico y textual.
