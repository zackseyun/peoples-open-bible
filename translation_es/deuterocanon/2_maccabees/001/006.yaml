translation:
  language: es
  text: Y ahora estamos aquí, orando por ustedes.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ νῦν
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Y en este momento
  - Y ahora mismo
  lexicon: LSJ
  rationale: Conserva la conexión inicial de καί y la fuerza temporal de νῦν con una fórmula natural en español.
- source_word: ὧδε
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - en este lugar
  - aquí mismo
  lexicon: LSJ
  rationale: ὧδε funciona aquí como adverbio de lugar; 'aquí' es la equivalencia más directa y clara en español.
- source_word: ἐσμεν
  english_pob_choice: we are
  chosen_spanish: estamos
  alternatives_spanish:
  - somos
  - permanecemos
  lexicon: BDAG
  rationale: El copulativo simple se expresa naturalmente como 'estamos aquí', sin añadir matices que el griego no exige.
- source_word: προσευχόμενοι
  english_pob_choice: praying
  chosen_spanish: orando
  alternatives_spanish:
  - orando en oración
  - haciendo oración
  - rezando
  lexicon: BDAG
  rationale: '''Orando'' comunica el participio presente continuo de manera digna y bíblica en español; ''rezando'' puede sonar más confesionalmente restringido y menos neutral.'
- source_word: περὶ ὑμῶν
  english_pob_choice: for you
  chosen_spanish: por ustedes
  alternatives_spanish:
  - por vosotros
  - acerca de ustedes
  - en favor de ustedes
  lexicon: BDAG
  rationale: Con lenguaje de oración, περί + genitivo se vuelve naturalmente 'por'; 'ustedes' mantiene un español latinoamericano amplio y respetuoso.
translation_notes:
  revision_awareness: El texto griego es breve y coincide estrechamente con la traducción inglesa auditada ('And now we are here, praying for you.'); no se registran revisiones textuales ni variantes relevantes en el expediente suministrado.
  spanish_consistency_notes:
  - Se mantiene 'aquí' para el valor locativo de ὧδε.
  - Se usa 'orando' como equivalente estándar y reverente de προσευχόμενοι.
  - Se prefiere 'ustedes' por registro neutral latinoamericano en un texto dirigido a destinatarios plurales.
