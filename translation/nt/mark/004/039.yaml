theological_decisions:
- issue: Whether to soften Jesus' command to the sea into conventional English ('Peace, be still') or preserve the sharper lexical imagery
  chosen_reading: Preserve the imperatives as 'Be silent! Be muzzled!'
  alternative_readings:
  - Peace! Be still!
  - Quiet! Be still!
  rationale: The Greek text does not contain a noun meaning 'peace'; it uses two imperatives, one of silence and one of muzzling. Preserving this wording better reflects Jesus' authoritative address to the chaotic sea without importing traditional phrasing not present in the text.
  doctrine_reference: Translation philosophy §1, §5
- issue: Whether to render θάλασσα as 'sea' or contextualize it as 'lake'
  chosen_reading: Render as 'sea'
  alternative_readings:
  - lake
  rationale: The source text says 'sea,' and retaining it respects original-language primacy while also preserving the narrative's broader theological resonance of authority over the sea. This does not add doctrine, but avoids reducing the term to a purely geographic paraphrase.
  doctrine_reference: Translation philosophy §1
