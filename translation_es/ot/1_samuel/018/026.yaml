    rationale: Aunque intenta conservar el modismo hebreo, «recto» aquí no es la opción más idiomática. «Le pareció bien a David» mantiene el sentido de aceptación/aprobación y sigue siendo fiel; la literalidad idiomática queda preservada en la nota.
