translation:
  language: es
  text: Ustedes que han escapado de la espada[a], vayan; no se queden quietos. Recuerden a Yahvé desde lejos, y que Jerusalén les suba al corazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «desde lejos, recuerden a Yahvé, y que Jerusalén venga a la mente». El hebreo dice literalmente: «que Jerusalén suba sobre vuestro corazón», un modismo para recordar con intención o preocuparse interiormente por ella.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּלֵטִים
  english_pob_choice: You who have escaped
  chosen_spanish: Ustedes que han escapado
  alternatives_spanish:
  - los que han escapado
  - sobrevivientes
  - escapados
  lexicon: HALOT
  rationale: El participio plural funciona como un vocativo dirigido a quienes escaparon. «Ustedes que han escapado» conserva el valor de dirección personal y el sentido de haber sido librados de peligro.
- source_word: מֵ/חֶ֔רֶב
  english_pob_choice: the sword
  chosen_spanish: de la espada
  alternatives_spanish:
  - de la guerra
  - de la violencia mortal
  lexicon: HALOT
  rationale: La espada representa el peligro bélico y letal; en español, «de la espada» mantiene la imagen bíblica directa y la relación con el escape.
- source_word: הִלְכ֖וּ
  english_pob_choice: go
  chosen_spanish: vayan
  alternatives_spanish:
  - caminen
  - salgan
  - avancen
  lexicon: HALOT
  rationale: El imperativo plural llama a moverse lejos del peligro. «Vayan» es natural en español y conserva la urgencia del mandato.
- source_word: אַֽל תַּעֲמֹ֑דוּ
  english_pob_choice: do not stand still
  chosen_spanish: no se queden quietos
  alternatives_spanish:
  - no se detengan
  - no se queden de pie
  - no permanezcan
  lexicon: HALOT
  rationale: La prohibición apunta a no quedarse ni demorarse. «No se queden quietos» expresa bien la fuerza práctica del hebreo sin sonar rígido.
- source_word: זִכְר֤וּ
  english_pob_choice: remember
  chosen_spanish: Recuerden
  alternatives_spanish:
  - Tengan presente
  - Hagan memoria de
  lexicon: HALOT
  rationale: El imperativo conserva tanto la memoria mental como la resonancia de fidelidad del pacto. «Recuerden» es la opción más directa y clara.
- source_word: מֵֽ/רָחוֹק֙
  english_pob_choice: from far away
  chosen_spanish: desde lejos
  alternatives_spanish:
  - desde afar
  - a distancia
  lexicon: HALOT
  rationale: La preposición y el adverbio señalan distancia. «Desde lejos» es idiomático en español y mantiene el valor locativo del hebreo.
- source_word: אֶת יְהוָ֔ה
  english_pob_choice: the LORD
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yavé
  - al SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: El texto hebreo usa el Tetragrámaton directamente. En la norma española del proyecto se conserva el nombre divino como «Yahvé»; aquí con la preposición de objeto directo exigida por el verbo «recuerden».
- source_word: וִ/ירֽוּשָׁלִַ֖ם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Yerushalén
  lexicon: HALOT
  rationale: Nombre propio estándar en español bíblico y contemporáneo. Se mantiene la forma ampliamente reconocible y auditable.
- source_word: תַּעֲלֶ֥ה עַל לְבַבְ/כֶֽם
  english_pob_choice: let Jerusalem come upon your heart
  chosen_spanish: que Jerusalén suba a su corazón
  alternatives_spanish:
  - que Jerusalén venga a su mente
  - que Jerusalén llegue a su corazón
  - tengan a Jerusalén en el corazón
  lexicon: HALOT
  rationale: El hebreo dice literalmente «suba sobre vuestro corazón», una imagen idiomática de recuerdo interior y preocupación afectiva. «Que Jerusalén suba a su corazón» preserva la metáfora sin perder inteligibilidad.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El verso contiene el Tetragrámaton; el proyecto español pide «Yahvé» como forma principal, evitando la sustitución por un título que oculte el nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Función de «Jerusalén suba a su corazón»
  english_pob_reading: let Jerusalem come upon your heart
  chosen_spanish_reading: que Jerusalén suba a su corazón
  alternative_spanish_readings:
  - que Jerusalén venga a su mente
  - tengan a Jerusalén en el corazón
  rationale: Se conserva la metáfora hebrea del ascenso al corazón, entendida como memoria viva y carga interior. No se suaviza del todo a una paráfrasis para no perder la imagen del original.
  doctrine_reference: Jeremías 51:50; idiomática hebrea de interiorización
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail, que movió «from far away» para modificar con más naturalidad a «remember the LORD». En español se refleja esa relación colocando «desde lejos» con «Recuerden a Yahvé», manteniendo además el paralelismo con «que Jerusalén suba a su corazón».
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente con el estándar del proyecto para יְהוָה.
  - Se mantiene el imperativo plural con tratamiento de segunda persona plural formal-neutral («Ustedes... vayan... Recuerden...») para reflejar el vocativo colectivo.
  - «Espada» conserva la imagen bélica concreta del hebreo.
  - La construcción final mantiene la metáfora del corazón sin convertirla por completo en una explicación interpretativa.
