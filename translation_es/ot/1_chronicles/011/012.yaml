revisions:
- from: Después de él estaba Eleazar, hijo de Dodo el ahohita[a]; él estaba entre los tres guerreros poderosos.
  to: Después de él fue Eleazar, hijo de Dodo el ahohita[a]; él estaba entre los tres valientes.
  rationale: Se ajusta la redacción para que suene más natural y digna en español bíblico narrativo, y se sustituye 'guerreros poderosos' por 'valientes' para preservar mejor el matiz semitécnico de הַגִּבֹּרִים en Crónicas. La nota se mantiene y se adapta a la nueva formulación.
  reviewer_model: gpt-5.4
