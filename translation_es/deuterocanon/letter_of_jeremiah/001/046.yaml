translation:
  language: es
  text: Y los que los hicieron no vivirán mucho tiempo;
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: αὐτοί
  english_pob_choice: those
  chosen_spanish: los que
  alternatives_spanish:
  - aquellos
  - ellos mismos
  - los mismos
  lexicon: BDAG
  rationale: El griego pone énfasis en los fabricantes mismos dentro del sintagma participial. En español, 'los que' reproduce naturalmente ese valor referencial sin sobrecargar la frase con repetición o artificio.
- source_word: τε
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - también
  - asimismo
  lexicon: BDAG
  rationale: La partícula enlaza esta afirmación con el contexto inmediato. 'Y' es la coordinación más directa y natural en español.
- source_word: οἱ κατασκευάσαντες
  english_pob_choice: those who made
  chosen_spanish: los que hicieron
  alternatives_spanish:
  - los que fabricaron
  - los que construyeron
  - sus hacedores
  lexicon: BDAG
  rationale: El participio aoristo se refiere a los artesanos de los ídolos. 'Hicieron' es amplio y fiel; evita restringir innecesariamente el tipo de producción y conserva la naturalidad del español.
- source_word: αὐτά
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  - estas cosas
  - aquellos
  lexicon: BDAG
  rationale: El pronombre retoma los ídolos mencionados en el contexto. En español, el clítico 'los' resulta idiomático y mantiene la referencia anafórica.
- source_word: οὐ μὴ γένωνται
  english_pob_choice: will by no means live
  chosen_spanish: de ninguna manera vivirán
  alternatives_spanish:
  - no vivirán en absoluto
  - ciertamente no vivirán
  - de ningún modo serán
  lexicon: BDAG
  rationale: La negación enfática οὐ μή con subjuntivo exige una negación fuerte. 'De ninguna manera' comunica bien esa fuerza retórica y 'vivirán' conserva el sentido de duración vital del contexto.
- source_word: πολυχρόνιοι
  english_pob_choice: live long
  chosen_spanish: por mucho tiempo
  alternatives_spanish:
  - largamente
  - mucho tiempo
  - una larga vida
  lexicon: LSJ
  rationale: El adjetivo predicativo significa 'de larga duración' o 'longevos'. En español, 'por mucho tiempo' expresa la duración de la vida con naturalidad, aunque la imagen sea algo menos literal que 'longevos'.
translation_notes:
  revision_awareness: 'El texto griego y el auditable inglés coinciden sustancialmente: la única cuestión relevante es cómo expresar en español la negación enfática οὐ μή junto con el adjetivo predicativo πολυχρόνιοι sin sonar forzado. No se detectaron revisiones aplicadas en el pasaje fuente.'
  spanish_consistency_notes:
  - Se mantiene un español sobrio y publicación-readable, evitando calcos como 'no por mucho tiempo sean'.
  - '''Los que hicieron'' conserva la referencia a los artesanos/constructores de los ídolos sin introducir vocabulario doctrinal ajeno al contexto.'
  - Se evita 'SEÑOR' o terminología divinizante porque este versículo no contiene el nombre divino ni una cita directa de κύριος.
