    rationale: La nota explica el doblete hebreo porque la redacción española lo volvió problemático. Si se revisa el texto a una formulación idiomática, esa nota deja de ser necesaria.
  - severity: low
    issue: «pesos» menos preciso que «pesas»
    rationale: Para las piedras de pesar de una bolsa comercial, «pesas» comunica mejor el referente instrumental en español bíblico actual.
