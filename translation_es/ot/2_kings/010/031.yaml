translation:
  language: es
  text: Pero Jehú no tuvo cuidado de andar en la ley de Yahvé[a], el Dios de Israel, con todo su corazón. No se apartó de los pecados de Jeroboam[b], con los cuales hizo pecar a Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no se cuidó de andar en la ley de Yahvé». El hebreo puede enfatizar una observancia atenta y diligente.'
    reason: lexical_alternative
  - marker: b
    text: Es decir, los pecados cultuales asociados con el sistema idólatra de Jeroboam, una fórmula recurrente en Reyes.
    reason: cross_reference
lexical_decisions:
- source_word: וְיֵהוּא
  english_pob_choice: But Jehu
  chosen_spanish: Pero Jehú
  alternatives_spanish:
  - Y Jehú
  - Ahora bien, Jehú
  lexicon: HALOT
  rationale: El וְ inicial funciona aquí con matiz adversativo en el contexto, porque contrasta el celo previo de Jehú con su falla en obediencia al pacto. «Pero» conserva ese giro discursivo de manera natural en español.
- source_word: שָׁמַר לָלֶכֶת
  english_pob_choice: was not careful to walk
  chosen_spanish: no tuvo cuidado de andar
  alternatives_spanish:
  - no guardó el andar
  - no se cuidó de andar
  lexicon: HALOT
  rationale: La construcción hebrea expresa atención diligente a una acción, no solo cumplimiento externo. «No tuvo cuidado de andar» refleja la falta de obediencia atenta sin perder el matiz de observancia cuidadosa.
- source_word: בְּתוֹרַת
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la instrucción
  - la enseñanza
  lexicon: HALOT
  rationale: En esta fórmula pactal («andar en la ley de Yahvé») el sentido legal-covenantal es prominente. «Ley» es la opción más idiomática y fiel en español aquí.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: transliteración del nombre divino en lugar de una sustitución. «Yahvé» preserva el nombre propio revelado a Israel.'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  - Dios, el Dios de Israel
  lexicon: HALOT
  rationale: La expresión es directa y estable en español. «El Dios de Israel» conserva el vínculo pactual sin añadir explicaciones que el hebreo no exige.
- source_word: בְּכָל לְבָבוֹ
  english_pob_choice: with all his heart
  chosen_spanish: con todo su corazón
  alternatives_spanish:
  - con todo su ser
  - de todo corazón
  lexicon: HALOT
  rationale: La frase hebrea es un modismo de devoción total interior. «Con todo su corazón» es natural en español y mantiene la fuerza del compromiso integral.
- source_word: סָר
  english_pob_choice: turn away
  chosen_spanish: se apartó
  alternatives_spanish:
  - se desvió
  - se volvió atrás
  lexicon: HALOT
  rationale: El verbo indica apartarse de una senda o norma. «Se apartó» reproduce bien la imagen moral del hebreo y funciona con claridad en español.
- source_word: חַטֹּאות
  english_pob_choice: sins
  chosen_spanish: los pecados
  alternatives_spanish:
  - las culpas
  - las transgresiones
  lexicon: HALOT
  rationale: El plural hebreo apunta a las faltas cultuales asociadas con Jeroboam. «Pecados» es la equivalencia más directa y reconocible, sin suavizar el reproche.
- source_word: הֶחֱטִיא אֶת יִשְׂרָאֵל
  english_pob_choice: caused Israel to sin
  chosen_spanish: hizo pecar a Israel
  alternatives_spanish:
  - llevó a Israel a pecar
  - causó que Israel pecara
  lexicon: HALOT
  rationale: El hifil es causativo. «Hizo pecar a Israel» preserva la causalidad de forma compacta y natural en español.
theological_decisions:
- issue: Evaluación de Jehú como rey del pacto
  english_pob_reading: The verse presents Jehu as failing in wholehearted obedience to the LORD despite earlier reforms.
  chosen_spanish_reading: El versículo presenta a Jehú como alguien que falló en la obediencia total a Yahvé, pese a sus reformas anteriores.
  alternative_spanish_readings:
  - El versículo solo critica una reforma religiosa incompleta.
  - El versículo se limita a una evaluación política, no espiritual.
  rationale: La mención explícita de la ley de Yahvé, del corazón entero y de los pecados de Jeroboam sitúa la evaluación en el plano de la fidelidad al pacto. La traducción conserva esa tensión sin exagerarla más allá del texto.
  doctrine_reference: Mantener la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: 'La redacción sigue el último estado revisado del POB inglés: se mantuvo «with which he caused Israel to sin» en forma causal directa en español («con los cuales hizo pecar a Israel»), y no se añadieron otros cambios sustantivos. También se preservó el valor adversativo de la conjunción inicial y la lectura covenantal de «law of Yahweh».'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino según la política del proyecto.
  - Se conservó la imagen de «andar» para la conducta moral, sin sustituirla por una paráfrasis abstracta.
  - «Pecados de Jeroboam» se mantiene como fórmula histórica y teológica reconocible.
  - La puntuación divide claramente las dos cláusulas evaluativas, como en el inglés POB.
