translation:
  language: es
  text: aunque no hay violencia en mis manos[a] y mi oración es pura[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'pues no hay violencia en mis manos'. La preposición hebrea puede entenderse de más de una manera; el texto principal adopta un sentido concesivo por el contexto.
    reason: lexical_alternative
  - marker: b
    text: O 'limpia' en lugar de 'pura'.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל
  english_pob_choice: although
  chosen_spanish: aunque
  alternatives_spanish:
  - porque
  - por
  - sobre
  - a pesar de
  lexicon: HALOT
  rationale: En este contexto introductorio concesivo, aunque expresa mejor la relación entre la afirmación de Job y su sufrimiento que un calco preposicional. Conserva la fuerza del hebreo sin volver la frase antinatural en español.
- source_word: לֹא
  english_pob_choice: 'no'
  chosen_spanish: 'no'
  alternatives_spanish:
  - not
  lexicon: HALOT
  rationale: La negación simple corresponde al valor normal del hebreo aquí y funciona naturalmente con la cláusula nominal en español.
- source_word: חָמָס
  english_pob_choice: violence
  chosen_spanish: violencia
  alternatives_spanish:
  - injusticia
  - maldad
  - agravio
  lexicon: HALOT
  rationale: '"Violencia" conserva el sentido más directo y reconocido del sustantivo, y mantiene la fuerza moral del reclamo de Job sin hacerlo más abstracto de lo que exige el texto.'
- source_word: בְּכַפַּי
  english_pob_choice: in my hands
  chosen_spanish: en mis manos
  alternatives_spanish:
  - sobre mis manos
  - por mi mano
  lexicon: HALOT
  rationale: La imagen concreta de las "manos" se preserva en español y comunica la idea de culpa o acción realizada por uno mismo, tal como en el hebreo.
- source_word: וּתְפִלָּתִי
  english_pob_choice: and my prayer
  chosen_spanish: y mi oración
  alternatives_spanish:
  - y mi plegaria
  - y mi ruego
  lexicon: HALOT
  rationale: '"Oración" es el equivalente más directo y estable para תְּפִלָּה, y encaja con el tono reverente del versículo.'
- source_word: זַכָּה
  english_pob_choice: pure
  chosen_spanish: pura
  alternatives_spanish:
  - limpia
  - sin mancha
  - inocente
  lexicon: HALOT
  rationale: '"Pura" conserva el valor de limpieza moral/cultual del adjetivo y suena natural con "oración" en español, tal como en la lectura inglesa auditada.'
theological_decisions:
- issue: Alcance de la protesta de inocencia de Job
  english_pob_reading: 'Render as a limited protest of innocence in this matter: ''there is no violence in my hands, and my prayer is pure.'''
  chosen_spanish_reading: 'Traducirlo como una protesta limitada de inocencia en este asunto: "no hay violencia en mis manos, y mi oración es pura."'
  alternative_spanish_readings:
  - una afirmación absoluta de impecabilidad moral
  - una pureza solo ritual de la oración
  rationale: El versículo defiende a Job contra la acusación de conducta violenta como causa de su sufrimiento; no obliga a una doctrina de perfección moral absoluta. La versión española debe preservar esa tensión teológica sin resolverla artificialmente.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior suprimiendo notas al pie no ancladas en el texto. La redacción actual mantiene el sentido concesivo indicado por la auditoría inglesa sin requerir marcadores de nota.
  spanish_consistency_notes:
  - Se eligió "aunque" para reflejar el valor concesivo de עַל según el audit trail.
  - Se mantuvo "oración" y "pura" como equivalentes naturales y fieles a תְפִלָּתִי y זַכָּה.
  - No se introdujeron notas al pie porque el texto español no contiene marcadores anclados y el encargo exige que no haya notas sueltas.
