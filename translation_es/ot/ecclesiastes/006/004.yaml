translation:
  language: es
  text: Porque en vanidad[a] viene, y en la oscuridad va, y en la oscuridad su nombre queda cubierto[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘futilidad’ o ‘como vapor’. El hebreo הֶבֶל es un término clave en Eclesiastés, a menudo con la idea de transitoriedad, vaciedad o inutilidad.
    reason: lexical_alternative
  - marker: b
    text: ‘Su nombre queda cubierto’ puede significar que su identidad o su memoria quedan en la oscuridad.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación del contexto anterior con un conector causal/explanatorio natural en español. 'Porque' conserva mejor la fuerza de explicación que 'pues' en este giro.
- source_word: הֶבֶל
  english_pob_choice: vanity
  chosen_spanish: vanidad
  alternatives_spanish:
  - futilidad
  - vapor
  - aliento
  lexicon: HALOT
  rationale: Se mantiene el término tradicional de Eclesiastés para conservar la resonancia temática del hebreo הֶבֶל. 'Vanidad' comunica bien el campo de transitoriedad y vaciedad que la POB documenta.
- source_word: בָּא
  english_pob_choice: comes
  chosen_spanish: viene
  alternatives_spanish:
  - llega
  - entra
  lexicon: HALOT
  rationale: El perfecto hebreo funciona de manera gnómica; en español, 'viene' mantiene la lectura proverbial y el paralelismo con 'va' sin forzar una referencia temporal puntual.
- source_word: חֹשֶׁךְ
  english_pob_choice: darkness
  chosen_spanish: oscuridad
  alternatives_spanish:
  - tinieblas
  - sombra
  - gloom
  lexicon: HALOT
  rationale: '''Oscuridad'' es una equivalencia clara y digna en español. Aunque ''tinieblas'' es posible, ''oscuridad'' evita un registro más arcaizante y conserva el sentido literal/metafórico de ocultamiento.'
- source_word: יֵלֵךְ
  english_pob_choice: goes
  chosen_spanish: va
  alternatives_spanish:
  - se va
  - camina
  lexicon: HALOT
  rationale: '''Va'' reproduce el hebraísmo de salida o alejamiento sin explicitar ''muerte'' más allá de lo que el texto dice.'
- source_word: שְׁמוֹ
  english_pob_choice: his name
  chosen_spanish: su nombre
  alternatives_spanish:
  - su memoria
  - su identidad
  lexicon: HALOT
  rationale: La traducción literal preserva el término 'nombre', que en contexto puede implicar identidad o recuerdo, pero no debe sustituirse por una interpretación explicativa en el texto principal.
- source_word: יְכֻסֶּה
  english_pob_choice: is covered
  chosen_spanish: se cubre
  alternatives_spanish:
  - es cubierto
  - se oculta
  - queda cubierto
  lexicon: HALOT
  rationale: El pasivo hebreo se vierte con una pasiva refleja natural en español. 'Se cubre' conserva la imagen de ocultamiento sin sobretraducirla como 'se olvida' o 'se pierde'.
theological_decisions:
- issue: Sentido de הֶבֶל en Eclesiastés
  english_pob_reading: vanity, with footnote alternatives including futility and vapor
  chosen_spanish_reading: vanidad, con nota de alternativas léxicas
  alternative_spanish_readings:
  - futilidad
  - vapor
  - aliento
  rationale: No se elimina la tensión semántica del término clave. 'Vanidad' mantiene la tradición literaria de Eclesiastés, mientras la nota preserva los matices de transitoriedad, vaciedad y fugacidad señalados por el audit trail.
  doctrine_reference: Eclesiastés 1:2; 12:8
- issue: '''His name is covered'' as obscurity of identity/memory'
  english_pob_reading: his name is covered may mean that his identity or memory remains in obscurity
  chosen_spanish_reading: su nombre se cubre, con nota sobre identidad o memoria en oscuridad
  alternative_spanish_readings:
  - su memoria queda oscurecida
  - su identidad permanece en obscuridad
  rationale: La frase se mantiene literal en el cuerpo del texto para no borrar la imagen hebrea. La nota aclara la posible implicación de identidad o memoria, como hace la POB inglesa, sin convertir la metáfora en una explicación demasiado interpretativa.
  doctrine_reference: Ecclesiastés 6:4; cf. Salmo 109:13
translation_notes:
  revision_awareness: El pasaje muestra acuerdo general alto con la auditoría inglesa. La principal decisión es conservar la carga tradicional de הֶבֶל mediante 'vanidad', mientras se explicitan en nota los matices alternativos. También se mantiene la imagen literal de 'nombre' y 'cubrir' para no sustituir el hebreo con una interpretación más explícita.
  spanish_consistency_notes:
  - Se usó 'oscuridad' de forma consistente para חֹשֶׁךְ en ambas ocurrencias.
  - Se evitó 'SEÑOR' o equivalentes de mascaramiento porque el versículo no contiene el Tetragrámaton ni κύριος.
  - La puntuación refleja el paralelismo hebreo y el tono proverbial del texto.
  - Se eligió una sintaxis española natural sin perder el orden semántico del hebreo.
