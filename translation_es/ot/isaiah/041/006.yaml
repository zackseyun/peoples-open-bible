translation:
  language: es
  text: 'Cada hombre ayuda a su prójimo[a], y dice a su hermano[b]: «¡Sé fuerte!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su compañero» o «su amigo» para «su prójimo».
    reason: lexical_alternative
  - marker: b
    text: «Hermano» también puede llevar aquí el sentido más amplio de miembro de la comunidad o pariente.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ
  english_pob_choice: Each man
  chosen_spanish: Cada hombre
  alternatives_spanish:
  - Un hombre
  - Cada uno
  lexicon: HALOT
  rationale: El hebreo usa singular distributivo con valor colectivo. «Cada hombre» conserva ese matiz sin borrar el rasgo masculino/genérico del término original.
- source_word: רֵעֵהוּ
  english_pob_choice: his neighbor
  chosen_spanish: su prójimo
  alternatives_spanish:
  - su compañero
  - su amigo
  lexicon: HALOT
  rationale: רֵעַ puede abarcar compañero, asociado o prójimo. «Prójimo» suena natural en español y mantiene la relación interpersonal sin imponer la carga afectiva de «amigo».
- source_word: יַעְזֹרוּ
  english_pob_choice: helps
  chosen_spanish: ayuda
  alternatives_spanish:
  - ayudará
  - sale en ayuda de
  - socorre
  lexicon: HALOT
  rationale: El imperfecto hebreo presenta la acción de manera general o vívida; el presente español funciona bien en ese valor gnómico/descriptivo. «Ayuda» conserva la sencillez del verbo hebreo.
- source_word: אָחִיו
  english_pob_choice: his brother
  chosen_spanish: su hermano
  alternatives_spanish:
  - su pariente
  - su miembro de familia
  lexicon: HALOT
  rationale: «Hermano» es la correspondencia directa y mantiene el paralelismo con «prójimo». La ampliación a «pariente» quedaría para una nota, no para el texto principal.
- source_word: יֹאמַר
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - dirá
  - va diciendo
  lexicon: HALOT
  rationale: Como en el verbo anterior, el imperfecto hebreo se vierte mejor con presente vivo en español dentro de esta escena retórica.
- source_word: חֲזָק
  english_pob_choice: Be strong!
  chosen_spanish: ¡Esfuérzate!
  alternatives_spanish:
  - ¡Sé fuerte!
  - ¡Toma ánimo!
  - ¡Ten valor!
  lexicon: HALOT
  rationale: חזק expresa fortaleza, firmeza y resistencia. «¡Esfuérzate!» comunica un llamado a afirmar la fuerza/ánimo con un matiz muy idiomático en español, sin perder la fuerza exhortativa.
translation_notes:
  revision_awareness: El texto hebreo y el consenso del POB en inglés muestran acuerdo alto y sin revisiones aplicadas; la versión española sigue de cerca ese análisis léxico, adaptándolo a un español natural y digno.
  spanish_consistency_notes:
  - Se mantiene el paralelismo semántico «prójimo / hermano», reflejando el doble ámbito relacional del hebreo.
  - Se usa presente gnómico en español para los imperfectos hebreos, siguiendo la decisión auditada en inglés.
  - Se evita «SEÑOR» o terminología ajena al verso, pues no aparece ningún nombre divino aquí.
