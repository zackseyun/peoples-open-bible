translation:
  language: es
  text: 'Y dijo: «En verdad les digo que ningún profeta es aceptado en su propio pueblo[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en su lugar de origen» o «en su patria». El griego πατρίς puede referirse al pueblo natal, a la región de origen o a la patria; aquí «pueblo» encaja mejor con el contexto de Nazaret.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν δέ
  english_pob_choice: And he said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Pero dijo
  - Entonces dijo
  lexicon: BDAG
  rationale: δέ funciona aquí como conector suave del discurso narrativo. En español, «Y dijo» conserva la fluidez sin cargar un contraste que el griego no exige.
- source_word: Ἀμὴν
  english_pob_choice: Truly
  chosen_spanish: En verdad
  alternatives_spanish:
  - Amén
  - Ciertamente
  - Verdaderamente
  lexicon: BDAG
  rationale: En el habla de Jesús, ἀμήν introduce una afirmación solemne. «En verdad» comunica bien esa fuerza en español moderno y evita la transliteración innecesaria de «Amén» en esta posición discursiva.
- source_word: λέγω ὑμῖν
  english_pob_choice: I tell you
  chosen_spanish: les digo
  alternatives_spanish:
  - les digo a ustedes
  - les aseguro
  lexicon: BDAG
  rationale: La fórmula directa de Jesús se expresa de modo natural en español con «les digo», manteniendo el destinatario plural y la solemnidad de la declaración.
- source_word: οὐδεὶς προφήτης
  english_pob_choice: no prophet
  chosen_spanish: ningún profeta
  alternatives_spanish:
  - no hay profeta
  - ningún solo profeta
  lexicon: BDAG
  rationale: La construcción negativa del griego se vierte de manera idiomática con «ningún profeta», que conserva con claridad la negación absoluta.
- source_word: δεκτός
  english_pob_choice: accepted
  chosen_spanish: aceptado
  alternatives_spanish:
  - bien recibido
  - recibido con agrado
  - bien acogido
  lexicon: BDAG
  rationale: «Aceptado» reproduce bien el valor de δεκτός como alguien recibido favorablemente. Aunque «bien recibido» o «bien acogido» también son posibles, «aceptado» mantiene la concisión y el peso evaluativo del predicado.
- source_word: ἐν τῇ πατρίδι αὐτοῦ
  english_pob_choice: in his hometown
  chosen_spanish: en su propia tierra
  alternatives_spanish:
  - en su pueblo
  - en su lugar de origen
  - en su patria
  lexicon: BDAG
  rationale: πατρίς puede abarcar pueblo natal, región de origen o patria. Dado el contexto inmediato de Nazaret, «su propia tierra» permite una lectura amplia y natural en español, sin limitar prematuramente el matiz geográfico.
translation_notes:
  revision_awareness: El pasaje revisado no muestra cambios textuales o de sentido respecto del estado auditado más reciente; se conserva la lectura establecida con una sola decisión contextual sobre πατρίς.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «en verdad» como equivalente solemne de Ἀμήν, no «Amén» como fórmula litúrgica en posición inicial.
  - Se conserva el orden directo y breve del dicho para reflejar el tono proverbial de la declaración.
