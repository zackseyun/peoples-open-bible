translation:
  language: es
  text: Alábenlo[a] los cielos y la tierra, los mares y todo lo que se mueve[b] en ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Que lo alaben»; el verbo hebreo puede oírse como un llamado exhortativo. Algunos lo entienden de modo más predictivo: «lo alabarán».'
    reason: alternative_reading
  - marker: b
    text: 'O: «todo lo que se arrastra en ellos». El término hebreo puede referirse a criaturas que se mueven, se arrastran o pululan.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהַלְלוּהוּ
  english_pob_choice: Let ... praise him
  chosen_spanish: Alaben ... a Yahvé
  alternatives_spanish:
  - Que ... alaben a Yahvé
  - Alaben a él
  lexicon: HALOT
  rationale: El piel imperfecto plural con objeto de 3ª masculina singular tiene fuerza exhortativa/jusiva en este contexto poético. En español, «Alaben» expresa bien la convocatoria a la alabanza; se mantiene el objeto explícito con «a Yahvé» porque el texto hebreo tiene un referente divino explícito y la práctica POB evita ocultarlo.
- source_word: שָׁמַיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - el cielo
  - los cielos
  lexicon: HALOT
  rationale: Aunque el sustantivo es morfológicamente plural, en español la forma plural «los cielos» conserva el valor colectivo y la paralelía poética con «la tierra». «El cielo» sería más idiomático en singular, pero perdería mejor la marca de pluralidad del hebreo.
- source_word: וָאָרֶץ
  english_pob_choice: and earth
  chosen_spanish: y la tierra
  alternatives_spanish:
  - y tierra
  - y el mundo
  lexicon: HALOT
  rationale: «La tierra» reproduce el miembro del merismo creado y es natural en español. «Mundo» añadiría una abstracción no exigida por el hebreo; «tierra» mantiene la referencia cosmológica de la pareja con «los cielos».
- source_word: יַמִּים
  english_pob_choice: the seas
  chosen_spanish: los mares
  alternatives_spanish:
  - los mares
  - los océanos
  lexicon: HALOT
  rationale: El plural hebreo permite «mares» con el mismo valor general. Se prefiere «mares» a «océanos» porque este último estrecha y moderniza de forma innecesaria el campo semántico; «mares» conserva la amplitud poética.
- source_word: וְכָל
  english_pob_choice: and all / and everything
  chosen_spanish: y todo lo que
  alternatives_spanish:
  - y todo
  - y cada cosa que
  lexicon: HALOT
  rationale: La combinación con el participio siguiente forma una expresión totalizante. «Todo lo que» suena natural en español y prepara bien la caracterización siguiente sin endurecerla en una fórmula demasiado abstracta.
- source_word: רֹמֵשׂ
  english_pob_choice: that moves
  chosen_spanish: se mueve
  alternatives_spanish:
  - se arrastra
  - repta
  - se desplaza
  lexicon: HALOT
  rationale: El participio puede abarcar criaturas que se mueven o reptan; en el contexto marino, «se mueve» es lo bastante amplio para no estrechar indebidamente el referente. «Se arrastra» sería más literal en algunos usos, pero aquí resultaría demasiado restrictivo y potencialmente extraño.
- source_word: בָּם
  english_pob_choice: in them
  chosen_spanish: en ellos
  alternatives_spanish:
  - en ellos
  - en esos mares
  lexicon: HALOT
  rationale: El sufijo pronominal plural masculino se refiere naturalmente a «los mares». «En ellos» preserva la relación pronominal del hebreo y evita repetir innecesariamente el sustantivo.
theological_decisions:
- issue: Imperativo/jusivo versus futuro predictivo
  english_pob_reading: 'The Hebrew imperfect/jussive force favors a summons: creation is called to praise him.'
  chosen_spanish_reading: 'La frase se traduce como una convocatoria: «Alaben...»'
  alternative_spanish_readings:
  - «Alabarán...»
  - «Que alaben...»
  rationale: El hebreo permite un matiz exhortativo; el español debe conservar esa tensión sin resolverla en una simple predicción. «Alaben» comunica bien el llamado litúrgico-poético y evita convertir el verso en mera afirmación futura.
  doctrine_reference: Translation philosophy §3 (preserve tension rather than resolve it)
- issue: Destino del referente divino
  english_pob_reading: The English POB retains the explicit object 'him'; the broader Psalm context refers to Yahweh.
  chosen_spanish_reading: Se explicita el destinatario como «a Yahvé».
  alternative_spanish_readings:
  - a él
  - al Señor
  rationale: Dado el contexto del Salmo y la política terminológica del proyecto, «Yahvé» evita el enmascaramiento con «Señor» y hace auditable el referente. «A él» sería demasiado vago para una lectura pública; «al Señor» no sigue el estándar del proyecto.
  doctrine_reference: 'Project terminology: יהוה / YHWH -> Yahvé'
- issue: Merismo cósmico y criaturas marinas
  english_pob_reading: A cosmic summons addressed to heaven, earth, seas, and all creatures in them.
  chosen_spanish_reading: Un llamado cósmico a los cielos, la tierra, los mares y todo lo que se mueve en ellos.
  alternative_spanish_readings:
  - Una afirmación de que la creación ya lo alaba
  - Un llamado solo a los seres vivos marinos
  rationale: La lista hebrea abarca la creación en su amplitud; el español debe preservar ese alcance sin reducirlo al ámbito marino ni convertirlo en una simple declaración descriptiva. La formulación escogida mantiene el tono poético y el alcance total del merismo.
  doctrine_reference: Translation philosophy §3 (preserve tension rather than resolve it)
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la lectura POB actualizada del inglés: mantiene el valor exhortativo del verbo, conserva la lista cósmica con artículos naturales en español y traduce el participio hebreo de manera amplia para no restringir indebidamente el campo semántico. También toma en cuenta la revisión inglesa que prefirió formas más formales con artículos definidos y «all that moves in them».'
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para יהוה.
  - Se conserva el plural poético «los cielos» para reflejar el hebreo y la simetría con «la tierra».
  - «Los mares» y «en ellos» mantienen el encadenamiento pronominal y la referencia colectiva del original.
  - La nota a pie de página marca la alternativa exhortativa/predictiva que el hebreo admite y que el audit trail inglés documenta.
