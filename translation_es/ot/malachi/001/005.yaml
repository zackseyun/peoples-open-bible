translation:
  language: es
  text: 'Sus propios ojos verán, y ustedes mismos dirán: «Grande es Yahvé[a] más allá del límite de Israel».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Yahvé es grande más allá del límite de Israel»; o: «Sea engrandecido Yahvé más allá del límite de Israel». El hebreo puede leerse como una exclamación o como una afirmación.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְעֵינֵיכֶם
  english_pob_choice: Your own eyes
  chosen_spanish: Tus propios ojos
  alternatives_spanish:
  - tus ojos
  lexicon: HALOT
  rationale: El hebreo dice literalmente «y sus ojos», con fuerza enfática por el sufijo pronominal. «Tus propios ojos» conserva la concreción y la intensidad sin perder naturalidad en español.
- source_word: תִּרְאֶינָה
  english_pob_choice: will see
  chosen_spanish: verán
  alternatives_spanish:
  - verán esto
  - verán
  lexicon: HALOT
  rationale: El imperfecto expresa acción futura; «verán» es el futuro natural en español y evita añadir un objeto no explícito en el hebreo.
- source_word: וְאַתֶּם
  english_pob_choice: and you yourselves
  chosen_spanish: y ustedes mismos
  alternatives_spanish:
  - y ustedes
  - entonces ustedes
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis. «Ustedes mismos» reproduce ese valor enfático mejor que un simple «ustedes».
- source_word: תֹּאמְרוּ
  english_pob_choice: will say
  chosen_spanish: dirán
  alternatives_spanish:
  - dirán ustedes
  - dirán que
  lexicon: HALOT
  rationale: El futuro simple comunica adecuadamente la secuencia del evento y mantiene el tono directo del hebreo.
- source_word: יִגְדַּל
  english_pob_choice: Great is Yahweh / The LORD is great
  chosen_spanish: Grande es Yahvé
  alternatives_spanish:
  - Sea engrandecido Yahvé
  - Yahvé es grande
  lexicon: HALOT
  rationale: El hebreo puede leerse como una proclamación/aclamación. «Grande es Yahvé» conserva esa posibilidad y suena natural en español, sin resolver la tensión verbal hacia una sola paráfrasis.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino en forma transliterada, conforme al criterio del proyecto, en lugar de sustituirlo por un título.
- source_word: מֵעַל
  english_pob_choice: beyond
  chosen_spanish: más allá de
  alternatives_spanish:
  - sobre
  - por encima de
  lexicon: HALOT
  rationale: En la expresión espacial con גבול, «más allá de» comunica con claridad la idea de extensión fuera del territorio de Israel.
- source_word: לִגְבוּל יִשְׂרָאֵל
  english_pob_choice: the border of Israel
  chosen_spanish: el límite de Israel
  alternatives_spanish:
  - la frontera de Israel
  - el borde de Israel
  - los límites de Israel
  lexicon: HALOT
  rationale: «גבול» puede significar borde, límite o frontera. «Límite» reproduce bien el singular hebreo y resulta claro en español contemporáneo.
theological_decisions:
- issue: Force of יִגְדַּל יְהוָה
  english_pob_reading: Great is Yahweh / Great is the LORD beyond the border of Israel
  chosen_spanish_reading: Grande es Yahvé más allá del límite de Israel
  alternative_spanish_readings:
  - Sea engrandecido Yahvé más allá del límite de Israel
  - Yahvé es grande más allá del límite de Israel
  rationale: El hebreo admite lectura de exclamación/proclamación o de afirmación. La redacción española conserva esa tensión sin forzarla a una sola interpretación, y el pie de nota explicita las alternativas.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El Tetragrámaton se preserva como nombre propio, no como sustitución reverencial, para mantener la transparencia del texto fuente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Se respetó la revisión auditada: no se añadió ningún objeto implícito para «verán», y se evitó una paráfrasis que resolviera de manera demasiado explícita la ambigüedad de יִגְדַּל. La nota mantiene las alternativas reconocidas por el POB inglés, pero ancladas correctamente en el texto español.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה de forma consistente con la terminología del proyecto.
  - Se eligió «límite» para גבול por ser singular y natural en español, conservando el sentido espacial.
  - «Ustedes mismos» refleja el énfasis del pronombre independiente hebreo.
  - La puntuación mantiene el paralelismo entre la visión («Tus propios ojos verán») y la proclamación («y ustedes mismos dirán»).
