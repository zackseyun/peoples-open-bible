translation:
  language: es
  text: 'Y se le dio a conocer el asunto, y dijo: «No me muestren sus rostros[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «No me muestren sus rostros», un modismo que significa que no los traigan ante mí.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ ἐγνώσθη αὐτῷ
  english_pob_choice: And the matter became known to him
  chosen_spanish: Y se le dio a conocer
  alternatives_spanish:
  - Y llegó a saberlo
  - Y el asunto le fue dado a conocer
  lexicon: LSJ
  rationale: El aoristo pasivo impersonal de γινώσκω se vierte en español de modo natural con una pasiva refleja/impersonal. «Se le dio a conocer» conserva la pasividad y la idea de que el hecho llegó a su conocimiento, sin volverlo agente.
- source_word: τὸ πρᾶγμα
  english_pob_choice: the matter
  chosen_spanish: el asunto
  alternatives_spanish:
  - la cosa
  - el hecho
  - la cuestión
  lexicon: LSJ
  rationale: πρᾶγμα cubre asunto, situación o cosa. «Asunto» es amplio, sobrio y adecuado al contexto narrativo, manteniendo la referencia general del griego.
- source_word: Μή μοι δείξητε
  english_pob_choice: Do not show me
  chosen_spanish: No me mostréis
  alternatives_spanish:
  - No me lo presentéis
  - No me dejéis ver
  lexicon: LSJ
  rationale: μή con imperativo expresa prohibición. δείκνυμι significa literalmente «mostrar»; «mostréis» preserva esa fuerza directa. Se usa la forma peninsular histórica para reflejar el plural del griego, aunque en muchas regiones se leería «muestren».
- source_word: τὰ πρόσωπα αὐτῶν
  english_pob_choice: their faces
  chosen_spanish: sus rostros
  alternatives_spanish:
  - sus caras
  - sus personas
  - su presencia
  lexicon: LSJ
  rationale: El griego dice literalmente «sus rostros». En español, «rostros» mantiene la concreción sin sonar tan coloquial como «caras». Conserva además el posible valor idiomático del hebraísmo/grecismo de no hacerlos comparecer ante él.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la estructura simple del griego con καὶ repetido: «Y... y...», como reflejó la revisión inglesa al eliminar «when». Se conserva el tono directo de la prohibición y la imagen concreta de «rostros», con una nota para el giro idiomático.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» y otras sustituciones no pertinentes, porque el versículo no contiene el nombre divino.
  - Se mantuvo el orden narrativo sencillo del griego sin añadir nexos interpretativos.
  - «Asunto» y «mostréis» buscan un español claro y fiel al valor lexical del texto fuente.
