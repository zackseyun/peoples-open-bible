translation:
  language: es
  text: 'Y cuando sus hijos les digan[a]: «¿Qué es este servicio para ustedes?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más formalmente: «¿Qué es este servicio a ustedes?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה כִּי
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Y sucederá que cuando
  - Y acontecerá que cuando
  lexicon: HALOT
  rationale: La fórmula hebrea introduce una contingencia temporal futura; en español, «Y cuando» comunica el giro idiomático con naturalidad y sin añadir explicación interpretativa.
- source_word: יֹאמְרוּ
  english_pob_choice: say
  chosen_spanish: les digan
  alternatives_spanish:
  - les digan
  - les hablen
  lexicon: HALOT
  rationale: El verbo básico es «decir»; en español, «les digan» conserva el sentido directo de habla dirigida a los oyentes.
- source_word: אֲלֵיכֶם
  english_pob_choice: to you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - a vosotros
  lexicon: HALOT
  rationale: El sufijo de segunda persona plural se expresa de forma natural en español con el dativo «les», manteniendo el destinatario explícito sin forzar la sintaxis.
- source_word: בְּנֵיכֶם
  english_pob_choice: your sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus hijos
  lexicon: HALOT
  rationale: El hebreo dice literalmente «sus hijos/varones». En español, «hijos» comunica de manera natural la referencia filial; la especificación masculina se conserva en el contexto del plural masculino del hebreo, sin volver la frase pesada. Se deja constancia de la posible lectura más estricta en las notas si se requiere.
- source_word: הָעֲבֹדָה
  english_pob_choice: service
  chosen_spanish: servicio
  alternatives_spanish:
  - rito
  - culto
  - servicio
  lexicon: HALOT
  rationale: עֲבֹדָה puede abarcar servicio, labor o servicio cultual. En el contexto de la Pascua, «servicio» preserva esa amplitud y evita reducirlo prematuramente a «rito» o «culto».
- source_word: הַזֹּאת
  english_pob_choice: this
  chosen_spanish: este
  alternatives_spanish:
  - esta
  - este mismo
  lexicon: HALOT
  rationale: 'El demostrativo concuerda con «servicio» en masculino en español por la forma idiomática de la expresión: «este servicio».'
- source_word: לָכֶם
  english_pob_choice: to you
  chosen_spanish: para ustedes
  alternatives_spanish:
  - a ustedes
  - para vosotros
  lexicon: HALOT
  rationale: La preposición marca referencia/interés respecto de los destinatarios. «Para ustedes» comunica con claridad la función dativa sin sonar rígido.
theological_decisions:
- issue: Referencia al grupo interpelado en plural
  english_pob_reading: your sons say to you
  chosen_spanish_reading: sus hijos les digan
  alternative_spanish_readings:
  - sus hijos digan a ustedes
  - sus hijos les pregunten
  rationale: Se mantiene el plural y la relación intergeneracional del pasaje, sin neutralizar la referencia masculina del hebreo ni convertir el habla en una pregunta explícita que el texto no formula con el verbo principal.
  doctrine_reference: Éxodo 12:26; transmisión intergeneracional de la Pascua
translation_notes:
  revision_awareness: La revisión inglesa reciente volvió de una paráfrasis interpretativa («What does this service mean to you?») a una forma más literal («What is this service to you?»). La versión española sigue esa preferencia por la literalidad controlada, evitando expandir el sentido a «qué significa» y manteniendo la pregunta directa del hebreo.
  spanish_consistency_notes:
  - Se conserva el registro bíblico sin arcaísmos innecesarios.
  - «Servicio» se mantiene como equivalente de עֲבֹדָה para no estrechar el sentido cultual.
  - El demostrativo «este» acompaña naturalmente a «servicio» en español.
  - La nota a pie de página ofrece la alternativa formal sin duplicar el contenido del texto principal.
