  to: 'David dijo a Aquis[a]: «Entonces sabrás lo que hará tu siervo». Y Aquis dijo a David: «Muy bien[b], te pondré por guardián de mi cabeza todos tus días».'
  rationale: Se corrige עַבְדֶּךָ a «tu siervo» porque aquí funciona como fórmula de deferencia cortesana, conforme al rationale del POB inglés. Se ajusta כָּל הַיָּמִים a «todos tus días» para expresar duración continua, no mera frecuencia diaria. Se mantiene la literalidad de «guardián de mi cabeza» con nota explicativa, y se afina la nota [a] para describir correctamente la ambigüedad pragmática de la frase de David.
