  glossary_alignment: 'No hay conflictos con la terminología troncal del proyecto. Los términos clave están bien resueltos: ''hijos de'', ''provincia'', ''cautiverio de los exiliados'', ''Nabucodonosor'', ''Jerusalén'', ''Judá''. No hay cuestiones teológicas especiales en este versículo.'
