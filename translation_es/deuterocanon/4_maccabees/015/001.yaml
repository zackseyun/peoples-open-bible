revisions:
- from: ¡Oh, razonamiento[a], tirano de las pasiones, más anhelado que los hijos, y la piedad[b] para una madre que los hijos!
  to: ¡Oh, razón[a], tirana sobre las pasiones, más anhelada que los hijos, y la devoción a Dios[b] para una madre que los hijos!
  rationale: Se corrige λογισμέ a «razón» para reflejar la facultad personificada y seguir la revisión inglesa final; se ajusta τύραννε a «sobre las pasiones» para expresar mejor el dominio; y se reemplaza «piedad» por «devoción a Dios» para conservar más claramente la orientación teológica de εὐσέβεια en español actual. Se mantienen la compresión retórica y la comparación abrupta del griego, con notas que preservan la ambigüedad sintáctica documentada.
