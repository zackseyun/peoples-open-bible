translation:
  language: es
  text: Y cuando un hombre se acercaba para postrarse ante él[a], él extendía su mano, lo sujetaba y lo besaba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘rendirle homenaje’. El verbo hebreo puede denotar un acto de respetuosa reverencia, no necesariamente adoración en sentido religioso estricto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And whenever ... he would
  chosen_spanish: Y sucedía que, cuando ...
  alternatives_spanish:
  - Y cuando ...
  - Y ocurría que, cuando ...
  lexicon: HALOT
  rationale: La construcción hebrea introduce una acción habitual o reiterada. En español, 'Y sucedía que, cuando...' comunica bien esa repetición sin sonar artificial.
- source_word: בִּקְרָב
  english_pob_choice: came near
  chosen_spanish: se acercaba
  alternatives_spanish:
  - venía cerca
  - se aproximaba
  lexicon: HALOT
  rationale: קרב expresa aproximación o cercanía. 'Se acercaba' es natural en español y conserva el movimiento hacia Absalón.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: HALOT
  rationale: El hebreo es masculino singular y el texto lo usa de forma genérica. 'Un hombre' mantiene esa forma sin neutralizar el género gramatical.
- source_word: לְהִשְׁתַּחֲוֺת לוֹ
  english_pob_choice: to bow down to him
  chosen_spanish: para postrarse ante él
  alternatives_spanish:
  - para inclinarse ante él
  - para rendirle homenaje
  lexicon: HALOT
  rationale: השתחוה puede indicar reverencia física u homenaje respetuoso. 'Postrarse ante él' conserva el gesto corporal; 'ante él' evita una lectura exclusivamente religiosa.
- source_word: וְשָׁלַח אֶת יָדוֹ
  english_pob_choice: he would reach out his hand
  chosen_spanish: extendía su mano
  alternatives_spanish:
  - alargaba su mano
  - tendía su mano
  lexicon: HALOT
  rationale: שׁלח con 'mano' es un giro idiomático de extenderla. 'Extendía su mano' es idiomático y preserva el valor habitual del verbo.
- source_word: וְהֶחֱזִיק לוֹ
  english_pob_choice: take hold of him
  chosen_spanish: lo tomaba
  alternatives_spanish:
  - lo sujetaba
  - lo asía
  lexicon: HALOT
  rationale: החזיק aquí denota tomar de la mano o sujetar en un gesto de recibimiento. 'Lo tomaba' es suficientemente natural en español; no fuerza un matiz más violento que el del contexto.
- source_word: וְנָשַׁק לוֹ
  english_pob_choice: and kiss him
  chosen_spanish: y lo besaba
  alternatives_spanish:
  - y lo besaba en señal de saludo
  - y le daba un beso
  lexicon: HALOT
  rationale: נשק es el verbo directo 'besar'. En este contexto político-social, el beso funciona como saludo o muestra de favor, pero el texto principal debe mantener el verbo simple.
theological_decisions:
- issue: 'לְהִשְׁתַּחֲוֺת לוֹ: reverencia vs. adoración'
  english_pob_reading: The Hebrew verb can denote an act of respectful obeisance, not necessarily worship in the narrow religious sense.
  chosen_spanish_reading: '''Postrarse ante él'' comunica reverencia u homenaje, no necesariamente adoración religiosa.'
  alternative_spanish_readings:
  - '''adorarlo'''
  - '''rendirle culto'''
  rationale: El contexto es de corte y acceso político, no de culto. Conviene conservar la tensión semántica de השתחוה sin convertirla en adoración cultual.
  doctrine_reference: Distinción bíblica entre homenaje civil y adoración debida solo a Dios (cf. Éx 20:3-5).
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios respecto del flujo auditado; se mantiene la equivalencia óptima y la nota sobre la ambigüedad de השתחוה.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva 'un hombre' para reflejar el singular masculino del hebreo, sin alterar el sentido genérico.
  - '''Besaba'' mantiene el gesto social/político del hebreo sin añadir interpretación no explícita en el texto.'
