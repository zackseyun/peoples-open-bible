- from: Y pondré fuego en Egipto[a]; Sin estará retorciéndose en angustia, y No[b] será abierta[ d][c], y Nof[c] tendrá adversarios[d] de día.
  to: Y pondré fuego en Egipto[a]; Sin se retorcerá de angustia, y No[b] será abierta por una brecha, y Nof[c] tendrá adversarios de día[d].
  rationale: 'La revisión corrige los anclajes de notas para que coincidan con la evidencia y con el rastro de auditoría inglés: Sin[a], No[b], Nof[c], y la alternativa léxica solo en la cláusula final[d]. También mejora la naturalidad y precisión del español: «se retorcerá de angustia» por fluidez, y «será abierta por una brecha» para reflejar mejor el sentido de ciudad violentada/abierta en el asalto. Se preservan los topónimos transliterados y el registro sobrio del proyecto.'
