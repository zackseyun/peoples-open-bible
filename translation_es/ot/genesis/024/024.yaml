review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva en general la estructura genealógica del hebreo: habla dirigida al interlocutor, identificación personal («soy la hija de…»), y la cláusula relativa sobre Milcá y Najor. Sin embargo, la relativa española actual («la cual dio a luz a Najor») desalineó el sentido del objeto nacido: en el hebreo, Milcá dio a luz a Betuel para/a Nahor, no dio a luz a Nahor. La nota inglesa protege precisamente esa fórmula de nacimiento, por lo que el español debe mantener como referente a Betuel.'
  spanish_quality_summary: El texto es legible, pero la cláusula relativa actual suena ambigua y semánticamente incorrecta. Además, el anclaje de nota está colocado al final de la cita completa, cuando debe ir junto a la frase discutida. Una redacción más natural y fiel en español es «a quien Milcá dio a luz para Najor» o «a quien Milcá dio a luz para/para Nahor»; esto evita atribuir el nacimiento a Najor como si él fuera el hijo.
  glossary_alignment: No hay términos teológicos sensibles del glosario principal en este versículo. Los nombres propios pueden mantenerse como «Betuel», «Milcá» y «Najor» según la convención usada en el borrador. La revisión necesaria es sintáctico-lexical en la fórmula de nacimiento, no de glosario doctrinal.
  issues:
  - severity: high
    issue: La cláusula relativa española identifica erróneamente a Najor como el nacido.
    rationale: '«la cual dio a luz a Najor» en español significa que Milcá dio a luz a Najor. Pero el hebreo אֲשֶׁר יָלְדָה לְנָחוֹר modifica a Betuel: Milcá dio a luz a Betuel para/a Nahor.'
  - severity: medium
    issue: El relativo «la cual» es gramaticalmente poco natural aquí y además arrastra la ambigüedad del antecedente.
    rationale: En español moderno y claro, «a quien Milcá dio a luz…» o «que Milcá dio a luz…» expresa mejor que el relativo se refiere a Betuel, no a Milcá ni a Najor.
  - severity: low
    issue: La nota al pie debe anclarse en la frase relevante, no al final de toda la oración.
    rationale: Las instrucciones requieren que el marcador aparezca exactamente en la palabra o frase pertinente. Aquí la alternativa afecta la fórmula «dio a luz … para Najor».
  revised_spanish_text: 'Ella le dijo: «Soy la hija de Betuel, hijo de Milcá, a quien Milcá dio a luz para Najor[a]».

    '
  revised_footnotes:
  - marker: a
    text: 'Alternativamente: «a quien Milcá dio a luz para Nahor». La fórmula hebrea de nacimiento usa con frecuencia la preposición ל para identificar al padre; por eso puede expresarse más literalmente «dio a luz para Nahor», aunque en español también puede entenderse como «dio a luz para/a Nahor» en contexto genealógico.'
    reason: lexical_alternative
  revision_rationale: 'Se corrigió la cláusula relativa para preservar el sentido del hebreo: el nacido es Betuel, no Najor. Se explicitó «Milcá» dentro de la relativa para evitar ambigüedad en español. Se mantuvo la alternativa documentada sobre la preposición ל, pero con una redacción que no distorsiona la genealogía. También se movió el marcador de nota a la frase exacta afectada.'
