translation:
  language: es
  text: y su aliento[a] será como un torrente desbordado; llegará hasta el cuello, para cribar a las naciones con un tamiz de vacío[b], y un freno que extravía[c] estará sobre las quijadas de los pueblos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘su espíritu’ o ‘su viento’ para ‘su aliento’.
    reason: lexical_alternative
  - marker: b
    text: O ‘con un tamiz de vanidad’, ‘con un tamiz de mentira’ o ‘con un tamiz inútil’.
    reason: lexical_alternative
  - marker: c
    text: O ‘un freno que lleva al extravío’, ‘un freno que hace errar’ o ‘un freno engañoso’; también, ‘sobre las mejillas/mandíbulas de los pueblos’.
    reason: lexical_alternative
lexical_decisions:
- source_word: רוּחוֹ
  english_pob_choice: his breath
  chosen_spanish: su aliento
  alternatives_spanish:
  - su espíritu
  - su viento
  lexicon: HALOT
  rationale: רוּחַ puede significar aliento, viento o espíritu. En este contexto de juicio y de imagen torrencial, ‘aliento’ conserva la concreción de una exhalación poderosa sin perder la posibilidad de un sentido más amplio.
- source_word: כְּנַחַל שׁוֹטֵף
  english_pob_choice: like an overflowing stream
  chosen_spanish: como un torrente desbordado
  alternatives_spanish:
  - como un arroyo que desborda
  - como un torrente impetuoso
  - como un cauce inundado
  lexicon: HALOT
  rationale: נחל es un arroyo, cauce estacional o torrente; שוטף añade la idea de desbordarse o arrasar. ‘Torrente desbordado’ comunica el movimiento violento y fluido en español natural.
- source_word: עַד צַוָּאר יֶחֱצֶה
  english_pob_choice: it reaches up to the neck
  chosen_spanish: llegará hasta el cuello
  alternatives_spanish:
  - alcanzará hasta el cuello
  - subirá hasta el cuello
  - llegará al cuello
  lexicon: HALOT
  rationale: Aunque חצה literalmente puede significar ‘dividir’, en esta imagen de inundación el sentido idiomático es de alcance o altura. ‘Llegará hasta el cuello’ transmite el nivel amenazante del agua sin forzar el verbo hebreo.
- source_word: לַהֲנָפָה
  english_pob_choice: to sift
  chosen_spanish: para zarandear
  alternatives_spanish:
  - para cribar
  - para aventar
  - para cernir
  lexicon: HALOT
  rationale: El término relacionado con נוף aquí tiene la idea de sacudir o agitar en una acción de separación; en español, ‘zarandear’ conserva el gesto de sacudir y el efecto de juicio. Se evita un tecnicismo que oscurezca la imagen.
- source_word: גוֹיִם
  english_pob_choice: nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - las gentes
  - los gentiles
  lexicon: HALOT
  rationale: En Isaías, גוים suele referirse a entidades nacionales o políticas. ‘Las naciones’ mantiene el alcance histórico-geopolítico del texto.
- source_word: בְּנָפַת שָׁוְא
  english_pob_choice: with a sieve of emptiness
  chosen_spanish: con un tamiz de vaciedad
  alternatives_spanish:
  - con un tamiz de vanidad
  - con un tamiz de mentira
  - con un tamiz inútil
  lexicon: HALOT
  rationale: נפה es un tamiz o criba. שוא puede ser vaciedad, vanidad, falsedad o inutilidad. ‘Vaciedad’ conserva la fuerza de nulidad/futilidad sin fijar un matiz más específico que el hebreo no obliga a decidir.
- source_word: וְרֶסֶן מַתְעֶה
  english_pob_choice: and a misleading bridle
  chosen_spanish: y un freno que desvía
  alternatives_spanish:
  - y un freno engañoso
  - y un freno que extravía
  - y un freno desorientador
  lexicon: HALOT
  rationale: רֶסֶן es un freno o brida de control. מַתְעֶה expresa la acción de desviar o hacer errar. ‘Freno que desvía’ preserva la metáfora de control animal y el matiz activo de hacer salir del rumbo.
- source_word: עַל לְחָיֵי עַמִּים
  english_pob_choice: is on the jaws of the peoples
  chosen_spanish: estará sobre las mejillas de los pueblos
  alternatives_spanish:
  - estará sobre las mandíbulas de los pueblos
  - estará sobre las quijadas de los pueblos
  - estará sobre las mejillas de los pueblos
  lexicon: HALOT
  rationale: לְחָיֵי puede significar mejillas o mandíbulas/quijadas. Dado el paralelo con el freno, ‘mejillas’ sigue más de cerca el hebreo y la imagen corporal, mientras que ‘freno’ ya comunica la función de control.
theological_decisions:
- issue: Referente del pronombre posesivo en ‘su aliento’
  english_pob_reading: The pronoun refers to the LORD in the immediate context of divine judgment.
  chosen_spanish_reading: El posesivo se entiende como referente a Yahvé en el contexto inmediato de juicio divino.
  alternative_spanish_readings:
  - se refiere a una fuerza impersonal de tormenta
  - podría entenderse como una personificación poética sin referente explícito
  rationale: El contexto circundante presenta la acción judicial de Yahvé; por eso el posesivo se mantiene personal. La traducción evita neutralizar el agente divino.
  doctrine_reference: Isaías 30:27-28; juicio activo de Yahvé en el contexto profético
translation_notes:
  revision_awareness: Se revisó el equilibrio entre fidelidad léxica y fluidez en español. Se conservó la tensión de רוּחַ como aliento/espíritu/viento mediante nota, y de שָׁוְא como vaciedad/vanidad/mentira/inutilidad. La imagen del freno se mantuvo sin reemplazar el hebreo por una abstracción doctrinal.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ en lugar de ‘SEÑOR’ para el nombre divino, conforme al criterio del proyecto.
  - Se preserva el paralelismo imagístico de inundación, tamiz y freno sin armonizar excesivamente el verso.
  - ‘Naciones’ se usa para גוים y ‘pueblos’ para עמים, manteniendo una leve distinción estilística.
  - ‘Mejillas’ se retiene por cercanía al hebreo, aunque ‘mandíbulas/quijadas’ sigue siendo una alternativa válida en nota.
