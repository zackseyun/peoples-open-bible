translation:
  language: es
  text: 'los jefes del pueblo: Parosh[a], Pahat-Moab, Elam, Zattu, Bani.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cabezas del pueblo» o «líderes del pueblo». El hebreo dice literalmente «las cabezas del pueblo».
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאשֵׁי
  english_pob_choice: the heads of
  chosen_spanish: los jefes de
  alternatives_spanish:
  - los cabezas de
  - los líderes de
  lexicon: HALOT
  rationale: El hebreo usa el constructo plural de רֹאשׁ en sentido idiomático para personas en posición principal. En español, «jefes de» comunica esa función de manera natural y conserva la metáfora de jefatura sin volverla demasiado interpretativa.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la nación
  lexicon: HALOT
  rationale: En este listado comunitario/covenantal, «el pueblo» es la forma más natural y digna en español. Mantiene el referente colectivo de la comunidad de Judá/Jerusalén sin introducir una lectura más amplia que la del contexto.
- source_word: פַּרְעֹשׁ
  english_pob_choice: Parosh
  chosen_spanish: Parosh
  alternatives_spanish:
  - Parós
  lexicon: Transliteración del nombre propio
  rationale: Nombre propio de familia/persona; se conserva transliterado. No se adapta a una forma castellana para no ocultar la forma hebrea documentada.
- source_word: פַּחַת מוֹאָב
  english_pob_choice: Pahath-moab
  chosen_spanish: Pahat-moab
  alternatives_spanish:
  - Pahat-moab
  - Pahat-Moab
  lexicon: Transliteración del nombre compuesto
  rationale: Se preserva el nombre compuesto como tal. La forma española sigue la transliteración del hebreo y evita traducirlo o normalizarlo hacia una forma eclesiástica tradicional sin base textual adicional.
- source_word: עֵילָם
  english_pob_choice: Elam
  chosen_spanish: Elam
  alternatives_spanish:
  - Élam
  lexicon: Transliteración del nombre propio
  rationale: Aunque «Elam» puede designar otra realidad en otros contextos, aquí funciona como nombre en una lista de firmantes. Se mantiene la transliteración directa.
- source_word: זַתּוּא
  english_pob_choice: Zattu
  chosen_spanish: Zatu
  alternatives_spanish:
  - Zattu
  lexicon: Transliteración del nombre propio
  rationale: La forma hebrea apoya una transliteración breve y transparente. En español se evita duplicar consonantes inglesas no exigidas por el nombre original.
- source_word: בָּנִי
  english_pob_choice: Bani
  chosen_spanish: Bani
  alternatives_spanish:
  - Bini
  lexicon: Transliteración del nombre propio
  rationale: La consonantal hebrea favorece «Bani», concordando con la decisión auditada en inglés y evitando armonizaciones con nombres parecidos de pasajes cercanos.
translation_notes:
  revision_awareness: El pasaje muestra alto acuerdo en el control de calidad y no requiere revisiones sustantivas. Se mantuvo la transparencia del hebreo en la frase inicial y la transliteración directa de los nombres propios, sin armonizar formas cercanas de otras listas genealógicas.
  spanish_consistency_notes:
  - Se usó «el pueblo» para הָעָם por naturalidad en español administrativo-bíblico.
  - Se mantuvo la frase inicial en plural con artículo masculino plural («los jefes») para reflejar רָאשֵׁי.
  - Los nombres propios se transliteraron de forma uniforme y sin castellanización innecesaria.
  - Se dejó la nota al pie solo en la frase con mayor tensión lexical; no se añadieron notas para cada nombre propio.
