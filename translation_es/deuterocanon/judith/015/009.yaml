revisions:
- from: 'Y cuando entraron a ella[a], todos a una la bendijeron y le dijeron: «Tú eres la gloria de Jerusalén, tú eres el gran motivo de orgullo de Israel[b], tú eres el gran honor de nuestro pueblo».'
  to: 'Y cuando llegaron hasta ella, todos a una la bendijeron y le dijeron: «Tú eres la gloria[a] de Jerusalén, tú eres el gran motivo de orgullo de Israel[b], tú eres el gran orgullo[c] de nuestro pueblo».'
  rationale: Se ajusta «entraron a ella» a «llegaron hasta ella» para evitar una expresión antinatural y ambigua en español, manteniendo el movimiento hacia la presencia de Judith. Se conserva «la gloria de Jerusalén» en el texto principal por naturalidad, pero se añade la alternativa de «altura/exaltación» documentada en el expediente. Finalmente, «el gran honor de nuestro pueblo» se corrige a «el gran orgullo de nuestro pueblo» para permanecer dentro del campo semántico de καύχημα y sostener mejor el paralelismo con γαυρίαμα sin colapsarlos por completo.
