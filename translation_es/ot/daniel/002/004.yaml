translation:
  language: es
  text: 'Entonces los caldeos hablaron al rey en arameo[a]: «Oh rey, ¡vive para siempre![b] Di el sueño a tus siervos, y declararemos[c] la interpretación».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El arameo comienza aquí y continúa hasta Daniel 7:28.
    reason: cross_reference
  - marker: b
    text: 'O: «que vivas para siempre».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «daremos a conocer la interpretación».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבְּרוּ
  english_pob_choice: Then ... spoke
  chosen_spanish: Entonces ... hablaron
  alternatives_spanish:
  - Y ... hablaron
  - Entonces ... dijeron
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «Entonces» conserva el orden secuencial de manera natural en español. «Hablaron» refleja el verbo de habla sin forzar una equivalencia demasiado rígida con «dijeron».
- source_word: הַכַּשְׂדִּים
  english_pob_choice: the Chaldeans
  chosen_spanish: los caldeos
  alternatives_spanish:
  - los astrólogos
  - los sabios caldeos
  lexicon: HALOT
  rationale: Se conserva el grupo designado por el sustantivo, como en el texto de base inglés. Aunque el contexto courtés puede sugerir una clase de sabios, la forma léxica nombra a los caldeos como grupo, por lo que no se reemplaza por una glosa interpretativa.
- source_word: לַמֶּלֶךְ
  english_pob_choice: to the king
  chosen_spanish: al rey
  alternatives_spanish:
  - ante el rey
  - dirigiéndose al rey
  lexicon: HALOT
  rationale: La preposición marca el destinatario del discurso; «al rey» es la correspondencia directa y natural en español.
- source_word: אֲרָמִית
  english_pob_choice: in Aramaic
  chosen_spanish: en arameo
  alternatives_spanish:
  - en la lengua aramea
  lexicon: HALOT
  rationale: El adverbial indica la lengua del habla y marca el inicio de la sección aramea de Daniel. «En arameo» es conciso y transparente.
- source_word: מַלְכָּא
  english_pob_choice: O king
  chosen_spanish: Oh rey
  alternatives_spanish:
  - ¡Oh, rey!
  - Rey
  lexicon: HALOT
  rationale: Se conserva el vocativo con un giro idiomático natural en español. «Oh rey» mantiene el tono cortesano y evita una formulación demasiado moderna o seca.
- source_word: לְעָלְמִין חֱיִי
  english_pob_choice: live forever
  chosen_spanish: ¡vive para siempre!
  alternatives_spanish:
  - ¡que vivas para siempre!
  - puedas vivir para siempre
  lexicon: HALOT
  rationale: Es una aclamación real fija. «¡Vive para siempre!» reproduce su forma formularia; la lectura optativa subyacente puede expresarse también como deseo, pero no es necesario explicitarla en el cuerpo del texto.
- source_word: אֱמַר
  english_pob_choice: Tell
  chosen_spanish: Di
  alternatives_spanish:
  - Dinos
  - Cuenta
  lexicon: HALOT
  rationale: En este contexto se pide relatar el sueño; «Di» es el imperativo más directo y fiel, evitando una expansión interpretativa.
- source_word: חֶלְמָא
  english_pob_choice: the dream
  chosen_spanish: el sueño
  alternatives_spanish:
  - tu sueño
  lexicon: HALOT
  rationale: El sustantivo definido se refiere al sueño mencionado en el contexto. En español no hace falta añadir el posesivo, que quedaría redundante.
- source_word: לְעַבְדָךְ
  english_pob_choice: to your servants
  chosen_spanish: a tus siervos
  alternatives_spanish:
  - a tus servidores
  - a tus esclavos
  lexicon: HALOT
  rationale: Se mantiene la deferencia cortesana con «siervos», que en español transmite mejor la relación de servicio respetuoso que «esclavos» en este contexto. Aunque el término hebreo/arameo puede abarcar servidumbre, aquí la fórmula de cortesía es decisiva.
- source_word: וּפִשְׁרָא
  english_pob_choice: the interpretation
  chosen_spanish: la interpretación
  alternatives_spanish:
  - la explicación
  - el sentido
  lexicon: HALOT
  rationale: En Daniel, el término es técnico para la interpretación de sueños y visiones. «Interpretación» preserva ese valor recurrente mejor que equivalentes más generales.
- source_word: נְחַוֵּא
  english_pob_choice: we will declare
  chosen_spanish: declararemos
  alternatives_spanish:
  - daremos a conocer
  - manifestaremos
  lexicon: HALOT
  rationale: «Declararemos» corresponde con el ajuste revisado en el inglés POB y mantiene un registro formal. Además, refleja bien el matiz de hacer saber/explicar la interpretación.
translation_notes:
  revision_awareness: La redacción sigue de cerca el audit trail inglés y adopta la revisión donde «we will show» pasó a «we will declare», por lo que se eligió «declararemos». También se mantuvo la fórmula cortesana de saludo real y se respetó el inicio de la sección aramea indicado en el aparato.
  spanish_consistency_notes:
  - Se conserva «arameo» para el marcador de lengua, no como glosa etnolingüística.
  - Se usa «siervos» por la cortesía de la escena, evitando «esclavos» porque aquí no es el foco legal del término.
  - Se mantiene el vocativo con puntuación exclamativa para reflejar la fórmula real y su tono solemne.
