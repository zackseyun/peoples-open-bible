translation:
  language: es
  text: 'Pero Samuel dijo[a]: «¿Qué es, entonces, este sonido de ovejas en mis oídos, y el sonido del ganado que yo oigo?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «voz» en lugar de «sonido» para las dos ocurrencias de קול; aquí se refiere al ruido audible que hacen los animales.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: But Samuel said
  chosen_spanish: Pero Samuel dijo
  alternatives_spanish:
  - Y Samuel dijo
  - Entonces Samuel dijo
  lexicon: HALOT
  rationale: La conjunción narrativa con valor adversativo se conserva mejor con «pero» en este contexto, porque la respuesta de Samuel confronta la afirmación previa de obediencia. «Dijo» es el equivalente natural de אמר.
- source_word: וּמֶה
  english_pob_choice: Then what is
  chosen_spanish: ¿Entonces qué es?
  alternatives_spanish:
  - ¿Y qué es?
  - ¿Qué es entonces?
  lexicon: HALOT
  rationale: La partícula interrogativa introduce una pregunta retórica que pide explicación; «entonces» refleja el valor conectivo y el tono de desafío sin forzar el español.
- source_word: קוֹל
  english_pob_choice: sound
  chosen_spanish: sonido
  alternatives_spanish:
  - voz
  - ruido
  lexicon: HALOT
  rationale: Aquí קוֹל se refiere al ruido audible de los animales, no a una «voz» personal. «Sonido» mantiene la amplitud semántica y evita una asociación demasiado antropomórfica.
- source_word: הַצֹּאן
  english_pob_choice: sheep
  chosen_spanish: ovejas
  alternatives_spanish:
  - rebaño
  - ganado menor
  lexicon: HALOT
  rationale: En este contexto, el término colectivo se concreta de forma natural en «ovejas», en paralelo con «vacas», como en la solución inglesa «sheep».
- source_word: הַזֶּה
  english_pob_choice: this
  chosen_spanish: este
  alternatives_spanish:
  - este mismo
  - ese
  lexicon: HALOT
  rationale: El demostrativo señala el sonido inmediatamente presente; «este» preserva la deixis de forma directa.
- source_word: בְּאָזְנָי
  english_pob_choice: in my ears
  chosen_spanish: en mis oídos
  alternatives_spanish:
  - en mi oído
  - en mi oído(s)
  lexicon: HALOT
  rationale: 'La imagen corporal del hebreo se conserva de modo literal y natural en español: «en mis oídos». Mantiene el matiz acusatorio de lo audible e innegable.'
- source_word: וְקוֹל הַבָּקָר
  english_pob_choice: and the sound of cattle
  chosen_spanish: y el sonido de vacas
  alternatives_spanish:
  - y el sonido del ganado
  - y el sonido de los vacunos
  lexicon: HALOT
  rationale: בקר es un colectivo para ganado bovino; en esta escena, junto con «ovejas», «vacas» comunica bien el contraste auditivo sin sobrecargar el texto. Se evita «ganado» por su mayor generalidad.
- source_word: אֲשֶׁר אָנֹכִי שֹׁמֵעַ
  english_pob_choice: that I hear
  chosen_spanish: que yo oigo
  alternatives_spanish:
  - que estoy oyendo
  - que escucho
  lexicon: HALOT
  rationale: El verbo en presente expresa percepción inmediata; «oigo» es breve, natural y reproduce bien la fuerza retórica. El pronombre explícito «yo» refleja el אָנֹכִי enfático.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el paquete fuente hebreo y el criterio auditado de la POB en inglés: mantiene el giro adversativo, conserva la imaginería corporal de «en mis oídos» y resuelve קול como «sonido» por el referente acústico animal. No se detectaron cambios de revisión aplicados respecto al último pase en inglés.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque no aparece en el texto base.
  - Se usó «ovejas» y «vacas» para reflejar el contraste concreto del contexto, coherente con la lectura inglesa auditada.
  - La puntuación reproduce un discurso directo claro y publicable en español moderno y reverente.
