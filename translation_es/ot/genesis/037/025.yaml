review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la secuencia narrativa hebrea: ''se sentaron'', ''alzaron sus ojos y miraron'', ''he aquí'', ''una caravana de ismaelitas venía de Galaad''. También preserva adecuadamente la lista de mercancías y el destino a Egipto. Sin embargo, la cláusula final ''yendo a llevarlo a Egipto'' queda mal anclada en español y puede leerse como si modificara a ''camellos'', problema parecido al ya corregido en la auditoría inglesa. Además, ''estoraque'' para נְכֹאת va más allá de la cautela léxica documentada en inglés, que prefirió un término genérico (''gum'') por incertidumbre botánica.'
  spanish_quality_summary: El español es generalmente claro y digno, pero la sintaxis del tramo final suena algo forzada. 'Alzaron sus ojos' y 'y he aquí' son aceptables en registro bíblico. La principal mejora necesaria es reestructurar la cláusula de propósito/dirección para que los ismaelitas, no los camellos, sean los agentes de 'ir a llevar'. También conviene usar una opción más amplia que 'estoraque' para mantener legibilidad y no sobredeterminar la sustancia.
  glossary_alignment: 'No hay conflictos con términos doctrinales del glosario mayor. ''Ismaelitas'', ''Galaad'', ''Egipto'', ''bálsamo'' y ''ládano'' están bien. La excepción relevante es נְכֹאת: el inglés auditado documenta incertidumbre y escoge una opción genérica; por eso en español conviene ''goma aromática'' o similar en vez de ''estoraque''.'
  issues:
  - severity: medium
    issue: La frase 'yendo a llevarlo a Egipto' queda sintácticamente ambigua.
    rationale: En español, el gerundio después de 'y sus camellos llevaban...' puede parecer referido a 'camellos', no a los ismaelitas. El hebreo הוֹלְכִים se refiere al grupo humano de la caravana.
  - severity: medium
    issue: '''Estoraque'' para נְכֹאת es demasiado específico.'
    rationale: La documentación inglesa eligió una traducción genérica por incertidumbre botánica. 'Estoraque' impone una identificación más concreta de la que el expediente respalda.
  - severity: low
    issue: Falta reflejar en notas la alternativa de construcción previa sobre la lista y el destino, si se desea conservar el rastro auditado.
    rationale: No es indispensable repetir toda nota inglesa, pero si se introducen cambios de claridad en español, conviene al menos mantener las notas léxicas realmente útiles y evitar notas desalineadas.
  revised_spanish_text: Entonces se sentaron a comer pan[a], y alzaron sus ojos y miraron; y he aquí, una caravana de ismaelitas venía de Galaad, con sus camellos cargados de goma aromática, bálsamo y ládano[b], y ellos iban a llevarlo a Egipto.
  revised_footnotes:
