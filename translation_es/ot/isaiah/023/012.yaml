review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo: cese del regocijo, personificación de Sidón como ''virgen hija'', mandato de huida a Kittim y ausencia de descanso aun allí. Sin embargo, la colocación de las notas está invertida respecto del rastro inglés y el anclaje [a] en ''Él dijo'' no corresponde a la nota cultural sobre Kittim. Además, ''te alegrarás'' es fiel pero algo más débil que לַעְלֹז; conviene reforzar el registro profético con ''te regocijarás'' o ''exultarás''.'
  spanish_quality_summary: El español es claro y natural, pero la puntuación vocativa 'oh oprimida, virgen hija de Sidón' suena algo cargada. Una redacción ligeramente más fluida y digna mantiene el tono profético. También es mejor anclar la nota cultural directamente en 'Kittim'.
  glossary_alignment: No hay conflictos con los términos base del proyecto. 'Kittim' se conserva correctamente como transliteración en el texto principal. 'Oprimida' y 'virgen hija de Sidón' están bien alineados con el análisis léxico. La principal mejora es elevar 'alegrarás' a 'regocijarás' para reflejar mejor עלז sin caer en un calco torpe.
  issues:
  - severity: high
    issue: Las notas al pie están mal ancladas e invertidas.
    rationale: La nota [a] en el borrador aparece sobre 'Él dijo', pero su contenido explica 'Kittim'. La nota léxica alternativa sobre el verbo de regocijo está marcada como [b], cuando en el rastro inglés esa alternativa corresponde a la otra nota. En POB, el marcador debe aparecer en la palabra o frase pertinente.
  - severity: medium
    issue: '''Te alegrarás'' atenúa el matiz de לַעְלֹז.'
    rationale: Aunque es semánticamente aceptable, עלז denota regocijo/exultación más intensa. 'Te regocijarás' conserva mejor el tono elevado y profético en español ampliamente legible.
  - severity: low
    issue: La frase vocativa puede sonar un poco pesada.
    rationale: '''oh oprimida, virgen hija de Sidón'' no es incorrecta, pero puede fluir mejor como ''oh virgen hija de Sidón, oprimida'' o manteniendo el orden con una puntuación más limpia. Se puede mejorar sin alterar el sentido.'
  revised_spanish_text: 'Él dijo: «Ya no te regocijarás[a], oh virgen hija de Sidón, oprimida. Levántate, cruza a Kittim[b]; aun allí no tendrás descanso».'
  revised_footnotes:
