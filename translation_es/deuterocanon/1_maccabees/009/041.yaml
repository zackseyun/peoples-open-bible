translation:
  language: es
  text: Y la boda se convirtió en luto, y el sonido de sus músicos[a] en lamentación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el sonido de sus instrumentos musicales». El griego μουσικῶν puede referirse tanto a los músicos como a los instrumentos musicales.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μετεστράφη
  english_pob_choice: was turned into
  chosen_spanish: se convirtió en
  alternatives_spanish:
  - fue transformado en
  - fue vuelto en
  lexicon: LSJ
  rationale: El verbo pasivo expresa un cambio/reversión de estado. En español, «se convirtió en» comunica con naturalidad esa transformación drástica sin perder la fuerza del contraste.
- source_word: ὁ γάμος
  english_pob_choice: the wedding
  chosen_spanish: la boda
  alternatives_spanish:
  - la ceremonia nupcial
  - el matrimonio
  lexicon: LSJ
  rationale: Aquí el contexto apunta a la celebración pública, no a la institución matrimonial. «Boda» conserva el evento y su contraste inmediato con el luto.
- source_word: πένθος
  english_pob_choice: mourning
  chosen_spanish: luto
  alternatives_spanish:
  - duelo
  - mournimiento
  lexicon: LSJ
  rationale: El término expresa duelo ritual o estado de aflicción por muerte/calamidad. «Luto» es breve, solemne y corresponde bien al contraste con la boda.
- source_word: φωνὴ
  english_pob_choice: the sound
  chosen_spanish: el sonido
  alternatives_spanish:
  - la voz
  - el ruido
  lexicon: LSJ
  rationale: Aunque literalmente puede ser «voz», aquí se refiere a lo que se oye de los músicos. «El sonido» mantiene el valor auditivo sin forzar una personificación.
- source_word: μουσικῶν
  english_pob_choice: musicians
  chosen_spanish: sus músicos
  alternatives_spanish:
  - sus instrumentos musicales
  - los músicos de ellos
  lexicon: LSJ
  rationale: El genitivo plural puede referirse a músicos o a instrumentos musicales. Mantengo «sus músicos» como lectura principal, siguiendo la decisión inglesa, pero dejo abierta la alternativa textual en nota.
- source_word: θρῆνον
  english_pob_choice: lamentation
  chosen_spanish: lamentación
  alternatives_spanish:
  - lamento
  - canto fúnebre
  lexicon: LSJ
  rationale: El sustantivo designa un lamento formal o canto de duelo. «Lamentación» preserva el tono elevado y el paralelismo con «luto».
translation_notes:
  revision_awareness: El texto griego coincide plenamente con el testimonio fuente provisto y con la traducción auditada en inglés; no se requieren revisiones sustanciales. La única tensión lexical relevante es μουσικῶν, que permite tanto «músicos» como «instrumentos musicales», por lo que se conserva la alternativa en nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se evita «SEÑOR» porque no corresponde a este texto.
  - «Boda» y «luto» ofrecen un contraste natural en español, equivalente al contraste ceremonial del griego.
  - Se conserva un registro sobrio y bíblico sin arcaísmos innecesarios.
