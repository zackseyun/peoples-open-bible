- from: Debes dejar ir sin falta a la madre[a], pero puedes tomar para ti a los polluelos[b], para que te vaya bien y prolongues tus días[c].
  to: Debes dejar ir sin falta a la madre[a], pero puedes tomar las crías para ti[b], para que te vaya bien y prolongues tus días[c].
  rationale: Se reemplaza «los polluelos» por «las crías» para preservar mejor el alcance contextual de הַבָּנִים y alinearse con la decisión inglesa «the young». También se ajusta el orden a «tomar las crías para ti» para un español más natural sin perder לָךְ.
