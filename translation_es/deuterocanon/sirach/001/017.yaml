revisions:
- from: Todos sus almacenes los llena de deleite[a][b], y sus graneros de su cosecha.
  to: Ella llena todos sus almacenes de deleite[a][b], y sus graneros con su cosecha.
  rationale: Se ajusta la sintaxis para un español más natural y digno sin perder el sentido del hebreo; se cambia 'de su cosecha' por 'con su cosecha' para reflejar mejor el valor del hebreo y el paralelismo de la línea; y se pule la redacción de la nota griega para mejorar su idiomaticidad.
