translation:
  language: es
  text: Y se burló[a] de Israel, y Jonatán, hijo de Simea, hermano de David, lo hirió de muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desafió a Israel». El verbo hebreo puede denotar reproche despectivo o desafío abierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְחָרֵף
  english_pob_choice: taunted
  chosen_spanish: insultó
  alternatives_spanish:
  - desafió
  - reprochó
  - se burló
  lexicon: HALOT
  rationale: El verbo hebreo puede abarcar la idea de afrenta, burla hostil o desafío público. En español, «insultó» comunica bien la provocación ofensiva contra Israel sin forzar un giro demasiado literal o demasiado suave. «Desafió» conserva la tensión de oposición abierta, pero pierde el matiz de ultraje verbal; «reprochó» y «se burló» no cubren tan bien el ataque hostil global.
- source_word: אֶת יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: a Israel
  alternatives_spanish:
  - a los israelitas
  lexicon: HALOT
  rationale: Se mantiene «Israel» como entidad nacional, tal como en el hebreo y en el inglés POB. En español puede funcionar naturalmente como objeto directo con valor colectivo.
- source_word: וַיַּכֵּהוּ
  english_pob_choice: struck him down
  chosen_spanish: lo hirió de muerte
  alternatives_spanish:
  - lo mató
  - lo hirió
  - lo derribó
  lexicon: HALOT
  rationale: El verbo נכה aquí tiene sentido letal en el contexto narrativo. «Lo hirió de muerte» conserva el acto de herir y deja explícito el resultado fatal, sin reducirlo a una mera traducción interpretativa como «lo mató». «Lo derribó» es demasiado débil; «lo hirió» puede sonar incompleto.
- source_word: יְהוֹנָתָן
  english_pob_choice: Jonathan
  chosen_spanish: Jonatán
  alternatives_spanish:
  - Jonathan
  lexicon: transliteración convencional española
  rationale: «Jonatán» es la forma habitual y plenamente inteligible en español bíblico. Mantiene el nombre propio sin depender de la grafía inglesa.
- source_word: בֶּן שִׁמְעָא
  english_pob_choice: son of Shimea
  chosen_spanish: hijo de Simea
  alternatives_spanish:
  - hijo de Shimea
  lexicon: transliteración convencional española
  rationale: Se adopta la forma española «Simea», común y fácil de leer, conservando la relación genealógica exacta. La estructura «hijo de» refleja fielmente el constructo hebreo.
- source_word: אֲחִי דָוִיד
  english_pob_choice: David’s brother
  chosen_spanish: hermano de David
  alternatives_spanish:
  - el hermano de David
  lexicon: HALOT
  rationale: El constructo significa literalmente «hermano de David». En español, la construcción preposicional «hermano de David» es natural y exacta; el posesivo no es necesario.
theological_decisions:
- issue: Naturaleza de la agresión contra Israel
  english_pob_reading: The Hebrew verb can denote scornful reproach or open defiance.
  chosen_spanish_reading: El verbo puede expresar tanto insulto hostil como desafío abierto contra Israel.
  alternative_spanish_readings:
  - desafío abierto
  - burla insultante
  - afrenta pública
  rationale: No se debe aplanar la tensión semántica del verbo חרף. La redacción española deja espacio para ambas posibilidades del campo semántico, como lo hace la nota inglesa.
  doctrine_reference: Lexical semantics / textual nuance
