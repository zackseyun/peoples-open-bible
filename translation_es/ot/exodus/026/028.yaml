translation:
  language: es
  text: Y la barra central[a], en medio de los marcos, se extenderá de un extremo al otro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'tablas' en lugar de 'marcos'. El término hebreo se refiere a los elementos estructurales verticales del tabernáculo; aquí se prefirió 'marcos' para no sugerir simples tablones planos.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַבְּרִיחַ
  english_pob_choice: middle bar
  chosen_spanish: barra central
  alternatives_spanish:
  - barra del medio
  - travesaño central
  - cerrojo central
  lexicon: HALOT
  rationale: בְּרִיחַ en el contexto del tabernáculo designa una pieza larga de sujeción. En español, 'barra' comunica bien la función estructural; 'central' refleja הַתִּיכֹן, y evita 'cerrojo', que sugiere más bien un cierre de puerta.
- source_word: הַתִּיכֹן
  english_pob_choice: middle
  chosen_spanish: central
  alternatives_spanish:
  - del medio
  - intermedia
  - mediana
  lexicon: HALOT
  rationale: El adjetivo indica que esta barra ocupa la posición media entre las demás. 'Central' es natural en español y conserva la relación posicional sin perder precisión.
- source_word: בְּתוֹךְ
  english_pob_choice: in the midst of
  chosen_spanish: en medio de
  alternatives_spanish:
  - dentro de
  - en el interior de
  - entre
  lexicon: HALOT
  rationale: בְּתוֹךְ expresa ubicación dentro o entre los elementos. 'En medio de' mantiene la imagen espacial y suena más natural en español que una traducción más literal como 'en el interior de'.
- source_word: הַקְּרָשִׁים
  english_pob_choice: frames
  chosen_spanish: los marcos
  alternatives_spanish:
  - las tablas
  - las planchas
  - las tablas de madera
  lexicon: HALOT
  rationale: Siguiendo la decisión del POB inglés, קְרָשִׁים se entiende aquí como los miembros estructurales verticales del tabernáculo. 'Marcos' evita la imagen de simples tablas planas y conserva la intención arquitectónica.
- source_word: מַבְרִחַ
  english_pob_choice: shall extend
  chosen_spanish: se extenderá
  alternatives_spanish:
  - pasará
  - cruzará
  - irá de un lado a otro
  lexicon: HALOT
  rationale: El participio hiphil describe la pieza que corre longitudinalmente de un extremo al otro. 'Se extenderá' reproduce bien la idea de abarcar toda la longitud sin introducir el matiz de 'pasar a través' de aberturas.
- source_word: מִן הַקָּצֶה אֶל הַקָּצֶה
  english_pob_choice: from end to end
  chosen_spanish: de un extremo al otro
  alternatives_spanish:
  - de extremo a extremo
  - de punta a punta
  - de un lado al otro
  lexicon: HALOT
  rationale: La expresión idiomática señala la cobertura total de la longitud. 'De un extremo al otro' es la forma más clara y fiel en español actual.
translation_notes:
  revision_awareness: Se siguió el último ajuste del POB inglés, que reemplazó 'shall pass through' por 'shall extend' para expresar mejor el sentido del participio hebreo sin añadir la idea de atravesar aberturas. La redacción española adopta esa misma línea con 'se extenderá'.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' fuera del versículo porque no aparece en el texto hebreo de esta unidad.
  - Se evitó 'SEÑOR' y 'cerrojo' para no perder la precisión arquitectónica del pasaje.
  - La coordinación 'en medio de los marcos' conserva la ubicación interior sin volverla mecánica o redundante.
