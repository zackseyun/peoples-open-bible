  yaml_path: translation/ot/psalms/135/009.yaml
  text: He sent signs and wonders into your midst[a], O Egypt[b], against Pharaoh and against all his servants.
  footnotes:
  - marker: a
    text: Or 'in your midst, Egypt.' The Hebrew addresses Egypt directly with a feminine singular suffix, personifying the nation.
    reason: lexical_alternative
  - marker: b
    text: Or 'upon Pharaoh and upon all his servants.' The Hebrew preposition can be rendered more literally as 'on/upon,' but here it likely indicates the plagues' hostile effect against them.
    reason: lexical_alternative
