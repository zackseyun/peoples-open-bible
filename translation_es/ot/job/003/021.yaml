review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador acierta en la mayor parte del sentido: «los que esperan la muerte», «y no llega» y «más que a tesoros escondidos» reflejan bien el hebreo y el rastro inglés. Sin embargo, omite un rasgo significativo de וַיַּחְפְּרֻהוּ, que en la fuente es literalmente «cavan por ella / la excavan», no simplemente «la buscan». Dado que el inglés POB preserva deliberadamente la imagen vívida de «dig for it», el español también debe conservarla.'
  spanish_quality_summary: El español es natural y claro, pero «y la buscan» debilita la fuerza poética de la metáfora y rompe el paralelismo con «tesoros escondidos». Una formulación como «y cavan por ella» o «y la excavan» suena menos idiomática; «y la buscan como quien cava» sería demasiado interpretativa. «Y la cavan más que a tesoros escondidos» no funciona. La mejor solución breve y fiel es «y cavan por ella más que por tesoros escondidos», ajustando también la preposición comparativa para mayor naturalidad.
  glossary_alignment: No hay términos del glosario doctrinal principal en juego. La decisión clave es mantener el valor léxico de חפר como «cavar» en vez de aplanarlo a «buscar». La nota léxica sobre וְאֵינֶנּוּ está bien y puede conservarse.
  issues:
  - severity: medium
    issue: «y la buscan» no preserva la imagen de חפר
    rationale: El hebreo usa el verbo literal «cavar», y el inglés POB lo mantuvo a propósito para conservar la metáfora de buscar la muerte como tesoro enterrado. «Buscar» comunica la idea general, pero pierde una elección léxica significativa del texto fuente.
  - severity: low
    issue: «más que a tesoros escondidos» puede afinarse tras restaurar «cavar»
    rationale: Con «cavan», la comparación suena más natural como «más que por tesoros escondidos», emparejando la misma relación verbal implícita en ambos miembros.
  revised_spanish_text: los que esperan la muerte[a], y no llega, y cavan por ella más que por tesoros escondidos
  revised_footnotes:
