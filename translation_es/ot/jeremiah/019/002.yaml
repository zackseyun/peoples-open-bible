  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparece Yahvé, Mesías, Espíritu, etc. Se mantiene correctamente el topónimo sin introducir 'Gehena'. La elección 'proclama' concuerda con la decisión léxica auditada para קרא.
