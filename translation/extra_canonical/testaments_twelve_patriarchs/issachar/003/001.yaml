translation:
  text: 'For if Leah my mother had not given up marital union in exchange for the
    two apples[a], she would still have been destined to bear eight sons. Therefore
    she bore six, and Rachel bore the two, because through the mandrakes the Lord
    visited her. For he saw that Leah desired to be with Jacob for the sake of children,
    and not for the sake of pleasure. For on the next day also she again gave Jacob
    over. Therefore through the mandrakes the Lord listened to Rachel. For although
    she longed for these, she did not eat them, but dedicated them in the house of
    the Lord, after bringing them to the priest.


    When therefore I grew to manhood, my children, I walked in uprightness of heart,
    and I became a farmer for my father and for my brothers.'
