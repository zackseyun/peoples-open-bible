review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura retórica y la mayor parte del sentido del hebreo: «ruge», «león», «en el bosque», «presa» y «guarida» reflejan adecuadamente יִשְׁאַג, אַרְיֵה, בַּיַּעַר, טֶרֶף y מִמְּעֹנָתוֹ. Sin embargo, en la segunda pregunta hay dos desajustes importantes: כְּפִיר se tradujo como «cachorro de león», que suena demasiado pequeño frente a «león joven», y יִתֵּן קוֹלוֹ no queda bien representado por «da ... su voz», que en español resulta poco natural y no refleja la decisión auditada «raise its voice». También conviene explicitar el objeto implícito de לָכָד en el texto principal, como hace el inglés POB, para evitar una elipsis dura en español.'
  spanish_quality_summary: 'La primera pregunta suena natural y clara. La segunda presenta español poco idiomático: «¿Da el cachorro de león su voz...?» es forzado, y «si no ha atrapado» queda incompleto de manera más brusca que en inglés. Además, la nota [a] está mal formada porque repite la misma lectura del texto principal en vez de ofrecer la alternativa documentada. Una redacción como «¿Alza un león joven su voz desde su guarida...?» mantiene dignidad, legibilidad y cercanía al original.'
  glossary_alignment: 'No hay términos teológicos de proyecto involucrados. A nivel léxico, conviene alinear כְּפִיר con «león joven» y יִתֵּן קוֹלוֹ con «alza su voz», en vez de «cachorro de león» y «da su voz». «Guarida» es aceptable para מְעֹנָה, con nota alternativa «madriguera» o mejor, siguiendo el inglés auditado, «cueva» no es necesario; la alternativa más cercana documentada es «guarida/lair», por lo que en español puede usarse «refugio» o «guarida» en texto y «madriguera» como alternativa, pero lo más limpio es mantener «guarida» en texto y anotar «O: “desde su madriguera”» solo si se desea una alternativa española real.'
  issues:
  - severity: high
    issue: «Da el cachorro de león su voz» es una formulación poco natural y semánticamente débil para יִתֵּן קוֹלוֹ / כְּפִיר.
    rationale: El hebreo significa idiomáticamente «alzar/emitir su voz», y כְּפִיר denota un león joven, no necesariamente un cachorro. La combinación actual rebaja la imagen y suena artificiosa en español.
  - severity: medium
    issue: La elipsis de «ha atrapado» sin objeto es demasiado abrupta en español.
    rationale: El inglés POB suplió «something» por claridad y dejó la literalidad en nota. En español, «ha atrapado algo» o «ha atrapado presa» comunica mejor el sentido sin exceder el contexto.
  - severity: medium
    issue: La nota [a] no ofrece una alternativa real y está mal redactada.
    rationale: 'Dice «O: desde su guarida», que repite el texto principal. Debe presentar una variante distinta si se mantiene la nota.'
  revised_spanish_text: ¿Ruge un león en el bosque cuando no tiene presa? ¿Alza un león joven su voz desde su guarida[a] a menos que haya atrapado algo?[b]
  revised_footnotes:
