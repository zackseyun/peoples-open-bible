  - marker: a
    text: O «Ten precaución», «Guárdate» o «Cuídate».
    reason: lexical_alternative
  - marker: b
    text: O «maldad», «mal» o «perversidad» para hebreo אָוֶן.
    reason: lexical_alternative
  - marker: c
    text: O «en lugar de la aflicción» o «que la miseria». El sentido es que no debe preferir la maldad al sufrimiento que está padeciendo.
    reason: lexical_alternative
  revision_rationale: Se mantiene la fidelidad léxica del borrador, pero se corrige la sintaxis final para un español más natural y se añade la nota comparativa que el rastro inglés ya documenta para מֵעֹנִי.
