review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español preserva bien la estructura principal del hebreo: resultado profético futuro («Entonces sabrás»), nombre divino «Yahvé», perfecto con relevancia presente («He oído»), hostilidad «contra los montes de Israel», y la cita final sobre desolación y entrega para consumo. Sin embargo, la nota al pie actual no es fiel al rastro auditado en inglés y contiene un anglicismo claro.'
  spanish_quality_summary: 'El texto principal es claro, natural y de registro digno. «Palabras de menosprecio» funciona aceptablemente para נָאָצוֹתֶיךָ, aunque «injurias» o «ultrajes» también serían posibles. El problema principal está en la nota: «revilings» quedó sin traducir al español y la formulación duplicada reduce la utilidad de la alternativa.'
  glossary_alignment: 'Hay buena alineación con la terminología del proyecto: יהוה -> «Yahvé» correctamente; no hay conflictos con términos doctrinales mayores. La decisión sobre נָאָצוֹתֶיךָ evita «blasfemias» en consonancia con la revisión inglesa que prefirió «revilings».'
  issues:
  - severity: medium
    issue: La nota al pie contiene el anglicismo «revilings».
    rationale: La nota debe estar en español y reflejar alternativas léxicas comprensibles para lectores hispanos.
  - severity: low
    issue: La nota al pie repite como alternativa la misma idea ya elegida en el texto («palabras de menosprecio»).
    rationale: Una nota de alternativa debe aportar opciones semánticamente útiles, especialmente porque el rastro inglés ofrece alternativas distintas como «contemptuous words» / «revilings».
  revised_spanish_text: 'Entonces sabrás que yo soy Yahvé. He oído todas tus palabras de menosprecio[a] que hablaste contra los montes de Israel, diciendo: «Están desolados; nos han sido dados para comer».'
  revised_footnotes:
  - marker: a
    text: O «tus palabras de desprecio» o «tus injurias».
    reason: lexical_alternative
  revision_rationale: Se mantiene intacto el texto principal porque es fiel al hebreo y suena natural en español. Solo se corrige la nota al pie para eliminar el anglicismo «revilings» y ofrecer alternativas léxicas españolas que reflejen mejor el rango semántico documentado en el rastro inglés.
