translation:
  language: es
  text: Hiram, rey de Tiro, había abastecido a Salomón con madera de cedro[a], madera de ciprés y oro, según todo su deseo; entonces el rey Salomón dio a Hiram veinte ciudades en la tierra de Galilea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘junípero’, ‘abeto’ u otra conífera; la especie exacta que designa el hebreo berosh es incierta.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִשָּׂא
  english_pob_choice: had supplied
  chosen_spanish: había abastecido
  alternatives_spanish:
  - había provisto
  - había suministrado
  - había dado
  lexicon: HALOT
  rationale: En este contexto, el verbo no se entiende como ‘levantar/cargar’ en sentido literal, sino como ‘proveer/surtir’ recursos a Salomón. El pluscuamperfecto español refleja bien la relación temporal previa al acto principal introducido por אָז.
- source_word: בַּעֲצֵי אֲרָזִים
  english_pob_choice: with cedar timber
  chosen_spanish: con madera de cedro
  alternatives_spanish:
  - con cedro
  - con madera de cedro
  lexicon: HALOT
  rationale: עֵץ en construcción con una especie suele referirse a madera o material de construcción. ‘Madera de cedro’ expresa el valor material sin perder la referencia al árbol.
- source_word: וּבַעֲצֵי בְרוֹשִׁים
  english_pob_choice: and cypress timber
  chosen_spanish: madera de ciprés
  alternatives_spanish:
  - madera de junípero
  - madera de abeto
  - madera de pino
  lexicon: HALOT
  rationale: בְּרוֹשׁ es un término botánico incierto. ‘Ciprés’ es una equivalencia moderna natural en español para este contexto de maderas de construcción, aunque se mantiene la incertidumbre lexical en la nota.
- source_word: וּבַזָּהָב
  english_pob_choice: and gold
  chosen_spanish: y oro
  alternatives_spanish:
  - y el oro
  lexicon: HALOT
  rationale: Término material directo; no requiere expansión.
- source_word: לְכָל חֶפְצוֹ
  english_pob_choice: according to all his desire
  chosen_spanish: según todo su deseo
  alternatives_spanish:
  - para todo lo que deseaba
  - según todo su anhelo
  - conforme a todo su deseo
  lexicon: HALOT
  rationale: חֵפֶץ abarca deseo, gusto o complacencia. ‘Según todo su deseo’ conserva la amplitud semántica y la relación de medida/criterio sin volverlo excesivamente explicativo.
- source_word: אָז
  english_pob_choice: then
  chosen_spanish: entonces
  alternatives_spanish:
  - luego
  lexicon: HALOT
  rationale: Marcador temporal/secuencial que enlaza la provisión previa con la entrega de Salomón.
- source_word: יִתֵּן
  english_pob_choice: gave
  chosen_spanish: dio
  alternatives_spanish:
  - daría
  - entregó
  lexicon: HALOT
  rationale: Aunque la forma verbal es imperfecta, en la secuencia narrativa funciona como pasado. El español natural demanda pasado simple aquí.
- source_word: עֶשְׂרִים עִיר
  english_pob_choice: twenty cities
  chosen_spanish: veinte ciudades
  alternatives_spanish:
  - veinte poblaciones
  - veinte pueblos
  lexicon: HALOT
  rationale: ‘Ciudades’ es el equivalente estándar para עִיר y conserva el peso político del intercambio territorial.
- source_word: בְּאֶרֶץ הַגָּלִיל
  english_pob_choice: in the land of Galilee
  chosen_spanish: en la tierra de Galilea
  alternatives_spanish:
  - en la región de Galilea
  - en el país de Galilea
  lexicon: HALOT
  rationale: אֶרֶץ puede significar ‘tierra’ o ‘región’. ‘Tierra de Galilea’ sigue de cerca el hebreo y suena natural en español bíblico contemporáneo.
- source_word: חִירָם / שְׁלֹמֹה / צֹר
  english_pob_choice: Hiram / Solomon / Tyre
  chosen_spanish: Hiram / Salomón / Tiro
  alternatives_spanish:
  - Jiram / Salomón / Tiro
  lexicon: Conventional proper-name transliteration
  rationale: Se usan las formas estándar en español bíblico para los nombres propios, manteniendo claridad para lectura eclesial sin alterar la identificación histórica/geográfica.
theological_decisions:
- issue: Valor de אָז y יִתֵּן en la secuencia narrativa
  english_pob_reading: then King Solomon gave Hiram twenty cities
  chosen_spanish_reading: entonces el rey Salomón dio a Hiram veinte ciudades
  alternative_spanish_readings:
  - y el rey Salomón dio a Hiram veinte ciudades
  - luego el rey Salomón dio a Hiram veinte ciudades
  rationale: 'No hay tensión doctrinal, pero sí una decisión aspectual: el hebreo usa imperfecto en narrativa secuencial. El español opta por pasado simple para reflejar el evento concluido en la cadena narrativa.'
  doctrine_reference: Narrative aspect; no doctrinal issue
- issue: Término geográfico 'Galilee' y posible lectura regional
  english_pob_reading: in the land of Galilee
  chosen_spanish_reading: en la tierra de Galilea
  alternative_spanish_readings:
  - en la región de Galilea
  rationale: El hebreo dice אֶרֶץ, que puede ser ‘tierra’ o ‘región’. ‘Tierra de Galilea’ conserva la amplitud sin imponer una delimitación administrativa moderna.
  doctrine_reference: Geography/translation equivalence; no doctrinal issue
translation_notes:
  revision_awareness: 'El texto sigue de cerca la traducción inglesa auditada, pero vuelve al hebreo para las decisiones léxicas clave: נִשָּׂא como provisión de recursos, בְרוֹשִׁים como término botánico incierto y אֶרֶץ הַגָּלִיל como ‘tierra de Galilea’. No hay revisiones previas aplicadas al versículo en el paquete fuente; la versión española se alinea con el estado estable del texto inglés.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - 'Se mantiene la convención de nombres propios bíblicos en español: Hiram, Salomón, Tiro, Galilea.'
  - '''Madera de cedro'' y ''madera de ciprés'' conservan el sentido de materiales de construcción del hebreo עֵץ en constructo.'
  - La nota textual/lexical se ancla solo en 'ciprés', donde el hebreo exige una alternativa botánica real por su incertidumbre.
