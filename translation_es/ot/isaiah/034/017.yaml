revisions:
- from: Y él mismo echó la suerte[a] para ellos, y su mano la repartió para ellos con la línea; la poseerán para siempre[b]; de generación en generación habitarán en ella.
  to: Y él mismo echó la suerte[a] a ellas, y su mano la repartió a ellos con cordel; la poseerán para siempre[b]; de generación en generación habitarán en ella.
  rationale: Se ajustan los pronombres para reflejar mejor el hebreo y mejorar la naturalidad española («a ellas / a ellos» en vez de «para ellos»). También se sustituye «con la línea» por «con cordel» como expresión más idiomática para el instrumento de medición territorial, mientras la alternativa más explícita queda en la nota. El resto del verso preserva fielmente el sentido y el tono del original y del audit trail inglés.
