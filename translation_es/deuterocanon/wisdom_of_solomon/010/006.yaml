    rationale: Al mover el marcador a 'las Cinco Ciudades', la explicación queda contextualizada correctamente y mejora la usabilidad.
  revised_spanish_text: Ella rescató a un hombre justo, cuando los impíos perecían, mientras él huía del fuego que descendía[a] sobre las Cinco Ciudades[b].
