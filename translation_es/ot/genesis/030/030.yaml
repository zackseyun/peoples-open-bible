revisions:
- from: Porque lo poco que tenías antes de mí ha crecido hasta abundancia[a], y Yahvé te ha bendecido a mi pie[b]. Y ahora, ¿cuándo haré yo también para mi propia casa?
  to: Porque lo poco que tenías antes de mí ha crecido hasta abundancia, y Yahvé te ha bendecido a mi paso[a]. Y ahora[b], ¿cuándo proveeré yo también para mi propia casa?
  rationale: Se corrigieron los anclajes de las notas para que coincidan con las frases que explican. Se reemplazó «a mi pie» por «a mi paso» para mantener cercanía al hebreo pero con mejor inteligibilidad en español. Se revisó la última cláusula a «¿cuándo proveeré yo también para mi propia casa?» para reflejar el sentido idiomático de עשה...לְבֵיתִי en español natural y fiel.
