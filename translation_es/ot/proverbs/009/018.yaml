translation:
  language: es
  text: Pero él no sabe que allí están los muertos[a], que sus invitados están en lo profundo de Sheol.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las sombras». El hebreo רְפָאִים se refiere a los muertos, los difuntos en Sheol.
    reason: lexical_alternative

lexical_decisions:
- source_word: וְלֹא
  english_pob_choice: But ... not
  chosen_spanish: Pero ... no
  alternatives_spanish:
  - Y ... no
  - Sin embargo ... no
  lexicon: HALOT
  rationale: El hebreo introduce un contraste fuerte con la situación anterior; en español, «Pero» conserva bien el valor adversativo sin volver la frase forzada.
- source_word: יָדַע
  english_pob_choice: he does not know
  chosen_spanish: no sabe
  alternatives_spanish:
  - no ha sabido
  - está sin saber
  lexicon: HALOT
  rationale: En contexto, el perfecto funciona como estado presente de ignorancia. «No sabe» es natural y mantiene esa idea.
- source_word: רְפָאִים
  english_pob_choice: the dead
  chosen_spanish: los muertos
  alternatives_spanish:
  - las sombras
  - los difuntos
  - los Refaím
  lexicon: HALOT
  rationale: En literatura sapiencial, רְפָאִים se refiere a los muertos en Sheol. «Los muertos» es claro y fiel; «sombras» preserva una posible alternativa poética, pero es menos transparente para el lector moderno.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: HALOT
  rationale: El adverbio locativo se refiere al lugar al que conduce el camino seductor; «allí» es la opción más natural en español.
- source_word: בְּעִמְקֵי
  english_pob_choice: in the depths of
  chosen_spanish: en lo profundo de
  alternatives_spanish:
  - en las profundidades de
  - en los hondos lugares de
  lexicon: HALOT
  rationale: La construcción apunta a la imagen de profundidad. «En lo profundo de» mantiene el valor imagístico con español fluido.
- source_word: שְׁאוֹל
  english_pob_choice: Sheol
  chosen_spanish: Sheol
  alternatives_spanish:
  - el sepulcro
  - el reino de los muertos
  - el infierno
  lexicon: HALOT
  rationale: Se preserva el término hebreo para no aplanar su sentido a «sepulcro» ni cargarlo con la teología posterior de «infierno». Esto mantiene la tensión doctrinal y la referencia al ámbito de los muertos.
- source_word: קְרֻאֶיהָ
  english_pob_choice: her guests
  chosen_spanish: sus invitados
  alternatives_spanish:
  - los llamados por ella
  - los que ella invitó
  lexicon: HALOT
  rationale: El participio pasivo con sufijo femenino apunta a los convocados por ella. «Sus invitados» es idiomático en español y conserva la idea de invitación.
theological_decisions:
- issue: Retener Sheol como término propio
  english_pob_reading: Sheol
  chosen_spanish_reading: Sheol
  alternative_spanish_readings:
  - el sepulcro
  - el reino de los muertos
  - el infierno
  rationale: El texto sapiencial describe el destino de la mujer y sus invitados con un término del mundo bíblico que no se debe reducir sin pérdida. Mantener «Sheol» evita importar una identificación doctrinal posterior y conserva la gravedad del pasaje.
  doctrine_reference: 'Términos contenciosos: preservar el vocabulario hebreo cuando la tradición de traducción puede borrar matices teológicos.'
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios y el consenso de control cruzado fue alto; por eso se mantiene la lectura principal de POB para רְפָאִים como «los muertos» y Sheol como término preservado.
  spanish_consistency_notes:
  - Se mantiene «Sheol» de forma consistente como término técnico, no como «sepulcro» o «infierno».
  - Se usa «invitados» para קְרֻאֶיהָ, siguiendo la idea de los convocados por ella sin volver la frase demasiado literal.
  - «Pero... no sabe» reproduce el contraste adversativo y el estado de ignorancia con español natural.
