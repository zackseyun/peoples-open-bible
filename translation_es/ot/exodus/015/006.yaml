translation:
  language: es
  text: Tu mano derecha, oh, Yahvé[a], es majestuosa en poder[b]; tu mano derecha, oh, Yahvé, destroza[c] al enemigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: יהוה; tradicionalmente se traduce «el SEÑOR».'
    reason: lexical_alternative
  - marker: b
    text: O «en fuerza».
    reason: lexical_alternative
  - marker: c
    text: O «aplasta al enemigo».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְמִינְךָ
  english_pob_choice: your right hand
  chosen_spanish: tu mano derecha
  alternatives_spanish:
  - tu diestra
  - tu lado derecho
  lexicon: HALOT
  rationale: '''Mano derecha'' conserva la imagen concreta de יָמִין y su fuerza metafórica de poder/acción victoriosa. ''Diestra'' es posible, pero ''mano derecha'' resulta más transparente en español moderno y sigue de cerca la imagen poética del hebreo.'
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: oh Yahvé
  alternatives_spanish:
  - Yahvé
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino como 'Yahvé', conforme al criterio del proyecto para יהוה. Se añade 'oh' para reflejar la invocación vocativa del hebreo y de la estructura poética del verso.
- source_word: נֶאְדָּרִי
  english_pob_choice: is majestic
  chosen_spanish: es majestuosa
  alternatives_spanish:
  - es gloriosa
  - es espléndida
  - es exaltada
  lexicon: HALOT
  rationale: El adjetivo verbal expresa majestad/gloria/esplendor. En español, 'majestuosa' mantiene el registro elevado y la predicación copulativa sin perder la fuerza poética. Se mantiene la referencia a la mano derecha, que en español acepta concordancia femenina con 'mano'.
- source_word: בַּכֹּחַ
  english_pob_choice: in power
  chosen_spanish: en poder
  alternatives_spanish:
  - en fuerza
  - con poder
  lexicon: HALOT
  rationale: '''כֹּחַ'' abarca poder, fuerza o vigor. ''En poder'' reproduce bien la preposición y el sustantivo sin sonar forzado en español; además conserva la relación semántica con la majestad de la primera cola.'
- source_word: תִּרְעַץ
  english_pob_choice: shatters
  chosen_spanish: destroza
  alternatives_spanish:
  - hace pedazos
  - quiebra
  - aplasta
  lexicon: HALOT
  rationale: 'El verbo denota una acción violenta y decisiva: romper, aplastar, destrozar. ''Destroza'' comunica bien el impacto poético y conserva el matiz de destrucción contundente sin suavizarlo.'
- source_word: אוֹיֵב
  english_pob_choice: the enemy
  chosen_spanish: al enemigo
  alternatives_spanish:
  - al adversario
  - a un enemigo
  - al foe
  lexicon: HALOT
  rationale: Aunque singular, funciona de modo colectivo/representativo en el contexto del cántico del mar. 'Al enemigo' mantiene la idiomaticidad española y el valor colectivo del singular hebreo.
theological_decisions:
- issue: Nombre divino YHWH / יְהוָה
  english_pob_reading: O Yahweh
  chosen_spanish_reading: oh Yahvé
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  rationale: Se sigue la decisión doctrinal del POB de no ocultar el Tetragrámaton tras una sustitución tradicional. 'Yahvé' preserva el nombre del pacto; 'oh' refleja el vocativo poético de la invocación.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'El pasaje coincide con el texto fuente y el audit trail en inglés: no hubo revisiones aplicadas y el último pase quedó sin cambios, con alta concordancia. La versión española mantiene esa misma lectura base, conservando la imaginería concreta de la mano derecha, el nombre divino y el verbo de destrucción con alternativas documentadas en notas.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' para יהוה de manera consistente con el estándar del proyecto.
  - Se mantuvo 'mano derecha' en lugar de 'diestra' para mayor transparencia lexical.
  - Se eligió 'destroza' como equivalente natural de la violencia del hebreo, dejando 'aplasta' como alternativa en nota.
  - La concordancia femenina en 'es majestuosa' sigue al sustantivo 'mano' y no altera el sentido del original.
