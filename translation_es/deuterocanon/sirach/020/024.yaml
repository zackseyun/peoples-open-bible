translation:
  language: es
  text: Una mentira es una mancha vergonzosa en una persona[a]; en la boca de los indisciplinados[b] persistirá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en el hombre». El griego ἐν ἀνθρώπῳ es un singular genérico; aquí se traduce «en una persona» por mayor naturalidad en español, sin cambiar su sentido inclusivo.'
    reason: alternative_reading
  - marker: b
    text: También puede significar «sin instrucción» o «sin formación», pero en este contexto sapiencial parece llevar un matiz moral de falta de disciplina.
    reason: lexical_alternative
lexical_decisions:
- source_word: μῶμος
  english_pob_choice: shameful blemish
  chosen_spanish: mancha vergonzosa
  alternatives_spanish:
  - mancha
  - deshonra
  - oprobio
  lexicon: LSJ
  rationale: μῶμος designa una mancha, reproche o vergüenza moral/social. «Mancha» conserva la imagen concreta; «vergonzosa» expresa el valor evaluativo negativo que el inglés POB resolvió con «shameful».
- source_word: πονηρός
  english_pob_choice: shameful
  chosen_spanish: vergonzosa
  alternatives_spanish:
  - mala
  - moralmente mala
  - perversa
  lexicon: BDAG/LSJ
  rationale: Aquí πονηρός modifica a μῶμος e intensifica su cualidad negativa. En español, «vergonzosa» comunica mejor el sentido social y moral del conjunto que una traducción más abstracta como «mala» o más fuerte como «perversa».
- source_word: ἐν ἀνθρώπῳ
  english_pob_choice: in a person
  chosen_spanish: en el hombre
  alternatives_spanish:
  - en una persona
  - en la humanidad
  lexicon: BDAG/LSJ
  rationale: El singular genérico ἄνθρωπος se conserva con un masculino genérico representativo, siguiendo la política de precisión de género cuando el griego usa una forma masculina con valor inclusivo. En español, «el hombre» mantiene ese valor genérico en un registro bíblico claro.
- source_word: ψεῦδος
  english_pob_choice: a lie
  chosen_spanish: una mentira
  alternatives_spanish:
  - una falsedad
  - el mentir
  lexicon: BDAG/LSJ
  rationale: ψεῦδος puede significar «mentira» o «falsedad». «Una mentira» mantiene la concreción proverbial y funciona naturalmente como predicado nominal en español.
- source_word: ἀπαίδευτος
  english_pob_choice: undisciplined
  chosen_spanish: indisciplinados
  alternatives_spanish:
  - sin instrucción
  - sin formación
  - instruidos
  lexicon: BDAG/LSJ
  rationale: En literatura sapiencial, ἀπαίδευτος no solo indica falta de escuela, sino carencia de formación moral. «Indisciplinados» conserva ese matiz ético mejor que un término meramente académico como «sin instrucción».
- source_word: ἐνδελεχισθήσεται
  english_pob_choice: will be continually present
  chosen_spanish: estará continuamente presente
  alternatives_spanish:
  - persistirá
  - será continua
  - estará siempre
  lexicon: LSJ
  rationale: El futuro pasivo comunica permanencia o continuidad. «Estará continuamente presente» reproduce bien la idea durativa y el matiz proverbial de algo que se halla de manera habitual en la boca.
theological_decisions:
- issue: Valor genérico de ἐν ἀνθρώπῳ
  english_pob_reading: in a person
  chosen_spanish_reading: en el hombre
  alternative_spanish_readings:
  - en una persona
  rationale: La frase griega usa ἄνθρωπος en singular genérico. Se mantiene «el hombre» por su fuerza representativa y porque conserva el paralelismo proverbial sin diluir la referencia antropológica del texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: El control de revisión del inglés POB ajustó «in a man» a «in a person» por naturalidad en inglés, sin cambiar el sentido del singular genérico de ἐν ἀνθρώπῳ. La presente versión española conserva ese valor genérico con «el hombre», y mantiene la imagen proverbial de una mentira como mancha o reproche persistente en la boca de los no formados moralmente.
  spanish_consistency_notes:
  - Se mantuvo un registro sapiencial breve y proverbial, sin expandir el sentido más allá del griego.
  - «Mancha vergonzosa» preserva tanto la imagen concreta como la carga moral del original.
  - «Indisciplinados» se usó de forma consistente con la decisión inglesa de leer ἀπαίδευτος en sentido ético-sapiencial, no meramente académico.
  - La puntuación con punto y coma refleja la estructura bipartita del versículo.
