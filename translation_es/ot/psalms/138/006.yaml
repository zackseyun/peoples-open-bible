base_translation:
  language: en
  yaml_path: translation/ot/psalms/138/006.yaml
  text: For Yahweh is high[a], yet he sees the lowly[c][b]; but the haughty he knows from afar.
  footnotes:
  - marker: a
    text: Or 'the proud.' The Hebrew literally says 'the high one,' here in contrast with 'the lowly' and thus with the sense of arrogance or haughtiness.
    reason: lexical_alternative
  - marker: b
    text: Or 'he recognizes from afar' / 'he keeps at a distance.' The Hebrew says 'he knows from afar,' which may imply relational distance without stating it more explicitly.
    reason: alternative_reading
  - marker: c
    text: Or 'lowly, but'.
    reason: previous_rendering
