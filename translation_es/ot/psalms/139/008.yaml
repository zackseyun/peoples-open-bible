revisions:
- from: Si yo ascendiera al cielo[a], allí estás tú; y si tendiera mi lecho en el Seol[b], he aquí, allí estás tú.
  to: Si yo subiera al cielo, allí estás tú; y si tendiera mi lecho en el Seol[a], he aquí, allí estás tú.
  rationale: Se elimina la nota innecesaria sobre «cielo», se mejora la naturalidad con «subiera», y se conserva «he aquí» para reflejar el matiz enfático/deíctico de הִנֶּךָּ. La transliteración «Seol» y su nota explicativa deben mantenerse por fidelidad léxica y teológica.
