translation:
  language: es
  text: Y cuando esto hubo sucedido, los instó a que, habiéndose dado al banquete, dedicaran la parte actual de este banquete, honrada desde hace mucho, a la alegría.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que apartaran la presente ocasión del banquete, honrada desde hace mucho, como una porción para la alegría». La expresión griega καταθέσθαι μέρος es idiomática y también puede traducirse más literalmente como «poner aparte» o «asignar una parte».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃ δὲ καὶ γενομένου
  english_pob_choice: And when this had happened
  chosen_spanish: Y cuando esto hubo sucedido
  alternatives_spanish:
  - Y cuando esto también ocurrió
  - Y después de que esto hubiera sucedido
  lexicon: LSJ
  rationale: La construcción de genitivo absoluto expresa una acción previa ya cumplida; en español, «cuando esto hubo sucedido» conserva la anterioridad sin sobrecargar el texto. «Esto» mantiene la referencia abierta, como en el griego.
- source_word: παρῄνει
  english_pob_choice: he urged
  chosen_spanish: los exhortaba
  alternatives_spanish:
  - los urgía
  - los animaba
  lexicon: LSJ
  rationale: El verbo tiene fuerza de exhortación/instancia. «Exhortaba» es natural en registro bíblico y conserva una apelación más fuerte que «animaba». Se evita «urgía» por sonar más abrupto en español y «exhortaba» por reflejar mejor el consejo insistente.
- source_word: εἰς εὐωχίαν δόντας ἑαυτούς
  english_pob_choice: having given themselves over to feasting
  chosen_spanish: habiéndose dado al banquete
  alternatives_spanish:
  - habiéndose entregado al festín
  - habiéndose dado a la comida festiva
  lexicon: LSJ
  rationale: El griego expresa entregarse a un contexto de comida/banquete festivo. «Dado al banquete» conserva el matiz de entregarse a esa actividad sin añadir la carga de excesos que «revelry» podría sugerir. «Banquete» encaja mejor con συμποσία.
- source_word: τὸ παρὸν τῆς συμποσίας
  english_pob_choice: the present part of the banquet
  chosen_spanish: la parte presente del convite
  alternatives_spanish:
  - la porción presente del banquete
  - la parte actual del banquete
  lexicon: LSJ
  rationale: «μέρος» pide un sustantivo de porción o parte, no solo ocasión. «Convite» comunica el evento festivo con un tono digno y amplio; «parte presente» refleja literalmente τὸ παρόν. Se conserva la relación partitiva marcada por el griego.
- source_word: ἐπὶ πολὺ γεραιρομένους
  english_pob_choice: long honored
  chosen_spanish: largamente honrada
  alternatives_spanish:
  - desde hace mucho honrada
  - por largo tiempo estimada
  lexicon: LSJ
  rationale: La frase modifica la parte/porción del banquete como algo honrado durante mucho tiempo. «Largamente honrada» preserva la duración y el valor honorífico con un giro español compacto y solemne.
- source_word: εἰς εὐφροσύνην καταθέσθαι μέρος
  english_pob_choice: to devote ... to gladness
  chosen_spanish: dedicaran ... a la alegría
  alternatives_spanish:
  - destinaran ... al gozo
  - apartaran ... para la alegría
  lexicon: LSJ
  rationale: '«καταθέσθαι μέρος» es idiomático: implica asignar/destinar una porción. En español, «dedicar» comunica bien la acción de destinar esa parte a un fin. «Alegría» traduce εὐφροσύνη con naturalidad y sin perder el tono festivo.'
translation_notes:
  revision_awareness: El texto griego fue traducido tomando como guía el valor sintáctico de los participios y la expresión idiomática καταθέσθαι μέρος. Se siguió la revisión inglesa más reciente que ajusta μέρος a «part/parte» en vez de una paráfrasis como «occasion/ocasión», y se mantuvo ese foco partitivo en español.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico moderno, digno y directamente auditable desde el griego.
  - Se prefirió «banquete/convite» para συμποσία según el contexto festivo, evitando equivalentes demasiado técnicos o demasiado coloquiales.
  - No se introdujeron notas de pie porque el español permite expresar la alusión idiomática sin sobrecargar el versículo.
