review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del hebreo: bendición a Yahvé, identificación como Dios de Israel y Creador, don dado a David, descripción del hijo sabio y doble propósito de edificar una casa para Yahvé y una casa para su reino. Mantiene correctamente «Yahvé» y «casa». La principal desviación está en la nota [c], donde «su regla real» no corresponde al sentido de מַלְכוּתוֹ ni al audit trail inglés; debe expresarse como «su reino» o «su realeza/dominio real», con posible alusión al complejo palaciego.'
  spanish_quality_summary: El texto principal es claro, natural y digno. «Entonces Huram dijo» y «Bendito sea Yahvé» funcionan bien. «Que conoce la discreción y el entendimiento» es aceptable, aunque algo rígido; no exige cambio. La nota [c] suena antinatural en español («regla real»). La nota [b] también puede afinarse para reflejar mejor la alternativa inglesa sin sobreexplicar.
  glossary_alignment: 'Buen alineamiento general con la terminología del proyecto: יְהוָה -> «Yahvé», אֱלֹהֵי יִשְׂרָאֵל -> «el Dios de Israel», בַּיִת -> «casa». No hay conflictos doctrinales. Debe corregirse la glosa cultural de לְמַלְכוּתוֹ para no introducir «regla real», que no es una formulación española adecuada ni una representación fiel del término.'
  issues:
  - severity: medium
    issue: La nota [c] usa «su regla real».
    rationale: «Regla real» no es español natural y no representa bien לְמַלְכוּתוֹ. El sentido es «su reino», «su realeza» o «su dominio real», con posible referencia al complejo palaciego.
  - severity: low
    issue: La nota [b] no refleja con precisión la alternativa principal del audit trail inglés.
    rationale: El inglés ofrece sobre todo «having insight and understanding». En español conviene priorizar «con discernimiento y entendimiento» o «con perspicacia y entendimiento», en vez de una explicación más libre como «juicio práctico».
  revised_spanish_text: 'Entonces Huram dijo[a]: «Bendito sea Yahvé, el Dios de Israel, que hizo los cielos y la tierra, que ha dado al rey David un hijo sabio, que conoce la discreción y el entendimiento[b], que edificará una casa para Yahvé y una casa para su reino[c]».'
  revised_footnotes:
  - marker: a
    text: Huram aparece escrito «Hiram» en el pasaje paralelo de 1 Reyes; aquí Crónicas usa la forma hebrea Huram.
    reason: alternative_reading
  - marker: b
    text: 'O: «con discernimiento y entendimiento».'
    reason: lexical_alternative
  - marker: c
    text: Es decir, una casa para su reino o realeza; posiblemente se refiere al complejo del palacio.
    reason: cultural_note
  revision_rationale: Se conserva el texto principal porque es fiel y legible. Se corrigen las notas para alinearlas mejor con el hebreo y con el audit trail inglés, especialmente la nota cultural sobre «su reino», eliminando la expresión impropia «regla real».
