  text: And when the people of the land come before Yahweh at the appointed times[a], whoever enters by way of the north gate to worship shall go out by way of the south gate, and whoever enters by way of the south gate shall go out by way of the north gate. He shall not return by way of the gate through which he entered[c][b], but shall go out straight ahead.
