revisions:
- from: 'Y todos los profetas estaban profetizando así, diciendo: «Sube a Ramot-galaad y ten éxito[a], y Yahvé entregará en mano del rey».'
  to: 'Y todos los profetas estaban profetizando así, diciendo: «Sube a Ramot de Galaad y ten éxito[a], y Yahvé la entregará en manos del rey».'
