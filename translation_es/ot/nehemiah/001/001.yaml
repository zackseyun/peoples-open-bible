translation:
  language: es
  text: Las palabras de Nehemías hijo de Hacalías[a]. Ahora bien, sucedió en el mes de Kislev, en el vigésimo año[b], mientras yo estaba en Susa la ciudadela[c],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «El relato de Nehemías hijo de Hacalías». El hebreo «las palabras de» puede introducir un memorial o registro narrativo.
    reason: lexical_alternative
  - marker: b
    text: El texto hebreo dice «en el año veinte»; no especifica aquí de quién es ese año reinante, aunque el contexto posterior identifica a Artajerjes.
    reason: cultural_note
  - marker: c
    text: O «Susa la fortaleza». El hebreo se refiere a un complejo real fortificado.
    reason: lexical_alternative
lexical_decisions:
- source_word: דִּבְרֵי
  english_pob_choice: The words of
  chosen_spanish: Las palabras de
  alternatives_spanish:
  - El relato de
  - La cuenta de
  lexicon: HALOT
  rationale: El constructo puede introducir tanto un encabezado de autor como un registro narrativo. «Las palabras de» conserva el giro hebreo sin forzar «relato» o «cuenta», y mantiene la misma ambigüedad documentada por la POB en inglés.
- source_word: נְחֶמְיָה
  english_pob_choice: Nehemiah
  chosen_spanish: Nehemías
  alternatives_spanish:
  - Nehemías
  lexicon: transliteración estándar
  rationale: Nombre propio transliterado según la convención bíblica española estándar.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - el hijo de
  lexicon: HALOT
  rationale: La expresión genealógica se rinde de forma natural y fiel en español con «hijo de».
- source_word: חֲכַלְיָה
  english_pob_choice: Hacaliah
  chosen_spanish: Hacalías
  alternatives_spanish:
  - Hacalías
  - Jacalías
  lexicon: transliteración estándar
  rationale: Se conserva el nombre propio en forma transliterada; «Hacalías» sigue el uso bíblico español más reconocible y auditable.
- source_word: וַיְהִי
  english_pob_choice: Now it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y fue
  lexicon: HALOT
  rationale: La fórmula narrativa waw-consecutiva introduce el encuadre de la historia. «Y aconteció» es sobrio y reproduce la función discursiva sin arcaísmo excesivo.
- source_word: בְּחֹדֶשׁ
  english_pob_choice: in the month of
  chosen_spanish: en el mes de
  alternatives_spanish:
  - en el mes
  lexicon: HALOT
  rationale: La preposición y el sustantivo forman una fecha; en español se usa naturalmente «en el mes de» antes del nombre del mes.
- source_word: כסלו
  english_pob_choice: Kislev
  chosen_spanish: Kislev
  alternatives_spanish:
  - Chislev
  lexicon: transliteración estándar
  rationale: Se conserva el nombre del mes en transliteración estándar, como en la tradición académica y bíblica moderna.
- source_word: שְׁנַת עֶשְׂרִים
  english_pob_choice: in the twentieth year
  chosen_spanish: en el año veinte
  alternatives_spanish:
  - en el vigésimo año
  - en el año veinte del rey
  lexicon: HALOT
  rationale: El hebreo dice literalmente «año veinte»; se mantiene esa forma, evitando suplir el referente régio que el versículo no explicita.
- source_word: וַאֲנִי הָיִיתִי
  english_pob_choice: while I was
  chosen_spanish: mientras yo estaba
  alternatives_spanish:
  - y yo estaba
  - cuando yo estaba
  lexicon: HALOT
  rationale: La cláusula da el marco circunstancial del narrador; «mientras yo estaba» comunica bien el valor temporal sin añadir interpretación.
- source_word: בְּשׁוּשַׁן
  english_pob_choice: in Susa
  chosen_spanish: en Susa
  alternatives_spanish:
  - en Shushan
  lexicon: HALOT
  rationale: Se prefiere la forma española usual «Susa» sobre la transliteración más antigua.
- source_word: הַבִּירָה
  english_pob_choice: the citadel
  chosen_spanish: la ciudadela
  alternatives_spanish:
  - la fortaleza
  - la acrópolis
  - la ciudadela fortificada
  lexicon: HALOT
  rationale: El término denota un complejo fortificado o palaciego. «Ciudadela» mantiene el sentido de recinto fuerte y suena más natural en español que «fortaleza» o «capital».
translation_notes:
  revision_awareness: Se siguió el texto hebreo masorético (WLC) y se verificó la alta concordancia con el audit trail inglés; no se incorporaron revisiones posteriores porque no hubo cambios en el pasaje. Se preservó la ambigüedad del encabezado y del año veinte, tal como la POB en inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo contiene el nombre divino; aquí no aparece.
  - «Kislev» se mantiene sin adaptar fonéticamente para conservar la forma bíblica reconocible.
  - «Ciudadela» evita tanto «fortaleza» como «capital» para no perder la idea de recinto fortificado-palaciego.
