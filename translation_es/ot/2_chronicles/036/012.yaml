translation:
  language: es
  text: Hizo lo malo a los ojos de Yahvé su Dios[a], y no se humilló delante de Jeremías el profeta, que hablaba de parte de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «de la boca de Yahvé».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: He did
  chosen_spanish: Hizo
  alternatives_spanish:
  - Y hizo
  - E hizo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; en español, «hizo» conserva la acción sin forzar una repetición innecesaria de «y» al inicio.
- source_word: הָרַע
  english_pob_choice: what was evil
  chosen_spanish: lo malo
  alternatives_spanish:
  - el mal
  - lo que era malo
  lexicon: HALOT
  rationale: La fórmula hebrea עשה הרע expresa cometer lo malo/evil; «lo malo» mantiene el valor evaluativo de manera natural en español y evita una traducción más abstracta que suavice la censura moral.
- source_word: בְּעֵינֵי
  english_pob_choice: in the eyes of
  chosen_spanish: a los ojos de
  alternatives_spanish:
  - a la vista de
  - en la opinión de
  lexicon: HALOT
  rationale: Es el equivalente idiomático más directo en español para el juicio evaluativo de una persona o de Dios.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como nombre propio en español, conforme al criterio del proyecto para יְהוָה, sin sustituirlo por un título.
- source_word: אֱלֹהָיו
  english_pob_choice: his God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios
  - su Dios propio
  lexicon: HALOT
  rationale: 'El sufijo posesivo es importante: señala relación de pacto y responsabilidad. «Su Dios» lo preserva con naturalidad en español.'
- source_word: לֹא נִכְנַע
  english_pob_choice: he did not humble himself
  chosen_spanish: no se humilló
  alternatives_spanish:
  - no se sometió
  - no fue humillado
  lexicon: HALOT
  rationale: 'En contexto, el nifal de כנע tiene valor reflexivo/medio: no aceptó humillarse. «No se humilló» mantiene la lectura moral y evita convertirlo en pasivo.'
- source_word: מִלִּפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: HALOT
  rationale: «Delante de» conserva la relación personal y la idea de comparecer ante alguien; en español es claro y solemne.
- source_word: יִרְמְיָהוּ
  english_pob_choice: Jeremiah
  chosen_spanish: Jeremías
  alternatives_spanish:
  - Jeremías
  lexicon: HALOT
  rationale: Forma española estándar del nombre propio.
- source_word: הַנָּבִיא
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  alternatives_spanish:
  - el profeta
  lexicon: HALOT
  rationale: Se conserva el título apposicional para marcar la autoridad profética de Jeremías.
- source_word: מִפִּי יְהוָה
  english_pob_choice: who spoke from the mouth of Yahweh
  chosen_spanish: que hablaba de parte de Yahvé
  alternatives_spanish:
  - que hablaba de la boca de Yahvé
  - que hablaba desde la boca de Yahvé
  - que hablaba por boca de Yahvé
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «de la boca de Yahvé», pero en español «de parte de Yahvé» comunica de manera natural la mediación profética sin perder el sentido fuente/origen. Se evita una imagen corporal innecesariamente dura si se tradujera de forma literal.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrama; el proyecto pide traducirlo como nombre propio. En español, «Yahvé» es la forma más estable y legible para este registro.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH'
- issue: Función de מִפִּי יְהוָה en la cláusula relativa
  english_pob_reading: who spoke from the mouth of Yahweh
  chosen_spanish_reading: que hablaba de parte de Yahvé
  alternative_spanish_readings:
  - que hablaba de la boca de Yahvé
  - que hablaba por boca de Yahvé
  rationale: La imagen hebrea de mediación profética se preserva conceptualmente. En español, «de parte de» expresa con precisión que Jeremías transmitía un mensaje recibido de Yahvé, sin añadir una interpretación distinta.
  doctrine_reference: 'DOCTRINE.md: Prophetic mediation'
translation_notes:
  revision_awareness: Se sigue el acuerdo alto del control de calidad y no se introducen cambios sustantivos respecto del sentido del texto fuente. La única decisión notable es equilibrar la literalidad de מִפִּי con la naturalidad del español mediante «de parte de Yahvé», dejando la alternativa más literal en nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se mantiene el nombre propio «Jeremías» y el título «el profeta».
  - La evaluación moral se conserva con «lo malo» y «no se humilló», sin atenuar la censura del texto.
