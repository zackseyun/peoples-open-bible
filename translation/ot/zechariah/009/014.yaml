id: ZEC.9.14
reference: Zechariah 9:14
source:
  edition: WLC
  text: וַֽ/יהוָה֙ עֲלֵי/הֶ֣ם יֵֽרָאֶ֔ה וְ/יָצָ֥א כַ/בָּרָ֖ק חִצּ֑/וֹ וַֽ/אדֹנָ֤/י יְהֹוִה֙ בַּ/שּׁוֹפָ֣ר יִתְקָ֔ע וְ/הָלַ֖ךְ בְּ/סַעֲר֥וֹת תֵּימָֽן׃
translation:
  text: Then Yahweh will appear over them[a], and his arrow will go out like lightning[b]; and the Lord GOD will sound the trumpet and march in the whirlwinds of the south.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew shofar, a ram's horn used as a battle signal or ceremonial trumpet.
    reason: cultural_note
  - marker: b
    text: Or 'in the whirlwinds of Teman.' 'Teman' can be understood as a place-name or as 'the south.'
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עֲלֵיהֶם
  chosen: over them
  alternatives:
  - against them
  - above them
  lexicon: HALOT
  rationale: 'The preposition עַל with appearance language naturally gives a spatial sense here: YHWH appearing above/over his people in battle imagery. ''Over them'' preserves the visual force without overinterpreting hostility.'
- source_word: יֵרָאֶה
  chosen: will appear
  alternatives:
  - will be seen
  - will reveal himself
  lexicon: HALOT
  rationale: The Niphal of ראה commonly means 'appear' or 'be seen.' 'Will appear' is idiomatic English and fits the theophanic context.
- source_word: וְיָצָא
  chosen: will go out
  alternatives:
  - will come forth
  - will flash forth
  lexicon: HALOT
  rationale: Although morphologically a qatal with waw, in this prophetic sequence it functions futurally. 'Will go out' preserves the verbal image of the arrow's launch.
- source_word: כַבָּרָק
  chosen: like lightning
  alternatives:
  - as lightning
  - like a lightning bolt
  lexicon: HALOT
  rationale: Standard simile; 'like lightning' is natural modern English and preserves the sudden, flashing imagery.
- source_word: חִצּוֹ
  chosen: his arrow
  alternatives:
  - his dart
  lexicon: HALOT
  rationale: The singular noun with 3ms suffix is straightforward. 'Arrow' is the normal military image in English.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: This title pair is conventionally rendered 'the Lord GOD' in English when אֲדֹנָי precedes YHWH, avoiding the awkward 'Lord LORD' while preserving both elements.
- source_word: בַּשּׁוֹפָר
  chosen: the trumpet
  alternatives:
  - the ram's horn
  - the shofar
  lexicon: HALOT
  rationale: '''Shofar'' denotes a horn used for alarm or battle signal. ''Trumpet'' communicates the function clearly in readable English; the more specific cultural term is preserved in a footnote.'
- source_word: יִתְקָע
  chosen: will sound
  alternatives:
  - will blow
  - will blast
  lexicon: HALOT
  rationale: With שופר as object/instrument, the verb means to blow or sound the horn. 'Will sound' is idiomatic with 'trumpet' in English.
- source_word: וְהָלַךְ
  chosen: and march
  alternatives:
  - and go
  - and advance
  lexicon: HALOT
  rationale: In this martial-theophanic context, 'walk/go' carries the sense of advancing in battle. 'March' brings out the force without excessive paraphrase.
- source_word: בְּסַעֲרוֹת
  chosen: in the storm winds
  alternatives:
  - in whirlwinds
  - in storms
  - with tempests
  lexicon: HALOT
  rationale: The plural noun denotes storm blasts or whirlwinds. 'Storm winds' is vivid, natural English and suits the divine-warrior imagery.
- source_word: תֵּימָן
  chosen: of the south
  alternatives:
  - of Teman
  lexicon: HALOT
  rationale: While Teman can be a place-name, the noun also denotes the south/southland. In this poetic weather-war imagery, 'the south' best fits the sense of storm winds coming from the southern quarter; the place-name alternative is worth preserving in a footnote.
