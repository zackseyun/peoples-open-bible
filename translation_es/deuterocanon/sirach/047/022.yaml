  to: Pero Dios no abandonará su misericordia[a], ni dejará caer por tierra ninguna de sus palabras. No arrancará de su elegido[b] la descendencia y la posteridad, ni destruirá la semilla del que lo amó.
  rationale: Se ajustó la segunda cláusula para expresar con mayor claridad que Dios no eliminará la descendencia procedente de su elegido. «No arrancará de su elegido la descendencia y la posteridad» conserva la fuerza del hebreo, sigue la decisión auditada «from his chosen one» y mejora la naturalidad del español sin perder el paralelismo.
