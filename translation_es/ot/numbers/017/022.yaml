translation:
  language: es
  text: Así Moisés colocó las varas[a] delante de Yahvé, en la tienda del testimonio[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los bastones». El hebreo מַטּוֹת se refiere aquí a las varas físicas que representaban a las tribus.
    reason: lexical_alternative
  - marker: b
    text: O «en el tabernáculo del testimonio». Literalmente, «en la tienda del testimonio».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּנַּח
  english_pob_choice: placed
  chosen_spanish: colocó
  alternatives_spanish:
  - puso
  - dejó
  lexicon: HALOT
  rationale: El hebreo narra una acción concreta de poner algo en su lugar. «Colocó» conserva la idea de ubicación intencional y suena natural en español formal sin perder precisión.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moses
  lexicon: nombre propio bíblico
  rationale: Se usa la forma española estándar del nombre propio.
- source_word: הַמַּטֹּת
  english_pob_choice: the staffs
  chosen_spanish: los bastones
  alternatives_spanish:
  - las varas
  - los cayados
  - los bastones
  lexicon: HALOT
  rationale: מַטֶּה puede referirse a un bastón, vara o bastón ceremonial. Aquí son objetos físicos representativos de las tribus. «Bastones» comunica el soporte material sin imponer una lectura más técnica que el español común.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: HALOT
  rationale: «Delante de» expresa con claridad la posición espacial frente a Yahvé y mantiene el matiz de presentación pública del objeto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: El nombre divino se vierte como «Yahvé» según el criterio del proyecto para el Tetragrámaton, en vez de sustituirlo por un título.
- source_word: בְּאֹהֶל
  english_pob_choice: in the tent
  chosen_spanish: en la tienda
  alternatives_spanish:
  - en el tabernáculo
  lexicon: HALOT
  rationale: «Tienda» reproduce de manera transparente el sustantivo hebreo אֹהֶל. Se evita «tabernáculo» porque introduce una terminología más interpretativa que la forma hebrea inmediata.
- source_word: הָעֵדֻת
  english_pob_choice: the testimony
  chosen_spanish: del testimonio
  alternatives_spanish:
  - del testimonio
  - del testimonio del pacto
  - del documento del testimonio
  lexicon: HALOT
  rationale: «Testimonio» mantiene la ambigüedad reverente del hebreo עֵדוּת y sigue el valor consagrado de la expresión en este contexto sanctuaryal.
theological_decisions:
- issue: Nombre divino יְהוָה en una escena cultual
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo emplea el Tetragrámaton directamente. La versión española conserva el nombre propio divino en forma «Yahvé» para no ocultarlo tras una sustitución titulativa.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: הָעֵדֻת como expresión fija del santuario
  english_pob_reading: the tent of the testimony
  chosen_spanish_reading: la tienda del testimonio
  alternative_spanish_readings:
  - el tabernáculo del testimonio
  - la tienda del testimonio
  rationale: «Tienda del testimonio» sigue de cerca el hebreo y conserva la relación entre el lugar y el contenido sacro del testimonio, sin adelantar una glosa doctrinal más amplia que el verso no exige.
  doctrine_reference: Uso contextual de עֵדוּת en el Pentateuco
translation_notes:
  revision_awareness: 'La revisión más reciente indicó que no hacía falta cambiar la solución inglesa. La presente redacción española sigue de cerca el hebreo y el audit trail inglés: mantiene la acción concreta de colocar, el nombre divino transliterado y la imagen literal de la «tienda del testimonio», sin añadir contenido no atestiguado.'
  spanish_consistency_notes:
  - Se conserva la designación divina como Yahvé/Yahvé con acento gráfico habitual en español, coherente con el criterio del proyecto.
  - «Tienda» se mantiene para אֹהֶל por transparencia; no se usa «tabernáculo» en el texto principal.
  - «Bastones» traduce מַטּוֹת como objeto físico, dejando la alternativa «varas» en nota para la ambigüedad lexical.
  - La construcción «del testimonio» mantiene el genitivo hebreo sin expandirlo innecesariamente.
