translation:
  language: es
  text: Jasón, el hermano de Onías, socavó el sumo sacerdocio, prometiendo al rey, mediante una petición[a], trescientos sesenta talentos de plata[b], y ochenta talentos de alguna otra renta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'por una audiencia' o 'mediante una comparecencia'; el término griego puede referirse a una petición formal o al acceso personal al rey.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'sesenta talentos además de los trescientos', es decir, un total de trescientos sesenta talentos de plata.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπενόθευσεν
  english_pob_choice: undermined
  chosen_spanish: socavó
  alternatives_spanish:
  - corrompió
  - debilitó
  - obtuvo por medios ilícitos
  lexicon: LSJ
  rationale: El verbo griego expresa una acción fraudulenta o que degrada algo valioso; en este contexto, con objeto en el sumo sacerdocio, no describe una simple gestión administrativa. 'Socavó' comunica la subversión moral e institucional del cargo sin añadir detalles que el griego no explicita.
- source_word: ἀρχιερωσύνην
  english_pob_choice: the high priesthood
  chosen_spanish: el sumo sacerdocio
  alternatives_spanish:
  - el oficio de sumo sacerdote
  - la dignidad del sumo sacerdocio
  lexicon: LSJ
  rationale: La expresión designa el cargo o dignidad sacerdotal suprema. 'El sumo sacerdocio' es la forma natural y precisa en español para ese oficio.
- source_word: ἐπαγγειλάμενος
  english_pob_choice: promising
  chosen_spanish: prometiendo
  alternatives_spanish:
  - ofreciendo
  - comprometiéndose a pagar
  lexicon: LSJ
  rationale: 'El participio presenta el medio por el cual actuó Jason: hizo una promesa al rey. ''Prometiendo'' conserva la relación verbal sin convertirla en una formulación financiera más técnica de lo que exige el griego.'
- source_word: διʼ ἐντεύξεως
  english_pob_choice: through a petition
  chosen_spanish: mediante una petición
  alternatives_spanish:
  - por medio de una audiencia
  - por petición
  - mediante un acercamiento
  lexicon: LSJ
  rationale: Ἔντευξις puede significar petición formal o acceso/audiencia con un gobernante. 'Mediante una petición' sigue de cerca la lectura elegida en inglés y mantiene la ambigüedad controlada; la alternativa de audiencia queda preservada en nota.
- source_word: ἀργυρίου
  english_pob_choice: of silver
  chosen_spanish: de plata
  alternatives_spanish:
  - en plata
  lexicon: LSJ
  rationale: El genitivo especifica el metal de los talentos. 'De plata' es la manera normal y clara de expresar la sustancia monetaria en español.
- source_word: τάλαντα ἑξήκοντα πρὸς τοῖς τριακοσίοις
  english_pob_choice: sixty talents of silver in addition to three hundred
  chosen_spanish: trescientos sesenta talentos de plata
  alternatives_spanish:
  - sesenta talentos de plata además de trescientos
  - sesenta talentos de plata en adición a trescientos
  lexicon: LSJ
  rationale: La expresión griega significa literalmente 'sesenta talentos además de los trescientos', es decir, un total de 360. En español, el total es más natural y claro, y evita una construcción enrevesada; la relación literal queda indicada en nota.
- source_word: προσόδου τινὸς ἄλλης
  english_pob_choice: from some other revenue
  chosen_spanish: de algún otro ingreso
  alternatives_spanish:
  - de otro recurso de ingresos
  - de algún otro rédito
  lexicon: LSJ
  rationale: πρόσοδος indica ingreso, renta o rédito. 'Ingreso' comunica bien el sentido económico sin forzar un término técnico o demasiado arcaico.
- source_word: τάλαντα ὀγδοήκοντα
  english_pob_choice: eighty talents
  chosen_spanish: ochenta talentos
  alternatives_spanish:
  - ochenta talentos de plata
  lexicon: LSJ
  rationale: Cantidad monetaria directa; se conserva el valor y la unidad sin añadir un metal que el griego no repite explícitamente en esta segunda cláusula.
theological_decisions:
- issue: Valor moral de la acción de Jason respecto del sumo sacerdocio
  english_pob_reading: Rendered ὑπενόθευσεν as 'undermined' to reflect corrupt subversion of the sacred office.
  chosen_spanish_reading: Se traduce ὑπενόθευσεν como 'socavó' para reflejar la subversión corrupta del cargo sagrado.
  alternative_spanish_readings:
  - corrompió el sumo sacerdocio
  - se hizo con el sumo sacerdocio por medios torcidos
  rationale: El verso no describe una sucesión neutral, sino una adquisición/manipulación moralmente desordenada. 'Socavó' conserva la valoración negativa sin exagerar ni precisar más de lo que el griego permite.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: La versión inglesa revisada reordenó la cantidad para expresar naturalmente el total de 360 talentos; en español se adopta directamente el total explícito, manteniendo en nota la formulación literal griega. Se conserva también la ambigüedad léxica de ἔντευξις mediante una nota equivalente.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como default del proyecto cuando aparezca el nombre divino; en este versículo no ocurre.
  - Se usa 'sumo sacerdocio' para ἀρχιερωσύνην, coherente con el valor de cargo/oficio y con el registro eclesial comprensible en español.
  - Se conserva la condena implícita del acto de Jason mediante un verbo con fuerza negativa, sin neutralizarlo.
