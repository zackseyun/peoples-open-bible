translation:
  language: es
  text: “Sus discípulos le dijeron: «¿En qué día vendrá el reinado[a]?».\n\n[Él dijo][b]: «No vendrá mediante observación. No dirán: \”¡Miren, aquí!\” o \”¡Miren, allí![c]\”. Más bien, el reinado del Padre está esparcido sobre la tierra[d], y la gente no lo ve».”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ⲡⲙⲛⲧⲣⲣⲟ puede traducirse «reino»; «reinado» refleja mejor el matiz abstracto de gobierno o ejercicio de la realeza.
    reason: lexical_alternative
  - marker: b
    text: O simplemente «Él dijo:». El copto pasa directamente de la pregunta a la respuesta sin un verbo narrativo explícito; se añade entre corchetes para claridad en español.
    reason: previous_rendering
  - marker: c
    text: La línea manuscrita favorece «allí»; la normalización del texto copto imprime una forma que podría sugerir «cielo», pero aquí el par retórico es «aquí/allí».
    reason: textual_variant
  - marker: d
    text: «Tierra» también puede entenderse como «suelo» o «territorio»; la imagen es la de algo ya difundido sobre la tierra.
    reason: cultural_note
lexical_decisions:
- source_word: ⲡⲙⲛⲧⲣⲣⲟ
  english_pob_choice: kingship
  chosen_spanish: reinado
  alternatives_spanish:
  - reino
  - realeza
  lexicon: Crum; Layton
  rationale: En copto es una formación abstracta de «rey», y el audit trail inglés privilegia el matiz de gobierno/ejercicio de poder más que un territorio. «Reinado» expresa con naturalidad esa abstracción en español sin forzar una imaginería meramente geográfica.
- source_word: ⲛⲁϣ ⲛϩⲟⲟⲩ
  english_pob_choice: on what day
  chosen_spanish: ¿En qué día?
  alternatives_spanish:
  - ¿Cuándo?
  lexicon: Crum
  rationale: Conservo la literalidad interrogativa de «qué día» para reflejar el valor específico del original, tal como hace la POB inglesa, en vez de suavizarlo a un simple «cuándo».
- source_word: ϭⲱϣⲧ
  english_pob_choice: watching
  chosen_spanish: la observación
  alternatives_spanish:
  - el mirar
  - la vigilancia
  lexicon: Crum
  rationale: El sustantivo copto apunta a observar/estar mirando en busca de señales. «La observación» preserva el sentido nominal y la oposición con una expectativa de signos externos.
- source_word: ⲉⲓⲥϩⲏⲏⲧⲉ
  english_pob_choice: Look!
  chosen_spanish: ¡Miren!
  alternatives_spanish:
  - ¡Vean!
  - ¡Miren,
  lexicon: Crum
  rationale: «Miren» reproduce el imperativo deíctico con fuerza oral y encaja de modo natural en español para el doble grito aquí/allí.
- source_word: ⲡⲓⲥⲁ
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - este lugar
  lexicon: Crum
  rationale: La forma deíctica funciona como «aquí» en la fórmula «aquí/allí»; mantenerla evita volver la frase pesada.
- source_word: ⲧⲏ / ⲡⲏ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - el cielo/el cielo arriba
  lexicon: Crum
  rationale: Sigo la lectura deíctica del audit trail inglés, que favorece «allí» por el paralelismo «aquí/allí». Esto mantiene la tensión textual señalada entre el testimonio de línea y la normalización.
- source_word: ⲥⲡⲱⲣϣ
  english_pob_choice: is spread out
  chosen_spanish: está esparcido
  alternatives_spanish:
  - está extendido
  - ha sido esparcido
  - está disperso
  lexicon: Crum
  rationale: «Está esparcido» conserva el matiz de algo ya difundido y presente, sin volverlo demasiado estático ni introducir una acción puntual que el copto no exige.
- source_word: ϩⲓϫⲛ ⲡⲕⲁϩ
  english_pob_choice: upon the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre la tierra
  - sobre el suelo
  - en la tierra
  lexicon: Crum
  rationale: «Sobre la tierra» reproduce la imagen espacial concreta y mantiene la resonancia cósmica posible de ⲡⲕⲁϩ, sin decidir innecesariamente entre «tierra» y «suelo/land».
- source_word: ⲛⲣⲱⲙⲉ
  english_pob_choice: people
  chosen_spanish: la gente
  alternatives_spanish:
  - las personas
  - los hombres
  lexicon: Crum
  rationale: Término genérico e inclusivo, equivalente al plural humano del original. «La gente» suena natural en español y evita restringir el referente a varones.
theological_decisions:
- issue: ¿Cómo traducir ⲡⲙⲛⲧⲣⲣⲟ en un dicho sobre la llegada del gobierno divino?
  english_pob_reading: kingship emphasizes abstract reign/rule rather than territorial kingdom.
  chosen_spanish_reading: reinado
  alternative_spanish_readings:
  - reino
  - realeza
  rationale: El dicho pregunta por la llegada de la autoridad/gobierno divino, no solo por un dominio territorial. «Reinado» preserva esa abstracción y deja abierta la tensión interpretativa entre «reino» como esfera y «reinado» como ejercicio soberano.
  doctrine_reference: Reinado de Dios / reino de Dios
- issue: ¿Qué hacer con el verbo sin sujeto explícito en la respuesta?
  english_pob_reading: '[He said] marks an editorial supply absent from the Coptic.'
  chosen_spanish_reading: '[Él dijo]:'
  alternative_spanish_readings:
  - 'Dijo:'
  - —
  rationale: El copto no trae un verbo narrativo explícito antes de la respuesta, así que el español lo marca entre corchetes para transparentar la suplencia editorial, siguiendo el criterio auditado de la versión inglesa.
  doctrine_reference: Transparencia textual y crítica editorial
- issue: ¿Debe leerse el final como «aquí/allí» o como «cielo/heaven»?
  english_pob_reading: The line-level witness supports here/there; heaven would be contextually awkward.
  chosen_spanish_reading: aquí / allí
  alternative_spanish_readings:
  - aquí / el cielo
  - aquí / allá
  rationale: La estructura retórica del dicho exige una pareja deíctica inmediata. Traducir «allí» mantiene el paralelo y refleja la decisión textual de la POB inglesa frente a la lectura normalizada que sugeriría «cielo».
  doctrine_reference: Crítica textual / deícticos espaciales
translation_notes:
  revision_awareness: La versión inglesa reciente mantiene la nota de omisión editorial en la respuesta ([He said]) y resuelve el final con el par deíctico «here/there» frente a la variante normalizada que podría sugerir «heaven». Esta propuesta española sigue esa lectura, conservando la transparencia textual y el matiz abstracto de ⲡⲙⲛⲧⲣⲣⲟ como «reinado».
  spanish_consistency_notes:
  - Se usa «reinado» de modo consistente para ⲡⲙⲛⲧⲣⲣⲟ, reservando «reino» como alternativa anotada, no en el texto principal.
  - 'Se mantiene la puntuación con dos oraciones: pregunta de los discípulos y respuesta atribuida editorialmente entre corchetes.'
  - Se conserva la pareja deíctica «aquí/allí» para reflejar la tensión textual del testimonio manuscrito.
  - «La gente» traduce el plural humano general sin introducir masculino genérico.
  - El texto principal evita «SEÑOR» o «Cristo» porque no aparecen en este dicho ni en la fuente copta.
