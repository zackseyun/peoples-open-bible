base_translation:
  language: en
  yaml_path: translation/ot/genesis/032/018.yaml
  text: And he commanded the first one[a], saying, “When Esau my brother meets you and asks you, saying, ‘To whom do you belong, and where are you going[e][d][c][b], and to whom do these before you belong?’...”
  footnotes:
  - marker: a
    text: Or, “If Esau my brother meets you.” The Hebrew particle can introduce either an expected or conditional circumstance; the main text uses “When” because Jacob anticipates the encounter.
    reason: alternative_reading
  - marker: b
    text: “Whose are you” expresses belonging or ownership; alternatively, “To whom do you belong?”
    reason: lexical_alternative
  - marker: c
    text: Or, “whose are these ahead of you?” The Hebrew literally says “before you.”
    reason: lexical_alternative
  - marker: d
    text: Or 'and asks you, saying,'.
    reason: previous_rendering
  - marker: e
    text: Or 'whose are these before you?’”'.
    reason: previous_rendering
