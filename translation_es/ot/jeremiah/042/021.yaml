revisions:
- from: Yo os lo he dicho hoy[a], pero no habéis obedecido la voz de Yahvé vuestro Dios ni nada de lo que él me envió a vosotros.
  to: Hoy[a] les he hecho saber esto, pero ustedes no han obedecido la voz de Yahvé su Dios ni todo aquello para lo cual él me envió a ustedes.
  rationale: 'Se revisa para: 1) ajustar el español al registro neutral latinoamericano («les», «ustedes», «su»); 2) expresar con mayor naturalidad y dignidad profética וָאַגִּד como «les he hecho saber»; 3) mantener el valor obediencial de שׁמע בקול con «han obedecido la voz de»; y 4) corregir la cláusula final para reflejar la totalidad del encargo profético: «ni todo aquello para lo cual él me envió a ustedes». La nota alternativa preserva las opciones más literales «hice saber» y «no escucharon».'
  reviewer_model: gpt-5.4
