revisions:
- from: en cuanto a nuestra campaña a Asia[a], que ustedes mismos también conocen, la cual, por la alianza infalible de los dioses, fue llevada, como era de esperarse, hasta su conclusión[b],
  to: en cuanto a nuestra campaña hacia Asia, que ustedes mismos también conocen, la cual, por la alianza inquebrantable[a] de los dioses, fue llevada, como correspondía, hasta su conclusión[b],
  rationale: La revisión corrige el anclaje erróneo de la nota [a], mejora la precisión semántica de κατὰ λόγον con «como correspondía», y sustituye «infalible» por «inquebrantable» para reflejar mejor en español la firmeza de ἀρρωστῷ en una alianza militar. También se ajusta «a Asia» a «hacia Asia» para expresar con mayor naturalidad la dirección implícita en εἰς.
