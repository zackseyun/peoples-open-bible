id: HOS.8.8
reference: Hosea 8:8
source:
  edition: WLC
  text: נִבְלַ֖ע יִשְׂרָאֵ֑ל עַתָּה֙ הָי֣וּ בַ/גּוֹיִ֔ם כִּ/כְלִ֖י אֵֽין חֵ֥פֶץ בּֽ/וֹ־׃
translation:
  text: Israel is swallowed up[a]; now they are among the nations like a vessel in which there is no delight.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like a vessel that no one desires.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נִבְלַע
  chosen: is swallowed up
  alternatives:
  - has been swallowed up
  - is consumed
  lexicon: HALOT
  rationale: Nifal of בלע conveys being swallowed/engulfed. Present English captures the prophetic perfect vividly while preserving the passive sense; 'consumed' is possible but less concrete.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  rationale: Proper name referring to the northern kingdom/personified nation; transliterated per philosophy.
- source_word: עַתָּה
  chosen: now
  alternatives:
  - already
  - at this time
  lexicon: HALOT
  rationale: Temporal adverb marking the present consequence of prior judgment.
- source_word: הָיוּ
  chosen: they have become
  alternatives:
  - they are
  - they were
  lexicon: HALOT
  rationale: 'Though morphologically perfect 3cp, with עתה it naturally expresses resultant state: ''have become.'' The plural agrees with the people of Israel rather than the singular collective name.'
- source_word: בַגּוֹיִם
  chosen: among the nations
  alternatives:
  - among the Gentiles
  - in the nations
  lexicon: HALOT
  rationale: גוים here denotes foreign peoples/nations. 'Among the nations' is the most natural and least theologically loaded in this prophetic context; 'Gentiles' could import later Jewish/NT associations.
- source_word: כִּכְלִי
  chosen: like a vessel
  alternatives:
  - like an object
  - like a container
  lexicon: HALOT
  rationale: כְּלִי commonly means vessel/implement/article. 'Vessel' preserves the metaphor and biblical register without becoming obscure.
- source_word: אֵין חֵפֶץ בּוֹ
  chosen: in which there is no delight
  alternatives:
  - that no one desires
  - with which there is no pleasure
  - that is unwanted
  lexicon: HALOT
  rationale: The phrase literally states absence of delight/pleasure in it. This rendering stays close to the Hebrew while making explicit the relation to the vessel. 'Unwanted' is concise but compresses the idiom.
