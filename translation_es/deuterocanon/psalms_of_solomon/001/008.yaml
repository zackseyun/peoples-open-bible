revisions:
- from: Sus iniquidades superaron[a] a las de las naciones que hubo antes de ellos; profanaron[b] las cosas santas de Yahvé con profanación.
  to: Sus actos de maldad superaron[a] a los de las naciones anteriores a ellos; profanaron[b] lo santo de Yahvé[c] con profanación.
  rationale: Se revisa «iniquidades» a «actos de maldad» para reflejar mejor el valor plural-concreto de αἱ ἀνομίαι y la decisión auditada «lawless deeds». Se alisa «las naciones que hubo antes de ellos» a «las naciones anteriores a ellos» por naturalidad. Se cambia «las cosas santas de Yahvé» por «lo santo de Yahvé», que suena más idiomático en español y conserva la amplitud del plural griego; se añade nota para mantener explícitas las alternativas «las cosas santas», «el santuario» y «los lugares santos». También se corrige el error de idioma en la nota b.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:33:42Z'
