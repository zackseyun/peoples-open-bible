translation:
  language: es
  text: No sea que extraños se sacien de tu fuerza[a], y tu trabajo vaya a la casa de un forastero[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “se llenen de tu fuerza”. El verbo hebreo puede significar ser llenados o quedar satisfechos.'
    reason: lexical_alternative
  - marker: b
    text: ‘Tu trabajo’ también puede aludir al fruto de tu trabajo o a tus bienes ganados con esfuerzo.
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: No sea que
  alternatives_spanish:
  - para que no
  - de otro modo
  lexicon: HALOT
  rationale: Expresa con naturalidad en español el valor admonitorio preventivo del hebreo, sin debilitar la advertencia.
- source_word: יִשְׂבְּעוּ
  english_pob_choice: be filled
  chosen_spanish: se sacien
  alternatives_spanish:
  - se llenen
  - tengan su llenura
  - queden satisfechos
  lexicon: HALOT
  rationale: ‘Saciarse’ conserva la imagen de llenarse hasta el límite y permite en español la idea de enriquecerse a costa de otro. Además, mantiene abierta la nota lexical sobre ‘ser llenado’ o ‘quedar satisfecho’.
- source_word: זָרִים
  english_pob_choice: strangers
  chosen_spanish: extraños
  alternatives_spanish:
  - forasteros
  - ajenos
  - extranjeros
  lexicon: HALOT
  rationale: ‘Extraños’ comunica bien la idea de personas fuera del círculo propio y funciona en paralelismo con ‘forastero’ en la segunda cola.
- source_word: כֹּחֶךָ
  english_pob_choice: your strength
  chosen_spanish: tu fuerza
  alternatives_spanish:
  - tu vigor
  - tu poder
  - tus recursos
  lexicon: HALOT
  rationale: ‘Fuerza’ es la equivalencia más directa y amplia; deja que el contexto sugiera la dimensión productiva o económica sin estrechar demasiado el hebreo.
- source_word: וַעֲצָבֶיךָ
  english_pob_choice: your labors
  chosen_spanish: tu trabajo
  alternatives_spanish:
  - tu labor
  - tu arduo trabajo
  - el fruto de tu trabajo
  lexicon: HALOT
  rationale: El singular colectivo ‘tu trabajo’ suena natural en español y abarca tanto el esfuerzo como lo producido por él. Esto conserva la tensión del hebreo entre labor y resultados.
- source_word: בְּבֵית
  english_pob_choice: go to the house of
  chosen_spanish: vaya a la casa de
  alternatives_spanish:
  - entre en la casa de
  - termine en la casa de
  lexicon: HALOT
  rationale: ‘Vaya a la casa de’ explicita el movimiento implícito en la preposición y mantiene el sentido de transferencia a otro hogar.
- source_word: נָכְרִי
  english_pob_choice: a foreigner
  chosen_spanish: un forastero
  alternatives_spanish:
  - un extranjero
  - un ajeno
  - otro hombre
  lexicon: HALOT
  rationale: ‘Forastero’ distingue esta palabra de ‘extraños’ y preserva la idea de alguien ajeno al propio ámbito familiar o comunitario.
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que los marcadores [a] y [b] aparezcan exactamente en el texto español donde corresponden.
  spanish_consistency_notes:
  - Se evitó ‘SEÑOR’ y no hay término divino en este versículo.
  - Se mantuvo el contraste léxico entre ‘extraños’ y ‘forastero’, conforme al audit trail inglés.
  - Se conservó la ambigüedad entre esfuerzo y resultado material en ‘tu trabajo’, con nota explicativa.
  - La formulación ‘No sea que’ mantiene el tono sapiencial de advertencia sin añadir interpretación.
  - No se introdujeron términos eclesiásticos no presentes en el hebreo.
