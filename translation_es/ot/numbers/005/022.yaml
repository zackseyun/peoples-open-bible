translation:
  language: es
  text: 'y que estas aguas de maldición entren en tus entrañas[a], haciendo que el vientre se hinche y el muslo caiga[b]. Y la mujer dirá: «Amén, amén».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en tus partes internas». El hebreo מֵעֶה puede referirse a las entrañas o a los órganos internos; la expresión es corporal, solemne y deliberadamente imprecisa.'
    reason: lexical_alternative
  - marker: b
    text: 'O, más literalmente: «para hinchar el vientre y para hacer caer el muslo». La expresión hebrea es difícil y puede ser un eufemismo para una aflicción reproductiva.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָאוּ
  english_pob_choice: and may ... enter
  chosen_spanish: y que ... entren
  alternatives_spanish:
  - y que ... hayan de entrar
  - y entrarán
  lexicon: HALOT
  rationale: En este contexto ritual-jurídico la forma verbal expresa un deseo/imprecación performativa, no simple futuro. En español, «y que ... entren» conserva bien ese matiz volitivo sin volver la frase pesada o artificial.
- source_word: הַמַּיִם
  english_pob_choice: waters
  chosen_spanish: estas aguas
  alternatives_spanish:
  - esta agua
  - estas aguas
  lexicon: HALOT
  rationale: El hebreo es plural; «aguas» preserva el número y el tono ritual. Se añade «estas» para reflejar el demostrativo הָאֵלֶּה.
- source_word: הַמְאָרְרִים
  english_pob_choice: curse-bringing
  chosen_spanish: de maldición
  alternatives_spanish:
  - malditas
  - que traen maldición
  - de maldición
  lexicon: HALOT
  rationale: El participio de ארר indica aguas caracterizadas por la maldición o que la producen. «De maldición» es conciso y evita resolver en exceso si la frase describe cualidad o efecto.
- source_word: בְּמֵעַיִךְ
  english_pob_choice: your inward parts
  chosen_spanish: en tus entrañas
  alternatives_spanish:
  - en tus entrañas
  - en tus partes internas
  - en tu abdomen
  lexicon: HALOT
  rationale: «Entrañas» comunica con dignidad la concreción corporal de מֵעֶה sin sonar tan clínico como «abdomen» ni tan arcaico como «entrañas» en un registro bíblico tradicional. Mantiene la ambigüedad anatómica del hebreo.
- source_word: לַצְבּוֹת בֶּטֶן
  english_pob_choice: causing the belly to swell
  chosen_spanish: causando que el vientre se hinche
  alternatives_spanish:
  - haciendo que el vientre se hinche
  - para hinchar el vientre
  - causando que el vientre se hinche
  lexicon: HALOT
  rationale: La construcción final expresa resultado. «Vientre» es el equivalente natural de בֶּטֶן en español bíblico moderno y conserva la posible referencia reproductiva sin especificarla.
- source_word: וְלַנְפִּל יָרֵךְ
  english_pob_choice: and the thigh fall away
  chosen_spanish: y el muslo se caiga
  alternatives_spanish:
  - y el muslo caiga
  - y el muslo se vaya
  - y la cadera se caiga
  lexicon: HALOT
  rationale: El hebreo es idiomático y difícil. «Se caiga» refleja el valor de נפל de manera directa y mantiene la imagen corporal sin adelantar una interpretación médica concreta. «Muslo» sigue el equivalente más literal de יָרֵךְ.
- source_word: יָרֵךְ
  english_pob_choice: thigh
  chosen_spanish: muslo
  alternatives_spanish:
  - muslo
  - cadera
  - lomo
  lexicon: HALOT
  rationale: «Muslo» es el equivalente más directo y claro en español actual. Aunque el término hebreo puede tener valor eufemístico, traducirlo con una palabra neutral preserva esa posible ambigüedad.
- source_word: וְאָמְרָה הָאִשָּׁה
  english_pob_choice: And the woman shall say
  chosen_spanish: Y la mujer dirá
  alternatives_spanish:
  - Y la mujer responderá
  - Entonces la mujer dirá
  - Y la mujer dirá
  lexicon: HALOT
  rationale: La respuesta es una fórmula prescrita dentro de un rito. «Dirá» conserva el carácter de respuesta oral obligatoria sin sobrecargarlo con modalizaciones que el hebreo no exige.
- source_word: אָמֵן אָמֵן
  english_pob_choice: Amen, amen
  chosen_spanish: Amén, amén
  alternatives_spanish:
  - Amén, amén
  - Así sea, así sea
  - Verdaderamente, verdaderamente
  lexicon: HALOT
  rationale: Se conserva la fórmula litúrgica tradicional, que en español es plenamente inteligible y mantiene la solemnidad y el eco ritual del hebreo.
theological_decisions:
- issue: Naturaleza del efecto corporal del juramento/juicio
  english_pob_reading: Render the effects in relatively literal but readable terms without specifying miscarriage, infertility, or uterine prolapse in the main text.
  chosen_spanish_reading: Mantener el efecto corporal en términos literales y legibles («vientre se hinche» / «muslo se caiga») sin especificar en el texto principal aborto, esterilidad ni un diagnóstico médico concreto.
  alternative_spanish_readings:
  - para hacer abortar el vientre
  - para que el vientre se hinche y el muslo se desprenda
  - para que el vientre se hinche y los órganos reproductivos se dañen
  rationale: El hebreo es notoriamente difícil y posiblemente eufemístico. La traducción no debe resolver la tensión con una interpretación médica cerrada donde el texto fuente no la proporciona de manera inequívoca. Se preserva así el carácter solemne y la ambigüedad del juicio.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que prefirió «causing ... to fall away» para acercarse más al hebreo. Por eso el español usa una estructura de resultado («causando que...») y un verbo de caída («se caiga») en vez de una paráfrasis más interpretativa. También se mantuvo la ambigüedad sobre el efecto exacto del maleficio, tal como lo hace el texto inglés revisado.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» en textos donde apareciera el nombre divino, pero este versículo no lo contiene.
  - «Amén, amén» se conserva sin traducción para mantener la fórmula litúrgica reconocible.
  - Se eligió «entrañas» como equivalente del campo semántico de מֵעֶה en el texto principal, con nota para la alternativa más neutra.
  - «Muslo» traduce יָרֵךְ sin explicitar el posible eufemismo reproductivo; esa posible resonancia queda abierta como en el original.
