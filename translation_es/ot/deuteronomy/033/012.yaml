base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/033/012.yaml
  text: 'And of Benjamin he said: “The beloved of Yahweh dwells in safety by him[a]; he shields him all the day[b], and he dwells between his shoulders.”'
  footnotes:
  - marker: a
    text: Or 'dwells securely beside him,' or 'dwells securely under him/over him'; the Hebrew preposition is compact and may express nearness or protective oversight.
    reason: lexical_alternative
  - marker: b
    text: Literally 'between his shoulders.' Some understand this figuratively of protective closeness; others take it topographically of Benjamin's hill country or the sanctuary located in Benjamin's territory.
    reason: alternative_reading
