  glossary_alignment: 'No hay conflictos con la terminología de proyecto. Las decisiones clave siguen razonablemente la auditoría inglesa. La principal corrección necesaria es mover la nota de γένεσις a ''descendencia'' y ajustar el texto para una mejor correspondencia semántica: γυναῖκες -> ''mujeres'' con alternativa ''esposas''; ἄφρονες -> ''necias''; πονηρά -> ''perversos''; τέκνα -> ''hijos''; ἐπικατάρατος -> ''maldita''; γένεσις -> ''descendencia'' con nota de alternativas.'
