review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la sintaxis y el sentido general del griego: Nebucodonosor envía a diversos pueblos/regiones, conserva «rey de los asirios», refleja correctamente «Persia» y el valor direccional de πρὸς δυσμαῖς como «hacia el occidente». También mantiene adecuadamente la serie geográfica. Sin embargo, «frente a la costa» no transmite bien κατὰ πρόσωπον παραλίας en este contexto; el inglés auditado justificó «along the seacoast», y en español una formulación como «a lo largo de la costa» o «junto a la costa» preserva mejor la referencia a la franja costera habitada, evitando la idea de estar mar adentro o enfrente de la costa.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero presenta dos detalles de estilo/puntuación mejorables: el punto final después de la raya de cierre es innecesario, y «frente a la costa» suena menos natural y potencialmente ambiguo en español bíblico moderno. El resto del verso es legible y fiel.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Los topónimos «Persia», «Cilicia», «Damasco», «Líbano» y «Antilíbano» están bien. «Envió» y «habitaban» son opciones naturales y fieles. La única decisión léxica a ajustar es κατὰ πρόσωπον παραλίας.
  issues:
  - severity: medium
    issue: «frente a la costa» para κατὰ πρόσωπον παραλίας
    rationale: En español, «frente a la costa» suele sugerir ubicación opuesta o mar adentro, mientras que el contexto y la auditoría inglesa apuntan a habitantes de la franja litoral. «A lo largo de la costa» expresa mejor el sentido geográfico.
  - severity: low
    issue: Puntuación final «—.»
    rationale: La combinación de raya de cierre seguida de punto resulta innecesaria aquí; basta la raya de cierre, como en el inglés auditado con guion largo de inciso.
  revised_spanish_text: Y Nabucodonosor, rey de los asirios, envió a todos los que habitaban en Persia y a todos los que habitaban hacia el occidente[a] —a los que habitaban en Cilicia y Damasco, el Líbano y el Antilíbano, y a todos los que habitaban a lo largo de la costa—
  revised_footnotes:
  - marker: a
    text: O «hacia las regiones occidentales». El griego dice literalmente «a todos los que habitaban hacia el occidente».
    reason: lexical_alternative
  revision_rationale: Se conserva la estructura y las decisiones principales del borrador, pero se corrige la expresión final para reflejar mejor el sentido geográfico de κατὰ πρόσωπον παραλίας y se limpia la puntuación final. No se requiere nota nueva, porque el cambio mejora claridad sin introducir ambigüedad adicional.
