translation:
  language: es
  text: 'Entonces David reunió en Jerusalén a todos los líderes de Israel: los líderes de las tribus, los líderes de las divisiones que servían al rey, los comandantes de miles y de cientos, y los líderes encargados de todas las propiedades y del ganado que pertenecían al rey y a sus hijos, junto con los oficiales[a], los hombres valientes y todo hombre valeroso.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'eunucos'; el término hebreo puede referirse a eunucos literales o, más generalmente, a oficiales de la corte real.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּקְהֵל
  english_pob_choice: assembled
  chosen_spanish: reunió
  alternatives_spanish:
  - convocó
  - juntó
  lexicon: HALOT
  rationale: El hiphil de קהל expresa hacer una reunión formal. En español, 'reunió' transmite con naturalidad la acción de congregar a un grupo amplio y oficial sin perder el matiz de convocatoria pública.
- source_word: שָׂרֵי יִשְׂרָאֵל
  english_pob_choice: the leaders of Israel
  chosen_spanish: los líderes de Israel
  alternatives_spanish:
  - los oficiales de Israel
  - los príncipes de Israel
  lexicon: HALOT
  rationale: '''Líderes'' es el término más amplio y neutral para שַׂר en este contexto, donde la lista incluye categorías administrativas y militares.'
- source_word: שָׂרֵי הַשְּׁבָטִים
  english_pob_choice: the leaders of the tribes
  chosen_spanish: los líderes de las tribus
  alternatives_spanish:
  - los jefes de las tribus
  - los príncipes de las tribus
  lexicon: HALOT
  rationale: La construcción es directa y el paralelismo con 'líderes de Israel' se conserva bien con 'líderes'.
- source_word: הַמַּחְלְקוֹת הַמְשָׁרְתִים אֶת הַמֶּלֶךְ
  english_pob_choice: the divisions that served the king
  chosen_spanish: las divisiones que servían al rey
  alternatives_spanish:
  - las divisiones que ministraban al rey
  - los cursos que servían al rey
  lexicon: HALOT
  rationale: מַחְלְקוֹת alude a divisiones u órdenes organizados; מְשָׁרְתִים expresa servicio. 'Que servían al rey' mantiene la relación funcional y suena natural en español.
- source_word: שָׂרֵי הָאֲלָפִים
  english_pob_choice: the commanders of thousands
  chosen_spanish: los comandantes de miles
  alternatives_spanish:
  - los capitanes de miles
  - los jefes de miles
  lexicon: HALOT
  rationale: '''Comandantes'' encaja con el campo militar-administrativo y ''miles'' traduce el número/unidad sin añadir especificación innecesaria.'
- source_word: שָׂרֵי הַמֵּאוֹת
  english_pob_choice: of hundreds
  chosen_spanish: de centenas
  alternatives_spanish:
  - de cientos
  - los comandantes de centenas
  lexicon: HALOT
  rationale: '''Centenas'' mantiene el paralelismo formal con ''miles'' y refleja la unidad organizativa del hebreo con un registro sobrio.'
- source_word: רְכוּשׁ וּמִקְנֶה
  english_pob_choice: property and livestock
  chosen_spanish: propiedades y del ganado
  alternatives_spanish:
  - bienes y ganado
  - posesiones y ganado
  lexicon: HALOT
  rationale: רְכוּשׁ puede designar propiedad/bienes; מִקְנֶה, ganado. Se conserva la pareja semántica sin sobreexplicar.
- source_word: לַמֶּלֶךְ וּלְבָנָיו
  english_pob_choice: belonging to the king and to his sons
  chosen_spanish: del rey y de sus hijos
  alternatives_spanish:
  - pertenecientes al rey y a sus hijos
  - para el rey y para sus hijos
  lexicon: HALOT
  rationale: El hebreo expresa relación posesiva/afiliativa; en español la simple coordinación con 'de' es suficientemente clara y menos pesada que una perífrasis explicativa.
- source_word: הַסָּרִיסִים
  english_pob_choice: the officials
  chosen_spanish: los oficiales[a]
  alternatives_spanish:
  - los eunucos
  lexicon: HALOT
  rationale: Se mantiene la opción más amplia adoptada en el audit trail inglés. La nota recoge la alternativa lexical 'eunucos', ya que el término hebreo puede abarcar tanto funcionarios de corte como eunucos literales.
- source_word: הַגִּבּוֹרִים
  english_pob_choice: the mighty men
  chosen_spanish: los hombres valientes
  alternatives_spanish:
  - los guerreros
  - los valientes
  lexicon: HALOT
  rationale: En Crónicas, גִּבּוֹרִים puede referir a guerreros de renombre. 'Hombres valientes' conserva el sentido de fuerza y valor militar en un español claro; 'mighty men' no tiene equivalente idiomático perfecto, y esta opción evita arcaísmo.
- source_word: כָל גִּבּוֹר חָיִל
  english_pob_choice: every mighty man of valor
  chosen_spanish: todo hombre valiente de guerra
  alternatives_spanish:
  - todo valiente guerrero
  - todo hombre de valor
  lexicon: HALOT
  rationale: La combinación גִּבּוֹר + חָיִל intensifica la idea de fuerza/valor bélico. 'De guerra' explicita el trasfondo militar que el hebreo sugiere sin reducirlo a un simple adjetivo moral.
- source_word: אֶל יְרוּשָׁלִָם
  english_pob_choice: at Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - a Jerusalén
  - hasta Jerusalén
  lexicon: HALOT
  rationale: Con el verbo de reunir/convocar, la preposición de llegada se vuelve en español un destino ya consumado; 'en Jerusalén' comunica con naturalidad el lugar de la asamblea.
translation_notes:
  revision_awareness: La base inglesa revisada cambió 'court officials' por 'officials' para ajustarse más de cerca a sarisim; la versión española sigue esa decisión y preserva la ambigüedad léxica con una nota. También mantiene la estructura enumerativa completa del hebreo y evita suavizar los títulos militares/administrativos.
  spanish_consistency_notes:
  - Se usa 'líderes' como término paraguas para שַׂר en toda la línea.
  - Se mantiene 'miles' / 'centenas' para reflejar la unidad organizativa del hebreo.
  - '''Oficiales'' se emplea para סָרִיסִים siguiendo el audit trail revisado, con nota alternativa para ''eunucos''.'
  - '''Hombres valientes'' y ''hombre valiente de guerra'' conservan el doblez de גִּבּוֹר / גִּבּוֹר חָיִל sin convertirlo en una sola categoría.'
  - Se evita 'Cristo', 'SEÑOR' u այլ terminología no presente en el versículo, y no hay decisiones teológicas explícitas en este texto.
