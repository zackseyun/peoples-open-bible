translation:
  language: es
  text: Las sombras[a] se estremecen bajo las aguas, y los que habitan en ellas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Los muertos se retuercen bajo las aguas». El hebreo רְפָאִים puede significar «los muertos» o «las sombras», y יְחוֹלָלוּ también puede traducirse «se retuercen».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרְפָאִים
  english_pob_choice: the departed spirits
  chosen_spanish: los espíritus de los muertos
  alternatives_spanish:
  - los muertos
  - las sombras
  - los refaítas
  lexicon: HALOT, BDB
  rationale: El contexto poético de Job 26:5 apunta a los muertos en el reino subterráneo, no al pueblo histórico de los refaítas. En español, "espíritus de los muertos" conserva el matiz poético y evita la ambigüedad de un nombre propio o étnico. "Los muertos" es posible, pero pierde algo del color figurado; "las sombras" es una opción válida, aunque menos explícita para lectores modernos.
- source_word: יְחוֹלָלוּ
  english_pob_choice: tremble
  chosen_spanish: se estremecen
  alternatives_spanish:
  - tiemblan
  - se retuercen
  - son sacudidos
  lexicon: HALOT, BDB
  rationale: El verbo puede expresar temblor, agitación o retorcimiento. En este contexto de terror cósmico delante de Dios, "se estremecen" comunica bien la agitación temerosa sin forzar una imagen demasiado física. "Tiembla" sería más directo; "se retuercen" preserva una posibilidad léxica, pero en español puede sonar demasiado corporal.
- source_word: מִתַּחַת מַיִם
  english_pob_choice: beneath the waters
  chosen_spanish: debajo de las aguas
  alternatives_spanish:
  - bajo las aguas
  - desde debajo de las aguas
  lexicon: HALOT, BDB
  rationale: La preposición y el sustantivo indican ubicación inferior respecto de las aguas. "Debajo de las aguas" es natural en español y mantiene la imagen espacial del hebreo. "Bajo las aguas" también es posible, pero algo menos enfático.
- source_word: וְשֹׁכְנֵיהֶם
  english_pob_choice: and those who dwell in them
  chosen_spanish: y los que habitan en ellas
  alternatives_spanish:
  - y sus habitantes
  - y los que viven en ellas
  lexicon: HALOT, BDB
  rationale: El sufijo refiere más naturalmente a "las aguas", por lo que "en ellas" mantiene claro el antecedente. "Los que habitan" reproduce el paralelismo del hebreo; "sus habitantes" es breve, pero menos transparente respecto del referente.
theological_decisions:
- issue: Sentido de רְפָאִים en Job 26:5
  english_pob_reading: the departed spirits/dead in the underworld
  chosen_spanish_reading: los espíritus de los muertos en el reino de la muerte
  alternative_spanish_readings:
  - los muertos
  - las sombras
  - los refaítas
  rationale: 'La lectura del pasaje es poético-lexical: רְפָאִים designa a los muertos o sombras del ámbito de los muertos, no al grupo étnico de los refaítas. La redacción española conserva esa referencia al mundo de la muerte sin convertirla en un nombre propio. Por claridad textual, el verso usa "los espíritus de los muertos"; en el sustento léxico se explicita que se trata del reino de la muerte.'
  doctrine_reference: Job 26:5; HALOT; BDB
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios sustanciales. Se mantiene la solución óptima en inglés, trasladada a un español natural y fiel al mismo perfil semántico, con la nota alternativa sobre el valor de רְפָאִים y de יְחוֹלָלוּ.
  spanish_consistency_notes:
  - Se usa "Yahvé" solo cuando el texto fuente lo requiera; aquí no aparece el nombre divino.
  - Se preserva el paralelismo hebreo con dos miembros coordinados.
  - '"Espíritus de los muertos" evita la confusión con un etnónimo y mantiene el registro poético del pasaje.'
  - La nota al pie recoge la alternativa principal sin sobrecargar el texto principal.
