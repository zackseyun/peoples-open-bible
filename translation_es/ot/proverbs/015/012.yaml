translation:
  language: es
  text: El burlón no ama a quien lo corrige; no irá a los sabios[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a hombres sabios». El hebreo está en plural masculino, pero aquí probablemente se refiere de manera genérica a personas sabias.
    reason: lexical_alternative

lexical_decisions:
- source_word: לֵץ
  english_pob_choice: mocker
  chosen_spanish: burlón
  alternatives_spanish:
  - mofador
  - escarnecedor
  lexicon: HALOT
  rationale: לֵץ designa a una persona despectiva y burlona en la literatura sapiencial. 'Burlón' comunica bien ese rasgo en español moderno sin sonar tan arcaico como 'escarnecedor'.
- source_word: יֶאֱהַב
  english_pob_choice: does not love
  chosen_spanish: no ama
  alternatives_spanish:
  - no le agrada
  - odia
  lexicon: HALOT
  rationale: El verbo hebreo es 'amar'. Mantener 'no ama' preserva el contraste del original sin intensificarlo indebidamente a 'odia' ni debilitarlo a 'no le agrada'.
- source_word: הוֹכֵחַ לוֹ
  english_pob_choice: one who corrects him
  chosen_spanish: a quien lo corrige
  alternatives_spanish:
  - un reprensor
  - quien lo reprende
  lexicon: HALOT
  rationale: El participio expresa a la persona que ofrece corrección o reprensión. 'A quien lo corrige' resulta natural en español y conserva la fuerza correctiva sin cargarla más de lo que exige el hebreo.
- source_word: אֶל חֲכָמִים
  english_pob_choice: to the wise
  chosen_spanish: a los sabios
  alternatives_spanish:
  - a los hombres sabios
  - hacia los sabios
  lexicon: HALOT
  rationale: אֶל indica dirección o acercamiento. 'A los sabios' mantiene el plural representativo y en español funciona con naturalidad. Se prefiere 'sabios' a 'hombres sabios' porque el plural masculino hebreo aquí funciona de modo genérico, como en el contexto sapiencial.
- source_word: לֹא יֵלֵךְ
  english_pob_choice: he will not go
  chosen_spanish: no irá
  alternatives_spanish:
  - no va
  - no caminará
  lexicon: HALOT
  rationale: הלך aquí significa ir o acercarse. 'No irá' conserva el valor volitivo/futuro del proverbio y evita el matiz demasiado literal de 'caminará'.
theological_decisions:
- issue: Género gramatical de חֲכָמִים
  english_pob_reading: the wise
  chosen_spanish_reading: los sabios
  alternative_spanish_readings:
  - los hombres sabios
  rationale: Aunque la forma hebrea es masculina plural, en la literatura sapiencial suele tener valor genérico. 'Los sabios' comunica ese sentido inclusivo en español sin imponer una especificación masculina innecesaria.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: Concordancia alta con el audit trail en inglés; no se registran revisiones aplicadas en la fuente de referencia más reciente. La redacción española sigue de cerca el paralelismo hebreo y conserva la tensión entre corrección y sabiduría sin suavizarla.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo breve y proverbial del hebreo en una sola oración con dos miembros.
  - '''Burlón'' se eligió como equivalente natural de לֵץ en español contemporáneo.'
  - '''Sabios'' conserva el plural genérico; la nota explica la alternativa más explícitamente masculina.'
  - No se introdujo lenguaje eclesiástico ajeno al proverbio ni se añadió contenido interpretativo extra.
