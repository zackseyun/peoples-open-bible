translation:
  language: es
  text: Si un hombre peca contra otro hombre[a], Dios lo juzgará; pero si un hombre peca contra Yahvé, ¿quién intercederá por él?[b] Pero no quisieron escuchar la voz de su padre, porque Yahvé deseó darles muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los jueces lo juzgarán». El hebreo אֱלֹהִים a veces puede referirse a jueces humanos; aquí el contraste con «Yahvé» favorece un referente divino.
    reason: alternative_reading
  - marker: b
    text: O «¿quién orará por él?». El verbo hebreo puede tener el sentido de orar o de interceder.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֶחֱטָא
  english_pob_choice: sins
  chosen_spanish: peca
  alternatives_spanish:
  - sigue pecando
  - comete pecado
  lexicon: HALOT
  rationale: חטא expresa el acto de pecar; en español, «peca» comunica con naturalidad la culpa moral sin diluir la fuerza del verbo.
- source_word: אִישׁ לְאִישׁ
  english_pob_choice: a man ... another man
  chosen_spanish: un hombre ... otro hombre
  alternatives_spanish:
  - alguien ... otra persona
  - un hombre ... su prójimo
  lexicon: HALOT
  rationale: El hebreo mantiene una forma masculina singular en ambos miembros; «un hombre ... otro hombre» conserva esa precisión y la relación interpersonal del daño.
- source_word: וּפִלְלֹו אֱלֹהִים
  english_pob_choice: God will judge him
  chosen_spanish: Dios lo juzgará
  alternatives_spanish:
  - Dios intercederá por él
  - los jueces lo juzgarán
  lexicon: HALOT
  rationale: Aquí אֱלֹהִים puede ser «Dios» o, en algunos contextos, «jueces». El paralelo con «contra Yahvé» favorece un referente divino; «lo juzgará» recoge el sentido judicial que el POB revisado prefirió en inglés.
- source_word: לַיהוָה
  english_pob_choice: against Yahweh
  chosen_spanish: contra Yahvé
  alternatives_spanish:
  - contra el SEÑOR
  - contra Yahweh
  lexicon: HALOT
  rationale: La preposición exige una relación de ofensa o dirección adversa; el proyecto pide traducir el nombre divino como «Yahvé» y no ocultarlo con una convención tipográfica.
- source_word: מִי יִתְפַּלֶּל לוֹ
  english_pob_choice: who will intercede for him?
  chosen_spanish: ¿quién intercederá por él?
  alternatives_spanish:
  - ¿quién orará por él?
  - ¿quién mediará por él?
  lexicon: HALOT
  rationale: El hitpael de פלל puede significar orar o interceder; «intercederá» conserva la conexión léxica con la primera cláusula y su fuerza retórica en este contexto.
- source_word: וְלֹא יִשְׁמְעוּ לְקוֹל אֲבִיהֶם
  english_pob_choice: But they would not listen to the voice of their father
  chosen_spanish: Pero no escuchaban la voz de su padre
  alternatives_spanish:
  - Pero no obedecían a su padre
  - Pero no querían escuchar la voz de su padre
  lexicon: HALOT
  rationale: «Escuchaban» reproduce el idiomático לְקוֹל y, con la negación en imperfecto, puede expresar resistencia continua; «voz de su padre» mantiene la metáfora hebrea.
- source_word: כִּי חָפֵץ יְהוָה
  english_pob_choice: because Yahweh desired
  chosen_spanish: porque Yahvé deseó
  alternatives_spanish:
  - porque Yahvé quiso
  - porque Yahvé se complació
  lexicon: HALOT
  rationale: חפץ abarca desear, querer o complacerse. «Deseó» preserva la afirmación fuerte sin suavizarla ni convertirla en una paráfrasis más interpretativa.
- source_word: לַהֲמִיתָם
  english_pob_choice: to put them to death
  chosen_spanish: darles muerte
  alternatives_spanish:
  - matarlos
  - hacerlos morir
  lexicon: HALOT
  rationale: El hifil de מות es causativo; «darles muerte» comunica bien la causación y su peso solemne en español.
theological_decisions:
- issue: Sentido de אֱלֹהִים en la primera cláusula
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - los jueces
  rationale: El contraste con Yahvé en la cláusula siguiente favorece leer אֱלֹהִים como Dios. Se mantiene la alternativa histórica en nota porque tiene respaldo en algunos comentaristas y tradiciones de traducción.
  doctrine_reference: Translation philosophy §1, §3
- issue: Afirmación de la voluntad divina en el cierre
  english_pob_reading: because Yahweh desired to put them to death
  chosen_spanish_reading: porque Yahvé deseó darles muerte
  alternative_spanish_readings:
  - porque Yahvé determinó darles muerte
  - porque Yahvé quiso matarlos
  rationale: El hebreo expresa la voluntad divina de manera directa; la traducción debe conservar esa tensión teológica sin atenuarla. «Deseó» refleja el matiz de חפץ y evita una formulación que sugiera deleite en el mal.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del audit trail inglés: en la primera cláusula adopta «juzgará» para el sentido judicial de פלל, y en la segunda mantiene la forma de intercesión («intercederá») en vez de una traducción más genérica. También preserva la decisión de dejar explícito Yahvé y de no suavizar la última cláusula, que expresa la gravedad del juicio divino.'
  spanish_consistency_notes:
  - «Yahvé» se usa de manera uniforme para יְהוָה, conforme al estándar del proyecto.
  - Se conserva el paralelismo sintáctico «Si un hombre...; pero si un hombre...», cercano al hebreo y claro en español.
  - «Voz de su padre» mantiene la imagen semítica sin convertirla en una paráfrasis como «obedecer a su padre».
  - «Darles muerte» preserva el tono solemne del causativo hebreo y evita una expresión demasiado coloquial.
