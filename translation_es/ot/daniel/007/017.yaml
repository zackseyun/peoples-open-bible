translation:
  language: es
  text: Estas grandes bestias, que son cuatro, son cuatro reyes que surgirán de la tierra[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "del país". El arameo אַרְעָא puede significar tanto "tierra" como "país"; aquí se prefirió "tierra" por el alcance amplio de la visión apocalíptica.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִלֵּין
  english_pob_choice: These
  chosen_spanish: Estos
  alternatives_spanish:
  - Esos
  - Aquellos
  lexicon: HALOT
  rationale: El demostrativo plural se refiere a las bestias vistas inmediatamente en la visión; "estos" conserva la deixis cercana del original y su flujo expositivo.
- source_word: חֵיוָתָא
  english_pob_choice: beasts
  chosen_spanish: animales
  alternatives_spanish:
  - bestias
  - criaturas vivientes
  lexicon: HALOT
  rationale: En español, "bestias" puede sonar excesivamente peyorativo o rígido; como el texto arameo nombra seres visionarios más que fauna ordinaria, "animales" comunica la referencia sin perder que se trata de figuras simbólicas. Se conserva en nota la alternativa más literal cuando el contexto apocalíptico la justifique.
- source_word: רַבְרְבָתָא
  english_pob_choice: great
  chosen_spanish: grandes
  alternatives_spanish:
  - grandes y poderosos
  - enormes
  lexicon: HALOT
  rationale: El adjetivo expresa grandeza/tamaño; "grandes" es la equivalencia natural y mantiene la coordinación con el sustantivo sin sobreinterpretar la intensidad.
- source_word: דִּי אִנִּין
  english_pob_choice: which are
  chosen_spanish: que son
  alternatives_spanish:
  - las cuales son
  - que resultan ser
  lexicon: HALOT
  rationale: La relativa aramea introduce la identificación explicativa de las figuras. "Que son" conserva la relación directa y la sencillez sintáctica del original.
- source_word: אַרְבַּע
  english_pob_choice: four
  chosen_spanish: cuatro
  lexicon: HALOT
  rationale: Número cardinal directo, sin matiz adicional.
- source_word: אַרְבְּעָה מַלְכִין
  english_pob_choice: four kings
  chosen_spanish: cuatro reyes
  alternatives_spanish:
  - cuatro reinos
  lexicon: HALOT
  rationale: El arameo dice literalmente "reyes", no "reinos". Se preserva el contenido léxico explícito del verso y se evita resolver en la traducción la tensión interpretativa de la visión.
- source_word: יְקוּמוּן
  english_pob_choice: will arise
  chosen_spanish: surgirán
  alternatives_spanish:
  - se levantarán
  - aparecerán
  lexicon: HALOT
  rationale: El verbo puede significar levantarse o surgir. "Surgirán" comunica bien la emergencia histórica/apocalíptica de gobernantes en español moderno, sin perder el matiz de aparición desde la escena visionaria.
- source_word: מִן אַרְעָא
  english_pob_choice: from the earth
  chosen_spanish: de la tierra
  alternatives_spanish:
  - desde la tierra
  - del país
  - de la tierra/país
  lexicon: HALOT
  rationale: Arameo ארעא puede significar "tierra" o "país/land". En este marco de visión cósmica, se mantiene "tierra" como en la decisión inglesa; en español es la opción más amplia y natural.
theological_decisions:
- issue: Referencia de "cuatro reyes" y posible lectura interpretativa de "reinos"
  english_pob_reading: Translate the explicit lexical form 'four kings' in the main text without expanding it to 'kingdoms.'
  chosen_spanish_reading: Traducir "cuatro reyes" en el texto principal, sin ampliarlo a "reinos".
  alternative_spanish_readings:
  - Traducir "cuatro reinos"
  - Traducir "reyes" y aclarar en nota la relación simbólica con reinos
  rationale: El verso usa el sustantivo explícito "reyes". Mantenerlo preserva la primacía del texto fuente y deja la relación simbólica con reinos en el marco interpretativo del capítulo, sin resolverla por anticipado en la línea principal.
  doctrine_reference: Primacía del texto original; mantener la tensión exegética en lugar de armonizarla por traducción.
translation_notes:
  revision_awareness: El borrador sigue la última revisión del POB inglés sin introducir cambios textuales adicionales; no se detectaron enmiendas pendientes en el pasaje base.
  spanish_consistency_notes:
  - Se conserva "tierra" para אַרְעָא como equivalente principal, en paralelo con la decisión inglesa.
  - Se evita usar "Cristo", "SEÑOR" o terminología no pertinente al versículo.
  - La frase "cuatro reyes" se mantiene sin interpretar como "reinos" para respetar el léxico arameo.
  - El tono es sobrio y publicable, con sintaxis moderna y fiel al paralelismo del original.
