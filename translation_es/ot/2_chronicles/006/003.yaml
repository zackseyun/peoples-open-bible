  glossary_alignment: No hay términos del glosario mayor en disputa aquí. «Asamblea» corresponde bien a קהל, con nota alternativa «congregación». «Bendijo» es adecuado para ברך. La elección «se volvió» maneja bien el modismo hebreo de «volver su rostro» sin caer en calco duro.
