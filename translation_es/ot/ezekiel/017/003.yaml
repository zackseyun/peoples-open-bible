translation:
  language: es
  text: 'y di[a]: «Así dice el Señor Yahvé: La gran águila, grande en alas, larga de piniones, llena de plumaje, que tenía plumas multicolores, vino al Líbano y tomó la copa del cedro».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «que tenía bordado/variegación»; la frase probablemente alude metafóricamente a plumaje ricamente dibujado o multicolor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַרְתָּ / and say
  english_pob_choice: and say
  chosen_spanish: y di
  alternatives_spanish:
  - y dile
  - y dirás
  lexicon: WLC / contextual imperative
  rationale: El hebreo usa una forma verbal directa dirigida al profeta. «Y di» conserva la fuerza inmediata del mandato y funciona de modo natural en español bíblico sin añadir un destinatario no expresado.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahveh
  lexicon: WLC / POB divine-name policy
  rationale: Se preserva la distinción del título compuesto. Como la política española del proyecto usa «Yahvé» para יְהוָה, no se oculta el nombre divino con una convención de máscara; «Señor Yahvé» mantiene la doble referencia reverencial y nominal del hebreo.
- source_word: הַנֶּשֶׁר הַגָּדוֹל
  english_pob_choice: the great eagle
  chosen_spanish: el gran águila
  alternatives_spanish:
  - el águila grande
  - la gran águila
  lexicon: HALOT
  rationale: «Águila» reproduce la ave de rapiña del hebreo; «gran» conserva el matiz de tamaño e imponente majestad. El orden nominal es fluido en español y mantiene el registro elevado.
- source_word: גְּדוֹל הַכְּנָפַיִם
  english_pob_choice: great in wings
  chosen_spanish: grande en alas
  alternatives_spanish:
  - grande de alas
  - de grandes alas
  lexicon: HALOT
  rationale: La construcción hebrea describe la amplitud/majestad de las alas. «Grande en alas» sigue de cerca la forma semítica sin sonar tan rígida como «grande de alas», y evita introducir «envergadura» como paráfrasis no atestiguada.
- source_word: אֶרֶךְ הָאֵבֶר
  english_pob_choice: long in pinions
  chosen_spanish: larga de plumas
  alternatives_spanish:
  - larga de rémiges
  - larga de alas
  lexicon: HALOT
  rationale: El contexto aviar sugiere plumas de vuelo o plumaje alargado. «Larga de plumas» conserva la imagen general sin forzar un tecnicismo; no se usa «rémiges» por ser demasiado especializado para lectura eclesial amplia.
- source_word: מָלֵא הַנּוֹצָה
  english_pob_choice: full of plumage
  chosen_spanish: llena de plumaje
  alternatives_spanish:
  - llena de plumas
  - cubierta de plumaje
  lexicon: HALOT
  rationale: «Plumaje» reproduce el sustantivo colectivo y el tono literario. El femenino concuerda con «águila» y mantiene la cadencia poética.
- source_word: אֲשֶׁר לוֹ הָרִקְמָה
  english_pob_choice: which had variegated feathers
  chosen_spanish: que tenía plumaje variegado
  alternatives_spanish:
  - que tenía plumaje bordado
  - que tenía plumas variegadas
  lexicon: HALOT
  rationale: La POB inglesa opta por el sentido metafórico de רִקְמָה como plumaje variado o multicolor. «Plumaje variegado» conserva esa decisión y evita imponer una imagen textil literal en el cuerpo principal.
- source_word: בָּא אֶל הַלְּבָנוֹן
  english_pob_choice: came to Lebanon
  chosen_spanish: vino al Líbano
  alternatives_spanish:
  - llegó al Líbano
  - fue al Líbano
  lexicon: WLC / geographic usage
  rationale: «Vino» corresponde bien al movimiento narrativo del hebreo y mantiene la sencillez del relato. «Al Líbano» reproduce la preposición direccional natural en español.
- source_word: צַמֶּרֶת הָאָרֶז
  english_pob_choice: the top of the cedar
  chosen_spanish: la copa del cedro
  alternatives_spanish:
  - la cima del cedro
  - la punta del cedro
  - la corona del cedro
  lexicon: HALOT
  rationale: צַמֶּרֶת se refiere a la parte superior del árbol. «Copa» es una opción española natural para la parte alta y frondosa de un árbol, y comunica bien la imagen botánica del cedro sin perder exactitud.
theological_decisions:
- issue: Tratamiento del nombre divino en אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - Señor Yahvé
  rationale: El texto hebreo contiene el Tetragrama de forma explícita; por eso no se enmascara con «SEÑOR». La lectura española mantiene la reverencia del título אדני y conserva el nombre propio divino según la norma del proyecto.
  doctrine_reference: POB Spanish policy on יְהוָה / YHWH; translation philosophy §1, §6
- issue: Valor de רִקְמָה en un contexto de ave simbólica
  english_pob_reading: which had variegated feathers
  chosen_spanish_reading: que tenía plumaje variegado
  alternative_spanish_readings:
  - que tenía plumaje bordado
  - que tenía plumas multicolores
  rationale: La imagen probablemente combina la idea de variedad visual con resonancias de tejido adornado. Se preserva la tensión semántica en una nota, pero el texto principal prioriza la lectura aviar coherente con el contexto alegórico.
  doctrine_reference: HALOT on רִקְמָה; POB lexical note practice
translation_notes:
  revision_awareness: La redacción sigue de cerca el estado revisado más reciente del auditable inglés, especialmente la preferencia por una formulación literal de la amplitud de las alas («great in wings»), pero la adapta al español natural. También conserva la decisión revisada de no expandir innecesariamente el sintagma del ave y de mantener el final del verso como una acción concreta sobre el cedro.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוִה conforme a la política del proyecto y para evitar la máscara tradicional «SEÑOR».
  - «Águila» y el resto del léxico aviar se mantienen literales y coherentes con el registro simbólico del pasaje.
  - «Plumaje variegado» conserva la ambigüedad útil de רִקְמָה sin introducir una paráfrasis interpretativa fuerte.
  - «Copa del cedro» ofrece una imagen natural en español para צַמֶּרֶת y evita un calco duro como «cumbre» o «tope».
