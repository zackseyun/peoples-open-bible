theological_decisions:
- issue: 7:21의 νόμος를 「율법」 대신 「원리」로 옮김
  chosen_reading: 「원리」
  alternative_readings:
  - 「법」
  - 「율법」
  rationale: 본 절의 νόμος는 모세 율법이 아니라 7:15-20에서 묘사된 인간 내면의 작동 원리·법칙을 지칭한다. 본 과제 정책 — 「Mosaic 율법은 율법, 다른 law는 법/원리」 — 에 따라 「원리」 채택. 7:23과 8:2도 동일 원칙 적용.
