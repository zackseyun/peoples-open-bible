id: GEN.37.23
reference: Genesis 37:23
source:
  edition: WLC
  text: וַֽ/יְהִ֕י כַּֽ/אֲשֶׁר בָּ֥א יוֹסֵ֖ף אֶל אֶחָ֑י/ו וַ/יַּפְשִׁ֤יטוּ אֶת יוֹסֵף֙ אֶת כֻּתָּנְתּ֔/וֹ אֶת כְּתֹ֥נֶת הַ/פַּסִּ֖ים אֲשֶׁ֥ר עָלָֽי/ו־־־־־׃
translation:
  text: And when Joseph came to his brothers[a], they stripped Joseph of his tunic, the tunic of many colors that was on him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the long-sleeved tunic' or 'the richly ornamented tunic.' The Hebrew expression כְּתֹנֶת הַפַּסִּים is uncertain; the traditional 'coat of many colors' is possible but less likely.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כַּאֲשֶׁר
  chosen: And when
  alternatives:
  - Now when
  - And it happened, when
  lexicon: HALOT
  rationale: This narrative formula introduces the next event. 'And when' preserves the temporal force without woodenly reproducing the Hebrew idiom 'and it happened.'
- source_word: בָּא
  chosen: came
  alternatives:
  - arrived
  - entered
  lexicon: HALOT
  rationale: The verb simply denotes Joseph's coming to his brothers. 'Came' is the most natural narrative equivalent in English.
- source_word: אֶל אֶחָיו
  chosen: to his brothers
  alternatives:
  - to his brothers/siblings
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine plural and in context refers to Joseph's male siblings. 'Brothers' is gender-accurate and matches the source.
- source_word: וַיַּפְשִׁיטוּ
  chosen: they stripped
  alternatives:
  - they stripped off
  - they took off
  lexicon: HALOT
  rationale: The verb means to strip or remove clothing from someone. 'They stripped' best conveys the forceful action done to Joseph.
- source_word: כֻּתָּנְתּוֹ
  chosen: his tunic
  alternatives:
  - his robe
  - his garment
  lexicon: HALOT
  rationale: כֻּתֹּנֶת/כֻּתָּנֶת denotes a tunic-like garment. 'Tunic' is more lexically precise than the traditional but broader 'robe.'
- source_word: כְּתֹנֶת הַפַּסִּים
  chosen: the ornate tunic
  alternatives:
  - the long-sleeved tunic
  - the richly ornamented tunic
  - the special tunic
  lexicon: HALOT
  rationale: The exact sense of פַּסִּים is debated; it may refer to a garment marked by ornamentation or distinction rather than simply colors. 'Ornate tunic' avoids the traditional but likely misleading 'coat of many colors' while still conveying a distinctive, elevated garment.
- source_word: אֲשֶׁר עָלָיו
  chosen: that was on him
  alternatives:
  - which he was wearing
  - that he had on
  lexicon: HALOT
  rationale: The clause identifies the garment Joseph was wearing at the moment. 'That was on him' stays close to the Hebrew while remaining natural English.
