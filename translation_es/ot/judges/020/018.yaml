revisions:
- from: 'Entonces se levantaron y subieron a Betel[a], e inquirieron de Dios. Y los hijos de Israel dijeron: “¿Quién subirá primero por nosotros a la guerra contra los hijos de Benjamín?” Y Yahvé dijo[c][b]: “Judá primero.”'
  to: 'Entonces se levantaron y subieron a Betel, y consultaron a Dios. Y los hijos de Israel[a] dijeron: “¿Quién subirá primero por nosotros a la guerra contra los hijos de Benjamín[c]?” Y Yahvé dijo: “Judá primero.”'
  rationale: Se corrigen las notas para que coincidan con el contenido y los anclajes pertinentes del verso, y se mejora “inquirieron de Dios” a “consultaron a Dios” por claridad y naturalidad en español. No se añadió una nota sobre “Yahvé” porque en español del proyecto esa forma ya es la principal en el texto, no una alternativa marginal.
