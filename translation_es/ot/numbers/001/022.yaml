- from: 'Para los hijos de Simeón[a], por sus generaciones, por sus clanes, por las casas de sus padres, los contados de ellos, por el número de nombres, cabeza por cabeza[b], todo varón desde los veinte años en adelante, todo el que sale a la guerra[c]:'
