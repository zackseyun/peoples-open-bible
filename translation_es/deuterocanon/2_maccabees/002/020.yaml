    reason: lexical_alternative
lexical_decisions:
- source_word: καταφύτευσον
  english_pob_choice: Plant
  chosen_spanish: Planta
  alternatives_spanish:
  - Establece
  - Asienta
  lexicon: LSJ
  rationale: El imperativo aoristo de καταφυτεύω conserva la imagen de plantar firmemente. «Planta» mantiene el valor metafórico y la fuerza imperativa mejor que una expresión más plana como «establece» o «asienta».
- source_word: τὸν λαόν σου
  english_pob_choice: your people
  chosen_spanish: tu pueblo
  alternatives_spanish:
  - tu nación
  lexicon: LSJ
  rationale: λαός designa un pueblo o colectividad, a menudo con sentido de pertenencia pactal. «Tu pueblo» es la opción natural en español y preserva ese valor colectivo.
- source_word: εἰς τὸν τόπον τὸν ἅγιόν σου
  english_pob_choice: in your holy place
  chosen_spanish: en tu lugar santo
  alternatives_spanish:
  - en tu lugar sagrado
  - en tu santa morada
  - en tu santo lugar
  lexicon: LSJ
  rationale: τόπος significa «lugar» y ἅγιος califica ese lugar como santo. «Lugar santo» conserva la relación semántica sin sobreinterpretar τόπος como «tierra». Se evitó «morado» o «templo» porque el griego no lo especifica.
- source_word: καθὼς εἶπεν
  english_pob_choice: just as ... said
  chosen_spanish: tal como lo dijo
  alternatives_spanish:
  - como dijo
  - justo como dijo
  lexicon: LSJ
  rationale: La comparación simple de καθὼς con el aoristo de λέγω se expresa de manera idiomática y sobria con «tal como lo dijo», manteniendo la referencia directa al dicho de Moisés.
- source_word: Μωσῆς
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: LSJ
  rationale: Nombre propio estándar en español bíblico.
theological_decisions:
- issue: Integridad del texto fuente frente al desajuste contextual
  english_pob_reading: Translate the extant Greek clause as a standalone petition-like statement without importing surrounding context from other witnesses.
  chosen_spanish_reading: Traducir la cláusula griega transmitida como una petición autónoma, sin reconstruir el pasaje a partir de otros testigos.
  alternative_spanish_readings:
  - Intentar reconstruir otro versículo por contexto
  - Ajustar la traducción a una formulación litúrgica más conocida
  rationale: El paquete fuente marca un desajuste mayor entre la referencia y el griego disponible. Por fidelidad al texto recibido, la versión española sigue la cláusula transmitida y conserva explícitamente la dependencia de lo que dijo Moisés, sin suplir contexto externo.
  doctrine_reference: 'PHILOSOPHY.md: primacía del idioma original; transparencia sobre incertidumbre textual'
translation_notes:
  revision_awareness: 'Se revisó el paquete fuente y el control cruzado: el texto griego recibido presenta desajuste contextual, pero el acuerdo del audit trail es alto para la traducción de la cláusula disponible. No hubo revisiones posteriores aplicadas.'
  spanish_consistency_notes:
  - Se prefirió «Yahvé» solo cuando el texto fuente lo exigiera; aquí no aparece el nombre divino.
  - «Lugar santo» conserva el sustantivo τόπος sin añadir nociones no expresadas como «tierra» o «templo».
  - Se mantuvo el tono sobrio y bíblico en español, evitando calcos innecesarios pero preservando la metáfora de plantar.
