translation:
  language: es
  text: 'Entonces el rey dijo: «¿Y dónde está el hijo de tu señor?». Ziba dijo al rey: «Mira, se está quedando[a] en Jerusalén, porque dijo: “Hoy la casa de Israel me devolverá el reino de mi padre”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘permanece en Jerusalén’. El participio hebreo puede denotar residencia continua o permanencia en un lugar, no solo el acto literal de sentarse.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  lexicon: HALOT
  rationale: La secuencia narrativa del waw consecutivo se expresa con un conector temporal natural en español. 'Entonces' conserva el avance del relato sin sonar mecánico.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  lexicon: HALOT
  rationale: Sustantivo definido directo y natural en español.
- source_word: וְאַיֵּה
  english_pob_choice: And where is
  chosen_spanish: ¿Y dónde está
  alternatives_spanish:
  - ¿Dónde está
  lexicon: HALOT
  rationale: La partícula interrogativa mantiene el matiz de continuidad del diálogo. '¿Y dónde está' refleja mejor el enlace discursivo que omitir el 'y'.
- source_word: בֶּן אֲדֹנֶיךָ
  english_pob_choice: your master's son
  chosen_spanish: el hijo de tu señor
  alternatives_spanish:
  - el hijo de tu amo
  - el hijo de tu dueño
  lexicon: HALOT
  rationale: En este contexto, אֲדֹנֶיךָ refiere al superior de Ziba, no a un título divino. 'Señor' mantiene la relación de autoridad sin introducir el matiz esclavista de 'amo' salvo que el contexto lo exigiera de forma más explícita.
- source_word: צִיבָא
  english_pob_choice: Ziba
  chosen_spanish: Ziba
  lexicon: Transliteración estándar
  rationale: Nombre propio conservado en transliteración.
- source_word: הִנֵּה
  english_pob_choice: Look,
  chosen_spanish: Mira,
  alternatives_spanish:
  - He aquí
  - Mira bien
  lexicon: HALOT
  rationale: Partícula deíctica que introduce la respuesta. 'Mira' conserva la vivacidad del hablante con español contemporáneo y digno.
- source_word: יוֹשֵׁב
  english_pob_choice: is staying
  chosen_spanish: está residiendo
  alternatives_spanish:
  - permanece
  - está viviendo
  - está quedándose
  lexicon: HALOT
  rationale: El participio aquí expresa permanencia/residencia, no acto literal de sentarse. 'Está residiendo' mantiene ese valor durativo y suena natural en español formal.
- source_word: בִּירוּשָׁלִַם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  lexicon: HALOT
  rationale: Topónimo estándar en español.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón dada por Ziba; 'porque' es la conexión causal más clara en español.
- source_word: אָמַר
  english_pob_choice: he said
  chosen_spanish: dijo
  lexicon: HALOT
  rationale: Verbo de decir en discurso directo, sin necesidad de matices adicionales.
- source_word: הַיּוֹם
  english_pob_choice: Today
  chosen_spanish: Hoy
  alternatives_spanish:
  - Este día
  lexicon: HALOT
  rationale: Adverbio temporal idiomático en español.
- source_word: יָשִׁיבוּ לִי
  english_pob_choice: will restore to me
  chosen_spanish: me devolverá
  alternatives_spanish:
  - me restaurará
  - me retornará
  lexicon: HALOT
  rationale: El verbo hifil de שוב tiene la fuerza de hacer volver/retornar; en el contexto de un reino, 'devolverá' comunica la restauración reclamada de manera clara y natural.
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: the house of Israel
  chosen_spanish: la casa de Israel
  alternatives_spanish:
  - Israel
  lexicon: HALOT
  rationale: Se conserva la expresión corporativa del hebreo en vez de reducirla a 'Israel', respetando el matiz colectivo.
- source_word: אֵת מַמְלְכ֥וּת אָבִֽי
  english_pob_choice: the kingdom of my father
  chosen_spanish: el reino de mi padre
  alternatives_spanish:
  - el reinado de mi padre
  - el reino de mi padre
  lexicon: HALOT
  rationale: מַמְלְכוּת puede expresar reino/autoridad real. 'El reino de mi padre' corresponde bien al sentido dinástico del texto y sigue de cerca el original.
theological_decisions:
- issue: Relato de una acusación sin añadir juicio interpretativo
  english_pob_reading: Translate Ziba's accusation straightforwardly without endorsing its truthfulness.
  chosen_spanish_reading: Traducir la acusación de Ziba de forma directa, sin presentar como seguro que sea verdadera ni añadir marcas de duda que el hebreo no expresa aquí.
  alternative_spanish_readings:
  - '... ''según Ziba'' ...'
  - '... ''alegó'' ...'
  rationale: El verso reporta lo que Ziba dijo al rey. Añadir distancia explícita introduciría una interpretación que pertenece al contexto narrativo amplio, no a la formulación de este versículo.
  doctrine_reference: Preservar la tensión narrativa y la primacía del texto original sobre una resolución interpretativa prematura.
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del audit trail inglés, que ajustó la cláusula final a 'the kingdom of my father'. En español se optó por 'el reino de mi padre' por naturalidad y correspondencia semántica directa. También se mantuvo la fuerza aspectual de יוֹשֵׁב con una forma durativa ('está residiendo'), acorde con la nota inglesa sobre la posible alternativa de permanencia.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' solo cuando aparezca el nombre divino; en este versículo no aparece.
  - '''Casa de Israel'' se mantiene como expresión corporativa, sin simplificarla a ''Israel''.'
  - Se usa 'señor' para אֲדֹנֶיךָ según el contexto relacional inmediato; no se pretende un valor teológico.
  - La nota a pie de página está anclada exactamente en 'Jerusalén,[a]' para corresponder al valor lexical alternativo de יוֹשֵׁב.
