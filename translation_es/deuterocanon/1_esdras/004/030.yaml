translation:
  language: es
  text: y tomando la corona de la cabeza del rey y poniéndosela; y golpeó al rey con la mano izquierda.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «abofeteó al rey con la mano izquierda». El verbo griego puede denotar una bofetada o un golpe.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀφαιροῦσαν
  english_pob_choice: taking
  chosen_spanish: tomando
  alternatives_spanish:
  - quitando
  - retirando
  - tomando para sí
  lexicon: LSJ
  rationale: El participio describe una acción en curso. «Tomando» conserva el movimiento narrativo y suena natural en español, sin perder la idea de quitar algo a otro.
- source_word: διάδημα
  english_pob_choice: crown
  chosen_spanish: corona
  alternatives_spanish:
  - diadema
  lexicon: LSJ
  rationale: «Corona» comunica de modo claro el adorno real de la cabeza. «Diadema» es más técnico, pero menos transparente para el lector general.
- source_word: ἐπιτιθοῦσαν αὐτῇ
  english_pob_choice: putting it on herself
  chosen_spanish: poniéndola sobre sí
  alternatives_spanish:
  - poniéndosela
  - colocándola sobre sí
  lexicon: LSJ
  rationale: El dativo αὐτῇ indica que ella misma se la coloca. «Sobre sí» preserva el sentido reflexivo sin forzar una paráfrasis más larga.
- source_word: ἐράπιζεν
  english_pob_choice: struck
  chosen_spanish: lo golpeó
  alternatives_spanish:
  - lo abofeteó
  - le dio una bofetada
  - lo sacudió
  lexicon: LSJ
  rationale: El verbo puede significar un golpe o una bofetada. «Lo golpeó» mantiene la amplitud semántica sin decidir de más el tipo exacto de impacto.
- source_word: τῇ ἀριστερᾷ
  english_pob_choice: with her left hand
  chosen_spanish: con la mano izquierda
  alternatives_spanish:
  - con su mano izquierda
  - con la izquierda
  lexicon: LSJ
  rationale: El instrumental dativo se expresa de forma natural en español como «con la mano izquierda». La adición de «mano» es idiomática y clara.
translation_notes:
  revision_awareness: El contexto griego y el audit trail inglés coinciden sustancialmente; la única tensión principal es léxica en ἐράπιζεν, donde el inglés opta por «struck» y preserva en nota la posibilidad de «slapped». La versión española conserva esa amplitud con «golpeó».
  spanish_consistency_notes:
  - Se mantiene un estilo bíblico moderno y claro, sin recurrir a «diadema» como tecnicismo innecesario.
  - Se conserva la acción en curso de los participios griegos mediante gerundios en español.
  - No hay contenido teológico doctrinal directo en este versículo; la decisión principal es léxico-narrativa.
