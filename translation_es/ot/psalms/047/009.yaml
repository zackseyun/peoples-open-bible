translation:
  language: es
  text: Dios reina sobre las naciones[a]; Dios está sentado en su santo trono.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Dios ha llegado a ser rey sobre las naciones; Dios ha tomado su asiento en su santo trono». El perfecto hebreo puede enfatizar el establecimiento de su reinado.'
    reason: alternative_reading
lexical_decisions:
- source_word: מָלַךְ
  english_pob_choice: reigns
  chosen_spanish: reina
  alternatives_spanish:
  - ha llegado a ser rey
  - es rey
  lexicon: HALOT
  rationale: El qatal hebreo puede funcionar de modo resultativo o proclamativo en poesía. «Reina» comunica en español la afirmación presente de la soberanía de Dios sin volver la frase demasiado mecánica.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: Aquí el plural formal hebreo designa al Dios único de Israel; en español debe mantenerse en singular. La repetición conserva el énfasis poético del hebreo y del POB inglés.
- source_word: עַל
  english_pob_choice: over
  chosen_spanish: sobre
  alternatives_spanish:
  - encima de
  - por encima de
  lexicon: HALOT
  rationale: En un contexto de realeza y dominio, «sobre» expresa mejor autoridad sobre los pueblos que una ubicación física.
- source_word: גּוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - los gentiles
  lexicon: HALOT
  rationale: «Las naciones» es la opción más natural y fiel para el conjunto de pueblos no israelitas bajo el gobierno de Dios. «Gentiles» introduciría una carga confesional posterior que el hebreo aquí no exige.
- source_word: יָשַׁב
  english_pob_choice: sits
  chosen_spanish: se sienta
  alternatives_spanish:
  - está sentado
  - ha tomado asiento
  lexicon: HALOT
  rationale: El verbo significa literalmente sentarse o morar. En paralelo con la realeza y el trono, «se sienta» conserva la imagen concreta y sugiere entronización sin explicitar más de lo que el texto dice.
- source_word: כִּסֵּא
  english_pob_choice: throne
  chosen_spanish: trono
  alternatives_spanish:
  - asiento
  lexicon: HALOT
  rationale: En lenguaje regio y divino, כִּסֵּא corresponde a «trono», no al más general «asiento».
- source_word: קָדְשׁוֹ
  english_pob_choice: his holy
  chosen_spanish: su santo
  alternatives_spanish:
  - su sagrado
  - de su santidad
  lexicon: HALOT
  rationale: En construcción con «trono», el sustantivo con sufijo funciona de manera adjetival. «Su santo trono» preserva el sentido natural en español y mantiene la relación con la santidad del trono sin forzar una estructura nominal.
theological_decisions:
- issue: Los verbos perfectos hebreos expresan una proclamación real presente
  english_pob_reading: 'Present proclamation: ''God reigns ... God sits on his holy throne.'''
  chosen_spanish_reading: 'Proclamación presente: «Dios reina... Dios se sienta en su santo trono».'
  alternative_spanish_readings:
  - «Dios ha llegado a ser rey... Dios ha tomado asiento en su santo trono»
  - «Dios es rey... Dios está sentado en su santo trono»
  rationale: La poesía celebra la realeza universal actual de Dios. Traducir los perfectos como presente en español transmite mejor la realidad proclamada y evita una formulación excesivamente técnica o pesada, sin borrar la posibilidad aspectual de establecimiento de la realeza.
  doctrine_reference: 'Principio de equivalencia óptima: conservar el sentido y la fuerza litúrgica del original sin añadir afirmaciones doctrinales extra.'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se documentaron cambios aplicados y el estado de comparación es de alta concordancia.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים en ambos cola, conforme al valor singular del contexto.
  - Se conserva el paralelismo hebreo con dos miembros casi idénticos, respetando la repetición enfática.
  - «Santo trono» evita calcos innecesarios y suena natural en español bíblico contemporáneo.
