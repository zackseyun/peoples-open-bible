base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/022/003.yaml
  text: 'And say[a], ‘Thus says the Lord GOD: A city shedding blood in her midst, so that her time may come[b], and making idols against herself to defile herself!’'
  footnotes:
  - marker: a
    text: Or 'for her time to come'; the phrase implies the city's appointed time of judgment.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew word for 'idols' is contemptuous and can carry the sense of 'filthy idols.'
    reason: lexical_alternative
