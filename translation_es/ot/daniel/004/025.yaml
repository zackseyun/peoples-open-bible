lexical_decisions:
- source_word: כֹּלָא
  english_pob_choice: All this
  chosen_spanish: Todo esto
  alternatives_spanish:
  - Todo ello
  - Todo eso
  lexicon: HALOT
  rationale: La forma aramea totaliza lo anunciado previamente; «Todo esto» conserva la referencia retrospectiva y la amplitud del juicio con español natural y claro.
- source_word: מְּטָא + עַל
  english_pob_choice: came upon
  chosen_spanish: le sobrevino
  alternatives_spanish:
  - vino sobre él
  - le aconteció
  - le llegó
  lexicon: HALOT
  rationale: La combinación verbal con עַל expresa que el evento alcanza/recae sobre la persona. «Le sobrevino» preserva bien la idea de que el juicio lo alcanza, sin sonar forzado en español.
- source_word: נְבוּכַדְנֶצַּר
  english_pob_choice: Nebuchadnezzar
  chosen_spanish: Nabucodonosor
  alternatives_spanish:
  - Nebucodonosor
  lexicon: convención transliterada española
  rationale: Se usa la forma asentada en español bíblico y reconocible para lectores de habla hispana.
- source_word: מַלְכָּא
  english_pob_choice: King
  chosen_spanish: el rey
  alternatives_spanish:
  - rey
  - el monarca
  lexicon: HALOT
  rationale: El sustantivo en aposición puede expresarse naturalmente con el título definido en español. Aquí se integra en la frase «al rey Nabucodonosor» para mantener la función appositiva sin rigidez.
translation_notes:
  revision_awareness: El contexto auditado en inglés no introduce variantes textuales ni revisiones; la decisión principal en español es conservar la referencia totalizadora y la idiomaticidad del verbo con valor de juicio que recae sobre el rey.
  spanish_consistency_notes:
  - Se mantiene «Nabucodonosor» como forma española estándar del nombre.
  - Se evita traducir mecánicamente con «vino sobre» si eso oscurece la naturalidad del juicio sobre una persona; «sobrevino» conserva la fuerza del original.
  - La nota alternativa refleja la ambigüedad mínima de la expresión totalizadora sin añadir interpretaciones ajenas al texto.
