translation:
  language: es
  text: Y lo sepultaron dentro del territorio de su heredad[a], en Timnat-jéres, en la región montañosa de Efraín, al norte del monte Gaas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Josué 24:30 tiene «Timnat-sera» en lugar de «Timnat-jéres». Se conserva aquí como una variante del nombre de lugar en los avisos paralelos de sepultura.
    reason: textual_variant
lexical_decisions:
- source_word: וַיִּקְבְּרוּ
  english_pob_choice: And they buried
  chosen_spanish: Y lo sepultaron
  alternatives_spanish:
  - Y lo enterraron
  - Entonces lo sepultaron
  lexicon: HALOT
  rationale: El wayyiqtol marca avance narrativo pasado; en español, 'y' conserva la continuidad narrativa. 'Sepultar' mantiene un registro digno y fiel al hecho funerario; 'enterrar' es posible, pero 'sepultar' se ajusta mejor al tono bíblico y formal.
- source_word: אוֹתוֹ
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: HALOT
  rationale: El objeto directo explícito apunta a Josué por el contexto. En español, el clítico 'lo' es la forma natural y concisa para mantener la referencia sin sobrecargar el verso.
- source_word: בִּגְבוּל נַחֲלָתוֹ
  english_pob_choice: within the territory of his inheritance
  chosen_spanish: dentro del territorio de su heredad
  alternatives_spanish:
  - dentro de los límites de su heredad
  - en el territorio de su heredad
  lexicon: HALOT
  rationale: גְּבוּל puede ser 'límite' o 'territorio'; aquí el contexto de sepultura en una porción heredada favorece una expresión de ubicación en la heredad. 'Heredad' conserva el matiz de posesión heredada del pacto; 'territorio' evita una traducción demasiado literal de 'borde'.
- source_word: בְּתִמְנַת חֶרֶס
  english_pob_choice: in Timnath-heres
  chosen_spanish: en Timnat-jéres
  alternatives_spanish:
  - en Timnat-jerez
  - en Timnat-heres
  lexicon: HALOT
  rationale: Se translitera el topónimo de manera reconocible en español. Se conserva la variación del nombre de lugar sin armonizarla con Josué 24:30, donde el POB inglés documenta la forma alternativa.
- source_word: בְּהַר אֶפְרָיִם
  english_pob_choice: in the hill country of Ephraim
  chosen_spanish: en la región montañosa de Efraín
  alternatives_spanish:
  - en la sierra de Efraín
  - en la montaña de Efraín
  lexicon: HALOT
  rationale: הַר en esta fórmula geográfica no señala un monte aislado, sino la zona alta o serranía. 'Región montañosa' comunica mejor el valor geográfico que 'monte' en singular y evita una lectura demasiado literal.
- source_word: מִצְּפוֹן
  english_pob_choice: north of
  chosen_spanish: al norte de
  alternatives_spanish:
  - hacia el norte de
  - al lado norte de
  lexicon: HALOT
  rationale: La relación espacial relativa se expresa de forma idiomática en español con 'al norte de', conservando la ubicación precisa respecto del referente toponímico.
- source_word: לְהַר גָּעַשׁ
  english_pob_choice: Mount Gaash
  chosen_spanish: el monte Gaas
  alternatives_spanish:
  - el monte Gaash
  - monte Gaas
  lexicon: HALOT
  rationale: Se mantiene el valor toponímico con 'monte' por la forma estable de la expresión en español y por correspondencia con el hebreo. 'Gaas' reproduce la transliteración del nombre propio con ortografía española.
theological_decisions:
- issue: Variación toponímica entre Timnath-heres y Timnath-serah
  english_pob_reading: The difference is preserved here as a place-name variation in parallel burial notices.
  chosen_spanish_reading: Se preserva la variación del nombre de lugar sin armonizarla.
  alternative_spanish_readings:
  - Se normaliza el nombre de lugar.
  - Se aclara en nota la forma de Josué 24:30.
  rationale: No se debe borrar la tensión textual atestiguada por el paralelo. La traducción mantiene la forma de Jueces 2:9 y permite una nota que registre la variante sin resolverla artificialmente.
  doctrine_reference: Principio de crítica textual y coherencia con paralelos canónicos; cf. Josué 24:30
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo de Jueces 2:9 y el auditor de la POB en inglés. Se conservan la sepultura, la localización dentro de la heredad, la transliteración del topónimo y la nota de variante textual documentada. No se introdujeron cambios doctrinales ni armonizaciones no sustentadas por el paralelo.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el nombre divino aparece en el texto; aquí no aplica.
  - '''Heredad'' se prefiere para נַחֲלָה por su valor de posesión heredada en contexto territorial.'
  - '''Región montañosa'' mantiene el sentido geográfico de הַר sin imponer la idea de un monte singular.'
  - La nota al pie marca la variante de toponimia sin alterar el texto principal.
