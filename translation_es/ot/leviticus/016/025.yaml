translation:
  language: es
  text: Y quemará la grasa de la ofrenda por el pecado en el altar[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, “la ofrenda por la purificación”. El término hebreo puede designar la ofrenda usada para purificar del pecado o de la impureza.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵת
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y la
  - Entonces
  lexicon: HALOT
  rationale: La conjunción enlaza esta acción con la secuencia ritual anterior. El marcador de objeto directo אֵת no requiere equivalente explícito en español, por lo que basta la conjunción.
- source_word: חֵלֶב
  english_pob_choice: the fat
  chosen_spanish: la grasa
  alternatives_spanish:
  - la grasa sacrificial
  - las porciones de grasa
  lexicon: HALOT
  rationale: En este contexto sacrificial, חֵלֶב designa la grasa reservada para ser quemada. 'La grasa' es claro y natural en español; 'porciones de grasa' añade precisión no explicitada en el hebreo de este versículo.
- source_word: הַחַטָּאת
  english_pob_choice: the sin offering
  chosen_spanish: la ofrenda por el pecado
  alternatives_spanish:
  - la ofrenda por la purificación
  - el sacrificio por el pecado
  lexicon: HALOT
  rationale: La POB inglesa mantiene 'sin offering' y preserva la tensión entre pecado y purificación mediante nota. En español, 'ofrenda por el pecado' es el equivalente directo y ampliamente comprensible; la alternativa de 'ofrenda por la purificación' se conserva en nota por la discusión léxica reflejada en la auditoría inglesa.
- source_word: יַקְטִיר
  english_pob_choice: he shall burn
  chosen_spanish: hará arder
  alternatives_spanish:
  - quemará
  - ofrecerá en humo
  lexicon: HALOT
  rationale: El hifil de קטר en contexto ritual expresa quemar como acto de ofrenda, con énfasis en producir humo. 'Haré arder' reproduce bien la acción cultual sin sonar demasiado técnica o arcaizante en español.
- source_word: הַמִּזְבֵּחָה
  english_pob_choice: on the altar
  chosen_spanish: sobre el altar
  alternatives_spanish:
  - en el altar
  - al altar
  lexicon: HALOT
  rationale: La forma direccional con מזבח puede expresarse como 'al altar', pero en este contexto de combustión sacrificial el español fluye mejor con 'sobre el altar', manteniendo el sentido locativo del acto.
theological_decisions:
- issue: Alcance de חַטָּאת en legislación sacrificial
  english_pob_reading: sin offering
  chosen_spanish_reading: ofrenda por el pecado
  alternative_spanish_readings:
  - ofrenda por la purificación
  rationale: La voz hebrea puede aludir tanto al pecado como a la función purificadora del rito. Mantener 'ofrenda por el pecado' conserva la lectura cultual tradicional y clara; la alternativa 'ofrenda por la purificación' se refleja en la nota por fidelidad al debate léxico documentado por la POB inglesa.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: La versión inglesa auditada no presenta cambios aplicados y el pase de revisión más reciente concluye que no se requieren modificaciones; la redacción española sigue esa solución estable sin introducir reinterpretaciones no sustentadas.
  spanish_consistency_notes:
  - Se mantiene 'ofrenda por el pecado' para חַטָּאת, con la alternativa 'ofrenda por la purificación' en nota, siguiendo la tensión léxica documentada.
  - Se traduce יַקְטִיר con un español culto y natural ('hará arder') para conservar el sentido ritual de quemar como ofrenda.
  - '''Sobre el altar'' conserva la ubicación del acto sacrificial sin introducir un matiz direccional excesivo.'
