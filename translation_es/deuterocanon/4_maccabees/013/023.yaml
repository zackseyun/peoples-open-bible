  source_alignment_summary: 'El borrador sigue bien el sentido global del griego y del POB inglés: conserva la referencia a la disciplina bajo la ley de Dios, el estado ya establecido del afecto entre hermanos, y marca honestamente el final truncado con raya. Sin embargo, dos elecciones léxicas españolas no preservan bien el matiz fuente/POB: «fraternidad» debilita el sentido afectivo explícito de φιλαδελφίας, y «compartiendo simpatía» suena poco natural y puede desviar συμπαθούσης hacia una simpatía moderna en vez de solidaridad afectiva o mutuo sentir.'
  spanish_quality_summary: El texto es en general claro, pero «ejercicio» en este contexto moral-religioso suena algo mecánico, y la secuencia «fraternidad, compartiendo simpatía» resulta poco idiomática en español eclesial general. Una leve revisión mejora naturalidad y precisión sin apartarse del original.
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto. «Dios» está bien. El problema principal es de precisión léxica: para ἀσκήσεως conviene «disciplina» en español por concordancia con el POB y mejor ajuste contextual; para φιλαδελφίας, «afecto fraternal» preserva mejor el valor semántico que «fraternidad»; para συμπαθούσης, «compartiendo un mismo sentir» comunica mejor la idea de sentir con el otro.'
  issues:
  - severity: medium
    issue: «fraternidad» para φιλαδελφίας
    rationale: El griego apunta al afecto entre hermanos, no solo al vínculo o comunidad fraterna. «Fraternidad» puede sonar abstracto e institucional; «afecto fraternal» conserva mejor el valor afectivo que documenta el POB inglés.
  - severity: medium
    issue: «compartiendo simpatía» para συμπαθούσης
    rationale: Aunque literalizable, en español actual «simpatía» suele sugerir agrado personal, no necesariamente compasión o mutuo sentir. «Compartiendo un mismo sentir» o similar transmite mejor la solidaridad afectiva del participio.
  - severity: low
