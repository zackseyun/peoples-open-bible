translation:
  language: es
  text: Dios sea misericordioso con nosotros[a] y nos bendiga; haga resplandecer su rostro sobre nosotros[b]. Selah[c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nos muestre favor». El hebreo expresa una petición de gracia o favor benevolente; «sea misericordioso con nosotros» comunica bien esa súplica en español.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «con nosotros». En este giro poético se traduce naturalmente «sobre nosotros»; la línea alude también a la bendición sacerdotal de Números 6:25.
    reason: lexical_alternative
  - marker: c
    text: «Selah» probablemente es una marca litúrgica o musical; su sentido preciso es incierto.
    reason: cultural_note
lexical_decisions:
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - los dioses
  lexicon: HALOT
  rationale: Aquí אֱלֹהִים lleva verbo singular y designa al Dios de Israel; por eso en español corresponde el singular «Dios», no un plural literal.
- source_word: יְחָנֵּנוּ
  english_pob_choice: be gracious to us
  chosen_spanish: tenga de nosotros misericordia
  alternatives_spanish:
  - sea misericordioso con nosotros
  - nos favorezca
  lexicon: HALOT
  rationale: La raíz חנן expresa pedir gracia/favor. En español bíblico natural, «tener misericordia» comunica la petición de favor benevolente sin volverla mecánica ni endurecerla como una simple fórmula.
- source_word: וִיבָרְכֵנוּ
  english_pob_choice: and bless us
  chosen_spanish: y nos bendiga
  alternatives_spanish:
  - y nos conceda bendición
  - y nos colme de bendición
  lexicon: HALOT
  rationale: ברך se rinde de manera directa y transparente como «bendecir»; el subjuntivo optativo en español conserva bien la fuerza de oración del hebreo.
- source_word: יָאֵר
  english_pob_choice: may ... shine
  chosen_spanish: haga resplandecer
  alternatives_spanish:
  - haga brillar
  - cause a resplandecer
  lexicon: HALOT
  rationale: El hifil de אור requiere una expresión causal. «Haga resplandecer» conserva la imagen y su fuerza verbal, más claramente que un simple «brille» en español.
- source_word: פָּנָיו
  english_pob_choice: his face
  chosen_spanish: su rostro
  alternatives_spanish:
  - su cara
  - su presencia
  lexicon: HALOT
  rationale: Se mantiene la imagen concreta de «rostro» para respetar el eco intertextual con la bendición sacerdotal de Números 6:25 y no diluirla en «presencia».
- source_word: אִתָּנוּ
  english_pob_choice: upon us
  chosen_spanish: sobre nosotros
  alternatives_spanish:
  - con nosotros
  - hacia nosotros
  lexicon: HALOT
  rationale: Aunque literalmente puede leerse «con nosotros», en este giro poético el equivalente idiomático que mejor reproduce la bendición luminosa es «sobre nosotros», como en la tradición bíblica de la luz del rostro divino.
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  alternatives_spanish:
  - —
  lexicon: HALOT
  rationale: Se conserva la transliteración porque su sentido exacto es incierto y probablemente funciona como marca litúrgica o musical.
theological_decisions:
- issue: Fuerza optativa/jussiva de los verbos
  english_pob_reading: 'Render as prayer/wish: ''May God be gracious ... and bless us; may his face shine upon us.'''
  chosen_spanish_reading: 'Convertir la secuencia en súplica: «Dios tenga de nosotros misericordia y nos bendiga; haga resplandecer su rostro sobre nosotros».'
  alternative_spanish_readings:
  - Dios es misericordioso con nosotros y nos bendice
  - Dios nos conceda misericordia y bendición
  rationale: Los verbos funcionan en contexto litúrgico como petición, no como simple afirmación. El español optativo con subjuntivo preserva esa forma de oración y evita convertir el verso en una declaración no solicitada.
  doctrine_reference: Salmos 67:2; Números 6:24-26
- issue: Alusión a la bendición sacerdotal
  english_pob_reading: Preserve the facial-shining imagery rather than interpret it away
  chosen_spanish_reading: Conservar la imagen de que el rostro de Dios resplandezca sobre su pueblo.
  alternative_spanish_readings:
  - mirarnos con favor
  - mostrarnos su benevolencia
  rationale: La imagen del rostro que resplandece mantiene el vínculo bíblico con la bendición aarónica y resiste una paráfrasis que borraría esa conexión textual y teológica.
  doctrine_reference: Números 6:25; Salmos 67:1-2
translation_notes:
  revision_awareness: 'Se siguió el texto hebreo masorético (WLC) y el audit trail inglés sin cambios sustantivos respecto de la lectura óptimo-equivalente: petición optativa, conservación del rostro resplandeciente y preservación de Selah. El único ajuste principal en español fue preferir «tener misericordia» para comunicar la gracia/favor del hebreo con naturalidad bíblica.'
  spanish_consistency_notes:
  - Se mantuvo «Dios» en singular conforme al verbo singular hebreo.
  - Se preservó «Selah» como transliteración sin interpretación especulativa.
  - Se conservó la imagen corporal «rostro» para no perder el eco de Números 6:25.
  - El subjuntivo en español reproduce la fuerza volitiva del hebreo en contexto de bendición/oración.
