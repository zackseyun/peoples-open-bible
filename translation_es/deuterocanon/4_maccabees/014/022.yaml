translation:
  language: es
  text: 'una madre, teniendo ante sí dos cosas: la piedad[a] y la preservación temporal[b] de sus siete hijos, conforme a la promesa del tirano;'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “devoción a Dios” o “reverencia a Dios”; εὐσέβεια designa fidelidad reverente a Dios.
    reason: lexical_alternative
  - marker: b
    text: O “salvación temporal”; el griego se refiere a la conservación momentánea de la vida bajo la promesa del tirano, no a la salvación en sentido pleno.
    reason: lexical_alternative
lexical_decisions:
- source_word: μήτηρ
  english_pob_choice: a mother
  chosen_spanish: una madre
  alternatives_spanish:
  - la madre
  - madre
  lexicon: LSJ
  rationale: El griego usa un sustantivo sin artículo en una construcción appositiva; en español, 'una madre' reproduce con naturalidad el valor indefinido sin añadir una especificación no marcada por el texto.
- source_word: δυεῖν προκειμένων
  english_pob_choice: with two things set before her
  chosen_spanish: con dos cosas puestas delante de ella
  alternatives_spanish:
  - con dos cosas presentadas ante ella
  - con dos opciones delante de ella
  lexicon: LSJ
  rationale: La expresión conserva la idea espacial/metafórica de πρόκειμαι ('estar puesto delante'). 'Cosas puestas delante de ella' mantiene la imagen sin volverla interpretativa.
- source_word: εὐσεβείας
  english_pob_choice: godliness
  chosen_spanish: la piedad
  alternatives_spanish:
  - la piedad para con Dios
  - la devoción a Dios
  - la piedad
  lexicon: LSJ
  rationale: En 4 Macabeos, εὐσέβεια denota devoción fiel a Dios y su ley. 'Piedad' es el equivalente más directo y formal en español; se evita 'piedad' en sentido sentimental moderno y se deja la carga religiosa propia del término.
- source_word: σωτηρίας προσκαίρου
  english_pob_choice: the temporary safety
  chosen_spanish: la seguridad temporal
  alternatives_spanish:
  - la salvación temporal
  - el rescate temporal
  - la preservación temporal
  lexicon: LSJ
  rationale: Aquí σωτηρία alude a la preservación física inmediata bajo la promesa del tirano, no a 'salvación' en sentido escatológico. 'Seguridad temporal' comunica esa preservación breve sin imponer un matiz doctrinal ajeno al contexto.
- source_word: τῆς ἑπτὰ υἱῶν
  english_pob_choice: of her seven sons
  chosen_spanish: de sus siete hijos
  alternatives_spanish:
  - de sus siete hijos varones
  - de sus siete hijos
  lexicon: LSJ
  rationale: El griego identifica a los hijos como 'siete hijos'; en español, 'hijos' es la forma natural y suficientemente precisa en este contexto narrativo. El posesivo 'sus' está justificado por la relación contextual, como en el audit trail inglés.
- source_word: κατὰ τὴν τοῦ τυράννου ὑπόσχεσιν
  english_pob_choice: according to the tyrant’s promise
  chosen_spanish: conforme a la promesa del tirano
  alternatives_spanish:
  - de acuerdo con la promesa del tirano
  - según la promesa del tirano
  lexicon: LSJ
  rationale: κατά con acusativo expresa conformidad. 'Conforme a' suena natural en español formal y preserva la relación de dependencia respecto de la promesa del tirano.
theological_decisions:
- issue: εὐσέβεια como virtud religiosa en contexto de martirio
  english_pob_reading: godliness
  chosen_spanish_reading: la piedad
  alternative_spanish_readings:
  - la devoción a Dios
  - la piedad para con Dios
  - la religiosidad
  rationale: 4 Macabeos usa εὐσέβεια como fidelidad reverente a Dios frente a la presión del tirano. 'Piedad' mantiene la fuerza ética y religiosa del término sin introducir un giro confesional distinto ni suavizar la tensión entre fidelidad y supervivencia.
  doctrine_reference: 'DOCTRINE.md: preserve theological weight; avoid flattening virtue terms into generic religiosity'
- issue: σωτηρία como preservación inmediata, no salvación escatológica
  english_pob_reading: temporary safety
  chosen_spanish_reading: la seguridad temporal
  alternative_spanish_readings:
  - la salvación temporal
  - la preservación temporal
  - el alivio temporal
  rationale: El contexto contrasta obediencia a Dios con la promesa del tirano de mantener con vida a los hijos. 'Seguridad temporal' evita importar el sentido pleno de 'salvación' donde el griego habla de supervivencia corta y circunstancial.
  doctrine_reference: 'DOCTRINE.md: do not import doctrinal claims the text does not make'
translation_notes:
  revision_awareness: La lectura inglesa revisada pasó de 'reverence for God' a 'godliness' para εὐσέβεια. La versión española toma 'piedad' como equivalente directo y formal, manteniendo la tensión semántica del término sin convertirlo en una expresión devocional demasiado interpretativa. También se conserva el valor no escatológico de σωτηρία como preservación física temporal.
  spanish_consistency_notes:
  - Se usa 'tirano' para τυράννου en coherencia con el texto fuente y el audit trail inglés.
  - Se evita 'SEÑOR' u otro eufemismo porque el versículo no contiene el nombre divino.
  - Se mantiene un estilo sobrio y legible, con puntuación que reproduce la pausa y el contraste del griego.
