  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὅτι Αἱ ⸂ἐπιστολαὶ μέν⸃, φησίν, βαρεῖαι καὶ ἰσχυραί, ἡ δὲ παρουσία τοῦ σώματος ἀσθενὴς καὶ ὁ λόγος ἐξουθενημένος.
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/010/010.yaml
  text: For they say[a], "His letters are weighty and strong, but his bodily presence is weak[b], and his speech is despised."
translation:
  language: ko
  text: 어떤 이가 말합니다. 「그의 편지는 무게가 있고 강하지만, 몸으로 마주할 때는 약하고 말은 보잘것없다.」
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: βαρεῖαι
  english_pob_choice: weighty
  chosen_korean: 무게가 있고
  lexicon: BDAG
  rationale: 형용사 「무거운」. 「무게가 있다」가 자연스럽다.
  alternatives_korean:
  - 엄중하고
- source_word: παρουσία
  english_pob_choice: bodily presence
  chosen_korean: 몸으로 마주할 때
  lexicon: BDAG
  rationale: 여기서는 일반적 「임재」가 아니라 인격적 대면을 가리킨다. 「몸으로 마주할 때」가 분명하다.
  alternatives_korean:
  - 임재
  - 현존
- source_word: ἐξουθενημένος
  english_pob_choice: despised
  chosen_korean: 보잘것없다
  lexicon: BDAG
  rationale: 완료 수동분사. 「보잘것없는」이 적대자들의 평가를 가장 잘 담는다.
  alternatives_korean:
  - 멸시받는
  - 무시당하는
