translation:
  language: es
  text: Y Trifón envió fuerzas y caballería a Galilea[a], al gran llano, para destruir a todos los que estaban con Jonatán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a todos los que estaban del lado de Jonatán». El griego dice literalmente «todos los que estaban junto a Jonatán», una expresión que puede señalar a sus partidarios o a sus hombres.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστειλεν
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: BDAG
  rationale: El verbo griego expresa el envío de tropas; «envió» es natural, formal y fiel al sentido militar sin introducir matices innecesarios.
- source_word: δυνάμεις
  english_pob_choice: forces
  chosen_spanish: fuerzas
  alternatives_spanish:
  - tropas
  - contingentes armados
  lexicon: LSJ
  rationale: Aquí el plural se refiere a unidades militares. «Fuerzas» conserva la amplitud del término y funciona bien en español sin precisar más de lo que el texto da.
- source_word: ἵππον
  english_pob_choice: cavalry
  chosen_spanish: caballería
  alternatives_spanish:
  - hombres de a caballo
  - caballeros
  lexicon: LSJ
  rationale: Aunque la forma griega es singular, tiene valor colectivo. «Caballería» comunica de manera idiomática el cuerpo de tropas montadas.
- source_word: εἰς Γαλιλαίαν
  english_pob_choice: into Galilee
  chosen_spanish: a Galilea
  alternatives_spanish:
  - hacia Galilea
  - hasta Galilea
  lexicon: LSJ
  rationale: En español, con verbos de movimiento, «a Galilea» es natural y conserva la dirección del εἰς sin sonar forzado.
- source_word: εἰς τὸ πεδίον τὸ μέγα
  english_pob_choice: into the great plain
  chosen_spanish: al gran llano
  alternatives_spanish:
  - a la gran llanura
  - al llano grande
  lexicon: LSJ
  rationale: «Πεδίον» es «llano/llanura»; elegí «llano» por claridad y fluidez, manteniendo el epíteto «gran» para reflejar τὸ μέγα sin sobreinterpretar el topónimo.
- source_word: τοῦ ἀπολέσαι
  english_pob_choice: to destroy
  chosen_spanish: para destruir
  alternatives_spanish:
  - para exterminar
  - para acabar con
  lexicon: BDAG
  rationale: El infinitivo articular expresa propósito. «Destruir» es suficientemente amplio para abarcar la intención militar sin añadir una fuerza coloquial o excesivamente interpretativa.
- source_word: πάντας τοὺς παρὰ Ἰωνάθου
  english_pob_choice: all those who were with Jonathan
  chosen_spanish: a todos los que estaban con Jonatán
  alternatives_spanish:
  - a todos los que eran de Jonatán
  - a todos los que apoyaban a Jonatán
  lexicon: LSJ
  rationale: La construcción con παρὰ + nombre indica asociación o pertenencia al lado de alguien. «Estaban con» reproduce bien esa relación y evita fijar indebidamente si se trata de seguidores, hombres o aliados.
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente no introdujo cambios: el texto quedó confirmado como estable. El control cruzado indicó acuerdo alto con objeciones menores, principalmente sobre el matiz de la frase final; por eso se conserva en español una formulación transparente y se añade nota alternativa.'
  spanish_consistency_notes:
  - Se mantiene «Y» inicial para reflejar la coordinación narrativa del griego.
  - Se usa «Jonatán» con ortografía española habitual para el nombre propio.
  - Se conserva la secuencia espacial «a Galilea, al gran llano» para reproducir el doble εἰς del original.
  - No se sustituye «fuerzas» por «poderes», ya que el contexto es militar y no abstracto.
