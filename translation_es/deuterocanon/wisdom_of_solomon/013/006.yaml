  to: Sin embargo, aun para estos hay poco reproche[a], pues también ellos quizá se extravían mientras buscan a Dios y desean hallarlo;
  rationale: Se reemplaza «poca culpa» por «poco reproche» para reflejar con mayor precisión μέμψις como censura o reproche leve, en línea con la evidencia léxica y la decisión auditada en inglés. Se conserva el resto del texto porque transmite fielmente el sentido del original y mantiene buena legibilidad en español.
