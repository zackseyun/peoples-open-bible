id: 2CH.6.31
reference: 2 Chronicles 6:31
source:
  edition: WLC
  text: לְמַ֣עַן יִֽירָא֗וּ/ךָ לָ/לֶ֨כֶת֙ בִּ/דְרָכֶ֔י/ךָ כָּל הַ֨/יָּמִ֔ים אֲשֶׁר הֵ֥ם חַיִּ֖ים עַל פְּנֵ֣י הָ/אֲדָמָ֑ה אֲשֶׁ֥ר נָתַ֖תָּה לַ/אֲבֹתֵֽי/נוּ־־־׃ס
translation:
  text: so that they may fear you and walk in your ways all the days that they live on the face of the land that you gave to our fathers[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'revere you' or 'stand in awe of you.' The Hebrew 'fear' includes reverence expressed in obedience.
    reason: lexical_alternative
  - marker: b
    text: Or 'as long as they live on the face of the land.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - that
  lexicon: HALOT
  rationale: Introduces purpose/result. 'So that' is natural modern English and preserves the purposive force.
- source_word: יִירָאוּךָ
  chosen: they may fear you
  alternatives:
  - they may revere you
  - they may stand in awe of you
  lexicon: HALOT
  rationale: From ירא in the qal, with 2ms suffix. 'Fear you' is the standard and sufficiently broad biblical expression, preserving the covenantal sense of reverent fear without reducing it to mere terror. The modal 'may' reflects the imperfect in this purpose clause.
- source_word: לָלֶכֶת
  chosen: by walking
  alternatives:
  - to walk
  - so as to walk
  lexicon: HALOT
  rationale: 'The infinitive construct expresses manner or accompanying action after ''fear you''; ''by walking'' makes the relationship clear in English: fearing God is expressed in conduct. ''To walk'' would also be possible, but ''by walking'' better captures the practical outworking.'
- source_word: בִּדְרָכֶיךָ
  chosen: in your ways
  alternatives:
  - in your paths
  - according to your ways
  lexicon: HALOT
  rationale: A common Hebrew idiom for conduct according to God's prescribed manner. 'Ways' is the most transparent and traditional rendering.
- source_word: כָּל הַיָּמִים
  chosen: all the days
  alternatives:
  - all their days
  - always
  lexicon: HALOT
  rationale: Retains the concrete temporal expression of the Hebrew rather than flattening it to 'always.'
- source_word: אֲשֶׁר הֵם חַיִּים
  chosen: that they live
  alternatives:
  - while they are living
  - as long as they live
  lexicon: HALOT
  rationale: This relative clause qualifies the duration of 'all the days.' 'That they live' is concise and faithful; the sense is effectively 'as long as they live.'
- source_word: עַל פְּנֵי הָאֲדָמָה
  chosen: on the face of the land
  alternatives:
  - on the land
  - upon the earth
  - on the face of the earth
  lexicon: HALOT
  rationale: The idiom literally means 'on the face/surface of.' Because the following clause specifies the land given to the fathers, 'land' is preferable to 'earth.' Retaining 'on the face of' preserves the Hebrew imagery without becoming obscure.
- source_word: הָאֲדָמָה
  chosen: the land
  alternatives:
  - the ground
  - the earth
  lexicon: HALOT
  rationale: In context of the land given to the fathers, this refers to the promised land rather than the whole earth or mere soil.
- source_word: אֲשֶׁר נָתַתָּה לַאֲבֹתֵינוּ
  chosen: that you gave to our fathers
  alternatives:
  - which you have given to our fathers
  - that you gave our fathers
  lexicon: HALOT
  rationale: A completed divine gift viewed from the speaker's standpoint. 'Gave to our fathers' is idiomatic and preserves the covenantal reference to the ancestors.
