translation:
  language: es
  text: Entonces hablé a los desterrados[a] todas las palabras de Yahvé que él me había mostrado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el destierro», un término colectivo para la comunidad deportada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֲדַבֵּר
  english_pob_choice: Then I spoke
  chosen_spanish: Entonces hablé
  alternatives_spanish:
  - Y hablé
  - Y entonces hablé
  - Así hablé
  lexicon: HALOT
  rationale: El wayyiqtol avanza la narración; «Entonces» conserva la secuencia temporal de manera natural en español, y «hablé» mantiene la primera persona singular y el tono sobrio del relato.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: La preposición de dirección se expresa normalmente con «a» en español cuando introduce el destinatario del discurso.
- source_word: הַגּוֹלָה
  english_pob_choice: the exiles
  chosen_spanish: los desterrados
  alternatives_spanish:
  - los exiliados
  - la comunidad de los desterrados
  - el destierro
  lexicon: HALOT
  rationale: El sustantivo hebreo puede funcionar como colectivo para la comunidad deportada. «Desterrados» comunica esa condición con claridad en español y evita una perífrasis más explicativa.
- source_word: אֵת כָּל דִּבְרֵי
  english_pob_choice: all the words of
  chosen_spanish: todas las palabras de
  alternatives_spanish:
  - todas las cosas de
  - todo lo que
  lexicon: HALOT
  rationale: «Palabras» conserva el carácter verbal y revelatorio del hebreo דִּבְרֵי, mejor que una paráfrasis más general. Se mantiene «todas» para reflejar כָּל.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se sigue la norma del proyecto para el Tetragrámaton. En español, «Yahvé» es la forma de uso más asentada y legible para el nombre divino, preservando el nombre propio del pacto y no sustituyéndolo por un título.
- source_word: אֲשֶׁר הֶרְאָנִי
  english_pob_choice: that he had shown me
  chosen_spanish: que él me había mostrado
  alternatives_spanish:
  - que me había mostrado
  - que me hizo ver
  lexicon: HALOT
  rationale: El hifil de ראה aquí expresa ‘mostrar/revelar’. El pluscuamperfecto español reproduce bien la relación temporal posterior al acto visionario, manteniendo la referencia a lo que Yahvé reveló al profeta.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: La decisión doctrinal del proyecto es conservar el nombre divino en vez de sustituirlo por «el SEÑOR». En español, «Yahvé» cumple esa función de manera natural y reconocible.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés muestran acuerdo alto; no se registran revisiones aplicadas. Se ha ajustado solo la formulación española para reflejar la norma del proyecto sobre el nombre divino y la equivalencia natural de הַגּוֹלָה como colectivo.
  spanish_consistency_notes:
  - Se mantuvo el registro bíblico sobrio y directo.
  - Se usó «Yahvé» de acuerdo con la terminología proyectual para el Tetragrámaton.
  - «Desterrados» refleja el colectivo exílico sin introducir una explicación demasiado larga en el cuerpo del texto.
  - La nota al pie preserva la alternativa semántica ‘el destierro’ como colectivo.
