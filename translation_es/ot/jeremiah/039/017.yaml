translation:
  language: es
  text: Pero yo te libraré en aquel día[a], declara Yahvé, y no serás entregado en manos[b] de los hombres de quienes tienes miedo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «te rescataré» o «te salvaré». El verbo hebreo puede expresar librar a alguien del peligro.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «en la mano de los hombres».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִצַּלְתִּיךָ
  english_pob_choice: I will deliver you
  chosen_spanish: te libraré
  alternatives_spanish:
  - te rescataré
  - te salvaré
  lexicon: HALOT
  rationale: El verbo hiphil de נצל expresa librar/rescatar de un peligro. «Libraré» conserva la acción concreta de sacar a alguien de una situación amenazante, sin cargar el término con un sentido doctrinal que el contexto no exige. El pronombre enclítico «te» refleja el objeto directo de segunda persona masculina singular.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - aquel día
  lexicon: HALOT
  rationale: La expresión temporal hebrea se vierte de forma natural y solemne como «en aquel día», que mantiene el matiz de referencia puntual en un marco profético.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: 'Se conserva el nombre divino según el estándar del proyecto: «Yahvé». «Declara» reproduce la fórmula profética נְאֻם con un registro digno y reconocible en español.'
- source_word: וְלֹא תִנָּתֵן
  english_pob_choice: and you will not be given
  chosen_spanish: y no serás entregado
  alternatives_spanish:
  - y no te darán
  - y no quedarás entregado
  lexicon: HALOT
  rationale: El nifal de נתן tiene aquí valor pasivo. En español, «serás entregado» comunica mejor la pasividad de quedar a merced de otros que una traducción más literal y menos natural como «serás dado».
- source_word: בְּיַד
  english_pob_choice: into the hand of
  chosen_spanish: en mano de
  alternatives_spanish:
  - en poder de
  - en la mano de
  lexicon: HALOT
  rationale: Se mantiene la imagen hebrea de la mano como símbolo de control o dominio. «En mano de» es claro en español bíblico y preserva la metáfora sin sobreexplicarla.
- source_word: הָאֲנָשִׁים
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - los varones
  - las personas
  lexicon: HALOT
  rationale: El sustantivo es masculino plural y alude a adversarios concretos; por eso se conserva «los hombres» en vez de una neutralización interpretativa.
- source_word: אֲשֶׁר אַתָּה יָגוֹר מִפְּנֵיהֶם
  english_pob_choice: of whom you are afraid
  chosen_spanish: de quienes estás atemorizado
  alternatives_spanish:
  - de quienes tienes miedo
  - ante quienes temes
  lexicon: HALOT
  rationale: La cláusula final refleja el idiomático מִפְּנֵי־הֶם («de delante de ellos / ante ellos»), que comunica temor o pavor. «Estás atemorizado» conserva el matiz de miedo intenso mejor que un simple «temes».
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: Se sigue el criterio del proyecto de traducir explícitamente el Tetragrámaton como «Yahvé», evitando la sustitución por una forma enmascarada. Esta decisión preserva la identidad del nombre del pacto en el propio texto español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
- issue: Valor del pasivo en וְלֹא תִנָּתֵן
  english_pob_reading: you will not be given
  chosen_spanish_reading: no serás entregado
  alternative_spanish_readings:
  - no te darán
  - no quedarás entregado
  rationale: El pasivo expresa que Jeremías no caerá bajo el control de esos hombres. «Serás entregado» mantiene la pasividad y la idea de quedar en poder ajeno, sin perder la concreción del hebreo.
  doctrine_reference: HALOT; uso sintáctico del nifal de נתן en contexto de dominio
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior anclando explícitamente ambos marcadores de nota en el texto español: [a] en «aquel día» y [b] en «Yahvé». Se mantuvo la revisión final del cierre idiomático, reflejando el sentido de מִפְּנֵיהֶם con una formulación natural en español.'
  spanish_consistency_notes:
  - Se mantiene la preferencia del proyecto por «Yahvé» para יְהוָה.
  - Se conserva el paralelismo formal del versículo con un registro bíblico contemporáneo, no arcaizante.
  - La imagen de «mano» se retiene por ser un modismo hebreo transparente y bien asentado en español bíblico.
  - La cláusula final usa una solución que transmite temor intenso sin borrar la relación preposicional del hebreo.
