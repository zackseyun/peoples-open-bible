translation:
  language: es
  text: Ella hace resplandecer la instrucción como luz, como el Gihón en los días de la vendimia.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ ἐκφαίνων
  english_pob_choice: It makes ... shine forth
  chosen_spanish: Hace resplandecer
  alternatives_spanish:
  - Resplandece
  - El que hace resplandecer
  lexicon: LSJ
  rationale: El participio articular griego funciona aquí como una expresión descriptiva que continúa la referencia a la Ley/instrucción del contexto inmediato. En español, la forma verbal impersonal o transitiva 'Hace resplandecer' conserva el valor funcional sin forzar un sujeto personal que el contexto no exige.
- source_word: παιδείαν
  english_pob_choice: instruction
  chosen_spanish: la instrucción
  alternatives_spanish:
  - la disciplina
  - la formación
  - la educación
  lexicon: LSJ
  rationale: En el contexto sapiencial de Sirácides, παιδεία denota instrucción formativa en sabiduría. 'Instrucción' es claro en español y evita el matiz punitivo que 'disciplina' puede sugerir.
- source_word: ὡς φῶς
  english_pob_choice: like light
  chosen_spanish: como luz
  alternatives_spanish:
  - como la luz
  lexicon: LSJ
  rationale: La comparación con φῶς se expresa de manera natural en español con 'como luz'. Mantiene la imagen sin añadir determinación innecesaria.
- source_word: ὡς Γηὼν
  english_pob_choice: like the Gihon
  chosen_spanish: como el Gihón
  alternatives_spanish:
  - como Gihón
  lexicon: LSJ
  rationale: Se conserva el nombre propio del río con artículo natural en español. 'Gihón' es la forma usual del topónimo bíblico en español.
- source_word: ἐν ἡμέραις τρυγητοῦ
  english_pob_choice: in the days of the grape harvest
  chosen_spanish: en los días de la vendimia
  alternatives_spanish:
  - en los días de la cosecha de uvas
  - en tiempo de vendimia
  lexicon: LSJ
  rationale: τρυγητός se refiere específicamente a la recolección de uvas/vendimia. 'Vendimia' es idiomática en español y conserva la especificidad agrícola del término.
theological_decisions:
- issue: Sujeto implícito de ὁ ἐκφαίνων
  english_pob_reading: It makes instruction shine forth like light, like the Gihon in the days of the grape harvest.
  chosen_spanish_reading: Hace resplandecer la instrucción como luz, como el Gihón en los días de la vendimia.
  alternative_spanish_readings:
  - El que hace resplandecer la instrucción como luz, como el Gihón en los días de la vendimia.
  - Resplandece la instrucción como luz, como el Gihón en los días de la vendimia.
  rationale: La lectura inglesa revisada evita un antecedente personal indebido y entiende el participio como una descripción de la instrucción/Ley del contexto. El español mantiene esa ambigüedad controlada mediante una construcción verbal no personal, sin imponer un sujeto que no está explícito en el griego.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve referent and rhetorical flow without introducir un sujeto teológico ajeno al texto.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente que corrigió el antecedente de ὁ ἐκφαίνων de 'He' a 'It'. La presente versión española sigue esa decisión y evita una lectura personal no sustentada por el contexto.
  spanish_consistency_notes:
  - Se usa 'instrucción' para παιδεία de manera coherente con el contexto sapiencial.
  - Se mantiene 'Gihón/Gihón' como topónimo bíblico, con artículo natural en español.
  - '''Vendimia'' conserva el sentido agrícola específico de τρυγητός.'
  - No se introduce una mayúscula teológica en 'instrucción' porque el referente inmediato aquí es funcional y no un nombre propio.
