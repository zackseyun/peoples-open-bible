    issue: '''tenías sentimientos humanos de deseo'' es poco idiomático'
    rationale: Aunque intenta reflejar 'human feelings of desire', en español suena forzado y pesado. El griego verbal ἠσθάνου se expresa mejor con una construcción verbal natural como 'sentías deseos humanos'.
  - severity: low
    issue: '''para la liberación'' es menos natural que ''de liberación'' tras ''esperanza'''
    rationale: El griego σωτηρίου depende de ἐλπίδα como resultado esperado. En español, 'esperanza de liberación' suena más natural y mantiene bien la relación semántica.
