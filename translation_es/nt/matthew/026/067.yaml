  source_alignment_summary: 'El borrador español refleja bien la secuencia y el sentido del griego: τότε = «Entonces», ἐνέπτυσαν εἰς τὸ πρόσωπον αὐτοῦ = «le escupieron en el rostro», ἐκολάφισαν αὐτόν = «lo golpearon con los puños», y οἱ δὲ ἐράπισαν = «y otros le dieron bofetadas». Conserva la concreción de la humillación y violencia sin suavizarla.'
  spanish_quality_summary: 'El texto principal es claro, natural y digno en español. La única reparación necesaria está en la nota b, donde «lo patearon/boxearon» no corresponde al griego ni al rastro léxico inglés: «patearon» introduce una acción distinta, y «boxearon» suena impropia en este contexto bíblico. Conviene además alinear la nota con alternativas más fieles y naturales como «le dieron puñetazos».'
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Las decisiones léxicas principales son adecuadas: «rostro», «puños», «bofetadas».'
  issues:
  - severity: medium
    issue: La nota b incluye «lo patearon/boxearon».
    rationale: κολαφίζω indica golpes con el puño; «patearon» significa dar patadas y falsea el sentido. «Boxearon» es demasiado coloquial/deportivo y no refleja bien el registro del pasaje ni el audit trail inglés, que sugiere «struck him» o «punched him». También hay desajuste porque el anclaje [b] está en el texto principal pero la nota b no ofrece una alternativa fiel.
  revised_spanish_text: Entonces le escupieron en el rostro y lo golpearon con los puños[a][b], y otros le dieron bofetadas[c].
  revised_footnotes:
  - marker: a
    text: O «le escupieron en la cara». La expresión griega dice literalmente que escupieron «en el rostro» de él, un giro idiomático para escupirle directamente al rostro.
    reason: lexical_alternative
  - marker: b
    text: O «lo golpearon» o «le dieron puñetazos». El verbo indica específicamente golpes con el puño.
    reason: lexical_alternative
  - marker: c
    text: O «otros le dieron golpes» o «otros lo golpearon con la mano abierta». El verbo suele referirse a una bofetada.
    reason: lexical_alternative
