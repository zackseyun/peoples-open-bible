theological_decisions:
- issue: Rendering the generic masculine הָאִישׁ
  chosen_reading: a man
  alternative_readings:
  - someone
  - a person
  rationale: The Hebrew uses a grammatically masculine singular generic. Following the project's gender-accurate policy, the translation preserves the masculine form rather than neutralizing it, since the verse comments on customary speech rather than making an inclusivity-sensitive exhortation.
  doctrine_reference: Translation philosophy §4
- issue: Understanding דָּרַשׁ אֱלֹהִים in prophetic context
  chosen_reading: to inquire of God
  alternative_readings:
  - to seek God
  - to consult God
  rationale: The context concerns going to a prophetic intermediary for guidance. 'Inquire of God' preserves the religious and consultative sense without importing later doctrinal claims about prophecy.
  doctrine_reference: Translation philosophy §1
