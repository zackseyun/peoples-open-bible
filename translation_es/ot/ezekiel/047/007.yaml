  - severity: low
    issue: La nota [b] es innecesaria en español en este versículo.
    rationale: La traducción plural de un singular colectivo es una decisión normal y transparente aquí. El inglés POB no exigía nota sobre este punto; basta con reflejarlo en la decisión léxica interna.
