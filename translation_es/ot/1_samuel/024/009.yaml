translation:
  language: es
  text: 'Después de eso, David se levantó y salió de la cueva, y llamó tras Saúl, diciendo: «¡Mi señor, el rey!». Cuando Saúl miró hacia atrás, David se inclinó con el rostro en tierra y se postró[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se inclinó profundamente». El verbo hebreo puede denotar reverencia u homenaje profundos; aquí se refiere a la postura de David ante Saúl, no a adoración divina.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  english_pob_choice: rose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - se puso de pie
  lexicon: HALOT
  rationale: El valor narrativo de קום aquí es de ponerse en pie o levantarse; en español, «se levantó» es natural y conserva el movimiento inicial sin sobrecargarlo.
- source_word: אַחֲרֵי כֵן
  english_pob_choice: After that
  chosen_spanish: Después de eso
  alternatives_spanish:
  - Luego
  - Después
  lexicon: HALOT
  rationale: La secuencia temporal queda clara con una fórmula española directa y natural para el relato.
- source_word: וַיֵּצֵא מִן־הַמְּעָרָה
  english_pob_choice: went out of the cave
  chosen_spanish: salió de la cueva
  alternatives_spanish:
  - salió fuera de la cueva
  - se fue de la cueva
  lexicon: HALOT
  rationale: יצא expresa salir; «salió de la cueva» reproduce el sentido con fluidez en español y conserva el lugar de procedencia.
- source_word: וַיִּקְרָא אַחֲרֵי שָׁאוּל
  english_pob_choice: called after Saul
  chosen_spanish: llamó detrás de Saúl
  alternatives_spanish:
  - llamó a Saúl desde atrás
  - gritó tras Saúl
  lexicon: HALOT
  rationale: אַחֲרֵי indica dirección/posición respecto de Saúl que se alejaba. «Llamó detrás de Saúl» mantiene la imagen espacial del hebreo; «gritó» sería más interpretativo.
- source_word: אֲדֹנִי הַמֶּלֶךְ
  english_pob_choice: My lord the king
  chosen_spanish: ¡Mi señor, el rey!
  alternatives_spanish:
  - ¡Mi señor, rey mío!
  - ¡Mi señor y rey!
  lexicon: HALOT
  rationale: אֲדֹנִי es una forma de respeto. En español, «mi señor, el rey» preserva la deferencia y el título real; se mantiene la puntuación exclamativa para reflejar el llamado directo.
- source_word: וַיַּבֵּט שָׁאוּל אַחֲרָיו
  english_pob_choice: When Saul looked behind him
  chosen_spanish: Cuando Saúl miró hacia atrás
  alternatives_spanish:
  - Cuando Saúl volvió la vista atrás
  - Saúl miró detrás de sí
  lexicon: HALOT
  rationale: נבט significa mirar; «miró hacia atrás» expresa bien אַחֲרָיו en español contemporáneo sin perder la relación espacial.
- source_word: וַיִּקֹּד
  english_pob_choice: bowed
  chosen_spanish: se inclinó
  alternatives_spanish:
  - se dobló
  - hizo una reverencia
  lexicon: HALOT
  rationale: קדד denota inclinarse o doblarse. «Se inclinó» es una forma clara y digna que prepara el paralelismo con la postración posterior.
- source_word: אַפַּיִם אַרְצָה
  english_pob_choice: with his face to the ground
  chosen_spanish: con el rostro en tierra
  alternatives_spanish:
  - con la cara en tierra
  - con el rostro hacia el suelo
  lexicon: HALOT
  rationale: El hebreo expresa una postración profunda con un modismo corporal. «Con el rostro en tierra» conserva la imagen idiomática y su solemnidad.
- source_word: וַיִּשְׁתָּחוּ
  english_pob_choice: prostrated himself
  chosen_spanish: se postró
  alternatives_spanish:
  - se arrodilló
  - se inclinó profundamente
  lexicon: HALOT
  rationale: שׁחה aquí describe postración, no adoración divina. «Se postró» preserva la fuerza física del acto y evita confundirlo con culto religioso.
theological_decisions:
- issue: Postura de David ante Saúl
  english_pob_reading: Physical posture of deep respect/submission, not worship in a theological sense
  chosen_spanish_reading: Postura corporal de profundo respeto y sumisión, no adoración en sentido religioso
  alternative_spanish_readings:
  - lo adoró
  - le rindió culto
  rationale: El objeto del gesto es Saúl, por lo que el texto describe reverencia humana. En español conviene evitar verbos de culto que borrarían esa tensión semántica del hebreo.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: Se siguió el último pase de revisión, sin cambios pendientes, y el resumen de concordancia alta confirma que no había objeciones textuales adicionales. La redacción española intenta conservar la secuencia narrativa y la distinción entre inclinarse y postrarse.
  spanish_consistency_notes:
  - Se mantiene «Dios»/«Yahvé» como norma general del proyecto, aunque este versículo no los contiene.
  - Se usa «se postró» para שׁחה y «se inclinó» para קדד, preservando la diferencia verbal que el inglés auditado también distinguía.
  - La frase de tratamiento «mi señor, el rey» conserva el respeto sin introducir una formulación más litúrgica o arcaica.
