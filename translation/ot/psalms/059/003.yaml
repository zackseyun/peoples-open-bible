  rationale: The Hebrew is grammatically masculine and contextually refers to violent human opponents. Following the stated gender-accurate policy, the masculine form is preserved rather than neutralized.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Idiomatic force of דָמִים
  chosen_reading: men of blood
