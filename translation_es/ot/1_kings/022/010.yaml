revisions:
- from: Y el rey de Israel y Josafat rey de Judá estaban sentados, cada uno en su trono, vestidos con vestidos, en la era, a la entrada de la puerta de Samaria, y todos los profetas profetizaban delante de ellos.
  to: Y el rey de Israel y Josafat, rey de Judá, estaban sentados, cada uno en su trono, ataviados con ropas, en la era, a la entrada de la puerta de Samaria, y todos los profetas profetizaban delante de ellos.
  rationale: Se reemplaza el calco «vestidos con vestidos» por «ataviados con ropas», que conserva el sentido de מְלֻבָּשִׁים בְּגָדִים sin añadir la idea no explícita de vestiduras reales y con mejor naturalidad en español. También se añade puntuación appositiva para una lectura más clara.
