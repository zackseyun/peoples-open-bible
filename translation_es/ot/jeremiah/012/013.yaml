  yaml_path: translation/ot/jeremiah/012/013.yaml
  text: They have sown wheat[a], but they have reaped thorns; they have exhausted themselves, but they profit nothing. Be ashamed of your produce because of the burning anger of Yahweh.
  footnotes:
