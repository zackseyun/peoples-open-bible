translation:
  language: es
  text: 'Porque así dice Yahvé, el Señor: yo te trataré[a] como has hecho, porque despreciaste el juramento[b] al quebrantar el pacto.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «haré contigo» o «actuaré contigo»; el hebreo usa un verbo general con sentido retributivo o judicial.
    reason: lexical_alternative
  - marker: b
    text: O «la maldición»; el hebreo אָלָה puede referirse al juramento solemne y también a la maldición vinculada al pacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahvéh
  lexicon: HALOT
  rationale: Conservo el valor de título soberano de אֲדֹנָי como «Señor» y el nombre divino YHWH como «Yahvé», siguiendo la pauta del proyecto para el Tetragrama. En español, «Señor Yahvé» mantiene ambos elementos sin el enmascaramiento «SEÑOR».
- source_word: וְעָשִׂית אוֹתָךְ
  english_pob_choice: I will deal with you
  chosen_spanish: yo te trataré
  alternatives_spanish:
  - yo obraré contigo
  - yo haré contigo
  lexicon: HALOT
  rationale: El hebreo usa una construcción idiomática de «hacer a/de alguien» con sentido judicial o retributivo. «Te trataré» comunica bien esa relación de trato/retribución en español sin perder la fuerza del acto divino.
- source_word: כַּאֲשֶׁר עָשִׂית
  english_pob_choice: as you have done
  chosen_spanish: como tú has hecho
  alternatives_spanish:
  - tal como tú hiciste
  - según lo que hiciste
  lexicon: HALOT
  rationale: 'Mantiene la comparación directa y el tiempo perfecto adecuado al reproche: el trato divino corresponde a lo ya realizado por Jerusalén.'
- source_word: בָּזִית
  english_pob_choice: you despised
  chosen_spanish: despreciaste
  alternatives_spanish:
  - menospreciaste
  - tuviste en poco
  lexicon: HALOT
  rationale: «Despreciaste» reproduce con claridad la carga de desdén y desprecio del verbo בזה en un contexto de acusación de pacto.
- source_word: אָלָה
  english_pob_choice: the oath
  chosen_spanish: el juramento[b]
  alternatives_spanish:
  - el juramento con maldición
  - la maldición
  - el voto jurado
  lexicon: HALOT
  rationale: En contexto pactual, אָלָה puede apuntar al juramento solemne y también a su sanción de maldición. «Juramento» es natural y fiel en español; la ambigüedad queda preservada en la nota.
- source_word: לְהָפֵר בְּרִית
  english_pob_choice: by breaking the covenant
  chosen_spanish: al quebrantar el pacto
  alternatives_spanish:
  - al violar el pacto
  - para quebrantar el pacto
  lexicon: HALOT
  rationale: «Quebrantar el pacto» es una expresión idiomática clara y reverente en español, y el gerundio preposicional «al» refleja bien la relación causal/manner del infinitivo hebreo.
theological_decisions:
- issue: Nombre divino en אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - Señor Yahvé
  rationale: Se conserva la distinción entre el título אֲדֹנָי y el nombre del pacto YHWH, conforme a la directriz del proyecto de traducir יְהוָה como «Yahvé» en el texto principal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de אָלָה en contexto de pacto
  english_pob_reading: oath
  chosen_spanish_reading: juramento
  alternative_spanish_readings:
  - maldición
  - juramento con maldición
  rationale: El contexto de «quebrantar el pacto» favorece entender אָלָה como juramento vinculante; sin embargo, se preserva la tensión lexical porque el término puede incluir la sanción de maldición asociada al juramento.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Se revisó el audit trail inglés y no hubo cambios posteriores en la última pasada de revisión; la propuesta mantiene la lectura de equivalencia óptima y conserva la tensión léxica de אָלָה en nota.
  spanish_consistency_notes:
  - «Yahvé» se usa para el Nombre divino, no «SEÑOR» como máscara tipográfica.
  - «Pacto» se prefiere para בְּרִית por su registro bíblico y claridad en contexto pactual.
  - Se evita «Cristo» o terminología no presente en el versículo.
  - La puntuación sigue el estilo bíblico editorial en español con dos puntos tras la fórmula profética.
