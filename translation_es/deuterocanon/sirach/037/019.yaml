translation:
  language: es
  text: También hay un hombre sabio que confía en su propio discernimiento[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo griego dice algo muy distinto: «Hay un hombre astuto y maestro de muchos, y para su propia alma es inútil». Esto probablemente refleja otra forma hebrea del versículo o una tradición textual sustancialmente diferente.'
    reason: textual_variant
  - marker: b
    text: La expresión hebrea «consejo del corazón» es un modismo para la deliberación o el discernimiento interior; aquí se ha vertido como «discernimiento» para mayor claridad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וגם
  english_pob_choice: There is also
  chosen_spanish: También hay
  alternatives_spanish:
  - Y también hay
  - Además hay
  lexicon: HALOT
  rationale: La partícula introduce otro caso dentro de la serie sapiencial. En español, "también hay" reproduce de forma natural la función existencial y aditiva sin volverlo mecánico.
- source_word: עצת לבב
  english_pob_choice: understanding
  chosen_spanish: consejo interno
  alternatives_spanish:
  - consejo del corazón
  - consejo del corazón interior
  - entendimiento
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente "consejo del corazón" y apunta a deliberación o discernimiento interior. "Consejo interno" conserva la imagen y el sentido reflexivo, sin perder la metáfora del corazón.
- source_word: הבין
  english_pob_choice: wise man
  chosen_spanish: hombre sabio
  alternatives_spanish:
  - hombre entendido
  - hombre discerniente
  - persona sabia
  lexicon: HALOT
  rationale: El participio describe a una persona caracterizada por entendimiento/discernimiento. "Hombre sabio" es natural en español y mantiene el singular masculino representativo del hebreo.
- source_word: אמן
  english_pob_choice: trustworthy
  chosen_spanish: digno de confianza
  alternatives_spanish:
  - confiable
  - fidedigno
  - en quien se puede confiar
  lexicon: HALOT
  rationale: En el contexto de confianza personal, la idea es de fiabilidad. "Digno de confianza" preserva el valor relacional y evita forzar el sentido hacia mera capacidad intelectual.
theological_decisions:
- issue: Masculino singular sapiencial
  english_pob_reading: wise man
  chosen_spanish_reading: hombre sabio
  alternative_spanish_readings:
  - persona sabia
  - hombre entendido
  rationale: El hebreo está en masculino singular y funciona como tipo representativo en un dicho sapiencial. Mantener "hombre" respeta la forma fuente y evita neutralizar indebidamente la gramática.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Tratamiento de la expresión idiomática 'counsel of heart'
  english_pob_reading: Hebrew 'counsel of heart' is idiomatic for inward deliberation or discernment
  chosen_spanish_reading: consejo interno
  alternative_spanish_readings:
  - consejo del corazón
  - discernimiento interior
  rationale: La imagen del corazón como sede de la deliberación se conserva, pero en un español legible. No se traduce como mera 'inteligencia' para no borrar la concreción idiomática del hebreo.
  doctrine_reference: PHILOSOPHY.md 'Deuterocanonical / Apocrypha'
- issue: Divergencia textual con el paralelo griego
  english_pob_reading: The Greek parallel reads quite differently... This likely reflects a different Hebrew form of the verse or a substantially divergent textual tradition.
  chosen_spanish_reading: Traducir desde el hebreo, con nota del paralelo griego divergente
  alternative_spanish_readings:
  - 'seguir el griego: ''Hay un hombre astuto y maestro de muchos, pero es inútil para su propia alma'''
  rationale: Como el testimonio hebreo está disponible y es el texto base del proyecto, se mantiene en la línea principal. El griego se documenta como alternativa textual real, no como sustitución silenciosa.
  doctrine_reference: PHILOSOPHY.md 'Deuterocanonical / Apocrypha'
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente del audio-trail inglés: la idea principal es que un hombre sabio tiene un consejo interior confiable para él. Se evita el giro interrogativo y el desplazamiento a segunda persona que aparecían en una versión previa, porque no corresponden al hebreo transmitido ni a la forma natural del dicho.'
  spanish_consistency_notes:
  - Se mantuvo 'hombre sabio' para reflejar el masculino singular sapiencial del hebreo.
  - '''Consejo interno'' conserva la metáfora del corazón sin imponer un calco rígido.'
  - '''Digno de confianza'' expresa la fiabilidad personal de אמן en un contexto relacional.'
  - No se adoptó la lectura griega en el texto principal; quedó documentada en nota por su valor de variante textual.
