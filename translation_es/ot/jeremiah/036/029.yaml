  text: וְ/עַל יְהוֹיָקִ֤ים מֶֽלֶךְ יְהוּדָה֙ תֹּאמַ֔ר כֹּ֖ה אָמַ֣ר יְהוָ֑ה אַ֠תָּה שָׂרַ֜פְתָּ אֶת הַ/מְּגִלָּ֤ה הַ/זֹּאת֙ לֵ/אמֹ֔ר מַדּוּעַ֩ כָּתַ֨בְתָּ עָלֶ֜י/הָ לֵ/אמֹ֗ר בֹּֽא יָב֤וֹא מֶֽלֶךְ בָּבֶל֙ וְ/הִשְׁחִית֙ אֶת הָ/אָ֣רֶץ הַ/זֹּ֔את וְ/הִשְׁבִּ֥ית מִמֶּ֖/נָּה אָדָ֥ם וּ/בְהֵמָֽה־־־־־־׃ס
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/036/029.yaml
  text: 'And concerning Jehoiakim king of Judah[a], you shall say, ‘Thus says Yahweh: You have burned this scroll, saying, “Why have you written on it, saying, ‘The king of Babylon will surely come and destroy this land, and cut off from it man and beast’?”’'
  footnotes:
