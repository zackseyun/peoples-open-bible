translation:
  language: es
  text: Él revela cosas profundas de la oscuridad, y saca a la luz la sombra de la muerte[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «profunda oscuridad» o «oscuridad mortal» para «la sombra de la muerte» (hebreo צַלְמָוֶת).
    reason: lexical_alternative
lexical_decisions:
- source_word: מְגַלֶּה
  english_pob_choice: reveals
  chosen_spanish: revela
  alternatives_spanish:
  - descubre
  - desvela
  lexicon: HALOT
  rationale: El participio de גלה expresa la acción de hacer visible o conocido lo oculto. «Revela» conserva el sentido de quitar el velo y suena natural en español bíblico moderno.
- source_word: עֲמֻקוֹת
  english_pob_choice: the deep things
  chosen_spanish: cosas profundas
  alternatives_spanish:
  - las cosas profundas
  - profundidades
  - cosas ocultas
  lexicon: HALOT
  rationale: El plural sustantivado comunica realidades hondas o inescrutables. «Cosas profundas» mantiene el plural y evita estrechar indebidamente el campo semántico solo a profundidad espacial.
- source_word: מִנִּי חֹשֶׁךְ
  english_pob_choice: out of darkness
  chosen_spanish: desde la oscuridad
  alternatives_spanish:
  - de la oscuridad
  - fuera de la oscuridad
  - desde tinieblas
  lexicon: HALOT
  rationale: La preposición indica procedencia o salida. «Desde la oscuridad» preserva la idea de origen y fluidez poética en español; «oscuridad» mantiene el término general sin forzar «tinieblas».
- source_word: וַיֹּצֵא
  english_pob_choice: brings ... out
  chosen_spanish: saca ... a la luz
  alternatives_spanish:
  - hace salir ... a la luz
  - trae ... a la luz
  - saca ... fuera
  lexicon: HALOT
  rationale: El verbo causativo expresa que Dios hace salir algo. «Saca ... a la luz» reproduce la fuerza causativa y enlaza bien con el siguiente cola, evitando una construcción demasiado literal e infeliz en español.
- source_word: לָאוֹר
  english_pob_choice: to light
  chosen_spanish: a la luz
  alternatives_spanish:
  - a la claridad
  - en la luz
  - hacia la luz
  lexicon: HALOT
  rationale: La meta del movimiento es la luz; «a la luz» es la equivalencia más natural y conserva el paralelismo con «saca».
- source_word: צַלְמָוֶת
  english_pob_choice: the shadow of death
  chosen_spanish: la sombra de muerte
  alternatives_spanish:
  - profunda oscuridad
  - oscuridad mortal
  - la sombra de la muerte
  lexicon: HALOT
  rationale: Se conserva la expresión tradicional y lexicográficamente defendible, que mantiene la intensidad poética y la ambigüedad documentada. En español, «sombra de muerte» sigue siendo comprensible y auditable.
theological_decisions:
- issue: Sentido de צַלְמָוֶת
  english_pob_reading: the shadow of death, with alternative lexical possibility of deep darkness
  chosen_spanish_reading: la sombra de muerte, con alternativa de profunda oscuridad
  alternative_spanish_readings:
  - profunda oscuridad
  - oscuridad mortal
  - la sombra de la muerte
  rationale: La decisión principal conserva la lectura tradicional sin borrar la tensión lexical. La nota ofrece la alternativa moderna de «profunda oscuridad», ya que parte de la evidencia filológica entiende el término como un intensificador de oscuridad extrema más que como una referencia literal a la muerte.
  doctrine_reference: Preservar la ambigüedad léxica documentada; no resolverla silenciosamente.
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente al omitir cualquier artículo innecesario antes de «cosas profundas» y al usar una formulación más idiomática para el movimiento hacia la luz. La estructura española conserva el paralelismo del hebreo y la alternativa léxica documentada para צַלְמָוֶת.
  spanish_consistency_notes:
  - Se mantuvo «Dios» implícito mediante el pronombre personal «Él», como en el contexto inmediato del versículo en español.
  - «Sombra de muerte» se conserva por fidelidad poética y auditabilidad; la nota ofrece la alternativa léxica reconocida.
  - No se introdujo un equivalente de «SEÑOR» ni una paráfrasis doctrinal ajena al texto.
  - 'El orden verbal busca reflejar dos acciones paralelas: revelar y sacar a la luz.'
