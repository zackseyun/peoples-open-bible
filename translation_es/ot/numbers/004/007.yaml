review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura hebrea: mesa de la Presencia, extender un paño azul, colocar los utensilios, y afirmar que el pan está sobre la mesa. Sin embargo, introduce una nota b no respaldada por el rastro inglés y omite la alternativa documentada para לֶחֶם הַתָּמִיד.'
  spanish_quality_summary: El español es claro y natural en general. 'Mesa de la Presencia', 'extenderán', 'platos', 'copas' y 'libación' funcionan bien. Pero 'pan regular' suena algo poco idiomático en español bíblico; 'pan continuo' o 'pan de continuo' sería más natural, y al menos debe preservarse en nota la alternativa documentada. La nota b actual sobre 'paño azul' es innecesaria y no corresponde al aparato inglés.
  glossary_alignment: 'No hay conflicto con terminología de proyecto mayor. La elección ''Presencia'' está bien alineada con la decisión POB. ''Libación'' preserva correctamente נֶסֶךְ. El principal ajuste es al aparato de notas: conservar la alternativa documentada para ''pan continuo'' y no crear una nota no motivada para ''paño azul''.'
  issues:
  - severity: medium
    issue: Falta la nota alternativa para לֶחֶם הַתָּמִיד
    rationale: El inglés POB preserva explícitamente la alternativa 'continual bread' y explica su referencia cultual. El español debe reflejar esa decisión con una nota anclada en 'pan regular' o con una mejora textual.
  - severity: medium
    issue: La nota b sobre 'paño de color azul' no está respaldada por el aparato inglés
    rationale: El POB no preservó una nota para בֶּגֶד תְּכֵלֶת; la nota española crea un aparato adicional innecesario y menos pertinente que la nota requerida sobre el pan.
  - severity: low
    issue: '''Pan regular'' es comprensible pero algo poco natural en español bíblico'
    rationale: No es infiel, pero en español eclesial amplio 'pan continuo' suena más natural como alternativa cultual. Puede mantenerse el texto principal si se añade la nota adecuada, o mejorarse ligeramente el texto principal.
  revised_spanish_text: Y sobre la mesa de la Presencia[a] extenderán un paño azul, y pondrán sobre ella los platos, las copas, los tazones y las jarras para la libación; y el pan continuo[b] estará sobre ella.
  revised_footnotes:
  - marker: a
    text: O, tradicionalmente, ‘la mesa de la proposición’. El hebreo es más literalmente ‘la mesa de la Presencia’.
    reason: alternative_reading
  - marker: b
    text: O, ‘el pan regular’. Esto se refiere al pan que se mantenía regularmente delante de Yahvé sobre la mesa.
    reason: lexical_alternative
  revision_rationale: Se elimina la nota no necesaria sobre 'paño azul' y se restaura la nota léxica requerida para לֶחֶם הַתָּמִיד. Además, se mejora el texto principal a 'pan continuo', que suena más natural en español bíblico y refleja mejor la alternativa cultual documentada, manteniendo la opción 'pan regular' en nota. No se requieren cambios doctrinales ni adjudicación adicional.
