review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el paralelismo hebreo y la mayor parte de las decisiones del POB inglés: רָגַל se entiende correctamente como habla dañina, עָשָׂה ... רָעָה como hacer mal al prójimo, y קְרֹבוֹ mantiene la cercanía relacional con nota explicativa. Sin embargo, la combinación escogida para חֶרְפָּה + נָשָׂא ... עַל no suena natural en español: ''levanta oprobio contra'' preserva parcialmente la imagen verbal, pero resulta forzada y menos fiel al sentido idiomático de asumir/dirigir un reproche contra alguien.'
  spanish_quality_summary: El español es mayormente claro y digno. 'No calumnia con su lengua' es aceptable, aunque algo más estrecho que 'slandar/talebear' porque 'calumnia' puede implicar falsedad específica; aun así entra dentro del campo semántico. 'No hace mal a su prójimo' está bien. El principal problema de legibilidad y naturalidad es 'no levanta oprobio contra su cercano', especialmente 'su cercano', que suena poco idiomático en español actual. Conviene una formulación más natural sin perder la apertura semántica.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. Las decisiones léxicas son en general compatibles. Recomiendo ajustar 'su cercano' a 'el que tiene cerca' o 'su allegado' en el texto principal; si se desea máxima apertura semántica, puede mantenerse la explicación en nota. También conviene alinear mejor el giro idiomático de נָשָׂא ... עַל con un español natural como 'no dirige reproche contra...' o 'no lanza afrenta contra...'.
  issues:
  - severity: medium
    issue: '''levanta oprobio contra'' es un giro poco natural en español.'
    rationale: Aunque נָשָׂא conserva la idea de levantar/llevar, en español esa combinación con 'oprobio' no fluye bien y oscurece el sentido idiomático de dirigir un reproche o afrenta contra alguien.
  - severity: medium
    issue: '''su cercano'' suena poco idiomático en español moderno.'
    rationale: Preserva la indeterminación del hebreo, pero no es una expresión natural para lectura pública. Es mejor una formulación clara en el texto y dejar la amplitud semántica en la nota.
  - severity: low
    issue: '''calumnia'' puede ser algo más estrecho que el hebreo.'
    rationale: El hebreo incluye difamar/chismear/tale-bearing; 'calumnia' suele asociarse a acusación falsa. No exige cambio obligatorio, pero 'difama' o 'habla mal' serían más amplios. Dado que el borrador ya aporta nota alternativa, puede mantenerse.
