    rationale: Dice 'O simplemente "un signo"' cuando el texto principal ya contiene 'un signo'. Eso invalida la utilidad de la nota y no refleja correctamente la justificación léxica.
  - severity: low
    issue: '''signo'' es posible, pero ''señal'' suena más natural en español para נֵס en este contexto.'
    rationale: No es un error de fidelidad, pero una pequeña mejora de legibilidad y naturalidad favorece 'señal', manteniendo la amplitud semántica sin imponer 'advertencia'.
