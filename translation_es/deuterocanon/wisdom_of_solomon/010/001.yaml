translation:
  language: es
  text: Ella guardó al padre del mundo[a], formado primero, cuando él solo había sido creado, y lo libró de su propia transgresión[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, el primer ser humano, Adán.
    reason: cross_reference
  - marker: b
    text: 'O: «de su propio traspaso»; también: «de su propia caída», aunque «caída» es más interpretativa que el griego.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Αὕτη
  english_pob_choice: She
  chosen_spanish: Ella
  alternatives_spanish:
  - Esta
  - Esa
  lexicon: LSJ
  rationale: El demostrativo femenino retoma a la Sabiduría personificada del contexto anterior. «Ella» conserva esa referencia anafórica en español sin repetir «Sabiduría» dentro del versículo.
- source_word: πρωτόπλαστον
  english_pob_choice: first-formed
  chosen_spanish: primero formado
  alternatives_spanish:
  - primer formado
  - formado primero
  - primeramente formado
  lexicon: LSJ
  rationale: El compuesto apunta a la idea de ser formado en primer lugar, tradicionalmente aplicado a Adán. «Primero formado» conserva la imagen de formación y la relación con el griego sin introducir una paráfrasis más interpretativa.
- source_word: πατέρα κόσμου
  english_pob_choice: father of the world
  chosen_spanish: padre del mundo
  alternatives_spanish:
  - antepasado del mundo
  - padre de la humanidad
  lexicon: LSJ
  rationale: La expresión se mantiene de forma bastante literal para preservar el tono elevado y la estructura del genitivo. «Padre del mundo» deja visible la descripción del progenitor humano sin explicitar más de lo que el griego dice.
- source_word: μόνον
  english_pob_choice: alone
  chosen_spanish: solo
  alternatives_spanish:
  - únicamente
  - solamente
  - por sí solo
  lexicon: LSJ
  rationale: El adverbio modifica la situación de Adán en el momento de la creación. «Solo» es natural en español y reproduce la idea de singularidad sin exceso de elaboración.
- source_word: κτισθέντα
  english_pob_choice: had been created
  chosen_spanish: había sido creado
  alternatives_spanish:
  - habiendo sido creado
  - fue creado
  lexicon: LSJ
  rationale: El participio aoristo pasivo se vierte con un pluscuamperfecto para expresar el estado previo en el que la Sabiduría lo guardó. Esta forma es la más clara en español para el flujo temporal del verso.
- source_word: διεφύλαξεν
  english_pob_choice: guarded
  chosen_spanish: guardó
  alternatives_spanish:
  - preservó
  - protegió
  - mantuvo a salvo
  lexicon: LSJ
  rationale: El verbo comunica preservación cuidadosa y protección. «Guardó» conserva esa fuerza con sobriedad y encaja bien con la acción personificada de la Sabiduría.
- source_word: ἐξείλατο
  english_pob_choice: delivered
  chosen_spanish: libró
  alternatives_spanish:
  - rescató
  - salvó
  - liberó
  lexicon: LSJ
  rationale: El verbo medio expresa rescatar o sacar de un peligro. «Libró» mantiene el registro elevado y transmite la acción de rescate sin especificar un modo que el texto no da.
- source_word: παραπτώματος
  english_pob_choice: transgression
  chosen_spanish: transgresión
  alternatives_spanish:
  - trespaso
  - caída
  - ofensa
  lexicon: LSJ
  rationale: «Transgresión» preserva el peso moral del término sin introducir la etiqueta doctrinal «caída», que es más interpretativa que el sustantivo griego. Así se mantiene la tensión lexical señalada en el texto fuente.
- source_word: ἰδίου
  english_pob_choice: his own
  chosen_spanish: propia
  alternatives_spanish:
  - suya
  - personal
  - de él mismo
  lexicon: LSJ
  rationale: El adjetivo enfatiza que la falta pertenecía a Adán mismo. En español, «propia» se integra de manera natural con «transgresión» y conserva la autorreferencia del original.
theological_decisions:
- issue: Identificación del «padre primero formado del mundo»
  english_pob_reading: Adam is in view, but the main text leaves the identification implicit as in the Greek.
  chosen_spanish_reading: Adán está implícito, pero el texto principal no lo nombra.
  alternative_spanish_readings:
  - Nombrar explícitamente a Adán en el texto
  - Añadir una aclaración interpretativa dentro del versículo
  rationale: El griego describe a Adán sin mencionarlo por nombre. Mantener la identificación implícita respeta la primacía del original y evita agregar información no presente en la línea del versículo.
  doctrine_reference: Primacía del idioma original; no ampliar más allá de lo que el texto fuente permite.
- issue: Cómo traducir παραπτώματος
  english_pob_reading: transgression rather than fall
  chosen_spanish_reading: transgresión, no caída
  alternative_spanish_readings:
  - caída
  - pecado
  - desliz
  rationale: Aunque el verso alude al pecado de Adán, «caída» introduciría una etiqueta teológica posterior que el sustantivo griego no usa. «Transgresión» mantiene el sentido moral sin resolver en exceso la formulación.
  doctrine_reference: Conservar la tensión léxica y no imponer terminología doctrinal tradicional sin respaldo directo del griego.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca la edición griega Swete 1909 y coincide con la solución final del contexto inglés POB: Sabiduría personificada como sujeto femenino, descripción implícita de Adán sin nombrarlo, y παραπτώματος traducido por «transgresión» para evitar una paráfrasis doctrinal de «caída».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - «Sabiduría» queda implícita por el pronombre femenino «Ella», en consonancia con el contexto inmediato.
  - Se conserva un registro bíblico elevado pero natural en español, sin calcos rígidos del inglés.
  - Los corchetes de nota se colocan solo donde hay nota textual o alternativa real; el marcador [a] va sobre la frase nominal completa y [b] sobre «transgresión».
