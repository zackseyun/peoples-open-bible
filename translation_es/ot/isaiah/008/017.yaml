translation:
  language: es
  text: Y esperaré a Yahvé, que oculta[a] su rostro de la casa de Jacob[b], y pondré mi esperanza en él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que está ocultando su rostro» o «que ha ocultado su rostro». El participio hebreo puede entenderse como acción continua o característica.'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «la casa de Jacob», designación corporativa de los descendientes de Jacob, es decir, Israel.'
    reason: cultural_note
lexical_decisions:
- source_word: וְחִכִּיתִי
  english_pob_choice: And I will wait
  chosen_spanish: Y esperaré
  alternatives_spanish:
  - Y aguardaré
  - Y esperaré con confianza
  lexicon: HALOT
  rationale: חכה expresa espera con expectativa. «Esperaré» es natural en español y conserva la orientación futura y confiada del verbo sin añadir matices no presentes en el hebreo.
- source_word: לַיהוָה
  english_pob_choice: for Yahweh
  chosen_spanish: en Yahvé
  alternatives_spanish:
  - para Yahvé
  - a Yahvé
  lexicon: HALOT
  rationale: La preposición ל con verbos de confiar/esperar puede comunicar dirección relacional; en español, «esperar en» transmite adecuadamente la dependencia dirigida a Dios. Se mantiene «Yahvé» por la directriz del proyecto.
- source_word: הַמַּסְתִּיר פָּנָיו
  english_pob_choice: who hides his face
  chosen_spanish: que oculta su rostro
  alternatives_spanish:
  - que está ocultando su rostro
  - que ha ocultado su rostro
  lexicon: HALOT
  rationale: El participio expresa una acción caracterizada u ონ going. «Oculta su rostro» preserva el valor participial y el modismo bíblico sin interpretarlo como retiro de favor.
- source_word: מִבֵּית יַעֲקֹב
  english_pob_choice: from the house of Jacob
  chosen_spanish: de la casa de Jacob
  alternatives_spanish:
  - de la familia de Jacob
  - del pueblo de Jacob
  lexicon: HALOT
  rationale: Se conserva la expresión corporativa y pactal «casa de Jacob», que en español bíblico es reconocible y no debe aplanarse a una fórmula más genérica.
- source_word: וְקִוֵּיתִי
  english_pob_choice: and I will hope
  chosen_spanish: y en él esperaré
  alternatives_spanish:
  - y esperaré en él
  - y pondré mi esperanza en él
  lexicon: HALOT
  rationale: קוה puede significar esperar con esperanza. Dado que la primera cola ya usa «esperaré», se conserva el paralelismo alternando con «en él esperaré», que en español mantiene la relación de confianza y evita redundancia excesiva.
- source_word: לוֹ
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - para él
  - en Yahvé
  lexicon: HALOT
  rationale: El hebreo literalmente significa «a/para él», pero con קוה el español idiomático pide «en él». Se mantiene la referencia al sujeto divino ya mencionado.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa el Tetragrama. La política española del proyecto establece «Yahvé» como forma principal, evitando la sustitución litúrgica «SEÑOR» y conservando el nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Modismo de «ocultar el rostro»
  english_pob_reading: Retain the idiom 'hiding his face' without interpretive expansion
  chosen_spanish_reading: «oculta su rostro» sin expandirlo interpretativamente
  alternative_spanish_readings:
  - retira su favor
  - se aparta de la casa de Jacob
  rationale: 'El hebreo presenta una tensión teológica real: presencia benevolente retirada o escondida. Traducir el modismo preserva esa tensión; explicarlo como «retira su favor» resolvería prematuramente la ambigüedad.'
  doctrine_reference: DOCTRINE.md Translation philosophy §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «is hiding» por «hides» para hacer más natural el participio en contexto; la forma española «oculta» refleja ese mismo valor habitual/participial sin necesitar un progresivo. Se mantuvo intacta la tensión teológica del ocultamiento del rostro y el paralelismo entre esperar y esperar en él.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma principal para el Tetragrama.
  - Se conserva «casa de Jacob» por consistencia con la terminología bíblica corporativa del proyecto.
  - «Esperar en» se usa para קוה con objeto personal, mientras «esperaré» traduce חכה para distinguir los dos verbos paralelos.
  - No se introduce lenguaje eclesiástico tradicional ajeno al hebreo; el modismo del rostro se deja sin parafrasear.
