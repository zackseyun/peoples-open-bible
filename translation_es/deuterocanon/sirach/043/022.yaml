review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el sentido general del hebreo apoyado por el paralelo griego: un remedio/beneficio universal, humedad refrescante en forma de nube/rocío, y el efecto de alejar el calor abrasador. Sin embargo, omite un matiz importante de la decisión inglesa auditada: no es simplemente «una nube de rocío», sino una imagen de nube/masa de rocío en formación o cargada, y además falta en notas la observación textual sobre el estado fragmentario del testimonio de Masada que sí forma parte del rastro de auditoría inglés.'
  spanish_quality_summary: 'El español es claro, natural y digno. «Una sanación para todos» funciona, aunque «sanación» puede sonar algo más contemporáneo/devocional; sigue siendo aceptable. La principal mejora estilística y de fidelidad es hacer más explícita la idea de nube cargada o acumulada de rocío, que suena más poética y se acerca mejor a «massing cloud». También conviene racionalizar las notas: la nota c actual repite apoyo griego para «calor abrasador», mientras falta la nota textual equivalente a la inglesa sobre Masada.'
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Las decisiones léxicas clave son adecuadas: מרפא/ἴασις como «sanación», שרב/καύσων como «calor abrasador». La frase difícil מערף ענן טל requiere una formulación española que preserve mejor la imagen de masa/carga de rocío; «nube cargada de rocío» lo logra sin caer en calco. No hay cuestiones teológicas especiales.'
  issues:
  - severity: medium
    issue: La frase «una nube de rocío» debilita el matiz de «massing cloud of dew».
    rationale: El rastro léxico inglés preserva deliberadamente la imagen de una nube/masa de rocío en formación o concentrada. «Nube de rocío» es comprensible, pero resulta más plana y menos fiel al matiz escogido.
  - severity: medium
    issue: Falta la nota textual equivalente a la nota inglesa sobre el testimonio fragmentario de Masada.
    rationale: 'La auditoría inglesa conservó una nota textual relevante: Masada no aporta una lectura alternativa clara y la traducción se ancla en el hebreo de la Geniza controlado por el griego. En español conviene preservar esa información, especialmente dado que el hebreo de la frase central es difícil.'
  - severity: low
    issue: La nota c actual es menos útil que la nota textual inglesa y en parte duplica información léxica ya implícita.
    rationale: La confirmación de «calor abrasador» por el griego es correcta, pero no añade tanto valor como la nota textual sobre la base hebrea y el control griego.
  revised_spanish_text: 'Una sanación para todos: una nube cargada de rocío[a][c], que aparta el calor abrasador[b].'
