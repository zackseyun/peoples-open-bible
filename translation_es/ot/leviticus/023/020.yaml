    reason: lexical_alternative
  revision_rationale: 'Se corrige el error principal de número en אֹתָם, pasando de singular a plural («los mecerá»). Se reubican las notas para que comenten exactamente los elementos a los que corresponden: el verbo ritual y las dos frases con עַל. También se suaviza «Serán cosa santa» a «Serán santos», que en español bíblico es más natural y mantiene el sentido cultual del hebreo sin confundirlo con santidad moral personal.'
