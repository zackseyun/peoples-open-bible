translation:
  language: es
  text: Los ancianos de su casa se pusieron junto a él para levantarlo del suelo, pero él no quiso[a], y no quiso comer pan con ellos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo hebreo expresa falta de voluntad o consentimiento; también puede traducirse «estaba sin querer» o «no consintió».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «comer pan con ellos», una expresión hebrea para tomar alimento.
    reason: lexical_alternative
lexical_decisions:
- source_word: זִקְנֵי בֵיתוֹ
  english_pob_choice: the elders of his house
  chosen_spanish: los ancianos de su casa
  alternatives_spanish:
  - los ancianos de su familia
  - los ancianos de su casa real
  - los ancianos de su hogar
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente «los ancianos de su casa». En español, «ancianos» comunica el rango/edad y «de su casa» conserva la imagen del hebreo y puede abarcar la casa real o el círculo doméstico según el contexto.
- source_word: וַיָּקֻמוּ
  english_pob_choice: stood
  chosen_spanish: se pusieron junto a él
  alternatives_spanish:
  - se levantaron
  - estuvieron de pie
  - se colocaron a su lado
  lexicon: HALOT
  rationale: El verbo קום aquí expresa que los ancianos tomaron posición activa para ayudarlo. «Se pusieron junto a él» comunica la acción y encaja bien con el contexto inmediato, sin perder el movimiento concreto del hebreo.
- source_word: עָלָיו
  english_pob_choice: beside him
  chosen_spanish: junto a él
  alternatives_spanish:
  - sobre él
  - a su lado
  - cerca de él
  lexicon: HALOT
  rationale: Aunque el hebreo puede llevar un matiz de «sobre/upon», el contexto de levantarlo del suelo favorece una relación espacial de proximidad para evitar una imagen extraña en español. «Junto a él» sigue la revisión inglesa y suena natural sin borrar la escena.
- source_word: לַהֲקִימוֹ
  english_pob_choice: to raise him up
  chosen_spanish: para levantarlo
  alternatives_spanish:
  - para hacerlo ponerse de pie
  - para alzarlo
  - para ponerlo en pie
  lexicon: HALOT
  rationale: 'El hiphil de קום es causativo: «hacer que se levante». En español, «levantarlo» transmite de forma natural esa causatividad y la acción física concreta.'
- source_word: מִן הָאָרֶץ
  english_pob_choice: from the ground
  chosen_spanish: del suelo
  alternatives_spanish:
  - de la tierra
  - del piso
  - de la tierra firme
  lexicon: HALOT
  rationale: En el contexto de duelo y abatimiento físico, «suelo» es más inmediato que «tierra» y conserva el sentido corporal de estar postrado.
- source_word: וְלֹא אָבָה
  english_pob_choice: but he was unwilling
  chosen_spanish: pero él no quiso
  alternatives_spanish:
  - pero no quiso consentir
  - pero se negó
  - pero estaba renuente
  lexicon: HALOT
  rationale: אָבָה expresa voluntad/consentimiento. «No quiso» es una forma breve y fiel en español; evita endurecer el matiz con «se negó» y conserva la falta de disposición.
- source_word: וְלֹא בָרָא אִתָּם לָחֶם
  english_pob_choice: and he would not eat bread with them
  chosen_spanish: y no comió pan con ellos
  alternatives_spanish:
  - y no quiso comer con ellos
  - y no tomó alimento con ellos
  - y no participó de la comida con ellos
  lexicon: HALOT
  rationale: El hebreo usa una expresión idiomática ligada a comer. «Comió pan» preserva la metáfora de manera auditable; «con ellos» refleja אִתָּם. En español, la frase es entendible y mantiene la fuerza del ayuno/negativa a comer.
theological_decisions:
- issue: La descripción física del movimiento de los ancianos alrededor de David
  english_pob_reading: stood beside him
  chosen_spanish_reading: se pusieron junto a él
  alternative_spanish_readings:
  - se pusieron sobre él
  - se colocaron a su lado
  rationale: La revisión inglesa prefirió una lectura más natural que «over him». En español, «junto a él» respeta el contexto y evita una imagen corporal confusa, sin perder la cercanía necesaria para intentar alzarlo.
  doctrine_reference: No aplica; decisión de claridad contextual.
- issue: La negativa de David a tomar alimento en el marco del duelo
  english_pob_reading: he would not eat bread with them
  chosen_spanish_reading: no comió pan con ellos
  alternative_spanish_readings:
  - no quiso comer con ellos
  - no tomó alimento con ellos
  rationale: La expresión conserva el hebraísmo y refuerza el valor narrativo del ayuno como señal de aflicción. No se suaviza a una simple omisión alimentaria para preservar la intensidad del relato.
  doctrine_reference: No aplica; decisión narrativa y léxica.
translation_notes:
  revision_awareness: La revisión inglesa cambió «stood over him» por «stood beside him» para hacer la escena más natural. La versión española sigue esa preferencia con «junto a él», manteniendo la fidelidad al movimiento del pasaje y al contexto de ayudarlo a incorporarse.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se conserva «pan» para לָחֶם por fidelidad al hebraísmo narrativo, no como literalismo rígido.
  - «Del suelo» refleja mejor la escena concreta que «de la tierra» en español actual.
  - La puntuación y el orden de las cláusulas siguen el paralelismo narrativo del hebreo sin calco excesivo.
