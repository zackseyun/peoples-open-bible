translation:
  text: Jesus said, “If a blind person leads a blind person, both of them fall down
    into a pit.”
  philosophy: formal
  drafter_model: gemini-3.1-pro-preview
  drafter_label: gemini_3_1_pro_thomas_redraft
  drafted_at: '2026-04-22T10:40:26Z'
  footnotes:
  - marker: fall
    text: The Coptic uses the aorist tense (ϣⲁⲩϩⲉ), which expresses a habitual or
      gnomic reality ('they habitually fall'), contrasting with the future tense ('will
      fall') found in the Synoptic parallel (Matthew 15:14).
    reason: textual_variant
  - marker: leads
    text: Literally 'draws before him' (ⲥⲱⲕ ϩⲏⲧϥ), a Coptic idiom for leading or guiding.
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲃⲗⲗⲉ
  chosen: blind person
  rationale: The term refers to a blind individual. While traditionally rendered 'blind
    man', the Coptic noun is generic, making 'blind person' an accurate and inclusive
    rendering.
  lexicon: Crum 38b
- source_word: ⲥⲱⲕ ϩⲏⲧ
  chosen: leads
  rationale: The verb ⲥⲱⲕ (to draw, pull) combined with the preposition ϩⲏⲧ (before)
    forms the idiom 'to lead' or 'to guide'.
  lexicon: Crum 326b
- source_word: ϣⲁⲩϩⲉ
  chosen: fall
  rationale: The aorist prefix ϣⲁⲩ- indicates a habitual, general, or gnomic truth.
    The English simple present 'fall' captures this gnomic sense perfectly.
  lexicon: Crum 651a
- source_word: ⲡⲉⲥⲛⲁⲩ
  chosen: both of them
  rationale: Literally 'the two'. Rendered as 'both of them' to fit natural English
    syntax while preserving the dual emphasis.
  lexicon: Crum 346a
- source_word: ϩⲓⲉⲓⲧ
  chosen: pit
  rationale: Refers to a pit, trench, or well.
  lexicon: Crum 736b
drafter_notes: This saying closely parallels Matthew 15:14 and Luke 6:39. However,
  Thomas uses the gnomic aorist ('fall') rather than the future tense ('will fall')
  of Matthew, presenting the saying as a timeless proverb rather than a predictive
  warning. The translation preserves the Coptic addition of 'down' (ⲉⲡⲉⲥⲏⲧ).
