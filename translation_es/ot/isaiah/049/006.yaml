translation:
  language: es
  text: 'Y dijo: «Es demasiado poco que tú seas mi siervo para levantar las tribus de Jacob y para hacer volver a los preservados[a] de Israel; también te haré luz para las naciones[b], para que seas mi salvación hasta el extremo de la tierra[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los sobrevivientes de Israel».
    reason: lexical_alternative
  - marker: b
    text: O «luz a las naciones»; también, «gentiles» es una posible traducción de «naciones».
    reason: lexical_alternative
  - marker: c
    text: O «hasta los confines de la tierra».
    reason: lexical_alternative
lexical_decisions:
- source_word: נָקֵל
  english_pob_choice: too small a thing
  chosen_spanish: Poco es
  alternatives_spanish:
  - Es cosa demasiado pequeña
  - Demasiado poco es
  lexicon: HALOT
  rationale: El hebreo expresa que la misión inicial sería insuficiente o demasiado pequeña. «Poco es» conserva esa fuerza idiomática en español sin añadir explicaciones ajenas al texto.
- source_word: עֶבֶד
  english_pob_choice: servant
  chosen_spanish: mi esclavo
  alternatives_spanish:
  - mi siervo
  lexicon: HALOT
  rationale: POB documenta «slave» por fuerza léxica; en español, «esclavo» mantiene mejor el peso semántico de עֶבֶד que «siervo». Aunque en este contexto profético funciona como designación vocacional, no se suaviza a «siervo» para no perder la tensión lexical.
- source_word: לְהָקִים
  english_pob_choice: to raise up
  chosen_spanish: levantar
  alternatives_spanish:
  - restaurar
  - reestablecer
  lexicon: HALOT
  rationale: El hifil de קום conserva una imagen concreta de poner en pie o levantar. «Levantar» es una correspondencia natural y fiel en español.
- source_word: שִׁבְטֵי יַעֲקֹב
  english_pob_choice: the tribes of Jacob
  chosen_spanish: las tribus de Jacob
  alternatives_spanish:
  - las tribus de Israel
  lexicon: HALOT
  rationale: Se retiene «Jacob» como en el hebreo, en vez de generalizar a Israel, para preservar la paralelismo del texto y su precisión nominal.
- source_word: נְצִירֵי יִשְׂרָאֵל
  english_pob_choice: the preserved ones of Israel
  chosen_spanish: los preservados de Israel
  alternatives_spanish:
  - los sobrevivientes de Israel
  - los guardados de Israel
  lexicon: HALOT
  rationale: La forma participial/adjetival permite la idea de personas conservadas o mantenidas. «Preservados» reproduce bien esa semántica y evita restringir el sentido solo a «sobrevivientes».
- source_word: לְהָשִׁיב
  english_pob_choice: to bring back
  chosen_spanish: hacer volver
  alternatives_spanish:
  - traer de vuelta
  - restaurar
  lexicon: HALOT
  rationale: La causativa de שוב se expresa de manera clara y natural con «hacer volver», que conserva el movimiento de retorno sin perder la transitividad del hebreo.
- source_word: וּנְתַתִּיךָ
  english_pob_choice: I will also make you
  chosen_spanish: también te pondré
  alternatives_spanish:
  - también te haré
  - también te daré
  lexicon: HALOT
  rationale: La construcción hebrea de «dar/poner como» se vierte bien con «poner». «También» refleja el valor aditivo del waw, ampliando la misión desde Israel hacia las naciones.
- source_word: לְאוֹר גּוֹיִם
  english_pob_choice: a light for the nations
  chosen_spanish: como luz para las naciones
  alternatives_spanish:
  - luz para las naciones
  - como una luz para las naciones
  - como luz a las naciones
  lexicon: HALOT
  rationale: «Naciones» conserva el alcance universal del término גּוֹיִם. «Como luz» expresa la función predicativa de la construcción hebrea sin forzarla a una preposición menos natural.
- source_word: יְשׁוּעָתִי
  english_pob_choice: my salvation
  chosen_spanish: mi salvación
  alternatives_spanish:
  - mi liberación
  lexicon: HALOT
  rationale: «Salvación» preserva la amplitud teológica del sustantivo en Isaías. «Liberación» es posible, pero estrecha más el sentido hacia rescate político o físico.
- source_word: עַד קְצֵה הָאָרֶץ
  english_pob_choice: to the end of the earth
  chosen_spanish: hasta el extremo de la tierra
  alternatives_spanish:
  - hasta el fin de la tierra
  - hasta los confines de la tierra
  lexicon: HALOT
  rationale: Se mantiene el singular del hebreo con «extremo» y la extensión universal con «hasta». Esta opción es formal y fiel al valor singular del original.
theological_decisions:
- issue: Alcance de la misión del siervo
  english_pob_reading: The servant is commissioned both to restore Israel and to extend God's salvation to the nations.
  chosen_spanish_reading: 'El versículo conserva la doble comisión: restaurar a Israel y llevar la luz/salvación de Yahvé a las naciones.'
  alternative_spanish_readings:
  - Una lectura solo colectiva centrada en Israel
  - Una lectura explícitamente mesiánica añadida al texto
  rationale: El hebreo presenta ambas direcciones sin resolver por sí mismo la identidad total del siervo. La traducción preserva esa tensión en vez de cerrarla interpretativamente.
  doctrine_reference: Isaías 49:6; filosofía de traducción POB §3
- issue: Traducción de גּוֹיִם
  english_pob_reading: nations
  chosen_spanish_reading: naciones
  alternative_spanish_readings:
  - gentiles
  rationale: «Naciones» es la opción más amplia y menos eclesiástica; mantiene el horizonte universal de Isaías sin introducir un contraste técnico del NT que el hebreo aquí no exige.
  doctrine_reference: Isaías 49:6; HALOT
translation_notes:
  revision_awareness: El borrador sigue el estado más reciente sin revisiones pendientes; el control cruzado reporta alta concordancia y ningún cambio necesario.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma habitual del nombre divino en español POB, aunque en este versículo el nombre no aparece explícitamente en el hebreo.
  - «Israel» y «Jacob» se conservan de forma diferenciada para respetar la estructura poética del hebreo.
  - Se usa «naciones» en lugar de «gentiles» para conservar el matiz universal del texto, con nota alternativa preservada.
  - «Preservados» mantiene la tensión lexical del participio hebreo sin reducirlo solo a «sobrevivientes».
