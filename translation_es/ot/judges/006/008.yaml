review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del hebreo: Yahvé envía a un hombre, un profeta; se mantiene la fórmula profética «Así dice» y el título «el Dios de Israel». También conserva la doble acción del éxodo («hice subir» / «saqué»). Sin embargo, la nota [a] introduce una alternativa redundante e incorrecta para este contexto, y «casa de servidumbre» suena menos transparente en español actual que una opción más directa y fiel al campo semántico de עֲבָדִים.'
  spanish_quality_summary: El texto es generalmente claro y digno. «Yo los hice subir» es algo literal pero aceptable por su valor exódico. La principal mejora de estilo y claridad es cambiar «casa de servidumbre» por «casa de esclavitud», que suena más natural en español bíblico moderno y además armoniza mejor con la nota sobre el literal «casa de esclavos». También conviene corregir la nota [a], que actualmente ofrece como alternativa el mismo texto ya usado.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יְהוָה → «Yahvé»; אֱלֹהֵי יִשְׂרָאֵל → «el Dios de Israel»; בְּנֵי יִשְׂרָאֵל → «los hijos de Israel». No hay conflicto doctrinal. La única desalineación menor está en el tratamiento de מִבֵּית עֲבָדִים, donde «esclavitud» comunica mejor el sentido que «servidumbre», y en la nota [a], que debe preservar alternativas reales.'
  issues:
  - severity: medium
    issue: La nota [a] repite como alternativa «a los hijos de Israel», que ya es la redacción principal.
    rationale: 'Las notas deben ofrecer alternativas reales, no duplicar el texto base. Aquí corresponde conservar las alternativas documentadas: «a los israelitas» o «a los hijos de Israel» solo si el texto principal fuera distinto; dado que el texto principal ya usa «los hijos de Israel», la nota debe limitarse a la alternativa no usada.'
  - severity: medium
    issue: «Casa de servidumbre» es menos natural y menos transparente que «casa de esclavitud».
    rationale: El hebreo literal es «casa de esclavos», y el audit trail inglés prefirió finalmente «house of slavery» por naturalidad formal. En español, «casa de esclavitud» reproduce mejor esa abstracción concreta y conecta mejor con la nota literal. «Servidumbre» puede atenuar el matiz de esclavitud.
