    reason: cultural_note
  - marker: c
    text: Or 'Edom and Moab will be under their hand' or 'they will lay their hand on Edom and Moab.'
    reason: lexical_alternative
  - marker: d
    text: Or 'the Ammonites will be subject to them.'
    reason: lexical_alternative
