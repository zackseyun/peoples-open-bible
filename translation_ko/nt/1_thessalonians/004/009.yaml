  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Περὶ δὲ τῆς φιλαδελφίας οὐ χρείαν ἔχετε γράφειν ὑμῖν, αὐτοὶ γὰρ ὑμεῖς θεοδίδακτοί ἐστε εἰς τὸ ἀγαπᾶν ἀλλήλους·
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/004/009.yaml
  text: Now concerning brotherly love, you have no need for anyone to write to you, for you yourselves are taught by God to love one another.
  footnotes:
  - marker: a
    text: Or, more specifically, 'love for fellow believers'; the Greek term for 'brotherly love' carries family-language imagery within the Christian community.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'you have no need to write to you'; English supplies the implied writer for clarity.
    reason: lexical_alternative
translation:
  language: ko
  text: 형제 사랑[a]에 관하여는 우리가 여러분에게 써 보낼 필요가 없습니다[b]. 여러분 자신이 서로 사랑하도록 하나님께 친히 가르침을 받은 사람들이기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 보다 구체적으로는 「신앙 공동체 형제·자매를 향한 사랑」. 헬라어 φιλαδελφία는 기독교 공동체 안의 가족적 사랑을 담는다.
    reason: lexical_alternative
  - marker: b
    text: 직역하면 「여러분에게 써 보낼 필요가 없습니다」. 주어 「우리」를 한국어에서 명시한다.
    reason: lexical_alternative
