translation:
  language: es
  text: Dame[a] mis esposas y mis hijos,[b] por quienes te he servido, para que me vaya; porque tú sabes el servicio[c] con que te he servido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Da».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «por las cuales te he servido», tomando la referencia más específicamente a las esposas que a toda la familia recién mencionada.'
    reason: lexical_alternative
  - marker: c
    text: «Servicio» también puede traducirse «labor» o «trabajo»; se mantiene «servicio» para reflejar la raíz hebrea repetida de «servir/trabajar» en este versículo.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּנָה
  english_pob_choice: Give me
  chosen_spanish: Dame
  alternatives_spanish:
  - Da
  - Entrégame
  lexicon: HALOT
  rationale: El imperativo dirigido a Labán pide la entrega de las personas mencionadas; en español, 'Dame' expresa naturalmente el valor de 'give me' sin forzar una construcción innecesaria.
- source_word: נָשַׁי
  english_pob_choice: my wives
  chosen_spanish: mis esposas
  alternatives_spanish:
  - mis mujeres
  - mis mujeres desposadas
  lexicon: HALOT
  rationale: El posesivo y el contexto señalan con claridad a las esposas de Jacob. 'Esposas' es claro y fiel al referente familiar.
- source_word: יְלָדַי
  english_pob_choice: my children
  chosen_spanish: mis hijos
  alternatives_spanish:
  - mi descendencia
  - mis vástagos
  lexicon: HALOT
  rationale: '''Hijos'' es la opción más natural en español y conserva el sentido familiar inmediato del hebreo.'
- source_word: אֲשֶׁר עָבַדְתִּי אֹתְךָ בָּהֵן
  english_pob_choice: for whom I have served you
  chosen_spanish: por quienes he servido a ti
  alternatives_spanish:
  - por las cuales te he servido
  - por quienes te he servido
  lexicon: HALOT
  rationale: La relación causal/explicativa con las personas mencionadas se puede expresar con 'por quienes'. Mantengo 'he servido' para conservar la repetición del raíz עבד y la idea de servicio laboral a Labán. El complemento 'a ti' hace explícita la dirección del servicio en español sin cambiar el sentido.
- source_word: וְאֵלֵכָה
  english_pob_choice: so that I may go
  chosen_spanish: para que yo me vaya
  alternatives_spanish:
  - y me iré
  - y que yo vaya
  lexicon: HALOT
  rationale: La cohortativa expresa intención o propósito de partida; 'para que yo me vaya' comunica bien esa finalidad en español contemporáneo y mantiene el matiz volitivo.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón de la petición. 'Porque' es la forma más natural y clara en español.
- source_word: יָדַעְתָּ
  english_pob_choice: you know
  chosen_spanish: tú sabes
  alternatives_spanish:
  - sabes tú
  - tú has sabido
  lexicon: HALOT
  rationale: El perfecto hebreo con relevancia presente se vierte naturalmente con presente en español. 'Tú sabes' mantiene la apelación directa y enfática.
- source_word: עֲבֹדָתִי
  english_pob_choice: the service
  chosen_spanish: el servicio
  alternatives_spanish:
  - el trabajo
  - la labor
  lexicon: HALOT
  rationale: '''Servicio'' conserva el vínculo léxico con el verbo ''he servido'' y refleja mejor la relación contractual de trabajo que ''labor'' o ''trabajo''.'
- source_word: אֲשֶׁר עֲבַדְתִּיךָ
  english_pob_choice: with which I have served you
  chosen_spanish: con que te he servido
  alternatives_spanish:
  - con el cual te he servido
  - que te he servido
  lexicon: HALOT
  rationale: La repetición del verbo raíz se preserva con 'he servido'. 'Con que' reproduce de manera natural la relación entre 'servicio' y el acto de servir.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; esta versión mantiene la alta concordancia con el texto fuente y con la auditoría inglesa, preservando la repetición léxica de עבד y el matiz volitivo de וְאֵלֵכָה.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo requiera explícitamente; este versículo no contiene el nombre divino.
  - Se ha preferido 'esposas' para נָשַׁי por claridad contextual, sin perder el referente matrimonial.
  - Se conserva 'servicio' para עֲבֹדָתִי y 'he servido' para עֲבַדְתִּיךָ, a fin de mantener la cohesión léxica.
  - La frase 'por quienes' se elige como equivalente idiomático de la relación causal/explicativa del relativo hebreo, sin borrar la alternativa más específica centrada en las esposas.
