translation:
  language: es
  text: 'Sin embargo, la casa de Israel dice[a]: «El camino de Yahvé no es justo». ¿No son justos mis caminos, casa de Israel? ¿No son más bien los caminos de ustedes los que no son justos?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «El camino de Yahvé no es recto» o «no es correcto». El verbo hebreo se refiere a lo que está medido u ordenado correctamente; aquí alude a la rectitud moral en el proceder de Yahvé.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמְרוּ
  english_pob_choice: Yet ... says
  chosen_spanish: Sin embargo, ... dice
  alternatives_spanish:
  - Y ... dice
  - Pero ... dice
  lexicon: HALOT
  rationale: El hebreo introduce una objeción continua en el discurso. «Sin embargo» conserva el contraste adversativo con el contexto previo y «dice» funciona naturalmente en el presente para el discurso directo.
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: the house of Israel
  chosen_spanish: la casa de Israel
  alternatives_spanish:
  - Israel
  - la familia de Israel
  lexicon: HALOT
  rationale: Se mantiene la imagen corporativa y pactal de «casa», en paralelo con la decisión inglesa de no reducirla simplemente a «Israel».
- source_word: לֹא יִתָּכֵן
  english_pob_choice: is not just
  chosen_spanish: no es recto
  alternatives_spanish:
  - no es justo
  - no es correcto
  - no está bien ordenado
  lexicon: HALOT
  rationale: Aquí יִתָּכֵן alude a lo que está rectamente medido o ordenado. En español, «recto» conserva esa idea de rectitud moral y también permite enlazar con la repetición retórica del verso. Se evita «justo» en el texto principal para no forzar un término jurídico donde el hebreo también tiene el matiz de rectitud/orden.
- source_word: דֶּרֶךְ
  english_pob_choice: way
  chosen_spanish: camino
  alternatives_spanish:
  - camino
  - modo de proceder
  - conducta
  lexicon: HALOT
  rationale: «Camino» es un equivalente claro y bíblicamente reconocible, y permite mantener el juego de palabras entre el camino de Yahvé y los caminos del pueblo.
- source_word: אֲדֹנָי
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el nombre divino: «Yahvé» en el texto principal, en lugar de la sustitución tradicional «SEÑOR».'
- source_word: הַדְּרָכַי
  english_pob_choice: my ways
  chosen_spanish: mis caminos
  alternatives_spanish:
  - mis vías
  - mis senderos
  lexicon: HALOT
  rationale: Se conserva el plural hebreo con «caminos», igual que en inglés POB con «ways», para sostener la contraposición con «vuestros caminos».
- source_word: דַרְכֵיכֶם
  english_pob_choice: your ways
  chosen_spanish: vuestros caminos
  alternatives_spanish:
  - sus caminos
  - vuestras sendas
  lexicon: HALOT
  rationale: Se preserva el plural y la oposición retórica con «mis caminos». «Vuestros» se usa por concordancia con la vocación profética directa al pueblo en segunda persona plural.
theological_decisions:
- issue: Valor moral de יִתָּכֵן en la acusación y la respuesta divina
  english_pob_reading: Translate יִתָּכֵן as 'just' throughout the verse
  chosen_spanish_reading: Traducir el valor como «recto» en todo el verso
  alternative_spanish_readings:
  - justo
  - correcto
  - equilibrado
  rationale: El pasaje discute si el proceder de Yahvé es moralmente recto y si el del pueblo no lo es. «Recto» comunica bien esa rectitud normativa sin sonar demasiado técnico ni reemplazar el juego retórico entre las tres ocurrencias del verbo. Al mismo tiempo, deja abierta la tensión entre rectitud ética y juicio jurídico que el hebreo puede abarcar.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: 'Coincide con la lectura de revisión más reciente: no se registraron cambios necesarios y el cotejo externo mostró alto acuerdo.'
  spanish_consistency_notes:
  - Se conserva «casa de Israel» como fórmula corporativa.
  - «Camino/caminos» mantiene el paralelismo del hebreo y la tríada retórica del verso.
  - «Yahvé» sigue el estándar del proyecto para el nombre divino.
  - La primera cláusula usa una formulación distinta de la segunda y tercera para evitar forzar «justo» donde en español «recto» comunica mejor la idea de orden moral.
