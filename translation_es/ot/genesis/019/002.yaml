revisions:
- from: 'Y él dijo: «[a]Por favor, mis señores, desvíense a la casa de su siervo, y pasen la noche, y laven sus pies. Luego podrán levantarse temprano y seguir su camino». Pero ellos dijeron: «No, sino que pasaremos la noche en la plaza[b]».'
  to: 'Y él dijo: «Por favor, mis señores[a], pasen a la casa de su siervo, y pasen la noche, y laven sus pies. Luego podrán levantarse temprano y seguir su camino». Pero ellos dijeron: «No, sino que pasaremos la noche en la plaza[b]».'
  rationale: Se reancló la nota [a] al término que realmente comenta («mis señores») y se ajustó «desvíense a la casa» a «pasen a la casa» para mejorar la naturalidad del español sin perder el sentido hospitalario de apartarse del camino para hospedarse. El resto del contenido permanece fiel al hebreo y al rastro de decisiones del POB en inglés.
