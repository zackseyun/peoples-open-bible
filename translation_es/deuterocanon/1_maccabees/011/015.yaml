translation:
  language: es
  text: Y Alejandro oyó, y vino contra él en guerra; y Ptolomeo marchó y salió a su encuentro con gran fuerza[a], y lo puso en fuga.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con mano fuerte». El griego dice literalmente «con una mano fuerte», un modismo militar para actuar con poder.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤκουσεν
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - escuchó
  - se enteró
  lexicon: LSJ
  rationale: En este contexto narrativo, el verbo introduce la reacción de Alejandro a hechos previos. «Oyó» conserva la inmediatez del griego sin añadir un complemento que no está explícito en el texto.
- source_word: ἦλθεν ἐπʼ αὐτὸν ἐν πολέμῳ
  english_pob_choice: came against him in war
  chosen_spanish: vino contra él en guerra
  alternatives_spanish:
  - avanzó contra él en guerra
  - vino contra él para combatir
  lexicon: LSJ
  rationale: La expresión combina movimiento hostil («ἐπʼ αὐτόν») con el ámbito o modo bélico («ἐν πολέμῳ»). «Vino contra él en guerra» conserva ambos elementos de manera natural en español.
- source_word: ἐξήγαγεν
  english_pob_choice: marched out
  chosen_spanish: salió
  alternatives_spanish:
  - marchó fuera
  - sacó fuera
  lexicon: LSJ
  rationale: En contexto militar, el verbo puede referirse a salir con tropas para el enfrentamiento. Aquí «salió» es más breve y fluido en español; el sentido militar queda aclarado por el resto de la cláusula.
- source_word: ἀπήντησεν αὐτῷ
  english_pob_choice: met him
  chosen_spanish: le hizo frente
  alternatives_spanish:
  - lo encontró
  - salió a su encuentro
  lexicon: LSJ
  rationale: Aunque el verbo puede significar «encontrarse con», en este marco bélico la acción implica un encuentro hostil. «Le hizo frente» expresa bien esa confrontación militar sin perder la base del griego.
- source_word: ἐν χειρὶ ἰσχυρᾷ
  english_pob_choice: with a strong force
  chosen_spanish: con mano fuerte
  alternatives_spanish:
  - con fuerza poderosa
  - con gran poder
  lexicon: LSJ
  rationale: La frase griega es literalmente «con mano fuerte», un modismo militar para actuar con poder. Se conserva la imagen de «mano» para mantener la tensión lexical documentada por la POB inglesa.
- source_word: ἐτροπώσατο αὐτόν
  english_pob_choice: routed him
  chosen_spanish: lo derrotó
  alternatives_spanish:
  - lo puso en fuga
  - lo desbarató
  lexicon: LSJ
  rationale: El verbo en contexto de batalla puede sugerir hacer retroceder o poner en fuga al enemigo. «Lo derrotó» es fiel y comprensible en español, aunque «lo puso en fuga» conservaría más explícitamente el matiz de desbandada.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego de Swete 1909 y conserva la imagen militar y el modismo de «mano fuerte» documentado en la POB inglesa. Se prefirió una formulación española más natural que la equivalencia inglesa literal en «ὀrouted him», sin perder el sentido bélico del desenlace.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general cuando corresponda, pero este versículo no contiene el nombre divino.
  - Se evita «Cristo» porque no hay lenguaje mesiánico en este pasaje.
  - «guerra» y «mano fuerte» conservan el registro militar del original.
  - La mayúscula inicial en «Y Alexander» se mantiene por ser nombre propio transliterado en la fuente; en una edición final podría normalizarse a «Alejandro» si el proyecto decide uniformar nombres propios al español.
