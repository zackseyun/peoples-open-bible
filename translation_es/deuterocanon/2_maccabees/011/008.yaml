translation:
  language: es
  text: Y allí, cuando estaban cerca de Jerusalén, apareció un jinete[b] que iba delante de ellos[a], vestido de blanco y blandiendo una armadura de oro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los precedía»; el participio griego puede indicar simplemente que iba delante de ellos, sin afirmar de modo explícito un cargo de mando.
    reason: lexical_alternative
  - marker: b
    text: El texto no identifica explícitamente al jinete; la descripción permite inferir un protector celestial sin que la traducción diga más de lo que dice el griego.
    reason: cultural_note
lexical_decisions:
- source_word: αὐτόθι
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: LSJ
  rationale: Como adverbio de lugar, aquí remite al sitio ya mencionado; en español, «allí» conserva esa referencia espacial sin sobrecargarlo con valor temporal.
- source_word: πρὸς τοῖς Ἱεροσολύμοις
  english_pob_choice: near Jerusalem
  chosen_spanish: cerca de Jerusalén
  alternatives_spanish:
  - junto a Jerusalén
  - en las cercanías de Jerusalén
  lexicon: LSJ
  rationale: La construcción con πρός y dativo expresa proximidad. «Cerca de Jerusalén» es natural en español y mantiene la idea de vecindad.
- source_word: ὄντων
  english_pob_choice: when they were
  chosen_spanish: cuando estaban
  alternatives_spanish:
  - mientras estaban
  - estando
  lexicon: LSJ
  rationale: El genitivo absoluto funciona temporalmente; «cuando estaban» reproduce con claridad la relación temporal sin forzar una estructura extraña en español.
- source_word: ἐφάνη
  english_pob_choice: appeared
  chosen_spanish: se apareció
  alternatives_spanish:
  - apareció
  - fue visto
  lexicon: LSJ
  rationale: En este contexto visual y repentino, «se apareció» conserva la idea de manifestación súbita mejor que una formulación pasiva.
- source_word: προηγούμενος αὐτῶν
  english_pob_choice: going before them
  chosen_spanish: iba delante de ellos
  alternatives_spanish:
  - los precedía
  - marchaba delante de ellos
  lexicon: LSJ
  rationale: El participio indica ir en frente de ellos. «Iba delante de ellos» mantiene la imagen sin convertirla en un título de mando que el griego no explicita.
- source_word: ἔφιππος
  english_pob_choice: a horseman
  chosen_spanish: un jinete
  alternatives_spanish:
  - un hombre a caballo
  - un caballero
  lexicon: LSJ
  rationale: El término se usa sustantivamente; «jinete» expresa con naturalidad que se trata de alguien montado.
- source_word: ἐν λευκῇ ἐσθῆτι
  english_pob_choice: clothed in white
  chosen_spanish: vestido de blanco
  alternatives_spanish:
  - con vestiduras blancas
  - con ropa blanca
  lexicon: LSJ
  rationale: La frase describe el atuendo visible. «Vestido de blanco» es una equivalencia fluida y fiel en español contemporáneo.
- source_word: πανοπλίαν χρυσῆν
  english_pob_choice: golden armor
  chosen_spanish: una armadura de oro
  alternatives_spanish:
  - una armadura dorada
  - un conjunto completo de armadura de oro
  lexicon: LSJ
  rationale: πανοπλία alude a armamento completo; «armadura de oro» conserva el carácter marcial y la cualidad preciosa/dorada del texto. «De oro» sigue de cerca el genitivo descriptivo.
- source_word: κραδαίνων
  english_pob_choice: brandishing
  chosen_spanish: blandiendo
  alternatives_spanish:
  - agitando
  - sacudiendo
  lexicon: LSJ
  rationale: El verbo sugiere un movimiento vigoroso, especialmente de un objeto bélico. «Blandiendo» es la opción española más natural para ese matiz.
theological_decisions:
- issue: Identidad del jinete montado
  english_pob_reading: Rendered descriptively as an appearing horseman without specifying whether he is an angelic being or a divine manifestation.
  chosen_spanish_reading: Se presenta descriptivamente como un jinete que aparece, sin identificarlo como ser angélico o manifestación divina.
  alternative_spanish_readings:
  - un jinete angelical
  - un guerrero celestial enviado por Dios
  rationale: El griego describe lo visto, pero no identifica explícitamente al personaje. La traducción preserva esa reserva narrativa y evita resolver una tensión interpretativa que el texto no despeja.
  doctrine_reference: Conservar la tensión teológica sin imponer una identificación no explícita.
translation_notes:
  revision_awareness: El borrador sigue de cerca el pasaje griego y el rastro de auditoría en inglés, sin introducir identificación interpretativa del jinete. Se conserva la ambigüedad narrativa documentada en la revisión más reciente, con equivalencias españolas naturales para el orden temporal, la visión súbita y la imaginería militar.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando el texto lo requiera; aquí no aparece el tetragrámaton.
  - «Jinete» se usa por naturalidad española para ἔφιππος; no se fuerza «caballero», que sugeriría estatus social.
  - «Armadura de oro» preserva tanto la idea de armamento completo como la cualidad áurea del original.
