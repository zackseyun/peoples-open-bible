review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: duración del reinado, fórmula de muerte, y sucesión de Nadab. Sin embargo, falla en dos puntos importantes del sentido preciso: (1) וַיִּמְלֹךְ en fórmula sucesoria aquí debe marcar acceso al trono, mejor «llegó a ser rey» o «se hizo rey»/«vino a ser rey», no simplemente «reinó»; (2) «se acostó con sus padres» en español suena impropio y puede sugerir una acción literal no idiomática. La fórmula hebrea debe preservarse de manera más natural y reconocible en español, idealmente «descansó con sus padres» con nota a la alternativa tradicional «durmió con sus padres».'
  spanish_quality_summary: El texto es generalmente claro, pero «se acostó con sus padres» resulta poco natural y potencialmente confuso en español eclesial general. Además, repetir «reinó» para ambos verbos debilita la distinción entre duración del reinado y entronización. Una leve revisión mejora fidelidad y legibilidad.
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé/Mesías. La decisión sobre el modismo de muerte debe seguir la racionalidad POB: conservar el modismo sin aplanarlo a «murió». En español, «descansó con sus padres» cumple mejor esa meta que «se acostó con sus padres». Para וַיִּמְלֹךְ, la nota auditada exige valor de acceso al trono, por lo que «llegó a ser rey» se alinea mejor que «reinó».'
  issues:
  - severity: high
    issue: «se acostó con sus padres» es una representación poco natural del modismo hebreo
    rationale: Aunque intenta conservar la imagen, en español contemporáneo suena literalista y puede distraer o confundirse. El objetivo POB es preservar el modismo sin crear una lectura impropia; «descansó con sus padres» es más idiomático y digno.
  - severity: medium
    issue: «reinó» para וַיִּמְלֹךְ no refleja bien el matiz de sucesión
    rationale: El inglés auditado distingue entre duración del reinado («reigned») y acceso al trono («became king»). En español conviene mantener esa distinción con «llegó a ser rey» o equivalente.
  - severity: low
    issue: La nota al pie puede ajustarse al nuevo giro principal
    rationale: Si el texto principal cambia a «descansó con sus padres», la nota debe seguir ofreciendo la alternativa tradicional «durmió con sus padres» y explicar el modismo real.
  revised_spanish_text: Los días que Jeroboam reinó fueron veintidós años. Luego descansó con sus padres[a], y Nadab su hijo llegó a ser rey en su lugar.
  revised_footnotes:
  - marker: a
    text: O, de manera más tradicional, «durmió con sus padres». El hebreo es un modismo de muerte en una fórmula de sucesión real.
    reason: lexical_alternative
  revision_rationale: Se revisa el modismo de muerte para que conserve la textura hebrea en un español natural y digno, evitando la torpeza de «se acostó con sus padres». También se distingue mejor entre el verbo de duración del reinado y el de entronización del sucesor, conforme al análisis auditado del inglés POB.
