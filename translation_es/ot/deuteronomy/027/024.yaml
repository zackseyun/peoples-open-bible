revisions:
- from: 'Maldito el que golpea a su prójimo en secreto. Y todo el pueblo dirá[a]: «Amén».'
  to: 'Maldito el que hiere[a] a su prójimo en secreto. Y todo el pueblo dirá: «Amén».'
  rationale: Se ajusta 'golpea' a 'hiere' para reflejar mejor la gravedad contextual de נכה sin reducirlo a homicidio explícito, en línea con la decisión auditada en inglés. Se elimina el marcador del verbo 'dirá' y se reubica la nota en el verbo de violencia, donde realmente corresponde la alternativa léxica documentada. El resto del versículo se conserva por ser fiel, natural y litúrgicamente adecuado.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:35:34Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo y mantiene correctamente ''Maldito'', ''a su prójimo'', ''en secreto'' y la respuesta litúrgica ''Y todo el pueblo dirá: «Amén»''. Sin embargo, no preserva del todo la decisión auditada de מַכֵּה como violencia grave (''strikes down'') frente a un simple golpe; ''golpea'' suena demasiado débil en español para este contexto de maldición.'
  spanish_quality_summary: El español es claro y digno, pero requiere un ajuste léxico menor para reflejar mejor la gravedad contextual del verbo hebreo sin forzar homicidio explícito. También falta la nota al pie [a] que sí está anclada en el texto; debe incluirse o quitarse el ancla. La redacción revisada queda natural y litúrgicamente apta.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. La cuestión principal es léxica: para נכה conviene ''hiere'' como término intermedio más grave que ''golpea'' y menos específico que ''mata''. ''Prójimo'', ''Amén'' y el resto están alineados.'
  issues:
  - severity: medium
    issue: מַכֵּה se tradujo como 'golpea'
    rationale: Aunque נכה puede abarcar 'golpear', el expediente inglés documenta aquí una violencia seria ('strikes down') por el contexto de maldición y el v. 25. 'Golpea' en español suele sonar a agresión menos grave; 'hiere' preserva mejor la fuerza sin exigir muerte.
  - severity: medium
    issue: Falta la nota al pie [a] anclada en el texto
    rationale: El texto español contiene 'dirá[a]' pero el arreglo de notas está vacío. Según las reglas del proyecto, todo marcador en el texto debe corresponder exactamente a una nota, y aquí además la alternativa léxica es significativa y debe preservarse.
  revised_spanish_text: 'Maldito el que hiere[a] a su prójimo en secreto. Y todo el pueblo dirá: «Amén».'
  revised_footnotes:
  - marker: a
    text: O 'golpea' o 'mata'; el verbo hebreo puede abarcar desde herir hasta violencia letal.
    reason: lexical_alternative
  revision_rationale: Se ajusta 'golpea' a 'hiere' para reflejar mejor la gravedad contextual de נכה sin reducirlo a homicidio explícito, en línea con la decisión auditada en inglés. Se elimina el marcador del verbo 'dirá' y se reubica la nota en el verbo de violencia, donde realmente corresponde la alternativa léxica documentada. El resto del versículo se conserva por ser fiel, natural y litúrgicamente adecuado.
