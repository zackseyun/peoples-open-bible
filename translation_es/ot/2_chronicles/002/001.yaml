  spanish_quality_summary: 'El español es claro y comprensible, pero dos detalles conviene reparar: 1) mover la nota [a] al sintagma de los canteros/cortadores de piedra, que es donde corresponde; 2) mejorar «hombres cargadores», que suena algo torpe, por una formulación más natural como «hombres para llevar cargas» o «hombres que llevaban cargas». También «sobre ellos» es posible, pero «puestos sobre ellos» o simplemente dejar «supervisores» con el contexto basta; el texto actual ya se entiende.'
