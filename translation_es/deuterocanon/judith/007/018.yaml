translation:
  language: es
  text: Y subieron los hijos de Esaú y los hijos de Amón, y acamparon en la región montañosa frente a Dotaim, y enviaron a algunos de los suyos hacia el sur y el oriente[a], frente a Egrebel, que está cerca de Chus, que está junto al wadi[b] Mochmur. Y el resto del ejército asirio acampó en la llanura y cubrió toda la faz de la tierra, y sus tiendas y su bagaje se extendieron en una multitud muy grande, y eran extraordinariamente numerosos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''hacia el sur y hacia el naciente''; el término griego para ''oriente'' está relacionado literalmente con el salir del sol.'
    reason: lexical_alternative
  - marker: b
    text: '''Wadi'' traduce un término griego para un cauce o lecho de arroyo estacional; también podría traducirse ''arroyo'' o ''torrente''.'
    reason: cultural_note
lexical_decisions:
- source_word: καὶ ἀνέβησαν
  english_pob_choice: went up
  chosen_spanish: subieron
  alternatives_spanish:
  - ascendieron
  - subieron y avanzaron
  lexicon: LSJ
  rationale: El griego expresa ascenso o movimiento hacia arriba; en este contexto militar y geográfico, 'subieron' conserva el movimiento sin introducir una interpretación técnica adicional.
- source_word: οἱ υἱοὶ Ἡσαῦ καὶ οἱ υἱοὶ Ἀμμών
  english_pob_choice: the sons of Esau and the sons of Ammon
  chosen_spanish: los hijos de Esaú y los hijos de Amón
  alternatives_spanish:
  - los descendientes de Esaú y de Amón
  - los hijos de Esaú y de Ammón
  lexicon: LSJ
  rationale: Se mantiene la filiación literal del griego; 'hijos' es la forma más directa y transparente, y 'Amón' sigue la forma bíblica habitual en español.
- source_word: παρενέβαλον
  english_pob_choice: camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - acamparon militarmente
  - se acamparon
  lexicon: LSJ
  rationale: El verbo denota establecer campamento en contexto militar. 'Acamparon' es natural en español y conserva la idea de posición militar.
- source_word: ἐν τῷ ὄρει
  english_pob_choice: in the hill country
  chosen_spanish: en la región montañosa
  alternatives_spanish:
  - en la montaña
  - en la serranía
  lexicon: LSJ
  rationale: Aunque el griego está en singular, designa terreno elevado. 'Región montañosa' comunica bien el sentido topográfico sin sonar forzado.
- source_word: ἀπέναντι Δωθαείμ
  english_pob_choice: opposite Dothaim
  chosen_spanish: frente a Dotaim
  alternatives_spanish:
  - opuesto a Dotaim
  - enfrente de Dotaim
  lexicon: LSJ
  rationale: '''Frente a'' expresa de manera natural la relación espacial de ''ἀπέναντι''. Se conserva el nombre propio en transliteración cercana al griego.'
- source_word: ἀπέστειλαν ἐξ αὐτῶν
  english_pob_choice: they sent some of their men
  chosen_spanish: enviaron de entre ellos
  alternatives_spanish:
  - despacharon de entre ellos
  - enviaron a algunos de los suyos
  lexicon: LSJ
  rationale: El griego dice literalmente 'enviaron de entre ellos'. En español se mantiene la literalidad sin añadir explícitamente 'hombres', ya que el contexto militar ya lo sugiere.
- source_word: πρὸς νότον καὶ ἀπηλιώτην
  english_pob_choice: toward the south and east
  chosen_spanish: hacia el sur y el oriente
  alternatives_spanish:
  - hacia el sur y el este
  - hacia el sur y hacia el naciente
  lexicon: LSJ
  rationale: '''ἀπηλιώτης'' apunta a la dirección del amanecer, es decir, al oriente. ''Oriente'' permite conservar la carga direccional sin perder claridad.'
- source_word: Ἐγρεβήλ
  english_pob_choice: Egrebel
  chosen_spanish: Egrebel
  alternatives_spanish:
  - Egerebel
  lexicon: transliteration
  rationale: Nombre propio transliterado del griego; se conserva la forma más cercana al testimonio base.
- source_word: Χοὺς
  english_pob_choice: Chous
  chosen_spanish: Chus
  alternatives_spanish:
  - Chous
  lexicon: transliteration
  rationale: Se adopta 'Chus' por ser una transliteración transparente en español y coherente con la grafía bíblica corriente, sin alterar la referencia geográfica.
- source_word: χειμάρρου
  english_pob_choice: wadi
  chosen_spanish: wadi
  alternatives_spanish:
  - arroyo estacional
  - torrente
  lexicon: LSJ
  rationale: El término designa un cauce estacional o lecho de torrente propio del Cercano Oriente. 'Wadi' evita empobrecer el sentido con 'arroyo', que sugiere agua permanente.
- source_word: Μοχμούρ
  english_pob_choice: Mochmour
  chosen_spanish: Mochmur
  alternatives_spanish:
  - Mochmour
  lexicon: transliteration
  rationale: Se sigue una transliteración cercana al griego, adaptada a la ortografía española usual, para un topónimo sin equivalente semántico.
- source_word: ἡ λοιπὴ στρατεία τῶν Ἀσσυρίων
  english_pob_choice: the rest of the Assyrian army
  chosen_spanish: el resto del ejército de Asiria
  alternatives_spanish:
  - el resto de la tropa asiria
  - el resto del ejército asirio
  lexicon: LSJ
  rationale: '''στρατεία'' se entiende aquí como fuerza militar; ''ejército de Asiria'' comunica bien el pertenecer y evita una frase excesivamente rígida.'
- source_word: ἐν τῷ πεδίῳ
  english_pob_choice: on the plain
  chosen_spanish: en la llanura
  alternatives_spanish:
  - sobre la llanura
  - en el llano
  lexicon: LSJ
  rationale: '''Πεδίον'' es terreno llano o llanura; ''en la llanura'' es la forma natural en español.'
- source_word: ἐκάλυψαν πᾶν τὸ πρόσωπον τῆς γῆς
  english_pob_choice: covered the whole face of the land
  chosen_spanish: cubrió toda la faz de la tierra
  alternatives_spanish:
  - cubrió toda la superficie de la tierra
  - cubrió toda la faz del país
  lexicon: LSJ
  rationale: Se conserva la imagen semítica/poética de 'faz de la tierra', que refleja bien el griego y su fuerza visual.
- source_word: αἱ σκηναὶ καὶ αἱ ἀποσκευαὶ αὐτῶν
  english_pob_choice: their tents and their baggage
  chosen_spanish: sus tiendas y su bagaje
  alternatives_spanish:
  - sus tiendas y sus pertenencias
  - sus tiendas y su equipaje
  lexicon: LSJ
  rationale: '''ἀποσκευαί'' alude al bagaje o equipo del campamento militar. ''Bagaje'' mantiene el matiz militar mejor que ''equipaje''.'
- source_word: κατεστρατοπέδευσαν
  english_pob_choice: were encamped
  chosen_spanish: quedaron acampados
  alternatives_spanish:
  - fueron acampados
  - estaban acampados
  lexicon: LSJ
  rationale: El verbo expresa estar establecido en campamento. 'Quedaron acampados' preserva el resultado o estado del campamento de modo natural en español.
- source_word: ἐν ὄχλῳ πολλῷ
  english_pob_choice: in a very great multitude
  chosen_spanish: en una multitud muy grande
  alternatives_spanish:
  - en una gran multitud
  - en una muchedumbre muy grande
  lexicon: LSJ
  rationale: '''ὄχλος'' puede ser multitud o muchedumbre. Se escoge ''multitud'' por claridad, manteniendo el énfasis cuantitativo.'
- source_word: ἦσαν εἰς πλῆθος πολὺ σφόδρα
  english_pob_choice: they were exceedingly numerous
  chosen_spanish: eran extraordinariamente numerosos
  alternatives_spanish:
  - eran muy numerosos
  - eran numerosísimos
  lexicon: LSJ
  rationale: La cláusula intensifica el número de forma enfática; 'extraordinariamente numerosos' conserva el superlativo sin sonar arcaico.
theological_decisions:
- issue: Topónimos y nombres propios sin domesticación interpretativa
  english_pob_reading: The English POB transliterates the place names and keeps the geographic sequence intact.
  chosen_spanish_reading: Se conservan los nombres propios transliterados, sin traducir ni identificar lugares que el texto no identifica aquí.
  alternative_spanish_readings:
  - adaptar los topónimos a formas tradicionales españolas
  - añadir equivalencias geográficas entre paréntesis
  rationale: El pasaje funciona como descripción geográfica militar; cualquier identificación adicional iría más allá del dato del texto. Mantener la transliteración respeta la cautela del POB y evita sobreinterpretación.
  doctrine_reference: Principio de transparencia textual y prudencia histórica/geográfica
- issue: Mantenimiento de la imaginería de abundancia militar
  english_pob_reading: their tents and their baggage were encamped in a very great multitude, and they were exceedingly numerous
  chosen_spanish_reading: sus tiendas y su bagaje quedaron acampados en una multitud muy grande, y eran extraordinariamente numerosos
  alternative_spanish_readings:
  - sus tiendas y su bagaje estaban acampados en gran multitud
  - sus tiendas y su bagaje formaban una muchedumbre muy grande
  rationale: La repetición enfática del griego se conserva en español para no borrar la amplitud y la presión militar del campamento asirio. No se suaviza el doble énfasis numérico.
  doctrine_reference: Fidelidad retórica al texto fuente
- issue: Direccionalidad de ἀπηλιώτης
  english_pob_reading: toward the south and east ... the Greek term for 'east' is literally related to the rising sun
  chosen_spanish_reading: hacia el sur y el oriente
  alternative_spanish_readings:
  - hacia el sur y el este
  - hacia el sur y hacia el naciente
  rationale: '''Oriente'' comunica la dirección del amanecer y conserva el matiz etimológico de la nota inglesa sin cargar el texto principal con explicación técnica.'
  doctrine_reference: Precisión lexical y legibilidad eclesial
translation_notes:
  revision_awareness: Se ha tomado en cuenta el estado de alta concordancia del expediente inglés, sin revisiones aplicadas y con el veredicto de 'minor-issues'. La versión española sigue la misma segmentación y decisiones semánticas principales, ajustando solo la idiomaticidad del español y la transliteración de algunos topónimos.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como convención general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se mantiene 'Esaú', 'Amón', 'Asiria' y los topónimos como nombres propios, sin harmonización con formas tradicionales que no estén respaldadas por el expediente.
  - 'Se conserva la imaginería militar y topográfica: ''región montañosa'', ''llanura'', ''faz de la tierra'', ''bagaje''.'
  - Se evita reemplazar 'bagaje' por un término más moderno que perdería el matiz militar del griego.
