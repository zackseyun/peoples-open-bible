translation:
  language: es
  text: Y ahora, busquen el favor[a] de Dios, para que él nos muestre gracia. Esto ha venido de sus manos[b]; ¿mostrará favor a alguno de ustedes? dice Yahvé de los ejércitos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: ''imploren el rostro de Dios''. La expresión significa buscar el favor de Dios.'
    reason: lexical_alternative
  - marker: b
    text: 'O: ''De sus manos ha venido esto; ¿aceptará a alguno de ustedes?'''
    reason: alternative_reading
lexical_decisions:
- source_word: חַלּוּ נָא
  english_pob_choice: entreat
  chosen_spanish: rueguen
  alternatives_spanish:
  - suplicad
  - imploren
  - rueguen con insistencia
  lexicon: HALOT
  rationale: El imperativo piel con נָא expresa una súplica urgente. En español, 'rueguen' comunica petición ferviente y suena natural en registro bíblico moderno sin perder la fuerza del ruego.
- source_word: פְנֵי אֵל
  english_pob_choice: God for favor
  chosen_spanish: a Dios que tenga favor
  alternatives_spanish:
  - el rostro de Dios
  - el favor de Dios
  - ante Dios para buscar favor
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente 'el rostro de Dios', pero en este giro idiomático significa buscar su favor. 'Que tenga favor' conserva el sentido relacional sin volver el español demasiado literal.
- source_word: וִיחָנֵּנוּ
  english_pob_choice: that he may be gracious to us
  chosen_spanish: para que sea benigno con nosotros
  alternatives_spanish:
  - para que sea clemente con nosotros
  - para que tenga misericordia de nosotros
  - para que nos sea gracioso
  lexicon: HALOT
  rationale: חנן expresa ser benigno, mostrar favor o gracia. 'Sea benigno con nosotros' mantiene la idea de favor recibido y suena más natural en español que una repetición directa de 'gracioso'. Se preserva la tensión de gracia/favor sin endurecerla con un tecnicismo.
- source_word: מִיֶּדְכֶם הָיְתָה זֹּאת
  english_pob_choice: From your hand has this come
  chosen_spanish: De vuestra mano provino esto
  alternatives_spanish:
  - Esto ha venido de su mano
  - Esto salió de vuestra mano
  - De vuestra mano ha venido esto
  lexicon: HALOT
  rationale: La construcción hebrea indica origen/causa desde sus manos. 'Provino' refleja el origen de manera formal y fluida, manteniendo el matiz de responsabilidad humana.
- source_word: הֲיִשָּׂא מִכֶּם פָּנִים
  english_pob_choice: will he show favor to any of you?
  chosen_spanish: ¿mostrará favor a alguno de ustedes?
  alternatives_spanish:
  - ¿levantará el rostro de alguno de ustedes?
  - ¿los aceptará a alguno de ustedes?
  - ¿será parcial con alguno de ustedes?
  lexicon: HALOT
  rationale: El hebreo literalmente dice 'alzar rostro', pero el idioma significa conceder favor/aceptación. 'Mostrará favor' conserva la pregunta retórica y evita un calco oscuro, mientras mantiene la carga judicial del pasaje.
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: Yahweh of hosts
  chosen_spanish: Yahvé de los ejércitos
  alternatives_spanish:
  - Yahvé de los ejércitos celestiales
  - Yahvé de las huestes
  - Yahvé de los ejércitos
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para יְהוָה como 'Yahvé'. 'De los ejércitos' conserva el título divino tradicional de צְבָאוֹת de forma transparente y entendible en español.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. Conforme al estándar del proyecto, se traduce como 'Yahvé' para preservar el nombre del pacto, en lugar de ocultarlo tras una convención litúrgica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sense of the rhetorical question הֲיִשָּׂא מִכֶּם פָּנִים
  english_pob_reading: will he show favor to any of you?
  chosen_spanish_reading: ¿mostrará favor a alguno de ustedes?
  alternative_spanish_readings:
  - ¿aceptará a alguno de ustedes?
  - ¿será parcial con alguno de ustedes?
  rationale: La pregunta es reproche retórico dirigido a sacerdotes culpables. 'Mostrará favor' mantiene la idea de aceptación favorable sin introducir una afirmación abstracta sobre parcialidad que no es el foco inmediato del hebreo.
  doctrine_reference: 'DOCTRINE.md Contested terms: idioms of favor/acceptance'
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del inglés POB, que prefirió un registro más formal en חַלּוּ נָא ('entreat') y ajustó מִיֶּדְכֶם הָיְתָה זֹּאת para reflejar mejor la procedencia ('From your hand has this come'). La versión española mantiene ese avance formal con 'rueguen' y 'De vuestra mano provino esto', y conserva la pregunta retórica sobre favor/aceptación.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה.
  - Se conserva 'favor' como campo semántico central para פְנֵי אֵל / יִחָנֵנוּ / יִשָּׂא פָנִים, sin diluir la tensión idiomática.
  - '''De vuestra mano'' mantiene la responsabilidad de los destinatarios y evita una paráfrasis más interpretativa.'
  - El plural de tratamiento 'ustedes' se usa para claridad contemporánea y neutralidad regional.
