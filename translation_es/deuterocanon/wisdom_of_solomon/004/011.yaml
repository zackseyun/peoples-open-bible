translation:
  language: es
  text: Fue llevado[a][b], para que la maldad no altere su entendimiento ni el engaño engañe su alma.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «fue arrebatado»; esta alternativa preserva con más fuerza el carácter abrupto del verbo griego.'
    reason: lexical_alternative
  - marker: b
    text: «Alma» también puede verterse como «vida» o «ser», pero aquí ψυχή señala la persona interior.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡρπάγη
  english_pob_choice: was taken away
  chosen_spanish: fue arrebatado
  alternatives_spanish:
  - fue llevado
  - fue quitado
  lexicon: LSJ
  rationale: ἁρπάζω expresa una remoción súbita y fuerte. «Fue arrebatado» conserva esa brusquedad mejor que una forma más neutra, y mantiene la pasiva sin añadir un agente explícito.
- source_word: μή
  english_pob_choice: lest
  chosen_spanish: para que no
  alternatives_spanish:
  - no sea que
  - a fin de que no
  lexicon: BDAG
  rationale: En español, «para que no» expresa bien la finalidad preventiva del griego en una cláusula natural y digna. Se evita un calco rígido de «lest».
- source_word: κακία
  english_pob_choice: evil
  chosen_spanish: la maldad
  alternatives_spanish:
  - el mal
  - la perversidad
  lexicon: BDAG
  rationale: En este contexto sapiencial, κακία apunta a corrupción moral general. «La maldad» conserva ese alcance sin estrecharlo a un matiz de malicia personal.
- source_word: ἀλλάξῃ
  english_pob_choice: alter
  chosen_spanish: alterara
  alternatives_spanish:
  - cambiara
  - pervirtiera
  lexicon: BDAG
  rationale: «Alterar» refleja bien el valor de cambiar o modificar, y permite conservar el sentido preventivo del texto sin intensificarlo hacia «pervertir».
- source_word: σύνεσιν
  english_pob_choice: understanding
  chosen_spanish: su entendimiento
  alternatives_spanish:
  - su discernimiento
  - su comprensión
  lexicon: BDAG
  rationale: «Entendimiento» es natural en español y mantiene el sentido amplio de σύνεσις como comprensión o discernimiento sensato.
- source_word: δόλος
  english_pob_choice: deceit
  chosen_spanish: el engaño
  alternatives_spanish:
  - la astucia
  - la treta
  lexicon: BDAG
  rationale: δόλος denota engaño o astucia engañosa. «Engaño» es claro y directo; en español suena más natural que un término como «guile» tendría en inglés.
- source_word: ἀπατήσῃ
  english_pob_choice: deceive
  chosen_spanish: engañara
  alternatives_spanish:
  - sedujera
  - desviara
  lexicon: BDAG
  rationale: El verbo significa engañar. Como el sustantivo ya es «engaño», repetir «engañar» mantiene la correspondencia léxica y la fuerza del paralelismo.
- source_word: ψυχὴν
  english_pob_choice: soul
  chosen_spanish: su alma
  alternatives_spanish:
  - su vida
  - su ser
  lexicon: BDAG
  rationale: «Alma» preserva el peso antropológico de ψυχή en la literatura sapiencial y corresponde bien al sentido de la persona interior, sin reducirlo a «vida» o «yo».
theological_decisions:
- issue: Valor antropológico de ψυχή
  english_pob_reading: soul
  chosen_spanish_reading: alma
  alternative_spanish_readings:
  - vida
  - ser
  rationale: La frase contrapone el daño al entendimiento con el engaño del interior de la persona. «Alma» conserva esa profundidad antropológica y evita aplanar el término a un simple «vida» o «yo».
  doctrine_reference: Translation philosophy §1, §6
- issue: Pasiva sin agente explícito en ἡρπάγη
  english_pob_reading: He was taken away
  chosen_spanish_reading: Fue arrebatado
  alternative_spanish_readings:
  - Fue llevado
  - Fue quitado
  rationale: La pasiva deja sin nombrar al agente. «Fue arrebatado» conserva esa ambigüedad y el matiz de remoción súbita, sin especificar más de lo que el griego dice.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés auditado, que favorece un verbo de remoción súbita («taken away») y una correspondencia directa para ἀπατήσῃ («deceive»). En español, eso se refleja con «fue arrebatado» y el paralelismo «engaño... engañara» para conservar la fuerza léxica sin perder naturalidad.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - Se preservó la pasiva sin agente para no introducir una agencia no explicitada por el griego.
  - Se eligió «alma» para ψυχή siguiendo la antropología sapiencial, con nota para las alternativas posibles.
  - Se evitó traducir mecánicamente desde el inglés cuando el español requería una cláusula final natural («para que no»).
