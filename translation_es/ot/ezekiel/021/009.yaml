review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura causal y la imaginería del hebreo: «Porque… por eso… mi espada saldrá de su vaina contra toda carne, desde el sur hasta el norte». También conserva correctamente «toda carne» y la tensión teológica de «el justo y el impío». Sin embargo, el verbo הִכְרַתִּי fue documentado en la auditoría inglesa como lectura principal futura/certa en contexto profético («I will cut off»), con la lectura pasada relegada a nota alternativa. El español invierte esa decisión al poner «he cortado» en el texto principal y repetir esa misma lectura en la nota, lo cual no preserva fielmente la decisión auditada ni refleja bien el flujo con «saldrá».'
  spanish_quality_summary: El español es claro y digno, pero «he cortado» suena menos natural aquí que un futuro profético y debilita la progresión del juicio inminente. Además, la nota [a] está mal anclada conceptualmente porque ofrece como alternativa exactamente lo que ya aparece en el texto. El resto del verso es legible y apropiado para el registro buscado.
  glossary_alignment: 'No hay conflicto con las pautas mayores de terminología. «Impío», «vaina», «toda carne» y «sur… norte» son adecuados. La principal desalineación es metodológica/lexical: el proyecto inglés escogió como forma principal «cut off» en valor futuro; el español debe reflejarlo como «cortaré» o equivalente, dejando «he cortado» como alternativa en nota.'
  issues:
  - severity: high
    issue: El texto principal usa «he cortado» donde la auditoría inglesa fijó como lectura principal un futuro profético.
    rationale: La decisión inglesa para הִכְרַתִּי fue «I will cut off», con nota alternativa «I have cut off». En español, mantener «he cortado» en el cuerpo invierte indebidamente la jerarquía de lecturas y no sigue el razonamiento contextual con el verbo futuro siguiente.
  - severity: high
    issue: La nota [a] no funciona como alternativa real porque repite la misma lectura que ya está en el texto.
    rationale: 'La nota dice «O: he cortado», pero el texto principal ya dice «he cortado». Debe invertirse: texto principal futuro («cortaré») y nota alternativa de perfecto («he cortado»).'
  - severity: low
    issue: Falta reflejar el matiz distributivo de «both» con «tanto… como…» o equivalente.
    rationale: No es obligatorio, pero «tanto al justo como al impío» comunica mejor el merismo inclusivo que el simple «al justo y al impío».
  revised_spanish_text: Porque cortaré de ti tanto al justo como al impío[a], por eso mi espada saldrá de su vaina contra toda carne[b], desde el sur hasta el norte.
  revised_footnotes:
  - marker: a
    text: 'O: «he cortado». El perfecto hebreo puede leerse como acción ya realizada o como acción futura segura en contexto profético.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «toda carne», expresión común para todos los seres humanos mortales.'
    reason: lexical_alternative
  revision_rationale: Se ajusta הִכְרַתִּי a la decisión principal auditada en inglés, usando un futuro profético natural en español («cortaré») y dejando la lectura pasada en nota alternativa. También se mejora levemente la claridad inclusiva con «tanto… como…» y se conserva el resto de la formulación, que ya era fiel y legible.
