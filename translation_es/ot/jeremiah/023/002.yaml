revisions:
- from: 'Por tanto, así ha dicho Yahvé[a], el Dios de Israel, acerca de los pastores que apacientan a mi pueblo: Ustedes han dispersado a mi rebaño y los han ahuyentado, y no se han ocupado de ellos. He aquí, yo me ocuparé de ustedes por el mal de sus obras[b], declara Yahvé.'
  to: 'Por tanto, así dice Yahvé[a], el Dios de Israel, acerca de los pastores que apacientan a mi pueblo: Ustedes han dispersado a mi rebaño y lo han ahuyentado, y no se han ocupado de él. He aquí, estoy por ocuparme de ustedes por el mal de sus obras[b], oráculo de Yahvé.'
  rationale: Se ajusta la fórmula profética a un español más natural ('así dice'), se explicita la inminencia de הִנְנִי con 'estoy por', y se mejora la concordancia colectiva de 'rebaño' con pronombre singular ('lo', 'él'). Se conserva el juego verbal con פקד mediante 'ocuparse de' en ambas cláusulas y una nota explicativa. 'Oráculo de Yahvé' refleja bien נְאֻם יְהוָה con tono profético digno.
