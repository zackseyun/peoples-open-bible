translation:
  language: es
  text: el duodécimo para Hasabías[a], sus hijos y sus hermanos, doce.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los doce», tomado más literalmente; el contexto favorece el valor ordinal, «el duodécimo», porque este capítulo enumera las suertes en secuencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשְּׁנֵים עָשָׂר
  english_pob_choice: the twelfth
  chosen_spanish: el duodécimo
  alternatives_spanish:
  - los doce
  lexicon: HALOT
  rationale: En esta lista secuencial de turnos o suertes, el hebreo funciona con valor ordinal, no solo cardinal. Por eso se traduce como ordinal en español. «Los doce» conserva la literalidad, pero pierde la referencia secuencial que exige el contexto.
- source_word: לַחֲשַׁבְיָה
  english_pob_choice: to Hashabiah
  chosen_spanish: para Hasabías
  alternatives_spanish:
  - a Hasabías
  lexicon: HALOT
  rationale: La l prefijada marca asignación o destinación de la suerte. En español, «para» expresa con naturalidad esa pertenencia o designación en una lista de reparto. Se conserva el nombre propio con transliteración usual en español.
- source_word: בָּנָיו
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus descendientes
  lexicon: HALOT
  rationale: El hebreo señala hijos varones, pero en español «hijos» comunica de forma natural esa relación familiar dentro de la lista. «Hijos varones» sería más explícito, aunque más pesado; «descendientes» diluye el sentido específico del término.
- source_word: וְאֶחָיו
  english_pob_choice: and his brothers
  chosen_spanish: y sus hermanos
  alternatives_spanish:
  - y sus parientes
  lexicon: HALOT
  rationale: El sentido básico de אחים es «hermanos». Aunque en algunos contextos puede ampliarse a parientes, aquí la formulación simple preserva mejor el hebreo y el carácter de un registro de grupo/personas.
- source_word: שְׁנֵים עָשָׂר
  english_pob_choice: twelve
  chosen_spanish: doce
  alternatives_spanish:
  - los doce
  lexicon: HALOT
  rationale: El número final indica el total del grupo asignado. En español, la forma cardinal «doce» es la más natural al cierre de una fórmula de reparto. No se fuerza un segundo ordinal porque el contexto ya quedó marcado por «el duodécimo» al inicio.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios; el sentido ordinal de la apertura y el total cardinal final se mantienen según el patrón secuencial del capítulo.'
  spanish_consistency_notes:
  - Se mantiene un registro breve y enumerativo, acorde con el hebreo.
  - Se conserva la diferencia entre el ordinal inicial («el duodécimo») y el total final («doce»), evitando uniformarlos artificialmente.
  - 'Se translitera el nombre propio de forma consistente con el español bíblico moderno: Hasabías.'
