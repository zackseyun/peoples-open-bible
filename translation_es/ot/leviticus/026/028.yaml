translation:
  language: es
  text: entonces yo también andaré contra ustedes con furiosa hostilidad[a], y yo mismo los disciplinaré siete veces por sus pecados[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con el furor de la contrariedad»; tradicionalmente, «andaré contra ustedes con furor, en contrariedad».
    reason: lexical_alternative
  - marker: b
    text: O «los castigaré siete veces por sus pecados».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָלַכְתִּי
  english_pob_choice: I will walk
  chosen_spanish: andaré
  alternatives_spanish:
  - caminaré
  - iré
  lexicon: HALOT
  rationale: El hebreo mantiene el verbo literal de movimiento; en español, «andaré» conserva la imagen idiomática sin sonar tan rígido como una traducción mecánica de «caminaré» en este contexto judicial de pacto.
- source_word: עִמָּכֶם
  english_pob_choice: to you
  chosen_spanish: con ustedes
  alternatives_spanish:
  - con vosotros
  - contra ustedes
  lexicon: HALOT
  rationale: La preposición hebrea es literalmente «con», y en este oráculo la cercanía relacional queda invertida por el contexto adversativo. «Con ustedes» mantiene el valor base del hebreo y deja que la hostilidad de la frase siguiente establezca el matiz de oposición.
- source_word: בַּחֲמַת
  english_pob_choice: in furious
  chosen_spanish: en furiosa
  alternatives_spanish:
  - en ira ardiente
  - en furor
  lexicon: HALOT
  rationale: חֵמָה expresa calor, furia e ira. «Furiosa» reproduce la intensidad emocional con un español natural y mantiene la fuerza del sintagma.
- source_word: קֶרִי
  english_pob_choice: hostility
  chosen_spanish: hostilidad
  alternatives_spanish:
  - contrariedad
  - oposición
  lexicon: HALOT
  rationale: En Levítico 26, קֶרִי es un término difícil y formulaico. «Hostilidad» comunica bien la postura adversaria del pacto en español moderno; se conserva la alternativa tradicional en nota por la tensión lexical del hebreo.
- source_word: וְיִסַּרְתִּי
  english_pob_choice: I will discipline
  chosen_spanish: los disciplinaré
  alternatives_spanish:
  - los castigaré
  - los corregiré
  - los reprenderé
  lexicon: HALOT
  rationale: יסר puede significar disciplinar/chastigar con un matiz correctivo. «Disciplinaré» preserva ese rango semántico sin reducirlo a castigo meramente punitivo.
- source_word: אַף אָנִי
  english_pob_choice: I myself
  chosen_spanish: yo mismo
  alternatives_spanish:
  - también yo
  - aun yo
  lexicon: HALOT
  rationale: La combinación intensifica al sujeto. «Yo mismo» expresa esa énfasis en español de forma clara y natural; «también» traduce el valor aditivo de אַף en la abertura de la cláusula.
- source_word: שֶׁבַע
  english_pob_choice: sevenfold
  chosen_spanish: siete veces
  alternatives_spanish:
  - siete pliegues
  - siete veces más
  lexicon: HALOT
  rationale: En este pasaje, שֶׁבַע intensifica la disciplina. «Siete veces» es el equivalente directo y más transparente en español; «siete veces más» sería interpretativo y «siete pliegues» no es idiomático aquí.
- source_word: עַל חַטֹּאתֵיכֶם
  english_pob_choice: for your sins
  chosen_spanish: por sus pecados
  alternatives_spanish:
  - a causa de sus pecados
  - por causa de sus pecados
  lexicon: HALOT
  rationale: עַל marca base o motivo. «Por sus pecados» es natural en español y conserva la causalidad; se usa el pronombre de tratamiento de segunda persona plural respetuosa para lectura eclesial amplia. «Pecados» refleja חטאות en español bíblico claro.
theological_decisions:
- issue: Tensión entre oposición relacional y disciplina correctiva
  english_pob_reading: 'Retain both adversarial and disciplinary language: God ''walks contrary'' and ''disciplines'' Israel.'
  chosen_spanish_reading: 'Mantener tanto la hostilidad relacional como la disciplina: Dios anda con hostilidad y disciplina a Israel.'
  alternative_spanish_readings:
  - Reducir todo a castigo punitivo
  - Suavizar la oposición y dejar solo un matiz de corrección
  rationale: El hebreo combina el idiomático «andar con» en sentido adversativo con יסר, que puede implicar disciplina correctiva. La versión española conserva ambas dimensiones para no borrar ni la confrontación del pacto ni el matiz de corrección.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: 'Se revisó el equilibrio entre literalidad y naturalidad: se preservó la imagen verbal de הלך, la ambigüedad adversativa de עם en contexto de pacto, la tensión lexical de קֶרִי y el matiz correctivo de יסר, siguiendo el archivo auditado en inglés sin depender de una calca servil.'
  spanish_consistency_notes:
  - Se usa «Yahvé» según la norma del proyecto cuando corresponda; aquí el versículo no contiene el nombre divino explícito.
  - Se evita «SEÑOR» como máscara teológica no presente en el hebreo.
  - «Pecados» traduce חטאות en registro bíblico comprensible; no se introdujo «culpas» porque el texto no lo requiere.
  - La nota [a] preserva la alternativa tradicional de 'contrariedad' para reflejar la tensión léxica documentada en el original.
