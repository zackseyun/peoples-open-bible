translation:
  language: es
  text: Zanoa, En-ganín[a], Tapúa[b] y Enam[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: En-ganín probablemente significa «manantial de jardines».
    reason: lexical_alternative
  - marker: b
    text: Tapúa es un nombre de lugar; la palabra hebrea subyacente también puede significar «manzana» o un árbol frutal.
    reason: lexical_alternative
  - marker: c
    text: Enam es un nombre de lugar; la forma hebrea incluye el artículo, algo así como «los manantiales».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְזָנוֹחַ
  english_pob_choice: Zanoah
  chosen_spanish: Zanoaj
  alternatives_spanish:
  - Zanoá
  lexicon: HALOT
  rationale: Es un nombre propio de lugar en una lista territorial; se translitera en vez de traducirse. En español, la terminación -aj refleja de forma cercana la aspiración final del hebreo y mantiene la consistencia toponímica.
- source_word: וְעֵין גַּנִּים
  english_pob_choice: En-gannim
  chosen_spanish: En-ganim
  alternatives_spanish:
  - En Ganim
  - Fuente de jardines
  lexicon: HALOT
  rationale: Es un topónimo compuesto. Se conserva la forma de nombre propio en lugar de traducirlo literalmente en el texto principal, pero el componente עֵין se preserva en la transliteración española con el sentido de 'manantial/fuente' implícito en el nombre.
- source_word: תַּפּוּחַ
  english_pob_choice: Tappuah
  chosen_spanish: Tapúa
  alternatives_spanish:
  - Tapuá
  - Tafúa
  lexicon: HALOT
  rationale: Aquí funciona como nombre de lugar, no como el sustantivo común 'manzana'. Por eso se translitera. La adaptación gráfica en español evita una forma excesivamente inglesa y conserva la pronunciación aproximada.
- source_word: וְהָעֵינָם
  english_pob_choice: Enam
  chosen_spanish: Enam
  alternatives_spanish:
  - Haenam
  - Las fuentes
  lexicon: HALOT
  rationale: Es un topónimo; el artículo hebreo incorporado no se separa en el texto principal porque el nombre funciona ya como forma fija. Se mantiene la transliteración breve y reconocible.
translation_notes:
  revision_awareness: El contexto de revisión indica alta concordancia y sin cambios necesarios respecto del texto fuente; esta versión española conserva esa decisión al mantener los cuatro topónimos en transliteración y reflejar las notas léxicas auditadas en el aparato de notas.
  spanish_consistency_notes:
  - Se mantiene la política POB de transliterar nombres de lugares en listas geográficas.
  - Se evita traducir el topónimo como 'manzana' o 'manantial(es)' en el cuerpo principal, reservando esas posibilidades para notas.
  - La puntuación y el uso de la conjunción final siguen la estructura enumerativa del hebreo y del inglés POB.
