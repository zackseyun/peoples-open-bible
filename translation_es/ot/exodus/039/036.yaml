lexical_decisions:
- source_word: הַשֻּׁלְחָן
  english_pob_choice: the table
  chosen_spanish: la mesa
  alternatives_spanish:
  - la mesa del pan de la Presencia
  - la mesa
  lexicon: HALOT
  rationale: שֻׁלְחָן denota de manera directa una mesa. En español, «mesa» comunica naturalmente el objeto sin añadir explicación interpretativa que el hebreo no expresa aquí. El contexto del tabernáculo ya identifica la pieza.
- source_word: כָּל כֵּלָיו
  english_pob_choice: all its utensils
  chosen_spanish: todos sus utensilios
  alternatives_spanish:
  - todos sus vasos
  - todos sus artículos
  lexicon: HALOT
  rationale: כְּלִי es un término amplio para implemento, vaso o artículo. «Utensilios» conserva esa amplitud con un español claro y apto para el contexto cultual.
- source_word: לֶחֶם הַפָּנִים
  english_pob_choice: the bread of the Presence
  chosen_spanish: el pan de la Presencia
  alternatives_spanish:
  - el pan de la faz
  - el pan de la presencia
  - el pan de la proposición
  lexicon: HALOT
  rationale: La expresión hebrea significa literalmente «pan de la presencia/faz». «Pan de la Presencia» mantiene la relación semántica y evita la opacidad de la forma tradicional «pan de la proposición» o «showbread».
- source_word: אֶת ... אֶת ... וְאֵת
  english_pob_choice: '[not separately translated]'
  chosen_spanish: '[no se traduce por separado]'
  lexicon: syntax
  rationale: Los marcadores de objeto directo y la coordinación en hebreo no suelen reproducirse léxicamente en español; su función queda reflejada en la estructura de la frase y en la conjunción «y».
translation_notes:
  revision_awareness: Coincide con el auditorial inglés en la decisión de no sobreexplicar la mesa; se conserva la transparencia de «bread of the Presence» mediante «pan de la Presencia», evitando el giro tradicional opaco.
  spanish_consistency_notes:
  - Se usa «mesa» en vez de «tabla» porque el español bíblico y cultual moderno entiende mejor el mueble referido.
  - «Presencia» se capitaliza para reflejar el valor nominal de la expresión y mantener el paralelismo reverente del original.
  - Se preserva la enumeración simple y el guion final del texto fuente como marca de continuidad de sección.
