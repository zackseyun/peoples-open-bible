translation:
  language: es
  text: El perezoso entierra[a] su mano en el plato[b]; ni siquiera la vuelve a llevar a su boca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «esconde su mano en el plato». El verbo hebreo puede significar «esconder» o «enterrar»; se eligió «entierra» para conservar la imagen exagerada del proverbio.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en el tazón» o «en la fuente». El sustantivo hebreo designa un recipiente para comida; «plato» es la opción más natural aquí.'
    reason: lexical_alternative
lexical_decisions:
- source_word: טָמַן
  english_pob_choice: buries
  chosen_spanish: hunde
  alternatives_spanish:
  - esconde
  - entierra
  lexicon: HALOT
  rationale: El hebreo puede significar 'ocultar' o 'enterrar'. En español, 'hunde' conserva la imagen corporal y la exageración proverbiales sin sonar tan forzado como 'entierra' ni tan débil como 'esconde'.
- source_word: עָצֵל
  english_pob_choice: sluggard
  chosen_spanish: el perezoso
  alternatives_spanish:
  - el holgazán
  - el haragán
  lexicon: HALOT
  rationale: Es un término proverbial para la persona habitualmente perezosa. 'El perezoso' es natural en español y mantiene el valor de tipo sapiencial mejor que una expresión más coloquial.
- source_word: יָדוֹ
  english_pob_choice: his hand
  chosen_spanish: su mano
  alternatives_spanish:
  - la mano de él
  lexicon: HALOT
  rationale: Se conserva el singular posesivo del hebreo. En español, 'su mano' comunica con claridad la referencia posesiva sin añadir información.
- source_word: בַּצַּלָּחַת
  english_pob_choice: in the dish
  chosen_spanish: en el plato
  alternatives_spanish:
  - en el tazón
  - en la fuente
  lexicon: HALOT
  rationale: El sustantivo puede referirse a un recipiente para comida. 'Plato' es la opción más natural y amplia en español, y funciona bien en la escena de la comida.
- source_word: גַּם
  english_pob_choice: even
  chosen_spanish: ni siquiera
  alternatives_spanish:
  - también
  - aun
  lexicon: HALOT
  rationale: La partícula intensifica lo absurdo de la escena. 'Ni siquiera' expresa mejor esa intensificación en español que un simple 'también' o 'aun'.
- source_word: אֶל־פִּיהוּ
  english_pob_choice: to his mouth
  chosen_spanish: a su boca
  alternatives_spanish:
  - hasta su boca
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de 'boca' sin suavizarla en términos menos precisos. 'A su boca' refleja el movimiento esperado del gesto descrito.
- source_word: לֹא יְשִׁיבֶנָּה
  english_pob_choice: he will not even bring it back
  chosen_spanish: no la volverá
  alternatives_spanish:
  - no la traerá de vuelta
  - no la regresará
  lexicon: HALOT
  rationale: El hifil de שוב expresa hacer volver o traer de regreso. En español, 'volverá' con objeto pronominal mantiene la idea del movimiento de regreso desde el plato hasta la boca de manera breve y natural.
translation_notes:
  revision_awareness: La versión española sigue el estado revisado más reciente del texto base (sin cambios de sentido relevantes) y conserva la lectura proverbial hiperbólica destacada en el audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo un registro sapiencial claro y breve, adecuado para un proverbio.
  - Se prefirió 'plato' por naturalidad en español, sin perder la amplitud semántica del hebreo.
  - Se evitó suavizar la hipérbole del verso, preservando la comicidad retórica del original.
  - La secuencia verbal mantiene el contraste entre el gesto inicial y la negativa final con una construcción fluida en español.
