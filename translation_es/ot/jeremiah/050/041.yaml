    text: O «serán despertados» o «despertarán»; el verbo hebreo sugiere ser incitados o movilizados para la acción. También puede traducirse «desde los confines de la tierra» o «desde los extremos de la tierra».
    reason: lexical_alternative
  revision_rationale: Se revisa para elevar el registro de apertura conforme a הִנֵּה, mejorar la naturalidad española, reflejar mejor el matiz de movilización de יֵעֹרוּ y corregir el anclaje de la nota alternativa al segmento correcto. Se conservan las distinciones fuente entre «pueblo» y «nación» y la lejanía extrema de מִיַּרְכְּתֵי אָרֶץ.
