translation:
  language: es
  text: Que Yahvé corte de las tiendas de Jacob al hombre que hace esto, al que está despierto[a] y al que responde, y al que presenta una ofrenda a Yahvé de los ejércitos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «despierto y respondiendo». La expresión es difícil; puede ser un modismo que signifique algo como «testigo y defensor», o un merismo que abarque a todos los involucrados.
    reason: alternative_reading
lexical_decisions:
- source_word: יַכְרֵת
  english_pob_choice: May ... cut off
  chosen_spanish: ¡Que ... corte
  alternatives_spanish:
  - Cortará
  - Que Yahvé extirpe
  lexicon: HALOT
  rationale: El hebreo imperfecto en este contexto judicial tiene fuerza imprecatoria o desiderativa; en español, «¡Que ... corte!» conserva ese valor de maldición profética mejor que un futuro simple. «Cortar» mantiene el sentido básico de כרת en juicio y pacto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el criterio doctrinal del proyecto para el Tetragrámaton: «Yahvé» preserva el nombre propio divino sin sustituirlo por un título.'
- source_word: לָאִישׁ
  english_pob_choice: the man
  chosen_spanish: al hombre
  alternatives_spanish:
  - a la persona
  - al varón
  lexicon: HALOT
  rationale: El singular masculino del hebreo conserva un valor representativo concreto; «al hombre» es fiel y natural en español bíblico contemporáneo.
- source_word: אֲשֶׁר יַעֲשֶׂנָּה
  english_pob_choice: who does this
  chosen_spanish: que hace esto
  alternatives_spanish:
  - que lo hace
  - que actúa así
  lexicon: HALOT
  rationale: «Esto» reproduce el referente implícito de la práctica denunciada en el contexto. Evita sobreinterpretar el demostrativo y mantiene la referencia indefinida del hebreo.
- source_word: עֵר וְעֹנֶה
  english_pob_choice: him who is awake and him who answers
  chosen_spanish: al que está despierto y al que responde
  alternatives_spanish:
  - al testigo y al defensor
  - al que vela y al que contesta
  lexicon: HALOT
  rationale: La frase es oscura y lexicográficamente discutida. Se conserva una traducción relativamente literal de los participios para no resolver la ambigüedad más allá de lo que permite el hebreo. «Está despierto» y «responde» son transparentes en español.
- source_word: מֵאָהֳלֵי יַעֲקֹב
  english_pob_choice: from the tents of Jacob
  chosen_spanish: de las tiendas de Jacob
  alternatives_spanish:
  - de los campamentos de Jacob
  - de las moradas de Jacob
  lexicon: HALOT
  rationale: «Tiendas de Jacob» preserva la imagen tradicional hebrea y el sentido corporativo del pueblo del pacto. En español, «tiendas» es claro y no requiere una paráfrasis interpretativa.
- source_word: וּמַגִּישׁ מִנְחָה
  english_pob_choice: and him who brings an offering
  chosen_spanish: y al que presenta una ofrenda
  alternatives_spanish:
  - y al que trae una ofrenda
  - y al que ofrece una oblación
  lexicon: HALOT
  rationale: El participio introduce a otro miembro del grupo descrito. «Presenta» reproduce bien la idea de acercar una ofrenda en contexto cultual; «ofrenda» es más general y natural que especificar el tipo exacto sin base suficiente.
- source_word: מִנְחָה
  english_pob_choice: offering
  chosen_spanish: ofrenda
  alternatives_spanish:
  - oblación
  - presente
  - tributo
  lexicon: HALOT
  rationale: מִנְחָה puede significar tributo, regalo u ofrenda cultual. Aquí el contexto de culto favorece «ofrenda» sin restringir innecesariamente el tipo sacrificial.
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: the LORD of hosts
  chosen_spanish: Yahvé de los ejércitos
  alternatives_spanish:
  - Yahvé de las huestes
  - Yahvé Todopoderoso
  lexicon: HALOT
  rationale: «De los ejércitos» conserva el sentido de צְבָאוֹת como ejército/huestes celestiales o guerreras, y mantiene el paralelismo con el uso doctrinal de «Yahvé».
theological_decisions:
- issue: Valor del imperfecto inicial en un contexto de juicio profético
  english_pob_reading: May the LORD cut off
  chosen_spanish_reading: ¡Que Yahvé corte!
  alternative_spanish_readings:
  - Yahvé cortará
  - Yahvé corte
  rationale: La forma española con exclamación expresa mejor la fuerza imprecatoria y exhortativa del hebreo en este contexto de denuncia judicial. No se neutraliza la carga profética convirtiéndola en mera predicción futura.
  doctrine_reference: Translation philosophy §3
- issue: Interpretación de la expresión oscura עֵר וְעֹנֶה
  english_pob_reading: retain a relatively literal rendering in the main text and preserve interpretive alternatives in a footnote
  chosen_spanish_reading: mantener una traducción literal transparente en el texto principal
  alternative_spanish_readings:
  - testigo y defensor
  - quien despierta y quien responde
  rationale: La ambigüedad léxica debe permanecer visible. No se impone una explicación homilética en el texto principal; la literalidad permite que el lector perciba la dificultad del hebreo, como en el aparato inglés.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La redacción española sigue la revisión inglesa que reemplazó una coordinación interpretativa añadida por un simple encadenamiento de participios con conjunción, evitando introducir un valor concesivo que no está en el hebreo. También conserva la ambigüedad de עֵר וְעֹנֶה sin resolverla en exceso.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para el Tetragrámaton.
  - Se conserva «de los ejércitos» para צְבָאוֹת, evitando el título eclesiástico tradicional como sustituto automático.
  - 'La coordinación final se mantiene simple: «y al que presenta una ofrenda», en paralelo con el hebreo.'
  - La frase oscura se deja transparente mediante una nota, no mediante una paráfrasis interpretativa en el texto principal.
