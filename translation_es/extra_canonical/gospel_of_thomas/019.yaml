base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/019.yaml
  text: Jesus said[a], “Blessed is the one who has come to be before he comes to be. If you become my disciples and listen to my words, these stones will minister to you. For you have five trees in Paradise; they do not move in summer or in winter, and their leaves do not fall[d][c][b]. Whoever comes to know them will not taste death.”
  footnotes:
  - marker: a
    text: ‘Blessed is the one who has come to be before he comes to be’ renders ⲡⲉⲧⲉⲣⲉⲁⲛⲧⲟϥϣⲱⲡⲉ ϩⲁⲡϩⲏ ⲉⲣⲉⲙⲡⲁⲧⲉⲛⲧⲟϥϣⲱⲡⲉ, a deliberate paradox based on ϣⲱⲡⲉ ‘to come into being’ (Crum).
    reason: lexical_alternative
  - marker: b
    text: The manuscript surface across NHAM02.36 lb 20–21 can be read as ‘my words, these stones (ⲁⲛⲁϣⲁϫⲉ ⲛⲉⲉⲓⲱⲛⲉ),’ yielding a plural ‘stones.’ Dilley’s normalized reading parses it as sg. ‘my word … this stone (ⲡⲁϣⲁϫⲉ … ⲡⲉⲓⲱⲛⲉ).’ This draft follows the normalized reading; the plural is a noted alternative.
    reason: textual_variant
  - marker: c
    text: ‘Will not taste death’ preserves the Coptic idiom ϫⲓϯⲡⲉ ⲛⲙⲟⲩ; cf. the idiom in Mark 9:1; Matt 16:28.
    reason: cross_reference
  - marker: d
    text: Or 'listen to my word, this stone will minister to you.'.
    reason: previous_rendering
