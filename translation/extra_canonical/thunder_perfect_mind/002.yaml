revision_risk_note: If a cleaner witness confirms ⲁⲓϭⲓⲛⲉ as 1sg ('I found'), the line
  could shift to a declarative 'and I am found among those who seek me', which would
  alter the imperative chain; we would then likely split the sentence to preserve
  rhythm while reflecting the indicative. If editors segment ⲧⲉⲧⲛⲉⲣⲟⲉⲓⲥ ⲉⲧⲏⲩⲧⲛ ⲉⲣⲟⲓ
  differently (e.g., attaching ⲉⲧⲏⲩⲧⲛ to the following clause), the vocative punctuation
  may change. Lexically, we may revise 'be strong' to 'take courage' (ϣⲟⲡⲧ) or 'do
  not flee from me' (ⲡⲱⲧ) if broader context suggests a different nuance. None of
  these affect doctrinal content but they do affect cadence and parallelism, so any
  revision will document the trade-offs.
