theological_decisions:
- issue: Rendering of כפר in a judgment context
  chosen_reading: retain the lexical idea with 'atone for it' rather than flattening to merely 'ward off' in the main text
  alternative_readings:
  - you will not be able to ward it off
  - you will not be able to appease it
  rationale: The Hebrew verb is theologically significant across the canon. Even though the immediate sense is Babylon's inability to remove or expiate the disaster, preserving 'atone' maintains lexical transparency without importing sacrificial theology beyond the text. The more interpretive alternatives are preserved in a footnote.
