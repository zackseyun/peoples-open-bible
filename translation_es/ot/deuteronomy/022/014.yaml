translation:
  language: es
  text: 'y la acusa[a] falsamente y le da mala fama[b], diciendo: «Tomé a esta mujer, y cuando me acerqué a ella[c], no hallé en ella prueba de virginidad[d]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «falsas acusaciones». La frase hebrea es idiomática y se refiere a acusaciones difamatorias.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «pone/saca sobre ella un mal nombre»; es decir, daña su reputación.
    reason: lexical_alternative
  - marker: c
    text: O «cuando entré a ella», un eufemismo hebreo para relaciones sexuales.
    reason: lexical_alternative
  - marker: d
    text: Literalmente, «no hallé para ella virginidades». En este contexto se refiere a evidencia o señales de virginidad, como explican los versículos siguientes.
    reason: cross_reference
lexical_decisions:
- source_word: וְשָׂם לָהּ עֲלִילֹת דְּבָרִים
  english_pob_choice: he charges her with false accusations
  chosen_spanish: le atribuye falsas acusaciones
  alternatives_spanish:
  - le impone falsas acusaciones
  - le hace falsas acusaciones
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y legal; en español, «le atribuye» conserva la idea de cargarle algo a ella, y «falsas acusaciones» refleja la lectura revisada del POB en inglés sin endurecer más de lo que exige el hebreo.
- source_word: וְהוֹצִיא עָלֶיהָ שֵׁם רָע
  english_pob_choice: brings a bad name upon her
  chosen_spanish: le mancha el buen nombre
  alternatives_spanish:
  - le trae un mal nombre
  - la difama
  lexicon: HALOT
  rationale: «Nombre malo» en español suena poco natural; «mancha el buen nombre» conserva el sentido idiomático de dañar la reputación. Se mantiene el carácter reputacional del hebreo sin perder claridad.
- source_word: הָאִשָּׁה הַזֹּאת
  english_pob_choice: this woman
  chosen_spanish: esta mujer
  alternatives_spanish:
  - esta esposa
  lexicon: HALOT
  rationale: Se conserva el demostrativo del hebreo. «Esposa» sería contextual pero suaviza el matiz distante del original.
- source_word: לָקַחְתִּי
  english_pob_choice: I took
  chosen_spanish: Tomé
  alternatives_spanish:
  - la tomé por esposa
  - la recibí
  lexicon: HALOT
  rationale: En este contexto marital, לקח puede implicar tomar por esposa, pero el POB preserva la forma verbal más abierta. «Tomé» mantiene esa sobriedad y deja el sentido marital al contexto.
- source_word: וָאֶקְרַב אֵלֶיהָ
  english_pob_choice: when I came near to her
  chosen_spanish: cuando me acerqué a ella
  alternatives_spanish:
  - cuando entré a ella
  - cuando tuve relaciones con ella
  lexicon: HALOT
  rationale: «Me acerqué a ella» conserva el eufemismo hebreo y evita una explicitación no exigida por el texto base. Es una equivalencia más natural que el calco rígido.
- source_word: וְלֹא מָצָאתִי לָהּ בְּתוּלִים
  english_pob_choice: I did not find evidence of virginity in her
  chosen_spanish: no hallé en ella prueba de virginidad
  alternatives_spanish:
  - no hallé virginidad en ella
  - no hallé señales de virginidad en ella
  - no hallé evidencias de virginidad en ella
  lexicon: HALOT
  rationale: בְּתוּלִים aquí apunta a una evidencia legal asociada con la virginidad, no solo a una cualidad abstracta. «Prueba de virginidad» comunica ese valor forense de manera natural en español.
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente, que prefirió «false accusations» frente a una redacción más general. En español se ajustó la primera cláusula para reflejar esa decisión y se mantuvo el valor legal/idiomático del resto del versículo. Se evitó crear notas no ancladas en el texto y se dejó una sola nota ligada al punto semántico más relevante.
  spanish_consistency_notes:
  - Se usa «Yahvé» como convención POB cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se mantuvo un registro legal y sobrio, coherente con el contexto de Deuteronomio.
  - No se introdujo «Cristo» ni otras terminologías no pertinentes.
  - «Prueba de virginidad» traduce el valor legal de בְּתוּלִים sin añadir tecnicismo innecesario.
