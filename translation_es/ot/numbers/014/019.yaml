translation:
  language: es
  text: Por favor, perdona la iniquidad de este pueblo según la grandeza de tu amor leal, así como has perdonado[a] a este pueblo desde Egipto hasta ahora.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «así como has llevado/soportado a este pueblo desde Egipto hasta ahora». El verbo hebreo puede significar «llevar/cargar» y, en algunos contextos, «perdonar».'
    reason: lexical_alternative
lexical_decisions:
- source_word: סְלַח נָא
  english_pob_choice: Please forgive
  chosen_spanish: Por favor, perdona
  alternatives_spanish:
  - Perdona, por favor
  - Te ruego que perdones
  lexicon: HALOT
  rationale: El imperativo de סלח con נָא expresa una súplica insistente y cortés. «Por favor, perdona» comunica bien tanto la petición como el tono urgente en español moderno y natural.
- source_word: לַעֲוֺן
  english_pob_choice: the iniquity
  chosen_spanish: la iniquidad
  alternatives_spanish:
  - la culpa
  - el pecado
  - el mal proceder
  lexicon: HALOT
  rationale: עָוֹן puede abarcar iniquidad, culpa o la carga de la culpa. «Iniquidad» conserva el peso moral del término sin reducirlo solo al acto o solo a la consecuencia.
- source_word: הָעָם הַזֶּה
  english_pob_choice: this people
  chosen_spanish: este pueblo
  alternatives_spanish:
  - esta gente
  - esta nación
  lexicon: HALOT
  rationale: עַם es un colectivo singular; «este pueblo» preserva esa forma y el sentido de comunidad pactal mejor que «esta gente» o «esta nación».
- source_word: כְּגֹדֶל חַסְדֶּךָ
  english_pob_choice: according to the greatness of your steadfast love
  chosen_spanish: según la grandeza de tu amor leal
  alternatives_spanish:
  - según la grandeza de tu misericordia
  - de acuerdo con tu gran amor fiel
  - según la grandeza de tu amor constante
  lexicon: HALOT
  rationale: גֹּדֶל es «grandeza» y חֶסֶד suele expresar amor leal/pactual. «Amor leal» mantiene la fuerza relacional y de pacto sin caer en una fórmula demasiado eclesiástica o más débil como «amor» a secas.
- source_word: וְכַאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: así como
  alternatives_spanish:
  - tal como
  - y como
  lexicon: HALOT
  rationale: La conjunción introduce comparación y apelación al precedente divino. «Así como» es idiomático y claro en español para marcar la relación de paralelismo.
- source_word: נָשָׂאתָה
  english_pob_choice: you have forgiven
  chosen_spanish: has perdonado
  alternatives_spanish:
  - has llevado
  - has soportado
  - has cargado
  lexicon: HALOT
  rationale: Aunque נשא literalmente puede significar «llevar/cargar», aquí el contexto del ruego y la revisión inglesa privilegiada por el pasaje favorecen el sentido de perdonar. «Has perdonado» comunica la acción divina de forma directa y mantiene el paralelo con «perdona».
- source_word: מִמִּצְרַיִם וְעַד הֵנָּה
  english_pob_choice: from Egypt until now
  chosen_spanish: desde Egipto hasta ahora
  alternatives_spanish:
  - desde Egipto hasta aquí
  - desde Egipto y hasta ahora
  lexicon: HALOT
  rationale: La expresión marca continuidad temporal desde el éxodo hasta el momento presente. «Desde Egipto hasta ahora» es la forma más natural y fiel en español.
theological_decisions:
- issue: Sentido de נָשָׂאתָה en la intercesión de Moisés
  english_pob_reading: God has forgiven this people from Egypt until now.
  chosen_spanish_reading: has perdonado a este pueblo desde Egipto hasta ahora.
  alternative_spanish_readings:
  - has cargado con este pueblo desde Egipto hasta ahora
  - has soportado a este pueblo desde Egipto hasta ahora
  rationale: El texto hebreo permite un rango semántico de «llevar/cargar/soportar» y, en contextos con pecado, también «perdonar». Dado el paralelismo con «perdona» y la revisión más reciente del audit trail, se preserva el sentido de perdón, sin perder de vista que el verbo hebreo tiene una base más amplia de portar/cargar.
  doctrine_reference: Translation philosophy §3; preservar la tensión léxica cuando el contexto la estrecha pero no la anula
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una revisión significativa en torno a נָשָׂאתָה: la traducción pasó de «borne with» a «forgiven» para reflejar mejor el paralelismo con «forgive» y el énfasis del versículo en el perdón. La redacción española sigue esa decisión revisada, pero mantiene en la nota la amplitud semántica del verbo hebreo para no borrar la tensión léxica documentada.'
  spanish_consistency_notes:
  - Se emplea «Yahvé» por norma del proyecto solo cuando aparezca el nombre divino explícito; aquí el versículo no lo contiene.
  - «Iniquidad» se mantiene como término técnico consistente para עָוֹן.
  - «Amor leal» se usa para חֶסֶד conforme al enfoque pactal del POB; la nota conserva la alternativa «amor fiel» para lectores que prefieran una equivalencia más directa.
  - El orden de la frase principal sigue el hebreo y el inglés auditado sin sonar forzado en español.
