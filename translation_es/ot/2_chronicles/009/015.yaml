- from: El rey Salomón hizo doscientos grandes escudos de oro batido[a]; seiscientos siclos de oro batido iban sobre cada escudo.
  to: El rey Salomón hizo doscientos grandes escudos de oro batido[a]; seiscientos siclos de oro batido se usaban para cada escudo.
