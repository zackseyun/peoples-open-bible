review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del hebreo y del POB inglés: consecuencia resultativa (''será''), imagen corporal concreta (''cuerpo'' con nota sobre ''ombligo''), y paralelismo restaurador con ''huesos''. Sin embargo, hay detalles menores que requieren corrección para representar con mayor naturalidad y precisión el campo semántico de וְשִׁקּוּי y para evitar errores ortográficos en las notas.'
  spanish_quality_summary: La frase principal es clara y legible en español eclesial moderno. 'Será sanidad para tu cuerpo' suena aceptable, pero 'refrigerio' para los huesos puede sonar algo idiomáticamente externo en español; aun así, es defendible y conserva bien la metáfora. El problema principal está en la nota b, donde 'nourición' es un error; debe ser 'nutrición' o mejor 'nutrimento/nutrición'. También conviene uniformar la preposición a 'para' en ambos miembros, tal como ya hace el borrador.
  glossary_alignment: 'No hay términos del glosario principal en juego aquí. Las decisiones léxicas concuerdan con la racionalidad documentada del POB: רִפְאוּת -> ''sanidad'', לְשָׁרֶּךָ -> ''tu cuerpo'' con alternativa ''ombligo'', וְשִׁקּוּי -> ''refrigerio'' con alternativas ''humedad'' y ''nutrición/nutrimento'', לְעַצְמוֹתֶיךָ -> ''tus huesos''.'
  issues:
  - severity: medium
    issue: 'Error ortográfico en la nota b: ''nourición''.'
    rationale: No es una palabra correcta en español. Debe corregirse a 'nutrición' o equivalente natural.
  - severity: low
    issue: La nota b puede expresar mejor la alternativa léxica española.
    rationale: El inglés 'moisture' o 'nourishment' se refleja mejor como 'humedad' o 'nutrición'/'nutrimento'. Así se preserva la evidencia léxica sin anglicismo ni forma incorrecta.
  revised_spanish_text: Será sanidad para tu cuerpo[a] y refrigerio para tus huesos[b].
  revised_footnotes:
  - marker: a
    text: O «para tu ombligo». El término hebreo puede referirse específicamente al ombligo, aunque en este contexto probablemente designa de manera más amplia el bienestar físico del cuerpo.
    reason: lexical_alternative
  - marker: b
    text: O «humedad» o «nutrición» para tus huesos.
    reason: lexical_alternative
  revision_rationale: El texto principal puede mantenerse porque transmite fielmente el sentido del hebreo y del POB inglés. Solo hace falta corregir la nota b para eliminar el error ortográfico y reflejar con español natural las alternativas léxicas documentadas.
