review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la estructura básica del versículo: José hace jurar a los hijos de Israel, afirma con certeza la futura acción de Dios, y ordena trasladar sus huesos de ese lugar. Sin embargo, «ustedes sacarán mis huesos de aquí» no preserva adecuadamente la fuerza semántica de וְהַעֲלִתֶם («harán subir / subirán / llevarán de aquí hacia arriba»), que en este contexto apunta al traslado desde Egipto hacia la tierra prometida y está reflejada en el inglés POB como «you shall bring up».'
  spanish_quality_summary: El español es claro y natural, pero «sacarán» suena algo reductivo y menos ligado al patrón bíblico e intertextual de «subir» los huesos desde Egipto. «Ustedes subirán mis huesos de aquí» sería demasiado calcado; una formulación más fiel y legible es «y ustedes harán subir mis huesos de aquí». También conviene ajustar la nota al pie actual, que repite exactamente el texto principal bajo «O,» y por tanto no ofrece una alternativa real.
  glossary_alignment: 'Alinea bien con las decisiones del proyecto en «Dios», «José», y la preservación literal de «los hijos de Israel» y «mis huesos». No hay conflicto con Yahvé/Mesías u otras entradas del glosario. El punto a corregir es lexical: עלה en hiphil debe conservar mejor la noción de «hacer subir / llevar arriba» que «sacar».'
  issues:
  - severity: medium
    issue: «sacarán» debilita וְהַעֲלִתֶם
    rationale: El hebreo hiphil de עלה expresa causar subir / llevar arriba. En Génesis 50:25 el sentido geográfico-teológico de subir desde Egipto importa, y el inglés auditado lo conserva con «shall bring up». «Sacar» comunica extracción, pero pierde la direccionalidad y la conexión intertextual.
  - severity: low
    issue: La nota [a] no presenta una alternativa real
    rationale: La nota dice «O, “Dios ciertamente los visitará”», que repite exactamente el texto principal. Según el rastro inglés, la nota debe preservar una alternativa de traducción como «Dios ciertamente los atenderá» o explicación equivalente del verbo intensificado.
  revised_spanish_text: 'Entonces José hizo jurar a los hijos de Israel, diciendo: «Dios ciertamente los visitará[a], y ustedes harán subir mis huesos de aquí».'
  revised_footnotes:
  - marker: a
    text: O, «Dios ciertamente los atenderá». El hebreo usa una forma intensificada del verbo, que expresa certeza y una atención divina activa.
    reason: lexical_alternative
  revision_rationale: Se reemplaza «sacarán» por «harán subir» para reflejar con mayor fidelidad el hiphil de עלה y su sentido narrativo de traslado hacia arriba desde Egipto. Se corrige la nota para que ofrezca una alternativa real, en línea con el audit trail inglés, en vez de repetir el texto principal.
