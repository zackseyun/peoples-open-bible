review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: ubicación cultual en un monte alto, establecimiento de ''tu cama'', y subida para realizar sacrificio. Sin embargo, la nota al pie está mal anclada: la nota inglesa ''even there'' corresponde a גַּם שָׁם (''allí también''), no a ''tu cama''. Además, ''encumbrado'' suena menos natural y algo rebuscado para נִשָּׂא en este contexto; ''elevado'' preserva mejor el sentido sin sobrecarga estilística. La cláusula final ''sacrificar sacrificio'' es muy literal, pero en español resulta torpe; una leve reparación a ''sacrificar un sacrificio'' conserva mejor el cognado explícito documentado en el audit trail.'
  spanish_quality_summary: El texto es generalmente legible, pero requiere pulido menor para español más natural y para corregir la colocación de la nota. 'En un monte alto y elevado' fluye mejor que 'encumbrado'. La secuencia 'tu cama' funciona y preserva la metáfora sin explicitarla. 'Allí también' es adecuada. 'Para sacrificar un sacrificio' sigue siendo marcada, pero es inteligible y más idiomática que la versión sin artículo.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen nombres divinos ni términos doctrinales sensibles de la lista. 'Cama' preserva correctamente מִשְׁכָּב; el lenguaje sacrificial mantiene el énfasis cultual de זבח.
  issues:
  - severity: high
    issue: La nota al pie [a] está anclada en 'tu cama' pero su contenido corresponde a 'allí también'.
    rationale: La alternativa 'incluso allí' explica גַּם שָׁם, no מִשְׁכָּבֵךְ. Tal como está, induce a error sobre qué elemento textual tiene variante léxica.
  - severity: medium
    issue: '''Encumbrado'' suena poco natural en este contexto.'
    rationale: Aunque semánticamente posible, en español bíblico general 'alto y elevado' comunica mejor גָּבֹהַּ וְנִשָּׂא con dignidad y claridad.
  - severity: medium
    issue: '''Sacrificar sacrificio'' resulta demasiado áspero en español.'
    rationale: El hebreo usa infinitivo + cognado; añadir artículo indefinido ('un sacrificio') conserva la explicitud del objeto y mejora la naturalidad sin neutralizar el énfasis.
  revised_spanish_text: En un monte alto y elevado pusiste tu cama; allí también[a] subiste para sacrificar un sacrificio.
  revised_footnotes:
  - marker: a
    text: 'También: «incluso allí».'
    reason: lexical_alternative
  revision_rationale: Se corrige la ubicación de la nota para que explique correctamente גַּם שָׁם, se mejora la naturalidad de נִשָּׂא con 'elevado', y se ajusta la cláusula final a un español más legible manteniendo el cognado explícito del hebreo.
