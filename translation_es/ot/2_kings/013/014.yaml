translation:
  language: es
  text: 'Y Eliseo había enfermado de la enfermedad de la que moriría. Y Joás, rey de Israel, descendió hacia él, lloró sobre él[a] y dijo: «¡Padre mío, padre mío! ¡Los carros de Israel y sus jinetes!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: «lloró por él». El hebreo dice literalmente: «lloró sobre su rostro».'
    reason: lexical_alternative
lexical_decisions:
- source_word: חָלָה
  english_pob_choice: had become sick
  chosen_spanish: estaba enfermo
  alternatives_spanish:
  - había enfermado
  - se había enfermado
  - estaba aquejado
  lexicon: HALOT
  rationale: El verbo expresa el inicio o estado de enfermedad; en español, «estaba enfermo» comunica con naturalidad el estado narrativo previo a la visita de Joás sin añadir matices no respaldados por el hebreo.
- source_word: חָלְיוֹ
  english_pob_choice: the illness
  chosen_spanish: la enfermedad
  alternatives_spanish:
  - su enfermedad
  - su dolencia
  lexicon: HALOT
  rationale: El sustantivo cognado refuerza que Eliseo estaba enfermo con «la enfermedad» específica. «Enfermedad» es el equivalente natural y mantiene la reiteración del original.
- source_word: אֲשֶׁר יָמוּת בּוֹ
  english_pob_choice: from which he would die
  chosen_spanish: de la cual moriría
  alternatives_spanish:
  - por la cual moriría
  - con la que moriría
  - de la que moriría
  lexicon: HALOT
  rationale: La cláusula relativa identifica la enfermedad fatal desde el punto de vista narrativo. «De la cual moriría» conserva la relación causal sin forzar una paráfrasis explicativa.
- source_word: וַיֵּרֶד אֵלָיו
  english_pob_choice: went down to him
  chosen_spanish: descendió a él
  alternatives_spanish:
  - bajó a él
  - fue a verlo
  - descendió hasta él
  lexicon: HALOT
  rationale: «Descendió» mantiene el verbo direccional literal del hebreo. Aunque puede implicar movimiento geográfico, el español permite conservarlo sin sobreexplicar.
- source_word: וַיֵּבְךְּ עַל פָּנָיו
  english_pob_choice: wept over him
  chosen_spanish: lloró sobre él
  alternatives_spanish:
  - lloró por él
  - lloró encima de él
  - lloró sobre su rostro
  lexicon: HALOT
  rationale: La POB inglesa decidió suavizar la literalidad de «sobre su rostro» a «over him» por naturalidad. En español, «lloró sobre él» preserva la cercanía física y el tono del gesto sin volverlo extraño; evita resolver la imagen en una simple emoción abstracta.
- source_word: אָבִי אָבִי
  english_pob_choice: My father, my father!
  chosen_spanish: ¡Padre mío, padre mío!
  alternatives_spanish:
  - ¡Padre, padre!
  - ¡Mi padre, mi padre!
  lexicon: HALOT
  rationale: La forma de posesivo expresa respeto y duelo; «Padre mío» conserva el vínculo relacional y el eco de 2 Reyes 2:12. Se evita «Cristo» u otra formulación litúrgica que no está en el texto.
- source_word: רֶכֶב יִשְׂרָאֵל וּפָרָשָׁיו
  english_pob_choice: The chariots of Israel and its horsemen
  chosen_spanish: Los carros de Israel y su caballería
  alternatives_spanish:
  - Los carros de Israel y sus jinetes
  - el carro de Israel y su caballería
  - los carros de Israel y sus caballos
  lexicon: HALOT
  rationale: «Carros» mantiene el valor militar concreto de רֶכֶב. «Caballería» comunica mejor en español la fuerza colectiva de פָּרָשִׁים que «jinetes», aunque deja abierto el matiz metafórico sin resolverlo.
theological_decisions:
- issue: Sentido metafórico de «los carros de Israel y su caballería»
  english_pob_reading: Retained as a direct exclamation addressed to Elisha, implying that the prophet is Israel's true strength and defense.
  chosen_spanish_reading: Se conserva como exclamación directa a Eliseo, insinuando que el profeta es la verdadera defensa de Israel.
  alternative_spanish_readings:
  - Se trata solo de un lamento que compara a Eliseo con poder militar
  - Se refiere a una visión de carros celestiales
  rationale: El hebreo y la POB inglesa mantienen la tensión metafórica sin explicarla. La traducción española conserva la frase intacta para no cerrar su alcance teológico ni convertirla en paráfrasis doctrinal.
  doctrine_reference: Principio POB de preservar tensiones textuales y alusiones intertextuales sin resolverlas por anticipado.
translation_notes:
  revision_awareness: La POB inglesa revisó «wept over his face» a «wept over him» para mayor naturalidad, sin cambiar el sentido. En español se eligió «lloró sobre él», que preserva el gesto físico y evita una construcción rígida; no se añade explicación intratextual al eco de 2 Reyes 2:12, pero sí se retiene la formulación que el lector puede reconocer como alusiva.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma predeterminada solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - Se mantiene «Eliseo» y «Joás» con ortografía española estándar.
  - «Carros» y «caballería» conservan el registro militar y la metáfora abierta del hebreo.
  - El orden de la frase sigue de cerca la secuencia narrativa del original para preservar el énfasis.
