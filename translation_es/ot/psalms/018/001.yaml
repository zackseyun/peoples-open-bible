base_translation:
  language: en
  yaml_path: translation/ot/psalms/018/001.yaml
  text: For the choirmaster[a]. Of David, the servant of Yahweh[b], who spoke to Yahweh the words of this song on the day when Yahweh rescued him from the hand of all his enemies and from the hand of Saul.
  footnotes:
  - marker: a
    text: Or 'slave of the LORD.' The Hebrew term can denote a servant or a slave; here it is rendered 'servant' because the superscription uses it as an honorific title for David.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from the hand of,' an idiom for deliverance from someone's power or control.
    reason: cultural_note
