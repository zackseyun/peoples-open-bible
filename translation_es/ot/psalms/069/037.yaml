revisions:
- from: La descendencia de sus siervos la heredará[a][b], y los que aman su nombre habitarán en ella.
  to: Los descendientes[a] de sus siervos la heredarán[b], y los que aman su nombre habitarán en ella.
  rationale: Se cambia 'La descendencia ... la heredará' por 'Los descendientes ... la heredarán' para reflejar con naturalidad en español el verbo plural hebreo y evitar una lectura singular rígida. Se conserva la posibilidad de 'descendencia' en nota para mantener el matiz colectivo de זֶרַע. También se simplifica y alinea la nota léxica con el audit trail inglés.
