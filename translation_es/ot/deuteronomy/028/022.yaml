base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/028/022.yaml
  text: Yahweh will strike you with wasting disease[a], with fever, with inflammation, with burning heat, with the sword, with blight, and with mildew[b]; and they will pursue you until you perish.
  footnotes:
