    text: Literalmente, «y su hijo y el hijo de su hijo».
    reason: lexical_alternative
  - marker: b
    text: O, más literalmente, «hasta que llegue el tiempo de su tierra»; es decir, el tiempo señalado respecto de la propia tierra de Babilonia.
    reason: lexical_alternative
  - marker: c
    text: El hebreo probablemente quiere decir que muchas naciones y grandes reyes someterán a Babilonia a servidumbre; una traducción más tosca sería «lo usarán para servicio» o «harán servicio con él».
    reason: alternative_reading
  revision_rationale: Se cambió 'al hijo de su hijo' por 'a su nieto' para seguir mejor la decisión principal del POB y mejorar la naturalidad del español, dejando la forma literal en nota. También se ajustó la nota c para que preserve una alternativa realmente distinta del texto principal y refleje mejor la explicación auditada sobre וְעָבְדוּ בוֹ.
