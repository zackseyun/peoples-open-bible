  yaml_path: translation/ot/hosea/009/010.yaml
  text: Like grapes in the wilderness I found Israel[a]; like the first-ripe fruit on the fig tree in its first season I saw your fathers. They came to Baal-peor and consecrated themselves to shame[d][c][b], and they became detestable like the thing they loved.
  footnotes:
