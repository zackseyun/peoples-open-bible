  source_alignment_summary: 'El borrador refleja correctamente la estructura básica del hebreo: una fórmula genealógica seguida por tres nombres propios. «Los hijos de Leví» corresponde bien a בְּנֵי לֵוִי, y «Gershom … y Merari» preserva adecuadamente dos de los tres nombres. Sin embargo, la nota [b] está mal anclada: en el texto español aparece sobre «Coat», pero la evidencia fuente y la auditoría inglesa indican que la variante explicada en [b] corresponde a גֵּרְשֹׁם / Gershom, no a קְהָת. Además, aunque «Coat» es una forma tradicional española, aquí conviene preferir «Cohat» para una correspondencia más transparente con קְהָת y una lectura eclesial ampliamente reconocible.'
  spanish_quality_summary: 'El español es claro, natural y digno. «Los hijos de Leví» suena bien en registro bíblico moderno. La principal deficiencia de calidad es editorial: la nota [b] crea confusión al estar unida al nombre equivocado. También «Cohat» mejora la identificación del personaje frente a «Coat», que puede resultar menos reconocible para lectores actuales en un proyecto de español neutro amplio.'
  glossary_alignment: No hay términos teológicos sensibles en este versículo. Los nombres propios están mayormente bien manejados. «Leví», «Gershom» y «Merari» son adecuados. Para קְהָת, «Cohat» alinea mejor el nombre con el uso bíblico español general sin depender de la forma inglesa «Kohath» ni de una simplificación menos transparente como «Coat».
  issues:
  - severity: high
    issue: La nota [b] está anclada al nombre equivocado.
    rationale: La nota explica que el hebreo de este versículo dice «Gershom» frente a la variante «Gersón/Gershon» en otros pasajes. Por lo tanto debe marcar «Gershom», no «Coat/Cohat». Tal como está, induce a error textual.
  - severity: medium
