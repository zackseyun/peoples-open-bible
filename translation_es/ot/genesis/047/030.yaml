translation:
  language: es
  text: 'Cuando me acueste con mis padres[a], llévame fuera de Egipto y entiérrame en el lugar donde ellos están sepultados[c][b]». Y dijo: «Yo haré como has dicho».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «y me acueste con mis padres»; la expresión hebrea es un modismo habitual asociado con la muerte y el entierro.'
    reason: lexical_alternative
  - marker: b
    text: O, «con mis antepasados».
    reason: lexical_alternative
  - marker: c
    text: O, «en su tumba» o «en su sepulcro».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁכַבְתִּי
  english_pob_choice: When I lie down
  chosen_spanish: Cuando me acueste
  alternatives_spanish:
  - y me acueste
  - cuando me recueste
  lexicon: HALOT
  rationale: שׁכב conserva en español la imagen de acostarse/recostarse, y en contexto funerario funciona como eufemismo idiomático para la muerte. «Cuando me acueste» reproduce la fuerza temporal de la cláusula y mantiene la imagen sin explicitar «morir» más allá de lo que el hebreo exige.
- source_word: עִם אֲבֹתַי
  english_pob_choice: with my fathers
  chosen_spanish: con mis padres
  alternatives_spanish:
  - con mis antepasados
  - con mis padres/familiares
  lexicon: HALOT
  rationale: אבות con sufijo de primera persona alude a los antepasados/padres. «Padres» conserva la fórmula bíblica familiar y la resonancia idiomática de sepultura, sin forzar una terminología más técnica que en español sonarí­a menos natural.
- source_word: וּנְשָׂאתַנִי
  english_pob_choice: carry me
  chosen_spanish: llévame fuera
  alternatives_spanish:
  - cárgame
  - tráeme
  lexicon: HALOT
  rationale: נשא aquí implica transportar un cuerpo desde Egipto. En español, «llévame fuera» comunica el traslado funerario con naturalidad y evita una literalidad que podría sonar dura o inusual, sin perder la idea de sacar el cuerpo de Egipto.
- source_word: מִמִּצְרַיִם
  english_pob_choice: out of Egypt
  chosen_spanish: fuera de Egipto
  alternatives_spanish:
  - desde Egipto
  - de Egipto
  lexicon: HALOT
  rationale: La preposición מן puede ser «de» o «desde», pero la dirección del movimiento queda mejor expresada con «fuera de», que coincide con la intención de remover el cuerpo del país.
- source_word: וּקְבַרְתַּנִי
  english_pob_choice: bury me
  chosen_spanish: entiérrame
  alternatives_spanish:
  - sepúltame
  - sepáldame
  lexicon: HALOT
  rationale: קבר es el verbo común «enterrar». «Entiérrame» es la forma más natural y fiel en español moderno para esta petición funeraria.
- source_word: בִּקְבֻרָתָם
  english_pob_choice: in their burial place
  chosen_spanish: en su lugar de sepultura
  alternatives_spanish:
  - en su sepulcro
  - en su tumba
  lexicon: HALOT
  rationale: El sustantivo indica un lugar de enterramiento. «Lugar de sepultura» conserva la amplitud del hebreo y evita decidir de antemano entre tumba, sepulcro o panteón. El singular en español se usa como colectivo referido al sitio de enterramiento familiar.
- source_word: וַיֹּאמַר
  english_pob_choice: And he said
  chosen_spanish: Y él dijo
  alternatives_spanish:
  - Entonces dijo
  - Y respondió
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol se vierte con la simple coordinación española. «Él» explicita el sujeto implícito de forma natural en español, sin añadir interpretación.
- source_word: אָנֹכִי אֶעֱשֶׂה
  english_pob_choice: I will do
  chosen_spanish: Yo haré
  alternatives_spanish:
  - haré
  - yo mismo lo haré
  lexicon: HALOT
  rationale: El pronombre independiente אָנֹכִי aporta énfasis. «Yo haré» conserva ese énfasis de manera sobria y idiomática en español.
- source_word: כִדְבָרֶךָ
  english_pob_choice: as you have said
  chosen_spanish: como has dicho
  alternatives_spanish:
  - según tu palabra
  - tal como has dicho
  lexicon: HALOT
  rationale: כדברך literalmente es «según tu palabra». «Como has dicho» es una equivalencia natural que conserva el sentido de conformidad con la petición de Jacob sin sobrecargar el registro.
theological_decisions:
- issue: Expresión idiomática de muerte en «acostarse con mis padres»
  english_pob_reading: The Hebrew expression is a customary idiom associated with death and burial.
  chosen_spanish_reading: «Cuando me acueste con mis padres» mantiene la metáfora funeraria como eufemismo idiomático, sin convertirla en una glosa interpretativa dentro del texto principal.
  alternative_spanish_readings:
  - «cuando muera y me reúna con mis padres»
  - «cuando repose con mis padres»
  rationale: El hebreo no dice simplemente «moriré», sino que usa una fórmula tradicional ligada a la muerte y al entierro. La redacción española conserva esa tensión figurativa para que el lector la perciba, y la nota aclara el valor idiomático sin sustituirlo en el cuerpo del texto.
  doctrine_reference: Uso bíblico de fórmulas de muerte y sepultura en narrativas patriarcales; cf. la terminología hebrea de las sepulturas de los padres.
translation_notes:
  revision_awareness: La redacción sigue de cerca el estado final del auditorio inglés, que no presenta revisiones aplicadas y fue confirmado como de alta concordancia. Se preservó la misma estructura de petición funeraria y la misma secuencia narrativa, adaptando solo la forma a un español natural y fiel al hebreo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se usó «padres» para reproducir la fórmula idiomática hebrea; la nota ofrece «antepasados» como alternativa semántica.
  - Se eligió «lugar de sepultura» para respetar la amplitud de בִּקְבֻרָתָם sin imponer una localización más concreta.
  - Se preservó el valor enfático del pronombre independiente en «Yo haré».
