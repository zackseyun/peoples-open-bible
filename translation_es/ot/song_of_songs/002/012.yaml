translation:
  language: es
  text: Los brotes aparecen en el país; el tiempo del canto[a] ha llegado, y se oye la voz de la tórtola en nuestra tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «el tiempo de la poda ha llegado». El hebreo זָמִיר puede significar «canto/canción» o «poda»; aquí se prefiere «canto» por su paralelismo con la voz de la tórtola.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנִּצָּנִים
  english_pob_choice: the blossoms
  chosen_spanish: las flores
  alternatives_spanish:
  - los brotes
  - las floraciones
  lexicon: HALOT
  rationale: נִצָּנִים alude a flores o florecimientos primaverales. «Flores» comunica bien la imagen estacional en español y evita estrechar indebidamente el sentido a brotes cerrados. Aunque «flores» es un poco más general que «blossoms», mantiene la claridad poética sin perder el referente botánico.
- source_word: נִרְאוּ
  english_pob_choice: appear
  chosen_spanish: se dejan ver
  alternatives_spanish:
  - aparecen
  - son vistas
  lexicon: HALOT
  rationale: El nifal de ראה expresa hacerse visible. «Se dejan ver» conserva esa idea intransitiva y suena natural en español poético, sin introducir pasividad artificial.
- source_word: בָאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - en la tierra prometida
  lexicon: HALOT
  rationale: אֶרֶץ puede ser «tierra» o «país/territorio». En este contexto lírico de primavera, «la tierra» reproduce mejor la amplitud y la resonancia poética del hebreo que una formulación más localizada como «país».
- source_word: עֵת
  english_pob_choice: the time of
  chosen_spanish: el tiempo de
  alternatives_spanish:
  - la temporada de
  lexicon: HALOT
  rationale: עֵת denota un tiempo o estación. «El tiempo de» sigue de cerca la estructura hebrea y resulta idiomático en español.
- source_word: הַזָּמִיר
  english_pob_choice: singing
  chosen_spanish: el canto
  alternatives_spanish:
  - la poda
  - la canción
  lexicon: HALOT
  rationale: El término זָמִיר tiene una tensión léxica entre «canto/canción» y «poda». Dado el paralelo inmediato con la voz de la tórtola, «el canto» conserva el campo auditivo y la coherencia poética que el POB inglés privilegia.
- source_word: הִגִּיעַ
  english_pob_choice: has come
  chosen_spanish: ha llegado
  alternatives_spanish:
  - ha venido
  - ha arribado
  lexicon: HALOT
  rationale: El verbo indica llegada o arribo. «Ha llegado» es la opción más natural y precisa en español para una estación o momento.
- source_word: וְקוֹל
  english_pob_choice: and the voice of
  chosen_spanish: y se oye la voz de
  alternatives_spanish:
  - y el sonido de
  - y la voz de
  lexicon: HALOT
  rationale: קוֹל significa «voz» o «sonido». Mantener «voz» preserva el matiz lírico aplicado al ave; la formulación impersonal «se oye» integra de forma fluida el valor pasivo de נִשְׁמַע.
- source_word: הַתּוֹר
  english_pob_choice: the turtledove
  chosen_spanish: la tórtola
  alternatives_spanish:
  - la paloma torcaz
  - la tórtola común
  lexicon: HALOT
  rationale: תּוֹר designa específicamente la tórtola. «Tórtola» es el equivalente español más directo y específico, y evita el genérico «paloma».
- source_word: נִשְׁמַע
  english_pob_choice: is heard
  chosen_spanish: se oye
  alternatives_spanish:
  - es escuchada
  - se escucha
  lexicon: HALOT
  rationale: El nifal de שמע expresa ser oído. «Se oye» es una solución natural en español que conserva el sentido pasivo sin sonar forzada.
- source_word: בְּאַרְצֵנוּ
  english_pob_choice: in our land
  chosen_spanish: en nuestra tierra
  alternatives_spanish:
  - en nuestro país
  - en nuestra región
  lexicon: HALOT
  rationale: El sufijo de primera persona plural conserva cercanía compartida. «Nuestra tierra» mantiene el tono poético y la pertenencia comunitaria del hebreo.
translation_notes:
  revision_awareness: 'El pasaje coincide con la revisión inglesa más reciente: no se registran cambios aplicados y la lectura preferida mantiene la decisión léxica de ‘singing’ frente a ‘pruning’ por el contexto inmediato de aves y primavera.'
  spanish_consistency_notes:
  - Se mantuvo el paralelismo poético entre las flores visibles, el tiempo del canto y la voz de la tórtola.
  - No se usó «SEÑOR» ni terminología doctrinal; el verso no contiene nombres divinos ni términos teológicos que requieran glosa.
  - Se eligió un registro bíblico moderno y digno, evitando calcos como «son vistas» o «es escuchada» cuando el español natural ofrece equivalentes más fluidos.
