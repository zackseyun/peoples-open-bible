review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: vocativo fijo a Ezequiel, énfasis deíctico, expresión corporativa ''la casa de Israel'', y la idea de que el pueblo pospone el cumplimiento de la visión a un futuro remoto. Sin embargo, dos elecciones españolas necesitan ajuste para mayor fidelidad idiomática y precisión: ''Hijo de hombre'' suena poco natural frente al uso bíblico establecido ''hijo de hombre'' en español, y ''está diciendo'' es menos natural aquí que el presente simple ''dice'' o ''dicen'' para un dicho característico.'
  spanish_quality_summary: El texto es legible y digno, pero 'Hijo de hombre' resulta algo calcado y poco idiomático en español bíblico; además, la mayúscula puede sonar titular más que vocativa dentro del flujo. 'Para muchos días por venir' es comprensible, aunque algo rígido; 'para muchos días todavía' o 'para muchos días futuros' sería más natural, pero la forma actual no es incorrecta. El ajuste principal es pulir el vocativo y el verbo de habla para una lectura más natural.
  glossary_alignment: No hay conflicto con la terminología del proyecto fuera del vocativo בן־אדם. La elección debe seguir la continuidad literaria documentada, pero en español la forma consagrada y más inteligible es 'hijo de hombre', no 'Hijo de hombre'. El resto del léxico clave ('la casa de Israel', 'la visión', 'profetiza', 'tiempos lejanos') está alineado con el expediente inglés y el hebreo.
  issues:
  - severity: medium
    issue: '''Hijo de hombre'' como vocativo principal'
    rationale: Aunque intenta preservar 'Son of man', en español bíblico la forma natural y reconocible es 'hijo de hombre'. La versión con artículo omitido y mayúscula inicial suena más calcada que idiomática.
  - severity: low
    issue: '''la casa de Israel está diciendo'' suena forzado'
    rationale: El hebreo tiene participio plural con sujeto colectivo. En español, para una afirmación proverbial o repetida, 'dice' fluye mejor que el progresivo y preserva el sentido sin rigidez.
  revised_spanish_text: '«Hijo de hombre[a], mira, la casa de Israel dice: “La visión que él ve es para muchos días por venir, y profetiza para tiempos lejanos”»'
  revised_footnotes:
  - marker: a
    text: 'O: «para muchos días» / «para tiempos lejanos». El hebreo enfatiza que el pueblo piensa que la visión de Ezequiel apunta a un futuro remoto.'
    reason: lexical_alternative
  revision_rationale: Se ajusta el vocativo a una forma española más natural y reconocible dentro del registro bíblico ('hijo de hombre') y se reemplaza el progresivo 'está diciendo' por el presente simple 'dice', más idiomático para caracterizar lo que el pueblo afirma. Se conserva el sentido temporal remoto y la nota léxica del expediente inglés.
