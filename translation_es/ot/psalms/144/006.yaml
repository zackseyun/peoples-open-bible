translation:
  language: es
  text: ¡Haz destellar el relámpago!, y dispérsalos; envía tus flechas y ponlos en confusión[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y desbarátalos». El verbo final puede indicar pánico, confusión o derrota militar.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּר֣וֹק
  english_pob_choice: Flash forth
  chosen_spanish: ¡Destella
  alternatives_spanish:
  - ¡Relampaguea
  - ¡Haz destellar
  lexicon: HALOT
  rationale: El hebreo es un imperativo verbal dirigido a Dios. «Destella» conserva la fuerza verbal y la inmediatez poética en español sin añadir elementos que no están en el texto.
- source_word: בָּ֭רָק
  english_pob_choice: lightning
  chosen_spanish: relámpago
  alternatives_spanish:
  - rayo
  - centella
  lexicon: HALOT
  rationale: El sustantivo denota «lightning/lightning bolt». «Relámpago» es claro y natural en español bíblico contemporáneo, y mantiene la imagen de fenómeno luminoso/fulgurante.
- source_word: וּ/תְפִיצֵ֑/ם
  english_pob_choice: and scatter them
  chosen_spanish: y dispersa[a] a ellos
  alternatives_spanish:
  - y disemínalos
  - y derrámalos
  lexicon: HALOT
  rationale: La forma causativa de פוץ expresa hacer que los enemigos se esparzan. «Dispersa» conserva esa fuerza; el complemento «a ellos» sigue el objeto pronominal masculino plural del hebreo. Se añade nota porque la alternativa inglesa también puede ser «rout them».
- source_word: שְׁלַ֥ח
  english_pob_choice: send out
  chosen_spanish: envía
  alternatives_spanish:
  - envía fuera
  - manda
  lexicon: HALOT
  rationale: Con «tus flechas», el imperativo de שלח se expresa naturalmente como «envía» en español, manteniendo la imagen de lanzar/mandar salir las armas.
- source_word: חִ֝צֶּ֗י/ךָ
  english_pob_choice: your arrows
  chosen_spanish: tus flechas
  alternatives_spanish:
  - tus saetas
  lexicon: HALOT
  rationale: «Flechas» es la equivalencia más clara y estándar para el plural con sufijo de segunda persona masculina singular.
- source_word: וּ/תְהֻמֵּֽ/ם
  english_pob_choice: and throw them into confusion
  chosen_spanish: y ponlos en confusión
  alternatives_spanish:
  - y confúndelos
  - y espántalos
  - y hazlos huir
  lexicon: HALOT
  rationale: La raíz המם puede implicar pánico, confusión o derrota en batalla. «Ponlos en confusión» conserva el matiz causativo sin restringirlo solo a confusión mental ni sustituirlo por un triunfo más interpretativo.
theological_decisions:
- issue: Imagen de Dios como guerrero
  english_pob_reading: Retain the martial imagery as a direct petition to God using lightning and arrows metaphorically/poetically.
  chosen_spanish_reading: Mantener la imagen marcial como súplica directa a Dios con relámpago y flechas en sentido poético.
  alternative_spanish_readings:
  - Suavizar a una petición general de ayuda
  - Interpretar las imágenes solo como metáforas de juicio
  rationale: El hebreo presenta imperativos poéticos dirigidos a Dios; la traducción conserva esa representación teológica sin domesticarla ni explicarla más allá de lo que el texto dice.
  doctrine_reference: Principio de preservación del sentido llano del texto poético; el traductor no debe paraphrasear más allá de lo que el original permite.
translation_notes:
  revision_awareness: La revisión inglesa cambió de «Flash lightning» a «Flash forth lightning» para reflejar mejor el valor verbal. En español se optó por «Destella» sin complemento adicional, porque el imperativo ya conserva el impulso verbal y «relámpago» funciona como objeto poético inmediato.
  spanish_consistency_notes:
  - Se evita «SEÑOR» para יהוה porque este versículo no contiene el Tetragrámaton.
  - «Flechas» se usa de forma literal y no se sustituye por un término más litúrgico.
  - «Ponlos en confusión» preserva la ambigüedad de pánico/rutina/derrota sin cerrarla demasiado.
