translation:
  language: es
  text: Y será un día[a], conocido por Yahvé[c], ni día ni noche[b]; pero al atardecer habrá luz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un día». El hebreo dice literalmente «un día», lo cual puede resaltar la singularidad o la excepcionalidad según el contexto.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «ni día ni noche».'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «conocido para Yahvé».'
    reason: cultural_note
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And it will be
  chosen_spanish: Y sucederá que será
  alternatives_spanish:
  - Y será
  - Y acontecerá
  lexicon: HALOT
  rationale: El waw + qatal introduce un evento futuro en discurso profético. «Sucederá que será» conserva el valor prospectivo y el tono bíblico en español sin volverse rígido.
- source_word: יוֹם אֶחָד
  english_pob_choice: one day
  chosen_spanish: un día
  alternatives_spanish:
  - un solo día
  - un día único
  lexicon: HALOT
  rationale: La frase hebrea dice literalmente «un día». En español, «un día» mantiene la literalidad; el contexto permite la posible idea de singularidad o excepcionalidad sin añadirla de forma excesiva al texto principal.
- source_word: הוּא
  english_pob_choice: it
  chosen_spanish: se omite en la fluidez española
  alternatives_spanish:
  - él
  - ese día
  lexicon: HALOT
  rationale: El pronombre retoma «día». En español, su función se expresa mejor sin pronombre explícito, porque «será un día» ya recoge la referencia.
- source_word: יִוָּדַע לַיהוָה
  english_pob_choice: known to Yahweh
  chosen_spanish: conocido para Yahvé
  alternatives_spanish:
  - conocido por Yahvé
  - conocido ante Yahvé
  lexicon: HALOT
  rationale: 'El nifal de ידע con ל marca relación/ámbito: el día pertenece al conocimiento de Yahvé. «Conocido para Yahvé» conserva esa relación sin decidir de manera indebida entre «por» y «a».'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  lexicon: Proyecto default de nombre divino
  rationale: Se sigue el estándar del proyecto para el nombre divino, preservando la transparencia textual y evitando el reemplazo por una convención de máscara.
- source_word: לֹא יוֹם וְלֹא לָיְלָה
  english_pob_choice: neither day nor night
  chosen_spanish: no día ni noche
  alternatives_spanish:
  - ni día ni noche
  - no es día ni noche
  lexicon: HALOT
  rationale: La negación hebrea es tajante y paralela. «No día ni noche» reproduce la forma breve y paradójica del original, manteniendo la tensión semántica.
- source_word: לְעֵת עֶרֶב
  english_pob_choice: at evening time
  chosen_spanish: al tiempo de la tarde
  alternatives_spanish:
  - al anochecer
  - a la hora de la tarde
  lexicon: HALOT
  rationale: La expresión indica el momento del atardecer/tarde. «Al tiempo de la tarde» es suficientemente literal y comprensible; «anochecer» desplaza un poco el matiz temporal.
- source_word: יִהְיֶה אוֹר
  english_pob_choice: there will be light
  chosen_spanish: habrá luz
  alternatives_spanish:
  - habrá claridad
  - será luz
  lexicon: HALOT
  rationale: La construcción existencial se rinde naturalmente con «habrá luz». Conserva la sorpresa del giro final sin agregar imaginería ajena al hebreo.
theological_decisions:
- issue: Alcance de la frase «un día, conocido para Yahvé»
  english_pob_reading: Render the verse as describing a singular, extraordinary day without specifying an eschatological timetable or mechanism.
  chosen_spanish_reading: La traducción presenta un día singular y extraordinario, sin definir cronología escatológica ni mecanismo astronómico.
  alternative_spanish_readings:
  - un fenómeno astronómico literal
  - un símbolo puramente espiritual
  - una cronología milenial precisa
  rationale: El hebreo afirma una singularidad marcada y una condición paradójica, pero no explica el modo de cumplimiento. La traducción conserva esa tensión sin cerrarla con una interpretación doctrinal específica.
  doctrine_reference: Preservar la tensión teológica sin resolverla desde la traducción.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB inglés: se mantiene «un día» frente a una paráfrasis de mayor énfasis, se conserva la negación paralela de forma sobria, y el cierre final usa una construcción natural en español equivalente a «there will be light».'
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para יהוה.
  - Se mantiene «luz» para אוֹר sin expandir a metáforas no presentes.
  - La secuencia «no día ni noche» preserva la paradoja hebrea mejor que una formulación explicativa.
  - Las notas mantienen las alternativas léxicas relevantes sin duplicar marcadores.
