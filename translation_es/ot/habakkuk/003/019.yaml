    Para el director del coro: con mis instrumentos de cuerda[d].'
  rationale: 'Se revisa para ajustar dos puntos centrales al hebreo y al audit trail: se restaura el valor posesivo de אֲדֹנָי con «mi Señor» en vez de «Dios», y se fortalece יַדְרִכֵנִי con «me hace andar» en lugar de «me hace caminar». También se afinan las notas para reflejar con más precisión las alternativas documentadas.'
