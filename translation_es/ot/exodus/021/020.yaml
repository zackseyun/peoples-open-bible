translation:
  language: es
  text: Y si un hombre golpea a su esclavo o a su esclava con una vara[a], y el esclavo muere bajo su mano, deberá ser vengado sin falta[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «con un bastón». El hebreo usa un término amplio para una vara o bastón usado para golpear.
    reason: lexical_alternative
  - marker: b
    text: 'O, «deberá ser castigado sin falta». El hebreo dice más literalmente: «deberá ser vengado sin falta», una fórmula legal enfática.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כִֽי
  english_pob_choice: And if
  chosen_spanish: Y si
  alternatives_spanish:
  - Si
  - Ahora bien, si
  lexicon: HALOT
  rationale: La fórmula casuística hebrea introduce una ley condicional. En español, «Y si» conserva la conexión con la cláusula anterior y su valor legal, sin sonar forzado.
- source_word: יַכֶּה
  english_pob_choice: strikes
  chosen_spanish: golpea
  alternatives_spanish:
  - hiere
  - pega
  lexicon: HALOT
  rationale: נכה es un verbo amplio de golpear o herir. «Golpea» comunica el acto de manera natural en español y no especifica más de lo que el hebreo exige.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - alguien
  lexicon: HALOT
  rationale: El sustantivo masculino singular se conserva de forma directa. En este tipo de fórmula legal, «un hombre» refleja bien el sujeto genérico del caso.
- source_word: עַבְדּוֹ
  english_pob_choice: his male slave
  chosen_spanish: su esclavo
  alternatives_spanish:
  - su siervo
  - su esclavo varón
  lexicon: HALOT
  rationale: El contexto legal de עבד aquí señala condición de esclavitud/bondad, no solo servicio. En español, «esclavo» mantiene esa fuerza. No se añade «varón» en el texto principal porque el paralelo con «esclava» ya aclara la distinción de sexo.
- source_word: אֲמָתוֹ
  english_pob_choice: his female slave
  chosen_spanish: su esclava
  alternatives_spanish:
  - su criada
  - su sierva
  lexicon: HALOT
  rationale: אָמָה designa una esclava femenina. «Esclava» es claro, contemporáneo y mantiene el paralelismo con «esclavo».
- source_word: בַּשֵּׁבֶט
  english_pob_choice: with a rod
  chosen_spanish: con una vara
  alternatives_spanish:
  - con un palo
  - con una vara de disciplina
  lexicon: HALOT
  rationale: שֵׁבֶט puede ser vara, bastón o cetro según el contexto. Aquí es instrumento de golpeo; «vara» es idiomático y suficientemente preciso en español.
- source_word: וּמֵת
  english_pob_choice: and the slave dies
  chosen_spanish: y muere
  alternatives_spanish:
  - y fallece
  - y el esclavo muere
  lexicon: HALOT
  rationale: El hebreo enlaza la muerte como resultado de la agresión. Dado que el referente ya quedó claro antes, «y muere» mantiene fluidez sin perder precisión.
- source_word: תַּחַת יָדוֹ
  english_pob_choice: under his hand
  chosen_spanish: bajo su mano
  alternatives_spanish:
  - a manos de él
  - en su poder
  lexicon: HALOT
  rationale: 'La expresión conserva el modismo hebreo y su fuerza legal: la muerte ocurre bajo el control o el golpe inmediato del amo. «Bajo su mano» es transparente y bastante literal.'
- source_word: נָקֹם יִנָּקֵם
  english_pob_choice: he must surely be avenged
  chosen_spanish: será sin duda vengado
  alternatives_spanish:
  - seguramente será castigado
  - se tomará venganza
  lexicon: HALOT
  rationale: La construcción enfática expresa certeza de represalia/judicatura. «Será sin duda vengado» preserva el verbo de נקם sin convertirlo en un término más genérico como «castigado».
theological_decisions:
- issue: Sentido de la sanción legal en נָקֹם יִנָּקֵם
  english_pob_reading: Render the clause as 'he must surely be avenged' rather than specifying the exact penalty in the main text.
  chosen_spanish_reading: Traducir con «será sin duda vengado», manteniendo la formulación intensa y sin concretar el mecanismo judicial.
  alternative_spanish_readings:
  - será sin duda castigado
  - se hará venganza sobre él
  rationale: El hebreo afirma con énfasis que debe ocurrir una acción retributiva, pero no especifica aquí la forma exacta de la pena. «Vengado» conserva la relación léxica con נקם y deja abierta la determinación legal, como hace el texto fuente.
  doctrine_reference: Principios de transparencia léxica y prudencia interpretativa de la traducción POB
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente del audit trail: se mantiene el referente explícito después de la muerte («y muere») para evitar ambigüedad, y se conserva la formulación legal enfática de נקם sin especificar una pena más estrecha que la del hebreo.'
  spanish_consistency_notes:
  - Se mantiene «esclavo/esclava» para עבד/אָמָה conforme al criterio POB de conservar la fuerza de esclavitud cuando el contexto legal lo exige.
  - «Vengado» se usa en sentido jurídico enfático, no como venganza personal; por eso la nota ofrece «castigado» como alternativa interpretativa.
  - «Vara» se eligió para שֵׁבֶט por ser la opción más natural en español y compatible con el uso de instrumento de corrección/golpeo en este contexto.
