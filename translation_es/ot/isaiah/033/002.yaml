translation:
  language: es
  text: ¡Oh Yahvé, sé bondadoso con nosotros; te esperamos. Sé su brazo[a] cada mañana, también nuestra salvación en tiempo de angustia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nuestro brazo». El hebreo dice literalmente «su brazo»; algunos lo entienden como una referencia colectiva al pueblo que ora y lo vierten con «nuestro» para suavizar el sentido en el contexto de la oración comunitaria.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: ¡Oh Yahvé
  alternatives_spanish:
  - Oh Yahvé
  - Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino explícito como pide la pauta del proyecto. El vocativo español con «¡Oh» refleja la súplica directa y mantiene el matiz de oración del hebreo.
- source_word: חָנֵּנוּ
  english_pob_choice: be gracious to us
  chosen_spanish: sé bondadoso con nosotros
  alternatives_spanish:
  - sé gracioso con nosotros
  - muéstrate favorable con nosotros
  lexicon: HALOT
  rationale: El verbo חנן expresa conceder favor/gracia. En español, «sé bondadoso con nosotros» comunica esa petición de favor divino con dignidad y naturalidad, sin perder el tono de ruego.
- source_word: לְךָ קִוִּינוּ
  english_pob_choice: we wait for you
  chosen_spanish: en ti esperamos
  alternatives_spanish:
  - te esperamos
  - en ti hemos esperado
  lexicon: HALOT
  rationale: קוה incluye esperar con confianza. «En ti esperamos» conserva la dependencia esperanzada y suena natural en español litúrgico moderno; evita reducir el sentido a mera demora cronológica.
- source_word: הֱיֵה
  english_pob_choice: Be
  chosen_spanish: Sé
  alternatives_spanish:
  - Llega a ser
  - Vuelve a ser
  lexicon: HALOT
  rationale: La forma imperativa pide que Yahvé sea para ellos algo concreto. «Sé» reproduce de forma breve y fiel ese mandato peticional.
- source_word: זְרֹעָם
  english_pob_choice: their arm
  chosen_spanish: nuestro brazo
  alternatives_spanish:
  - su brazo
  - el brazo de ellos
  lexicon: HALOT
  rationale: Aunque el sufijo hebreo es 3mp, el contexto de la súplica comunitaria permite la lectura colectiva que adopta la revisión inglesa más reciente. «Brazo» preserva la metáfora de poder/acción salvadora de forma literal.
- source_word: לַבְּקָרִים
  english_pob_choice: every morning
  chosen_spanish: cada mañana
  alternatives_spanish:
  - mañana tras mañana
  - en las mañanas
  lexicon: HALOT
  rationale: El plural con preposición expresa recurrencia. «Cada mañana» es una equivalencia natural que mantiene la repetición cotidiana del hebreo.
- source_word: אַף
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - además
  - incluso
  lexicon: HALOT
  rationale: La partícula añade una petición enlazada a la anterior. «También» comunica bien ese valor aditivo en español.
- source_word: יְשׁוּעָתֵנוּ
  english_pob_choice: our salvation
  chosen_spanish: nuestra salvación
  alternatives_spanish:
  - nuestra liberación
  - nuestro rescate
  lexicon: HALOT
  rationale: «Salvación» conserva el alcance teológico amplio de יְשׁוּעָה y coincide con el uso bíblico corriente en español.
- source_word: בְּעֵת צָרָה
  english_pob_choice: in the time of distress
  chosen_spanish: en tiempo de angustia
  alternatives_spanish:
  - en el tiempo de angustia
  - cuando hay angustia
  lexicon: HALOT
  rationale: צָרָה denota angustia, adversidad o aflicción. «En tiempo de angustia» mantiene el peso del sustantivo sin sonar forzado.
theological_decisions:
- issue: 'Pronombre de זְרֹעָם: lectura colectiva frente a sufijo 3mp'
  english_pob_reading: our arm
  chosen_spanish_reading: nuestro brazo
  alternative_spanish_readings:
  - su brazo
  - el brazo de ellos
  rationale: El texto consonántico permite la tensión entre la forma morfológica «su/ de ellos» y la interpretación comunitaria adoptada por la revisión inglesa. En español se sigue la lectura comunitaria por coherencia con la oración corporativa, pero se preserva la imagen literal «brazo» y se documenta la alternativa.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió «their arm» por «our arm» para reflejar la lectura colectiva del pronombre. Esta propuesta española sigue esa decisión revisada, pero anota la tensión textual porque el hebreo conserva un sufijo de tercera persona plural. La frase final mantiene «salvación» y «tiempo de angustia» de forma consistente con el audit trail.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino según el estándar del proyecto.
  - Se mantiene la metáfora corporal «brazo» en vez de interpretar como «poder» para no borrar el imagenismo hebreo.
  - «Salvación» se conserva por su amplitud semántica y su resonancia bíblica en español.
  - La nota al pie marca la alternativa textual del pronombre sin duplicar marcadores.
