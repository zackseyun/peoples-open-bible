    text: Or 'of the Judeans.' The Greek term can denote either Jews or Judeans depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'You say it' or 'Yes, it is as you say.' The Greek reply is concise and can be understood as a qualified affirmation.
    reason: alternative_reading
