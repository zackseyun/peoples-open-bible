base_translation:
  language: en
  yaml_path: translation/ot/genesis/004/015.yaml
  text: Then Yahweh said to him[a], “Therefore whoever kills Cain, vengeance will be taken on him sevenfold.” And Yahweh put a mark on Cain[b], lest anyone finding him should strike him.
  footnotes:
  - marker: a
    text: Or 'he will be avenged sevenfold.' The Hebrew passive is compact and can be rendered more literally, but the main text clarifies that the one who kills Cain will face divine vengeance.
    reason: lexical_alternative
  - marker: b
    text: Or 'sign.' The Hebrew word can refer broadly to a sign or distinguishing mark; the text does not specify what form it took.
    reason: lexical_alternative
