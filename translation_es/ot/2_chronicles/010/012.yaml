translation:
  language: es
  text: 'Entonces Jeroboam y todo el pueblo vinieron a Roboam al tercer día[a], tal como el rey había dicho, diciendo: «Vuelvan a mí al tercer día».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Regresen a mí al tercer día».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: vinieron
  alternatives_spanish:
  - fueron
  - llegaron
  lexicon: HALOT
  rationale: En español, con אֶל/‘a’ una forma plural como ‘vinieron’ conserva bien la dirección hacia Roboam y suena natural en narrativa. ‘Llegaron’ también es posible, pero ‘vinieron’ refleja mejor el punto de vista del narrador, como en la decisión inglesa ‘came’.
- source_word: יָרָבְעָם
  english_pob_choice: Jeroboam
  chosen_spanish: Jeroboam
  alternatives_spanish:
  - Yeroboam
  lexicon: convención onomástica
  rationale: Se mantiene la transliteración tradicional de nombre propio usada en español bíblico, sin cambiar el valor referencial del hebreo.
- source_word: וְכָל הָעָם
  english_pob_choice: and all the people
  chosen_spanish: y todo el pueblo
  alternatives_spanish:
  - y toda la gente
  - y toda la asamblea
  lexicon: HALOT
  rationale: ‘עָם’ aquí designa al conjunto de personas que acompañaban a Jeroboam; ‘todo el pueblo’ es la opción natural y suficientemente literal en español.
- source_word: אֶל רְחַבְעָם
  english_pob_choice: to Rehoboam
  chosen_spanish: a Roboam
  alternatives_spanish:
  - ante Roboam
  - hacia Roboam
  lexicon: HALOT
  rationale: ‘אֶל’ marca dirección hacia una persona; en español ‘a’ es la construcción más directa y fiel.
- source_word: בַּיּוֹם הַשְּׁלִישִׁי
  english_pob_choice: on the third day
  chosen_spanish: en el tercer día
  alternatives_spanish:
  - al tercer día
  - a los tres días
  lexicon: HALOT
  rationale: Se conserva la referencia temporal literal del hebreo. ‘En el tercer día’ es comprensible y mantiene la forma del texto fuente; la nota en el texto permite la alternativa de retorno/cita implícita.
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - como
  - así como
  lexicon: HALOT
  rationale: ‘Tal como’ expresa correspondencia precisa con lo dicho por el rey y funciona bien en español contemporáneo sin perder la relación de conformidad.
- source_word: דִּבֶּר הַמֶּלֶךְ
  english_pob_choice: the king had said
  chosen_spanish: el rey había dicho
  alternatives_spanish:
  - el rey había hablado
  - el rey había mandado
  lexicon: HALOT
  rationale: ‘דבר’ en este contexto es el verbo ordinario ‘decir/hablar’; ‘había dicho’ reproduce el valor de habla previa sin convertirlo en ‘mandó’, que sería más fuerte de lo que el hebreo exige.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - cuando dijo
  - y dijo
  lexicon: HALOT
  rationale: Se conserva el infinitivo explicativo hebreo con ‘diciendo’, que introduce la cita directa de manera transparente.
- source_word: שׁוּבוּ אֵלַי
  english_pob_choice: Return to me
  chosen_spanish: Vuelvan a mí
  alternatives_spanish:
  - Regresen a mí
  - Vuelvan donde mí
  lexicon: HALOT
  rationale: ‘שׁוב’ admite ‘volver/regresar’. En imperativo plural, ‘Vuelvan a mí’ suena natural y conserva la dirección personal del mandato. La nota recoge la alternativa ‘Come back to me’/'Regresen a mí'.
translation_notes:
  revision_awareness: Comparado con el cierre inglés auditado, el español mantiene la misma secuencia sintáctica y la misma relación de correspondencia (‘tal como’), sin añadir expansión interpretativa. Se eligió ‘vinieron’/‘a’ para reflejar el movimiento hacia Roboam y ‘Vuelvan a mí’ para preservar el imperativo de retorno con un español natural. La nota reproduce la alternativa de retorno ya documentada por la POB inglesa.
  spanish_consistency_notes:
  - Se conserva ‘Roboam’ como forma española usual del nombre propio.
  - No se introduce ‘SEÑOR’; el versículo no contiene el nombre divino.
  - ‘Vuelvan’ mantiene el imperativo plural del hebreo.
  - La puntuación de cita directa sigue la norma española con comillas bajas no usadas aquí por consistencia de estilo breve.
