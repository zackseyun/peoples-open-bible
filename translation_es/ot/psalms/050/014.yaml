translation:
  language: es
  text: Ofrece a Dios un sacrificio de acción de gracias[a], y cumple tus votos al Altísimo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un sacrificio de agradecimiento». El hebreo תּוֹדָה puede significar tanto «acción de gracias» como una «ofrenda de agradecimiento» en este contexto sacrificial.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זְבַח
  english_pob_choice: Offer
  chosen_spanish: Ofrece
  alternatives_spanish:
  - Presenta
  - Sacrifica
  lexicon: HALOT
  rationale: El verbo hebreo es un imperativo cultual. En español, "ofrece" comunica la acción ritual sin volverla un calco duro ni convertirla en un sustantivo. "Sacrifica" preserva el ámbito cultual pero suena más áspero y puede confundirse con el acto general de sacrificar, no con la orden concreta del versículo.
- source_word: לֵאלֹהִים
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - para Dios
  lexicon: HALOT
  rationale: La preposición ל marca destinatario del acto sacrificial. "A Dios" es la forma más natural en español para el ofrecimiento dirigido al receptor divino.
- source_word: תּוֹדָה
  english_pob_choice: a sacrifice of thanksgiving
  chosen_spanish: un sacrificio de acción de gracias
  alternatives_spanish:
  - acción de gracias
  - una ofrenda de agradecimiento
  - un sacrificio de agradecimiento
  lexicon: HALOT
  rationale: 'תּוֹדָה puede referirse tanto a la gratitud como a una ofrenda de gratitud en contexto sacrificial. "Sacrificio de acción de gracias" conserva ambos aspectos: el gesto litúrgico y el contenido de agradecimiento. Evita reducirlo solo a una emoción interior o solo a un tecnicismo ritual.'
- source_word: וְשַׁלֵּם
  english_pob_choice: and fulfill
  chosen_spanish: y cumple
  alternatives_spanish:
  - y paga
  - y completa
  lexicon: HALOT
  rationale: El verbo en este contexto se refiere a cumplir o satisfacer votos. "Cumple" transmite bien la obligación pactal y devocional; "paga" sería más literal pero en español suena demasiado comercial y puede oscurecer el sentido religioso.
- source_word: לְעֶלְיוֹן
  english_pob_choice: to the Most High
  chosen_spanish: al Altísimo
  alternatives_spanish:
  - al Más Alto
  - a Elyón
  lexicon: HALOT
  rationale: עֶלְיוֹן funciona como título divino. En español, "Altísimo" es el equivalente más natural y reverente; conserva el valor titular sin transliterar el apelativo.
- source_word: נְדָרֶיךָ
  english_pob_choice: your vows
  chosen_spanish: tus votos
  alternatives_spanish:
  - tus promesas
  - tus votos hechos
  lexicon: HALOT
  rationale: El sufijo de segunda persona singular hace del mandato una apelación directa. "Votos" es el término bíblico y eclesial más preciso para נדרים; "promesas" pierde el matiz de obligación voluntaria ante Dios.
theological_decisions:
- issue: Relación entre זבח y תודה en contexto sacrificial
  english_pob_reading: Render the phrase as 'a sacrifice of thanksgiving'
  chosen_spanish_reading: '"un sacrificio de acción de gracias"'
  alternative_spanish_readings:
  - '"acción de gracias"'
  - '"una ofrenda de agradecimiento"'
  rationale: 'El hebreo admite tanto la idea de agradecimiento como la de una ofrenda agradecida dentro del culto. La redacción española mantiene la tensión: no convierte la frase en mera emoción devocional ni en un nombre técnico demasiado estrecho.'
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Tratamiento del título divino עֶלְיוֹן
  english_pob_reading: Translate as 'the Most High'
  chosen_spanish_reading: '"el Altísimo"'
  alternative_spanish_readings:
  - '"el Más Alto"'
  - '"Elyón"'
  rationale: Como título de Dios, debe traducirse para comunicar el sentido en español. "Altísimo" preserva la dignidad y el valor teológico del título sin perder inteligibilidad.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: El texto base del inglés POB se mantuvo sin cambios sustanciales en la lectura revisada final; la decisión importante sigue siendo la misma tensión léxica de תּוֹדָה entre gratitud y ofrenda sacrificial. La versión española conserva esa ambigüedad controlada en "sacrificio de acción de gracias".
  spanish_consistency_notes:
  - Se mantiene "Dios" para אֱלֹהִים y no se introduce una convención de mayúsculas distinta.
  - Se traduce el título divino עֶלְיוֹן como "Altísimo", coherente con el patrón del proyecto para títulos divinos.
  - '"Votos" preserva el registro bíblico y evita una paráfrasis moralizante.'
  - 'El orden de la oración sigue el paralelismo del hebreo: ofrenda sacrificial / cumplimiento de votos.'
