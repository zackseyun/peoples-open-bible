    changes_summary: Replaced 'the greatness of his burning anger' with 'the fierceness of his great anger' for more natural and accurate rendering of the Hebrew while preserving the repeated 'anger burned' wording.
translation:
  language: es
  text: Sin embargo, Yahvé no se apartó del ardor de su gran ira[a], con la que su ira se encendió contra Judá[b], a causa de todas las provocaciones con que Manasés lo había provocado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del furor de su gran ira»; el hebreo dice literalmente el «ardor de su nariz/ira», un modismo para una ira intensa.
    reason: lexical_alternative
  - marker: b
    text: O «en Judá»; el hebreo usa una preposición que literalmente significa «en», aunque en español la ira normalmente se expresa «contra» alguien.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: Yet
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - Pero
  - No obstante
  - Con todo
  lexicon: HALOT
  rationale: Introduce un contraste fuerte y natural en español, manteniendo el valor concesivo/adversativo del hebreo sin volverlo más interpretativo de lo que permite el contexto.
- source_word: שָׁב
  english_pob_choice: did not turn
  chosen_spanish: no se apartó
  alternatives_spanish:
  - no volvió
  - no se volvió atrás
  - no desistió
  lexicon: HALOT
  rationale: El verbo hebreo expresa la idea de volver/retroceder. En español, «no se apartó» conserva la imagen de desviarse o retirarse de algo, y funciona bien con el complemento de origen expresado por מִן.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el nombre divino YHWH: «Yahvé», no una sustitución por «SEÑOR».'
- source_word: מֵחֲרוֹן אַפּוֹ הַגָּדוֹל
  english_pob_choice: the fierceness of his great anger
  chosen_spanish: el ardor de su gran ira
  alternatives_spanish:
  - la fiereza de su gran ira
  - el furor de su gran ira
  - el ardor de su ira grande
  lexicon: HALOT
  rationale: El hebreo usa la idiomática imagen de «ardor de la nariz/ira». En español, «ardor» conserva la metáfora del fuego/encendido y «gran ira» refleja el adjetivo הַגָּדוֹל de manera clara y natural.
- source_word: אֲשֶׁר חָרָה אַפּוֹ
  english_pob_choice: with which his anger burned
  chosen_spanish: con la que su ira se encendió
  alternatives_spanish:
  - con la cual su ira ardió
  - en la que su ira se encendió
  - que encendió su ira
  lexicon: HALOT
  rationale: Mantiene la repetición hebrea de la ira que «arde/se enciende», sin suavizarla a una abstracción como «desagrado». «Se encendió» reproduce bien el dinamismo verbal.
- source_word: בִּיהוּדָה
  english_pob_choice: against Judah
  chosen_spanish: contra Judá
  alternatives_spanish:
  - en Judá
  - hacia Judá
  lexicon: HALOT
  rationale: Aunque la preposición hebrea es literalmente «en», en español la combinación con ira se expresa de forma más natural y transparente con «contra», como señala el propio audit trail inglés.
- source_word: עַל כָּל הַכְּעָסִים
  english_pob_choice: because of all the provocations
  chosen_spanish: a causa de todas las provocaciones
  alternatives_spanish:
  - por todas las provocaciones
  - debido a todas las provocaciones
  - por todas las ofensas
  lexicon: HALOT
  rationale: «Provocaciones» capta el valor causativo del sustantivo en este contexto. «A causa de» expresa con precisión la relación causal del hebreo.
- source_word: הִכְעִיסוֹ
  english_pob_choice: had provoked him
  chosen_spanish: lo había provocado
  alternatives_spanish:
  - lo había irritado
  - lo había enojado
  - lo había enfurecido
  lexicon: HALOT
  rationale: 'El hifil de כעס es causativo: provocar a ira. «Lo había provocado» conserva esa fuerza sin añadir intensidad no requerida por el texto.'
- source_word: מְנַשֶּׁה
  english_pob_choice: Manasseh
  chosen_spanish: Manasés
  alternatives_spanish:
  - Manasés
  lexicon: HALOT
  rationale: Forma española asentada del nombre propio.
theological_decisions:
- issue: Lenguaje antropopático de la ira divina
  english_pob_reading: Retain the Hebrew imagery of burning anger rather than softening it to an abstract term like displeasure or over-systematizing as wrath.
  chosen_spanish_reading: 'Conservar la imagen hebrea de la ira ardiente: «ardor», «ira», «se encendió».'
  alternative_spanish_readings:
  - no se apartó de su furor
  - no desistió de su enojo
  - no se calmó de su ira
  rationale: El texto no explica ni atenúa la imagen corporal de la ira. La traducción mantiene la metáfora de manera inteligible en español, sin sustituirla por un término más teológico pero menos fiel al hebreo.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Relación causal entre la provocación de Manasés y la ira sobre Judá
  english_pob_reading: because of all the provocations with which Manasseh had provoked him
  chosen_spanish_reading: a causa de todas las provocaciones con que Manasés lo había provocado
  alternative_spanish_readings:
  - por todas las provocaciones con que Manasés lo había irritado
  - a causa de todos los agravios de Manasés
  rationale: Se conserva la causalidad explícita y la repetición del verbo/nombre de la misma raíz, importante para el efecto retórico del hebreo.
  doctrine_reference: 2 Kings 23:26; lexical audit trail
- issue: Divine name rendering
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: Se sigue la convención del proyecto para יְהוָה/YHWH, sin ocultar el nombre divino mediante una sustitución reverencial.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: La redacción sigue de cerca el último pase de revisión del audit trail inglés, que prefirió una formulación más natural para מֵחֲרוֹן אַפּוֹ manteniendo el paralelismo con חָרָה אַפּוֹ. También conserva la lectura relacional de בִּיהוּדָה como «contra Judá» por idiomaticidad española, sin borrar la nota textual del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para YHWH conforme al estándar del proyecto.
  - Se usa «Manasés» para el nombre propio y «Judá» para el reino, con ortografía española estándar.
  - Se preserva la repetición de «ira»/«se encendió» para reflejar el paralelismo hebreo.
  - La estructura de causa («a causa de») reproduce el valor de עַל en este contexto sin convertirlo en una explicación interpretativa más amplia.
