translation:
  language: es
  text: Porque la Sabiduría, la artesana de todas las cosas, me enseñó. Porque en ella hay un espíritu inteligente, santo, único[a], múltiple, sutil, ágil, claro, incontaminado, distinto[b], inofensivo, amante del bien, agudo, sin estorbo, benéfico.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'unigénito' / 'de una sola clase' para μονογενές. Aquí el contexto favorece el sentido de 'único', no un sentido filial.
    reason: lexical_alternative
  - marker: b
    text: '''Inofensivo'' también puede entenderse como ''sin daño'' o ''no dañado''; el griego puede abarcar ambas posibilidades.'
    reason: lexical_alternative
lexical_decisions:
- source_word: σοφία
  english_pob_choice: wisdom
  chosen_spanish: Sabiduría
  alternatives_spanish:
  - sabiduría
  lexicon: uso contextual en español bíblico
  rationale: Se mantiene el sustantivo personificado con mayúscula para reflejar la personificación del contexto y el género femenino del griego, sin añadir un título doctrinal ajeno al pasaje.
- source_word: τεχνῖτις
  english_pob_choice: artisan
  chosen_spanish: artífice
  alternatives_spanish:
  - artesana
  - artesano
  - artífice
  lexicon: LSJ
  rationale: El término griego denota a una persona experta que produce o da forma. 'Artífice' es natural en español culto, conserva la idea de agente hábil y evita la calca de género, aunque el contexto personifica a Sabiduría en femenino.
- source_word: ἐδίδαξέν
  english_pob_choice: taught
  chosen_spanish: instruyó
  alternatives_spanish:
  - enseñó
  - instruyó
  lexicon: LSJ
  rationale: '''Instruyó'' mantiene el sentido de transmisión directa de conocimiento y funciona bien con el objeto explícito ''me''.'
- source_word: πνεῦμα
  english_pob_choice: spirit
  chosen_spanish: espíritu
  alternatives_spanish:
  - aliento
  - viento
  - espíritu
  lexicon: LSJ
  rationale: Aquí el término describe una realidad interna y cualitativa asociada con la Sabiduría, no viento ni aliento físico.
- source_word: νοερόν
  english_pob_choice: intelligent
  chosen_spanish: inteligente
  alternatives_spanish:
  - racional
  - entendiente
  - perceptivo
  lexicon: LSJ
  rationale: '''Inteligente'' comunica de manera clara y digna la capacidad de entender, sin cargar el texto con tecnicismos filosóficos.'
- source_word: ἅγιον
  english_pob_choice: holy
  chosen_spanish: santo
  alternatives_spanish:
  - santo
  - consagrado
  lexicon: uso bíblico consolidado
  rationale: '''Santo'' es el equivalente más directo y estable para una cualidad moral y cultual positiva.'
- source_word: μονογενές
  english_pob_choice: unique
  chosen_spanish: único
  alternatives_spanish:
  - único
  - de una sola clase
  - unigénito
  lexicon: LSJ
  rationale: En este contexto sapiencial no hay relación filial; por eso se prefiere 'único'. Se evita importar el valor teológico de 'unigénito' a un pasaje donde el griego apunta a singularidad o irrepetibilidad.
- source_word: πολυμερές
  english_pob_choice: manifold
  chosen_spanish: múltiple
  alternatives_spanish:
  - múltiple
  - multiforme
  - variado
  lexicon: LSJ
  rationale: El adjetivo indica muchos aspectos o partes. 'Múltiple' es claro en español y conserva la amplitud semántica.
- source_word: λεπτόν
  english_pob_choice: subtle
  chosen_spanish: sutil
  alternatives_spanish:
  - sutil
  - delicado
  - fino
  lexicon: LSJ
  rationale: '''Sutil'' reproduce la idea de finura penetrante y mantiene un registro elevado.'
- source_word: εὐκίνητον
  english_pob_choice: agile
  chosen_spanish: ágil
  alternatives_spanish:
  - ágil
  - móvil
  - de fácil movimiento
  lexicon: LSJ
  rationale: El adjetivo griego expresa facilidad de movimiento. 'Ágil' es idiomático y preciso.
- source_word: τρανόν
  english_pob_choice: clear
  chosen_spanish: claro
  alternatives_spanish:
  - claro
  - evidente
  - nítido
  lexicon: LSJ
  rationale: '''Claro'' es la opción más natural en español para la idea de transparencia o claridad perceptible.'
- source_word: ἀμόλυντον
  english_pob_choice: undefiled
  chosen_spanish: incontaminado
  alternatives_spanish:
  - incontaminado
  - sin mancha
  - puro
  lexicon: LSJ
  rationale: '''Incontaminado'' preserva la idea de ausencia de corrupción o mezcla impura, con un matiz moral y cultual compatible con el griego.'
- source_word: σαφές
  english_pob_choice: distinct
  chosen_spanish: distinto
  alternatives_spanish:
  - distinto
  - manifiesto
  - claro
  lexicon: LSJ
  rationale: Como 'claro' ya traduce τρανόν, 'distinto' evita repetir exactamente la misma idea y respeta la acumulación de cualidades del original.
- source_word: ἀπήμαντον
  english_pob_choice: harmless
  chosen_spanish: inofensivo
  alternatives_spanish:
  - inofensivo
  - sin daño
  - no dañino
  lexicon: LSJ
  rationale: El griego puede referirse a no causar daño o a no estar dañado. 'Inofensivo' conserva bien el matiz activo de no producir mal.
- source_word: φιλάγαθον
  english_pob_choice: loving-the-good
  chosen_spanish: amigo del bien
  alternatives_spanish:
  - amigo del bien
  - amante del bien
  - amante de lo bueno
  lexicon: LSJ
  rationale: La forma compuesta expresa afinidad o amor por lo bueno. 'Amigo del bien' suena natural en español bíblico y mantiene el sentido relacional y moral.
- source_word: ὀξύ
  english_pob_choice: keen
  chosen_spanish: agudo
  alternatives_spanish:
  - agudo
  - penetrante
  - vivo
  lexicon: LSJ
  rationale: '''Agudo'' expresa la idea de vivacidad o penetración intelectual en una lista de cualidades abstractas.'
- source_word: ἀκώλυτον
  english_pob_choice: unhindered
  chosen_spanish: sin impedimento
  alternatives_spanish:
  - sin impedimento
  - sin estorbo
  - sin obstáculos
  lexicon: LSJ
  rationale: La raíz apunta a algo no obstaculizado. 'Sin impedimento' comunica esa idea de forma precisa y solemne.
- source_word: εὐεργετικόν
  english_pob_choice: beneficent
  chosen_spanish: benefactor
  alternatives_spanish:
  - benefactor
  - benéfico
  - hacedor de bien
  lexicon: LSJ
  rationale: El adjetivo describe una disposición activa a hacer el bien. 'Benefactor' conserva ese impulso activo en un español digno, aunque con un matiz más personal que adjetival.
theological_decisions:
- issue: μονογενές dentro de una descripción sapiencial personificada
  english_pob_reading: unique
  chosen_spanish_reading: único
  alternative_spanish_readings:
  - unigénito
  - de una sola clase
  rationale: En este versículo el término califica al 'espíritu' asociado con la Sabiduría personificada, sin contexto filial. 'Único' conserva la singularidad sin trasladar al pasaje una lectura cristológica ajena al flujo del texto.
  doctrine_reference: 'DOCTRINE.md: primacía del sentido original; preservar tensiones léxicas sin resolverlas de antemano'
- issue: ἀπήμαντον como cualidad de la Sabiduría
  english_pob_reading: harmless
  chosen_spanish_reading: inofensivo
  alternative_spanish_readings:
  - sin daño
  - no dañino
  - intacto
  rationale: El griego puede significar tanto 'no dañado' como 'no dañino'. En una lista de cualidades, 'inofensivo' preserva mejor el valor activo y evita decidir prematuramente entre pasivo y activo.
  doctrine_reference: 'DOCTRINE.md: no borrar ambigüedades documentadas'
translation_notes:
  revision_awareness: El texto español sigue la revisión más reciente del audit trail, que prioriza un registro formal-natural y conserva toda la serie de atributos sin simplificarlos. Donde el inglés osciló entre 'craftswoman' y 'artisan', se optó por 'artífice' para un español culto y estable. Donde el audit trail distinguió entre 'unharmed' y 'harmless', se eligió una solución que mantenga la ambigüedad semántica del griego sin perder naturalidad.
  spanish_consistency_notes:
  - Se mantiene 'Sabiduría' con mayúscula por la personificación del pasaje.
  - Se usa 'espíritu' en minúscula porque describe una cualidad/realidad interna, no una designación explícita del Espíritu Santo.
  - Se evita 'Cristo' y 'unigénito' en el cuerpo principal para no importar resonancias ajenas al contexto sapiencial.
  - Se procura un paralelismo de adjetivos breve y legible, reflejando la cadena acumulativa del griego.
