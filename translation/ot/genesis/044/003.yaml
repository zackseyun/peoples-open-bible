id: GEN.44.3
reference: Genesis 44:3
source:
  edition: WLC
  text: הַ/בֹּ֖קֶר א֑וֹר וְ/הָ/אֲנָשִׁ֣ים שֻׁלְּח֔וּ הֵ֖מָּה וַ/חֲמֹרֵי/הֶֽם׃
translation:
  text: As soon as the morning was light[a], the men were sent away, they and their donkeys.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'As morning dawned' or 'When it was light in the morning.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַבֹּקֶר
  chosen: morning
  alternatives:
  - the morning
  - daybreak
  lexicon: HALOT
  rationale: Definite noun referring to the time of day. In English, 'morning' is natural and sufficient in this temporal clause; 'the morning' is possible but less idiomatic here.
- source_word: אוֹר
  lemma: אור
  chosen: became light
  alternatives:
  - was light
  - grew light
  - dawned
  lexicon: HALOT
  rationale: Verb from אור in the sense of becoming light/daylight appearing. 'Became light' preserves the verbal force more transparently than the more interpretive 'dawned,' while remaining readable.
- source_word: וְהָאֲנָשִׁים
  chosen: the men
  alternatives:
  - and the men
  lexicon: HALOT
  rationale: Definite plural of אִישׁ. 'The men' is the straightforward rendering. The prefixed conjunction is not separately represented because English style naturally links the clause without needing an explicit initial 'and' after the temporal opening.
- source_word: שֻׁלְּחוּ
  chosen: were sent away
  alternatives:
  - were sent off
  - were dismissed
  lexicon: HALOT
  rationale: Pual perfect/passive of שלח. 'Were sent away' captures the passive sense and the narrative context of departure better than the weaker 'were sent.'
- source_word: הֵמָּה
  chosen: they
  alternatives:
  - they themselves
  lexicon: HALOT
  rationale: Independent pronoun used appositionally/emphatically with the following phrase. English can render this simply as 'they' in the construction 'they and their donkeys,' preserving the grouping without overemphasis.
- source_word: וַחֲמֹרֵיהֶם
  chosen: and their donkeys
  alternatives:
  - with their donkeys
  lexicon: HALOT
  rationale: Plural construct with 3mp suffix. 'And their donkeys' reflects the Hebrew coordination directly. 'With their donkeys' is smoother in English but adds a preposition not present in the text.
