translation:
  language: es
  text: ¿Todavía sigues exaltándote[a] contra mi pueblo por no dejarlos ir?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «actuando con orgullo sobre mi pueblo» o «levantándote contra mi pueblo».
    reason: lexical_alternative
lexical_decisions:
- source_word: עוֹדְךָ
  english_pob_choice: Are you still
  chosen_spanish: ¿Todavía te... ?
  alternatives_spanish:
  - ¿Aún te... ?
  - ¿Sigues... ?
  lexicon: HALOT
  rationale: El hebreo introduce una continuidad dirigida a Faraón; en español, «todavía» conserva esa idea de permanencia y mantiene el tono interrogativo retórico del contexto.
- source_word: מִסְתּוֹלֵל
  english_pob_choice: exalting yourself
  chosen_spanish: te ensalzas
  alternatives_spanish:
  - te exaltas
  - te enorgulleces
  - te levantas a ti mismo
  lexicon: HALOT
  rationale: El participio hitpolel de סלל expresa autoexaltación o autoafirmación arrogante. «Te ensalzas» comunica esa elevación de sí mismo con un matiz de orgullo, sin volver la frase pesada en español.
- source_word: בְּעַמִּי
  english_pob_choice: against my people
  chosen_spanish: contra mi pueblo
  alternatives_spanish:
  - sobre mi pueblo
  - frente a mi pueblo
  - en contra de mi pueblo
  lexicon: HALOT
  rationale: La preposición ב aquí funciona en sentido adversativo/superior según el contexto. «Contra mi pueblo» comunica bien la hostilidad y conserva el valor posesivo de «mi pueblo».
- source_word: לְבִלְתִּי
  english_pob_choice: by not
  chosen_spanish: por no
  alternatives_spanish:
  - al no
  - sin
  - para no
  lexicon: HALOT
  rationale: La construcción introduce la manera en que se manifiesta la autoexaltación de Faraón. «Por no» suena natural en español y preserva la relación causal/explicativa.
- source_word: שַׁלְּחָם
  english_pob_choice: letting them go
  chosen_spanish: dejarlos ir
  alternatives_spanish:
  - soltarlos
  - enviarlos lejos
  - liberarlos
  lexicon: HALOT
  rationale: En el relato del Éxodo, שׁלח en piel es la fórmula estable para permitir la salida de Israel de la esclavitud. «Dejarlos ir» mantiene el sentido idiomático reconocido en el contexto.
theological_decisions:
- issue: «mi pueblo» como afirmación de pertenencia divina
  english_pob_reading: Retain 'my people' as Yahweh's direct claim over Israel
  chosen_spanish_reading: Retener «mi pueblo» como reclamo directo de Yahvé sobre Israel
  alternative_spanish_readings:
  - el pueblo
  - Israel
  rationale: 'El sufijo posesivo de primera persona es teológicamente relevante: Yahvé no habla de Israel de manera genérica, sino como su pueblo. En español debe conservarse sin neutralizarlo.'
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia con el borrador inglés; no se registraron revisiones aplicadas y no se requiere ajuste textual adicional. La decisión principal en español es conservar la fuerza retórica y la ambigüedad controlada del verbo participial, sin suavizarla a una oposición meramente neutral.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en el marco del proyecto, aunque este versículo no lo explicite léxicamente.
  - Se conserva «mi pueblo» para reflejar el sufijo posesivo hebreo y su carga teológica.
  - La pregunta retórica se traduce con puntuación interrogativa de apertura y cierre conforme al español.
