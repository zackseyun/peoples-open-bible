    issue: Falta una nota para «la nación»
    rationale: 'La POB inglesa conserva una alternativa léxica importante: «with the soldiers of his people». El español debe preservar esa alternativa documental, especialmente porque «de la nación» puede sonar menos idiomático en español sin aclaración contextual.'
  - severity: low
    issue: «Porque» no refleja tan bien la fuerza temporal de ἐπεὶ γὰρ
    rationale: Aunque no es incorrecto, «Porque» deja la temporalidad en una construcción más indirecta. «Pues cuando» representa mejor la combinación explicativa y temporal del griego y mejora el flujo del español.
