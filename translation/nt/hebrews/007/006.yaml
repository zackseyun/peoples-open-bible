theological_decisions:
- issue: Rendering the genealogical contrast in relation to the Levitical priesthood
  chosen_reading: The verse contrasts Melchizedek as one not genealogically derived from the Levitical line with Abraham, without making speculative claims about Melchizedek's ontology or origin.
  alternative_readings:
  - The phrase could be taken more loosely as 'not descended from them'.
  rationale: Hebrews' argument in context is about priestly legitimacy apart from Levitical genealogy. The translation therefore preserves the genealogical/legal emphasis and avoids overreading the phrase into a metaphysical statement about Melchizedek.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it
