review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido global del hebreo: una ofrenda presentada a Yahvé, aportada distributivamente por cada hombre, con una lista de objetos de oro y propósito expiatorio ''delante de Yahvé''. También mantiene correctamente ''Yahvé'' y no aplana לְכַפֵּר. Sin embargo, dos puntos requieren ajuste para alinearse mejor con la evidencia y el rastro POB: (1) ''hemos traído cerca'' suena calcado e innecesariamente rígido en español para וַנַּקְרֵב en contexto cultual; ''hemos presentado'' conserva el sentido de acercar/ofrecer con mejor naturalidad. (2) El inglés POB conservó alternativas léxicas en notas para אֶצְעָדָה, כוּמָז y la literalidad de עַל נַפְשֹׁתֵינוּ; el español debe preservarlas también, especialmente porque ''pendientes'' y ''colgantes'' puede generar cierta cercanía semántica en español.'
  spanish_quality_summary: 'El español es claro y digno, pero ''Así hemos traído cerca la ofrenda de Yahvé'' suena poco idiomático en registro bíblico natural. El resto de la frase fluye bien: ''cada hombre lo que encontró'', la lista de joyas, y ''delante de Yahvé''. ''Pendientes'' para עָגִיל y ''colgantes'' para כוּמָז son legibles, aunque conviene una nota por la incertidumbre del segundo término y otra para la alternativa ''tobilleras'' de אֶצְעָדָה. También es útil anotar la literalidad de ''por nosotros mismos'' como ''por nuestras vidas/personas''.'
  glossary_alignment: 'Alineación buena con el glosario del proyecto: יְהוָה -> ''Yahvé'' correctamente; לְכַפֵּר mantiene lenguaje cultual con ''hacer expiación''; אִישׁ se conserva como ''cada hombre''. No hay conflicto con terminología doctrinal. El único ajuste léxico importante es preferir un verbo español más natural para וַנַּקְרֵב en este contexto.'
  issues:
  - severity: medium
    issue: '''Así hemos traído cerca'' es un calco poco natural para וַנַּקְרֵב'
    rationale: Aunque 'bring near' es defendible en inglés por filosofía de traducción, en español 'traer cerca' no funciona bien con 'ofrenda'. 'Hemos presentado' o 'hemos acercado' transmite el sentido cultual con mejor legibilidad sin perder significado.
  - severity: medium
    issue: Faltan notas que preserven alternativas léxicas y literalidad ya documentadas en el POB inglés
    rationale: El expediente inglés incluye notas sobre אֶצְעָדָה ('tobilleras' posible), כוּמָז (significado incierto), y עַל נַפְשֹׁתֵינוּ ('nuestras vidas/personas'). El español debe conservar estas alternativas relevantes, especialmente donde el término es incierto o el español puede ocultar la literalidad.
  - severity: low
    issue: Posible cercanía semántica entre 'pendientes' y 'colgantes' en la misma lista
    rationale: No es un error, pero en español ambos pueden sonar similares. La nota sobre כוּמָז resuelve la posible ambigüedad al aclarar que la identificación exacta del objeto es incierta.
