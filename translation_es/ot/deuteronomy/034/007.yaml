translation:
  language: es
  text: Moisés tenía ciento veinte años cuando murió; su vista[a] no se había debilitado, ni su vigor[b] había menguado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «su ojo no se había nublado». El hebreo dice literalmente: «su ojo no se había debilitado» o «no se había oscurecido».'
    reason: lexical_alternative
  - marker: b
    text: O «su vitalidad no había disminuido» o «su fuerza natural no se había agotado». El hebreo idiomático dice literalmente que su vigor o frescura corporal «no había huido».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמֹשֶׁה
  english_pob_choice: Now Moses
  chosen_spanish: Ahora Moisés
  alternatives_spanish:
  - Y Moisés
  - Moisés
  lexicon: HALOT
  rationale: La conjunción inicial continúa el relato; «Ahora» da fluidez natural en español sin perder el valor conectivo. Mantiene el tono narrativo de apertura que el inglés resolvió con «Now».
- source_word: בֶּן־מֵאָה וְעֶשְׂרִים שָׁנָה
  english_pob_choice: was one hundred twenty years old
  chosen_spanish: tenía ciento veinte años
  alternatives_spanish:
  - era hijo de ciento veinte años
  - tenía 120 años
  lexicon: HALOT
  rationale: La construcción hebrea «hijo de X años» es un modismo de edad; en español, «tenía ciento veinte años» comunica con precisión y naturalidad el mismo sentido.
- source_word: בְּמֹתוֹ
  english_pob_choice: when he died
  chosen_spanish: cuando murió
  alternatives_spanish:
  - al morir
  - en su muerte
  lexicon: HALOT
  rationale: La preposición con el sustantivo de muerte expresa tiempo; «cuando murió» reproduce esa función temporal de forma idiomática.
- source_word: לֹא כָהֲתָה עֵינֹו
  english_pob_choice: his eye had not grown dim
  chosen_spanish: su ojo no se había apagado
  alternatives_spanish:
  - su ojo no se había nublado
  - no se le había debilitado la vista
  lexicon: HALOT
  rationale: Se conserva la imagen singular del hebreo («su ojo»). «Apagado» mantiene la idea de disminución o debilitamiento de la visión, con un matiz metafórico cercano a «grow dim».
- source_word: וְלֹא נָס לֵחֹה
  english_pob_choice: and his vigor had not fled
  chosen_spanish: ni se había agotado su vigor
  alternatives_spanish:
  - ni había huido su vigor
  - ni se había disminuido su vigor
  - y no se había apartado su vigor
  lexicon: HALOT
  rationale: El hebreo usa un giro idiomático sobre frescura/vigor corporal y la idea de huir. En español, «se había agotado su vigor» transmite con claridad que su fuerza natural no se había consumido, sin perder el sentido físico del texto.
theological_decisions:
- issue: Describir la condición física final de Moisés sin suavizar el contraste con su edad
  english_pob_reading: his eye had not grown dim, and his vigor had not fled
  chosen_spanish_reading: su ojo no se había apagado, ni se había agotado su vigor
  alternative_spanish_readings:
  - su vista no había fallado, y su fuerza no se había debilitado
  - sus ojos no se habían oscurecido, y su vitalidad no había abdicado
  rationale: El versículo subraya que, aun a los ciento veinte años, Moisés conservaba claridad visual y vigor corporal. La redacción española mantiene esa tensión sin convertirla en una paráfrasis generalizada de «buena salud».
  doctrine_reference: Observación narrativa sobre la fortaleza física final de Moisés; sin implicación doctrinal explícita
translation_notes:
  revision_awareness: 'Coincide con el pasaje base y con el audit trail inglés: se preserva el valor idiomático de la edad, la temporalidad de la muerte, y las dos imágenes corporales del hebreo sin introducir ampliaciones interpretativas. No hay revisiones aplicadas en el contexto provisto.'
  spanish_consistency_notes:
  - Se mantiene «Moisés» y no «Moshé», conforme al estándar bíblico español del proyecto.
  - Se conserva el singular «su ojo» porque el hebreo es singular y el inglés auditado también lo retiene por fuerza idiomática.
  - «Vigor» traduce de manera estable el campo semántico de לֵחֹה y evita neutralizar la imagen física del texto.
  - Se usa puntuación y acentuación estándar del español; la coma antes de «ni» refleja el paralelismo del hebreo.
