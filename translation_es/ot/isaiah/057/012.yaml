revisions:
- from: Yo mismo declararé tu justicia[a] y tus obras, pero no te aprovecharán[b].
  to: Yo mismo declararé tu rectitud[a] y tus obras, pero no te beneficiarán[b].
  rationale: Se cambia «tu justicia» por «tu rectitud» para seguir más de cerca la decisión principal del POB inglés para צדקה («righteousness») y evitar un matiz demasiado forense en español. Se ajusta «no te aprovecharán» a «no te beneficiarán» por mayor naturalidad panhispánica y mejor correspondencia con el sentido de «profit/benefit», manteniendo «ayudarán» como alternativa documentada.
