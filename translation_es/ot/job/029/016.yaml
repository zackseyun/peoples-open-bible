translation:
  language: es
  text: Yo era un padre para los pobres[a], y investigaba el caso del que no conocía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «indagaba la disputa de alguien que no conocía».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָב
  english_pob_choice: father
  chosen_spanish: padre
  alternatives_spanish:
  - protector
  - patrono
  lexicon: HALOT
  rationale: אָב significa literalmente “padre”. Aquí la imagen es metafórica y expresa cuidado protector y defensa de los necesitados. “Padre” conserva mejor la fuerza de la metáfora que una paráfrasis más interpretativa.
- source_word: אָנֹכִי
  english_pob_choice: I was
  chosen_spanish: Yo era
  alternatives_spanish:
  - era yo
  - yo soy
  lexicon: HALOT
  rationale: 'El pronombre independiente añade énfasis: “yo mismo”. En español conviene mantenerlo explícito con “Yo”, y el marco retrospectivo de Job 29 hace natural el imperfecto “era”.'
- source_word: לָאֶבְיוֹנִים
  english_pob_choice: to the poor
  chosen_spanish: para los pobres
  alternatives_spanish:
  - a los pobres
  - para los necesitados
  lexicon: HALOT
  rationale: אֶבְיוֹן designa a los pobres o necesitados. Con “padre” en español, la relación se expresa con naturalidad mediante “para”, que comunica dirección/beneﬁcio sin forzar una construcción menos idiomática.
- source_word: וְרִיב
  english_pob_choice: and ... the case
  chosen_spanish: el caso
  alternatives_spanish:
  - la disputa
  - la causa
  - la reclamación jurídica
  lexicon: HALOT
  rationale: רִיב puede significar disputa, pleito o caso legal. En este contexto de defensa e investigación, “caso” transmite bien el sentido judicial/social en español actual, sin perder la amplitud del término.
- source_word: לֹא יָדַעְתִּי
  english_pob_choice: I did not know
  chosen_spanish: no conocía
  alternatives_spanish:
  - no sabía
  - no había conocido
  lexicon: HALOT
  rationale: יָדַע aquí se refiere al conocimiento personal o previo de la persona implicada. “No conocía” suena natural en español y conserva la idea de que Job examinaba asuntos aun de personas desconocidas para él.
- source_word: אֶחְקְרֵהוּ
  english_pob_choice: I investigated
  chosen_spanish: examinaba
  alternatives_spanish:
  - investigaba
  - inquiría
  - averiguaba
  lexicon: HALOT
  rationale: חקר significa buscar, investigar o examinar a fondo. “Examinaba” comunica una indagación deliberada en español claro. La referencia del sufijo masculino singular queda implícita en “el caso de uno” como en la solución inglesa auditada.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo y coincide con la lectura auditada en inglés. Se mantiene la metáfora de “padre” y el matiz judicial de רִיב, con una opción española natural para la acción de חקר.
  spanish_consistency_notes:
  - Se mantiene “Yahvé” según la política del proyecto solo cuando el nombre divino aparece; este versículo no lo contiene.
  - Se conserva “pobres” para אֶבְיוֹנִים, coherente con el campo semántico de vulnerabilidad socioeconómica.
  - “Caso” se usa como término judicial amplio y no como mera circunstancia personal.
  - La nota al pie preserva la alternativa lexical documentada para רִיב/חקר sin duplicar el contenido principal.
