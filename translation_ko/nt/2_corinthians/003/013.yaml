id: 2CO.3.13
reference: 2 Corinthians 3:13
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ οὐ καθάπερ Μωϋσῆς ἐτίθει κάλυμμα ἐπὶ τὸ πρόσωπον ⸀αὐτοῦ, πρὸς τὸ μὴ ἀτενίσαι τοὺς υἱοὺς Ἰσραὴλ εἰς τὸ τέλος τοῦ καταργουμένου.
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/003/013.yaml
  text: and not like Moses, who used to put a veil over his face so that the sons of Israel would not gaze at the end of what was fading away.
  footnotes:
  - marker: a
    text: Or 'at the goal/outcome of what was being brought to an end.'
    reason: alternative_reading
  - marker: b
    text: Greek 'sons of Israel'; idiomatically, 'Israelites.'
    reason: lexical_alternative
translation:
  language: ko
  text: 우리는 모세와 같지 않습니다. 모세는 사라져 가던 것의 끝을 이스라엘 자손이 똑바로 바라보지 못하게 하려고 자기 얼굴에 베일을 덮었습니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: κάλυμμα
  english_pob_choice: veil
  chosen_korean: 베일
  alternatives_korean:
  - 수건
  - 면포
  lexicon: BDAG
  rationale: 얼굴을 가리는 천. 한국어 「베일」로 옮긴다. 「수건」도 정립 번역어이나 본 맥락의 의례적 가림막의 의미를 더 잘 담는 「베일」을 채택.
- source_word: Μωϋσῆς
  english_pob_choice: Moses
  chosen_korean: 모세
  alternatives_korean: []
  lexicon: BDAG
  rationale: 한국 성경 정립 표기.
