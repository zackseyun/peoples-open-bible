base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/010/010.yaml
  text: And the rest of the people he put under the command of Abishai his brother[c][b][a], and he drew them up to meet the sons of Ammon.
  footnotes:
  - marker: a
    text: 'Or ''the Ammonites.'' Hebrew: ''the sons of Ammon.'''
    reason: lexical_alternative
  - marker: b
    text: Literally 'gave into the hand of Abishai,' an idiom for entrusting troops to his authority.
    reason: lexical_alternative
  - marker: c
    text: Or 'he arranged them' / 'he set the battle line.' The Hebrew verb refers to drawing up troops in battle formation.
    reason: lexical_alternative
