    issue: «que guardan el encargo del templo» es una formulación poco natural en español
    rationale: Aunque intenta reflejar el cognado hebreo, en español eclesial y general suena forzada. El hebreo expresa a los sacerdotes encargados de la responsabilidad del templo; una formulación como «que tienen a su cargo el templo» conserva mejor el sentido funcional y mejora la legibilidad.
  revised_spanish_text: 'Entonces me habló: «Esta cámara, cuya parte delantera da hacia el sur, es para los sacerdotes que tienen a su cargo el templo[a]».'
  revised_footnotes:
