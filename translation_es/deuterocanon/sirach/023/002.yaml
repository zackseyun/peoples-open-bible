translation:
  language: es
  text: ¿Quién pondrá azotes sobre mis pensamientos, y la disciplina de la sabiduría sobre mi corazón, para que no me perdonen por mis ignorancias y no pasen por alto sus pecados[a]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: “sus pecados”. La redacción resulta difícil en el contexto después de “mis ignorancias”; algunos entenderían el sentido como “mis pecados” o suavizarían de otro modo el pronombre.'
    reason: alternative_reading
lexical_decisions:
- source_word: τίς
  english_pob_choice: Who will
  chosen_spanish: ¿Quién pondrá... ?
  alternatives_spanish:
  - ¿Quién habrá de poner... ?
  - ¿Quién podría poner... ?
  lexicon: LSJ
  rationale: Conserva la pregunta retórica directa del griego y la fuerza de una súplica por corrección severa.
- source_word: ἐπιστήσει
  english_pob_choice: will set
  chosen_spanish: pondrá
  alternatives_spanish:
  - colocará
  - establecerá
  - pondrá por encima
  lexicon: LSJ
  rationale: ἐπιστήσει expresa colocar o poner algo sobre alguien; en español, 'pondrá sobre' resulta natural y mantiene la imagen de imposición.
- source_word: ἐπὶ τοῦ διανοήματός μου
  english_pob_choice: over my thoughts
  chosen_spanish: sobre mis pensamientos
  alternatives_spanish:
  - sobre mi mente
  - sobre mi pensamiento
  - sobre mis intenciones
  lexicon: LSJ
  rationale: διανόημα puede ser pensamiento o intención mental; 'pensamientos' comunica bien el plural colectivo en español y preserva el ámbito interior.
- source_word: μάστιγας
  english_pob_choice: whips
  chosen_spanish: azotes
  alternatives_spanish:
  - latigazos
  - azotes disciplinarios
  - látigos
  lexicon: LSJ
  rationale: '''Azotes'' transmite la imagen corporal y correctiva de μάστιγας con naturalidad bíblica en español, sin perder el carácter severo del término.'
- source_word: παιδείαν σοφίας
  english_pob_choice: the discipline of wisdom
  chosen_spanish: la disciplina de la sabiduría
  alternatives_spanish:
  - la instrucción de la sabiduría
  - la formación de la sabiduría
  - la sabia disciplina
  lexicon: LSJ
  rationale: παιδεία es disciplina, formación o instrucción; el genitivo σοφίας se vierte mejor como relación de origen o cualidad. 'Sabiduría' mantiene el contexto sapiencial del libro.
- source_word: καρδίας
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - interior
  - mente
  - ser interior
  lexicon: LSJ
  rationale: '''Corazón'' es el equivalente bíblico normal para el centro de pensamiento y voluntad; evita psicologizar el término.'
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el fin de que
  lexicon: LSJ
  rationale: Introduce de forma natural la cláusula de propósito en español.
- source_word: ἐπὶ τοῖς ἀγνοήμασίν μου
  english_pob_choice: for my ignorances
  chosen_spanish: por mis ignorancias
  alternatives_spanish:
  - a causa de mis ignorancias
  - por mis errores cometidos por ignorancia
  - por mis faltas de ignorancia
  lexicon: LSJ
  rationale: ἀγνόημα es un delito o falta nacida de la ignorancia; 'ignorancias' conserva la forma nominal poco común y la diferencia respecto de 'pecados'.
- source_word: μὴ φείσωνται
  english_pob_choice: may not spare me
  chosen_spanish: no me perdonen
  alternatives_spanish:
  - no me muestren indulgencia
  - no se apiaden de mí
  - no se abstengan de corregirme
  lexicon: LSJ
  rationale: El verbo significa perdonar, ahorrar o dispensar. En este contexto de disciplina, 'no me perdonen' comunica la idea de no dispensar el castigo correctivo.
- source_word: οὐ μὴ παρῇ
  english_pob_choice: may not overlook
  chosen_spanish: no pasen por alto
  alternatives_spanish:
  - no dejen pasar
  - no ignoren
  - no omitan
  lexicon: LSJ
  rationale: παρῇ aquí expresa dejar pasar u overlook; 'pasar por alto' conserva el matiz de no omitir ni dejar sin tratar.
- source_word: τὰ ἁμαρτήματά αὐτῶν
  english_pob_choice: their sins
  chosen_spanish: sus pecados
  alternatives_spanish:
  - mis pecados
  - aquellos pecados
  - los pecados de ellos
  lexicon: LSJ
  rationale: Se mantiene el pronombre transmitido en el texto griego. En español, 'sus pecados' conserva la lectura literal y deja abierta la tensión pronominal señalada en la nota.
theological_decisions:
- issue: Imaginería de castigo y disciplina sapiencial
  english_pob_reading: Retain the concrete imagery of 'whips' and 'discipline of wisdom' as a prayer for severe moral correction
  chosen_spanish_reading: Conservar la imaginería concreta de 'azotes' y 'disciplina de la sabiduría' como una petición de corrección moral severa
  alternative_spanish_readings:
  - suavizar a 'contención' o 'guía'
  - interpretar como mera instrucción sin dolor
  rationale: El verso pide una corrección exigente sobre la vida interior. Suavizarlo borraría la seriedad moral y sapiencial del texto.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Pronombre problemático en 'sus pecados'
  english_pob_reading: Preserve 'their sins' in the main text and note the difficulty
  chosen_spanish_reading: Preservar 'sus pecados' en el texto principal y señalar la dificultad del pronombre
  alternative_spanish_readings:
  - emendar a 'mis pecados' para una lectura más fluida
  - reformular el pronombre para evitar la tensión
  rationale: El testimonio griego aquí es auditable y no debe armonizarse en silencio. La traducción mantiene la forma transmitida y deja constancia de la dificultad textual en una nota.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego de Swete con el apoyo del audit trail en inglés. Se mantuvieron la pregunta retórica, la imaginería corporal de corrección y la tensión pronominal final. Se optó por 'azotes' para μάστιγας, 'disciplina de la sabiduría' para παιδείαν σοφίας, 'no me perdonen' para μὴ φείσωνται y 'no pasen por alto' para οὐ μὴ παρῇ, reflejando el matiz disciplinario y la dificultad del verbo final.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando aparezca el nombre divino; no aplica aquí.
  - '''Sabiduría'' se conserva por el carácter sapiencial del libro.'
  - '''Corazón'' mantiene el valor bíblico del centro de pensamiento y voluntad.'
  - La nota al pie marca la ambigüedad pronominal final sin resolverla en silencio.
