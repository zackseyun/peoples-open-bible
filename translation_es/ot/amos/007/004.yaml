translation:
  language: es
  text: 'Esto es lo que el Señor Yahvé me mostró: he aquí, el Señor Yahvé estaba llamando a juicio[a] por fuego, y consumió el gran abismo y estaba consumiendo la porción[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a pleito por fuego», «a litigio por fuego» o «a contender por fuego»; el hebreo לָרִיב lleva matices judiciales de disputa o causa legal.
    reason: lexical_alternative
  - marker: b
    text: «Porción» puede referirse a la parte asignada, al territorio o a la heredad; el hebreo no lo especifica más aquí.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה
  english_pob_choice: This is what
  chosen_spanish: Esto es lo que
  alternatives_spanish:
  - Así
  - De este modo
  lexicon: HALOT
  rationale: Introduce el informe visionario con una fórmula natural en español, conservando el valor demostrativo e introductorio del hebreo.
- source_word: הִרְאַנִי
  english_pob_choice: showed me
  chosen_spanish: me mostró
  alternatives_spanish:
  - me hizo ver
  - me causó ver
  lexicon: HALOT
  rationale: El Hiphil de ראה introduce una visión profética; «me mostró» es claro, idiomático y fiel a la función narrativa.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahweh
  lexicon: HALOT
  rationale: Se conserva el título compuesto con el nombre divino explícito «Yahvé», según la convención del proyecto. «Señor» traduce אֲדֹנָי y evita una redundancia torpe en español.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he[a] aquí
  alternatives_spanish:
  - y he aquí
  - miren
  lexicon: HALOT
  rationale: «He aquí» preserva la deíxis y el tono visionario. Se separa gráficamente para permitir la nota sobre la alternativa judicial de לָרִיב.
- source_word: קֹרֵא
  english_pob_choice: was calling for
  chosen_spanish: estaba llamando
  alternatives_spanish:
  - llamaba
  - convocaba
  lexicon: HALOT
  rationale: El participio expresa acción en curso dentro de la visión; el imperfecto progresivo español transmite bien esa continuidad.
- source_word: לָרִיב
  english_pob_choice: a judgment
  chosen_spanish: al pleito
  alternatives_spanish:
  - al juicio
  - a la causa
  - a la contienda
  lexicon: HALOT
  rationale: ריב conserva fuerte carga forense/judicial. «Pleito» mantiene el sentido de disputa o litigio; en español suena más concreto que «juicio» y evita una abstracción excesiva.
- source_word: בָּאֵשׁ
  english_pob_choice: by fire
  chosen_spanish: por fuego
  alternatives_spanish:
  - con fuego
  - mediante fuego
  lexicon: HALOT
  rationale: La preposición española «por» expresa bien el medio o instrumento del acto judicial.
- source_word: וַתֹּאכַל
  english_pob_choice: it consumed
  chosen_spanish: consumió
  alternatives_spanish:
  - devoró
  - se lo tragó
  lexicon: HALOT
  rationale: El fuego es el sujeto implícito y el verbo describe consumo destructivo. «Consumió» es natural y conserva la fuerza del hebreo.
- source_word: תְּהוֹם רַבָּה
  english_pob_choice: the great deep
  chosen_spanish: el gran abismo
  alternatives_spanish:
  - el gran océano primigenio
  - la gran profundidad
  lexicon: HALOT
  rationale: «תְּהוֹם» puede referir la profundidad abismal/las aguas primordiales. «Abismo» mantiene el peso cósmico y la amplitud del término en español.
- source_word: וְאָכְלָה
  english_pob_choice: and was consuming
  chosen_spanish: y estaba consumiendo
  alternatives_spanish:
  - y consumía
  - y siguió consumiendo
  lexicon: HALOT
  rationale: La forma verbal sugiere continuidad o resultado en la secuencia visual; el imperfecto progresivo español reproduce ese movimiento en curso.
- source_word: הַחֵלֶק
  english_pob_choice: the portion
  chosen_spanish: la porción
  alternatives_spanish:
  - el territorio
  - la heredad
  - la parcela
  lexicon: HALOT
  rationale: Se evita expandir a «tierra» o «territorio» sin base explícita. «Porción» conserva la ambigüedad del hebreo, como en la auditoría inglesa revisada.
theological_decisions:
- issue: Tratamiento del nombre divino en אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahweh
  rationale: La política del proyecto manda traducir יהוה como «Yahvé» en el texto principal. En la combinación con אֲדֹנָי, «Señor Yahvé» refleja ambos títulos divinos sin ocultar el nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה/YHWH → Yahvé'
- issue: Valor judicial de לָרִיב
  english_pob_reading: a judgment by fire
  chosen_spanish_reading: al pleito por fuego
  alternative_spanish_readings:
  - al juicio por fuego
  - a la contienda por fuego
  - al litigio por fuego
  rationale: La auditoría inglesa reconoce la tensión entre «judgment» y las alternativas litigiosas. «Pleito» mantiene el trasfondo forense y evita perder la idea de controversia jurídica/covenantal.
  doctrine_reference: Lexical note on ריב in the verse audit trail
- issue: Alcance de תְּהוֹם רַבָּה y הַחֵלֶק
  english_pob_reading: the great deep ... the portion
  chosen_spanish_reading: el gran abismo ... la porción
  alternative_spanish_readings:
  - el gran abismo ... la porción asignada
  - la gran profundidad ... la porción
  rationale: Se conserva la imagen cósmica de תְּהוֹם sin alegorizarla, y «porción» se mantiene sin expandirse a una localización concreta no explicitada por el hebreo.
  doctrine_reference: 'Applied revision pass: avoid interpretive expansion beyond the source'
translation_notes:
  revision_awareness: Se incorporó la revisión inglesa que prefirió una expresión sin artículo antes de «judgment» y corrigió «the land» por «the portion». La versión española evita añadir interpretaciones como «tierra» o «territorio» y mantiene la ambigüedad útil de «porción».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para יהוה.
  - «Señor» se usa para אֲדֹנָי dentro del título compuesto.
  - «Pleito» se eligió para reflejar el trasfondo forense de ריב sin cerrar indebidamente el sentido.
  - La secuencia verbal conserva la progresión visual del hebreo con «estaba consumiendo».
