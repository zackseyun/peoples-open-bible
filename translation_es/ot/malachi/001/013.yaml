translation:
  language: es
  text: 'Y ustedes dicen: «¡Qué fastidio es esto!», y resoplan ante eso[a], dice Yahvé de los ejércitos. Y traen lo robado, y lo cojo, y lo enfermo; así traen la ofrenda. ¿La aceptaré de su mano? dice Yahvé.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «le resoplan» o «lo desprecian». El verbo hebreo pinta una exhalación despectiva que expresa desprecio.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַתְּלָאָה
  english_pob_choice: what a weariness this is
  chosen_spanish: qué fastidio es este
  alternatives_spanish:
  - qué cansancio es este
  - qué molestia es esta
  lexicon: HALOT
  rationale: La expresión es exclamativa y de desprecio; «fastidio» comunica bien la queja despectiva sin volverla demasiado interpretativa. Conserva el valor de tedio/molestia del sustantivo.
- source_word: וְהִפַּחְתֶּם אֹתוֹ
  english_pob_choice: and you snort at it
  chosen_spanish: y le echan un resoplido
  alternatives_spanish:
  - y resoplan ante eso
  - y le echan un bufido
  lexicon: HALOT
  rationale: El verbo sugiere un soplo nasal de desdén. «Le echan un resoplido» conserva la imagen concreta y el matiz de desprecio mejor que una abstracción como «lo desprecian».
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: the LORD of hosts
  chosen_spanish: Yahvé de los ejércitos
  alternatives_spanish:
  - Yahvé Sebaot
  - Yahvé de las huestes
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como «Yahvé» según la convención del proyecto, y צְבָאוֹת se traduce de forma transparente como «de los ejércitos», preservando el título sin máscara litúrgica.
- source_word: גָּזוּל
  english_pob_choice: what is stolen
  chosen_spanish: lo robado
  alternatives_spanish:
  - lo hurtado
  - lo tomado por robo
  lexicon: HALOT
  rationale: El participio pasivo describe algo obtenido por robo. «Lo robado» es breve, natural y mantiene la fuerza moral del defecto sacrificial.
- source_word: הַפִּסֵּחַ
  english_pob_choice: the lame
  chosen_spanish: lo cojo
  alternatives_spanish:
  - el cojo
  - el lisiado
  lexicon: HALOT
  rationale: En este contexto habla de animales defectuosos; «lo cojo» conserva la concisión del listado y el referente implícito sin cargar innecesariamente el género.
- source_word: הַחוֹלֶה
  english_pob_choice: the sick
  chosen_spanish: lo enfermo
  alternatives_spanish:
  - el enfermo
  - lo doliente
  lexicon: HALOT
  rationale: Sigue el paralelismo con «lo cojo» y mantiene el valor adjetival de un animal con defecto o enfermedad.
- source_word: הַמִּנְחָה
  english_pob_choice: the offering
  chosen_spanish: la ofrenda
  alternatives_spanish:
  - la ofrenda vegetal
  - el tributo
  lexicon: HALOT
  rationale: Aunque מִנְחָה puede ser técnicamente «ofrenda vegetal», en este versículo funciona más ampliamente para la ofrenda presentada. «La ofrenda» es la mejor equivalencia de alcance suficiente.
- source_word: הַאֶרְצֶה אֹתָהּ
  english_pob_choice: Should I accept it
  chosen_spanish: ¿La aceptaré?
  alternatives_spanish:
  - ¿Debo aceptarla?
  - ¿Me agradará recibirla?
  lexicon: HALOT
  rationale: רצה en contexto sacrificial implica aceptación favorable. La pregunta retórica se expresa de modo natural en español sin perder la reprensión implícita.
- source_word: מִיֶּדְכֶם
  english_pob_choice: from your hand
  chosen_spanish: de su mano
  alternatives_spanish:
  - de sus manos
  - de ustedes
  lexicon: HALOT
  rationale: Se conserva el hebraísmo concreto de recibir «de la mano». Se opta por singular colectivo en español para que la frase suene fluida y mantenga el sentido idiomático.
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: La política del proyecto para el Tetragrámaton es usar «Yahvé» en el texto principal, evitando la convención de sustitución por «SEÑOR» y preservando el nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: צְבָאוֹת como título divino
  english_pob_reading: hosts
  chosen_spanish_reading: de los ejércitos
  alternative_spanish_readings:
  - de las huestes
  - Todopoderoso
  rationale: «Ejércitos» mantiene la imaginería militar/celestial del hebreo mejor que una paráfrasis como «Todopoderoso».
  doctrine_reference: 'DOCTRINE.md: Titles of God — צְבָאוֹת as heavenly armies'
- issue: Naturaleza del reproche sacrificial
  english_pob_reading: thus you bring the offering; Should I accept it from your hand?
  chosen_spanish_reading: así traen la ofrenda. ¿La aceptaré de su mano?
  alternative_spanish_readings:
  - y así traen la ofrenda. ¿La recibiré de su mano?
  - por tanto traen la ofrenda. ¿La aceptaré de su mano?
  rationale: '«Así» refleja la fuerza conectiva del hebreo y preserva la acusación: traen ofrendas defectuosas con desprecio, por lo cual la pregunta retórica de aceptación queda sin suavizar.'
  doctrine_reference: 'DOCTRINE.md: Sacrificial acceptance language'
translation_notes:
  revision_awareness: Se incorporó la corrección auditada que favorece una imagen más natural de desprecio («snort at it» → «resoplido»/«bufido») y se reflejó el conector hebreo con «así» antes de la ofrenda. La versión española evita la máscara «SEÑOR» para יְהוָה y conserva el tono acusatorio del verso.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה de acuerdo con la terminología del proyecto.
  - Se tradujo צְבָאוֹת como «de los ejércitos» para conservar el título y su fuerza imagética.
  - Se eligió una formulación natural en español para el gesto de desprecio sin diluir la imagen concreta del verbo hebreo.
  - La nota al pie [a] está anclada explícitamente en «resoplido» dentro del texto principal.
  - Se usó un tono bíblico moderno, digno y legible, evitando arcaísmos innecesarios.
