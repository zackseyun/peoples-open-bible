id: GEN.44.21
reference: Genesis 44:21
source:
  edition: WLC
  text: וַ/תֹּ֨אמֶר֙ אֶל עֲבָדֶ֔י/ךָ הוֹרִדֻ֖/הוּ אֵלָ֑/י וְ/אָשִׂ֥ימָה עֵינִ֖/י עָלָֽי/ו־׃
translation:
  text: Then you said to your servants[a], ‘Bring him down to me, that I may set my eyes on him.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'that I may look on him.' The Hebrew idiom literally says, 'set my eye on him,' which can denote seeing, inspecting, or giving special attention.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  chosen: Then you said
  alternatives:
  - And you said
  lexicon: HALOT
  rationale: Wayyiqtol of אמר in narrative sequence. 'Then' captures the sequential force in natural English, while retaining direct address to Joseph in Judah's speech.
- source_word: עֲבָדֶיךָ
  chosen: your servants
  alternatives:
  - your slaves
  lexicon: HALOT
  rationale: In this court setting Judah addresses Joseph's attendants/subjects as 'your servants.' Although עבד can denote slave, here the relational/political sense is foregrounded rather than bonded status, so 'servants' is the better contextual rendering.
- source_word: הוֹרִדֻהוּ
  chosen: Bring him down
  alternatives:
  - Bring him here
  - Cause him to come down
  lexicon: HALOT
  rationale: Hiphil imperative plural of ירד with 3ms suffix. 'Bring him down' preserves the causative sense and the directional nuance of descent, which is common in travel to Egypt in Genesis.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - before me
  lexicon: HALOT
  rationale: Direct prepositional phrase indicating movement toward Joseph personally; 'to me' is the plain sense.
- source_word: וְאָשִׂימָה עֵינִי עָלָיו
  chosen: so that I may set my eyes on him
  alternatives:
  - that I may look on him
  - that I may keep my eye on him
  lexicon: HALOT
  rationale: Idiomatic expression literally 'and I may set my eye on him.' The chosen rendering keeps the Hebrew imagery while remaining intelligible. It can imply favorable personal inspection or special attention; a more interpretive gloss like 'take care of him' would overstate the idiom here.
