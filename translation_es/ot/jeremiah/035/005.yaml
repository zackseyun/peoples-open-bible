    rationale: כּוֹס suele corresponder naturalmente a «copa» o «taza/cáliz» según contexto. Aquí «copas» mantiene mejor el par contrastivo con «cuencos» y sigue la decisión inglesa ‘and cups’.
  revised_spanish_text: 'Entonces puse delante de los hijos de la casa de los recabitas[a] cuencos llenos de vino y copas, y les dije: «Beban vino».'
