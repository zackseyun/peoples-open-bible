translation:
  language: es
  text: Al tener pasto[a], se saciaron; se saciaron, y su corazón se enalteció[b]; por tanto, me olvidaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Según su pasto» o «Como cuando eran apacentados». La expresión hebrea es compacta y puede describir la circunstancia de su abundancia.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «su corazón fue levantado», un modismo para volverse orgulloso.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּמַרְעִיתָם
  english_pob_choice: As their pasture
  chosen_spanish: Como su pasto[a]
  alternatives_spanish:
  - Según su pasto
  - En su pasto
  - Cuando tuvieron pasto
  lexicon: HALOT
  rationale: La comparación/circunstancia de כְּ con מַרְעִיתָם es compacta en hebreo. «Como su pasto» conserva la estructura breve y admite la lectura circunstancial de abundancia; se evita suavizarla demasiado con una paráfrasis temporal.
- source_word: וַיִּשְׂבָּעוּ
  english_pob_choice: they were satisfied
  chosen_spanish: se saciaron
  alternatives_spanish:
  - quedaron satisfechos
  - fueron llenos
  - se llenaron
  lexicon: HALOT
  rationale: שבע expresa quedar satisfecho o saciado. «Se saciaron» es natural en español y mantiene el matiz de plenitud por abundancia sin limitarlo al acto de comer.
- source_word: שָׂבְעוּ
  english_pob_choice: they were satisfied
  chosen_spanish: se saciaron
  alternatives_spanish:
  - quedaron satisfechos
  - habiéndose saciado
  - se llenaron
  lexicon: HALOT
  rationale: La repetición del verbo hebreo merece conservarse en español. Repetir «se saciaron» refleja el paralelismo y la progresión retórica del texto fuente.
- source_word: וַיָּרָם
  english_pob_choice: their heart was lifted up
  chosen_spanish: su corazón fue enaltecido[b]
  alternatives_spanish:
  - su corazón se ensoberbeció
  - su corazón se levantó
  - su corazón se enalteció
  lexicon: HALOT
  rationale: El hebreo usa el idioma de «ser levantado» con לב para expresar orgullo. «Fue enaltecido» conserva la metáfora de elevación más literalmente que una versión interpretativa como «se ensoberbeció».
- source_word: לִבָּם
  english_pob_choice: their heart
  chosen_spanish: su corazón
  alternatives_spanish:
  - su mente
  - su interior
  - su ser interior
  lexicon: HALOT
  rationale: «Corazón» mantiene la antropología bíblica del hebreo y evita reducir לֵב al ámbito intelectual.
- source_word: עַל כֵּן
  english_pob_choice: therefore
  chosen_spanish: por tanto
  alternatives_spanish:
  - por eso
  - así que
  - por esta razón
  lexicon: HALOT
  rationale: La partícula inferencial marca consecuencia. «Por tanto» es formal, claro y fiel al enlace lógico del original.
- source_word: שְׁכֵחוּנִי
  english_pob_choice: they forgot me
  chosen_spanish: me olvidaron
  alternatives_spanish:
  - me dejaron de recordar
  - me descuidaron
  - me olvidaron por completo
  lexicon: HALOT
  rationale: El verbo שכח con objeto divino conserva una fuerza de ruptura de lealtad del pacto. «Me olvidaron» es directo y suficientemente fuerte en español, sin debilitarlo con una paráfrasis interpretativa.
theological_decisions:
- issue: Metáfora del corazón levantado como orgullo
  english_pob_reading: Preserve the Hebrew metaphor rather than interpret it directly as 'they became proud.'
  chosen_spanish_reading: Conservar «su corazón fue enaltecido» en vez de explicitar el orgullo con una glosa interpretativa.
  alternative_spanish_readings:
  - su corazón se volvió soberbio
  - se volvieron orgullosos
  - su corazón se ensoberbeció
  rationale: La imagen hebrea expresa el peligro espiritual de la abundancia que conduce a la autosuficiencia. Mantener la metáfora preserva el tono bíblico y deja visible la tensión entre prosperidad y olvido de Dios.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail al preferir una formulación más cercana a כמרעיתם y al conservar la repetición de «se saciaron» para reflejar el hebreo con mayor formalidad.
  spanish_consistency_notes:
  - Se mantiene «corazón» para לֵב, en coherencia con el antropología bíblica del proyecto.
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera explícitamente; este versículo no lo contiene.
  - Se preserva la repetición verbal del hebreo para no diluir el énfasis retórico.
  - La metáfora de elevación se conserva en lugar de reemplazarla por una explicación directa del orgullo.
