lexical_decisions:
- source_word: צֶלֶק
  english_pob_choice: Zelek
  chosen_spanish: Zélec
  alternatives_spanish:
  - Zelek
  - Selek
  lexicon: nombre propio (transliteración)
  rationale: Se trata de un nombre propio; conservo la transliteración en forma natural para español. El acento gráfico ayuda a la pronunciación en lectura pública sin alterar la identificación del nombre.
- source_word: הָעַמּוֹנִי
  english_pob_choice: the Ammonite
  chosen_spanish: el amonita
  alternatives_spanish:
  - un amonita
  - el ammonita
  lexicon: gentilicio
  rationale: El hebreo usa gentilicio con artículo; en español, 'el amonita' reproduce bien la identificación étnica. Prefiero 'amonita' por ser la forma usual en español bíblico.
- source_word: נַחְרַי
  english_pob_choice: Naharai
  chosen_spanish: Naharai
  alternatives_spanish:
  - Nahrai
  lexicon: nombre propio (transliteración)
  rationale: Nombre propio sin traducción; mantengo la forma más extendida y cercana a la vocalización recibida en el contexto auditado.
- source_word: הַבֵּרֹתִי
  english_pob_choice: the Beerothite
  chosen_spanish: el beerotita
  alternatives_spanish:
  - el berotita
  - el de Beerot
  lexicon: gentilicio
  rationale: El gentilicio deriva de Beerot/Beeroth; 'beerotita' conserva mejor la relación con el topónimo que una forma abreviada. Mantengo el artículo por corresponder al hebreo.
- source_word: נֹשֵׂא כְּלֵי
  english_pob_choice: the armor-bearer
  chosen_spanish: el escudero
  alternatives_spanish:
  - el portador de las armas
  - el que lleva las armas
  lexicon: expresión idiomática
  rationale: La expresión hebrea designa una función militar especializada. En español, 'escudero' comunica de forma natural esa función; las alternativas más literales son posibles pero menos fluidas para lectura pública.
- source_word: יוֹאָב
  english_pob_choice: Joab
  chosen_spanish: Joab
  alternatives_spanish:
  - Yoab
  lexicon: nombre propio (transliteración)
  rationale: Conservo la transliteración estándar del nombre propio conocida en español bíblico.
- source_word: בֶּן צְרוּיָה
  english_pob_choice: son of Zeruiah
  chosen_spanish: hijo de Sarvia
  alternatives_spanish:
  - hijo de Zeruiah
  - hijo de Círuya
  lexicon: nombre propio (transliteración/tradición española)
  rationale: En español bíblico tradicional 'Sarvia' es la forma establecida para Zeruiah; la mantengo por inteligibilidad y continuidad con el uso eclesial, sin cambiar la referencia genealógica del hebreo.
theological_decisions:
- issue: Función militar 'nֹשֵׂא כְּלֵי' frente a equivalentes más literales
  english_pob_reading: the armor-bearer
  chosen_spanish_reading: el escudero
  alternative_spanish_readings:
  - el portador de las armas
  - el que lleva las armas
  rationale: 'No hay una tensión doctrinal, pero sí una decisión lexical importante: el hebreo expresa una función militar definida. ''Escudero'' comunica la función con naturalidad en español; la nota permite recuperar la literalidad si se desea.'
  doctrine_reference: No aplica; decisión de registro y equivalencia léxica.
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el audit trail inglés: lista de guerreros, nombres propios transliterados y un gentilicio con artículo. No se requieren revisiones textuales ni decisiones doctrinales adicionales; solo se ajusta el registro al español bíblico natural y se conserva la alternativa literal del sintagma militar.'
  spanish_consistency_notes:
  - 'Se mantiene el orden y la estructura del hebreo/inglés auditado: nombre + gentilicio, nombre + gentilicio, función + relación genealógica.'
  - '''Sarvia'' se usa por continuidad con el español bíblico tradicional, aunque el inglés auditado emplea ''Zeruiah''.'
  - La nota de pie de página marca la alternativa literal del sintagma נֹשֵׂא כְּלֵי, preservando la tensión entre equivalencia funcional y literalidad.
