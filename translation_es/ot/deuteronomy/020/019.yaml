translation:
  language: es
  text: Cuando sities una ciudad durante muchos días, combatiendo contra ella para capturarla, no destruirás sus árboles blandiendo un hacha contra ellos, porque de ellos podrás comer, y no los talarás. Porque, ¿es el árbol del campo un hombre, para que venga delante de ti en el asedio?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porque el hombre es el árbol del campo», o: «porque el árbol del campo es alimento para el hombre». El hebreo de la cláusula final es difícil; el texto principal la entiende como una pregunta retórica que contrasta un árbol con un enemigo humano.'
    reason: alternative_reading
lexical_decisions:
- source_word: תָצ֣וּר
  english_pob_choice: you besiege
  chosen_spanish: sities
  alternatives_spanish:
  - asedies
  - pongas sitio a
  lexicon: HALOT
  rationale: El contexto militar exige la idea de sitio; «sitiar» es natural en español y conserva el valor técnico del verbo sin volverlo perifrástico.
- source_word: יָמִים רַבִּים
  english_pob_choice: for many days
  chosen_spanish: por muchos días
  alternatives_spanish:
  - durante mucho tiempo
  - por largo tiempo
  lexicon: HALOT
  rationale: La expresión es directa y fiel; en español «por muchos días» mantiene la forma temporal del hebreo sin exagerar ni suavizar.
- source_word: לְהִלָּחֵם עָלֶיהָ
  english_pob_choice: fighting against it
  chosen_spanish: combatiendo contra ella
  alternatives_spanish:
  - luchando contra ella
  - haciéndole guerra
  lexicon: HALOT
  rationale: «Combatiendo» conserva el participio de acción y «contra ella» refleja el objeto femenino de la ciudad.
- source_word: לְתָפְשָׂהּ
  english_pob_choice: to capture it
  chosen_spanish: para capturarla
  alternatives_spanish:
  - para tomarla
  - para apoderarte de ella
  lexicon: HALOT
  rationale: «Capturar» expresa bien la meta militar del sitio y evita un calco menos idiomático como «tomarla» en este contexto.
- source_word: לֹא תַשְׁחִית אֶת עֵצָהּ
  english_pob_choice: you shall not destroy its trees
  chosen_spanish: no destruirás sus árboles
  alternatives_spanish:
  - no dañarás sus árboles
  - no arruinarás sus árboles
  lexicon: HALOT
  rationale: «Destruir» corresponde con fuerza a שׁחת en hifil y mantiene la prohibición general de devastación.
- source_word: לִנְדֹּחַ עָלָיו גַּרְזֶן
  english_pob_choice: by swinging an axe against them
  chosen_spanish: golpeándolos con un hacha
  alternatives_spanish:
  - blandiendo un hacha contra ellos
  - arrojando un hacha contra ellos
  lexicon: HALOT
  rationale: La imagen idiomática se entiende mejor en español como el acto de golpear con un hacha; «golpeándolos» evita un calco torpe y conserva la violencia del gesto.
- source_word: כִּי מִמֶּנּוּ תֹאכֵל
  english_pob_choice: for you may eat from them
  chosen_spanish: porque de ellos comerás
  alternatives_spanish:
  - pues de ellos podrás comer
  - porque de él comerás
  lexicon: HALOT
  rationale: La razón del mandato es que los árboles son fuente de alimento; «de ellos comerás» suena natural y mantiene el plural colectivo.
- source_word: וְאֹתוֹ לֹא תִכְרֹת
  english_pob_choice: and you shall not cut them down
  chosen_spanish: y no los talarás
  alternatives_spanish:
  - y no los cortarás
  - y no los derribarás
  lexicon: HALOT
  rationale: «Talar» es el verbo español más preciso para árboles y reproduce el valor de כרת en este contexto.
- source_word: הָאָדָם
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - el hombre
  - humanidad
  lexicon: HALOT
  rationale: La lectura de la POB conserva el contraste singular y masculino con el árbol; «un hombre» lo mantiene con claridad en español.
- source_word: עֵץ הַשָּׂדֶה
  english_pob_choice: the tree of the field
  chosen_spanish: el árbol del campo
  alternatives_spanish:
  - el árbol del campo abierto
  - el árbol del sembrado
  lexicon: HALOT
  rationale: «Del campo» reproduce bien el constructo hebreo y es más natural que una estructura adjetival o técnica.
- source_word: לָבֹא מִפָּנֶיךָ בַּמָּצוֹר
  english_pob_choice: that it should come before you in the siege
  chosen_spanish: para que venga delante de ti en el sitio
  alternatives_spanish:
  - para que se ponga frente a ti en el sitio
  - para que salga contra ti en el sitio
  lexicon: HALOT
  rationale: Sigo la decisión de la POB de leer el final como pregunta retórica; «venir delante de ti» conserva la rareza semítica sin perder inteligibilidad. «Sitio» traduce בַּמָּצוֹר de forma directa.
theological_decisions:
- issue: 'Lectura del final difícil: כִּי הָאָדָם עֵץ הַשָּׂדֶה לָבֹא מִפָּנֶיךָ בַּמָּצוֹר'
  english_pob_reading: 'Rendered as a rhetorical question contrasting a human enemy with a field tree: ''For is the tree of the field a man, that it should come before you in the siege?'''
  chosen_spanish_reading: Porque, ¿es el árbol del campo un hombre, para que venga delante de ti en el sitio?
  alternative_spanish_readings:
  - Porque el hombre es el árbol del campo
  - Porque el árbol del campo es comida para el hombre
  rationale: 'La sintaxis hebrea es difícil y admite varias lecturas. La pregunta retórica explica mejor la prohibición inmediata: un árbol no es un combatiente que deba enfrentarse al sitiador. Por eso mantengo la lectura interrogativa, dejando constancia de las alternativas.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3; #4 sobre el tratamiento de אָדָם con valor de «hombre» singular y no genérico'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés, que prefirió una imagen más natural para לִנְדֹּחַ עָלָיו גַּרְזֶן ('swinging an axe') y conservó la lectura de la cláusula final como pregunta retórica. También se atendió a la nota textual sobre la dificultad del final del versículo y a la decisión de mantener el contraste entre ciudad sitiada, árboles y un hombre enemigo sin añadir material interpretativo externo.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - «Ciudad» y «sitio» conservan el marco militar sin introducir terminología eclesial.
  - Se preserva el plural colectivo de «árboles» en la prohibición y en la justificación del mandato.
  - La pregunta final mantiene la ambigüedad controlada del hebreo y no resuelve la dificultad con una paráfrasis explicativa.
  - «Talar» se eligió por precisión botánica y legal en lugar de «cortar» o «derribar» como forma principal.
