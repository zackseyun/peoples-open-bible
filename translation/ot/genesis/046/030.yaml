id: GEN.46.30
reference: Genesis 46:30
source:
  edition: WLC
  text: וַ/יֹּ֧אמֶר יִשְׂרָאֵ֛ל אֶל יוֹסֵ֖ף אָמ֣וּתָה הַ/פָּ֑עַם אַחֲרֵי֙ רְאוֹתִ֣/י אֶת פָּנֶ֔י/ךָ כִּ֥י עוֹדְ/ךָ֖ חָֽי־־׃
translation:
  text: Then Israel said to Joseph[a], “Now I can die, since I have seen your face and know that you are still alive.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'Now I will die, after seeing your face, because you are still alive.' The Hebrew wording is compact and idiomatic; the main text renders its sense in natural English.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural modern English while preserving sequential force.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  alternatives:
  - Jacob
  lexicon: HALOT
  rationale: The Hebrew text explicitly uses 'Israel,' so the transliterated covenant name is retained rather than harmonizing to 'Jacob.'
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard directional preposition; 'to' is the natural modern equivalent.
- source_word: אָמ֣וּתָה
  chosen: I can die
  alternatives:
  - let me die
  - I will die
  - I may die
  lexicon: HALOT
  rationale: The cohortative expresses volition or emotional resolve. In context Jacob is not requesting death but expressing that he can now die content, so 'I can die' best captures the idiomatic force in English.
- source_word: הַפָּעַם
  chosen: Now
  alternatives:
  - this time
  - at last
  lexicon: HALOT
  rationale: Literally 'the time/this time,' but idiomatically here it marks the present moment after long grief. 'Now' is concise and natural; 'at last' is interpretive and slightly stronger than the Hebrew requires.
- source_word: אַחֲרֵי
  chosen: since
  alternatives:
  - after
  - now that
  lexicon: HALOT
  rationale: Though formally 'after,' in this clause it introduces the circumstance that makes the statement possible. 'Since' communicates the causal-temporal sense smoothly in English.
- source_word: רְאוֹתִי
  chosen: I have seen
  alternatives:
  - my seeing
  - after seeing
  - having seen
  lexicon: HALOT
  rationale: The infinitive construct with suffix is rendered as a finite verb in idiomatic English while preserving completed action.
- source_word: אֶת פָּנֶיךָ
  chosen: your face
  alternatives:
  - you
  - your presence
  lexicon: HALOT
  rationale: Literally 'your face.' Retaining 'your face' preserves the vivid personal encounter and echoes common Hebrew idiom, rather than flattening it to merely 'you.'
- source_word: כִּי
  chosen: and know that
  alternatives:
  - that
  - because
  - for
  lexicon: HALOT
  rationale: 'Here כִּי introduces the content/circumstance explaining Jacob''s statement: seeing Joseph''s face means recognizing that he is alive. English often requires an explicit connective for clarity; ''and know that'' makes the implied sense natural without substantial expansion.'
- source_word: עוֹדְךָ חָי
  chosen: you are still alive
  alternatives:
  - you are yet alive
  - you are alive still
  lexicon: HALOT
  rationale: 'עוֹד with the pronominal suffix plus חָי expresses continuance: Joseph remains alive. ''Still alive'' is the clearest contemporary rendering.'
