translation:
  language: es
  text: Porque la razón no es la que arranca de raíz las pasiones[a][b], sino su adversaria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la destructora de las pasiones». El griego conserva la imagen de arrancar de raíz.
    reason: lexical_alternative
  - marker: b
    text: Es decir, la razón no elimina por completo las pasiones, sino que contiende contra ellas.
    reason: cross_reference
lexical_decisions:
- source_word: λογισμός
  english_pob_choice: reason
  chosen_spanish: la razón
  alternatives_spanish:
  - el razonamiento
  - el juicio racional
  - la mente
  lexicon: LSJ
  rationale: En 4 Macabeos, λογισμός designa la facultad de deliberación racional; «la razón» es la forma más natural y fiel en español para conservar ese valor filosófico sin volverlo un proceso meramente mental o abstracto.
- source_word: ἐκριζωτής
  english_pob_choice: uprooter
  chosen_spanish: la arrancadora
  alternatives_spanish:
  - la destruidora
  - la que arranca de raíz
  - la extirpadora
  lexicon: LSJ
  rationale: El griego conserva la imagen concreta de arrancar desde la raíz. «La arrancadora» refleja esa metáfora directamente en español y mantiene el contraste verbal con «adversaria».
- source_word: τῶν παθῶν
  english_pob_choice: of the passions
  chosen_spanish: de las pasiones
  alternatives_spanish:
  - de las emociones
  - de los impulsos
  - de los padecimientos
  lexicon: LSJ
  rationale: En este contexto moral-filosófico, πάθη se refiere a pasiones desordenadas, no a simples sentimientos ni a sufrimientos. «Pasiones» conserva el sentido técnico del texto.
- source_word: ἀνταγωνιστής
  english_pob_choice: adversary
  chosen_spanish: adversaria
  alternatives_spanish:
  - oponente
  - antagonista
  - combatiente contra ellas
  lexicon: LSJ
  rationale: «Adversaria» reproduce el matiz formal de oposición activa de ἀνταγωνιστής y armoniza con la oposición del verso. Se prefirió al más técnico «antagonista» para evitar un calco innecesario y al mismo tiempo conservar la fuerza adversativa.
theological_decisions:
- issue: Relación entre la razón y las pasiones
  english_pob_reading: Reason does not completely eradicate the passions but stands in opposition to them.
  chosen_spanish_reading: La razón no elimina por completo las pasiones, sino que se opone a ellas.
  alternative_spanish_readings:
  - La razón no es la destruidora de las pasiones, sino su rival.
  - La razón no es la que arranca de raíz las pasiones, sino la que combate contra ellas.
  rationale: 'El verso afirma una oposición real, no una extinción total. La traducción conserva la tensión del griego: la razón es activa contra las pasiones, pero no se presenta como su aniquiladora absoluta. La imagen agrícola de «arrancar» se mantiene para no borrar la metáfora.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa, que prefirió «adversary» por encima de «opponent» para dar un tono más formal a ἀνταγωνιστής, y conserva sin atenuación la metáfora de ἐκριζωτής. La decisión española mantiene esa misma formalidad y la imagen de arrancar de raíz.
  spanish_consistency_notes:
  - Se usó «la razón» para λογισμός, en coherencia con el valor técnico-filosófico señalado en el audit trail.
  - Se conservó «pasiones» como término moral-filosófico, evitando «emociones» por ser demasiado moderno y menos preciso.
  - Se evitó «SEÑOR» u otro vocabulario litúrgico ajeno al texto, ya que aquí no hay lenguaje del nombre divino.
  - La concordancia femenina de «arrancadora» y «adversaria» sigue el sustantivo implícito «razón» y mantiene naturalidad en español.
