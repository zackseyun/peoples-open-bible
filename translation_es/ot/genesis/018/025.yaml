translation:
  language: es
  text: 'Lejos de ti hacer tal cosa: dar muerte al justo junto con el impío, de modo que el justo sea como el impío. ¡Lejos de ti! ¿No hará justicia[a] el Juez de toda la tierra?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿No hará el Juez de toda la tierra lo que es justo?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: חָלִילָה
  english_pob_choice: Far be it from you
  chosen_spanish: Lejos de ti
  alternatives_spanish:
  - ¡Eso es inconcebible para ti!
  - ¡Nunca tal cosa de ti!
  - ¡Líbrete Dios de eso!
  lexicon: HALOT
  rationale: La interjección expresa repudio fuerte. «Lejos de ti» comunica bien la repulsión idiomática sin introducir un giro más interpretativo como una invocación explícita a Dios.
- source_word: מֵעֲשׂוֹת כַּדָּבָר הַזֶּה
  english_pob_choice: to do such a thing
  chosen_spanish: hacer tal cosa
  alternatives_spanish:
  - hacer esto
  - hacer semejante cosa
  - hacer una cosa así
  lexicon: HALOT
  rationale: El hebreo tiene una construcción idiomática que en español natural se expresa con «hacer tal cosa». Conserva el tono de rechazo sin sobrerreformular.
- source_word: לְהָמִית
  english_pob_choice: to put ... to death
  chosen_spanish: matar
  alternatives_spanish:
  - dar muerte a
  - hacer morir a
  - quitar la vida a
  lexicon: HALOT
  rationale: En español, «matar» es claro y natural; «dar muerte a» suena más formal pero menos directo. Aquí la fuerza causativa queda suficientemente expresada en el contexto.
- source_word: צַדִּיק
  english_pob_choice: the righteous
  chosen_spanish: el justo
  alternatives_spanish:
  - el inocente
  - la persona justa
  - el recto
  lexicon: HALOT
  rationale: En este contexto judicial-forense, «justo» preserva la categoría moral y permite la repetición paralela con claridad en español.
- source_word: רָשָׁע
  english_pob_choice: the wicked
  chosen_spanish: el impío
  alternatives_spanish:
  - el malvado
  - el perverso
  - el inicuo
  lexicon: HALOT
  rationale: «Impío» mantiene el contraste moral y es un término bíblico reconocido en español. Aunque «malvado» es más coloquial, «impío» conserva mejor el registro bíblico del pasaje.
- source_word: וְהָיָה כַצַּדִּיק כָּרָשָׁע
  english_pob_choice: so that the righteous would be like the wicked
  chosen_spanish: de modo que el justo sea como el impío
  alternatives_spanish:
  - y el justo llegue a ser como el impío
  - con el resultado de que el justo quede igual que el impío
  - y el justo resulte como el impío
  lexicon: HALOT
  rationale: La comparación introducida por כ queda bien reflejada con «sea como». «De modo que» expresa el resultado intolerable de la acción sin añadir más contenido al hebreo.
- source_word: הֲשֹׁפֵט כָּל הָאָרֶץ
  english_pob_choice: the Judge of all the earth
  chosen_spanish: el Juez de toda la tierra
  alternatives_spanish:
  - el que juzga toda la tierra
  - el juez de todo el mundo
  - el Juez de toda la creación
  lexicon: HALOT
  rationale: «Juez de toda la tierra» es la forma más natural y fiel al título sustantivado. «Tierra» conserva la amplitud universal del hebreo sin forzar «mundo».
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: justicia
  alternatives_spanish:
  - lo que es justo
  - juicio
  - sentencia justa
  lexicon: HALOT
  rationale: En la pregunta retórica final, la idea principal es la actuación recta y justa de Dios. «Hará justicia» conserva la fuerza ética y judicial del término mejor que «hará juicio».
theological_decisions:
- issue: La pregunta retórica final sobre el carácter de Dios
  english_pob_reading: Shall not the Judge of all the earth do justice?
  chosen_spanish_reading: ¿No hará justicia el Juez de toda la tierra?
  alternative_spanish_readings:
  - ¿No hará el Juez de toda la tierra lo que es justo?
  - ¿No ejecutará juicio el Juez de toda la tierra?
  rationale: La forma elegida conserva el valor retórico esperado como respuesta afirmativa y mantiene el énfasis moral-jurídico de מִשְׁפָּט. «Hará justicia» suena natural en español y no debilita la apelación al carácter justo de Dios.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior anclando la nota [a] en el texto español. La traducción sigue el último estado revisado del POB inglés: «Shall not the Judge of all the earth do justice?» y mantiene la equivalencia óptima sin suavizar el desafío retórico de Abraham.'
  spanish_consistency_notes:
  - Se mantuvo la distinción moral entre «justo» e «impío» para conservar el paralelismo hebreo.
  - Se usó «Lejos de ti» como equivalente idiomático de חָלִילָה, evitando una paráfrasis excesiva.
  - Se prefirió «justicia» en la línea final para reflejar el valor judicial-ético de מִשְׁפָּט.
  - La nota textual se ancla solo en la cláusula final, donde existe la alternativa lexical documentada en el audit trail inglés.
