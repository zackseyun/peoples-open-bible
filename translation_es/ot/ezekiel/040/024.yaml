  to: Entonces me llevó por el camino del sur, y allí había una puerta orientada al sur[a]. Midió sus pilares laterales[b] y su pórtico según estas mismas medidas.
  rationale: 'Se corrige el texto para reflejar mejor la decisión léxica auditada del POB: una expresión principal más clara para lectores generales («pilares laterales») con la alternativa técnica («jambas») en nota. También se ajusta וְהִנֵּה a una formulación española natural que conserva mejor su función deíctica. Se mantienen «pórtico» y «estas mismas medidas», que son fieles y legibles. La nota de referencia se reancla al lugar más natural de la frase para evitar desajuste entre marcador y contenido.'
