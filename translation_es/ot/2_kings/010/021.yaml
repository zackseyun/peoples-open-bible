translation:
  language: es
  text: Así que Jehú envió por todo Israel[a], y vinieron todos los adoradores de Baal; no quedó ningún hombre que no viniera. Entraron en la casa de Baal, y la casa de Baal se llenó de un extremo al otro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, ‘boca a boca’, un modismo que significa que la casa quedó completamente llena, de un extremo al otro.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent throughout
  chosen_spanish: envió a todo
  alternatives_spanish:
  - envió
  - mandó por todo
  lexicon: HALOT
  rationale: El verbo básico es ‘enviar’; con בְּכָל יִשְׂרָאֵל la idea es distributiva. En español, ‘envió a todo Israel’ comunica el alcance total sin forzar una perífrasis más pesada.
- source_word: בְּכָל יִשְׂרָאֵל
  english_pob_choice: throughout all Israel
  chosen_spanish: a todo Israel
  alternatives_spanish:
  - por todo Israel
  - en todo Israel
  lexicon: HALOT
  rationale: La construcción expresa amplitud de alcance. ‘A todo Israel’ es natural en español y conserva la idea de convocatoria general; ‘por todo Israel’ también sería posible, pero suena menos directo en este contexto.
- source_word: עֹבְדֵי הַבַּעַל
  english_pob_choice: the worshipers of Baal
  chosen_spanish: los adoradores de Baal
  alternatives_spanish:
  - los servidores de Baal
  - los que servían a Baal
  lexicon: HALOT
  rationale: El participio de עבד en contexto cultual no alude simplemente a servicio doméstico, sino a adhesión religiosa. ‘Adoradores’ transmite mejor esa devoción cultual en español.
- source_word: וְלֹא נִשְׁאַר אִישׁ אֲשֶׁר לֹא בָא
  english_pob_choice: not a man was left who did not come
  chosen_spanish: no quedó ningún hombre que no viniera
  alternatives_spanish:
  - no quedó nadie que no viniera
  - no permaneció hombre alguno que no viniera
  lexicon: HALOT
  rationale: Se conserva el singular representativo אִישׁ con ‘hombre’, como en el audit trail inglés. ‘No quedó ningún hombre’ mantiene el énfasis de totalidad sin sonar demasiado literal o rígido.
- source_word: וַיָּבֹאוּ בֵּית הַבַּעַל
  english_pob_choice: They entered the house of Baal
  chosen_spanish: Entraron en la casa de Baal
  alternatives_spanish:
  - Entraron en el templo de Baal
  - Vinieron a la casa de Baal
  lexicon: HALOT
  rationale: בוא con un edificio se traduce naturalmente ‘entrar’. Se mantiene ‘casa de Baal’ para conservar la forma hebrea בֵּית, sin reemplazarla por ‘templo’ de manera interpretativa.
- source_word: בֵּית הַבַּעַל
  english_pob_choice: the house of Baal
  chosen_spanish: la casa de Baal
  alternatives_spanish:
  - el templo de Baal
  lexicon: HALOT
  rationale: La traducción literal ‘casa’ preserva el idiomático hebreo y evita adelantar una equivalencia cultual que el texto no formula explícitamente.
- source_word: וַיִּמָּלֵא
  english_pob_choice: was filled
  chosen_spanish: fue llena
  alternatives_spanish:
  - estuvo llena
  - se llenó
  lexicon: HALOT
  rationale: El nifal de מלא aquí es pasivo; ‘fue llena’ conserva esa pasividad. Aunque ‘se llenó’ sería fluido, ‘fue llena’ refleja mejor la construcción del texto en una forma digna y comprensible.
- source_word: פֶּה לָפֶה
  english_pob_choice: from end to end
  chosen_spanish: de un extremo al otro
  alternatives_spanish:
  - de pared a pared
  - completamente
  lexicon: HALOT
  rationale: El hebreo dice literalmente ‘boca a boca’, pero funciona como idiomatismo espacial de llenura total. ‘De un extremo al otro’ comunica el sentido sin ocultar la tensión idiomática del original.
theological_decisions:
- issue: Mantenimiento de la referencia cultual a Baal sin neutralización
  english_pob_reading: the worshipers of Baal came; ... the house of Baal was filled
  chosen_spanish_reading: vinieron todos los adoradores de Baal; ... la casa de Baal fue llena
  alternative_spanish_readings:
  - vinieron todos los servidores de Baal; ... el templo de Baal fue lleno
  - vinieron todos los que servían a Baal; ... el santuario de Baal fue lleno
  rationale: Se conserva la identificación cultual explícita con Baal. No se suaviza a una formulación genérica, porque el relato enfatiza la reunión de sus devotos para el juicio que sigue.
  doctrine_reference: DOCTRINE.md Translation philosophy §3–§4
- issue: Lenguaje representativo masculino en אִישׁ
  english_pob_reading: not a man was left who did not come
  chosen_spanish_reading: no quedó ningún hombre que no viniera
  alternative_spanish_readings:
  - no quedó nadie que no viniera
  - no quedó persona alguna que no viniera
  rationale: Se mantiene el masculino singular representativo del hebreo, como en el audit trail inglés. No se neutraliza a ‘nadie’ porque el texto usa una forma marcada y no plantea una afirmación antropológica general.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Idiomatismo espacial de פֶּה לָפֶה
  english_pob_reading: the house was completely filled, from one end to the other
  chosen_spanish_reading: la casa de Baal fue llena de un extremo al otro
  alternative_spanish_readings:
  - la casa de Baal quedó completamente llena
  - la casa de Baal fue llenada por completo
  rationale: La frase hebrea conserva una imagen idiomática concreta. En español se explica de modo claro sin borrar la imagen de plenitud total; esto evita perder el matiz textual y a la vez mantiene inteligibilidad pública.
  doctrine_reference: DOCTRINE.md Translation philosophy §2
translation_notes:
  revision_awareness: 'El pasaje muestra acuerdo alto con la auditoría inglesa y no requiere revisiones sustantivas. La solución española sigue el mismo análisis: conserva el alcance distributivo de בְּכָל יִשְׂרָאֵל, el valor cultual de עֹבְדֵי הַבַּעַל, el masculino representativo de אִישׁ y el modismo espacial de פֶּה לָפֶה.'
  spanish_consistency_notes:
  - Se mantiene ‘Baal’ como nombre propio cultual, sin añadir artículos variables innecesarios.
  - ‘Casa de Baal’ se conserva de forma literal para alinearse con el hebreo y con el audit trail inglés.
  - ‘Fue llena’ refleja el pasivo del hebreo; la nota aclara el idiomatismo final para evitar ambigüedad.
  - El término ‘adoradores’ se usa aquí por contexto cultual; no se generaliza a ‘siervos’ porque el foco es religioso.
