lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - aconteció
  lexicon: HALOT
  rationale: En la fórmula profética וַיְהִי דְבַר־יְהוָה, el sentido idiomático es que la palabra divina 'vino' al profeta. 'Vino' conserva la formulación natural en español sin volverla mecánica como 'fue' o 'aconteció'.
- source_word: דְבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - la comunicación
  lexicon: HALOT
  rationale: '''La palabra'' reproduce el valor formulaico y teológico de דְבַר en este contexto profético. ''Mensaje'' sería más interpretativo y debilitaría la fuerza técnica de la expresión.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como transliteración reverente y auditable. 'Yahvé' sigue el principio del POB de no sustituir el Tetragrámaton por un título, y es la forma española indicada por el proyecto.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - para mí
  - hacia mí
  lexicon: HALOT
  rationale: La preposición marca al profeta como receptor directo de la palabra. 'A mí' es la correspondencia natural y exacta en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  - y dijo
  lexicon: HALOT
  rationale: '''Diciendo'' conserva la introducción verbal del discurso en estilo bíblico español. Es más fiel que omitir la partícula o convertirla en una cláusula explicativa.'
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La lectura del inglés POB preserva el nombre propio divino; en español se adopta la forma establecida por el proyecto, 'Yahvé', para mantener la transparencia del Tetragrámaton y evitar la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador [a] aparece ahora exactamente en el texto español en la referencia a Yahvé, y la nota se mantiene anclada a esa forma.'
  spanish_consistency_notes:
  - Se emplea «Yahvé» de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - 'La fórmula profética se vierte con orden natural en español: «Y vino la palabra... a mí, diciendo».'
  - Se conserva el estilo sobrio y público, sin añadir contenido que no esté en el texto fuente.
