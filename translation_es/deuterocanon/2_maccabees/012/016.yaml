  text: And when they had taken the city by the will of God[a], they made an immeasurable slaughter, so that the nearby lake, having a width of two stadia, appeared to be overflowing[b], filled with blood.
  footnotes:
  - marker: a
    text: A stadion was an ancient unit of length; two stadia are roughly 370 meters or about 400 yards.
    reason: cultural_note
  - marker: b
    text: Or 'appeared to be filled with blood.' The Greek imagery is vivid and may suggest the lake looked as though blood were flowing into or through it until it seemed full.
    reason: lexical_alternative
