translation:
  language: es
  text: Pero a su hijo le daré una tribu, para que David, mi siervo, tenga siempre una lámpara[a] delante de mí en Jerusalén, la ciudad que he escogido para mí para poner allí mi nombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «luz». El hebreo נִיר aquí funciona como metáfora de la continuidad de la línea davídica o de una presencia real perdurable; «lámpara» conserva la imagen de forma más concreta.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלִבְנוֹ
  english_pob_choice: But to his son
  chosen_spanish: Pero a su hijo
  alternatives_spanish:
  - Y a su hijo
  lexicon: HALOT
  rationale: El hebreo enlaza esta cláusula con contraste frente a la división del reino; en español, «Pero» expresa mejor el giro adversativo que un simple «Y».
- source_word: שֵׁבֶט אֶחָד
  english_pob_choice: one tribe
  chosen_spanish: una tribu
  alternatives_spanish:
  - un cetro
  - una sola tribu
  lexicon: HALOT
  rationale: En este contexto político de división del reino, el sentido contextual es tribal, no el de vara/cetro. «Una tribu» conserva la referencia histórica de manera natural.
- source_word: נִיר
  english_pob_choice: lamp
  chosen_spanish: una lámpara
  alternatives_spanish:
  - una luz
  lexicon: HALOT
  rationale: La imagen es metafórica para la permanencia de la línea davídica. «Lámpara» mantiene la metáfora concreta y no la diluye en una abstracción como «luz».
- source_word: לְדָוִיד עַבְדִּי
  english_pob_choice: David my servant
  chosen_spanish: David, mi esclavo
  alternatives_spanish:
  - David, mi siervo
  lexicon: HALOT
  rationale: La POB inglesa documenta «slave» para la fuerza léxica de עבד. En español, «esclavo» conserva esa fuerza y evita suavizar el término; se mantiene el orden natural «David, mi esclavo».
- source_word: כָּל הַיָּמִים
  english_pob_choice: always
  chosen_spanish: siempre
  alternatives_spanish:
  - todos los días
  - continuamente
  lexicon: HALOT
  rationale: El modismo expresa continuidad duradera. «Siempre» es la forma española más natural y concisa sin perder la duración continua.
- source_word: לְפָנַי
  english_pob_choice: before me
  chosen_spanish: delante de mí
  alternatives_spanish:
  - en mi presencia
  lexicon: HALOT
  rationale: «Delante de mí» reproduce bien la imagen espacial del hebreo y sugiere la dimensión relacional/covenantal sin explicarla de más.
- source_word: בָּחַרְתִּי לִי
  english_pob_choice: I have chosen for myself
  chosen_spanish: he escogido para mí
  alternatives_spanish:
  - he elegido para mí
  - escogí para mí
  lexicon: HALOT
  rationale: El dativo reflexivo לִי es significativo y debe preservarse. «He escogido para mí» mantiene el valor reflexivo y el tono formal del perfecto con resultado presente.
- source_word: לָשׂוּם שְׁמִי שָׁם
  english_pob_choice: to put my name there
  chosen_spanish: para poner allí mi nombre
  alternatives_spanish:
  - para establecer allí mi nombre
  - para que mi nombre esté allí
  lexicon: HALOT
  rationale: Se conserva la fórmula teológica del «nombre» sin convertirla en una paráfrasis doctrinal. «Poner allí mi nombre» es literal y comprensible en español bíblico.
theological_decisions:
- issue: Metáfora dinástica en נִיר
  english_pob_reading: lamp as a metaphor for the continuing Davidic line/presence before God
  chosen_spanish_reading: lámpara como metáfora de la permanencia de la línea davídica delante de Dios
  alternative_spanish_readings:
  - luz como metáfora general
  - faro como imagen dinámica
  rationale: La metáfora no debe explicarse en el cuerpo del texto. «Lámpara» preserva la tensión entre símbolo y referencia histórica, permitiendo que el lector perciba el sentido dinástico sin que se lo sustituyamos por una explicación.
  doctrine_reference: Translation philosophy §3, §5
- issue: Fórmula teológica del nombre divino
  english_pob_reading: retain the idiom rather than paraphrasing it as dwelling/presence
  chosen_spanish_reading: conservar «poner allí mi nombre» en lugar de explicarlo como mera presencia o morada
  alternative_spanish_readings:
  - para establecer allí mi presencia
  - para habitar allí
  rationale: La expresión del «nombre» es una fórmula deuteronomista importante. Mantenerla respeta la carga teológica y evita nivelarla a una explicación interpretativa más amplia.
  doctrine_reference: Translation philosophy §1, §3
- issue: Terminología de עבד
  english_pob_reading: my servant David
  chosen_spanish_reading: mi esclavo / mi siervo según la fuerza del término y el criterio léxico del proyecto
  alternative_spanish_readings:
  - mi siervo
  - mi servidor
  rationale: Aquí se ha priorizado la fuerza léxica que el proyecto documenta para עבד. Aunque «siervo» es más tradicional en español, «esclavo» evita suavizar una relación de pertenencia/servicio marcada por el hebreo y el expediente inglés.
  doctrine_reference: 'Project lexical default: δοῦλος / עבד'
translation_notes:
  revision_awareness: La redacción sigue el último pase de revisión del expediente inglés, que prefirió «David my servant» frente a un orden más invertido, y conserva el resto del versículo sin expandir el sentido. En español se ha mantenido esa naturalidad formal, preservando la metáfora de «lámpara» y la fórmula del «nombre» sin paráfrasis.
  spanish_consistency_notes:
  - Se ha usado «Yahvé» en toda la tradición del proyecto cuando aparezca el Tetragrámaton; en este versículo no aparece explícitamente en el texto hebreo.
  - Se mantiene «mi esclavo» conforme al valor léxico documentado para עבד en el expediente proporcionado.
  - Se conserva la fórmula «poner allí mi nombre» por coherencia con el lenguaje deuteronomista y con la POB inglesa.
  - La puntuación y el orden sintáctico buscan una lectura litúrgica y clara en español sin introducir interpretaciones adicionales.
