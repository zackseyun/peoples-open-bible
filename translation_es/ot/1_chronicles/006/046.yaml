translation:
  language: es
  text: Y a los demás hijos de Coat[a], de las familias de la media tribu, la mitad de Manasés, se les dieron por sorteo diez ciudades.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: "de las familias de la tribu, de la media tribu, de la mitad de Manasés"; fórmula que se refiere a la media tribu de Manasés.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/לִ/בְנֵי
  english_pob_choice: And to the sons of
  chosen_spanish: Y a los hijos de
  alternatives_spanish:
  - Y para los hijos de
  - Y a los descendientes de
  lexicon: HALOT
  rationale: Conserva el giro genealógico y distributivo del hebreo. En español, 'hijos de' reproduce de forma natural la fórmula de pertenencia sin convertirla en una paráfrasis más general como 'descendientes'.
- source_word: קְהָת
  english_pob_choice: Kohath
  chosen_spanish: Coat
  alternatives_spanish:
  - Kohath
  - Quehat
  lexicon: HALOT
  rationale: Se adopta la forma tradicional hispana 'Coat', bien establecida en castellano bíblico, sin perder la referencia al mismo nombre propio hebreo.
- source_word: הַנּוֹתָרִים
  english_pob_choice: the remaining
  chosen_spanish: restantes
  alternatives_spanish:
  - que quedaron
  - los que quedaban
  lexicon: HALOT
  rationale: '''Restantes'' reproduce el valor de resto/remanente de manera concisa y formal, acorde con una lista de repartos territoriales.'
- source_word: מִ/מִּשְׁפַּ֣חַת
  english_pob_choice: from the families of
  chosen_spanish: de las familias de
  alternatives_spanish:
  - de la familia de
  - de los clanes de
  lexicon: HALOT
  rationale: '''Familias'' refleja el sentido de grupo/clan de מִשְׁפָּחָה sin forzar un tecnicismo innecesario.'
- source_word: הַ/מַּטֶּה
  english_pob_choice: the tribe
  chosen_spanish: la media tribu
  alternatives_spanish:
  - la tribu
  - el medio tribu
  lexicon: HALOT
  rationale: En este contexto de distribución territorial, מַטֶּה es 'tribu'. Como el hebreo inmediato aclara 'la mitad de Manasés', el español se vuelve más natural si integra la idea como 'media tribu'.
- source_word: מִֽ֠/מַּחֲצִית מַטֵּ֨ה חֲצִ֧י מְנַשֶּׁה
  english_pob_choice: from the half-tribe, the half of Manasseh
  chosen_spanish: de la media tribu de Manasés
  alternatives_spanish:
  - de la mitad de la tribu de la mitad de Manasés
  - de la mitad de Manasés
  lexicon: HALOT
  rationale: 'El hebreo es formulístico y algo redundante. El español puede expresar la misma referencia de modo claro: la media tribu de Manasés. Se preserva la identificación territorial sin duplicar innecesariamente ''mitad''.'
- source_word: בַּ/גּוֹרָל
  english_pob_choice: by lot
  chosen_spanish: por sorteo
  alternatives_spanish:
  - por suerte
  - echando suertes
  lexicon: HALOT
  rationale: '''Por sorteo'' comunica la asignación aleatoria/legal de forma comprensible en español moderno y mantiene el sentido de distribución por lotes.'
- source_word: עָרִים עָֽשֶׂר
  english_pob_choice: ten cities were given
  chosen_spanish: les tocaron diez ciudades
  alternatives_spanish:
  - se les dieron diez ciudades
  - diez ciudades les fueron asignadas
  lexicon: HALOT
  rationale: El hebreo es elíptico; el español debe suplir el verbo de reparto. 'Les tocaron' refleja bien la idea de asignación por suerte/sorteo y evita una traducción demasiado pesada.
theological_decisions:
- issue: Referencia a la 'media tribu de Manasés' en vez de una repetición literal de 'tribu/mitad/mitad'
  english_pob_reading: The English POB preserves the source formula enough to remain auditable while clarifying that it refers to the half-tribe of Manasseh.
  chosen_spanish_reading: '''De la media tribu de Manasés'' mantiene la identificación correcta de la porción territorial y evita una duplicación confusa en español.'
  alternative_spanish_readings:
  - '''De la mitad de la tribu de la mitad de Manasés'''
  - '''De la mitad de Manasés'''
  rationale: No hay cambio doctrinal; la decisión es de claridad textual. El hebreo es formulaico y repetitivo, pero en español una repetición literal oscurecería más de lo que aclararía. La redacción elegida conserva el referente histórico-tribal sin añadir interpretación.
  doctrine_reference: N/A (decisión de claridad textual, no doctrinal)
translation_notes:
  revision_awareness: 'El inglés revisado simplificó la fórmula a ''from the families of the half-tribe, the half of Manasseh'' para reflejar mejor el hebreo sin redundancia. La versión española sigue esa misma línea de revisión: conserva la referencia a Manasés y a la media tribu, pero evita la repetición literal que en español resultaría menos clara.'
  spanish_consistency_notes:
  - Se usa 'Coat' como forma bíblica hispana estándar para קְהָת.
  - '''Media tribu de Manasés'' se emplea de manera consistente para la expresión formulaica del hebreo.'
  - '''Por sorteo'' mantiene la idea de asignación por lotes sin introducir una explicación adicional en el texto principal.'
