revisions:
- from: Porque Yahvé pleiteará por ellos, y quitará la vida a quienes los despojan[a].
  to: Porque Yahvé defenderá su causa, y despojará de la vida a los que los despojan[a].
  rationale: 'La revisión hace dos reparaciones pequeñas pero importantes: explicita «su causa» para reflejar el cognado forense יָרִיב רִיבָם, y conserva la repetición de la raíz קבע con «despojará ... despojan», en línea con la justificación léxica documentada en el POB inglés. El resultado sigue siendo natural y claro en español e intensifica la justicia poética del proverbio.'
