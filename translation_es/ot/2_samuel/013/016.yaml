translation:
  language: es
  text: 'Pero ella le dijo[a]: «No, porque esta gran maldad de echarme fuera es mayor que la otra que me hiciste». Pero él no quiso escucharla.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «No hagas eso, porque esta gran maldad —echarme fuera— es mayor que la otra que me hiciste». El hebreo es condensado y difícil, por lo que el español debe suavizar la sintaxis.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר ל֗וֹ / ל֗וֹ
  english_pob_choice: But she said to him
  chosen_spanish: Pero ella le dijo
  alternatives_spanish:
  - Y ella le dijo
  - Pero le respondió
  lexicon: HALOT
  rationale: El dativo pronominal se expresa naturalmente con «le». Conservé el giro narrativo simple del hebreo y del POB, sin añadir parentescos ni explicaciones no presentes en el texto.
- source_word: אַל
  english_pob_choice: 'No'
  chosen_spanish: 'No'
  alternatives_spanish:
  - No hagas eso
  - No, no
  lexicon: HALOT
  rationale: Aquí funciona como objeción enfática en diálogo directo, no como una prohibición desarrollada. «No» reproduce mejor la protesta breve y abrupta de Tamar.
- source_word: אוֹדֹת
  english_pob_choice: for / because of
  chosen_spanish: porque
  alternatives_spanish:
  - por
  - a causa de
  lexicon: HALOT
  rationale: El término introduce la base de la objeción. En español, «porque» comunica con naturalidad la relación causal implícita sin sobrecargar la sintaxis.
- source_word: הָרָעָה הַגְּדוֹלָה הַזֹּאת
  english_pob_choice: this great wrong
  chosen_spanish: este gran mal
  alternatives_spanish:
  - esta gran injusticia
  - este gran daño
  lexicon: HALOT
  rationale: רָעָה puede abarcar mal, daño o maldad; el POB optó por «wrong» en sentido moral-jurídico. En español, «mal» mantiene esa amplitud y evita una interpretación demasiado técnica de «injusticia».
- source_word: מֵאַחֶרֶת
  english_pob_choice: greater than the other
  chosen_spanish: mayor que el otro
  alternatives_spanish:
  - más grande que el otro
  - superior al otro
  lexicon: HALOT
  rationale: La comparación hebrea es comprimida. «Mayor que el otro» conserva la relación comparativa sin añadir sustantivos ausentes, como «maldad» o «ofensa».
- source_word: אֲשֶׁר עָשִׂיתָ עִמִּי לְשַׁלְּחֵנִי
  english_pob_choice: that you did to me / of sending me away
  chosen_spanish: de echarme
  alternatives_spanish:
  - de despedirme
  - de enviarme lejos
  lexicon: HALOT
  rationale: El infinitivo con sufijo expresa la acción de expulsar/despedir. «Echarme» es una solución breve y natural que conserva el gesto violento del despido forzado; la comparación con «el otro que me hiciste» deja explícita la referencia al acto anterior.
- source_word: וְלֹא אָבָה לִשְׁמֹעַ לָהּ
  english_pob_choice: But he would not listen to her
  chosen_spanish: Pero él no quiso escucharla
  alternatives_spanish:
  - Pero no estuvo dispuesto a escucharla
  - Y él no quiso oírla
  lexicon: HALOT
  rationale: אָבָה expresa voluntad/negativa de querer. «No quiso» preserva la negativa voluntaria, y «escucharla» sigue el valor relacional de oír con atención a su ruego.
translation_notes:
  revision_awareness: 'Se incorporó la corrección del POB inglés revisado: se omitió cualquier equivalente de «my brother» y se mantuvo la estructura breve del reproche. La puntuación se ajustó para que el marcador de nota aparezca exactamente en el punto de habla directa.'
  spanish_consistency_notes:
  - Se prefirió un registro bíblico moderno, claro y sobrio.
  - Se evitó «SEÑOR» y no aplica aquí ninguna sustitución de YHWH.
  - No se introdujo «hermano», siguiendo la revisión inglesa más reciente.
  - «Mal» se dejó sin domesticar hacia «injusticia» para no forzar una precisión ajena al hebreo comprimido.
