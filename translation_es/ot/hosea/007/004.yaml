revisions:
- from: Todos ellos son adúlteros[a], como un horno encendido por un panadero[b][c], que deja de revolver desde que se amasa la masa hasta su fermentación.
  to: Todos ellos son adúlteros[a], como un horno encendido por un panadero[b][c], que deja de avivarlo desde el amasado de la masa hasta su fermentación.
  rationale: 'La revisión es menor: sustituye «revolver» por «avivarlo», que encaja mejor con el horno y preserva la nota léxica del verbo difícil; además, cambia «desde que se amasa la masa» por «desde el amasado de la masa» para eliminar redundancia y reflejar mejor el sintagma hebreo temporal.'
