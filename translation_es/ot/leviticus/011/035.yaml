review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo: cualquier objeto sobre el que caiga parte de la carcasa del animal impuro queda impuro; horno y hogar/fogón deben ser destruidos; y se consideran impuros para Israel. Sin embargo, hay dos ajustes importantes: (1) «cadáver» es aceptable pero menos preciso que «carcasa» en un contexto de impureza animal; (2) «será demolido» suena demasiado arquitectónico para תנור וכירים y no refleja tan bien la obligación de deshacer/quebrar la instalación contaminada como «deberá ser destruido» o similar.'
  spanish_quality_summary: El español es mayormente claro y digno, pero «impuros son» resulta algo forzado en español moderno; «son impuros» suena más natural sin perder el énfasis legal. También conviene evitar «demolido» por naturalidad contextual. «Fogón» funciona bien para כירים con la nota cultural.
  glossary_alignment: No hay términos del glosario mayor en juego como Yahvé/Mesías. La terminología de pureza se mantiene correctamente con «impuro». La principal decisión léxica a corregir es נבלה, mejor como «carcasa» en este contexto levítico de animal muerto, y יֻתָּץ, mejor como «deberá ser destruido» que «será demolido».
  issues:
  - severity: medium
    issue: נִּבְלָתָם traducido como «su cadáver»
    rationale: Aunque comprensible, «cadáver» en español es más amplio y suele asociarse naturalmente a humanos. En leyes de impureza sobre animales, «carcasa» preserva mejor el matiz de animal muerto y alinea mejor con la decisión auditada en inglés («their carcass»).
  - severity: medium
    issue: יֻתָּץ traducido como «será demolido»
    rationale: «Demoler» en español se usa más para edificios o construcciones grandes. Aquí se trata de un horno o instalación de cocina contaminada que debe ser deshecha/rota. «Deberá ser destruido» o «deberá ser derribado» refleja mejor la obligación legal y el objeto referido.
  - severity: low
    issue: Orden «impuros son»
    rationale: Imita el hebreo, pero en español moderno suena algo rígido y poco natural. «Son impuros» mantiene fidelidad y legibilidad eclesial amplia.
  revised_spanish_text: Y cualquier cosa sobre la cual caiga parte de su carcasa[a] quedará impura. Sea horno o fogón[b], deberá ser destruido; son impuros, y serán impuros para ustedes.
