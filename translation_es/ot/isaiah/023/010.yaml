translation:
  language: es
  text: Atraviesa[a] tu tierra como el Nilo, hija de Tarsis; ya no hay freno[b] alguno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Pasa por tu tierra como el Nilo», o «Extiéndete sobre tu tierra como el Nilo». El verbo hebreo puede denotar cruzar o pasar; el símil del Nilo sugiere una expansión desbordante.'
    reason: lexical_alternative
  - marker: b
    text: El raro término hebreo también puede entenderse como «puerto», «barrera» o «amarras». La idea general es que Tarsis ya no está contenida ni sujeta.
    reason: lexical_alternative
lexical_decisions:
- source_word: עִבְרִ֥י
  english_pob_choice: Pass through
  chosen_spanish: Pasa por
  alternatives_spanish:
  - Cruza
  - Atraviesa
  - Pasa a través de
  lexicon: HALOT
  rationale: El verbo עבר aquí es un imperativo femenino singular. En español, «pasa por» conserva la acción de atravesar la tierra sin convertirla en una imagen más interpretativa que el hebreo. Se evita «desborda» porque el POB inglés revisado preserva la estructura verbal + símil, no una equivalencia plena con el Nilo.
- source_word: אַרְצֵךְ
  english_pob_choice: your land
  chosen_spanish: tu tierra
  alternatives_spanish:
  - tu país
  - tu territorio
  lexicon: HALOT
  rationale: ארץ con sufijo 2fs se traduce naturalmente como «tu tierra». «Tierra» es directo, amplio y poético, y mantiene el paralelismo del hebreo.
- source_word: כַּיְאֹר
  english_pob_choice: like the Nile
  chosen_spanish: como el Nilo
  alternatives_spanish:
  - como un río
  - como el río Nilo
  lexicon: HALOT
  rationale: יאר en este contexto evoca de manera específica el Nilo. En español, «como el Nilo» conserva esa referencia cultural e imagística sin necesidad de ampliar la frase.
- source_word: בַּת תַּרְשִׁישׁ
  english_pob_choice: daughter of Tarshish
  chosen_spanish: hija de Tarsis
  alternatives_spanish:
  - hija de Tarshish
  - pueblo de Tarsis
  lexicon: HALOT
  rationale: La fórmula profética personifica a una ciudad o pueblo. «Hija de Tarsis» preserva el giro metafórico y es la forma natural en español bíblico para este tipo de apelativo.
- source_word: אֵין
  english_pob_choice: there is no
  chosen_spanish: ya no hay
  alternatives_spanish:
  - no hay
  - no existe
  lexicon: HALOT
  rationale: La negación existencial se expresa con naturalidad en español como «ya no hay» cuando עוד marca el cese de una condición anterior. Esto comunica bien la idea de que la restricción ha cesado.
- source_word: מֵזַח
  english_pob_choice: restraint
  chosen_spanish: restricción
  alternatives_spanish:
  - barrera
  - muelle
  - amarras
  - freno
  lexicon: HALOT
  rationale: מזח es raro y de sentido incierto. El POB inglés eligió «restraint» por el valor general de algo que contiene o limita. En español, «restricción» mantiene esa amplitud semántica sin forzar una opción concreta como «muelle» o «amarras».
- source_word: עוֹד
  english_pob_choice: anymore
  chosen_spanish: alguna
  alternatives_spanish:
  - ya
  - más
  lexicon: HALOT
  rationale: Con la negación, עוד indica cese continuo o durativo. En español, «ya no hay ... alguna» refuerza el valor de «anymore» y produce una frase idiomática y fluida.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que corrigió «Overflow your land like the Nile» a «Pass through your land like the Nile» para preservar la estructura verbal + símil del hebreo y evitar redundancia interpretativa. La versión española sigue esa decisión, usando un verbo de paso y dejando el matiz de expansión en la comparación con el Nilo.
  spanish_consistency_notes:
  - Se usó «Tarsis» para la forma toponímica española estándar del nombre propio bíblico.
  - Se evitó «SEÑOR» u otros sustitutos, porque no aparece el Tetragrámaton en este versículo.
  - Se mantuvo un estilo bíblico claro y contemporáneo, sin depender de giros arcaizantes.
  - La puntuación respeta el paralelismo poético y el cierre enfático del hebreo.
