translation:
  language: es
  text: 'Entonces interrogamos a estos ancianos, diciendo: «¿Quién les dio la orden de construir esta casa[b] y—»[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El texto griego de este versículo, tal como lo preserva Swete, termina abruptamente con «y», lo que indica que la oración continúa en el versículo siguiente. Se conserva el corte sin suavizarlo.
    reason: textual_variant
  - marker: b
    text: «Esta casa» se refiere al templo de Jerusalén.
    reason: cultural_note
lexical_decisions:
- source_word: ἐπυνθανόμεθα
  english_pob_choice: we questioned
  chosen_spanish: interrogamos
  alternatives_spanish:
  - preguntamos
  - cuestionamos
  lexicon: LSJ
  rationale: El imperfecto medio expresa una acción de averiguar información. En español, «interrogamos» conserva mejor el tono formal y oficial del contexto investigador que «preguntamos», sin perder naturalidad.
- source_word: τῶν πρεσβυτέρων τούτων
  english_pob_choice: these elders
  chosen_spanish: estos ancianos
  alternatives_spanish:
  - estos mayores
  - estos líderes
  lexicon: LSJ
  rationale: πρεσβύτεροι aquí designa a los dirigentes reconocidos del pueblo. «Ancianos» reproduce ese valor institucional en español bíblico y evita reducirlo a simple edad. Aunque «líderes» sería más explicativo, desplaza el matiz social del término.
- source_word: Τίνος ὑμῖν προστάξαντος
  english_pob_choice: Who commanded you
  chosen_spanish: ¿Quién les dio la orden? / ¿quién les mandó?
  alternatives_spanish:
  - ¿Quién les comandó?
  - ¿Por orden de quién?
  lexicon: LSJ
  rationale: El genitivo absoluto pregunta por la autoridad detrás de la acción. «Les dio la orden» mantiene la idea de autorización delegada en un español claro; «mandó» es también posible, pero «dio la orden» conserva mejor el matiz administrativo del pasaje. En el texto se eligió una formulación directa con «la orden» para no oscurecer el sujeto implícito.
- source_word: οἰκοδομεῖτε
  english_pob_choice: to build
  chosen_spanish: construir
  alternatives_spanish:
  - edificar
  - reconstruir
  lexicon: LSJ
  rationale: El griego dice simplemente «construir», no «reconstruir». «Construir» es la opción más directa y fiel; «edificar» sería más solemne, pero menos neutral en español moderno.
- source_word: τὸν οἶκον τοῦτον
  english_pob_choice: this house
  chosen_spanish: esta casa
  alternatives_spanish:
  - este templo
  - este edificio
  lexicon: LSJ
  rationale: οἶκος significa literalmente «casa». Aunque el contexto se refiere al templo de Jerusalén, en esta línea el griego conserva la forma «casa»; por eso se mantiene, y la nota aclara el referente contextual sin reemplazar la imagen del texto.
theological_decisions:
- issue: Referente de «esta casa»
  english_pob_reading: '''This house'' refers to the temple in Jerusalem.'
  chosen_spanish_reading: «Esta casa» se refiere al templo de Jerusalén.
  alternative_spanish_readings:
  - «esta casa» = «este templo»
  - «esta casa» = el santuario
  rationale: Se conserva la metáfora literal «casa» en el cuerpo del texto, pero se aclara en nota que el referente es el templo. Así se respeta el término griego y la identificación contextual sin introducir una paráfrasis interpretativa en el verso.
  doctrine_reference: 1 Esdras 6:10; cf. uso bíblico de οἶκος para el templo
- issue: Final abrupto del versículo
  english_pob_reading: The Greek text of this verse, as preserved in Swete, ends abruptly with 'and,' indicating that the sentence continues in the next verse.
  chosen_spanish_reading: El texto griego termina abruptamente con «y—», indicando que la oración continúa en el versículo siguiente.
  alternative_spanish_readings:
  - suavizar el cierre y completar la frase
  - omitir la conjunción final
  rationale: Se conserva el final incompleto para reflejar el testimonio textual de Swete. En español, el guion largo comunica mejor la interrupción que una puntuación cerrada.
  doctrine_reference: Crítica textual de 1 Esdras 6:10 (Swete LXX 1909)
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió «commanded you» por encima de una redacción más suave. Por eso el español adopta una formulación formal y directa («les dio la orden») y conserva el final incompleto del griego en lugar de normalizarlo.
  spanish_consistency_notes:
  - Se mantiene «ancianos» para πρεσβύτεροι conforme al uso institucional del término.
  - Se mantiene «construir» para οἰκοδομεῖτε, sin introducir «reconstruir» porque el griego no lo especifica.
  - Se conserva «casa» para οἶκος, con nota aclaratoria sobre el templo de Jerusalén.
  - La frase final queda abierta con raya larga para reflejar el corte textual del manuscrito griego.
