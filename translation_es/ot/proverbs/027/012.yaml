translation:
  language: es
  text: El prudente ve el peligro y se esconde[a]; pero los simples pasan y sufren por ello.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «son castigados». El hebreo puede expresar sufrir una pena o cargar con las consecuencias.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָרוּם
  english_pob_choice: prudent man
  chosen_spanish: el prudente
  alternatives_spanish:
  - el sagaz
  - el sensato
  - el astuto
  lexicon: HALOT
  rationale: En Proverbios, el término tiene un matiz positivo de prudencia y buen juicio. En español, «prudente» conserva esa valoración positiva sin sugerir la astucia negativa que podría implicar «astuto».
- source_word: רָאָה
  english_pob_choice: sees
  chosen_spanish: ve
  alternatives_spanish:
  - ha visto
  - percibe
  lexicon: HALOT
  rationale: 'El perfecto hebreo funciona aquí de modo proverbial/general; el presente español expresa mejor la verdad habitual: la persona prudente reconoce el peligro cuando aparece.'
- source_word: רָעָה
  english_pob_choice: danger
  chosen_spanish: el peligro
  alternatives_spanish:
  - el mal
  - el daño
  - la calamidad
  lexicon: HALOT
  rationale: Aunque el sustantivo puede abarcar mal, daño o calamidad, en este dicho sapiencial la referencia es a un mal que se ve venir y del cual uno se aparta. «Peligro» es natural en español y preserva el sentido práctico.
- source_word: נִסְתָּר
  english_pob_choice: hides himself
  chosen_spanish: se esconde
  alternatives_spanish:
  - se oculta
  - busca refugio
  lexicon: HALOT
  rationale: El nifal expresa apartarse o ponerse fuera de vista en respuesta al peligro. «Se esconde» mantiene la acción reflexiva y suena idiomático en español.
- source_word: פְּתָאיִם
  english_pob_choice: the simple
  chosen_spanish: los simples
  alternatives_spanish:
  - los ingenuos
  - los ingenuos e incautos
  - los necios
  lexicon: HALOT
  rationale: Es un término sapiencial para los inexpertos y poco discernientes. «Los simples» conserva la terminología tradicional y el contraste con «el prudente».
- source_word: עָבְרוּ
  english_pob_choice: pass on
  chosen_spanish: pasan
  alternatives_spanish:
  - siguen adelante
  - pasan de largo
  - continúan
  lexicon: HALOT
  rationale: El verbo contrapone el movimiento continuo de los simples con la retirada prudente. «Pasan» comunica bien ese avance sin añadir matices innecesarios.
- source_word: נֶעֱנָשׁוּ
  english_pob_choice: suffer for it
  chosen_spanish: sufren por ello
  alternatives_spanish:
  - son castigados
  - pagan la pena
  - sufren la consecuencia
  lexicon: HALOT
  rationale: El nifal puede expresar ser penalizado o cargar con las consecuencias. «Sufren por ello» preserva la ambigüedad entre pena formal y consecuencia sufrida, igual que la nota inglesa.
translation_notes:
  revision_awareness: El borrador sigue el acuerdo alto del control cruzado y conserva la tensión léxica del final del versículo entre castigo formal y consecuencia sufrida, tal como indica la nota inglesa.
  spanish_consistency_notes:
  - Se mantuvo «el prudente» para עָרוּם, evitando «astuto» por su posible carga negativa en español.
  - Se tradujo רָעָה como «peligro», coherente con el sentido sapiencial de daño inminente.
  - Se conservó la alternativa de nota sobre נֶעֱנָשׁוּ para reflejar la ambigüedad semántica señalada en el expediente inglés.
  - Se usó un estilo bíblico moderno y claro, sin sustituir el vocabulario técnico del proverbio por paráfrasis libres.
