translation:
  language: es
  text: Estos buscaron su registro entre los inscritos por genealogía[a], pero no fueron encontrados allí, y fueron excluidos del sacerdocio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «fueron considerados descalificados del sacerdocio» o «fueron tenidos por impuros para el sacerdocio». El verbo hebreo puede expresar que se los trató como no aptos para el estado sacerdotal porque no pudo verificarse su genealogía.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  english_pob_choice: These
  chosen_spanish: Estos
  alternatives_spanish:
  - Estas personas
  - Estos hombres
  lexicon: HALOT
  rationale: El demostrativo plural retoma a los aspirantes al sacerdocio del contexto previo. «Estos» es natural en español y conserva la referencia inmediata sin añadir información.
- source_word: בִּקְשׁוּ
  english_pob_choice: sought
  chosen_spanish: buscaron
  alternatives_spanish:
  - sintieron
  - consultaron
  - buscaron su registro
  lexicon: HALOT
  rationale: El verbo expresa la acción de procurar o buscar. En español, «buscaron» comunica con claridad la diligencia por localizar el documento requerido.
- source_word: כְתָבָם
  english_pob_choice: their record
  chosen_spanish: su registro
  alternatives_spanish:
  - su documento
  - su escrito
  - su acta
  lexicon: HALOT
  rationale: En este contexto administrativo-genealógico, «registro» transmite mejor la prueba escrita oficial que «documento» o «acta», sin precisar más de lo que el hebreo dice.
- source_word: הַמִּתְיַחְשִׂים
  english_pob_choice: among those enrolled by genealogy
  chosen_spanish: entre los inscritos por genealogía
  alternatives_spanish:
  - en el registro genealógico
  - entre los registrados por ascendencia
  - entre los anotados por genealogía
  lexicon: HALOT
  rationale: La forma hitpael de יחס apunta a establecer o inscribirse por linaje. «Inscritos por genealogía» conserva el valor administrativo y la relación con el registro donde se buscó el documento.
- source_word: וְלֹא נִמְצָאוּ
  english_pob_choice: but they were not found
  chosen_spanish: pero no fueron hallados
  alternatives_spanish:
  - pero no se los encontró
  - pero no aparecieron
  lexicon: HALOT
  rationale: El pasivo hebreo puede traducirse de manera directa. «No fueron hallados» mantiene la estructura y suena idiomático en español.
- source_word: וַיְגֹאֲלוּ
  english_pob_choice: they were excluded
  chosen_spanish: fueron excluidos
  alternatives_spanish:
  - fueron descalificados
  - fueron considerados impuros
  - fueron apartados
  lexicon: HALOT
  rationale: 'El contexto muestra la consecuencia administrativa: se les impidió ejercer el sacerdocio porque no pudo verificarse su genealogía. «Fueron excluidos» expresa ese resultado sin sobredeterminar el matiz ritual.'
- source_word: מִן הַכְּהֻנָּה
  english_pob_choice: from the priesthood
  chosen_spanish: del sacerdocio
  alternatives_spanish:
  - de la función sacerdotal
  - de servir como sacerdotes
  - del ministerio sacerdotal
  lexicon: HALOT
  rationale: «Sacerdocio» es la manera más directa de expresar כְּהֻנָּה en español y conserva el ámbito institucional al que fueron excluidos.
theological_decisions:
- issue: Matiz de וַיְגֹאֲלוּ en relación con la aptitud sacerdotal
  english_pob_reading: they were excluded from the priesthood
  chosen_spanish_reading: fueron excluidos del sacerdocio
  alternative_spanish_readings:
  - fueron considerados descalificados para el sacerdocio
  - fueron tenidos por impuros para el sacerdocio
  - fueron apartados del sacerdocio
  rationale: El verbo puede implicar impureza o descalificación, pero el resultado narrativo inmediato es que no se les admitió al oficio sacerdotal por falta de verificación genealógica. «Excluidos» preserva el efecto práctico sin añadir una formulación doctrinal más fuerte que el texto no exige.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: El pasaje muestra acuerdo general con el inglés POB auditado. La única zona sensible es וַיְגֹאֲלוּ, donde el inglés optó por «excluded» para reflejar el resultado administrativo; el español mantiene esa decisión y conserva en nota las alternativas de descalificación/impureza documentadas en el audit trail.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usó «sacerdocio» para כְּהֻנָּה, coherente con el registro institucional del pasaje.
  - Se evitó «SEÑOR» y también una paráfrasis explicativa en el cuerpo del texto para no borrar la tensión entre impureza y descalificación señalada por el inglés POB.
