translation:
  language: es
  text: Vuestros padres[a], ¿dónde están? Y los profetas, ¿viven para siempre?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vuestros antepasados». El hebreo dice literalmente «vuestros padres».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲבֹתֵיכֶם
  english_pob_choice: your fathers
  chosen_spanish: vuestros padres
  alternatives_spanish:
  - vuestros antepasados
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo familiar masculino plural con sufijo de 2.ª persona plural. «Padres» conserva la literalidad y la fuerza retórica del contraste generacional. «Antepasados» es posible, pero suaviza el eco del hebreo.
- source_word: אַיֵּה
  english_pob_choice: where
  chosen_spanish: ¿dónde?
  alternatives_spanish:
  - ¿dónde están?
  lexicon: HALOT
  rationale: El adverbio interrogativo pide una pregunta de ubicación; en español se expresa con naturalidad mediante «¿dónde?», y el verbo de ser/estar se sobreentiende por el contexto.
- source_word: הֵם
  english_pob_choice: they
  chosen_spanish: están
  alternatives_spanish:
  - son
  lexicon: HALOT
  rationale: El pronombre enfático hebreo queda integrado en la pregunta española como verbo implícito de estado/ubicación. Añadir «están» hace la pregunta idiomática sin cambiar el sentido.
- source_word: וְהַנְּבִאִים
  english_pob_choice: And the prophets
  chosen_spanish: Y los profetas
  alternatives_spanish:
  - Y en cuanto a los profetas
  lexicon: HALOT
  rationale: Se conserva la coordinación simple del hebreo y el paralelismo con la primera cláusula. «Los profetas» mantiene el término técnico sin reemplazarlo por una paráfrasis.
- source_word: הַלְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - perpetuamente
  lexicon: HALOT
  rationale: La pregunta idiomática sobre duración indefinida se expresa de modo natural como «para siempre». Mantiene el valor de duración continua del hebreo.
- source_word: יִחְיוּ
  english_pob_choice: do they live
  chosen_spanish: viven
  alternatives_spanish:
  - vivirán
  - siguen viviendo
  lexicon: HALOT
  rationale: 'En una pregunta retórica, el presente español transmite bien la fuerza gnómica/general: si siguen vivos indefinidamente. «Vivirán» sería posible, pero menos natural aquí.'
theological_decisions:
- issue: Mortalidad de los padres y de los profetas
  english_pob_reading: The verse states that both the ancestors and the prophets are mortal; it does not imply the prophets' message failed or expired.
  chosen_spanish_reading: El versículo afirma que tanto los padres como los profetas son mortales; no sugiere que el mensaje profético haya fracasado o desaparecido.
  alternative_spanish_readings:
  - El versículo podría entenderse como una simple contraposición entre generaciones fallecidas y profetas que también murieron.
  rationale: La forma interrogativa retórica apunta a la mortalidad humana. La traducción no debe cargar el verso con la explicación teológica que pertenece al contexto inmediato posterior (v. 6).
  doctrine_reference: Preservar la tensión textual y el contexto inmediato; primacía del hebreo original sobre una armonización doctrinal excesiva.
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas en el paquete de auditoría; el pasaje presenta alto acuerdo entre traducciones y revisión externa, así que se mantiene la lectura principal sin cambios.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - «Profetas» se conserva como término técnico sin sustituirlo por «mensajeros» u otra glosa.
  - La pregunta retórica en español conserva la estructura de dos cláusulas paralelas y no añade explicaciones interpretativas al texto principal.
