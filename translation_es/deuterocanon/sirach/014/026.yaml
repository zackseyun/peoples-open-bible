translation:
  language: es
  text: Pone su nido[a] en su follaje, y se aloja entre sus ramas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «Pone a sus hijos en su refugio, y se aloja bajo sus ramas». El hebreo dice «su nido» y «en su follaje».'
    reason: alternative_reading
lexical_decisions:
- source_word: וְיָשִׂים
  english_pob_choice: He sets
  chosen_spanish: Pone
  alternatives_spanish:
  - Coloca
  - Sitúa
  - Pone su nido
  lexicon: HALOT
  rationale: El verbo básico de שׂים es 'poner/colocar'. En español, 'pone' comunica la acción concreta sin forzar un registro técnico ni añadir matices no presentes en el hebreo.
- source_word: קִנּוֹ
  english_pob_choice: his nest
  chosen_spanish: su nido
  alternatives_spanish:
  - su morada
  - su vivienda
  - su cría
  lexicon: HALOT
  rationale: El hebreo indica literalmente 'nido'. Se conserva esa imagen arbórea y zoológica, que encaja con el contexto y con la lectura hebrea principal del testimonio.
- source_word: בְעָפְיָהּ
  english_pob_choice: in her foliage
  chosen_spanish: en su follaje
  alternatives_spanish:
  - en sus hojas
  - en su ramaje
  - en su espesura
  lexicon: HALOT
  rationale: עֹף/עָפֶה aquí apunta al follaje o masa de hojas. 'Follaje' es natural en español y mantiene la imagen vegetal del texto. El posesivo femenino se conserva con 'su' porque se refiere al árbol/personificación femenina del verso.
- source_word: וּבַעֲנָפֶיהָ
  english_pob_choice: among her branches
  chosen_spanish: entre sus ramas
  alternatives_spanish:
  - en sus ramas
  - bajo sus ramas
  - entre sus boughs
  lexicon: HALOT
  rationale: ענף significa 'rama'. 'Entre sus ramas' expresa con claridad el espacio acogedor del árbol y sugiere resguardo dentro de la copa, sin imponer la versión griega 'bajo' como texto principal.
- source_word: יִתְלוֹנָן
  english_pob_choice: lodges
  chosen_spanish: se aloja
  alternatives_spanish:
  - pasa la noche
  - se hospeda
  - habita
  lexicon: HALOT
  rationale: El verbo comunica alojarse o pasar la noche. 'Se aloja' es idiomático en español y conserva el sentido de permanencia temporal ligado a la imagen del nido y las ramas.
theological_decisions:
- issue: Prioridad del testimonio hebreo frente al paralelo griego en Sirácides
  english_pob_reading: The main text follows the Hebrew witness, with the Greek parallel preserved in a footnote as an alternative reading.
  chosen_spanish_reading: El texto principal sigue el hebreo, con la variante griega consignada en nota.
  alternative_spanish_readings:
  - 'Seguir la imagen griega: ''Pone a sus hijos en su refugio, y se aloja bajo sus ramas.'''
  - Fusionar hebreo y griego en el texto principal.
  rationale: Sirácides conserva aquí un hebreo claro y coherente. Conforme a la filosofía del proyecto, el hebreo gobierna el texto principal y el griego funciona como control auditado. La diferencia de imagen ('nido' / 'sus hijos', 'follaje' / 'refugio', 'entre' / 'bajo') se mantiene visible en nota para no borrar la tensión documental.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde Sirácides lo preserve; usar el griego como paralelo de control.'
translation_notes:
  revision_awareness: No se aplicaron revisiones posteriores; el pase más reciente indica que no había cambios necesarios y el acuerdo hebreo/griego fue alto. La redacción española mantiene esa línea sin introducir harmonización no documentada.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' en otros contextos del proyecto, pero aquí no aparece el nombre divino.
  - '''Nido'' se mantiene en sentido literal para respetar el hebreo, y la alternativa griega se deja en nota.'
  - '''Follaje'' y ''ramas'' reproducen la imaginería arbórea sin modernizarla en exceso.'
  - El posesivo femenino 'su' refleja la personificación arbórea del contexto.
