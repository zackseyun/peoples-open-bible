  - 영혼을 의탁하게
  lexicon: BDAG
  rationale: παρατίθημι의 「위탁함·맡김」을 「맡기다」로 옮긴다 (눅 23:46의 예수의 말씀과 동일 어휘).
- source_word: πιστῷ κτίστῃ
  english_pob_choice: a faithful Creator
  chosen_korean: 신실하신 창조주
  alternatives_korean:
