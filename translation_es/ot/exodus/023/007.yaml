translation:
  language: es
  text: Mantente lejos de un asunto falso[a], y no mates al inocente y al justo, porque no justificaré al malvado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “de una acusación falsa” o “de una mentira”. El hebreo דָּבָר es amplio y puede referirse a una palabra, un asunto o un caso legal con testimonio engañoso.'
    reason: lexical_alternative
  - marker: b
    text: 'O: “no absolveré al culpable” o “no declararé justo al malvado”. El verbo hebreo es forense y puede significar “declarar justo”, “justificar” o “absolver”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִדְּבַר שֶׁקֶר
  english_pob_choice: from a false matter
  chosen_spanish: de un asunto falso
  alternatives_spanish:
  - de una palabra falsa
  - de una acusación falsa
  - de una mentira
  lexicon: HALOT
  rationale: דָּבָר abarca ‘palabra’, ‘asunto’, ‘caso’ o ‘materia’. En este contexto legal, ‘asunto’ conserva mejor la amplitud que ‘acusación’, y ‘falso’ mantiene el valor de שֶׁקֶר sin estrecharlo a una sola forma de engaño.
- source_word: תִּרְחָק
  english_pob_choice: Keep far
  chosen_spanish: Aléjate
  alternatives_spanish:
  - Mantente lejos
  - Mantente apartado
  - Aléjate de
  lexicon: HALOT
  rationale: El verbo qal en segunda persona singular funciona como mandato. ‘Aléjate’ transmite con naturalidad la fuerza imperativa y la idea de separación activa, sin perder el sentido de distancia moral o legal.
- source_word: וְנָקִי
  english_pob_choice: the innocent
  chosen_spanish: el inocente
  alternatives_spanish:
  - el limpio de culpa
  - el sin culpa
  - el blameless
  lexicon: HALOT
  rationale: נָקִי suele significar alguien libre de culpa o inocente. ‘Inocente’ es la opción legal-moral más clara y natural en español contemporáneo.
- source_word: וְצַדִּיק
  english_pob_choice: the righteous
  chosen_spanish: el justo
  alternatives_spanish:
  - el recto
  - el justo en su causa
  - el righteous
  lexicon: HALOT
  rationale: צַדִּיק pertenece al campo de צדק y puede significar ‘justo’ o ‘recto’. ‘Justo’ conserva la relación léxica con ese campo y encaja bien en el marco judicial del versículo.
- source_word: אַֽל תַּהֲרֹג
  english_pob_choice: do not kill
  chosen_spanish: no mates
  alternatives_spanish:
  - no asesines
  - no derrames sangre de
  - no quites la vida
  lexicon: HALOT
  rationale: הרג es el verbo general ‘matar/asesinar’. ‘No mates’ respeta su amplitud sin introducir la especificación de ‘asesinar’, que sería más estrecha.
- source_word: לֹא אַצְדִּיק
  english_pob_choice: I will not justify
  chosen_spanish: no justificaré
  alternatives_spanish:
  - no absolveré
  - no declararé justo
  - no daré por inocente
  lexicon: HALOT
  rationale: 'El hifil de צדק tiene sentido forense: declarar justo, justificar o absolver. ‘Justificaré’ preserva el vínculo léxico con צַדִּיק/צדק y mantiene la resonancia judicial del original.'
- source_word: רָשָׁע
  english_pob_choice: the wicked
  chosen_spanish: al malvado
  alternatives_spanish:
  - al culpable
  - al impío
  - al malhechor
  lexicon: HALOT
  rationale: רָשָׁע designa al malvado o culpable en contextos morales y legales. ‘Malvado’ es claro en español y conserva el contraste ético-jurídico con ‘inocente’ y ‘justo’.
theological_decisions:
- issue: Sentido forense de la declaración divina
  english_pob_reading: for I will not justify the wicked
  chosen_spanish_reading: porque no justificaré al malvado
  alternative_spanish_readings:
  - porque no absolveré al culpable
  - porque no declararé justo al malvado
  rationale: La frase fundamenta el mandato humano en el carácter judicial de Dios. ‘No justificaré’ preserva la lectura forense y la conexión con la familia léxica de צדק, mientras que ‘absolveré’ queda como alternativa contextual válida.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: 'Se siguió el texto hebreo masorético (WLC) y la auditoría inglesa de POB; no hubo revisiones aplicadas en el pase más reciente. Se mantuvo la equivalencia óptima: un español natural, pero con conservación explícita de la amplitud de דָּבָר y del matiz forense de אַצְדִּיק.'
  spanish_consistency_notes:
  - Se empleó ‘Yahvé’ por defecto en otros contextos del proyecto, pero este versículo no contiene el Tetragrámaton.
  - ‘Justo/justificar’ conserva la familia צדק en español, coherente con la política terminológica del proyecto.
  - ‘Inocente’ y ‘justo’ mantienen el paralelismo moral-jurídico del hebreo sin introducir ‘culpable’ en el texto principal, dejando esa alternativa en nota.
  - Se prefirió ‘no mates’ frente a ‘no asesines’ para no estrechar el alcance del verbo hebreo הרג.
