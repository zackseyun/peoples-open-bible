source:
  edition: SBLGNT
  text: ἐὰν μή τις ⸀μένῃ ἐν ἐμοί, ἐβλήθη ἔξω ὡς τὸ κλῆμα καὶ ἐξηράνθη, καὶ συνάγουσιν αὐτὰ καὶ εἰς τὸ πῦρ βάλλουσιν καὶ καίεται.
base_translation:
  language: en
  yaml_path: translation/nt/john/015/006.yaml
  text: If anyone does not remain in me[a], he is thrown out like the branch and dries up; and they gather them and throw them into the fire[b], and they are burned.
  footnotes:
  - marker: a
    text: Or 'abide in me.' The Greek verb can also be rendered 'abide,' a traditional translation of a key Johannine term meaning to remain or continue.
    reason: lexical_alternative
  - marker: b
    text: The image warns of exclusion and burning, but the verse itself does not specify whether this describes loss of genuine discipleship or exposure of false attachment.
    reason: alternative_reading
translation:
  language: ko
  text: 누구든 내 안에 거하지 않으면, 가지처럼 밖에 던져져 말라 버리고, 사람들이 그것들을 모아 불 속에 던져 태웁니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: μένω의 일관 번역. 요한 신학의 핵심 어휘로 「거하다·지속하다」.
    reason: lexical_alternative
  - marker: b
    text: 본 비유는 배제와 소각의 경고를 담지만, 그것이 참된 제자도의 상실을 가리키는지 거짓 결속의 폭로를 가리키는지 본문 자체는 명시하지 않는다.
    reason: theological_clarification
