  to: 'Así dice Yahvé de los ejércitos, el Dios de Israel: Porque has enviado cartas en tu propio nombre[a] a todo el pueblo que está en Jerusalén, y a Sofonías hijo de Maasías, el sacerdote, y a todos los sacerdotes, diciendo:'
