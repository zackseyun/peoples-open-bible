revisions:
- from: Por tanto[a], tú y toda tu compañía[b], los que se han reunido[c] contra Yahvé[d]—y Aarón, ¿qué es él[e], para que murmuren contra él?
  to: Por tanto, tú y toda tu compañía[a], los que se han reunido contra Yahvé[b]—y Aarón, ¿qué es él[c], para que murmuran contra él?
  rationale: 'Se corrige la forma verbal final para reflejar la 2.ª persona plural del hebreo y evitar la incongruencia gramatical del borrador. Se simplifican las notas a las que realmente aportan algo significativo según la auditoría inglesa y se mantiene la estructura retórica central: la asamblea se ha reunido contra Yahvé, mientras Aarón queda relativizado como blanco secundario de la queja.'
