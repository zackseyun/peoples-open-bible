translation:
  language: es
  text: 'Y dijo: «Ellos eran mis hermanos, los hijos de mi madre[a]. Tan cierto como que Yahvé vive, si ustedes los hubieran dejado vivir, no los habría matado[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Los hijos de mi madre» señala aquí a sus hermanos carnales, no solo a parientes en general.
    reason: cultural_note
  - marker: b
    text: 'O: «no los mataría». El hebreo expresa una condición contrafactual pasada, que en español se comunica con más naturalidad como «no los habría matado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמַר
  english_pob_choice: And he said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Entonces dijo
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol se transmite de manera natural con una conexión simple en español. «Y dijo» conserva la continuidad del relato sin añadir énfasis no presente en el hebreo.
- source_word: אַחַי
  english_pob_choice: my brothers
  chosen_spanish: mis hermanos
  alternatives_spanish:
  - mis parientes
  - mis consanguíneos
  lexicon: HALOT
  rationale: Aquí el sustantivo se aclara enseguida con la frase siguiente; «hermanos» mantiene la fuerza familiar y emocional que el contexto exige.
- source_word: בְּנֵי אִמִּי
  english_pob_choice: the sons of my mother
  chosen_spanish: los hijos de mi madre
  alternatives_spanish:
  - los hijos de mi madre; es decir, mis hermanos carnales
  - mis hermanos de madre
  lexicon: HALOT
  rationale: Se conserva la expresión appositiva de forma bastante literal para preservar el matiz de hermanos uterinos. En español suena natural y permite que el lector vea la precisión del hebreo.
- source_word: הֵם
  english_pob_choice: they were
  chosen_spanish: eran
  alternatives_spanish:
  - fueron
  lexicon: HALOT
  rationale: El copulativo implícito se expresa de modo idiomático con «eran», que en español presenta mejor el estado ya referido de personas muertas en el relato.
- source_word: חַי יְהוָה
  english_pob_choice: As Yahweh lives
  chosen_spanish: ¡Vive Yahvé!
  alternatives_spanish:
  - ¡Vive Yahvé y vive!
  - ¡Tan cierto como que Yahvé vive!
  lexicon: HALOT
  rationale: Se conserva la fórmula juratoria con el nombre divino sin sustituirlo por un título. «¡Vive Yahvé!» es una forma breve, solemne y fiel al hebreo.
- source_word: לוּ
  english_pob_choice: if
  chosen_spanish: Si
  alternatives_spanish:
  - Si acaso
  lexicon: HALOT
  rationale: Aunque el hebreo introduce una condición contrafactual, en español la estructura condicional con pluscuamperfecto expresa bien el sentido sin sobrecargar la frase.
- source_word: הַחֲיִתֶם
  english_pob_choice: you had let them live
  chosen_spanish: los hubieran dejado vivir
  alternatives_spanish:
  - los hubieran mantenido con vida
  - los hubieran dejado con vida
  lexicon: HALOT
  rationale: «Dejar vivir» comunica de modo claro el causativo de חיה y mantiene la relación entre la acción hipotética y su consecuencia.
- source_word: אוֹתָם
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  lexicon: HALOT
  rationale: El pronombre átono de objeto directo en español es el equivalente más natural. Se mantiene la referencia a los hermanos mencionados previamente.
- source_word: לֹא הָרַגְתִּי אֶתְכֶם
  english_pob_choice: I would not have killed you
  chosen_spanish: no los habría matado a ustedes
  alternatives_spanish:
  - no los habría matado
  - no los habría asesinado
  lexicon: HALOT
  rationale: El hebreo expresa una apódosis contrafactual en pasado; el condicional compuesto en español la refleja bien. Se usa «matado» como correspondencia directa de הרג. La repetición de «a ustedes» ayuda a explicitar el objeto plural del hebreo.
theological_decisions:
- issue: Nombre divino en la fórmula juratoria
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo contiene explícitamente יְהוָה, por lo que se preserva el nombre divino en español como «Yahvé», conforme al criterio del proyecto y sin sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Naturaleza contrafactual de la última cláusula
  english_pob_reading: I would not have killed you
  chosen_spanish_reading: no los habría matado a ustedes
  alternative_spanish_readings:
  - no los mataría
  - no los habría matado
  rationale: El hebreo usa una construcción condicional pasada que expresa una situación no realizada. El condicional compuesto español comunica mejor ese valor que un presente condicional o una traducción literal menos idiomática.
  doctrine_reference: 'Gramática comparada del hebreo bíblico: apódosis contrafactual en pasado'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión final del inglés POB, que ajustó la apódosis a «I would not have killed you» para expresar con mayor naturalidad el contrafactual pasado. La versión española refleja ese mismo matiz con el condicional compuesto «no los habría matado».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrammaton, conforme al estándar del proyecto.
  - Se conserva la apposición «los hijos de mi madre» para no borrar la precisión semántica del hebreo.
  - El tratamiento pronominal plural en español busca reflejar con claridad que el objeto es colectivo, como en el hebreo.
