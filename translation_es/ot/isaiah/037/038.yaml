review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: la introducción narrativa, el contexto cultual, la agresión de los hijos, la huida a Ararat y la sucesión de Esar-hadón. Sin embargo, hay dos desajustes importantes con la evidencia fuente y el rastro de auditoría POB: (1) בָּנָיו significa específicamente «sus hijos/sus hijos varones», no una expresión que pueda sonar inclusiva o menos específica en nota explicativa; en el texto «sus hijos» es aceptable, pero la justificación léxica no debe relativizar la especificidad masculina. (2) הִכֻּהוּ con el complemento «con la espada» y el contexto de sucesión se preserva mejor como «lo derribaron» o «lo abatieron» que como «lo hirieron», porque «hirieron» en español puede sugerir solo lesión no mortal y debilita el efecto narrativo que el POB inglés quiso mantener con «struck him down».'
  spanish_quality_summary: El español es claro y ampliamente legible. La sintaxis y puntuación funcionan. No obstante, «lo hirieron con la espada» suena más débil de lo que pide el contexto; «lo abatieron a espada» o «lo derribaron con la espada» es más natural y más fiel. Además, la nota c introduce una preferencia de grafía castellana no necesaria; conviene conservar la lógica del inglés auditado y explicar simplemente la variante «Esarhaddón».
  glossary_alignment: No hay términos del glosario mayor en conflicto directo. Los nombres propios están razonablemente castellanizados. La frase «la casa de Nisroc, su dios» respeta la decisión POB de mantener «house of». La revisión propuesta alinea mejor la fuerza verbal de הִכֻּהוּ y depura la nota sobre Esar-hadón/Esarhaddón.
  issues:
  - severity: medium
    issue: «lo hirieron con la espada» debilita הִכֻּהוּ en este contexto
    rationale: Aunque el verbo hebreo es literalmente «golpear/herir», el POB inglés eligió «struck him down» precisamente para conservar el verbo sin perder la fuerza letal que aporta «con la espada» y la sucesión inmediata. En español, «lo hirieron» puede leerse como no fatal.
  - severity: low
    issue: La rationale léxica de בָּנָיו relativiza una especificidad masculina real
    rationale: El hebreo dice «sus hijos» en sentido de varones; en español el texto «sus hijos» ya lo comunica adecuadamente, pero la explicación no debería sugerir que la precisión de género es irrelevante.
  - severity: low
    issue: La nota c se aleja innecesariamente del rastro inglés
    rationale: La nota inglesa solo informa que en inglés es más común «Esarhaddon». En español basta indicar la variante gráfica «Esarhaddón»; no hace falta afirmar «grafía castellana» como decisión normativa.
  revised_spanish_text: Y sucedió que[a], mientras estaba adorando en la casa de Nisroc, su dios, Adramélec y Sarézer, sus hijos, lo abatieron a espada, y escaparon a la tierra de Ararat[b][c]. Y Esar-hadón, su hijo, reinó en su lugar.
  revised_footnotes:
  - marker: a
    text: O «mientras se postraba»; el verbo hebreo puede enfatizar el acto corporal de adoración.
    reason: lexical_alternative
  - marker: b
    text: O «el templo de Nisroc, su dios»; el hebreo dice literalmente «la casa de Nisroc, su dios».
    reason: lexical_alternative
  - marker: c
    text: También se ve la forma «Esarhaddón».
    reason: lexical_alternative
  revision_rationale: Se ajusta el verbo principal a «lo abatieron a espada» para conservar mejor la fuerza contextual de הִכֻּהוּ sin sobrerinterpretarlo como «lo mataron». Se mantienen la estructura, los nombres y la opción «la casa de» por fidelidad al hebreo y al POB auditado. También se simplifica la nota sobre Esar-hadón para reflejar solo la variante gráfica pertinente.
