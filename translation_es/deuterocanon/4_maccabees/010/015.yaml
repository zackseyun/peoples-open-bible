translation:
  language: es
  text: Por la muerte bienaventurada de mis hermanos, y por la destrucción eterna del tirano, y por la vida perdurable de los piadosos[b], no renunciaré a mi noble hermandad[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la noble hermandad». La expresión griega puede entenderse de modo más general, pero en este contexto se refiere al vínculo del hablante con sus hermanos.
    reason: lexical_alternative
  - marker: b
    text: 'El griego usa dos adjetivos casi sinónimos para expresar duración: uno para la destrucción del tirano y otro para la vida de los piadosos. Se conserva la distinción en español con «eterna» y «perdurable».'
    reason: lexical_alternative
lexical_decisions:
- source_word: μὰ
  english_pob_choice: By
  chosen_spanish: Por
  alternatives_spanish:
  - Sí, por
  - Por medio de
  lexicon: LSJ
  rationale: μὰ introduce una fórmula solemne de juramento; en español, «Por» reproduce de manera natural esa invocación juratoria sin añadir contenido ajeno.
- source_word: μακάριον ... θάνατον
  english_pob_choice: blessed death
  chosen_spanish: muerte bienaventurada
  alternatives_spanish:
  - muerte bendita
  - muerte dichosa
  lexicon: LSJ
  rationale: μακάριος expresa una dicha o bienaventuranza con valoración religiosa; «bienaventurada» conserva mejor ese tono que un simple «bendita» o «dichosa».
- source_word: τῶν ἀδελφῶν μου
  english_pob_choice: of my brothers
  chosen_spanish: de mis hermanos
  alternatives_spanish:
  - de mis hermanos varones
  - de mis hermanos de sangre
  lexicon: LSJ
  rationale: El griego es masculino plural y el contexto habla de los hermanos del hablante; «mis hermanos» es natural y preciso en español.
- source_word: αἰώνιον
  english_pob_choice: eternal
  chosen_spanish: eterna
  alternatives_spanish:
  - perdurable
  - perpetua
  lexicon: LSJ
  rationale: Para ὄλεθρος, «eterna» mantiene la idea de perdición duradera y conserva la diferencia lexical con ἀΐδιον más adelante.
- source_word: ὄλεθρον
  english_pob_choice: destruction
  chosen_spanish: destrucción
  alternatives_spanish:
  - ruina
  - perdición
  lexicon: LSJ
  rationale: ὄλεθρος designa destrucción o ruina; «destrucción» es el equivalente más directo y transparente.
- source_word: ἀΐδιον
  english_pob_choice: everlasting
  chosen_spanish: perdurable
  alternatives_spanish:
  - eterno
  - perpetuo
  lexicon: LSJ
  rationale: ἀΐδιος subraya duración continua; «perdurable» comunica bien esa permanencia y evita repetir exactamente el mismo adjetivo usado para αἰώνιον.
- source_word: τῶν εὐσεβῶν
  english_pob_choice: of the godly
  chosen_spanish: de los piadosos
  alternatives_spanish:
  - de los devotos
  - de los fieles
  lexicon: LSJ
  rationale: εὐσεβής refiere a quienes reverencian a Dios; «piadosos» es un equivalente idiomático y respetuoso en español.
- source_word: οὐκ ἀρνήσομαι
  english_pob_choice: I will not renounce
  chosen_spanish: no renunciaré
  alternatives_spanish:
  - no negaré
  - no abjuraré
  lexicon: LSJ
  rationale: En contexto, el hablante declara que no repudiará su solidaridad familiar; «renunciaré» captura bien esa fuerza de rechazo o abandono.
- source_word: τὴν εὐγένῃ ἀδελφότητα
  english_pob_choice: my noble brotherhood
  chosen_spanish: a mi noble hermandad
  alternatives_spanish:
  - a mi noble fraternidad
  - a mi noble parentesco
  lexicon: LSJ
  rationale: εὐγενής + ἀδελφότης combina nobleza y hermandad. «Hermandad» mantiene la relación fraterna y la dignidad implícita; el posesivo se conserva por el contexto.
theological_decisions:
- issue: Contraste escatológico entre la destrucción del tirano y la vida de los piadosos
  english_pob_reading: The verse affirms enduring destruction for the tyrant and eternal life for the godly without specifying a later doctrinal system beyond the text.
  chosen_spanish_reading: El versículo afirma una destrucción perdurable para el tirano y una vida perdurable para los piadosos, sin desarrollar más allá del texto un sistema doctrinal posterior.
  alternative_spanish_readings:
  - Leerlo solo como contraste moral sin referencia a destino final
  - Leerlo como afirmación explícita de retribución postmortem detallada
  rationale: La traducción conserva el paralelismo fuerte entre ambos destinos y no suaviza la tensión entre perdición duradera y vida duradera; tampoco introduce categorías teológicas no expresadas explícitamente en el griego.
  doctrine_reference: Preservar la tensión escatológica sin resolverla
translation_notes:
  revision_awareness: La versión española sigue el último estado revisado del inglés POB en cuanto a la distinción semántica entre αἰώνιον y ἀΐδιον, evitando colapsarlos en un solo adjetivo. También conserva la lectura contextual de la ‘hermandad’ como vínculo familiar del hablante, sin borrar la posible amplitud semántica de ἀδελφότης.
  spanish_consistency_notes:
  - Se usa «piadosos» para εὐσεβῶν, en línea con un registro bíblico claro y sin sustituirlo por terminología eclesiástica más estrecha.
  - Se evita «SEÑOR» u otras convenciones de sustitución porque este versículo no contiene el tetragrámaton ni κύριος.
  - «Muerte bienaventurada» conserva el valor honorífico de μακάριος sin banalizarlo como mera felicidad.
  - La puntuación reproduce el paralelismo solemne del griego con series coordinadas.
