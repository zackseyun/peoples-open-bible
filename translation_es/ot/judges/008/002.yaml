translation:
  language: es
  text: 'Pero él les dijo: «¿Qué he hecho yo ahora comparado con ustedes? ¿No son mejores las rebuscas de Efraín que la vendimia[a] de Abiezer?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿No son mejores las rebuscas de Efraín que la cosecha de uvas de Abiezer?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: But he said
  chosen_spanish: Pero él les dijo
  alternatives_spanish:
  - Y él les dijo
  - Entonces él les dijo
  lexicon: HALOT
  rationale: 'La waw narrativa avanza la acción, pero el contexto es claramente adversativo: Gedeón responde a la queja de Efraín. «Pero» conserva ese matiz mejor que un simple «y».'
- source_word: אֲלֵיהֶם
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - a ellos les
  lexicon: HALOT
  rationale: En español, el dativo enclítico «les» es natural y mantiene la referencia a los hombres de Efraín del contexto inmediato.
- source_word: מֶה עָשִׂיתִי עַתָּה כָּכֶם
  english_pob_choice: What have I done now compared to you?
  chosen_spanish: ¿Qué he hecho yo ahora comparado con ustedes?
  alternatives_spanish:
  - ¿Qué he hecho yo ahora en comparación con ustedes?
  - ¿Qué he hecho yo ahora como ustedes?
  lexicon: HALOT
  rationale: El valor comparativo de כ se expresa de modo natural con «comparado con». «Comparado con ustedes» conserva la autodepreciación retórica sin volverla rígida.
- source_word: הֲלוֹא
  english_pob_choice: Are not
  chosen_spanish: ¿No son
  alternatives_spanish:
  - ¿Acaso no son?
  - ¿No es que son?
  lexicon: HALOT
  rationale: La pregunta retórica espera asentimiento; en español «¿No son?» comunica bien ese efecto sin añadir énfasis excesivo.
- source_word: טוֹב
  english_pob_choice: better
  chosen_spanish: mejores
  alternatives_spanish:
  - más buenas
  - superiores
  lexicon: HALOT
  rationale: En esta construcción comparativa, el adjetivo hebreo equivale a «mejor». En español, el plural concuerda con «rebuscas».
- source_word: עֹלְלוֹת
  english_pob_choice: the gleanings
  chosen_spanish: las rebuscas
  alternatives_spanish:
  - los rebuscos
  - las espigas restantes
  lexicon: HALOT
  rationale: «Rebuscas» mantiene la imagen agrícola de lo que queda tras la cosecha y suena natural en español bíblico contemporáneo. No se sustituye por una explicación más larga para preservar la metáfora.
- source_word: אֶפְרַיִם
  english_pob_choice: Ephraim
  chosen_spanish: Efraín
  alternatives_spanish:
  - Efraim
  lexicon: HALOT
  rationale: Transliteración usual en español bíblico y reconocible para lectores de iglesias hispanas.
- source_word: מִבְצִיר
  english_pob_choice: than the grape harvest of
  chosen_spanish: que la vendimia de
  alternatives_spanish:
  - que la cosecha de uvas de
  - que el viñedo de
  lexicon: HALOT
  rationale: «בציר» remite a la cosecha de uvas; «vendimia» conserva ese campo semántico y suena más idiomático que una perífrasis larga.
- source_word: אֲבִיעֶזֶר
  english_pob_choice: Abiezer
  chosen_spanish: Abiezer
  alternatives_spanish:
  - Abi-ezer
  lexicon: HALOT
  rationale: Se mantiene la transliteración estándar del nombre del clan de Gedeón.
translation_notes:
  revision_awareness: La versión inglesa revisada conservó la estructura retórica del hebreo y afinó solo la naturalidad de «compared to you». La traducción española sigue esa misma lectura sin añadir explicaciones, manteniendo el contraste entre la respuesta conciliadora de Gedeón y la metáfora agrícola.
  spanish_consistency_notes:
  - Se conserva «Efraín» como forma española habitual del nombre tribal.
  - Se traduce el comparativo con «comparado con» para reflejar el valor de כ sin sobreinterpretarlo.
  - Se evita «SEÑOR» o términos teológicos innecesarios porque el versículo no contiene vocabulario divino.
  - La nota alternativa usa «vendimia» para reflejar la posible equivalencia léxica de בציר, como en el audit trail inglés.
