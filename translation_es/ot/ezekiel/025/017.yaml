translation:
  language: es
  text: Y ejecutaré contra ellos grandes actos de venganza, con reprensiones airadas[a], y sabrán que yo soy Yahvé, cuando ponga sobre ellos mi venganza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con reprensiones de ira» o «con castigos airados». La expresión hebrea une la idea de reprensión/corrección con la de ira/furia, y el matiz exacto puede incluir tanto reproche verbal como castigo punitivo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתִי
  english_pob_choice: I will execute
  chosen_spanish: haré
  alternatives_spanish:
  - ejecutaré
  - haré ejecutar
  - actuaré
  lexicon: HALOT
  rationale: El hebreo עשה es amplio ('hacer/actuar'), y en este contexto judicial no exige un verbo técnico en español. 'Haré' conserva la base verbal sin forzar una paráfrasis; el complemento 'grandes actos de venganza' deja claro el sentido de ejecutar castigo.
- source_word: נְקָמוֹת גְּדֹלוֹת
  english_pob_choice: great acts of vengeance
  chosen_spanish: grandes actos de venganza
  alternatives_spanish:
  - gran venganza
  - grandes venganzas
  - actos grandes de venganza
  lexicon: HALOT
  rationale: El plural hebreo נְקָמוֹת se conserva con 'actos' en plural para no aplanar la intensidad/repetición del original. 'Venganza' mantiene el valor léxico de נקם, y 'grandes' refleja directamente גְּדֹלוֹת.
- source_word: בְּתוֹכְחוֹת חֵמָה
  english_pob_choice: with wrathful rebukes
  chosen_spanish: con reprensiones airadas[a]
  alternatives_spanish:
  - con reprensiones de ira[a]
  - con correcciones airadas[a]
  - con castigos airados[a]
  lexicon: HALOT
  rationale: תוֹכֵחָה conserva su núcleo de 'reprensión/reprensión correctiva', pero en este contexto profético se tiñe de juicio. 'Reprensiones' mantiene el término base; 'airadas' expresa חֵמָה. Se deja abierta la tensión entre reprensión verbal y castigo punitivo mediante la nota.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: ''Yahvé''. Es más natural en español bíblico que ''Yahweh'' y preserva el nombre propio divino, no un título sustituto.'
- source_word: וְיָדְעוּ כִּי אֲנִי יְהוָה
  english_pob_choice: and they will know that I am Yahweh
  chosen_spanish: y sabrán que yo soy Yahvé
  alternatives_spanish:
  - y conocerán que yo soy Yahvé
  - y reconocerán que yo soy Yahvé
  lexicon: HALOT
  rationale: '''Sabrán que yo soy Yahvé'' refleja bien la fórmula de reconocimiento de Ezequiel y suena natural en español. ''Conocerán'' o ''reconocerán'' son posibles, pero ''sabrán'' conserva la sencillez del hebreo.'
- source_word: בְּתִתִּי אֶת נִקְמָתִי בָּם
  english_pob_choice: when I lay my vengeance on them
  chosen_spanish: cuando ponga sobre ellos mi venganza
  alternatives_spanish:
  - cuando dé sobre ellos mi venganza
  - cuando descargue sobre ellos mi venganza
  - cuando imponga sobre ellos mi venganza
  lexicon: HALOT
  rationale: La construcción con נתן se vierte de modo idiomático en español como 'poner sobre'. 'Ponga' reproduce la relación temporal ('cuando') y el objeto directo 'mi venganza' sin suavizar el sentido judicial.
- source_word: נִקְמָתִי
  english_pob_choice: my vengeance
  chosen_spanish: mi venganza
  alternatives_spanish:
  - mi retribución
  - mi retribución vengadora
  - mi desquite
  lexicon: HALOT
  rationale: '''Venganza'' es la equivalencia más transparente para נקמה en este contexto. ''Retribución'' podría sonar más abstracta y ''desquite'' sería demasiado coloquial.'
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El proyecto define el Tetragrámaton como 'Yahvé' en el texto principal. Se evita la sustitución por 'SEÑOR' para preservar el nombre personal revelado a Israel.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de בְּתוֹכְחוֹת חֵמָה
  english_pob_reading: with wrathful rebukes
  chosen_spanish_reading: con reprensiones airadas
  alternative_spanish_readings:
  - con castigos airados
  - con reprensiones de ira
  rationale: El hebreo une 'reprensión/corrección' con 'ira/furia', por lo que no conviene decidir unilateralmente entre solo reprensión verbal o solo castigo. 'Reprensiones airadas' conserva ambas posibilidades y deja visible la tensión semántica documentada por el POB inglés.
  doctrine_reference: 'DOCTRINE.md: lexical tension preservation / prophetic judgment language'
translation_notes:
  revision_awareness: El borrador sigue la última revisión inglesa que prefirió 'wrathful rebukes' por un registro más formal y una correspondencia más cercana con 'rebukes of wrath'. En español se optó por 'reprensiones airadas' para mantener esa misma tensión léxica sin perder naturalidad. También se preservó la fórmula de reconocimiento profética y el nombre divino según la política del proyecto.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - Se mantiene el plural 'actos de venganza' para reflejar נְקָמוֹת y no neutralizar su forma plural.
  - '''Reprensiones airadas'' conserva la ambigüedad documentada entre reprensión y castigo.'
  - El tono es formal y bíblico, pero evita calcos innecesarios del inglés.
