translation:
  text: Jesus said[1], "I tell my mysteries to those [who are worthy] of [my] mysteries.
    What your right hand will do[4][3][2], do not let your left hand know what it
    is doing."
  philosophy: formal
  drafter_model: gemini-3.1-pro-preview
  drafter_label: gemini_3_1_pro_thomas_redraft
  drafted_at: '2026-04-22T10:54:35Z'
  footnotes:
  - marker: '1'
    text: The manuscript is damaged here; '[who are worthy]' (ⲛⲉ[ⲧⲙⲡϣⲁ]) and '[my]'
      (ⲛ[ⲛⲁ]) are standard restorations based on context and early Christian parallels
      (e.g., Clement of Alexandria, Stromata 5.10.63).
    reason: textual_variant
  - marker: '2'
    text: The Coptic uses ⲉⲓ̈ϫⲱ (eijō) for 'I tell', a dialectal First Present form
      where standard Sahidic would use ϯϫⲱ (tijō).
    reason: dialect_note
  - marker: '3'
    text: The Coptic uses ⲙⲛ̄ⲧⲣⲉ- (mntre-), a variant spelling of the standard Sahidic
      negative causative imperative ⲙⲡⲣⲧⲣⲉ- (mprtre-).
    reason: dialect_note
  - marker: '4'
    text: Unlike the canonical parallel in Matthew 6:3, which applies this saying
      to giving alms in secret, Thomas places it immediately after a statement about
      esoteric mysteries, reframing the saying as an instruction on spiritual secrecy.
    reason: cross_reference
lexical_decisions:
- source_word: ⲙⲩⲥⲧⲏⲣⲓⲟⲛ
  chosen: mysteries
  rationale: Greek loanword (μυστήριον) preserved in Coptic. Pluralized based on the
    plural article ⲛ̄ⲛⲁ-.
  lexicon: BDAG 661; Crum 202a
- source_word: ⲙⲡϣⲁ
  chosen: who are worthy
  rationale: Standard Coptic verb for 'to be worthy' or 'to deserve'. Restored in
    the lacuna.
  lexicon: Crum 131b
- source_word: ⲟⲩⲛⲁⲙ
  chosen: right hand
  rationale: Standard term for 'right' or 'right hand'.
  lexicon: Crum 483a
- source_word: ϩⲃⲟⲩⲣ
  chosen: left hand
  rationale: Standard term for 'left' or 'left hand'.
  lexicon: Crum 656b
theological_decisions:
- issue: Context of the right/left hand saying
  chosen_reading: Preserved as a standalone aphorism following the statement on mysteries.
  rationale: In Matthew 6:3, this saying is explicitly about almsgiving. Thomas strips
    away the almsgiving context and pairs it with the guarding of mysteries. The translation
    strictly follows Thomas's wording without importing canonical explanatory context.
  alternatives_noted: []
drafter_notes: The translation preserves the slightly redundant Coptic syntax ('What
  your right hand will do, do not let your left hand know what it is doing') to maintain
  the exact phrasing of the text. The juxtaposition of the two sayings (the mysteries
  and the hands) is unique to Thomas and is preserved without harmonizing to Matthew's
  context of almsgiving.
