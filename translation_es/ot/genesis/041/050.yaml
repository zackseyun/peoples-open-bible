  glossary_alignment: No hay conflictos con la terminología principal del proyecto. 'Asenat', 'Potifera', 'sacerdote de On' y 'hambre' son aceptables en contexto. La principal cuestión léxica es mantener el valor de יָלְדָה como 'dio a luz' / 'le dio' de manera más explícita y natural en español.
