translation:
  language: es
  text: Abigail se apresuró y se levantó, y montó sobre el asno, con cinco de sus muchachas[a] que iban tras ella; fue detrás de los mensajeros de David y llegó a ser su esposa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sus criadas», «sus jóvenes mujeres» o «sus doncellas». El hebreo נַעֲרֹתֶיהָ puede referirse a muchachas o a asistentes femeninas; la expresión siguiente, literalmente «que iban a sus pies», es un modismo para acompañarla caminando.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתְּמַהֵר
  english_pob_choice: quickly
  chosen_spanish: se apresuró
  alternatives_spanish:
  - se dio prisa
  - se apresuró rápidamente
  lexicon: HALOT
  rationale: El verbo expresa prisa. En español, 'se apresuró' comunica con naturalidad la prontitud de la acción sin añadir una duplicación innecesaria como 'rápidamente'.
- source_word: וַתָּקָם
  english_pob_choice: arose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - se puso de pie
  lexicon: HALOT
  rationale: קום suele significar 'levantarse/arise'. 'Se levantó' es claro y digno en español moderno, y conserva la secuencia narrativa.
- source_word: וַתִּרְכַּב עַל הַחֲמוֹר
  english_pob_choice: rode on the donkey
  chosen_spanish: montó sobre el asno
  alternatives_spanish:
  - montó en el asno
  - cabalgó sobre el asno
  lexicon: HALOT
  rationale: El hebreo indica montar/r montar sobre un animal de carga. 'Montó sobre el asno' reproduce la imagen concreta. 'Asno' mantiene un registro bíblico natural en español; 'sobre' refleja עַל.
- source_word: נַעֲרֹתֶיהָ
  english_pob_choice: her young women
  chosen_spanish: sus jóvenes
  alternatives_spanish:
  - sus muchachas
  - sus criadas jóvenes
  - sus doncellas
  lexicon: HALOT
  rationale: La forma hebrea puede referirse a mujeres jóvenes o asistentes femeninas. 'Sus jóvenes' sigue de cerca la evidencia semántica sin decidir de antemano si se trata de criadas o simplemente muchachas, y evita sobreespecificar el estatus social.
- source_word: הַהֹלְכוֹת לְרַגְלָהּ
  english_pob_choice: going after her
  chosen_spanish: que iban tras ella
  alternatives_spanish:
  - que caminaban detrás de ella
  - que la seguían
  - que iban a sus pies
  lexicon: HALOT
  rationale: La expresión literal 'a sus pies' es idiomática; en español, 'iban tras ella' conserva el movimiento y la dependencia del grupo sin un literalismo opaco. Mantiene también la relación espacial con la líder.
- source_word: אַחֲרֵי מַלְאֲכֵי דָוִד
  english_pob_choice: after David's messengers
  chosen_spanish: detrás de los mensajeros de David
  alternatives_spanish:
  - tras los mensajeros de David
  - siguiendo a los mensajeros de David
  lexicon: HALOT
  rationale: מַלְאָךְ aquí designa enviados humanos, no ángeles. 'Mensajeros' es la equivalencia contextual adecuada; 'detrás de' conserva la orientación de אַחֲרֵי sin perder naturalidad.
- source_word: וַתְּהִי ל֖וֹ לְאִשָּׁה
  english_pob_choice: became his wife
  chosen_spanish: llegó a ser su esposa
  alternatives_spanish:
  - se convirtió en su esposa
  - fue su esposa
  - pasó a ser su esposa
  lexicon: HALOT
  rationale: La construcción היה + ל + אשה expresa entrada en relación matrimonial. 'Llegó a ser su esposa' refleja ese cambio de estado con un tono narrativo sobrio; 'esposa' es un equivalente natural de אִשָּׁה en este contexto.
theological_decisions:
- issue: La fórmula de matrimonio expresa transición de estado, no mero estado descriptivo.
  english_pob_reading: became his wife
  chosen_spanish_reading: llegó a ser su esposa
  alternative_spanish_readings:
  - se convirtió en su esposa
  - fue su esposa
  rationale: El hebreo narra que Abigail entra en la relación matrimonial con David. 'Llegó a ser su esposa' conserva el matiz dinámico de la construcción verbal y evita sugerir solo una condición estática.
  doctrine_reference: Narrativa histórica; uso idiomático de היה + ל + אשה
translation_notes:
  revision_awareness: Se siguió el auditable cambio del POB inglés hacia un registro más formal en la acción inicial ('arose'), pero en español se optó por una formulación igualmente natural y digna ('se levantó'). También se preservó la ambigüedad léxica de נַעֲרֹתֶיהָ mediante una nota, ya que el hebreo admite tanto 'jóvenes' como 'criados/as' femeninas. No se añadió ninguna expansión doctrinal; solo se reflejó el movimiento narrativo del versículo y la fórmula matrimonial idiomática.
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando el texto lo requiera; este versículo no contiene el tetragrámaton.
  - Se evitó 'Cristo'/'Mesías' porque no aparece ninguna de esas formas en el versículo.
  - Se mantuvo un registro bíblico sobrio pero comprensible para lectura pública.
  - '''Asno'' se eligió por claridad y por corresponder al animal concreto del texto; ''donkey'' en el audit trail inglés equivale a este término en español.'
