  text: ⸀καταλιπόντες εὐθεῖαν ὁδὸν ἐπλανήθησαν, ἐξακολουθήσαντες τῇ ὁδῷ τοῦ Βαλαὰμ τοῦ ⸀Βοσὸρ ὃς μισθὸν ἀδικίας ἠγάπησεν
base_translation:
  language: en
  yaml_path: translation/nt/2_peter/002/015.yaml
  text: Having abandoned the straight way[a], they went astray, having followed the way of Balaam son of Bosor[b], who loved the wages of unrighteousness.
  footnotes:
  - marker: a
    text: Bosor is the form found in the Greek text; in the Old Testament Balaam is commonly called the son of Beor.
    reason: alternative_reading
  - marker: b
    text: Or 'they went astray, having followed'.
    reason: previous_rendering
translation:
  language: ko
  text: 그들은 바른 길을 버리고 미혹되어, 불의의 대가를 사랑한 브올의 아들 발람의 길을 따랐습니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εὐθεῖαν ὁδὸν
  english_pob_choice: straight way
  chosen_korean: 바른 길
  alternatives_korean:
  - 곧은 길
  lexicon: BDAG
  rationale: 직선적·올바른 길.
- source_word: Βαλαὰμ τοῦ Βοσὸρ
  english_pob_choice: Balaam son of Bosor
  chosen_korean: 브올의 아들 발람
  alternatives_korean:
  - 보솔의 아들 발람
  lexicon: BDAG
  rationale: SBLGNT는 「Βοσόρ」(보솔)로 읽으나, 구약(민 22장)의 명칭은 「Beor(브올)」. 한국 독자에게는 「브올」이 압도적으로 친숙하므로 본문에 채택하고 헬라어 형태는 각주로 보충 가능.
