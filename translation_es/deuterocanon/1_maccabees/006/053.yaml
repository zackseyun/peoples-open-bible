base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_maccabees/006/053.yaml
  text: But there was no food in the holy place[a], because it was the seventh year[b], and those who had escaped into Judea from the nations had eaten up the remnant of the supplies.
  footnotes:
  - marker: a
    text: That is, the seventh-year sabbatical year, when agricultural production was restricted; this explains the shortage of food.
    reason: cultural_note
  - marker: b
    text: Or 'from the Gentiles.' The Greek says 'from the nations.'
    reason: lexical_alternative
