translation:
  language: es
  text: Y cuando el rey vio a Ester la reina, de pie en el patio[a], ella halló favor ante sus ojos, y el rey extendió a Ester el cetro de oro que tenía en su mano[b]. Entonces Ester se acercó y tocó la parte superior del cetro[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'atrio', para חָצֵר.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'ella llevó/cargó favor en sus ojos'; es un modismo que significa que recibió su mirada favorable.
    reason: lexical_alternative
  - marker: c
    text: 'O ''la punta del cetro''. Hebreo: ''la cabeza del cetro''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כִרְאוֹת
  english_pob_choice: And when ... saw
  chosen_spanish: Y cuando ... vio
  alternatives_spanish:
  - Y sucedió que, cuando ... vio
  - Y al ver ...
  lexicon: HALOT
  rationale: La construcción narrativa temporal se expresa con naturalidad en español con 'Y cuando', conservando el avance del relato sin añadir una paráfrasis explicativa.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: Correspondencia directa y natural en el contexto de corte real.
- source_word: אֶסְתֵּר הַמַּלְכָּה
  english_pob_choice: Esther the queen
  chosen_spanish: Ester la reina
  alternatives_spanish:
  - la reina Ester
  lexicon: HALOT
  rationale: Se conserva el orden hebreo nombre+título, como en el inglés POB, sin convertirlo en un apelativo más idiomático pero menos formal.
- source_word: עֹמֶדֶת בֶּחָצֵר
  english_pob_choice: standing in the court
  chosen_spanish: de pie en el patio
  alternatives_spanish:
  - de pie en el atrio
  - de pie en la corte
  lexicon: HALOT
  rationale: חָצֵר puede ser 'patio' o 'corte'. Aquí se elige 'patio' porque en español comunica bien el espacio físico sin sonar demasiado técnico; 'de pie' refleja el participio descriptivo.
- source_word: נָשְׂאָה חֵן בְּעֵינָיו
  english_pob_choice: she found favor in his sight
  chosen_spanish: ella halló favor ante sus ojos
  alternatives_spanish:
  - ella ganó favor ante sus ojos
  - ella obtuvo gracia ante sus ojos
  lexicon: HALOT
  rationale: Se mantiene el valor idiomático de 'hallar favor' y la imagen de 'ante sus ojos'. 'Favor' preserva la lectura relacional del hebreo sin forzar un sentido teológico ajeno al contexto.
- source_word: וַיּוֹשֶׁט
  english_pob_choice: extended
  chosen_spanish: extendió
  alternatives_spanish:
  - alargó
  - tendió
  lexicon: HALOT
  rationale: Verbo sobrio y exacto para el gesto del rey al acercar el cetro.
- source_word: שַׁרְבִיט הַזָּהָב
  english_pob_choice: the golden scepter
  chosen_spanish: el cetro de oro
  alternatives_spanish:
  - el cetro dorado
  lexicon: HALOT
  rationale: '''Cetro de oro'' es fiel al sustantivo compuesto hebreo y mantiene la dignidad del emblema real.'
- source_word: אֲשֶׁר בְּיָדוֹ
  english_pob_choice: that was in his hand
  chosen_spanish: que tenía en su mano
  alternatives_spanish:
  - que estaba en su mano
  lexicon: HALOT
  rationale: La relativa especifica el cetro que el rey sostenía; 'tenía en su mano' es natural y conserva la concreción del original.
- source_word: וַתִּקְרַב
  english_pob_choice: Then Esther came near
  chosen_spanish: Entonces Ester se acercó
  alternatives_spanish:
  - Y Ester se acercó
  - Después Ester se acercó
  lexicon: HALOT
  rationale: '''Se acercó'' reproduce el movimiento de respuesta de Ester; ''Entonces'' preserva la secuencia narrativa.'
- source_word: וַתִּגַּע בְּרֹאשׁ הַשַּׁרְבִיט
  english_pob_choice: touched the top of the scepter
  chosen_spanish: tocó la punta del cetro
  alternatives_spanish:
  - tocó la parte superior del cetro
  - tocó la cabeza del cetro
  lexicon: HALOT
  rationale: רֹאשׁ literalmente es 'cabeza', pero en español 'punta' o 'parte superior' comunica mejor la parte extrema del objeto. 'Punta' sigue la alternativa inglesa de 'tip' sin exigir que el cetro fuese puntiagudo.
translation_notes:
  revision_awareness: 'La versión inglesa auditada mantiene una equivalencia óptima estable y sin revisiones aplicadas; el presente borrador sigue esa lectura, conservando las tres notas léxicas relevantes: חָצֵר como término espacial, el idiomismo de נָשְׂאָה חֵן בְּעֵינָיו, y רֹאשׁ הַשַּׁרְבִיט como extremo del cetro.'
  spanish_consistency_notes:
  - Se usa 'Ester' sin acento, conforme al nombre bíblico usual en español.
  - Se conserva 'favor' en el sentido idiomático de aceptación favorable, no como traducción de χάρις.
  - '''Cetro'' se mantiene como término real y no se sustituye por ''vara'' o ''bastón''.'
  - La puntuación sigue el flujo narrativo del hebreo y del POB inglés, con una sola oración extensa dividida por comas y un punto antes de la acción final.
