id: HEB.11.13
reference: Hebrews 11:13
source:
  edition: SBLGNT
  text: Κατὰ πίστιν ἀπέθανον οὗτοι πάντες, μὴ ⸀λαβόντες τὰς ἐπαγγελίας, ἀλλὰ πόρρωθεν αὐτὰς ἰδόντες καὶ ἀσπασάμενοι, καὶ ὁμολογήσαντες ὅτι ξένοι καὶ παρεπίδημοί εἰσιν ἐπὶ τῆς γῆς.
translation:
  text: All these died in faith[a], not having received the promises, but having seen them from afar and greeted them[c][b], and having confessed that they are strangers and exiles on the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having greeted them' or 'having embraced them.' The Greek verb can carry the sense of greeting or welcoming, here used figuratively of the promises seen from afar.
    reason: lexical_alternative
  - marker: b
    text: Or 'sojourners' or 'resident foreigners.' The Greek describes people living in a place without full settled belonging.
    reason: lexical_alternative
  - marker: c
    text: Or 'and having confessed'.
    reason: previous_rendering
lexical_decisions:
- source_word: Κατὰ πίστιν
  chosen: in faith
  alternatives:
  - according to faith
  - by faith
  lexicon: BDAG
  rationale: The idiom κατά + accusative here expresses accordance with or in the sphere of faith. 'In faith' is idiomatic English and fits the context of persevering trust at death. 'By faith' is possible, but in this verse the emphasis is their state/stance as they died rather than the means of a specific action.
- source_word: ἀπέθανον
  chosen: died
  alternatives:
  - passed away
  lexicon: BDAG
  rationale: A straightforward rendering of the aorist verb. 'Passed away' is too euphemistic and less transparent to the Greek.
- source_word: οὗτοι πάντες
  chosen: all these
  alternatives:
  - these all
  - all of these
  lexicon: BDAG
  rationale: Natural English that preserves the demonstrative emphasis on the previously mentioned exemplars.
- source_word: μὴ λαβόντες
  chosen: not having received
  alternatives:
  - without receiving
  lexicon: BDAG
  rationale: The aorist participle with μή is best represented as a participial clause modifying 'died.' 'Received' fits λαμβάνω in relation to promises. This preserves the temporal/logical relation without over-paraphrase.
- source_word: τὰς ἐπαγγελίας
  chosen: the promises
  alternatives:
  - what was promised
  lexicon: BDAG
  rationale: Plural is explicit in the Greek and should be retained. 'What was promised' smooths the phrase but loses the lexical correspondence with ἐπαγγελία.
- source_word: πόρρωθεν
  chosen: from afar
  alternatives:
  - from a distance
  - far off
  lexicon: BDAG
  rationale: '''From afar'' is concise, natural, and preserves the metaphorical/spatial sense of distant perception.'
- source_word: ἰδόντες
  chosen: having seen
  alternatives:
  - seeing
  lexicon: BDAG
  rationale: The aorist participle is well represented by 'having seen,' matching the sequence of participles and preserving aspect better than a simple present participle.
- source_word: ἀσπασάμενοι
  chosen: welcomed
  alternatives:
  - greeted
  - embraced
  lexicon: BDAG
  rationale: ἀσπάζομαι can mean greet/welcome. Since the object is 'the promises,' 'welcomed' communicates a figurative reception more naturally in English than 'greeted,' while 'embraced' is more interpretive.
- source_word: ὁμολογήσαντες
  chosen: having confessed
  alternatives:
  - having acknowledged
  - having declared
  lexicon: BDAG
  rationale: '''Confessed'' preserves the formal force of public acknowledgment in ὁμολογέω. ''Acknowledged'' is possible but weaker.'
- source_word: ξένοι
  chosen: strangers
  alternatives:
  - foreigners
  - aliens
  lexicon: BDAG
  rationale: '''Strangers'' is clear modern English and fits the social sense of those not belonging. ''Aliens'' can mislead modern readers; ''foreigners'' is possible but less paired with the next term in familiar biblical diction.'
- source_word: παρεπίδημοί
  chosen: temporary residents
  alternatives:
  - sojourners
  - exiles
  lexicon: BDAG
  rationale: The term denotes those residing in a place without full settled citizenship. 'Temporary residents' is accessible modern English. 'Sojourners' is traditional but less current; 'exiles' adds a nuance not required by the term itself.
- source_word: ἐπὶ τῆς γῆς
  chosen: on the earth
  alternatives:
  - on the land
  lexicon: BDAG
  rationale: γῆ can mean land or earth. In this context of pilgrim existence before God, 'on the earth' best captures the broad human setting rather than a specific territory.
