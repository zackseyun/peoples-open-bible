  text: וַ/יַּקְהֵ֣ל דָּוִ֣יד אֶת כָּל שָׂרֵ֣י יִשְׂרָאֵ֡ל שָׂרֵ֣י הַ/שְּׁבָטִ֣ים וְ/שָׂרֵ֣י הַ/מַּחְלְק֣וֹת הַ/מְשָׁרְתִ֪ים אֶת הַ/מֶּ֟לֶךְ וְ/שָׂרֵ֣י הָ/אֲלָפִ֣ים וְ/שָׂרֵ֣י הַ/מֵּא֡וֹת וְ/שָׂרֵ֣י כָל רְכוּשׁ וּ/מִקְנֶה֩ לַ/מֶּ֨לֶךְ וּ/לְ/בָנָ֜י/ו עִם הַ/סָּרִיסִ֧ים וְ/הַ/גִּבּוֹרִ֛ים וּֽ/לְ/כָל גִּבּ֥וֹר חָ֖יִל אֶל יְרוּשָׁלִָֽם־־־־־׀־־־׃
