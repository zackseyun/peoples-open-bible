translation:
  language: es
  text: Pero Herodes también[a], junto con sus soldados, lo trató con desprecio y se burló de él. Vistiéndolo con ropa espléndida, lo envió de vuelta a Pilato.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una vestidura espléndida»; λαμπρὰν también puede significar «brillante», y la vestidura probablemente sirve para la burla de Herodes al darle a Jesús una apariencia de honor fingido.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξουθενήσας
  english_pob_choice: treated him with contempt
  chosen_spanish: lo trató con desprecio
  alternatives_spanish:
  - lo despreció
  - lo trató como de poco valor
  lexicon: BDAG
  rationale: El participio expresa considerarlo como de ninguna importancia o tratarlo con desprecio. «Lo trató con desprecio» conserva el valor verbal y la humillación pública sin sonar forzado en español.
- source_word: σὺν τοῖς στρατεύμασιν αὐτοῦ
  english_pob_choice: together with his soldiers
  chosen_spanish: junto con sus soldados
  alternatives_spanish:
  - con sus tropas
  - con sus fuerzas militares
  lexicon: BDAG
  rationale: στράτευμα puede significar tropas o soldados. En este contexto narrativo, «soldados» es claro, natural y suficientemente concreto.
- source_word: ἐμπαίξας
  english_pob_choice: mocked him
  chosen_spanish: se burló de él
  alternatives_spanish:
  - lo ridiculizó
  - se mofó de él
  lexicon: BDAG
  rationale: El verbo significa burlarse, ridiculizar o escarnecer. «Se burló de él» es una equivalencia natural y digna en español para el tono de la pasión.
- source_word: περιβαλὼν
  english_pob_choice: dressing him in
  chosen_spanish: vistiéndolo con
  alternatives_spanish:
  - poniéndole
  - cubriéndolo con
  lexicon: BDAG
  rationale: El participio indica poner una prenda sobre alguien. «Vistiéndolo con» comunica bien la acción y enlaza de manera natural con el objeto siguiente.
- source_word: ἐσθῆτα λαμπρὰν
  english_pob_choice: splendid clothing
  chosen_spanish: ropa espléndida
  alternatives_spanish:
  - un manto espléndido
  - vestidura resplandeciente
  - ropa brillante
  lexicon: BDAG
  rationale: ἐσθής designa una prenda o ropa, y λαμπρός puede significar brillante, espléndido o magnífico. «Ropa espléndida» mantiene la amplitud léxica sin especificar indebidamente una sola clase de prenda.
- source_word: ἀνέπεμψεν
  english_pob_choice: sent him back
  chosen_spanish: lo envió de vuelta
  alternatives_spanish:
  - lo devolvió
  - lo remitió de vuelta
  lexicon: BDAG
  rationale: En este contexto judicial, el verbo tiene sentido de reenviar o devolver a una autoridad previa. «Lo envió de vuelta» expresa bien ese procedimiento en español actual.
- source_word: τῷ Πιλάτῳ
  english_pob_choice: to Pilate
  chosen_spanish: a Pilato
  alternatives_spanish:
  - para Pilato
  lexicon: BDAG
  rationale: Se conserva el nombre propio transliterado de forma estándar en español bíblico.
theological_decisions:
- issue: Ironía de honor burlesco en la vestidura
  english_pob_reading: Render the garment phrase in a way that preserves the irony of mock honor without specifying more than the Greek states.
  chosen_spanish_reading: Mantener «ropa espléndida» para preservar la ironía de un honor aparente usado como burla, sin convertir la prenda en un «manto real» no explicitado por el griego.
  alternative_spanish_readings:
  - manto espléndido
  - vestidura real
  - ropa de gala
  rationale: El texto presenta desprecio y burla; la prenda contribuye a esa humillación. Pero el griego no especifica «manto» ni dice explícitamente que fuera una vestidura real, así que la traducción debe conservar la tensión sin ampliarla.
  doctrine_reference: Preservar la tensión textual y no resolverla interpretativamente más allá del griego.
translation_notes:
  revision_awareness: La redacción incorpora la revisión que añadió «también» para reflejar con mayor plenitud la secuencia δὲ ... καὶ ὁ Ἡρῴδης. También evita especificar indebidamente una prenda concreta, manteniendo la amplitud de ἐσθῆτα λαμπρὰν como en el audit trail inglés.
  spanish_consistency_notes:
  - Se usa «Pilato» para el nombre propio, conforme a la transliteración estándar.
  - «Desprecio» y «se burló» conservan la doble acción de humillación y burla del original.
  - La nota a pie de página está anclada correctamente en el texto con [a], evitando una nota sin marcador visible.
