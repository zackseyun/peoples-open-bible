    rationale: La forma española propuesta no sigue de cerca la forma auditada 'Hushai' y puede resultar menos reconocible. 'Husai' transmite mejor la secuencia consonántica y evita una acentuación gráfica innecesaria.
  - severity: low
    issue: Topónimo final sin reflejar plenamente la forma auditada 'Bealoth'
    rationale: '''Bealot'' es comprensible como adaptación española, pero dado que la nota ya trata la incertidumbre textual entre ''Bealoth'' y ''Aloth'', conviene mantener la base ''Bealot'' y conservar la nota; no es un error grave, solo un punto a vigilar en consistencia de transliteración.'
