translation:
  language: es
  text: 'Después de él, sus hermanos repararon: Bavvai hijo de Henadad[a], jefe de la mitad del distrito de Queila.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunas tradiciones textuales leen «Binnui» en lugar de «Bavvai».
    reason: textual_variant
lexical_decisions:
- source_word: אַחֲרָיו
  english_pob_choice: After him
  chosen_spanish: Después de él
  alternatives_spanish:
  - Tras él
  - Luego de él
  - A continuación de él
  lexicon: HALOT
  rationale: La expresión marca secuencia en la lista de reconstrucción. En español, «Después de él» conserva el valor de orden sin forzar una imagen espacial que el contexto no exige.
- source_word: הֶחֱזִיקוּ
  english_pob_choice: repaired
  chosen_spanish: repararon
  alternatives_spanish:
  - fortalecieron
  - restauraron
  - hicieron reparaciones
  lexicon: HALOT
  rationale: En Nehemías 3 el verbo funciona idiomáticamente para la labor de reconstrucción del muro. «Repararon» comunica bien el sentido de obra material y evita un calco demasiado literal de «fortalecieron».
- source_word: אֲחֵיהֶם
  english_pob_choice: their brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus parientes
  - sus compatriotas
  - sus correligionarios
  lexicon: HALOT
  rationale: Se conserva la relación lexical explícita del hebreo. En este contexto probablemente se refiere a compañeros o compatriotas, pero el texto fuente dice «hermanos» y se mantiene esa forma, como en la línea auditada en inglés.
- source_word: בַּוַּי
  english_pob_choice: Bavvai
  chosen_spanish: Bavvai
  alternatives_spanish:
  - Binnui
  lexicon: HALOT
  rationale: Se translitera el nombre según la forma consonántico-vocálica dada en el texto fuente. La variante textual con Binnui queda reflejada en nota.
- source_word: בֶּן חֵנָדָד
  english_pob_choice: son of Henadad
  chosen_spanish: hijo de Henadad
  alternatives_spanish:
  - descendiente de Henadad
  lexicon: HALOT
  rationale: La construcción patronímica estándar se vierte de manera transparente con «hijo de». Mantiene la relación genealógica sin añadir matices no presentes en el hebreo.
- source_word: שַׂר
  english_pob_choice: ruler
  chosen_spanish: gobernador
  alternatives_spanish:
  - funcionario
  - jefe
  - jefe administrativo
  lexicon: HALOT
  rationale: En este contexto administrativo, «gobernador» expresa mejor la autoridad sobre una subdivisión territorial que «ruler». Evita además un tono demasiado militar de «comandante» y suena natural en español bíblico contemporáneo.
- source_word: חֲצִי פֶּלֶךְ
  english_pob_choice: half the district
  chosen_spanish: la mitad del distrito
  alternatives_spanish:
  - la mitad de la región
  - la media provincia
  - la mitad de la comarca
  lexicon: HALOT
  rationale: El sintagma denota una subdivisión administrativa. «La mitad del distrito» reproduce con claridad la idea de una unidad territorial dividida, sin exagerar el alcance político de «provincia».
- source_word: קְעִילָה
  english_pob_choice: Keilah
  chosen_spanish: Keila
  alternatives_spanish:
  - Queila
  lexicon: HALOT
  rationale: Se translitera el topónimo según el criterio de nombres propios del proyecto. «Keila» es la forma española más simple y legible; «Queila» también es posible, pero la vocalización con k respeta mejor la transliteración directa.
translation_notes:
  revision_awareness: Se siguió el texto hebreo masorético proporcionado y se mantuvo la variante textual documentada en nota; no se requieren otras revisiones respecto del estado auditado en inglés.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u otra equivalencia reverencial porque no aparece el Tetragrámaton en este versículo.
  - Se mantuvo el patrón de nombres propios transliterados, con adaptación mínima al español para legibilidad.
  - «Distrito» se usa como equivalente administrativo de פֶּלֶךְ conforme al sentido contextual auditado.
