translation:
  language: es
  text: Hizo lo malo ante los ojos de Yahvé, pero[a] no como los reyes de Israel que fueron antes que él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «solo, no como los reyes de Israel que fueron antes que él». El hebreo רַק puede introducir una matización o traducirse de manera más literal como «solo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: He did
  chosen_spanish: Hizo
  alternatives_spanish:
  - Y hizo
  - Él hizo
  lexicon: HALOT
  rationale: El wayyiqtol narra una acción consecutiva. En español, el verbo simple en pretérito mantiene la fluidez narrativa sin añadir una conjunción innecesaria.
- source_word: הָרַע
  english_pob_choice: what was evil
  chosen_spanish: lo malo
  alternatives_spanish:
  - el mal
  - lo que era malo
  lexicon: HALOT
  rationale: El adjetivo con artículo funciona aquí de modo sustantivado. 'Lo malo' conserva ese valor evaluativo y suena natural en español.
- source_word: בְּעֵינֵי
  english_pob_choice: in the eyes of
  chosen_spanish: ante los ojos de
  alternatives_spanish:
  - a los ojos de
  - en la vista de
  lexicon: HALOT
  rationale: La imagen hebrea expresa evaluación desde el punto de vista de alguien. 'Ante los ojos de' conserva la metáfora y es idiomático en español bíblico moderno.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino explícito, conforme al criterio del proyecto para יְהוָה. 'Yahvé' preserva el nombre personal del pacto, en lugar de sustituirlo por un título.
- source_word: רַק
  english_pob_choice: yet
  chosen_spanish: aunque
  alternatives_spanish:
  - solo
  - pero
  lexicon: HALOT
  rationale: Aquí רַק introduce una restricción o matiz a la evaluación previa. En español, 'aunque' comunica bien la concesión/limitación de la comparación sin forzar un calco con 'solo'.
- source_word: לֹא כְּמַלְכֵי יִשְׂרָאֵל
  english_pob_choice: not like the kings of Israel
  chosen_spanish: no como los reyes de Israel
  alternatives_spanish:
  - no al modo de los reyes de Israel
  - no igual que los reyes de Israel
  lexicon: HALOT
  rationale: La construcción comparativa negativa se refleja de forma directa y clara. El sustantivo plural se conserva sin añadir interpretación extra.
- source_word: אֲשֶׁר הָיוּ לְפָנָיו
  english_pob_choice: who were before him
  chosen_spanish: que habían sido antes que él
  alternatives_spanish:
  - que estaban antes que él
  - que lo precedieron
  lexicon: HALOT
  rationale: La expresión hebrea indica los reyes anteriores. 'Habían sido antes que él' conserva el valor temporal y la referencia a los predecesores, aunque suena un poco más solemne que 'estaban antes que él'.
theological_decisions:
- issue: Nombre divino YHWH / יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. Se mantiene el nombre propio divino para preservar la referencia al pacto y la transparencia frente al texto original.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Matiz de רַק en la cláusula final
  english_pob_reading: yet / only, not like...
  chosen_spanish_reading: aunque no como...
  alternative_spanish_readings:
  - solo, no como...
  - pero no como...
  rationale: 'El hebreo permite una restricción que puede leerse como ''solo / únicamente'' o como una transición matizada. El español ''aunque'' conserva la tensión: hubo maldad, pero se introduce una comparación limitadora con otros reyes.'
  doctrine_reference: 'DOCTRINE.md: Lexical nuance and preserved tensions'
translation_notes:
  revision_awareness: El inglés POB opta por 'yet' para רַק y por 'in the eyes of Yahweh' para בְּעֵינֵי. En español se decidió mantener la metáfora ocular con una preposición más natural ('ante los ojos de') y trasladar el matiz concesivo con 'aunque', dejando la alternativa más literal en nota. No se introdujeron cambios textuales respecto al sentido del WLC ni a la lectura auditada del POB inglés.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente con el criterio del proyecto para יהוה.
  - Se mantiene un estilo bíblico sobrio y moderno, evitando 'el Señor' como sustituto del nombre divino.
  - '''Lo malo'' conserva la sustantivación evaluativa de הָרַע sin sobreinterpretarla.'
  - La nota al pie marca la alternativa léxica principal de רַק, que es la única tensión destacada por el auditor inglés.
