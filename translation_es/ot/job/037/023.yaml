translation:
  language: es
  text: Al Todopoderoso no podemos comprenderlo[a] —grande en poder[b]—; abundante en justicia y rectitud, no aflige[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «no podemos hallarlo», «no podemos alcanzarlo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «grande en poder» puede entenderse con la frase previa: «no podemos hallarlo/comprenderlo; es grande en poder». Además, «justicia» también puede traducirse «juicio» en la cláusula siguiente.'
    reason: lexical_alternative
  - marker: c
    text: La cláusula final también puede entenderse como «no responde»; sin embargo, en este contexto encaja menos bien que «no aflige».
    reason: alternative_reading
lexical_decisions:
- source_word: שַׁדַּי
  english_pob_choice: The Almighty
  chosen_spanish: el Todopoderoso
  alternatives_spanish:
  - Shaddai
  lexicon: HALOT
  rationale: En Job, שַׁדַּי funciona como título divino con el valor semántico de poder soberano. 'Todopoderoso' comunica el sentido al lector español mejor que una transliteración, manteniendo el carácter titular del hebreo.
- source_word: לֹא מְצָאנֻהוּ
  english_pob_choice: we cannot find him out
  chosen_spanish: no lo podemos encontrar
  alternatives_spanish:
  - no lo podemos hallar
  - no lo podemos comprender
  - no lo podemos alcanzar
  lexicon: HALOT
  rationale: El verbo מצא con sufijo remite a 'encontrar', pero en este contexto expresa imposibilidad de descubrir plenamente a Dios. 'No lo podemos encontrar' preserva la idea básica y deja abierta la tensión entre hallar, comprender o alcanzar que refleja el inglés auditado.
- source_word: שַׂגִּיא כֹחַ
  english_pob_choice: great in power
  chosen_spanish: grande en poder
  alternatives_spanish:
  - elevado en poder
  - abundante en fuerza
  - poderoso
  lexicon: HALOT
  rationale: שַׂגִּיא denota grandeza o elevación, y con כֹחַ forma una afirmación de potencia extraordinaria. 'Grande en poder' sigue de cerca la estructura hebrea y suena natural en español.
- source_word: וּמִשְׁפָּט
  english_pob_choice: and justice
  chosen_spanish: y en justicia
  alternatives_spanish:
  - y en juicio
  - y justicia
  lexicon: HALOT
  rationale: מִשְׁפָּט puede significar 'juicio' o 'justicia'. Aquí, junto con 'rectitud', expresa una cualidad moral de Dios; por eso 'justicia' es la opción más adecuada. La preposición 'en' ayuda a reflejar el valor adjetival del hebreo.
- source_word: וְרֹב צְדָקָה
  english_pob_choice: and abundant righteousness
  chosen_spanish: y abundante rectitud
  alternatives_spanish:
  - y abundante justicia
  - y gran rectitud
  - y plenitud de rectitud
  lexicon: HALOT
  rationale: רֹב introduce abundancia, y צְדָקָה puede rendirse como justicia o rectitud según el contexto. Dado que ya aparece 'justicia' para מִשְׁפָּט, 'rectitud' evita la repetición y conserva la fuerza moral del término.
- source_word: לֹא יְעַנֶּה
  english_pob_choice: he does not afflict
  chosen_spanish: no aflige
  alternatives_spanish:
  - no oprime
  - no atormenta
  - no responde
  lexicon: HALOT
  rationale: El piel de ענה aquí se entiende mejor como 'afligir' o 'oprimir'; la revisión inglesa prefirió 'afflict' por precisión. 'No aflige' mantiene esa elección y evita introducir la lectura minoritaria de 'responde' como sentido principal.
theological_decisions:
- issue: Cómo expresar la imposibilidad humana de 'encontrar' a Dios sin borrar la tensión del hebreo
  english_pob_reading: we cannot find him out
  chosen_spanish_reading: no lo podemos encontrar
  alternative_spanish_readings:
  - no lo podemos comprender
  - no lo podemos alcanzar
  rationale: La línea afirma la transcendencia divina y la limitación humana. 'No lo podemos encontrar' conserva la literalidad básica del verbo y permite que el contexto sostenga las otras implicaciones (comprender/alcanzar) sin resolverlas en una sola glosa.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
- issue: Cómo entender la cláusula final לֹא יְעַנֶּה en relación con la justicia y la rectitud divinas
  english_pob_reading: he does not afflict
  chosen_spanish_reading: no aflige
  alternative_spanish_readings:
  - no responde
  - no oprime
  rationale: En el flujo del verso, la afirmación sobre justicia y abundante rectitud culmina naturalmente en que Dios no actúa de manera aflictiva o injusta. 'No aflige' sigue el ajuste del audit trail inglés y evita sobrecargar el texto con la lectura de 'responder'.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del audit trail inglés, que prefirió 'afflict' frente a 'oppress' para la cláusula final. También conserva la distinción semántica entre מִשְׁפָּט ('justicia') y צְדָקָה ('rectitud'), evitando colapsarlas en un solo término en español.
  spanish_consistency_notes:
  - Se usa 'Todopoderoso' para שַׁדַּי, en línea con el valor semántico del título y con la política del proyecto de no transliterar cuando el sentido es transparente.
  - '''Justicia'' y ''rectitud'' se distinguen para reflejar la pareja hebrea מִשְׁפָּט / צְדָקָה sin redundancia innecesaria en español.'
  - '''Afige'' se emplea para mantener la decisión revisada del inglés auditado y dejar abierta la alternativa textual de ''responde'' en nota.'
  - 'La puntuación con punto y coma sigue la estructura retórica del verso: afirmación de transcendencia, descripción de poder, y clausula final moral.'
