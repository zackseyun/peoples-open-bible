revisions:
- from: Un gobernante falto de entendimiento es grande en actos de opresión[a], pero el que odia la ganancia injusta prolongará sus días[b].
  to: Un gobernante falto de entendimiento abunda en actos de opresión[a], pero el que odia la ganancia injusta prolongará sus días[b].
  rationale: Se reemplaza «es grande en actos de opresión» por «abunda en actos de opresión» para conservar el sentido de רַב מַעֲשַׁקּוֹת de manera más idiomática y clara en español, sin perder la nota que documenta la literalidad hebrea y la alternativa «extorsión».
