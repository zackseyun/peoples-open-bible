    text: Or “Pardon me, my lord.” The Hebrew opening is a deferential plea.
    reason: lexical_alternative
  - marker: b
    text: Literally “in the ears of my lord,” a Hebrew idiom meaning “so that my lord may hear.”
    reason: cultural_note
  - marker: c
    text: Or “do not be angry with your servant.” Literally, “do not let your anger burn against your servant.”
    reason: lexical_alternative
