translation:
  language: es
  text: Además[a], Manasés derramó muchísima sangre inocente, hasta que llenó Jerusalén de extremo a extremo, además de su pecado por el cual hizo pecar a Judá, hasta hacer lo que era malo a los ojos de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «llenó Jerusalén boca a boca», un modismo que significa por toda la ciudad, de extremo a extremo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  english_pob_choice: Moreover
  chosen_spanish: Además
  alternatives_spanish:
  - Asimismo
  - Y además
  - Más aún
  lexicon: HALOT
  rationale: La partícula suma otra acusación y añade énfasis. «Además» conserva bien ese valor aditivo sin sonar forzado en español.
- source_word: דָּם נָקִי
  english_pob_choice: innocent blood
  chosen_spanish: sangre inocente
  alternatives_spanish:
  - la sangre de inocentes
  - sangre de inocentes
  lexicon: HALOT
  rationale: En español, «sangre inocente» mantiene la fórmula moral-jurídica del hebreo y resulta natural y bíblica.
- source_word: שָׁפַךְ
  english_pob_choice: shed
  chosen_spanish: derramó
  alternatives_spanish:
  - vertió
  - esparció
  lexicon: HALOT
  rationale: Para derramamiento de sangre, «derramó» reproduce el idioma bíblico del homicidio y suena más idiomático que «vertió».
- source_word: הַרְבֵּה מְאֹד
  english_pob_choice: very much
  chosen_spanish: muchísima
  alternatives_spanish:
  - en gran manera
  - excesivamente
  - mucho
  lexicon: HALOT
  rationale: La doble intensificación pide un equivalente fuerte y natural; «muchísima» conserva el énfasis cuantitativo sin perder fluidez.
- source_word: עַד אֲשֶׁר מִלֵּא אֶת יְרוּשָׁלִַם פֶּה לָפֶה
  english_pob_choice: until he had filled Jerusalem from one end to the other
  chosen_spanish: hasta llenar Jerusalén de extremo a extremo
  alternatives_spanish:
  - hasta llenarla de un extremo al otro
  - hasta llenarla de punta a punta
  - hasta llenarla boca a boca
  lexicon: HALOT
  rationale: El hebreo usa la imagen literal «boca a boca», pero el sentido idiomático es extensión total por toda la ciudad. «De extremo a extremo» preserva el valor semántico sin cargar el texto con un giro oscuro.
- source_word: לְבַד מֵחַטָּאתוֹ
  english_pob_choice: besides his sin
  chosen_spanish: además de su pecado
  alternatives_spanish:
  - aparte de su pecado
  - fuera de su pecado
  - además de ese pecado
  lexicon: HALOT
  rationale: «Además de» refleja la idea de añadido/aislado que marca לְבַד, y «su pecado» conserva el singular hebreo como síntesis de su conducta culpable.
- source_word: אֲשֶׁר הֶחֱטִיא אֶת יְהוּדָה
  english_pob_choice: by which he caused Judah to sin
  chosen_spanish: por el cual hizo pecar a Judá
  alternatives_spanish:
  - con el cual llevó a Judá a pecar
  - mediante el cual hizo que Judá pecara
  - por el que hizo caer a Judá en pecado
  lexicon: HALOT
  rationale: El hifil de חטא es causativo. «Hizo pecar» conserva la fuerza causal de manera directa y natural en español.
- source_word: לַעֲשׂוֹת הָרַע
  english_pob_choice: to do what was evil
  chosen_spanish: para hacer lo malo
  alternatives_spanish:
  - para hacer el mal
  - para hacer lo que era malo
  - a fin de hacer lo malo
  lexicon: HALOT
  rationale: El infinitivo expresa finalidad/consecuencia de ese pecado. «Para hacer lo malo» mantiene el valor resultativo y el juicio moral del texto.
- source_word: בְּעֵינֵי יְהוָה
  english_pob_choice: in the eyes of Yahweh
  chosen_spanish: ante los ojos de Yahvé
  alternatives_spanish:
  - a los ojos de Yahvé
  - en la presencia de Yahvé
  - en la vista de Yahvé
  lexicon: HALOT
  rationale: «Ante los ojos de» es una fórmula idiomática clara en español para el valor evaluativo hebreo; conserva la metáfora de percepción y juicio.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el Señor
  lexicon: HALOT
  rationale: 'Se sigue la política del proyecto para el Tetragrámaton: «Yahvé» como nombre propio divino, no una sustitución titulada.'
theological_decisions:
- issue: Forma de la referencia al nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el Señor
  rationale: El versículo contiene el Tetragrámaton directamente. Mantener un nombre propio en español preserva la referencia personal del pacto sin sustituirla por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Fuerza causativa de הֶחֱטִיא
  english_pob_reading: caused Judah to sin
  chosen_spanish_reading: hizo pecar a Judá
  alternative_spanish_readings:
  - llevó a Judá a pecar
  - hizo que Judá pecara
  rationale: La forma hifil indica causación directa. El español elegido mantiene esa responsabilidad activa sin suavizarla.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #5'
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa al reflejar el infinitivo final con «para hacer lo malo», y mantiene la solución idiomática para פֶּה לָפֶה como en el control auditado, pero en español con equivalencia natural.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme a la política del proyecto.
  - Se conserva la fuerza causativa de הֶחֱטִיא con «hizo pecar», evitando suavizaciones como «desvió» o «llevó».
  - «Sangre inocente» mantiene el registro bíblico-jurídico y evita una paráfrasis explicativa excesiva.
