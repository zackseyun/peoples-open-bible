  text: Todos los días de Matusalén fueron novecientos sesenta y nueve años, y murió.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּהְיוּ
  english_pob_choice: were
  chosen_spanish: fueron
  alternatives_spanish:
  - llegaron a ser
  lexicon: HALOT
  rationale: En esta fórmula genealógica, היה funciona como un sumario narrativo simple. En español, «fueron» mantiene el valor copulativo y el cierre de recuento sin volverlo forzado.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todo el
  lexicon: HALOT
  rationale: En la expresión fija «todos los días de», el plural español conserva el alcance total que tiene el hebreo כָּל en esta fórmula.
- source_word: יְמֵי
  english_pob_choice: the days of
  chosen_spanish: los días de
  alternatives_spanish:
  - la vida de
  - la duración de la vida de
  lexicon: HALOT
  rationale: «Los días de» conserva la formulación repetida de Génesis 5 y sigue de cerca el hebreo, sin perder claridad en español.
- source_word: מְתוּשֶׁלַח
  english_pob_choice: Methuselah
  chosen_spanish: Matusalén
  alternatives_spanish:
  - Methuselah
  lexicon: standard Spanish biblical name form
  rationale: Se usa la forma tradicional y reconocible en español bíblico, más natural para lectores hispanohablantes que la transliteración inglesa.
- source_word: תֵּשַׁע וְשִׁשִּׁים
  english_pob_choice: sixty-nine
  chosen_spanish: sesenta y nueve
  alternatives_spanish:
  - nueve y sesenta
  lexicon: HALOT
  rationale: El español idiomático invierte el orden numérico hebreo para expresar la cantidad con naturalidad, sin perder exactitud.
- source_word: וּתְשַׁע מֵאוֹת
  english_pob_choice: nine hundred
  chosen_spanish: novecientos
  alternatives_spanish:
  - y nueve cientos
  lexicon: HALOT
  rationale: La suma numérica se expresa de forma normal en español como «novecientos», manteniendo el total del hebreo.
- source_word: שָׁנָה ... שָׁנָה
  english_pob_choice: years
  chosen_spanish: años
  alternatives_spanish:
  - año
  lexicon: HALOT
  rationale: Aunque el hebreo usa singular tras numerales, el español requiere el plural aquí. «Años» transmite correctamente el recuento total.
- source_word: וַיָּמֹת
  english_pob_choice: and he died
  chosen_spanish: y murió
  alternatives_spanish:
  - y él murió
  - entonces murió
  lexicon: HALOT
  rationale: En español, el pronombre sujeto no es necesario y la fórmula final queda más natural con «y murió», conservando el cierre narrativo.
translation_notes:
  revision_awareness: El texto sigue de cerca la fórmula genealógica hebrea y coincide con la revisión inglesa sin notas textuales ni variantes registradas; no se introducen aclaraciones doctrinales o críticas porque el versículo no presenta tensiones específicas en el aparato dado.
  spanish_consistency_notes:
  - Se mantiene el tono genealógico sobrio y repetitivo típico de Génesis 5.
  - Se usa la forma española establecida «Matusalén» para un nombre propio bíblico ampliamente asentado.
  - La puntuación reproduce una sola cláusula sumaria con coordinación final, conforme al patrón del texto fuente.
