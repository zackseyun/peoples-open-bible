translation:
  language: es
  text: Pobreza y deshonra son para el que rechaza la disciplina[a], pero el que guarda la reprensión[b] será honrado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «rechaza» refleja la fuerza de פּוֹרֵעַ aquí; también puede entenderse como «descuida» o «abandona» la disciplina.
    reason: lexical_alternative
  - marker: b
    text: «guarda» traduce literalmente שׁוֹמֵר, con el sentido de atender cuidadosamente y retener la reprensión.
    reason: lexical_alternative
lexical_decisions:
- source_word: רֵישׁ
  english_pob_choice: Poverty
  chosen_spanish: Pobreza
  alternatives_spanish:
  - indigencia
  - miseria
  - carencia
  lexicon: HALOT
  rationale: El término hebreo denota falta o pobreza material; «pobreza» es la opción natural en español y conserva el valor proverbial de consecuencia.
- source_word: קָלוֹן
  english_pob_choice: disgrace
  chosen_spanish: deshonra
  alternatives_spanish:
  - vergüenza
  - afrenta
  - ignominia
  lexicon: HALOT
  rationale: El hebreo apunta a deshonra pública o vergüenza social; «deshonra» mantiene ese matiz mejor que una vergüenza puramente interior.
- source_word: פּוֹרֵעַ מוּסָר
  english_pob_choice: one who ignores discipline
  chosen_spanish: el que rechaza la disciplina
  alternatives_spanish:
  - el que descuida la disciplina
  - el que abandona la disciplina
  - el que ignora la disciplina
  lexicon: HALOT
  rationale: El participio de פרע en este contexto expresa soltar, dejar de lado o rechazar la instrucción correctiva. «Rechaza» comunica bien esa acción voluntaria sin volver la frase torpe en español.
- source_word: מוּסָר
  english_pob_choice: discipline
  chosen_spanish: disciplina
  alternatives_spanish:
  - instrucción
  - corrección
  - formación
  lexicon: HALOT
  rationale: En Proverbios, מוּסָר suele referirse a disciplina correctiva o formativa; «disciplina» preserva ese campo semántico en español.
- source_word: שׁוֹמֵר
  english_pob_choice: whoever heeds
  chosen_spanish: el que guarda
  alternatives_spanish:
  - el que atiende
  - el que observa
  - el que conserva
  lexicon: HALOT
  rationale: Literalmente «guardar/proteger», pero en el paralelismo implica atender y retener con cuidado. «Guarda» conserva la imagen verbal hebrea y la relación con el verbo opuesto.
- source_word: תּוֹכַחַת
  english_pob_choice: reproof
  chosen_spanish: reprensión
  alternatives_spanish:
  - corrección
  - amonestación
  - reprendido
  lexicon: HALOT
  rationale: El sustantivo designa corrección verbal o reprensión. «Reprensión» mantiene el tono sapiencial y distingue este término de מוּסָר.
- source_word: יְכֻבָּד
  english_pob_choice: will be honored
  chosen_spanish: será honrado
  alternatives_spanish:
  - será estimado
  - recibirá honra
  - será engrandecido
  lexicon: HALOT
  rationale: El pasivo de כבד expresa recibir honor. «Será honrado» es la forma más natural y fiel en español.
translation_notes:
  revision_awareness: El borrador sigue de cerca el sentido auditado del texto hebreo y mantiene la tensión léxica entre rehusar disciplina y guardar reprensión, sin depender mecánicamente del inglés.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque este versículo no contiene el nombre divino.
  - «disciplina» y «reprensión» se distinguen para preservar el paralelismo hebreo.
  - «deshonra» se usa como equivalente de קָלוֹן para mantener el matiz público/social de la vergüenza.
