translation:
  language: es
  text: ¡Cuán agradables[a] son tus moradas, Yahvé de las huestes!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «amadas» o «encantadoras».
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה
  english_pob_choice: How
  chosen_spanish: ¡Cuán!
  alternatives_spanish:
  - ¡Cómo!
  - ¡Qué!
  lexicon: HALOT
  rationale: En español, la exclamación poética más natural para מַה en este contexto es «cuán», que conserva el valor admirativo sin convertir la frase en una pregunta. «Qué» también sería posible, pero «cuán» suena más solemne y literario.
- source_word: יְּדִידוֹת
  english_pob_choice: lovely
  chosen_spanish: encantadoras
  alternatives_spanish:
  - amadas
  - queridas
  - agradables
  lexicon: HALOT
  rationale: El hebreo expresa belleza/amorabilidad afectiva en tono poético. «Encantadoras» comunica esa cualidad estética y afectiva en español sin forzar una traducción demasiado literal como «amadas», que aplicado a lugares puede sonar menos natural.
- source_word: מִשְׁכְּנוֹתֶיךָ
  english_pob_choice: your dwelling places
  chosen_spanish: tus moradas
  alternatives_spanish:
  - tus viviendas
  - tus tabernáculos
  - tus lugares de morada
  lexicon: HALOT
  rationale: El plural con sufijo de segunda persona señala los lugares donde Dios habita; «moradas» preserva la pluralidad y la dignidad poética. Evito «tabernáculos» porque en español puede restringir indebidamente el sentido al tabernáculo mosaico y sonar más técnico que el hebreo aquí.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Siguiendo la convención del proyecto, el Tetragrámaton se vierte como «Yahvé», manteniendo el nombre propio divino y evitando la sustitución por un título.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de los ejércitos
  lexicon: HALOT
  rationale: «Ejércitos» conserva la amplitud semántica de צְבָאוֹת en el título divino y es plenamente comprensible en español. «De los ejércitos» mantiene el paralelismo reverente del hebreo; «celestiales» introduciría una especificación no explícita en el texto.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: O Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton, por lo que se conserva el nombre divino en español. «Yahvé» sigue la política terminológica del proyecto y evita la sustitución por «Señor», que ocultaría el nombre revelado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Rendering the title יְהוָה צְבָאוֹת
  english_pob_reading: O Yahweh of hosts
  chosen_spanish_reading: Yahvé de los ejércitos
  alternative_spanish_readings:
  - Yahvé de los ejércitos celestiales
  - Yahvé de las huestes
  rationale: La construcción mantiene el nombre propio unido al título. «De los ejércitos» reproduce con claridad la fuerza de צְבָאוֹת sin introducir una restricción interpretativa adicional. «Huestes» es posible, pero menos transparente para el lector moderno.
  doctrine_reference: DOCTRINE.md Translation philosophy §§5–6
translation_notes:
  revision_awareness: El audit trail en inglés no muestra revisiones aplicadas y la última pasada quedó sin cambios; la versión española sigue esa lectura estable, conservando el tono exclamativo, la pluralidad de «moradas» y la forma del nombre divino según la terminología del proyecto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme a la terminología del proyecto.
  - Se conserva el plural de posesión con «moradas» para reflejar מִשְׁכְּנוֹתֶיךָ.
  - La exclamación se vierte con «¡Cuán!» para preservar el valor admirativo de מַה.
  - «De los ejércitos» transmite צְבָאוֹת con registro bíblico claro y sin añadir contenido no explicitado.
