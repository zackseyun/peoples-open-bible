translation:
  language: es
  text: La necedad[a] es colocada en muchos lugares altos, y los ricos se sientan en un lugar bajo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La necedad es puesta en muchos puestos elevados». El hebreo usa lenguaje espacial («lugares altos» / «lugar bajo») de manera metafórica para el rango social o el cargo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נִתַּן
  english_pob_choice: is set
  chosen_spanish: es puesta
  alternatives_spanish:
  - es colocada
  - es establecida
  - se pone
  lexicon: HALOT
  rationale: 'El nifal de נתן expresa voz pasiva: ''ser puesta/colocada''. ''Es puesta'' conserva la pasividad y funciona con naturalidad en español sin añadir una agencia que el hebreo no explicita.'
- source_word: הַסֶּכֶל
  english_pob_choice: folly
  chosen_spanish: la necedad
  alternatives_spanish:
  - la insensatez
  - la foolishness
  - el necio
  lexicon: HALOT
  rationale: El sustantivo designa la cualidad o condición de falta de juicio, no a una persona concreta. 'Necedad' comunica bien esa idea y mantiene el contraste sapiencial con la sabiduría.
- source_word: בַּמְּרוֹמִים רַבִּים
  english_pob_choice: in many high places
  chosen_spanish: en muchos lugares altos
  alternatives_spanish:
  - en muchas alturas
  - en muchas posiciones encumbradas
  - en altos cargos
  lexicon: HALOT
  rationale: '''Lugares altos'' conserva la metáfora espacial del hebreo y ''muchos'' refleja רַבִּים. Evito ''cargos'' como traducción principal porque sería más interpretativo; la metáfora puede aludir a rango social u oficio.'
- source_word: וַעֲשִׁירִים
  english_pob_choice: and the rich
  chosen_spanish: y los ricos
  alternatives_spanish:
  - y los adinerados
  - y los hombres ricos
  - y los poderosos
  lexicon: HALOT
  rationale: El adjetivo plural funciona sustantivamente. 'Los ricos' es el equivalente más natural en español y preserva la referencia a una clase social.
- source_word: בַּשֵּׁפֶל
  english_pob_choice: in a low place
  chosen_spanish: en un lugar bajo
  alternatives_spanish:
  - en la bajeza
  - en un lugar humilde
  - en lo bajo
  lexicon: HALOT
  rationale: שֵׁפֶל denota bajeza o un lugar bajo. 'Lugar bajo' mantiene el paralelismo con 'lugares altos' y deja abierta la imagen metafórica de posición social.
- source_word: יֵשֵׁבוּ
  english_pob_choice: sit
  chosen_spanish: se sientan
  alternatives_spanish:
  - habitan
  - permanecen
  - se sientan allí
  lexicon: HALOT
  rationale: ישב puede significar 'sentarse' o 'ocupar/estar asentado'. 'Se sientan' reproduce la imagen concreta y el paralelismo con la expresión espacial del versículo.
translation_notes:
  revision_awareness: 'Coincide con la lectura auditada en inglés: el versículo mantiene el paralelismo espacial entre ''lugares altos'' y ''lugar bajo'', sin explicitar más de lo que permite el hebreo. La revisión más reciente no introdujo cambios, y el acuerdo de control cruzado fue alto.'
  spanish_consistency_notes:
  - Se prefirió 'la necedad' para reflejar el sustantivo abstracto del hebreo, no 'el necio'.
  - Se mantuvo la metáfora espacial para no apagar el contraste entre elevación y bajeza.
  - '''Los ricos'' conserva el valor sustantivado del adjetivo plural hebreo.'
