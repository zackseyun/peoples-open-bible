translation:
  language: es
  text: Solo los lugares altos no fueron quitados; el pueblo todavía sacrificaba y quemaba incienso en los lugares altos[a]. Él edificó la puerta superior de la casa de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘quemaba incienso en los lugares altos’. El verbo hebreo puede referirse de manera más específica al incienso o, de manera más amplia, a hacer subir una ofrenda en humo.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  english_pob_choice: Only
  chosen_spanish: Solo
  alternatives_spanish:
  - Únicamente
  - Solamente
  - Pero
  lexicon: HALOT
  rationale: Expresa la idea exclusiva/contrastiva del hebreo en un registro natural y directo para español bíblico contemporáneo.
- source_word: הַבָּמוֹת / בַּבָּמוֹת
  english_pob_choice: the high places
  chosen_spanish: los lugares altos
  alternatives_spanish:
  - los altos
  - los santuarios altos
  - los lugares de culto en las alturas
  lexicon: HALOT
  rationale: Conserva el término tradicional de estudio sin sonar demasiado técnico; en español, 'lugares altos' comunica bien el sentido cultual de בָּמוֹת.
- source_word: לֹא סָרוּ
  english_pob_choice: were not removed
  chosen_spanish: no fueron quitados
  alternatives_spanish:
  - no fueron removidos
  - no desaparecieron
  - no fueron apartados
  lexicon: HALOT
  rationale: Mantiene la idea de permanencia de los lugares altos; 'quitados' refleja el valor pasivo de la construcción sin forzar un calco.
- source_word: עוֹד
  english_pob_choice: still
  chosen_spanish: todavía
  alternatives_spanish:
  - aún
  - todavía seguía
  lexicon: HALOT
  rationale: Marca continuidad de la práctica pese a la reforma, con un adverbio natural en español.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la población
  lexicon: HALOT
  rationale: '''Pueblo'' conserva mejor el referente colectivo e histórico del texto bíblico que ''gente''.'
- source_word: מְזַבְּחִים
  english_pob_choice: were sacrificing
  chosen_spanish: sacrificaba
  alternatives_spanish:
  - ofrecía sacrificios
  - estaba sacrificando
  lexicon: HALOT
  rationale: El participio hebreo expresa acción continua/habitual; el imperfecto simple en español bíblico transmite esa continuidad con fluidez.
- source_word: וּמְקַטְּרִים
  english_pob_choice: burning incense
  chosen_spanish: quemaba incienso
  alternatives_spanish:
  - ofrecía incienso
  - hacía humear
  - quemaba ofrendas
  lexicon: HALOT
  rationale: El verbו קטר puede aludir específicamente a incienso; 'quemaba incienso' es natural en español y respeta la decisión revisada del POB inglés, sin reducir el culto a un simple humo genérico.
- source_word: הוּא
  english_pob_choice: He
  chosen_spanish: Él
  alternatives_spanish:
  - Y él
  - Fue él quien
  lexicon: HALOT
  rationale: Mantiene el pronombre independiente con el énfasis leve del hebreo sin recargar el estilo.
- source_word: בָּנָה
  english_pob_choice: built
  chosen_spanish: edificó
  alternatives_spanish:
  - construyó
  - levantó
  - reconstruyó
  lexicon: HALOT
  rationale: '''Edificó'' es bíblico y claro en español; preserva el acto constructivo sin asumir necesariamente que se trata de una reconstrucción.'
- source_word: שַׁעַר בֵּית יְהוָה
  english_pob_choice: the gate of the house of Yahweh
  chosen_spanish: la puerta superior de la casa de Yahvé
  alternatives_spanish:
  - la puerta de la casa de Yahvé
  - la puerta del templo de Yahvé
  lexicon: HALOT
  rationale: '''Casa de Yahvé'' sigue de cerca el hebreo בֵּית יְהוָה; ''puerta'' es una opción idiomática para שַׁעַר en español bíblico, y ''superior'' refleja הָעֶלְיוֹן como rasgo distintivo de ubicación.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton, conservando el nombre divino propio en español.
- source_word: הָעֶלְיוֹן
  english_pob_choice: upper
  chosen_spanish: superior
  alternatives_spanish:
  - alto
  - de arriba
  - más alto
  lexicon: HALOT
  rationale: En el contexto arquitectónico, 'superior' comunica la ubicación relativa de la puerta sin perder la referencia topográfica del hebreo.
theological_decisions:
- issue: Renderización del Nombre Divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton; el proyecto pide transliterarlo como 'Yahvé' en español, preservando el nombre pactal y evitando el enmascaramiento litúrgico.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: La redacción sigue el pasaje hebreo directamente y toma en cuenta el ajuste final del audit trail inglés, que prefirió 'burning incense' como el valor más natural para מְקַטְּרִים, sin perder la posible amplitud semántica señalada en la nota.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה de forma consistente con el estándar del proyecto.
  - '''Lugares altos'' traduce בָּמוֹת de manera uniforme y reconocible en literatura bíblica en español.'
  - '''Casa de Yahvé'' conserva el sustantivo relacional del hebreo sin sustituirlo por ''templo'', que sería interpretativo.'
  - El orden de las dos acciones cultuales sigue el hebreo y ayuda a preservar el ritmo del versículo.
  - La nota [a] queda anclada explícitamente en el texto para evitar un pie de nota flotante.
