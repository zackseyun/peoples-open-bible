translation:
  language: es
  text: Entre las piedras lisas del valle está tu porción[a]; ellas, ellas son tu suerte. Sí, a ellas derramaste libación; ofreciste ofrenda vegetal. ¿Cederé por estas cosas?[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Entre las porciones del valle»; el hebreo probablemente alude a las piedras lisas del lecho de un wadi, en consonancia con el contexto idolátrico.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «¿Me consolaré por estas cosas?»; el verbo hebreo también puede llevar la idea de ser consolado o apaciguado.'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּחַלְּקֵי נַחַל
  english_pob_choice: Among the smooth stones of the valley
  chosen_spanish: Entre las piedras lisas del valle
  alternatives_spanish:
  - Entre las porciones del valle
  - Entre las partes lisas del torrente
  - Entre las piedras pulidas del valle
  lexicon: HALOT
  rationale: חַלְּקֵי puede referirse a superficies lisas o resbaladizas; en este contexto, la lectura de piedras lisas en el lecho de un wadi encaja con el trasfondo idolátrico y con el antecedente pronominal inmediato. «Valle» transmite נחל de manera natural en español, sin perder la imagen geográfica.
- source_word: חֶלְקֵךְ
  english_pob_choice: your portion
  chosen_spanish: tu porción
  alternatives_spanish:
  - tu parte
  - tu herencia
  - tu suerte
  lexicon: HALOT
  rationale: חלק expresa la porción o parte asignada a alguien. «Porción» mantiene la conexión verbal y conceptual con גּוֹרָלֵךְ («tu suerte»).
- source_word: הֵם הֵם
  english_pob_choice: they, they
  chosen_spanish: ellas, ellas
  alternatives_spanish:
  - ellas mismas
  - esas mismas
  - sí, ellas
  lexicon: HALOT
  rationale: La repetición es enfática. En español conviene duplicarla explícitamente para conservar el énfasis retórico del hebreo. Se usa femenino plural porque el referente inmediato en español queda mejor expresado como «piedras».
- source_word: גּוֹרָלֵךְ
  english_pob_choice: your lot
  chosen_spanish: tu suerte
  alternatives_spanish:
  - tu suerte asignada
  - tu lote
  - tu porción asignada
  lexicon: HALOT
  rationale: גורל denota sorteo, lote o porción asignada. «Suerte» conserva la idea concreta de asignación y suena natural junto a «porción», aunque «lote» también sería posible.
- source_word: נֶסֶךְ
  english_pob_choice: a drink offering
  chosen_spanish: libación
  alternatives_spanish:
  - ofrenda líquida
  - ofrenda de bebida
  - libación derramada
  lexicon: HALOT
  rationale: En contexto sacrificial, נֶסֶךְ es la ofrenda líquida derramada sobre un altar. «Libación» es el término culto y preciso en español; se mantiene un registro digno y breve.
- source_word: הֶעֱלִית
  english_pob_choice: you have offered up
  chosen_spanish: ofreciste
  alternatives_spanish:
  - has ofrecido
  - levantaste como ofrenda
  - presentaste
  lexicon: HALOT
  rationale: El hiphil de עלה en contexto sacrificial puede expresar ofrecer. «Ofreciste» comunica la acción sin forzar la imagen ascendente y conserva el paralelo con la libación.
- source_word: מִנְחָה
  english_pob_choice: a grain offering
  chosen_spanish: ofrenda vegetal
  alternatives_spanish:
  - ofrenda de cereal
  - ofrenda de grano
  - oblación
  lexicon: HALOT
  rationale: מִנְחָה en contexto cultual designa una ofrenda de cereal/grano. «Ofrenda vegetal» sigue una tradición bíblica en español y evita reducir el término a una simple ofrenda genérica. Se conserva la ambigüedad sacrificial sin resolverla de más.
- source_word: הַעַל אֵלֶּה אֶנָּחֵם
  english_pob_choice: Shall I relent because of these things?
  chosen_spanish: ¿Me apaciguaré por estas cosas?
  alternatives_spanish:
  - ¿Cederé por estas cosas?
  - ¿Me arrepentiré por estas cosas?
  - ¿Me dejaré convencer por estas cosas?
  lexicon: HALOT
  rationale: נחם en nifal puede significar arrepentirse, ceder, ser consolado o apaciguarse. En este contexto de denuncia, la pregunta retórica apunta a si tales actos moverían a Dios a apartar el juicio. «Apaciguar» conserva la tensión entre el posible sentido de consuelo/apaciguamiento y el matiz de no quedar satisfecho por el rito.
theological_decisions:
- issue: Sentido de la pregunta retórica final
  english_pob_reading: A question of divine relenting/withholding judgment
  chosen_spanish_reading: Una pregunta retórica sobre si estas ofrendas podrían apaciguar o inclinar a Yahvé a ceder
  alternative_spanish_readings:
  - Una pregunta sobre si Yahvé sería consolado por estas cosas
  - Una pregunta sobre si Yahvé se arrepentiría por estas cosas
  rationale: El contexto condena la idolatría; por eso la pregunta no sugiere que el culto falso pueda producir aprobación divina. La traducción conserva la fuerza negativa y deja abierta la tensión semántica de נחם sin resolverla por completo.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el audit trail inglés y adopta las revisiones más recientes: «ofreciste» para la ofrenda de cereal/grano y una pregunta final que mantiene la ambigüedad de נחם sin mecanizar el inglés. Se preserva la lectura contextual de las piedras lisas del valle y el paralelismo entre porción/suerte.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en coherencia con el estándar del proyecto para el nombre divino.
  - Se mantiene «libación» y «ofrenda vegetal» como términos sacrificiales cultos y auditablemente precisos.
  - Se duplica el pronombre para reproducir el énfasis hebreo de הֵם הֵם.
  - Se evita resolver la última cláusula en una sola paráfrasis teológica; la nota recoge la alternativa semántica principal.
