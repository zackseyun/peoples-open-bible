translation:
  language: es
  text: 'Porque así dice Yahvé de los Ejércitos, acerca de las columnas, el Mar[a], los soportes[b] y el resto de los utensilios que quedan en esta ciudad:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el Mar de bronce», el gran recipiente del templo.
    reason: cultural_note
  - marker: b
    text: O «bases» para «soportes».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto de verter el nombre divino por su forma propia en español. «Yahvé» mantiene la transparencia del Tetragrámaton y evita el ocultamiento litúrgico.
- source_word: צְבָאוֹת
  english_pob_choice: of Armies
  chosen_spanish: de los Ejércitos
  alternatives_spanish:
  - de los Ejércitos celestiales
  - de los Ejércitos del cielo
  - de los Ejércitos
  lexicon: HALOT
  rationale: Se traduce el título con fuerza concreta y militar. «Ejércitos» es más transparente que «Huestes» y conserva el sentido del plural hebreo.
- source_word: כֹה אָמַר
  english_pob_choice: thus says
  chosen_spanish: así dice
  alternatives_spanish:
  - así ha dicho
  - esto dice
  lexicon: HALOT
  rationale: La fórmula profética se expresa en español de modo natural y solemne. «Así dice» reproduce bien la fórmula en presente de proclamación.
- source_word: אֶל
  english_pob_choice: concerning
  chosen_spanish: acerca de
  alternatives_spanish:
  - sobre
  - respecto de
  lexicon: HALOT
  rationale: Aquí la preposición introduce el tema del oráculo, no un destinatario directo. «Acerca de» refleja esa relación temática con claridad.
- source_word: הָעַמֻּדִים
  english_pob_choice: the pillars
  chosen_spanish: las columnas
  alternatives_spanish:
  - los pilares
  lexicon: HALOT
  rationale: En el contexto del templo, «columnas» es una forma natural y precisa en español; «pilares» también sería posible, pero «columnas» fluye mejor en este inventario cultual.
- source_word: הַיָּם
  english_pob_choice: the Sea
  chosen_spanish: el Mar
  alternatives_spanish:
  - el Mar de bronce
  - la fuente grande
  - la pila
  lexicon: HALOT
  rationale: Se conserva el nombre cultual del objeto con mayúscula, como en el registro inglés. «El Mar» mantiene la referencia específica sin expandir el texto, aunque la nota explica la posibilidad del «Mar de bronce».
- source_word: הַמְּכֹנוֹת
  english_pob_choice: the stands
  chosen_spanish: los soportes
  alternatives_spanish:
  - las bases
  - los pedestales
  lexicon: HALOT
  rationale: El término designa los elementos de apoyo asociados a los utensilios del templo. «Soportes» es comprensible y evita fijar indebidamente una forma más técnica.
- source_word: יֶתֶר הַכֵּלִים
  english_pob_choice: the rest of the vessels
  chosen_spanish: el resto de los utensilios
  alternatives_spanish:
  - los demás utensilios
  - el resto de los vasos
  lexicon: HALOT
  rationale: «Utensilios» amplía correctamente el alcance de כֵּלִים para el inventario del templo y suena natural en español. «Resto de» conserva el valor de יֶתֶר como lo que queda.
- source_word: הַנּוֹתָרִים
  english_pob_choice: that remain
  chosen_spanish: que quedan
  alternatives_spanish:
  - que permanecen
  - restantes
  lexicon: HALOT
  rationale: La forma participial se vierte con una relativa simple y natural. «Que quedan» reproduce el sentido de lo que aún permanece en la ciudad.
- source_word: בָּעִיר הַזֹּאת
  english_pob_choice: in this city
  chosen_spanish: en esta ciudad
  alternatives_spanish:
  - en la ciudad esta
  - en esta urbe
  lexicon: HALOT
  rationale: La expresión se traduce de manera directa y sobria. El referente implícito es Jerusalén, pero no se explicita para no añadir información ajena al verso.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se preserva el nombre propio del pacto en vez de sustituirlo por un título funcional. Esto sigue la línea del proyecto y mantiene visible la referencia al Dios de Israel.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Traducción del título צְבָאוֹת
  english_pob_reading: of Armies
  chosen_spanish_reading: de los Ejércitos
  alternative_spanish_readings:
  - de las Huestes
  - de los Ejércitos celestiales
  rationale: Se evita «Huestes» por su opacidad para lectores modernos. «Ejércitos» conserva el matiz militar y el plural intensivo del hebreo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §2: Translate titles; transliterate names'
- issue: El nombre cultual הַיָּם
  english_pob_reading: the Sea
  chosen_spanish_reading: el Mar
  alternative_spanish_readings:
  - el Mar de bronce
  - la gran pila
  rationale: Se conserva el nombre tradicional del objeto, sin expandirlo en el texto principal. La nota permite la lectura cultural de que se trata del gran recipiente del templo.
  doctrine_reference: POB lexical note on cultic object names; Jeremiah temple furnishings context
translation_notes:
  revision_awareness: El texto coincide con el pasaje hebreo y con la línea de la versión inglesa POB en la actualización más reciente; no se registran revisiones posteriores que exijan ajuste de sentido. Se mantuvo la terminología del objeto cultual con una nota explicativa, sin sobreexplicar el inventario del templo en el cuerpo del versículo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino en concordancia con el proyecto.
  - Se usa «Ejércitos» para צְבָאוֹת como traducción transparente del título divino.
  - Se preserva «el Mar» con mayúscula como nombre cultual del objeto.
  - «Soportes» traduce la función de מְכֹנוֹת sin comprometer indebidamente una identificación técnica única.
  - «Utensilios» cubre bien כֵּלִים en el contexto de inventario sagrado.
