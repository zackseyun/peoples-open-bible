revisions:
- from: A veces la nube permanecía sobre el tabernáculo por[a] un número de días; al mandato de Yahvé acampaban, y al mandato de Yahvé partían.
  to: A veces la nube permanecía sobre el tabernáculo durante varios días; por mandato de Yahvé[a] acampaban, y por mandato de Yahvé partían.
  rationale: 'Se ajusta la redacción para mejorar la naturalidad del español sin apartarse del sentido fuente: «durante varios días» transmite mejor יָמִים מִסְפָּר que «por un número de días». Además, se sustituye «al mandato de Yahvé» por «por mandato de Yahvé», y se reubica el anclaje de la nota al sintagma que realmente traduce עַל־פִּי יְהוָה.'
  reviewer_model: gpt-5.4
