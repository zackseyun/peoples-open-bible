  text: וַ/יִּשְׁמַ֣ע הַ/מֶּֽלֶךְ יְ֠הוֹיָקִים וְ/כָל גִּבּוֹרָ֤י/ו וְ/כָל הַ/שָּׂרִים֙ אֶת דְּבָרָ֔י/ו וַ/יְבַקֵּ֥שׁ הַ/מֶּ֖לֶךְ הֲמִית֑/וֹ וַ/יִּשְׁמַ֤ע אוּרִיָּ֨הוּ֙ וַ/יִּרָ֔א וַ/יִּבְרַ֖ח וַ/יָּבֹ֥א מִצְרָֽיִם־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/026/021.yaml
  text: When King Jehoiakim[a], and all his mighty men, and all the officials heard his words, the king sought to put him to death. But when Uriah heard[b], he was afraid and fled and went to Egypt.
  footnotes:
  - marker: a
    text: Or, more formally, 'his mighty men' for 'his warriors.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'came to Egypt'; English idiom renders the movement as 'went to Egypt.'
    reason: lexical_alternative
