translation:
  language: es
  text: Pero él se negó a apartarse, así que Abner lo hirió en el vientre[a] con la parte trasera de la lanza, y la lanza salió por detrás de él; cayó allí y murió donde estaba. Y todos los que llegaban al lugar donde Asael había caído y muerto se detenían.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo חֹמֶשׁ es difícil: en algunas versiones antiguas se traduce «la quinta costilla», pero en este contexto parece referirse más ampliamente al área del abdomen o vientre.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְמָאֵן / he refused
  english_pob_choice: he refused
  chosen_spanish: se negó
  alternatives_spanish:
  - rehusó
  - se negó a
  lexicon: HALOT
  rationale: מָאֵן expresa negativa o rechazo voluntario. En español, 'se negó' comunica bien el acto de rechazo en una narración fluida y digna, sin perder la fuerza volitiva del hebreo.
- source_word: לָסוּר / to turn aside
  english_pob_choice: to turn aside
  chosen_spanish: apartarse
  alternatives_spanish:
  - desviarse
  - volver atrás
  lexicon: HALOT
  rationale: סוּר conserva la imagen concreta de apartarse del camino o de la persecución. 'Apartarse' es natural en español y mantiene la idea de desviar la acción sin interpretarla más de lo necesario.
- source_word: וַיַּכֵּהוּ / struck him
  english_pob_choice: struck him
  chosen_spanish: lo hirió
  alternatives_spanish:
  - lo golpeó
  - lo apuñaló
  lexicon: HALOT
  rationale: נכה puede abarcar golpear o herir según el contexto. Aquí el resultado inmediato es una herida mortal por lanza; por eso 'lo hirió' comunica mejor el efecto narrativo que un simple 'golpeó'.
- source_word: בְּאַחֲרֵי הַחֲנִית / with the back end of the spear
  english_pob_choice: with the back end of the spear
  chosen_spanish: con el extremo posterior de la lanza
  alternatives_spanish:
  - con la parte trasera de la lanza
  - con el reverso de la lanza
  lexicon: HALOT
  rationale: אַחֲרֵי designa la parte de atrás o posterior. 'Extremo posterior' reproduce con precisión la relación espacial y evita introducir una imagen ajena al hebreo.
- source_word: אֶל הַחֹמֶשׁ / in the belly
  english_pob_choice: in the belly
  chosen_spanish: en el vientre
  alternatives_spanish:
  - en el abdomen
  - en la barriga
  lexicon: HALOT
  rationale: חֹמֶשׁ es un término anatómico difícil; el audit trail inglés opta por 'belly' para el área abdominal. 'Vientre' es la opción española más natural y sobria para ese campo semántico.
- source_word: וַתֵּצֵא הַחֲנִית מֵאַחֲרָיו / the spear came out behind him
  english_pob_choice: the spear came out behind him
  chosen_spanish: la lanza salió por detrás de él
  alternatives_spanish:
  - la lanza salió por su espalda
  - la lanza le salió por detrás
  lexicon: HALOT
  rationale: El hebreo describe el paso completo de la lanza y su salida por la parte posterior. 'Salió por detrás de él' preserva la referencia espacial sin añadir detalles no explícitos como 'espalda'.
- source_word: וַיִּפָּל שָׁם / he fell there
  english_pob_choice: he fell there
  chosen_spanish: cayó allí
  alternatives_spanish:
  - cayó allí mismo
  - se desplomó allí
  lexicon: HALOT
  rationale: La secuencia narrativa pide un verbo simple. 'Cayó allí' es breve y fiel al movimiento expresado por נפל.
- source_word: וַיָּמָת תַּחְתָּו / died where he was
  english_pob_choice: died where he was
  chosen_spanish: murió donde estaba
  alternatives_spanish:
  - murió en el acto
  - murió allí mismo
  lexicon: HALOT
  rationale: תחתיו indica muerte en el lugar, sin desplazamiento. 'Murió donde estaba' refleja esa inmediatez con una formulación sobria y cercana al hebreo, siguiendo la revisión inglesa más literal.
- source_word: כָּל הַבָּא / everyone who came
  english_pob_choice: everyone who came
  chosen_spanish: todos los que llegaban
  alternatives_spanish:
  - todos los que venían
  - cada uno que llegaba
  lexicon: HALOT
  rationale: El participio con כָּל tiene valor distributivo y continuo. 'Todos los que llegaban' captura bien la escena repetida de quienes se acercaban al lugar.
- source_word: וַיַּעֲמֹדוּ / stood still
  english_pob_choice: stood still
  chosen_spanish: se detenían
  alternatives_spanish:
  - se quedaban quietos
  - se paraban
  lexicon: HALOT
  rationale: עָמַד aquí expresa detenerse al ver lo sucedido. 'Se detenían' conserva el aspecto de pausa física y responde bien al flujo narrativo del pasaje.
translation_notes:
  revision_awareness: El texto base inglés fue revisado desde 'on the spot' a 'where he was' para ajustar con mayor literalidad el valor idiomático de תחתיו; la redacción española sigue esa lectura, evitando una paráfrasis más libre. También se prefirió un equivalente español natural de 'back end'/'rear' que preserve la dirección posterior sin introducir una terminología tradicional no sustentada por el hebreo.
  spanish_consistency_notes:
  - Se mantiene 'lanza' para חֲנִית y no 'asta' o 'jabalina', porque el contexto narrativo de combate exige consistencia léxica.
  - Se usa 'Yahvé' solo cuando el texto fuente lo requiere; este versículo no contiene el nombre divino.
  - '''Asael'' se escribe sin marcador diacrítico, conforme al uso habitual en español bíblico público.'
  - 'La secuencia verbal preserva el estilo narrativo simple del hebreo: negó/apartarse/herir/caer/morir/detenerse.'
