translation:
  language: es
  text: Y todo el botín de estas ciudades[a], junto con el ganado, los hijos de Israel lo tomaron como botín para sí; solo a toda la gente[b] hirieron con el filo de la espada[c] hasta haberlos destruido. No dejaron con vida a ningún ser que respirara[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas». El hebreo dice literalmente «los hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: O «toda la población» / «todos los habitantes». El hebreo usa aquí «todo el hombre» para el conjunto humano, en contraste con el ganado.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «con la boca de la espada», un giro hebreo que significa «con el filo de la espada».
    reason: lexical_alternative
  - marker: d
    text: O «No dejaron respirando a nadie» / «No dejaron vivo a ningún ser que respirara».
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁלַל
  english_pob_choice: spoil
  chosen_spanish: botín
  alternatives_spanish:
  - despojo
  - presa de guerra
  lexicon: HALOT
  rationale: שְׁלַל designa lo tomado como botín en guerra. En español, «botín» es natural y preciso para el contexto militar, y conserva mejor el matiz de bienes capturados que un verbo como «saquear» por sí solo.
- source_word: הֶעָרִים הָאֵלֶּה
  english_pob_choice: these cities
  chosen_spanish: estas ciudades
  alternatives_spanish:
  - aquellas ciudades
  lexicon: HALOT
  rationale: El demostrativo apunta a las ciudades recién mencionadas; «estas» es la forma más directa y contextual en español.
- source_word: הַבְּהֵמָה
  english_pob_choice: the livestock
  chosen_spanish: el ganado
  alternatives_spanish:
  - los animales
  - el ganado doméstico
  lexicon: HALOT
  rationale: En contexto de conquista, el término se refiere a animales de propiedad útil y no a animales en general. «Ganado» comunica bien esa idea en español y es más breve que una perífrasis.
- source_word: בָּזְזוּ לָהֶם
  english_pob_choice: plundered for themselves
  chosen_spanish: lo saquearon para sí
  alternatives_spanish:
  - lo tomaron como botín para sí
  - saquearon para sí
  lexicon: HALOT
  rationale: El verbo expresa tomar botín, y la frase preposicional añade beneficio/reflexividad. «Lo saquearon para sí» preserva ambos elementos de forma idiomática.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se conserva la expresión filial literal, acorde con la preferencia del proyecto por mantener el valor léxico de la construcción hebrea cuando es inteligible en español.
- source_word: כָּל הָאָדָם
  english_pob_choice: all the people
  chosen_spanish: toda la gente
  alternatives_spanish:
  - todas las personas
  - todo ser humano
  lexicon: HALOT
  rationale: Aunque אָדָם puede ser «hombre» o «humanidad» según contexto, aquí contrasta con el ganado. La revisión inglesa ya señaló que la referencia es colectiva. «Toda la gente» evita la impresión de exclusión y mantiene el sentido grupal.
- source_word: לְפִי חֶרֶב
  english_pob_choice: with the edge of the sword
  chosen_spanish: con el filo de la espada
  alternatives_spanish:
  - a filo de espada
  - con la boca de la espada
  lexicon: HALOT
  rationale: La locución hebrea es idiomática y literalmente «boca de espada». En español, «con el filo de la espada» es la equivalencia establecida y clara, sin perder la imagen del corte.
- source_word: הִשְׁמִדָם אֹתָם
  english_pob_choice: until they had destroyed them
  chosen_spanish: hasta haberlos destruido
  alternatives_spanish:
  - hasta exterminarlos
  - hasta aniquilarlos
  lexicon: HALOT
  rationale: El hifil de שׁמד significa destruir o exterminar. «Destruir» es el núcleo semántico más directo; la perífrasis con infinitivo mantiene el valor de culminación del hebreo.
- source_word: נְשָׁמָה
  english_pob_choice: breathing thing
  chosen_spanish: ser que respirara
  alternatives_spanish:
  - aliento
  - ser viviente
  lexicon: HALOT
  rationale: נְשָׁמָה alude a respiración/aliento. «Ser que respirara» conserva la imagen concreta y su valor inclusivo de todo lo viviente que respira, sin volverla demasiado abstracta.
theological_decisions:
- issue: כָּל הָאָדָם en contraste con el ganado
  english_pob_reading: all the people
  chosen_spanish_reading: toda la gente
  alternative_spanish_readings:
  - todos los hombres
  - toda la población
  rationale: La revisión inglesa corrigió una lectura distributiva demasiado estrecha para reflejar el colectivo. En español, «toda la gente» comunica mejor la totalidad humana en contraste con el ganado, sin introducir una distinción de sexo que el contexto no exige.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy 4; §Contested terms: אָדָם *adam*'
- issue: לֹא הִשְׁאִירוּ כָּל נְשָׁמָה como fórmula de exterminio total
  english_pob_reading: They left no breathing thing
  chosen_spanish_reading: No dejaron con vida a ningún ser que respirara
  alternative_spanish_readings:
  - No dejaron respirando a nadie
  - No dejaron ningún ser viviente
  rationale: La fórmula hebrea enfatiza que no quedó nada con aliento. En español, «no dejaron con vida a ningún ser que respirara» conserva el contenido concreto del hebreo y su alcance total, con una redacción natural y solemne.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4; lexical note on נְשָׁמָה
translation_notes:
  revision_awareness: La redacción española sigue la última revisión del audit trail al leer כָּל הָאָדָם de forma colectiva y no distributiva. También mantiene la distinción entre el botín/ganado tomado como presa y la destrucción total de la población humana, y conserva la imagen concreta de נְשָׁמָה como respiración/aliento.
  spanish_consistency_notes:
  - Se conserva «hijos de Israel» como calco controlado y no se sustituye por «israelitas» en el texto principal.
  - «Ganado» se usa para הַבְּהֵמָה por ser el término más natural en el contexto de botín de guerra.
  - La expresión «con el filo de la espada» traduce el hebreo idiomático sin forzar un literalismo opaco.
  - «No dejaron con vida a ningún ser que respirara» mantiene la amplitud total de נְשָׁמָה y evita suavizar el texto.
