translation:
  language: es
  text: Ha llegado el fin; ha llegado el fin. Ha despertado[a] contra ti; he aquí[b], ya viene.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Se ha puesto en movimiento contra ti». El hebreo personifica al fin como si despertara.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «a ti»; en el contexto, ese movimiento se entiende como hostil, de ahí «contra ti».'
    reason: lexical_alternative
lexical_decisions:
- source_word: קֵץ
  english_pob_choice: end
  chosen_spanish: fin
  alternatives_spanish:
  - final
  - término
  lexicon: HALOT
  rationale: קֵץ designa un fin o terminación. En este contexto de juicio, «fin» conserva la fuerza abrupta y la repetición retórica del hebreo sin añadir una interpretación más expansiva como «destrucción» o «ruina».
- source_word: בָּא / בָּאָה
  english_pob_choice: has come / is coming
  chosen_spanish: se ha acercado / ha llegado / está viniendo
  alternatives_spanish:
  - viene
  - ha venido
  - está llegando
  lexicon: HALOT
  rationale: Las formas repetidas de בוא intensifican la inmediatez. En español, «se ha acercado» y «ha llegado» permiten reflejar el avance progresivo del anuncio, mientras «está viniendo» conserva la última forma verbal con sentido de inminencia.
- source_word: הַקֵּץ
  english_pob_choice: the end
  chosen_spanish: el fin
  alternatives_spanish:
  - ese fin
  - el término
  lexicon: HALOT
  rationale: 'El artículo marca especificidad: no cualquier fin, sino el fin anunciado en el oráculo. «El fin» mantiene esa referencia definida de manera natural en español.'
- source_word: הֵקִיץ
  english_pob_choice: has awakened
  chosen_spanish: ha despertado
  alternatives_spanish:
  - se ha roused
  - se ha alzado
  - ha despertado de sí
  lexicon: HALOT
  rationale: El verbo personifica al fin como algo que despierta contra la destinataria. «Ha despertado» conserva la imagen sin forzar una paráfrasis.
- source_word: אֵלַיִךְ
  english_pob_choice: against you
  chosen_spanish: contra ti
  alternatives_spanish:
  - a ti
  - hacia ti
  lexicon: HALOT
  rationale: Aunque la preposición básica es «a/toward», el contexto judicial comunica hostilidad. «Contra ti» expresa mejor la dirección adversativa que el hebreo sugiere en este oráculo.
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: mira
  alternatives_spanish:
  - he aquí
  - mira bien
  - mira, pues
  lexicon: HALOT
  rationale: הִנֵּה es una partícula deíctica que llama la atención. «Mira» es un equivalente natural y urgente en español moderno; se mantiene la función enfática sin archaismo excesivo.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el patrón retórico del texto hebreo: repetición enfática de «el fin», personificación del fin como agente que despierta, y remate de inminencia con una partícula deíctica. La solución española procura conservar ese paralelismo sin calco rígido del inglés auditado.'
  spanish_consistency_notes:
  - Se usa «fin» de forma consistente para קֵץ y הַקֵּץ.
  - Se conserva la personificación del verbo «despertar» en vez de neutralizarla.
  - «Contra ti» refleja el valor hostil contextual de אֵלָיִךְ sin ocultar su base literal.
  - «Mira» traduce la función de atención de הִנֵּה con registro digno y claro.
