revisions:
- from: Entonces el rey[a], cuando oyó la palabra, se angustió mucho y puso su corazón[b] en librar a Daniel; y hasta la puesta del sol siguió esforzándose por rescatarlo.
  to: Entonces el rey[a], cuando oyó la declaración, se angustió mucho y se propuso librar a Daniel; y hasta la puesta del sol siguió esforzándose por rescatarlo.
  rationale: Se revisa «la palabra» a «la declaración» para reflejar mejor מִלְּתָא en el contexto judicial, siguiendo la lógica de la POB inglesa. Se sustituye «puso su corazón en librar a Daniel» por «se propuso librar a Daniel» para expresar con español natural el modismo שָׂם בָּל (‘puso corazón / fijó su intención’) sin perder el sentido de resolución deliberada. Se elimina la nota b porque ya no aporta una alternativa necesaria una vez que el modismo está bien resuelto en el texto principal.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:42:21Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia narrativa y la mayor parte del sentido arameo: «Entonces», «cuando oyó», la fuerte aflicción del rey, el esfuerzo continuado hasta la puesta del sol y el propósito de salvar a Daniel. Sin embargo, dos decisiones principales no siguen del todo la auditoría inglesa ni el mejor español contextual: (1) מִלְּתָא en este entorno judicial se entiende mejor como «declaración» o «edicto/pronunciamiento» que «palabra», que en español queda demasiado vaga; (2) שָׂם בָּל está bien explicado como modismo semítico, pero en el texto principal «puso su corazón» suena menos natural y más marcado que lo que pide el estilo del proyecto, especialmente porque la POB inglesa ya optó por una equivalencia idiomática clara («set his mind»).'
  spanish_quality_summary: 'El texto es generalmente claro y digno, pero «la palabra» resulta imprecisa y «puso su corazón en librar a Daniel» suena algo calcado. Una formulación más natural y fiel para lectores hispanos es «oyó la declaración» y «se propuso librar a Daniel» o «decidió librar a Daniel». El resto del verso fluye bien: «se angustió mucho», «hasta la puesta del sol» y «siguió esforzándose por rescatarlo». Además, la nota b sobre «corazón» ya no es necesaria si se usa una equivalencia idiomática natural en el texto principal.'
  glossary_alignment: No hay conflicto con la terminología doctrinal del proyecto. Las decisiones relevantes son léxicas/idiomáticas arameas. La revisión propuesta mantiene la nota lexical alternativa del v. 7/8 («disgustado consigo mismo») y mejora la fidelidad al razonamiento documentado por la POB inglesa al preferir una equivalencia idiomática natural para שָׂם בָּל.
  issues:
  - severity: medium
    issue: «la palabra» para מִלְּתָא es demasiado vaga en este contexto
    rationale: La auditoría inglesa escogió «the statement» precisamente por el entorno legal/cortesano. En español «la declaración» comunica mejor el pronunciamiento recién emitido sin sonar arcaico.
  - severity: medium
    issue: «puso su corazón» es un calco menos natural que lo deseable en el texto principal
    rationale: Aunque el arameo usa «corazón», la POB inglesa documentó una equivalencia idiomática clara. En español de lectura eclesial amplia, «se propuso» o «decidió» preserva mejor el sentido de resolución deliberada sin rigidez semítica innecesaria.
  - severity: low
    issue: La nota b deja de ser necesaria si se adopta una equivalencia idiomática natural
    rationale: Las notas deben preservar alternativas significativas, no explicar cada modismo cuando el texto principal ya lo vierte fiel y claramente. Mantenerla con la revisión produciría una sobrecarga innecesaria.
  revised_spanish_text: Entonces el rey[a], cuando oyó la declaración, se angustió mucho y se propuso librar a Daniel; y hasta la puesta del sol siguió esforzándose por rescatarlo.
  revised_footnotes:
  - marker: a
    text: O «estuvo muy disgustado consigo mismo»; el arameo es literalmente «estuvo muy angustiado/disgustado sobre sí mismo».
    reason: lexical_alternative
  revision_rationale: Se revisa «la palabra» a «la declaración» para reflejar mejor מִלְּתָא en el contexto judicial, siguiendo la lógica de la POB inglesa. Se sustituye «puso su corazón en librar a Daniel» por «se propuso librar a Daniel» para expresar con español natural el modismo שָׂם בָּל (‘puso corazón / fijó su intención’) sin perder el sentido de resolución deliberada. Se elimina la nota b porque ya no aporta una alternativa necesaria una vez que el modismo está bien resuelto en el texto principal.
