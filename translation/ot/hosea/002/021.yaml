theological_decisions:
- issue: Rendering of covenantal marital imagery
  chosen_reading: Retain 'betroth' language literally rather than flattening to general marital or relational language.
  alternative_readings:
  - I will marry you
  - I will make you mine
  rationale: The prophetic metaphor is central to Hosea's theology of restoration. Preserving the betrothal image maintains the text's covenantal and relational tension without importing later doctrinal conclusions.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it.'
- issue: Rendering of חסד
  chosen_reading: Translate as 'covenant love' in the main text.
  alternative_readings:
  - steadfast love
  - lovingkindness
  - loyal love
  rationale: The Hebrew term carries covenant loyalty and affectionate mercy. 'Covenant love' makes that theological content explicit in accessible English, while avoiding archaic diction. An alternative with strong translation tradition is preserved in a footnote.
  doctrine_reference: 'Translation philosophy: Readable modern English, not archaic or academic; Consistency of key terms, or documented exception.'
