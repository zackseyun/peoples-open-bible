translation:
  language: es
  text: Nadie partirá el pan con ellos en duelo[a], para consolarlos por el muerto, ni nadie les dará a beber la copa de consolación[b] por su padre o por su madre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «compartirá alimento con ellos en duelo». El verbo hebreo significa literalmente «partir/dividir» y probablemente se refiere a la comida acostumbrada de duelo.
    reason: lexical_alternative
  - marker: b
    text: «La copa de consolación» probablemente se refiere a una bebida acostumbrada que se ofrecía para consolar a los enlutados después de una muerte.
    reason: cultural_note
lexical_decisions:
- source_word: יִפְרְסוּ
  english_pob_choice: will break bread
  chosen_spanish: les partirá pan
  alternatives_spanish:
  - les dividirá pan
  - les compartirá alimento
  lexicon: HALOT
  rationale: El verbo hebreo פרס significa literalmente ‘partir/dividir’. En este contexto funerario alude al alimento compartido en el duelo. ‘Partir pan’ conserva la imagen concreta y suena natural en español.
- source_word: עַל אֵבֶל
  english_pob_choice: in mourning
  chosen_spanish: en luto
  alternatives_spanish:
  - en duelo
  - por luto
  - en ocasión de duelo
  lexicon: HALOT
  rationale: La preposición עַל con אֵבֶל indica el marco o circunstancia del duelo. ‘En luto’ comunica bien el contexto funerario en un español sobrio y comprensible.
- source_word: לְנַחֲמוֹ
  english_pob_choice: to comfort them
  chosen_spanish: para consolarlos
  alternatives_spanish:
  - para consolarlos
  - para darles consuelo
  lexicon: HALOT
  rationale: נחם en piel expresa consolar. ‘Consolar’ conserva el acto personal de alivio y se adapta al plural contextual de ‘ellos/les’ en el versículo.
- source_word: עַל מֵת
  english_pob_choice: for the dead
  chosen_spanish: por el muerto
  alternatives_spanish:
  - por el fallecido
  - por el difunto
  - por el muerto
  lexicon: HALOT
  rationale: La expresión marca la ocasión del duelo por una muerte concreta. ‘Por el muerto’ es directo y mantiene la referencia al cadáver o al fallecido sin suavizarla en exceso.
- source_word: יַשְׁקוּ אוֹתָם
  english_pob_choice: will give them ... to drink
  chosen_spanish: les dará a beber
  alternatives_spanish:
  - les ofrecerá de beber
  - los hará beber
  lexicon: HALOT
  rationale: 'El hifil de שקה es causativo: hacer beber / dar de beber. ‘Dar a beber’ preserva el sentido causativo y encaja naturalmente con la frase siguiente.'
- source_word: כּוֹס תַּנְחוּמִים
  english_pob_choice: the cup of consolation
  chosen_spanish: la copa de consolación
  alternatives_spanish:
  - la copa de consuelo
  - la copa consoladora
  lexicon: HALOT
  rationale: Se mantiene la expresión cultural con un término transparente. ‘Consolación’ sigue de cerca el sustantivo תַּנְחוּמִים y enlaza con ‘consolar’ antes en el verso.
- source_word: עַל אָבִיו וְעַל אִמּוֹ
  english_pob_choice: for his father or for his mother
  chosen_spanish: por su padre o por su madre
  alternatives_spanish:
  - a causa de su padre o de su madre
  - por su padre y por su madre
  lexicon: HALOT
  rationale: El hebreo usa עַל para indicar la ocasión/causa del lamento. En español, ‘por’ expresa de modo natural el duelo por un familiar. El singular posesivo ‘su’ refleja el distributivo del hebreo y evita una lectura menos clara.
theological_decisions:
- issue: La escena es una prohibición de ritos y apoyos funerarios, no una doctrina abstracta sobre el duelo.
  english_pob_reading: No one will break bread for them in mourning, to comfort them for the dead, and no one will give them the cup of consolation to drink for their father or for their mother.
  chosen_spanish_reading: Nadie les partirá pan en luto, para consolarlos por el muerto, ni nadie les dará a beber la copa de consolación por su padre o por su madre.
  alternative_spanish_readings:
  - Nadie les partirá pan en duelo...
  - Nadie compartirá alimento con ellos en luto...
  rationale: El hebreo describe costumbres concretas de duelo que serán negadas al pueblo. La traducción conserva ese trasfondo cultural sin convertirlo en una generalización doctrinal.
  doctrine_reference: Contexto histórico-literario de Jeremías 16; práctica funeraria en el antiguo Cercano Oriente.
translation_notes:
  revision_awareness: Se ha tenido en cuenta la revisión inglesa que ajustó los pronombres a plural (‘them/their’). En español se reflejó ese plural con ‘les’ y ‘consolarlos’, evitando un singular no sustentado por el contexto hebreo. También se conservó la doble mención de los padres con singular posesivo distributivo (‘su padre o su madre’).
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ fuera de este versículo porque no aparece el Tetragrámaton en el texto hebreo recibido.
  - ‘Copa de consolación’ conserva el lenguaje idiomático y la coherencia con ‘consolar’.
  - Se prefirió ‘partir pan’ por su valor cultural y su cercanía al hebreo פרס sin sonar demasiado técnico.
