translation:
  language: es
  text: Y después de entrar por todas las puertas[a], se presentó ante el rey; y él estaba sentado en el trono de su reino, revestido de todo el esplendor de su majestad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El texto griego transmitido termina abruptamente en ἐνεδεΒ, una forma truncada que probablemente remite a un verbo como «estaba vestido» o «se había vestido». La traducción refleja el sentido más probable del fragmento conservado sin afirmar más de lo que el texto permite.
    reason: textual_variant
  - marker: b
    text: O «por todas las entradas» o «por todos los portales», si se enfatiza el entorno palaciego más que puertas interiores.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσελθοῦσα
  english_pob_choice: after she had gone in
  chosen_spanish: después que hubo entrado
  alternatives_spanish:
  - habiendo entrado
  - cuando entró
  lexicon: BDAG
  rationale: El participio aoristo femenino singular conserva fuerza temporal previa a la acción principal. «Después que hubo entrado» comunica la secuencia sin perder el matiz de entrada anterior al estar en presencia del rey.
- source_word: πάσας τὰς θύρας
  english_pob_choice: through all the doors
  chosen_spanish: por todas las puertas
  alternatives_spanish:
  - por todas las entradas
  - por todos los portales
  lexicon: LSJ
  rationale: θύρα puede referirse a puertas o accesos sucesivos en un entorno palaciego. «Puertas» es natural en español y mantiene la idea de atravesar varios accesos.
- source_word: κατέστη ἐνώπιον τοῦ βασιλέως
  english_pob_choice: she stood before the king
  chosen_spanish: se puso delante del rey
  alternatives_spanish:
  - estuvo delante del rey
  - tomó posición delante del rey
  lexicon: LSJ
  rationale: κατέστη aquí expresa que llegó a colocarse de pie ante el rey. «Se puso delante» conserva el valor de posicionarse en la corte con español fluido.
- source_word: θρόνου τῆς βασιλείας αὐτοῦ
  english_pob_choice: the throne of his kingdom
  chosen_spanish: el trono de su reino
  alternatives_spanish:
  - su trono real
  - el trono de su soberanía
  lexicon: LSJ
  rationale: La construcción genitiva se mantiene de manera cercana. «Reino» refleja βασιλεία sin reemplazarlo por una formulación más interpretativa.
- source_word: πᾶσαν στολὴν
  english_pob_choice: was clothed in all
  chosen_spanish: vestido con toda
  alternatives_spanish:
  - adornado con toda
  - cubierto con toda
  lexicon: LSJ
  rationale: La frase griega es elíptica en el final conservado. En español conviene completar naturalmente el participio pasivo con «vestido con toda» para sostener el sentido de la vestidura real.
- source_word: ἐπιφανείας
  english_pob_choice: splendor
  chosen_spanish: magnificencia
  alternatives_spanish:
  - esplendor
  - brillo
  - majestuosidad
  lexicon: LSJ
  rationale: ἐπιφάνεια en este contexto describe brillo visible o magnificencia externa. «Magnificencia» transmite adecuadamente la idea de esplendor real sin arrastrar un sentido técnico posterior.
- source_word: αὐτοῦ
  english_pob_choice: his majesty
  chosen_spanish: su esplendor
  alternatives_spanish:
  - su majestad
  - su gloria
  lexicon: LSJ
  rationale: El possessivo final intensifica la cualidad regia del monarca. «Su esplendor» encaja con la descripción del atuendo y evita repetir «su reino» de modo pesado.
translation_notes:
  revision_awareness: Se sigue el fragmento griego normalizado de Swete con la misma cautela textual que en el audit trail inglés. La terminación truncada se mantiene atendiendo al sentido probable, sin sobreafirmar el verbo final incompleto.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma general del proyecto, pero este pasaje no contiene el nombre divino.
  - «Reino» se usa para βασιλεία en sentido regio-político, coherente con el contexto de corte.
  - «Magnificencia» y «esplendor» se emplean para reproducir el campo semántico de la descripción real sin introducir vocabulario litúrgico.
