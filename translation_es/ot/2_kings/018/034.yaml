translation:
  language: es
  text: ¿Dónde están los dioses de Hamat y de Arpad? ¿Dónde están los dioses de Sefarvaim[a], Hena y Ivvá? ¿Acaso libraron a Samaria de mi mano?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La forma de este nombre varía en la tradición; también puede aparecer como «Avvá».
    reason: lexical_alternative
lexical_decisions:
- source_word: אַיֵּה
  english_pob_choice: Where are
  chosen_spanish: ¿Dónde están
  alternatives_spanish:
  - ¿Dónde está
  - ¿Dónde se hallan
  lexicon: HALOT
  rationale: La interrogación de lugar funciona en español con plural por el sustantivo implícito 'dioses'. '¿Dónde están?' conserva el desafío retórico y suena natural en español moderno.
- source_word: אֱלֹהֵי
  english_pob_choice: the gods of
  chosen_spanish: los dioses de
  alternatives_spanish:
  - el dios de
  - las deidades de
  lexicon: HALOT
  rationale: En este contexto los constructos con nombres de ciudades/naciones se refieren a deidades plurales. 'Los dioses de' preserva el sentido simple y el reto polémico del original.
- source_word: חֲמָת וְאַרְפָּד
  english_pob_choice: Hamath and Arpad
  chosen_spanish: Hamat y de Arpad
  alternatives_spanish:
  - Jamat y Arpad
  - Hamat y Arpád
  lexicon: HALOT
  rationale: Son nombres propios de lugar; se transliteran al español. Se mantiene la preposición repetida 'de' por el paralelismo con la construcción hebrea y la fluidez del español.
- source_word: סְפַרְוַיִם הֵנַע וְעִוָּה
  english_pob_choice: Sepharvaim, Hena, and Ivvah
  chosen_spanish: Sefarvaim, Hena y Ivvá
  alternatives_spanish:
  - Sefarvaim, Hena y Avvá
  - Sepharvaim, Hena e Ivvah
  lexicon: HALOT
  rationale: Se transliteran los nombres propios. 'Ivvá' refleja de forma directa la base consonántica עוה y mantiene una forma española legible; se evita imponer una sola tradición inglesa.
- source_word: כִּי
  english_pob_choice: Have
  chosen_spanish: ¿Acaso
  alternatives_spanish:
  - Pues
  - Porque
  lexicon: HALOT
  rationale: Aquí כִּי introduce la cláusula retórica; en español, '¿Acaso...?' expresa mejor la ironía desafiante sin forzar una causalidad explícita.
- source_word: הִצִּילוּ
  english_pob_choice: delivered
  chosen_spanish: los libraron
  alternatives_spanish:
  - los rescataron
  - los salvaron
  lexicon: HALOT
  rationale: La forma hifil de נצל expresa sacar de peligro o poder; 'librar' reproduce bien ese valor en español bíblico contemporáneo, con la fuerza de rescate/liberación en contexto militar-político.
- source_word: שֹׁמְרוֹן
  english_pob_choice: Samaria
  chosen_spanish: Samaria
  alternatives_spanish:
  - Samaría
  lexicon: HALOT
  rationale: Nombre propio de la capital/territorio; 'Samaria' es la forma española establecida y claramente reconocible.
- source_word: מִיָּדִי
  english_pob_choice: from my hand
  chosen_spanish: de mi mano
  alternatives_spanish:
  - de mi poder
  - fuera de mi mano
  lexicon: HALOT
  rationale: Se conserva el idiomático 'de mi mano' para mantener la imagen concreta de control y autoridad, sin diluirla en una paráfrasis abstracta.
theological_decisions:
- issue: Alcance del reto sobre los dioses de ciudades conquistadas
  english_pob_reading: The verse is rendered as a boast that the gods of conquered cities were unable to save Samaria from the Assyrian king's power.
  chosen_spanish_reading: 'El versículo se presenta como una burla desafiante: los dioses de esas ciudades no pudieron librar a Samaria del poder del rey asirio.'
  alternative_spanish_readings:
  - Como afirmación histórica de que esos dioses realmente fueron incapaces de intervenir
  - Como mera ironía sin compromiso con la existencia real de esos dioses
  rationale: La traducción mantiene la retórica del insulto sin resolver la tensión teológica sobre la realidad o poder de los dioses mencionados. '¿Acaso...?' conserva el tono de desafío y evita convertir el texto en una afirmación doctrinal ajena al pasaje.
  doctrine_reference: Preservar la tensión teológica del texto; no imponer una lectura apologética ni mitológica donde el hebreo solo ofrece la burla del hablante.
translation_notes:
  revision_awareness: Se revisó el contexto auditado en inglés y no se detectaron cambios necesarios en el sentido. La versión española sigue el valor retórico del hebreo y la decisión inglesa de conservar los nombres propios y la imagen de 'from my hand'.
  spanish_consistency_notes:
  - Se mantiene 'dioses' en plural conforme al sentido del constructo hebreo con topónimos.
  - Se conserva el registro bíblico claro y moderno, evitando calcos innecesarios como '¿Dónde está el dios de...?'.
  - '''Ivvá'' se usa como forma española legible para reflejar la variación tradicional señalada en el audit trail.'
  - No se sustituye 'de mi mano' por 'de mi poder' para no perder la concreción idiomática del hebreo.
