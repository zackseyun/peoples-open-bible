revisions:
- from: Sálva[a], oh Yahvé, porque el piadoso[b] ha desaparecido; porque los fieles se han desvanecido de entre los hijos de Adán.
  to: Salva[a], oh Yahvé, porque los piadosos han desaparecido; porque los fieles han desaparecido de entre los seres humanos[b].
  rationale: Se corrige la ortografía ('Salva'), se elimina una nota no sustentada por el hebreo ('Rescátanos'), se ajusta חָסִיד al valor colectivo ya adoptado en la auditoría inglesa ('los piadosos han desaparecido'), y se mejora la naturalidad de מִבְּנֵי אָדָם en el texto principal con una nota que conserva el modismo hebreo. También se usa 'han desaparecido' para el segundo colon por mayor precisión y paralelismo.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:45:36Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la súplica a Yahvé y el lamento por la desaparición de personas fieles, pero no sigue del todo la revisión auditada del POB en dos puntos clave: (1) el inglés revisado adoptó un sentido colectivo para חָסִיד (''the godly are gone''), mientras que el español mantiene singular explícito (''el piadoso ha desaparecido''); (2) la nota inglesa sobre מִבְּנֵי אָדָם explica el giro idiomático como comunidad humana, mientras que ''los hijos de Adán'' en español suena más literalizado y menos natural que una forma que preserve el modismo sin sugerir una referencia individual a Adán. También la nota [a] introduce un plural implícito (''Rescátanos'') no sustentado por el hebreo.'
  spanish_quality_summary: El texto es generalmente claro y digno, pero 'Sálva' es ortográficamente incorrecto en español; debe ser 'Salva'. 'Oh Yahvé' es aceptable, aunque sin coma exclamativa inicial sigue siendo algo rígido. 'Se han desvanecido' es poético, pero 'han desaparecido' encaja mejor con el paralelo y con la fuerza semántica de פַסּוּ. 'Los hijos de Adán' resulta menos natural para lectores hispanos que 'los seres humanos' o 'los hijos de los hombres'; dado el audit trail, conviene una formulación principal más natural con nota para el idiomatismo.
  glossary_alignment: 'Se alinea correctamente con ''Yahvé'' para יְהוָה. No hay conflictos con la terminología mayor del proyecto. La principal desviación es conceptual: el tratamiento de חָסִיד debería reflejar el valor colectivo representativo ya aceptado en la auditoría inglesa. Además, la nota alternativa de הוֹשִׁיעָה no debe introducir ''Rescátanos'', porque el imperativo es singular dirigido a Yahvé con objeto implícito no especificado.'
  issues:
  - severity: high
    issue: '''Sálva'' está mal acentuado.'
    rationale: El imperativo correcto es 'Salva'. Un error ortográfico en la primera palabra del versículo no es aprobable.
  - severity: high
    issue: La nota [a] propone '¡Rescátanos!', pero el hebreo no expresa un objeto plural explícito.
    rationale: הוֹשִׁיעָה es simplemente 'salva' o 'rescata' dirigido a Yahvé; introducir 'nos' añade contenido no presente en la fuente ni en la auditoría inglesa.
  - severity: medium
    issue: '''el piadoso ha desaparecido'' no refleja bien la revisión inglesa a sentido colectivo.'
    rationale: Aunque el singular hebreo puede mantenerse, el audit trail explícitamente revisó a 'the godly are gone'. En español conviene 'los piadosos han desaparecido' o similar para preservar esa decisión documentada.
  - severity: medium
    issue: '''de entre los hijos de Adán'' es demasiado literal y poco natural en español eclesial común.'
    rationale: מִבְּנֵי אָדָם es un modismo para la comunidad humana. La traducción principal debería ser más legible en español, con nota que preserve el literal 'los hijos del hombre/Adán' si se desea.
  - severity: low
    issue: '''se han desvanecido'' puede sonar más etéreo que socialmente ausentes.'
    rationale: פַסּוּ en paralelo con גָמַר apunta a desaparición/cesación de personas fieles en la sociedad; 'han desaparecido' suena más natural y preciso.
  revised_spanish_text: Salva[a], oh Yahvé, porque los piadosos han desaparecido; porque los fieles han desaparecido de entre los seres humanos[b].
  revised_footnotes:
  - marker: a
    text: O «Rescata» o «Libra».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «de entre los hijos de Adán / del hombre», un modismo para la comunidad humana.'
    reason: cultural_note
  revision_rationale: Se corrige la ortografía ('Salva'), se elimina una nota no sustentada por el hebreo ('Rescátanos'), se ajusta חָסִיד al valor colectivo ya adoptado en la auditoría inglesa ('los piadosos han desaparecido'), y se mejora la naturalidad de מִבְּנֵי אָדָם en el texto principal con una nota que conserva el modismo hebreo. También se usa 'han desaparecido' para el segundo colon por mayor precisión y paralelismo.
