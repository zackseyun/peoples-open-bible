revisions:
- from: Y comieron los hijos de Israel, los que eran de la cautividad[a], todos los que se habían apartado de las abominaciones de las naciones de la tierra[b], buscando a Yahvé.
  to: Y comieron[a] los hijos de Israel, los que eran de la cautividad, todos los que se habían apartado de las abominaciones de las naciones de la tierra[b], buscando a Yahvé.
  rationale: 'Se corrige la ubicación y el contenido de la nota [a] para alinearla con el audit trail inglés y con el griego: la aclaración corresponde al verbo ''comieron'', no a ''cautividad''. El texto base español se mantiene sustancialmente igual porque es fiel y natural en lo demás.'
