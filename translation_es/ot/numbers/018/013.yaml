review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: בִּכּוּרֵי como «primicias», la procedencia «en/su tierra», la presentación «a Yahvé», la asignación «serán tuyas» y el permiso de comer para los limpios en la casa de Aarón. Sin embargo, «de todo lo que haya en su tierra» suena algo existencial y menos ligado al origen/producto que el hebreo; «de todo lo que hay en su tierra» o «de todo lo que producen en su tierra» sería más natural. Más importante, la nota [a] está anclada en «serán tuyas», pero su contenido explica «limpio», siguiendo el audit trail inglés; el anclaje debe moverse a «limpio».'
  spanish_quality_summary: 'El español es claro y digno, pero hay dos detalles mejorables: 1) «haya» tras «todo lo que» resulta menos natural aquí que «hay»; 2) «Todo el que sea limpio en tu casa» es comprensible, pero suena más idiomático «Todo el que en tu casa esté limpio» o «Toda persona limpia en tu casa». La versión revisada mantiene cercanía al hebreo y mejora fluidez.'
  glossary_alignment: 'Alinea bien con la terminología del proyecto: «Yahvé» para יהוה, «primicias» para בִּכּוּרֵי, y «limpio» con nota sobre pureza ritual para טָהוֹר. No hay conflicto teológico ni terminológico mayor; solo debe corregirse la colocación de la nota al término pertinente.'
  issues:
  - severity: medium
    issue: La nota [a] está colocada en «serán tuyas» pero explica «limpio».
    rationale: Las notas deben anclarse exactamente en la palabra o frase relevante. El audit trail inglés usa la nota para aclarar el sentido ritual de «clean», no para «shall be yours».
  - severity: low
    issue: «de todo lo que haya en su tierra» suena menos natural y ligeramente menos preciso que una formulación no subjuntiva.
    rationale: El hebreo describe lo que está/en su tierra como origen de las primicias; en español bíblico natural, «de todo lo que hay en su tierra» fluye mejor sin alterar el sentido.
  - severity: low
    issue: «Todo el que sea limpio en tu casa» es entendible pero algo rígido.
    rationale: Una colocación más natural en español mejora la legibilidad sin apartarse del hebreo ni del POB inglés.
  revised_spanish_text: Las primicias de todo lo que hay en su tierra, que traigan a Yahvé, serán tuyas. Todo el que en tu casa esté limpio[a] podrá comerlo.
