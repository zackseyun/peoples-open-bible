translation:
  language: es
  text: Sus pies descienden a la muerte; sus pasos se aferran a Seol[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «el sepulcro» o «el reino de los muertos». Hebreo: «Seol».'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַגְלֶיהָ
  english_pob_choice: her feet
  chosen_spanish: sus pies
  alternatives_spanish:
  - su pie
  lexicon: HALOT
  rationale: El hebreo usa un plural con sufijo de 3ª femenina singular; en español, el plural es natural y conserva la imaginería corporal concreta del proverbio.
- source_word: יֹרְדוֹת
  english_pob_choice: go down
  chosen_spanish: descienden
  alternatives_spanish:
  - bajan
  lexicon: HALOT
  rationale: El participio qal femenino plural expresa una acción en curso o característica. «Descienden» comunica bien el movimiento hacia abajo con un tono digno y claro en español.
- source_word: מָוֶת
  english_pob_choice: death
  chosen_spanish: la muerte
  alternatives_spanish:
  - el morir
  - la ruina
  lexicon: HALOT
  rationale: El sentido léxico directo es «muerte». Mantenerlo evita debilitar el aviso sapiencial a una mera idea de peligro o ruina.
- source_word: שְׁאוֹל
  english_pob_choice: Sheol
  chosen_spanish: Seol
  alternatives_spanish:
  - el sepulcro
  - el reino de los muertos
  lexicon: HALOT
  rationale: Se translitera el término hebreo para preservar su especificidad cultural y teológica. «Seol» deja intacta la tensión entre las posibles equivalencias sin imponer una interpretación reductiva.
- source_word: צְעָדֶיהָ
  english_pob_choice: her steps
  chosen_spanish: sus pasos
  alternatives_spanish:
  - sus pisadas
  - su andar
  lexicon: HALOT
  rationale: «Pasos» conserva la imagen concreta y paralela a «pies», y funciona con naturalidad en español.
- source_word: יִתְמֹכוּ
  english_pob_choice: hold fast to
  chosen_spanish: se aferran a
  alternatives_spanish:
  - se adhieren a
  - sostienen
  lexicon: HALOT
  rationale: La raíz תמך comunica sujetar/aferrar. En este contexto poético, «se aferran a» expresa bien la firme adhesión de su camino a Seol sin perder la fuerza del hebreo.
theological_decisions:
- issue: Cómo rendir שְׁאוֹל en un proverbio sapiencial
  english_pob_reading: 'Sheol; alternate note: the grave or the realm of the dead'
  chosen_spanish_reading: Seol; con posibilidad de entenderlo como «la tumba» o «el reino de los muertos»
  alternative_spanish_readings:
  - la tumba
  - el reino de los muertos
  - el sepulcro
  rationale: El término hebreo pertenece al mundo conceptual de la sabiduría israelita y no debe homogenizarse sin más como una noción simple de sepultura ni cargarse automáticamente con ideas posteriores de infierno. La transliteración conserva la tensión teológica y permite que la nota ofrezca alternativas equivalentes.
  doctrine_reference: Translation philosophy §3; preservar la tensión teológica en lugar de resolverla
- issue: Intensidad moral del movimiento hacia la muerte
  english_pob_reading: go down to death
  chosen_spanish_reading: descienden a la muerte
  alternative_spanish_readings:
  - van hacia la muerte
  - bajan a la muerte
  rationale: «Descienden a la muerte» mantiene el movimiento direccional y el tono serio del proverbio. No se suaviza el resultado final, que en el hebreo es explícito.
  doctrine_reference: 'Sabiduría proverbial: advertencia moral directa'
translation_notes:
  revision_awareness: Sin cambios sustanciales respecto al texto fuente y al audit trail inglés; se mantiene la equivalencia óptima con preservación de la tensión de «Seol».
  spanish_consistency_notes:
  - Se usa «Seol» como transliteración consistente del término hebreo שְׁאוֹל, siguiendo la decisión inglesa de no reducirlo a «grave».
  - Se conserva el paralelismo corporal «pies / pasos» y el movimiento descendente para reflejar la estructura poética del hebreo.
  - La nota al pie ofrece alternativas léxicas sin sustituir el término principal en el texto.
