    text: Or “as soon as they had finished eating.” The Hebrew clause may be understood as marking either the completion of the meal or the moment they were just finishing it.
    reason: lexical_alternative
  - marker: b
    text: Hebrew shofar, a horn trumpet used for public signaling.
    reason: cultural_note
