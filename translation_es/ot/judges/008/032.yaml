translation:
  language: es
  text: Y Gedeón hijo de Joás murió en una buena vejez, y fue sepultado en el sepulcro de Joás su padre[a], en Ofra de los abiezeritas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la sepultura de Joás su padre». El hebreo קֶבֶר puede denotar tanto una tumba como un lugar de sepultura.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «Ofra del abiezerita», es decir, Ofra perteneciente al clan de Abiezer.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיָּמָת
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  - pasó a mejor vida
  lexicon: HALOT
  rationale: El hebreo מות expresa simplemente la muerte; «murió» conserva la fuerza directa de «died» sin suavizarla más de lo que permite el original.
- source_word: גִּדְעוֹן
  english_pob_choice: Gideon
  chosen_spanish: Gedeón
  alternatives_spanish:
  - Gideón
  lexicon: Transliteración tradicional en español
  rationale: En español bíblico, la forma establecida y más reconocible es «Gedeón»; mantiene la referencia propia del nombre sin introducir ambigüedad.
- source_word: בֶּן יוֹאָשׁ
  english_pob_choice: son of Joash
  chosen_spanish: hijo de Joás
  alternatives_spanish:
  - el hijo de Joás
  lexicon: HALOT
  rationale: La construcción de parentesco se vierte de forma natural como «hijo de Joás», conservando la identificación genealógica.
- source_word: בְּשֵׂיבָה טוֹבָה
  english_pob_choice: at a good old age
  chosen_spanish: en buena vejez
  alternatives_spanish:
  - a buena edad
  - en una buena vejez
  lexicon: HALOT
  rationale: שֵׂיבָה es «vejez»/«canas» y טוֹבָה añade valoración positiva. «En buena vejez» mantiene el tono sobrio y la calificación favorable sin ampliar el sentido a «plenitud» o «longevidad» no explicitadas.
- source_word: וַיִּקָּבֵר
  english_pob_choice: was buried
  chosen_spanish: fue sepultado
  alternatives_spanish:
  - fue enterrado
  - y fue sepultado
  lexicon: HALOT
  rationale: 'El nifal de קבר indica pasividad: «fue sepultado» preserva la formalidad y el acto de entierro en español bíblico.'
- source_word: בְּקֶבֶר
  english_pob_choice: in the tomb
  chosen_spanish: en el sepulcro
  alternatives_spanish:
  - en la tumba
  - en el sepulcro o tumba
  lexicon: HALOT
  rationale: קבר puede significar tumba o sepulcro. «Sepulcro» comunica bien un lugar de entierro familiar y evita la repetición inmediata con «sepultado».
- source_word: יוֹאָשׁ אָבִיו
  english_pob_choice: of Joash his father
  chosen_spanish: de Joás su padre
  alternatives_spanish:
  - de su padre Joás
  lexicon: HALOT
  rationale: La relación posesiva se mantiene con naturalidad en español. «De Joás su padre» sigue de cerca la estructura hebrea y conserva la identificación del lugar de sepultura.
- source_word: בְּעָפְרָה
  english_pob_choice: in Ophrah
  chosen_spanish: en Ofra
  alternatives_spanish:
  - en Ofrá
  lexicon: Topónimo bíblico
  rationale: Se usa la forma toponímica española habitual «Ofra», alineada con la transliteración bíblica estable.
- source_word: אֲבִי הָעֶזְרִי
  english_pob_choice: of the Abiezrites
  chosen_spanish: de los abiezeritas
  alternatives_spanish:
  - del clan de Abiezer
  - de los abiezeritas
  lexicon: HALOT
  rationale: El gentilicio refiere al clan descendiente de Abiezer. «Abiezeritas» preserva la identidad clanica y evita reemplazarla por un nombre propio o una paráfrasis más amplia.
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior anclando explícitamente los marcadores [a] y [b] en el texto español. La redacción sigue de cerca el audit trail inglés y el hebreo: se conservan la muerte de Gedeón, la referencia a una buena vejez, la pasividad de la sepultura, la ambigüedad léxica de קבר mediante una nota, y la identificación clanica de Ofra mediante una nota cultural.'
  spanish_consistency_notes:
  - Se mantuvo un español bíblico moderno y digno, evitando calcos innecesarios.
  - Se prefirió «sepulcro/sepultado» para conservar registro y evitar repetición simple.
  - Se usó «Ofra» y «abiezeritas» como formas españolas estables para topónimo y gentilicio.
  - No se añadieron decisiones teológicas porque el versículo es בעיקר narrativo y no presenta tensión doctrinal explícita.
