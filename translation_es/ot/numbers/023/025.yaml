translation:
  language: es
  text: 'Y Balac dijo a Balaam[a]: «Ni lo maldigas de ningún modo ni lo bendigas de ningún modo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «maldice, no lo maldigas ... bendice, no lo bendigas»; un infinitivo absoluto seguido de un verbo finito en cada cláusula, que expresa fuerte énfasis.'
