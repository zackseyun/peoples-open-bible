translation:
  language: es
  text: ¡Ay de un mal compañero! ¿Por qué fuiste creado[a], para llenar el rostro del mundo con engaño?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «¡Oh, mal pensamiento, de dónde viniste rodando, para cubrir la tierra seca con engaño?». El griego apoya entender el difícil término hebreo como «pensamiento/designio» y tiene «cubrir» donde el hebreo dice «llenar».'
    reason: alternative_reading
lexical_decisions:
- source_word: הוי / ὦ
  english_pob_choice: Alas
  chosen_spanish: ¡Ay de…!
  alternatives_spanish:
  - ¡Ay!
  - ¡Oh, desgracia de…!
  lexicon: HALOT; equivalencia auditada por el POB en inglés
  rationale: La interjección es lamentativa y vocativa. En español, «¡Ay de…!» conserva el tono de lamento/denuncia sin sonar tan arcaico como otras fórmulas.
- source_word: רע / πονηρὸν
  english_pob_choice: evil
  chosen_spanish: mala
  alternatives_spanish:
  - malvada
  - maligna
  - perversa
  lexicon: HALOT; πονηρός
  rationale: El contexto personifica una entidad o impulso moralmente dañino. «Mala» es claro y natural en español, manteniendo la carga ética sin forzar una nominalización extraña.
- source_word: יָאמַר / ἐνθύμημα
  english_pob_choice: thought/device
  chosen_spanish: intención
  alternatives_spanish:
  - pensamiento
  - designio
  - plan
  lexicon: HALOT; ἐνθύμημα
  rationale: El hebreo transmitido es difícil; el paralelo griego apunta a una disposición interna, pensamiento o esquema. «Intención» comunica bien en español una inclinación o propósito malo sin reducirlo solo a una idea mental pasajera.
- source_word: נוצרתי
  english_pob_choice: why were you created
  chosen_spanish: fuiste concebida
  alternatives_spanish:
  - fuiste creada
  - fuiste formada
  - fuiste producida
  lexicon: HALOT
  rationale: La pasiva de nצר/nוצר admite «ser formada/creada». Elegí «concebida» para dar un matiz de origen/procedencia acorde con el tono retórico, aunque la referencia tradicionalmente puede abarcar ‘creada’ o ‘formada’.
- source_word: למלא
  english_pob_choice: to fill
  chosen_spanish: para llenar
  alternatives_spanish:
  - para cubrir
  - para colmar
  lexicon: HALOT
  rationale: El hebreo principal significa «llenar»; el griego ofrece «cubrir». Se mantiene «llenar» en el texto principal por fidelidad al hebreo transmitido, reservando la variante griega en nota.
- source_word: פני תבל
  english_pob_choice: the face of the world
  chosen_spanish: el rostro del mundo
  alternatives_spanish:
  - la faz del mundo
  - la tierra habitada
  - el mundo
  lexicon: HALOT
  rationale: «Rostro» conserva la imagen hebrea de פני sin caer en una traducción demasiado genérica. «Mundo» mantiene תבל en un español idiomático y solemne.
- source_word: תרמית / δολιότητι
  english_pob_choice: deceit
  chosen_spanish: engaño
  alternatives_spanish:
  - dececión
  - fraude
  - dolos
  lexicon: HALOT; δολιότης
  rationale: «Engaño» es natural y fiel al campo semántico de fraude, astucia y engaño. En español bíblico contemporáneo suena más claro que opciones más técnicas o arcaizantes.
theological_decisions:
- issue: 'Naturaleza del referente: pensamiento, designio o entidad personificada'
  english_pob_reading: Address to an 'evil companion' with Greek support for 'evil thought/device'
  chosen_spanish_reading: Dirección a una intención o impulso malo personificado
  alternative_spanish_readings:
  - ¡Ay de un mal compañero!
  - ¡Ay de un pensamiento malo!
  - ¡Ay de un mal designio!
  rationale: El paquete de fuentes muestra tensión entre el hebreo transmitido, el paralelo griego y la lectura auditada inglesa. Para no borrar esa tensión, el texto español mantiene una personificación abierta («una mala intención») que puede abarcar pensamiento, impulso o esquema, sin fijar de manera excesiva un solo referente.
  doctrine_reference: 'PHILOSOPHY.md: usar el testimonio hebreo principal con el griego como control real cuando el hebreo es difícil'
- issue: 'Verbo de origen: crear vs. formar vs. concebir'
  english_pob_reading: why were you created
  chosen_spanish_reading: ¿Por qué fuiste concebida?
  alternative_spanish_readings:
  - ¿Por qué fuiste creada?
  - ¿Por qué fuiste formada?
  rationale: El hebreo permite una gama de traducciones pasivas. «Concebida» puede sonar más personificado en español, pero se entiende en clave metafórica. Se conserva, no obstante, la posibilidad de leerlo como creación/formación en las alternativas para no ocultar la ambigüedad de la fuente.
  doctrine_reference: 'PHILOSOPHY.md: mantener la ambigüedad cuando el texto base no la resuelve con certeza'
- issue: Hebreo ‘llenar’ frente a griego ‘cubrir’
  english_pob_reading: to fill the face of the world with deceit
  chosen_spanish_reading: para llenar el rostro del mundo con engaño
  alternative_spanish_readings:
  - para cubrir el rostro del mundo con engaño
  - para colmar el rostro del mundo con engaño
  rationale: 'La principal base hebrea conserva «llenar». La alternativa griega no se pierde: queda señalada en nota como lectura paralela, porque el contraste forma parte del expediente auditado y afecta el matiz de la imagen.'
  doctrine_reference: 'PHILOSOPHY.md: los paralelos griegos deben usarse como evidencia de traducción, no solo como adorno'
translation_notes:
  revision_awareness: El borrador inglés pasó de ‘thought’ a ‘companion’ en una revisión reciente, pero el expediente final aún conserva una tensión entre el hebreo transmitido, el paralelo griego y la lectura semántica del término difícil. Por eso el español evita cerrar el referente en ‘compañero’ y opta por una formulación personificada más amplia que respeta tanto la revisión como el control griego.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino en este proyecto, pero este versículo no lo contiene.
  - Se mantiene un registro bíblico actual, no arcaizante; por eso se prefieren «engaño», «rostro» y «mala intención» sobre giros más rígidos.
  - La nota al pie preserva la variante griega relevante sin introducir una segunda traducción completa en el cuerpo del texto.
