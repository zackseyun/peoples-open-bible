translation:
  language: es
  text: Hizo la barra central para pasar por el medio de los tablones, de un extremo al otro[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la barra central ... de extremo a extremo».
    reason: lexical_alternative
  - marker: b
    text: El verbo hebreo aquí también puede entenderse como «correr a través de» o «extenderse a través de» en este contexto de construcción.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: He made
  chosen_spanish: Hizo
  alternatives_spanish:
  - Y hizo
  - Entonces hizo
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol expresa acción simple en secuencia. En español, «hizo» comunica el hecho de manera natural; se omite la conjunción para mantener fluidez, como en la versión inglesa auditada.
- source_word: הַבְּרִיחַ
  english_pob_choice: the bar
  chosen_spanish: la barra
  alternatives_spanish:
  - la traviesa
  - el perno
  lexicon: HALOT
  rationale: En el contexto de la estructura del tabernáculo, el término designa una pieza transversal de unión. «Barra» conserva el valor funcional sin forzar una equivalencia técnica demasiado estrecha.
- source_word: הַתִּיכֹן
  english_pob_choice: the middle
  chosen_spanish: central
  alternatives_spanish:
  - del medio
  - del centro
  lexicon: HALOT
  rationale: El adjetivo señala ubicación media o céntrica. «Central» es una opción natural en español y mantiene la idea de la barra principal situada en el centro.
- source_word: לִבְרֹחַ
  english_pob_choice: to pass through
  chosen_spanish: para que pasara
  alternatives_spanish:
  - para correr a través
  - para extenderse a través
  lexicon: HALOT
  rationale: En este contexto arquitectónico, el infinitivo describe la función de atravesar o ir a través de los tablones. La construcción «para que pasara» transmite esa función de modo idiomático en español sin introducir una imagen excesivamente mecánica.
- source_word: בְּתוֹךְ
  english_pob_choice: through the midst of
  chosen_spanish: por en medio de
  alternatives_spanish:
  - a través de
  - en medio de
  lexicon: HALOT
  rationale: La preposición expresa el trayecto interior a lo largo del conjunto. «Por en medio de» preserva la idea espacial de atravesar el interior de los tablones con claridad en español.
- source_word: הַקְּרָשִׁים
  english_pob_choice: the boards
  chosen_spanish: los tablones
  alternatives_spanish:
  - las tablas
  - los paneles
  lexicon: HALOT
  rationale: En pasajes del tabernáculo, קֶרֶשׁ puede referirse a elementos estructurales de madera. «Tablones» resulta claro en español y mantiene el sentido de piezas alargadas de construcción.
- source_word: מִן הַקָּצֶה אֶל הַקָּצֶה
  english_pob_choice: from end to end
  chosen_spanish: de un extremo al otro
  alternatives_spanish:
  - de extremo a extremo
  - de punta a punta
  lexicon: HALOT
  rationale: El modismo expresa extensión completa a lo largo de toda la longitud. «De un extremo al otro» es natural y conserva bien la fuerza idiomática del hebreo.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el audit trail inglés, manteniendo la imagen arquitectónica y la extensión completa del travesaño sin añadir contenido interpretativo.
  spanish_consistency_notes:
  - 'Se preservó la terminología constructiva de manera uniforme: «barra», «tablones», «de un extremo al otro».'
  - Se evitó «SEÑOR» o «Cristo» porque no aparecen en el versículo ni en su trasfondo inmediato.
  - La voz impersonal de propósito («para que pasara») mantiene la función del infinitivo hebreo sin sobrerinterpretarlo.
