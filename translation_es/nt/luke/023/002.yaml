translation:
  language: es
  text: 'Y comenzaron a acusarlo[a], diciendo: «A este lo hallamos desviando a nuestra nación y prohibiendo que pagáramos tributos a César[b], y diciendo que él mismo es el Mesías[c], un rey».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «subvirtiendo a nuestra nación» o «extraviando a nuestra nación».
    reason: lexical_alternative
  - marker: b
    text: Griego φόρους, refiriéndose a tributos o impuestos pagados al gobernante romano.
    reason: cultural_note
  - marker: c
    text: O «Cristo»; aquí Χριστός funciona como título, no como nombre propio fijo.
    reason: alternative_reading
lexical_decisions:
- source_word: ἤρξαντο
  english_pob_choice: began
  chosen_spanish: comenzaron
  alternatives_spanish:
  - empezaron
  lexicon: BDAG
  rationale: El aoristo de ἄρχω con infinitivo complementario expresa inicio de la acción; «comenzaron» preserva bien ese valor ingesivo en español.
- source_word: κατηγορεῖν αὐτοῦ
  english_pob_choice: to accuse him
  chosen_spanish: acusarlo
  alternatives_spanish:
  - formular acusaciones contra él
  - denunciarlo
  lexicon: BDAG
  rationale: En contexto forense, «acusar» es la equivalencia más natural y directa; el objeto pronominal integra bien la relación del genitivo con κατηγορέω.
- source_word: Τοῦτον
  english_pob_choice: this man
  chosen_spanish: a este
  alternatives_spanish:
  - a este hombre
  - a este individuo
  lexicon: BDAG
  rationale: El demostrativo es despectivo y acusatorio. En español, «a este» conserva la deíxis con tono duro sin añadir material innecesario.
- source_word: διαστρέφοντα
  english_pob_choice: misleading
  chosen_spanish: desviando
  alternatives_spanish:
  - pervirtiendo
  - extraviando
  - desviando a
  lexicon: BDAG
  rationale: El participio apunta a un efecto corruptor o desviador sobre el pueblo. «Desviando» mantiene la imagen sin cargarlo demasiado hacia «subvertir» o «pervertir».
- source_word: τὸ ἔθνος ἡμῶν
  english_pob_choice: our nation
  chosen_spanish: nuestra nación
  alternatives_spanish:
  - nuestro pueblo
  lexicon: BDAG
  rationale: «Nación» conserva el sentido político-público que el cargo presenta ante Pilato; «pueblo» sería posible, pero menos preciso en este marco.
- source_word: κωλύοντα φόρους Καίσαρι διδόναι
  english_pob_choice: forbidding us to pay taxes to Caesar
  chosen_spanish: prohibiendo pagar tributos a César
  alternatives_spanish:
  - impidiendo pagar impuestos a César
  - prohibiendo que se pagaran tributos a César
  lexicon: BDAG
  rationale: φόρους refiere tributo/impuesto al gobernante romano. «Tributos» conserva el tono cívico-político y evita reducirlo solo a impuestos locales. Se omite un sujeto explícito porque el infinitivo griego es general y la acusación funciona de manera impersonal en español.
- source_word: λέγοντα
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - afirmando
  - sosteniendo
  lexicon: BDAG
  rationale: «Diciendo» sigue de cerca el verbo de habla sin introducir un matiz valorativo que el griego no requiere necesariamente.
- source_word: αὑτὸν
  english_pob_choice: he himself
  chosen_spanish: él mismo
  alternatives_spanish:
  - el mismo
  - en persona
  lexicon: BDAG
  rationale: El reflexivo es enfático; «él mismo» preserva la insistencia acusatoria del original.
- source_word: χριστὸν
  english_pob_choice: Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  - ungido
  lexicon: BDAG
  rationale: Como título, Χριστός se rinde normalmente por «Mesías» según la pauta del proyecto. Aquí la acusación reproduce un título real/mesiánico, no un nombre litúrgico fijo.
- source_word: βασιλέα
  english_pob_choice: a king
  chosen_spanish: un rey
  alternatives_spanish:
  - rey
  lexicon: BDAG
  rationale: El predicativo anartro tras εἶναι queda bien en español como «un rey», preservando la pretensión acusada sin convertirla en título oficial.
theological_decisions:
- issue: Χριστός como título en una acusación política
  english_pob_reading: Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  - ungido
  rationale: La acusación no presenta aquí «Cristo» como nombre propio devocional, sino como título cargado de expectativa real. «Mesías» conserva esa tensión judía y política sin borrar el matiz original.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Mesías cuando funciona como título'
- issue: φόρους Καίσαρι διδόναι y la implicación del sujeto
  english_pob_reading: forbidding us to pay taxes to Caesar
  chosen_spanish_reading: prohibiendo pagar tributos a César
  alternative_spanish_readings:
  - prohibiendo que se pagaran tributos a César
  - impidiendo pagar impuestos a César
  rationale: El griego no explicita en la forma de la frase un sujeto pronominal equivalente a «us»; en español puede sonar más natural mantener una prohibición general. El sustantivo «tributos» conserva mejor el trasfondo imperial romano que «impuestos».
  doctrine_reference: DOCTRINE.md Preserve lexical force without over-specifying implied participants
translation_notes:
  revision_awareness: El texto base inglés pasó por revisiones que oscilaron entre «Messiah» y «Christ» para Χριστός, y entre una formulación más explícita («us to pay taxes») y otra más directa. En esta versión española se recupera la decisión doctrinal estable de traducir Χριστός por «Mesías» cuando es título, y se refleja el trasfondo tributario con «tributos a César» sin añadir una sujeto explícito no presente en la sintaxis griega.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no contiene el tetragrámaton.
  - «Mesías» se usa para Χριστός en función titulativa; no se emplea «Cristo» salvo en la nota de alternativa.
  - «Tributos» se prefiere a «impuestos» por el contexto romano-imperial y la correspondencia con φόρος.
  - La puntuación de cita y el orden de las proposiciones siguen la sintaxis acusatoria del griego sin sobreparafrasear.
