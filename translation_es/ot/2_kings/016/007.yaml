  to: 'Entonces Ajaz envió mensajeros a Tiglat-pileser, rey de Asiria[a], diciendo: «Yo soy tu siervo y tu hijo. Sube y sálvame de la mano del rey de Aram y de la mano del rey de Israel[c][b], que se están levantando contra mí».'
  rationale: Se ajusta el conector inicial para reflejar mejor la secuencia narrativa hebrea sin añadir un matiz inferencial fuerte, y se cambia 'esclavo' por 'siervo' por ser la opción más natural y fiel al registro diplomático en español para esta fórmula concreta. Se mantienen 'Aram', 'sálvame', 'de la mano de' y el participio progresivo, en línea con la auditoría inglesa y el sentido del hebreo.
