revisions:
- from: En esto me desperté y miré[a], y mi sueño fue agradable para mí.
  to: En esto me desperté y miré[a], y mi dormir me fue agradable.
  rationale: Se revisa para evitar la ambigüedad de «sueño» (‘dream’/‘sleep’) y para dar una formulación más natural en español sin perder el sentido del hebreo. Se conserva «miré» conforme al rastro POB, y la alternativa «dulce» se mantiene en nota como equivalente léxico válido de עָרְבָה.
