translation:
  language: es
  text: 'Y la palabra de Yahvé vino a mí, diciendo:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - fue
  lexicon: HALOT
  rationale: En la fórmula profética ויהי דבר־יהוה אלי, el valor idiomático es el de llegada de la palabra divina al profeta. En español, «vino» reproduce de forma natural y fiel esa irrupción reveladora, sin volver la frase más rígida de lo necesario.
- source_word: דְבַר
  english_pob_choice: word
  chosen_spanish: palabra
  alternatives_spanish:
  - mensaje
  - asunto
  lexicon: HALOT
  rationale: En este giro fijo, דבר se refiere a la palabra/mensaje de revelación divina. «Palabra» conserva el paralelismo con el uso profético y evita expandir indebidamente el sentido.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como «Yahvé», conforme al estándar del proyecto para יְהוָה. Esto preserva el nombre personal del pacto y evita la sustitución por un título.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - para mí
  - sobre mí
  lexicon: HALOT
  rationale: La preposición con sufijo de primera persona indica dirección hacia el profeta como receptor. «A mí» es la correspondencia natural en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y me dijo
  - con estas palabras
  lexicon: HALOT
  rationale: לֵאמֹר introduce la cita o contenido del discurso. «Diciendo» mantiene la fórmula abierta y formal sin añadir información que no está en el hebreo.
theological_decisions:
- issue: Forma de representar el nombre divino יְהוָה en una fórmula profética
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El hebreo emplea directamente el Tetragrama. Para el texto principal se adopta «Yahvé», que conserva la decisión teológica y editorial de no ocultar el nombre personal de Dios tras una sustitución titulataria.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El contexto auditado en inglés ya fue revisado y quedó sin cambios; la versión española sigue esa lectura estable sin introducir variantes textuales ni notas adicionales.
  spanish_consistency_notes:
  - Se mantiene la fórmula profética breve y solemne.
  - No se añaden comillas ni expansión explicativa, porque el hebreo sólo introduce el inicio del discurso.
  - «Yahvé» se usa de forma consistente con el estándar del proyecto para el nombre divino.
