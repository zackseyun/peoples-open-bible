    reason: textual_variant
lexical_decisions:
- source_word: ויחרו בו
  chosen: grew angry with him
  alternatives:
  - burned against him
  - were enraged at him
  lexicon: HALOT
  rationale: The Hebrew חרה with ב conveys anger kindled against someone. 'Grew angry with him' is idiomatic modern English while preserving the image of anger arising. The Greek parallel ἐπισυνέστησαν αὐτῷ plus the later ἐν θυμῷ καὶ ὀργῇ supports hostile opposition, but the Hebrew verb specifically points to anger.
- source_word: זרים
  chosen: strangers
  alternatives:
  - outsiders
  - foreigners
  lexicon: HALOT
  rationale: The Hebrew literally means 'strangers/outsiders.' 'Strangers' keeps the lexical form of the Hebrew witness. Because the Greek expands with identifiable rebels from Israel, the term here likely means unauthorized or alien persons rather than ethnic foreigners; this is clarified by the appositional continuation drawn from the Greek.
- source_word: ויקנאו בו
  chosen: were jealous of him
  alternatives:
  - envied him
  - were zealous against him
  lexicon: HALOT
  rationale: קנא can denote jealousy or zeal. In this narrative context of rebellion against Aaron, 'were jealous of him' best captures personal rivalry. The Greek ἐζήλωσαν αὐτόν can also mean 'were jealous of him' or 'were zealous against him'; the former is more natural in English and fits Numbers 16 background.
- source_word: במדבר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: Standard rendering for במדבר. 'Wilderness' is the conventional and contextually appropriate term for Israel's setting in the exodus narratives.
- source_word: ἄνδρες οἱ περὶ Δαθὰν καὶ Ἀβειρών
  chosen: men of Dathan and Abiram
  alternatives:
  - the men around Dathan and Abiram
  - the followers of Dathan and Abiram
  lexicon: BDAG
  rationale: The Hebrew witness is shorter and lacks the identification of the rebels. Because the prompt directs use of the Greek parallel as actual translation input, this appositional phrase is incorporated to make explicit the allusion. 'Men of Dathan and Abiram' is concise and preserves the Greek sense of those associated with them.
- source_word: ἡ συναγωγὴ Κόρε
  chosen: the company of Korah
  alternatives:
  - the congregation of Korah
  - Korah's assembly
  lexicon: BDAG
  rationale: Although absent from the extant Hebrew line, the Greek preserves the fuller identification. 'Company' is natural English for a rebellious faction and avoids overly ecclesial overtones that 'congregation' may carry in modern English.
- source_word: ἐν θυμῷ καὶ ὀργῇ
  chosen: in fury and wrath
  alternatives:
  - with rage and anger
  - in indignation and wrath
  lexicon: BDAG
  rationale: This Greek doublet intensifies the rebels' hostility. 'Fury and wrath' preserves the rhetorical force without sounding archaic.
