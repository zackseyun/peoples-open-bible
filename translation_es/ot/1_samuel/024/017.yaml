translation:
  language: es
  text: 'Cuando David terminó de hablar estas palabras a Saúl[a], Saúl dijo: «¿Es esta tu voz, mi hijo David?» Entonces Saúl alzó su voz y lloró.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «David, hijo mío».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כְּכַלּוֹת
  english_pob_choice: When David had finished
  chosen_spanish: Cuando David terminó
  alternatives_spanish:
  - Y aconteció que, cuando David acabó
  - Tan pronto como David terminó
  lexicon: HALOT
  rationale: La construcción temporal hebrea se expresa con naturalidad en español mediante 'cuando' + pretérito perfecto simple; 'terminó' comunica la conclusión de la acción sin añadir elementos ajenos al texto.
- source_word: לְדַבֵּר
  english_pob_choice: speaking
  chosen_spanish: de hablar
  alternatives_spanish:
  - de hablar
  - de decir
  lexicon: HALOT
  rationale: El infinitivo complementa a 'terminó' y conserva el sentido de una acción verbal concluida. 'Hablar' es más natural en este contexto que una versión más literal pero rígida.
- source_word: אֶת הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: these words
  chosen_spanish: estas palabras
  alternatives_spanish:
  - estas cosas
  - estos dichos
  lexicon: HALOT
  rationale: En contexto de discurso directo, דְּבָרִים funciona naturalmente como 'palabras'. 'Estas palabras' mantiene la referencia verbal inmediata del hebreo y del audit trail inglés.
- source_word: אֶל שָׁאוּל
  english_pob_choice: to Saul
  chosen_spanish: a Saúl
  alternatives_spanish:
  - hacia Saúl
  - para Saúl
  lexicon: HALOT
  rationale: La preposición direccional se traduce de forma directa y clara con 'a'.
- source_word: הֲקֹלְךָ זֶה
  english_pob_choice: Is this your voice
  chosen_spanish: ¿Es esta tu voz?
  alternatives_spanish:
  - ¿Es esta tu voz?
  - ¿Es este tu sonido?
  - ¿Es esta tu voz, la tuya?
  lexicon: HALOT
  rationale: קוֹל puede significar 'voz' o 'sonido', pero aquí la pregunta de reconocimiento personal favorece 'voz'. 'Esta' sigue de cerca el demostrativo proximal זֶה.
- source_word: בְּנִי דָוִד
  english_pob_choice: my son David
  chosen_spanish: hijo mío David
  alternatives_spanish:
  - David, hijo mío
  - mi hijo David
  lexicon: HALOT
  rationale: Se conserva el lenguaje filial de Saúl. El orden 'hijo mío David' mantiene el apelativo afectivo y el nombre propio sin convertirlo en una fórmula más explicativa que el hebreo.
- source_word: וַיִּשָּׂא ... קֹלוֹ
  english_pob_choice: lifted up his voice
  chosen_spanish: alzó su voz
  alternatives_spanish:
  - levantó su voz
  - alzando la voz
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática; 'alzó su voz' preserva ese giro con buena naturalidad en español y refleja el carácter audible y emotivo de la acción.
- source_word: וַיֵּבְךְּ
  english_pob_choice: wept
  chosen_spanish: lloró
  alternatives_spanish:
  - lloró
  - se echó a llorar
  lexicon: HALOT
  rationale: El verbo denota llanto. 'Lloró' es preciso, sobrio y plenamente equivalente en español.
theological_decisions:
- issue: 'Lenguaje filial de Saúl: ''my son David'''
  english_pob_reading: Retained as relational and rhetorical language, not as a literal statement of sonship.
  chosen_spanish_reading: Se conserva como apelativo relacional y retórico, no como afirmación doctrinal de filiación literal.
  alternative_spanish_readings:
  - como una fórmula de patronazgo político
  - como un título meramente honorífico
  rationale: El hebreo usa lenguaje filial real; la traducción no debe suavizarlo ni convertirlo en una categoría doctrinal ajena. En español, 'hijo mío David' deja visible la carga afectiva y social del apelativo.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: No se detectaron revisiones aplicadas en el paquete de auditoría; la versión inglesa más reciente quedó sin cambios, y el presente borrador español sigue esa lectura estable.
  spanish_consistency_notes:
  - Se mantiene 'Saúl' y 'David' con formas españolas estándar y tildes correctas.
  - Se usa 'voz' para קוֹל por la lectura de reconocimiento personal del contexto.
  - No se introduce 'SEÑOR' ni otras sustituciones teológicas no presentes en el versículo.
  - El apelativo filial se conserva sin ampliar su valor doctrinal.
  - La puntuación española usa comillas de apertura y cierre y una interrogación directa acorde con el texto.
