translation:
  text: And it came to pass after Abraham died that the LORD blessed Isaac his son. And he rose up from Hebron and went and dwelt at the Well of the Vision[a] in the first year of the third week of this jubilee.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The place-name is rendered literally from the Ge'ez as 'Well of the Vision.' It likely corresponds to the site known from Genesis, but the translation avoids importing the fuller traditional form into the main text.
    reason: cross_reference
    anchor_ref: '24:1'
  - marker: b
    text: Or 'his son. And he rose up from Hebron and went and dwelt at the Well of the Vision'.
    reason: previous_rendering
