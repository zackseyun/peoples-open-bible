revisions:
- from: Y todo lo que habían dedicado Samuel, el vidente[a], Saúl hijo de Quis, Abner hijo de Ner y Joab hijo de Sarvia[b]—todo lo que cualquiera había dedicado—estaba bajo el cuidado de Selomit y sus hermanos.
  to: Y todo lo que habían dedicado Samuel el vidente, Saúl hijo de Quis, Abner hijo de Ner y Joab hijo de Zeruía—todo lo que cualquiera había dedicado—estaba bajo el cuidado[a] de Selomit y sus hermanos.
  rationale: 'Se corrige el aparato de notas para alinearlo con la auditoría inglesa: la nota se traslada a «bajo el cuidado» como alternativa léxica de עַל־יַד. Se elimina la nota sobre «vidente» porque, aunque correcta, no corresponde a la nota preservada por el POB en este versículo. Se cambia «Sarvia» por «Zeruía» para seguir mejor la transliteración estándar documentada para צְרוּיָה. También se quita la coma en «Samuel el vidente» para una aposición especificativa más natural en español bíblico continuo.'
