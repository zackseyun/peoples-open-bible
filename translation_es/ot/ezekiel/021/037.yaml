translation:
  language: es
  text: Serás combustible para el fuego; tu sangre[a] estará en medio de la tierra. No serás recordada, porque yo, Yahvé, he hablado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «tu culpa de sangre». El hebreo dice literalmente «tu sangre», que en este contexto puede implicar derramamiento de sangre o culpa de sangre.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָאֵשׁ
  english_pob_choice: for the fire
  chosen_spanish: para el fuego
  alternatives_spanish:
  - al fuego
  - para las llamas
  lexicon: HALOT
  rationale: 'El prefijo ל aquí indica destino o resultado: la destinataria queda entregada al fuego. En español, «para el fuego» conserva la imagen de juicio y resulta natural; «al fuego» también es posible, pero menos explícito sobre el destino/finalidad.'
- source_word: תִּהְיֶה
  english_pob_choice: you will be
  chosen_spanish: serás
  alternatives_spanish:
  - estarás
  - serás destinada a
  lexicon: HALOT
  rationale: El verbo היה en este contexto expresa la condición asignada a la entidad personificada. «Serás» comunica de forma directa y digna la sentencia profética sin añadir perífrasis innecesarias.
- source_word: לְאָכְלָה
  english_pob_choice: fuel
  chosen_spanish: leña
  alternatives_spanish:
  - combustible
  - material para quemar
  - alimento
  lexicon: HALOT
  rationale: El hebreo alude a algo destinado a ser consumido. En español, dentro de la imagen con fuego, «leña» comunica de manera clara y natural la idea de material para arder. No se usa «combustible» porque sería más técnico y menos imagético.
- source_word: דָּמֵךְ
  english_pob_choice: your blood
  chosen_spanish: tu sangre
  alternatives_spanish:
  - tu sangre culpable
  - tu derramamiento de sangre
  lexicon: HALOT
  rationale: Se conserva la lectura literal de «sangre», como hace la POB inglesa, para no resolver de antemano la tensión semántica entre sangre derramada y posible culpabilidad de sangre.
- source_word: בְּתוֹךְ הָאָרֶץ
  english_pob_choice: in the midst of the land
  chosen_spanish: en medio de la tierra
  alternatives_spanish:
  - en medio del país
  - dentro de la tierra
  lexicon: HALOT
  rationale: «En medio de la tierra» sigue de cerca la imagen hebrea y mantiene el sentido público y expuesto del juicio. «País» sería posible, pero «tierra» conserva mejor el eco bíblico.
- source_word: לֹא תִזָּכֵרִי
  english_pob_choice: you will not be remembered
  chosen_spanish: No serás recordada
  alternatives_spanish:
  - No se te recordará
  - No vendrás a memoria
  lexicon: HALOT
  rationale: El nifal de זכר se vierte de manera natural con pasiva en español. «Recordada» mantiene el sentido de olvido/ocultamiento judicial sin introducir «mencionada», que sería más débil.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se adopta la forma española «Yahvé» como equivalente estándar del nombre divino, preservando el Tetragrama sin sustitución por un título. «Yahweh» se reserva como transliteración inglesa; «SEÑOR» ocultaría el nombre propio.
- source_word: דִּבַּרְתִּי
  english_pob_choice: have spoken
  chosen_spanish: he hablado
  alternatives_spanish:
  - he dicho
  - hablé
  lexicon: HALOT
  rationale: El perfecto profético formula una declaración solemne y definitiva. «He hablado» conserva la fuerza performativa y el tono judicial del original.
theological_decisions:
- issue: Posible explicitación de la carga de sangre culpable en דָּמֵךְ
  english_pob_reading: your blood
  chosen_spanish_reading: tu sangre
  alternative_spanish_readings:
  - tu sangre culpable
  - tu derramamiento de sangre
  rationale: La POB inglesa preserva el literal «your blood» y deja la implicación de sangre derramada o culpabilidad como tensión contextual. La traducción española sigue esa misma decisión para no interpretar más allá del texto.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; original-language primacy'
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El hebreo usa directamente el Tetragrama. La forma «Yahvé» es la adaptación española del nombre divino, manteniendo visibilidad del nombre propio y evitando la sustitución litúrgica por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas en el paquete más reciente; el estado de acuerdo fue alto y el texto base se mantuvo sin cambios sustantivos.
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera consistente para יְהוָה, conforme al estándar español del proyecto.
  - Se mantuvo «sangre» sin glosa explicativa en el texto principal para preservar la tensión léxica observada en la fuente.
  - La sintaxis española sigue el paralelismo del hebreo con ritmo profético y registro solemne.
