id: PHP.3.15
reference: Philippians 3:15
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὅσοι οὖν τέλειοι, τοῦτο φρονῶμεν· καὶ εἴ τι ἑτέρως φρονεῖτε, καὶ τοῦτο ὁ θεὸς ὑμῖν ἀποκαλύψει·
base_translation:
  language: en
  yaml_path: translation/nt/philippians/003/015.yaml
  text: Therefore[a], all of us who are mature should think this way; and if you think differently about anything[b], God will reveal this also to you.
  footnotes:
  - marker: a
    text: Or “perfect.” The Greek τέλειοι can mean “perfect,” but here likely refers to spiritual maturity.
    reason: lexical_alternative
  - marker: b
    text: Or “let us have this mindset.”
    reason: lexical_alternative
translation:
  language: ko
  text: 그러므로 우리 가운데 성숙한[a] 자들은 모두 이같이 생각합시다[b]. 그리고 여러분이 무엇이든지 달리 생각한다면, 하나님께서 이것 또한 여러분에게 계시해 주실 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「완전한」. 헬라어 τέλειοι는 「완전한」을 뜻할 수 있으나, 본 문맥은 영적 성숙을 가리킨다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「이러한 마음을 품읍시다」. 헬라어 φρονέω는 단순한 사고가 아니라 정착된 사고방식·태도를 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_korean: 그러므로
  alternatives_korean:
  - 그러니
  - 따라서
  lexicon: BDAG
  rationale: 앞선 논증의 결론을 도입하는 표준 추론 표지. 「그러므로」가 가장 명료하다.
- source_word: ὅσοι
  english_pob_choice: all of us who
  chosen_korean: 우리 가운데 ~ 자들은 모두
  alternatives_korean:
  - ~한 자는 누구든지
  - ~한 만큼 우리 모두
  lexicon: BDAG
  rationale: 포괄적·집단적 지시. 「우리 가운데 ~ 자들은 모두」가 자연스럽게 그 범위를 보존한다.
- source_word: τέλειοι
  english_pob_choice: mature
  chosen_korean: 성숙한
  alternatives_korean:
  - 완전한
  - 온전한
  - 다 자란
  lexicon: BDAG
  rationale: 본 문맥에서 바울은 영적 성숙을 말하며 절대적 무죄 완전을 주장하지 않는다. 「성숙한」이 자연스럽고 정확하다. 「온전한」도 가능하나, 12절의 τετελείωμαι(「온전해졌다」)와 본 절의 τέλειοι의 미묘한 긴장(아직 완성되지 않음 vs. 성숙함)을 한국어에서 동일 어휘로 옮기면 흐려진다. 따라서 본 절은 「성숙한」으로 구분한다.
- source_word: τοῦτο
  english_pob_choice: this way
  chosen_korean: 이같이
  alternatives_korean:
  - 이것을
  - 이러한 방식으로
  lexicon: BDAG
  rationale: 「이같이」가 앞서 묘사된 사고방식을 자연스럽게 지시한다.
- source_word: φρονῶμεν
  english_pob_choice: should think
  chosen_korean: 생각합시다
  alternatives_korean:
  - 마음을 품읍시다
  - ~한 태도를 가집시다
  lexicon: BDAG
  rationale: 현재 가정법 권유형. 합쇼체 「~합시다」가 권유의 어조와 격식을 함께 살린다. φρονέω의 사고·태도 함의는 「이같이 생각합시다」로 보존된다.
- source_word: εἴ τι
  english_pob_choice: if you think differently about anything
  chosen_korean: 무엇이든지 달리 생각한다면
  alternatives_korean:
  - 어떤 점에서 달리 생각한다면
  - 어떤 일에 대해 다르게 생각한다면
  lexicon: BDAG
  rationale: 조건의 범위를 「무엇이든지」로 포괄적으로 옮기되, 강조 없이 자연스러운 어조를 유지한다.
- source_word: ἑτέρως
  english_pob_choice: differently
  chosen_korean: 달리
  alternatives_korean:
  - 다르게
  - 다른 방식으로
  lexicon: BDAG
  rationale: 「달리」가 간결하고 현대 한국어에 자연스럽다.
- source_word: ἀποκαλύψει
  english_pob_choice: will reveal
  chosen_korean: 계시해 주실 것입니다
  alternatives_korean:
  - 드러내실 것입니다
  - 보여 주실 것입니다
  lexicon: BDAG
  rationale: 신적 계시의 신학적 함의를 「계시」로 살리되, 합쇼체 존대형 「~해 주실 것입니다」로 종결한다.
theological_decisions:
- issue: 바울의 권면에서 τέλειοι의 의미
  chosen_reading: 영적으로 성숙한
  alternative_readings:
  - 완전한
  rationale: '직전 문맥(12절: τετελείωμαι를 부인)에서 바울이 절대적 완전을 주장할 수 없다. 본 절의 τέλειοι는 비교적·목적론적 의미의 성숙을 가리킨다. 「성숙한」이 그 긴장을 절대적 무죄 의미로 흐리지 않고 보존한다.'
  doctrine_reference: 'Preserve theological tension rather than resolve it; readable modern Korean.'
