translation:
  language: es
  text: Y desaparecerá la fortaleza de Efraín, y el reino de Damasco; y el remanente de Aram será[n] como la gloria[a] de los hijos de Israel[b], declara Yahvé de los ejércitos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el remanente de Aram será como el esplendor de los hijos de Israel». El término hebreo para «gloria» también puede incluir la idea de honor o esplendor.'
    reason: lexical_alternative
  - marker: b
    text: La comparación puede implicar que Aram compartirá la misma disminución venidera que Israel; el hebreo no explicita el punto exacto de comparación.
    reason: alternative_reading
lexical_decisions:
- source_word: וְנִשְׁבַּת
  english_pob_choice: will cease
  chosen_spanish: cesará
  alternatives_spanish:
  - será quitada
  - llegará a su fin
  lexicon: HALOT
  rationale: El nifal de שׁבת expresa cese o terminación. «Cesará» conserva el sentido de interrupción/fin sin sobreinterpretar como destrucción total.
- source_word: מִבְצָר
  english_pob_choice: the fortress
  chosen_spanish: la fortaleza
  alternatives_spanish:
  - el fortín
  - la ciudad fortificada
  lexicon: HALOT
  rationale: El sustantivo singular apunta a un lugar fortificado. «Fortaleza» es natural en español y mantiene el matiz militar concreto.
- source_word: מֵאֶפְרַיִם
  english_pob_choice: from Ephraim
  chosen_spanish: de Efraín
  alternatives_spanish:
  - de Israel
  - del territorio de Efraín
  lexicon: HALOT
  rationale: Se conserva el nombre explícito «Efraín» en lugar de convertirlo interpretativamente en «Israel», como hace el hebreo.
- source_word: וּמַמְלָכָה
  english_pob_choice: and the kingdom
  chosen_spanish: y el reino
  alternatives_spanish:
  - y la monarquía
  - y el poder real
  lexicon: HALOT
  rationale: «Reino» es el equivalente político más natural y fiel para מַמְלָכָה.
- source_word: מִדַּמֶּשֶׂק
  english_pob_choice: from Damascus
  chosen_spanish: de Damasco
  alternatives_spanish:
  - desde Damasco
  lexicon: HALOT
  rationale: Nombre propio con preposición simple; «de Damasco» refleja bien la relación de procedencia o pertenencia implícita en el hebreo.
- source_word: וּשְׁאָר אֲרָם
  english_pob_choice: and the remnant of Aram
  chosen_spanish: y el remanente de Aram
  alternatives_spanish:
  - y lo que queda de Aram
  - y los sobrevivientes de Aram
  lexicon: HALOT
  rationale: «Remanente» conserva el registro profético de שְׁאָר; se mantiene «Aram» por fidelidad al nombre hebreo.
- source_word: כִּכְבוֹד
  english_pob_choice: will be like the glory of
  chosen_spanish: será como la gloria de
  alternatives_spanish:
  - será como el honor de
  - será como el esplendor de
  lexicon: HALOT
  rationale: «Gloria» preserva el peso semántico de כָּבוֹד y deja abierta la gama de honor/esplendor sin resolverla de antemano.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos varones de Israel
  - el pueblo de Israel
  lexicon: HALOT
  rationale: «Hijos de Israel» traduce de manera directa בְּנֵי יִשְׂרָאֵל y evita neutralizar la forma masculina del hebreo.
- source_word: יִהְיוּ
  english_pob_choice: will be
  chosen_spanish: será
  alternatives_spanish:
  - estará
  - llegará a ser
  lexicon: HALOT
  rationale: Se usa un futuro simple en español para mantener la relación comparativa del hebreo; el referente colectivo permite un singular estilístico en la cláusula comparativa.
- source_word: נְאֻם יְהוָה צְבָאוֹת
  english_pob_choice: declares Yahweh of hosts
  chosen_spanish: declara Yahvé de los ejércitos
  alternatives_spanish:
  - declara Yahvé Sebaot
  - declara Yahvé de las huestes
  lexicon: HALOT
  rationale: Se sigue el default del proyecto para יְהוָה con «Yahvé». «De los ejércitos» comunica צְבָאוֹת de forma clara en español sin recurrir a una formulación más eclesiástica que el hebreo no exige.
theological_decisions:
- issue: La comparación entre el remanente de Aram y la gloria de los hijos de Israel
  english_pob_reading: The comparison is left formally ambiguous in the main text, without specifying whether it implies shared downfall, diminished status, or comparable condition.
  chosen_spanish_reading: 'La comparación queda formalmente abierta: no se precisa si apunta a una misma humillación, a una condición semejante o a otra clase de correspondencia.'
  alternative_spanish_readings:
  - Podría entenderse que Aram compartirá la disminución de Israel.
  - Podría entenderse que Aram será semejante a Israel en gloria o en destino.
  rationale: El hebreo no explicita el punto exacto de semejanza. La traducción conserva la ambigüedad para no resolver prematuramente una tensión interpretativa que el texto deja en pie.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en vez de resolverla.'
translation_notes:
  revision_awareness: La revisión más reciente marcó el texto como sin cambios necesarios; este borrador mantiene la misma lectura central y conserva la ambigüedad comparativa documentada en el aparato inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para יהוה.
  - Se conserva «Aram» y «Efraín» como nombres propios hebreos, sin sustituirlos por equivalentes interpretativos.
  - «Hijos de Israel» sigue el paralelismo explícito del hebreo y la decisión editorial de respetar la forma masculina cuando el texto la usa.
  - No se suaviza la comparación de כָּבוֹד; se deja abierta la gama semántica con nota.
  - «Yahvé de los ejércitos» traduce el título divino de manera transparente y no litúrgica.
