translation:
  language: es
  text: 'Y de los hijos de Imer: Hananí y Zebadías.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וּ/מִ/בְּנֵי
  english_pob_choice: And from the sons of
  chosen_spanish: Y de los hijos de
  alternatives_spanish:
  - Y de los descendientes de
  - Y entre los hijos de
  lexicon: HALOT
  rationale: La construcción con ו más מִן y el constructo בְּנֵי introduce otro grupo familiar dentro de una lista. «De los hijos de» conserva la fórmula genealógica inmediata sin ampliar innecesariamente a «descendientes», que sería más general.
- source_word: אִמֵּר
  english_pob_choice: Immer
  chosen_spanish: Imer
  alternatives_spanish:
  - Immer
  lexicon: HALOT
  rationale: Nombre propio de una familia sacerdotal. En español se adapta la transliteración al uso bíblico corriente «Imer», manteniendo el referente propio sin traducir el nombre.
- source_word: חֲנָנִי
  english_pob_choice: Hanani
  chosen_spanish: Jananí
  alternatives_spanish:
  - Hanani
  lexicon: HALOT
  rationale: Nombre propio. Se prefiere «J» para reflejar la pronunciación española de la consonante inicial aspirada/hebrea, manteniendo la forma bíblica reconocible en español.
- source_word: וּ/זְבַדְיָה
  english_pob_choice: and Zebadiah
  chosen_spanish: y Zebadías
  alternatives_spanish:
  - y Zebadía
  - y Zebadías
  lexicon: HALOT
  rationale: Nombre propio con conjunción final. Se conserva la transliteración tradicional en español «Zebadías», que es clara y bíblicamente reconocible.
translation_notes:
  revision_awareness: El inglés POB no añadió notas ni mostró variantes textuales; el hebreo masorético es breve y directo, por lo que la versión española mantiene la misma estructura de listado genealógico sin expansión interpretativa.
  spanish_consistency_notes:
  - Se mantiene el paralelismo de lista nominal con dos nombres unidos por «y».
  - Los nombres propios se transliteran de manera consistente con el uso bíblico en español.
  - No se añaden notas de pie porque el pasaje no presenta variantes, ambigüedades ni tensiones léxicas relevantes en el material auditado.
