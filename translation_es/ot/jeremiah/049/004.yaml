translation:
  language: es
  text: '¿Por qué presumes en los valles[a], tu valle desbordante, oh hija infiel, que confías en tus tesoros, diciendo: «¿Quién vendrá contra mí?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «tu valle que fluye con agua», «tu valle que se derrama» o «tu valle fértil». La frase hebrea es difícil y quizá aluda a la riqueza natural o a la defensibilidad del valle.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּתְהַֽלְלִי
  english_pob_choice: do you boast
  chosen_spanish: te jactas
  alternatives_spanish:
  - te glorías
  - te alabas a ti misma
  lexicon: HALOT
  rationale: El hitpael de הלל es reflexivo o medio; aquí expresa autoexaltación en tono de reproche. «Jactarse» comunica bien esa presunción en español actual sin perder el matiz de orgullo.
- source_word: בָּעֲמָקִים
  english_pob_choice: in the valleys
  chosen_spanish: en los valles
  alternatives_spanish:
  - en los vales
  lexicon: HALOT
  rationale: El plural de עֵמֶק es literalmente «valles». Se conserva la imagen geográfica concreta porque forma parte de la burla profética.
- source_word: זָב עִמְקֵךְ
  english_pob_choice: your valley flowing away
  chosen_spanish: tu valle que se derrama
  alternatives_spanish:
  - tu valle que fluye con agua
  - tu valle rebosante
  - tu valle fértil
  lexicon: HALOT
  rationale: La expresión es difícil y el hebreo admite varias lecturas. «Que se derrama» mantiene la imagen de flujo y deja abierta la ambigüedad sobre si alude a abundancia de agua, fertilidad o una ventaja natural que se pierde. Se evita traducirlo de forma demasiado interpretativa.
- source_word: הַבַּת הַשּׁוֹבֵבָה
  english_pob_choice: O faithless daughter
  chosen_spanish: oh hija infiel
  alternatives_spanish:
  - oh hija rebelde
  - oh hija apóstata
  - oh hija descarriada
  lexicon: HALOT
  rationale: Se conserva la personificación femenina directa del hebreo. «Infiel» comunica la deslealtad covenantal de manera natural en español y encaja con la revisión inglesa más reciente.
- source_word: הַבֹּטְחָה בְּאֹצְרֹתֶיהָ
  english_pob_choice: who trusts in her treasures
  chosen_spanish: que confías en tus tesoros
  alternatives_spanish:
  - que confías en tus almacenes
  - que confías en tu riqueza
  - que te apoyas en tus tesoros
  lexicon: HALOT
  rationale: אֹצָר puede referirse a tesoros, depósitos o almacenes; aquí la confianza falsa recae sobre la riqueza acumulada. «Tesoros» conserva esa idea y suena natural en español.
- source_word: מִי יָבֹוא אֵלַי
  english_pob_choice: Who will come against me?
  chosen_spanish: ¿Quién vendrá contra mí?
  alternatives_spanish:
  - ¿Quién vendrá a mí?
  - ¿Quién me atacará?
  lexicon: HALOT
  rationale: Aunque אֶל suele significar «a / hacia», en contexto hostil se entiende adversativamente. «Contra mí» expresa la amenaza implícita y el sentido de desafío del texto.
theological_decisions:
- issue: Imagen femenina singular para Amón/Jerusalén como «hija»
  english_pob_reading: Retain the feminine singular imagery as 'daughter' and 'her' rather than neutralizing to the nation abstractly.
  chosen_spanish_reading: Mantener «hija» y las formas femeninas singulares, sin neutralizar a un colectivo abstracto.
  alternative_spanish_readings:
  - oh pueblo infiel
  - oh nación rebelde
  rationale: El hebreo personifica directamente al destinatario como hija. Mantener la metáfora preserva la retórica profética y evita suavizar la fuerza del reproche.
  doctrine_reference: Principio de correspondencia semántica y retórica; atención a la imaginería del texto original
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa, que prefirió «faithless daughter» sobre «backsliding daughter». En español se eligió «hija infiel» por naturalidad y por reflejar mejor la deslealtad implícita del hebreo, manteniendo la misma dirección interpretativa. También se preservó la ambigüedad de זָב עִמְקֵךְ mediante una solución abierta («tu valle que se derrama») y una nota con alternativas.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; este versículo no contiene el nombre divino.
  - Se mantuvo «hija» en singular femenino para conservar la personificación profética.
  - «Tesoros» se prefirió a «almacenes» o «riquezas» porque recoge mejor la confianza en bienes acumulados y suena bíblicamente claro en español.
  - La pregunta final se volvió adversativa con «contra mí» para respetar el matiz de desafío implícito.
