translation:
  language: es
  text: Conforme al mayor número de años, aumentarás su precio de compra; y conforme al menor número de años, disminuirás su precio de compra, porque te vende un número de cosechas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «según el número de cosechas que te vende». El hebreo תְּבוּאוֹת puede traducirse «cosechas», «producto» o «rendimientos».
    reason: lexical_alternative
lexical_decisions:
- source_word: לְפִי
  english_pob_choice: in proportion to
  chosen_spanish: conforme a
  alternatives_spanish:
  - en proporción a
  - según
  - de acuerdo con
  lexicon: HALOT
  rationale: La expresión hebrea marca correspondencia proporcional en un cálculo legal. «Conforme a» conserva esa relación de ajuste sin sonar pesada en español.
- source_word: רֹב הַשָּׁנִים
  english_pob_choice: the greater number of years
  chosen_spanish: el mayor número de años
  alternatives_spanish:
  - muchos años
  - la multitud de años
  - el número mayor de años
  lexicon: HALOT
  rationale: La frase es comparativa y cuantitativa, no solo una vaga referencia a «muchos años». «El mayor número de años» mantiene la simetría con la segunda mitad del versículo.
- source_word: תַּרְבֶּה
  english_pob_choice: you shall increase
  chosen_spanish: aumentarás
  alternatives_spanish:
  - harás subir
  - incrementarás
  - multiplicarás
  lexicon: HALOT
  rationale: El verbo causativo expresa subir el precio de manera correspondiente. «Aumentarás» es claro, natural y suficientemente formal para una fórmula legal.
- source_word: מִקְנָתוֹ
  english_pob_choice: its purchase price
  chosen_spanish: su precio de compra
  alternatives_spanish:
  - su precio de adquisición
  - el precio de su compra
  - su compra
  lexicon: HALOT
  rationale: En este contexto el sustantivo apunta al valor pagado en la transacción. «Precio de compra» comunica la idea comercial con precisión y sin forzar una lectura técnica innecesaria.
- source_word: מְעֹט הַשָּׁנִים
  english_pob_choice: the fewer number of years
  chosen_spanish: el menor número de años
  alternatives_spanish:
  - pocos años
  - el número menor de años
  - la menor cantidad de años
  lexicon: HALOT
  rationale: Se preserva el paralelismo legal con la primera cláusula. «El menor número de años» refleja la comparación de forma transparente.
- source_word: תַּמְעִיט
  english_pob_choice: you shall reduce
  chosen_spanish: disminuirás
  alternatives_spanish:
  - reducirás
  - harás menor
  - aminorarás
  lexicon: HALOT
  rationale: El verbo causativo indica bajar el precio. «Disminuirás» es fluido y mantiene el sentido económico-jurídico del mandato.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - puesto que
  lexicon: HALOT
  rationale: La conjunción introduce la razón de la regla de precio. «Porque» expresa esa explicación de forma directa y natural.
- source_word: מִסְפַּר תְּבוּאֹת
  english_pob_choice: a number of harvests
  chosen_spanish: un número de cosechas
  alternatives_spanish:
  - un número de productos
  - un número de producciones
  - una cantidad de cosechas
  lexicon: HALOT
  rationale: תְּבוּאוֹת puede referirse a cosechas, producto o rendimiento. En español, «cosechas» conserva la concreción agrícola del contexto de Levítico 25 y evita una paráfrasis más abstracta.
- source_word: הוּא מֹכֵר לָךְ
  english_pob_choice: he is selling to you
  chosen_spanish: él te vende
  alternatives_spanish:
  - él está vendiéndote
  - él vende para ti
  - te vende
  lexicon: HALOT
  rationale: El participio hebreo puede funcionar como presente general. «Él te vende» mantiene la acción actual y la referencia masculina del sujeto sin recargar la frase.
theological_decisions:
- issue: Rendering of the transactional logic without altering the legal-theological force
  english_pob_reading: The verse explains a proportional adjustment in price based on remaining years until Jubilee, tied to the number of harvests being sold.
  chosen_spanish_reading: El versículo explica un ajuste proporcional del precio según los años restantes, vinculado al número de cosechas que se venden.
  alternative_spanish_readings:
  - El versículo habla solo de una rebaja o aumento de precio sin mencionar la proporción con los años.
  - El versículo podría leerse como una referencia general al valor del terreno sin énfasis en cosechas.
  rationale: La formulación española preserva el principio jurídico de proporcionalidad y el vínculo explícito con las cosechas, que son parte del razonamiento del texto. No se diluye la lógica económica del mandato.
  doctrine_reference: Levítico 25:14-17; principio de valoración proporcional en la ley del jubileo
translation_notes:
  revision_awareness: 'El borrador sigue el texto hebreo masorético (WLC) y armoniza con el rastro auditado en inglés: לְפִי como correspondencia proporcional, מִקְנָה como precio de compra, y תְּבוּאוֹת como cosechas/produce. No se detectaron revisiones aplicadas en el expediente; se mantiene la lectura estable del versículo con una sola nota léxica para la ambigüedad de תְּבוּאוֹת.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en este proyecto solo cuando aparece el Tetragrámaton; aquí no aparece.
  - Se mantiene el paralelismo entre «mayor número de años» y «menor número de años» para reflejar la estructura hebrea.
  - Se evita «SEÑOR» y también se evita «Cristo» por no ser pertinentes en este versículo.
  - «cosechas» es preferido sobre «crops» literal o tecnicismos agrícolas menos naturales en español.
  - La puntuación reproduce una cláusula principal seguida de una causal, con el estilo legal-serio apropiado para Levítico.
