translation:
  language: es
  text: ellos, y todo animal salvaje según su especie, y todo animal doméstico según su especie, y todo reptil que se arrastra sobre la tierra según su especie, y toda ave según su especie—toda ave alada[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. ‘todo pájaro, toda ala’. El hebreo usa una clasificación apposicional para enfatizar a todas las aves aladas.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵמָּה
  english_pob_choice: they
  chosen_spanish: ellos
  alternatives_spanish:
  - estas
  - aquellos
  lexicon: HALOT
  rationale: El pronombre plural retoma a Noé y a los que entraron con él; en español, ‘ellos’ es la forma natural y mantiene la referencia sin añadir palabras ajenas al hebreo.
- source_word: הַחַיָּה
  english_pob_choice: wild animal
  chosen_spanish: animal salvaje
  alternatives_spanish:
  - bestia
  - animal
  - criatura salvaje
  lexicon: HALOT
  rationale: ‘Animal salvaje’ preserva la distinción clasificatoria frente a בְּהֵמָה (‘animal doméstico’) y evita el arcaísmo o la connotación vaga de ‘bestia’.
- source_word: לְמִינָהּ / לְמִינֵהוּ
  english_pob_choice: according to its kind
  chosen_spanish: según su especie
  alternatives_spanish:
  - por su especie
  - de acuerdo con su clase
  - según su clase
  lexicon: HALOT
  rationale: En contextos genealógicos y clasificatorios de Génesis, מִין se expresa de forma clara y estable en español como ‘especie’; ‘según su especie’ conserva la repetición enfática del hebreo.
- source_word: הַבְּהֵמָה
  english_pob_choice: livestock animal
  chosen_spanish: animal doméstico
  alternatives_spanish:
  - ganado
  - bestia doméstica
  - animal de crianza
  lexicon: HALOT
  rationale: Se conserva el contraste con חַיָּה mediante una expresión natural en español. ‘Animal doméstico’ comunica bien la categoría sin restringirla solo a bovinos como haría ‘ganado’.
- source_word: הָרֶמֶשׂ הָרֹמֵשׂ עַל הָאָרֶץ
  english_pob_choice: creeping thing that creeps on the earth
  chosen_spanish: todo reptil que se arrastra sobre la tierra
  alternatives_spanish:
  - todo ser que se arrastra sobre la tierra
  - todo animal rastrero sobre la tierra
  - toda criatura que se arrastra sobre la tierra
  lexicon: HALOT
  rationale: ‘Reptil’ y ‘se arrastra’ transmiten el campo semántico de רמשׂ y el juego léxico entre sustantivo y participio. Aunque ‘reptil’ no agota la taxonomía moderna, en este pasaje funciona como equivalente bíblico tradicional y comprensible.
- source_word: הָעוֹף
  english_pob_choice: bird
  chosen_spanish: ave
  alternatives_spanish:
  - pájaro
  - animal volador
  - fowl
  lexicon: HALOT
  rationale: ‘Ave’ es más amplio y formal que ‘pájaro’, y encaja con el tono clasificatorio del versículo.
- source_word: כֹּל צִפּוֹר כָּל כָּנָף
  english_pob_choice: every winged bird
  chosen_spanish: todo pájaro, toda ala
  alternatives_spanish:
  - todo pájaro alado
  - toda ave alada
  - todo ser alado
  lexicon: HALOT
  rationale: El hebreo es apposicional y literalmente dice ‘todo pájaro, toda ala’. Se mantiene la tensión entre la lectura literal y la equivalencia idiomática. ‘Toda ala’ refleja con mayor transparencia el hebreo, mientras que ‘todo pájaro’ aclara la referencia aviar.
theological_decisions:
- issue: Clasificación de criaturas por especie en el contexto del juicio y preservación en el arca
  english_pob_reading: according to its kind
  chosen_spanish_reading: según su especie
  alternative_spanish_readings:
  - por su especie
  - según su clase
  rationale: No hay motivo para suavizar la insistencia del texto en la preservación ordenada de los seres vivos. La repetición de ‘según su especie’ mantiene la estructura y la teología de creación/orden del pasaje.
  doctrine_reference: Génesis 1–7; preservación de la creación en el juicio
- issue: 'Última apposición aviar: literalidad de ‘every bird, every wing’ frente a una equivalencia más natural'
  english_pob_reading: every winged bird
  chosen_spanish_reading: todo pájaro, toda ala
  alternative_spanish_readings:
  - toda ave alada
  - todo pájaro alado
  - todo ser alado
  rationale: El hebreo conserva una formulación enfática e inusual. En español, ‘todo pájaro, toda ala’ deja visible la dureza/literalidad del giro sin ocultar la intención clasificatoria; esta tensión se preserva en vez de normalizarla por completo.
  doctrine_reference: Poética y taxonomía hebrea; precisión lexical en textos de creación
translation_notes:
  revision_awareness: 'El inglés auditado pasó por ajustes menores en la última revisión: se afinó la frase de ‘livestock’ y se simplificó la clausula final a ‘every winged bird’ para reflejar la apposición hebrea. La versión española responde a esa misma tensión: mantiene la clasificación por especies y conserva en nota la literalidad final del hebreo, sin convertirla en una paráfrasis más libre.'
  spanish_consistency_notes:
  - Se conserva ‘especie’ para לְמִין de forma uniforme en todo el versículo.
  - Se mantiene el contraste ‘animal salvaje’ / ‘animal doméstico’ para reflejar חַיָּה / בְּהֵמָה.
  - ‘Ave’ se usa en el cuerpo principal, mientras ‘pájaro’ aparece en la apposición final para reflejar el hebreo de manera más concreta.
  - La nota final preserva la ambigüedad literal de כָּל כָּנָף sin perder inteligibilidad en el texto principal.
