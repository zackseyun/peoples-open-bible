  text: 내가 이것을 말하는 것은 여러분 자신의 유익을 위해서이지, 여러분에게 올가미를 씌우려는 것이 아닙니다. 다만 합당한 일을 하고 주께 흩어짐 없이 헌신하게 하려는 것입니다.
