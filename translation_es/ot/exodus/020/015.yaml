lexical_decisions:
- source_word: לֹא
  english_pob_choice: not
  chosen_spanish: 'no'
  alternatives_spanish:
  - no deberás
  - no has de
  lexicon: HALOT
  rationale: La negación hebrea en un mandamiento se expresa naturalmente en español con «no». Mantiene la fuerza prohibitiva directa del hebreo sin añadir modulación innecesaria.
- source_word: תִּגְנֹב
  english_pob_choice: steal
  chosen_spanish: robar
  alternatives_spanish:
  - hurtar
  - cometer hurto
  lexicon: HALOT
  rationale: El qal imperfecto 2ms de גנב en una prohibición general se traduce de forma concisa como «robar». En español, «robar» transmite el mandato legal con claridad y sin expandir el sentido más allá del texto.
theological_decisions:
- issue: Forma de la prohibición del Decálogo
  english_pob_reading: You shall not steal.
  chosen_spanish_reading: No robarás.
  alternative_spanish_readings:
  - No robes.
  rationale: El hebreo usa לֹא + imperfecto como prohibición directa en lenguaje legal de pacto. En español, «No robarás» conserva el registro solemne y formular del Decálogo mejor que una forma más coloquial, sin cambiar el contenido doctrinal.
  doctrine_reference: 'Éxodo 20:15; filosofía de traducción: equivalencia óptima.'
translation_notes:
  revision_awareness: El texto inglés auditado ofrece una nota de alternativa más dinámica («Do not steal»), pero no introduce una variación de sentido que requiera nota en español. Por eso se preservó una sola formulación clara y solemne sin aparato crítico adicional.
  spanish_consistency_notes:
  - Se usa «robar» como equivalente lexical normal de גנב en este mandamiento.
  - Se mantiene el estilo jurídico-bíblico breve y directo propio del Decálogo.
  - No se emplea «SEÑOR» ni terminología de sustitución porque este versículo no contiene el nombre divino.
