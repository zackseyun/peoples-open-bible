translation:
  language: es
  text: No presentarán a Yahvé nada con testículos magullados, aplastados, arrancados o cortados[a], y en su tierra no harán esto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «magullados, aplastados, arrancados o cortados»; el hebreo enumera cuatro formas de daño e implica los testículos del animal macho.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מָעוּךְ
  english_pob_choice: bruised
  chosen_spanish: magullados
  alternatives_spanish:
  - aplastados
  - golpeados
  lexicon: HALOT
  rationale: El término describe daño por presión o golpe, no simplemente una forma general de ruptura. «Magullados» conserva la idea de lesión física y distingue este primer defecto del siguiente, que ya expresa mejor la idea de aplastamiento.
- source_word: כָתוּת
  english_pob_choice: crushed
  chosen_spanish: aplastados
  alternatives_spanish:
  - triturados
  - machacados
  lexicon: HALOT
  rationale: Este participio expresa algo golpeado o reducido por compresión. «Aplastados» es natural en español y mantiene la fuerza concreta del defecto físico, diferenciándolo de «magullados».
- source_word: נָתוּק
  english_pob_choice: torn
  chosen_spanish: arrancados
  alternatives_spanish:
  - desgarrados
  - separados
  lexicon: HALOT
  rationale: La idea básica es algo arrancado o desgarrado por tracción. «Arrancados» comunica bien el daño traumático y, en este contexto, hace claro el sentido corporal implícito.
- source_word: כָרוּת
  english_pob_choice: cut
  chosen_spanish: cortados
  alternatives_spanish:
  - seccionados
  - cortados de
  lexicon: HALOT
  rationale: El verbo indica ser cortado o cercenado. «Cortados» es directo, fiel y suficiente para la lista de mutilaciones prohibidas.
- source_word: תַקְרִיבוּ
  english_pob_choice: present
  chosen_spanish: presentarán
  alternatives_spanish:
  - ofrecerán
  - llevarán
  lexicon: HALOT
  rationale: En contexto sacrificial, el Hifil significa presentar u ofrecer. «Presentarán» sigue de cerca la decisión inglesa y evita restringir innecesariamente el acto a una sola fase ritual.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahveh
  - al SEÑOR
  lexicon: Proyecto POB / DOCTRINE.md
  rationale: 'Se sigue el estándar del proyecto para el Nombre divino: «Yahvé». Mantenerlo evita el reemplazo por una convención de máscara y conserva la auditable decisión teológica del texto fuente.'
- source_word: בְאַרְצְכֶם
  english_pob_choice: in your land
  chosen_spanish: en su tierra
  alternatives_spanish:
  - en su país
  - en su territorio
  lexicon: HALOT
  rationale: La referencia es a la tierra de Israel en sentido comunitario. En español bíblico, «en su tierra» comunica bien la prohibición general para el pueblo sin introducir una nota nacional moderna.
- source_word: תַעֲשׂוּ
  english_pob_choice: you shall not do this
  chosen_spanish: harán eso
  alternatives_spanish:
  - harán tal cosa
  - lo harán
  lexicon: HALOT
  rationale: El verbo es elíptico y remite a la mutilación previamente descrita. «Harán eso» conserva esa referencia amplia sin sobreespecificar el objeto ni estrechar el alcance de la prohibición.
- source_word: implicit object of the four participles
  english_pob_choice: testicles
  chosen_spanish: testículos
  alternatives_spanish:
  - órganos sexuales masculinos
  - piedras
  lexicon: HALOT
  rationale: El contexto sacrificial aclara que los cuatro participios describen daños en los órganos sexuales masculinos del animal. En español, «testículos» es preciso, natural y evita eufemismos arcaicos.
theological_decisions:
- issue: Nombre divino del tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: Se adopta la forma establecida por el proyecto para יהוה. «Yahvé» conserva la distinción del Nombre propio frente a un sustituto litúrgico y sigue la política doctrinal del POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Alcance de la prohibición final
  english_pob_reading: a general prohibition against performing such mutilation in the land
  chosen_spanish_reading: una prohibición general de hacer esa mutilación en la tierra
  alternative_spanish_readings:
  - una prohibición de ofrecer tales animales en la tierra
  - una prohibición de preparar tales animales para sacrificio
  rationale: El hebreo usa un verbo amplio y elíptico. La traducción española mantiene ese alcance con «harán eso», de modo que la prohibición sigue recayendo sobre el acto descrito, no solo sobre la presentación sacrificial.
  doctrine_reference: Principio POB de preservar la amplitud semántica cuando el contexto no obliga a restringirla
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia y sin revisiones aplicadas en la versión inglesa más reciente. La redacción española sigue de cerca esa lectura, pero adapta la lista de defectos y la cláusula final a un español natural sin perder la elipsis del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para el Nombre divino.
  - Se usa «presentarán» para תַקְרִיבוּ, coherente con la decisión inglesa de evitar una reducción excesiva a «ofrecer» cuando el acto sacrificial es más amplio.
  - La lista de lesiones conserva cuatro términos distintos y el pie de nota explicita el referente corporal implícito.
  - «Harán eso» preserva la amplitud del verbo final y evita convertir la cláusula en una restricción sobre una sola fase ritual.
