revisions:
- from: Y cuando la llama subía del altar hacia el cielo[a], el ángel de Yahvé subió en la llama del altar, mientras Manoá y su esposa miraban[b]; y cayeron sobre sus rostros en tierra.
  to: Y cuando la llama subía del altar hacia el cielo, el ángel de Yahvé[a] subió en la llama del altar, mientras Manoá y su esposa miraban; y cayeron sobre sus rostros hasta el suelo[b].
  rationale: Se corrigieron las notas para que reflejen alternativas reales y queden ancladas en las frases correspondientes. La nota sobre «ángel/mensajero» preserva la alternativa léxica documentada en el POB inglés. La cláusula final se ajustó a «cayeron sobre sus rostros hasta el suelo» para mantener la cercanía al hebreo y sonar más natural en español que «en tierra».
  reviewer_model: gpt-5.4
