id: 2TI.2.8
reference: 2 Timothy 2:8
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Μνημόνευε Ἰησοῦν Χριστὸν ἐγηγερμένον ἐκ νεκρῶν, ἐκ σπέρματος Δαυίδ, κατὰ τὸ εὐαγγέλιόν μου·
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/002/008.yaml
  text: Remember Jesus Messiah, raised from the dead, descended from David, according to my gospel.
translation:
  language: ko
  text: 예수 메시아를 기억하십시오. 그분은 죽은 자들 가운데서 다시 살아나신 분이시고, 다윗의 후손[a]이십니다. 나의 복음이 그러합니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 직역하면 「다윗의 씨」. 약속된 메시아가 다윗 왕가의 혈통을 통해 오신다는 구약의 약속을 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγηγερμένον ἐκ νεκρῶν
  english_pob_choice: raised from the dead
  chosen_korean: 죽은 자들 가운데서 다시 살아나신 분
  alternatives_korean:
  - 죽은 자들로부터 일으킴 받으신 분
  - 죽음에서 부활하신 분
  lexicon: BDAG
  rationale: 완료 분사 ἐγηγερμένον의 「부활하셔서 그 상태에 계신」 지속적 부활을 한국어 「다시 살아나신 분」으로 옮긴다. 「죽은 자들 가운데서」는 신약 부활 정형 표현을 보존한다.
- source_word: ἐκ σπέρματος Δαυίδ
  english_pob_choice: descended from David
  chosen_korean: 다윗의 후손
  alternatives_korean:
  - 다윗의 씨
  - 다윗의 자손
  lexicon: BDAG
  rationale: σπέρμα는 「씨」를 직역하나, 한국어로는 「후손」이 인격적 혈통을 자연스럽게 가리킨다. 직역 「씨」는 각주에 둔다.
- source_word: κατὰ τὸ εὐαγγέλιόν μου
  english_pob_choice: according to my gospel
  chosen_korean: 나의 복음이 그러합니다
  alternatives_korean:
  - 나의 복음을 따라
  - 내가 전하는 복음대로
  lexicon: BDAG
  rationale: κατά + 대격이 「~을 따라·~에 부합하여」를 가리킨다. 본문 흐름에서는 앞 구절을 받아 마무리하는 「나의 복음이 그러합니다」가 자연스럽다.
