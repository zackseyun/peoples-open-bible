translation:
  language: es
  text: La casa de Israel llamó su nombre maná[a], y este era como semilla blanca de cilantro[b], y su sabor era como obleas[c] con miel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Maná» es la forma tradicional en español; el hebreo dice literalmente man.
    reason: lexical_alternative
  - marker: b
    text: 'También puede entenderse: «como la semilla de cilantro, blanca».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «como una oblea con miel» o «como tortas delgadas con miel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵית יִשְׂרָאֵל
  english_pob_choice: The house of Israel
  chosen_spanish: la casa de Israel
  alternatives_spanish:
  - los israelitas
  lexicon: HALOT
  rationale: Conservo la expresión corporativa literal del hebreo. En español, «la casa de Israel» suena natural y mantiene la forma hebrea mejor que una equivalencia más explicativa como «los israelitas».
- source_word: וַיִּקְרְאוּ
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - nombró
  lexicon: HALOT
  rationale: El verbo aquí introduce el acto de dar nombre. «Llamó» reproduce de manera directa la acción nominativa sin añadir matiz interpretativo; «nombró» también sería posible, pero es menos transparente al gesto del hebreo.
- source_word: שְׁמוֹ
  english_pob_choice: its name
  chosen_spanish: su nombre
  alternatives_spanish:
  - el nombre de ello
  lexicon: HALOT
  rationale: El sufijo posesivo señala el nombre del alimento descrito. «Su nombre» conserva la relación posesiva de forma natural en español.
- source_word: מָן
  english_pob_choice: manna
  chosen_spanish: maná
  alternatives_spanish:
  - man
  lexicon: HALOT
  rationale: «Maná» es la forma tradicional en español para este alimento del desierto y comunica de inmediato al lector la referencia bíblica. Conserva además la convención bíblica establecida, como en inglés «manna».
- source_word: כְּזֶרַע גַּד לָבָן
  english_pob_choice: like white coriander seed
  chosen_spanish: como semilla de cilantro blanco
  alternatives_spanish:
  - como la semilla de cilantro, blanca
  - como semilla blanca de cilantro
  lexicon: HALOT
  rationale: El hebreo compara el maná con una semilla de גַּד identificada convencionalmente como cilantro/coriandro, y לָבָן califica el color. «Semilla de cilantro blanco» preserva la comparación y su orden compacto; «coriandro» sería igualmente posible, pero «cilantro» es más transparente para lectores hispanos.
- source_word: וְטַעְמוֹ
  english_pob_choice: and its taste
  chosen_spanish: y su sabor
  alternatives_spanish:
  - y su gusto
  lexicon: HALOT
  rationale: טַעַם se refiere al sabor percibido al comer. «Sabor» resulta la opción más natural en español para una descripción alimentaria, sin perder el sentido sensorial.
- source_word: כְּצַפִּיחִת
  english_pob_choice: like wafers
  chosen_spanish: como tortas
  alternatives_spanish:
  - como obleas
  - como wafers
  lexicon: HALOT
  rationale: El término designa un pan o torta delgada. «Tortas» comunica la idea de una pieza horneada, mientras «obleas» podría sugerir un alimento demasiado específico en español moderno; «wafers» no es español.
- source_word: בִּדְבָשׁ
  english_pob_choice: with honey
  chosen_spanish: con miel
  alternatives_spanish:
  - en miel
  - hechas con miel
  lexicon: HALOT
  rationale: La preposición expresa asociación/ingrediente. «Con miel» es la traducción más natural y mantiene la imagen de un alimento dulce, sin forzar un sentido culinario más preciso de lo que el hebreo exige.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo consonante y la sintaxis breve de la cláusula descriptiva. Se mantiene la comparación triple: nombre del alimento, aspecto y sabor. La elección de «maná» sigue la convención bíblica establecida en español, paralela a la decisión inglesa «manna», sin perder la nota etimológica en la nota a pie.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se prefirió «sabor» por ser el equivalente más natural de טַעַם en contexto alimentario.
  - «Semilla de cilantro blanco» preserva la ambigüedad leve del hebreo sin introducir una glosa excesiva.
