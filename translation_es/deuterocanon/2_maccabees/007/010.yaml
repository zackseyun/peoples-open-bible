translation:
  language: es
  text: Después de él[a], se burlaban del tercero, y, cuando le exigieron la lengua, la sacó rápidamente y extendió sus manos con valentía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando exigieron su lengua». El griego usa un participio pasivo («habiendo sido exigida»), que en español también puede expresarse con un agente implícito tomado del contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετὰ δὲ τοῦτον
  english_pob_choice: After him
  chosen_spanish: Después de él
  alternatives_spanish:
  - Después de éste
  - Tras él
  lexicon: LSJ
  rationale: La frase marca sucesión temporal y personal en la serie de hermanos; «Después de él» conserva esa referencia directa y suena natural en español.
- source_word: ὁ τρίτος
  english_pob_choice: the third
  chosen_spanish: el tercero
  alternatives_spanish:
  - el tercer hermano
  - el tercero de ellos
  lexicon: LSJ
  rationale: El ordinal funciona sustantivado; en el contexto narrativo queda claro que se trata del tercer hermano, por lo que «el tercero» preserva la brevedad del griego.
- source_word: ἐνεπαίζετο
  english_pob_choice: was mocked
  chosen_spanish: era objeto de burlas
  alternatives_spanish:
  - era burlado
  - se burlaban de él
  - fue ridiculizado
  lexicon: LSJ
  rationale: El verbo expresa burla y escarnio; «era objeto de burlas» mantiene el sentido pasivo sin forzar un matiz más fuerte que el griego.
- source_word: τὴν γλῶσσαν
  english_pob_choice: his tongue
  chosen_spanish: la lengua
  alternatives_spanish:
  - su lengua
  - la lengua de él
  lexicon: LSJ
  rationale: En español la posesión puede quedar implícita por el contexto inmediato; «la lengua» evita añadir un posesivo que no está en el griego.
- source_word: αἰτηθεὶς
  english_pob_choice: when his tongue was demanded
  chosen_spanish: cuando le pidieron la lengua
  alternatives_spanish:
  - cuando le exigieron la lengua
  - cuando demandaron su lengua
  lexicon: LSJ
  rationale: El participio pasivo expresa que la lengua fue solicitada o exigida coercitivamente. «Le pidieron la lengua» conserva la pasiva implícita de forma natural en español, sin especificar más de lo que el contexto garantiza.
- source_word: ταχέως
  english_pob_choice: quickly
  chosen_spanish: rápidamente
  alternatives_spanish:
  - de inmediato
  - velozmente
  lexicon: LSJ
  rationale: Adverbio simple de rapidez; «rápidamente» es claro y sobrio en español actual.
- source_word: προέβαλλεν
  english_pob_choice: held it out
  chosen_spanish: la sacó
  alternatives_spanish:
  - la extendió
  - la mostró
  - la puso afuera
  lexicon: LSJ
  rationale: Con «lengua» como objeto, el gesto idiomático más natural en español es «sacó la lengua»; aquí, por el contexto de mutilación, «la sacó» comunica el acto de exponerla para el tormento sin caer en coloquialismo.
- source_word: τὰς χεῖρας
  english_pob_choice: his hands
  chosen_spanish: sus manos
  alternatives_spanish:
  - las manos
  - sus propias manos
  lexicon: LSJ
  rationale: El posesivo es idiomático en español para partes del cuerpo y evita ambigüedad.
- source_word: εὐθαρσῶς
  english_pob_choice: courageously
  chosen_spanish: con valentía
  alternatives_spanish:
  - con coraje
  - con audacia
  - valerosamente
  lexicon: LSJ
  rationale: El adverbio expresa ánimo firme y audaz; «con valentía» comunica bien la disposición martirial sin sonar arcaico.
- source_word: προέτεινεν
  english_pob_choice: stretched out
  chosen_spanish: extendió
  alternatives_spanish:
  - tendió
  - alargó
  - estiró
  lexicon: LSJ
  rationale: El verbo indica extender hacia adelante; «extendió» es la opción más natural en español para las manos ofrecidas al suplicio.
theological_decisions:
- issue: Representación del martirio sin añadir interpretaciones
  english_pob_reading: The third brother is mocked and responds by exposing his tongue and extending his hands courageously.
  chosen_spanish_reading: El tercero es objeto de burlas, pero responde con serenidad física y valentía al ofrecer su cuerpo al suplicio.
  alternative_spanish_readings:
  - El tercero acepta el tormento con desafío
  - El tercero se burla de sus verdugos
  rationale: El griego describe acciones concretas, no una explicación psicológica extensa. La redacción española debe dejar visible la dignidad del mártir sin añadir actitudes no expresadas explícitamente por el texto.
  doctrine_reference: Martirio y perseverancia en la fidelidad
- issue: Agencia implícita en el pedido de la lengua
  english_pob_reading: when his tongue was demanded
  chosen_spanish_reading: cuando le pidieron la lengua
  alternative_spanish_readings:
  - cuando se pidió su lengua
  - cuando su lengua fue reclamada
  rationale: El participio pasivo no nombra agente; el contexto lo hace inferible. En español, la impersonalidad «le pidieron» conserva esa tensión sin resolverla de modo más explícito de lo que exige el griego.
  doctrine_reference: Coacción de los perseguidores en el relato de los mártires
- issue: Lenguaje corporal del suplicio
  english_pob_reading: he quickly held it out and courageously stretched out his hands
  chosen_spanish_reading: la sacó rápidamente y extendió sus manos con valentía
  alternative_spanish_readings:
  - la puso fuera rápidamente y alargó sus manos con valor
  - la mostró rápidamente y tendió sus manos con valentía
  rationale: La imagen griega es corporal y concreta. La traducción española debe mantener esa concreción sin suavizarla ni exagerarla.
  doctrine_reference: Fidelidad del testimonio bajo persecución
translation_notes:
  revision_awareness: La versión griega y el contexto del pasaje concuerdan con la traducción inglesa auditada; no se detectan cambios textuales relevantes. Se conserva la ambigüedad del agente en el pedido de la lengua mediante una construcción impersonal en español, como refleja la nota inglesa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general de la serie, pero este versículo no contiene el nombre divino.
  - Se usa «el tercero» como ordinal sustantivado, en paralelo con la economía del griego.
  - Se optó por «la lengua» y «sus manos» para reflejar el habla natural del español y evitar redundancias.
  - No se introdujo vocabulario eclesiástico tradicional que no esté exigido por el texto.
