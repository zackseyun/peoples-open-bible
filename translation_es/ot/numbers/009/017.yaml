translation:
  language: es
  text: Siempre que la nube se elevaba de sobre la tienda[a], después de eso los hijos de Israel se ponían en marcha; y en el lugar donde la nube se asentaba, allí acampaban los hijos de Israel[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'de sobre el tabernáculo', ya que 'la tienda' aquí se refiere a la tienda del tabernáculo.
    reason: lexical_alternative
  - marker: b
    text: O 'los israelitas'. El hebreo dice literalmente 'los hijos de Israel'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְפִי
  english_pob_choice: Whenever
  chosen_spanish: Cuando
  alternatives_spanish:
  - Siempre que
  - Cada vez que
  lexicon: HALOT
  rationale: La expresión marca circunstancia temporal repetida. En español, 'Cuando' comunica bien esa recurrencia sin sonar forzado; 'Siempre que' también sería posible, pero puede sonar más condicional que temporal.
- source_word: הֵעָלֹת
  english_pob_choice: was lifted
  chosen_spanish: era levantada
  alternatives_spanish:
  - era alzada
  - se levantaba
  lexicon: HALOT
  rationale: El infinitivo de עלה aquí expresa el alzamiento de la nube. 'Era levantada' conserva la pasiva del hecho sin introducir una lectura distinta; 'se levantaba' suena más idiomático, pero pierde un poco de transparencia causal.
- source_word: הֶעָנָן
  english_pob_choice: the cloud
  chosen_spanish: la nube
  lexicon: HALOT
  rationale: Es la equivalencia directa y natural en español para ענן en este contexto de guía en el desierto.
- source_word: מֵעַל הָאֹהֶל
  english_pob_choice: from over the tent
  chosen_spanish: de sobre la tienda
  alternatives_spanish:
  - de encima de la tienda
  - desde sobre la tienda
  - de sobre el tabernáculo
  lexicon: HALOT
  rationale: Se conserva la preposición espacial 'from over/upon' y el sustantivo literal 'tienda'. Aunque el referente es la tienda del tabernáculo, el hebreo dice 'tienda'; por eso se mantiene en el texto principal.
- source_word: וְאַחֲרֵי כֵן
  english_pob_choice: after that
  chosen_spanish: después de eso
  alternatives_spanish:
  - entonces
  - luego
  lexicon: HALOT
  rationale: La frase marca secuencia. 'Después de eso' reproduce bien ese orden temporal explícito sin añadir matices no presentes.
- source_word: יִסְעוּ
  english_pob_choice: would set out
  chosen_spanish: se ponían en marcha
  alternatives_spanish:
  - salían
  - partían
  - se desplazaban
  lexicon: HALOT
  rationale: El imperfecto tiene valor habitual/iterativo. 'Se ponían en marcha' expresa una acción repetida en un registro digno y claro; 'salían' sería más simple pero menos específico.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se conserva la formulación literal y auditable del hebreo. 'Los israelitas' es más fluido, pero pierde la transparencia formal que el POB inglés preservó.
- source_word: וּבִמְקוֹם אֲשֶׁר
  english_pob_choice: and in the place where
  chosen_spanish: y en el lugar donde
  alternatives_spanish:
  - y donde
  - y en el sitio donde
  lexicon: HALOT
  rationale: La estructura locativa se conserva con naturalidad en español. 'En el lugar donde' refleja el hebreo sin volverlo rígido.
- source_word: יִשְׁכָּן
  english_pob_choice: settled
  chosen_spanish: se detenía
  alternatives_spanish:
  - se asentaba
  - reposaba
  - moraba
  lexicon: HALOT
  rationale: Aunque el verbo hebreo puede implicar 'habitar/establecerse', para una nube el valor concreto es el de posarse o detenerse. 'Se detenía' comunica ese sentido sin antropomorfizarla.
- source_word: שָׁם ... שָׁם
  english_pob_choice: there ... there
  chosen_spanish: allí ... allí
  alternatives_spanish:
  - allí
  - ahí ... ahí
  lexicon: HALOT
  rationale: Se preserva la repetición enfática del hebreo con 'allí ... allí'. Esto mantiene la correspondencia retórica del original.
- source_word: יַחֲנוּ
  english_pob_choice: would camp
  chosen_spanish: acampaban
  alternatives_spanish:
  - se acampaban
  - levantaban el campamento
  lexicon: HALOT
  rationale: El imperfecto también es habitual. 'Acampaban' es el equivalente natural y mantiene la repetición de la acción; 'levantaban el campamento' desplaza el foco hacia el desmontaje, no hacia el campamento.
theological_decisions:
- issue: Tratamiento de 'la tienda' frente a 'tabernáculo'
  english_pob_reading: Or 'from over the tabernacle,' since 'the tent' here refers to the tabernacle tent.
  chosen_spanish_reading: Se mantiene 'la tienda' en el texto principal, con nota para la referencia al tabernáculo.
  alternative_spanish_readings:
  - '''del tabernáculo'''
  - '''de sobre el tabernáculo'''
  rationale: El hebreo usa literalmente 'la tienda', y el POB inglés conserva esa forma en el texto principal, explicando que el referente es la tienda del tabernáculo. La nota evita perder esa tensión lexical entre forma y referencia.
  doctrine_reference: Éxodo 40:34-38; Números 9:15-23
- issue: Tratamiento de 'los hijos de Israel'
  english_pob_reading: Or 'the Israelites.' The Hebrew is literally 'the sons of Israel.'
  chosen_spanish_reading: Se conserva 'los hijos de Israel' en el texto principal, con nota alternativa 'los israelitas'.
  alternative_spanish_readings:
  - '''los israelitas'''
  - '''los hijos de Israel'''
  rationale: La formulación literal preserva la auditabilidad del hebreo y coincide con la decisión del POB inglés. La alternativa 'los israelitas' es idiomática, pero borra la forma familiar explícita del texto fuente.
  doctrine_reference: Éxodo 1:7; Números 1:1-54
translation_notes:
  revision_awareness: 'El pasaje presenta una concordancia alta con la revisión inglesa más reciente: no se reportaron cambios aplicados y el texto base quedó sin modificaciones. La versión española mantiene esa estabilidad, conservando las decisiones auditadas del inglés POB y ajustándolas a un español natural sin perder transparencia semántica.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo exige; este versículo no contiene el Tetragrámaton.
  - '''Hijos de Israel'' se conserva como fórmula literal de registro bíblico consistente con el proyecto.'
  - '''Tienda'' se mantiene en el cuerpo principal porque el hebreo dice אֹהֶל; la nota explica el referente tabernacular.'
  - '''Se ponían en marcha'' y ''acampaban'' reflejan el aspecto habitual/iterativo del imperfecto hebreo.'
