  glossary_alignment: No hay conflictos con la terminología base del proyecto. Se mantiene la metáfora «la lámpara de Israel» conforme al razonamiento auditado. Los nombres propios están dentro de variantes ortográficas españolas aceptables; no obstante, «Abisay»/«Seruiá» son menos comunes que «Abisai»/«Zeruia», pero no constituyen un error de fidelidad en este versículo.
