revisions:
- from: 'Ahora el rey Joram había vuelto a Jezreel para recuperarse de las heridas que los arameos le habían causado cuando peleó contra Hazael, rey de Aram. Y Jehú dijo: “Si esto es lo que ustedes piensan[a], que no salga ningún fugitivo de la ciudad para ir a contarlo en Jezreel”.'
  to: 'Ahora el rey Joram había vuelto a Jezreel para recuperarse de las heridas que los arameos le habían causado cuando peleó contra Hazael, rey de Aram. Y Jehú dijo: “Si esto es lo que ustedes quieren[a], que no salga ningún fugitivo de la ciudad para ir a contarlo en Jezreel.”'
  rationale: Se cambia 'piensan' por 'quieren' para reflejar mejor el sentido volitivo del modismo hebreo אִם יֵשׁ נַפְשְׁכֶם. Se conserva una nota con alternativas cercanas ('su voluntad', 'están dispuestos') y la literalidad hebrea. También se normaliza la puntuación final del discurso directo.
