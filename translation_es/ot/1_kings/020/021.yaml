translation:
  language: es
  text: Entonces el rey de Israel salió, golpeó a los caballos y a los carros, e infligió un gran golpe sobre Aram[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘sobre los arameos’; el hebreo ‘Aram’ puede referirse al reino o a sus fuerzas. Las versiones tradicionales en español suelen decir ‘Siria’, pero el nombre propio hebreo es Aram.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - fue y salió
  - marchó
  lexicon: HALOT
  rationale: יצא en la secuencia narrativa waw-consecutiva se expresa de forma natural como 'salió'. 'Marchó' añadiría una matización militar no explícita en el hebreo.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: the king of Israel
  chosen_spanish: el rey de Israel
  alternatives_spanish:
  - el monarca de Israel
  lexicon: HALOT
  rationale: Es una construcción nominal directa; 'rey' es la equivalencia normal y fiel en español.
- source_word: וַיַּךְ
  english_pob_choice: struck
  chosen_spanish: hirió
  alternatives_spanish:
  - golpeó
  - atacó
  - venció
  lexicon: HALOT
  rationale: נכה puede significar 'golpear/herir/derrotar'. En español, 'hirió' conserva el valor concreto del golpe sin resolver prematuramente el resultado militar.
- source_word: הַסּוּס
  english_pob_choice: the horses
  chosen_spanish: los caballos
  alternatives_spanish:
  - el caballo
  - la caballería
  lexicon: HALOT
  rationale: Aunque el hebreo usa singular morfológico, el sentido colectivo en contexto militar se expresa de modo natural en plural en español.
- source_word: הָרָכֶב
  english_pob_choice: the chariots
  chosen_spanish: los carros
  alternatives_spanish:
  - la caballería de carros
  - los carros de guerra
  lexicon: HALOT
  rationale: רכב en contexto bélico alude al carro/carroza de guerra; 'carros' es la forma breve y comprensible en español, sin perder el referente militar.
- source_word: וְהִכָּה
  english_pob_choice: inflicted
  chosen_spanish: infligió
  alternatives_spanish:
  - dio
  - hirió
  - asestó
  lexicon: HALOT
  rationale: La segunda ocurrencia de נכה funciona con el sustantivo cognado 'un gran golpe/derrota'. 'Infligió' en español reproduce bien esa construcción idiomática.
- source_word: בַאֲרָם
  english_pob_choice: on Aram
  chosen_spanish: sobre Aram
  alternatives_spanish:
  - contra Aram
  - sobre los arameos
  lexicon: HALOT
  rationale: Se conserva el nombre propio 'Aram' como en el hebreo, en lugar de sustituirlo por 'Siria'. La preposición 'sobre' refleja el resultado de la acción sobre el territorio/polidad/forces de Aram sin decidir exclusivamente entre nación o ejército.
- source_word: מַכָּה גְדוֹלָה
  english_pob_choice: a great blow
  chosen_spanish: una gran derrota
  alternatives_spanish:
  - un gran golpe
  - una gran matanza
  - una gran victoria
  lexicon: HALOT
  rationale: La expresión literal es 'golpe grande', pero en español bíblico natural el resultado militar se comunica mejor como 'gran derrota' sin añadir detalles no dichos. Se evita 'matanza' porque el texto no la especifica.
theological_decisions:
- issue: Referencia de Aram
  english_pob_reading: Aram may refer to the kingdom or its forces; traditional English versions often have 'Syria,' but the Hebrew proper name is Aram.
  chosen_spanish_reading: Aram se mantiene como nombre propio, sin reemplazarlo por 'Siria'.
  alternative_spanish_readings:
  - Siria
  - los arameos
  rationale: La decisión respeta el nombre hebreo y evita la sustitución tradicional que borra la forma del texto fuente. La ambigüedad entre reino, pueblo o fuerzas se mantiene abierta, como en el audit trail inglés.
  doctrine_reference: Fidelidad al nombre propio bíblico y preservación de la ambigüedad textual
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail inglés y no hubo revisiones aplicadas; el texto español conserva la misma lectura principal y la misma ambigüedad sobre Aram.
  spanish_consistency_notes:
  - Se mantuvo 'Aram' como nombre propio, coherente con la política POB frente a 'Siria'.
  - '''Hirió'' e ''infligió'' distinguen las dos ocurrencias de נכה, como en el inglés (''struck'' / ''inflicted'').'
  - '''Los caballos'' y ''los carros'' reflejan el valor colectivo militar del hebreo en español idiomático.'
