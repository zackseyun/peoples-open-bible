translation:
  language: es
  text: Por mandato de Yahvé acamparon, y por mandato de Yahvé partieron. Guardaron el encargo de Yahvé por mandato de Yahvé, por mano de Moisés[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «por mano de Moisés», un modismo que puede significar «por medio de Moisés» o «por Moisés como mediador».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל פִּי
  english_pob_choice: at the command of
  chosen_spanish: a la orden de
  alternatives_spanish:
  - por mandato de
  - según la orden de
  - al mandato de
  lexicon: HALOT
  rationale: El hebreo idiomático literalmente expresa algo como “sobre la boca de”, pero en contexto señala dirección autoritativa. “A la orden de” conserva la fuerza de mandato y suena natural en español bíblico contemporáneo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la pauta del proyecto para el nombre divino: “Yahvé” conserva el nombre del pacto sin sustituirlo por un título. “SEÑOR” ocultaría el dato textual del Tetragrámaton.'
- source_word: יַחֲנוּ
  english_pob_choice: they camped
  chosen_spanish: acampaban
  alternatives_spanish:
  - acamparon
  - se establecían en el campamento
  lexicon: HALOT
  rationale: El verbo refiere a acampar o establecerse en campamento. En este contexto continuo/serial, el imperfecto español “acampaban” comunica la acción habitual o repetida sin volverla demasiado puntual.
- source_word: יִסָּעוּ
  english_pob_choice: they set out
  chosen_spanish: partían
  alternatives_spanish:
  - se ponían en marcha
  - levantaban el campamento
  - salían
  lexicon: HALOT
  rationale: En el contexto del desierto, el verbo indica partir, ponerse en marcha o levantar el campamento. “Partían” es claro y mantiene el paralelismo con “acampaban”.
- source_word: מִשְׁמֶרֶת
  english_pob_choice: the charge
  chosen_spanish: la ordenanza
  alternatives_spanish:
  - la responsabilidad
  - el encargo
  - la custodia
  lexicon: HALOT
  rationale: Aquí el sustantivo designa algo confiado para observar y cumplir. “Ordenanza” mantiene un sentido de mandato/observancia apto para el contexto cultual y evita reducirlo solo a “deber” o “tarea”.
- source_word: שָׁמָרוּ
  english_pob_choice: they kept
  chosen_spanish: guardaban
  alternatives_spanish:
  - cumplían
  - observaban
  - guardaron
  lexicon: HALOT
  rationale: El verbo significa guardar, observar o cumplir. “Guardaban” preserva la idea de custodia obediente y encaja con “la ordenanza” y con la repetición del versículo.
- source_word: בְּיַד מֹשֶׁה
  english_pob_choice: by the hand of Moses
  chosen_spanish: por mano de Moisés
  alternatives_spanish:
  - por medio de Moisés
  - a través de Moisés
  - mediante Moisés
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática hebrea de agencia/mediación. “Por mano de Moisés” es transparente en español bíblico y mantiene el vínculo con la fórmula del texto fuente.
theological_decisions:
- issue: El nombre divino יְהוָה en un marco de mandato y dirección
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Mantener “Yahvé” preserva el nombre propio del Dios del pacto y evita borrar la repetición enfática de la fuente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: La expresión final ‘por mano de Moisés’ como mediación
  english_pob_reading: by the hand of Moses
  chosen_spanish_reading: por mano de Moisés
  alternative_spanish_readings:
  - por medio de Moisés
  - mediante Moisés
  rationale: La formulación conserva la metáfora hebrea de agencia y mediación sin explicitarla en el cuerpo del texto. Dado que la nota inglesa ya reconoce la idiomaticidad, el español mantiene la imagen y permite una lectura mediadora sin imponerla como paráfrasis.
  doctrine_reference: POB audit trail — lexical alternative for בְּיַד מֹשֶׁה
translation_notes:
  revision_awareness: El borrador sigue el veredicto de alta concordancia del auditor inglés y no introduce cambios sustantivos respecto de la lectura fuente. La principal decisión española es conservar el paralelismo de mandato con una expresión idiomática natural (“a la orden de”) y mantener la metáfora final (“por mano de Moisés”) con nota explicativa.
  spanish_consistency_notes:
  - Se mantiene “Yahvé” como forma estándar para יְהוָה, coherente con el proyecto.
  - Se usó “ordenanza” para מִשְׁמֶרֶת para conservar el valor de mandato observado, sin sustituirlo por un mero ‘deber’.
  - La estructura paralela del versículo se preserva en español con repetición deliberada de “a la orden de Yahvé”.
