  to: excepto Caleb hijo de Jefone; él la verá, y a él daré la tierra sobre la cual ha andado, y a sus hijos[a], porque ha seguido plenamente a Yahvé.
  rationale: Se mantiene casi todo el borrador por ser fiel y legible, pero se corrige el tiempo verbal final para reflejar mejor el perfecto hebreo y el audit trail inglés, y se mejora la nota sobre 'sus hijos' para que sea más idiomática y más alineada con la pauta de traducción de género preciso sin sobreexplicar en el texto principal.
