theological_decisions:
- issue: Whether to make explicit that the wrath is God's wrath
  chosen_reading: the wrath
  alternative_readings:
  - God's wrath
  - his wrath
  rationale: The context strongly implies divine wrath, but the Greek simply has ἡ ὀργή without an explicit possessive. The translation preserves the source wording and lets the context supply the referent.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: How strongly to render πεῖρα θανάτου in relation to the righteous
  chosen_reading: the testing of death also touched the righteous
  alternative_readings:
  - death's trial also came upon the righteous
  - even the righteous experienced death
  rationale: The verse states that the righteous were affected by the deadly event, but the following clause limits the duration of wrath. The chosen wording preserves the nuance of ordeal without implying that the righteous were simply destroyed in the same sense as the judged multitude.
  doctrine_reference: Original-language primacy over translation tradition; preserve theological tension rather than resolve it.
