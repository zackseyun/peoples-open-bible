translation:
  language: es
  text: Rescata a los que son llevados a la muerte[a], y a los que tambalean al matadero, detenlos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «y los que tambalean al matadero, si retienes» (o «no retengas»). Las últimas palabras son sintácticamente difíciles y pueden leerse con el versículo siguiente; el texto principal expresa el sentido probable en contexto.'
    reason: alternative_reading
lexical_decisions:
- source_word: הַצֵּל
  english_pob_choice: Rescue
  chosen_spanish: Rescata
  alternatives_spanish:
  - Libra
  - Salva
  lexicon: HALOT
  rationale: El imperativo de נצל exige intervención urgente y concreta. «Rescata» comunica bien la idea de sacar a alguien de un peligro inminente, sin perder el tono imperativo del hebreo.
- source_word: לְקֻחִים
  english_pob_choice: those being taken away
  chosen_spanish: los que son llevados
  alternatives_spanish:
  - los que son tomados
  - los cautivos
  lexicon: HALOT
  rationale: El participio pasivo expresa personas en proceso de ser conducidas o arrastradas. «Los que son llevados» conserva la idea de movimiento continuo hacia la muerte sin añadir la especificidad de «cautivos».
- source_word: לַמָּוֶת
  english_pob_choice: to death
  chosen_spanish: a la muerte
  alternatives_spanish:
  - hacia la muerte
  - para la muerte
  lexicon: HALOT
  rationale: La lamed señala destino o dirección. En español, «a la muerte» es natural y mantiene el valor direccional del hebreo.
- source_word: וּמָטִים
  english_pob_choice: those staggering
  chosen_spanish: los que vacilan
  alternatives_spanish:
  - los que tambalean
  - los que titubean
  lexicon: HALOT
  rationale: El participio de מוט sugiere inestabilidad, tambaleo o vacilación ante el peligro. «Vacilan» preserva la imagen de debilidad e inminencia sin volverla demasiado coloquial.
- source_word: לַהֶרֶג
  english_pob_choice: to the slaughter
  chosen_spanish: hacia la matanza
  alternatives_spanish:
  - a la matanza
  - al degüello
  - a la muerte violenta
  lexicon: HALOT
  rationale: הרג puede referirse a matar o dar muerte violenta. «Matanza» conserva la fuerza cruda del término y resulta más natural en español bíblico actual que una expresión demasiado técnica.
- source_word: אִם תַּחְשׂוֹךְ
  english_pob_choice: and hold back
  chosen_spanish: retenlos
  alternatives_spanish:
  - no los retengas
  - si los retienes
  lexicon: HALOT
  rationale: 'La cláusula final es sintácticamente difícil y puede relacionarse con el versículo siguiente. Siguiendo la lectura contextual de la POB inglesa, se vierte como una exhortación coordinada: «retenlos». Esto preserva el llamado moral del proverbio sin forzar el hebreo.'
theological_decisions:
- issue: Fuerza sintáctica de la cláusula final אִם תַּחְשׂוֹךְ
  english_pob_reading: 'Entendida idiomáticamente como continuación exhortativa: ''and hold back those staggering to the slaughter'''
  chosen_spanish_reading: 'Entendida idiomáticamente como exhortación continua: «retenlos»'
  alternative_spanish_readings:
  - «si los retienes»
  - «no los retengas»
  rationale: La ambigüedad del hebreo es real y debe mantenerse como parte del audit trail. En una línea aislada, el español fluido requiere explicitar el verbo de mandato implícito para no dejar la frase abrupta o confusa. La nota preserva la lectura alternativa y la posibilidad de enlace con el versículo siguiente.
  doctrine_reference: Principio de preservar tensiones textuales genuinas y reflejar ambigüedades sintácticas
- issue: Imagen de violencia en לַהֶרֶג
  english_pob_reading: to the slaughter
  chosen_spanish_reading: hacia la matanza
  alternative_spanish_readings:
  - a la matanza
  - a la muerte violenta
  rationale: La metáfora no debe suavizarse. «Matanza» mantiene el peso del sustantivo hebreo y el carácter urgente del mandato de rescate.
  doctrine_reference: Principio de no atenuar el contenido violento cuando el texto lo enfatiza
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el último estado inglés revisado, que hizo explícito el imperativo en la segunda mitad del verso para reflejar el paralelismo hebreo. En español se adoptó la misma estrategia: un primer mandato claro («Rescata») y un segundo mandato coordinado («retenlos»), mientras se conserva la dificultad sintáctica en la nota.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma normal del proyecto solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se prefirió «matanza» en lugar de «degüello» o «sacrificio» para conservar el sentido de muerte violenta sin introducir connotaciones ajenas.
  - «Vacilan» refleja la inestabilidad del participio hebreo sin forzar una imagen demasiado moderna como «tambalean» si se busca un registro algo más sobrio.
  - La puntuación reproduce dos miembros coordinados con imperativos, acorde con la lectura de la POB inglesa y con la sintaxis proverbial del verso.
