base_translation:
  language: en
  yaml_path: translation/ot/job/031/035.yaml
  text: Oh[a], that I had someone to hear me! Here is my signature; let the Almighty answer me[b], and let my accuser write out the indictment.
  footnotes:
  - marker: a
    text: Or 'my mark' or 'my sign.' The Hebrew likely refers to Job's attesting mark placed on his declaration.
    reason: lexical_alternative
  - marker: b
    text: Or 'and let the man of my dispute write a document.' The Hebrew is more literally 'and a scroll/document the man of my dispute wrote,' but in context it expresses Job's wish for a written charge from his accuser.
    reason: alternative_reading
