translation:
  language: es
  text: Cántico de ascenso. Levanto mis ojos a las montañas[a]; ¿de dónde vendrá mi ayuda?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las colinas».
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁיר
  english_pob_choice: A Song
  chosen_spanish: Cántico
  alternatives_spanish:
  - Un canto
  - Un salmo
  lexicon: HALOT
  rationale: שִׁיר nombra un ‘canto’ o ‘cántico’ en el encabezado. En español, «Cántico de las subidas» conserva el valor de título breve y solemne sin introducir la categoría más específica «salmo», que no está en la palabra hebrea.
- source_word: לַמַּעֲלוֹת
  english_pob_choice: of Ascents
  chosen_spanish: de las subidas
  alternatives_spanish:
  - para las subidas
  - de ascensos
  - de peregrinación
  lexicon: HALOT
  rationale: La frase plural de עלה puede referirse a subidas/ascensos. «De las subidas» sigue de cerca la forma y mantiene la ambigüedad histórica y litúrgica que el texto hebreo no resuelve.
- source_word: אֶשָּׂא
  english_pob_choice: I lift up
  chosen_spanish: Levanto
  alternatives_spanish:
  - Alzo
  - Levantaré
  lexicon: HALOT
  rationale: El imperfecto de נשׂא aquí expresa una acción vívida y poética. «Levanto» suena natural en español y preserva el presente poético mejor que una forma demasiado rígida o futurizada.
- source_word: עֵינַי
  english_pob_choice: my eyes
  chosen_spanish: mis ojos
  alternatives_spanish:
  - los ojos míos
  lexicon: HALOT
  rationale: Es una correspondencia directa y transparente del sustantivo con sufijo posesivo.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - sobre
  lexicon: HALOT
  rationale: Con un verbo de mirar o elevar la vista, «a las montañas» es la opción más natural en español y conserva la dirección del movimiento sin sobrecargar la frase.
- source_word: הֶהָרִים
  english_pob_choice: the mountains
  chosen_spanish: las montañas
  alternatives_spanish:
  - los montes
  - los cerros
  - las colinas
  lexicon: HALOT
  rationale: «Montañas» refleja mejor el peso léxico de הָרִים y sigue la decisión inglesa de no suavizar la imagen a «hills». «Montes» es una alternativa válida, pero menos transparente para lectura moderna.
- source_word: מֵאַיִן
  english_pob_choice: from where
  chosen_spanish: ¿de dónde
  alternatives_spanish:
  - ¿de adónde
  - ¿de dónde será
  lexicon: HALOT
  rationale: La expresión interrogativa pregunta por el origen de la ayuda. «¿De dónde» es la forma natural y clara en español contemporáneo.
- source_word: יָבֹא
  english_pob_choice: will come
  chosen_spanish: vendrá
  alternatives_spanish:
  - viene
  - puede venir
  lexicon: HALOT
  rationale: El imperfecto expresa aquí una venida prospectiva; «vendrá» mantiene esa orientación futura en una pregunta retórica fluida.
- source_word: עֶזְרִי
  english_pob_choice: my help
  chosen_spanish: mi ayuda
  alternatives_spanish:
  - mi socorro
  - mi auxilio
  lexicon: HALOT
  rationale: En este contexto, עֶזֶר se refiere a ayuda concreta y confiable. «Ayuda» es la opción más directa y natural en español, y conserva la amplitud semántica sin volver el verso demasiado formal.
theological_decisions:
- issue: Valor simbólico de las montañas
  english_pob_reading: Kept neutral as 'the mountains' without specifying whether they symbolize danger, pagan high places, or Zion
  chosen_spanish_reading: Se mantiene neutral como «las montañas», sin especificar su simbolismo
  alternative_spanish_readings:
  - las colinas como referencia a Sion
  - las montañas como lugar de peligro
  - las montañas como altares paganos
  rationale: El hebreo no determina el valor simbólico de las montañas en este versículo. Mantener la neutralidad evita añadir una interpretación que el texto no explicita y conserva la tensión poética que el versículo siguiente desarrolla.
  doctrine_reference: 'Translation philosophy §1 y §3: primacía del texto original y preservación de la tensión interpretativa.'
- issue: Forma del encabezado poético
  english_pob_reading: A Song of Ascents
  chosen_spanish_reading: Cántico de las subidas
  alternative_spanish_readings:
  - Un salmo de las subidas
  - Canto de ascenso
  rationale: El hebreo presenta un encabezado sucinto, no una frase explicativa. «Cántico de las subidas» respeta el carácter de título y evita expandir el sentido hacia una explicación litúrgica no explicitada en el verso.
  doctrine_reference: 'Translation philosophy §1: traducir desde la forma y el contenido del original sin sobreinterpretar.'
translation_notes:
  revision_awareness: 'Se revisó el encabezado poético y la segunda cola como pregunta retórica, en línea con el análisis inglés y el hebreo: no se resolvió el sentido de las montañas ni se convirtió la pregunta en una declaración. No hubo revisiones aplicadas adicionales en el expediente base.'
  spanish_consistency_notes:
  - Se mantuvo «Dios/Yahvé» como regla general del proyecto, pero este versículo no contiene ninguno de esos términos.
  - Se eligió «cántico» para el encabezado y no «salmo», porque el hebreo dice שִׁיר, no un término técnico de colección.
  - Se conservó la pregunta retórica final para reflejar la tensión del texto original.
  - La nota al pie ofrece la alternativa tradicional «colinas» sin alterar el texto principal.
