id: RUT.3.18
reference: Ruth 3:18
source:
  edition: WLC
  text: וַ/תֹּ֨אמֶר֙ שְׁבִ֣י בִתִּ֔/י עַ֚ד אֲשֶׁ֣ר תֵּֽדְעִ֔י/ן אֵ֖יךְ יִפֹּ֣ל דָּבָ֑ר כִּ֣י לֹ֤א יִשְׁקֹט֙ הָ/אִ֔ישׁ כִּֽי אִם כִּלָּ֥ה הַ/דָּבָ֖ר הַ/יּֽוֹם־־׃
translation:
  text: Then she said[a], “Wait, my daughter, until you learn how the matter will fall out[b], for the man will not rest unless he has settled the matter today.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “how the matter will turn out.” The Hebrew idiom is literally “how the matter will fall.”
    reason: lexical_alternative
  - marker: b
    text: “The man” refers to Boaz, though the Hebrew keeps the expression indefinite rather than naming him here.
    reason: cross_reference
lexical_decisions:
- source_word: שְׁבִי
  chosen: Wait
  alternatives:
  - Sit
  - Remain
  - Stay
  lexicon: HALOT
  rationale: Imperative of ישׁב literally means 'sit' or 'remain,' but in this context Naomi urges Ruth to stay put and wait for the outcome. 'Wait' best conveys the pragmatic force in natural English without over-paraphrasing.
- source_word: בִתִּי
  chosen: my daughter
  alternatives:
  - daughter
  lexicon: HALOT
  rationale: Retains Naomi's affectionate familial address. The possessive is explicit in Hebrew and should be preserved.
- source_word: תֵּדְעִין
  chosen: you learn
  alternatives:
  - you know
  - you find out
  lexicon: HALOT
  rationale: ידע can mean 'know' or 'come to know.' Here the sense is prospective—Ruth is to wait until the outcome becomes known to her. 'Learn' expresses that future acquisition of knowledge clearly.
- source_word: אֵיךְ יִפֹּל דָּבָר
  chosen: how the matter will fall out
  alternatives:
  - how the matter will turn out
  - how things will go
  lexicon: HALOT
  rationale: The idiom literally involves 'how a matter will fall.' 'Fall out' preserves the metaphor more closely than 'turn out' while remaining idiomatic English.
- source_word: הָאִישׁ
  chosen: the man
  alternatives:
  - the האיש = Boaz
  - he
  lexicon: HALOT
  rationale: Hebrew uses the definite noun 'the man,' referring contextually to Boaz. Translating it as 'the man' preserves the source wording and avoids importing the proper name where the text does not use it.
- source_word: יִשְׁקֹט
  chosen: will not rest
  alternatives:
  - will not be quiet
  - will not be still
  - will not be at ease
  lexicon: HALOT
  rationale: שׁקט here denotes refraining from inactivity until the issue is resolved. 'Will not rest' is idiomatic and captures Boaz's determined action.
- source_word: כִּי אִם
  chosen: unless
  alternatives:
  - except that
  - but rather until
  lexicon: HALOT
  rationale: The combination introduces the sole condition under which the man will rest. In English, 'unless' best captures the conditional-exceptive force.
- source_word: כִּלָּה
  chosen: he has settled
  alternatives:
  - he has finished
  - he has completed
  - he has brought to an end
  lexicon: HALOT
  rationale: כלה means to complete or finish. In this legal-relational context, 'settled' communicates completion of the pending matter in a way natural to English readers.
- source_word: הַדָּבָר
  chosen: the matter
  alternatives:
  - the thing
  - the affair
  - the case
  lexicon: HALOT
  rationale: דבר is broad, but here refers to the pending redemption/marriage issue. 'Matter' is suitably formal and contextually precise.
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: A straightforward temporal adverbial; 'today' is modern, readable English.
