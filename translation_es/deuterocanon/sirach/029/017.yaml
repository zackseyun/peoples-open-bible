translation:
  language: es
  text: Y quien es ingrato de corazón abandonará al que lo rescató[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego literalmente: «y uno ingrato en mente abandonará al que lo rescató». La expresión se refiere a una disposición interior.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀχάριστος
  english_pob_choice: ungrateful
  chosen_spanish: ingrato
  alternatives_spanish:
  - desagradecido
  - no agradecido
  lexicon: LSJ
  rationale: ἀχάριστος expresa falta de gratitud; «ingrato» comunica bien esa cualidad moral en español sin sonar forzado. «Desagradecido» es posible, pero «ingrato» resulta más natural y sobrio en un proverbio.
- source_word: ἐν διανοίᾳ
  english_pob_choice: in mind
  chosen_spanish: en su pensamiento
  alternatives_spanish:
  - en su mente
  - de pensamiento
  - en disposición
  lexicon: LSJ
  rationale: La frase señala la interioridad o disposición interior. En español, «en su pensamiento» conserva el matiz interno sin convertirlo en una glosa demasiado abstracta; mantiene visible la tensión entre estado interior y conducta.
- source_word: ἐγκαταλείψει
  english_pob_choice: will abandon
  chosen_spanish: abandonará
  alternatives_spanish:
  - dejará
  - desamparará
  - abandonará y dejará
  lexicon: LSJ
  rationale: El futuro de ἐγκαταλείψει lleva la idea de dejar atrás, abandonar o desamparar. «Abandonará» es la equivalencia más directa y fuerte en español.
- source_word: ῥυσάμενον
  english_pob_choice: the one who rescued him
  chosen_spanish: al que lo rescató
  alternatives_spanish:
  - al que lo salvó
  - al que lo libró
  - a su libertador
  lexicon: LSJ
  rationale: El participio de ῥύομαι indica rescatar o librar. «Rescató» es concreto y natural en español; «al que» hace explícita la referencia personal implícita en el griego.
theological_decisions:
- issue: Valor genérico del sujeto sin sustantivo explícito
  english_pob_reading: one who is ungrateful in mind
  chosen_spanish_reading: el ingrato en su pensamiento
  alternative_spanish_readings:
  - la persona ingrata en su pensamiento
  - quien es ingrato en su pensamiento
  rationale: El griego usa un adjetivo sustantivado implícito, con fuerza proverbial y genérica. «El ingrato» preserva esa concisión proverbial sin forzar una neutralización explicativa innecesaria; «en su pensamiento» mantiene la interioridad del juicio moral.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
translation_notes:
  revision_awareness: La revisión inglesa pasó de «an ungrateful man» a «one who is ungrateful in mind» para acercarse más a ἀχάριστος ἐν διανοίᾳ. La versión española conserva ese ajuste al reflejar tanto la cualidad moral («ingrato») como la interioridad («en su pensamiento»), sin convertir el proverbio en una paráfrasis extensa.
  spanish_consistency_notes:
  - Se emplea «rescató» para ῥύομαι, coherente con un acto personal de liberación/rescate.
  - Se conserva «abandonará» para ἐγκαταλείψει, evitando suavizar la fuerza del verbo.
  - La colocación «el ingrato» mantiene el tono proverbial y la genericidad del sujeto.
