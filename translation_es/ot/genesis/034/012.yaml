    issue: Uso de formas de 'vosotros' en lugar de español neutral
    rationale: «Exigid», «digáis» y «dadme» son correctos, pero no corresponden al objetivo de español neutral latinoamericano/broadly church-readable. Formas como «Exíjanme», «me digan» y «denme» son más adecuadas.
  - severity: medium
    issue: Ubicación ambigua de «muy grande»
    rationale: En «un precio de novia y un presente muy grande», el intensificador puede entenderse como referido solo a «presente». El hebreo intensifica la magnitud de la exigencia de מֹהַר וּמַתָּן en conjunto. Conviene reformular para que el alcance sea claro.
  - severity: low
    issue: Ligera mejora de naturalidad en la cláusula concesiva
    rationale: «Yo daré lo que me digáis» es fiel, pero «les daré lo que me digan» se integra mejor con el resto del registro neutral y con el complemento indirecto explícito en español.
  revised_spanish_text: Exíjanme un precio de novia[a] y un presente muy altos, y les daré lo que me digan; solo denme a la joven por esposa.
