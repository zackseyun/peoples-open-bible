theological_decisions:
- issue: Interpretation of the difficult opening simile וּכְחַכֵּי אִישׁ גְּדוּדִים
  chosen_reading: The verse compares the priests to violent ambushers/raiders lying in wait.
  alternative_readings:
  - The verse compares them to a single robber lying in wait.
  - The text may be corrupt or elliptical, yielding 'as robbers lie in wait for a man, so the company of priests murders on the way to Shechem.'
  rationale: The Hebrew is compressed and syntactically difficult. The chosen rendering preserves the main image of ambush and violence without overcommitting to a reconstructed text. This best fits optimal equivalence and the immediate accusation against the priests.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
