translation:
  language: es
  text: 'Y dijo[a]: «La gloria se ha apartado de Israel, porque ha sido tomada el arca de Dios[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La gloria ha ido al destierro desde Israel». El verbo hebreo puede sugerir ir al exilio o ser removido.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «pues el arca de Dios fue tomada».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  english_pob_choice: And she said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Entonces dijo
  - Y ella dijo
  lexicon: HALOT
  rationale: El waw narrativo avanza la acción; en español, «Y dijo» suena natural y conserva la continuidad narrativa sin añadir énfasis innecesario. Se omite el pronombre por estilo idiomático, ya que el referente femenino ya está claro en el contexto.
- source_word: גָּלָה
  english_pob_choice: has departed
  chosen_spanish: ha salido
  alternatives_spanish:
  - ha partido
  - ha ido al destierro
  - está en destierro
  lexicon: HALOT
  rationale: El hebreo puede implicar salida, remoción o ir al exilio. En español, «ha salido» mantiene la idea de alejamiento/remoción sin forzar una formulación más interpretativa como «ha ido al destierro», que intensifica demasiado la imagen.
- source_word: כָבוֹד
  english_pob_choice: the glory
  chosen_spanish: la gloria
  alternatives_spanish:
  - el honor
  - la honra
  lexicon: HALOT
  rationale: «La gloria» preserva el peso teológico del término y su relación con la presencia y honor divinos en el contexto inmediato. «Honor» o «honra» suenan más antropocéntricos y atenúan el eco bíblico del pasaje.
- source_word: מִיִּשְׂרָאֵל
  english_pob_choice: from Israel
  chosen_spanish: de Israel
  alternatives_spanish:
  - desde Israel
  - fuera de Israel
  lexicon: HALOT
  rationale: La preposición de separación se expresa de forma natural en español con «de Israel» en este contexto. «Desde Israel» o «fuera de Israel» resultarían menos idiomáticas o más marcadas.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón de la declaración; «porque» es claro y directo en español contemporáneo.
- source_word: נִלְקַח
  english_pob_choice: has been taken
  chosen_spanish: fue tomada
  alternatives_spanish:
  - ha sido tomada
  - la tomaron
  lexicon: HALOT
  rationale: El nifal es pasivo. «Fue tomada» conserva el pasivo y encaja con el estilo narrativo bíblico en español. «Ha sido tomada» suena más perfecto-resultativo; «la tomaron» desplaza el foco a un agente no expresado.
- source_word: אֲרוֹן הָאֱלֹהִים
  english_pob_choice: the ark of God
  chosen_spanish: el arca de Dios
  alternatives_spanish:
  - el arca de Dios mismo
  - el arca divina
  lexicon: HALOT
  rationale: La construcción hebrea se reproduce de manera directa y digna. «Arca» es el equivalente bíblico establecido; «de Dios» mantiene la forma del genitivo sin añadir especificación interpretativa.
theological_decisions:
- issue: Sentido de «la gloria» en relación con Israel y el arca
  english_pob_reading: '''The glory'' refers to the loss/removal of the manifested honor and presence associated with God among Israel, expressed without over-specifying a technical doctrine of presence.'
  chosen_spanish_reading: «La gloria» alude a la retirada de la honra/presencia manifiesta asociada con Dios entre Israel, sin definir de más una doctrina técnica de la presencia.
  alternative_spanish_readings:
  - «La gloria» como el honor nacional de Israel
  - «La gloria» como una referencia casi directa a Dios mismo alejándose
  rationale: El contexto inmediato vincula esta exclamación con la captura del arca, así que el término lleva una carga teológica real y no meramente política. Sin embargo, el versículo no define explícitamente una doctrina metafísica sobre la presencia divina en el arca; por eso la traducción conserva la tensión bíblica en vez de resolverla.
  doctrine_reference: Preservar la tensión teológica del texto sin sobreprecisar la doctrina de la presencia.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés muestran acuerdo alto y no requieren cambios de revisión adicionales. Se conservó la tensión léxica de גָּלָה con una nota alternativa, y se mantuvo el pasivo de נִלְקַח en una forma natural para el español.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece el Tetragrámaton; aquí el texto dice אֱלֹהִים, por eso se traduce «Dios».
  - Se mantiene «gloria» para כָבוֹד por consistencia con el uso bíblico-teológico del pasaje.
  - Se conserva el orden y el sentido narrativo del hebreo sin añadir sujetos o agentes no expresados.
