translation:
  language: es
  text: Prestaré atención al camino intachable; ¿cuándo vendrás a mí?[a] Andaré con integridad de corazón dentro de mi casa[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo dice: «¿cuándo vendrás a mí?». El sujeto no está explícito; muchos entienden esto como una dirección a Dios.'
    reason: alternative_reading
  - marker: b
    text: 'O: «Consideraré el camino de integridad» o «actuaré sabiamente en el camino intachable».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַשְׂכִּ֤ילָה
  english_pob_choice: I will give attention to
  chosen_spanish: Quiero prestar atención a
  alternatives_spanish:
  - Quiero considerar
  - Quiero obrar con prudencia respecto de
  - Quiero poner atención a
  lexicon: HALOT
  rationale: La forma de Hifil de שׂכל puede expresar actuar con prudencia o prestar atención con discernimiento. En español, «prestar atención a» comunica bien la intención volitiva y deliberada, sin reducirlo a reflexión mental abstracta.
- source_word: בְּדֶרֶךְ תָּמִים
  english_pob_choice: the blameless way
  chosen_spanish: el camino intachable
  alternatives_spanish:
  - el camino irreprochable
  - el camino de integridad
  - el camino perfecto
  lexicon: HALOT
  rationale: דֶּרֶךְ mantiene la metáfora de «camino», y תָּמִים apunta a integridad moral, no a perfección sin pecado. «Intachable» preserva el valor ético y resulta natural en español.
- source_word: מָתַי תָּבוֹא אֵלַי
  english_pob_choice: when will you come to me?
  chosen_spanish: ¿cuándo vendrás a mí?
  alternatives_spanish:
  - ¿cuándo vendrá a mí?
  - ¿cuándo vendrás hasta mí?
  lexicon: HALOT
  rationale: El verbo está en segunda persona masculina singular y el sujeto no está explícito. Mantener la segunda persona en español conserva la ambigüedad y la dirección del discurso, sin resolver en el texto principal si el sujeto es Dios.
- source_word: אֶתְהַלֵּךְ
  english_pob_choice: I will walk
  chosen_spanish: Andaré
  alternatives_spanish:
  - Me conduciré
  - Viviré
  - Caminaré
  lexicon: HALOT
  rationale: El hitpael de הלך puede referirse al modo de vida. «Andaré» conserva la metáfora bíblica de conducta y suena natural en español contemporáneo.
- source_word: בְּתָם לְבָבִי
  english_pob_choice: with integrity of heart
  chosen_spanish: con integridad de corazón
  alternatives_spanish:
  - con corazón íntegro
  - con sinceridad de corazón
  - con blamelessness of heart
  lexicon: HALOT
  rationale: תֹּם expresa integridad, sinceridad e inocencia; unido a «corazón» apunta a la interioridad moral. «Con integridad de corazón» retiene la fuerza ética y la imagen hebrea.
- source_word: בְּקֶרֶב בֵּיתִי
  english_pob_choice: within my house
  chosen_spanish: dentro de mi casa
  alternatives_spanish:
  - en medio de mi casa
  - en el seno de mi casa
  - dentro del ámbito de mi casa
  lexicon: HALOT
  rationale: בְּקֶרֶב literalmente es «en medio de», pero en español «dentro de mi casa» comunica de modo claro el ámbito doméstico sin forzar la expresión.
theological_decisions:
- issue: Sujeto implícito de «¿cuándo vendrás a mí?»
  english_pob_reading: Retain the second-person address without making the subject explicit in the main text.
  chosen_spanish_reading: Mantener la segunda persona en el texto principal sin explicitar el sujeto.
  alternative_spanish_readings:
  - Entender explícitamente que el sujeto es Dios
  - Reformular de modo impersonal respecto del camino intachable
  rationale: El hebreo usa un verbo en segunda persona singular, pero no nombra el sujeto. La lectura devocional probablemente se dirige a Dios, aunque el texto deja esa relación implícita. La traducción conserva esa tensión en lugar de resolverla de manera prematura.
  doctrine_reference: Preservar la tensión textual y no sobreinterpretar un sujeto no explícito.
translation_notes:
  revision_awareness: Se conserva la ambigüedad del sujeto implícito en la segunda cláusula y se mantiene la metáfora ética de «camino» y «andar» sin resolverla de forma explicativa en el texto principal.
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma implícita solo donde el contexto lo exigiera; en este versículo no aparece el nombre divino explícito.
  - Se prefirió «corazón» para לֵבָבִי por consistencia con el lenguaje bíblico español y para mantener la interioridad moral.
  - Se mantuvo la imaginería de camino y andar, coherente con el tono sapiencial-ético del hebreo.
