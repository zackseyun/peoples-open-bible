  text: And I will be a Father to you, and you will be sons and daughters to me, says the Lord Almighty.
  footnotes:
  - marker: a
    text: Or, more literally, 'I will be to you for a father, and you will be to me for sons and daughters.' The Greek expresses covenant relationship with an idiom that English normally smooths to 'be a Father to you' and 'be sons and daughters to me.'
    reason: lexical_alternative
translation:
