translation:
  language: es
  text: Y al cabo de un año[a], Nabucodonosor envió y lo trasladó[a] a Babilonia, junto con los vasos santos[b] del Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un año después». Además, el verbo griego de traslado también puede entenderse como «se lo llevó a Babilonia» o «lo deportó a Babilonia».
    reason: lexical_alternative
  - marker: b
    text: O «sagrados». El griego ἱεροῖς puede traducirse como «santos» o «sagrados».
    reason: lexical_alternative
lexical_decisions:
- source_word: μετ᾽ ἐνιαυτόν
  english_pob_choice: after a year
  chosen_spanish: al cabo de un año
  alternatives_spanish:
  - después de un año
  - un año después
  lexicon: LSJ
  rationale: La expresión temporal indica el paso de un año. «Al cabo de un año» suena natural en español y conserva la idea de transcurrido ese plazo, sin añadir información.
- source_word: ἀποστείλας
  english_pob_choice: sent
  chosen_spanish: lo hizo llevar
  alternatives_spanish:
  - envió y lo llevó
  - mandó traerlo
  lexicon: BDAG
  rationale: El participio aoristo introduce la acción preparatoria de enviar. En español, «lo hizo llevar» comunica la remoción resultante sin forzar una coordinación poco natural; mantiene la secuencia narrativa del griego.
- source_word: μετήγαγεν
  english_pob_choice: brought him away
  chosen_spanish: lo hizo llevar
  alternatives_spanish:
  - lo trasladó
  - lo llevó
  - lo arrebató
  lexicon: LSJ
  rationale: El verbo expresa traslado o remoción de un lugar a otro. «Lo hizo llevar» preserva ese movimiento hacia Babilonia y evita una interpretación excesivamente libre; «trasladó» sería posible, pero menos narrativo.
- source_word: ἅμα
  english_pob_choice: together with
  chosen_spanish: junto con
  alternatives_spanish:
  - al mismo tiempo que
  - en compañía de
  lexicon: LSJ
  rationale: Aquí introduce acompañamiento. «Junto con» es la equivalencia más clara y natural en español.
- source_word: τοῖς ἱεροῖς σκεύεσιν
  english_pob_choice: the holy vessels
  chosen_spanish: los vasos santos
  alternatives_spanish:
  - los vasos sagrados
  - los utensilios santos
  - los vasos del templo
  lexicon: LSJ
  rationale: «Vasos» reproduce bien σκεύη como recipientes/objetos cultuales. «Santos» mantiene el valor de ἱεροῖς sin sustituirlo por una paráfrasis más interpretativa como «del templo».
- source_word: τοῦ κυρίου
  english_pob_choice: of the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - de Yahvé
  - del Dueño
  lexicon: BDAG
  rationale: El griego tiene κυρίου y el audit trail inglés opta por «Lord». En español, «Señor» es el equivalente natural y conserva el término de respeto/divinidad sin introducir «Yahvé» donde el texto griego no lo explicita.
theological_decisions:
- issue: Tratamiento de κυρίου en un contexto deuterocanónico histórico
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor
  rationale: La fuente primaria es el griego κυρίου. Aunque el trasfondo hebreo pueda aludir al nombre divino, el versículo en su testimonio griego no exige marcar el tetragrámaton. «Señor» sigue fielmente el valor del audit trail inglés y la convención española natural.
  doctrine_reference: 'DOCTRINE.md contested terms: κύριος → Lord; יְהוָה → Yahvé'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto griego como ancla primaria y coincide sustancialmente con el audit trail inglés: marca el paso del tiempo, el traslado de la persona y la compañía de los vasos sagrados del Señor, sin añadir el nombre propio del rey donde el griego usa solo pronombre.'
  spanish_consistency_notes:
  - Se mantiene «Señor» para κυρίου conforme al criterio del proyecto en este pasaje griego.
  - «Vasos santos» conserva el registro cultual y evita modernizar innecesariamente a «utensilios» o «muebles».
  - La estructura narrativa española busca naturalidad sin perder la secuencia del participio y del verbo principal del griego.
