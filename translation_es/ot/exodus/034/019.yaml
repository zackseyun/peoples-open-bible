translation:
  language: es
  text: Todo primer nacido de la matriz me pertenece[b],[a] y todo primogénito macho entre tu ganado[c], sea toro o oveja.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «lo que abre la matriz».
    reason: lexical_alternative
  - marker: b
    text: 'O: «es mío».'
    reason: lexical_alternative
  - marker: c
    text: El hebreo especifica el macho primogénito entre el ganado.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  english_pob_choice: Every
  chosen_spanish: Todo
  alternatives_spanish:
  - Cada
  - Todo y cada uno
  lexicon: HALOT
  rationale: El hebreo distribuye la norma sobre cada caso incluido por las frases siguientes. En español, «Todo» conserva el alcance universal sin volver la frase forzada.
- source_word: פֶּטֶר רֶחֶם
  english_pob_choice: firstborn of the womb
  chosen_spanish: que abre la matriz
  alternatives_spanish:
  - primogénito del vientre
  - el que abre el vientre
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y literalmente significa «lo que abre la matriz». En español, «que abre la matriz» preserva el giro fuente y la imagen legal/cultual, mientras que «primogénito» se reserva para el sentido interpretativo ya explícito en la continuación y en el contexto de la legislación.
- source_word: לִי
  english_pob_choice: is mine
  chosen_spanish: me pertenece
  alternatives_spanish:
  - es mío
  - es para mí
  lexicon: HALOT
  rationale: La construcción expresa posesión o reclamo de propiedad. «Me pertenece» comunica bien la reivindicación de Yahvé sin perder la fuerza legal del hebreo.
- source_word: מִקְנְךָ
  english_pob_choice: your livestock
  chosen_spanish: tu ganado
  alternatives_spanish:
  - tus animales de cría
  - tu hacienda ganadera
  lexicon: HALOT
  rationale: El término abarca el conjunto del ganado poseído. «Tu ganado» es natural en español y suficientemente amplio para el contexto de la ley.
- source_word: תִּזָּכָר
  english_pob_choice: male firstborn
  chosen_spanish: macho
  alternatives_spanish:
  - varón
  - de sexo masculino
  lexicon: HALOT
  rationale: El hebreo aquí funciona en un entorno legal para precisar el sexo del primer nacido. En español, «macho» reproduce la distinción requerida en el marco zoológico de la frase y evita una paráfrasis excesiva.
- source_word: פֶּטֶר שׁוֹר וָשֶׂה
  english_pob_choice: firstborn among your livestock, whether ox or sheep
  chosen_spanish: primogénito macho entre tu ganado, sea toro o oveja
  alternatives_spanish:
  - primogénito macho de tu ganado, sea buey o oveja
  - primer macho de tu ganado, sea toro o cordero
  lexicon: HALOT
  rationale: 'La frase final especifica las categorías representativas del ganado: bovino y ovino. «Toro o oveja» mantiene la enumeración concreta y lectura natural en español; «primogénito macho» integra el sentido ya impuesto por la cláusula previa del texto hebreo y por la lectura auditada en inglés.'
theological_decisions:
- issue: Reclamo de posesión divina sobre los primogénitos
  english_pob_reading: The verse states that the firstborn belongs to the LORD without expanding the theology beyond the legal claim expressed here.
  chosen_spanish_reading: El versículo afirma que el primogénito pertenece a Yahvé, sin ampliar más allá del reclamo legal expresado.
  alternative_spanish_readings:
  - El versículo enseña la consagración de los primogénitos
  - El versículo habla solo de su elegibilidad para el sacrificio
  rationale: El hebreo presenta una afirmación de pertenencia/propiedad. La traducción conserva ese valor jurídico-covenantal sin introducir una explicación teológica posterior que el texto no desarrolla aquí.
  doctrine_reference: Éxodo 34:19; filosofía de traducción §1, §3
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés muestran alta concordancia y no registran cambios de revisión. La redacción española sigue esa lectura estable, preservando la tensión entre el modismo literal («abre la matriz») y su sentido legal («primogénito»).
  spanish_consistency_notes:
  - Se mantiene «Yahvé» según el estándar del proyecto para el nombre divino.
  - Se usa «matriz» para conservar el idiomatismo hebreo y evitar un suavizado interpretativo.
  - «Ganado» funciona como término colectivo amplio para מִקְנֶךָ, acorde con la lectura auditada.
  - Las notas a pie de página mantienen alternativas verdaderamente documentadas sin duplicar marcadores.
