translation:
  language: es
  text: Y se hizo una tienda[a] en la azotea de su casa, y se puso saco[b] alrededor de la cintura, y sobre ella estaban las vestiduras de su viudez.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el terrado»; el griego se refiere al espacio plano y utilizable de la parte superior de la casa.
    reason: lexical_alternative
  - marker: b
    text: El saco era una tela áspera usada como signo de duelo, humillación o aflicción.
    reason: cultural_note
lexical_decisions:
- source_word: σκηνὴν
  english_pob_choice: tent
  chosen_spanish: tienda
  alternatives_spanish:
  - tienda de campaña
  - carpa
  - choza
  lexicon: LSJ
  rationale: σκηνήν designa una estructura tipo tienda o refugio temporal. En español, «tienda» mantiene la correspondencia directa y suena natural en un registro bíblico; «tienda de campaña» explicaría de más y «carpa» resultaría menos solemne.
- source_word: ἐπὶ τοῦ δώματος
  english_pob_choice: on the roof
  chosen_spanish: en la azotea
  alternatives_spanish:
  - sobre el techo
  - en el terrado
  - sobre la azotea
  lexicon: LSJ
  rationale: δώμα aquí se refiere al espacio utilizable del techo plano. «Azotea» comunica bien esa realidad arquitectónica en español moderno y conserva la idea del lugar superior de la casa.
- source_word: σάκκον
  english_pob_choice: sackcloth
  chosen_spanish: saco
  alternatives_spanish:
  - cilicio
  - tela áspera de luto
  - saco de penitencia
  lexicon: LSJ
  rationale: σάκκος es el tejido áspero asociado con duelo y humillación. En español bíblico, «saco» conserva el valor material y simbólico sin introducir la connotación más técnica de «cilicio», que puede sugerir otra práctica ascética.
- source_word: ἐπὶ τὴν ὀσφὺν αὐτῆς
  english_pob_choice: around her waist
  chosen_spanish: alrededor de la cintura
  alternatives_spanish:
  - sobre sus lomos
  - en torno a su cintura
  - sobre la cintura
  lexicon: LSJ
  rationale: ὀσφύς literalmente alude a la zona de la cintura/riñones. «Alrededor de la cintura» expresa con claridad el gesto de ceñirse el saco y evita un calco poco natural como «lomos».
- source_word: τὰ ἱμάτια τῆς χηρεύσεως αὐτῆς
  english_pob_choice: the garments of her widowhood
  chosen_spanish: las vestiduras de su viudez
  alternatives_spanish:
  - las ropas de su viudez
  - las prendas de su viudez
  - las vestiduras de su condición de viuda
  lexicon: LSJ
  rationale: La frase conserva un tono formal y nominal que señala el estado social de viuda. «Vestiduras de su viudez» sigue de cerca la estructura del griego y mantiene el matiz de condición/status más que una simple descripción emotiva.
- source_word: ἦν ἐπʼ αὐτῆς
  english_pob_choice: were upon her
  chosen_spanish: estaban sobre ella
  alternatives_spanish:
  - estaban puestas sobre ella
  - las llevaba puestas
  - la cubrían
  lexicon: LSJ
  rationale: 'El griego presenta una construcción estática: las vestiduras «estaban sobre ella». «Estaban sobre ella» conserva esa literalidad sobria y evita convertir la frase en una paráfrasis más interpretativa como «las llevaba puestas».'
translation_notes:
  revision_awareness: El texto español sigue de cerca el griego de Swete y armoniza con el audit trail inglés sin depender mecánicamente de él. Se conserva la imagen concreta de una tienda en la azotea, el saco ceñido a la cintura y las vestiduras asociadas a la viudez, sin suavizar el valor ritual y social de la vestimenta.
  spanish_consistency_notes:
  - Se mantuvo «Y» inicial para reflejar la coordinación narrativa del griego.
  - «Azotea» funciona aquí como equivalente natural de δώμα en una casa de techo plano; se dejó una nota alternativa para «terrado».
  - Se evitó «SEÑOR» u այլ terminología no pertinente; el versículo no contiene referencias explícitas al nombre divino.
  - «Vestiduras» preserva el registro más formal que «ropas» y mantiene la resonancia de estado/condición.
  - La construcción «estaban sobre ella» conserva el aspecto estativo del griego.
