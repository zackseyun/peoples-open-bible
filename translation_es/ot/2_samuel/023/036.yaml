lexical_decisions:
- source_word: יִגְאָ֤ל
  english_pob_choice: Igal
  chosen_spanish: Igal
  alternatives_spanish:
  - Jigal
  lexicon: Nombre propio (transliteración estándar)
  rationale: Se conserva el nombre propio sin traducir; en español, 'Igal' es una transliteración natural y coherente con la forma inglesa adoptada por POB.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - el hijo de
  lexicon: Uso genealógico hebreo
  rationale: En una lista genealógica o militar, 'hijo de' reproduce de manera directa y natural el marcador relacional hebreo.
- source_word: נָתָן
  english_pob_choice: Nathan
  chosen_spanish: Natán
  alternatives_spanish:
  - Nathan
  lexicon: Nombre propio (transliteración estándar)
  rationale: Se usa la forma española usual 'Natán', equivalente al nombre propio hebreo y transparente para lectores en español.
- source_word: מִצֹּבָה
  english_pob_choice: from Zobah
  chosen_spanish: de Zobá
  alternatives_spanish:
  - desde Zobá
  - de Soba
  lexicon: HALOT; valor locativo del prefijo מִן
  rationale: El inglés POB opta por el sentido geográfico directo ('from Zobah'); en español, 'de Zobá' expresa de manera natural origen o procedencia sin forzar una perífrasis más pesada.
- source_word: בָּנִי
  english_pob_choice: Bani
  chosen_spanish: Bani
  alternatives_spanish:
  - Baní
  lexicon: Nombre propio (transliteración estándar)
  rationale: Se mantiene el nombre propio como transliteración. 'Bani' sigue de cerca la forma inglesa de POB y es reconocible en español bíblico.
- source_word: הַגָּדִי
  english_pob_choice: the Gadite
  chosen_spanish: el gadita
  alternatives_spanish:
  - el de Gad
  - el hombre de Gad
  lexicon: HALOT; gentilicio tribal
  rationale: El gentilicio hebreo se vierte de forma concisa como 'el gadita', conservando el valor étnico/tribal que tiene en la lista.
