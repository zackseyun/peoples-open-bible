    issue: «día de reposo» para הַשַּׁבָּת
    rationale: Aunque comunica una idea relacionada, introduce una paráfrasis interpretativa donde el hebreo nombra específicamente «el sábado / el Sabbath». En esta superinscripción conviene mayor literalidad.
  - severity: low
    issue: Nota alternativa poco alineada con la auditoría inglesa
    rationale: La nota inglesa conserva la alternativa estructural «A psalm, a song for the day of the Sabbath». En español, la alternativa correspondiente sería «para el día del sábado», no hacer de «sábado» la mera alternativa de «día de reposo».
