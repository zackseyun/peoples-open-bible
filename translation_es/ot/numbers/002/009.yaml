translation:
  language: es
  text: Todos los registrados para el campamento de Judá fueron 186.400, por sus divisiones. Se pondrán en marcha primero.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: כָּל
  english_pob_choice: All
  chosen_spanish: Todos
  alternatives_spanish:
  - El total de
  - Todos los
  lexicon: HALOT
  rationale: En español, 'Todos' conserva la fuerza inclusiva del hebreo y funciona de modo natural en una fórmula de censo.
- source_word: הַפְּקֻדִים
  english_pob_choice: those counted
  chosen_spanish: los contados
  alternatives_spanish:
  - los numerados
  - los registrados
  - los alistados
  lexicon: HALOT
  rationale: '''פָּקַד'' en este contexto remite a un censo/muster; ''los contados'' es fiel, claro y no añade ''hombres'' que el verso no explicita.'
- source_word: לְמַחֲנֵה
  english_pob_choice: for the camp of
  chosen_spanish: para el campamento de
  alternatives_spanish:
  - del campamento de
  - pertenecientes al campamento de
  lexicon: HALOT
  rationale: '''Campamento'' comunica bien el contexto de marcha y orden militar del pasaje; ''para'' refleja la relación de pertenencia/conjunto del hebreo.'
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judah
  lexicon: HALOT
  rationale: Transliteración estándar al español del nombre tribal.
- source_word: מְאַת אֶלֶף וּשְׁמֹנִים אֶלֶף וְשֵׁשֶׁת אֲלָפִים וְאַרְבַּע מֵאוֹת
  english_pob_choice: 186,400
  chosen_spanish: '186.400'
  alternatives_spanish:
  - ciento ochenta y seis mil cuatrocientos
  - 186,400
  lexicon: HALOT
  rationale: La cifra total debe conservarse exactamente; en español editorial es más natural usar punto como separador de miles.
- source_word: לְצִבְאֹתָם
  english_pob_choice: by their divisions
  chosen_spanish: por sus divisiones
  alternatives_spanish:
  - según sus compañías
  - por sus ejércitos
  - por sus huestes
  lexicon: HALOT
  rationale: '''Divisiones'' reproduce la organización ordenada del campamento sin cargar el texto con un matiz militar excesivo; ''por'' refleja la preposición funcional del hebreo.'
- source_word: רִאשֹׁנָה
  english_pob_choice: first
  chosen_spanish: primero
  alternatives_spanish:
  - en primer lugar
  lexicon: HALOT
  rationale: Adverbio de orden en español, natural en el contexto de la marcha.
- source_word: יִסָּעוּ
  english_pob_choice: They shall set out
  chosen_spanish: saldrán
  alternatives_spanish:
  - se pondrán en marcha
  - levantará el campamento
  - partirán
  lexicon: HALOT
  rationale: '''נסע'' en contexto de campamento expresa el inicio de la marcha; ''saldrán'' es breve y natural en español. Mantiene la lectura de orden de salida sin sobredetallar.'
theological_decisions:
- issue: Orden de marcha del campamento como forma de organización comunitaria
  english_pob_reading: They shall set out first.
  chosen_spanish_reading: Saldrán primero.
  alternative_spanish_readings:
  - Se pondrán en marcha primero.
  - Levantará el campamento primero.
  rationale: 'No hay tensión doctrinal, pero sí una decisión de sentido: el hebreo describe prioridad de salida en el orden del campamento. ''Saldrán primero'' conserva esa prioridad de manera directa y publicable.'
  doctrine_reference: Nm 2:9; contexto narrativo-litúrgico del orden tribal
translation_notes:
  revision_awareness: He corregido el problema de validación eliminando notas al pie no ancladas. La traducción mantiene el total numérico exacto y una formulación española natural sin agregar glosas innecesarias.
  spanish_consistency_notes:
  - Conservo 'Judá' como nombre tribal estándar en español.
  - Uso 'campamento' y no 'campamento militar' para no añadir un matiz no explícito en el verso, aunque el contexto sea de orden militar.
  - Mantengo la cifra con punto de miles por convención editorial española.
  - '''Saldrán primero'' refleja el valor adverbial de רִאשֹׁנָה y el movimiento de נסע sin sobretraducción.'
