translation:
  language: es
  text: cuando hizo firmes los cielos[a] en lo alto, cuando las fuentes del abismo[b] se volvieron fuertes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las nubes»; שְׁחָקִים también puede entenderse más ampliamente como «los cielos» o «los cielos altos» en este contexto de creación.
    reason: lexical_alternative
  - marker: b
    text: O «cuando Dios hizo fuertes las fuentes del abismo»; el hebreo puede entenderse como que las fuentes del abismo se volvieron fuertes o como que Dios las fortaleció.
    reason: alternative_reading
lexical_decisions:
- source_word: בְּאַמְּצוֹ
  english_pob_choice: when he made ... firm
  chosen_spanish: cuando hizo firmes
  alternatives_spanish:
  - cuando fortaleció
  - cuando estableció
  lexicon: HALOT
  rationale: 'El infinitivo con prefijo temporal introduce una cláusula de tiempo: «cuando». El verbo אמץ expresa la idea de hacer fuerte o firme; en español, «hizo firmes» mantiene esa fuerza sin sonar artificioso.'
- source_word: שְׁחָקִים
  english_pob_choice: the skies
  chosen_spanish: los cielos
  alternatives_spanish:
  - las nubes
  - los cielos altos
  lexicon: HALOT
  rationale: En este contexto de creación, שְׁחָקִים puede referirse al ámbito elevado del cielo. «Los cielos» es una opción natural y amplia en español, compatible con la amplitud semántica del hebreo.
- source_word: מִמָּעַל
  english_pob_choice: above
  chosen_spanish: de arriba
  alternatives_spanish:
  - arriba
  - en lo alto
  lexicon: HALOT
  rationale: La expresión indica ubicación superior. «De arriba» funciona de forma idiomática en español y conserva la relación espacial con «los cielos».
- source_word: בַּעֲזֹז
  english_pob_choice: became strong
  chosen_spanish: se volvieron fuertes
  alternatives_spanish:
  - se hicieron fuertes
  - fueron fortalecidas
  - se afirmaron
  lexicon: HALOT
  rationale: La forma verbal aquí se entiende mejor en paralelo temporal con la primera cola. Dado que el sujeto son las fuentes del abismo, «se volvieron fuertes» conserva el valor resultativo sin forzar una voz causal explícita.
- source_word: עִינוֹת
  english_pob_choice: the fountains
  chosen_spanish: las fuentes
  alternatives_spanish:
  - los manantiales
  - las fuentes de agua
  lexicon: HALOT
  rationale: עינות denota fuentes o manantiales. «Las fuentes» es formal, breve y suficientemente preciso en español.
- source_word: תְּהוֹם
  english_pob_choice: the deep
  chosen_spanish: el abismo
  alternatives_spanish:
  - la profundidad
  - el océano primigenio
  - las profundidades
  lexicon: HALOT
  rationale: תְּהוֹם remite al abismo acuoso primordial. «El abismo» preserva ese valor cósmico mejor que una referencia meramente geográfica.
theological_decisions:
- issue: La cláusula puede leerse como acción divina o como cambio de estado de las fuentes del abismo.
  english_pob_reading: The Hebrew can be taken either as the deep's springs becoming strong or as God making them strong.
  chosen_spanish_reading: 'Se deja la lectura de cambio de estado: «las fuentes del abismo se volvieron fuertes».'
  alternative_spanish_readings:
  - cuando Dios fortaleció las fuentes del abismo
  - cuando hizo fuertes las fuentes del abismo
  rationale: El hebreo admite una ambigüedad real entre un resultado intransitivo y una causación explícita. En español se conserva la tensión con una formulación resultativa, sin resolver prematuramente la voz del verbo.
  doctrine_reference: Proverbios 8:28; nota auditada de alternativa lexical en la POB inglesa.
- issue: El término שְׁחָקִים puede abarcar cielo, nubes o la región alta del firmamento.
  english_pob_reading: '''Skies'' may also be rendered ''clouds'' or ''heavens,'' depending on how broadly שְׁחָקִים is understood in this creation context.'
  chosen_spanish_reading: «Los cielos» mantiene la amplitud del término sin limitarlo a nubes.
  alternative_spanish_readings:
  - las nubes
  - los cielos altos
  - el firmamento
  rationale: En el contexto de creación, «los cielos» comunica mejor la amplitud semántica del hebreo y conserva la posibilidad de entender el término en sentido amplio, como hace la POB inglesa.
  doctrine_reference: Proverbios 8:28; nota lexical de la POB inglesa.
translation_notes:
  revision_awareness: 'La versión inglesa más reciente ajustó ''springs'' a ''fountains'' y ''grew strong'' a ''became strong''. Esta redacción española sigue esa línea: usa «fuentes» y una forma resultativa («se volvieron fuertes») para reflejar más directamente el hebreo sin perder naturalidad.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma por defecto en el proyecto solo cuando aparece el nombre divino; este verso no lo contiene.
  - Se evitó «SEÑOR» y también «cielos» como sustitución devocional cerrada; aquí «los cielos» traduce el sustantivo hebreo con amplitud semántica.
  - Se mantuvo el registro sobrio y poético, adecuado a Proverbios 8.
