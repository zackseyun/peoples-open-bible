translation:
  language: es
  text: vestidos de azul[a], gobernadores y dirigentes[c], todos ellos jóvenes deseables[b], jinetes a caballo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vestidos de violeta» o «vestidos de púrpura azulada», porque תְכֵלֶת puede denotar una tela teñida de azul o azul-violeta.
    reason: lexical_alternative
  - marker: b
    text: O «jóvenes apuestos» o «jóvenes escogidos»; el hebreo subraya el atractivo juvenil.
    reason: lexical_alternative
  - marker: c
    text: «Dirigentes» también puede verterse «delegados» o «prefectos».
    reason: lexical_alternative
lexical_decisions:
- source_word: לְבֻשֵׁי
  english_pob_choice: clothed in
  chosen_spanish: vestidos de
  alternatives_spanish:
  - clothed in
  - ataviados de
  lexicon: HALOT
  rationale: El participio pasivo describe su indumentaria; en español, «vestidos de» transmite con naturalidad el valor adjetival y la idea de estar cubiertos por esa prenda o color.
- source_word: תְכֵלֶת
  english_pob_choice: blue
  chosen_spanish: azul
  alternatives_spanish:
  - violeta
  - azul-violeta
  - púrpura azulada
  lexicon: HALOT
  rationale: La palabra puede abarcar un tinte azul o azul-violeta. «Azul» es la opción más clara y pública, sin perder la referencia al color/dye señalado por el texto.
- source_word: פַּחוֹת
  english_pob_choice: governors
  chosen_spanish: gobernadores
  alternatives_spanish:
  - gobernadores provinciales
  - sátrapas
  lexicon: HALOT
  rationale: Designa altos funcionarios gobernantes; «gobernadores» comunica bien el cargo sin imponer una precisión técnica mayor que la que exige el hebreo.
- source_word: וּסְגָנִים
  english_pob_choice: officials
  chosen_spanish: oficiales
  alternatives_spanish:
  - deputados
  - prefectos
  - gobernantes subordinados
  lexicon: HALOT
  rationale: El término apunta a subordinados de alto rango. «Oficiales» conserva la amplitud semántica y evita una equivalencia administrativa demasiado específica.
- source_word: בַּח֥וּרֵי חֶמֶד
  english_pob_choice: desirable young men
  chosen_spanish: jóvenes deseables
  alternatives_spanish:
  - jóvenes apuestos
  - jóvenes escogidos
  lexicon: HALOT
  rationale: La expresión combina juventud con atractivo/deseabilidad. «Jóvenes deseables» preserva esa fuerza descriptiva y el matiz erótico del pasaje.
- source_word: כֻּלָּם
  english_pob_choice: all of them
  chosen_spanish: todos ellos
  alternatives_spanish:
  - todos
  lexicon: HALOT
  rationale: El sufijo pronominal merece reflejarse explícitamente; «todos ellos» reproduce mejor el énfasis colectivo que un simple «todos».
- source_word: פָּרָשִׁים
  english_pob_choice: horsemen
  chosen_spanish: jinetes
  alternatives_spanish:
  - hombres de a caballo
  - caballeros
  lexicon: HALOT
  rationale: Es el término normal para combatientes montados. «Jinetes» es idiomático en español y conserva la imagen del texto.
- source_word: רֹכְבֵי סוּסִים
  english_pob_choice: riding horses
  chosen_spanish: montados en caballos
  alternatives_spanish:
  - cabalgando caballos
  - montando caballos
  lexicon: HALOT
  rationale: La frase participial refuerza que van sobre caballos. «Montados en caballos» sigue de cerca el hebreo y suena natural en español.
translation_notes:
  revision_awareness: Se verificó el pasaje frente al texto hebreo consonántico/masorético y el audit trail inglés; no se detectaron revisiones textuales relevantes ni cambios pendientes en la tradición POB inglesa. La redacción española sigue de cerca la sintaxis y mantiene las ambigüedades léxicas documentadas.
  spanish_consistency_notes:
  - Se emplea un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - Se conservó la tensión léxica de תְכֵלֶת mediante una nota alternativa sobre la gama azul-violeta.
  - «Jóvenes deseables» mantiene la fuerza del hebreo sin suavizar el matiz de atracción.
  - No se introdujo terminología eclesiástica ajena al contexto militar y cortesano del versículo.
