review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien el contraste inicial, el plural «reyes» y el sentido político de πίστις como «lealtad». Sin embargo, «estaban guardando» suena poco natural en español para φυλάσσοντες con objetos abstractos, y el orden «lealtad y benevolencia firmes» debilita ligeramente la pareja semántica del griego, donde εὔνοια precede a πίστις. Además, «benevolencia» es posible, pero «buena voluntad» refleja mejor εὔνοια en español eclesial general sin sonar rígido.
  spanish_quality_summary: El texto es comprensible, pero no del todo idiomático. «Estaban guardando» es una perífrasis torpe en este contexto; «mantenían» fluye mejor y sigue de cerca el valor aspectual/lexical. «Buena voluntad y lealtad inquebrantables» suena más natural, claro y digno que «una lealtad y benevolencia firmes».
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La decisión clave πίστις -> «lealtad» está bien alineada con la auditoría inglesa. La revisión propuesta ajusta εὔνοια a «buena voluntad» por claridad idiomática y φυλάσσοντες a «mantenían» por naturalidad, sin cambiar el sentido fuente.
  issues:
  - severity: medium
    issue: «estaban guardando» para φυλάσσοντες
    rationale: Aunque literal, en español moderno suena forzado con sustantivos abstractos como «buena voluntad» y «lealtad». «Mantenían» o «conservaban» expresa mejor el sentido de conservar/seguir teniendo estas actitudes.
  - severity: medium
    issue: «benevolencia» como equivalente principal de εὔνοια
    rationale: Es semánticamente defendible, pero menos natural y menos transparente que «buena voluntad» en un registro bíblico legible para un público amplio.
  - severity: low
    issue: Orden y estructura de la pareja nominal
    rationale: El griego presenta primero εὔνοια y luego πίστις; conviene preservar ese orden en español. Además, quitar el artículo indefinido evita una formulación más pesada de lo necesario.
  revised_spanish_text: Pero los judíos mantenían una buena voluntad y lealtad inquebrantables hacia los reyes;
  revision_rationale: 'La revisión conserva el sentido exacto del griego y del POB inglés, pero mejora la legibilidad y la naturalidad del español: «mantenían» refleja mejor φυλάσσοντες; «buena voluntad» comunica εὔνοια con más claridad que «benevolencia»; y «inquebrantables» expresa con precisión el valor de ἀδιάστροφον como constancia no desviada. También se restituye el orden semántico del original: buena voluntad antes que lealtad.'
