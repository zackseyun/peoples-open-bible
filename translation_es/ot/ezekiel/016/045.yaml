review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y sentido del hebreo y sigue de cerca las decisiones del POB en inglés: conserva la acusación por linaje, la repetición de געל con fuerza emocional, el sentido conyugal de אִישׁ/אַנְשֵׁי, y el cierre metafórico sobre madre hitita y padre amorreo. Sin embargo, en español el uso de ''sus hijos'' no preserva tan bien como debería la decisión auditada de ''children'' frente a ''sons''; además, el predicado étnico final queda más natural y claro con verbo expreso en la segunda cláusula.'
  spanish_quality_summary: El español es legible y digno, pero requiere un ajuste menor para mayor fidelidad semántica y mejor naturalidad. 'Aborrecía/aborrecían' funciona, aunque algo elevado; puede mantenerse. La frase 'y tu padre amorreo' es comprensible, pero en español suena más limpia y plenamente idiomática con 'era'. El principal problema es 'hijos', que en este contexto puede leerse demasiado masculino donde el POB documentó intencionalmente un sentido inclusivo.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías, Espíritu, etc. La revisión propuesta mantiene las decisiones léxicas del POB y mejora la correspondencia de וּבָנֶיהָ / וּבְנֵיהֶן con 'children' mediante 'hijos e hijas' o 'hijos' inclusivo explicitado; aquí conviene explicitar para evitar ambigüedad en español.
  issues:
  - severity: medium
    issue: '''sus hijos'' estrecha potencialmente el sentido inclusivo de וּבָנֶיהָ / וּבְנֵיהֶן'
    rationale: El POB inglés eligió 'children' precisamente para no limitar el referente a varones. Aunque 'hijos' puede ser genérico en español, hoy introduce más ambigüedad y puede percibirse como masculino específico. 'Sus hijos e hijas' preserva mejor la intención auditada sin alejarse del hebreo.
  - severity: low
    issue: '''y tu padre amorreo'' suena elíptico de forma algo dura en español'
    rationale: La elipsis del verbo es posible, pero menos natural en español contemporáneo que en inglés. 'Y tu padre era amorreo' mantiene el paralelismo y mejora la fluidez sin pérdida de tersura profética.
  revised_spanish_text: Tú eres la hija de tu madre[a], que aborrecía a su esposo y a sus hijos e hijas; y eres la hermana de tus hermanas, que aborrecían a sus esposos y a sus hijos e hijas. Tu madre era hitita, y tu padre era amorreo.
  revised_footnotes:
  - marker: a
    text: O "despreciaba" / "detestaba" para el verbo hebreo געל, que expresa fuerte repulsión.
    reason: lexical_alternative
  revision_rationale: Se conserva el sentido y la estructura del original, pero se corrige 'hijos' a 'hijos e hijas' para reflejar mejor la decisión documentada del POB de no restringir בנים a varones. También se explicita 'era' en la segunda cláusula final para mejorar la naturalidad del español sin afectar la fuerza del texto.
