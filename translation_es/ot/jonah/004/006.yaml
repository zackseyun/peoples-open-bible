translation:
  language: es
  text: Y Yahvé Dios designó una planta de qiqayón[a], y creció sobre Jonás para hacer sombra sobre su cabeza, para librarlo de su malestar. Y Jonás se alegró por la planta de qiqayón con gran alegría.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo qiqayón, una planta de identificación incierta; tradicionalmente «vid», y a veces identificada como planta de ricino.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְמַן
  english_pob_choice: appointed
  chosen_spanish: designó
  alternatives_spanish:
  - dispuso
  - apuntó
  - preparó
  lexicon: HALOT
  rationale: En el contexto de Jonás, el verbo expresa una acción soberana y deliberada de Dios sobre los elementos narrativos. «Designó» comunica esa intención eficaz mejor que un simple «proveyó», y evita la asociación técnica que podría tener «preparó» en español bíblico tradicional.
- source_word: יְהוָה אֱלֹהִים
  english_pob_choice: Yahweh God
  chosen_spanish: Yahvé Dios
  alternatives_spanish:
  - el Señor Dios
  - Yahvé, Dios
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé» según el estándar del proyecto, sin sustituirlo por un título. La combinación con אֱלֹהִים se vuelve naturalmente «Yahvé Dios» en español.
- source_word: קִיקָיוֹן
  english_pob_choice: qiqayon plant
  chosen_spanish: planta de qiqayón
  alternatives_spanish:
  - qiqayón
  - planta
  - planta de ricino
  lexicon: HALOT
  rationale: El hebreo nombra una planta de identificación incierta. Se mantiene la transliteración «qiqayón» para no perder la particularidad léxica y se añade «planta de» para claridad. «Planta de ricino» sería demasiado identificadora, pues corresponde solo a una propuesta interpretativa.
- source_word: וַיַּעַל
  english_pob_choice: it grew up
  chosen_spanish: subió
  alternatives_spanish:
  - creció
  - brotó
  - se levantó
  lexicon: HALOT
  rationale: El verbo literalmente expresa subida/emergencia. «Subió» conserva mejor esa imagen que «creció», aunque el contexto vegetal permite entender la aparición ascendente de la planta. En la estructura española, el sujeto «ésta» evita la monotonía.
- source_word: מֵעַל לְיוֹנָה
  english_pob_choice: over Jonah
  chosen_spanish: sobre Jonás
  alternatives_spanish:
  - encima de Jonás
  - por encima de Jonás
  lexicon: HALOT
  rationale: «Sobre Jonás» reproduce de forma natural la relación espacial y prepara la función de sombra en la cláusula siguiente.
- source_word: לִהְיוֹת צֵל עַל רֹאשׁוֹ
  english_pob_choice: to be a shade over his head
  chosen_spanish: para hacer sombra sobre su cabeza
  alternatives_spanish:
  - para ser sombra sobre su cabeza
  - para estar en sombra sobre su cabeza
  lexicon: HALOT
  rationale: En español, «hacer sombra» expresa de manera idiomática la función de צֵל. Se mantiene «sobre su cabeza» para reflejar el hebreo y la imagen concreta del resguardo.
- source_word: לְהַצִּיל לוֹ מֵרָעָתוֹ
  english_pob_choice: to deliver him from his discomfort
  chosen_spanish: para librarlo de su malestar
  alternatives_spanish:
  - para salvarlo de su aflicción
  - para rescatarlo de su angustia
  - para aliviarlo de su dolor
  lexicon: HALOT
  rationale: רָעָה aquí no debe traducirse como «mal» moral, sino como la situación penosa de Jonás bajo el sol. «Malestar» conserva ese valor físico/situacional. «Librarlo» mantiene la fuerza de הציל sin forzar un matiz estrictamente soteriológico.
- source_word: וַיִּשְׂמַח ... שִׂמְחָה גְדוֹלָה
  english_pob_choice: rejoiced ... with great joy
  chosen_spanish: se alegró ... con gran alegría
  alternatives_spanish:
  - se regocijó ... con gran gozo
  - gozó ... con gran alegría
  lexicon: HALOT
  rationale: La construcción hebrea usa un cognado para intensificar la idea. «Se alegró ... con gran alegría» conserva esa repetición enfática en español, sin elevar el registro a fórmulas más eclesiásticas que el hebreo no exige.
theological_decisions:
- issue: Cómo rendir el nombre divino יְהוָה en este versículo
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - el Señor
  rationale: El texto hebreo contiene el Tetragrama directamente, por lo que se mantiene el nombre propio del pacto en español. No se usa una máscara litúrgica como «SEÑOR», en coherencia con el criterio del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de מֵרָעָתוֹ en el contexto narrativo
  english_pob_reading: from his discomfort
  chosen_spanish_reading: de su malestar
  alternative_spanish_readings:
  - de su mal
  - de su aflicción
  - de su angustia
  rationale: Aunque la raíz רעה puede abarcar mal, calamidad o aflicción, aquí el contexto inmediato es el alivio físico producido por la sombra. «Malestar» evita una lectura moralizante y conserva la tensión semántica que el relato permite.
  doctrine_reference: HALOT, entrada רָעָה; contexto narrativo de Jonás 4:6
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin traducir mecánicamente: se preservó la incertidumbre botánica de קִיקָיוֹן, la fuerza deliberada de וַיְמַן, el nombre divino como Yahvé y el valor contextual de רָעָה como malestar físico. No se incorporaron cambios de revisión posteriores porque el expediente indica alta concordancia y sin cambios necesarios.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma del nombre divino, coherente con el estándar del proyecto.
  - Se prefirió «Jonás» para el nombre del profeta, con ortografía española habitual.
  - Se conservó la transliteración «qiqayón» para la planta incierta y se marcó con nota de pie de página.
  - «Hacer sombra» se eligió por naturalidad idiomática en español y por fidelidad funcional a צֵל.
  - La repetición enfática del hebreo se reflejó con «se alegró... con gran alegría» en lugar de una simplificación estilística.
