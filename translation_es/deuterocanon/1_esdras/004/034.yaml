translation:
  language: es
  text: Hombres, ¿no son fuertes las mujeres? Grande es la tierra, y alto es el cielo, y veloz en su carrera[a] es el sol[b], porque gira en el círculo del cielo y otra vez corre de regreso a su propio lugar en un día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'veloz en su curso'; la frase griega presenta al sol moviéndose rápidamente a lo largo de su recorrido.
    reason: lexical_alternative
  - marker: b
    text: El versículo usa lenguaje observacional ordinario sobre el movimiento diario del sol.
    reason: cultural_note
lexical_decisions:
- source_word: Ἄνδρες
  english_pob_choice: Men
  chosen_spanish: Hombres
  alternatives_spanish:
  - ¡Hombres!
  - Varones
  lexicon: LSJ
  rationale: El vocativo plural conserva la forma retórica de la apelación directa. 'Hombres' reproduce el género explícito del griego sin suavizarlo, y encaja de manera natural en español.
- source_word: ἰσχυραὶ
  english_pob_choice: strong
  chosen_spanish: fuertes
  alternatives_spanish:
  - poderosas
  - robustas
  lexicon: LSJ
  rationale: El adjetivo expresa fuerza o capacidad. 'Fuertes' es la equivalencia más directa y natural en español para mantener el contraste argumentativo del versículo.
- source_word: γυναῖκες
  english_pob_choice: women
  chosen_spanish: mujeres
  alternatives_spanish:
  - esposas
  lexicon: LSJ
  rationale: El sentido ordinario es 'mujeres'; no hay indicio inmediato para restringirlo a 'esposas'. 'Mujeres' preserva el alcance amplio del término.
- source_word: μεγάλη
  english_pob_choice: Great
  chosen_spanish: Grande
  alternatives_spanish:
  - Vasta
  - Amplia
  lexicon: LSJ
  rationale: Como predicado retórico, 'Grande' conserva tanto tamaño como solemnidad, más fielmente que un simple 'grande' en sentido meramente dimensional o un término más interpretativo.
- source_word: γῆ
  english_pob_choice: earth
  chosen_spanish: tierra
  alternatives_spanish:
  - mundo
  - globo
  lexicon: LSJ
  rationale: En el paralelismo cósmico con 'cielo' y 'sol', γῆ puede expresarse naturalmente como 'tierra' en español, manteniendo el campo semántico general del mundo creado.
- source_word: ὑψηλὸς
  english_pob_choice: high
  chosen_spanish: alto
  alternatives_spanish:
  - elevado
  - encumbrado
  lexicon: LSJ
  rationale: En referencia al cielo, 'alto' es la versión más llana y precisa. Evita elevar el tono a un registro demasiado literario sin perder la imagen espacial.
- source_word: οὐρανός
  english_pob_choice: heaven
  chosen_spanish: cielo
  alternatives_spanish:
  - cielos
  lexicon: LSJ
  rationale: Aquí el contexto es cosmológico/observacional, no específicamente doctrinal; por eso 'cielo' comunica bien la esfera visible del firmamento y evita una posible lectura exclusivamente teológica de 'cielo' como morada divina.
- source_word: ταχὺς τῷ δρόμῳ
  english_pob_choice: swift in its course
  chosen_spanish: veloz en su carrera
  alternatives_spanish:
  - rápido en su curso
  - veloz en su curso
  lexicon: LSJ
  rationale: La frase dativa describe el movimiento del sol. 'Veloz en su carrera' conserva la imagen de desplazamiento rápido con un español natural, sin perder la metáfora dinámica del griego.
- source_word: ἥλιος
  english_pob_choice: sun
  chosen_spanish: sol
  alternatives_spanish:
  - astro solar
  lexicon: LSJ
  rationale: Es el equivalente directo y más natural. No requiere tecnicismo, y mantiene el lenguaje observacional del texto.
- source_word: στρέφεται
  english_pob_choice: turns
  chosen_spanish: se vuelve
  alternatives_spanish:
  - gira
  - se da vuelta
  lexicon: LSJ
  rationale: '''Se vuelve'' conserva el sentido de cambio de dirección/rotación sin imponer un término demasiado técnico. Además acompaña bien la frase siguiente del movimiento circular.'
- source_word: κύκλῳ
  english_pob_choice: circle
  chosen_spanish: círculo
  alternatives_spanish:
  - circuito
  - vuelta
  lexicon: LSJ
  rationale: '''Círculo'' es el correlato más directo del sustantivo griego y mantiene la imaginería cosmológica del pasaje.'
- source_word: ἀποτρέχει
  english_pob_choice: runs back
  chosen_spanish: corre de regreso
  alternatives_spanish:
  - regresa
  - vuelve corriendo
  lexicon: LSJ
  rationale: El compuesto expresa un movimiento de retorno con vivacidad. 'Corre de regreso' conserva la energía verbal y la imagen de desplazamiento rápido mejor que un simple 'regresa'.
- source_word: τόπον
  english_pob_choice: place
  chosen_spanish: lugar
  alternatives_spanish:
  - sitio
  - posición
  lexicon: LSJ
  rationale: '''Lugar'' es la equivalencia más clara y natural para el término general τόπον, sin añadir matices técnicos.'
- source_word: ἐν μιᾷ ἡμέρᾳ
  english_pob_choice: in one day
  chosen_spanish: en un día
  alternatives_spanish:
  - dentro de un solo día
  lexicon: LSJ
  rationale: La frase temporal se traduce de modo directo y natural. 'En un día' preserva la sencillez observacional del griego.
theological_decisions:
- issue: Lenguaje cosmológico sobre el movimiento del sol
  english_pob_reading: Retain the phenomenological description ('turns,' 'runs back') as observational language
  chosen_spanish_reading: Conservar la descripción fenomenológica ('se vuelve', 'corre de regreso') como lenguaje observacional
  alternative_spanish_readings:
  - Reformularlo con lenguaje astronómico moderno sobre movimiento aparente
  - Suavizarlo a una expresión más abstracta
  rationale: El griego habla en términos visuales y cotidianos del curso del sol. La traducción mantiene esa retórica sin corregirla ni reemplazarla por categorías científicas posteriores.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó el artículo antes de 'heaven' para sonar más natural ('high is heaven'). En español se optó directamente por 'alto es el cielo', sin artículo definido, manteniendo la naturalidad y la correspondencia con el registro observacional del original. No se requirieron otros ajustes de la revisión.
  spanish_consistency_notes:
  - Se conserva 'tierra/cielo/sol' como trío cósmico paralelo, acorde con el griego.
  - Se evita 'SEÑOR' o terminología teológica ajena al pasaje, porque aquí οὐρανός es firmamento/cielo cosmológico.
  - '''Fuertes'' mantiene el valor de ἰσχυραὶ sin introducir una paráfrasis interpretativa.'
  - La puntuación reproduce la secuencia retórica de preguntas y afirmaciones del original.
