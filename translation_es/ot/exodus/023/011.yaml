review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general del hebreo y del POB en inglés: año séptimo, cese del cultivo, provisión para los pobres, resto para los animales, y aplicación a viña y olivos. Sin embargo, hay un desajuste relevante en la referencia pronominal de los verbos con sufijo femenino singular, que apuntan a la tierra. En español, «lo dejarás… lo abandonarás» introduce un masculino ambiguo; debe ser «la dejarás… la abandonarás» para concordar con «la tierra» implícita del contexto previo.'
  spanish_quality_summary: El texto es claro y natural, con buen registro bíblico moderno. La sintaxis fluye bien. La principal reparación es la concordancia pronominal femenina. Además, la nota a) debe ajustarse a femenino por la misma razón. El resto del español es legible y digno.
  glossary_alignment: 'No hay términos del glosario mayor en juego aquí. Las decisiones léxicas principales están bien encaminadas: «pobres», «viña», «olivos». «Animales del campo» es aceptable, aunque menos explícito que «animales salvajes del campo»; la nota literal compensa esa suavización.'
  issues:
  - severity: high
    issue: Pronombres masculinos para un antecedente femenino implícito
    rationale: Los sufijos hebreos en תִּשְׁמְטֶנָּה y וּנְטַשְׁתָּהּ son femeninos singulares y remiten a la tierra del versículo anterior. En español, «lo dejarás reposar… lo abandonarás» no preserva esa referencia; debe ser «la dejarás reposar… la abandonarás».
  - severity: medium
    issue: Nota a) también usa masculino inconsistente
    rationale: La alternativa «lo soltarás y lo abandonarás» repite la incongruencia de género. Debe reflejar «la» para corresponder a «la tierra» implícita.
  - severity: low
    issue: «Animales del campo» atenúa el matiz de חית השדה
    rationale: La expresión hebrea suele referirse a animales salvajes. No exige cambio obligatorio porque la nota literal está presente y el contexto lo deja entender, pero «animales salvajes del campo» sería más explícito.
