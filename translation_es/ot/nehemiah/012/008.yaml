translation:
  language: es
  text: Y los levitas eran Jesúa, Binuí, Cadmiel, Serebías, Judá y Matanías, quien, con sus hermanos, estaba a cargo de los cantos de acción de gracias[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «él y sus hermanos estaban a cargo de los cantos de acción de gracias»; el hebreo puede entenderse de manera más colectiva, aunque el singular se refiere más naturalmente a Matanías.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְהַלְוִיִּם
  english_pob_choice: And the Levites were
  chosen_spanish: Y los levitas eran
  alternatives_spanish:
  - Y los levitas fueron
  - 'Y los levitas:'
  lexicon: HALOT
  rationale: El hebreo abre una cláusula nominal en una enumeración; en español, ‘eran’ hace natural la identificación del grupo sin añadir interpretación innecesaria. Mantiene el valor conjuntivo e introductorio del texto.
- source_word: יֵשׁוּעַ בִּנּוּי קַדְמִיאֵל שֵׁרֵבְיָה יְהוּדָה מַתַּנְיָה
  english_pob_choice: Jeshua, Binnui, Kadmiel, Sherebiah, Judah, and Mattaniah
  chosen_spanish: Jesúa, Binuí, Cadmiel, Serebías, Judá y Matanías
  alternatives_spanish:
  - Jesúa, Binnuí, Cadmiel, Serebías, Judá y Matanías
  lexicon: Nombres propios transliterados según uso bíblico en español
  rationale: Son nombres propios; se transliteran al español estándar sin traducirlos. Se conserva la secuencia del listado y se adapta la ortografía a formas legibles en español bíblico.
- source_word: עַל
  english_pob_choice: over
  chosen_spanish: estaba a cargo de
  alternatives_spanish:
  - sobre
  - responsable de
  - encargado de
  lexicon: HALOT
  rationale: El valor aquí es de supervisión o responsabilidad cultual. ‘Estaba a cargo de’ expresa claramente la función sin sonar forzado en español y sin perder el matiz administrativo-litúrgico.
- source_word: הֻיְּדוֹת
  english_pob_choice: the thanksgiving songs
  chosen_spanish: las acciones de gracias
  alternatives_spanish:
  - los cantos de acción de gracias
  - las alabanzas de acción de gracias
  - los himnos de agradecimiento
  lexicon: HALOT
  rationale: El sustantivo alude a expresiones litúrgicas de agradecimiento/alabanza. En español, ‘acciones de gracias’ conserva el campo semántico de gratitud ritual sin imponer de manera innecesaria la imagen de ‘cantos’, que el hebreo aquí no exige explícitamente.
- source_word: הוּא
  english_pob_choice: who ... was
  chosen_spanish: quien ... estaba
  alternatives_spanish:
  - él ... estaba
  - que ... estaba
  lexicon: HALOT
  rationale: El singular apunta de manera más natural a Matanías como el último nombre del listado, y en español ‘quien’ reproduce bien la función relativa del hebreo dentro de la cláusula.
- source_word: וְאֶחָיו
  english_pob_choice: with his brothers
  chosen_spanish: con sus hermanos
  alternatives_spanish:
  - y sus hermanos
  - junto con sus hermanos
  lexicon: HALOT
  rationale: Se mantiene el sentido asociativo y el parentesco masculino del hebreo. ‘Con sus hermanos’ suena natural en español y preserva la idea de colaboración en la tarea.
theological_decisions:
- issue: Referente del pronombre singular הוּא después de una lista plural
  english_pob_reading: The singular refers specifically to Mattaniah, the last named Levite, who together with his brothers oversaw the thanksgiving songs.
  chosen_spanish_reading: El singular se entiende específicamente de Matanías, el último levita nombrado, quien con sus hermanos estaba a cargo de las acciones de gracias.
  alternative_spanish_readings:
  - El singular podría referirse de modo colectivo a los levitas nombrados.
  - El pronombre podría leerse como una referencia general al grupo, sin individualizar a Matanías.
  rationale: El hebreo pasa del plural del listado al singular, y la lectura más natural es individualizar a Matanías. Sin embargo, se conserva la posibilidad colectiva en nota para no borrar la leve tensión sintáctica del original.
  doctrine_reference: Preservar la tensión sintáctica del texto sin sobrearmonizarla; la decisión sigue el principio de la POB de mantener la lectura más natural y dejar constancia de la alternativa.
translation_notes:
  revision_awareness: La redacción sigue de cerca el audit trail inglés revisado, especialmente la decisión de mantener la referencia singular a Matanías y de traducir el término cultual con una expresión breve y natural en español. Se evita mecanizar el inglés ‘thanksgiving songs’ cuando el hebreo puede comunicar una función litúrgica más amplia.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando el hebreo lo requiera explícitamente; este versículo no contiene el nombre divino.
  - Se mantiene ‘levitas’ como nombre de grupo y se transliteran los nombres propios bíblicos de forma estándar.
  - ‘Acciones de gracias’ conserva el plural abstracto del sustantivo hebreo y permite la posible lectura cultual sin añadir ‘cantos’ al texto principal.
