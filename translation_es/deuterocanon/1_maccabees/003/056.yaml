review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido básico del griego: enumera correctamente las cuatro categorías exentas y conserva el mandato indirecto de regresar a casa conforme a la ley. Sin embargo, la colocación de las notas no sigue bien el contenido documentado del rastro inglés: la nota sobre «conforme a la ley» está anclada en «una casa» en vez de en la frase legal, y la nota léxica sobre δειλοῖς está anclada en «su casa» en vez de en «los temerosos». Además, «los desposados con mujeres» suena menos natural y algo ambiguo en español contemporáneo eclesial; una forma como «los que están comprometidos para casarse con mujeres» o «los prometidos a mujeres» expresa mejor la fuerza de μνηστευομένοις sin sugerir necesariamente que ya están casados.'
  spanish_quality_summary: El español es generalmente claro y digno, pero necesita un ajuste menor para naturalidad y para la disciplina de notas. «Los desposados con mujeres» suena algo rígido y puede leerse como ya casados; «los prometidos a mujeres» conserva mejor el valor de desposorio/betrothal en un español más inteligible. También conviene simplificar la sintaxis con «que cada uno vuelva» para que el mandato indirecto quede más natural.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. «Conforme a la ley» está bien para κατὰ τὸν νόμον. «Los temerosos» es una opción válida y prudentemente abierta para δειλοῖς, siempre que la nota alternativa se ancle allí. «Viñas» es aceptable para ἀμπελῶνας, aunque «viñedos» también sería posible; no es necesario cambiarlo.
  issues:
  - severity: medium
    issue: Las notas al pie están ancladas en palabras equivocadas.
    rationale: La nota [a] explica «conforme a la ley» pero está colocada tras «una casa»; la nota [b] ofrece alternativas para δειλοῖς pero está colocada tras «su casa». Esto incumple la disciplina requerida de marcar la nota en la palabra o frase relevante.
  - severity: medium
    issue: «Los desposados con mujeres» es poco natural y potencialmente ambiguo en español actual.
    rationale: Aunque intenta preservar el matiz jurídico de μνηστευομένοις, puede sonar arcaico o como si ya fueran esposos. «Los prometidos a mujeres» conserva mejor el sentido de compromiso matrimonial previo al matrimonio y sigue siendo digno y legible.
  - severity: low
    issue: La construcción verbal puede fluir mejor con «que cada uno vuelva».
    rationale: El subjuntivo exhortativo en mandato indirecto se entiende en el borrador, pero añadir «que» lo hace más natural en español sin alterar el sentido.
  revised_spanish_text: Y dijo que los que edifican una casa, y los prometidos a mujeres, y los que plantan viñas, y los temerosos[b], que cada uno vuelva a su casa, conforme a la ley[a].
  revised_footnotes:
  - marker: a
    text: La expresión «conforme a la ley» probablemente alude a las exenciones para la guerra de Deuteronomio 20:5–8.
    reason: cross_reference
  - marker: b
    text: O «los tímidos» o «los cobardes» para «los temerosos».
    reason: lexical_alternative
  revision_rationale: Se corrigen los anclajes de las notas para que correspondan a las frases pertinentes, se mejora la naturalidad de μνηστευομένοις con «los prometidos a mujeres», y se suaviza el mandato indirecto con «que cada uno vuelva», manteniendo intacto el sentido del griego y la racionalidad del POB inglés.
