base_translation:
  language: en
  yaml_path: translation/ot/zephaniah/002/015.yaml
  text: This is the exultant city that dwelt securely[a], that said in her heart, ‘I am, and there is none besides me.’ How she has become a desolation[b], a resting place for wild animals! Everyone who passes by her will hiss and shake his hand.
  footnotes:
  - marker: a
    text: Or, “an object of horror.” The Hebrew term can include the sense of appalling devastation, not only physical desolation.
    reason: lexical_alternative
  - marker: b
    text: Or, “will whistle.” The Hebrew verb can denote a sharp sound of astonishment or derision.
    reason: lexical_alternative
