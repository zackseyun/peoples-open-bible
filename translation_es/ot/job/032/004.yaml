translation:
  language: es
  text: Entonces Eliú había esperado para hablarle a Job[a], porque ellos eran mayores que él en días[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «Eliú esperó a Job en palabras»; el sentido es que esperó para hablarle a Job.
    reason: lexical_alternative
  - marker: b
    text: 'O: «porque ellos eran mayores que él en edad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וֶאֱלִיהוּ
  english_pob_choice: Now Elihu
  chosen_spanish: Entonces Eliú
  alternatives_spanish:
  - Y Eliú
  - Ahora Eliú
  lexicon: HALOT
  rationale: La conjunción waw al inicio marca avance narrativo; en español, «Entonces» da continuidad natural al relato sin perder el cambio de escena hacia Eliú.
- source_word: חִכָּה
  english_pob_choice: had waited
  chosen_spanish: había esperado
  alternatives_spanish:
  - esperó
  - había aguardado
  lexicon: HALOT
  rationale: El verbo expresa esperar o tardar antes de tomar la palabra. El pluscuamperfecto conserva el trasfondo narrativo previo a la acción principal, como en el inglés POB.
- source_word: אֶת אִיּוֹב בִּדְבָרִים
  english_pob_choice: to speak to Job
  chosen_spanish: para hablarle a Job
  alternatives_spanish:
  - para hablar con Job
  - para dirigirse a Job
  lexicon: HALOT
  rationale: La construcción hebrea es idiomática y no conviene traducirla de manera mecánica. El sentido contextual es que Eliú esperaba la oportunidad de hablarle a Job; por eso se explicita el verbo «hablarle».
- source_word: בִּדְבָרִים
  english_pob_choice: to speak
  chosen_spanish: hablarle
  alternatives_spanish:
  - hablar
  - decir palabras
  lexicon: HALOT
  rationale: Literalmente es «en palabras», pero el español natural y fiel al contexto exige expresar la acción verbal subyacente. «Hablarle» conserva la relación con Job y evita una frase opaca.
- source_word: זְקֵנִים הֵמָּה
  english_pob_choice: they were older
  chosen_spanish: ellos eran más viejos
  alternatives_spanish:
  - eran mayores
  - eran de más edad
  lexicon: HALOT
  rationale: Aquí el adjetivo compara edad, no oficio. «Más viejos» refleja la comparación de manera directa; «mayores» sería también posible, pero menos explícito en el registro elegido.
- source_word: מִמֶּנּוּ לְיָמִים
  english_pob_choice: than he in days
  chosen_spanish: que él en días
  alternatives_spanish:
  - que él en edad
  - que él por días
  lexicon: HALOT
  rationale: Se conserva el giro hebreo «en días», que funciona como idiomático de edad. La expresión suena un poco semítica, pero es transparente y preserva el color del original.
translation_notes:
  revision_awareness: Se siguió de cerca el hebreo de WLC y se mantuvo la solución del POB inglés para la construcción idiomática de חִכָּה + אֶת + בִּדְבָרִים. No se detectaron cambios relevantes en la revisión más reciente; el pasaje permanece en alto acuerdo con el audit trail inglés.
  spanish_consistency_notes:
  - Se usa «Eliú» para el nombre propio y «Job» sin adaptación adicional.
  - Se mantuvo el orden narrativo con «Entonces» para corresponder al waw inicial sin volverlo un mero enlace mecánico.
  - La frase «en días» se preserva deliberadamente como eco idiomático del hebreo, mientras que la nota ofrece la paráfrasis de sentido «en edad».
