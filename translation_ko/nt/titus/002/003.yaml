id: TIT.2.3
reference: Titus 2:3
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Πρεσβύτιδας ὡσαύτως ἐν καταστήματι ἱεροπρεπεῖς, μὴ διαβόλους ⸀μηδὲ οἴνῳ πολλῷ δεδουλωμένας, καλοδιδασκάλους,
base_translation:
  language: en
  yaml_path: translation/nt/titus/002/003.yaml
  text: Older women likewise are to be reverent in behavior[a], not slanderers nor enslaved to much wine, teachers of what is good[b],
  footnotes:
  - marker: a
    text: Or 'not false accusers' or 'not malicious gossips.' The Greek word here is related to the term often rendered 'devil,' but in this context it means slanderous people.
    reason: lexical_alternative
  - marker: b
    text: Or 'nor addicted to much wine.' The Greek more literally says 'having been enslaved to much wine.'
    reason: lexical_alternative
translation:
  language: ko
  text: 마찬가지로 나이 많은 여자들도 행실에서 거룩함에 합당해야 하며, 비방하는 자[a]가 되지 않고 많은 술에 매이지[b] 않으며 선한 것을 가르치는 자가 되어야 합니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「거짓 고발하는 자」, 「악의적으로 험담하는 자」. 헬라어 διάβολος는 흔히 「마귀」로 옮겨지나, 본문에서는 비방하는 사람을 가리킨다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「많은 술에 중독되지 않으며」. 헬라어는 문자적으로 「많은 술에 노예가 되어 있지 않으며」라고 말한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πρεσβύτιδας ὡσαύτως
  english_pob_choice: Older women likewise
  chosen_korean: 마찬가지로 나이 많은 여자들도
  alternatives_korean:
  - 같은 모양으로 나이 많은 여자들도
  - 늙은 여자들도 그같이
  lexicon: BDAG
  rationale: 2:2의 「나이 많은 남자들」과 짝지어 일관성 유지.
- source_word: ἐν καταστήματι ἱεροπρεπεῖς
  english_pob_choice: reverent in behavior
  chosen_korean: 행실에서 거룩함에 합당해야
  alternatives_korean:
  - 태도에서 거룩함에 어울려야
  - 처신에서 신성한 일에 합당해야
  lexicon: BDAG
  rationale: ἱεροπρεπής는 「거룩한 일/거룩한 자에 합당한」. 단순 「경건」보다 거룩함과의 어울림을 살리는 어구가 더 정확하다. κατάστημα는 「태도·처신」.
- source_word: διαβόλους
  english_pob_choice: slanderers
  chosen_korean: 비방하는 자
  alternatives_korean:
  - 험담하는 자
  - 중상하는 자
  lexicon: BDAG
  rationale: διάβολος의 본뜻은 「비방하는 자」. 신약 다른 곳에서는 「마귀」로 인격화되나, 본문에서는 형용사적 일반 용례.
- source_word: οἴνῳ πολλῷ δεδουλωμένας
  english_pob_choice: enslaved to much wine
  chosen_korean: 많은 술에 매이지 않으며
  alternatives_korean:
  - 많은 술에 종이 되지 않으며
  - 많은 술에 중독되지 않으며
  lexicon: BDAG
  rationale: δουλόω 완료 수동(이미 노예가 된 상태). 「매이다」가 한국어로 자연스러우면서도 매임의 강한 어감을 보존한다. 「노예」로 옮기면 글로서리 충돌(δοῦλος vs δοῦλος-동사형) 위험.
- source_word: καλοδιδασκάλους
  english_pob_choice: teachers of what is good
  chosen_korean: 선한 것을 가르치는 자
  alternatives_korean:
  - 좋은 것을 가르치는 자
  - 선한 교사
  lexicon: BDAG
  rationale: καλός(선한·아름다운) + διδάσκαλος(교사)의 합성어. 「선한 것을 가르치는 자」가 직역과 자연스러움을 모두 살린다.
