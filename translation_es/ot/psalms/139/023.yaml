lexical_decisions:
- source_word: חָקְרֵנִי
  english_pob_choice: Search me
  chosen_spanish: Escudríñame
  alternatives_spanish:
  - Examíname
  - Investígame
  lexicon: HALOT
  rationale: חקר expresa una búsqueda o investigación profunda. "Escudríñame" conserva la idea de indagación intensa y suena natural en español bíblico sin perder el matiz de examen penetrante que pide el salmista.
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  - Dios mío
  lexicon: HALOT
  rationale: אֵל funciona aquí como vocativo. En español, "oh Dios" refleja claramente la invocación directa y mantiene el tono poético de oración.
- source_word: וְדַע
  english_pob_choice: and know
  chosen_spanish: y conoce
  alternatives_spanish:
  - y sabe
  - y discierne
  lexicon: HALOT
  rationale: ידע en este contexto pide un conocer pleno y perceptivo. "Conoce" preserva la repetición del verbo en paralelo y mantiene la naturalidad del español.
- source_word: לְבָבִי
  english_pob_choice: my heart
  chosen_spanish: mi corazón
  alternatives_spanish:
  - mi ser interior
  - mi mente
  lexicon: HALOT
  rationale: לֵבָב puede abarcar el centro interior de la persona, pero "corazón" es la equivalencia más amplia y fiel en español devocional, sin reducirla solo a emociones o intelecto.
- source_word: בְּחָנֵנִי
  english_pob_choice: test me
  chosen_spanish: pruébame
  alternatives_spanish:
  - examíname
  - sométeme a prueba
  lexicon: HALOT
  rationale: בחן tiene el sentido de probar o ensayar, como al verificar metal. "Pruébame" conserva esa fuerza evaluativa y distingue este verbo del anterior "escudríñame".
- source_word: שַׂרְעַפָּי
  english_pob_choice: my anxious thoughts
  chosen_spanish: mis pensamientos inquietos
  alternatives_spanish:
  - mis pensamientos ansiosos
  - mis pensamientos turbados
  - mis pensamientos divididos
  lexicon: HALOT
  rationale: שַׂרְעַפִּים puede referirse a pensamientos inquietos, turbados o divididos. "Pensamientos inquietos" mantiene la amplitud semántica y reproduce bien la carga de desasosiego del término hebreo.
theological_decisions:
- issue: Lenguaje antropológico del interior humano
  english_pob_reading: Retain both 'heart' and 'anxious thoughts' rather than collapsing them into a single psychological term.
  chosen_spanish_reading: Conservar "corazón" y "pensamientos inquietos" como dos expresiones distintas del interior humano.
  alternative_spanish_readings:
  - '"corazón" y "mente"'
  - '"ser interior" y "pensamientos"'
  rationale: El hebreo presenta dos términos paralelos para el mundo interior. Mantener ambos evita aplanar la antropología bíblica y preserva la tensión poética entre el centro personal y los pensamientos perturbados.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: El expediente inglés indica que no hubo cambios en la última revisión y que hubo alto acuerdo en la evaluación cruzada; por eso el borrador español sigue de cerca las decisiones léxicas auditadas sin introducir reajustes no documentados.
  spanish_consistency_notes:
  - Se conserva la repetición de "conoce" para reflejar el paralelismo del hebreo.
  - '"Corazón" se usa en sentido antropológico amplio, no solo emocional.'
  - '"Pruébame" y "escudríñame" distinguen adecuadamente dos matices de examen divino.'
  - La nota al pie mantiene las alternativas semánticas relevantes para שַׂרְעַפָּי.
