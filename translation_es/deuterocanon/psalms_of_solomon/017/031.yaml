revisions:
- from: Y no sojourner[a] ni extranjero[b] sojournará entre ellos más[c]; juzgará a los pueblos y a las naciones en la sabiduría de su justicia. Selah.
  to: Y ningún forastero[a] ni extranjero habitará como forastero entre ellos nunca más; juzgará a pueblos y naciones con la sabiduría de su rectitud[b]. Selah[c]
  rationale: Se reemplazaron los anglicismos por español natural y digno. «Forastero ... habitará como forastero» conserva de forma suficiente el eco léxico entre πάροικος y παροικήσει sin producir un calco incomprensible. Se movió la nota de Selah a su lugar correcto. Se ajustó δικαιοσύνη a «rectitud» en el texto principal, dejando «justicia» como alternativa, para reflejar mejor la decisión teológica y lexical auditada.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:07:57Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español no es fiel en varios puntos clave: deja sin traducir πάροικος y παροικήσει como «sojourner/sojournará», coloca la nota de Selah en un ancla incorrecta («más[c]»), y omite en el texto principal la preferencia documentada de mantener δικαιοσύνη con un valor más amplio que lo meramente judicial. El resto de la estructura sintáctica y el paralelismo «pueblos y naciones» sí reflejan bien el griego.'
  spanish_quality_summary: La legibilidad en español se ve afectada por anglicismos crudos («sojourner», «sojournará») y por una ubicación confusa de la nota cultural. Una redacción natural y digna en español puede conservar el sentido sin calcado extraño. «Forastero» y «habitará como forastero» preservan razonablemente el vínculo léxico del griego sin sacrificar idiomaticidad.
  glossary_alignment: 'Hay desalineación con la racionalidad lexical auditada: el inglés eligió «sojourner» por registro, pero eso no autoriza trasplantar el inglés al español. Para δικαιοσύνη, el proyecto favorece «justicia/rectitud» según contexto; aquí conviene evitar estrechar demasiado a procedimiento judicial. «Rectitud» en el texto principal, con nota alternativa «justicia», preserva mejor la decisión teológica documentada. «Selah» debe conservarse como marcador tradicional.'
  issues:
  - severity: high
    issue: 'Anglicismos sin traducir: «sojourner» y «sojournará».'
    rationale: No son formas españolas aceptables ni eclesialmente legibles. Además, aunque intentan reflejar el vínculo πάροικος/παροικήσει, lo hacen de manera ininteligible para el lector hispano.
  - severity: medium
    issue: La nota cultural de «Selah» está anclada a «más[c]» en vez de a «Selah[c]».
    rationale: El contenido de la nota corresponde a διάψαλμα/Selah, no al adverbio «más». Esto crea una referencia errónea.
  - severity: medium
    issue: «su justicia» estrecha δικαιοσύνη más de lo que recomienda la auditoría inglesa.
    rationale: Aunque «justicia» es posible, la decisión documentada prioriza un valor moral más amplio. En español, «rectitud» en texto principal con «justicia» como alternativa recoge mejor esa preferencia.
  - severity: low
    issue: La nota a sobre πάροικος introduce «extranjero residente» como principal alternativa administrativa, pero no ofrece una solución española natural de registro literario.
    rationale: Dado que el texto principal debe ser idiomático, conviene orientar la nota hacia el matiz de residente forastero o extranjero residente, no justificar un anglicismo.
  revised_spanish_text: Y ningún forastero[a] ni extranjero habitará como forastero entre ellos nunca más; juzgará a pueblos y naciones con la sabiduría de su rectitud[b]. Selah[c]
  revised_footnotes:
