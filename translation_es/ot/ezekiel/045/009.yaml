translation:
  language: es
  text: 'Así dice el Señor Yahvé: ¡Basta[a], príncipes de Israel! Quiten la violencia y el saqueo, y hagan justicia y rectitud. Alejen de mi pueblo sus expulsiones, declara el Señor Yahvé.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¡Ya basta!»; el hebreo expresa una reprensión breve y enérgica.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahvéh
  lexicon: HALOT
  rationale: En español, la combinación reverencial del título compuesto se expresa mejor manteniendo el nombre divino como «Yahvé» y el título como «Señor». Así se evita la sustitución por un equivalente genérico y se conserva la referencia al nombre propio del pacto.
- source_word: רַב לָכֶם
  english_pob_choice: Enough
  chosen_spanish: ¡Basta!
  alternatives_spanish:
  - ¡Suficiente!
  - ¡Ya basta!
  - ¡Basta de esto!
  lexicon: HALOT
  rationale: El hebreo comunica una reprensión directa e imperativa. «¡Basta!» es natural, solemne y conserva la fuerza confrontativa sin añadir elementos no presentes en el texto.
- source_word: נְשִׂיאֵי יִשְׂרָאֵל
  english_pob_choice: princes of Israel
  chosen_spanish: príncipes de Israel
  alternatives_spanish:
  - líderes de Israel
  - gobernantes de Israel
  lexicon: HALOT
  rationale: «Príncipes» preserva el matiz de la clase dirigente formal de Israel, más específico que «líderes» y más cercano al valor político del término en Ezequiel.
- source_word: חָמָס
  english_pob_choice: violence
  chosen_spanish: la violencia
  alternatives_spanish:
  - la opresión
  - el agravio
  - la injusticia violenta
  lexicon: HALOT
  rationale: En denuncias proféticas, חָמָס apunta a violencia con carga social y moral. «Violencia» es la equivalencia clara y suficientemente amplia para el contexto.
- source_word: וָשֹׁד
  english_pob_choice: plunder
  chosen_spanish: el saqueo
  alternatives_spanish:
  - el despojo
  - el robo
  - el pillaje
  lexicon: HALOT
  rationale: «Saqueo» transmite apropiación predatoria de bienes y funciona bien junto a «violencia». «Plunder» en español bíblico se expresa con naturalidad mediante «saqueo» o «pillaje»; aquí «saqueo» es más directo.
- source_word: הָסִירוּ
  english_pob_choice: Remove
  chosen_spanish: Aparten
  alternatives_spanish:
  - Quiten
  - Retiren
  lexicon: HALOT
  rationale: El imperativo pide cesar y quitar prácticas abusivas. «Aparten» en español suena idiomático y evita repetir «quitar»/«retirar» de modo mecánico.
- source_word: וּמִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: la justicia
  alternatives_spanish:
  - el derecho
  - el juicio
  lexicon: HALOT
  rationale: En contexto ético-político, מִשְׁפָּט designa justicia en el gobierno y la vida social. «Justicia» es la opción más clara y estable.
- source_word: וּצְדָקָה
  english_pob_choice: righteousness
  chosen_spanish: la rectitud
  alternatives_spanish:
  - la justicia
  - la justicia recta
  - la integridad
  lexicon: HALOT
  rationale: Para conservar la pareja hebrea sin colapsar ambos términos en una sola palabra española, «rectitud» distingue צְדָקָה de מִשְׁפָּט y mantiene el peso moral del binomio.
- source_word: עֲשׂוּ
  english_pob_choice: do
  chosen_spanish: practiquen
  alternatives_spanish:
  - hagan
  - obren
  - cumplan
  lexicon: HALOT
  rationale: En español, «practicar la justicia y la rectitud» suena natural y refleja la idea de hacerlas una conducta habitual, no solo un acto aislado.
- source_word: הָרִימוּ
  english_pob_choice: Put away
  chosen_spanish: Aparten
  alternatives_spanish:
  - Retiren
  - Quiten
  - Alejen
  lexicon: HALOT
  rationale: El verbo puede significar levantar, quitar o apartar. Aquí el contexto demanda remover acciones opresivas; «Aparten» permite mantener fluidez y concordar con el mandato anterior.
- source_word: גְרֻשֹׁתֵיכֶם
  english_pob_choice: your expulsions
  chosen_spanish: sus expulsiones
  alternatives_spanish:
  - sus despojos
  - sus desalojos
  - sus actos de desposesión
  lexicon: HALOT
  rationale: El término hebreo refiere a expulsar o echar fuera; en este contexto puede incluir expulsión forzada de tierra o bienes. «Expulsiones» conserva la amplitud semántica sin estrecharlo a una sola situación legal moderna.
- source_word: מֵעַל עַמִּי
  english_pob_choice: from my people
  chosen_spanish: de mi pueblo
  alternatives_spanish:
  - de encima de mi pueblo
  - de sobre mi pueblo
  lexicon: HALOT
  rationale: El hebreo expresa separación o remoción respecto del pueblo. «De mi pueblo» es la forma natural en español y mantiene el énfasis posesivo y relacional.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  english_pob_choice: declares the Lord GOD
  chosen_spanish: declara el Señor Yahvé
  alternatives_spanish:
  - dice el Señor Yahvé
  - oráculo del Señor Yahvé
  lexicon: HALOT
  rationale: La fórmula profética se traduce con un verbo declarativo solemne. «Declara» preserva el tono oracular sin volverse arcaico.
theological_decisions:
- issue: Rendering of the divine name יְהוָה in the compound title אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahvéh
  rationale: El texto hebreo usa directamente el nombre divino, y la política del proyecto pide «Yahvé» en el texto principal. En español, esta combinación conserva tanto el título reverencial como el nombre propio del pacto sin enmascararlo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering of מִשְׁפָּט וּצְדָקָה as an ethical pair
  english_pob_reading: justice and righteousness
  chosen_spanish_reading: la justicia y la rectitud
  alternative_spanish_readings:
  - la justicia y la justicia
  - el juicio y la rectitud
  - la justicia y lo recto
  rationale: Se preserva el paralelismo sin fusionar los dos términos. «Rectitud» mantiene el contenido moral y permite distinguirlo de מִשְׁפָּט, que aquí es justicia social y de gobierno.
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency of key terms)
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente prefirió «Enough» y amplió «expulsions» para no estrechar el hebreo a un tecnicismo jurídico moderno. La redacción española sigue esa línea: usa una exclamación breve, natural y confrontativa, y conserva «expulsiones» para reflejar la amplitud de גְרֻשֹׁתֵיכֶם sin reducirla a «desalojos» o «desposesión» exclusivamente.'
  spanish_consistency_notes:
  - Se mantuvo el nombre divino «Yahvé» según la política del proyecto, en lugar de ocultarlo con «SEÑOR».
  - Se evitó «Cristo» y otras equivalencias no pertinentes, porque el versículo no contiene lenguaje mesiánico.
  - «Justicia» y «rectitud» se usaron como pareja estable para preservar el binomio hebreo מִשְׁפָּט / צְדָקָה.
  - «Expulsiones» se eligió por amplitud semántica y por coherencia con la nota de alternativa sin forzar un sentido jurídico moderno.
  - La puntuación y el tono siguen el registro profético solemne, con exclamación en la reprensión inicial y fórmula declarativa final.
