translation:
  language: es
  text: Israel amó a José más que a todos sus hijos, porque era el hijo de su vejez; y le hizo una túnica ricamente ornamentada[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O tradicionalmente, «una túnica de muchos colores». La expresión hebrea es incierta; puede referirse a una túnica ricamente ornamentada o a una que llegaba hasta las muñecas y los tobillos, más que específicamente a sus colores.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיִשְׂרָאֵל
  english_pob_choice: Now Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - Y ahora Israel
  - Y Israel
  lexicon: HALOT
  rationale: El hebreo narrativo inicia con una conjunción que puede marcar avance en la historia; en español, comenzar directamente con el sujeto mantiene naturalidad sin perder el flujo narrativo. Se conserva "Israel" como nombre propio del texto hebreo, no "Jacob".
- source_word: אָהַב
  english_pob_choice: loved
  chosen_spanish: amó
  alternatives_spanish:
  - quiso
  - favoreció
  lexicon: HALOT
  rationale: El verbo expresa amor de manera directa. Aunque el contexto implica preferencia, la forma base es "amar", y "amó" preserva ese valor léxico sin reinterpretarlo.
- source_word: מִכָּל בָּנָיו
  english_pob_choice: more than all his sons
  chosen_spanish: más que a todos sus hijos
  alternatives_spanish:
  - más que a ninguno de sus hijos
  - más que a todos sus descendientes
  lexicon: HALOT
  rationale: La construcción comparativa con מן exige una comparación de grado. "Hijos" refleja con precisión el plural masculino del hebreo y sigue el contexto narrativo de los hijos de Israel.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón del amor especial de Israel por José; "porque" es la equivalencia más clara y natural en español.
- source_word: בֶן זְקֻנִים
  english_pob_choice: the son of his old age
  chosen_spanish: el hijo de su vejez
  alternatives_spanish:
  - un hijo de su vejez
  - el hijo nacido en su vejez
  lexicon: HALOT
  rationale: La expresión idiomática se entiende como un hijo asociado con la vejez del padre. "De su vejez" mantiene la fuerza idiomática y la relación implícita con Israel.
- source_word: וְעָשָׂה ל֖וֹ
  english_pob_choice: and he made for him
  chosen_spanish: y le hizo
  alternatives_spanish:
  - y le confeccionó
  - y le preparó
  lexicon: HALOT
  rationale: El hebreo dice literalmente que hizo algo para él. En español, el dativo indirecto "le hizo" reproduce esa relación de beneficencia sin añadir interpretación.
- source_word: כְּתֹנֶת פַּסִּים
  english_pob_choice: a richly ornamented robe
  chosen_spanish: una túnica[a]
  alternatives_spanish:
  - una túnica ricamente ornamentada
  - una túnica de muchos colores
  - una túnica de mangas largas
  lexicon: HALOT
  rationale: El sustantivo כְּתֹנֶת designa una prenda interior o ajustada al cuerpo; "túnica" es el equivalente más sobrio y preciso en español. Sin embargo, el hebreo פַּסִּים es semánticamente incierto y puede aludir a una prenda ornamentada o de extensión especial; por eso se anota la alternativa interpretativa en la nota, sin fijarla excesivamente en el texto principal.
translation_notes:
  revision_awareness: El audit trail inglés revisó la última frase desde una lectura de 'long-sleeved robe' a 'richly ornamented robe' para no sobrefijar el sentido de כְּתֹנֶת פַּסִּים. En español se siguió ese ajuste evitando 'de muchos colores' en el texto principal y manteniendo la incertidumbre léxica en nota. También se evitó calcar 'Now' con un marcador innecesario, prefiriendo la naturalidad narrativa española.
  spanish_consistency_notes:
  - Se mantiene 'Israel' en todo el versículo, conforme al hebreo y al audit trail inglés.
  - Se prefirió 'amó' frente a un verbo interpretativo como 'favoreció'.
  - La nota sobre la vestidura conserva la tensión léxica documentada sin cerrarla en una sola solución.
  - No se usó 'SEÑOR' ni otros reemplazos teológicos no pertinentes al versículo.
  - La puntuación sigue el flujo narrativo español con punto y coma antes de la cláusula final.
