translation:
  language: es
  text: 'Para los hijos de Simeón[a], por sus generaciones, por sus clanes, por las casas de sus padres, los contados entre ellos, por el número de nombres, cabeza por cabeza[b], todo varón desde los veinte años en adelante, todo el que sale a la guerra[c]:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los enumerados entre ellos»; el participio hebreo de פקד puede llevar el matiz de censo o de alistamiento en este contexto militar.
    reason: lexical_alternative
  - marker: b
    text: Literalmente «por sus cráneos/cabezas», un modismo que significa conteo individual.
    reason: cultural_note
  - marker: c
    text: O «todo apto para servicio militar»; el hebreo dice más literalmente «todo el que sale a la guerra».
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבְנֵי שִׁמְעוֹן
  english_pob_choice: For the sons of Simeon
  chosen_spanish: Para los hijos de Simeón
  alternatives_spanish:
  - Para los descendientes de Simeón
  - Para los hijos de Simeón
  lexicon: HALOT
  rationale: בני en fórmulas censales tribales se refiere a los descendientes varones/mienbros de la tribu. «Hijos» conserva la relación formal con el antepasado epónimo y el marco masculino del censo.
- source_word: תּוֹלְדֹתָם
  english_pob_choice: by their generations
  chosen_spanish: por sus generaciones
  alternatives_spanish:
  - según sus generaciones
  - por sus registros genealógicos
  lexicon: HALOT
  rationale: En contexto censal-genealógico, תולדות indica líneas de descendencia o generaciones. «Por sus generaciones» mantiene el sentido administrativo y genealógico sin ampliar demasiado.
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: by their clans
  chosen_spanish: por sus clanes
  alternatives_spanish:
  - según sus familias
  lexicon: HALOT
  rationale: משפחה denota una unidad de parentesco de nivel clan dentro de la tribu. «Clanes» es más preciso en este contexto que el más general «familias».
- source_word: לְבֵית אֲבֹתָם
  english_pob_choice: by their fathers’ houses
  chosen_spanish: por las casas de sus padres
  alternatives_spanish:
  - por sus casas paternas
  - por sus casas de los padres
  lexicon: HALOT
  rationale: בית אבות es una unidad social estándar en la organización israelita. «Casas de sus padres» conserva la estructura patriarcal de forma transparente en español.
- source_word: פְּקֻדָיו
  english_pob_choice: those numbered of them
  chosen_spanish: los contados de ellos
  alternatives_spanish:
  - los mustrados de ellos
  - los enumerados de ellos
  lexicon: HALOT
  rationale: De פקד en sentido censal/pasivo. «Los contados de ellos» se mantiene cercano a la fórmula hebrea y deja abierta la posible tensión entre contar y mustrar que el inglés POB anotó.
- source_word: בְּמִסְפַּר שֵׁמוֹת
  english_pob_choice: by the number of names
  chosen_spanish: por el número de nombres
  alternatives_spanish:
  - según el número de nombres
  - por cuenta de nombres
  lexicon: HALOT
  rationale: Expresión formal de censo por nombres individuales. «Por el número de nombres» conserva la precisión administrativa del hebreo.
- source_word: לְגֻלְגְּלֹתָם
  english_pob_choice: head by head
  chosen_spanish: cabeza por cabeza
  alternatives_spanish:
  - uno por uno
  - por sus cabezas
  lexicon: HALOT
  rationale: Literalmente ‘por sus cráneos/cabezas’, un modismo de conteo individual. «Cabeza por cabeza» preserva la imagen concreta del hebreo y su sentido idiomático.
- source_word: כָּל זָכָר
  english_pob_choice: every male
  chosen_spanish: todo varón
  alternatives_spanish:
  - cada varón
  - todo macho
  lexicon: HALOT
  rationale: זכר especifica sexo, no solo condición adulta. «Varón» es más exacto y más natural en un registro bíblico formal que «macho» en español.
- source_word: מִבֶּן עֶשְׂרִים שָׁנָה וָמַעְלָה
  english_pob_choice: from twenty years old and upward
  chosen_spanish: desde los veinte años en adelante
  alternatives_spanish:
  - a partir de los veinte años
  - desde los veinte años y más
  lexicon: HALOT
  rationale: Fórmula estándar de umbral de edad. «Desde los veinte años en adelante» es natural y fiel al hebreo.
- source_word: כֹּל יֹצֵא צָבָא
  english_pob_choice: everyone going out to war
  chosen_spanish: todo el que sale a la guerra
  alternatives_spanish:
  - todo el que va a la guerra
  - todo apto para servicio militar
  lexicon: HALOT
  rationale: Literalmente ‘todo el que sale al ejército/la guerra’. La expresión denota elegibilidad militar; se conserva la imagen hebrea sin convertirla demasiado pronto en una paráfrasis interpretativa.
theological_decisions:
- issue: Alcance de צָבָא en la fórmula censal
  english_pob_reading: everyone going out to war
  chosen_spanish_reading: todo el que sale a la guerra
  alternative_spanish_readings:
  - todo apto para servicio militar
  - todo el que puede salir a la guerra
  rationale: El hebreo mantiene una formulación concreta, no una explicación abstracta. La traducción conserva esa concreción y deja visible el matiz militar del censo, en línea con la lectura inglesa auditable.
  doctrine_reference: Contexto histórico-redaccional del censo militar en Números 1; cf. Nm 1:3, 20.
translation_notes:
  revision_awareness: La versión inglesa final pasó una revisión menor que cambió 'every one' por 'everyone' por naturalidad; el contenido semántico quedó intacto. La española sigue el mismo contenido auditado y conserva las tensiones léxicas documentadas en פקד y צָבָא.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' por defecto solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se usa 'varón' para זכר por exactitud de sexo en censo.
  - Se conserva 'cabeza por cabeza' como calco idiomático transparente, con nota explicativa.
  - Se evita 'SEÑOR' u otra sustitución litúrgica porque no aparece el Tetragrámaton en el versículo.
