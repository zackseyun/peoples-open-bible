    rationale: El expediente inglés decidió «cords» como lectura principal precisamente para no sobreespecificar, aunque reconoció que el contexto favorece trabajo de cadena. En español, «cordones» preserva mejor esa cautela; «cadenas» puede quedar en nota como alternativa contextual.
  - severity: high
    issue: La nota al pie no presenta una alternativa real, porque repite «cadenas», que ya aparece en el texto principal.
    rationale: La política exige preservar alternativas significativas. Si el texto principal dice «cadenas», la nota no puede decir «O ‘... cadenas’». Debe contrastar con «cordones»/«cadenas» de manera real y útil para el lector.
