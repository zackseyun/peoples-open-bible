translation:
  language: es
  text: 'Será un estatuto perpetuo[a] a lo largo de sus generaciones, en todas sus moradas: no comerán grasa ni sangre.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estatuto permanente» o «estatuto eterno». En contextos legales, el hebreo עוֹלָם suele indicar validez duradera y continua.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֻקַּת
  english_pob_choice: statute
  chosen_spanish: estatuto
  alternatives_spanish:
  - ordenanza
  - decreto
  - prescripción
  lexicon: HALOT
  rationale: חֻקָּה expresa una norma fijada y obligatoria; «estatuto» conserva el matiz jurídico-covenantal sin sonar tan arcaico como otras opciones.
- source_word: עוֹלָם
  english_pob_choice: permanent
  chosen_spanish: perpetuo
  alternatives_spanish:
  - permanente
  - eterno
  - para siempre
  lexicon: HALOT
  rationale: En fórmulas legales, עוֹלָם suele indicar validez duradera dentro del marco del pacto. «Perpetuo» mantiene ese alcance continuo en español bíblico y jurídico.
- source_word: לְדֹרֹתֵיכֶם
  english_pob_choice: throughout your generations
  chosen_spanish: por todas sus generaciones
  alternatives_spanish:
  - por sus generaciones
  - para todas sus generaciones
  lexicon: HALOT
  rationale: La expresión apunta a continuidad generacional. «Por todas sus generaciones» conserva el valor distributivo y suena natural en español formal.
- source_word: בְּכֹל מוֹשְׁבֹתֵיכֶם
  english_pob_choice: in all your dwellings
  chosen_spanish: en todos sus lugares de habitación
  alternatives_spanish:
  - en todas sus moradas
  - dondequiera que habiten
  - en todos sus asentamientos
  lexicon: HALOT
  rationale: מוֹשָׁב se refiere a lugares de residencia o habitación. «Lugares de habitación» evita restringir demasiado el sentido y conserva la aplicabilidad amplia del mandato.
- source_word: כָּל חֵלֶב
  english_pob_choice: fat
  chosen_spanish: grasa
  alternatives_spanish:
  - todo sebo
  - toda grasa
  lexicon: HALOT
  rationale: En contexto sacrificial, חֵלֶב designa la grasa considerada especial/grasitud de los sacrificios; «grasa» es comprensible en español general y preserva la prohibición sin introducir una especificación no explicitada aquí.
- source_word: וְכָל דָּם
  english_pob_choice: blood
  chosen_spanish: sangre
  alternatives_spanish:
  - toda sangre
  lexicon: HALOT
  rationale: «Sangre» es la equivalencia directa y clara para דָּם. El contexto legal exige una prohibición total, que en español se expresa naturalmente con la coordinación negativa.
- source_word: לֹא תֹאכֵלוּ
  english_pob_choice: you shall eat neither...nor
  chosen_spanish: no comerán ni... ni...
  alternatives_spanish:
  - no comerán
  - no deben comer
  lexicon: HALOT
  rationale: La forma legal de prohibición se mantiene con un futuro jussivo en español. La construcción negativa coordinada expresa el hebreo de manera idiomática y completa.
theological_decisions:
- issue: Alcance temporal de עוֹלָם en una fórmula legal
  english_pob_reading: Rendered as 'permanent statute' rather than 'everlasting statute.'
  chosen_spanish_reading: «estatuto perpetuo»
  alternative_spanish_readings:
  - estatuto permanente
  - estatuto eterno
  - estatuto por siempre
  rationale: El hebreo legal transmite vigencia continua dentro del orden del pacto; «perpetuo» conserva esa fuerza sin forzar una afirmación filosófica más fuerte de infinitud absoluta. Además, es una fórmula reconocible en español bíblico y jurídica.
  doctrine_reference: 'Translation philosophy: original-language primacy; enduring covenantal validity rather than metaphysical speculation.'
translation_notes:
  revision_awareness: 'Se siguió la revisión inglesa más reciente al evitar cualquier refuerzo innecesario en la coordinación negativa y mantener una prohibición simple y natural. El texto español conserva la fórmula legal completa del hebreo: duración, alcance territorial y prohibición de grasa y sangre.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando aparezca el nombre divino explícito; este versículo no lo contiene.
  - Se prefirió «estatuto» para conservar el tono legal-covenantal del texto.
  - «Grasa» traduce חֵלֶב de manera amplia; no se especificó «sebo» porque el contexto inmediato no exige esa precisión en español.
  - La negación coordinada «ni... ni...» refleja la prohibición total de ambos elementos sin añadir palabras innecesarias.
