revisions:
- from: Pero la mayoría de ellos escapó herida y desnuda[a]; y el mismo Lisias también escapó huyendo vergonzosamente.
  to: Pero la mayoría de ellos escaparon heridos y desnudos[a]; y Lisias mismo también escapó huyendo vergonzosamente.
  rationale: Se corrige la concordancia para reflejar fielmente el plural personal implícito en el griego («heridos y desnudos»; «escaparon»). También se simplifica «el mismo Lisias» a «Lisias mismo», que suena más natural en español sin cambiar el sentido. La nota léxica sobre «despojados» se conserva porque refleja correctamente la alternativa documentada para γυμνοὶ.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:30:54Z'
review_pass:
  verdict: revise
  source_alignment_summary: El griego dice que «la mayoría de ellos» (οἱ πλείονες... αὐτῶν) «escaparon» (διεσώθησαν) «heridos» (τραυματίαι) y «desnudos» (γυμνοὶ); luego añade que Lisias mismo escapó huyendo vergonzosamente. El borrador conserva bien el sentido general, pero falla en la concordancia y número al pasar indebidamente a singular femenino («escapó herida y desnuda»), lo cual distorsiona la referencia a los combatientes plurales.
  spanish_quality_summary: La redacción es casi natural, pero la primera cláusula es gramaticalmente defectuosa en español por concordar con «mayoría» en vez de con las personas referidas. En este contexto, lo más claro y fiel es «La mayoría de ellos escaparon heridos y desnudos[a]» o bien reformular con «la mayor parte». La segunda cláusula es buena y legible.
  glossary_alignment: 'No hay conflictos con la terminología de proyecto. «Lisias», «escapó», «vergonzosamente» y la nota sobre γυμνοὶ están alineados con el expediente inglés. La decisión léxica de τραυματίαι/γυμνοὶ debe reflejar plural personal en español: «heridos y desnudos», no singular femenino.'
  issues:
