revisions:
- from: 'Por tanto, di a la casa de Israel[a]: «Así ha dicho el Señor Yahvé: Vuélvanse, y aléjense de sus ídolos[b], y vuelvan su rostro de todas sus abominaciones».'
  to: 'Por tanto, di a la casa de Israel[a]: «Así dice el Señor Yahvé[b]: Vuélvanse, y aléjense de sus ídolos, y aparten su rostro de todas sus abominaciones».'
  rationale: Se ajusta la fórmula profética a 'Así dice', más natural y precisa para כֹּה אָמַר; se mejora la fluidez de la última cláusula con 'aparten su rostro de'; y se corrige el anclaje de la nota [b] para que corresponda al título divino que explica.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:41:44Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo: inferencia profética, fórmula de comisión, fórmula mensajera, doble llamado con שׁוּב/הָשִׁיבוּ y la imagen corporal de orientar el rostro lejos de las abominaciones. Sin embargo, hay dos desajustes principales: (1) כֹּה אָמַר normalmente se refleja mejor en presente performativo en español bíblico (''Así dice'') que en perfecto (''Así ha dicho''); y (2) la nota [b] está anclada en ''ídolos'' aunque su contenido explica אֲדֹנָי יְהוִה, por lo que el anclaje no corresponde al elemento pertinente del texto.'
  spanish_quality_summary: 'El español es claro y digno, pero puede sonar más natural y exacto con pequeños ajustes: ''Así dice el Señor Yahvé'' es más idiomático para la fórmula profética, y ''aparten su rostro de'' expresa mejor el sentido direccional de הָשִׁיבוּ פְנֵיכֶם que ''vuelvan su rostro de'', que suena algo forzado en español. También conviene mover la nota [b] a ''Yahvé''.'
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יהוה se preserva como ''Yahvé''; אֲדֹנָי se mantiene como ''Señor''; שׁוּב se traduce con ''Vuélvanse'', conservando la imagen direccional y la posibilidad de arrepentimiento; גִּלּוּלִים = ''ídolos''; תּוֹעֲבוֹת = ''abominaciones''. La única corrección formal necesaria en glosario/notas es que la nota sobre אֲדֹנָי יְהוִה debe ir anclada al título divino, no a ''ídolos''.'
  issues:
  - severity: medium
    issue: La nota [b] está colocada en 'ídolos', pero explica אֲדֹנָי יְהוִה.
    rationale: El marcador debe aparecer en la palabra o frase a la que corresponde la nota. Tal como está, induce a confusión y no cumple la disciplina de anclaje de notas.
  - severity: medium
    issue: '''Así ha dicho'' no es la mejor representación de כֹּה אָמַר en esta fórmula profética.'
    rationale: En español bíblico contemporáneo, 'Así dice' reproduce mejor la fórmula mensajera convencional y evita un matiz perfectivo innecesario.
  - severity: low
    issue: '''vuelvan su rostro de todas sus abominaciones'' suena poco natural en español.'
    rationale: Aunque es comprensible, 'aparten su rostro de todas sus abominaciones' o 'vuelvan su rostro lejos de...' expresa con más naturalidad la idea hebrea de reorientación deliberada.
  revised_spanish_text: 'Por tanto, di a la casa de Israel[a]: «Así dice el Señor Yahvé[b]: Vuélvanse, y aléjense de sus ídolos, y aparten su rostro de todas sus abominaciones».

    '
  revised_footnotes:
