  text: וְ/הָיָ֣ה הָ/עִ֔יר הַ/קְּרֹבָ֖ה אֶל הֶ/חָלָ֑ל וְ/לָֽקְח֡וּ זִקְנֵי֩ הָ/עִ֨יר הַ/הִ֜וא עֶגְלַ֣ת בָּקָ֗ר אֲשֶׁ֤ר לֹֽא עֻבַּד֙ בָּ֔/הּ אֲשֶׁ֥ר לֹא מָשְׁכָ֖ה בְּ/עֹֽל־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/021/003.yaml
  text: And it shall be that the city nearest to the slain man[c][b][a], the elders of that city shall take a heifer of the herd that has not been worked and has not pulled in the yoke.
  footnotes:
  - marker: a
    text: Or "to the corpse" or "to the slain one." The Hebrew term refers to a person who has been killed.
    reason: lexical_alternative
  - marker: b
    text: Or simply "a heifer." The phrase more fully specifies a young female bovine from the cattle herd.
    reason: lexical_alternative
  - marker: c
    text: Literally, "which has not pulled in a yoke," that is, one not previously used for draft labor.
    reason: lexical_alternative
