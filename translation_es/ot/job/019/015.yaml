    text: Or 'The sojourners of my house' or 'The lodgers in my house.' The Hebrew term can refer to temporary residents or dependents living within a household.
    reason: lexical_alternative
  - marker: b
    text: '''Female servants'' may also be rendered ''maidservants.'' The Hebrew term refers to women in a servile household role.'
    reason: lexical_alternative
  - marker: c
    text: The second clause uses 'foreigner' where the first uses 'stranger,' preserving the Hebrew's near-parallel but slightly varied vocabulary.
    reason: lexical_alternative
