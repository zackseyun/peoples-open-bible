  revised_spanish_text: Y los descendientes del queneo[a], suegro de Moisés, subieron de la Ciudad de las Palmeras[b] con los descendientes de Judá al desierto de Judá, que está en el Néguev de Arad; y fue y se estableció con el pueblo[d][c].
