    text: O «un campamento muy grande». El griego παρεμβολή puede significar «campamento», especialmente en contextos militares; aquí, sin embargo, se refiere de manera amplia al grupo reunido con familias y bagaje.
    reason: lexical_alternative
  revision_rationale: Se corrigió el anclaje de la nota para que recaiga sobre «una compañía muy grande», que es el elemento explicado por la nota léxica. También se ajustó «para venir» a «para ir» por naturalidad del español, sin alterar el sentido básico del propósito de desplazarse a Judá. Se hicieron leves mejoras de fluidez en la serie («sus mujeres, sus hijos y su bagaje»).
