review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el hebreo y el rastro de auditoría inglés en casi todos los elementos clave: la cláusula temporal («cuando entren»), «las puertas del atrio interior», la exigencia de lino, el matiz cultual de «ministren» y la referencia de «la casa» al edificio del templo. Sin embargo, «no subirá sobre ellos lana» suena poco natural en español y no preserva bien la inteligibilidad de la imagen hebrea. Conviene ajustar a una forma más idiomática que mantenga la literalidad documentada por la POB.'
  spanish_quality_summary: El texto es mayormente claro, digno y legible. «Prendas de lino» funciona, aunque «vestiduras de lino» sería algo más bíblico; no es necesario cambiarlo. El problema principal es la construcción «no subirá sobre ellos lana», que resulta forzada en español moderno y puede distraer o confundir. Una formulación como «ninguna lana vendrá sobre ellos» conserva mejor la extrañeza intencional sin sonar gramaticalmente defectuosa.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Ministren» respeta la decisión cultual; «la casa» conserva la literalidad con nota aclaratoria. No intervienen términos sensibles como Yahvé, Mesías o δοῦλος.
  issues:
  - severity: medium
    issue: La frase «no subirá sobre ellos lana» es poco idiomática en español.
    rationale: Aunque intenta reflejar literalmente יַעֲלֶה, en español «subir sobre» con «lana» suena torpe y opaco. La decisión inglesa buscó conservar la imagen sin volverla ininteligible; el español debe hacer lo mismo.
  - severity: low
    issue: La nota [a] puede afinarse para corresponder al texto revisado.
    rationale: Si se ajusta la cláusula principal, la nota debe reflejar con precisión la nueva formulación literal escogida, manteniendo la alternativa «no llevarán lana».
