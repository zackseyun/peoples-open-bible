id: NUM.23.15
reference: Numbers 23:15
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר֙ אֶל בָּלָ֔ק הִתְיַצֵּ֥ב כֹּ֖ה עַל עֹלָתֶ֑/ךָ וְ/אָנֹכִ֖י אִקָּ֥רֶה כֹּֽה־־׃
translation:
  text: And he said to Balak[a], “Stand here beside your burnt offering, and I will go to meet him over there.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will meet there' or 'I will encounter him there.' The Hebrew verb is concise and may be rendered in several closely related ways.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר אֶל־בָּלָק
  chosen: And he said to Balak
  alternatives:
  - Then he said to Balak
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol introducing direct speech. 'And' preserves Hebrew narrative flow without overinterpreting sequence.
- source_word: הִתְיַצֵּב
  chosen: Stand
  alternatives:
  - Take your stand
  - Station yourself
  lexicon: HALOT
  rationale: Imperative of יצב in the Hitpael conveys taking one's position or standing in place. 'Stand' is natural modern English and sufficient in context.
- source_word: כֹּה
  chosen: here
  alternatives:
  - thus
  - in this place
  lexicon: HALOT
  rationale: In this spatial context with the imperative and repeated later, כֹּה functions deictically ('here/there') rather than adverbially 'thus.' English idiom prefers 'here' for the place where Balak is to remain.
- source_word: עַל עֹלָתֶךָ
  chosen: beside your burnt offering
  alternatives:
  - by your burnt offering
  - over your burnt offering
  - at your burnt offering
  lexicon: HALOT
  rationale: עַל can denote position at or by something, not only strictly 'on/upon.' Since Balak is being told where to stand in relation to the sacrifice, 'beside' communicates the locative sense clearly in English. עֹלָה is specifically a 'burnt offering.'
- source_word: וְאָנֹכִי
  chosen: and I
  alternatives:
  - while I
  - but I
  lexicon: HALOT
  rationale: The pronoun is explicit for emphasis or contrast. 'And I' preserves the coordination and mild contrast with Balak's standing still.
- source_word: אִקָּרֶה
  chosen: will go to meet him
  alternatives:
  - will meet
  - will encounter
  - will be met
  lexicon: HALOT
  rationale: From קרה in the Niphal, the sense here is going to an encounter, likely with the LORD as in the Balaam narrative context. English requires an explicit idiomatic rendering; 'will go to meet him' captures purposeful movement toward an encounter better than a bare 'will happen/encounter.' The object 'him' is contextually supplied in translation.
- source_word: כֹּה
  chosen: over there
  alternatives:
  - there
  - to that place
  lexicon: HALOT
  rationale: The second כֹּה points to a different location from where Balak stands. Rendering it 'over there' preserves the deictic contrast with the first 'here' in natural English.
