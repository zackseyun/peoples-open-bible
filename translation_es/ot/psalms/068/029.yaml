translation:
  language: es
  text: Tu Dios ha ordenado tu fuerza. Muestra fuerza[a], oh Dios, que has obrado en favor nuestro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo עוּזָה es difícil. También puede entenderse como «Sé fuerte, oh Dios» o, en relación con el versículo siguiente, «Fortalece, oh Dios, lo que has obrado en favor nuestro».
    reason: alternative_reading
lexical_decisions:
- source_word: צִוָּה
  english_pob_choice: has commanded
  chosen_spanish: ha mandado
  alternatives_spanish:
  - ha ordenado
  - ha decretado
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una acción ya realizada con vigencia presente; en español, «ha mandado» conserva el valor de una orden autoritativa de manera natural y digna.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu dios
  lexicon: HALOT
  rationale: El contexto exige el Dios de Israel, no una divinidad genérica. En español, el posesivo singular con mayúscula en «Dios» comunica bien el sentido del hebreo con sufijo de segunda persona.
- source_word: עֻזֶּךָ
  english_pob_choice: your strength
  chosen_spanish: tu fuerza
  alternatives_spanish:
  - tu poder
  - tu fortaleza
  lexicon: HALOT
  rationale: El sustantivo puede ser «fuerza» o «poder». «Tu fuerza» mantiene la correspondencia más directa y fluida con el hebreo y evita una lectura demasiado abstracta.
- source_word: עוּזָּה
  english_pob_choice: Show strength
  chosen_spanish: Muestra fuerza
  alternatives_spanish:
  - Sé fuerte
  - Fortalece
  lexicon: HALOT
  rationale: La forma es difícil y se ha entendido de varias maneras. Como súplica independiente, «Muestra fuerza» preserva el tono petitorio y no introduce un posesivo no atestiguado en esa cláusula.
- source_word: אֱלֹהִים
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  lexicon: HALOT
  rationale: La función vocativa requiere marcar la invocación directa. En español, «oh Dios» es natural y solemne.
- source_word: זוּ
  english_pob_choice: you who
  chosen_spanish: tú que
  alternatives_spanish:
  - el que
  - quien
  lexicon: HALOT
  rationale: La partícula relativa en este contexto introduce una cláusula referida directamente a Dios; «tú que» conserva la dirección en segunda persona y suena natural en español.
- source_word: פָּעַלְתָּ
  english_pob_choice: have worked
  chosen_spanish: has obrado
  alternatives_spanish:
  - has actuado
  - has hecho
  lexicon: HALOT
  rationale: El verbo expresa acción efectiva o intervención. «Has obrado» es una opción clásica y clara en español para la acción poderosa de Dios, sin perder el matiz de obra realizada.
- source_word: לָּנוּ
  english_pob_choice: for us
  chosen_spanish: por nosotros
  alternatives_spanish:
  - en favor nuestro
  - para nosotros
  lexicon: HALOT
  rationale: El valor benefactivo puede expresarse naturalmente con «por nosotros» en español, reflejando la idea de acción a favor del pueblo.
theological_decisions:
- issue: Ambigüedad de עוּזָּה
  english_pob_reading: Show strength, O God, you who have worked for us.
  chosen_spanish_reading: Muestra fuerza, oh Dios
  alternative_spanish_readings:
  - Sé fuerte, oh Dios
  - Fortalece, oh Dios
  rationale: Se preserva la tensión textual sin resolverla en exceso. La forma hebrea admite varias lecturas; la redacción española mantiene la petición breve y deja espacio para las alternativas documentadas.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
- issue: Relación entre la primera y la segunda cláusula
  english_pob_reading: Your God has commanded your strength. Show strength, O God, you who have worked for us.
  chosen_spanish_reading: Tu Dios ha mandado tu fuerza. Muestra fuerza, oh Dios, tú que has obrado por nosotros.
  alternative_spanish_readings:
  - Tu Dios ha ordenado tu fuerza. Sé fuerte, oh Dios, tú que has trabajado por nosotros.
  rationale: Se conserva la estructura de dos miembros con paralelismo y se evita fusionar la segunda cláusula con el versículo siguiente. Así se mantiene el carácter auditable del texto hebreo.
  doctrine_reference: POB translation policy on source-bound verse-level rendering
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del audit trail al traducir la segunda cláusula como una exhortación breve centrada en «fuerza», sin añadir el posesivo «tu» en esa parte. También evita importar al presente versículo la ampliación interpretativa que conecta con el siguiente versículo.
  spanish_consistency_notes:
  - Se usó «Dios» con mayúscula para el referente divino.
  - Se prefirió «fuerza» para עז/עוז por coherencia con la decisión inglesa de strength.
  - Se conservó el registro solemne pero natural del español bíblico contemporáneo.
  - Se mantuvo la ambigüedad del segundo hemistiquio mediante nota, sin cerrar la lectura hebrea más allá de lo atestiguado.
