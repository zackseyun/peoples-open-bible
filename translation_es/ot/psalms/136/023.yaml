- from: que se acordó de nosotros en nuestro bajo estado[a][b], porque para siempre es su amor leal.
  to: que se acordó de nosotros en nuestra humillación[b], porque su amor leal es para siempre[a].
  rationale: Se ajustó 'bajo estado' a 'humillación' por mayor naturalidad y fuerza semántica en español, manteniendo una nota con las alternativas preservadas por la auditoría inglesa. También se reordenó el refrán a 'porque su amor leal es para siempre' para conservar el sentido de la fuente y la decisión inglesa 'is forever' en un español claro y digno.
