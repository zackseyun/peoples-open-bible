translation:
  language: es
  text: Un miktam[a] de David. Presérvame, Dios, porque en ti me refugio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo miktam, un encabezado de salmo de significado incierto; puede designar un tipo de composición. Algunas versiones lo traducen como 'salmo' o 'canto de oro'.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִכְתָּם
  english_pob_choice: A miktam
  chosen_spanish: Un miktam[a]
  alternatives_spanish:
  - Un salmo
  - Un canto de oro
  - Una inscripción
  lexicon: HALOT
  rationale: Se mantiene la transliteración para no atribuir al término un sentido seguro que el hebreo no garantiza. En español, como en inglés, la nota conserva las alternativas posibles sin fijar indebidamente el género o la función del encabezado.
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - para David
  - perteneciente a David
  - por David
  lexicon: HALOT
  rationale: La preposición ל en estos encabezamientos puede indicar autoría, pertenencia o dedicación. 'De David' es la opción más neutra y transparente en español, y conserva mejor la ambigüedad que una traducción más específica.
- source_word: שָׁמְרֵנִי
  english_pob_choice: Preserve me
  chosen_spanish: Presérvame
  alternatives_spanish:
  - Guárdame
  - Protégeme
  - Sálvame
  lexicon: HALOT
  rationale: El imperativo de שׁמר pide conservación/protección. 'Presérvame' reproduce bien el tono orante y la idea de cuidado continuo sin reducirla solo a defensa física.
- source_word: אֵל
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  - oh Poderoso
  - oh Dios fuerte
  lexicon: HALOT
  rationale: אֵל funciona aquí como vocativo divino. 'Oh Dios' expresa de modo natural la invocación directa en español y mantiene el valor de dirección al interlocutor.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - puesto que
  lexicon: HALOT
  rationale: Aquí כִּי introduce la razón de la petición. 'Porque' comunica con claridad la relación causal en español y conserva el sentido explicativo del hebreo.
- source_word: חָסִיתִי
  english_pob_choice: I take refuge
  chosen_spanish: me refugio
  alternatives_spanish:
  - he tomado refugio
  - busco refugio
  - confío
  lexicon: HALOT
  rationale: חסה conserva la imagen de refugiarse bajo protección. La forma reflexiva 'me refugio' suena natural en español y preserva la metáfora de amparo mejor que 'confío', que sería más abstracto.
- source_word: בָךְ
  english_pob_choice: in you
  chosen_spanish: en ti
  alternatives_spanish:
  - contigo
  - bajo ti
  lexicon: HALOT
  rationale: El hebreo usa ב con חסה para marcar la esfera o lugar de refugio. 'En ti' es el equivalente idiomático más claro en español y mantiene la relación de dependencia y amparo.
theological_decisions:
- issue: Sentido incierto de מִכְתָּם en el encabezamiento
  english_pob_reading: Transliterate as 'miktam' rather than assigning a speculative meaning.
  chosen_spanish_reading: Transliterar 'miktam' sin imponer un significado definido.
  alternative_spanish_readings:
  - Tratarlo como 'salmo'
  - Verterlo como 'canto de oro'
  rationale: El testimonio léxico disponible no permite precisar con seguridad el valor del término. La transliteración mantiene la transparencia textual y evita resolver artificialmente una tensión que el original deja abierta.
  doctrine_reference: 'Principio POB: primacía del texto original y preservación de tensiones lexicales no resueltas.'
translation_notes:
  revision_awareness: El seguimiento del inglés POB muestra alta concordancia y sin revisiones aplicadas; por ello la redacción española sigue de cerca las decisiones auditadas, manteniendo la transliteración de מִכְתָּם y la estructura causal y devocional del versículo.
  spanish_consistency_notes:
  - Se usó 'Yahvé' no porque aparezca en este versículo, sino como norma general del proyecto; aquí el texto tiene אֵל, por lo que se traduce 'Dios'.
  - Se prefirió 'Presérvame' por su cercanía a la semántica de שׁמר y por resonar con el registro litúrgico sin arcaísmo excesivo.
  - '''En ti me refugio'' conserva la imagen espacial de חסה y evita sustituirla por ''confío'', que sería una abstracción mayor.'
