translation:
  language: es
  text: No confíes en un enemigo para siempre[a], porque así como el bronce se corroe, así también su maldad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo final es difícil; el paralelo griego apoya el sentido: «porque así como el bronce se corroe, así también su maldad».'
    reason: textual_variant
  - marker: b
    text: O «su mal».
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל תַּאֲמִין / μὴ πιστεύσῃς
  english_pob_choice: Do not trust
  chosen_spanish: No confíes
  alternatives_spanish:
  - No creas
  - Nunca pongas tu confianza
  lexicon: HALOT; LXX πιστεύω
  rationale: En este contexto hostil, el hebreo הֶאֱמִין en Hifil y el griego πιστεύσῃς expresan poner confianza en alguien. «Confiar» comunica mejor esa relación que «creer», que en español podría sonar más cognitivo que relacional.
- source_word: בְּשׂוֹנֵא / τῷ ἐχθρῷ σου
  english_pob_choice: an enemy
  chosen_spanish: en un enemigo
  alternatives_spanish:
  - en quien te odia
  - en tu enemigo
  lexicon: HALOT; LXX ἐχθρός
  rationale: «Enemigo» refleja bien la fuerza relacional de בְּשׂוֹנֵא y coincide con el griego ἐχθρός. Se conserva el indefinido para mantener el valor proverbial.
- source_word: לָעַד / εἰς τὸν αἰῶνα
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - jamás
  lexicon: HALOT
  rationale: La advertencia tiene alcance temporal absoluto. «Para siempre» es natural en español y preserva esa fuerza sin añadir matiz excesivo.
- source_word: כְּנְחֹשֶׁת / ὁ χαλκός
  english_pob_choice: bronze
  chosen_spanish: el bronce
  alternatives_spanish:
  - el cobre
  - el latón
  lexicon: HALOT; LXX χαλκός
  rationale: «Bronce» sigue la decisión inglesa y se ajusta bien a χαλκός. En español moderno es más claro y preciso que «latón», y más idiomático que «cobre» para esta imagen metálica.
- source_word: רועו / ἡ πονηρία αὐτοῦ
  english_pob_choice: his evil
  chosen_spanish: su maldad
  alternatives_spanish:
  - su mal
  - su malicia
  - su wickedness
  lexicon: HALOT; LXX πονηρία
  rationale: El sustantivo apunta a la perversidad/maldad moral del enemigo. «Maldad» es una traducción natural y fuerte en español, y evita la posible ambigüedad de «su mal».
- source_word: יַחְלִיא / ἰοῦται
  english_pob_choice: corrodes
  chosen_spanish: se corroe
  alternatives_spanish:
  - se oxida
  - se carcome
  lexicon: HALOT; LXX ἰοῦται
  rationale: La corrección revisada del inglés favorece «corrodes» para el bronce; en español, «se corroe» reproduce bien la imagen de deterioro metálico y evita el tecnicismo limitado de «oxida», que se asocia más estrechamente al hierro.
theological_decisions:
- issue: Uso del paralelo griego para aclarar la cláusula final hebrea difícil
  english_pob_reading: for as bronze corrodes, so does his evil
  chosen_spanish_reading: porque así como el bronce se corroe, así es su maldad
  alternative_spanish_readings:
  - porque así como el bronce se oxida, así es su maldad
  - porque así como el bronce se deteriora, así es su maldad
  rationale: 'El hebreo final es oscuro en aislamiento, y el griego ofrece un control semántico claro sobre la imagen metalúrgica. La traducción conserva esa clarificación sin ocultar la tensión textual: el proverbio compara el deterioro del bronce con el deterioro moral del enemigo.'
  doctrine_reference: 'PHILOSOPHY.md: en Sirácida, traducir desde el hebreo cuando existe, usando el paralelo griego como apoyo de traducción real.'
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail inglés, que prefirió 'corrodes' sobre 'rusts' para mayor precisión léxica respecto del bronce, manteniendo intacta la comparación proverbial y el registro formal.
  spanish_consistency_notes:
  - Se mantiene «bronce» como equivalente de χαλκός y no se sustituye por «cobre» o «latón», para conservar la imagen metálica del paralelo griego y del hebreo.
  - Se traduce el mandato con «No confíes» para reproducir el valor relacional de אַל תַּאֲמִין / μὴ πιστεύσῃς.
  - «Maldad» se usa de forma consistente para πονηρία / רועו, evitando variar a «mal» en el texto principal.
