  yaml_path: translation/deuterocanon/4_maccabees/008/026.yaml
  text: Why has such contentiousness been instilled in us[a], and why does deadly endurance please us, when it is possible to live in tranquility by obeying the king, after becoming afraid of the tortures that lead to death?
