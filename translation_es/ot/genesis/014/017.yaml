translation:
  language: es
  text: Entonces el rey de Sodoma salió a recibirlo después de regresar de derrotar a Kedorlaomer[a] y a los reyes que estaban con él, al valle de Shaveh[b] (es decir, el valle del rey).
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La forma tradicional en español suele ser «Chedorlaomer»; aquí se usa «Kedorlaomer» por ser una transliteración más directa del hebreo.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «el valle de Shaveh»; la frase siguiente lo identifica como «el valle del rey».'
    reason: cultural_note
lexical_decisions:
- source_word: וַיֵּצֵא
  english_pob_choice: Then ... went out
  chosen_spanish: Entonces ... salió
  alternatives_spanish:
  - Y ... salió
  - Luego ... salió
  lexicon: HALOT
  rationale: La waw consecutiva marca avance narrativo; «Entonces» conserva la secuencia y suena natural en español sin perder el matiz de continuación.
- source_word: מֶלֶךְ סְדֹם
  english_pob_choice: the king of Sodom
  chosen_spanish: el rey de Sodoma
  alternatives_spanish:
  - el rey de Sodom
  lexicon: HALOT
  rationale: Construcción posesiva directa y nombre de lugar transliterado/adaptado al uso bíblico normal en español.
- source_word: לִקְרָאתוֹ
  english_pob_choice: to meet him
  chosen_spanish: a recibirlo
  alternatives_spanish:
  - a encontrarse con él
  - para encontrarlo
  lexicon: HALOT
  rationale: La expresión hebrea indica salir al encuentro; en español «a recibirlo» comunica bien la idea de ir a encontrarse con alguien en este contexto narrativo.
- source_word: אַחֲרֵי שׁוּבוֹ
  english_pob_choice: after his return
  chosen_spanish: después de su regreso
  alternatives_spanish:
  - después de volver
  - tras su regreso
  lexicon: HALOT
  rationale: Se conserva el valor temporal con un sintagma nominal natural en español, como en la decisión inglesa auditada.
- source_word: מֵהַכּוֹת
  english_pob_choice: from defeating
  chosen_spanish: de haber derrotado
  alternatives_spanish:
  - de derrotar
  - después de derrotar
  lexicon: HALOT
  rationale: El hifil de נכה aquí expresa victoria militar; «derrotado» mantiene el sentido de victoria con buena claridad en español.
- source_word: כְּדָרלָעֹמֶר
  english_pob_choice: Kedorlaomer
  chosen_spanish: Kedorlaomer
  alternatives_spanish:
  - Chedorlaomer
  lexicon: HALOT
  rationale: Se sigue la transliteración más directa del hebreo consonántico, coherente con la POB en inglés.
- source_word: וְאֶת־הַמְּלָכִים אֲשֶׁר אִתּוֹ
  english_pob_choice: and the kings who were with him
  chosen_spanish: y a los reyes que estaban con él
  alternatives_spanish:
  - y los reyes que estaban con él
  - y a los reyes con él
  lexicon: HALOT
  rationale: Se explicita el objeto directo con «a» por tratarse de personas, y el relativo aclara la relación sin forzar el español.
- source_word: אֶל עֵמֶק שָׁוֵה
  english_pob_choice: to the Valley of Shaveh
  chosen_spanish: al valle de Shaveh
  alternatives_spanish:
  - hacia el valle de Shaveh
  - al Valle de Shaveh
  lexicon: HALOT
  rationale: «אל» conserva fuerza direccional; «al valle de Shaveh» refleja mejor el movimiento que una locución estática.
- source_word: הוּא עֵמֶק הַמֶּלֶךְ
  english_pob_choice: (that is, the King's Valley)
  chosen_spanish: (es decir, el valle del rey)
  alternatives_spanish:
  - (esto es, el valle del rey)
  - (o sea, el valle del rey)
  lexicon: HALOT
  rationale: La cláusula explicativa se vierte con una equivalencia idiomática clara. «Del rey» evita una posesión artificial y comunica el nombre tradicional del lugar.
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada desde «at the Valley of Shaveh» a «to the Valley of Shaveh» para reflejar mejor la dirección de אֶל. La redacción española adopta esa misma fuerza direccional con «al valle de Shaveh». También se preserva la explicación apposicional del topónimo, equivalente al paréntesis inglés.
  spanish_consistency_notes:
  - Se mantiene «Kedorlaomer» conforme a la decisión inglesa y a la transliteración más directa del hebreo.
  - Se usa «valle» con minúscula en la referencia común y en la apposición explicativa, coherente con el español bíblico moderno.
  - No se introduce «SEÑOR» ni otras sustituciones teológicas, porque este versículo no contiene el nombre divino.
