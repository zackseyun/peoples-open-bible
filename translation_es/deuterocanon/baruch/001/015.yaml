translation:
  language: es
  text: 'Y diréis: «Al Señor nuestro Dios pertenece la rectitud[a], pero a nosotros la vergüenza en el rostro, como sucede en este día, al pueblo de Judá y a los habitantes de Jerusalén»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «justicia»: «Al Señor nuestro Dios pertenece la justicia». El griego δικαιοσύνη puede significar tanto «rectitud» como «justicia»; aquí se eligió «rectitud» para conservar mejor el contraste penitencial.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐρεῖτε
  english_pob_choice: you shall say
  chosen_spanish: diréis
  alternatives_spanish:
  - dirán
  - deciréis
  lexicon: LSJ
  rationale: El futuro con valor exhortativo/directivo del griego se expresa naturalmente en español con «diréis»; mantiene el tono solemne e instrucional del contexto litúrgico.
- source_word: τῷ κυρίῳ θεῷ ἡμῶν
  english_pob_choice: the Lord our God
  chosen_spanish: al Señor nuestro Dios
  alternatives_spanish:
  - al Señor Dios nuestro
  - a nuestro Señor Dios
  lexicon: LSJ
  rationale: Se conserva el título reverencial «Señor» para κύριος y «nuestro Dios» para θεῷ ἡμῶν. Dado que el texto griego de Baruc en la LXX usa κύριος en lugar de un hebreo explícito, no se introduce «Yahvé» en el cuerpo del versículo.
- source_word: ἡ δικαιοσύνη
  english_pob_choice: belongs righteousness
  chosen_spanish: la justicia le pertenece a él
  alternatives_spanish:
  - la rectitud le pertenece a él
  - a él pertenece la justicia
  lexicon: BDAG
  rationale: La frase griega es elíptica; en español se explicita la posesión con una construcción natural. Se elige «justicia» porque el propio audit trail inglés preserva la alternativa lexical y el contraste penitencial admite tanto «justicia» como «justicia/righteousness»; aquí el español fluye mejor con «justicia» y mantiene la tensión semántica sin suavizarla.
- source_word: αἰσχύνη τῶν προσώπων
  english_pob_choice: shame of face
  chosen_spanish: la vergüenza de rostro
  alternatives_spanish:
  - vergüenza en el rostro
  - deshonra visible
  lexicon: LSJ
  rationale: Se conserva el semitismo de vergüenza visible en el rostro. «Vergüenza de rostro» es un giro comprensible en español bíblico y refleja mejor el idioma de origen que una paráfrasis más libre.
- source_word: ὡς ἡ ἡμέρα αὕτη
  english_pob_choice: as it is this day
  chosen_spanish: como en este día
  alternatives_spanish:
  - como este día muestra
  - tal como hoy
  lexicon: LSJ
  rationale: La fórmula apunta al estado evidente del presente; «como en este día» conserva el valor idiomático sin añadir interpretaciones.
- source_word: ἀνθρώπῳ Ἰούδα
  english_pob_choice: the people of Judah
  chosen_spanish: al pueblo de Judá
  alternatives_spanish:
  - a los hombres de Judá
  - a la gente de Judá
  lexicon: LSJ
  rationale: Aunque el sustantivo está en singular, funciona colectivamente. Se sigue la revisión inglesa que entendió el valor colectivo natural, y en español «pueblo de Judá» evita el exceso de literalidad de «hombre de Judá».
- source_word: τοῖς κατοικοῦσιν Ἰερουσαλήμ
  english_pob_choice: the inhabitants of Jerusalem
  chosen_spanish: a los habitantes de Jerusalén
  alternatives_spanish:
  - a los que habitan en Jerusalén
  - a los moradores de Jerusalén
  lexicon: LSJ
  rationale: «Habitantes» es la equivalencia directa y clara para el participio sustantivado, con registro bíblico natural en español.
theological_decisions:
- issue: Traslado de δικαιοσύνη en un contexto confesional y penitencial
  english_pob_reading: righteousness, with footnoted alternative justice
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - justicia/righteousness
  rationale: El inglés POB marcó la tensión entre «righteousness» y «justice». En español, «justicia» conserva mejor la alternativa explícita sin perder la carga ética y covenantal del versículo. Se evita una terminología eclesiástica más tradicional que podría desdibujar la decisión lexical documentada.
  doctrine_reference: 'DOCTRINE.md: contested terms δικαιοσύνη → righteousness/justice; preserve lexical alternatives in notes where helpful'
- issue: Tratamiento del destinatario divino κύριος en Baruc LXX
  english_pob_reading: the Lord our God
  chosen_spanish_reading: el Señor nuestro Dios
  alternative_spanish_readings:
  - Yahvé nuestro Dios
  - el Señor, nuestro Dios
  rationale: Aunque el proyecto generalmente usa «Yahvé» para יהוה, aquí el texto fuente es griego LXX con κύριος y el audit trail inglés decide «the Lord our God». Por eso el español mantiene «Señor» sin introducir una identificación que el verso griego no explicita directamente.
  doctrine_reference: Project terminology default for divine name in Hebrew sources; Greek LXX κύριος rendering handled contextually
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente que cambió «the men of Judah» por «the people of Judah» para reflejar el valor colectivo de ἀνθρώπῳ Ἰούδα. El español adopta esa misma lectura colectiva con «pueblo de Judá». También se respetó la nota de alternativa léxica para δικαιοσύνη, trasladándola a una nota española sobre «justicia/rectitud».
  spanish_consistency_notes:
  - Se conserva «Señor» para κύριος en este pasaje griego de Baruc, en coherencia con el audit trail inglés y sin sustituirlo por «Yahvé» donde el texto fuente no lo exige.
  - Se mantiene el registro penitencial y litúrgico sin modernizar el tono de forma excesiva.
  - «Vergüenza de rostro» reproduce el semitismo subyacente y no lo paraphrasea como mera vergüenza interna.
