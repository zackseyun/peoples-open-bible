review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del hebreo: finalidad (''para que''), conocimiento generacional, contenido introducido por ''que'', causativo de הוֹשַׁבְתִּי (''hice habitar''), referencia temporal al éxodo y fórmula de pacto final. También preserva correctamente יְהוָה como ''Yahvé''. Sin embargo, en español ''sus generaciones'' y ''su Dios'' pueden sonar ambiguos o distantes frente al 2mp directo del hebreo; conviene usar ''sus generaciones futuras'' o mejor ''las generaciones de ustedes''/''sus descendientes'' solo si se quisiera interpretar, pero aquí la forma más fiel y clara es ''las generaciones de ustedes'' o mantener ''sus generaciones'' con mejor entorno. Además, el versículo inicia y termina con segunda persona dirigida a Israel, por lo que una formulación más natural y clara es ''para que sus generaciones sepan...'' pero cerrando con ''su Dios'' es aceptable; aun así, en registro bíblico latinoamericano es más idiomático
    ''Yo soy Yahvé su Dios'' sin coma. La mejora principal necesaria está en la nota al pie, que introduce referencia metatextual innecesaria al inglés POB en vez de centrarse en la alternativa española y el hebreo.'
  spanish_quality_summary: La redacción es generalmente clara y digna. 'Hice habitar a los hijos de Israel en cabañas' es fiel, aunque algo rígida; 'hice que los hijos de Israel habitaran en cabañas' sería más natural pero menos formalmente cercano. 'Cabañas' funciona bien para סֻכּוֹת. La coma en 'Yo soy Yahvé, su Dios' no es necesaria y suena algo enfática/artificial en español. La nota debe limpiarse para adecuarse al estilo del proyecto y evitar explicar decisiones a partir del inglés.
  glossary_alignment: 'Alineación buena con el glosario: יְהוָה → ''Yahvé'' correctamente; בְּנֵי יִשְׂרָאֵל → ''los hijos de Israel'' preserva la decisión corporativa masculina; סֻכּוֹת → ''cabañas'' es una opción válida con nota alternativa. No hay conflicto doctrinal significativo.'
  issues:
  - severity: medium
    issue: Nota al pie dependiente del inglés POB
    rationale: La nota dice 'el inglés POB también permite...', lo cual no pertenece al texto/paratexto final en español. Las notas deben explicar el hebreo y las alternativas españolas relevantes, no remitir al inglés como autoridad visible.
  - severity: low
    issue: Coma innecesaria en la fórmula final
    rationale: '''Yo soy Yahvé, su Dios'' es comprensible, pero en español bíblico natural es preferible ''Yo soy Yahvé su Dios'', más fluido y más cercano a la fórmula de pacto.'
  revised_spanish_text: para que sus generaciones sepan que yo hice habitar a los hijos de Israel en cabañas[a], cuando los saqué de la tierra de Egipto. Yo soy Yahvé su Dios.
  revised_footnotes:
