translation:
  language: es
  text: Así, los hijos de Israel quitaron los Baales y las Astarot[a], y sirvieron solamente a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «adoraron solamente a Yahvé». El verbo hebreo puede denotar tanto servicio como adoración cuando Dios es el objeto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּסִירוּ
  english_pob_choice: removed
  chosen_spanish: quitaron
  alternatives_spanish:
  - removieron
  - apartaron
  - sacaron
  lexicon: HALOT
  rationale: El verbo hebreo indica una acción concreta de quitar o eliminar. «Quitar» es natural en español y conserva la idea de deshacerse de los ídolos sin volverlo demasiado interpretativo.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión más literal del hebreo, «hijos de Israel», que en español sigue siendo inteligible y mantiene el tono covenantal/etnónimo del texto.
- source_word: הַבְּעָלִים
  english_pob_choice: the Baals
  chosen_spanish: los Baales
  alternatives_spanish:
  - los ídolos de Baal
  - las imágenes de Baal
  lexicon: HALOT
  rationale: Se preserva el plural hebreo como nombre cultual, «Baales», en vez de explicarlo como imágenes o ídolos, porque el texto no especifica más allá del plural.
- source_word: הָעַשְׁתָּרֹת
  english_pob_choice: the Ashtaroths
  chosen_spanish: las Astartes
  alternatives_spanish:
  - las Astarté(s)
  - las Ashtarot
  lexicon: HALOT
  rationale: «Astartes» transmite el referente cultual femenino y mantiene la pluralidad del hebreo. Se evita una traducción explicativa que borraría el nombre específico.
- source_word: וַיַּעַבְדוּ
  english_pob_choice: served
  chosen_spanish: sirvieron
  alternatives_spanish:
  - adoraron
  - rindieron servicio
  lexicon: HALOT
  rationale: Como en el audit trail inglés, עבד con Dios como objeto puede abarcar servicio y culto. «Sirvieron» conserva la base léxica y permite que el matiz de adoración quede implícito sin perder la amplitud del verbo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el principio del proyecto de traducir el Tetragrámaton como «Yahvé», preservando el nombre divino personal en lugar de sustituirlo por un título.
- source_word: לְבַדּוֹ
  english_pob_choice: alone
  chosen_spanish: solo
  alternatives_spanish:
  - solamente
  - únicamente
  lexicon: HALOT
  rationale: '«Solo» comunica con claridad la exclusividad de la devoción: no a Yahvé junto con otros dioses, sino exclusivamente a él.'
theological_decisions:
- issue: El alcance de עבד cuando Dios es el objeto
  english_pob_reading: served Yahweh alone
  chosen_spanish_reading: sirvieron a Yahvé solo
  alternative_spanish_readings:
  - adoraron a Yahvé solo
  - sirvieron/adoraron a Yahvé solo
  rationale: La elección principal mantiene la estructura verbal «servir» para no estrechar el sentido a adoración litúrgica únicamente. Sin embargo, el contexto de renunciar a Baales y Astartes hace legítimo recordar el matiz de culto; por eso se conserva en nota la alternativa.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: La forma de expresar el nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el nombre propio de Dios. En español, «Yahvé» mantiene esa referencialidad y evita la sustitución reverencial por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: Se revisó el paralelo inglés y no se detectaron cambios posteriores relevantes; la redacción española sigue la decisión establecida de mantener el valor léxico de עבד como «servir» y de conservar el nombre divino como «Yahvé».
  spanish_consistency_notes:
  - «Yahvé» se mantiene como forma estándar para יְהוָה en el texto principal.
  - Se preserva la pluralidad cultual de «Baales» y «Astartes» sin explicaciones intrusivas.
  - El verbo «sirvieron» conserva la amplitud semántica de עבד; la nota ofrece la alternativa cultual sin imponerla en el texto base.
