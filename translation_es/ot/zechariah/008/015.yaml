translation:
  language: es
  text: Así que he vuelto y he resuelto en estos días hacer bien a Jerusalén y a la casa de Judá[a]. No teman.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Así he vuelto otra vez y he planeado en estos días hacer bien a Jerusalén y a la casa de Judá».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֵּן
  english_pob_choice: So / So now
  chosen_spanish: Así que
  alternatives_spanish:
  - Por tanto
  - Entonces
  - Así
  lexicon: HALOT
  rationale: El hebreo introduce una conclusión o transición desde el contraste previo. «Así que» comunica bien esa fuerza resumitiva en español sin añadir un matiz temporal que el texto no exige.
- source_word: שַׁבְתִּי
  english_pob_choice: I have returned
  chosen_spanish: me he vuelto
  alternatives_spanish:
  - he retornado
  - me he vuelto de nuevo
  - he regresado
  lexicon: HALOT
  rationale: El verbo שוב aquí conserva la imagen de volverse/retornar en un cambio de propósito. «Me he vuelto» mantiene esa metáfora con naturalidad en español y permite el paralelo con el giro del juicio al bien.
- source_word: זָמַמְתִּי
  english_pob_choice: purposed
  chosen_spanish: he resuelto
  alternatives_spanish:
  - he pensado
  - he planeado
  - he determinado
  lexicon: HALOT
  rationale: El verbo expresa intención deliberada. «He resuelto» comunica decisión firme y seria en un registro bíblico natural, sin el matiz más frío o meramente técnico de «he planeado».
- source_word: בַּיָּמִים הָאֵלֶּה
  english_pob_choice: in these days
  chosen_spanish: en estos días
  alternatives_spanish:
  - ahora
  - en este tiempo
  - en estos días ahora
  lexicon: HALOT
  rationale: La frase temporal se traduce de forma directa y sobria. «En estos días» conserva el sabor profético e histórico del hebreo.
- source_word: לְהֵיטִיב
  english_pob_choice: to do good
  chosen_spanish: hacer bien
  alternatives_spanish:
  - tratar bien
  - obrar para bien de
  - beneficiar
  lexicon: HALOT
  rationale: El hifil de יטב significa actuar en beneficio de alguien. «Hacer bien» es una solución breve y fiel que suena natural en español bíblico.
- source_word: יְרוּשָׁלַם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalem
  lexicon: Standard proper noun
  rationale: Nombre propio estándar en español.
- source_word: בֵּית יְהוּדָה
  english_pob_choice: the house of Judah
  chosen_spanish: la casa de Judá
  alternatives_spanish:
  - la familia de Judá
  - el pueblo de Judá
  - Judá
  lexicon: HALOT
  rationale: Se conserva la expresión corporativa y de pacto «casa de Judá», más transparente que reducirla a «Judá» sin el sustantivo בית.
- source_word: אַל תִּירָאוּ
  english_pob_choice: Do not fear
  chosen_spanish: No teman
  alternatives_spanish:
  - No tengan miedo
  - No teman ustedes
  - No os asustéis
  lexicon: HALOT
  rationale: El imperativo plural negativo se expresa de forma directa y sobria. «No teman» mantiene el tono profético sin añadir explicaciones.
theological_decisions:
- issue: Reversión divina desde el juicio hacia el bien prometido
  english_pob_reading: I have returned and purposed ... to do good
  chosen_spanish_reading: me he vuelto y he resuelto ... hacer bien
  alternative_spanish_readings:
  - me he vuelto y he pensado ... hacer bien
  - he retornado y he determinado ... hacer bien
  rationale: El versículo contrasta la intención previa de juicio con la voluntad presente de bendecir. La traducción conserva ese giro del propósito divino sin exagerarlo con categorías teológicas ajenas al hebreo explícito.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: 'Se atendió la revisión más reciente del audit trail: se evitó añadir un equivalente de ''now'' que no está en el hebreo. También se mantuvo una formulación sobria y pública, apta para lectura eclesial, sin perder la fuerza del giro verbal de שוב y זמם.'
  spanish_consistency_notes:
  - Se usa «Jerusalén» y «la casa de Judá» de manera consistente con la terminología bíblica estándar en español.
  - Se eligió «No teman» para reflejar el plural imperativo hebreo sin sobrecargar la frase.
  - La combinación «me he vuelto y he resuelto» intenta preservar tanto el movimiento de retorno como la intención deliberada del original.
