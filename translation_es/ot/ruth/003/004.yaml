translation:
  language: es
  text: Entonces, cuando él se acueste, fíjate en el lugar donde se acuesta. Luego ve, descubre sus pies[a] y acuéstate[b]; y él te dirá lo que debes hacer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «el lugar junto a sus pies» o «la parte baja de su cuerpo»; la expresión hebrea puede referirse más específicamente al área alrededor de los pies que a los pies mismos.
    reason: lexical_alternative
  - marker: b
    text: La forma hebrea escrita dice «y yo me acostaré», pero el contexto y la lectura tradicional entienden «y tú te acostarás».
    reason: textual_variant
lexical_decisions:
- source_word: וִיהִי
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y será
  - Y acontecerá
  - Y sucederá
  lexicon: HALOT
  rationale: La forma prefijada de היה introduce aquí la siguiente acción de la secuencia; en español, «Entonces» comunica con naturalidad ese avance narrativo e instructivo.
- source_word: בְשָׁכְבוֹ
  english_pob_choice: when he lies down
  chosen_spanish: cuando él se acueste
  alternatives_spanish:
  - cuando se haya acostado
  - al acostarse
  - cuando yace
  lexicon: HALOT
  rationale: El infinitivo con ב expresa tiempo. «Cuando él se acueste» conserva el valor temporal y suena natural en español.
- source_word: וְיָדַעַתְּ
  english_pob_choice: note
  chosen_spanish: conocerás
  alternatives_spanish:
  - notarás
  - observarás
  - sabrás
  lexicon: HALOT
  rationale: 'ידע puede significar «conocer/saber», pero aquí el contexto es práctico: identificar el lugar. «Conocerás» mantiene el sentido de llegar a saber cuál es el lugar sin forzar un giro demasiado explicativo.'
- source_word: אֶת הַמָּקוֹם
  english_pob_choice: the place
  chosen_spanish: el lugar
  alternatives_spanish:
  - el sitio
  - la ubicación
  lexicon: HALOT
  rationale: מקום se traduce de manera directa por «lugar», que es neutral y consistente.
- source_word: אֲשֶׁר יִשְׁכַּב שָׁם
  english_pob_choice: where he lies
  chosen_spanish: donde se acuesta
  alternatives_spanish:
  - donde él se acuesta
  - donde va a acostarse
  lexicon: HALOT
  rationale: La cláusula relativa identifica el sitio donde dormirá. «Donde se acuesta» conserva la referencia al acto de acostarse sin añadir más de lo que el hebreo dice.
- source_word: וּבָאת
  english_pob_choice: Then go
  chosen_spanish: Entra
  alternatives_spanish:
  - Ve
  - Entonces ve
  - Y entra
  lexicon: HALOT
  rationale: Desde la perspectiva del mandato dado a Rut, בוא puede expresarse naturalmente como «entra» en este contexto narrativo, enfatizando que ella debe acercarse al lugar donde está Boaz. La secuencia ya queda marcada por «Entonces».
- source_word: וְגִלִּית
  english_pob_choice: uncover
  chosen_spanish: descubre
  alternatives_spanish:
  - destapa
  - descubre el lugar de
  - desnuda
  lexicon: HALOT
  rationale: גלה en este contexto significa literalmente «descubrir / quitar la cobertura». «Descubre» es fiel y evita un calco torpe o una connotación más fuerte de la necesaria.
- source_word: מַרְגְּלֹתָיו
  english_pob_choice: his feet
  chosen_spanish: sus pies
  alternatives_spanish:
  - el lugar de sus pies
  - la parte baja de su cuerpo
  - sus piernas
  lexicon: HALOT
  rationale: El término puede referirse a los pies o al área cercana a ellos. «Sus pies» es la versión más directa y defendible en español, conservando la ambigüedad conocida del hebreo.
- source_word: וְשָׁכָבְתִּי
  english_pob_choice: and lie down
  chosen_spanish: y acuéstate
  alternatives_spanish:
  - y te acuestas
  - y te echarás
  - y tú te acuestas
  lexicon: HALOT
  rationale: 'Aunque la forma escrita hebrea refleja «y yo me acostaré», el contexto y la lectura tradicional apuntan a la 2.ª persona femenina: Ruth. En español debe reflejarse la instrucción esperada: «acuéstate».'
- source_word: וְהוּא יַגִּיד לָךְ
  english_pob_choice: and he will tell you
  chosen_spanish: y él te dirá
  alternatives_spanish:
  - y él te explicará
  - y te dirá
  lexicon: HALOT
  rationale: נגד en Hiphil significa «decir / declarar / informar». «Te dirá» es natural y exacto, preservando la sencillez del hebreo.
- source_word: אֵת אֲשֶׁר תַּעַשִׂין
  english_pob_choice: what you should do
  chosen_spanish: lo que debes hacer
  alternatives_spanish:
  - lo que harás
  - lo que has de hacer
  - lo que debes hacer
  lexicon: HALOT
  rationale: La cláusula expresa una instrucción. «Debes hacer» comunica bien el carácter directivo sin convertirlo en una simple predicción futura.
theological_decisions:
- issue: Ambigüedad sexual o no sexual de la acción de descubrir los pies y acostarse
  english_pob_reading: Retain the literal wording without making the action explicitly sexual or explicitly innocent in the main text.
  chosen_spanish_reading: Mantener el lenguaje literal sin aclarar en el texto principal si la acción es sexual o solo práctica.
  alternative_spanish_readings:
  - Interpretar el gesto como una insinuación sexual explícita
  - Interpretarlo como un acto puramente práctico para despertar a Boaz
  rationale: El hebreo conserva una ambigüedad narrativa que no conviene resolver por anticipado. La traducción española mantiene esa tensión al usar un lenguaje literal y sobrio.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no hubo cambios requeridos en el audit trail inglés, y la versión española sigue la misma decisión de conservar la ambigüedad léxica y la variante textual sin resolverlas en exceso.'
  spanish_consistency_notes:
  - Se mantuvo «pies» como término principal, con nota que preserva la amplitud semántica del hebreo.
  - Se eligió «acuéstate» para reflejar la lectura contextual de la segunda persona femenina, mientras la nota conserva la forma escrita hebrea.
  - El registro es neutro y bíblico, evitando arcaísmos innecesarios y sin perder dignidad.
  - «Entonces» marca la secuencia narrativa sin añadir interpretación no sustentada.
