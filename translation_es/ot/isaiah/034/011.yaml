revisions:
- from: La lechuza del desierto y el erizo poseerán[a] esa tierra, y la lechuza[b] y el cuervo habitarán en ella; él extenderá sobre ella la cuerda de medir de la desolación y las piedras de plomada del vacío.
  to: La lechuza del desierto y el erizo[a] tomarán posesión de ella, y la lechuza y el cuervo habitarán en ella; él extenderá sobre ella la cuerda de medir de la desolación y las piedras de plomada del vacío[b].
  rationale: Se reubicaron las notas para que correspondan exactamente a los elementos que explican; se sustituyó 'poseerán esa tierra' por 'tomarán posesión de ella' para conservar el pronombre femenino del hebreo sin producir un español forzado; y se mantuvo el resto de las decisiones léxicas y teológicas ya bien fundadas en la auditoría POB.
