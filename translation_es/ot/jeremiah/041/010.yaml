translation:
  language: es
  text: Entonces Ismael tomó cautivos[a] a todo el remanente del pueblo que estaba en Mizpa —las hijas del rey y toda la gente que había quedado en Mizpa, a quienes Nebuzaradán, el capitán de la guardia, había encomendado a Gedalías hijo de Ahicam—. Ismael hijo de Netanías los tomó cautivos y se fue para cruzar hacia los amonitas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «llevó cautivos». El verbo hebreo enfatiza la captura y el traslado a cautiverio.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «los hijos de Amón», es decir, los amonitas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁבְּ / וַיִּשְׁבֵּם
  english_pob_choice: took captive / took them captive
  chosen_spanish: tomó cautivos
  alternatives_spanish:
  - llevó cautivos
  - capturó
  - hizo cautivos
  lexicon: HALOT
  rationale: שׁבה en este contexto expresa una captura violenta que lleva a cautiverio. «Tomó cautivos» conserva esa fuerza y evita suavizar el verbo con «tomó» a secas. La repetición del sentido en la segunda cláusula mantiene el énfasis hebreo.
- source_word: שְׁאֵרִית הָעָם
  english_pob_choice: the remnant of the people
  chosen_spanish: todo el remanente del pueblo
  alternatives_spanish:
  - el resto del pueblo
  - el resto de la gente
  - los supervivientes del pueblo
  lexicon: HALOT
  rationale: «Remanente» preserva el valor lexical y temático de שְׁאֵרִית en Jeremías mejor que «resto». Se mantiene el matiz de los que han quedado con vida o han sobrevivido a la catástrofe.
- source_word: בַּמִּצְפָּה
  english_pob_choice: in Mizpah
  chosen_spanish: en Mizpa
  alternatives_spanish:
  - en Mispá
  - en Mizpá
  lexicon: HALOT
  rationale: Se translitera el topónimo como nombre propio, con la forma usada de modo amplio en español bíblico. La preposición «en» conserva la localización espacial del hebreo.
- source_word: בְּנוֹת הַמֶּלֶךְ
  english_pob_choice: the king’s daughters
  chosen_spanish: las hijas del rey
  alternatives_spanish:
  - las hijas reales
  - las princesas
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «hijas del rey». «Las hijas del rey» es transparente y fiel, sin convertirlo en un título más interpretativo como «princesas».
- source_word: הַנִּשְׁאָרִים
  english_pob_choice: who were left
  chosen_spanish: que habían quedado
  alternatives_spanish:
  - que quedaron
  - los que quedaron
  - los sobrevivientes
  lexicon: HALOT
  rationale: El participio comunica a los que quedaron después del desastre. En español, «habían quedado» encaja naturalmente con el pasado narrativo y refleja el estado resultante.
- source_word: הִפְקִיד
  english_pob_choice: had entrusted
  chosen_spanish: había encomendado
  alternatives_spanish:
  - había puesto a cargo de
  - había confiado a
  - había encargado a
  lexicon: HALOT
  rationale: En este contexto Nebuzaradán pone a estas personas bajo la responsabilidad de Gedalías. «Encomendado» transmite bien la idea de confiar algo o alguien a la custodia/gestión de otro, sin añadir gobierno explícito donde el hebreo solo dice la entrega o comisión.
- source_word: רַב טַבָּחִים
  english_pob_choice: the captain of the guard
  chosen_spanish: el capitán de la guardia
  alternatives_spanish:
  - el jefe de la guardia
  - el capitán de los guardias
  - el jefe de los ejecutores
  lexicon: HALOT
  rationale: Aunque el hebreo puede relacionarse etimológicamente con «degollar/cortar», en el contexto la función es la de un oficial superior de la guardia real. «Capitán de la guardia» comunica el cargo de manera idiomática y evita una traducción engañosamente literal.
- source_word: לַעֲבֹר אֶל
  english_pob_choice: to cross over to
  chosen_spanish: para pasar a
  alternatives_spanish:
  - para cruzar a
  - para ir a
  - para pasar hacia
  lexicon: HALOT
  rationale: עבר con אל expresa movimiento hacia otro lugar. «Pasar a» conserva la noción de traslado y permite una lectura natural en español, sin sobreespecificar el tipo de cruce.
- source_word: בְּנֵי עַמּוֹן
  english_pob_choice: the Ammonites
  chosen_spanish: los amonitas
  alternatives_spanish:
  - los hijos de Amón
  - los hijos de Ammón
  - el pueblo de Amón
  lexicon: HALOT
  rationale: «Amonitas» es el etnónimo natural en español y corresponde al uso idiomático del hebreo בני עמון. Se evita una traducción más literal que suena menos fluida en el texto corrido.
theological_decisions:
- issue: El matiz de captura violenta frente a una simple conducción
  english_pob_reading: took captive / took them captive
  chosen_spanish_reading: tomó cautivos / los tomó cautivos
  alternative_spanish_readings:
  - los llevó cautivos
  - los capturó
  rationale: No se debe diluir la violencia del verbo hebreo. «Tomó cautivos» mantiene la idea de captura con sometimiento, coherente con el relato de agresión y secuestro implícito en el pasaje.
  doctrine_reference: Lexical/theological force of captivity in narrative Hebrew; no doctrinal article is implicated.
- issue: Identificación del oficio de Nebuzaradán
  english_pob_reading: the captain of the guard
  chosen_spanish_reading: el capitán de la guardia
  alternative_spanish_readings:
  - el jefe de la guardia
  - el jefe de los ejecutores
  rationale: Se conserva la función oficial reconocida por el contexto histórico sin amplificarla con una lectura más oscura del título. Esto evita una tensión innecesaria entre etimología y uso contextual.
  doctrine_reference: Historical-title rendering; no doctrinal article is implicated.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el pasaje base; el control de revisión más reciente indica acuerdo alto y sin cambios necesarios. La redacción española sigue ese estado estable, con decisiones léxicas alineadas al audit trail inglés y al hebreo fuente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «Mizpa» como topónimo transliterado de forma consistente.
  - Se conserva «remanente» para שְׁאֵרִית a fin de mantener la red temática de Jeremías.
  - Se prefiere «amonitas» por naturalidad idiomática, con nota que preserva la literalidad hebrea.
  - La puntuación con dos puntos replica bien la enumeración interna del hebreo sin añadir contenido interpretativo.
