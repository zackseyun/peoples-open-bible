review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego: ἠρήμωσαν = ruina/devastación del trono de David; ἐν ὑπερηφανίᾳ ἀλλάγματος se refleja adecuadamente como usurpación arrogante; ἀλλά se capta con contraste; καταβαλεῖς y ἀρεῖς se mantienen en futuro conforme al texto griego y al estado final del audit trail inglés. Sin embargo, «quitarás su descendencia de la tierra» suena menos natural y algo ambiguo en español que una formulación con «arrancarás/eliminarás de la tierra» o, mejor, reordenando a «quitarás de la tierra a su descendencia».'
  spanish_quality_summary: El texto es legible y digno, pero requiere un ajuste menor de naturalidad sintáctica. «Destruyeron» es aceptable, aunque «arrasaron» o «devastaron» se acercarían más a «laid waste»; no obstante, no hace falta forzar cambio. La principal mejora necesaria es evitar la construcción poco idiomática «quitarás su descendencia de la tierra».
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Dios» es correcto para ὁ θεός. «Descendencia» para σπέρμα está bien. «Usurpación» respeta la decisión léxica documentada. No hay términos teológicos especiales incumplidos.
  issues:
  - severity: medium
    issue: Construcción poco natural en «quitarás su descendencia de la tierra»
    rationale: Aunque semánticamente comprensible, en español suena más idiomático «quitarás de la tierra a su descendencia» o una alternativa equivalente. La revisión mejora claridad sin alterar el sentido fuente.
  - severity: low
    issue: Nota b no refleja bien la alternativa inglesa documentada
    rationale: La nota inglesa preserva la posibilidad de leer la secuencia verbal como una construcción más estrecha («will cast them down and remove»). La nota española actual introduce solo «removerás» y una explicación del futuro, que no corresponde exactamente a la razón de la nota auditada. Conviene ajustar o suprimir la nota; aquí se ajusta para mantener la alternativa previa documentada.
  revised_spanish_text: Destruyeron el trono de David con arrogante usurpación[a]. Pero tú, oh Dios, los derribarás y quitarás de la tierra a su descendencia[b].
  revised_footnotes:
  - marker: a
    text: O «con la arrogancia del reemplazo». El griego es compacto; «usurpación» explicita el sentido político probable.
    reason: lexical_alternative
  - marker: b
    text: O «los derribarás y quitarás».
    reason: previous_rendering
  revision_rationale: 'Se mantiene la estructura y las decisiones léxicas principales del borrador, pero se corrige la sintaxis de «quitarás su descendencia de la tierra» a una forma más natural en español: «quitarás de la tierra a su descendencia». También se ajusta la nota b para alinearla con la nota inglesa auditada, evitando una explicación redundante sobre el futuro verbal.'
