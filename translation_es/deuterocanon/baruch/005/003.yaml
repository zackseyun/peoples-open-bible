  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: Dios es el sujeto, δείξει se traduce adecuadamente como «mostrará», y «tu esplendor» preserva correctamente τὴν σὴν λαμπρότητα con la nota léxica pertinente. Sin embargo, «a todos los que están bajo el cielo» añade una cláusula relativa no presente en el original y suena más pesado que la expresión idiomática griega τῇ ὑπʼ οὐρανὸν πάσῃ, mejor reflejada por «a todos bajo el cielo» o equivalente.'
  spanish_quality_summary: El español es claro y digno, pero la secuencia «a todos los que están bajo el cielo» resulta algo explicativa y menos natural/literaria que una formulación más directa. También conviene anclar la nota [a] al término discutido léxicamente («esplendor») y no al verbo «mostrará».
