translation:
  language: es
  text: Y los haré una sola nación en la tierra[a], en los montes de Israel; y un solo rey será rey de todos ellos.[b] Ya no serán dos naciones, y ya no estarán divididos en dos reinos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en la región montañosa de Israel».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «y un rey será para todos ellos como rey», con repetición para énfasis.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתִי
  english_pob_choice: And I will make
  chosen_spanish: Y los haré
  alternatives_spanish:
  - Y los haré llegar a ser
  - Y los formaré
  lexicon: HALOT
  rationale: El verbo עשה con complemento y la preposición de resultado expresa aquí una acción divina de constituirlos en una nueva unidad. En español, «haré» mantiene la causación divina con naturalidad y sin añadir contenido ajeno al texto.
- source_word: אֹתָם
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  lexicon: HALOT
  rationale: El pronombre directo retoma al pueblo dividido mencionado en el contexto inmediato. «Los» es la forma directa y natural en español para conservar la referencia objetiva.
- source_word: לְגוֹי אֶחָד
  english_pob_choice: one nation
  chosen_spanish: un solo pueblo
  alternatives_spanish:
  - una sola nación
  - un único pueblo
  lexicon: HALOT
  rationale: Aunque גוי suele equivaler a «nación», en español «pueblo» comunica mejor la unidad colectiva en un registro bíblico readable. Se conserva el valor de unidad con «un solo», y se evita una repetición rígida de «nación» que en español puede sonar más política que comunitaria. La alternativa «nación» sigue siendo posible, pero el contexto de reunión del pueblo favorece «pueblo».
- source_word: בָּאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - en la tierra prometida
  lexicon: HALOT
  rationale: En Ezequiel, הארץ alude al territorio pactal de Israel. «En la tierra» conserva esa amplitud bíblica y el vínculo con la promesa, sin precisar más de lo que el hebreo exige.
- source_word: בְּהָרֵי יִשְׂרָאֵל
  english_pob_choice: on the mountains of Israel
  chosen_spanish: en los montes de Israel
  alternatives_spanish:
  - en la región montañosa de Israel
  - sobre los montes de Israel
  lexicon: HALOT
  rationale: Se mantiene la imagen topográfica característica de Ezequiel. «Montes» reproduce con dignidad la expresión y resulta más transparente que una paráfrasis geográfica.
- source_word: וּמֶלֶךְ אֶחָד יִהְיֶה לְכֻלָּם לְמֶלֶךְ
  english_pob_choice: and one king will be king over all of them
  chosen_spanish: y un solo rey será rey de todos ellos
  alternatives_spanish:
  - y un rey los gobernará a todos
  - y un solo rey será para todos ellos como rey
  lexicon: HALOT
  rationale: El hebreo repite «rey» para dar énfasis. La repetición en español —«será rey»— preserva ese relieve nominal mejor que reemplazarlo por un verbo como «gobernará».
- source_word: וְלֹא יִהְיֶה עוֹד לִשְׁנֵי גוֹיִם
  english_pob_choice: They will no longer be two nations
  chosen_spanish: No serán ya dos naciones
  alternatives_spanish:
  - No volverán a ser dos naciones
  - Ya no serán dos naciones
  lexicon: HALOT
  rationale: Se mantiene el plural por referencia al pueblo reunificado, aunque el hebreo usa una formulación singular colectiva. «No serán ya» expresa bien la negación permanente que intensifica עוֹד.
- source_word: וְלֹא יֵחָצוּ
  english_pob_choice: and they will no longer be divided
  chosen_spanish: ni estarán divididos
  alternatives_spanish:
  - ni se dividirán
  - ni volverán a dividirse
  lexicon: HALOT
  rationale: 'El nifal de חצה tiene aquí sentido pasivo: no serán partidos o divididos. «Estarán divididos» es idiomático en español y conserva la pasividad sin perder claridad.'
- source_word: לִשְׁתֵּי מַמְלָכוֹת
  english_pob_choice: into two kingdoms
  chosen_spanish: en dos reinos
  alternatives_spanish:
  - como dos reinos
  - en dos monarquías
  lexicon: HALOT
  rationale: Aunque el verbo implícitamente sugiere división «en» dos reinos, en español la preposición simple transmite la estructura resultante sin forzar una construcción artificial.
theological_decisions:
- issue: Identidad del rey prometido
  english_pob_reading: Render the promise in straightforward national and royal terms without importing later messianic interpretation into the verse itself.
  chosen_spanish_reading: Traducir en términos nacionales y reales directos, sin introducir en el texto principal una identificación mesiánica no explicitada aquí.
  alternative_spanish_readings:
  - Dar al texto una formulación explícitamente mesiánica
  - Espiritualizar la unión como imagen no política
  rationale: El versículo habla de una reunificación de pueblo, tierra y realeza. No nombra al rey como Mesías ni exige espiritualizar la promesa; por eso la traducción debe preservar la tensión profética tal como está en el hebreo.
  doctrine_reference: Preservar la tensión teológica sin resolverla prematuramente.
translation_notes:
  revision_awareness: La versión sigue de cerca el texto hebreo y el audit trail inglés, conservando la repetición de «rey» y la negación intensiva de עוֹד. Se ajustó «one nation» a «un solo pueblo» por naturalidad y por el contexto de reunificación comunitaria, manteniendo la nota sobre la alternativa topográfica de «montes».
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto solo cuando el tetragrámaton aparezca explícitamente; en este versículo no aparece.
  - Se mantiene «pueblo» para גוי en este contexto, pero se conserva la nota de alternativa para no borrar la opción «nación» donde la repetición inglesa la favorecía.
  - «Rey» se repite para reproducir el énfasis nominal del hebreo.
  - La negación con «ya no»/«no serán ya» refleja la fuerza de עוֹד como cese definitivo.
