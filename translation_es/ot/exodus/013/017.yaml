  to: 'Cuando el faraón dejó salir al pueblo, Dios no los condujo por el camino de la tierra de los filisteos[a], aunque estaba cerca; porque Dios dijo[b]: «No sea que el pueblo cambie de parecer cuando vean la guerra y vuelvan a Egipto»'
  rationale: Se ajusta la redacción para mejorar la naturalidad del español («estaba cerca»), se corrige la ubicación y el contenido de la nota alternativa para reflejar la ambigüedad real de כִּי, y se hace más clara la referencia colectiva del pueblo con verbos en plural en la cláusula final. El sentido fuente y la lógica teológica permanecen intactos.
