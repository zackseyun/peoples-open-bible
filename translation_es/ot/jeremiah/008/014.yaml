base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/008/014.yaml
  text: Why are we sitting still? Gather yourselves[a], and let us enter the fortified cities and perish there, for Yahweh our God has doomed us and given us poisoned water to drink[b], because we have sinned against Yahweh.
  footnotes:
