translation:
  language: es
  text: 'y dijo[a]: «Por mí mismo he jurado, declara Yahvé, porque has hecho esto y no has retenido a tu hijo[b], a tu hijo único».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “te dijo”. El hebreo continúa el relato con una forma verbal narrativa que puede expresarse de ambas maneras en español.
    reason: lexical_alternative
  - marker: b
    text: O “no has escatimado”. El verbo hebreo puede significar “retener”, “guardar para sí” o, en el contexto, “no escatimar”.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: and said
  chosen_spanish: y dijo
  alternatives_spanish:
  - y él dijo
  lexicon: HALOT
  rationale: La forma waw consecutiva continúa la narración; en español es natural omitir el sujeto explícito cuando el contexto ya lo identifica.
- source_word: בִּי
  english_pob_choice: By myself
  chosen_spanish: Por mí mismo
  alternatives_spanish:
  - Por mí
  lexicon: HALOT
  rationale: En fórmulas de juramento, la expresión indica que el hablante jura por su propia persona. 'Por mí mismo' comunica de forma clara e idiomática ese valor en español.
- source_word: נִשְׁבַּעְתִּי
  english_pob_choice: I have sworn
  chosen_spanish: he jurado
  alternatives_spanish:
  - juro
  - he hecho un juramento
  lexicon: HALOT
  rationale: El perfecto expresa un juramento ya pronunciado con vigencia solemne en el contexto. 'He jurado' conserva mejor el matiz que un presente simple.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: נְאֻם es una fórmula declarativa/profética. 'Declara Yahvé' mantiene el tono solemne y sigue el criterio del proyecto para el nombre divino.
- source_word: כִּי יַעַן אֲשֶׁר
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - puesto que
  lexicon: HALOT
  rationale: La combinación intensifica la causalidad; en español, una sola conjunción causal expresa naturalmente el valor sin redundancia.
- source_word: עָשִׂיתָ אֶת הַדָּבָר הַזֶּה
  english_pob_choice: you have done this thing
  chosen_spanish: has hecho esto
  alternatives_spanish:
  - has hecho esta cosa
  - has hecho este asunto
  lexicon: HALOT
  rationale: דָּבָר puede ser 'palabra', 'asunto' o 'cosa'; aquí refiere a la acción concreta de obediencia. 'Esto' es más natural en español y conserva la referencia demostrativa.
- source_word: וְלֹא חָשַׂכְתָּ
  english_pob_choice: and have not withheld
  chosen_spanish: no has retenido
  alternatives_spanish:
  - no has contenido
  - no has apartado
  lexicon: HALOT
  rationale: חָשַׂךְ puede significar retener, contener o no escatimar. 'No has retenido' comunica bien el sentido de no guardar para sí ni rehusar entregar.
- source_word: בִּנְךָ
  english_pob_choice: your son
  chosen_spanish: tu hijo
  alternatives_spanish:
  - tu hijo varón
  - tu hijo
  lexicon: HALOT
  rationale: Término filial directo; 'hijo' es el equivalente normal y claro en español.
- source_word: יְחִידֶךָ
  english_pob_choice: your only son
  chosen_spanish: tu hijo único
  alternatives_spanish:
  - tu único hijo
  - tu único
  lexicon: HALOT
  rationale: El adjetivo expresa unicidad o condición de único. Como ya se mencionó 'tu hijo', la forma 'tu hijo único' reproduce el valor apposicional de manera natural en español.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo contiene el Tetragrámaton directamente. Se preserva el nombre propio divino como 'Yahvé', conforme al criterio del proyecto, en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Force of יְחִידֶךָ in apposition to בִּנְךָ
  english_pob_reading: your only son
  chosen_spanish_reading: tu hijo único
  alternative_spanish_readings:
  - tu único hijo
  - tu único
  rationale: La secuencia hebrea subraya la cualidad de único/solo en relación con el hijo ya mencionado. 'Tu hijo único' mantiene la relación sintáctica y evita añadir una interpretación afectiva no explicitada por el texto.
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: 'El borrador sigue el acuerdo alto del audit trail inglés y adopta la revisión más reciente en la frase final como base semántica: ''your only son'' se refleja aquí como ''tu hijo único'' para claridad y naturalidad en español, manteniendo la estructura hebrea con ''tu hijo'' + adjetivo de unicidad.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente con el estándar del proyecto para el nombre divino.
  - Se conserva un registro solemne y bíblico sin recurrir a 'SEÑOR' como sustituto del Tetragrámaton.
  - Se prefiere 'retener' para חָשַׂךְ por su neutralidad semántica en español, dejando 'escatimar' como alternativa en nota.
  - La puntuación y las comillas siguen el uso editorial de español moderno y lectura pública.
