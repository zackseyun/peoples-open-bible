revisions:
- from: Y Jonathan y Simón llevaron a Judas, su hermano, y lo sepultaron en el sepulcro de sus padres, en Modeín[a][b].
  to: Entonces Jonatán y Simón llevaron a Judas, el hermano de ambos,[a] y lo sepultaron en el sepulcro de sus padres en Modeín.[b]
  rationale: Se ajusta la frase de parentesco para reflejar claramente el sentido colectivo reconocido por la auditoría inglesa; se corrige la nota sobre Modeín para que preserve una alternativa real en español; y se mejora la naturalidad con «Jonatán» y «Entonces» sin apartarse del griego.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:38:38Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'La traducción española sigue bien el sentido general del griego: Jonathan y Simón transportan el cuerpo de Judas y lo sepultan en la tumba familiar en Modeín. Sin embargo, dos puntos requieren ajuste para alinearse mejor con la evidencia y la auditoría inglesa: (1) el griego singular αὐτοῦ con sujeto compuesto se resolvió en inglés como ''their brother''; en español, «su hermano» sigue siendo ambiguo y no expresa con suficiente claridad el sentido colectivo; (2) la nota b en inglés preserva la alternativa de preposición (''at/in Modein''), pero la nota española actual repite la lectura principal en vez de ofrecer la alternativa real.'
  spanish_quality_summary: El borrador es legible y digno, con buen registro bíblico. «Llevaron», «sepultaron» y «sepulcro» son elecciones naturales y fieles. No obstante, «Y Jonathan» suena algo menos idiomático que «Entonces Jonathan», y «su hermano» deja una ambigüedad referencial evitable. También conviene normalizar el nombre a «Jonatán» para mayor naturalidad en español eclesial amplio.
  glossary_alignment: 'No hay términos teológicos de alto riesgo aquí. Las decisiones principales encajan con las pautas del proyecto. La única observación terminológica es onomástica: «Jonatán» es preferible a «Jonathan» en español neutral eclesial. «Modeín» y «sepulcro» son aceptables.'
  issues:
  - severity: medium
    issue: «su hermano» no refleja con suficiente claridad el sentido colectivo de αὐτοῦ con sujeto compuesto.
    rationale: La auditoría inglesa justificó explícitamente 'their brother' para evitar referencia singular engañosa. En español, «su hermano» puede sonar como si perteneciera solo al antecedente más cercano. «El hermano de ambos» o «su hermano de ellos» comunica mejor el valor colectivo.
  - severity: medium
    issue: La nota [b] no conserva la alternativa documentada por el inglés.
    rationale: El inglés dice 'Or “in Modein.”' porque la principal es 'at Modein'. En español la principal ya es «en Modeín», así que la alternativa relevante debe ser «También puede traducirse “en/por Modeín”» solo si la principal cambiara; tal como está, la nota repite la lectura principal y no aporta información.
  - severity: low
    issue: «Jonathan» es menos natural que «Jonatán» en español bíblico general.
    rationale: Aunque la transliteración puede defenderse, la forma hispanizada «Jonatán» mejora la legibilidad y suena más natural para el público objetivo sin pérdida de fidelidad.
  - severity: low
    issue: El inicio con «Y Jonathan...» es algo rígido en español.
    rationale: La conjunción καὶ puede verterse como simple «Y», pero en narrativa española «Entonces» o incluso omitir la conjunción suele leerse mejor. Aquí «Entonces» conserva la continuidad narrativa con mayor naturalidad.
  revised_spanish_text: Entonces Jonatán y Simón llevaron a Judas, el hermano de ambos,[a] y lo sepultaron en el sepulcro de sus padres en Modeín.[b]
  revised_footnotes:
  - marker: a
    text: El griego dice literalmente «su hermano»; con el sujeto compuesto («Jonatán y Simón»), el sentido es «el hermano de ambos».
    reason: lexical_alternative
  - marker: b
    text: O «en/por Modeín», según cómo se entienda la preposición de lugar en español; el griego simplemente dice «en Modeín».
    reason: lexical_alternative
  revision_rationale: Se ajusta la frase de parentesco para reflejar claramente el sentido colectivo reconocido por la auditoría inglesa; se corrige la nota sobre Modeín para que preserve una alternativa real en español; y se mejora la naturalidad con «Jonatán» y «Entonces» sin apartarse del griego.
