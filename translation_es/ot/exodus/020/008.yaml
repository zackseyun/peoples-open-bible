translation:
  language: es
  text: Recuerda el día sábado[a], para santificarlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el día de reposo»; también «para hacerlo santo» o «para apartarlo como santo».
    reason: lexical_alternative
lexical_decisions:
- source_word: זָכוֹר
  english_pob_choice: Remember
  chosen_spanish: Acuérdate
  alternatives_spanish:
  - Recuerda
  - Ten presente
  lexicon: HALOT
  rationale: El imperativo qal de זכר exige una memoria activa y obediente. «Acuérdate» mantiene mejor el tono exhortativo y covenantal que una forma más débil como «ten presente», y suena natural en español bíblico sin perder fuerza.
- source_word: יוֹם
  english_pob_choice: day
  chosen_spanish: día
  alternatives_spanish:
  - jornada
  lexicon: HALOT
  rationale: El sentido básico es «día». En español, «día de reposo» reproduce el valor temporal del hebreo de manera clara y estándar.
- source_word: הַשַּׁבָּת
  english_pob_choice: the Sabbath
  chosen_spanish: día de reposo
  alternatives_spanish:
  - el sábado
  - el día del sábado
  lexicon: HALOT
  rationale: Aunque el inglés POB usa «Sabbath» como término fijo, en español «día de reposo» comunica el valor semántico de שַׁבָּת y evita una transliteración menos natural. Se preserva así la idea de cesación/reposo sin imponer una forma eclesiástica menos transparente.
- source_word: לְקַדְּשׁוֹ
  english_pob_choice: to keep it holy
  chosen_spanish: para santificarlo
  alternatives_spanish:
  - para hacerlo santo
  - para apartarlo como santo
  lexicon: HALOT
  rationale: 'El infinitivo constructo con sufijo expresa propósito: tratar el día como santo o apartarlo para Dios. «Santificarlo» conserva el peso teológico de קדשׁ y corresponde directamente a la alternativa inglesa «to sanctify it», evitando reducirlo a mera observancia ritual.'
theological_decisions:
- issue: Cómo expresar שַׁבָּת en español sin perder el valor de día sagrado y de reposo
  english_pob_reading: the Sabbath day
  chosen_spanish_reading: el día de reposo
  alternative_spanish_readings:
  - el sábado
  - el día del sábado
  rationale: El mandato no solo identifica un día calendario, sino un día apartado para cesación y santidad. «Día de reposo» preserva ese trasfondo funcional y teológico de una manera transparente para lectores hispanohablantes.
  doctrine_reference: Éxodo 20:8; santidad del tiempo en la ley del pacto.
- issue: Cómo verter קדשׁ en el mandato final
  english_pob_reading: to keep it holy
  chosen_spanish_reading: para santificarlo
  alternative_spanish_readings:
  - para hacerlo santo
  - para apartarlo como santo
  rationale: El hebreo apunta a la acción de dedicar o tratar como santo. «Santificarlo» mantiene la tensión entre consagración divina y conducta humana requerida, sin diluirla en un simple cumplimiento externo.
  doctrine_reference: Teología bíblica de la santidad; Éxodo 20:8.
translation_notes:
  revision_awareness: La revisión inglesa se mantuvo sin cambios sustantivos (alta concordancia, sin modificaciones). La versión española sigue de cerca el hebreo y el razonamiento lexical del audit trail, conservando el mandato y su finalidad santificadora.
  spanish_consistency_notes:
  - Se usa «Acuérdate» para reflejar el imperativo de memoria activa.
  - Se traduce שַׁבָּת por «día de reposo» para expresar el concepto antes que una transliteración.
  - Se conserva la relación final de propósito con «para santificarlo», alineada con la alternativa inglesa «to sanctify it».
  - La nota al pie marca la alternativa lexical relevante sin duplicar el sentido principal del texto.
