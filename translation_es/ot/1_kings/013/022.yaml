  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia hebrea: regreso, comer pan, beber agua, y la sentencia de juicio sobre no llegar al sepulcro familiar. También preserva correctamente el valor concreto de «pan», «agua», «cadáver» y «tumba de tus padres». La nota alternativa inglesa está bien trasladada. El único desajuste relevante está en «en el lugar acerca del cual él te dijo[a]», que en español queda incompleto/torpe porque falta el contenido introducido por «te dijo», y el marcador de nota está anclado en un punto que no corresponde a la variante textual del final del versículo.'
  spanish_quality_summary: El español es en general claro y digno, pero «acerca del cual él te dijo» suena forzado y poco natural en español bíblico actual. Una formulación como «respecto al cual él te dijo» o «del cual él te dijo» mejora la legibilidad sin perder el vínculo entre el lugar y la prohibición. Además, conviene mover la marca de nota al segmento final donde recae la alternativa léxica.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Cadáver», «tumba» y «padres» están bien elegidos según las decisiones auditadas. No intervienen términos sensibles como Yahvé, Mesías, esclavo, etc.
  issues:
  - severity: medium
    issue: La frase «en el lugar acerca del cual él te dijo» es poco natural e incompleta en español.
    rationale: Aunque intenta seguir el inglés auditado «about which he said to you», en español «decir acerca de un lugar» pide con más fuerza un complemento explícito. «Respecto al cual él te dijo» conserva la referencia al lugar y suena más idiomático en registro bíblico moderno.
  - severity: low
    issue: El marcador de nota [a] está colocado tras «te dijo», pero la nota comenta la variante de «no llegará/no entrará» al final del versículo.
    rationale: La disciplina del proyecto pide que el marcador aparezca en la palabra o frase pertinente. Debe anclarse en «no llegará» o en la cláusula final, no en la introducción de la cita.
  revised_spanish_text: 'pero volviste, comiste pan y bebiste agua en el lugar respecto al cual él te dijo: «No comas pan ni bebas agua»; tu cadáver no llegará[a] a la tumba de tus padres.'
  revised_footnotes:
