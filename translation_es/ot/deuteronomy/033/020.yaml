translation:
  language: es
  text: 'Y de Gad dijo: «Bendito[a] el que ensancha a Gad. Habita como leona[b], y desgarra brazo, aun coronilla[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Bendito sea el que ensancha a Gad»; el sujeto puede entenderse implícitamente como Dios, aunque el hebreo no lo expresa de manera explícita.'
    reason: alternative_reading
  - marker: b
    text: 'O: «como león»; el término hebreo puede referirse a un león poderoso de forma más general.'
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente: «brazo, aun corona de la cabeza».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְגָד
  english_pob_choice: And of Gad
  chosen_spanish: Y de Gad
  alternatives_spanish:
  - Y para Gad
  - Y acerca de Gad
  lexicon: HALOT
  rationale: La fórmula introduce el oráculo tribal dirigido a Gad. En español, «de Gad» conserva el valor relacional del hebreo y suena natural en un encabezado de bendición.
- source_word: אָמַר
  english_pob_choice: he said
  chosen_spanish: dijo
  alternatives_spanish:
  - declaró
  lexicon: HALOT
  rationale: Es la fórmula narrativa estándar para introducir la palabra pronunciada por Moisés.
- source_word: בָּרוּךְ
  english_pob_choice: Blessed
  chosen_spanish: Bendito
  alternatives_spanish:
  - Bendecido
  - Sea bendito
  lexicon: HALOT
  rationale: Se conserva el valor de proclamación de bendición, no una simple oración optativa. «Bendito» funciona bien en una fórmula declarativa en español.
- source_word: מַרְחִיב
  english_pob_choice: he who enlarges
  chosen_spanish: el que ensancha
  alternatives_spanish:
  - el que agranda
  - el que da espacio a
  lexicon: HALOT
  rationale: El hifil de רחב expresa hacer amplio o dar amplitud. «Ensancha» mantiene el sentido espacial y la fuerza verbal del participio sin volverlo explicativo en exceso.
- source_word: גָּד
  english_pob_choice: Gad
  chosen_spanish: Gad
  lexicon: HALOT
  rationale: Nombre propio tribal transliterado de forma consistente.
- source_word: כְּלָבִיא
  english_pob_choice: like a lioness
  chosen_spanish: como leona
  alternatives_spanish:
  - como león
  - como león/leona
  lexicon: HALOT
  rationale: Se sigue la opción léxica de «lioness» del audit trail. En español, «leona» comunica la imagen predatoria con naturalidad y preserva la decisión léxica documentada.
- source_word: שָׁכֵן
  english_pob_choice: He dwells
  chosen_spanish: Habita
  alternatives_spanish:
  - Se establece
  - Se recuesta
  lexicon: HALOT
  rationale: El verbo puede significar habitar, asentarse o reposar. «Habita» encaja con la imagen territorial y mantiene una lectura sobria y digna.
- source_word: וְטָרַף
  english_pob_choice: and tears off
  chosen_spanish: y desgarra
  alternatives_spanish:
  - y despedaza
  - y arrebata
  lexicon: HALOT
  rationale: טרף denota desgarrar o despedazar con violencia. «Desgarra» conserva el impacto predatorio y suena natural con el objeto directo que sigue.
- source_word: זְרוֹעַ
  english_pob_choice: arm
  chosen_spanish: brazo
  alternatives_spanish:
  - antebrazo
  - fuerza
  lexicon: HALOT
  rationale: La imagen corporal es literal; «brazo» es la correspondencia española más natural y clara.
- source_word: אַף
  english_pob_choice: even
  chosen_spanish: aun
  alternatives_spanish:
  - sí, aun
  - y aun
  lexicon: HALOT
  rationale: 'Partícula aditiva e intensificadora. «Aun» conserva el escalamiento retórico: no solo brazo, sino también la coronilla.'
- source_word: קָדְקֹד
  english_pob_choice: scalp
  chosen_spanish: la coronilla
  alternatives_spanish:
  - la cabeza
  - la parte superior de la cabeza
  lexicon: HALOT
  rationale: Se opta por un equivalente español que mantiene la referencia a la parte alta de la cabeza. «Coronilla» preserva el paralelo corporal sin sonar excesivamente técnico.
theological_decisions:
- issue: Sujeto implícito de «el que ensancha a Gad»
  english_pob_reading: The subject may be understood implicitly as God, though the Hebrew does not state it explicitly.
  chosen_spanish_reading: Se deja abierto quién es el sujeto del ensanchamiento; el español no lo explicita.
  alternative_spanish_readings:
  - Bendito sea el que ensancha a Gad
  - Bendito Dios, que ensancha a Gad
  rationale: El hebreo permite entender un sujeto implícito, posiblemente Dios, pero no lo nombra. La traducción evita cerrar esa tensión y conserva la ambigüedad reverente del texto.
  doctrine_reference: Preservar tensión exegética cuando el original no explicita el sujeto.
- issue: Valor de כְּלָבִיא
  english_pob_reading: Like a lioness; may also be rendered like a lion.
  chosen_spanish_reading: Como leona
  alternative_spanish_readings:
  - Como león
  - Como león o leona
  rationale: La decisión inglesa privilegia 'lioness' por su ajuste léxico, aunque admite la lectura más general de león. En español, 'leona' reproduce la opción principal sin perder la fuerza del símil.
  doctrine_reference: Precisión léxica sin neutralizar la imagen poética.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail al preferir una formulación más formal para el participio («el que ensancha») y se mantuvo la misma estructura sintáctica general del texto inglés auditado. También se conservó la ambigüedad acerca del sujeto implícito del ensanchamiento y la imagen predatoria de leona/ brazo/ coronilla.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo nombra explícitamente el nombre divino; aquí no aparece, por lo que no se introduce.
  - Se mantiene «Gad» como nombre tribal propio sin adaptación.
  - Se conserva la tensión entre traducción literal y legibilidad, especialmente en la secuencia final de imágenes corporales.
  - La puntuación con comillas angulares y la colocación de los marcadores siguen el uso editorial en español bíblico contemporáneo.
