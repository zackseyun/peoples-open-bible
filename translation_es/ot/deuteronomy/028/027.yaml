review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura general del versículo, el nombre divino ''Yahvé'', la lista de dolencias y la nota léxica sobre עֳפָלִים. Sin embargo, falla de manera importante en בִּשְׁחִין מִצְרַיִם: ''sarna de Egipto'' no refleja שְׁחִין, que en el expediente fuente y en el POB inglés se entiende como forúnculos/úlceras/llagas inflamadas, no sarna. Además, usar ''sarna'' otra vez para חָרֶס borra la distinción entre dos términos hebreos diferentes. La cláusula final se entiende, pero ''no podrás sanar'' suena menos fiel que una forma pasiva o de recuperación.'
  spanish_quality_summary: El español es claro, pero la repetición de 'sarna' para dos términos distintos introduce confusión semántica. 'Costras' funciona para גָּרָב, y 'picazón' o 'comezón' sería más natural y exacto para חָרֶס que 'sarna'. 'De la cual no podrás ser sanado' o 'de las cuales no podrás sanar' mejora la fidelidad al sentido pasivo de לְהֵרָפֵא. Conviene también alinear la nota [a] con 'tumores' en el texto revisado.
  glossary_alignment: 'Correcto en ''Yahvé'' para יְהוָה. No hay conflicto con otros términos doctrinales del glosario. La principal desalineación es léxica: שְׁחִין no debe verterse como ''sarna'', y חָרֶס no debe duplicarse también como ''sarna'' cuando el expediente inglés distinguió ''boils'' y ''itch''.'
  issues:
  - severity: high
    issue: בִּשְׁחִין מִצְרַיִם fue traducido como 'la sarna de Egipto'.
    rationale: שְׁחִין en el expediente fuente corresponde a 'boils', una erupción inflamatoria tipo forúnculos/úlceras. 'Sarna' sugiere otra enfermedad y desplaza el sentido documentado.
  - severity: high
    issue: Se usa 'sarna' también para וּבֶחָרֶס, colapsando dos términos hebreos distintos.
    rationale: El texto fuente enumera varias dolencias separadas. Repetir 'sarna' para שְׁחִין y חָרֶס elimina la diferenciación léxica que el POB inglés preservó con 'boils' y 'itch'.
  - severity: medium
    issue: La cláusula final 'de la cual no podrás sanar' reduce el matiz pasivo de לְהֵרָפֵא.
    rationale: Aunque comprensible, el hebreo expresa imposibilidad de ser curado/recuperarse de esas afecciones; una formulación como 'de las cuales no podrás sanar' o 'de las cuales no podrás ser sanado' es más fiel y natural en contexto.
  - severity: low
    issue: El anclaje de la nota [a] está colocado en 'Egipto' y no junto a 'tumores'.
    rationale: La nota trata específicamente la alternativa de עֳפָלִים ('tumores' / 'hemorroides'), por lo que debe anclarse en esa palabra para evitar ambigüedad.
  revised_spanish_text: Yahvé te herirá con los forúnculos de Egipto, con tumores[a], con costras y con picazón, de las cuales no podrás sanar.
  revised_footnotes:
  - marker: a
    text: O 'hemorroides' para 'tumores'; el término hebreo es incierto y puede referirse más específicamente a inflamaciones en la región anal.
    reason: lexical_alternative
  revision_rationale: Se reemplaza 'sarna de Egipto' por 'forúnculos de Egipto' para reflejar שְׁחִין según el expediente fuente y el POB inglés. Se mantiene 'tumores' con nota alternativa, se conserva 'costras' para גָּרָב y se cambia חָרֶס a 'picazón' para preservar la distinción léxica respecto de las otras afecciones. También se mueve la nota [a] a 'tumores' y se ajusta la cláusula final para expresar mejor la incurabilidad en español natural.
