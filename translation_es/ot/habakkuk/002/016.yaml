base_translation:
  language: en
  yaml_path: translation/ot/habakkuk/002/016.yaml
  text: You have had your fill of shame instead of glory[a]. Drink, you also, and expose your uncircumcision! The cup in Yahweh’s right hand will come around to you[b], and disgrace will be upon your glory.
  footnotes:
