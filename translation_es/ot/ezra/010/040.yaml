  - Sharay
  lexicon: HNp
  rationale: Nombre propio masculino. Se mantiene la transliteración como en el audit trail inglés, porque no hay base para traducir ni para normalizar más allá de la adaptación ortográfica mínima requerida en español.
translation_notes:
  revision_awareness: El registro inglés indica que no hubo cambios en la última revisión y que el texto quedó en alta concordancia; por eso la versión española conserva únicamente la transliteración de los tres nombres propios, sin añadir explicación interpretativa al cuerpo del versículo.
  spanish_consistency_notes:
  - Se mantiene el orden de los tres nombres tal como aparece en el hebreo y en el texto base inglés.
  - No se introduce puntuación adicional fuera de la coma separadora y el punto final, para respetar el carácter de lista breve.
  - Se usa 'Macnadebai' como adaptación española del transliterado inglés 'Machnadebai', manteniendo la transparencia con la fuente hebrea.
