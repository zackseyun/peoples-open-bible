  category: mistranslation
  from: and the throngs before their idols say
  to: and they gather before their idols and say
  rationale: The Syriac word `knšyn` is almost certainly the active participle `kānšīn`
    ('they gather' or 'assemble'), functioning in parallel with the preceding participle
    'boast' (`meštbahrīn`). Translating it as the absolute plural noun 'throngs' (`kenšīn`)
    breaks the verbal chain ('the nations boast... and gather... and say').
