translation:
  language: es
  text: Después de esto[a], Job abrió la boca y maldijo su día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el día de su nacimiento». El hebreo dice literalmente «su día».
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחֲרֵי כֵן
  english_pob_choice: After this
  chosen_spanish: Después de esto
  alternatives_spanish:
  - Después de aquello
  - Luego de eso
  lexicon: HALOT
  rationale: La expresión temporal hebrea funciona como transición narrativa. «Después de esto» conserva el orden del relato y suena natural en español sin añadir precisión innecesaria.
- source_word: פָּתַח ... אֶת פִּיהוּ
  english_pob_choice: opened his mouth
  chosen_spanish: abrió su boca
  alternatives_spanish:
  - comenzó a hablar
  - abrió sus labios
  lexicon: HALOT
  rationale: Se mantiene el modismo hebreo de apertura del habla. «Abrió su boca» refleja con fidelidad la forma fuente y conserva el tono solemne; «comenzó a hablar» sería más interpretativo.
- source_word: אִיּוֹב
  english_pob_choice: Job
  chosen_spanish: Job
  alternatives_spanish:
  - Ijob
  lexicon: transliteration standard
  rationale: Se conserva el nombre propio bíblico en su forma usual en español.
- source_word: וַיְקַלֵּל
  english_pob_choice: cursed
  chosen_spanish: maldijo
  alternatives_spanish:
  - maldeció
  - blasfemó contra
  lexicon: HALOT
  rationale: El verbo expresa maldecir en sentido fuerte. «Maldijo» comunica bien la fuerza del hebreo y suena natural en español; «maldeció» también sería posible, pero «maldijo» encaja mejor en el registro narrativo.
- source_word: אֶת יוֹמֽוֹ
  english_pob_choice: his day
  chosen_spanish: su día
  alternatives_spanish:
  - el día de su nacimiento
  - el día de su cumpleaños
  lexicon: HALOT
  rationale: El hebreo dice literalmente «su día». Se conserva esa concisión en el texto principal, dejando que el contexto posterior precise que se trata del día de su nacimiento.
theological_decisions:
- issue: Si explicitar que «su día» se refiere al día de nacimiento de Job
  english_pob_reading: Keep the concise expression 'his day' in the main text
  chosen_spanish_reading: Mantener «su día» en el texto principal
  alternative_spanish_readings:
  - el día de su nacimiento
  - su cumpleaños
  rationale: El hebreo no añade «nacimiento» en este versículo. Mantener la expresión breve respeta la progresión del texto y evita resolver anticipadamente una precisión que el contexto inmediato desarrollará.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve textual progression and lexical tension'
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el control de revisión más reciente: no se reportan cambios aplicados y el cotejo externo indica alto acuerdo. La redacción española conserva la misma decisión básica del audit trail inglés: literalidad sobria en «su día» y mantenimiento del modismo «abrió su boca».'
  spanish_consistency_notes:
  - Se mantiene el tratamiento de Job como nombre propio sin adaptar a formas menos usuales.
  - «Maldijo» conserva la fuerza del verbo hebreo sin suavizarlo a una perífrasis.
  - La nota al pie usa un marcador único y anclado exactamente en la frase ambigua.
  - El español evita introducir «nacimiento» en el cuerpo del versículo, conforme al texto fuente.
