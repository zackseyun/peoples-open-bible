id: PRO.30.4
reference: Proverbs 30:4
source:
  edition: WLC
  text: מִ֤י עָלָֽה שָׁמַ֨יִם וַ/יֵּרַ֡ד מִ֤י אָֽסַף ר֨וּחַ בְּ/חָפְנָ֡י/ו מִ֤י צָֽרַר מַ֨יִם בַּ/שִּׂמְלָ֗ה מִ֭י הֵקִ֣ים כָּל אַפְסֵי אָ֑רֶץ מַה שְּׁמ֥/וֹ וּ/מַֽה שֶּׁם בְּ֝נ֗/וֹ כִּ֣י תֵדָֽע־׀־׀־׀־־־־־׃
translation:
  text: Who has gone up to heaven and come down? Who has gathered the wind in his hands? Who has wrapped the waters in a garment? Who has established all the ends of the earth? What is his name[a], and what is his son's name[c][b], surely you know!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the heavens.' Hebrew שָׁמַיִם is formally plural.
    reason: lexical_alternative
  - marker: b
    text: 'Or ''if you know.'' The Hebrew can be taken as an ironic challenge: ''if you know.'''
    reason: lexical_alternative
  - marker: c
    text: Christian interpretation has often seen significance in 'his son's name,' but the Hebrew text itself does not explicitly identify the son.
    reason: cross_reference
lexical_decisions:
- source_word: עָלָה ... וַיֵּרַד
  chosen: has gone up to heaven and come down
  alternatives:
  - ascended to heaven and descended
  - went up to the heavens and came down
  lexicon: HALOT
  rationale: Rendered with present-perfect English to reflect the completed perfect/wayyiqt sequence in a rhetorical question about any such person. 'Heaven' is singular in idiomatic English though Hebrew שָׁמַיִם is morphologically plural. 'Gone up ... come down' is natural modern English while preserving the vertical imagery.
- source_word: שָׁמַיִם
  chosen: heaven
  alternatives:
  - the heavens
  lexicon: HALOT
  rationale: Although formally plural, in English this often functions idiomatically as singular for the sky/heavenly realm. 'Heaven' reads naturally here; the alternative 'the heavens' is viable and preserved as an alternative.
- source_word: אָסַף רוּחַ
  chosen: has gathered the wind
  alternatives:
  - has gathered the spirit
  - has collected the wind
  lexicon: HALOT
  rationale: רוּחַ can mean 'wind,' 'breath,' or 'spirit.' In this creation-cosmos context, paired with waters and earth, 'wind' best fits the physical imagery. 'Gathered' reflects אָסַף straightforwardly.
- source_word: בְּחָפְנָיו
  chosen: in his hands
  alternatives:
  - in his fists
  - in his palms
  lexicon: HALOT
  rationale: The noun refers to the hollow or cupped hands/handful. 'In his hands' is a readable rendering that preserves the image without over-specifying anatomy. A more literal 'in his fists' is possible but can sound awkward in English.
- source_word: צָרַר מַיִם בַּשִּׂמְלָה
  chosen: has wrapped the waters in a garment
  alternatives:
  - has bound the waters in a cloak
  - has tied up the waters in a garment
  lexicon: HALOT
  rationale: צָרַר conveys binding/wrapping up; 'wrapped' is idiomatic and vivid. שִׂמְלָה is an outer garment or cloak; 'garment' is broad, natural English that preserves the metaphor.
- source_word: הֵקִים כָּל אַפְסֵי אָרֶץ
  chosen: has established all the ends of the earth
  alternatives:
  - has set up all the ends of the earth
  - has fixed all the extremities of the earth
  lexicon: HALOT
  rationale: הֵקִים here carries the sense of establishing or setting in place. אַפְסֵי אָרֶץ is a standard expression for the farthest reaches/ends of the earth. 'Established' fits both the cosmic and rhetorical register.
- source_word: מַה שְּׁמוֹ
  chosen: What is his name
  alternatives:
  - What is the name of him
  lexicon: HALOT
  rationale: Direct, natural rendering of the Hebrew interrogative clause.
- source_word: וּמַה שֶּׁם בְּנוֹ
  chosen: and what is his son's name
  alternatives:
  - and what is the name of his son
  lexicon: HALOT
  rationale: Preserves the Hebrew wording plainly. 'Son' is retained as gender-accurate and textually specific, not neutralized.
- source_word: כִּי תֵדָע
  chosen: surely you know!
  alternatives:
  - if you know
  - for you know
  lexicon: HALOT
  rationale: In this rhetorical context, כִּי introduces an ironic challenge or taunt. 'Surely you know!' best captures the force in idiomatic English. The more conditional 'if you know' is possible and worth preserving in a footnote because the Hebrew particle can bear that sense in context.
