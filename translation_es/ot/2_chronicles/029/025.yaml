base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/029/025.yaml
  text: He stationed the Levites in the house of Yahweh with cymbals[a], harps, and lyres, according to the command of David and of Gad the king’s seer and Nathan the prophet[b], for the command was from Yahweh through his prophets.
  footnotes:
  - marker: a
    text: Or, more literally, 'for by the hand of the LORD was the command, by the hand of his prophets.'
    reason: lexical_alternative
  - marker: b
    text: '''Gad the king’s seer'' uses ''seer'' to reflect the Hebrew title חֹזֶה, a term distinct from ''prophet,'' though closely related in function.'
    reason: lexical_alternative
