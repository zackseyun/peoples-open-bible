translation:
  language: es
  text: 'Y multiplicaré sobre ustedes a la gente[a]: toda la casa de Israel, toda ella. Las ciudades serán habitadas, y las ruinas[b] serán reconstruidas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo 'adam' aquí es un término colectivo para la población humana; alternativamente, 'la humanidad' o, más literalmente, 'hombre'.
    reason: lexical_alternative
  - marker: b
    text: O 'los lugares desolados' / 'los lugares devastados' para 'las ruinas'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִרְבֵּיתִי
  english_pob_choice: And I will multiply
  chosen_spanish: Yo multiplicaré
  alternatives_spanish:
  - Yo aumentaré
  - Yo haré abundar
  lexicon: HALOT
  rationale: El hiphil de רבה expresa causar multiplicación. «Multiplicaré» conserva la fuerza causativa con español natural y bíblico.
- source_word: עֲלֵיכֶם
  english_pob_choice: upon you
  chosen_spanish: sobre ustedes
  alternatives_spanish:
  - encima de ustedes
  - sobre vosotros
  lexicon: HALOT
  rationale: La preposición עַל con sufijo plural conserva aquí una imagen espacial/metafórica de población extendida sobre el territorio. «Sobre ustedes» es claro en español actual.
- source_word: אָדָם
  english_pob_choice: people
  chosen_spanish: al hombre
  alternatives_spanish:
  - a la humanidad
  - a la gente
  lexicon: HALOT
  rationale: El POB inglés optó por «people», pero el hebreo usa אָדָם como término colectivo. En español, «al hombre» preserva la tensión lexical documentada por el audit trail, aunque suena más literal; se mantiene con nota para explicar el valor colectivo.
- source_word: כָּל בֵּית יִשְׂרָאֵל כֻּלֹּה
  english_pob_choice: all the house of Israel, all of it
  chosen_spanish: toda la casa de Israel, toda ella
  alternatives_spanish:
  - la casa entera de Israel, toda ella
  - todo el pueblo de Israel, por completo
  lexicon: HALOT
  rationale: La duplicación enfática del hebreo se conserva con «toda... toda ella», reflejando tanto כָּל como כֻּלֹּה sin fusionarlos.
- source_word: וְנֹשְׁבוּ
  english_pob_choice: will be inhabited
  chosen_spanish: serán habitadas
  alternatives_spanish:
  - serán pobladas
  - volverán a estar habitadas
  lexicon: HALOT
  rationale: El nifal de ישׁב expresa que las ciudades tendrán habitantes. «Serán habitadas» es pasivo natural y fiel al contexto de restauración.
- source_word: הֶעָרִים
  english_pob_choice: the cities
  chosen_spanish: las ciudades
  alternatives_spanish:
  - los pueblos
  - las urbes
  lexicon: HALOT
  rationale: עָרִים designa ciudades o poblaciones. «Las ciudades» es la equivalencia más estándar y transparente.
- source_word: וְהֶחֳרָבוֹת
  english_pob_choice: the ruins
  chosen_spanish: las ruinas
  alternatives_spanish:
  - los lugares desolados
  - los desolados lugares
  lexicon: HALOT
  rationale: חֳרָבוֹת refiere a lugares devastados o arruinados. «Las ruinas» es breve, idiomático y mantiene el contraste con reconstrucción.
- source_word: תִּבָּנֶינָה
  english_pob_choice: will be rebuilt
  chosen_spanish: serán reconstruidas
  alternatives_spanish:
  - serán edificadas
  - volverán a ser construidas
  lexicon: HALOT
  rationale: El nifal de בנה aquí tiene sentido pasivo en contexto de restauración. «Serán reconstruidas» explicita la restauración sin añadir contenido ajeno.
theological_decisions:
- issue: Alcance territorial y restauración concreta
  english_pob_reading: The verse addresses the land/mountains of Israel and promises concrete national restoration for Israel's population centers.
  chosen_spanish_reading: El versículo habla de una restauración concreta del territorio y de sus centros poblados.
  alternative_spanish_readings:
  - Una restauración solo espiritual o simbólica
  - Una promesa genérica sin referencia territorial
  rationale: El contexto inmediato menciona ciudades, habitantes y ruinas reconstruidas. La traducción mantiene esa concreción y no espiritualiza el pasaje en el texto principal.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it'
- issue: Valor colectivo de אָדָם
  english_pob_reading: Hebrew 'adam' here is a collective term for human population; alternatively, 'humankind' or more literally 'man.'
  chosen_spanish_reading: אָדָם se entiende como término colectivo para la población humana.
  alternative_spanish_readings:
  - humanidad
  - hombre
  rationale: 'La nota preserva la tensión lexical: en hebreo puede ser colectivo, más general o más literal. En el texto español se deja la forma anclada para que la nota explique el alcance colectivo.'
  doctrine_reference: Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando explícitamente las notas [a] y [b] en el texto español. También se mantuvo la distinción entre el valor colectivo de אָדָם y la imagen concreta de ciudades y ruinas reconstruidas.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» para el nombre divino porque este versículo no contiene el tetragrámaton ni κύριος.
  - «Reconstruidas» se mantiene como equivalente natural del nifal de בנה en contexto de restauración.
  - La duplicación de totalidad en «toda... toda ella» refleja el énfasis hebreo sin sobreexplicar en el cuerpo del texto.
