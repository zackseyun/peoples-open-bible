base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/002/008.yaml
  text: So we passed on from our brothers[a], the sons of Esau, who live in Seir, away from the way of the Arabah, from Elath and from Ezion-geber[b]; and we turned and passed by the way of the wilderness of Moab.
  footnotes:
  - marker: a
    text: Or 'from the road of the Arabah.' 'Arabah' refers to the rift-valley region south of the Dead Sea.
    reason: lexical_alternative
  - marker: b
    text: Or 'our kindred, the descendants of Esau.' The Hebrew literally says 'our brothers, the sons of Esau.'
    reason: alternative_reading
