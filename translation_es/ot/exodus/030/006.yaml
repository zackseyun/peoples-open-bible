translation:
  language: es
  text: Y lo pondrás[a] delante del velo que está delante del arca del testimonio[b], delante del propiciatorio que está sobre el testimonio, donde me encontraré contigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «lo colocarás».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «el arca del testimonio» ... «el testimonio»; la tradición castellana a menudo dice «arca del pacto», pero aquí el hebreo dice «testimonio».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתָּה
  english_pob_choice: And you shall place
  chosen_spanish: Y pondrás
  alternatives_spanish:
  - Y colocarás
  - Y pondrás allí
  lexicon: HALOT / BDB נתן
  rationale: נתן es un verbo amplio de poner/colocar. En español, 'poner' conserva bien la instrucción cultual directa sin sonar rebuscado, y 'pondrás' mantiene la segunda persona singular del mandato.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - antes de
  - frente a
  lexicon: HALOT / BDB פנים
  rationale: En este contexto espacial, 'delante de' expresa con claridad la ubicación física. 'Antes de' puede sonar más temporal en español y 'frente a' suena menos natural con la repetición del paralelismo del verso.
- source_word: הַפָּרֹכֶת
  english_pob_choice: the veil
  chosen_spanish: el velo
  alternatives_spanish:
  - la cortina
  - el cortinaje
  lexicon: HALOT / BDB פרכת
  rationale: '''Velo'' es el término cultual tradicional y comprensible en español para la pantalla del santuario interior. Se conserva por fidelidad al referente del tabernáculo.'
- source_word: אֲרֹן הָעֵדֻת
  english_pob_choice: the ark of the testimony
  chosen_spanish: el arca del testimonio
  alternatives_spanish:
  - el arca del pacto
  lexicon: HALOT / BDB עדות
  rationale: Se mantiene 'testimonio' porque el hebreo dice explícitamente עֵדֻת, no 'pacto'. 'Pacto' sería una armonización tradicional no exigida por el texto.
- source_word: הַכַּפֹּרֶת
  english_pob_choice: the mercy seat
  chosen_spanish: el propiciatorio
  alternatives_spanish:
  - la tapa de expiación
  - el asiento de misericordia
  lexicon: HALOT / BDB כפרת
  rationale: En español bíblico, 'propiciatorio' comunica el objeto cultual del arca con precisión y evita una traducción demasiado interpretativa. Se eligió esta forma por su equilibrio entre tradición y transparencia semántica.
- source_word: הָעֵדֻת
  english_pob_choice: the testimony
  chosen_spanish: el testimonio
  alternatives_spanish:
  - el pacto
  lexicon: HALOT / BDB עדות
  rationale: La repetición de עדות se mantiene con la misma traducción para no diluir la coherencia lexical del verso y evitar importar 'pacto' sin base textual.
- source_word: אֲשֶׁר אִוָּעֵד לְךָ שָׁמָּה
  english_pob_choice: where I will meet with you
  chosen_spanish: donde me reuniré contigo
  alternatives_spanish:
  - donde me encontraré contigo
  - donde me citaré contigo
  lexicon: HALOT / BDB יעד
  rationale: El nifal de יעד aquí expresa encuentro designado/apuntado. 'Reuniré contigo' en español transmite de modo natural la idea de cita divina, sin añadir un matiz excesivamente técnico.
theological_decisions:
- issue: Renderización de כפרת en un contexto de santuario
  english_pob_reading: the mercy seat
  chosen_spanish_reading: el propiciatorio
  alternative_spanish_readings:
  - la cubierta de expiación
  - el trono de misericordia
  rationale: El término alude a la cubierta del arca con función sacrificial/expiatoria. 'Propiciatorio' preserva esa carga cultual sin expandirla doctrinalmente más allá del versículo.
  doctrine_reference: Éxodo 25:17-22; traducción POB, principios de transparencia léxica
- issue: Mantenimiento de עדות como 'testimonio'
  english_pob_reading: the ark of the testimony ... the testimony
  chosen_spanish_reading: el arca del testimonio ... el testimonio
  alternative_spanish_readings:
  - el arca del pacto ... el pacto
  rationale: Se evita sustituir 'testimonio' por 'pacto' porque el texto hebreo insiste en la raíz עדות. La decisión conserva la tensión entre la forma tradicional y la forma estrictamente textual.
  doctrine_reference: Principios de primacía del original y consistencia lexical
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa que prefirió 'before' por formalidad y consistencia repetida; en español se reflejó esa misma consistencia con la repetición de 'delante de'. También se mantuvo la decisión auditada de distinguir 'testimony' de 'covenant', por lo que no se normalizó hacia 'pacto'.
  spanish_consistency_notes:
  - 'Se mantuvo un solo campo semántico para עֵדֻת: ''testimonio'' en ambas ocurrencias.'
  - '''Velo'' y ''propiciatorio'' conservan el registro cultual clásico sin recurrir a paráfrasis explicativas.'
  - La frase final usa 'donde me reuniré contigo' para expresar el encuentro designado de manera natural en español.
  - Se conservaron los marcadores de nota solo donde el texto español tiene una alternativa léxica relevante.
