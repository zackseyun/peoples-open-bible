review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue en general la secuencia del hebreo y del POB inglés: David toma una piedra, la usa con la honda, hiere al filisteo en la frente, la piedra se hunde/incrusta y él cae al suelo. Sin embargo, hay varias decisiones que se apartan innecesariamente del sentido contextual documentado: «recipiente» para הַכְּלִי pierde la especificidad contextual ya fijada por el audit trail («bag/pouch»), «la hizo girar con la honda» describe preparación más que el acto de dispararla, y «cayó sobre su rostro hasta el suelo» suena poco natural y no refleja bien la expresión hebrea idiomática.'
  spanish_quality_summary: 'La redacción es comprensible, pero contiene giros poco naturales o demasiado literales para un español bíblico claro: «en el [a]recipiente» está mal anclado tipográficamente y «recipiente» suena mecánico; «la hizo girar con la honda» no comunica de forma directa que la lanzó; «sobre su rostro hasta el suelo» resulta torpe. Una revisión menor mejora fidelidad y legibilidad sin perder dignidad.'
  glossary_alignment: 'No hay términos teológicos mayores en juego. La principal cuestión léxica es contextual: כְּלִי aquí debe reflejar el contenedor de las piedras, por lo que «bolsa» en el texto principal se alinea mejor con la decisión documentada del POB, dejando «bolsa de cuero» o «bolsita/zurrón» como alternativas si se quisiera matizar. También conviene mantener «filisteo», «piedra», «frente» y una formulación idiomática fiel para «cayó sobre su rostro/rostro a tierra».'
  issues:
  - severity: medium
    issue: «recipiente» para הַכְּלִי en el texto principal
    rationale: Aunque כְּלִי es amplio en hebreo, el contexto narrativo y el audit trail inglés ya lo resuelven como el contenedor de las piedras. «Recipiente» en español suena genérico e impropio para una bolsa de pastor.
  - severity: medium
    issue: Anclaje de nota mal colocado en «el [a]recipiente»
    rationale: El marcador debe ir unido a la palabra o frase relevante según las pautas del proyecto, por ejemplo «bolsa[a]».
  - severity: medium
    issue: «la hizo girar con la honda» no traduce bien וַיְקַלַּע
    rationale: El verbo denota el acto de lanzar con honda, no meramente hacer girar la piedra. «La lanzó con la honda» preserva mejor el sentido sin expansión excesiva.
  - severity: medium
    issue: «cayó sobre su rostro hasta el suelo» es poco natural
    rationale: La cláusula hebrea significa literalmente que cayó sobre su rostro a tierra/al suelo. «Cayó sobre su rostro al suelo» o mejor «cayó rostro en tierra» podrían funcionar; para conservar cercanía formal al POB auditado, «cayó sobre su rostro al suelo» es preferible.
  revised_spanish_text: Entonces David metió su mano en la bolsa[a], tomó de allí una piedra, la lanzó con la honda y golpeó al filisteo en la frente. La piedra se hundió en su frente[b], y cayó sobre su rostro al suelo[c].
  revised_footnotes:
