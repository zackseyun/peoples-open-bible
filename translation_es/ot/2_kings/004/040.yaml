    text: Literalmente, «muerte en la olla». La expresión probablemente significa que el guiso era mortal o estaba envenenado.
    reason: lexical_alternative
  revision_rationale: Se elimina «Así» por no estar apoyado por el hebreo, se reubica la nota al modismo que realmente explica («Muerte en la olla»), y se mantiene el resto del texto porque preserva bien el sentido fuente con español natural y digno.
