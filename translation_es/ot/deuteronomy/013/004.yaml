    reason: lexical_alternative
  revision_rationale: 'Se corrige el número gramatical para reflejar la 2ª persona plural del hebreo de manera natural en español bíblico ampliamente legible mediante el tratamiento con ''ustedes'' implícito (''escucharán'', ''su Dios'', ''los'', ''aman''). También se reubican las notas para que coincidan con decisiones léxicas relevantes: una nota opcional sobre ''poner a prueba'' y la nota necesaria sobre ''alma''. Se elimina la nota redundante sobre ''soñador de sueños''.'
