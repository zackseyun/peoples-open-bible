translation:
  language: es
  text: Y si de veras olvidas[a] a Yahvé tu Dios, y vas tras otros dioses, y les sirves, y te postras ante ellos, hoy testifico contra ti que ciertamente perecerás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «olvidando, olvidas»; forma enfática que significa «ciertamente» o «de veras olvidas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el convenio del proyecto para el Tetragrámaton, conservando el nombre del pacto en español. 'Yahvé' mantiene la referencia directa al nombre divino, en lugar de sustituirlo por un título.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - su Dios
  lexicon: HALOT
  rationale: El sufijo de segunda persona singular se refleja naturalmente como 'tu Dios', preservando la relación pactual dirigida al oyente.
- source_word: שָׁכֹחַ תִּשְׁכַּח
  english_pob_choice: you indeed forget
  chosen_spanish: en verdad olvidas
  alternatives_spanish:
  - ciertamente olvidas
  - olvidas por completo
  lexicon: HALOT
  rationale: El infinitivo absoluto con verbo finito intensifica la acción. 'En verdad' comunica el énfasis sin añadir una paráfrasis excesiva ni fijar un matiz no exigido por el hebreo.
- source_word: וְהָלַכְתָּ אַחֲרֵי
  english_pob_choice: and go after
  chosen_spanish: y sigues a
  alternatives_spanish:
  - y vas tras
  - y caminas tras
  lexicon: HALOT
  rationale: En español, 'seguir a' transmite bien el modismo de lealtad o adhesión. 'Vas tras' o 'caminas tras' suenan más literales y menos naturales en este contexto exhortativo.
- source_word: אֱלֹהִים אֲחֵרִים
  english_pob_choice: other gods
  chosen_spanish: otros dioses
  alternatives_spanish:
  - dioses ajenos
  - dioses extraños
  lexicon: HALOT
  rationale: '''Otros'' refleja directamente el adjetivo hebreo sin introducir el matiz interpretativo de ''ajenos'' o ''extraños''.'
- source_word: וַעֲבַדְתָּם
  english_pob_choice: and serve them
  chosen_spanish: y les sirves
  alternatives_spanish:
  - y los sirves
  - y los adoras
  lexicon: HALOT
  rationale: Se conserva 'servir' para no confundir este verbo con el siguiente, que sí expresa postración cultual. El dativo 'les' es idiomático en español.
- source_word: וְהִשְׁתַּחֲוִיתָ לָהֶם
  english_pob_choice: and bow down to them
  chosen_spanish: y te inclinas ante ellos
  alternatives_spanish:
  - y te postras ante ellos
  - y los adoras
  lexicon: HALOT
  rationale: '''Inclinarse ante'' expresa la postración física y de homenaje sin colapsarla con ''adorar'', manteniendo la distinción que el texto hebreo hace entre servir y prosternarse.'
- source_word: הַעִדֹתִי בָכֶם הַיּוֹם
  english_pob_choice: I testify against you today
  chosen_spanish: hoy testifico contra ustedes
  alternatives_spanish:
  - hoy doy testimonio contra ustedes
  - hoy les doy testimonio
  lexicon: HALOT
  rationale: El verbo de testimonio en este contexto tiene fuerza forense. 'Contra ustedes' preserva esa carga legal. Se usa 'ustedes' para una lectura publicada y general, aunque el singular hebreo se dirige al individuo representativo.
- source_word: כִּי אָבֹד תֹּאבֵדוּן
  english_pob_choice: that you will surely perish
  chosen_spanish: que ciertamente perecerán
  alternatives_spanish:
  - que seguramente perecerán
  - que perecerán sin falta
  lexicon: HALOT
  rationale: La construcción enfática se refleja con 'ciertamente'. 'Perecerán' mantiene el verbo intransitivo/resultativo del hebreo. Se opta por plural en español por concordancia con 'ustedes' en la cláusula anterior y para un registro natural de advertencia comunitaria.
theological_decisions:
- issue: Nombre divino en יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el nombre del pacto. En la línea del POB en inglés, se evita ocultarlo con un sustituto reverencial y se mantiene la forma estable del proyecto en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Alcance del destinatario singular en un español de lectura pública
  english_pob_reading: you ... you ... you will surely perish
  chosen_spanish_reading: ustedes ... perecerán
  alternative_spanish_readings:
  - tú ... perecerás
  - vosotros ... pereceréis
  rationale: El hebreo alterna singular gramatical con un pronunciamiento dirigido al pueblo. Para lectura pública en español neutro, se prefiere 'ustedes' para evitar un singular poco natural en la última cláusula y conservar el carácter comunitario de la advertencia, sin alterar el contenido del juicio.
  doctrine_reference: Gramática del discurso pactual en Deuteronomio; coherencia de destinatario en español bíblico
translation_notes:
  revision_awareness: 'Se comparó el hebreo masorético con el texto inglés auditado. No se adoptó una traducción mecánica del inglés: se conservó la intensidad del infinitivo absoluto hebreo, la distinción entre ''servir'' e ''inclinarse'', y el valor forense de ''testifico contra ustedes''. No hubo revisiones aplicadas en el tramo auditado.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - Se conserva 'dioses' en minúscula para los ídolos, en contraste con 'Dios' para אֱלֹהֶיךָ.
  - Se distingue 'les sirves' de 'te inclinas ante ellos' para reflejar dos verbos hebreos diferentes.
  - La nota a pie de página marca el énfasis del hebreo sin duplicar la idea en el cuerpo del texto.
