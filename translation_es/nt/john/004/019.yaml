translation:
  language: es
  text: 'La mujer le dijo: «Señor[a], veo que tú eres un profeta».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «señor». El griego κύριε puede ser una forma respetuosa de dirigirse a alguien, además de «Señor».
    reason: alternative_reading
lexical_decisions:
- source_word: λέγει
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - dice
  lexicon: BDAG
  rationale: En español narrativo normal, el presente histórico griego se vierte naturalmente con pasado simple. 'Dijo' conserva el flujo discursivo sin calcar la forma verbal griega.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El dativo de destinatario se expresa de modo natural con el clítico indirecto 'le' en español.
- source_word: γυνή
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la esposa
  lexicon: BDAG
  rationale: En este contexto joánico se trata de la mujer samaritana; 'la mujer' es la equivalencia natural y evita el sentido incorrecto de 'esposa'.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Sir
  - Maestro
  lexicon: BDAG
  rationale: Se conserva el valor de tratamiento respetuoso con la forma española tradicional y amplia 'Señor'. Aunque el griego puede ser también un trato deferente similar a 'sir', en español 'Señor' mantiene la ambigüedad entre respeto y posible carga religiosa.
- source_word: θεωρῶ
  english_pob_choice: I see
  chosen_spanish: veo
  alternatives_spanish:
  - percibo
  - observo
  lexicon: BDAG
  rationale: Aquí θεωρέω expresa reconocimiento a partir de lo que Jesús ha revelado. 'Veo' es natural en español y transmite discernimiento sin sobreformalidad.
- source_word: προφήτης
  english_pob_choice: a prophet
  chosen_spanish: un profeta
  alternatives_spanish:
  - el profeta
  lexicon: BDAG
  rationale: 'El predicado sin artículo en griego se rinde de forma indefinida: ella reconoce a Jesús como ''un profeta'', no todavía como ''el Profeta'' esperado.'
- source_word: σύ
  english_pob_choice: you
  chosen_spanish: tú
  alternatives_spanish:
  - usted
  lexicon: BDAG
  rationale: El pronombre explícito griego añade énfasis. En español se puede conservar con 'tú' para reflejar ese énfasis, aunque el verbo ya lo implica.
theological_decisions:
- issue: κύριε como tratamiento respetuoso o confesión teológica
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Señor[a] (con nota de 'Señor' / 'Señor, o 'Señor' como equivalente de 'sir')
  rationale: 'La POB inglesa conserva ''Lord'' por defecto, pero anota que κύριε también puede significar un trato respetuoso. En español ''Señor'' reproduce esa misma tensión: puede ser una fórmula de respeto y también una forma teológicamente cargada. La nota preserva la alternativa de cortesía sin borrar la elección principal.'
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord; preserve alternatives in footnotes where ambiguity is contextually relevant.'
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el paquete inglés; la redacción española sigue el texto griego y el criterio auditado de la POB inglesa sin cambios de contenido.
  spanish_consistency_notes:
  - Se mantiene 'Señor' para κύριε conforme al valor por defecto del proyecto, con nota alternativa para preservar la ambigüedad respetuosa.
  - Se usa 'un profeta' para reflejar el predicado anartro griego.
  - El pronombre explícito 'tú' conserva el énfasis del σύ griego.
  - La puntuación y el orden de palabras siguen el español natural sin perder la estructura de la declaración.
