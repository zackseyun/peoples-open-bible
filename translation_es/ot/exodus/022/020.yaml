translation:
  language: es
  text: Al forastero[a] no lo maltratarás ni lo oprimirás, porque ustedes fueron forasteros en la tierra de Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “extranjero”, “residente extranjero” o “peregrino”. El hebreo גֵר se refiere a una persona no nativa que vive entre Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: גֵר
  english_pob_choice: foreigner
  chosen_spanish: forastero
  alternatives_spanish:
  - extranjero
  - residente foráneo
  - forastero residente
  lexicon: HALOT
  rationale: גֵר designa a una persona no nativa que vive entre el pueblo, no simplemente un transeúnte. "Forastero" comunica bien en español esa condición de ajenidad social y residencial sin sonar tan técnico como "residente foráneo" ni más vago que "extranjero".
- source_word: תוֹנֶה
  english_pob_choice: mistreat
  chosen_spanish: maltratar
  alternatives_spanish:
  - hacer injusticia a
  - oprimir
  - tratar mal
  lexicon: HALOT
  rationale: El verbo en hiﬁl expresa tratar de manera injusta o abusiva. "Maltratar" transmite el trato indebido de forma natural en español y no restringe el sentido a explotación económica בלבד.
- source_word: תִלְחָצֶנּוּ
  english_pob_choice: oppress him
  chosen_spanish: oprimir
  alternatives_spanish:
  - apremiar
  - aplastar
  - presionar
  lexicon: HALOT
  rationale: לחץ en este contexto legal tiene fuerza de presión abusiva u opresión. "Oprimir" conserva ese peso jurídico y moral en español, y el pronombre implícito se expresa naturalmente con "lo".
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque ustedes
  lexicon: HALOT
  rationale: Aquí introduce la razón del mandamiento. "Porque" es la forma más clara y directa en español para mantener el tono explicativo de la ley.
- source_word: גֵרִים
  english_pob_choice: foreigners
  chosen_spanish: forasteros
  alternatives_spanish:
  - extranjeros
  - residentes foráneos
  - forasteros
  lexicon: HALOT
  rationale: Conviene repetir en español el mismo núcleo léxico que en la primera cláusula. "Forasteros" mantiene la relación terminológica con גֵר y evita reducir el sentido a una nacionalidad moderna específica.
- source_word: הֱיִיתֶם
  english_pob_choice: you were
  chosen_spanish: ustedes fueron
  alternatives_spanish:
  - ustedes eran
  - vosotros fuisteis
  lexicon: HALOT
  rationale: El hebreo afirma el estado pasado de Israel en Egipto. "Ustedes fueron" es idiomático en español latinoamericano y conserva la referencia histórica sin añadir matices aspectuales no requeridos.
- source_word: בְּאֶרֶץ מִצְרָיִם
  english_pob_choice: in the land of Egypt
  chosen_spanish: en la tierra de Egipto
  alternatives_spanish:
  - en Egipto
  - en el país de Egipto
  lexicon: HALOT
  rationale: El hebreo dice literalmente "en la tierra de Egipto". Mantener "tierra" conserva la forma formal del recordatorio legal y refleja con más precisión la estructura del original.
theological_decisions:
- issue: Tratamiento del singular genérico en la ley
  english_pob_reading: Retain singular 'a foreigner' and 'him' as generic legal style.
  chosen_spanish_reading: 'Conservar el singular genérico en español: ''Al forastero ... lo ... lo''.'
  alternative_spanish_readings:
  - No maltraten ni opriman a los forasteros
  - Al forastero no lo maltratarás ni lo oprimirás
  rationale: El hebreo usa singular con sufijo masculino singular, funcionando como estilo jurídico genérico. La traducción española mantiene esa forma para no borrar la tensión gramatical del original, aunque el sentido se aplique a la categoría completa.
  doctrine_reference: DOCTRINE.md §Translation philosophy, punto 4
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y coincide con el audit trail inglés en las decisiones centrales: גֵר como persona no nativa residente, תוֹנֶה como trato injusto, תִלְחָצֶנּוּ como opresión, y כִּי como explicación causal. No se detectan revisiones previas que exijan ajustar el sentido.'
  spanish_consistency_notes:
  - Se mantiene el tratamiento de segunda persona plural 'ustedes' en la cláusula causal, acorde con el español bíblico moderno y con el plural hebreo.
  - Se conserva la repetición léxica conceptual entre 'forastero' y 'forasteros' para reflejar la cohesión del original.
  - La puntuación sigue un estilo legal sobrio y legible para publicación.
