translation:
  language: es
  text: Dios, tú conoces mi necedad[a], y mis culpas[b] no están ocultas para ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi insensatez».
    reason: lexical_alternative
  - marker: b
    text: O «mis agravios» o «mis delitos». El plural hebreo puede expresarse más concretamente como ofensas o actos culpables.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Oh Dios
  lexicon: HALOT
  rationale: Es un vocativo directo en oración. En español, «Dios» funciona naturalmente como apelación directa sin necesidad de añadir «Oh», que sería más marcado estilísticamente.
- source_word: יָדַעְתָּ
  english_pob_choice: know
  chosen_spanish: conoces
  alternatives_spanish:
  - has conocido
  - sabes
  lexicon: HALOT
  rationale: El perfecto hebreo expresa aquí un conocimiento vigente y pleno. «Conoces» reproduce bien el valor estativo en español y suena natural en segunda persona.
- source_word: לְאִוַּלְתִּי
  english_pob_choice: my foolishness
  chosen_spanish: mi necedad
  alternatives_spanish:
  - mi foolishness?
  - mi necedad y torpeza
  - mi falta de juicio
  lexicon: HALOT
  rationale: El sustantivo apunta a necedad/follía moral, no solo a error intelectual. «Neceidad» preserva la censura ética con un registro bíblico claro y actual.
- source_word: וְאַשְׁמוֹתַי
  english_pob_choice: my guilt
  chosen_spanish: mis culpas
  alternatives_spanish:
  - mis pecados
  - mis delitos
  - mis transgresiones
  lexicon: HALOT
  rationale: El plural con sufijo comunica un conjunto de actos culpables. «Culpas» conserva ese plural y evita reducir el matiz a una sola categoría abstracta; además mantiene la tensión con el posible valor de «wrongs» documentado en el audito inglés.
- source_word: לֹא נִכְחָדוּ
  english_pob_choice: is not hidden
  chosen_spanish: no te son ocultas
  alternatives_spanish:
  - no están ocultas
  - no han sido ocultadas
  - no están escondidas
  lexicon: HALOT
  rationale: El nifal de כחד expresa estar oculto/concealado. En español, con el complemento «a ti» implícito en el contexto, «no te son ocultas» es idiomático y conserva la pasividad del hebreo mejor que una simple afirmación activa.
- source_word: מִמְּךָ
  english_pob_choice: from you
  chosen_spanish: te
  alternatives_spanish:
  - de ti
  - ante ti
  lexicon: HALOT
  rationale: La preposición con sufijo marca ocultamiento respecto del destinatario. En español, la construcción «no te son ocultas» integra ese valor relacional de manera natural, sin perder la dirección hacia Dios.
theological_decisions:
- issue: Confesión personal de pecado en un salmo con posterior uso mesiánico
  english_pob_reading: Translate the verse as the psalmist's own confession without harmonizing away the admission of foolishness and guilt.
  chosen_spanish_reading: Mantener la confesión personal del salmista sin suavizar ni universalizar sus culpas.
  alternative_spanish_readings:
  - Interpretarlo solo como confesión corporativa o representativa
  - Atenuar el tono de culpa personal
  rationale: El hebreo presenta primera persona singular de modo explícito. La traducción debe preservar la voz confesional original y no resolver la tensión teológica del texto mediante una lectura armonizadora.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: 'Alineado con el texto hebreo WLC y con el auditorio inglés: se preserva la confesión personal, el paralelismo entre necedad/culpas y el matiz de ocultamiento ante Dios. No se introducen armonizaciones doctrinales ni se diluye el plural de אַשְׁמוֹתַי.'
  spanish_consistency_notes:
  - Se mantiene «Dios» como vocativo directo, en coherencia con el uso POB para אֱלֹהִים.
  - «Neceidad» y «culpas» conservan el carácter moral del hebreo sin caer en tecnicismos.
  - La cláusula final usa una pasiva perifrástica idiomática («no te son ocultas») para reflejar el sentido de «no están ocultas de ti».
