    issue: Anclaje de nota mal formado en 'de[toques de trompeta][a]'
    rationale: La instrucción exige que el marcador aparezca como '[a]' en el texto, anclado a la palabra o frase pertinente. La forma actual introduce corchetes indebidos alrededor de la frase y produce una lectura antinatural.
  - severity: low
    issue: '''Habrá para ustedes una santa convocación'' suena poco idiomático'
    rationale: Aunque no es incorrecto, en español bíblico moderno 'tendrán una santa convocación' o 'será para ustedes una santa convocación' representa mejor la fuerza normativa de יִהְיֶה לָכֶם y mejora la fluidez.
