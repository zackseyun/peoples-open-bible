base_translation:
  language: en
  yaml_path: translation/ot/ruth/004/014.yaml
  text: Then the women said to Naomi[a], “Blessed be Yahweh, who has not left you without a redeemer today[c][b], and may his name be renowned in Israel.”
  footnotes:
  - marker: a
    text: Or 'kinsman-redeemer' or 'guardian-redeemer,' highlighting the family-legal role of a close relative who acts to restore and protect a family line.
    reason: lexical_alternative
  - marker: b
    text: The 'redeemer' may refer specifically to the newborn child as Naomi's restorer, though some understand it more broadly in light of Boaz's role as redeemer in the chapter.
    reason: alternative_reading
  - marker: c
    text: Hebrew literally, 'may his name be called in Israel'; the expression means that his name will be known, invoked, or honored among Israel.
    reason: lexical_alternative
