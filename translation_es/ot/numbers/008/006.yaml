translation:
  language: es
  text: Toma a los levitas de entre los hijos de Israel y purifícalos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los israelitas' o 'el pueblo de Israel'. Literalmente, 'los hijos de Israel'.
    reason: lexical_alternative
lexical_decisions:
- source_word: קַח
  english_pob_choice: Take
  chosen_spanish: Toma
  alternatives_spanish:
  - Toma para ti
  - Toma y aparta
  lexicon: HALOT
  rationale: El imperativo de לקח aquí expresa una orden directa a Moisés. En español, 'toma' conserva la sencillez y la fuerza del mandato sin añadir matices no presentes en el hebreo.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los descendientes de Leví
  - la tribu de Leví
  lexicon: HALOT
  rationale: El término designa al grupo tribal/ministerial conocido en español como 'levitas'. Es la forma más precisa y natural en este contexto ritual.
- source_word: מִתּוֹךְ
  english_pob_choice: from among
  chosen_spanish: de entre
  alternatives_spanish:
  - del medio de
  - de en medio de
  lexicon: HALOT
  rationale: La expresión señala separación de un grupo mayor. 'De entre' reproduce bien la idea de selección desde dentro de Israel y suena natural en español bíblico contemporáneo.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva el paralelo literal y el matiz familiar/covenantal de la expresión hebrea. Aunque 'los israelitas' es una alternativa válida, 'hijos de Israel' refleja mejor la forma del original.
- source_word: וְטִהַרְתָּ אֹתָם
  english_pob_choice: and cleanse them
  chosen_spanish: y purifícalos
  alternatives_spanish:
  - y límpialos
  - y hazlos puros
  lexicon: HALOT
  rationale: En contexto ritual, טהר remite a purificación ceremonial. 'Purifícalos' comunica ese sentido con mayor precisión que 'limpia' y evita reducirlo a higiene ordinaria.
theological_decisions:
- issue: Designación corporativa de Israel en בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: Se mantiene la forma masculina plural heredada del hebreo porque funciona aquí como designación del pueblo del pacto y el texto no exige neutralización. Esto preserva la correspondencia formal y el enlace con la imagen familiar/covenantal del original.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Purisicación ritual frente a limpieza física
  english_pob_reading: cleanse them
  chosen_spanish_reading: purifícalos
  alternative_spanish_readings:
  - límpialos
  - hazlos puros
  rationale: El contexto de Núm 8 es ceremonial, no higiénico. 'Purifícalos' evita una lectura doméstica y mantiene la dimensión cultual del verbo טהר.
  doctrine_reference: HALOT; contexto ritual de Números 8
translation_notes:
  revision_awareness: El audit trail inglés muestra acuerdo alto y sin revisiones aplicadas; la propuesta española sigue de cerca esas decisiones léxicas y no introduce cambios doctrinales ni textuales.
  spanish_consistency_notes:
  - Se mantuvo 'levitas' para el grupo tribal especializado, coherente con el uso bíblico estándar y con el inglés auditado.
  - '''Purifícalos'' preserva el valor ritual de טהר sin introducir una explicación añadida en el texto principal.'
  - La nota al pie se ancla solo en 'hijos de Israel' porque ahí existe la alternativa léxica documentada en el audit trail.
