translation:
  language: es
  text: Entonces descendieron vivos al Seol[a], ellos y todo lo que les pertenecía, y la tierra los cubrió, y perecieron de en medio de la asamblea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «el sepulcro» o «el reino de los muertos». Hebreo: «Seol».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרְדוּ
  english_pob_choice: went down
  chosen_spanish: descendieron
  alternatives_spanish:
  - bajaron
  - fueron hacia abajo
  lexicon: HALOT
  rationale: El verbo ירד expresa movimiento hacia abajo. En español, «descendieron» conserva ese valor direccional con naturalidad y mantiene el tono narrativo del juicio.
- source_word: הֵם וְכָל אֲשֶׁר לָהֶם
  english_pob_choice: they and all that belonged to them
  chosen_spanish: ellos y todo lo que les pertenecía
  alternatives_spanish:
  - ellos y todo lo que era suyo
  - ellos y todos los que les pertenecían
  lexicon: HALOT
  rationale: La frase abarca a las personas implicadas y todo lo asociado con ellas. «Todo lo que les pertenecía» conserva esa amplitud sin restringirla solo a posesiones materiales o solo a dependientes humanos.
- source_word: חַיִּים
  english_pob_choice: alive
  chosen_spanish: vivos
  alternatives_spanish:
  - con vida
  - vivos aún
  lexicon: HALOT
  rationale: 'Aquí funciona como predicativo: descendieron mientras aún tenían vida. «Vivos» es la forma más directa y natural en español.'
- source_word: שְׁאֹלָה
  english_pob_choice: into Sheol
  chosen_spanish: al Seol
  alternatives_spanish:
  - a Seol
  - al sepulcro
  - al reino de los muertos
  lexicon: HALOT
  rationale: Se preserva el término hebreo transliterado para no reducirlo a «sepulcro» ni cargarlo con una elaboración posterior. «Al» refleja el movimiento direccional del sufijo hebreo.
- source_word: וַתְּכַס עֲלֵיהֶם הָאָרֶץ
  english_pob_choice: the earth covered them
  chosen_spanish: la tierra los cubrió
  alternatives_spanish:
  - la tierra los cubrió por encima
  - la tierra los cubrió completamente
  lexicon: HALOT
  rationale: El hebreo presenta a la tierra como sujeto y el verbo כסה como «cubrir». La forma española directa reproduce el cuadro sin añadir matices no explicitados por el texto.
- source_word: וַיֹּאבְדוּ
  english_pob_choice: they perished
  chosen_spanish: perecieron
  alternatives_spanish:
  - fueron destruidos
  - se perdieron
  lexicon: HALOT
  rationale: אבד en este contexto expresa perecer o quedar perdidos. «Perecieron» conserva la fuerza de juicio sin especificar más de lo que el verbo permite.
- source_word: מִתּוֹךְ הַקָּהָל
  english_pob_choice: from the midst of the assembly
  chosen_spanish: de en medio de la asamblea
  alternatives_spanish:
  - de entre la asamblea
  - de en medio de la congregación
  lexicon: HALOT
  rationale: «De en medio de» reproduce el modismo hebreo de manera transparente. «Asamblea» mantiene קהל en un español bíblico claro y no sustituye innecesariamente por «congregación».
theological_decisions:
- issue: שְׁאֹל / Sheol
  english_pob_reading: Sheol, with footnoted alternatives such as 'the grave' or 'the realm of the dead'
  chosen_spanish_reading: Seol, con nota para opciones como «el sepulcro» o «el reino de los muertos»
  alternative_spanish_readings:
  - sepulcro
  - reino de los muertos
  - morada de los muertos
  rationale: La transliteración preserva el concepto veterotestamentario sin equipararlo de manera simplista con una tumba física ni con categorías posteriores más sistematizadas. La nota ofrece equivalentes posibles sin imponer uno solo.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La redacción sigue el último estado revisado del texto base inglés, que prefirió «the earth covered them» sobre «covered over them» por naturalidad. En español se refleja directamente como «la tierra los cubrió», sin añadir un equivalente innecesario de «over».
  spanish_consistency_notes:
  - Se mantiene «Seol» como transliteración consistente con el tratamiento del hebreo שְׁאֹל en el texto base inglés.
  - «Asamblea» conserva la correspondencia con קהל y evita oscilar entre «asamblea» y «congregación» sin motivo textual.
  - Se usa «perecieron» para וַיֹּאבְדוּ, en coherencia con el valor de juicio del contexto.
  - La construcción «de en medio de» preserva el modismo hebreo y coincide con el auditable English POB «from the midst of the assembly».
