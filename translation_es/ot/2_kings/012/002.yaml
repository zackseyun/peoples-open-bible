translation:
  language: es
  text: En el séptimo año de Jehú, Joás comenzó a reinar, y reinó cuarenta años en Jerusalén. El nombre de su madre fue Zibíah, de Beerseba.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בִּ/שְׁנַת שֶׁ֤בַע לְ/יֵהוּא֙
  english_pob_choice: In the seventh year of Jehu
  chosen_spanish: En el séptimo año de Jehú
  alternatives_spanish:
  - En el séptimo año de Jehú
  - Durante el séptimo año de Jehú
  lexicon: HALOT
  rationale: La fórmula hebrea de datación regnal se conserva con una preposición temporal natural en español. "En el séptimo año de Jehú" mantiene la relación cronológica sin recargar la expresión.
- source_word: מָלַ֣ךְ יְהוֹאָ֔שׁ
  english_pob_choice: Jehoash became king
  chosen_spanish: Joás comenzó a reinar
  alternatives_spanish:
  - Joás se hizo rey
  - Joás empezó a reinar
  lexicon: HALOT
  rationale: En esta fórmula de acceso, מָלַךְ tiene valor ingressivo. "Comenzó a reinar" comunica el inicio del reinado con claridad y evita confundirlo con la duración posterior.
- source_word: וְ/אַרְבָּעִ֣ים שָׁנָ֔ה מָלַ֖ךְ
  english_pob_choice: and he reigned forty years
  chosen_spanish: y reinó cuarenta años
  alternatives_spanish:
  - y fue rey cuarenta años
  - y gobernó cuarenta años
  lexicon: HALOT
  rationale: Aquí מָלַךְ expresa duración del reinado. "Reinó" es el equivalente más directo y natural en español para ese sentido.
- source_word: בִּ/ירֽוּשָׁלִָ֑ם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en Jerusalén
  lexicon: HALOT
  rationale: Locativo simple; no requiere adaptación interpretativa.
- source_word: וְ/שֵׁ֣ם אִמּ֔/וֹ
  english_pob_choice: His mother’s name was
  chosen_spanish: El nombre de su madre fue
  alternatives_spanish:
  - Y el nombre de su madre fue
  - Su madre se llamaba
  lexicon: HALOT
  rationale: Conserva el giro hebreo de identificación materna sin forzar una paráfrasis excesiva. Se opta por el orden nominal para seguir de cerca la forma de registro.
- source_word: צִבְיָ֖ה
  english_pob_choice: Zibiah
  chosen_spanish: Zibía
  alternatives_spanish:
  - Zibiah
  lexicon: transliteration standard
  rationale: Se translitera el nombre propio al español con acentuación gráfica para lectura natural, manteniendo la identidad del nombre bíblico.
- source_word: מִ/בְּאֵ֥ר שָֽׁבַע
  english_pob_choice: of Beersheba
  chosen_spanish: de Beerseba
  alternatives_spanish:
  - de Beerseba
  - procedente de Beerseba
  lexicon: HALOT
  rationale: El מִן de procedencia puede verse como origen familiar o geográfico. "De Beerseba" conserva esa relación de procedencia de manera idiomática en español, como en el audit trail inglés.
translation_notes:
  revision_awareness: El texto inglés auditado no muestra revisiones aplicadas ni cambios de sentido; la concordancia general es alta y no se documentan tensiones textuales o teológicas que requieran notas adicionales en esta perícopa.
  spanish_consistency_notes:
  - Se mantiene "Jehú" y "Joás" como formas españolas usuales de los nombres propios bíblicos.
  - Se usa "reinó" para la duración del reinado y "comenzó a reinar" para el acceso, distinguiendo ambos valores de מָלַךְ.
  - Se conserva el estilo narrativo sobrio del registro real sin añadir explicaciones no presentes en el hebreo.
