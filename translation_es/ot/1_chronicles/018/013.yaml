base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/018/013.yaml
  text: He placed garrisons in Edom[a], and all Edom became servants to David[b]. And Yahweh gave David victory wherever he went.
  footnotes:
  - marker: a
    text: Or 'servants to David.' The Hebrew term can denote those in service or subjection, but here the conquest setting makes the stronger sense of bondage more likely.
    reason: lexical_alternative
  - marker: b
    text: Or 'the LORD saved David' or 'the LORD delivered David.' The Hebrew verb can be rendered more literally as 'saved,' with 'gave victory' bringing out the military sense in context.
    reason: lexical_alternative
