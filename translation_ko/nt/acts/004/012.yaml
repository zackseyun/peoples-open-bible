source:
  edition: SBLGNT
  text: καὶ οὐκ ἔστιν ἐν ἄλλῳ οὐδενὶ ἡ σωτηρία, ⸀οὐδὲ γὰρ ὄνομά ἐστιν ἕτερον ⸂ὑπὸ τὸν οὐρανὸν⸃ τὸ δεδομένον ἐν ἀνθρώποις ἐν ᾧ δεῖ σωθῆναι ἡμᾶς.
base_translation:
  language: en
  yaml_path: translation/nt/acts/004/012.yaml
  text: And there is salvation in no one else[a], for there is no other name under heaven given among men by which we must be saved.
  footnotes:
  - marker: a
    text: Or 'given among human beings.' The Greek ἀνθρώποις is generic here, referring to humanity.
    reason: lexical_alternative
translation:
  language: ko
  text: 「다른 이로써는 구원을 받을 수 없으니, 하늘 아래에 사람들에게 주어진 다른 이름이 없고, 우리가 그 이름으로 구원을 받아야 하기 때문입니다.」
  philosophy: optimal-equivalence
theological_decisions:
- issue: 4:12의 배타적 구원론 정식 보존
  chosen_reading: 다른 이로써는 구원을 받을 수 없으니, 하늘 아래에 사람들에게 주어진 다른 이름이 없고, 우리가 그 이름으로 구원을 받아야 하기 때문입니다
  alternative_readings:
  - 다른 누구에게서도 구원이 없으니
  rationale: 헬라어 본문의 강한 배타성(οὐκ ... ἐν ἄλλῳ οὐδενί ... οὐδὲ ... ὄνομά ἐστιν ἕτερον)을 약화시키지 않도록 「다른 이로써는 구원을 받을 수 없으니」의 정형 표현으로 옮긴다. 본문의 신학적 무게를 부드럽게 만들지 않는다.
  doctrine_reference: 'DOCTRINE.md §1·§5: 원문의 강한 의미를 약화시키지 않음'
