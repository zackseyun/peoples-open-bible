translation:
  language: es
  text: Y la empuñadura[a] también entró después de la hoja, y la grasa se cerró sobre la hoja, porque no sacó la espada de su vientre; y salió el excremento[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, 'el mango' o 'el asta' también entró después de la hoja.
    reason: lexical_alternative
  - marker: b
    text: El término hebreo traducido 'excremento' es raro y puede referirse más ampliamente a heces o al contenido de los intestinos.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנִּצָּב
  english_pob_choice: the hilt
  chosen_spanish: el mango
  alternatives_spanish:
  - la empuñadura
  - el puño
  lexicon: HALOT
  rationale: En este contexto de una espada introducida en el cuerpo, la pieza que sigue a la hoja debe nombrarse con un término natural y claro en español. 'Mango' comunica bien la parte de agarre o continuación de la espada; 'empuñadura' es una alternativa válida y más técnica. Se evita 'asta' o 'vara' porque no corresponden al arma aquí.
- source_word: הַלַּהַב
  english_pob_choice: the blade
  chosen_spanish: la hoja
  alternatives_spanish:
  - la espada
  - el filo
  lexicon: HALOT
  rationale: El sustantivo en contexto bélico designa la parte cortante del arma. 'Hoja' es el equivalente español más natural y preciso para una espada; 'filo' enfatiza el borde cortante pero pierde la imagen de la pieza entera.
- source_word: וַיִּסְגֹּר
  english_pob_choice: closed over
  chosen_spanish: se cerró sobre
  alternatives_spanish:
  - se cerró encima de
  - la cubrió
  lexicon: HALOT
  rationale: La imagen es de envolvimiento físico. 'Se cerró sobre' mantiene la idea de cobertura/enclosure sin añadir interpretación. 'Cubrió' sería más libre y menos fiel a la construcción narrativa.
- source_word: הַחֵלֶב
  english_pob_choice: the fat
  chosen_spanish: la grasa
  alternatives_spanish:
  - la gordura
  - la grasa corporal
  lexicon: HALOT
  rationale: El término hebreo señala grasa de manera concreta y gráfica. 'Grasa' es la opción más directa y idiomática en español; conserva el tono corporal sin volverse clínico.
- source_word: בְּעַד
  english_pob_choice: over
  chosen_spanish: sobre
  alternatives_spanish:
  - alrededor de
  - encima de
  lexicon: HALOT
  rationale: La preposición en esta escena expresa cobertura/envoltura. 'Sobre' funciona de modo natural con 'se cerró' y reproduce el sentido relacional del hebreo.
- source_word: שָׁלַף
  english_pob_choice: pull out
  chosen_spanish: sacó
  alternatives_spanish:
  - desenvainó
  - extrajo
  lexicon: HALOT
  rationale: Aunque el verbo suele referirse a desenvainar o sacar un arma, aquí el objeto está ya dentro del vientre. 'Sacó' es más natural en español que 'desenvainó' y conserva la acción de retirar la espada.
- source_word: מִבִּטְנוֹ
  english_pob_choice: out of his belly
  chosen_spanish: de su vientre
  alternatives_spanish:
  - de su abdomen
  - de sus entrañas
  lexicon: HALOT
  rationale: '''Vientre'' preserva el registro corporal y vívido del hebreo, sin llegar a una formulación demasiado técnica. ''Abdomen'' es más clínico; ''entrañas'' intensifica el tono pero cambia el matiz anatómico.'
- source_word: הַפַּרְשְׁדֹנָה
  english_pob_choice: the dung
  chosen_spanish: el excremento
  alternatives_spanish:
  - las heces
  - la suciedad
  lexicon: HALOT
  rationale: El término hebreo es raro y probablemente designa desecho fecal o contenido intestinal. En español, 'excremento' comunica el sentido general con claridad y sin depender de un coloquialismo. Se evita una traducción demasiado específica donde el hebreo mismo es discutido.
- source_word: וַיֵּצֵא
  english_pob_choice: came out
  chosen_spanish: salió
  alternatives_spanish:
  - se salió
  - salió afuera
  lexicon: HALOT
  rationale: Verbo narrativo simple de salida. 'Salió' es la forma más natural y directa en español.
- source_word: גַם
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - incluso
  - aun
  lexicon: HALOT
  rationale: 'La partícula añade énfasis: no solo entró la hoja, sino también la otra parte de la espada. ''También'' comunica esa ampliación con claridad.'
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el auditable inglés POB, sin cambios respecto al último pase revisado; se conserva la lectura gruesa y gráfica del pasaje, con una opción española natural para el arma y el desecho corporal.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como terminología por defecto en el proyecto, pero este versículo no lo contiene.
  - Se eligió 'hoja' para הַלַּהַב por ajuste idiomático en español, equivalente contextual de 'blade'.
  - Se usó 'excremento' en el texto principal para preservar el sentido general sin fijar más de lo que el hebreo raro garantiza.
