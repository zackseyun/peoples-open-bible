id: RUT.4.4
reference: Ruth 4:4
source:
  edition: WLC
  text: וַ/אֲנִ֨י אָמַ֜רְתִּי אֶגְלֶ֧ה אָזְנְ/ךָ֣ לֵ/אמֹ֗ר קְ֠נֵה נֶ֥גֶד הַֽ/יֹּשְׁבִים֮ וְ/נֶ֣גֶד זִקְנֵ֣י עַמִּ/י֒ אִם תִּגְאַל֙ גְּאָ֔ל וְ/אִם לֹ֨א יִגְאַ֜ל הַגִּ֣ידָ/ה לִּ֗/י ו/אדע כִּ֣י אֵ֤ין זוּלָֽתְ/ךָ֙ לִ/גְא֔וֹל וְ/אָנֹכִ֖י אַחֲרֶ֑י/ךָ וַ/יֹּ֖אמֶר אָנֹכִ֥י אֶגְאָֽל־־׃
translation:
  text: So I thought I should inform you[a], saying, ‘Buy it in the presence of those sitting here and in the presence of the elders of my people. If you will redeem it, redeem it; but if he will not redeem it, tell me, so that I may know, for there is no one besides you to redeem it, and I am after you.’ And he said[b], ‘I will redeem it.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'uncover your ear,' an idiom meaning 'inform you' or 'let you know.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew text reads 'if he will not redeem'; some understand this in context as 'if you will not redeem,' smoothing the shift from second person to third person.
    reason: alternative_reading
lexical_decisions:
- source_word: אֶגְלֶה אָזְנְךָ
  chosen: inform you
  alternatives:
  - uncover your ear
  - disclose it to you
  - let you know
  lexicon: HALOT
  rationale: The idiom literally means 'uncover your ear,' that is, to reveal something privately or make someone aware. 'Inform you' gives the idiomatic sense in clear modern English without over-paraphrasing.
- source_word: קְנֵה
  chosen: Acquire it
  alternatives:
  - Buy it
  - Purchase it
  lexicon: HALOT
  rationale: The verb קנה commonly means acquire/buy. In this legal-property context, 'acquire it' preserves the broader legal sense, since the transaction involves redemption rights, not merely a simple commercial purchase.
- source_word: נֶגֶד הַיֹּשְׁבִים
  chosen: in the presence of those sitting here
  alternatives:
  - before those sitting here
  - in front of the seated ones
  lexicon: HALOT
  rationale: נגד indicates public presence or witness. 'Those sitting here' reflects the participle היושבים and the immediate gate setting, making the legal-public context explicit in natural English.
- source_word: זִקְנֵי עַמִּי
  chosen: the elders of my people
  alternatives:
  - the elders of my clan
  - the elders of my people-group
  lexicon: HALOT
  rationale: The phrase denotes recognized community leaders. 'My people' is the straightforward rendering of עמי and should not be narrowed to 'clan' without necessity.
- source_word: תִּגְאַל ... גְּאָל
  chosen: If you will redeem it, redeem it
  alternatives:
  - If you want to redeem it, redeem it
  - If you will act as redeemer, do so
  lexicon: HALOT
  rationale: The repetition of גאל is preserved for emphasis. 'Redeem' is the established and accurate legal-familial term in this context, referring to exercising the right/duty of a kinsman-redeemer regarding property.
- source_word: וְאִם לֹא יִגְאַל
  chosen: but if he will not redeem it
  alternatives:
  - but if you will not redeem it
  - but if one will not redeem it
  lexicon: HALOT
  rationale: The consonantal text points to 3ms ('if he will not redeem'), which is somewhat abrupt after the 2ms address. This likely reflects the idiomatic/legal style or a shift to the role rather than the person. The main text keeps the MT reading, while an alternative smoother rendering is preserved in a footnote.
- source_word: הַגִּידָה לִּי
  chosen: tell me
  alternatives:
  - declare to me
  - inform me
  lexicon: HALOT
  rationale: A direct imperative in ordinary speech. 'Tell me' is natural and sufficiently formal for the context.
- source_word: אֵין זוּלָתְךָ
  chosen: there is no one besides you
  alternatives:
  - there is none except you
  - there is no one other than you
  lexicon: HALOT
  rationale: זוּלָת expresses exception/exclusivity. 'No one besides you' is idiomatic and clear.
- source_word: לִגְאֹל
  chosen: to redeem it
  alternatives:
  - to act as redeemer
  - to redeem
  lexicon: HALOT
  rationale: Although the infinitive lacks an explicit object, the context is the redemption of the field/right. Supplying 'it' in English is necessary for clarity and is contextually warranted.
- source_word: וְאָנֹכִי אַחֲרֶיךָ
  chosen: and I am after you
  alternatives:
  - and I come after you
  - and I am next after you
  lexicon: HALOT
  rationale: The phrase indicates order of legal right or obligation. 'I am after you' is concise and preserves the succession idea; the legal nuance is clear from context.
- source_word: אָנֹכִי אֶגְאָל
  chosen: I will redeem it
  alternatives:
  - I will act as redeemer
  - I will redeem
  lexicon: HALOT
  rationale: The response accepts the redemption right/duty. Supplying 'it' matches the preceding context and makes the English complete.
