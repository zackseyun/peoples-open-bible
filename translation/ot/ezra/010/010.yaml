id: EZR.10.10
reference: Ezra 10:10
source:
  edition: WLC
  text: וַ/יָּ֨קָם עֶזְרָ֤א הַ/כֹּהֵן֙ וַ/יֹּ֣אמֶר אֲלֵ/הֶ֔ם אַתֶּ֣ם מְעַלְתֶּ֔ם וַ/תֹּשִׁ֖יבוּ נָשִׁ֣ים נָכְרִיּ֑וֹת לְ/הוֹסִ֖יף עַל אַשְׁמַ֥ת יִשְׂרָאֵֽל־׃
translation:
  text: Then Ezra the priest stood up and said to them[a], “You have acted unfaithfully and have taken foreign women as wives, adding to the guilt of Israel.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “foreign wives.” The Hebrew phrase is literally “foreign women,” but in this context it refers to women taken in marriage.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  chosen: stood up
  alternatives:
  - arose
  - stood
  lexicon: HALOT
  rationale: The wayyiqtol of קום here introduces Ezra's public action in the assembly. 'Stood up' is natural modern English and preserves the physical/public sense better than the more archaic 'arose'.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: A straightforward appositional title identifying Ezra. The article is retained in English as part of the title phrase 'Ezra the priest.'
- source_word: מְעַלְתֶּם
  chosen: have acted unfaithfully
  alternatives:
  - have been unfaithful
  - have trespassed
  - have committed a breach of faith
  lexicon: HALOT
  rationale: מעל commonly denotes acting unfaithfully or committing a breach of faith, often in covenantal contexts. 'Acted unfaithfully' communicates both the moral and covenantal dimension in readable English without sounding overly technical.
- source_word: וַתֹּשִׁיבוּ
  chosen: have taken
  alternatives:
  - have caused to dwell
  - have settled
  - have married
  lexicon: HALOT
  rationale: The Hiphil of ישב literally means 'cause to dwell,' but in this context with 'foreign women' it idiomatically refers to bringing them into the household as wives. 'Have taken' is concise, idiomatic, and avoids over-interpreting beyond the marital context already implied by the larger passage.
- source_word: נָשִׁים נָכְרִיּוֹת
  chosen: foreign women as wives
  alternatives:
  - foreign women
  - foreign wives
  lexicon: HALOT
  rationale: נָשִׁים can mean 'women' or 'wives' depending on context. Since Ezra 10 concerns unlawful marriages, 'as wives' makes the relational force explicit while still reflecting the Hebrew wording. 'Foreign' is the standard rendering of נָכְרִיּוֹת here.
- source_word: לְהוֹסִיף
  chosen: adding
  alternatives:
  - to add
  - thereby increasing
  lexicon: HALOT
  rationale: The infinitive expresses result/purpose following the preceding offense. 'Adding' fits smooth English while preserving the sense of increase.
- source_word: אַשְׁמַת
  chosen: the guilt
  alternatives:
  - the guilt offering implication rejected
  - the trespass
  - the culpability
  lexicon: HALOT
  rationale: In this context אַשְׁמָה refers to guilt or culpability, not a guilt offering. 'The guilt of Israel' best captures the corporate liability being increased by the people's actions.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Retained as the covenant people collectively; the context is corporate rather than merely ethnic or geographic.
