review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: doble convocatoria a naciones/pueblos, luego a la tierra/el mundo con sus contenidos. Sin embargo, hay dos desajustes importantes respecto al expediente fuente: (1) «todos sus descendientes» estrecha y antropomorfiza כָּל־צֶאֱצָאֶיהָ más de lo debido, donde el sentido documentado es «todo lo que brota/procede de ella», con «offspring» como imagen generativa amplia; (2) la nota a «Acercaos» con «Venid cerca» no preserva fielmente la alternativa inglesa «Draw near», y suena poco natural en español. Además, «Oiga la tierra» es comprensible pero menos idiomático para el jussivo exhortativo que «Que oiga la tierra».'
  spanish_quality_summary: 'El español es claro en general, pero mezcla registros: «acercaos» y «escuchad» son correctos pero más peninsulares/tradicionales que el objetivo neutral latinoamericano; aun así, no hacen el texto ininteligible. La mejora más necesaria es estilística y semántica en la segunda mitad: «Que oiga la tierra… el mundo y todo lo que brota de él» suena más natural y preserva mejor el paralelismo cósmico sin reducirlo a personas. Las notas deben afinarse para sonar naturales en español bíblico moderno.'
  glossary_alignment: No hay términos del glosario principal en conflicto. «Naciones», «pueblos», «tierra» y «mundo» están bien alineados con las decisiones POB. El principal ajuste léxico requerido es para כָּל־צֶאֱצָאֶיהָ, donde debe evitarse un equivalente excesivamente humano como «descendientes» en el texto principal.
  issues:
  - severity: medium
    issue: «todos sus descendientes» para כָּל־צֶאֱצָאֶיהָ es demasiado estrecho
    rationale: El expediente inglés explica que la expresión puede incluir habitantes, produce y todo lo que surge del mundo; «descendientes» en español suena principalmente genealógico y humano.
  - severity: medium
    issue: La nota [a] «Venid cerca» es poco natural y no representa bien la alternativa documentada
    rationale: La alternativa inglesa es «Draw near». En español, «Acérquense»/«Aproximaos»/«Acercaos» serían alternativas naturales; «Venid cerca» suena forzado.
  - severity: low
    issue: «Oiga la tierra» es menos idiomático que «Que oiga la tierra» para un jussivo exhortativo
    rationale: Ambas opciones pueden funcionar, pero «Que oiga…» expresa mejor en español moderno el valor exhortativo del imperfecto hebreo.
  revised_spanish_text: Acercaos[a], naciones, para oír; y escuchad, pueblos. Que oiga la tierra, y todo lo que la llena[b], el mundo y todo lo que brota de él[c].
