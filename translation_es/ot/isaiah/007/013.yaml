review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo y sigue de cerca la auditoría inglesa: mantiene «Y dijo», el llamado a la casa de David, la fórmula retórica «¿Acaso les parece poco...?», la repetición de לאה con «cansar», y el posesivo explícito «mi Dios». También preserva adecuadamente el contraste entre «los hombres» y «mi Dios».'
  spanish_quality_summary: 'El español es claro y digno, pero hay un problema gramatical importante en la cláusula final: «que también cansen a mi Dios» usa subjuntivo y suena anómalo después de «¿Acaso les parece poco...?». Lo natural y fiel al valor retórico es «como para que también cansen a mi Dios» o «hasta cansar también a mi Dios». Además, en este contexto bíblico «Oigan» suena un poco más natural que «Escuchen», aunque ambas son aceptables.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Dios» y «mi Dios» están correctos; no aparece el nombre divino Yahvé ni terminología mesiánica. La decisión «los hombres» concuerda con la racionalidad documentada del POB para אֲנָשִׁים.
  issues:
  - severity: medium
    issue: Construcción española poco natural en «que también cansen a mi Dios»
    rationale: Aunque intenta reflejar el inglés «that you also weary my God», en español la secuencia con subjuntivo tras «¿Acaso les parece poco...?» queda forzada. Una construcción consecutiva/final como «como para que también cansen a mi Dios» expresa mejor la escalada retórica del hebreo sin añadir contenido.
  - severity: low
    issue: Matiz estilístico de «Escuchen, por favor»
    rationale: Es fiel, pero «Oigan, por favor» o «Escuchen, por favor» ambos sirven. No es un error; se puede mantener o ajustar por fluidez. La revisión principal no depende de esto.
  revised_spanish_text: 'Y dijo[a]: «Oigan, por favor, casa de David: ¿Acaso les parece poco cansar a los hombres[b], como para que también cansen a mi Dios?»'
  revised_footnotes:
  - marker: a
    text: 'O: «Entonces dijo».'
    reason: alternative_reading
  - marker: b
    text: «Hombres» traduce el plural masculino hebreo y contrasta a los seres humanos con Dios; alternativamente, «personas».
    reason: lexical_alternative
  revision_rationale: Se corrige la sintaxis española de la cláusula final para que suene natural y siga expresando la escalada retórica del hebreo. También se alinea la nota [b] con la auditoría inglesa, preservando la explicación léxica sobre «hombres» frente a una alternativa más inclusiva. El resto del versículo puede mantenerse con cambios mínimos.
