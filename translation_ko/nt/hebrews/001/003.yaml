id: HEB.1.3
reference: Hebrews 1:3
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὃς ὢν ἀπαύγασμα τῆς δόξης καὶ χαρακτὴρ τῆς ὑποστάσεως αὐτοῦ, φέρων τε τὰ πάντα τῷ ῥήματι τῆς δυνάμεως, δι’ αὑτοῦ καθαρισμὸν τῶν ἁμαρτιῶν ποιησάμενος ἐκάθισεν ἐν δεξιᾷ τῆς μεγαλωσύνης ἐν ὑψηλοῖς,
base_translation:
  language: en
  yaml_path: translation/nt/hebrews/001/003.yaml
  text: He, being the radiance of his glory and the exact imprint of his being, and sustaining all things by the word of his power, after making purification for sins through himself, sat down at the right hand of the Majesty on high,
translation:
  language: ko
  text: 그분은 하나님의 영광의 광채이시며 그 본체의 형상이시고[a], 자기 능력의 말씀으로 만물을 붙드시며, 친히[b] 죄들을 정결케 하심을 이루신 뒤에 높은 곳에 계신 위엄의 오른편에 앉으셨습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 χαρακτὴρ τῆς ὑποστάσεως는 「본질(substance/실체)의 정확한 각인」을 뜻한다. 「본체의 형상」은 한국 전통 번역의 자리잡은 표현이며, 후대 삼위일체 신학에서 ὑπόστασις가 「위격」으로 발전했으나 본문에서는 아직 「본질·실체」의 의미가 우선한다.
    reason: lexical_alternative
  - marker: b
    text: 사본은 δι’ αὑτοῦ(자신을 통하여/친히) 또는 δι’ ἑαυτοῦ로 읽는다. SBLGNT는 전자를 채택한다.
    reason: textual_variant
lexical_decisions:
- source_word: ἀπαύγασμα
  english_pob_choice: radiance
  chosen_korean: 광채
  alternatives_korean:
  - 반사광
  lexicon: BDAG
  rationale: ἀπαύγασμα는 본원의 빛에서 흘러나오는 빛, 곧 그 본원과 동일한 영광을 발하는 빛이다. 「광채」가 한국어 전통 번역에서 자리잡은 표현이다.
- source_word: χαρακτὴρ τῆς ὑποστάσεως
  english_pob_choice: exact imprint of his being
  chosen_korean: 본체의 형상
  alternatives_korean:
  - 본질의 정확한 각인
  - 실체의 표상
  lexicon: BDAG
  rationale: χαρακτήρ는 도장으로 찍은 정확한 각인을 가리키며, ὑπόστασις는 본문에서 「본질·실체」의 의미가 우선한다. 한국 교회 전통의 「본체의 형상」을 채택한다.
theological_decisions:
- issue: 히 1:1-4 서론의 운율과 신학적 절정 보존
  chosen_reading: 헬라어 한 문장(1:1-4)의 점층 구조를 한국어 종결형의 자연스러운 마침과 함께 단계적으로 풀되, 광채-본체-붙드심-정결-앉으심의 절정 동사 흐름을 보존한다.
  alternative_readings:
  - 한 문장으로 직역해 풀어쓰지 않음
  rationale: 서론은 그리스도의 신성·창조 매개·속죄·고양을 한 호흡으로 압축한다. 운율을 살리되 한국어 가독성을 위해 절을 나누고, 핵심 동사들(이시며, 붙드시며, 이루신 뒤에, 앉으셨습니다)을 절정으로 배치한다.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension; PHILOSOPHY.md: rhythm of source'
