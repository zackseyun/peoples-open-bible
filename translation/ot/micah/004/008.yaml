theological_decisions:
- issue: Whether to render the opening place-designations as literal titles or as fixed proper names tied to messianic/geographical tradition
  chosen_reading: Literal/topographical renderings in the main text ('tower of the flock,' 'hill of daughter Zion')
  alternative_readings:
  - 'Proper names: ''Migdal-eder'' and/or ''Ophel of daughter Zion'''
  rationale: The Hebrew nouns are transparently meaningful common nouns, and the translation philosophy prioritizes original-language sense over inherited translation tradition. Because some readers connect these expressions with specific Jerusalem/Bethlehem locations and messianic expectation, the proper-name alternatives are preserved in footnotes rather than elevated into the main text.
  doctrine_reference: Translation philosophy §1, §3
- issue: Whether 'the former dominion' refers specifically to the restored Davidic monarchy
  chosen_reading: Translate the political-restorative language without making the Davidic identification explicit in the main text
  alternative_readings:
  - Interpretive expansion such as 'the former Davidic dominion'
  rationale: The verse strongly suggests restoration of Jerusalem's earlier royal rule, but the Hebrew text itself does not explicitly name David here. To preserve theological tension and avoid importing a fuller interpretive conclusion into the translation, the main text remains textually restrained.
  doctrine_reference: Translation philosophy §3
