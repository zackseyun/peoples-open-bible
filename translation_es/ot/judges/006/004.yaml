    changes_summary: Changed 'as far as the approach to Gaza' to 'as far as Gaza' for a more natural rendering of the place expression, and changed 'means of survival' to 'sustenance' for a more formal and concise rendering of מִחְיָה.
translation:
  language: es
  text: Acampaban contra ellos y destruían el producto de la tierra hasta Gaza, y no dejaban sustento alguno en Israel, ni oveja, ni buey, ni asno.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּחֲנוּ עֲלֵיהֶם
  english_pob_choice: They would encamp against them
  chosen_spanish: Acampaban contra ellos
  alternatives_spanish:
  - Acampaban frente a ellos
  - Acampaban sobre ellos
  lexicon: HALOT
  rationale: חנה expresa acampar/establecer campamento. El valor habitual de la secuencia narrativa se comunica naturalmente en imperfecto español ('acampaban'). עַל con sufijo aquí tiene sentido adversativo y espacial, por eso 'contra ellos'.
- source_word: וַיַּשְׁחִיתוּ
  english_pob_choice: destroy
  chosen_spanish: destruían
  alternatives_spanish:
  - devastaban
  - arruinaban
  lexicon: HALOT
  rationale: שׁחת en el Hiphil indica destruir o devastar. 'Destruían' mantiene el aspecto repetido/habitual del contexto y es claro en español.
- source_word: יְבוּל הָאָרֶץ
  english_pob_choice: the produce of the land
  chosen_spanish: el produce de la tierra
  alternatives_spanish:
  - el fruto de la tierra
  - la cosecha de la tierra
  - el producto de la tierra
  lexicon: HALOT
  rationale: יְבוּל significa produce, rendimiento o cosecha. 'Produce de la tierra' sigue de cerca el valor léxico amplio y conserva el énfasis agrícola sin restringirlo solo a granos.
- source_word: עַד בּוֹאֲךָ עַזָּה
  english_pob_choice: as far as Gaza
  chosen_spanish: hasta Gaza
  alternatives_spanish:
  - hasta la llegada a Gaza
  - hasta el acercamiento a Gaza
  lexicon: HALOT
  rationale: Aunque el hebreo contiene el giro literal 'tu venida a Gaza', el POB inglés lo resolvió de forma más natural como un límite geográfico. En español, 'hasta Gaza' comunica bien el alcance sin añadir una nota pesada al texto principal.
- source_word: וְלֹא יַשְׁאִירוּ
  english_pob_choice: they would leave no
  chosen_spanish: no dejaban
  alternatives_spanish:
  - no dejarían
  - no dejaban nada
  lexicon: HALOT
  rationale: שׁאר en Hiphil significa dejar/restar. 'No dejaban' reproduce el valor habitual de la acción en el relato y evita una formulación más rígida.
- source_word: מִחְיָה
  english_pob_choice: sustenance
  chosen_spanish: sustento
  alternatives_spanish:
  - sustento de vida
  - medios de vida
  - alimento
  lexicon: HALOT
  rationale: מִחְיָה denota sustento, manutención o medios de vivir. 'Sustento' es una equivalencia sobria y comprensible; no se limita solo a comida, ni exagera hacia extinción total de personas.
- source_word: בְּיִשְׂרָאֵל
  english_pob_choice: in Israel
  chosen_spanish: en Israel
  alternatives_spanish:
  - para Israel
  lexicon: HALOT
  rationale: La preposición ב se traduce con naturalidad como 'en', refiriéndose al ámbito de Israel donde no se dejaba sustento.
- source_word: וְשֶׂה וָשׁוֹר וַחֲמוֹר
  english_pob_choice: nor sheep, ox, or donkey
  chosen_spanish: ni oveja, ni buey, ni asno
  alternatives_spanish:
  - ni oveja, ni toro, ni asno
  - ni ganado menor, ni buey, ni asno
  lexicon: HALOT
  rationale: Los sustantivos singulares funcionan de modo colectivo/representativo. 'Oveja, buey, asno' es natural en español y conserva la lista de ganado. 'Buey' es un equivalente preciso y tradicional para שׁוֹר.
translation_notes:
  revision_awareness: El inglés auditado pasó de 'as far as the approach to Gaza' a 'as far as Gaza' por naturalidad, y de 'means of survival' a 'sustenance' por concisión. El español sigue esa revisión con 'hasta Gaza' y 'sustento'.
  spanish_consistency_notes:
  - Se mantuvo el tono narrativo habitual con imperfecto ('acampaban', 'destruían', 'dejaban') para reflejar la repetición del saqueo.
  - Se evitó 'SEÑOR' u otra terminología no pertinente; no hay nombres divinos en el verso.
  - '''Produce de la tierra'' y ''sustento'' preservan el campo semántico agrícola y de supervivencia sin sobrerrepresentar el texto.'
