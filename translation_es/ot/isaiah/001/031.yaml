translation:
  language: es
  text: El hombre fuerte se volverá estopa[a], y su obra, una chispa; ambos arderán juntos, y no habrá quien los apague.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «estopa de lino»: fibra de lino suelta que prende con facilidad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶחָסֹן
  english_pob_choice: the strong man
  chosen_spanish: el hombre fuerte
  alternatives_spanish:
  - el fuerte
  - el hombre poderoso
  - el hombre robusto
  lexicon: HALOT
  rationale: El término apunta a una persona fuerte o poderosa; en este contexto judicial, "el hombre fuerte" conserva la referencia personal y suena natural en español, sin convertirlo en una abstracción.
- source_word: לִנְעֹרֶת
  english_pob_choice: tinder
  chosen_spanish: estopa
  alternatives_spanish:
  - yesca
  - tinder
  - estopa de lino
  lexicon: HALOT
  rationale: La imagen se refiere a fibra suelta que prende fácilmente. "Estopa" comunica bien la fragilidad combustible en español; la alternativa técnica "estopa de lino" queda implícita en la nota, y "yesca" también sería posible, pero "estopa" es más transparente para el lector moderno.
- source_word: וּפֹעֲלוֹ
  english_pob_choice: and his work
  chosen_spanish: y su obra
  alternatives_spanish:
  - y su trabajo
  - y su hecho
  - y lo que ha hecho
  lexicon: HALOT
  rationale: '"פֹעֲל" puede abarcar trabajo, hecho o producto. "Su obra" mantiene la amplitud del término y enlaza con el paralelismo poético: la persona y lo que ha producido quedan bajo el mismo juicio.'
- source_word: לְנִיצוֹץ
  english_pob_choice: a spark
  chosen_spanish: una chispa
  alternatives_spanish:
  - una centella
  - una chispa de fuego
  - un destello
  lexicon: HALOT
  rationale: '"Chispa" es el equivalente más natural y directo en español para un inicio de combustión, conservando la fuerza imagética del hebreo.'
- source_word: וּבָעֲרוּ
  english_pob_choice: will burn
  chosen_spanish: arderán
  alternatives_spanish:
  - quemarán
  - se quemarán
  - arderán en fuego
  lexicon: HALOT
  rationale: '"Arder" expresa bien la combustión sin añadir intensidad no explícita. En español suena más idiomático que un calco directo de "quemar" con sujeto plural intransitivo.'
- source_word: שְׁנֵיהֶם יַחְדָּו
  english_pob_choice: both of them ... together
  chosen_spanish: ambos ... juntos
  alternatives_spanish:
  - los dos ... juntos
  - ambos a la vez
  - los dos juntamente
  lexicon: HALOT
  rationale: La expresión doble resalta que la persona fuerte y su obra quedan consumidas conjuntamente. "Ambos ... juntos" preserva ese énfasis de manera natural en español.
- source_word: וְאֵין מְכַבֶּה
  english_pob_choice: with no one to quench them
  chosen_spanish: y no habrá quien los apague
  alternatives_spanish:
  - y no habrá quien los extinga
  - y nadie los apagará
  - sin que nadie los apague
  lexicon: HALOT
  rationale: El participio con "אין" expresa ausencia de quien pueda sofocar el fuego. "Apagar" es el verbo más claro y bíblicamente idiomático en español para extinguir fuego; el plural "los" retoma naturalmente a los dos elementos del verso.
theological_decisions:
- issue: 'Alcance del juicio: persona y obra'
  english_pob_reading: The possessive in 'his work' refers back to the strong man, so the verse judges both the powerful person and what he has done or produced.
  chosen_spanish_reading: '"su obra" se entiende como la obra del hombre fuerte, de modo que el juicio cae sobre la persona y también sobre lo que ha hecho o producido.'
  alternative_spanish_readings:
  - '"su obra" como referencia colectiva a las obras de la clase poderosa'
  - '"su obra" como actividad sin referencia personal estricta'
  rationale: El sufijo singular hebreo se refiere más naturalmente al sujeto singular precedente. Mantenerlo así preserva el paralelismo poético entre el sujeto poderoso y su resultado, sin diluir la responsabilidad personal.
  doctrine_reference: Responsabilidad personal bajo el juicio divino; paralelismo poético hebreo
translation_notes:
  revision_awareness: La versión sigue de cerca el audit trail inglés y el hebreo masorético, sin cambios revisionales reportados en el paquete fuente; se conservó la imagen de combustión total y la relación singular entre el hombre fuerte y su obra.
  spanish_consistency_notes:
  - Se mantuvo "Yahvé" como terminología por defecto del proyecto solo cuando el texto lo requiera; este verso no contiene el nombre divino.
  - Se eligió "hombre fuerte" para conservar la fuerza personal del hebreo sin recurrir a "poderoso" o a una formulación abstracta.
  - '"Arderán" y "apagar" se usan como verbos de fuego en español bíblico moderno, evitando un calco mecánico.'
  - La puntuación reproduce el paralelismo del hebreo con una pausa clara entre los dos miembros y la cláusula final de imposibilidad.
