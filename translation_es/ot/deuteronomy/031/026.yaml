translation:
  language: es
  text: Tomen este libro de la Ley y pónganlo junto al arca de la alianza de Yahvé, su Dios[a][b], y que permanezca allí como testigo contra ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘este rollo de la ley’. El hebreo סֵפֶר puede referirse a un rollo o a un documento escrito.
    reason: lexical_alternative
  - marker: b
    text: Es decir, como testimonio contra ustedes si quebrantan la alianza.
    reason: cultural_note
lexical_decisions:
- source_word: לָקֹחַ
  english_pob_choice: Take
  chosen_spanish: Tomen
  alternatives_spanish:
  - Tomen ustedes
  - Tomen para ustedes
  lexicon: HALOT
  rationale: El infinitivo hebreo funciona aquí con fuerza imperativa en una instrucción directa. En español, el imperativo plural ‘Tomen’ comunica con naturalidad esa exhortación sin agregar contenido.
- source_word: סֵפֶר הַתּוֹרָה הַזֶּה
  english_pob_choice: this Book of the Law
  chosen_spanish: este Libro de la Ley
  alternatives_spanish:
  - este rollo de la ley
  - este libro de instrucción
  lexicon: HALOT
  rationale: ‘Libro’ es la equivalencia idiomática más clara para סֵפֶר en este contexto, y conserva la formulación tradicional sin perder la posibilidad material de un documento escrito. ‘Ley’ expresa aquí la instrucción/covenio mosaico que el inglés POB ya fijó como ‘Law’.
- source_word: וְשַׂמְתֶּם אֹתוֹ
  english_pob_choice: and place it
  chosen_spanish: y pónganlo
  alternatives_spanish:
  - y colóquenlo
  - y déjenlo
  lexicon: HALOT
  rationale: שׂוּם pide un verbo concreto de ubicación. ‘Pongan’ mantiene sencillez y naturalidad, y el clítico ‘-lo’ preserva el objeto directo referido al libro.
- source_word: מִצַּד
  english_pob_choice: beside
  chosen_spanish: junto a
  alternatives_spanish:
  - al lado de
  - a un lado de
  lexicon: HALOT
  rationale: La preposición indica ubicación contigua al arca, no interioridad. ‘Junto a’ es la forma más natural en español para la relación espacial indicada por el hebreo.
- source_word: אֲרוֹן בְּרִית
  english_pob_choice: the ark of the covenant
  chosen_spanish: el arca del pacto
  alternatives_spanish:
  - el arca del convenio
  - el arca de la alianza
  lexicon: HALOT
  rationale: ‘Arca del pacto’ mantiene el término bíblico tradicional y corresponde al sentido del constructo. Se prefiere ‘pacto’ porque enlaza mejor con el marco covenantal del Deuteronomio y con la redacción auditada en inglés.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Siguiendo la convención del proyecto, el Nombre divino se traduce como ‘Yahvé’ en español. Esto preserva el uso consistente del Tetragrámaton y evita la sustitución por un título.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - tu Dios
  - el Dios de ustedes
  lexicon: HALOT
  rationale: El sufijo plural posesivo se expresa naturalmente con ‘su’ en tratamiento de ustedes. ‘Su Dios’ conserva la referencia relacional y la fórmula del pacto sin forzar un giro menos idiomático.
- source_word: וְהָיָה שָׁם
  english_pob_choice: and let it remain there
  chosen_spanish: y que permanezca allí
  alternatives_spanish:
  - y estará allí
  - y quede allí
  lexicon: HALOT
  rationale: La construcción expresa un estado resultante y duradero después de colocar el libro. ‘Que permanezca allí’ transmite esa permanencia intencional sin perder la idea de presencia continuada.
- source_word: בְּךָ
  english_pob_choice: against you
  chosen_spanish: contra ustedes
  alternatives_spanish:
  - para ustedes
  - con ustedes
  lexicon: HALOT
  rationale: En el contexto jurídico de testimonio del pacto, la preposición adquiere fuerza adversativa. Se traduce ‘contra ustedes’ para conservar el matiz de testimonio que acusa en caso de infidelidad al pacto.
- source_word: לְעֵד
  english_pob_choice: as a witness
  chosen_spanish: como testigo
  alternatives_spanish:
  - como testimonio
  - para testimonio
  lexicon: HALOT
  rationale: ‘Testigo’ conserva el valor forense de עֵד y funciona de modo natural con la frase precedente. La alternativa ‘testimonio’ es posible, pero ‘testigo’ mantiene mejor la personificación del libro como evidencia jurídica.
theological_decisions:
- issue: Función del libro como testimonio
  english_pob_reading: The book is rendered as a witness against Israel in covenantal/judicial sense.
  chosen_spanish_reading: El libro queda como testigo contra Israel en sentido pactual y jurídico.
  alternative_spanish_readings:
  - El libro queda solo como memorial junto al arca
  - El testimonio es neutral y no acusatorio
  rationale: El hebreo לְעֵד בְּךָ, dentro del marco de Deuteronomio, apunta a un testimonio que puede actuar contra el pueblo si quebranta el pacto. Se conserva esa tensión sin suavizarla hacia un simple recuerdo ceremonial.
  doctrine_reference: Mantener la tensión textual y jurídica del pacto; primacía del sentido original frente a una lectura devocional neutral.
translation_notes:
  revision_awareness: La versión sigue de cerca el texto hebreo y coincide con la decisión auditada en inglés de conservar el valor jurídico de ‘testigo contra ustedes’, a la vez que adapta la sintaxis al español moderno. No se registraron revisiones posteriores que cambiaran esta lectura.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ conforme a la terminología estándar del proyecto para יְהוָה.
  - Se mantiene ‘pacto’ para בְּרִית y ‘Ley’ para תּוֹרָה en este contexto mosaico.
  - ‘Testigo contra ustedes’ conserva el matiz forense del hebreo y la decisión auditada en inglés.
  - El tratamiento plural ‘ustedes’ refleja el sufijo pronominal plural del hebreo y la dirección corporativa del discurso.
