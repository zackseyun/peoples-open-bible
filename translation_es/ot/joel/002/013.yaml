review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el hebreo y el rastro inglés en la estructura general: imperativos paralelos, retorno a Yahvé, fórmula de misericordia divina y la cláusula final sobre el desastre. Sin embargo, dos decisiones no preservan bien el registro ni la fuerza del original/auditoría: «Rasgad» mezcla voseo peninsular con el resto del español neutral del versículo, y «se arrepiente respecto al desastre» sugiere con demasiada facilidad arrepentimiento moral en Dios, mientras que el hebreo נחם aquí, según la auditoría inglesa, expresa que él desiste/cede en cuanto al juicio anunciado.'
  spanish_quality_summary: 'La redacción es mayormente clara y digna, pero presenta incoherencia de tratamiento («Rasgad» vs. «vuelvan») y una nota b mal alineada con la auditoría inglesa: esta debía aclarar la cláusula final, no redefinir חסד. Además, «amor leal» es defendible, pero en español eclesial más amplio suena menos natural que «amor fiel».'
  glossary_alignment: 'Se respeta correctamente «Yahvé» para יְהוָה y «Dios» para אֱלֹהֵיכֶם. «Compasivo» funciona bien para רַחוּם. «Bondadoso» para חַנּוּן es aceptable, aunque «clemente» o «benigno» podrían acercarse más al matiz de gracia. La mayor desviación terminológica está en וְנִחָם: el proyecto inglés documenta «relenting», por lo que en español conviene «desiste» o «cede» antes que «se arrepiente».'
  issues:
  - severity: medium
    issue: Incoherencia de tratamiento verbal en «Rasgad ... y vuelvan»
    rationale: «Rasgad» es imperativo de vosotros, mientras «vuelvan» es de ustedes. El objetivo es español neutral latinoamericano; debe mantenerse un solo sistema, preferiblemente «Rasguen ... y vuelvan».
  - severity: high
    issue: «se arrepiente respecto al desastre» no refleja bien וְנִחָם עַל הָרָעָה en este contexto
    rationale: En español, «arrepentirse» aplicado a Dios suele implicar más fuertemente cambio por error o culpa moral. La auditoría inglesa justificó «relenting concerning the disaster» para preservar el antropopatismo sin sugerir error divino. «Desiste del desastre» o «cede en cuanto al desastre» comunica mejor esa idea.
  - severity: medium
    issue: La nota b está anclada a «amor leal» pero la auditoría inglesa coloca la aclaración en la cláusula final
    rationale: El inglés conserva una nota sobre «relenting concerning the disaster», explicando que se trata de retener el juicio amenazado. La nota española debería seguir esa prioridad documental.
  - severity: low
    issue: «amor leal» es posible pero menos natural que «amor fiel» en español general
    rationale: Para חסד, la explicación pactual puede mantenerse en nota si se desea, pero el texto principal gana fluidez con «amor fiel» sin perder el sentido de lealtad/covenio.
  revised_spanish_text: Rasguen[a] sus corazones y no sus vestiduras, y vuelvan a Yahvé su Dios, porque él es bondadoso y compasivo, lento para la ira y abundante en amor fiel, y desiste[b] del desastre.
  revised_footnotes:
