translation:
  language: es
  text: Y yo también doy, cada año, quince mil siclos de plata, de las rentas[a] del rey, de los lugares que le pertenecen[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de los ingresos del rey» o «del tesoro del rey»; la frase griega literalmente dice «del cómputo/cuenta del rey» y puede referirse a la partida o renta real.'
    reason: lexical_alternative
  - marker: b
    text: 'La frase final puede referirse a distritos o localidades de donde se extraen los fondos; literalmente: «de los lugares que pertenecen [a él]».'
    reason: lexical_alternative
lexical_decisions:
- source_word: κἀγὼ
  english_pob_choice: And I also
  chosen_spanish: Y yo también
  alternatives_spanish:
  - Y yo
  - Yo también
  lexicon: LSJ
  rationale: La crasis expresa conexión y énfasis personal; «Y yo también» conserva ambos matices de continuidad y participación propia sin sonar forzado en español.
- source_word: δίδωμι
  english_pob_choice: give
  chosen_spanish: doy
  alternatives_spanish:
  - entrego
  - doy
  lexicon: LSJ
  rationale: El verbo griego es amplio y en este contexto administrativo indica una concesión o aportación anual. «Doy» mantiene la literalidad básica sin añadir una interpretación más específica de la necesaria.
- source_word: κατʼ ἐνιαυτόν
  english_pob_choice: year by year
  chosen_spanish: cada año
  alternatives_spanish:
  - año por año
  - anualmente
  lexicon: LSJ
  rationale: La expresión griega denota repetición anual. «Cada año» es natural en español y preserva el sentido distributivo.
- source_word: δέκα πέντε χιλιάδας σίκλων ἀργυρίου
  english_pob_choice: fifteen thousand shekels of silver
  chosen_spanish: quince mil siclos de plata
  alternatives_spanish:
  - quince mil siclos de plata
  - quince mil monedas de plata
  lexicon: LSJ
  rationale: Se conserva «siclos» como medida antigua y «plata» para ἀργυρίου. No se moderniza la cifra a moneda actual para respetar el valor histórico del texto.
- source_word: ἀπὸ τοῦ λόγου τοῦ βασιλέως
  english_pob_choice: from the king’s revenues
  chosen_spanish: de las rentas del rey
  alternatives_spanish:
  - de los ingresos del rey
  - de los recursos del rey
  - del tesoro del rey
  lexicon: LSJ
  rationale: La revisión inglesa prefirió «revenues» por la claridad fiscal; en español «rentas» comunica mejor ese campo semántico que «cuenta» y evita una traducción demasiado literal de λόγος. «Del tesoro» sería posible, pero añade una imagen no garantizada por el griego.
- source_word: ἀπὸ τῶν τόπων τῶν ἀνηκόντων
  english_pob_choice: from the places that belong to him
  chosen_spanish: de los lugares que le pertenecen
  alternatives_spanish:
  - de los territorios que le pertenecen
  - de los lugares que le corresponden
  - de los distritos que le pertenecen
  lexicon: LSJ
  rationale: τόποι puede referirse a lugares/localidades o distritos. «Lugares» conserva la literalidad del griego y «le pertenecen» reproduce ἀνηκόντων con claridad en español.
translation_notes:
  revision_awareness: La base inglesa revisó «account» a «revenues» para hacer más natural y preciso τοῦ λόγου τοῦ βασιλέως en contexto financiero. La versión española sigue esa revisión con «rentas», manteniendo además la ambigüedad residual entre ingreso, partida y fondo real sin forzar una equivalencia única.
  spanish_consistency_notes:
  - Se mantiene la medida antigua «siclos» para conservar el registro histórico y evitar modernización anacrónica.
  - Se evita «SEÑOR» porque no hay un tetragrámaton ni una alusión al nombre divino en este versículo.
  - «Lugares» se conserva por fidelidad al griego, aunque en español pueda insinuar localidades o distritos; la nota explica esa amplitud semántica.
