translation:
  language: es
  text: Vayan[a], hijos, vayan, porque he quedado desolada[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'Caminen, hijos, caminen'; el verbo griego es literalmente 'caminar', usado aquí como una orden urgente para partir.
    reason: lexical_alternative
  - marker: b
    text: O 'porque he quedado sola' o 'he quedado abandonada'.
    reason: lexical_alternative
lexical_decisions:
- source_word: βαδίζετε
  english_pob_choice: Go
  chosen_spanish: Vayan
  alternatives_spanish:
  - Caminen
  - Avancen
  lexicon: BDAG
  rationale: El griego es literalmente 'caminen', pero en una orden urgente de partida, 'Vayan' comunica de forma natural el mandato sin perder el impulso del original. La repetición se conserva para el énfasis.
- source_word: τέκνα
  english_pob_choice: children
  chosen_spanish: hijos
  alternatives_spanish:
  - hijos e hijas
  - niños
  - descendientes
  lexicon: BDAG
  rationale: τέκνα es un término amplio de parentesco; en español 'hijos' funciona como vocativo natural y conserva el tono afectivo de la voz materna. 'Hijos e hijas' explicitaría inclusividad pero añade desarrollo que el griego no exige aquí.
- source_word: κατελείφθην
  english_pob_choice: I have been left
  chosen_spanish: he quedado
  alternatives_spanish:
  - fui dejada
  - he sido dejada
  - he sido abandonada
  lexicon: BDAG
  rationale: El pasivo expresa un estado resultante de quedar atrás o ser dejada. 'He quedado' mantiene ese resultado en español y evita intensificar el sentido a 'abandonada', que sería posible pero más interpretativo.
- source_word: ἔρημος
  english_pob_choice: desolate
  chosen_spanish: desolada
  alternatives_spanish:
  - sola
  - abandonada
  - desierta
  lexicon: BDAG
  rationale: ἔρημος puede significar sola, desierta o desolada. 'Desolada' preserva tanto la soledad como la condición de ruina o vacío emocional que mejor corresponde al lamento del verso.
theological_decisions:
- issue: Fuerza emotiva y situacional del estado de la voz que habla
  english_pob_reading: for I have been left desolate
  chosen_spanish_reading: porque he quedado desolada
  alternative_spanish_readings:
  - porque he quedado sola
  - porque he sido dejada desolada
  - porque he sido abandonada
  rationale: El versículo es un lamento; la traducción debe mantener su carga afectiva sin añadir una acusación más fuerte de la que el griego exige. 'He quedado desolada' conserva la vivencia de abandono/ruina y la ambigüedad entre estar sola y estar devastada.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source sense without paraphrase.'
translation_notes:
  revision_awareness: Concordancia alta con el texto griego y con el audit trail inglés; se preserva la repetición imperativa y la ambigüedad de ἔρημος sin sobreinterpretación. No hubo revisiones aplicadas en el pass más reciente.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el contexto lo requiere; este versículo no contiene el nombre divino.
  - Se prefiere 'Vayan' como equivalente idiomático de la orden de movimiento, con nota para la lectura literal 'caminen'.
  - '''Desolada'' mantiene el matiz de ruina/soledad del griego ἔρημος sin cerrar la alternativa de ''sola'' o ''abandonada''.'
