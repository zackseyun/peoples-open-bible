translation:
  language: es
  text: Y Yahvé[b][a], el Dios de las huestes; Yahvé es su nombre memorial.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Yahvé es su memorial»; es decir, el nombre por el que se le recuerda o invoca.'
    reason: lexical_alternative
  - marker: b
    text: YHWH se traduce tradicionalmente como «el SEÑOR»; alternativamente, «Yahvé».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיהוָה
  english_pob_choice: And Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé, y
  - Pero Yahvé
  lexicon: HALOT
  rationale: El hebreo abre con la conjunción waw unida al nombre divino. En español, la continuidad se puede dar sin repetir una conjunción inicial poco natural en esta cláusula aislada. Se conserva el nombre propio divino como «Yahvé», conforme al criterio del proyecto, en lugar de sustituirlo por un título.
- source_word: אֱלֹהֵי
  english_pob_choice: the God of
  chosen_spanish: el Dios de
  alternatives_spanish:
  - Dios de
  - el Dios de los
  lexicon: HALOT
  rationale: La construcción en estado constructo se expresa naturalmente como «el Dios de». El artículo en español ayuda a fijar la apposición y mantiene la relación posesiva del hebreo.
- source_word: הַצְּבָאוֹת
  english_pob_choice: hosts
  chosen_spanish: los ejércitos
  alternatives_spanish:
  - las huestes
  - los anfitriones
  lexicon: HALOT
  rationale: Aunque «hosts» suele verterse tradicionalmente como «ejércitos» o «huestes», aquí «los ejércitos» comunica bien la imagen sin perder el matiz de fuerzas organizadas. Evita una traducción demasiado eclesiástica y sigue siendo fiel al título divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre del pacto como transliteración «Yahvé», siguiendo el criterio del POB en español para יְהוָה. Esto evita la sustitución por un título y preserva la repetición enfática del versículo.
- source_word: זִכְרוֹ
  english_pob_choice: his memorial name
  chosen_spanish: su nombre memorial
  alternatives_spanish:
  - su memorial
  - su recuerdo
  lexicon: HALOT
  rationale: El sustantivo זֵכֶר/זִכְרוֹ en este contexto apunta al nombre por el que Dios es recordado o invocado. «Nombre memorial» mantiene la tensión idiomática y evita reducirlo a un abstracto como «recuerdo».
theological_decisions:
- issue: Renderización de יְהוָה en español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. La decisión del POB en español es transliterarlo como «Yahvé» para preservar el nombre personal de Dios y no ocultarlo tras una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Términos controvertidos — יְהוָה / YHWH → Yahvé'
- issue: Sentido de זִכְרוֹ en relación con el nombre divino
  english_pob_reading: Yahweh is his memorial name
  chosen_spanish_reading: Yahvé es su nombre memorial
  alternative_spanish_readings:
  - Yahvé es su memorial
  - Yahvé es el nombre por el que se le recuerda
  rationale: La frase no declara solo un recuerdo abstracto, sino el nombre por el cual Dios es invocado y recordado en la comunidad del pacto. «Nombre memorial» conserva el matiz del hebreo y de la nota inglesa sin sobreexplicar.
  doctrine_reference: Uso bíblico de זֵכֶר / זִכְרוֹ como nombre recordado/invocado
translation_notes:
  revision_awareness: La revisión más reciente del registro inglés no introdujo cambios; el presente borrador sigue el pasaje hebreo y la auditoría inglesa en alta concordancia, manteniendo las decisiones léxicas y teológicas ya estables.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה en todo el texto principal, de acuerdo con la terminología del proyecto.
  - «Los ejércitos» se eligió para הַצְּבָאוֹת por ser claro en español y suficientemente amplio dentro del título divino.
  - La nota de pie a explica el giro idiomático de זִכְרוֹ sin convertirlo en una paráfrasis doctrinal.
