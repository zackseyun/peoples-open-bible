translation:
  language: es
  text: entonces la congregación juzgará entre el agresor y el vengador de sangre, conforme a estas ordenanzas[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vengador de la sangre». La expresión hebrea designa a la persona encargada de vengar la sangre de un pariente.
    reason: lexical_alternative
  - marker: b
    text: O «estos juicios». El término hebreo puede referirse a decisiones judiciales o a disposiciones legales.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁפְטוּ
  english_pob_choice: then ... shall judge
  chosen_spanish: entonces ... juzgará
  alternatives_spanish:
  - y ... juzgará
  - y ... deberá juzgar
  lexicon: HALOT
  rationale: En este contexto legal, el verbo expresa una acción procedimental futura. «Entonces ... juzgará» conserva el valor secuencial de la cláusula y la función judicial de שׁפט sin forzar un pasado narrativo.
- source_word: הָעֵדָה
  english_pob_choice: the congregation
  chosen_spanish: la congregación
  alternatives_spanish:
  - la asamblea
  - la comunidad
  lexicon: HALOT
  rationale: «Congregación» mantiene el sentido corporativo y formal del sujeto jurídico en el marco de la legislación del Pentateuco.
- source_word: הַמַּכֶּה
  english_pob_choice: the striker
  chosen_spanish: el homicida
  alternatives_spanish:
  - el que hirió
  - el que golpeó
  - el agresor
  lexicon: HALOT
  rationale: Aunque el participio hebreo significa literalmente «el que golpea», en este pasaje el caso tratado es homicidio y la referencia funcional es la persona responsable de la muerte. «Homicida» evita una expresión demasiado mecánica y comunica el papel legal que la escena presupone, sin alterar la relación judicial del versículo.
- source_word: גֹּאֵל הַדָּם
  english_pob_choice: the avenger of blood
  chosen_spanish: el vengador de sangre
  alternatives_spanish:
  - el vengador de la sangre
  - el redentor de sangre
  - el vengador de sangre de su pariente
  lexicon: HALOT
  rationale: «Vengador de sangre» reproduce el título jurídico establecido en esta sección. «Redentor» no es adecuado aquí, porque el campo semántico es el de la venganza legal de la sangre derramada, no el rescate.
- source_word: עַל
  english_pob_choice: according to
  chosen_spanish: conforme a
  alternatives_spanish:
  - según
  - de acuerdo con
  - sobre la base de
  lexicon: HALOT
  rationale: En esta fórmula legal, עַל indica conformidad con la norma o criterio en vigor. «Conforme a» expresa bien la dependencia normativa y suena natural en español jurídico-bíblico.
- source_word: הַמִּשְׁפָּטִים הָאֵלֶּה
  english_pob_choice: these ordinances
  chosen_spanish: estos estatutos
  alternatives_spanish:
  - estos juicios
  - estas ordenanzas
  - estas decisiones legales
  lexicon: HALOT
  rationale: מִשְׁפָּטִים puede referirse a decisiones judiciales o a disposiciones legales. Aquí «estatutos» comunica el sentido de normas establecidas y evita que «juicios» se lea como simples veredictos.
theological_decisions:
- issue: Neutralidad procesal en el caso de homicidio
  english_pob_reading: The verse assigns the congregation a judicial function between the killer and the blood avenger, without importing later doctrinal or institutional categories.
  chosen_spanish_reading: El versículo asigna a la congregación una función judicial entre el homicida y el vengador de sangre, sin introducir categorías doctrinales o institucionales posteriores.
  alternative_spanish_readings:
  - Tratar a la congregación como un tribunal técnico posterior
  - Traducir al participante como «asesino»
  rationale: La escena hebrea presenta un proceso legal comunitario. «Homicida» comunica el caso tratado en español sin añadir culpabilidad moral o jurídica más específica que la del contexto.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: Alineado con la revisión inglesa más reciente que prefirió una forma más directa para el participio hebreo, evitando añadir un objeto explícito no presente en el texto. La decisión española mantiene esa sobriedad, pero usa «homicida» por la fuerza contextual del pasaje legal en Números 35.
  spanish_consistency_notes:
  - Se conserva «congregación» para la entidad judicial colectiva, coherente con el registro legal del Pentateuco.
  - Se usa «vengador de sangre» como término técnico estable del pasaje.
  - «Conforme a» refleja una relación normativa legal, no espacial ni causal.
  - «Estatutos» mantiene el tono jurídico formal y es compatible con el alcance semántico de מִשְׁפָּטִים en este contexto.
