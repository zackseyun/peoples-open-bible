review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general y las decisiones del audit trail: decreto/juicio, desnudamiento/humillación, traslado forzado, esclavas, sonido de palomas y gesto de duelo. Sin embargo, se aparta innecesariamente del inglés POB y del hebreo en dos puntos: añade una nota para «esclavas» que no corresponde a una alternativa preservada en el texto inglés, y convierte en texto principal «golpeándose el pecho» lo que el POB mantiene literalmente como «sobre sus corazones» con aclaración en nota. Además, «gimiendo» introduce una interpretación donde el hebreo compara explícitamente el sonido.'
  spanish_quality_summary: El español es claro y digno, pero puede ajustarse para ser más fiel al equilibrio del proyecto. «Está decretado» funciona bien. «Será desnudada» y «será llevada» son naturales. «Serán conducidas» es aceptable, aunque «serán llevadas» armoniza mejor con el paralelismo del cautiverio. «Como el sonido de las palomas» suena algo pesado; «como el sonido de palomas» o «como el arrullo de palomas» sería más idiomático, pero conviene no sobreinterpretar con «arrullo».
  glossary_alignment: La elección «esclavas» alinea bien con la directriz del proyecto para אָמָה/δοῦλος. No hay cuestiones de nombres divinos o títulos mesiánicos. La revisión propuesta mantiene la terminología central y corrige una expansión interpretativa excesiva en «golpeándose el pecho».
  issues:
  - severity: medium
    issue: El texto principal reemplaza la literalidad de «sobre sus corazones» por «golpeándose el pecho».
    rationale: El audit trail inglés decidió conservar la imagen literal en el texto y relegar la explicación idiomática a nota. El español debe preservar esa misma decisión salvo necesidad fuerte de inteligibilidad, que aquí no existe.
  - severity: low
    issue: La nota [b] sobre «esclavas» no preserva una alternativa significativa sino que comenta una decisión ya adecuada.
    rationale: Las instrucciones piden conservar alternativas significativas del inglés POB o nuevas ambigüedades en español. Aquí no hace falta nota adicional; basta con la decisión léxica en los metadatos.
  - severity: low
    issue: «Gimiendo como el sonido de las palomas» añade una interpretación verbal no explícita y suena menos natural.
    rationale: El hebreo dice literalmente algo como «siendo llevadas, como el sonido de palomas». Es mejor expresar el símil auditivo sin introducir «gimiendo» como verbo principal.
  revised_spanish_text: 'Está decretado: ella será desnudada[a], será llevada; y sus esclavas serán llevadas, como el sonido de palomas, golpeando sobre sus corazones[b].'
  revised_footnotes:
