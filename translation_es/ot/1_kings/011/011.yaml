translation:
  language: es
  text: 'Entonces Yahvé dijo a Salomón: «Porque esto ha estado contigo[a], y no has guardado mi pacto y mis estatutos que te mandé, ciertamente te arrancaré el reino y se lo daré a tu siervo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Porque esto ha estado contigo». La expresión hebrea es idiomática y apunta a una condición, disposición o conducta asentada de Salomón.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del Tetragrámaton mediante la forma ya establecida en el proyecto, ‘Yahvé’, en lugar de una sustitución titulada. Esto mantiene la transparencia respecto del hebreo.
- source_word: יֹּאמֶר ... לִשְׁלֹמֹה
  english_pob_choice: said to Solomon
  chosen_spanish: dijo a Salomón
  alternatives_spanish:
  - habló a Salomón
  - le dijo a Salomón
  lexicon: HALOT
  rationale: El verbo de habla directo y el dativo personal se expresan de manera natural y precisa en español sin añadir matiz ajeno al hebreo.
- source_word: יַעַן אֲשֶׁר
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Puesto que
  - Ya que
  lexicon: HALOT
  rationale: La expresión introduce la razón del juicio; ‘Porque’ conserva el valor causal de forma clara y sobria en español.
- source_word: הָיְתָה זֹּאת עִמָּךְ
  english_pob_choice: Because this has been with you
  chosen_spanish: Porque esto ha estado contigo
  alternatives_spanish:
  - Porque esto ha sido contigo
  - Porque esto ha permanecido contigo
  lexicon: HALOT
  rationale: Se respeta la literalidad del hebreo y la tensión idiomática señalada por el audit trail. ‘Ha estado contigo’ deja abierta la fuerza de una condición o conducta persistente sin convertirla prematuramente en paráfrasis interpretativa.
- source_word: שָׁמַרְתָּ
  english_pob_choice: kept
  chosen_spanish: has guardado
  alternatives_spanish:
  - has observado
  - has conservado
  lexicon: HALOT
  rationale: ‘Guardar’ es el correlato habitual de שׁמר en contexto pactual; mantiene el peso covenantal mejor que opciones más generales.
- source_word: בְּרִיתִי
  english_pob_choice: my covenant
  chosen_spanish: mi pacto
  alternatives_spanish:
  - mi alianza
  - mi convenio
  lexicon: HALOT
  rationale: En español bíblico ‘pacto’ comunica bien el sentido legal y relacional de בְּרִית sin depender de una terminología eclesiástica más variable.
- source_word: חֻקֹּתַי
  english_pob_choice: my statutes
  chosen_spanish: mis estatutos
  alternatives_spanish:
  - mis decretos
  - mis ordenanzas
  lexicon: HALOT
  rationale: ‘Estatutos’ mantiene la correspondencia con la dicción legal bíblica y la distinción frente a בְּרִית.
- source_word: צִוִּיתִי עָלֶיךָ
  english_pob_choice: I commanded you
  chosen_spanish: te mandé
  alternatives_spanish:
  - te ordené
  - te di mandato
  lexicon: HALOT
  rationale: ‘Mandé’ reproduce de modo directo y natural la fuerza del mandato divino; el objeto pronominal expresa correctamente la construcción hebrea sin rigidez.
- source_word: קָרֹעַ אֶקְרַע
  english_pob_choice: I will surely tear
  chosen_spanish: ciertamente arrancaré
  alternatives_spanish:
  - seguramente arrancaré
  - arrancaré de cierto
  lexicon: HALOT
  rationale: La intensificación del infinitivo absoluto + verbo finito se conserva con ‘ciertamente’. Se eligió ‘arrancar’ para expresar mejor en español la idea de quitar/arrancar el reino de sobre alguien, conforme al contexto.
- source_word: הַמַּמְלָכָה
  english_pob_choice: the kingdom
  chosen_spanish: el reino
  alternatives_spanish:
  - el reinar
  - la realeza
  lexicon: HALOT
  rationale: ‘Reino’ es el equivalente más natural y fiel al dominio real referido por el hebreo.
- source_word: מֵעָלֶיךָ
  english_pob_choice: away from you
  chosen_spanish: de encima de ti
  alternatives_spanish:
  - de sobre ti
  - lejos de ti
  lexicon: HALOT
  rationale: La preposición hebrea conserva una imagen espacial de remoción ‘de encima’. En español, ‘de encima de ti’ preserva esa concreción sin sonar forzado.
- source_word: וּנְתַתִּיהָ
  english_pob_choice: and give it
  chosen_spanish: y se lo daré
  alternatives_spanish:
  - y lo daré
  - y te lo daré
  lexicon: HALOT
  rationale: Se traduce el pronombre femenino del reino con ‘lo’ por concordancia natural en español con ‘reino’, y el dativo indirecto se expresa con ‘se’ para evitar una secuencia marcada. La futura promesa se explicita con ‘daré’.
- source_word: לְעַבְדֶּךָ
  english_pob_choice: to your servant
  chosen_spanish: a tu siervo
  alternatives_spanish:
  - a tu esclavo
  - a tu servidor
  lexicon: HALOT
  rationale: Aunque עֶבֶד puede ser ‘esclavo’, en este contexto cortesano la referencia apunta a un subordinado real. ‘Siervo’ preserva la relación de servicio sin introducir la dureza esclavista que no parece central aquí.
theological_decisions:
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El hebreo usa יְהוָה directamente. Siguiendo la convención del proyecto, se mantiene el nombre divino transliterado ‘Yahvé’ para preservar transparencia textual y coherencia terminológica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor idiomático de הָיְתָה זֹּאת עִמָּךְ
  english_pob_reading: Because this has been with you
  chosen_spanish_reading: Porque esto ha estado contigo
  alternative_spanish_readings:
  - Porque esto ha sido contigo
  - Porque esto ha permanecido contigo
  - Porque esto ha sido tu práctica
  rationale: Se mantiene la tensión entre una traducción más literal y una interpretación más explícita. ‘Ha estado contigo’ deja en pie la idea de un estado o disposición persistente, sin reemplazar el idioma hebreo por una paráfrasis interpretativa más cerrada.
  doctrine_reference: 'DOCTRINE.md: translation philosophy — preserve source tension where the source is idiomatic'
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del audit trail, que prefirió una lectura más literal de הָיְתָה זֹּאת עִמָּךְ y mantuvo sin cambios el resto del versículo. La versión española conserva esa literalidad básica, pero la hace publicable en español natural con ‘ha estado contigo’ y con la intensificación de ‘ciertamente arrancaré’.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de manera consistente para יְהוָה.
  - Se mantiene ‘pacto’ y ‘estatutos’ como terminología legal/covenantal estándar.
  - ‘Siervo’ se reserva para el subordinado real del contexto, no para una lectura esclavista.
  - Se conserva la imagen espacial de remoción con ‘de encima de ti’ para מֵעָלֶיךָ.
  - El pronombre femenino del reino se resuelve naturalmente en español con ‘lo’ en ‘se lo daré’.
