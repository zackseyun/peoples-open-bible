translation:
  language: es
  text: 'Así dice Yahvé: No suban ni peleen contra sus hermanos[b]. Vuélvanse, cada uno, a su casa, porque de mí ha venido este asunto[a]. Y escucharon las palabras de Yahvé, y se volvieron atrás en vez de ir contra Jeroboam[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «este asunto procede de mí». El hebreo atribuye el hecho a la iniciativa divina.'
    reason: lexical_alternative
  - marker: b
    text: Lit. «sus hermanos»; el hebreo subraya que se trata de israelitas del mismo pueblo, no de enemigos extranjeros.
    reason: cultural_note
  - marker: c
    text: 'O: «se volvieron de ir hacia Jeroboam»; en contexto se trata de un avance con intención bélica, por eso «contra Jeroboam» aclara el sentido.'
    reason: alternative_reading
lexical_decisions:
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Esto dice Yahvé
  - Así ha dicho Yahvé
  lexicon: HALOT
  rationale: La fórmula profética se expresa de manera solemne y directa en español con «Así dice». Se conserva el nombre divino «Yahvé» según el estándar del proyecto, sin sustituirlo por un título ocultador.
- source_word: לֹא תַעֲלוּ
  english_pob_choice: You must not go up
  chosen_spanish: No suban
  alternatives_spanish:
  - No deben subir
  - No vayan a subir
  lexicon: HALOT
  rationale: עלה conserva la imagen de ascenso o avance, pero en español «suban» suena natural en la orden plural y mantiene el sentido militar implícito sin explicitarlo de más.
- source_word: וְלֹא תִלָּחֲמוּ
  english_pob_choice: or fight
  chosen_spanish: ni peleen
  alternatives_spanish:
  - ni luchen
  - ni hagan guerra
  lexicon: HALOT
  rationale: El verbo se traduce con un término claro y contemporáneo. «Peleen» comunica el acto de combate sin endurecerlo con una expansión interpretativa.
- source_word: עִם אֲחֵיכֶם
  english_pob_choice: against your brothers
  chosen_spanish: contra sus hermanos
  alternatives_spanish:
  - con sus hermanos
  - contra sus hermanos de sangre
  lexicon: HALOT
  rationale: Aunque עִם es literalmente «con», el contexto bélico exige sentido adversativo en español. «Hermanos» conserva la fuerza relacional y tribal del hebreo; se evita «compañeros» o «paisanos» porque debilitan el vínculo familiar/covenantal.
- source_word: שׁוּבוּ אִישׁ לְבֵיתוֹ
  english_pob_choice: Return, each man to his house
  chosen_spanish: Vuélvase cada uno a su casa
  alternatives_spanish:
  - Regrese cada uno a su casa
  - Vuélvanse, cada uno, a su casa
  lexicon: HALOT
  rationale: שוב pide la idea de volver/retornar. «Cada uno» refleja el valor distributivo de אִישׁ y evita una formulación demasiado masculina en español que no aportaría claridad adicional.
- source_word: כִּי מֵאִתִּי נִהְיָה הַדָּבָר הַזֶּה
  english_pob_choice: for this thing has come from me
  chosen_spanish: porque de mí ha venido este asunto
  alternatives_spanish:
  - porque este asunto procede de mí
  - porque esto ha sido de parte mía
  lexicon: HALOT
  rationale: נִהְיָה expresa que el hecho ha llegado a ser/ha ocurrido; «ha venido» mantiene la idea de procedencia divina sin convertirla en una paráfrasis doctrinal. «Asunto» funciona bien para דָּבָר en este contexto político-histórico.
- source_word: וַיִּשְׁמְעוּ אֶת דִּבְרֵי יְהוָה
  english_pob_choice: So they listened to the words of Yahweh
  chosen_spanish: Y escucharon las palabras de Yahvé
  alternatives_spanish:
  - Y obedecieron las palabras de Yahvé
  - Y atendieron las palabras de Yahvé
  lexicon: HALOT
  rationale: שׁמע puede significar oír o obedecer. «Escucharon» preserva ambos matices sin forzar una explicitación que el hebreo no verbaliza en esta cláusula; el contexto ya muestra la respuesta obediente.
- source_word: וַיָּשֻׁבוּ מִלֶּכֶת אֶל יָרָבְעָם
  english_pob_choice: and turned back from going against Jeroboam
  chosen_spanish: y se volvieron de ir contra Jeroboam
  alternatives_spanish:
  - y regresaron de ir hacia Jeroboam
  - y desistieron de marchar contra Jeroboam
  lexicon: HALOT
  rationale: La expresión hebrea apunta a dejar de avanzar hacia un conflicto con Jeroboam. «Se volvieron» conserva el verbo de retorno; «de ir contra Jeroboam» refleja el contexto de hostilidad sin exceder el texto.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - Jehová
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton. «Yahvé» es transparente, no lo sustituye por un título, y resulta natural en español bíblico contemporáneo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Atribución divina del asunto político
  english_pob_reading: for this thing has come from me
  chosen_spanish_reading: porque de mí ha venido este asunto
  alternative_spanish_readings:
  - porque este asunto procede de mí
  - porque este asunto ha salido de mí
  rationale: La cláusula conserva la afirmación teológica de que el suceso proviene de la acción o disposición divina. No se amplía a una explicación sistemática de providencia; se mantiene dentro del alcance del versículo.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se siguió el audit trail inglés sin cambios de revisión pendientes; la solución española conserva el paralelismo del mandato, la atribución divina del asunto y el cierre narrativo con respuesta obediente. No se detectaron revisiones aplicadas en el paquete fuente.
  spanish_consistency_notes:
  - Se usó «Yahvé» consistentemente para el nombre divino.
  - Se evitó «SEÑOR» para no ocultar el Tetragrámaton.
  - Se mantuvo «hermanos» para reflejar la relación intrapueblo del hebreo.
  - Se optó por un español moderno pero reverente, con orden natural de la oración y sin paráfrasis amplias.
