- from: Y todos los egipcios cavaron alrededor del Nilo para obtener agua para beber[a], porque no podían beber del agua del Nilo.
  to: Y todos los egipcios cavaron alrededor del Nilo en busca de agua para beber[a], porque no podían beber del agua del Nilo.
  rationale: Se ajusta la frase de finalidad para eliminar una adición interpretativa («obtener») y mejorar la naturalidad del español sin perder el sentido del hebreo ni la decisión léxica documentada sobre יְאֹר.
