translation:
  language: es
  text: Y la tierra conocerá todos tus juicios justos[a], oh Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «todos tus juicios justos» o «todos tus juicios rectos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: γνώσεται
  english_pob_choice: will know
  chosen_spanish: conocerá
  alternatives_spanish:
  - sabrá
  - llegará a conocer
  lexicon: BDAG
  rationale: El futuro de γινώσκω expresa conocimiento o reconocimiento futuro. En español, «conocerá» comunica bien ese acceso/recocimiento sin sobreexplicar el matiz.
- source_word: ἡ γῆ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - el mundo
  - la tierra habitada
  lexicon: BDAG
  rationale: Aquí se conserva el alcance amplio y universal con «la tierra», un equivalente natural en español para ἡ γῆ en contexto cósmico.
- source_word: τὰ κρίματά σου
  english_pob_choice: your judgments
  chosen_spanish: tus juicios
  alternatives_spanish:
  - tus sentencias
  - tus decisiones judiciales
  - tus decretos
  lexicon: BDAG
  rationale: κρίματα mantiene sentido forense/judicial. «Juicios» es el término más directo y bíblicamente reconocible en español sin perder el matiz legal.
- source_word: πάντα
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todos los
  - enteramente
  lexicon: BDAG
  rationale: Como modificador del sintagma objeto, en español se expresa naturalmente con «todos», conservando la totalidad del objeto de conocimiento.
- source_word: τὰ δίκαια
  english_pob_choice: righteous
  chosen_spanish: justos
  alternatives_spanish:
  - rectos
  - righteous
  lexicon: BDAG
  rationale: δίκαια califica a los juicios. En español, «justos» mantiene el paralelo con la alternativa inglesa «just» y preserva la cualidad judicial-moral del término.
- source_word: ὁ θεός
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  lexicon: BDAG
  rationale: El nominativo con artículo funciona aquí como vocativo. En español se refleja con la interpelación directa «oh Dios».
translation_notes:
  revision_awareness: El texto griego y el registro inglés están en alto acuerdo; no se documentan revisiones sustantivas. La versión española conserva la estructura y el tono doxológico del original.
  spanish_consistency_notes:
  - Se usa «Dios» en la apelación directa, coherente con la convención del proyecto para θεός.
  - Se prefiere «juicios» para κρίματα por su fuerza jurídica y porque evita una paráfrasis más débil como «decisiones».
  - «La tierra» refleja el alcance universal de ἡ γῆ sin convertirlo en «el mundo», que sería interpretativamente más marcado.
