    rationale: «Levantó» transmite adecuadamente וַיָּקֶם aquí. Aunque «erigió» es posible, la nota no preserva una ambigüedad relevante del original y puede omitirse para mayor limpieza.
  revised_spanish_text: Él levantó las columnas delante de la nave[a], una a la derecha y otra a la izquierda; y llamó a la de la derecha Jaquín, y a la de la izquierda Boaz.
