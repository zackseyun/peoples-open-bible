review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo y del POB inglés: mantiene la prohibición inicial, el campo semántico de vergüenza/deshonra, la vergüenza de la juventud y el oprobio de la viudez. También conserva correctamente la metáfora de la viudez y la dirección a Sion personificada. Sin embargo, una decisión clave no preserva fielmente la voz semántica del hebreo en תִּכָּלְמִי: «no te humilles» suena reflexivo/volitivo en español (''no te rebajes''), mientras que el hebreo y el POB inglés expresan padecer humillación (''no seas humillada'' / ''no serás humillada'').'
  spanish_quality_summary: El español es claro y digno, pero «no te humilles» introduce una lectura poco natural en contexto y teológicamente desalineada con la restauración prometida, porque puede implicar una acción de la destinataria sobre sí misma. El resto del verso lee bien; «avergonzada», «deshonrada», «vergüenza», «oprobio» y «viudez» son adecuados y eclesialmente legibles. La nota b también necesita corregirse, porque la alternativa dada repite exactamente el texto principal en vez de reflejar la alternativa inglesa documentada.
  glossary_alignment: No hay conflictos con la terminología de proyecto. No aparecen Yahvé/Mesías u otros términos reglados. Se preserva correctamente «viudez» para la metáfora profética. La distinción léxica dentro del lenguaje de vergüenza debe mantenerse mejor en español usando una forma pasiva para כלם.
  issues:
  - severity: high
    issue: «no te humilles» para תִּכָּלְמִי
    rationale: En español, «humillarse» normalmente significa humillarse a sí misma o rebajarse voluntariamente. El hebreo Niphal aquí y el POB inglés («do not be humiliated») apuntan a sufrir humillación/deshonra, no a una acción reflexiva de la destinataria.
  - severity: medium
    issue: La nota [b] no presenta una alternativa real
    rationale: El texto de la nota repite «la vergüenza de tu juventud», que ya está en el cuerpo del verso. El POB inglés documenta como alternativa la posibilidad de entender el verbo previo como «no serás avergonzada» y explica la superposición del lenguaje de vergüenza en el versículo.
  revised_spanish_text: No temas[a], porque no serás avergonzada[b]; y no seas humillada, porque no serás deshonrada. Porque olvidarás la vergüenza de tu juventud, y no recordarás más el oprobio de tu viudez.
  revised_footnotes:
