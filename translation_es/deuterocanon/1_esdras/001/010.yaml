translation:
  language: es
  text: Y cuando estas cosas sucedieron, los sacerdotes y los levitas se colocaron en buen orden, teniendo los panes sin levadura, según las tribus y según las divisiones de las casas paternas[a], delante del pueblo, para ofrecer al Señor conforme a lo que está escrito en el libro de Moisés[b]; y así lo hicieron por la mañana.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «según las divisiones ancestrales» o «según las divisiones de los padres».'
    reason: lexical_alternative
  - marker: b
    text: El griego difiere notablemente del paralelo hebreo aproximado de 2 Crónicas 35:10, que habla de jefes levíticos que proveen animales para la Pascua; esta traducción sigue el texto griego de 1 Esdras.
    reason: textual_variant
lexical_decisions:
- source_word: εὐπρεπῶς
  english_pob_choice: in proper order
  chosen_spanish: en orden apropiado
  alternatives_spanish:
  - de manera decorosa
  - adecuadamente
  - en buen orden
  lexicon: LSJ
  rationale: El adverbio expresa disposición conveniente, ordenada y digna en un contexto cultual. «En orden apropiado» conserva tanto el sentido de arreglo formal como el matiz de idoneidad sin sonar demasiado literal en español.
- source_word: ἔστησαν
  english_pob_choice: stood
  chosen_spanish: se pusieron
  alternatives_spanish:
  - estuvieron de pie
  - tomaron su lugar
  - se mantuvieron de pie
  lexicon: LSJ
  rationale: En español, «se pusieron en orden» comunica mejor la acción de colocarse ceremonialmente que un simple «estuvieron de pie». Mantiene el sentido físico y ritual del verbo griego en el contexto.
- source_word: τὰ ἄζυμα
  english_pob_choice: the unleavened bread
  chosen_spanish: los panes sin levadura
  alternatives_spanish:
  - lo sin levadura
  - los ázimos
  - el pan sin levadura
  lexicon: LSJ
  rationale: Como el contexto pascual es claro, conviene explicitar el sustantivo implícito en español. «Los panes sin levadura» es natural, precisa y conserva la referencia cultual.
- source_word: φυλάς
  english_pob_choice: tribes
  chosen_spanish: las tribus
  alternatives_spanish:
  - los clanes
  - los grupos tribales
  lexicon: LSJ
  rationale: Es el equivalente normal para las divisiones de Israel. Mantiene la estructura pactal y social del texto.
- source_word: μεριδαρχίας τῶν πατέρων
  english_pob_choice: family divisions / of the fathers
  chosen_spanish: las divisiones de los padres
  alternatives_spanish:
  - las divisiones de las casas paternas
  - las casas de los padres
  - las divisiones ancestrales
  lexicon: LSJ
  rationale: Conservo la formulación cercana al griego para no borrar la terminología paternal/ancestral. En español, «de los padres» refleja el genitivo del texto y deja abierta la referencia a las casas paternas sin imponer una paráfrasis interpretativa.
- source_word: προσενεγκεῖν
  english_pob_choice: to offer
  chosen_spanish: para ofrecer
  alternatives_spanish:
  - para presentar
  - para acercar en ofrenda
  lexicon: LSJ
  rationale: En contexto sacrificial, «ofrecer» es la equivalencia más natural y fiel. Evita sobrecargar la frase con una perífrasis más técnica.
- source_word: τῷ κυρίῳ
  english_pob_choice: the Lord
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - al Señor
  - al Señor Yahvé
  lexicon: LSJ
  rationale: Aunque el griego dice κύριος, en este proyecto el nombre divino se expresa como «Yahvé» cuando el referente es el Dios de Israel. Aquí el contexto sacrificial y la cita mosaica apuntan claramente al Dios de Israel, por lo que no se usa el reemplazo eclesiástico «Señor».
- source_word: κατὰ τὰ γεγραμμένα ἐν βιβλίῳ Μωυσῆ
  english_pob_choice: according to what is written in the book of Moses
  chosen_spanish: conforme a lo que está escrito en el libro de Moisés
  alternatives_spanish:
  - según lo escrito en el libro de Moisés
  - de acuerdo con lo escrito en el libro de Moisés
  lexicon: LSJ
  rationale: La frase preserva la autoridad escrita mosaica con un español claro y formal. «Conforme a» mantiene el tono normativo del original.
- source_word: τὸ πρωϊνόν
  english_pob_choice: in the morning
  chosen_spanish: por la mañana
  alternatives_spanish:
  - en la mañana
  - por la mañana temprano
  - esa mañana
  lexicon: LSJ
  rationale: La expresión griega es breve y temporal; «por la mañana» conserva esa referencia sin convertirla en un tecnicismo litúrgico no explícito.
theological_decisions:
- issue: Relación con el paralelo hebreo aproximado en 2 Crónicas 35:10
  english_pob_reading: Retain the Greek scene of priests and Levites standing in order with the unleavened bread, while allowing the MT parallel to inform the Passover context.
  chosen_spanish_reading: Mantener la escena griega de sacerdotes y levitas colocados en orden con los panes sin levadura, dejando que el paralelo hebreo ilumine el contexto pascual.
  alternative_spanish_readings:
  - Armonizar el versículo con el paralelo de Crónicas y mencionar animales para la Pascua
  - reformular la escena según el contenido del paralelo hebreo
  rationale: La fuente primaria para 1 Esdras es el griego. El paralelo hebreo ayuda a ubicar la escena en la Pascua, pero no debe sustituir la lectura griega ni borrar su diferencia textual. Por eso la versión española sigue el griego con fidelidad y no lo armoniza artificialmente.
  doctrine_reference: 'PHILOSOPHY.md: Deuterocanonical / Apocrypha; WLC MT parallels for 1 Esdras'
- issue: Uso del nombre divino en lugar de un sustituto reverencial
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - el Señor
  rationale: En la política terminológica del proyecto, el tetragrámaton se vierte como «Yahvé». Aunque aquí el griego trae κύριος, el contexto remite al Dios de Israel y no a un título genérico humano; por eso se prefiere el nombre divino en español en lugar del reemplazo litúrgico tradicional.
  doctrine_reference: 'Terminología del proyecto: יהוה / YHWH -> Yahvé'
- issue: Expresión paternal/ancestral en «μεριδαρχίας τῶν πατέρων»
  english_pob_reading: family divisions / of the fathers
  chosen_spanish_reading: las divisiones de los padres
  alternative_spanish_readings:
  - las casas paternas
  - las divisiones ancestrales
  - las casas de los antepasados
  rationale: Se conserva la terminología masculina y ancestral del griego en vez de neutralizarla. Esto respeta la forma del original y mantiene visible la estructura de casas paternas implícita en el texto.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego de Swete 1909 y toma en cuenta el paralelo hebreo aproximado solo como comprobación contextual. Se conserva la escena cultual griega con sacerdotes y levitas en orden, panes sin levadura, referencia a las tribus y a las divisiones de los padres, y la acción de ofrecer conforme al libro de Moisés. No se detectaron cambios necesarios respecto del pase de revisión más reciente.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para el referente divino conforme a la terminología del proyecto, en vez de «Señor» como máscara.
  - «Panes sin levadura» explicita en español el objeto implícito de τὰ ἄζυμα y coincide con el contexto pascual.
  - «Divisiones de los padres» conserva el valor genitivo y la referencia a casas paternas sin neutralizarla.
  - La nota textual preserva la tensión entre el griego de 1 Esdras y el paralelo de 2 Crónicas sin armonizarlos.
