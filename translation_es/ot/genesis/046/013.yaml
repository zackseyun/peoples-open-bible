translation:
  language: es
  text: 'Y los hijos de Isacar: Tola, Puvá[a], Job[b] y Simrón.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Puvá» también aparece como «Puá» en algunas tradiciones españolas e inglesas.
    reason: lexical_alternative
  - marker: b
    text: 1 Crónicas 7:1 lee «Jasub» en lugar de «Job».
    reason: cross_reference
lexical_decisions:
- source_word: וּ/בְנֵי
  english_pob_choice: And the sons of
  chosen_spanish: Y los hijos de
  alternatives_spanish:
  - Y los hijos de
  - Y los descendientes de
  lexicon: HALOT
  rationale: En listas genealógicas, בְּנֵי se vierte con naturalidad como «hijos de». Conserva el valor constructo y la relación genealógica directa. Se evita «niños» o una paráfrasis más amplia porque el contexto es de descendencia tribal.
- source_word: יִשָׂשכָר
  english_pob_choice: Issachar
  chosen_spanish: Isacar
  alternatives_spanish:
  - Isacar
  lexicon: HALOT
  rationale: Nombre propio; en español bíblico se adapta a la forma usual «Isacar», más natural y reconocible que la transliteración inglesa, sin alterar la referencia del texto.
- source_word: תּוֹלָע
  english_pob_choice: Tola
  chosen_spanish: Tola
  alternatives_spanish:
  - Tola
  lexicon: HALOT
  rationale: Nombre propio en una lista genealógica; se mantiene la forma breve y estándar en español, equivalente al transliterado inglés.
- source_word: וּ/פֻוָּה
  english_pob_choice: Puvah
  chosen_spanish: Puvá
  alternatives_spanish:
  - Puá
  - Puvá
  lexicon: HALOT
  rationale: El hebreo admite una adaptación española breve. Se eligió «Puvá» para reflejar la vocal final y diferenciarlo de la forma abreviada «Puá» usada en otras tradiciones. Se conserva la variante en nota porque el POB inglés preserva la alternancia lexical.
- source_word: וְ/י֥וֹב
  english_pob_choice: Job
  chosen_spanish: Job
  alternatives_spanish:
  - Job
  - Jasub
  lexicon: HALOT
  rationale: Se mantiene «Job» como representación del texto masorético leído aquí (יוֹב), siguiendo el audito inglés. La alternativa «Jasub» se preserva en nota por la referencia cruzada de 1 Crónicas 7:1.
- source_word: וְ/שִׁמְרֽוֹן
  english_pob_choice: and Shimron
  chosen_spanish: y Shimrón
  alternatives_spanish:
  - y Shimrón
  - y Simrón
  lexicon: HALOT
  rationale: Nombre propio con la conjunción final; se conserva la unión listal con «y» y se adapta la acentuación española a «Shimrón».
translation_notes:
  revision_awareness: Se siguió el pasaje hebreo dado y el audit trail inglés. No hubo revisiones aplicadas en la fuente inglesa; el draft español mantiene el mismo contenido genealógico y conserva la alternativa textual de Puvah/Puah y la variante cruzada Job/Jashub en nota.
  spanish_consistency_notes:
  - Se prefirió «Y» al inicio para conservar la estructura coordinada de la lista genealógica.
  - Se usó «hijos de» en lugar de «descendientes de» por fidelidad al constructo hebreo y naturalidad bíblica.
  - Los nombres propios se adaptaron a formas españolas de uso bíblico cuando existe una forma establecida; en el caso de Puvá se conservó además la variante tradicional en nota.
  - No hay decisiones teológicas específicas en este versículo; el tratamiento es puramente onomástico y genealógico.
