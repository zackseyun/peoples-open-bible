translation:
  language: es
  text: 'Pero todos juntos gritaron[a], diciendo: «¡Quita a este hombre, y pon en libertad a Barrabás!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¡Fuera con este hombre!». El imperativo griego también puede expresarse de manera más breve; el sentido es que exigen que sea removido de en medio de ellos.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀνέκραγον
  english_pob_choice: cried out
  chosen_spanish: gritaron
  alternatives_spanish:
  - clamaron
  - dieron gritos
  lexicon: BDAG
  rationale: El verbo expresa un clamor fuerte y público. «Gritaron» comunica bien la intensidad sin añadir matices no presentes en el griego.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Aquí δέ introduce contraste narrativo respecto de la escena previa; «Pero» lo refleja de forma natural en español.
- source_word: παμπληθεὶ
  english_pob_choice: all together
  chosen_spanish: todos juntos
  alternatives_spanish:
  - en masa
  - con una sola voz
  lexicon: BDAG
  rationale: La adverbialidad indica unanimidad colectiva. «Todos juntos» es idiomático y conserva la idea de acción conjunta.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  lexicon: BDAG
  rationale: El participio introduce el contenido del clamor. «Diciendo» reproduce de manera directa la función discursiva.
- source_word: Αἶρε τοῦτον
  english_pob_choice: Take this man away
  chosen_spanish: Quita a este hombre
  alternatives_spanish:
  - Saca a este hombre
  - Llévate a este hombre
  lexicon: BDAG
  rationale: αἴρω aquí exige la remoción de la persona de delante de ellos; «Quita» mantiene la fuerza imperativa y la brevedad del original. «Este hombre» conserva el señalamiento despectivo del demostrativo.
- source_word: ἀπόλυσον
  english_pob_choice: release
  chosen_spanish: líbranos
  alternatives_spanish:
  - suéltalo
  - deja libre
  lexicon: BDAG
  rationale: ἀπολύω en contexto judicial significa liberar o poner en libertad. En español, el imperativo debe concordar con el destinatario implícito de la petición; «líbranos» refleja el dativo ἡμῖν y la súplica dirigida a la autoridad, aunque introduce una formulación más idiomática que el simple «libera».
- source_word: ἡμῖν
  english_pob_choice: to us
  chosen_spanish: a nosotros
  alternatives_spanish:
  - para nosotros
  lexicon: BDAG
  rationale: El dativo marca al beneficiario de la acción solicitada. «A nosotros» es la expresión natural en español con este verbo y mantiene la referencia del original.
- source_word: τὸν Βαραββᾶν
  english_pob_choice: Barabbas
  chosen_spanish: Barrabás
  alternatives_spanish:
  - Barabás
  lexicon: BDAG
  rationale: Se conserva el nombre propio con la forma castellana habitual «Barrabás» para legibilidad, sin alterar la identificación del personaje.
translation_notes:
  revision_awareness: 'El texto griego y el audit trail inglés están en alta concordancia; no hay revisiones aplicadas en el contexto provisto. La única tensión relevante es cómo verter αἴρω/ἀπόλυσον: la versión inglesa opta por una formulación más explicativa («Take this man away, and release Barabbas to us»), mientras que el español aquí preserva la petición directa y la fuerza imperativa, con nota alternativa para el matiz de remoción.'
  spanish_consistency_notes:
  - Se usa «Barrabás» con doble erre, forma estable en español bíblico.
  - Se evita «Señor» u otras sustituciones no presentes en el verso.
  - «Diciendo» queda ligado a la cita directa y no se convierte en coordinación redundante.
  - La nota a cubre la alternativa breve del imperativo griego sin introducir una lectura doctrinal.
