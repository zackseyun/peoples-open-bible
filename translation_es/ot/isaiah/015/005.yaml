translation:
  language: es
  text: Mi corazón clama por Moab[a]; sus fugitivos huyen hasta Zoar, hasta Eglat-shelishiyá[b]. Porque suben por la subida de Luhit con llanto[c]; porque en el camino hacia Horonaim levantan un grito de destrucción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo בְּרִיחֶיהָ es difícil. Puede significar «sus fugitivos/refugiados», como aquí, o más literalmente «sus barras», lectura que algunos entienden en sentido metafórico o corrigen según el contexto.
    reason: lexical_alternative
  - marker: b
    text: Eglat-shelishiyá probablemente es un nombre de lugar. La expresión también podría entenderse literalmente como «una ternera de tres años».
    reason: lexical_alternative
  - marker: c
    text: Los verbos hebreos de este versículo alternan entre singular y plural; la traducción suaviza esa variación para reflejar el movimiento colectivo del pueblo de Moab.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבִּי
  english_pob_choice: My heart
  chosen_spanish: Mi corazón
  alternatives_spanish:
  - Mi interior
  - Mi ser interior
  lexicon: HALOT
  rationale: La imagen hebrea del centro afectivo y volitivo se expresa de forma natural en español con «mi corazón», conservando el tono de lamento personal.
- source_word: לְמוֹאָב
  english_pob_choice: for Moab
  chosen_spanish: por Moab
  alternatives_spanish:
  - a favor de Moab
  - sobre Moab
  lexicon: HALOT
  rationale: Aquí ל expresa el objeto o destinatario del clamor; «por Moab» comunica bien la compasión y el lamento en español.
- source_word: יִזְעָק
  english_pob_choice: cries out
  chosen_spanish: clama
  alternatives_spanish:
  - grita
  - llora
  lexicon: HALOT
  rationale: «Clama» conserva la intensidad del verbo de grito angustiado y suena más digno en español bíblico que una simple repetición de «grita».
- source_word: בְּרִיחֶיהָ
  english_pob_choice: her fugitives flee
  chosen_spanish: sus fugitivos huyen
  alternatives_spanish:
  - sus refugiados huyen
  - sus barras
  lexicon: HALOT
  rationale: El hebreo es difícil y admite varias lecturas; en el contexto del desplazamiento de Moab, «sus fugitivos» sigue la opción contextual de la POB inglesa y preserva la ambigüedad con una nota.
- source_word: עַד צֹעַר
  english_pob_choice: as far as Zoar
  chosen_spanish: hasta Zoar
  alternatives_spanish:
  - hasta llegar a Zoar
  - a Zoar
  lexicon: HALOT
  rationale: «Hasta» reproduce el alcance del hebreo עַד y funciona de manera natural con el movimiento geográfico.
- source_word: עֶגְלַת שְׁלִשִׁיָּה
  english_pob_choice: Eglath-shelishiyah
  chosen_spanish: Eglat-selisiyá
  alternatives_spanish:
  - Eglat-selishiyá
  - una ternera de tres años
  lexicon: HALOT
  rationale: Se mantiene la transliteración para no decidir indebidamente entre topónimo y sentido literal. La forma española adapta la transliteración al uso fonético y ortográfico.
- source_word: מַעֲלֵה הַלּוּחִית
  english_pob_choice: the ascent of Luhith
  chosen_spanish: la subida de Luhit
  alternatives_spanish:
  - la cuesta de Luhit
  - la ascensión de Luhit
  lexicon: HALOT
  rationale: «Subida» conserva el valor geográfico del ascenso y es más natural que un calco rígido en español.
- source_word: בִּבְכִי יַעֲלֶה בּוֹ
  english_pob_choice: they go up ... with weeping
  chosen_spanish: sube con llanto
  alternatives_spanish:
  - sube llorando
  - ascienden con llanto
  lexicon: HALOT
  rationale: El hebreo alterna singular y plural; la POB inglesa suaviza esa tensión. En español, el singular impersonal/poético «sube» conserva la forma verbal del texto sin forzar el sujeto.
- source_word: דֶּרֶךְ חוֹרֹנַיִם
  english_pob_choice: on the road to Horonaim
  chosen_spanish: por el camino de Horonaim
  alternatives_spanish:
  - en el camino de Horonaim
  - la ruta hacia Horonaim
  lexicon: HALOT
  rationale: «Por el camino» comunica mejor la vía recorrida en el contexto de huida y lamento.
- source_word: זַעֲקַת שֶׁבֶר
  english_pob_choice: a cry of destruction
  chosen_spanish: un grito de destrucción
  alternatives_spanish:
  - un clamor de ruina
  - un grito de quebranto
  lexicon: HALOT
  rationale: שבר expresa devastación/ruina más que fractura literal; «destrucción» conserva la fuerza del desastre como en la POB inglesa.
- source_word: יְעֹעֵרוּ
  english_pob_choice: they raise
  chosen_spanish: levantan
  alternatives_spanish:
  - desatan
  - exhalan
  lexicon: HALOT
  rationale: Con «grito» como complemento, «levantan» reproduce el valor de provocar/elevar un clamor en español idiomático.
translation_notes:
  revision_awareness: El texto sigue de cerca la POB inglesa revisada, sin cambios sustanciales respecto al último pase. Se mantiene la decisión contextual sobre בְּרִיחֶיהָ, la transliteración del topónimo dudoso y la suavización poética de la alternancia singular/plural.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; este versículo no lo contiene.
  - Se mantiene «Moab», «Zoar», «Luhit» y «Horonaim» como topónimos transliterados de manera consistente.
  - «Llanto» y «grito de destrucción» conservan el registro poético sin volver el español arcaico.
