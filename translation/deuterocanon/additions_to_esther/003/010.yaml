theological_decisions:
- issue: Rendering of κύριε
  chosen_reading: O Lord
  alternative_readings:
  - O LORD
  rationale: The Greek source has κύριε, and project doctrine defaults κύριος to 'Lord.' Since this is a Greek deuterocanonical witness rather than direct Hebrew YHWH, 'Lord' is preferred here.
  doctrine_reference: 'DOCTRINE.md: Contested terms — κύριος → Lord'
- issue: Interpretation of τῷ κλήρῳ σου
  chosen_reading: your allotted people
  alternative_readings:
  - your lot
  - your inheritance
  rationale: The phrase can sound opaque if rendered woodenly as 'your lot.' In this prayer context it refers to Israel as God's allotted possession/people. The chosen rendering preserves the covenantal relationship without over-expanding the text.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1, §5'
