translation:
  language: es
  text: No nos rechaces por amor de tu nombre[a]; no deshonres tu trono glorioso[b]. Acuérdate; no rompas tu pacto con nosotros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más literalmente: «por causa de tu nombre».'
    reason: lexical_alternative
  - marker: b
    text: 'O más literalmente: «el trono de tu gloria».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּנְאַץ
  english_pob_choice: spurn
  chosen_spanish: rechaces
  alternatives_spanish:
  - desprecies
  - rechaces con desdén
  - apartes
  lexicon: HALOT
  rationale: נאץ en este contexto expresa rechazo despectivo o desdeñoso. En español, «rechazar» comunica bien la negación contundente sin cargar el texto con un modismo poco natural; el contexto de súplica y la relación de pacto sostienen el matiz de desdén.
- source_word: לְמַעַן שִׁמְךָ
  english_pob_choice: for the sake of your name
  chosen_spanish: por amor de tu nombre
  alternatives_spanish:
  - por causa de tu nombre
  - a causa de tu nombre
  - por el bien de tu nombre
  lexicon: HALOT
  rationale: La expresión apela al valor reputacional y pactual del «nombre» divino. «Por amor de tu nombre» es una fórmula natural en español bíblico y conserva la motivación teológica sin introducir una causalidad más dura de lo que exige el hebreo.
- source_word: תְּנַבֵּל
  english_pob_choice: dishonor
  chosen_spanish: deshonres
  alternatives_spanish:
  - avergüences
  - degraden
  - trates con afrenta
  lexicon: HALOT
  rationale: נבל en piel aquí indica tratar como vergonzoso o deshonroso. «Deshonrar» es el equivalente más directo y comprensible en español, y mantiene el paralelo con el objeto «tu trono glorioso» sin sugerir más de lo que el hebreo requiere.
- source_word: כִּסֵּא כְבוֹדֶךָ
  english_pob_choice: your glorious throne
  chosen_spanish: tu trono glorioso
  alternatives_spanish:
  - el trono de tu gloria
  - tu trono de gloria
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente «trono de tu gloria». «Tu trono glorioso» fluye con naturalidad en español y conserva el valor evocador del sintagma. La alternativa más literal se preserva implícitamente en la decisión léxica.
- source_word: זְכֹר
  english_pob_choice: Remember
  chosen_spanish: Acuérdate
  alternatives_spanish:
  - Recuerda
  - Haz memoria
  lexicon: HALOT
  rationale: Es un imperativo directo a Dios en contexto de pacto. «Acuérdate» es una forma idiomática y reverente en español, sin perder la urgencia de la petición.
- source_word: תָּפֵר
  english_pob_choice: break
  chosen_spanish: rompas
  alternatives_spanish:
  - quiebres
  - anules
  - violes
  lexicon: HALOT
  rationale: פרר con «pacto» significa quebrantar o romper. «Romper» es transparente y actual en español, y mantiene con claridad el lenguaje covenantal.
- source_word: בְּרִיתְךָ אִתָּנוּ
  english_pob_choice: your covenant with us
  chosen_spanish: tu pacto con nosotros
  alternatives_spanish:
  - tu alianza con nosotros
  - el pacto que hiciste con nosotros
  lexicon: HALOT
  rationale: בְּרִית se rinde mejor como «pacto» en este contexto por su fuerza contractual y pactual. «Con nosotros» traduce אִתָּנוּ de manera directa y sin añadir la idea de que fue «hecho» explícitamente, que el hebreo no verbaliza aquí.
theological_decisions:
- issue: Referencia de «tu trono glorioso»
  english_pob_reading: Retained as 'your glorious throne' without specifying whether it refers to the temple, Zion, or God's heavenly throne.
  chosen_spanish_reading: Se mantiene «tu trono glorioso» sin precisar si alude al templo, a Sion o al trono celestial de Dios.
  alternative_spanish_readings:
  - el templo/Sion como trono terrenal de la gloria de Dios
  - tu trono celestial de gloria
  rationale: La frase hebrea es intencionalmente evocadora y puede admitir más de una referencia. La traducción española conserva esa tensión interpretativa en lugar de resolverla en el cuerpo del texto.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail al eliminar cualquier pausa indebida después de «nosotros» y mantener el flujo hebreo de la súplica: primero la apelación al nombre, luego la prohibición de deshonrar el trono, y finalmente la petición de recordar el pacto.'
  spanish_consistency_notes:
  - Se usó «pacto» para בְּרִית, en coherencia con la terminología bíblica del proyecto en contextos de alianza/covenio.
  - Se evitó «SEÑOR» para יהוה porque este versículo no contiene el Tetragrámaton; la apelación es mediante «tu nombre» y el discurso directo a Dios.
  - Se mantuvo un registro reverente y natural para una sola oración de súplica, sin sobreexplicitar el referente de «tu trono glorioso».
