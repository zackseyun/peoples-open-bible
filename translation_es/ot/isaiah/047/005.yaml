translation:
  language: es
  text: Siéntate en silencio y entra en tinieblas, hija de los caldeos; porque ya no te llamarán dueña[a] de reinos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «señora de reinos».
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁבִ֥י
  english_pob_choice: Sit
  chosen_spanish: Siéntate
  alternatives_spanish:
  - Permanece sentada
  - Aséntate
  lexicon: HALOT
  rationale: El imperativo femenino singular de ישׁב se expresa de modo natural en español con «siéntate». Conserva la orden de humillación y postura fija sin agregar sentido ajeno al hebreo.
- source_word: דוּמָ֛ם
  english_pob_choice: in silence
  chosen_spanish: en silencio
  alternatives_spanish:
  - calladamente
  - en quietud
  lexicon: HALOT
  rationale: El acusativo adverbial indica silencio o quietud impuesta. «En silencio» es idiomático y preserva el matiz de callarse, no solo de moverse menos.
- source_word: וּבֹ֥אִי
  english_pob_choice: and go
  chosen_spanish: y entra
  alternatives_spanish:
  - y ve
  - y ven
  lexicon: HALOT
  rationale: El verbo בוא con el siguiente complemento de lugar funciona mejor en español como «entra». «Ve» sonaría menos preciso para la imagen de ingresar a una condición de tinieblas.
- source_word: בַחֹ֖שֶׁךְ
  english_pob_choice: into darkness
  chosen_spanish: en tinieblas
  alternatives_spanish:
  - en oscuridad
  - hacia la oscuridad
  lexicon: HALOT
  rationale: Aunque el inglés vierte la idea con movimiento, el hebreo usa la preposición con el sustantivo para expresar entrada en esa condición. «Tinieblas» conserva el registro profético y la fuerza de juicio; el plural español es natural y no cambia el sentido.
- source_word: בַּת כַּשְׂדִּ֑ים
  english_pob_choice: daughter of the Chaldeans
  chosen_spanish: hija de los caldeos
  alternatives_spanish:
  - hija de Babilonia
  - hija de los caldeos
  lexicon: HALOT
  rationale: Se mantiene la fórmula profética de personificación femenina. «Hija de los caldeos» reproduce el vínculo étnico-político del texto sin despersonificar la invectiva.
- source_word: לֹ֤א תוֹסִ֨יפִי֙
  english_pob_choice: no longer will you continue
  chosen_spanish: ya no seguirán
  alternatives_spanish:
  - ya no volverán
  - ya no continuarán
  lexicon: HALOT
  rationale: 'La negación con יסף expresa cese. En español conviene ligar ese cese con la cláusula de «llamar»: «ya no seguirán llamándote» comunica la idea de continuidad terminada sin forzar una estructura artificial.'
- source_word: יִקְרְאוּ לָ֔ךְ
  english_pob_choice: will they call you
  chosen_spanish: llamándote
  alternatives_spanish:
  - te llamarán
  - te llamen
  lexicon: HALOT
  rationale: El sujeto indefinido de tercera persona plural se vuelve más fluido en español con una construcción impersonal de gerundio. Así se conserva el valor general («ellos / la gente») sin introducir un sujeto específico.
- source_word: גְּבֶ֖רֶת
  english_pob_choice: mistress
  chosen_spanish: dueña
  alternatives_spanish:
  - señora
  - ama
  lexicon: HALOT
  rationale: El término puede significar señora, dueña o señora dominante. «Dueña» comunica con claridad la posición de dominio sobre otros reinos y evita un matiz demasiado cortés o nobiliario que no refleja bien la burla del pasaje.
- source_word: מַמְלָכֽוֹת
  english_pob_choice: of kingdoms
  chosen_spanish: de reinos
  alternatives_spanish:
  - de los reinos
  - sobre reinos
  lexicon: HALOT
  rationale: El plural expresa supremacía imperial. «De reinos» conserva la relación genitiva de manera directa y sobria, acorde con el hebreo.
theological_decisions:
- issue: La imagen de tinieblas como juicio y humillación
  english_pob_reading: Retain 'darkness' literally in the main text while allowing the metaphor of humiliation and loss of status to emerge from context.
  chosen_spanish_reading: Mantener «tinieblas» de modo literal en el cuerpo del verso para que la humillación y el desplazamiento del poder se infieran del contexto.
  alternative_spanish_readings:
  - oscuridad
  - sombras
  - obscuridad
  rationale: El hebreo presenta una imagen concreta y profética. «Tinieblas» preserva el peso simbólico sin explicarlo en exceso ni suavizarlo.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: La personificación femenina de Babilonia/Caldea
  english_pob_reading: Preserve the feminine address with 'daughter of the Chaldeans' and feminine social title 'mistress.'
  chosen_spanish_reading: Conservar la dirección femenina con «hija de los caldeos» y un título femenino de dominio con «dueña».
  alternative_spanish_readings:
  - señora de reinos
  - reina de reinos
  - ama de reinos
  rationale: El hebreo interpela a la nación/ciudad como mujer. «Dueña» mantiene el tono de dominio y el sarcasmo del juicio sin sustituir la metáfora por un título más ceremonial.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: El borrador sigue el pasaje hebreo WLC y concuerda sustancialmente con la auditoría inglesa POB, especialmente en la preservación de la orden de humillación, la personificación femenina y el sustantivo de oscuridad. Se adapta la sintaxis para que el español suene natural sin perder la estructura de imperativos y la cláusula de cese.
  spanish_consistency_notes:
  - Se usa «caldeos» para כַּשְׂדִּים conforme al uso bíblico estándar en español.
  - Se prefiere «tinieblas» frente a «oscuridad» por su mayor resonancia profética y porque el hebreo admite una cualidad de densidad/juicio, no solo ausencia de luz.
  - «Dueña» se emplea como equivalencia funcional de gְּבֶרֶת en este contexto de burla, sin elevarla a un título cortesano más fuerte que el hebreo.
  - La construcción «ya no seguirán llamándote» evita un calco rígido de la negación hebrea y comunica el cese durativo indicado por יסף.
