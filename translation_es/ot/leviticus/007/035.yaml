translation:
  language: es
  text: Esta es la porción ungida[a] de Aarón y la porción ungida[a] de sus hijos, de las ofrendas de alimento de Yahvé[b], el día en que los presentó para servir como sacerdotes a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “porción de la unción”. El término hebreo está relacionado con la unción, pero aquí probablemente se refiere a la porción asignada a los sacerdotes en conexión con su consagración.
    reason: lexical_alternative
  - marker: b
    text: Tradicionalmente, “ofrendas hechas por fuego de Yahvé”.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשְׁחַת
  english_pob_choice: anointed portion
  chosen_spanish: porción consagrada
  alternatives_spanish:
  - porción ungida
  - porción de la unción
  - porción anointing
  lexicon: HALOT
  rationale: En este contexto cultual, la palabra hebrea está ligada a la unción/consecración, pero funciona como una designación del derecho o porción asignada. 'Porción consagrada' conserva la relación con la unción sin forzar una lectura meramente ritual de aceite, y suena natural en español bíblico contemporáneo.
- source_word: מִשְׁחַת אַהֲרֹן וּמִשְׁחַת בָּנָיו
  english_pob_choice: the anointed portion of Aaron and the anointed portion of his sons
  chosen_spanish: la porción consagrada de Aarón y la porción consagrada de sus hijos
  alternatives_spanish:
  - la porción ungida de Aarón y la porción ungida de sus hijos
  - la porción de la unción de Aarón y la porción de la unción de sus hijos
  lexicon: HALOT
  rationale: Se conserva la repetición hebrea de la expresión para Aarón y para sus hijos, en vez de comprimirla. 'Sus hijos' mantiene la referencia filial a Aarón que está explícita en el contexto.
- source_word: מֵאִשֵּׁי יְהוָה
  english_pob_choice: from the food offerings of Yahweh
  chosen_spanish: de las ofrendas encendidas de Yahvé
  alternatives_spanish:
  - de las ofrendas hechas por fuego de Yahvé
  - de las ofrendas por fuego de Yahvé
  - de las ofrendas alimento de Yahvé
  lexicon: HALOT
  rationale: El hebreo אִשֵּׁי denota ofrendas hechas por fuego. 'Ofrendas encendidas' preserva la imagen del fuego y evita la ambigüedad de 'ofrendas alimento', que no es transparente en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Siguiendo el criterio del proyecto para el Tetragrámaton, se usa 'Yahvé' como forma principal en español, manteniendo el nombre divino en vez de sustituirlo por un título.
- source_word: בְּיוֹם
  english_pob_choice: on the day when
  chosen_spanish: el día en que
  alternatives_spanish:
  - cuando
  - en el día cuando
  lexicon: HALOT
  rationale: '''El día en que'' reproduce la función temporal del hebreo de manera idiomática en español y conserva el matiz de ocasión específica.'
- source_word: הִקְרִיב אֹתָם
  english_pob_choice: he presented them
  chosen_spanish: los presentó
  alternatives_spanish:
  - los acercó
  - los llevó delante
  - los ofreció
  lexicon: HALOT
  rationale: El verbo hifil de קרב aquí describe la presentación/introducción formal para el servicio sacerdotal. 'Los presentó' evita un sentido sacrificial que 'los ofreció' podría sugerir en español.
- source_word: לְכַהֵן
  english_pob_choice: to serve as priests
  chosen_spanish: para servir como sacerdotes
  alternatives_spanish:
  - para ministrar como sacerdotes
  - para ejercer como sacerdotes
  lexicon: HALOT
  rationale: '''Servir como sacerdotes'' expresa con claridad la función sacerdotal sin introducir una denominación eclesiástica ajena al contexto.'
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - al servicio de Yahvé
  lexicon: HALOT
  rationale: La preposición lamed al final indica relación de servicio/dedicación. 'Para Yahvé' es natural en español y mantiene esa orientación.
theological_decisions:
- issue: Sentido de מִשְׁחַת en legislación sacerdotal
  english_pob_reading: cultic portion/allotment rather than literal anointing
  chosen_spanish_reading: porción consagrada ligada a la unción y a la asignación sacerdotal
  alternative_spanish_readings:
  - porción ungida
  - unción
  rationale: 'La evidencia del contexto muestra que no se trata simplemente del acto material de ungir, sino de la porción asignada en conexión con la consagración. ''Consagrada'' conserva esa tensión: remite a la unción sin reducir el término a un rito ni perder la idea de asignación.'
  doctrine_reference: Levítico 7:35; cf. legislación sacerdotal sobre consagración y porción cultual
- issue: Reproducción de אִשֵּׁי יְהוָה
  english_pob_reading: food offerings of Yahweh / offerings by fire
  chosen_spanish_reading: ofrendas encendidas de Yahvé
  alternative_spanish_readings:
  - ofrendas por fuego de Yahvé
  - ofrendas alimento de Yahvé
  rationale: Se mantiene la referencia al fuego, que es la fuerza semántica tradicional del sustantivo, pero con una formulación clara para el lector español. No se sustituye por 'ofrendas alimento' porque esa opción puede ocultar la imagen cultual presente en el hebreo.
  doctrine_reference: Levítico 7:35; uso sacerdotal de אִשֵּׁי
- issue: Nombre divino en el texto
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se conserva el nombre propio divino conforme a la política del proyecto, evitando la sustitución litúrgica por un título. Esto mantiene visible la relación del pasaje con el nombre revelado a Israel.
  doctrine_reference: Éxodo 3:15; práctica terminológica del POB
translation_notes:
  revision_awareness: La revisión inglesa más reciente reforzó el valor de מִשְׁחַת como 'anointed portion', manteniendo el vínculo con la unción/consecración sin abandonar el sentido de porción asignada. La versión española adopta esa misma solución de manera equivalente con 'porción consagrada', para preservar el nexo semántico con la unción y la función cultual. También se conserva la idea de 'offerings by fire' con una forma española natural y transparente.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה.
  - Se conserva la repetición hebrea de 'porción consagrada' para reflejar la estructura del verso.
  - '''Sacerdotes'' se emplea para לְכַהֵן, sin sustituirlo por términos eclesiásticos posteriores.'
  - La nota al pie se ancla en 'ofrendas encendidas' para señalar la alternativa léxica del hebreo.
