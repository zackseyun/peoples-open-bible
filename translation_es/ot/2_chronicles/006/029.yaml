review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el rastro POB en casi todos los puntos: mantiene el doblete ''oración / súplica'', el sentido distributivo individual/colectivo, la distinción ''aflicción / dolor'' y la orientación ''hacia esta casa''. Sin embargo, dos giros españoles suenan poco naturales frente al sentido fuente: ''que pueda ser hecha'' es una pasiva forzada para una oración ofrecida, y ''cada uno conociendo'' resulta pesado en español bíblico legible. Además, ''sus manos'' pierde el singular distributivo de כַּפָּיו mejor representado por ''las manos'' en español idiomático dentro de la construcción distributiva.'
  spanish_quality_summary: El texto es mayormente fiel, claro y digno, pero necesita pulido de naturalidad. 'Que se haga' expresa mejor la posibilidad/ofrecimiento de la oración que 'que pueda ser hecha'. 'sabiendo cada uno' fluye mejor que 'cada uno conociendo' sin perder el valor distributivo. También conviene poner coma vocativa en 'tu pueblo, Israel' para mejorar legibilidad.
  glossary_alignment: No hay conflicto con la terminología del proyecto. La nota sobre 'hombre/persona' preserva correctamente la decisión documentada sobre אָדָם. 'Oración', 'súplica', 'aflicción', 'dolor' y 'hacia esta casa' están alineados con las decisiones léxicas auditadas.
  issues:
  - severity: medium
    issue: '''que pueda ser hecha'' es una construcción española poco natural'
    rationale: Aunque refleja la pasiva inglesa, en español moderno y digno suena forzada para una oración o súplica. El hebreo permite una formulación más idiomática como 'que se haga' sin perder el sentido de algo ofrecido o presentado.
  - severity: medium
    issue: '''cada uno conociendo'' suena calco y poco fluido'
    rationale: La cláusula distributiva אֲשֶׁר יֵדְעוּ אִישׁ se entiende mejor en español como 'sabiendo cada uno' o 'cuando cada uno conoce'. Esto conserva el valor distributivo sin rigidez.
  - severity: low
    issue: Falta coma en 'tu pueblo Israel'
    rationale: '''Tu pueblo, Israel'' mejora la lectura y marca mejor la aposición del nombre del pueblo, en línea con la alternativa ya contemplada en las decisiones léxicas.'
  revised_spanish_text: cualquier oración[a], cualquier súplica que se haga por cualquier hombre o por todo tu pueblo, Israel, sabiendo cada uno su propia aflicción y su propio dolor, y extendiendo las manos hacia esta casa—
  revised_footnotes:
  - marker: a
    text: O 'por cualquier persona'. El hebreo usa אָדָם en sentido genérico.
    reason: lexical_alternative
  revision_rationale: 'Se hicieron ajustes menores de naturalidad y legibilidad en español sin cambiar el sentido fuente ni las decisiones teológicas documentadas: ''que se haga'' por la pasiva forzada ''que pueda ser hecha''; ''sabiendo cada uno'' por el calco menos natural ''cada uno conociendo''; y coma en ''tu pueblo, Israel'' para una mejor lectura. Se mantuvo ''por cualquier hombre'' con nota inclusiva, conforme al rastro POB sobre אָדָם.'
