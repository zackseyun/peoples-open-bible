revisions:
- from: Y el asunto respecto de Heliodoro y la custodia del tesoro siguió así[a].
  to: Y el asunto acerca de Heliodoro y la custodia del tesoro sucedió de esta manera[a].
  rationale: Se ajusta el cierre verbal para reflejar mejor el valor narrativo de ἐχώρησεν en español natural y se suaviza «respecto de» a «acerca de» sin alterar el sentido. Se conserva «custodia del tesoro» y la alternativa documentada con «protección».
  reviewer_model: gpt-5.4
