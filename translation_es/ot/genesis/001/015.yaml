translation:
  language: es
  text: Y que sean para lumbreras en la expansión de los cielos[a], para dar luz sobre la tierra[b]. Y fue así.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "en el firmamento de los cielos".
    reason: lexical_alternative
  - marker: b
    text: O "para luces". El hebreo se refiere a cuerpos que dan luz, no a la luz abstracta.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיוּ
  english_pob_choice: And let them be
  chosen_spanish: Y que sean
  alternatives_spanish:
  - Y sean
  - Y que estén
  lexicon: HALOT
  rationale: En este contexto de mandato creador, el hebreo continúa la fuerza volitiva de la orden anterior. En español, 'que sean' conserva mejor ese valor exhortativo/mandativo que un futuro simple, y evita una lectura meramente descriptiva.
- source_word: לִמְאוֹרֹת
  english_pob_choice: for lights
  chosen_spanish: para lumbreras
  alternatives_spanish:
  - para luces
  - para luminares
  lexicon: HALOT
  rationale: מָאוֹר designa cuerpos que dan luz, no la abstracción de 'luz'. 'Lumbreras' mantiene ese sentido de fuente luminosa y suena más natural en español bíblico que 'luminares', sin perder la referencia a los astros.
- source_word: בִּרְקִיעַ
  english_pob_choice: in the expanse
  chosen_spanish: en la expansión
  alternatives_spanish:
  - en la expansión del cielo
  - en la bóveda
  lexicon: HALOT
  rationale: '''Expansión'' refleja bien רָקִיעַ como espacio extendido/extendido-abovedado y evita el arcaísmo de ''firmamento''. Aquí no se impone ''cielo'' como equivalente único, porque el hebreo distingue la localización dentro del רָקִיעַ.'
- source_word: הַשָּׁמַיִם
  english_pob_choice: of the heavens
  chosen_spanish: de los cielos
  alternatives_spanish:
  - del cielo
  - de los cielos
  lexicon: HALOT
  rationale: El plural hebreo se conserva mejor con 'cielos'. 'Cielos' también armoniza con el estilo del capítulo y con la pluralidad morfológica del מקור, sin forzar una singularización interpretativa.
- source_word: לְהָאִיר
  english_pob_choice: to give light
  chosen_spanish: para dar luz
  alternatives_spanish:
  - para alumbrar
  - para iluminar
  lexicon: HALOT
  rationale: 'El hiphil es causativo: ''hacer que haya luz / dar luz''. ''Para dar luz'' reproduce ese valor de manera clara y pública; ''alumbrar'' o ''iluminar'' son posibles, pero ''dar luz'' sigue más de cerca la idea causativa sin sonar técnico.'
- source_word: עַל הָאָרֶץ
  english_pob_choice: on the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre la tierra
  - en la tierra
  lexicon: HALOT
  rationale: '''Sobre la tierra'' comunica bien la dirección/sfera de la iluminación. ''Tierra'' es preferible aquí a ''mundo'' o ''suelo'' porque mantiene el paralelismo cósmico del relato de la creación.'
- source_word: וַיְהִי כֵן
  english_pob_choice: And it was so
  chosen_spanish: Y fue así
  alternatives_spanish:
  - Y así fue
  - Y sucedió así
  lexicon: HALOT
  rationale: La fórmula de cumplimiento se traduce de manera directa y sobria. 'Y fue así' conserva la cadencia narrativa de Génesis 1 sin añadir matices causales no presentes en el hebreo.
theological_decisions:
- issue: Valor volitivo de וְהָיוּ dentro del discurso creador
  english_pob_reading: 'Render as a command continuation: ''And let them be'''
  chosen_spanish_reading: '''Y que sean'' como continuación imperativa de la palabra creadora'
  alternative_spanish_readings:
  - '''Y serán'''
  - '''Y sean'''
  rationale: La secuencia narrativa es una orden divina seguida por su cumplimiento. En español, 'que sean' preserva la fuerza de mandato sin convertir la frase en simple futuro descriptivo ni en una exhortación independiente.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'El texto sigue de cerca el consenso del auditor en inglés: mantener el valor volitivo de וְהָיוּ, traducir לִמְאוֹרֹת con un sustantivo de cuerpos luminosos y no con ''luz'' abstracta, conservar רָקִיעַ con una forma no arcaica, y reflejar la fórmula final de cumplimiento con una expresión breve y paralela. No se registraron revisiones posteriores que alteren esta lectura.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino en el proyecto, pero este versículo no contiene el Tetragrámaton.
  - '''Cielos'' conserva el plural hebreo morfológico de הַשָּׁמַיִם.'
  - No se introduce vocabulario doctrinal adicional; la línea sigue el paralelismo literario del relato de la creación.
