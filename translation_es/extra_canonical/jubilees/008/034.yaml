base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/008/034.yaml
  text: And everyone sold himself to do injustice and to pour out much blood, and the earth was filled with injustice.
  revision_pass:
    model: gpt-5.4-mini
