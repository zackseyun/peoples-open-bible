    issue: '''y lo sirve'' es menos idiomático que ''y le sirve'' en español general cuando el referente es una persona'
    rationale: Aunque el hebreo admite 'servirlo', en español actual y de registro bíblico amplio 'servirle' al rey suena más natural y evita tropiezo estilístico sin perder el matiz de vasallaje.
  - severity: low
