translation:
  language: es
  text: Ahora bien, el resto de los hechos de Jehoás, y todo lo que hizo, y su poderío, y cómo combatió con[a] Amasías, rey de Judá, ¿no están escritos en el Libro de las Crónicas[b] de los reyes de Israel?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «combatió contra Amasías, rey de Judá». El hebreo usa literalmente la preposición «con», pero en contexto militar puede explicitarse como oposición hostil.
    reason: lexical_alternative
  - marker: b
    text: O «en el libro de los anales de los reyes de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֶתֶר
  english_pob_choice: Now the rest of
  chosen_spanish: Ahora bien, el resto de
  alternatives_spanish:
  - Y el resto de
  - El resto de
  lexicon: HALOT
  rationale: La fórmula introduce un resumen regio en los libros de Reyes. «Ahora bien, el resto de» conserva el giro discursivo y suena natural en español sin perder el valor de transición narrativa.
- source_word: דִּבְרֵי
  english_pob_choice: acts
  chosen_spanish: hechos
  alternatives_spanish:
  - actos
  - cosas
  - palabras
  lexicon: HALOT
  rationale: En esta fórmula, דִּבְרֵי no se refiere a «palabras» sino al registro de lo realizado por el rey. «Hechos» comunica bien el sentido de los anales regios en español.
- source_word: יְהוֹאָשׁ
  english_pob_choice: Jehoash
  chosen_spanish: Joás
  alternatives_spanish:
  - Jehoás
  lexicon: HALOT
  rationale: Aunque el inglés POB distingue la forma hebrea como Jehoash, en español bíblico el nombre tradicional y reconocible para este rey es «Joás». Se mantiene la identidad del referente sin forzar una forma poco usada en español.
- source_word: אֲשֶׁר עָשָׂה
  english_pob_choice: all that he did
  chosen_spanish: todo lo que hizo
  alternatives_spanish:
  - y lo que hizo
  - y todas las cosas que hizo
  lexicon: HALOT
  rationale: La cláusula relativa debe quedar explícita, como en la revisión del POB inglés. «Todo lo que hizo» refleja de manera natural y completa אֲשֶׁר עָשָׂה.
- source_word: וּגְבוּרָתוֹ
  english_pob_choice: and his might
  chosen_spanish: y su poder
  alternatives_spanish:
  - y su fuerza
  - y su valentía
  - y sus hazañas
  lexicon: HALOT
  rationale: גְּבוּרָה puede abarcar fuerza, poder y valor guerrero. «Su poder» conserva amplitud semántica y funciona bien en la secuencia de resumen real.
- source_word: וַאֲשֶׁר נִלְחַם עִם
  english_pob_choice: and how he fought with
  chosen_spanish: y cómo combatió con
  alternatives_spanish:
  - y cómo luchó con
  - y cómo peleó contra
  - y cómo luchó contra
  lexicon: HALOT
  rationale: Se preserva el hebreo עִם como «con», siguiendo la cautela del POB inglés, pero usando «combatió» para comunicar con claridad el contexto bélico. No se sustituye por «contra» en el texto principal porque la fuente literal dice «con».
- source_word: אֲמַצְיָהוּ מֶלֶךְ יְהוּדָה
  english_pob_choice: Amaziah king of Judah
  chosen_spanish: Amasías, rey de Judá
  alternatives_spanish:
  - Amasías, el rey de Judá
  lexicon: HALOT
  rationale: La apposición regia se vierte de forma estándar en español. «Amasías» es la forma bíblica habitual y clara para el lector hispanohablante.
- source_word: הֲלֹא הֵם כְּתוּבִים
  english_pob_choice: are they not written
  chosen_spanish: ¿no están escritos
  alternatives_spanish:
  - ¿acaso no están escritos
  - ¿no se encuentran escritos
  lexicon: HALOT
  rationale: La pregunta retórica se mantiene con naturalidad en español. «Están escritos» conserva el valor literario de registro fijo o consignación documental.
- source_word: עַל סֵפֶר דִּבְרֵי הַיָּמִים
  english_pob_choice: in the Book of the Chronicles
  chosen_spanish: en el Libro de las Crónicas
  alternatives_spanish:
  - en el libro de las crónicas
  - en el libro de los anales
  lexicon: HALOT
  rationale: El título documental tradicional en español es «Libro de las Crónicas». Aunque el hebreo sugiere literalmente un libro/anales de «los días», el POB inglés ya reconoce el sentido documental establecido.
- source_word: לְמַלְכֵי יִשְׂרָאֵל
  english_pob_choice: of the Kings of Israel
  chosen_spanish: de los reyes de Israel
  alternatives_spanish:
  - para los reyes de Israel
  - de los reyes de Israel
  lexicon: HALOT
  rationale: 'Se conserva la relación posesiva/titulativa del registro histórico: «de los reyes de Israel». En español fluye de manera natural dentro del nombre del libro.'
theological_decisions:
- issue: Nombre divino no presente explícitamente en este versículo
  english_pob_reading: The verse is a royal chronicle formula without direct divine-name language.
  chosen_spanish_reading: No se introduce ninguna sustitución por «Señor» o equivalente.
  alternative_spanish_readings:
  - Introducir «SEÑOR» por estilo bíblico tradicional
  rationale: El hebreo no contiene aquí el tetragrámaton ni una cita del nombre divino, así que no hay base para insertar una convención reverencial ajena al texto.
  doctrine_reference: Transparencia textual del POB; fidelidad al texto fuente
- issue: Valor de עִם en contexto militar
  english_pob_reading: The Hebrew preposition is literally 'with,' but in this military context it can be rendered more explicitly as hostile opposition.
  chosen_spanish_reading: «combatió con» en el texto principal, con posible oposición hostil implícita.
  alternative_spanish_readings:
  - combatió contra
  - luchó contra
  rationale: 'Se preserva la tensión documentada por el POB inglés: la preposición es literalmente «con», aunque el contexto sea bélico. El español mantiene esa literalidad sin oscurecer el conflicto.'
  doctrine_reference: Precisión semántica y respeto al dato hebreo
translation_notes:
  revision_awareness: La revisión inglesa reciente restauró «and all that he did» para reflejar אֲשֶׁר עָשָׂה; por eso la versión española lo expresa explícitamente como «todo lo que hizo». También se conservó la referencia documental de forma clara y natural, sin suavizar la pregunta retórica final.
  spanish_consistency_notes:
  - Se usó «Joás» por ser la forma bíblica usual en español, aunque el POB inglés distingue la forma hebrea Jehoash; esta es una adaptación onomástica de uso público, no una paráfrasis.
  - Se mantuvo la estructura de resumen regio con un registro sobrio y cronístico, evitando añadir interpretaciones no presentes en el hebreo.
  - «Libro de las Crónicas» se conserva como título establecido; la alternativa más literal queda indicada en nota para no perder la transparencia del trasfondo hebreo.
