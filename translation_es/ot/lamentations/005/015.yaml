  - marker: a
    text: 'También puede traducirse: «nuestra danza se ha convertido en luto».'
    reason: lexical_alternative
  revision_rationale: Se conserva el sentido del hebreo y de la traducción POB, pero se corrige la nota para que refleje la alternativa relevante de מְחֹלֵנוּ y se mejora la naturalidad de la segunda cláusula en español.
