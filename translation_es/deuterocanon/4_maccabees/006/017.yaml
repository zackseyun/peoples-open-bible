translation:
  language: es
  text: No pensemos tan mal, nosotros que somos hijos de Abraham, como para desanimarnos y representar un papel vergonzoso[a], indigno de nosotros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hacer el papel en un drama vergonzoso, indigno de nosotros». El griego usa lenguaje teatral («drama», «representar/hacer un papel») para describir la conducta cobarde.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Μὴ ... φρονήσαιμεν
  english_pob_choice: Let us not think
  chosen_spanish: No pensemos
  alternatives_spanish:
  - No tengamos tal pensamiento
  - No pensemos de ese modo
  lexicon: LSJ
  rationale: El subjuntivo exhortativo con μή pide en español una exhortación inclusiva en primera persona. «No pensemos» conserva la fuerza deliberativa sin volverla rígida.
- source_word: οὕτως κακῶς
  english_pob_choice: so badly
  chosen_spanish: tan mal
  alternatives_spanish:
  - de forma tan mala
  - tan perversamente
  lexicon: LSJ
  rationale: La expresión modifica el pensar y apunta a una disposición vergonzosa o vil. «Tan mal» es natural en español y mantiene la amplitud moral del giro.
- source_word: οἱ Ἀβραὰμ παῖδες
  english_pob_choice: we who are Abraham’s children
  chosen_spanish: nosotros que somos hijos de Abraham
  alternatives_spanish:
  - nosotros, hijos de Abraham
  - nosotros que somos descendientes de Abraham
  lexicon: LSJ
  rationale: παῖδες puede ser «hijos» o «niños/children». «Hijos de Abraham» conserva la identidad de linaje y el tono de apelación honorífica, sin limitar innecesariamente el matiz familiar.
- source_word: μαλακοψυχήσαντας
  english_pob_choice: become fainthearted
  chosen_spanish: desanimarnos
  alternatives_spanish:
  - desfallecer de ánimo
  - volvernos cobardes
  - perder el ánimo
  lexicon: LSJ
  rationale: El participio expresa volverse débil de espíritu o perder valor. «Desanimarnos» comunica bien el giro ingesivo en español, aunque la nota preserva la posibilidad más fuerte de cobardía.
- source_word: ἀπρεπὲς ἡμῖν
  english_pob_choice: a disgraceful part unworthy of us
  chosen_spanish: una escena vergonzosa, indigna de nosotros
  alternatives_spanish:
  - un papel vergonzoso, indigno de nosotros
  - una representación vergonzosa, que no nos corresponde
  lexicon: LSJ
  rationale: ἀπρεπές indica lo impropio o deshonroso; el dativo ἡμῖν marca lo que no conviene a los hablantes. «Indigna de nosotros» conserva la fuerza ética, y «escena» mantiene la imagen teatral.
- source_word: δρᾶμα
  english_pob_choice: scene / drama
  chosen_spanish: escena
  alternatives_spanish:
  - drama
  - representación
  - espectáculo
  lexicon: LSJ
  rationale: δρᾶμα conserva el campo teatral. «Escena» es idiomática en español y permite percibir el lenguaje de teatro sin sonar técnico.
- source_word: ὑποκρίνασθαι
  english_pob_choice: play the part
  chosen_spanish: representar
  alternatives_spanish:
  - interpretar
  - hacer el papel de
  - actuar
  lexicon: LSJ
  rationale: El verbo es teatral, «representar/interpretar un papel». «Representar» comunica bien la idea de desempeñar una parte sin perder el matiz de actuación pública.
theological_decisions:
- issue: Identidad colectiva de «los hijos de Abraham»
  english_pob_reading: we who are Abraham’s children
  chosen_spanish_reading: nosotros que somos hijos de Abraham
  alternative_spanish_readings:
  - nosotros, hijos de Abraham
  - nosotros, descendientes de Abraham
  rationale: La frase apela a una identidad ancestral y de honor. «Hijos de Abraham» preserva la resonancia bíblica y no introduce un sesgo masculino más estrecho del que exige el griego.
  doctrine_reference: Identidad del pueblo del pacto; fidelidad lexical sin neutralizar indebidamente el parentesco.
- issue: Metáfora teatral en la conducta vergonzosa
  english_pob_reading: play a disgraceful part unworthy of us
  chosen_spanish_reading: representar una escena vergonzosa, indigna de nosotros
  alternative_spanish_readings:
  - hacer un papel vergonzoso, indigno de nosotros
  - representar un papel vergonzoso, que no nos corresponde
  rationale: El griego une δρᾶμα y ὑποκρίνασθαι para describir un comportamiento cobarde con imaginería teatral. La traducción mantiene esa tensión, aunque «escena» en vez de «papel» concentra el objeto del teatro.
  doctrine_reference: Preservación de metáfora retórica; no se disuelve en una paráfrasis moral genérica.
translation_notes:
  revision_awareness: La versión inglesa más reciente ajustó «act out a disgraceful scene» a «play a disgraceful part» para reflejar mejor ὑποκρίνασθαι + δρᾶμα. En español se optó por mantener el campo teatral con «escena» y «representar», sin convertirlo en una paráfrasis no teatral.
  spanish_consistency_notes:
  - Se conserva «hijos de Abraham» como fórmula bíblica clara y reconocible.
  - Se mantiene el contraste entre exhortación moral y metáfora teatral.
  - «Desanimarnos» se eligió por naturalidad; la nota deja visible la alternativa más fuerte de «cobardía».
