translation:
  language: es
  text: Bendigan al Señor, lluvias y manantiales; canten alabanzas y ensálcenlo en gran manera por los siglos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εὐλογεῖτε
  english_pob_choice: Bless
  chosen_spanish: Bendecid
  alternatives_spanish:
  - Bendigan
  - Alabad
  lexicon: BDAG
  rationale: El imperativo plural convoca a elementos de la creación a honrar doxológicamente a Dios. «Bendecid» conserva mejor que «alabad» el tono litúrgico repetitivo del himno y reproduce el valor exhortativo del griego.
- source_word: ὄμβροι
  english_pob_choice: rains
  chosen_spanish: lluvias
  alternatives_spanish:
  - aguaceros
  - chubascos
  lexicon: LSJ
  rationale: El plural griego apunta a las lluvias como fenómeno de la creación. «Lluvias» mantiene el plural y suena natural en español bíblico contemporáneo.
- source_word: πηγαί
  english_pob_choice: springs
  chosen_spanish: fuentes
  alternatives_spanish:
  - manantiales
  - vertientes
  lexicon: LSJ
  rationale: El término designa fuentes de agua natural. «Fuentes» es claro y bíblico en español; «manantiales» también sería viable, pero «fuentes» encaja mejor con el paralelismo poético.
- source_word: κύριον
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Señor
  lexicon: BDAG
  rationale: Se conserva el artículo porque el griego lo expresa explícitamente y porque en este himno se trata del Dios de Israel como destinatario conocido del canto. No se usa una convención tipográfica especial para el nombre divino porque el texto fuente aquí es griego con κύριος.
- source_word: ὑμνεῖτε
  english_pob_choice: sing praise
  chosen_spanish: cantad alabanzas
  alternatives_spanish:
  - entonad himnos
  - alabad cantando
  lexicon: BDAG
  rationale: El verbo expresa alabanza cantada. «Cantad alabanzas» transmite el componente musical y doxológico sin sonar forzado en español.
- source_word: ὑπερυψοῦτε
  english_pob_choice: highly exalt
  chosen_spanish: exaltadlo
  alternatives_spanish:
  - ensalzadlo
  - levantadlo muy en alto
  lexicon: LSJ
  rationale: El verbo intensifica la alabanza y la elevación de Dios. En español, el adverbio de intensificación puede quedar implícito en el contexto litúrgico; «exaltadlo» conserva la fuerza verbal sin sobrecargar la línea. La idea de elevación está también reforzada por el paralelismo con el verbo anterior.
- source_word: εἰς τοὺς αἰῶνας
  english_pob_choice: forever
  chosen_spanish: por los siglos
  alternatives_spanish:
  - para siempre
  - por los siglos de los siglos
  lexicon: BDAG
  rationale: La expresión griega idiomática de duración perpetua puede verterse de modo natural como «por los siglos». Esta opción conserva el plural semítico/poético sin introducir la fórmula litúrgica ampliada que el griego aquí no dice explícitamente.
theological_decisions:
- issue: Renderización de κύριος en un himno de alabanza dirigido al Dios de Israel
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Señor
  rationale: Se sigue el valor estándar de κύριος como título divino. En español, «el Señor» mantiene la referencia personal y la naturalidad litúrgica, sin adoptar un reemplazo tipográfico del Tetragrama, que no aparece en el griego de este pasaje.
  doctrine_reference: 'DOCTRINE.md: Contested terms — κύριος → Señor'
translation_notes:
  revision_awareness: El texto griego y la audit trail inglesa están en completo acuerdo; no se requiere nota de variante textual ni ajuste doctrinal adicional. La versión española sigue la sintaxis poética del original y conserva el paralelismo imperativo de la doxología.
  spanish_consistency_notes:
  - Se mantiene el registro litúrgico y poético sin arcaísmos innecesarios.
  - Se conserva el artículo en «el Señor» por fidelidad al griego y claridad en español.
  - «Fuentes» se elige por paralelismo y naturalidad, aunque «manantiales» sería una alternativa semánticamente cercana.
  - No se fuerza una fórmula tradicional ampliada para «por los siglos», porque el griego sólo expresa duración indefinida con εἰς τοὺς αἰῶνας.
