translation:
  language: es
  text: Así, la tierra se volvió inmunda[a], y yo castigué sobre ella su iniquidad[b], y la tierra vomitó a sus habitantes[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'quedó impura' o 'fue contaminada'. El hebreo también puede expresar que la tierra llegó a estar impura o contaminada; 'inmunda' conserva el registro ritual.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'visité su iniquidad sobre ella', un modismo de juicio que expresa pedir cuentas por la culpa o castigarla.
    reason: lexical_alternative
  - marker: c
    text: O 'la arrojó fuera'. El hebreo conserva la imagen vívida de vomitar para describir la expulsión de sus habitantes a causa de la impureza.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּטְמָא
  english_pob_choice: became unclean
  chosen_spanish: se volvió inmunda
  alternatives_spanish:
  - se contaminó
  - quedó inmunda
  - se volvió impura
  lexicon: HALOT
  rationale: טמא aquí describe el estado resultante de la tierra; en español, 'se volvió inmunda' comunica ese cambio de estado de manera natural y conserva el sentido ritual/moral sin suavizarlo demasiado.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la tierra
  lexicon: HALOT
  rationale: En Levítico 18 el término apunta a la tierra como ámbito pactal habitado, no al globo terráqueo. 'La tierra' mantiene la referencia concreta y funciona bien en español bíblico actual.
- source_word: וָאֶפְקֹד
  english_pob_choice: I punished
  chosen_spanish: castigué
  alternatives_spanish:
  - visité
  - hice rendir cuentas
  - castigué
  lexicon: HALOT
  rationale: פקד con עון expresa una visita judicial/punitiva. 'Castigué' transmite con claridad la acción judicial divina en español, sin perder la fuerza del juicio.
- source_word: עֲוֺנָהּ
  english_pob_choice: its iniquity
  chosen_spanish: su iniquidad
  alternatives_spanish:
  - su culpa
  - su maldad
  lexicon: HALOT
  rationale: '''Iniquidad'' conserva el peso moral y el registro covenantal del hebreo עון, mejor que opciones más generales como ''culpa'' o ''maldad''.'
- source_word: עָלֶיהָ
  english_pob_choice: upon it
  chosen_spanish: sobre ella
  alternatives_spanish:
  - contra ella
  - en ella
  lexicon: HALOT
  rationale: La preposición conserva la imagen de juicio 'sobre' el objeto castigado. En español, 'sobre ella' reproduce bien la relación sin forzar una paráfrasis.
- source_word: וַתָּקִא
  english_pob_choice: vomited out
  chosen_spanish: vomitó
  alternatives_spanish:
  - expulsó
  - arrojó fuera
  - escupió
  lexicon: HALOT
  rationale: קיא es deliberadamente gráfico. 'Vomitó' preserva la metáfora corporal y su dureza teológica, mientras que 'expulsó' la suavizaría demasiado.
- source_word: יֹשְׁבֶיהָ
  english_pob_choice: its inhabitants
  chosen_spanish: a sus habitantes
  alternatives_spanish:
  - a los que la habitaban
  - a los que vivían en ella
  lexicon: HALOT
  rationale: El participio de ישב denota a quienes moraban en la tierra. 'A sus habitantes' es breve, natural y fiel al sentido colectivo.
theological_decisions:
- issue: La personificación de la tierra como respondiendo moralmente a la impureza
  english_pob_reading: Retain the concrete imagery that the land 'vomited out' its inhabitants.
  chosen_spanish_reading: 'Mantener la imagen concreta: ''la tierra vomitó a sus habitantes''.'
  alternative_spanish_readings:
  - la tierra expulsó a sus habitantes
  - la tierra los arrojó fuera
  rationale: El hebreo presenta a la tierra como agente de rechazo ante la contaminación moral. Conservar la metáfora sostiene la conexión entre pecado, impureza y juicio divino, en vez de convertirla en una mera explicación geográfica o política.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: El matiz judicial de וָאֶפְקֹד עֲוֺנָהּ עָלֶיהָ
  english_pob_reading: 'Express as direct punishment: ''I punished its iniquity upon it.'''
  chosen_spanish_reading: 'Expresar el juicio de forma directa: ''castigué su iniquidad sobre ella''.'
  alternative_spanish_readings:
  - hice caer su iniquidad sobre ella
  - la llamé a cuentas por su iniquidad
  rationale: La frase atribuye a Dios una acción de juicio. 'Castigué' hace explícita la fuerza punitiva que el hebreo comunica idiomáticamente, sin ocultar la agencia divina.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: El pasaje ya pasó una revisión reciente sin cambios sustanciales; la redacción propuesta conserva el acuerdo principal con el texto hebreo y con el audit trail inglés, ajustando solo la naturalidad del español y la correspondencia de matices lexicales.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general, pero este versículo no contiene el nombre divino en forma explícita; la primera persona refleja la voz divina implícita en el hebreo.
  - '''Inmunda'' conserva el campo semántico ritual de טמא sin reemplazarlo por una formulación moralizante más débil.'
  - '''Castigué'' traduce el acto judicial de פקד con una forma verbal clara en español, preservando la relación entre culpa y juicio.'
  - Se conserva la metáfora de 'vomitó' por fidelidad a la imagen corporal fuerte del hebreo.
  - '''La tierra'' se usa como equivalente contextual de הָאָרֶץ en sentido de territorio pactal, no como ''el mundo''.'
