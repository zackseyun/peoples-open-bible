translation:
  language: es
  text: Reconocemos[a], Yahvé, nuestra maldad, la iniquidad de nuestros padres, porque hemos pecado contra ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nuestros antepasados». El hebreo dice «nuestros padres».
    reason: lexical_alternative
lexical_decisions:
- source_word: יָדַעְנוּ
  english_pob_choice: We acknowledge
  chosen_spanish: Reconocemos
  alternatives_spanish:
  - Sabemos
  - Confesamos
  lexicon: HALOT
  rationale: En este contexto penitencial, ידע no es mero saber intelectual; expresa admitir o reconocer la culpa delante de Dios. «Reconocemos» conserva el matiz cognitivo y la fuerza confesional sin forzar una fórmula más rígida.
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se traduce con el nombre propio divino «Yahvé», manteniendo la decisión auditada del POB de preservar el nombre del pacto en lugar de sustituirlo por un título.
- source_word: רִשְׁעֵנוּ
  english_pob_choice: our wickedness
  chosen_spanish: nuestra maldad
  alternatives_spanish:
  - nuestra perversidad
  - nuestra culpa
  lexicon: HALOT
  rationale: רֶשַׁע designa maldad o impiedad como realidad moral de conducta. «Maldad» funciona de manera natural en español y conserva el peso ético del término.
- source_word: עֲוֺן
  english_pob_choice: iniquity
  chosen_spanish: iniquidad
  alternatives_spanish:
  - culpa
  - pecado
  lexicon: HALOT
  rationale: Aquí עָוֹן mantiene su valor de iniquidad/culpa moral y se distingue de רִשְׁעֵנוּ. «Iniquidad» preserva esa distinción mejor que una repetición de «maldad» o una simplificación a «pecado».
- source_word: אֲבוֹתֵינוּ
  english_pob_choice: our fathers
  chosen_spanish: nuestros padres
  alternatives_spanish:
  - nuestros antepasados
  lexicon: HALOT
  rationale: El hebreo es explícitamente masculino plural. Se conserva «padres» por fidelidad gramatical y al patrón acordado de precisión de género, sin neutralizarlo a «antepasados».
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: 'כִּי introduce el fundamento de la confesión: la razón por la cual reconocen su maldad e iniquidad. «Porque» es natural en español y mantiene el valor causal.'
- source_word: חָטָאנוּ
  english_pob_choice: we have sinned
  chosen_spanish: hemos pecado
  alternatives_spanish:
  - pecamos
  lexicon: HALOT
  rationale: El perfecto verbal expresa una acción completada con relevancia presente en una confesión. «Hemos pecado» comunica bien ese valor y es idiomático en español.
- source_word: לָךְ
  english_pob_choice: against you
  chosen_spanish: contra ti
  alternatives_spanish:
  - a ti
  lexicon: HALOT
  rationale: Con חטא, la preposición puede marcar a la parte ofendida; en español, la manera idiomática es «pecar contra alguien». «Contra ti» conserva ese sentido relacional y ofensivo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: O Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La oración del versículo se dirige directamente a YHWH; por tanto, se usa el nombre propio divino «Yahvé» y no una sustitución titular. Esto preserva la identidad del Dios del pacto que habla en el texto hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Mantenimiento del plural masculino אֲבוֹתֵינוּ
  english_pob_reading: our fathers
  chosen_spanish_reading: nuestros padres
  alternative_spanish_readings:
  - nuestros antepasados
  rationale: La forma hebrea es masculina plural y el POB la retiene. En español, «nuestros padres» mantiene la estructura y la precisión gramatical; «antepasados» sería una neutralización no exigida por el texto.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: El texto español sigue el acuerdo alto del audit trail inglés y corrige la validación previa anclando la nota al marcador [a] en el propio versículo. No se hicieron cambios de sentido respecto del hebreo ni de las decisiones léxicas auditadas.
  spanish_consistency_notes:
  - 'Se mantiene la secuencia confesional del hebreo: reconocimiento de maldad e iniquidad, seguido de la causa «porque hemos pecado contra ti».'
  - Se conserva la distinción entre «maldad» (רִשְׁעֵנוּ) e «iniquidad» (עֲוֺן).
  - Se usa «Yahvé» de manera consistente con la política del proyecto para el Tetragrámaton.
  - La nota [a] está anclada en «padres», donde surge la alternativa de traducción documentada.
