review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: frecuente juramento, culpa personal, agravamiento por pasarla por alto y consecuencias sobre la casa. También preserva adecuadamente la fuerza forense de οὐ δικαιωθήσεται como «no será justificado». Sin embargo, hay un problema importante de alineación entre texto y nota en [a]: la nota ofrece una alternativa que cambia indebidamente el sentido de μάστιξ y la sintaxis de la cláusula, como si el sujeto fuera la casa («la azotará un flagelo»), cuando el griego dice que «el azote/flagelo no se apartará de su casa».'
  spanish_quality_summary: El español es claro, digno y mayormente natural. «El hombre que jura muchos juramentos» suena algo redundante pero aceptable y fiel. «Peca inadvertidamente», «su pecado recae sobre él» y «ha pecado doblemente» son buenas soluciones. La principal necesidad de reparación está en la nota [a], no en la prosa principal. Conviene además hacer que la nota [a] corresponda exactamente al lugar donde está anclada y no induzca a leer otra construcción.
  glossary_alignment: No hay términos del glosario base del proyecto especialmente comprometidos en este versículo. La elección de «justificado» para δικαιωθήσεται está bien documentada y coherente con la pauta de preservar términos clave con nota aclaratoria forense. «Azote», «calamidades» y «en vano» concuerdan con el rastro auditado en inglés y con el griego.
  issues:
  - severity: medium
    issue: La nota [a] no corresponde fielmente al texto griego ni al anclaje en «maldad[a]».
    rationale: 'La nota dice «También: “la azotará un flagelo”», pero el griego no expresa que un flagelo azotará a la casa; dice que «el azote/flagelo no se apartará de su casa». Además, al estar anclada en «maldad[a]», la alternativa pertinente es la otra segmentación de la primera cláusula completa, no una reformulación sintácticamente distinta e inexacta.'
  revised_spanish_text: El hombre que jura muchos juramentos se llenará de maldad[a], y el azote no se apartará de su casa. Si peca inadvertidamente, su pecado recae sobre él; y si lo menosprecia, ha pecado doblemente. Y si juró en vano[c], no será justificado[b], porque su casa se llenará de calamidades[d].
  revised_footnotes:
