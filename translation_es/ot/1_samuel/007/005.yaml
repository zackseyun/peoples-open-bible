translation:
  language: es
  text: 'Entonces Samuel dijo: «Reúnan a todo Israel a Mizpa, y yo oraré a Yahvé[a] en favor de ustedes».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «a Yahvé».'
    reason: source_note
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: La waw consecutiva marca avance narrativo; «Entonces» conserva la secuencia de manera natural en español sin perder el valor de continuación.
- source_word: שְׁמוּאֵל
  english_pob_choice: Samuel
  chosen_spanish: Samuel
  alternatives_spanish:
  - Samuél
  lexicon: Nombre propio bíblico
  rationale: Se conserva el nombre propio en su forma habitual en español bíblico.
- source_word: קִבְצוּ
  english_pob_choice: Gather
  chosen_spanish: Reúnan
  alternatives_spanish:
  - Junten
  - Congreguen
  lexicon: HALOT
  rationale: El imperativo plural llama a convocar al pueblo; «Reúnan» es natural y mantiene el matiz de convocatoria colectiva.
- source_word: כָּל יִשְׂרָאֵל
  english_pob_choice: all Israel
  chosen_spanish: todo Israel
  alternatives_spanish:
  - la totalidad de Israel
  - todo el pueblo de Israel
  lexicon: HALOT
  rationale: «Todo Israel» conserva el sentido colectivo y nacional sin añadir palabras que el hebreo no exige.
- source_word: הַמִּצְפָּתָה
  english_pob_choice: to Mizpah
  chosen_spanish: en Mizpa
  alternatives_spanish:
  - a Mizpa
  - hacia Mizpa
  lexicon: HALOT
  rationale: La terminación direccional señala movimiento hacia el lugar; en español, con verbos de reunión, «en Mizpa» comunica de forma natural el punto de convocatoria sin forzar la direccionalidad.
- source_word: וְאֶתְפַּלֵּל
  english_pob_choice: and I will pray
  chosen_spanish: y yo oraré
  alternatives_spanish:
  - y oraré
  - y yo rogaré
  lexicon: HALOT
  rationale: El imperfecto de 1ª singular tras el imperativo expresa acción prometida o intencional; «oraré» preserva la decisión de Samuel de interceder y suena idiomático en español.
- source_word: בַּעַדְכֶם
  english_pob_choice: on your behalf
  chosen_spanish: en favor de ustedes
  alternatives_spanish:
  - por ustedes
  - en beneficio de ustedes
  lexicon: HALOT
  rationale: «En favor de ustedes» expresa con claridad la función intercesora de בַּעַד sin reducirlo a un simple «por», que en español puede volverse demasiado genérico.
- source_word: אֶל יְהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - hacia Yahvé
  - delante de Yahvé
  lexicon: Tetragrammaton
  rationale: 'Se sigue la norma del proyecto para יְהוָה: «Yahvé». Con el verbo orar, la preposición natural en español es «a».'
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: El texto hebreo usa el Tetragrámaton directamente. La convención española del proyecto es «Yahvé», manteniendo visible el nombre pactual y evitando el sustitutivo litúrgico «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Naturaleza de בַּעַדְכֶם como intercesión
  english_pob_reading: on your behalf
  chosen_spanish_reading: en favor de ustedes
  alternative_spanish_readings:
  - por ustedes
  - a favor de ustedes
  rationale: La frase comunica intercesión, no mera localización ni simple representación abstracta. «En favor de ustedes» mantiene el valor relacional y piadoso del hebreo.
  doctrine_reference: Lexical decision — בַּעַד como expresión de mediación/intercesión
translation_notes:
  revision_awareness: Se siguió la lectura del audit trail inglés en cuanto a la secuencia narrativa, el imperativo plural, la acción futura/intencional de Samuel y el valor intercesor de בַּעַדְכֶם; la única adaptación principal respecto al audit trail inglés es el nombre divino, que en el proyecto español se normaliza como «Yahvé».
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico claro y digno, evitando arcaísmos innecesarios.
  - «Mizpa» se conservó como topónimo transliterado estándar.
  - No se añadió artículo antes de «Yahvé» en la frase preposicional para respetar el nombre propio divino en uso directo.
  - La puntuación en estilo de cita directa sigue la convención española con comillas angulares.
