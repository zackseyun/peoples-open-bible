translation:
  language: es
  text: Cuando entren[a] los sacerdotes, no saldrán del lugar santo hacia el atrio exterior, sino que allí dejarán sus vestiduras en las que ministran, porque son santas. Se pondrán otras vestiduras y se acercarán a aquello que es para el pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «al entrar». El hebreo expresa una cláusula temporal breve; la forma escogida busca fluidez sin perder el valor de entrada.'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּבֹאָם
  english_pob_choice: When the priests enter
  chosen_spanish: Cuando entren los sacerdotes
  alternatives_spanish:
  - Al entrar los sacerdotes
  - Cuando los sacerdotes entren
  lexicon: HALOT
  rationale: La construcción temporal hebrea se expresa de manera natural con 'cuando'. Mantengo el orden claro y la referencia directa a los sacerdotes sin volverla más interpretativa de lo que exige el texto.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes del templo
  - los ministros
  lexicon: HALOT
  rationale: '''Sacerdotes'' es el equivalente claro y bíblico en español para כֹּהֲנִים. Evito ''ministros'' porque suaviza el oficio cultual.'
- source_word: וְלֹא יֵצְאוּ
  english_pob_choice: they shall not go out
  chosen_spanish: no saldrán
  alternatives_spanish:
  - no deben salir
  - no han de salir
  lexicon: HALOT
  rationale: En este contexto regulativo, el imperfecto funciona como instrucción. 'No saldrán' conserva el tono normativo sin añadir una perífrasis excesiva.
- source_word: מֵהַקֹּדֶשׁ
  english_pob_choice: from the holy place
  chosen_spanish: del lugar santo
  alternatives_spanish:
  - del santuario
  - del recinto santo
  lexicon: HALOT
  rationale: '''Lugar santo'' comunica bien el contraste con el atrio exterior y mantiene el valor espacial-sacral de קֹדֶשׁ. ''Santuario'' podría sonar demasiado técnico o amplio según el contexto.'
- source_word: אֶל הֶחָצֵר הַחִיצוֹנָה
  english_pob_choice: into the outer court
  chosen_spanish: hacia el atrio exterior
  alternatives_spanish:
  - al atrio exterior
  - al patio exterior
  lexicon: HALOT
  rationale: '''Atrio'' es el término más tradicional y preciso para el espacio del templo en español. ''Hacia'' refleja el movimiento prohibido desde el lugar santo hacia el ámbito exterior.'
- source_word: וְשָׁם יַנִּיחוּ
  english_pob_choice: but there they shall leave
  chosen_spanish: sino que allí dejarán
  alternatives_spanish:
  - y allí dejarán
  - allí depositarán
  lexicon: HALOT
  rationale: El valor de 'dejar' funciona mejor aquí que 'depositar', porque el contexto es quitarse y dejar las vestiduras en un lugar designado. 'Sino que' reproduce el contraste restrictivo del versículo.
- source_word: בִגְדֵיהֶם
  english_pob_choice: their garments
  chosen_spanish: sus vestiduras
  alternatives_spanish:
  - sus prendas
  - sus ropas
  lexicon: HALOT
  rationale: '''Vestiduras'' conserva dignidad y el registro cultual del pasaje. Es preferible a ''ropas'', que resulta más común y menos solemne.'
- source_word: אֲשֶׁר יְשָׁרְתוּ בָהֶן
  english_pob_choice: in which they minister
  chosen_spanish: en las que ministran
  alternatives_spanish:
  - con las que ministran
  - en las que sirven
  lexicon: HALOT
  rationale: '''Ministrar'' preserva el sentido sacerdotal y litúrgico de שׁרת, más fuerte que ''servir''. ''En las que'' adapta el hebreo relativo al español natural sin perder la referencia a las vestiduras.'
- source_word: כִּי קֹדֶשׁ הֵנָּה
  english_pob_choice: for these are holy
  chosen_spanish: porque son santas
  alternatives_spanish:
  - pues son santas
  - porque esas vestiduras son santas
  lexicon: HALOT
  rationale: Mantengo el referente femenino plural implícito en español con 'son santas', que enlaza naturalmente con 'vestiduras'. 'Santas' conserva la cualidad de consagración sin diluirla en mera pureza ritual.
- source_word: יִלְבְּשׁוּ בְּגָדִים אֲחֵרִים
  english_pob_choice: They shall put on other garments
  chosen_spanish: Se pondrán otras vestiduras
  alternatives_spanish:
  - vestirán otras vestiduras
  - se vestirán con otras vestiduras
  lexicon: HALOT
  rationale: '''Ponerse vestiduras'' es idiomático en español y conserva la obligación de cambiar de ropa antes de otro acceso. ''Otras vestiduras'' mantiene la diferencia respecto de las santas.'
- source_word: וְקָרְבוּ
  english_pob_choice: and then approach
  chosen_spanish: y se acercarán
  alternatives_spanish:
  - y se aproximarán
  - y se presentarán
  lexicon: HALOT
  rationale: '''Acercarse'' traduce bien קָרְבוּ y es suficientemente neutral para el movimiento posterior. Evito ''presentarse'' porque añade un matiz no explicitado por el hebreo.'
- source_word: אֶל אֲשֶׁר לָעָם
  english_pob_choice: that which is for the people
  chosen_spanish: a lo que es para el pueblo
  alternatives_spanish:
  - a aquello que es para el pueblo
  - al área destinada al pueblo
  lexicon: HALOT
  rationale: 'Sigo la lectura elíptica reconocida por la POB inglesa: el hebreo no nombra explícitamente un sustantivo, así que en español conviene preservar esa indefinición con ''lo que es para el pueblo''. ''Pueblo'' reproduce לָעָם sin convertir la frase en una paráfrasis más concreta de lo que permite el texto.'
theological_decisions:
- issue: Santidad de las vestiduras sacerdotales
  english_pob_reading: The garments are treated as holy because of their use in priestly ministry, requiring separation from the common sphere.
  chosen_spanish_reading: Las vestiduras se consideran santas por haber sido usadas en el ministerio sacerdotal, y por eso deben quedar separadas del ámbito común.
  alternative_spanish_readings:
  - Las vestiduras son sagradas simplemente por estar asociadas al templo.
  - Las vestiduras deben dejarse en un lugar santo por razones puramente rituales.
  rationale: Mantengo explícita la santidad de las vestiduras sin rebajarla a un trámite ceremonial vacío. El versículo establece una separación real entre lo santo y lo común, y el español debe conservar esa tensión.
  doctrine_reference: Santidad cultual y separación entre lo sagrado y lo común en la legislación del templo
- issue: Expresión elíptica final
  english_pob_reading: that which is for the people
  chosen_spanish_reading: a lo que es para el pueblo
  alternative_spanish_readings:
  - al lugar para el pueblo
  - a lo destinado al pueblo
  rationale: La frase hebrea es deliberadamente elíptica; la traducción no debe cerrar indebidamente la ambigüedad. Conservé una formulación abierta que puede abarcar el espacio o la esfera accesible al pueblo, tal como indica la nota inglesa.
  doctrine_reference: Respeto de ambigüedades textuales y prudencia exegética
translation_notes:
  revision_awareness: 'La versión inglesa más reciente ajustó dos puntos: hizo explícito que el referente de «santas» son las vestiduras, y prefirió una fórmula más literal para la expresión final. La redacción española sigue esas decisiones: usa un antecedente claro con «vestiduras» y conserva la apertura de la cláusula final con «lo que es para el pueblo».'
  spanish_consistency_notes:
  - Usé 'atrio exterior' para mantener un término templario reconocible y consistente con el registro bíblico en español.
  - Mantuve 'ministran' y 'ministrar' para reflejar el sentido sacerdotal de servicio cultual sin sustituirlo por un verbo más general.
  - Conservé 'vestiduras' en vez de 'ropa' para sostener la dignidad del contexto sagrado.
  - La expresión final permanece deliberadamente elíptica para no fijar más de lo que el hebreo y la POB inglesa permiten.
