translation:
  language: es
  text: Entonces Moisés subió al monte[a], y la nube cubrió el monte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y Moisés subió al monte». El hebreo permite entender la preposición como «a» o, por el movimiento ascendente, como «al».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעַל
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - ascendió
  - subió hacia arriba
  lexicon: HALOT
  rationale: עלה expresa el movimiento de ir hacia arriba; en español, «subió» es natural, claro y conserva el sentido direccional sin añadir solemnidad innecesaria.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moses
  lexicon: Nombre propio estándar
  rationale: Se mantiene la forma española usual del nombre propio bíblico.
- source_word: אֶל
  english_pob_choice: onto
  chosen_spanish: al
  alternatives_spanish:
  - a
  - hacia
  lexicon: HALOT
  rationale: Con el verbo de ascenso y «el monte», el español «al monte» comunica de modo natural la dirección y el movimiento hacia arriba sin forzar una equivalencia literal rígida.
- source_word: הָהָר
  english_pob_choice: the mountain
  chosen_spanish: el monte
  alternatives_spanish:
  - la montaña
  lexicon: HALOT
  rationale: En contexto bíblico español, «monte» es una opción idiomática y digna para הַר; mantiene el referente geográfico del Sinaí sin sonar moderno en exceso.
- source_word: וַיְכַס
  english_pob_choice: covered
  chosen_spanish: cubrió
  alternatives_spanish:
  - tapó
  - envolvió
  lexicon: HALOT
  rationale: כסה significa «cubrir»; «cubrió» es la correspondencia más directa y transparente en español.
- source_word: הֶעָנָן
  english_pob_choice: the cloud
  chosen_spanish: la nube
  alternatives_spanish:
  - la nube de Yahvé
  - la nube gloriosa
  lexicon: HALOT
  rationale: El hebreo dice simplemente «la nube». Se conserva esa sobriedad sin explicitar en el texto principal que representa la gloria divina.
theological_decisions:
- issue: La identidad de la nube
  english_pob_reading: Render descriptively as 'the cloud' without making explicit that it signifies God's glory in the main text.
  chosen_spanish_reading: Traducir descriptivamente «la nube» sin añadir «de Yahvé» ni «gloriosa» en el texto principal.
  alternative_spanish_readings:
  - la nube de Yahvé cubrió el monte
  - la nube de gloria cubrió el monte
  rationale: El hebreo nombra solo la nube; el contexto amplio sugiere la presencia divina, pero la frase misma no lo explicita. Se preserva esa contención para no resolver una tensión no formulada por el texto.
  doctrine_reference: Principio POB de no importar afirmaciones doctrinales que el texto no enuncia explícitamente; mantener la restricción del texto fuente.
translation_notes:
  revision_awareness: 'La fuente auditada muestra acuerdo alto y no registra revisiones aplicadas; se mantiene la lectura base de la POB en inglés: movimiento ascendente de Moisés y mención sobria de «la nube».'
  spanish_consistency_notes:
  - Se usa «monte» para הַר por naturalidad bíblica en español, coherente con el registro reverente del pasaje.
  - Se evita traducir «cloud» como una perífrasis teológica; la versión principal sigue la restricción del hebreo.
  - El marcador de nota [a] se coloca en el sintagma de dirección para reflejar la alternativa preposicional sin alterar el cuerpo del versículo.
