theological_decisions:
- issue: Referent of the singular pronoun and verbal sequence in a meteorological context
  chosen_reading: The verse describes weather phenomena/clouds under God's sovereign direction.
  alternative_readings:
  - The verse refers more specifically to a cloud mass
  - The verse refers to lightning or storm systems more generally
  rationale: The immediate context in Job 37 discusses clouds, lightning, and storm activity as instruments of divine rule. The translation keeps the referent broad enough to fit the context while not importing a narrower scientific identification than the Hebrew requires.
