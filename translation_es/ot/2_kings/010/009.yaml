translation:
  language: es
  text: 'Y aconteció por la mañana que salió y se puso en pie, y dijo a todo el pueblo[a]: «Ustedes son justos. Miren, yo conspiré contra mi señor y lo maté; pero ¿quién abatió a todos estos?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ustedes son inocentes» / «Ustedes están en lo correcto». El hebreo puede expresar justicia o estar libre de culpa; en este contexto público-judicial, el sentido forense es especialmente relevante.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי בַּבֹּקֶר
  english_pob_choice: And it happened in the morning
  chosen_spanish: Y aconteció por la mañana
  alternatives_spanish:
  - Por la mañana
  - Y sucedió por la mañana
  - Cuando amaneció
  lexicon: HALOT
  rationale: Conserva la fórmula narrativa hebrea וַיְהִי con un verbo de acontecimiento natural en español, sin volverlo innecesariamente pesado.
- source_word: וַיֵּצֵא וַיַּעֲמֹד
  english_pob_choice: he went out and stood
  chosen_spanish: salió y se puso en pie
  alternatives_spanish:
  - salió y estuvo de pie
  - salió y se detuvo
  - salió y tomó posición
  lexicon: HALOT
  rationale: Mantiene la secuencia verbal y el gesto público/formal de presentarse para hablar. 'Se puso en pie' preserva 'stood' con buena naturalidad.
- source_word: כָּל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - todo el pueblo reunido
  - toda la gente
  - la multitud
  lexicon: HALOT
  rationale: '''Pueblo'' refleja el grupo público y colectivo del contexto, y evita una reducción demasiado coloquial.'
- source_word: צַדִּקִים אַתֶּם
  english_pob_choice: You are righteous
  chosen_spanish: Ustedes son justos
  alternatives_spanish:
  - Ustedes son rectos
  - Ustedes tienen la razón
  - Ustedes están en lo justo
  lexicon: HALOT
  rationale: Se conserva la correspondencia léxica con צַדִּקִים en clave forense o de vindicación pública. 'Justos' deja abierta la tensión entre rectitud moral y estar en lo correcto, sin borrar el valor jurídico del contexto.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Miren
  alternatives_spanish:
  - Miren bien
  - Vean
  - He aquí
  lexicon: HALOT
  rationale: Introduce la declaración enfática de manera natural en español moderno, con tono directo y público.
- source_word: קָשַׁרְתִּי עַל
  english_pob_choice: I conspired against
  chosen_spanish: yo conspiré contra
  alternatives_spanish:
  - yo me comploté contra
  - yo tramé contra
  - yo maquiné contra
  lexicon: HALOT
  rationale: '''Conspiré contra'' reproduce bien la fuerza del verbo קשר con עַל y mantiene el sentido de acción hostil planeada.'
- source_word: אֲדֹנִי
  english_pob_choice: my master
  chosen_spanish: mi señor
  alternatives_spanish:
  - mi amo
  - mi dueño
  - mi señor y amo
  lexicon: HALOT
  rationale: En este contexto político y de subordinación humana, 'mi señor' es el equivalente natural y evita confusión con el título divino.
- source_word: וָאֶהְרְגֵהוּ
  english_pob_choice: and killed him
  chosen_spanish: lo maté
  alternatives_spanish:
  - lo asesiné
  - lo maté a él
  - lo di muerte
  lexicon: HALOT
  rationale: Verbo directo y claro para הרג con sufijo; mantiene la tersura del discurso en español sin añadir énfasis innecesario.
- source_word: וּמִי הִכָּה
  english_pob_choice: but who struck down
  chosen_spanish: ¿pero quién derribó?
  alternatives_spanish:
  - ¿pero quién golpeó?
  - ¿y quién mató?
  - ¿pero quién abatió?
  lexicon: HALOT
  rationale: '''Derribó'' comunica el golpe letal de נכה en un contexto de violencia mortal y permite una formulación española natural. La pregunta retórica contrasta mi acto individual con la acción de otro(s) sobre ''todos estos''.'
- source_word: כָּל אֵלֶּה
  english_pob_choice: all these
  chosen_spanish: a todos estos
  alternatives_spanish:
  - a todos هؤلاء
  - a estos todos
  - a todos los demás
  lexicon: HALOT
  rationale: Conserva la deixis inmediata del hebreo y el contraste retórico con 'yo' frente a 'todos estos'.
theological_decisions:
- issue: 'צַדִּקִים אַתֶּם: justicia/vindicación pública frente a juicio moral absoluto'
  english_pob_reading: You are righteous
  chosen_spanish_reading: Ustedes son justos
  alternative_spanish_readings:
  - Ustedes tienen la razón
  - Ustedes son inocentes
  - Ustedes están en lo justo
  rationale: El contexto es una defensa pública/forense de Jehú. 'Justos' conserva la ambigüedad útil entre rectitud y estar libre de culpa, sin imponer una sola matización que el hebreo permite.
  doctrine_reference: Forensic vindication / legal innocence and righteousness language in Hebrew narrative
translation_notes:
  revision_awareness: El inglés POB pasó de 'innocent' a 'righteous' para ajustarse más a צַדִּקִים. La versión española sigue esa revisión y evita 'inocentes' como principal, pero conserva en nota la alternativa de estar libre de culpa porque la ambigüedad forense del hebreo sigue siendo real.
  spanish_consistency_notes:
  - Se usó 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió 'mi señor' para אֲדֹנִי porque el referente es humano y político, no divino.
  - Se mantuvo un registro bíblico sobrio, moderno y legible, sin arcaísmos innecesarios.
