review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura general del hebreo: imagen de la espada, acusación de abominaciones, valor distributivo de אִישׁ y cierre como pregunta retórica sobre poseer la tierra. Sin embargo, el verbo טִמֵּאתֶם (‘han contaminado/han hecho impura’, ‘han profanado/han mancillado’) no queda fielmente representado por «deshonra», que desplaza el énfasis desde impureza/contaminación moral a mera afrenta social. También «Se mantienen sobre su espada» suena menos natural en español que una formulación más directa que conserve la literalidad documentada.'
  spanish_quality_summary: El español es generalmente claro, pero «Se mantienen sobre su espada» resulta algo rígido y poco idiomático. Además, la puntuación con coma antes de «y cada uno» es aceptable pero menos fluida que una coordinación simple. «Deshonra» lee con naturalidad, pero precisamente por eso reduce la fuerza léxica del original. Una revisión menor puede mejorar fidelidad y legibilidad sin perder el tono digno.
  glossary_alignment: No hay conflicto con los términos teológicos globales del proyecto. La principal cuestión léxica es טמא, que debe reflejar mejor ‘contaminar/impurificar/ mancillar/ profanar’ que «deshonrar». «Prójimo» y «tierra» están bien alineados. La nota sobre «heredarán» como alternativa para תִּירָשׁוּ también está bien.
  issues:
  - severity: medium
    issue: «deshonra» para טִמֵּאתֶם
    rationale: טמא en Piel expresa hacer impuro/contaminar/defilar. «Deshonra» atenúa y redefine el campo semántico hacia vergüenza social, perdiendo la noción de impureza moral/ritual que el hebreo y el audit trail quieren preservar.
  - severity: low
    issue: «Se mantienen sobre su espada» suena forzado en español
    rationale: Aunque intenta preservar la literalidad, la frase no suena natural ni especialmente clara. «Están sobre su espada» conserva mejor la literalidad del inglés auditado («stand on your sword») y permite que la nota explique el sentido idiomático.
  - severity: low
    issue: Concordancia de registro en la frase distributiva
    rationale: «y cada uno deshonra...» además del problema léxico, queda mejor como «y cada uno contamina a la esposa de su prójimo», preservando el distributivo y la fuerza acusatoria del original.
  revised_spanish_text: Están sobre su espada[a], cometen abominaciones y cada uno contamina a la esposa de su prójimo; ¿poseerán entonces la tierra?[b]
