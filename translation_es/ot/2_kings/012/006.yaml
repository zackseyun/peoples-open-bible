    text: Or 'from his acquaintance.' The Hebrew term can refer more literally to someone known to him, but in this collection context it likely means the person from whom each priest received contributions.
    reason: lexical_alternative
  - marker: b
    text: '''The house'' here refers to the temple.'
    reason: cultural_note
