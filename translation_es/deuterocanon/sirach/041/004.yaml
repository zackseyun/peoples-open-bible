revisions:
- from: Este es el [a] lote de toda carne de parte de Dios, ¿y por qué rechazar el decreto[b] del Altísimo? Sea por diez, o por cien, o por mil años[c], no hay en Sheol reprensión de vida[d].
  to: Esta es la porción de toda carne de parte de Dios[a], ¿y por qué rechazar el decreto[b] del Altísimo? Sea por diez, o por cien, o por mil años[c], no hay en Sheol reproche de vida[d].
  rationale: 'Se hace una reparación menor: «porción» mejora la naturalidad y sigue siendo auditable para חלק; se mueve [a] para anclar la nota donde corresponde; y «reproche de vida» representa mejor el sintagma difícil que «reprensión de vida» sin suavizarlo excesivamente. No hace falta adjudicación adicional.'
  reviewer_model: gpt-5.4
