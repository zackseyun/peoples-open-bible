translation:
  language: es
  text: Y junto al límite de Manasés, desde el lado oriental hasta el lado occidental, Efraín[a], una porción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «Efraín, uno»; en el contexto, la idea es «Efraín, una porción».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל
  english_pob_choice: And along
  chosen_spanish: Y junto al
  alternatives_spanish:
  - Y al lado de
  - Y a lo largo de
  lexicon: HALOT
  rationale: La preposición con la conjunción introduce otra asignación tribal en secuencia. «Junto al» conserva la relación espacial de la fórmula sin sonar forzado en español.
- source_word: גְּבוּל
  english_pob_choice: border
  chosen_spanish: límite
  alternatives_spanish:
  - frontera
  - borde
  lexicon: HALOT
  rationale: En este contexto de repartición territorial, גְּבוּל se refiere al contorno o límite de la heredad. «Límite» es natural en español y mantiene el sentido topográfico-jurídico.
- source_word: מְנַשֶּׁה
  english_pob_choice: Manasseh
  chosen_spanish: Manasés
  alternatives_spanish:
  - Manasés
  lexicon: transliteration
  rationale: Nombre tribal propio en forma estándar para español bíblico.
- source_word: מִפְּאַת קָדִימָה
  english_pob_choice: from the east side
  chosen_spanish: desde el lado oriental
  alternatives_spanish:
  - desde el extremo oriental
  - desde la parte oriental
  lexicon: HALOT
  rationale: פֵּאָה señala un lado, borde o extremo. Con קָדִימָה, el giro marca el punto oriental del territorio. «Lado oriental» es claro y fiel.
- source_word: עַד פְּאַת יָמָּה
  english_pob_choice: to the west side
  chosen_spanish: hasta el lado occidental
  alternatives_spanish:
  - hasta el extremo occidental
  - hasta la parte occidental
  lexicon: HALOT
  rationale: El paralelismo con la expresión anterior pide una traducción simétrica. Aunque יָמָּה alude literalmente a dirección hacia el mar, aquí funciona como orientación geográfica occidental.
- source_word: אֶפְרַיִם
  english_pob_choice: Ephraim
  chosen_spanish: Efraín
  alternatives_spanish:
  - Efraín
  lexicon: transliteration
  rationale: Nombre tribal propio en forma estándar para español bíblico.
- source_word: אֶחָד
  english_pob_choice: one portion
  chosen_spanish: una porción
  alternatives_spanish:
  - una
  - una sola porción
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «uno», en esta fórmula de repartición el sentido contextual es «una porción». En español conviene explicitar el sustantivo implícito para no perder la unidad de la asignación.
translation_notes:
  revision_awareness: El texto español sigue de cerca el patrón distributivo de Ezequiel 48 y mantiene la decisión auditada de explicitar el sustantivo implícito en אֶחָד como «porción», sin añadir contenido nuevo. No hay revisiones aplicadas en el tramo fuente, y el acuerdo de revisión fue alto.
  spanish_consistency_notes:
  - Se mantuvo «Y» inicial para conservar la continuidad con la serie de reparticiones tribales.
  - Se usó «lado oriental/occidental» para reflejar la fórmula espacial repetida del capítulo.
  - Se eligió «Manasés» y «Efraín» como transliteraciones bíblicas habituales en español.
  - La nota al pie preserva la tensión lexical entre el hebreo literal y el sentido contextual de la cláusula final.
