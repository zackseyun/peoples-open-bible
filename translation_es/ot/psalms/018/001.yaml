translation:
  language: es
  text: Para el director del coro. De David, el siervo[a] de Yahvé, que habló a Yahvé las palabras de este cántico, en el día en que Yahvé lo rescató de la mano[b] de todos sus enemigos y de la mano de Saúl.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''el esclavo de Yahvé''. El término hebreo puede denotar siervo o esclavo; aquí se traduce ''siervo'' porque la superscripción lo usa como título honorífico para David.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''de la mano de''; expresión idiomática para liberación del poder o control de alguien.'
    reason: cultural_note
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Para el director del coro
  alternatives_spanish:
  - Al director del coro
  - Para el maestro de coro
  lexicon: HALOT
  rationale: En un encabezado de salmo, la expresión apunta a la función musical/litúrgica del responsable de la ejecución. 'Director del coro' comunica la función con naturalidad en español y evita una calca menos clara.
- source_word: לְעֶבֶד
  english_pob_choice: the servant of
  chosen_spanish: el siervo de
  alternatives_spanish:
  - el esclavo de
  lexicon: HALOT
  rationale: Aunque el término hebreo puede significar 'esclavo', aquí funciona como título honorífico en la superscripción. 'Siervo' preserva el registro reverente que el contexto requiere en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se sigue el término de proyecto para el Tetragrámaton. 'Yahvé' mantiene el nombre personal divino en una forma estable y readable para el español bíblico.
- source_word: לְדָוִד
  english_pob_choice: Of David
  chosen_spanish: De David
  alternatives_spanish:
  - Para David
  - Perteneciente a David
  lexicon: HALOT
  rationale: En los títulos de salmos, la preposición puede señalar asociación, atribución o dedicación. 'De David' es la fórmula española más sobria y fiel sin sobreespecificar.
- source_word: אֲשֶׁר דִּבֶּר לַיהוָה
  english_pob_choice: who spoke to Yahweh
  chosen_spanish: que habló a Yahvé
  alternatives_spanish:
  - que le habló a Yahvé
  - que dirigió a Yahvé
  lexicon: HALOT
  rationale: La cláusula relativa indica discurso dirigido a Dios. 'Habló a Yahvé' conserva la relación directa y no añade matices no presentes en el hebreo.
- source_word: אֶת דִּבְרֵי הַשִּׁירָה הַזֹּאת
  english_pob_choice: the words of this song
  chosen_spanish: las palabras de este cántico
  alternatives_spanish:
  - las palabras de esta canción
  - las palabras de este poema
  lexicon: HALOT
  rationale: '''שִׁירָה'' admite ''cántico'' además de ''canción''; aquí ''cántico'' da un tono litúrgico y digno acorde con el género de un salmo, sin perder claridad.'
- source_word: בְּיוֹם
  english_pob_choice: on the day when
  chosen_spanish: el día en que
  alternatives_spanish:
  - en el día en que
  - cuando
  lexicon: HALOT
  rationale: La construcción temporal se reproduce de manera natural en español y mantiene el enlace con el evento de liberación.
- source_word: הִצִּיל
  english_pob_choice: rescued
  chosen_spanish: rescató
  alternatives_spanish:
  - liberó
  - salvó
  lexicon: HALOT
  rationale: El verbo expresa liberación de peligro concreto. 'Rescató' conserva la idea de sacar a alguien de una situación amenazante sin cargar inmediatamente con el sentido soteriológico general de 'salvó'.
- source_word: מִכַּף
  english_pob_choice: from the hand of
  chosen_spanish: de la mano de
  alternatives_spanish:
  - del poder de
  - del alcance de
  lexicon: HALOT
  rationale: Se mantiene la metáfora corporal hebrea, que en español es comprensible y reproduce la imagen de control/poder del original.
- source_word: כָּל אֹיְבָיו
  english_pob_choice: all his enemies
  chosen_spanish: todos sus enemigos
  alternatives_spanish:
  - cada uno de sus enemigos
  lexicon: HALOT
  rationale: Traducción directa y natural del plural colectivo; 'todos' transmite la totalidad sin excesiva rigidez.
- source_word: וּמִיַּד שָׁאוּל
  english_pob_choice: and from the hand of Saul
  chosen_spanish: y de la mano de Saúl
  alternatives_spanish:
  - y del poder de Saúl
  lexicon: HALOT
  rationale: Se conserva el paralelismo con la frase anterior y la misma metáfora de 'mano' como poder o control.
theological_decisions:
- issue: Divine name rendering of יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo contiene directamente el Tetragrámaton. En español, el nombre divino se rinde conforme al estándar del proyecto como 'Yahvé', preservando el nombre personal de Dios y evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Rendering of עֶבֶד in a psalm superscription
  english_pob_reading: servant
  chosen_spanish_reading: siervo
  alternative_spanish_readings:
  - esclavo
  rationale: En esta superscripción, עֶבֶד funciona como designación honorífica de David en relación con Yahvé. 'Siervo' respeta el tono reverente en español, mientras que 'esclavo' resaltaría un matiz de servidumbre no enfatizado aquí.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms analogy under δοῦλος
- issue: The idiom מִכַּף / מִיַּד as a deliverance formula
  english_pob_reading: from the hand of
  chosen_spanish_reading: de la mano de
  alternative_spanish_readings:
  - del poder de
  - del dominio de
  rationale: Se conserva la metáfora hebrea de la mano como poder o control. Mantenerla en español evita perder la imagen idiomática y se alinea con la lectura auditada del inglés POB.
  doctrine_reference: POB audit trail lexical note on idiom
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios; este borrador conserva esa lectura alta de acuerdo y sigue el rastro auditado en inglés sin introducir nuevas tensiones textuales.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה.
  - Se mantiene 'de la mano de' para reproducir la metáfora hebrea de poder/control.
  - '''Siervo'' se reserva aquí por el valor honorífico del encabezado, no como sustituto general de términos de esclavitud en otros contextos.'
