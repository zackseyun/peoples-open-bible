translation:
  language: es
  text: Cuando muere un hombre malvado, perece su esperanza, y la expectativa de riqueza[a] queda en nada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «la expectativa de los fuertes». El hebreo אוֹנִים es difícil y puede referirse a riqueza, fuerza o a los fuertes.
    reason: alternative_reading
lexical_decisions:
- source_word: בְּמוֹת
  english_pob_choice: When ... dies
  chosen_spanish: Cuando muere
  alternatives_spanish:
  - Al morir
  - A la muerte de
  lexicon: HALOT
  rationale: El infinitivo constructo con ב expresa tiempo. En español, «Cuando muere» reproduce con naturalidad la cláusula temporal sin perder el valor temporal del hebreo.
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - la humanidad
  lexicon: HALOT
  rationale: Aquí אָדָם señala a un individuo en estilo sapiencial, no a la humanidad en general. «Un hombre» mantiene el referente masculino-genérico del texto fuente.
- source_word: רָשָׁע
  english_pob_choice: wicked
  chosen_spanish: malvado
  alternatives_spanish:
  - impío
  - culpable
  - malo
  lexicon: HALOT
  rationale: En Proverbios, רָשָׁע designa al moralmente malo en contraste con el justo. «Malvado» comunica bien esa categoría en español sin suavizarla.
- source_word: תֹּאבַד
  english_pob_choice: perishes
  chosen_spanish: perece
  alternatives_spanish:
  - se pierde
  - desaparece
  - muere
  lexicon: HALOT
  rationale: De אבד, indica ruina o desaparición. «Perece» conserva el tono proverbial y la gravedad del contraste moral.
- source_word: תִּקְוָה
  english_pob_choice: hope
  chosen_spanish: esperanza
  alternatives_spanish:
  - expectativa
  - confianza
  lexicon: HALOT
  rationale: תִּקְוָה es de manera directa «esperanza». El español «esperanza» mantiene el sentido básico y la fuerza de la pérdida que afirma el verso.
- source_word: וְתוֹחֶלֶת
  english_pob_choice: and the expectation
  chosen_spanish: y la expectativa
  alternatives_spanish:
  - y la esperanza
  - y la ilusión
  lexicon: HALOT
  rationale: תוֹחֶלֶת se solapa con תִּקְוָה, pero conserva un matiz propio. «Expectativa» ayuda a no aplanar el paralelismo, tal como hace la lectura inglesa.
- source_word: אוֹנִים
  english_pob_choice: wealth
  chosen_spanish: riqueza
  alternatives_spanish:
  - bienes
  - fortuna
  - fuerza
  lexicon: HALOT
  rationale: Siguiendo la revisión más reciente del POB inglés, aquí אוֹנִים se entiende como recursos o riquezas. «Riqueza» es natural en español y preserva esa interpretación económica.
- source_word: אָבָדָה
  english_pob_choice: comes to nothing
  chosen_spanish: se desvanece
  alternatives_spanish:
  - se pierde
  - perece
  - llega a nada
  lexicon: HALOT
  rationale: De אבד, expresa desaparición o ruina. «Se desvanece» evita repetir literalmente «perece» en la segunda cola y comunica la disolución de la expectativa.
theological_decisions:
- issue: Valor masculino-genérico de אָדָם
  english_pob_reading: man
  chosen_spanish_reading: un hombre
  alternative_spanish_readings:
  - una persona
  - humanidad
  rationale: El proverbio presenta una figura representativa individual, no una referencia colectiva. Mantener «un hombre» sigue la lectura del POB inglés y evita neutralizar indebidamente el referente del hebreo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Sentido de אוֹנִים
  english_pob_reading: wealth
  chosen_spanish_reading: riqueza
  alternative_spanish_readings:
  - fuerza
  - los fuertes
  rationale: La tradición inglesa del POB registró una revisión hacia «wealth» para esta expresión difícil. En español, «riqueza» preserva esa decisión auditada y encaja con la lectura de expectativas materiales que se frustran al morir.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 5
translation_notes:
  revision_awareness: He seguido la revisión inglesa más reciente que cambió la segunda cola de «strength» a «wealth» para אוֹנִים, y por eso la versión española adopta «riqueza». También conservo la nota de ambigüedad del hebreo para reflejar que el término sigue siendo discutido. La cláusula temporal inicial y el paralelismo se mantienen de forma transparente.
  spanish_consistency_notes:
  - Usé «Yahvé» no corresponde en este proverbio porque el texto no contiene el nombre divino.
  - Mantuve «esperanza» para תִּקְוָה y «expectativa» para תוֹחֶלֶת para conservar el paralelismo sin repetir exactamente la misma palabra.
  - Evité «impío» como opción por ser más eclesiástico y menos directo que «malvado» en este contexto sapiencial.
