translation:
  language: es
  text: Y puso su temor sobre toda carne[a], y para dominar a las bestias y a las aves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sobre cada ser viviente». La expresión griega dice literalmente «sobre toda carne», un modismo que abarca a los seres vivientes en general.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔθηκεν
  english_pob_choice: placed
  chosen_spanish: puso
  alternatives_spanish:
  - colocó
  - puso
  lexicon: LSJ
  rationale: τίθημι admite una traducción directa y concreta; en español, «puso» reproduce bien el acto de establecer o asignar algo sin añadir explicación.
- source_word: φόβον
  english_pob_choice: fear
  chosen_spanish: temor
  alternatives_spanish:
  - miedo
  - terror
  lexicon: LSJ
  rationale: En este contexto, φόβος es el temor inspirado en las criaturas hacia el ser humano; «temor» suena más bíblico y menos psicológico que «miedo», sin intensificarlo como «terror».
- source_word: αὐτοῦ
  english_pob_choice: his
  chosen_spanish: su
  alternatives_spanish:
  - de él
  - su
  lexicon: LSJ
  rationale: El griego usa un posesivo singular masculino; en español, «su» conserva la referencia singular sin forzar una repetición.
- source_word: ἐπὶ πάσης σαρκός
  english_pob_choice: upon all flesh
  chosen_spanish: sobre toda carne
  alternatives_spanish:
  - sobre todo ser viviente
  - sobre toda criatura
  lexicon: LSJ
  rationale: Se conserva la expresión bíblica «toda carne» para reflejar la idiomática griega y mantener el matiz colectivo de seres vivientes, sin sustituirla por una paráfrasis interpretativa.
- source_word: κατακυριεύειν
  english_pob_choice: to rule over
  chosen_spanish: para dominar sobre
  alternatives_spanish:
  - para reinar sobre
  - para gobernar sobre
  lexicon: LSJ
  rationale: El infinitivo expresa finalidad o ámbito de dominio; «para dominar sobre» comunica la fuerza de κατακυριεύειν mejor que un simple «gobernar», y evita agregar un sujeto u objeto no presente.
- source_word: θηρίων
  english_pob_choice: beasts
  chosen_spanish: bestias
  alternatives_spanish:
  - animales salvajes
  - animales
  lexicon: LSJ
  rationale: «Bestias» mantiene el tono bíblico y corresponde bien a θηρία como animales salvajes.
- source_word: πετεινῶν
  english_pob_choice: birds
  chosen_spanish: aves
  alternatives_spanish:
  - aves
  - pájaros
  lexicon: LSJ
  rationale: «Aves» es un equivalente natural y sobrio de πετεινά en español bíblico contemporáneo; «pájaros» sería más coloquial.
theological_decisions:
- issue: σάρξ como idiomática colectiva
  english_pob_reading: Translate as 'flesh' in the phrase 'all flesh.'
  chosen_spanish_reading: Traducir como «toda carne»
  alternative_spanish_readings:
  - todos los seres vivientes
  - toda criatura
  rationale: La frase es idiomática y colectiva, no moral ni metafórica. «Toda carne» conserva la textura del original y la tensión bíblica de la expresión.
  doctrine_reference: 'DOCTRINE.md Contested terms: σάρξ'
- issue: Sujeto humano singular representativo
  english_pob_reading: Retain singular 'his' and 'him' for the human being as representative man.
  chosen_spanish_reading: Mantener el posesivo singular «su»
  alternative_spanish_readings:
  - sus
  - de ellos
  rationale: El griego conserva un singular representativo; el español puede reflejarlo sin convertirlo en plural genérico.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: La revisión inglesa reciente sustituyó una formulación más interpretativa por una más cercana al infinitivo griego κατακυριεύειν. La versión española sigue esa preferencia de cercanía al source text al usar una construcción final con «para dominar sobre», sin introducir un objeto explícito que el griego no tiene.
  spanish_consistency_notes:
  - Se mantiene «carne» en lugar de una paráfrasis como «seres vivientes», para conservar la expresión idiomática del original.
  - «Bestias» y «aves» siguen el registro bíblico sobrio del pasaje.
  - No se usa «SEÑOR» ni equivalentes de sustitución, porque el texto aquí no contiene el Tetragrámaton ni κύριος.
