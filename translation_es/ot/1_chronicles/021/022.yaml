base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/021/022.yaml
  text: Then David said to Ornan[a], “Give me the site of the threshing floor, so that I may build on it an altar to Yahweh. Give it to me for the full price[b], so that the plague may be stopped from upon the people.”
  footnotes:
  - marker: a
    text: Or, more literally, “for full silver,” that is, for the full amount rather than as a gift.
    reason: lexical_alternative
  - marker: b
    text: Or, “so that the plague may be stopped from the people.” The Hebrew reads more literally, “from upon the people.”
    reason: lexical_alternative
