review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue la estructura básica del hebreo, pero pierde dos matices importantes: מִסְפָּר se acerca más a «número» que a «cantidad», y el sufijo plural en כְּמִסְפָּרָם debe reflejarse como «su número»/«el número de ellos», no singularizarse conceptualmente como «su cantidad». Además, el inglés POB documenta «prepare» como aclaración contextual; en español puede conservarse «hacer» si se mantiene la nota, pero conviene una formulación más natural y fiel al valor distributivo.'
  spanish_quality_summary: «Según la cantidad que hagáis, así haréis por cada uno según su cantidad» suena algo rígido y poco natural en español. «Por cada uno» es posible, pero «para cada uno» encaja mejor con לָאֶחָד en esta instrucción. También conviene anclar la nota en el primer verbo, donde surge la decisión léxica. La redacción revisada mejora claridad y fluidez sin apartarse del original.
  glossary_alignment: No hay términos teológicos sensibles en este versículo. La principal cuestión léxica es mantener el campo semántico de עשה y de מִסְפָּר. La revisión usa «número» para alinearse mejor con el hebreo y conserva «harán» con nota para respetar la amplitud de עשה en contexto sacrificial.
  issues:
  - severity: medium
    issue: «cantidad» debilita el valor léxico de מִסְפָּר
    rationale: El hebreo dice «número/conteo», no meramente «cantidad» en sentido general. En un texto procedimental, «número» preserva mejor la correspondencia formal del original y del English POB.
  - severity: medium
    issue: «según su cantidad» no refleja bien el sufijo plural de כְּמִסְפָּרָם
    rationale: La frase final apunta a «según su número»/«conforme al número de ellos». «Su cantidad» introduce una abstracción menos precisa y desdibuja el vínculo con el conteo.
  - severity: low
    issue: «por cada uno» es menos natural que «para cada uno» en este contexto
    rationale: Con לְ más «uno», la instrucción distributiva en español suena más idiomática con «para cada uno», especialmente en un contexto de preparación/ofrendas.
  - severity: low
    issue: La nota léxica está bien en contenido, pero la formulación principal puede leerse demasiado genérica
    rationale: Mantener «hacer» es defendible, pero conviene una sintaxis más clara y una redacción de nota que explique la alternativa «preparar» de forma más directa.
  revised_spanish_text: Según el número que harán[a], así harán para cada uno según su número.
