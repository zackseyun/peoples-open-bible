translation:
  language: es
  text: Israel vio la gran mano[a] que Yahvé había hecho contra Egipto, y el pueblo temió a Yahvé[b], y creyó en Yahvé y en Moisés su siervo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘la mano poderosa’ o ‘la gran fuerza’. El hebreo dice literalmente ‘la gran mano’, una imagen común del poder.
    reason: lexical_alternative
  - marker: b
    text: O ‘que Yahvé había hecho en Egipto’ o ‘a Egipto’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - miró
  - observó
  - percibió
  lexicon: HALOT
  rationale: El verbo de percepción visual se rinde de forma directa con 'vio', que conserva la sencillez narrativa del hebreo y el valor de percepción inmediata.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: El singular colectivo hebreo se mantiene como 'Israel', como entidad narrativa colectiva, en paralelo con 'el pueblo' más adelante.
- source_word: הַיָּד הַגְּדֹלָה
  english_pob_choice: the great hand
  chosen_spanish: la gran mano
  alternatives_spanish:
  - la mano poderosa
  - la gran fuerza
  - la mano fuerte
  lexicon: HALOT
  rationale: Se conserva la imagen corporal 'mano' para no perder el motivo recurrente de Éxodo sobre la acción poderosa de Yahvé. 'Gran' reproduce con más fidelidad גָּדוֹל que 'poderosa' o 'fuerte'.
- source_word: אֲשֶׁר עָשָׂה יְהוָה בְּמִצְרַיִם
  english_pob_choice: that Yahweh had done against Egypt
  chosen_spanish: que Yahvé había hecho contra Egipto
  alternatives_spanish:
  - que Yahvé había hecho en Egipto
  - que Yahvé había hecho a Egipto
  lexicon: HALOT
  rationale: '''Contra Egipto'' expresa con claridad el valor hostil del contexto exódico, sin abandonar el verbo literal ''hecho''. La alternativa ''en Egipto'' es más literal, pero menos explícita en español.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se conserva el nombre propio divino en la forma establecida por el proyecto: ''Yahvé'', en lugar de la sustitución tradicional por un título.'
- source_word: וַיִּירְאוּ
  english_pob_choice: feared
  chosen_spanish: temió
  alternatives_spanish:
  - tuvo reverencia
  - se llenó de temor
  - sintió temor reverente
  lexicon: HALOT
  rationale: El hebreo ירא lleva el sentido básico de 'temer'. En español, 'temió' conserva la fuerza léxica y deja implícitas la reverencia y el asombro que el contexto puede sugerir.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - los israelitas
  lexicon: HALOT
  rationale: Se mantiene el sustantivo colectivo explícito del hebreo. 'El pueblo' funciona de manera natural en español y evita sobredeterminar el referente.
- source_word: וַיַּאֲמִינוּ
  english_pob_choice: they believed
  chosen_spanish: creyeron
  alternatives_spanish:
  - confiaron
  - pusieron su fe
  lexicon: HALOT
  rationale: '''Creyeron'' traduce con precisión el valor de אמן en esta construcción y mantiene el paralelo con la confianza dirigida a Yahvé y a Moisés.'
- source_word: בַּיהוָה
  english_pob_choice: in Yahweh
  chosen_spanish: en Yahvé
  alternatives_spanish:
  - en el SEÑOR
  - en Jehová
  lexicon: HALOT
  rationale: La preposición con אמן se rinde naturalmente como 'en', conservando la idea de confianza dirigida a la persona de Yahvé.
- source_word: וּבְמֹשֶׁה עַבְדּוֹ
  english_pob_choice: and in Moses his servant
  chosen_spanish: y en Moisés, su siervo
  alternatives_spanish:
  - y en Moisés, su servidor
  - y en Moisés, el siervo de Yahvé
  lexicon: HALOT
  rationale: '''Siervo'' preserva la relación de subordinación del hebreo עבד sin debilitarla con ''servidor''. El posesivo ''su'' se entiende naturalmente referido a Yahvé por el antecedente inmediato.'
theological_decisions:
- issue: Relación entre creer en Yahvé y creer en Moisés
  english_pob_reading: They believed in Yahweh and in Moses his servant/authorized agent.
  chosen_spanish_reading: Creyeron en Yahvé y en Moisés como su siervo autorizado, sin poner a Moisés al nivel de Yahvé.
  alternative_spanish_readings:
  - Confiaron en Yahvé y también en Moisés personalmente.
  - Creyeron al mismo tiempo en Yahvé y en Moisés.
  rationale: La construcción hebrea dirige la fe/confianza tanto a Yahvé como a Moisés, pero el posesivo 'su siervo' aclara que Moisés ocupa una función subordinada. La formulación española conserva esa tensión sin igualar a ambos.
  doctrine_reference: Translation philosophy §3; Affirmations (avoid importing claims beyond the text)
translation_notes:
  revision_awareness: Se tuvo en cuenta la última revisión inglesa que prefirió 'had done against Egypt' sobre 'had used against Egypt' para reflejar con más precisión el verbo hebreo עָשָׂה. La traducción española sigue ese ajuste con 'había hecho', y adopta 'contra Egipto' para explicitar la direccionalidad contextual que el inglés auditado también admitía como alternativa.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma estándar del nombre divino, conforme al proyecto.
  - Se conserva la imagen de 'mano' para sostener el motivo exódico de la acción poderosa de Yahvé.
  - '''Siervo'' se usa de manera consistente para עבד cuando el contexto señala subordinación personal a Yahvé.'
  - La puntuación y el orden español buscan ser naturales sin añadir elementos ausentes del hebreo.
