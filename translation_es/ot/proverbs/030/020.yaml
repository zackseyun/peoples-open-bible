    rationale: Las notas [a] y [b] aparecen al final de la oración citada, pero la nota cultural corresponde a la imagen de comer/limpiarse la boca o a la introducción del dicho, y la nota léxica corresponde específicamente a «No he hecho…». La instrucción exige que cada marcador aparezca exactamente en la palabra o frase pertinente.
  - severity: low
    issue: «No he hecho mal» suena algo menos idiomático y exhaustivo en español
    rationale: Aunque fiel, puede oírse levemente abrupto. «No he hecho nada malo» comunica de forma más natural la negación de culpa en español contemporáneo, mientras la nota puede preservar «No he cometido maldad» / «No he hecho iniquidad» como alternativas más literales.
