translation:
  language: es
  text: Y capturó a Agag, rey de Amalec, vivo, y consagró[a] a todo el pueblo a destrucción con el filo de la espada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «destruyó por completo a todo el pueblo»; el verbo hebreo se refiere a consagrar algo a destrucción bajo el anatema.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְפֹּשׂ
  english_pob_choice: captured
  chosen_spanish: capturó
  alternatives_spanish:
  - se apoderó de
  - tomó prisionero a
  lexicon: HALOT
  rationale: El verbo indica asir, tomar o capturar; en contexto militar, "capturó" comunica con naturalidad el acto de apresar a Agag sin perder el valor semántico básico.
- source_word: אֲגַג
  english_pob_choice: Agag
  chosen_spanish: Agag
  alternatives_spanish:
  - Agág
  lexicon: Transliteración propia del nombre
  rationale: Se conserva el nombre propio en forma breve y reconocible. "Agag" sigue la práctica del POB en inglés y funciona bien en español bíblico moderno.
- source_word: מֶלֶךְ עֲמָלֵק
  english_pob_choice: king of Amalek
  chosen_spanish: rey de Amalec
  alternatives_spanish:
  - el rey amalecita
  - rey de los amalecitas
  lexicon: HALOT
  rationale: La cadena constructa se vierte de manera directa como relación de posesión/título. "Amalec" mantiene el nombre propio del pueblo; "amalecita" sería más interpretativo.
- source_word: חָי
  english_pob_choice: alive
  chosen_spanish: vivo
  alternatives_spanish:
  - con vida
  - vivo y
  lexicon: HALOT
  rationale: Es adjetivo predicativo que indica que Agag fue tomado con vida. "Vivo" es la forma más natural y directa en español.
- source_word: כָּל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - toda la gente
  - todos los habitantes
  lexicon: HALOT
  rationale: En este contexto bélico, "pueblo" conserva la amplitud del hebreo עָם sin restringirlo a tropas o población civil. "Todo" mantiene el alcance total.
- source_word: הֶחֱרִים
  english_pob_choice: devoted ... to destruction
  chosen_spanish: dedicó a destrucción
  alternatives_spanish:
  - consagró a destrucción
  - puso bajo anatema
  - destruyó por completo
  lexicon: HALOT
  rationale: Se preserva la fuerza técnica de חֵרֶם/החרים como acto de consagrar algo a destrucción bajo juicio. "Dedicó a destrucción" refleja esa tensión mejor que una simple paráfrasis como "destruyó por completo".
- source_word: לְפִי חָרֶב
  english_pob_choice: with the edge of the sword
  chosen_spanish: con el filo de la espada
  alternatives_spanish:
  - a filo de espada
  - con la boca de la espada
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática; "con el filo de la espada" transmite el sentido tradicional y mantiene la imagen concreta sin sonoridad extraña.
theological_decisions:
- issue: Lenguaje de חרם en la guerra santa
  english_pob_reading: devoted all the people to destruction
  chosen_spanish_reading: dedicó a destrucción a todo el pueblo
  alternative_spanish_readings:
  - destruyó por completo a todo el pueblo
  - puso a todo el pueblo bajo el anatema
  rationale: La traducción conserva la carga teológica y ritual de החרים como acto de entrega a destrucción bajo juicio divino. Se evita reducirlo a un simple dato militar o suavizarlo con una expresión menos transparente.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y coincide con el sentido aprobado en el audit trail inglés: captura viva de Agag, relación constructa ''rey de Amalec'', y el verbo técnico הֶחֱרִים rendido con un equivalente transparente que preserve el peso de חרם. No se introdujeron revisiones adicionales.'
  spanish_consistency_notes:
  - Se mantiene "Amalec" como nombre propio del pueblo/territorio, en paralelo con el inglés "Amalek".
  - '"Dedicó a destrucción" preserva la tensión lexical de חרם sin sustituirla por una equivalencia eclesiástica tradicional no documentada.'
  - '"Con el filo de la espada" sigue el idiomatismo bíblico y es estilísticamente natural en español.'
  - La nota al pie se ancla en "vivo[a]" porque la ambigüedad relevante es la posibilidad de expresar el adverbio como "tomó vivo".
