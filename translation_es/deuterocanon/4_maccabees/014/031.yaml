translation:
  language: es
  text: Pero la madre exhortaba a cada hijo, uno por uno[a], y a todos juntos, hacia la muerte por causa de la piedad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cada uno por separado».
    reason: lexical_alternative
  - marker: b
    text: O «por piedad». El término griego denota devoción reverente y fiel hacia Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ καὶ
  english_pob_choice: But
  chosen_spanish: Pero también
  alternatives_spanish:
  - Pero
  - Y también
  - Mas también
  lexicon: LSJ
  rationale: El giro introduce continuidad con énfasis y leve contraste. «Pero también» reproduce bien ese avance discursivo en español natural sin endurecer el tono.
- source_word: καθʼ ἕνα
  english_pob_choice: each ... individually
  chosen_spanish: a cada hijo, uno por uno
  alternatives_spanish:
  - cada uno por separado
  - uno por uno
  - a cada uno individualmente
  lexicon: LSJ
  rationale: La expresión griega es distributiva. En el contexto de la madre y sus hijos, «a cada hijo, uno por uno» conserva la idea de trato individual con claridad y naturalidad.
- source_word: παῖδα
  english_pob_choice: son
  chosen_spanish: hijo
  alternatives_spanish:
  - niño
  - muchacho
  - hijo
  lexicon: LSJ
  rationale: Aquí παῖς se refiere a los hijos varones de la madre. «Hijo» comunica la relación familiar con fidelidad y evita la ambigüedad de «niño» o «muchacho».
- source_word: ὁμοῦ πάντας
  english_pob_choice: all of them together
  chosen_spanish: a todos juntos
  alternatives_spanish:
  - a todos a la vez
  - a todos en conjunto
  - a todos juntos
  lexicon: LSJ
  rationale: 'La segunda cláusula contrasta con la primera: exhortación individual y luego colectiva. «A todos juntos» conserva ese contraste sin forzar la sintaxis.'
- source_word: ἡ μήτηρ
  english_pob_choice: the mother
  chosen_spanish: la madre
  alternatives_spanish:
  - su madre
  - la madre
  lexicon: LSJ
  rationale: El artículo definido basta en español; el contexto ya identifica a la madre. «La madre» mantiene el referente sin añadir interpretación.
- source_word: ἐπὶ τὸν ... θάνατον
  english_pob_choice: toward death
  chosen_spanish: hacia la muerte
  alternatives_spanish:
  - a la muerte
  - hacia la muerte
  - para la muerte
  lexicon: LSJ
  rationale: La preposición ἐπί con acusativo expresa dirección. «Hacia la muerte» preserva la fuerza direccional del griego mejor que una formulación más abstracta.
- source_word: προέτρεπεν
  english_pob_choice: urged ... toward
  chosen_spanish: exhortaba
  alternatives_spanish:
  - instaba
  - animaba
  - exhortaba
  lexicon: LSJ
  rationale: El verbo significa impulsar, instar o exhortar. «Exhortaba» refleja bien la intensidad retórica del martirio y suena natural en español bíblico contemporáneo.
- source_word: τῆς εὐσεβείας
  english_pob_choice: for the sake of godliness
  chosen_spanish: por causa de la piedad
  alternatives_spanish:
  - por causa de la piedad
  - por piedad
  - por reverencia hacia Dios
  lexicon: LSJ
  rationale: εὐσέβεια en 4 Macabeos expresa devoción reverente a Dios. «Piedad» es el término más cercano y tradicional en español bíblico; la nota conserva la alternativa «devoción reverente a Dios» implícita en el término.
- source_word: θάνατον
  english_pob_choice: death
  chosen_spanish: la muerte
  alternatives_spanish:
  - muerte
  - la muerte
  lexicon: LSJ
  rationale: El acusativo con artículo se traduce naturalmente como «la muerte». Mantiene la sobriedad del griego sin añadir matices inexistentes.
theological_decisions:
- issue: Cómo renderizar εὐσέβεια en un contexto de martirio
  english_pob_reading: for the sake of godliness
  chosen_spanish_reading: por causa de la piedad
  alternative_spanish_readings:
  - por piedad
  - por reverencia hacia Dios
  - por causa de la devoción a Dios
  rationale: En 4 Macabeos, εὐσέβεια apunta a la devoción fiel y reverente hacia Dios, no a simple moralidad. «Piedad» preserva el registro bíblico y la orientación religiosa del término sin desviarse a un tecnicismo ajeno al español lector.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Tensión entre exhortación individual y colectiva
  english_pob_reading: each son individually ... and all of them together
  chosen_spanish_reading: a cada hijo, uno por uno ... y a todos juntos
  alternative_spanish_readings:
  - cada uno por separado ... y todos a la vez
  - uno por uno ... y todos juntos
  rationale: 'El griego insiste en ambos movimientos: individual y total. La versión española conserva esa tensión sin resolverla ni fusionarla, porque forma parte del sentido retórico del verso.'
  doctrine_reference: Translation philosophy §§2, 7
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego y el audit trail inglés, pero ajusta el orden para sonar natural en español. Se mantuvo la doble estructura distributiva/colectiva y la dirección hacia la muerte. Se prefirió «piedad» para εὐσέβεια, con nota que explicita su sentido de devoción reverente a Dios.
  spanish_consistency_notes:
  - Se usa «hijo» para παῖς en contexto familiar masculino, coherente con el relato de los mártires.
  - Se conserva «la madre» como referencia definida, sin añadir «su» porque el contexto ya la identifica.
  - «Hacia la muerte» mantiene la direccionalidad de ἐπί con acusativo.
  - «Piedad» se emplea en sentido religioso fuerte, no como simple cortesía o moralidad genérica.
  - La puntuación separa claramente la exhortación individual de la colectiva, como en el griego.
