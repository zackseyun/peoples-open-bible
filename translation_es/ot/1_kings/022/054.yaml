translation:
  language: es
  text: Sirvió a Baal y se inclinó ante él[a], y provocó a Yahvé, el Dios de Israel, igual que había hecho su padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se postró ante él»; el verbo hebreo se refiere literalmente a inclinarse o postrarse.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲבֹד
  english_pob_choice: served
  chosen_spanish: sirvió
  alternatives_spanish:
  - adoró
  - prestó culto a
  lexicon: HALOT
  rationale: עבד en contexto idólatra conserva el sentido de servicio/culto. «Sirvió» mantiene la relación léxica con el verbo y evita absorber el matiz cultual en el verbo siguiente.
- source_word: הַבַּעַל
  english_pob_choice: Baal
  chosen_spanish: Baal
  alternatives_spanish:
  - el Baal
  lexicon: HALOT
  rationale: Aquí funciona como nombre/título divino propio; en español, «Baal» es natural y claro, y el artículo no es necesario para identificar el referente.
- source_word: וַיִּשְׁתַּחֲוֶה ל֑וֹ
  english_pob_choice: bowed down to him
  chosen_spanish: se inclinó ante él
  alternatives_spanish:
  - se postró ante él
  - adoró a él
  lexicon: HALOT
  rationale: שׁחה describe inclinación/prostración. «Se inclinó ante él» conserva la imagen corporal concreta sin fundirla con «sirvió»; «adoró» sería posible, pero borra el paralelismo entre servicio y postración.
- source_word: וַיַּכְעֵס
  english_pob_choice: provoked
  chosen_spanish: provocó
  alternatives_spanish:
  - enfureció
  - provocó a ira
  lexicon: HALOT
  rationale: El hiphil de כעס significa provocar a ira. En español, «provocó» expresa causalidad y permite que el objeto directo («Yahvé») mantenga el sentido de provocación sin recargar la frase.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el nombre divino: transliterar יְהוָה como «Yahvé», preservando el nombre propio en lugar de sustituirlo por un título.'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  - Dios, el Dios de Israel
  lexicon: HALOT
  rationale: La cadena constructa se vierte de manera directa y natural como «el Dios de Israel», que expresa identificación pactual sin añadir glosa innecesaria.
- source_word: כְּכֹל אֲשֶׁר עָשָׂה אָבִיו
  english_pob_choice: just as his father had done
  chosen_spanish: igual que había hecho su padre
  alternatives_spanish:
  - como todo lo que había hecho su padre
  - según todo lo que hizo su padre
  lexicon: HALOT
  rationale: La frase comparativa se traduce con una equivalencia idiomática clara en español. «Igual que había hecho su padre» conserva la medida comparativa de «según todo lo que…» sin sonar rígido.
theological_decisions:
- issue: Nombre divino יְהוָה en contraste con Baal
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El versículo contrapone explícitamente el culto a Baal con la provocación contra el Dios de Israel; conservar el nombre propio «Yahvé» mantiene visible esa oposición teológica y sigue la norma del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
translation_notes:
  revision_awareness: 'La redacción coincide sustancialmente con el desglose auditado en inglés: se mantiene la secuencia de dos verbos para la idolatría («sirvió» / «se inclinó»), el contraste con «Yahvé» y la comparación final con el padre, sin añadir ni omitir elementos del hebreo.'
  spanish_consistency_notes:
  - Se evitó «adoró» para no borrar la distinción léxica entre עבד y שׁחה.
  - «Yahvé» se emplea de forma consistente como nombre propio, no como sustitución reverencial.
  - «El Dios de Israel» conserva la relación pactual sin inflar el texto.
  - La nota al pie marca solo la alternativa realmente documentada para וַיִּשְׁתַּחֲוֶה ל֑וֹ.
