  to: 'Entonces el rey David entró y se sentó delante de Yahvé, y dijo[a]: «¿Quién soy yo, oh Yahvé Dios, y qué es mi casa, que me has traído hasta aquí?»'
  rationale: Se corrige «para que» a «que» para reflejar fielmente la función de כִּי en el hebreo. Se afina la nota léxica para conservar mejor la amplitud de «casa» sin introducir la alternativa menos contextual «hogar».
