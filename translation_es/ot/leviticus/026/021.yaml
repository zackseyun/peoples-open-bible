revisions:
- from: Y si andan conmigo en oposición[a] y no quieren escucharme, entonces yo les seguiré trayendo un golpe[b] siete veces, conforme a sus pecados.
  to: Y si andan contra mí[a] y no quieren escucharme, entonces seguiré castigándolos[b] siete veces, conforme a sus pecados.
  rationale: La revisión mejora la fidelidad idiomática del español sin apartarse del análisis fuente. 'Andan contra mí' comunica mejor קֶרִי en este contexto que 'andan conmigo en oposición'. 'Seguiré castigándolos' evita el español extraño de 'traer un golpe' y mantiene abierta la naturaleza de מַכָּה, mientras la nota preserva la alternativa más literal con 'añadir'. Se conserva 'conforme a sus pecados' para reflejar la proporcionalidad de כְּחַטֹּאתֵיכֶם.
  reviewer_model: gpt-5.4
