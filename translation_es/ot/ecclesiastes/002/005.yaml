translation:
  language: es
  text: Hice para mí jardines y parques[a], y planté en ellos toda clase de árboles frutales.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «huertos» para «parques» (hebreo pardesim), es decir, recintos cultivados y cerrados de placer o de frutales.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָשִׂיתִי
  english_pob_choice: I made
  chosen_spanish: Hice
  alternatives_spanish:
  - Hice para mí
  - Construí
  lexicon: HALOT
  rationale: El qal perfecto de עשה aquí introduce una obra realizada por el hablante; en español, "hice" es natural y conserva la primera persona de logros acumulados. La idea de beneficio propio se expresa con el complemento siguiente, no dentro del verbo.
- source_word: לִי
  english_pob_choice: for myself
  chosen_spanish: para mí
  alternatives_spanish:
  - para mí mismo
  - en mi propio beneficio
  lexicon: HALOT
  rationale: La preposición con sufijo de 1cs marca posesión o beneficio personal. "Para mí" reproduce de forma sobria esa orientación autobiográfica sin sobrecargar el estilo.
- source_word: גַּנּוֹת
  english_pob_choice: gardens
  chosen_spanish: jardines
  alternatives_spanish:
  - huertos
  - jardines/huertos
  lexicon: HALOT
  rationale: El plural de גן es el término general para "jardines". En español, "jardines" mantiene bien el contraste con el término más específico que sigue.
- source_word: פַרְדֵּסִים
  english_pob_choice: parks
  chosen_spanish: parques
  alternatives_spanish:
  - huertos
  - orchard-parques
  - paradisos
  lexicon: HALOT
  rationale: פַרְדֵּס designa recintos ajardinados o parques/huertos de placer, más amplios que un simple huerto. "Parques" transmite mejor esa idea de finca cultivada o terreno arbolado cercado en español moderno, sin reducirlo indebidamente a "huertos".
- source_word: וְנָטַעְתִּי
  english_pob_choice: and I planted
  chosen_spanish: y planté
  alternatives_spanish:
  - y yo planté
  - y he plantado
  lexicon: HALOT
  rationale: El qal perfecto de נטע se ajusta bien a un pretérito simple en español. La repetición explícita de "yo" no es necesaria porque la forma verbal ya lo indica.
- source_word: בָהֶם
  english_pob_choice: in them
  chosen_spanish: en ellos
  alternatives_spanish:
  - allí
  - dentro de ellos
  lexicon: HALOT
  rationale: El sufijo de 3mp retoma los jardines y parques. "En ellos" es la correspondencia directa y clara.
- source_word: עֵץ כָּל פֶּרִי
  english_pob_choice: every kind of fruit tree
  chosen_spanish: toda clase de árboles frutales
  alternatives_spanish:
  - todo tipo de árbol frutal
  - árboles frutales de toda clase
  - cada árbol frutal
  lexicon: HALOT
  rationale: La cadena constructa literalmente significa algo como "árbol de todo fruto". En español, la formulación idiomática "toda clase de árboles frutales" conserva el sentido distributivo de כָּל y el referente hortícola sin sonar forzada.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios; el borrador español sigue de cerca el texto hebreo y el audit trail inglés, manteniendo la distinción entre גַּנּוֹת y פַרְדֵּסִים y traduciendo la frase final de manera idiomática sin perder el valor distributivo.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y moderno, sin calcos innecesarios.
  - '"Jardines" y "parques" preservan el contraste léxico del hebreo y del POB inglés.'
  - La nota a pie conserva la alternativa semántica importante de פַרְדֵּסִים sin introducir una lectura ajena al contexto.
