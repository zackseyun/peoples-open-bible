    text: 'El hebreo usa dos expresiones relacionadas: «desde el nacimiento» y «desde el vientre», un paralelismo poético para el cuidado de Dios desde la vida más temprana.'
    reason: lexical_alternative
  revision_rationale: 'Se hizo una reparación mínima para alinear el español con el hebreo y con la auditoría inglesa: se añadió «por mí» también en la segunda cláusula para reflejar la repetición de מִנִּי y se reemplazó «cargados» por «sostenidos» para una lectura más natural y fiel al matiz de cuidado divino en español. Se conservan «remanente», «desde el nacimiento» y «desde el vientre».'
