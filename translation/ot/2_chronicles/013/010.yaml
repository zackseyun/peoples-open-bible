theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Temporal force of עֲזַבְנֻהוּ
  chosen_reading: we have not forsaken him
  alternative_readings:
  - we did not forsake him
  rationale: The Hebrew perfect in this rhetorical setting expresses a state of continuing covenant loyalty rather than merely a past event. The English present perfect best preserves that theological and rhetorical force.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
