translation:
  language: es
  text: Y tú no escaparás de su mano, porque ciertamente serás capturado y entregado en su mano. Tus ojos verán los ojos del rey de Babilonia, y su boca hablará[a] a tu boca, y irás a Babilonia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más idiomática, «y él hablará contigo directamente». El hebreo dice literalmente: «su boca hablará a tu boca».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִמָּלֵט מִיָּדוֹ
  english_pob_choice: will not escape from his hand
  chosen_spanish: no escaparás de su mano
  alternatives_spanish:
  - no te librarás de su mano
  - no serás librado de su mano
  lexicon: HALOT
  rationale: El hebreo usa el modismo de escapar «de su mano» para expresar salir del poder o control de otro. «Escapar de su mano» conserva la imagen y su fuerza idiomática en español.
- source_word: כִּי תָּפֹשׂ תִּתָּפֵשׂ
  english_pob_choice: for you will surely be captured
  chosen_spanish: porque ciertamente serás capturado
  alternatives_spanish:
  - porque de cierto serás apresado
  - porque sin duda serás tomado
  lexicon: HALOT
  rationale: La construcción intensifica la certeza de la acción. «Ciertamente serás capturado» transmite el énfasis sin volverlo mecánico.
- source_word: וּבְיָדוֹ תִּנָּתֵן
  english_pob_choice: and given into his hand
  chosen_spanish: y entregado en su mano
  alternatives_spanish:
  - y puesto en su mano
  - y dado en su mano
  lexicon: HALOT
  rationale: Se conserva el modismo hebreo de quedar bajo el control de alguien. «Entregado en su mano» mantiene la imagen de dominio y coordinación con la frase anterior.
- source_word: וְעֵינֶיךָ אֶת־עֵינֵי מֶלֶךְ בָּבֶל תִּרְאֶינָה
  english_pob_choice: Your eyes will see the eyes of the king of Babylon
  chosen_spanish: Tus ojos verán los ojos del rey de Babilonia
  alternatives_spanish:
  - verás al rey de Babilonia cara a cara
  - tus ojos contemplarán al rey de Babilonia
  lexicon: HALOT
  rationale: 'El hebreo es concreto y vívido: ojos contra ojos. Se conserva esa imagen para no debilitar la idea de un encuentro personal directo.'
- source_word: וּפִיהוּ אֶת־פִּיךָ יְדַבֵּר
  english_pob_choice: and his mouth will speak to your mouth
  chosen_spanish: y su boca hablará con tu boca
  alternatives_spanish:
  - y él hablará directamente contigo
  - y su boca hablará a tu boca
  lexicon: HALOT
  rationale: La expresión hebrea es literal y extraña, pero significativa. «Hablará con tu boca» preserva la imagen de diálogo directo; la alternativa más natural queda implícita por la transparencia del giro.
- source_word: וּבָבֶל תָּבוֹא
  english_pob_choice: and you will go to Babylon
  chosen_spanish: y tú irás a Babilonia
  alternatives_spanish:
  - y vendrás a Babilonia
  - y llegarás a Babilonia
  lexicon: HALOT
  rationale: «Irás a Babilonia» es natural en español y mantiene la dirección del destino desde la perspectiva del oyente.
translation_notes:
  revision_awareness: Se incorporó la revisión auditada del inglés POB que ajustó la cláusula final de la boca para reflejar más de cerca el hebreo idiomático sin perder legibilidad. El resto mantiene la equivalencia óptima aprobada por el rastreo de revisión y la alta concordancia del control cruzado.
  spanish_consistency_notes:
  - Se mantuvo «Babilonia» para בבל conforme al uso estándar en español bíblico.
  - Se preservó la repetición de «mano» como imagen idiomática de poder/control.
  - No se sustituyó el modismo por una paráfrasis general para conservar la tensión léxica documentada.
  - El marcador de nota [a] aparece anclado exactamente en el texto donde corresponde.
