review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del hebreo y preserva decisiones clave del POB: «Yahvé», «Sé fuerte y valiente», la lectura «entrarás con este pueblo» frente a «llevarás», y «sus padres». Sin embargo, la cláusula final «se la darás en posesión» debilita el matiz de herencia de תַּנְחִילֶנָּה, que el inglés auditado preserva explícitamente como ‘as an inheritance’.'
  spanish_quality_summary: El español es claro y digno. «A la vista de todo Israel» funciona, aunque «delante de todo Israel» suena algo más natural; no es necesario cambiarlo. El principal ajuste de calidad/fidelidad es reforzar en la última cláusula la noción de heredad/herencia, no mera posesión.
  glossary_alignment: 'Alineación generalmente buena con la terminología del proyecto: יְהוָה -> «Yahvé» correctamente; הָאָרֶץ -> «la tierra» correctamente; אֲבֹתָם -> «sus padres» correctamente. No hay conflicto con otros términos doctrinales. La única desalineación parcial es נחל, donde «en posesión» no conserva tan bien como «como herencia/heredad» la razón léxica documentada por el POB.'
  issues:
  - severity: medium
    issue: La traducción de וְאַתָּה תַּנְחִילֶנָּה אֹתָם como «y tú se la darás en posesión» atenúa el sentido de herencia.
    rationale: 'El hifil de נחל expresa causar a heredar / dar como herencia. «En posesión» comunica recepción de la tierra, pero pierde parte del matiz pactal y la correspondencia con la decisión auditada en inglés: ‘give it to them as an inheritance’. En español bíblico natural, «como herencia» o «en herencia» preserva mejor ese valor.'
  revised_spanish_text: 'Entonces Moisés llamó a Josué y le dijo, a la vista de todo Israel[a]: «Sé fuerte y valiente, porque tú entrarás con este pueblo en la tierra que Yahvé juró a sus padres darles[b], y tú se la darás como herencia».'
  revised_footnotes:
  - marker: a
    text: 'O: «delante de todo Israel». El hebreo dice literalmente «a los ojos de todo Israel», subrayando el carácter público y visible de la exhortación.'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «a sus padres».'
    reason: lexical_alternative
  revision_rationale: Se mantiene el texto casi por completo, pero se reemplaza «en posesión» por «como herencia» para reflejar con mayor fidelidad el sentido de תַּנְחִילֶנָּה y la justificación léxica ya documentada en el POB inglés. No se requiere nota adicional porque el ajuste aclara el sentido en vez de introducir nueva ambigüedad.
