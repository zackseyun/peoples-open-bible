translation:
  language: es
  text: 'Mira[a], Hanamel, hijo de Salum, tu tío, viene a verte y te dice: «Compra mi campo que está en Anatot, porque te corresponde el derecho de redención[b] para comprarlo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'He aquí'. El hebreo introduce la escena con una partícula deíctica que llama la atención sobre un hecho inminente.
    reason: lexical_alternative
  - marker: b
    text: O 'el derecho legal de redención' o 'el derecho de recompra'. El hebreo se refiere al derecho de parentesco para rescatar una propiedad familiar.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - He aquí
  - Observa
  lexicon: HALOT
  rationale: Se conserva la fuerza deíctica e inmediata del hebreo con un imperativo natural en español. 'Mira' comunica mejor que omitir la partícula o usar una fórmula excesivamente arcaica.
- source_word: חֲנַמְאֵל
  english_pob_choice: Hanamel
  chosen_spanish: Hanamel
  alternatives_spanish:
  - Hanameel
  lexicon: HALOT
  rationale: Se translitera el nombre propio, manteniendo la forma estándar y reconocible en español.
- source_word: דֹּדְךָ
  english_pob_choice: your uncle
  chosen_spanish: tu tío
  alternatives_spanish:
  - tu pariente
  - tu amado
  lexicon: HALOT
  rationale: En este contexto de rescate de propiedad familiar, דּוֹד designa al tío o pariente cercano, no a 'amado'. 'Tío' reproduce la relación de parentesco que motiva el derecho de redención.
- source_word: בָּא אֵלֶיךָ
  english_pob_choice: is coming to you
  chosen_spanish: viene a ti
  alternatives_spanish:
  - está viniendo a ti
  - vendrá a ti
  lexicon: HALOT
  rationale: El hebreo presenta el evento como inminente y vívido; en español, 'viene a ti' mantiene esa inmediatez sin sonar forzado.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y te dirá
  - para decir
  lexicon: HALOT
  rationale: Fórmula estándar para introducir discurso directo; 'diciendo' es la equivalencia más transparente.
- source_word: קְנֵה לְךָ
  english_pob_choice: Buy
  chosen_spanish: Compra
  alternatives_spanish:
  - Adquiere
  - Cómpralo
  lexicon: HALOT
  rationale: Imperativo de קנה. 'Compra' es la forma más natural y fiel al valor comercial-jurídico del verbo en este pasaje.
- source_word: שָׂדִי
  english_pob_choice: my field
  chosen_spanish: mi campo
  alternatives_spanish:
  - mi parcela
  - mi campo de cultivo
  lexicon: HALOT
  rationale: שָׂדֶה se refiere a una porción de tierra/campo. 'Campo' conserva la referencia concreta al bien inmueble sin sobretraducirlo.
- source_word: בַּעֲנָתוֹת
  english_pob_choice: in Anathoth
  chosen_spanish: en Anatot
  alternatives_spanish:
  - en Anatot
  lexicon: HALOT
  rationale: Se translitera el topónimo al uso español usual 'Anatot', manteniendo la identificación geográfica.
- source_word: מִשְׁפַּט הַגְּאֻלָּה
  english_pob_choice: the right of redemption
  chosen_spanish: el derecho de redención
  alternatives_spanish:
  - el derecho legal de redención
  - el derecho de rescate
  - el derecho de recompra
  lexicon: HALOT
  rationale: מִשְׁפָּט conserva un matiz jurídico; גְּאֻלָּה expresa el derecho de rescatar bienes familiares. 'Derecho de redención' es claro y mantiene el marco legal-kinésico del texto.
- source_word: לִקְנוֹת
  english_pob_choice: to buy it
  chosen_spanish: para comprarlo
  alternatives_spanish:
  - para adquirirlo
  - a fin de comprarlo
  lexicon: HALOT
  rationale: El infinitivo expresa propósito. En español, 'para comprarlo' fluye con naturalidad y mantiene el vínculo con el campo mencionado.
- source_word: כִּי לְךָ
  english_pob_choice: for ... belongs to you
  chosen_spanish: porque te corresponde
  alternatives_spanish:
  - porque es tuyo
  - porque te pertenece
  lexicon: HALOT
  rationale: Se expresa la razón en un español jurídico-natural. 'Te corresponde' conserva la idea de derecho/obligación derivada del parentesco, no solo posesión material.
theological_decisions:
- issue: Naturaleza de גְּאֻלָּה en la ley de la tierra
  english_pob_reading: Rendered as 'redemption' in a legal-kinship sense, not spiritualized.
  chosen_spanish_reading: Se mantiene 'redención' en sentido jurídico de parentesco, no espiritualizado.
  alternative_spanish_readings:
  - rescate
  - recompra
  - redención de propiedad
  rationale: El contexto es una transacción de tierra bajo la norma de rescate familiar. 'Redención' conserva el campo semántico bíblico y jurídico sin introducir sentidos devocionales ajenos al pasaje.
  doctrine_reference: Levítico 25:25-28; Rut 4:1-10
- issue: Valor de מִשְׁפַּט como derecho normativo
  english_pob_reading: the right of redemption
  chosen_spanish_reading: el derecho de redención
  alternative_spanish_readings:
  - el derecho legal de redención
  - la prerrogativa de redención
  rationale: '''Derecho'' refleja el carácter normativo y legal de מִשְׁפָּט mejor que una traducción meramente abstracta. Esto preserva la base jurídica del acto que Jeremías debe realizar.'
  doctrine_reference: Levítico 25:23-28; Jeremías 32:6-8
translation_notes:
  revision_awareness: Se siguió el texto hebreo WLC y se contrastó con el audio/edición inglesa POB. La versión inglesa opta por una formulación idiomática ('Look... is coming to you'), conserva el sentido de parentesco de דּוֹד como 'uncle' y explica en nota el alcance jurídico de גְּאֻלָּה. La presente redacción conserva esas decisiones, adaptándolas al español natural y manteniendo el matiz legal-kinésico del pasaje.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera explícitamente; aquí no aparece.
  - Se mantiene 'redención' para גְּאֻלָּה siguiendo la equivalencia jurídica del POB inglés.
  - Se evita 'SEÑOR' como sustituto del nombre divino, irrelevante en este versículo.
  - '''Tío'' refleja el parentesco funcional requerido por la ley de rescate familiar; no se usa ''amado''.'
  - '''Campo'' traduce שָׂדֶה de forma concreta y publicable en español bíblico contemporáneo.'
