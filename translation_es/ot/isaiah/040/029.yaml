translation:
  language: es
  text: Él da fuerza al cansado, y al que no tiene vigor le aumenta la fuerza.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Al que no tiene fuerzas, le multiplica la fuerza».'
