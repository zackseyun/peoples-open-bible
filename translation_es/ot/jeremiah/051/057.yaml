translation:
  language: es
  text: Y yo embriagaré a sus oficiales, sus sabios, sus gobernadores[a], sus subgobernantes y sus guerreros; dormirán un sueño eterno y no despertarán, declara el Rey[b], cuyo nombre es Yahvé de los Ejércitos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sátrapas» para פַּחוֹתֶיהָ; sin embargo, «gobernadores» es más general y reproduce bien el cargo administrativo.
    reason: lexical_alternative
  - marker: b
    text: Lit. «el Rey, Yahvé de los Ejércitos, es su nombre». Se prefiere una formulación española más natural sin perder el sentido hebreo.
    reason: source_note
lexical_decisions:
- source_word: וְהִשְׁכַּרְתִּי
  english_pob_choice: I will make ... drunk
  chosen_spanish: embriagaré
  alternatives_spanish:
  - haré que se embriaguen
  - los emborracharé
  lexicon: HALOT
  rationale: El hebreo hiphil expresa causar embriaguez, no solo el estado de estar ebrio. En español, «embriagaré» conserva esa causación divina de juicio con un tono digno y natural.
- source_word: שָׂרֶיהָ
  english_pob_choice: her officials
  chosen_spanish: sus oficiales
  alternatives_spanish:
  - sus príncipes
  - sus líderes
  lexicon: HALOT
  rationale: שׂר puede referirse a príncipes o dirigentes, pero en este contexto de administración babilónica «oficiales» comunica mejor la clase gobernante sin sugerir filiación real.
- source_word: חֲכָמֶיהָ
  english_pob_choice: her wise men
  chosen_spanish: sus sabios
  alternatives_spanish:
  - sus sabios consejeros
  - sus hombres sabios
  lexicon: HALOT
  rationale: La expresión apunta a quienes eran tenidos por sabios, probablemente consejeros. «Sus sabios» es claro y mantiene la forma breve del hebreo.
- source_word: פַּחוֹתֶיהָ
  english_pob_choice: her governors
  chosen_spanish: sus gobernadores
  alternatives_spanish:
  - sus gobernadores provinciales
  - sus sátrapas
  lexicon: HALOT
  rationale: פּחה designa un gobernador administrativo. «Gobernadores» reproduce bien el rango sin imponer un tecnicismo histórico como «sátrapas».
- source_word: סְגָנֶיהָ
  english_pob_choice: her deputies
  chosen_spanish: sus delegados
  alternatives_spanish:
  - sus subgobernantes
  - sus prefectos
  lexicon: HALOT
  rationale: סגן denota un rango subordinado de autoridad. «Delegados» preserva la idea de representantes o subordinados con una distinción suficiente frente a los demás cargos.
- source_word: גִבּוֹרֶיהָ
  english_pob_choice: her warriors
  chosen_spanish: sus guerreros
  alternatives_spanish:
  - sus valientes
  - sus soldados
  lexicon: HALOT
  rationale: גבור enfatiza fuerza y valentía militar. «Guerreros» comunica esa fuerza de manera natural en español moderno y mantiene el paralelismo con los títulos anteriores.
- source_word: וְיָשְׁנוּ שְׁנַת עוֹלָם
  english_pob_choice: and they will sleep an everlasting sleep
  chosen_spanish: y dormirán un sueño eterno
  alternatives_spanish:
  - y dormirán un sueño perpetuo
  - y dormirán para siempre
  lexicon: HALOT
  rationale: La metáfora de sueño para la muerte/judicio debe conservarse. «Sueño eterno» mantiene la imagen y el peso de עוֹלָם sin explicitar más de lo que el texto dice.
- source_word: וְלֹא יָקִיצוּ
  english_pob_choice: and not wake up
  chosen_spanish: y no despertarán
  alternatives_spanish:
  - y no se levantarán
  - y no volverán a despertar
  lexicon: HALOT
  rationale: El verbo significa despertar. «No despertarán» es la forma más directa en español y preserva el enlace con la imagen del sueño.
- source_word: נְאֻם
  english_pob_choice: declares
  chosen_spanish: declara
  alternatives_spanish:
  - dice
  - oráculo de
  lexicon: HALOT
  rationale: Es la fórmula profética de cierre. «Declara» resulta idiomático y conserva la autoridad del acto de habla.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the King
  chosen_spanish: el Rey
  alternatives_spanish:
  - el Rey soberano
  - el rey
  lexicon: HALOT
  rationale: En la cláusula final, el título real funciona como epíteto divino. «El Rey» con mayúscula en contexto identificará a Yahvé sin perder la forma nominal hebrea.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se sigue el término POB para el Tetragrámaton. En español, «Yahvé» es la transliteración establecida en este proyecto y preserva el nombre propio divino.
- source_word: צְבָאוֹת
  english_pob_choice: of Armies
  chosen_spanish: de los Ejércitos
  alternatives_spanish:
  - de los ejércitos
  - de los ejércitos celestiales
  lexicon: HALOT
  rationale: «Ejércitos» comunica el sentido concreto de צבאות mejor que «huestes», y conserva el título compuesto del nombre divino.
- source_word: שְׁמוֹ
  english_pob_choice: is his name
  chosen_spanish: cuyo nombre es
  alternatives_spanish:
  - su nombre es
  - de quien es el nombre
  lexicon: HALOT
  rationale: La fórmula posesiva final se expresa con naturalidad en español mediante «cuyo nombre es», manteniendo la relación nominal sin agregar contenido interpretativo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton y el proyecto POB lo translitera en vez de sustituirlo por un título. En español, «Yahvé» preserva el nombre propio divino y evita la convención de ocultarlo tras «SEÑOR».
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: La imagen de «sueño eterno»
  english_pob_reading: retain the death-as-sleep metaphor rather than interpretively replacing it with 'die forever'
  chosen_spanish_reading: mantener «dormirán un sueño eterno» sin explicitar «morirán»
  alternative_spanish_readings:
  - morirán y no volverán a levantarse
  - dormirán para siempre
  rationale: El hebreo presenta la muerte/judicio con la metáfora del sueño. En español conviene conservarla para no suprimir la tensión literaria ni añadir una precisión doctrinal que el versículo no formula.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés, que ajustó la cláusula final para una posesión más natural («whose name is ...») sin cambiar el contenido. En español se adoptó una solución igualmente natural («cuyo nombre es...»), manteniendo el valor del Tetragrámaton y del título divino.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como representación del nombre divino para coherencia con el estándar del proyecto.
  - 'Se usaron sustantivos plurales de cargos y oficios de forma uniforme: oficiales, sabios, gobernadores, delegados y guerreros.'
  - Se conservó la metáfora de sueño para evitar una paráfrasis explicativa.
  - «Ejércitos» se eligió para צְבָאוֹת por consistencia con el título divino compuesto y por claridad en español.
