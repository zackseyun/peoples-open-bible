base_translation:
  language: en
  yaml_path: translation/deuterocanon/psalms_of_solomon/008/018.yaml
  text: The rulers of the land met him with joy[a]; they said to him, “Blessed is your way. Come[c][b], enter with peace.”
  footnotes:
