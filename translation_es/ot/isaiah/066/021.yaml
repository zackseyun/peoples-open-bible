    issue: Falta tilde en 'aun'
    rationale: En español actual, el uso enfático/aditivo equivalente a 'incluso' se escribe normalmente 'aún'. La forma sin tilde puede causar vacilación lectora y se percibe como descuido ortográfico en una edición bíblica.
  - severity: low
    issue: Inicio algo rígido en español
    rationale: '''Y aun de ellos'' es comprensible, pero suena algo menos natural que otras posibilidades. Como la fidelidad semántica ya es buena, basta el ajuste ortográfico sin necesidad de reestructurar más.'
  revised_spanish_text: Y aún de ellos tomaré para sacerdotes y para levitas[a][b], dice Yahvé.
  revised_footnotes:
