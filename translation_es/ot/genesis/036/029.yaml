translation:
  language: es
  text: 'Estos son los jefes[a] de los horeos: jefe Lotán, jefe Shobal, jefe Zibeón, jefe Anah.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «jefes de clan» o «caudillos»; el término hebreo puede denotar al líder o cabeza de un clan o tribu.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  english_pob_choice: These are
  chosen_spanish: Estos son
  alternatives_spanish:
  - Estos eran
  lexicon: HALOT
  rationale: El demostrativo plural introduce una lista; en español, «Estos son» expresa de manera natural la misma relación copulativa sin añadir información temporal no presente en el hebreo.
- source_word: אַלּוּפֵי / אַלּוּף
  english_pob_choice: chiefs / chief
  chosen_spanish: jefes / jefe
  alternatives_spanish:
  - caudillos / caudillo
  - líderes / líder
  - jefes de clan / jefe de clan
  lexicon: HALOT
  rationale: En Génesis 36, el término designa cabezas de grupos familiares o tribales. «Jefe» conserva la idea de liderazgo con claridad moderna en español y evita el matiz histórico de «duque», que no corresponde bien al contexto. La repetición del singular ante cada nombre se conserva para transparencia.
- source_word: הַחֹרִי
  english_pob_choice: the Horites
  chosen_spanish: los horeos
  alternatives_spanish:
  - los horitas
  - los hורitas
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular con artículo, el contexto colectivo exige un pueblo/grupo en plural. «Horeos» es la forma española natural para este etnónimo y mantiene la referencia al grupo étnico de manera clara.
- source_word: לוֹטָן
  english_pob_choice: Lotan
  chosen_spanish: Lotán
  alternatives_spanish:
  - Lotan
  lexicon: Convención bíblica española
  rationale: Nombre propio transliterado con acento prosódico en español para lectura fluida. La forma base sigue la convención bíblica estándar.
- source_word: שׁוֹבָל
  english_pob_choice: Shobal
  chosen_spanish: Shobal
  alternatives_spanish:
  - Sobal
  lexicon: Convención bíblica española
  rationale: Nombre propio transliterado según uso bíblico estándar en español, preservando la identidad del nombre sin traducirlo.
- source_word: צִבְעוֹן
  english_pob_choice: Zibeon
  chosen_spanish: Zibeón
  alternatives_spanish:
  - Zibeon
  lexicon: Convención bíblica española
  rationale: Nombre propio transliterado siguiendo el uso bíblico español y reflejando la acentuación natural en español.
- source_word: עֲנָה
  english_pob_choice: Anah
  chosen_spanish: Anah
  alternatives_spanish:
  - Ana
  lexicon: Convención bíblica española
  rationale: Nombre propio transliterado de manera conservadora para mantener continuidad con el texto base y evitar confusión con el nombre común español «Ana».
translation_notes:
  revision_awareness: El texto inglés auditado presenta alta concordancia con el hebreo y no requiere correcciones sustantivas. Se ha mantenido la repetición de אַלּוּף antes de cada nombre para transparencia, y se ha elegido un equivalente español natural para el etnónimo colectivo. No se detectan variantes textuales relevantes en el paquete fuente.
  spanish_consistency_notes:
  - Se usa «jefe» de forma consistente para אַלּוּף, como equivalente transparente y moderno.
  - Se conserva la estructura enumerativa del hebreo, repitiendo «jefe» ante cada nombre propio.
  - «Horeos» refleja el grupo étnico colectivo y evita una traducción demasiado literal del singular hebreo con artículo.
  - Los nombres propios se mantienen transliterados según uso bíblico español, con acentuación cuando ayuda a la lectura.
