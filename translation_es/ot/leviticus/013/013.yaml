  text: וְ/רָאָ֣ה הַ/כֹּהֵ֗ן וְ/הִנֵּ֨ה כִסְּתָ֤ה הַ/צָּרַ֨עַת֙ אֶת כָּל בְּשָׂר֔/וֹ וְ/טִהַ֖ר אֶת הַ/נָּ֑גַע כֻּלּ֛/וֹ הָפַ֥ךְ לָבָ֖ן טָה֥וֹר הֽוּא־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/leviticus/013/013.yaml
  text: and the priest examines him[a], and behold, the skin disease has covered all his flesh, then he shall pronounce the affected person clean; all of it has turned white[b]; he is clean.
  footnotes:
  - marker: a
    text: Hebrew צָרַעַת (traditionally 'leprosy') refers more broadly to a range of skin afflictions in Leviticus, not necessarily modern leprosy.
    reason: lexical_alternative
  - marker: b
    text: Or 'then he shall pronounce him clean.' The Hebrew object is literally 'the affliction/mark,' but the ruling applies to the person bearing it.
    reason: alternative_reading
