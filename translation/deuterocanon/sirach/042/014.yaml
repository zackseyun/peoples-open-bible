translation:
  text: Better a man's wickedness than a woman's goodness[a], and a woman who brings shame becomes a reproach.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew final clause is difficult. The Greek parallel reads more straightforwardly, 'and a woman causing shame leads to reproach,' which supports the sense reflected here.
    reason: alternative_reading
lexical_decisions:
- source_word: מטוב
  chosen: better ... than
  alternatives:
  - from the goodness of
  - more than the goodness of
  lexicon: HALOT
  rationale: 'The preposition מן assimilated in מטוב functions comparatively here: ''better than.'' This is confirmed by the Greek κρείσσων ... ἢ. Rendering it comparatively gives the proverb''s force in idiomatic English.'
- source_word: רוע
  chosen: wickedness
  alternatives:
  - evil
  - badness
  lexicon: HALOT
  rationale: רוע denotes moral badness or evil. 'Wickedness' preserves the moral sense better than the flatter 'badness,' and fits the antithetical proverb.
- source_word: איש
  chosen: a man
  alternatives:
  - a male
  - a husband
  lexicon: HALOT
  rationale: The Hebrew is singular and gender-specific, contrasted directly with אשה. Per project philosophy, gender-accurate language is preferred here rather than neutralizing to 'person.'
- source_word: אשה
  chosen: a woman
  alternatives:
  - a wife
  lexicon: HALOT
  rationale: In both occurrences the plain sense is 'woman,' matching the contrast with איש. 'Wife' is possible in some contexts but is not required by this verse.
- source_word: מטוב אשה
  chosen: than a woman's goodness
  alternatives:
  - than a good woman
  - than the goodness of a woman
  lexicon: HALOT
  rationale: The Hebrew literally compares a man's wickedness with a woman's goodness. The Greek appears to smooth this toward 'a good-doing woman,' but the Hebrew witness should govern. 'A woman's goodness' stays close to the source while remaining readable.
- source_word: מחרפת
  chosen: who brings shame
  alternatives:
  - disgraceful
  - shaming
  - dishonoring
  lexicon: HALOT
  rationale: The participial form describes a woman characterized by causing disgrace/shame. 'Who brings shame' captures the active nuance and aligns with the Greek καταισχύνουσα ('causing shame').
- source_word: תביע
  chosen: becomes
  alternatives:
  - produces
  - utters
  - causes
  lexicon: HALOT
  rationale: The Hebrew form is difficult, and the line is textually awkward. In light of the Greek εἰς ὀνειδισμόν and the proverb's sense, the clause is best rendered as resulting in reproach. 'Becomes' expresses the resultant state in natural English without overclaiming certainty about the exact Hebrew nuance.
- source_word: חרפת
  chosen: a reproach
  alternatives:
  - disgrace
  - an object of reproach
  lexicon: HALOT
  rationale: חרפה commonly denotes reproach or disgrace. 'A reproach' preserves the noun's force and matches the Greek ὀνειδισμός.
