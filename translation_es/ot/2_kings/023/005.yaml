revisions:
- from: Y puso fin a los sacerdotes que los reyes de Judá habían nombrado para quemar incienso en los lugares altos, en las ciudades de Judá y alrededor de Jerusalén[a], y también a los que quemaban incienso a Baal, al sol, a la luna, a las constelaciones[b] y a todo el ejército de los cielos[c].
  to: Y él hizo cesar a los sacerdotes[a] que los reyes de Judá habían nombrado para quemar incienso en los lugares altos, en las ciudades de Judá y alrededor de Jerusalén[b], y también a los que quemaban incienso a Baal, al sol, a la luna, a las constelaciones[c] y a todo el ejército de los cielos[d].
  rationale: 'Se hace un ajuste menor para mejorar la naturalidad del español y reflejar mejor el valor causativo de הִשְׁבִּית con personas en funciones cultuales: ''hizo cesar'' en vez de ''puso fin a''. Además, se añade la nota léxica sobre הַכְּמָרִים, ya documentada en el POB inglés, sin volver interpretativo el texto principal.'
