revisions:
- from: He aquí, el ojo de Yahvé está sobre[a] los que lo temen, sobre los que esperan su amor constante.
  to: He aquí, el ojo de Yahvé está sobre los que lo temen, sobre los que esperan[a] su amor fiel.
  rationale: Se mantiene la estructura del original y la dignidad del registro, pero se corrige el término de חֶסֶד a «amor fiel» para reflejar mejor el amor leal/pactual documentado. También se reubica la nota al verbo «esperan» para preservar la alternativa léxica principal del hebreo יחל, en línea con el audit trail inglés. No se requiere adjudicación adicional.
