translation:
  language: es
  text: 'Y sus nombres eran Oholá[a] la mayor y Oholibá su hermana. Y llegaron a ser mías[b] y dieron a luz hijos e hijas. En cuanto a sus nombres: Samaria es Oholá, y Jerusalén es Oholibá.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Los nombres Oholá y Oholibá probablemente evocan expresiones hebreas relacionadas con 'su tienda' y 'mi tienda está en ella', reforzando la alegoría.
    reason: cultural_note
  - marker: b
    text: 'O bien: ''fueron mías''. El hebreo puede entenderse como una afirmación de posesión o relación; en el contexto, la alegoría mayor es matrimonial.'
    reason: alternative_reading
lexical_decisions:
- source_word: וּשְׁמוֹתָן
  english_pob_choice: Their names were
  chosen_spanish: Y sus nombres eran
  alternatives_spanish:
  - Y sus nombres fueron
  - Ahora bien, sus nombres eran
  lexicon: HALOT
  rationale: La construcción hebrea introduce la identificación de las dos mujeres; en español, 'sus nombres eran' conserva la formulación directa sin forzar una perífrasis innecesaria.
- source_word: אָהֳלָה
  english_pob_choice: Oholah
  chosen_spanish: Oholá
  alternatives_spanish:
  - Oholah
  - Aholá
  lexicon: HALOT
  rationale: Se translitera el nombre propio con adaptación gráfica mínima al español para lectura natural, manteniendo el mismo referente y la posible alusión nominal.
- source_word: הַגְּדוֹלָה
  english_pob_choice: the elder
  chosen_spanish: la mayor
  alternatives_spanish:
  - la mayor de edad
  - la más grande
  lexicon: HALOT
  rationale: En el contexto de dos hermanas, el comparativo señala antigüedad/edad relativa, no tamaño; 'la mayor' es la forma española más natural y fiel.
- source_word: וְאָהֳלִיבָה אֲחוֹתָהּ
  english_pob_choice: and Oholibah her sister
  chosen_spanish: y Oholibá su hermana
  alternatives_spanish:
  - y su hermana Oholibá
  - y Oholibá, su hermana
  lexicon: HALOT
  rationale: Se mantiene la relación appositiva entre nombre y parentesco con orden natural en español, sin añadir elementos interpretativos.
- source_word: וַתִּהְיֶינָה לִי
  english_pob_choice: They became mine
  chosen_spanish: Y fueron míos
  alternatives_spanish:
  - Y llegaron a ser míos
  - Y se hicieron míos
  lexicon: HALOT
  rationale: La frase expresa pertenencia/relación de posesión en clave pactual; 'fueron míos' conserva la ambigüedad del hebreo y evita especificar 'esposas' o una lectura más estrecha.
- source_word: וַתֵּלַדְנָה
  english_pob_choice: bore
  chosen_spanish: dieron a luz
  alternatives_spanish:
  - parieron
  - engendraron
  lexicon: HALOT
  rationale: El verbo hebreo de dar a luz se vierte con una expresión natural y precisa en español; 'dieron a luz' mantiene el sentido maternal sin dureza innecesaria.
- source_word: בָּנִים וּבָנוֹת
  english_pob_choice: sons and daughters
  chosen_spanish: hijos e hijas
  alternatives_spanish:
  - hijos y hijas
  - varones y mujeres
  lexicon: HALOT
  rationale: Aunque el hebreo distingue el género de la descendencia, en español 'hijos e hijas' es la manera idiomática de preservar esa distinción sin sonar artificial.
- source_word: וּשְׁמוֹתָן
  english_pob_choice: 'As for their names:'
  chosen_spanish: 'En cuanto a sus nombres:'
  alternatives_spanish:
  - 'Y en cuanto a sus nombres:'
  - 'Respecto de sus nombres:'
  lexicon: HALOT
  rationale: La segunda ocurrencia funciona de modo resumptivo y explicativo; esta fórmula marca el giro interpretativo de manera clara en español.
- source_word: שֹׁמְר֣וֹן אָהֳלָ֔ה
  english_pob_choice: Samaria is Oholah
  chosen_spanish: Samaria es Oholá
  alternatives_spanish:
  - Samaria, Oholá
  - Oholá es Samaria
  lexicon: HALOT
  rationale: El hebreo identifica a la figura alegórica con la ciudad; en español, la cópula explícita hace visible la ecuación sin perder el valor simbólico.
- source_word: וִירוּשָׁלִַם אָהֳלִיבָה
  english_pob_choice: and Jerusalem is Oholibah
  chosen_spanish: y Jerusalén es Oholibá
  alternatives_spanish:
  - y Jerusalén, Oholibá
  - Oholibá es Jerusalén
  lexicon: HALOT
  rationale: Como en la cláusula paralela, se conserva la identificación simbólica con una cópula explícita y una transliteración consistente del nombre.
theological_decisions:
- issue: Sentido de וַתִּהְיֶינָה לִי en el marco alegórico
  english_pob_reading: Covenantal belonging/relationship is expressed without specifying marriage terminology in the main text.
  chosen_spanish_reading: Pertenencia/relación pactual expresada sin introducir explícitamente lenguaje matrimonial en el texto principal.
  alternative_spanish_readings:
  - Fueron mis esposas
  - Eran mías
  rationale: El hebreo de este versículo dice literalmente que 'fueron para mí' o 'fueron míos', pero no añade el término 'esposas'. En español, 'fueron míos' preserva la tensión entre posesión, relación y trasfondo pactual sin resolverla de antemano.
  doctrine_reference: Preservar la tensión textual y alegórica sin ampliar el contenido más allá del verso.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y coincide sustancialmente con la solución auditada en inglés: conserva la transliteración de los nombres propios, la comparación de edad (''la mayor''), la relación pactual de ''fueron míos'', y la identificación resumptiva de Samaria y Jerusalén. No se detectaron revisiones posteriores que alteren la decisión de fondo.'
  spanish_consistency_notes:
  - 'Se mantiene una transliteración consistente: Oholá / Oholibá.'
  - Se prefirió 'la mayor' por contexto fraternal, no 'la grande'.
  - '''Fueron míos'' evita introducir ''esposas'' en el texto principal, preservando la ambigüedad controlada del hebreo.'
  - La segunda mitad del verso se marca con 'En cuanto a' para reflejar el giro resumptivo del hebreo.
