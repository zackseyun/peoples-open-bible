lexical_decisions:
- source_word: אָדָם
  english_pob_choice: Adam
  chosen_spanish: Adán
  alternatives_spanish:
  - hombre
  - humanidad
  lexicon: HALOT
  rationale: En esta genealogía, אָדָם funciona como nombre propio, no como sustantivo común. Por eso se translitera según la convención española estándar como Adán, en lugar de traducirlo por 'hombre' o 'humanidad', que corresponderían a otros contextos.
- source_word: שֵׁת
  english_pob_choice: Seth
  chosen_spanish: Set
  alternatives_spanish:
  - Seth
  lexicon: HALOT
  rationale: Es un nombre propio en una lista genealógica. En español bíblico, la forma breve tradicional y transparente es 'Set', que representa adecuadamente el nombre hebreo.
- source_word: אֱנוֹשׁ
  english_pob_choice: Enosh
  chosen_spanish: Enós
  alternatives_spanish:
  - Enosh
  - Enos
  lexicon: HALOT
  rationale: Es un nombre propio en genealogía. 'Enós' mantiene la forma española tradicional y refleja de manera natural la vocalización hebrea; 'Enosh' sería más transliterado al inglés y 'Enos' refleja tradición inglesa antigua.
theological_decisions:
- issue: Lectura de אָדָם como nombre propio en una genealogía
  english_pob_reading: Adam as a personal name
  chosen_spanish_reading: Adán como nombre propio
  alternative_spanish_readings:
  - hombre
  - humanidad
  rationale: La forma breve de la serie genealógica exige un individuo nombrado, no una referencia genérica a la humanidad. Mantener Adán preserva la lectura histórica y literaria del texto.
  doctrine_reference: 'DOCTRINE.md: contested terms table for אָדָם; Translation philosophy §2'
translation_notes:
  revision_awareness: 'El contexto de auditoría en inglés no requirió cambios: la decisión principal fue conservar los tres nombres propios como nombres propios, con equivalentes españoles transparentes y tradicionales. No hubo revisiones aplicadas en el último pase.'
  spanish_consistency_notes:
  - 'Se mantuvo una solución uniforme de nombres propios bíblicos: Adán, Set, Enós.'
  - Se evitó calcar la forma inglesa 'Enosh' cuando el español dispone de una forma tradicional clara y reconocible.
  - La nota sobre אָדָם preserva la tensión lexical documentada sin introducir una lectura ajena al contexto genealógico.
