lexical_decisions:
- source_word: יוֹאֵל
  english_pob_choice: Joel
  chosen_spanish: Joel
  alternatives_spanish:
  - Yoel
  lexicon: HALOT
  rationale: Nombre propio; se translitera al español de forma estándar como Joel.
- source_word: הָרֹאשׁ
  english_pob_choice: the chief
  chosen_spanish: el jefe
  alternatives_spanish:
  - el cabeza
  - el líder
  lexicon: HALOT
  rationale: רֹאשׁ literalmente es 'cabeza', pero en un contexto administrativo o de rango expresa primacía o jefatura. 'El jefe' transmite la función de manera natural en español sin perder la idea de liderazgo.
- source_word: וְשָׁפָם
  english_pob_choice: Shapham
  chosen_spanish: Shafán
  alternatives_spanish:
  - Safán
  - Shafam
  lexicon: HALOT
  rationale: Nombre propio; se translitera con una forma española legible. Se prefiere mantener la forma personal del nombre sin traducirlo.
- source_word: הַמִּשְׁנֶה
  english_pob_choice: the second
  chosen_spanish: el segundo
  alternatives_spanish:
  - el deputy
  - el segundo en rango
  lexicon: HALOT
  rationale: מִשְׁנֶה indica posición secundaria o segundo rango. 'El segundo' conserva la estructura appositiva breve del hebreo y evita añadir una interpretación más fuerte que el texto no exige.
- source_word: וְיַעְנַי
  english_pob_choice: Jaanai
  chosen_spanish: Jaánai
  alternatives_spanish:
  - Jaanai
  - Yaánai
  lexicon: HALOT
  rationale: Nombre propio; se translitera al español conservando la secuencia vocálica lo mejor posible.
- source_word: וְשָׁפָט
  english_pob_choice: Shaphat
  chosen_spanish: Safat
  alternatives_spanish:
  - Shafat
  - Safát
  lexicon: HALOT
  rationale: Nombre propio; se translitera con una forma española sencilla y publicable, manteniendo la identidad del nombre.
- source_word: בַּבָּשָׁן
  english_pob_choice: in Bashan
  chosen_spanish: en Basán
  alternatives_spanish:
  - en el Basán
  lexicon: HALOT
  rationale: Topónimo con preposición; en español bíblico es natural 'en Basán'. Se conserva el nombre geográfico sin añadir artículo innecesario.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés están en alto acuerdo y no muestran revisiones aplicadas; por eso el español sigue de cerca la estructura nominal breve del original, preservando la ambigüedad controlada de הַמִּשְׁנֶה con una nota alternativa.
  spanish_consistency_notes:
  - Se mantiene el nombre divino ausente; no aplica la convención Yahvé/SEÑOR.
  - Se conserva la lista nominal sin verbo, conforme al hebreo y al inglés auditado.
  - Se evita introducir artículos o conectores adicionales que alteren la economía del versículo.
