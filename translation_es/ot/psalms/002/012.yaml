translation:
  language: es
  text: Besen al hijo[a], no sea que se enoje y perezcan en el camino, porque su ira arde pronto[c][b]. Dichosos todos los que se refugian en él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Rindan homenaje al hijo». El verbo significa literalmente «besar» y puede denotar un gesto de sumisión u homenaje en un contexto real.'
    reason: lexical_alternative
  - marker: b
    text: El hebreo bar es inusual aquí. Suele entenderse como «hijo», en consonancia con Salmo 2:7, pero algunos proponen alternativas como «pureza» o «puramente».
    reason: alternative_reading
  - marker: c
    text: 'O: «porque su ira se enciende por poco» / «porque su ira arderá dentro de poco». La expresión hebrea es compacta y puede destacar tanto la brevedad como la inmediatez.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נַשְּׁקוּ
  english_pob_choice: Kiss
  chosen_spanish: Besen
  alternatives_spanish:
  - Rindan homenaje
  - Saluden con un beso de sumisión
  lexicon: HALOT
  rationale: El imperativo plural de נשׁק conserva el sentido básico de ‘besar’. En este contexto real, el gesto puede implicar sumisión u homenaje, pero el texto principal mantiene el verbo concreto para preservar la imagen hebrea y no suavizarla en paráfrasis.
- source_word: בַר
  english_pob_choice: the son
  chosen_spanish: al Hijo
  alternatives_spanish:
  - a la pureza
  - puramente
  - al hijo
  lexicon: HALOT
  rationale: En este salmo real, ‘bar’ se entiende mejor como ‘hijo’ en continuidad con el lenguaje filial de Salmo 2:7. En español, ‘al Hijo’ comunica naturalmente el referente y conserva la lectura filial/real, sin borrar que el hebreo es inusual y discutido.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: para que no
  alternatives_spanish:
  - no sea que
  - lest
  lexicon: HALOT
  rationale: פֶּן expresa finalidad negativa o prevención. ‘Para que no’ es natural en español bíblico moderno y mantiene el valor de advertencia sin forzar un calco anglicado.
- source_word: יֶאֱנַף
  english_pob_choice: he be angry
  chosen_spanish: se enoje
  alternatives_spanish:
  - se irrite
  - se airé
  lexicon: HALOT
  rationale: El verbo remite a enojo/ira. ‘Se enoje’ es claro y digno en español, y preserva el sujeto personal del hebreo en la cláusula de advertencia.
- source_word: וְתֹאבְדוּ
  english_pob_choice: and you perish
  chosen_spanish: y perezcan
  alternatives_spanish:
  - y sean destruidos
  - y desaparezcan
  lexicon: HALOT
  rationale: אָבַד se traduce bien por ‘perecer’ en un tono poético y solemne. Se conserva la advertencia de ruina sin especificar de más el modo de destrucción.
- source_word: דֶרֶךְ
  english_pob_choice: in the way
  chosen_spanish: en el camino
  alternatives_spanish:
  - por el camino
  - en la senda
  lexicon: HALOT
  rationale: El hebreo es comprimido y no lleva preposición. ‘En el camino’ reproduce bien la brevedad y admite la idea de perecer mientras se sigue una trayectoria o camino.
- source_word: כִּי יִבְעַר כִּמְעַט אַפּוֹ
  english_pob_choice: for his anger burns quickly
  chosen_spanish: porque su ira arde pronto
  alternatives_spanish:
  - porque su ira se enciende un poco
  - porque su ira arde por un momento
  - porque su ira se inflama enseguida
  lexicon: HALOT
  rationale: El giro hebreo es denso y admite tanto brevedad como inmediatez. ‘Arde pronto’ comunica la metáfora del fuego y la idea de prontitud/súbita inflamación sin borrar la ambigüedad del original, que se conserva también en la nota de alternativa.
- source_word: אַשְׁרֵי
  english_pob_choice: Blessed are
  chosen_spanish: Dichosos
  alternatives_spanish:
  - Bienaventurados
  - Felices
  lexicon: HALOT
  rationale: La fórmula de bienaventuranza en los Salmos se puede rendir por ‘Dichosos’ en español moderno, que suena natural y conserva el tono declarativo de favor y ventura sin depender de un registro eclesiástico fijo.
- source_word: חֹסֵי בוֹ
  english_pob_choice: all who take refuge in him
  chosen_spanish: todos los que se refugian en él
  alternatives_spanish:
  - todos los que buscan refugio en él
  - todos los que confían en él
  lexicon: HALOT
  rationale: חסה expresa buscar amparo/protección. ‘Se refugian en él’ conserva la imagen de abrigo y resguardo, muy apropiada al contexto real del salmo.
theological_decisions:
- issue: Identidad de בַר en Salmo 2:12
  english_pob_reading: The son, in continuity with Psalm 2:7 and the psalm’s royal/messianic trajectory.
  chosen_spanish_reading: al Hijo, en continuidad con el lenguaje filial y real de Salmo 2:7.
  alternative_spanish_readings:
  - a la pureza
  - puramente
  - como hijo
  rationale: La lectura filial encaja mejor con el contexto inmediato y con la línea real del salmo. La traducción española mantiene esa referencia sin convertir el versículo en una paráfrasis doctrinal, y deja visible que el hebreo es un crux interpretativo.
  doctrine_reference: Preservar la tensión interpretativa sin suprimir la primacía del texto original.
- issue: Valor de כִּי יִבְעַר כִּמְעַט אַפּוֹ
  english_pob_reading: His anger burns quickly / may blaze in a little while.
  chosen_spanish_reading: su ira arde pronto.
  alternative_spanish_readings:
  - su ira arde un poco
  - su ira se inflama enseguida
  - su ira se enciende por un momento
  rationale: La frase hebrea es compacta y puede señalar prontitud o brevedad. ‘Arde pronto’ mantiene esa tensión sin fijarla de manera demasiado estrecha, y conserva la imagen de fuego presente en el verbo.
  doctrine_reference: Mantener la ambigüedad legítima del hebreo en lugar de resolverla por completo.
translation_notes:
  revision_awareness: La redacción sigue el trazo del texto hebreo y la línea de decisión del POB inglés sin cambios sustantivos respecto del pase más reciente; se conservan la lectura filial de בַר y la ambigüedad de כִּמְעַט en una forma española publicable.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiere; aquí no aparece el Tetragrámaton.
  - Se mantiene «Hijo» con mayúscula por la lectura filial/real del contexto poético, no como normalización dogmática.
  - «Dichosos» se eligió por naturalidad en español y para sostener el tono de bienaventuranza.
  - No se introduce «Cristo» porque el hebreo aquí no lo exige y el POB inglés no lo fijó en la base textual.
