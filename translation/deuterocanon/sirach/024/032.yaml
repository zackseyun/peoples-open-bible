  from: I will again make instruction shine like the dawn, and I will make these things clear far into the distance.
  to: I will again make instruction shine like the dawn, and I will bring these things to light far into the distance.
  rationale: The verb ἐκφαίνω literally means 'to bring to light', 'to reveal', or 'to make manifest'. Given the strong light imagery in the first half of the verse (φωτιῶ, 'make shine'; ὄρθρον, 'dawn'), translating ἐκφανῶ as 'bring to light' or 'reveal' preserves the author's poetic metaphor much better than the more abstract 'make clear'. 'Bring these things to light' maintains the neuter plural of αὐτὰ while keeping the visual imagery intact.
