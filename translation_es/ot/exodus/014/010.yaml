revisions:
- from: Cuando el faraón se acercó[a], los hijos de Israel levantaron sus ojos, y he aquí que Egipto iba marchando detrás de ellos; y tuvieron mucho temor[b], y los hijos de Israel clamaron a Yahvé.
  to: Cuando el faraón se acercó, los hijos de Israel levantaron sus ojos, y he aquí que los egipcios[a] iban marchando detrás de ellos; y tuvieron mucho temor, y los hijos de Israel clamaron a Yahvé[b].
  rationale: Se corrige «Egipto» a «los egipcios» para reflejar con claridad el referente contextual y la revisión auditada del POB inglés, sin perder la huella formal del hebreo gracias a una nota. También se reubica la nota sobre «Egipto» al lugar correcto y se restaura la nota alternativa para «los hijos de Israel», que era la opción documentada en el expediente inglés.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:44:46Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca la sintaxis y el sentido general del hebreo: הִקְרִיב = «se acercó», וַיִּשְׂאוּ ... אֶת עֵינֵיהֶם = «levantaron sus ojos», וְהִנֵּה = «he aquí», וַיִּצְעֲקוּ = «clamaron», y יְהוָה = «Yahvé». Sin embargo, falla en un punto importante del rastro auditado del POB inglés y del referente contextual: מִצְרַיִם en este versículo se entiende como la fuerza egipcia perseguidora, y el inglés auditado fue revisado explícitamente a «the Egyptians were marching after them». Mantener «Egipto iba marchando» en español suena menos natural y personifica al país de forma confusa.'
  spanish_quality_summary: 'El español es en general digno y legible, pero «Egipto iba marchando detrás de ellos» resulta torpe y menos claro que «los egipcios iban marchando detrás de ellos». Además, la nota [a] está mal anclada: aparece sobre «se acercó», aunque explica «Egipto/los egipcios». La nota [b] tampoco corresponde al rastro inglés, que preserva la alternativa para «los hijos de Israel», no para «tuvieron mucho temor».'
  glossary_alignment: Alinea bien con el glosario del proyecto en «Yahvé» y «los hijos de Israel». No hay conflicto terminológico mayor aparte de la elección de «Egipto», que contradice la revisión auditada del POB inglés hacia un referente humano/colectivo. Conviene conservar «los hijos de Israel» en el texto y usar la nota alternativa para «los israelitas», como en el inglés.
  issues:
  - severity: high
    issue: «Egipto iba marchando detrás de ellos» no refleja bien la revisión auditada del POB inglés ni la referencia contextual.
    rationale: Aunque el hebreo usa el singular מִצְרַיִם, el propio expediente indica que en contexto designa a la fuerza egipcia; por eso el inglés fue revisado a «the Egyptians were marching after them». En español, «Egipto iba marchando» suena poco natural y puede confundir al lector.
  - severity: high
    issue: La nota [a] está colocada en el lugar equivocado.
    rationale: La nota explica la forma hebrea «Egipto», pero el marcador está unido a «se acercó» en vez de al sintagma correspondiente de la fuerza perseguidora. Esto rompe la trazabilidad entre texto y nota.
  - severity: medium
    issue: La nota [b] no preserva la alternativa documentada por el POB inglés.
    rationale: El expediente inglés usa la nota b para ofrecer «the Israelites» como alternativa a «the sons of Israel». El borrador español la reemplaza por una observación sobre «tuvieron mucho temor», perdiendo una decisión lexical auditada pertinente.
  - severity: low
    issue: «Tuvieron mucho temor» es aceptable, pero «tuvieron mucho miedo» o «temieron mucho» serían más naturales.
    rationale: No es infiel al hebreo, pero el giro con sustantivo suena algo rígido en español contemporáneo. Aun así, puede mantenerse si se desea un registro más solemne.
  revised_spanish_text: Cuando el faraón se acercó, los hijos de Israel levantaron sus ojos, y he aquí que los egipcios[a] iban marchando detrás de ellos; y tuvieron mucho temor, y los hijos de Israel clamaron a Yahvé[b].
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «Egipto»; el nombre singular representa aquí a la fuerza egipcia que los perseguía.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «los israelitas», por «los hijos de Israel».'
    reason: lexical_alternative
  revision_rationale: Se corrige «Egipto» a «los egipcios» para reflejar con claridad el referente contextual y la revisión auditada del POB inglés, sin perder la huella formal del hebreo gracias a una nota. También se reubica la nota sobre «Egipto» al lugar correcto y se restaura la nota alternativa para «los hijos de Israel», que era la opción documentada en el expediente inglés.
