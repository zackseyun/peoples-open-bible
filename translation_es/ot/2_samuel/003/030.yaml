translation:
  language: es
  text: Y[a] Joab y Abisai su hermano mataron a Abner porque él había matado a Asael, hermano de ellos, en Gabaón en la batalla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Así Joab y Abisai su hermano mataron a Abner». La conjunción hebrea también puede traducirse simplemente «Y»; aquí «Y» suena más natural en español, mientras que «Así» hace explícita la conexión explicativa con el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ / וַ
  english_pob_choice: So
  chosen_spanish: Así
  alternatives_spanish:
  - Y
  - Entonces
  lexicon: HALOT
  rationale: La conjunción introduce una conexión inferencial y resumidora con el contexto previo. «Así» conserva esa relación sin sonar forzado en español; «Y» sería posible pero menos explícito en el enlace discursivo.
- source_word: הָרְגוּ
  english_pob_choice: killed
  chosen_spanish: mataron
  alternatives_spanish:
  - dieron muerte a
  - asesinaron
  lexicon: HALOT
  rationale: El verbo básico הרג se expresa de manera directa con «mataron». «Asesinaron» añadiría una valoración legal o moral no explicitada en el hebreo; «dieron muerte a» es más perífrastico de lo necesario.
- source_word: לְאַבְנֵר
  english_pob_choice: Abner
  chosen_spanish: a Abner
  alternatives_spanish:
  - contra Abner
  lexicon: HALOT
  rationale: Aunque la construcción hebrea usa ל con el objeto, en español natural se expresa como objeto directo con «a Abner». «Contra Abner» conservaría más de cerca la preposición, pero suena menos idiomático y podría sugerir hostilidad más que el simple objeto verbal.
- source_word: עַל אֲשֶׁר
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - por cuanto
  - a causa de que
  lexicon: HALOT
  rationale: La secuencia introduce la causa de la acción. «Porque» reproduce con claridad la relación explicativa que el inglés POB ya señaló.
- source_word: הֵמִית
  english_pob_choice: had killed
  chosen_spanish: había matado
  alternatives_spanish:
  - mató
  - había dado muerte
  lexicon: HALOT
  rationale: El perfecto hebreo en relación con la acción posterior se vierte mejor con pluscuamperfecto español. «Había matado» mantiene la anterioridad temporal respecto de la muerte de Abner.
- source_word: אֲחִיו / אֲחִיהֶם
  english_pob_choice: his brother / their brother
  chosen_spanish: su hermano / su hermano
  alternatives_spanish:
  - su hermano / el hermano de ellos
  lexicon: HALOT
  rationale: 'El contexto distingue dos referencias: primero Abisai como hermano de Joab, y luego Asael como hermano de ambos. En español, el doble «su hermano» puede ser claro por el antecedente inmediato y el plural precedente; aun así, la repetición preserva la relación fraterna sin sobreexplicar.'
- source_word: בְּגִבְעוֹן
  english_pob_choice: at Gibeon
  chosen_spanish: en Gabaón
  alternatives_spanish:
  - en Gibeón
  - en la ciudad de Gabaón
  lexicon: HALOT
  rationale: «Gabaón» es la forma castellana tradicional y plenamente reconocible del topónimo. «En» es la preposición natural para ubicar un suceso en un lugar.
- source_word: בַּמִּלְחָמָה
  english_pob_choice: in the battle
  chosen_spanish: en la batalla
  alternatives_spanish:
  - en combate
  - durante la batalla
  lexicon: HALOT
  rationale: El artículo hebreo señala una batalla concreta ya conocida por el contexto narrativo. «En la batalla» conserva esa especificidad con una formulación natural en español.
theological_decisions:
- issue: Valor moral del verbo de muerte
  english_pob_reading: killed ... because he had killed
  chosen_spanish_reading: mataron ... porque había matado
  alternative_spanish_readings:
  - asesinaron ... porque había asesinado
  - dieron muerte ... porque había dado muerte
  rationale: El hebreo usa el verbo general הרג y el inglés POB evita introducir una calificación legal que el texto no explicita. En español, «mataron» y «había matado» conservan esa neutralidad descriptiva y dejan la valoración ética al contexto narrativo.
  doctrine_reference: Principio de no añadir una calificación moral no explicitada por el texto base
- issue: Relación de causalidad e inferencia narrativa
  english_pob_reading: So ... because ...
  chosen_spanish_reading: Así ... porque ...
  alternative_spanish_readings:
  - Y ... porque ...
  - Entonces ... porque ...
  rationale: La conexión no es solo aditiva; el verso resume o explica la conducta de Joab y Abisai a la luz del contexto previo. «Así» mantiene ese matiz inferencial sin forzar una interpretación doctrinal.
  doctrine_reference: Coherencia discursiva del relato histórico
translation_notes:
  revision_awareness: El inglés auditado fue revisado para quitar la coma antes de 'because'; la redacción española sigue esa versión fluida y no necesita marcar una variante textual o estilística adicional.
  spanish_consistency_notes:
  - Se mantiene un español neutro y eclesialmente legible, evitando hebraísmos innecesarios.
  - Se traduce el topónimo con la forma castellana tradicional «Gabaón» para claridad y continuidad bíblica.
  - No se añade nota al texto porque la ambigüedad del pronombre posesivo queda resuelta por el contexto inmediato y las decisiones léxicas documentadas.
