    text: Or 'brings forth wisdom.' The Hebrew verb evokes sprouting or bearing fruit.
    reason: lexical_alternative
  - marker: b
    text: Or 'the tongue of perversity' or 'the perverse tongue.' The Hebrew plural may emphasize repeated twisted speech.
    reason: lexical_alternative
