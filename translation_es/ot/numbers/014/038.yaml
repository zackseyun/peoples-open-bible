review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el hebreo y el rastro de auditoría inglés en la mayor parte: el contraste inicial con ‘Pero’, la identificación de Josué y Caleb, ‘permanecieron con vida’ para חָיוּ, y ‘de entre aquellos hombres’ para מִן הָאֲנָשִׁים הָהֵם son fieles y naturales. La relativa ‘que habían ido’ también representa adecuadamente הַהֹלְכִים en contexto retrospectivo. El único ajuste relevante es la consistencia léxica entre texto y nota al traducir לָתוּר: el texto usa ‘reconocer la tierra’, pero la nota presenta esa misma opción como alternativa, lo que vuelve la nota internamente defectuosa.'
  spanish_quality_summary: 'El español es claro, digno y eclesialmente legible. ‘Permanecieron con vida de entre aquellos hombres’ suena algo formal pero aceptable y fiel. El principal problema de calidad es editorial: la nota al pie duplica como alternativa la misma expresión ya usada en el texto. Conviene sustituirla por alternativas reales y mantener el texto principal tal como está, o cambiar el texto si se quisiera otra opción. No se requieren cambios de estilo mayores.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo, Espíritu, etc. Los nombres ‘Josué’, ‘Caleb’, ‘Nun’ y ‘Jefone’ son aceptables en español bíblico. La decisión ‘reconocer la tierra’ para תור es defendible y está en línea con la justificación lexical documentada, siempre que las alternativas de la nota sean distintas del texto principal.
  issues:
  - severity: medium
    issue: 'La nota al pie repite como alternativa la misma expresión del texto principal: ‘a reconocer la tierra’.'
    rationale: Una nota de alternativa léxica debe ofrecer lecturas alternativas reales. Tal como está, la nota crea inconsistencia editorial y reduce su utilidad para el lector.
  revised_spanish_text: Pero Josué hijo de Nun y Caleb hijo de Jefone permanecieron con vida de entre aquellos hombres que habían ido a reconocer la tierra[a].
  revised_footnotes:
  - marker: a
    text: O ‘a explorar la tierra’ o ‘a inspeccionar la tierra’.
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel al hebreo y natural en español. Solo se corrige la nota al pie para que contenga alternativas genuinas a ‘reconocer la tierra’, en concordancia con el propósito del aparato léxico.
