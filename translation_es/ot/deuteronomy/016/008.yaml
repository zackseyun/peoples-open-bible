translation:
  language: es
  text: Durante seis días comerás pan sin levadura[a], y el séptimo día habrá una asamblea solemne para Yahvé tu Dios; no harás ningún trabajo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una asamblea sagrada» o «una asamblea de clausura». El término hebreo denota una reunión festiva formal, probablemente con el matiz de una asamblea conclusiva.
    reason: lexical_alternative
lexical_decisions:
- source_word: שֵׁשֶׁת יָמִים
  english_pob_choice: For six days
  chosen_spanish: Durante seis días
  alternatives_spanish:
  - Por seis días
  - Seis días
  lexicon: HALOT
  rationale: La construcción expresa duración. «Durante seis días» transmite con naturalidad el marco temporal prescriptivo sin perder el valor de duración del hebreo.
- source_word: תֹּאכַל
  english_pob_choice: you shall eat
  chosen_spanish: comerás
  alternatives_spanish:
  - deberás comer
  - has de comer
  lexicon: HALOT
  rationale: En lenguaje legal, el imperfecto funciona como instrucción. «Comerás» conserva el valor prescriptivo de forma clara y digna en español.
- source_word: מַצּוֹת
  english_pob_choice: unleavened bread
  chosen_spanish: pan sin levadura
  alternatives_spanish:
  - panes sin levadura
  - pan ácimo
  lexicon: HALOT
  rationale: La expresión designa el alimento festivo de Pascua/los Panes sin Levadura. «Pan sin levadura» es la forma más clara y natural en español moderno; «pan ácimo» es posible pero menos transparente.
- source_word: וּבַיּוֹם הַשְּׁבִיעִי
  english_pob_choice: and on the seventh day
  chosen_spanish: y al séptimo día
  alternatives_spanish:
  - y en el séptimo día
  - pero al séptimo día
  lexicon: HALOT
  rationale: El hebreo introduce la segunda cláusula de manera simple. «Y al séptimo día» reproduce bien la secuencia temporal sin cargar un matiz adversativo no necesario.
- source_word: עֲצֶרֶת
  english_pob_choice: a solemn assembly
  chosen_spanish: una asamblea solemne
  alternatives_spanish:
  - una asamblea sagrada
  - una asamblea de clausura
  lexicon: HALOT
  rationale: El término indica una reunión festiva formal y restringida. «Asamblea solemne» mantiene el tono cultual y la ambigüedad lexical que el POB inglés conserva con su nota alternativa.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - de Yahvé
  lexicon: HALOT
  rationale: Se sigue la convención POB española de traducir el Tetragrámaton como «Yahvé». La preposición ל marca dedicación/relación; «para Yahvé» es natural en español y conserva esa relación cultual.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios y”, “el Dios tuyo
  lexicon: HALOT
  rationale: La fórmula de pacto se conserva de manera directa y reverente como «tu Dios».
- source_word: לֹא תַעֲשֶׂה מְלָאכָה
  english_pob_choice: you shall do no work
  chosen_spanish: no harás ningún trabajo
  alternatives_spanish:
  - no trabajarás
  - no harás trabajo alguno
  lexicon: HALOT
  rationale: «מְלָאכָה» en este contexto legal se refiere a labor/actividad ocupacional. «No harás ningún trabajo» es claro, formal y preserva la prohibición sin estrechar indebidamente el alcance.
theological_decisions:
- issue: Rendering the divine name יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: La edición POB en inglés preserva el nombre propio divino. En español, la forma establecida en este proyecto es «Yahvé», evitando la sustitución por «SEÑOR» y manteniendo el nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Nature of עֲצֶרֶת
  english_pob_reading: a solemn assembly
  chosen_spanish_reading: una asamblea solemne
  alternative_spanish_readings:
  - una asamblea sagrada
  - una asamblea de clausura
  rationale: 'No se borra la tensión lexical: el término puede implicar tanto solemnidad como clausura festiva. «Asamblea solemne» conserva el matiz culto sin decidir de forma excesiva entre las alternativas.'
  doctrine_reference: HALOT; English POB lexical note on עֲצֶרֶת
translation_notes:
  revision_awareness: El texto sigue de cerca el audit trail inglés y el hebreo base. No se aplicaron revisiones posteriores en el paquete fuente; se mantuvo la lectura aprobada de alto acuerdo, con adaptación idiomática al español y preservación de la nota lexical sobre עֲצֶרֶת.
  spanish_consistency_notes:
  - Se usó «Yahvé» conforme al estándar del proyecto para יהוה.
  - Se mantuvo «asamblea solemne» y se preservó la alternativa lexical en nota, sin simplificar a una sola interpretación.
  - «Pan sin levadura» comunica la función alimentaria del plural hebreo מַצּוֹת sin transliteración innecesaria.
  - La prohibición final se expresó como «no harás ningún trabajo» para reflejar la fuerza legal de לֹא תַעֲשֶׂה מְלָאכָה.
