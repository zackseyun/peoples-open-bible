id: 1CLEM.50
reference: 1 Clement 50
unit: chapter
book: 1 Clement
source:
  edition: Funk 1901 (normalized OCR)
  text: Ὁρᾶτε, ἀγαπητοί, πῶς μέγα καὶ θαυμαστόν ἐστιν ἡ ἀγάπη, καὶ τῆς τελειότητος αὐτῆς οὐκ ἔστιν ἐξήγησις. 2. τίς ἱκανὸς ἐν αὐτῇ εὑρεθῆναι, εἰ μὴ οὓς ἂν καταξιώσῃ ὁ θεός; δεηθῶμεν οὖν καὶ αἰτώμεθα ἀπὸ τοῦ ἐλέους αὐτοῦ, ἵνα ἐν ἀγάπῃ εὑρεθῶμεν δίχα προσκλίσεως ἀνθρωπίνης, ἄμωμοι. 3. αἱ γενεαὶ πᾶσαι ἀπὸ Ἀδὰμ ἕως τῆσδε τῆς ἡμέρας παρῆλθον, ἀλλ’ οἱ ἐν ἀγάπῃ τελειωθέντες κατὰ τὴν τοῦ θεοῦ χάριν ἔχουσιν χῶρον εὐσεβῶν, οἳ ₅ φανερωθήσονται ἐν τῇ ἐπισκοπῇ τῆς βασιλείας τοῦ Χριστοῦ. . γέγραπται γάρ· Εἰσέλθετε εἰς τὰ ταμεῖα μικρὸν ὅσον ὅσον, ἕως οὗ παρέλθῃ ἡ ὀργὴ καὶ ὁ θυμός μου, καὶ μνησθήσομαι ἡμέρας ἀγαθῆς, καὶ ἀναστήσω ὑμᾶς ἐκ τῶν θηκῶν ὑμῶν. . μακάριοι ἐσμὲν, ἀγαπητοί, εἰ τὰ προστάγματα τοῦ θεοῦ ἐποι₁₀ οῦμεν ἐν ὁμονοίᾳ ἀγάπης, εἰς τὸ ἀφεθῆναι ἡμῖν δι’ ἀγάπης τὰς ἁμαρτίας. 6. γέγραπται γάρ· Μακάριοι, ὧν ἀφέθησαν αἱ ἀνομίαι καὶ ὧν ἐπεκαλύφθησαν αἱ ἁμαρτίαι· μακάριος ἀνήρ, οὗ οὐ μὴ λογίσηται κύριος ἁμαρτίαν, οὐδέ ἐστιν ἐν τῷ στόματι αὐτοῦ δόλος. 7. οὗτος ὁ μακαρισμὸς ἐγένετο ἐπὶ τοὺς ἐκλελεγ₁₅ μένους ὑπὸ τοῦ θεοῦ διὰ Ἰησοῦ Χριστοῦ τοῦ κυρίου ἡμῶν, ᾧ ἡ δόξα εἰς τοὺς αἰῶνας τῶν αἰώνων. ἀμήν.
  language: Greek
