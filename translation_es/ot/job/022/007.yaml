translation:
  language: es
  text: No diste agua al cansado para beber[a], y al hambriento le retuviste pan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente 'pan'; puede usarse en sentido más amplio como 'alimento', pero se conserva el término concreto del texto fuente.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא
  english_pob_choice: no / not
  chosen_spanish: no / negaste
  alternatives_spanish:
  - no diste
  - no le diste
  lexicon: HALOT
  rationale: 'La negación gobierna ambas acusaciones. En español conviene distribuirla de modo natural en cada miembro: en la primera cláusula con una negación explícita y en la segunda con el verbo en forma negativa, sin perder el valor acusatorio.'
- source_word: מַיִם
  english_pob_choice: water
  chosen_spanish: agua
  alternatives_spanish:
  - agua para beber
  lexicon: HALOT
  rationale: El sustantivo común es 'agua'. En el contexto verbal de 'dar a beber', el sentido de agua potable queda claro sin añadir una paráfrasis excesiva.
- source_word: עָיֵף
  english_pob_choice: the weary
  chosen_spanish: el cansado
  alternatives_spanish:
  - el fatigado
  - el exhausto
  lexicon: HALOT
  rationale: El adjetivo describe a una persona agotada o rendida. 'El cansado' es natural en español y conserva el uso sustantivado general del hebreo.
- source_word: תַּשְׁקֶה
  english_pob_choice: you gave ... to drink
  chosen_spanish: diste ... para beber
  alternatives_spanish:
  - hiciste beber
  - dabas de beber
  lexicon: HALOT
  rationale: 'El hifil de שׁקה tiene valor causativo: ''dar de beber'' / ''hacer beber''. ''Diste ... para beber'' mantiene el sentido sin sonar forzado en español.'
- source_word: וּמֵרָעֵב
  english_pob_choice: and from the hungry
  chosen_spanish: y al hambriento
  alternatives_spanish:
  - y del hambriento
  - y al que tenía hambre
  lexicon: HALOT
  rationale: La construcción hebrea con מִן puede expresar privación respecto de una persona necesitada. En español, 'al hambriento' comunica con claridad la víctima de la negación de alimento.
- source_word: תִּמְנַע
  english_pob_choice: you withheld
  chosen_spanish: le negaste
  alternatives_spanish:
  - le negabas
  - le retenías
  lexicon: HALOT
  rationale: מנע implica retener o impedir. 'Negaste' comunica bien el acto moral de privar a alguien de lo debido y funciona con naturalidad junto a 'el pan'.
- source_word: לָחֶם
  english_pob_choice: bread
  chosen_spanish: el pan
  alternatives_spanish:
  - pan
  - alimento
  lexicon: HALOT
  rationale: Aunque puede abarcar 'alimento' en sentido amplio, se conserva el término concreto del hebreo. En español, 'pan' mantiene la imagen básica y el paralelismo con 'agua'.
translation_notes:
  revision_awareness: 'Se siguió el texto hebreo de Job 22:7 y el auditor inglés: la negación recae sobre dos acusaciones paralelas; se conserva la concreción de ''pan'' frente a la posible ampliación semántica ''alimento''. No hubo cambios relevantes respecto del trazado inglés.'
  spanish_consistency_notes:
  - Se mantuvo 'agua' y 'pan' como sustantivos concretos, en paralelo con el hebreo y con la auditoría inglesa.
  - '''El cansado'' y ''el hambriento'' conservan el uso sustantivado del adjetivo hebreo.'
  - La segunda cláusula se formuló con una negación verbal natural en español para reflejar el valor de לֹא sin rigidizar la sintaxis.
