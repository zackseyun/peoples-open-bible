translation:
  language: es
  text: No conocen, y no entienden; andan en tinieblas; se tambalean[a] todos los cimientos de la tierra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «tiemblan» o «ceden» para el verbo hebreo que aquí expresa inestabilidad.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «los cimientos del país», si אָרֶץ se toma en un sentido más local.'
    reason: alternative_reading
lexical_decisions:
- source_word: לֹא יָדְעוּ
  english_pob_choice: they do not know
  chosen_spanish: No conocen
  alternatives_spanish:
  - No han conocido
  - No saben
  lexicon: ידע
  rationale: ידע en Qal expresa aquí un estado de ignorancia. «No conocen» conserva el presente poético y suena natural en español, sin forzar un pasado que el contexto no exige.
- source_word: וְלֹא יָבִינוּ
  english_pob_choice: and they do not understand
  chosen_spanish: y no entienden
  alternatives_spanish:
  - ni disciernen
  - y no tienen entendimiento
  lexicon: בין
  rationale: בין en Hifil lleva la idea de comprender o discernir. «Entienden» mantiene el paralelismo con «conocen» y refleja bien el valor cognitivo del verbo.
- source_word: בַּחֲשֵׁכָה
  english_pob_choice: in darkness
  chosen_spanish: en tinieblas
  alternatives_spanish:
  - en oscuridad
  - en la oscuridad
  lexicon: חֲשֵׁכָה
  rationale: La imagen poética en español se expresa con naturalidad por «tinieblas», que conserva el carácter sombrío del término hebreo sin perder inteligibilidad.
- source_word: יִתְהַלָּכוּ
  english_pob_choice: they walk about
  chosen_spanish: andan
  alternatives_spanish:
  - caminan de un lado a otro
  - van y vienen
  lexicon: הלך (Hitpael)
  rationale: El hitpael sugiere movimiento continuo o habitual. «Andan» es breve y poético, y evita añadir una idea demasiado interpretativa como «de un lado a otro».
- source_word: יִמּוֹטוּ
  english_pob_choice: are shaken
  chosen_spanish: se tambalean
  alternatives_spanish:
  - tiemblan
  - se sacuden
  - se desploman
  lexicon: מוט (Niphal)
  rationale: El verbo puede implicar tambalearse, ceder o ser sacudido. «Se tambalean» preserva la idea de inestabilidad sin decidir de antemano si el colapso ya es completo.
- source_word: כָּל מוֹסְדֵי אָרֶץ
  english_pob_choice: all the foundations of the earth
  chosen_spanish: todos los cimientos de la tierra
  alternatives_spanish:
  - todos los fundamentos de la tierra
  - todos los cimientos del mundo
  lexicon: מוֹסְדֵי + אָרֶץ
  rationale: «Cimientos» comunica bien la metáfora de base o soporte. «Tierra» reproduce el valor cósmico de אָרֶץ en este contexto, acorde con la lectura del orden del mundo más que de un territorio local.
theological_decisions:
- issue: Alcance de אָרֶץ
  english_pob_reading: The foundations of the earth/world order are shaken, not merely a local land.
  chosen_spanish_reading: Los cimientos de la tierra representan el orden creado y su estabilidad, no solo una región local.
  alternative_spanish_readings:
  - los cimientos del país
  - los fundamentos de la tierra
  rationale: En el marco poético de Salmo 82, la imagen se amplía más allá de una geografía limitada. «Tierra» conserva ese alcance cósmico y la carga teológica de desestabilización del orden justo.
  doctrine_reference: Salmo 82; justicia divina sobre los gobernantes y el orden de la creación
translation_notes:
  revision_awareness: 'Coincide con la última pasada revisada: no hubo cambios necesarios en el análisis de base. La decisión española mantiene la tensión lexical de מוט entre tambaleo e inestabilidad, y conserva el alcance cósmico de אָרֶץ sin reducirlo a una lectura local.'
  spanish_consistency_notes:
  - Se mantiene «tierra» para אָרֶץ, en coherencia con el valor cósmico preferido por POB.
  - Se evita «SEÑOR» u otras sustituciones, pues no hay Tetragrámaton en este verso.
  - Se conserva un registro poético y público, apto para lectura congregacional.
