translation:
  language: es
  text: Pero quien me escucha habitará seguro y estará tranquilo[a], sin temor de desastre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y el que me oye habitará en seguridad y estará tranquilo, libre del temor de la calamidad».

      '
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשֹׁמֵעַ
  english_pob_choice: But whoever listens
  chosen_spanish: Pero quien me escucha
  alternatives_spanish:
  - Y el que me oye
  - Pero el que me escucha
  - Pero quien oye
  lexicon: HALOT
  rationale: El participio expresa una escucha continua y obediente, no solo percepción auditiva. En español, "escucha" comunica mejor esa receptividad activa que "oye". Mantengo el valor adversativo de la conjunción con "Pero" por el contraste implícito con el contexto anterior.
- source_word: לִי
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  - para mí
  lexicon: HALOT
  rationale: Después de "escucha", el complemento se expresa de forma natural en español como objeto directo/relativo pronominal "me". El hablante sigue siendo la Sabiduría personificada, sin expandirlo en el texto principal.
- source_word: יִשְׁכָּן
  english_pob_choice: will dwell
  chosen_spanish: habitará
  alternatives_spanish:
  - vivirá
  - morará
  - residirá
  lexicon: HALOT
  rationale: שכן tiene la idea de establecerse y habitar. "Habitará" conserva mejor esa imagen de residencia segura que el más general "vivirá".
- source_word: בֶּטַח
  english_pob_choice: securely
  chosen_spanish: seguro
  alternatives_spanish:
  - con seguridad
  - en seguridad
  - seguramente
  lexicon: HALOT
  rationale: En español, "habitará seguro" comunica de manera natural el estado de seguridad prometida. Mantiene el matiz de seguridad/protección sin sonar forzado.
- source_word: וְשַׁאֲנַן
  english_pob_choice: and be at ease
  chosen_spanish: estará en paz
  alternatives_spanish:
  - y estará tranquilo
  - y vivirá en calma
  - y estará sosegado
  lexicon: HALOT
  rationale: El término expresa quietud, reposo y tranquilidad. "Estará en paz" transmite esa serenidad estable en un español natural y digno; se evita "complaciente", que introduciría un matiz negativo ajeno al contexto.
- source_word: מִפַּחַד
  english_pob_choice: without fear of
  chosen_spanish: sin temor de
  alternatives_spanish:
  - sin miedo de
  - lejos del temor de
  - libre del temor de
  lexicon: HALOT
  rationale: La preposición מן con פחד indica separación/liberación de la amenaza temida. "Sin temor de" es una forma clara y fiel en español, equivalente al "without fear of" del audit trail.
- source_word: רָעָה
  english_pob_choice: disaster
  chosen_spanish: desastre
  alternatives_spanish:
  - calamidad
  - mal
  - ruina
  lexicon: HALOT
  rationale: En este contexto sapiencial, רעה no apunta principalmente a mal moral sino a desgracia concreta. "Desastre" comunica bien esa calamidad amenazante sin cargar el verso con una abstracción ética.
theological_decisions:
- issue: Sujeto genérico masculino del participio
  english_pob_reading: whoever listens
  chosen_spanish_reading: quien me escucha
  alternative_spanish_readings:
  - el que me escucha
  - quienquiera que me escuche
  rationale: El hebreo usa un participio masculino singular con valor genérico. "Quien" preserva la aplicabilidad universal en español sin restringir el sentido a varones, en línea con la decisión inglesa.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Habla de la Sabiduría personificada
  english_pob_reading: Retain first-person speech without interpretive expansion
  chosen_spanish_reading: Conservar la primera persona sin glosa en el texto principal
  alternative_spanish_readings:
  - quien escucha a la Sabiduría
  - quien me escucha, Sabiduría
  rationale: El verso continúa la voz directa de la Sabiduría. Mantener "me" sin aclaración interpretativa en el cuerpo del texto respeta el flujo del hebreo y evita añadir una expansión no presente en la fuente.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
translation_notes:
  revision_awareness: Revisión basada en el último pase del auditor inglés, que no requirió cambios y fue evaluado con alto acuerdo. Se mantuvo la equivalencia óptima y se cuidó la tensión léxica entre seguridad, tranquilidad y ausencia de temor, sin suavizarla en exceso.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como norma general cuando corresponda, pero este versículo no lo contiene.
  - Se evitó "SEÑOR" porque la voz es la Sabiduría personificada y no aparece el Tetragrámaton.
  - Se prefirió "escucha" frente a "oye" para conservar la obediencia implícita del participio.
  - '"Desastre" traduce el peligro concreto de רָעָה en contexto sapiencial, no un mal moral abstracto.'
