translation:
  language: es
  text: ¿Así le pagan a Yahvé[a], pueblo necio y sin sabiduría? ¿No es él tu Padre, el que te creó? Él te hizo y te estableció.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘el que te adquirió’, o ‘el que te compró’. El verbo hebreo puede significar adquirir, poseer o comprar; en algunos contextos también crear.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַיְהוָה / יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del texto hebreo, siguiendo la norma del proyecto para יהוה. En español, ‘Yahvé’ es la forma transparente y liturgicamente reconocible que evita la sustitución por un título.
- source_word: תִּגְמְלוּ
  english_pob_choice: repay
  chosen_spanish: pagan
  alternatives_spanish:
  - retribuyen
  - corresponden
  - tratan
  lexicon: HALOT
  rationale: El verbo expresa devolver trato o recompensa en una pregunta retórica de reprensión. ‘Pagan’ comunica bien la idea de retribuir a alguien por lo que ha hecho sin sonar arcaico.
- source_word: זֹאת
  english_pob_choice: this
  chosen_spanish: así
  alternatives_spanish:
  - esto
  - de esta manera
  lexicon: HALOT
  rationale: 'Aquí el demostrativo apunta al modo de actuar del pueblo. En español, ‘así’ fluye mejor dentro de la pregunta retórica: ‘¿Así le pagan...?’.'
- source_word: עַם נָבָל וְלֹא חָכָם
  english_pob_choice: O foolish and unwise people
  chosen_spanish: pueblo necio e insensato
  alternatives_spanish:
  - pueblo necio y no sabio
  - pueblo insensato y no sabio
  lexicon: HALOT
  rationale: נָבָל no es mera falta de inteligencia, sino necedad moral y vergonzosa; ‘necio’ conserva ese matiz bíblico. ‘Insensato’ traduce bien לֹא חָכָם en un registro natural y digno.
- source_word: הֲלוֹא
  english_pob_choice: Is he not
  chosen_spanish: ¿No es él
  alternatives_spanish:
  - ¿Acaso no es él?
  - ¿No lo es?
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica que espera asentimiento. ‘¿No es él?’ conserva la fuerza interrogativa y queda natural en español.
- source_word: אָבִיךָ
  english_pob_choice: your Father
  chosen_spanish: tu Padre
  alternatives_spanish:
  - tu padre
  lexicon: HALOT
  rationale: Se mantiene el parentesco de pacto entre Yahvé e Israel. La mayúscula en ‘Padre’ ayuda a identificar al referente divino sin añadir contenido doctrinal ajeno al hebreo.
- source_word: קָּנֶךָ
  english_pob_choice: created you
  chosen_spanish: el que te creó
  alternatives_spanish:
  - el que te adquirió
  - el que te compró
  - el que te poseyó
  lexicon: HALOT
  rationale: Aunque קנה puede significar adquirir, poseer o comprar, el contexto inmediato ya añade ‘Él te hizo y te estableció’. En español, ‘el que te creó’ comunica con claridad la relación de origen y encaja con la secuencia verbal, siguiendo la revisión inglesa posterior.
- source_word: עָשְׂךָ
  english_pob_choice: made you
  chosen_spanish: te hizo
  alternatives_spanish:
  - te formó
  - te creó
  lexicon: HALOT
  rationale: עָשָׂה aquí se refiere a la acción de Dios sobre Israel. ‘Te hizo’ es directo, preciso y mantiene la distinción con ‘te creó’/‘te estableció’.
- source_word: וַיְכֹנְנֶךָ
  english_pob_choice: established you
  chosen_spanish: te estableció
  alternatives_spanish:
  - te afirmó
  - te fundó
  - te asentó
  lexicon: HALOT
  rationale: כּוֹנֵן expresa dar firmeza o establecer sólidamente. ‘Te estableció’ reproduce bien ese sentido y evita redundancia impropia con ‘te hizo’.
theological_decisions:
- issue: Sentido de קנה aplicado a Dios
  english_pob_reading: who created you
  chosen_spanish_reading: el que te creó
  alternative_spanish_readings:
  - el que te adquirió
  - el que te compró
  - el que te poseyó
  rationale: El hebreo permite varios sentidos, pero en este versículo la secuencia ‘Padre / creó / hizo / estableció’ favorece una lectura de origen y constitución. Se preservan alternativas porque el verbo también puede implicar adquisición o posesión, tensión que algunos lectores querrán ver reflejada.
  doctrine_reference: 'Translation philosophy #3 y #5'
- issue: Paternidad divina en un contexto de reprensión
  english_pob_reading: your Father
  chosen_spanish_reading: tu Padre
  alternative_spanish_readings:
  - tu padre
  rationale: El texto atribuye a Yahvé una relación paterna con Israel. La mayúscula en ‘Padre’ es una convención editorial para claridad referencial, no una expansión doctrinal.
  doctrine_reference: 'Affirmations; Translation philosophy #6'
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió ‘acquired you’ por ‘created you’ para reflejar mejor קנה en este contexto junto con ‘made’ y ‘established’. El español sigue esa revisión y opta por ‘el que te creó’, manteniendo la distinción verbal con ‘te hizo’ y ‘te estableció’.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ para יהוה, conforme al criterio del proyecto.
  - Se mantiene ‘Padre’ con mayúscula al referirse a Dios.
  - ‘necio e insensato’ conserva el paralelismo moral del hebreo.
  - La nota a pie preserva la tensión léxica de קנה sin imponer una sola solución.
