translation:
  language: es
  text: Como el que se quita una prenda en un día frío, y como vinagre sobre natrón[a], así es el que canta canciones a un corazón afligido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vinagre sobre soda»; literalmente, «sobre natrón», es decir, sobre un álcali mineral. La imagen es la de una reacción áspera o perturbadora.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַעֲדֶה
  english_pob_choice: one who takes off
  chosen_spanish: el que se quita
  alternatives_spanish:
  - el que se despoja de
  - el que quita
  lexicon: HALOT
  rationale: El participio se entiende como la acción de retirar la prenda. En español, «se quita» conserva la imagen concreta y suena natural en un proverbio.
- source_word: בֶּגֶד
  english_pob_choice: a garment
  chosen_spanish: un vestido
  alternatives_spanish:
  - una prenda
  - un vestido
  lexicon: HALOT
  rationale: «Vestido» aquí funciona como prenda general en español bíblico moderno; evita sonar excesivamente técnico y mantiene la concreción del paralelismo.
- source_word: בְּיוֹם קָרָה
  english_pob_choice: on a cold day
  chosen_spanish: en un día frío
  alternatives_spanish:
  - en un día de frío
  - cuando hace frío
  lexicon: HALOT
  rationale: La expresión temporal se vuelve natural en español con «en un día frío», sin perder la fuerza situacional de la imagen.
- source_word: נָתֶר
  english_pob_choice: soda
  chosen_spanish: natrón
  alternatives_spanish:
  - soda
  - álcali mineral
  lexicon: HALOT
  rationale: Se preserva el referente histórico-mineral más preciso. Dado que el inglés POB aclara en nota que se trata de un álcali mineral, «natrón» comunica mejor el término hebreo y mantiene la tensión lexical.
- source_word: וְשָׁר בַּשִּׁרִים
  english_pob_choice: one who sings songs
  chosen_spanish: el que canta canciones
  alternatives_spanish:
  - el que canta cantos
  - un cantor de canciones
  lexicon: HALOT
  rationale: La construcción participial plural se rinde con una frase general y proverbial en español. «Canciones» conserva el plural del hebreo sin forzar un singular artificial.
- source_word: עַל לֶב רָע
  english_pob_choice: to a troubled heart
  chosen_spanish: a un corazón afligido
  alternatives_spanish:
  - a un corazón triste
  - a un corazón angustiado
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «sobre un corazón malo», el contexto sapiencial indica un estado interior dolorido o afligido, no necesariamente moralmente perverso. «Afligido» mantiene esa tensión sin moralizarla.
theological_decisions:
- issue: Sentido de לֶב רָע como estado interior, no juicio moral
  english_pob_reading: '''bad'' refers to a distressed or sorrowful inner condition, not necessarily moral evil.'
  chosen_spanish_reading: «corazón afligido»
  alternative_spanish_readings:
  - corazón triste
  - corazón angustiado
  - corazón malo
  rationale: La sabiduría proverbial aquí describe el efecto inadecuado de cantar alegrías ante alguien interiormente quebrantado. Traducir literalmente «corazón malo» oscurecería el sentido en español y sonaría como una acusación moral indebida.
  doctrine_reference: Sabiduría bíblica; semántica contextual del hebreo léb rā‘.
- issue: Imagen de reacción irritante entre vinagre y natrón
  english_pob_reading: The image is of an irritating or disruptive reaction.
  chosen_spanish_reading: vinagre sobre natrón
  alternative_spanish_readings:
  - vinagre sobre soda
  - vinagre sobre álcali
  rationale: Se conserva la imagen de incompatibilidad reactiva. «Natrón» es más preciso que «soda» para el trasfondo histórico del hebreo, y sigue siendo comprensible con el marco del proverbio.
  doctrine_reference: Símil sapiencial; fidelidad al referente material del texto.
translation_notes:
  revision_awareness: 'Se integró la revisión inglesa que sustituyó «or» por «and like» para reflejar mejor la serie de comparaciones paralelas. En español se reprodujo con dos miembros coordinados: «como ... , y como ... , así es ...». También se ajustó el segundo miembro a «natrón» para hacer más auditable el término hebreo נָתֶר, manteniendo la nota explicativa sobre su equivalente funcional.'
  spanish_consistency_notes:
  - Se mantuvo el paralelismo proverbial con dos comparaciones introducidas por «como».
  - Se evitó «SEÑOR» u otras convenciones no pertinentes, ya que el versículo no contiene el nombre divino.
  - «Corazón afligido» preserva la lectura contextual de לֶב רָע sin convertirla en juicio moral.
  - 'El orden español sigue el hebreo y la versión auditada: dos símiles y una cláusula final de conclusión.'
