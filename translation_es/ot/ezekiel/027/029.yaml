translation:
  language: es
  text: Y descenderán de sus naves[a] todos los que toman el remo; los marineros, todos los marineros del mar[b], estarán en tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de sus barcos». El hebreo dice literalmente «de sus naves».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «todos los hombres de mar». La redundancia de «marineros del mar» refleja el hebreo y su estilo poético.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָרְדוּ
  english_pob_choice: will come down
  chosen_spanish: descenderán
  alternatives_spanish:
  - bajarán
  - vendrán abajo
  lexicon: HALOT
  rationale: El hebreo expresa movimiento hacia abajo; en español, «descenderán» mantiene ese valor sin perder el tono elevado del lamento profético. «Bajarán» sería más llano, pero menos solemne.
- source_word: מֵאָנִיּוֹתֵיהֶם
  english_pob_choice: from their ships
  chosen_spanish: de sus naves
  alternatives_spanish:
  - de sus barcos
  - desde sus embarcaciones
  lexicon: HALOT
  rationale: «Naves» conserva un registro más formal y marítimo, adecuado al paralelismo poético. «De sus barcos» es más moderno, pero menos literario.
- source_word: כֹּל תֹּפְשֵׂי מָשׁוֹט
  english_pob_choice: all who handle the oar
  chosen_spanish: todos los que toman el remo
  alternatives_spanish:
  - todos los que empuñan el remo
  - todos los remeros
  lexicon: HALOT
  rationale: 'El hebreo es literal: quienes «toman/agarran» el instrumento. «Toman el remo» preserva la imagen concreta sin convertirla en una categoría técnica («remeros»), que sería más interpretativa.'
- source_word: מַלָּחִים
  english_pob_choice: the sailors
  chosen_spanish: los marineros
  alternatives_spanish:
  - los navegantes
  - los marinos
  lexicon: HALOT
  rationale: «Marineros» coincide con la decisión revisada del POB inglés y es natural en español. Mantiene el sentido de tripulantes del mar sin introducir un matiz excesivamente técnico.
- source_word: כֹּל חֹבְלֵי הַיָּם
  english_pob_choice: all the mariners of the sea
  chosen_spanish: todos los marineros del mar
  alternatives_spanish:
  - todos los seafarers del mar
  - todos los hombres del mar
  lexicon: HALOT
  rationale: El hebreo repite la idea de gente del mar para intensificar el paralelismo. Se conserva la repetición con «marineros del mar» porque refleja la forma fuente y la poética del pasaje; aunque suene enfático, esa redundancia es parte del efecto.
- source_word: אֶל הָאָרֶץ
  english_pob_choice: on the land
  chosen_spanish: en tierra
  alternatives_spanish:
  - sobre la tierra
  - a tierra
  lexicon: HALOT
  rationale: En contexto náutico, la oposición es estar en el mar versus estar en tierra. «En tierra» es idiomático y claro en español, manteniendo la imagen sin forzar una construcción más literal.
- source_word: יַעֲמֹדוּ
  english_pob_choice: will stand
  chosen_spanish: se pondrán
  alternatives_spanish:
  - permanecerán
  - estarán de pie
  lexicon: HALOT
  rationale: Aunque el verbo básico es «estar de pie/ponerse en pie», en español «se pondrán en tierra» comunica la escena de desembarco y posicionamiento en la costa de manera natural. Mantiene la idea de quedar de pie en tierra firme sin sonar rígido.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés: la revisión cambió «seamen» por «mariners» para un registro más formal; por eso se eligió «marineros» en ambos miembros paralelos y se conservó la repetición del hebreo. También se preservó la imagen concreta de «handle the oar» como «toman el remo», en vez de suavizarla a una categoría más interpretativa.'
  spanish_consistency_notes:
  - Se siguió el patrón POB de preservar paralelismo y redundancia cuando el hebreo la usa con intención poética.
  - No se introdujo terminología eclesiástica ajena al contexto marítimo; se mantuvo un registro literario claro.
  - La expresión final «en tierra» conserva la oposición mar/terra sin añadir una glosa explicativa en el texto principal.
