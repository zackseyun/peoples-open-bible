translation:
  language: es
  text: Y el limpio la rociará sobre el impuro el tercer día y el séptimo día; así lo purificará[a] el séptimo día. Luego lavará su ropa y se lavará con agua, y quedará limpio al atardecer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y lo limpiará»; el verbo hebreo aquí pertenece al mismo campo léxico que a menudo se asocia con el pecado o la purificación, pero en este contexto se refiere a la purificación ritual de la impureza.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִזָּה
  english_pob_choice: shall sprinkle
  chosen_spanish: rociará
  alternatives_spanish:
  - esparcirá
  - asperjará
  - rociará sobre
  lexicon: HALOT
  rationale: En este rito la acción es aplicar el agua de purificación por aspersión. «Rociará» comunica la acción cultual de forma natural en español; el complemento «sobre» explícita el destinatario del acto sin sobreparafrasear.
- source_word: הַטָּהֹר
  english_pob_choice: the clean person
  chosen_spanish: el limpio
  alternatives_spanish:
  - la persona limpia
  - el limpio/a
  lexicon: HALOT
  rationale: El adjetivo funciona sustantivamente. «El limpio» conserva esa fuerza y evita agregar «persona» donde el español puede sostener el sustantivo implícito; el contexto ritual ya delimita el referente.
- source_word: הַטָּמֵא
  english_pob_choice: the unclean person
  chosen_spanish: el impuro
  alternatives_spanish:
  - el inmundo
  - la persona impura
  - el contaminado
  lexicon: HALOT
  rationale: Para impureza ritual, «impuro» es el equivalente más transparente y menos arcaico. Mantiene el contraste técnico con «limpio» sin trasladarlo a una categoría moral.
- source_word: בַּיּוֹם הַשְּׁלִישִׁי וּבַיּוֹם הַשְּׁבִיעִי
  english_pob_choice: on the third day and on the seventh day
  chosen_spanish: el tercer día y el séptimo día
  alternatives_spanish:
  - al tercer día y al séptimo día
  - en el tercer día y en el séptimo día
  lexicon: HALOT
  rationale: La estructura temporal se expresa de forma natural en español sin repetir «en» antes de cada fecha. El sentido ritual queda claro y se conserva la secuencia exacta.
- source_word: וְחִטְּאֹו
  english_pob_choice: thus he shall purify him
  chosen_spanish: así lo purificará
  alternatives_spanish:
  - así lo limpiará
  - así lo purgará ritual-mente
  - así lo purificará de su impureza
  lexicon: HALOT
  rationale: En este contexto חטא en piel tiene valor de purificación ritual, no de perdón moral. «Lo purificará» reproduce ese valor; el pronombre «lo» recoge el objeto implícito del hebreo siguiendo la corrección auditada del inglés.
- source_word: וְכִבֶּס בְּגָדָיו
  english_pob_choice: he shall wash his clothes
  chosen_spanish: lavará sus vestidos
  alternatives_spanish:
  - lavará su ropa
  - lavará sus prendas
  lexicon: HALOT
  rationale: «Vestidos» conserva el registro bíblico y la concreción del hebreo, sin impedir comprensión. «Ropa» sería más general, pero menos preciso respecto de la referencia literal del texto.
- source_word: וְרָחַץ בַּמַּיִם
  english_pob_choice: bathe in water
  chosen_spanish: se lavará con agua
  alternatives_spanish:
  - se bañará con agua
  - se lavará en agua
  - se bañará en agua
  lexicon: HALOT
  rationale: El verbo רחץ aquí describe lavado corporal en el marco ritual. «Se lavará con agua» es claro en español y evita la posible ambigüedad de «bañarse» como inmersión completa no explicitada por el hebreo.
- source_word: וְטָהֵר
  english_pob_choice: he shall be clean
  chosen_spanish: quedará limpio
  alternatives_spanish:
  - será limpio
  - será purificado
  - quedará purificado
  lexicon: HALOT
  rationale: El verbo marca el estado resultante tras el lavado. «Quedará limpio» comunica claramente el resultado de restauración ritual en español contemporáneo.
- source_word: בָּעָרֶב
  english_pob_choice: at evening
  chosen_spanish: al atardecer
  alternatives_spanish:
  - por la tarde
  - al anochecer
  - en la tarde
  lexicon: HALOT
  rationale: «At evening» puede sonar algo literal en inglés; en español, «al atardecer» es una formulación natural y digna para indicar el momento en que se restablece la limpieza ritual.
theological_decisions:
- issue: Lenguaje de purificación ritual en חטא / טהר
  english_pob_reading: Render in terms of ritual purification rather than moral atonement
  chosen_spanish_reading: Traducir en términos de purificación ritual, no de expiación moral
  alternative_spanish_readings:
  - limpiará de pecado
  - hará expiación por él
  - lo limpiará de su pecado
  rationale: El contexto trata de impureza por contacto con cadáver, no de pecado moral. Por eso «purificará» conserva la fuerza ceremonial del hebreo sin introducir una lectura expiatoria que el verso no exige.
  doctrine_reference: Principio de fidelidad al sentido llano del texto; no importar categorías doctrinales ajenas al contexto inmediato.
- issue: Valor substantival de הַטָּהֹר / הַטָּמֵא
  english_pob_reading: Use 'person' rather than 'man'
  chosen_spanish_reading: Usar sustantivos adjetivales («el limpio», «el impuro») en vez de añadir «persona»
  alternative_spanish_readings:
  - la persona limpia / la persona impura
  - el hombre limpio / el hombre impuro
  rationale: El hebreo usa adjetivos sustantivados con valor representativo general. En español, el artículo más adjetivo mantiene la economía del original y evita una marcación de género innecesaria; el referente sigue siendo genérico dentro del rito.
  doctrine_reference: Principio de equivalencia funcional con precisión de género según el uso real del original.
- issue: Relación entre el objeto de «rociará» y el agua de purificación
  english_pob_reading: Added 'it' after 'sprinkle' for completeness, since the Hebrew implies sprinkling the purification water/mixture on the unclean person.
  chosen_spanish_reading: Explicitar el objeto pronominal con «lo» sin añadir un sustantivo inexistente en el verso
  alternative_spanish_readings:
  - rociará el agua sobre el impuro
  - rociará sobre el impuro
  rationale: El hebreo presupone el objeto del rociado, y el audit trail inglés señala esa implicación. En español, «lo purificará» preserva la referencia sin inventar una mención explícita de «agua» que el versículo no formula aquí.
  doctrine_reference: Fidelidad al texto base con el mínimo de explicitación necesario para claridad.
translation_notes:
  revision_awareness: El borrador sigue la última revisión auditada del inglés, que añadió el objeto implícito de «sprinkle» y mantuvo el resto del versículo. En español se reflejó esa decisión con un objeto pronominal en «rociará» y se preservó el sentido ritual de purificación, no expiación. También se atendió al valor substantival de los adjetivos hebreos y al cierre temporal «at evening», adaptado a una fórmula natural en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se evita «SEÑOR» y «Cristo» porque no corresponden al texto.
  - «Limpio/impuro» se usa en sentido ritual, no moral, para conservar el contraste técnico del hebreo.
  - El registro es bíblico pero contemporáneo; se evita la cadencia arcaizante innecesaria.
