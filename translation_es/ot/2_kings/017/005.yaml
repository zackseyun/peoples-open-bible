translation:
  language: es
  text: Entonces el rey de Asiria subió[a] por toda la tierra, y subió contra Samaria y la sitió durante tres años.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'subió a Samaria'; el hebreo puede significar simplemente 'subir' o un avance militar, pero el contexto inmediato ('la sitió') favorece aquí el sentido hostil.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - ascendió
  - vino contra
  - marchó
  lexicon: HALOT
  rationale: עלה conserva en español el valor básico de 'subir/ascender' y, en contexto militar, puede insinuar avance hostil. 'Subió' mantiene el idiomatismo hebreo sin forzar una paráfrasis excesiva; la hostilidad queda reforzada por 'contra Samaria' y 'la sitió'.
- source_word: מֶלֶךְ אַשּׁוּר
  english_pob_choice: the king of Assyria
  chosen_spanish: el rey de Asiria
  alternatives_spanish:
  - el rey asirio
  - Asiria's king
  lexicon: HALOT
  rationale: La construcción posesiva natural en español es 'el rey de Asiria'. 'Asirio' es posible, pero la forma con 'de Asiria' sigue de cerca el constructo hebreo y evita un adjetivo que podría sonar menos preciso en este contexto narrativo.
- source_word: בְּכָל הָאָרֶץ
  english_pob_choice: throughout all the land
  chosen_spanish: por toda la tierra
  alternatives_spanish:
  - a través de toda la tierra
  - por todo el país
  - en toda la tierra
  lexicon: HALOT
  rationale: El hebreo puede indicar avance a lo largo de un territorio. 'Por toda la tierra' conserva el sentido de desplazamiento territorial y resulta natural en español. 'Tierra' preserva el alcance amplio del término sin limitarlo innecesariamente a una entidad política moderna.
- source_word: וַיַּעַל שֹׁמְרוֹן
  english_pob_choice: he went up against Samaria
  chosen_spanish: subió contra Samaria
  alternatives_spanish:
  - subió a Samaria
  - atacó Samaria
  - marchó contra Samaria
  lexicon: HALOT
  rationale: El POB inglés opta por explicitar el sentido hostil de עלה con objeto urbano. En español, 'subió contra Samaria' conserva el idiomatismo de 'subir' y la dirección hostil; 'a Samaria' quedaría demasiado neutro, y 'atacó' introduce una interpretación más explícita que el hebreo por sí solo.
- source_word: וַיָּצַר עָלֶיהָ
  english_pob_choice: besieged it
  chosen_spanish: la sitió
  alternatives_spanish:
  - puso sitio a ella
  - asedió la ciudad
  - la cercó
  lexicon: HALOT
  rationale: צור en este contexto militar significa 'asediar/sitiar'. 'La sitió' es la forma española más natural y fiel. 'Sitiar' también preserva el valor técnico, mientras que 'cercó' podría debilitar el matiz de asedio prolongado.
- source_word: שָׁלֹשׁ שָׁנִים
  english_pob_choice: for three years
  chosen_spanish: durante tres años
  alternatives_spanish:
  - por tres años
  - tres años
  lexicon: HALOT
  rationale: En español, la duración de una acción continua se expresa con naturalidad mediante 'durante'. Así se conserva el valor aspectual del asedio prolongado sin añadir contenido ajeno al texto.
translation_notes:
  revision_awareness: El texto español sigue de cerca el hebreo y coincide con la lectura auditada del POB inglés; se conserva la ambigüedad básica de עלה mediante 'subió', pero el contexto militar se hace explícito por 'contra Samaria' y 'la sitió'. No se registraron revisiones sustantivas en el pasaje inglés auditado.
  spanish_consistency_notes:
  - Se usa 'Asiria' con construcción genitiva ('rey de Asiria') para mantener claridad y consistencia bíblica.
  - Se mantiene 'tierra' como equivalente amplio de הארץ en narrativa histórica, sin modernizar a 'país'.
  - '''Sitiar'' se reserva para el sentido militar técnico de צור en este versículo.'
  - La nota textual marca la alternativa 'subió a Samaria' para reflejar la ambigüedad idiomática documentada en el audit trail inglés.
