translation:
  language: es
  text: Ya no sacrificarán sus sacrificios a los demonios con forma de cabra[a], tras los cuales se prostituyen[b]. Esta será para ellos una ordenanza perpetua[c] por sus generaciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'a los ídolos-cabra' o 'a los sátiros'; el término hebreo se refiere a seres con rasgos de cabra asociados al culto ilícito.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''tras los cuales se prostituyen''; metáfora de infidelidad religiosa o idolatría.'
    reason: cultural_note
  - marker: c
    text: O 'un estatuto permanente' o 'una ordenanza eterna'.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִזְבְּחוּ
  english_pob_choice: shall no longer sacrifice
  chosen_spanish: No ofrecerán más sus sacrificios
  alternatives_spanish:
  - No sacrificarán más
  - No seguirán ofreciendo sacrificios
  lexicon: HALOT
  rationale: El hebreo con negación y valor legal expresa una prohibición continua; en español, 'no ofrecerán más' reproduce bien la idea de cese, y 'sacrificios' conserva el vínculo léxico con זבח/zebaj.
- source_word: עוֹד
  english_pob_choice: no longer
  chosen_spanish: más
  alternatives_spanish:
  - ya no
  - nunca más
  lexicon: HALOT
  rationale: Con negación, עוֹד marca continuación interrumpida. 'Más' en 'no... más' transmite de forma natural la idea de 'ya no/no longer' en español.
- source_word: זִבְחֵיהֶם
  english_pob_choice: their sacrifices
  chosen_spanish: sus sacrificios
  alternatives_spanish:
  - sus ofrendas sacrificiales
  - sus víctimas
  lexicon: HALOT
  rationale: Se conserva la repetición del campo sacrificial del verbo y del sustantivo, sin tecnicismo innecesario.
- source_word: לַשְּׂעִירִם
  english_pob_choice: to the goat-demons
  chosen_spanish: a los demonios-cabra
  alternatives_spanish:
  - a los demonios de cabra
  - a los ídolos-cabra
  - a los sátiros
  lexicon: HALOT
  rationale: El contexto cultual y la auditable decisión inglesa favorecen un referente personal/numinoso, no simples cabras. 'Demonios-cabra' comunica la imagen caprina sin importar una equivalencia mitológica ajena como 'sátiros'.
- source_word: זֹנִים אַחֲרֵיהֶם
  english_pob_choice: after whom they prostitute themselves
  chosen_spanish: tras quienes se prostituyen
  alternatives_spanish:
  - después de quienes se prostituyen
  - de quienes se hacen infieles
  lexicon: HALOT
  rationale: Se preserva la metáfora sexual de infidelidad cultual. 'Tras quienes' mantiene la relación de seguimiento del hebreo sin convertirla en una abstracción interpretativa.
- source_word: חֻקַּת עוֹלָם
  english_pob_choice: a permanent statute
  chosen_spanish: una ordenanza perpetua
  alternatives_spanish:
  - un estatuto permanente
  - una ley perpetua
  lexicon: HALOT
  rationale: '''Ordenanza'' es un término bíblico y legible en español para חֻקָּה; ''perpetua'' refleja el valor duradero de עוֹלָם sin sobrecargarlo con un matiz exclusivamente metafísico.'
- source_word: לְדֹרֹתָם
  english_pob_choice: throughout their generations
  chosen_spanish: por todas sus generaciones
  alternatives_spanish:
  - a través de sus generaciones
  - de generación en generación
  lexicon: HALOT
  rationale: La fórmula legal indica vigencia sucesiva; 'por todas sus generaciones' suena natural y mantiene el alcance generacional continuo.
theological_decisions:
- issue: Referencia de לַשְּׂעִירִם
  english_pob_reading: demonic beings represented with goat imagery ('goat-demons')
  chosen_spanish_reading: demonios con imaginería caprina ('demonios-cabra')
  alternative_spanish_readings:
  - cabras
  - ídolos-cabra
  - sátiros
  rationale: La línea precedente y el marco de idolatría exigen algo más que animales comunes. 'Demonios-cabra' conserva la tensión entre imagen caprina y seres cultuales, evitando un término clásico importado sin base directa en el texto.
  doctrine_reference: Éxodo 20:3-5; Levítico 17:7
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail en cuanto al referente personal de la frase relacional ('after whom'), preservando en español una relación equivalente ('tras quienes'). También se mantuvo la decisión interpretativa de traducir לַשְּׂעִירִם como un referente numinoso caprino, no como animales literales.
  spanish_consistency_notes:
  - Se mantiene 'Dios/Yahvé' no aplicable en este versículo; no se introduce terminología ajena.
  - '''Prostituirse'' se conserva como metáfora cultual, no como paráfrasis abstracta de ''idolatrarse''.'
  - '''Ordenanza perpetua'' refleja un lenguaje jurídico-bíblico claro y consistente con la fórmula legal hebrea.'
