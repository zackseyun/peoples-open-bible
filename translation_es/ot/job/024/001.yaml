translation:
  language: es
  text: ¿Por qué no están reservados[a] los tiempos por el Todopoderoso, y por qué los que lo conocen no ven sus días[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tiempos señalados»; la línea puede significar: «¿Por qué los tiempos señalados no están reservados por el Todopoderoso?»'
    reason: lexical_alternative
  - marker: b
    text: «Sus días» probablemente se refiere a los días en que Dios actúa en juicio o intervención.
    reason: alternative_reading
lexical_decisions:
- source_word: מַדּוּעַ
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Por qué razón
  - ¿A causa de qué
  lexicon: HALOT
  rationale: Interrogativo directo y natural en español, que conserva la queja de Job sin añadir explicación.
- source_word: מִשַּׁדַּי
  english_pob_choice: by the Almighty
  chosen_spanish: por Yahvé
  alternatives_spanish:
  - por el Todopoderoso
  - del Todopoderoso
  - ante el Todopoderoso
  lexicon: HALOT
  rationale: El contexto poético de Job usa שַׁדַּי como nombre divino; siguiendo el criterio del proyecto para יהוה/YHWH, se emplea 'Yahvé'. En esta cláusula, la preposición implícita/relacional se expresa en español con 'por' para mantener la idea de agencia o disposición divina.
- source_word: נִצְפְּנוּ
  english_pob_choice: are kept
  chosen_spanish: están reservados
  alternatives_spanish:
  - están guardados
  - están ocultos
  - están mantenidos en reserva
  lexicon: HALOT
  rationale: צפן con el pasivo puede sugerir guardar en reserva más que solo ocultar. 'Reservados' preserva esa fuerza y evita introducir 'ocultar' donde el hebreo no lo exige de forma explícita.
- source_word: עִתִּים
  english_pob_choice: times
  chosen_spanish: los tiempos
  alternatives_spanish:
  - los momentos
  - las ocasiones
  - los tiempos señalados
  lexicon: HALOT
  rationale: Se conserva el sustantivo plural básico. 'Los tiempos' mantiene la apertura semántica del hebreo, incluida la posible idea de tiempos fijados o designados.
- source_word: וְיֹדְעָיו
  english_pob_choice: those who know him
  chosen_spanish: los que lo conocen
  alternatives_spanish:
  - los conocedores de él
  - quienes lo conocen
  - sus conocedores
  lexicon: HALOT
  rationale: La forma participial con sufijo se vierte de manera idiomática en español con una relativa sustantivada. 'Lo' mantiene la referencia a Dios sin sobrecargar la frase.
- source_word: חָזוּ
  english_pob_choice: see
  chosen_spanish: ven
  alternatives_spanish:
  - perciben
  - contemplan
  - ven de cerca
  lexicon: HALOT
  rationale: '''Ver'' es la equivalencia directa y clara para חזָה en este contexto de percepción de los días de Dios.'
- source_word: יָמָיו
  english_pob_choice: his days
  chosen_spanish: sus días
  alternatives_spanish:
  - sus días señalados
  - los días que le pertenecen
  - sus días de intervención
  lexicon: HALOT
  rationale: 'Se preserva la literalidad poética del hebreo y su ambigüedad: puede aludir a los días de acción o intervención divina sin resolverlo en el cuerpo del texto.'
theological_decisions:
- issue: Valor de 'sus días' en referencia a Dios
  english_pob_reading: Retain the literal phrase 'his days' without specifying 'days of judgment'.
  chosen_spanish_reading: Mantener 'sus días' sin especificar 'días de juicio' en el texto principal.
  alternative_spanish_readings:
  - sus días de juicio
  - los días en que actúa
  - sus días señalados de intervención
  rationale: El hebreo es deliberadamente condensado y admite varias lecturas. La versión española conserva la tensión y evita cerrar el sentido con una precisión no explicitada por el texto.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente: en inglés se prefirió ''kept'' frente a ''kept hidden'' para ajustarse mejor a נִצְפְּנוּ como idea de guardar o reservar; por eso el español usa ''reservados'' y no añade explícitamente ''ocultos''.'
  spanish_consistency_notes:
  - Se emplea 'Yahvé' conforme al estándar del proyecto para el nombre divino.
  - Se mantiene la ambigüedad de 'sus días' para no forzar una interpretación teológica.
  - La sintaxis española conserva el paralelismo interrogativo del hebreo.
  - '''Reservados'' intenta equilibrar la idea de guardar en reserva con la revisión inglesa que evitó sobretraducir ''hidden''.'
