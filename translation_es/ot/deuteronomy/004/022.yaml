translation:
  language: es
  text: Porque yo voy a morir en esta tierra[a]; no voy a cruzar el Jordán, pero ustedes sí cruzarán y tomarán posesión de esta buena tierra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "estoy muriendo en esta tierra". El participio hebreo puede expresar una acción presente con sentido de futuro inminente.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "heredarán" o "poseerán". El verbo hebreo puede indicar tomar posesión de la tierra como herencia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduzco la relación explicativa con una conjunción natural en español. 'Porque' conserva la fuerza causal/expositiva de כִּי en este contexto, enlazando con la advertencia previa.
- source_word: אָנֹכִי
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - yo mismo
  lexicon: HALOT
  rationale: El pronombre independiente se conserva para reflejar el énfasis del hebreo. En español puede expresarse de forma natural con el pronombre explícito 'yo'.
- source_word: מֵת
  english_pob_choice: am dying
  chosen_spanish: estoy muriendo
  alternatives_spanish:
  - estoy a punto de morir
  - voy a morir
  lexicon: HALOT
  rationale: El participio hebreo comunica inminencia/proceso, no solo futuro simple. 'Estoy muriendo' mantiene esa cercanía temporal y deja visible la tensión lexical documentada por la POB entre estado actual e inminencia.
- source_word: בָּאָרֶץ הַזֹּאת
  english_pob_choice: in this land
  chosen_spanish: en esta tierra
  alternatives_spanish:
  - en este país
  - en esta región
  lexicon: HALOT
  rationale: '''Tierra'' es el equivalente habitual de אֶרֶץ en contextos de promesa e herencia en Deuteronomio. Con ''esta'' se preserva el deíctico del hebreo.'
- source_word: אֵינֶנִּי עֹבֵר
  english_pob_choice: I am not crossing
  chosen_spanish: yo no estoy cruzando
  alternatives_spanish:
  - yo no cruzaré
  - yo no pasaré
  lexicon: HALOT
  rationale: La negación con participio expresa una acción no realizada/inminente; el progresivo español ayuda a conservar ese valor aspectual. 'Cruzar' mantiene el movimiento literal del hebreo.
- source_word: אֶת הַיַּרְדֵּן
  english_pob_choice: the Jordan
  chosen_spanish: el Jordán
  alternatives_spanish:
  - el río Jordán
  lexicon: HALOT
  rationale: Se mantiene el nombre propio bíblico habitual en español. No es necesario añadir 'río' porque el referente es claro en el contexto narrativo.
- source_word: וְאַתֶּם עֹבְרִים
  english_pob_choice: but you are crossing over
  chosen_spanish: pero ustedes están cruzando
  alternatives_spanish:
  - y ustedes cruzan
  - mientras ustedes cruzan
  lexicon: HALOT
  rationale: El hebreo contrasta a Moisés con el pueblo; por eso 'pero' explicita el contraste implícito del וְ. 'Están cruzando' conserva el valor durativo/actual del participio.
- source_word: וִירִשְׁתֶּם
  english_pob_choice: will take possession of
  chosen_spanish: tomarán posesión de
  alternatives_spanish:
  - poseerán
  - heredarán
  lexicon: HALOT
  rationale: En contextos de tierra prometida, ירשׁ combina herencia y ocupación efectiva. 'Tomarán posesión de' expresa bien esa acción de entrar en posesión sin reducirla a un mero 'poseer' abstracto.
- source_word: הָאָרֶץ הַטּוֹבָה הַזֹּאת
  english_pob_choice: this good land
  chosen_spanish: esta buena tierra
  alternatives_spanish:
  - esta tierra buena
  - esta tierra fértil
  lexicon: HALOT
  rationale: Conservo la valoración positiva y el deíctico. 'Buena tierra' reproduce la collocación bíblica de forma natural en español sin especificar más de lo que el hebreo dice.
theological_decisions:
- issue: 'El valor aspectual de מֵת y אֵינֶנִּי עֹבֵר: muerte inminente y no-cruce inmediato'
  english_pob_reading: '''I am dying'' / ''I am not crossing'''
  chosen_spanish_reading: '''estoy muriendo'' / ''yo no estoy cruzando'''
  alternative_spanish_readings:
  - '''estoy a punto de morir'' / ''no cruzaré'''
  - '''voy a morir'' / ''no pasaré'''
  rationale: La fuente hebrea usa participios y una negación existencial que la POB entendió como inminencia. En español, el progresivo conserva mejor la tensión entre proceso e inminencia que un futuro simple o una paráfrasis más interpretativa.
  doctrine_reference: Ninguna; decisión de aspecto verbal y semántica léxica.
- issue: 'ירשׁ en contexto de tierra pactal: herencia, posesión y ocupación'
  english_pob_reading: '''take possession of'' [with note: ''possess'' or ''inherit'']'
  chosen_spanish_reading: '''tomarán posesión de'''
  alternative_spanish_readings:
  - '''heredarán'''
  - '''poseerán'''
  rationale: En Deuteronomio, ירשׁ no es solo posesión abstracta ni herencia jurídica aislada; implica entrar y quedar establecidos en la tierra prometida. 'Tomarán posesión de' preserva esa carga sin perder claridad para el lector moderno.
  doctrine_reference: Promesa de la tierra e historia de la alianza en Deuteronomio.
translation_notes:
  revision_awareness: 'Se cotejó el paquete fuente hebreo con la traducción auditada en inglés de la POB. No hubo revisiones aplicadas en el pasaje inglés; la presente redacción española sigue la lectura de alta concordancia y conserva las dos tensiones documentadas: la inminencia de מֵת y el rango semántico de ירשׁ.'
  spanish_consistency_notes:
  - Se mantiene 'tierra' para אֶרֶץ en coherencia con el uso pactal de Deuteronomio.
  - Se usa 'Jordán' como nombre propio bíblico estándar en español.
  - Se conserva 'tomarán posesión de' para ירשׁ, evitando reemplazarlo por 'heredarán' en el texto principal porque la POB destacó la acción efectiva de ocupar la tierra.
  - La puntuación con punto y coma reproduce la pausa argumentativa del hebreo sin sobre-interpretar la sintaxis.
