base_translation:
  language: en
  yaml_path: translation/deuterocanon/tobit/008/017.yaml
  text: Blessed are you[a], because you have made me rejoice, and it has not happened to me as I expected; rather, according to your abundant mercy, you have dealt with us. Blessed are you, because you have had mercy on two only children. Show them mercy, Master[c][b]; bring their life to completion in health with gladness and mercy.
  footnotes:
  - marker: a
    text: Or 'it did not happen to me as I supposed.' The Greek verb can express suspicion or supposition; the context suggests anxious expectation.
    reason: lexical_alternative
  - marker: b
    text: '''Two only children'' means that each of the couple was an only child in his or her family.'
    reason: cultural_note
  - marker: c
    text: Or 'bring their lives to completion' or 'grant that they may complete their life.' The Greek uses a collective singular 'life.'
    reason: lexical_alternative
