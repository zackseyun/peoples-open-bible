  to: 'Los hijos de Judá: Er, Onán y Sela; tres le nacieron de Bat-súa[a] la cananea. Er, el primogénito de Judá, fue malo ante los ojos de Yahvé, y lo hizo morir.[b]'
  rationale: Se corrige la nota léxica principal para que refleje la variante documentada del hebreo y se ancla donde corresponde, en «Bat-súa». Se elimina el pronombre enfático «él» para un español más natural y más cercano al sujeto implícito hebreo. También se ajusta «por» a «de» para una formulación genealógica más idiomática sin alterar el sentido.
