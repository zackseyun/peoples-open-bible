    issue: «por el camino de la puerta» es una expresión forzada
    rationale: Aunque דֶּרֶךְ puede significar «camino/manera/vía», en esta construcción narrativa la salida se expresa naturalmente en español como «por la puerta» o «por medio de la puerta». La redacción actual suena calcada y reduce la legibilidad.
  - severity: medium
    issue: «la midió todo alrededor» no suena idiomático
    rationale: Para סָבִיב סָבִיב el español natural pide una expresión adverbial como «por todos lados» o «alrededor, alrededor». «Todo alrededor» tras el verbo con objeto directo femenino resulta torpe.
  revised_spanish_text: Cuando hubo terminado de medir la casa interior[a], me sacó por la puerta que daba al oriente[b], y la midió por todos lados.
  revised_footnotes:
  - marker: a
    text: O «la casa interior». El hebreo usa «casa» en el contexto de la visión del templo para la estructura sagrada.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «la puerta cuyo rostro estaba hacia el oriente».
    reason: lexical_alternative
  revision_rationale: Se ajustó «por el camino de la puerta» a «por la puerta» para un español más natural que aún refleja la idea de ruta/salida. Se cambió «la midió todo alrededor» por «la midió por todos lados» para expresar con claridad e idiomaticidad la duplicación hebrea סָבִיב סָבִיב. Se conservaron «casa interior» y las notas existentes porque sí reflejan adecuadamente el audit trail y el hebreo.
