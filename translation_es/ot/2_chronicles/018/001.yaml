translation:
  language: es
  text: Jehosafat tenía gran riqueza y honor[a], y se emparentó por matrimonio con Acab.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «llegó a estar emparentado con Acab por matrimonio» o «hizo una alianza matrimonial con Acab».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Now ... had
  chosen_spanish: tenía
  alternatives_spanish:
  - y tenía
  - entonces tenía
  lexicon: HALOT
  rationale: El waw consecutivo introduce un desarrollo narrativo; en español, "tenía" transmite de forma natural el estado poseído sin recurrir a una fórmula arcaica. La partícula inicial queda implícita en el flujo narrativo.
- source_word: עֹשֶׁר
  english_pob_choice: wealth
  chosen_spanish: riqueza
  alternatives_spanish:
  - riquezas
  - bienes
  lexicon: HALOT
  rationale: El término señala abundancia material. "Riqueza" es claro y digno en español moderno, y mantiene la idea de posesión abundante.
- source_word: וְכָבוֹד
  english_pob_choice: honor
  chosen_spanish: honra
  alternatives_spanish:
  - honor
  - gloria
  lexicon: HALOT
  rationale: En este contexto real y social, el término expresa prestigio y dignidad pública, no la gloria divina visible. "Honra" funciona bien en español y conserva ese matiz de status.
- source_word: לָרֹב
  english_pob_choice: great
  chosen_spanish: gran
  alternatives_spanish:
  - en abundancia
  - en gran medida
  lexicon: HALOT
  rationale: La expresión modifica los sustantivos anteriores y comunica abundancia extraordinaria. "Gran" es una forma natural y fiel para el conjunto "gran riqueza y honra".
- source_word: וַיִּתְחַתֵּן
  english_pob_choice: allied himself by marriage
  chosen_spanish: se emparentó por matrimonio
  alternatives_spanish:
  - hizo una alianza matrimonial
  - se unió por matrimonio
  lexicon: HALOT
  rationale: El hitpael de חתן aquí describe una alianza dinástica/familiar, no solo el acto personal de casarse. "Se emparentó por matrimonio" preserva la relación política y familiar sin sobreespecificar.
- source_word: לְאַחְאָב
  english_pob_choice: with Ahab
  chosen_spanish: con Ahab
  alternatives_spanish:
  - a Ahab
  lexicon: HALOT
  rationale: En español, el vínculo relacional se expresa con "con". Se mantiene el nombre propio transliterado conforme al uso estándar.
theological_decisions:
- issue: Naturaleza de la relación con Ahab en וַיִּתְחַתֵּן לְאַחְאָב
  english_pob_reading: He allied himself by marriage with Ahab
  chosen_spanish_reading: Se emparentó por matrimonio con Ahab
  alternative_spanish_readings:
  - Hizo una alianza matrimonial con Ahab
  - Quedó relacionado por matrimonio con Ahab
  rationale: La frase describe una relación dinástica/política, no simplemente que Jehosafat contrajera matrimonio personalmente con Ahab. La redacción elegida conserva la fuerza relacional y el sentido histórico del hebreo.
  doctrine_reference: Historia narrativa; alianzas reales y familiares en el AT
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios y que el acuerdo con la auditoría inglesa fue alto; por ello se mantiene una solución directa y sobria, sin introducir matices no sustentados por el texto base.
  spanish_consistency_notes:
  - Se conserva el nombre «Jehosafat» para concordar con la forma usual en español bíblico y la transliteración del nombre propio.
  - «Honra» se usa en sentido de prestigio social/cortesano, no como equivalente de gloria divina.
  - La construcción verbal evita arcaísmos, pero mantiene la relación matrimonial-dinástica que el hebreo expresa.
