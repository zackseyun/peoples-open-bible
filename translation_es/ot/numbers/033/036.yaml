translation:
  language: es
  text: Salieron de Ezión-guéber y acamparon en el desierto de Zin, es decir, Cades[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que es Cades». El pronombre hebreo introduce una identificación del lugar.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּסְעוּ
  english_pob_choice: They set out
  chosen_spanish: Salieron
  alternatives_spanish:
  - Partieron
  - Se pusieron en camino
  lexicon: HALOT
  rationale: En listas de itinerario, נסע expresa salir de un campamento y avanzar a otro lugar. «Salieron» comunica de forma natural esa acción de partida sin añadir matices que el hebreo no exige.
- source_word: מֵעֶצְיוֹן גָּבֶר
  english_pob_choice: from Ezion-geber
  chosen_spanish: de Ezión-guéber
  alternatives_spanish:
  - de Ezión Geber
  - de Ezion-geber
  lexicon: HALOT
  rationale: Es un topónimo, por lo que se translitera. Se conserva el guion en español como convención útil para este nombre compuesto, manteniendo la identificación geográfica.
- source_word: וַיַּחֲנוּ
  english_pob_choice: and camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - levantaron campamento
  - se acamparon
  lexicon: HALOT
  rationale: חנה en contexto de travesía designa establecer campamento. «Acamparon» es la equivalencia española más clara y directa, sin perder el sentido concreto.
- source_word: בְמִדְבַּר צִן
  english_pob_choice: in the wilderness of Zin
  chosen_spanish: en el desierto de Zin
  alternatives_spanish:
  - en el desierto de Sin
  - en la región desértica de Zin
  lexicon: HALOT
  rationale: מִדְבָּר puede traducirse «desierto» o «desierto/wilderness»; en español «desierto de Zin» es natural y geográfico. Se evita «wilderness» por ser menos idiomático en español, sin cambiar el referente.
- source_word: הִוא
  english_pob_choice: that is
  chosen_spanish: es decir
  alternatives_spanish:
  - o sea
  - esto es
  lexicon: HALOT
  rationale: El pronombre tiene función apposicional e identifica el lugar anterior con Kades. «Es decir» reproduce esa aclaración en español con naturalidad.
- source_word: קָדֵשׁ
  english_pob_choice: Kadesh
  chosen_spanish: Kades
  alternatives_spanish:
  - Cades
  - Kadesh
  lexicon: HALOT
  rationale: Nombre propio de lugar. «Kades» refleja de modo consistente la transliteración usual en español bíblico moderno y evita una adaptación eclesiástica no sustentada por el contexto.
theological_decisions:
- issue: Identificación apposicional del lugar
  english_pob_reading: that is, Kadesh; the Hebrew pronoun introduces an identification of the location.
  chosen_spanish_reading: es decir, Kades
  alternative_spanish_readings:
  - que es Kades
  - o sea, Kades
  rationale: 'No hay una afirmación teológica disputada, pero sí una relación sintáctica importante: el hebreo identifica el campamento del desierto de Zin con Kades. La traducción debe conservar esa equivalencia local, no presentarla como una mera comparación.'
  doctrine_reference: Ninguna; decisión sintáctico-geográfica.
translation_notes:
  revision_awareness: El texto inglés POB reciente se mantuvo sin cambios y presenta alta concordancia con la fuente hebrea. Para el español se conservó la estructura narrativa breve del itinerario, ajustando solo la naturalidad idiomática de los verbos de movimiento y de la apposición final.
  spanish_consistency_notes:
  - Se mantiene la transliteración de topónimos sin traducirlos.
  - Se evita «SEÑOR» u այլ terminología teológica irrelevante porque el versículo no contiene nombres divinos.
  - «Desierto» se usa en sentido bíblico-geográfico, no como juicio sobre aridez absoluta.
  - La nota al pie conserva la alternativa sintáctica destacada por el POB inglés.
