    issue: «Entonces» podría simplificarse a «Pero» o dejarse sin conector fuerte para reflejar mejor la repetición hebrea.
    rationale: El hebreo tiene un simple ויאמר repetido. «Entonces» no es erróneo, pero puede sonar más interpretativo que necesario.
