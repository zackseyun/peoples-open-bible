translation:
  language: es
  text: Una respuesta suave desvía la ira[a], pero una palabra dolorosa provoca enojo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una palabra hiriente» o «una palabra áspera». La expresión hebrea significa literalmente «una palabra de dolor/aflicción», que puede describir una palabra que hiere y así provoca enojo.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַעֲנֶה
  english_pob_choice: answer
  chosen_spanish: respuesta
  alternatives_spanish:
  - contestación
  - réplica
  lexicon: HALOT
  rationale: El sustantivo designa una contestación o respuesta en un intercambio verbal. «Respuesta» es natural en español y conserva la brevedad proverbial del hebreo y del inglés POB.
- source_word: רַּךְ
  english_pob_choice: gentle
  chosen_spanish: suave
  alternatives_spanish:
  - blanda
  - tierna
  - amable
  lexicon: HALOT
  rationale: El adjetivo significa suave/blando/tierno. «Suave» comunica con naturalidad en español la cualidad de una respuesta no áspera, sin perder el contraste con la segunda línea.
- source_word: יָשִׁיב
  english_pob_choice: turns away
  chosen_spanish: desvía
  alternatives_spanish:
  - aleja
  - aparta
  - hace retroceder
  lexicon: HALOT
  rationale: El hifil de שוב tiene sentido causativo de hacer volver o apartar. Con «ira» como objeto, «desvía» expresa bien la idea idiomática de desactivar o apartar la cólera.
- source_word: חֵמָה
  english_pob_choice: wrath
  chosen_spanish: ira
  alternatives_spanish:
  - furor
  - cólera
  - rabia
  lexicon: HALOT
  rationale: El término denota enojo intenso o ardor de ira. «Ira» preserva ese nivel de intensidad en español y funciona bien con el paralelismo del proverbio.
- source_word: דְבַר
  english_pob_choice: word
  chosen_spanish: palabra
  alternatives_spanish:
  - decir
  - expresión
  - habla
  lexicon: HALOT
  rationale: En constructo con עֶצֶב, se refiere a una palabra pronunciada. «Palabra» es el equivalente más natural y conciso para el estilo proverbial.
- source_word: עֶצֶב
  english_pob_choice: painful
  chosen_spanish: dolorosa
  alternatives_spanish:
  - hiriente
  - penosa
  - aflictiva
  lexicon: HALOT
  rationale: El sustantivo puede referirse a dolor, pena o algo que causa aflicción. «Dolorosa» conserva el valor de una palabra que hiere o causa dolor, sin reducirla solo a rudeza de tono.
- source_word: יַעֲלֶה
  english_pob_choice: stirs up
  chosen_spanish: hace subir
  alternatives_spanish:
  - provoca
  - despierta
  - aviva
  lexicon: HALOT
  rationale: El hifil de עלה significa literalmente hacer subir. «Hace subir» mantiene la imagen verbal del hebreo; aquí no se da un giro más interpretativo que «provoca».
- source_word: אָף
  english_pob_choice: anger
  chosen_spanish: enojo
  alternatives_spanish:
  - ira
  - furia
  - cólera
  lexicon: HALOT
  rationale: Aunque literalmente puede aludir a la nariz y por extensión a la ira, aquí funciona idiomáticamente como enojo. «Enojo» es claro y coloquialmente digno; además mantiene el paralelismo con «ira» en la primera mitad.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo WLC y el audit trail en inglés: mantiene el paralelismo antitético, conserva la imagen causativa de יַעֲלֶה con una solución española suficientemente literal, y refleja la ambigüedad lexical de עֶצֶב mediante una nota que preserva las alternativas documentadas en el POB inglés.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo requiriera; este versículo no contiene el nombre divino.
  - Se evitó «SEÑOR» y también una paráfrasis más libre como «calma el enojo», para no borrar la imagen verbal del hebreo.
  - «Ira» y «enojo» se diferenciaron para reflejar el paralelismo y evitar una repetición mecánica en español.
  - La nota [a] se ancló en «dolorosa» para documentar las alternativas semánticas sin sobrecargar el texto principal.
