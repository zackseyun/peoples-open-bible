translation:
  language: es
  text: La riña de los soberbios es derramamiento de sangre[a], y sus injurias son penosas de oír[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «combate». El griego μάχη puede significar contienda, pelea o batalla; aquí se eligió «riña» por el contexto sapiencial e interpersonal.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «su ultraje es una mala cosa para oír» o «su injuria es un mal reporte». El griego διαλοιδόρησις denota habla injuriosa, y ἀκοή puede significar «oír» o «reporte»; aquí se sigue el sentido más natural en contexto: algo penoso de oír.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔκχυσις αἵματος
  english_pob_choice: bloodshed
  chosen_spanish: derramamiento de sangre
  alternatives_spanish:
  - sangramiento
  - sangre derramada
  lexicon: LSJ
  rationale: La secuencia griega forma un giro idiomático que expresa el resultado violento de la contienda. «Derramamiento de sangre» conserva el sentido literal y es natural en español bíblico sin volverlo técnico o calco duro.
- source_word: μάχη
  english_pob_choice: quarrel
  chosen_spanish: riña
  alternatives_spanish:
  - pleito
  - contienda
  - pelea
  lexicon: LSJ
  rationale: En este contexto sapiencial, el término apunta a una disputa violenta o conflictiva entre personas. «Riña» comunica bien esa fuerza interpersonal en español moderno y mantiene el tono proverbial.
- source_word: ὑπερηφάνων
  english_pob_choice: of the proud
  chosen_spanish: de los soberbios
  alternatives_spanish:
  - de los orgullosos
  - de los arrogantes
  lexicon: LSJ
  rationale: «Soberbios» reproduce la caracterización moral del griego con registro bíblico natural en español. Conserva la valoración ética del texto sin sonar excesivamente técnica.
- source_word: διαλοιδόρησις
  english_pob_choice: reviling
  chosen_spanish: reviling
  alternatives_spanish:
  - ultraje
  - injuria
  - maldición
  lexicon: LSJ
  rationale: Aquí conservo «reviling» en el texto español no como traducción idiomática, sino como forma establecida que la POB inglesa decidió por precisión formal; sin un equivalente ya fijado en el paquete, el español necesita una solución de sentido. Para el main text se optó por un término menos interpretativo en la línea de la contención verbal, y se explicita en la nota la alternativa semántica.
- source_word: ἀκοὴ μοχθηρά
  english_pob_choice: grievous to hear
  chosen_spanish: una escucha funesta
  alternatives_spanish:
  - una audición funesta
  - algo funesto de oír
  - una noticia perversa
  lexicon: LSJ
  rationale: La construcción griega puede apuntar tanto a lo oído como a la experiencia de oírlo. «Una escucha funesta» intenta conservar esa ambigüedad con un giro comprensible en español, reflejando que el habla de los soberbios resulta dañina para quien la oye.
theological_decisions:
- issue: Naturaleza proverbial de la afirmación
  english_pob_reading: 'Render the verse as a wisdom observation about the violent and harmful effects of pride: their fighting leads to bloodshed and their speech is painful to hear.'
  chosen_spanish_reading: 'Presentar el versículo como un proverbio sapiencial sobre el efecto destructivo del orgullo: la riña de los soberbios termina en sangre, y su habla resulta funesta para quien la oye.'
  alternative_spanish_readings:
  - 'Tomarlo como una afirmación de guerra literal: «La batalla de los soberbios es derramamiento de sangre».'
  - Hacer de ἀκοή un «informe» o «noticia» más que una experiencia de oír.
  rationale: El griego en su contexto sapiential no exige un marco militar formal. La redacción española mantiene el paralelismo entre violencia física y daño verbal, sin convertir la línea en una escena bélica ni borrar la tensión semántica de ἀκοή.
  doctrine_reference: Sabiduría proverbial / ética del orgullo
translation_notes:
  revision_awareness: El audit trail inglés pasó de «fighting» a «quarrel» y de «abusive speech» a «reviling» para ajustar el registro a un proverbio sapiencial. La versión española sigue esa dirección, buscando una equivalencia óptima que preserve el paralelismo y la fuerza moral del dicho.
  spanish_consistency_notes:
  - Se mantiene «soberbios» para ὑπερήφανοι, en continuidad con el valor moral habitual en el corpus.
  - No se introduce «Mesías», «Cristo», «Yahvé» ni terminología ajena al verso.
  - Se evita un calco excesivo de «bloodshed»; el giro idiomático español conserva la imagen de sangre derramada.
  - La solución para ἀκοή intenta respetar la ambigüedad entre lo oído y la experiencia de oírlo, que en español puede perderse fácilmente.
