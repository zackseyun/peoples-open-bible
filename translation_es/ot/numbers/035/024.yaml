    rationale: El participio hebreo significa «el que golpeó / el agresor / el heridor». «Homicida» adelanta una clasificación legal del acusado y no preserva la neutralidad procesal destacada en la auditoría inglesa.
  - severity: medium
    issue: «estos estatutos» para הַמִּשְׁפָּטִים הָאֵלֶּה
    rationale: Aunque posible, «estatutos» no refleja tan bien la decisión POB documentada de «ordinances». En español bíblico y jurídico, «estas ordenanzas» conserva mejor el matiz normativo y la conexión con la nota alternativa «juicios».
  - severity: low
