translation:
  language: es
  text: Cuando los muchachos crecieron, Esaú se hizo un cazador experto, un hombre del campo[b], pero Jacob era un hombre tranquilo[a], que habitaba en tiendas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un hombre íntegro», «un hombre simple» o «un hombre inocente» para el término hebreo que describe a Jacob; la palabra puede expresar plenitud, integridad o simplicidad según el contexto.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «un hombre del campo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגְדְּלוּ / הַנְּעָרִים
  english_pob_choice: grew up / the boys
  chosen_spanish: crecieron / los muchachos
  alternatives_spanish:
  - los jóvenes
  - los muchachos crecieron
  lexicon: HALOT
  rationale: El verbo describe maduración de los hijos en su paso a la adultez; en español, "crecieron" expresa ese desarrollo de forma natural. "Muchachos" conserva el registro narrativo y juvenil del contexto sin sonar demasiado técnico.
- source_word: אִישׁ יֹדֵעַ צַיִד
  english_pob_choice: a skillful hunter
  chosen_spanish: un cazador experto
  alternatives_spanish:
  - un hombre hábil en la caza
  - un experto en cazar
  lexicon: HALOT
  rationale: La combinación de participio + objeto implica habilidad practicada, no solo conocimiento teórico. "Cazador experto" comunica competencia real y mantiene el sentido idiomático sin volverlo pesado.
- source_word: אִישׁ שָׂדֶה
  english_pob_choice: a man of the field
  chosen_spanish: un hombre del campo
  alternatives_spanish:
  - un hombre del campo abierto
  - un hombre de la llanura
  lexicon: HALOT
  rationale: Aunque שָׂדֶה puede ser literalmente "campo", aquí contrasta con la vida en tiendas. "Hombre del campo" conserva esa oposición narrativa y sigue de cerca el valor léxico principal del hebreo.
- source_word: אִישׁ תָּם
  english_pob_choice: a quiet man
  chosen_spanish: un hombre tranquilo
  alternatives_spanish:
  - un hombre íntegro
  - un hombre simple
  - un hombre inocente
  lexicon: HALOT
  rationale: El POB inglés opta por un sentido de temperamento/estilo de vida, no por una evaluación moral explícita. En español, "tranquilo" preserva esa lectura contextual y evita imponer "irreprensible" o "íntegro" como si fueran concluyentes en este verso.
- source_word: יֹשֵׁב אֹהָלִים
  english_pob_choice: dwelling in tents
  chosen_spanish: que habitaba en tiendas
  alternatives_spanish:
  - viviendo en tiendas
  - morando en tiendas
  lexicon: HALOT
  rationale: El participio expresa una costumbre o modo de vida continuo. "Habitaba en tiendas" suena natural en español bíblico moderno y conserva la imagen concreta del texto.
theological_decisions:
- issue: Sentido de תָּם aplicado a Jacob
  english_pob_reading: temperament/lifestyle descriptor ('quiet') rather than an explicit moral evaluation such as 'blameless'
  chosen_spanish_reading: descripción de temperamento o modo de vida ('tranquilo') más que una evaluación moral explícita
  alternative_spanish_readings:
  - íntegro
  - irreprensible
  - simple
  - inocente
  rationale: La frase inmediata contrasta a Esaú como cazador y hombre del campo con Jacob como habitante de tiendas. Traducir תָּם como "tranquilo" mantiene ese contraste literario sin convertir el verso en una declaración doctrinal o ética más fuerte de lo que el contexto exige.
  doctrine_reference: Principios de equivalencia óptima y cautela contextual en la caracterización moral
- issue: Contraste entre vida de campo y vida en tiendas
  english_pob_reading: a man of the field ... dwelling in tents
  chosen_spanish_reading: un hombre del campo ... que habitaba en tiendas
  alternative_spanish_readings:
  - un hombre del campo abierto ... viviendo en carpas
  - un hombre de la naturaleza ... morando en tiendas
  rationale: La oposición entre exterioridad y residencia doméstica es parte central del verso. "Del campo" y "en tiendas" reproducen el contraste con claridad y sin añadir interpretaciones ajenas al hebreo.
  doctrine_reference: Principios de transparencia textual y preservación del contraste narrativo
translation_notes:
  revision_awareness: El borrador sigue de cerca la revisión inglesa más reciente, que prefirió "man of the field" sobre "open country" para ṣā·dêh, y refleja esa cercanía con "del campo". También conserva la decisión auditada de tratar תָּם como un descriptor contextual de temperamento/estilo de vida, no como una afirmación moral plena.
  spanish_consistency_notes:
  - Se usa "Yahvé" como forma por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó "Cristo" o terminología cristológica porque no aparece en el verso.
  - '"Tiendas" mantiene la imagen concreta del hebreo אֹהָלִים y es coherente con el registro bíblico.'
  - No se usó "siervo" ni otros términos con carga doctrinal ajena al contexto narrativo.
