revisions:
- from: De Salomón[a]. Oh Dios, da tus juicios al rey, y tu justicia[b] al hijo del rey.
  to: De Salomón[a]. Oh, Dios, da tus juicios al rey, y tu rectitud[b] al hijo del rey.
  rationale: 'Se corrige la puntuación del vocativo para un español más natural y se alinea la elección léxica principal con la auditoría inglesa: «rectitud» en el texto para reflejar mejor «righteousness», con «justicia» como alternativa en nota.'
