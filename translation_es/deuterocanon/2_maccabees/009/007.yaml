base_translation:
  language: en
  yaml_path: translation/deuterocanon/2_maccabees/009/007.yaml
  text: But he in no way ceased from his arrogance[a]; rather, he was filled even more with pride, breathing fire in his anger against the Jews and ordering the journey to be hastened. Then it happened that he fell from the chariot as it was rushing along, and when he was involved in the grievous fall[b], all the limbs of his body were dislocated.
  footnotes:
  - marker: a
    text: Or 'ordering the march to be pressed on.' The Greek πορία can denote travel, journey, or march, depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'all the limbs of his body were dislocated.' The rare Greek verb likely describes the limbs being violently loosened from their joints after the fall.
    reason: lexical_alternative
