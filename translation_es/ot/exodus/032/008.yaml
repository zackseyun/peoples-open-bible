    text: 'O: «Este es tu dios, Israel». El hebreo dice literalmente «Estos son tus dioses», aunque en el contexto el referente es un solo becerro.'
    reason: alternative_reading
  revision_rationale: Se corrige el marcador de nota, se sustituye la nota redundante por la alternativa singular documentada en la POB inglesa para la aclamación idolátrica, y se ajusta «y dijeron» a «y han dicho» para mantener la coherencia verbal del español sin alterar el sentido. También se suaviza «para sí» a «para sí mismos» por idiomaticidad.
