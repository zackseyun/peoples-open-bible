review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia y el sentido básico del hebreo: «Desde allí», «pasaron por», «llegaron hasta» corresponden adecuadamente a מִשָּׁם, וַיַּעַבְרוּ y וַיָּבֹאוּ עַד. También preserva correctamente el valor regional de הַר אֶפְרָיִם. Sin embargo, el nombre propio מִיכָה se ha vertido como «Micaía», que no corresponde al nombre hebreo aquí ni al inglés auditado «Micah»; en español la forma más fiel y reconocible es «Mica».'
  spanish_quality_summary: El español es claro y legible. «Pasaron por» y «llegaron hasta» suenan naturales. «Serranía de Efraín» es comprensible, aunque «región montañosa de Efraín» o «zona montañosa de Efraín» sería algo más transparente para lectura general. El problema principal de calidad es «Micaía», que introduce un nombre distinto y puede confundir al lector.
  glossary_alignment: 'No hay términos teológicos sensibles en este versículo. La revisión necesaria es onomástica: מִיכָה debe representarse en español como «Mica», no «Micaía». La nota alternativa sobre «la casa de Mica» debe ajustarse en consecuencia. La nota sobre הַר אֶפְרָיִם puede mantenerse, pero conviene usar una formulación española más natural que refleje la alternativa tradicional «Monte Efraín».'
  issues:
  - severity: high
    issue: El nombre propio «Micaía» no corresponde a מִיכָה en Jueces 18:13.
    rationale: מִיכָה es Micah/Mica, no Micaiah/Micaías/Micaía. La forma actual cambia el referente nominal y se aparta del audit trail inglés y del hebreo fuente.
  - severity: low
    issue: La nota al pie a repite exactamente la misma construcción del texto principal, solo con comillas.
    rationale: La alternativa documentada en inglés es entre posesivo natural y construcción más literal. En español, si el texto principal usa «la casa de Mica», no hace falta una nota; si se quisiera una alternativa, tendría que ser una variante real.
  - severity: low
    issue: «Serranía de Efraín» es aceptable pero algo menos transparente que otras opciones en español general.
    rationale: El sentido regional de הַר אֶפְרָיִם debe conservarse. «Región montañosa de Efraín» comunica ese valor con mayor claridad para un público amplio, mientras la nota puede conservar «Monte Efraín» como alternativa tradicional.
  revised_spanish_text: Desde allí pasaron por la región montañosa de Efraín[a] y llegaron hasta la casa de Mica.
  revised_footnotes:
  - marker: a
    text: Hebreo «la región montañosa de Efraín»; tradicionalmente también «Monte Efraín».
    reason: lexical_alternative
  revision_rationale: Se corrige el nombre propio a «Mica», que corresponde fielmente a מִיכָה. Se elimina la nota innecesaria sobre «la casa de Mica», porque ya no ofrece una alternativa real en español. Además, se ajusta «serranía» a «región montañosa» para mayor claridad y naturalidad, conservando en nota la alternativa tradicional «Monte Efraín».
