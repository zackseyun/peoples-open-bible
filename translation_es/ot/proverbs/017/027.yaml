  yaml_path: translation/ot/proverbs/017/027.yaml
  text: Whoever restrains his words has knowledge[b][a], and a man of understanding is cool in spirit.
  footnotes:
  - marker: a
    text: Or 'is calm in spirit.' The Hebrew literally says 'is cool of spirit,' using a temperature image for self-control.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'a man of understanding'; the masculine singular form is used proverbially for a person characterized by discernment.
    reason: cultural_note
