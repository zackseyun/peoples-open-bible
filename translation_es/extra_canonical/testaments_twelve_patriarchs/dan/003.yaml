translation:
  language: es
  text: "Si pierden la verdad y la paciencia[a], perecerán.\n\n\n\n    2 La ira es ceguera, pues no permite ver el rostro de nadie verdaderamente. 3 Aun si es un padre o una madre, los considera enemigos. Si es un hermano, no lo conoce. Si es un profeta del Señor, lo desobedece; si es un justo, no lo ve; si es un amigo, no lo reconoce. 4 Pues el espíritu de la ira lo envuelve en la red del engaño y le ciega los ojos, y por la falsedad le oscurece la mente y le da su propia visión. 5 ¿Y con qué le cubre los ojos? Con el odio en su corazón contra su hermano, conduciendo a la envidia.\n\n\n\n    6 Porque la ira es mala, hijos míos, pues arroja en confusión incluso al alma misma. 7 Y le da fuerza al cuerpo, para que cometa toda obra sin ley. 8 Y cuando el cuerpo ha hecho todas estas cosas, el alma justifica lo realizado, porque no ve con rectitud. 9 Por tanto, el que se enoja, si es físicamente fuerte, tiene triple el poder de su alma para la ira: uno por la ayuda de los servidores, con la cual\
    \ justifica el hecho; un segundo por la riqueza, persuadiendo y dominando injustamente[b]; y un tercero, porque tiene fuerza natural, por ella hace el mal. 10 Pero si el que se enoja es débil, tiene en sí doble la pasión de la cólera[d][c], pues la ira siempre lo ayuda en el desafuero."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'longanimidad' por 'paciencia' (μακροθυμία).
    reason: lexical_alternative
  - marker: b
    text: '''Persuadiendo y dominando injustamente'' refleja un par verbal que combina manipulación y coerción.'
    reason: lexical_alternative
  - marker: c
    text: La frase 'le da su propia visión' sugiere que la ira sustituye la realidad por una percepción autogenerada y distorsionada.
    reason: lexical_alternative
  - marker: d
    text: El griego distingue θυμός ('ira') y ὀργή ('cólera') en la última parte del capítulo; el español preserva parte de esa variación.
    reason: lexical_alternative
lexical_decisions:
- source_word: μακροθυμία
  english_pob_choice: patience
  chosen_spanish: paciencia
  alternatives_spanish:
  - longanimidad
  - tolerancia
  lexicon: LSJ
  rationale: '''Paciencia'' es claro y moderno; ''longanimidad'' resulta arcaizante para el estilo del proyecto.'
- source_word: θυμός
  english_pob_choice: anger
  chosen_spanish: ira
  alternatives_spanish:
  - enojo
  - furia
  lexicon: LSJ
  rationale: '''Ira'' mantiene el registro moral-paraenético consistente para θυμός a lo largo del capítulo.'
- source_word: ὀργή
  english_pob_choice: wrath
  chosen_spanish: cólera
  alternatives_spanish:
  - furor
  - ira
  lexicon: LSJ
  rationale: Se reserva 'cólera' para ὀργή, distinguiéndolo léxicamente de θυμός como hace el inglés con 'wrath' frente a 'anger'.
- source_word: δίκτυον τῆς πλάνης
  english_pob_choice: the net of deceit
  chosen_spanish: la red del engaño
  alternatives_spanish:
  - la trampa del error
  - la red del extravío
  lexicon: LSJ
  rationale: Conserva la metáfora concreta de la red y se ajusta al contexto inmediato de falsedad.
- source_word: σκοτοῖ τὴν διάνοιαν
  english_pob_choice: darkens his mind
  chosen_spanish: le oscurece la mente
  alternatives_spanish:
  - le ennegrece el entendimiento
  lexicon: LSJ
  rationale: Concreto y vívido, en línea con el campo semántico de ceguera y oscuridad del pasaje.
- source_word: μίσει καρδίας
  english_pob_choice: hatred in his heart
  chosen_spanish: el odio en su corazón
  alternatives_spanish:
  - odio del corazón
  lexicon: LSJ
  rationale: Refleja la revisión inglesa que prefiere 'in his heart' sobre 'of heart'.
- source_word: φθόνος
  english_pob_choice: envy
  chosen_spanish: envidia
  alternatives_spanish:
  - celos
  lexicon: LSJ
  rationale: Término ético estándar para φθόνος; 'envidia' es la categoría moral precisa aquí.
- source_word: ἀνομία
  english_pob_choice: lawless deed
  chosen_spanish: obra sin ley
  alternatives_spanish:
  - iniquidad
  - transgresión
  lexicon: LSJ
  rationale: Conserva el vínculo léxico con ἀνομία ('sin ley') propio del discurso ético judío.
- source_word: ὑπουργούντων
  english_pob_choice: attendants
  chosen_spanish: servidores
  alternatives_spanish:
  - ayudantes
  - subordinados
  lexicon: LSJ
  rationale: Indica personas a su disposición sin sobreespecificar el estatus.
- source_word: πείθων καὶ νικῶν ἀδίκως
  english_pob_choice: persuading and overpowering unjustly
  chosen_spanish: persuadiendo y dominando injustamente
  alternatives_spanish:
  - convenciendo y venciendo de modo injusto
  lexicon: LSJ
  rationale: Mantiene los dos verbos y el juicio moral adverbial; 'dominando' captura νικάω en sentido coercitivo.
- source_word: παρανομία
  english_pob_choice: lawlessness
  chosen_spanish: desafuero
  alternatives_spanish:
  - transgresión
  - infracción de la ley
  lexicon: LSJ
  rationale: Recoge la revisión inglesa de 'in lawlessness'; 'desafuero' es claro en español neutro y mantiene el peso moral.
theological_decisions:
- issue: κύριος in 'prophet of the Lord'
  chosen_reading: profeta del Señor
  alternative_readings:
  - profeta de Dios
  rationale: El griego usa Κυρίου explícitamente; siguiendo la norma del proyecto se traduce 'Señor' y no se generaliza a 'Dios'.
  doctrine_reference: 'DOCTRINE.md: κύριος → Señor'
translation_notes:
  revision_awareness: El inglés POB pasó por una revisión gpt-5.4 que refinó 'in truth' → 'truly', 'does not notice him' → 'does not see him', 'hatred of heart' → 'hatred in his heart', 'gives power' → 'gives strength', 'works evil' → 'does evil', 'toward wrongdoing' → 'in lawlessness'. El español sigue el texto revisado.
  spanish_consistency_notes:
  - θυμός se traduce sistemáticamente como 'ira'; ὀργή se reserva para 'cólera' a fin de preservar la distinción.
  - Κύριος → Señor; Βελίαρ permanece como 'Beliar' en futuros versículos.
  - πνεῦμα τοῦ θυμοῦ → 'el espíritu de la ira', conservando la cuasi-personificación del griego.
