translation:
  language: es
  text: Ahora, pues, te hacemos saber, señor rey, que si esta ciudad es edificada y sus murallas son levantadas, ya no habrá para ti paso[a] hacia Celesiria y Fenicia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «acceso» o «vía de paso» hacia Celesiria y Fenicia. El griego dice literalmente que ya no habrá para ti una «salida/paso» hacia esas regiones, expresando pérdida de acceso o de alcance imperial.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑποδεικνύομέν
  english_pob_choice: we make known
  chosen_spanish: te hacemos saber
  alternatives_spanish:
  - te informamos
  - te damos a conocer
  lexicon: BDAG
  rationale: La expresión introduce un informe formal al rey; «te hacemos saber» conserva el tono administrativo y directo del griego sin volverlo mecánico.
- source_word: κύριε βασιλεῦ
  english_pob_choice: lord king
  chosen_spanish: oh rey señor
  alternatives_spanish:
  - mi señor el rey
  - señor rey
  lexicon: LSJ
  rationale: El vocativo combina dos títulos. En español, «rey señor» mantiene ambos elementos; «oh» ayuda a marcar el vocativo sin añadir un posesivo que no está explícito.
- source_word: οἰκοδομηθῇ
  english_pob_choice: is built
  chosen_spanish: es edificada
  alternatives_spanish:
  - es reconstruida
  - se construye
  lexicon: BDAG
  rationale: El griego expresa una condición de edificación sin marcar explícitamente la repetición; «es edificada» conserva la pasiva y la neutralidad del original.
- source_word: τὰ ταύτης τείχη
  english_pob_choice: its walls
  chosen_spanish: sus murallas
  alternatives_spanish:
  - sus muros
  - las murallas de ella
  lexicon: BDAG
  rationale: «Murallas» comunica mejor el valor defensivo y urbano del contexto que «muros», y sigue siendo una equivalencia natural para τοὺς τείχη en este pasaje.
- source_word: ἀνασταθῇ
  english_pob_choice: are raised up
  chosen_spanish: son levantadas
  alternatives_spanish:
  - son alzadas
  - son reconstruidas
  lexicon: BDAG
  rationale: «Son levantadas» conserva la imagen de elevar/erigir algo que ya existe o se restaura, sin imponer más específicamente «reconstruidas».
- source_word: ἔξοδός
  english_pob_choice: passage
  chosen_spanish: entrada
  alternatives_spanish:
  - paso
  - acceso
  - salida
  lexicon: LSJ
  rationale: En este contexto estratégico-militar, el término alude al poder de ir y venir / entrar en la región. «Entrada» comunica de forma natural la pérdida de acceso; se mantiene la idea de «paso» en la nota textual.
- source_word: κοίλην Συρίαν
  english_pob_choice: Coele-Syria
  chosen_spanish: Celesiria
  alternatives_spanish:
  - Celesiria (Coele-Siria)
  - Siria Cólica
  lexicon: LSJ
  rationale: Es un nombre geográfico propio helenístico; la transliteración española convencional «Celesiria» evita una traducción etimológica innecesaria.
- source_word: Φοινίκην
  english_pob_choice: Phoenicia
  chosen_spanish: Fenicia
  alternatives_spanish:
  - Fenicia
  lexicon: LSJ
  rationale: Forma española estándar del nombre de la región.
theological_decisions:
- issue: Sentido de κύριε βασιλεῦ como título cortesano
  english_pob_reading: lord king
  chosen_spanish_reading: rey señor
  alternative_spanish_readings:
  - mi señor el rey
  - señor rey
  rationale: No se trata de un título teológico, sino cortesano. La forma elegida conserva ambos elementos sin introducir posesión no expresada en el griego.
  doctrine_reference: n/a
translation_notes:
  revision_awareness: 'Concordancia alta con el griego de Swete y con el paralelo arameo/semítico: se mantiene el anuncio formal, el doble título cortesano, la condición de edificación de la ciudad y el valor de pérdida de acceso geopolítico en ἔξοδος. No se introducen elementos de reconstrucción explícita donde el griego no los marca.'
  spanish_consistency_notes:
  - Se prefirió «Yahvé» cuando el texto lo requiera; en este versículo no aparece.
  - «Celesiria» se usa como topónimo transliterado estándar, consistente con el tratamiento de nombres regionales en POB.
  - Se mantuvo un registro formal y bíblico, pero con sintaxis española natural.
  - La nota de pie conserva la tensión semántica de ἔξοδός sin reducirla solo a «entrada» en el cuerpo del texto.
