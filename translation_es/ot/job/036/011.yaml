translation:
  language: es
  text: Si escuchan y sirven[a], terminarán sus días en prosperidad y sus años en deleites[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «escuchen y obedezcan»; el verbo hebreo para «escuchar» también puede llevar, según el contexto, el sentido de una escucha obediente.
    reason: lexical_alternative
  - marker: b
    text: O «pasarán sus días en bien» y «sus años en agradabilidad».
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  lexicon: HALOT
  rationale: El hebreo introduce una condición directa; «si» conserva mejor esa relación condicional sin convertirla en valor habitual o temporal.
- source_word: יִשְׁמְעוּ
  english_pob_choice: they listen
  chosen_spanish: escuchan
  alternatives_spanish:
  - oyen
  - obedecen
  lexicon: HALOT
  rationale: שׁמע puede abarcar oír, escuchar y obedecer. Aquí, junto con «sirven», «escuchan» preserva el sentido básico de respuesta atenta sin imponer explícitamente la obediencia completa.
- source_word: וְיַעֲבֹדוּ
  english_pob_choice: and serve
  chosen_spanish: y sirven
  alternatives_spanish:
  - y adoran
  - y trabajan
  lexicon: HALOT
  rationale: עבד normalmente significa servir. «Sirven» mantiene la amplitud del verbo en este contexto sapiencial, sin reducirlo a «adoran» ni estrecharlo a trabajo laboral.
- source_word: יְכַלּוּ
  english_pob_choice: they will complete
  chosen_spanish: terminarán
  alternatives_spanish:
  - pasarán
  - cumplirán
  - acabarán
  lexicon: HALOT
  rationale: Con «sus días» y «sus años», la idea es vivirlos hasta su término. «Terminarán» expresa con naturalidad ese valor de llevar a cabo o agotar el tiempo de vida.
- source_word: יְמֵיהֶם
  english_pob_choice: their days
  chosen_spanish: sus días
  alternatives_spanish:
  - sus jornadas
  lexicon: HALOT
  rationale: Es el equivalente literal y poético; conserva el paralelismo con «sus años».
- source_word: בַּטּוֹב
  english_pob_choice: in prosperity
  chosen_spanish: en prosperidad
  alternatives_spanish:
  - en bien
  - en bienestar
  - en felicidad
  lexicon: HALOT
  rationale: טוב aquí funciona de modo sustantivo con ב; «prosperidad» refleja bien un estado favorable de vida, en línea con la decisión inglesa de no espiritualizar el término.
- source_word: וּשְׁנֵיהֶם
  english_pob_choice: and their years
  chosen_spanish: y sus años
  alternatives_spanish:
  - y sus tiempos
  lexicon: HALOT
  rationale: Mantiene el paralelismo directo con «sus días» y la estructura poética del verso.
- source_word: בַּנְּעִימִים
  english_pob_choice: in pleasantness
  chosen_spanish: en placeres
  alternatives_spanish:
  - en agradabilidad
  - en deleites
  - en dulzura
  lexicon: HALOT
  rationale: El plural de נעים puede expresar deleite o cualidad agradable. «Placeres» comunica de forma natural el matiz de deleite/agrado del paralelo poético, aunque conserva cierta amplitud semántica.
theological_decisions:
- issue: Si el verso debe sonar como promesa absoluta de prosperidad terrenal o como afirmación condicional en el discurso de Eliú
  english_pob_reading: The translation should neither universalize the statement into doctrine nor spiritualize it away; it remains Elihu's conditional claim.
  chosen_spanish_reading: La traducción conserva la condición de Eliú sin convertirla en una garantía doctrinal universal ni en una promesa meramente interior.
  alternative_spanish_readings:
  - Si obedecen, siempre tendrán riqueza material
  - Si obedecen, sólo tendrán bendición espiritual
  rationale: El hebreo presenta una afirmación condicional dentro del discurso sapiencial; por eso el español debe mantener el alcance prudente y no resolver la tensión teológica del libro.
  doctrine_reference: Preservar la tensión teológica del texto en el contexto de la sabiduría bíblica.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; hay alto acuerdo con la versión auditada en inglés, así que el borrador español sigue de cerca las mismas decisiones léxicas y teológicas sin añadir interpretaciones nuevas.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo días/años y prosperidad/placeres para reflejar la poesía hebrea.
  - Se evitó usar «SEÑOR» u otra sustitución porque este verso no contiene el tetragrámaton ni una cita directa del nombre divino.
  - «Sirven» conserva la amplitud de עבד en vez de cargar el texto con «adoran».
