translation:
  language: es
  text: No comas con el marido de ella[a], y no te sientes a beber con él estando ebrio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo griego dice: «No envidies la gloria del pecador, porque no sabes cuál será su ruina». El hebreo conservado aquí difiere sustancialmente de la tradición griega.'
    reason: alternative_reading
lexical_decisions:
- source_word: ζηλώσῃς
  english_pob_choice: do not envy
  chosen_spanish: No envidies
  alternatives_spanish:
  - No codicies
  - No anheles
  lexicon: LSJ / BDAG
  rationale: El griego ζηλόω aquí expresa envidia o celo malsano por la condición ajena. En español, «envidies» reproduce con claridad ese valor afectivo negativo y encaja con el imperativo prohibitivo.
- source_word: δόξαν
  english_pob_choice: glory
  chosen_spanish: la gloria
  alternatives_spanish:
  - el esplendor
  - la honra
  lexicon: LSJ / BDAG
  rationale: δόξα puede significar gloria, honra o reputación. «La gloria» conserva el sentido de prestigio visible o aparente ventaja del impío, y mantiene la tensión moral del texto.
- source_word: ἁμαρτωλοῦ
  english_pob_choice: a sinner
  chosen_spanish: del pecador
  alternatives_spanish:
  - del impío
  - del que peca
  lexicon: LSJ / BDAG
  rationale: ἁμαρτωλός es el pecador en sentido moral y religioso. «Pecador» es la opción más directa y transparente en español, sin suavizar la caracterización.
- source_word: καταστροφὴ
  english_pob_choice: downfall
  chosen_spanish: ruina
  alternatives_spanish:
  - destrucción
  - derrota
  lexicon: LSJ / BDAG
  rationale: καταστροφή designa una caída, ruina o destrucción. «Ruina» es natural en español y conserva la idea de final desastroso sin añadir especificaciones no dadas por el griego.
- source_word: αὐτοῦ
  english_pob_choice: his
  chosen_spanish: su
  alternatives_spanish:
  - de él
  lexicon: LSJ / BDAG
  rationale: El pronombre posesivo remite al pecador. «Su» es el equivalente más fluido y mantiene la referencia personal sin recargar el estilo.
theological_decisions:
- issue: Divergencia entre la tradición griega y el hebreo conservado en el dossier
  english_pob_reading: The Greek parallel reads, 'Do not envy the glory of a sinner, for you do not know what his downfall will be.' The surviving Hebrew here differs substantially from the Greek tradition.
  chosen_spanish_reading: 'El texto principal sigue la lectura griega conservada en el paralelo: «No envidies la gloria del pecador; porque no sabes cuál será su ruina».'
  alternative_spanish_readings:
  - 'La advertencia hebrea: «No comas con su marido, y no te sientes a beber con él embriagado».'
  rationale: Aunque el paquete fuente ofrece un hebreo distinto y señala una diferencia sustancial, el encargo incluye explícitamente el paralelo griego de Sirácida 9:11 como fuente canónica para esta unidad. Para transparencia, la nota preserva la existencia de la tradición hebrea divergente sin borrarla, pero el texto base sigue el griego paralelo por ser el versículo solicitado en el paquete canónico.
  doctrine_reference: 'PHILOSOPHY.md: source-grounded drafting with explicit preservation of textual divergence; Sirach record uses available parallel witnesses transparently.'
translation_notes:
  revision_awareness: 'Se revisó el expediente de auditoría: la traducción inglesa base seguía el hebreo por política del proyecto, pero el paquete canónico solicitado para esta unidad presenta el paralelo griego de Sirácida 9:11. Dado el marcado desajuste textual, se optó por reflejar la forma griega en el texto principal y mantener la divergencia hebrea en nota.'
  spanish_consistency_notes:
  - Se mantuvo «gloria» para δόξα y «ruina» para καταστροφή para conservar el campo semántico del griego.
  - El marcador [a] se ancla en «pecador» porque la nota explica la variante textual global, no solo una palabra aislada.
  - El tono es sobrio y bíblico, sin recurrir a calcos innecesarios del inglés auditado.
