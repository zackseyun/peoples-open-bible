translation:
  language: es
  text: Y el espacio abierto de la ciudad será de doscientos cincuenta[a] codos al norte, de doscientos cincuenta al sur, de doscientos cincuenta al oriente y de doscientos cincuenta al occidente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente «cincuenta y doscientos»; se expresa en español en el orden numérico usual como «doscientos cincuenta».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: shall be
  chosen_spanish: será
  alternatives_spanish:
  - y será
  - y habrá
  lexicon: HALOT
  rationale: El imperfecto con waw consecutiva mantiene en español el valor descriptivo-futuro del reparto; «será» conserva la fuerza normativa/visionaria sin añadir paraphrase.
- source_word: מִגְרָשׁ
  english_pob_choice: open land
  chosen_spanish: terreno abierto
  alternatives_spanish:
  - terreno común
  - pastizal
  - explanada
  lexicon: HALOT
  rationale: El término hebreo designa la franja de tierra abierta reservada alrededor de la ciudad; «terreno abierto» comunica bien la idea de área despejada sin reducirla indebidamente a «pastizal».
- source_word: לָעִיר
  english_pob_choice: the city's
  chosen_spanish: de la ciudad
  alternatives_spanish:
  - para la ciudad
  - perteneciente a la ciudad
  lexicon: HALOT
  rationale: El lamed expresa relación/asignación. En español, «de la ciudad» es la forma más natural y fiel para indicar pertenencia.
- source_word: צָפוֹנָה
  english_pob_choice: to the north
  chosen_spanish: al norte
  alternatives_spanish:
  - hacia el norte
  - en el lado norte
  lexicon: HALOT
  rationale: La forma direccional exige un equivalente espacial claro; «al norte» conserva la medida por lados cardinales en una formulación fluida.
- source_word: חֲמִשִּׁים וּמָאתַיִם
  english_pob_choice: two hundred fifty
  chosen_spanish: doscientos cincuenta
  alternatives_spanish:
  - doscientos y cincuenta
  - cincuenta y doscientos
  lexicon: HALOT
  rationale: Aunque el hebreo ordena literalmente «cincuenta y doscientos», en español normativo la forma natural es «doscientos cincuenta». No se añade «y» porque no ayuda al sentido ni a la lectura pública.
- source_word: וְנֶגְבָּה
  english_pob_choice: to the south
  chosen_spanish: al sur
  alternatives_spanish:
  - hacia el sur
  - en el lado sur
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con los demás puntos cardinales y la lectura cartográfica precisa.
- source_word: וְקָדִימָה
  english_pob_choice: to the east
  chosen_spanish: al oriente
  alternatives_spanish:
  - al este
  - hacia el oriente
  - en el lado oriental
  lexicon: HALOT
  rationale: «Oriente» es un equivalente digno y bíblicamente natural en español; conserva el registro literario del texto sin perder claridad.
- source_word: וְיָמָּה
  english_pob_choice: to the west
  chosen_spanish: al occidente
  alternatives_spanish:
  - al oeste
  - hacia el occidente
  - en el lado occidental
  lexicon: HALOT
  rationale: «Occidente» corresponde al valor direccional y mantiene el paralelismo estilístico con «oriente». Se evita «seaward» por ser menos transparente en español y no necesario aquí.
translation_notes:
  revision_awareness: Se siguió el sentido estable de la edición inglesa POB y no se introdujeron cambios de contenido; solo se ajustó el orden numérico al uso natural del español y se mantuvo la distribución cardinal exacta del hebreo.
  spanish_consistency_notes:
  - Se tradujo מִגְרָשׁ de manera consistente como «terreno abierto», evitando «suburbios» por su anacronismo en español moderno.
  - Se preservó la secuencia de cuatro direcciones cardinales sin alterar el paralelismo del verso.
  - Se optó por «oriente/occidente» para un registro bíblico claro y digno, coherente con el estilo POB en español.
