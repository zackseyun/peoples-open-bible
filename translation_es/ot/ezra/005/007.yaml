    rationale: Aunque no es incorrecto, «estaba escrito» enfatiza el estado resultante. En esta fórmula de introducción del contenido documental, «fue escrito» refleja mejor la presentación puntual de lo que el documento decía y se alinea mejor con el POB inglés «was written».
