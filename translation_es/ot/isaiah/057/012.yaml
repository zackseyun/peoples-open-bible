review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido del hebreo: mantiene el énfasis de אֲנִי con «Yo mismo», traduce אַגִּיד de forma adecuada, conserva el paralelismo entre «tu … y tus obras», y refleja bien el contraste final con «pero». Sin embargo, la elección principal «tu justicia» se aparta innecesariamente de la decisión auditada del POB inglés, que prefirió «your righteousness» y dejó «your justice» como alternativa. En español, «justicia» puede sonar más forense/social que la cualidad moral implícita aquí. Conviene usar «tu rectitud» en el texto principal y dejar «tu justicia» como nota alternativa.'
  spanish_quality_summary: El español es claro y natural. «Yo mismo declararé» y «tus obras» son lecturas fluidas y dignas. «No te aprovecharán» es comprensible, pero suena menos natural en muchos registros eclesiales panhispánicos que «no te beneficiarán»; además, armoniza mejor con el rango semántico documentado («profit, benefit, help»). La revisión propuesta mejora fidelidad terminológica y fluidez sin parafrasear.
  glossary_alignment: No hay términos del glosario mayor implicados como Yahvé/Mesías. El punto clave es צדקה, para el cual el proyecto privilegia por defecto «righteousness». En español, «rectitud» preserva mejor esa orientación que «justicia» en este contexto, dejando «justicia» como alternativa válida en nota. «Obras» está bien alineado. Para יוֹעִילוּךְ, «beneficiarán» expresa con naturalidad el sentido de provecho/beneficio y mantiene la alternativa «ayudarán» en nota.
  issues:
  - severity: medium
    issue: La traducción principal de צִדְקָתֵךְ como «tu justicia» no sigue la decisión principal del POB auditado.
    rationale: El rastro inglés escogió «your righteousness» como lectura principal y «your justice» solo como alternativa. En español, «rectitud» representa mejor esa cualidad moral/religiosa sin introducir un matiz predominantemente judicial.
  - severity: low
    issue: «No te aprovecharán» es menos idiomático y menos preciso que una alternativa como «no te beneficiarán».
    rationale: Aunque se entiende, «aprovechar» transitivo con objeto personal suena más marcado regionalmente. «Beneficiar» comunica mejor el valor lexical documentado de יעל y conserva un registro natural y amplio.
  revised_spanish_text: Yo mismo declararé tu rectitud[a] y tus obras, pero no te beneficiarán[b].
