base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/052/015.yaml
  text: And some of the poorest of the people[a], and the rest of the people who remained in the city, and the deserters who had defected to the king of Babylon, and the rest of the craftsmen—Nebuzaradan, the captain of the guard[c][b], carried into exile.
  footnotes:
  - marker: a
    text: Or 'the rest of the multitude.' The Hebrew term here is difficult; many understand it in this context to refer to craftsmen or artisans, especially in light of the parallel in 2 Kings 25:11.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the ones who fell ... to the king of Babylon,' an idiom for defecting or going over to him.
    reason: lexical_alternative
  - marker: c
    text: Compare 2 Kings 25:11, the parallel account of this deportation.
    reason: cross_reference
