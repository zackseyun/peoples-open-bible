translation:
  language: es
  text: Y Joyadá estableció las responsabilidades de la casa de Yahvé en manos[a] de los sacerdotes, los levitas[b], a quienes David había asignado sobre la casa de Yahvé, para ofrecer los holocaustos de Yahvé, como está escrito en la Ley de Moisés, con alegría y con canto, según lo dispuesto por David[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''en la mano de'', un modismo que significa ''a cargo de'' o ''bajo la autoridad de''.'
    reason: lexical_alternative
  - marker: b
    text: O 'los sacerdotes levitas' o 'los sacerdotes y los levitas'. La expresión hebrea puede entenderse de más de una manera.
    reason: alternative_reading
  - marker: c
    text: O 'por mano de David', es decir, según el arreglo o la prescripción de David.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׂם
  english_pob_choice: appointed
  chosen_spanish: estableció
  alternatives_spanish:
  - nombró
  - puso
  - designó
  lexicon: HALOT
  rationale: En contexto administrativo-templario, שׂים no solo significa 'poner', sino establecer un orden o función. 'Estableció' comunica bien la acción organizadora de Joiada sin sonar rígido.
- source_word: פְּקֻדֹּת
  english_pob_choice: oversight
  chosen_spanish: las responsabilidades
  alternatives_spanish:
  - la supervisión
  - los cargos
  - las funciones
  lexicon: HALOT
  rationale: El término apunta a encargos o tareas asignadas dentro del servicio del templo. 'Responsabilidades' expresa con claridad esa carga administrativa sin forzar un tecnicismo.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa de Yahvé
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de 'casa' en lugar de sustituirla por 'templo', que sería más interpretativo. 'Yahvé' sigue el criterio del proyecto para el Nombre divino.
- source_word: בְּיַד
  english_pob_choice: into the hand of
  chosen_spanish: en manos de
  alternatives_spanish:
  - bajo la autoridad de
  - a cargo de
  - en la responsabilidad de
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y en español natural se vierte como una entrega 'en manos de'. Mantiene la idea de encomienda o encargo.
- source_word: הַכֹּהֲנִים הַלְוִיִּם
  english_pob_choice: the priests, the Levites
  chosen_spanish: los sacerdotes, los levitas
  alternatives_spanish:
  - los sacerdotes levitas
  - los sacerdotes y los levitas
  lexicon: HALOT
  rationale: Se preserva la estructura hebrea sin resolver de antemano si es apposición o una fórmula colectiva. 'Sacerdotes' se usa aquí por claridad española para כֹּהֲנִים, manteniendo 'levitas' como segundo grupo nominal.
- source_word: חָלַק
  english_pob_choice: had assigned
  chosen_spanish: había distribuido
  alternatives_spanish:
  - había asignado
  - había repartido
  - había dividido
  lexicon: HALOT
  rationale: El verbo puede significar dividir, repartir o asignar. En este contexto, la idea es que David organizó personas para funciones concretas; 'había distribuido' conserva ese sentido organizativo.
- source_word: לְהַעֲלוֹת
  english_pob_choice: to offer up
  chosen_spanish: para ofrecer
  alternatives_spanish:
  - para subir
  - para presentar
  lexicon: HALOT
  rationale: En el contexto sacrificial, el valor de עלה en hifil se expresa naturalmente como 'ofrecer'. El complemento 'holocaustos' ya precisa el tipo de ofrenda.
- source_word: עֹלֹות
  english_pob_choice: burnt offerings
  chosen_spanish: los holocaustos
  alternatives_spanish:
  - las ofrendas quemadas
  - los sacrificios totalmente quemados
  lexicon: HALOT
  rationale: '''Holocausto'' es el equivalente sacrificial tradicional y claro en español para עֹלָה/עֹלוֹת. Se mantiene su fuerza técnica y ritual.'
- source_word: כַּכָּתוּב בְּתוֹרַת מֹשֶׁה
  english_pob_choice: as it is written in the Law of Moses
  chosen_spanish: como está escrito en la Ley de Moisés
  alternatives_spanish:
  - según lo escrito en la Ley de Moisés
  - como está escrito en la Torá de Moisés
  lexicon: HALOT
  rationale: La fórmula bíblica se vierte con naturalidad en español y conserva el carácter normativo de la instrucción mosaica.
- source_word: בְּשִׂמְחָה וּבְשִׁיר
  english_pob_choice: with rejoicing and with song
  chosen_spanish: con alegría y con canto
  alternatives_spanish:
  - con regocijo y con canto
  - con gozo y con canción
  lexicon: HALOT
  rationale: '''Alegría'' y ''canto'' transmiten el tono litúrgico de los sustantivos hebreos sin sonar forzado. ''Canto'' funciona bien como término general para la expresión musical del culto.'
- source_word: עַל יְדֵי דָוִיד
  english_pob_choice: according to the direction of David
  chosen_spanish: según la dirección de David
  alternatives_spanish:
  - por la mano de David
  - según la disposición de David
  - conforme a la prescripción de David
  lexicon: HALOT
  rationale: La frase puede implicar agencia o arreglo normativo. 'Según la dirección de David' recoge el valor prescriptivo-administrativo que el audit trail inglés documenta.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto para el Tetragrámaton, evitando la sustitución por un título y preservando el nombre divino revelado.
theological_decisions:
- issue: Tratamiento del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo emplea directamente el Tetragrámaton. La forma española 'Yahvé' conserva el nombre propio de Dios conforme al criterio doctrinal del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Relación entre 'los sacerdotes, los levitas'
  english_pob_reading: Retain the Hebrew-like expression 'the priests, the Levites' without collapsing it into a more interpretive phrase.
  chosen_spanish_reading: los sacerdotes, los levitas
  alternative_spanish_readings:
  - los sacerdotes levitas
  - los sacerdotes y los levitas
  rationale: Se conserva la tensión interpretativa del hebreo sin resolver demasiado la relación sintáctica. Esto respeta la cautela del POB inglés y evita imponer una identificación institucional no explícita.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El texto inglés auditado pasó de 'duties' a 'oversight' para פְּקֻדֹּת y ajustó 'directions' a 'direction' en la frase final. La versión española evita fijarse en una sola glosa técnica demasiado estrecha y usa 'responsabilidades' y 'según la dirección de David', manteniendo el sentido administrativo y normativo reflejado en el último pase revisado.
  spanish_consistency_notes:
  - Se usa 'Yahvé' consistentemente para יְהוָה.
  - Se mantiene la imagen hebrea 'casa de Yahvé' en lugar de 'templo' para conservar la textura del original.
  - '''Holocaustos'' se usa en sentido sacrificial técnico, no en su acepción histórica moderna.'
  - La puntuación conserva la apposición 'los sacerdotes, los levitas' para respetar la ambigüedad del hebreo.
