    text: 'Or, “they killed him.” The Hebrew verb is causative: “they caused him to die,” hence “put him to death.”'
    reason: lexical_alternative
  - marker: b
    text: Or, “the house of Ahaziah had no strength to hold the kingdom.”
    reason: lexical_alternative
