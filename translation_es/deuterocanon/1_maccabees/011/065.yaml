translation:
  language: es
  text: Y Simón acampó en Betsura[a], y combatió contra ella durante muchos días, y la cercó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la bloqueó» / «la tuvo cercada». El verbo griego indica cerrar o encerrar, probablemente describiendo la contención de un asedio.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρεβάλλεν
  english_pob_choice: encamped
  chosen_spanish: acampó
  alternatives_spanish:
  - acamparon
  - puso el campamento
  lexicon: LSJ
  rationale: El verbo griego describe poner el campamento o tomar posición militar. «Acampó» conserva esa idea de presencia militar sin anticipar de más la noción de asedio, que ya queda expresada por los verbos siguientes.
- source_word: Βεθσούρᾳ
  english_pob_choice: Bethsura
  chosen_spanish: Bet-sur
  alternatives_spanish:
  - Betzur
  - Bethsura
  lexicon: Transliteración del topónimo griego
  rationale: Se mantiene el nombre del lugar como transliteración breve y legible en español. «Bet-sur» refleja la forma hebrea subyacente más naturalmente para el lector hispano, sin perder la identificación del lugar.
- source_word: ἐπολέμει
  english_pob_choice: fought against
  chosen_spanish: combatió contra
  alternatives_spanish:
  - hizo guerra contra
  - peleó contra
  lexicon: LSJ
  rationale: El imperfecto indica acción militar continua. «Combatió contra» es natural en español y conserva la idea de hostilidad sostenida mejor que una forma puntual.
- source_word: ἡμέρας πολλὰς
  english_pob_choice: for many days
  chosen_spanish: durante muchos días
  alternatives_spanish:
  - por muchos días
  - muchos días
  lexicon: LSJ
  rationale: La expresión griega marca duración; «durante muchos días» lo explicita de modo natural en español y evita que se lea como mera referencia temporal vaga.
- source_word: συνέκλεισεν
  english_pob_choice: shut it in
  chosen_spanish: la cercó
  alternatives_spanish:
  - la bloqueó
  - la encerró
  - la sitió
  lexicon: LSJ
  rationale: El verbo puede significar encerrar, cercar o bloquear. «La cercó» comunica el efecto de contención militar y conserva la ambigüedad entre cerco y bloqueo que el inglés POB preservó con su nota lexical.
translation_notes:
  revision_awareness: 'El texto griego es breve y coincide plenamente con el testigo fuente; la revisión inglesa reciente no introdujo cambios. La versión española sigue el valor secuencial de los tres verbos: acampar, combatir y cercar, sin fusionarlos en un solo verbo de asedio.'
  spanish_consistency_notes:
  - Se usa «Bet-sur» como transliteración estable del topónimo, manteniendo una forma clara y publicable.
  - «La» remite a la ciudad/fortaleza entendida en el contexto del sitio, como en el griego.
  - Se evita «sitió» en el texto principal para no cerrar demasiado el matiz del último verbo, que puede ser de cerco o bloqueo.
