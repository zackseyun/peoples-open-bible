translation:
  language: es
  text: Tu camino fue por el mar[a], y tus sendas por muchas aguas; tus huellas no se conocieron[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el mar ... en muchas aguas». La preposición hebrea puede traducirse «en», pero aquí probablemente tiene sentido de movimiento a través de las aguas.
    reason: lexical_alternative
  - marker: b
    text: O «tus rastros» o «tus pasos no se conocieron».
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיָּם
  english_pob_choice: through the sea
  chosen_spanish: en el mar
  alternatives_spanish:
  - por el mar
  - a través del mar
  lexicon: HALOT
  rationale: El hebreo con ב puede expresar ubicación o movimiento en/por un medio. En español, «en el mar» conserva la imagen poética sin forzar una preposición más interpretativa; la nota explica que también puede entenderse con sentido de tránsito.
- source_word: דַּרְכְּךָ
  english_pob_choice: your way
  chosen_spanish: tu camino
  alternatives_spanish:
  - tu senda
  - tu vía
  lexicon: HALOT
  rationale: דֶּרֶךְ significa «camino, vía, senda». «Camino» es claro y natural en español, y mantiene la amplitud del término inglés POB «way».
- source_word: שְׁבִילֶיךָ
  english_pob_choice: your paths
  chosen_spanish: tus sendas
  alternatives_spanish:
  - tus caminos
  - tus senderos
  lexicon: HALOT
  rationale: שְׁבִילֵיִם expresa huellas o sendas trazadas. «Sendas» conserva el paralelismo con «camino» y evita repetir exactamente el mismo término con un matiz pobre.
- source_word: בְּמַיִם רַבִּים
  english_pob_choice: through many waters
  chosen_spanish: por muchas aguas
  alternatives_spanish:
  - en muchas aguas
  - entre muchas aguas
  lexicon: HALOT
  rationale: La expresión intensifica la primera cola con pluralidad y abundancia. «Muchas aguas» mantiene el hebraísmo; «por» reproduce mejor el movimiento poético que «en» en español.
- source_word: עִקְּבוֹתֶיךָ
  english_pob_choice: your footprints
  chosen_spanish: tus huellas
  alternatives_spanish:
  - tus pasos
  - tus rastros
  lexicon: HALOT
  rationale: עִקְּבוֹת puede referirse a huellas, pisadas o rastros. «Huellas» es idiomático y visual en español, y deja abierta la imagen de marcas dejadas pero no perceptibles.
- source_word: לֹא נֹדָעוּ
  english_pob_choice: were not known
  chosen_spanish: no fueron conocidas
  alternatives_spanish:
  - no se conocieron
  - no pudieron ser conocidas
  - no fueron reconocidas
  lexicon: HALOT
  rationale: 'El nifal de ידע aquí funciona pasivamente. «No fueron conocidas» conserva la pasividad y la ambigüedad del hebreo: no vistas, no reconocidas o no rastreadas.'
theological_decisions:
- issue: Imagen poética del paso divino por las aguas
  english_pob_reading: Retain the poetic image of God's way through the sea without explicitly naming the Red Sea crossing in the main text.
  chosen_spanish_reading: Mantener la imagen poética del camino de Dios en el mar y por muchas aguas, sin explicitar en el texto principal el cruce del mar Rojo.
  alternative_spanish_readings:
  - Tu camino fue por el mar, y tus sendas por muchas aguas
  - Tu camino estuvo en el mar, y tus sendas en muchas aguas
  rationale: 'El hebreo presenta la escena de forma poética, no como una identificación explícita del episodio histórico. La traducción española debe conservar esa tensión: acción real de Dios en la historia, pero huellas que no quedan accesibles al observador humano.'
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: 'Se comparó con el inglés POB auditado: se conservó la imagen de movimiento por/ dentro de las aguas, el paralelismo camino/sendas, y la pasiva final «no fueron conocidas», sin añadir una referencia explícita al cruce del mar Rojo.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque el versículo no contiene el Tetragrámaton.
  - Se prefirió «camino/sendas» para reflejar el paralelismo poético de דֶּרֶךְ / שְׁבִילִים.
  - «Huellas» mantiene mejor en español la imagen concreta de עִקְּבוֹת que «rastros» en un registro bíblico poético.
