revisions:
- from: Tú has visto[a], Yahvé; no calles. Señor, no te alejes de mí.
  to: Has visto[a], Yahvé; no calles. Señor, no estés lejos de mí.
  rationale: 'Se revisa para ajustar más estrechamente el sentido del hebreo y del English POB: se elimina el pronombre sujeto innecesario y se cambia ''no te alejes de mí'' por ''no estés lejos de mí'', que conserva mejor la idea de distancia relacional/espacial sin introducir movimiento. La nota alternativa se mantiene y se expresa en español natural.'
  reviewer_model: gpt-5.4
