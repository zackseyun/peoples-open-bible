review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el griego de 1 Juan 3:1: mantiene el imperativo exhortativo, el asombro cualitativo de ποταπὴν, el perfecto de δέδωκεν, la inclusión de καὶ ἐσμέν, la causalidad de διὰ τοῦτο/ὅτι y la repetición léxica de γινώσκω. También conserva correctamente la ambigüedad de αὐτόν mediante «lo».'
  spanish_quality_summary: 'El español es claro y digno, pero hay dos detalles que conviene ajustar: «hijos de Dios» pierde parte del valor inclusivo de τέκνα frente a una opción más fiel y natural como «hijos de Dios» puede tolerarse, pero en este contexto «hijos» sigue siendo eclesialmente común; el problema principal real es la nota [a], cuya alternativa repite la lectura principal en vez de ofrecer la alternativa documentada. Además, la nota [e] está mal clasificada como variante textual cuando corresponde a una formulación previa/tradicional de puntuación.'
  glossary_alignment: No hay conflicto con los términos base del proyecto. «Padre», «Dios», «mundo» y «conoce» están bien alineados. La elección «hijos de Dios» es aceptable por uso eclesial, aunque «hijos» no reproduce tan transparentemente el carácter inclusivo de τέκνα como «hijos e hijas» o «niños»; aun así, por legibilidad y tradición bíblica, no exige rechazo.
  issues:
  - severity: medium
    issue: La nota [a] no presenta una alternativa real
    rationale: El texto principal dice «qué clase de amor», y la nota [a] ofrece otra vez «qué clase de amor». Según el audit trail inglés, la alternativa debía ser «qué clase/suerte de amor» o la forma tradicional «cuán grande amor»/similar, no una repetición exacta del texto principal.
  - severity: low
    issue: La nota [e] tiene razón incorrecta
    rationale: 'La nota corresponde al historial de redacción/puntuación previa («the world does not know us: because...»), no a una variante textual griega. Debe conservarse como nota de formulación previa, no como textual_variant.'
  revised_spanish_text: Miren qué clase de amor nos ha dado el Padre[a], para que seamos llamados hijos de Dios, y lo somos[b]. Por esta razón el mundo no nos conoce[e][d][c], porque no lo conoció.
  revised_footnotes:
