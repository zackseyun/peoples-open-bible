  spanish_quality_summary: El español es generalmente claro y natural. La lista de máquinas suena bien en registro bíblico moderno. Aun así, «frente al santuario» atenúa el carácter hostil y la puntuación puede fluir mejor sin coma antes de «y escorpiones». También conviene anclar la nota donde aparece «escorpiones» para evitar confusión del lector.
  glossary_alignment: 'No hay conflictos con la terminología teológica del proyecto. Las decisiones léxicas militares son en general fieles: «lanzadores de proyectiles», «máquinas», «lanzafuegos», «lanzapiedras», «escorpiones». La excepción principal es que «contra el santuario» alinea mejor la fuerza de ἐπί + acusativo en contexto militar que «frente al santuario».'
  issues:
