translation:
  language: es
  text: No coman de él crudo ni cocido en agua, sino solo asado al fuego, con la cabeza, las patas y las entrañas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «su cabeza con sus patas y con sus entrañas».
    reason: lexical_alternative
lexical_decisions:
- source_word: נָא
  english_pob_choice: raw
  chosen_spanish: crudo
  alternatives_spanish:
  - sin cocinar
  - poco cocido
  lexicon: HALOT
  rationale: En este contexto culinario, נָא contrasta con lo cocido por agua o por fuego; “crudo” es el equivalente natural y preciso en español.
- source_word: וּבָשֵׁל מְבֻשָּׁל בַּמָּיִם
  english_pob_choice: or boiled in water
  chosen_spanish: cocido en agua
  alternatives_spanish:
  - hervido en agua
  - cocido, cocido en agua
  lexicon: HALOT
  rationale: La construcción enfatiza una preparación hecha mediante agua; “cocido en agua” preserva la idea sin sonar demasiado técnica, y deja abierta la noción de hervido implícita en el contexto.
- source_word: כִּי אִם
  english_pob_choice: but only
  chosen_spanish: sino
  alternatives_spanish:
  - sino solo
  - excepto
  lexicon: HALOT
  rationale: En español, la correlación negativa natural “no… sino” expresa bien la exclusividad y el contraste fuerte del hebreo.
- source_word: צְלִי אֵשׁ
  english_pob_choice: roasted over the fire
  chosen_spanish: asado al fuego
  alternatives_spanish:
  - rostizado al fuego
  - asado sobre el fuego
  lexicon: HALOT
  rationale: “Asado al fuego” comunica de manera natural el método de cocción y preserva la relación instrumental directa del hebreo.
- source_word: רֹאשׁוֹ עַל כְּרָעָיו וְעַל קִרְבּוֹ
  english_pob_choice: with its head, its legs, and its inner parts
  chosen_spanish: con la cabeza, las patas y las entrañas
  alternatives_spanish:
  - con su cabeza, sus piernas y sus entrañas
  - con la cabeza junto con las patas y con las entrañas
  lexicon: HALOT
  rationale: “Patas” es la forma más natural en español para las extremidades del animal en este contexto. “Entrañas” mantiene el sentido concreto de קִרְבּוֹ y coincide con la alternativa más literal preservada en nota en la tradición auditada.
- source_word: מִמֶּנּוּ
  english_pob_choice: any of it
  chosen_spanish: de él
  alternatives_spanish:
  - de eso
  - de la víctima
  lexicon: HALOT
  rationale: En español, el partitivo ya queda claro en “no coman de él”; no hace falta explicitar “alguno” o “parte de”. Se mantiene la referencia al animal sacrificial.
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo y el audit trail inglés, manteniendo la estructura de prohibición-excepción y la lista de partes del animal. Se prefirió una formulación española natural (“no… sino”) sin perder la precisión culinaria del texto fuente.
  spanish_consistency_notes:
  - Se usa «Yahvé» como término estándar del proyecto solo cuando el texto lo requiera; este versículo no lo contiene.
  - Se mantuvo «entrañas» como equivalente directo de קִרְבּוֹ, evitando un término más técnico o eufemístico.
  - Se evitó «carne» porque el referente es el animal pascual completo, no solo la carne como alimento.
