  glossary_alignment: 'Alineación buena con la terminología del proyecto: יהוה -> ‘Yahvé’ correcto; אֱלֹהִים -> ‘Dios/dioses’ correcto; עבד con dioses -> ‘servir’ correcto. No hay conflictos doctrinales mayores. La única mejora es de estilo/fidelidad idiomática en español, no de glosario.'
