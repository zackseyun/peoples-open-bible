translation:
  language: es
  text: Lo primero[a] de las primicias de tu suelo traerás a la casa de Yahvé tu Dios. No cocerás un cabrito en la leche de su madre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: “las primeras primicias de tu suelo”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רֵאשִׁית
  english_pob_choice: the first of
  chosen_spanish: lo primero
  alternatives_spanish:
  - la primera parte
  - lo mejor
  - el primer fruto
  lexicon: HALOT
  rationale: רֵאשִׁית en esta construcción señala la primicia inicial, no una valoración libre de “lo mejor”. En español, “lo primero” conserva la prioridad temporal y cultual sin añadir interpretación.
- source_word: בִּכּוּרֵי
  english_pob_choice: the firstfruits
  chosen_spanish: las primicias
  alternatives_spanish:
  - los primeros frutos
  - la primera cosecha
  lexicon: HALOT
  rationale: Es el término cultual estándar para la ofrenda de los primeros productos. “Primicias” es el equivalente español más reconocido y preciso.
- source_word: אַדְמָתְךָ
  english_pob_choice: your ground
  chosen_spanish: tu suelo
  alternatives_spanish:
  - tu tierra
  - tu campo
  - tu terreno
  lexicon: HALOT
  rationale: Aquí אֲדָמָה alude al suelo cultivado que produce el fruto. “Suelo” conserva la concreción agrícola mejor que el más amplio “tierra”.
- source_word: תָּבִיא
  english_pob_choice: you shall bring
  chosen_spanish: traerás
  alternatives_spanish:
  - deberás traer
  - llevarás
  - presentarás
  lexicon: HALOT
  rationale: En español legal bíblico, el futuro puede expresar mandato. “Traerás” mantiene el tono injuntivo y es natural; “presentarás” sería más interpretativo en este contexto.
- source_word: בֵּית יְהוָה אֱלֹהֶיךָ
  english_pob_choice: the house of Yahweh your God
  chosen_spanish: la casa de Yahvé tu Dios
  alternatives_spanish:
  - el templo de Yahvé tu Dios
  - la casa del SEÑOR tu Dios
  lexicon: HALOT
  rationale: בֵּית es literalmente “casa”, no “templo”. Se conserva el nombre divino como “Yahvé” según el criterio del proyecto, evitando la sustitución por un título.
- source_word: לֹא תְבַשֵּׁל
  english_pob_choice: You shall not boil
  chosen_spanish: No cocerás
  alternatives_spanish:
  - No hervirás
  - No cocinarás
  lexicon: HALOT
  rationale: בשל puede expresarse como “cocer” en español bíblico amplio, abarcando la acción culinaria prohibida sin restringirla demasiado al hervor literal. “Hervir” sería más estrecho; “cocinar” más general.
- source_word: גְּדִי
  english_pob_choice: a young goat
  chosen_spanish: un cabrito
  alternatives_spanish:
  - un joven chivo
  - una cría de cabra
  lexicon: HALOT
  rationale: “Cabrito” es el equivalente natural y tradicional para גְּדִי, preservando el referente de una cría caprina sin ambigüedad.
- source_word: בַּחֲלֵב אִמּוֹ
  english_pob_choice: in its mother's milk
  chosen_spanish: en la leche de su madre
  alternatives_spanish:
  - en su leche materna
  - en la leche de la madre
  lexicon: HALOT
  rationale: La frase hebrea se refleja de manera directa en español. “Leche de su madre” mantiene el paralelismo y la imagen prohibitiva sin domesticarla.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrama; el proyecto exige rendirlo como “Yahvé”. Se evita la sustitución por “SEÑOR” para no ocultar el nombre propio revelado en el pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Force of the sacrificial agricultural phrase רֵאשִׁית בִּכּוּרֵי
  english_pob_reading: the first of the firstfruits
  chosen_spanish_reading: lo primero de las primicias
  alternative_spanish_readings:
  - la primera de las primicias
  - las primicias primeras
  - la mejor parte de las primicias
  rationale: La combinación expresa prioridad, no calidad evaluativa. “Lo primero de las primicias” conserva la tensión semántica documentada por el POB inglés sin convertirla en una valoración libre.
  doctrine_reference: 'DOCTRINE.md: Faithful lexical precision in cultic law'
- issue: לֹא תְבַשֵּׁל גְּדִי בַּחֲלֵב אִמּוֹ
  english_pob_reading: You shall not boil a young goat in its mother's milk
  chosen_spanish_reading: No cocerás un cabrito en la leche de su madre
  alternative_spanish_readings:
  - No hervirás un cabrito en la leche de su madre
  - No cocinarás un cabrito en la leche de su madre
  rationale: La prohibición se expresa sin suavizarla ni ampliar su sentido. “Cocer” funciona como término culinario suficientemente literal y natural en español, manteniendo la fuerza legal del mandato.
  doctrine_reference: 'DOCTRINE.md: Preserve concrete legal imagery'
translation_notes:
  revision_awareness: El cierre de revisión del POB inglés corrigió “the best of the firstfruits” a “the first of the firstfruits” para reflejar רֵאשִׁית con mayor precisión y evitar expansión interpretativa. Esta versión española sigue esa corrección con “lo primero de las primicias”, no con una valoración de calidad.
  spanish_consistency_notes:
  - Se mantiene “Yahvé” como forma principal para יְהוָה, en consonancia con la directriz del proyecto.
  - Se prefirió “primicias” para el término cultual fijo בִּכּוּרֵי.
  - “Cabrito” conserva la imagen concreta de גְּדִי sin ambigüedad.
  - La nota al pie marca la alternativa más literal sobre רֵאשִׁית sin duplicar el sentido principal en el cuerpo del texto.
