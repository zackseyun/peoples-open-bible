translation:
  language: es
  text: Así comieron y quedaron muy saciados, y él les trajo lo que anhelaban[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su deseo» / «su anhelo». El sustantivo hebreo puede denotar el deseo en abstracto o la cosa deseada.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאכְלוּ
  english_pob_choice: they ate
  chosen_spanish: comieron
  alternatives_spanish:
  - comieron
  - se alimentaron
  lexicon: HALOT
  rationale: El verbo básico אכל expresa comer de manera ordinaria. «Comieron» es natural en español y conserva el sentido directo del hebreo.
- source_word: וַיִּשְׂבְּעוּ מְאֹד
  english_pob_choice: were very full
  chosen_spanish: quedaron muy satisfechos
  alternatives_spanish:
  - estuvieron muy saciados
  - quedaron completamente satisfechos
  lexicon: HALOT
  rationale: שׂבע comunica saciedad o plenitud. «Quedaron muy satisfechos» transmite la idea concreta de haber comido en abundancia, sin sonar forzado; «muy» reproduce מְאֹד como intensificador.
- source_word: תַאֲוָתָם
  english_pob_choice: what they craved
  chosen_spanish: lo que anhelaban
  alternatives_spanish:
  - su deseo
  - su anhelo
  - lo que deseaban
  lexicon: HALOT
  rationale: La forma puede designar el deseo en abstracto o el objeto deseado. En este contexto, el sentido es el objeto apetecido/procurado; «lo que anhelaban» mantiene esa referencia concreta sin volverla demasiado técnica o moralizada.
- source_word: יָבִא לָהֶם
  english_pob_choice: he brought them
  chosen_spanish: él les llevó
  alternatives_spanish:
  - él les trajo
  - él les hizo llegar
  lexicon: HALOT
  rationale: El hiphil de בוא puede funcionar con el sentido de «traer / hacer venir». En español, «les llevó» comunica bien la provisión dada por Dios. Se mantiene el sujeto implícito como «él», según el flujo del salmo.
theological_decisions:
- issue: Sujeto implícito de יָבִא
  english_pob_reading: 'God is the implied subject: ''he brought them what they craved.'''
  chosen_spanish_reading: Dios queda como sujeto implícito expresado por «él».
  alternative_spanish_readings:
  - 'un impersonal: «les llegó lo que anhelaban»'
  - «su anhelo les llegó»
  rationale: El contexto del salmo presenta a Dios como quien provee. El causativo hebreo favorece la idea de traer/proporcionar, por lo que «él» conserva el agente sin añadir algo ajeno al texto.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios respecto del análisis auditado; el texto español conserva la imagen de saciedad y la ambigüedad útil de תַאֲוָה sin perder fluidez.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque aquí el sujeto divino no aparece explícitamente en el hebreo; solo se expresa con pronombre implícito en la forma verbal.
  - «Satisfechos» se eligió por claridad natural en español frente a un calco más duro como «saciados», aunque ambas opciones son compatibles con שׂבע.
