    rationale: El griego συνέσει λόγων elogia la comprensión/prudencia manifestada en el hablar. 'De palabras' suena literalista y puede sugerir mera elección léxica, no sabiduría en el discurso. 'Sabiduría al hablar' preserva mejor el sentido y la legibilidad.
