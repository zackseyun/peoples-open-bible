  to: 'Y Eliseo volvió a Gilgal[a], y había una hambruna en la tierra. Los hijos de los profetas estaban sentados delante de él, y dijo a su criado: «Pon la olla grande y cuece un guisado para los hijos de los profetas».'
  rationale: Se ajusta únicamente la expresión de רָעָב para reflejar con más precisión «famine» como calamidad colectiva, no solo hambre individual. El resto del versículo es fiel, natural y bien alineado con las decisiones del POB inglés.
