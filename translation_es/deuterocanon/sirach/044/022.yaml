translation:
  language: es
  text: Y también para Isaac estableció un hijo[a], por causa de Abraham su padre. Le dio un pacto con todo primogénito[b], y la bendición reposó sobre la cabeza de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: "una bendición de todos los hombres y un pacto", donde el hebreo aquí dice "hijo". Esta línea hebrea es difícil, y el griego conserva un sentido más amplio y universal.'
    reason: alternative_reading
  - marker: b
    text: El texto hebreo parece estar alterado en el punto donde dice "hijo"; el paralelo griego apoya aquí el sentido de "pacto" en este versículo.
    reason: textual_variant
lexical_decisions:
- source_word: καὶ ἐν τῷ Ἰσαὰκ / וגם ליצחק הקים
  english_pob_choice: And also for Isaac he established
  chosen_spanish: Y también para Isaac estableció
  alternatives_spanish:
  - Y también en Isaac estableció
  - Y también en Isaac lo estableció
  lexicon: HALOT; Swete LXX
  rationale: La preposición hebrea ל permite 'para' o 'en', y el griego ἐν τῷ Ἰσαὰκ sugiere una acción que se sitúa en Isaac como ámbito o línea de realización. En español, 'para Isaac' suena más natural y conserva la relación beneficiaria sin forzar una construcción poco idiomática.
- source_word: בן
  english_pob_choice: a son
  chosen_spanish: un hijo
  alternatives_spanish:
  - un hijo varón
  - un descendiente
  lexicon: HALOT; audit trail on textual difficulty
  rationale: El hebreo transmitido dice בן, 'hijo'. Mantener 'un hijo' respeta el testimonio hebreo, aunque el contexto inmediato y el griego apoyan lecturas distintas. 'Hijo' es la forma más directa y publicable en español.
- source_word: בעבור אברהם אביו
  english_pob_choice: because of Abraham his father
  chosen_spanish: por causa de Abraham su padre
  alternatives_spanish:
  - a causa de Abraham su padre
  - por el bien de Abraham su padre
  lexicon: HALOT
  rationale: בעבור expresa causalidad o motivo. 'Por causa de' conserva ese valor y suena natural en español bíblico moderno sin añadir interpretación.
- source_word: ברית
  english_pob_choice: a covenant
  chosen_spanish: un pacto
  alternatives_spanish:
  - una alianza
  - un convenio
  lexicon: HALOT; Greek διαθήκη
  rationale: Aunque el inglés POB usa 'covenant', en español 'pacto' comunica bien la fuerza bíblica de ברית/διαθήκη con lectura eclesial amplia. 'Pacto' evita una fórmula excesivamente técnica y mantiene el sentido relacional-jurídico.
- source_word: כל ראשון
  english_pob_choice: with every firstborn
  chosen_spanish: de todos los primogénitos
  alternatives_spanish:
  - con cada primogénito
  - para todos los primogénitos
  lexicon: HALOT; Greek πάντων ἀνθρώπων
  rationale: El hebreo transmitido es difícil. La frase española intenta conservar la literalidad de la cadena nominal, mientras el griego ofrece una lectura variante más universal. Por eso la formulación no se normaliza hacia una explicación interpretativa en el texto principal.
- source_word: נתיו
  english_pob_choice: he gave him
  chosen_spanish: Le dio
  alternatives_spanish:
  - se lo dio
  - le concedió
  lexicon: HALOT
  rationale: La forma verbal apunta a נתן, 'dar'. En español, 'Le dio' expresa el objeto indirecto implícito y mantiene el valor de concesión o entrega sin sobrecargar la cláusula.
- source_word: וברכה נחה על ראש ישראל
  english_pob_choice: and the blessing rested on the head of Israel
  chosen_spanish: y la bendición reposó sobre la cabeza de Israel
  alternatives_spanish:
  - y la bendición se asentó sobre la cabeza de Israel
  - y la bendición descansó sobre la cabeza de Israel
  lexicon: HALOT
  rationale: נחה significa 'reposar' o 'descansar'. 'Reposó' conserva la imagen hebrea y suena dignamente bíblica en español. 'La cabeza de Israel' mantiene el gesto de bendición recibida sobre el patriarca.
theological_decisions:
- issue: Tensión textual entre el hebreo בן / ברית and the griego διαθήκην
  english_pob_reading: The English POB preserves the Hebrew difficulty in the note while translating the line toward covenant language supported by the Greek.
  chosen_spanish_reading: El texto principal mantiene 'un hijo' por fidelidad al hebreo, pero conserva 'un pacto' para reflejar la línea de sentido covenantal presente en el contexto y en el griego.
  alternative_spanish_readings:
  - '''un hijo'' en todo el versículo'
  - '''un pacto'' sustituyendo completamente la referencia a ''un hijo'''
  rationale: 'La tradición hebrea y la griega no coinciden plenamente en este punto. En español conviene no borrar la tensión: se mantiene el sustantivo transmitido por el hebreo y se deja visible el lenguaje de pacto que el contexto exige, sin resolver artificialmente la dificultad.'
  doctrine_reference: Textual criticism; historical-canonical reading of Sirach 44:22
- issue: Identidad de 'Israel'
  english_pob_reading: Israel refers to the patriarch Jacob/Israel, the recipient of the blessing line.
  chosen_spanish_reading: Israel se entiende primariamente como el patriarca Jacob/Israel, aunque la expresión también resuena con el pueblo descendiente de él.
  alternative_spanish_readings:
  - Israel como el pueblo de Israel
  - Israel como nombre meramente colectivo
  rationale: En este catálogo ancestral la secuencia Abraham–Isaac–Israel apunta naturalmente al patriarca Jacob. Mantener el nombre sin expansión preserva la ambigüedad histórica y literaria del texto.
  doctrine_reference: Genesis 32:28; ancestral blessing tradition
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del inglés POB, que devolvió ''son'' al hebreo transmitido, pero también la nota auditada que señala la dificultad textual y el apoyo del griego para el lenguaje de ''pacto''. La versión española conserva esa tensión: traduce בן como ''un hijo'', pero hace explícito el pacto en la cláusula siguiente y no intenta armonizar artificialmente los dos testigos.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - '''Pacto'' se usa para ברית/διαθήκη según el valor bíblico estándar del pasaje.'
  - '''Primogénitos'' preserva la dificultad del hebreo sin sustituirla por una paráfrasis.'
  - La puntuación divide el versículo en dos oraciones para reflejar mejor la sintaxis y la pausa del testimonio hebreo-griego.
