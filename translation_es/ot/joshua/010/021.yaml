review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien la estructura básica del hebreo: regreso de todo el pueblo al campamento, hacia Josué en Maquedá, y la idea de que nadie habló hostilmente contra los hijos de Israel. Sin embargo, la nota al pie está invertida: presenta como alternativa idiomática exactamente la misma redacción del texto principal, y omite la alternativa verdaderamente idiomática equivalente a ''nadie dijo una palabra contra...''.'
  spanish_quality_summary: El español es mayormente claro y digno, pero 'movió su lengua' suena algo rígido en español. Puede mantenerse en el texto por cercanía al inglés POB revisado y al hebreo, siempre que la nota ofrezca la paráfrasis idiomática correcta. También conviene adaptar la grafía del topónimo a 'Maquedá', forma más natural en español bíblico que 'Makkedá'.
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. 'Josué', 'hijos de Israel' y el resto están bien alineados. Aunque aquí no aparece Yahvé, la política general no se ve afectada. La decisión de conservar 'hijos de Israel' sigue correctamente la rationale documentada sobre בני ישראל.
  issues:
  - severity: medium
    issue: Nota al pie incorrecta o mal formulada
    rationale: 'La nota dice: ''O, más idiomáticamente: «Nadie movió la lengua contra los hijos de Israel»'', que no es una alternativa más idiomática al texto principal ''Nadie movió su lengua...''; además cambia innecesariamente ''su lengua'' a ''la lengua''. La nota debe reflejar la alternativa idiomática equivalente a ''Nadie dijo una palabra contra los hijos de Israel'' y reservar ''afiló su lengua'' para la literalidad hebrea.'
  - severity: low
    issue: Topónimo 'Makkedá' poco natural en español
    rationale: Aunque comprensible, 'Makkedá' conserva una transliteración más cercana al inglés. En español bíblico general es preferible 'Maquedá', que mejora la legibilidad sin afectar el sentido.
  revised_spanish_text: Y todo el pueblo volvió al campamento, a Josué en Maquedá, en paz. Nadie movió su lengua[a] contra los hijos de Israel.
  revised_footnotes:
  - marker: a
    text: 'O, más idiomáticamente: «Nadie dijo una palabra contra los hijos de Israel». El hebreo dice literalmente: «Nadie afiló su lengua».'
    reason: lexical_alternative
  revision_rationale: Se corrige la nota al pie para que preserve correctamente la alternativa idiomática y la literalidad hebrea documentadas en la auditoría inglesa. También se normaliza el topónimo a 'Maquedá' para un español más natural. Se mantiene 'movió su lengua' en el texto principal por fidelidad al inglés POB revisado y al color idiomático del original, apoyado por la nota explicativa.
