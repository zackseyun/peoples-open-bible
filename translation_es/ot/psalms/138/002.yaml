review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura general del hebreo y mantiene la cláusula difícil final cerca del TM. Sin embargo, «por tu gran amor» debilita el valor léxico de חֶסֶד, que en el rastro POB se fijó como amor constante/leal/steadfast love, no meramente intensidad emocional. También el anclaje de la nota [a] está colocado en «tu nombre», pero la nota explica la cláusula final difícil, por lo que debe moverse a esa cláusula.
  spanish_quality_summary: El español es claro y digno, pero puede mejorarse para alinearse mejor con el proyecto y con la naturalidad bíblica. «Me postraré» es aceptable, y «hacia tu templo santo» también. Conviene ajustar «gran amor» a una formulación que exprese fidelidad estable, y reubicar la nota al lugar pertinente.
  glossary_alignment: No hay conflicto con términos mayores del glosario. La principal desviación es חֶסֶד -> «gran amor», que no preserva adecuadamente la idea de amor constante/leal documentada en el POB. «Tu fidelidad» para אֱמֶת y «tu palabra» para אִמְרָה están bien.
  issues:
  - severity: medium
    issue: חֶסֶד traducido como «gran amor»
    rationale: El hebreo y la decisión léxica inglesa apuntan a amor constante/leal/steadfast love. «Gran amor» enfatiza magnitud, pero pierde el matiz de constancia pactual y fiabilidad que el paralelismo con «fidelidad» refuerza.
  - severity: medium
    issue: La nota [a] está anclada en «tu nombre» en vez de la cláusula final difícil
    rationale: La nota trata alternativas para «porque has engrandecido tu palabra sobre todo tu nombre», no para «tu nombre» por sí solo. El anclaje actual puede inducir a pensar que la nota explica únicamente «nombre».
  - severity: low
    issue: «Porque» puede sonar un poco más explicativo que el estilo más conciso del inglés «for»
    rationale: No es incorrecto, pero «pues» o «porque» ambos son posibles. No requiere cambio si se mantiene la fluidez general.
  revised_spanish_text: Me postraré hacia tu templo santo y daré gracias a tu nombre por tu amor constante y tu fidelidad, porque has engrandecido tu palabra sobre todo tu nombre[a].
