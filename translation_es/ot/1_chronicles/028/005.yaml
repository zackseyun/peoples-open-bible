  to: Y de entre todos mis hijos varones—porque Yahvé me ha dado muchos hijos—eligió a Salomón, mi hijo, para sentarse en el trono del reino de Yahvé sobre Israel[a][b].
  rationale: Se ajusta «mis hijos» a «mis hijos varones» para reflejar mejor בָּנַי en un contexto dinástico y alinearse con la decisión léxica del POB en inglés. Se mantiene el resto del verso porque preserva fielmente el sentido hebreo y la teología del texto. Se pule levemente la nota verbal para sonar más natural en español.
