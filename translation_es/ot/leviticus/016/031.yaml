review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo: la construcción intensiva שַׁבַּת שַׁבָּתוֹן se conserva como reposo pleno, וְעִנִּיתֶם ... נַפְשֹׁתֵיכֶם se vierte de manera amplia sin reducirla a ayuno, y חֻקַּת עוֹלָם mantiene su fuerza legal duradera. La nota léxica también preserva correctamente la alternativa más formal.'
  spanish_quality_summary: La redacción es generalmente clara y digna, pero requiere un ajuste importante de naturalidad y precisión cultual. En español bíblico y eclesial, 'sábado' puede entenderse primariamente como el séptimo día de la semana, mientras que aquí שַׁבַּת es la designación cultual 'Sabbath'. Además, anclar la nota en 'sábado' no corresponde al motivo de la nota, que explica 'se humillarán'. Conviene reubicar la nota y usar 'Sabbat'/'Sabbath' no; mejor 'Sábado de completo reposo' suena ambiguo. La solución más fiel y legible es 'Es un sabbat de completo reposo...' o mejor 'Es un sábado de descanso completo' no, pero el proyecto prioriza fidelidad cultual. En español ampliamente legible, 'Es un día de completo descanso sabático' sería más interpretativo. Por tanto recomiendo 'Es un sabbat de completo reposo...' como préstamo técnico inteligible en contexto, con la nota en 'se humillarán'.
  glossary_alignment: 'No hay términos de glosario mayor en juego como Yahvé o Mesías. La decisión principal es שַׁבַּת: el borrador usa ''sábado'', pero esto debilita la razón documentada de mantener una designación cultual fija. La alternativa propuesta preserva mejor la intención del POB inglés. ''Se humillarán'' concuerda con la decisión teológica documentada; ''estatuto perpetuo'' es aceptable.'
  issues:
  - severity: medium
    issue: La nota al pie [a] está anclada en 'sábado' en vez de en 'se humillarán'.
    rationale: La nota explica la alternativa léxica de וְעִנִּיתֶם ('se afligirán'), no el término שַׁבַּת. Debe colocarse donde corresponde para reflejar con precisión el audit trail.
  - severity: medium
    issue: '''sábado'' puede sonar demasiado como el nombre del día de la semana y no como designación cultual fija.'
    rationale: La decisión inglesa retuvo 'Sabbath' precisamente por su carácter teológico/cúltico. En español, 'sábado' es natural pero puede perder ese matiz y crear ambigüedad contextual.
  revised_spanish_text: Es un sabbat de completo reposo para ustedes, y se humillarán[a]; es un estatuto perpetuo.
  revised_footnotes:
  - marker: a
    text: O "se afligirán"; tradicionalmente se entiende que esto incluye ayuno y autonegación.
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota para que corresponda al verbo וְעִנִּיתֶם, y se ajusta שַׁבַּת a 'sabbat' para conservar mejor la designación cultual fija que el POB inglés mantuvo como 'Sabbath'. El resto del versículo ya preservaba bien el sentido fuente y la decisión teológica documentada.
