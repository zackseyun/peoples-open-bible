  text: הֶחֱשֵׁ֨יתִי֙ מֵֽ/עוֹלָ֔ם אַחֲרִ֖ישׁ אֶתְאַפָּ֑ק כַּ/יּוֹלֵדָ֣ה אֶפְעֶ֔ה אֶשֹּׁ֥ם וְ/אֶשְׁאַ֖ף יָֽחַד׃
