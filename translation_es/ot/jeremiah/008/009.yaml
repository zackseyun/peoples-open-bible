    text: O «tomados», «apresados» o «atrapados». El verbo hebreo puede indicar ser capturados o quedar atrapados.
    reason: lexical_alternative
  revision_rationale: Se ajusta «se espantan» a «quedan consternados» para reflejar mejor חַתּוּ; se mejora la pregunta retórica final con «así que» para expresar con naturalidad el valor inferencial; y se amplía la nota léxica para incluir «atrapados», en línea con las alternativas documentadas. No hace falta adjudicación adicional.
