translation:
  language: es
  text: 'El rey respondió y dijo: «¿No es esta Babilonia la Grande[a], que yo mismo edifiqué como residencia real[b], por la fuerza de mi poder y para la gloria de mi majestad?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la gran Babilonia».
    reason: lexical_alternative
  - marker: b
    text: O «para una residencia real» o «para la casa del reino».
    reason: lexical_alternative
lexical_decisions:
- source_word: עָנֵה ... וְאָמַר
  english_pob_choice: answered and said
  chosen_spanish: respondió y dijo
  alternatives_spanish:
  - contestó y dijo
  - respondió, diciendo
  lexicon: HALOT
  rationale: La fórmula narrativa aramea se conserva con dos verbos en español para reflejar el doble movimiento del original sin volverlo rígido. «Respondió y dijo» es natural en español bíblico y mantiene el tono solemne.
- source_word: הֲלָא
  english_pob_choice: Is ... not
  chosen_spanish: ¿No es ...?
  alternatives_spanish:
  - ¿Acaso no es ...?
  - ¿No será ...?
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica que espera afirmación. «¿No es...?» preserva con claridad esa fuerza interrogativa.
- source_word: דָא הִיא
  english_pob_choice: this
  chosen_spanish: esta
  alternatives_spanish:
  - esta misma
  - esto
  lexicon: HALOT
  rationale: El demostrativo femenino concuerda con «Babilonia». En español, «esta» basta para reproducir la referencia directa y enfática del original.
- source_word: בָּבֶל רַבְּתָא
  english_pob_choice: Babylon the Great
  chosen_spanish: Babilonia la Grande
  alternatives_spanish:
  - la gran Babilonia
  - Babilonia la grande
  lexicon: HALOT
  rationale: Se conserva el orden apposicional del hebreo/arameo y el matiz enfático del adjetivo pospuesto. «La Grande» mantiene el tono altivo del hablante y refleja la decisión inglesa de tratar la expresión como una formulación memorable.
- source_word: דִּי
  english_pob_choice: which
  chosen_spanish: que
  alternatives_spanish:
  - la cual
  - la que
  lexicon: HALOT
  rationale: La relativa introduce la cláusula descriptiva de forma natural en español. «Que» es la opción más fluida y fiel al valor relativo de דִּי.
- source_word: אֲנָה
  english_pob_choice: I myself
  chosen_spanish: yo mismo
  alternatives_spanish:
  - yo
  - yo mismo, en persona
  lexicon: HALOT
  rationale: El pronombre explícito es enfático. «Yo mismo» conserva la autoafirmación orgullosa del rey sin añadir exclusividad no requerida por el texto.
- source_word: בֱנַיְתַהּ
  english_pob_choice: built
  chosen_spanish: edifiqué
  alternatives_spanish:
  - construí
  - edifiqué para mí
  lexicon: HALOT
  rationale: «Edifiqué» es solemne y adecuado para una obra monumental. Además, evita la banalidad de «construí» y mantiene la grandeza retórica del pasaje.
- source_word: לְבֵית מַלְכוּ
  english_pob_choice: as a royal residence
  chosen_spanish: como residencia real
  alternatives_spanish:
  - para una residencia real
  - como casa del reino
  lexicon: HALOT
  rationale: La expresión es literalmente cercana a «casa del reino», pero el contexto pide una formulación inteligible en español. «Residencia real» sigue la revisión inglesa, que privilegia la naturalidad contextual sin reducir el sentido a un simple palacio.
- source_word: בִּתְקַף חִסְנִי
  english_pob_choice: by the might of my power
  chosen_spanish: con la fuerza de mi poder
  alternatives_spanish:
  - con el poder de mi fuerza
  - por la fuerza de mi poder
  lexicon: HALOT
  rationale: La redundancia intensificadora del original se mantiene. «Fuerza de mi poder» reproduce el tono jactancioso y acumulativo de la frase aramea.
- source_word: וְלִיקָר הַדְרִי
  english_pob_choice: for the glory of my majesty
  chosen_spanish: para la gloria de mi majestad
  alternatives_spanish:
  - y para el honor de mi esplendor
  - y para la gloria de mi esplendor
  lexicon: HALOT
  rationale: «Gloria» y «majestad» conservan la elevación retórica de לִיקָר y הַדְרִי. La preposición «para» sigue de cerca la finalidad o motivación expresada en el original.
theological_decisions:
- issue: Traducción del calificativo de Babilonia con tono de autoexaltación real
  english_pob_reading: Babylon the Great
  chosen_spanish_reading: Babilonia la Grande
  alternative_spanish_readings:
  - la gran Babilonia
  - Babilonia la grande
  rationale: No se suaviza la autoexaltación del rey. «La Grande» conserva la fuerza retórica y el carácter enfático del original, que forma parte del orgullo que el contexto narrativo pone en evidencia.
  doctrine_reference: Daniel 4:27; contexto inmediato de la soberbia de Nabucodonosor
- issue: Interpretación de לְבֵית מַלְכוּ
  english_pob_reading: for the house of the kingdom / a royal residence
  chosen_spanish_reading: como residencia real
  alternative_spanish_readings:
  - para una residencia real
  - como casa del reino
  rationale: Se adopta una expresión clara y contextual que no borra la imagen de la «casa» ni la función política-real. La decisión sigue la revisión inglesa que prefirió una formulación más natural sin perder precisión.
  doctrine_reference: Daniel 4:27; uso contextual de בית מלכוּ
- issue: Conservación de la redundancia intensificadora del rey
  english_pob_reading: by the might of my power ... glory of my majesty
  chosen_spanish_reading: con la fuerza de mi poder ... para la gloria de mi majestad
  alternative_spanish_readings:
  - con el poder de mi fuerza ... y para el honor de mi esplendor
  - por la fuerza de mi poder ... para la gloria de mi esplendor
  rationale: No se elimina la redundancia porque funciona teológicamente como exhibición del orgullo humano. La formulación española mantiene el paralelismo y la acumulación de términos de autoensalzamiento.
  doctrine_reference: Daniel 4:27; contraste temático con la soberanía de Dios en Daniel 4
translation_notes:
  revision_awareness: La redacción española sigue de cerca la decisión inglesa revisada de tratar לְבֵית מַלְכוּ como una expresión contextual de «residencia real», evitando un calco pesado como «casa del reino» y manteniendo el tono altivo del pasaje. También conserva la estructura retórica de la pregunta y la acumulación intensificadora del final, sin diluir el orgullo del monarca.
  spanish_consistency_notes:
  - Se usa «Babilonia» para el topónimo, no «Babilón».
  - Se mantiene el pronombre enfático «yo mismo» para reflejar אֲנָה.
  - «Majestad» se emplea como sustantivo de autoexaltación real, no como título divino.
  - La puntuación reproduce una pregunta directa con comillas de estilo español.
  - No se introduce terminología eclesiástica ajena al contexto narrativo.
