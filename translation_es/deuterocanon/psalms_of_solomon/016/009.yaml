translation:
  language: es
  text: Dirige las obras de mis manos en tu presencia[a], y guarda mis pasos en tu recuerdo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «en tu lugar». La revisión auditada favorece «en tu presencia» como el sentido más natural en la oración.
    reason: lexical_alternative
  - marker: b
    text: O «en el recuerdo de ti»; la frase puede entenderse como el recuerdo del creyente dirigido a Dios, no como Dios recordando al creyente.
    reason: theological_note
lexical_decisions:
- source_word: κατεύθυνον
  english_pob_choice: Direct
  chosen_spanish: Dirige
  alternatives_spanish:
  - Guía
  - Endereza
  - Haz rectas
  lexicon: BDAG
  rationale: Imperativo de petición a Dios para ordenar rectamente la acción del hablante. «Dirige» conserva la fuerza directiva del verbo y suena natural en español bíblico contemporáneo.
- source_word: τὰ ἔργα τῶν χειρῶν μου
  english_pob_choice: the works of my hands
  chosen_spanish: las obras de mis manos
  alternatives_spanish:
  - las acciones de mis manos
  - mis obras
  - la labor de mis manos
  lexicon: BDAG
  rationale: «Obras» mantiene la amplitud de ἔργα y «de mis manos» conserva el giro concreto e idiomático del original.
- source_word: ἐν τόπῳ σου
  english_pob_choice: in your presence
  chosen_spanish: en tu presencia
  alternatives_spanish:
  - en tu lugar
  - en tu sitio
  - en tu ámbito
  lexicon: BDAG
  rationale: El griego dice literalmente «en tu lugar», pero la revisión inglesa favorece «in your presence» por mejor adecuación contextual. En español, «en tu presencia» expresa esa relación sin sonar forzado y preserva la tensión entre literalidad y sentido pragmático.
- source_word: τὰ διαβήματά μου
  english_pob_choice: my steps
  chosen_spanish: mis pasos
  alternatives_spanish:
  - mis andar
  - mis caminos
  - mis movimientos
  lexicon: BDAG
  rationale: «Pasos» reproduce el valor concreto de la imagen y funciona bien como metáfora de la conducta o trayectoria de vida.
- source_word: ἐν τῇ μνήμῃ σου
  english_pob_choice: in your remembrance
  chosen_spanish: en tu memoria
  alternatives_spanish:
  - en tu recuerdo
  - en el recuerdo de ti
  - en tu remembranza
  lexicon: BDAG
  rationale: 'La revisión inglesa subraya que el genitivo es objetivo: la memoria/remembranza del orante respecto de Dios. En español, «en tu memoria» conserva la construcción breve y ambigua lo suficiente para no borrar la relación con Dios como objeto del recordar.'
- source_word: διαφύλαξον
  english_pob_choice: guard
  chosen_spanish: guarda
  alternatives_spanish:
  - preserva
  - custodia
  - protégelos
  lexicon: BDAG
  rationale: «Guarda» comunica el matiz de proteger y mantener seguro sin introducir un registro más interpretativo que «preserva».
theological_decisions:
- issue: 'Sentido de ἐν τῇ μνήμῃ σου: si es la memoria de Dios o el recuerdo del creyente hacia Dios'
  english_pob_reading: in your remembrance
  chosen_spanish_reading: en tu memoria
  alternative_spanish_readings:
  - en el recuerdo de ti
  - en la memoria de ti
  - en tu recuerdo
  rationale: 'La auditoría revisada indica que el genitivo es objetivo: se trata de la memoria/remembranza del orante orientada a Dios, no principalmente de Dios recordando al orante. «En tu memoria» mantiene la formulación breve del texto base y permite que la nota aclare la alternativa interpretativa sin fijar de más el sentido.'
  doctrine_reference: grammatical/genitive relation; parallel note from PSS.16.6 in audit trail
- issue: 'Valor de ἐν τόπῳ σου: lugar literal versus presencia contextual'
  english_pob_reading: in your presence
  chosen_spanish_reading: en tu presencia
  alternative_spanish_readings:
  - en tu lugar
  - en tu sitio
  - en tu presencia
  rationale: Aunque τόπος significa «lugar», el flujo de la oración favorece una formulación relacional. «En tu presencia» es natural en español y refleja la decisión auditada del inglés sin negar la literalidad subyacente.
  doctrine_reference: lexical/contextual rendering; prayer register
translation_notes:
  revision_awareness: La base griega de Swete dice literalmente «en tu lugar» y «en tu memoria». El audit trail inglés revisó la primera frase a «in your presence» por naturalidad contextual y la segunda para subrayar que la memoria es la del orante respecto de Dios. La versión española sigue esas decisiones, manteniendo la transparencia con una nota para el matiz literal y otra para el genitivo objetivo.
  spanish_consistency_notes:
  - Se mantuvo «Dios» implícito por el vocativo/pronombre de segunda persona, sin introducir «Señor» porque el texto no usa κύριος ni YHWH.
  - Se prefirió «memoria» en la línea principal para conservar la cercanía al griego μνήμη; la nota ofrece «recuerdo» como alternativa más idiomática.
  - 'El paralelismo imperativo se sostuvo con dos verbos en presente de subjuntivo imperativo: «Dirige... y guarda...» para un registro bíblico claro y digno.'
  - No se usó «Cristo» ni terminología cristológica porque el verso no la contiene ni la requiere.
