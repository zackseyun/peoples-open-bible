id: PSS.5.6
reference: Psalms of Solomon 5:6
source:
  edition: lxx-swete-1909
  text: ὅτι ἄνθρωπος καὶ ἡ μερὶς αὐτοῦ παρὰ σοῦ ἐν σταθμῷ· οὐ προσθήσει τοῦ πλεονάσαι παρὰ τὸ κρίμα σου, ὁ θεός.
  language: Greek
  pages:
  - 794
  validation: swete_direct
translation:
  text: For man and his portion from you are in the balance[a]; he will not add so as to exceed your judgment[b], O God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For a human being and his share are before you in the balance.'
    reason: lexical_alternative
  - marker: b
    text: Or 'For man and his portion are before you on a balance; he will not add anything so as to exceed your judgment, O God.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἄνθρωπος
  chosen: man
  alternatives:
  - human being
  - humankind
  lexicon: BDAG
  rationale: Singular ἄνθρωπος is paired with the singular pronoun and 'his portion.' Per project philosophy, the masculine singular is kept where the source presents representative humanity in that form.
- source_word: μερὶς
  chosen: portion
  alternatives:
  - share
  - lot
  lexicon: LSJ
  rationale: '''Portion'' naturally expresses one''s allotted share or measure in a context of divine assessment and fits the imagery of measured allotment.'
- source_word: παρὰ σοῦ
  chosen: before you
  alternatives:
  - from you
  - in your presence
  lexicon: BDAG
  rationale: 'Although παρά with genitive can mean ''from,'' the immediate context of weighing favors a locative-relational sense: man and his portion stand before God for evaluation.'
- source_word: ἐν σταθμῷ
  chosen: on a balance
  alternatives:
  - in the balance
  - by weight
  - on scales
  lexicon: LSJ
  rationale: The phrase evokes weighing imagery. 'On a balance' preserves the concrete metaphor without sounding archaic.
- source_word: οὐ προσθήσει
  chosen: he will not add anything
  alternatives:
  - he will add nothing
  - he cannot increase
  lexicon: BDAG
  rationale: The verb literally means 'to add.' Supplying 'anything' makes the English idiomatic while preserving the verbal idea.
- source_word: τοῦ πλεονάσαι
  chosen: so as to exceed
  alternatives:
  - to abound beyond
  - to increase beyond
  lexicon: BDAG
  rationale: 'This infinitival construction explains the kind of adding in view: adding beyond proper measure. ''Exceed'' fits the judicial and weighing context.'
- source_word: κρίμα
  chosen: judgment
  alternatives:
  - decree
  - sentence
  - decision
  lexicon: BDAG
  rationale: In context this refers to God's evaluative verdict or judicial standard. 'Judgment' is the most direct and natural rendering.
- source_word: ὁ θεός
  chosen: O God
  alternatives:
  - God
  lexicon: BDAG
  rationale: The closing nominative functions as a vocative in prayerful address. English idiom regularly renders this as 'O God.'
